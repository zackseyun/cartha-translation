id: TOB.1.22
reference: Tobit 1:22
source:
  edition: lxx-swete-1909
  text: καὶ ἠξίωσεν Ἀχιάχαρος περὶ ἐμοῦ, καὶ ἦλθον εἰς Νινευήν. Ἀχιάχαρος δὲ ἦν ὁ
    οἰνοχόος καὶ ἐπὶ τοῦ δακτυλίου καὶ διοικητὴς καὶ ἐκλογιστής, καὶ κατέστησεν αὐτὸν
    ὁ Σαχερδονός, υἱὸς ἐκ δευτέρας· ἦν ἦν δὲ ἐξάδελφός μου.
  language: Greek
  pages:
  - 835
  confidence: high
  validation: agree
translation:
  text: And Ahiacharus spoke on my behalf, and I came to Nineveh. Now Ahiacharus was
    the cupbearer, keeper of the signet ring, administrator, and accountant, and Sacherdonos
    appointed him second in rank. He was my cousin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'appointed him son of the second,' an idiomatic and textually
      awkward expression commonly understood to mean that Ahiacharus held the position
      next after the king or was second in rank.
    reason: textual_variant
lexical_decisions:
- source_word: ἠξίωσεν ... περὶ ἐμοῦ
  chosen: spoke on my behalf
  alternatives:
  - interceded for me
  - requested concerning me
  - asked for me
  lexicon: BDAG
  rationale: The verb ἀξιόω can mean 'deem worthy' or 'request/claim as one's due';
    with περὶ ἐμοῦ in this narrative context it most naturally conveys advocacy or
    intervention for Tobit. 'Spoke on my behalf' is idiomatic English that preserves
    the sense without over-specifying a legal or courtly procedure.
- source_word: ἦλθον εἰς Νινευήν
  chosen: I came to Nineveh
  alternatives:
  - I returned to Nineveh
  - I went to Nineveh
  lexicon: BDAG
  rationale: ἔρχομαι commonly means 'come/go.' 'Came' follows the Greek directly and
    fits the first-person narrative. 'Returned' would add information not explicit
    in this clause.
- source_word: οἰνοχόος
  chosen: cupbearer
  alternatives:
  - wine steward
  lexicon: LSJ
  rationale: The standard court title is 'cupbearer,' a familiar and accurate rendering
    for the official who served wine to the king.
- source_word: ἐπὶ τοῦ δακτυλίου
  chosen: keeper of the signet ring
  alternatives:
  - in charge of the ring
  - over the signet
  lexicon: LSJ
  rationale: Literally 'over the ring.' In royal-administrative context this refers
    to authority over the king's signet ring. 'Keeper of the signet ring' makes the
    function clear in modern English.
- source_word: διοικητής
  chosen: administrator
  alternatives:
  - steward
  - governor
  - manager
  lexicon: LSJ
  rationale: The term denotes one who manages or administers affairs. 'Administrator'
    is broad enough to fit the court setting without narrowing the office too much.
- source_word: ἐκλογιστής
  chosen: accountant
  alternatives:
  - record-keeper
  - treasurer
  - auditor
  lexicon: LSJ
  rationale: The word relates to reckoning/accounts. 'Accountant' is concise and communicates
    responsibility for financial or administrative calculation.
- source_word: κατέστησεν αὐτὸν
  chosen: appointed him
  alternatives:
  - placed him
  - established him
  lexicon: BDAG
  rationale: καθίστημι in office-holding contexts commonly means 'appoint.' This best
    fits the list of court roles.
- source_word: υἱὸς ἐκ δευτέρας
  chosen: second in rank
  alternatives:
  - next after him
  - second only to him
  lexicon: LSJ
  rationale: The Greek is idiomatic and somewhat awkward in Swete's Vaticanus-based
    text. In context it indicates Ahiacharus's high status under Sacherdonos. 'Second
    in rank' conveys the likely sense without reproducing an opaque literalism.
- source_word: ἐξάδελφός μου
  chosen: my cousin
  alternatives:
  - my kinsman
  - my relative
  lexicon: BDAG
  rationale: ἐξάδελφος specifically denotes a cousin rather than a vague relative.
    'Cousin' is therefore the most precise rendering.
