id: TOB.1.8
reference: Tobit 1:8
source:
  edition: lxx-swete-1909
  text: καὶ τὴν τρίτην ἐδίδουν οἷς καθήκει, καθὼς ἐνετείλατο Δεββώρα ἡ μήτηρ τοῦ πατρός
    μου, διότι ὀρφανὸς κατελείφθην ὑπὸ τοῦ πατρός μου.
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: no_reference
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: וכאשר ראיתי חללי ישראל מושלכים מחוץ לחומה הייתי גונב גויותיהם וקברתים פעמים
      רבות ואמרתי יי אלהי ישראל אתה צדיק על כל הבא עלינו כי אמת עשית ואנחנו הרשענו.
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
      from an Aramaic Munich MS. The actual ancient evidence is Qumran 4Q196-200 (Aramaic),
      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 1:8
translation:
  text: And the third I would give to those to whom it was due, just as Deborah, my
    father's mother, commanded, because I was left an orphan by my father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'the third portion' or 'a third part'; the Greek leaves
      the noun implied from the context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'my father's mother.'
    reason: lexical_alternative
  - marker: c
    text: That is, effectively 'fatherless'; the Greek reads literally, 'I was left
      an orphan by my father,' referring to the loss of his father.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὴν τρίτην
  chosen: the third
  alternatives:
  - a third part
  - the third portion
  lexicon: LSJ
  rationale: The feminine substantive with article refers to the third share/portion
    of Tobit's goods or produce in the surrounding context. English can preserve the
    ellipsis with 'the third,' though 'third portion' is a possible expansion.
- source_word: ἐδίδουν
  chosen: I would give
  alternatives:
  - I gave
  - I used to give
  lexicon: LSJ
  rationale: The imperfect indicates customary past action. 'I would give' captures
    repeated practice in natural English; 'used to give' is also possible.
- source_word: οἷς καθήκει
  chosen: to those to whom it was due
  alternatives:
  - to those for whom it was fitting
  - to those to whom it belonged
  lexicon: LSJ
  rationale: καθήκει conveys what is fitting, proper, or owed. In this context of
    distributing a third portion, 'to those to whom it was due' best expresses rightful
    recipients without over-specifying.
- source_word: καθὼς ἐνετείλατο
  chosen: just as ... commanded
  alternatives:
  - as ... instructed
  - as ... ordered
  lexicon: LSJ
  rationale: The verb denotes giving a charge or command. 'Commanded' preserves the
    force while remaining idiomatic.
- source_word: Δεββώρα
  chosen: Deborah
  alternatives:
  - Debbora
  lexicon: LSJ
  rationale: Personal names are transliterated by standard English convention. 'Deborah'
    is the familiar and natural English form.
- source_word: ἡ μήτηρ τοῦ πατρός μου
  chosen: my father's mother
  alternatives:
  - the mother of my father
  - my grandmother
  lexicon: LSJ
  rationale: The Greek is explicit rather than using a single kinship term. 'My father's
    mother' preserves that explicitness; readers can infer grandmother. This also
    avoids importing a smoother term where the source is more concrete.
- source_word: διότι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: LSJ
  rationale: Introduces the reason for Deborah's role in commanding him. 'Because'
    is straightforward modern English.
- source_word: ὀρφανὸς κατελείφθην
  chosen: I was left an orphan
  alternatives:
  - I was left fatherless
  - I was orphaned
  lexicon: LSJ
  rationale: The phrase states that he was left as an orphan. Because the next phrase
    specifies 'by my father,' the Greek likely means effectively fatherless through
    paternal death. 'Left an orphan' stays close to the wording.
- source_word: ὑπὸ τοῦ πατρός μου
  chosen: by my father
  alternatives:
  - through the loss of my father
  - by the death of my father
  lexicon: LSJ
  rationale: Formally the Greek says 'by my father,' i.e., by his father's departure/death.
    The more interpretive 'by the death of my father' may reflect the sense, but the
    main text keeps the source wording more transparent.
