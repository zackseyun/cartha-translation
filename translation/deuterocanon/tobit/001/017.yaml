id: TOB.1.17
reference: Tobit 1:17
source:
  edition: lxx-swete-1909
  text: τοὺς ἄρτους μου ἐδίδουν τοῖς πεινῶσιν καὶ ἱμάτια τοῖς γυμνοῖς, καὶ εἴ τινα
    ἐκ τοῦ γένους μου ἐθεώρουν τεθνηκότα καὶ ἐρριμμένον ὀπίσω τοῦ τείχους Νινευή,
    ἔθαπτον αὐτόν.
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: major_mismatch
translation:
  text: I gave my bread to the hungry and clothing to the naked, and if I saw any
    of my kin dead and thrown behind the wall of Nineveh, I buried him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'outside the wall of Nineveh.' The Greek says 'behind the wall of Nineveh,'
      which may describe bodies cast beyond the city wall.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὺς ἄρτους μου
  chosen: my bread
  alternatives:
  - my loaves
  - the bread I had
  lexicon: LSJ
  rationale: Although plural ἄρτους is literally 'loaves,' English often uses the
    mass noun 'bread' naturally in charitable-distribution contexts. 'My bread' preserves
    the possessive and avoids an overly wooden phrasing while staying close to the
    Greek.
- source_word: ἐδίδουν
  chosen: I gave
  alternatives:
  - I would give
  - I was giving
  lexicon: LSJ
  rationale: The imperfect can suggest customary action, but in this autobiographical
    summary simple past English reads naturally and adequately conveys repeated practice
    in context.
- source_word: τοῖς πεινῶσιν
  chosen: to the hungry
  alternatives:
  - to those who were hungry
  lexicon: LSJ
  rationale: The substantival participle is idiomatically rendered 'the hungry' in
    English.
- source_word: ἱμάτια
  chosen: clothing
  alternatives:
  - garments
  - clothes
  lexicon: LSJ
  rationale: '''Clothing'' is clear modern English and suitably general; ''garments''
    is more formal/archaic, while ''clothes'' may sound too casual.'
- source_word: τοῖς γυμνοῖς
  chosen: to the naked
  alternatives:
  - to those without clothing
  - to the poorly clothed
  lexicon: LSJ
  rationale: γυμνοῖς here denotes those lacking adequate clothing. 'The naked' is
    the most direct rendering and matches the charitable parallelism.
- source_word: ἐκ τοῦ γένους μου
  chosen: of my kin
  alternatives:
  - of my family
  - of my people
  - of my race
  lexicon: LSJ
  rationale: γένος can denote family line or ethnic kin-group. 'My kin' preserves
    the familial/ethnic breadth without sounding archaic or biologically loaded.
- source_word: ἐθεώρουν
  chosen: I saw
  alternatives:
  - I observed
  - I noticed
  lexicon: LSJ
  rationale: A straightforward rendering fits the narrative. The imperfect again reflects
    repeated experience, but English simple past works in this summary statement.
- source_word: τεθνηκότα
  chosen: dead
  alternatives:
  - having died
  - a dead body
  lexicon: LSJ
  rationale: The participle describes the person as dead; 'dead' is concise and natural
    in English.
- source_word: ἐρριμμένον
  chosen: thrown
  alternatives:
  - cast
  - discarded
  lexicon: LSJ
  rationale: The perfect participle indicates a body that had been thrown out and
    left there. 'Thrown' captures the indignity without overtranslation.
- source_word: ὀπίσω τοῦ τείχους Νινευή
  chosen: behind the wall of Nineveh
  alternatives:
  - outside the wall of Nineveh
  - behind Nineveh's wall
  lexicon: LSJ
  rationale: ὀπίσω with the genitive is literally 'behind.' In context it likely means
    outside/behind the city wall, but the more literal 'behind the wall of Nineveh'
    preserves the Greek image without forcing an interpretation.
- source_word: ἔθαπτον αὐτόν
  chosen: I buried him
  alternatives:
  - I would bury him
  lexicon: LSJ
  rationale: Simple past is natural in English; the context already implies this was
    Tobit's customary practice.
