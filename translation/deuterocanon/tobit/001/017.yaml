theological_decisions:
- issue: Scope of γένος μου
  chosen_reading: Rendered broadly as 'my kin' rather than narrowly 'my family.'
  alternative_readings:
  - my family
  - my people
  rationale: The term can cover relatives or a wider kin-group. 'My kin' preserves
    the ambiguity and avoids importing a narrower or broader social scope than the
    Greek requires.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
