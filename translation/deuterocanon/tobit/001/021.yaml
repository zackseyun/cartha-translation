id: TOB.1.21
reference: Tobit 1:21
source:
  edition: lxx-swete-1909
  text: καὶ οὐ διῆλθον ἡμέραι πεντήκοντα ἕως οὗ ἀπέκτειναν αὐτὸν οἱ δύο υἱοὶ αὐτοῦ,
    καὶ ἔφυγον εἰς τὰ ὄρη Ἀραράθ· καὶ ἐβασίλευσεν Σαχερδονὸς ὁ υἱὸς αὐτοῦ ἀντʼ αὐτοῦ,
    καὶ ἔταξεν Ἀχιάχαρον τὸν Ἀναὴλ υἱὸν τοῦ ἀδελφοῦ μου ἐπὶ πᾶσαν τὴν ἐκλογιστείαν
    τῆς βασιλείας αὐτοῦ καὶ ἐπὶ πᾶσαν τὴν διοίκησιν.
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: major_mismatch
translation:
  text: And before fifty days had passed, his two sons killed him and fled to the
    mountains of Ararat. And Sacherdonos his son reigned in his place, and he appointed
    Achiacharos, the son of Anael, my brother's son, over all the accounts of his
    kingdom and over the whole administration.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sacherdonos is the Greek form of the Assyrian royal name more commonly rendered
      in English as Esarhaddon.
    reason: lexical_alternative
  - marker: b
    text: Achiacharos is the Greek form of the name often rendered Ahikar.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ διῆλθον ἡμέραι πεντήκοντα ἕως οὗ
  chosen: before fifty days had passed
  alternatives:
  - fifty days did not pass until
  - not fifty days later
  lexicon: LSJ
  rationale: The Greek idiom literally says 'fifty days did not pass until,' but idiomatic
    English is better expressed as 'before fifty days had passed' while preserving
    the short interval emphasized by the source.
- source_word: ἀπέκτειναν
  chosen: killed
  alternatives:
  - slew
  - put to death
  - murdered
  lexicon: BDAG
  rationale: '''Killed'' is the most direct and neutral rendering. ''Murdered'' may
    over-interpret the act morally; ''slew'' is archaic.'
- source_word: ἔφυγον εἰς τὰ ὄρη Ἀραράθ
  chosen: fled to the mountains of Ararat
  alternatives:
  - escaped to the mountains of Ararat
  lexicon: LSJ
  rationale: ἔφυγον commonly means 'fled' or 'escaped'; 'fled' better preserves the
    sense of flight after the assassination. 'Ararat' is a standard transliteration
    of the place name.
- source_word: ἐβασίλευσεν ... ἀντʼ αὐτοῦ
  chosen: reigned in his place
  alternatives:
  - became king instead of him
  - ruled in his stead
  lexicon: LSJ
  rationale: This captures both the accession and succession sense of the phrase in
    natural English.
- source_word: ἔταξεν
  chosen: appointed
  alternatives:
  - assigned
  - set
  lexicon: BDAG
  rationale: In administrative context, 'appointed' best conveys formal placement
    into office.
- source_word: ἐπὶ πᾶσαν τὴν ἐκλογιστείαν
  chosen: over all the accounts
  alternatives:
  - over all the accounting
  - over the entire treasury accounts
  lexicon: LSJ
  rationale: The noun refers to reckoning/accounting functions. 'Accounts' is concise
    and natural in English while preserving the administrative sense.
- source_word: διοίκησιν
  chosen: administration
  alternatives:
  - management
  - governance
  lexicon: LSJ
  rationale: In parallel with ἐκλογιστεία, this denotes broader administrative oversight.
    'Administration' is the clearest modern equivalent.
- source_word: Σαχερδονός / Ἀχιάχαρον / Ἀναήλ
  chosen: Sacherdonos / Achiacharos / Anael
  alternatives:
  - Esarhaddon / Ahikar / Hananiel
  rationale: Per project philosophy, personal names are transliterated from the Greek
    source rather than harmonized to more familiar Anglicized or historically reconstructed
    forms. The verse is translated from Swete's Greek witness, so the Greek-form transliterations
    are retained in the main text.
