translation:
  text: And when I was in my own country, in the land of Israel, while I was still
    young, the whole tribe of Naphtali my father fell away from the house of Jerusalem,
    which had been chosen from all the tribes of Israel for all the tribes to sacrifice
    there; and the temple, the dwelling place of the Most High, had been consecrated
    and built for all generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text here distinguishes 'the house of Jerusalem' from 'the temple';
      the first likely refers broadly to the Jerusalem sanctuary, while the second
      names the temple more specifically.
    reason: lexical_alternative
  - marker: b
    text: The final Greek words are textually difficult, ending with 'for all' (εἰς
      πάσας). The translation supplies 'for all generations' to make coherent sense
      of the clause; compare the longer Tobit tradition, which supports an enduring,
      generational reference.
    reason: textual_variant
  - marker: c
    text: Qumran Tobit fragments are known to align more often with the longer Greek
      tradition in this book, though this verse here is translated from Swete's Greek
      witness.
    reason: cross_reference
lexical_decisions:
- source_word: χώρα
  chosen: country
  alternatives:
  - region
  - land
  lexicon: LSJ
  rationale: In the phrase ἐν τῇ χώρᾳ μου, 'my own country' is natural English and
    preserves the personal sense of homeland better than the flatter 'region.' The
    following phrase ἐν τῇ γῇ Ἰσραήλ then specifies it as 'the land of Israel.'
- source_word: νεωτέρου μου ὄντος
  chosen: while I was still young
  alternatives:
  - when I was younger
  - in my youth
  lexicon: LSJ
  rationale: This genitive absolute marks Tobit's age at the time. 'While I was still
    young' is idiomatic and preserves the temporal nuance without sounding wooden.
- source_word: ἀπέστη
  chosen: fell away
  alternatives:
  - apostatized
  - rebelled
  - turned aside
  lexicon: LSJ
  rationale: The verb indicates departure or defection. 'Fell away' communicates religious
    and covenantal defection in accessible English without importing later technical
    jargon too strongly.
- source_word: οἶκος Ἱεροσολύμων
  chosen: house of Jerusalem
  alternatives:
  - house at Jerusalem
  - temple in Jerusalem
  lexicon: LSJ
  rationale: The Greek reads literally 'house of Jerusalem.' Because the verse later
    explicitly mentions the ναός ('temple'), retaining 'house of Jerusalem' here avoids
    collapsing two distinct expressions too quickly, while still signaling the Jerusalem
    sanctuary context.
- source_word: ἐκλεγείσης
  chosen: had been chosen
  alternatives:
  - was chosen
  - selected
  lexicon: LSJ
  rationale: The participle modifies Jerusalem as the divinely selected place among
    the tribes. 'Had been chosen' fits the retrospective narration and preserves the
    passive sense.
- source_word: εἰς τὸ θυσιάζειν
  chosen: for ... to sacrifice there
  alternatives:
  - for sacrificing
  - as the place to offer sacrifices
  lexicon: LSJ
  rationale: The infinitive expresses purpose. Adding 'there' makes explicit in English
    the locative force implied by the chosen Jerusalem sanctuary.
- source_word: ναός
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: LSJ
  rationale: ναός is best rendered 'temple' here in ordinary English, especially since
    the verse contrasts tribal defection from Jerusalem with the consecrated central
    sanctuary.
- source_word: κατασκήνωσις
  chosen: dwelling place
  alternatives:
  - tabernacle
  - habitation
  lexicon: LSJ
  rationale: The genitive phrase τῆς κατασκηνώσεως τοῦ ὑψίστου is somewhat difficult
    in this context. 'Dwelling place of the Most High' preserves the idea of God's
    habitation without forcing the more technical 'tabernacle,' which could confuse
    readers in a temple context.
- source_word: ὑψίστου
  chosen: the Most High
  alternatives:
  - the Highest
  lexicon: LSJ
  rationale: Standard rendering for the divine title, preserving biblical diction
    without archaism.
- source_word: ἡγιάσθη
  chosen: had been consecrated
  alternatives:
  - was sanctified
  - was made holy
  lexicon: LSJ
  rationale: This refers to the sanctuary's being set apart as holy. 'Consecrated'
    is clear, reverent, and contextually appropriate.
- source_word: ᾠκοδομήθη
  chosen: had been ... built
  alternatives:
  - was built
  - was established
  lexicon: LSJ
  rationale: The verb is straightforwardly architectural. 'Built' should be retained
    rather than generalized.
- source_word: εἰς πάσας
  chosen: for all generations
  alternatives:
  - for all
  - unto all ages
  lexicon: LSJ
  rationale: The Greek as transmitted ends abruptly with εἰς πάσας, which is incomplete
    by itself. In Tobit this phrase is commonly understood as elliptical for a generational
    expression, and the broader sentence points to enduring centrality. The rendering
    'for all generations' makes coherent sense while honestly requiring a textual
    note.
