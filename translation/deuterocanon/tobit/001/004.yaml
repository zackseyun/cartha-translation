theological_decisions:
- issue: Description of Naphtali's departure from Jerusalem worship
  chosen_reading: fell away
  alternative_readings:
  - rebelled
  - apostatized
  rationale: The verse concerns cultic and covenantal separation from the Jerusalem
    sanctuary. 'Fell away' preserves the religious seriousness without overloading
    the line with later doctrinal terminology.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Reference to Jerusalem as chosen place of sacrifice
  chosen_reading: which had been chosen from all the tribes of Israel for all the
    tribes to sacrifice there
  alternative_readings:
  - which was chosen ... for sacrifice by all the tribes
  rationale: The Greek emphasizes Jerusalem's election as the central place for Israel's
    sacrificial worship. The translation preserves that theological claim without
    expanding it beyond the wording given.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
