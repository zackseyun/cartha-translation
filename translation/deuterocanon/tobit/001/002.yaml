      do not treat as Vorlage.
    reference: TOB 1:2
translation:
  text: who was taken captive in the days of Enemessaros king of the Assyrians, from
    Thisbe, which is to the south of Kedesh of Naphtali in Galilee, above Asher.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The place names in this verse are difficult and may reflect textual or geographic
      uncertainty. 'Kydios' may represent a site otherwise identified differently,
      and 'to the right of' / 'above Asher' are kept relatively literal rather than
      converted into a more interpretive compass direction.
    reason: cultural_note
  - marker: b
    text: Some interpreters identify 'Enemessaros' with the Assyrian king Shalmaneser,
      but the Greek text here reads the transliterated form 'Enemessaros.'
    reason: alternative_reading
lexical_decisions:
- source_word: ᾐχμαλωτεύθη
  chosen: was taken captive
  alternatives:
  - was led away captive
  - was exiled
  lexicon: BDAG
  rationale: The passive verb denotes being carried off as a captive. 'Was taken captive'
    is clear modern English and preserves the forced nature better than the broader
    'was exiled.'
- source_word: ἐν ἡμέραις
  chosen: in the days of
  alternatives:
  - during the reign of
  - in the time of
  lexicon: BDAG
  rationale: This is a standard temporal expression. 'In the days of' stays close
    to the Greek while remaining natural.
- source_word: Ἐνεμεσσαάρου
  chosen: Enemessaros
  alternatives:
  - Shalmaneser
  lexicon: LSJ
  rationale: Per project philosophy, personal names are transliterated rather than
    harmonized to a more familiar historical form. The Greek form in Swete is retained
    in English transliteration.
- source_word: ἐκ Θίσβης
  chosen: from Thisbe
  alternatives:
  - of Thisbe
  lexicon: BDAG
  rationale: ἐκ normally marks origin or source. 'From Thisbe' best reflects the Greek
    geography notice.
- source_word: ἐκ δεξιῶν
  chosen: to the right of
  alternatives:
  - south of
  - on the right side of
  lexicon: LSJ
  rationale: Literally 'from/on the right side of.' In geographic descriptions this
    can imply a directional relation, but the exact orientation is uncertain. The
    more literal 'to the right of' preserves the source wording without over-resolving
    the geography.
- source_word: Κυδίως
  chosen: Kydios
  alternatives:
  - Cydius
  - Kedesh
  lexicon: LSJ
  rationale: The place name is obscure in the Greek tradition. A transliteration of
    the attested Greek form is safest in the main text; identification with a better-known
    site is possible but uncertain and better left to a footnote.
- source_word: τῆς Νεφθαλεὶμ
  chosen: of Naphtali
  alternatives:
  - in Naphtali
  lexicon: LSJ
  rationale: The genitive most naturally qualifies the place name as belonging to
    the tribal region. 'Of Naphtali' preserves that relation.
- source_word: ἐν τῇ Γαλειλαίᾳ
  chosen: in Galilee
  alternatives:
  - in the Galilee
  lexicon: BDAG
  rationale: Standard geographic rendering.
- source_word: ὑπεράνω Ἀσήρ
  chosen: above Asher
  alternatives:
  - north of Asher
  - over Asher
  lexicon: LSJ
  rationale: ὑπεράνω can mean 'above' spatially. In a geographic note it may imply
    'north of,' but the literal 'above' better preserves the ambiguity of the Greek.
