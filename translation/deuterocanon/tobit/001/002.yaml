id: TOB.1.2
reference: Tobit 1:2
source:
  edition: lxx-swete-1909
  text: ὃς ᾐχμαλωτεύθη ἐν ἡμέραις Ἐνεμεσσαάρου τοῦ βασιλέως Ἀσσυρίων ἐκ Θίσβης, ἥ
    ἐστιν ἐκ δεξιῶν Κυδίως τῆς Νεφθαλεὶμ ἐν τῇ Γαλειλαίᾳ ὑπεράνω Ἀσήρ.
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: ויאמר טובי זכרה לי אלהי לטובה (על) שהלכתי לפניך כל ימי חיי בדרך תמים וצדקות
      רבות וחסדים טובים שעשיתי לאחי ולעמי בגולה בנינוה בארץ אשור.
