theological_decisions:
- issue: Rendering δικαιοσύνη in a wisdom/ethical self-description
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The verse presents Tobit's summary of his own faithful conduct and mercy.
    'Righteousness' best preserves the moral-religious dimension without reducing
    it to social justice alone. The alternative remains lexically possible but is
    less suitable in this context.
