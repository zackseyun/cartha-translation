id: TOB.1.3
reference: Tobit 1:3
source:
  edition: lxx-swete-1909
  text: Ἐγὼ Τωβείτ ὁδοῖς ἀληθείας ἐπορευόμην καὶ δικαιοσύνῃ πάσας τὰς ἡμέρας τῆς ζωῆς
    μου, καὶ ἐλεημοσύνας πολλὰς ἐποίησα τοῖς ἀδελφοῖς μου καὶ τῷ ἔθνει τοῖς προπορευθεῖσιν
    μετʼ ἐμοῦ εἰς χώραν Ἀσσυρίων εἰς Νινευή.
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: ויהי בהיותי נער בארץ ישראל כל מטה נפתלי פשעו בבית דוד ויחדלו מעלות ירושלים
      העיר אשר בחר יי מכל שבטי ישראל ושם מזבח יי המקודש לכל שבטי ישראל והיכל יי בנוי
      בתוכה להעלות עולות ושלמים ליי שלשת פעמים (בשנה) וכל אחי מטה נפתלי זובחים זבחים
      ועולות לעגלי הזהב אשר עשה ירבעם בן נבט מלך ישראל בבית אל ובדן ואני הלכתי אל
      ירושלים במועדים ככתוב בתורת יי על ישראל בבכורים ומעשרות ובכורות לכהנים בני אהרן
      (ודגן ותירוש) ושמן (ותאנים ורמונים) ומכל פרי האדמה לבני לוי המשרתים את פני יי
      בירושלים ומעשר שני ומעשר שלישי לגר ליתום ולאלמנה (והלכתי בכל שנה ושנה עם כל
      אלה לירושלם) כמצות יי וכאשר צותה עלי דבורה אם אבי כי יתום נשארתי (מאבי ו)מאמי.
    kind: indirect_hebrew
