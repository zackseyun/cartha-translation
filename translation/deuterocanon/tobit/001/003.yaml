      do not treat as Vorlage.
    reference: TOB 1:3
translation:
  text: I, Tobit, walked in the ways of truth and righteousness all the days of my
    life, and I did many acts of mercy for my brothers and for my people who went
    with me into the land of the Assyrians, to Nineveh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I gave much alms.' The Greek expression can refer specifically to almsgiving,
      though here it may also include broader deeds of mercy.
    reason: lexical_alternative
  - marker: b
    text: '''My brothers'' likely refers to Tobit''s fellow Israelites or kinsmen
      more broadly, not only male siblings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁδοῖς ἀληθείας
  chosen: in the ways of truth
  alternatives:
  - on paths of truth
  - in truthful ways
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the plural metaphor of conduct ('ways')
    and the moral quality denoted by ἀλήθεια. 'Truthful ways' is smoother English
    but weakens the idiomatic image.
- source_word: ἐπορευόμην
  chosen: walked
  alternatives:
  - went
  - conducted myself
  lexicon: LSJ
  rationale: In moral contexts πορεύομαι commonly carries the sense of one's manner
    of life. 'Walked' preserves the biblical ethical metaphor better than the flatter
    'went,' while remaining natural in English.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: The immediate context is Tobit's personal conduct over the course of
    his life, so 'righteousness' better captures uprightness of life. 'Justice' is
    a possible gloss but is less fitting here. This follows the project's default
    for δικαιοσύνη outside contexts that strongly foreground judicial justice.
- source_word: ἐλεημοσύνας πολλὰς ἐποίησα
  chosen: I did many acts of mercy
  alternatives:
  - I gave much alms
  - I performed many charitable deeds
  lexicon: LSJ
  rationale: ἐλεημοσύνη can denote almsgiving specifically, but more broadly deeds
    of mercy. Because the object includes both 'my brothers' and 'my people,' and
    because the phrase is plural with ποιέω, 'did many acts of mercy' preserves the
    breadth of compassionate action without narrowing it too quickly to monetary alms.
- source_word: τοῖς ἀδελφοῖς μου
  chosen: my brothers
  alternatives:
  - my kindred
  - my brothers and sisters
  lexicon: BDAG
  rationale: The Greek is masculine plural and in this context likely refers broadly
    to fellow Israelites/kinsmen. Per project policy, the main text remains gender-accurate
    to the source form as 'brothers,' while a more inclusive sense can be noted if
    needed. 'Kindred' is possible but less direct.
- source_word: τῷ ἔθνει
  chosen: my people
  alternatives:
  - the nation
  - my nation
  lexicon: LSJ
  rationale: Although ἔθνος often means 'nation,' in first-person narrative 'my people'
    communicates the ethnic-national sense more naturally in English and fits the
    relational context alongside 'my brothers.'
- source_word: τοῖς προπορευθεῖσιν μετʼ ἐμοῦ
  chosen: who went with me
  alternatives:
  - who had gone before me with me
  - who were led away with me
  lexicon: LSJ
  rationale: The participle literally suggests those who went on ahead, but in context
    of deportation/exile the phrase identifies the group accompanying Tobit into Assyria.
    A smoother English rendering avoids an awkwardly literal 'went before with me'
    while preserving shared movement. The exact nuance of priority is not central
    enough to force unnatural English.
- source_word: εἰς χώραν Ἀσσυρίων
  chosen: into the land of the Assyrians
  alternatives:
  - into Assyria
  - to the country of the Assyrians
  lexicon: LSJ
  rationale: The genitive construction is most naturally rendered 'the land of the
    Assyrians.' This is slightly fuller than simply 'Assyria' and reflects the Greek
    wording.
- source_word: εἰς Νινευή
  chosen: to Nineveh
  alternatives:
  - into Nineveh
  lexicon: LSJ
  rationale: Standard destination rendering for a city name.
