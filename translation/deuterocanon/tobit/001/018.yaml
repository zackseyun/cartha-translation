theological_decisions:
- issue: Proper-name form for the Assyrian king
  chosen_reading: Use the standard English historical name 'Sennacherib' in the main
    text, while preserving the Greek form as an alternative in a footnote.
  alternative_readings:
  - Achreil the king
  rationale: This is not a doctrinal issue but a transparency issue tied to a likely
    textual/name-form divergence in the Greek witness. The narrative context in Tobit
    identifies the king as Sennacherib; using the standard name serves readers while
    the footnote preserves the source-form for auditability.
  doctrine_reference: 'Translation philosophy: transliterate names; preserve source
    uncertainty honestly.'
