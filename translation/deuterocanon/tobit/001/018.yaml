id: TOB.1.18
reference: Tobit 1:18
source:
  edition: lxx-swete-1909
  text: καὶ εἴ τινα ἀπέκτεινεν Ἀχρειλ ὁ βασιλεύς, ὅτε ἦλθεν φεύγων ἐκ τῆς Ἰουδαίας,
    ἔθαψα αὐτοὺς κλέπτων· πολλοὺς γὰρ ἀπέκτεινεν ἐν τῷ θυμῷ αὐτοῦ· καὶ ἐξητήθη ὑπὸ
    τοῦ βασιλέως τὰ σώματα, καὶ οὐχ εὑρέθη.
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: major_mismatch
translation:
  text: And if Sennacherib the king killed any of them when he came fleeing from Judea,
    I buried them secretly; for in his anger he killed many, and the bodies were sought
    by the king, but they were not found.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Swete reads 'Achreil the king' (Ἀχρειλ ὁ βασιλεύς), a form understood
      in context to refer to Sennacherib.
    reason: textual_variant
lexical_decisions:
- source_word: καὶ εἴ τινα
  chosen: And if ... any of them
  alternatives:
  - And whoever
  - And if anyone
  lexicon: BDAG
  rationale: The indefinite singular with conditional force introduces a general circumstance.
    In English, 'if ... any of them' best captures the sense in context, since the
    following plural αὐτούς shows Tobit's practice regarding multiple victims rather
    than a single named person.
- source_word: ἀπέκτεινεν
  chosen: killed
  alternatives:
  - put to death
  - slew
  lexicon: BDAG
  rationale: A straightforward rendering preserves the plain sense without archaic
    tone. 'Put to death' is possible but slightly more formal and juridical than the
    context requires.
- source_word: Ἀχρειλ ὁ βασιλεύς
  chosen: Sennacherib the king
  alternatives:
  - Achreil the king
  lexicon: LSJ
  rationale: The Swete/Vaticanus form Ἀχρειλ appears to reflect a textual form of
    the Assyrian royal name. In Tobit's narrative context this king is Sennacherib;
    rendering the standard English name avoids misleading readers into thinking a
    different king is intended, while the unusual Greek form is preserved in a footnote.
- source_word: ὅτε ἦλθεν φεύγων
  chosen: when he came fleeing
  alternatives:
  - when he fled and came
  - when he returned as a fugitive
  lexicon: BDAG
  rationale: This keeps both the motion verb and participle. 'Came fleeing' is slightly
    wooden but preserves the compressed Greek sense better than smoothing it into
    a paraphrase.
- source_word: ἐκ τῆς Ἰουδαίας
  chosen: from Judea
  alternatives:
  - from Judah
  lexicon: BDAG
  rationale: In Hellenistic Greek Ἰουδαία normally denotes the region Judea/Judah.
    'Judea' is the clearer geographic rendering in this narrative setting.
- source_word: ἔθαψα αὐτοὺς κλέπτων
  chosen: I buried them secretly
  alternatives:
  - I buried them stealthily
  - I buried them by stealth
  - I buried them in secret
  lexicon: BDAG
  rationale: The participle κλέπτων literally suggests acting secretly or by stealth.
    'Secretly' communicates the adverbial force naturally in modern English without
    implying theft.
- source_word: ἐν τῷ θυμῷ αὐτοῦ
  chosen: in his anger
  alternatives:
  - in his wrath
  - in his rage
  lexicon: BDAG
  rationale: '''Anger'' is the most neutral and readable rendering. ''Wrath'' may
    sound overly elevated; ''rage'' may over-intensify beyond the Greek.'
- source_word: ἐξητήθη
  chosen: were sought
  alternatives:
  - were searched for
  - were demanded
  lexicon: BDAG
  rationale: The passive indicates that the bodies became the object of a search ordered
    or conducted under royal authority. 'Were sought' stays close to the Greek while
    remaining idiomatic.
- source_word: τὰ σώματα
  chosen: the bodies
  alternatives:
  - the corpses
  lexicon: BDAG
  rationale: Either is possible, but 'bodies' is more natural English and sufficiently
    clear in context.
- source_word: οὐχ εὑρέθη
  chosen: they were not found
  alternatives:
  - none were found
  - it was not found
  lexicon: BDAG
  rationale: 'Although the Greek verb is singular, the neuter plural subject τὰ σώματα
    commonly takes a singular verb. English idiom prefers plural agreement: ''they
    were not found.'''
