theological_decisions:
- issue: Narrative portrayal of Tobit's response to persecution
  chosen_reading: Rendered the final clause as a fearful withdrawal rather than a
    more dramatic 'flight.'
  alternative_readings:
  - I fled in fear
  - I departed because I was afraid
  rationale: The verse narrates Tobit's prudent concealment and departure after learning
    he was being sought for execution. The Greek ἀνεχώρησα does not require the stronger
    'fled,' so the translation avoids importing extra dramatic force while preserving
    the danger.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrastic expansion.'
