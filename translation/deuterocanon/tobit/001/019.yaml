id: TOB.1.19
reference: Tobit 1:19
source:
  edition: lxx-swete-1909
  text: πορευθεὶς δὲ εἷς τῶν ἐν Νινευὴ ὑπέδειξε τῷ βασιλεῖ περὶ ἐμοῦ ὅτι θάπτω αὐτούς,
    καὶ ἐκρύβην· ἐπιγνοὺς δὲ ὅτι ζητοῦμαι ἀποθανεῖν, φοβηθεὶς ἀνεχώρησα.
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: major_mismatch
translation:
  text: But one of the men in Nineveh went and informed the king about me, that I
    was burying them; and I hid myself. Then, realizing that I was being sought to
    be put to death, I withdrew in fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'one of those in Nineveh.' The Greek expression is literally 'one of
      those in Nineveh.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'they were seeking to kill me.' The Greek more literally says, 'I was
      being sought to be put to death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πορευθεὶς
  chosen: went
  alternatives:
  - having gone
  - departed
  lexicon: LSJ
  rationale: Aorist participle of πορεύομαι, here functioning idiomatically before
    the main verb ὑπέδειξε. In English, 'went and informed' best captures the sequence
    naturally without over-literal stiffness.
- source_word: εἷς τῶν ἐν Νινευὴ
  chosen: one of the men in Nineveh
  alternatives:
  - one of those in Nineveh
  - one of the people in Nineveh
  lexicon: LSJ
  rationale: 'The expression is elliptical: literally ''one of those in Nineveh.''
    ''One of the men in Nineveh'' makes the sense explicit in readable English while
    staying close to the Greek.'
- source_word: ὑπέδειξε
  chosen: informed
  alternatives:
  - reported
  - pointed out
  - gave information
  lexicon: LSJ
  rationale: In context the verb means to give information to an authority about someone.
    'Informed' is natural and sufficiently formal; 'reported' is possible but slightly
    more interpretive.
- source_word: περὶ ἐμοῦ
  chosen: about me
  alternatives:
  - concerning me
  lexicon: LSJ
  rationale: Standard prepositional sense; 'about me' is idiomatic modern English.
- source_word: ὅτι θάπτω αὐτούς
  chosen: that I was burying them
  alternatives:
  - that I bury them
  - that I buried them
  lexicon: LSJ
  rationale: Present θάπτω within indirect discourse likely conveys ongoing/customary
    action from Tobit's perspective. English past progressive fits the narrative setting
    better than a simple present.
- source_word: ἐκρύβην
  chosen: I hid myself
  alternatives:
  - I was hidden
  - I went into hiding
  lexicon: LSJ
  rationale: Aorist passive/middle-form used in an intransitive-reflexive sense in
    context. 'I hid myself' stays close to the Greek while remaining clear.
- source_word: ἐπιγνοὺς
  chosen: realizing
  alternatives:
  - learning
  - coming to know
  lexicon: LSJ
  rationale: The participle marks recognition of a situation already developing. 'Realizing'
    fits the narrative flow.
- source_word: ζητοῦμαι ἀποθανεῖν
  chosen: I was being sought to be put to death
  alternatives:
  - they were seeking to kill me
  - I was being sought for death
  lexicon: LSJ
  rationale: 'The Greek is somewhat compressed: literally ''I am sought to die/be
    put to death.'' The chosen rendering preserves both the passive ζητοῦμαι and the
    death-purpose infinitive in clear English. ''They were seeking to kill me'' is
    smoother but less formally aligned.'
- source_word: φοβηθεὶς
  chosen: in fear
  alternatives:
  - being afraid
  - because I was afraid
  lexicon: LSJ
  rationale: The participle gives the emotional circumstance of the withdrawal. 'In
    fear' is concise and idiomatic when attached to 'I withdrew.'
- source_word: ἀνεχώρησα
  chosen: I withdrew
  alternatives:
  - I departed
  - I retreated
  - I fled
  lexicon: LSJ
  rationale: ἀναχωρέω can mean withdraw or depart. 'Withdrew' preserves the sense
    of leaving for safety without overstating it as a panicked flight, though that
    nuance is possible from context.
