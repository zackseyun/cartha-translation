theological_decisions:
- issue: Religious sense of συναποστᾶσαι
  chosen_reading: apostasy
  alternative_readings:
  - rebellion
  - defection
  rationale: Because the verse immediately describes sacrifice to Baal, the falling-away
    is specifically covenantal/religious, not merely political. 'Apostasy' preserves
    that theological force.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Identification of τῇ δαμάλει
  chosen_reading: Baal the heifer
  alternative_readings:
  - Baal the calf
  - the heifer-image associated with Baal
  rationale: The Greek text as given links Βάαλ and δαμάλει in apposition. Rendering
    it directly preserves the source wording while leaving the exact cultic nuance
    open. A lexical footnote preserves 'calf' as an alternative because some readers
    will connect the phrase with northern bovine worship traditions.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
