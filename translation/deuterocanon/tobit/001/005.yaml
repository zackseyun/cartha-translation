translation:
  text: and all the tribes that had apostatized were sacrificing to Baal the heifer,
    including the house of my father, Naphtali.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Baal the calf.' The Greek uses a word for a young cow/heifer; the phrase
      likely refers to the bovine cult image associated with northern Israel's worship.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek syntax at the end is compressed: literally, ''and the house of
      Naphtali of my father.'' The sense is that even Tobit''s own ancestral house
      was included among those participating.'
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶσαι αἱ φυλαί
  chosen: all the tribes
  alternatives:
  - all the clans
  - every tribe
  lexicon: LSJ
  rationale: φυλαί in this historical-national context refers to Israel's tribal groupings,
    best rendered 'tribes' rather than the more kinship-focused 'clans'.
- source_word: αἱ συναποστᾶσαι
  chosen: that had joined in apostasy
  alternatives:
  - that had revolted together
  - that had fallen away with the others
  - that had apostatized together
  lexicon: LSJ
  rationale: The compound participle conveys joining in a collective defection. In
    context of idolatrous worship, 'joined in apostasy' makes the religious sense
    explicit without overparaphrasing.
- source_word: ἔθυον
  chosen: were sacrificing
  alternatives:
  - sacrificed
  - were offering sacrifices
  lexicon: LSJ
  rationale: The imperfect suggests customary or ongoing action in past time, so 'were
    sacrificing' preserves the aspect better than a simple preterite.
- source_word: τῇ Βάαλ
  chosen: to Baal
  alternatives:
  - for Baal
  lexicon: LSJ
  rationale: The dative after θύω marks the deity receiving sacrifice; 'to Baal' is
    the natural English rendering.
- source_word: τῇ δαμάλει
  chosen: the heifer
  alternatives:
  - the calf
  - the young cow
  lexicon: LSJ
  rationale: δαμάλις denotes a heifer/young cow. 'Heifer' is more precise than 'calf.'
    The phrase likely identifies Baal by association with the bovine cult image rather
    than naming a separate recipient.
- source_word: ὁ οἶκος Νεφθαλεὶμ τοῦ πατρός μου
  chosen: including the house of my father, Naphtali
  alternatives:
  - and the house of Naphtali my father
  - even the house of my father Naphtali
  lexicon: LSJ
  rationale: The Greek appends Tobit's own family line as part of the tribes involved.
    Since English cannot naturally leave the nominative phrase hanging after 'and,'
    'including' makes the inclusion explicit. 'Naphtali' is treated as the proper
    name linked to 'my father' in the Greek wording, though the syntax is somewhat
    compressed.
