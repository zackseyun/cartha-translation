id: TOB.1.13
reference: Tobit 1:13
source:
  edition: lxx-swete-1909
  text: καὶ ἔδωκέν μοι ὁ ὕψιστος χάριν καὶ μορφὴν ἐνώπιον Ἐνεμεσσάρου, καὶ ἤμην αὐτοῦ
    ἀγοραστής.
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: major_mismatch
translation:
  text: And the Most High gave me favor and good standing before Enemessar, and I
    was his buyer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'favor and comeliness' / 'favor and good standing.' The Greek μορφή can
      denote outward form or appearance, and the exact nuance in this court context
      is not fully certain.
    reason: lexical_alternative
  - marker: b
    text: Or 'his purchasing agent.' The Greek literally says 'buyer,' likely referring
      to an official responsible for procurement.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ὕψιστος
  chosen: the Most High
  alternatives:
  - God
  - the Highest
  lexicon: LSJ
  rationale: A standard divine title in Jewish Greek. 'The Most High' preserves the
    titular force and matches established biblical usage without flattening it to
    the generic 'God'.
- source_word: χάριν
  chosen: favor
  alternatives:
  - grace
  lexicon: BDAG
  rationale: In this court setting the sense is social acceptance or favorable regard
    from a ruler, so 'favor' is more contextually precise than the more theologically
    loaded 'grace'.
- source_word: μορφήν
  chosen: good appearance
  alternatives:
  - form
  - comeliness
  - presence
  lexicon: LSJ
  rationale: μορφή often denotes outward form or appearance. In the phrase 'favor
    and μορφήν before Enemessar,' a sense like pleasing appearance or presentability
    best fits the context of royal service. 'Good appearance' makes explicit the positive
    nuance implied by the collocation.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the sight of
  - in the presence of
  lexicon: BDAG
  rationale: '''Before'' is the most natural concise English equivalent here and adequately
    conveys favorable standing in the king''s presence.'
- source_word: Ἐνεμεσσάρου
  chosen: Enemessar
  alternatives:
  - Shalmaneser
  rationale: The project philosophy prefers transliterating personal names from the
    source witness. Since the Greek text here reads Ἐνεμεσσάρου, 'Enemessar' preserves
    the source form rather than harmonizing to a more familiar historical name.
- source_word: ἀγοραστής
  chosen: buyer
  alternatives:
  - purchasing agent
  - purveyor
  - steward
  lexicon: LSJ
  rationale: The noun literally denotes a buyer or purchaser. Although the office
    likely implies an official procurement role, 'buyer' stays closest to the Greek
    while remaining intelligible. A footnote preserves the more idiomatic sense 'purchasing
    agent.'
