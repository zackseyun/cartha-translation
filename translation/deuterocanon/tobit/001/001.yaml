id: TOB.1.1
reference: Tobit 1:1
source:
  edition: lxx-swete-1909
  text: ΒΙΒΛΟΣ λόγων Τωβείτ τοῦ Τωβιὴλ τοῦ Ἀνανιὴλ τοῦ Ἀδουὴλ τοῦ ΒαΓαβαήλ, ἐκ τοῦ
    σπέρματος Ἀσιήλ, ἐκ τῆς φυλῆς Νεφθαλείμ,
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: 'זה ספר טובי בן טוביאל בן חננאל (בן אריאל) בן גביאל בן עשאל בן ננתיאל ממטה
      נפתלי (אשר הגלה משומרון עם הגולה אשר הגלתה בימי הושע בן אלה) אשר הגלה בימי שלמנאסר
      מלך אשור והוא היה מתושבי עיר נפתלי אשר בגליל על גבול ימה:'
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
      from an Aramaic Munich MS. The actual ancient evidence is Qumran 4Q196-200 (Aramaic),
      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 1:1
translation:
  text: The book of the words of Tobit son of Tobiel, son of Ananiel, son of Aduel,
    son of Gabael, from the seed of Asiel, from the tribe of Naphtali,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has 'book of the words,' a formal title-like expression. It could
      also be rendered 'record' or 'account.'
    reason: lexical_alternative
  - marker: b
    text: The ancestor's name appears in a difficult Greek form here; the English
      normalizes it as 'Gabael.' Some witnesses and secondary traditions reflect forms
      closer to 'Gabiel' or 'Bagabael.'
    reason: alternative_reading
lexical_decisions:
- source_word: ΒΙΒΛΟΣ
  chosen: The book
  alternatives:
  - Book
  - Record
  lexicon: LSJ
  rationale: βίβλος commonly denotes a book or written record. The anarthrous opening
    functions as a title heading; 'The book' gives natural English while preserving
    the formal superscription style.
- source_word: λόγων
  chosen: of the words
  alternatives:
  - of the accounts
  - of the matters
  - of the story
  lexicon: LSJ
  rationale: λόγοι here most literally means 'words,' especially in a title formula
    ('book of the words of...'). Although idiomatic English might compress to 'account,'
    retaining 'words' preserves the Semitic-style superscription also reflected by
    the parallel Semitic tradition.
- source_word: Τωβείτ
  chosen: Tobit
  alternatives:
  - Tobit/Tobith
  rationale: Standard English transliteration of the personal name. The project philosophy
    prefers transliterating names rather than translating them.
- source_word: τοῦ Τωβιὴλ
  chosen: son of Tobiel
  alternatives:
  - of Tobiel
  rationale: The repeated genitives in the genealogy are rendered with implied filiation
    in English. 'Son of' makes the genealogical relationship explicit and readable.
- source_word: τοῦ Ἀνανιὴλ
  chosen: son of Ananiel
  alternatives:
  - of Ananiel
  rationale: Rendered consistently with the genealogical chain as explicit filiation.
- source_word: τοῦ Ἀδουὴλ
  chosen: son of Aduel
  alternatives:
  - of Aduel
  rationale: Rendered consistently with the genealogical chain as explicit filiation.
- source_word: τοῦ ΒαΓαβαήλ
  chosen: son of Gabael
  alternatives:
  - son of Bagabael
  - of Gabael
  rationale: The Swete spelling reflects a manuscript form that is orthographically
    difficult; the parallel Semitic source supports a form corresponding to Gabael/Gabiel
    rather than preserving the awkward diplomatic spelling in English. 'Gabael' is
    a defensible normalized transliteration anchored in the available witnesses.
- source_word: ἐκ τοῦ σπέρματος
  chosen: from the seed of
  alternatives:
  - from the line of
  - from the descendants of
  lexicon: LSJ
  rationale: σπέρμα literally means 'seed' and often denotes lineage. 'From the seed
    of' preserves the genealogical idiom; a smoother alternative like 'from the line
    of' is possible but less transparent to the source.
- source_word: Ἀσιήλ
  chosen: Asiel
  alternatives:
  - Assiel
  - Asael
  rationale: Transliterated directly from the Greek form. Name spelling is somewhat
    fluid across witnesses, so a close Greek-based form is preferred in the main text.
- source_word: ἐκ τῆς φυλῆς
  chosen: from the tribe of
  alternatives:
  - of the tribe of
  lexicon: LSJ
  rationale: φυλή in genealogical contexts is 'tribe.' Repeating 'from' mirrors the
    Greek structure and keeps the lineage formula clear.
- source_word: Νεφθαλείμ
  chosen: Naphtali
  alternatives:
  - Nephthaleim
  rationale: Standard English biblical form of the tribal name, preferred over a more
    mechanical transliteration of the Greek.
