id: TOB.1.14
reference: Tobit 1:14
source:
  edition: lxx-swete-1909
  text: ἐπορευόμην εἰς τὴν Μηδείαν, καὶ παρεθέμην Γαβηλῷ τῷ ἀδελφῷ Γαβρίᾳ ἐν Ῥάγοις
    τῆς Μηδείας ἀργυρίου τάλαντα δέκα.
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: major_mismatch
translation:
  text: I used to go to Media, and I deposited ten talents of silver with Gabael,
    the brother of Gabri, in Rages of Media.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I went to Media'; the Greek imperfect verb can suggest repeated/customary
      action ('I used to go') rather than a single journey.
    reason: lexical_alternative
  - marker: b
    text: Or 'I entrusted' ten talents of silver to Gabael. The Greek verb can denote
      placing something in another's care, here in a financial sense.
    reason: lexical_alternative
  - marker: c
    text: The Greek place name may also be rendered 'Rhages of Media.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπορευόμην
  chosen: I used to go
  alternatives:
  - I went
  - I traveled
  lexicon: BDAG
  rationale: Imperfect middle/passive indicates customary or repeated past action
    rather than a single trip; 'used to go' preserves that aspect better than simple
    'went'.
- source_word: παρεθέμην
  chosen: I deposited
  alternatives:
  - I entrusted
  - I placed on deposit
  lexicon: BDAG
  rationale: In context of money left with another person, the verb denotes placing
    funds in another's care. 'Deposited' is concise and fits the financial setting,
    while 'entrusted' is possible but less explicit about the monetary transaction.
- source_word: ἀργυρίου
  chosen: silver
  alternatives:
  - money
  - silver money
  lexicon: BDAG
  rationale: The Greek explicitly says 'silver'; retaining the metal preserves the
    ancient monetary idiom without over-interpreting it as generic 'money'.
- source_word: τάλαντα δέκα
  chosen: ten talents
  alternatives:
  - ten talent-weights
  lexicon: BDAG
  rationale: τάλαντον is the standard large unit of weight/value. 'Ten talents' is
    the conventional and accurate rendering; converting into modern currency would
    be interpretive.
- source_word: Γαβηλῷ
  chosen: Gabael
  alternatives:
  - Gabēl
  rationale: Personal names are transliterated by standard conventions. 'Gabael' is
    a natural English transliteration of the Greek form.
- source_word: τῷ ἀδελφῷ Γαβρίᾳ
  chosen: the brother of Gabri
  alternatives:
  - Gabri's brother
  lexicon: BDAG
  rationale: ἀδελφός here is the ordinary kinship term 'brother.' The genitive Γαβρίᾳ
    identifies whose brother Gabael is. The more literal order is retained while remaining
    readable.
- source_word: ἐν Ῥάγοις τῆς Μηδείας
  chosen: in Rages of Media
  alternatives:
  - at Rages in Media
  - in Rhages of Media
  rationale: Ῥάγοις is a place name commonly rendered 'Rages' or 'Rhages.' 'Rages
    of Media' closely follows the Greek construction and clearly identifies the city
    within the region of Media.
