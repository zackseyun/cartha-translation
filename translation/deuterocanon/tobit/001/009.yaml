id: TOB.1.9
reference: Tobit 1:9
source:
  edition: lxx-swete-1909
  text: καὶ ὅτε ἐγενόμην ἀνήρ, ἔλαβον Ἄνναν γυναῖκα ἐκ τοῦ σπέρματος τῆς πατριᾶς ἡμῶν,
    καὶ ἐγέννησα ἐξ αὐτῆς Τωβίαν.
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: וכאשר בקש סנחריב מלך אשור את חללי עמי פגרי האנשים המומתים ולא מצאם וילכו
      אנשי ננוה ויגידו למלך לאמר טובי עבדך אשר הפקדת על כל אשר לו הוא שולח את אנשיו
      על כל חוצות נינוה לבקש את חללי עמו והוא קובר אותם בסתר ולא ירא ממך.
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
      from an Aramaic Munich MS. The actual ancient evidence is Qumran 4Q196-200 (Aramaic),
      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 1:9
translation:
  text: And when I became a man, I took Anna as my wife from the seed of our ancestral
    family, and by her I fathered Tobiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'from the lineage of our father's family.' The Greek
      literally says 'from the seed of our father's family,' emphasizing descent within
      the paternal line.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'Tobias' here; the Greek name is rendered
      more directly as 'Tobiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγενόμην ἀνήρ
  chosen: I became a man
  alternatives:
  - I came of age
  - I became an adult
  lexicon: BDAG
  rationale: The phrase is idiomatic for reaching manhood/adulthood. 'Became a man'
    preserves the gendered wording of the Greek and matches the source's life-stage
    sense better than a flatter 'grew up.'
- source_word: ἔλαβον ... γυναῖκα
  chosen: I took Anna as my wife
  alternatives:
  - I married Anna
  - I took Anna for a wife
  lexicon: BDAG
  rationale: The Greek literally says 'I took Anna, a wife.' 'Took ... as my wife'
    preserves the marital idiom without sounding archaic; 'married' is possible but
    slightly less transparent to the source wording.
- source_word: ἐκ τοῦ σπέρματος
  chosen: from the seed of
  alternatives:
  - from the offspring of
  - from the lineage of
  - from the family line of
  lexicon: BDAG
  rationale: σπέρμα literally means 'seed' and commonly extends to descendants/lineage.
    Here 'from the seed of our father's family' preserves the kinship idiom and its
    Semitic flavor. A smoother rendering like 'from the lineage of' is possible, but
    the more literal choice remains understandable in context.
- source_word: τῆς πατριᾶς ἡμῶν
  chosen: our father's family
  alternatives:
  - our ancestral clan
  - our family line
  - our kindred
  lexicon: BDAG
  rationale: πατριά refers to a family group or clan traced through the father. 'Our
    father's family' communicates the patrilineal sense clearly in modern English
    without importing a more technical term like 'clan.'
- source_word: ἐγέννησα ἐξ αὐτῆς
  chosen: by her I fathered
  alternatives:
  - I begot by her
  - I had through her
  - she bore to me
  lexicon: BDAG
  rationale: The subject is male, so 'fathered' accurately reflects the speaker's
    role and avoids the archaic 'begot.' 'By her' renders ἐξ αὐτῆς naturally while
    preserving the explicit maternal reference.
- source_word: Τωβίαν
  chosen: Tobiah
  alternatives:
  - Tobias
  lexicon: LSJ
  rationale: A direct transliteration from the Greek form favors 'Tobiah' in this
    project's naming conventions, while 'Tobias' reflects later traditional English/Latin
    usage.
