theological_decisions:
- issue: Gendered life-stage language
  chosen_reading: became a man
  alternative_readings:
  - came of age
  - became an adult
  rationale: Following the project's gender-accurate policy, the masculine noun ἀνήρ
    is retained as 'man' rather than neutralized, since the text speaks of male adulthood
    in a biographical context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Kinship idiom and endogamy emphasis
  chosen_reading: from the seed of our father's family
  alternative_readings:
  - from our ancestral line
  - from our kin group
  rationale: The verse emphasizes marriage within the paternal family line. The translation
    preserves that emphasis without expanding it into a doctrinal or legal claim beyond
    the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
