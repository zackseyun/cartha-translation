theological_decisions:
- issue: Anthropological force of ψυχή
  chosen_reading: soul
  alternative_readings:
  - being
  - life
  - self
  rationale: The phrase is devotional and idiomatic, but ψυχή carries real anthropological
    weight in biblical diction. Rendering it 'soul' preserves that weight without
    forcing a technical doctrine beyond the text.
  doctrine_reference: Translation philosophy §1, §6
