id: TOB.1.15
reference: Tobit 1:15
source:
  edition: lxx-swete-1909
  text: Καὶ ὅτε ἀπέθανεν Ἐνεμεσσάρ, ἐβασίλευσεν Ἀχρειλ ὁ υἱὸς αὐτοῦ ἀντʼ αὐτοῦ, καὶ
    αἱ ὁδοὶ αὐτοῦ ἠκαταστάτησαν καὶ οὐκέτι ἠδυνάσθην πορευθῆναι εἰς τὴν Μηδείαν.
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: major_mismatch
translation:
  text: And when Enemessar died, Achreil his son became king in his place, and his
    roads became unsafe, and I was no longer able to go into Media.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek verb rendered ''became unsafe'' is difficult and appears in an
      unusual form; the sense is inferred from the travel context: the routes were
      in disorder or insecure, so Tobit could no longer travel to Media.'
    reason: lexical_alternative
  - marker: b
    text: The royal names appear here as Enemessar and Achreil in the Greek witness
      used for this translation; other textual traditions of Tobit preserve different
      spellings and, in some cases, different names.
    reason: textual_variant
lexical_decisions:
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - passed away
  lexicon: BDAG
  rationale: Standard narrative verb for death; 'died' is the plain, unembellished
    English equivalent.
- source_word: ἐβασίλευσεν
  chosen: became king
  alternatives:
  - reigned
  - ruled as king
  lexicon: BDAG
  rationale: The aorist here marks accession following the predecessor's death. 'Became
    king' makes the succession event explicit in natural English better than the more
    durative 'reigned'.
- source_word: ἀντʼ αὐτοῦ
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: BDAG
  rationale: Idiomatic succession formula; 'in his place' communicates replacement
    clearly in English.
- source_word: αἱ ὁδοὶ αὐτοῦ
  chosen: his roads
  alternatives:
  - the roads of his realm
  - the routes under him
  - his ways
  lexicon: LSJ
  rationale: ὁδοί can mean literal roads/routes or figurative ways. In context of
    travel to Media, the literal sense is required. The genitive/pronominal relation
    likely refers to the roads under the new king's control.
- source_word: ἠκαταστάτησαν
  chosen: became unsafe
  alternatives:
  - became unsettled
  - were thrown into disorder
  - became impassable
  lexicon: LSJ
  rationale: The verb is textually and lexically difficult in this form, but in context
    it indicates disorder affecting travel. 'Became unsafe' captures the practical
    result without overstating that the roads were physically blocked.
- source_word: οὐκέτι ἠδυνάσθην
  chosen: I was no longer able
  alternatives:
  - I could no longer
  - I was unable any longer
  lexicon: BDAG
  rationale: Straightforward rendering of inability with temporal cessation.
- source_word: πορευθῆναι εἰς τὴν Μηδείαν
  chosen: to go into Media
  alternatives:
  - to travel to Media
  - to make my way to Media
  lexicon: BDAG
  rationale: Retains the travel sense of πορεύομαι and the directional force of εἰς.
    'Into Media' is slightly more formal but still natural.
