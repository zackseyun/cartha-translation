id: TOB.1.20
reference: Tobit 1:20
source:
  edition: lxx-swete-1909
  text: καὶ διηρπάγη πάντα τὰ ὑπάρχοντά μου, καὶ οὐ κατελείφθη μοι οὐδὲν πλὴν Ἄννας
    τῆς γυναικός μου καὶ Τωβεὶτ τοῦ υἱοῦ μου.
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: major_mismatch
translation:
  text: And all my possessions were plundered, and nothing was left to me except Anna
    my wife and Tobit my son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''nothing was left to me except Anna my wife and Tobit my son.''
      The verse speaks of what remained to Tobit after his goods were taken; it does
      not imply that his wife and son were possessions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διηρπάγη
  chosen: were plundered
  alternatives:
  - were seized
  - were carried off
  - were looted
  lexicon: BDAG
  rationale: The passive verb conveys violent seizure by others. 'Were plundered'
    preserves the sense of goods being taken as spoil better than the flatter 'were
    seized' and is natural English for property stripped away.
- source_word: τὰ ὑπάρχοντά
  chosen: possessions
  alternatives:
  - property
  - belongings
  - goods
  lexicon: BDAG
  rationale: The phrase refers to one's material holdings. 'Possessions' is broad
    and idiomatic, fitting the total loss described by πάντα.
- source_word: οὐ κατελείφθη μοι οὐδέν
  chosen: nothing was left to me
  alternatives:
  - nothing remained for me
  - not anything was left for me
  lexicon: BDAG
  rationale: This renders the impersonal passive naturally while preserving the emphatic
    totality of οὐδέν.
- source_word: πλὴν
  chosen: except
  alternatives:
  - besides
  - other than
  lexicon: BDAG
  rationale: '''Except'' cleanly marks the sole survivors of the loss in context.'
- source_word: Ἄννας
  chosen: Anna
  alternatives:
  - Hannah
  lexicon: Greek proper name tradition
  rationale: The Greek form is Ἄννα. Following the project's policy to transliterate
    names, 'Anna' is preferred over assimilating to the Hebrew form 'Hannah'.
- source_word: Τωβεὶτ
  chosen: Tobit
  alternatives:
  - Tobias
  - Tobit/Tobias
  lexicon: Greek proper name tradition
  rationale: The Greek name here is Τωβεὶτ, matching the book's standard English name
    'Tobit.' 'Tobias' reflects a different traditional form and is less directly tied
    to this Greek spelling.
