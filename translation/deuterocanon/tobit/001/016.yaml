id: TOB.1.16
reference: Tobit 1:16
source:
  edition: lxx-swete-1909
  text: καὶ ἐν ταῖς ἡμέραις Ἐνεμεσσάρου ἐλεημοσύνας πολλὰς ἐποίουν τοῖς ἀδελφοῖς μου·
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: major_mismatch
translation:
  text: And in the days of Enemessar I did many acts of mercy for my brothers;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'alms' or 'charitable deeds'; the Greek term often refers to concrete
      acts of mercy, especially giving to the needy.
    reason: lexical_alternative
  - marker: b
    text: '''My brothers'' may refer broadly to Tobit''s fellow Israelites or kinsmen,
      not only to biological brothers.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ταῖς ἡμέραις
  chosen: in the days of
  alternatives:
  - during the reign of
  - in the time of
  lexicon: LSJ
  rationale: A standard temporal idiom. 'In the days of' preserves the Greek form
    while remaining natural English.
- source_word: Ἐνεμεσσάρου
  chosen: Enemessar
  alternatives:
  - Enemessaros
  rationale: Personal names are transliterated rather than translated. 'Enemessar'
    gives a standard English transliteration from the genitive Greek form.
- source_word: ἐλεημοσύνας
  chosen: acts of mercy
  alternatives:
  - alms
  - charitable deeds
  - mercies
  lexicon: LSJ
  rationale: The noun often refers to almsgiving or deeds of mercy. 'Acts of mercy'
    preserves the plural and the broader charitable sense without narrowing it too
    quickly to money alone; 'alms' is possible but more specific and somewhat traditionalized.
- source_word: πολλὰς
  chosen: many
  alternatives:
  - much
  - numerous
  lexicon: LSJ
  rationale: Agrees with the plural noun ἐλεημοσύνας and is straightforwardly rendered
    'many.'
- source_word: ἐποίουν
  chosen: I did
  alternatives:
  - I performed
  - I practiced
  lexicon: LSJ
  rationale: Imperfect aspect here is naturally represented in English by simple past
    in this context. 'I did' is idiomatic with 'acts of mercy' and avoids overtranslation.
- source_word: τοῖς ἀδελφοῖς μου
  chosen: for my brothers
  alternatives:
  - to my brothers
  - for my kinsmen
  - for my brethren
  lexicon: LSJ
  rationale: ἀδελφοί can mean literal brothers or fellow Israelites/kinsmen. In Tobit's
    ethnic and familial context, 'brothers' preserves the source wording and its covenantal
    solidarity. 'For' fits the benefactive sense with acts of mercy.
