translation:
  text: And I would give them to the priests, the sons of Aaron, for the altar, from
    the produce; I would give the tenth to the sons of Levi who minister in Jerusalem,
    and I would sell the second tenth and go and spend it in Jerusalem each year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the tithe' and 'the second tithe.' The Greek reads
      literally 'the tenth' and 'the second tenth.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'I would sell' can also be understood as converting the
      second tenth into money before going to Jerusalem to spend it there.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐδίδουν
  chosen: I would give
  alternatives:
  - I gave
  - I used to give
  lexicon: BDAG
  rationale: The imperfect indicates customary repeated action in past time. 'I would
    give' preserves the habitual sense in natural English.
- source_word: αὐτὰς
  chosen: them
  alternatives:
  - these things
  lexicon: BDAG
  rationale: The feminine plural pronoun refers back to the tithes/offerings implied
    by the context. 'Them' is idiomatic while still anchored to the Greek.
- source_word: τοῖς ἱερεῦσιν τοῖς υἱοῖς Ἀαρών
  chosen: to the priests, the sons of Aaron
  alternatives:
  - to the Aaronic priests
  lexicon: BDAG
  rationale: The appositional phrase is kept explicit rather than compressed, preserving
    the priestly lineage named in the Greek.
- source_word: πρὸς τὸ θυσιαστήριον τῶν γενημάτων
  chosen: for the altar from the produce
  alternatives:
  - for the altar, from the produce
  - for the altar offerings from the crops
  lexicon: BDAG
  rationale: The phrase is somewhat compressed in Greek. 'For the altar from the produce'
    preserves the relation of the gifts to altar use and their source in agricultural
    yield without over-paraphrasing.
- source_word: τὴν δεκάτην
  chosen: the tenth
  alternatives:
  - the tithe
  lexicon: BDAG
  rationale: Literally 'the tenth.' English readers may hear 'tithe,' but 'the tenth'
    stays closer to the Greek while remaining understandable in context.
- source_word: τοῖς υἱοῖς Λευεί
  chosen: to the sons of Levi
  alternatives:
  - to the Levites
  lexicon: BDAG
  rationale: The Greek explicitly says 'sons of Levi.' This is preserved formally,
    though it denotes the Levites.
- source_word: τοῖς θεραπεύουσιν εἰς Ἱερουσαλήμ
  chosen: who minister in Jerusalem
  alternatives:
  - who serve in Jerusalem
  lexicon: BDAG
  rationale: θεραπεύω in cultic context means to render service/minister. 'Minister'
    fits the temple-service setting.
- source_word: τὴν δευτέραν δεκάτην
  chosen: the second tenth
  alternatives:
  - the second tithe
  lexicon: BDAG
  rationale: Again, the Greek is literally 'the second tenth.' This likely refers
    to the second tithe known from Torah practice, but the translation keeps the literal
    wording.
- source_word: ἀπεπρατιζόμην
  chosen: I would sell
  alternatives:
  - I would convert into money
  - I sold
  lexicon: LSJ
  rationale: The verb denotes selling or disposing by sale. Given the following 'go
    and spend it in Jerusalem,' 'I would sell' best reflects the sequence without
    importing too much explanatory detail.
- source_word: ἐδαπάνων αὐτὰ
  chosen: spend it
  alternatives:
  - spend them
  - use it up
  lexicon: BDAG
  rationale: Although the Greek has plural 'them,' English naturally treats the proceeds
    of sale as a singular mass ('it'). This reflects the sense after conversion by
    sale.
- source_word: καθʼ ἕκαστον ἐνιαυτόν
  chosen: each year
  alternatives:
  - every year
  lexicon: BDAG
  rationale: A straightforward rendering of the distributive phrase; 'each year' is
    concise and natural.
