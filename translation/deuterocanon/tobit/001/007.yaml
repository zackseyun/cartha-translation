theological_decisions:
- issue: Rendering of cultic/torah terminology around multiple tithes
  chosen_reading: Retain the literal expressions 'the tenth' and 'the second tenth'
    in the main text.
  alternative_readings:
  - '''the tithe'' and ''the second tithe'''
  rationale: The verse describes distinct customary offerings tied to Jerusalem worship.
    Using the literal wording preserves the Greek form and avoids over-explaining
    in the main text, while the tithe terminology can be preserved in a footnote for
    readers.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; consistency of key terms,
    or documented exception.'
- issue: Interpretation of ἀπεπρατιζόμην with the second tenth
  chosen_reading: Translate as 'I would sell the second tenth.'
  alternative_readings:
  - '''I would exchange the second tenth for money'''
  - '''I would dispose of the second tenth'''
  rationale: The immediate context of going to Jerusalem and spending the proceeds
    supports a sale/conversion into spendable value. 'Sell' is the clearest English
    rendering without importing a full explanatory paraphrase.
  doctrine_reference: 'DOCTRINE.md: original-language primacy over translation tradition;
    never paraphrase beyond what the source warrants.'
