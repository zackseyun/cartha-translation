id: TOB.1.7
reference: Tobit 1:7
source:
  edition: lxx-swete-1909
  text: καὶ ἐδίδουν αὐτὰς τοῖς ἱερεῦσιν τοῖς υἱοῖς Ἀαρὼν πρὸς τὸ θυσιαστήριον τῶν
    γενημάτων· τὴν δεκάτην ἐδίδουν τοῖς υἱοῖς Λευεὶ τοῖς θεραπεύουσιν εἰς Ἱερουσαλήμ,
    καὶ τὴν δευτέραν δεκάτην ἀπεπρατιζόμην, καὶ ἐπορευόμην καὶ ἐδαπάνων αὐτὰ ἐν Ἱεροσολύμοις
    καθʼ ἕκαστον ἐνιαυτόν·
  language: Greek
  pages:
  - 832
  - 833
  - 834
  - 835
  - 836
  confidence: high
  validation: minor_mismatch
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: ובמקום שיתאבלו ושיתענו לפני יי' על גזירת אחיהם ואשר קצף עליהם היו אוכלים
      ושותים ושמחים מתענגים בכלי שיר ובכנורות ובנבלים ולא נחלו על שבר יהודה בעונותינו
      ובעונות אבותינו ככתוב על יהודה "השותים במזרקי יין וראשי‏ שמנים ימשחו ולא נחלו
      על שבר יוסף" (עמוס ו, ו) וגם על זאת היה קצף מאת יי על יהודה וירושלם ויבא עליהם
      את מלך בבל עד השליכם מעל פניו ויגל את יהודה מעל אדמתו.
