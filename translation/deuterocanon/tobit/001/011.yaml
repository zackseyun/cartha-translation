translation:
  text: But I kept myself from eating,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'I guarded my soul not to eat.' Here 'my soul' functions
      idiomatically for 'myself.'
    reason: lexical_alternative
  - marker: b
    text: The surviving Greek here is brief and appears to continue into the next
      clause; the sense is Tobit's deliberate refusal to eat.
    reason: textual_variant
lexical_decisions:
- source_word: ἐγὼ δὲ
  chosen: But I
  alternatives:
  - And I
  - Now I
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the surrounding narrative;
    'But I' preserves Tobit's personal contrast with others' behavior.
- source_word: συνετήρησα
  chosen: kept watch over
  alternatives:
  - guarded
  - kept
  - preserved
  lexicon: LSJ
  rationale: The compound verb conveys careful guarding or keeping under watch. With
    τὴν ψυχήν μου and the infinitive that follows, it idiomatically expresses self-restraint.
    'Kept watch over' preserves the reflexive, morally vigilant sense better than
    the flatter 'kept' or the more interpretive 'restrained.'
- source_word: τὴν ψυχήν μου
  chosen: myself
  alternatives:
  - my soul
  - my life
  lexicon: BDAG
  rationale: Although literally 'my soul,' ψυχή in this idiom functions reflexively,
    referring to Tobit himself rather than making a technical anthropological statement.
    'Myself' gives natural English while remaining faithful to the sense.
- source_word: μὴ φαγεῖν
  chosen: so as not to eat
  alternatives:
  - not to eat
  - from eating
  lexicon: BDAG
  rationale: The negative infinitive expresses purpose/result after the guarding verb.
    'So as not to eat' makes the intended self-restraint explicit in idiomatic English.
