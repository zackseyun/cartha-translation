theological_decisions:
- issue: Anthropological force of ψυχή in τὴν ψυχήν μου
  chosen_reading: Idiomatic reflexive ('myself'), not a distinct doctrinal statement
    about the soul
  alternative_readings:
  - literal 'my soul'
  rationale: In this context the phrase describes moral self-guarding regarding food,
    not a developed teaching on body-soul distinction. Rendering it idiomatically
    avoids importing theological claims the text does not make while preserving the
    underlying sense.
  doctrine_reference: Translation philosophy §§1, 3, 6
