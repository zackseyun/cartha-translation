theological_decisions:
- issue: Nature of Tobit's obedience to pilgrimage law
  chosen_reading: The verse presents Tobit as personally observing Israel's festival
    and offering obligations centered on Jerusalem.
  alternative_readings:
  - The verse could be read more loosely as general piety rather than specific legal
    observance.
  rationale: The explicit appeal to what is 'written for all Israel in an everlasting
    ordinance' and the list of offerings indicate concrete Torah observance, not merely
    generic devotion.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of αἰώνιος in legal formula
  chosen_reading: everlasting
  alternative_readings:
  - perpetual
  - permanent
  rationale: In covenantal/legal contexts αἰώνιος often denotes enduring ordinance
    language. 'Everlasting' preserves the biblical register without making a philosophical
    claim beyond the text.
  doctrine_reference: Translation philosophy §§1, 6
