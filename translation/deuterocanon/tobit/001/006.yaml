translation:
  text: But I alone would often go to Jerusalem for the feasts, as it is written for
    all Israel in an everlasting ordinance, bringing the firstfruits and the tithes
    of the produce and the first shearings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Jerusalem'; the Greek uses 'in Jerusalem' with a verb of travel,
      but English normally says 'go to Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: The rare Greek term rendered 'first shearings' likely refers to the first
      portion from shearing livestock; some take it more generally as first pastoral
      dues.
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνος
  chosen: I alone
  alternatives:
  - I by myself
  - I only
  lexicon: BDAG
  rationale: μόνος emphasizes Tobit's singular faithfulness in contrast to others
    from his tribe; 'I alone' is the most natural emphatic English rendering.
- source_word: ἐπορευόμην πλεονάκις
  chosen: would often go
  alternatives:
  - went frequently
  - traveled often
  lexicon: BDAG
  rationale: The imperfect with πλεονάκις conveys customary repeated action in past
    time. 'Would often go' captures that habitual sense idiomatically.
- source_word: ἐν Ἱεροσολύμοις
  chosen: to Jerusalem
  alternatives:
  - in Jerusalem
  - at Jerusalem
  lexicon: BDAG
  rationale: 'Although the Greek uses ἐν with the plural place-name form, in context
    with a verb of movement English normally expresses destination: Tobit traveled
    to Jerusalem for the festivals.'
- source_word: ταῖς ἑορταῖς
  chosen: for the feasts
  alternatives:
  - at the festivals
  - for the festivals
  lexicon: BDAG
  rationale: ἑορταί refers to Israel's pilgrimage festivals. 'Feasts' is concise and
    traditional without being archaic.
- source_word: καθὼς γέγραπται
  chosen: as it is written
  alternatives:
  - just as it has been written
  lexicon: BDAG
  rationale: Standard formula introducing scriptural/legal warrant; present English
    idiom preserves the force of the perfect passive.
- source_word: ἐν προστάγματι αἰωνίῳ
  chosen: in an everlasting ordinance
  alternatives:
  - in a perpetual decree
  - by an eternal command
  lexicon: BDAG
  rationale: πρόσταγμα denotes an authoritative command or ordinance; αἰώνιος here
    refers to enduring covenantal validity within the legal formula. 'Everlasting
    ordinance' fits biblical legal style.
- source_word: ἀπαρχάς
  chosen: the firstfruits
  alternatives:
  - first offerings
  lexicon: BDAG
  rationale: Established cultic term for the first yield offered to God; 'firstfruits'
    is the precise English equivalent.
- source_word: δεκάτας
  chosen: the tithes
  alternatives:
  - tenths
  lexicon: BDAG
  rationale: δεκάται is the standard term for tenth-part offerings; 'tithes' is the
    natural and accurate rendering.
- source_word: γενημάτων
  chosen: of the produce
  alternatives:
  - of the crops
  - of what was produced
  lexicon: BDAG
  rationale: γενήματα refers broadly to agricultural produce/yield. 'Produce' is broad
    enough to cover the term without over-specifying grain alone.
- source_word: προκουρίας
  chosen: the first shearings
  alternatives:
  - the first wool
  - the first cuttings
  lexicon: LSJ
  rationale: The rare term in this cultic list most likely refers to first portions
    from shearing, matching the sequence of agricultural and pastoral offerings. 'First
    shearings' preserves the likely sense while acknowledging the term's rarity.
- source_word: ἔχων
  chosen: bringing
  alternatives:
  - having with me
  - carrying
  lexicon: BDAG
  rationale: The participle indicates that Tobit went to Jerusalem with these offerings
    in hand. 'Bringing' expresses the participle's practical force in smooth English.
