id: TOB.1.6
reference: Tobit 1:6
source:
  edition: lxx-swete-1909
  text: κἀγὼ δὲ μόνος ἐπορευόμην πλεονάκις ἐν ἐν Ἱεροσολύμοις ταῖς ἑορταῖς, καθὼς
    γέγραπται παντὶ τῷ Ἰσραὴλ ἐν προστάγματι αἰωνίῳ, τὰς ἀπαρχὰς καὶ τὰς δεκάτας τῶν
    γενημάτων καὶ τὰς προκουρίας ἔχων·
  language: Greek
