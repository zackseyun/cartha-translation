theological_decisions:
- issue: Anthropomorphic language for God in the final clause
  chosen_reading: the face of God
  alternative_readings:
  - the presence of God
  rationale: The Greek uses the same noun πρόσωπον for both the human and divine clauses.
    Retaining 'face' preserves the literary symmetry and theological force of reciprocal
    turning/withholding without over-interpreting the anthropomorphism.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Gendered reference in πτωχοῦ
  chosen_reading: any poor man
  alternative_readings:
  - any poor person
  rationale: The source is grammatically masculine singular and distributive. Following
    the project's gender-accurate policy, the translation reflects the source form
    rather than neutralizing it in the main text.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
