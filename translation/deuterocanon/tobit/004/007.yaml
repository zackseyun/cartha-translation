translation:
  text: From what you have, give alms, and do not let your eye be grudging when you
    give alms. Do not turn your face away from any poor man, and the face of God will
    not be turned away from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not let your eye envy' / 'do not be stingy' when giving; the Greek
      idiom speaks of a grudging or resentful attitude in almsgiving.
    reason: lexical_alternative
  - marker: b
    text: Or 'from any poor person.' The Greek has masculine singular with generic
      force.
    reason: lexical_alternative
  - marker: c
    text: Or 'the presence of God,' though the Greek literally says 'the face of God'
      and echoes the previous clause's 'your face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τῶν ὑπαρχόντων σοι
  chosen: From what you have
  alternatives:
  - From your possessions
  - Out of your means
  lexicon: BDAG
  rationale: The phrase refers broadly to one's available possessions or means. 'From
    what you have' is natural modern English and preserves the sense of giving out
    of one's actual resources without sounding overly technical.
- source_word: ποίει ἐλεημοσύνην
  chosen: give alms
  alternatives:
  - do charity
  - show mercy
  lexicon: BDAG
  rationale: ἐλεημοσύνη in this context denotes concrete charitable giving to the
    needy, not merely inward mercy. 'Give alms' best captures the specific act, and
    repeating it preserves the Greek's lexical consistency.
- source_word: μὴ φθονεσάτω σου ὁ ὀφθαλμός
  chosen: do not let your eye be grudging
  alternatives:
  - do not let your eye envy
  - do not be stingy
  - do not let your eye begrudge it
  lexicon: BDAG
  rationale: The idiom speaks of a resentful or stingy disposition in giving. 'Your
    eye be grudging' keeps the bodily idiom present while remaining understandable
    in English; a purely dynamic rendering like 'be stingy' would flatten the imagery.
- source_word: ἐν τῷ ποιεῖν σε ἐλεημοσύνην
  chosen: when you give alms
  alternatives:
  - in your doing almsgiving
  - as you give to the poor
  lexicon: BDAG
  rationale: This infinitival construction is temporal here. 'When you give alms'
    is idiomatic and accurately conveys the sense.
- source_word: μὴ ἀποστρέψῃς τὸ πρόσωπόν σου
  chosen: Do not turn your face away
  alternatives:
  - Do not turn away
  - Do not avert your face
  lexicon: BDAG
  rationale: The Greek explicitly mentions the face, and the following clause repeats
    'the face of God.' Preserving 'face' maintains the rhetorical parallel and reciprocity
    in the verse.
- source_word: ἀπὸ παντὸς πτωχοῦ
  chosen: from any poor man
  alternatives:
  - from any poor person
  - from any poor one
  lexicon: BDAG
  rationale: The Greek adjective is masculine singular with distributive force. Per
    the project's gender-accurate policy, 'poor man' reflects the source form; the
    sense is generic/distributive rather than restricted to one individual.
- source_word: οὐ μὴ ἀποστραφῇ
  chosen: will not be turned away
  alternatives:
  - will certainly not turn away
  - will never be turned away
  lexicon: BDAG
  rationale: The οὐ μή construction intensifies the negation. 'Will not be turned
    away' gives the sense clearly in natural English; the future passive also matches
    the Greek form and the parallel with the previous command.
- source_word: τὸ πρόσωπον τοῦ θεοῦ
  chosen: the face of God
  alternatives:
  - God's face
  - the presence of God
  lexicon: BDAG
  rationale: The literal phrase should be retained because it mirrors 'your face'
    in the previous clause. Rendering it as 'presence' would be interpretive and would
    weaken the deliberate parallelism.
