id: TOB.4.19
reference: Tobit 4:19
source:
  edition: lxx-swete-1909
  text: καὶ ἐν παντὶ καιρῷ εὐλόγει Κύριον τὸν Θεόν, καὶ παρʼ αὐτοῦ αἴτησον ὅπως αἱ
    ὁδοί σου εὐθεῖαι γένωνται καὶ πᾶσαι αἱ τρίβοι καὶ βουλαὶ εὐοδωθῶσιν. διότι πᾶν
    ἔθνος οὐκ ἔχει βουλήν, ἀλλὰ αὐτὸς ὁ κύριος δίδωσιν πάντα τὰ ἀγαθὰ καὶ ὃ ἐὰν θέλῃ
    ταπεινοῖ, καθὼς βούλεται. καὶ νῦν, παιδίον, μνημόνευε τῶν ἐντολῶν μου, καὶ μὴ
    ἐξαλειφθήτωσαν ἐκ τῆς καρδίας σου.
  language: Greek
  pages:
