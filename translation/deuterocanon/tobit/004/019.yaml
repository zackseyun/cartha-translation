theological_decisions:
- issue: Rendering κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project default for κύριος is 'Lord.' Here it refers to God and fits
    both the Greek and the doctrinal guidance.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Divine sovereignty statement in πᾶν ἔθνος οὐκ ἔχει βουλήν ... ὃ ἐὰν θέλῃ
    ταπεινοῖ
  chosen_reading: Preserve the strong claim that human nations lack ultimate counsel
    in contrast to the Lord's sovereign giving and humbling.
  alternative_readings:
  - Soften to 'no nation has understanding' or 'human counsel is unreliable'
  rationale: The Greek presents a stark contrast and should not be diluted to avoid
    theological discomfort. The translation keeps the tension of divine sovereignty
    without adding explanatory doctrine.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
