theological_decisions:
- issue: Rendering of ἐλεημοσύνη
  chosen_reading: almsgiving
  alternative_readings:
  - charity
  - acts of mercy
  rationale: The term in this Jewish wisdom context refers concretely to giving to
    the poor, not merely an abstract disposition of mercy. 'Almsgiving' preserves
    that specificity and avoids flattening the ethical instruction.
  doctrine_reference: Translation philosophy §1, §5
- issue: Idiomatic force of μὴ φθονεσάτω σου ὁ ὀφθαλμός
  chosen_reading: preserve the eye-idiom in the main text
  alternative_readings:
  - render only the sense as 'do not begrudge it'
  rationale: The verse uses a vivid Semitic/Greek moral idiom about the 'eye' in giving.
    Preserving the image maintains the text's rhetorical texture while still being
    understandable in English; a more idiomatic alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §6
