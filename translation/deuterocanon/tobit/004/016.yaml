translation:
  text: Give from your bread to the hungry, and from your garments to the naked. Whatever
    may be left over for you, make into almsgiving, and do not let your eye be begrudging
    when you give alms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'Whatever you have in abundance, give as alms.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'do not let your eye be envious'; that is, do not begrudge giving
      alms.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τοῦ ἄρτου σου δίδου
  chosen: Give from your bread
  alternatives:
  - Give of your bread
  - Share your food
  lexicon: BDAG
  rationale: ἄρτος literally means 'bread,' but can extend to food generally. Here
    'bread' is retained for formal closeness and because the idiom is readily understandable
    in English; 'from' reflects ἐκ.
- source_word: πεινῶντι
  chosen: to the hungry
  alternatives:
  - to one who is hungry
  - to a hungry person
  lexicon: BDAG
  rationale: The present participle functions substantivally for a needy class/person.
    'The hungry' is natural English and preserves the generic force.
- source_word: ἐκ τῶν ἱματίων σου
  chosen: from your clothing
  alternatives:
  - from your garments
  - of your clothes
  lexicon: BDAG
  rationale: ἱμάτια refers to garments/clothing. 'Clothing' is modern and accessible
    while preserving the sense of personal possessions shared with those in need.
- source_word: τοῖς γυμνοῖς
  chosen: to the naked
  alternatives:
  - to those without clothing
  - to the poorly clothed
  lexicon: BDAG
  rationale: γυμνός can mean naked or insufficiently clothed. 'The naked' preserves
    the traditional and direct force of the Greek without over-interpreting the degree
    of destitution.
- source_word: πᾶν ὃ ἐὰν περισσεύσῃ σοι
  chosen: Whatever may abound to you
  alternatives:
  - Whatever is left over for you
  - Whatever you have in abundance
  lexicon: BDAG
  rationale: περισσεύω denotes abundance or surplus. The phrase refers to what one
    has beyond immediate need. The chosen rendering stays close to the Greek structure,
    though the alternatives are smoother idiomatically.
- source_word: ποίει ἐλεημοσύνην
  chosen: do as almsgiving
  alternatives:
  - give alms
  - show mercy with it
  lexicon: BDAG
  rationale: ἐλεημοσύνη is specifically charitable giving/almsgiving. Because the
    Greek uses ποιέω + ἐλεημοσύνη, the rendering preserves the verbal construction
    rather than collapsing it entirely to 'give alms,' though that is a viable smoother
    alternative.
- source_word: μὴ φθονεσάτω σου ὁ ὀφθαλμός
  chosen: do not let your eye be envious
  alternatives:
  - do not begrudge it
  - do not let your eye be grudging
  - do not be stingy
  lexicon: BDAG
  rationale: The idiom literally speaks of the eye envying or begrudging. The chosen
    rendering preserves the imagery of the Greek; English alternatives express the
    sense more idiomatically but lose the metaphor.
- source_word: ἐν τῷ ποιεῖν σε ἐλεημοσύνην
  chosen: when you do almsgiving
  alternatives:
  - when you give alms
  - in your doing acts of charity
  lexicon: BDAG
  rationale: 'The articular infinitive with ἐν is temporal: ''when/in doing.'' ''Almsgiving''
    preserves the specific charitable sense of ἐλεημοσύνη and matches the repeated
    noun in the verse.'
