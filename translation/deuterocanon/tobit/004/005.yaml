translation:
  text: All the days, child, remember the Lord our God. Do not desire to transgress
    his commandments. Practice righteousness all the days of your life, and do not
    walk in the ways of unrighteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Practice justice ... do not walk in the ways of injustice.' The Greek
      terms can carry both personal-moral and social-ethical force.
    reason: lexical_alternative
lexical_decisions:
- source_word: μνημόνευε
  chosen: remember
  alternatives:
  - keep in mind
  - be mindful of
  lexicon: BDAG
  rationale: The present imperative calls for ongoing remembrance. 'Remember' is direct
    and idiomatic, preserving the covenantal and ethical force without paraphrase.
- source_word: παιδίον
  chosen: child
  alternatives:
  - my child
  - son
  lexicon: LSJ
  rationale: The Greek vocative means 'child' or 'little child.' 'Child' preserves
    the affectionate address without importing 'my,' which is not explicit in the
    Greek. 'Son' would over-specify gender beyond the Greek wording here, even though
    the speaker addresses his son in context.
- source_word: Κυρίου τοῦ θεοῦ ἡμῶν
  chosen: the Lord our God
  alternatives:
  - our Lord God
  - the Lord God of us
  lexicon: LSJ
  rationale: This is the natural English rendering of the genitive phrase and aligns
    with the project's default rendering of κύριος as 'Lord.' It preserves the reverential
    title structure.
- source_word: μὴ θελήσῃς παραβῆναι
  chosen: Do not desire to transgress
  alternatives:
  - Do not choose to transgress
  - Do not be willing to violate
  - Do not transgress
  lexicon: BDAG
  rationale: The Greek includes both volition (θελήσῃς) and the act (παραβῆναι). Rendering
    both as 'desire to transgress' preserves the warning against willing disobedience
    better than flattening it to simply 'do not transgress.'
- source_word: ἐντολάς
  chosen: commandments
  alternatives:
  - commands
  lexicon: BDAG
  rationale: '''Commandments'' fits the religious-ethical register and reflects established
    biblical usage without sounding archaic in this context.'
- source_word: δικαιοσύνην ποίει
  chosen: Practice righteousness
  alternatives:
  - Do righteousness
  - Act righteously
  - Practice justice
  lexicon: BDAG
  rationale: The idiom literally means 'do righteousness.' 'Practice righteousness'
    is natural English and preserves the habitual ethical sense. Because δικαιοσύνη
    can also shade toward 'justice,' that alternative is preserved in a footnote.
- source_word: πάσας τὰς ἡμέρας τῆς ζωῆς σου
  chosen: all the days of your life
  alternatives:
  - throughout your life
  - every day of your life
  lexicon: LSJ
  rationale: This phrase is idiomatically rendered in English as 'all the days of
    your life,' preserving the repetitive emphasis already introduced earlier in the
    verse.
- source_word: μὴ πορευθῇς
  chosen: do not walk
  alternatives:
  - do not go
  - do not follow
  lexicon: BDAG
  rationale: '''Walk'' preserves the common biblical metaphor of conduct and pairs
    naturally with ''ways'' in the following phrase.'
- source_word: ταῖς ὁδοῖς τῆς ἀδικίας
  chosen: in the ways of unrighteousness
  alternatives:
  - in the paths of injustice
  - in wicked ways
  - in the ways of wrongdoing
  lexicon: BDAG
  rationale: This keeps the metaphorical plural 'ways' and mirrors the δικαιοσύνη
    / ἀδικία contrast in the verse. 'Unrighteousness' best preserves that lexical
    opposition, though 'injustice' is a viable contextual alternative.
