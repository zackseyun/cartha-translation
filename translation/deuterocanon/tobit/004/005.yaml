theological_decisions:
- issue: Rendering the ethical pair δικαιοσύνη / ἀδικία
  chosen_reading: righteousness / unrighteousness
  alternative_readings:
  - justice / injustice
  rationale: The verse contrasts two moral paths in broad covenantal terms. Following
    the project's default for δικαιοσύνη, 'righteousness' best preserves the full
    ethical-religious scope, while 'justice' is preserved as a lexical alternative
    because the Greek can include social-ethical dimensions as well.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; justice
    preserved where relevant'
