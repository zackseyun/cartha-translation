translation:
  text: And he said within himself, “I have asked for death; why should I not call
    Tobiah my son, so that I may instruct him before I die?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The parallel Semitic tradition expands this thought: Tobit calls Tobiah
      in order to inform him about the money deposited with Gabael before he dies.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν ἐν ἑαυτῷ
  chosen: said within himself
  alternatives:
  - said to himself
  - thought
  lexicon: BDAG
  rationale: The phrase literally denotes speaking in oneself. 'Said within himself'
    preserves the inward deliberation more closely than the smoother 'thought,' while
    remaining natural English.
- source_word: ᾐτησάμην θάνατον
  chosen: have asked for death
  alternatives:
  - asked for death
  - sought death
  - prayed for death
  lexicon: BDAG
  rationale: The aorist refers back to Tobit's prior request for death. 'Have asked
    for death' captures the completed prior action with present relevance in English.
    'Prayed for death' is interpretive, since the verb itself is simply 'ask/request,'
    though the context is prayer.
- source_word: τί οὐ καλῶ
  chosen: why should I not call
  alternatives:
  - why do I not call
  - why not call
  lexicon: BDAG
  rationale: The idiom is deliberative/self-exhortative rather than a mere information
    question. 'Why should I not call' conveys the rhetorical force of deciding on
    a course of action.
- source_word: Τωβείαν τὸν υἱόν μου
  chosen: Tobiah my son
  alternatives:
  - Tobias my son
  lexicon: Greek proper name tradition
  rationale: Names are transliterated rather than translated. 'Tobiah' reflects a
    standard Semitic/English form and aligns well with the parallel Semitic tradition;
    'Tobias' is more Latinate and tradition-bound.
- source_word: ὑποδείξω
  chosen: instruct
  alternatives:
  - show
  - make known
  - give directions to
  lexicon: BDAG
  rationale: The verb can mean show, point out, or instruct. In context of a father
    summoning his son before death, the sense is giving guidance/instruction, not
    merely visually showing something. The Semitic parallel about informing him concerning
    the money supports a communicative, directive nuance.
- source_word: πρὶν ἀποθανεῖν με
  chosen: before I die
  alternatives:
  - before my dying
  - before I pass away
  lexicon: BDAG
  rationale: This is a straightforward temporal clause. 'Before I die' is the clearest
    modern English rendering without loss of meaning.
