theological_decisions:
- issue: Use of the parallel Semitic source in shaping the sense of ὑποδείξω
  chosen_reading: Render the clause generally as Tobit calling his son in order to
    instruct him before death, without importing the specific content about the deposited
    money into the main text.
  alternative_readings:
  - 'Translate more specifically: ''so that I may tell him about the money before
    I die'''
  rationale: The Greek primary witness states only that Tobit will 'show/instruct'
    his son. The parallel Hebrew back-translation reflects a fuller Semitic tradition
    mentioning the money, but the task requires the English to remain anchored in
    the Greek Zone 1 primary source. The parallel source legitimately informs the
    nuance of 'instruct,' yet its added content should be preserved, if at all, in
    a footnote rather than imported into the main line.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy for the chosen source
    text; use parallel sources as translation input without overruling the primary
    witness.'
