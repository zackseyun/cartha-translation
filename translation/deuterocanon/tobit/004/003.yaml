translation:
  text: And calling him, he said, “Child, if I die, bury me, and do not neglect your
    mother; honor her all the days of your life,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not overlook' or 'do not disregard your mother.' The parallel Semitic
      tradition has a stronger sense like 'do not abandon her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καλέσας
  chosen: calling
  alternatives:
  - having called
  - summoning
  lexicon: BDAG
  rationale: A participial form introducing Tobit's speech. 'Calling' keeps the narrative
    flow in natural English without overformal stiffness.
- source_word: Παιδίον
  chosen: Child
  alternatives:
  - My child
  - Son
  - Little child
  lexicon: BDAG
  rationale: The Greek vocative is affectionate and familial. 'Child' preserves the
    tenderness without importing explicit 'my' absent from the Greek. 'Son' is possible
    from context, but the Greek term itself is broader; the parallel Semitic witness
    addresses his son, supporting the familial sense without requiring a narrower
    gloss in the main text.
- source_word: ἐὰν ἀποθάνω
  chosen: if I die
  alternatives:
  - when I die
  - if I should die
  lexicon: BDAG
  rationale: The conditional particle with aorist subjunctive is formally 'if I die.'
    Although in context Tobit is giving deathbed-style instruction and 'when I die'
    is idiomatic in English, the Greek wording is conditional, so 'if I die' better
    preserves the source form.
- source_word: θάψον με
  chosen: bury me
  alternatives:
  - give me burial
  - inter me
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of the imperative; 'bury me' is the plain
    sense.
- source_word: μὴ ὑπερίδῃς
  chosen: do not neglect
  alternatives:
  - do not overlook
  - do not disregard
  - do not ignore
  lexicon: BDAG
  rationale: The verb conveys overlooking or disregarding someone. In this filial
    context, 'do not neglect' best captures the practical ethical force, and it aligns
    with the parallel Semitic witness's sense of not abandoning the mother.
- source_word: τίμα
  chosen: honor
  alternatives:
  - respect
  - show honor to
  lexicon: BDAG
  rationale: '''Honor'' is the standard ethical rendering and echoes biblical filial-duty
    language without sounding archaic.'
- source_word: πάσας τὰς ἡμέρας τῆς ζωῆς σου
  chosen: all the days of your life
  alternatives:
  - throughout your life
  - all your lifetime
  lexicon: BDAG
  rationale: A fairly literal rendering that remains natural in English and preserves
    the solemn, comprehensive scope of the command.
