translation:
  text: Guard yourself, child, from all sexual immorality, and first take a wife from
    the offspring of your fathers. Do not take a foreign woman who is not from the
    tribe of your father, because we are sons of the prophets. Remember, child, Noah,
    Abraham, Isaac, and Jacob, our fathers from of old, that they all took wives from
    among their brothers, and they were blessed in their children, and their offspring
    will inherit the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we are descendants of the prophets.' The Greek reads literally, 'sons
      of the prophets.'
    reason: alternative_reading
  - marker: b
    text: That is, from among their close kin or clan, not their literal brothers.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόσεχε σεαυτῷ
  chosen: Guard yourself
  alternatives:
  - Take heed to yourself
  - Watch yourself
  lexicon: LSJ
  rationale: The idiom calls for vigilant self-watch. 'Guard yourself' is natural
    modern English and preserves the reflexive force better than the more archaic
    'take heed to yourself.'
- source_word: παιδίον
  chosen: child
  alternatives:
  - my child
  - son
  lexicon: LSJ
  rationale: The term is an affectionate address to Tobit’s son. 'Child' preserves
    the familial tenderness without adding 'my,' which is not explicit here, and avoids
    over-specifying 'son' where the Greek uses the diminutive form rather than υἱός
    in this clause.
- source_word: πορνείας
  chosen: sexual immorality
  alternatives:
  - fornication
  - unchastity
  lexicon: BDAG
  rationale: In contemporary English, 'sexual immorality' best conveys the broad scope
    of πορνεία without archaic narrowing. It is a standard rendering that remains
    accessible and morally weighty.
- source_word: γυναῖκα πρῶτον λάβε
  chosen: first take a wife
  alternatives:
  - take a wife first
  - marry first
  lexicon: LSJ
  rationale: The Greek word order emphasizes priority. 'First take a wife' preserves
    that emphasis while keeping the marital sense of λαμβάνω γυναῖκα explicit.
- source_word: ἀπὸ τοῦ σπέρματος τῶν πατέρων σου
  chosen: from the offspring of your fathers
  alternatives:
  - from the seed of your fathers
  - from your ancestral line
  lexicon: LSJ
  rationale: σπέρμα here denotes lineage or descent. 'Offspring of your fathers' is
    more idiomatic than 'seed' while still retaining the genealogical emphasis of
    the Greek.
- source_word: γυναῖκα ἀλλοτρίαν
  chosen: a foreign woman
  alternatives:
  - an outsider woman
  - a woman from another family
  lexicon: LSJ
  rationale: In context the contrast is with one from the father's tribe and ancestral
    line. 'Foreign woman' captures otherness in kinship/tribal terms without implying
    only nationality in the modern political sense.
- source_word: φυλῆς τοῦ πατρός σου
  chosen: the tribe of your father
  alternatives:
  - your father's tribe
  - your paternal tribe
  lexicon: LSJ
  rationale: The phrase refers to paternal tribal affiliation. 'The tribe of your
    father' stays close to the Greek and remains clear in English.
- source_word: υἱοὶ προφητῶν ἐσμεν
  chosen: we are sons of the prophets
  alternatives:
  - we are descendants of the prophets
  lexicon: LSJ
  rationale: A formally close rendering is preferable because the phrase is unusual
    in this context and may intentionally evoke ancestral identity. 'Sons of the prophets'
    preserves the wording; the likely sense 'descendants of the prophets' is preserved
    in a footnote.
- source_word: ἀπὸ τοῦ αἰῶνος
  chosen: from of old
  alternatives:
  - from ancient times
  - from the beginning
  lexicon: LSJ
  rationale: The phrase modifies 'our fathers' and points to antiquity. 'From of old'
    is concise, literary, and faithful without sounding archaic beyond comprehension.
- source_word: ἐκ τῶν ἀδελφῶν αὐτῶν
  chosen: from among their brothers
  alternatives:
  - from among their kindred
  - from among their relatives
  lexicon: LSJ
  rationale: The Greek literally says 'brothers,' but in marriage context it denotes
    close kin or clan relations rather than literal sisters. The literal rendering
    is retained in the main text for transparency, with a clarifying footnote preserving
    the kinship sense.
- source_word: εὐλογήθησαν ἐν τοῖς τέκνοις αὐτῶν
  chosen: they were blessed in their children
  alternatives:
  - they were blessed through their children
  - they were blessed with children
  lexicon: LSJ
  rationale: The preposition ἐν can be rendered several ways. 'In their children'
    stays close to the Greek while allowing the sense that blessing was realized in
    their descendants.
- source_word: κληρονομήσει γῆν
  chosen: will inherit the land
  alternatives:
  - will inherit earth
  - will possess the land as an inheritance
  lexicon: LSJ
  rationale: γῆ in this ancestral context most naturally refers to land, likely the
    promised land, not the earth in general. 'Inherit the land' is both idiomatic
    and contextually precise.
