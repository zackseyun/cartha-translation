theological_decisions:
- issue: Meaning of 'we are sons of the prophets' in a patriarchal ancestry list
  chosen_reading: Retain the literal phrase 'sons of the prophets' in the main text
  alternative_readings:
  - we are descendants of the prophets
  rationale: The Greek wording is distinctive and should not be flattened in the main
    text. Since the following names are patriarchs rather than classical prophets,
    the phrase likely functions broadly for revered ancestral figures or descendants
    of prophetic forefathers. The more interpretive sense is preserved in a footnote
    rather than replacing the source wording.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
- issue: Kinship language in marriage instruction
  chosen_reading: Keep 'brothers' in the main text with explanatory footnote
  alternative_readings:
  - relatives
  - kinsmen
  rationale: The Greek uses masculine kinship language. In context it refers to endogamous
    marriage within the kin group, not literal brothers. Following the gender-accurate
    principle, the formal wording is retained while the contextual sense is clarified
    in a footnote.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
