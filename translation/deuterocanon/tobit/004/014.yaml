translation:
  text: Do not let the wages of any man who works for you stay overnight with you,
    but pay him at once. If you serve God, it will be repaid to you. Watch yourself,
    child, in all your works, and be disciplined in all your conduct.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Do not let the wages ... spend the night with you.'
      The Greek uses overnight imagery to forbid delaying payment.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'it will be repaid to you,' leaving the agent implicit; the
      sense is that God will repay.
    reason: alternative_reading
lexical_decisions:
- source_word: μισθός
  chosen: wages
  alternatives:
  - pay
  - hire
  lexicon: BDAG
  rationale: In labor context, μισθός refers to compensation due for work. 'Wages'
    is the most natural modern English equivalent and preserves the ethical force
    of prompt payment.
- source_word: παντὸς ἀνθρώπου
  chosen: any man
  alternatives:
  - any person
  - everyone
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular with generic force. Per
    project philosophy, a gender-accurate rendering is preferred where it matches
    the source form and intent; here 'any man who works for you' preserves the wording
    without implying exclusion of the broader principle.
- source_word: ἐργάσηται
  chosen: works
  alternatives:
  - labors
  - does work
  lexicon: BDAG
  rationale: A straightforward rendering of the verb in this employment setting. 'Works'
    is idiomatic and clear.
- source_word: παρὰ σοὶ
  chosen: for you
  alternatives:
  - with you
  - in your service
  lexicon: BDAG
  rationale: Although literally 'with you,' in this context it denotes labor done
    in one's employ. 'For you' communicates the relationship naturally in English.
- source_word: μὴ αὐλισθήτω
  chosen: do not let ... stay overnight with you
  alternatives:
  - do not let ... lodge
  - do not let ... remain until morning
  lexicon: LSJ
  rationale: The verb literally relates to spending the night or lodging. Applied
    to wages, it means they must not remain overnight unpaid. The chosen rendering
    keeps the overnight imagery while making the object ('wages') intelligible in
    English.
- source_word: ἀπόδος αὐτῷ παραυτίκα
  chosen: pay him at once
  alternatives:
  - give it back to him immediately
  - repay him right away
  lexicon: BDAG
  rationale: ἀπόδος means 'give/pay back,' and παραυτίκα means 'immediately, at once.'
    In context of wages, 'pay him at once' is the clearest idiomatic rendering.
- source_word: δουλεύσῃς τῷ θεῷ
  chosen: you serve God
  alternatives:
  - you are a servant to God
  - you labor for God
  lexicon: BDAG
  rationale: δοῦλος/δουλεύω language can imply servitude, but here the exhortational
    context favors the broader sense 'serve.' 'Serve God' is idiomatic and faithful
    without overloading the line with slavery imagery not foregrounded here.
- source_word: ἀποδοθήσεταί σοι
  chosen: it will be repaid to you
  alternatives:
  - you will be repaid
  - he will repay you
  lexicon: BDAG
  rationale: The passive leaves the agent implicit. 'It will be repaid to you' preserves
    the Greek form and the reciprocity with the prior command about paying wages.
- source_word: πρόσεχε σεαυτῷ
  chosen: Watch yourself
  alternatives:
  - Take heed to yourself
  - Pay attention to yourself
  lexicon: BDAG
  rationale: An idiomatic imperative meaning to be careful or attentive regarding
    oneself. 'Watch yourself' is concise, natural, and suitably serious.
- source_word: παιδίον
  chosen: child
  alternatives:
  - my child
  - son
  lexicon: BDAG
  rationale: The Greek vocative means 'child' or 'little child.' Since no possessive
    is expressed here, 'child' is the most textually restrained rendering; 'son' would
    over-specify gender, and 'my child' would add a possessive not present in the
    Greek wording of this witness.
- source_word: ἔργοις
  chosen: works
  alternatives:
  - deeds
  - actions
  lexicon: BDAG
  rationale: A broad term for what one does. 'Works' keeps lexical continuity with
    the earlier labor language while remaining understandable.
- source_word: ἴσθι πεπαιδευμένος
  chosen: be disciplined
  alternatives:
  - be well-trained
  - be instructed
  lexicon: BDAG
  rationale: The perfect participle from παιδεύω conveys being formed, trained, or
    disciplined. 'Be disciplined' captures the ethical and habitual sense in concise
    English.
- source_word: ἀναστροφῇ
  chosen: conduct
  alternatives:
  - way of life
  - behavior
  lexicon: BDAG
  rationale: A standard ethical term for manner of life or conduct. 'Conduct' is natural
    and suitably weighty in wisdom instruction.
