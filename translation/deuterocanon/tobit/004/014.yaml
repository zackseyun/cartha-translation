theological_decisions:
- issue: Implicit divine agent in ἀποδοθήσεταί σοι
  chosen_reading: it will be repaid to you
  alternative_readings:
  - he will repay you
  rationale: The Greek uses a passive and does not explicitly name God as subject
    in the second clause. The translation preserves that form rather than making the
    divine agent explicit, while context still strongly implies God's recompense.
  doctrine_reference: Preserve theological tension rather than resolve it.
