id: TOB.4.14
reference: Tobit 4:14
source:
  edition: lxx-swete-1909
  text: μισθὸς παντὸς ἀνθρώπου ὃς ἐὰν ἐργάσηται παρὰ σοὶ μὴ αὐλισθήτω, ἀλλὰ ἀπόδος
    αὐτῷ παραυτίκα· ἐὰν δουλεύσῃς τῷ θεῷ, ἀποδοθήσεταί σοι. πρόσεχε σεαυτῷ, παιδίον,
    ἐν πᾶσι τοῖς ἔργοις σου, καὶ ἴσθι πεπαιδευμένος ἐν πάσῃ ἀναστροφῇ σου.
  language: Greek
  pages:
  - 832
  - 835
  - 837
  - 838
  - 839
  - 840
  - 841
  - 842
  - 843
  - 844
