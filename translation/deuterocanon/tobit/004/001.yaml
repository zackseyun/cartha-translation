translation:
  text: On that day Tobit remembered the silver that he had deposited with Gabael
    in Rages of Media.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the money'; Greek 'the silver' can refer to coined or weighed money.
    reason: lexical_alternative
  - marker: b
    text: '''Rages'' is also commonly rendered ''Rhages.'''
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐν τῇ ἡμέρᾳ ἐκείνῃ
  chosen: On that day
  alternatives:
  - In that day
  - At that time
  lexicon: LSJ
  rationale: A straightforward temporal expression. 'On that day' is idiomatic modern
    English and preserves the definite reference of the Greek.
- source_word: ἐμνήσθη
  chosen: remembered
  alternatives:
  - called to mind
  - recalled
  lexicon: BDAG
  rationale: The aorist middle here naturally means 'remembered' or 'called to mind.'
    'Remembered' is the clearest and most natural English rendering without adding
    interpretive nuance.
- source_word: περὶ τοῦ ἀργυρίου
  chosen: the silver
  alternatives:
  - the money
  - the sum of money
  lexicon: LSJ
  rationale: ἀργύριον literally denotes silver, often functioning as money. Because
    the Greek explicitly says 'silver,' the main text preserves that wording; 'money'
    is a plausible contextual alternative but is less formally transparent.
- source_word: ὃ παρέθετο
  chosen: that he had deposited
  alternatives:
  - that he had entrusted
  - that he had placed on deposit
  lexicon: LSJ
  rationale: παρατίθημι in this context refers to entrusting or depositing funds with
    another person. 'Had deposited' communicates the financial sense clearly in modern
    English while remaining close to the Greek.
- source_word: Γαβαήλῳ
  chosen: Gabael
  alternatives:
  - Gabaiel
  rationale: Personal names are transliterated rather than translated. 'Gabael' follows
    the Greek form in Swete.
- source_word: ἐν Ῥάγοις
  chosen: in Rages
  alternatives:
  - at Rages
  - in Rhages
  rationale: The place name is transliterated from the Greek. 'Rages' reflects the
    form given in the source text; 'Rhages' is a familiar Anglicized alternative worth
    preserving in a footnote.
- source_word: τῆς Μηδίας
  chosen: of Media
  alternatives:
  - in Media
  rationale: The genitive identifies the larger region to which Rages belongs. 'Of
    Media' is the most direct rendering of the Greek construction.
