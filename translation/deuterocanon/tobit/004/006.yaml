translation:
  text: For if you practice the truth, your works will prosper, and so will all who
    practice righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all who practice justice.' The Greek δικαιοσύνη can denote righteousness
      or justice depending on context.
    reason: lexical_alternative
  - marker: b
    text: The Greek wording is somewhat compressed; the sense is that truthful, upright
      conduct leads to success in one's undertakings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιοῦντός σου
  chosen: if you practice
  alternatives:
  - when you do
  - if you do
  - as you do
  lexicon: BDAG
  rationale: The genitive absolute with διότι is awkwardly compressed in English.
    Rendering with a conditional sense ('if you practice') fits the exhortational
    context and preserves the idea of ongoing conduct rather than a single act.
- source_word: τὴν ἀλήθειαν
  chosen: the truth
  alternatives:
  - truthfulness
  - what is true
  lexicon: BDAG
  rationale: ἀλήθεια here likely carries an ethical sense of truth/truthfulness in
    conduct. 'The truth' preserves the Greek wording while remaining idiomatic in
    English and broad enough to include honest, faithful living.
- source_word: εὐοδίαιι ἔσονται
  chosen: will prosper
  alternatives:
  - will be successful
  - will go well
  - prosperity will be
  lexicon: LSJ
  rationale: The phrase expresses favorable outcome or success. 'Will prosper' is
    concise, natural English and matches the future sense without over-specifying
    material prosperity.
- source_word: ἐν τοῖς ἔργοις σου
  chosen: in your works
  alternatives:
  - in your deeds
  - in what you do
  lexicon: BDAG
  rationale: ἔργα denotes deeds/works. 'In your works' stays close to the Greek and
    preserves the connection between conduct and its outcome, though slightly formal.
- source_word: πᾶσι τοῖς ποιοῦσι
  chosen: all who practice
  alternatives:
  - all who do
  - everyone doing
  lexicon: BDAG
  rationale: The participial construction denotes those characterized by such action.
    'All who practice' conveys habitual conduct and aligns with the earlier rendering
    of ποιέω.
- source_word: τὴν δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per project defaults, δικαιοσύνη is rendered 'righteousness,' with 'justice'
    preserved as an alternative where relevant. In this wisdom context, ethical uprightness
    is primary, so 'righteousness' fits best.
