theological_decisions:
- issue: Metaphorical force of storing treasure through almsgiving
  chosen_reading: Retain the metaphor of storing up treasure without expanding it
    into an explicit doctrine of merit.
  alternative_readings:
  - Interpret as earning heavenly reward
  - Interpret as practical provision in future hardship
  rationale: The Greek itself states only that a good treasure is being stored up
    for a day of necessity. The translation preserves the image and leaves the precise
    theological mechanism unstated, avoiding doctrinal overreach while keeping the
    moral logic of the context.
  doctrine_reference: Preserve theological tension rather than resolve it.
