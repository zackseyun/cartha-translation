translation:
  text: For you are storing up a good treasure for yourself for a day of need.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for the day of need,' 'for a time of distress,' or 'for a day of trouble.'
      The Greek phrase is broad and can refer to urgent need or hardship.
    reason: lexical_alternative
lexical_decisions:
- source_word: θέμα
  chosen: a good treasure
  alternatives:
  - a good deposit
  - a good store
  - something good laid up
  lexicon: LSJ
  rationale: The noun denotes something laid up or stored. Because it is paired with
    θησαυρίζεις ('you are storing up/treasuring up'), rendering it as 'treasure' preserves
    the semantic link in natural English. 'Deposit' is possible but sounds overly
    financial and less idiomatic here.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: This gives the explanatory force connecting the statement to the preceding
    exhortation. 'For' is concise and preserves the argumentative flow.
- source_word: ἀγαθὸν
  chosen: good
  alternatives:
  - beneficial
  - valuable
  lexicon: BDAG
  rationale: The adjective straightforwardly qualifies the stored treasure as good.
    'Valuable' would narrow the sense too much toward monetary worth.
- source_word: θησαυρίζεις
  chosen: you are storing up
  alternatives:
  - you treasure up
  - you are laying up
  - you are accumulating
  lexicon: BDAG
  rationale: The verb means to store up treasure. 'Storing up' is clear modern English
    and keeps the metaphor active. The present tense is retained.
- source_word: σεαυτῷ
  chosen: for yourself
  alternatives:
  - for your own benefit
  - for yourself personally
  lexicon: BDAG
  rationale: The reflexive dative indicates benefit to the subject. 'For yourself'
    is direct and idiomatic.
- source_word: εἰς ἡμέραν ἀνάγκης
  chosen: for a day of necessity
  alternatives:
  - for the day of need
  - for a time of distress
  - for a day of trouble
  lexicon: BDAG
  rationale: Literally the phrase points to a day characterized by need or distress.
    'Day of necessity' stays close to the Greek and preserves the broad sense of urgent
    need without over-specifying whether the emphasis is poverty, trouble, or affliction.
