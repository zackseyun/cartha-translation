translation:
  text: And what you hate, do to no one. Do not drink wine to drunkenness, and do
    not let drunkenness go with you on your way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And what is hateful to you, do not do to anyone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ μισεῖς
  chosen: what you hate
  alternatives:
  - what is hateful to you
  - what you detest
  lexicon: LSJ
  rationale: The relative clause is broad and proverbial. 'What you hate' is concise,
    natural English and preserves the second-person singular address without over-interpreting
    the object as merely 'hateful' in an abstract sense.
- source_word: μηδενὶ
  chosen: to no one
  alternatives:
  - to nobody
  - to anyone
  lexicon: LSJ
  rationale: 'The dative with the prohibition is best rendered as the indirect object
    of the action: ''do to no one.'' This keeps the universal negative force clear.'
- source_word: ποίησης
  chosen: do
  alternatives:
  - perform
  - cause
  lexicon: LSJ
  rationale: In this ethical maxim, the common verb ποιέω is idiomatically rendered
    'do.' This yields the familiar negative reciprocity form without paraphrase.
- source_word: οἶνον
  chosen: wine
  lexicon: LSJ
  rationale: Straightforward lexical equivalent.
- source_word: εἰς μέθην
  chosen: to drunkenness
  alternatives:
  - to excess
  - until you are drunk
  lexicon: LSJ
  rationale: The preposition εἰς with the noun μέθη expresses result or extent. 'To
    drunkenness' is slightly formal but transparent and closely tracks the Greek;
    alternatives are possible but either soften the specific focus on intoxication
    or expand the wording.
- source_word: μὴ πίῃς
  chosen: do not drink
  alternatives:
  - you must not drink
  lexicon: LSJ
  rationale: A direct prohibition in clear modern English.
- source_word: μὴ πορευθήτω μετὰ σοῦ μέθη
  chosen: do not let drunkenness go with you
  alternatives:
  - let not drunkenness accompany you
  - do not go about in drunkenness
  lexicon: LSJ
  rationale: The Greek personifies drunkenness as something that 'goes with' a person.
    Preserving that image is preferable to flattening it into a mere abstract warning,
    while 'do not let' makes acceptable English of the third-person imperative.
- source_word: ἐν τῇ ὁδῷ σου
  chosen: on your way
  alternatives:
  - in your walk
  - on your path
  lexicon: LSJ
  rationale: Literally 'in your way/path,' but in context it refers to one's course
    of life or actual going. 'On your way' preserves the travel/life-journey imagery
    in idiomatic English.
