theological_decisions:
- issue: Ethical maxim wording
  chosen_reading: And what you hate, do to no one.
  alternative_readings:
  - And what is hateful to you, do not do to anyone.
  rationale: The Greek states a negative form of the reciprocity principle. The chosen
    rendering stays close to the wording while remaining idiomatic. The alternative
    is worth preserving because it makes explicit the implied object relation in English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without unnecessary paraphrase.'
