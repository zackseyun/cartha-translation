id: TOB.4.15
reference: Tobit 4:15
source:
  edition: lxx-swete-1909
  text: καὶ ὃ μισεῖς μηδενὶ ποίησης. οἶνον εἰς μέθην μὴ πίῃς, καὶ μὴ πορευθήτω μετὰ
    σοῦ μέθη ἐν τῇ ὁδῷ σου.
