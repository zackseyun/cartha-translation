translation:
  text: And do not be afraid, child, because we have become poor; you have much, if
    you fear God and turn away from every sin and do what is pleasing before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there is much for you.' The Greek expression can denote what one possesses
      or what is available to one.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ φοβοῦ
  chosen: do not be afraid
  alternatives:
  - do not fear
  lexicon: BDAG
  rationale: Imperative prohibition with φοβέομαι. 'Do not be afraid' is idiomatic
    modern English while preserving the force of the command.
- source_word: παιδίον
  chosen: child
  alternatives:
  - my child
  - little child
  lexicon: BDAG
  rationale: Vocative of affectionate address. 'Child' preserves the familial tenderness
    without adding the possessive 'my,' which is not explicit in the Greek.
- source_word: ἐπτωχεύσαμεν
  chosen: we have become poor
  alternatives:
  - we are poor
  - we have been reduced to poverty
  lexicon: BDAG
  rationale: Aorist verb from πτωχεύω points to entering a state of poverty rather
    than merely describing a static condition. 'Have become poor' captures that ingressive
    sense in natural English.
- source_word: ὑπάρχει σοι πολλὰ
  chosen: you have much
  alternatives:
  - much belongs to you
  - there is much for you
  lexicon: BDAG
  rationale: The idiom ὑπάρχει σοι expresses possession or available resources. 'You
    have much' is the clearest English equivalent and fits the encouragement of the
    verse.
- source_word: ἐὰν φοβηθῇς τὸν θεὸν
  chosen: if you fear God
  alternatives:
  - if you revere God
  lexicon: BDAG
  rationale: The phrase denotes reverent fear toward God. 'Fear God' is the standard
    biblical expression and preserves the theological weight better than the softer
    'revere.'
- source_word: ἀποστῇς ἀπὸ πάσης ἁμαρτίας
  chosen: turn away from every sin
  alternatives:
  - depart from all sin
  - keep away from every sin
  lexicon: BDAG
  rationale: ἀφίστημι/ἀποστῇς with ἀπό conveys separation or withdrawal. 'Turn away
    from' is natural English and retains the moral-volitional sense.
- source_word: ποιήσῃς τὸ ἀρεστὸν
  chosen: do what is pleasing
  alternatives:
  - do the pleasing thing
  - do what is acceptable
  lexicon: BDAG
  rationale: The articular adjective functions substantivally. 'Do what is pleasing'
    communicates the sense clearly in English.
- source_word: ἐνώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his sight
  lexicon: BDAG
  rationale: A standard biblical expression for divine evaluation. 'Before him' is
    slightly more formal and preserves the relational/judicial nuance.
