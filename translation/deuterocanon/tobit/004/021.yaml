theological_decisions:
- issue: Meaning of 'you have much' in a context of poverty
  chosen_reading: The statement refers to true or sufficient wealth available to the
    son in a life ordered by fearing God and avoiding sin, without specifying material
    prosperity as a guarantee.
  alternative_readings:
  - The phrase promises material abundance if the son obeys God.
  - The phrase refers primarily to moral or spiritual riches.
  rationale: The Greek says only 'you have much' and conditions it on fearing God,
    turning from sin, and doing what pleases him. The translation preserves the broadness
    of the statement and avoids importing a prosperity formula or over-spiritualizing
    it.
  doctrine_reference: Preserve theological tension rather than resolve it.
