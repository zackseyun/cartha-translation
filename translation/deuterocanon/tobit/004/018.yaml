translation:
  text: Seek counsel from every wise person, and do not despise any useful advice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every useful counsel.' The Greek repeats the same counsel/advice word
      used earlier in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: συμβουλίαν
  chosen: counsel
  alternatives:
  - advice
  - guidance
  lexicon: LSJ
  rationale: The noun denotes counsel or advice received. 'Counsel' fits the object
    of ζητέω ('seek') idiomatically in English and preserves the sense of deliberate
    guidance rather than casual suggestion.
- source_word: παρὰ παντὸς φρονίμου
  chosen: from every wise man
  alternatives:
  - from every prudent person
  - from every sensible man
  lexicon: LSJ
  rationale: παρά with the genitive indicates source ('from'). φρόνιμος means wise,
    prudent, sensible. The masculine singular with παντός is rendered gender-accurately
    as 'wise man' per project philosophy, while still carrying a representative sense
    in wisdom instruction.
- source_word: ζήτησον
  chosen: seek
  alternatives:
  - ask for
  - look for
  lexicon: LSJ
  rationale: The imperative calls for active pursuit. 'Seek' is concise and preserves
    the exhortational force better than the more limited 'ask for'.
- source_word: μὴ καταφρονήσῃς
  chosen: do not despise
  alternatives:
  - do not disregard
  - do not look down on
  lexicon: LSJ
  rationale: καταφρονέω commonly means to despise or treat with contempt. 'Despise'
    preserves the stronger moral tone of the warning, though in context it implies
    refusing to dismiss advice.
- source_word: ἐπὶ πάσης συμβουλίας χρησίμης
  chosen: any useful advice
  alternatives:
  - every useful counsel
  - all beneficial counsel
  lexicon: LSJ
  rationale: The phrase refers to counsel characterized as useful/beneficial. English
    idiom favors 'advice' here after 'despise,' while 'any useful advice' naturally
    conveys the distributive force of πάσης in a prohibition.
