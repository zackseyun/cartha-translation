  confidence: high
  validation: agree
translation:
  text: And now I am showing you the ten talents of silver that I deposited with Gabael
    son of Gabrias in Rages of Media.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am making known to you' for ἐπιδεικνύω; the verb can mean to point
      out or disclose, not only to display physically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιδεικνύω
  chosen: am showing
  alternatives:
  - show
  - point out
  - make known
  lexicon: LSJ
  rationale: The present tense is retained with a progressive English form for naturalness.
    In context Tobit is drawing attention to or indicating the existence of the money,
    not physically displaying coins in hand; 'am showing' preserves that sense without
    overinterpreting.
- source_word: τὰ δέκα τάλαντα τοῦ ἀργυρίου
  chosen: the ten talents of silver
  alternatives:
  - the ten silver talents
  - the ten talents in silver
  lexicon: LSJ
  rationale: A straightforward formal rendering preserves both the amount and the
    metal. 'Talents' is kept rather than converted into modern currency, since it
    is an ancient weight/money unit and should remain transparent to the source.
- source_word: παρεθέμην
  chosen: I deposited
  alternatives:
  - I entrusted
  - I placed on deposit
  - I left with
  lexicon: LSJ
  rationale: The middle form here refers to placing money with someone for safekeeping.
    'Deposited' best fits the financial context and is more precise than the broader
    'entrusted,' while still readable.
- source_word: Γαβαήλῳ
  chosen: Gabael
  alternatives:
  - Gabail
  rationale: Personal names are transliterated rather than translated, following project
    policy. 'Gabael' is the standard transliteration from the Greek form in this witness.
- source_word: τῷ τοῦ Γαβρεία
  chosen: son of Gabrias
  alternatives:
  - the son of Gabria
  - of the family of Gabrias
  lexicon: LSJ
  rationale: The article with τοῦ + genitive is a Greek way of identifying a person
    by his father. English idiom requires supplying 'son of.' The father's name is
    transliterated from the Greek form.
- source_word: ἐν Ῥάγοις τῆς Μηδείας
  chosen: in Rages of Media
  alternatives:
  - at Rages in Media
  - in Rhages of Media
  rationale: The place name is transliterated from the Greek. 'Of Media' preserves
    the genitival geographic designation. 'Rages' is preferred as a direct rendering
    of Ῥάγοις in this source witness.
