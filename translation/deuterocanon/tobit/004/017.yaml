translation:
  text: Pour out your bread on the grave of the righteous, and give none to sinners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at the tomb of the righteous.' The phrase may refer to a funerary or
      memorial act of charity, but the Greek is kept literal here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκχεον
  chosen: Pour out
  alternatives:
  - Scatter
  - Give generously
  lexicon: LSJ
  rationale: The imperative literally means 'pour out' or 'pour forth.' Retaining
    'pour out' preserves the concrete imagery of distributing food, even if the idiom
    may imply charitable giving more broadly.
- source_word: τοὺς ἄρτους σου
  chosen: your bread
  alternatives:
  - your loaves
  - your food
  lexicon: LSJ
  rationale: Although plural in Greek ('your breads/loaves'), English idiom naturally
    uses the mass noun 'bread' for food provision. This keeps the concrete sense without
    awkwardness.
- source_word: ἐπὶ τὸν τάφον τῶν δικαίων
  chosen: on the grave of the righteous
  alternatives:
  - at the tomb of the righteous
  - for the burial of the righteous
  lexicon: LSJ
  rationale: The phrase is spatially 'upon/on the grave of the righteous.' 'Grave'
    is the most direct rendering of τάφος. The wording likely reflects funerary charity
    or memorial almsgiving, but the main text preserves the Greek image rather than
    interpreting it away.
- source_word: τῶν δικαίων
  chosen: the righteous
  alternatives:
  - the just
  lexicon: LSJ
  rationale: δικαίων is best rendered 'the righteous' in biblical English because
    it preserves the moral-religious sense more clearly than 'the just' for modern
    readers.
- source_word: καὶ μὴ δῷς
  chosen: but give none
  alternatives:
  - and do not give
  - but do not give
  lexicon: LSJ
  rationale: The negative imperative is straightforward. 'But give none' brings out
    the contrast with the first clause and avoids repeating 'bread' explicitly, which
    English can leave implied.
- source_word: τοῖς ἁμαρτωλοῖς
  chosen: to sinners
  alternatives:
  - to the sinful
  - to wrongdoers
  lexicon: LSJ
  rationale: ἁμαρτωλοῖς is the standard term for 'sinners.' This is the most transparent
    and theologically familiar rendering.
