theological_decisions:
- issue: Interpretation of the funerary instruction
  chosen_reading: The main text preserves the literal image of giving bread 'on the
    grave of the righteous' rather than converting it into an explanatory paraphrase
    about funeral meals or memorial almsgiving.
  alternative_readings:
  - Give your bread at the burial of the righteous
  - Share food in mourning for the righteous
  rationale: The Greek wording is concrete and unusual. Because the exact cultural
    practice behind it is debated, transparency requires keeping the literal expression
    in the main text and preserving interpretive alternatives in a footnote rather
    than resolving the ambiguity.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Scope of the prohibition regarding sinners
  chosen_reading: 'The text is rendered as a direct prohibition: ''give none to sinners.'''
  alternative_readings:
  - do not share in such funerary charity with sinners
  - do not give your bread to sinners
  rationale: The Greek leaves the object implicit in the second clause. English can
    either supply 'bread' or leave it implied. Leaving it implied with 'give none'
    preserves the terseness of the source while still communicating the contrast.
