translation:
  text: As much as you have, according to your abundance, give alms from it; and if
    you have little, do not be afraid to give alms according to that little.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'According to what you have, in proportion to your abundance, do almsgiving
      from your possessions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς σοι ὑπάρχει
  chosen: As much as you have
  alternatives:
  - According to what you have
  - Whatever you have
  lexicon: BDAG
  rationale: The phrase introduces the measure of one's possessions. 'As much as you
    have' is natural English while preserving the direct relation to what is available
    to the person addressed.
- source_word: κατὰ τὸ πλῆθος
  chosen: according to your abundance
  alternatives:
  - in proportion to the abundance
  - according to the amount
  lexicon: BDAG
  rationale: κατά with the accusative expresses proportion. πλῆθος here refers to
    abundance or large quantity of possessions. 'According to your abundance' preserves
    the proportional sense without over-paraphrasing.
- source_word: ποίησον ἐξ αὐτῶν ἐλεημοσύνην
  chosen: give alms from it
  alternatives:
  - do almsgiving from them
  - make charity from them
  lexicon: BDAG
  rationale: ἐλεημοσύνη in this Jewish-Greek context refers specifically to almsgiving,
    not generic mercy. 'Give alms' is idiomatic English for the action, and 'from
    it' captures ἐξ αὐτῶν, i.e., from one's possessions.
- source_word: ἐὰν ὀλίγον σοι ὑπάρχῃ
  chosen: if you have little
  alternatives:
  - if little is available to you
  - if your means are small
  lexicon: BDAG
  rationale: This conditional clause contrasts with abundance. 'If you have little'
    is concise and faithful to the Greek sense of limited means.
- source_word: κατὰ τὸ ὀλίγον
  chosen: according to that little
  alternatives:
  - in proportion to the little you have
  - according to your small means
  lexicon: BDAG
  rationale: The repeated κατά marks proportionality again. 'According to that little'
    keeps the rhetorical parallel with 'according to your abundance,' though slightly
    smoothed for English.
- source_word: μὴ φοβοῦ ποιεῖν ἐλεημοσύνην
  chosen: do not be afraid to give alms
  alternatives:
  - do not fear to give alms
  - do not hesitate to give alms
  lexicon: BDAG
  rationale: φοβοῦ is literally 'fear,' but in context it warns against shrinking
    back from generosity when resources are small. 'Do not be afraid to give alms'
    preserves the literal force and reads naturally.
