theological_decisions:
- issue: Rendering of ἐλεημοσύνη
  chosen_reading: alms / give alms
  alternative_readings:
  - charity
  - acts of mercy
  rationale: In Tobit, ἐλεημοσύνη is a key ethical term tied specifically to almsgiving
    toward the needy, not merely an abstract virtue. 'Alms' preserves that concrete
    practice and the thematic continuity within the book.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented
    exception.'
