id: TOB.8.16
reference: Tobit 8:16
source:
  edition: lxx-swete-1909
  text: Καὶ εὐλόγησεν Ῥαγουὴλ τὸν θεὸν λέγων Εὐλογητὸς εἶ σὺ ὁ θεὸς ἐν πάσῃ εὐλογίᾳ·
    καὶ εὐλογείτωσάν σε οἱ ἅγιοί σου καὶ πᾶσαι αἱ κτίσεις σου, πάντες οἱ ἄγγελοί σου
    καὶ οἱ ἐκλεκτοί σου εὐλογείτωσάν σε εἰς τοὺς αἰῶνας.
  language: Greek
  pages:
  - 832
  - 835
  - 848
  - 849
  - 850
  - 851
  - 852
  - 853
  confidence: high
  validation: major_mismatch
translation:
  text: And Raguel blessed God, saying, “Blessed are you, O God, with every blessing;
    and may all your holy ones bless you, and all your creatures; may all your angels
    and your chosen ones bless you forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your saints' for 'your holy ones.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all your creation' for 'all your creatures.'
    reason: lexical_alternative
  - marker: c
    text: Or 'your elect' for 'your chosen ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλόγησεν
  chosen: blessed
  alternatives:
  - praised
  lexicon: BDAG
  rationale: The verb εὐλογέω here introduces a spoken blessing directed toward God.
    'Blessed' preserves the lexical link with the following repeated εὐλογητὸς / εὐλογείτωσάν
    and keeps the liturgical tone better than the more generic 'praised'.
- source_word: Εὐλογητὸς εἶ σὺ
  chosen: Blessed are you
  alternatives:
  - May you be blessed
  - You are blessed
  lexicon: BDAG
  rationale: This is a standard blessing formula. 'Blessed are you' is idiomatic English
    and preserves the direct address and doxological force.
- source_word: ἐν πάσῃ εὐλογίᾳ
  chosen: with every blessing
  alternatives:
  - in every blessing
  - with all blessing
  lexicon: BDAG
  rationale: The preposition ἐν with this abstract noun is somewhat idiomatic. 'With
    every blessing' reads naturally in English while retaining the comprehensive sense
    of πάσῃ. 'In every blessing' is more literal but less idiomatic here.
- source_word: οἱ ἅγιοί σου
  chosen: your holy ones
  alternatives:
  - your saints
  - your consecrated ones
  lexicon: BDAG
  rationale: ἅγιοι can mean 'saints,' but in this deuterocanonical/LXX context the
    referent may be broader than later ecclesiastical usage. 'Holy ones' preserves
    the lexical sense without importing later doctrinal associations.
- source_word: πᾶσαι αἱ κτίσεις σου
  chosen: all your creatures
  alternatives:
  - all your creation
  - all created things of yours
  lexicon: BDAG
  rationale: The plural κτίσεις is best represented by a plural English expression.
    'Creatures' captures the sense of created beings more naturally than the collective
    singular 'creation,' while still reflecting the plural form.
- source_word: οἱ ἐκλεκτοί σου
  chosen: your chosen ones
  alternatives:
  - your elect
  lexicon: BDAG
  rationale: '''Chosen ones'' is transparent modern English and avoids importing later
    theological systematization that ''the elect'' can carry, while preserving the
    core meaning of ἐκλεκτοί.'
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: The phrase denotes enduring perpetuity. 'Forever' is the clearest natural
    English equivalent in this doxological context; the more literal 'for the ages'
    is less idiomatic.
