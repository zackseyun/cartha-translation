theological_decisions:
- issue: Referent of 'your holy ones' and 'your chosen ones' in a doxological list
    that also includes angels
  chosen_reading: Retain the broad terms 'holy ones' and 'chosen ones' without specifying
    whether they are human righteous, heavenly beings, or both.
  alternative_readings:
  - Interpret both as angelic beings
  - Interpret one or both as the faithful people of God
  rationale: The Greek text itself does not explicitly define these groups, and the
    verse already names angels separately. To preserve the text's theological openness,
    the translation keeps the terms general rather than resolving the categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
