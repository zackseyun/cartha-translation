translation:
  text: And when the two of them had been shut in together, Tobiah rose from the bed
    and said, “Get up, sister, and let us pray that the Lord may show us mercy.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'had been enclosed together.' The phrase refers to the
      couple being shut in together in the room.
    reason: lexical_alternative
  - marker: b
    text: '''Sister'' is the Greek form of address here, reflecting kinship-style
      language used for his bride in this narrative context.'
    reason: cultural_note
lexical_decisions:
- source_word: συνεκλείσθησαν
  chosen: had been shut in together
  alternatives:
  - were enclosed together
  - were shut up together
  - were left alone together
  lexicon: LSJ
  rationale: The passive verb indicates that the couple were closed in or shut in,
    likely in the bridal chamber. 'Had been shut in together' preserves the passive
    sense and the narrative sequence better than a looser idiom like 'were left alone
    together.'
- source_word: ἀμφότεροι
  chosen: the two of them
  alternatives:
  - both
  - both of them
  lexicon: LSJ
  rationale: This explicitly refers to the pair together. 'The two of them' is natural
    English and keeps the emphasis on both persons without sounding overly wooden.
- source_word: ἀνέστη
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: LSJ
  rationale: '''Rose'' fits the solemn narrative tone and naturally pairs with ''from
    the bed.'''
- source_word: κλίνης
  chosen: bed
  alternatives:
  - couch
  lexicon: LSJ
  rationale: In this context the ordinary sense is the marriage bed. 'Bed' is the
    clearest modern English equivalent.
- source_word: Ἀνάστηθι
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: LSJ
  rationale: An imperative matching the immediate action Tobiah urges Sarah to take.
    'Get up' is idiomatic modern English; 'Rise' is possible but slightly more elevated.
- source_word: ἀδελφή
  chosen: sister
  alternatives:
  - my sister
  lexicon: LSJ
  rationale: The Greek vocative literally says 'sister.' In Tobit this reflects kinship/endearment
    language within the family context, not a denial of marriage. The bare 'sister'
    matches the source most closely; English readers can be helped by a footnote.
- source_word: προσευξώμεθα
  chosen: let us pray
  alternatives:
  - let us pray together
  lexicon: LSJ
  rationale: First person hortatory subjunctive. 'Let us pray' is the standard and
    clear rendering.
- source_word: ἐλεήσῃ
  chosen: may show us mercy
  alternatives:
  - may have mercy on us
  - may be merciful to us
  lexicon: LSJ
  rationale: The verb ἐλεέω denotes showing mercy. 'May show us mercy' is natural
    and preserves the personal action of the Lord toward the couple.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is rendered 'Lord.' With the article in
    Greek and normal English style in narration, 'the Lord' is appropriate here.
