theological_decisions:
- issue: Vocative ἀδελφή addressed to Tobiah's bride
  chosen_reading: Render literally as 'sister' in the main text
  alternative_readings:
  - Render more interpretively as 'dear wife' or omit the kinship nuance
  rationale: The Greek explicitly says 'sister,' and the translation philosophy favors
    preserving source-language meaning rather than smoothing away culturally or narratively
    unusual kinship language. Because English readers may misunderstand it, the nuance
    is preserved with a clarifying footnote rather than replaced in the main text.
