translation:
  text: And both slept through the night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'And both slept the night.' The Greek idiom likely means they
      slept through the night.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκοιμήθησαν
  chosen: slept
  alternatives:
  - lay down
  - fell asleep
  lexicon: BDAG
  rationale: Aorist middle/passive of κοιμάω in this context plainly denotes sleeping,
    not euphemistic death. 'Slept' is the most natural and direct English rendering.
- source_word: ἀμφότεροι
  chosen: both
  alternatives:
  - the two of them
  - both of them
  lexicon: LSJ
  rationale: The word explicitly marks the pair together. 'Both' is concise and preserves
    the dual sense without unnecessary expansion.
- source_word: τὴν νύκτα
  chosen: through the night
  alternatives:
  - the night
  - that night
  - during the night
  lexicon: LSJ
  rationale: The accusative of extent/duration is naturally rendered in English as
    'through the night' or 'during the night.' 'Through the night' reads idiomatically
    while preserving the temporal force.
