theological_decisions:
- issue: Meaning of 'sister' in a marriage prayer
  chosen_reading: Retain literal 'sister' in the main text as kinship language within
    the narrative world.
  alternative_readings:
  - kinswoman
  - relative
  rationale: The Greek says 'this my sister,' and Tobit regularly uses sibling language
    for close kin eligible for marriage. Preserving the literal term keeps the cultural
    and narrative texture visible; an explanatory alternative is better placed in
    a footnote than substituted into the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English with documented exceptions.'
