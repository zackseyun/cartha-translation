id: TOB.8.7
reference: Tobit 8:7
source:
  edition: lxx-swete-1909
  text: καὶ νῦν, κύριε, οὐ διὰ πορνείαν ἐγὼ λαμβάνω τὴν ἀδελφήν μου ταύτην, ἀλλʼ ἐπʼ
    ἀληθείας· ἐπίταξον ἐλεῆσαί με καὶ αὐτὴν συγκαταγηρᾶσαι.
  language: Greek
  pages:
  - 832
  - 835
  - 848
  - 849
  - 850
  - 851
  - 852
  - 853
  confidence: high
  validation: minor_mismatch
translation:
  text: And now, Lord, I am not taking this my sister because of sexual immorality,
    but in truth. Command that I may find mercy and that I and she may grow old together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"This my sister" reflects the book''s kinship language for a close female
      relative who is also a lawful marriage partner; alternatively, "this sister
      of mine" or interpretively "my kinswoman."'
    reason: cultural_note
  - marker: b
    text: Or "Command that you have mercy on me and on her, and that we may grow old
      together." The Greek links "have mercy" and "grow old together" under the same
      petition.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Direct address to God; 'Lord' matches the project's default rendering
    for κύριος and fits prayer language naturally.
- source_word: πορνείαν
  chosen: sexual immorality
  alternatives:
  - fornication
  - lust
  lexicon: LSJ
  rationale: The term denotes illicit sexual conduct broadly. 'Sexual immorality'
    is clear modern English and avoids the narrower or archaic feel of 'fornication.'
    In context Tobias denies entering the marriage for merely sexual motives.
- source_word: λαμβάνω
  chosen: am taking
  alternatives:
  - am marrying
  - take
  lexicon: LSJ
  rationale: The Greek verb is literally 'take/receive.' In marriage context it can
    imply taking as wife, but 'am taking' preserves the source wording while remaining
    intelligible.
- source_word: τὴν ἀδελφήν μου ταύτην
  chosen: this my sister
  alternatives:
  - this sister of mine
  - my kinswoman
  lexicon: LSJ
  rationale: In Tobit, 'sister' reflects kinship language used for a close female
    relative and prospective wife. Rendering it literally preserves the familial idiom
    of the source rather than flattening it to 'kinswoman' in the main text.
- source_word: ἐπʼ ἀληθείας
  chosen: in truth
  alternatives:
  - with sincerity
  - truly
  lexicon: LSJ
  rationale: The phrase contrasts with acting from πορνεία. 'In truth' preserves the
    formal contrast and can carry the sense of sincerity and upright intent.
- source_word: ἐπίταξον
  chosen: Command
  alternatives:
  - ordain
  - grant
  lexicon: LSJ
  rationale: The imperative is literally 'command/order.' 'Grant' would smooth the
    prayer but weaken the verbal force of the Greek.
- source_word: ἐλεῆσαί
  chosen: under mercy
  alternatives:
  - to have mercy on
  - to show mercy to
  lexicon: LSJ
  rationale: The infinitive depends on 'command' and asks for divine mercy. Because
    the Greek construction is awkward to reproduce directly with the following infinitive,
    'under mercy' keeps mercy explicit while allowing natural English with the next
    clause.
- source_word: συγκαταγηρᾶσαι
  chosen: may grow old together
  alternatives:
  - may grow old with one another
  - may live to old age together
  lexicon: LSJ
  rationale: The compound verb clearly expresses growing old together. This is the
    heart of the petition for a long shared life.
