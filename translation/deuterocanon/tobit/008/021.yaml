id: TOB.8.21
reference: Tobit 8:21
source:
  edition: lxx-swete-1909
  text: καὶ τότε λαβόντα τὸ ἥμισυ τῶν ὑπαρχόντων αὐτοῦ πορεύεσθαι μετὰ ὑγείας πρὸς
    τὸν πατέρα· καὶ τὰ λοιπὰ ὅταν ἀποθάνω καὶ ἡ γυνή μου.
  language: Greek
  pages:
  - 832
  - 835
  - 848
  - 849
  - 850
  - 851
  - 852
  - 853
  confidence: high
  validation: agree
translation:
  text: and then, after taking half of his possessions, to go in good health to your
    father; and the rest when I and my wife die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'to the father'; the context of direct address supports
      'to your father.'
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is compressed in Greek: literally, ''and the rest whenever
      I die and my wife.'' The sense is that the remainder is to be given after both
      spouses have died.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβόντα
  chosen: after taking
  alternatives:
  - having taken
  - take
  lexicon: BDAG
  rationale: Aorist participle preceding the infinitive πορεύεσθαι is naturally rendered
    as prior action in English. 'After taking' reads smoothly while preserving the
    sequence.
- source_word: τὸ ἥμισυ
  chosen: half
  alternatives:
  - the half
  - one half
  lexicon: LSJ
  rationale: Straightforward quantitative expression; 'half' is idiomatic English.
- source_word: τῶν ὑπαρχόντων αὐτοῦ
  chosen: of his possessions
  alternatives:
  - of his property
  - of what belonged to him
  lexicon: LSJ
  rationale: ὑπάρχοντα commonly denotes possessions or property. 'Possessions' is
    natural and sufficiently concrete.
- source_word: πορεύεσθαι
  chosen: to go
  alternatives:
  - to depart
  - to travel
  lexicon: BDAG
  rationale: Infinitive of movement following τότε; 'to go' is the broadest and most
    natural rendering in context.
- source_word: μετὰ ὑγείας
  chosen: in good health
  alternatives:
  - safely
  - with health
  lexicon: LSJ
  rationale: The phrase literally involves health/well-being. 'In good health' preserves
    the lexical sense better than the more generalized 'safely,' though safe arrival
    is implied.
- source_word: πρὸς τὸν πατέρα
  chosen: to your father
  alternatives:
  - to the father
  - to his father
  lexicon: BDAG
  rationale: The Greek text as given has τὸν πατέρα without an explicit possessive,
    but direct speech context strongly points to the addressee's father. English idiom
    prefers 'your father' here.
- source_word: τὰ λοιπά
  chosen: the rest
  alternatives:
  - the remainder
  - what remains
  lexicon: LSJ
  rationale: Idiomatic rendering of the remaining share of the estate.
- source_word: ὅταν ἀποθάνω καὶ ἡ γυνή μου
  chosen: when I and my wife die
  alternatives:
  - when I die, and my wife
  - when my wife and I die
  lexicon: BDAG
  rationale: The clause is somewhat compressed in Greek. The sense is that the remaining
    property is to pass on after both spouses have died. 'When I and my wife die'
    stays close to the wording while making the intended sense intelligible.
