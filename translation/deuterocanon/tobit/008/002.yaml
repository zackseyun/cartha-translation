translation:
  text: As he went in, he remembered the words of Raphael, and he took the ashes of
    the incense and placed the fish’s heart and liver on them, and made them smoke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as he was going.' The Greek participle can be rendered more generally,
      but the immediate context and the parallel Semitic tradition support the sense
      of entering the room.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορευόμενος
  chosen: as he went in
  alternatives:
  - as he was going
  - while he went
  - as he proceeded
  lexicon: BDAG
  rationale: The participle marks ongoing movement. In context, with the wedding-night
    setting and the parallel Semitic tradition placing Tobiah rising and acting in
    the chamber, 'as he went in' makes the movement concrete without overparaphrasing.
- source_word: ἐμνήσθη
  chosen: remembered
  alternatives:
  - called to mind
  - recalled
  lexicon: BDAG
  rationale: A straightforward past sense fits the narrative sequence and preserves
    the connection to Raphael's prior instruction.
- source_word: λόγων
  chosen: words
  alternatives:
  - instructions
  - sayings
  lexicon: BDAG
  rationale: '''Words'' is the direct lexical equivalent and leaves implicit that
    these were instructions from Raphael, which the context already supplies.'
- source_word: τέφραν
  chosen: ashes
  alternatives:
  - ash
  lexicon: LSJ
  rationale: The plural is idiomatic in English for residue from burning. It naturally
    fits the ritual action described.
- source_word: θυμιαμάτων
  chosen: of the incense
  alternatives:
  - of the incense offerings
  - of the aromatic burnings
  lexicon: LSJ
  rationale: The genitive most naturally specifies the incense whose ashes he took.
    'Incense' is clear modern English and avoids overly technical cultic wording.
- source_word: ἐπέθηκεν
  chosen: placed ... on them
  alternatives:
  - laid ... on them
  - put ... on them
  lexicon: BDAG
  rationale: The verb means to put/place upon. 'On them' is supplied in English from
    the context of the ashes and makes the action intelligible.
- source_word: καρδίαν τοῦ ἰχθύος
  chosen: the fish’s heart
  alternatives:
  - the heart of the fish
  lexicon: BDAG
  rationale: A natural English possessive preserves the concrete object specified
    in Raphael's instruction.
- source_word: ἧπαρ
  chosen: liver
  lexicon: BDAG
  rationale: Standard anatomical rendering.
- source_word: ἐκάπνισεν
  chosen: made them smoke
  alternatives:
  - burned them as smoke
  - caused a smoke
  - fumigated with them
  lexicon: LSJ
  rationale: The verb denotes producing smoke/fumigation. 'Made them smoke' preserves
    the physical action and avoids importing a more technical ritual term than the
    Greek requires.
