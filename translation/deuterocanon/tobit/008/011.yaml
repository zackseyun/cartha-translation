id: TOB.8.11
reference: Tobit 8:11
source:
  edition: lxx-swete-1909
  text: καὶ ἦλθεν Ῥαγουὴλ εἰς τὴν οἰκίαν ἑαυτοῦ,
  language: Greek
  pages:
  - 832
  - 835
  - 848
  - 849
  - 850
  - 851
  - 852
  - 853
  confidence: high
  validation: agree
translation:
  text: And Raguel came into his house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his own house.' The Greek reflexive ἑαυτοῦ can be rendered more explicitly,
      but the shorter English phrasing is more natural here.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective introducing the next action in the narrative. 'And'
    preserves the simple paratactic flow of the Greek without adding temporal nuance
    beyond the text.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι, here rendered 'came' in keeping with the deictic sense
    of the Greek narrative. 'Entered' would overtranslate, since the motion into the
    house is already expressed by εἰς + accusative.
- source_word: Ῥαγουὴλ
  chosen: Raguel
  alternatives:
  - Reuel
  rationale: Personal name transliterated by standard convention, following the Greek
    form Ῥαγουήλ. 'Reuel' is a possible alternate Anglicization but is less directly
    tied to the Greek witness used here.
- source_word: εἰς
  chosen: into
  alternatives:
  - to
  lexicon: BDAG
  rationale: The preposition with accusative marks movement into a place. 'Into' best
    reflects the spatial force of the Greek.
- source_word: τὴν οἰκίαν
  chosen: his house
  alternatives:
  - the house
  - his home
  lexicon: BDAG
  rationale: οἰκία commonly means 'house' or 'household/home.' In this immediate context
    of physical movement, 'house' is the more concrete choice. English idiom prefers
    supplying the possessive from ἑαυτοῦ as 'his house' rather than the more wooden
    'the house of himself.'
- source_word: ἑαυτοῦ
  chosen: his
  alternatives:
  - his own
  lexicon: BDAG
  rationale: Reflexive genitive referring back to Raguel. 'His' is natural English;
    'his own' is possible but unnecessarily emphatic here unless the context required
    contrast, which this clause alone does not signal.
