translation:
  text: You made Adam, and you gave him Eve as a helper, the support of his wife;
    from these came the seed of mankind. You said, ‘It is not good for the man to
    be alone; let us make for him a helper like himself.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the human race.” The Greek says “the seed of mankind,” preserving the
      imagery of offspring or descent.
    reason: lexical_alternative
  - marker: b
    text: This line echoes Genesis 2:18.
    reason: cross_reference
lexical_decisions:
- source_word: ἐποίησας
  chosen: you made
  alternatives:
  - you created
  - you formed
  lexicon: BDAG
  rationale: A straightforward rendering of ποιέω in this prayer context. 'Made' is
    natural English and remains close to the Greek without importing the more specialized
    theological nuance of 'created' where κτίζω might be expected.
- source_word: Ἀδάμ
  chosen: Adam
  rationale: Personal name, so transliterated per project philosophy.
- source_word: ἔδωκας
  chosen: you gave
  alternatives:
  - you granted
  lexicon: BDAG
  rationale: Direct and idiomatic for δίδωμι in this context of divine provision.
- source_word: βοηθὸν
  chosen: helper
  alternatives:
  - help
  - companion
  lexicon: BDAG
  rationale: Echoes the Genesis wording behind the prayer and preserves the intertextual
    connection. 'Companion' is smoother but weakens the lexical tie to the source
    and to Gen 2:18.
- source_word: στήριγμα
  chosen: support
  alternatives:
  - stay
  - strength
  - supporting partner
  lexicon: LSJ
  rationale: στήριγμα denotes support or buttress. 'Support' is concise, understandable,
    and preserves the metaphorical sense without overexpansion.
- source_word: τὴν γυναῖκα αὐτοῦ
  chosen: his wife
  alternatives:
  - the woman for him
  - his woman
  lexicon: BDAG
  rationale: Although γυνή can mean 'woman' or 'wife,' in this marital context 'wife'
    is the most natural and contextually accurate rendering in English.
- source_word: ἐκ τούτων
  chosen: from these
  alternatives:
  - from them
  lexicon: BDAG
  rationale: A literal rendering that preserves the plural demonstrative and the sense
    that humanity descends from the pair just mentioned.
- source_word: τὸ ἀνθρώπων σπέρμα
  chosen: the seed of mankind
  alternatives:
  - the human race
  - the offspring of humanity
  - the seed of men
  lexicon: BDAG
  rationale: σπέρμα is literally 'seed, offspring.' 'Seed of mankind' preserves the
    concrete generative imagery of the Greek better than the flatter 'human race,'
    while 'mankind' reflects ἀνθρώπων generically.
- source_word: Οὐ καλὸν εἶναι τὸν ἄνθρωπον μόνον
  chosen: It is not good for the man to be alone
  alternatives:
  - It is not good for man to be alone
  lexicon: BDAG
  rationale: This closely follows the Greek and intentionally echoes Genesis 2:18.
    'The man' fits the article τὸν ἄνθρωπον and the immediate allusion to Adam.
- source_word: ποιήσωμεν
  chosen: let us make
  alternatives:
  - we will make
  lexicon: BDAG
  rationale: The hortatory subjunctive is best rendered 'let us make,' again preserving
    the Genesis echo.
- source_word: ὅμοιον αὐτῷ
  chosen: like himself
  alternatives:
  - corresponding to him
  - like him
  lexicon: BDAG
  rationale: ὅμοιος means 'like, similar.' 'Like himself' reads naturally in English
    and fits the prayer's recollection of Genesis. 'Corresponding to him' may reflect
    Hebrew background but goes beyond the Greek wording of this witness.
