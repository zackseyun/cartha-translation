theological_decisions:
- issue: Rendering ἀνθρώπων in a generic anthropological statement
  chosen_reading: mankind
  alternative_readings:
  - humanity
  - men
  rationale: The phrase refers to the whole human race descending from Adam and Eve.
    'Mankind' preserves the generic human sense and the text's gendered, genealogical
    framing better than 'humanity,' while avoiding the misleadingly male-specific
    sense modern readers may hear in 'men.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table
    on אָדָם / man / humankind
- issue: Intertextual echo of Genesis 2:18
  chosen_reading: Retain wording close to the Genesis allusion ('helper,' 'It is not
    good for the man to be alone,' 'let us make')
  alternative_readings:
  - Use smoother contemporary paraphrase
  rationale: The prayer explicitly recalls the creation account. Preserving the recognizable
    wording helps readers hear the scriptural allusion without adding interpretation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
