translation:
  text: And when they had finished dining, they brought Tobiah in to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''they brought Tobiah to her.'' The Semitic parallel tradition expands
      the scene with details about preparing the room and the couple entering it together
      before the door is shut.'
    reason: alternative_reading
  - marker: b
    text: Traditional English versions often use 'Tobias' here; the Greek name is
      rendered with the transliterated form 'Tobiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅτε δὲ
  chosen: And when
  alternatives:
  - Then when
  - Now when
  lexicon: LSJ
  rationale: Introduces the next event in narrative sequence. 'And when' preserves
    both the connective δέ and the temporal force of ὅτε in natural English.
- source_word: συνετέλεσαν
  chosen: had finished
  alternatives:
  - completed
  - brought to an end
  lexicon: LSJ
  rationale: The verb means to complete or finish. With the participle following,
    the sense is that the meal had been concluded before the next action.
- source_word: δειπνοῦντες
  chosen: dining
  alternatives:
  - eating supper
  - having dinner
  lexicon: LSJ
  rationale: A participle referring to taking the main meal. 'Dining' is concise and
    natural, while avoiding overly culture-bound modern meal labels. Combined with
    συνετέλεσαν, it yields 'had finished dining.'
- source_word: εἰσήγαγον
  chosen: they brought in
  alternatives:
  - they led in
  - they ushered in
  lexicon: LSJ
  rationale: The verb means to bring or lead into a place/person's presence. 'Brought
    in' is the most straightforward rendering here. The subject is implicit and indefinite
    in English, likely the household attendants or family.
- source_word: Τωβείαν
  chosen: Tobiah
  alternatives:
  - Tobias
  rationale: Personal names are transliterated rather than translated. 'Tobiah' better
    reflects the Semitic form and aligns with the parallel Semitic tradition, whereas
    'Tobias' is a more Hellenized/Latinate conventional form.
- source_word: πρὸς αὐτήν
  chosen: to her
  alternatives:
  - in to her
  - to be with her
  lexicon: LSJ
  rationale: The preposition πρός with accusative commonly means 'to' or 'toward.'
    In this marital context it indicates bringing Tobiah to Sarah. 'To her' is idiomatic
    and sufficiently precise; 'in to her' is possible but more interpretive and archaic
    in tone.
