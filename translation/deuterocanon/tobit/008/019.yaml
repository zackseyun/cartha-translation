  - 852
  - 853
  confidence: high
  validation: agree
translation:
  text: And he held a wedding feast for them for fourteen days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And he celebrated a wedding for them for fourteen days.' The Greek γάμος
      can denote either the wedding itself or the wedding feast/celebration.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν
  chosen: held
  alternatives:
  - made
  - gave
  - celebrated
  lexicon: BDAG
  rationale: ποιέω literally means 'make/do,' but with γάμον as its object it idiomatically
    means to hold or celebrate a wedding feast. 'Held' gives natural English while
    staying close to the Greek sense.
- source_word: αὐτοῖς
  chosen: for them
  alternatives:
  - for the two of them
  - for them both
  lexicon: BDAG
  rationale: The dative pronoun indicates the beneficiaries of the action. 'For them'
    is the straightforward rendering; the immediate context makes clear it refers
    to the newly married couple.
- source_word: γάμον
  chosen: a wedding feast
  alternatives:
  - a wedding
  - marriage feast
  - marriage celebration
  lexicon: BDAG
  rationale: γάμος can mean either the marriage event or the wedding banquet/celebration.
    In the phrase 'made/held a γάμος for fourteen days,' the celebratory sense is
    most natural, so 'wedding feast' best captures the idiom.
- source_word: ἡμερῶν δέκα τεσσάρων
  chosen: for fourteen days
  alternatives:
  - lasting fourteen days
  - of fourteen days
  lexicon: BDAG
  rationale: The genitive of time expresses duration. English idiom renders this naturally
    as 'for fourteen days.'
