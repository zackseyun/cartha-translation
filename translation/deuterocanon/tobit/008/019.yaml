id: TOB.8.19
reference: Tobit 8:19
source:
  edition: lxx-swete-1909
  text: Καὶ ἐποίησεν αὐτοῖς γάμον ἡμερῶν δέκα τεσσάρων.
  language: Greek
  pages:
