id: TOB.8.20
reference: Tobit 8:20
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν αὐτῷ Ῥαγουὴλ πρὶν ἢ συντελεσθῆναι τὰς ἡμέρας τοῦ γάμου ἐνόρκως,
    μὴ ἐξελθεῖν αὐτὸν ἐὰν μὴ πληρωθῶσιν αἱ δέκα τέσσαρες ἡμέραι τοῦ γάμου,
  language: Greek
  pages:
  - 832
  - 835
  - 848
  - 849
  - 850
  - 851
  - 852
  - 853
  confidence: high
  validation: agree
translation:
  text: And Raguel said to him, before the days of the wedding were completed, under
    oath, that he should not leave unless the fourteen days of the wedding were fulfilled,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with an oath.' The Greek adverb indicates that Raguel bound the instruction
      by oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὶν ἢ συντελεσθῆναι
  chosen: before ... were completed
  alternatives:
  - before ... had ended
  - before the completion of
  lexicon: BDAG
  rationale: The construction marks time prior to the completion of the wedding period.
    'Were completed' preserves the passive infinitive sense without sounding overly
    wooden.
- source_word: τὰς ἡμέρας τοῦ γάμου
  chosen: the days of the wedding
  alternatives:
  - the wedding days
  - the days of the marriage feast
  lexicon: LSJ
  rationale: A straightforward rendering of the genitive phrase. 'Wedding' is more
    natural modern English than 'marriage feast' here, while still fitting the context
    of a set celebratory period.
- source_word: ἐνόρκως
  chosen: under oath
  alternatives:
  - with an oath
  - on oath
  lexicon: LSJ
  rationale: The adverb indicates that Raguel's statement was made in a sworn manner.
    'Under oath' is concise and idiomatic in English.
- source_word: μὴ ἐξελθεῖν αὐτόν
  chosen: that he should not leave
  alternatives:
  - that he was not to go out
  - for him not to depart
  lexicon: BDAG
  rationale: The infinitive clause expresses the content of Raguel's sworn instruction.
    'Leave' is natural English and fits the context of not departing the house/place
    before the set time.
- source_word: ἐὰν μὴ πληρωθῶσιν
  chosen: unless ... were fulfilled
  alternatives:
  - until ... were completed
  - unless ... had passed
  lexicon: BDAG
  rationale: The conditional phrase literally means 'unless [they] are fulfilled.'
    'Were fulfilled' preserves the completion idea and matches the formal tone of
    the verse.
- source_word: αἱ δέκα τέσσαρες ἡμέραι τοῦ γάμου
  chosen: the fourteen days of the wedding
  alternatives:
  - the fourteen wedding days
  - the fourteen days of the marriage feast
  lexicon: LSJ
  rationale: The Greek explicitly states a fourteen-day wedding period. The translation
    keeps the number and the genitival relation clear.
