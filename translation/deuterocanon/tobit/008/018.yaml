translation:
  text: Then he ordered the servants to fill in the grave.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκέλευσεν
  chosen: he ordered
  alternatives:
  - he commanded
  - he instructed
  lexicon: BDAG
  rationale: Aorist of κελεύω denotes giving an order or command. 'Ordered' is natural
    modern English and preserves the authoritative force without sounding overly stiff.
- source_word: τοῖς οἰκέταις
  chosen: the servants
  alternatives:
  - the household servants
  - the attendants
  lexicon: BDAG
  rationale: οἰκέτης refers to a household servant/slave. In this narrative setting,
    'servants' is the most idiomatic concise rendering; the household context is already
    implied by the term. 'Attendants' is weaker, while 'slaves' may over-specify the
    social status beyond what the immediate English context requires.
- source_word: χῶσαι
  chosen: to fill in
  alternatives:
  - to cover over
  - to bury
  lexicon: LSJ
  rationale: The infinitive from χόω means to heap up earth over, cover, or fill up.
    With τάφον ('grave/tomb'), the sense is specifically to fill in or cover over
    the grave, not to bury a body at this point. 'Fill in' best captures the concrete
    action implied by the Greek.
- source_word: τὸν τάφον
  chosen: the grave
  alternatives:
  - the tomb
  - the burial pit
  lexicon: BDAG
  rationale: τάφος can mean grave or tomb. Here the context is a pit prepared for
    burial and then to be covered over, so 'grave' is the most natural English choice.
    'Tomb' could suggest a more constructed burial chamber than the immediate scene
    requires.
