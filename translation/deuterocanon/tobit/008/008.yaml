translation:
  text: And she said with him, “Amen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And she said, together with him, ‘Amen.’” The Greek phrase indicates
      that she joined him in this response.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  lexicon: BDAG
  rationale: Standard connective introducing the next action; retained for narrative
    continuity.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Aorist of λέγω, best rendered with the simple past 'said' in straightforward
    narrative.
- source_word: μετʼ αὐτοῦ
  chosen: with him
  alternatives:
  - together with him
  lexicon: BDAG
  rationale: μετά with the genitive commonly means association or accompaniment. Here
    it indicates that she joined him in saying 'Amen,' so 'with him' is the most natural
    concise rendering.
- source_word: Ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Liturgical affirmation retained by transliteration in English Bible tradition
    and because it functions as a fixed formula rather than an ordinary lexical item.
