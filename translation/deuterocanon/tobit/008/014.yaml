translation:
  text: and he found the two sleeping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and he found the two sleeping.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὗρεν
  chosen: found
  alternatives:
  - discovered
  - came upon
  lexicon: BDAG
  rationale: 'Aorist of εὑρίσκω, here in straightforward narrative sense: he came
    and found them in a given condition. ''Found'' is the most natural and direct
    English equivalent.'
- source_word: τοὺς δύο
  chosen: the two
  alternatives:
  - both of them
  lexicon: LSJ
  rationale: The article with numeral functions substantivally, referring to the two
    previously mentioned persons. 'The two' preserves the compact Greek expression
    without adding interpretive detail.
- source_word: καθεύδοντας
  chosen: asleep
  alternatives:
  - sleeping
  lexicon: BDAG
  rationale: Present participle of καθεύδω, describing the state in which he found
    them. English idiom prefers 'found the two asleep' over the more wooden 'found
    the two sleeping,' though both are possible. 'Asleep' best captures the resultant
    state in natural English.
