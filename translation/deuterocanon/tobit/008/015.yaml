translation:
  text: And she went out and reported to them that he was alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'that he lives' or 'that he is alive.'
    reason: lexical_alternative
  - marker: b
    text: The subject 'he' is implicit in the Greek verb and is supplied from the
      context as Tobias.
    reason: cross_reference
lexical_decisions:
- source_word: ἐξελθοῦσα
  chosen: went out
  alternatives:
  - came out
  - having gone out
  lexicon: LSJ
  rationale: Aorist participle of ἐξέρχομαι, indicating movement outward from the
    room/house. 'Went out' is natural English and preserves the directional sense
    without over-formalizing the participle.
- source_word: ἀπήγγειλεν
  chosen: reported
  alternatives:
  - announced
  - told
  lexicon: LSJ
  rationale: The verb ἀπαγγέλλω means to report or announce. 'Reported' fits the narrative
    context of bringing news to waiting others and is slightly more formal and precise
    than 'told.'
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - for them
  lexicon: LSJ
  rationale: Dative plural pronoun, naturally rendered 'to them' as the indirect object
    of the reporting verb.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: LSJ
  rationale: Introduces the content clause of the report in standard fashion.
- source_word: ζῇ
  chosen: he was alive
  alternatives:
  - he lives
  - he is alive
  lexicon: LSJ
  rationale: Present tense of ζάω literally means 'he lives' or 'he is alive.' In
    idiomatic English narrative after a past reporting verb, 'that he was alive' communicates
    the sense clearly. The masculine subject is supplied from context, referring to
    Tobias.
