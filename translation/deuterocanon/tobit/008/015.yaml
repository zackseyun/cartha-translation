id: TOB.8.15
reference: Tobit 8:15
source:
  edition: lxx-swete-1909
  text: καὶ ἐξελθοῦσα ἀπήγγειλεν αὐτοῖς ὅτι ζῇ.
  language: Greek
  pages:
