translation:
  text: And Edna said to his wife, “Send one of the servant girls, and let her see
    whether he is alive; but if not, so that we may bury him and no one may know.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads 'let them see,' with a plural verb, even though Edna has just
      said 'Send one of the servant girls.' The translation preserves this wording
      rather than smoothing it to singular.
    reason: textual_variant
lexical_decisions:
- source_word: Ἀπόστειλον
  chosen: Send
  alternatives:
  - Dispatch
  - Send out
  lexicon: LSJ
  rationale: Imperative of ἀποστέλλω; simple 'Send' is natural modern English and
    adequately reflects the command without overformalizing.
- source_word: μίαν τῶν παιδισκῶν
  chosen: one of the servant girls
  alternatives:
  - one of the maids
  - one of the slave girls
  lexicon: LSJ
  rationale: παιδίσκη denotes a female servant/maidservant, often of lower household
    status. 'Servant girls' preserves both gender and domestic role in accessible
    English. 'Slave girls' is possible but the bonded status is not foregrounded in
    this immediate context.
- source_word: ἰδέτωσαν
  chosen: let them see
  alternatives:
  - let her see
  - let them find out
  - let them look
  lexicon: LSJ
  rationale: The transmitted Greek has a third-person plural imperative, naturally
    rendered 'let them see.' Although the preceding singular object might lead one
    to expect 'let her see,' the extant wording supports a plural subject, perhaps
    generalized or involving more than one attendant. The translation follows the
    Greek rather than silently smoothing it.
- source_word: εἰ ζῇ
  chosen: whether he is alive
  alternatives:
  - if he lives
  - whether he lives
  lexicon: LSJ
  rationale: English idiom favors 'whether he is alive' in this context of checking
    a person's condition after the wedding night.
- source_word: ἵνα θάψωμεν αὐτόν
  chosen: so that we may bury him
  alternatives:
  - that we may bury him
  - in order that we may bury him
  lexicon: LSJ
  rationale: ἵνα with subjunctive expresses purpose/result. 'So that we may bury him'
    preserves the clause linkage and the grim practical intent.
- source_word: μηδεὶς γνῷ
  chosen: no one may know
  alternatives:
  - nobody may know
  - no one will know
  lexicon: LSJ
  rationale: Subjunctive after the preceding purpose construction is best carried
    as 'may know,' preserving the intended secrecy rather than turning it into a simple
    future.
