id: TOB.8.13
reference: Tobit 8:13
source:
  edition: lxx-swete-1909
  text: καὶ εἰσῆλθεν ἡ παιδίσκη ἀνοίξασα τὴν θύραν,
  language: Greek
  pages:
  - 832
  - 835
  - 848
  - 849
  - 850
  - 851
  - 852
  - 853
  confidence: high
  validation: minor_mismatch
translation:
  text: And the maidservant entered, opening the door,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the servant girl entered, having opened the door.' The Greek participle
      ἀνοίξασα expresses action preceding the main verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  lexicon: BDAG
  rationale: Standard connective; retained to preserve the narrative sequence.
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - went in
  - came in
  lexicon: BDAG
  rationale: Aorist of εἰσέρχομαι, straightforwardly indicating movement into a place.
    'Entered' is concise and natural in English narrative.
- source_word: ἡ παιδίσκη
  chosen: the maidservant
  alternatives:
  - the servant girl
  - the maid
  lexicon: BDAG
  rationale: παιδίσκη denotes a female servant/slave girl. 'Maidservant' preserves
    both gender and servant status without sounding overly colloquial. 'Maid' alone
    can sound archaic or socially vague; 'servant girl' is possible but slightly less
    idiomatic here.
- source_word: ἀνοίξασα
  chosen: after opening
  alternatives:
  - having opened
  - opening
  lexicon: BDAG
  rationale: 'Aorist participle prior to the main verb, naturally rendered in English
    as antecedent action: ''after opening.'' This avoids wooden phrasing while preserving
    sequence.'
- source_word: τὴν θύραν
  chosen: the door
  alternatives:
  - the gate
  lexicon: BDAG
  rationale: θύρα ordinarily means 'door' in this domestic setting. 'Gate' would overstate
    the scale and is less likely in context.
