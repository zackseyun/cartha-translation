translation:
  text: But when the demon smelled the odor, it fled to the uppermost parts of Egypt,
    and the angel bound it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the farthest regions of Egypt'; the phrase may also be understood
      geographically as 'to Upper Egypt.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὠσφράνθη
  chosen: smelled
  alternatives:
  - caught the smell of
  - detected the scent of
  lexicon: LSJ
  rationale: 'Aorist passive/deponent of ὀσφραίνομαι, here functioning with active
    sense: the demon perceived by smell. ''Smelled'' is the most natural concise English
    equivalent.'
- source_word: τὸ δαιμόνιον
  chosen: the demon
  alternatives:
  - the evil spirit
  - the demon-spirit
  lexicon: LSJ
  rationale: In Tobit this refers to the hostile personal spirit afflicting Sarah.
    'Demon' is the standard and clearest rendering; 'evil spirit' is possible but
    less direct for δαιμόνιον.
- source_word: τῆς ὀσμῆς
  chosen: the odor
  alternatives:
  - the smell
  - the fragrance
  lexicon: LSJ
  rationale: ὀσμή denotes smell/odor. Because the context is the smoke/fume from the
    burned fish organs, 'odor' preserves the concrete sensory reference without implying
    pleasantness as 'fragrance' might.
- source_word: ἔφυγεν
  chosen: it fled
  alternatives:
  - it ran away
  - it escaped
  lexicon: LSJ
  rationale: The verb indicates flight from danger. 'Fled' is idiomatic and suitably
    forceful.
- source_word: εἰς τὰ ἀνώτατα Αἰγύπτου
  chosen: to the uppermost parts of Egypt
  alternatives:
  - to the remotest parts of Egypt
  - to the farthest regions of Egypt
  - to Upper Egypt
  lexicon: LSJ
  rationale: ἀνώτατα is the superlative of 'upper/high,' literally 'the highest/uppermost
    places.' A more interpretive rendering like 'Upper Egypt' is possible geographically,
    but the Greek wording itself is broader. 'Uppermost parts of Egypt' keeps the
    literal sense while allowing the geographical nuance.
- source_word: ἔδησεν
  chosen: bound
  alternatives:
  - tied up
  - restrained
  lexicon: LSJ
  rationale: δέω commonly means bind/tie. 'Bound' is the standard formal rendering
    and fits the angel's restraining action.
- source_word: ὁ ἄγγελος
  chosen: the angel
  alternatives:
  - the messenger angel
  lexicon: LSJ
  rationale: The Greek has the definite singular 'the angel,' referring contextually
    to Raphael. The text does not name him in this clause, so the translation preserves
    the wording.
