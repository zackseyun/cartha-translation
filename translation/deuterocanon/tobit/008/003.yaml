theological_decisions:
- issue: Nature of δαιμόνιον in narrative context
  chosen_reading: the term denotes a personal hostile spiritual being ('demon')
  alternative_readings:
  - evil spirit
  rationale: The narrative presents an active supernatural agent that smells, flees,
    and is bound by an angel. 'Demon' best matches the text without softening the
    supernatural claim.
  doctrine_reference: Translation philosophy §1, §6
- issue: Geographical force of εἰς τὰ ἀνώτατα Αἰγύπτου
  chosen_reading: retain a relatively literal expression rather than resolve it to
    a technical place-name
  alternative_readings:
  - to Upper Egypt
  rationale: The Greek wording can suggest the upper/farthest region of Egypt, possibly
    Upper Egypt, but the source does not require a formal toponym. Preserving the
    literal phrase avoids over-specification.
  doctrine_reference: Translation philosophy §3, §5
