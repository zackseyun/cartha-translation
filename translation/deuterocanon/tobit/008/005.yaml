translation:
  text: And Tobiah began to say, “Blessed are you, O God of our fathers, and blessed
    is your holy and glorious name forever; may the heavens and all your creation
    bless you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all your creation.' The Greek phrase can refer broadly to everything
      God has made, not only living beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξατο ... λέγειν
  chosen: began to say
  alternatives:
  - began saying
  - began to speak
  lexicon: BDAG
  rationale: A standard idiom combining ἄρχομαι with an infinitive. 'Began to say'
    is natural English and preserves the narrative onset of Tobiah's prayer.
- source_word: Εὐλογητὸς
  chosen: Blessed
  alternatives:
  - Praised
  lexicon: BDAG
  rationale: In direct address to God, εὐλογητός is conventionally and accurately
    rendered 'Blessed.' 'Praised' is possible but loses the liturgical resonance of
    the blessing formula.
- source_word: ὁ θεὸς τῶν πατέρων ἡμῶν
  chosen: O God of our fathers
  alternatives:
  - the God of our fathers
  - God of our ancestors
  lexicon: BDAG
  rationale: The article is naturally absorbed in English vocative style. 'Fathers'
    is retained rather than 'ancestors' to match the masculine familial wording of
    the Greek and the project's gender-accurate policy.
- source_word: τὸ ὄνομά σου τὸ ἅγιον καὶ ἔνδοξον
  chosen: your holy and glorious name
  alternatives:
  - your name, holy and glorious
  - your sacred and glorious name
  lexicon: BDAG
  rationale: This keeps both attributive adjectives and reads smoothly in English.
    'Holy' is preferred over 'sacred' as the more standard biblical equivalent for
    ἅγιος.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: The idiom denotes enduring perpetuity. 'Forever' is idiomatic modern
    English and fits the prayer context without unnecessary archaism.
- source_word: εὐλογησάτωσάν σε
  chosen: may ... bless you
  alternatives:
  - let ... bless you
  lexicon: BDAG
  rationale: The aorist imperative in a benedictory/jussive setting is best rendered
    with 'may,' which sounds natural in English prayer language.
- source_word: οἱ οὐρανοὶ
  chosen: the heavens
  alternatives:
  - heaven
  lexicon: BDAG
  rationale: The Greek is plural, and 'the heavens' preserves the elevated biblical
    diction better than flattening to singular.
- source_word: πᾶσαι αἱ κτίσεις σου
  chosen: all your creatures
  alternatives:
  - all your creation
  - all created things of yours
  lexicon: BDAG
  rationale: κτίσεις can denote created beings/things. In parallel with 'the heavens'
    as praising God, 'all your creatures' gives a personal, worship-capable sense
    that suits the prayer, while remaining broad enough to include the whole created
    order.
