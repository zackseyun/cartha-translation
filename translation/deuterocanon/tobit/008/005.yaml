theological_decisions:
- issue: Gendered ancestral language in prayer formula
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Greek explicitly has πατέρων. Per project policy, gender-accurate
    language is preferred over neutralizing the expression, especially in a traditional
    covenantal formula.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Scope of κτίσεις in cosmic praise
  chosen_reading: all your creatures
  alternative_readings:
  - all your creation
  rationale: The verse depicts cosmic blessing directed toward God. 'Creatures' preserves
    the plural noun and the sense of created beings/things offering praise, without
    making a stronger doctrinal claim than the text itself.
