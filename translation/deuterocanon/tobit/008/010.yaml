  - 853
  confidence: high
  validation: minor_mismatch
translation:
  text: And Raguel got up, went and dug a grave, saying, “Perhaps he too may die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “lest perhaps he too die.” The Greek expresses Raguel’s
      fear that Tobias might die like the previous bridegrooms.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  chosen: got up
  alternatives:
  - rose
  - stood up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι here introduces the next action in straightforward
    narrative sequence. 'Got up' is natural modern English and preserves the physical
    movement without sounding overly formal.
- source_word: ἐπορεύθη
  chosen: went out
  alternatives:
  - went
  - departed
  lexicon: BDAG
  rationale: The verb means 'went' or 'traveled'; in context Raguel leaves the room/house
    to dig the grave, so 'went out' makes the implied movement clearer in idiomatic
    English without adding substantial content.
- source_word: ὤρυξεν
  chosen: dug
  alternatives:
  - excavated
  lexicon: BDAG
  rationale: The common narrative sense is literal digging. 'Dug' is the plain, accurate
    English equivalent.
- source_word: τάφον
  chosen: a grave
  alternatives:
  - a tomb
  - a burial place
  lexicon: BDAG
  rationale: τάφος can denote grave or tomb. Since the verb is 'dug,' 'grave' fits
    the immediate action better than 'tomb,' which in English can suggest a constructed
    burial chamber.
- source_word: Μὴ καὶ
  chosen: Perhaps
  alternatives:
  - Lest perhaps
  - What if
  lexicon: BDAG
  rationale: This combination introduces anxious apprehension in direct speech. 'Perhaps'
    captures the fearful possibility in concise, natural English; 'lest perhaps' is
    more literal but awkward in contemporary style.
- source_word: οὗτος
  chosen: he too
  alternatives:
  - this one also
  - this man too
  lexicon: BDAG
  rationale: The demonstrative refers to Tobias as another possible victim like the
    previous husbands. 'He too' conveys the comparative force of καί naturally.
- source_word: ἀποθάνῃ
  chosen: may die
  alternatives:
  - might die
  - should die
  lexicon: BDAG
  rationale: Aorist subjunctive after μή καί expresses feared possibility. 'May die'
    preserves the uncertainty and apprehensive tone.
