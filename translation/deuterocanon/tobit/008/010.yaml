id: TOB.8.10
reference: Tobit 8:10
source:
  edition: lxx-swete-1909
  text: καὶ ἀναστὰς Ῥαγουὴλ ἐπορεύθη καὶ ὤρυξεν τάφον, λέγων Μὴ καὶ οὗτος ἀποθάνῃ.
  language: Greek
  pages:
