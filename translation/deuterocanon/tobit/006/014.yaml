id: TOB.6.14
reference: Tobit 6:14
source:
  edition: lxx-swete-1909
  text: τότε εἶπεν τὸ παιδάριον τῷ ἀγγέλῳ Ἀζαρία ἀδελφέ, ἀκήκοα ἐγὼ τὸ κοράσιον δεδόσθαι
    ἑπτὰ ἀνδράσιν, καὶ πάντας ἐν τῷ νυμφῶνι ἀποκωλῦσαι.
  language: Greek
