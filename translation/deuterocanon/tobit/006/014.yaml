theological_decisions:
- issue: How explicitly to render the fate of Sarah's previous husbands from the compressed
    Greek wording
  chosen_reading: Render ἀποκωλῦσαι non-fatally as 'were kept away' in the main text
  alternative_readings:
  - were killed
  - perished
  - were prevented from approaching her
  rationale: The immediate Greek wording uses a verb of hindering/preventing rather
    than a direct verb of killing. Since the broader story explains that the demon
    kills the husbands, the translator could make that explicit, but doing so would
    import information not stated in this clause. The main text therefore preserves
    the wording's restraint, while a footnote records the contextual implication.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not import claims the text does not make.'
