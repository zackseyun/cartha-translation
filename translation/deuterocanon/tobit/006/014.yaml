translation:
  text: Then the young man said to the angel, “Azariah, brother, I have heard that
    the girl has been given to seven men, and that all of them were kept away in the
    bridal chamber.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to seven husbands.” The Greek says “to seven men,” but the marriage
      context may justify the more specific sense.
    reason: lexical_alternative
  - marker: b
    text: Literally “all of them in the bridal chamber were prevented/kept away.”
      In context, this refers to the previous bridegrooms being unable to complete
      the marriage because they died there.
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ παιδάριον
  chosen: the young man
  alternatives:
  - the boy
  - the youth
  lexicon: LSJ
  rationale: Although παιδάριον can mean 'little child' or 'boy,' in context Tobias
    is a marriageable traveler speaking seriously about taking a wife. 'Young man'
    fits the narrative situation better than the more childish 'boy' while remaining
    faithful to the diminutive term.
- source_word: τῷ ἀγγέλῳ
  chosen: to the angel
  alternatives:
  - to the messenger
  lexicon: LSJ
  rationale: In Tobit the figure is in fact an angelic being, and ἄγγελος normally
    bears that sense here. 'Angel' is the plain contextual rendering.
- source_word: ἀδελφέ
  chosen: brother
  alternatives:
  - friend
  - kinsman
  lexicon: LSJ
  rationale: Vocative ἀδελφέ is retained as 'brother' to preserve the direct form
    of address. It may function warmly rather than literally, but the source wording
    should remain visible.
- source_word: ἀκήκοα
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: LSJ
  rationale: The perfect form naturally conveys a present state resulting from hearing;
    'I have heard' preserves that nuance better than a simple past.
- source_word: τὸ κοράσιον
  chosen: the girl
  alternatives:
  - the maiden
  - the young woman
  lexicon: LSJ
  rationale: κοράσιον denotes a girl or young woman. 'The girl' is natural modern
    English and matches the likely age/status without sounding archaic.
- source_word: δεδόσθαι
  chosen: has been given
  alternatives:
  - has been married
  - has been given in marriage
  lexicon: LSJ
  rationale: The perfect infinitive of δίδωμι in marriage context means 'to be given'
    as a wife. 'Has been given' stays close to the Greek; the marital sense is clear
    from context.
- source_word: ἑπτὰ ἀνδράσιν
  chosen: to seven men
  alternatives:
  - to seven husbands
  lexicon: LSJ
  rationale: ἀνήρ can mean 'man' or 'husband.' Here the men are successive marriage
    partners, so 'husbands' is interpretive. 'Men' keeps closer to the wording while
    the marriage context remains evident.
- source_word: πάντας
  chosen: all of them
  alternatives:
  - every one of them
  - them all
  lexicon: LSJ
  rationale: This straightforwardly refers to the seven men already mentioned; 'all
    of them' is clear and idiomatic.
- source_word: ἐν τῷ νυμφῶνι
  chosen: in the bridal chamber
  alternatives:
  - in the marriage chamber
  - in the bride-room
  lexicon: LSJ
  rationale: νυμφών refers to the bridal room or marriage chamber. 'Bridal chamber'
    is standard, clear English.
- source_word: ἀποκωλῦσαι
  chosen: were kept away
  alternatives:
  - were hindered
  - were prevented
  - were cut off
  lexicon: LSJ
  rationale: The infinitive here is textually and syntactically compressed, but the
    sense is that the seven men were prevented from consummating the marriage because
    they died in the chamber. 'Were kept away' preserves the immediate lexical force
    without over-specifying the cause in the main text.
