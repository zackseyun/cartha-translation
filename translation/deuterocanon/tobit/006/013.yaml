theological_decisions:
- issue: Legal force of Raguel's obligation under Mosaic law
  chosen_reading: Raguel cannot give Sarah to another man without violating the law
    and becoming liable to death.
  alternative_readings:
  - Raguel will not give her to another man according to the law of Moses
  - Raguel knows the law and therefore simply will not choose another husband
  rationale: The Greek wording with κατὰ τὸν νόμον Μωυσῆ after emphatic negation is
    potentially awkward if rendered woodenly. The following clause 'or he will incur
    death' shows the sense is legal violation, not compliance. The translation therefore
    makes the implied force explicit while remaining anchored in the Greek.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source sense over inherited English phrasing.'
