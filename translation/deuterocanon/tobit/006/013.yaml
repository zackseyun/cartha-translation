id: TOB.6.13
reference: Tobit 6:13
source:
  edition: lxx-swete-1909
  text: καὶ νῦν ἄκουσόν μου καὶ λαλήσω τῷ πατρί αὐτῆς, καὶ ὅταν ὑποστρέψωμεν ἐκ Ῥάγων,
    ποιήσωμεν τὸν γάμον. διότι ἐπίσταμαι Ῥαγουὴλ ὅτι οὐ μὴ δῷ αὐτὴν ἀνδρὶ ἑτέρῳ κατὰ
    τὸν νόμον Μωυσῆ, ἢ ὀφειλέσει θάνατον, ὅτι τὴν κληρονομίαν σοὶ καθήκει λαβεῖν ἢ
    πάντα ἄνθρωπον.
  language: Greek
  pages:
  - 832
  - 835
  - 842
  - 843
  - 844
  - 845
  - 846
  - 847
  - 848
  - 849
  confidence: high
  validation: agree
translation:
  text: And now listen to me, and I will speak to her father; and when we return from
    Rages, we will arrange the marriage. For I know that Raguel will certainly not
    give her to another man contrary to the law of Moses, or he will incur death,
    because it is fitting for you to receive the inheritance rather than any other
    man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'according to the law of Moses'; in context the sense
      is that giving her to another man would violate that law and make Raguel liable
      to death.
    reason: lexical_alternative
  - marker: b
    text: Greek literally, 'because it is fitting for you to receive the inheritance
      than every man,' an idiomatic way of saying that you have the prior claim over
      any other man.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄκουσόν
  chosen: listen
  alternatives:
  - hear
  - listen to
  lexicon: BDAG
  rationale: Imperative of ἀκούω here calls for attentive heed rather than mere auditory
    reception; 'listen to me' is idiomatic modern English and preserves the direct
    appeal.
- source_word: λαλήσω
  chosen: I will speak
  alternatives:
  - I will tell
  - I will talk
  lexicon: BDAG
  rationale: Future of λαλέω is straightforwardly 'speak.' 'Tell' would slightly over-specify
    content; 'speak to her father' stays close to the Greek.
- source_word: ὑποστρέψωμεν
  chosen: we return
  alternatives:
  - we turn back
  - we come back
  lexicon: BDAG
  rationale: 'The aorist subjunctive with ὅταν gives a future contingency: ''when
    we return.'' This is natural English and preserves the temporal sense.'
- source_word: ποιήσωμεν τὸν γάμον
  chosen: we will arrange the marriage
  alternatives:
  - we will make the marriage
  - we will celebrate the wedding
  lexicon: BDAG
  rationale: Literally 'do/make the marriage,' an idiom for carrying out marriage
    arrangements or the wedding. 'Arrange the marriage' best captures the sense without
    wooden English; 'celebrate the wedding' is possible but slightly narrower.
- source_word: οὐ μὴ δῷ
  chosen: will certainly not give
  alternatives:
  - will by no means give
  - will never give
  lexicon: BDAG
  rationale: οὐ μή with subjunctive is emphatic negation. 'Will certainly not give'
    preserves the force in readable modern English.
- source_word: ἀνδρὶ ἑτέρῳ
  chosen: to another man
  alternatives:
  - to a different husband
  - to another husband
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband.' Since the giving in marriage is prospective,
    'another man' is the more literal and less interpretively loaded choice, while
    still implying marriage contextually.
- source_word: κατὰ τὸν νόμον Μωυσῆ
  chosen: contrary to the law of Moses
  alternatives:
  - according to the law of Moses
  - in accordance with the law of Moses
  lexicon: BDAG
  rationale: With the negative clause, the sense is that Raguel cannot give her to
    another man without violating Mosaic law. Rendering it as 'contrary to' makes
    explicit the force required by the context; a more literal 'according to' in English
    could mislead.
- source_word: ὀφειλέσει θάνατον
  chosen: he will incur death
  alternatives:
  - he will owe death
  - he will be liable to death
  lexicon: BDAG
  rationale: The idiom expresses liability to the death penalty. 'Incur death' is
    concise and natural; 'be liable to death' is also possible but slightly more legalistic.
- source_word: τὴν κληρονομίαν
  chosen: the inheritance
  alternatives:
  - her inheritance
  - the estate
  lexicon: BDAG
  rationale: κληρονομία denotes inheritance/property rights. The Greek has the article
    without an explicit possessive; 'the inheritance' preserves the wording while
    the context makes clear whose inheritance is meant.
- source_word: σοὶ καθήκει λαβεῖν
  chosen: it is fitting for you to receive
  alternatives:
  - it belongs to you to receive
  - it is your right to take
  - it is proper for you to receive
  lexicon: BDAG
  rationale: καθήκει conveys what is proper, fitting, or due. 'It is fitting for you
    to receive' preserves both propriety and entitlement without overstating legal
    technicality.
- source_word: ἢ πάντα ἄνθρωπον
  chosen: rather than any other man
  alternatives:
  - more than every man
  - than anyone else
  lexicon: BDAG
  rationale: The transmitted Greek is somewhat awkward literally ('than every man').
    In context the comparative sense is that Tobias has prior claim over any other
    eligible male. 'Rather than any other man' conveys the intended contrast clearly.
