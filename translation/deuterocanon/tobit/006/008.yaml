theological_decisions:
- issue: Nature of the verse's claim about demonic oppression and ritual remedy
  chosen_reading: Render the statement straightforwardly as the narrative's instruction,
    without softening its supernatural language or recasting it as merely medical
    symbolism.
  alternative_readings:
  - Interpret the language as purely folkloric or symbolic in translation
  rationale: The Greek plainly presents a demon/evil spirit troubling a person and
    the smoking of the organs as the prescribed remedy. The translation should reflect
    the text's own worldview without importing modern skepticism or doctrinal embellishment.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gender expression in ἀνθρώπου ἢ γυναικός
  chosen_reading: Preserve the explicit 'man or woman' wording in the main text.
  alternative_readings:
  - any person
  rationale: The source text explicitly distinguishes male and female rather than
    using only a generic term. Per the project's gender-accurate policy, the English
    should retain that distinction.
  doctrine_reference: Translation philosophy §4
