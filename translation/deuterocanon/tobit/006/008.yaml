translation:
  text: And he said to him, “The heart and the liver—if a demon or an evil spirit
    troubles anyone, burn these as smoke before a man or a woman, and he or she will
    no longer be troubled.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “burn them” — the Greek verb refers to causing these organs to smoke
      by burning them.
    reason: lexical_alternative
lexical_decisions:
- source_word: καρδία
  chosen: heart
  alternatives:
  - inner organ
  - mind
  lexicon: BDAG
  rationale: In this context the word refers literally to the fish's organ, paired
    with the liver, not metaphorically to the seat of thought or emotion.
- source_word: ἧπαρ
  chosen: liver
  lexicon: BDAG
  rationale: Literal anatomical sense; the verse specifies ritual use of fish organs.
- source_word: ἐάν τινα ὀχλῇ
  chosen: if ... troubles anyone
  alternatives:
  - if ... afflicts anyone
  - if ... harasses anyone
  lexicon: BDAG
  rationale: ὀχλέω here denotes causing distress or molestation. 'Troubles' is natural
    modern English and broad enough to cover demonic harassment without over-specifying.
- source_word: δαιμόνιον
  chosen: demon
  alternatives:
  - evil spirit
  lexicon: BDAG
  rationale: The Greek distinguishes δαιμόνιον from πνεῦμα πονηρόν by using both terms;
    'demon' preserves that distinction in the main text.
- source_word: πνεῦμα πονηρόν
  chosen: evil spirit
  alternatives:
  - wicked spirit
  lexicon: BDAG
  rationale: A straightforward rendering of the phrase that preserves the parallel
    with δαιμόνιον without collapsing the two expressions.
- source_word: ταῦτα δὲ καπνίσαι
  chosen: burn these as smoke
  alternatives:
  - make these smoke
  - burn these
  lexicon: BDAG
  rationale: καπνίζω/καπνίσαι here refers to producing smoke by burning, which is
    the mechanism of the apotropaic action in context. 'Burn these as smoke' makes
    the action clear without paraphrasing beyond the Greek.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  - in front of
  lexicon: BDAG
  rationale: '''Before'' is concise and idiomatic in a ritual/action setting.'
- source_word: ἀνθρώπου ἢ γυναικός
  chosen: a man or a woman
  alternatives:
  - a person, whether man or woman
  lexicon: BDAG
  rationale: The Greek explicitly names both sexes rather than using a generic term
    alone. The translation preserves that gender-accurate wording.
- source_word: οὐ μηκέτι ὀχληθῇ
  chosen: will no longer be troubled
  alternatives:
  - will not be troubled any longer
  - will no longer be afflicted
  lexicon: BDAG
  rationale: οὐ μηκέτι with the passive verb gives a strong negation of future continuation.
    'Will no longer be troubled' is clear, natural, and echoes the earlier active
    use of ὀχλέω.
