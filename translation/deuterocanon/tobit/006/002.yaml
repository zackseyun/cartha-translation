translation:
  text: As they were traveling on the road, they came by evening to the Tigris River,
    and they camped there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek short text here simply says they reached the Tigris by evening
      and camped there. The longer Semitic/long-recension tradition expands the scene
      immediately with the fish episode that follows.
    reason: textual_variant
lexical_decisions:
- source_word: πορευόμενοι
  chosen: were traveling
  alternatives:
  - went
  - journeyed
  lexicon: BDAG
  rationale: The participle denotes ongoing movement. 'Were traveling' gives natural
    English while preserving the durative sense better than the simpler 'went.'
- source_word: τὴν ὁδόν
  chosen: on the road
  alternatives:
  - the way
  - the journey route
  lexicon: BDAG
  rationale: The idiom πορεύομαι τὴν ὁδόν is naturally rendered 'travel on the road'
    or 'go on the way.' 'On the road' is idiomatic modern English and keeps the concrete
    travel setting.
- source_word: ἦλθον ἑσπέρας
  chosen: came by evening
  alternatives:
  - arrived in the evening
  - came at evening
  lexicon: BDAG
  rationale: This phrase marks the time of arrival. 'By evening' is concise and natural,
    preserving the sense that evening had come when they reached the river.
- source_word: ἐπὶ τὸν Τίγριν ποταμόν
  chosen: to the Tigris River
  alternatives:
  - to the river Tigris
  - upon the Tigris River
  lexicon: BDAG
  rationale: ἐπί with motion here indicates arrival at the river. 'To the Tigris River'
    is straightforward English. The proper name is transliterated, while ποταμός is
    translated as 'River.'
- source_word: ηὐλίζοντο
  chosen: camped
  alternatives:
  - lodged
  - spent the night
  lexicon: BDAG
  rationale: The verb refers to taking lodging for the night, often in the open or
    on a journey. 'Camped' fits the travel context by the river better than the more
    generic 'lodged,' while remaining faithful to the scene.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: A simple locative adverb; 'there' is the direct and natural rendering.
