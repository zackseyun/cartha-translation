translation:
  text: And the young man did as the angel told him. Then they roasted the fish and
    ate it, and both of them traveled on until they came near Ecbatana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''until they came near Ecbatana,'' indicating approach rather than
      necessarily full arrival.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ παιδάριον
  chosen: the young man
  alternatives:
  - the boy
  - the youth
  - the child
  lexicon: BDAG
  rationale: Although παιδάριον can mean 'boy' or 'child,' in Tobit's travel narrative
    Tobias is functioning as a marriageable traveler rather than a small child. 'Young
    man' fits the immediate context better in natural English while preserving his
    youth.
- source_word: ἐποίησεν
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: BDAG
  rationale: 'A straightforward rendering of the verb in context: he did what the
    angel said. ''Did'' is idiomatic and sufficiently formal here.'
- source_word: ὡς εἶπεν αὐτῷ ὁ ἄγγελος
  chosen: as the angel told him
  alternatives:
  - as the angel said to him
  - as the angel instructed him
  lexicon: BDAG
  rationale: '''Told him'' gives clear modern English for εἶπεν αὐτῷ without overstating
    the force as a formal command. The sense is obedience to spoken instruction.'
- source_word: τὸν δὲ ἰχθὺν ὀπτήσαντες
  chosen: they roasted the fish
  alternatives:
  - having roasted the fish
  - they broiled the fish
  lexicon: BDAG
  rationale: The participle plus main verb is naturally rendered in English as a finite
    sequence. ὀπτάω refers to roasting/broiling over fire; 'roasted' is the clearest
    general choice.
- source_word: ἔφαγον
  chosen: ate it
  alternatives:
  - ate
  lexicon: BDAG
  rationale: The object is implicit from context ('the fish'). English idiom commonly
    supplies 'it' for clarity.
- source_word: ὥδευον
  chosen: traveled on
  alternatives:
  - journeyed
  - went on their way
  lexicon: BDAG
  rationale: The imperfect describes continued travel. 'Traveled on' captures the
    ongoing movement in readable modern English.
- source_word: ἀμφότεροι
  chosen: both of them
  alternatives:
  - both
  - the two of them
  lexicon: BDAG
  rationale: This explicitly preserves that the angel and Tobias continued together.
- source_word: ἕως ἤγγισαν
  chosen: until they came near
  alternatives:
  - until they approached
  - until they drew near
  lexicon: BDAG
  rationale: ἤγγισαν denotes approaching or coming near. 'Came near' is natural and
    keeps the sense without implying full arrival.
- source_word: ἐν Ἐκβατάνοις
  chosen: Ecbatana
  alternatives:
  - to Ecbatana
  - near Ecbatana
  lexicon: LSJ
  rationale: The place name is transliterated. Because ἕως ἤγγισαν already carries
    the notion of approach, the English sentence expresses proximity with 'came near
    Ecbatana.' The Greek preposition is somewhat awkward with the verb, but the overall
    sense is location near the city.
