- issue: Identification of the speaker as ὁ ἄγγελος
  chosen_reading: the angel
  alternative_readings:
  - the messenger
  rationale: Although ἄγγελος can mean 'messenger,' in Tobit this figure is explicitly
    an angelic being within the story world. Rendering 'the angel' reflects the narrative
    sense without importing extra doctrinal claims.
  doctrine_reference: Translate according to plain sense; do not import claims the
    text does not make.
