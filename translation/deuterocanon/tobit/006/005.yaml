translation:
  text: And the angel said to him, “Cut open the fish, and take the heart and the
    liver and the gall, and put them away safely.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek χολή can also be rendered 'bile.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνάτεμε
  chosen: Cut open
  alternatives:
  - Cut up
  - Dissect
  - Split open
  lexicon: LSJ
  rationale: The imperative from ἀνατέμνω means to cut up or cut open. In context,
    the angel is instructing Tobit/Tobias to open the fish so that specific organs
    can be removed. 'Cut open' is natural English and preserves the concrete action
    without sounding overly technical.
- source_word: τὸν ἰχθύν
  chosen: the fish
  alternatives:
  - this fish
  lexicon: LSJ
  rationale: Direct object with article; 'the fish' is the straightforward rendering.
- source_word: λαβὼν
  chosen: after taking
  alternatives:
  - taking
  - having taken
  lexicon: LSJ
  rationale: The aorist participle is most naturally rendered as prior action relative
    to the main imperative θὲς. 'After taking' makes the sequence explicit in idiomatic
    English.
- source_word: τὴν καρδίαν
  chosen: the heart
  lexicon: LSJ
  rationale: Standard anatomical sense; no reason to paraphrase.
- source_word: τὸ ἧπαρ
  chosen: the liver
  lexicon: LSJ
  rationale: Standard anatomical term.
- source_word: τὴν χολὴν
  chosen: the gall
  alternatives:
  - the bile
  - the gall bladder
  lexicon: LSJ
  rationale: χολή commonly means 'gall' or 'bile.' 'Gall' is the traditional and concise
    rendering, while still understandable. 'Bile' is possible, but 'gall' better matches
    the likely sense of the extracted bitter fluid/substance in this narrative setting.
    'Gall bladder' is too specific for the Greek term itself.
- source_word: θὲς
  chosen: put them away
  alternatives:
  - place them
  - set them aside
  - store them
  lexicon: LSJ
  rationale: The singular imperative 'put/place' governs the collected organs as a
    group. 'Put them away' conveys storing them for later use, which fits the immediate
    context and the following narrative.
- source_word: ἀσφαλῶς
  chosen: safely
  alternatives:
  - securely
  - carefully
  lexicon: LSJ
  rationale: ἀσφαλῶς means securely/safely. 'Safely' is idiomatic with 'put them away'
    and conveys preservation from loss or spoilage as far as the narrative intends.
