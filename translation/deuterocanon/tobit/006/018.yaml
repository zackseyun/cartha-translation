id: TOB.6.18
reference: Tobit 6:18
source:
  edition: lxx-swete-1909
  text: καὶ ὀσφρανθήσεται τὸ δαιμόνιον καὶ φεύξεται, καὶ οὐκ ἐπανελεύσεται τὸν αἰῶνα
    τοῦ αἰῶνος. ὅταν δὲ προσπορεύῃ αὐτῇ, ἐγέρθητε ἀμφότεροι καὶ βοήσατε πρὸς τὸν ἐλεήμονα
    θεόν, καὶ σώσει ὑμᾶς καὶ ἐλεήσει. μὴ φοβοῦ, ὅτι σοὶ αὔτη ἡτοίμασμένη ἦν ἀπὸ τοῦ
    αἰῶνος, καὶ σὺ αὐτὴν σώσεις, καὶ πορεύσεται μετὰ σοῦ, καὶ ὑπολαμβάνω ὅτι σοὶ ἔσται
    ἐξ αὐτῆς παιδία. καὶ ὡς ἤκουσεν Τωβείας ταῦτα, ἐφίλησεν αὐτήν, καὶ ἡ ψυχὴ αὐτοῦ
    ἐκολλήθη αὐτῇ σφόδρα.
  language: Greek
  pages:
  - 832
  - 835
  - 842
  - 843
  - 844
  - 845
  - 846
  - 847
  - 848
  - 849
  confidence: high
