theological_decisions:
- issue: Force of ἀπὸ τοῦ αἰῶνος in describing Sarah as prepared for Tobias
  chosen_reading: from eternity
  alternative_readings:
  - from of old
  - from long ago
  rationale: The Greek expression can denote remote antiquity or an eternal horizon
    depending on context. Given the solemn reassurance about divine providence in
    marriage, 'from eternity' preserves the stronger theological force while remaining
    defensible from the Greek.
  doctrine_reference: Preserve theological weight without flattening; optimal equivalence.
- issue: Meaning of 'you will save her'
  chosen_reading: deliverance from the demon's threat within the narrative
  alternative_readings:
  - general protection
  - spiritual salvation in a broader sense
  rationale: The immediate context is the demon's departure and the preservation of
    Sarah from repeated deadly attacks. The translation keeps 'save' in the text but
    understands it narratively rather than importing later doctrinal categories.
  doctrine_reference: Do not import doctrinal claims the text does not make.
