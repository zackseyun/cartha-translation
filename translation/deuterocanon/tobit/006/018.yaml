translation:
  text: Then the demon will smell it and flee, and it will never return forever. But
    when you go in to her, rise, both of you, and cry out to the merciful God, and
    he will save you and have mercy on you. Do not fear, because she had been prepared
    for you from eternity, and you will save her, and she will go with you, and I
    suppose that you will have children by her. And when Tobias heard these things,
    he kissed her, and his soul was bound to her very strongly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it will not return for ever and ever.' The Greek expression is an emphatic
      idiom for permanent non-return.
    reason: lexical_alternative
  - marker: b
    text: '''Go in to her'' is a marital idiom here, referring to approaching Sarah
      as husband to wife.'
    reason: cultural_note
  - marker: c
    text: Or, 'from of old' or 'from long ago.' The Greek can denote remote antiquity
      as well as an eternal horizon.
    reason: alternative_reading
  - marker: d
    text: '''His soul was bound to her'' is a vivid idiom for deep attachment, not
      merely momentary affection.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀσφρανθήσεται
  chosen: will smell
  alternatives:
  - will catch the smell
  - will perceive the odor
  lexicon: BDAG
  rationale: The verb literally refers to smelling or perceiving an odor. 'Will smell'
    is the most direct and natural English rendering, preserving the concrete action
    tied to the fish organs in context without overexplaining.
- source_word: τὸ δαιμόνιον
  chosen: the demon
  alternatives:
  - the evil spirit
  lexicon: BDAG
  rationale: The Greek term straightforwardly denotes a demon. 'Evil spirit' is possible,
    but 'demon' is the more precise and standard rendering here.
- source_word: οὐκ ἐπανελεύσεται τὸν αἰῶνα τοῦ αἰῶνος
  chosen: it will never return forever
  alternatives:
  - it will never return
  - it will not return for ever and ever
  lexicon: BDAG
  rationale: The phrase is emphatic, literally something like 'unto the age of the
    age.' The English keeps the force of permanent non-return. 'Never return forever'
    is slightly redundant in English, but it preserves the Greek emphasis; retained
    here for auditability.
- source_word: προσπορεύῃ αὐτῇ
  chosen: you go in to her
  alternatives:
  - you approach her
  - you come near to her
  lexicon: BDAG
  rationale: In this marriage-bed context, the phrase likely refers to approaching
    Sarah as husband to wife. 'Go in to her' preserves the idiomatic marital sense
    without becoming crude.
- source_word: ἐγέρθητε ἀμφότεροι
  chosen: rise, both of you
  alternatives:
  - get up, both of you
  lexicon: BDAG
  rationale: A direct imperative. 'Rise' fits the solemn tone better than the more
    colloquial 'get up.'
- source_word: βοήσατε πρὸς τὸν ἐλεήμονα θεόν
  chosen: cry out to the merciful God
  alternatives:
  - call upon the merciful God
  - pray to the merciful God
  lexicon: BDAG
  rationale: βοάω carries the sense of crying out or calling loudly. 'Cry out' preserves
    the urgency of the appeal better than the more generalized 'pray.'
- source_word: σώσει ὑμᾶς καὶ ἐλεήσει
  chosen: he will save you and have mercy on you
  alternatives:
  - he will rescue you and show you mercy
  lexicon: BDAG
  rationale: The pair of verbs is rendered transparently and idiomatically. 'Save'
    is retained because it is the ordinary sense and may carry both immediate and
    broader theological resonance.
- source_word: ἡτοίμασμένη ἦν ἀπὸ τοῦ αἰῶνος
  chosen: had been prepared for you from eternity
  alternatives:
  - had been made ready for you from of old
  - had been appointed for you from the age
  lexicon: BDAG
  rationale: The perfect participle with ἀπὸ τοῦ αἰῶνος indicates prior divine preparation
    extending from long ago. 'From eternity' best conveys the strong temporal expression
    in readable English, while still allowing the sense of God's long-standing purpose.
- source_word: σὺ αὐτὴν σώσεις
  chosen: you will save her
  alternatives:
  - you will preserve her
  - you will rescue her
  lexicon: BDAG
  rationale: The same verb as earlier (σώσει) is kept as 'save' for consistency. In
    context it refers to deliverance from the demon's deadly threat.
- source_word: πορεύσεται μετὰ σοῦ
  chosen: she will go with you
  alternatives:
  - she will travel with you
  lexicon: BDAG
  rationale: A simple future of going. 'Go with you' is sufficiently natural and broad.
- source_word: ὑπολαμβάνω
  chosen: I suppose
  alternatives:
  - I assume
  - I expect
  lexicon: BDAG
  rationale: The verb here marks Raphael's personal expectation or confident supposition.
    'I suppose' is a close and natural equivalent.
- source_word: ἐξ αὐτῆς παιδία
  chosen: children by her
  alternatives:
  - children from her
  - offspring by her
  lexicon: BDAG
  rationale: The phrase means children born from this union. 'Children by her' is
    idiomatic and clear.
- source_word: ἐφίλησεν αὐτήν
  chosen: he kissed her
  alternatives:
  - he embraced her with a kiss
  lexicon: BDAG
  rationale: The verb ordinarily means to kiss. The simple rendering is best.
- source_word: ἡ ψυχὴ αὐτοῦ ἐκολλήθη αὐτῇ σφόδρα
  chosen: his soul was bound to her very strongly
  alternatives:
  - his soul clung to her greatly
  - he became deeply attached to her
  lexicon: BDAG
  rationale: The expression is vivid and relational, echoing covenantal attachment
    language. 'Was bound to her very strongly' preserves the metaphor more closely
    than a flattened psychological paraphrase.
