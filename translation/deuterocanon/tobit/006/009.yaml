id: TOB.6.9
reference: Tobit 6:9
source:
  edition: lxx-swete-1909
  text: ἡ δὲ χολὴ ἐγχρῖσαι ἄνθρωπον ὃς ἔχει λευκώματα ἐν τοῖς ὀφθαλμοῖς, καὶ ἰαθήσεται.
  language: Greek
  pages:
  - 832
  - 835
  - 842
  - 843
  - 844
  - 845
  - 846
  - 847
  - 848
  - 849
  confidence: high
  validation: agree
translation:
  text: And smear the gall on a man who has white films in his eyes, and he will be
    healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bile' for 'gall.'
    reason: lexical_alternative
  - marker: b
    text: The Greek term refers to whitish eye opacities; it may describe a cataract-like
      condition, but the text does not require a precise modern medical diagnosis.
    reason: cultural_note
lexical_decisions:
- source_word: χολή
  chosen: gall
  alternatives:
  - bile
  lexicon: LSJ
  rationale: χολή denotes gall/bile. 'Gall' is the more traditional and concise English
    equivalent, while still understandable; 'bile' is possible but sounds more clinical.
    The context is medicinal use of the fish's organ/fluids.
- source_word: ἐγχρῖσαι
  chosen: apply
  alternatives:
  - anoint
  - smear on
  lexicon: LSJ
  rationale: The aorist infinitive here gives an instruction to put the substance
    onto the eyes. 'Apply' is natural modern English and fits medicinal context better
    than the more ritual-sounding 'anoint,' while remaining faithful to the action.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: LSJ
  rationale: The Greek singular ἄνθρωπον can mean a human being generally, but per
    project philosophy gender-accurate rendering is preferred where the source uses
    masculine form. Here 'a man' is a straightforward singular rendering, without
    strong contextual pressure toward an explicitly inclusive paraphrase.
- source_word: λευκώματα
  chosen: white films
  alternatives:
  - whiteness
  - white spots
  - cloudiness
  lexicon: LSJ
  rationale: λευκώματα refers to whitish opacities in the eyes, likely cataract-like
    films or spots. 'White films' communicates the visible ocular condition in accessible
    English without over-specifying a modern diagnosis such as 'cataracts.'
- source_word: ἰαθήσεται
  chosen: he will be healed
  alternatives:
  - he will be cured
  lexicon: LSJ
  rationale: The future passive of ἰάομαι means to be healed/cured. 'He will be healed'
    preserves the passive form and biblical register without sounding archaic.
