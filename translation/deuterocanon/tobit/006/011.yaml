  - 846
  - 847
  - 848
  - 849
  confidence: high
  validation: agree
translation:
  text: The angel said to the young man, “Brother, today we will lodge with Raguel.
    He is your relative, and he has a daughter named Sarah.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παιδαρίῳ
  chosen: young man
  alternatives:
  - boy
  - youth
  lexicon: LSJ
  rationale: The diminutive can mean boy or youth, but in context Tobias is old enough
    for travel and marriage; 'young man' communicates age and status naturally in
    English without sounding childish.
- source_word: Ἀδελφέ
  chosen: Brother
  alternatives:
  - brother
  - my brother
  - friend
  lexicon: LSJ
  rationale: Used as a direct address. 'Brother' preserves the familial/fraternal
    form of address in the Greek rather than flattening it to a generic term.
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: LSJ
  rationale: Standard temporal adverb; 'today' is the natural modern English equivalent.
- source_word: αὐλισθησόμεθα
  chosen: we will lodge
  alternatives:
  - we will camp
  - we will spend the night
  lexicon: LSJ
  rationale: The verb refers to stopping for the night or lodging. 'Lodge' fits the
    travel context and reads smoothly; 'camp' would over-specify outdoor lodging,
    which the context does not require.
- source_word: παρὰ Ῥαγουήλῳ
  chosen: with Raguel
  alternatives:
  - at Raguel's place
  - beside Raguel
  lexicon: LSJ
  rationale: παρά with the dative here indicates staying in someone's company/household.
    'With Raguel' is concise and idiomatic.
- source_word: συγγενής
  chosen: relative
  alternatives:
  - kinsman
  - kinsman of yours
  lexicon: LSJ
  rationale: The word denotes kinship. 'Relative' is clear modern English; 'kinsman'
    is more formal and archaic.
- source_word: θυγάτηρ
  chosen: daughter
  lexicon: LSJ
  rationale: Direct and unambiguous familial term.
- source_word: ὄνομα Σάρρα
  chosen: named Sarah
  alternatives:
  - whose name is Sarah
  lexicon: LSJ
  rationale: This is the natural English way to render the naming construction while
    preserving the sense exactly.
