id: TOB.6.11
reference: Tobit 6:11
source:
  edition: lxx-swete-1909
  text: εἶπεν ὁ ἄγγελος τῷ παιδαρίῳ Ἀδελφέ, σήμερον αὐλισθησόμεϑα παρὰ Ῥαγουήλῳ· καὶ
    αὐτὸς συγγενής σού ἐστιν, καὶ ἔστιν αὐτῷ θυγάτηρ ὄνομα Σάρρα.
  language: Greek
  pages:
  - 832
  - 835
  - 842
  - 843
  - 844
