theological_decisions:
- issue: Form of address ἀδελφέ toward the angelic companion
  chosen_reading: Rendered literally as 'brother' in direct address
  alternative_readings:
  - Rendered idiomatically as 'friend' or omitted in smoother English
  rationale: The verse does not make a theological claim about literal kinship; it
    reflects ordinary address. Still, the project favors preserving lexical transparency
    where possible, so 'brother' is kept rather than replaced with a looser social
    equivalent.
