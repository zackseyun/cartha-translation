  text: καὶ εἶπεν τὸ παιδάριον τῷ ἀγγέλῳ Ἀζαρία ἀδελφέ, τί ἐστιν τὸ ἧπαρ καὶ ἡ καρδία
    καὶ ἡ χολὴ τοῦ ἰχθύος;
