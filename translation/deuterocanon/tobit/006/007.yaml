translation:
  text: And the young man said to the angel, “Azariah, brother, what are the liver
    and the heart and the gall of the fish for?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bile of the fish.' The Greek χολή can be rendered 'gall' or 'bile.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ παιδάριον
  chosen: the young man
  alternatives:
  - the boy
  - the youth
  - the child
  lexicon: BDAG
  rationale: παιδάριον can denote a child, boy, or young servant/attendant. In Tobit’s
    narrative context this refers to Tobias, who is old enough to travel and act independently,
    so 'the young man' preserves his youth without sounding childish.
- source_word: τῷ ἀγγέλῳ
  chosen: to the angel
  alternatives:
  - to the messenger
  lexicon: BDAG
  rationale: ἄγγελος can mean 'messenger,' but within Tobit the companion is in fact
    an angelic figure, and the Greek explicitly names him as such here. 'Angel' is
    the plain contextual sense.
- source_word: Ἀζαρία
  chosen: Azariah
  rationale: Personal names are transliterated by project policy. The vocative force
    is carried in English by direct address punctuation.
- source_word: ἀδελφέ
  chosen: brother
  alternatives:
  - brother mine
  - my brother
  - friend
  lexicon: BDAG
  rationale: The Greek vocative literally means 'brother.' Here it functions as a
    respectful or familiar form of address, but the translation keeps the literal
    term rather than softening it to 'friend,' preserving the source wording and social
    tone.
- source_word: τί ἐστιν
  chosen: what are ... for?
  alternatives:
  - what is ...?
  - what do ... mean?
  lexicon: BDAG
  rationale: Although literally 'what is,' the idiom in context asks about purpose
    or use of the fish parts. Rendering it as 'what are ... for?' gives natural English
    while preserving the sense of inquiry.
- source_word: τὸ ἧπαρ
  chosen: the liver
  lexicon: BDAG
  rationale: Standard anatomical meaning.
- source_word: ἡ καρδία
  chosen: the heart
  lexicon: BDAG
  rationale: Standard anatomical meaning.
- source_word: ἡ χολή
  chosen: the gall
  alternatives:
  - the bile
  lexicon: BDAG
  rationale: χολή denotes bile/gall. 'Gall' is a traditional and concise anatomical
    rendering; 'bile' is a viable modern alternative. 'Gall' is retained here because
    the phrase 'gall of the fish' is clear and idiomatic in biblical English.
- source_word: τοῦ ἰχθύος
  chosen: of the fish
  lexicon: BDAG
  rationale: Straightforward genitive specifying that these organs belong to the fish.
