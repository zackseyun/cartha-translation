translation:
  text: And when you enter into the bridal chamber, take some of the incense ashes
    and place on them some of the fish’s heart and liver, and make smoke with them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ashes of incense.' The Greek phrase may be rendered more literally this
      way.
    reason: lexical_alternative
  - marker: b
    text: That is, produce smoke from the ashes with some of the fish’s heart and
      liver on them; the verb is more specific than simply 'burn.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νυμφῶνα
  chosen: bridal chamber
  alternatives:
  - wedding chamber
  - bridegroom's room
  lexicon: LSJ
  rationale: Refers to the room for the marriage bed/consummation. 'Bridal chamber'
    is natural modern English and preserves the matrimonial setting better than the
    less idiomatic 'wedding chamber.'
- source_word: λήμψῃ
  chosen: take
  alternatives:
  - receive
  - take up
  lexicon: BDAG
  rationale: In this instruction sequence the verb has the practical sense of taking
    hold of or obtaining an item for use. 'Take' is the clearest idiomatic rendering.
- source_word: τέφραν θυμιαμάτων
  chosen: the incense ashes
  alternatives:
  - ashes of incense
  - censer ashes
  lexicon: LSJ
  rationale: τέφρα is 'ashes'; θυμιαμάτων denotes incense/burnt aromatics. The genitive
    is best rendered naturally in English as 'the incense ashes.'
- source_word: ἐπιθήσεις
  chosen: place on them
  alternatives:
  - put on it
  - lay upon
  lexicon: BDAG
  rationale: The verb means to put/place upon. Because the Greek has ἀπό with the
    following genitives ('some of the heart and liver'), English needs an object for
    clarity; 'them' refers back to the ashes.
- source_word: ἀπὸ τῆς καρδίας καὶ τοῦ ἥπατος τοῦ ἰχθύος
  chosen: some of the fish’s heart and liver
  alternatives:
  - part of the heart and liver of the fish
  - from the fish's heart and liver
  lexicon: LSJ
  rationale: 'ἀπό here is partitive: a portion taken from the fish''s heart and liver
    is to be placed on the ashes. ''Some of'' makes that sense explicit in idiomatic
    English.'
- source_word: καπνίσεις
  chosen: make smoke with them
  alternatives:
  - burn them
  - fumigate with them
  - cause smoke to rise
  lexicon: LSJ
  rationale: The verb specifically denotes producing smoke/fumigation, not merely
    generic burning. 'Make smoke with them' preserves the ritual action without overtechnical
    wording.
