theological_decisions:
- issue: Ritual/medicinal action described by καπνίσεις
  chosen_reading: Render the action concretely as producing smoke rather than interpretively
    as exorcistic action.
  alternative_readings:
  - burn them as an offering
  - fumigate the room
  rationale: The Greek describes the physical act in this verse; the effect of the
    smoke is explained in the following context, so the translation should not import
    that result here.
