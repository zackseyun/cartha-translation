  text: ὁ δὲ ἄγγελος εἶπεν αὐτῷ Ἐπιλαβοῦ τοῦ ἰχθύος· καὶ ἐκράτησεν τὸν ἰχθὺν τὸ παιδάριον,
    καὶ ἀνέβαλεν αὐτὸν ἐπὶ τὴν γῆν.
