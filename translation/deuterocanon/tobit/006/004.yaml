translation:
  text: But the angel said to him, “Take hold of the fish.” So the boy seized the
    fish and pulled it up onto the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Take hold of the fish.” The imperative Ἐπιλαβοῦ can be rendered more
      formally that way.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελος
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In Tobit the figure is a heavenly being, so 'angel' best matches the
    narrative context rather than the more general 'messenger'.
- source_word: Ἐπιλαβοῦ
  chosen: Grab
  alternatives:
  - Take hold of
  - Seize
  lexicon: BDAG
  rationale: The aorist middle imperative calls for immediate action. 'Grab' is vivid,
    natural English and fits the urgent scene without over-paraphrasing.
- source_word: ἰχθύος / ἰχθύν
  chosen: fish
  lexicon: BDAG
  rationale: Straightforward rendering of the noun in both occurrences.
- source_word: ἐκράτησεν
  chosen: seized
  alternatives:
  - took hold of
  - caught hold of
  lexicon: BDAG
  rationale: This verb emphasizes gaining firm control. 'Seized' pairs well with the
    angel's command and preserves the force of the action.
- source_word: τὸ παιδάριον
  chosen: the boy
  alternatives:
  - the child
  - the lad
  lexicon: BDAG
  rationale: Refers to Tobias in a youthful sense. 'The boy' is idiomatic modern English
    and suitably specific in narrative style.
- source_word: ἀνέβαλεν
  chosen: threw up
  alternatives:
  - pulled up
  - dragged up
  - cast up
  lexicon: BDAG
  rationale: With ἐπὶ τὴν γῆν, the sense is moving the fish up out of the water onto
    dry ground. 'Threw up onto the land' is a natural rendering that preserves the
    upward/outward motion.
- source_word: γῆν
  chosen: the land
  alternatives:
  - the ground
  - dry land
  lexicon: BDAG
  rationale: Here it contrasts with the water's edge. 'The land' is slightly broader
    than 'ground' and fits the scene of hauling the fish ashore.
