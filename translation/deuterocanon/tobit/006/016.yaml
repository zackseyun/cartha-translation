translation:
  text: But the angel said to him, “Do you not remember the words that your father
    commanded you about taking a wife from your own kin? And now listen to me, brother,
    because she will be your wife, and pay no attention to the demon, for tonight
    she will be given to you as a wife.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'give no thought to the demon.' The Greek idiom literally says, 'have
      no word/account of the demon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μέμνησαι
  chosen: do you not remember
  alternatives:
  - have you not remembered
  - do you not recall
  lexicon: BDAG
  rationale: Perfect/middle form with present force; an idiomatic English question
    is best rendered 'Do you not remember' rather than a stiffer perfect.
- source_word: λόγων
  chosen: words
  alternatives:
  - things said
  - instructions
  lexicon: BDAG
  rationale: The noun is literally 'words'; although the content is instructional,
    'words' preserves the Greek wording while remaining natural in English.
- source_word: ἐνετείλατό
  chosen: commanded
  alternatives:
  - instructed
  - ordered
  lexicon: BDAG
  rationale: The verb denotes giving a charge or command. 'Commanded' best reflects
    the father's authoritative instruction in context.
- source_word: ὑπὲρ τοῦ λαβεῖν σε γυναῖκα
  chosen: about taking a wife
  alternatives:
  - concerning your taking a wife
  - about marrying a woman
  lexicon: BDAG
  rationale: This construction expresses the subject matter of the father's command.
    'Taking a wife' is a clear, source-near English rendering of the marriage idiom.
- source_word: ἐκ τοῦ γένους σου
  chosen: from your own kin
  alternatives:
  - from your family line
  - from your own people
  lexicon: BDAG
  rationale: γένος here refers to kinship group or family line. 'From your own kin'
    is natural English and preserves the familial sense without over-specifying tribe
    or ethnicity.
- source_word: ἄκουσόν μου
  chosen: listen to me
  alternatives:
  - hear me
  - obey me
  lexicon: BDAG
  rationale: The imperative can imply heed, but the immediate sense is attentive listening
    to the angel's reassurance. 'Listen to me' is natural and sufficient.
- source_word: ἀδελφέ
  chosen: brother
  alternatives:
  - my brother
  - friend
  lexicon: BDAG
  rationale: The vocative literally means 'brother.' In this context it functions
    as a warm direct address. Per gender-accurate policy, 'brother' is retained.
- source_word: σοὶ ἔσται εἰς γυναῖκα
  chosen: she will be your wife
  alternatives:
  - she will become your wife
  - she will be as a wife to you
  lexicon: BDAG
  rationale: The idiom indicates marital status/result. 'She will be your wife' is
    idiomatic English and captures the force without wooden literalism.
- source_word: τοῦ δαιμονίου μηδένα λόγον ἔχε
  chosen: pay no attention to the demon
  alternatives:
  - give no thought to the demon
  - have no concern about the demon
  lexicon: BDAG
  rationale: Literally 'have no word/account of the demon,' an idiom meaning not to
    regard or worry about it. 'Pay no attention to the demon' communicates the sense
    clearly in modern English.
- source_word: δαιμονίου
  chosen: demon
  alternatives:
  - evil spirit
  lexicon: BDAG
  rationale: The Greek term directly denotes a demon. 'Demon' is the most transparent
    and standard rendering.
- source_word: τὴν νύκτα ταύτην
  chosen: tonight
  alternatives:
  - this night
  lexicon: BDAG
  rationale: The temporal phrase is naturally rendered 'tonight' in contemporary English.
- source_word: δοθήσεταί σοι αὕτη εἰς γυναῖκα
  chosen: she will be given to you as a wife
  alternatives:
  - this woman will be given to you as a wife
  - she will be given to you for a wife
  lexicon: BDAG
  rationale: The passive verb should be preserved because it is explicit in the Greek.
    'She will be given to you as a wife' keeps the formal marital idiom and avoids
    flattening the passive.
