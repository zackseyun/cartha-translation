theological_decisions:
- issue: Rendering of marriage idiom and kinship obligation
  chosen_reading: The verse is translated with explicit marital language ('taking
    a wife,' 'your wife,' 'given to you as a wife') and kinship language ('from your
    own kin') without softening the arranged-marriage framework.
  alternative_readings:
  - Use more generalized language such as 'marry' and 'relative' throughout
  rationale: The Greek repeatedly uses γυναῖκα and a passive marital formula. Preserving
    these expressions reflects the social and familial framework of the text without
    importing approval or disapproval beyond the verse itself.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Reference to the supernatural threat
  chosen_reading: δαιμόνιον is rendered 'demon' in the main text.
  alternative_readings:
  - evil spirit
  rationale: The source text names a demon explicitly. Translating more vaguely as
    'evil spirit' would reduce lexical transparency and theological specificity.
  doctrine_reference: Translation philosophy §§1, 5
