translation:
  text: And she stopped weeping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek witness used here is very brief: ''And she stopped weeping.''
      A longer Semitic-related tradition for this verse continues with the journey
      narrative (''the young man went on his way ...''), but that wording is not present
      in the primary Greek text translated here.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐπαύσατο
  chosen: stopped
  alternatives:
  - ceased
  - desisted
  lexicon: BDAG
  rationale: Aorist middle of παύω here means to stop or cease an ongoing action.
    'Stopped' is natural modern English and preserves the simple verbal force without
    sounding archaic.
- source_word: κλαίουσα
  chosen: weeping
  alternatives:
  - crying
  - lamenting
  lexicon: BDAG
  rationale: Present participle of κλαίω denotes weeping/crying. 'Weeping' fits the
    solemn tone slightly better than 'crying' and matches the participial sense of
    ongoing action that has now ceased.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: The conjunction simply links this clause to the preceding context. 'And'
    is the most transparent rendering from the Greek, while still reading naturally
    in narrative.
