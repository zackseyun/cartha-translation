translation:
  text: Then the young man went down to wash himself, and a fish leaped up from the
    river and tried to swallow the young man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wanted to swallow the young man.' The Greek verb can denote intention
      or desire; the main text uses 'tried to' to express the fish's hostile action
      in idiomatic English.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ παιδάριον
  chosen: the young man
  alternatives:
  - the boy
  - the youth
  - the child
  lexicon: LSJ
  rationale: παιδάριον is a diminutive form that can denote a boy, child, or young
    attendant. In Tobit, the referent is Tobias, old enough to travel and act independently,
    so 'young man' best fits the narrative context in readable modern English without
    implying small childhood. The repeated second occurrence is rendered consistently
    the same way.
- source_word: κατέβη
  chosen: went down
  alternatives:
  - went down into
  - descended
  lexicon: LSJ
  rationale: The verb literally means 'went down' or 'descended.' 'Went down' preserves
    the concrete movement toward the water in natural English.
- source_word: περικλύσασθαι
  chosen: to wash himself
  alternatives:
  - to bathe
  - to rinse himself
  lexicon: LSJ
  rationale: The middle infinitive indicates washing oneself. 'Wash himself' is the
    clearest idiomatic rendering; 'bathe' may suggest a fuller immersion than the
    context requires.
- source_word: ἀνεπήδησεν
  chosen: leaped up
  alternatives:
  - sprang up
  - jumped up
  lexicon: LSJ
  rationale: The verb conveys a sudden upward movement. 'Leaped up' preserves the
    vividness and suits the dramatic action.
- source_word: ἰχθύς
  chosen: a fish
  alternatives:
  - the fish
  lexicon: LSJ
  rationale: The noun is anarthrous here, so 'a fish' is the most straightforward
    rendering at its first mention in this scene.
- source_word: ἀπὸ τοῦ ποταμοῦ
  chosen: from the river
  alternatives:
  - out of the river
  lexicon: LSJ
  rationale: Both are possible; 'from the river' is slightly smoother in English while
    preserving the source sense.
- source_word: ἐβουλήθη
  chosen: tried to
  alternatives:
  - wanted to
  - intended to
  lexicon: LSJ
  rationale: The verb denotes will or intention. In this narrative context, 'tried
    to' communicates hostile attempted action more naturally than the more internal
    'wanted to,' while still matching the sense of intended attack.
- source_word: καταπεῖν
  chosen: to swallow
  alternatives:
  - to devour
  - to gulp down
  lexicon: LSJ
  rationale: The compound verb means 'to swallow down.' 'Swallow' is the most direct
    and least interpretively inflated rendering; 'devour' would heighten the imagery
    beyond the lexical core.
