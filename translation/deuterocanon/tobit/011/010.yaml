  text: ἀπὸ τοῦ νῦν ἀποθανοῦμαι. καὶ ἔκλαυσαν ἀμφότεροι. καὶ Τωβεὶτ ἐξήρχετο πρὸς
    τὴν θύραν καὶ προσεκόπτεν· ὁ δὲ υἱὸς προσέδραμεν αὐτῷ,
  language: Greek
