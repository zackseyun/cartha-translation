translation:
  text: “From now on I can die.” And both of them wept. Then Tobit went out toward
    the door and stumbled, but his son ran to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “From now on I will die,” an idiom expressing that the
      speaker's longing has been fulfilled and she is ready to die in peace.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ τοῦ νῦν
  chosen: From now on
  alternatives:
  - now
  - from this time
  lexicon: LSJ
  rationale: Idiomatic temporal expression meaning 'from this point onward.' In context
    it introduces Anna's emotional declaration after seeing her son approach.
- source_word: ἀποθανοῦμαι
  chosen: I can die
  alternatives:
  - I will die
  - let me die
  lexicon: LSJ
  rationale: 'Future middle/passive form of ἀποθνῄσκω. In this emotional idiom, a
    wooden ''I will die'' sounds misleadingly predictive in English. ''I can die''
    best captures the sense of fulfilled longing: having seen this, she is ready to
    die.'
- source_word: ἔκλαυσαν
  chosen: wept
  alternatives:
  - cried
  lexicon: LSJ
  rationale: Standard rendering for κλαίω in narrative lament/rejoicing contexts;
    'wept' preserves the emotional gravity better than the more colloquial 'cried'.
- source_word: ἀμφότεροι
  chosen: both of them
  alternatives:
  - both
  lexicon: LSJ
  rationale: Explicitly marks the two persons involved. 'Both of them' is slightly
    fuller and clearer in English narrative.
- source_word: ἐξήρχετο
  chosen: went out
  alternatives:
  - came out
  - was going out
  lexicon: LSJ
  rationale: Imperfect of ἐξέρχομαι. 'Went out' gives the narrative movement naturally
    in English; the imperfect nuance is carried by the flow of the sentence rather
    than forced into awkward aspect.
- source_word: πρὸς τὴν θύραν
  chosen: toward the door
  alternatives:
  - to the door
  lexicon: LSJ
  rationale: πρός with accusative can indicate movement toward. 'Toward the door'
    preserves the directional nuance and fits the scene of Tobit's impaired movement.
- source_word: προσεκόπτεν
  chosen: stumbled
  alternatives:
  - stumbled against something
  - was stumbling
  lexicon: LSJ
  rationale: From προσκόπτω, 'to strike against, stumble.' 'Stumbled' is the clearest
    idiomatic English and suits Tobit's blindness in the immediate context.
- source_word: προσέδραμεν
  chosen: ran to him
  alternatives:
  - ran up to him
  - hurried to him
  lexicon: LSJ
  rationale: Aorist of προστρέχω/prosdram- form, indicating quick movement toward
    someone. 'Ran to him' is direct and natural.
