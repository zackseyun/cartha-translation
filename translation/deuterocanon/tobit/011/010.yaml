theological_decisions:
- issue: Emotional idiom in ἀποθανοῦμαι
  chosen_reading: Rendered as 'I can die' rather than a strictly predictive 'I will
    die.'
  alternative_readings:
  - I will die
  - Now I may die
  rationale: This is not a doctrinally loaded phrase but an interpretive decision
    about idiom. The context is joyful reunion, so the line expresses fulfilled desire
    rather than an announcement of imminent death.
  doctrine_reference: Translation philosophy §1, §6
- issue: Narrative subject continuity
  chosen_reading: Kept the Greek sequence as given, with Tobit as the one who went
    out and stumbled.
  alternative_readings:
  - Some longer-recension traditions differ in surrounding details of who speaks and
    how the reunion unfolds.
  rationale: The project translates Swete's Vaticanus-based Greek as the primary witness
    for deuterocanonical books. No change is made here beyond natural English rendering.
  doctrine_reference: 'PHILOSOPHY.md: Swete LXX as primary Greek source for deuterocanonical
    books'
