translation:
  text: But take the fish’s gall in your hand. And they went on, and the dog followed
    behind them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the fish’s bile.' The Greek χολή can denote gall or bile; 'gall' is
      retained as the main text rendering.
    reason: lexical_alternative
  - marker: b
    text: The parallel Semitic-form tradition for this scene is much fuller and focuses
      on Tobiah applying the fish’s gall to his father’s eyes; the shorter Greek wording
      here is followed for the main text.
    reason: alternative_reading
lexical_decisions:
- source_word: λάβε
  chosen: take
  alternatives:
  - receive
  - pick up
  lexicon: BDAG
  rationale: Aorist imperative of λαμβάνω; 'take' is the natural direct command in
    English and fits the immediate practical instruction.
- source_word: παρὰ χεῖρα
  chosen: in your hand
  alternatives:
  - at hand
  - by the hand
  lexicon: LSJ
  rationale: The idiom here most naturally means to have or hold something in hand,
    not to lead by the hand. Given the object is the fish's gall, 'in your hand' best
    conveys the practical sense.
- source_word: χολὴν τοῦ ἰχθύος
  chosen: the fish’s gall
  alternatives:
  - the gall of the fish
  - the fish's bile
  lexicon: LSJ
  rationale: χολή can mean 'gall' or 'bile.' 'Gall' is the more traditional and concise
    rendering, and in this narrative context it refers to the medicinal substance
    taken from the fish. The possessive English construction is natural.
- source_word: ἐπορεύθησαν
  chosen: they went on
  alternatives:
  - they went
  - they traveled on
  lexicon: BDAG
  rationale: A simple narrative movement verb. 'Went on' preserves the sense of continuing
    the journey without overtranslating.
- source_word: συνῆλθεν
  chosen: came along
  alternatives:
  - followed
  - went with
  lexicon: BDAG
  rationale: From συνέρχομαι, literally 'came together/with.' In context with ὀπίσωθεν
    αὐτῶν, it describes accompanying movement. 'Came along' is idiomatic and preserves
    the dog's joining them without implying a more technical or formal action.
- source_word: ὁ κύων
  chosen: the dog
  lexicon: BDAG
  rationale: Straightforward noun; the article indicates the known dog already present
    in the story.
- source_word: ὀπίσωθεν αὐτῶν
  chosen: behind them
  alternatives:
  - after them
  lexicon: LSJ
  rationale: Spatial adverbial expression indicating position in following behind
    the travelers.
