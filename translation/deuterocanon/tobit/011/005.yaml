translation:
  text: And Anna sat watching the road for her son,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'watching the road, her son,' a compressed expression meaning
      that she was watching the road for her son's return.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάθητο
  chosen: sat
  alternatives:
  - was sitting
  - remained seated
  lexicon: LSJ
  rationale: Imperfect middle/deponent of κάθημαι, describing Anna's ongoing posture.
    'Sat' is idiomatic in English here while still allowing the participle to carry
    the continuing action.
- source_word: περιβλεπομένη
  chosen: watching
  alternatives:
  - looking around
  - scanning
  - looking out
  lexicon: LSJ
  rationale: The participle conveys attentive, searching looking. 'Watching' best
    captures the expectant sense in context without overtranslating. 'Looking around'
    is too spatially diffuse; the following phrase specifies the direction of her
    gaze.
- source_word: εἰς τὴν ὁδόν
  chosen: the road
  alternatives:
  - the way
  - the path
  lexicon: LSJ
  rationale: ὁδός here refers to the route by which her son would return. 'Road' is
    the most natural modern English rendering in this narrative setting; 'way' could
    sound abstract.
- source_word: τὸν παῖδα αὐτῆς
  chosen: for her son
  alternatives:
  - her child
  - toward her son
  - for her boy
  lexicon: LSJ
  rationale: παῖς can mean child, boy, or son depending on context. Since Tobiah is
    specifically her male child and an adult son returning from travel, 'son' is the
    clearest contextual rendering. The Greek construction is compressed; in English,
    'watching the road for her son' expresses the sense naturally.
