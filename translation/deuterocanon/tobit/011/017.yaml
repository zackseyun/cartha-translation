theological_decisions:
- issue: Sense of ἐξωμολογεῖτο in relation to God
  chosen_reading: public thanksgiving/praise
  alternative_readings:
  - confession
  rationale: The content clause 'that God had shown them mercy' indicates grateful
    acknowledgment of divine action, not admission of wrongdoing.
  doctrine_reference: Translation philosophy §1, §6
- issue: Retention of the abrupt final phrase 'and your father and your mother'
  chosen_reading: preserved in main text as a literal continuation
  alternative_readings:
  - understood elliptically as part of the blessing, e.g. 'and blessed be your father
    and your mother'
  rationale: The Greek witness in Zone 1 includes the phrase without an explicit repeated
    verb. To avoid importing wording not present in the source, the translation keeps
    the phrase as transmitted and notes the syntactic abruptness.
  doctrine_reference: Translation philosophy §1, §3
