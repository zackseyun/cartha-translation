  - 858
  - 859
  confidence: high
  validation: minor_mismatch
translation:
  text: And Tobit gave thanks before them that God had shown them mercy. And when
    Tobit came near to Sarah his daughter-in-law, he blessed her, saying, “May you
    come in good health, daughter. Blessed is God, who has brought you to us, and
    your father and your mother.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text ends abruptly with 'and your father and your mother.' Some
      readers may understand an implied continuation such as 'and [blessed are] your
      father and your mother,' but the verb is not stated in this witness.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξωμολογεῖτο
  chosen: gave thanks
  alternatives:
  - confessed
  - praised openly
  lexicon: LSJ
  rationale: In this context the verb is directed toward God’s merciful action and
    functions as public thanksgiving/praise rather than confession of sin. 'Gave thanks'
    is natural English and fits the clause introduced by ὅτι.
- source_word: ἠλέησεν
  chosen: had shown ... mercy
  alternatives:
  - had mercy on
  - pitied
  lexicon: LSJ
  rationale: The aorist refers to God’s merciful action toward the family. 'Shown
    mercy' preserves the theological weight of ἐλεέω while reading smoothly in English.
- source_word: καὶ ὡς ἤγγισεν
  chosen: And when ... came near
  alternatives:
  - and as ... approached
  lexicon: LSJ
  rationale: 'Temporal sense is most natural here: Tobit blesses Sarah upon approaching
    her.'
- source_word: τῇ νύμφῃ αὐτοῦ
  chosen: his daughter-in-law
  alternatives:
  - his bride
  - his son's wife
  lexicon: LSJ
  rationale: νύμφη can mean bride or daughter-in-law; here Sarah is Tobit’s son’s
    new wife, so from Tobit’s perspective 'daughter-in-law' is the precise relational
    sense.
- source_word: κατευλόγησεν
  chosen: he blessed
  alternatives:
  - he warmly blessed
  - he pronounced a blessing on
  lexicon: LSJ
  rationale: The compound verb intensifies the act of blessing, but standard English
    'blessed' adequately conveys it without overtranslation.
- source_word: Ἔλθοις ὑγιαίνουσα
  chosen: Come in good health
  alternatives:
  - May you come healthy
  - Welcome safely
  lexicon: LSJ
  rationale: The expression is idiomatic and functions as a wish/blessing for well-being
    on arrival. 'Come in good health' preserves both the motion and the blessing tone.
- source_word: θύγατερ
  chosen: daughter
  alternatives:
  - my daughter
  lexicon: LSJ
  rationale: A warm familial address from Tobit to Sarah. English can omit 'my' unless
    supplied by the Greek.
- source_word: εὐλογητὸς ὁ θεός
  chosen: Blessed is God
  alternatives:
  - God is blessed
  - Praise be to God
  lexicon: LSJ
  rationale: This is the standard blessing formula. 'Blessed is God' stays close to
    the Greek while remaining idiomatic.
- source_word: ὃς ἤγαγέν σε πρὸς ἡμᾶς
  chosen: who has brought you to us
  alternatives:
  - who brought you to us
  lexicon: LSJ
  rationale: 'English present perfect works well for a completed action with present
    result: Sarah is now with the family.'
- source_word: καὶ ὁ πατήρ σου καὶ ἡ μήτηρ σου
  chosen: and your father and your mother
  alternatives:
  - as well as your father and your mother
  lexicon: LSJ
  rationale: The Greek as transmitted simply appends this phrase. A literal rendering
    preserves the source, even though the syntax is somewhat abrupt in English.
