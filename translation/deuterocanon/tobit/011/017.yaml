id: TOB.11.17
reference: Tobit 11:17
source:
  edition: lxx-swete-1909
  text: καὶ Τωβεὶτ ἐξωμολογεῖτο ἐνώπιον αὐτῶν ὅτι ἠλέησεν αὐτοὺς ὁ θεός. καὶ ὡς ἤγγισεν
    Τωβεὶτ Σάρρᾳ τῇ νύμφῃ αὐτοῦ, κατευλόγησεν αὐτὴν λέγων Ἔλθοις ὑγιαίνουσα, θύγατερ·
    εὐλογητὸς ὁ θεός, ὃς ἤγαγέν σε πρὸς ἡμᾶς, καὶ ὁ πατήρ σου καὶ ἡ μήτηρ σου.
  language: Greek
  pages:
