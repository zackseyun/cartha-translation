id: TOB.11.18
reference: Tobit 11:18
source:
  edition: lxx-swete-1909
  text: καὶ ἐγένετο χαρὰ πᾶσι τοῖς ἐν Νινευὴ ἀδελφοῖς αὐτοῦ. καὶ παρεγένετο Ἀχιάχαρος
    καὶ Νασβὰς ὁ ἐξάδελφος αὐτοῦ,
  language: Greek
  pages:
  - 832
  - 835
  - 854
  - 855
  - 856
  - 857
  - 858
  - 859
  confidence: high
  validation: minor_mismatch
translation:
  text: And there was joy for all his brothers in Nineveh. And Ahikar came, and Nasbas
    his cousin,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his relatives' or 'his kindred'; Greek 'his brothers' can refer more
      broadly to kin.
    reason: lexical_alternative
  - marker: b
    text: The Greek text ends this verse with 'and Nasbas his cousin,' continuing
      directly into the next verse.
    reason: textual_variant
lexical_decisions:
- source_word: ἐγένετο
  chosen: there was
  alternatives:
  - came to be
  - happened
  lexicon: BDAG
  rationale: Idiomatic English for the existential use of γίνομαι here; it introduces
    the resulting state of joy rather than emphasizing the process of becoming.
- source_word: χαρὰ
  chosen: joy
  alternatives:
  - rejoicing
  - gladness
  lexicon: BDAG
  rationale: '''Joy'' is the most natural singular abstract noun in English and fits
    the clause''s summary statement of communal happiness.'
- source_word: πᾶσι
  chosen: all
  alternatives:
  - everyone among
  lexicon: BDAG
  rationale: Retains the comprehensive force of the dative plural with concise English
    phrasing.
- source_word: τοῖς ἐν Νινευὴ
  chosen: in Nineveh
  alternatives:
  - who were in Nineveh
  - living in Nineveh
  lexicon: BDAG
  rationale: The prepositional phrase is locative; 'in Nineveh' preserves the sense
    without over-expanding.
- source_word: ἀδελφοῖς αὐτοῦ
  chosen: his brothers
  alternatives:
  - his kindred
  - his relatives
  - his brethren
  lexicon: BDAG
  rationale: The Greek literally says 'brothers.' In this narrative context it can
    denote kin or fellow Jews more broadly, but the project's gender-accurate policy
    favors the literal rendering in the main text, with broader alternatives preserved
    in a footnote.
- source_word: παρεγένετο
  chosen: came
  alternatives:
  - arrived
  - was present
  lexicon: BDAG
  rationale: A straightforward narrative verb of arrival/presence; 'came' is simple
    and natural in sequence with the preceding clause.
- source_word: Ἀχιάχαρος
  chosen: Ahikar
  alternatives:
  - Achiacharus
  - Ahiakar
  lexicon: LSJ
  rationale: Standard English transliteration of the proper name, avoiding an overly
    Greek-looking form while remaining recognizable in Tobit tradition.
- source_word: Νασβὰς
  chosen: Nasbas
  alternatives:
  - Nadab
  - Nabas
  lexicon: LSJ
  rationale: Direct transliteration of the Greek form in Swete/Vaticanus. Because
    proper-name forms vary across Tobit witnesses, the Greek-source form is retained
    in the main text.
- source_word: ὁ ἐξάδελφος αὐτοῦ
  chosen: his cousin
  alternatives:
  - his kinsman
  lexicon: BDAG
  rationale: ἐξάδελφος specifically denotes a cousin rather than a vague relative,
    so the more precise English term is preferred.
