    can extend to kin or compatriots, but there is no doctrinal pressure here, and
    the translation philosophy prefers gender-accurate renderings that match the source
    form. A footnote preserves the broader kinship sense as a possible nuance.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
