translation:
  text: And Raphael said, “I know that your father will open his eyes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your father will regain his sight.' The Greek literally says, 'will
      open his eyes,' an idiom for the restoration of sight.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπίσταμαι
  chosen: I know
  alternatives:
  - I understand
  - I am certain
  lexicon: BDAG
  rationale: The verb expresses knowledge or certainty. 'I know' is the most direct
    and natural English equivalent here, preserving Raphael's confident assertion
    without adding interpretive force.
- source_word: ἀνοίξει
  chosen: will open
  alternatives:
  - will be opened
  - will regain the use of
  lexicon: BDAG
  rationale: The active future verb is straightforwardly 'will open.' In context it
    refers to the restoration of sight, but the Greek keeps the idiom 'open the eyes,'
    so the translation preserves that wording rather than paraphrasing it as 'regain
    sight.'
- source_word: τοὺς ὀφθαλμούς
  chosen: his eyes
  alternatives:
  - the eyes
  lexicon: BDAG
  rationale: Although the Greek literally has 'the eyes,' English idiom normally requires
    the possessive with body parts in this construction. 'His eyes' makes explicit
    the reference to Tobit's eyes while remaining faithful to the sense.
- source_word: ὁ πατήρ σου
  chosen: your father
  alternatives:
  - your parent
  lexicon: BDAG
  rationale: The phrase plainly refers to Tobit's father. 'Your father' is the natural
    and accurate rendering.
- source_word: Ῥαφαήλ
  chosen: Raphael
  alternatives:
  - Rafael
  rationale: Personal names are transliterated by standard convention. 'Raphael' is
    the established English transliteration of Ῥαφαήλ.
