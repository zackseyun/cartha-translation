theological_decisions:
- issue: Idiomatic expression for healing of blindness
  chosen_reading: Preserve the literal idiom 'open his eyes' in the main text
  alternative_readings:
  - your father will regain his sight
  - your father's eyes will be opened
  rationale: The Greek uses the active idiom 'open the eyes,' which in context refers
    to healing, but the text itself does not yet spell out 'sight.' Preserving the
    idiom maintains closeness to the source and leaves the narrative effect intact.
  doctrine_reference: Translation philosophy §§1, 3, 6
