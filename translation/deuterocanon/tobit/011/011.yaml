id: TOB.11.11
reference: Tobit 11:11
source:
  edition: lxx-swete-1909
  text: καὶ ἐπελάβετο τοῦ πατρὸς αὐτοῦ, καὶ προσέπασεν τὴν χολὴν ἐπὶ τοὺς ὀφθαλμοὺς
    τοῦ πατρὸς αὐτοῦ λέγων
  language: Greek
  pages:
  - 832
  - 835
  - 854
  - 855
  - 856
  - 857
  - 858
  - 859
  confidence: high
  validation: agree
translation:
  text: And he took hold of his father and applied the gall to his father’s eyes,
    saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπελάβετο
  chosen: took hold of
  alternatives:
  - laid hold of
  - grasped
  - supported
  lexicon: BDAG
  rationale: Middle of ἐπιλαμβάνομαι commonly means to take hold of or grasp. In context
    it likely describes Tobias physically taking hold of his father before administering
    the remedy. 'Took hold of' is natural English and preserves the concrete action
    without over-interpreting it as either affectionate embrace or mere assistance.
- source_word: προσέπασεν
  chosen: applied
  alternatives:
  - spread on
  - smeared
  - put on
  lexicon: LSJ
  rationale: The verb here denotes putting or smearing something onto a surface. 'Applied'
    is idiomatic modern English for medicinal use on the eyes and avoids sounding
    either too technical or too colloquial.
- source_word: χολήν
  chosen: gall
  alternatives:
  - bile
  lexicon: LSJ
  rationale: χολή literally refers to gall/bile. 'Gall' preserves the traditional
    and literal sense, fitting the fish-gall remedy in the narrative. 'Bile' is possible
    but sounds more clinical and less literary.
- source_word: ὀφθαλμούς
  chosen: eyes
  alternatives:
  - eyeballs
  lexicon: BDAG
  rationale: Standard rendering for ὀφθαλμοί. No reason to use a more anatomical English
    term.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The present participle links directly to the following speech in the
    next verse. 'Saying' preserves the participial flow and keeps the sentence open-ended
    as in the Greek.
