  confidence: high
  validation: agree
translation:
  text: And Tobiah’s wedding was celebrated with rejoicing for seven days.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤχθη
  chosen: was celebrated
  alternatives:
  - was held
  - was conducted
  - was brought about
  lexicon: LSJ
  rationale: Aorist passive of ἄγω in the idiom of conducting or holding an event.
    In English, 'was celebrated' naturally conveys that the wedding festivities took
    place, while preserving the passive/eventive sense better than the overly literal
    'was led.'
- source_word: ὁ γάμος
  chosen: the wedding
  alternatives:
  - the marriage
  - the wedding feast
  lexicon: LSJ
  rationale: γάμος can denote marriage or wedding festivities. In this context, modified
    by 'with rejoicing' and 'for seven days,' it refers to the wedding celebration
    rather than the abstract marital union.
- source_word: Τωβεία
  chosen: Tobiah’s
  alternatives:
  - of Tobiah
  - Tobias's
  lexicon: LSJ
  rationale: 'Genitive proper name indicating possession: the wedding belonging to
    Tobiah. ''Tobiah'' follows the project''s preference to transliterate names rather
    than preserve traditional Latinized forms such as ''Tobias.'''
- source_word: μετʼ εὐφροσύνης
  chosen: with rejoicing
  alternatives:
  - with joy
  - with gladness
  - joyfully
  lexicon: LSJ
  rationale: The prepositional phrase expresses accompanying festal joy. 'With rejoicing'
    preserves the nominal form and festive tone without sounding archaic.
- source_word: ἑπτὰ ἡμέρας
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: LSJ
  rationale: Accusative of duration; 'for seven days' makes the temporal force explicit
    in natural English.
