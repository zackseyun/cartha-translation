id: TOB.11.19
reference: Tobit 11:19
source:
  edition: lxx-swete-1909
  text: καὶ ἤχθη ὁ γάμος Τωβεία μετʼ εὐφροσύνης ἑπτὰ ἡμέρας.
  language: Greek
  pages:
