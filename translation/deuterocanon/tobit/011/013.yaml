id: TOB.11.13
reference: Tobit 11:13
source:
  edition: lxx-swete-1909
  text: καὶ ἐλεπίσθη ἀπὸ τῶν κανθῶν τῶν ὀφθαλμῶν αὐτοῦ τὰ λευκώματα. καὶ ἰδὼν τὸν
    υἱὸν αὐτοῦ ἐπέπεσεν ἐπὶ τὸν τράχηλον αὐτοῦ,
  language: Greek
  pages:
  - 832
  - 835
  - 854
  - 855
  - 856
  - 857
  - 858
  - 859
  confidence: high
  validation: agree
translation:
  text: and the white films peeled away from the corners of his eyes. And when he
    saw his son, he fell on his neck,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'he threw himself around his neck'—a conventional
      expression for an emotional embrace.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεπίσθη
  chosen: peeled away
  alternatives:
  - was peeled off
  - flaked away
  - came off like scales
  lexicon: LSJ
  rationale: The verb evokes something being stripped or peeling off in flakes/scales.
    'Peeled away' is natural English and preserves the physical imagery without overcommitting
    to the more interpretive 'scales fell off.'
- source_word: κανθῶν
  chosen: corners
  alternatives:
  - angles
  - edges
  lexicon: LSJ
  rationale: In this anatomical context, the term most plausibly refers to the corners/angles
    of the eyes. 'Corners' is idiomatic modern English.
- source_word: ὀφθαλμῶν
  chosen: eyes
  lexicon: LSJ
  rationale: Standard rendering of the anatomical term.
- source_word: λευκώματα
  chosen: white films
  alternatives:
  - white spots
  - whitish layers
  - white patches
  lexicon: LSJ
  rationale: The noun refers to whitish ocular opacities. 'White films' communicates
    a visible layer over the eyes and fits the peeling imagery better than 'spots'
    or the more clinical 'opacities.'
- source_word: ἰδών
  chosen: when he saw
  alternatives:
  - seeing
  - after seeing
  lexicon: LSJ
  rationale: The participle is naturally rendered temporally in English here.
- source_word: ἐπέπεσεν ἐπὶ τὸν τράχηλον αὐτοῦ
  chosen: he fell on his neck
  alternatives:
  - he threw himself on his neck
  - he fell upon his neck
  lexicon: LSJ
  rationale: This is a conventional embrace idiom. A relatively literal rendering
    preserves the source image; English readers can understand it as an emotional
    embrace. A more dynamic rendering was possible but not necessary.
