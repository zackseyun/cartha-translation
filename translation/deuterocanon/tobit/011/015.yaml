id: TOB.11.15
reference: Tobit 11:15
source:
  edition: lxx-swete-1909
  text: ὅτι ἐμαστίγωσας καὶ ἠλέησάς με· ἰδοὺ βλέπω Τωβείαν τὸν υἱόν μου. καὶ εἰσῆλθεν
    ὁ υἱὸς αὐτοῦ χαίρων, καὶ ἀπήγγειλεν τῷ πατρὶ αὐτοῦ τὰ μεγάλα τὰ γενόμενα αὐτῷ
    ἐν τῇ Μηδείᾳ.
  language: Greek
  pages:
  - 832
  - 835
  - 854
  - 855
  - 856
  - 857
  - 858
  - 859
  confidence: high
  validation: agree
translation:
  text: because you afflicted me and had mercy on me. Behold, I see Tobiah my son.
    And his son entered rejoicing, and reported to his father the great things that
    had happened to him in Media.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you afflicted me' or 'you scourged me'; the Greek verb can denote severe
      striking or chastisement.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμαστίγωσας
  chosen: you struck me
  alternatives:
  - you scourged me
  - you afflicted me
  - you chastised me
  lexicon: BDAG
  rationale: From μαστιγόω, literally 'to whip/scourge,' but in this prayer-like exclamation
    it can denote severe affliction more broadly. 'You struck me' preserves the direct
    divine-action language without over-specifying a literal whipping image that the
    narrative context does not require.
- source_word: ἠλέησάς
  chosen: had mercy on me
  alternatives:
  - showed me mercy
  - pitied me
  lexicon: BDAG
  rationale: Standard rendering of ἐλεέω. 'Had mercy on me' is idiomatic and preserves
    the contrast with prior affliction.
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: A deictic particle drawing attention to the immediate reality of restored
    sight. 'Look' is natural modern English while retaining the vividness of the exclamation.
- source_word: βλέπω
  chosen: I see
  alternatives:
  - I can see
  - I am looking at
  lexicon: BDAG
  rationale: The plain verb 'I see' best captures both restored vision and the object
    seen. 'I can see' is possible but slightly interpretive.
- source_word: χαίρων
  chosen: rejoicing
  alternatives:
  - joyfully
  - gladly
  lexicon: BDAG
  rationale: The participle is best preserved with a participial sense. 'Rejoicing'
    keeps the emotional state explicit and close to the Greek form.
- source_word: ἀπήγγειλεν
  chosen: reported
  alternatives:
  - announced
  - told
  - declared
  lexicon: BDAG
  rationale: The verb denotes bringing a report. 'Reported' fits the narrative register
    and the following content clause about events in Media.
- source_word: τὰ μεγάλα
  chosen: the great things
  alternatives:
  - the great deeds
  - the remarkable things
  lexicon: BDAG
  rationale: A literal but natural rendering that leaves open whether the reference
    is to providential events, blessings, or notable happenings. It avoids over-interpreting
    as specifically 'deeds' of God when the text does not state that explicitly.
- source_word: τὰ γενόμενα αὐτῷ
  chosen: that had happened to him
  alternatives:
  - that had taken place for him
  - that had befallen him
  lexicon: BDAG
  rationale: This is the most natural English equivalent for the articular participial
    phrase and preserves αὐτῷ as referring to what occurred in Tobiah's experience.
- source_word: ἐν τῇ Μηδείᾳ
  chosen: in Media
  alternatives:
  - in the land of the Medes
  lexicon: BDAG
  rationale: Μηδεία refers to Media, the region. 'In Media' is concise and standard.
