theological_decisions:
- issue: Divine agency in suffering and mercy
  chosen_reading: 'Retain direct address to God: ''you struck me and had mercy on
    me.'''
  alternative_readings:
  - you afflicted me and showed me mercy
  rationale: The Greek directly attributes both affliction and mercy to God. The translation
    preserves this theological tension rather than softening the first verb into an
    impersonal statement.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
