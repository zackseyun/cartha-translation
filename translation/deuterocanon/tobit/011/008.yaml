id: TOB.11.8
reference: Tobit 11:8
source:
  edition: lxx-swete-1909
  text: σὺ ἔγχρισον τὴν χολὴν εἰς τοὺς ὀφθαλμούς αὐτοῦ, καὶ δηχθεὶς διατρίψει καὶ
    ἀποβαλεῖται τὰ λευκώματα καὶ ὄψεταί σε.
  language: Greek
  pages:
  - 832
  - 835
  - 854
  - 855
  - 856
  - 857
  - 858
  - 859
  confidence: high
  validation: agree
translation:
  text: You shall anoint his eyes with the gall, and when it stings, he will rub them,
    and the white films will come away, and he will see you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bile.' The Greek word denotes gall/bile, here used as a medicinal substance.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'when it bites,' using vivid bodily language for the stinging
      effect on the eyes.
    reason: lexical_alternative
  - marker: c
    text: Or 'the white spots' or 'white patches'; the term refers to whitish eye
      opacities, not necessarily cataracts in the modern medical sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγχρισον
  chosen: anoint
  alternatives:
  - smear
  - apply
  lexicon: LSJ
  rationale: Imperative of ἐγχρίω, used for applying a substance by rubbing/spreading.
    'Anoint' is slightly more formal but still natural, and fits the direct instruction
    without over-paraphrasing.
- source_word: χολὴν
  chosen: gall
  alternatives:
  - bile
  lexicon: LSJ
  rationale: χολή literally denotes bile/gall. 'Gall' is the more traditional and
    concise English equivalent; 'bile' is possible but sounds more clinical. Since
    the verse refers to the fish organ used medicinally, 'gall' preserves the lexical
    sense well.
- source_word: δηχθεὶς
  chosen: when it bites
  alternatives:
  - when he is stung
  - when it irritates
  lexicon: LSJ
  rationale: The participle from δάκνω/δήχω conveys biting or stinging. In context
    the applied gall causes a sharp irritating sensation in the eyes. 'When it bites'
    preserves the vivid metaphor of the Greek better than flattening it to 'irritates.'
- source_word: διατρίψει
  chosen: he will rub them
  alternatives:
  - he will wipe them
  - he will chafe them
  lexicon: LSJ
  rationale: The future verb indicates rubbing thoroughly. Because the object is implicit
    from the prior mention of the eyes, English supplies 'them' for clarity.
- source_word: ἀποβαλεῖται
  chosen: will come away
  alternatives:
  - he will cast off
  - they will fall off
  lexicon: LSJ
  rationale: Middle voice here describes the white films being removed as a result
    of the rubbing. 'Will come away' gives idiomatic English while preserving the
    sense of removal without forcing an awkward active construction.
- source_word: τὰ λευκώματα
  chosen: the white films
  alternatives:
  - the white spots
  - the white patches
  - the cataracts
  lexicon: LSJ
  rationale: λευκώματα refers to whitish opacities on the eyes. 'White films' is understandable
    modern English and avoids the medically specific 'cataracts,' which may over-interpret
    the ancient diagnosis.
- source_word: ὄψεταί σε
  chosen: he will see you
  alternatives:
  - he will regain sight and see you
  lexicon: LSJ
  rationale: The Greek simply says 'he will see you.' The restoration of sight is
    implied by context, but the translation should not add more than the text states.
