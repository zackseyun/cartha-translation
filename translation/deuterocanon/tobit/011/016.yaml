theological_decisions:
- issue: Identification of the subject named by the Greek form Τωβείας
  chosen_reading: The subject is Tobit, the healed father, not Tobias the son.
  alternative_readings:
  - The subject is Tobias/Tobias, the son
  rationale: The Greek form can suggest 'Tobias,' but the final clause states that
    onlookers marveled because 'he had regained his sight,' which fits Tobit specifically
    in the immediate narrative. The translation therefore reflects the narrative referent
    rather than a mechanically reproduced form that would misidentify the character.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not misleadingly literal.'
