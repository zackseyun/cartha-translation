id: TOB.11.16
reference: Tobit 11:16
source:
  edition: lxx-swete-1909
  text: Καὶ ἐξῆλθεν Τωβείας εἰς συνάντησιν τῇ νύμφῃ αὐτοῦ, χαίρων καὶ εὐλογῶν τὸν
    θεόν, πρὸς τῇ πύλῃ Νινευή. καὶ ἐθαύμαζον οἱ θεωροῦντες αὐτὸν πορευόμενον, ὅτι
    ἔβλεψεν.
  language: Greek
