translation:
  text: And Tobit went out to meet his daughter-in-law, rejoicing and blessing God,
    at the gate of Nineveh. And those who saw him walking were amazed, because he
    had regained his sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''his νύμφη''; this term can mean either ''bride'' or ''daughter-in-law.''
      In context it refers to Sarah as Tobit''s daughter-in-law.'
    reason: lexical_alternative
  - marker: b
    text: The Greek name form here is 'Tōbeias,' but the context indicates the elder
      Tobit, since the crowd marvels that he can now see.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - came out
  lexicon: BDAG
  rationale: A straightforward narrative aorist of motion. 'Went out' fits the context
    of leaving the house/city area to meet someone.
- source_word: Τωβείας
  chosen: Tobit
  alternatives:
  - Tobias
  lexicon: Greek proper-name tradition
  rationale: Although the Greek form here is Τωβείας, the immediate context and narrative
    sense indicate the elder Tobit, now healed, not his son. The following clause
    about observers marveling that he could see confirms this identification. The
    English name is therefore rendered as 'Tobit' rather than mechanically transliterating
    the Greek form as 'Tobias.'
- source_word: εἰς συνάντησιν
  chosen: to meet
  alternatives:
  - for a meeting with
  - to meet in welcome
  lexicon: BDAG
  rationale: This idiom commonly expresses going out to meet someone. 'To meet' is
    natural English and preserves the sense.
- source_word: τῇ νύμφῃ αὐτοῦ
  chosen: his daughter-in-law
  alternatives:
  - his bride
  lexicon: BDAG
  rationale: νύμφη can mean 'bride' or 'daughter-in-law.' In Tobit's family setting,
    referring to Sarah as his son's wife, 'daughter-in-law' is the contextually correct
    sense.
- source_word: χαίρων
  chosen: rejoicing
  alternatives:
  - being glad
  - joyfully
  lexicon: BDAG
  rationale: The participle expresses Tobit's emotional state as he goes out. 'Rejoicing'
    preserves the verbal force and biblical tone without sounding archaic.
- source_word: εὐλογῶν τὸν θεόν
  chosen: blessing God
  alternatives:
  - praising God
  lexicon: BDAG
  rationale: The Greek explicitly says 'blessing God.' While 'praising' is possible
    in idiomatic English, 'blessing' stays closer to the source and remains understandable.
- source_word: πρὸς τῇ πύλῃ Νινευή
  chosen: at the gate of Nineveh
  alternatives:
  - near the gate of Nineveh
  - by the gate of Nineveh
  lexicon: BDAG
  rationale: The phrase locates the action at or by the city gate. 'At the gate of
    Nineveh' is concise and natural.
- source_word: ἐθαύμαζον
  chosen: were amazed
  alternatives:
  - marveled
  - were astonished
  lexicon: BDAG
  rationale: An imperfect describing the ongoing reaction of onlookers. 'Were amazed'
    is idiomatic modern English.
- source_word: οἱ θεωροῦντες αὐτὸν πορευόμενον
  chosen: those who saw him walking
  alternatives:
  - those watching him as he went
  - those observing him going along
  lexicon: BDAG
  rationale: The participial construction describes the people observing Tobit as
    he moved about. 'Those who saw him walking' communicates the scene clearly in
    modern English.
- source_word: ὅτι ἔβλεψεν
  chosen: because he had regained his sight
  alternatives:
  - because he could see
  - because he saw
  lexicon: BDAG
  rationale: The aorist points to the fact of restored sight, not merely the act of
    looking. Given the narrative context of Tobit's healing, 'had regained his sight'
    makes explicit the intended sense without adding foreign content.
