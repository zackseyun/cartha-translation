translation:
  text: Let us run on ahead of your wife and prepare the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''your wife.'' Some contextual expectations in the wider story might
      lead readers to expect reference to another family member, but the extant Greek
      witness here reads ''your wife,'' and the translation follows that source text.'
    reason: alternative_reading
lexical_decisions:
- source_word: προδράμωμεν
  chosen: Let us run on ahead
  alternatives:
  - Let us go on ahead
  - Let us hurry ahead
  lexicon: LSJ
  rationale: 'Aorist subjunctive in a hortatory sense: ''let us run ahead / hasten
    ahead.'' ''Run on ahead'' preserves the vivid motion more closely than the flatter
    ''go on ahead,'' while remaining natural English.'
- source_word: ἔμπροσθεν
  chosen: on ahead
  alternatives:
  - before
  - ahead of
  lexicon: LSJ
  rationale: Used adverbially with the verb of motion to indicate going in front.
    In English, 'on ahead' works idiomatically with 'run' and avoids the awkwardly
    literal 'run before.'
- source_word: τῆς γυναικός σου
  chosen: your wife
  alternatives:
  - your woman
  lexicon: BDAG
  rationale: γυνή here clearly means 'wife' in relational context, not merely 'woman.'
    The possessive σου makes the marital sense explicit.
- source_word: ἑτοιμάσωμεν
  chosen: prepare
  alternatives:
  - make ready
  - get ready
  lexicon: LSJ
  rationale: The hortatory subjunctive parallels the first verb. 'Prepare' is clear,
    direct, and slightly more formal than 'get ready,' fitting the narrative tone.
- source_word: τὴν οἰκίαν
  chosen: the house
  alternatives:
  - the home
  - the household
  lexicon: LSJ
  rationale: οἰκία can mean house or household. In this context of going ahead to
    make things ready for arrival, the physical dwelling is most likely, so 'the house'
    is preferred.
