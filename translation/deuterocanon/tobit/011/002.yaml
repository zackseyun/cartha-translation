theological_decisions:
- issue: Use of the Semitic parallel source alongside the Greek
  chosen_reading: Retain the Greek's concise rhetorical question without importing
    the fuller explanatory wording from the Semitic parallel.
  alternative_readings:
  - And Raphael said to Tobiah, “You know that your father is blind...”
  rationale: The indirect Hebrew/Aramaic-related parallel expands the sense by making
    explicit the father's blindness and promised healing. Since the primary anchor
    is the Greek of Swete/Vaticanus, the main text should reflect its shorter wording.
    The Semitic evidence is valuable for understanding that πῶς likely refers to the
    father's condition, but it should inform interpretation rather than replace the
    Greek wording here.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve source uncertainty honestly.'
