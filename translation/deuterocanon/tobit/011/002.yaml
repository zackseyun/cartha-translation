translation:
  text: And Raphael said to Tobiah, “Do you not know, brother, how you left your father?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Do you not remember in what condition you left your father?” The Semitic
      parallel tradition makes the father's blindness explicit, but the Greek text
      states it more briefly.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ γινώσκεις
  chosen: Do you not know
  alternatives:
  - Do you not remember
  - Do you not realize
  lexicon: BDAG
  rationale: γινώσκω commonly means 'know,' but in context it can shade toward recollection
    or awareness. 'Do you not know' stays closest to the Greek wording while still
    making sense as Raphael prompts Tobiah to recall the condition in which he left
    his father.
- source_word: ἀδελφέ
  chosen: brother
  alternatives:
  - my brother
  - friend
  lexicon: BDAG
  rationale: The vocative ἀδελφέ is literally 'brother.' Although it can function
    as a warm form of address beyond strict kinship, 'brother' preserves the source
    term and its familial warmth without overinterpreting.
- source_word: ἀφῆκες
  chosen: left
  alternatives:
  - departed from
  - left behind
  lexicon: BDAG
  rationale: ἀφίημι here refers to leaving someone in a certain condition. 'Left'
    is the most natural and sufficiently broad English equivalent. 'Left behind' is
    possible but adds emphasis not explicit in the Greek.
- source_word: τὸν πατέρα σου
  chosen: your father
  lexicon: BDAG
  rationale: Straightforward rendering of the accusative object.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what condition
  - how it was when
  lexicon: BDAG
  rationale: πῶς can mean 'how' in the sense of manner or condition. The parallel
    Semitic tradition points toward the father's blindness as the implied condition,
    but the Greek leaves that implication unstated. 'How' preserves the Greek's compactness
    and allows the implied sense to emerge from context.
