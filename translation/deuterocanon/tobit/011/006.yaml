id: TOB.11.6
reference: Tobit 11:6
source:
  edition: lxx-swete-1909
  text: καὶ προενόησεν αὐτὸν ἐρχόμενον· εἶπεν τῷ πατρὶ αὐτοῦ Ἰδοὺ ὁ υἱός μου ἔρχεται
    καὶ ὁ ἄνθρωπος ὁ πορευθεὶς μετʼ αὐτοῦ.
  language: Greek
  pages:
  - 832
  - 835
  - 854
  - 855
  - 856
  - 857
  - 858
  - 859
  confidence: high
  validation: agree
translation:
  text: And she noticed him coming and said to his father, “Look, my son is coming,
    and the man who went with him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'she perceived him coming.' The sense in context is that
      she recognized him as he approached.
    reason: lexical_alternative
lexical_decisions:
- source_word: προενόησεν
  chosen: recognized
  alternatives:
  - noticed beforehand
  - perceived
  - caught sight of
  lexicon: LSJ
  rationale: In context the verb describes Anna seeing Tobit approaching from a distance
    and identifying him. A hyper-literal 'foreknew' or 'anticipated' is unnatural
    in English here; 'recognized' best captures perceptive identification in idiomatic
    modern English while staying anchored to the narrative sense.
- source_word: ἐρχόμενον
  chosen: coming
  alternatives:
  - approaching
  lexicon: BDAG
  rationale: The present participle naturally conveys movement toward the speaker.
    'Coming' is simple and direct; 'approaching' is possible but slightly more interpretive.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: A deictic exclamation drawing attention. 'Look' preserves the immediacy
    in readable modern English better than archaic 'Behold.'
- source_word: ὁ υἱός μου
  chosen: my son
  lexicon: BDAG
  rationale: Straightforward possessive phrase; no reason to flatten or paraphrase.
- source_word: ὁ ἄνθρωπος
  chosen: the man
  alternatives:
  - the companion
  lexicon: BDAG
  rationale: The Greek explicitly says 'the man.' Although context identifies him
    as Tobit's traveling companion, the source does not use a relational noun here,
    so the more literal rendering is preferred.
- source_word: ὁ πορευθεὶς μετʼ αὐτοῦ
  chosen: who went with him
  alternatives:
  - who traveled with him
  lexicon: BDAG
  rationale: The aorist participle refers back to the earlier journey. 'Who went with
    him' is close to the Greek and clear; 'traveled with him' is acceptable but slightly
    smoother than necessary.
