translation:
  text: After these things, Tobiah also went on his way, blessing God because he had
    made his journey successful, and he kept blessing Raguel and Edna his wife. And
    they went on until they came near to Nineveh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''because he prospered his way,'' an idiom meaning that God gave
      success to his journey.'
    reason: lexical_alternative
  - marker: b
    text: The final clause is awkward in Greek. It likely means 'until they came near
      to Nineveh'; some could construe it as 'until he came near to Nineveh.'
    reason: textual_variant
lexical_decisions:
- source_word: Μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: LSJ
  rationale: A straightforward temporal transition. 'After these things' preserves
    the plural demonstrative nuance of the Greek while remaining natural English.
- source_word: ἐπορεύετο
  chosen: went on his way / went on
  alternatives:
  - traveled
  - journeyed
  lexicon: LSJ
  rationale: The imperfect denotes ongoing movement. English varies slightly between
    the first and second occurrences for readability, but both reflect continued travel
    rather than a punctiliar 'went.'
- source_word: εὐλογῶν τὸν θεόν
  chosen: blessing God
  alternatives:
  - praising God
  lexicon: LSJ
  rationale: The participle literally means 'blessing God.' Although 'praising' is
    possible in idiomatic English, 'blessing' better preserves the source wording
    and biblical register.
- source_word: ὅτι εὐώδωσεν τὴν ὁδὸν αὐτοῦ
  chosen: because he had made his journey successful
  alternatives:
  - because he had prospered his way
  - because he had given success to his journey
  lexicon: LSJ
  rationale: The idiom literally speaks of prospering his way/road. 'Made his journey
    successful' communicates the sense clearly in modern English while preserving
    divine causation. The Semitic parallel likewise emphasizes God's beneficent action
    in the journey.
- source_word: κατευλόγει
  chosen: he kept blessing
  alternatives:
  - he blessed
  - he spoke blessings over
  lexicon: LSJ
  rationale: The compound verb with imperfect aspect suggests repeated or continued
    blessing. 'Kept blessing' captures the iterative/continuous force better than
    a simple past.
- source_word: Ῥαγουὴλ καὶ Ἔδναν τὴν γυναῖκα αὐτοῦ
  chosen: Raguel and Edna his wife
  alternatives:
  - Raguel and his wife Edna
  lexicon: LSJ
  rationale: The Greek most naturally identifies Edna as Raguel's wife. English reorders
    slightly for smoothness while preserving the relationship.
- source_word: μέχρις οὗ ἤγγισαν αὐτὸν εἰς Νινευή
  chosen: until they came near to Nineveh
  alternatives:
  - until he came near to Nineveh
  - until they approached Nineveh
  lexicon: LSJ
  rationale: The transmitted Greek has a syntactically awkward 'they came near him
    into Nineveh' (ἤγγισαν αὐτόν εἰς Νινευή). In context, the sense is arrival in
    the vicinity of Nineveh. The plural verb is retained in the English subject ('they'),
    and 'came near to Nineveh' gives the likely sense without over-literalizing an
    awkward construction.
