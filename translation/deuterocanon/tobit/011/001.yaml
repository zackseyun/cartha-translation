theological_decisions:
- issue: Rendering θεός
  chosen_reading: God
  rationale: This is the ordinary reference to Israel's God in narrative context;
    no special title issue beyond standard capitalization.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; readable modern English'
- issue: Interpretation of the difficult clause ἤγγισαν αὐτὸν εἰς Νινευή
  chosen_reading: And they went on until they came near to Nineveh.
  alternative_readings:
  - And he went on until he came near to Nineveh.
  - And they approached him at Nineveh.
  rationale: The Greek wording is awkward and may reflect textual disturbance or Semitic
    influence. Context strongly favors the travel sense, and the parallel Semitic
    tradition also points to approach toward Nineveh rather than approach toward a
    person. The translation preserves the likely narrative meaning without claiming
    more certainty than the text warrants.
  doctrine_reference: 'DOCTRINE.md: preserve source uncertainty honestly'
