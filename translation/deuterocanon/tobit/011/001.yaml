    text: וילך טוביה שמח וטוב לב ויברך את יי אשר שמחהו ואשר עשה עמו נפלאות רבות וחסדים
      טובים וילך ויבא (אל) אקריס העיר אשר נכח נינוה ויאמר רפאל [טוביה] אחי אתה ידעת
