id: TOB.11.12
reference: Tobit 11:12
source:
  edition: lxx-swete-1909
  text: Θάρσει, πάτερ. ὡς δὲ συνεδήχθησαν, διέτριψε τοὺς ὀφθαλμοὺς αὐτοῦ,
  language: Greek
  pages:
  - 832
  - 835
  - 854
  - 855
  - 856
  - 857
  - 858
  - 859
  confidence: high
  validation: minor_mismatch
translation:
  text: Take courage, father. Then, when they had come together, he rubbed his eyes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'Take courage, father.' English could also be rendered
      'Take heart, father.'
    reason: lexical_alternative
  - marker: b
    text: The Greek clause says 'when they had come together'; it may be understood
      as their meeting or reunion.
    reason: alternative_reading
lexical_decisions:
- source_word: Θάρσει
  chosen: Take courage
  alternatives:
  - Be of good courage
  - Take heart
  lexicon: LSJ
  rationale: Imperative of θαρσέω expressing encouragement or reassurance. 'Take courage'
    is natural modern English and preserves the force better than the more idiomatic
    but slightly looser 'take heart.'
- source_word: πάτερ
  chosen: father
  alternatives:
  - my father
  lexicon: LSJ
  rationale: Direct address to Tobit. The Greek has the vocative 'father' without
    an explicit possessive, so 'father' is kept rather than adding 'my,' though English
    readers will understand the filial address.
- source_word: ὡς δὲ
  chosen: Then, when
  alternatives:
  - and when
  - now when
  lexicon: LSJ
  rationale: This combination introduces the next action with temporal force. 'Then,
    when' gives readable narrative sequence without overtranslating.
- source_word: συνεδήχθησαν
  chosen: they had come together
  alternatives:
  - they met
  - they were brought together
  lexicon: LSJ
  rationale: The verb indicates coming together/meeting. 'They had come together'
    stays closer to the Greek form and leaves the exact nuance broad enough for the
    reunion scene.
- source_word: διέτριψε
  chosen: he rubbed
  alternatives:
  - he wiped
  - he chafed
  lexicon: LSJ
  rationale: The verb literally denotes rubbing. In context of eye treatment, 'rubbed'
    is the most straightforward rendering and avoids importing interpretive detail
    not explicit in this clause alone.
- source_word: τοὺς ὀφθαλμοὺς αὐτοῦ
  chosen: his eyes
  alternatives:
  - the eyes of him
  lexicon: LSJ
  rationale: Standard idiomatic rendering of the object phrase. The possessive refers
    to Tobit's eyes in context.
