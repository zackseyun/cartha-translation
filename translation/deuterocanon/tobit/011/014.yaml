translation:
  text: And she wept and said, “Blessed are you, O God, and blessed is your name forever,
    and blessed are all your holy angels,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'into the ages'; the idiom means 'forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκλαυσεν
  chosen: she wept
  alternatives:
  - he wept
  - began to weep
  lexicon: LSJ
  rationale: The verb means 'wept' or 'cried.' The Greek form itself does not mark
    gender, but the surrounding narrative in this scene concerns Anna's response,
    so 'she wept' best reflects the referent in context rather than leaving English
    artificially ambiguous.
- source_word: Εὐλογητὸς εἶ
  chosen: Blessed are you
  alternatives:
  - You are blessed
  - Praised are you
  lexicon: LSJ
  rationale: This preserves the direct second-person blessing formula and its liturgical
    tone. 'Praised are you' is possible in context, but 'Blessed are you' more closely
    matches the Greek adjective and common biblical doxological style.
- source_word: ὁ θεός
  chosen: O God
  alternatives:
  - God
  lexicon: LSJ
  rationale: The article with θεός identifies the addressee, and English direct address
    is naturally conveyed with 'O God' in a blessing formula. This keeps the elevated
    prayer-like register without becoming archaic beyond the source's tone.
- source_word: τὸ ὄνομά σου
  chosen: your name
  lexicon: LSJ
  rationale: A standard biblical expression referring to God's revealed identity and
    honor. No expansion is warranted beyond the Greek.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: LSJ
  rationale: The idiom denotes enduring perpetuity. 'Forever' is the clearest natural
    English equivalent; the more literal 'for the ages' would sound unnatural here.
- source_word: εὐλογημένοι
  chosen: blessed are
  alternatives:
  - may ... be blessed
  lexicon: LSJ
  rationale: The adjective continues the declarative blessing pattern already established
    in the verse. A jussive-like 'may ... be blessed' is possible in English, but
    the Greek here reads most straightforwardly as a declaration.
- source_word: πάντες
  chosen: all
  alternatives:
  - every one of
  lexicon: LSJ
  rationale: Simple comprehensive sense; 'all' is the most natural equivalent.
- source_word: οἱ ἅγιοι ἄγγελοί σου
  chosen: your holy angels
  alternatives:
  - all your saints, the angels
  - your consecrated angels
  lexicon: LSJ
  rationale: ἅγιοι directly modifies ἄγγελοι in the Greek, so 'holy angels' is the
    plain sense. Rendering ἅγιοι independently as 'saints' would distort the syntax.
