id: TOB.11.14
reference: Tobit 11:14
source:
  edition: lxx-swete-1909
  text: καὶ ἔκλαυσεν καὶ εἶπεν Εὐλογητὸς εἶ ὁ θεός, καὶ εὐλογητὸν τὸ ὄνομά σου εἰς
    τοὺς αἰῶνας, καὶ εὐλογημένοι πάντες οἱ ἅγιοι ἄγγελοί σου,
  language: Greek
