theological_decisions:
- issue: Doxological formula addressed to God
  chosen_reading: Retain 'Blessed are you, O God' rather than recasting as praise
    language.
  alternative_readings:
  - Praised are you, God
  rationale: The verse uses repeated εὐλογητ- language in a blessing formula. Preserving
    'blessed' maintains the biblical-theological diction and avoids importing a different
    nuance where the source already has a stable liturgical form.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening theological weight.'
