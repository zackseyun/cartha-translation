id: TOB.11.9
reference: Tobit 11:9
source:
  edition: lxx-swete-1909
  text: Καὶ προσδραμοῦσα Ἄννα ἐπέπεσεν ἐπὶ τὸν τράχηλον τοῦ υἱοῦ αὐτῆς, καὶ εἶπεν
    αὐτῷ Εἶδόν σε, παιδίον,
  language: Greek
  pages:
  - 832
  - 835
  - 854
  - 855
  - 856
  - 857
  - 858
  - 859
  confidence: high
  validation: minor_mismatch
translation:
  text: And Anna ran up and fell on the neck of her son, and said to him, “I have
    seen you, child.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'fell on the neck of her son,' an idiom for an emotional
      embrace.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδραμοῦσα
  chosen: ran up
  alternatives:
  - ran to him
  - hurried up
  lexicon: LSJ
  rationale: The participle from προστρέχω conveys running toward someone. 'Ran up'
    is natural modern English and preserves the vivid movement better than the flatter
    'came' or the slightly interpretive 'hurried up'.
- source_word: ἐπέπεσεν ἐπὶ τὸν τράχηλον
  chosen: fell on the neck
  alternatives:
  - threw herself on the neck
  - embraced around the neck
  lexicon: LSJ
  rationale: This is a conventional idiom for an emotional embrace. 'Fell on the neck'
    keeps the source imagery closely; the more idiomatic English sense is clear in
    context. 'Threw herself on the neck' is possible but adds reflexive force not
    explicit in the Greek.
- source_word: τὸν τράχηλον
  chosen: the neck
  alternatives:
  - his neck
  lexicon: LSJ
  rationale: The Greek has the article with a genitive modifier ('the neck of her
    son'). Rendering it literally preserves the concrete image. English readers will
    understand the possessive relation from the following phrase.
- source_word: τοῦ υἱοῦ αὐτῆς
  chosen: of her son
  alternatives:
  - her son's
  - of her child
  lexicon: LSJ
  rationale: υἱός specifically means 'son,' not the more general 'child.' Retaining
    'son' preserves the familial specificity of the Greek.
- source_word: Εἶδόν σε
  chosen: I have seen you
  alternatives:
  - I have found you
  - I have looked upon you
  - I see you
  lexicon: LSJ
  rationale: The aorist of ὁράω here naturally expresses the fulfilled joy of seeing
    him again. 'I have seen you' captures the completed event with present emotional
    force. 'I see you' underplays the reunion nuance; 'I have found you' is too interpretive.
- source_word: παιδίον
  chosen: child
  alternatives:
  - my child
  - dear child
  - little one
  lexicon: LSJ
  rationale: παιδίον is an affectionate diminutive meaning 'child.' 'Child' preserves
    the tenderness without adding possessive or emotional wording not explicit in
    the Greek. Although the son is grown, the maternal address justifies the affectionate
    term.
