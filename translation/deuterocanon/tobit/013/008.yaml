id: TOB.13.8
reference: Tobit 13:8
source:
  edition: lxx-swete-1909
  text: λεγέτωσαν πάντες καὶ ἐξομολογείσθωσαν αὐτῷ ἐν Ἱεροσολύμοις.
  language: Greek
  pages:
  - 861
  confidence: high
  validation: agree
translation:
  text: Let them all speak and give thanks to him in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confess to him' or 'praise him'; the Greek verb can carry any of these
      worship-related senses depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: λεγέτωσαν
  chosen: Let them ... speak
  alternatives:
  - Let them say
  - Let them proclaim
  lexicon: LSJ
  rationale: Third-person imperative plural of λέγω. In this brief liturgical context,
    'speak' is broad and natural English, preserving the exhortational force without
    over-specifying the content as proclamation.
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  - all people
  lexicon: LSJ
  rationale: The adjective functions substantivally and is best rendered simply as
    'all,' matching the Greek's concise universality.
- source_word: ἐξομολογείσθωσαν
  chosen: give thanks
  alternatives:
  - confess
  - praise
  - acknowledge
  lexicon: LSJ
  rationale: In biblical Greek this verb can mean confess or give praise/thanks to
    God. Here, with αὐτῷ and in a hymn-like context centered on worship, 'give thanks'
    best captures the devotional sense in idiomatic English.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - him
  lexicon: LSJ
  rationale: Dative pronoun referring to God; 'to him' makes the indirect-object relation
    explicit in English.
- source_word: ἐν Ἱεροσολύμοις
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: LSJ
  rationale: Standard rendering of the place name in the dative with ἐν. 'In Jerusalem'
    is the natural modern English equivalent.
