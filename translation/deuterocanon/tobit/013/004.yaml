theological_decisions:
- issue: Relation of the predicates 'our Lord,' 'our God,' and 'our Father'
  chosen_reading: 'Render all three as direct predicates of the one God: ''for he
    is our Lord, and he is our God, our Father forever.'''
  alternative_readings:
  - for he is our Lord, and he is God, our Father forever
  - for he is our Lord and God, our Father forever
  rationale: The Greek repeats αὐτός for emphasis and then apposes θεὸς and πατήρ
    with ἡμῶν. The chosen rendering preserves the confessional accumulation without
    collapsing the titles into a smoother but less transparent English phrase.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    for κύριος as 'Lord'.
