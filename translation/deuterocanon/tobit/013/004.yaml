id: TOB.13.4
reference: Tobit 13:4
source:
  edition: lxx-swete-1909
  text: ἐκεῖ ὑποδείξατε τὴν μεγαλοσύνην αὐτοῦ, ὑψοῦτε αὐτὸν ἐνώπιον παντὸς ζῶντος·
    καθότι αὐτὸς κύριος ἡμῶν, καὶ θεὸς αὐτὸς πατὴρ ἡμῶν, εἰς πάντας τοὺς αἰῶνας.
  language: Greek
  pages:
  - 860
  confidence: high
  validation: agree
translation:
  text: There declare his greatness, and exalt him before every living being; for
    he is our Lord, and he is our God, our Father forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'show his majesty' for 'declare his greatness.' The Greek verb can mean
      'show' or 'make known,' and the noun can also be rendered 'majesty.'
    reason: lexical_alternative
  - marker: b
    text: Greek literally, 'before every living [one].' The phrase is broad, though
      in context it most naturally refers to all living people.
    reason: lexical_alternative
  - marker: c
    text: Or 'for all the ages.' The Greek expression emphasizes unending duration.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖ
  chosen: There
  alternatives:
  - There among them
  - In that place
  lexicon: LSJ
  rationale: Adverb of place pointing to the nations/exile context from the preceding
    verse. 'There' is the most direct rendering and preserves the rhetorical force
    without over-specifying.
- source_word: ὑποδείξατε
  chosen: declare
  alternatives:
  - show
  - make known
  - point out
  lexicon: LSJ
  rationale: Imperative plural. The verb can mean 'show' or 'point out,' but in context
    of public praise before the nations, 'declare' captures open proclamation better
    in natural English while remaining anchored to the Greek sense of making something
    evident.
- source_word: τὴν μεγαλοσύνην αὐτοῦ
  chosen: his greatness
  alternatives:
  - his majesty
  - his magnificence
  lexicon: LSJ
  rationale: μεγαλοσύνη denotes greatness or majesty. 'Greatness' is broad, clear,
    and avoids sounding overly elevated while preserving the sense of divine exaltedness.
- source_word: ὑψοῦτε αὐτόν
  chosen: exalt him
  alternatives:
  - lift him high
  - magnify him
  lexicon: LSJ
  rationale: Imperative of ὑψόω in a praise context. 'Exalt' is idiomatic for honoring
    God and stays close to the metaphor of lifting high.
- source_word: ἐνώπιον παντὸς ζῶντος
  chosen: before every living being
  alternatives:
  - before all the living
  - in the sight of every living person
  lexicon: LSJ
  rationale: Literally 'before every living [one].' 'Every living being' preserves
    the singular distributive force of παντός and the broad wording of ζῶντος without
    restricting it too narrowly, though the context chiefly concerns human witnesses.
- source_word: καθότι
  chosen: for
  alternatives:
  - because
  - since
  lexicon: LSJ
  rationale: Introduces the reason for the commands to declare and exalt. 'For' is
    concise and natural in elevated prose.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Per doctrine, κύριος defaults to 'Lord.' This fits both Jewish-Greek
    reverential usage and the confessional tone here.
- source_word: θεὸς
  chosen: God
  lexicon: LSJ
  rationale: Standard rendering; no contextual pressure suggests variation.
- source_word: πατὴρ ἡμῶν
  chosen: our Father
  alternatives:
  - father of us
  lexicon: LSJ
  rationale: Predicate apposition after 'our God.' The translation preserves the familial
    theological claim without expansion.
- source_word: εἰς πάντας τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for all the ages
  - through all ages
  lexicon: LSJ
  rationale: Idiomatic expression for enduring perpetuity. 'Forever' is natural modern
    English; the more literal 'for all the ages' is possible but less idiomatic here.
