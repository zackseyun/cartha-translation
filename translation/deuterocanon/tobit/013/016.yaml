theological_decisions:
- issue: Eschatological/restoration imagery for Jerusalem
  chosen_reading: Retain the verse as a poetic promise of Jerusalem's glorious future
    construction without specifying whether the language is literal, hyperbolic, or
    symbolic.
  alternative_readings:
  - Literal architectural description
  - Symbolic depiction of restored glory
  rationale: The Greek presents lavish building imagery but does not force a single
    theological interpretation. Following the project's philosophy, the translation
    preserves the imagery without resolving the symbolism.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it.
