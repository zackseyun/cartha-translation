id: TOB.13.16
reference: Tobit 13:16
source:
  edition: lxx-swete-1909
  text: ὅτι οἰκοδομηθήσεται Ἰερουσαλὴμ σαπφείρῳ καὶ σμαράγδῳ, καὶ λίθῳ ἐντίμῳ τὰ τείχη
    σου, καὶ οἱ πύργοι καὶ οἱ προμαχῶνες χρυσίῳ καθαρῷ,
  language: Greek
  pages:
  - 862
  confidence: high
  validation: agree
translation:
  text: For Jerusalem will be built with sapphire and emerald, and your walls with
    precious stone, and the towers and battlements with pure gold,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be rebuilt'; the Greek says simply 'will be built,' but the restoration
      context can suggest rebuilding.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek addresses Jerusalem directly: ''your walls.'''
    reason: cultural_note
  - marker: c
    text: '''Battlements'' translates a term for defensive fortifications; ''bulwarks''
      or ''ramparts'' are also possible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκοδομηθήσεται
  chosen: will be built
  alternatives:
  - will be rebuilt
  - will be established
  lexicon: BDAG
  rationale: Future passive of οἰκοδομέω. 'Will be built' is the plain sense. 'Will
    be rebuilt' is possible in context of restoration, but the Greek does not explicitly
    add the re- prefix, so the simpler rendering is preferred.
- source_word: σαπφείρῳ
  chosen: with sapphire
  alternatives:
  - in sapphire
  - of sapphire
  lexicon: LSJ
  rationale: Dative singular after οἰκοδομηθήσεται can express material/instrument.
    In English, 'with sapphire' naturally conveys construction adorned or made with
    sapphire.
- source_word: σμαράγδῳ
  chosen: and emerald
  alternatives:
  - with emerald
  lexicon: LSJ
  rationale: σμαράγδος denotes emerald. Coordinated with σαπφείρῳ, so 'and emerald'
    avoids awkward repetition while preserving the material sense.
- source_word: λίθῳ ἐντίμῳ
  chosen: with precious stone
  alternatives:
  - with costly stone
  - with honored stone
  - with precious stones
  lexicon: LSJ
  rationale: Singular collective sense is possible in Greek; English idiom allows
    'with precious stone' as a material expression. 'Costly stone' is possible, but
    'precious stone' is the more natural equivalent for ἐντίμος in this construction.
- source_word: τὰ τείχη σου
  chosen: your walls
  alternatives:
  - its walls
  lexicon: LSJ
  rationale: Second-person possessive is explicit in the Greek. The speaker addresses
    Jerusalem directly, so 'your walls' should be preserved rather than smoothing
    to third person.
- source_word: πύργοι
  chosen: towers
  alternatives:
  - turrets
  lexicon: LSJ
  rationale: Standard rendering for defensive towers in a city-wall context.
- source_word: προμαχῶνες
  chosen: battlements
  alternatives:
  - bulwarks
  - ramparts
  - outworks
  lexicon: LSJ
  rationale: The term refers to defensive structures/fortifications. 'Battlements'
    is accessible modern English and fits the paired imagery with towers, though 'bulwarks'
    is also possible.
- source_word: χρυσίῳ καθαρῷ
  chosen: with pure gold
  alternatives:
  - with refined gold
  - of pure gold
  lexicon: LSJ
  rationale: Dative of material again. 'Pure gold' is the natural English equivalent
    of χρυσίῳ καθαρῷ and preserves the image of splendid construction materials.
