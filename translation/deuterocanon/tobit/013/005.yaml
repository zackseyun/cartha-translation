theological_decisions:
- issue: Shift from first-person plural to second-person plural in the final clause
  chosen_reading: 'Retain the Greek''s rhetorical shift: ''he will scourge us ...
    gather us ... among which you were scattered.'''
  alternative_readings:
  - 'Smooth to first-person throughout: ''among which we were scattered'''
  rationale: The source text as given shifts from ἡμᾶς/ἡμῶν ('us/our') to σκορπισθῆτε
    ('you [plural] were scattered'). Rather than silently harmonizing, the translation
    preserves the shift as part of the address to the dispersed people.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
