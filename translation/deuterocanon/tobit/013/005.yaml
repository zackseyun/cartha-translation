id: TOB.13.5
reference: Tobit 13:5
source:
  edition: lxx-swete-1909
  text: καὶ μαστιγώσει ἡμᾶς ἐν ταῖς ἀδικίαις ἡμῶν, καὶ πάλιν ἐλεήσει καὶ συνάξει ἡμᾶς
    ἐξ πάντων τῶν ἐθνῶν, οὗ ἐὰν σκορπισθῆτε ἐν αὐτοῖς.
  language: Greek
  pages:
  - 860
  confidence: high
  validation: agree
translation:
  text: And he will scourge us for our injustices, and again he will show mercy and
    gather us from all the nations among which you were scattered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek shifts from 'us/our' to 'you were scattered' in the last clause; some
      English translations smooth this to 'we were scattered,' but the source text's
      change in person is preserved here.
    reason: alternative_reading
lexical_decisions:
- source_word: μαστιγώσει
  chosen: will scourge
  alternatives:
  - will whip
  - will punish
  - will afflict
  lexicon: BDAG
  rationale: The verb literally denotes flogging/scourging. In this context it is
    metaphorical for severe divine chastisement, but 'scourge' preserves the force
    of the Greek better than the flatter 'punish' while remaining natural English.
- source_word: ἐν ταῖς ἀδικίαις ἡμῶν
  chosen: for our injustices
  alternatives:
  - because of our unrighteousnesses
  - in our wrongdoings
  - for our sins
  lexicon: BDAG
  rationale: ἀδικία commonly means injustice, wrongdoing, or unrighteousness. 'For
    our injustices' reflects the plural noun and causal sense in context without collapsing
    it into the more generalized 'sins.'
- source_word: πάλιν
  chosen: again
  alternatives:
  - then again
  - afterward
  lexicon: BDAG
  rationale: 'The adverb marks a reversal after chastisement: God will again act mercifully.
    ''Again'' is concise and preserves the sequence.'
- source_word: ἐλεήσει
  chosen: will show mercy
  alternatives:
  - will have mercy
  - will be merciful
  lexicon: BDAG
  rationale: The verb means to show mercy or have mercy. 'Will show mercy' is idiomatic
    and keeps the verbal action explicit.
- source_word: συνάξει
  chosen: will gather
  alternatives:
  - will bring together
  - will assemble
  lexicon: BDAG
  rationale: The verb is the standard term for gathering together, especially in restoration
    contexts. 'Gather' is the most direct and biblically resonant rendering.
- source_word: ἐξ πάντων τῶν ἐθνῶν
  chosen: from all the nations
  alternatives:
  - out of all the Gentiles
  - from every nation
  lexicon: BDAG
  rationale: ἔθνη here refers to the nations among whom Israel has been dispersed,
    not a theological Jew/Gentile contrast. 'From all the nations' is the clearest
    contextual rendering.
- source_word: οὗ ἐὰν σκορπισθῆτε ἐν αὐτοῖς
  chosen: among which you were scattered
  alternatives:
  - wherever you may be scattered among them
  - in which you were dispersed
  lexicon: BDAG
  rationale: The clause identifies the nations as the places of dispersion. Although
    the Greek form can carry an indefinite nuance ('wherever'), the sense in English
    is well conveyed by 'among which you were scattered.' This also avoids awkward
    repetition while preserving the exile-restoration imagery.
