id: TOB.13.17
reference: Tobit 13:17
source:
  edition: lxx-swete-1909
  text: καὶ αἱ πλατεῖαι Ἰερουσαλὴμ βηρύλλῳ καὶ ἄνθρακι καὶ λίθῳ ἐκ Σουφεὶρ ψηφολογηθήσονται.
  language: Greek
  pages:
  - 862
  confidence: high
  validation: agree
translation:
  text: And the streets of Jerusalem will be paved with beryl and carbuncle and stones
    from Suphir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stones of Ophir,' if Σουφείρ is understood as the place-name Ophir rather
      than transliterated directly from the Greek witness.
    reason: alternative_reading
lexical_decisions:
- source_word: πλατεῖαι
  chosen: streets
  alternatives:
  - broad streets
  - squares
  lexicon: LSJ
  rationale: The term can denote broad streets or open places in a city. In English,
    'streets' is the most natural rendering here in a description of urban splendor,
    while 'broad streets' is possible but unnecessarily stiff. 'Squares' is less likely
    in this construction.
- source_word: βηρύλλῳ
  chosen: beryl
  alternatives:
  - beryl stone
  lexicon: LSJ
  rationale: A gemstone term conventionally rendered 'beryl.' Retaining the specific
    stone name preserves the jeweled imagery without over-interpreting the exact modern
    mineral identification.
- source_word: ἄνθρακι
  chosen: carbuncle
  alternatives:
  - coal
  - garnet
  - ruby-like stone
  lexicon: LSJ
  rationale: In gemstone lists, ἄνθραξ refers not to ordinary coal here but to a glowing
    precious stone traditionally called 'carbuncle.' This fits the context of luxurious
    building materials better than the literal 'coal.'
- source_word: λίθῳ ἐκ Σουφεὶρ
  chosen: stones from Suphir
  alternatives:
  - stone from Suphir
  - stones of Ophir
  lexicon: LSJ
  rationale: The phrase denotes stone originating from a place named Σουφείρ/Suphir.
    Because the Greek form here is Σουφείρ, the main text transliterates it as 'Suphir'
    rather than importing the more familiar biblical place-name 'Ophir' without explicit
    warrant from this witness. The plural 'stones' is idiomatic in English alongside
    the preceding gem list.
- source_word: ψηφολογηθήσονται
  chosen: will be paved
  alternatives:
  - will be inlaid
  - will be laid with pebbles
  - will be tessellated
  lexicon: LSJ
  rationale: The verb literally relates to laying or counting pebbles/stones, and
    in building context means to pave or mosaic. 'Will be paved' communicates the
    architectural sense clearly in modern English without technical jargon.
