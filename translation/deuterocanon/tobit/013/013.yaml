id: TOB.13.13
reference: Tobit 13:13
source:
  edition: lxx-swete-1909
  text: χάρηθι καὶ ἀγαλλίασαι ἐπὶ τοῖς υἱοῖς τῶν δικαίων, ὅτι συναχθήσονται καὶ εὐλογήσουσιν
    τὸν κύριον τῶν δικαίων.
  language: Greek
  pages:
  - 861
  confidence: high
  validation: agree
translation:
  text: Rejoice and exult over the sons of the righteous, because they will be gathered
    together and will bless the Lord of the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of the righteous.' The Greek says 'sons,' which may refer
      more broadly to descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρηθι
  chosen: Rejoice
  alternatives:
  - Be glad
  lexicon: LSJ
  rationale: Aorist passive imperative used in a deponent-like sense from χαίρω; 'Rejoice'
    is idiomatic, direct, and pairs well with the following imperative without sounding
    flat.
- source_word: ἀγαλλίασαι
  chosen: exult
  alternatives:
  - rejoice greatly
  - be overjoyed
  lexicon: LSJ
  rationale: The verb intensifies joy beyond the first imperative. 'Exult' preserves
    the elevated, celebratory force better than repeating 'rejoice' twice in English.
- source_word: ἐπὶ
  chosen: over
  alternatives:
  - because of
  - concerning
  lexicon: LSJ
  rationale: With the dative here it marks the occasion or object of joy. 'Over' is
    natural English for rejoicing with reference to persons.
- source_word: τοῖς υἱοῖς τῶν δικαίων
  chosen: the sons of the righteous
  alternatives:
  - the children of the righteous
  - the sons of righteous people
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural 'sons.' Per doctrine, gender-accurate
    rendering is preferred unless context clearly requires neutralization. The phrase
    likely denotes descendants of righteous people; that broader sense is possible
    but not necessary in the main text.
- source_word: συναχθήσονται
  chosen: they will be gathered together
  alternatives:
  - they will be assembled
  - they will be brought together
  lexicon: LSJ
  rationale: Future passive of συνάγω. 'Gathered together' preserves the passive sense
    and the communal/restorative nuance prominent in biblical gathering language.
- source_word: εὐλογήσουσιν
  chosen: will bless
  alternatives:
  - will praise
  lexicon: LSJ
  rationale: The ordinary sense is 'bless.' While 'praise' is contextually related,
    'bless' better reflects the lexical form and biblical register.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: LSJ
  rationale: κύριος is rendered by the project's default as 'Lord.' In this Jewish
    scriptural context it carries reverential divine-title force.
- source_word: τῶν δικαίων
  chosen: of the righteous
  alternatives:
  - of righteous people
  lexicon: LSJ
  rationale: A second genitive qualifying 'Lord.' The phrase is somewhat unusual in
    English, but preserving it reflects the Greek wording and likely means the Lord
    who belongs to, or is acknowledged by, the righteous.
