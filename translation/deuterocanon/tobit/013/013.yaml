theological_decisions:
- issue: Gendered descendant language in τοῖς υἱοῖς τῶν δικαίων
  chosen_reading: the sons of the righteous
  alternative_readings:
  - the children of the righteous
  rationale: The source uses masculine 'sons,' and the doctrine calls for gender-accurate
    rendering rather than automatic neutralization. Because the phrase may function
    corporately for descendants, the more inclusive alternative is preserved in a
    footnote rather than adopted in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sense of τὸν κύριον τῶν δικαίων
  chosen_reading: the Lord of the righteous
  alternative_readings:
  - the Lord, the Righteous One
  - the righteous Lord
  rationale: 'The most straightforward reading is a genitive relation: the Lord associated
    with or belonging to the righteous. The alternatives require a different construal
    not demanded by the Greek. Preserving the literal relation maintains transparency
    and avoids importing interpretation.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
