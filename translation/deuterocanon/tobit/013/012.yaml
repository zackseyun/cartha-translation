id: TOB.13.12
reference: Tobit 13:12
source:
  edition: lxx-swete-1909
  text: ἐπικατάρατοι πάντες οἱ μισοῦντές σε, εὐλογημένοι ἔσονται πάντες οἱ ἀγαπῶντές
    σε εἰς τὸν αἰῶνα.
  language: Greek
  pages:
  - 861
  confidence: high
  validation: agree
translation:
  text: All who hate you are accursed; all who love you will be blessed forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπικατάρατοι
  chosen: accursed
  alternatives:
  - under a curse
  - cursed
  lexicon: BDAG
  rationale: The adjective denotes being under a curse or accursed. 'Accursed' preserves
    the solemn, declarative force better than the flatter 'cursed,' while remaining
    natural English.
- source_word: μισοῦντές
  chosen: hate
  alternatives:
  - are hating
  - detest
  lexicon: BDAG
  rationale: 'The participle functions substantivally: ''those who hate you.'' ''Hate''
    is the plain lexical sense and best matches the moral polarity of the verse.'
- source_word: εὐλογημένοι
  chosen: blessed
  alternatives:
  - praised
  - spoken well of
  lexicon: BDAG
  rationale: In this context the passive adjective refers to receiving blessing, not
    merely praise. 'Blessed' is the standard and clearest rendering.
- source_word: ἀγαπῶντές
  chosen: love
  alternatives:
  - are loving
  - cherish
  lexicon: BDAG
  rationale: 'The participle is substantival: ''those who love you.'' Given the paired
    contrast with ''hate,'' ''love'' is the most direct and consistent rendering.'
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for ever
  lexicon: BDAG
  rationale: The idiom expresses enduring duration. 'Forever' gives the sense in readable
    modern English without unnecessary archaism.
- source_word: ἔσονται
  chosen: will be
  alternatives:
  - shall be
  - are
  lexicon: BDAG
  rationale: The future verb is explicit in the Greek for the second clause, so 'will
    be blessed' preserves the verbal form. The first clause is verbless in Greek and
    is naturally rendered as a present-state declaration in English.
