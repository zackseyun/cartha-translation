translation:
  text: For he afflicts and shows mercy; he brings down to Hades and brings up, and
    there is no one who will escape his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''to the grave'' or ''to the realm of the dead.'' Greek: ''to Hades.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: μαστιγοῖ
  chosen: afflicts
  alternatives:
  - scourges
  - whips
  - chastens
  lexicon: LSJ
  rationale: The verb literally denotes whipping/scourging, but in this poetic confession
    it functions more broadly for God's infliction of suffering or discipline. 'Afflicts'
    preserves the severity without forcing an overly physical image where the context
    is a general statement of divine judgment and discipline.
- source_word: ἐλεᾷ
  chosen: shows mercy
  alternatives:
  - has mercy
  - pities
  lexicon: LSJ
  rationale: The verb denotes showing mercy or compassion. 'Shows mercy' is clear
    modern English and pairs well with the preceding verb as a balanced statement
    of divine severity and compassion.
- source_word: κατάγει
  chosen: brings down
  alternatives:
  - leads down
  - casts down
  lexicon: LSJ
  rationale: A straightforward rendering of the causative motion verb. 'Brings down'
    preserves the parallelism with ἀνάγει ('brings up').
- source_word: εἰς ᾅδην
  chosen: to Hades
  alternatives:
  - to the grave
  - to the realm of the dead
  - to Sheol
  lexicon: LSJ
  rationale: The Greek explicitly names ᾅδης. 'Hades' is the most direct translation
    from the Greek source and avoids collapsing the term into merely 'grave.' Because
    this is deuterocanonical Greek, retaining the Greek-world term is preferable in
    the main text, while preserving a more interpretive alternative in a footnote.
- source_word: ἀνάγει
  chosen: brings up
  alternatives:
  - raises up
  - leads up
  lexicon: LSJ
  rationale: The simple counterpart to κατάγει in the verse's antithetical parallelism.
    'Brings up' keeps the imagery broad enough to include deliverance from death or
    the underworld without over-specifying resurrection.
- source_word: οὐκ ἔστιν ὃς ἐκφεύξεται
  chosen: there is no one who will escape
  alternatives:
  - no one can escape
  - there is none who shall escape
  lexicon: LSJ
  rationale: This idiomatic clause asserts the impossibility of escape. 'There is
    no one who will escape' is natural English and preserves the future force of ἐκφεύξεται.
- source_word: τὴν χεῖρα αὐτοῦ
  chosen: his hand
  alternatives:
  - his power
  - his grasp
  lexicon: LSJ
  rationale: '''Hand'' is a common biblical metaphor for power or control. Retaining
    the concrete image preserves biblical style and lets readers infer the metaphorical
    force.'
