theological_decisions:
- issue: Meaning of descent to and ascent from ᾅδης
  chosen_reading: A general statement of God's sovereign power over death and the
    realm of the dead, rendered without making an explicit doctrinal claim about resurrection.
  alternative_readings:
  - A statement about bringing a person to the brink of death and restoring life
  - An explicit affirmation of resurrection from the underworld
  rationale: The paired verbs and reference to Hades clearly express divine sovereignty
    over life and death. The wording does not require the translator to decide between
    metaphorical deliverance from mortal danger and a stronger resurrection sense,
    so the English preserves that tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
