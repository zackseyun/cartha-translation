theological_decisions:
- issue: Referent of the second-person pronoun σοι
  chosen_reading: Addressed to Jerusalem/Zion personified
  alternative_readings:
  - Addressed more generally to Israel
  - Addressed to the city without personification emphasis
  rationale: In the surrounding hymn, Jerusalem is directly addressed and personified.
    Rendering the pronoun simply as 'you' preserves the poetic address without inserting
    'Jerusalem' into the line itself.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import claims beyond the text.
- issue: Force of 'to the name of the Lord God'
  chosen_reading: Retain the biblical idiom of pilgrimage/reverence toward God's name
  alternative_readings:
  - Interpret dynamically as 'to worship the Lord God'
  - Interpret as 'because of the fame of the Lord God'
  rationale: The phrase likely implies worshipful approach, but the Greek says 'to
    the name.' Keeping the idiom avoids narrowing the theological sense to one explanatory
    gloss.
  doctrine_reference: Original-language primacy over translation tradition.
