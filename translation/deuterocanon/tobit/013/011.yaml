id: TOB.13.11
reference: Tobit 13:11
source:
  edition: lxx-swete-1909
  text: ἔθνη πολλὰ μακρόθεν ἥξει πρὸς τὸ ὄνομα Κυρίου τοῦ θεοῦ, δῶρα ἐν χερσὶν ἔχοντες
    καὶ δῶρα τῷ βασιλεῖ τοῦ οὐρανοῦ· γενεαὶ γενεῶν δώσουσίν σοι ἀγαλλίαμα.
  language: Greek
  pages:
  - 861
  confidence: high
  validation: agree
translation:
  text: Many nations will come from far away to the name of the Lord God, carrying
    gifts in their hands, gifts for the King of heaven; generations of generations
    will give you exultation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'generation after generation will bring you rejoicing.' The Greek literally
      reads 'generations of generations will give you exultation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνη πολλὰ
  chosen: Many nations
  alternatives:
  - Many Gentiles
  - Many peoples
  lexicon: LSJ
  rationale: ἔθνη commonly means 'nations' or 'peoples.' In this pilgrimage context,
    'nations' best preserves the international scope without importing the later Jew/Gentile
    contrast too strongly.
- source_word: μακρόθεν
  chosen: from far away
  alternatives:
  - from afar
  - from a distance
  lexicon: LSJ
  rationale: The adverb denotes distant origin. 'From far away' is natural modern
    English while retaining the spatial sense.
- source_word: ἥξει
  chosen: will come
  alternatives:
  - will arrive
  lexicon: LSJ
  rationale: Future of ἥκω, indicating coming/arrival. 'Will come' fits the pilgrimage
    idiom more naturally than 'will arrive.'
- source_word: πρὸς τὸ ὄνομα Κυρίου τοῦ θεοῦ
  chosen: to the name of the Lord God
  alternatives:
  - to honor the name of the Lord God
  - to the renown of the Lord God
  lexicon: LSJ
  rationale: The Greek is literally directional, 'to the name.' Retaining 'to the
    name' preserves the biblical idiom of coming in reverence toward God's revealed
    name, without over-interpreting it as merely 'honor' or 'renown.' 'Kyriou' follows
    the project's default as 'Lord.'
- source_word: δῶρα ἐν χερσὶν ἔχοντες
  chosen: carrying gifts in their hands
  alternatives:
  - having gifts in their hands
  - bearing gifts in their hands
  lexicon: LSJ
  rationale: The participial phrase describes accompanying action. 'Carrying' is idiomatic
    English and keeps the concrete image of pilgrims bringing offerings.
- source_word: καὶ δῶρα τῷ βασιλεῖ τοῦ οὐρανοῦ
  chosen: gifts for the King of heaven
  alternatives:
  - and gifts to the King of heaven
  - even gifts for the King of heaven
  lexicon: LSJ
  rationale: The repeated δῶρα is emphatic and worth preserving. 'For' communicates
    the dative recipient naturally in English. 'King of heaven' is retained as a divine
    title rather than paraphrased.
- source_word: γενεαὶ γενεῶν
  chosen: generations of generations
  alternatives:
  - generation after generation
  - all generations
  lexicon: LSJ
  rationale: The genitival repetition is a Semitic-style intensification. A more idiomatic
    English option exists, but the literal rendering preserves the elevated poetic
    force and the source texture.
- source_word: δώσουσίν σοι ἀγαλλίαμα
  chosen: will give you exultation
  alternatives:
  - will bring you rejoicing
  - will give you praise
  - will offer you gladness
  lexicon: LSJ
  rationale: ἀγαλλίαμα denotes exultation/rejoicing. The direct object construction
    'give you exultation' is somewhat unusual in English but reflects the Greek closely.
    Here 'you' is addressed to Jerusalem in context, so the nations are pictured as
    bringing her cause for rejoicing.
