id: TOB.13.7
reference: Tobit 13:7
source:
  edition: lxx-swete-1909
  text: τὸν θεόν μου ὑψῶ, καὶ ἡ ψυχή μου τῷ βασιλεῖ τοῦ οὐρανοῦ, καὶ ἀγαλλιάσεται
    τὴν μεγαλοσύνην αὐτοῦ.
  language: Greek
  pages:
  - 861
  confidence: high
  validation: agree
translation:
  text: I exalt my God, and my soul rejoices in the King of heaven, and it will exult
    in his greatness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek middle clause is elliptical: literally, ''and my soul to the
      King of heaven.'' The translation supplies ''rejoices in'' to express the likely
      poetic sense in context.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑψῶ
  chosen: I exalt
  alternatives:
  - I glorify
  - I lift high
  lexicon: BDAG
  rationale: The verb literally conveys raising high or exalting. 'I exalt' is concise,
    natural English and preserves the praise-language without over-paraphrasing.
- source_word: ψυχή
  chosen: my soul
  alternatives:
  - I
  - my life
  - my inner being
  lexicon: BDAG
  rationale: The Greek explicitly names the soul rather than simply repeating the
    subject pronoun. 'My soul' preserves the poetic, devotional register of the source.
- source_word: βασιλεῖ τοῦ οὐρανοῦ
  chosen: the King of heaven
  alternatives:
  - the heavenly King
  - the king of heaven
  lexicon: BDAG
  rationale: This is a title for God in the dative after the verbless clause. 'The
    King of heaven' preserves the formal title and the genitive relationship clearly.
- source_word: ἀγαλλιάσεται
  chosen: will exult
  alternatives:
  - will rejoice greatly
  - will be glad
  lexicon: BDAG
  rationale: The future middle indicates exuberant rejoicing. Using 'will exult' preserves
    the elevated tone and distinguishes it from the earlier praise expression.
- source_word: μεγαλοσύνην
  chosen: greatness
  alternatives:
  - majesty
  - magnificence
  lexicon: BDAG
  rationale: The noun denotes greatness or majesty. 'Greatness' is the broadest and
    most transparent rendering, while still fitting the doxological context.
- source_word: καὶ ἡ ψυχή μου τῷ βασιλεῖ τοῦ οὐρανοῦ
  chosen: and my soul rejoices in the King of heaven
  alternatives:
  - and my soul belongs to the King of heaven
  - and my soul is directed to the King of heaven
  lexicon: BDAG
  rationale: The Greek as transmitted is elliptical, lacking an explicit finite verb
    in this clause. Given the surrounding praise context and the following future
    of rejoicing, supplying 'rejoices in' yields coherent English while staying close
    to the devotional sense rather than forcing a wooden but unclear rendering.
