theological_decisions:
- issue: Referent of the second-person feminine singular pronouns
  chosen_reading: Addressed to Jerusalem/Zion as a personified city
  alternative_readings:
  - Addressed more generally to the people of God
  rationale: The surrounding hymn addresses Jerusalem in the second person and speaks
    of her peace, afflictions, and glory. The English keeps the direct 'you/your'
    without over-specifying in the main text.
