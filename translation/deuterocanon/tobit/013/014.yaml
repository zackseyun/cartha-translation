id: TOB.13.14
reference: Tobit 13:14
source:
  edition: lxx-swete-1909
  text: ὦ μακάριοι οἱ ἀγαπῶντές σε· χάρησονται ἐπὶ τῇ εἰρήνῃ σου. — μακάριοι ὅσοι
    ἐλυπήθησαν ἐπὶ ταῖς μάστιξίν σου, ὅτι ἐπὶ σοὶ χαρήσονται θεασάμενοι πᾶσαν τὴν
    δόξαν σου· καὶ εὐφρανθήσεται εἰς τὸν αἰῶνα ἡ ψυχή μου.
  language: Greek
  pages:
  - 862
  confidence: high
  validation: agree
translation:
  text: Oh, blessed are those who love you; they will rejoice over your peace. Blessed
    are all who were grieved over your afflictions, because they will rejoice over
    you when they see all your glory; and my soul will be glad forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your scourgings,' 'your plagues,' or 'your chastisements' for 'your
      afflictions.' The Greek μάστιξ can refer literally to a whip or figuratively
      to strokes of suffering.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: Retains the elevated covenantal/religious sense of commendation better
    than the flatter 'happy' or 'fortunate.' The exclamatory opening ὦ supports an
    emphatic blessing formula.
- source_word: οἱ ἀγαπῶντές
  chosen: those who love
  alternatives:
  - the ones loving
  - those who cherish
  lexicon: BDAG
  rationale: A natural English rendering of the substantival present participle, preserving
    the ongoing relational sense without wooden phrasing.
- source_word: χάρησονται
  chosen: they will rejoice
  alternatives:
  - they will be glad
  - they will take joy
  lexicon: BDAG
  rationale: Best matches the future middle sense in idiomatic English and preserves
    the verbal connection with later χαρήσονται.
- source_word: ἐπὶ τῇ εἰρήνῃ σου
  chosen: over your peace
  alternatives:
  - because of your peace
  - at your peace
  - in your peace
  lexicon: BDAG
  rationale: ἐπί with the dative here marks occasion or basis for rejoicing. 'Over
    your peace' is idiomatic and keeps the focus on Jerusalem's restored well-being.
- source_word: ὅσοι ἐλυπήθησαν
  chosen: all who were grieved
  alternatives:
  - all who mourned
  - all who were saddened
  lexicon: BDAG
  rationale: The passive/aorist sense is preserved with 'were grieved.' 'Mourned'
    is possible, but 'were grieved' more closely reflects λυπέω without importing
    funeral overtones.
- source_word: μάστιξίν
  chosen: afflictions
  alternatives:
  - scourgings
  - plagues
  - chastisements
  lexicon: BDAG
  rationale: μάστιξ can denote blows, scourges, or figurative afflictive strokes.
    In this address to Jerusalem/Zion, 'afflictions' communicates the city's sufferings
    without over-literalizing corporal whipping imagery.
- source_word: θεασάμενοι
  chosen: when they see
  alternatives:
  - having seen
  - beholding
  lexicon: BDAG
  rationale: 'An idiomatic temporal rendering of the participle in context: their
    rejoicing occurs upon seeing Jerusalem''s full glory.'
- source_word: πᾶσαν τὴν δόξαν σου
  chosen: all your glory
  alternatives:
  - your whole glory
  - all the glory that is yours
  lexicon: BDAG
  rationale: Straightforward rendering preserving the comprehensive force of πᾶσαν
    and the honor/restoration sense of δόξα.
- source_word: εὐφρανθήσεται
  chosen: will be glad
  alternatives:
  - will rejoice
  - will be made glad
  lexicon: BDAG
  rationale: Varied from the earlier 'rejoice' for readable English while still conveying
    strong joy. The passive/deponent nuance does not require an explicit 'be made
    glad' in English.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for evermore
  lexicon: BDAG
  rationale: Idiomatic English for enduring duration; avoids archaic phrasing while
    preserving the text's perpetual horizon.
- source_word: ἡ ψυχή μου
  chosen: my soul
  alternatives:
  - I myself
  - my life
  lexicon: BDAG
  rationale: ψυχή here expresses the speaker's inner self. 'My soul' preserves the
    personal and devotional register better than the flatter 'I myself.'
