id: TOB.13.15
reference: Tobit 13:15
source:
  edition: lxx-swete-1909
  text: εὐλόγει τὸν θεὸν τὸν βασιλέα τὸν μέγαν,
  language: Greek
  pages:
  - 862
  confidence: high
  validation: minor_mismatch
translation:
  text: Bless God, the great King,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλόγει
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative singular of εὐλογέω. 'Bless' preserves the direct verbal force
    and the biblical idiom of speaking well of or praising God; 'praise' is possible
    but slightly narrows the semantic range.
- source_word: τὸν θεὸν
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: The accusative object with article is naturally rendered 'God' in English
    rather than the less idiomatic 'the God' in this context.
- source_word: τὸν βασιλέα
  chosen: the King
  alternatives:
  - the king
  lexicon: BDAG
  rationale: Appositional title identifying God. Capitalizing 'King' reflects its
    use as a divine title in English while remaining a translation, not a doctrinal
    expansion.
- source_word: τὸν μέγαν
  chosen: great
  alternatives:
  - mighty
  lexicon: BDAG
  rationale: μέγας most straightforwardly means 'great.' 'Mighty' is interpretive
    and emphasizes power rather than greatness more broadly.
