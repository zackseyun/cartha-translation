id: TOB.13.1
reference: Tobit 13:1
source:
  edition: lxx-swete-1909
  text: Καὶ Τωβεὶτ ἔγραφεν προσευχὴν εἰς ἀγαλλίασιν καὶ εἶπεν Εὐλογητὸς ὁ θεὸς ὁ ζῶν
    εἰς τοὺς αἰῶνας καὶ ἡ βασιλεία αὐτοῦ·
  language: Greek
