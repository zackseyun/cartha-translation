    text: בעת ההיא כתב טוביה את כל הדברים האלה בשמחה ויאמר טובי ברוך יי האלהים הגדול
      המפליא לעשות פלאיו לעמו ועכשיו והוא מוחץ ורופא וממית ומחיה ומוריד שאול ויעל
