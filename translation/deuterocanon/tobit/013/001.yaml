theological_decisions:
- issue: How to construe the verbless final clause καὶ ἡ βασιλεία αὐτοῦ
  chosen_reading: 'Render as an elliptical doxological continuation: ''and his kingdom.'''
  alternative_readings:
  - and blessed is his kingdom
  - and his kingdom lives forever
  - and his kingdom is blessed
  rationale: The Greek as given is abrupt and lacks an explicit predicate. Rather
    than supply a strong interpretive expansion, the translation preserves the concise
    doxological style. The broader context in Tobit praises God's everlasting rule,
    but this verse alone does not explicitly state more than 'and his kingdom.'
  doctrine_reference: Preserve theological tension rather than resolve it.
