theological_decisions:
- issue: Referent of the implied subject in 'will scourge' and 'will show mercy'
  chosen_reading: God is the implied subject throughout the verse.
  alternative_readings:
  - Jerusalem as grammatical focus without explicit subject specification
  rationale: The verse addresses Jerusalem directly, but the future verbs lack an
    explicit subject. In context, divine judgment and mercy are in view, and 'city
    of the Holy One' points to God as the actor. English requires an explicit subject,
    so 'he' is supplied.
  doctrine_reference: Preserve theological tension rather than resolve it; make necessary
    English-explicit elements while staying anchored to the source.
- issue: Rendering masculine familial language
  chosen_reading: '''children'' for both occurrences of υἱοί'
  alternative_readings:
  - '''sons'''
  rationale: The Greek uses masculine plural familial language, but in this poetic
    address to Jerusalem the sense is collective and representative rather than restricted
    to males. This follows the project's gender-accurate principle by matching intended
    referent rather than grammatical form alone.
  doctrine_reference: Gender-accurate over gender-neutral.
