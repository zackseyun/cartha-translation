id: TOB.13.9
reference: Tobit 13:9
source:
  edition: lxx-swete-1909
  text: Ἱεροσόλυμα πόλις ἁγίου· μαστιγώσει ἐπὶ τὰ ἔργα τῶν υἱῶν σου, καὶ πάλιν ἐλεήσει
    τοὺς υἱοὺς τῶν δικαίων.
  language: Greek
  pages:
  - 861
  confidence: high
  validation: agree
translation:
  text: 'Jerusalem, city of the Holy One: he will scourge you for the works of your
    children, and again he will show mercy to the children of the righteous.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'city of the holy one'; the Greek genitive may be taken more generally,
      but in context it most likely refers to God.
    reason: lexical_alternative
  - marker: b
    text: Greek 'sons' in both phrases; rendered 'children' here because the sense
      is collective.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: LSJ
  rationale: Standard transliteration of the place name; names are transliterated
    rather than translated.
- source_word: πόλις
  chosen: city
  alternatives:
  - town
  lexicon: LSJ
  rationale: The straightforward sense is 'city'; this appositional phrase identifies
    Jerusalem.
- source_word: ἁγίου
  chosen: the Holy One
  alternatives:
  - the holy city
  - the sanctuary
  - a holy one
  lexicon: LSJ
  rationale: The genitive singular most naturally means 'of the Holy One,' with an
    implied divine referent in context. Rendering it this way preserves the likely
    reference to God rather than shifting the holiness onto the city itself.
- source_word: μαστιγώσει
  chosen: will scourge
  alternatives:
  - will whip
  - will punish
  - will afflict
  lexicon: LSJ
  rationale: The verb literally denotes scourging/whipping and is often used metaphorically
    for severe chastisement. 'Will scourge' preserves the vivid disciplinary force
    without flattening it to a generic 'punish'.
- source_word: ἐπὶ τὰ ἔργα
  chosen: for the works
  alternatives:
  - because of the deeds
  - on account of the actions
  lexicon: LSJ
  rationale: The preposition with the accusative here conveys basis or cause. 'For
    the works' is concise and close to the Greek while remaining intelligible.
- source_word: τῶν υἱῶν σου
  chosen: your children
  alternatives:
  - your sons
  lexicon: LSJ
  rationale: Although υἱοί is formally 'sons,' in this context it refers to the inhabitants/offspring
    associated with Jerusalem more generally. 'Your children' communicates the collective
    sense in natural English without implying only males.
- source_word: πάλιν
  chosen: again
  alternatives:
  - in turn
  - afterward
  lexicon: LSJ
  rationale: 'Marks reversal after judgment: after scourging comes renewed mercy.'
- source_word: ἐλεήσει
  chosen: will show mercy
  alternatives:
  - will have mercy
  - will be merciful to
  lexicon: LSJ
  rationale: This is the standard sense of the verb. 'Will show mercy' is clear modern
    English and preserves the active divine compassion.
- source_word: τοὺς υἱοὺς τῶν δικαίων
  chosen: the children of the righteous
  alternatives:
  - the sons of the righteous
  - the descendants of the righteous
  lexicon: LSJ
  rationale: Again, υἱοί can be rendered more generically in English here. 'The righteous'
    reflects δικαίων as a substantive plural and preserves the moral/theological category.
