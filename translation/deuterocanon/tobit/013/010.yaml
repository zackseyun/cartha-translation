theological_decisions:
- issue: Referent of the addressed second-person pronouns ('for you,' 'within you')
  chosen_reading: The verse addresses Jerusalem/Zion personified, praying for God's
    dwelling to be restored there and for captives and afflicted people to rejoice
    within her.
  alternative_readings:
  - The pronouns could be read more generally of Israel/the people rather than the
    city specifically.
  rationale: The imagery of God's 'tent' being built and people being gladdened 'within
    you' most naturally points to Jerusalem as a personified city, though the corporate
    people are closely bound up with that image.
- issue: Force of 'King of the ages'
  chosen_reading: A divine title emphasizing God's rule across all ages.
  alternative_readings:
  - '''eternal King'' as a smoother interpretive rendering'
  rationale: The Greek genitive is best preserved rather than collapsed into an adjective,
    since the phrase carries liturgical and theological resonance.
