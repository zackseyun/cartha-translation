id: TOB.13.10
reference: Tobit 13:10
source:
  edition: lxx-swete-1909
  text: ἐξομολόγου τῷ κυρίῳ ἀγαθῶς, καὶ εὐλόγει τὸν βασιλέα τῶν αἰώνων, ἵνα πάλιν
    ἡ σκηνὴ αὐτοῦ οἰκοδομηθῇ σοι μετὰ χαρᾶς· καὶ εὐφρᾶναι ἐν σοὶ τοὺς αἰχμαλώτους
    καὶ ἀγαπήσαι ἐν σοὶ τοὺς ταλαιπώρους εἰς πάσας τὰς γενεὰς τοῦ αἰῶνος.
  language: Greek
  pages:
  - 861
  confidence: high
  validation: agree
translation:
  text: Give thanks to the Lord rightly, and bless the King of the ages, so that his
    tent may again be built for you with joy; and so that he may gladden the captives
    within you and love the afflicted within you for all the generations of the age.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the exiles' for 'the captives'; the Greek literally refers to those
      taken captive, likely with the sense of displaced exiles in context.
    reason: lexical_alternative
  - marker: b
    text: '''King of the ages'' may also be rendered ''eternal King.'' The main text
      keeps the Greek expression more closely.'
    reason: lexical_alternative
  - marker: c
    text: 'The address appears to be to Jerusalem/Zion personified: ''within you''
      refers to people restored and rejoicing within the city.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐξομολόγου
  chosen: Give thanks
  alternatives:
  - Confess
  - Praise openly
  lexicon: BDAG
  rationale: In this hymnic/prayer context, the middle imperative carries the sense
    of thankful praise rather than confession of sins. 'Give thanks' is idiomatic
    English and fits the parallel with 'bless.'
- source_word: ἀγαθῶς
  chosen: well
  alternatives:
  - fittingly
  - abundantly
  lexicon: LSJ
  rationale: The adverb modifies the act of thanksgiving/blessing. 'Well' preserves
    the simple Greek without overinterpreting it as moral or quantitative.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows project default for κύριος and suits Jewish-Greek reverential
    usage.
- source_word: βασιλέα τῶν αἰώνων
  chosen: King of the ages
  alternatives:
  - eternal King
  - King forever
  lexicon: LSJ
  rationale: A relatively formal rendering preserves the genitive expression and its
    theological weight better than a flattened paraphrase.
- source_word: σκηνή
  chosen: tent
  alternatives:
  - tabernacle
  - dwelling
  lexicon: LSJ
  rationale: The basic sense is 'tent' or 'tabernacle.' 'Tent' keeps the concrete
    image while avoiding importing later technical cultic associations too strongly;
    the referent is God's dwelling in Zion/Jerusalem.
- source_word: οἰκοδομηθῇ
  chosen: may ... be built
  alternatives:
  - may be rebuilt
  lexicon: BDAG
  rationale: The verb means 'be built.' Because πάλιν already supplies 'again,' English
    can render the repetition naturally as 'may again be built' rather than 'rebuilt
    again.'
- source_word: σοι
  chosen: for you
  alternatives:
  - in you
  - to you
  lexicon: BDAG
  rationale: 'The dative here is best taken as advantage/benefit: the rebuilding is
    for the city''s or people''s benefit.'
- source_word: μετὰ χαρᾶς
  chosen: with joy
  alternatives:
  - joyfully
  lexicon: BDAG
  rationale: A straightforward prepositional rendering preserves the phrase's simplicity.
- source_word: εὐφρᾶναι
  chosen: he may gladden
  alternatives:
  - he may make rejoice
  - he may cheer
  lexicon: BDAG
  rationale: 'Taken as dependent on ἵνα with the preceding clause: the prayer asks
    that God bring joy to the captives. ''Gladden'' is concise and preserves causative
    force.'
- source_word: ἐν σοὶ
  chosen: within you
  alternatives:
  - in you
  - among you
  lexicon: BDAG
  rationale: Addressed to Jerusalem/Zion, the phrase denotes location within the city/community.
    'Within you' is slightly more natural in English while preserving the metaphorical
    address.
- source_word: τοὺς αἰχμαλώτους
  chosen: the captives
  alternatives:
  - the exiles
  - the prisoners
  lexicon: BDAG
  rationale: The word denotes those taken captive; in context it likely refers to
    exiles. 'Captives' stays closest to the Greek while allowing the exile sense to
    be inferred.
- source_word: ἀγαπήσαι
  chosen: love
  alternatives:
  - show love to
  - have compassion on
  lexicon: BDAG
  rationale: The verb is the common word for love. Rendering it directly preserves
    the lexical connection without softening it into a paraphrase.
- source_word: τοὺς ταλαιπώρους
  chosen: the afflicted
  alternatives:
  - the miserable
  - the suffering
  lexicon: LSJ
  rationale: The term refers to those in distress or misery. 'Afflicted' is dignified
    modern English and avoids sounding pejorative.
- source_word: εἰς πάσας τὰς γενεὰς τοῦ αἰῶνος
  chosen: for all the generations of the age
  alternatives:
  - throughout all generations forever
  - for all generations forever
  lexicon: LSJ
  rationale: A relatively literal rendering preserves the doubled temporal expression.
    Though somewhat Hebraic in English, it reflects the solemn style of the prayer.
