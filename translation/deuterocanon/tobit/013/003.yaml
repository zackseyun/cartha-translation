theological_decisions:
- issue: How to render Israel's dispersion as God's action
  chosen_reading: because he himself has scattered us among them
  alternative_readings:
  - for he himself dispersed us among them
  rationale: The Greek explicitly attributes the scattering to God. The translation
    preserves that theological claim without softening it or adding explanatory justification.
  doctrine_reference: Preserve theological tension rather than resolve it.
