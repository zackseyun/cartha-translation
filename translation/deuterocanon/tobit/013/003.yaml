id: TOB.13.3
reference: Tobit 13:3
source:
  edition: lxx-swete-1909
  text: ἐξομολογεῖσθε αὐτῷ, οἱ υἱοὶ Ἰσραήλ, ἐνώπιον τῶν ἐθνῶν, ὅτι αὐτὸς διέσπειρεν
    ἡμᾶς ἐν αὐτοῖς.
  language: Greek
  pages:
  - 859
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: 'ברוך יי לעולם אמן ואמן:'
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
      from an Aramaic Munich MS. The actual ancient evidence is Qumran 4Q196-200 (Aramaic),
      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 13:3
translation:
  text: Give thanks to him, O sons of Israel, before the nations, because he himself
    has scattered us among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Confess him' or 'Praise him'; the Greek verb can carry a range of senses
      including acknowledgment, thanksgiving, and praise.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξομολογεῖσθε
  chosen: Give thanks
  alternatives:
  - Confess
  - Praise
  lexicon: BDAG
  rationale: In biblical Greek this verb can mean confess, acknowledge, or give thanks/praise.
    In this context of public proclamation of God's acts among the nations, 'Give
    thanks' best fits the exhortational tone and common LXX religious usage without
    narrowing it to confession of sin.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Simple dative object referring to God; retained directly.
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: O sons of Israel
  alternatives:
  - children of Israel
  - people of Israel
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural 'sons.' Per project philosophy,
    a gender-accurate rendering is preferred over flattening to a neutral collective.
    The vocative force is conveyed with 'O.'
- source_word: ἐνώπιον τῶν ἐθνῶν
  chosen: before the nations
  alternatives:
  - in the sight of the nations
  - among the nations
  lexicon: BDAG
  rationale: ἐνώπιον is literally 'before/in the presence of.' 'Before the nations'
    preserves the public, testimonial setting better than 'among,' which would blur
    into the following phrase.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the reason for the exhortation. 'Because' makes the causal
    force clear in modern English.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - he alone
  lexicon: BDAG
  rationale: The pronoun is emphatic. 'He himself' preserves the emphasis without
    overinterpreting exclusivity.
- source_word: διέσπειρεν
  chosen: has scattered
  alternatives:
  - scattered
  - dispersed
  lexicon: BDAG
  rationale: The aorist refers to God's act of dispersing Israel. English present
    perfect ('has scattered') naturally connects the past act with the present condition
    'among them.' 'Scattered' is more idiomatic and biblically resonant than 'dispersed.'
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: Direct object; retained plainly.
- source_word: ἐν αὐτοῖς
  chosen: among them
  alternatives:
  - in them
  lexicon: BDAG
  rationale: Refers back to the nations; 'among them' is the natural English sense
    for peoples rather than locations.
