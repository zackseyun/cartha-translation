id: TOB.13.18
reference: Tobit 13:18
source:
  edition: lxx-swete-1909
  text: καὶ ἐροῦσιν πᾶσαι αἱ ῥῦμαι αὐτῆς ἀλληλουιὰ καὶ αἴνεσιν, λέγοντες Εὐλογητὸς
    ὁ θεὸς ὃς ὕψωσεν πάντας τοὺς αἰῶνας.
  language: Greek
  pages:
  - 862
  confidence: high
  validation: minor_mismatch
translation:
  text: And all her streets will say, ‘Hallelujah and praise!’ saying, ‘Blessed is
    God, who has exalted all the ages.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'who is exalted forever' or 'throughout all ages.'
      The Greek reads literally 'who has exalted all the ages,' an unusual expression.
    reason: alternative_reading
lexical_decisions:
- source_word: ῥῦμαι
  chosen: streets
  alternatives:
  - lanes
  - alleys
  lexicon: LSJ
  rationale: ῥύμη commonly denotes a street or lane within a city. 'Streets' is the
    most natural modern English rendering here and fits the personified city imagery.
- source_word: ἀλληλουιά
  chosen: Hallelujah
  alternatives:
  - Praise Yah
  - Praise the LORD
  lexicon: LSJ
  rationale: The Greek preserves the liturgical transliteration rather than translating
    it. Retaining 'Hallelujah' reflects the source form and recognizable worship language.
- source_word: αἴνεσιν
  chosen: praise
  alternatives:
  - praises
  - a song of praise
  lexicon: LSJ
  rationale: The noun denotes praise. Singular 'praise' works idiomatically with the
    exclamatory pair 'Hallelujah and praise' and reflects the accusative object of
    what the streets utter.
- source_word: Εὐλογητός
  chosen: Blessed
  alternatives:
  - Praised
  - Blessed be
  lexicon: LSJ
  rationale: As a predicate of God in a doxological statement, 'Blessed is God' is
    a standard and accurate rendering. 'Blessed be God' would be possible, but the
    Greek has the article with θεός and reads more like a declaration than a wish.
- source_word: ὕψωσεν
  chosen: has exalted
  alternatives:
  - has raised high
  - has lifted up
  lexicon: LSJ
  rationale: ὑψόω means to raise or exalt. 'Has exalted' best preserves the elevated
    doxological tone.
- source_word: πάντας τοὺς αἰῶνας
  chosen: all the ages
  alternatives:
  - all eternity
  - every age
  - all worlds
  lexicon: LSJ
  rationale: 'The phrase is unusual here. A formally anchored rendering is preferable:
    αἰῶνες normally means ''ages.'' Although some interpreters may understand an idiomatic
    sense like ''forever,'' the Greek wording itself points to ''ages,'' so that tension
    is preserved rather than flattened.'
