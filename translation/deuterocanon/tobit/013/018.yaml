theological_decisions:
- issue: Meaning of πάντας τοὺς αἰῶνας in the final clause
  chosen_reading: all the ages
  alternative_readings:
  - all eternity
  - forever
  rationale: The source text literally refers to 'all the ages.' Because the phrase
    is somewhat awkward in English but theologically evocative, the main text preserves
    the lexical sense rather than resolving it into a smoother idiom. An idiomatic
    temporal sense is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms documented per verse.
