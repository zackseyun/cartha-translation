theological_decisions:
- issue: Sense of μυστήριον in a wisdom/proverbial context
  chosen_reading: secret
  alternative_readings:
  - mystery
  rationale: In this verse the term concerns confidential royal information, not a
    revealed theological mystery in the later apocalyptic or Pauline sense. Rendering
    it as 'secret' avoids importing doctrinal overtones the text does not require.
  doctrine_reference: Translation philosophy §1; preserve source-text plain sense
    over tradition.
