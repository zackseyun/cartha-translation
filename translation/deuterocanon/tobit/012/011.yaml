id: TOB.12.11
reference: Tobit 12:11
source:
  edition: lxx-swete-1909
  text: οὐ μὴ κρύψω ἀφʼ ὑμῶν πᾶν ῥῆμα· εἴρηκα δὴ μυστήριον βασιλέως κρύψαι καλόν,
    τὰ δὲ ἔργα τοῦ θεοῦ ἀνακαλύπτειν ἐνδόξως.
  language: Greek
  pages:
  - 858
  confidence: high
  validation: agree
translation:
  text: I will certainly not hide any word from you. I have indeed said, ‘It is good
    to hide a king’s secret, but to reveal the works of God gloriously.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mystery of a king.' Here the Greek word refers to a confidential
      matter or secret, not necessarily a theological 'mystery.'
    reason: lexical_alternative
  - marker: b
    text: Or 'honorably' or 'with honor.' The adverb may describe the fitting manner
      of making God's works known.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μὴ κρύψω
  chosen: I will certainly not hide
  alternatives:
  - I will by no means hide
  - I will not conceal
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive gives strong negation with future force.
    'Certainly not hide' preserves the emphatic assurance in natural English.
- source_word: ἀφʼ ὑμῶν
  chosen: from you
  alternatives:
  - away from you
  - to you
  lexicon: BDAG
  rationale: The preposition ἀπό with the genitive after κρύπτω indicates withholding
    something from someone. 'From you' is the most direct English equivalent.
- source_word: πᾶν ῥῆμα
  chosen: any word
  alternatives:
  - anything
  - every matter
  lexicon: BDAG
  rationale: Literally 'every word/matter.' In this context Raphael means he will
    withhold nothing of what he is about to disclose. 'Any word' keeps the lexical
    link to ῥῆμα while sounding idiomatic in English.
- source_word: εἴρηκα δὴ
  chosen: I have indeed said
  alternatives:
  - I said indeed
  - for I have said
  lexicon: BDAG
  rationale: The perfect εἴρηκα can be rendered as a present-result perfect in English.
    δή adds emphasis. 'I have indeed said' preserves both the aspect and the emphatic
    particle without overloading the sentence.
- source_word: μυστήριον βασιλέως
  chosen: a king’s secret
  alternatives:
  - the mystery of a king
  - a royal secret
  lexicon: BDAG
  rationale: μυστήριον here refers to a confidential matter rather than a theological
    'mystery.' 'A king’s secret' communicates the sense clearly in contemporary English.
- source_word: κρύψαι καλόν
  chosen: It is good to hide
  alternatives:
  - to conceal is good
  - it is right to keep hidden
  lexicon: BDAG
  rationale: The infinitive with καλόν expresses a general maxim. 'It is good to hide'
    is concise and preserves the proverbial tone.
- source_word: τὰ δὲ ἔργα τοῦ θεοῦ
  chosen: the works of God
  alternatives:
  - God’s deeds
  - the deeds of God
  lexicon: BDAG
  rationale: ἔργα can mean works or deeds. 'Works of God' preserves the formal resonance
    and broad scope of divine actions.
- source_word: ἀνακαλύπτειν
  chosen: to reveal
  alternatives:
  - to uncover
  - to disclose
  lexicon: BDAG
  rationale: The verb means to uncover or make known. 'Reveal' fits the contrast with
    'hide' and reads naturally in English.
- source_word: ἐνδόξως
  chosen: gloriously
  alternatives:
  - with honor
  - honorably
  - in a glorious way
  lexicon: LSJ
  rationale: The adverb can denote doing something splendidly or honorably. 'Gloriously'
    preserves the lexical connection to glory and suits the context of publicly declaring
    God's works, though the nuance of 'honorably' remains possible.
