id: TOB.12.9
reference: Tobit 12:9
source:
  edition: lxx-swete-1909
  text: ἐλεημοσύνη ἐκ θανάτου ῥύεται, καὶ αὐτὴ ἀποκαθαριεῖ πᾶσαν ἁμαρτίαν. οἱ ποιοῦντες
    ἐλεημοσύνας καὶ δικαιοσύνας πλησθήσονται ζωῆς·
  language: Greek
  pages:
  - 858
  confidence: high
  validation: agree
translation:
  text: Almsgiving rescues from death, and it will cleanse away every sin. Those who
    do acts of almsgiving and righteousness will be filled with life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Those who practice almsgiving and righteous deeds will have their fill
      of life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεημοσύνη
  chosen: almsgiving
  alternatives:
  - charity
  - merciful giving
  lexicon: BDAG
  rationale: The noun denotes concrete acts of mercy expressed in giving to those
    in need, not merely an abstract disposition. 'Almsgiving' preserves the specific
    charitable sense better than the broader 'charity.'
- source_word: ῥύεται
  chosen: rescues
  alternatives:
  - delivers
  - saves
  lexicon: BDAG
  rationale: The verb means to deliver or rescue from danger. 'Rescues' is clear modern
    English and fits the immediate object 'from death' without importing fuller soteriological
    overtones beyond the text.
- source_word: θανάτου
  chosen: death
  lexicon: BDAG
  rationale: Straightforward rendering of the genitive after ἐκ, indicating deliverance
    from death.
- source_word: ἀποκαθαριεῖ
  chosen: will cleanse away
  alternatives:
  - will purge
  - will cleanse
  lexicon: BDAG
  rationale: The compound verb intensifies the idea of cleansing or purging. 'Cleanse
    away' captures both the cleansing sense and the removal implied by the context
    of sin.
- source_word: πᾶσαν ἁμαρτίαν
  chosen: every sin
  alternatives:
  - all sin
  lexicon: BDAG
  rationale: The singular with πᾶσαν is naturally rendered distributively as 'every
    sin,' preserving the comprehensive force.
- source_word: ποιοῦντες
  chosen: do acts of
  alternatives:
  - do
  - practice
  lexicon: BDAG
  rationale: The participle governs plural nouns and indicates ongoing practice. 'Do
    acts of' makes natural English with 'almsgiving and righteousness' while preserving
    the active sense.
- source_word: ἐλεημοσύνας
  chosen: almsgiving
  alternatives:
  - acts of mercy
  - charitable deeds
  lexicon: BDAG
  rationale: Though plural in Greek, English idiom often uses the mass noun 'almsgiving.'
    The preceding 'do acts of' preserves the plural/practical force.
- source_word: δικαιοσύνας
  chosen: righteousness
  alternatives:
  - justice
  - righteous deeds
  lexicon: BDAG
  rationale: In this Jewish wisdom context the plural likely refers to righteous acts
    or upright conduct. 'Righteousness' keeps the key biblical term, while the construction
    'acts of ... righteousness' signals practical expression. 'Justice' is possible
    but less clearly paired with ἐλεημοσύνας here.
- source_word: πλησθήσονται ζωῆς
  chosen: will be filled with life
  alternatives:
  - will have their fill of life
  - will be satisfied with life
  lexicon: BDAG
  rationale: The future passive with a genitive can mean to be filled or satisfied
    with something. 'Will be filled with life' is a close and readable rendering that
    preserves the vivid metaphor without overinterpreting whether 'life' means longevity,
    vitality, or fuller blessing.
