theological_decisions:
- issue: Relationship between almsgiving and forgiveness/deliverance
  chosen_reading: Retain the text's direct claim that almsgiving rescues from death
    and cleanses away every sin without softening it into a mere general principle.
  alternative_readings:
  - Interpret as hyperbolic wisdom language about the practical benefits of generosity
  - Interpret as covenantal atonement language tied to repentance rather than a mechanistic
    earning of forgiveness
  rationale: The Greek states the claim directly, and transparency requires preserving
    that theological tension rather than diluting it. At the same time, the translation
    avoids importing later doctrinal systems or explanatory qualifiers not present
    in the verse.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
- issue: δικαιοσύνας in a deuterocanonical wisdom context
  chosen_reading: Render as 'righteousness' in the main text rather than 'justice,'
    while noting the practical sense in the lexical rationale.
  alternative_readings:
  - justice
  - righteous deeds
  rationale: The project default for δικαιοσύνη is 'righteousness' unless context
    strongly demands otherwise. Here the plural and pairing with almsgiving suggest
    concrete righteous conduct, but 'righteousness' best preserves the biblical-theological
    term while remaining understandable in context.
  doctrine_reference: 'DOCTRINE.md Contested terms table: δικαιοσύνη'
