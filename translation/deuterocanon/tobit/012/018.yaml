id: TOB.12.18
reference: Tobit 12:18
source:
  edition: lxx-swete-1909
  text: ὅτι οὐ τῇ ἐμαυτοῦ χάριτι ἀλλὰ τῇ θελήσει τοῦ θεοῦ ὑμῶν· ὅθεν εὐλογεῖτε αὐτὸν
    εἰς τὸν αἰῶνα.
  language: Greek
  pages:
  - 859
  confidence: high
  validation: agree
translation:
  text: For it was not by my own favor, but by the will of your God. Therefore bless
    him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not by my own grace.' The Greek χάρις can mean 'grace' or 'favor'; here
      it likely refers to Raphael's own initiative or beneficence.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριτι
  chosen: favor
  alternatives:
  - grace
  - kindness
  lexicon: BDAG
  rationale: In this context Raphael denies acting from his own initiative or beneficence.
    'Favor' communicates personal benefaction more naturally in English here than
    the more theologically loaded 'grace,' while still reflecting χάρις.
- source_word: θελήσει
  chosen: will
  alternatives:
  - purpose
  - desire
  lexicon: BDAG
  rationale: θέλημα commonly denotes will or intention. 'Will' is the most direct
    and idiomatic rendering in the phrase 'by the will of your God.'
- source_word: τοῦ θεοῦ ὑμῶν
  chosen: your God
  alternatives:
  - God of you
  lexicon: BDAG
  rationale: The genitive phrase is straightforwardly possessive/relational. 'Your
    God' preserves the direct address to Tobit and his household.
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - wherefore
  - for this reason
  - so then
  lexicon: LSJ
  rationale: ὅθεν here introduces an inference or exhortational conclusion from the
    preceding statement. 'Therefore' is clear modern English and preserves the logical
    connection.
- source_word: εὐλογεῖτε
  chosen: bless
  alternatives:
  - praise
  - speak well of
  lexicon: BDAG
  rationale: The imperative calls for blessing God. 'Bless' keeps the biblical register
    and lexical continuity better than 'praise,' though praise is conceptually related.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - unto eternity
  lexicon: BDAG
  rationale: This idiom regularly means enduringly or forever. 'Forever' is idiomatic
    and faithful in English.
- source_word: ἐμαυτοῦ
  chosen: my own
  alternatives:
  - myself
  - of myself
  lexicon: BDAG
  rationale: The reflexive intensifies the denial of personal agency or credit. 'My
    own' fits naturally with 'favor' in English.
