theological_decisions:
- issue: Sense of χάρις in Raphael's denial of agency
  chosen_reading: Raphael says his appearance/help was not due to his own favor or
    initiative, but to God's will.
  alternative_readings:
  - Raphael says it was not by his own grace, but by God's will.
  rationale: Because χάρις can mean grace, favor, or graciousness, the wording could
    sound doctrinally weighty in English if rendered 'grace.' In this narrative setting
    the point is delegated agency rather than a theological discourse on grace, so
    'favor' best preserves the sense without importing later doctrinal associations.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
