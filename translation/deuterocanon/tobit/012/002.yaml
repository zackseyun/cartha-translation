id: TOB.12.2
reference: Tobit 12:2
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν Πάτερ, οὐ βλάπτομαι δοὺς αὐτῷ τὸ ἥμυσυ ὧν ἐνήνοχα,
  language: Greek
  pages:
  - 857
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: ויקרא טוביה אל רפאל (ויאמר לו) עזריה אחי[בא ו]קח שכרך חצי הכסף שהבאת[י]
      משם [כי הוא שכרך] ולך לשלום.
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
      from an Aramaic Munich MS. The actual ancient evidence is Qumran 4Q196-200 (Aramaic),
      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 12:2
translation:
  text: And he said, “Father, I lose nothing by giving him half of what I have brought
    back.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek says literally, 'I am not harmed, having given him half of what
      I have brought.' The sense is that paying the guide half the recovered goods
      would not leave Tobias at a loss.
    reason: lexical_alternative
  - marker: b
    text: The Semitic parallel likewise supports the sense of taking half of the money/goods
      brought back, reinforcing 'brought back' rather than a bare 'brought.'
    reason: cross_reference
lexical_decisions:
- source_word: Πάτερ
  chosen: Father
  alternatives:
  - my father
  lexicon: LSJ
  rationale: Direct vocative address to Tobit's father. English can omit the possessive
    in direct address; 'Father' preserves the immediacy of the Greek while remaining
    natural.
- source_word: οὐ βλάπτομαι
  chosen: I lose nothing
  alternatives:
  - I am not harmed
  - I suffer no loss
  lexicon: LSJ
  rationale: The middle/passive form here expresses that Tobias would not be disadvantaged
    by the payment. 'I lose nothing' is idiomatic modern English and fits the economic
    context better than the more literal but less natural 'I am not harmed.'
- source_word: δοὺς
  chosen: by giving
  alternatives:
  - having given
  - if I give
  lexicon: LSJ
  rationale: Aorist participle linked to the main verb; in English, 'by giving' best
    conveys the attendant circumstance/circumstantial sense in a smooth way without
    over-paraphrasing.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: LSJ
  rationale: Indirect object referring to Raphael/Azariah. English idiom after 'giving'
    can express this simply as 'giving him.'
- source_word: τὸ ἥμυσυ
  chosen: half
  alternatives:
  - the half
  - one-half
  lexicon: LSJ
  rationale: Standard rendering of the neuter substantive meaning 'half.' English
    normally omits the article here.
- source_word: ὧν ἐνήνοχα
  chosen: of what I have brought back
  alternatives:
  - of what I have brought
  - of the things I have brought back
  lexicon: LSJ
  rationale: The perfect form indicates completed action with present relevance. In
    context Tobias is speaking of the goods/money recovered and returned with. 'Brought
    back' reflects the travel-and-return setting and is supported by the Semitic parallel's
    sense of bringing from there.
