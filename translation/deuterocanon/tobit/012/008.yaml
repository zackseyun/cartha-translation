id: TOB.12.8
reference: Tobit 12:8
source:
  edition: lxx-swete-1909
  text: ἀγαθὸν προσευχὴ μετὰ νηστείας καὶ ἐλεημοσύνης καὶ δικαιοσύνης· ἀγαθὸν τὸ ὀλίγον
    μετὰ δικαιοσύνης ἢ πολὺ μετὰ ἀδικίας· καλὸν ποιῆσαι ἐλεημοσύνην ἢ θησαυρίσαι χρυσίον.
  language: Greek
  pages:
  - 858
  confidence: high
  validation: agree
translation:
  text: Prayer with fasting, almsgiving, and righteousness is good; a little with
    righteousness is better than much with unrighteousness. It is good to do almsgiving
    rather than to store up gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice' ... 'injustice' for 'righteousness' ... 'unrighteousness.'
    reason: lexical_alternative
  - marker: b
    text: The final clause is literally 'to do almsgiving rather than to store up
      gold'; English could also be rendered more idiomatically, 'to give alms rather
      than to store up gold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαθὸν
  chosen: is good
  alternatives:
  - is beneficial
  - is better
  lexicon: LSJ
  rationale: The predicate adjective introduces an evaluative statement. 'Is good'
    is the most direct and natural rendering in English. In the second clause, English
    requires 'better' to express the comparative force created by ἢ ('than') across
    the contrasted quantities, even though ἀγαθόν is repeated rather than a formal
    comparative adjective.
- source_word: προσευχὴ
  chosen: Prayer
  alternatives:
  - prayer
  lexicon: LSJ
  rationale: Rendered with the standard religious term 'prayer.' Capitalization here
    simply reflects sentence-initial position, not a special theological nuance.
- source_word: μετὰ
  chosen: with
  alternatives:
  - accompanied by
  - together with
  lexicon: LSJ
  rationale: The preposition links prayer to associated practices. 'With' preserves
    the coordination without over-interpreting whether these are means, circumstances,
    or accompanying disciplines.
- source_word: νηστείας
  chosen: fasting
  alternatives:
  - a fast
  lexicon: LSJ
  rationale: The abstract/collective sense fits the triad of pious practices. 'Fasting'
    is idiomatic and preserves the ascetic-religious sense.
- source_word: ἐλεημοσύνης
  chosen: almsgiving
  alternatives:
  - charity
  - acts of mercy
  lexicon: LSJ
  rationale: In this Jewish-Greek context the word denotes giving to the needy. 'Almsgiving'
    is more precise than 'charity,' which can sound broader or more affective in modern
    English.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: Following the project's default for δικαιοσύνη, 'righteousness' is used
    in the main text. In Tobit this term can overlap with just conduct, but 'righteousness'
    best preserves the moral-religious dimension across the verse.
- source_word: τὸ ὀλίγον
  chosen: a little
  alternatives:
  - little
  - a small amount
  lexicon: LSJ
  rationale: The articular neuter functions substantivally for a small quantity. 'A
    little' is idiomatic in the proverb-like comparison.
- source_word: πολὺ
  chosen: much
  alternatives:
  - a great amount
  - abundance
  lexicon: LSJ
  rationale: The simple contrast with τὸ ὀλίγον is best preserved by 'much.'
- source_word: ἀδικίας
  chosen: unrighteousness
  alternatives:
  - injustice
  - wrongdoing
  lexicon: LSJ
  rationale: To preserve the lexical contrast with δικαιοσύνη, 'unrighteousness' is
    preferred over 'injustice,' though the latter is a viable contextual nuance.
- source_word: καλὸν
  chosen: It is good
  alternatives:
  - It is noble
  - It is fitting
  lexicon: LSJ
  rationale: καλόν overlaps with moral beauty or nobility, but in this context a smooth
    English rendering aligned with the surrounding ἀγαθόν-statements is 'It is good.'
    This avoids overstylizing the final maxim while preserving positive moral evaluation.
- source_word: ποιῆσαι ἐλεημοσύνην
  chosen: to do almsgiving
  alternatives:
  - to give alms
  - to practice almsgiving
  lexicon: LSJ
  rationale: The Greek literally uses 'do almsgiving.' This rendering keeps the lexical
    link with ἐλεημοσύνη earlier in the verse. 'Give alms' is idiomatic but slightly
    narrows the expression to a single act rather than the practice.
- source_word: θησαυρίσαι
  chosen: to store up
  alternatives:
  - to treasure up
  - to hoard
  lexicon: LSJ
  rationale: The verb means to accumulate or lay up treasure. 'Store up' is natural
    and avoids importing the pejorative force of 'hoard,' which the Greek does not
    explicitly state.
- source_word: χρυσίον
  chosen: gold
  alternatives:
  - money
  - gold treasure
  lexicon: LSJ
  rationale: The noun specifically denotes gold or gold money. 'Gold' is the most
    straightforward rendering and preserves the concrete image.
