theological_decisions:
- issue: Sense of ἐξομολογεῖσθαι αὐτῷ
  chosen_reading: openly acknowledge God
  alternative_readings:
  - confess to him
  - give thanks to him
  - praise him openly
  rationale: The immediate context contrasts concealing royal secrets with disclosing
    God's works, favoring a public acknowledgment/praise sense rather than confession
    of sins. 'Acknowledge him' preserves breadth while fitting the context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of ἐνδόξως
  chosen_reading: gloriously
  alternative_readings:
  - honorably
  - with due honor
  rationale: The adverb likely carries a doxological nuance in relation to God's works.
    'Gloriously' preserves that theological weight, while a footnote notes the more
    general ethical nuance 'honorably.'
  doctrine_reference: Translation philosophy §3
