id: TOB.12.7
reference: Tobit 12:7
source:
  edition: lxx-swete-1909
  text: ὀκνεῖτε ἐξομολογεῖσθαι αὐτῷ. μυστήριον βασιλέως καλὸν κρύψαι, τὰ δὲ ἔργα τοῦ
    θεοῦ ἀνακαλύπτειν ἐνδόξως. ἀγαθὸν ποιήσατε, καὶ κακὸν οὐχ εὑρήσει ὑμᾶς.
  language: Greek
  pages:
  - 858
  confidence: high
  validation: agree
translation:
  text: Do not hesitate to acknowledge him. It is good to conceal a king’s secret,
    but to reveal the works of God gloriously. Do what is good, and evil will not
    find you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confess to him,' 'give thanks to him,' or 'praise him openly.' The Greek
      verb can carry any of these public-acknowledgment senses depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'honorably' / 'with due honor.' The Greek adverb may describe the fitting
      manner of speaking about God's works.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀκνεῖτε
  chosen: Do not hesitate
  alternatives:
  - Do not delay
  - Do not be reluctant
  lexicon: LSJ
  rationale: The verb means to shrink back, hesitate, or delay. In this exhortational
    context, 'Do not hesitate' is natural modern English and preserves the imperative
    force without sounding wooden.
- source_word: ἐξομολογεῖσθαι
  chosen: to acknowledge
  alternatives:
  - to confess
  - to give thanks
  - to praise openly
  lexicon: LSJ
  rationale: The verb can mean confess, acknowledge, or give praise/thanks publicly
    depending on context. Here, with αὐτῷ ('to him') and in a context of speaking
    rightly about God’s deeds, 'acknowledge' best captures open recognition of God
    without narrowing the sense to confession of sin.
- source_word: μυστήριον βασιλέως
  chosen: a king’s secret
  alternatives:
  - the secret of a king
  - royal mystery
  lexicon: LSJ
  rationale: μυστήριον here refers to a confidential matter rather than a theological
    'mystery.' 'A king’s secret' is idiomatic and clear.
- source_word: καλὸν κρύψαι
  chosen: It is good to conceal
  alternatives:
  - It is noble to hide
  - It is right to keep hidden
  lexicon: LSJ
  rationale: The infinitive construction states a general maxim. 'It is good to conceal'
    preserves the proverbial tone and moral evaluation.
- source_word: τὰ δὲ ἔργα τοῦ θεοῦ
  chosen: the works of God
  alternatives:
  - God’s deeds
  lexicon: LSJ
  rationale: ἔργα can be 'works' or 'deeds.' 'Works of God' is a standard and transparent
    rendering that fits the contrast with a king’s secret.
- source_word: ἀνακαλύπτειν
  chosen: to reveal
  alternatives:
  - to uncover
  - to make known
  lexicon: LSJ
  rationale: The verb literally means uncover or disclose. 'Reveal' is concise and
    fits the proverbial contrast with 'conceal.'
- source_word: ἐνδόξως
  chosen: gloriously
  alternatives:
  - with honor
  - in a glorious way
  - honorably
  lexicon: LSJ
  rationale: The adverb modifies the manner of revealing God's works. 'Gloriously'
    keeps the doxological sense, though the exact nuance could also be 'honorably.'
    A footnote preserves that lexical alternative.
- source_word: ἀγαθὸν ποιήσατε
  chosen: Do what is good
  alternatives:
  - Do good
  - Practice what is good
  lexicon: LSJ
  rationale: The phrase is a straightforward ethical imperative. 'Do what is good'
    is slightly fuller than 'Do good' and mirrors the Greek object.
- source_word: κακὸν οὐχ εὑρήσει ὑμᾶς
  chosen: evil will not find you
  alternatives:
  - harm will not overtake you
  - trouble will not find you
  lexicon: LSJ
  rationale: The Greek literally says 'evil will not find you.' This may imply harm
    or calamity, but the literal image is clear and forceful, so it is retained.
