id: TOB.12.1
reference: Tobit 12:1
source:
  edition: lxx-swete-1909
  text: Καὶ ἐκάλεσεν Τωβεὶτ Τωβείαν τὸν υἱὸν αὐτοῦ καὶ εἶπεν αὐτῷ Ὅρα, τέκνον, μισθὸν
    τῷ ἀνθρώπῳ τῷ συνελθόντι σοι, καὶ προσθεῖναι αὐτῷ δεῖ.
  language: Greek
  pages:
  - 857
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: ויאמר טובי אל טוביה בנו בני האיש אשר הלך עמך נתן לו שכרו ועוד נוסיף עליו
      ויאמר טוביה אבי נתן לו [את] חצי הכסף אשר הבאתי משם כי הוא הוליכני בשלום והביאני
      בשלום ורפא את אשתי והוציא את הכסף מיד גביאל ורפא את עיניך ומה ראוי לתת לו על
      כל זאת.
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
      from an Aramaic Munich MS. The actual ancient evidence is Qumran 4Q196-200 (Aramaic),
      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 12:1
translation:
  text: Then Tobit called Tobias his son and said to him, “See, child, wages must
    be given to the man who went with you, and more must be added for him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''child''; the parallel Semitic phrasing reads ''my son.'' The main
      text follows the Greek vocative while preserving the familial nuance in context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: BDAG
  rationale: Standard narrative use of the verb for calling someone to oneself. 'Called'
    is natural modern English and sufficiently formal.
- source_word: Ὅρα
  chosen: See
  alternatives:
  - Look
  - Take note
  lexicon: BDAG
  rationale: Imperative introducing attention to what follows. 'See' preserves the
    directness of the Greek and works idiomatically in English speech.
- source_word: τέκνον
  chosen: child
  alternatives:
  - son
  lexicon: BDAG
  rationale: Although Tobias is Tobit's son, the Greek uses the affectionate vocative
    'child' rather than the more specific 'son.' This preserves the tenderness of
    address. The parallel Semitic witness has 'my son,' which confirms filial context,
    but the Greek wording is best represented by 'child' in the main text.
- source_word: μισθὸν
  chosen: wages
  alternatives:
  - pay
  - reward
  lexicon: BDAG
  rationale: The context is compensation due to a traveling companion/guide. 'Wages'
    reflects payment owed for service more precisely than the broader 'reward.'
- source_word: τῷ ἀνθρώπῳ
  chosen: the man
  alternatives:
  - the person
  lexicon: BDAG
  rationale: The Greek is specifically masculine singular and refers to the male companion.
    Per gender-accurate policy, 'the man' is preferred.
- source_word: τῷ συνελθόντι σοι
  chosen: who went with you
  alternatives:
  - who accompanied you
  - who came along with you
  lexicon: BDAG
  rationale: The participle literally means 'the one who went with you' or 'accompanied
    you.' 'Who went with you' is close to the Greek and aligns with the Semitic parallel's
    wording.
- source_word: προσθεῖναι αὐτῷ δεῖ
  chosen: more must be added for him
  alternatives:
  - we must add more for him
  - something extra must be given to him
  lexicon: BDAG
  rationale: The impersonal δεῖ expresses necessity. The infinitive προσθεῖναι indicates
    adding beyond the basic wage. 'More must be added for him' preserves both the
    impersonal force and the idea of additional compensation.
