theological_decisions:
- issue: Referent of the healer/benefactor
  chosen_reading: The repeated third-person verbs are rendered with 'he,' leaving
    the immediate referent implicit in the discourse rather than specifying a name
    in the translation.
  alternative_readings:
  - Expanding to 'Raphael' for clarity
  - Interpreting the actions more directly as God's agency through Raphael
  rationale: The Greek uses third-person verbs without naming the subject in this
    clause. The broader context identifies Raphael, but the verse itself does not
    restate the name. Keeping 'he' preserves the source wording and avoids importing
    an explicit theological clarification not present in the line.
  doctrine_reference: Preserve theological tension rather than resolve it.
