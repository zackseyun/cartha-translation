id: TOB.12.3
reference: Tobit 12:3
source:
  edition: lxx-swete-1909
  text: ὅτι με ἀγώχεν σοι ὑγιῆ, καὶ τὴν γυναῖκά μου ἐθεράπευσεν καὶ τὸ ἀργύριόν μου
    ἤνεγκεν, καὶ σὲ ὁμοίως ἐθεράπευσεν.
  language: Greek
  pages:
  - 857
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: ויאמר רפאל אל טובי ואל טוביה בנו שירו ליי שיר חדש וברכו(הו) וזמרו שמו על
      כל הטובה אשר עשה עמכם והרבו לפניו תפלה ותחנה וצדקה כל ימי חייכם כי טוב לפני
      יי לעשות צדקה תמיד מכנוס אוצרות כסף וזהב כי צדקה תציל ממות ואני לא אכחד מכם
      כל האמת דעו כי בעת אשר התפללת[ם] והתחננת[ם] לפני (הקדוש ברוך הוא) אתה ושרה כלתך
      על צרת נפשכם אני העליתי תפלתכם לפני כסא הכבוד ובעת אשר היית קובר את המתים אני
      הייתי עמך [ובחג שבועות שעזבת את שלחנך והלכת לקבור את המת אני הייתי עמך] ובחנך
      האלהים בעורות עיניך כי יי צדיק יבחן ובעת צרתך שלחני יי לרפא אותך ואת שרה כלתך
      ואני (הוא) רפאל המלאך אחד מן השרים המשרתים לפני כסא הכבוד.
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
      from an Aramaic Munich MS. The actual ancient evidence is Qumran 4Q196-200 (Aramaic),
      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 12:3
translation:
  text: because he brought me back to you safe and sound, and he healed my wife and
    brought back my money, and he likewise healed you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally 'my silver'; here it refers to the money that had been recovered.
    reason: lexical_alternative
  - marker: b
    text: The subject is implicit in Greek ('he ... healed ... brought back ... healed').
      In context, this refers to Raphael.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγώχεν
  chosen: brought ... back
  alternatives:
  - led
  - conducted
  - brought
  lexicon: LSJ
  rationale: The verb denotes leading or bringing. In context, with με ... σοι and
    the family-reunion setting, 'brought me back to you' best captures restoration
    to Tobit rather than mere physical escort.
- source_word: ὑγιῆ
  chosen: healthy
  alternatives:
  - safe and sound
  - well
  - unharmed
  lexicon: LSJ
  rationale: The adjective means healthy/sound. 'Healthy' fits the healing context
    of the verse and keeps the medical nuance alongside the repeated 'healed'.
- source_word: ἐθεράπευσεν
  chosen: healed
  alternatives:
  - cured
  - restored
  lexicon: BDAG
  rationale: The verb commonly means heal/cure. 'Healed' is the most direct and consistent
    rendering here for both the wife and Tobit.
- source_word: τὴν γυναῖκά μου
  chosen: my wife
  alternatives:
  - my woman
  lexicon: BDAG
  rationale: In this context γυνή clearly means spouse, not simply woman.
- source_word: τὸ ἀργύριόν μου
  chosen: my money
  alternatives:
  - my silver
  lexicon: LSJ
  rationale: Although literally 'silver,' the phrase refers to deposited funds recovered
    in the narrative. 'My money' communicates the referent in natural English without
    obscuring the sense.
- source_word: ἤνεγκεν
  chosen: brought back
  alternatives:
  - brought
  - carried
  lexicon: BDAG
  rationale: Given the narrative context of recovered funds, 'brought back' makes
    explicit the restorative force already implied by the story and by the surrounding
    benefits listed.
- source_word: ὁμοίως
  chosen: likewise
  alternatives:
  - also
  - in the same way
  lexicon: BDAG
  rationale: '''Likewise'' preserves the comparative force and links Tobit''s healing
    with the wife''s healing.'
