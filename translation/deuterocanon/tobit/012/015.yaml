id: TOB.12.15
reference: Tobit 12:15
source:
  edition: lxx-swete-1909
  text: ἐγώ εἰμι Ῥαφαήλ, εἷς ἐκ τῶν ἑπτὰ ἁγίων ἀγγέλων οἳ προσαναφέρουσιν τὰς προσευχὰς
    τῶν ἁγίων καὶ εἰσπορεύονται ἐνώπιον τῆς δόξης τοῦ ἁγίου.
  language: Greek
  pages:
  - 859
  confidence: high
  validation: agree
translation:
  text: I am Raphael, one of the seven holy angels who present the prayers of the
    holy ones and enter before the glory of the Holy One.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the saints.' The Greek phrase means 'the holy ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ῥαφαήλ
  chosen: Raphael
  rationale: Proper name transliterated according to project policy to transliterate
    names rather than translate them.
- source_word: εἷς ἐκ τῶν ἑπτὰ
  chosen: one of the seven
  alternatives:
  - one from among the seven
  lexicon: BDAG
  rationale: Straightforward partitive expression; 'one of the seven' is natural English
    and preserves the numerical specificity.
- source_word: ἁγίων ἀγγέλων
  chosen: holy angels
  alternatives:
  - sacred angels
  lexicon: BDAG
  rationale: ἅγιος regularly means 'holy.' 'Holy angels' is the most transparent and
    biblically familiar rendering.
- source_word: προσαναφέρουσιν
  chosen: present
  alternatives:
  - bring up
  - offer
  - carry up
  lexicon: BDAG
  rationale: The verb conveys bringing into the divine presence. 'Present' fits the
    context of angelic mediation of prayers without over-specifying sacrificial imagery
    that 'offer' might suggest.
- source_word: τὰς προσευχὰς
  chosen: the prayers
  alternatives:
  - petitions
  lexicon: BDAG
  rationale: Standard rendering of προσευχή; 'prayers' is direct and natural.
- source_word: τῶν ἁγίων
  chosen: the holy ones
  alternatives:
  - the saints
  lexicon: BDAG
  rationale: Although 'saints' is traditional, 'holy ones' more transparently reflects
    the Greek and avoids importing later ecclesiastical connotations. The referent
    is God's holy people.
- source_word: εἰσπορεύονται ἐνώπιον
  chosen: enter before
  alternatives:
  - go in before
  - come into the presence of
  lexicon: BDAG
  rationale: This preserves both the motion of entry and the relational phrase 'before/in
    the presence of' with readable English.
- source_word: τῆς δόξης
  chosen: the glory
  alternatives:
  - the glorious presence
  lexicon: BDAG
  rationale: δόξα is best kept as 'glory.' While it may imply divine presence, the
    Greek noun itself should remain visible in translation.
- source_word: τοῦ ἁγίου
  chosen: the Holy One
  alternatives:
  - the holy one
  - the Sanctified One
  lexicon: BDAG
  rationale: The articular singular likely refers reverentially to God. Capitalizing
    'Holy One' signals titular divine reference in English and avoids the awkwardness
    of 'the holy' as a substantive.
