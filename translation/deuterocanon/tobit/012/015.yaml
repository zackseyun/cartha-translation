theological_decisions:
- issue: Reference of 'the Holy One' in the closing phrase
  chosen_reading: A divine title referring to God
  alternative_readings:
  - an adjectival sense modifying 'glory' implicitly
  - a less explicit reverential circumlocution for the divine presence
  rationale: In context Raphael describes angelic access to the divine court. 'Before
    the glory of the Holy One' most naturally means before God's glory, with τοῦ ἁγίου
    functioning substantivally as a divine title. This preserves the text's heavenly-court
    imagery without expanding it beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
- issue: Rendering τῶν ἁγίων
  chosen_reading: the holy ones
  alternative_readings:
  - the saints
  rationale: The Greek can be rendered traditionally as 'saints,' but the project
    favors transparent English where possible. 'Holy ones' preserves the lexical link
    to ἅγιος and avoids importing later doctrinal associations tied to canonized 'saints.'
  doctrine_reference: Original-language primacy over translation tradition; consistency
    of key terms, or documented exception.
