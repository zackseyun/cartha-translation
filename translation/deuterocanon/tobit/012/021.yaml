theological_decisions:
- issue: Whether to make the implied miraculous disappearance explicit
  chosen_reading: 'Keep the wording observational: ''they did not see him'''
  alternative_readings:
  - they could no longer see him
  - he disappeared from their sight
  rationale: The Greek reports the result from the human observers' perspective rather
    than explicitly narrating the mechanism. Preserving that restraint avoids importing
    more than the text states while still allowing the context to convey the supernatural
    event.
  doctrine_reference: Preserve theological tension rather than resolve it.
