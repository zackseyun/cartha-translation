id: TOB.12.21
reference: Tobit 12:21
source:
  edition: lxx-swete-1909
  text: καὶ ἀνέστησαν, καὶ οὐκ εἶδον αὐτόν.
  language: Greek
  pages:
  - 859
  confidence: high
  validation: agree
translation:
  text: And they stood up, and they did not see him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they could no longer see him.' The Greek more literally says, 'they
      did not see him,' which may imply his disappearance without stating it directly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέστησαν
  chosen: stood up
  alternatives:
  - rose
  - got up
  lexicon: BDAG
  rationale: Aorist of ἀνίστημι in a simple narrative movement context. 'Stood up'
    is a natural, sufficiently formal rendering that preserves the physical action
    without overinterpreting it.
- source_word: οὐκ εἶδον
  chosen: did not see
  alternatives:
  - could not see
  - saw no more of
  lexicon: BDAG
  rationale: The Greek states straightforwardly that they did not see him. 'Did not
    see' preserves the plain sense without adding an explicit modal nuance such as
    inability, though the context implies his disappearance.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Simple masculine singular object pronoun, referring to Raphael in context.
    English 'him' is direct and unambiguous.
