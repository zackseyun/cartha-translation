theological_decisions:
- issue: Force of the peace statement
  chosen_reading: A promise of peace ('peace will be yours')
  alternative_readings:
  - A greeting or benediction ('peace be with you')
  rationale: The Greek uses the future ἔσται, so the line is best taken as an assurance
    following the command not to fear, not merely as a conventional greeting.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
