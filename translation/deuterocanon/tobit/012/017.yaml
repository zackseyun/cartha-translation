id: TOB.12.17
reference: Tobit 12:17
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν αὐτοῖς Μὴ φοβεῖσθε, εἰρήνη ὑμῖν ἔσται· τὸν δὲ θεὸν εὐλογεῖτε εἰς
    τὸν αἰῶνα,
  language: Greek
  pages:
  - 859
  confidence: high
  validation: agree
translation:
  text: And he said to them, “Do not be afraid; peace be with you. But bless God forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'peace will be with you.' The Greek literally reads, 'peace to you will
      be.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ φοβεῖσθε
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: BDAG
  rationale: Standard present/passive-deponent imperative of φοβέομαι used as a prohibition.
    'Do not be afraid' is idiomatic modern English and preserves the force without
    archaism.
- source_word: εἰρήνη ὑμῖν ἔσται
  chosen: peace will be yours
  alternatives:
  - peace will be with you
  - you will have peace
  - peace be to you
  lexicon: BDAG
  rationale: Future of εἰμί with dative ὑμῖν naturally yields a future assurance rather
    than an imperative wish. 'Peace will be yours' preserves the future promise and
    reads naturally in English.
- source_word: τὸν δὲ θεὸν
  chosen: But bless God
  alternatives:
  - and bless God
  - now bless God
  lexicon: BDAG
  rationale: 'δέ marks a mild contrast or transition after the reassurance. Rendering
    it as ''But'' preserves the discourse turn: instead of fearing, they are to bless
    God.'
- source_word: εὐλογεῖτε
  chosen: bless
  alternatives:
  - praise
  lexicon: BDAG
  rationale: εὐλογέω in relation to God can mean 'bless' or 'praise.' 'Bless' keeps
    the lexical correspondence and biblical register while remaining understandable.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - unto the age
  lexicon: BDAG
  rationale: Idiomatic expression for enduring duration. 'Forever' is natural modern
    English and adequately conveys the sense.
