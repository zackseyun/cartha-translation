id: TOB.12.12
reference: Tobit 12:12
source:
  edition: lxx-swete-1909
  text: καὶ νῦν ὅτε προσηύξω σὺ καὶ ἡ νύμφη σου Σάρρα, ἐγὼ προσήγαγον τὸ μνημόσυνον
    τῆς προσευχῆς ὑμῶν ἐνώπιον τοῦ ἁγίου. καὶ ὅτε ἐθάπτες τοὺς νεκρούς, ὡσαύτως συμπαρήμην
    σοι·
  language: Greek
  pages:
  - 858
  confidence: high
  validation: agree
translation:
  text: And now, when you and your bride Sarah were praying, I brought the memorial
    of your prayer before the Holy One. And when you were burying the dead, I likewise
    was with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your wife Sarah'; Greek νύμφη can mean 'bride' or 'young wife.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the remembrance of your prayer,' possibly with a cultic sense like a
      memorial offering brought before God.
    reason: lexical_alternative
  - marker: c
    text: '''The Holy One'' here refers to God in context.'
    reason: alternative_reading
lexical_decisions:
- source_word: νῦν
  chosen: now
  alternatives:
  - as for now
  lexicon: LSJ
  rationale: Standard temporal adverb; simple 'now' fits the discourse transition
    without overcomplicating the English.
- source_word: προσηύξω
  chosen: were praying
  alternatives:
  - prayed
  lexicon: LSJ
  rationale: The aorist here refers to the occasion of prayer; English past progressive
    better conveys the ongoing action in the temporal clause 'when ... were praying.'
- source_word: νύμφη
  chosen: bride
  alternatives:
  - wife
  lexicon: LSJ
  rationale: The Greek literally denotes a bride/young wife. 'Bride' preserves the
    immediate marital context more closely than the flatter 'wife,' while remaining
    natural English.
- source_word: προσήγαγον
  chosen: I brought
  alternatives:
  - I presented
  - I offered up
  lexicon: LSJ
  rationale: The verb means to bring or present. 'Brought' is the most direct rendering,
    while the following prepositional phrase supplies the sense of presentation before
    God.
- source_word: μνημόσυνον
  chosen: the memorial
  alternatives:
  - the remembrance
  - the memorial offering
  lexicon: LSJ
  rationale: The noun can denote a memorial or remembrance, and in religious contexts
    may suggest a memorial offering. Here 'the memorial' preserves the cultic-religious
    nuance without importing 'offering' more strongly than the text states.
- source_word: τῆς προσευχῆς ὑμῶν
  chosen: of your prayer
  alternatives:
  - of your prayers
  lexicon: LSJ
  rationale: The Greek has singular 'prayer.' English could idiomatically pluralize,
    but the singular is retained for closer formal correspondence.
- source_word: ἐνώπιον τοῦ ἁγίου
  chosen: before the Holy One
  alternatives:
  - before the Holy
  - before the saint
  lexicon: LSJ
  rationale: The phrase literally means 'before the holy one/holy [presence].' In
    context it refers to God, not a human saint. 'The Holy One' is reverent, clear,
    and avoids the misleading English 'saint.'
- source_word: ἐθάπτες
  chosen: were burying
  alternatives:
  - buried
  lexicon: LSJ
  rationale: The imperfect conveys repeated or ongoing action. 'Were burying' preserves
    that aspect better than a simple past.
- source_word: τοὺς νεκρούς
  chosen: the dead
  alternatives:
  - dead bodies
  - the deceased
  lexicon: LSJ
  rationale: '''The dead'' is the natural and sufficiently literal rendering in English.'
- source_word: ὡσαύτως
  chosen: likewise
  alternatives:
  - in the same way
  - also
  lexicon: LSJ
  rationale: This adverb marks correspondence with the previous clause. 'Likewise'
    is concise and natural.
- source_word: συμπαρήμην σοι
  chosen: I was with you
  alternatives:
  - I was present with you
  - I stood by you
  lexicon: LSJ
  rationale: The compound verb emphasizes accompanying presence. 'I was with you'
    is idiomatic and faithful; 'stood by you' would add a supportive nuance not explicit
    in the Greek.
