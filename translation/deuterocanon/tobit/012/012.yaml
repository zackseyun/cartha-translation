theological_decisions:
- issue: Referent of 'the Holy One' in ἐνώπιον τοῦ ἁγίου
  chosen_reading: A reference to God
  alternative_readings:
  - a heavenly holy being/angelic presence
  rationale: Within the verse Raphael describes bringing Tobit and Sarah's prayer
    into the divine presence. Rendering the phrase as 'the Holy One' preserves the
    Greek while making clear that the ultimate referent is God rather than a saintly
    human figure.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
