id: TOB.12.5
reference: Tobit 12:5
source:
  edition: lxx-swete-1909
  text: καὶ ἐκάλεσεν τὸν ἄγγελον καὶ εἶπεν αὐτῷ Λάβε τὸ ἥμισυ πάντων ὧν
  language: Greek
  pages:
  - 857
  confidence: high
  validation: minor_mismatch
translation:
  text: And he called the angel and said to him, “Take half of everything that”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek source excerpt provided for this verse is incomplete and ends
      mid-sentence after 'of everything that'. The translation therefore preserves
      the unfinished clause rather than supplying words not present in Zone 1.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: BDAG
  rationale: The aorist of καλέω here straightforwardly means 'called' or 'summoned.'
    'Called' is the more natural modern English choice and fits the narrative flow
    without overstating formality.
- source_word: τὸν ἄγγελον
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: BDAG
  rationale: ἄγγελος can mean either 'messenger' or 'angel,' but in Tobit 12 the figure
    is explicitly a heavenly being, so 'the angel' best reflects the narrative identity.
- source_word: Λάβε
  chosen: Take
  alternatives:
  - Receive
  lexicon: BDAG
  rationale: The imperative of λαμβάνω is naturally rendered 'Take.' 'Receive' is
    possible but sounds more formal and less direct in this context of offering payment.
- source_word: τὸ ἥμισυ
  chosen: half
  alternatives:
  - the half
  - one half
  lexicon: BDAG
  rationale: The phrase idiomatically means 'half.' English does not require the article
    here.
- source_word: πάντων
  chosen: of everything
  alternatives:
  - of all things
  - of all
  lexicon: BDAG
  rationale: πάντων is a broad genitive plural, and 'of everything' is the most idiomatic
    English rendering in context.
- source_word: ὧν
  chosen: that
  alternatives:
  - which
  - whatever things
  lexicon: BDAG
  rationale: The relative pronoun introduces a clause that is incomplete in the surviving
    Zone 1 excerpt. 'That' is the most natural English bridge into the unfinished
    relative clause.
