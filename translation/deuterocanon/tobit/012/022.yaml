id: TOB.12.22
reference: Tobit 12:22
source:
  edition: lxx-swete-1909
  text: καὶ ἐξωμολογοῦντο τὰ ἔργα τὰ μεγάλα καὶ θαυμαστὰ αὐτοῦ, ὡς ὤφθη αὐτοῖς ἄγγελος
    Κυρίου.
  language: Greek
  pages:
  - 859
  confidence: high
  validation: agree
translation:
  text: And they acknowledged his great and wondrous works, because an angel of the
    Lord had appeared to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they gave thanks for / openly acknowledged his great and wondrous works.'
      The Greek verb can carry senses of confession, acknowledgment, thanksgiving,
      or praise depending on context.
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''an angel of the Lord''; some English traditions may expect ''the
      angel of the Lord,'' but the Greek here does not require the definite sense.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξωμολογοῦντο
  chosen: they confessed
  alternatives:
  - they gave thanks
  - they acknowledged openly
  - they praised
  lexicon: LSJ
  rationale: The verb can denote open acknowledgment, confession, or thanksgiving/praise
    depending on context. Here the object is 'his great and wondrous works,' so the
    sense is public acknowledgment/confession of God's deeds. 'Confessed' preserves
    the explicit verbal force of open declaration better than the more interpretive
    'praised,' while remaining natural English.
- source_word: τὰ ἔργα τὰ μεγάλα καὶ θαυμαστὰ
  chosen: his great and wondrous works
  alternatives:
  - his great and marvelous deeds
  - the great and amazing works
  lexicon: LSJ
  rationale: ἔργα is straightforwardly 'works' or 'deeds.' 'Works' keeps closer formal
    correspondence, while 'wondrous' reflects θαυμαστά with a register suitable to
    divine acts.
- source_word: ὡς
  chosen: because
  alternatives:
  - when
  - how
  - that
  lexicon: LSJ
  rationale: 'In this context ὡς introduces the content or grounds of their acknowledgment:
    they confessed God''s works in light of the fact that an angel of the Lord had
    appeared to them. ''Because'' best conveys the causal sense in idiomatic English.'
- source_word: ὤφθη
  chosen: had appeared
  alternatives:
  - appeared
  - was seen
  lexicon: LSJ
  rationale: 'The passive-form verb commonly functions in appearance language (''appeared'').
    The pluperfect-like English ''had appeared'' fits the narrative sequence: their
    confession follows the angelic manifestation.'
- source_word: ἄγγελος Κυρίου
  chosen: an angel of the Lord
  alternatives:
  - the angel of the Lord
  lexicon: LSJ
  rationale: The Greek lacks the article before ἄγγελος, so 'an angel of the Lord'
    is the most direct rendering. 'Lord' follows the project's default for κύριος/Kyrios.
