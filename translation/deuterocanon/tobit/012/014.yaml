theological_decisions:
- issue: Sense of νύμφη in relation to Tobit and Sarah
  chosen_reading: your bride
  alternative_readings:
  - your daughter-in-law
  rationale: The Greek term permits either familial relation or bridal status. Given
    the immediate narrative context of recent marriage and the paired healing of Tobit
    and Sarah, 'your bride' communicates the scene naturally in English. Because Tobit
    is the addressee, 'your daughter-in-law' remains a viable lexical alternative
    and is preserved in a footnote rather than suppressed.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it; §5 Consistency of key terms, or documented exception.
