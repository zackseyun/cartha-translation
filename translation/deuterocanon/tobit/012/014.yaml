id: TOB.12.14
reference: Tobit 12:14
source:
  edition: lxx-swete-1909
  text: καὶ νῦν ἀπέστειλέν με ὁ θεὸς ἰάσασθαί σε καὶ τὴν νύμφην σου Σάρραν.
  language: Greek
  pages:
  - 859
  confidence: high
  validation: agree
translation:
  text: And now God has sent me to heal you and Sarah your bride.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your daughter-in-law Sarah.' The Greek νύμφη can mean either 'bride/young
      wife' or 'daughter-in-law,' and the addressee here is Tobit.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ νῦν
  chosen: And now
  alternatives:
  - and now
  - so now
  lexicon: LSJ
  rationale: A straightforward connective plus temporal adverb. 'And now' preserves
    the discourse flow and transition in Raphael's explanation.
- source_word: ἀπέστειλέν
  chosen: has sent
  alternatives:
  - sent
  lexicon: LSJ
  rationale: Aorist of ἀποστέλλω, 'send.' English present perfect fits the immediate
    relevance of the completed action in context ('God has sent me'). Simple past
    would also be possible, but present perfect reads naturally while preserving the
    completed commissioning.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: LSJ
  rationale: Standard rendering of ὁ θεός. No article needs to be represented in English
    here.
- source_word: ἰάσασθαί
  chosen: to heal
  alternatives:
  - to cure
  - to restore
  lexicon: LSJ
  rationale: Aorist middle infinitive of ἰάομαι, commonly 'heal' or 'cure.' 'Heal'
    is the most natural and broad English equivalent, fitting both Tobit's blindness
    and Sarah's affliction without over-specifying.
- source_word: σε
  chosen: you
  lexicon: LSJ
  rationale: Direct object singular, referring to Tobit.
- source_word: τὴν νύμφην σου
  chosen: your bride
  alternatives:
  - your daughter-in-law
  - your newly married wife
  lexicon: LSJ
  rationale: νύμφη can mean 'bride,' 'young wife,' or in some contexts 'daughter-in-law.'
    In this context Raphael addresses Tobit and refers to Sarah in relation to Tobias's
    recent marriage; the immediate marital sense 'bride' is the least misleading in
    English. Because 'daughter-in-law' is also lexically possible when speaking to
    Tobit, that alternative is preserved in a footnote.
- source_word: Σάρραν
  chosen: Sarah
  alternatives:
  - Sarra
  lexicon: LSJ
  rationale: Standard English transliteration of the name Σάρρα/Σάρραν is 'Sarah.'
