theological_decisions:
- issue: Meaning of ζωή in a wisdom-moral context
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The Greek says ζωή, which ordinarily means 'life.' In this context it
    refers to one's own life or well-being rather than making a technical anthropological
    statement about the soul. Rendering it 'life' avoids importing later doctrinal
    categories not explicit in the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
