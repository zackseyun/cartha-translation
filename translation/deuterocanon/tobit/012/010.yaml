id: TOB.12.10
reference: Tobit 12:10
source:
  edition: lxx-swete-1909
  text: οἱ δὲ ἁμαρτάνοντες πολέμιοί εἰσιν τῆς ἑαυτῶν ζωῆς.
  language: Greek
  pages:
  - 858
  confidence: high
  validation: agree
translation:
  text: But those who sin are enemies of their own life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'enemies of their own soul.' The Greek word can be rendered more broadly,
      but 'life' is the plainer sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ... ἁμαρτάνοντες
  chosen: those who sin
  alternatives:
  - the ones sinning
  - sinners
  lexicon: BDAG
  rationale: The present participle with article functions substantivally, referring
    to people characterized by sinning. 'Those who sin' preserves the verbal force
    better than the more static 'sinners' while remaining natural English.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the preceding statement in context. 'But'
    best signals that contrast in readable English.
- source_word: πολέμιοί
  chosen: enemies
  alternatives:
  - hostile ones
  - foes
  lexicon: LSJ
  rationale: The predicate adjective/noun denotes being hostile or acting as an enemy.
    'Enemies' is the most direct and idiomatic rendering here.
- source_word: τῆς ἑαυτῶν ζωῆς
  chosen: of their own life
  alternatives:
  - to themselves
  - of their own lives
  - of their own soul
  lexicon: BDAG
  rationale: The reflexive phrase explicitly states that their hostility is directed
    toward their own ζωή. 'Of their own life' keeps the singular Greek and preserves
    the sense that by sinning they act against their own life. 'Soul' would overinterpret
    ζωή here.
