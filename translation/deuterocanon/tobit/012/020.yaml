id: TOB.12.20
reference: Tobit 12:20
source:
  edition: lxx-swete-1909
  text: καὶ νῦν ἐξομολογεῖσθε τῷ θεῷ, διότι ἀναβαίνω πρὸς τὸν ἀποστείλαντά με, καὶ
    γράψατε πάντα τὰ συντελεσθέντα εἰς βιβλίον.
  language: Greek
  pages:
  - 859
  confidence: high
  validation: agree
translation:
  text: And now give thanks to God, because I am ascending to the one who sent me;
    and write all that has been accomplished in a book.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confess to God' or 'praise God'; the Greek verb can cover acknowledgment
      expressed in thanksgiving or praise.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξομολογεῖσθε
  chosen: give thanks
  alternatives:
  - confess
  - praise
  lexicon: BDAG
  rationale: In Hellenistic Jewish usage with dative of God, the verb commonly carries
    the sense of acknowledging God in praise/thanksgiving rather than confessing sins.
    Here Raphael's departure prompts grateful praise to God, so 'give thanks' best
    fits the context while remaining natural English.
- source_word: ἀναβαίνω
  chosen: am ascending
  alternatives:
  - go up
  - return
  lexicon: BDAG
  rationale: The present tense indicates imminent action. 'Am ascending' preserves
    the upward movement and the heavenly implication without adding interpretive wording
    such as 'return.'
- source_word: τὸν ἀποστείλαντά με
  chosen: the one who sent me
  alternatives:
  - him who sent me
  - my sender
  lexicon: BDAG
  rationale: This participial phrase is naturally rendered as a relative clause in
    English. 'The one who sent me' is clear and preserves the agent's identity without
    over-specifying.
- source_word: γράψατε
  chosen: write
  alternatives:
  - record
  lexicon: BDAG
  rationale: The imperative straightforwardly calls for committing the events to writing.
    'Write' is the most direct equivalent; 'record' is possible but slightly more
    interpretive.
- source_word: πάντα τὰ συντελεσθέντα
  chosen: all that has happened
  alternatives:
  - all the things that have been accomplished
  - everything that has been done
  lexicon: BDAG
  rationale: The perfect/passive participle points to events brought to completion.
    'All that has happened' is idiomatic English that captures the completed events
    without sounding wooden.
- source_word: εἰς βιβλίον
  chosen: in a book
  alternatives:
  - into a book
  - in a scroll
  lexicon: BDAG
  rationale: The phrase denotes written preservation in a document. 'In a book' is
    the most accessible rendering in modern English; 'scroll' would be culturally
    possible but is not demanded by βιβλίον here.
