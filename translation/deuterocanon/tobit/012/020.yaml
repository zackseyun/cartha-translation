theological_decisions:
- issue: Function of Raphael's statement about ascending to the one who sent him
  chosen_reading: Render the line straightforwardly as heavenly ascent to God's commission
    without expanding angelology.
  alternative_readings:
  - Interpret 'ascending' more loosely as 'returning'
  - Make explicit that the sender is God
  rationale: The Greek implies ascent to the divine sender, but the verse itself does
    not name God again in that clause. The translation preserves the theological sense
    without importing explanatory material beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
