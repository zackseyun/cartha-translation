theological_decisions:
- issue: Nature of Raphael's statement about presence and observation
  chosen_reading: The verse is rendered to state plainly that Raphael observed Tobit's
    righteous act and was with him during it, without expanding this into a broader
    doctrinal claim about angelic omniscience or mediation.
  alternative_readings:
  - An interpretive rendering could imply special angelic guardianship or mediation
    beyond the immediate narrative scene.
  rationale: The Greek states only that Tobit's good deed did not escape Raphael and
    that Raphael was with him. The translation preserves that narrative claim without
    importing later theological conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
