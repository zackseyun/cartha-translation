id: TOB.12.13
reference: Tobit 12:13
source:
  edition: lxx-swete-1909
  text: καὶ ὅτε οὐκ ὤκνησας ἀναστῆναι καὶ καταλιπεῖν τὸ ἄριστόν σου ὅπως ἀπελθὼν περιστείλῃς
    τὸν νεκρόν, οὐκ ἔλαθές με ἀγαθοποιῶν, ἀλλὰ σὺν σοὶ ἤμην.
  language: Greek
  pages:
  - 858
  confidence: high
  validation: agree
translation:
  text: And when you did not hesitate to rise and leave your meal so that you might
    go and wrap the dead man, your doing good did not escape me, but I was with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prepare the dead man for burial.' The Greek verb can refer to wrapping
      or otherwise arranging a corpse.
    reason: lexical_alternative
  - marker: b
    text: The Greek for 'your meal' uses a term that can denote a principal meal;
      the exact time of day is not specified here.
    reason: cultural_note
lexical_decisions:
- source_word: οὐκ ὤκνησας
  chosen: you did not hesitate
  alternatives:
  - you were not slow
  - you did not delay
  - you did not shrink back
  lexicon: LSJ
  rationale: ὀκνέω commonly conveys hesitation, reluctance, or delay. 'Did not hesitate'
    is idiomatic modern English and preserves the commendation of prompt action better
    than the more wooden 'were not slow.'
- source_word: ἀναστῆναι
  chosen: to rise
  alternatives:
  - to get up
  - to stand up
  lexicon: LSJ
  rationale: The infinitive literally means 'to rise.' In context it refers to getting
    up from the meal. 'Rise' keeps a slightly elevated tone without obscuring the
    sense.
- source_word: καταλιπεῖν τὸ ἄριστόν σου
  chosen: leave your meal
  alternatives:
  - leave your dinner
  - leave your supper
  lexicon: LSJ
  rationale: ἄριστον can denote a meal, often the morning or midday meal in classical
    usage, but in later Greek may refer more generally to a principal meal. Since
    the exact time is not explicit here, 'meal' avoids over-specification while preserving
    the concrete image.
- source_word: ὅπως ἀπελθὼν
  chosen: so that you might go
  alternatives:
  - in order that, after going
  - so that by going
  lexicon: LSJ
  rationale: The construction expresses purpose. A smoother English purpose clause
    best reflects the syntax in context.
- source_word: περιστείλῃς τὸν νεκρόν
  chosen: wrap the dead man
  alternatives:
  - bury the dead man
  - prepare the corpse for burial
  - cover the dead man
  lexicon: LSJ
  rationale: περιστέλλω can mean to wrap, clothe, or prepare, including treatment
    of a corpse. 'Wrap the dead man' stays close to the Greek and avoids importing
    the fuller act of burial, though burial is the broader context.
- source_word: οὐκ ἔλαθές με
  chosen: did not escape me
  alternatives:
  - did not go unnoticed by me
  - were not hidden from me
  lexicon: LSJ
  rationale: The idiom with λανθάνω means that the action was not unnoticed or hidden
    from the speaker. 'Did not escape me' is concise and natural.
- source_word: ἀγαθοποιῶν
  chosen: your doing good
  alternatives:
  - while doing good
  - as you were doing good
  - your good deed
  lexicon: LSJ
  rationale: The participle describes Tobit's beneficent action. 'Your doing good'
    preserves the verbal force and moral emphasis without reducing it to a single
    isolated deed.
- source_word: σὺν σοὶ ἤμην
  chosen: I was with you
  alternatives:
  - I was alongside you
  - I was present with you
  lexicon: LSJ
  rationale: A straightforward rendering best preserves the reassurance of Raphael's
    presence.
