theological_decisions:
- issue: How to render δικαιοῦται in a decontextualized and textually compressed clause
  chosen_reading: is justified
  alternative_readings:
  - is vindicated
  rationale: This is primarily a lexical rather than doctrinal decision, but δικαιόω
    can carry theological weight. In this verse, the immediate context supplied in
    the Greek witness is too slight to force a forensic theological sense, yet 'is
    justified' best reflects the Greek form. The less technical English 'is vindicated'
    is preserved in a footnote because it may better capture the sense if the clause
    is idiomatic or contextually elliptical.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms; preserve theological
    tension rather than resolve it'
