translation:
  text: And the elder said, “He is justified.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “He is vindicated.” The Greek clause is very brief and allows more than
      one natural English rendering of δικαιοῦται.
    reason: lexical_alternative
  - marker: b
    text: The Greek witness here is unusually terse compared with the longer Semitic-parallel
      tradition for this section of Tobit, so the English remains correspondingly
      restrained.
    reason: textual_variant
lexical_decisions:
- source_word: ὁ πρεσβύτης
  chosen: the elder
  alternatives:
  - the old man
  - the elder man
  lexicon: LSJ
  rationale: πρεσβύτης ordinarily denotes an older man or elder. With the article,
    'the elder' is the most natural concise rendering in English and preserves the
    Greek wording without over-interpreting whether this is merely age or a recognized
    role.
- source_word: Δικαιοῦται
  chosen: is justified
  alternatives:
  - is vindicated
  - is considered right
  - is acquitted
  lexicon: BDAG
  rationale: The passive/middle form of δικαιόω most directly yields 'is justified'
    or 'is vindicated.' 'Is justified' stays closest to the Greek form and preserves
    the semantic range of being shown or declared to be in the right. Because the
    clause is terse and context-poor in the Vaticanus-based text, a more interpretive
    rendering like 'is vindicated' is preserved as an alternative rather than adopted
    in the main text.
- source_word: αὐτῷ
  chosen: for him
  alternatives:
  - to him
  - by him
  lexicon: BDAG
  rationale: The dative αὐτῷ is syntactically compressed here. 'For him' gives a minimally
    interpretive English equivalent that fits the idiomatic possibility that the statement
    concerns what is right in his case. Other dative nuances are possible, but the
    short Greek clause does not justify a stronger expansion.
