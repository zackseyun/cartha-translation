    text: 'ויהי כשמעם את כל הדברים האלה וייראו מאד ויפלו על פניהם ויאמר [להם] רפאל
      שלום לכם אל תיראו ברכו את יי על הגדולות והנוראות האלה אשר עשה עמכם ואני בכל
