translation:
  text: And Daniel said to them, “Separate them far from one another, and I will examine
    them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will question them.” The Greek verb can denote judicial examination
      or interrogation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διαχωρίσατε
  chosen: Separate
  alternatives:
  - Set apart
  - Divide
  lexicon: BDAG
  rationale: Imperative plural from διαχωρίζω, calling for physical separation of
    the two elders. 'Separate' is direct, natural English and preserves the judicial
    force without overinterpreting.
- source_word: ἀπ᾽ ἀλλήλων
  chosen: from one another
  alternatives:
  - from each other
  lexicon: BDAG
  rationale: Reciprocal expression indicating mutual separation. 'From one another'
    is slightly more formal and fits the solemn courtroom setting.
- source_word: μακράν
  chosen: far
  alternatives:
  - at a distance
  - far apart
  lexicon: BDAG
  rationale: 'Adverb intensifying the separation. Rendered as ''far'' in close connection
    with the imperative: they are to be kept well apart so collusion is prevented.'
- source_word: ἀνακρινῶ
  chosen: I will examine
  alternatives:
  - I will question
  - I will interrogate
  - I will investigate
  lexicon: BDAG
  rationale: Future of ἀνακρίνω in a judicial context. 'Examine' best captures formal
    inquiry without sounding overly modern or harsh; 'question' is possible but slightly
    narrower.
- source_word: Δανιήλ
  chosen: Daniel
  rationale: Standard English transliteration of the personal name.
