translation:
  text: But when the elders spoke their words, the servants were greatly ashamed,
    because never had such a thing been said about Susanna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'such a statement' or 'such an accusation' about Susanna.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡνίκα δὲ
  chosen: But when
  alternatives:
  - And when
  - Now when
  lexicon: LSJ
  rationale: ἡνίκα introduces a temporal clause ('when'), while δέ marks narrative
    progression/contrast. 'But when' preserves both the temporal sense and the slight
    adversative turn in readable English.
- source_word: οἱ πρεσβῦται
  chosen: the elders
  alternatives:
  - the old men
  lexicon: LSJ
  rationale: πρεσβῦται commonly denotes elders, not merely men advanced in age. In
    Susanna they are community leaders/judges, so 'elders' best captures both age
    and office.
- source_word: τοὺς λόγους αὐτῶν
  chosen: their words
  alternatives:
  - their statements
  - their accusations
  - their account
  lexicon: LSJ
  rationale: λόγοι is broad and here refers to what the elders said. 'Their words'
    stays close to the Greek without over-interpreting as formal testimony, though
    the context is accusatory.
- source_word: κατῃσχύνθησαν
  chosen: were greatly ashamed
  alternatives:
  - were put to shame
  - were deeply embarrassed
  lexicon: LSJ
  rationale: The passive/deponent form conveys being shamed or ashamed. 'Were greatly
    ashamed' fits the emotional reaction in context and works naturally with σφόδρα.
- source_word: οἱ δοῦλοι
  chosen: the servants
  alternatives:
  - the slaves
  lexicon: LSJ
  rationale: Although δοῦλος can mean 'slave,' here the reference is to household
    attendants reacting to the accusation. The bonded status is not theologically
    salient in this narrative moment, so 'servants' is the default contextual rendering
    per project guidance.
- source_word: σφόδρα
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: LSJ
  rationale: σφόδρα intensifies the verb. 'Greatly' is concise and idiomatic with
    'ashamed.'
- source_word: ὅτι πώποτε οὐκ ἐρρέθη
  chosen: because never had ... been spoken
  alternatives:
  - for never was ... said
  - since never had ... been uttered
  lexicon: LSJ
  rationale: This clause gives the reason for their shame. πώποτε with οὐκ yields
    'never ever / never at any time.' The English pluperfect-like 'had been spoken'
    fits the retrospective force in context.
- source_word: λόγος τοιοῦτος
  chosen: such a word
  alternatives:
  - such a thing
  - such a statement
  - such an accusation
  lexicon: LSJ
  rationale: λόγος literally means 'word' or 'statement.' 'Such a word' is formally
    close; in English it can still carry the sense of a report or allegation. More
    explicit options were considered but would interpret beyond the Greek.
- source_word: περὶ Σουσάννης
  chosen: about Susanna
  alternatives:
  - concerning Susanna
  - against Susanna
  lexicon: LSJ
  rationale: περί with genitive is most basically 'about/concerning.' 'Against Susanna'
    would foreground the hostile force of the context, but the Greek itself does not
    require that stronger preposition.
