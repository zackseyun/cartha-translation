translation:
  text: And Susanna groaned and said, “I am hemmed in on every side. For if I do this,
    it is death for me; but if I do not do it, I will not escape your hands.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I am hard pressed from every side.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “I will not escape your hands,” an idiom for remaining in your
      power.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεστέναξεν
  chosen: groaned
  alternatives:
  - sighed deeply
  - lamented
  lexicon: LSJ
  rationale: The verb denotes a deep sigh or groan of distress. 'Groaned' preserves
    the emotional weight more strongly than the milder 'sighed.'
- source_word: Στενά μοι πάντοθεν
  chosen: I am hemmed in on every side
  alternatives:
  - I am hard pressed from every side
  - I am in straits on every side
  lexicon: LSJ
  rationale: The idiom expresses being trapped with no good option. 'Hemmed in on
    every side' is natural modern English and preserves the sense of constriction.
- source_word: ἐὰν γὰρ τοῦτο πράξω
  chosen: if I do this
  alternatives:
  - if I do this thing
  - if I act this way
  lexicon: LSJ
  rationale: The demonstrative is left implicit in idiomatic English. 'Do this' is
    sufficiently direct without over-specifying beyond the Greek.
- source_word: θάνατός μοί ἐστιν
  chosen: it is death for me
  alternatives:
  - it means death for me
  - I will die
  lexicon: LSJ
  rationale: The Greek is nominal and stark. 'It is death for me' keeps the abrupt
    force of the source better than the more interpretive 'I will die.'
- source_word: ἐὰν μὴ πράξω
  chosen: if I do not do it
  alternatives:
  - if I do not act
  - if I refuse
  lexicon: LSJ
  rationale: The repeated verb πράσσω is mirrored in English for rhetorical balance.
    'Refuse' would import an interpretive nuance not explicit in the Greek.
- source_word: οὐκ ἐκφεύξομαι
  chosen: I will not escape
  alternatives:
  - I cannot escape
  - I will not get away from
  lexicon: LSJ
  rationale: Future middle here is well represented by 'I will not escape,' preserving
    both the predictive force and the formal parallelism.
- source_word: τὰς χεῖρας ὑμῶν
  chosen: your hands
  alternatives:
  - your grasp
  - your power
  lexicon: LSJ
  rationale: The literal 'your hands' is idiomatic in English and preserves the concrete
    metaphor of being in their power without flattening it to abstraction.
