theological_decisions:
- issue: Rendering Susanna's dilemma without softening the coercive context
  chosen_reading: The verse is translated to preserve the stark either-or pressure
    and threat implied by the elders' demand.
  alternative_readings:
  - A smoother rendering that paraphrases the sense as social disgrace or legal danger
  rationale: 'The Greek presents a direct coercive dilemma: compliance means death,
    refusal means remaining in the power of the accusers. The translation avoids euphemism
    so the moral and narrative gravity remains visible.'
  doctrine_reference: Translation philosophy §§1, 3, 6
