translation:
  text: Now the woman was exceedingly delicate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'very refined,' 'very soft,' or 'very beautiful in her delicacy'; the
      Greek adjective τρυφερά can suggest softness or refined delicacy, not necessarily
      moral weakness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ
  chosen: Now ... was
  alternatives:
  - And ... was
  - But ... was
  lexicon: LSJ
  rationale: δέ here is a mild connective advancing the narrative rather than a strong
    adversative. 'Now' gives natural English scene-setting without overstating contrast.
- source_word: ἡ γυνή
  chosen: the woman
  alternatives:
  - the wife
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife.' In this clause the focus is on
    Susanna herself rather than explicitly on her relation to Joakim, so 'the woman'
    best matches the immediate description while remaining natural in context.
- source_word: τρυφερά
  chosen: delicate
  alternatives:
  - luxurious
  - soft
  - tender
  - refined
  lexicon: LSJ
  rationale: τρυφερός can denote softness, delicacy, or luxurious refinement. In this
    context of describing Susanna's person, 'delicate' preserves the sense of softness/refinement
    without importing moral judgment such as self-indulgence.
- source_word: σφόδρα
  chosen: exceedingly
  alternatives:
  - very
  - greatly
  lexicon: BDAG
  rationale: σφόδρα intensifies the adjective strongly. 'Exceedingly' reflects the
    elevated narrative tone better than the flatter 'very.'
