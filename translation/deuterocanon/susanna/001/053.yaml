translation:
  text: formerly, while you were judging unjust judgments and condemning the innocent,
    but releasing the guilty, though the Lord says, ‘You shall not put to death the
    innocent and righteous.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “while judging unjust judgments.” The Greek uses a cognate
      expression for emphasis.
    reason: lexical_alternative
  - marker: b
    text: 'The closing quotation echoes the legal language of Exod 23:7 in the Greek
      tradition: do not put to death the innocent and righteous.'
    reason: cross_reference
lexical_decisions:
- source_word: πρότερον
  chosen: formerly
  alternatives:
  - before
  - previously
  lexicon: LSJ
  rationale: Temporal adverb referring to the elder's prior conduct; 'formerly' is
    concise and natural in English while preserving the retrospective force.
- source_word: κρίνων κρίσεις ἀδίκους
  chosen: while you were judging unjust judgments
  alternatives:
  - rendering unjust judgments
  - judging unjust cases
  lexicon: LSJ
  rationale: The participle plus cognate accusative is retained with moderate literalness.
    'Judging unjust judgments' preserves the emphatic repetition of κρίνων/κρίσεις,
    though somewhat idiomatic smoothing could yield 'rendering unjust judgments.'
- source_word: ἀδίκους
  chosen: unjust
  alternatives:
  - unrighteous
  - wrongful
  lexicon: LSJ
  rationale: In judicial context, 'unjust' best conveys legal and moral wrong without
    importing specifically Pauline theological freight that 'unrighteous' may carry.
- source_word: τοὺς μὲν ἀθῴους κατακρίνων
  chosen: condemning the innocent
  alternatives:
  - sentencing the innocent
  - condemning the guiltless
  lexicon: LSJ
  rationale: ἀθῷος denotes one free from guilt; 'innocent' is the clearest modern
    English equivalent in a courtroom setting. κατακρίνω is well represented by 'condemn.'
- source_word: ἀπολύων δὲ τοὺς αἰτίους
  chosen: but releasing the guilty
  alternatives:
  - but acquitting the guilty
  - but setting free those at fault
  lexicon: LSJ
  rationale: ἀπολύω in legal context can mean release or acquit. 'Releasing' keeps
    the verbal contrast with 'condemning' and avoids overstating a formal acquittal
    if simple release is intended. αἴτιος here means culpable/guilty.
- source_word: λέγοντος τοῦ κυρίου
  chosen: though the Lord says
  alternatives:
  - while the Lord says
  - when the Lord says
  - as the Lord says
  lexicon: LSJ
  rationale: 'The genitive absolute introduces the scriptural principle violated by
    the elder''s conduct. ''Though'' makes the adversative force explicit in English:
    he acted this way despite the Lord''s command.'
- source_word: τοῦ κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Follows project default for κύριος as 'Lord.' Here it refers to God in
    scriptural citation context.
- source_word: Ἀθῷον καὶ δίκαιον
  chosen: the innocent and righteous
  alternatives:
  - the guiltless and righteous
  - the innocent and just
  lexicon: LSJ
  rationale: The phrase echoes scriptural legal language. 'Innocent and righteous'
    preserves both terms distinctly rather than collapsing them into one idea.
- source_word: οὐκ ἀποκτενεῖς
  chosen: you shall not put to death
  alternatives:
  - you shall not kill
  - you shall not slay
  lexicon: LSJ
  rationale: ἀποκτείνω specifically means to kill/put to death. In legal context,
    'put to death' best matches the judicial setting and the allusion to wrongful
    execution.
