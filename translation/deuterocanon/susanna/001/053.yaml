theological_decisions:
- issue: Rendering κύριος in a scriptural citation
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The Greek source reads κύριος, following LXX convention. Per doctrine,
    κύριος defaults to 'Lord'; 'the LORD' is reserved primarily for explicit representation
    of YHWH in Hebrew-source contexts. Since this deuterocanonical verse is translated
    directly from Greek, 'the Lord' is the most source-transparent rendering.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
- issue: Force of the genitive absolute λέγοντος τοῦ κυρίου
  chosen_reading: though the Lord says
  alternative_readings:
  - while the Lord says
  - as the Lord says
  rationale: The context is Daniel/Susanna's rebuke of prior judicial corruption in
    contradiction to divine law. English 'though' best conveys the concessive/adversative
    sense implicit in context without adding content beyond the Greek.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English'
