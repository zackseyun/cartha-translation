source:
  edition: lxx-swete-1909
  text: πρότερον, κρίνων κρίσεις ἀδίκους καὶ τοὺς μὲν ἀθῴους κατακρί- νων, ἀπολύων
    δὲ τοὺς αἰτίους, λέγοντος τοῦ κυρίου Ἀθῷον καὶ δί- καιον οὐκ ἀποκτενεῖς.
  language: Greek
  pages:
