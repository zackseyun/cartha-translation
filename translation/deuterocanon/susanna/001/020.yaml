translation:
  text: And they did as she said, and they shut the doors of the garden and went out
    by the side doors to bring what had been ordered for them, and they did not see
    the elders, because they were hidden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek παράδεισος here means an enclosed garden or park, not 'paradise' in
      the later theological sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησαν
  chosen: they did
  alternatives:
  - they acted
  - they carried out
  lexicon: BDAG
  rationale: A straightforward rendering of ποιέω in narrative context. 'They did'
    best matches the simple action reported and pairs naturally with 'as she said.'
- source_word: καθὼς εἶπεν
  chosen: as she said
  alternatives:
  - just as she said
  - as she had said
  lexicon: BDAG
  rationale: The comparative conjunction with aorist verb indicates conformity to
    Susanna's instruction. 'As she said' is idiomatic and sufficiently precise.
- source_word: ἀπέκλεισαν
  chosen: they shut
  alternatives:
  - they closed
  - they locked
  lexicon: BDAG
  rationale: The verb means to close or shut off. 'Locked' would overtranslate, since
    the Greek does not explicitly state locking.
- source_word: τὰς θύρας τοῦ παραδείσου
  chosen: the doors of the garden
  alternatives:
  - the gates of the garden
  - the doors of the orchard
  lexicon: BDAG
  rationale: παράδεισος here refers to an enclosed garden/park, not 'paradise' in
    a theological sense. 'Garden' fits the Susanna setting. θύραι can be 'doors' or
    'gates'; 'doors' is retained because the same verse later distinguishes 'side
    doors,' preserving lexical consistency.
- source_word: κατὰ τὰς πλαγίας θύρας
  chosen: by the side doors
  alternatives:
  - through the side doors
  - by the side gates
  lexicon: BDAG
  rationale: κατά with the accusative here marks route or way. 'By the side doors'
    is natural English and preserves the idea of exiting through secondary entrances.
- source_word: ἐνέγκαι
  chosen: to bring
  alternatives:
  - to carry in
  - to fetch
  lexicon: BDAG
  rationale: The infinitive of purpose from φέρω indicates the reason for going out.
    'To bring' is the most direct rendering; 'to fetch' is possible but slightly more
    interpretive.
- source_word: τὰ προστεταγμένα αὐταῖς
  chosen: what had been ordered for them
  alternatives:
  - the things commanded to them
  - what had been instructed for them to bring
  lexicon: BDAG
  rationale: The perfect passive participle from προστάσσω refers to instructions
    previously given to the maids. 'What had been ordered for them' communicates prior
    direction without adding details absent from the Greek.
- source_word: οὐκ εἴδοσαν
  chosen: they did not see
  alternatives:
  - they did not notice
  - they were unaware of
  lexicon: BDAG
  rationale: The verb is literally 'see.' 'Notice' is possible contextually, but the
    plain narrative wording should be preserved.
- source_word: τοὺς πρεσβυτέρους
  chosen: the elders
  alternatives:
  - the old men
  lexicon: BDAG
  rationale: In Susanna this term refers to the recognized older leaders/judges, not
    merely elderly males. 'The elders' preserves the social role and matches the narrative's
    legal setting.
- source_word: κεκρυμμένοι
  chosen: hidden
  alternatives:
  - concealed
  - in hiding
  lexicon: BDAG
  rationale: The perfect passive participle indicates a concealed state already in
    effect. 'Hidden' is concise and idiomatic.
