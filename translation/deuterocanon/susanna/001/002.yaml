translation:
  text: And he took a wife whose name was Susanna, the daughter of Hilkiah, beautiful,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'he married a wife named Susanna, the daughter of
      Hilkiah, who was beautiful.' The Greek wording is more compressed and continues
      into the next description.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβε
  chosen: took
  alternatives:
  - married
  lexicon: BDAG
  rationale: The Greek literally says 'took' and in marital contexts can mean 'took
    as wife' or 'married.' 'Took' preserves the source wording while the object 'a
    wife' makes the marital sense clear in English.
- source_word: γυναῖκα
  chosen: a wife
  alternatives:
  - a woman
  lexicon: BDAG
  rationale: In this context the noun denotes marital status, not merely a female
    person. 'A wife' is the natural contextual rendering.
- source_word: ᾗ ὄνομα Σουσάννα
  chosen: whose name was Susanna
  alternatives:
  - named Susanna
  lexicon: BDAG
  rationale: This relative construction idiomatically identifies the woman by name.
    'Whose name was Susanna' stays close to the Greek while remaining readable.
- source_word: θυγάτηρ Χελκίου
  chosen: the daughter of Hilkiah
  alternatives:
  - daughter of Chelkias
  lexicon: BDAG
  rationale: The phrase is a straightforward patronymic. The name is rendered by the
    familiar English transliteration 'Hilkiah' rather than a more Greek-shaped form,
    following the policy to transliterate names by standard conventions.
- source_word: καλή
  chosen: beautiful
  alternatives:
  - fair
  - good-looking
  lexicon: BDAG
  rationale: καλή here describes physical attractiveness. 'Beautiful' is clear modern
    English and fits the narrative introduction.
