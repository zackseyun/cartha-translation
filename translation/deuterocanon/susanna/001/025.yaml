theological_decisions:
- issue: Whether to make explicit that the unnamed act is the sexual sin demanded
    by the elders
  chosen_reading: Keep the object implicit in the main text, with minimal English
    supplementation as 'do it' only for grammatical clarity
  alternative_readings:
  - Expand to 'submit to you'
  - Expand to 'commit this sin'
  rationale: The Greek leaves the object unstated, relying on context. A fully explicit
    expansion would import more interpretation than the wording itself states. 'Do
    it' is the smallest necessary supplement for intelligible English while preserving
    the text's restraint.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
