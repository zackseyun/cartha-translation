translation:
  text: to the neighbor, to do according to the law of Moses; and they put them to
    death. And innocent blood was spared on that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically from the sentence flow, 'to do to their neighbor
      according to the law of Moses.' The Greek wording here is syntactically tied
      to the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ πλησίον
  chosen: to the neighbor
  alternatives:
  - against their neighbor
  - for the neighbor
  lexicon: LSJ
  rationale: The dative with the preceding implied sense from context points to what
    they intended toward their fellow person. Because the Greek text here is syntactically
    dependent on the prior verse, a formally close rendering keeps the dative phrase
    compact as 'to the neighbor,' though idiomatic English could expand it as 'against
    their neighbor.'
- source_word: ποιῆσαι
  chosen: to do
  alternatives:
  - to act
  - to carry out
  lexicon: LSJ
  rationale: A basic infinitive of action. 'To do' preserves the formal link with
    the legal formula that follows.
- source_word: κατὰ τὸν νόμον Μωϋσῆ
  chosen: according to the law of Moses
  alternatives:
  - in accordance with the law of Moses
  - by the law of Moses
  lexicon: LSJ
  rationale: This is a standard legal expression. 'According to the law of Moses'
    is clear, natural, and close to the Greek.
- source_word: ἀπέκτειναν
  chosen: they put them to death
  alternatives:
  - they killed them
  - they executed them
  lexicon: LSJ
  rationale: The verb means 'kill' or 'put to death.' In this judicial setting, 'put
    them to death' best reflects the formal legal execution implied by the narrative
    without over-specifying procedure.
- source_word: αὐτούς
  chosen: them
  lexicon: LSJ
  rationale: Refers to the two elders from the immediate context.
- source_word: ἐσώθη
  chosen: was spared
  alternatives:
  - was saved
  - was delivered
  - was preserved
  lexicon: LSJ
  rationale: For blood, English idiom prefers 'was spared' rather than the more literal
    'was saved.' This conveys that innocent bloodshed was prevented.
- source_word: αἷμα ἀναίτιον
  chosen: innocent blood
  alternatives:
  - blood without guilt
  - guiltless blood
  lexicon: LSJ
  rationale: A well-established biblical expression for unjust bloodshed. 'Innocent
    blood' is the most natural and recognizable equivalent.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  chosen: on that day
  alternatives:
  - in that day
  lexicon: LSJ
  rationale: Standard temporal expression; 'on that day' is idiomatic modern English.
