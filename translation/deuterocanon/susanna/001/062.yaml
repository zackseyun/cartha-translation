theological_decisions:
- issue: Judicial nuance of ἀπέκτειναν in a legal context
  chosen_reading: they put them to death
  alternative_readings:
  - they killed them
  - they executed them
  rationale: The context is a formal judgment under Mosaic law. 'Put them to death'
    preserves the legal force without importing a more technical modern term than
    the Greek itself requires.
  doctrine_reference: Translation philosophy §1, §6
- issue: Idiomatic rendering of ἐσώθη αἷμα ἀναίτιον
  chosen_reading: innocent blood was spared
  alternative_readings:
  - innocent blood was saved
  - guiltless blood was preserved
  rationale: The phrase refers to the prevention of wrongful bloodshed, not literal
    rescue of blood. 'Was spared' communicates the Hebrew-biblical idiom naturally
    in English while preserving the theological gravity of unjust killing avoided.
  doctrine_reference: Translation philosophy §5, §6
