translation:
  text: greatly, and fearing the Lord; and her parents were righteous, and they taught
    their daughter according to the law of Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'very much, and fearing the Lord'; the phrase continues
      the description of Susanna from the previous clause.
