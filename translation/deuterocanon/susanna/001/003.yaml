lexical_decisions:
- source_word: σφόδρα
  chosen: very much
  alternatives:
  - greatly
  - exceedingly
  lexicon: LSJ
  rationale: Adverb intensifying the preceding implied quality from the prior clause;
    'very much' preserves the standalone force without overinterpreting the omitted
    adjective.
- source_word: φοβουμένη
  chosen: fearing
  alternatives:
  - revering
  - being God-fearing
  lexicon: BDAG
  rationale: The participle from φοβέομαι with τὸν κύριον commonly denotes reverent
    fear toward God. 'Fearing' keeps the lexical link and avoids paraphrasing, while
    the object 'the Lord' clarifies the religious sense.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - the LORD
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this Greek deuterocanonical
    context, 'the Lord' is the natural rendering for reference to Israel's God.
- source_word: γονεῖς
  chosen: parents
  alternatives:
  - father and mother
  lexicon: LSJ
  rationale: The plural noun denotes her parents collectively; 'parents' is idiomatic
    and accurate.
- source_word: δίκαιοι
  chosen: righteous
  alternatives:
  - just
  - upright
  lexicon: BDAG
  rationale: Describes the moral character of Susanna's parents. 'Righteous' best
    preserves the biblical ethical-religious sense, while 'just' could sound narrowly
    forensic.
- source_word: ἐδίδαξαν
  chosen: taught
  alternatives:
  - instructed
  lexicon: BDAG
  rationale: Simple past action of giving instruction; 'taught' is the most direct
    and natural equivalent.
- source_word: θυγατέρα
  chosen: daughter
  alternatives:
  - girl
  lexicon: LSJ
  rationale: Literal familial term; 'daughter' preserves the family relationship explicitly
    stated in Greek.
- source_word: κατὰ τὸν νόμον Μωυσῆ
  chosen: according to the law of Moses
  alternatives:
  - in accordance with the law of Moses
  - by the law of Moses
  lexicon: BDAG
  rationale: κατά with the accusative here expresses conformity or standard. 'According
    to the law of Moses' is clear, formal enough, and faithful to the phrase.
