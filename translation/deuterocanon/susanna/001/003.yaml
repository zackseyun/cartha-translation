  rationale: The doctrine table sets κύριος to 'Lord' by default. Since the Greek
    text has κύριον rather than the Hebrew divine name, 'the Lord' follows source-language
    primacy while preserving biblical reverence.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering of δίκαιοι for the parents' character
