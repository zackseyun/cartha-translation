translation:
  text: But the two elders said, “We were walking in the garden of her husband,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek παράδεισος can also denote an orchard or enclosed park; here it refers
      to the private garden attached to her husband's household.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ δύο πρεσβύτεροι
  chosen: But the two elders
  alternatives:
  - And the two elders
  - Now the two elders
  lexicon: BDAG
  rationale: πρεσβύτεροι here refers to older men holding recognized communal authority,
    not merely men advanced in age. 'Elders' preserves the social/judicial role implied
    in Susanna. δέ is rendered 'But' to mark the narrative turn to their reply.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - answered
  - declared
  lexicon: BDAG
  rationale: A straightforward speech-introduction verb; 'said' is the most natural
    and sufficiently formal rendering in context.
- source_word: Ἡμεῖς
  chosen: We
  alternatives:
  - We ourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek, but normal English can preserve
    the sense without overtranslating. The emphasis is adequately carried by the direct
    quotation.
- source_word: περιεπατοῦμεν
  chosen: were walking
  alternatives:
  - were strolling
  - walked about
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action in past time. 'Were walking' preserves
    that aspect better than simple past. 'Strolling' would add a nuance of leisure
    not required by the verb itself.
- source_word: ἐν τῷ παραδείσῳ
  chosen: in the garden
  alternatives:
  - in the orchard
  - in the park
  lexicon: BDAG
  rationale: In Susanna, παράδεισος refers to an enclosed cultivated garden/orchard
    attached to a wealthy household. 'Garden' is the clearest natural English equivalent
    here, while 'paradise' would be misleading in this narrative setting.
- source_word: τοῦ ἀνδρὸς αὐτῆς
  chosen: of her husband
  alternatives:
  - belonging to her husband
  - of the man who was her husband
  lexicon: BDAG
  rationale: ἀνήρ in this genitive construction means 'husband,' not merely 'man.'
    'Of her husband' is concise and accurately expresses possession.
