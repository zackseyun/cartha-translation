id: SUS.1.59
reference: Susanna 1:59
source:
  edition: lxx-swete-1909
  text: εἶπεν δὲ αὐτῷ Δανιήλ Ὀρθῶς ἔψευσαι καὶ σὺ εἰς τὴν σεαυτοῦ κεφαλήν· μένει γὰρ
    ὁ ἄγγελος τοῦ θεοῦ τὴν ῥομφαίαν ἔχων πρίσαι σε μέσον, ὅπως ἐξολεθρεύσῃ ὑμᾶς.
  language: Greek
  pages:
  - 606
  confidence: high
  validation: normalized_direct_extract
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone Susanna extraction currently
