translation:
  text: Then Daniel said to him, “You too have lied rightly against your own head;
    for the angel of God stands waiting, holding the sword to split you in two, so
    that he may destroy you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final 'you' is plural in Greek, indicating that the threatened destruction
      extends to both elders, not only the one presently addressed.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὀρθῶς
  chosen: rightly
  alternatives:
  - correctly
  - well
  - truly
  lexicon: LSJ
  rationale: Adverb from ὀρθός. In context Daniel ironically says the elder has 'lied
    rightly/correctly' in the sense that his lie has accurately brought judgment on
    himself. 'Rightly' preserves the sharp irony better than the flatter 'correctly'
    or 'well'.
- source_word: ἔψευσαι
  chosen: have lied
  alternatives:
  - lied
  - spoke falsely
  lexicon: BDAG
  rationale: Aorist middle of ψεύδομαι. English present perfect fits the direct accusation
    in dialogue and pairs naturally with the resulting judgment that follows.
- source_word: εἰς τὴν σεαυτοῦ κεφαλήν
  chosen: against your own head
  alternatives:
  - upon your own head
  - to your own hurt
  lexicon: LSJ
  rationale: This idiom indicates guilt or consequences recoiling on oneself. 'Against
    your own head' keeps the concrete imagery while remaining understandable in English.
- source_word: μένει
  chosen: stands waiting
  alternatives:
  - waits
  - remains
  - is waiting
  lexicon: BDAG
  rationale: μένω here conveys remaining/standing by in readiness for action. 'Stands
    waiting' captures both the stative sense and the imminent execution implied by
    the participial phrase.
- source_word: ὁ ἄγγελος τοῦ θεοῦ
  chosen: the angel of God
  alternatives:
  - God’s angel
  lexicon: BDAG
  rationale: A straightforward rendering of the phrase. 'The angel of God' preserves
    the formal gravity of the judicial scene.
- source_word: τὴν ῥομφαίαν ἔχων
  chosen: holding the sword
  alternatives:
  - having the sword
  - bearing the sword
  lexicon: BDAG
  rationale: ῥομφαία denotes a large sword. 'Holding the sword' is idiomatic and keeps
    the vivid image without over-specifying the weapon beyond the Greek.
- source_word: πρίσαι
  chosen: to split you in two
  alternatives:
  - to saw you apart
  - to cut you in two
  lexicon: LSJ
  rationale: From πρίζω, literally 'to saw.' In this judgment context, 'split you
    in two' communicates the violent division clearly in natural English while preserving
    the force of the image.
- source_word: μέσον
  chosen: in two
  alternatives:
  - through the middle
  - in the middle
  lexicon: LSJ
  rationale: Used adverbially/complementarily with πρίσαι to express division into
    two parts. 'In two' is the most natural English equivalent.
- source_word: ἐξολεθρεύσῃ
  chosen: destroy
  alternatives:
  - wipe out
  - cut off
  lexicon: BDAG
  rationale: Strong verb for complete destruction. 'Destroy' is suitably weighty and
    avoids colloquial overtones of 'wipe out.'
- source_word: ὑμᾶς
  chosen: you
  alternatives:
  - you all
  - both of you
  lexicon: BDAG
  rationale: The plural refers beyond the individual addressed to the two elders together.
    Main text uses idiomatic 'you'; the plural force is important and is preserved
    in a footnote.
