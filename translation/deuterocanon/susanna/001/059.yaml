theological_decisions:
- issue: Scope of the final plural pronoun ὑμᾶς
  chosen_reading: retain singular address in the speech while translating the final
    object idiomatically as 'you' and noting the plural force
  alternative_readings:
  - '''destroy both of you'''
  - '''destroy you all'''
  rationale: Daniel addresses one elder directly ('to him,' 'you too'), but the closing
    plural broadens the judgment to both corrupt elders. English can sound awkward
    if the number shifts too explicitly in the main text, so the main rendering stays
    smooth while a footnote preserves the plural significance.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
