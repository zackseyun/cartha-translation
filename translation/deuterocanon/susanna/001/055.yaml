translation:
  text: Then Daniel said, “You have lied rightly against your own head; for already
    an angel of God, having received a sentence from God, will split you in two.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “You have lied well/rightly against your own head.” The wording is likely
      ironic: the false testimony has brought judgment back on the speaker himself.'
    reason: lexical_alternative
  - marker: b
    text: Or “having received a decision/order from God.” The Greek term can denote
      a spoken declaration or judicial pronouncement; here the judicial sense fits
      the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὀρθῶς
  chosen: correctly
  alternatives:
  - rightly
  - well
  lexicon: LSJ
  rationale: 'Adverb from ὀρθός, here used ironically in Daniel''s response: the elder
    has ''lied rightly/correctly'' in the sense that his lie has rebounded accurately
    upon himself. ''Correctly'' preserves the sharp irony better than the flatter
    ''well''.'
- source_word: ἔψευσαι
  chosen: you have lied
  alternatives:
  - you lied
  - you have spoken falsely
  lexicon: LSJ
  rationale: Aorist middle of ψεύδομαι. 'You have lied' gives direct, idiomatic English
    and fits the immediate judicial accusation.
- source_word: εἰς τὴν σεαυτοῦ κεφαλήν
  chosen: against your own head
  alternatives:
  - upon your own head
  - to your own hurt
  lexicon: LSJ
  rationale: This idiom signals guilt or consequence returning on the person himself.
    'Against your own head' keeps the concrete imagery while making the adversative
    force clear in English.
- source_word: ἤδη
  chosen: already
  alternatives:
  - now
  - even now
  lexicon: LSJ
  rationale: Marks the sentence as already set in motion. 'Already' preserves the
    immediacy of impending judgment.
- source_word: ἄγγελος τοῦ θεοῦ
  chosen: an angel of God
  alternatives:
  - the angel of God
  lexicon: LSJ
  rationale: The Greek lacks the article before ἄγγελος, so 'an angel of God' is the
    more straightforward rendering here.
- source_word: λαβὼν φάσιν
  chosen: having received a sentence
  alternatives:
  - having received a decision
  - having received an order
  lexicon: LSJ
  rationale: φάσις can denote an utterance, declaration, or judicial pronouncement.
    In this courtroom-judgment context, 'sentence' best captures the punitive decision
    now to be executed.
- source_word: παρὰ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - from beside God
  - at God's hand
  lexicon: LSJ
  rationale: παρά with genitive indicates source. 'From God' is the natural English
    equivalent.
- source_word: σχίσει σε μέσον
  chosen: will split you in two
  alternatives:
  - will cut you in half
  - will cleave you down the middle
  lexicon: LSJ
  rationale: σχίζω means split/tear; μέσον adds the sense of through the middle. 'Will
    split you in two' is vivid, natural English that preserves the severity of the
    threatened judgment.
