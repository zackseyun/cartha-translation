theological_decisions:
- issue: Nature of the angelic action
  chosen_reading: The verse presents an angel of God as the agent of divine judgment,
    executing a sentence received from God.
  alternative_readings:
  - The language could be heard more generally as announcing divine judgment rather
    than describing a literal angelic execution.
  rationale: The Greek explicitly names 'an angel of God' and says he has received
    a φάσις from God; the translation should preserve that concrete agency rather
    than flatten it into an abstract statement of judgment.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
