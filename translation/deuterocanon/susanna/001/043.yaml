theological_decisions:
- issue: Rendering the participial clause μὴ ποιήσασα μηδὲν ὧν οὗτοι ἐπονηρεύσαντο
    κατ᾽ ἐμοῦ
  chosen_reading: though I have done none of the things that these men wickedly contrived
    against me
  alternative_readings:
  - without having done anything of what these men plotted against me
  - though I did nothing of what these men maliciously alleged against me
  rationale: The Greek emphasizes Susanna's innocence over against the elders' wicked
    fabrication. The chosen rendering keeps the contrast explicit without over-interpreting
    the exact nature of ἐπονηρεύσαντο beyond wicked scheming directed against her.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Supplying 'these men' for οὗτοι
  chosen_reading: these men
  alternative_readings:
  - these ones
  - they
  rationale: The Greek demonstrative points to the accusers in context. 'These men'
    makes the referent explicit in natural English without adding doctrinal content.
  doctrine_reference: Translation philosophy §6
