translation:
  text: You know that they testified falsely against me; and behold, I am dying, having
    done none of the things that these men wickedly contrived against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without having done anything of what these men plotted against me.'
      The Greek verb can emphasize wicked scheming or malicious action directed against
      Susanna.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίστασαι
  chosen: you know
  alternatives:
  - you understand
  - you are aware
  lexicon: BDAG
  rationale: Direct address to God; the verb denotes knowledge/awareness. 'You know'
    is the most natural and sufficiently direct English rendering.
- source_word: ψευδῆ
  chosen: falsely
  alternatives:
  - lies
  - false things
  lexicon: LSJ
  rationale: 'Used adverbially with κατεμαρτύρησαν: they ''testified falsely'' rather
    than merely ''spoke lies.'' This preserves the judicial setting.'
- source_word: κατεμαρτύρησαν
  chosen: testified ... against
  alternatives:
  - bore witness ... against
  - gave false testimony against
  lexicon: BDAG
  rationale: The compound verb is forensic. 'Testified falsely against me' captures
    both the legal context and the force of the accusation. 'Bore witness' is possible
    but less idiomatic in modern English.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: A discourse particle drawing attention to the immediacy of her plight.
    'Look' preserves the force in readable modern English better than archaic 'behold.'
- source_word: ἀποθνῄσκω
  chosen: I am dying
  alternatives:
  - I die
  - I am about to die
  lexicon: BDAG
  rationale: Present tense conveys imminent or in-progress death in context. 'I am
    dying' communicates the urgency better than the more wooden 'I die.'
- source_word: μὴ ποιήσασα
  chosen: though I have done none
  alternatives:
  - without having done anything
  - not having done anything
  lexicon: BDAG
  rationale: The aorist participle with μή expresses denial of the alleged acts. 'Though
    I have done none' fits natural English while preserving the concessive sense in
    context.
- source_word: μηδὲν ὧν
  chosen: none of the things that
  alternatives:
  - nothing of what
  - none of what
  lexicon: LSJ
  rationale: This phrase negates the entire set of accusations. 'None of the things
    that' is clear and idiomatic.
- source_word: ἐπονηρεύσαντο
  chosen: wickedly contrived
  alternatives:
  - devised wickedly
  - plotted
  - maliciously invented
  lexicon: LSJ
  rationale: The verb here carries the sense of acting wickedly toward someone, in
    context by fabricating charges. 'Wickedly contrived' preserves both the moral
    coloring and the sense of scheming.
- source_word: κατ᾽ ἐμοῦ
  chosen: against me
  alternatives:
  - concerning me
  lexicon: BDAG
  rationale: 'In this legal context κατά with the genitive is adversative: the charges
    were directed against Susanna.'
