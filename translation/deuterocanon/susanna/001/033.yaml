translation:
  text: And all those with her were weeping, and all who knew her were weeping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all who were with her' for 'all those with her'; the Greek phrase can
      refer broadly to those in her company or household.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκλαιον
  chosen: were weeping
  alternatives:
  - wept
  - were crying
  lexicon: BDAG
  rationale: Imperfect verb, conveying ongoing lament rather than a simple punctiliar
    action; 'were weeping' preserves the durative sense in natural English.
- source_word: οἱ παρ᾽ αὐτῆς πάντες
  chosen: all those with her
  alternatives:
  - all her attendants
  - all those around her
  - all who were with her
  lexicon: LSJ
  rationale: The phrase literally denotes those 'from/with her,' idiomatically those
    in her company or household presence. 'All those with her' stays close to the
    Greek without over-specifying attendants or household members.
- source_word: ὅσοι αὐτὴν ᾔδεισαν πάντες
  chosen: all who knew her
  alternatives:
  - everyone who knew her
  - all who were acquainted with her
  lexicon: BDAG
  rationale: ὅσοι with the verb οἶδα/ᾔδεισαν indicates all persons acquainted with
    her. 'All who knew her' is direct and idiomatic.
- source_word: πάντες ... πάντες
  chosen: all ... all
  alternatives:
  - everyone ... everyone
  lexicon: LSJ
  rationale: The repetition of πάντες in both clauses is emphatic in Greek. Preserving
    'all' in both places reflects the breadth of communal grief.
