translation:
  text: But the lawless men turned back, threatening among themselves and lying in
    wait in order to put her to death. And when they came to the assembly of the city,
    they were not absent, and all the sons of Israel who were there gathered together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''the Israelites.'' Greek: ''the sons of Israel.'''
    reason: lexical_alternative
  - marker: b
    text: The clause rendered 'they did not stay away' is difficult; the Greek likely
      indicates that they were present at the city assembly rather than absent from
      it.
    reason: textual_variant
lexical_decisions:
- source_word: παράνομοι
  chosen: lawless
  alternatives:
  - wicked
  - unlawful
  lexicon: BDAG
  rationale: The adjective denotes acting contrary to law; 'lawless' preserves the
    legal-moral force better than the more general 'wicked.'
- source_word: ἀπέστρεψαν
  chosen: turned back
  alternatives:
  - returned
  - turned away
  lexicon: BDAG
  rationale: A straightforward motion verb here; 'turned back' fits the narrative
    sequence and avoids overinterpreting the direction.
- source_word: ἀπειλοῦντες ἐν ἑαυτοῖς
  chosen: threatening among themselves
  alternatives:
  - making threats to themselves
  - threatening inwardly
  lexicon: BDAG
  rationale: The phrase is somewhat awkward in Greek; 'among themselves' best captures
    internal mutual plotting rather than threats directed publicly.
- source_word: ἐνεδρεύοντες
  chosen: lying in wait
  alternatives:
  - plotting
  - setting an ambush
  lexicon: BDAG
  rationale: The participle has ambush/secret-plotting force; 'lying in wait' preserves
    the concrete hostile nuance.
- source_word: ἵνα θανατώσωσιν αὐτήν
  chosen: so that they might put her to death
  alternatives:
  - to kill her
  - so that they might kill her
  lexicon: BDAG
  rationale: '''Put her to death'' fits the judicial setting of Susanna better than
    the blunter ''kill,'' while still reflecting the verb''s lethal intent.'
- source_word: συναγωγή
  chosen: assembly
  alternatives:
  - gathering
  - council
  lexicon: BDAG
  rationale: In this context it refers to the civic/judicial gathering rather than
    a later technical synagogue building; 'assembly' is the least misleading English
    choice.
- source_word: οὐ παρῴκουν
  chosen: they did not stay away
  alternatives:
  - they did not delay
  - they were not absent
  lexicon: LSJ
  rationale: The clause is textually and semantically difficult, but in context it
    most naturally indicates that they were present rather than absent from the city
    assembly.
- source_word: συνήδρευσαν
  chosen: gathered together
  alternatives:
  - assembled
  - convened
  lexicon: LSJ
  rationale: The verb denotes assembling in session; 'gathered together' is natural
    English and keeps the collective sense.
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: BDAG
  rationale: Per gender-accurate philosophy, the masculine familial expression is
    retained. 'The Israelites' is possible but loses the source's explicit idiom.
