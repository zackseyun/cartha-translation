translation:
  text: So they sent for her, and she came with her parents and her children and all
    her relatives.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπέστειλαν
  chosen: sent for
  alternatives:
  - sent
  - dispatched
  lexicon: BDAG
  rationale: In this context the verb refers to summoning Susanna to appear, not merely
    sending something away. 'Sent for' captures the idiomatic sense in natural English
    while remaining close to the Greek.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: Simple narrative aorist; 'came' is the most direct and natural rendering.
- source_word: γονεῖς
  chosen: parents
  alternatives:
  - father and mother
  lexicon: BDAG
  rationale: The plural noun means 'parents.' Expanding to 'father and mother' would
    add specificity not present in the Greek.
- source_word: τέκνα
  chosen: children
  alternatives:
  - offspring
  lexicon: BDAG
  rationale: '''Children'' is the normal and clear English equivalent in a family-list
    context.'
- source_word: συγγενεῖς
  chosen: relatives
  alternatives:
  - kinsfolk
  - kinsmen
  lexicon: BDAG
  rationale: The term denotes family relations broadly. 'Relatives' is modern, accurate,
    and avoids archaic diction.
- source_word: πάντες
  chosen: all
  alternatives:
  - every one of
  lexicon: BDAG
  rationale: The adjective straightforwardly includes the whole group of relatives;
    'all' is the natural equivalent.
- source_word: οἱ δὲ
  chosen: So they
  alternatives:
  - And they
  - But they
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'So
    they' gives smooth English connection to the prior action without overstating
    adversative force.
