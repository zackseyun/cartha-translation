theological_decisions:
- issue: Representative singular in 'daughter of Judah'
  chosen_reading: Rendered as 'a daughter of Judah' rather than 'no daughter of Judah'
    or a plural form.
  alternative_readings:
  - no daughter of Judah
  - the daughters of Judah
  rationale: The Greek singular is retained to preserve the rhetorical contrast with
    'daughters of Israel' and to let Susanna stand as a representative Judean woman
    without expanding the claim beyond the wording.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve
    source wording unless context demands variance.'
- issue: Moral force of ἀνομία
  chosen_reading: Rendered as 'lawlessness.'
  alternative_readings:
  - wickedness
  - injustice
  rationale: The term carries both legal and moral force. 'Lawlessness' best preserves
    that tension without narrowing it to either private immorality or merely juridical
    injustice.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
