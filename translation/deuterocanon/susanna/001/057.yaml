translation:
  text: This is how you acted toward the daughters of Israel, and they, out of fear,
    associated with you; but a daughter of Judah did not endure your lawlessness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kept company with you' or 'consorted with you.' The Greek says they
      associated with the elders because they were afraid; the coercive setting suggests
      more than ordinary social contact, but the wording itself is less explicit than
      a direct sexual verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως ἐποιεῖτε
  chosen: This is how you acted
  alternatives:
  - Thus you did
  - This is what you used to do
  lexicon: BDAG
  rationale: Imperfect ἐποιεῖτε suggests customary or repeated action. 'Acted' gives
    natural English while preserving the accusation of habitual conduct; 'This is
    how' captures οὕτως idiomatically.
- source_word: θυγατράσιν Ἰσραήλ
  chosen: the daughters of Israel
  alternatives:
  - the daughters of Israēl
  - the women of Israel
  lexicon: LEH
  rationale: A literal rendering preserves the biblical idiom and rhetorical contrast
    with 'a daughter of Judah' later in the verse. 'Women of Israel' is possible but
    loses the source's familial/covenantal phrasing.
- source_word: φοβούμεναι
  chosen: out of fear
  alternatives:
  - being afraid
  - fearing
  lexicon: BDAG
  rationale: The participle explains the motive for the following action. 'Out of
    fear' expresses the causal nuance clearly in modern English.
- source_word: ὡμίλουν ὑμῖν
  chosen: associated with you
  alternatives:
  - kept company with you
  - consorted with you
  - yielded to you
  lexicon: BDAG
  rationale: ὁμιλέω can mean associate with or keep company with. In context of coercive
    sexual misconduct, the phrase implies entering into relations with them, but the
    Greek itself is less explicit than 'slept with' or 'yielded sexually.' 'Associated
    with you' preserves the wording without over-specifying; the coercive context
    is already signaled by 'out of fear.'
- source_word: ἀλλ᾽ οὐ θυγάτηρ Ἰούδα
  chosen: but a daughter of Judah
  alternatives:
  - but no daughter of Judah
  - but the daughter of Judah
  lexicon: LEH
  rationale: The anarthrous singular can function representatively. 'A daughter of
    Judah' preserves the singular form and sets up Susanna as a representative Judean
    woman. 'No daughter of Judah' is interpretive and stronger than the Greek wording
    here.
- source_word: ὑπέμεινεν
  chosen: did not endure
  alternatives:
  - did not submit to
  - did not tolerate
  - did not put up with
  lexicon: BDAG
  rationale: ὑπομένω commonly means remain under, endure, or bear up under. In this
    context it conveys refusal to bear or submit to the elders' wrongdoing. 'Did not
    endure' stays close to the Greek while remaining intelligible.
- source_word: τὴν ἀνομίαν ὑμῶν
  chosen: your lawlessness
  alternatives:
  - your wickedness
  - your injustice
  - your unlawful act
  lexicon: BDAG
  rationale: ἀνομία is a weighty moral term meaning lawlessness or wickedness. 'Lawlessness'
    preserves the legal-moral force and fits the judicial setting of Susanna.
