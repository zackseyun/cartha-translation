translation:
  text: 'Now then, if you saw this woman, tell us: under what tree did you see them
    talking with each other? And he said, “Under a mastic tree.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek σχῖνος refers to the mastic or lentisk tree.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν οὖν
  chosen: Now then
  alternatives:
  - Now therefore
  - So now
  lexicon: LSJ
  rationale: The combination marks an inferential transition with immediacy. 'Now
    then' is natural modern English and preserves the interrogative pressure of Daniel's
    challenge.
- source_word: ταύτην
  chosen: this woman
  alternatives:
  - this one
  - her
  lexicon: LSJ
  rationale: Although the Greek literally has 'this one,' the referent is Susanna.
    'This woman' makes the reference explicit in English without adding content beyond
    the context.
- source_word: εἴπερ εἶδες
  chosen: if you saw
  alternatives:
  - if indeed you saw
  - since you saw
  lexicon: LSJ
  rationale: εἴπερ can carry an emphatic 'if indeed,' but here the force is adequately
    conveyed by the challenge itself. 'If you saw' is idiomatic and keeps the conditional
    test Daniel poses.
- source_word: εἰπὸν
  chosen: tell us
  alternatives:
  - say
  - tell me
  lexicon: LSJ
  rationale: The imperative demands a direct answer. 'Tell us' fits the courtroom-like
    public setting better than bare 'say'; the plural object is supplied naturally
    from context though not explicit in Greek.
- source_word: Ὑπὸ τί δένδρον
  chosen: under what tree
  alternatives:
  - beneath what tree
  lexicon: LSJ
  rationale: A straightforward locative question. 'Under what tree' is the most natural
    equivalent.
- source_word: ἴδες
  chosen: did you see
  alternatives:
  - you saw
  lexicon: LSJ
  rationale: English idiom in a direct question prefers auxiliary 'did.'
- source_word: ὁμιλοῦντας ἀλλήλοις
  chosen: talking with each other
  alternatives:
  - conversing with one another
  - speaking together
  lexicon: LSJ
  rationale: ὁμιλέω here denotes social interaction/conversation. 'Talking with each
    other' is clear, natural, and preserves the reciprocal sense of ἀλλήλοις.
- source_word: σχῖνον
  chosen: a mastic tree
  alternatives:
  - a lentisk tree
  - a schinus tree
  lexicon: LSJ
  rationale: σχῖνος refers to the mastic/lentisk tree. 'Mastic tree' is a recognizable
    English rendering and preserves the specific species needed for the wordplay in
    the surrounding narrative.
