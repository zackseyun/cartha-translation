translation:
  text: And the whole assembly believed them, since they were elders and judges of
    the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole congregation.' The Greek word refers to the gathered community.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίστευσεν
  chosen: believed
  alternatives:
  - trusted
  - put faith in
  lexicon: BDAG
  rationale: The aorist of πιστεύω here takes the dative αὐτοῖς and denotes accepting
    the elders' testimony as true. 'Believed' is the most natural and direct English
    equivalent in context; 'trusted' is possible but slightly broader and less tied
    to accepting their accusation as true.
- source_word: ἡ συναγωγὴ πᾶσα
  chosen: the whole assembly
  alternatives:
  - all the congregation
  - the entire gathering
  lexicon: LSJ
  rationale: In this deuterocanonical narrative context, συναγωγή refers to the gathered
    community, not a later institutional 'synagogue' building. 'The whole assembly'
    communicates the collective body clearly in modern English while preserving the
    sense of the entire gathered people.
- source_word: ὡς
  chosen: since
  alternatives:
  - because
  - on the grounds that
  - as
  lexicon: BDAG
  rationale: 'Here ὡς introduces the perceived reason for the assembly''s belief:
    the men were elders and judges. ''Since'' captures that causal nuance smoothly.
    A more wooden ''as'' could sound ambiguous in English.'
- source_word: πρεσβυτέρων
  chosen: elders
  alternatives:
  - older men
  lexicon: LSJ
  rationale: The term here denotes recognized community leaders rather than merely
    men advanced in age. 'Elders' preserves the social and judicial role implied by
    the context.
- source_word: κριτῶν
  chosen: judges
  alternatives:
  - magistrates
  lexicon: LSJ
  rationale: κριτής in this context refers to those exercising judicial authority
    among the people. 'Judges' is the standard and clearest rendering.
- source_word: τοῦ λαοῦ
  chosen: of the people
  alternatives:
  - of the nation
  lexicon: BDAG
  rationale: λαός here refers to the covenant community/populace. 'Of the people'
    is the most straightforward rendering and fits the judicial-community setting.
