theological_decisions:
- issue: Rendering συναγωγή in a pre-Christian Jewish narrative
  chosen_reading: assembly
  alternative_readings:
  - congregation
  - synagogue
  rationale: The Greek denotes the gathered community. To avoid anachronistic institutional
    overtones of 'synagogue' in English while preserving the communal sense, 'assembly'
    is preferred. 'Congregation' is also viable but slightly more church-coded in
    contemporary English.
  doctrine_reference: 'Translation philosophy: readable modern English; original-language
    primacy over translation tradition.'
