theological_decisions:
- issue: Divine foreknowledge language in πρὶν γενέσεως αὐτῶν
  chosen_reading: before they come to be
  alternative_readings:
  - before their existence
  - before they happen
  rationale: The Greek emphasizes God's knowledge of all things prior to their arising.
    The translation preserves the text's affirmation of divine foreknowledge without
    importing a more developed doctrinal formulation than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
