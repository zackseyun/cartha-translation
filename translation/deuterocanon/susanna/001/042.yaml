translation:
  text: And Susanna cried out with a loud voice and said, “O eternal God, knower of
    hidden things, who knows all things before they come to be,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'knower of secrets' for 'knower of the hidden things.'
    reason: lexical_alternative
  - marker: b
    text: Or 'before their existence' or 'before they happen.' The Greek can refer
      broadly to things before they come into being.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνεβόησεν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: LSJ
  rationale: The verb denotes a forceful outcry. 'Cried out' preserves the emotional
    intensity and suits the prayer context better than the flatter 'called out.'
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - loudly
  - in a loud voice
  lexicon: LSJ
  rationale: This is a common Greek idiom. 'With a loud voice' keeps the concrete
    phrasing of the source while remaining natural English.
- source_word: Ὁ θεὸς ὁ αἰώνιος
  chosen: O eternal God
  alternatives:
  - the eternal God
  - God everlasting
  lexicon: LSJ
  rationale: The nominative with direct address functions vocatively in prayer. 'O
    eternal God' reflects the prayerful invocation naturally in English and preserves
    αἰώνιος as 'eternal.'
- source_word: ὁ τῶν κρυπτῶν γνώστης
  chosen: knower of the hidden things
  alternatives:
  - knower of secrets
  - one who knows hidden things
  lexicon: LSJ
  rationale: κρυπτά refers broadly to hidden matters, not only 'secrets' in a narrow
    sense. 'Knower of the hidden things' stays close to the Greek while remaining
    intelligible.
- source_word: ὁ εἰδὼς τὰ πάντα
  chosen: who knows all things
  alternatives:
  - who knows everything
  - the one knowing all things
  lexicon: LSJ
  rationale: A relative clause is the most natural English rendering of the participial
    phrase. 'All things' preserves the breadth of τὰ πάντα.
- source_word: πρὶν γενέσεως αὐτῶν
  chosen: before they come to be
  alternatives:
  - before their coming into being
  - before they happen
  - before their existence
  lexicon: LSJ
  rationale: The phrase refers to God's prior knowledge before the things themselves
    come into existence or occur. 'Before they come to be' is concise, natural, and
    broad enough to cover both senses without over-specifying.
