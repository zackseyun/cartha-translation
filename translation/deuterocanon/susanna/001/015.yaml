translation:
  text: And after they went out, they separated from one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And when they went out, they parted from each other.' The Greek participle
      can be rendered with slightly different temporal nuance, and the main verb may
      be translated 'parted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντες
  chosen: after they went out
  alternatives:
  - when they went out
  - having gone out
  lexicon: BDAG
  rationale: Aorist participle of ἐξέρχομαι, temporally prior to the main verb. 'After
    they went out' gives clear English sequence while preserving the participial relation
    without overly wooden style.
- source_word: διεχωρίσθησαν
  chosen: they separated
  alternatives:
  - they parted
  - they were separated
  lexicon: BDAG
  rationale: 'Aorist passive/middle form of διαχωρίζω here functions intransitively/reflexively:
    the subjects parted company. ''They separated'' is natural modern English and
    keeps the sense of going apart.'
- source_word: ἀπ᾿ ἀλλήλων
  chosen: from one another
  alternatives:
  - from each other
  lexicon: BDAG
  rationale: Reciprocal expression indicating mutual separation. 'From one another'
    is slightly more formal and fits the narrative register.
