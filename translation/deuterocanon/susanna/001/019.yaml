translation:
  text: And she said to the servant girls, “Bring me oil and ointments, and shut the
    doors of the garden, so that I may bathe.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “maidservants” for “servant girls.” The Greek term can denote girls or
      young female attendants; the context favors household attendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: κορασίοις
  chosen: servant girls
  alternatives:
  - girls
  - maidservants
  - young women
  lexicon: LSJ
  rationale: κοράσιον can mean girl/young woman, but in this narrative setting Susanna
    is addressing female attendants under her authority. 'Servant girls' preserves
    both their youth/female identity and their servant role better than the bare 'girls'.
- source_word: Ἐνέγκατε δή μοι
  chosen: Bring me
  alternatives:
  - Fetch me
  - Carry to me
  lexicon: LSJ
  rationale: The aorist imperative of φέρω with δή gives a direct but natural request/command.
    'Bring me' is idiomatic modern English and fits optimal equivalence.
- source_word: ἔλαιον
  chosen: oil
  alternatives:
  - olive oil
  lexicon: LSJ
  rationale: The Greek simply says 'oil.' In context it likely refers to olive oil
    used for bathing/anointing, but specifying 'olive' would add information not explicit
    in the text.
- source_word: σμήγματα
  chosen: ointments
  alternatives:
  - perfumes
  - cosmetics
  - unguents
  lexicon: LSJ
  rationale: σμήγματα refers to substances used for rubbing/anointing the body, especially
    in bathing. 'Ointments' is broad enough to cover scented or cosmetic applications
    without over-specifying.
- source_word: θύρας τοῦ παραδείσου
  chosen: the doors of the garden
  alternatives:
  - the gates of the garden
  - the doors of the orchard
  - the doors of the park
  lexicon: LSJ
  rationale: παράδεισος in Hellenistic usage commonly denotes an enclosed garden or
    park. In Susanna's setting, 'garden' is the clearest natural rendering. θύρας
    can be 'doors' or 'gates'; 'doors' follows the Greek more closely for an enclosed
    private space.
- source_word: κλείσατε
  chosen: shut
  alternatives:
  - close
  - lock
  lexicon: LSJ
  rationale: The verb means to close/shut. 'Shut' is slightly more vivid and natural
    here than 'close,' while 'lock' would over-translate because securing with a lock
    is not stated.
- source_word: ὅπως λούσωμαι
  chosen: so that I may bathe
  alternatives:
  - that I may wash myself
  - so that I may wash
  lexicon: LSJ
  rationale: λούω in the middle voice here refers to bathing oneself. 'Bathe' is more
    idiomatic in English than 'wash myself' in this context.
