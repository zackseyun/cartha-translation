translation:
  text: After seizing her, we questioned her, ‘Who was the man?’ But she did not tell
    us who he was. These things we testify.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'These things we bear witness to.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιλαβόμενοι
  chosen: after seizing
  alternatives:
  - having taken hold of
  - after taking hold of
  lexicon: BDAG
  rationale: Aorist middle participle of ἐπιλαμβάνομαι, here describing physical apprehension.
    'After seizing' is natural English and preserves the force better than the weaker
    'taking hold of.'
- source_word: ἐπηρώτωμεν
  chosen: we questioned
  alternatives:
  - we asked
  - we interrogated
  lexicon: BDAG
  rationale: Imperfect of ἐπερωτάω. 'Questioned' fits the legal setting and avoids
    overstating with 'interrogated' while being stronger than simple 'asked.'
- source_word: Τίς ὁ ἄνθρωπος;
  chosen: Who was the man?
  alternatives:
  - Who is the man?
  - Who was that man?
  lexicon: BDAG
  rationale: Direct question identifying the alleged male partner. English past tense
    is preferred because the surrounding narrative is retrospective testimony; 'the
    man' reflects the article ὁ.
- source_word: οὐκ ἀπήγγειλεν ἡμῖν
  chosen: she did not tell us
  alternatives:
  - she did not report to us
  - she did not disclose to us
  lexicon: BDAG
  rationale: ἀπαγγέλλω can mean report or announce, but in this courtroom accusation
    the plain sense is that she refused to identify him. 'Tell us' is idiomatic without
    losing meaning.
- source_word: τίς ἦν
  chosen: who he was
  alternatives:
  - what sort of man he was
  - who it was
  lexicon: BDAG
  rationale: The clause specifies identity, not character. 'Who he was' is the most
    straightforward rendering.
- source_word: ταῦτα μαρτυροῦμεν
  chosen: These things we testify
  alternatives:
  - This is our testimony
  - These things we bear witness to
  lexicon: BDAG
  rationale: μαρτυρέω is forensic and should retain explicit testimony language. 'These
    things we testify' is slightly formal but preserves the legal witness register
    of the Greek.
