translation:
  text: But she, weeping, looked up to heaven, because her heart had trusted in the
    Lord.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κλαίουσα
  chosen: weeping
  alternatives:
  - crying
  - while weeping
  lexicon: BDAG
  rationale: Present participle describing Susanna's ongoing state; 'weeping' is concise
    and natural in English while preserving the participial nuance.
- source_word: ἀνέβλεψεν
  chosen: looked up
  alternatives:
  - raised her eyes
  - looked upward
  lexicon: BDAG
  rationale: The verb naturally means to look up; with εἰς τὸν οὐρανόν, 'looked up
    to heaven' is idiomatic and faithful.
- source_word: οὐρανόν
  chosen: heaven
  alternatives:
  - sky
  lexicon: BDAG
  rationale: In this prayerful context, 'heaven' better conveys the religious sense
    than the merely physical 'sky'.
- source_word: καρδία
  chosen: heart
  lexicon: BDAG
  rationale: Standard rendering for the inner person, including will and trust; no
    contextual pressure suggests a different gloss.
- source_word: πεποιθυῖα
  chosen: had trusted
  alternatives:
  - was trusting
  - was confident
  - had confidence
  lexicon: BDAG
  rationale: Perfect participle of πείθω in the intransitive sense conveys a settled
    state resulting from prior trust. 'Had trusted' captures the completed-and-enduring
    force in smooth English; 'was confident' is possible but less explicitly relational
    with ἐπὶ Κυρίῳ.
- source_word: ἐπὶ Κυρίῳ
  chosen: in the Lord
  alternatives:
  - on the Lord
  - upon the Lord
  lexicon: BDAG
  rationale: With πεποιθυῖα, English idiom prefers 'trusted in the Lord.' 'Lord' follows
    the project's default rendering for κύριος.
