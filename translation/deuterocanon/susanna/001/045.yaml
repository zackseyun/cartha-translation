id: SUS.1.45
reference: Susanna 1:45
source:
  edition: lxx-swete-1909
  text: καὶ ἀπαγομένης αὐτῆς ἀπολέσθαι, ἐξήγειρεν ὁ θεὸς τὸ πνεῦμα τὸ ἅγιον παιδαρίου
    νεωτέρου ᾧ ὄνομα Δανιήλ.
  language: Greek
  pages:
