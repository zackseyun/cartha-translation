translation:
  text: And as she was being led away to be put to death, God stirred up the holy
    spirit of a younger boy whose name was Daniel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Holy Spirit.' The Greek reads literally 'the spirit, the holy [one],'
      and capitalization in English is an interpretive decision.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπαγομένης
  chosen: was being led away
  alternatives:
  - was being taken away
  - was being brought away
  lexicon: LSJ
  rationale: The participle from ἀπάγω commonly means to lead or take away. In context,
    Susanna is being escorted to execution, so 'was being led away' is natural English
    and preserves the passive movement implied by the Greek.
- source_word: ἀπολέσθαι
  chosen: to be put to death
  alternatives:
  - to perish
  - to be destroyed
  - to die
  lexicon: LSJ
  rationale: Although ἀπόλλυμι can mean 'perish' or 'be destroyed,' here the infinitive
    expresses the judicial outcome awaiting Susanna. 'To be put to death' makes explicit
    the execution context without over-paraphrasing.
- source_word: ἐξήγειρεν
  chosen: stirred up
  alternatives:
  - aroused
  - awakened
  - raised up
  lexicon: LSJ
  rationale: The verb means to rouse or stir up. Here it refers to divine activation
    of Daniel for intervention. 'Stirred up' preserves the metaphor of inward prompting
    better than the more institutional-sounding 'raised up.'
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the holy spirit
  alternatives:
  - the Holy Spirit
  - the holy disposition
  - the sacred spirit
  lexicon: LSJ
  rationale: The Greek phrase is literally 'the spirit, the holy [one].' In this deuterocanonical
    narrative context, the phrase can denote God's holy Spirit empowering Daniel.
    Lowercase 'holy spirit' avoids importing later dogmatic capitalization into a
    Greek text where capitalization is interpretive, while still preserving the divine-source
    sense.
- source_word: παιδαρίου
  chosen: boy
  alternatives:
  - youth
  - lad
  - young servant
  lexicon: LSJ
  rationale: παιδάριον denotes a young boy or lad. 'Boy' is the most straightforward
    rendering here and fits the contrast with νεωτέρου.
- source_word: νεωτέρου
  chosen: younger
  alternatives:
  - young
  - very young
  - junior
  lexicon: LSJ
  rationale: The comparative adjective indicates relative youth. Rendering it as 'younger'
    preserves the Greek form and explains why Daniel is presented as notably youthful.
- source_word: ᾧ ὄνομα Δανιήλ
  chosen: whose name was Daniel
  alternatives:
  - named Daniel
  - to whom was the name Daniel
  lexicon: LSJ
  rationale: This is a standard Semitic-influenced Greek naming formula. 'Whose name
    was Daniel' is clear, natural, and close to the source structure.
