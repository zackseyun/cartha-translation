theological_decisions:
- issue: Whether τὸ πνεῦμα τὸ ἅγιον should be capitalized as a distinct personal title
  chosen_reading: the holy spirit
  alternative_readings:
  - the Holy Spirit
  rationale: The Greek wording supports a divine holy spirit empowering Daniel, but
    capitalization in English can imply a later doctrinal precision not explicitly
    marked in the source text. The translation preserves the phrase's theological
    weight while avoiding over-definition.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not importing doctrinal claims the text does not
    make.'
