translation:
  text: one said to the other, “Let us go home now, because it is time for lunch.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἀρίστου refers to the earlier meal of the day, often a midday meal;
      'lunch' is a contextual modern equivalent.
    reason: cultural_note
  - marker: b
    text: Literally, 'one to the other, “Let us go now into the house, because it
      is time for the meal.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτερος τῷ ἑτέρῳ
  chosen: one said to the other
  alternatives:
  - each to the other
  - one to another
  lexicon: LSJ
  rationale: The idiom marks reciprocal speech between the two elders. English normally
    supplies a verb of speaking for clarity; 'one said to the other' best conveys
    the narrative sense without overparaphrase.
- source_word: Πορευθῶμεν δὴ
  chosen: Let us go now
  alternatives:
  - Come, let us go
  - Let us be going now
  lexicon: BDAG
  rationale: Aorist subjunctive with exhortative force plus δή gives an immediate
    proposal. 'Let us go now' preserves the hortatory tone and the particle's sense
    of promptness.
- source_word: εἰς οἶκον
  chosen: home
  alternatives:
  - to the house
  - to our house
  lexicon: LSJ
  rationale: In this context the idiom naturally means returning home rather than
    entering a specific house. 'Home' is idiomatic English and avoids an overly wooden
    rendering.
- source_word: ἀρίστου
  chosen: lunch
  alternatives:
  - the midday meal
  - breakfast
  - dinner
  lexicon: LSJ
  rationale: ἄριστον commonly denotes the earlier main meal, often around midday.
    In modern English 'lunch' most naturally communicates this timing. 'Breakfast'
    would mislead many readers, and 'dinner' suggests an evening meal.
- source_word: ὥρα ἐστίν
  chosen: it is time
  alternatives:
  - the hour is
  - it is the hour
  lexicon: BDAG
  rationale: This is a standard idiomatic expression for the appropriate time. 'It
    is time' is natural English and preserves the sense.
