translation:
  text: And no one was there except the two elders, hidden and watching her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spying on her.' The Greek verb can imply close, hostile, or furtive
      watching; the main text keeps the more literal 'watching her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἦν οὐδεὶς
  chosen: no one was there
  alternatives:
  - there was no one
  - nobody was there
  lexicon: BDAG
  rationale: The double-negative construction idiomatically means that no person was
    present. 'No one was there' is natural modern English and preserves the sense
    of absence.
- source_word: πλὴν
  chosen: except
  alternatives:
  - besides
  - save
  lexicon: BDAG
  rationale: πλὴν marks an exception. 'Except' is the clearest contemporary rendering.
- source_word: οἱ δύο πρεσβύτεροι
  chosen: the two elders
  alternatives:
  - the two older men
  lexicon: BDAG
  rationale: In Susanna, πρεσβύτεροι refers to the recognized elder-judges, not merely
    men advanced in age. 'Elders' preserves both social role and narrative significance.
- source_word: κεκρυμμένοι
  chosen: hidden
  alternatives:
  - having hidden themselves
  - concealed
  lexicon: BDAG
  rationale: The perfect participle indicates a state of being concealed. 'Hidden'
    is concise and idiomatic while preserving that they were already in concealment.
- source_word: παρατηροῦντες
  chosen: watching her
  alternatives:
  - observing her
  - spying on her
  lexicon: BDAG
  rationale: The participle denotes close watching. 'Watching her' is the most direct
    rendering from the Greek. 'Spying on her' captures the predatory nuance but is
    more interpretive than the source wording, so it is preserved as an alternative
    rather than used in the main text.
