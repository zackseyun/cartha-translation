translation:
  text: And it happened, when the maids had gone out, that the two elders rose up
    and rushed at her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the girls' or 'the servant girls' for 'the maids' (τὰ κοράσια). The
      Greek term can denote young females generally; the household context suggests
      attendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it was
  lexicon: BDAG
  rationale: Common narrative formula in Greek; 'it happened' preserves the event-transition
    sense without archaic English.
- source_word: ὡς
  chosen: when
  alternatives:
  - as
  - after
  lexicon: BDAG
  rationale: In this context it introduces the time circumstance for the main action;
    'when' is the most natural temporal rendering.
- source_word: ἐξήλθοσαν
  chosen: had gone out
  alternatives:
  - went out
  - left
  lexicon: BDAG
  rationale: Aorist in a temporal clause prior to the elders' action; English past
    perfect clarifies sequence naturally.
- source_word: τὰ κοράσια
  chosen: the maids
  alternatives:
  - the girls
  - the servant girls
  - the young women
  lexicon: LSJ
  rationale: κοράσια can mean girls/young women, but in Susanna's household setting
    these are attendant female servants. 'Maids' is concise and contextually fitting
    without over-paraphrasing.
- source_word: ἀνέστησαν
  chosen: rose up
  alternatives:
  - stood up
  - got up
  lexicon: BDAG
  rationale: The verb marks the elders' sudden movement into action; 'rose up' preserves
    the narrative force better than the flatter 'stood up.'
- source_word: οἱ δύο πρεσβῦται
  chosen: the two elders
  alternatives:
  - the two old men
  lexicon: BDAG
  rationale: πρεσβῦται in this narrative refers to the recognized elders/judges, not
    merely their age. 'Elders' preserves their social role.
- source_word: ἐπέδραμον
  chosen: rushed at
  alternatives:
  - ran upon
  - attacked
  - fell upon
  lexicon: LSJ
  rationale: The verb conveys a sudden aggressive movement toward Susanna. 'Rushed
    at' preserves the violence and immediacy while avoiding importing more than the
    text explicitly states at this point.
- source_word: αὐτῇ
  chosen: her
  alternatives:
  - upon her
  - at her
  lexicon: BDAG
  rationale: English idiom with 'rushed at' naturally takes 'her'; this reflects the
    dative object without awkwardness.
