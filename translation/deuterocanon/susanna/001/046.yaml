translation:
  text: And he cried out with a loud voice, “I am clear from this woman’s blood.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I am innocent of this woman’s blood.” The Greek uses bloodguilt language,
      declaring freedom from responsibility for her death.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβόησεν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: BDAG
  rationale: βοάω commonly denotes a loud cry or shout. 'Cried out' preserves the
    force without sounding overly colloquial.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - loudly
  - in a loud voice
  lexicon: BDAG
  rationale: This is a standard instrumental/dative expression. 'With a loud voice'
    stays close to the Greek while remaining natural English.
- source_word: Ἀθῷος
  chosen: clear
  alternatives:
  - innocent
  - guiltless
  lexicon: LSJ
  rationale: The adjective means free from guilt or liability. In the idiom 'clear
    from blood,' 'clear' best fits English usage and preserves the legal-moral sense.
- source_word: ἀπὸ τοῦ αἵματος ταύτης
  chosen: from this woman’s blood
  alternatives:
  - of this woman's blood
  - from her blood
  lexicon: BDAG
  rationale: 'The phrase echoes biblical bloodguilt language: being free from responsibility
    for a person''s death. ''This woman''s blood'' makes explicit the feminine demonstrative
    ταύτης and communicates the idiom naturally in English.'
