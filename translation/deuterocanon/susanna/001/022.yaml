translation:
  text: And they said, “Look, the doors of the garden are shut, and no one sees us,
    and we are burning with desire for you. Therefore consent to us, and be with us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek παράδεισος, here meaning an enclosed garden or park, not 'Paradise'
      in the later theological sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: A deictic attention-getter. 'Look' preserves the force in readable modern
    English better than the more archaic 'Behold.'
- source_word: αἱ θύραι τοῦ παραδείσου
  chosen: the doors of the garden
  alternatives:
  - the doors of the orchard
  - the doors of the park
  lexicon: LSJ
  rationale: παράδεισος here refers to an enclosed garden/orchard setting, not the
    later theological sense 'Paradise.' 'Garden' best fits the narrative context of
    Susanna.
- source_word: κέκλεινται
  chosen: are shut
  alternatives:
  - have been shut
  - are closed
  lexicon: BDAG
  rationale: Perfect passive conveys a present state resulting from closure. 'Are
    shut' is natural English and preserves the state without overloading the aspect.
- source_word: θεωρεῖ
  chosen: sees
  alternatives:
  - is watching
  - observes
  lexicon: BDAG
  rationale: The verb denotes seeing/observing. 'Sees' is the most direct and idiomatic
    rendering in this threat context.
- source_word: ἐν ἐπιθυμίᾳ σού ἐσμεν
  chosen: we are burning with desire for you
  alternatives:
  - we desire you
  - we are in lust for you
  - we long for you
  lexicon: BDAG
  rationale: ἐπιθυμία can denote strong desire, often sexual in context. Given the
    coercive sexual proposition in the verse, 'burning with desire for you' makes
    the predatory force explicit without adding content foreign to the Greek.
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: BDAG
  rationale: Marks an inferential move from privacy and desire to the demand that
    follows. 'Therefore' preserves the logic clearly.
- source_word: συγκατάθου ἡμῖν
  chosen: consent to us
  alternatives:
  - yield to us
  - agree with us
  lexicon: LSJ
  rationale: The middle imperative calls for acquiescence/consent. 'Consent to us'
    is a close rendering that preserves the coercive demand; 'yield to us' is possible
    but slightly more interpretive.
- source_word: γενοῦ μεθ᾿ ἡμῶν
  chosen: be with us
  alternatives:
  - come with us
  - become ours
  lexicon: BDAG
  rationale: An idiomatic sexual invitation/proposition in context. 'Be with us' keeps
    the wording close to the Greek while allowing the context to supply the implication.
