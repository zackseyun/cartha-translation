theological_decisions:
- issue: Rendering παράδεισος in a non-eschatological narrative context
  chosen_reading: garden
  alternative_readings:
  - Paradise
  rationale: The term can carry later theological associations, but in Susanna's story
    it denotes the enclosed garden setting. Translating 'Paradise' here would miscue
    readers toward an eschatological sense absent from the context.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
