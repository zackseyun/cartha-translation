translation:
  text: And they rose up against the two elders, because Daniel had convicted them
    from their own mouth of being false witnesses, and they did to them as they had
    maliciously planned to do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had exposed them from their own testimony as false witnesses.'
    reason: lexical_alternative
  - marker: b
    text: 'The final clause expresses retaliatory justice: the elders received the
      penalty they had wickedly intended for Susanna.'
    reason: cross_reference
lexical_decisions:
- source_word: ἀνέστησαν ἐπὶ
  chosen: rose up against
  alternatives:
  - stood up against
  - turned against
  lexicon: LSJ
  rationale: The idiom with ἐπί conveys hostile action taken against someone, not
    merely standing. 'Rose up against' preserves the formal sense and the judicial/public
    reversal in context.
- source_word: πρεσβύτας
  chosen: elders
  alternatives:
  - old men
  lexicon: LSJ
  rationale: In Susanna the men are not merely elderly; they hold recognized communal
    authority as judges. 'Elders' best reflects the social role implied by the narrative.
- source_word: συνέστησεν
  chosen: had convicted
  alternatives:
  - had exposed
  - had proved
  - had shown
  lexicon: LSJ
  rationale: Here the verb refers to Daniel's establishing their guilt by means of
    their own contradictory testimony. 'Had convicted' fits the legal setting better
    than the more general 'shown' or 'exposed'.
- source_word: ἐκ τοῦ στόματος αὐτῶν
  chosen: from their own mouth
  alternatives:
  - from their own mouths
  - by their own testimony
  lexicon: LSJ
  rationale: The singular στόματος after αὐτῶν is idiomatic; the sense is that their
    own spoken words condemned them. 'From their own mouth' keeps the vivid Semitic-style
    legal idiom while remaining understandable in English.
- source_word: ψευδομάρτυρας ὄντας
  chosen: of being false witnesses
  alternatives:
  - to be false witnesses
  - as false witnesses
  - of being liars in testimony
  lexicon: LSJ
  rationale: ψευδομάρτυρες is specifically forensic, not merely 'liars.' 'False witnesses'
    preserves the courtroom setting central to the verse.
- source_word: ἐποίησαν
  chosen: they did
  alternatives:
  - they carried out
  - they dealt
  lexicon: LSJ
  rationale: A simple verb is retained because the object phrase supplies the content
    of the action. 'They did' is natural English and stays close to the Greek.
- source_word: τὸν τρόπον
  chosen: as
  alternatives:
  - in the manner that
  - the way that
  lexicon: LSJ
  rationale: The phrase functions adverbially, introducing correspondence between
    intended evil and enacted judgment. 'As' is concise and idiomatic.
- source_word: ἐπονηρεύσαντο
  chosen: had maliciously planned to do
  alternatives:
  - had intended wickedly to do
  - had done wickedly
  - had plotted evil
  lexicon: LSJ
  rationale: The middle form here points to their wicked design against Susanna rather
    than a generic statement of evil character. 'Had maliciously planned to do' makes
    explicit the intentionality and judicial malice in context.
