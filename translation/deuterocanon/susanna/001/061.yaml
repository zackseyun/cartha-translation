theological_decisions:
- issue: Judicial reciprocity in the punishment formula
  chosen_reading: The verse is rendered to show that the assembly imposed on the elders
    the penalty they had wickedly intended for Susanna.
  alternative_readings:
  - A more literal but less clear rendering could leave the final clause as 'they
    did to them according to the manner they had acted wickedly.'
  rationale: The narrative alludes to the Deuteronomic principle that false witnesses
    receive the punishment they sought for the innocent. The translation preserves
    that legal-theological force without importing wording not present in this verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
