translation:
  text: And both of them were inflamed with desire for her, and neither one disclosed
    to the other the wicked passion that held them concerning her, nor did the woman
    know this matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'were pierced concerning her,' an idiom here for being
      deeply smitten or inflamed with desire for her.
    reason: lexical_alternative
  - marker: b
    text: Or 'the evil desire that possessed them concerning her.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀμφότεροι
  chosen: both of them
  alternatives:
  - both
  lexicon: LSJ
  rationale: Explicitly refers to the two elders already in view; 'both of them' is
    natural English and preserves the dual reference.
- source_word: κατανενυγμένοι
  chosen: inflamed with desire
  alternatives:
  - pierced
  - stung
  - deeply smitten
  - compunct
  lexicon: LSJ
  rationale: The perfect passive participle literally suggests being 'pricked' or
    'pierced,' but in this context περὶ αὐτῆς shows erotic fixation on Susanna. 'Inflamed
    with desire' conveys the idiomatic force in readable English without flattening
    the intensity.
- source_word: περὶ αὐτῆς
  chosen: for her
  alternatives:
  - about her
  - concerning her
  lexicon: BDAG
  rationale: With a verb of emotional fixation, English idiom prefers 'for her.' The
    phrase recurs later in the verse with a different syntactic relation, where 'concerning
    her' is retained more literally.
- source_word: ἕτερος τῷ ἑτέρῳ
  chosen: neither one ... to the other
  alternatives:
  - one to the other
  - each to the other
  lexicon: LSJ
  rationale: The Greek means 'the one to the other'; in English, with the following
    negation, 'neither one ... to the other' makes the sense explicit and smooth.
- source_word: οὐ προσεποιεῖτο
  chosen: disclosed
  alternatives:
  - made known
  - revealed
  - confessed
  - pretended
  lexicon: LSJ
  rationale: In this context the verb carries the sense of making something known
    or avowing it, not 'pretending' in the common English sense. 'Disclosed' fits
    the secrecy motif of the narrative.
- source_word: τὸ κακὸν
  chosen: the wicked passion
  alternatives:
  - the evil
  - the wicked thing
  - the evil desire
  lexicon: LSJ
  rationale: A bare 'the evil' is too opaque in English. The phrase refers to the
    morally corrupt desire possessing them, so 'wicked passion' makes the referent
    clear while preserving the moral judgment of κακόν.
- source_word: τὸ ἔχον αὐτοὺς
  chosen: that held them
  alternatives:
  - that had them
  - that possessed them
  - that gripped them
  lexicon: BDAG
  rationale: The participle presents the evil as having mastery over them. 'Held them'
    is concise and idiomatic, preserving that sense of grip.
- source_word: περὶ αὐτῆς
  chosen: concerning her
  alternatives:
  - about her
  - for her
  lexicon: BDAG
  rationale: Here the phrase modifies the wicked passion as its object or reference.
    'Concerning her' stays closer to the Greek structure and avoids repeating 'for
    her' too mechanically.
- source_word: ἡ γυνή
  chosen: the woman
  alternatives:
  - the wife
  - the lady
  lexicon: LSJ
  rationale: The Greek says 'the woman,' referring to Susanna. Retaining 'the woman'
    preserves the source wording and the narrative's external viewpoint.
- source_word: ἔγνω
  chosen: know
  alternatives:
  - learn
  - perceive
  - come to know
  lexicon: BDAG
  rationale: Simple past 'did ... know' matches the aorist naturally in English and
    fits the statement of her ignorance.
- source_word: τὸ πρᾶγμα τοῦτο
  chosen: this matter
  alternatives:
  - this thing
  - this affair
  - this plot
  lexicon: BDAG
  rationale: '''This matter'' is idiomatic and broad enough to cover the hidden situation
    without over-specifying it as a plot, which the Greek does not yet explicitly
    say.'
