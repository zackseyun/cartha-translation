theological_decisions:
- issue: Moral characterization of the elders' hidden desire
  chosen_reading: Render τὸ κακὸν as 'the wicked passion' rather than a bare 'evil'
  alternative_readings:
  - the evil
  - the evil desire
  - the wicked thing
  rationale: The verse itself morally evaluates their desire as κακόν. Translating
    more explicitly as 'wicked passion' clarifies the referent in English without
    importing theology beyond the text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Idiomatic force of κατανενυγμένοι in erotic context
  chosen_reading: Translate idiomatically as 'inflamed with desire'
  alternative_readings:
  - pierced for her
  - deeply smitten with her
  rationale: A more literal 'pierced' is possible but obscure in modern English. The
    narrative context makes the erotic sense plain, so optimal equivalence favors
    an idiomatic rendering while documenting the literal imagery.
  doctrine_reference: Translation philosophy §1, §6
