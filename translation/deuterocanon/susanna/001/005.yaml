translation:
  text: 'And in that year two elders from the people were appointed as judges, concerning
    whom the Master had spoken: “Lawlessness came out from Babylon, from elders who
    were judges, who seemed to govern the people.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Lord” or “the Sovereign” for Greek δεσπότης; the main text uses
      “the Master” to preserve the distinction from κύριος.
    reason: lexical_alternative
  - marker: b
    text: The Greek wording is syntactically compressed at the end of the verse; “who
      seemed to govern the people” may also be understood as “who were thought to
      govern the people.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεδείχθησαν
  chosen: were appointed
  alternatives:
  - were shown
  - were designated
  - were selected
  lexicon: LSJ
  rationale: In context of public office with predicate κριταί, the verb carries the
    sense of being designated or appointed to a role, not merely being displayed.
- source_word: πρεσβύτεροι
  chosen: elders
  alternatives:
  - older men
  lexicon: LSJ
  rationale: The term likely denotes community leaders rather than merely men advanced
    in age, especially since they are also called judges.
- source_word: κριταὶ
  chosen: judges
  alternatives:
  - magistrates
  lexicon: LSJ
  rationale: The judicial function is explicit and straightforward here.
- source_word: δεσπότης
  chosen: the Master
  alternatives:
  - the Lord
  - the Sovereign
  lexicon: LSJ
  rationale: The Greek uses δεσπότης rather than κύριος. 'Master' preserves the distinct
    lexical choice while still fitting a divine referent in this citation-like statement.
- source_word: ἀνομία
  chosen: lawlessness
  alternatives:
  - wickedness
  - iniquity
  lexicon: LSJ
  rationale: '''Lawlessness'' closely reflects the Greek and preserves the sense of
    violation of justice and order, fitting the judicial corruption in view.'
- source_word: ἐξῆλθεν
  chosen: came out
  alternatives:
  - went out
  - issued forth
  lexicon: LSJ
  rationale: A literal but natural rendering preserves the imagery of evil emerging
    from Babylon.
- source_word: ἐκ Βαβυλῶνος
  chosen: from Babylon
  alternatives:
  - out of Babylon
  lexicon: LSJ
  rationale: Standard rendering of the place name and preposition.
- source_word: οἱ ἐδόκουν κυβερνᾷν τὸν λαόν
  chosen: who seemed to govern the people
  alternatives:
  - who were thought to govern the people
  - who appeared to rule the people
  lexicon: LSJ
  rationale: 'ἐδόκουν can mean ''seemed'' or ''were thought.'' ''Seemed'' preserves
    the ironic distance: they had the appearance of proper rulers, but were corrupt.'
