    God and his just judgments without making the divine referent more explicit than
    the Greek does.
  alternative_readings:
  - so as not to look to Heaven and remember God's righteous judgments
  rationale: The Greek says 'to heaven' and 'righteous judgments' without an explicit
    divine possessive. The context strongly implies God, but the translation should
    not add words absent from the text.
