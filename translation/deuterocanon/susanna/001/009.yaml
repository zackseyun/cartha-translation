translation:
  text: They twisted their minds and turned away their eyes so as not to look to heaven
    or remember righteous judgments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'perverted their minds.' The Greek verb can carry the sense of moral
      corruption as well as distortion.
    reason: lexical_alternative
  - marker: b
    text: '''Righteous judgments'' may also be rendered ''just judgments.'' The phrase
      likely refers to God''s just acts or standards, though the Greek does not state
      the possessive explicitly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διέστρεψαν
  chosen: twisted
  alternatives:
  - perverted
  - corrupted
  lexicon: BDAG
  rationale: The verb conveys moral distortion or turning something from its proper
    state. 'Twisted' is idiomatic modern English and preserves the sense of inner
    moral distortion without sounding overly technical.
- source_word: τὸν νοῦν
  chosen: their minds
  alternatives:
  - their understanding
  - their intent
  lexicon: BDAG
  rationale: νοῦς here refers to the inner faculty of thought and moral perception.
    'Minds' is the most direct and natural rendering in context.
- source_word: ἐξέκλιναν
  chosen: turned away
  alternatives:
  - averted
  - turned aside
  lexicon: BDAG
  rationale: The verb means to turn aside or away. 'Turned away' fits the physical
    image of the eyes while remaining readable.
- source_word: τοὺς ὀφθαλμοὺς αὐτῶν
  chosen: their eyes
  lexicon: BDAG
  rationale: A straightforward literal rendering is best; the phrase contributes to
    the concrete image of deliberate refusal.
- source_word: τοῦ μὴ βλέπειν εἰς τὸν οὐρανόν
  chosen: so as not to look to heaven
  alternatives:
  - so that they would not look toward heaven
  - to avoid looking to heaven
  lexicon: BDAG
  rationale: The articular infinitive with μή expresses purpose or result. 'So as
    not to look to heaven' preserves the deliberate avoidance implied by the Greek.
- source_word: μνημονεύειν
  chosen: remember
  alternatives:
  - call to mind
  - keep in mind
  lexicon: BDAG
  rationale: The verb means to remember or keep in mind. 'Remember' is concise and
    natural.
- source_word: κριμάτων δικαίων
  chosen: righteous judgments
  alternatives:
  - just judgments
  - righteous ordinances
  lexicon: BDAG
  rationale: κρίματα can mean judgments, judicial decisions, or ordinances; δίκαιος
    adds the sense of justice/righteousness. 'Righteous judgments' preserves the moral
    and judicial force and echoes biblical diction without becoming archaic.
