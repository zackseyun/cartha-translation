lexical_decisions:
- source_word: οὐκ ᾔδεισαν
  chosen: did not know
  alternatives:
  - were unaware
  lexicon: BDAG
  rationale: Straightforward past sense of οἶδα in narrative context; 'did not know'
    is the most natural and transparent English rendering.
- source_word: εἰστήκειμεν
  chosen: we were standing there
  alternatives:
  - we had taken our stand
  - we were there
  lexicon: LSJ
  rationale: Pluperfect of ἵστημι conveys a standing position already in place. 'We
    were standing there' preserves both posture and prior presence better than the
    flatter 'we were there.'
- source_word: συνεπιτάμεθα
  chosen: we rushed together at one another
  alternatives:
  - we sprang upon each other
  - we fell upon one another together
  lexicon: LSJ
  rationale: The compound verb suggests a sudden joint movement in attack or seizure.
    Because the object is reciprocal (ἀλλήλοις), the Greek is awkward in English;
    this rendering preserves the reciprocal form while signaling abrupt action. The
    context likely implies a coordinated rush involving both elders and the pair they
    confronted, but the Greek wording itself is retained rather than over-resolved.
- source_word: ἀλλήλοις
  chosen: at one another
  alternatives:
  - upon each other
  - together
  lexicon: BDAG
  rationale: Reciprocal language is explicit in the Greek and should not be omitted,
    even though the resulting English is somewhat strained. This keeps the draft auditable
    to the source wording.
- source_word: Μάθωμεν
  chosen: Let us find out
  alternatives:
  - Let us learn
  - We should find out
  lexicon: BDAG
  rationale: Aorist subjunctive in hortatory force. 'Let us find out' is idiomatic
    modern English and fits the investigative sense in context.
- source_word: τίνες εἰσὶν οὗτοι
  chosen: who these men are
  alternatives:
  - who these are
  lexicon: BDAG
  rationale: The masculine referents in context are the two young men previously mentioned,
    so 'men' makes explicit what English naturally supplies from context without changing
    the sense.
