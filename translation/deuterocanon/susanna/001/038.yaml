translation:
  text: And they did not know that we were standing there. Then we rushed together,
    saying, 'Let us find out who these men are.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'who these are'; 'men' is supplied from the immediate context,
      where the speakers refer to the two young men.
