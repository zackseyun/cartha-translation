id: SUS.1.48
reference: Susanna 1:48
source:
  edition: lxx-swete-1909
  text: ὁ δὲ στὰς ἐν μέσῳ αὐτῶν εἶπεν Οὕτως μωροί, οἱ υἱοὶ Ἰσραήλ; οὐκ ἀνακρίναντες
    οὐδὲ τὸ σαφὲς ἐπιγνόντες κατεκρίνατε θυγατέρα Ἰσραήλ;
  language: Greek
  pages:
  - 542
  confidence: high
  validation: no_reference
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone Susanna extraction currently
    follows the complete Theodotion stream in Swete, because that stream is the cleanest
    fully numbered extract available in the current corpus.
translation:
  text: But he stood in their midst and said, “Are you such fools, sons of Israel?
    Without examining the matter or even learning the facts clearly, have you condemned
    a daughter of Israel?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Are you so foolish, sons of Israel?” The Greek rebuke Οὕτως μωροί can
      be rendered either with the noun “fools” or the adjective “foolish.”
    reason: lexical_alternative
  - marker: b
    text: Or “without investigating and without ascertaining the plain facts.” The
      Greek wording is judicial in tone, stressing failure to examine the case properly
      before condemning Susanna.
    reason: lexical_alternative
lexical_decisions:
- source_word: στὰς
  chosen: he stood
  alternatives:
  - having stood
  - standing up
  lexicon: LSJ
  rationale: Aorist participle of ἵστημι introducing Daniel's action. English finite
    verb 'he stood' reads naturally while preserving the concrete bodily action before
    his speech.
- source_word: ἐν μέσῳ αὐτῶν
  chosen: in their midst
  alternatives:
  - among them
  - in the middle of them
  lexicon: LSJ
  rationale: Retains the vivid public setting and confrontational force. 'In their
    midst' is slightly more formal but still readable and closely reflects the Greek
    idiom.
- source_word: Οὕτως μωροί
  chosen: Are you such fools
  alternatives:
  - Are you so foolish
  - Thus foolish are you
  lexicon: LSJ
  rationale: The Greek is an exclamatory rebuke framed as a question in context. 'Such
    fools' preserves the sharpness of μωροί better than the softer 'so foolish' while
    fitting the following vocative.
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: sons of Israel
  alternatives:
  - children of Israel
  - Israelites
  lexicon: LSJ
  rationale: Gender-accurate rendering follows the explicit masculine plural and the
    project's stated philosophy. 'Children of Israel' would flatten the direct vocative
    force; 'Israelites' is possible but less literal.
- source_word: ἀνακρίναντες
  chosen: examining the matter
  alternatives:
  - investigating
  - holding an inquiry
  - questioning
  lexicon: LSJ
  rationale: The verb denotes judicial examination or interrogation. 'Examining the
    matter' communicates legal scrutiny in idiomatic English without over-specifying
    a courtroom procedure.
- source_word: τὸ σαφὲς ἐπιγνόντες
  chosen: learning the facts clearly
  alternatives:
  - coming to know what is clear
  - ascertaining the truth plainly
  - fully recognizing the plain facts
  lexicon: LSJ
  rationale: The phrase combines clarity (σαφές) with full knowledge (ἐπιγινώσκω).
    'Learning the facts clearly' conveys that they failed to establish what was plainly
    true.
- source_word: κατεκρίνατε
  chosen: have you condemned
  alternatives:
  - did you condemn
  - have you passed sentence on
  lexicon: LSJ
  rationale: The aorist can be rendered simply past, but English present perfect in
    the rhetorical question highlights the completed judicial act whose injustice
    Daniel is exposing.
- source_word: θυγατέρα Ἰσραήλ
  chosen: a daughter of Israel
  alternatives:
  - the daughter of Israel
  - an Israelite daughter
  lexicon: LSJ
  rationale: Anarthrous singular is best represented as 'a daughter of Israel,' emphasizing
    Susanna as one member of the covenant people and balancing the vocative 'sons
    of Israel'.
