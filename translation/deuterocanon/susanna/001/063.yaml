theological_decisions:
- issue: Implicit object of praise in ᾔνεσαν
  chosen_reading: 'Supplied ''God'' in English: ''praised God'''
  alternative_readings:
  - left the object implicit as 'praised'
  - rendered as 'rejoiced over their daughter'
  rationale: The Greek does not explicitly name the object, but in biblical narrative
    praise language normally has God as its implied object. Supplying 'God' clarifies
    the sense for modern readers while remaining closely tied to the narrative's religious
    context. 'Rejoiced' would be too interpretive because the verb is specifically
    praise, not merely joy.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
