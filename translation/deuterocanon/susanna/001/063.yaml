translation:
  text: And Hilkiah and his wife praised God concerning their daughter, along with
    Joakim her husband and all their relatives, because no shameful deed was found
    in her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek simply says 'praised'; 'God' is implicit in the context and supplied
      for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: Χελκίας
  chosen: Hilkiah
  alternatives:
  - Chelkias
  rationale: Standard English transliteration of the Greek form of the Hebrew name,
    favoring familiar biblical name conventions.
- source_word: ᾔνεσαν
  chosen: praised God
  alternatives:
  - praised
  - gave praise
  lexicon: BDAG
  rationale: The verb means 'praised' or 'gave praise.' In this context the object
    of praise is implicit rather than stated; supplying 'God' makes the sense clear
    in natural English without materially exceeding the context, since the verse reports
    a pious response to Susanna's vindication.
- source_word: περὶ τῆς θυγατρὸς αὐτῶν
  chosen: concerning their daughter
  alternatives:
  - about their daughter
  - for their daughter
  lexicon: BDAG
  rationale: περί with the genitive commonly means 'concerning/about.' 'Concerning
    their daughter' preserves the relation without overinterpreting it as either direct
    praise of her or thanksgiving for her.
- source_word: μετὰ Ἰωακεὶμ τοῦ ἀνδρὸς αὐτῆς
  chosen: along with Joakim her husband
  alternatives:
  - with Joakim her husband
  lexicon: BDAG
  rationale: μετά here indicates accompaniment. 'Along with' reads smoothly while
    preserving the coordination of those joining in the praise.
- source_word: τῶν συγγενῶν πάντων
  chosen: all their relatives
  alternatives:
  - all the kinsmen
  - all the family members
  lexicon: BDAG
  rationale: συγγενεῖς denotes relatives/kinsfolk. 'Relatives' is clear modern English;
    'their' reflects the family grouping in context.
- source_word: οὐχ εὑρέθη
  chosen: was found
  alternatives:
  - was discovered
  - was proved to be
  lexicon: BDAG
  rationale: A passive of finding/discovering. 'Was found' preserves the judicial
    flavor of the vindication.
- source_word: ἐν αὐτῇ
  chosen: in her
  alternatives:
  - on her
  - with her
  lexicon: BDAG
  rationale: The Greek preposition is literally 'in.' In English, 'found in her' can
    idiomatically express that no such matter was discovered in her case or person.
- source_word: αἰσχρὸν πρᾶγμα
  chosen: shameful deed
  alternatives:
  - disgraceful thing
  - indecent act
  lexicon: BDAG
  rationale: αἰσχρός conveys shameful/disgraceful, and πρᾶγμα is a deed, matter, or
    thing done. 'Shameful deed' preserves both the moral and forensic sense in context.
