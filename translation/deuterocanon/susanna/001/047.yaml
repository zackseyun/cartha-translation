translation:
  text: Then all the people turned to him and said, “What is this word that you have
    spoken?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What is this statement that you have spoken?” The Greek λόγος can mean
      “word,” “statement,” or “matter.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέστρεψεν
  chosen: turned
  alternatives:
  - turned back
  - returned
  lexicon: BDAG
  rationale: The verb ἐπιστρέφω commonly means 'turn' or 'turn back.' Here, with πρὸς
    αὐτόν, it describes the crowd redirecting their attention toward Daniel, so 'turned'
    is the most natural English rendering without implying a prior departure as strongly
    as 'returned.'
- source_word: πᾶς ὁ λαός
  chosen: all the people
  alternatives:
  - the whole people
  - all the crowd
  lexicon: LEH
  rationale: This phrase denotes the assembled populace collectively. 'All the people'
    is clear modern English and preserves the totalizing force of πᾶς.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: With a verb of turning, πρὸς marks direction toward Daniel. English idiom
    prefers 'turned to him' over the more wooden 'turned toward him.'
- source_word: Τίς ὁ λόγος οὗτος
  chosen: What is this word
  alternatives:
  - What is this statement
  - What is this matter
  lexicon: BDAG
  rationale: λόγος can mean 'word,' 'statement,' or 'matter.' In this direct response
    to Daniel's utterance, 'word' preserves the Greek wording closely while remaining
    understandable. 'Statement' is possible but less vivid; 'matter' is too broad
    here.
- source_word: λελάληκας
  chosen: you have spoken
  alternatives:
  - you spoke
  - you have said
  lexicon: BDAG
  rationale: The perfect form naturally supports 'you have spoken,' highlighting the
    present relevance of what Daniel has just said. 'You have said' is possible, but
    'spoken' better reflects λαλέω.
