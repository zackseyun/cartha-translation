translation:
  text: And when we came near, we recognized her; but the young man fled, being covered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we recognized her.' The Greek verb can carry the sense of identifying
      or recognizing, not merely seeing.
    reason: lexical_alternative
  - marker: b
    text: Or 'veiled' or 'with his face covered.' The Greek says literally 'having
      been covered,' without specifying exactly what was covered.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  chosen: when we came near
  alternatives:
  - having come near
  - approaching
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, introducing the circumstance preceding
    the main verb. 'When we came near' is natural English and preserves the temporal
    force without over-literal awkwardness.
- source_word: ἐπέγνωμεν
  chosen: we saw
  alternatives:
  - we recognized
  - we perceived
  - we came to know
  lexicon: BDAG
  rationale: Although ἐπιγινώσκω often means 'recognize' or 'know fully,' in this
    narrative accusation context the sense is that they claim to have identified or
    observed her in the act. 'We saw her' communicates the accusation clearly in idiomatic
    English; the stronger nuance of recognition is preserved as an alternative.
- source_word: νεανίσκος
  chosen: young man
  alternatives:
  - youth
  - young fellow
  lexicon: BDAG
  rationale: The term denotes a young male. 'Young man' is standard, clear modern
    English and fits the narrative.
- source_word: ἔφυγε
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: BDAG
  rationale: The verb indicates flight. 'Fled' is concise and suitably formal for
    the narrative tone.
- source_word: συγκεκαλυμμένος
  chosen: being covered
  alternatives:
  - veiled
  - with his face covered
  - concealed
  lexicon: LSJ
  rationale: Perfect passive participle of συγκαλύπτω, literally 'having been covered/concealed.'
    Because the object covered is not explicit in the Greek, 'being covered' stays
    close to the source while allowing the likely sense of concealment. More specific
    renderings such as 'with his face covered' go beyond what the text states.
