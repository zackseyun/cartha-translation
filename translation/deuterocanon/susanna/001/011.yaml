translation:
  text: And when dawn came, they would come, hiding from one another in haste, to
    see which of them would appear to her first and speak to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'they were stealing one another.' The expression is idiomatic
      and likely means they were furtively slipping in separately, each trying to
      get to Susanna before the other.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ἐγίνετο ὄρθρος
  chosen: when dawn came
  alternatives:
  - as morning came
  - when it became dawn
  - at daybreak
  lexicon: LSJ
  rationale: ὄρθρος denotes early morning/dawn. The imperfect ἐγίνετο gives a recurring
    temporal setting in the narrative; 'when dawn came' is natural English and preserves
    the sense.
- source_word: ἐρχόμενοι
  chosen: they would come
  alternatives:
  - coming
  - as they came
  lexicon: BDAG
  rationale: 'The participle with the imperfect main verb contributes iterative action:
    this was their repeated behavior. Rendering with ''would come'' communicates habitual
    past action better than a bare participle in English.'
- source_word: ἔκλεπτον ἀλλήλους
  chosen: stealing away from one another
  alternatives:
  - concealing themselves from one another
  - slipping past one another unnoticed
  - deceiving one another
  lexicon: LSJ
  rationale: The phrase is idiomatic and difficult. From κλέπτω, the sense here is
    not literal theft but furtive, secretive movement with respect to each other.
    'Stealing away from one another' preserves the clandestine nuance without overinterpreting
    as direct deception.
- source_word: σπεύδοντες
  chosen: in haste
  alternatives:
  - hurrying
  - eagerly
  lexicon: BDAG
  rationale: σπεύδω can indicate haste or eagerness. Here the competitive context
    favors hurried action; 'in haste' fits the participial force smoothly in English.
- source_word: τίς φανήσεται αὐτῇ πρότερος
  chosen: which of them would appear to her first
  alternatives:
  - who would show himself to her first
  - who would be seen by her first
  lexicon: LSJ
  rationale: φανήσεται is future middle/passive of φαίνω in an intransitive sense,
    'appear' or 'show oneself.' 'Appear to her first' is idiomatic and keeps the focus
    on gaining first access to Susanna.
- source_word: λαλήσει πρὸς αὐτήν
  chosen: speak with her
  alternatives:
  - speak to her
  - talk with her
  lexicon: BDAG
  rationale: λαλέω with πρός commonly means speaking to someone. 'Speak with her'
    reads naturally in English while preserving the interpersonal direction of the
    phrase.
