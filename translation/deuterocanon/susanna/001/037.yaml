translation:
  text: And as we were going around the enclosed garden, we saw this woman resting
    with a man, and standing there we watched them talking with one another,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek στάδιον here refers to the enclosed grounds or garden area, not an
      athletic stadium in the modern sense.
    reason: cultural_note
  - marker: b
    text: Or 'resting' or 'reclining' for 'lying.' The Greek does not by itself state
      sexual activity in this clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: κυκλοῦντες
  chosen: as we were going around
  alternatives:
  - going around
  - circling
  - walking around
  lexicon: BDAG
  rationale: The participle indicates movement around the area. 'As we were going
    around' preserves the circumstantial, ongoing sense without sounding wooden.
- source_word: τὸ στάδιον
  chosen: the enclosed garden
  alternatives:
  - the grounds
  - the park
  - the garden enclosure
  lexicon: LSJ
  rationale: In Susanna's setting this refers to the enclosed estate/garden area rather
    than an athletic stadium in the modern sense. 'Enclosed garden' conveys the physical
    setting more clearly for modern readers while remaining anchored to the Greek
    context.
- source_word: εἴδομεν
  chosen: we saw
  alternatives:
  - we noticed
  - we observed
  lexicon: BDAG
  rationale: A straightforward past-tense perception verb is best here; no need to
    heighten or soften the claim.
- source_word: ταύτην
  chosen: this woman
  alternatives:
  - her
  - this one
  lexicon: BDAG
  rationale: The demonstrative is somewhat pointed. 'This woman' preserves the accusatory
    tone better than the more neutral 'her.'
- source_word: ἀναπαυομένην
  chosen: lying
  alternatives:
  - resting
  - reclining
  lexicon: BDAG
  rationale: The verb can mean resting or reclining. 'Lying' fits the accusation scene
    and natural English, while avoiding over-interpretation such as 'lying together.'
- source_word: μετὰ ἀνδρός
  chosen: with a man
  alternatives:
  - beside a man
  - in the company of a man
  lexicon: BDAG
  rationale: The phrase states association, not yet explicitly sexual activity. 'With
    a man' preserves that level of specificity.
- source_word: στάντες
  chosen: standing there
  alternatives:
  - having stopped
  - standing
  lexicon: BDAG
  rationale: The participle marks their stopping and remaining in place. 'Standing
    there' makes the sequence vivid in idiomatic English.
- source_word: ἐθεωροῦμεν
  chosen: we watched
  alternatives:
  - we were watching
  - we observed
  lexicon: BDAG
  rationale: The imperfect suggests continued observation. 'We watched' is concise
    and natural; the ongoing sense is supported by the participial structure and context.
- source_word: ὁμιλοῦντας ἀλλήλοις
  chosen: talking with one another
  alternatives:
  - speaking to each other
  - conversing with each other
  lexicon: BDAG
  rationale: This denotes conversation between the two. 'Talking with one another'
    is clear modern English and does not overstate the content.
