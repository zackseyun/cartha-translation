translation:
  text: Return to the court, for these men have borne false witness against her.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναστρέψατε
  chosen: Return
  alternatives:
  - Go back
  - Turn back
  lexicon: BDAG
  rationale: Aorist imperative plural calling the assembly to go back to prior proceedings.
    'Return' is concise, natural English and fits movement back to the judicial setting.
- source_word: κριτήριον
  chosen: court
  alternatives:
  - judgment seat
  - tribunal
  - place of judgment
  lexicon: BDAG
  rationale: In this context the word refers to the judicial venue or legal proceeding.
    'Court' is the clearest modern equivalent without unnecessary archaism.
- source_word: ψευδῆ
  chosen: 'false'
  alternatives:
  - lies
  - false things
  lexicon: BDAG
  rationale: Used adverbially/objectively with the verb of testimony to indicate the
    testimony was untrue. 'False' works idiomatically in English with 'borne false
    witness.'
- source_word: κατεμαρτύρησαν
  chosen: have borne false witness
  alternatives:
  - testified falsely
  - gave false testimony
  lexicon: BDAG
  rationale: The verb means to testify against. Because ψευδῆ is present, the combined
    sense is that they testified falsely against her. 'Have borne false witness' preserves
    the legal and moral weight of the accusation and echoes biblical judicial language
    without becoming obscure.
- source_word: αὐτῆς
  chosen: against her
  alternatives:
  - about her
  lexicon: BDAG
  rationale: With καταμαρτυρέω the genitive marks the person testified against. 'Against
    her' best reflects the adversative legal force.
