translation:
  text: But if not, we will testify against you that a young man was with you, and
    for this reason you sent the servant girls away from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we will bear witness against you.' The Greek is forensic in tone.
    reason: lexical_alternative
  - marker: b
    text: '''Servant girls'' translates a term that can mean ''girls,'' but here it
      refers to Susanna''s female attendants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ μή
  chosen: But if not
  alternatives:
  - But otherwise
  - But if you do not
  lexicon: BDAG
  rationale: Idiomatic conditional threat following the implied demand of the previous
    verse; 'But if not' preserves the abrupt coercive force without over-expanding
    the ellipsis.
- source_word: καταμαρτυρήσομέν
  chosen: we will testify against
  alternatives:
  - we will bear witness against
  - we will accuse
  lexicon: BDAG
  rationale: The compound verb carries hostile legal testimony. 'Testify against'
    preserves the forensic sense better than the more interpretive 'accuse,' while
    remaining natural English.
- source_word: σου
  chosen: you
  alternatives:
  - against you
  lexicon: BDAG
  rationale: Rendered within the English phrase 'testify against you' because the
    genitive object is governed naturally by the English legal expression.
- source_word: ὅτι ἦν μετὰ σοῦ νεανίσκος
  chosen: that a young man was with you
  alternatives:
  - that there was a young man with you
  - that a youth was with you
  lexicon: BDAG
  rationale: '''Young man'' is the most natural rendering of νεανίσκος here. ''Youth''
    is possible but sounds less idiomatic in contemporary English. The clause is framed
    as the content of their intended false testimony.'
- source_word: διὰ τοῦτο
  chosen: for this reason
  alternatives:
  - therefore
  - because of this
  lexicon: BDAG
  rationale: 'This preserves the explicit causal link in their fabricated charge:
    the alleged presence of the young man explains why Susanna supposedly dismissed
    the attendants.'
- source_word: ἐξαπέστειλας
  chosen: you sent ... away
  alternatives:
  - you dismissed
  - you sent off
  lexicon: BDAG
  rationale: The verb means to send away or dispatch. 'Sent away' is clear and direct;
    'dismissed' is possible but slightly more interpretive.
- source_word: τὰ κοράσια
  chosen: the servant girls
  alternatives:
  - the girls
  - the maids
  lexicon: BDAG
  rationale: In context these are the female attendants previously present with Susanna,
    not merely generic girls. 'Servant girls' preserves both their youth/femaleness
    and their servant role better than the vaguer 'girls' or the somewhat archaic
    'maids'.
- source_word: ἀπὸ σοῦ
  chosen: away from you
  alternatives:
  - from your presence
  - from you
  lexicon: BDAG
  rationale: This phrase is naturally expressed in English as 'away from you' after
    'sent,' making the separation explicit and readable.
