theological_decisions:
- issue: Nature of the elders' statement
  chosen_reading: Render as a legal threat of false testimony without softening it
  alternative_readings:
  - Render more generally as 'we will accuse you'
  rationale: The Greek uses forensic language, and the narrative context is judicially
    charged. Preserving the legal register is important for the verse's moral and
    narrative force.
