lexical_decisions:
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking this clause to the preceding
    narrative.
- source_word: ἐπιθυμήσαντες
  chosen: desired
  alternatives:
  - lusted after
  - set their desire on
  - coveted
  lexicon: BDAG
  rationale: Aorist participle of ἐπιθυμέω, here expressing illicit desire in context.
    'Desired' keeps the wording concise and close to the Greek, while the surrounding
    narrative supplies the sexual/morally disordered sense. 'Lusted after' is possible,
    but slightly more interpretive than the bare verb in isolation.
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - for her
  lexicon: BDAG
  rationale: Genitive feminine singular pronoun referring to Susanna. In idiomatic
    English with 'desire,' the direct object 'her' best conveys the sense, though
    the Greek construction could be represented more woodenly as 'desired for her'
    or 'desired her'.
