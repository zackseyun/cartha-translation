theological_decisions:
- issue: Rendering the kinship phrase γυναῖκα ἀδελφοῦ αὐτῶν ἐκ τῶν υἱῶν Ἰσραήλ
  chosen_reading: a wife of one of their brothers from the sons of Israel
  alternative_readings:
  - their brother's wife from the sons of Israel
  - a woman, a sister Israelite's wife
  rationale: The phrase is syntactically difficult in the transmitted Greek and appears
    to stress that Susanna was a married Israelite woman belonging within their covenant
    community. The chosen rendering preserves the brother-language rather than flattening
    it to 'an Israelite woman,' while avoiding the misleading implication that both
    elders shared a literal brother who was her husband.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    and transparency in documenting difficult readings.
