translation:
  text: These men saw a woman beautiful in appearance, a wife of one of their brothers
    from the sons of Israel, whose name was Susanna, daughter of Hilkiah, wife of
    Joakim, walking in her husband's garden in the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'a wife of their brother from the sons of Israel.' The
      wording is awkward; the translation preserves the sense that she was the wife
      of a fellow Israelite within their own people.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτοι
  chosen: These men
  alternatives:
  - These
  - These ones
  lexicon: LSJ
  rationale: The demonstrative refers back to the two elders/judges in the narrative;
    supplying 'men' makes the English clear without adding new information beyond
    the context.
- source_word: ἰδόντες
  chosen: saw
  alternatives:
  - having seen
  - when they saw
  lexicon: LSJ
  rationale: A simple past finite verb reads naturally in English and captures the
    participle's narrative force in context.
- source_word: γυναῖκα ἀστεῖαν τῷ εἴδει
  chosen: a woman of beautiful appearance
  alternatives:
  - an attractive woman in appearance
  - a woman lovely in form
  lexicon: LSJ
  rationale: ἀστεῖος can denote attractiveness or elegance; with τῷ εἴδει the phrase
    specifically qualifies her outward appearance. 'Beautiful appearance' is natural
    and sufficiently formal.
- source_word: γυναῖκα ἀδελφοῦ αὐτῶν
  chosen: a wife of one of their brothers
  alternatives:
  - their brother's wife
  - a woman, the wife of their brother
  lexicon: LSJ
  rationale: The Greek as transmitted is awkward. Taken straightforwardly, it identifies
    her as the wife of a fellow Israelite, literally 'a wife of their brother.' In
    idiomatic English, 'one of their brothers' preserves the kinship language without
    implying a biological brother of both elders.
- source_word: ἐκ τῶν υἱῶν Ἰσραήλ
  chosen: from the sons of Israel
  alternatives:
  - from the Israelites
  - of the people of Israel
  lexicon: LSJ
  rationale: A relatively formal rendering preserves the source's ethnic-covenantal
    phrasing. 'Sons of Israel' is understandable in English and reflects the Greek
    closely.
- source_word: ὄνομα Σουσάνναν
  chosen: whose name was Susanna
  alternatives:
  - named Susanna
  lexicon: LSJ
  rationale: This is the idiomatic sense of the naming formula. 'Whose name was Susanna'
    keeps the narrative cadence.
- source_word: θυγατέρα Χελκίου
  chosen: daughter of Hilkiah
  lexicon: LSJ
  rationale: Standard genealogical rendering.
- source_word: γυναῖκα Ἰωακείμ
  chosen: wife of Joakim
  alternatives:
  - the wife of Joakim
  lexicon: LSJ
  rationale: Straightforward relational genitive. The transliteration follows the
    Greek form rather than anglicizing to Jehoiakim.
- source_word: περιπατοῦσαν
  chosen: walking
  alternatives:
  - strolling
  - going about
  lexicon: LSJ
  rationale: The participle depicts her movement in the garden; 'walking' is the most
    neutral and transparent choice.
- source_word: ἐν τῷ παραδείσῳ τοῦ ἀνδρὸς αὐτῆς
  chosen: in her husband's garden
  alternatives:
  - in the orchard of her husband
  - in her husband's park
  lexicon: LSJ
  rationale: παράδεισος in this context refers to an enclosed garden/orchard rather
    than the theological 'Paradise.' 'Garden' is the clearest contextual rendering.
- source_word: τὸ δειλινόν
  chosen: in the evening
  alternatives:
  - at evening
  - toward dusk
  lexicon: LSJ
  rationale: This temporal expression denotes evening time; 'in the evening' is natural
    modern English.
