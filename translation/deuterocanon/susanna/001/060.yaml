theological_decisions:
- issue: Rendering of εὐλόγησαν τῷ θεῷ
  chosen_reading: they blessed God
  alternative_readings:
  - they praised God
  rationale: Although English sometimes avoids 'bless God' as potentially awkward,
    the Greek verb is εὐλογέω, and the biblical idiom naturally allows humans to bless
    God in the sense of speaking well of or praising him. Retaining 'blessed' preserves
    the source wording more transparently.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of ἐλπίζοντας as hope vs trust
  chosen_reading: those who hope in him
  alternative_readings:
  - those who trust in him
  rationale: The Greek explicitly uses the hope-word group rather than a trust-word.
    To avoid importing a different theological nuance, the main text keeps 'hope,'
    while the overlap with 'trust' is preserved as an alternative lexical possibility.
  doctrine_reference: Translation philosophy §1, §5
