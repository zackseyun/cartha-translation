translation:
  text: And the whole assembly cried out with a loud voice, and they blessed God,
    who saves those who hope in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who trust in him.' The Greek verb more literally refers to hoping,
      but in biblical usage it can overlap with trusting reliance on God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεβόησεν
  chosen: cried out
  alternatives:
  - shouted
  - raised a cry
  lexicon: LSJ
  rationale: The verb denotes a loud exclamation or outcry. 'Cried out' is natural
    modern English and preserves the force without sounding overly colloquial.
- source_word: πᾶσα ἡ συναγωγή
  chosen: the whole assembly
  alternatives:
  - the whole congregation
  lexicon: LSJ
  rationale: συναγωγή here refers to the gathered community, not a later institutional
    'synagogue.' 'Assembly' best fits the narrative setting while preserving the collective
    sense.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - with a great voice
  - loudly
  lexicon: LSJ
  rationale: This is a common idiom for speaking or crying loudly. 'With a loud voice'
    keeps the concrete phrasing of the Greek better than the adverbial 'loudly.'
- source_word: εὐλόγησαν
  chosen: they blessed
  alternatives:
  - they praised
  lexicon: LSJ
  rationale: The verb literally means 'blessed.' While 'praised' is possible in context,
    'blessed' preserves the lexical form and biblical register without obscurity.
- source_word: τῷ θεῷ
  chosen: God
  lexicon: LSJ
  rationale: 'Straightforward dative object after εὐλόγησαν: the assembly blesses
    God.'
- source_word: τῷ σώζοντι
  chosen: who saves
  alternatives:
  - the one who saves
  - who delivers
  lexicon: LSJ
  rationale: The participle is attributive to God. 'Who saves' gives clear English
    while preserving the ongoing, characteristic sense of the present participle.
- source_word: τοὺς ἐλπίζοντας ἐπ’ αὐτόν
  chosen: those who hope in him
  alternatives:
  - those who trust in him
  - those who set their hope on him
  lexicon: LSJ
  rationale: ἐλπίζω is primarily 'hope,' though 'trust' overlaps in biblical usage.
    'Hope in him' best preserves the lexical sense and the theological nuance of reliance
    directed toward God.
