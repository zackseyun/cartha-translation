translation:
  text: And it happened, while they were watching for an opportune day, that she once
    entered, as yesterday and the third day before, with only two young maids, and
    desired to bathe in the garden, because it was hot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'as on the previous days.' The Greek phrase literally
      compares this visit with 'yesterday and the third day before.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it occurred
  lexicon: BDAG
  rationale: A standard narrative formula. 'It happened' preserves the idiomatic transition
    without archaic English.
- source_word: παρατηρεῖν
  chosen: were watching
  alternatives:
  - were observing
  - were lying in wait
  - were watching closely
  lexicon: BDAG
  rationale: The verb can imply close watching or watching with hostile intent. In
    context the elders are surveilling Susanna, but the immediate object is the timing
    ('an opportune day'), so 'were watching' keeps the sense natural while not over-interpreting
    beyond the Greek.
- source_word: ἡμέραν εὔθετον
  chosen: an opportune day
  alternatives:
  - a suitable day
  - a favorable day
  - the right day
  lexicon: LSJ
  rationale: The phrase indicates a day suitable for their purpose. 'Opportune day'
    captures the calculated timing implied in context.
- source_word: εἰσῆλθέν
  chosen: entered
  alternatives:
  - went in
  - came in
  lexicon: BDAG
  rationale: A straightforward rendering of the aorist verb of entry.
- source_word: ποτε
  chosen: once
  alternatives:
  - at one time
  - one day
  lexicon: BDAG
  rationale: Marks a particular occasion within the narrative. 'Once' is concise and
    idiomatic.
- source_word: καθὼς ἐχθὲς καὶ τρίτης ἡμέρας
  chosen: as yesterday and the third day before
  alternatives:
  - as on yesterday and the day before that
  - as yesterday and two days earlier
  lexicon: LSJ
  rationale: The Greek compares this occasion with prior visits. The phrase is somewhat
    idiomatic; 'as yesterday and the third day before' stays close to the wording
    while remaining intelligible. The likely sense is 'as on the previous days.'
- source_word: μετὰ δύο μόνων κορασίων
  chosen: with only two young maids
  alternatives:
  - with only two servant girls
  - with just two girls
  lexicon: BDAG
  rationale: κοράσιον denotes a girl/young female servant depending on context. Because
    these attendants are accompanying Susanna in a wealthy household setting, 'young
    maids' conveys both youth and servant role without sounding overly colloquial.
- source_word: ἐπεθύμησε
  chosen: desired
  alternatives:
  - wanted
  - longed
  lexicon: BDAG
  rationale: The verb means to desire or wish. Here it expresses intention rather
    than strong craving, so 'desired' is suitably restrained.
- source_word: λούσασθαι
  chosen: to bathe
  alternatives:
  - to wash herself
  lexicon: BDAG
  rationale: The middle infinitive refers to bathing herself. 'To bathe' is the most
    natural English rendering.
- source_word: ἐν τῷ παραδείσῳ
  chosen: in the garden
  alternatives:
  - in the orchard
  - in the park
  lexicon: LSJ
  rationale: In this narrative παραδείσος refers to the enclosed garden/orchard attached
    to the house, not a theological 'Paradise.' 'Garden' best fits the immediate setting.
- source_word: καῦμα
  chosen: it was hot
  alternatives:
  - there was heat
  - the weather was hot
  lexicon: LSJ
  rationale: The noun denotes heat. Rendering the clause idiomatically as 'because
    it was hot' communicates the reason for bathing.
