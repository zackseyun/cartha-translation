translation:
  text: And look, she was walking about as usual, and one of the elders had come,
    and look, the other arrived, and he questioned the other, saying, “Why did you
    go out so early in the morning without taking me along?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “behold” for each occurrence of the Greek discourse marker ἰδοὺ.
    reason: lexical_alternative
  - marker: b
    text: The Greek text in this verse is narratively awkward, with rapid shifts between
      the two elders (“one” and “the other”). The translation preserves the sequence
      without smoothing away the source’s abruptness.
    reason: textual_variant
lexical_decisions:
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: Rendered with a natural but still vivid discourse marker in modern English.
    Repeated twice in the verse, it signals sudden notice rather than merely supplying
    information.
- source_word: κατὰ τὸ εἰωθὸς
  chosen: as usual
  alternatives:
  - according to custom
  - as was her habit
  lexicon: BDAG
  rationale: This idiom indicates customary practice. 'As usual' is concise modern
    English that preserves the sense of regular habit.
- source_word: περιεπάτει
  chosen: was walking about
  alternatives:
  - was walking
  - was strolling
  lexicon: BDAG
  rationale: The imperfect suggests ongoing action, and the compound verb can imply
    movement around the area rather than a single step or simple departure.
- source_word: πρεσβυτέρων
  chosen: elders
  alternatives:
  - older men
  lexicon: BDAG
  rationale: In Susanna these are the recognized older leaders/judges of the community,
    so 'elders' best preserves both age and office.
- source_word: ἐλληλύθει
  chosen: had come
  alternatives:
  - had arrived
  - had gone
  lexicon: BDAG
  rationale: Pluperfect of ἔρχομαι, indicating prior arrival relative to the next
    action. 'Had come' fits the narrative sequence.
- source_word: παρεγένετο
  chosen: arrived
  alternatives:
  - came up
  - appeared
  lexicon: BDAG
  rationale: Marks the second elder's arrival on the scene. 'Arrived' is clear and
    idiomatic.
- source_word: ἀνέκρινε
  chosen: questioned
  alternatives:
  - examined
  - interrogated
  - asked
  lexicon: BDAG
  rationale: The verb can mean examine or question. Here it introduces direct speech
    between the two men; 'questioned' preserves the probing tone without overstating
    formal judicial procedure.
- source_word: ὄρθρου
  chosen: so early in the morning
  alternatives:
  - at dawn
  - early
  lexicon: BDAG
  rationale: The genitive refers to early morning/dawn. The fuller English phrase
    fits the conversational question and makes the temporal sense explicit.
- source_word: παραλαβὼν με
  chosen: without taking me along
  alternatives:
  - without taking me with you
  - without picking me up
  lexicon: BDAG
  rationale: παραλαμβάνω here means taking someone along as a companion. 'Taking me
    along' is natural English and preserves the implied expectation of going together.
