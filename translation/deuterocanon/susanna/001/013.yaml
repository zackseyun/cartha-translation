translation:
  text: And each confessed his anguish to the other.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And they confessed to one another, each his own distress.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξωμολογήσαντο
  chosen: confessed
  alternatives:
  - admitted
  - disclosed
  - acknowledged openly
  lexicon: BDAG
  rationale: The middle verb here conveys open acknowledgment to one another. 'Confessed'
    preserves the sense of candid disclosure without over-paraphrasing. In context
    the content is their inward distress/desire, not a formal liturgical confession,
    but 'confessed' still best matches the reciprocal candor of πρὸς ἀλλήλους.
- source_word: πρὸς ἀλλήλους
  chosen: to the other
  alternatives:
  - to one another
  - to each other
  lexicon: BDAG
  rationale: The phrase is reciprocal. Because ἑκάτερος immediately follows ('each
    of the two'), 'to the other' fits the two-person setting neatly in English and
    avoids redundancy while preserving reciprocity.
- source_word: ἑκάτερος
  chosen: each
  alternatives:
  - each of the two
  - both
  lexicon: BDAG
  rationale: Ἑκάτερος specifically refers to each of two persons. 'Each' is concise
    and natural in English; the two-person sense is already clear from the reciprocal
    construction.
- source_word: τὴν ὀδύνην
  chosen: anguish
  alternatives:
  - pain
  - distress
  - torment
  lexicon: BDAG
  rationale: Ὀδύνη denotes severe pain or distress. In this narrative context it refers
    to the torment of illicit desire rather than physical pain. 'Anguish' captures
    strong inward suffering without importing a more specific psychological category.
- source_word: αὐτοῦ
  chosen: his own
  alternatives:
  - his
  - of him
  lexicon: BDAG
  rationale: The genitive/pronominal possessive marks that each man disclosed his
    own anguish. 'His own' makes the distributive force explicit in idiomatic English.
