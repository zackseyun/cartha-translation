translation:
  text: and legal cases came to them from other cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judgments were coming to them from other cities.' The Greek κρίσεις
      can denote judicial decisions or the cases brought for judgment; here it is
      rendered 'legal cases' to make the courtroom sense explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρχοντο
  chosen: were coming
  alternatives:
  - came
  - would come
  lexicon: BDAG
  rationale: Imperfect middle/passive of ἔρχομαι indicates ongoing or customary action
    in past time. 'Were coming' preserves the durative sense better than simple past
    'came.'
- source_word: κρίσεις
  chosen: legal cases
  alternatives:
  - judgments
  - cases
  - lawsuits
  lexicon: LSJ
  rationale: In this context, with matters coming from other cities to appointed elders/judges,
    κρίσεις refers not merely to abstract 'judgments' but to judicial matters brought
    for decision. 'Legal cases' communicates the forensic sense clearly in modern
    English.
- source_word: ἐξ ἄλλων πόλεων
  chosen: from other cities
  alternatives:
  - out of other cities
  - from other towns
  lexicon: LSJ
  rationale: A straightforward spatial source phrase. 'Cities' is the normal rendering
    of πόλεων and fits the administrative/judicial setting.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - before them
  - to these men
  lexicon: BDAG
  rationale: πρός with accusative can indicate movement toward persons. Since the
    subject is cases coming for adjudication, 'to them' is natural English. 'Before
    them' is possible and slightly more formal/judicial, but 'to them' stays closer
    to the Greek movement expression.
