translation:
  text: Then the elders and judges stood up and laid their hands on her head.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναστάντες
  chosen: stood up
  alternatives:
  - rose
  - having stood up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι, here introducing the next action in narrative
    sequence. 'Stood up' is natural modern English and preserves the physical/judicial
    action without over-formalizing the participle.
- source_word: οἱ πρεσβύτεροι
  chosen: the elders
  alternatives:
  - the older men
  lexicon: BDAG
  rationale: In this context πρεσβύτεροι refers to recognized community leaders rather
    than merely men advanced in age. 'Elders' best matches the social-judicial role
    in the story.
- source_word: κριταὶ
  chosen: judges
  alternatives:
  - magistrates
  lexicon: BDAG
  rationale: κριταί denotes those acting in a judicial capacity. 'Judges' is the most
    direct and readable rendering in English.
- source_word: ἐπέθηκαν
  chosen: laid
  alternatives:
  - placed
  - put
  lexicon: BDAG
  rationale: The verb ἐπιτίθημι with 'hands' is idiomatically rendered 'lay hands
    on/upon.' 'Laid' preserves the established physical idiom without importing later
    theological associations.
- source_word: τὰς χεῖρας αὐτῶν
  chosen: their hands
  alternatives:
  - the hands of theirs
  lexicon: BDAG
  rationale: Standard possessive rendering of the Greek phrase; natural English while
    remaining formally close.
- source_word: ἐπὶ τῆς κεφαλῆς αὐτῆς
  chosen: on her head
  alternatives:
  - upon her head
  lexicon: BDAG
  rationale: A straightforward spatial phrase. 'On her head' is clear modern English;
    'upon' would be more formal but not necessary.
