translation:
  text: But when those from the house heard the outcry in the garden, they rushed
    in through the side door to see what had happened to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the side gate'; the Greek πλαγία θύρα can denote a side entrance,
      and the exact architectural sense is not explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: κραυγή
  chosen: outcry
  alternatives:
  - cry
  - shout
  lexicon: BDAG
  rationale: κραυγή denotes a loud cry or outcry. 'Outcry' fits the urgent public
    alarm implied by the scene better than the more neutral 'cry' or 'shout'.
- source_word: παράδεισος
  chosen: garden
  alternatives:
  - park
  - orchard
  - paradise
  lexicon: LSJ
  rationale: In Susanna the setting is the enclosed garden/orchard attached to the
    house. Although παράδεισος can be rendered 'paradise,' here the narrative context
    clearly refers to a physical garden.
- source_word: οἱ ἐκ τῆς οἰκίας
  chosen: those from the house
  alternatives:
  - the household
  - those in the house
  - the people of the house
  lexicon: LSJ
  rationale: The phrase identifies persons belonging to or coming from the house without
    specifying exact status. 'Those from the house' preserves that breadth and avoids
    over-specifying servants or family members.
- source_word: εἰσεπήδησαν
  chosen: rushed in
  alternatives:
  - sprang in
  - burst in
  - leaped in
  lexicon: LSJ
  rationale: The verb conveys sudden, forceful movement inward. 'Rushed in' is natural
    modern English and preserves the urgency without sounding overly literal or awkward.
- source_word: πλαγία θύρα
  chosen: side door
  alternatives:
  - side gate
  - lateral door
  lexicon: LSJ
  rationale: θύρα is 'door' or 'gate,' and πλαγία means 'side' or 'lateral.' Given
    a house-garden setting, 'side door' is the most straightforward rendering, though
    'side gate' is possible depending on how the entrance to the garden is envisioned.
- source_word: τὸ συμβεβηκὸς αὐτῇ
  chosen: what had happened to her
  alternatives:
  - what had befallen her
  - what had occurred to her
  lexicon: BDAG
  rationale: The perfect participle of συμβαίνω refers to the event that has happened.
    'What had happened to her' is idiomatic and preserves the dative αὐτῇ as indicating
    the event's relation to Susanna.
