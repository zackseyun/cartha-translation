translation:
  text: And the lawless men ordered her to be uncovered, so that they might satisfy
    their desire for her beauty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that they might have their fill of desire for her beauty'; the Greek
      literally speaks of being 'filled' with desire in relation to her beauty.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέταξαν
  chosen: ordered
  alternatives:
  - commanded
  - gave orders
  lexicon: BDAG
  rationale: Aorist active of προστάσσω denotes issuing an authoritative command.
    'Ordered' is natural modern English and preserves the force without sounding overly
    formal.
- source_word: οἱ παράνομοι
  chosen: the lawless men
  alternatives:
  - the wicked men
  - the transgressors
  - the lawless ones
  lexicon: LSJ
  rationale: The adjective παράνομος means 'lawless' or 'contrary to law.' Because
    the referents are the two elders, 'men' is supplied in English for clarity. 'Lawless'
    preserves the legal-moral force better than the broader 'wicked.'
- source_word: ἀποκαλύψαι αὐτήν
  chosen: her to be uncovered
  alternatives:
  - to uncover her
  - to expose her
  lexicon: BDAG
  rationale: ἀποκαλύπτω literally means 'uncover' or 'reveal.' In context it refers
    to removing her covering/veil before the assembly. The passive-style English 'her
    to be uncovered' reflects the infinitive construction after 'ordered' and avoids
    implying more than the text states.
- source_word: ἵνα ἐμπλησθῶσιν
  chosen: so that they might satisfy
  alternatives:
  - so that they might be filled
  - so that they might have their fill
  lexicon: BDAG
  rationale: ἐμπίμπλημι literally means 'fill, satisfy.' With the genitive phrase
    that follows, the sense is that they sought satiation of lustful desire by looking
    at her beauty. 'Satisfy' communicates the idiomatic force in readable English.
- source_word: τοῦ κάλλους
  chosen: her beauty
  alternatives:
  - the beauty
  - her loveliness
  lexicon: LSJ
  rationale: κάλλος denotes beauty or physical attractiveness. Because αὐτῆς follows
    and modifies the phrase, 'her beauty' is the most direct rendering.
- source_word: ἐπιθυμίας αὐτῆς
  chosen: their desire for her beauty
  alternatives:
  - their lust for her beauty
  - desire because of her beauty
  lexicon: BDAG
  rationale: ἐπιθυμία can mean desire, craving, or lust. In this context the desire
    is clearly illicit and sexual, but 'desire' in the main text preserves the lexical
    breadth while the context makes its moral character plain. The genitive construction
    is awkward literally; rendering the whole phrase as 'their desire for her beauty'
    best captures the sense.
