theological_decisions:
- issue: Moral characterization of οἱ παράνομοι
  chosen_reading: the lawless men
  alternative_readings:
  - the wicked men
  - the lawless ones
  rationale: The text morally condemns the elders with a term that also carries legal
    overtones. 'Lawless men' preserves both dimensions without importing extra theological
    interpretation.
  doctrine_reference: DOCTRINE.md § Translation philosophy, consistency of key terms/documented
    exception
- issue: Strength of ἐπιθυμία in context
  chosen_reading: desire
  alternative_readings:
  - lust
  rationale: The context makes the desire sexually corrupt, but the Greek noun itself
    can range from desire to lust. The main text keeps the broader lexical value while
    the rationale documents the contextual force.
  doctrine_reference: DOCTRINE.md § Translation philosophy, preserve theological tension
    rather than resolve it
