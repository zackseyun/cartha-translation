translation:
  text: And the Lord heard her voice.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰσήκουσεν
  chosen: heard
  alternatives:
  - listened to
  - heard favorably
  - answered
  lexicon: BDAG
  rationale: The verb εἰσακούω commonly means to hear or listen to, often with the
    nuance of hearing favorably or in response to a plea. In English, 'heard' is the
    most natural rendering here and preserves the narrative simplicity; 'answered'
    would over-interpret, since the verse states hearing, not yet the form of response.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - the LORD
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος defaults to 'Lord.' In this deuterocanonical
    Greek narrative, 'Lord' appropriately renders the divine title without importing
    the specific small-caps convention used for YHWH in Hebrew contexts.
- source_word: φωνῆς
  chosen: voice
  alternatives:
  - cry
  - appeal
  lexicon: BDAG
  rationale: φωνή literally means 'voice' or 'sound.' Because the Greek explicitly
    says 'her voice,' the formal element should be preserved. 'Cry' would bring out
    the prayer context but is less literal and not required by the wording.
