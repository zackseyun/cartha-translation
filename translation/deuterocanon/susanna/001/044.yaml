theological_decisions:
- issue: Whether to make explicit that God responded favorably to Susanna's prayer
  chosen_reading: Render the clause as 'the Lord heard her voice' without expanding
    to 'answered her prayer.'
  alternative_readings:
  - the Lord listened to her
  - the Lord answered her cry
  rationale: The Greek states that the Lord heard her voice. While the idiom can imply
    favorable hearing, the text itself does not yet specify the mode of divine response.
    Preserving the simpler wording maintains the narrative's theological restraint.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Rendering κύριος in a deuterocanonical Greek context
  chosen_reading: Use 'Lord' rather than 'the LORD.'
  alternative_readings:
  - the LORD
  rationale: The source text is Greek and uses Κύριος. The project's contested-terms
    guidance sets the default as 'Lord.' Using 'the LORD' would suggest a direct Hebrew
    divine-name representation not explicit in this witness.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
