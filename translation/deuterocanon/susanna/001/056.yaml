theological_decisions:
- issue: Force of Daniel's denunciation in 'Seed of Canaan and not Judah'
  chosen_reading: Retain the genealogical/metaphorical insult literally rather than
    paraphrasing it as merely 'you act like a Canaanite.'
  alternative_readings:
  - You offspring of Canaan, not Judah
  - You are of Canaan's seed, not Judah's
  rationale: The Greek presents a direct denunciation using lineage language. Keeping
    it literal preserves the text's rhetorical and covenantal contrast without softening
    it into a generalized moral comment.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Moral nuance of ἐπιθυμία
  chosen_reading: Render as 'desire' in the main text rather than 'lust.'
  alternative_readings:
  - lust
  rationale: The context clearly implies wrongful sexual desire, but the source term
    itself is broader. 'Desire' preserves source-level wording while the surrounding
    rebuke supplies the negative moral force.
  doctrine_reference: Translation philosophy §§1, 6
