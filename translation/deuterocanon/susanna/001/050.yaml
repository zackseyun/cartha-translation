theological_decisions:
- issue: Meaning of God giving Daniel τὸ πρεσβεῖον
  chosen_reading: God has granted Daniel honored authority/senior standing recognized
    by the assembly, not literal old age.
  alternative_readings:
  - God has given you eldership
  - God has given you preeminence
  rationale: Within Susanna, Daniel is presented as young yet divinely endowed with
    wisdom and authority. Rendering τὸ πρεσβεῖον as 'senior standing' preserves the
    irony and social-juridical force without creating the false impression that the
    text claims Daniel is elderly.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
