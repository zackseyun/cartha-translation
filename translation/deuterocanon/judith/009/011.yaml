id: JDT.9.11
reference: Judith 9:11
source:
  edition: lxx-swete-1909
  text: οὐ γὰρ ἐν πλήθει τὸ κράτος σου, οὐδὲ ἡ δυναστεία σου ἐν ἰσχύουσιν, ἀλλὰ ταπεινῶν
    εἶ θεός, ἐλαττόνων εἶ βοηθός, ἀντιλήμπτωρ ἀσθενούντων, ἀπεγνωσμένων σκεπαστής,
    ἀπηλπισμένων σωτήρ.
  language: Greek
  pages:
