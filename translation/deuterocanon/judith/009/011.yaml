translation:
  text: For your power is not in a multitude, nor is your dominion among the strong;
    rather, you are God of the lowly, helper of the lesser, supporter of the weak,
    shelter of the forsaken, savior of those without hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the desperate' for 'the forsaken'; the Greek can denote people given
      up for lost or in despair.
    reason: lexical_alternative
  - marker: b
    text: Or 'deliverer' for 'savior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλήθει
  chosen: a multitude
  alternatives:
  - numbers
  - great multitude
  lexicon: LSJ
  rationale: πλῆθος commonly denotes a multitude or large number. 'A multitude' preserves
    the concrete sense without over-specifying military numbers.
- source_word: κράτος
  chosen: power
  alternatives:
  - might
  - strength
  lexicon: LSJ
  rationale: κράτος refers to strength or power exercised in rule. 'Power' is natural
    English here and pairs well with the following clause about dominion.
- source_word: δυναστεία
  chosen: dominion
  alternatives:
  - rule
  - lordship
  - sovereignty
  lexicon: LSJ
  rationale: δυναστεία denotes lordship, dominion, or ruling power. 'Dominion' best
    reflects political authority in elevated but still readable English.
- source_word: ἐν ἰσχύουσιν
  chosen: among the strong
  alternatives:
  - in the mighty
  - with those who are strong
  lexicon: LSJ
  rationale: The dative plural participle ἰσχύουσιν means 'those who are strong/powerful.'
    'Among the strong' gives idiomatic English corresponding to the Greek construction.
- source_word: ταπεινῶν
  chosen: the lowly
  alternatives:
  - the humble
  - the afflicted
  lexicon: LSJ
  rationale: ταπεινός can mean lowly, humble, or brought low. 'The lowly' fits the
    social and vulnerable register of the surrounding terms better than the more inward
    'humble.'
- source_word: ἐλαττόνων
  chosen: the lesser
  alternatives:
  - the least
  - the smaller
  - the insignificant
  lexicon: LSJ
  rationale: ἐλάττων means lesser or smaller. 'The lesser' preserves the comparative
    nuance without forcing a superlative like 'the least.'
- source_word: βοηθός
  chosen: helper
  alternatives:
  - help
  - ally
  lexicon: LSJ
  rationale: As a predicate noun, βοηθός means helper or one who comes to aid. 'Helper'
    is the clearest nominal rendering.
- source_word: ἀντιλήμπτωρ
  chosen: supporter
  alternatives:
  - protector
  - defender
  - one who upholds
  lexicon: LSJ
  rationale: This rare noun conveys one who takes hold in support or comes to another's
    aid. 'Supporter' preserves the image of upholding and avoids collapsing it into
    the next term's sheltering sense.
- source_word: ἀσθενούντων
  chosen: the weak
  alternatives:
  - the sick
  - those who are feeble
  lexicon: LSJ
  rationale: ἀσθενέω can denote weakness, sickness, or incapacity. In this chain of
    vulnerable groups, 'the weak' is broad and contextually fitting.
- source_word: ἀπεγνωσμένων
  chosen: the forsaken
  alternatives:
  - the desperate
  - those in despair
  lexicon: LSJ
  rationale: From ἀπογινώσκω/ἀπεγνωσμένος, the sense is those who are despaired of
    or given up for lost. 'The forsaken' captures the passive nuance better than merely
    describing their inner feeling.
- source_word: σκεπαστής
  chosen: shelter
  alternatives:
  - protector
  - covering
  - defender
  lexicon: LSJ
  rationale: σκεπαστής is one who covers or shelters. Rendering it as 'the shelter
    of' keeps the metaphor vivid and distinct from 'helper' and 'supporter.'
- source_word: ἀπηλπισμένων
  chosen: those without hope
  alternatives:
  - the hopeless
  - those in despair
  lexicon: LSJ
  rationale: ἀπηλπισμένων denotes those who have lost hope. 'Those without hope' is
    more precise and less absolute-sounding in English than 'the hopeless.'
- source_word: σωτήρ
  chosen: savior
  alternatives:
  - deliverer
  - rescuer
  lexicon: LSJ
  rationale: σωτήρ straightforwardly means savior or deliverer. 'Savior' is the most
    direct rendering and suits the prayer's theological register.
