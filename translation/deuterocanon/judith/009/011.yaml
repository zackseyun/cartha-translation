theological_decisions:
- issue: Whether to render the sequence of divine predicates in a more interpretive
    devotional style or preserve the terse nominal chain of the Greek.
  chosen_reading: 'Preserved the compact predicate structure: ''you are the God of
    the lowly ... the savior of those without hope.'''
  alternative_readings:
  - Expanded paraphrase such as 'you help the humble and save the hopeless'
  rationale: The Greek stacks titles and descriptions of God in a litany-like form.
    Keeping that structure preserves the rhetoric and avoids importing explanatory
    theology not explicit in the text.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve theological tension
    rather than resolve it; do not paraphrase beyond the source text.'
