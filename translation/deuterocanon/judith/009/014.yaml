theological_decisions:
- issue: Divine exclusivity in Israel's defense
  chosen_reading: there is no other who defends the people of Israel except you
  alternative_readings:
  - there is no other protector of the race of Israel but you alone
  rationale: The Greek makes an exclusive claim about God's unique role as defender
    of Israel. The translation preserves that exclusivity without expanding it into
    a broader doctrinal statement beyond the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
