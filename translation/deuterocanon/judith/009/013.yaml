theological_decisions:
- issue: Retention of Judith's request that her deceit be used by God
  chosen_reading: Translate ἀπάτην directly as 'deceit' in the main text
  alternative_readings:
  - deception
  - guile
  rationale: The verse explicitly asks God to use Judith's deceptive speech as an
    instrument against the enemy. The translation should not soften or moralize away
    this tension; the text itself presents it plainly.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Rendering of διαθήκη
  chosen_reading: covenant
  alternative_readings:
  - pact
  rationale: This preserves the biblical-theological force of Israel's relationship
    with God rather than reducing it to a generic agreement.
  doctrine_reference: DOCTRINE.md §Contested terms / covenantal usage principles
