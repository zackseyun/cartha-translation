translation:
  text: And give my word and deceit for their wound and bruise, they who have devised
    harsh things against your covenant and your sanctified house and the summit of
    Zion and the house possessed by your sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my speech and deception into injury and bruise for them.' The Greek
      wording is compact and may emphasize either the means Judith uses or the result
      inflicted on her enemies.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the house possessed by your sons' is difficult. It may mean
      'the dwelling/inheritance of your sons,' referring to the land or sanctuary
      belonging to God's people.
    reason: alternative_reading
lexical_decisions:
- source_word: δὸς
  chosen: give
  alternatives:
  - grant
  - make
  lexicon: LSJ
  rationale: A direct imperative to God. 'Give' preserves the concrete force of the
    Greek better than a more interpretive 'grant'.
- source_word: λόγον μου
  chosen: my word
  alternatives:
  - my speech
  - my plan
  lexicon: LSJ
  rationale: λόγος can mean word, speech, or account. In context Judith asks that
    her spoken approach be made effective; 'my word' keeps the Greek's lexical breadth
    without over-interpreting it as merely 'speech' or 'plan'.
- source_word: ἀπάτην
  chosen: deceit
  alternatives:
  - deception
  - guile
  lexicon: LSJ
  rationale: The noun denotes deception or trickery. 'Deceit' is concise and preserves
    the morally charged term without softening Judith's stratagem.
- source_word: εἰς τραῦμα καὶ μώλωπα
  chosen: for their wound and bruise
  alternatives:
  - into wound and welt
  - to become injury and blow
  lexicon: LSJ
  rationale: εἰς marks result or purpose. τραῦμα and μώλωψ are paired injury terms;
    'wound and bruise' is natural English that preserves the double image of inflicted
    harm.
- source_word: ἐβουλεύσαντο σκληρά
  chosen: have devised harsh things
  alternatives:
  - have plotted cruel things
  - have taken hard counsel
  lexicon: LSJ
  rationale: βουλεύομαι here means to plan or devise; σκληρά literally 'hard things,'
    idiomatically severe or cruel actions. 'Have devised harsh things' stays close
    to the Greek while remaining readable.
- source_word: διαθήκης σου
  chosen: your covenant
  alternatives:
  - your pact
  lexicon: LSJ
  rationale: In biblical-religious context διαθήκη is best rendered 'covenant,' preserving
    its theological resonance.
- source_word: οἴκου ἡγιασμένου σου
  chosen: your sanctified house
  alternatives:
  - your holy house
  - your consecrated house
  lexicon: LSJ
  rationale: The perfect passive participle ἡγιασμένου emphasizes the house as made
    holy. 'Sanctified house' preserves that verbal nuance more explicitly than the
    simpler adjective 'holy'.
- source_word: κορυφῆς Σιὼν
  chosen: the summit of Zion
  alternatives:
  - the height of Zion
  - Mount Zion's peak
  lexicon: LSJ
  rationale: κορυφή denotes top, summit, or peak. 'Summit of Zion' is a transparent
    rendering of the image.
- source_word: οἴκου κατασχέσεως υἱῶν σου
  chosen: the house possessed by your sons
  alternatives:
  - the house of possession of your sons
  - the dwelling held by your sons
  - the inheritance-house of your sons
  lexicon: LSJ
  rationale: κατάσχεσις involves possession or holding. The phrase is difficult, but
    a literal rendering best preserves auditability. It likely refers to the dwelling/inheritance
    belonging to God's people; this is preserved in a footnote as an alternative explanation.
