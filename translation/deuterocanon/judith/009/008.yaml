id: JDT.9.8
reference: Judith 9:8
source:
  edition: lxx-swete-1909
  text: Κύριος ὄνομά σοι· σὺ ῥάξον αὐτῶν τὴν ἰσχὺν ἐν δυνάμει σου, καὶ κατάξον τὸ
    κράτος αὐτῶν ἐν τῷ θυμῷ σου· ἐβουλεύσαντο γὰρ βεβηλῶσαι τὰ ἅγιά σου, μιᾶναι τὸ
    σκήνωμα τῆς καταπαύσεως τοῦ ὀνόματος τῆς δόξης σου, καταβαλεῖν σιδήρῳ κέρας θυσιαστηρίου
    σου.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 812
  - 813
  - 814
  - 815
  - 816
  - 817
  - 818
  - 819
  confidence: high
  validation: minor_mismatch
translation:
  text: Lord is your name; you, shatter their strength by your power, and break down
    their might in your wrath; for they planned to profane your holy things, to defile
    the tabernacle where your glorious name rests, and to strike down with the sword
    the horn of your altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'with iron.' The Greek likely uses 'iron' as a metonym
      for an iron weapon, hence 'with the sword' in the main text.
    reason: lexical_alternative
  - marker: b
    text: '''Your holy things'' may refer broadly to sacred objects or holy precincts,
      not only to the sanctuary building itself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a divine title.
    Here it functions as a direct address/title for God, not a personal name.
- source_word: ὄνομά σοι
  chosen: is your name
  alternatives:
  - is your renown
  - is your title
  lexicon: LSJ
  rationale: The idiom is literally 'name to you'; 'is your name' preserves the Hebrew/Greek-style
    predication without over-paraphrasing.
- source_word: ῥάξον
  chosen: shatter
  alternatives:
  - break
  - smash
  lexicon: LSJ
  rationale: An aorist imperative calling for violent breaking. 'Shatter' conveys
    the force better than the more generic 'break'.
- source_word: ἰσχὺν
  chosen: strength
  alternatives:
  - force
  - power
  lexicon: LSJ
  rationale: Refers to their effective strength; 'strength' is the most natural and
    sufficiently broad rendering in context.
- source_word: κατάξον
  chosen: break down
  alternatives:
  - destroy
  - bring low
  lexicon: LSJ
  rationale: Chosen to distinguish it from ῥάξον while preserving the sense of crushing
    or breaking apart.
- source_word: κράτος
  chosen: might
  alternatives:
  - dominion
  - power
  lexicon: LSJ
  rationale: In parallel with ἰσχύς, it denotes forceful power. 'Might' keeps the
    poetic parallelism without implying political rule as strongly as 'dominion'.
- source_word: θυμῷ
  chosen: wrath
  alternatives:
  - anger
  - fury
  lexicon: LSJ
  rationale: In prayer language directed to God, 'wrath' appropriately conveys judicial
    anger with elevated but still readable diction.
- source_word: βεβηλῶσαι
  chosen: to profane
  alternatives:
  - to desecrate
  lexicon: LSJ
  rationale: A cultic verb for treating sacred things as common. 'Profane' preserves
    that sacred/common contrast well.
- source_word: τὰ ἅγιά σου
  chosen: your holy things
  alternatives:
  - your sanctuary
  - your sacred things
  lexicon: LSJ
  rationale: The plural neuter naturally refers broadly to sacred things/holy places.
    'Your holy things' stays close to the Greek and avoids prematurely narrowing the
    reference.
- source_word: μιᾶναι
  chosen: to defile
  alternatives:
  - to pollute
  lexicon: LSJ
  rationale: Standard cultic rendering; clear and natural in English.
- source_word: τὸ σκήνωμα τῆς καταπαύσεως
  chosen: the tabernacle where ... rests
  alternatives:
  - the dwelling place of rest
  - the resting place
  lexicon: LSJ
  rationale: σκήνωμα is a dwelling/tabernacle, and καταπαύσεως denotes resting place.
    Rendering the phrase as 'the tabernacle where your glorious name rests' preserves
    both ideas in idiomatic English.
- source_word: τοῦ ὀνόματος τῆς δόξης σου
  chosen: your glorious name
  alternatives:
  - the name of your glory
  - your name of glory
  lexicon: LSJ
  rationale: A literal rendering would sound awkward in English. 'Your glorious name'
    captures the genitival relationship naturally while preserving the theological
    weight of divine glory.
- source_word: καταβαλεῖν
  chosen: to strike down
  alternatives:
  - to cast down
  - to bring down
  lexicon: LSJ
  rationale: In context of weaponry and attack on the altar, 'strike down' best conveys
    violent overthrow.
- source_word: σιδήρῳ
  chosen: with the sword
  alternatives:
  - with iron
  lexicon: LSJ
  rationale: Although literally 'with iron,' in martial contexts this commonly stands
    metonymically for an iron weapon, especially a sword. 'With the sword' makes the
    sense explicit for modern readers.
- source_word: κέρας θυσιαστηρίου σου
  chosen: the horn of your altar
  alternatives:
  - the horn of your sacrificial altar
  lexicon: LSJ
  rationale: A technical cultic feature of the altar. 'Horn of your altar' is the
    standard transparent rendering and should be preserved rather than generalized.
