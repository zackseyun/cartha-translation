theological_decisions:
- issue: Cultic terminology for sacred space and objects
  chosen_reading: Retain concrete sanctuary language ('holy things,' 'tabernacle,'
    'horn of your altar')
  alternative_readings:
  - Generalized renderings such as 'sanctuary' or 'holy place' throughout
  rationale: The verse emphasizes specific sacred objects and spaces under threat.
    Preserving the concrete cultic imagery avoids flattening the prayer's theological
    intensity.
  doctrine_reference: DOCTRINE.md §§1, 5, 6
