translation:
  text: For you made those things before them, and those things and the things afterward
    and the things now and the things to come you planned, and what you planned came
    to be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you considered' / 'you purposed' for 'you planned' (διενοήθης).
    reason: lexical_alternative
  - marker: b
    text: 'The Greek piles up temporal expressions: ''the things before,'' ''those,''
      ''the things afterward,'' ''the things now,'' and ''the things to come,'' stressing
      God''s rule over all times.'
    reason: cultural_note
lexical_decisions:
- source_word: σὺ γὰρ
  chosen: For you
  alternatives:
  - For indeed you
  - Because you
  lexicon: BDAG
  rationale: γάρ gives the reason for the prayer's appeal; 'For you' is natural English
    and preserves the causal force with emphatic second-person subject.
- source_word: ἐποίησας
  chosen: made
  alternatives:
  - did
  - created
  lexicon: BDAG
  rationale: ποιέω here denotes bringing about or making. 'Made' is broad and fits
    the sequence of divine action without importing the stronger creation term if
    not required.
- source_word: τὰ πρότερα ἐκείνων
  chosen: those things before them
  alternatives:
  - the former things before those
  - the things earlier than those
  lexicon: BDAG
  rationale: The phrase is somewhat compressed in Greek. πρότερα means earlier/former,
    and ἐκείνων points to 'those things.' 'Those things before them' preserves the
    comparative temporal sense without over-resolving the referent.
- source_word: τὰ μετέπειτα
  chosen: the things afterward
  alternatives:
  - the later things
  - what came later
  lexicon: BDAG
  rationale: μετέπειτα is temporal, referring to what follows. 'The things afterward'
    keeps the parallel structure with the surrounding neuter plural phrases.
- source_word: τὰ νῦν
  chosen: the things now
  alternatives:
  - the present things
  - what is now
  lexicon: BDAG
  rationale: νῦν marks present time. The chosen rendering preserves the rhythmic catalog
    of past, present, and future.
- source_word: τὰ ἐπερχόμενα
  chosen: the things to come
  alternatives:
  - the coming things
  - what is coming
  lexicon: BDAG
  rationale: ἐπερχόμενα refers to what is approaching or future. 'The things to come'
    is idiomatic and preserves the temporal scope.
- source_word: διενοήθης
  chosen: you planned
  alternatives:
  - you considered
  - you purposed
  - you devised
  lexicon: BDAG
  rationale: διανοέομαι can mean think through, intend, or purpose. In context of
    divine sovereignty over all times, 'planned' best conveys deliberate intention
    leading to fulfillment.
- source_word: ἐγενήθησαν
  chosen: came to be
  alternatives:
  - happened
  - came about
  - were made
  lexicon: BDAG
  rationale: γίνομαι here indicates that what God intended became reality. 'Came to
    be' preserves the resultative sense without narrowing it to mere event or explicit
    creation.
- source_word: ἃ ἐνενοήθης
  chosen: what you planned
  alternatives:
  - what you intended
  - what you conceived
  lexicon: BDAG
  rationale: The relative clause refers back to God's prior thought or intention.
    Repeating 'planned' gives coherent English and reflects the semantic overlap with
    διενοήθης.
