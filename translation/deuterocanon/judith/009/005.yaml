theological_decisions:
- issue: Divine foreknowledge and sovereignty language in the sequence of past, present,
    and future
  chosen_reading: Render the verbs in terms of God's making and planning across all
    times without adding philosophical terminology.
  alternative_readings:
  - Translate more abstractly as 'you understood' rather than 'you planned'
  - Translate ἐποίησας as 'created' to stress creation theology
  rationale: The verse emphasizes God's intentional governance over what was before,
    after, now, and coming. 'Planned' captures purposive divine thought better than
    a merely cognitive 'understood,' while avoiding later systematic-theology vocabulary
    not explicit in the text. 'Made' is retained rather than 'created' because the
    Greek does not require a technical creation formula here.
  doctrine_reference: Translation philosophy §§1, 3, 6
