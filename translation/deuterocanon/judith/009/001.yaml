translation:
  text: But Judith fell on her face, and put ashes on her head, and uncovered the
    sackcloth she had been wearing. And at that very time the evening incense was
    being offered in Jerusalem in the house of God, and Judith cried out with a loud
    voice to the Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'laid bare the sackcloth she had been wearing.' The Greek indicates that
      she exposed the sackcloth rather than necessarily removing it.
    reason: lexical_alternative
  - marker: b
    text: That is, the incense offering appointed for the evening at the Jerusalem
      sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: ἔπεσεν ἐπὶ πρόσωπον
  chosen: fell on her face
  alternatives:
  - fell facedown
  - prostrated herself
  lexicon: LSJ
  rationale: The idiom literally denotes falling upon the face in an act of grief,
    humility, or supplication. 'Fell on her face' preserves the concrete imagery while
    remaining natural English.
- source_word: ἐπέθετο σποδὸν ἐπὶ τὴν κεφαλὴν αὐτῆς
  chosen: put ashes on her head
  alternatives:
  - placed ashes on her head
  lexicon: LSJ
  rationale: A standard mourning gesture. 'Ashes' is the natural English plural for
    the ritual sign, even though Greek has singular σποδόν.
- source_word: ἐγύμνωσεν ὃν ἐνεδεδύκει σάκκον
  chosen: uncovered the sackcloth she had been wearing
  alternatives:
  - laid bare the sackcloth she was clothed with
  - uncovered the sackcloth garment she wore
  lexicon: LSJ
  rationale: ἐγύμνωσεν means 'laid bare/uncovered.' The clause indicates that the
    sackcloth was already being worn under other clothing and she exposed it. 'Uncovered'
    best fits the action without implying removal of the sackcloth itself.
- source_word: ἦν ἄρτι προσφερόμενον
  chosen: was being offered at that very time
  alternatives:
  - was just then being offered
  - was now being offered
  lexicon: LSJ
  rationale: ἄρτι adds immediacy ('just now/at this very moment'). The periphrastic
    construction with προσφερόμενον is well represented by an English progressive
    passive.
- source_word: εἰς τὸν οἶκον τοῦ θεοῦ
  chosen: in the house of God
  alternatives:
  - at the house of God
  - into the house of God
  - in the temple of God
  lexicon: LSJ
  rationale: Although εἰς can suggest motion toward, with προσφέρω in cultic context
    it can idiomatically mark presentation at the sanctuary. 'In the house of God'
    stays close to the Greek wording and preserves the temple reference without overinterpreting.
- source_word: τὸ θυμίαμα τῆς ἑσπέρας
  chosen: the evening incense
  alternatives:
  - the incense of that evening
  - the evening offering of incense
  lexicon: LSJ
  rationale: θυμίαμα is specifically incense, not a general sacrifice. 'Evening incense'
    is concise and clear, reflecting the genitive τῆς ἑσπέρας.
- source_word: ἐβόησεν φωνῇ μεγάλῃ
  chosen: cried out with a loud voice
  alternatives:
  - shouted loudly
  - called out with a great voice
  lexicon: LSJ
  rationale: This is a common emphatic expression for urgent prayer or appeal. 'Cried
    out with a loud voice' preserves both the verbal force and the explicit phrase
    φωνῇ μεγάλῃ.
- source_word: πρὸς Κύριον
  chosen: to the Lord
  alternatives:
  - to Lord
  lexicon: LSJ
  rationale: Following project doctrine, κύριος is rendered 'Lord.' The preposition
    πρὸς here marks the direction of her prayer.
