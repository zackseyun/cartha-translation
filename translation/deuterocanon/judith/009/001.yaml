theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's contested-terms guidance sets κύριος to 'Lord' by default.
    In this prayer context it denotes God as the one addressed in worship.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Cultic setting of οἶκος τοῦ θεοῦ
  chosen_reading: house of God
  alternative_readings:
  - temple of God
  rationale: The phrase refers to the Jerusalem sanctuary, but the Greek wording is
    literally 'house of God.' Retaining that wording preserves the text's diction
    while still clearly indicating the cultic setting.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
