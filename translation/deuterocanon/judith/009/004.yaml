theological_decisions:
- issue: Gendered familial term in υἱῶν ἠγαπημένων ὑπὸ σοῦ
  chosen_reading: the sons beloved by you
  alternative_readings:
  - your beloved children
  - your beloved people
  rationale: Per translation philosophy, gender-accurate renderings are preferred
    where the source is explicitly masculine. The text says 'sons,' not a gender-neutral
    collective.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Cognate zeal expression ἐζήλωσαν τὸν ζῆλόν σου
  chosen_reading: were zealous with your zeal
  alternative_readings:
  - were jealous with your jealousy
  - burned with zeal for you
  rationale: The wording preserves theological tension by keeping the cognate emphasis
    rather than flattening it into a generic statement of devotion. It reflects participation
    in God's own zeal without overinterpreting the phrase.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
