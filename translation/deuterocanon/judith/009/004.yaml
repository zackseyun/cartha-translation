translation:
  text: And you gave their wives as plunder, and their daughters into captivity, and
    all their spoils for division among the sons beloved by you, who also were zealous
    with your zeal and abhorred the defilement of their blood and called on you for
    help. O God, my God, hear me, the widow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your beloved sons.' The Greek is literally 'sons beloved by you.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the defilement of their blood' may also be rendered 'their blood-pollution';
      it refers to blood as a source of ritual or moral impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: προνομὴν
  chosen: plunder
  alternatives:
  - spoil
  - prey
  lexicon: LSJ
  rationale: The noun denotes booty taken in war. 'Plunder' is natural modern English
    and fits the parallel with σκῦλα.
- source_word: αἰχμαλωσίαν
  chosen: captivity
  alternatives:
  - captives
  - exile
  lexicon: LSJ
  rationale: The phrase εἰς αἰχμαλωσίαν idiomatically means 'into captivity.' This
    preserves the resultative sense without overparaphrase.
- source_word: σκῦλα
  chosen: spoils
  alternatives:
  - booty
  - plunder
  lexicon: LSJ
  rationale: A standard military term for goods seized in war. 'Spoils' keeps the
    distributive sense in the following phrase.
- source_word: διαίρεσιν
  chosen: for division
  alternatives:
  - for distribution
  - to be divided
  lexicon: LSJ
  rationale: The noun emphasizes apportionment. 'For division' stays close to the
    Greek structure while remaining intelligible.
- source_word: υἱῶν ἠγαπημένων ὑπὸ σοῦ
  chosen: the sons beloved by you
  alternatives:
  - your beloved sons
  - the sons loved by you
  lexicon: LSJ
  rationale: The Greek explicitly uses 'sons' and a passive participial expression.
    This preserves the gendered wording and the emphasis on divine favor.
- source_word: ἐζήλωσαν τὸν ζῆλόν σου
  chosen: were zealous with your zeal
  alternatives:
  - were jealous with your jealousy
  - burned with your zeal
  lexicon: LSJ
  rationale: The cognate construction is emphatic. 'Were zealous with your zeal' preserves
    the repetition better than smoothing it away, while avoiding the misleading English
    connotations of 'jealous' here.
- source_word: ἐβδελύξαντο
  chosen: abhorred
  alternatives:
  - detested
  - loathed
  lexicon: LSJ
  rationale: A strong term of revulsion. 'Abhorred' conveys moral and ritual disgust
    appropriate to the context.
- source_word: μίασμα αἵματος αὐτῶν
  chosen: the defilement of their blood
  alternatives:
  - their blood-pollution
  - the pollution of their blood
  lexicon: LSJ
  rationale: μίασμα denotes ritual or moral pollution/defilement. 'Defilement of their
    blood' is somewhat literal but preserves the cultic-moral force and the ambiguity
    of the genitive.
- source_word: ἐπεκαλέσαντό σε εἰς βοήθειαν
  chosen: called on you for help
  alternatives:
  - invoked you for aid
  - appealed to you for help
  lexicon: LSJ
  rationale: A natural rendering of the idiom that retains the prayer/invocation sense.
- source_word: εἰσάκουσον ἐμοῦ
  chosen: hear me
  alternatives:
  - listen to me
  - give heed to me
  lexicon: LSJ
  rationale: Standard prayer language in English; concise and faithful to the imperative
    appeal.
- source_word: τῆς χήρας
  chosen: the widow
  alternatives:
  - me, a widow
  - I who am a widow
  lexicon: LSJ
  rationale: The appositional article-noun is retained directly. 'The widow' preserves
    Judith's self-designation and rhetorical posture in prayer.
