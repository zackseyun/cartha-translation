id: JDT.9.4
reference: Judith 9:4
source:
  edition: lxx-swete-1909
  text: καὶ ἔδωκας γυναῖκας αὐτῶν εἰς προνομὴν καὶ θυγατέρας εἰς αἰχμαλωσίαν καὶ πάντα
    τὰ σκῦλα εἰς διαίρεσιν υἱῶν ἠγαπημένων ὑπὸ σοῦ, οἳ καὶ ἐζήλωσαν τὸν ζῆλόν σου
    καὶ ἐβδελύξαντο μίασμα αἵματος αὐτῶν καὶ ἐπεκαλέσαντό σε εἰς βοήθειαν· ὁ θεὸς
    ὁ θεὸς ἐμός, καὶ εἰσάκουσον ἐμοῦ τῆς χήρας.
  language: Greek
