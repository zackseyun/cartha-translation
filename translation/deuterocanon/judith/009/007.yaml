id: JDT.9.7
reference: Judith 9:7
source:
  edition: lxx-swete-1909
  text: ἰδοὺ γὰρ Ἀσσύριοι ἐπληθύνθησαν ἐν δυνάμει αὐτῶν, ὑψώθησαν ἐφʼ ἵππῳ καὶ ἀναβάτῃ,
    ἐγαυρίασαν ἐν βραχίονι πεζῶν, ἤλπισαν ἐν ἀσπίδι καὶ ἐν γαίσῳ καὶ τόξῳ καὶ σφενδόνῃ,
    καὶ οὐκ ἔγνωσαν ὅτι σὺ εἶ Κύριος συντρίβων πολέμους.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 812
  - 813
  - 814
  - 815
  - 816
  - 817
  - 818
  - 819
  confidence: high
  validation: minor_mismatch
translation:
  text: For behold, the Assyrians have multiplied in their strength; they have been
    exalted with horse and rider; they have boasted in the arm of foot soldiers; they
    have hoped in shield and spear and bow and sling, and they have not known that
    you are the Lord, the one who shatters wars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have trusted in shield and spear and bow and sling.' The Greek verb
      can carry the sense of hoping in or trusting in.
    reason: lexical_alternative
  - marker: b
    text: Or 'who ends wars.' Literally, 'the one who shatters wars.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: For behold
  alternatives:
  - Behold
  - Look
  lexicon: LSJ
  rationale: Retains the emphatic, attention-directing force at the start of the clause;
    'for' reflects γάρ and 'behold' preserves the elevated rhetorical tone of the
    prayer.
- source_word: ἐπληθύνθησαν
  chosen: have multiplied
  alternatives:
  - have increased
  - became many
  lexicon: LSJ
  rationale: The verb denotes increase in number or magnitude. 'Have multiplied' preserves
    the imagery of becoming numerous/augmented without over-interpreting whether the
    increase is numerical, military, or both.
- source_word: ἐν δυνάμει αὐτῶν
  chosen: in their strength
  alternatives:
  - by their power
  - in their might
  lexicon: LSJ
  rationale: A straightforward rendering of δύναμις. 'In their strength' keeps the
    prepositional phrasing of the Greek and fits the sequence of military boasts and
    reliance.
- source_word: ὑψώθησαν
  chosen: have been exalted
  alternatives:
  - have been lifted up
  - have become proud
  lexicon: LSJ
  rationale: The passive verb literally means 'were raised/highened.' In context it
    conveys being elevated or puffed up through military assets. 'Have been exalted'
    preserves the metaphor without collapsing it entirely into an interpretive gloss
    like 'became proud.'
- source_word: ἐφʼ ἵππῳ καὶ ἀναβάτῃ
  chosen: with horse and rider
  alternatives:
  - on horse and rider
  - because of horse and rider
  - in horse and rider
  lexicon: LSJ
  rationale: The phrase points to cavalry power. 'With horse and rider' is idiomatic
    English that preserves the paired military image without awkward literalism.
- source_word: ἐγαυρίασαν
  chosen: have boasted
  alternatives:
  - have exulted
  - have been arrogant
  lexicon: LSJ
  rationale: The verb carries the sense of exulting proudly or vaunting oneself. 'Have
    boasted' best captures the hostile self-confidence in context.
- source_word: ἐν βραχίονι πεζῶν
  chosen: in the arm of foot soldiers
  alternatives:
  - in the strength of infantry
  - in the arm of infantry
  lexicon: LSJ
  rationale: βραχίων is literally 'arm,' often metaphorically strength or force. Keeping
    'arm' preserves the concrete metaphor, while 'foot soldiers' makes πεζῶν clear
    to modern readers.
- source_word: ἤλπισαν
  chosen: have hoped in
  alternatives:
  - have trusted in
  - have relied on
  lexicon: LSJ
  rationale: The verb can mean hope or trust. Because the object is weaponry, 'trusted
    in' is possible, but 'hoped in' stays closer to the Greek while still intelligible
    in a biblical register.
- source_word: ἀσπίδι
  chosen: shield
  alternatives:
  - buckler
  lexicon: LSJ
  rationale: Standard military term for shield; 'buckler' would be too specific and
    archaic.
- source_word: γαίσῳ
  chosen: spear
  alternatives:
  - javelin
  - lance
  lexicon: LSJ
  rationale: The term denotes a spear-like weapon. 'Spear' is the broadest and most
    accessible rendering without unnecessary specificity.
- source_word: σφενδόνῃ
  chosen: sling
  alternatives:
  - slingshot
  lexicon: LSJ
  rationale: Standard ancient weapon term; 'sling' is the natural biblical and historical
    rendering.
- source_word: οὐκ ἔγνωσαν
  chosen: they have not known
  alternatives:
  - they did not know
  - they have not recognized
  lexicon: LSJ
  rationale: The perfective sense can be represented in English as present-result
    perfect. 'Have not known' preserves the solemn tone and the moral-spiritual failure
    implied by the verb.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Per doctrine, κύριος is rendered 'Lord.' The article in Greek supports
    'the Lord' here, identifying God in Judith's prayer.
- source_word: συντρίβων πολέμους
  chosen: the one who shatters wars
  alternatives:
  - who breaks wars
  - who crushes wars
  - who ends wars
  lexicon: LSJ
  rationale: 'The participle is active and descriptive: God is characterized as one
    who breaks/shatters wars. ''Shatters wars'' is vivid, close to the Greek, and
    avoids smoothing into the interpretive ''ends wars,'' though that sense is implied.'
