theological_decisions:
- issue: Rendering κύριος in a deuterocanonical prayer addressed to Israel's God
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The project default for κύριος is 'Lord.' Because the Greek has the article
    and the clause identifies God's character, 'the Lord' reads naturally and preserves
    the title's force without importing the tetragrammaton where the source text has
    κύριος.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
- issue: Whether to interpret συντρίβων πολέμους dynamically as 'ending wars'
  chosen_reading: the one who shatters wars
  alternative_readings:
  - who ends wars
  rationale: The Greek participle and object are concrete and forceful. Preserving
    'shatters wars' maintains the metaphor and theological portrayal of God as the
    breaker of military power, rather than resolving it into a smoother abstraction.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence'
