translation:
  text: And she said, “O Lord, God of my father Simeon, to whom you gave a sword in
    his hand for vengeance against foreigners, who loosed a virgin’s womb for defilement
    and bared her thigh for shame and profaned her womb for disgrace—though you said,
    ‘It shall not be so’; yet they did it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “who violated the virgin’s womb.” The Greek expression
      is euphemistic but clearly refers to sexual violation.
    reason: lexical_alternative
  - marker: b
    text: “Bared the thigh” is a sexual-shame idiom; compare similar biblical uses
      of uncovering nakedness or thigh imagery for humiliation and violation.
    reason: cultural_note
  - marker: c
    text: The prayer alludes to the Simeon-Dinah episode in Genesis 34, interpreting
      Simeon’s violence as vengeance for the outrage committed.
    reason: cross_reference
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Direct address to God; 'Lord' follows project default for κύριος and
    fits prayer language without importing the tetragrammaton convention.
- source_word: ὁ θεὸς τοῦ πατρὸς μου Συμεών
  chosen: God of my father Simeon
  alternatives:
  - God of Simeon my father
  lexicon: LSJ
  rationale: Natural English while preserving the familial claim and the named patriarch
    Simeon.
- source_word: ᾧ ἔδωκας ἐν χειρὶ ῥομφαίαν
  chosen: to whom you gave a sword in his hand
  alternatives:
  - into whose hand you gave a sword
  - whom you armed with a sword
  lexicon: LSJ
  rationale: Keeps the concrete idiom ἐν χειρί rather than smoothing to a more interpretive
    paraphrase.
- source_word: εἰς ἐκδίκησιν ἀλλογενῶν
  chosen: for vengeance on foreigners
  alternatives:
  - for avenging against foreigners
  - for punishment of foreigners
  lexicon: LSJ
  rationale: ἐκδίκησις here denotes retaliatory justice/vengeance; ἀλλογενῶν is most
    directly 'foreigners,' not necessarily 'Gentiles' in a later technical sense.
- source_word: οἳ ἔλυσαν μήτραν παρθένου
  chosen: who loosened the virgin’s womb
  alternatives:
  - who violated the virgin's womb
  - who opened the womb of a virgin
  lexicon: LSJ
  rationale: The Greek is stark and euphemistic at once. 'Loosened' preserves the
    metaphor of ἔλυσαν while allowing the sexual-violation sense to remain evident
    from context. 'Virgin' is retained for παρθένου.
- source_word: εἰς μίασμα
  chosen: for defilement
  alternatives:
  - into pollution
  - for uncleanness
  lexicon: LSJ
  rationale: μίασμα carries the sense of ritual/moral defilement; 'defilement' is
    idiomatic and weighty.
- source_word: ἐγύμνωσαν μηρὸν
  chosen: bared the thigh
  alternatives:
  - uncovered the thigh
  - stripped the thigh bare
  lexicon: LSJ
  rationale: A conventional sexual-shame idiom; 'bared the thigh' preserves the imagery
    without overexplaining in the main text.
- source_word: εἰς αἰσχύνην
  chosen: for shame
  alternatives:
  - to shame her
  - for dishonor
  lexicon: LSJ
  rationale: Simple and direct rendering of result/purpose.
- source_word: ἐβεβήλωσαν μήτραν
  chosen: profaned the womb
  alternatives:
  - defiled the womb
  - violated the womb
  lexicon: LSJ
  rationale: βεβηλόω has the sense of treating as profane; 'profaned' preserves the
    sacrilegious force alongside the sexual context.
- source_word: εἰς ὄνειδος
  chosen: for disgrace
  alternatives:
  - for reproach
  - for insult
  lexicon: LSJ
  rationale: ὄνειδος is public shame/reproach; 'disgrace' reads naturally in English.
- source_word: εἶπας γὰρ Οὐχ οὕτως ἔσται
  chosen: yet you said, ‘It shall not be so’
  alternatives:
  - for you said, 'It shall not happen thus'
  - for you said, 'Not so shall it be'
  lexicon: LSJ
  rationale: Preserves the contrast between God's stated will and the perpetrators'
    action. 'Yet' brings out the adversative force in context.
- source_word: καὶ ἐποίησαν
  chosen: but they did it
  alternatives:
  - and they did so
  - yet they acted
  lexicon: LSJ
  rationale: The object is implicit from context; 'did it' makes the contrast explicit
    in idiomatic English while remaining anchored to the Greek.
