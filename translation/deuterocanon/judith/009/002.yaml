theological_decisions:
- issue: How explicitly to render the sexual-violation language in the prayer's recollection
    of Dinah/Simeon tradition
  chosen_reading: Retain the Greek's euphemistic but forceful imagery ('loosened the
    virgin’s womb,' 'bared the thigh,' 'profaned the womb') rather than replacing
    it with a single interpretive term like 'raped.'
  alternative_readings:
  - Use an explicit summary such as 'raped the virgin'
  - Use more muted language such as 'dishonored her'
  rationale: The source piles up three expressions, each contributing a different
    aspect of violation, shame, and profanation. A single modern label would compress
    the rhetoric; a softer rendering would understate it. The chosen wording preserves
    the text's theological and moral gravity while staying close to the Greek.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering ἀλλογενῶν
  chosen_reading: foreigners
  alternative_readings:
  - Gentiles
  - aliens
  rationale: In this deuterocanonical Jewish context the term marks outsiders ethnically/covenantally,
    but 'Gentiles' may sound overly technical or later Christian. 'Foreigners' is
    the broad, source-near choice.
  doctrine_reference: Translation philosophy §§1, 6
