theological_decisions:
- issue: Personified and difficult clause concerning the bed and deceit
  chosen_reading: 'Retain the personified imagery: ''their bed, which was ashamed
    of their deceit, was deceived into blood'''
  alternative_readings:
  - '''their bed, ashamed of their deceit, was defiled with blood'''
  - '''the marriage-bed that knew their deceit was itself deceived to bloodshed'''
  rationale: The Greek is syntactically compressed and rhetorically dense. Rather
    than smoothing into an interpretive paraphrase, the translation preserves the
    striking personification and the wordplay between ἀπάτην and ἀπατηθεῖσαν. This
    best fits the project's commitment to preserve tension rather than resolve every
    ambiguity.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
