id: JDT.9.3
reference: Judith 9:3
source:
  edition: lxx-swete-1909
  text: ἀνθʼ ὧν ἔδωκας ἄρχοντας αὐτῶν εἰς φόνον, καὶ τὴν στρωμνὴν αὐτῶν ἣ ᾐδέσατο
    τὴν ἀπάτην αὐτῶν ἀπατηθεῖσαν εἰς αἷμα, καὶ ἐπάταξας δούλους ἐπὶ δυνάσταις καὶ
    δυνάστας ἐπὶ θρόνους αὐτῶν·
  language: Greek
