translation:
  text: Therefore you gave their rulers over to slaughter, and their bed, which was
    ashamed of their deceit, was deceived into blood; and you struck slaves against
    rulers, and rulers upon their thrones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their bed, which felt shame at their deceit, was betrayed into bloodshed.'
      The Greek clause is compressed and may refer to the bed as a personified witness
      to sexual treachery and its bloody outcome.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθʼ ὧν
  chosen: Therefore
  alternatives:
  - because of which
  - for which reason
  lexicon: LSJ
  rationale: Introduces the consequence flowing from the prior narrative. 'Therefore'
    gives natural English while preserving the inferential force.
- source_word: ἔδωκας ... εἰς φόνον
  chosen: you gave ... over to slaughter
  alternatives:
  - you handed ... over to killing
  - you delivered ... to death
  lexicon: LSJ
  rationale: The idiom ἔδωκας εἰς with φόνος conveys handing someone over to violent
    death. 'Gave over to slaughter' preserves both the causative sense and the violent
    register.
- source_word: ἄρχοντας
  chosen: rulers
  alternatives:
  - leaders
  - princes
  lexicon: LSJ
  rationale: A broad political term; 'rulers' fits the context without over-specifying
    rank.
- source_word: στρωμνή
  chosen: bed
  alternatives:
  - couch
  - marriage-bed
  lexicon: LSJ
  rationale: The term denotes a bed or couch. 'Bed' is the clearest English choice
    here, while the sexual context is supplied by the surrounding clause.
- source_word: ᾐδέσατο
  chosen: was ashamed of
  alternatives:
  - felt shame at
  - respected
  lexicon: LSJ
  rationale: From αἰδέομαι, here best taken in the sense of feeling shame or modest
    reserve. This yields the difficult but defensible sense that the bed itself is
    personified as recoiling from their deceit.
- source_word: ἀπάτην
  chosen: deceit
  alternatives:
  - treachery
  - trickery
  lexicon: LSJ
  rationale: A general term for deception. 'Deceit' is straightforward and preserves
    the moral charge.
- source_word: ἀπατηθεῖσαν εἰς αἷμα
  chosen: was deceived into blood
  alternatives:
  - was betrayed into bloodshed
  - was tricked into blood
  lexicon: LSJ
  rationale: 'The passive participle echoes ἀπάτην and creates a wordplay: deceit
    answered by being deceived. ''Into blood'' is somewhat literal but preserves the
    Greek''s compressed expression for a bloody outcome.'
- source_word: ἐπάταξας
  chosen: you struck
  alternatives:
  - you smote
  - you struck down
  lexicon: LSJ
  rationale: Aorist of πατάσσω. 'Struck' is modern and sufficiently forceful; 'struck
    down' would add a result not explicit in the verb alone.
- source_word: δούλους
  chosen: slaves
  alternatives:
  - servants
  lexicon: LSJ
  rationale: In line with project guidance on δοῦλος, 'slaves' is preferred where
    social subordination is salient. Here the contrast with δυνάσταις highlights status
    reversal.
- source_word: δυνάσταις
  chosen: princes
  alternatives:
  - rulers
  - powerful men
  - lords
  lexicon: LSJ
  rationale: The term denotes those in power. 'Princes' works well in the elevated
    style of the prayer and contrasts clearly with 'slaves.'
- source_word: θρόνους
  chosen: thrones
  alternatives:
  - seats of rule
  lexicon: LSJ
  rationale: Literal rendering preserves the royal-political imagery.
