  confidence: high
  validation: agree
translation:
  text: Strike slave against ruler with the deceitful words of my lips, and ruler
    against his attendant; shatter their arrogance by the hand of a woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shatter their uprising' or 'their insolence'; the Greek noun is rare
      and may denote either their proud exaltation or their rising up.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάταξον
  chosen: Strike
  alternatives:
  - Smite
  - Strike down
  lexicon: LSJ
  rationale: A direct imperative asking God to inflict a blow. 'Strike' is clear modern
    English and preserves the force without archaic tone. 'Strike down' would over-specify
    death, which the verb itself does not require here.
- source_word: δοῦλον
  chosen: slave
  alternatives:
  - servant
  lexicon: LSJ
  rationale: The noun denotes a bonded subordinate. In this military-political context
    the status contrast with 'ruler' is salient, so 'slave' better preserves the social
    hierarchy than the softer 'servant'.
- source_word: ἐκ χειλέων ἀπάτης μου
  chosen: with the deceitful words of my lips
  alternatives:
  - from my deceitful lips
  - by the deceit of my lips
  lexicon: LSJ
  rationale: 'Literally ''from lips of my deceit.'' The phrase expresses instrument
    or means in context: Judith asks that her deceptive speech be the means by which
    enemies are turned against one another. This rendering keeps the first-person
    admission of deception while reading idiomatically in English.'
- source_word: ἐπʼ ἄρχοντι
  chosen: against ruler
  alternatives:
  - upon a ruler
  - on a ruler
  lexicon: LSJ
  rationale: With πάταξον and the social-reversal context, ἐπί is best rendered adversatively
    as 'against.' The anarthrous singular is naturally indefinite in English.
- source_word: ἄρχοντα
  chosen: ruler
  alternatives:
  - prince
  - leader
  lexicon: LSJ
  rationale: A generic term for one in authority. 'Ruler' is broad and accessible,
    avoiding the narrower or more monarchical coloring of 'prince'.
- source_word: θεράποντι
  chosen: attendant
  alternatives:
  - servant
  - retainer
  lexicon: LSJ
  rationale: θεράπων often denotes a personal attendant or retainer rather than the
    more general δοῦλος. 'Attendant' preserves the distinction between the two subordinate-status
    terms in the verse.
- source_word: θραῦσον
  chosen: shatter
  alternatives:
  - break
  - crush
  lexicon: LSJ
  rationale: A strong imperative calling for decisive breaking. 'Shatter' conveys
    the intensity better than the more general 'break' while not adding imagery absent
    from the Greek.
- source_word: τὸ ἀνάστεμα
  chosen: their arrogance
  alternatives:
  - their uprising
  - their insolence
  - their pride
  lexicon: LSJ
  rationale: In context this refers to the enemies' proud exaltation or haughty rising
    up. 'Arrogance' captures the moral sense and fits the prayer for humiliation.
    Because the noun is uncommon and can be understood more literally as 'rising up,'
    an alternative is preserved in a footnote.
- source_word: ἐν χειρὶ θηλείας
  chosen: by the hand of a woman
  alternatives:
  - by a woman's hand
  - through a female
  lexicon: LSJ
  rationale: A standard biblical idiom for agency. 'Woman' is preferable to the more
    biological 'female' in English, while preserving the gendered force of the phrase.
