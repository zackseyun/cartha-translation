theological_decisions:
- issue: Gendered agency in Judith's prayer
  chosen_reading: by the hand of a woman
  alternative_readings:
  - by a woman's hand
  rationale: The Greek explicitly marks female agency (θηλείας). Following the project's
    gender-accurate policy, the translation preserves this rather than neutralizing
    it. The phrase is important to the narrative theology of God overthrowing the
    powerful through an unexpected female instrument.
