translation:
  text: Yes, yes, O God of my father and God of Israel’s inheritance, Master of the
    heavens and of the earth, Creator of the waters, King of all your creation, you—hear
    my prayer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God of the inheritance of Israel'; the phrase may also be understood
      as 'God of Israel’s heritage.'
    reason: lexical_alternative
  - marker: b
    text: '''Master'' renders Greek despotēs, a stronger term than kyrios (''Lord''),
      emphasizing absolute authority.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ναὶ ναὶ
  chosen: Yes, yes
  alternatives:
  - Indeed, indeed
  - Truly, truly
  lexicon: LSJ
  rationale: A doubled affirmative/exclamation. 'Yes, yes' preserves the emphatic,
    prayerful force without importing Johannine-style 'truly, truly,' which would
    sound anachronistic here.
- source_word: ὁ θεὸς τοῦ πατρὸς μου
  chosen: O God of my father
  alternatives:
  - the God of my father
  lexicon: LSJ
  rationale: Vocative force is clear in the prayer context, so 'O God' brings the
    direct address into natural English. Singular 'my father' is retained as in the
    Greek.
- source_word: θεὸς κληρονομίας Ἰσραήλ
  chosen: God of Israel’s inheritance
  alternatives:
  - God of the inheritance of Israel
  - God of Israel's heritage
  lexicon: LSJ
  rationale: κληρονομία denotes inheritance/heritage/possession. 'Inheritance' is
    the most direct rendering; the genitive is kept rather than paraphrased away.
    'Heritage' is possible but slightly less concrete.
- source_word: δέσποτα
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: BDAG
  rationale: δέσποτα is stronger and more specific than κύριος, denoting ownership/absolute
    authority. 'Master' best preserves that nuance here; 'Lord' would blur the distinction
    with κύριος, which is not the word used.
- source_word: τῶν οὐρανῶν καὶ τῆς γῆς
  chosen: of the heavens and of the earth
  alternatives:
  - of heaven and earth
  lexicon: LSJ
  rationale: The Greek has plural 'heavens'; retaining it reflects the source more
    closely while remaining idiomatic enough in elevated prayer language.
- source_word: κτίστα
  chosen: Creator
  alternatives:
  - Maker
  - Founder
  lexicon: LSJ
  rationale: A standard rendering for the one who creates. 'Creator' fits both the
    lexical sense and the liturgical cadence of the invocation.
- source_word: τῶν ὑδάτων
  chosen: of the waters
  alternatives:
  - of water
  lexicon: LSJ
  rationale: Plural is explicit in Greek and should be preserved.
- source_word: βασιλεῦ πάσης κτίσεώς σου
  chosen: King of all your creation
  alternatives:
  - King of every creature of yours
  - King of all that you have created
  lexicon: LSJ
  rationale: κτίσις can mean creation or creature. In this cosmic doxological context,
    'creation' best captures the collective sense; 'all your creation' preserves the
    possessive σου.
- source_word: σὺ εἰσάκουσον
  chosen: you—hear
  alternatives:
  - do you hear
  - listen to
  lexicon: LSJ
  rationale: The explicit pronoun σὺ is emphatic. The dash marks the emphasis naturally
    in English without over-paraphrasing. εἰσακούω in prayer contexts is well rendered
    'hear' in the sense of attentive response.
- source_word: τῆς δεήσεώς μου
  chosen: my prayer
  alternatives:
  - my petition
  - my supplication
  lexicon: BDAG
  rationale: δέησις is specifically a plea/petition, but 'my prayer' is natural modern
    English and fits the solemn register. The more technical 'supplication' is possible
    but less accessible.
