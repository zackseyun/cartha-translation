theological_decisions:
- issue: Rendering of δέσποτα in divine address
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: Following the project's principle of original-language primacy, δέσποτα
    is distinguished from κύριος and rendered with a term that preserves its stronger
    nuance of absolute authority. This avoids flattening two distinct Greek titles
    into the same English word.
