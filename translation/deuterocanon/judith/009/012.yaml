id: JDT.9.12
reference: Judith 9:12
source:
  edition: lxx-swete-1909
  text: ναὶ ναὶ ὁ θεὸς τοῦ πατρὸς μου καὶ θεὸς κληρονομίας Ἰσραήλ, δέσποτα τῶν οὐρανῶν
    καὶ τῆς γῆς, κτίστα τῶν ὑδάτων, βασιλεῦ πάσης κτίσεώς σου, σὺ εἰσάκουσον τῆς δεήσεώς
    μου,
  language: Greek
