theological_decisions:
- issue: Relation of divine judgment to πρόγνωσις
  chosen_reading: your judgment is in foreknowledge
  alternative_readings:
  - your judgment is according to foreknowledge
  - your judgment is in your foreknowledge
  rationale: The Greek ἐν προγνώσει is somewhat compressed. The main text keeps the
    literal prepositional relation without over-interpreting whether the sense is
    locative, instrumental, or according-to. Alternatives are preserved in a footnote
    because the phrase bears on how explicitly the verse links God's judgment with
    prior knowledge.
  doctrine_reference: Preserve theological tension rather than resolve it.
