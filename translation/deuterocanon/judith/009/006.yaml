translation:
  text: And what I planned stood ready, and they said, ‘Behold, we are here; for all
    your ways are prepared, and your judgment is in foreknowledge.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your judgment is according to foreknowledge' or 'your judgment is in
      your foreknowledge.' The Greek phrase is compact and may express that God's
      judicial decision rests within or accords with his prior knowledge.
    reason: alternative_reading
lexical_decisions:
- source_word: παρέστησαν
  chosen: stood ready
  alternatives:
  - stood by
  - presented themselves
  - came forward
  lexicon: LSJ
  rationale: Aorist of παρίστημι here describes plans or agents being set in place/at
    hand. 'Stood ready' fits the context of divine purposes being immediately available
    for execution better than the more wooden 'presented themselves.'
- source_word: ἃ ἐβουλεύσω
  chosen: what I planned
  alternatives:
  - the things I purposed
  - what I resolved
  - what I intended
  lexicon: LSJ
  rationale: The relative pronoun with βουλεύω naturally refers to matters devised
    or purposed. 'Planned' is clear modern English and preserves the deliberative
    sense without sounding overly technical.
- source_word: πάρεσμεν
  chosen: we are here
  alternatives:
  - we are present
  - here we are
  lexicon: LSJ
  rationale: The idiom is a declaration of readiness/presence. 'We are here' is natural
    English and retains the immediacy of the Greek.
- source_word: ὁδοί
  chosen: ways
  alternatives:
  - paths
  - courses
  lexicon: LSJ
  rationale: In reference to God's dealings or procedures, 'ways' is the standard
    and sufficiently broad rendering.
- source_word: ἕτοιμοι
  chosen: are prepared
  alternatives:
  - are ready
  - stand ready
  lexicon: LSJ
  rationale: Predicate adjective describing God's ways as already made ready. 'Are
    prepared' matches the passive/resultative nuance and pairs well with the surrounding
    language of divine planning.
- source_word: κρίσις
  chosen: judgment
  alternatives:
  - decision
  - justice
  lexicon: LSJ
  rationale: Here the term refers to God's judicial determination rather than an abstract
    quality. 'Judgment' best preserves that sense; 'decision' is possible but weaker
    theologically, and 'justice' shifts the meaning.
- source_word: πρόγνωσις
  chosen: foreknowledge
  alternatives:
  - prior knowledge
  - prescience
  lexicon: LSJ
  rationale: The noun denotes knowing beforehand. 'Foreknowledge' is the most direct
    and established English equivalent, while remaining understandable.
