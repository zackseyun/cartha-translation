translation:
  text: Look upon their arrogance; send your wrath upon their heads; give power to
    what I have planned by the hand of me, a widow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Give power into my hand, I who am a widow, for what I have planned.'
      The Greek final clause is syntactically compressed and may be construed in more
      than one closely related way.
    reason: alternative_reading
lexical_decisions:
- source_word: βλέψον
  chosen: Look upon
  alternatives:
  - Look at
  - See
  lexicon: LSJ
  rationale: Imperative of βλέπω used as an appeal for God to take notice. 'Look upon'
    preserves the prayerful, elevated tone better than the flatter 'look at.'
- source_word: ὑπερηφανίαν
  chosen: arrogance
  alternatives:
  - pride
  - haughtiness
  lexicon: LSJ
  rationale: The noun denotes overbearing pride or haughtiness. 'Arrogance' communicates
    the moral fault clearly in modern English without archaic tone.
- source_word: ἀπόστειλον
  chosen: send
  alternatives:
  - dispatch
  lexicon: LSJ
  rationale: Aorist imperative meaning 'send.' Straightforward rendering fits the
    petition.
- source_word: ὀργήν
  chosen: wrath
  alternatives:
  - anger
  lexicon: LSJ
  rationale: In address to God and in a judgment context, 'wrath' better conveys punitive
    divine anger than the more general 'anger.'
- source_word: εἰς κεφαλὰς αὐτῶν
  chosen: upon their heads
  alternatives:
  - on their heads
  - against their heads
  lexicon: LSJ
  rationale: This idiom expresses judgment falling back on them. 'Upon their heads'
    is natural English and preserves the image.
- source_word: δὸς
  chosen: give
  alternatives:
  - grant
  - bestow
  lexicon: LSJ
  rationale: Basic imperative 'give.' Although 'grant' is possible in prayer, 'give'
    stays closer to the Greek.
- source_word: ἐν χειρί μου τῆς χήρας
  chosen: in the hand of me, a widow
  alternatives:
  - by my hand, though I am a widow
  - through the hand of me, the widow
  lexicon: LSJ
  rationale: The phrase is somewhat marked in Greek. It likely means agency/instrumentality
    through Judith's own hand, with τῆς χήρας appositional to μου. The chosen rendering
    keeps the concrete 'hand' imagery and the emphatic self-identification as a widow,
    though slightly wooden to preserve auditability.
- source_word: ὃ διενοήθην
  chosen: what I have planned
  alternatives:
  - what I have devised
  - what I have purposed
  lexicon: LSJ
  rationale: The verb διανοέομαι refers to forming a plan or intention. 'Planned'
    is clear modern English and avoids implying deceit beyond the text itself.
- source_word: κράτος
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: LSJ
  rationale: The noun denotes strength or might. Here it is the empowering force requested
    for Judith's intended action. 'Strength' reads naturally after 'give' and suits
    the prayer context.
