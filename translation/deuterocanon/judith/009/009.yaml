theological_decisions:
- issue: How to construe the final clause with κράτος and ἐν χειρί μου τῆς χήρας
  chosen_reading: A request that God empower Judith's intended act through her own
    hand as a widow
  alternative_readings:
  - Give power into my hand, I who am a widow, for what I have planned
  - Grant might by the hand of me, the widow, in what I have planned
  rationale: The Greek word order is compressed and allows more than one smooth English
    construal. The chosen rendering preserves both the request for divine empowerment
    and the instrumental phrase 'in/by the hand,' while keeping Judith's widowhood
    explicit. This avoids over-resolving the syntax beyond what the source warrants.
  doctrine_reference: Preserve theological tension rather than resolve it
