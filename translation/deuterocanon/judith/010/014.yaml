translation:
  text: And when the men heard her words and observed her face, she was exceedingly
    marvelous in beauty before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'looked closely at her face' for 'observed her face'; the Greek verb
      suggests attentive notice.
    reason: lexical_alternative
  - marker: b
    text: Literally 'she was before them marvelous in beauty exceedingly,' an idiom
      expressing that she appeared to them as extraordinarily beautiful.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ ἤκουσαν
  chosen: And when they heard
  alternatives:
  - Now when they heard
  - And as soon as they heard
  lexicon: BDAG
  rationale: ὡς with the aorist here introduces a temporal clause. 'And when' gives
    natural English sequence without overstating immediacy.
- source_word: οἱ ἄνδρες
  chosen: the men
  alternatives:
  - the soldiers
  - the men there
  lexicon: BDAG
  rationale: ἄνδρες is the ordinary masculine plural 'men.' The immediate context
    involves male guards/attendants, but the Greek does not specify 'soldiers' in
    this verse, so 'the men' stays closest to the text.
- source_word: τὰ ῥήματα αὐτῆς
  chosen: her words
  alternatives:
  - what she said
  - her statements
  lexicon: BDAG
  rationale: ῥήματα commonly means spoken words or sayings. 'Her words' is formally
    close and idiomatic.
- source_word: κατενόησαν
  chosen: observed
  alternatives:
  - looked closely at
  - considered
  - noticed
  lexicon: BDAG
  rationale: κατανοέω can mean to observe attentively or notice carefully. Since the
    object is 'her face,' 'observed' captures deliberate visual attention better than
    the more abstract 'considered.'
- source_word: τὸ πρόσωπον αὐτῆς
  chosen: her face
  alternatives:
  - her appearance
  - her countenance
  lexicon: BDAG
  rationale: πρόσωπον literally means 'face.' Although it can extend to outward appearance,
    the direct rendering 'her face' preserves the concrete Greek wording.
- source_word: ἦν ἐναντίον αὐτῶν
  chosen: she was before them
  alternatives:
  - she appeared to them
  - she was in their sight
  lexicon: BDAG
  rationale: 'The phrase is somewhat literal: ''she was before them.'' In English
    this is awkward if left alone, so it is integrated into the clause ''she was ...
    before them'' to preserve the relational sense of appearing in their presence/sight.'
- source_word: θαυμάσιον
  chosen: marvelous
  alternatives:
  - wonderful
  - astonishing
  - admirable
  lexicon: BDAG
  rationale: θαυμάσιος denotes something wonderful or marvelous, evoking admiration.
    'Marvelous' fits the elevated narrative tone and pairs naturally with beauty.
- source_word: τῷ κάλλει
  chosen: in beauty
  alternatives:
  - in her beauty
  - for beauty
  - in appearance
  lexicon: BDAG
  rationale: 'The dative expresses respect or sphere: marvelous with respect to beauty.
    ''In beauty'' is concise and close to the Greek; English readers will understand
    this as referring to her beauty.'
- source_word: σφόδρα
  chosen: exceedingly
  alternatives:
  - very
  - greatly
  lexicon: BDAG
  rationale: σφόδρα intensifies strongly. 'Exceedingly' preserves the elevated register
    better than the flatter 'very.'
