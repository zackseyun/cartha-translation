theological_decisions:
- issue: Rendering of Judith's devotional posture in ἀπὸ τῆς πτώσεως
  chosen_reading: from her prostration
  alternative_readings:
  - from her fall
  rationale: The immediate context is prayerful mourning, so the bodily-religious
    sense is more likely than a neutral 'fall.' This preserves the text's pious setting
    without overinterpreting beyond the narrative scene.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
