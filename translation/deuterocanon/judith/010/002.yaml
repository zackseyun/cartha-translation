id: JDT.10.2
reference: Judith 10:2
source:
  edition: lxx-swete-1909
  text: καὶ ἀνέστη ἀπὸ τῆς πτώσεως καὶ ἐκάλεσεν τὴν Ἄβραν αὐτῆς, καὶ κατέβη εἰς τὸν
    οἶκον ἐν ᾧ διέτριβεν ἐν αὐτῷ ἐν ταῖς ἡμέραις τῶν σαββάτων, καὶ ἐν ταῖς ἑορταῖς
    αὐτῆς,
  language: Greek
