translation:
  text: And she rose from her prostration and called her maid Abra, and went down
    into the house in which she stayed during the days of her Sabbaths and during
    her festivals,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from her fall.' The Greek noun can denote a fall, but here likely refers
      to Judith's prostrate posture in prayer or mourning.
    reason: lexical_alternative
  - marker: b
    text: The Greek literally says 'during the days of her Sabbaths,' preserving a
      plural form that may reflect repeated Sabbath observance rather than a single
      Sabbath day.
    reason: cultural_note
lexical_decisions:
- source_word: ἀνέστη
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: BDAG
  rationale: Aorist of ἀνίστημι here marks Judith's action of getting up after falling
    down in prayer or grief. 'Rose' is concise and natural in narrative English.
- source_word: ἀπὸ τῆς πτώσεως
  chosen: from her prostration
  alternatives:
  - from her fall
  - from where she had fallen
  lexicon: LSJ
  rationale: While πτῶσις can mean a fall, in this context Judith has cast herself
    down in prayer. 'Prostration' best captures the bodily posture and devotional
    setting without implying an accidental stumble.
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: BDAG
  rationale: The verb simply states that she called for Abra. 'Summoned' is possible
    but slightly stronger than the Greek requires.
- source_word: τὴν Ἄβραν αὐτῆς
  chosen: her maid Abra
  alternatives:
  - her servant Abra
  - Abra her maid
  lexicon: BDAG
  rationale: Ἄβρα is the personal name Abra, and αὐτῆς marks possession. The role
    term 'maid' is supplied in English from Judith's known attendant relationship
    in context; it is the most idiomatic compact rendering for her female personal
    attendant.
- source_word: κατέβη
  chosen: went down
  alternatives:
  - descended
  lexicon: BDAG
  rationale: The verb literally means 'went down.' 'Descended' is more formal, but
    'went down' preserves the spatial movement in readable English.
- source_word: εἰς τὸν οἶκον
  chosen: into the house
  alternatives:
  - to the house
  lexicon: BDAG
  rationale: εἰς with accusative naturally indicates movement into the house, not
    merely toward it.
- source_word: ἐν ᾧ διέτριβεν
  chosen: in which she stayed
  alternatives:
  - where she spent her time
  - in which she lived
  lexicon: BDAG
  rationale: διατρίβω here denotes residing or spending time. 'Stayed' fits the temporary-retreat
    sense better than the stronger 'lived.'
- source_word: ἐν ταῖς ἡμέραις τῶν σαββάτων
  chosen: during the days of her Sabbaths
  alternatives:
  - during the days of the Sabbaths
  - on Sabbath days
  lexicon: BDAG
  rationale: The Greek is plural and includes αὐτῆς later in the clause, referring
    to Judith's own observance pattern. 'During the days of her Sabbaths' preserves
    the plural form and the somewhat Semitic phrasing of the source better than flattening
    it to singular 'on the Sabbath.'
- source_word: ἐν ταῖς ἑορταῖς αὐτῆς
  chosen: during her festivals
  alternatives:
  - at her feast days
  - during the festivals
  lexicon: BDAG
  rationale: ἑορταί are festal observances. 'Festivals' is clear modern English and
    keeps the religious-calendar sense.
