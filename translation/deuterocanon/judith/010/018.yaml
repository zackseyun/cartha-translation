translation:
  text: And there was a stir in the camp, for her arrival was spread through the tents;
    and they came and surrounded her as she stood outside the tent of Holofernes,
    until they reported her to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her presence was cried out through the tents.' The Greek verb suggests
      vocal spreading of the news, and παρουσία can mean either 'presence' or, contextually,
      'arrival.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο συνδρομή
  chosen: there was a rush
  alternatives:
  - there was a running together
  - there was a commotion
  - there was a crowding
  lexicon: LSJ
  rationale: συνδρομή denotes a rushing together or concourse. 'There was a rush'
    preserves the sudden collective movement in natural English without overinterpreting
    it as panic.
- source_word: παρεμβολή
  chosen: camp
  alternatives:
  - encampment
  lexicon: LSJ
  rationale: In military narrative παρεμβολή commonly refers to the camp. 'Camp' is
    the most natural and contextually precise English rendering.
- source_word: διεβοήθη
  chosen: was reported through
  alternatives:
  - was cried out through
  - was proclaimed through
  - was noised abroad in
  lexicon: LSJ
  rationale: The passive verb conveys that news about her spread vocally through the
    camp. 'Was reported through the tents' captures dissemination of the news without
    archaic phrasing.
- source_word: τὰ σκηνώματα
  chosen: the tents
  alternatives:
  - the tent-camps
  - the quarters
  lexicon: LSJ
  rationale: σκηνώματα refers to tent dwellings in the camp. 'The tents' is straightforward
    and fits the military setting.
- source_word: ἡ παρουσία αὐτῆς
  chosen: her arrival
  alternatives:
  - her presence
  - her appearance
  lexicon: LSJ
  rationale: Although παρουσία can mean 'presence,' in this context the point is that
    news spread because she had appeared at the camp. 'Her arrival' communicates the
    eventive sense more clearly in English.
- source_word: ἐκύκλουν αὐτήν
  chosen: gathered around her
  alternatives:
  - surrounded her
  - encircled her
  lexicon: LSJ
  rationale: Literally 'were circling/surrounding her.' 'Gathered around her' preserves
    the image while sounding less militarily aggressive than 'surrounded,' which the
    context does not require.
- source_word: ὡς ἱστήκει
  chosen: as she stood
  alternatives:
  - while she was standing
  lexicon: LSJ
  rationale: The pluperfect-like form functions statively here, describing her position
    at the time. 'As she stood' is concise and natural.
- source_word: ἔξω τῆς σκηνῆς Ὀλοφέρνου
  chosen: outside the tent of Holofernes
  alternatives:
  - outside Holofernes' tent
  lexicon: LSJ
  rationale: A direct and clear rendering of the location phrase.
- source_word: προσήγγειλαν αὐτῷ περὶ αὐτῆς
  chosen: they announced her to him
  alternatives:
  - they reported about her to him
  - they informed him concerning her
  lexicon: LSJ
  rationale: The phrase means they brought word to him about her. 'Announced her to
    him' is idiomatic in context, where attendants notify a superior of a visitor's
    presence.
