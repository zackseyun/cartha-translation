  text: καὶ ἐγένετο συνδρομὴ ἐν τῇ παρεμβολῇ, διεβοήθη γὰρ εἰς τὰ σκηνώματα ἡ παρουσία
    αὐτῆς· καὶ ἐλθόντες ἐκύκλουν αὐτὴν ὡς ἱστήκει ἔξω τῆς σκηνῆς Ὀλοφέρνου, ἕως προσήγγειλαν
    αὐτῷ περὶ αὐτῆς.
