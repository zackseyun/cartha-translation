theological_decisions:
- issue: Purity nuance in ἄρτων καθαρῶν
  chosen_reading: clean loaves
  alternative_readings:
  - pure loaves
  - ritually clean bread
  rationale: The verse concerns food preparation by Judith, and καθαρῶν may imply
    ritual suitability. The main text keeps the broader 'clean' to avoid importing
    a more technical cultic claim than the Greek explicitly states, while preserving
    the likely purity sense in the documented rationale.
  doctrine_reference: Translation philosophy §§1, 3, 6
