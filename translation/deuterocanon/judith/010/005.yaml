translation:
  text: And she gave her maid a skin of wine and a flask of oil, and she filled a
    bag with roasted grain and cakes of pressed figs and clean loaves; then she wrapped
    up all her vessels and placed them on her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ritually clean loaves' or 'pure bread.' The Greek may imply food prepared
      in keeping with purity concerns.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅβρᾳ
  chosen: maid
  alternatives:
  - female servant
  - attendant
  lexicon: LSJ
  rationale: The dative refers to Judith's female attendant. 'Maid' is concise, natural
    in narrative English, and fits the social setting without overstating bonded status
    beyond what the term itself here requires.
- source_word: ἀσκοπυτίνην οἶνον
  chosen: a skin of wine
  alternatives:
  - a wineskin of wine
  - wine in a skin
  lexicon: LSJ
  rationale: The compound denotes a skin-container; in idiomatic English 'a skin of
    wine' conveys the vessel and contents naturally. Retaining 'wine' explicitly reflects
    the Greek accusative object.
- source_word: καψάκην ἐλαίου
  chosen: a flask of oil
  alternatives:
  - a jar of oil
  - a bottle of oil
  lexicon: LSJ
  rationale: The noun denotes a small container. 'Flask' is a readable modern equivalent
    that suggests portability, fitting the travel provisions context.
- source_word: πῆραν
  chosen: a bag
  alternatives:
  - a pouch
  - a provision-bag
  - a wallet
  lexicon: LSJ
  rationale: The term is a traveler's bag or provision sack. 'Bag' is the clearest
    modern rendering and avoids archaic 'scrip' or overly specific choices not demanded
    by the text.
- source_word: ἀλφίτων
  chosen: roasted grain
  alternatives:
  - barley meal
  - groats
  - meal
  lexicon: LSJ
  rationale: The plural commonly refers to groats or meal made from roasted grain.
    In this provisions list, 'roasted grain' is concrete and understandable while
    preserving the food item's likely sense.
- source_word: παλάθης
  chosen: cakes of pressed figs
  alternatives:
  - fig cakes
  - masses of figs
  lexicon: LSJ
  rationale: The word refers to compressed fig-cakes. 'Cakes of pressed figs' makes
    the preparation explicit while remaining natural English.
- source_word: ἄρτων καθαρῶν
  chosen: clean loaves
  alternatives:
  - pure loaves
  - undefiled bread
  lexicon: LSJ
  rationale: καθαρῶν here likely signals ritual or dietary suitability rather than
    mere physical cleanliness. 'Clean loaves' preserves the source wording and leaves
    the precise purity nuance available to the reader without overinterpreting.
- source_word: περιεδίπλωσε
  chosen: wrapped up
  alternatives:
  - packed up
  - folded together
  lexicon: LSJ
  rationale: The verb suggests folding or wrapping around. In context of preparing
    provisions, 'wrapped up' best captures the action in idiomatic English.
- source_word: τὰ ἄγγη αὐτῆς
  chosen: her vessels
  alternatives:
  - her containers
  - her utensils
  lexicon: LSJ
  rationale: The noun is a general term for containers or vessels. 'Vessels' is slightly
    formal but suitably broad and fits the provisioning context.
- source_word: ἐπέθηκε αὐτῇ
  chosen: placed them on her
  alternatives:
  - laid them on her
  - put them on her
  lexicon: LSJ
  rationale: The pronoun most naturally refers back to the maid, indicating Judith
    loaded the packed items onto her attendant. 'Placed them on her' preserves that
    sense without adding 'shoulders' or 'back,' which the Greek does not specify.
