id: JDT.10.5
reference: Judith 10:5
source:
  edition: lxx-swete-1909
  text: καὶ ἔδωκεν τῇ ἅβρᾳ αὐτῆς ἀσκοπυτίνην οἶνον καὶ καψάκην ἐλαίου, καὶ πῆραν ἐπλήρωσεν
    ἀλφίτων καὶ παλάθης καὶ ἄρτων καθαρῶν, καὶ περιεδίπλωσε πάντα τὰ ἄγγη αὐτῆς καὶ
    ἐπέθηκε αὐτῇ.
