translation:
  text: And they seized her and asked her, “Who are you, and where are you coming
    from, and where are you going?” And she said, “I am a daughter of the Hebrews,
    and I am fleeing from before them, because they are about to be given over to
    you for consumption.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Who do you belong to?” The Greek literally asks, “Whose are you?” and
      may refer to ethnic or political allegiance.
    reason: lexical_alternative
  - marker: b
    text: Or, “I am a Hebrew woman.” The Greek literally reads, “I am a daughter of
      the Hebrews.”
    reason: lexical_alternative
  - marker: c
    text: 'Or, “to be consumed” or “as food.” The phrase is vivid: “for devouring.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέλαβον
  chosen: seized
  alternatives:
  - captured
  - took hold of
  lexicon: BDAG
  rationale: The verb here denotes laying hold of Judith physically. 'Seized' preserves
    the abruptness and military setting better than the softer 'took hold of.'
- source_word: Τίνων εἶ
  chosen: Whose are you
  alternatives:
  - Who do you belong to
  - What people are you from
  lexicon: LSJ
  rationale: The genitive plural with εἶ is literally 'whose are you?' This likely
    asks about ethnic or political allegiance rather than ownership in a narrow sense.
    The more literal wording is retained to preserve the force of the Greek question.
- source_word: πόθεν ἔρχῃ
  chosen: where are you coming from
  alternatives:
  - from where do you come
  lexicon: BDAG
  rationale: A natural English rendering of the present subjunctive/form in indirect
    questioning context; it preserves the directional sense of πόθεν.
- source_word: ποῦ πορεύῃ
  chosen: where are you going
  alternatives:
  - where are you headed
  lexicon: BDAG
  rationale: πορεύομαι commonly means to go or travel. 'Where are you going' is idiomatic
    and sufficiently formal.
- source_word: Θυγάτηρ εἰμὶ τῶν Ἑβραίων
  chosen: I am a daughter of the Hebrews
  alternatives:
  - I am one of the Hebrew women
  - I am a Hebrew woman
  lexicon: LSJ
  rationale: The singular 'daughter' should be preserved rather than flattened to
    'woman,' since it reflects a Semitic-style self-identification and keeps the metaphorical
    familial/ethnic nuance.
- source_word: ἀποδιδράσκω
  chosen: I am fleeing
  alternatives:
  - I am escaping
  - I have run away
  lexicon: LSJ
  rationale: The verb means to run away or escape. 'I am fleeing' is idiomatic and
    fits the present-tense self-report in context.
- source_word: ἀπὸ προσώπου αὐτῶν
  chosen: from before them
  alternatives:
  - from them
  - from their presence
  lexicon: LSJ
  rationale: Literally 'from before their face/presence.' 'From before them' preserves
    the source idiom more closely than simply 'from them,' while remaining understandable.
- source_word: μέλλουσιν δόσθαι
  chosen: they are about to be given over
  alternatives:
  - they are going to be handed over
  - they are destined to be delivered
  lexicon: BDAG
  rationale: The passive infinitive with μέλλω indicates imminence. 'About to be given
    over' preserves both the passive and the sense of impending action.
- source_word: εἰς κατάβρωμα
  chosen: for devouring
  alternatives:
  - as food
  - to be consumed
  lexicon: LSJ
  rationale: The noun denotes something eaten up or devoured. 'For devouring' keeps
    the vivid, ominous imagery without over-paraphrasing.
