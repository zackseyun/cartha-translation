  text: καὶ συνέλαβον αὐτὴν καὶ ἐπηρώτησαν Τίνων εἶ, καὶ πόθεν ἔρχῃ, καὶ ποῦ πορεύῃ;
    καὶ εἶπεν Θυγάτηρ εἰμὶ τῶν Ἑβραίων, καὶ ἀποδιδράσκω ἀπὸ προσώπου αὐτῶν, ὅτι μέλλουσιν
    δόσθαι ὑμῖν εἰς κατάβρωμα.
