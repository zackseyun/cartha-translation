id: JDT.10.17
reference: Judith 10:17
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέλεξαν ἐξ αὐτῶν ἄνδρας ἑκατόν, καὶ παρέζευξαν αὐτῇ καὶ τῇ ἄβρᾳ αὐτῆς,
    καὶ ἤγαγον αὐτὰς ἐπὶ τὴν σκηνὴν Ὀλοφέρνου.
  language: Greek
  pages:
