translation:
  text: And they selected one hundred men from among them, and they escorted her and
    her maid, and brought them to the tent of Holofernes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπέλεξαν
  chosen: selected
  alternatives:
  - chose
  - picked out
  lexicon: LSJ
  rationale: The verb indicates choosing out from a larger group. 'Selected' is natural
    modern English and preserves the deliberate sense better than the more casual
    'picked out.'
- source_word: ἐξ αὐτῶν
  chosen: from among them
  alternatives:
  - from them
  lexicon: LSJ
  rationale: The phrase explicitly marks selection out of a larger body; 'from among
    them' makes that partitive sense clear in English.
- source_word: ἄνδρας ἑκατόν
  chosen: one hundred men
  alternatives:
  - a hundred men
  lexicon: LSJ
  rationale: A straightforward numerical phrase. 'One hundred men' is slightly more
    formal and suits the narrative register.
- source_word: παρέζευξαν
  chosen: escorted
  alternatives:
  - accompanied
  - assigned as an escort to
  lexicon: LSJ
  rationale: In context the verb describes going along with Judith and her maid as
    a protective or official accompaniment. 'Escorted' captures that function more
    idiomatically than a wooden rendering.
- source_word: τῇ ἄβρᾳ αὐτῆς
  chosen: her maid
  alternatives:
  - her female servant
  - her attendant
  lexicon: LSJ
  rationale: ἄβρα in Judith refers to the female servant/maid accompanying Judith.
    'Maid' is concise and idiomatic, while still indicating subordinate household
    status.
- source_word: ἤγαγον
  chosen: brought
  alternatives:
  - led
  - conducted
  lexicon: LSJ
  rationale: The verb means to lead or bring. Since the destination is expressed and
    the women are being taken to Holofernes' tent, 'brought' reads naturally in English.
- source_word: σκηνήν
  chosen: tent
  alternatives:
  - pavilion
  lexicon: LSJ
  rationale: The ordinary sense is 'tent.' 'Pavilion' is possible in military or royal
    contexts, but 'tent' is the plain sense and avoids unnecessary elevation.
- source_word: Ὀλοφέρνου
  chosen: Holofernes
  rationale: Personal names are transliterated by project policy.
