translation:
  text: And she took off the sackcloth that she had been wearing, and removed the
    garments of her widowhood. She washed her body with water and anointed herself
    with rich perfume, arranged the hair of her head, put a headband on it, and put
    on her festive garments, with which she used to adorn herself during the days
    of her husband Manasseh’s life;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anointed herself with rich ointment.' The Greek phrase can denote perfumed
      ointment, with the adjective suggesting richness or thickness.
    reason: lexical_alternative
  - marker: b
    text: Or 'put on a turban/headdress.' The Greek term refers to a head covering
      or ornamental band.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'during the days of the life of her husband Manasseh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιείλατο
  chosen: took off
  alternatives:
  - removed
  - stripped off
  lexicon: LSJ
  rationale: Middle voice in context indicates removing something from oneself. 'Took
    off' is natural modern English and fits clothing.
- source_word: σάκκον
  chosen: sackcloth
  alternatives:
  - coarse cloth
  lexicon: LSJ
  rationale: Standard rendering for mourning attire; preserves the cultural and biblical
    resonance of penitential or mourning dress.
- source_word: ἐνεδύκει
  chosen: had been wearing
  alternatives:
  - was wearing
  - had put on
  lexicon: LSJ
  rationale: Pluperfect sense is best reflected by 'had been wearing,' showing the
    prior ongoing state before she removed it.
- source_word: ἐξεδύσατο
  chosen: removed
  alternatives:
  - took off
  - stripped off
  lexicon: LSJ
  rationale: Used of taking off clothing. Varied from the previous verb for readable
    English while preserving the same basic action.
- source_word: τὰ ἱμάτια τῆς χηρεύσεως
  chosen: the garments of her widowhood
  alternatives:
  - her widow's garments
  - the clothes of widowhood
  lexicon: LSJ
  rationale: Keeps the genitival idea explicit and preserves the social-religious
    significance of mourning dress associated with widowhood.
- source_word: περιεκλύσατο
  chosen: washed
  alternatives:
  - bathed
  - rinsed
  lexicon: LSJ
  rationale: The verb indicates washing the body. 'Washed' is straightforward and
    avoids over-specifying a full bath where the Greek simply states washing with
    water.
- source_word: ἔχρισατο μύρῳ παχεῖ
  chosen: anointed herself with thick perfume
  alternatives:
  - rubbed herself with rich ointment
  - anointed herself with costly ointment
  lexicon: LSJ
  rationale: ἔχρισατο suggests anointing; μύρον is perfumed ointment; παχύς here conveys
    richness/thickness rather than merely expense. 'Thick perfume' is slightly unusual
    but remains close to the Greek.
- source_word: διέταξε τὰς τρίχας τῆς κεφαλῆς αὐτῆς
  chosen: arranged the hair of her head
  alternatives:
  - combed her hair
  - set her hair in order
  lexicon: LSJ
  rationale: The verb means to arrange or set in order. 'Arranged' preserves the broader
    sense without importing a specific grooming method not stated in the text.
- source_word: μίτραν
  chosen: headband
  alternatives:
  - turban
  - headdress
  lexicon: LSJ
  rationale: A head covering or band is intended. 'Headband' is a cautious, readable
    rendering that avoids overcommitting to a larger wrapped turban while still indicating
    adornment.
- source_word: τὰ ἱμάτια τῆς εὐφροσύνης αὐτῆς
  chosen: her festive garments
  alternatives:
  - the garments of her gladness
  - her joyful clothing
  lexicon: LSJ
  rationale: εὐφροσύνη denotes gladness or festivity. In clothing context, 'festive
    garments' communicates attire associated with celebration rather than mourning.
- source_word: ἐστολίζετο
  chosen: used to adorn herself
  alternatives:
  - dressed herself
  - made herself beautiful
  lexicon: LSJ
  rationale: The verb carries the sense of adorning or arraying oneself. 'Used to
    adorn herself' reflects the imperfect customary action in past time.
- source_word: ἐν ταῖς ἡμέραις τῆς ζωῆς τοῦ ἀνδρὸς αὐτῆς
  chosen: during the days of her husband Manasseh’s life
  alternatives:
  - while her husband Manasseh was alive
  - in the lifetime of her husband Manasseh
  lexicon: LSJ
  rationale: This phrase literally refers to the days of her husband's life. The chosen
    rendering stays close to the Greek while remaining idiomatic enough in English.
