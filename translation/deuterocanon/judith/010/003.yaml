theological_decisions:
- issue: Widowhood and mourning imagery
  chosen_reading: Retained explicit references to sackcloth and garments of widowhood
    rather than smoothing to generic mourning clothes.
  alternative_readings:
  - mourning clothes
  - widow's mourning garments
  rationale: The verse emphasizes Judith's transition from mourning status to deliberate
    adornment. Preserving both 'sackcloth' and 'garments of her widowhood' keeps the
    narrative and social significance visible without adding doctrinal interpretation.
  doctrine_reference: Translation philosophy §§1, 5, 6
