translation:
  text: And Holofernes was reclining on his bed under the canopy, which was woven
    with purple, gold, emeralds, and costly stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the mosquito net' or 'within the bed-curtain'; the Greek term
      can refer to a netted or draped covering over a bed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναπαυόμενος
  chosen: reclining
  alternatives:
  - resting
  - lying down
  lexicon: LSJ
  rationale: The participle denotes being at rest on the bed, but in banquet/bedchamber
    context 'reclining' fits natural English and preserves the posture implied without
    over-paraphrasing.
- source_word: κλίνη
  chosen: bed
  alternatives:
  - couch
  lexicon: LSJ
  rationale: κλίνη can mean bed or couch. Here, given the private chamber setting
    and the following mention of a canopy, 'bed' is the most straightforward rendering.
- source_word: κωνώπιον
  chosen: canopy
  alternatives:
  - mosquito net
  - bed-curtain
  lexicon: LSJ
  rationale: The term can denote a mosquito net or draped covering over a bed. Because
    the text emphasizes luxurious materials, 'canopy' best conveys an ornate over-bed
    covering in readable English, while the more specific alternative is preserved
    in a footnote.
- source_word: πορφύρα
  chosen: purple
  alternatives:
  - purple cloth
  - purple fabric
  lexicon: LSJ
  rationale: The noun refers to purple material/dye associated with luxury. 'Purple'
    is sufficient in English within the list of materials.
- source_word: χρυσίον
  chosen: gold
  alternatives:
  - gold thread
  lexicon: LSJ
  rationale: The phrase lists luxurious materials incorporated into the canopy. 'Gold'
    is the direct rendering; 'gold thread' is possible by implication from the weaving
    context but is more interpretive.
- source_word: σμαράγδος
  chosen: emeralds
  alternatives:
  - green precious stones
  lexicon: LSJ
  rationale: The plural sense is natural in English in a material list. 'Emeralds'
    is the standard rendering for σμάραγδος.
- source_word: λίθων πολυτελῶν
  chosen: costly stones
  alternatives:
  - precious stones
  - expensive jewels
  lexicon: LSJ
  rationale: πολυτελής emphasizes high value/luxury. 'Costly stones' is a close, readable
    rendering that avoids overstating technical gem classification.
- source_word: καθυφασμένων
  chosen: woven with
  alternatives:
  - embroidered with
  - interwoven with
  lexicon: LSJ
  rationale: The participle indicates textile workmanship incorporating the listed
    materials. 'Woven with' is the least interpretive rendering; 'embroidered with'
    is possible but less certain.
