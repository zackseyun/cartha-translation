reference: Judith 10:21
source:
  edition: lxx-swete-1909
  text: καὶ ἦν Ὀλοφέρνης ἀναπαυόμενος ἐπὶ τῆς κλίνης αὐτοῦ ἐν τῷ κωνωπίῳ, ὃ ἦν ἐκ
    πορφύρας καὶ χρυσίου καὶ σμαράγδου καὶ λίθων πολυτελῶν καθυφασμένων.
  language: Greek
  pages:
