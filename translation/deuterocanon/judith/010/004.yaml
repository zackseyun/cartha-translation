theological_decisions:
- issue: Moral purpose of Judith's adornment
  chosen_reading: The text states explicitly that she beautified herself in order
    to deceive the eyes of men who might see her.
  alternative_readings:
  - The phrase could be softened as merely attracting or captivating attention.
  rationale: The noun ἀπάτησις denotes deception, and the translation should not mute
    the strategic, morally complex purpose stated in the Greek. This preserves narrative
    tension rather than resolving it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
