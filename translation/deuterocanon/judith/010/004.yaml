translation:
  text: And she put sandals on her feet, and put on her anklets and bracelets and
    rings and earrings and all her jewelry; and she made herself very beautiful, to
    deceive the eyes of any men who might see her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all her adornment' or 'all her finery' for 'all her jewelry.' The Greek
      κόσμος here means ornamentation or adornment.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the men who might see her.' The Greek expression is indefinite and
      general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν ... σανδάλια εἰς τοὺς πόδας αὐτῆς
  chosen: put sandals on her feet
  alternatives:
  - took sandals for her feet
  - put on sandals
  lexicon: LSJ
  rationale: Although ἔλαβεν is literally 'took,' the idiom with clothing/accessories
    in context is best rendered naturally as 'put ... on.' This preserves the action
    without wooden English.
- source_word: περιέθετο
  chosen: put on
  alternatives:
  - placed around herself
  - arrayed herself with
  lexicon: LSJ
  rationale: In context of ornaments, the middle verb indicates adorning herself by
    putting these items on. 'Put on' is clear modern English and fits the list that
    follows.
- source_word: χλιδῶνας
  chosen: anklets
  alternatives:
  - luxury ornaments
  - finery
  lexicon: LSJ
  rationale: In this adornment list, χλιδῶνες most plausibly refers to a specific
    ornament item rather than abstract luxury. 'Anklets' fits the jewelry sequence
    and avoids flattening the concrete list into a vague summary.
- source_word: ψέλια
  chosen: bracelets
  alternatives:
  - armlets
  lexicon: LSJ
  rationale: ψέλια commonly denotes bracelets or armlets. 'Bracelets' is the most
    accessible modern equivalent.
- source_word: δακτυλίους
  chosen: rings
  lexicon: LSJ
  rationale: Standard rendering for finger-rings; no need for expansion beyond the
    Greek.
- source_word: ἐνώτια
  chosen: earrings
  alternatives:
  - ear-jewels
  lexicon: LSJ
  rationale: The term denotes ornaments for the ears. 'Earrings' is the natural modern
    rendering.
- source_word: πάντα τὸν κόσμον αὐτῆς
  chosen: all her jewelry
  alternatives:
  - all her adornment
  - all her finery
  lexicon: LSJ
  rationale: κόσμος here means adornment/ornamentation, not 'world.' 'All her jewelry'
    fits the immediate list of ornaments, though 'all her adornment' is possible.
    The chosen rendering is concrete and readable.
- source_word: ἐκαλλωπίσατο σφόδρα
  chosen: she made herself very beautiful
  alternatives:
  - she adorned herself greatly
  - she beautified herself exceedingly
  lexicon: LSJ
  rationale: The middle verb indicates self-adornment. 'Made herself very beautiful'
    communicates the result in idiomatic English while preserving the intensive σφόδρα.
- source_word: εἰς ἀπάτησιν
  chosen: to deceive
  alternatives:
  - for deception
  - to beguile
  lexicon: LSJ
  rationale: The preposition with noun expresses purpose. 'To deceive' is direct and
    preserves Judith's intentional strategy without euphemism.
- source_word: ὀφθαλμῶν ἀνδρῶν
  chosen: the eyes of ... men
  alternatives:
  - men's eyes
  - the sight of men
  lexicon: LSJ
  rationale: The Greek explicitly mentions 'eyes,' so the translation keeps that imagery
    rather than reducing it to a more abstract 'sight.'
- source_word: ὅσοι ἂν ἴδωσιν αὐτήν
  chosen: whatever men might see her
  alternatives:
  - all the men who might see her
  - as many men as might see her
  lexicon: LSJ
  rationale: ὅσοι ἄν with subjunctive has an indefinite/general force. The chosen
    rendering captures that open-ended sense, though 'all the men who might see her'
    is also viable.
