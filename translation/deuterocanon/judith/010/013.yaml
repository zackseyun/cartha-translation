id: JDT.10.13
reference: Judith 10:13
source:
  edition: lxx-swete-1909
  text: κἀγὼ ἔρχομαι εἰς τὸ πρόσωπον Ὀλοφέρνου ἀρχιστρατήγου δυνάμεως ὑμῶν τοῦ ἀναγγεῖλαι
    ῥήματα ἀληθείας, καὶ δείξω πρὸ προσώπου αὐτοῦ ὁδὸν καθʼ ἣν πορεύσεται καὶ κυριεύσει
    πάσης τῆς ὀρινῆς, καὶ οὐ διαφωνήσει τῶν ἀνδρῶν αὐτοῦ σὰρξ μία οὐδὲ πνεῦμα ζωῆς.
  language: Greek
  pages:
  - 798
