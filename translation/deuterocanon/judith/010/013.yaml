  confidence: high
  validation: agree
translation:
  text: And I am coming into the presence of Holofernes, the commander-in-chief of
    your forces, to announce words of truth, and I will show before him the way by
    which he will go and gain mastery over all the hill country, and not one flesh
    of his men, nor a breath of life, will be lacking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not one body of his men, nor a breath of life,' preserving the Greek's
      vivid bodily idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ ἔρχομαι
  chosen: And I am coming
  alternatives:
  - And I come
  - And I am going
  lexicon: LSJ
  rationale: Present tense with κἀγώ is retained in a vivid, direct way. 'Am coming'
    fits Judith's immediate speech situation better than the flatter 'come' and avoids
    overinterpreting direction with 'am going.'
- source_word: εἰς τὸ πρόσωπον
  chosen: into the presence of
  alternatives:
  - before
  - to the face of
  lexicon: LSJ
  rationale: This idiom means entering someone's presence. 'Into the presence of'
    preserves the concrete Greek while remaining natural English.
- source_word: Ὀλοφέρνου
  chosen: Holofernes
  rationale: Personal name transliterated per project philosophy.
- source_word: ἀρχιστρατήγου
  chosen: commander-in-chief
  alternatives:
  - general
  - supreme commander
  lexicon: LSJ
  rationale: The compound denotes the highest military commander. 'Commander-in-chief'
    best conveys rank and authority in clear modern English.
- source_word: δυνάμεως ὑμῶν
  chosen: of your forces
  alternatives:
  - of your army
  - of your power
  lexicon: LSJ
  rationale: In military context δύναμις commonly refers to armed forces. 'Forces'
    is broad and natural, matching the genitive relation to ἀρχιστρατήγου.
- source_word: τοῦ ἀναγγεῖλαι
  chosen: to announce
  alternatives:
  - to report
  - to declare
  lexicon: LSJ
  rationale: The infinitive expresses purpose. 'Announce' preserves the formal, declarative
    sense without sounding overly stiff.
- source_word: ῥήματα ἀληθείας
  chosen: words of truth
  alternatives:
  - true words
  - truthful words
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the phrase's rhetorical weight.
    'Words of truth' sounds solemn and reflects the genitive construction.
- source_word: δείξω ... ὁδὸν
  chosen: I will show ... the way
  alternatives:
  - I will point out ... the route
  - I will reveal ... a path
  lexicon: LSJ
  rationale: This keeps the concrete imagery of showing a way while allowing strategic
    nuance in context.
- source_word: καθʼ ἣν πορεύσεται
  chosen: by which he will go
  alternatives:
  - on which he will march
  - that he should take
  lexicon: LSJ
  rationale: The relative phrase specifies the route. 'By which he will go' is slightly
    formal but clear and close to the Greek.
- source_word: κυριεύσει
  chosen: gain mastery over
  alternatives:
  - rule over
  - subdue
  - dominate
  lexicon: LSJ
  rationale: κυριεύω can mean exercise lordship or gain control. In this military
    setting, 'gain mastery over' conveys conquest without importing a later administrative
    sense.
- source_word: πάσης τῆς ὀρινῆς
  chosen: all the hill country
  alternatives:
  - all the mountain region
  - all the highlands
  lexicon: LSJ
  rationale: ὀρινή denotes mountainous or hill terrain/region. 'Hill country' is idiomatic
    biblical English and fits the campaign context.
- source_word: οὐ διαφωνήσει
  chosen: will be lost
  alternatives:
  - will be missing
  - will fail
  - will be at variance
  lexicon: LSJ
  rationale: Though διαφωνέω often means 'differ' or 'disagree,' in this context with
    a partitive genitive and the following expression of life it idiomatically conveys
    that none will be lacking from his men. 'Will be lost' communicates the military
    sense clearly.
- source_word: τῶν ἀνδρῶν αὐτοῦ
  chosen: of his men
  alternatives:
  - from among his men
  lexicon: LSJ
  rationale: The genitive is naturally rendered as a possessive/partitive phrase in
    English.
- source_word: σὰρξ μία
  chosen: not one flesh
  alternatives:
  - not one body
  - not a single man
  lexicon: LSJ
  rationale: The Greek says 'one flesh,' a vivid bodily expression. Retaining 'flesh'
    preserves the source's concrete idiom and rhetorical force.
- source_word: οὐδὲ πνεῦμα ζωῆς
  chosen: nor a breath of life
  alternatives:
  - nor a living breath
  - nor a spirit of life
  lexicon: LSJ
  rationale: This phrase denotes life-breath rather than the Holy Spirit or an abstract
    spirit. 'Breath of life' is idiomatic and faithful to the expression.
