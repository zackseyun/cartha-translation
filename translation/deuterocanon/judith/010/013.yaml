theological_decisions:
- issue: Rendering of σὰρξ in a non-Pauline, literal military context
  chosen_reading: flesh
  alternative_readings:
  - body
  - man
  rationale: Per doctrine, σάρξ is rendered 'flesh' when literal. Here the phrase
    concerns the bodily survival of Holofernes's men, not a metaphorical 'sinful nature.'
  doctrine_reference: 'DOCTRINE.md contested terms: σάρξ'
