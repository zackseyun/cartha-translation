translation:
  text: But if you stand before him, do not be afraid in your heart; instead, speak
    according to your words, and he will treat you well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as you have said' / 'according to what you say' for 'according to your
      words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν ... στῇς
  chosen: if you stand
  alternatives:
  - if you present yourself
  - if you take your stand
  lexicon: LSJ
  rationale: The aorist subjunctive of ἵστημι after ἐάν gives a conditional sense.
    'Stand' is the most direct rendering and fits the scene of appearing before a
    ruler; 'present yourself' is interpretive and 'take your stand' can sound overly
    confrontational.
- source_word: ἐναντίον αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  - opposite him
  lexicon: LSJ
  rationale: The phrase commonly means being in someone's presence or before them.
    'Before him' is natural English and preserves the spatial/personal sense without
    over-literal awkwardness.
- source_word: μὴ φοβηθῇς τῇ καρδίᾳ σου
  chosen: do not be afraid in your heart
  alternatives:
  - do not fear in your heart
  - do not be inwardly afraid
  lexicon: LSJ
  rationale: The dative phrase τῇ καρδίᾳ σου marks the inner seat of fear. 'In your
    heart' preserves the idiom and its anthropological force better than flattening
    it to merely 'do not be afraid.'
- source_word: ἀνάγγειλον
  chosen: report
  alternatives:
  - tell
  - announce
  - declare
  lexicon: LSJ
  rationale: The imperative calls for conveying information. 'Report' fits the courtly/instructional
    context and avoids the over-formality of 'announce' while being weightier than
    simple 'tell.'
- source_word: κατὰ τὰ ῥήματά σου
  chosen: according to your words
  alternatives:
  - as you have said
  - according to what you say
  lexicon: LSJ
  rationale: Formally, the phrase is 'according to your words.' This likely means
    in line with what she has been instructed to say. The rendering keeps the Greek
    wording visible, even if slightly idiomatic alternatives are possible.
- source_word: εὖ σε ποιήσει
  chosen: he will treat you well
  alternatives:
  - he will do well by you
  - he will deal kindly with you
  lexicon: LSJ
  rationale: The idiom ποιεῖν with an adverb and object means to treat or deal with
    someone in a certain way. 'He will treat you well' is clear modern English and
    preserves the favorable outcome.
