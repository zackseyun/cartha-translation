translation:
  text: And they did so. Then Judith went out, she and her maid with her; and the
    men of the city kept watching her until she went down the mountain, until she
    passed through the valley, and they could no longer see her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “ravine” or “mountain pass” for “valley” (Greek αὐλών).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησαν οὕτως
  chosen: they did so
  alternatives:
  - they did thus
  - they acted accordingly
  lexicon: LSJ
  rationale: A natural English rendering of the idiom that preserves the narrative
    confirmation without sounding archaic.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - departed
  - went forth
  lexicon: LSJ
  rationale: Standard narrative movement verb; 'went out' is both accurate and readable.
- source_word: παιδίσκη
  chosen: maid
  alternatives:
  - female servant
  - maidservant
  lexicon: LSJ
  rationale: Refers to Judith's female attendant. 'Maid' is concise and idiomatic
    in narrative English, while still indicating subordinate household status; 'maidservant'
    is possible but heavier.
- source_word: ἀπεσκόπευον
  chosen: kept watching
  alternatives:
  - watched
  - kept observing
  lexicon: LSJ
  rationale: The imperfect tense suggests continued action, so 'kept watching' better
    reflects the ongoing observation than a simple past.
- source_word: ἄνδρες τῆς πόλεως
  chosen: the men of the city
  alternatives:
  - the city's men
  - the townsmen
  lexicon: LSJ
  rationale: A straightforward, gender-accurate rendering of the Greek phrase. 'Townsmen'
    is possible but slightly more interpretive and less transparent.
- source_word: ἕως οὗ κατέβη τὸ ὄρος
  chosen: until she went down the mountain
  alternatives:
  - until she descended the mountain
  - until she came down from the mountain
  lexicon: LSJ
  rationale: The phrase marks the first limit of their watching. 'Went down the mountain'
    is idiomatic and preserves the topographical movement.
- source_word: αὐλών
  chosen: valley
  alternatives:
  - ravine
  - mountain pass
  lexicon: LSJ
  rationale: In this context of descending from the mountain and moving out of sight,
    'valley' is the broadest defensible rendering in clear English. The term can denote
    a hollow, vale, or ravine-like area, so an alternative is worth preserving in
    a footnote.
- source_word: οὐκ ἔτι ἐθεώρουν αὐτήν
  chosen: they could no longer see her
  alternatives:
  - they no longer saw her
  - they saw her no more
  lexicon: LSJ
  rationale: This captures both the cessation implied by οὐκ ἔτι and the visual sense
    of θεωρέω in natural modern English.
