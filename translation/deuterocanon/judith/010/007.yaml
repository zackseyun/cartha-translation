translation:
  text: But when they saw her, and her face had been changed and her clothing altered,
    they marveled greatly at her beauty,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'they marveled at her beauty very greatly,' with a doubled
      intensifier (ἐπὶ πολὺ σφόδρα).
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ εἶδον αὐτήν
  chosen: But when they saw her
  alternatives:
  - And when they saw her
  - Now when they saw her
  lexicon: LSJ
  rationale: ὡς with the aorist here introduces a temporal clause, and δέ is lightly
    adversative or transitional. 'But when' preserves the narrative flow without overtranslating
    δέ.
- source_word: ἦν ἠλλοιωμένον τὸ πρόσωπον αὐτῆς
  chosen: her face had been changed
  alternatives:
  - her face was altered
  - her appearance had changed
  lexicon: LSJ
  rationale: ἠλλοιωμένον denotes alteration/change. Rendering the clause as 'her face
    had been changed' stays close to τὸ πρόσωπον while using natural English. 'Appearance'
    would be smoother but is broader than 'face.'
- source_word: τὴν στολὴν μεταβεβληκυῖαν
  chosen: her clothing altered
  alternatives:
  - her garment changed
  - her attire transformed
  lexicon: LSJ
  rationale: στολή can mean robe, garment, or clothing/attire. In context, Judith's
    dress has been changed from mourning to adornment; 'clothing' is idiomatic and
    sufficiently broad. μεταβεβληκυῖαν again conveys change/alteration.
- source_word: ἐθαύμασαν
  chosen: they marveled
  alternatives:
  - they were amazed
  - they admired
  lexicon: LSJ
  rationale: The verb expresses wonder or amazement. 'Marveled' preserves the sense
    of astonished admiration better than the flatter 'admired.'
- source_word: ἐπὶ τῷ κάλλει αὐτῆς
  chosen: at her beauty
  alternatives:
  - because of her beauty
  - over her beauty
  lexicon: LSJ
  rationale: κάλλος is beauty. With ἐπί plus dative after a verb of wonder, 'at her
    beauty' is the most natural English equivalent.
- source_word: ἐπὶ πολὺ σφόδρα
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  - to a very great extent
  lexicon: LSJ
  rationale: The doubled intensification means 'very greatly' or 'exceedingly.' English
    normally avoids stacking adverbs here; 'greatly' captures the force in readable
    style, though the intensity is strong.
