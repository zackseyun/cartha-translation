  text: καὶ ἐξῆλθον ἐπὶ τὴν πύλην τῆς πόλεως Βαιτυλουά, καὶ εὗρον ἐφεστῶτα ἐπʼ αὐτῇ
    Ὀζίαν καὶ τοὺς πρεσβυτέρους τῆς πόλεως Χάβρειν καὶ Χάρμειν.
