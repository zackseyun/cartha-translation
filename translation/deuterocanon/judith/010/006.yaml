translation:
  text: And they went out to the gate of the city of Bethulia, and found Uzziah standing
    there, along with Chabris and Charmis, the elders of the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'found Uzziah standing upon/at it,' referring to the gate;
      the translation renders the sense idiomatically as 'standing there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  chosen: went out
  alternatives:
  - came out
  - departed
  lexicon: LSJ
  rationale: Aorist of ἐξέρχομαι, indicating movement outward from the house/city
    interior toward the gate. 'Went out' is the most natural and sufficiently formal
    rendering in context.
- source_word: ἐπὶ τὴν πύλην
  chosen: to the gate
  alternatives:
  - upon the gate
  - at the gate
  lexicon: LSJ
  rationale: With motion verb ἐξῆλθον, ἐπί + accusative here expresses movement toward
    the gate. English idiom prefers 'to the gate' rather than the more wooden 'upon
    the gate.'
- source_word: τῆς πόλεως Βαιτυλουά
  chosen: of the city of Bethulia
  alternatives:
  - of Bethulia city
  - of the town of Bethulia
  lexicon: LSJ
  rationale: πόλις is straightforwardly 'city.' Βαιτυλουά is transliterated as Bethulia,
    following the project's policy to transliterate names rather than translate them.
- source_word: εὗρον
  chosen: found
  alternatives:
  - saw
  - came upon
  lexicon: LSJ
  rationale: The verb ordinarily means 'found.' Although in context it implies encountering
    persons at the gate, 'found' preserves the lexical sense without awkwardness.
- source_word: ἐφεστῶτα
  chosen: standing there
  alternatives:
  - stationed there
  - present there
  - set over it
  lexicon: LSJ
  rationale: Perfect active participle of ἐφίστημι. In this context at the gate, it
    most naturally describes Uzziah as being present/standing there. 'Standing there'
    is idiomatic and fits the scene better than the more official-sounding 'stationed
    there,' while avoiding the administrative sense 'set over it.'
- source_word: ἐπʼ αὐτῇ
  chosen: there
  alternatives:
  - at it
  - upon it
  - over it
  lexicon: LSJ
  rationale: The pronoun refers back to the gate. In English, 'standing there' communicates
    location at the gate more naturally than the literal 'standing upon it/at it.'
- source_word: Ὀζίαν
  chosen: Uzziah
  alternatives:
  - Ozias
  lexicon: LSJ
  rationale: Standard English biblical transliteration favors 'Uzziah' over the more
    directly Greek-based 'Ozias.' This follows the project's preference for recognizable
    transliterated personal names.
- source_word: τοὺς πρεσβυτέρους τῆς πόλεως
  chosen: the elders of the city
  alternatives:
  - the city elders
  lexicon: LSJ
  rationale: πρεσβύτεροι here denotes civic leaders/elders. 'The elders of the city'
    preserves the formal structure and social role clearly.
- source_word: Χάβρειν καὶ Χάρμειν
  chosen: Chabris and Charmis
  alternatives:
  - Cabri and Carmi
  - Chabrein and Charmein
  lexicon: LSJ
  rationale: These are personal names in accusative form. 'Chabris' and 'Charmis'
    are conventional English transliterations from the Greek forms and read naturally
    in English Bible style.
