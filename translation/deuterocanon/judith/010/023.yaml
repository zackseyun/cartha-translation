id: JDT.10.23
reference: Judith 10:23
source:
  edition: lxx-swete-1909
  text: ὡς δὲ ἦλθεν κατὰ πρόσωπον αὐτοῦ Ἰουδεὶθ καὶ τῶν θεραπόντων αὐτοῦ, ἐθαύμασαν
    πάντες ἐπὶ τῷ κάλλει τοῦ προσώπου· καὶ πεσοῦσα ἐπὶ πρόσωπον προσεκύνησεν αὐτῷ,
    καὶ ἤγειραν αὐτὴν
  language: Greek
