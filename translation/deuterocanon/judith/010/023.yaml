translation:
  text: Now when Judith came before him and his attendants, they all marveled at the
    beauty of her face; and falling on her face, she bowed down to him, and they raised
    her up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'paid homage to him.' The Greek verb can also mean 'worship,' but here
      it is used for reverence shown to a human ruler.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ πρόσωπον αὐτοῦ
  chosen: before him
  alternatives:
  - into his presence
  - face to face with him
  lexicon: LSJ
  rationale: The idiom with κατὰ πρόσωπον here indicates coming into someone's presence
    rather than emphasizing literal face-to-face positioning. 'Before him' is natural
    English and preserves the courtly setting.
- source_word: θεραπόντων
  chosen: attendants
  alternatives:
  - servants
  - retainers
  lexicon: LSJ
  rationale: θεράπων can denote an attendant or retainer in a noble or court context.
    'Attendants' fits the scene around Holofernes without importing the stronger bonded
    sense of δοῦλος.
- source_word: ἐθαύμασαν
  chosen: marveled
  alternatives:
  - were amazed
  - wondered
  lexicon: LSJ
  rationale: The verb expresses astonished admiration. 'Marveled' captures both surprise
    and appreciative wonder in elevated but readable English.
- source_word: κάλλει
  chosen: beauty
  alternatives:
  - loveliness
  - fairness
  lexicon: LSJ
  rationale: κάλλος denotes beauty or attractiveness. 'Beauty' is the most direct
    and idiomatic rendering here.
- source_word: τοῦ προσώπου
  chosen: of her face
  alternatives:
  - of her appearance
  - of her countenance
  lexicon: LSJ
  rationale: The Greek specifically says 'face,' not general appearance. 'Countenance'
    is possible but less natural in modern English.
- source_word: πεσοῦσα ἐπὶ πρόσωπον
  chosen: falling on her face
  alternatives:
  - prostrating herself
  - falling facedown
  lexicon: LSJ
  rationale: The participial phrase is vivid and physical. 'Falling on her face' preserves
    the imagery; the act's deferential force is then carried by the following verb.
- source_word: προσεκύνησεν
  chosen: bowed down to him
  alternatives:
  - worshiped him
  - paid homage to him
  - prostrated herself before him
  lexicon: LSJ
  rationale: In this human court setting, the verb denotes an act of obeisance rather
    than divine worship. 'Bowed down to him' preserves the gesture without suggesting
    that Judith rendered religious worship to Holofernes.
- source_word: ἤγειραν αὐτὴν
  chosen: they raised her up
  alternatives:
  - they lifted her up
  - they helped her up
  lexicon: LSJ
  rationale: The plural subject naturally refers back to those present, likely attendants.
    'Raised her up' is a straightforward rendering of the aorist verb.
