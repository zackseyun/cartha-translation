theological_decisions:
- issue: Rendering προσκυνέω toward a human ruler
  chosen_reading: bowed down to him
  alternative_readings:
  - worshiped him
  - paid homage to him
  rationale: Because the object is a human military leader, the context favors obeisance
    or homage rather than religious worship. This preserves the semantic range of
    προσκυνέω without importing a theological claim the text does not make.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; translate according to source-context plain sense.'
