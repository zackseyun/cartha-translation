id: JDT.10.19
reference: Judith 10:19
source:
  edition: lxx-swete-1909
  text: καὶ ἐθαύμαζον ἐπὶ τῷ κάλλει αὐτῆς, καὶ ἐθαύμαζον τοὺς υἱοὺς Ἰσραὴλ ἀπʼ αὐτῆς·
    καὶ εἶπεν ἕκαστος πρὸς τὸν πλησίον αὐτοῦ Τίς καταφρονήσει τοῦ λαοῦ τούτου ὃς ἔχει
    ἐν ἑαυτῷ γυναῖκας τοιαύτας; ὅτι οὐ καλόν ἐστιν ὑπολειπέσθαι ἐξ αὐτῶν ἄνδρα ἕνα,
    οἱ ἀφεθέντες δυνήσονται κατασοφίσασθαι πᾶσαν τὴν γῆν.
