theological_decisions:
- issue: Gendered collective language in reference to Israel
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: Following the project's gender-accurate principle, the masculine idiom
    is preserved rather than neutralized, while still recognizing that it refers collectively
    to Israel.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Gendered singular in military statement
  chosen_reading: even one man
  alternative_readings:
  - even one person
  rationale: The Greek explicitly uses ἄνδρα. The line concerns male survivors in
    war, so the masculine should be retained rather than generalized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
