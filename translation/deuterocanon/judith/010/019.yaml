translation:
  text: And they marveled at her beauty, and because of her they marveled at the sons
    of Israel; and each said to his neighbor, “Who would despise this people, who
    have such women among them? For it is not good to leave even one man from among
    them, because those who are left would be able to outwit the whole earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, “the Israelites.” Greek: “the sons of Israel.”'
    reason: lexical_alternative
  - marker: b
    text: Or, “those left alive would be able to outwit the whole world.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθαύμαζον
  chosen: they marveled
  alternatives:
  - they were amazed
  - they admired
  lexicon: BDAG
  rationale: Imperfect verb repeated twice; 'marveled' preserves both astonishment
    and admiration without sounding overly colloquial.
- source_word: κάλλει
  chosen: beauty
  alternatives:
  - loveliness
  - attractiveness
  lexicon: LSJ
  rationale: Standard rendering for κάλλος/κάλλει in this context; straightforwardly
    refers to Judith's physical beauty.
- source_word: τοὺς υἱοὺς Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: Kept relatively formal to reflect the Greek expression and the project's
    gender-accurate preference. Here it denotes the Israelite people in traditional
    idiom, but the phrase itself is masculine in form.
- source_word: ἀπʼ αὐτῆς
  chosen: because of her
  alternatives:
  - on account of her
  - from her
  lexicon: BDAG
  rationale: The preposition here indicates occasion or cause for their amazement
    regarding Israel, namely Judith herself. 'Because of her' is the clearest idiomatic
    English.
- source_word: καταφρονήσει
  chosen: would despise
  alternatives:
  - would look down on
  - would scorn
  lexicon: BDAG
  rationale: Future verb used rhetorically. 'Despise' best captures contempt implied
    by καταφρονέω.
- source_word: λαοῦ
  chosen: people
  alternatives:
  - nation
  lexicon: BDAG
  rationale: '''People'' is the natural rendering for λαός here, referring to Israel
    as a collective ethnic-political community.'
- source_word: γυναῖκας τοιαύτας
  chosen: such women
  alternatives:
  - women like these
  - women of this kind
  lexicon: LSJ
  rationale: Concise and idiomatic while preserving the evaluative force of τοιαύτας.
- source_word: οὐ καλόν ἐστιν
  chosen: it is not good
  alternatives:
  - it is not fitting
  - it is not advisable
  lexicon: BDAG
  rationale: Retains the broad evaluative sense of καλόν without over-specifying whether
    the judgment is moral, strategic, or pragmatic; in context it is chiefly strategic.
- source_word: ὑπολειπέσθαι
  chosen: to leave
  alternatives:
  - to leave alive
  - to let remain
  lexicon: LSJ
  rationale: The infinitive means to leave remaining. Because the military context
    implies survival after conflict, 'leave' is sufficient in English, with the sense
    'leave alive' understood from context.
- source_word: ἄνδρα ἕνα
  chosen: even one man
  alternatives:
  - one man
  - a single male
  lexicon: BDAG
  rationale: The phrase is emphatic; 'even one man' brings out the force of ἕνα in
    context. 'Man' is retained as gender-accurate to the Greek.
- source_word: οἱ ἀφεθέντες
  chosen: those who are left
  alternatives:
  - those left alive
  - those who are spared
  lexicon: BDAG
  rationale: A participial expression referring to survivors. 'Those who are left'
    is literal and readable; the military sense is clear from context.
- source_word: δυνήσονται κατασοφίσασθαι
  chosen: would be able to outwit
  alternatives:
  - would be able to deceive
  - would prove too clever for
  lexicon: LSJ
  rationale: κατασοφίζομαι carries the sense of using cunning or superior cleverness
    against someone. 'Outwit' best fits the military-political admiration being expressed.
- source_word: πᾶσαν τὴν γῆν
  chosen: the whole earth
  alternatives:
  - all the land
  - the whole world
  lexicon: LSJ
  rationale: The phrase is likely hyperbolic. 'The whole earth' preserves the Greek
    wording and leaves the scope appropriately broad.
