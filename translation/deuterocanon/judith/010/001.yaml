id: JDT.10.1
reference: Judith 10:1
source:
  edition: lxx-swete-1909
  text: Καὶ ἐγένετο ὡς ἐπαύσατο βοῶσα πρὸς τὸν θεὸν Ἰσραὴλ καὶ συνετέλεσεν πάντα τὰ
    ῥήματα ταῦτα,
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 816
  - 817
  - 818
  - 819
  - 820
  - 821
  confidence: high
  validation: agree
translation:
  text: And it happened, when she stopped crying out to the God of Israel and finished
    all these words,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἐγένετο
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: BDAG
  rationale: A common narrative transition formula. 'And it happened' preserves the
    Semitic/LXX narrative feel without archaic English.
- source_word: ὡς
  chosen: when
  alternatives:
  - after
  - as soon as
  lexicon: BDAG
  rationale: Here ὡς introduces the temporal circumstance for the main clause. 'When'
    is the most natural and sufficiently precise rendering in English.
- source_word: ἐπαύσατο
  chosen: stopped
  alternatives:
  - ceased
  - finished
  lexicon: BDAG
  rationale: The verb means to stop or cease. 'Stopped' is clear modern English; 'ceased'
    is more formal but less natural.
- source_word: βοῶσα
  chosen: crying out
  alternatives:
  - calling out
  - shouting
  lexicon: BDAG
  rationale: The participle conveys vocal, urgent appeal in prayer. 'Crying out' best
    captures the intensity without overstating volume.
- source_word: πρὸς τὸν θεὸν Ἰσραήλ
  chosen: to the God of Israel
  alternatives:
  - to Israel's God
  lexicon: BDAG
  rationale: This is the straightforward title in the Greek. 'The God of Israel' preserves
    the biblical idiom and covenantal resonance.
- source_word: συνετέλεσεν
  chosen: finished
  alternatives:
  - completed
  - brought to an end
  lexicon: BDAG
  rationale: The verb here refers to bringing her speech to completion. 'Finished'
    is idiomatic and fits the parallel with 'all these words.'
- source_word: πάντα τὰ ῥήματα ταῦτα
  chosen: all these words
  alternatives:
  - all these things she said
  - all these statements
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the textual link to the preceding
    prayer/speech. 'Words' is slightly wooden in English but biblically transparent
    and auditable.
