translation:
  text: And they were going straight through the courtyard, and an Assyrian advance
    guard met her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''met her,'' singular, though the preceding clause says ''they were
      going.'' The narrative focus narrows specifically to Judith.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύοντο
  chosen: they were going
  alternatives:
  - they went
  - they proceeded
  lexicon: LSJ
  rationale: Imperfect middle/passive form of πορεύομαι conveys ongoing movement in
    narrative. 'Were going' preserves the progressive sense better than a simple past,
    while remaining natural English.
- source_word: ἐν τῷ αὐλῶνι
  chosen: through the courtyard
  alternatives:
  - in the courtyard
  - through the court
  lexicon: LSJ
  rationale: αὐλών commonly denotes a court or enclosed court area. With ἐν plus a
    verb of motion, English idiom prefers 'through the courtyard' to express movement
    within that space.
- source_word: εἰς εὐθεῖαν
  chosen: straight ahead
  alternatives:
  - straight on
  - directly forward
  lexicon: LSJ
  rationale: The phrase is adverbial, indicating direct movement without deviation.
    'Straight ahead' is clear modern English and preserves the sense of proceeding
    directly.
- source_word: συνήντησεν
  chosen: met
  alternatives:
  - encountered
  - came to meet
  lexicon: LSJ
  rationale: The aorist of συναντάω means to meet or encounter. 'Met' is the most
    straightforward rendering in context.
- source_word: αὐτῇ
  chosen: her
  alternatives:
  - them
  lexicon: LSJ
  rationale: Although the preceding verb is plural ('they were going'), the dative
    singular shifts focus to Judith specifically. Rendering it 'her' preserves the
    Greek's singular object and the narrative emphasis on Judith.
- source_word: προφυλακὴ
  chosen: advance guard
  alternatives:
  - outpost
  - vanguard
  - guard post
  lexicon: LSJ
  rationale: προφυλακή can denote a forward guard or outpost. In this moving encounter
    scene, 'advance guard' best fits a body of troops stationed ahead rather than
    a fixed structure.
- source_word: τῶν Ἀσσυρίων
  chosen: Assyrian
  alternatives:
  - of the Assyrians
  lexicon: LSJ
  rationale: The genitive is adjectival in English here. 'An Assyrian advance guard'
    is more idiomatic than 'an advance guard of the Assyrians' while preserving the
    referent.
