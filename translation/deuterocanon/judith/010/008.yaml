theological_decisions:
- issue: Rendering of the blessing's purpose clauses
  chosen_reading: for the boasting of the sons of Israel and the exaltation of Jerusalem
  alternative_readings:
  - to the glory of the Israelites and the honor of Jerusalem
  rationale: The Greek uses εἰς + nouns καύχημα and ὕψωμα. A more literal rendering
    preserves the public-honor dimension without smoothing it into generalized 'glory.'
    This avoids importing a more polished theological idiom than the text itself uses.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering of προσκυνέω
  chosen_reading: she bowed down to God
  alternative_readings:
  - she worshiped God
  - she prostrated herself before God
  rationale: The text states the reverential act plainly. 'Bowed down' preserves the
    embodied action and leaves the reader to infer worship, rather than replacing
    the gesture with an abstract devotional term.
  doctrine_reference: Translation philosophy §§1, 6
