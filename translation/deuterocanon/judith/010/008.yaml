translation:
  text: And they said to her, “May the God of our fathers grant you favor, and bring
    your undertakings to completion for the boasting of the sons of Israel and the
    exaltation of Jerusalem.” And she bowed down to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “grant you grace” / “grant you acceptance.” The Greek phrase literally
      says “give you into favor,” an idiom for granting favorable reception or success.
    reason: lexical_alternative
  - marker: b
    text: Or “your plans” or “your pursuits.” The Greek term can refer broadly to
      one’s undertakings or course of action.
    reason: lexical_alternative
  - marker: c
    text: Or “for the glory of the Israelites and the honor of Jerusalem.”
    reason: alternative_reading
  - marker: d
    text: Or “she worshiped God” or “she prostrated herself before God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δῴη
  chosen: may ... grant
  alternatives:
  - give
  - bestow
  lexicon: LSJ
  rationale: Optative of wish/prayer from δίδωμι; 'may ... grant' conveys the benedictory
    force more naturally in English than a bare 'give.'
- source_word: εἰς χάριν
  chosen: favor
  alternatives:
  - grace
  - acceptance
  lexicon: LSJ
  rationale: In this context the phrase means being granted favorable reception or
    success. 'Favor' is idiomatic and fits the prayer for Judith's mission.
- source_word: τελειῶσαι
  chosen: bring ... to completion
  alternatives:
  - complete
  - fulfill
  - perfect
  lexicon: LSJ
  rationale: The aorist infinitive expresses the desired successful completion of
    her plan. 'Bring ... to completion' is clear modern English and preserves the
    telic sense.
- source_word: τὰ ἐπιτηδεύματά σου
  chosen: your undertakings
  alternatives:
  - your plans
  - your pursuits
  - your enterprises
  lexicon: LSJ
  rationale: The noun can denote pursuits, practices, or undertakings. Here it refers
    to the course of action Judith is about to carry out; 'undertakings' preserves
    breadth without sounding overly colloquial.
- source_word: εἰς καύχημα
  chosen: for the boasting
  alternatives:
  - for glory
  - for pride
  - for exultation
  lexicon: LSJ
  rationale: καύχημα denotes ground of boasting or exultation. 'Boasting' keeps the
    lexical connection more transparently than the smoother but less literal 'glory.'
- source_word: υἱῶν Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: LSJ
  rationale: Per gender-accurate philosophy, the masculine plural is preserved where
    it is part of the source wording. 'Sons of Israel' is more formally transparent
    than 'Israelites,' though the latter is idiomatic.
- source_word: ὕψωμα
  chosen: the exaltation
  alternatives:
  - the glory
  - the uplift
  - the honor
  lexicon: LSJ
  rationale: The noun denotes height or exaltation. 'Exaltation' best preserves the
    metaphor of being lifted high, here applied to Jerusalem's honor.
- source_word: προσεκύνησεν
  chosen: bowed down
  alternatives:
  - worshiped
  - prostrated herself
  lexicon: LSJ
  rationale: The verb literally denotes an act of prostration/bowing in reverence.
    'Bowed down to God' preserves the physical action without over-interpreting the
    exact posture; 'worshiped' would be interpretive.
