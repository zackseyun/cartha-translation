  text: καὶ εἶπαν αὐτῇ Ὁ θεὸς τῶν πατέρων ἡμῶν δῴη σε εἰς χάριν, καὶ τελειῶσαι τὰ
    ἐπιτηδεύματά σου εἰς καύχημα υἱῶν Ἰσραὴλ καὶ ὕψωμα Ἰερουσαλήμ. καὶ προσεκύνησεν
    τῷ θεῷ,
