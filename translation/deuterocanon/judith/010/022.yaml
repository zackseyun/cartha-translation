reference: Judith 10:22
source:
  edition: lxx-swete-1909
  text: καὶ ἀνήγγειλαν αὐτῷ περὶ αὐτῆς, καὶ ἐξῆλθεν εἰς τὸ προσκήνιον, καὶ λαμπάδες
    ἀργυραῖ προάγον αὐτοῦ.
  language: Greek
  pages:
