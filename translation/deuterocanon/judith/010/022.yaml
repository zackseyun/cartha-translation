translation:
  text: And they reported her to him, and he came out into the forecourt, with silver
    lamps going before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'torches' for 'lamps'; the Greek term can refer to either, though the
      mention of silver favors a ceremonial lighting fixture here.
    reason: lexical_alternative
  - marker: b
    text: The Greek term rendered 'forecourt' refers to the area in front of the main
      tent or audience space; 'vestibule' or 'tent-front' are possible alternatives.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνήγγειλαν
  chosen: reported
  alternatives:
  - announced
  - informed
  lexicon: BDAG
  rationale: The verb denotes making a report or announcement to someone. 'Reported'
    fits the courtly narrative context without sounding overly formal or archaic.
- source_word: ἐξῆλθεν
  chosen: came out
  alternatives:
  - went out
  lexicon: BDAG
  rationale: The motion is from inside to outside toward the public area. 'Came out'
    is natural English from the narrator's perspective and preserves the basic sense.
- source_word: προσκήνιον
  chosen: forecourt
  alternatives:
  - vestibule
  - tent-front
  - pavilion
  lexicon: LSJ
  rationale: In this military-camp and royal-tent setting, the term refers to the
    area before the main tent or audience space. 'Forecourt' communicates a formal
    space in front of the ruler's quarters better than the more theatrical sense 'stage'
    or the less clear 'tent-front'.
- source_word: λαμπάδες
  chosen: lamps
  alternatives:
  - torches
  lexicon: LSJ
  rationale: The word can denote torches or lamps. Because they are described as silver,
    the image is more plausibly ceremonial lamp-bearers or silver lamps rather than
    silver torches. 'Lamps' best preserves the likely courtly display.
- source_word: ἀργυραῖ
  chosen: silver
  alternatives:
  - made of silver
  - silvered
  lexicon: LSJ
  rationale: The adjective straightforwardly means 'silver' or 'made of silver.' The
    concise adjective works naturally in English.
- source_word: προάγον
  chosen: going before
  alternatives:
  - preceding
  - leading the way before
  lexicon: BDAG
  rationale: The participle describes the lamps moving ahead of him in procession.
    'Going before' preserves the participial feel and ceremonial nuance.
