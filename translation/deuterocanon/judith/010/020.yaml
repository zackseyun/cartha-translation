  - 818
  - 819
  - 820
  - 821
  confidence: high
  validation: agree
translation:
  text: And those attending Holofernes came out, and all his servants, and they brought
    her into the tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those sleeping beside Holofernes' / 'those lying near Holofernes.' The
      Greek participle can be read more literally as denoting those who slept or lay
      near him, but here it likely refers to those in close attendance on him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  chosen: came out
  alternatives:
  - went out
  lexicon: BDAG
  rationale: The aorist of ἐξέρχομαι straightforwardly denotes movement outward. 'Came
    out' reads naturally in English narrative while preserving the directional sense.
- source_word: οἱ παρακαθεύδοντες Ὀλοφέρνῃ
  chosen: those attending Holofernes
  alternatives:
  - those sleeping beside Holofernes
  - those lying near Holofernes
  - those in attendance on Holofernes
  lexicon: LSJ
  rationale: The participle παρακαθεύδω literally suggests sleeping or lying beside,
    but in this court/military setting the sense is likely those stationed near or
    attending him. Rendering it woodenly as 'sleeping beside Holofernes' could mislead
    modern readers toward an unnecessarily intimate sense. 'Attending' captures the
    functional role implied by proximity in context while remaining anchored to the
    Greek.
- source_word: θεράποντες
  chosen: servants
  alternatives:
  - attendants
  - retainers
  lexicon: LSJ
  rationale: θεράπων commonly denotes an attendant or servant. 'Servants' is clear,
    idiomatic, and fits the broader household/military context. 'Retainers' is possible
    but less accessible in modern English.
- source_word: εἰσήγαγον
  chosen: they brought
  alternatives:
  - they led
  - they escorted
  lexicon: BDAG
  rationale: The verb εἰσάγω means to bring or lead in. 'Brought' best matches the
    direct object construction and keeps the action simple and natural.
- source_word: σκηνήν
  chosen: the tent
  alternatives:
  - the pavilion
  lexicon: LSJ
  rationale: σκηνή literally means tent. In this military-camp setting, 'tent' is
    the most direct and transparent rendering; 'pavilion' is more interpretive and
    archaic.
