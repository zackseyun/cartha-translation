translation:
  text: And they said to her, “You have spared your life by hurrying down into the
    presence of our lord. And now come to his tent, and some from among us will escort
    you until they hand you over into his hands.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You have saved your life.” The Greek idiom literally says “You have
      saved your soul/life.”
    reason: lexical_alternative
  - marker: b
    text: “Into his hands” is a Greek idiom meaning into his control or custody.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σέσωκας τὴν ψυχήν σου
  chosen: You have spared your life
  alternatives:
  - You have saved your life
  - You have preserved your life
  lexicon: LSJ
  rationale: The perfect of σῴζω with ψυχή can idiomatically mean preserving or saving
    one's life. 'Spared your life' fits the immediate sense of having acted for self-preservation
    and sounds natural in English without over-paraphrasing.
- source_word: σπεύσασα
  chosen: by hurrying
  alternatives:
  - having hurried
  - because you hurried
  lexicon: LSJ
  rationale: The participle explains the means/circumstance by which she preserved
    her life. 'By hurrying' captures the participial relation smoothly in English.
- source_word: καταβῆναι
  chosen: down
  alternatives:
  - to come down
  - to go down
  lexicon: LSJ
  rationale: The infinitive depends on the participial idea of hurrying and retains
    the directional nuance. In context, 'hurrying down' is concise and natural.
- source_word: εἰς πρόσωπον τοῦ κυρίου ἡμῶν
  chosen: into the presence of our lord
  alternatives:
  - before our lord
  - to the face of our lord
  lexicon: LSJ
  rationale: The idiom εἰς πρόσωπον means coming before or into the presence of someone.
    'Into the presence of our lord' preserves the courtly nuance. κύριος here is a
    human superior, so 'lord' is appropriate rather than a divine title.
- source_word: πρόσελθε ἐπὶ τὴν σκηνὴν αὐτοῦ
  chosen: come to his tent
  alternatives:
  - approach his tent
  - come up to his tent
  lexicon: LSJ
  rationale: σκηνή in this military setting is best rendered 'tent.' 'Come to' is
    idiomatic English for the imperative πρόσελθε with ἐπί here.
- source_word: ἀφʼ ἡμῶν προπέμψουσίν σε
  chosen: some from among us will escort you
  alternatives:
  - we will send you on
  - they will conduct you from us
  lexicon: LSJ
  rationale: προπέμπω commonly means to send onward or escort. Because the verb is
    plural while the phrase literally says 'from us,' the sense is that members of
    their group will accompany her onward. This avoids a wooden rendering while staying
    close to the Greek.
- source_word: ἕως παραδῶσίν σε εἰς χεῖρας αὐτοῦ
  chosen: until they hand you over into his hands
  alternatives:
  - until they deliver you into his hands
  - until they present you to him
  lexicon: LSJ
  rationale: παραδίδωμι plus εἰς χεῖρας is a standard idiom for handing someone over
    into another's control. 'Into his hands' preserves the concrete idiom and its
    force.
