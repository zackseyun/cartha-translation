theological_decisions:
- issue: Rendering κύριος for a human ruler
  chosen_reading: our lord
  alternative_readings:
  - our master
  rationale: The speaker refers to a human superior, not Israel's God. Per doctrine,
    κύριος is normally 'Lord,' but in this lower-case human context 'lord' best preserves
    the social title without importing divine overtones.
