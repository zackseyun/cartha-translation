id: JDT.10.15
reference: Judith 10:15
source:
  edition: lxx-swete-1909
  text: καὶ εἶπαν πρὸς αὐτὴν Σέσωκας τὴν ψυχήν σου σπεύσασα καταβῆναι εἰς πρόσωπον
    τοῦ κυρίου ἡμῶν· καὶ νῦν πρόσελθε ἐπὶ τὴν σκηνὴν αὐτοῦ, καὶ ἀφʼ ἡμῶν προπέμψουσίν
    σε ἕως παραδῶσίν σε εἰς χεῖρας αὐτοῦ.
