id: JDT.10.9
reference: Judith 10:9
source:
  edition: lxx-swete-1909
  text: καὶ εἶπε πρὸς αὐτούς Ἐπιτάξατε ἀνοῖξαί μοι τὴν πύλην τῆς πόλεως, καὶ ἐξελεύσομαι
    εἰς τελείωσιν τῶν λόγων ὧν ἐλαλήσατε μετʼ ἐμοῦ· καὶ συνέταξαν τοῖς νεανίσκοις
    ἀνοῖξαι αὐτῇ καθὼς ἐλάλησαν.
  language: Greek
