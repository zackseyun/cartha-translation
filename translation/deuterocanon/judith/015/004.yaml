theological_decisions:
- issue: Violence language in a military narrative
  chosen_reading: for their destruction
  alternative_readings:
  - to destroy them
  - for their slaughter
  rationale: The Greek explicitly expresses a purpose of annihilating the enemies.
    The translation preserves the text's severity without softening it or heightening
    it beyond the lexical sense.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source warrants.'
