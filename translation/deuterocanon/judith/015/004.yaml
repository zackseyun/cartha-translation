translation:
  text: And Uzziah sent men to Bethomesthaim and Choba and Chola, and to all the territory
    of Israel, to report what had happened, and that all should rush out against the
    enemies for their destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'that all might be poured out against the enemies,' an
      idiom for people streaming out en masse to attack.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Standard narrative verb for sending; 'sent' is natural and sufficiently
    formal.
- source_word: Ὀζίας
  chosen: Uzziah
  alternatives:
  - Ozias
  rationale: Standard English transliteration of the Greek name; follows the philosophy
    of transliterating personal names rather than preserving older Latinate forms.
- source_word: Βαιτομασθαΐμ
  chosen: Bethomesthaim
  alternatives:
  - Baitomasthem
  - Bethomasthaim
  rationale: Place name transliterated directly from the Greek form in Swete; exact
    English conventional form is uncertain, so a close transliteration is preferred.
- source_word: Χωβὰι
  chosen: Choba
  alternatives:
  - Chobai
  - Hobai
  rationale: Place name transliterated from the Greek; English tradition varies, so
    a straightforward transliteration is used.
- source_word: Χωλὰ
  chosen: Chola
  alternatives:
  - Hola
  - Cholai
  rationale: Place name transliterated from the Greek form.
- source_word: πᾶν ὅριον Ἰσραήλ
  chosen: all the territory of Israel
  alternatives:
  - every region of Israel
  - all the borders of Israel
  lexicon: BDAG
  rationale: ὅριον can denote region, territory, or borderland. Here the sense is
    the whole extent of Israelite territory, not merely boundary lines.
- source_word: τοὺς ἀπαγγέλλοντας
  chosen: men to report
  alternatives:
  - messengers announcing
  - those reporting
  lexicon: BDAG
  rationale: 'The participle functions substantivally and describes the persons sent
    and their purpose. English idiom prefers making the implied object explicit: ''sent
    men ... to report.'''
- source_word: ὑπὲρ τῶν συντετελεσμένων
  chosen: what had happened
  alternatives:
  - the things that had been accomplished
  - what had been done
  lexicon: BDAG
  rationale: The perfect participle points to completed events. 'What had happened'
    is idiomatic and fits the narrative context of reporting Judith's victory.
- source_word: ἵνα πάντες ἐκχυθῶσιν
  chosen: that all should rush out
  alternatives:
  - that all should pour out
  - that all should be poured forth
  lexicon: LSJ
  rationale: Although literally 'be poured out,' in military context the passive/middle-like
    expression idiomatically conveys people streaming or rushing out en masse.
- source_word: τοῖς πολεμίοις
  chosen: against the enemies
  alternatives:
  - upon the enemies
  - at the enemies
  lexicon: BDAG
  rationale: With the motion verb, the dative is best represented idiomatically in
    English as hostile movement against the enemies.
- source_word: εἰς τὴν ἀναίρεσιν αὐτῶν
  chosen: for their destruction
  alternatives:
  - for their removal
  - to destroy them
  - for their slaughter
  lexicon: BDAG
  rationale: ἀναίρεσις in this military setting denotes violent elimination or destruction.
    'For their destruction' preserves the purpose sense without over-specifying method.
