id: JDT.15.5
reference: Judith 15:5
source:
  edition: lxx-swete-1909
  text: ὡς δὲ ἤκουσαν οἱ υἱοὶ Ἰσραήλ, πάντες ὁμοθυμαδὸν ἐπέπεσον ἐπʼ αὐτοὺς καὶ ἔκοπτον
    αὐτοὺς ἕως Χωβά. ὡσαύτως δὲ καὶ οἱ ἐξ Ἰερουσαλὴμ παρεγενήθησαν καὶ ἐκ πάσης τῆς
    ὀρεινῆς, ἀνήγγειλαν γὰρ αὐτοῖς τὰ γεγονότα τῇ παρεμβολῇ τῶν ἐχθρῶν αὐτῶν· καὶ
    οἱ ἐν Γαλαὰδ καὶ οἱ ἐν τῇ Γαλειλαίᾳ ὑπερεκέρασαν αὐτοὺς πληγῇ μεγάλῃ, ἕως οὗ παρῆλθον
    Δαμασκὸν καὶ τὰ ὅρια αὐτῆς.
  language: Greek
  pages:
