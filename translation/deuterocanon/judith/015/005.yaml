translation:
  text: But when the sons of Israel heard, they all together fell upon them and kept
    striking them down as far as Choba. Likewise, those from Jerusalem and from all
    the hill country also arrived, for the things that had happened in the camp of
    their enemies had been reported to them; and those in Gilead and those in Galilee
    outflanked them with a great slaughter, until they had passed Damascus and its
    borders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Greek reads literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Outflanked them'' renders a military verb that can also suggest getting
      beyond them or cutting them off during pursuit.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with a severe blow' / 'with a great stroke.' In this battle context
      the phrase likely refers to heavy slaughter.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: A formally transparent rendering preserves the idiom and the masculine
    familial expression present in the Greek. 'Israelites' is smoother English, but
    'sons of Israel' better reflects the source wording and aligns with the project's
    gender-accurate policy.
- source_word: ὁμοθυμαδόν
  chosen: all together
  alternatives:
  - with one accord
  - unanimously
  lexicon: BDAG
  rationale: The term conveys united action or common purpose. 'All together' is natural
    modern English while still preserving the collective force without sounding archaic
    like 'with one accord.'
- source_word: ἐπέπεσον ἐπʼ αὐτούς
  chosen: fell upon them
  alternatives:
  - attacked them
  - rushed upon them
  lexicon: LSJ
  rationale: The idiom is vivid and martial. 'Fell upon them' preserves the force
    of the Greek better than the flatter 'attacked them.'
- source_word: ἔκοπτον αὐτούς
  chosen: kept striking them down
  alternatives:
  - cut them down
  - were beating them
  - struck them
  lexicon: LSJ
  rationale: The imperfect suggests ongoing action. 'Kept striking them down' captures
    the repeated, sustained attack better than a simple past. 'Cut them down' is possible
    in military context, but 'striking down' is broader and avoids over-specifying
    the weapon.
- source_word: ἕως Χωβά
  chosen: as far as Choba
  alternatives:
  - until Choba
  lexicon: LSJ
  rationale: ἕως with a place name is naturally rendered as a spatial limit, 'as far
    as.' The place name is transliterated from the Greek witness.
- source_word: οἱ ἐξ Ἰερουσαλήμ
  chosen: those from Jerusalem
  alternatives:
  - the men from Jerusalem
  lexicon: LSJ
  rationale: The Greek identifies people by origin without an explicit noun. 'Those
    from Jerusalem' is idiomatic and sufficiently literal.
- source_word: ἐκ πάσης τῆς ὀρεινῆς
  chosen: from all the hill country
  alternatives:
  - from the whole mountainous region
  - from all the highlands
  lexicon: LSJ
  rationale: τῆς ὀρεινῆς refers to the hill country/highland region. 'Hill country'
    is a standard, readable geographic rendering in biblical English.
- source_word: παρεγενήθησαν
  chosen: arrived
  alternatives:
  - came
  - were present
  lexicon: BDAG
  rationale: In context the verb indicates coming onto the scene. 'Arrived' gives
    the narrative sense clearly.
- source_word: τὰ γεγονότα
  chosen: the things that had happened
  alternatives:
  - the events
  - what had happened
  lexicon: LSJ
  rationale: This phrase refers to the events that had taken place. The fuller wording
    is slightly more transparent to the Greek participial form than the compressed
    'the events.'
- source_word: τῇ παρεμβολῇ
  chosen: the camp
  alternatives:
  - the encampment
  lexicon: LSJ
  rationale: In military context παρεμβολή means camp/encampment. 'Camp' is the most
    natural English rendering.
- source_word: τῶν ἐχθρῶν αὐτῶν
  chosen: of their enemies
  alternatives:
  - of the enemies
  lexicon: LSJ
  rationale: The possessive pronoun is retained because it is present in the Greek
    and clarifies whose camp is meant.
- source_word: ὑπερεκέρασαν αὐτούς
  chosen: outflanked them
  alternatives:
  - surpassed them
  - cut them off
  - got beyond them
  lexicon: LSJ
  rationale: In this military pursuit context, the compound verb suggests getting
    beyond or around the fleeing enemy. 'Outflanked them' best conveys the tactical
    sense in readable English, though the exact nuance could also be expressed as
    cutting them off.
- source_word: πληγῇ μεγάλῃ
  chosen: with a great slaughter
  alternatives:
  - with a great blow
  - with a severe defeat
  - with a great stroke
  lexicon: LSJ
  rationale: πληγή can mean blow, stroke, or plague, but in battle narrative it denotes
    a heavy striking or slaughter. 'With a great slaughter' communicates the military
    result more clearly in English.
- source_word: ἕως οὗ παρῆλθον Δαμασκὸν καὶ τὰ ὅρια αὐτῆς
  chosen: until they had passed Damascus and its borders
  alternatives:
  - until they went beyond Damascus and its territory
  - as far as Damascus and its borders
  lexicon: LSJ
  rationale: παρῆλθον naturally means 'passed' or 'went beyond.' The phrase indicates
    pursuit extending beyond Damascus into its surrounding territory. 'Its borders'
    renders τὰ ὅρια αὐτῆς straightforwardly.
