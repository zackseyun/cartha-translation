translation:
  text: And those encamped in the hill country around Bethulia turned to flight; then
    the sons of Israel, every man a warrior, poured out against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites'; Greek 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fled'; literally 'turned to flight.'
    reason: lexical_alternative
  - marker: c
    text: Or 'rushed out against them'; literally 'were poured out against them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ παρεμβεβληκότες
  chosen: those encamped
  alternatives:
  - those who had camped
  - the ones stationed
  lexicon: BDAG
  rationale: Perfect participle of παρεμβάλλω used substantivally; denotes those in
    camp or deployed in encampment. 'Those encamped' is concise and natural while
    preserving the military setting.
- source_word: ἐν τῇ ὀρεινῇ
  chosen: in the hill country
  alternatives:
  - in the mountainous region
  - in the highlands
  lexicon: LSJ
  rationale: ὀρεινή commonly denotes hill country/highland region rather than a single
    mountain. 'Hill country' is idiomatic English and fits the geographic sense.
- source_word: κύκλῳ Βαιτυλουὰ
  chosen: around Bethulia
  alternatives:
  - surrounding Bethulia
  - in a circle around Bethulia
  lexicon: LSJ
  rationale: κύκλῳ with a place name indicates spatial encirclement or surrounding
    area. 'Around Bethulia' is the clearest natural rendering.
- source_word: ἐτράπησαν εἰς φυγήν
  chosen: turned to flight
  alternatives:
  - fled
  - were routed into flight
  lexicon: BDAG
  rationale: The idiom literally means 'were turned into flight' or 'turned to flight.'
    'Turned to flight' preserves the vividness and military nuance better than the
    flatter 'fled.'
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: The Greek is the traditional ethnic expression 'sons of Israel.' In keeping
    with gender-accurate policy and source transparency, this is retained rather than
    flattened to 'Israelites,' though the latter is a viable idiomatic alternative.
- source_word: πᾶς ἀνὴρ πολεμιστής
  chosen: every man who was a warrior
  alternatives:
  - every warrior
  - every fighting man
  lexicon: BDAG
  rationale: ἀνήρ is explicitly masculine singular used distributively with πᾶς; πολεμιστής
    specifies warrior. 'Every man who was a warrior' preserves both the distributive
    force and the masculine wording of the source.
- source_word: ἐξέχυθησαν ἐπʼ αὐτούς
  chosen: poured out against them
  alternatives:
  - rushed out against them
  - swarmed upon them
  lexicon: BDAG
  rationale: From ἐκχέω, literally 'were poured out,' used metaphorically for a force
    surging forth. 'Poured out against them' keeps the vivid metaphor while remaining
    intelligible in English.
