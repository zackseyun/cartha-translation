id: JDT.15.10
reference: Judith 15:10
source:
  edition: lxx-swete-1909
  text: ἐποίησας πάντα ταῦτα ἐν χειρί σου, ἐποίησας τὰ ἀγαθὰ μετὰ Ἰσραήλ, καὶ εὐδόκησεν
    ἐπʼ αὐτοῖς ὁ θεός· εὐλογημένη γίνου παρὰ τῷ παντοκράτορι κυρίῳ εἰς τὸν αἰῶνα χρόνον.
  language: Greek
