theological_decisions:
- issue: Rendering of κύριος in a deuterocanonical Greek blessing formula
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project default for κύριος is 'Lord.' Nothing in this context warrants
    deviation, and 'Master' would sound less like a divine title in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of εὐλογημένη γίνου
  chosen_reading: May you be blessed
  alternative_readings:
  - Be blessed
  rationale: The Greek imperative in blessing context functions performatively/wish-like.
    Rendering it with 'May you be blessed' preserves the benedictory force without
    making it sound like a mere command.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English,
    preserve source sense'
