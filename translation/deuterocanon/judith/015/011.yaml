translation:
  text: And all the people said, “Amen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “May it be so,” literally reflecting the Greek optative.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective introducing the next action; simple coordination
    is sufficient in English.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said' in this brief narrative
    clause.
- source_word: πᾶς ὁ λαός
  chosen: all the people
  alternatives:
  - the whole people
  - all the assembly
  lexicon: BDAG
  rationale: The phrase is collective and straightforward; 'all the people' is natural
    modern English and preserves the comprehensiveness of πᾶς with the collective
    noun λαός.
- source_word: Γένοιτο
  chosen: Amen
  alternatives:
  - May it be so
  - So be it
  lexicon: BDAG
  rationale: Although γένοιτο literally means 'may it happen/be so,' in this responsive
    liturgical setting it functions idiomatically as an assent formula. 'Amen' best
    captures the congregational response in concise, natural English, while the more
    literal sense is preserved in a footnote.
