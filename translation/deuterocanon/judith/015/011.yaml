theological_decisions:
- issue: Rendering the congregational acclamation Γένοιτο
  chosen_reading: Amen
  alternative_readings:
  - May it be so
  - So be it
  rationale: This is not a doctrinally weighty contested term, but it is a significant
    interpretive choice. The Greek optative expresses assent/wish; in context, an
    English liturgical response 'Amen' communicates the force more naturally than
    a wooden literalism. The literal alternative is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §1, §6
