translation:
  text: And when they came to her, they all with one accord blessed her and said to
    her, “You are the glory of Jerusalem, you are the great boast of Israel, you are
    the great pride of our people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the height of Jerusalem' for 'the exaltation of Jerusalem'; the Greek
      term evokes being lifted high.
    reason: lexical_alternative
  - marker: b
    text: Or 'the great cause for boasting of our people' for 'the great glory of
      our people.' The Greek noun can also be rendered 'boast.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθον πρὸς αὐτήν
  chosen: entered to her
  alternatives:
  - came to her
  - went in to her
  - approached her
  lexicon: LSJ
  rationale: The phrase is literally 'entered to/toward her.' In context it describes
    the leaders coming into Judith's presence. 'Entered to her' preserves the directional
    force of πρὸς and the formal tone without over-paraphrasing to merely 'came.'
- source_word: εὐλόγησαν
  chosen: blessed
  alternatives:
  - praised
  - spoke well of
  lexicon: LSJ
  rationale: The verb commonly means 'bless' or 'speak well of.' Here the following
    acclamations are benedictory and honorific, so 'blessed' best preserves the source
    wording and elevated register.
- source_word: πάντες ὁμοθυμαδόν
  chosen: they all with one accord
  alternatives:
  - all together
  - all unanimously
  lexicon: LSJ
  rationale: ὁμοθυμαδόν conveys united purpose or unanimity. 'With one accord' is
    a natural English equivalent that preserves the collective emphasis of πάντες.
- source_word: ὕψωμα
  chosen: the exaltation
  alternatives:
  - the height
  - the pride
  - the glory
  lexicon: LSJ
  rationale: ὕψωμα literally denotes height or exalted state. In this acclamation
    Judith is called the one by whom Jerusalem is lifted high. 'Exaltation' preserves
    that metaphor better than the more interpretive 'pride' or the broader 'glory.'
- source_word: γαυρίαμα
  chosen: the great boast
  alternatives:
  - the great pride
  - the great exultation
  lexicon: LSJ
  rationale: The noun denotes a matter of pride or boasting. 'Boast' keeps the concrete
    sense of something in which Israel boasts, while 'pride' could suggest an internal
    feeling rather than public acclaim.
- source_word: καύχημα
  chosen: the great glory
  alternatives:
  - the great boast
  - the great cause for boasting
  lexicon: LSJ
  rationale: Although καύχημα often means 'boast' or 'ground of boasting,' rendering
    both γαυρίαμα and καύχημα identically would flatten the rhetorical variation.
    'Glory' captures the honorific sense in context while preserving the climactic
    praise directed to Judith.
- source_word: τοῦ γένους ἡμῶν
  chosen: of our people
  alternatives:
  - of our race
  - of our family line
  - of our nation
  lexicon: LSJ
  rationale: γένος can mean stock, kin-group, or people. 'Our people' is idiomatic
    modern English and avoids the misleading modern connotations of 'race' while retaining
    the collective ethnic sense.
