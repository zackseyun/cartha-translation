theological_decisions:
- issue: Honorific acclamation of Judith using elevated civic-national titles
  chosen_reading: Render the titles straightforwardly as communal praise without softening
    them into mere compliments.
  alternative_readings:
  - Use more interpretive language such as 'You are Jerusalem's pride' throughout
  rationale: The Greek presents a formal public blessing with three parallel predicates.
    The translation preserves the elevated rhetoric and does not reduce the force
    of Judith's celebrated role in Israel's deliverance.
