id: JDT.15.7
reference: Judith 15:7
source:
  edition: lxx-swete-1909
  text: οἱ δὲ υἱοὶ Ἰσραὴλ ἀναστρέψαντες ἀπὸ τῆς κοπῆς ἐκυρίευσαν τῶν λοιπῶν, καὶ αἱ
    κῶμαι καὶ ἐπαύλεις ἐν τῇ ὀρεινῇ καὶ πεδινῇ ἐκράτησαν πολλῶν λαφύρων, ἦν γὰρ πλῆθος
    πολὺ σφόδρα.
