translation:
  text: And when those who were in the tents heard, they were astonished at what had
    happened,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: LSJ
  rationale: Standard connective; simple coordination best preserves the narrative
    flow without adding temporal nuance beyond the Greek.
- source_word: ὡς
  chosen: when
  alternatives:
  - as soon as
  - as
  lexicon: LSJ
  rationale: In this context with the aorist ἤκουσαν, ὡς introduces a temporal clause.
    'When' is natural English and avoids overstating immediacy that 'as soon as' might
    suggest.
- source_word: ἤκουσαν
  chosen: heard
  alternatives:
  - learned
  - came to hear
  lexicon: LSJ
  rationale: The basic sense is auditory reception or hearing news. 'Heard' is the
    most direct and least interpretive rendering in context.
- source_word: οἱ ἐν τοῖς σκηνώμασιν ὄντες
  chosen: those who were in the tents
  alternatives:
  - the men in the tents
  - those in the camp shelters
  lexicon: LSJ
  rationale: This participial phrase is literally 'those being in the tents/dwellings.'
    'Those who were in the tents' preserves the Greek structure and avoids specifying
    'men' where the text does not explicitly do so.
- source_word: σκηνώμασιν
  chosen: tents
  alternatives:
  - encampments
  - dwellings
  - tabernacles
  lexicon: LSJ
  rationale: In the military setting of Judith, 'tents' is the most contextually appropriate
    and idiomatic rendering. 'Tabernacles' would sound archaic and misleading here.
- source_word: ἐξέστησαν
  chosen: were astonished
  alternatives:
  - were beside themselves
  - were amazed
  - were thrown into confusion
  lexicon: LSJ
  rationale: The verb can denote being astounded or beside oneself. Here the reaction
    to the event is shock and amazement; 'were astonished' communicates that clearly
    in modern English without excessive idiom.
- source_word: ἐπὶ τὸ γεγονός
  chosen: at what had happened
  alternatives:
  - at the event
  - because of what had happened
  - over the occurrence
  lexicon: LSJ
  rationale: The phrase refers to the accomplished event or occurrence. 'At what had
    happened' is idiomatic English that captures the perfective force of γεγονός better
    than the wooden 'at the event.'
