id: JDT.15.14
reference: Judith 15:14
source:
  edition: lxx-swete-1909
  text: Καὶ συνέδραμεν πᾶσα γυνὴ Ἰσραὴλ τοῦ ἰδεῖν αὐτήν, καὶ εὐλόγησαν αὐτήν, καὶ
    ἐποίησαν αὐτῇ χορὸν ἐξ αὐτῶν· καὶ ἔλαβεν θύρσους ἐν ταῖς χερσὶν αὐτῆς, καὶ ἔδωκεν
    ταῖς γυναιξὶν ταῖς μετʼ αὐτῆς,
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 826
  - 827
  - 828
  - 829
  - 830
  - 831
  confidence: high
  validation: major_mismatch
translation:
  text: And every woman of Israel ran together to see her, and they blessed her, and
    they made a dance for her from among themselves; and she took thyrsi in her hands
    and gave them to the women with her,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the women of Israel ran together.' The Greek uses a collective singular
      ('every woman of Israel').
    reason: lexical_alternative
  - marker: b
    text: '''Thyrsi'' are festal staffs or wands, often associated in Greek usage
      with celebratory processions.'
    reason: cultural_note
lexical_decisions:
- source_word: συνέδραμεν
  chosen: ran together
  alternatives:
  - gathered together
  - came together in haste
  lexicon: LSJ
  rationale: The verb conveys converging quickly or rushing together. 'Ran together'
    preserves the vividness and collective movement better than the flatter 'gathered
    together.'
- source_word: πᾶσα γυνὴ Ἰσραήλ
  chosen: every woman of Israel
  alternatives:
  - all the women of Israel
  - every Israelite woman
  lexicon: LSJ
  rationale: Although the collective singular can be rendered idiomatically as a plural
    in English, 'every woman of Israel' stays closer to the Greek while remaining
    natural enough.
- source_word: τοῦ ἰδεῖν αὐτήν
  chosen: to see her
  alternatives:
  - in order to see her
  - to look at her
  lexicon: LSJ
  rationale: This articular infinitive expresses purpose. 'To see her' is concise
    and clear in English.
- source_word: εὐλόγησαν
  chosen: blessed
  alternatives:
  - praised
  - spoke well of
  lexicon: LSJ
  rationale: The verb commonly means 'bless.' In this celebratory context it may overlap
    with praise, but 'blessed' best preserves the source wording and its honorific-religious
    resonance.
- source_word: ἐποίησαν αὐτῇ χορὸν
  chosen: made a dance for her
  alternatives:
  - formed a dance for her
  - made a chorus for her
  lexicon: LSJ
  rationale: χορὸς can denote a dancing group or round dance. 'Made a dance for her'
    captures the festive action without importing a specifically musical 'chorus'
    sense.
- source_word: ἐξ αὐτῶν
  chosen: from among themselves
  alternatives:
  - from among them
  - out of their number
  lexicon: LSJ
  rationale: The phrase indicates that the women themselves constituted the dancing
    group. 'From among themselves' makes that reflexive sense explicit in idiomatic
    English.
- source_word: θύρσους
  chosen: thyrsi
  alternatives:
  - festal staffs
  - ivy-wreathed staffs
  - wands
  lexicon: LSJ
  rationale: The noun refers to ritual/festive staffs. Because no simple English equivalent
    fully captures the cultural object, the transliteration 'thyrsi' preserves the
    specificity; a cultural footnote explains it.
- source_word: ταῖς γυναιξὶν ταῖς μετʼ αὐτῆς
  chosen: the women with her
  alternatives:
  - the women who were with her
  - her accompanying women
  lexicon: LSJ
  rationale: This straightforwardly refers to the women accompanying Judith. 'The
    women with her' is natural and sufficiently precise.
