translation:
  text: But the rest, those living in Bethulia, fell upon the camp of Assyria, and
    they pursued them and plundered it greatly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Assyrian camp.' The Greek reads literally 'the camp of Assyria.'
    reason: lexical_alternative
  - marker: b
    text: The Greek expression literally says 'they went after them'; in this battle
      context it means 'they pursued them.'
    reason: lexical_alternative
  - marker: c
    text: The final clause could also be rendered 'and they plundered it very much'
      or 'and they took a great amount of spoil from it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ λοιποὶ
  chosen: But the rest
  alternatives:
  - And the rest
  - Now the rest
  lexicon: BDAG
  rationale: οἱ λοιποί means 'the rest' or 'the remainder'; δέ is lightly adversative
    or continuative here, best carried by 'But' in English to mark the shift from
    the previous group to those remaining in Bethulia.
- source_word: οἱ κατοικοῦντες Βαιτυλουὰ
  chosen: those living in Bethulia
  alternatives:
  - those dwelling in Bethulia
  - the inhabitants of Bethulia
  lexicon: BDAG
  rationale: The participle κατοικοῦντες denotes residing or living in a place. 'Those
    living in Bethulia' is natural modern English while preserving the participial
    sense. The place name is transliterated.
- source_word: ἐπέπεσαν
  chosen: fell upon
  alternatives:
  - attacked
  - rushed upon
  lexicon: BDAG
  rationale: The verb conveys a sudden hostile assault. 'Fell upon' preserves the
    vividness and military force of the Greek more closely than the flatter 'attacked.'
- source_word: τῇ παρεμβολῇ Ἀσσούρ
  chosen: the camp of Assyria
  alternatives:
  - the Assyrian camp
  - the encampment of Assyria
  lexicon: BDAG
  rationale: παρεμβολή commonly means camp or encampment in military contexts. The
    genitive Ἀσσούρ is rendered as 'of Assyria' to reflect the Greek form directly,
    though 'Assyrian camp' would also be idiomatic.
- source_word: ἐπορεύοντο αὐτούς
  chosen: they pursued them
  alternatives:
  - they went after them
  - they pressed after them
  lexicon: BDAG
  rationale: Though πορεύομαι often means simply 'go' or 'travel,' with a personal
    object in this military context it carries the sense of going after or pursuing.
    'They pursued them' best fits the context of a routed enemy.
- source_word: ἐλούτησαν σφόδρα
  chosen: plundered it greatly
  alternatives:
  - plundered it extensively
  - took very much spoil from it
  lexicon: BDAG
  rationale: The verb means to plunder or despoil. Since the nearest singular antecedent
    is 'camp,' the object is rendered as 'it.' σφόδρα intensifies the action; 'greatly'
    is somewhat literal, though slightly wooden, and preserves the emphasis without
    overexpansion.
