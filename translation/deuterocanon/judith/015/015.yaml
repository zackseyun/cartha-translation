  - 831
  validation: no_reference
translation:
  text: And they crowned her with an olive wreath, she and the women with her. And
    she went out before all the people in the dance, leading all the women, and every
    man of Israel followed, armed, with wreaths and with hymns in their mouths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'they crowned the olive on her'; the Greek likely means they
      adorned her with an olive wreath, a festive or victory garland.
    reason: lexical_alternative
  - marker: b
    text: Or 'with dancing' / 'in a dance procession'; the Greek χορεία can refer
      to dancing as an activity or to an organized choral dance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐστεφανώσαντο
  chosen: they crowned
  alternatives:
  - they garlanded
  - they placed wreaths on
  lexicon: LSJ
  rationale: The verb denotes adorning with a wreath or crown. 'They crowned' is concise
    and natural English, while the object and context make clear this is a festal
    wreathing rather than royal enthronement.
- source_word: τὴν ἐλαίαν
  chosen: with an olive wreath
  alternatives:
  - the olive
  - the olive branch
  - the olive crown
  lexicon: LSJ
  rationale: Literally 'the olive,' but in this ceremonial context after στεφανόω
    it refers to an olive wreath/crown placed on her. Rendering the implied object
    avoids an opaque literalism in English.
- source_word: αὐτὴ καὶ αἱ μετʼ αὐτῆς
  chosen: she and the women with her
  alternatives:
  - her and those with her
  - she and her companions
  lexicon: LSJ
  rationale: The phrase indicates Judith together with the women accompanying her
    shared in the wreathing. 'The women with her' makes the feminine referent explicit
    from the following context of γυναῖκες.
- source_word: προῆλθεν
  chosen: she went out before
  alternatives:
  - she came forward before
  - she proceeded before
  lexicon: LSJ
  rationale: The verb conveys moving forward at the head of the procession. 'Went
    out before' fits the public procession context and preserves her leading position.
- source_word: ἐν χορείᾳ
  chosen: in the dance
  alternatives:
  - in dancing
  - in a dance procession
  - with dancing
  lexicon: LSJ
  rationale: The noun can denote dancing or a choral/dance formation. 'In the dance'
    preserves the concrete festal procession sense without over-specifying technical
    choreography.
- source_word: ἡγουμένη
  chosen: leading
  alternatives:
  - guiding
  - going before as leader
  lexicon: LSJ
  rationale: This participle explains Judith's role in the procession. 'Leading' is
    the most direct and idiomatic rendering.
- source_word: ἐνωπλισμένοι
  chosen: armed
  alternatives:
  - equipped with weapons
  - in arms
  lexicon: LSJ
  rationale: The participle straightforwardly means armed or equipped for battle.
    'Armed' is clear and compact.
- source_word: μετὰ στεφάνων
  chosen: with wreaths
  alternatives:
  - with crowns
  - wearing garlands
  lexicon: LSJ
  rationale: In a victory celebration context, στεφάνων refers to festal/victory wreaths
    rather than royal crowns. 'Wreaths' best matches the imagery.
- source_word: ὕμνων ἐν τῷ στόματι αὐτῶν
  chosen: with hymns in their mouths
  alternatives:
  - singing hymns
  - with songs on their lips
  lexicon: LSJ
  rationale: The Greek is vivid and concrete. 'With hymns in their mouths' preserves
    the image more closely than a smoother paraphrase, while remaining intelligible.
