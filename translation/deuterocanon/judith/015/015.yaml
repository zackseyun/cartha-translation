id: JDT.15.15
reference: Judith 15:15
source:
  edition: lxx-swete-1909
  text: καὶ ἐστεφανώσαντο τὴν ἐλαίαν αὐτὴ καὶ αἱ μετʼ αὐτῆς· καὶ προῆλθεν παντὸς τοῦ
    λαοῦ ἐν χορείᾳ ἡγουμένη πασῶν τῶν γυναικῶν, καὶ ἠκολούθει πᾶς ἀνὴρ Ἰσραὴλ ἐνωπλισμένοι
    μετὰ στεφάνων καὶ ὕμνων ἐν τῷ στόματι αὐτῶν.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 826
  - 827
  - 828
  - 829
