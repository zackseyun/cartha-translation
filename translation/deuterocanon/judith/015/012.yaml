translation:
  text: And all the people plundered the camp for thirty days,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'took as spoil the camp for thirty days.' The Greek verb emphasizes seizure
      of war booty.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλαφύρευσεν
  chosen: plundered
  alternatives:
  - spoiled
  - took as booty
  lexicon: LSJ
  rationale: The verb denotes taking spoils from a defeated enemy. 'Plundered' is
    clear modern English and preserves the military sense better than the archaic
    'spoiled,' while being less cumbersome than 'took as booty.'
- source_word: πᾶς ὁ λαός
  chosen: all the people
  alternatives:
  - the whole people
  - all the army
  lexicon: LSJ
  rationale: The phrase straightforwardly means the entire people/group. 'All the
    people' is the most natural English rendering. 'Army' would over-specify beyond
    the Greek.
- source_word: τὴν παρεμβολήν
  chosen: the camp
  alternatives:
  - the encampment
  - the army camp
  lexicon: LSJ
  rationale: In this military context παρεμβολή refers to the enemy encampment. 'The
    camp' is idiomatic and sufficient in English; 'encampment' is more formal but
    less natural.
- source_word: ἐφʼ ἡμέρας τριάκοντα
  chosen: for thirty days
  alternatives:
  - for a period of thirty days
  - throughout thirty days
  lexicon: LSJ
  rationale: The prepositional phrase expresses duration. 'For thirty days' is the
    natural English equivalent and preserves the temporal extent without unnecessary
    expansion.
