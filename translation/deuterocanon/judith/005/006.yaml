lexical_decisions:
- source_word: ὁ λαὸς οὗτός
  chosen: These people
  alternatives:
  - This people
  - This nation
  lexicon: BDAG
  rationale: λαός commonly means 'people' as a collective group. In English, 'these
    people' is natural and preserves the demonstrative force of οὗτός without sounding
    archaic like 'this people.' 'Nation' is possible in some contexts, but here the
    statement identifies ethnic origin rather than political status.
- source_word: εἰσιν
  chosen: are
  alternatives:
  - is
  lexicon: BDAG
  rationale: The verb is plural, agreeing with the collective sense expressed in English
    as 'these people are.'
- source_word: ἀπόγονοι
  chosen: descendants
  alternatives:
  - offspring
  - posterity
  lexicon: BDAG
  rationale: ἀπόγονοι denotes those descended from ancestors. 'Descendants' is clear,
    contemporary English and fits the genealogical claim. 'Offspring' can sound more
    immediate or biological; 'posterity' is more formal and less natural here.
- source_word: Χαλδαίων
  chosen: the Chaldeans
  alternatives:
  - Chaldeans
  lexicon: BDAG
  rationale: The genitive plural identifies the ancestral group. 'The Chaldeans' is
    idiomatic in English for an ethnonym used with article-like force. Capitalization
    reflects a proper ethnic designation.
