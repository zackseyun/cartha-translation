translation:
  text: But if there is no lawlessness in their nation, let my lord pass by, lest
    perhaps their Lord and their God defend them, and we become a reproach before
    all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''let the lord pass by.'' In context this is best understood as
      a respectful address to Holofernes (''my lord''), not a reference to God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνομία
  chosen: lawlessness
  alternatives:
  - wrongdoing
  - iniquity
  - transgression
  lexicon: BDAG
  rationale: ἀνομία denotes violation of law or wickedness. 'Lawlessness' preserves
    the legal-moral force without narrowing it to a single act.
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - people
  lexicon: BDAG
  rationale: In this context it refers to Israel as a collective national people.
    'Nation' fits the political-ethnic sense better than the more generic 'people'.
- source_word: παρελθέτω
  chosen: let my lord pass by
  alternatives:
  - let the lord pass by
  - move on
  - advance
  lexicon: BDAG
  rationale: The verb is an imperative meaning 'pass by' or 'go past.' Because the
    Greek has ὁ κύριος without an explicit possessive, context indicates Holofernes
    is being addressed respectfully; English idiom requires 'my lord' to reflect the
    courtly address rather than suggesting God here.
- source_word: μή ποτε
  chosen: lest ... perhaps
  alternatives:
  - lest
  - otherwise perhaps
  lexicon: BDAG
  rationale: The combination introduces a warning of possible undesirable outcome.
    Rendering both elements captures the cautionary nuance.
- source_word: ὑπερασπίσῃ
  chosen: defend
  alternatives:
  - shield
  - protect
  - fight for
  lexicon: LSJ
  rationale: The verb means to defend or champion someone. 'Defend' is clear modern
    English and preserves the military-legal sense in context.
- source_word: ὀνειδισμός
  chosen: reproach
  alternatives:
  - disgrace
  - mockery
  - shame
  lexicon: BDAG
  rationale: The term denotes public disgrace or object of scorn. 'Reproach' preserves
    the external, dishonoring aspect and fits the elevated tone.
- source_word: πάσης τῆς γῆς
  chosen: all the earth
  alternatives:
  - the whole land
  - all the world
  lexicon: BDAG
  rationale: γῆ can mean land or earth. Here the phrase is expansive and rhetorical,
    so 'all the earth' best reflects the Greek wording and scope.
- source_word: κύριος
  chosen: Lord / my lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: The first occurrence refers contextually to the human superior being
    addressed, so English idiom uses 'my lord.' The later occurrence refers to Israel's
    deity and is rendered 'Lord' per project policy for κύριος.
