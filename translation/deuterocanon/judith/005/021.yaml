theological_decisions:
- issue: Distinguishing the two occurrences of κύριος in one sentence
  chosen_reading: First κύριος rendered as 'my lord' for the human addressee; second
    κύριος rendered as 'their Lord' for God
  alternative_readings:
  - Render both as 'lord' and leave the ambiguity unresolved
  rationale: The syntax alone could leave the first occurrence formally ambiguous,
    but the immediate discourse is advice to Holofernes, making a respectful human
    address most likely. The second occurrence is explicitly paired with 'their God,'
    requiring a divine referent. This preserves the narrative sense without importing
    extra theology.
  doctrine_reference: 'DOCTRINE.md: κύριος default ''Lord''; translate titles according
    to sense'
