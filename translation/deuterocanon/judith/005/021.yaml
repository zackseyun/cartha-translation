id: JDT.5.21
reference: Judith 5:21
source:
  edition: lxx-swete-1909
  text: εἰ δὲ οὐκ ἔστιν ἀνομία ἐν τῷ ἔθνει αὐτῶν, παρελθέτω δὴ ὁ κύριος, μή ποτε ὑπερασπίσῃ
    ὁ κύριος αὐτῶν καὶ ὁ θεὸς αὐτῶν ὑπὲρ αὐτῶν, καὶ ἐσόμεθα εἰς ὀνειδισμὸν ἐναντίον
    πάσης τῆς γῆς.
