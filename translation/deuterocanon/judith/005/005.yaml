translation:
  text: And Achior, the leader of all the sons of Ammon, said to him, “Let my lord
    now hear a word from the mouth of your servant, and I will tell you the truth
    about the people who dwell in this hill country near you; and no falsehood will
    come out of the mouth of your servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “of all the Ammonites.” The Greek literally says “of all the sons of
      Ammon.”
    reason: lexical_alternative
  - marker: b
    text: Or “from your servant’s mouth.” The Greek literally says “from the mouth
      of your servant.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀχιὼρ
  chosen: Achior
  rationale: Personal name transliterated by standard convention rather than translated,
    per project philosophy.
- source_word: ὁ ἡγούμενος
  chosen: the leader
  alternatives:
  - the governor
  - the ruler
  - the one leading
  lexicon: BDAG
  rationale: The participial title denotes one who leads or governs. 'Leader' is natural
    modern English and fits the political/military context without overstating a formal
    office.
- source_word: πάντων υἱῶν Ἀμμών
  chosen: of all the sons of Ammon
  alternatives:
  - of all the Ammonites
  - of all the children of Ammon
  lexicon: LEH
  rationale: A relatively formal rendering preserves the underlying filial ethnonym
    υἱῶν Ἀμμών. 'Ammonites' is idiomatic, but 'sons of Ammon' keeps the source texture
    and remains understandable.
- source_word: Ἀκουσάτω δὴ λόγον
  chosen: Let ... now hear a word
  alternatives:
  - Please hear a word
  - Let ... hear what I say
  lexicon: BDAG
  rationale: The third-person imperative with δή is a respectful request. 'Let ...
    now hear a word' preserves the deferential tone and the particle's mild urgency.
- source_word: ὁ κύριός μου
  chosen: my lord
  alternatives:
  - my master
  lexicon: BDAG
  rationale: In direct address to a superior, κύριος functions as a title of respect.
    'My lord' best matches the courtly setting; 'my master' would sound harsher and
    more servile in English.
- source_word: ἐκ στόματος τοῦ δούλου σου
  chosen: from the mouth of your servant
  alternatives:
  - from your servant's mouth
  - from the mouth of your slave
  lexicon: BDAG
  rationale: Although δοῦλος can mean 'slave' in contexts where bonded status is salient,
    here it is a conventional self-humbling court expression. 'Your servant' is the
    best contextual rendering, while preserving the literal 'from the mouth of' idiom.
- source_word: ἀναγγελῶ σοι τὴν ἀλήθειαν
  chosen: I will tell you the truth
  alternatives:
  - I will report the truth to you
  - I will declare the truth to you
  lexicon: BDAG
  rationale: ἀναγγέλλω is 'report/announce/tell.' 'Tell you the truth' is idiomatic
    English that preserves the force of a solemn truthful report.
- source_word: περὶ τοῦ λαοῦ
  chosen: about the people
  alternatives:
  - concerning the people
  lexicon: BDAG
  rationale: Straightforward prepositional sense; 'about' is clear modern English.
- source_word: ὃς κατοικεῖ τὴν ὀρεινὴν ταύτην
  chosen: who dwell in this hill country
  alternatives:
  - who inhabit this mountainous region
  - who live in these hills
  lexicon: LEH
  rationale: τὴν ὀρεινήν refers to a hill or mountain region. 'Hill country' is a
    natural biblical-English equivalent that preserves geographic specificity without
    awkwardness.
- source_word: πλησίον σοῦ οἰκούντος
  chosen: near you
  alternatives:
  - living near you
  - close by where you dwell
  lexicon: BDAG
  rationale: The participle οἰκούντος modifies σοῦ and means 'you dwelling.' In English,
    'near you' communicates the sense cleanly without overloading the sentence.
- source_word: οὐκ ἐξελεύσεται ψεῦδος
  chosen: no falsehood will come out
  alternatives:
  - no lie will go out
  - nothing false will come forth
  lexicon: BDAG
  rationale: The future middle/deponent-style expression is idiomatically rendered
    as speech proceeding from the mouth. 'No falsehood will come out' preserves the
    metaphor and solemn assurance.
