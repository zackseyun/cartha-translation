theological_decisions:
- issue: Rendering of κύριος in a human address
  chosen_reading: my lord
  alternative_readings:
  - my master
  rationale: The term here refers to a human superior, not the divine name or a christological
    title. 'My lord' preserves the respectful courtly register and aligns with the
    project's default for κύριος as 'Lord' while recognizing contextual human usage.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; translate titles
    according to meaning and context.'
- issue: Rendering of δοῦλος in a courtly self-reference
  chosen_reading: your servant
  alternative_readings:
  - your slave
  rationale: Project philosophy prefers 'slave' where bonded status is theologically
    or socially salient. Here the phrase functions as a deferential formula in direct
    speech, so 'servant' better reflects the discourse function without denying the
    lexical range.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; servant/slave
    context-dependent.'
