translation:
  text: And he led them onto the way of Sinai and Kadesh-barnea; and they drove out
    all who were living in the wilderness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the route to Sinai and Kadesh-barnea.' The Greek phrase 'the way
      of Sinai and Kadesh-barnea' may denote the route associated with or leading
      toward those places.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the inhabitants of the wilderness.' The Greek uses a participial
      expression, literally 'all those living in the wilderness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγαγεν
  chosen: led
  alternatives:
  - brought
  - guided
  lexicon: LSJ
  rationale: Aorist of ἄγω commonly means 'lead' or 'bring.' 'Led' fits the travel
    context naturally and preserves the subject's active direction of the people.
- source_word: εἰς ὁδὸν
  chosen: onto the way
  alternatives:
  - into the road
  - by the route
  - to the way
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic for setting someone on a route or journey.
    'Onto the way' keeps the concrete travel imagery without over-paraphrasing.
- source_word: τοῦ Σεινὰ
  chosen: of Sinai
  alternatives:
  - to Sinai
  lexicon: LSJ
  rationale: The genitive is governed by ὁδὸν, yielding 'the way of Sinai,' i.e.,
    the route toward or associated with Sinai. Rendering the name as 'Sinai' follows
    standard transliteration.
- source_word: Καδής Βαρνή
  chosen: Kadesh-barnea
  alternatives:
  - Kadesh Barnea
  lexicon: LSJ
  rationale: This is a place name; transliteration is preferred for names. The hyphenated
    English form is a common readable representation of the compound toponym.
- source_word: ἐξέβαλον
  chosen: drove out
  alternatives:
  - cast out
  - expelled
  lexicon: LSJ
  rationale: The verb ἐκβάλλω often means to drive or cast out. In a territorial context,
    'drove out' best conveys forcible removal of inhabitants.
- source_word: πάντας
  chosen: all
  alternatives:
  - every one of
  lexicon: LSJ
  rationale: The adjective is comprehensive and straightforward here; 'all' preserves
    the totalizing force.
- source_word: τοὺς κατοικοῦντας
  chosen: who were living
  alternatives:
  - who dwelt
  - the inhabitants
  lexicon: LSJ
  rationale: The participle denotes those residing in a place. 'Who were living' is
    readable modern English and keeps the verbal sense; 'the inhabitants' would be
    slightly more interpretive but also possible.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: LSJ
  rationale: ἔρημος can mean desert or wilderness. 'Wilderness' better matches biblical
    geographic diction in Israel's journey traditions while remaining natural English.
