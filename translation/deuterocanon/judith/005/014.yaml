  text: καὶ ἤγαγεν αὐτοὺς εἰς ὁδὸν τοῦ Σεινὰ καὶ Καδής Βαρνή· καὶ ἐξέβαλον πάντας
    τοὺς κατοικοῦντας ἐν τῇ ἐρήμῳ,
