translation:
  text: But when they turned away from the way that he had appointed for them, they
    were utterly destroyed in many wars, and were taken captive into a land not their
    own, and the temple of their God was leveled to the ground, and their cities were
    occupied by their adversaries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'way' instead of 'path.' The Greek term can denote a literal road or,
      as here, a figurative course of life appointed by God.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'to a very great extent' renders an intensive Greek expression
      that may emphasize the severity of their destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστησαν
  chosen: turned away
  alternatives:
  - departed
  - rebelled
  - apostatized
  lexicon: BDAG
  rationale: In context with ἀπὸ τῆς ὁδοῦ, the verb denotes deviation from a prescribed
    way. 'Turned away' is idiomatic and preserves the moral-religious sense without
    over-specifying formal apostasy.
- source_word: ὁδοῦ
  chosen: path
  alternatives:
  - way
  - road
  lexicon: LSJ
  rationale: Here the term is metaphorical for the course of life or conduct appointed
    by God. 'Path' communicates that figurative sense naturally in English.
- source_word: διέθετο
  chosen: had appointed
  alternatives:
  - ordained
  - set out
  - arranged
  lexicon: LSJ
  rationale: The middle voice here indicates what God had set or prescribed for them.
    'Had appointed' fits the context of a divinely prescribed course better than the
    more ambiguous 'arranged'.
- source_word: ἐξωλεθρεύθησαν
  chosen: were utterly destroyed
  alternatives:
  - were exterminated
  - were wiped out
  lexicon: LSJ
  rationale: The compound verb is intensive. 'Utterly destroyed' preserves the severity
    while avoiding a potentially over-precise modern connotation of 'exterminated'.
- source_word: ἐν πολλοῖς πολέμοις
  chosen: in many wars
  alternatives:
  - through many battles
  - by many wars
  lexicon: LSJ
  rationale: A straightforward rendering of the dative phrase; 'wars' better matches
    πολέμοις than the narrower 'battles'.
- source_word: ἐπὶ πολὺ σφόδρα
  chosen: to a very great extent
  alternatives:
  - very severely
  - for a very long time
  lexicon: LSJ
  rationale: The phrase intensifies the scale of the devastation. It could suggest
    degree more than duration here, so 'to a very great extent' preserves the adverbial
    force without narrowing it to time.
- source_word: ᾐχμαλωτεύθησαν
  chosen: were taken captive
  alternatives:
  - were led away captive
  - were exiled
  lexicon: BDAG
  rationale: The verb specifically denotes being taken as captives. 'Were taken captive'
    is clear and direct; 'exiled' would weaken the coercive sense.
- source_word: εἰς γῆν οὐκ ἰδίαν
  chosen: into a land not their own
  alternatives:
  - into a foreign land
  - to a land that was not theirs
  lexicon: LSJ
  rationale: This keeps the possessive contrast explicit and close to the Greek. 'Foreign
    land' is possible but slightly less transparent to the wording.
- source_word: ναὸς
  chosen: temple
  alternatives:
  - sanctuary
  - shrine
  lexicon: LSJ
  rationale: In this Jewish context, 'temple' is the most natural and specific rendering.
- source_word: ἐγενήθη εἰς ἔδαφος
  chosen: was laid level with the ground
  alternatives:
  - was reduced to the ground
  - became rubble
  lexicon: LSJ
  rationale: The idiom conveys demolition down to ground level. 'Was laid level with
    the ground' is idiomatic English that preserves the image.
- source_word: ἐκρατήθησαν
  chosen: were seized
  alternatives:
  - were occupied
  - were overpowered
  - were captured
  lexicon: LSJ
  rationale: The passive indicates that the cities came under hostile control. 'Were
    seized' is broad enough to include capture and occupation without adding detail.
- source_word: ὑπεναντίων
  chosen: adversaries
  alternatives:
  - enemies
  - opponents
  lexicon: LSJ
  rationale: The term denotes those set against them. 'Adversaries' is slightly more
    formal and fits the narrative tone.
