theological_decisions:
- issue: Agency in divine judgment
  chosen_reading: The verse states that when the people turned from the divinely appointed
    path, destruction, captivity, and desecration followed, without explicitly restating
    God as the direct grammatical agent of each calamity.
  alternative_readings:
  - A more interpretive rendering could make God the direct agent throughout.
  - A more neutral rendering could obscure the covenantal cause-and-effect implied
    by the context.
  rationale: The Greek links the disasters to their departure from God's appointed
    way, but the passive verbs do not require inserting explicit divine agency into
    each clause. The translation preserves the theological tension and narrative implication
    without over-interpreting.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
