id: JDT.5.17
reference: Judith 5:17
source:
  edition: lxx-swete-1909
  text: καὶ ἕως οὐχ ἥμαρτον ἐνώπιον τοῦ θεοῦ αὐτῶν, ἦν μετʼ αὐτῶν τὰ ἀγαθά, ὅτι θεὸς
    μισῶν ἀδικίαν μετʼ αὐτῶν ἐστίν·
  language: Greek
  pages:
