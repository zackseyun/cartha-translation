theological_decisions:
- issue: Whether to smooth the tense shift between ἦν and ἐστίν
  chosen_reading: 'Keep the final clause in the present: ''is with them.'''
  alternative_readings:
  - 'Smooth to past: ''was with them'''
  rationale: The Greek shifts from past narrative description ('prosperity was with
    them') to a present statement about God's character and relation ('is with them').
    Preserving the shift maintains the theological emphasis that their well-being
    rested on the abiding reality that God is one who hates injustice and is with
    them.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering ἀδικία
  chosen_reading: injustice
  alternative_readings:
  - unrighteousness
  - wrongdoing
  rationale: This avoids importing later doctrinally loaded terminology where the
    narrative context speaks more broadly of moral wrong opposed by God. The choice
    remains transparent in lexical documentation.
  doctrine_reference: Consistency of key terms, or documented exception.
