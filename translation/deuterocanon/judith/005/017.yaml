translation:
  text: And as long as they did not sin before their God, good things were with them,
    because a God who hates injustice is with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'good things were with them.' The Greek expression is more literal, while
      'prosperity' renders the idiom in natural English.
    reason: lexical_alternative
  - marker: b
    text: Or 'a God who hates wrongdoing' or 'a God who hates unrighteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἕως
  chosen: And as long as
  alternatives:
  - And until
  - And while
  lexicon: LSJ
  rationale: The phrase introduces a continuing condition extending up to the point
    of change. 'As long as' best captures the durative conditional sense in natural
    English.
- source_word: οὐχ ἥμαρτον
  chosen: they did not sin
  alternatives:
  - they had not sinned
  - they were not sinning
  lexicon: BDAG
  rationale: Aorist with negation here is best rendered as a simple past within the
    conditional frame. 'Did not sin' preserves the verbal idea without overinterpreting
    aspect.
- source_word: ἐνώπιον τοῦ θεοῦ αὐτῶν
  chosen: before their God
  alternatives:
  - in the sight of their God
  - against their God
  lexicon: LSJ
  rationale: ἐνώπιον literally means 'before' or 'in the presence of.' 'Before their
    God' is concise and preserves the relational and evaluative sense.
- source_word: ἦν μετʼ αὐτῶν τὰ ἀγαθά
  chosen: prosperity was with them
  alternatives:
  - good things were with them
  - blessings were with them
  lexicon: LSJ
  rationale: The idiom 'the good things were with them' refers to favorable circumstances
    or well-being. 'Prosperity was with them' communicates the sense idiomatically
    without narrowing it to specifically spiritual 'blessings.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Here ὅτι gives the reason for Israel's well-being. 'Because' is clearer
    in modern English than 'for.'
- source_word: θεὸς μισῶν ἀδικίαν
  chosen: a God who hates injustice
  alternatives:
  - God hating injustice
  - a God who hates wrongdoing
  lexicon: LSJ
  rationale: The anarthrous θεός is qualitative here, describing the kind of God he
    is. 'A God who hates injustice' preserves that qualitative force and renders ἀδικία
    in a broad moral sense.
- source_word: ἀδικίαν
  chosen: injustice
  alternatives:
  - unrighteousness
  - wrongdoing
  lexicon: BDAG
  rationale: ἀδικία can denote injustice, unrighteousness, or wrongdoing. In this
    narrative context, 'injustice' is clear modern English and preserves the moral-legal
    dimension without importing Pauline technical usage.
- source_word: μετʼ αὐτῶν ἐστίν
  chosen: is with them
  alternatives:
  - was with them
  lexicon: BDAG
  rationale: The present ἐστίν is retained as present in English to reflect the Greek's
    gnomic or characterizing statement about God, even after the preceding past-tense
    clause.
