translation:
  text: And God dried up the Red Sea before them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the underlying Hebrew exodus tradition in some renderings,
      'the Reed Sea.' The Greek source here reads 'the Red Sea.'
    reason: alternative_reading
lexical_decisions:
- source_word: κατεξήρανεν
  chosen: dried up
  alternatives:
  - dried out
  - made dry
  lexicon: LSJ
  rationale: The compound verb conveys causing something to become thoroughly dry.
    'Dried up' is idiomatic English and fits the biblical allusion to the sea being
    rendered passable.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: LSJ
  rationale: Straightforward rendering of the nominative subject with the article;
    English normally omits the article with 'God' in this usage.
- source_word: τὴν ἐρυθρὰν θάλασσαν
  chosen: the Red Sea
  alternatives:
  - the Reed Sea
  lexicon: LSJ
  rationale: The Greek phrase conventionally denotes the Red Sea in the Septuagint
    tradition. Although 'Reed Sea' reflects the Hebrew ים סוף in some contexts, the
    immediate task is to translate the Greek witness directly; the alternative is
    worth preserving in a footnote because of the well-known underlying Hebrew-based
    discussion.
- source_word: ἔμπροσθεν αὐτῶν
  chosen: before them
  alternatives:
  - in front of them
  lexicon: LSJ
  rationale: A natural rendering of the prepositional phrase indicating location relative
    to the people as God acted on their behalf.
