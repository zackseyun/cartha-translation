- issue: Rendering ἐρυθρὰν θάλασσαν in a verse alluding to the exodus crossing
  chosen_reading: the Red Sea
  alternative_readings:
  - the Reed Sea
  rationale: Because the source text is Greek Septuagint and explicitly reads ἐρυθρὰν
