translation:
  text: They departed from the way of their fathers and worshiped the God of heaven,
    the God whom they had come to know. And they were driven out from before their
    gods, and fled to Mesopotamia, and lived there as foreigners for many days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the God whom they recognized.' The Greek may emphasize decisive recognition
      as well as knowledge.
    reason: lexical_alternative
  - marker: b
    text: The clause 'they drove them out from before their gods' is syntactically
      compressed in Greek; the sense is that they were expelled in connection with
      their former gods and then fled to Mesopotamia.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξέβησαν ἐξ ὁδοῦ τῶν γονέων αὐτῶν
  chosen: They departed from the way of their fathers
  alternatives:
  - They went out from the way of their ancestors
  - They turned aside from the path of their fathers
  lexicon: LSJ
  rationale: The idiom literally means 'went out from the way' and in context refers
    to abandoning ancestral religious practice. 'Departed from the way of their fathers'
    preserves the metaphor while remaining natural English.
- source_word: προσεκύνησαν
  chosen: worshiped
  alternatives:
  - bowed down to
  - paid homage to
  lexicon: LSJ
  rationale: In this religious context, the verb denotes reverential worship rather
    than merely physical prostration. 'Worshiped' communicates the cultic sense clearly.
- source_word: τῷ θεῷ τοῦ οὐρανοῦ
  chosen: the God of heaven
  alternatives:
  - the heavenly God
  lexicon: LSJ
  rationale: This is a standard biblical title and is best rendered straightforwardly
    and recognizably as 'the God of heaven.'
- source_word: θεῷ ᾧ ἐπέγνωσαν
  chosen: the God whom they had come to know
  alternatives:
  - the God whom they recognized
  - the God whom they knew
  lexicon: LSJ
  rationale: ἐπιγινώσκω can mean come to know or recognize fully. The aorist here
    points to a decisive recognition of the true God; 'had come to know' captures
    that sense without overinterpreting.
- source_word: ἐξέβαλον αὐτοὺς ἀπὸ προσώπου τῶν θεῶν αὐτῶν
  chosen: they drove them out from before their gods
  alternatives:
  - they cast them out from the presence of their gods
  - they expelled them away from their gods
  lexicon: LSJ
  rationale: The plural subject remains the same people; αὐτούς refers to them collectively
    as objects of expulsion by others in a compressed narrative style. 'From before
    their gods' preserves the idiom ἀπὸ προσώπου while signaling expulsion connected
    with former cultic surroundings. The English keeps the Greek's abruptness, though
    the referents are somewhat compressed.
- source_word: ἔφυγον εἰς Μεσοποταμίαν
  chosen: fled to Mesopotamia
  alternatives:
  - escaped to Mesopotamia
  lexicon: LSJ
  rationale: ἔφυγον regularly means 'fled' in contexts of forced departure; this fits
    the narrative sequence after expulsion.
- source_word: παρῴκησαν ἐκεῖ ἡμέρας πολλάς
  chosen: lived there as foreigners for many days
  alternatives:
  - sojourned there many days
  - resided there for a long time
  lexicon: LSJ
  rationale: παροικέω denotes residing as a foreigner or sojourner. 'Lived there as
    foreigners' preserves that social nuance better than the more generic 'lived there.'
    'For many days' is a literal rendering of the time expression.
