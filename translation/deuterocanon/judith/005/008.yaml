theological_decisions:
- issue: Religious change from ancestral worship to worship of the true God
  chosen_reading: The verse is rendered to show a real departure from ancestral religious
    practice and a turn to the God of heaven, without importing later covenantal or
    conversion terminology.
  alternative_readings:
  - A more interpretive rendering could say they 'abandoned the religion of their
    ancestors'
  rationale: The Greek speaks in terms of leaving 'the way of their fathers' and worshiping
    'the God of heaven.' The translation preserves the text's own categories and avoids
    adding doctrinal language not explicit in the verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
