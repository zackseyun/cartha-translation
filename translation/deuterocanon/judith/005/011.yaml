translation:
  text: And the king of Egypt rose up against them, and they dealt shrewdly with them
    through toil and brickmaking; they humbled them and made them slaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they outwitted them' / 'they dealt cunningly with them.' The Greek verb
      emphasizes crafty or calculated treatment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπανέστη
  chosen: rose up against
  alternatives:
  - arose against
  - turned against
  - rebelled against
  lexicon: LSJ
  rationale: The compound verb conveys hostile rising or opposition, not mere succession.
    'Rose up against' preserves the adversative force in natural English.
- source_word: κατεσοφίσαντο
  chosen: they dealt shrewdly with
  alternatives:
  - they outwitted
  - they dealt cunningly with
  - they oppressed by craft
  lexicon: LSJ
  rationale: The verb suggests acting cleverly/cunningly against someone. 'Dealt shrewdly
    with' preserves the element of calculated policy without overparaphrasing into
    a purely interpretive gloss like 'oppressed by craft.'
- source_word: ἐν πόνῳ καὶ πλίνθῳ
  chosen: through toil and brickmaking
  alternatives:
  - with labor and bricks
  - in hardship and brickwork
  - with toil and brick
  lexicon: LSJ
  rationale: πόνος here denotes hard labor/toil, and πλίνθος refers to brick or brickwork.
    English idiom favors 'brickmaking' to express the labor imposed, echoing the Exodus
    background while remaining anchored to the Greek.
- source_word: ἐταπείνωσαν
  chosen: they humbled
  alternatives:
  - they afflicted
  - they brought low
  - they oppressed
  lexicon: LSJ
  rationale: The verb literally means to humble or bring low. 'Humbled' keeps the
    lexical sense and allows the following clause about enslavement to carry the concrete
    oppression.
- source_word: δούλους
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per project doctrine, δοῦλος-family terms are rendered 'slave' where
    bonded status is salient. Here the phrase describes forced subjugation in Egypt,
    so 'slaves' best reflects the severity of the condition.
