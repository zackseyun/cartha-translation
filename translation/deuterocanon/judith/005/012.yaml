theological_decisions:
- issue: Referent of the final pronoun phrase ἀπὸ προσώπου αὐτῶν
  chosen_reading: The Egyptians drove the Israelites out from before the Egyptians,
    i.e., expelled them from their presence.
  alternative_readings:
  - The Egyptians drove them out from before the Israelites.
  rationale: The most natural reading takes the subject 'the Egyptians' as the referent
    of the pronoun in this idiom, matching Exodus-style language of expulsion from
    one's presence. The alternative is grammatically conceivable in isolation but
    contextually less likely.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity where present.
