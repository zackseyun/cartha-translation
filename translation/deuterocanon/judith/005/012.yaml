translation:
  text: And they cried out to their God, and he struck the land of Egypt with plagues
    for which there was no healing; and the Egyptians drove them out from before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their presence.' The Greek expression 'from before them' is a literal
      rendering of a Semitic idiom for expulsion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεβόησαν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: LSJ
  rationale: The verb denotes a loud cry or appeal. In context it is directed to God
    in distress, so 'cried out' best captures both volume and supplication without
    over-paraphrasing.
- source_word: ἐπάταξεν
  chosen: struck
  alternatives:
  - smote
  - afflicted
  lexicon: LSJ
  rationale: Aorist of πατάσσω commonly means 'strike' or 'smite.' 'Struck' is clear
    modern English and preserves the force of divine action without archaic diction.
- source_word: γῆν Αἴγυπτον
  chosen: the land of Egypt
  alternatives:
  - Egypt
  - the earth of Egypt
  lexicon: LSJ
  rationale: γῆ can mean land or earth; with the proper name it naturally refers to
    the territory of Egypt. 'The land of Egypt' preserves the concrete geographic
    sense.
- source_word: πληγαῖς
  chosen: with plagues
  alternatives:
  - with blows
  - with afflictions
  lexicon: LSJ
  rationale: In biblical Greek this term often refers to divinely sent plagues or
    scourges. Given the Exodus allusion, 'plagues' is the most contextually accurate
    rendering.
- source_word: ἐν αἷς οὐκ ἦν ἴασις
  chosen: for which there was no healing
  alternatives:
  - from which there was no cure
  - in which there was no remedy
  lexicon: LSJ
  rationale: ἴασις means healing or cure. Rendering the relative phrase as 'for which
    there was no healing' keeps the connection to the plagues while sounding natural
    in English.
- source_word: ἐξέβαλον
  chosen: drove out
  alternatives:
  - cast out
  - expelled
  lexicon: LSJ
  rationale: The verb means to throw out or expel. 'Drove out' fits the Exodus setting
    and idiomatic English.
- source_word: ἀπὸ προσώπου αὐτῶν
  chosen: from before them
  alternatives:
  - from their presence
  - away from them
  lexicon: LSJ
  rationale: This is a Semitic-style expression preserved in Greek. 'From before them'
    is slightly formal but transparent and close to the source; it likely means the
    Egyptians expelled the Israelites from their presence/land.
