translation:
  text: And he said to them, “Tell me, then, sons of Canaan, who this people is that
    dwells in the hill country, and what cities they inhabit, and the size of their
    military force, and in what their power and their strength consist, and who has
    risen over them as king, leading their army.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Canaanites.' The Greek reads literally 'sons of Canaan.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that lives in the mountainous region.' The Greek literally says 'that
      is sitting in the hill country,' an idiom for dwelling there.
    reason: lexical_alternative
  - marker: c
    text: Or 'the number of their army' or 'the extent of their force.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναγγείλατέ
  chosen: Tell
  alternatives:
  - Report
  - Declare
  lexicon: BDAG
  rationale: Imperative of ἀναγγέλλω, calling for a direct report. 'Tell me' is natural
    modern English while preserving the command force.
- source_word: δή
  chosen: then
  alternatives:
  - now
  - please
  lexicon: BDAG
  rationale: δή adds urgency or discourse force rather than new content. 'Then' fits
    the flow of interrogation better than the more archaic 'now'; 'please' would sound
    too polite for the military context.
- source_word: υἱοὶ Χαναάν
  chosen: sons of Canaan
  alternatives:
  - Canaanites
  - children of Canaan
  lexicon: BDAG
  rationale: The Greek is literally vocative, 'sons of Canaan.' Following the project's
    gender-accurate principle, the literal familial expression is retained rather
    than flattened to the ethnic label 'Canaanites,' though that is the implied sense.
- source_word: ὁ λαὸς οὗτος
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: BDAG
  rationale: λαός commonly means 'people' as a collective group. 'This people' preserves
    the singular collective form of the Greek better than 'these people.'
- source_word: ὁ καθήμενος ἐν τῇ ὀρεινῇ
  chosen: that dwells in the hill country
  alternatives:
  - that sits in the hill country
  - that lives in the mountainous region
  lexicon: BDAG
  rationale: καθήμενος literally 'sitting' often functions idiomatically for residing
    or dwelling. 'Hill country' is a natural rendering of ὀρεινή and avoids an overly
    wooden 'sits.'
- source_word: αἱ κατοικοῦσιν πόλεις
  chosen: which cities they inhabit
  alternatives:
  - what cities they live in
  - the inhabited cities
  lexicon: BDAG
  rationale: The Greek asks about the cities in which they dwell. English idiom requires
    restructuring; 'which cities they inhabit' preserves the interrogative sense and
    the κατοικέω idea of settled residence.
- source_word: τὸ πλῆθος τῆς δυνάμεως αὐτῶν
  chosen: the size of their military force
  alternatives:
  - the multitude of their power
  - the number of their army
  - the extent of their strength
  lexicon: BDAG
  rationale: In this military reconnaissance context, δύναμις refers to force or armed
    strength, not abstract power. 'Size of their military force' makes explicit the
    likely sense of troop strength.
- source_word: κράτος
  chosen: power
  alternatives:
  - dominion
  - might
  lexicon: BDAG
  rationale: κράτος denotes manifested strength or power. 'Power' pairs naturally
    with ἰσχύς while allowing the two terms to remain distinct but overlapping.
- source_word: ἰσχύς
  chosen: strength
  alternatives:
  - might
  - force
  lexicon: BDAG
  rationale: ἰσχύς is well rendered by 'strength.' Keeping 'power and strength' preserves
    the rhetorical doubling of the Greek.
- source_word: ἐν τίνι
  chosen: in what ... consist
  alternatives:
  - wherein
  - in what way
  - on what basis
  lexicon: BDAG
  rationale: The phrase asks the basis or locus of their power. English idiom is best
    captured by 'in what their power and their strength consist.'
- source_word: ἀνέστηκεν ἐπʼ αὐτῶν
  chosen: has risen over them
  alternatives:
  - rules over them
  - has been appointed over them
  - stands over them
  lexicon: BDAG
  rationale: Perfect of ἀνίστημι literally means 'has risen up.' Retaining 'has risen
    over them' preserves the imagery and avoids importing a more specific political
    nuance than the Greek states.
- source_word: ἡγούμενος στρατιᾶς αὐτῶν
  chosen: leading their army
  alternatives:
  - commanding their host
  - governing their forces
  lexicon: BDAG
  rationale: ἡγούμενος is a participle meaning leading or commanding; στρατιά here
    is army/host. 'Leading their army' is clear modern English and suits the military
    setting.
