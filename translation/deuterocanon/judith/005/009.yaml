translation:
  text: And their God told them to go out from their sojourning and to go into the
    land of Canaan; and they settled there, and became very abundant in gold and silver
    and in very many livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their dwelling as foreigners.' The Greek παροικία carries the sense
      of residing as an outsider or sojourner.
    reason: lexical_alternative
  - marker: b
    text: Or 'multiplied greatly in gold and silver and in exceedingly many livestock.'
      The Greek can emphasize great increase in possessions.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: told
  alternatives:
  - said
  - commanded
  lexicon: BDAG
  rationale: With infinitives following (ἐξελθεῖν ... πορευθῆναι), the sense is directive
    speech. 'Told' conveys that God instructed them, without overstating to the more
    forceful 'commanded.'
- source_word: ἐξελθεῖν
  chosen: to go out
  alternatives:
  - to depart
  - to come out
  lexicon: BDAG
  rationale: A straightforward rendering of the infinitive that preserves the movement
    away from their prior place of residence.
- source_word: παροικίας
  chosen: sojourning
  alternatives:
  - residence as foreigners
  - alien dwelling
  - temporary dwelling
  lexicon: BDAG
  rationale: παροικία denotes dwelling as a foreigner or resident alien. 'Sojourning'
    preserves the migratory/alien nuance better than a flat 'dwelling,' while remaining
    readable.
- source_word: πορευθῆναι
  chosen: to go
  alternatives:
  - to journey
  - to travel
  lexicon: BDAG
  rationale: The verb often carries the sense of proceeding or journeying, but here
    'to go into the land of Canaan' is natural English and sufficiently reflects the
    Greek.
- source_word: γῆν Χανάαν
  chosen: the land of Canaan
  alternatives:
  - Canaan
  - the country of Canaan
  lexicon: BDAG
  rationale: Including 'land of' reflects γῆν and matches biblical geographic idiom.
- source_word: κατῴκησαν
  chosen: they settled
  alternatives:
  - they dwelt
  - they lived
  lexicon: BDAG
  rationale: The verb indicates taking up residence. 'Settled' communicates establishment
    in the land more idiomatically than 'dwelt.'
- source_word: ἐπληθύνθησαν
  chosen: became very abundant
  alternatives:
  - multiplied greatly
  - increased greatly
  - became very wealthy
  lexicon: BDAG
  rationale: Because the increase is specified by gold, silver, and livestock, the
    sense is not merely numerical population growth but substantial increase in possessions.
    'Became very abundant' preserves the broad notion of increase without reducing
    it only to wealth.
- source_word: χρυσίῳ καὶ ἀργυρίῳ
  chosen: in gold and silver
  alternatives:
  - with gold and silver
  lexicon: BDAG
  rationale: The dative is naturally rendered with 'in' here to mirror the sphere
    or respect in which they increased.
- source_word: κτήνεσιν πολλοῖς σφόδρα
  chosen: in very many livestock
  alternatives:
  - with exceedingly many cattle
  - in a great many herds
  lexicon: BDAG
  rationale: κτήνη refers broadly to domesticated animals/livestock, not specifically
    cattle. πολλοῖς σφόδρα intensifies the quantity; 'very many livestock' captures
    that without narrowing the species.
