theological_decisions:
- issue: Nature of God's speech act in εἶπεν with infinitives
  chosen_reading: God instructed them to leave and go to Canaan
  alternative_readings:
  - God said that they should leave and go
  - God commanded them to leave and go
  rationale: The Greek presents divine speech introducing infinitives of action. The
    main text uses 'told' to reflect directive speech while avoiding an interpretive
    escalation to an explicit command formula not stated in the text.
