theological_decisions:
- issue: Rendering the ancestral-religion clause without importing later polemical
    language
  chosen_reading: they were not willing to follow the gods of their fathers
  alternative_readings:
  - they refused to worship the gods of their ancestors
  - they would not go after their fathers' gods
  rationale: The Greek states non-willingness to follow ancestral gods; it does not
    explicitly use a worship verb here. The translation preserves the text's wording
    and theological contrast without intensifying it beyond the source.
