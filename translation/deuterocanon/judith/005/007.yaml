translation:
  text: And formerly they lived as sojourners in Mesopotamia, because they were not
    willing to follow the gods of their fathers, who were in the land of the Chaldeans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sojourned in Mesopotamia.' The Greek verb suggests residing there as
      foreigners or temporary residents.
    reason: lexical_alternative
  - marker: b
    text: The clause 'who had come to be in the land of the Chaldeans' may also be
      understood more smoothly as 'which were in the land of the Chaldeans' or 'who
      originated in the land of the Chaldeans.'
    reason: alternative_reading
lexical_decisions:
- source_word: παρῴκησαν
  chosen: lived as sojourners
  alternatives:
  - sojourned
  - dwelt as resident aliens
  - lived temporarily
  lexicon: BDAG
  rationale: The verb from παροικέω denotes residing in a place as a foreigner or
    temporary resident. 'Lived as sojourners' preserves both the residence and outsider
    status better than a flat 'lived.'
- source_word: τὸ πρότερον
  chosen: formerly
  alternatives:
  - before
  - at first
  - previously
  lexicon: LSJ
  rationale: This adverbial expression marks prior time relative to the narrative.
    'Formerly' is concise and natural in English.
- source_word: Μεσοποταμίᾳ
  chosen: Mesopotamia
  rationale: Standard transliteration of the geographical name.
- source_word: οὐκ ἐβουλήθησαν
  chosen: they were not willing
  alternatives:
  - they did not want
  - they refused
  lexicon: BDAG
  rationale: The middle of βούλομαι emphasizes volition. 'Were not willing' preserves
    the deliberate choice without overstating it as outright defiance, though refusal
    is implied by context.
- source_word: ἀκολουθῆσαι
  chosen: to follow
  alternatives:
  - to go after
  - to conform to
  lexicon: BDAG
  rationale: A straightforward rendering that fits religious allegiance in context.
- source_word: τοῖς θεοῖς τῶν πατέρων αὐτῶν
  chosen: the gods of their fathers
  alternatives:
  - their ancestral gods
  - the gods of their ancestors
  lexicon: LSJ
  rationale: This keeps the familial and inherited-religion sense explicit. 'Fathers'
    is retained per gender-accurate philosophy and because the Greek is specific.
- source_word: οἳ ἐγένοντο ἐν γῇ Χαλδαίων
  chosen: who had come to be in the land of the Chaldeans
  alternatives:
  - which were in the land of the Chaldeans
  - who originated in the land of the Chaldeans
  - who came into being in Chaldean land
  lexicon: BDAG
  rationale: The relative clause is somewhat unusual with ἐγένοντο. 'Had come to be
    in the land of the Chaldeans' stays close to the Greek while allowing the sense
    that these ancestral gods belonged to or arose within that land. A smoother rendering
    like 'which were in' is possible but loses the force of γίνομαι.
