theological_decisions:
- issue: Rendering the conquest statement without softening its force
  chosen_reading: And they drove out ... and they lived in it for many days.
  alternative_readings:
  - And they expelled ... and settled there for a long time.
  rationale: The verse recounts Israel's dispossession of prior inhabitants and subsequent
    residence. The translation preserves that historical claim without euphemism or
    added theological framing.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it.'
