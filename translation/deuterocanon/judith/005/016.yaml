translation:
  text: And they drove out from before them the Canaanite, the Perizzite, the Jebusite,
    the Shechemite, and all the Girgashites, and they lived in it for many days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'the Shechemite'; the form may reflect Shechem/the people of Shechem
      rather than a more familiar ethnonym.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέβαλον
  chosen: drove out
  alternatives:
  - cast out
  - expelled
  lexicon: BDAG
  rationale: The verb denotes forcible removal. 'Drove out' is natural modern English
    and fits the conquest context better than the more wooden 'cast out.'
- source_word: ἐκ προσώπου αὐτῶν
  chosen: from before them
  alternatives:
  - from their presence
  - from before their face
  lexicon: LEH
  rationale: This is a Semitic-influenced idiom meaning removal from someone's presence
    or before them. 'From before them' preserves the idiom while remaining intelligible.
- source_word: Χαναναῖον
  chosen: the Canaanite
  alternatives:
  - the Canaanites
  lexicon: LEH
  rationale: The singular with article is used collectively in Greek lists of peoples;
    English can preserve the singular ethnonym naturally here.
- source_word: Φερεζαῖον
  chosen: the Perizzite
  alternatives:
  - the Perizzites
  lexicon: LEH
  rationale: Kept as the singular ethnonym to match the Greek collective singular
    pattern in the list.
- source_word: Ἰεβουσαῖον
  chosen: the Jebusite
  alternatives:
  - the Jebusites
  lexicon: LEH
  rationale: Kept as the singular ethnonym to reflect the Greek form and the conventional
    biblical people-name.
- source_word: Συχέμ
  chosen: the Shechemite
  alternatives:
  - Shechem
  - the people of Shechem
  lexicon: LEH
  rationale: Although the form is unusual in a list of peoples and could be read as
    a place-name, in this context it functions alongside ethnonyms. 'The Shechemite'
    best preserves the Greek wording without over-interpreting.
- source_word: πάντας τοὺς Γεργεσαίους
  chosen: all the Girgashites
  alternatives:
  - every Girgashite
  lexicon: LEH
  rationale: The plural with πάντας is best rendered straightforwardly as 'all the
    Girgashites.'
- source_word: κατῴκησαν
  chosen: they lived
  alternatives:
  - they dwelt
  - they settled
  lexicon: BDAG
  rationale: The verb can mean dwell or settle. 'They lived' is readable modern English;
    the following phrase 'in it for many days' conveys continued residence.
- source_word: ἐν αὐτῇ
  chosen: in it
  alternatives:
  - there
  - in that land
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to the land. 'In it' is a close
    rendering that avoids adding 'land' where the Greek uses only a pronoun.
- source_word: ἡμέρας πολλάς
  chosen: for many days
  alternatives:
  - many days
  - for a long time
  lexicon: BDAG
  rationale: This accusative of duration is naturally rendered 'for many days.' It
    preserves the source wording better than the more interpretive 'for a long time.'
