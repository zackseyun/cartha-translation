  text: Οὐ γὰρ βοηθησόμεθα ἀπὸ υἱῶν Ἰσραήλ· ἰδοὺ γὰρ λαὸς ἐν ᾧ οὐκ ἔστιν δύναμις οὐδὲ
    κράτος εἰς παράταξιν ἰσχυράν.
