translation:
  text: For we will not be helped by the sons of Israel; for behold, they are a people
    in whom there is neither strength nor might for strong battle formation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Greek literally says
      'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βοηθησόμεθα
  chosen: we will not be helped
  alternatives:
  - we will receive no help
  - we will not be supported
  lexicon: BDAG
  rationale: Future passive of βοηθέω. The passive sense is explicit in Greek, so
    'we will not be helped' preserves the form and the military context without over-paraphrasing.
- source_word: υἱῶν Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LEH
  rationale: A formally transparent rendering of the idiom. Because the Greek uses
    the familial expression rather than the simpler ethnic label, 'sons of Israel'
    is retained in the main text in keeping with the project's gender-accurate policy.
- source_word: λαὸς
  chosen: a people
  alternatives:
  - a nation
  lexicon: LEH
  rationale: λαός commonly denotes a people-group. 'A people' fits the collective
    sense better than 'nation' here and avoids importing political nuance not required
    by the text.
- source_word: δύναμις
  chosen: strength
  alternatives:
  - power
  - force
  lexicon: LEH
  rationale: In this military assessment, δύναμις refers to capacity or fighting strength.
    'Strength' is natural English and pairs well with κράτος as a near-synonymous
    intensification.
- source_word: κράτος
  chosen: might
  alternatives:
  - power
  - dominion
  lexicon: LEH
  rationale: Here κράτος is not political dominion but forcefulness or might. 'Might'
    distinguishes it from δύναμις while preserving the rhetorical doubling.
- source_word: παράταξιν ἰσχυράν
  chosen: strong battle formation
  alternatives:
  - strong array for battle
  - mighty battle line
  - strong deployment
  lexicon: LEH
  rationale: παράταξις is a military term for drawn-up battle order or formation.
    Rendering it as 'battle formation' keeps the martial image explicit; ἰσχυράν is
    carried by 'strong'.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: A discourse marker drawing attention to the claim that follows. 'Look'
    is readable modern English and preserves the deictic force without archaic tone.
