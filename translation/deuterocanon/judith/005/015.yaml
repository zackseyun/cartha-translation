translation:
  text: And they lived in the land of the Amorites, and by their strength they destroyed
    all the Heshbonites; and after crossing the Jordan, they took possession of all
    the hill country.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their strength' or 'through their might.'
    reason: lexical_alternative
  - marker: b
    text: Or 'inherited all the hill country.' The Greek verb can carry the sense
      of receiving a possession, but here it refers to taking possession of territory
      after crossing the Jordan.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾤκησαν
  chosen: lived
  alternatives:
  - settled
  - dwelt
  lexicon: LSJ
  rationale: The aorist of οἰκέω denotes residing or settling in a place. 'Lived'
    is natural modern English and fits the narrative sequence without sounding archaic
    like 'dwelt.'
- source_word: γῇ Ἀμορραίων
  chosen: the land of the Amorites
  alternatives:
  - the country of the Amorites
  lexicon: LSJ
  rationale: A straightforward genitive construction indicating territory associated
    with the Amorites. 'Land' is the most standard and transparent rendering.
- source_word: ἐξωλόθρευσαν
  chosen: destroyed
  alternatives:
  - wiped out
  - exterminated
  lexicon: LSJ
  rationale: The verb conveys complete destruction. 'Destroyed' preserves the force
    without importing a more modern technical term such as 'exterminated'; the totalizing
    sense is already reinforced by πάντας.
- source_word: πάντας τοὺς Ἐσεβωνείτας
  chosen: all the Heshbonites
  alternatives:
  - all the inhabitants of Heshbon
  - all those of Heshbon
  lexicon: LSJ
  rationale: The ethnicon refers to the people of Heshbon. 'Heshbonites' is concise
    and preserves the people-group sense better than a paraphrase.
- source_word: ἐν τῇ ἰσχύι αὐτῶν
  chosen: by their strength
  alternatives:
  - in their strength
  - through their might
  lexicon: LSJ
  rationale: The phrase expresses means or instrument. 'By their strength' is idiomatic
    English and preserves the emphasis on their military power.
- source_word: διαβάντες τὸν Ἰορδάνην
  chosen: after crossing the Jordan
  alternatives:
  - having crossed the Jordan
  - when they crossed the Jordan
  lexicon: LSJ
  rationale: The participle is antecedent to the main verb. 'After crossing' makes
    the sequence explicit in clear English.
- source_word: ἐκληρονόμησαν
  chosen: took possession of
  alternatives:
  - inherited
  - occupied
  lexicon: LSJ
  rationale: κληρονομέω can mean inherit or receive as a possession, but in conquest-land
    context 'took possession of' communicates the result clearly in English while
    preserving the territorial sense. 'Inherited' could sound overly passive here.
- source_word: πᾶσαν τὴν ὀρεινήν
  chosen: all the hill country
  alternatives:
  - all the highlands
  - the whole mountainous region
  lexicon: LSJ
  rationale: ἡ ὀρεινή commonly denotes hill country or highland region. 'Hill country'
    is a standard biblical-geographic rendering and reads naturally.
