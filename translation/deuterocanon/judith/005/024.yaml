translation:
  text: Therefore we will indeed go up, and they will become food for your whole army,
    master Holofernes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prey' or 'something to be devoured'; the Greek literally speaks of becoming
      'for devouring' by the army.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ δὴ
  chosen: Therefore ... indeed
  alternatives:
  - Therefore
  - So then
  - For this reason
  lexicon: LSJ
  rationale: 'The combination intensifies the inference: διό marks conclusion (''therefore/for
    this reason'') and δή adds emphasis (''indeed/now then''). Rendering both preserves
    the force of the speaker''s confident conclusion.'
- source_word: ἀναβησόμεθα
  chosen: we will ... go up
  alternatives:
  - we will march up
  - we will ascend
  lexicon: LSJ
  rationale: Future middle of ἀναβαίνω commonly means 'go up' or 'march up' in military
    movement. 'Go up' keeps the literal spatial sense while remaining natural in context.
- source_word: ἔσονται
  chosen: they will become
  alternatives:
  - they will be
  lexicon: LSJ
  rationale: The future of εἰμί with εἰς + accusative often carries a resultative
    sense, 'become/turn into.' 'Become' better reflects the idiom here than a flat
    'be.'
- source_word: εἰς κατάβρωμα
  chosen: food
  alternatives:
  - prey
  - something to be devoured
  - consumption
  lexicon: LSJ
  rationale: κατάβρωμα denotes that which is eaten or devoured. 'Food' is concise
    and idiomatic in English, preserving the image that the people will be easy prey
    for the army.
- source_word: πάσης τῆς στρατειᾶς σου
  chosen: for your whole army
  alternatives:
  - for all your army
  - for your entire force
  lexicon: LSJ
  rationale: στρατειά refers to an army or host. 'Your whole army' naturally conveys
    πάσης with the possessive and fits the predicative phrase 'food for your whole
    army.'
- source_word: δέσποτα
  chosen: master
  alternatives:
  - lord
  - sovereign
  lexicon: LSJ
  rationale: δέσποτα is a direct address meaning 'master' or 'lord,' often with strong
    authority nuance. Since κύριος is the doctrinally default 'Lord' term and is not
    used here, 'master' better distinguishes the vocabulary and avoids importing covenantal
    resonance.
- source_word: Ὀλοφέρνη
  chosen: Holofernes
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
