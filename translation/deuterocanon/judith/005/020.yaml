translation:
  text: And now, master lord, if indeed there is an offense in this people and they
    are sinning against their God, and if we ascertain that this stumbling block is
    among them, then we will go up and make war against them;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'error' or 'unwitting sin' for 'offense' (ἀγνόημα), highlighting possible
      ignorance in the wrongdoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέσποτα κύριε
  chosen: master lord
  alternatives:
  - Lord
  - sovereign lord
  - master
  lexicon: LSJ
  rationale: The Greek combines δέσποτα with κύριε as a doubled form of address. Since
    DOCTRINE defaults κύριος to 'Lord,' but here κύριε is paired with δέσποτα, rendering
    both preserves the emphatic address rather than collapsing them into a single
    English title. 'Master lord' is somewhat formal but reflects the two terms without
    importing covenantal 'LORD' language.
- source_word: ἀγνόημα
  chosen: offense
  alternatives:
  - error
  - transgression
  - unwitting sin
  lexicon: LSJ
  rationale: ἀγνόημα denotes an error or wrongdoing, often with the nuance of ignorance.
    In this military-political context, 'offense' communicates a culpable wrong without
    over-specifying whether it is intentional. 'Unwitting sin' is possible but too
    interpretive for the immediate clause.
- source_word: ἁμαρτάνουσιν εἰς τὸν θεὸν αὐτῶν
  chosen: they are sinning against their God
  alternatives:
  - they sin against their God
  - they are offending their God
  lexicon: LSJ
  rationale: The present tense suggests ongoing action, so 'are sinning' preserves
    aspect. εἰς with ἁμαρτάνω here is idiomatic for sin directed against someone,
    hence 'against their God.'
- source_word: ἐπισκεψόμεθα
  chosen: we ascertain
  alternatives:
  - we inspect
  - we examine
  - we discover
  lexicon: LSJ
  rationale: Future middle of ἐπισκέπτομαι here means to look into or investigate.
    'Ascertain' captures the sense of determining the facts, fitting the conditional
    logic of the speech better than the more physical 'inspect.'
- source_word: σκάνδαλον
  chosen: stumbling block
  alternatives:
  - offense
  - snare
  - cause of downfall
  lexicon: LSJ
  rationale: σκάνδαλον literally denotes a trap or stumbling block. Here it refers
    to the culpable thing in them that would expose them to defeat. 'Stumbling block'
    preserves the metaphor and theological resonance without flattening it to a generic
    'offense.'
- source_word: ἀναβησόμεθα
  chosen: we will go up
  alternatives:
  - we will march up
  - we will advance
  lexicon: LSJ
  rationale: The verb literally means 'go up' and is commonly used for military advance.
    Retaining 'go up' preserves the formal texture and possible topographical sense.
- source_word: ἐκπολεμήσομεν
  chosen: make war against
  alternatives:
  - fight against
  - wage war on
  lexicon: LSJ
  rationale: The compound verb is stronger than a simple 'fight'; 'make war against'
    conveys organized military action and matches the future resolve of the clause.
