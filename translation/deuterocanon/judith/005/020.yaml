theological_decisions:
- issue: Rendering the double address δέσποτα κύριε
  chosen_reading: master lord
  alternative_readings:
  - Lord
  - sovereign lord
  rationale: The text addresses Holofernes, not Israel's God, so κύριε should not
    be rendered in a way that suggests the divine title 'the LORD.' Preserving both
    address terms reflects the Greek rhetoric while avoiding theological confusion.
  doctrine_reference: 'DOCTRINE.md: κύριος default ''Lord''; translate titles and
    preserve source meaning'
