theological_decisions:
- issue: Ethnic/lineage terminology in τοῦ γένους αὐτῶν
  chosen_reading: their family line
  alternative_readings:
  - their race
  - their stock
  - their people
  rationale: The verse speaks of descent and kinship growth, not a later biological
    concept of race. The chosen rendering preserves genealogical emphasis without
    importing modern categories.
  doctrine_reference: Translation philosophy §1, §6
