translation:
  text: And they went down into Egypt, for a famine covered the face of the land of
    Canaan, and they sojourned there until they were provided for; and there they
    became a very great multitude, and there was no number to their offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was no number of their stock/people'; the Greek γένος can denote
      lineage, kin-group, or people descended from a common ancestor.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέβησαν
  chosen: went down
  alternatives:
  - went
  - descended
  lexicon: LSJ
  rationale: Retains the conventional directional sense of going down to Egypt, which
    is both geographically and idiomatically natural in biblical usage.
- source_word: ἐκάλυψεν
  chosen: covered
  alternatives:
  - overwhelmed
  - came over
  lexicon: LSJ
  rationale: A direct rendering of the verb that preserves the imagery of famine covering
    the land.
- source_word: τὸ πρόσωπον τῆς γῆς
  chosen: the face of the land
  alternatives:
  - the whole land
  - the surface of the land
  lexicon: LSJ
  rationale: Keeps the Hebrew-like idiom present in the Greek while remaining understandable
    in English.
- source_word: λιμός
  chosen: famine
  alternatives:
  - hunger
  lexicon: LSJ
  rationale: Standard rendering in historical narrative contexts; more precise than
    the broader 'hunger.'
- source_word: παρῴκησαν
  chosen: lived there as sojourners
  alternatives:
  - settled there temporarily
  - resided there as foreigners
  lexicon: LSJ
  rationale: Preserves the sense of προσωρινή residence as resident aliens rather
    than permanent settlement; 'sojourners' reflects the biblical-historical nuance.
- source_word: μέχρις οὗ διετράφησαν
  chosen: until they were sustained
  alternatives:
  - until they were nourished
  - until they had food
  lexicon: LSJ
  rationale: The passive sense indicates being maintained or provided for; 'sustained'
    is natural English and broader than mere eating.
- source_word: ἐγένοντο ... εἰς πλῆθος πολύ
  chosen: became a very great multitude
  alternatives:
  - grew into a great multitude
  - became very numerous
  lexicon: LSJ
  rationale: Captures both the resultative force of ἐγένοντο and the quantitative
    emphasis of πλῆθος πολύ.
- source_word: οὐκ ἦν ἀριθμὸς
  chosen: there was no number
  alternatives:
  - they were beyond counting
  - they could not be numbered
  lexicon: LSJ
  rationale: A relatively formal rendering that preserves the idiomatic statement
    of innumerability without over-paraphrasing.
- source_word: τοῦ γένους αὐτῶν
  chosen: to their family line
  alternatives:
  - of their race
  - of their stock
  - of their people
  lexicon: LSJ
  rationale: γένος here refers to lineage or kin-group. 'Family line' avoids modern
    racial connotations of 'race' while preserving descent-based identity.
