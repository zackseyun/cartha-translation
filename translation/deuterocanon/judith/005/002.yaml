translation:
  text: And he became very angry, and he summoned all the rulers of Moab, the generals
    of Ammon, and all the satraps of the coastland,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with great fury'; the Greek intensifier is expressed idiomatically in
      the main text as 'very angry.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the seacoast' or 'the coastal region.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠργίσθη
  chosen: became angry
  alternatives:
  - was enraged
  - grew angry
  lexicon: BDAG
  rationale: Aorist passive/deponent of ὀργίζω here expresses entering a state of
    anger. 'Became angry' is natural English and preserves the ingressive sense without
    overstating it.
- source_word: θυμῷ σφόδρα
  chosen: very
  alternatives:
  - with great fury
  - exceedingly
  - with intense wrath
  lexicon: BDAG
  rationale: The dative θυμῷ with σφόδρα intensifies the anger. In English, folding
    the idiom into 'very angry' is clear and idiomatic, while still reflecting the
    emphatic force.
- source_word: ἐκάλεσεν
  chosen: summoned
  alternatives:
  - called
  - sent for
  lexicon: BDAG
  rationale: In context of a ruler convening officials, 'summoned' better conveys
    authoritative calling than the more generic 'called'.
- source_word: ἄρχοντας
  chosen: rulers
  alternatives:
  - princes
  - leaders
  lexicon: BDAG
  rationale: ἄρχοντες are governing officials. 'Rulers' is broad, accessible, and
    fits the political context better than the more archaic 'princes'.
- source_word: στρατηγοὺς
  chosen: generals
  alternatives:
  - commanders
  lexicon: BDAG
  rationale: The military sense is primary here. 'Generals' is the most straightforward
    modern equivalent for high-ranking military leaders.
- source_word: σατράπας
  chosen: satraps
  alternatives:
  - governors
  - provincial officials
  lexicon: LSJ
  rationale: The loanword refers to Persian-style provincial administrators. Retaining
    'satraps' preserves the historical-political color more precisely than flattening
    to 'governors'.
- source_word: τῆς παραλίας
  chosen: of the coastland
  alternatives:
  - of the seacoast
  - of the coastal region
  lexicon: LSJ
  rationale: παραλία denotes the coastal district. 'Coastland' is concise and natural,
    preserving the geographic sense without over-specifying.
- source_word: Μωὰβ
  chosen: Moab
  rationale: Standard English transliteration of the place/people name.
- source_word: Ἀμμὼν
  chosen: Ammon
  rationale: Standard English transliteration of the people name.
