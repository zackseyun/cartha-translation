theological_decisions:
- issue: Covenantal force of Israel's renewed relation to God in ἐπιστρέψαντες ἐπὶ
    τὸν θεὸν αὐτῶν
  chosen_reading: having turned back to their God
  alternative_readings:
  - having returned to their God
  rationale: The phrase describes renewed fidelity to Israel's own God, not adoption
    of a new deity. The chosen wording preserves the theological nuance of repentance/return
    without importing later doctrinal terminology.
