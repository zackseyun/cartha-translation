translation:
  text: And now, having turned back to their God, they came up from the dispersion
    where they had been scattered there, took possession of Jerusalem, where their
    sanctuary was, and settled in the hill country, because it had been deserted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where they had been scattered,' with 'there' omitted; the Greek includes
      an emphatic or redundant location expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'because it was desolate' or 'because it was uninhabited.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστρέψαντες ἐπὶ τὸν θεὸν αὐτῶν
  chosen: having turned back to their God
  alternatives:
  - having returned to their God
  - having converted to their God
  lexicon: BDAG
  rationale: ἐπιστρέφω with ἐπί here denotes a return in allegiance or orientation
    to God. 'Turned back' preserves both the directional metaphor and the covenantal/religious
    sense without overinterpreting as formal 'conversion'.
- source_word: ἀνέβησαν
  chosen: they came up
  alternatives:
  - they went up
  - they returned
  lexicon: BDAG
  rationale: ἀναβαίνω commonly means 'go up/come up,' and in biblical geography can
    refer to ascent to the land or Jerusalem. 'Came up' keeps the literal movement
    and fits the narrative perspective without flattening it to merely 'returned'.
- source_word: ἐκ τῆς διασπορᾶς
  chosen: from the dispersion
  alternatives:
  - from exile
  - from the places of their scattering
  lexicon: BDAG
  rationale: διασπορά is literally 'dispersion/scattering.' 'From the dispersion'
    preserves the noun and its collective sense better than the more interpretive
    'from exile,' though the latter overlaps contextually.
- source_word: οὗ διεσπάρησαν ἐκεῖ
  chosen: where they had been scattered there
  alternatives:
  - where they had been scattered
  - from there, where they had been scattered
  lexicon: BDAG
  rationale: The Greek is somewhat pleonastic with both οὗ and ἐκεῖ. The translation
    keeps the sense of the location of scattering while preserving some of the emphasis.
    Slightly smoother English could omit 'there,' but retaining it reflects the source's
    wording.
- source_word: κατέσχον
  chosen: took possession of
  alternatives:
  - occupied
  - gained control of
  lexicon: BDAG
  rationale: κατέχω here conveys seizing/holding possession. 'Took possession of'
    is more precise and less militarily loaded than 'occupied,' while still reflecting
    actual control.
- source_word: τὸ ἁγίασμα
  chosen: sanctuary
  alternatives:
  - holy place
  - temple precinct
  lexicon: LEH
  rationale: ἁγίασμα denotes a holy/sanctified place. 'Sanctuary' is the most natural
    and sufficiently specific rendering in this context, without requiring the fuller
    institutional sense of 'temple'.
- source_word: κατῳκίσθησαν
  chosen: settled
  alternatives:
  - were settled
  - dwelt
  lexicon: BDAG
  rationale: The passive form can mean 'were settled' or simply 'settled/dwelt.' In
    idiomatic English, 'settled' captures the establishment of residence while remaining
    close to the Greek.
- source_word: ἐν τῇ ὀρεινῇ
  chosen: in the hill country
  alternatives:
  - in the mountainous region
  - in the highlands
  lexicon: LEH
  rationale: ἡ ὀρεινή is a standard geographical expression for the hill country/highlands.
    'Hill country' is clear, natural, and biblically familiar without sounding archaic.
- source_word: ὅτι ἦν ἔρημος
  chosen: because it had been deserted
  alternatives:
  - because it was desolate
  - because it was uninhabited
  lexicon: BDAG
  rationale: ἔρημος can mean deserted, desolate, or uninhabited. 'Had been deserted'
    fits the resettlement context and explains why they could settle there, while
    'desolate' is possible but less concrete in English.
