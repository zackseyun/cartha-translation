id: JDT.5.1
reference: Judith 5:1
source:
  edition: lxx-swete-1909
  text: Καὶ ἀνηγγέλη Ὀλοφέρνῃ ἀρχιστρατήγῳ δυνάμεως Ἀσσούρ διότι οἱ υἱοὶ Ἰσραὴλ παρεσκευάσθησαν
    εἰς πόλεμον, καὶ τὰς ὁδοὺς τῆς ὀρεινῆς συνέκλεισαν καὶ ἐτείχισαν πᾶσαν κορυφὴν
    ὄρους ὑψηλοῦ, καὶ ἔθηκαν ἐν τοῖς πεδίοις σκάνδαλα.
  language: Greek
