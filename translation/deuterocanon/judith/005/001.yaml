theological_decisions:
- issue: Ethnic designation οἱ υἱοὶ Ἰσραήλ
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: This is not a major doctrinal crux, but it intersects with the project's
    gender-accurate policy. The phrase is a conventional ethnic designation; retaining
    'sons of Israel' keeps the source form visible while remaining understandable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Military sense of σκάνδαλα
  chosen_reading: obstacles
  alternative_readings:
  - traps
  - stumbling blocks
  - barricades
  rationale: The verse describes defensive preparations. Rendering the term as a physical
    military impediment avoids importing later theological connotations associated
    with 'stumbling block.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
