translation:
  text: And it was reported to Holofernes, the commander-in-chief of the forces of
    Assyria, that the sons of Israel had prepared for war, and had blocked the roads
    of the hill country and fortified every summit of the high mountains, and had
    set up obstacles in the plains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' / 'the children of Israel.' The Greek reads literally
      'the sons of Israel,' a standard ethnic designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'traps' or 'barricades' for 'obstacles'; the Greek term can denote something
      that causes stumbling, but here it refers to physical impediments in a military
      setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνηγγέλη
  chosen: it was reported
  alternatives:
  - it was announced
  - word was brought
  lexicon: BDAG
  rationale: Aorist passive of ἀναγγέλλω; an impersonal passive in English is natural
    and preserves the formal sense that information reached Holofernes without specifying
    the messenger.
- source_word: ἀρχιστρατήγῳ
  chosen: commander-in-chief
  alternatives:
  - general
  - supreme commander
  lexicon: LSJ
  rationale: The compound title denotes the highest military commander. 'Commander-in-chief'
    best conveys rank more precisely than the generic 'general'.
- source_word: δυνάμεως Ἀσσούρ
  chosen: of the forces of Assyria
  alternatives:
  - of the army of Assyria
  - of Assyria's power
  lexicon: LSJ
  rationale: δύναμις in military context commonly means armed force or army. 'Forces
    of Assyria' preserves the collective military sense and fits the genitival construction.
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: A more literal rendering preserves the traditional ethnic designation
    in the Greek. 'Israelites' is possible, but 'sons of Israel' better reflects the
    source wording and the project's gender-accurate philosophy.
- source_word: παρεσκευάσθησαν εἰς πόλεμον
  chosen: had prepared for war
  alternatives:
  - had made ready for battle
  - were prepared for war
  lexicon: BDAG
  rationale: The verb means to prepare or make ready; with εἰς πόλεμον the sense is
    military readiness. English pluperfect-like 'had prepared' fits the reported content
    naturally.
- source_word: τὰς ὁδοὺς τῆς ὀρεινῆς
  chosen: the roads of the hill country
  alternatives:
  - the mountain roads
  - the roads of the mountainous region
  lexicon: LSJ
  rationale: ἡ ὀρεινή denotes hill country or mountainous region. 'Roads of the hill
    country' is idiomatic and keeps the geographic nuance without over-specifying.
- source_word: συνέκλεισαν
  chosen: had blocked
  alternatives:
  - had shut off
  - had closed
  lexicon: BDAG
  rationale: The verb means to shut in or close off. In the context of roads and military
    defense, 'blocked' is the clearest modern English rendering.
- source_word: ἐτείχισαν
  chosen: fortified
  alternatives:
  - walled
  - built walls around
  lexicon: LSJ
  rationale: From τειχίζω, to fortify or wall. 'Fortified' communicates the military
    action clearly and naturally in English.
- source_word: πᾶσαν κορυφὴν ὄρους ὑψηλοῦ
  chosen: every summit of the high mountains
  alternatives:
  - every peak of every high mountain
  - every mountain top of the high mountains
  lexicon: LSJ
  rationale: κορυφή is summit or peak. The singular ὄρους after πᾶσαν κορυφήν is distributive
    in sense; English plural 'the high mountains' reads naturally while preserving
    the idea of elevated defensive positions.
- source_word: σκάνδαλα
  chosen: obstacles
  alternatives:
  - stumbling blocks
  - traps
  - barricades
  lexicon: BDAG
  rationale: Though σκάνδαλον can mean stumbling block figuratively, here the military-topographical
    context points to physical impediments placed in the plains. 'Obstacles' is broad
    enough to preserve the sense without over-interpreting the exact form.
- source_word: ἐν τοῖς πεδίοις
  chosen: in the plains
  alternatives:
  - on the plains
  - in the open country
  lexicon: LSJ
  rationale: πέδιον denotes plain or level ground. 'In the plains' is a straightforward
    geographic rendering matching the Greek preposition.
