translation:
  text: And the sons of Israel cried out to the Lord their God, because their spirit
    had grown faint, because all their enemies had surrounded them and there was no
    escape from among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Greek reads literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their spirit lost heart' / 'their courage failed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: A formally transparent rendering preserves the idiom of the Greek and
    its biblical resonance. 'The Israelites' is smoother English, but 'sons of Israel'
    better reflects the source wording and aligns with the project's gender-accurate
    preference unless context requires otherwise.
- source_word: ἀνεβόησαν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: LSJ
  rationale: In context of distress directed toward God, 'cried out' best captures
    an urgent appeal rather than a mere loud vocalization.
- source_word: Κύριον θεὸν αὐτῶν
  chosen: the Lord their God
  alternatives:
  - their Lord God
  lexicon: LSJ
  rationale: This follows the standard rendering of κύριος as 'Lord' per doctrine
    and preserves the familiar covenantal phrase structure.
- source_word: ὠλιγοψύχησεν
  chosen: had grown faint
  alternatives:
  - became discouraged
  - grew impatient
  - lost heart
  lexicon: LSJ
  rationale: The verb denotes becoming fainthearted or losing courage. 'Had grown
    faint' keeps the metaphor tied to inner vitality while remaining natural English.
    'Lost heart' is possible, but the Greek explicitly speaks of their spirit.
- source_word: τὸ πνεῦμα αὐτῶν
  chosen: their spirit
  alternatives:
  - their courage
  - their soul
  lexicon: LSJ
  rationale: The Greek noun is literally 'spirit.' Since the surrounding verb already
    conveys discouragement, retaining 'spirit' preserves the source image without
    over-interpreting it as merely psychological courage.
- source_word: ἐκύκλωσαν
  chosen: had surrounded
  alternatives:
  - encircled
  - closed in around
  lexicon: LSJ
  rationale: 'The aorist in this causal clause is well represented by English pluperfect
    in context: the people cry out because the enemies had already surrounded them.'
- source_word: οὐκ ἦν διαφυγεῖν
  chosen: there was no escaping
  alternatives:
  - it was impossible to escape
  - there was no way to flee
  lexicon: LSJ
  rationale: This idiomatic rendering communicates the impersonal Greek construction
    naturally while preserving the sense of impossibility.
- source_word: ἐκ μέσου αὐτῶν
  chosen: from among them
  alternatives:
  - out of their midst
  - from the middle of them
  lexicon: LSJ
  rationale: '''From among them'' is idiomatic English and accurately reflects the
    sense of being trapped within surrounding enemies.'
