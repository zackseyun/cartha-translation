theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's default for κύριος is 'Lord.' In this prayer context it
    functions as the divine title and should not be weakened to 'Master.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Gendered collective expression οἱ υἱοὶ Ἰσραήλ
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source uses a masculine familial expression. Per doctrine, gender-accurate
    rendering is preferred over flattening to a neutral collective unless context
    demands it. Here the traditional idiom is also semantically transparent.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
