theological_decisions:
- issue: Rendering of κύριος in a deuterocanonical Greek context referring to Israel's
    God
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: Per doctrine, κύριος defaults to 'Lord.' Although the referent is Israel's
    God, the Greek source reads κύριος, and the project's policy reserves 'the LORD'
    primarily for explicit YHWH representation from Hebrew contexts.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Gendered address ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The source uses a masculine plural form of address. Per doctrine, gender-accurate
    rendering is preferred, with inclusivity not imported into the main text unless
    demanded by context.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
