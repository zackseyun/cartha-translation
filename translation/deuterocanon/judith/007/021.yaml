translation:
  text: And the cisterns were being emptied, and they did not have water to drink
    their fill for even one day, because it was given to them to drink by measure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in measured amounts' or 'sparingly'; the Greek literally says 'by measure,'
      indicating rationed distribution of water.
    reason: lexical_alternative
lexical_decisions:
- source_word: λάκκοι
  chosen: cisterns
  alternatives:
  - pits
  - reservoirs
  - wells
  lexicon: LSJ
  rationale: In this siege context, λάκκοι refers to dug water-storage places rather
    than generic pits. 'Cisterns' best conveys stored water sources in readable modern
    English.
- source_word: ἐξεκενοῦντο
  chosen: were being emptied
  alternatives:
  - were running dry
  - were drained
  - were becoming empty
  lexicon: LSJ
  rationale: The imperfect middle/passive indicates an ongoing process. 'Were being
    emptied' stays close to the Greek while naturally expressing depletion over time;
    'running dry' is possible but slightly more interpretive.
- source_word: οὐκ εἶχον πεῖν
  chosen: they did not have enough water to drink
  alternatives:
  - they had nothing to drink
  - they did not have to drink
  lexicon: LSJ
  rationale: 'The infinitive πεῖν depends on εἶχον idiomatically: they lacked drinkable
    water. Because ὕδωρ follows with εἰς πλησμονήν, the sense is not absolute absence
    but insufficiency, so ''did not have enough water to drink'' best captures the
    clause.'
- source_word: εἰς πλησμονὴν
  chosen: enough
  alternatives:
  - to fullness
  - in abundance
  - to satisfaction
  lexicon: LSJ
  rationale: Literally 'unto fullness,' meaning sufficient quantity. 'Enough' gives
    the idiomatic sense in current English without over-paraphrasing; 'to satisfaction'
    is possible but less natural here.
- source_word: ἡμέραν μίαν
  chosen: for even one day
  alternatives:
  - for one day
  - a single day
  lexicon: LSJ
  rationale: The phrase marks the short duration for which the water supply was insufficient.
    'For even one day' brings out the rhetorical force of the statement in context,
    though the Greek does not use an explicit particle for 'even'; it is an English
    idiomatic intensification of the minimal duration.
- source_word: ἐν μέτρῳ
  chosen: by measure
  alternatives:
  - in measured amounts
  - sparingly
  - rationed
  lexicon: LSJ
  rationale: The phrase literally means 'by measure,' indicating rationing. Retaining
    'by measure' preserves the concrete imagery and allows readers to infer rationing
    from the wording.
- source_word: ἐδίδοσαν αὐτοῖς πεῖν
  chosen: it was given to them to drink
  alternatives:
  - they were given drink
  - they were given water to drink
  - they gave them drink
  lexicon: LSJ
  rationale: The Greek uses an impersonal/plural construction. 'It was given to them
    to drink' preserves the passive-like sense without specifying an agent not named
    in the text.
