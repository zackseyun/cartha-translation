  text: καὶ οἱ λάκκοι ἐξεκενοῦντο, καὶ οὐκ εἶχον πεῖν εἰς πλησμονὴν ὕδωρ ἡμέραν μίαν,
    ὅτι ἐν μέτρῳ ἐδίδοσαν αὐτοῖς πεῖν.
