  text: τῇ δὲ ἡμέρᾳ τῇ δευτέρᾳ ἐξήγαγεν Ὁλοφέρνης πᾶσαν τὴν ἵππον αὐτοῦ κατὰ πρόσωπον
    τῶν υἱῶν Ἰσραὴλ οἳ ἦσαν ἐν Βετυλουά,
