translation:
  text: And on the second day Holofernes brought out all his cavalry in front of the
    sons of Israel who were in Bethulia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Greek reads 'the sons of Israel,' a traditional
      ethnic designation.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ ... ἡμέρᾳ τῇ δευτέρᾳ
  chosen: on the second day
  alternatives:
  - on the next day
  - on day two
  lexicon: LSJ
  rationale: The dative with article functions temporally. 'On the second day' is
    the most direct and natural rendering, preserving the sequence indicated by the
    Greek.
- source_word: ἐξήγαγεν
  chosen: brought out
  alternatives:
  - led out
  - marched out
  lexicon: LSJ
  rationale: The verb means to lead or bring out. 'Brought out' is broad enough to
    fit the military movement without over-specifying the manner; 'marched out' would
    add a nuance not explicit in the verb itself.
- source_word: πᾶσαν τὴν ἵππον
  chosen: all his cavalry
  alternatives:
  - all the horsemen
  - all his horse
  lexicon: LSJ
  rationale: Although literally 'all the horse,' ἵππος in military context can denote
    cavalry/horsemen collectively. 'All his cavalry' conveys the collective military
    force idiomatically in English while remaining faithful to the sense.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - of him
  lexicon: LSJ
  rationale: The possessive pronoun naturally refers to Holofernes' forces. English
    requires the possessive form 'his'.
- source_word: κατὰ πρόσωπον
  chosen: in front of
  alternatives:
  - before
  - opposite
  - facing
  lexicon: LSJ
  rationale: The phrase indicates position over against someone. 'In front of' is
    clear modern English and fits the military staging context.
- source_word: τῶν υἱῶν Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: Given the project's gender-accurate policy and the formal force of the
    phrase, 'the sons of Israel' preserves the source expression. 'Israelites' is
    possible but less transparent to the Greek wording.
- source_word: οἳ ἦσαν ἐν Βετυλουά
  chosen: who were in Bethulia
  alternatives:
  - who were at Bethulia
  - who were in Betylua
  lexicon: LSJ
  rationale: The relative clause identifies the Israelites by location. 'In Bethulia'
    is the straightforward rendering of ἐν plus place name. The conventional English
    form 'Bethulia' is used for the transliterated place name.
