  confidence: high
  validation: agree
translation:
  text: For this people, the sons of Israel, do not rely on their spears, but on the
    heights of their mountains, in which they themselves dwell; for it is not easy
    to approach the summits of their mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of Israel' or 'Israelites.' The Greek reads literally 'sons
      of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to go up to the summits of their mountains.' The Greek verb can carry
      the sense of moving up toward elevated ground.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαὸς
  chosen: people
  alternatives:
  - nation
  lexicon: BDAG
  rationale: '''People'' is the natural collective rendering here for a national group;
    ''nation'' is possible but less direct in this military speech.'
- source_word: υἱῶν Ἰσραήλ
  chosen: sons of Israel
  alternatives:
  - children of Israel
  - Israelites
  lexicon: LEH
  rationale: The Greek explicitly says 'sons of Israel.' This preserves the source
    wording more closely than 'Israelites.' 'Children of Israel' is traditional, but
    'sons' better matches the masculine plural form per the project's gender-accurate
    policy.
- source_word: οὐ πέποιθαν ἐπὶ τοῖς δόρασιν αὐτῶν
  chosen: do not rely on their spears
  alternatives:
  - have not trusted in their spears
  - do not put confidence in their weapons
  lexicon: BDAG
  rationale: πέποιθαν conveys settled trust/reliance. Present English 'do not rely'
    communicates the force idiomatically. δόρασιν is specifically 'spears,' not generic
    'weapons,' so the concrete image is retained.
- source_word: ἀλλʼ ἐπὶ τοῖς ὕψεσι τῶν ὀρέων αὐτῶν
  chosen: but on the heights of their mountains
  alternatives:
  - but on the high places of their mountains
  - but on their mountain heights
  lexicon: LEH
  rationale: ὕψεσι refers to heights/elevations. 'Heights of their mountains' preserves
    the topographical emphasis without importing cultic overtones that 'high places'
    can carry in English.
- source_word: ἐν οἷς αὐτοὶ ἐνοικοῦσιν ἐν αὐτοῖς
  chosen: in which they themselves dwell
  alternatives:
  - where they live
  - in which they inhabit them
  lexicon: BDAG
  rationale: The phrase is somewhat emphatic and repetitive in Greek. 'They themselves
    dwell' preserves αὐτοὶ and avoids awkward over-literal repetition of the second
    ἐν αὐτοῖς.
- source_word: οὐ γὰρ ἔστιν εὐχερὲς
  chosen: for it is not easy
  alternatives:
  - for it is not feasible
  - for it is difficult
  lexicon: LEH
  rationale: εὐχερές means easy/feasible. 'Not easy' is the most natural English equivalent
    and fits the military assessment.
- source_word: προσβῆναι
  chosen: to approach
  alternatives:
  - to go up to
  - to attack
  - to gain access to
  lexicon: BDAG
  rationale: The verb can imply going toward or up to a place. In context of mountain
    summits, 'approach' is broad and natural; 'go up to' is possible, but 'approach'
    better fits the infinitive with the following dative phrase in English.
- source_word: ταῖς κορυφαῖς τῶν ὀρέων αὐτῶν
  chosen: the summits of their mountains
  alternatives:
  - the peaks of their mountains
  - the mountain tops
  lexicon: LEH
  rationale: κορυφαῖς denotes tops/summits. 'Summits' preserves the elevated, strategic
    sense of the terrain.
