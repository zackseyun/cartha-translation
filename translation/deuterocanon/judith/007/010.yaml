id: JDT.7.10
reference: Judith 7:10
source:
  edition: lxx-swete-1909
  text: ὁ γὰρ λαὸς οὗτος τῶν υἱῶν Ἰσραὴλ οὐ πέποιθαν ἐπὶ τοῖς δόρασιν αὐτῶν ἀλλʼ ἐπὶ
    τοῖς ὕψεσι τῶν ὀρέων αὐτῶν, ἐν οἷς αὐτοὶ ἐνοικοῦσιν ἐν αὐτοῖς· οὐ γὰρ ἔστιν εὐχερὲς
    προσβῆναι ταῖς κορυφαῖς τῶν ὀρέων αὐτῶν.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 808
  - 809
  - 810
  - 811
  - 812
