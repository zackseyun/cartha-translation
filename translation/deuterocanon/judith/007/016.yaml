  confidence: high
  validation: agree
translation:
  text: And their words pleased Holofernes and all his attendants, and he gave orders
    to do as they had said.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤρεσαν
  chosen: pleased
  alternatives:
  - were pleasing to
  - seemed good to
  lexicon: BDAG
  rationale: The aorist of ἀρέσκω here expresses favorable reception of the speakers'
    proposal. 'Pleased' is natural modern English and preserves the personal object
    construction with Holofernes and his attendants.
- source_word: οἱ λόγοι αὐτῶν
  chosen: their words
  alternatives:
  - what they said
  - their proposal
  lexicon: BDAG
  rationale: λόγοι literally means 'words,' but in context refers to the content of
    their counsel. 'Their words' stays close to the Greek while remaining idiomatic.
- source_word: θεραπόντων
  chosen: attendants
  alternatives:
  - servants
  - retainers
  lexicon: LSJ
  rationale: θεράπων often denotes an attendant or retainer rather than a generic
    household servant. 'Attendants' fits a military-court setting around Holofernes
    without overstating bonded status.
- source_word: συνέταξε
  chosen: he gave orders
  alternatives:
  - he ordered
  - he arranged
  lexicon: BDAG
  rationale: συντάσσω in this context means to direct or command that something be
    done. 'He gave orders' captures the authoritative nuance and reads smoothly in
    English.
- source_word: ποιεῖν καθὰ ἐλάλησαν
  chosen: to do as they had said
  alternatives:
  - to do according to what they said
  - to act as they had spoken
  lexicon: BDAG
  rationale: The infinitive ποιεῖν with καθά introduces the content of the order.
    'To do as they had said' is a clear, faithful rendering of the Greek sequence.
