id: JDT.7.16
reference: Judith 7:16
source:
  edition: lxx-swete-1909
  text: Καὶ ἤρεσαν οἱ λόγοι αὐτῶν ἐνώπιον Ὀλοφέρνου καὶ ἐνώπιον πάντων τῶν θεραπόντων
    αὐτοῦ, καὶ συνέταξε ποιεῖν καθὰ ἐλάλησαν.
  language: Greek
  pages:
