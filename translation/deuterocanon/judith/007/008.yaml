translation:
  text: And all the rulers of the sons of Esau, and all the leaders of the people
    of Moab, and the generals of the seacoast came to him and said,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Edomites' for 'the sons of Esau,' an ethnic equivalent implied by
      the Greek expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'the coastal region' for 'the seacoast.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  chosen: came to him
  alternatives:
  - approached him
  - having come near to him
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι introducing the main verb εἶπαν. 'Came
    to him' is natural English and preserves the movement toward him without overly
    wooden participial phrasing.
- source_word: ἄρχοντες
  chosen: rulers
  alternatives:
  - princes
  - chiefs
  - leaders
  lexicon: BDAG
  rationale: ἄρχοντες denotes persons in authority. 'Rulers' best conveys political
    authority here and distinguishes it from ἡγούμενοι later in the verse.
- source_word: υἱῶν Ἠσαῦ
  chosen: the sons of Esau
  alternatives:
  - the Edomites
  lexicon: BDAG
  rationale: The Greek literally says 'sons of Esau.' Because the translation philosophy
    prefers source-language primacy and names/titles transparency, the literal ethnic
    designation is retained rather than replacing it with the interpretive equivalent
    'Edomites.'
- source_word: ἡγούμενοι
  chosen: leaders
  alternatives:
  - governors
  - chief men
  - those leading
  lexicon: BDAG
  rationale: This term overlaps with leadership but is not identical to ἄρχοντες.
    'Leaders' is a readable modern rendering that preserves the distinction from 'rulers'
    earlier in the verse.
- source_word: λαοῦ Μωὰβ
  chosen: the people of Moab
  alternatives:
  - Moab
  - the Moabite people
  lexicon: BDAG
  rationale: The genitive construction is straightforward. 'The people of Moab' preserves
    the full expression without unnecessary compression.
- source_word: στρατηγοὶ
  chosen: generals
  alternatives:
  - commanders
  - military leaders
  lexicon: BDAG
  rationale: στρατηγοί are military officials. 'Generals' is concise and suitably
    formal in this war context.
- source_word: παραλίας
  chosen: the seacoast
  alternatives:
  - the coastland
  - the coastal region
  lexicon: LSJ
  rationale: παραλία refers to a coastal region. 'Seacoast' is idiomatic and clear,
    while still reflecting the geographic sense.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Standard rendering of the narrative speech verb; no reason to vary here.
