id: JDT.7.8
reference: Judith 7:8
source:
  edition: lxx-swete-1909
  text: Καὶ προσελθόντες αὐτῷ πάντες ἄρχοντες υἱῶν Ἠσαῦ καὶ πάντες οἱ ἡγούμενοι τοῦ
    λαοῦ Μωὰβ καὶ οἱ στρατηγοὶ τῆς παραλίας εἶπαν
  language: Greek
