theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The project's default rendering for κύριος is 'Lord.' In this prayer
    context it denotes God and should be translated rather than transliterated or
    reduced to 'Master.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering of ἐκκλησία
  chosen_reading: assembly
  alternative_readings:
  - congregation
  rationale: The term refers to the gathered people in Judith, not the later Christian
    church. 'Assembly' preserves the communal sense without importing later ecclesiological
    associations.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition'
