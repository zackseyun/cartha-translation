id: JDT.7.13
reference: Judith 7:13
source:
  edition: lxx-swete-1909
  text: διότι ἐκεῖθεν ὑδρεύονται πάντες οἱ κατοικοῦντες Βαιτυλουά, καὶ ἀνελεῖ αὐτοὺς
    ἡ δίψα, καὶ ἐκδώσουσι τὴν πόλιν αὐτῶν· καὶ ἡμεῖς καὶ ὁ λαὸς ἡμῶν ἀναβησόμεθα ἐπὶ
    τὰς πλησίον κορυφὰς τῶν ὀρέων,
  language: Greek
