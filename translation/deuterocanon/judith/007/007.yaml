id: JDT.7.7
reference: Judith 7:7
source:
  edition: lxx-swete-1909
  text: καὶ ἐπεσκέψατο τὰς ἀναβάσεις τῆς πόλεως αὐτῶν, καὶ τὰς πηγὰς τῶν ὑδάτων ἐφώδευεν
    καὶ προκατέλαβε αὐτάς, καὶ ἐπέστησεν αὐταῖς παρεμβολὰς ἀνδρῶν πολεμιστῶν, καὶ
    αὐτὸς ἀνέζευξεν εἰς τὸν λαὸν αὐτοῦ.
