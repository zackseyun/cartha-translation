id: JDT.7.22
reference: Judith 7:22
source:
  edition: lxx-swete-1909
  text: καὶ ἠθύμησεν τὰ νήπια αὐτῶν, καὶ αἱ γυναῖκες καὶ οἱ νεανίσκοι ἐξέλιπον ἀπὸ
    τῆς δίψης, καὶ ἔπιπτον ἐν ταῖς πλατείαις τῆς πόλεως καὶ ἐν ταῖς διόδοις τῶν πυλῶν,
    καὶ οὐκ ἦν κραταίωσις ἔτι ἐν αὐτοῖς.
