translation:
  text: And each of them took up his weapons of war, and after kindling fires on their
    towers, they remained on guard through that whole night.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναλαβόντες
  chosen: took up
  alternatives:
  - picked up
  - took
  lexicon: BDAG
  rationale: The participle indicates taking up or assuming in preparation for action.
    'Took up' fits military readiness in idiomatic English without over-paraphrasing.
- source_word: ἕκαστος
  chosen: each of them
  alternatives:
  - each one
  - each man
  lexicon: LSJ
  rationale: The distributive sense is explicit. 'Each of them' is natural English
    and avoids adding 'man,' which is not present in the Greek.
- source_word: τὰ σκεύη τὰ πολεμικὰ
  chosen: weapons of war
  alternatives:
  - military equipment
  - war gear
  - weapons
  lexicon: LSJ
  rationale: σκευή can mean equipment or gear, and with the attributive πολεμικά the
    phrase denotes martial implements. 'Weapons of war' preserves the military force
    more clearly than the broader 'equipment,' while remaining faithful to the context.
- source_word: ἀνακαύσαντες πυράς
  chosen: after kindling fires
  alternatives:
  - lighting fires
  - having lit fires
  lexicon: LSJ
  rationale: The aorist participle denotes an action preceding the main verb. 'After
    kindling fires' preserves that sequence and the concrete image.
- source_word: ἐπὶ τοὺς πύργους αὐτῶν
  chosen: on their towers
  alternatives:
  - upon their towers
  - at their towers
  lexicon: LSJ
  rationale: ἐπί with the accusative here is naturally rendered as location on/upon.
    'On their towers' is clear modern English and suits the defensive setting.
- source_word: ἔμενον φυλάσσοντες
  chosen: they remained on guard
  alternatives:
  - they stayed watchful
  - they remained guarding
  - they kept watch
  lexicon: BDAG
  rationale: 'The periphrastic-like combination conveys continued action: they stayed
    in a guarding posture. ''Remained on guard'' captures both duration and military
    vigilance.'
- source_word: ὅλην τὴν νύκτα ἐκείνην
  chosen: through that whole night
  alternatives:
  - all that night
  - the entire night
  lexicon: LSJ
  rationale: The phrase emphasizes the full duration of that specific night. 'Through
    that whole night' preserves both duration and demonstrative force.
