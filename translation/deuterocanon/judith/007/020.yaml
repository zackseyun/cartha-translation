translation:
  text: And the whole camp of Assyria remained around them—the foot soldiers and chariots
    and their horsemen—for thirty-four days; and all the water containers of all the
    inhabitants of Bethulia ran out,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'all their vessels of water.' This may refer specifically
      to the containers in which water was stored, and by implication to the city's
      available water supply.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔμεινεν
  chosen: remained
  alternatives:
  - stayed
  - encamped
  lexicon: BDAG
  rationale: The verb means to remain or stay. 'Remained' preserves the simple durative
    sense without adding the more specific military nuance 'encamped,' which is already
    conveyed by παρεμβολή.
- source_word: κύκλῳ αὐτῶν
  chosen: around them
  alternatives:
  - all around them
  - surrounding them
  lexicon: LSJ
  rationale: κύκλῳ with the genitive indicates position around someone. 'Around them'
    is natural English and preserves the siege setting without over-paraphrase.
- source_word: πᾶσα παρεμβολὴ Ἀσσούρ
  chosen: the whole camp of Assyria
  alternatives:
  - the whole Assyrian camp
  - all the camp of Assyria
  lexicon: LSJ
  rationale: παρεμβολή commonly means camp or encampment in military contexts. 'The
    whole camp of Assyria' closely follows the Greek genitival construction while
    remaining readable.
- source_word: οἱ πεζοὶ
  chosen: the foot soldiers
  alternatives:
  - the infantry
  - the footmen
  lexicon: LSJ
  rationale: πεζοί refers to troops on foot. 'Foot soldiers' is clear modern English
    and slightly more accessible than 'infantry' while preserving the military distinction.
- source_word: ἅρματα
  chosen: chariots
  alternatives:
  - war chariots
  lexicon: LSJ
  rationale: The basic sense is 'chariots.' Adding 'war' would be interpretive, since
    the military setting already makes the function clear.
- source_word: οἱ ἱππεῖς αὐτῶν
  chosen: their horsemen
  alternatives:
  - their cavalry
  - their mounted troops
  lexicon: LSJ
  rationale: ἱππεῖς are horsemen or cavalry. 'Their horsemen' preserves the concrete
    imagery and mirrors the Greek possessive αὐτῶν.
- source_word: ἡμέρας τριάκοντα τέσσαρες
  chosen: for thirty-four days
  alternatives:
  - thirty-four days
  lexicon: LSJ
  rationale: The accusative of extent of time is naturally rendered with 'for' in
    English.
- source_word: ἐξέλιπεν
  chosen: ran out
  alternatives:
  - failed
  - was exhausted
  - gave out
  lexicon: BDAG
  rationale: In context of water supplies, the verb conveys depletion. 'Ran out' is
    idiomatic modern English and accurately expresses the exhaustion of supply.
- source_word: ἅπαντας τοὺς κατοικοῦντας Βαιτυλουά
  chosen: all the inhabitants of Bethulia
  alternatives:
  - everyone living in Bethulia
  - all those dwelling in Bethulia
  lexicon: LSJ
  rationale: The phrase refers comprehensively to the residents of the city. 'All
    the inhabitants of Bethulia' is both formal enough and natural.
- source_word: πάντα τὰ ἀγγεῖα αὐτῶν τῶν ὑδάτων
  chosen: all the water containers
  alternatives:
  - all their vessels of water
  - all their water jars
  - all their water supplies
  lexicon: LSJ
  rationale: Literally, 'all their vessels of waters/water.' The phrase most directly
    refers to containers holding water, not abstract supply alone. 'Water containers'
    preserves the concrete image while remaining readable. The possessive is implicit
    in English context and the following clause already identifies whose containers
    are in view.
- source_word: Βαιτυλουά
  chosen: Bethulia
  alternatives:
  - Baithyloua
  rationale: Standard English transliteration for the place name in Judith is 'Bethulia,'
    which is more recognizable than a stricter letter-by-letter transliteration.
