theological_decisions:
- issue: Divine agency in Israel's defeat
  chosen_reading: God has sold us into their hands
  alternative_readings:
  - God has handed us over to them
  rationale: The text explicitly attributes the people's desperate condition to God's
    action. The translation preserves that theological tension rather than softening
    the statement. The metaphor 'sold' is retained because it is the plain sense of
    the Greek verb.
