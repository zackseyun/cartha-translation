translation:
  text: And now there is no one to help us; rather, God has sold us into their hands,
    to be laid low before them in thirst and great destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has handed us over into their hands.' The Greek verb literally means
      'has sold,' a stronger metaphor of being given over to enemy power.
    reason: lexical_alternative
  - marker: b
    text: Or 'to be overthrown before them' or 'to be struck down before them.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'in thirst and great destruction' may also be understood as 'by
      thirst and great ruin,' describing the means or condition of their downfall.
    reason: lexical_alternative
lexical_decisions:
- source_word: βοηθός
  chosen: one to help
  alternatives:
  - helper
  - help
  lexicon: BDAG
  rationale: The Greek has the articular singular noun with possessive sense, literally
    'our helper.' In idiomatic modern English, 'there is no one to help us' communicates
    the personal sense clearly without sounding wooden.
- source_word: πέπρακεν
  chosen: has sold
  alternatives:
  - has delivered
  - has handed over
  lexicon: LSJ
  rationale: From πράσκω, commonly 'sell.' The commercial metaphor is strong and should
    be preserved rather than softened to merely 'deliver,' especially since the speaker
    interprets their plight as God giving them over to enemies.
- source_word: εἰς τὰς χεῖρας αὐτῶν
  chosen: into their hands
  alternatives:
  - to them
  - into the power of them
  lexicon: BDAG
  rationale: This is a standard idiom for being given over to another's power. 'Into
    their hands' preserves the biblical idiom and remains natural English.
- source_word: τοῦ καταστρωθῆναι
  chosen: to be laid low
  alternatives:
  - to be overthrown
  - to be struck down
  - to be trampled down
  lexicon: LSJ
  rationale: The infinitive expresses result/purpose after being handed over. 'Laid
    low' captures defeat and humiliation without overcommitting to a narrower image
    such as trampling.
- source_word: ἐναντίον αὐτῶν
  chosen: before them
  alternatives:
  - in their presence
  - against them
  lexicon: BDAG
  rationale: 'In this context, after ''to be laid low,'' the sense is spatial/relational:
    humiliated in front of the enemy. ''Against them'' is possible in isolation but
    fits the syntax less well here.'
- source_word: ἐν δίψει
  chosen: in thirst
  alternatives:
  - by thirst
  - from thirst
  lexicon: BDAG
  rationale: The preposition ἐν can denote circumstance or means. 'In thirst' is slightly
    more formal but preserves the Greek's compressed expression and pairs well with
    the following noun phrase.
- source_word: ἀπωλείᾳ μεγάλῃ
  chosen: great destruction
  alternatives:
  - great ruin
  - great perdition
  - utter destruction
  lexicon: BDAG
  rationale: ἀπώλεια denotes ruin or destruction. 'Great destruction' is straightforward
    and avoids importing later theological overtones of 'perdition.'
