  text: καὶ ἀνταποδώσεις αὐτοῖς ἀνταπόδομα πονηρὸν ἀνθʼ ὧν ἐστασίασαν καὶ οὐκ ἀπήντησαν
    τῷ προσώπῳ σου ἐν εἰρήνῃ.
