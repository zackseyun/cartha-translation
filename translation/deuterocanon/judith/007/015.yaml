translation:
  text: And you will repay them with an evil repayment, because they rebelled and
    did not meet you in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'repay them an evil repayment,' a cognate expression that intensifies
      the idea of requital.
    reason: lexical_alternative
  - marker: b
    text: Or 'did not go out to meet you in peace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνταποδώσεις
  chosen: you will repay
  alternatives:
  - you will pay back
  - you will recompense
  lexicon: BDAG
  rationale: Future verb of requital; 'repay' is natural modern English and preserves
    the sense of giving back in response to prior action.
- source_word: ἀνταπόδομα πονηρόν
  chosen: an evil repayment
  alternatives:
  - a wicked recompense
  - a harmful return
  lexicon: LEH
  rationale: The noun is cognate with the verb and emphasizes requital. Keeping 'repayment'
    preserves the rhetorical force of the cognate construction. 'Evil' reflects πονηρόν
    straightforwardly without softening the severity.
- source_word: ἀνθʼ ὧν
  chosen: because
  alternatives:
  - for which reason
  - in return for the things that
  lexicon: BDAG
  rationale: This idiom introduces the grounds for the repayment. 'Because' gives
    the causal sense clearly in idiomatic English.
- source_word: ἐστασίασαν
  chosen: they rebelled
  alternatives:
  - they revolted
  - they caused dissension
  lexicon: LEH
  rationale: The verb denotes taking a rebellious or seditious stance. 'They rebelled'
    is concise and fits the context of hostile refusal.
- source_word: οὐκ ἀπήντησαν
  chosen: did not meet
  alternatives:
  - did not go to meet
  - did not greet
  lexicon: BDAG
  rationale: The verb commonly means to go out to meet someone. 'Did not meet' is
    slightly compressed but remains faithful; the following phrase 'in peace' clarifies
    the diplomatic sense.
- source_word: τῷ προσώπῳ σου
  chosen: you
  alternatives:
  - your face
  - your presence
  lexicon: LEH
  rationale: Literally 'your face,' but in this idiom it refers to meeting the person
    himself. Rendering it simply as 'you' avoids wooden English while preserving the
    sense.
- source_word: ἐν εἰρήνῃ
  chosen: in peace
  alternatives:
  - peacefully
  - with peaceful intent
  lexicon: BDAG
  rationale: The phrase likely denotes a peaceful approach or reception. 'In peace'
    keeps the biblical idiom and leaves the nuance broad enough to include peaceful
    intent and diplomatic submission.
