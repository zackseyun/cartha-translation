translation:
  text: And the camp of the sons of Ammon moved on, and with them five thousand Assyrians,
    and they encamped in the valley and seized the waters and the springs of water
    of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ammonites.' The Greek reads literally 'sons of Ammon.'
    reason: lexical_alternative
  - marker: b
    text: The Greek term rendered 'valley' can also mean a hollow, glen, or enclosed
      plain, depending on terrain.
    reason: lexical_alternative
  - marker: c
    text: Or 'occupied' or 'secured in advance'; the verb suggests strategic seizure
      of the water sources.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  chosen: moved on
  alternatives:
  - set out
  - departed
  - advanced
  lexicon: LSJ
  rationale: From ἀπαίρω/ἀπαίρωμαι in narrative movement context, indicating breaking
    camp and proceeding onward. 'Moved on' fits military narrative naturally without
    overinterpreting as either simple departure or aggressive advance.
- source_word: παρεμβολὴ
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: LSJ
  rationale: The noun commonly denotes a camp or encamped force. 'Camp' is concise
    and natural in English while still allowing the military sense.
- source_word: υἱῶν Ἀμμών
  chosen: sons of Ammon
  alternatives:
  - Ammonites
  lexicon: LSJ
  rationale: A more formal rendering preserves the literal ethnonym construction in
    the Greek. 'Ammonites' is possible, but 'sons of Ammon' better reflects the source
    phrasing and matches the following 'sons of Israel'.
- source_word: χιλιάδες πέντε
  chosen: five thousand
  alternatives:
  - five thousands
  lexicon: LSJ
  rationale: Idiomatic English numeral rendering. The Greek expresses a total troop
    number accompanying them.
- source_word: υἱῶν Ἀσσούρ
  chosen: Assyrians
  alternatives:
  - sons of Asshur
  - sons of Assyria
  lexicon: LSJ
  rationale: Here the ethnicon is best rendered idiomatically in English. Because
    the phrase is numeric and military, 'five thousand Assyrians' reads naturally
    and conveys the sense clearly.
- source_word: παρενέβαλον
  chosen: encamped
  alternatives:
  - pitched camp
  - camped
  lexicon: LSJ
  rationale: Standard military verb for making camp. 'Encamped' preserves the formal
    narrative tone.
- source_word: ἐν τῷ αὐλῶνι
  chosen: in the valley
  alternatives:
  - in the court
  - in the enclosure
  - in the plain
  lexicon: LSJ
  rationale: In this military-geographical context, αὐλών refers not to an architectural
    court but to a hollow, valley, or mountain glen. 'Valley' is the clearest natural
    rendering.
- source_word: προκατελάβοντο
  chosen: seized
  alternatives:
  - occupied
  - took possession of
  - preemptively secured
  lexicon: LSJ
  rationale: The compound verb conveys taking possession beforehand or occupying strategically.
    'Seized' communicates the hostile military action succinctly; the strategic nuance
    is implicit in context.
- source_word: τὰ ὕδατα
  chosen: the waters
  alternatives:
  - the water supply
  - the water
  lexicon: LSJ
  rationale: The plural is retained because the Greek has plural and likely refers
    to water sources collectively rather than a single body of water.
- source_word: τὰς πηγὰς τῶν ὑδάτων
  chosen: the springs of water
  alternatives:
  - the water springs
  - the springs
  - the sources of the waters
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the double expression in Greek,
    which emphasizes both the waters and their sources.
- source_word: τῶν υἱῶν Ἰσραήλ
  chosen: of the sons of Israel
  alternatives:
  - of Israel
  - belonging to the Israelites
  lexicon: LSJ
  rationale: This keeps the literal covenantal-ethnic expression and balances the
    earlier 'sons of Ammon.' It also avoids overreading possession beyond the genitive
    relation in context.
