id: JDT.7.12
reference: Judith 7:12
source:
  edition: lxx-swete-1909
  text: ἀνάμεινον ἐπὶ τῆς παρεμβολῆς σου, ἀσφαλίζων πάντα ἄνδρα ἐκ τῆς δυνάμεώς σου,
    καὶ ἐπικρατησάτωσαν οἱ παῖδές σου τῆς πηγῆς τοῦ ὕδατος ἡ ἐκπορεύεται ἐκ τῆς ῥίζης
    τοῦ ὄρους,
