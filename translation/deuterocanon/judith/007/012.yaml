translation:
  text: Remain by your camp, securing every man from your force, and let your servants
    gain control of the spring of water that comes out from the foot of the mountain,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your men' for 'your servants' (οἱ παῖδές σου); the Greek term can denote
      servants, attendants, or subordinates in context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the root of the mountain,' an idiom for its base or foot.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάμεινον
  chosen: Remain
  alternatives:
  - Wait
  - Stay
  lexicon: LSJ
  rationale: Imperative of remaining/staying in place. 'Remain' fits the military
    instruction context without implying mere delay as strongly as 'wait'.
- source_word: παρεμβολῆς
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: LSJ
  rationale: In military context the term denotes a camp/encampment. 'Camp' is natural
    modern English and sufficiently precise.
- source_word: ἀσφαλίζων
  chosen: securing
  alternatives:
  - guarding
  - making secure
  lexicon: LSJ
  rationale: The participle conveys making safe/secure. 'Securing' preserves the active
    military sense and works smoothly with the imperative.
- source_word: πάντα ἄνδρα
  chosen: every man
  alternatives:
  - every soldier
  - all the men
  lexicon: LSJ
  rationale: The Greek is singular distributive and explicitly masculine. Per doctrine,
    gender-accurate rendering is preferred. In context it refers to the fighting men
    of the force; 'every man' preserves the form without over-interpreting to 'soldier'.
- source_word: δυνάμεώς
  chosen: force
  alternatives:
  - army
  - strength
  lexicon: LSJ
  rationale: Here the word refers to military forces rather than abstract strength.
    'Force' is slightly broader and closer to the Greek than the more interpretive
    'army'.
- source_word: ἐπικρατησάτωσαν
  chosen: gain control
  alternatives:
  - take possession
  - prevail over
  - hold
  lexicon: LSJ
  rationale: The verb means to become master of or gain control over. 'Gain control'
    clearly expresses the tactical objective regarding the water source.
- source_word: οἱ παῖδές σου
  chosen: your servants
  alternatives:
  - your men
  - your attendants
  lexicon: LSJ
  rationale: παῖδες can mean servants/attendants or, in military address, subordinates.
    'Your servants' is the more direct lexical rendering; the military nuance is supplied
    by context. 'Your men' is possible but less transparent to the source wording.
- source_word: πηγῆς τοῦ ὕδατος
  chosen: the spring of water
  alternatives:
  - the water spring
  - the water source
  lexicon: LSJ
  rationale: A literal but natural rendering of the genitive construction. 'Spring
    of water' preserves the concrete image of a spring rather than a more generalized
    'water source'.
- source_word: ἐκπορεύεται
  chosen: comes out
  alternatives:
  - flows out
  - issues forth
  lexicon: LSJ
  rationale: The verb denotes proceeding/coming out. 'Comes out' is straightforward
    modern English; 'flows out' would be slightly more interpretive though contextually
    plausible.
- source_word: ῥίζης τοῦ ὄρους
  chosen: the foot of the mountain
  alternatives:
  - the root of the mountain
  - the base of the mountain
  lexicon: LSJ
  rationale: Although ῥίζα is literally 'root,' in topographical usage it refers to
    the mountain's lower part/base. 'Foot of the mountain' is idiomatic English conveying
    the intended geography.
