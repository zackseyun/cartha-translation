id: JDT.7.26
reference: Judith 7:26
source:
  edition: lxx-swete-1909
  text: καὶ νῦν ἐπικαλέσασθε αὐτοὺς καὶ ἔκδοθε τὴν πόλιν πᾶσαν εἰς προνομὴν τῷ λαῷ
    Ὁλοφέρνου καὶ πάσῃ τῇ δυνάμει αὐτοῦ.
  language: Greek
