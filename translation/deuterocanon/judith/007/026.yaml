translation:
  text: And now call them, and hand over the whole city as plunder to the people of
    Holofernes and to all his force.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπικαλέσασθε
  chosen: call them
  alternatives:
  - summon them
  - appeal to them
  lexicon: LSJ
  rationale: In this military-surrender context, the middle imperative most naturally
    means to call upon or summon the enemy forces, not a theological 'invoke.' 'Call
    them' is concise and fits the immediate action urged.
- source_word: ἔκδοθε
  chosen: hand over
  alternatives:
  - give up
  - deliver
  lexicon: LSJ
  rationale: The imperative calls for surrendering the city to the enemy. 'Hand over'
    preserves the force of yielding control without sounding overly idiomatic or softening
    the act.
- source_word: προνομὴν
  chosen: as plunder
  alternatives:
  - for plunder
  - as spoil
  - for spoil
  lexicon: LSJ
  rationale: The noun denotes booty or spoil taken in war. 'As plunder' communicates
    that the city is to be yielded over for pillage. This best reflects the predicative
    sense after 'hand over.'
- source_word: λαῷ
  chosen: people
  alternatives:
  - army
  - troops
  lexicon: LSJ
  rationale: The Greek word is literally 'people.' In context it refers to those belonging
    to Holofernes, likely his host or soldiery, but 'people' preserves the source
    wording while remaining intelligible.
- source_word: δυνάμει
  chosen: force
  alternatives:
  - army
  - power
  lexicon: LSJ
  rationale: In military context δύναμις commonly refers to armed force. 'Force' preserves
    that sense and avoids flattening the distinction between Holofernes' 'people'
    and the totality of his military strength.
- source_word: πόλιν πᾶσαν
  chosen: the whole city
  alternatives:
  - all the city
  - the entire city
  lexicon: LSJ
  rationale: This straightforwardly expresses total surrender of the city. 'The whole
    city' is natural modern English and keeps the emphasis on completeness.
