translation:
  text: But the sons of Israel, when they saw their great number, were greatly troubled,
    and each said to his neighbor, “Now these men will lick up the whole face of the
    land, and neither the high mountains nor the ravines nor the hills will bear their
    weight.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'will consume'; the Greek verb literally means
      'will lick up,' preserving the image of devouring spread across the land.
    reason: lexical_alternative
  - marker: b
    text: '''Face of the land'' is a literal idiom for the land''s surface or expanse.'
    reason: cultural_note
lexical_decisions:
- source_word: οἱ δὲ υἱοὶ Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: A formally close rendering preserves the idiom and biblical register.
    'Israelites' is possible, but 'sons of Israel' better reflects the Greek wording
    and maintains continuity with traditional covenantal language.
- source_word: ὡς ἴδον αὐτῶν τὸ πλῆθος
  chosen: when they saw their great number
  alternatives:
  - when they saw their multitude
  - when they saw how many they were
  lexicon: LSJ
  rationale: τὸ πλῆθος denotes a multitude or large number. 'Great number' is natural
    English while preserving the sense of overwhelming numerical force.
- source_word: ἐταράχθησαν σφόδρα
  chosen: were greatly troubled
  alternatives:
  - were greatly disturbed
  - were terrified
  lexicon: LSJ
  rationale: The passive of ταράσσω indicates being disturbed or agitated. 'Were greatly
    troubled' captures the emotional upheaval without overstating it as outright terror.
- source_word: ἕκαστος πρὸς τὸν πλησίον αὐτοῦ
  chosen: each said to his neighbor
  alternatives:
  - each said to the one next to him
  - each said to his companion
  lexicon: LSJ
  rationale: πλησίον here refers to a nearby fellow Israelite. 'Neighbor' is idiomatic
    and preserves the interpersonal sense.
- source_word: Νῦν ἐκλείξουσιν οὗτοι
  chosen: Now these men will lick up
  alternatives:
  - Now these people will lick up
  - Now they will consume
  lexicon: LSJ
  rationale: ἐκλείχω literally means 'lick up,' an image of total consumption. The
    vivid metaphor should be preserved in the main text rather than flattened to 'consume.'
    'These men' renders οὗτοι naturally in context of an army.
- source_word: τὸ πρόσωπον τῆς γῆς πάσης
  chosen: the whole face of the land
  alternatives:
  - the face of the whole earth
  - the entire surface of the land
  lexicon: LSJ
  rationale: The phrase is a Semitic-style expression meaning the surface/expanse
    of the land. 'The whole face of the land' keeps the imagery while reading naturally
    enough in English.
- source_word: οὔτε τὰ ὄρη τὰ ὑψηλά οὔτε αἱ φάραγγες οὔτε οἱ βουνοί
  chosen: neither the high mountains nor the ravines nor the hills
  alternatives:
  - neither the lofty mountains nor the valleys nor the hills
  lexicon: LSJ
  rationale: The three terrain terms are distinct and should remain distinct in English.
    φάραγγες are specifically ravines/gorges rather than broad valleys.
- source_word: ὑποστήσονται τὸ βάρος αὐτῶν
  chosen: will bear their weight
  alternatives:
  - will withstand their weight
  - will support their burden
  lexicon: LSJ
  rationale: ὑφίστημι/ὑποστήσονται here conveys enduring or supporting under pressure.
    'Bear their weight' fits the image of the land groaning under an immense army.
