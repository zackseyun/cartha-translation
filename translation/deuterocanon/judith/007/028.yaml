translation:
  text: We call heaven and earth and our God and Lord of our fathers to witness against
    you, who avenges us according to our sins and according to the sins of our fathers,
    that he may not act according to these words today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'we testify to you'; the Greek likely has the sense
      of formally invoking heaven, earth, and God as witnesses against them.
    reason: lexical_alternative
  - marker: b
    text: The clause 'he who avenges us according to our sins' expresses divine retribution
      or repayment in view of sin; it could also be rendered 'he who punishes us for
      our sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτυρόμεθα
  chosen: We call ... to witness against you
  alternatives:
  - we testify to you
  - we invoke as witness against you
  lexicon: BDAG
  rationale: Middle/passive form from μαρτυρέω here takes ὑμῖν plus the listed witnesses;
    in context it is not merely 'we testify' but a formal invoking of witnesses against
    the hearers.
- source_word: ὑμῖν
  chosen: against you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: 'Although formally dative (''to you''), the legal-witness context with
    heaven, earth, and God as witnesses gives adversative force: the witnesses are
    being called against the audience''s proposed course of action.'
- source_word: τὸν οὐρανὸν καὶ τὴν γῆν
  chosen: heaven and earth
  alternatives:
  - the heaven and the earth
  lexicon: LSJ
  rationale: Standard merism for cosmic witnesses; idiomatic English omits the articles.
- source_word: τὸν θεὸν ἡμῶν καὶ κύριον τῶν πατέρων ἡμῶν
  chosen: our God and the Lord of our fathers
  alternatives:
  - our God, even the Lord of our fathers
  - our God and master of our fathers
  lexicon: BDAG
  rationale: The two accusatives are best retained as coordinated titles. κύριος is
    rendered 'Lord' per project doctrine.
- source_word: ἐκδικεῖ
  chosen: avenges
  alternatives:
  - takes vengeance on
  - vindicates by punishing
  lexicon: BDAG
  rationale: The verb can denote avenging or exacting justice. Here, with 'according
    to our sins,' the punitive sense is prominent; 'avenges' is concise while preserving
    divine retribution language.
- source_word: κατὰ τὰς ἁμαρτίας ἡμῶν καὶ κατὰ τὰ ἁμαρτήματα τῶν πατέρων ἡμῶν
  chosen: according to our sins and according to the sins of our fathers
  alternatives:
  - for our sins and for the sins of our fathers
  - in proportion to our sins and the sins of our fathers
  lexicon: BDAG
  rationale: κατά with the accusative here expresses correspondence or measure. English
    'according to' preserves the formal relation without over-interpreting. ἁμαρτίαι
    and ἁμαρτήματα are close synonyms here, so both are rendered 'sins' for natural
    English.
- source_word: ἵνα μὴ ποιήσῃ
  chosen: so that he may not act
  alternatives:
  - lest he do
  - that he may not do
  lexicon: BDAG
  rationale: Purpose/negative-result clause following the oath-like appeal. 'Act'
    fits the idiom with κατὰ τὰ ῥήματα ταῦτα better than the overly wooden 'do'.
- source_word: κατὰ τὰ ῥήματα ταῦτα
  chosen: according to these words
  alternatives:
  - in accordance with these words
  - as these words say
  lexicon: LSJ
  rationale: ῥήματα refers to the statements just spoken. 'According to these words'
    keeps the close tie to the preceding speech.
- source_word: ἐν τῇ ἡμέρᾳ τῇ σήμερον
  chosen: today
  alternatives:
  - on this day
  - in this day
  lexicon: BDAG
  rationale: Idiomatic simplification of the emphatic temporal phrase into natural
    English.
