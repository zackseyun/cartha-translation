theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek context
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Project doctrine specifies κύριος → 'Lord' as the default. Here it functions
    as a divine title linked with 'our fathers,' so 'Lord' best preserves covenantal
    resonance.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of divine judgment in ἐκδικεῖ ... κατὰ τὰς ἁμαρτίας
  chosen_reading: he who avenges us according to our sins
  alternative_readings:
  - he who punishes us for our sins
  - he who exacts justice on us according to our sins
  rationale: The text presents God as repaying or visiting judgment because of sin.
    'Avenges' keeps the lexical force of ἐκδικεῖ, while the surrounding phrase clarifies
    that this is punitive recompense rather than vindication in our favor.
