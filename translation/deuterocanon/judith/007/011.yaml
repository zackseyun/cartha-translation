id: JDT.7.11
reference: Judith 7:11
source:
  edition: lxx-swete-1909
  text: καὶ νῦν, δέσποτα, μὴ πολέμει πρὸς αὐτοὺς καθὼς γίνεται πόλεμος παρατάξεως,
    καὶ οὐ πεσεῖται ἐκ τοῦ λαοῦ σου ἀνὴρ εἷς.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 808
  - 809
  - 810
  - 811
  - 812
  - 813
  - 814
  - 815
  confidence: high
  validation: agree
translation:
  text: And now, master, do not fight against them as in a pitched battle, and not
    one man from your people will fall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as pitched battle is waged.' The Greek phrase refers to conventional
      battle in formation.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέσποτα
  chosen: master
  alternatives:
  - lord
  - sovereign
  lexicon: BDAG
  rationale: δέσποτα is a direct address meaning 'master' or 'sovereign.' Since κύριος
    is the project's default for 'Lord,' rendering δέσποτα as 'master' preserves the
    distinction and fits the human addressee in context.
- source_word: μὴ πολέμει
  chosen: do not fight
  alternatives:
  - do not make war
  - do not wage battle
  lexicon: LSJ
  rationale: The present imperative with μή naturally gives a prohibition. 'Do not
    fight' is straightforward modern English and stays close to the verbal force of
    πολεμέω.
- source_word: καθὼς γίνεται πόλεμος παρατάξεως
  chosen: as a battle line is fought
  alternatives:
  - as pitched battle is waged
  - as a set battle takes place
  lexicon: LSJ
  rationale: παράταξις refers to drawn-up battle formation or battle line. The phrase
    contrasts ordinary formation warfare with the strategy being advised. 'As a battle
    line is fought' keeps the military imagery close to the Greek, though somewhat
    idiomatic smoothing is needed in English.
- source_word: οὐ πεσεῖται
  chosen: will fall
  alternatives:
  - will be struck down
  - will perish
  lexicon: LSJ
  rationale: πίπτω in military contexts can mean 'fall' in battle, often implying
    death. 'Will fall' preserves the metaphor and leaves the exact degree of harm
    at the same level of explicitness as the Greek.
- source_word: ἀνὴρ εἷς
  chosen: not one man
  alternatives:
  - not a single man
  - no one
  lexicon: BDAG
  rationale: The Greek is explicitly masculine singular with numeral emphasis. Following
    the project's gender-accurate policy, 'not one man' preserves the source wording
    better than the more generic 'no one.'
- source_word: λαοῦ σου
  chosen: your people
  alternatives:
  - your army
  - your troops
  lexicon: BDAG
  rationale: λαός ordinarily means 'people.' Although the military context could suggest
    fighting men, the Greek does not use a more specific military term here, so 'your
    people' is retained.
