translation:
  text: And they encamped in the valley near Bethulia, by the spring, and they stretched
    out in breadth toward Dothaim as far as Belbaim, and in length from Bethulia as
    far as Cyamon, which is opposite Esdraelon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek αὐλών can mean 'court/courtyard' in some contexts, but here the geographical
      setting and nearby topographical markers support 'valley.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλον
  chosen: they encamped
  alternatives:
  - they camped
  - they pitched camp
  lexicon: LSJ
  rationale: Military movement verb from παρεμβάλλω; 'encamped' best fits the army
    setting and preserves the formal sense without awkwardness.
- source_word: ἐν τῷ αὐλῶνι
  chosen: in the valley
  alternatives:
  - in the court
  - in the courtyard
  - in the plain
  lexicon: LSJ
  rationale: In this geographical context near named locations and a spring, αὐλών
    refers to a hollow, valley, or mountain glen rather than an architectural court.
    'Valley' is the clearest natural English rendering.
- source_word: πλησίον Βαιτυλουὰ
  chosen: near Bethulia
  alternatives:
  - close to Bethulia
  lexicon: LSJ
  rationale: πλησίον is straightforwardly spatial here. Bethulia is transliterated
    as a place name per project policy.
- source_word: ἐπὶ τῆς πηγῆς
  chosen: by the spring
  alternatives:
  - at the spring
  - near the spring
  lexicon: LSJ
  rationale: πηγή denotes a spring or fountain. 'By the spring' reads naturally and
    preserves the locative force of ἐπί in context.
- source_word: παρέτειναν
  chosen: they stretched out
  alternatives:
  - they extended
  - they spread out
  lexicon: LSJ
  rationale: The verb describes the extension of the camp's line. 'Stretched out'
    is vivid, natural English and fits the following breadth/length measurements.
- source_word: εἰς εὖρος
  chosen: in breadth
  alternatives:
  - in width
  - across
  lexicon: LSJ
  rationale: The phrase marks one dimension of the encampment. 'In breadth' preserves
    the dimensional contrast with μῆκος.
- source_word: ἐπὶ Δοθαειμ ἕως Βελβαΐμ
  chosen: toward Dothaim as far as Belbaim
  alternatives:
  - from Dothaim to Belbaim
  - in the direction of Dothaim as far as Belbaim
  lexicon: LSJ
  rationale: ἐπί with a place name here is directional. 'Toward Dothaim as far as
    Belbaim' best reflects the Greek sequence without over-specifying the exact line.
- source_word: εἰς μῆκος
  chosen: in length
  alternatives:
  - in lengthwise extent
  - lengthwise
  lexicon: LSJ
  rationale: Balances εἰς εὖρος and preserves the camp's second dimension.
- source_word: ἕως Βαιτυλουὰ ἕως Κυαμῶνος
  chosen: from Bethulia as far as Cyamon
  alternatives:
  - as far as Bethulia, as far as Cyamon
  - up to Bethulia, up to Cyamon
  lexicon: LSJ
  rationale: The repeated ἕως marks the span of the camp's length. English idiom is
    clearer with 'from ... as far as ...' even though the first preposition is implicit
    rather than explicit in Greek.
- source_word: ἀπέναντι Ἐσδρηλών
  chosen: opposite Esdraelon
  alternatives:
  - facing Esdraelon
  - across from Esdraelon
  lexicon: LSJ
  rationale: ἀπέναντι indicates a position opposite or facing another location. 'Opposite'
    is concise and geographically suitable.
