id: JDT.7.23
reference: Judith 7:23
source:
  edition: lxx-swete-1909
  text: Καὶ ἐπισυνήχθησαν πᾶς ὁ λαὸς ἐπὶ Ὀζείαν καὶ τοὺς ἄρχοντας τῆς πόλεως, οἱ νεανίσκοι
    καὶ αἱ γυναῖκες καὶ τὰ παιδία, καὶ ἀνεβόησαν φωνῇ μεγάλῃ καὶ εἶπαν ἐναντίον τῶν
    πρεσβυτέρων
  language: Greek
