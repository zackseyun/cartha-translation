translation:
  text: On the next day Holofernes ordered all his army and all his people who had
    come for his alliance to break camp for Bethulia, to seize the passes of the hill
    country in advance, and to make war against the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who had come as his allies.” The Greek literally says those who had
      come to his alliance.
    reason: lexical_alternative
  - marker: b
    text: Or “the Israelites.” The Greek reads “the sons of Israel,” preserving the
      traditional familial designation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῇ δὲ ἐπαύριον
  chosen: On the next day
  alternatives:
  - The next day
  - On the following day
  lexicon: LSJ
  rationale: A standard temporal expression meaning the day after the previous events.
    'On the next day' is natural modern English and preserves the narrative sequence.
- source_word: παρήγγειλεν
  chosen: ordered
  alternatives:
  - commanded
  - gave orders
  lexicon: LSJ
  rationale: The verb denotes issuing an authoritative command. 'Ordered' is concise
    and idiomatic, fitting a military context.
- source_word: πάσῃ τῇ στρατείᾳ αὐτοῦ
  chosen: all his army
  alternatives:
  - his whole army
  - all his forces
  lexicon: LSJ
  rationale: στρατεία here refers to the military host or army rather than a campaign.
    'All his army' keeps the collective sense.
- source_word: παντὶ τῷ λαῷ αὐτοῦ
  chosen: all his people
  alternatives:
  - all his troops
  - all the people with him
  lexicon: LSJ
  rationale: λαός is broader than strictly soldiers. Since the next clause identifies
    those who had come in support of him, 'all his people' best preserves the wider
    reference.
- source_word: οἳ παρεγένοντο ἐπὶ τὴν συμμαχίαν αὐτοῦ
  chosen: who had joined his alliance
  alternatives:
  - who had come to his alliance
  - who had come as his allies
  - who had assembled for his confederacy
  lexicon: LSJ
  rationale: The clause describes those who had come to support Holofernes as allied
    forces. 'Joined his alliance' is smoother English than a more literal 'come to
    his alliance' while preserving the political-military sense of συμμαχία.
- source_word: ἀναζευγνύειν
  chosen: to break camp
  alternatives:
  - to set out
  - to march out
  lexicon: LSJ
  rationale: In military usage the verb refers to striking camp and moving out. 'Break
    camp' captures the concrete military action more precisely than the broader 'set
    out.'
- source_word: ἐπὶ Βαιτυλουὰ
  chosen: for Bethulia
  alternatives:
  - against Bethulia
  - toward Bethulia
  lexicon: LSJ
  rationale: With a verb of movement, ἐπί commonly marks direction toward a destination.
    'For Bethulia' conveys intended movement without overcommitting to hostile nuance
    already made explicit later in the verse.
- source_word: τὰς ἀναβάσεις τῆς ὀρεινῆς
  chosen: the passes of the hill country
  alternatives:
  - the ascents of the hill country
  - the mountain approaches
  - the mountain passes
  lexicon: LSJ
  rationale: ἀναβάσεις literally means ascents or uphill approaches; in military context
    these are access routes through elevated terrain. 'Passes of the hill country'
    communicates the strategic topography in clear English.
- source_word: προκαταλαμβάνεσθαι
  chosen: to seize ... in advance
  alternatives:
  - to occupy beforehand
  - to take possession of first
  lexicon: LSJ
  rationale: The compound verb adds the sense of taking beforehand or preemptively.
    'Seize ... in advance' preserves both the military force and the anticipatory
    nuance.
- source_word: ποιεῖν πόλεμον πρὸς
  chosen: to make war against
  alternatives:
  - to wage war against
  - to fight against
  lexicon: LSJ
  rationale: A common idiom for engaging in war. 'Make war against' is slightly more
    formal and reflects the Greek construction closely while remaining readable.
- source_word: τοὺς υἱοὺς Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: Per project philosophy, gender-accurate renderings are preferred where
    the source uses a masculine familial expression. 'Sons of Israel' preserves the
    Hebrew-Greek idiom more transparently than 'Israelites,' though the latter is
    a viable smoother alternative.
