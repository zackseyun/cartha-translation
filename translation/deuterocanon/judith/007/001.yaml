id: JDT.7.1
reference: Judith 7:1
source:
  edition: lxx-swete-1909
  text: Τῇ δὲ ἐπαύριον παρήγγειλεν Ὀλοφέρνης πάσῃ τῇ στρατείᾳ αὐτοῦ καὶ παντὶ τῷ λαῷ
    αὐτοῦ οἳ παρεγένοντο ἐπὶ τὴν συμμαχίαν αὐτοῦ, ἀναζευγνύειν ἐπὶ Βαιτυλουὰ καὶ τὰς
    ἀναβάσεις τῆς ὀρεινῆς προκαταλαμβάνεσθαι καὶ ποιεῖν πόλεμον πρὸς τοὺς υἱοὺς Ἰσραήλ.
  language: Greek
  pages:
