translation:
  text: And we will encamp against them as a guard, so that not one man may go out
    from the city. And they, and their wives, and their children, will waste away
    in the famine, and before the sword comes upon them, they will be laid low in
    the streets of their dwellings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will be strewn in the squares of their habitation.' The Greek πλατεῖαι
      can mean broad streets or public squares, and καταστρωθήσονται can carry the
      sense of being thrown down or spread out.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεμβαλοῦμεν
  chosen: we will encamp
  alternatives:
  - we will camp
  - we will set camp
  lexicon: LSJ
  rationale: The verb denotes making camp or encamping, especially in a military context.
    'Encamp' preserves the martial sense more clearly than the flatter 'camp'.
- source_word: ἐπʼ αὐταῖς
  chosen: against them
  alternatives:
  - by them
  - over them
  lexicon: LSJ
  rationale: In context of siege strategy, the preposition with the pronoun is best
    taken adversatively/spatially as military positioning against the city and its
    approaches. English 'against them' communicates hostile encampment more naturally
    than a literal but unclear 'upon them'.
- source_word: εἰς προφυλακὴν
  chosen: as a guard
  alternatives:
  - for a guard
  - for watch
  - as a watch
  lexicon: LSJ
  rationale: 'The phrase expresses purpose/result of the encampment: serving as a
    guard or watch. ''As a guard'' is idiomatic and preserves the military blocking
    function.'
- source_word: τοῦ μὴ ἐξελθεῖν ἐκ τῆς πόλεως ἄνδρα ἕνα
  chosen: so that not one man may go out from the city
  alternatives:
  - to prevent even one man from going out of the city
  - so that no one may go out from the city
  lexicon: LSJ
  rationale: The construction expresses prevention. 'Not one man' reflects ἄνδρα ἕνα
    closely and preserves the masculine singular wording of the Greek rather than
    neutralizing it.
- source_word: τακήσονται
  chosen: will waste away
  alternatives:
  - will melt away
  - will be consumed
  lexicon: LSJ
  rationale: The future middle/passive here is metaphorical for wasting away under
    famine. 'Waste away' is natural modern English and conveys physical deterioration
    better than the more literal but potentially opaque 'melt away'.
- source_word: ἐν τῷ λιμῷ
  chosen: in the famine
  alternatives:
  - by famine
  - from hunger
  lexicon: LSJ
  rationale: λιμός denotes famine. 'In the famine' follows the Greek closely and fits
    the siege context; it implies the condition under which they waste away.
- source_word: ῥομφαίαν
  chosen: the sword
  alternatives:
  - the blade
  - slaughter
  lexicon: LSJ
  rationale: Though ῥομφαία can denote a large sword, 'the sword' is the standard
    and sufficiently precise English rendering in a military/judgment context.
- source_word: καταστρωθήσονται
  chosen: they will be laid low
  alternatives:
  - they will be strewn
  - they will be overthrown
  - they will be laid out
  lexicon: LSJ
  rationale: The verb suggests being thrown down or spread out on the ground. In context
    of death from famine in the streets, 'laid low' communicates collapse and death
    without over-specifying corpse imagery, while still fitting the Greek.
- source_word: ἐν ταῖς πλατείαις
  chosen: in the streets
  alternatives:
  - in the broad places
  - in the squares
  lexicon: LSJ
  rationale: The noun can mean broad streets or public squares. 'Streets' is the most
    natural general rendering here, though the sense may include open city spaces.
- source_word: τῆς οἰκήσεως αὐτῶν
  chosen: of their dwellings
  alternatives:
  - of their habitation
  - of their homes
  - where they live
  lexicon: LSJ
  rationale: οἴκησις denotes dwelling or habitation. 'Of their dwellings' preserves
    the formal relation to the Greek and avoids adding interpretive specificity beyond
    the text.
