id: JDT.7.14
reference: Judith 7:14
source:
  edition: lxx-swete-1909
  text: καὶ παρεμβαλοῦμεν ἐπʼ αὐταῖς εἰς προφυλακὴν τοῦ μὴ ἐξελθεῖν ἐκ τῆς πόλεως
    ἄνδρα ἕνα. καὶ τακήσονται ἐν τῷ λιμῷ αὐτοὶ καὶ αἱ γυναῖκες αὐτῶν καὶ τὰ τέκνα
    αὐτῶν, καὶ πρὶν ἐλθεῖν τὴν ῥομφαίαν ἐπʼ αὐτοὺς καταστρωθήσονται ἐν ταῖς πλατείαις
    τῆς οἰκήσεως αὐτῶν.
