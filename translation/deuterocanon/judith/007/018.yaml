translation:
  text: And the sons of Esau and the sons of Ammon went up and camped in the hill
    country opposite Dothaim, and they sent some of their men toward the south and
    east, opposite Egrebel, which is near Chous, which is on the wadi Mochmour. And
    the rest of the Assyrian army camped on the plain and covered the whole face of
    the land, and their tents and their baggage were encamped in a very great multitude,
    and they were exceedingly numerous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward the south and toward the sunrise'; the Greek term for 'east'
      is literally related to the rising sun.
    reason: lexical_alternative
  - marker: b
    text: '''Wadi'' renders a Greek term for a seasonal torrent-bed or stream; alternatively
      ''brook'' or ''torrent.'''
    reason: cultural_note
lexical_decisions:
- source_word: ἀνέβησαν
  chosen: went up
  alternatives:
  - marched up
  - advanced
  lexicon: LSJ
  rationale: The verb literally means 'went up' and can reflect ascent in terrain
    or military advance. Since the verse immediately locates them in the hill country,
    'went up' preserves the spatial sense without overinterpreting it as a technical
    military maneuver.
- source_word: παρενέβαλον
  chosen: camped
  alternatives:
  - encamped
  - pitched camp
  lexicon: LSJ
  rationale: The verb denotes making camp in a military context. 'Camped' is clear
    modern English; the military setting is already evident from context.
- source_word: ἐν τῷ ὄρει
  chosen: in the hill country
  alternatives:
  - on the mountain
  - in the mountain region
  lexicon: LSJ
  rationale: Although singular in form, the phrase can denote mountainous terrain
    or uplands rather than a single peak. 'Hill country' is natural English and fits
    the geographic sense.
- source_word: ἀπέναντι Δωθαείμ
  chosen: opposite Dothaim
  alternatives:
  - facing Dothaim
  - across from Dothaim
  lexicon: LSJ
  rationale: ἀπέναντι indicates position opposite or facing a place. 'Opposite' is
    concise and spatially accurate.
- source_word: ἀπέστειλαν ἐξ αὐτῶν
  chosen: they sent some of their men
  alternatives:
  - they sent from among them
  - they dispatched some from their ranks
  lexicon: LSJ
  rationale: The Greek literally says 'they sent from among them.' In context this
    means a detachment from their force. 'Some of their men' makes the implied military
    referent explicit in idiomatic English without adding new information.
- source_word: πρὸς νότον καὶ ἀπηλιώτην
  chosen: toward the south and east
  alternatives:
  - to the south and to the sunrise
  - southward and eastward
  lexicon: LSJ
  rationale: ἀπηλιώτης refers to the east or east wind, literally the direction of
    sunrise. 'East' is the clearest geographic rendering here.
- source_word: Ἐγρεβήλ
  chosen: Egrebel
  alternatives:
  - Egerebel
  rationale: This is a place name transliterated from the Greek form. Standard transliteration
    is preferred over translation for proper names.
- source_word: Χοὺς
  chosen: Chous
  alternatives:
  - Chus
  rationale: Proper name transliterated directly from the Greek witness. The form
    'Chous' reflects the source spelling more closely.
- source_word: χειμάρρου
  chosen: wadi
  alternatives:
  - brook
  - torrent
  - winter stream
  lexicon: LSJ
  rationale: χειμάρρους is a seasonal torrent-bed or stream. 'Wadi' best captures
    the Near Eastern geographic feature in concise modern English; 'brook' would sound
    too perennial.
- source_word: Μοχμούρ
  chosen: Mochmour
  alternatives:
  - Mochmur
  rationale: Proper name transliterated from the Greek form.
- source_word: ἡ λοιπὴ στρατεία τῶν Ἀσσυρίων
  chosen: the rest of the Assyrian army
  alternatives:
  - the remaining force of the Assyrians
  - the rest of the Assyrian host
  lexicon: LSJ
  rationale: στρατεία here denotes the military force. 'Army' is the most natural
    modern equivalent, and 'the rest' reflects λοιπή.
- source_word: ἐν τῷ πεδίῳ
  chosen: on the plain
  alternatives:
  - in the plain
  - in the open country
  lexicon: LSJ
  rationale: πεδίον denotes level ground or plain. 'On the plain' is idiomatic English
    for military encampment.
- source_word: ἐκάλυψαν πᾶν τὸ πρόσωπον τῆς γῆς
  chosen: covered the whole face of the land
  alternatives:
  - covered the whole land
  - covered the surface of the ground
  lexicon: LSJ
  rationale: The phrase is vivid and somewhat formulaic. Retaining 'face of the land'
    preserves the imagery better than flattening it to 'whole land.'
- source_word: ἀποσκευαὶ
  chosen: baggage
  alternatives:
  - equipment
  - supplies
  lexicon: LSJ
  rationale: The term refers to baggage or camp gear accompanying an army. 'Baggage'
    is the most direct rendering; 'supplies' would narrow the sense.
- source_word: κατεστρατοπέδευσαν
  chosen: were encamped
  alternatives:
  - settled in camp
  - camped
  lexicon: LSJ
  rationale: This verb again refers to being in camp. The passive-like English 'were
    encamped' fits the stative sense in relation to tents and baggage.
- source_word: ἐν ὄχλῳ πολλῷ
  chosen: in a very great multitude
  alternatives:
  - in a great mass
  - in great numbers
  lexicon: LSJ
  rationale: ὄχλος can denote crowd, throng, or mass. Here it emphasizes the vast
    concentration of the camp. 'In a very great multitude' preserves the abundance
    language, though somewhat elevated.
- source_word: ἦσαν εἰς πλῆθος πολὺ σφόδρα
  chosen: they were exceedingly numerous
  alternatives:
  - they were very many indeed
  - they were an exceedingly great number
  lexicon: LSJ
  rationale: The clause intensifies the description of size. 'Exceedingly numerous'
    is natural English that preserves the emphatic force of πολὺ σφόδρα.
