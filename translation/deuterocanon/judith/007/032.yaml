id: JDT.7.32
reference: Judith 7:32
source:
  edition: lxx-swete-1909
  text: καὶ ἐσκόρπισεν τὸν λαὸν εἰς τὴν ἑαυτοῦ παρεμβολήν, καὶ ἐπὶ τὰ τείχη καὶ τοὺς
    πύργους τῆς πόλεως αὐτῶν ἀπῆλθεν, καὶ τὰς γυναῖκας καὶ τὰ τέκνα εἰς τοὺς οἴκους
    αὐτῶν ἀπέστειλεν· καὶ ἦσαν ἐν ταπεινώσει πολλῇ ἐν τῇ πόλει.
  language: Greek
  pages:
  - 798
  - 799
