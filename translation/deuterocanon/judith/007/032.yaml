translation:
  text: And he dispersed the people to their camp, and they went away to the walls
    and towers of their city, and he sent the women and children to their houses;
    and they were in great humiliation in the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has a singular verb ('went away'), but the context points to the dispersed
      people as the ones moving to the walls and towers; the English renders the sense
      accordingly.
    reason: textual_variant
  - marker: b
    text: Or 'in great distress.' The Greek expression can denote being brought very
      low, whether in humiliation, affliction, or misery.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσκόρπισεν
  chosen: dispersed
  alternatives:
  - scattered
  - sent away
  lexicon: BDAG
  rationale: The verb denotes causing a group to separate and spread out. 'Dispersed'
    preserves the formal sense without implying panic as strongly as 'scattered' might.
- source_word: λαός
  chosen: people
  alternatives:
  - troops
  - folk
  lexicon: BDAG
  rationale: Here the term refers broadly to the assembled populace rather than specifically
    soldiers, so 'people' best fits the context.
- source_word: παρεμβολή
  chosen: camp
  alternatives:
  - encampment
  lexicon: BDAG
  rationale: The military/civic setting supports 'camp.' 'Encampment' is possible
    but less natural in modern English.
- source_word: ἀπῆλθεν
  chosen: they went away
  alternatives:
  - they departed
  - he went away
  lexicon: BDAG
  rationale: Although the form is singular in Swete's text, the sense in context is
    distributive/plural with the preceding people moving to the walls and towers.
    Rendering the implied plural gives coherent English while staying anchored to
    the narrative flow.
- source_word: τείχη
  chosen: walls
  alternatives:
  - ramparts
  lexicon: BDAG
  rationale: '''Walls'' is the straightforward rendering and suits readable modern
    English.'
- source_word: πύργους
  chosen: towers
  alternatives:
  - watchtowers
  lexicon: BDAG
  rationale: The basic architectural term is sufficient; nothing in the verse requires
    the more specific 'watchtowers.'
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dismissed
  - sent away
  lexicon: BDAG
  rationale: The verb simply indicates dispatching them to their homes. 'Sent' is
    clear and neutral.
- source_word: ταπείνωσις
  chosen: humiliation
  alternatives:
  - affliction
  - distress
  - lowliness
  lexicon: BDAG
  rationale: The phrase ἐν ταπεινώσει πολλῇ describes a state of being brought low.
    'Humiliation' preserves that abasement more closely than the broader 'distress,'
    though the context includes suffering as well.
- source_word: πολλῇ
  chosen: great
  alternatives:
  - much
  - deep
  lexicon: BDAG
  rationale: An idiomatic intensifier in English for the degree of their humiliation.
