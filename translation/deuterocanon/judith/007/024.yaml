translation:
  text: May God judge between you and us, because you have done us great injustice
    by not speaking peaceably with the sons of Asshur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with the Assyrians.' The Greek literally says 'with the sons of Asshur.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κρῖναι
  chosen: May ... judge
  alternatives:
  - Let ... judge
  - Judge
  lexicon: BDAG
  rationale: Aorist optative used as a wish or imprecation; 'May God judge' captures
    the volitive force naturally in English better than a bare imperative.
- source_word: ἀνὰ μέσον ὑμῶν καὶ ἡμῶν
  chosen: between you and us
  alternatives:
  - in the midst of you and us
  - between us and you
  lexicon: BDAG
  rationale: Idiomatic expression for adjudication between two parties; 'between you
    and us' is standard and clear English.
- source_word: ἐποιήσατε ἐν ἡμῖν ἀδικίαν μεγάλην
  chosen: you have done us great injustice
  alternatives:
  - you have committed a great wrong against us
  - you have acted very unjustly toward us
  lexicon: BDAG
  rationale: The phrase literally involves 'doing injustice in/against us'; 'done
    us great injustice' preserves both the object and the legal-moral force of ἀδικία.
- source_word: οὐ λαλήσαντες εἰρηνικὰ
  chosen: by not speaking peaceably
  alternatives:
  - without speaking peaceful terms
  - not speaking words of peace
  - without proposing peace
  lexicon: BDAG
  rationale: The participial phrase explains the injustice. εἰρηνικά denotes peaceful
    words/terms; 'speaking peaceably' is concise and idiomatic while retaining the
    verbal idea.
- source_word: μετὰ υἱῶν Ἀσσούρ
  chosen: with the sons of Asshur
  alternatives:
  - with the Assyrians
  - with the sons of Assyria
  lexicon: LEH
  rationale: The Greek reads literally 'sons of Asshur.' Because names are normally
    transliterated in this project, 'Asshur' is retained rather than converting to
    the more interpretive ethnic term 'Assyrians,' though that sense is implicit.
