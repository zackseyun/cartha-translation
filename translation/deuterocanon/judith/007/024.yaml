  text: Κρῖναι ὁ θεὸς ἀνὰ μέσον ὑμῶν καὶ ἡμῶν, ὅτι ἐποιήσατε ἐν ἡμῖν ἀδικίαν μεγάλην
    οὐ λαλήσαντες εἰρηνικὰ μετὰ υἱῶν Ἀσσούρ.
