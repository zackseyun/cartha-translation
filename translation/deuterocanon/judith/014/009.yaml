id: JDT.14.9
reference: Judith 14:9
source:
  edition: lxx-swete-1909
  text: ὡς δὲ ἐπαύσατο λαλούσα, ἠλάλαξεν ὁ λαὸς φωνῇ μεγάλῃ καὶ ἔδωκεν φωνὴν εὐφρόσυνον
    ἐν τῇ πόλει αὐτῶν.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 824
  - 825
  - 826
  - 827
  - 828
  - 829
  confidence: high
  validation: agree
translation:
  text: And when she stopped speaking, the people shouted with a loud voice and raised
    a joyful cry in their city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cried out'; the Greek verb can denote a loud shout, at times even a
      battle cry, but here it is used for the people's celebratory outburst.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  chosen: And when
  alternatives:
  - Then when
  - Now when
  lexicon: LSJ
  rationale: Introduces the next event with a temporal sense. 'And when' is natural
    English and preserves the narrative flow without overformal stiffness.
- source_word: ἐπαύσατο
  chosen: stopped
  alternatives:
  - ceased
  - finished
  lexicon: LSJ
  rationale: The verb means to stop or cease. 'Stopped' is clear modern English; 'ceased'
    is more formal, and 'finished' could imply completion rather than simply ending
    speech.
- source_word: λαλούσα
  chosen: speaking
  alternatives:
  - talking
  - saying these things
  lexicon: LSJ
  rationale: Present participle modifying the subject, indicating the action that
    ceased. 'Speaking' is the most straightforward and dignified rendering in context.
- source_word: ἠλάλαξεν
  chosen: shouted
  alternatives:
  - cried out
  - raised a war-cry
  lexicon: LSJ
  rationale: The verb can denote a loud cry or shout, sometimes a battle cry. Here
    the context is public acclamation and celebration, so 'shouted' best fits without
    importing military overtones too strongly.
- source_word: ὁ λαὸς
  chosen: the people
  alternatives:
  - the crowd
  - the populace
  lexicon: LSJ
  rationale: Standard rendering for λαός in a collective civic sense. 'The people'
    is both natural and sufficiently formal.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - loudly
  - with a great voice
  lexicon: LSJ
  rationale: An instrumental/dative expression indicating manner. 'With a loud voice'
    preserves the concrete idiom of the Greek better than the adverb 'loudly'.
- source_word: ἔδωκεν φωνὴν
  chosen: raised a ... cry
  alternatives:
  - gave a ... voice
  - uttered a ... cry
  lexicon: LSJ
  rationale: This is an idiomatic expression in Greek for vocal outcry. 'Raised a
    cry' is idiomatic English and reflects the verbal force without wooden literalism.
- source_word: εὐφρόσυνον
  chosen: joyful
  alternatives:
  - glad
  - rejoicing
  lexicon: LSJ
  rationale: The adjective denotes gladness or festal joy. 'Joyful' fits the celebratory
    response and reads naturally with 'cry'.
- source_word: ἐν τῇ πόλει αὐτῶν
  chosen: in their city
  alternatives:
  - within their city
  - in the city
  lexicon: LSJ
  rationale: The phrase locates the acclamation within the people's own city. 'In
    their city' preserves the possessive αὐτῶν, which should not be omitted.
