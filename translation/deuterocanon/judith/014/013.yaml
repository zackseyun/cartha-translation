theological_decisions:
- issue: Rendering of δοῦλοι in a military/narrative insult context
  chosen_reading: slaves
  alternative_readings:
  - servants
  rationale: Per doctrine, δοῦλος should be rendered according to context, with 'slave'
    used where bonded status is salient. Here the term is not honorific service but
    a demeaning designation for those presumed subordinate, so 'slaves' better preserves
    the force.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
