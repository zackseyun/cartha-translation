translation:
  text: And they came to Holofernes’s tent, and said to the one over all his affairs,
    “Wake our lord at once, because the servants have dared to come down against us
    for battle, so that they may be utterly destroyed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the one in charge of all that was his,” that is, Holofernes’s chief
      steward or attendant.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεγένοντο
  chosen: came
  alternatives:
  - arrived
  - presented themselves
  lexicon: LSJ
  rationale: The verb here denotes arrival at a place. 'Came' is natural modern English
    and fits the narrative movement without overformal stiffness.
- source_word: σκηνή
  chosen: tent
  alternatives:
  - tabernacle
  - pavilion
  lexicon: LSJ
  rationale: In this military context, σκηνή refers to Holofernes's tent. 'Tent' is
    the plain contextual sense; 'tabernacle' would be misleadingly cultic.
- source_word: τῷ οὔτι ἐπὶ πάντων τῶν αὐτοῦ
  chosen: the one over all his affairs
  alternatives:
  - the one in charge of all that was his
  - his steward over everything
  lexicon: LSJ
  rationale: 'The phrase identifies the official set over Holofernes''s household/property.
    The transmitted text is somewhat awkward, but the sense is clear enough: they
    address the chief attendant or steward. ''The one over all his affairs'' preserves
    that function without importing a proper title not explicit in the Greek.'
- source_word: Ἔγειρον δὴ
  chosen: Wake ... at once
  alternatives:
  - Rouse ... now
  - Get ... up immediately
  lexicon: LSJ
  rationale: An urgent imperative. 'Wake ... at once' captures both the command and
    the particle's urgency in idiomatic English.
- source_word: κύριον
  chosen: lord
  alternatives:
  - master
  lexicon: LSJ
  rationale: As a human superior, κύριος here means 'lord' or 'master.' Following
    project defaults, 'Lord' is the standard for κύριος, but because this is a human
    referent and not a divine title, lowercase 'lord' is appropriate.
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  lexicon: LSJ
  rationale: The project default allows 'servant / slave' contextually. Here the speakers
    use a contemptuous term for subordinates/enemies, and the bonded-status force
    of δοῦλοι is more salient than a mild 'servants,' so 'slaves' best reflects the
    Greek.
- source_word: καταβαίνειν ἐφʼ ἡμᾶς
  chosen: to come down against us
  alternatives:
  - to attack us from below
  - to march down upon us
  lexicon: LSJ
  rationale: καταβαίνειν literally means 'to go/come down.' In military movement it
    can describe descending to attack. 'Come down against us' preserves the spatial
    imagery and hostile force.
- source_word: εἰς πόλεμον
  chosen: for battle
  alternatives:
  - to war
  - for war
  lexicon: LSJ
  rationale: This phrase expresses purpose or sphere of action. 'For battle' is idiomatic
    and suitably martial.
- source_word: ἵνα ἐξολοθρευθῶσιν εἰς τέλος
  chosen: so that they may be utterly destroyed
  alternatives:
  - that they may be destroyed completely
  - so that they may be wiped out to the end
  lexicon: LSJ
  rationale: ἐξολοθρευθῶσιν conveys total destruction; εἰς τέλος intensifies the completeness.
    'Utterly destroyed' communicates the emphatic force in readable English.
