id: JDT.14.16
reference: Judith 14:16
source:
  edition: lxx-swete-1909
  text: καὶ ἐβόησεν φωνῇ μεγάλῃ μετὰ κλαυθμοῦ καὶ στεναγμοῦ καὶ βοῆς ἰσχυρᾶς, καὶ
    διέρρηξεν τὰ ἱμάτια αὐτοῦ.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 824
  - 825
  - 826
  - 827
  - 828
  - 829
  confidence: high
  validation: agree
translation:
  text: And he cried out with a loud voice, with weeping and groaning and a mighty
    cry, and he tore his garments.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐβόησεν
  chosen: cried out
  alternatives:
  - shouted
  - wailed
  lexicon: BDAG
  rationale: βοάω commonly denotes a loud cry or shout. 'Cried out' preserves the
    force without over-specifying whether it was articulate speech or a wail.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - loudly
  - in a loud voice
  lexicon: BDAG
  rationale: A standard idiom in Greek for loud vocalization. 'With a loud voice'
    keeps the concrete phrasing of the source.
- source_word: μετὰ κλαυθμοῦ
  chosen: with weeping
  alternatives:
  - with crying
  - amid weeping
  lexicon: BDAG
  rationale: κλαυθμός denotes weeping or lamentation. 'With weeping' is natural and
    closely reflects the Greek prepositional phrase.
- source_word: στεναγμοῦ
  chosen: groaning
  alternatives:
  - lamenting
  - sighing
  lexicon: BDAG
  rationale: στεναγμός can mean groaning or sighing. 'Groaning' best matches the intensity
    of the mourning context.
- source_word: βοῆς ἰσχυρᾶς
  chosen: a mighty cry
  alternatives:
  - a strong cry
  - a powerful outcry
  lexicon: BDAG
  rationale: The phrase intensifies the lament beyond the earlier 'loud voice.' 'Mighty
    cry' sounds natural in English while preserving the emphatic force of ἰσχυρᾶς.
- source_word: διέρρηξεν
  chosen: tore
  alternatives:
  - rent
  - ripped
  lexicon: BDAG
  rationale: The verb means to tear apart, especially garments in mourning. 'Tore'
    is clear modern English; 'rent' is more traditional but archaic.
- source_word: τὰ ἱμάτια αὐτοῦ
  chosen: his garments
  alternatives:
  - his clothes
  - his robes
  lexicon: BDAG
  rationale: ἱμάτια refers broadly to garments/clothing. 'Garments' preserves the
    formal, culturally recognizable mourning action better than the flatter 'clothes'.
