translation:
  text: But before you do these things, call Achior the Ammonite to me, so that he
    may see and recognize the one who has treated the house of Israel with contempt
    and who sent him to us as if to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that he may see and fully know/recognize.' The Greek uses two verbs,
      'see' and 'recognize,' in sequence for emphasis.
    reason: lexical_alternative
  - marker: b
    text: 'The pronoun ''him'' most likely refers to Achior: the one who despised
      the house of Israel had sent Achior to them as though to death.'
    reason: alternative_reading
  - marker: c
    text: Or 'to his death.' The Greek more literally says 'as if to death,' which
      may imply being handed over as good as dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ δὲ τοῦ ποιῆσαι ταῦτα
  chosen: But before you do these things
  alternatives:
  - But before doing these things
  - Now before you do this
  lexicon: LSJ
  rationale: The articular infinitive with πρό conveys temporal priority, naturally
    rendered in English as 'before you do these things.' 'But' reflects δέ as a mild
    transition.
- source_word: καλέσατέ μοι
  chosen: call ... to me
  alternatives:
  - summon ... to me
  - bring ... to me
  lexicon: LSJ
  rationale: καλέω commonly means 'call' or 'summon.' 'Call ... to me' preserves the
    directness of the imperative and the dative μοι.
- source_word: Ἀχιὼρ τὸν Ἀμμανείτην
  chosen: Achior the Ammonite
  rationale: Personal name is transliterated; the ethnic designation is translated
    straightforwardly.
- source_word: ἵνα ἴδῃ ἐπιγνοῖ
  chosen: so that he may see and recognize
  alternatives:
  - so that he may see and know fully
  - so that he may look upon and recognize
  lexicon: LSJ
  rationale: The paired subjunctives express purpose. ἐπιγινώσκω adds the sense of
    recognition or full knowledge beyond simple seeing, so 'see and recognize' captures
    the progression idiomatically.
- source_word: τὸν ἐκφαυλίσαντα
  chosen: the one who has treated ... with contempt
  alternatives:
  - the one who has despised
  - the one who has dishonored
  lexicon: LSJ
  rationale: ἐκφαυλίζω carries the sense of making light of, despising, or treating
    with contempt. 'Treated ... with contempt' best fits the object 'the house of
    Israel' in natural English.
- source_word: τὸν οἶκον τοῦ Ἰσραήλ
  chosen: the house of Israel
  alternatives:
  - the household of Israel
  lexicon: LSJ
  rationale: This is a standard biblical expression for Israel as a people; 'house
    of Israel' preserves that register.
- source_word: καὶ αὐτὸν
  chosen: and has sent him
  alternatives:
  - and has sent Achior
  - and has dispatched him
  lexicon: LSJ
  rationale: The pronoun most naturally refers to Achior, the nearest and contextually
    salient masculine antecedent. Retaining 'him' preserves the Greek cohesion without
    over-specifying in the main text.
- source_word: ὡς εἰς θάνατον
  chosen: as if to death
  alternatives:
  - to his death
  - as one destined for death
  lexicon: LSJ
  rationale: ὡς softens or qualifies the expression; 'as if to death' reflects the
    Greek more closely than the more interpretive 'to his death.'
- source_word: ἀποστείλαντα εἰς ἡμᾶς
  chosen: has sent him to us
  alternatives:
  - has dispatched him to us
  lexicon: LSJ
  rationale: Aorist participle coordinated with the previous participle, referring
    to the same subject. 'Sent him to us' is the plain sense.
