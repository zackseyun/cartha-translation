translation:
  text: But when the sons of Asshur saw them, they sent word to their leaders; and
    they came to the generals and commanders of thousands and to every one of their
    rulers.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ ... υἱοὶ Ἀσσοὺρ
  chosen: the sons of Asshur
  alternatives:
  - the Assyrians
  - the children of Asshur
  lexicon: LSJ
  rationale: Formally the Greek reads 'sons of Asshur.' Since this is an ethnic designation,
    English could idiomatically use 'Assyrians,' but the source wording is transparent
    and not awkward here, so 'sons of Asshur' preserves the Greek expression while
    keeping the name transliterated.
- source_word: ὡς εἶδον αὐτούς
  chosen: when they saw them
  alternatives:
  - as soon as they saw them
  - when they caught sight of them
  lexicon: BDAG
  rationale: ὡς with the aorist can mark temporal sequence ('when/as soon as'). The
    context suggests immediate reaction, but the text does not require the stronger
    'as soon as,' so 'when they saw them' keeps the sense without over-interpreting
    urgency.
- source_word: διεπέμψαν
  chosen: they sent word
  alternatives:
  - they sent messengers
  - they dispatched word
  - they sent
  lexicon: LSJ
  rationale: The verb means to send through/out, often of dispatching persons or messages.
    Because the object is implicit and the destination is leaders, English 'sent word'
    best captures the likely communicative action without inserting explicit messengers
    too strongly.
- source_word: ἐπὶ τοὺς ἡγουμένους αὐτῶν
  chosen: to their leaders
  alternatives:
  - to those leading them
  - to their chiefs
  lexicon: BDAG
  rationale: ἡγούμενοι denotes leaders or those in authority. 'Leaders' is clear modern
    English and broad enough to fit the military-administrative setting.
- source_word: στρατηγοὺς
  chosen: generals
  alternatives:
  - commanders
  lexicon: LSJ
  rationale: In this military context στρατηγοί are military commanders; 'generals'
    is the most natural specific rendering in English.
- source_word: χιλιάρχους
  chosen: commanders of thousands
  alternatives:
  - captains
  - tribunes
  - thousand-commanders
  lexicon: LSJ
  rationale: Literally the term denotes rulers over a thousand. Because this is LXX
    narrative rather than a Roman technical setting, 'commanders of thousands' preserves
    the numeric force better than 'tribunes' and is clearer than a wooden calque.
- source_word: ἐπὶ πάντα ἄρχοντα αὐτῶν
  chosen: to every one of their rulers
  alternatives:
  - to every ruler of theirs
  - to all their rulers
  lexicon: BDAG
  rationale: The singular with πᾶς is distributive. 'Every one of their rulers' reflects
    that distributive force more closely than the smoother but less explicit 'all
    their rulers.'
