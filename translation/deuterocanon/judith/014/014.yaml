id: JDT.14.14
reference: Judith 14:14
source:
  edition: lxx-swete-1909
  text: καὶ εἰσῆλθεν Βαγώας καὶ ἔκρουσε τὴν αὐλαίαν τῆς σκηνῆς· ὑπενόειτο γὰρ καθεύδειν
    αὐτὸν μετὰ Ἰουδείθ.
  language: Greek
  pages:
