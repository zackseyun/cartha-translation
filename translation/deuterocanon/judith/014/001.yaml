id: JDT.14.1
reference: Judith 14:1
source:
  edition: lxx-swete-1909
  text: Καὶ εἶπεν πρὸς αὐτοὺς Ἰουδεὶθ Ἀκούσατε δή μου, ἀδελφοί, καὶ λαβόντες τὴν κεφαλὴν
    ταύτην κρεμάσατε αὐτὴν ἐπὶ τῆς ἐπάλξεως τοῦ τείχους ὑμῶν.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 824
  - 825
  - 826
  - 827
  - 828
  - 829
  confidence: high
  validation: agree
translation:
  text: And Judith said to them, “Listen to me, brothers, and take this head and hang
    it on the battlement of your wall.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “on the parapet of your wall.” The Greek term can denote a battlement
      or parapet atop a defensive wall.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσατε
  chosen: Listen
  alternatives:
  - Hear
  - Listen up
  lexicon: BDAG
  rationale: Aorist imperative of ἀκούω. 'Listen' gives the direct imperative force
    in natural English without the slightly archaic 'Hear' or the overly colloquial
    'Listen up.'
- source_word: δή
  chosen: to me
  alternatives:
  - now
  - please
  lexicon: LSJ
  rationale: The particle δή adds urgency or immediacy. In English the force is best
    absorbed into the phrase 'Listen to me' rather than rendered woodenly as a separate
    'now' or 'please.'
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - kinsmen
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and here functions as a direct
    address to the men of Bethulia. Per doctrine, gender-accurate rendering is preferred
    over gender-neutral expansion.
- source_word: λαβόντες
  chosen: take
  alternatives:
  - having taken
  - pick up
  lexicon: BDAG
  rationale: 'Aorist participle preceding the main imperative. English idiom commonly
    coordinates it with the following command: ''take ... and hang it,'' preserving
    sequence without awkwardness.'
- source_word: τὴν κεφαλὴν ταύτην
  chosen: this head
  alternatives:
  - this severed head
  - this head here
  lexicon: BDAG
  rationale: κέφαλη is simply 'head.' The context makes clear whose head it is, but
    adding 'severed' would import information not explicit in the wording.
- source_word: κρεμάσατε
  chosen: hang it
  alternatives:
  - suspend it
  - display it
  lexicon: BDAG
  rationale: The imperative means 'hang.' 'Display it' captures purpose but not the
    concrete action; 'hang it' preserves the physical command.
- source_word: ἐπὶ τῆς ἐπάλξεως
  chosen: on the battlement
  alternatives:
  - upon the parapet
  - on the rampart
  lexicon: LSJ
  rationale: ἐπάλξ refers to a battlement or parapet on a city wall. 'Battlement'
    is clear modern English and fits the military setting.
- source_word: τοῦ τείχους ὑμῶν
  chosen: of your wall
  alternatives:
  - of your city wall
  - of the wall belonging to you
  lexicon: BDAG
  rationale: τεῖχος is 'wall,' specifically a defensive city wall in context. 'Your
    wall' is a close rendering; the military context already implies city wall.
