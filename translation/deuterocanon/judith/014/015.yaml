  text: ὡς δʼ οὐθεὶς ἐπήκουσεν, διαστείλας εἰσῆλθεν εἰς τὸν κοιτῶνα, καὶ εὗρεν αὐτὸν
    ἐπὶ τῆς χελώνιδος ἐρριμμένον νεκρόν, καὶ ἡ κεφαλὴ αὐτοῦ ἀφῄρητο ἀπʼ αὐτοῦ.
  language: Greek
