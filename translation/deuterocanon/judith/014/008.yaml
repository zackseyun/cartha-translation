id: JDT.14.8
reference: Judith 14:8
source:
  edition: lxx-swete-1909
  text: καὶ νῦν ἀνάγγειλόν μοι ὅσα ἐποίησας ἐν ταῖς ἡμέραις ταύταις. καὶ ἀπήγγειλεν
    αὐτῷ Ἰουδεὶθ ἐν μέσῳ τοῦ λαοῦ πάντα ὅσα ἦν πεποιηκυῖα, ἀφʼ ἧς ἡμέρας ἐξῆλθεν ἕως
    οὗ ἐλάλει αὐτοῖς.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 824
  - 825
  - 826
  - 827
  - 828
  - 829
  confidence: high
  validation: agree
translation:
  text: And now tell me what you have done in these days. And Judith reported to him,
    in the midst of the people, all that she had done, from the day when she went
    out until the time when she was speaking to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the people' for 'in the midst of the people.' The Greek expression
      can emphasize either location among them or public setting before them.
    reason: lexical_alternative
  - marker: b
    text: Or 'until she spoke to them.' The Greek uses an imperfect verb ('was speaking'),
      which may either highlight the ongoing speech or simply function narratively.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάγγειλόν
  chosen: tell
  alternatives:
  - report
  - announce
  lexicon: BDAG
  rationale: The imperative asks for a direct recounting of events. 'Tell' is natural
    modern English and fits the personal address μοι ('to me'), while still covering
    the sense of reporting.
- source_word: ὅσα ἐποίησας
  chosen: what you have done
  alternatives:
  - all that you did
  - what you did
  lexicon: BDAG
  rationale: ὅσα with the aorist verb refers to the things accomplished. English present
    perfect ('have done') works well after 'And now' and matches the request for a
    report of recent actions.
- source_word: ἐν ταῖς ἡμέραις ταύταις
  chosen: in these days
  alternatives:
  - during these days
  - in these past days
  lexicon: BDAG
  rationale: A straightforward temporal phrase. 'In these days' preserves the Greek
    wording without over-interpreting whether the sense is strictly recent past or
    the whole period just elapsed.
- source_word: ἀπήγγειλεν
  chosen: reported
  alternatives:
  - told
  - announced
  lexicon: BDAG
  rationale: This verb is cognate with ἀνάγγειλον and carries the sense of giving
    a report. 'Reported' preserves that narrative linkage better than the more generic
    'told'.
- source_word: ἐν μέσῳ τοῦ λαοῦ
  chosen: in the midst of the people
  alternatives:
  - before the people
  - among the people
  lexicon: BDAG
  rationale: The phrase is spatially vivid. 'In the midst of the people' stays close
    to the Greek while remaining readable; 'before the people' would shift toward
    audience function rather than location.
- source_word: πάντα ὅσα ἦν πεποιηκυῖα
  chosen: all that she had done
  alternatives:
  - everything she had accomplished
  - all the things she had done
  lexicon: BDAG
  rationale: The periphrastic pluperfect points to completed action prior to this
    speech. 'All that she had done' is idiomatic and preserves the retrospective force.
- source_word: ἀφʼ ἧς ἡμέρας ἐξῆλθεν
  chosen: from the day when she went out
  alternatives:
  - from the day she departed
  - since the day she went out
  lexicon: BDAG
  rationale: ἐξῆλθεν literally means 'went out.' In Judith's narrative this refers
    to her departure from the city/camp context, and the literal rendering is sufficiently
    clear.
- source_word: ἕως οὗ ἐλάλει αὐτοῖς
  chosen: until the time when she was speaking to them
  alternatives:
  - until she spoke to them
  - up to the time she addressed them
  lexicon: BDAG
  rationale: The imperfect ἐλάλει suggests the ongoing act of speaking at that point
    in the narrative. 'Until the time when she was speaking to them' preserves that
    aspect better than a simple past, though it remains idiomatic enough in English.
