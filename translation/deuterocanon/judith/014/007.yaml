translation:
  text: And when they had taken him up, he fell at Judith’s feet and bowed before
    her, and he said, “Blessed are you in every dwelling of Judah and among every
    nation; those who hear your name will be thrown into confusion.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in every tent of Judah.' The Greek σκηνώματι can mean 'tent' or more
      generally 'dwelling, habitation.'
    reason: lexical_alternative
  - marker: b
    text: The verb can also be rendered 'will be troubled' or 'will be shaken.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέλαβον
  chosen: had taken him up
  alternatives:
  - had received him
  - had lifted him up
  - had taken him in
  lexicon: LSJ
  rationale: The aorist of ἀναλαμβάνω here most naturally means taking him up/helping
    him rise after the preceding scene, not a technical 'receive.' 'Had taken him
    up' preserves the concrete motion without overinterpreting.
- source_word: προσέπεσεν τοῖς ποσὶν
  chosen: fell at Judith’s feet
  alternatives:
  - fell before her feet
  - threw himself at her feet
  lexicon: LSJ
  rationale: This idiom denotes an act of supplication or homage. 'Fell at ... feet'
    is standard, natural English and keeps the physical imagery.
- source_word: προσεκύνησεν τῷ προσώπῳ αὐτῆς
  chosen: bowed with his face to the ground before her
  alternatives:
  - did obeisance before her
  - worshiped before her
  - prostrated himself before her
  lexicon: LSJ
  rationale: προσκυνέω can range from worship to obeisance. In this human-to-human
    context, 'bowed ... before her' avoids implying divine worship while preserving
    the act of prostration; 'with his face to the ground' reflects the unusual dative
    phrase τῷ προσώπῳ αὐτῆς as a bodily posture.
- source_word: Εὐλογημένη σὺ
  chosen: Blessed are you
  alternatives:
  - You are blessed
  lexicon: LSJ
  rationale: A conventional blessing formula; 'Blessed are you' preserves the elevated
    register and directness of the Greek.
- source_word: ἐν παντὶ σκηνώματι Ἰούδα
  chosen: in every dwelling of Judah
  alternatives:
  - in every tent of Judah
  - throughout every habitation of Judah
  lexicon: LSJ
  rationale: σκηνώμα can mean tent, dwelling, or habitation. In Judith's setting it
    may retain a camp/tent nuance, but 'dwelling' communicates broadly and naturally
    without forcing a strictly nomadic image.
- source_word: ἐν παντὶ ἔθνει
  chosen: among every nation
  alternatives:
  - in every nation
  - among all nations
  lexicon: LSJ
  rationale: The phrase extends Judith's fame beyond Judah. 'Among every nation' is
    a close rendering of ἐν + dative while sounding idiomatic in English.
- source_word: ταραχθήσονται
  chosen: will be thrown into confusion
  alternatives:
  - will be troubled
  - will be shaken
  - will be terrified
  lexicon: LSJ
  rationale: The future passive of ταράσσω denotes disturbance or agitation. 'Thrown
    into confusion' captures the passive force and the destabilizing effect of hearing
    Judith's name, without narrowing it only to fear.
