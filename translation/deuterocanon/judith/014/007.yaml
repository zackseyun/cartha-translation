id: JDT.14.7
reference: Judith 14:7
source:
  edition: lxx-swete-1909
  text: ὡς δὲ ἀνέλαβον αὐτόν, προσέπεσεν τοῖς ποσὶν Ἰουδεὶθ καὶ προσεκύνησεν τῷ προσώπῳ
    αὐτῆς καὶ εἶπεν Εὐλογημένη σὺ ἐν παντὶ σκηνώματι Ἰούδα καὶ ἐν παντὶ ἔθνει, οἵτινες
    ἀκούσαντες τὸ ὄνομά σου ταραχθήσονται.
