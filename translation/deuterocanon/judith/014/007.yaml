theological_decisions:
- issue: Meaning of προσκυνέω in a human-directed act toward Judith
  chosen_reading: Rendered as an act of obeisance ('bowed ... before her') rather
    than divine worship
  alternative_readings:
  - worshiped before her
  - did obeisance before her
  rationale: The immediate object is Judith, a human figure. In line with source-context
    sensitivity and avoiding imported doctrinal claims, the verb is rendered as homage/prostration,
    not religious worship.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; translate according to source context.'
