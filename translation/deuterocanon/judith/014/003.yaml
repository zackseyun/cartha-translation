id: JDT.14.3
reference: Judith 14:3
source:
  edition: lxx-swete-1909
  text: καὶ ἀναλαβόντες οὗτοι τὰς πανοπλίας αὐτῶν πορεύσονται εἰς τὴν παρεμβολὴν αὐτῶν
    καὶ ἐγεροῦσι τοὺς στρατηγοὺς τῆς δυνάμεως Ἀσσούρ·
  language: Greek
