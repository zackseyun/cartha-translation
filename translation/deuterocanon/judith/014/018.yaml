translation:
  text: The servants have failed; one woman of the Hebrews has brought shame on the
    house of King Nebuchadnezzar. For look—Holofernes is lying on the ground, and
    his head is not on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The servants have failed.' The Greek δοῦλοι can denote servants or slaves
      depending on context; here the bonded-status sense is likely.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἠθέτησαν
  chosen: have failed
  alternatives:
  - have broken faith
  - have disregarded
  - have acted faithlessly
  lexicon: LSJ
  rationale: The verb ἀθετέω can mean to set aside, break faith, or fail in duty.
    In this context the speakers are reacting to a catastrophic lapse by Holofernes'
    attendants, so 'have failed' captures the accusation naturally in English without
    over-specifying a legal or covenantal nuance.
- source_word: οἱ δοῦλοι
  chosen: the slaves
  alternatives:
  - the servants
  lexicon: BDAG
  rationale: Per project guidance, δοῦλος is rendered according to context. Here it
    refers to household attendants under authority in a royal/military setting; 'slaves'
    preserves the bonded-status sense better than the softer 'servants,' while still
    fitting the narrative.
- source_word: ἐποίησεν αἰσχύνην
  chosen: has brought shame
  alternatives:
  - has done a shameful thing
  - has caused disgrace
  lexicon: LSJ
  rationale: The idiom literally 'did shame' is not natural in English. 'Has brought
    shame' preserves the resultative force and public-disgrace sense of αἰσχύνη.
- source_word: μία γυνὴ τῶν Ἑβραίων
  chosen: one woman of the Hebrews
  alternatives:
  - a Hebrew woman
  - one of the Hebrew women
  lexicon: LSJ
  rationale: The Greek emphasizes both the singularity ('one woman') and her ethnic
    identification. 'One woman of the Hebrews' keeps that emphasis more closely than
    the smoother but less pointed 'a Hebrew woman.'
- source_word: εἰς τὸν οἶκον
  chosen: on the house
  alternatives:
  - against the house
  - upon the house
  lexicon: LSJ
  rationale: With shame/disgrace language, English idiom prefers 'on the house' to
    express disgrace falling upon a household or dynasty. This is more natural than
    a wooden 'into the house' and better reflects the semantic force in context.
- source_word: χαμαί
  chosen: lying on the ground
  alternatives:
  - prostrate on the ground
  - down on the ground
  lexicon: LSJ
  rationale: χαμαί means 'on the ground.' Because the scene is visual and dramatic,
    'lying on the ground' makes the adverbial predicate clear in idiomatic English.
- source_word: ἡ κεφαλὴ οὐκ ἔστιν ἐπʼ αὐτῷ
  chosen: his head is not on him
  alternatives:
  - his head is no longer upon him
  - he has no head
  lexicon: LSJ
  rationale: The Greek is stark and concrete. 'His head is not on him' preserves the
    shocking literal image without paraphrasing it into a more interpretive expression.
