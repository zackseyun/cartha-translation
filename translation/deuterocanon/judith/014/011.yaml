id: JDT.14.11
reference: Judith 14:11
source:
  edition: lxx-swete-1909
  text: Ἡνίκα δὲ ὁ ὄρθρος ἀνέβη, καὶ ἐκρέμασαν τὴν κεφαλὴν Ὀλοφέρνου ἐκ τοῦ τείχους,
    καὶ ἀνέλαβεν πᾶς ἀνὴρ Ἰσραὴλ τὰ ὅπλα αὐτοῦ καὶ ἐξήλθοσαν κατὰ σπείρας ἐπὶ τὰς
    ἀναβάσεις.
  language: Greek
