translation:
  text: Now when dawn came up, they hung the head of Holofernes from the wall, and
    every man of Israel took up his weapons and went out in companies to the ascents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the wall'; the Greek literally says 'from the wall,' describing the
      place from which the head was hung for display.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to the ascents'; this likely refers to the uphill approaches
      or mountain passes.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡνίκα
  chosen: when
  alternatives:
  - at the time when
  - as soon as
  lexicon: LSJ
  rationale: Temporal conjunction introducing the scene shift. 'When' is natural modern
    English and preserves the straightforward temporal force.
- source_word: ὁ ὄρθρος ἀνέβη
  chosen: dawn came up
  alternatives:
  - daybreak came
  - morning rose
  lexicon: LSJ
  rationale: Literally 'the dawn went up/rose.' 'Dawn came up' preserves the imagery
    while remaining idiomatic English.
- source_word: ἐκρέμασαν
  chosen: they hung
  alternatives:
  - they suspended
  - they displayed by hanging
  lexicon: LSJ
  rationale: Simple aorist active; 'hung' is the plain sense and fits the public display
    of the severed head.
- source_word: τὴν κεφαλὴν Ὀλοφέρνου
  chosen: the head of Holofernes
  lexicon: LSJ
  rationale: Direct object with genitive of possession; rendered transparently without
    embellishment.
- source_word: ἐκ τοῦ τείχους
  chosen: from the wall
  alternatives:
  - on the wall
  - out from the wall
  lexicon: LSJ
  rationale: ἐκ with 'hang' can indicate suspension from a point on the wall. In idiomatic
    English, 'from the wall' best reflects the Greek construction, though the sense
    is public display on the city wall.
- source_word: πᾶς ἀνὴρ Ἰσραήλ
  chosen: every man of Israel
  alternatives:
  - all the men of Israel
  - every Israelite man
  lexicon: LSJ
  rationale: The Greek is explicitly masculine singular used distributively. Per doctrine,
    gender-accurate rendering is preferred over neutralizing; 'every man of Israel'
    preserves that form and force.
- source_word: ἀνέλαβεν
  chosen: took up
  alternatives:
  - picked up
  - took
  lexicon: LSJ
  rationale: Common military idiom for taking up arms. 'Took up' is both accurate
    and idiomatic.
- source_word: τὰ ὅπλα αὐτοῦ
  chosen: his weapons
  alternatives:
  - his arms
  - his armor
  lexicon: LSJ
  rationale: ὅπλα here refers broadly to weapons/arms rather than specifically armor.
    'Weapons' is clearer for modern readers.
- source_word: ἐξήλθοσαν
  chosen: went out
  alternatives:
  - marched out
  - came out
  lexicon: LSJ
  rationale: Basic motion verb; 'went out' keeps the source wording without over-interpreting
    military nuance.
- source_word: κατὰ σπείρας
  chosen: in companies
  alternatives:
  - by ranks
  - in bands
  - in detachments
  lexicon: LSJ
  rationale: The phrase indicates organized groupings or successive formations. 'In
    companies' conveys military organization in readable English without forcing a
    highly technical term.
- source_word: ἐπὶ τὰς ἀναβάσεις
  chosen: to the mountain passes
  alternatives:
  - to the ascents
  - to the approaches uphill
  - to the passes
  lexicon: LSJ
  rationale: Literally 'to the ascents.' In this military-geographical context, the
    reference is to the uphill approaches/passes leading into the area. 'Mountain
    passes' best communicates the likely sense in natural English.
