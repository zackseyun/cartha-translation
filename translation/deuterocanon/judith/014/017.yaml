translation:
  text: And he went into the tent where Judith was staying, but he did not find her;
    and he rushed out to the people, crying out,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was lodging.' The Greek participle καταλύουσα refers to staying or lodging
      in a place.
    reason: lexical_alternative
  - marker: b
    text: Or 'sprang out' / 'leaped out.' The Greek verb ἐξεπήδησεν is more vivid
      than a simple 'went out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  chosen: went into
  alternatives:
  - entered
  lexicon: BDAG
  rationale: A straightforward past narrative verb. 'Went into' is slightly more natural
    in modern English while preserving the directional sense of entry.
- source_word: σκηνήν
  chosen: tent
  alternatives:
  - canopy
  - pavilion
  lexicon: LSJ
  rationale: In Judith's military-camp setting, 'tent' is the plain and contextually
    appropriate rendering.
- source_word: καταλύουσα
  chosen: was staying
  alternatives:
  - was lodging
  - was resting
  lexicon: LSJ
  rationale: The participle denotes lodging or staying somewhere. 'Was staying' is
    idiomatic modern English and fits the temporary-camp context better than the more
    formal 'was lodging.'
- source_word: οὐχ εὗρεν
  chosen: did not find
  alternatives:
  - did not discover
  lexicon: BDAG
  rationale: The ordinary sense is simply not finding her present there; 'discover'
    would overstate the nuance.
- source_word: ἐξεπήδησεν
  chosen: rushed out
  alternatives:
  - sprang out
  - leaped out
  lexicon: LSJ
  rationale: The verb is vivid, suggesting sudden movement outward. 'Rushed out' preserves
    the urgency in natural English; 'sprang out' is possible but slightly more marked.
- source_word: λαόν
  chosen: the people
  alternatives:
  - the crowd
  - the troops
  lexicon: BDAG
  rationale: The noun broadly denotes the assembled people. 'The people' is the most
    direct rendering; 'troops' would narrow the reference beyond what the Greek explicitly
    states.
- source_word: κράζων
  chosen: crying out
  alternatives:
  - shouting
  - calling out
  lexicon: BDAG
  rationale: The participle conveys loud vocal outcry. 'Crying out' preserves the
    intensity without adding interpretive specificity.
