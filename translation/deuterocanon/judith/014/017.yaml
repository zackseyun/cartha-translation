  text: καὶ εἰσῆλθεν εἰς τὴν σκηνὴν οὗ ἦν Ἰουδείθ καταλύουσα, καὶ οὐχ εὗρεν αὐτήν·
    καὶ ἐξεπήδησεν εἰς τὸν λαὸν κράζων
  language: Greek
