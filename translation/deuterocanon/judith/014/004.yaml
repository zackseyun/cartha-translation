translation:
  text: Then you and all who live within the whole territory of Israel, following
    after them, strike them down on their roads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pursuing them' for 'following after them'; the Greek participle can
      carry the sense of going after in pursuit.
    reason: lexical_alternative
  - marker: b
    text: Literally 'all who dwell all the territory of Israel'; the phrase is rendered
      idiomatically as 'all who live within the whole territory of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπακολουθήσαντες
  chosen: following after them
  alternatives:
  - pursuing them
  - coming after them
  lexicon: BDAG
  rationale: Aorist participle from ἐπακολουθέω, here giving attendant action prior
    to the main imperative. 'Following after them' preserves the sequential sense
    without over-specifying military pursuit, though pursuit is implied by context.
- source_word: κατοικοῦντες
  chosen: who live
  alternatives:
  - who dwell
  - inhabiting
  lexicon: BDAG
  rationale: Present participle describing the inhabitants of Israel's territory.
    'Who live' is natural modern English while retaining the sense of residence.
- source_word: πᾶν ὅριον Ἰσραήλ
  chosen: the whole territory of Israel
  alternatives:
  - all the border of Israel
  - every region of Israel
  lexicon: LEH
  rationale: ὅριον can denote border, region, or territory. In this context with κατοικοῦντες,
    the sense is the inhabited extent of Israel, not merely a boundary line, so 'the
    whole territory of Israel' best conveys the phrase idiomatically.
- source_word: καταστρώσατε
  chosen: strike them down
  alternatives:
  - bring them down
  - lay them low
  - cut them down
  lexicon: LEH
  rationale: Imperative of καταστρώννυμι/καταστρόω in a military context, meaning
    to bring down or overthrow. 'Strike them down' is forceful and clear in English
    without becoming paraphrastic.
- source_word: ἐν ταῖς ὁδοῖς αὐτῶν
  chosen: on their roads
  alternatives:
  - in their paths
  - along their way
  lexicon: BDAG
  rationale: Literally 'in their roads/ways.' Given the military setting, this most
    naturally refers to the routes on which they are traveling. 'On their roads' keeps
    the concrete image.
