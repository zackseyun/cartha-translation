theological_decisions:
- issue: Rendering the double vocative δέσποτα κύριε
  chosen_reading: master lord
  alternative_readings:
  - sovereign lord
  - lord master
  rationale: The text stacks two honorifics. Following doctrine to translate titles
    rather than flatten them, both are represented in English. 'Master' here reflects
    δέσποτα, while 'lord' reflects κύριε. This avoids importing a specifically divine
    title claim beyond the immediate address to Holofernes.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve
    source meaning over tradition.'
- issue: Covenantal condition for Israel's defeat
  chosen_reading: unless they sin against their God
  alternative_readings:
  - if they do not sin against their God
  rationale: 'The verse states a theological condition: military defeat comes only
    in relation to sin against God. The translation preserves that tension and does
    not soften it into mere political fortune.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
