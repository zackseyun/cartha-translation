id: JDT.11.10
reference: Judith 11:10
source:
  edition: lxx-swete-1909
  text: διό, δέσποτα κύριε, μὴ παρέλθῃς τὸν λόγον αὐτοῦ, ἀλλὰ κατάθου αὐτὸν ἐν τῇ
    καρδίᾳ σου, ὅτι ἔστιν ἀληθής· οὐ γὰρ ἐκδικάται τὸ γένος ἡμῶν, οὐ κατισχύει ῥομφαία
    ἐπʼ αὐτοὺς ἐὰν μὴ ἁμάρτωσιν εἰς τὸν θεὸν αὐτῶν.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 818
  - 819
  - 820
  - 821
  - 822
  - 823
  confidence: high
  validation: agree
translation:
  text: Therefore, master lord, do not disregard his word, but lay it up in your heart,
    because it is true; for our nation is not punished, nor does the sword prevail
    against them, unless they sin against their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sovereign lord.' The Greek address uses two titles, δέσποτα and κύριε,
      both of which are represented in the translation.
    reason: lexical_alternative
  - marker: b
    text: Or 'our people.' Greek γένος can denote a people-group or nation.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'if they do not sin against their God'; the sense in context
      is that no punishment or military success comes against them unless such sin
      occurs.
    reason: lexical_alternative
lexical_decisions:
- source_word: διό
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: LSJ
  rationale: Introduces an inference from the preceding statement; 'Therefore' is
    natural and preserves the logical connection.
- source_word: δέσποτα κύριε
  chosen: master lord
  alternatives:
  - Lord master
  - sovereign lord
  lexicon: LSJ
  rationale: The Greek uses a double address, with δέσποτα conveying authority/mastery
    and κύριε functioning as 'lord.' To avoid collapsing the two terms into one English
    title, both are represented. 'master lord' is slightly unusual in English but
    preserves the emphatic double vocative better than reducing it to a single title.
- source_word: μὴ παρέλθῃς τὸν λόγον αὐτοῦ
  chosen: do not disregard his word
  alternatives:
  - do not pass over his word
  - do not neglect his message
  lexicon: LSJ
  rationale: παρέρχομαι with λόγον here idiomatically means to pass over or ignore.
    'Disregard' communicates the sense clearly in modern English without over-paraphrasing.
- source_word: κατάθου αὐτὸν ἐν τῇ καρδίᾳ σου
  chosen: lay it up in your heart
  alternatives:
  - place it in your heart
  - keep it in mind
  lexicon: LSJ
  rationale: The phrase is idiomatic for inwardly receiving and retaining a matter.
    'Lay it up in your heart' preserves the metaphor and remains readable.
- source_word: ἀληθής
  chosen: 'true'
  alternatives:
  - truthful
  - reliable
  lexicon: LSJ
  rationale: Predicate adjective referring to the word/message; 'true' is the most
    direct and idiomatic rendering.
- source_word: ἐκδικάται
  chosen: is punished
  alternatives:
  - is avenged
  - has justice executed against it
  lexicon: LSJ
  rationale: In this context the passive sense concerns punitive judgment falling
    on the nation. 'Is punished' best fits the parallel with the sword not prevailing,
    while 'is avenged' would sound unnatural for a nation in English.
- source_word: τὸ γένος ἡμῶν
  chosen: our nation
  alternatives:
  - our race
  - our people
  - our stock
  lexicon: LSJ
  rationale: γένος here refers to the people-group of Israel/Judith's people. 'Our
    nation' is idiomatic and avoids the misleading modern connotations of 'race.'
- source_word: κατισχύει ῥομφαία ἐπʼ αὐτούς
  chosen: does the sword prevail against them
  alternatives:
  - does the sword overpower them
  - does a sword gain strength over them
  lexicon: LSJ
  rationale: κατισχύω means to prevail or overpower. Retaining 'the sword' preserves
    the concrete military image and the singular collective usage.
- source_word: ἐὰν μὴ ἁμάρτωσιν εἰς τὸν θεὸν αὐτῶν
  chosen: unless they sin against their God
  alternatives:
  - if they do not sin against their God
  - unless they offend their God
  lexicon: LSJ
  rationale: The construction gives the sole condition under which punishment or military
    defeat can occur. 'Sin against their God' is straightforward and preserves the
    theological claim of covenantal accountability.
