translation:
  text: Take courage; you will live through this night and beyond. For there is no
    one who will wrong you; rather, he will treat you well, as is done for the servants
    of my lord King Nebuchadnezzar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the slaves of my lord King Nebuchadnezzar.' The Greek word can denote
      either servants or slaves depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: θάρσει
  chosen: Take courage
  alternatives:
  - Be of good cheer
  - Be courageous
  - Take heart
  lexicon: LSJ
  rationale: Imperative of θαρσέω expressing reassurance and encouragement. 'Take
    courage' is natural modern English and preserves the force better than the more
    archaic 'be of good cheer.'
- source_word: ἐν τῇ νυκτὶ ταύτῃ
  chosen: through this night
  alternatives:
  - in this night
  - this very night
  - during this night
  lexicon: LSJ
  rationale: With ζήσῃ, the phrase indicates surviving the present night. 'Through
    this night' brings out the temporal sense idiomatically in English.
- source_word: ζήσῃ καὶ εἰς τὸ λοιπόν
  chosen: you will live through this night and beyond
  alternatives:
  - you will live this night and for the future
  - you will survive tonight and afterward
  - you will live in this night and for what remains
  lexicon: LSJ
  rationale: εἰς τὸ λοιπόν means 'for the rest' or 'henceforth.' The combined rendering
    communicates both immediate survival and continued life afterward in readable
    English.
- source_word: ἀδικήσει
  chosen: wrong
  alternatives:
  - harm
  - injure
  - do injustice to
  lexicon: LSJ
  rationale: ἀδικέω can denote acting unjustly or wronging someone. 'Wrong' preserves
    the moral nuance without over-specifying physical harm.
- source_word: ἀλλʼ εὖ σε ποιήσει
  chosen: rather, he will treat you well
  alternatives:
  - but will do good to you
  - but will deal kindly with you
  - but will benefit you
  lexicon: LSJ
  rationale: The singular verb after the indefinite expression is best represented
    by a generic singular in English. 'Treat you well' is idiomatic and fits the courtly
    reassurance context.
- source_word: καθὰ γίνεται
  chosen: as is done
  alternatives:
  - as happens
  - as is customary
  - as it is done
  lexicon: LSJ
  rationale: The phrase introduces customary treatment. 'As is done' keeps the passive/general
    sense and reads smoothly.
- source_word: τοῖς δούλοις
  chosen: the servants
  alternatives:
  - the slaves
  lexicon: LSJ
  rationale: Although δοῦλος can mean 'slave,' here the context is royal household
    attendants/courtiers rather than emphasizing bonded status. Per project doctrine,
    'servant' is appropriate where the bonded nature is not salient.
- source_word: τοῦ κυρίου μου βασιλέως Ναβουχοδονόσορ
  chosen: of my lord King Nebuchadnezzar
  alternatives:
  - of my master, King Nebuchadnezzar
  lexicon: LSJ
  rationale: κύριος here is a social title of respect, not a divine title. 'My lord
    King Nebuchadnezzar' preserves the deferential court language while keeping the
    royal title explicit.
