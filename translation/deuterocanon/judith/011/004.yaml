theological_decisions:
- issue: Rendering of δοῦλοι in a royal-court context
  chosen_reading: servants
  alternative_readings:
  - slaves
  rationale: The verse concerns customary treatment within the king's service. The
    social setting does not foreground the bonded status in the way some theological
    passages do, so 'servants' best fits the immediate context while remaining faithful
    to the Greek.
