theological_decisions:
- issue: Cultic status of the produce reserved for priests
  chosen_reading: The verse describes produce already consecrated for priestly use
    in Jerusalem and therefore forbidden to ordinary Israelites.
  alternative_readings:
  - The phrase could be taken more loosely as produce merely set aside, not formally
    consecrated.
  rationale: The combination of ἐφυλάξαν, ἁγιάσαντες, priestly reference, and the
    prohibition against touching strongly supports a formal sacred status rather than
    a merely practical reservation.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological
    tension rather than resolve it'
