id: JDT.11.13
reference: Judith 11:13
source:
  edition: lxx-swete-1909
  text: καὶ τὰς ἀπαρχὰς τοῦ σίτου καὶ τὰς δεκάτας τοῦ οἴνου καὶ τοῦ ἐλαίου, ἃ ἐφυλάξαν
    ἁγιάσαντες τοῖς ἱερεῦσιν τοῖς παρεστηκόσιν ἐν Ἰερουσαλὴμ ἀπέναντι τοῦ προσώπου
    τοῦ θεοῦ ἡμῶν, κεκρίκασιν ἐξαναλῶσαι, ὧν οὐδὲ ταῖς χερσὶν καθῆκεν ἅψασθαι οὐδένα
    τῶν ἐκ τοῦ λαοῦ.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 818
  - 819
  - 820
  - 821
  - 822
  - 823
  confidence: high
  validation: agree
translation:
  text: And the firstfruits of the grain and the tithes of the wine and of the oil,
    which they had kept, having consecrated them for the priests who stand in Jerusalem
    before the face of our God—they have decided to consume these, though it is not
    permitted for any of the people even to touch them with their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before our God.' The Greek more literally says 'before the face of our
      God,' a vivid expression for being in God's presence.
    reason: lexical_alternative
  - marker: b
    text: Or 'it is not lawful' or 'it is not fitting' for any of the people even
      to touch them with their hands.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαρχὰς
  chosen: firstfruits
  alternatives:
  - first portion
  - first offerings
  lexicon: LSJ
  rationale: ἀπαρχή commonly denotes the first portion set apart from produce as an
    offering. 'Firstfruits' is the standard and clearest cultic rendering in English.
- source_word: σίτου
  chosen: grain
  alternatives:
  - wheat
  - corn
  lexicon: LSJ
  rationale: σῖτος can mean wheat specifically or grain more generally. Since the
    verse lists produce categories broadly, 'grain' best preserves the likely generic
    sense without narrowing unnecessarily.
- source_word: δεκάτας
  chosen: tithes
  alternatives:
  - tenths
  lexicon: LSJ
  rationale: The cultic term δεκάτη is naturally rendered 'tithe'; this is idiomatic
    and preserves the religious-economic sense.
- source_word: ἐφυλάξαν
  chosen: had kept
  alternatives:
  - had reserved
  - had guarded
  lexicon: LSJ
  rationale: φυλάσσω here refers to keeping these portions set aside and protected
    for sacred use. 'Had kept' is natural English and broad enough to include reservation
    for holy use.
- source_word: ἁγιάσαντες
  chosen: having consecrated them
  alternatives:
  - having sanctified them
  - having set them apart as holy
  lexicon: LSJ
  rationale: The participle indicates prior dedication to sacred use. 'Having consecrated
    them' communicates cultic setting-apart more clearly than the less idiomatic 'having
    sanctified them'.
- source_word: τοῖς ἱερεῦσιν
  chosen: for the priests
  alternatives:
  - to the priests
  lexicon: LSJ
  rationale: With the dative after ἁγιάσαντες, the sense is dedication for priestly
    use/benefit. 'For the priests' expresses this clearly in English.
- source_word: τοῖς παρεστηκόσιν
  chosen: who stand
  alternatives:
  - who serve
  - who are present
  lexicon: LSJ
  rationale: The perfect participle literally means 'having stood by' or 'standing
    by.' In temple context it can imply attendance/service. 'Who stand' preserves
    the concrete cultic posture and allusive solemnity, while remaining understandable.
- source_word: ἀπέναντι τοῦ προσώπου τοῦ θεοῦ ἡμῶν
  chosen: before the face of our God
  alternatives:
  - before our God
  - in the presence of our God
  lexicon: LSJ
  rationale: The phrase is formally fuller than a simple 'before God.' 'Before the
    face of our God' preserves the vivid Semitic-style expression reflected in the
    Greek, though still intelligible in English.
- source_word: κεκρίκασιν
  chosen: they have decided
  alternatives:
  - they have judged
  - they have resolved
  lexicon: LSJ
  rationale: κρίνω here denotes a settled determination rather than judicial condemnation.
    'They have decided' best fits the context of a deliberate plan.
- source_word: ἐξαναλῶσαι
  chosen: to consume
  alternatives:
  - to use up
  - to spend
  lexicon: LSJ
  rationale: The verb means to expend or consume completely. In context of sacred
    produce, 'to consume' naturally conveys using it as food/provisions.
- source_word: οὐδὲ ταῖς χερσὶν καθῆκεν ἅψασθαι
  chosen: it is not permitted ... even to touch them with their hands
  alternatives:
  - it is not lawful ... even to handle them
  - it is not fitting ... even to touch them
  lexicon: LSJ
  rationale: καθήκω can mean be fitting or proper, but in this cultic prohibition
    context the force is practical and normative. 'It is not permitted' communicates
    the restriction clearly; retaining 'with their hands' reflects the Greek emphasis.
- source_word: οὐδένα τῶν ἐκ τοῦ λαοῦ
  chosen: for any of the people
  alternatives:
  - for anyone from the people
  - for any of the common people
  lexicon: LSJ
  rationale: The phrase distinguishes the general populace from the priests. 'Any
    of the people' is concise and preserves that contrast without overinterpreting
    social nuance.
