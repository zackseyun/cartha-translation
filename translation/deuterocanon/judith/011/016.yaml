id: JDT.11.16
reference: Judith 11:16
source:
  edition: lxx-swete-1909
  text: ὅθεν ἐγὼ ἡ δούλη σου ἐπιγνοῦσα ταῦτα πάντα ἀπέδρων ἀπὸ προσώπου αὐτῶν, καὶ
    ἀπέστειλέν με ὁ θεὸς ποιῆσαι μετὰ σοῦ πράγματα ἐφʼ οἷς ἐκστήσεται πᾶσα ἡ γῆ ὅσο
    ἐὰν ἀκούσωσιν αὐτά.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 818
  - 819
  - 820
  - 821
  - 822
  - 823
  confidence: high
  validation: agree
translation:
  text: Therefore I, your servant, having learned all these things, fled from before
    them, and God sent me to do with you deeds at which the whole earth will be astonished,
    whenever they hear them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their presence.' The Greek expression is literally 'from before
      them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to accomplish things with you.' The Greek phrase is broad and does not
      specify more precisely how Holofernes is involved.
    reason: lexical_alternative
  - marker: c
    text: Or 'the whole world' or, in a narrower sense, 'all the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  - From which
  lexicon: LSJ
  rationale: Introduces an inference from the preceding claims. 'Therefore' is natural
    English and preserves the causal/logical force better than the more literal but
    awkward 'from which.'
- source_word: ἡ δούλη σου
  chosen: your servant
  alternatives:
  - your slave
  lexicon: BDAG
  rationale: Although δοῦλος/δούλη can denote a slave, here Judith uses deferential
    courtly self-reference toward Holofernes. The bonded-status nuance is not the
    main point; 'your servant' best fits the social register while remaining faithful
    to the term.
- source_word: ἐπιγνοῦσα
  chosen: having learned
  alternatives:
  - having come to know
  - having understood fully
  - having recognized
  lexicon: BDAG
  rationale: The participle indicates acquired knowledge prior to her flight. 'Having
    learned' is concise and idiomatic, while still reflecting the sense of coming
    to know these matters.
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all this
  - all these matters
  lexicon: LSJ
  rationale: A comprehensive reference to the information just mentioned. 'All these
    things' preserves the explicit plural and totalizing πάντα.
- source_word: ἀπέδρων
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: LSJ
  rationale: Conveys decisive departure by flight. 'Fled' is both accurate and suitably
    elevated for the narrative context.
- source_word: ἀπὸ προσώπου αὐτῶν
  chosen: from before them
  alternatives:
  - from their presence
  - away from them
  lexicon: LSJ
  rationale: The Greek is a Semitic-style expression literally involving 'face/presence.'
    'From before them' preserves that flavor while remaining intelligible; it also
    explains the directionality of her flight.
- source_word: ἀπέστειλέν με ὁ θεός
  chosen: God sent me
  alternatives:
  - God has sent me
  lexicon: BDAG
  rationale: Simple past fits the narrative sequence. The clause presents Judith's
    claim of divine commissioning without adding interpretive nuance.
- source_word: ποιῆσαι μετὰ σοῦ πράγματα
  chosen: to do with you deeds
  alternatives:
  - to accomplish things with you
  - to do acts with you
  - to work deeds through you
  lexicon: LSJ
  rationale: The phrase is somewhat broad and idiomatic. 'To do with you deeds' keeps
    the concrete noun πράγματα and the συνεργative force of μετὰ σοῦ, without over-specifying
    whether Holofernes is partner, instrument, or beneficiary.
- source_word: ἐφʼ οἷς
  chosen: at which
  alternatives:
  - because of which
  - over which
  lexicon: LSJ
  rationale: With ἐκστήσεται, the phrase expresses the occasion for astonishment.
    'At which' is idiomatic in English for being astonished at deeds.
- source_word: ἐκστήσεται
  chosen: will be astonished
  alternatives:
  - will be amazed
  - will be beside itself
  lexicon: BDAG
  rationale: The future middle/passive here conveys strong amazement. 'Will be astonished'
    is clear and preserves the intensity without sounding colloquial.
- source_word: πᾶσα ἡ γῆ
  chosen: the whole earth
  alternatives:
  - all the land
  - the whole world
  lexicon: LSJ
  rationale: In biblical Greek this can mean the earth/world broadly, not merely a
    local territory. 'The whole earth' preserves the rhetorical universality of Judith's
    claim.
- source_word: ὅσο ἐὰν ἀκούσωσιν αὐτά
  chosen: whenever they hear them
  alternatives:
  - as many as hear them
  - when they hear these things
  lexicon: BDAG
  rationale: The construction links the astonishment to the hearing of the reported
    deeds. 'Whenever they hear them' gives good English sense and preserves the plural
    referent back to the deeds/things.
