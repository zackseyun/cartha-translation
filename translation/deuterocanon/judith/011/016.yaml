theological_decisions:
- issue: Divine commissioning claim in Judith's speech
  chosen_reading: 'Render the statement straightforwardly as Judith''s claim: ''God
    sent me'''
  alternative_readings:
  - Soften as merely Judith's opinion or alleged claim
  rationale: The narrative reports her speech directly. The translation should neither
    endorse nor undercut the claim beyond what the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
