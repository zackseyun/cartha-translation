translation:
  text: And now, if your people who live in the hill country had not treated me with
    contempt, I would not have raised my spear against them; but they themselves have
    brought these things on themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'had not slighted me' or 'had not insulted me.' The Greek verb conveys
      treating someone as of little account.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λαός σου
  chosen: your people
  alternatives:
  - your nation
  lexicon: LSJ
  rationale: λαός commonly denotes a people as a collective body. 'Your people' is
    the most natural English equivalent here in direct address.
- source_word: ὁ κατοικῶν τὴν ὀρεινήν
  chosen: who live in the hill country
  alternatives:
  - who dwell in the mountainous region
  - who inhabit the highlands
  lexicon: LSJ
  rationale: The participial phrase modifies 'people.' ἡ ὀρεινή is a substantive expression
    for the hill country/highland region. 'Live in the hill country' is idiomatic
    modern English while preserving the geographic sense.
- source_word: εἰ μὴ ἐφαύλισάν με
  chosen: if ... had not treated me with contempt
  alternatives:
  - if ... had not slighted me
  - if ... had not insulted me
  - if ... had not despised me
  lexicon: LSJ
  rationale: ἐφαυλίζω carries the sense of treating as of little account, slighting,
    or showing contempt. 'Treated me with contempt' best captures the force in clear
    English. The construction εἰ μὴ with the aorist here introduces the contrary-to-fact
    condition.
- source_word: οὐκ ἂν ἦρα
  chosen: I would not have raised
  alternatives:
  - I would not have lifted
  lexicon: LSJ
  rationale: αἴρω literally means 'raise/lift.' In military context with δόρυ, 'raised'
    is the natural English choice and fits the counterfactual apodosis with ἄν.
- source_word: τὸ δόρυ μου
  chosen: my spear
  alternatives:
  - my lance
  lexicon: LSJ
  rationale: δόρυ commonly means spear in martial contexts. 'Spear' is the standard
    and accessible rendering.
- source_word: ἐπʼ αὐτούς
  chosen: against them
  alternatives:
  - upon them
  lexicon: LSJ
  rationale: With a weapon and hostile action, ἐπί plus accusative is best rendered
    'against them' rather than the more wooden 'upon them.'
- source_word: ἀλλὰ αὐτοὶ ἑαυτοῖς ἐποίησαν ταῦτα
  chosen: but they themselves have brought these things on themselves
  alternatives:
  - but they themselves did these things to themselves
  - but they themselves caused this for themselves
  lexicon: LSJ
  rationale: The reflexive dative ἑαυτοῖς indicates self-incurred consequence. English
    idiom prefers 'have brought these things on themselves,' which preserves both
    agency and reflexive force. The perfective sense is not explicit in Greek tense
    here, but the English present perfect reads naturally in context of present consequences.
