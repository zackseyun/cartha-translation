translation:
  text: There is no woman like her from one end of the earth to the other, in beauty
    of face and wisdom of speech.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from one end of the land to the other.' The Greek γῆ can mean either
      'earth' or 'land'; the broader sense fits the hyperbolic praise here.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in a good/beautiful face and understanding of words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐκ ἔστιν
  chosen: There is no
  alternatives:
  - There is not
  - No ... exists
  lexicon: BDAG
  rationale: Natural English existential rendering of the Greek negated copular expression.
- source_word: τοιαύτη γυνὴ
  chosen: woman like this one
  alternatives:
  - such a woman
  - a woman such as this
  lexicon: BDAG
  rationale: τοιαύτη marks quality ('such, of this kind'). 'Woman like this one' preserves
    the demonstrative force in idiomatic English.
- source_word: ἀπʼ ἄκρου ἕως ἄκρου τῆς γῆς
  chosen: from one end of the earth to the other
  alternatives:
  - from end to end of the earth
  - from one extremity of the land to the other
  lexicon: LSJ
  rationale: This is an idiomatic merism meaning the whole earth/land. 'Earth' is
    preferred over 'land' because τῆς γῆς here is universal in scope, not merely local
    territory.
- source_word: ἐν καλῷ προσώπῳ
  chosen: in beauty of face
  alternatives:
  - with a beautiful face
  - in fair appearance
  lexicon: LSJ
  rationale: The prepositional phrase describes the sphere/respect in which she is
    unmatched. 'Beauty of face' stays close to the Greek while remaining intelligible;
    καλῷ with πρόσωπον points to physical attractiveness/appearance.
- source_word: καὶ συνέσει λόγων
  chosen: and wisdom of speech
  alternatives:
  - and understanding in words
  - and prudence of speech
  - and intelligence of words
  lexicon: BDAG
  rationale: σύνεσις denotes understanding, intelligence, or prudence; λόγων here
    refers to speech/words. 'Wisdom of speech' is idiomatic English that captures
    both intellectual and rhetorical commendation.
