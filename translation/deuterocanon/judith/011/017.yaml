theological_decisions:
- issue: Rendering of δούλη in Judith's self-reference
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: Although δοῦλος/δούλη can denote slave, the immediate function here is
    deferential self-reference in court speech. The bonded-status nuance is not theologically
    salient in this verse, so 'servant' best fits the doctrine's context-dependent
    policy while documenting 'slave' as an alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος *doulos* | servant / slave
    (context-dependent)'
