id: JDT.11.17
reference: Judith 11:17
source:
  edition: lxx-swete-1909
  text: ὅτι ἡ δούλη σου θεοσεβής ἐστιν, καὶ θεραπεύουσα νυκτὸς καὶ ἡμέρας τὸν θεὸν
    τοῦ οὐρανοῦ· καὶ νῦν μενῶ παρὰ σοί, κύριε μου, καὶ ἐξελεύσεται ἡ δούλη σου κατὰ
    νύκτα εἰς τὴν φάραγγα καὶ προσεύξομαι πρὸς τὸν θεόν, καὶ ἐρεῖ μοι πότε ἐποίησαν
    τὸ ἁμάρτημα αὐτῶν.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 818
  - 819
  - 820
  - 821
  - 822
  - 823
  confidence: high
  validation: agree
translation:
  text: for your servant is God-fearing, and serves the God of heaven night and day.
    And now I will remain with you, my lord, and your servant will go out by night
    into the valley, and I will pray to God, and he will tell me when they have committed
    their sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slave' for 'your servant' (Greek δούλη); the term can denote a female
      slave, but here it functions as deferential self-reference.
    reason: lexical_alternative
  - marker: b
    text: Or 'ravine' or 'gorge' for 'valley' (Greek φάραγξ).
    reason: lexical_alternative
lexical_decisions:
- source_word: δούλη
  chosen: servant
  alternatives:
  - slave
  lexicon: BDAG
  rationale: The term denotes a female servant/slave. Here Judith uses deferential
    court speech toward Holofernes ('your servant'), where the social posture is foregrounded
    more than bonded-status theology. Per doctrine, 'servant' is preferred in such
    context-dependent cases, while preserving 'slave' as an alternative.
- source_word: θεοσεβής
  chosen: God-fearing
  alternatives:
  - devout
  - pious
  lexicon: LSJ
  rationale: The adjective directly expresses reverence toward God. 'God-fearing'
    preserves the explicit θεο- element better than the more generalized 'devout'
    or 'pious'.
- source_word: θεραπεύουσα
  chosen: serves
  alternatives:
  - worships
  - attends
  lexicon: LSJ
  rationale: The participle can mean to serve, attend, or render religious service.
    In this context of continual devotion to 'the God of heaven,' 'serves' captures
    both religious devotion and ongoing attendance without over-narrowing to liturgical
    'worships'.
- source_word: νυκτὸς καὶ ἡμέρας
  chosen: night and day
  alternatives:
  - by night and by day
  - continually
  lexicon: LSJ
  rationale: This is a standard temporal expression. 'Night and day' is natural English
    and preserves the merism.
- source_word: τὸν θεὸν τοῦ οὐρανοῦ
  chosen: the God of heaven
  alternatives:
  - the heavenly God
  lexicon: LSJ
  rationale: A conventional biblical title. The more literal 'the God of heaven' preserves
    the genitival construction and biblical resonance.
- source_word: μενῶ παρὰ σοί
  chosen: I will remain with you
  alternatives:
  - I will stay beside you
  - I will remain in your presence
  lexicon: LSJ
  rationale: The future of μένω with παρά + dative indicates remaining in someone's
    company/presence. 'Remain with you' is idiomatic and sufficiently precise.
- source_word: κύριε μου
  chosen: my lord
  alternatives:
  - my master
  - sir
  lexicon: LSJ
  rationale: In direct address to Holofernes, this is a social title of deference,
    not a divine title. 'My lord' preserves the elevated register better than 'sir,'
    while 'master' could overstate ownership.
- source_word: ἐξελεύσεται
  chosen: will go out
  alternatives:
  - will depart
  lexicon: LSJ
  rationale: The future middle straightforwardly means 'will go out.' This fits the
    movement from camp to the valley.
- source_word: κατὰ νύκτα
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: LSJ
  rationale: '''By night'' preserves the slightly formal narrative tone and matches
    the Greek prepositional phrase well.'
- source_word: φάραγγα
  chosen: the valley
  alternatives:
  - the ravine
  - the gorge
  lexicon: LSJ
  rationale: The noun can denote ravine, gorge, or valley. 'Valley' is broad and readable;
    the exact topography is not pressed in the immediate context, though a narrower
    'ravine' remains possible.
- source_word: προσεύξομαι πρὸς τὸν θεόν
  chosen: I will pray to God
  alternatives:
  - I will pray before God
  lexicon: BDAG
  rationale: Standard expression for prayer directed to God. 'Pray to God' is the
    clearest idiomatic rendering.
- source_word: ἐρεῖ μοι
  chosen: he will tell me
  alternatives:
  - he will say to me
  - he will inform me
  lexicon: LSJ
  rationale: Simple future of λέγω. 'He will tell me' is natural English and preserves
    the personal communication implied.
- source_word: πότε
  chosen: when
  alternatives:
  - at what time
  lexicon: LSJ
  rationale: 'The interrogative adverb introduces the content of what God will reveal:
    the time of their sinful act. ''When'' is the direct and idiomatic rendering.'
- source_word: ἐποίησαν τὸ ἁμάρτημα αὐτῶν
  chosen: they have committed their sin
  alternatives:
  - they committed their sin
  - they have done their sin
  lexicon: LSJ
  rationale: ποιέω with ἁμάρτημα is a Semitized expression meaning to commit sin.
    English requires an idiomatic rendering; 'have committed their sin' preserves
    the completed action with present relevance better than the less natural 'done
    their sin.'
