  rationale: Because the referent is a human superior rather than God, lowercase 'lord'
    is appropriate. This preserves the title sense without implying divinity.
  doctrine_reference: 'DOCTRINE.md: κύριος default rendering ''Lord''; context determines
    capitalization and referent.'
