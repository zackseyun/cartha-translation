id: JDT.11.6
reference: Judith 11:6
source:
  edition: lxx-swete-1909
  text: καὶ ἐὰν κατακολουθήσῃς τοῖς λόγοις τῆς παιδίσκης σου, τελείως πρᾶγμα ποιήσει
    μετὰ σοῦ ὁ θεός, καὶ οὐκ ἀποστεῖται ὁ κύριός μου τῶν ἐπιτηδευμάτων αὐτοῦ.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 818
  - 819
  - 820
  - 821
  - 822
  - 823
  confidence: high
  validation: agree
translation:
  text: And if you follow the words of your servant girl, God will fully accomplish
    the matter with you, and my lord will not depart from his purposes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heed the words of your servant girl.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my master will not turn aside from his undertakings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακολουθήσῃς
  chosen: follow
  alternatives:
  - heed
  - go along with
  lexicon: LSJ
  rationale: The verb means to follow after or comply with. 'Follow' is natural English
    and fits the sense of acting in accordance with Judith's counsel.
- source_word: λόγοις
  chosen: words
  alternatives:
  - sayings
  - advice
  lexicon: LSJ
  rationale: Literally 'words.' Although the contextual sense is counsel or advice,
    'words' preserves the Greek wording while remaining clear in English.
- source_word: παιδίσκης
  chosen: servant girl
  alternatives:
  - maidservant
  - female servant
  - slave girl
  lexicon: LSJ
  rationale: The term denotes a young female servant/maid. 'Servant girl' preserves
    both gender and social status without overstating bonded status where this verse
    does not make that nuance central.
- source_word: τελείως
  chosen: fully
  alternatives:
  - completely
  - successfully
  lexicon: LSJ
  rationale: The adverb intensifies the accomplishment of the matter. 'Fully' is concise
    and idiomatic in English.
- source_word: πρᾶγμα
  chosen: the matter
  alternatives:
  - the affair
  - the plan
  - the thing
  lexicon: LSJ
  rationale: A broad term for a matter, affair, or undertaking. 'The matter' keeps
    the wording general, matching the Greek.
- source_word: ποιήσει μετὰ σοῦ
  chosen: will fully accomplish the matter with you
  alternatives:
  - will carry out the matter through you
  - will bring the matter to completion for you
  lexicon: LSJ
  rationale: The phrase indicates God will bring the undertaking to completion in
    relation to Holofernes. 'With you' preserves the preposition μετά rather than
    interpreting more strongly as 'through you' or 'for you.'
- source_word: ὁ θεός
  chosen: God
  lexicon: LSJ
  rationale: Standard rendering of θεός.
- source_word: οὐκ ἀποστεῖται
  chosen: will not fail
  alternatives:
  - will not depart
  - will not turn aside
  - will not desist
  lexicon: LSJ
  rationale: From ἀφίστημι/ἀποστέλλω-related form in context meaning not to withdraw
    from or abandon. Here the sense is that Judith's lord will not deviate from or
    fall short regarding his designs. 'Will not fail' gives the idiomatic force in
    context.
- source_word: ὁ κύριός μου
  chosen: my lord
  alternatives:
  - my master
  lexicon: LSJ
  rationale: In this narrative setting Judith refers deferentially to Holofernes.
    'My lord' is the natural title and aligns with the project's default rendering
    of κύριος as 'Lord/lord' depending on referent.
- source_word: ἐπιτηδευμάτων
  chosen: plans
  alternatives:
  - purposes
  - undertakings
  - designs
  lexicon: LSJ
  rationale: The noun refers to pursuits, practices, or undertakings. In context of
    military/political intent, 'plans' is the clearest modern English rendering.
