id: JDT.11.1
reference: Judith 11:1
source:
  edition: lxx-swete-1909
  text: Καὶ εἶπεν πρὸς αὐτὴν Ὀλοφέρνης Θάρσησον, γύναι, μὴ φοβηθῇς τῇ καρδίᾳ σου·
    ὅτι ἐγὼ οὐκ ἐκάκωσα ἄνθρωπον ὅστις ἡρέτικεν δουλεύειν βασιλεῖ Ναβουχοδονόσορ πάσης
    τῆς γῆς.
