translation:
  text: And Holofernes said to her, “Take courage, woman; do not be afraid in your
    heart, for I have harmed no man who has chosen to serve King Nebuchadnezzar of
    all the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “do not fear in your heart.”
    reason: lexical_alternative
  - marker: b
    text: Or “who has preferred to serve.”
    reason: lexical_alternative
  - marker: c
    text: The phrase “king ... of all the earth” reflects the speaker’s imperial claim;
      “earth” could also be rendered “land” in other contexts.
    reason: cultural_note
lexical_decisions:
- source_word: Θάρσησον
  chosen: Take courage
  alternatives:
  - Be of good courage
  - Be brave
  - Take heart
  lexicon: LSJ
  rationale: Imperative of θαρσέω/θαρσύνω sense cluster meaning to be confident or
    courageous. 'Take courage' is idiomatic modern English that preserves the exhortational
    force without sounding archaic.
- source_word: γύναι
  chosen: woman
  alternatives:
  - lady
  lexicon: LSJ
  rationale: Direct address meaning 'woman.' 'Lady' would soften the term beyond the
    Greek. 'Woman' preserves the plain vocative force, even if somewhat formal in
    English.
- source_word: μὴ φοβηθῇς τῇ καρδίᾳ σου
  chosen: do not be afraid in your heart
  alternatives:
  - do not fear in your heart
  - do not let your heart be afraid
  lexicon: LSJ
  rationale: The dative phrase τῇ καρδίᾳ σου is retained rather than flattened, since
    the Greek explicitly locates the fear inwardly. The chosen wording is readable
    while preserving the Hebrew-like idiom reflected in the Greek.
- source_word: ἐκάκωσα
  chosen: have harmed
  alternatives:
  - have wronged
  - have mistreated
  - have injured
  lexicon: LSJ
  rationale: From κακόω, to do harm or mistreat. 'Have harmed' is broad and natural,
    fitting Holofernes' claim without over-specifying physical violence or legal injustice.
- source_word: ἄνθρωπον
  chosen: man
  alternatives:
  - person
  - human being
  lexicon: LSJ
  rationale: The singular ἄνθρωπον here is generic but in a military-political context
    referring to any individual person. Per gender-accurate philosophy, 'man' is acceptable
    where the source uses the masculine singular generically; 'person' is possible
    but less textually transparent. The generic force is contextual rather than male-exclusive.
- source_word: ὅστις ἡρέτικεν
  chosen: who has chosen
  alternatives:
  - who has preferred
  - who has resolved
  lexicon: LSJ
  rationale: The verb αἱρέω in this form conveys choosing or preferring. 'Has chosen'
    is the clearest modern rendering and fits the perfective sense in context.
- source_word: δουλεύειν
  chosen: to serve
  alternatives:
  - to be a slave to
  - to be subject to
  lexicon: LSJ
  rationale: Although cognate with slavery/service language, here the infinitive describes
    political submission to a king. 'To serve' best fits the context; 'to be a slave
    to' would overstate the bonded nuance in this royal-political setting.
- source_word: βασιλεῖ Ναβουχοδονόσορ
  chosen: King Nebuchadnezzar
  alternatives:
  - Nebuchadnezzar the king
  lexicon: LSJ
  rationale: Standard English order for title plus personal name. The name is transliterated
    per project policy.
- source_word: πάσης τῆς γῆς
  chosen: of all the earth
  alternatives:
  - of the whole earth
  - of all the land
  lexicon: LSJ
  rationale: γῆ can mean land or earth; in this imperial titulary context the universalizing
    claim is best represented by 'earth' rather than a local 'land.' 'All the earth'
    preserves the grandiose rhetoric.
