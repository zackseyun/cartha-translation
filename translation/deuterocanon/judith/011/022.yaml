theological_decisions:
- issue: Rendering of κύριος in reference to Holofernes/Nebuchadnezzar's sovereign
    rather than Israel's God
  chosen_reading: my lord
  alternative_readings:
  - my master
  rationale: The term here refers to a human ruler, not the God of Israel. Following
    the doctrine's default for κύριος while respecting context, 'my lord' preserves
    the title sense without suggesting divinity.
