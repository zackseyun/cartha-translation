id: JDT.11.22
reference: Judith 11:22
source:
  edition: lxx-swete-1909
  text: εἶπεν πρὸς αὐτὴν Ὁλοφέρνης Εὖ ἐποίησεν ὁ θεὸς ἀποστεῖλας σε ἔμπροσθεν τοῦ
    λαοῦ, τοῦ γενήθηναι ἐν χερσὶν ἡμῶν κράτος· ἐν δὲ τοῖς φαυλίσασι τὸν κύριόν μου
    ἀπώλεια.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 818
  - 819
  - 820
  - 821
  - 822
  - 823
  confidence: high
  validation: agree
translation:
  text: Holofernes said to her, “God has done well to send you ahead of the people,
    so that power might come into our hands; but destruction is for those who have
    treated my lord with contempt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did well by sending you before the people.' The Greek participial construction
      can be rendered more formally.
    reason: lexical_alternative
  - marker: b
    text: Or 'but for those who have despised my lord, there is destruction.' The
      Greek places 'destruction' first for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὖ ἐποίησεν
  chosen: has done well
  alternatives:
  - did well
  - has acted well
  lexicon: LSJ
  rationale: 'Idiomatic commendation: literally ''did well,'' here naturally rendered
    in English as ''has done well'' to preserve the evaluative force while fitting
    the perfective sense in context.'
- source_word: ἀποστεῖλας
  chosen: to send
  alternatives:
  - by sending
  - having sent
  lexicon: LSJ
  rationale: Aorist participle modifying ὁ θεός. In English, an infinitival construction
    after 'has done well' is more natural than a wooden participial rendering.
- source_word: ἔμπροσθεν τοῦ λαοῦ
  chosen: ahead of the people
  alternatives:
  - before the people
  - in front of the people
  lexicon: LSJ
  rationale: Spatially and temporally 'ahead of' best fits Judith being sent in advance
    of her people, while remaining close to the Greek.
- source_word: τοῦ γενήθηναι
  chosen: so that ... might come
  alternatives:
  - for ... to come to be
  - that there might be
  lexicon: LSJ
  rationale: Articular infinitive of purpose/result. Rendering it as 'so that' communicates
    the intended outcome in idiomatic English.
- source_word: ἐν χερσὶν ἡμῶν
  chosen: into our hands
  alternatives:
  - in our hands
  - at our hands
  lexicon: LSJ
  rationale: The idiom with 'power' is best expressed in English as 'come into our
    hands,' conveying possession/control rather than mere location.
- source_word: κράτος
  chosen: power
  alternatives:
  - might
  - dominion
  - strength
  lexicon: LSJ
  rationale: '''Power'' is the broadest and most natural rendering here, expressing
    military/political mastery expected in Holofernes''s speech. ''Might'' is possible
    but less idiomatic in contemporary English.'
- source_word: φαυλίσασι
  chosen: have treated ... with contempt
  alternatives:
  - have despised
  - have dishonored
  - have made light of
  lexicon: LSJ
  rationale: The verb conveys disparaging, slighting, or treating as worthless. 'Treated
    with contempt' captures the active dishonoring sense more fully than the simpler
    'despised.'
- source_word: τὸν κύριόν μου
  chosen: my lord
  alternatives:
  - my master
  lexicon: LSJ
  rationale: Per doctrine, κύριος defaults to 'Lord,' but in a human superior-address
    context 'my lord' is the natural English equivalent and avoids importing divine
    overtones.
- source_word: ἀπώλεια
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: LSJ
  rationale: '''Destruction'' is the clearest contemporary rendering and fits the
    threatened outcome without adding later theological freight.'
