theological_decisions:
- issue: Rendering σωτηρία in a narrative, non-explicitly theological context
  chosen_reading: for safety
  alternative_readings:
  - for salvation
  - for deliverance
  rationale: Although σωτηρία can mean 'salvation' or 'deliverance,' here the speaker
    appears to mean that Judith has come seeking preservation or rescue. The translation
    therefore uses 'for safety' as the clearest contextual English, while preserving
    the more literal alternatives in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve theological tension
    rather than import doctrinal claims the text does not make'
