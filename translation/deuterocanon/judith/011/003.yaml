translation:
  text: And now tell me why you fled from them and came to us; for you have come for
    safety.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''for salvation'' or ''for deliverance''; Greek: ''into salvation/deliverance''
      (εἰς σωτηρίαν).'
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν
  chosen: now
  alternatives:
  - as things are
  - at this time
  lexicon: LSJ
  rationale: Temporal adverb marking the immediate turn in Holofernes's speech; straightforwardly
    rendered 'now' in natural English.
- source_word: λέγε μοι
  chosen: tell me
  alternatives:
  - speak to me
  - say to me
  lexicon: LSJ
  rationale: Imperative plus indirect object is idiomatically 'tell me' in English,
    preserving the direct request without wooden phrasing.
- source_word: τίνος ἕνεκεν
  chosen: why
  alternatives:
  - for what reason
  - on account of what
  lexicon: LSJ
  rationale: The phrase asks for cause or reason. 'Why' is the most natural optimal-equivalence
    rendering, while retaining the causal force.
- source_word: ἀπέδρας
  chosen: you fled
  alternatives:
  - you ran away
  - you escaped
  lexicon: LSJ
  rationale: Aorist of ἀποδιδράσκω conveys fleeing away or escaping. 'You fled' preserves
    both the motion and the separation from 'them' without adding connotations beyond
    the Greek.
- source_word: ἀπʼ αὐτῶν
  chosen: from them
  alternatives:
  - away from them
  lexicon: LSJ
  rationale: Simple prepositional phrase indicating separation from Judith's own people.
- source_word: ἦλθες πρὸς ἡμᾶς
  chosen: came to us
  alternatives:
  - have come to us
  - came over to us
  lexicon: LSJ
  rationale: Aorist verb of motion rendered simply as past narrative action. 'Came
    to us' is direct and unembellished.
- source_word: ἥκεις
  chosen: you have come
  alternatives:
  - you came
  - you are here
  lexicon: LSJ
  rationale: ἥκω often emphasizes arrival or present state of having come. 'You have
    come' preserves the resultative nuance better than a simple past.
- source_word: εἰς σωτηρίαν
  chosen: for safety
  alternatives:
  - for deliverance
  - for salvation
  lexicon: LSJ
  rationale: In this immediate narrative context Holofernes is speaking of Judith's
    apparent personal preservation rather than explicit theological salvation. 'For
    safety' communicates practical rescue while avoiding importing later doctrinal
    overtones. 'Salvation' remains a viable lexical alternative and is preserved in
    a footnote.
