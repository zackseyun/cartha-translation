id: JDT.11.8
reference: Judith 11:8
source:
  edition: lxx-swete-1909
  text: ἠκούσαμεν γὰρ τὴν σοφίαν σου καὶ τὰ πανουργεύματα τῆς ψυχῆς σου, καὶ ἀνηγγέλη
    πάσῃ τῇ γῇ ὅτι σὺ μόνος ἀγαθὸς ἐν πάσῃ βασιλείᾳ καὶ δυνατὸς ἐν ἐπιστήμῃ καὶ θαυμαστὸς
    ἐν στρατεύμασιν πολέμου.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 818
  - 819
  - 820
  - 821
  - 822
  - 823
  confidence: high
  validation: agree
translation:
  text: For we have heard of your wisdom and the cunning of your soul, and it has
    been reported throughout all the earth that you alone are good in all the kingdom,
    mighty in knowledge, and marvelous in the armies of war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the cunning of your soul"; Greek ψυχή can mean "soul," "life," or the
      inner self, but here likely refers to the faculty of thought or intention.
    reason: lexical_alternative
  - marker: b
    text: Or "throughout all the land"; Greek γῆ may mean either "land" or "earth/world"
      depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or "in the whole kingdom"; the singular likely refers to his realm, not
      to every kingdom universally.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκούσαμεν
  chosen: we have heard
  alternatives:
  - we heard
  lexicon: LSJ
  rationale: A present-result perfect in English fits the Greek aorist in this discourse
    context, conveying information received and still relevant to the speaker's appeal.
- source_word: σοφίαν
  chosen: wisdom
  alternatives:
  - skill
  lexicon: LSJ
  rationale: '"Wisdom" is the standard and most natural rendering here, referring
    to perceived prudence or intelligence.'
- source_word: πανουργεύματα
  chosen: cunning
  alternatives:
  - clever schemes
  - shrewdness
  - craftiness
  lexicon: LSJ
  rationale: The noun can carry the sense of cleverness with a potentially crafty
    edge. "Cunning" preserves that ambiguity better than the more positive "shrewdness"
    or the more negative "schemes."
- source_word: τῆς ψυχῆς σου
  chosen: of your mind
  alternatives:
  - of your soul
  - of your inner self
  lexicon: LSJ
  rationale: Although ψυχή is often "soul," in this idiom it points to the inner faculty
    behind planning and intelligence. "Mind" communicates the sense in contemporary
    English without importing later anthropological distinctions.
- source_word: ἀνηγγέλη
  chosen: it has been reported
  alternatives:
  - it was reported
  - it was announced
  lexicon: LSJ
  rationale: An impersonal passive is best preserved. "Has been reported" reads naturally
    and keeps the focus on the widespread report rather than the reporters.
- source_word: πάσῃ τῇ γῇ
  chosen: throughout all the earth
  alternatives:
  - throughout all the land
  - to the whole world
  lexicon: LSJ
  rationale: γῆ can mean land or earth. In this hyperbolic courtly speech about international
    reputation, "all the earth" best reflects the broad scope without over-modernizing
    to "world."
- source_word: μόνος
  chosen: alone
  alternatives:
  - only
  lexicon: LSJ
  rationale: '"Alone" idiomatically modifies the subject and preserves the emphatic
    exclusivity of the Greek.'
- source_word: ἀγαθὸς
  chosen: good
  alternatives:
  - excellent
  - noble
  lexicon: LSJ
  rationale: '"Good" is the plain lexical sense and should be retained unless context
    demands a narrower nuance. Here it likely praises overall quality or virtue without
    needing expansion.'
- source_word: ἐν πάσῃ βασιλείᾳ
  chosen: in all the kingdom
  alternatives:
  - in the whole kingdom
  - in every kingdom
  lexicon: LSJ
  rationale: Taken with the singular βασιλείᾳ, the phrase most naturally refers to
    the entirety of his realm rather than every kingdom universally.
- source_word: δυνατὸς ἐν ἐπιστήμῃ
  chosen: mighty in knowledge
  alternatives:
  - powerful in understanding
  - strong in expertise
  lexicon: LSJ
  rationale: The phrase is somewhat elevated and encomiastic. "Mighty in knowledge"
    preserves the unusual combination of strength language with intellectual capacity.
- source_word: θαυμαστὸς
  chosen: marvelous
  alternatives:
  - admirable
  - wonderful
  lexicon: LSJ
  rationale: '"Marvelous" preserves the sense of being remarkable or astonishing in
    a formal register suitable to the speech.'
- source_word: ἐν στρατεύμασιν πολέμου
  chosen: in the armies of war
  alternatives:
  - in war forces
  - in military campaigns
  - in armies for battle
  lexicon: LSJ
  rationale: The Greek is literally military and somewhat pleonastic. "Armies of war"
    keeps the formal flavor and avoids collapsing the phrase into a more interpretive
    rendering like "in warfare."
