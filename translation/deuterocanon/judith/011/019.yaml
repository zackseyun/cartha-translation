id: JDT.11.19
reference: Judith 11:19
source:
  edition: lxx-swete-1909
  text: καὶ ἄξω σε διὰ μέσου τῆς Ἰουδαίας ἕως τοῦ ἐλθεῖν ἀπέναντι Ἰερουσαλήμ, καὶ
    θήσω τὸν δίφρον σου ἐν μέσῳ αὐτῆς, καὶ ἄξεις αὐτοὺς ὡς πρόβατα οἷς οὐκ ἔστιν ποιμήν,
    καὶ οὐ γρύξει κύων τῇ γλώσσῃ αὐτοῦ ἀπέναντι σου· ὅτι ταῦτα ἐλαλήθη μοι κατὰ πρόγνωσίν
    μου καὶ ἀπηγγέλη μοι, καὶ ἀπεστάλην ἀναγγεῖλαί σοι.
