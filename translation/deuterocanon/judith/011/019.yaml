theological_decisions:
- issue: Meaning of πρόγνωσις in Judith's speech
  chosen_reading: Rendered as 'foreknowledge' in a non-technical sense of prior knowledge
    or advance awareness.
  alternative_readings:
  - special revelation
  - premonition
  rationale: The context is Judith's strategic speech to Holofernes, claiming she
    has advance knowledge and has been informed. The translation preserves the lexical
    form without importing later doctrinal meanings of divine foreknowledge.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
