translation:
  text: And I will lead you through the midst of Judea until you come opposite Jerusalem,
    and I will set your chariot in her midst, and you will drive them like sheep that
    have no shepherd, and not even a dog will growl with its tongue against you; for
    these things were spoken to me according to my foreknowledge, and they were reported
    to me, and I was sent to tell you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before Jerusalem' / 'facing Jerusalem' for 'opposite Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'not even a dog will growl with its tongue against you,'
      an idiom expressing complete lack of resistance.
    reason: cultural_note
  - marker: c
    text: '''Foreknowledge'' here likely means prior knowledge or advance awareness,
      not necessarily a technical theological claim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄξω
  chosen: I will lead
  alternatives:
  - I will bring
  - I will guide
  lexicon: BDAG
  rationale: Future of ἄγω. 'Lead' fits the promise of personally conducting Holofernes
    through the land better than the more generic 'bring.'
- source_word: διὰ μέσου τῆς Ἰουδαίας
  chosen: through the midst of Judea
  alternatives:
  - through Judea
  - through the middle of Judea
  lexicon: BDAG
  rationale: Retains the spatial vividness of the Greek expression while remaining
    natural English.
- source_word: ἕως τοῦ ἐλθεῖν ἀπέναντι Ἰερουσαλήμ
  chosen: until you come opposite Jerusalem
  alternatives:
  - until you come before Jerusalem
  - until you reach the front of Jerusalem
  lexicon: BDAG
  rationale: ἀπέναντι commonly means 'opposite' or 'facing.' This preserves the positional
    sense without overinterpreting as entry into the city.
- source_word: θήσω τὸν δίφρον σου
  chosen: I will set your chariot
  alternatives:
  - I will place your chariot
  - I will station your chariot-car
  lexicon: LSJ
  rationale: δίφρος can denote a chariot or seat/car. In this military context, 'chariot'
    is the clearest idiomatic rendering.
- source_word: ἐν μέσῳ αὐτῆς
  chosen: in her midst
  alternatives:
  - in the midst of it
  - in the middle of it
  lexicon: BDAG
  rationale: The pronoun refers to Jerusalem, grammatically feminine in Greek. 'Her
    midst' preserves the personified-city nuance while remaining intelligible.
- source_word: ἄξεις αὐτούς
  chosen: you will drive them
  alternatives:
  - you will lead them
  - you will bring them
  lexicon: BDAG
  rationale: Given the following sheep simile, 'drive' better captures the image of
    moving a flock before oneself, though 'lead' is possible.
- source_word: ὡς πρόβατα οἷς οὐκ ἔστιν ποιμήν
  chosen: like sheep that have no shepherd
  alternatives:
  - like sheep without a shepherd
  lexicon: BDAG
  rationale: This is a standard biblical image of leaderless vulnerability. The fuller
    wording closely reflects the Greek syntax.
- source_word: οὐ γρύξει κύων τῇ γλώσσῃ αὐτοῦ
  chosen: not even a dog will growl with its tongue
  alternatives:
  - no dog will bark with its tongue
  - not a dog will snarl
  lexicon: LSJ
  rationale: γρύζω denotes growling/grumbling rather than the ordinary verb for barking.
    The unusual phrase 'with its tongue' is kept because it is explicit in the Greek
    and heightens the idiom of complete safety.
- source_word: κατὰ πρόγνωσίν μου
  chosen: according to my foreknowledge
  alternatives:
  - in accordance with my prior knowledge
  - according to what I knew beforehand
  lexicon: BDAG
  rationale: πρόγνωσις here refers to prior knowledge or advance awareness, not necessarily
    a technical theological concept. 'Foreknowledge' is the most direct rendering,
    though context shows Judith is claiming advance information.
- source_word: ἀπηγγέλη μοι
  chosen: they were reported to me
  alternatives:
  - they were announced to me
  - I was informed of them
  lexicon: BDAG
  rationale: Passive form indicates information conveyed to Judith. 'Reported' is
    natural and preserves the indirectness.
- source_word: ἀπεστάλην ἀναγγεῖλαί σοι
  chosen: I was sent to tell you
  alternatives:
  - I was sent to report to you
  - I was sent to announce to you
  lexicon: BDAG
  rationale: ἀναγγέλλω is 'report/announce/tell.' 'Tell you' is concise and natural
    in modern English while preserving the claim of commission.
