translation:
  text: And her words pleased Holofernes and all his attendants, and they marveled
    at her wisdom and said,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤρεσαν
  chosen: pleased
  alternatives:
  - were pleasing to
  - satisfied
  lexicon: BDAG
  rationale: The aorist of ἀρέσκω here indicates that Judith's words found favor with
    Holofernes and his attendants. 'Pleased' is natural modern English and preserves
    the sense of favorable reception without over-paraphrase.
- source_word: οἱ λόγοι αὐτῆς
  chosen: her words
  alternatives:
  - what she said
  - her speech
  lexicon: BDAG
  rationale: λόγοι can mean 'words' or 'speech.' 'Her words' stays closer to the Greek
    while remaining idiomatic in English.
- source_word: ἐναντίον Ὀλοφέρνου καὶ ἐναντίον πάντων τῶν θεραπόντων αὐτοῦ
  chosen: Holofernes and all his attendants
  alternatives:
  - before Holofernes and before all his servants
  - in the presence of Holofernes and all his attendants
  lexicon: BDAG
  rationale: ἐναντίον literally means 'before/in the presence of.' In English, after
    'pleased,' the dative-like sense is better conveyed simply by naming those pleased.
    'Attendants' fits θεράποντες in a courtly/military setting better than the more
    generic 'servants,' while avoiding the bonded connotations of δοῦλος, which is
    not the word used here.
- source_word: θεραπόντων
  chosen: attendants
  alternatives:
  - servants
  - retainers
  lexicon: LSJ
  rationale: θεράπων often denotes an attendant or retainer, especially in noble or
    military contexts. 'Attendants' is readable and contextually appropriate.
- source_word: ἐθαύμασαν
  chosen: marveled
  alternatives:
  - were amazed
  - wondered
  lexicon: BDAG
  rationale: The verb expresses admiration or astonishment. 'Marveled' preserves both
    the elevated tone and the positive sense of wonder.
- source_word: ἐπὶ τῇ σοφίᾳ αὐτῆς
  chosen: at her wisdom
  alternatives:
  - because of her wisdom
  - over her wisdom
  lexicon: BDAG
  rationale: The preposition ἐπί with the dative here marks the basis of their amazement.
    'At her wisdom' is the most idiomatic English rendering.
- source_word: καὶ εἶπαν
  chosen: and said,
  alternatives:
  - and they said,
  lexicon: BDAG
  rationale: The Greek explicitly continues into direct speech in the next verse.
    Retaining 'and said,' with a trailing comma reflects the sentence continuation
    and avoids artificially closing the thought.
