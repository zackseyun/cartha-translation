translation:
  text: And it will be that, when he reports it to them and they act, they will be
    given over to you for destruction on that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as soon as he reports it to them and they do it.' The Greek ὡς ἂν with
      subjunctives can express an indefinite future condition, and ποιήσωσιν may be
      rendered more literally as 'do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσται
  chosen: it will be
  alternatives:
  - it shall be
  - this will happen
  lexicon: BDAG
  rationale: Common future of εἰμί used idiomatically to introduce a future circumstance.
    'It will be' preserves the Greek structure without becoming wooden.
- source_word: ὡς ἂν
  chosen: when
  alternatives:
  - as soon as
  - whenever
  lexicon: BDAG
  rationale: With the aorist subjunctives ἀναγγείλῃ and ποιήσωσιν, the phrase marks
    an indefinite future contingency. In this context, 'when' gives natural English
    while retaining the sense of a future event once the condition is met.
- source_word: ἀναγγείλῃ
  chosen: he reports it
  alternatives:
  - he announces it
  - he tells them
  lexicon: BDAG
  rationale: The verb means to report or announce. 'Reports it' fits the narrative
    context of conveying information to others and keeps the object implicit from
    context.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - for them
  lexicon: BDAG
  rationale: Dative indirect object; straightforwardly rendered 'to them'.
- source_word: ποιήσωσιν
  chosen: they act
  alternatives:
  - they do it
  - they carry it out
  lexicon: BDAG
  rationale: 'The verb ποιέω is broad. Because no explicit object is supplied here,
    ''they act'' best reflects the intransitive-like English sense in context: they
    respond by doing what was reported.'
- source_word: δοθήσονταί
  chosen: they will be given over
  alternatives:
  - they will be handed over
  - they will be delivered
  lexicon: BDAG
  rationale: Future passive of δίδωμι. 'Given over' preserves the passive and the
    hostile outcome implied by the following phrase εἰς ὄλεθρον.
- source_word: σοι
  chosen: to you
  alternatives:
  - into your hands
  lexicon: BDAG
  rationale: Simple dative pronoun. 'To you' is the direct rendering; 'into your hands'
    would add imagery not explicit in the Greek.
- source_word: εἰς ὄλεθρον
  chosen: for destruction
  alternatives:
  - to destruction
  - for ruin
  lexicon: BDAG
  rationale: ὄλεθρος denotes destruction or ruin. 'For destruction' reads naturally
    with 'given over' and conveys the intended result.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  chosen: on that day
  alternatives:
  - in that day
  lexicon: BDAG
  rationale: Standard temporal expression. 'On that day' is idiomatic modern English.
