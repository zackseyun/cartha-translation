id: JDT.11.15
reference: Judith 11:15
source:
  edition: lxx-swete-1909
  text: καὶ ἔσται ὡς ἂν ἀναγγείλῃ αὐτοῖς καὶ ποιήσωσιν, δοθήσονταί σοι εἰς ὄλεθρον
    ἐν τῇ ἡμέρᾳ ἐκείνῃ.
  language: Greek
  pages:
