translation:
  text: And Judith said to him, “Receive the words of your slave, and let your servant
    girl speak before you, and I will not report a lie to my lord this night.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your servant' for 'your slave' (Greek δοῦλη). The Greek term can denote
      a female servant or slave; 'slave' is used here to preserve the stronger status
      language in Judith's self-humbling speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'my master' for 'my lord' (Greek κυρίῳ μου), since the referent is a
      human superior, not God.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δέξαι
  chosen: Receive
  alternatives:
  - Accept
  - Hear
  lexicon: LSJ
  rationale: Aorist imperative of δέχομαι. 'Receive' preserves the direct request
    to take in or accept her words, without reducing it merely to auditory hearing.
- source_word: τὰ ῥήματα
  chosen: the words
  alternatives:
  - the things said
  - the message
  lexicon: LSJ
  rationale: ῥήματα commonly means spoken words or sayings. 'The words' is natural
    and sufficiently formal here.
- source_word: τῆς δούλης σου
  chosen: your slave
  alternatives:
  - your servant
  - your maidservant
  lexicon: LSJ
  rationale: δοῦλη is the feminine of δοῦλος. In keeping with project guidance, 'slave'
    is preferred where the bonded status is foregrounded in deferential court speech.
    The possessive 'your' reflects Judith's self-humbling address.
- source_word: λαλησάτω
  chosen: let ... speak
  alternatives:
  - let ... talk
  - allow ... to speak
  lexicon: LSJ
  rationale: Third-person imperative of λαλέω. 'Let ... speak' is idiomatic English
    and preserves the permissive/request nuance.
- source_word: ἡ παιδίσκη σου
  chosen: your servant girl
  alternatives:
  - your maidservant
  - your girl
  - your female servant
  lexicon: LSJ
  rationale: παιδίσκη can denote a young female servant/slave girl. Here it functions
    as another self-deprecating term in Judith's speech. 'Servant girl' preserves
    the gender and humble register while avoiding overly archaic diction.
- source_word: κατὰ πρόσωπόν σου
  chosen: before you
  alternatives:
  - in your presence
  - to your face
  lexicon: LSJ
  rationale: The idiom literally means 'according to your face' or 'before your face.'
    'Before you' is concise, natural English that preserves the sense of speaking
    in his presence.
- source_word: οὐκ ἀναγγελῶ
  chosen: I will not report
  alternatives:
  - I will not declare
  - I will not announce
  - I will not tell
  lexicon: LSJ
  rationale: Future of ἀναγγέλλω, meaning to report or announce. 'Report' fits the
    courtly setting and the direct-object construction with ψεῦδος.
- source_word: ψεῦδος
  chosen: a lie
  alternatives:
  - falsehood
  - anything false
  lexicon: LSJ
  rationale: ψεῦδος denotes falsehood or a lie. 'A lie' is the most straightforward
    and idiomatic rendering in this context.
- source_word: τῷ κυρίῳ μου
  chosen: my lord
  alternatives:
  - my master
  lexicon: LSJ
  rationale: κύριος is rendered 'Lord' by default when titular/theological, but here
    the referent is a human superior addressed with courtly deference. 'My lord' is
    the natural English equivalent in this narrative setting.
- source_word: ἐν τῇ νυκτὶ ταύτῃ
  chosen: this night
  alternatives:
  - tonight
  - in this night
  lexicon: LSJ
  rationale: '''This night'' preserves the slightly elevated narrative tone and temporal
    specificity of the Greek better than the more colloquial ''tonight.'''
