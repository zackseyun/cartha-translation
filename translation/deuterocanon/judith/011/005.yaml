id: JDT.11.5
reference: Judith 11:5
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν πρὸς αὐτὸν Ἰουδεὶθ Δέξαι τὰ ῥήματα τῆς δούλης σου, καὶ λαλησάτω
    ἡ παιδίσκη σου κατὰ πρόσωπόν σου, καὶ οὐκ ἀναγγελῶ ψεῦδος τῷ κυρίῳ μου ἐν τῇ νυκτὶ
    ταύτῃ.
