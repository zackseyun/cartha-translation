theological_decisions:
- issue: Rendering of self-designation terms δοῦλη and παιδίσκη in Judith's speech
  chosen_reading: 'Different English renderings are used: ''your slave'' for δοῦλη
    and ''your servant girl'' for παιδίσκη.'
  alternative_readings:
  - '''your servant'' and ''your maidservant'''
  - '''your slave'' and ''your slave girl'''
  rationale: The verse uses two distinct feminine self-designations. Preserving some
    distinction reflects the Greek rhetoric of humility. 'Slave' aligns with project
    guidance for δοῦλος/δοῦλη where bonded status is salient, while 'servant girl'
    for παιδίσκη keeps the youthful/feminine nuance without sounding overly harsh
    or awkward in English.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; consistency
    with documented exception where context demands variance'
- issue: Rendering of κύριος for a human addressee
  chosen_reading: my lord
  alternative_readings:
  - my master
  rationale: Because κύριος here refers to Holofernes as a human superior rather than
    to God, 'my lord' best conveys courtly address without importing divine overtones.
  doctrine_reference: 'DOCTRINE.md: κύριος default ''Lord'' with context-sensitive
    rendering for human address'
