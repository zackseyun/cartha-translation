id: JDT.11.14
reference: Judith 11:14
source:
  edition: lxx-swete-1909
  text: καὶ ἀπεστάλακεν εἰς Ἰερουσαλήμ, ὅτι καὶ ἐκεῖ κατοικοῦντες ἐποίησαν ταῦτα,
    τοὺς μετοικίσαντας αὐτοῖς τὴν ἄφεσιν παρὰ τῆς γερουσίας.
  language: Greek
  pages:
