  - 823
  confidence: high
  validation: agree
translation:
  text: And he sent word to Jerusalem that those living there also had done these
    things, granting amnesty from the council of elders to those who had joined them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forgiveness' or 'remission' for 'the release.' The Greek ἄφεσις can
      carry either legal/social or moral-religious force; here the surrounding reference
      to the council of elders favors an administrative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεστάλακεν
  chosen: sent word
  alternatives:
  - sent
  - has sent
  lexicon: LSJ
  rationale: The perfect form of ἀποστέλλω here functions narratively with present
    relevance; in idiomatic English, 'sent word' captures the implied message-bearing
    sense of sending to Jerusalem better than a bare 'sent.'
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: LSJ
  rationale: Standard directional use of εἰς with a place name; 'to Jerusalem' is
    natural English.
- source_word: κατοικοῦντες
  chosen: those living there
  alternatives:
  - the inhabitants there
  - those dwelling there
  lexicon: LSJ
  rationale: The participle denotes residents; 'those living there' is readable modern
    English while preserving the participial sense.
- source_word: ἐποίησαν ταῦτα
  chosen: had done these things
  alternatives:
  - did these things
  - have done these things
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist with demonstrative object.
    'These things' preserves the text's reference without over-specifying what actions
    are meant.
- source_word: τοὺς μετοικίσαντας αὐτοῖς
  chosen: those who had settled among them
  alternatives:
  - those who had migrated to them
  - the immigrants among them
  - those who had sojourned with them
  lexicon: LSJ
  rationale: μετοικίζω/μετοικίζομαι language concerns relocation or settlement. The
    phrase likely refers to people who had come to reside with them; 'settled among
    them' is the clearest idiomatic rendering without importing a technical legal
    category.
- source_word: τὴν ἄφεσιν
  chosen: the release
  alternatives:
  - forgiveness
  - remission
  - pardon
  lexicon: LSJ
  rationale: ἄφεσις can mean release, remission, or forgiveness. In this civic/legal
    context, 'release' best fits a grant issued by the gerousia, avoiding an overly
    theological 'forgiveness' unless the context clearly requires it.
- source_word: παρὰ τῆς γερουσίας
  chosen: from the council of elders
  alternatives:
  - from the senate
  - from the gerousia
  lexicon: LSJ
  rationale: γερουσία denotes an elder council or senate. 'Council of elders' communicates
    the institutional sense in accessible English while preserving the age-based governing
    body idea.
