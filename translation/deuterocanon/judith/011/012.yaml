theological_decisions:
- issue: Reference to divine dietary prohibitions
  chosen_reading: everything that God had commanded them by his laws not to eat
  alternative_readings:
  - all that God had forbidden them in his laws to eat
  - everything that God had prescribed in his laws that they should not eat
  rationale: The Greek explicitly grounds the prohibition in God's laws without naming
    a specific Torah passage. The translation preserves the legal-theological force
    without importing later doctrinal framing.
  doctrine_reference: Translation philosophy §§1, 5
