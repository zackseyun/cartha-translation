id: JDT.11.12
reference: Judith 11:12
source:
  edition: lxx-swete-1909
  text: ἐπεὶ γὰρ ἐξέλειπεν αὐτοὺς τὰ βρώματα καὶ ἐσπανίσθη πᾶν ὕδωρ, ἐβουλεύσαντο
    ἐπιβαλεῖν τοῖς κτήνεσιν αὐτῶν, καὶ πάντα ὅσα διεστείλατο αὐτοῖς ὁ θεὸς τοῖς νόμοις
    αὐτοῦ μὴ φαγεῖν διέγνωσαν δαπανῆσαι.
