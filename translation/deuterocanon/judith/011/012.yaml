translation:
  text: For when their food had run out and all water had become scarce, they decided
    to use their livestock, and they determined to consume everything that God had
    commanded them by his laws not to eat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to resort to their livestock.' The Greek idiom literally says 'to fall
      upon their livestock,' implying turning to the animals as food in desperation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέλειπεν
  chosen: had run out
  alternatives:
  - failed
  - was exhausted
  - came to an end
  lexicon: LSJ
  rationale: The imperfect indicates an ongoing state of depletion; 'had run out'
    gives natural English while preserving the sense that their food supply was gone.
- source_word: τὰ βρώματα
  chosen: food
  alternatives:
  - provisions
  - things to eat
  - foods
  lexicon: LSJ
  rationale: The plural refers broadly to edible provisions rather than specific dishes.
    'Food' is idiomatic and sufficiently broad.
- source_word: ἐσπανίσθη
  chosen: had become scarce
  alternatives:
  - failed
  - grew scarce
  - was lacking
  lexicon: LSJ
  rationale: This passive conveys scarcity rather than absolute disappearance. 'Had
    become scarce' preserves that nuance better than 'ran out'.
- source_word: πᾶν ὕδωρ
  chosen: all water
  alternatives:
  - every supply of water
  - water altogether
  lexicon: LSJ
  rationale: A straightforward rendering of the phrase; in English 'all water had
    become scarce' communicates a comprehensive water shortage.
- source_word: ἐβουλεύσαντο
  chosen: they decided
  alternatives:
  - they took counsel
  - they resolved
  - they planned
  lexicon: LSJ
  rationale: The verb denotes deliberation leading to a decision. 'They decided' is
    concise and natural in modern English.
- source_word: ἐπιβαλεῖν τοῖς κτήνεσιν αὐτῶν
  chosen: to fall upon their livestock
  alternatives:
  - to resort to their livestock
  - to lay hands on their cattle
  - to attack their beasts
  lexicon: LSJ
  rationale: The idiom suggests turning upon or making use of their animals for food.
    'Fall upon' preserves the force of the Greek without over-specifying slaughter.
- source_word: κτήνεσιν
  chosen: livestock
  alternatives:
  - cattle
  - beasts
  - animals
  lexicon: LSJ
  rationale: The term refers to domesticated animals/property animals. 'Livestock'
    is the clearest modern equivalent.
- source_word: διεστείλατο
  chosen: had commanded
  alternatives:
  - had ordered
  - had instructed
  - had prescribed
  lexicon: LSJ
  rationale: In context with 'by his laws,' the verb refers to divine injunction.
    'Had commanded' best reflects the authority involved.
- source_word: τοῖς νόμοις αὐτοῦ
  chosen: by his laws
  alternatives:
  - in his laws
  - through his laws
  lexicon: LSJ
  rationale: The dative is instrumental or locative in sense; 'by his laws' is natural
    and keeps the legal framework explicit.
- source_word: μὴ φαγεῖν
  chosen: not to eat
  alternatives:
  - to abstain from eating
  - not to consume
  lexicon: LSJ
  rationale: This infinitive directly states the prohibition. 'Not to eat' is the
    plainest equivalent.
- source_word: διέγνωσαν δαπανῆσαι
  chosen: they determined to consume
  alternatives:
  - they resolved to use up
  - they decided to spend
  - they concluded to devour
  lexicon: LSJ
  rationale: δαπανᾶν can mean to expend or consume; in the context of forbidden foods,
    'consume' makes the intended action explicit in idiomatic English.
