  confidence: high
  validation: agree
translation:
  text: And now, so that my lord may not become an outcast and ineffective, death
    will fall upon them, and sin has overtaken them, by which they provoke their God
    whenever they commit an offense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast out and ineffective.' The Greek terms can emphasize being expelled
      and unable to accomplish anything.
    reason: lexical_alternative
  - marker: b
    text: Literally 'death will fall upon their face.' The expression is rendered
      idiomatically in English as 'death will fall upon them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'whenever they commit impropriety/folly.' The Greek noun can denote conduct
      that is improper, absurd, or morally outrageous.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκβολος
  chosen: an outcast
  alternatives:
  - cast out
  - banished
  - driven out
  lexicon: LSJ
  rationale: The adjective literally carries the sense of being thrown out or expelled.
    'Outcast' gives natural English while preserving the idea of exclusion or being
    cast off, fitting the political/military context better than a more wooden 'cast
    out.'
- source_word: ἄπρακτος
  chosen: unsuccessful
  alternatives:
  - ineffective
  - unable to act
  - without result
  - helpless
  lexicon: LSJ
  rationale: 'The term can denote being unable to accomplish anything or being ineffective.
    ''Unsuccessful'' captures the practical result in context: Holofernes should not
    end up thwarted in his campaign. ''Helpless'' would overstate incapacity, and
    ''inactive'' would miss the outcome-oriented sense.'
- source_word: ἐπιπεσεῖται θάνατος ἐπὶ πρόσωπον αὐτῶν
  chosen: death will fall upon them
  alternatives:
  - death will come upon them
  - death will descend on their faces
  lexicon: LSJ
  rationale: The idiom combines a future of 'fall upon' with 'death' and a phrase
    literally involving 'upon their face/presence.' In English, 'death will fall upon
    them' preserves the force of sudden judgment without awkward literalism. A more
    literal 'upon their faces' is not idiomatic here.
- source_word: κατέλαβε
  chosen: has overtaken
  alternatives:
  - has seized
  - has caught up with
  - has taken hold of
  lexicon: LSJ
  rationale: Although formally aorist, in this discourse it describes sin as having
    already come upon them in a way relevant to the present argument. 'Has overtaken'
    conveys both seizure and the consequential state now in effect.
- source_word: ἁμάρτημα
  chosen: sin
  alternatives:
  - offense
  - transgression
  lexicon: LSJ
  rationale: The ordinary sense 'sin' is theologically and lexically appropriate.
    'Offense' would weaken the Godward dimension explicit in the next clause.
- source_word: παροργιοῦσιν
  chosen: provoke
  alternatives:
  - anger
  - provoke to anger
  lexicon: LSJ
  rationale: The verb means to provoke, especially to anger. Because the object is
    'their God,' English readers will naturally hear the implied anger; 'provoke'
    is concise and readable, while 'provoke to anger' is possible but heavier.
- source_word: ἀτοπίαν
  chosen: an outrage
  alternatives:
  - a folly
  - an improper act
  - a shameful deed
  - wickedness
  lexicon: LSJ
  rationale: The noun can denote impropriety, absurdity, or a shocking act. In this
    context of conduct that provokes God, 'an outrage' communicates moral offensiveness
    more clearly than the weaker 'folly' or the vaguer 'improper act.'
- source_word: ὁ κύριός μου
  chosen: my lord
  alternatives:
  - my master
  lexicon: LSJ
  rationale: This is a respectful address to Holofernes, not a divine title. Per project
    philosophy, κύριος is normally 'Lord' as a title, but here the possessive and
    courtly setting favor the lower-case social sense 'my lord.'
