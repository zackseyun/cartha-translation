id: JDT.11.11
reference: Judith 11:11
source:
  edition: lxx-swete-1909
  text: καὶ νῦν ἵνα μὴ γένηται ὁ κύριός μου ἔκβολος καὶ ἄπρακτος, ἐπιπεσεῖται θάνατος
    ἐπὶ πρόσωπον αὐτῶν, καὶ κατέλαβε αὐτοὺς ἁμάρτημα ἐν ᾧ παροργιοῦσιν τὸν θεὸν αὐτῶν,
    ἐπηνίκα ἂν ποιήσωσιν ἀτοπίαν.
  language: Greek
  pages:
  - 798
  - 799
  - 802
