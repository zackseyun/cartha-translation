theological_decisions:
- issue: Whether ἁμάρτημα should be rendered in a morally/theologically weighty way
    or softened to a general 'offense'
  chosen_reading: sin
  alternative_readings:
  - offense
  - transgression
  rationale: Because the clause explicitly says they thereby provoke 'their God,'
    the term should retain its religious-moral force. 'Sin' best preserves that dimension
    without interpretive expansion.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms; preserve theological
    weight without paraphrase'
- issue: How to render κύριος in a non-divine address
  chosen_reading: my lord
  alternative_readings:
  - my master
  rationale: The default rendering for κύριος is 'Lord,' but context determines whether
    the term is divine or social. Here Judith addresses Holofernes deferentially,
    so 'my lord' accurately reflects a human superior without importing divine overtones.
  doctrine_reference: 'DOCTRINE.md contested terms table: κύριος → Lord / context-sensitive
    title translation'
