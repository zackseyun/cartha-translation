id: JDT.11.7
reference: Judith 11:7
source:
  edition: lxx-swete-1909
  text: ζῇ γὰρ βασιλεὺς Ναβουχοδονόσορ πάσης τῆς γῆς καὶ ζῇ τὸ κράτος αὐτοῦ, ὃς ἀπέστειλέν
    σε εἰς κατόρθωσιν πάσης ψυχῆς, ὅτι οὐ μόνον ἄνθρωποι διὰ σὲ δουλεύσουσιν αὐτῷ,
    ἀλλὰ καὶ τὰ θηρία τοῦ ἀγροῦ καὶ τὰ κτήνη καὶ τὰ πετεινὰ τοῦ οὐρανοῦ διὰ τῆς ἰσχύος
    σου ζήσονται Ναβουχοδονόσορ καὶ πάντα τὸν οἶκον αὐτοῦ.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 818
  - 819
  - 820
  - 821
  - 822
  - 823
  confidence: high
  validation: agree
translation:
  text: For King Nebuchadnezzar, of all the earth, lives, and his dominion lives—he
    who sent you for the prosperity of every living being. For not only will men serve
    him through you, but also the wild animals and the livestock and the birds of
    the sky will live for Nebuchadnezzar and all his house through your strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the accomplishment/prosperity of every person.' The Greek phrase
      'every living soul' likely means every life or living being, not specifically
      the immaterial soul.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional wording: ''the beasts of the field ... the birds of heaven.'''
    reason: lexical_alternative
  - marker: c
    text: The final clause is rhetorically compressed in Greek and may also be understood,
      'will live for Nebuchadnezzar and all his house by your strength.'
    reason: alternative_reading
lexical_decisions:
- source_word: ζῇ
  chosen: lives
  alternatives:
  - is alive
  - lives on
  lexicon: LSJ
  rationale: The repeated oath-like formula ζῇ ... καὶ ζῇ is most naturally rendered
    with the present 'lives,' preserving the emphatic courtly declaration rather than
    smoothing it into a mere existential statement.
- source_word: κράτος
  chosen: dominion
  alternatives:
  - power
  - might
  - rule
  lexicon: LSJ
  rationale: In this royal context κράτος refers not merely to abstract strength but
    to effective ruling power. 'Dominion' captures political sovereignty better than
    the more generic 'power' or 'might.'
- source_word: κατόρθωσιν
  chosen: success
  alternatives:
  - accomplishment
  - prosperity
  - setting right
  lexicon: LSJ
  rationale: The phrase εἰς κατόρθωσιν πάσης ψυχῆς indicates being sent for the benefit
    or successful outcome of every life/person. 'Success' is concise and idiomatic
    while still reflecting the noun's sense of favorable accomplishment.
- source_word: πάσης ψυχῆς
  chosen: every living soul
  alternatives:
  - every person
  - every life
  lexicon: LSJ
  rationale: ψυχή here likely means living being/life rather than the later English
    theological sense of an immaterial soul. 'Every living soul' preserves the Greek
    wording while signaling breadth beyond a narrowly spiritual meaning.
- source_word: ἄνθρωποι
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: LSJ
  rationale: The contrast with animals, cattle, and birds favors a human/animal distinction.
    'Men' is gender-accurate in the representative sense and aligns with project policy,
    though 'people' is possible.
- source_word: δουλεύσουσιν
  chosen: serve
  alternatives:
  - be slaves to
  - be subject to
  lexicon: LSJ
  rationale: Although δουλεύω can denote slavery, in this imperial-political setting
    the focus is rendered adequately by 'serve' as allegiance/service to a ruler rather
    than highlighting chattel status.
- source_word: θηρία τοῦ ἀγροῦ
  chosen: the wild animals
  alternatives:
  - the beasts of the field
  lexicon: LSJ
  rationale: This phrase denotes untamed land animals. 'Wild animals' is clearer in
    modern English, while the traditional 'beasts of the field' remains a viable alternative.
- source_word: κτήνη
  chosen: the cattle
  alternatives:
  - livestock
  - domestic animals
  lexicon: LSJ
  rationale: κτήνη refers to domesticated herd animals. 'Cattle' is a natural English
    rendering here, though broader 'livestock' is possible.
- source_word: πετεινὰ τοῦ οὐρανοῦ
  chosen: the birds of the sky
  alternatives:
  - the birds of heaven
  lexicon: LSJ
  rationale: A standard biblical expression. 'Sky' is more natural contemporary English
    while preserving the vertical imagery of οὐρανός in this idiom.
- source_word: διὰ τῆς ἰσχύος σου
  chosen: under your strength
  alternatives:
  - by your strength
  - through your might
  lexicon: LSJ
  rationale: διά with the genitive commonly means 'through/by means of,' but because
    the following ζήσονται is awkward in English if rendered too literally, 'under
    your strength' conveys dependence on Holofernes' power while retaining the causal/instrumental
    force.
- source_word: ζήσονται
  chosen: will live
  alternatives:
  - will survive
  - will thrive
  lexicon: LSJ
  rationale: The future of ζάω should be kept straightforward. The hyperbolic claim
    is that even animals will owe their life to his power; 'will live' preserves that
    rhetoric without overinterpreting it.
- source_word: πάντα τὸν οἶκον αὐτοῦ
  chosen: all his house
  alternatives:
  - his whole household
  - all his dynasty
  lexicon: LSJ
  rationale: '''House'' can include household or ruling house. In this royal setting
    the phrase likely includes the king''s entire establishment; ''all his house''
    preserves the biblical breadth and ambiguity.'
