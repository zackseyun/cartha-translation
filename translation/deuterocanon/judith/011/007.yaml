theological_decisions:
- issue: Royal oath-like acclamation of Nebuchadnezzar
  chosen_reading: Retained the exalted formula 'King Nebuchadnezzar, ruler of all
    the earth, lives, and his dominion lives' without softening its hyperbole.
  alternative_readings:
  - Paraphrase as a simple courtly compliment without the repeated 'lives'
  rationale: The verse presents Judith's strategic speech in the narrative, and the
    translation should preserve the rhetoric without endorsing its theology. The text
    itself attributes universal dominion to Nebuchadnezzar in this speech context.
  doctrine_reference: Preserve theological tension rather than resolve it.
