id: JDT.11.23
reference: Judith 11:23
source:
  edition: lxx-swete-1909
  text: καὶ νῦν ἀστεία εἶ σὺ ἐν τῷ εἴδει σου καὶ ἀγαθὴ ἐν τοῖς λόγοις σου· ὅτι ἐὰν
    ποιήσῃς καθὰ ἐλάλησας, ὁ θεός σου ἔσται μού θεός, καὶ σὺ ἐν οἴκῳ Ναβουχοδονόσορ
    βασιλέως καθιῇ, καὶ ἔσῃ ὀνομαστὴ παρὰ πᾶσαν τὴν γῆν.
  language: Greek
