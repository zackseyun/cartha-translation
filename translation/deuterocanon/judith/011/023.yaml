translation:
  text: And now you are charming in your appearance and good in your words. For if
    you do as you have spoken, your god will be my god, and you will dwell in the
    house of King Nabuchodonosor, and you will be renowned throughout all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your God will be my God.' Greek capitalization does not decide the
      matter; the lowercase rendering reflects the speaker's immediate pagan perspective
      in context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀστεία
  chosen: charming
  alternatives:
  - clever
  - graceful
  - attractive
  lexicon: LSJ
  rationale: The adjective can denote urbanity, wit, or pleasing refinement. In the
    immediate phrase ἐν τῷ εἴδει σου ('in your appearance'), the sense is outward
    attractiveness or charm rather than intellectual cleverness, so 'charming' captures
    the commendatory tone without sounding overly romantic.
- source_word: εἶδος
  chosen: appearance
  alternatives:
  - form
  - look
  lexicon: LSJ
  rationale: Here it refers to visible form or outward appearance. 'Appearance' is
    natural modern English and fits the compliment being made.
- source_word: ἀγαθή
  chosen: good
  alternatives:
  - gracious
  - excellent
  lexicon: LSJ
  rationale: In ἀγαθὴ ἐν τοῖς λόγοις σου, the speaker praises the quality of Judith's
    speech. 'Good in your words' is slightly literal but still readable, preserving
    the parallel structure with the previous clause.
- source_word: λόγοις
  chosen: words
  alternatives:
  - speech
  - what you say
  lexicon: LSJ
  rationale: A straightforward rendering that preserves the plural and the concrete
    expression of the Greek. More idiomatic options were possible, but 'words' keeps
    the source texture.
- source_word: ἐὰν ποιήσῃς καθὰ ἐλάλησας
  chosen: if you do as you have spoken
  alternatives:
  - if you do as you said
  - if you carry out what you have said
  lexicon: LSJ
  rationale: This conditional clause links action to prior speech. The chosen rendering
    stays close to the Greek while remaining intelligible.
- source_word: ὁ θεός σου ἔσται μού θεός
  chosen: your god will be my god
  alternatives:
  - your God will be my God
  lexicon: LSJ
  rationale: The Greek has θεός without special marking. Because the speaker is a
    pagan Assyrian general speaking rhetorically, lowercase 'god' best reflects the
    immediate discourse without importing confessional capitalization. The wording
    intentionally echoes covenantal language known elsewhere, but here it functions
    as Holofernes' pledge.
- source_word: καθιῇ
  chosen: you will dwell
  alternatives:
  - you will sit
  - you will reside
  lexicon: LSJ
  rationale: Although the verb is literally 'sit,' in context with ἐν οἴκῳ it idiomatically
    conveys settled residence or position within the royal household. 'Dwell' communicates
    that sense better than a wooden 'sit'.
- source_word: οἶκος
  chosen: house
  alternatives:
  - household
  - court
  lexicon: LSJ
  rationale: The Greek literally says 'house.' In royal contexts it can imply household
    or court, but 'house' preserves the source wording while still being understandable
    in English.
- source_word: ὀνομαστή
  chosen: renowned
  alternatives:
  - famous
  - well-known
  - celebrated
  lexicon: LSJ
  rationale: The adjective means named or notable. 'Renowned' fits the elevated tone
    and the scope indicated by the following phrase.
- source_word: παρὰ πᾶσαν τὴν γῆν
  chosen: throughout all the earth
  alternatives:
  - in all the land
  - before all the earth
  lexicon: LSJ
  rationale: The phrase expresses broad extent. 'Throughout all the earth' is idiomatic
    and preserves the universalizing rhetoric of the speaker.
