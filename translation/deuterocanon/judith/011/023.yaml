theological_decisions:
- issue: Capitalization of θεός in Holofernes' statement
  chosen_reading: your god will be my god
  alternative_readings:
  - your God will be my God
  rationale: The Greek script does not distinguish capitalization. Given the speaker
    and context, the line is best rendered with lowercase to reflect his rhetorical
    appropriation rather than a settled confession of Israel's God. This avoids importing
    later English theological convention into the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
