theological_decisions:
- issue: Rendering of κληρονομία in a narrative land-return context
  chosen_reading: inheritance
  alternative_readings:
  - possession
  - allotted land
  rationale: Although not a major doctrinal crux here, 'inheritance' preserves the
    biblical resonance of allotted familial land and avoids flattening the term to
    mere real estate.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Rendering of ἔνδοξος for Judith's status
  chosen_reading: renowned
  alternative_readings:
  - glorious
  - honored
  rationale: The text speaks of Judith's honored reputation in the land, not necessarily
    a theological attribution of glory. 'Renowned' preserves the public-honor sense
    without overstating it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
