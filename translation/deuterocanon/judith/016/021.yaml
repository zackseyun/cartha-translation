translation:
  text: After these days, each one returned to his own inheritance, and Judith went
    away to Bethulia and remained on her own property, and in her time she became
    renowned throughout all the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his own allotted land' for 'to his own inheritance'; the Greek κληρονομία
      can denote an inherited portion or possession.
    reason: lexical_alternative
  - marker: b
    text: Or 'on her estate' for 'on her own property'; the Greek refers to Judith's
      own possessions or holding.
    reason: lexical_alternative
  - marker: c
    text: Or 'became honored' / 'became glorious' for 'became renowned'; the Greek
      emphasizes the honor attached to her name.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τὰς ἡμέρας ταύτας
  chosen: After these days
  alternatives:
  - After these things
  - After those days
  lexicon: LSJ
  rationale: A temporal transition is in view. 'After these days' stays close to the
    Greek while reading naturally in English; 'after these things' is possible but
    less precise to ἡμέρας.
- source_word: ἀνέζευξεν
  chosen: returned
  alternatives:
  - departed
  - broke camp and went back
  lexicon: LSJ
  rationale: The verb can suggest breaking up camp or setting out, but in this context
    with εἰς τὴν κληρονομίαν αὐτοῦ it denotes people going back to their allotted
    homes/lands. 'Returned' captures the motion and destination without over-literal
    awkwardness.
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each
  - everyone
  lexicon: LSJ
  rationale: '''Each one'' preserves the distributive force clearly. It also matches
    the singular possessive that follows.'
- source_word: εἰς τὴν κληρονομίαν αὐτοῦ
  chosen: to his own inheritance
  alternatives:
  - to his own possession
  - to his own allotted land
  - to his own home territory
  lexicon: LSJ
  rationale: κληρονομία commonly denotes an inherited portion or allotment. 'Inheritance'
    preserves that sense and echoes biblical land-allotment language better than the
    flatter 'property' or interpretive 'home.'
- source_word: ἀπῆλθεν εἰς Βαιτυλουὰ
  chosen: went away to Bethulia
  alternatives:
  - went to Bethulia
  - departed to Bethulia
  lexicon: LSJ
  rationale: ἀπῆλθεν marks departure. 'Went away to' reflects that nuance while remaining
    idiomatic. The place name is transliterated as a proper name.
- source_word: κατέμεινεν
  chosen: remained
  alternatives:
  - stayed
  - settled
  lexicon: LSJ
  rationale: The verb indicates continued residence. 'Remained' is slightly more formal
    and fits the narrative register.
- source_word: ἐπὶ τῆς ὑπάρξεως αὐτῆς
  chosen: on her own property
  alternatives:
  - on her estate
  - among her possessions
  - at her own holding
  lexicon: LSJ
  rationale: The phrase refers to Judith's own possessions/property. 'On her own property'
    is clear modern English and avoids the potentially aristocratic overtones of 'estate,'
    though that is a viable alternative.
- source_word: κατὰ τὸν καιρὸν αὐτῆς
  chosen: in her time
  alternatives:
  - during her lifetime
  - as her days went on
  lexicon: LSJ
  rationale: The phrase most naturally means within the period of her life or generation.
    'In her time' is concise and faithful, while allowing the following predicate
    to describe her reputation during her lifetime.
- source_word: ἔνδοξος
  chosen: renowned
  alternatives:
  - glorious
  - honored
  - famous
  lexicon: LSJ
  rationale: ἔνδοξος can mean glorious or held in honor. Here it describes public
    reputation across the land, so 'renowned' best conveys recognized honor without
    implying intrinsic glory in a theological sense.
- source_word: ἐν πάσῃ τῇ γῇ
  chosen: throughout all the land
  alternatives:
  - in all the land
  - throughout the whole country
  lexicon: LSJ
  rationale: γῇ here refers to the land/country rather than the earth. 'Throughout
    all the land' preserves the broad geographic scope and reads naturally.
