translation:
  text: And many desired her, but no man knew her all the days of her life, from the
    day when Manasseh her husband died and was added to his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'no man had relations with her.' The Greek says literally,
      'no man knew her,' using a sexual euphemism.
    reason: lexical_alternative
  - marker: b
    text: Or 'was gathered to his people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεθύμησαν
  chosen: desired
  alternatives:
  - lusted after
  - coveted
  lexicon: BDAG
  rationale: The verb denotes strong desire. In this context of men wanting Judith
    as a wife or sexually, 'desired' preserves the breadth without over-specifying
    crude lust or material coveting.
- source_word: οὐκ ἔγνω ἀνὴρ αὐτήν
  chosen: no man knew her
  alternatives:
  - no man had relations with her
  - no man lay with her
  lexicon: BDAG
  rationale: γινώσκω with a woman can function as a sexual euphemism. Retaining 'knew
    her' preserves the idiomatic and literary force while remaining intelligible in
    biblical context; the sexual sense is clear from usage and context.
- source_word: ἀνήρ
  chosen: man
  alternatives:
  - husband
  - male
  lexicon: BDAG
  rationale: 'Here the indefinite singular after οὐκ ἔγνω is generic: ''no man.''
    ''Husband'' is not suitable because the statement concerns any subsequent male
    partner after her husband''s death.'
- source_word: πάσας τὰς ἡμέρας τῆς ζωῆς αὐτῆς
  chosen: all the days of her life
  alternatives:
  - throughout her life
  - for the rest of her life
  lexicon: BDAG
  rationale: This is a standard idiom best rendered fairly literally. It preserves
    the solemn cadence of the Greek.
- source_word: ἀφʼ ἧς ἡμέρας
  chosen: from the day when
  alternatives:
  - since the day when
  - from the time when
  lexicon: BDAG
  rationale: The phrase marks the starting point of her widowhood. 'From the day when'
    is a natural and close rendering.
- source_word: προσετέθη πρὸς τὸν λαὸν αὐτοῦ
  chosen: was added to his people
  alternatives:
  - was gathered to his people
  - joined his people
  lexicon: BDAG
  rationale: This is a traditional biblical idiom for death. 'Was added to his people'
    closely follows the Greek wording; 'was gathered to his people' is a familiar
    alternative but less literal to προσετέθη.
- source_word: Μανασσῆς
  chosen: Manasseh
  alternatives:
  - Manasses
  rationale: Standard English transliteration of the name.
