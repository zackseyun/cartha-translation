  text: καὶ πολλοὶ ἐπεθύμησαν αὐτήν, καὶ οὐκ ἔγνω ἀνὴρ αὐτὴν πάσας τὰς ἡμέρας τῆς
    ζωῆς αὐτῆς, ἀφʼ ἧς ἡμέρας ἀπέθανεν Μανασσῆς ὁ ἀνὴρ αὐτῆς καὶ προσετέθη πρὸς τὸν
