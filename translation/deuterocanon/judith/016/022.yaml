theological_decisions:
- issue: Sexual euphemism in οὐκ ἔγνω ἀνὴρ αὐτήν
  chosen_reading: Retain the euphemistic expression 'no man knew her' in the main
    text.
  alternative_readings:
  - no man had relations with her
  - no man lay with her
  rationale: The Greek uses a conventional euphemism rather than an explicit sexual
    verb. Preserving the euphemism respects the source's register and avoids paraphrase,
    while the meaning remains accessible in context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; never paraphrase
    beyond what the source text warrants.'
- issue: Funerary idiom πρὸς τὸν λαὸν αὐτοῦ
  chosen_reading: Render literally as 'was added to his people.'
  alternative_readings:
  - was gathered to his people
  rationale: The phrase is idiomatic but transparent enough in English and preserves
    biblical resonance without importing extra doctrinal claims about the afterlife.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
