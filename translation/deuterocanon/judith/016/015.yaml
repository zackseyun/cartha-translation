id: JDT.16.15
reference: Judith 16:15
source:
  edition: lxx-swete-1909
  text: ὄρη γὰρ ἐκ θεμελίων σὺν ὕδασιν σαλευθήσεται, πέτραι δʼ ἀπὸ προσώπου σου ὡς
    κηρὸς τακήσονται· ἔτι δὲ τοῖς φοβουμένοις σε, σὺ εὐιλατεύεις αὐτοῖς.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 828
  - 829
  - 830
  - 831
  confidence: high
  validation: major_mismatch
translation:
  text: For mountains will be shaken from their foundations with the waters, and rocks
    will melt like wax before your face; yet to those who fear you, you are gracious.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “at your presence.” The Greek reads literally “before
      your face.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄρη
  chosen: mountains
  alternatives:
  - hills
  lexicon: LSJ
  rationale: The ordinary sense is physical mountains. 'Mountains' preserves the cosmic
    imagery and matches the plural concrete noun.
- source_word: ἐκ θεμελίων
  chosen: from their foundations
  alternatives:
  - from the foundations
  - at the foundations
  lexicon: LSJ
  rationale: The phrase expresses upheaval from the very base. Supplying 'their' in
    English makes the relation idiomatic without adding new content.
- source_word: σὺν ὕδασιν
  chosen: along with the waters
  alternatives:
  - with waters
  - together with the waters
  lexicon: LSJ
  rationale: σύν marks accompaniment. The article is not explicit in Greek, but 'the
    waters' is natural English for elemental waters in poetic context.
- source_word: σαλευθήσεται
  chosen: will be shaken
  alternatives:
  - will be moved
  - will be shaken loose
  lexicon: LSJ
  rationale: Future passive of σαλεύω commonly denotes being shaken or set in motion.
    'Will be shaken' preserves the vivid passive force.
- source_word: πέτραι
  chosen: rocks
  alternatives:
  - crags
  - stones
  lexicon: LSJ
  rationale: In parallel with mountains, the sense is large rocky masses, best rendered
    'rocks' rather than smaller 'stones'.
- source_word: ἀπὸ προσώπου σου
  chosen: before your face
  alternatives:
  - from before you
  - before you
  - at your presence
  lexicon: LSJ
  rationale: Literally 'from your face/presence.' 'Before your face' keeps the concrete
    anthropomorphic wording of the Greek; 'at your presence' is a viable dynamic alternative
    but less transparent.
- source_word: ὡς κηρὸς
  chosen: like wax
  alternatives:
  - as wax
  lexicon: LSJ
  rationale: Standard simile; 'like wax' is clear modern English.
- source_word: τακήσονται
  chosen: will melt
  alternatives:
  - will dissolve
  lexicon: LSJ
  rationale: The verb denotes melting/liquefying. 'Will melt' is the natural English
    equivalent and preserves the poetic image.
- source_word: ἔτι δὲ
  chosen: Yet
  alternatives:
  - But still
  - Moreover
  lexicon: LSJ
  rationale: The phrase marks a contrastive turn from cosmic terror to divine favor.
    'Yet' captures that shift succinctly.
- source_word: τοῖς φοβουμένοις σε
  chosen: to those who fear you
  alternatives:
  - for those who fear you
  - to the ones fearing you
  lexicon: LSJ
  rationale: A substantival participle referring to reverent worshipers. 'Fear' should
    be retained rather than softened to 'revere,' since the biblical idiom includes
    both awe and reverence.
- source_word: εὐιλατεύεις
  chosen: you are gracious to them
  alternatives:
  - you show mercy to them
  - you are well-disposed toward them
  - you are propitious to them
  lexicon: LSJ
  rationale: The rare verb conveys favorable, merciful disposition. 'You are gracious
    to them' is accessible modern English and fits the dative αὐτοῖς. 'Propitious'
    is too technical; 'show mercy' is possible but slightly narrower.
