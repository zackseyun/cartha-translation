theological_decisions:
- issue: Rendering of τοῖς φοβουμένοις σε
  chosen_reading: those who fear you
  alternative_readings:
  - those who revere you
  rationale: The phrase is standard biblical language for reverent worship. Retaining
    'fear' preserves the theological texture of awe before God rather than resolving
    it into mere respect.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Rendering of ἀπὸ προσώπου σου
  chosen_reading: before your face
  alternative_readings:
  - at your presence
  rationale: The text uses anthropomorphic language for divine presence. The main
    text preserves that concreteness rather than smoothing it away; a more idiomatic
    alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
