  - 831
  confidence: high
  validation: major_mismatch
translation:
  text: And the house of Israel mourned for her seven days. And before she died, she
    divided her possessions among all who were nearest of kin to Manasseh her husband
    and to those nearest of kin of her family.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to all her closest relatives of Manasseh her husband, and to the closest
      relatives of her own family.' The Greek phrase with 'nearest' is somewhat compressed,
      and the exact grouping of the relatives may be expressed slightly differently
      in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπένθησεν
  chosen: mourned
  alternatives:
  - lamented
  - grieved
  lexicon: BDAG
  rationale: The verb denotes mourning for the dead. 'Mourned' is natural modern English
    and fits the funeral context better than the more performative 'lamented' or the
    broader 'grieved'.
- source_word: οἶκος Ἰσραήλ
  chosen: the house of Israel
  alternatives:
  - Israel
  - the people of Israel
  lexicon: LEH
  rationale: A formally transparent rendering preserves the collective idiom of the
    Greek and biblical style. It refers to the people as a whole, not merely a building
    or dynasty in a narrow sense.
- source_word: ἡμέρας ἑπτά
  chosen: seven days
  alternatives:
  - for seven days
  lexicon: LEH
  rationale: Rendered idiomatically with the governing verb as 'mourned for her seven
    days.' This preserves the duration without awkward literalism.
- source_word: διεῖλεν
  chosen: divided
  alternatives:
  - distributed
  - apportioned
  lexicon: BDAG
  rationale: The verb means to divide or distribute. 'Divided' stays close to the
    Greek while still making sense in the context of estate distribution.
- source_word: τὰ ὑπάρχοντα αὐτῆς
  chosen: her possessions
  alternatives:
  - her property
  - what belonged to her
  lexicon: BDAG
  rationale: This phrase commonly refers to one's belongings or property. 'Her possessions'
    is clear, natural, and sufficiently broad.
- source_word: πρὸ τοῦ ἀποθανεῖν αὐτήν
  chosen: before she died
  alternatives:
  - before her death
  - before dying
  lexicon: BDAG
  rationale: The articular infinitive with πρό expresses prior time. 'Before she died'
    is the clearest idiomatic English rendering.
- source_word: πᾶσι τοῖς ἔγγιστα
  chosen: among all who were nearest of kin
  alternatives:
  - to all her closest relatives
  - among all those nearest
  lexicon: LEH
  rationale: The superlative adverb functions substantivally for those nearest in
    relationship. 'Nearest of kin' captures the inheritance context more precisely
    than the vaguer 'closest relatives'.
- source_word: Μανασσῆ τοῦ ἀνδρὸς αὐτῆς
  chosen: Manasseh her husband
  alternatives:
  - her husband Manasseh
  lexicon: LEH
  rationale: The genitive apposition identifies Manasseh as her husband. The chosen
    order reads smoothly while preserving the relationship.
- source_word: τοῦ γένους αὐτῆς
  chosen: her family
  alternatives:
  - her kin
  - her clan
  lexicon: LEH
  rationale: γένος can denote family, kin-group, or lineage. 'Her family' is the most
    accessible English here, while the preceding 'nearest of kin' already conveys
    the inheritance-related closeness.
