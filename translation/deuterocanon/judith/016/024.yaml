id: JDT.16.24
reference: Judith 16:24
source:
  edition: lxx-swete-1909
  text: καὶ ἐπένθησεν αὐτὴν οἶκος Ἰσραὴλ ἡμέρας ἑπτά. καὶ διεῖλεν τὰ ὑπάρχοντα αὐτῆς
    πρὸ τοῦ ἀποθανεῖν αὐτὴν πᾶσι τοῖς ἔγγιστα Μανασσῆ τοῦ ἀνδρὸς αὐτῆς καὶ τοῖς ἔγγιστα
    τοῦ γένους αὐτῆς.
  language: Greek
  pages:
