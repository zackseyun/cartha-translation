theological_decisions:
- issue: Referent of the final passive verb ἀνετράπησαν
  chosen_reading: The same subject as the immediately preceding verbs is retained
    in translation without interpretive expansion.
  alternative_readings:
  - the lowly/weak were overthrown
  - the enemies were overthrown implicitly
  rationale: The Greek sequence is syntactically compressed and, in isolation, the
    final passive could be read with the same explicit subject ('my lowly ones / my
    weak ones') or as shifting by implication to their opponents. Because the source
    witness is marked with major mismatch and no alternate Greek wording is supplied
    here, the translation stays close to the extant Greek wording and does not resolve
    the ambiguity by adding 'their enemies.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
