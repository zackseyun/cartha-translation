translation:
  text: Then my lowly ones shouted, and my weak ones were afraid and panicked; they
    raised their voice, and they were overthrown.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'raised a war-cry' for 'shouted'; the Greek verb can denote a loud cry
      with martial force in context.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause, ''and they were overthrown,'' is ambiguous in this Greek
      wording: it may continue referring to Judith''s ''lowly'' and ''weak'' ones,
      or it may imply their opponents were overthrown.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἠλάλαξαν
  chosen: shouted
  alternatives:
  - cried out
  - raised a war-cry
  lexicon: LSJ
  rationale: The verb denotes a loud cry or shout. 'Shouted' preserves the force without
    over-specifying a military nuance, though the context may suggest a battle cry.
- source_word: οἱ ταπεινοί μου
  chosen: my lowly ones
  alternatives:
  - my humble ones
  - my oppressed ones
  lexicon: LSJ
  rationale: ταπεινοί can denote those who are lowly, humble, or socially brought
    low. 'My lowly ones' keeps the broad sense and reflects the possessive μου without
    importing a narrower moral reading.
- source_word: οἱ ἀσθενοῦντές μου
  chosen: my weak ones
  alternatives:
  - my feeble ones
  - those who were weak among me
  lexicon: LSJ
  rationale: ἀσθενέω here functions substantivally for those who are weak or feeble.
    'My weak ones' is idiomatic and preserves the contrast with stronger enemies without
    forcing a medical sense.
- source_word: ἐφοβήθησαν
  chosen: were afraid
  alternatives:
  - feared
  - became afraid
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist passive/deponent. 'Were afraid'
    is natural English and preserves the emotional response.
- source_word: ἐπτοήθησαν
  chosen: panicked
  alternatives:
  - were terrified
  - were thrown into confusion
  lexicon: LSJ
  rationale: The verb conveys being startled, terrified, or thrown into alarm. 'Panicked'
    captures the heightened disturbance beyond simple fear and preserves the progression
    from ἐφοβήθησαν.
- source_word: ὕψωσαν τὴν φωνὴν αὐτῶν
  chosen: they raised their voice
  alternatives:
  - they lifted up their voice
  - they raised their voices
  lexicon: LSJ
  rationale: This is a common idiom for vocal outcry. Singular 'voice' follows the
    Greek idiom more closely while remaining intelligible in English.
- source_word: ἀνετράπησαν
  chosen: they were overthrown
  alternatives:
  - they were thrown down
  - they were routed
  lexicon: LSJ
  rationale: The verb can mean to overturn, overthrow, or throw into ruin/confusion.
    'They were overthrown' preserves the passive result and leaves open whether the
    defeat is military or more generally catastrophic.
