theological_decisions:
- issue: Rendering κύριος in direct address to God
  chosen_reading: Lord
  alternative_readings:
  - O Lord
  rationale: The verse addresses God directly with Κύριε. Following the project's
    default for κύριος, 'Lord' is used. The vocative particle 'O' is stylistic rather
    than lexically required and is omitted for readable modern English.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
