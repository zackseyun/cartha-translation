id: JDT.16.13
reference: Judith 16:13
source:
  edition: lxx-swete-1909
  text: ὑμνήσω τῷ θεῷ μου ὕμνον καινόν. Κύριε, μέγας εἶ καὶ ἔνδοξος, θαυμαστὸς ἐν
    ἰσχύι, ἀνυπέρβλητος.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 828
  - 829
  - 830
  - 831
  confidence: high
  validation: major_mismatch
translation:
  text: I will sing to my God a new hymn. Lord, you are great and glorious, marvelous
    in strength, unsurpassable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a new song.' The Greek has 'a new hymn' (ὕμνον καινόν), which more specifically
      denotes a song of praise.
    reason: lexical_alternative
  - marker: b
    text: Or 'invincible' / 'incomparable.' The Greek adjective ἀνυπέρβλητος means
      not surpassed or overcome.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμνήσω
  chosen: I will sing
  alternatives:
  - I will hymn
  - I will sing praise
  lexicon: BDAG
  rationale: Future active of ὑμνέω, denoting singing praise. 'I will sing' is natural
    modern English; the object phrase 'a new hymn' preserves the hymn-language without
    forcing the verb itself into awkward English.
- source_word: τῷ θεῷ μου
  chosen: to my God
  alternatives:
  - my God
  lexicon: BDAG
  rationale: The dative with ὑμνήσω naturally marks the one addressed or honored in
    song. English can omit 'to,' but retaining it reflects the Greek relation clearly
    and reads well here.
- source_word: ὕμνον καινόν
  chosen: a new hymn
  alternatives:
  - a new song
  lexicon: BDAG
  rationale: ὕμνος is more specifically a hymn of praise than the broader 'song.'
    Since the Greek explicitly uses ὕμνος, 'hymn' better preserves the lexical force;
    'new song' is a possible idiomatic alternative but would flatten the distinction.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - O Lord
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine, κύριος defaults to 'Lord.' English
    often omits the interjection 'O' in contemporary style while preserving direct
    address.
- source_word: μέγας
  chosen: great
  alternatives:
  - mighty
  lexicon: BDAG
  rationale: The adjective straightforwardly denotes greatness. 'Great' is the most
    direct and idiomatic rendering in this praise context.
- source_word: ἔνδοξος
  chosen: glorious
  alternatives:
  - renowned
  - honored
  lexicon: BDAG
  rationale: In doxological context, 'glorious' best captures the sense of splendor
    and honor associated with divine majesty.
- source_word: θαυμαστὸς
  chosen: marvelous
  alternatives:
  - wonderful
  - astonishing
  lexicon: BDAG
  rationale: The term denotes that which evokes wonder. 'Marvelous' preserves the
    praise register and pairs well with the following phrase.
- source_word: ἐν ἰσχύι
  chosen: in strength
  alternatives:
  - in might
  - by strength
  lexicon: BDAG
  rationale: The prepositional phrase is best kept fairly literal. 'In strength' preserves
    the Greek wording; 'in might' is possible but slightly more interpretive.
- source_word: ἀνυπέρβλητος
  chosen: unsurpassable
  alternatives:
  - invincible
  - incomparable
  - unconquerable
  lexicon: LSJ
  rationale: The adjective literally conveys not being surpassed or overcome. 'Unsurpassable'
    preserves the broad superlative force without narrowing it to military invincibility
    alone, though the context of divine power allows that nuance.
