id: JDT.16.4
reference: Judith 16:4
source:
  edition: lxx-swete-1909
  text: εἶπεν ἐμπρήσειν τὰ ὅρη μου, καὶ τοὺς νεανίσκους μου ἀνελεῖν ῥομφαίᾳ, καὶ τὰ
    θηλάζοντά μου θήσει εἰς ἔδαφος, καὶ τὰ νήπιά μου δώσει εἰς προνομὴν, καὶ τὰς παρθένους
    σκυλεῦσαι.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 828
  - 829
  - 830
  - 831
  confidence: high
  validation: agree
translation:
  text: He said he would set my mountains on fire, and kill my young men with the
    sword, and dash my nursing children to the ground, and give my infants over as
    plunder, and despoil my virgins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ravish my virgins.' The Greek verb more literally means 'despoil' or
      'strip,' but in this context of wartime violence it may imply sexual violation.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: He said he would
  alternatives:
  - he said
  - he declared
  lexicon: BDAG
  rationale: The aorist of λέγω introduces the enemy's stated intention. In English,
    'He said he would' naturally carries the infinitive sequence that follows and
    avoids a stilted literalism.
- source_word: ἐμπρήσειν
  chosen: set ... on fire
  alternatives:
  - burn
  - kindle
  lexicon: LSJ
  rationale: The infinitive denotes burning or setting ablaze. 'Set my mountains on
    fire' preserves the causative force and vividness better than the flatter 'burn
    my mountains.'
- source_word: τὰ ὅρη μου
  chosen: my mountains
  alternatives:
  - my hill country
  - my hills
  lexicon: LSJ
  rationale: ὄρη literally means 'mountains.' While it can refer to hill country or
    uplands, the direct rendering 'mountains' best matches the Greek and keeps the
    poetic force of the song.
- source_word: ἀνελεῖν
  chosen: kill
  alternatives:
  - destroy
  - slay
  lexicon: BDAG
  rationale: The verb here means to do away with or kill. 'Kill' is clear modern English;
    'slay' would sound archaic, and 'destroy' is less specific.
- source_word: τοὺς νεανίσκους μου
  chosen: my young men
  alternatives:
  - my youths
  - my young warriors
  lexicon: BDAG
  rationale: νεανίσκοι are young men or youths. 'Young men' is the most natural and
    sufficiently precise; 'young warriors' would import a military nuance not explicit
    in the noun itself.
- source_word: ῥομφαίᾳ
  chosen: with the sword
  alternatives:
  - by the sword
  - with a blade
  lexicon: LSJ
  rationale: ῥομφαία is a sword, often a large sword. The singular instrumental 'with
    the sword' is idiomatic in English and preserves the conventional warfare expression.
- source_word: τὰ θηλάζοντά μου
  chosen: my nursing children
  alternatives:
  - my sucklings
  - those of mine at the breast
  lexicon: LSJ
  rationale: The participle refers to children who are nursing. 'My nursing children'
    communicates the sense clearly in modern English without archaic phrasing.
- source_word: θήσει εἰς ἔδαφος
  chosen: dash ... to the ground
  alternatives:
  - lay ... on the ground
  - cast ... to the ground
  lexicon: LSJ
  rationale: In this violent context, a merely neutral 'place on the ground' would
    undertranslate the brutality of the threat. 'Dash ... to the ground' captures
    the hostile force implied by the sequence of atrocities.
- source_word: τὰ νήπιά μου
  chosen: my infants
  alternatives:
  - my little children
  - my babies
  lexicon: BDAG
  rationale: νήπια denotes very young children, often infants. 'Infants' is concise
    and fits the parallel with nursing children while preserving the severity of the
    threat.
- source_word: δώσει εἰς προνομὴν
  chosen: give ... over as plunder
  alternatives:
  - hand over for spoil
  - give over to be prey
  lexicon: LSJ
  rationale: προνομή refers to booty, spoil, or prey. 'Give over as plunder' is natural
    English and conveys that the children are treated as war spoil.
- source_word: τὰς παρθένους
  chosen: my virgins
  alternatives:
  - my young women
  - my maidens
  lexicon: BDAG
  rationale: παρθένοι literally means virgins/maidens. Following the project's gender-accurate
    philosophy, 'virgins' preserves the explicit sexual-status term in the Greek rather
    than softening it to 'young women.'
- source_word: σκυλεῦσαι
  chosen: despoil
  alternatives:
  - plunder
  - ravish
  lexicon: LSJ
  rationale: The verb means to strip, despoil, or plunder. In context it may imply
    sexual violation, but the Greek term itself is broader than an explicit verb for
    rape. 'Despoil' preserves the lexical sense without over-specifying, while the
    context leaves the violence evident.
