theological_decisions:
- issue: Whether to make the violence against the virgins explicitly sexual in English
  chosen_reading: despoil my virgins
  alternative_readings:
  - plunder my virgins
  - ravish my virgins
  rationale: The Greek σκυλεῦσαι primarily denotes stripping or despoiling. Because
    the text does not use a more explicit sexual-violence verb, the main text preserves
    the broader term. An alternative with stronger sexual force is worth preserving
    in a footnote because the context of wartime atrocities may suggest that implication.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence without importing claims the text does not make.
