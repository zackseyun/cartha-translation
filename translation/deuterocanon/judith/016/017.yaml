theological_decisions:
- issue: Punitive imagery and duration
  chosen_reading: 'The verse is rendered as describing enduring divine vengeance with
    ongoing conscious suffering imagery: ''they will weep in pain forever.'''
  alternative_readings:
  - '''they will weep with sensation forever'''
  - '''they will lament in torment for an age'''
  rationale: The Greek imagery is severe and should not be softened. At the same time,
    αἴσθησις is rendered by its contextual sense ('pain') rather than importing a
    more systematized doctrine of eternal punishment than the verse itself states.
    ἕως αἰῶνος is translated idiomatically as 'forever' to reflect the text's force.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
