translation:
  text: Woe to the nations rising up against my people; the Lord Almighty will take
    vengeance on them in the day of judgment, to put fire and worms in their flesh,
    and they will weep in pain forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my kin' or 'my nation'; Greek 'my genos' refers to Judith's own people-group.
    reason: lexical_alternative
  - marker: b
    text: Greek 'in sensation/perception'; rendered 'in pain' here because the context
      is bodily punishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαί
  chosen: Woe
  alternatives:
  - Alas
  - Doom
  lexicon: BDAG
  rationale: An interjection of denunciation or lament. 'Woe' preserves the prophetic
    and judicial force better than softer alternatives.
- source_word: ἔθνεσιν
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: BDAG
  rationale: In this context it refers to foreign peoples hostile to Israel. 'The
    nations' is the most natural and contextually accurate rendering without importing
    NT-era Jew/Gentile terminology.
- source_word: ἐπανισταμένοις
  chosen: rising up against
  alternatives:
  - rebelling against
  - attacking
  lexicon: BDAG
  rationale: The participle denotes hostile uprising. 'Rising up against' preserves
    the verbal imagery and adversarial sense without over-specifying the manner of
    attack.
- source_word: τῷ γένει μου
  chosen: my people
  alternatives:
  - my race
  - my kin
  - my nation
  lexicon: BDAG
  rationale: γένoς can denote family line, stock, or people-group. In Judith's national
    context, 'my people' communicates collective ethnic identity in clear modern English
    better than 'my race,' which is misleading in contemporary usage.
- source_word: Κύριος Παντοκράτωρ
  chosen: the Lord Almighty
  alternatives:
  - Lord Almighty
  - the Lord All-ruler
  - the Lord Omnipotent
  lexicon: BDAG
  rationale: Follows the project's default for κύριος as 'Lord.' Παντοκράτωρ is conventionally
    and accurately rendered 'Almighty,' preserving the divine title's force in readable
    English.
- source_word: ἐκδικήσει
  chosen: will take vengeance on
  alternatives:
  - will avenge
  - will exact justice from
  - will punish
  lexicon: BDAG
  rationale: The verb denotes executing justice or vengeance. 'Will take vengeance
    on' best matches the direct object construction here and preserves the retributive
    tone of the text.
- source_word: ἐν ἡμέρᾳ κρίσεως
  chosen: in the day of judgment
  alternatives:
  - on the day of judgment
  - in a day of judgment
  lexicon: BDAG
  rationale: A recognizable eschatological/judicial phrase. 'The day of judgment'
    is idiomatic English and reflects the anarthrous Greek naturally.
- source_word: δοῦναι πῦρ καὶ σκώληκας εἰς σάρκας αὐτῶν
  chosen: to put fire and worms into their flesh
  alternatives:
  - to give fire and worms for their flesh
  - to send fire and worms into their bodies
  lexicon: BDAG
  rationale: The infinitive expresses the content or result of divine vengeance. 'To
    put' renders the sense idiomatically in English while retaining the stark imagery.
    σάρκες is rendered 'flesh' literally in keeping with project guidance for literal
    contexts.
- source_word: κλαύσονται
  chosen: they will weep
  alternatives:
  - they will cry out
  - they will lament
  lexicon: BDAG
  rationale: The future middle here straightforwardly denotes weeping or lamenting.
    'Weep' is concise and preserves the emotional force.
- source_word: ἐν αἰσθήσει
  chosen: in pain
  alternatives:
  - in feeling
  - in torment
  - with conscious sensation
  lexicon: LSJ
  rationale: αἴσθησις can denote sensation or perception. In this punitive context,
    'in pain' captures the experiential sense most clearly for modern readers without
    overloading the phrase with later doctrinal terminology.
- source_word: ἕως αἰῶνος
  chosen: forever
  alternatives:
  - for the age
  - unto eternity
  - for evermore
  lexicon: BDAG
  rationale: The phrase denotes enduring perpetuity in idiomatic English. 'Forever'
    is the clearest natural rendering, while more literal options sound stilted here.
