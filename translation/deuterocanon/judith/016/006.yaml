theological_decisions:
- issue: Mythic language in υἱοὶ Τιτάνων and γίγαντες
  chosen_reading: Retain the mythic terms directly as 'sons of Titans' and 'tall giants.'
  alternative_readings:
  - Render generically as 'mighty men' or 'heroes'
  rationale: The Greek intentionally heightens the contrast by invoking mythic/superhuman
    figures. Flattening these to generic strong men would reduce the rhetoric of Judith's
    victory.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
- issue: Force of παρέλυσεν
  chosen_reading: Render figuratively as 'disabled him.'
  alternative_readings:
  - '''paralyzed him'''
  - '''destroyed him'''
  rationale: The context points to Judith's beauty rendering him helpless or undone
    rather than a literal paralysis. 'Disabled him' preserves the metaphorical force
    without importing a more interpretive result like 'destroyed him.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not paraphrase
    beyond what the source warrants.'
