id: JDT.16.6
reference: Judith 16:6
source:
  edition: lxx-swete-1909
  text: οὐ γὰρ ἔπεσεν ὁ δυνατὸς αὐτῶν ὑπὸ νεανίσκων, οὐδὲ υἱοὶ Τιτάνων ἐπάταξαν αὐτόν,
    οὐδὲ ὑψηλοὶ γίγαντες ἐπέθεντο αὐτῷ· ἀλλὰ Ἰουδεὶθ θυγάτηρ Μεραρεί ἐν κάλλει προσώπου
    αὐτῆς παρέλυσεν αὐτόν.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 828
  - 829
  - 830
  - 831
  confidence: high
  validation: agree
translation:
  text: For their mighty one did not fall by young men, nor did sons of Titans strike
    him down, nor did tall giants attack him; but Judith daughter of Merari disabled
    him with the beauty of her face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'paralyzed him.' The Greek verb can denote causing someone to become
      powerless or disabled, whether literally or figuratively.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δυνατὸς
  chosen: their mighty one
  alternatives:
  - their strong man
  - their warrior
  - the mighty man among them
  lexicon: LSJ
  rationale: δυνατός here functions substantivally for a powerful man/champion. 'Their
    mighty one' preserves the elevated, somewhat poetic force without over-specifying
    a military office.
- source_word: νεανίσκων
  chosen: young men
  alternatives:
  - youths
  - young warriors
  lexicon: LSJ
  rationale: The term denotes young men/youths. 'Young men' is natural modern English
    and keeps the contrast with mythic or superhuman opponents.
- source_word: υἱοὶ Τιτάνων
  chosen: sons of Titans
  alternatives:
  - Titan sons
  - sons of the Titans
  lexicon: LSJ
  rationale: The phrase evokes mythic beings of extraordinary strength. 'Sons of Titans'
    is a close rendering that preserves the allusive grandeur of the Greek.
- source_word: ἐπάταξαν
  chosen: strike him down
  alternatives:
  - smite him
  - strike him
  - defeat him
  lexicon: LSJ
  rationale: The verb often means to strike/smite. Because the surrounding clauses
    describe his downfall, 'strike him down' conveys both the blow and its lethal/resultative
    force in idiomatic English.
- source_word: ὑψηλοὶ γίγαντες
  chosen: tall giants
  alternatives:
  - lofty giants
  - great giants
  lexicon: LSJ
  rationale: ὑψηλοί literally means high/tall. 'Tall giants' preserves the physical
    imagery rather than flattening it to a generic 'great'.
- source_word: ἐπέθεντο αὐτῷ
  chosen: attack him
  alternatives:
  - set upon him
  - laid hands on him
  - came against him
  lexicon: LSJ
  rationale: The idiom means to set upon or attack someone. 'Attack him' is concise,
    clear modern English.
- source_word: παρέλυσεν
  chosen: disabled him
  alternatives:
  - paralyzed him
  - undid him
  - brought him low
  lexicon: LSJ
  rationale: The verb can mean to loosen, disable, or paralyze. In context Judith
    overcomes Holofernes through her beauty before killing him; 'disabled him' captures
    the figurative enfeebling effect without implying literal medical paralysis.
- source_word: ἐν κάλλει προσώπου αὐτῆς
  chosen: with the beauty of her face
  alternatives:
  - by the beauty of her appearance
  - through her beauty
  - with her beautiful face
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the concrete imagery of the Greek.
    'Face' is retained rather than generalized to 'appearance' because πρόσωπον is
    explicit.
- source_word: θυγάτηρ Μεραρεί
  chosen: daughter of Merari
  alternatives:
  - Merari's daughter
  lexicon: LSJ
  rationale: A straightforward genealogical designation; 'daughter of Merari' is the
    most transparent formal rendering.
