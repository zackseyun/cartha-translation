theological_decisions:
- issue: Nature of purification in ἐκαθαρίσθη ὁ λαός
  chosen_reading: ritual purification of the people before sacrificial offerings
  alternative_readings:
  - general moral cleansing of the people
  rationale: The immediate context is worship in Jerusalem followed by burnt offerings,
    freewill offerings, and gifts. This strongly points to cultic or ritual purification
    rather than an abstract moral renewal.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition
