id: JDT.16.18
reference: Judith 16:18
source:
  edition: lxx-swete-1909
  text: Ὡς δὲ ἦλθον εἰς Ἰερουσαλήμ, προσεκύνησαν τῷ θεῷ, καὶ ἡνίκα ἐκαθαρίσθη ὁ λαὸς,
    ἀνήνεγκαν τὰ ὁλοκαυτώματα αὐτῶν καὶ τὰ ἑκούσια αὐτῶν καὶ τὰ δόματα.
