translation:
  text: And when they came to Jerusalem, they worshiped God; and when the people had
    been purified, they offered up their burnt offerings and their freewill offerings
    and their gifts.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσεκύνησαν
  chosen: they worshiped
  alternatives:
  - they bowed down to
  - they prostrated themselves before
  lexicon: LSJ
  rationale: In this cultic context with τῷ θεῷ as object, the verb denotes worship
    rather than merely the physical act of bowing. 'Worshiped' gives the sense in
    natural English without over-literalizing the gesture.
- source_word: ἡνίκα
  chosen: when
  alternatives:
  - at the time when
  - once
  lexicon: LSJ
  rationale: A temporal conjunction introducing the next action. Simple 'when' is
    sufficient and readable.
- source_word: ἐκαθαρίσθη
  chosen: had been purified
  alternatives:
  - was cleansed
  - had been cleansed
  lexicon: LSJ
  rationale: The passive indicates the people underwent ritual purification. 'Purified'
    fits the cultic setting slightly better than the broader 'cleansed.' The English
    pluperfect helps sequence the action before the offerings.
- source_word: ὁ λαός
  chosen: the people
  alternatives:
  - the nation
  lexicon: LSJ
  rationale: Standard rendering for λαός here, referring to the assembled covenant
    people rather than an abstract nation-state.
- source_word: ἀνήνεγκαν
  chosen: they offered up
  alternatives:
  - they offered
  - they brought up
  lexicon: LSJ
  rationale: The sacrificial context favors 'offered up,' which reflects the technical
    cultic sense of ἀναφέρω in relation to offerings.
- source_word: ὁλοκαυτώματα
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: LSJ
  rationale: Established and accurate sacrificial term in English. 'Whole burnt offerings'
    is more explicit but less idiomatic here.
- source_word: ἑκούσια
  chosen: freewill offerings
  alternatives:
  - voluntary offerings
  lexicon: LSJ
  rationale: In sacrificial language, ἑκούσια refers to offerings given voluntarily.
    'Freewill offerings' is the clearest conventional equivalent.
- source_word: δόματα
  chosen: gifts
  alternatives:
  - offerings
  - dedications
  lexicon: LSJ
  rationale: Distinct from the preceding sacrificial terms, δόματα is broader. 'Gifts'
    preserves that distinction rather than collapsing all three terms into 'offerings'.
- source_word: Ὡς δὲ ἦλθον
  chosen: And when they came
  alternatives:
  - Now when they came
  - But when they came
  lexicon: LSJ
  rationale: This opening marks narrative progression. 'And when' preserves continuity
    without overstating contrast.
