  confidence: high
  validation: major_mismatch
translation:
  text: For every sacrifice is a small thing for a pleasing aroma, and all fat for
    your whole burnt offering is very little; but the one who fears the Lord is great
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'always' for 'forever'; the Greek phrase can denote continual duration
      or enduring permanence.
    reason: lexical_alternative
lexical_decisions:
- source_word: μικρὸν
  chosen: a small thing
  alternatives:
  - small
  - little
  - insignificant
  lexicon: LSJ
  rationale: Predicate adjective used to assess the relative value of sacrifice before
    God. 'A small thing' preserves the comparative sense without overstating it as
    contempt.
- source_word: θυσία
  chosen: sacrifice
  alternatives:
  - offering
  lexicon: LSJ
  rationale: Standard cultic term; 'sacrifice' is the most direct and recognizable
    rendering here.
- source_word: εἰς ὀσμὴν εὐωδίας
  chosen: for a pleasing aroma
  alternatives:
  - as a sweet-smelling aroma
  - for an aroma of fragrance
  lexicon: LSJ
  rationale: Cultic phrase denoting acceptability of the offering. 'Pleasing aroma'
    is readable modern English while preserving sacrificial imagery.
- source_word: ἐλάχιστον
  chosen: very little
  alternatives:
  - least
  - a very small thing
  - minimal
  lexicon: LSJ
  rationale: Superlative intensifies the previous statement. 'Very little' communicates
    the force naturally in English.
- source_word: στέαρ
  chosen: fat
  alternatives:
  - fat portion
  lexicon: LSJ
  rationale: Refers to the sacrificial fat offered in worship. 'Fat' is literal and
    sufficient in context.
- source_word: ὁλοκαύτωμά
  chosen: whole burnt offering
  alternatives:
  - burnt offering
  - holocaust
  lexicon: LSJ
  rationale: The term denotes an offering wholly consumed by fire. 'Whole burnt offering'
    preserves that specific sense better than the broader 'burnt offering.'
- source_word: σοι
  chosen: your
  alternatives:
  - for you
  - to you
  lexicon: LSJ
  rationale: The dative addresses God directly. In idiomatic English with 'whole burnt
    offering,' possessive 'your' best conveys the relation.
- source_word: ὁ δὲ φοβούμενος τὸν κύριον
  chosen: the one who fears the Lord
  alternatives:
  - whoever fears the Lord
  - the person fearing the Lord
  lexicon: LSJ
  rationale: Substantival participle expressing a general truth. 'The one who fears
    the Lord' is both faithful and natural.
- source_word: μέγας
  chosen: is great
  alternatives:
  - is important
  - is exalted
  lexicon: LSJ
  rationale: Simple predicate adjective contrasting with the smallness of sacrifices.
    'Great' preserves the rhetorical antithesis.
- source_word: διὰ παντός
  chosen: forever
  alternatives:
  - continually
  - at all times
  - always
  lexicon: LSJ
  rationale: The phrase can mean continually or perpetually. In this wisdom-like maxim,
    'forever' best captures enduring status before God, though 'always' remains possible.
