theological_decisions:
- issue: Relative value of sacrifice versus fear of the Lord
  chosen_reading: The verse states that sacrificial offerings are comparatively small,
    while the person who fears the Lord is great.
  alternative_readings:
  - The verse could be read as saying sacrifices are insufficient without reverence
    rather than intrinsically small.
  rationale: The Greek directly contrasts the smallness of sacrificial gifts with
    the greatness of the God-fearer. The translation preserves the contrast without
    importing a developed anti-sacrificial theology.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering κύριον
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: DOCTRINE.md lists κύριος with default rendering 'Lord.' In this deuterocanonical
    Greek context, 'Lord' is the standard reverential title for God.
  doctrine_reference: 'Contested terms: κύριος → Lord'
