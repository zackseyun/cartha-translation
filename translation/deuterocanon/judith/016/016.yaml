id: JDT.16.16
reference: Judith 16:16
source:
  edition: lxx-swete-1909
  text: ὅτι μικρὸν πᾶσα θυσία εἰς ὀσμὴν εὐωδίας, καὶ ἐλάχιστον πᾶν στέαρ εἰς ὁλοκαύτωμά
    σοι· ὁ δὲ φοβούμενος τὸν κύριον μέγας διὰ παντός.
  language: Greek
