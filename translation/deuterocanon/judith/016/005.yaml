id: JDT.16.5
reference: Judith 16:5
source:
  edition: lxx-swete-1909
  text: Κύριος Παντοκράτωρ ἠθέτησεν αὐτοὺς ἐν χειρὶ θηλείας.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 828
  - 829
  - 830
  - 831
  confidence: high
  validation: agree
translation:
  text: The Lord Almighty nullified them by the hand of a woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through a woman.' The Greek idiom 'by the hand of' expresses agency
      or instrumentality.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Standard rendering of κύριος as a divine title per project doctrine;
    here it refers to God and is best translated 'Lord.'
- source_word: Παντοκράτωρ
  chosen: Almighty
  alternatives:
  - All-powerful
  - Ruler of all
  lexicon: BDAG
  rationale: A conventional and accurate rendering of the divine title Παντοκράτωρ,
    expressing God's universal power without unnecessary expansion.
- source_word: ἠθέτησεν
  chosen: nullified
  alternatives:
  - set aside
  - rejected
  - brought to nothing
  lexicon: BDAG
  rationale: The verb ἀθετέω commonly means to set aside, invalidate, or nullify.
    In this victory context, 'nullified' captures the sense that God rendered the
    enemies ineffective or overthrew their power, while staying close to the Greek.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Straightforward accusative plural object referring to the enemies just
    mentioned in context.
- source_word: ἐν χειρὶ
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: BDAG
  rationale: This is a common biblical idiom for agency or instrumentality. 'By the
    hand of' preserves the idiom and highlights God's action through a human agent.
- source_word: θηλείας
  chosen: a woman
  alternatives:
  - a female
  lexicon: LSJ
  rationale: Though literally related to 'female,' idiomatic English in this narrative
    context is 'woman.' This preserves the striking reversal that God used a woman
    as his instrument.
