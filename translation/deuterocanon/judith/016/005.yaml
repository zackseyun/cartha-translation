theological_decisions:
- issue: Rendering the divine titles Κύριος Παντοκράτωρ
  chosen_reading: The Lord Almighty
  alternative_readings:
  - Lord of all
  - the Almighty Lord
  rationale: The paired titles are rendered in natural English while preserving both
    elements of the Greek. This avoids flattening Παντοκράτωρ into a mere epithet
    and maintains the verse's theological emphasis on God's sovereign power.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; translate titles'
- issue: Agency expression ἐν χειρὶ θηλείας
  chosen_reading: by the hand of a woman
  alternative_readings:
  - through a woman
  rationale: The more literal idiom is retained because it is intelligible in modern
    English and preserves the theological point that God acted through an unexpected
    human instrument.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it; optimal equivalence'
