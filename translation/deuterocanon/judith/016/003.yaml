theological_decisions:
- issue: Personified singular subject with plural possessives in a poetic military
    description
  chosen_reading: Render Ἀσσούρ as 'Assyria' with singular verbs, while keeping plural
    references to its forces ('his forces,' 'their cavalry') as in the Greek.
  alternative_readings:
  - Render the subject as 'the Assyrian' throughout
  - Normalize all pronouns to singular or plural for smoother English
  rationale: The verse poetically personifies the imperial power while also referring
    to its constituent troops. Preserving this mixed number reflects the source text's
    rhetoric rather than flattening it.
  doctrine_reference: Translation philosophy §§1, 5
