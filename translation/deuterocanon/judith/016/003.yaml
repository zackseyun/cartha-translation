  text: ἦλθεν Ἀσσούρ ἐξ ὀρέων ἀπὸ βορρᾶ, ἦλθεν ἐν μυριάσι δυνάμεων αὐτοῦ, ὧν τὸ πλῆθος
    αὐτῶν ἐνέφραξεν χειμάρρους, καὶ ἡ ἵππος αὐτῶν ἐκάλυψεν βουνούς.
