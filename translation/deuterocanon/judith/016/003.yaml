translation:
  text: Assyria came from the mountains out of the north; he came with myriads of
    his forces, whose multitude blocked up the wadis, and their cavalry covered the
    hills.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'winter torrents' or 'streambeds' for 'wadis'; the Greek refers to seasonal
      watercourses.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the horse of them covered hills'; the Greek likely uses a collective
      singular for the mounted force, hence 'their cavalry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσσούρ
  chosen: Assyria
  alternatives:
  - Asshur
  lexicon: LSJ
  rationale: The Greek form denotes Assyria/the Assyrian power. In Judith's poetic
    retelling, the nation/empire is personified, so 'Assyria' is the most natural
    English rendering while preserving the singular verbs.
- source_word: ἐξ ὀρέων ἀπὸ βορρᾶ
  chosen: from the mountains out of the north
  alternatives:
  - from the mountains of the north
  - from northern mountains
  lexicon: LSJ
  rationale: 'Both prepositions are retained in sense: movement from mountainous terrain
    associated with the north. ''Out of the north'' preserves the directional force
    of ἀπὸ βορρᾶ without over-smoothing.'
- source_word: ἐν μυριάσι δυνάμεων αὐτοῦ
  chosen: with myriads of his forces
  alternatives:
  - with tens of thousands of his troops
  - among myriads of his army
  lexicon: LSJ
  rationale: μυριάσι literally refers to myriads/tens of thousands; retaining 'myriads'
    preserves the elevated poetic register. δυνάμεων can mean forces/troops/army;
    'forces' is broad and close to the Greek plural.
- source_word: χειμάρρους
  chosen: wadis
  alternatives:
  - winter torrents
  - streambeds
  - brooks
  lexicon: LSJ
  rationale: χειμάρρους refers to seasonal torrent-beds rather than ordinary perennial
    rivers. 'Wadis' best captures the geographical sense in concise modern English;
    alternatives are possible but less precise.
- source_word: ἐνέφραξεν
  chosen: blocked up
  alternatives:
  - stopped up
  - choked
  - filled
  lexicon: LSJ
  rationale: The verb conveys obstructing or shutting off. 'Blocked up' is idiomatic
    and preserves the image of the army's mass impeding the watercourses.
- source_word: ἡ ἵππος αὐτῶν
  chosen: their cavalry
  alternatives:
  - their horse
  - their horses
  - their horsemen
  lexicon: LSJ
  rationale: Although ἵππος is singular in form, collective singular usage can denote
    cavalry/horse-force. 'Their cavalry' communicates the collective military sense
    more naturally than a wooden singular 'their horse'.
- source_word: βουνούς
  chosen: hills
  alternatives:
  - mountains
  lexicon: LSJ
  rationale: βουνοί commonly denotes hills rather than the larger ὄρη already used
    earlier for mountains. Rendering it 'hills' preserves the distinction in the Greek
    imagery.
