translation:
  text: For she took off her widow’s clothing for the lifting up of those who were
    afflicted in Israel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the exaltation of those who suffered in Israel.' The Greek phrase
      εἰς ὕψος is somewhat compressed, and 'lifting up' preserves the image while
      'exaltation' is a possible alternative.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεδύσατο
  chosen: took off
  alternatives:
  - stripped off
  - removed
  lexicon: BDAG
  rationale: Middle voice of ἐκδύω here refers to removing clothing from oneself.
    'Took off' is natural modern English and preserves the concrete action without
    over-dramatizing it.
- source_word: στολήν
  chosen: clothing
  alternatives:
  - robe
  - garment
  - attire
  lexicon: LSJ
  rationale: στολή can denote a robe or distinctive garment, but in this context with
    χηρεύσεως it refers to the attire associated with widowhood. 'Clothing' communicates
    the category clearly in idiomatic English.
- source_word: χηρεύσεως
  chosen: widow’s
  alternatives:
  - widowhood
  - mourning as a widow
  lexicon: LSJ
  rationale: The genitive denotes the state or condition of widowhood modifying στολήν.
    'Widow’s clothing' is more idiomatic than 'clothing of widowhood' while preserving
    the sense.
- source_word: εἰς ὕψος
  chosen: for the lifting up
  alternatives:
  - for exaltation
  - for the raising up
  - to bring honor to
  lexicon: LSJ
  rationale: Literally 'for/upon height' or 'for exaltation.' In context it expresses
    purpose/result connected to helping the distressed in Israel. 'For the lifting
    up' preserves the metaphor of elevation while remaining understandable.
- source_word: τῶν πονούντων
  chosen: those who were afflicted
  alternatives:
  - those who suffered
  - those who labored
  - those in pain
  lexicon: BDAG
  rationale: πονέω can denote toil, suffering, or being distressed. Given the narrative
    context of Israel under oppression, 'those who were afflicted' best captures the
    broader distress rather than mere labor.
- source_word: ἐν Ἰσραήλ
  chosen: in Israel
  alternatives:
  - among Israel
  - within Israel
  lexicon: BDAG
  rationale: The prepositional phrase is straightforwardly locative/corporate. 'In
    Israel' is the most direct rendering.
