id: JDT.16.1
reference: Judith 16:1
source:
  edition: lxx-swete-1909
  text: Ἐξάρχετε τῷ θεῷ μου ἐν τυμπάνοις, ᾄσατε τῷ κυρίῳ ἐν κυμβάλοις, ἐναρμόσασθε
    αὐτῷ ψαλμὸν καὶ αἶνον, ὑψοῦτε καὶ ἐπικαλεῖσθε τὸ ὄνομα αὐτοῦ.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 828
  - 829
  - 830
  - 831
  confidence: high
  validation: minor_mismatch
translation:
  text: Begin the song to my God with tambourines; sing to the Lord with cymbals;
    fit to him a psalm and praise; exalt and call upon his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Lead off for my God with tambourines' or 'Strike up for my God with
      tambourines.' The opening imperative Ἐξάρχετε is a musical command to begin
      or lead a song.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'fit to him' (ἐναρμόσασθε) can also mean 'sing in harmony
      to him' or 'arrange for him,' preserving the image of setting a psalm and praise
      in proper musical form.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐξάρχετε
  chosen: Begin the song
  alternatives:
  - Lead off
  - Begin
  - Strike up
  lexicon: LSJ
  rationale: Imperative plural from ἐξάρχω in musical/liturgical context, meaning
    to begin or lead off a song or dance. 'Begin the song' makes the implied musical
    object explicit in natural English without over-paraphrasing.
- source_word: τῷ θεῷ μου
  chosen: to my God
  alternatives:
  - for my God
  lexicon: LSJ
  rationale: Dative here is naturally rendered with 'to' in a context of musical address
    or dedication. 'My God' preserves the personal possessive.
- source_word: ἐν τυμπάνοις
  chosen: with tambourines
  alternatives:
  - with timbrels
  - on tambourines
  lexicon: LSJ
  rationale: τύμπανον denotes a hand drum/tambourine. 'Tambourines' is modern and
    accessible; 'timbrels' is traditional but archaic.
- source_word: ᾄσατε
  chosen: sing
  alternatives:
  - sing praise
  lexicon: LSJ
  rationale: Basic imperative 'sing.' The object is implied by context; adding 'praise'
    would be interpretive and unnecessary because αἶνον appears later explicitly.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - for the Lord
  lexicon: LSJ
  rationale: κύριος is rendered 'Lord' per doctrine defaults. In this hymnic address,
    dative is well represented by 'to the Lord.'
- source_word: ἐν κυμβάλοις
  chosen: with cymbals
  alternatives:
  - on cymbals
  lexicon: LSJ
  rationale: Instrumental sense is primary here.
- source_word: ἐναρμόσασθε
  chosen: fit to him
  alternatives:
  - sing in harmony to him
  - compose for him
  - make melody to him
  lexicon: LSJ
  rationale: The verb literally involves fitting together or harmonizing. Because
    the object ψαλμὸν καὶ αἶνον follows, 'fit to him' preserves the unusual metaphor
    of arranging or setting a psalm and praise for God, though somewhat idiomatic
    in English.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - for him
  lexicon: LSJ
  rationale: Simple dative of direction/reference in worship context.
- source_word: ψαλμὸν καὶ αἶνον
  chosen: a psalm and praise
  alternatives:
  - psalm and hymn of praise
  - melody and praise
  lexicon: LSJ
  rationale: ψαλμός is best kept as 'psalm' in a liturgical setting; αἶνος is 'praise.'
    Avoided 'hymn' because the Greek term is not ὕμνος.
- source_word: ὑψοῦτε
  chosen: exalt
  alternatives:
  - magnify
  - lift high
  lexicon: LSJ
  rationale: Imperative plural calling for honoring God. 'Exalt' is concise and idiomatic
    in worship language.
- source_word: ἐπικαλεῖσθε
  chosen: call upon
  alternatives:
  - invoke
  - call on
  lexicon: LSJ
  rationale: Standard rendering in prayer/worship contexts; preserves the religious
    nuance better than merely 'call on.'
- source_word: τὸ ὄνομα αὐτοῦ
  chosen: his name
  lexicon: LSJ
  rationale: Conventional biblical idiom retained; no need to paraphrase as 'him by
    name' or similar.
