theological_decisions:
- issue: Gendered corporate designation in τοὺς υἱοὺς Ἰσραήλ
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: Per doctrine, gender-accurate renderings are preferred over gender-neutral
    flattening when the source uses a masculine familial term. Here the phrase is
    a conventional ethnic designation, but retaining 'sons' keeps the wording transparent
    to the Greek while remaining understandable.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Concluding ἀμήν in the main text
  chosen_reading: Amen
  alternative_readings:
  - omit as secondary liturgical ending if treated as paratext in some traditions
  rationale: The Zone 1 Greek witness includes ἀμήν, and there is no source-integrity
    warning attached. Therefore it is translated in the main text rather than omitted.
  doctrine_reference: PHILOSOPHY.md § What we are translating; transparency from source
    witness
