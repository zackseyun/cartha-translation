id: JDT.16.25
reference: Judith 16:25
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἦν ἔτι ὁ ἐκφοβῶν τοὺς υἱοὺς Ἰσραὴλ ἐν ταῖς ἡμέραις Ἰουδεὶθ καὶ μετὰ
    τὸ ἀποθανεῖν αὐτὴν ἡμέρας πολλάς. ἀμήν.
  language: Greek
  pages:
  - 831
  confidence: high
  validation: agree
translation:
  text: And there was no longer anyone to terrify the sons of Israel in the days of
    Judith and for many days after her death. Amen.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐκ ἦν ἔτι
  chosen: there was no longer
  alternatives:
  - there was no more
  - there was no longer any
  lexicon: BDAG
  rationale: This idiom marks the cessation of a prior condition. 'There was no longer'
    is natural English and preserves the temporal force of ἔτι.
- source_word: ὁ ἐκφοβῶν
  chosen: anyone to terrify
  alternatives:
  - one who frightened
  - the one causing fear
  - anyone frightening
  lexicon: BDAG
  rationale: 'The articular present participle functions substantivally: ''the one
    who terrifies/frightens.'' In English, ''anyone to terrify'' best conveys an indefinite
    hostile agent in this context without sounding wooden.'
- source_word: τοὺς υἱοὺς Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: BDAG
  rationale: Following the project's gender-accurate policy, the literal familial
    expression is retained rather than flattened to 'Israelites.' 'Children of Israel'
    is possible, but 'sons of Israel' more directly reflects υἱούς.
- source_word: ἐν ταῖς ἡμέραις Ἰουδεὶθ
  chosen: in the days of Judith
  alternatives:
  - during Judith's lifetime
  - throughout Judith's days
  lexicon: BDAG
  rationale: This is a standard temporal expression. 'In the days of Judith' preserves
    the biblical cadence and the source structure.
- source_word: μετὰ τὸ ἀποθανεῖν αὐτήν
  chosen: after she died
  alternatives:
  - after her death
  - after she had died
  lexicon: BDAG
  rationale: The articular infinitive with μετά expresses time subsequent to her death.
    'After she died' is clear, direct, and faithful.
- source_word: ἡμέρας πολλάς
  chosen: for many days
  alternatives:
  - many days
  - for a long time
  lexicon: BDAG
  rationale: Accusative of extent/duration. 'For many days' makes the duration explicit
    in idiomatic English while staying close to the Greek.
- source_word: ἀμήν
  chosen: Amen
  alternatives:
  - Truly
  - So be it
  lexicon: BDAG
  rationale: As a liturgical/concluding formula, 'Amen' should be transliterated rather
    than paraphrased.
