theological_decisions:
- issue: Referent of τῶν ἁγίων in a cultic Jerusalem context
  chosen_reading: sanctuary / sacred precinct
  alternative_readings:
  - holy things
  - holy ones
  rationale: The phrase occurs with a locative expression ('before') and in connection
    with rejoicing in Jerusalem, which strongly suggests a temple-related referent.
    Rendering it as 'sanctuary' communicates the likely cultic sense without importing
    later ecclesiastical language.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    significant alternatives in footnotes where ambiguity remains.'
