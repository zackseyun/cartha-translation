id: JDT.16.20
reference: Judith 16:20
source:
  edition: lxx-swete-1909
  text: καὶ ἦν ὁ λαὸς εὐφραινόμενος ἐν Ἰερουσαλὴμ κατὰ πρόσωπον τῶν ἁγίων ἐπὶ μῆνας
    τρεῖς, καὶ Ἰουδεὶθ μετʼ αὐτῶν κατέμεινεν.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 828
  - 829
  - 830
  - 831
  confidence: high
  validation: major_mismatch
translation:
  text: And the people were rejoicing in Jerusalem before the sanctuary for three
    months, and Judith remained with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the holy things' or 'in the presence of the holy ones'; the Greek
      phrase is literally 'before the holy [things/ones].'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐφραινόμενος
  chosen: were rejoicing
  alternatives:
  - were celebrating
  - were making merry
  - were glad
  lexicon: BDAG
  rationale: The participle conveys ongoing communal joy. 'Were rejoicing' preserves
    the durative sense and fits the solemn yet celebratory context better than the
    more colloquial 'making merry.'
- source_word: κατὰ πρόσωπον τῶν ἁγίων
  chosen: before the sanctuary
  alternatives:
  - before the holy things
  - before the holy place
  - in the presence of the holy ones
  lexicon: LSJ
  rationale: In this Jerusalem cultic setting, τῶν ἁγίων most naturally refers to
    the holy sanctuary area or sacred precinct rather than 'holy ones' (saints/angels).
    'Before the sanctuary' gives clear English sense while preserving the spatial
    force of κατὰ πρόσωπον ('before/in front of').
- source_word: ἐπὶ μῆνας τρεῖς
  chosen: for three months
  alternatives:
  - during three months
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the temporal expression in English.
- source_word: κατέμεινεν
  chosen: remained
  alternatives:
  - stayed
  - continued to stay
  lexicon: LSJ
  rationale: A straightforward rendering that preserves the sense of staying on with
    the people after the celebration.
- source_word: λαός
  chosen: the people
  alternatives:
  - the populace
  - the nation
  lexicon: BDAG
  rationale: '''The people'' is the natural collective rendering here and avoids over-specifying
    ethnic or political nuance beyond the immediate context.'
