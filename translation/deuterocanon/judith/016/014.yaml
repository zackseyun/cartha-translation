translation:
  text: Let all your creation serve you; for you spoke, and they came to be; you sent
    out your Spirit, and it built them up; and there is no one who will resist your
    voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your breath' or 'your wind.' The Greek word can carry all three senses
      in creation contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: δουλευσάτω
  chosen: serve
  alternatives:
  - be enslaved to
  - be subject to
  lexicon: BDAG
  rationale: From δουλεύω, denoting rendering service or being in subjection. Here
    the subject is 'all your creation,' so 'serve' is the most natural English while
    still preserving the sense of universal subjection to God. 'Be enslaved to' would
    overstate the imagery in English for non-personal creation.
- source_word: πᾶσα ἡ κτίσις σου
  chosen: all your creation
  alternatives:
  - every creature of yours
  - the whole creation that is yours
  lexicon: LSJ
  rationale: κτίσις can denote creation collectively or a creature individually. Because
    πᾶσα with the singular noun naturally yields a collective sense here, and the
    following plurals refer to created things coming into being, 'all your creation'
    best captures the scope.
- source_word: εἶπας
  chosen: you spoke
  alternatives:
  - you said
  lexicon: BDAG
  rationale: Both are possible for λέγω in aorist form. 'You spoke' fits the elevated
    poetic context and pairs well with the creative-result clause that follows.
- source_word: ἐγενήθησαν
  chosen: they came to be
  alternatives:
  - they were made
  - they came into existence
  lexicon: BDAG
  rationale: Aorist passive/middle of γίνομαι here expresses coming into existence.
    'Came to be' preserves the creation nuance without forcing a more specific agentive
    wording than the Greek itself uses.
- source_word: ἀπέστειλας
  chosen: you sent out
  alternatives:
  - you sent forth
  - you sent
  lexicon: BDAG
  rationale: The compound verb ἀποστέλλω here has the sense of dispatching forth.
    'Sent out' is clear modern English and preserves the outward movement.
- source_word: τὸ πνεῦμά σου
  chosen: your Spirit
  alternatives:
  - your breath
  - your wind
  lexicon: BDAG
  rationale: πνεῦμα can mean spirit, breath, or wind. In a creation context all are
    semantically possible, but the possessive and the allusion to divine creative
    agency favor 'Spirit' in the main text. The lexical alternative is worth preserving
    in a footnote because the Greek term intentionally overlaps these senses.
- source_word: ᾠκοδόμησεν
  chosen: it built them up
  alternatives:
  - it established them
  - it fashioned them
  lexicon: LSJ
  rationale: From οἰκοδομέω, literally 'build.' In this poetic creation context it
    conveys constructive ordering or establishing. 'Built them up' keeps the concrete
    metaphor of the Greek better than a flatter 'made them,' while still reading naturally.
- source_word: ἀντιστήσεται
  chosen: will resist
  alternatives:
  - will stand against
  - will oppose
  lexicon: BDAG
  rationale: Future middle of ἀνθίστημι, meaning to set oneself against or resist.
    'Resist' is concise and idiomatic with 'voice' as the object of opposition.
- source_word: τῇ φωνῇ σου
  chosen: your voice
  alternatives:
  - your command
  - your utterance
  lexicon: BDAG
  rationale: φωνή is literally 'voice.' Since the verse emphasizes divine speech,
    retaining 'voice' preserves the imagery better than abstracting to 'command,'
    though command is an interpretive implication.
