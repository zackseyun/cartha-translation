theological_decisions:
- issue: Meaning of πνεῦμα in a creation context
  chosen_reading: your Spirit
  alternative_readings:
  - your breath
  - your wind
  rationale: The verse echoes biblical creation language in which God's πνεῦμα/רוּחַ
    can denote Spirit, breath, or wind. Following the translation philosophy of preserving
    theological tension rather than collapsing it, the main text uses 'Spirit' as
    the most theologically and contextually salient reading, while a footnote preserves
    the lexical alternatives.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
