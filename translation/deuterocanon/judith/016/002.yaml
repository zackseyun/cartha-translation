id: JDT.16.2
reference: Judith 16:2
source:
  edition: lxx-swete-1909
  text: ὅτι θεὸς συντρίβων πολέμους Κύριος, ὅτι εἰς παρεμβολὰς αὐτοῦ ἐν μέσῳ λαοῦ
    ἐξείλατό με ἐκ χειρὸς καταδιωκόντων με.
  language: Greek
