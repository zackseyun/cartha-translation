theological_decisions:
- issue: Relation of θεὸς and Κύριος in the opening clause
  chosen_reading: Rendered appositionally as 'the Lord is a God who shatters wars.'
  alternative_readings:
  - '''God, the Lord, shatters wars'''
  - '''For God is one who shatters wars, the Lord'''
  rationale: The Greek lacks an explicit finite verb, but the nominal clause naturally
    yields an appositional statement. This preserves both divine titles without overcomplicating
    the English.
  doctrine_reference: 'DOCTRINE.md: κύριος default rendering ''Lord''; preserve source
    sense over tradition'
- issue: Scope of 'in his camp, in the midst of the people'
  chosen_reading: Kept as a locative description of where the rescue occurred rather
    than smoothing into a more interpretive paraphrase.
  alternative_readings:
  - '''into his camp'''
  - '''among his assembled forces'''
  rationale: The Greek phrase is somewhat compressed, but the text itself locates
    the action within the encampment and among the people. The translation preserves
    that tension rather than resolving it into a more specific military reconstruction.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it'
