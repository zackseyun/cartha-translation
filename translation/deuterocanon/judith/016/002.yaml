  confidence: high
  validation: minor_mismatch
translation:
  text: For the Lord is a God who shatters wars; for in his camp, in the midst of
    the people, he rescued me from the hand of those pursuing me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'breaks wars' or 'crushes wars.' The Greek participle is vivid and forceful.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'in his camp(s), in the midst of the people,' a compressed
      locative expression that may refer to the military encampment setting.
    reason: cultural_note
lexical_decisions:
- source_word: συντρίβων
  chosen: shatters
  alternatives:
  - breaks
  - crushes
  lexicon: BDAG
  rationale: The participle denotes forceful breaking or crushing. 'Shatters' preserves
    the vivid, violent imagery while reading naturally in English and fitting the
    object 'wars.'
- source_word: πολέμους
  chosen: wars
  alternatives:
  - battles
  - warfare
  lexicon: LSJ
  rationale: The plural noun is most directly 'wars.' 'Battles' would narrow the scope,
    and 'warfare' would be more abstract than the Greek plural.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is rendered 'Lord.' Here it functions as
    the divine title in apposition to θεός.
- source_word: παρεμβολὰς
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: LSJ
  rationale: The plural form after εἰς is awkward in English if rendered woodenly.
    In context it refers to the military encampment setting; singular 'camp' gives
    idiomatic English while preserving the sense. The possessive 'his' is retained
    from αὐτοῦ.
- source_word: ἐξείλατό
  chosen: rescued
  alternatives:
  - delivered
  - snatched out
  lexicon: BDAG
  rationale: The verb means to deliver or rescue from danger. 'Rescued' is clear modern
    English and suits the immediate threat expressed by 'from the hand of those pursuing
    me.'
- source_word: ἐκ χειρὸς
  chosen: from the hand of
  alternatives:
  - out of the power of
  - from the grasp of
  lexicon: LSJ
  rationale: This is a common idiom for deliverance from someone's power. Retaining
    'hand' preserves the biblical idiom without obscuring meaning.
- source_word: καταδιωκόντων
  chosen: those pursuing
  alternatives:
  - those persecuting
  - those chasing
  lexicon: LSJ
  rationale: The participle indicates hostile pursuit. 'Those pursuing' is broad enough
    to include military pursuit and avoids importing later religious connotations
    that 'persecuting' might suggest.
