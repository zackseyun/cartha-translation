translation:
  text: The Persians shuddered at her boldness, and the Medes were shaken by her daring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek uses two near-synonymous terms for Judith''s fearsome courage: ''boldness''
      (τόλμα) and ''daring/audacity'' (θράσος). The translation varies them in English
      to preserve the rhetorical parallel without sounding repetitive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφριξαν
  chosen: shuddered
  alternatives:
  - trembled
  - were terrified
  lexicon: LSJ
  rationale: From φρίσσω, conveying a visceral shudder or bristling fear. 'Shuddered'
    preserves the vivid physical reaction better than the flatter 'trembled.'
- source_word: Πέρσαι
  chosen: the Persians
  alternatives:
  - Persians
  lexicon: LSJ
  rationale: Ethnic plural used substantivally; English idiom naturally takes the
    article here.
- source_word: τὴν τόλμαν
  chosen: her boldness
  alternatives:
  - her courage
  - her audacity
  lexicon: LSJ
  rationale: τόλμα can denote boldness, daring, or audacity. 'Boldness' fits the context
    of Judith's striking action without forcing either a positive ('courage') or overly
    negative ('audacity') evaluation.
- source_word: Μῆδοι
  chosen: the Medes
  alternatives:
  - Medes
  lexicon: LSJ
  rationale: Ethnic plural rendered straightforwardly with English article for natural
    style.
- source_word: τὸ θράσος
  chosen: her daring
  alternatives:
  - her audacity
  - her insolence
  - her boldness
  lexicon: LSJ
  rationale: θράσος often carries the sense of bold daring and can shade toward audacity.
    To avoid repeating 'boldness' for τόλμα while preserving the semantic overlap,
    'daring' gives a natural English distinction.
- source_word: ἐρράχθησαν
  chosen: were shaken
  alternatives:
  - were troubled
  - were thrown into confusion
  lexicon: LSJ
  rationale: Passive aorist indicating being disturbed or shaken. 'Were shaken' matches
    the fear-response parallelism with ἔφριξαν and keeps the imagery concise and strong.
