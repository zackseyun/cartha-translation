translation:
  text: And Judith dedicated to God all the equipment of Holofernes that the people
    had given her, and she gave to God as a dedicated offering the canopy that she
    had taken for herself from his bedchamber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mosquito net' or 'bed-curtain' for 'canopy' (Greek κωνώπιον).
    reason: lexical_alternative
  - marker: b
    text: The phrase 'as an offering' translates a term that can more specifically
      mean 'as a votive offering' or 'as a thing dedicated to God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέθηκεν
  chosen: dedicated
  alternatives:
  - offered
  - set apart as a votive offering
  - presented
  lexicon: LSJ
  rationale: The verb ἀνατίθημι/ἀνατίθημι in this context denotes dedicating something
    as an offering to a deity. 'Dedicated' preserves the cultic sense without over-specifying
    ritual mechanics. Because the verse later uses ἀνάθημα explicitly, varying the
    English here avoids awkward repetition while keeping the semantic link.
- source_word: σκεύη
  chosen: equipment
  alternatives:
  - gear
  - articles
  - vessels
  - possessions
  lexicon: LSJ
  rationale: σκεύη can mean implements, gear, or articles. In the military-plunder
    context of Holofernes' belongings, 'equipment' best captures the broad sense of
    his effects without implying only household vessels.
- source_word: κωνώπιον
  chosen: canopy
  alternatives:
  - mosquito net
  - bed-curtain
  - netting
  lexicon: LSJ
  rationale: κωνώπιον literally refers to a mosquito-net or bed-canopy. Since it is
    taken 'from his bedchamber' and functions here as a notable furnishing, 'canopy'
    is natural English and fits the likely bed-hanging sense. The more specific 'mosquito
    net' is possible and worth preserving in a footnote.
- source_word: κοιτών
  chosen: bedchamber
  alternatives:
  - bedroom
  - sleeping room
  - chamber
  lexicon: LSJ
  rationale: κοιτών denotes a sleeping room or bedchamber. 'Bedchamber' preserves
    the elevated but still intelligible tone appropriate to the narrative and matches
    the furnishing context.
- source_word: εἰς ἀνάθημα
  chosen: as an offering
  alternatives:
  - as a votive offering
  - for dedication
  - as a dedicated gift
  lexicon: LSJ
  rationale: ἀνάθημα here is a thing devoted to God. 'As an offering' is readable
    modern English; the more technical 'votive offering' is accurate but less accessible,
    so it is preserved as an alternative.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - for God
  lexicon: LSJ
  rationale: The dative marks the recipient of the dedication. 'To God' is the most
    straightforward rendering.
