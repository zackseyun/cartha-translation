theological_decisions:
- issue: Cultic language of dedication
  chosen_reading: Render Judith's action as dedicating spoils and a bed-canopy to
    God without importing later sacrificial categories.
  alternative_readings:
  - Translate more technically as 'votive offering' throughout
  - Translate more generally as 'gave to God'
  rationale: The Greek uses both ἀνέθηκεν and ἀνάθημα, indicating consecration/dedication
    of objects to God. The translation preserves this religious act while avoiding
    doctrinal over-interpretation about temple procedure or sacrifice.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source meaning without
    importing doctrinal claims'
