theological_decisions:
- issue: Rendering of Judith's social status and that of her attendant in a deuterocanonical
    narrative
  chosen_reading: Use 'maidservant' in the main text while making the manumission
    sense explicit with 'set ... free.'
  alternative_readings:
  - female slave
  - servant girl
  rationale: The verse is not a doctrinally contested passage, but social-status language
    matters. The Greek ἅβρα is not the standard δοῦλος term from the contested-terms
    table, yet the act of freeing her indicates real dependency. The chosen rendering
    balances lexical accuracy, readability, and the narrative register, while the
    rationale documents the bonded implication.
