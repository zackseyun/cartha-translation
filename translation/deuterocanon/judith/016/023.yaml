translation:
  text: And she continued to prosper greatly, and she grew old in her husband's house
    for one hundred five years, and she set her maidservant free. Then she died in
    Bethulia, and they buried her in the cave of her husband Manasseh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she became very great indeed'; the Greek literally speaks of her 'advancing'
      or 'becoming great' with strong intensification.
    reason: lexical_alternative
  - marker: b
    text: The Greek term for the woman Judith freed denotes a female attendant or
      maid; because Judith 'set her free,' the verse implies a servile dependent status.
    reason: lexical_alternative
lexical_decisions:
- source_word: προβαίνουσα
  chosen: continued to prosper
  alternatives:
  - advanced
  - went on
  - increased
  lexicon: LSJ
  rationale: The participle from προβαίνω literally denotes going forward or advancing.
    In this context, with μεγάλη σφόδρα, it describes Judith's continuing flourishing
    or prominence after the events narrated. 'Continued to prosper' captures the idiomatic
    sense in readable English better than the overly literal 'advanced.'
- source_word: μεγάλη σφόδρα
  chosen: greatly
  alternatives:
  - very great
  - exceedingly great
  lexicon: LSJ
  rationale: The phrase intensifies her condition. Rather than produce awkward English
    such as 'was becoming very great,' the adverbial 'greatly' works with 'continued
    to prosper' to convey strong intensification.
- source_word: ἐγήρασεν
  chosen: grew old
  alternatives:
  - became old
  - lived to old age
  lexicon: LSJ
  rationale: The verb straightforwardly means 'grew old' or 'became old.' 'Grew old'
    is natural English and preserves the focus on her longevity.
- source_word: ἐν τῷ οἴκῳ τοῦ ἀνδρὸς αὐτῆς
  chosen: in her husband's house
  alternatives:
  - in the house of her husband
  - in her husband's household
  lexicon: LSJ
  rationale: A formal but clear rendering of the locative phrase. 'House' can imply
    household, but here the traditional social setting is adequately conveyed without
    paraphrase.
- source_word: ἔτη ἑκατὸν πέντε
  chosen: to the age of one hundred five years
  alternatives:
  - one hundred and five years
  - for one hundred five years
  lexicon: LSJ
  rationale: The Greek gives her age. 'To the age of one hundred five years' makes
    explicit that this is lifespan, avoiding ambiguity that she merely remained in
    the house for that duration.
- source_word: ἀφῆκεν
  chosen: set ... free
  alternatives:
  - released
  - let ... go
  lexicon: LSJ
  rationale: ἀφίημι here has the sense of releasing from a dependent status. 'Set
    free' is the clearest idiomatic English rendering.
- source_word: τὴν ἅβραν αὐτῆς
  chosen: her maidservant
  alternatives:
  - her female slave
  - her servant girl
  lexicon: LSJ
  rationale: ἅβρα denotes a female attendant or maid. Because the immediate context
    is manumission ('set free'), the woman is clearly in dependent servile status.
    'Maidservant' preserves the female domestic role while fitting the narrative register;
    'female slave' is possible and the freedom language signals the bonded condition.
- source_word: εἰς Βαιτυλουὰ
  chosen: in Bethulia
  alternatives:
  - at Bethulia
  lexicon: LSJ
  rationale: Although εἰς often means 'into,' with verbs of dying in later Greek it
    can function idiomatically for location. 'In Bethulia' is the natural English
    sense here.
- source_word: σπηλαίῳ
  chosen: cave
  alternatives:
  - tomb-cave
  - sepulchral cave
  lexicon: LSJ
  rationale: The noun means 'cave.' Since the burial context already supplies funerary
    sense, the simple rendering is sufficient.
