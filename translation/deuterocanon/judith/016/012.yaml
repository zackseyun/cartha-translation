  confidence: high
  validation: major_mismatch
translation:
  text: The sons of young women pierced them through, and wounded them like runaway
    children; they perished before the battle line of my Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wounded them like children of deserters.' The Greek phrase with 'runaway/deserter'
      is difficult and may evoke weakness, instability, or disgrace.
    reason: lexical_alternative
  - marker: b
    text: Or 'they perished from the battle line of my Lord' / 'out of the battle
      array of my Lord.' The prepositional phrase is somewhat difficult in Greek.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ κορασίων
  chosen: The sons of young women
  alternatives:
  - sons of maidens
  - boys of girls
  - children of maidens
  lexicon: LSJ
  rationale: A formally close rendering preserves the striking and somewhat ironic
    image in the Greek. κοράσιον denotes a young girl/maiden; rendering it as 'young
    women' is readable modern English while keeping the maternal relation explicit.
    The phrase likely emphasizes that even those born from the vulnerable or youthful
    defeated the enemy.
- source_word: κατεκέντησαν
  chosen: pierced them through
  alternatives:
  - stabbed them
  - transfixed them
  - pierced them
  lexicon: LSJ
  rationale: The compound verb intensifies simple piercing; 'pierced them through'
    captures the force without becoming overly technical.
- source_word: παῖδας
  chosen: children
  alternatives:
  - boys
  - little ones
  - servants
  lexicon: LSJ
  rationale: παῖς can mean child, boy, or servant depending on context. Here the comparison
    is with immature or weak persons in battle, so 'children' best fits the imagery.
- source_word: αὐτομολούντων
  chosen: runaway
  alternatives:
  - deserters'
  - fugitives'
  - rebels'
  lexicon: LSJ
  rationale: The participle comes from a verb used of deserting or going over to another
    side. In this simile it most naturally conveys instability and flight; 'runaway'
    is concise and vivid. Because the exact nuance could be heard as 'deserters,'
    that alternative is preserved in a footnote.
- source_word: ἐτίτρωσκον
  chosen: wounded
  alternatives:
  - kept wounding
  - struck
  - injured
  lexicon: LSJ
  rationale: The imperfect suggests repeated action, but English can convey the sense
    naturally with 'wounded' in coordination with the prior verb. 'Kept wounding'
    would be more explicit but less smooth.
- source_word: ἀπώλοντο
  chosen: they perished
  alternatives:
  - they were destroyed
  - they died
  lexicon: LSJ
  rationale: The middle/passive form here is well represented by 'they perished,'
    which preserves the result without over-specifying agency.
- source_word: ἐκ παρατάξεως
  chosen: before the battle line
  alternatives:
  - from the battle line
  - out of the battle array
  - in the battle formation
  lexicon: LSJ
  rationale: παράταξις refers to battle order or battle line. With ἐκ, the phrase
    can be understood spatially in relation to the line of battle. 'Before the battle
    line' gives a natural English sense of perishing in the face of the Lord's array,
    though the preposition is somewhat difficult and admits alternatives.
- source_word: κυρίου μου
  chosen: my Lord
  alternatives:
  - the Lord my God
  - my master
  lexicon: LSJ
  rationale: κύριος is rendered by the project's default 'Lord.' The possessive 'my'
    is explicit in the Greek and should be retained. Nothing in this verse itself
    warrants expanding to 'God.'
