id: JDT.16.12
reference: Judith 16:12
source:
  edition: lxx-swete-1909
  text: υἱοὶ κορασίων κατεκέντησαν αὐτούς, καὶ ὡς παῖδας αὐτομολούντων ἐτίτρωσκον·
    ἀπώλοντο ἐκ παρατάξεως κυρίου μου.
  language: Greek
  pages:
  - 798
  - 799
