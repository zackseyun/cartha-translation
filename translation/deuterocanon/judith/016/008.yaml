id: JDT.16.8
reference: Judith 16:8
source:
  edition: lxx-swete-1909
  text: καὶ ἐδήσατο τὰς τρίχας αὐτῆς ἐν μίτρᾳ, καὶ ἔλαβεν στολὴν λινῆν εἰς ἀπάτην
    αὐτοῦ.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 828
  - 829
  - 830
  - 831
  confidence: high
  validation: major_mismatch
translation:
  text: And she bound up her hair with a headband, and took a linen garment to deceive
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for his deception.' The Greek phrase can be rendered more literally,
      but the sense in context is that she took the garment in order to deceive him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδήσατο
  chosen: bound up
  alternatives:
  - bound
  - tied up
  lexicon: LSJ
  rationale: Middle form of δέω here describes fastening or arranging the hair; 'bound
    up' conveys the act naturally in English without over-paraphrasing.
- source_word: τὰς τρίχας
  chosen: her hair
  alternatives:
  - the hairs of her head
  - her tresses
  lexicon: LSJ
  rationale: Though literally plural ('the hairs'), idiomatic English uses the collective
    singular 'hair.'
- source_word: μίτρᾳ
  chosen: headband
  alternatives:
  - turban
  - headdress
  - mitre
  lexicon: LSJ
  rationale: μίτρα denotes a head-wrap or band used by women; 'headband' is clear
    modern English and fits the immediate context of binding up hair better than the
    more misleading 'mitre' or the bulkier 'turban.'
- source_word: ἔλαβεν
  chosen: took
  alternatives:
  - put on
  - received
  lexicon: LSJ
  rationale: The Greek verb is literally 'took.' In context it implies taking up or
    donning the garment, but 'took' stays closer to the source while remaining intelligible.
- source_word: στολὴν λινῆν
  chosen: a linen garment
  alternatives:
  - a linen robe
  - linen clothing
  lexicon: LSJ
  rationale: στολή is a garment or robe; 'garment' is broad enough to preserve the
    Greek without specifying more than the text states. λινή is rendered 'linen.'
- source_word: εἰς ἀπάτην αὐτοῦ
  chosen: to deceive him
  alternatives:
  - for his deception
  - as a deception for him
  - to beguile him
  lexicon: LSJ
  rationale: The preposition εἰς with ἀπάτη expresses purpose or result. Given the
    narrative context, 'to deceive him' is the most natural English rendering and
    makes explicit the object indicated by αὐτοῦ.
