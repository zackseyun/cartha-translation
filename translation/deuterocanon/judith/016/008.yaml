theological_decisions:
- issue: Moral characterization of Judith's action
  chosen_reading: Render the clause straightforwardly as an act aimed 'to deceive
    him' without softening or moralizing.
  alternative_readings:
  - for his deception
  - to beguile him
  rationale: The Greek explicitly uses ἀπάτη language. The translation should preserve
    the narrative's frank description of strategic deception without importing approval
    or disapproval beyond the text.
