id: JDT.16.9
reference: Judith 16:9
source:
  edition: lxx-swete-1909
  text: τὸ σανδάλιον αὐτῆς ἥρπασε ὀφθαλμὸν αὐτοῦ, καὶ τὸ κάλλος αὐτῆς ᾐχμαλώτισεν
    ψυχὴν αὐτοῦ· διῆλθεν ὁ ἀκινάκης τὸν τράχηλον αὐτοῦ.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 828
  - 829
  - 830
  - 831
  confidence: high
  validation: major_mismatch
translation:
  text: Her sandal captured his eye, and her beauty took his soul captive; the sword
    passed through his neck.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dagger passed through his neck'; the Greek ἀκινάκης refers to a
      short sword or dagger of eastern type.
    reason: lexical_alternative
lexical_decisions:
- source_word: σανδάλιον
  chosen: sandal
  alternatives:
  - shoe
  lexicon: LSJ
  rationale: The noun refers specifically to a sandal rather than generic footwear.
    Retaining 'sandal' preserves the concrete detail of Judith's adornment.
- source_word: ἥρπασε
  chosen: captured
  alternatives:
  - snatched
  - seized
  - ravished
  lexicon: LSJ
  rationale: The verb literally means 'snatched/seized.' In this context with 'eye'
    as object, 'captured' communicates forceful visual attraction in idiomatic English
    without sounding awkward.
- source_word: ὀφθαλμὸν
  chosen: eye
  alternatives:
  - sight
  - attention
  lexicon: LSJ
  rationale: The singular 'eye' is retained because the Greek is singular and likely
    idiomatic for his gaze or visual attention.
- source_word: κάλλος
  chosen: beauty
  alternatives:
  - loveliness
  - splendor
  lexicon: LSJ
  rationale: '''Beauty'' is the most direct and natural rendering for Judith''s physical
    attractiveness in context.'
- source_word: ᾐχμαλώτισεν
  chosen: took ... captive
  alternatives:
  - captured
  - enslaved
  lexicon: LSJ
  rationale: The verb is built on the idea of taking captive in war. Rendering it
    as 'took his soul captive' preserves the metaphor and echoes the military imagery
    of conquest.
- source_word: ψυχὴν
  chosen: soul
  alternatives:
  - life
  - self
  - heart
  lexicon: LSJ
  rationale: Although ψυχή can mean 'life' or 'self,' here 'soul' best preserves the
    elevated poetic diction and the sense of his inner being being overcome. 'Heart'
    would import a different Greek concept.
- source_word: ἀκινάκης
  chosen: sword
  alternatives:
  - dagger
  - akinakes
  lexicon: LSJ
  rationale: The word denotes a short sword or dagger of eastern type. 'Sword' is
    chosen for readability in the main text, while the more specific 'dagger' is preserved
    in a footnote as a lexical alternative.
- source_word: διῆλθεν
  chosen: passed through
  alternatives:
  - went through
  - pierced
  lexicon: LSJ
  rationale: The verb literally means 'went/passed through.' 'Passed through' is a
    close and readable rendering; 'pierced' is interpretive and less formally tied
    to the Greek wording.
- source_word: τράχηλον
  chosen: neck
  alternatives:
  - throat
  lexicon: LSJ
  rationale: The noun normally means 'neck.' 'Throat' is possible in English contextually,
    but 'neck' is the more direct lexical equivalent.
