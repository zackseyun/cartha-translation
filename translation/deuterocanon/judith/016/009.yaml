theological_decisions:
- issue: Metaphorical force of the two captivity verbs in a poetic victory song
  chosen_reading: Retain conquest imagery in both clauses ('captured his eye' / 'took
    his soul captive')
  alternative_readings:
  - Smooth to idiomatic attraction language such as 'caught his attention' and 'won
    his heart'
  rationale: The verse is poetic and intentionally uses forceful conquest language
    to describe Holofernes being overcome before his death. Preserving that imagery
    respects the Greek rhetoric and avoids romanticizing the scene.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence with original-language primacy'
