translation:
  text: They themselves and their wives and their little children and their livestock—and
    every resident alien or hired worker and purchased slave among them—put sackcloth
    on their waists.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sojourner' for 'resident alien.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'bought with silver'; that is, a purchased slave.
    reason: lexical_alternative
  - marker: c
    text: That is, they donned sackcloth as a sign of mourning or supplication.
    reason: cultural_note
lexical_decisions:
- source_word: νήπια
  chosen: little children
  alternatives:
  - infants
  - young children
  lexicon: LSJ
  rationale: νήπια denotes very young children; 'little children' is natural English
    that preserves the sense without restricting it as narrowly as 'infants'.
- source_word: κτήνη
  chosen: livestock
  alternatives:
  - cattle
  - beasts
  lexicon: LSJ
  rationale: κτήνη refers broadly to domesticated animals/property animals. 'Livestock'
    is the clearest modern collective term.
- source_word: πάροικος
  chosen: resident alien
  alternatives:
  - sojourner
  - foreigner
  lexicon: LSJ
  rationale: πάροικος denotes a non-native living among a people. 'Resident alien'
    best preserves the social-legal nuance more precisely than the broader 'foreigner'.
- source_word: μισθωτός
  chosen: hired worker
  alternatives:
  - hireling
  - hired servant
  lexicon: LSJ
  rationale: μισθωτός is one who works for wages. 'Hired worker' is readable modern
    English and avoids archaic 'hireling'.
- source_word: ἀργυρώνητος
  chosen: purchased slave
  alternatives:
  - bought slave
  - slave bought with silver
  lexicon: LSJ
  rationale: The term literally means 'bought with silver,' i.e., purchased as property.
    In keeping with the project's doctrine on bonded-status language, 'purchased slave'
    makes the status explicit rather than softening it to 'servant'.
- source_word: ἐπέθεντο σάκκους
  chosen: put sackcloth on
  alternatives:
  - clothed themselves with sackcloth
  - laid sackcloth upon
  lexicon: LSJ
  rationale: The idiom describes donning sackcloth as a sign of mourning/humiliation.
    'Put sackcloth on' is direct and idiomatic in modern English while staying close
    to the Greek.
- source_word: ἐπὶ τὰς ὀσφύας αὐτῶν
  chosen: on their waists
  alternatives:
  - around their loins
  - on their hips
  lexicon: LSJ
  rationale: ὀσφύες refers to the loins/waist area. 'On their waists' communicates
    the body location in contemporary English without archaic diction.
