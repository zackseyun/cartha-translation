  text: καὶ ἀπέστειλαν εἰς πᾶν ὅριον Σαμαρίας καὶ Κωνὰ καὶ Βαιθωρὼν καὶ Βαιλμὰιν καὶ
    Ἰερειχὼ καὶ εἰς Χωβὰ καὶ Αἰσωρὰ καὶ τὸν αὐλῶνα Σαλήμ,
  language: Greek
  pages:
