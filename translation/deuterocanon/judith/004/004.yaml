  - 806
  - 807
  confidence: high
  validation: minor_mismatch
translation:
  text: And they sent word into all the territory of Samaria, and to Kona, and Beth-horon,
    and Belmaim, and Jericho, and to Choba, and Aisora, and the valley of Salem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout every district of Samaria'; the Greek term can refer to a
      border, district, or territory.
    reason: lexical_alternative
  - marker: b
    text: Or 'the plain of Salem'; the Greek αὐλών can denote a valley, glen, or plain-like
      hollow.
    reason: lexical_alternative
  - marker: c
    text: Several place names in this verse are preserved by transliteration because
      their exact identification is uncertain from the Greek form alone.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπέστειλαν
  chosen: they sent word
  alternatives:
  - they sent
  - they dispatched
  lexicon: BDAG
  rationale: The verb means 'they sent.' In this context, with a list of destinations
    and no explicit object stated in the Greek, English idiom is clearer with 'sent
    word,' making implicit the message-bearing function without adding more content
    than the context warrants.
- source_word: εἰς πᾶν ὅριον Σαμαρίας
  chosen: into all the territory of Samaria
  alternatives:
  - to every border of Samaria
  - throughout all the region of Samaria
  lexicon: LSJ
  rationale: ὅριον can denote border, district, or territory. Here, with πᾶν and followed
    by place names receiving the message, 'all the territory of Samaria' best captures
    the regional sense rather than a literal boundary line.
- source_word: Κωνὰ
  chosen: Kona
  alternatives:
  - Cona
  - Konah
  lexicon: LSJ
  rationale: This is a place name transliterated from the Greek form. 'Kona' is a
    straightforward English transliteration that preserves the source form without
    speculative identification.
- source_word: Βαιθωρὼν
  chosen: Beth-horon
  alternatives:
  - Beth Horon
  lexicon: LSJ
  rationale: Standard transliteration of the place name; hyphenation helps readability
    and reflects the compound form familiar from biblical geography.
- source_word: Βαιλμὰιν
  chosen: Belmaim
  alternatives:
  - Bailmain
  - Baelmain
  lexicon: LSJ
  rationale: The Greek spelling is represented by a direct transliteration. 'Belmaim'
    gives a readable English form while staying close to the source.
- source_word: Ἰερειχὼ
  chosen: Jericho
  alternatives:
  - Jerichoe
  lexicon: LSJ
  rationale: This is the standard English form of the well-known place name corresponding
    to the Greek spelling.
- source_word: Χωβὰ
  chosen: Choba
  alternatives:
  - Hoba
  - Khoba
  lexicon: LSJ
  rationale: A direct transliteration of the Greek place name. 'Ch' is used to represent
    chi in a conventional biblical-style transliteration.
- source_word: Αἰσωρὰ
  chosen: Aisora
  alternatives:
  - Aisorah
  - Esora
  lexicon: LSJ
  rationale: The place name is uncertain in identification, so a close transliteration
    is preferable to harmonizing with another known site.
- source_word: τὸν αὐλῶνα Σαλήμ
  chosen: the valley of Salem
  alternatives:
  - the plain of Salem
  - the glen of Salem
  lexicon: LSJ
  rationale: αὐλών commonly denotes a valley, glen, or mountain-pass hollow. 'Valley'
    is the clearest natural English choice here, though 'plain' is possible in some
    contexts.
