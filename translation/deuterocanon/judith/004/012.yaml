theological_decisions:
- issue: Gendered enumeration of the worshiping assembly
  chosen_reading: Retain the explicit sequence 'every man of Israel, and the women
    and the children' rather than collapsing to a gender-neutral collective.
  alternative_readings:
  - all the Israelites
  rationale: The Greek intentionally enumerates men, women, and children. In keeping
    with the doctrine's gender-accurate policy, the translation preserves that structure
    rather than smoothing it into an inclusive collective that omits the source's
    rhetorical detail.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of κύριος
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The project's default for κύριος is 'Lord.' In this deuterocanonical
    Jewish context, 'the Lord' clearly refers to Israel's God and should be translated
    rather than transliterated or replaced with a more interpretive title.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
