translation:
  text: And every man of Israel, and the women and the children, those dwelling in
    Jerusalem, fell on their faces before the temple, and put ashes on their heads,
    and spread out their sackcloth before the Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stretched out their sackcloth before the Lord.' The Greek expression
      is somewhat unusual, and the exact physical action may be either spreading out
      sackcloth garments or extending themselves in sackcloth as a sign of mourning
      and supplication.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ἀνὴρ Ἰσραήλ
  chosen: every man of Israel
  alternatives:
  - every Israelite man
  - all the men of Israel
  lexicon: LSJ
  rationale: ἀνήρ is specifically male rather than generic 'person'; the following
    separate mention of γυναῖκες and παιδία confirms a gender-specific sense. 'Every
    man of Israel' preserves the distributive force of πᾶς and the source's gender-accurate
    listing.
- source_word: γυνή
  chosen: women
  alternatives:
  - wives
  - woman
  lexicon: LSJ
  rationale: Plural sense in coordination with ἀνήρ and παιδία is best rendered 'women.'
    'Wives' would over-specify marital status not required by the context.
- source_word: παιδία
  chosen: children
  alternatives:
  - little children
  - young ones
  lexicon: LSJ
  rationale: The term denotes children broadly here; 'little children' would narrow
    the reference beyond what the Greek states.
- source_word: οἱ κατοικοῦντες ἐν Ἰερουσαλήμ
  chosen: those dwelling in Jerusalem
  alternatives:
  - those living in Jerusalem
  - the inhabitants of Jerusalem
  lexicon: LSJ
  rationale: The participial phrase is rendered transparently and naturally. 'Those
    dwelling' keeps the verbal nuance without becoming wooden.
- source_word: ἔπεσον κατὰ πρόσωπον
  chosen: fell on their faces
  alternatives:
  - fell face down
  - prostrated themselves
  lexicon: LSJ
  rationale: This idiom expresses prostration. 'Fell on their faces' is both literal
    and idiomatic in English, preserving the bodily posture of supplication.
- source_word: τοῦ ναοῦ
  chosen: before the temple
  alternatives:
  - before the sanctuary
  - at the temple
  lexicon: LSJ
  rationale: Although the genitive after κατὰ πρόσωπον is somewhat compressed in this
    Greek, the sense is locative/orientational in context. 'Before the temple' communicates
    that they prostrated themselves in front of the temple area. 'Sanctuary' is possible
    but 'temple' is the more straightforward public-facing term.
- source_word: ἐσποδώσαντο τὰς κεφαλὰς αὐτῶν
  chosen: put ashes on their heads
  alternatives:
  - covered their heads with ashes
  - cast ashes on their heads
  lexicon: LSJ
  rationale: The verb denotes putting on or strewing with ashes as a mourning gesture.
    'Put ashes on their heads' is clear modern English and preserves the ritual action.
- source_word: ἐξέτειναν τοὺς σάκκους αὐτῶν
  chosen: spread out their sackcloth
  alternatives:
  - stretched out their sackcloth
  - laid out their sackcloth garments
  lexicon: LSJ
  rationale: The phrase is unusual but likely refers to extending or laying out sackcloth
    in a posture of supplication before God. 'Spread out' is natural English and preserves
    the concrete action without over-interpreting.
- source_word: κατὰ πρόσωπον Κυρίου
  chosen: before the Lord
  alternatives:
  - before the face of the Lord
  - in the presence of the Lord
  lexicon: LSJ
  rationale: This is a standard biblical idiom for being in God's presence. 'Before
    the Lord' is the most natural equivalent and aligns with the project's default
    rendering of κύριος.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Per doctrine, κύριος defaults to 'Lord.' The article is natural in English
    here because the reference is to Israel's God.
