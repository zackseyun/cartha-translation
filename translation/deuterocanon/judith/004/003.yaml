theological_decisions:
- issue: Rendering cultic restoration language for temple objects and space
  chosen_reading: Used 'had been consecrated after the defilement' to preserve the
    sequence of profanation followed by restoration without importing extra historical
    detail.
  alternative_readings:
  - had been sanctified from the profanation
  - had been purified after the desecration
  rationale: The Greek states that the vessels, altar, and house stood in a state
    of having been made holy in relation to prior profanation. 'Consecrated after
    the defilement' communicates the restoration clearly while avoiding over-interpretation
    of the exact ritual process.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering ὁ οἶκος in temple context
  chosen_reading: the house
  alternative_readings:
  - the temple
  rationale: Although the referent is plainly the temple, the Greek uses the reverential
    idiom 'the house.' Retaining 'the house' respects original-language primacy while
    remaining understandable in context alongside 'altar' and 'vessels.'
  doctrine_reference: Translation philosophy §§1, 6
