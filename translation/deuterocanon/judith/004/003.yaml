translation:
  text: for they had only recently come up from the captivity, and all the people
    of Judea had only recently been gathered together, and the vessels and the altar
    and the house had been consecrated after the defilement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from exile' for 'from the captivity.'
    reason: lexical_alternative
  - marker: b
    text: Or 'had been consecrated after the desecration'; the Greek contrasts prior
      profanation with subsequent restoration to holiness.
    reason: lexical_alternative
  - marker: c
    text: '''The house'' refers to the temple.'
    reason: cultural_note
lexical_decisions:
- source_word: προσφάτως
  chosen: only recently
  alternatives:
  - recently
  - not long before
  lexicon: LSJ
  rationale: The adverb emphasizes nearness in time. 'Only recently' brings out the
    stress of recency in natural English.
- source_word: ἀναβεβηκότες
  chosen: come up
  alternatives:
  - gone up
  - returned
  lexicon: LSJ
  rationale: The perfect participle of ἀναβαίνω literally means 'having gone up.'
    In Judean geographic and pilgrimage idiom, 'come up' is a natural English equivalent
    and preserves the spatial nuance better than the more interpretive 'returned.'
- source_word: αἰχμαλωσίας
  chosen: the captivity
  alternatives:
  - captivity
  - exile
  lexicon: LSJ
  rationale: The article supports a specific, known captivity. 'The captivity' preserves
    that specificity and echoes the historical setting more closely than the broader
    'exile,' though 'exile' is a viable contextual alternative.
- source_word: νεωστί
  chosen: only recently
  alternatives:
  - newly
  - recently
  lexicon: LSJ
  rationale: This second adverb of recency parallels προσφάτως. Rendering both with
    similar English reflects the Greek emphasis that these restorations were very
    recent.
- source_word: συνελέλεκτο
  chosen: had been gathered together
  alternatives:
  - had been assembled
  - had been collected
  lexicon: LSJ
  rationale: The pluperfect/passive sense indicates the people had been brought together
    as a community. 'Gathered together' is idiomatic and preserves the collective
    restoration motif.
- source_word: σκεύη
  chosen: the vessels
  alternatives:
  - the utensils
  - the sacred vessels
  lexicon: LSJ
  rationale: In temple context, σκεύη refers to cultic implements. 'Vessels' is the
    standard concise rendering; 'sacred' is implied by context and need not be added
    in the main text.
- source_word: θυσιαστήριον
  chosen: the altar
  lexicon: LSJ
  rationale: Standard rendering for the sacrificial altar; no special ambiguity here.
- source_word: ὁ οἶκος
  chosen: the house
  alternatives:
  - the temple
  lexicon: LSJ
  rationale: Literally 'the house.' In context it refers to the temple, but 'the house'
    preserves the source wording and its reverential idiom without obscuring meaning.
- source_word: βεβηλώσεως
  chosen: the defilement
  alternatives:
  - profanation
  - desecration
  lexicon: LSJ
  rationale: The noun denotes profaning or making common. 'Defilement' is readable
    modern English and fits the purification/consecration contrast. 'Desecration'
    is a strong viable alternative preserved in a footnote.
- source_word: ἡγιασμένα
  chosen: had been consecrated
  alternatives:
  - had been sanctified
  - had been made holy
  lexicon: LSJ
  rationale: The perfect participle/passive indicates completed dedication to holiness.
    'Consecrated' fits temple objects and space in contemporary English better than
    the more technical 'sanctified.'
