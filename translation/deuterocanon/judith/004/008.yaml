translation:
  text: telling them to seize the mountain passes, because through them was the entrance
    into Judea; and it was easy to hold them back as they came up, since the approach
    was so narrow that all the men could go only two abreast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the ascents of the mountainous region,' referring to the
      uphill routes or passes through the hill country.
    reason: lexical_alternative
  - marker: b
    text: The final Greek phrase is terse and difficult; the translation takes it
      to mean that the route was narrow enough for men to advance only two abreast.
    reason: alternative_reading
lexical_decisions:
- source_word: διακατασχεῖν
  chosen: to seize
  alternatives:
  - to occupy
  - to secure
  - to hold firmly
  lexicon: LSJ
  rationale: The infinitive expresses taking control of strategic terrain. 'Seize'
    is concise and military in tone; 'occupy' is possible but slightly more static,
    while the following clause already explains the defensive purpose.
- source_word: τὰς ἀναβάσεις τῆς ὀρεινῆς
  chosen: the mountain passes
  alternatives:
  - the ascents of the hill country
  - the approaches up the mountains
  lexicon: LSJ
  rationale: Literally 'the ascents of the mountainous region/hill country.' In context
    these are the upward routes through mountainous terrain that function as passes.
    'Mountain passes' gives the strategic sense in natural English without losing
    the topographical force.
- source_word: ἡ εἴσοδος εἰς τὴν Ἰουδαίαν
  chosen: the entrance into Judea
  alternatives:
  - the way into Judea
  - the entry into Judea
  lexicon: LSJ
  rationale: A straightforward rendering of the noun phrase. 'Entrance' preserves
    the concrete sense of access point; 'way into' is smoother but slightly more interpretive.
- source_word: εὐχερῶς
  chosen: easy
  alternatives:
  - readily
  - with ease
  lexicon: LSJ
  rationale: The adverb indicates that preventing the enemy there would be relatively
    easy because of the terrain. 'It was easy' is idiomatic with the infinitive construction
    in English.
- source_word: διακωλῦσαι
  chosen: to hold them back
  alternatives:
  - to hinder them
  - to prevent them
  - to block them
  lexicon: LSJ
  rationale: The verb means to hinder or prevent. 'Hold them back' fits the military
    movement context of an advancing force better than the more abstract 'hinder.'
- source_word: προσβαίνοντας
  chosen: as they came up
  alternatives:
  - as they advanced
  - as they attacked
  - as they approached uphill
  lexicon: LSJ
  rationale: The participle literally refers to coming toward/up against. Given the
    preceding 'ascents' and mountain terrain, 'came up' preserves both motion and
    topography without overcommitting to a technical military sense like 'attacked.'
- source_word: στενῆς τῆς προσβάσεως οὔσης
  chosen: since the approach was narrow
  alternatives:
  - because the access was confined
  - the pass being narrow
  lexicon: LSJ
  rationale: This genitive absolute gives the reason for the ease of defense. 'Approach'
    is a natural rendering of πρόσβασις here, referring to the route of access.
- source_word: ἐπʼ ἄνδρας τοὺς πάντας δύο
  chosen: for all the men to go two abreast
  alternatives:
  - for only two men at a time
  - by two men in all
  - for two men against all
  lexicon: LSJ
  rationale: 'The transmitted Greek is compressed and somewhat awkward, but in context
    it describes the narrowness of the route: only two men could proceed side by side.
    ''Two abreast'' captures the likely sense in idiomatic English while acknowledging
    the masculine ἄνδρας with ''men.'''
