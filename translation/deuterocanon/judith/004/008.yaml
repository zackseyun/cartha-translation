id: JDT.4.8
reference: Judith 4:8
source:
  edition: lxx-swete-1909
  text: λέγων διακατασχεῖν τὰς ἀναβάσεις τῆς ὀρεινῆς, ὅτι διʼ αὐτῶν ἦν ἡ εἴσοδος εἰς
    τὴν Ἰουδαίαν· καὶ ἦν εὐχερῶς διακωλῦσαι αὐτοὺς προσβαίνοντας, στενῆς τῆς προσβάσεως
    οὔσης, ἐπʼ ἄνδρας τοὺς πάντας δύο.
