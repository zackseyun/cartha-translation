id: JDT.4.15
reference: Judith 4:15
source:
  edition: lxx-swete-1909
  text: καὶ Ἰωακεὶμ ὁ ἱερεὺς ὁ μέγας καὶ πάντες οἱ παρεστηκότες ἐνώπιον Κυρίου, ἱερεῖς
    καὶ οἱ λειτουργοῦντες Κυρίῳ, σάκκους περιεζωσμένοι τὰς ὀσφύας αὐτῶν, προσέφερον
    τὴν ὁλοκαύτωσιν τοῦ ἐνδελεχισμοῦ καὶ τὰς εὐχὰς καὶ τὰ ἑκούσια δόματα τοῦ λαοῦ,
  language: Greek
  pages:
