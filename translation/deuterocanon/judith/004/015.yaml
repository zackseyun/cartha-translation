theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek cultic context
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  - Master
  rationale: The project default for κύριος is 'Lord.' Although the referent is Israel's
    God, the source text is Greek and does not itself write the Tetragrammaton here.
    'Lord' preserves the title while remaining consistent with doctrine.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Cultic term εὐχαί in coordination with sacrificial language
  chosen_reading: vows
  alternative_readings:
  - prayers
  - vow offerings
  rationale: Because εὐχαί appears alongside the whole burnt offering and freewill
    gifts of the people, the cultic sense 'vows' is more likely than general 'prayers.'
    This avoids flattening a sacrificial/legal nuance into a purely devotional one.
