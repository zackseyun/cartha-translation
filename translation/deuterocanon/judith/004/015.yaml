translation:
  text: And Joakim the high priest, and all who stood before the Lord—the priests
    and those ministering to the Lord, with sackcloth girded around their waists—were
    offering the regular whole burnt offering, and the vows, and the freewill gifts
    of the people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the continual whole burnt offering'; the Greek term τοῦ ἐνδελεχισμοῦ
      carries the sense of something regular or continual.
    reason: lexical_alternative
  - marker: b
    text: Or 'the prayers,' though in this sacrificial context the Greek likely refers
      to vows or vowed offerings rather than prayer in general.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰωακεὶμ
  chosen: Joakim
  alternatives:
  - Jehoiakim
  - Joachim
  rationale: Personal names are transliterated rather than translated. 'Joakim' closely
    reflects the Greek form Ἰωακεὶμ in Swete.
- source_word: ὁ ἱερεὺς ὁ μέγας
  chosen: the high priest
  alternatives:
  - the great priest
  - the chief priest
  lexicon: LSJ
  rationale: Although literally 'the priest, the great one,' this is the standard
    Greek expression for the office of high priest. 'High priest' is the natural and
    accurate English title.
- source_word: οἱ παρεστηκότες ἐνώπιον Κυρίου
  chosen: those who stood before the Lord
  alternatives:
  - those attending before the Lord
  - those present before the Lord
  lexicon: LSJ
  rationale: The perfect participle of παρίστημι denotes those standing in attendance/presence.
    'Stood before the Lord' preserves the cultic and reverential sense without over-paraphrase.
- source_word: Κυρίου
  chosen: Lord
  alternatives:
  - the LORD
  - Master
  lexicon: LSJ
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this Greek deuterocanonical
    context, 'Lord' preserves the religious title without importing the Hebrew divine
    name directly into the main text.
- source_word: οἱ λειτουργοῦντες Κυρίῳ
  chosen: those ministering to the Lord
  alternatives:
  - those serving the Lord
  - the liturgical attendants of the Lord
  lexicon: LSJ
  rationale: λειτουργέω in cultic context refers to priestly/temple service. 'Ministering'
    preserves the sacred-service nuance better than the flatter 'serving.'
- source_word: σάκκους περιεζωσμένοι τὰς ὀσφύας αὐτῶν
  chosen: with sackcloth girded around their waists
  alternatives:
  - having girded their loins with sackcloth
  - wearing sackcloth around their loins
  lexicon: LSJ
  rationale: The phrase is idiomatic for penitential dress. 'Waists' is more readable
    modern English than 'loins,' while 'girded' retains the concrete image of binding
    sackcloth around the body.
- source_word: προσέφερον
  chosen: were offering
  alternatives:
  - offered
  - presented
  lexicon: LSJ
  rationale: The imperfect indicates ongoing or repeated action in the narrative setting.
    'Were offering' best reflects the aspect.
- source_word: τὴν ὁλοκαύτωσιν
  chosen: the whole burnt offering
  alternatives:
  - the burnt offering
  - the holocaust offering
  lexicon: LSJ
  rationale: ὁλοκαύτωσις denotes a whole burnt offering. Including 'whole' preserves
    the lexical force of the term.
- source_word: τοῦ ἐνδελεχισμοῦ
  chosen: regular
  alternatives:
  - continual
  - perpetual
  - daily
  lexicon: LSJ
  rationale: The genitive qualifies the offering as continual/regular. 'Regular' is
    clear modern English; 'daily' would be too specific unless context required it.
- source_word: τὰς εὐχὰς
  chosen: the vows
  alternatives:
  - the prayers
  - the vow offerings
  lexicon: LSJ
  rationale: In sacrificial context εὐχή commonly means a vow or vowed offering rather
    than prayer in general. Since it is coordinated with offerings and gifts, 'vows'
    best fits the cultic sense.
- source_word: τὰ ἑκούσια δόματα
  chosen: the freewill gifts
  alternatives:
  - the voluntary offerings
  - the willing gifts
  lexicon: LSJ
  rationale: ἑκούσια conveys voluntariness, and δόματα are gifts. 'Freewill gifts'
    is idiomatic and preserves the offering context.
