theological_decisions:
- issue: Rendering κληρονομία in a covenantal-national context
  chosen_reading: inheritance
  alternative_readings:
  - heritage
  - possession
  rationale: In Israelite religious-political language, κληρονομία carries covenantal
    resonance beyond mere property. 'Inheritance' preserves that resonance without
    importing extra theology not explicit in the verse.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering τὰ ἅγια
  chosen_reading: the holy things
  alternative_readings:
  - the sanctuary
  - the sacred things
  rationale: The Greek plural points more broadly to sacred things than to a single
    building. This avoids over-resolving the referent while preserving the cultic
    force.
  doctrine_reference: Translation philosophy §3
