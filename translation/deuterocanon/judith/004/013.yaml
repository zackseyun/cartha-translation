translation:
  text: And they covered the altar with sackcloth, and they cried out to the God of
    Israel together fervently, that he might not give their little children over to
    plunder, and their women to spoil, and the cities of their inheritance to destruction,
    and the holy things to defilement and reproach, a cause of rejoicing for the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their women as booty.' The Greek phrase 'their women to spoil' uses
      war-booty language.
    reason: lexical_alternative
  - marker: b
    text: Or 'a cause of rejoicing to the nations'; the sense is hostile triumph or
      gloating by the nations.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ θυσιαστήριον
  chosen: the altar
  alternatives:
  - the sacrificial altar
  lexicon: LSJ
  rationale: θυσιαστήριον denotes an altar, specifically the place of sacrifice. 'The
    altar' is the natural English rendering and fits the temple context without over-specifying
    beyond the Greek.
- source_word: σάκκῳ περιέβαλλον
  chosen: covered ... with sackcloth
  alternatives:
  - wrapped ... in sackcloth
  - clothed ... with sackcloth
  lexicon: LSJ
  rationale: περιβάλλω literally means to throw around, clothe, or cover. With the
    altar as object and sackcloth as instrument, 'covered ... with sackcloth' is idiomatic
    and preserves the mourning/penitential action.
- source_word: ἐβόησαν ... ὁμοθυμαδὸν ἐκτενῶς
  chosen: cried out ... together with fervor
  alternatives:
  - cried out ... with one accord earnestly
  - shouted ... unanimously intensely
  lexicon: LSJ
  rationale: ἐβόησαν is a strong cry, not a quiet prayer. ὁμοθυμαδόν conveys united
    action ('together,' 'with one accord'), and ἐκτενῶς adds intensity/earnestness.
    'Together with fervor' preserves both corporate and urgent force in readable English.
- source_word: τοῦ μὴ δοῦναι
  chosen: that he might not give
  alternatives:
  - so as not to give
  - that he would not hand over
  lexicon: LSJ
  rationale: 'The articular infinitive with μή expresses the content/purpose of their
    cry: a plea that God not hand them over. ''That he might not give'' is slightly
    formal but accurately reflects the construction.'
- source_word: εἰς διαρπαγὴν
  chosen: over to plunder
  alternatives:
  - for plunder
  - to be prey
  lexicon: LSJ
  rationale: διαρπαγή denotes plundering or seizure as booty. 'Over to plunder' captures
    both the passive vulnerability of the children and the hostile action implied.
- source_word: τὰ νήπια
  chosen: their little children
  alternatives:
  - their infants
  - their young children
  lexicon: LSJ
  rationale: νήπια can mean infants or very young children. 'Little children' is broad
    enough to avoid over-narrowing while preserving the pathos of vulnerable dependents.
- source_word: τὰς γυναῖκας εἰς προνομὴν
  chosen: their women to spoil
  alternatives:
  - their wives to spoil
  - their women as booty
  lexicon: LSJ
  rationale: γυναῖκες may mean women or wives; here the collective social category
    is likely broader, so 'women' is preferable. προνομή refers to booty/spoil taken
    in war. 'To spoil' is concise and mirrors the parallel structure, though the sense
    is 'as booty.'
- source_word: τὰς πόλεις τῆς κληρονομίας αὐτῶν
  chosen: the cities of their inheritance
  alternatives:
  - their inherited cities
  - the towns of their heritage
  lexicon: LSJ
  rationale: κληρονομία is inheritance/heritage, often covenantally charged. 'The
    cities of their inheritance' preserves that weight better than a flatter paraphrase.
- source_word: εἰς ἀφανισμὸν
  chosen: to destruction
  alternatives:
  - for annihilation
  - to ruin
  lexicon: LSJ
  rationale: ἀφανισμός denotes destruction or obliteration. 'To destruction' keeps
    the parallelism with the other εἰς-phrases and remains natural enough in English.
- source_word: τὰ ἅγια
  chosen: the holy things
  alternatives:
  - the sanctuary
  - the sacred things
  lexicon: LSJ
  rationale: The plural neuter most naturally means holy/sacred things, likely temple
    holy objects or sacred matters generally. 'The sanctuary' would narrow the reference
    too much.
- source_word: εἰς βεβήλωσιν καὶ ὀνειδισμόν
  chosen: to defilement and reproach
  alternatives:
  - to profanation and disgrace
  - for desecration and insult
  lexicon: LSJ
  rationale: βεβήλωσις is profanation/defilement of what is holy; ὀνειδισμός is reproach,
    insult, or disgrace. 'Defilement and reproach' preserves both cultic and honor-shame
    dimensions.
- source_word: ἐπίχαρμα τοῖς ἔθνεσιν
  chosen: as something the nations would gloat over
  alternatives:
  - a cause of rejoicing to the nations
  - an object of mockery among the Gentiles
  lexicon: LSJ
  rationale: ἐπίχαρμα denotes an object of malicious joy or triumph. 'Something the
    nations would gloat over' brings out the hostile exultation more clearly than
    the more neutral 'cause of rejoicing.'
