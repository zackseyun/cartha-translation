id: JDT.4.7
reference: Judith 4:7
source:
  edition: lxx-swete-1909
  text: καὶ ἔγραψεν Ἰωακεὶμ ὁ ἱερεὺς ὁ μέγας, ὃς ἦν ἐν ταῖς ἡμέραις ἐν Ἰερουσαλήμ,
    τοῖς κατοικοῦσι Βαιτουλουὰ καὶ Βαιτομεσθαίμ, ἥ ἐστιν ἀπέναντι Ἐσρηλὼν κατὰ πρόσωπον
    τοῦ πεδίου τοῦ πλησίον Δωθάειμ,
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 803
  - 804
  - 805
  - 806
  - 807
  confidence: high
  validation: major_mismatch
translation:
  text: And Joakim the high priest, who was in Jerusalem in those days, wrote to those
    living in Bethulia and Betomesthaim, which is opposite Esdraelon, facing the plain
    near Dothaim,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the high priest.' The Greek reads literally 'the
      priest, the great.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - sent word
  - wrote a letter
  lexicon: BDAG
  rationale: The aorist of γράφω straightforwardly means 'wrote.' 'Wrote a letter'
    is possible by implication, but the Greek does not explicitly supply 'letter,'
    so the simpler rendering is preferred.
- source_word: ἱερεὺς ὁ μέγας
  chosen: the great priest
  alternatives:
  - the high priest
  lexicon: LSJ
  rationale: The Greek phrase is literally 'the priest, the great.' Although idiomatic
    English often uses 'high priest,' this verse's source wording is best represented
    transparently as 'the great priest.' 'High priest' remains a viable interpretive
    equivalent but is not demanded by the exact phrasing.
- source_word: ὃς ἦν ἐν ταῖς ἡμέραις ἐν Ἰερουσαλήμ
  chosen: who was in Jerusalem in those days
  alternatives:
  - who was then in Jerusalem
  - who was in Jerusalem at that time
  lexicon: BDAG
  rationale: This clause identifies Joakim's location/time in a simple descriptive
    way. 'In those days' preserves the temporal phrase ταῖς ἡμέραις without overinterpreting
    it.
- source_word: τοῖς κατοικοῦσι
  chosen: to those living
  alternatives:
  - to the inhabitants
  - to those dwelling
  lexicon: BDAG
  rationale: The participle κατοικοῦσι refers to residents or inhabitants. 'Those
    living' is natural modern English while preserving the participial sense.
- source_word: Βαιτουλουὰ
  chosen: Bethulia
  alternatives:
  - Baitouloua
  rationale: This is a place name and is transliterated by standard English convention
    rather than translated.
- source_word: Βαιτομεσθαίμ
  chosen: Betomesthaim
  alternatives:
  - Baitomesthaim
  rationale: This is a place name and is transliterated. The chosen form aims at readable
    English transliteration while remaining close to the Greek.
- source_word: ἀπέναντι
  chosen: opposite
  alternatives:
  - over against
  - across from
  lexicon: LSJ
  rationale: The term denotes being opposite or facing. 'Opposite' is concise and
    fits the geographical description.
- source_word: κατὰ πρόσωπον
  chosen: facing
  alternatives:
  - before
  - in front of
  lexicon: LSJ
  rationale: In this spatial context the phrase indicates orientation toward something.
    'Facing' gives the geographic sense clearly in modern English.
- source_word: τοῦ πεδίου
  chosen: the plain
  alternatives:
  - the valley
  - the open country
  lexicon: LSJ
  rationale: πεδίον commonly denotes a plain or level field/region. 'Plain' best suits
    the topographical description here.
- source_word: τοῦ πλησίον Δωθάειμ
  chosen: near Dothaim
  alternatives:
  - that is near Dothaim
  - close to Dothaim
  lexicon: BDAG
  rationale: πλησίον with a genitive indicates nearness. 'Near Dothaim' is the most
    natural concise rendering.
