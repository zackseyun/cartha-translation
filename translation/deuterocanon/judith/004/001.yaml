theological_decisions:
- issue: Rendering the ethnic designation οἱ υἱοὶ Ἰσραήλ
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source uses a masculine plural idiom with covenantal resonance. Per
    doctrine, gender-accurate rendering is preferred over flattening to a neutral
    collective unless context requires it. Here the idiom can be preserved intelligibly
    in English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering τὰ ἱερὰ αὐτῶν
  chosen_reading: their sanctuaries
  alternative_readings:
  - their temples
  - their holy things
  rationale: The verse concerns what Holofernes did to the nations' sacred cultic
    realities. 'Sanctuaries' preserves the religious sense without implying approval
    of pagan worship or reducing the term to movable objects only.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
