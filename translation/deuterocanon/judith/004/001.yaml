translation:
  text: And the sons of Israel who lived in Judea heard all that Holofernes, the commander-in-chief
    of King Nebuchadnezzar of the Assyrians, had done to the nations, and how he had
    plundered all their sanctuaries and given them over to destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Greek reads literally
      'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their temples' or 'their holy things'; the Greek can refer broadly to
      sacred places or sacred things.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: A formally transparent rendering preserves the idiom and ethnic-covenantal
    identity language of the Greek. 'Israelites' is smoother English, but 'sons of
    Israel' better reflects the source and the project's gender-accurate policy where
    the text uses a masculine form.
- source_word: οἱ κατοικοῦντες ἐν τῇ Ἰουδαίᾳ
  chosen: who lived in Judea
  alternatives:
  - dwelling in Judea
  - who were living in Judea
  lexicon: LSJ
  rationale: The participle κατοικοῦντες denotes residing or inhabiting. 'Who lived
    in Judea' is natural modern English while retaining the durative sense.
- source_word: πάντα ὅσα ἐποίησεν
  chosen: all that ... had done
  alternatives:
  - everything that ... did
  lexicon: LSJ
  rationale: This idiom is well represented by 'all that ... had done,' which reads
    naturally in English and preserves the comprehensiveness of πάντα ὅσα.
- source_word: ὁ ἀρχιστράτηγος
  chosen: the commander-in-chief
  alternatives:
  - the general
  - the supreme commander
  lexicon: LSJ
  rationale: ἀρχιστράτηγος is stronger than merely 'general'; it denotes the chief
    military commander. 'Commander-in-chief' best captures the rank and force in accessible
    English.
- source_word: τοῖς ἔθνεσιν
  chosen: to the nations
  alternatives:
  - to the Gentiles
  - to the peoples
  lexicon: LSJ
  rationale: In this narrative context ἔθνη refers broadly to foreign nations/peoples
    subdued by Holofernes, not specifically to 'Gentiles' in a later theological sense.
    'Nations' is the clearest rendering.
- source_word: ἐσκύλευσεν
  chosen: had plundered
  alternatives:
  - despoiled
  - stripped
  lexicon: LSJ
  rationale: The verb means to strip spoil from, plunder, or despoil. 'Plundered'
    is vivid, idiomatic, and fits the military context.
- source_word: τὰ ἱερὰ αὐτῶν
  chosen: their sanctuaries
  alternatives:
  - their holy things
  - their temples
  - their sacred places
  lexicon: LSJ
  rationale: τὰ ἱερά can denote sacred places or temple precincts, not merely objects.
    Given the context of nations' cultic sites being ravaged, 'sanctuaries' best captures
    the likely referent without over-specifying.
- source_word: ἔδωκεν αὐτὰ εἰς ἀφανισμόν
  chosen: given them over to destruction
  alternatives:
  - devoted them to destruction
  - consigned them to annihilation
  - destroyed them
  lexicon: LSJ
  rationale: The phrase expresses handing over for obliteration or ruin. 'Given them
    over to destruction' preserves the verbal nuance of ἔδωκεν and the force of ἀφανισμός
    without importing technical herem language too strongly.
