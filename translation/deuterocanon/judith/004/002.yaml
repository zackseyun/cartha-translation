  confidence: high
  validation: agree
translation:
  text: And they were greatly afraid because of him, and they were troubled about
    Jerusalem and the temple of the Lord their God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐφοβήθησαν
  chosen: they were afraid
  alternatives:
  - they feared
  - they became afraid
  lexicon: BDAG
  rationale: Aorist passive/deponent of φοβέομαι here expresses the people's fear.
    'They were afraid' is natural modern English and preserves the emotional state
    without over-paraphrasing.
- source_word: σφόδρα σφόδρα
  chosen: very, very
  alternatives:
  - greatly
  - exceedingly
  - very much
  lexicon: LSJ
  rationale: The exact repetition intensifies the statement. Rendering both adverbs
    as 'very, very' preserves the emphatic duplication better than collapsing to a
    single adverb such as 'greatly.'
- source_word: ἀπὸ προσώπου αὐτοῦ
  chosen: because of him
  alternatives:
  - before him
  - at his presence
  - from before him
  lexicon: LSJ
  rationale: Literally 'from his face/presence,' an idiom indicating fear occasioned
    by the approach or presence of the person previously mentioned. 'Because of him'
    communicates the causal force clearly in English without awkward literalism.
- source_word: ἐταράχθησαν
  chosen: they were troubled
  alternatives:
  - they were disturbed
  - they were shaken
  - they were agitated
  lexicon: BDAG
  rationale: The verb denotes inner disturbance or agitation. 'They were troubled'
    is idiomatic, readable, and suitably weighty for the context.
- source_word: περὶ Ἰερουσαλήμ
  chosen: about Jerusalem
  alternatives:
  - for Jerusalem
  - concerning Jerusalem
  lexicon: LSJ
  rationale: With περὶ after a verb of disturbance, the sense is concern regarding
    Jerusalem. 'About Jerusalem' is the most natural concise English equivalent.
- source_word: ναοῦ
  chosen: temple
  alternatives:
  - sanctuary
  - shrine
  lexicon: LSJ
  rationale: ναός here refers to the temple as the sacred structure in Jerusalem.
    'Temple' is the standard and clearest rendering in this historical context.
- source_word: Κυρίου θεοῦ αὐτῶν
  chosen: the Lord their God
  alternatives:
  - their Lord God
  - the Lord God of them
  lexicon: LSJ
  rationale: This preserves κύριος as 'Lord' per project doctrine and reflects the
    genitival relationship naturally in English as 'the Lord their God.'
