reference: Judith 4:2
source:
  edition: lxx-swete-1909
  text: καὶ ἐφοβήθησαν σφόδρα σφόδρα ἀπὸ προσώπου αὐτοῦ, καὶ περὶ Ἰερουσαλὴμ καὶ τοῦ
    ναοῦ Κυρίου θεοῦ αὐτῶν ἐταράχθησαν.
  language: Greek
  pages:
