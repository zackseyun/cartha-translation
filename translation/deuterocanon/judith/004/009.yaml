theological_decisions:
- issue: Corporate designation of Israel
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: No doctrinally contested term is involved, but the phrase carries covenantal
    and ethnic identity. The more literal rendering preserves that texture rather
    than flattening it into a demonym.
