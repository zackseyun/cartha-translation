translation:
  text: And the sons of Israel did as Joakim the high priest and the council of the
    whole people of Israel, who sat in Jerusalem, instructed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'ordered' or 'commanded them.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'the council of the whole people of Israel, who sat in Jerusalem';
      the final clause may describe the council as seated in Jerusalem.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: A formally close rendering preserves the idiom and the corporate covenantal
    identity in the Greek. 'Israelites' is smoother English, but 'sons of Israel'
    better reflects the source wording and fits the project's preference for transparency
    unless context strongly demands smoothing.
- source_word: ἐποίησαν
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: LSJ
  rationale: The common verb ποιέω here simply reports action in response to instructions.
    'Did' is the most direct equivalent in the construction 'did as ... instructed
    them.'
- source_word: καθὰ
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: LSJ
  rationale: Introduces conformity to the command. 'As' is natural modern English
    and adequately conveys the comparative force.
- source_word: συνέταξεν
  chosen: instructed
  alternatives:
  - ordered
  - commanded
  - directed
  lexicon: LSJ
  rationale: The verb can denote giving orders or arranging/directing. 'Instructed'
    preserves the authoritative sense without overstating it beyond the immediate
    context. 'Ordered' and 'commanded' are possible but slightly harsher in English.
- source_word: Ἰωακεὶμ
  chosen: Joakim
  alternatives:
  - Jehoiakim
  - Joachim
  rationale: Personal names are transliterated by standard conventions from the Greek
    form in keeping with project policy. 'Joakim' reflects the Greek Ἰωακεὶμ more
    directly than forms assimilated to Hebrew or later tradition.
- source_word: ὁ ἱερεὺς ὁ μέγας
  chosen: the high priest
  alternatives:
  - the great priest
  lexicon: LSJ
  rationale: This is the standard idiomatic rendering for the Jewish office denoted
    by the Greek phrase. 'Great priest' is formally possible but not idiomatic English
    for the office.
- source_word: ἡ γερουσία
  chosen: the council
  alternatives:
  - the senate
  - the eldership
  lexicon: LSJ
  rationale: The term denotes a body of elders. 'Council' is clear modern English
    and avoids the potentially misleading political coloring of 'senate,' while remaining
    more idiomatic than 'eldership' in this narrative context.
- source_word: παντὸς δήμου Ἰσραήλ
  chosen: of the whole people of Israel
  alternatives:
  - of all the assembly of Israel
  - of the whole nation of Israel
  lexicon: LSJ
  rationale: δῆμος refers to the people/community. 'Whole people of Israel' best captures
    the collective sense in accessible English. 'Assembly' could imply a gathered
    meeting rather than the people as a body.
- source_word: οἱ ἐκάθηντο ἐν Ἰερουσαλήμ
  chosen: who sat in Jerusalem
  alternatives:
  - who were sitting in Jerusalem
  - who resided in Jerusalem
  lexicon: LSJ
  rationale: The participial clause most naturally modifies 'the council' (and possibly
    the leadership named), indicating their seated presence in Jerusalem. 'Sat' preserves
    the Greek verb while remaining understandable; 'resided' is interpretive and less
    direct.
