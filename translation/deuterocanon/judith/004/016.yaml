id: JDT.4.16
reference: Judith 4:16
source:
  edition: lxx-swete-1909
  text: καὶ ἦν σποδὸς ἐπὶ τὰς κιδάρεις αὐτῶν, καὶ ἐβόων πρὸς Κύριον ἐκ πάσης δυνάμεως,
    εἰς ἀγαθὸν ἐπισκέψασθαι πᾶν οἶκον Ἰσραήλ.
  language: Greek
  pages:
  - 798
