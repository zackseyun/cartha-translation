  validation: no_reference
translation:
  text: And there was ashes on their turbans, and they were crying out to the Lord
    with all their strength, that he might look with favor on the whole house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'look upon ... for good'; the Greek expression combines the idea of visiting
      or attending to Israel with beneficent intent.
    reason: lexical_alternative
lexical_decisions:
- source_word: σποδός
  chosen: ashes
  alternatives:
  - ash
  lexicon: LSJ
  rationale: The noun denotes ashes. English idiom prefers the mass plural 'ashes'
    in mourning contexts, especially when placed on the head or garments.
- source_word: κιδάρεις
  chosen: turbans
  alternatives:
  - head coverings
  - miters
  lexicon: LSJ
  rationale: The term refers to a wrapped headpiece or turban-like headdress. 'Turbans'
    is the clearest modern equivalent; 'miters' sounds ecclesiastical and overly traditional,
    while 'head coverings' is too generic.
- source_word: ἐβόων
  chosen: were crying out
  alternatives:
  - cried out
  - were shouting
  lexicon: LSJ
  rationale: The imperfect suggests ongoing or repeated action, so 'were crying out'
    better reflects the verbal aspect than a simple past. 'Shouting' is too flat for
    a prayer context.
- source_word: Κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: With πρός and without the article in Greek, the sense is still the divine
    title. Following project doctrine for κύριος, it is rendered 'Lord'; English idiom
    here naturally takes 'the Lord'.
- source_word: ἐκ πάσης δυνάμεως
  chosen: with all their strength
  alternatives:
  - from all their strength
  - with all their might
  lexicon: LSJ
  rationale: The phrase is idiomatic for exerting one's full power or intensity. 'With
    all their strength' is natural modern English and preserves the force of the expression.
- source_word: εἰς ἀγαθόν
  chosen: with favor
  alternatives:
  - for good
  - beneficially
  lexicon: LSJ
  rationale: In this construction with ἐπισκέψασθαι, the phrase expresses a favorable
    or beneficent regard. 'With favor' communicates the sense more idiomatically than
    the wooden 'for good'.
- source_word: ἐπισκέψασθαι
  chosen: look
  alternatives:
  - visit
  - look upon
  - take notice of
  lexicon: LSJ
  rationale: The verb can mean 'visit' in the sense of attending to or looking upon.
    In English, 'look with favor on' best captures both the visual and beneficent
    nuance in this prayer context.
- source_word: πᾶν οἶκον Ἰσραήλ
  chosen: the whole house of Israel
  alternatives:
  - all the house of Israel
  - every house of Israel
  lexicon: LSJ
  rationale: The phrase is a collective designation for Israel as a people, not each
    individual household. 'The whole house of Israel' preserves the biblical corporate
    sense.
