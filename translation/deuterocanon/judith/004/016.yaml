- issue: Rendering of κύριος in a deuterocanonical Greek prayer context
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The project default for κύριος is 'Lord.' Because the prayer is directed
    to Israel's God, 'the Lord' is the most natural English expression here without
    importing the tetragrammaton into the Greek text.
