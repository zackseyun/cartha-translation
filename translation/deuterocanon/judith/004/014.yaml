theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The project default for κύριος is 'Lord.' In this deuterocanonical Greek
    context it functions as the divine title and should not be weakened to 'Master.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Sense of τῶν ἁγίων in a cultic context
  chosen_reading: the holy things
  alternative_readings:
  - the sanctuary
  - the holy places
  rationale: The Greek plural is preserved rather than resolved into a singular institutional
    term. This keeps the cultic reference transparent without importing a more specific
    theology of temple space than the wording itself states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
