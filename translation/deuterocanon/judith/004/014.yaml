id: JDT.4.14
reference: Judith 4:14
source:
  edition: lxx-swete-1909
  text: καὶ εἰσήκουσεν Κύριος τῆς φωνῆς αὐτῶν καὶ ἐπεῖδεν τὴν θλίψιν αὐτῶν, καὶ ἦν
    ὁ λαὸς νηστεύων ἡμέρας πλείους ἐν πάσῃ τῇ Ἰουδαίᾳ καὶ Ἰερουσαλὴμ κατὰ πρόσωπον
    τῶν ἁγίων Κυρίου Παντοκράτορος.
