translation:
  text: And they occupied all the summits of the high mountains,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek verb suggests taking these heights in advance as a defensive measure;
      'preemptively occupied' or 'seized beforehand' are possible renderings.
    reason: lexical_alternative
lexical_decisions:
- source_word: προκατελάβοντο
  chosen: occupied
  alternatives:
  - seized beforehand
  - took possession of
  - preemptively occupied
  lexicon: LSJ
  rationale: The compound verb conveys taking possession in advance or securing strategically.
    In context of military preparation, 'occupied' gives clear modern English while
    preserving the sense of preemptive control better than a flat 'took.'
- source_word: πάσας
  chosen: all
  alternatives:
  - every
  lexicon: LSJ
  rationale: The adjective is comprehensive; 'all' is the most natural rendering with
    the plural noun phrase in English.
- source_word: κορυφὰς
  chosen: summits
  alternatives:
  - peaks
  - tops
  lexicon: LSJ
  rationale: κορυφή refers to the top or peak of a mountain. 'Summits' is slightly
    more formal and fits the military-geographical setting well.
- source_word: ὀρέων
  chosen: mountains
  alternatives:
  - hills
  lexicon: LSJ
  rationale: The standard sense is 'mountains'; nothing in the immediate context warrants
    weakening it to 'hills.'
- source_word: ὑψηλῶν
  chosen: high
  alternatives:
  - lofty
  - elevated
  lexicon: LSJ
  rationale: The adjective straightforwardly describes the mountains as high. 'High'
    is idiomatic and avoids unnecessary archaism.
