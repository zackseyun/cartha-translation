  text: καὶ εἶπεν Ὀζίας καὶ οἱ ἄρχοντες πρὸς αὐτήν Πορεύου εἰς εἰρήνην, καὶ Κύριος
    ὁ θεὸς ἔμπροσθέν σου εἰς ἐκδίκησιν τῶν ἐχθρῶν ἡμῶν.
  language: Greek
