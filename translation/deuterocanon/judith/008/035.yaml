theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek context
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  - Master
  rationale: The project default renders κύριος as 'Lord.' Although this is an Old
    Testament-context Greek text, the source here is the LXX wording Κύριος ὁ θεός,
    and 'the Lord God' is the most natural English equivalent without importing the
    tetragrammaton explicitly where the Greek does not state it.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of ἐκδίκησις
  chosen_reading: vengeance
  alternative_readings:
  - vindication
  - justice
  rationale: The verse invokes God's action against hostile enemies in a military-deliverance
    setting. 'Vengeance' preserves the severity of the appeal and avoids softening
    the text into a more abstract notion of justice.
