translation:
  text: Then Uzziah and the rulers said to her, “Go in peace, and may the Lord God
    go before you for vengeance on our enemies.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for avenging our enemies' / 'for vindication against our enemies.' The
      Greek term can denote avenging action or vindication, but here the wartime context
      favors 'vengeance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: BDAG
  rationale: Standard narrative verb; 'said' is the most natural and sufficiently
    formal rendering in context.
- source_word: Ὀζίας
  chosen: Uzziah
  alternatives:
  - Ozias
  rationale: Personal names are transliterated by standard English convention rather
    than preserving the Greek form 'Ozias'.
- source_word: οἱ ἄρχοντες
  chosen: the rulers
  alternatives:
  - the leaders
  - the magistrates
  lexicon: BDAG
  rationale: ἄρχοντες denotes those in authority. 'Rulers' preserves the official
    sense without over-specifying a civic office.
- source_word: Πορεύου
  chosen: Go
  alternatives:
  - Proceed
  - Be on your way
  lexicon: BDAG
  rationale: Imperative of movement. 'Go' is direct and idiomatic in English.
- source_word: εἰς εἰρήνην
  chosen: in peace
  alternatives:
  - with peace
  - safely
  lexicon: BDAG
  rationale: A conventional farewell/blessing formula. 'In peace' preserves the idiom
    better than flattening it to mere safety.
- source_word: Κύριος ὁ θεὸς
  chosen: the Lord God
  alternatives:
  - the Lord, God
  - the Lord your God
  lexicon: BDAG
  rationale: The Greek has the title phrase without an explicit possessive pronoun.
    'The Lord God' is the natural rendering and aligns with the project's default
    for κύριος as 'Lord'.
- source_word: ἔμπροσθέν σου
  chosen: go before you
  alternatives:
  - be before you
  - be in front of you
  lexicon: BDAG
  rationale: Though literally 'before you,' in context it expresses divine leading/protection.
    'Go before you' makes the implied motion explicit in natural English while staying
    close to the Greek.
- source_word: εἰς ἐκδίκησιν
  chosen: for vengeance
  alternatives:
  - for vindication
  - for avenging
  - for justice against
  lexicon: BDAG
  rationale: ἐκδίκησις here refers to punitive action against enemies. 'Vengeance'
    best matches the hostile-war context; 'vindication' would understate the retaliatory
    force.
- source_word: τῶν ἐχθρῶν ἡμῶν
  chosen: against our enemies
  alternatives:
  - of our enemies
  - on our enemies
  lexicon: BDAG
  rationale: 'The genitive depends on ἐκδίκησιν and is most idiomatically expressed
    in English as the object of vengeance: ''against our enemies.'''
