translation:
  text: For if he is not willing to help us within these five days, he himself has
    the authority, in whatever days he wishes, to shelter us, or even to destroy us
    before our enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to protect us.' The Greek verb literally has the sense of covering,
      here in the sense of protective shelter.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'before the face of our enemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν μὴ βούληται
  chosen: if he is not willing
  alternatives:
  - if he does not choose
  - unless he wills
  lexicon: BDAG
  rationale: βούλομαι denotes willing, intending, or choosing. 'Is not willing' is
    natural English and preserves the volitional sense without sounding archaic.
- source_word: ἐν ταῖς πέντε ἡμέραις
  chosen: within these five days
  alternatives:
  - in the five days
  - during these five days
  lexicon: BDAG
  rationale: With ἐν plus a time expression, the sense here is the five-day period
    just mentioned in context. 'Within these five days' best conveys the deadline
    implied by the speech.
- source_word: βοηθῆσαι
  chosen: to help
  alternatives:
  - to come to our aid
  - to rescue
  lexicon: BDAG
  rationale: The verb means to help or come to aid. 'Help' is the broadest and least
    interpretively loaded rendering; stronger options like 'rescue' narrow the sense
    more than the Greek requires.
- source_word: αὐτὸς ἔχει τὴν ἐξουσίαν
  chosen: he himself has the authority
  alternatives:
  - he has the power
  - he himself has the right
  lexicon: BDAG
  rationale: ἐξουσία can mean authority, right, or power. 'Authority' best preserves
    the idea of rightful divine prerogative, while αὐτός is reflected by 'he himself'
    for emphasis.
- source_word: ἐν αἷς θέλει ... ἡμέραις
  chosen: in whatever days he wishes
  alternatives:
  - in whichever days he wants
  - at whatever time he wills
  lexicon: BDAG
  rationale: The relative phrase with θέλει expresses God's freedom regarding timing.
    'In whatever days he wishes' stays close to the Greek while remaining readable.
- source_word: σκεπάσαι
  chosen: to shelter us
  alternatives:
  - to cover us
  - to protect us
  lexicon: BDAG
  rationale: σκεπάζω literally involves covering, but in context refers to protective
    shelter. 'Shelter us' preserves the metaphor better than the flatter 'protect
    us.'
- source_word: ὀλεθρεῦσαι
  chosen: to destroy us
  alternatives:
  - to wipe us out
  - to bring us to ruin
  lexicon: BDAG
  rationale: The verb denotes destroying or causing ruin. 'Destroy us' is direct,
    idiomatic, and appropriately grave.
- source_word: πρὸ προσώπου τῶν ἐχθρῶν ἡμῶν
  chosen: before our enemies
  alternatives:
  - in the presence of our enemies
  - at the hands of our enemies
  lexicon: LEH
  rationale: The idiom literally means 'before the face of our enemies.' 'Before our
    enemies' preserves the public/exposed sense without over-specifying agency; 'at
    the hands of' would go beyond the Greek.
