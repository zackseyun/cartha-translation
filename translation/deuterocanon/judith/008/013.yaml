theological_decisions:
- issue: Rendering of κύριος in a deuterocanonical Greek context
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Per doctrine, κύριος defaults to 'Lord.' Nothing in the immediate context
    suggests the lesser title 'Master'; the phrase functions as a divine title.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of human inquiry into God in ἐξετάζετε
  chosen_reading: you are probing the Lord Almighty
  alternative_readings:
  - you are testing the Lord Almighty
  - you are examining the Lord Almighty
  rationale: 'The verse rebukes presumptuous scrutiny of God. ''Probing'' preserves
    the theological tension: humans are attempting to investigate God in a way the
    text presents as improper, without importing a stronger temptation motif that
    ''testing'' might suggest.'
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve
    it
