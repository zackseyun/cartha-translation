translation:
  text: And now you are testing the Lord Almighty, and you will never understand anything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you are testing' or 'you are examining' the Lord Almighty.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'until the age.' The phrase means 'forever' or 'for all time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξετάζετε
  chosen: are probing
  alternatives:
  - are testing
  - are examining
  - are searching out
  lexicon: BDAG
  rationale: The verb conveys searching into or scrutinizing. In this rebuking context,
    'are probing' preserves the sense of attempting to investigate or test God without
    sounding overly technical. 'Testing' is possible, but 'probing' better matches
    the intellectual scrutiny implied by the immediate parallel with failing to know
    or understand.
- source_word: κύριον Παντοκράτορα
  chosen: the Lord Almighty
  alternatives:
  - the Lord, the Almighty
  - the Almighty Lord
  lexicon: LEH
  rationale: κύριος is rendered by the project's default 'Lord.' Παντοκράτωρ is well
    represented by 'Almighty,' a standard and accessible title preserving divine sovereignty.
    The combined phrase is naturally rendered 'the Lord Almighty' in English.
- source_word: οὐθὲν
  chosen: nothing
  alternatives:
  - not anything
  lexicon: BDAG
  rationale: Straightforward negated object; 'nothing' is idiomatic and fully equivalent.
- source_word: ἐπιγνώσεσθε
  chosen: you will understand
  alternatives:
  - you will know fully
  - you will come to know
  - you will recognize
  lexicon: BDAG
  rationale: The future middle of ἐπιγινώσκω can mean come to know or understand fully.
    In context, Judith rebukes their attempt to scrutinize God and says it will yield
    no true comprehension. 'Understand' communicates the epistemic force clearly in
    modern English.
- source_word: ἕως τοῦ αἰῶνος
  chosen: forever
  alternatives:
  - for ever
  - unto the age
  - throughout the age
  lexicon: LEH
  rationale: The idiom expresses enduring duration. 'Forever' is the most natural
    modern English rendering here, preserving the force of permanent inability rather
    than a limited period.
