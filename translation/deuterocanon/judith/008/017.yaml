translation:
  text: Therefore, while we wait for the salvation from him, let us call on him for
    our help, and he will hear our voice, if it is pleasing to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverance that comes from him.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'he will hear our voice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διόπερ
  chosen: Therefore
  alternatives:
  - For this reason
  - Wherefore
  lexicon: LSJ
  rationale: Inferential conjunction drawing a conclusion from the preceding argument;
    'Therefore' is natural modern English and preserves the logical force.
- source_word: ἀναμένοντες
  chosen: while we wait
  alternatives:
  - waiting for
  - expecting
  lexicon: BDAG
  rationale: The participle conveys ongoing expectant waiting. 'While we wait' fits
    the hortatory flow in English and keeps the temporal nuance.
- source_word: σωτηρίαν
  chosen: salvation
  alternatives:
  - deliverance
  - rescue
  lexicon: BDAG
  rationale: In Judith this refers to God's saving intervention in a crisis. 'Salvation'
    preserves the theological weight, though 'deliverance' is a viable contextual
    alternative.
- source_word: τὴν παρ' αὐτοῦ
  chosen: that comes from him
  alternatives:
  - from him
  - from his hand
  lexicon: LSJ
  rationale: παρά with genitive indicates source/origin. Expanding to 'that comes
    from him' yields idiomatic English while preserving the source relation.
- source_word: ἐπικαλεσώμεθα
  chosen: let us call on
  alternatives:
  - let us invoke
  - let us appeal to
  lexicon: BDAG
  rationale: First person hortatory subjunctive. 'Call on' is idiomatic, prayer-oriented,
    and fits biblical usage without sounding archaic.
- source_word: εἰς βοήθειαν ἡμῶν
  chosen: to help us
  alternatives:
  - for our help
  - for our aid
  lexicon: BDAG
  rationale: Literally 'for our help/aid.' Rendering it verbally as 'to help us' is
    a modest dynamic adjustment that reads naturally in English and preserves the
    sense of petition for assistance.
- source_word: εἰσακούσεται
  chosen: he will hear
  alternatives:
  - he will listen to
  - he will heed
  lexicon: BDAG
  rationale: In prayer contexts the verb means to hear favorably or listen to. 'He
    will hear' preserves biblical resonance and leaves the favorable-response nuance
    implicit.
- source_word: τῆς φωνῆς ἡμῶν
  chosen: our voice
  alternatives:
  - our cry
  - our prayer
  lexicon: LSJ
  rationale: φωνή is literally 'voice.' Although 'cry' could fit a distress context,
    the Greek does not require that stronger nuance, so the more literal 'our voice'
    is retained.
- source_word: ἐὰν ἦν αὐτῷ ἀρεστόν
  chosen: if it is pleasing to him
  alternatives:
  - if it seems good to him
  - if it is acceptable to him
  lexicon: BDAG
  rationale: The clause conditions the hearing on what is pleasing to God. 'If it
    is pleasing to him' is clear modern English and preserves the deference to divine
    will.
