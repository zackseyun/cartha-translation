id: JDT.8.17
reference: Judith 8:17
source:
  edition: lxx-swete-1909
  text: διόπερ ἀναμένοντες τὴν παρ' αὐτοῦ σωτηρίαν ἐπικαλεσώμεθα αὐτὸν εἰς βοήθειαν
    ἡμῶν, καὶ εἰσακούσεται τῆς φωνῆς ἡμῶν, ἐὰν ἦν αὐτῷ ἀρεστόν.
  language: Greek
