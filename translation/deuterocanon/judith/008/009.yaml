- issue: Narrative subject reference in the second clause
  chosen_reading: 'Retain ''Judith'' explicitly in English: ''and Judith heard all
    the words...'''
  alternative_readings:
  - Use 'she heard' for tighter repetition
  rationale: Although the subject is already established, the Greek explicitly names
    Ἰουδεὶθ in the second clause. Keeping the name preserves the source's emphasis
    and avoids ambiguity in a long sentence.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
