translation:
  text: And she heard the evil words of the people against the ruler, because they
    had lost heart over the shortage of water; and she heard all the words that Ozias
    had spoken to them, that he had sworn to hand over the city to the Assyrians after
    five days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to surrender the city to the Assyrians.' The Greek literally says 'to
      hand over the city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥήματα
  chosen: words
  alternatives:
  - things said
  - reports
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the concrete sense of spoken
    utterances rather than abstract 'matters.'
- source_word: τὰ πονηρά
  chosen: evil
  alternatives:
  - wicked
  - bad
  - hostile
  lexicon: BDAG
  rationale: The adjective morally colors the people's speech negatively. 'Evil' preserves
    the severity better than the flatter 'bad,' while avoiding over-interpretive expansion.
- source_word: ἄρχοντα
  chosen: ruler
  alternatives:
  - leader
  - governor
  lexicon: BDAG
  rationale: A general political/social title fits the context. 'Ruler' is broad and
    natural English, without implying a specific office beyond the Greek.
- source_word: ὠλιγοψύχησαν
  chosen: had lost heart
  alternatives:
  - became discouraged
  - grew fainthearted
  lexicon: BDAG
  rationale: The verb denotes becoming fainthearted or discouraged. 'Had lost heart'
    is idiomatic modern English and preserves the emotional force.
- source_word: σπάνει
  chosen: shortage
  alternatives:
  - lack
  - scarcity
  lexicon: BDAG
  rationale: The noun indicates deficiency or scarcity. 'Shortage of water' is clear,
    natural, and faithful to the situational sense.
- source_word: πάντας τοὺς λόγους
  chosen: all the words
  alternatives:
  - everything
  - all the things said
  lexicon: BDAG
  rationale: Though English might smooth this to 'everything,' 'all the words' better
    reflects the Greek emphasis on the actual speech Judith heard.
- source_word: ἐλάλησεν
  chosen: had spoken
  alternatives:
  - said
  - addressed
  lexicon: BDAG
  rationale: The verb is common for speaking. 'Had spoken' fits the reported-speech
    construction and keeps the sequence clear.
- source_word: ὤμοσεν
  chosen: had sworn
  alternatives:
  - promised under oath
  - took an oath
  lexicon: BDAG
  rationale: The oath element is explicit and important to the narrative; 'had sworn'
    is concise and accurate.
- source_word: παραδώσειν
  chosen: to hand over
  alternatives:
  - to surrender
  - to deliver up
  lexicon: BDAG
  rationale: The infinitive means to give over or hand over. 'Hand over' is transparent
    and avoids prematurely narrowing the action to a technical military 'surrender,'
    though that idea is present.
- source_word: μετὰ ἡμέρας πέντε
  chosen: after five days
  alternatives:
  - within five days
  - in five days
  lexicon: BDAG
  rationale: The preposition μετά with the accusative is most naturally temporal,
    'after.' This should not be flattened into 'within' without stronger contextual
    warrant.
