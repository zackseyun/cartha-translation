id: JDT.8.9
reference: Judith 8:9
source:
  edition: lxx-swete-1909
  text: Καὶ ἤκουσεν ῥήματα τοῦ λαοῦ τὰ πονηρὰ ἐπὶ τὸν ἄρχοντα, ὅτι ὠλιγοψύχησαν ἐπὶ
    τῇ σπάνει τῶν ὑδάτων· καὶ ἤκουσεν πάντας τοὺς λόγους Ἰουδεὶθ οὓς ἐλάλησεν πρὸς
    αὐτοὺς Ὀζείας, ὃς ὤμοσεν αὐτοῖς παραδώσειν τὴν πόλιν μετὰ ἡμέρας πέντε τοῖς Ἀσσυρίοις.
  language: Greek
