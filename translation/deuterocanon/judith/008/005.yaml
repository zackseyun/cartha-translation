translation:
  text: And she made for herself a tent on the roof of her house, and put sackcloth
    around her waist, and the garments of her widowhood were upon her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the rooftop' or 'on the housetop'; the Greek refers to the flat roof
      area of the house.
    reason: lexical_alternative
  - marker: b
    text: Sackcloth was coarse cloth worn as a sign of mourning, grief, or humiliation.
    reason: cultural_note
lexical_decisions:
- source_word: σκηνήν
  chosen: tent
  alternatives:
  - canopy
  - shelter
  - booth
  lexicon: LSJ
  rationale: σκηνή commonly denotes a tent or temporary shelter. 'Tent' is the most
    direct and natural English equivalent here, preserving the sense of a deliberately
    separate dwelling space without overinterpreting its exact construction.
- source_word: ἐπὶ τοῦ δώματος
  chosen: on the roof
  alternatives:
  - on the rooftop
  - on the housetop
  lexicon: LSJ
  rationale: δῶμα in this context refers to the flat roof area of a house. 'On the
    roof' is clear modern English; 'rooftop' or 'housetop' would also be possible,
    but 'roof' is slightly more natural while retaining the architectural sense.
- source_word: σάκκον
  chosen: sackcloth
  alternatives:
  - a coarse mourning garment
  lexicon: LSJ
  rationale: σάκκος/sackcloth is the standard biblical term for coarse cloth associated
    with mourning and penitence. The traditional term remains understandable and preserves
    the cultural-religious force better than an explanatory paraphrase in the main
    text.
- source_word: ἐπὶ τὴν ὀσφὺν αὐτῆς
  chosen: around her waist
  alternatives:
  - upon her loins
  - on her waist
  lexicon: LSJ
  rationale: ὀσφύς literally refers to the loins/waist. 'Around her waist' communicates
    the idiomatic sense in readable modern English and fits the action of putting
    on sackcloth.
- source_word: τὰ ἱμάτια τῆς χηρεύσεως αὐτῆς
  chosen: the garments of her widowhood
  alternatives:
  - her widow's garments
  - the clothes of her widowhood
  lexicon: LSJ
  rationale: The phrase denotes clothing associated with her status and mourning as
    a widow. 'The garments of her widowhood' stays close to the Greek and preserves
    the formal, status-marking nuance better than the more interpretive 'mourning
    clothes'.
- source_word: ἦν ἐπʼ αὐτῆς
  chosen: were upon her
  alternatives:
  - were on her
  - she wore
  lexicon: LSJ
  rationale: 'The Greek is stative and literal: the garments ''were upon her.'' ''Were
    upon her'' preserves that formal tone and avoids collapsing the clause into a
    more interpretive verbal paraphrase like ''she wore,'' though that sense is implied.'
