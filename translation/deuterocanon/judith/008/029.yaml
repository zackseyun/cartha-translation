translation:
  text: For your wisdom has not become evident only today; rather, from the beginning
    of your days all the people have known your understanding, because the disposition
    of your heart is good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the formation/inclination of your heart is good.' The Greek expression
      is somewhat literal and refers to the inward bent or shaping of one's heart.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐν τῇ σήμερον
  chosen: not only today
  alternatives:
  - not on this day
  - not today
  lexicon: LSJ
  rationale: The idiom contrasts the present day with a long-established reputation.
    Rendering it as 'not only today' brings out the temporal contrast naturally in
    English while preserving the negation and emphasis.
- source_word: ἡ σοφία σου πρόδηλός ἐστιν
  chosen: your wisdom has not become evident
  alternatives:
  - your wisdom is not evident
  - your wisdom is not newly manifest
  lexicon: LSJ
  rationale: πρόδηλος means clear, evident, manifest. Because the sentence contrasts
    today with the past, English benefits from an inceptive nuance ('has not become
    evident only today'), making explicit that her wisdom was already known before
    now.
- source_word: ἀλλʼ ἀπʼ ἀρχῆς ἡμερῶν σου
  chosen: rather, from the beginning of your days
  alternatives:
  - but from your earliest days
  - from the start of your life
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the idiom while remaining understandable.
    'Beginning of your days' reflects the Greek closely and conveys early life without
    over-paraphrasing.
- source_word: ἔγνω πᾶς ὁ λαὸς
  chosen: all the people have known
  alternatives:
  - the whole people knew
  - all the people knew
  lexicon: LSJ
  rationale: The aorist can be rendered idiomatically in English here as a present
    perfect to match the continuing force of a reputation known from early on until
    now.
- source_word: τὴν σύνεσίν σου
  chosen: your understanding
  alternatives:
  - your insight
  - your good sense
  lexicon: LSJ
  rationale: σύνεσις denotes understanding, intelligence, or discernment. 'Understanding'
    is broad, natural, and pairs well with 'wisdom' without collapsing the distinction
    between the two Greek terms.
- source_word: καθότι
  chosen: because
  alternatives:
  - since
  - inasmuch as
  lexicon: LSJ
  rationale: The conjunction gives the reason for the people's recognition of her
    understanding. 'Because' is the clearest modern English equivalent.
- source_word: τὸ πλάσμα τῆς καρδίας σου
  chosen: the disposition of your heart
  alternatives:
  - the formation of your heart
  - the inclination of your heart
  - the purpose of your heart
  lexicon: LSJ
  rationale: πλάσμα literally suggests something formed or fashioned, but in this
    context it refers to the inward shaping or bent of the heart. 'Disposition' communicates
    character and inward inclination in readable English without flattening the metaphor
    entirely.
- source_word: ἀγαθόν
  chosen: is good
  alternatives:
  - is noble
  - is sound
  lexicon: LSJ
  rationale: ἀγαθός here is a broad moral commendation. 'Good' is the most direct
    and least interpretively loaded rendering.
