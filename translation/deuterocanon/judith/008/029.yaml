theological_decisions:
- issue: Anthropological expression involving 'heart'
  chosen_reading: Retained 'heart' literally in 'the disposition of your heart'
  alternative_readings:
  - the disposition of your mind
  - your character is good
  rationale: The verse speaks in conventional biblical anthropology, where the heart
    is the center of inner thought and moral inclination. Preserving 'heart' maintains
    that biblical idiom without obscuring meaning, aided by the interpretive noun
    'disposition.'
