translation:
  text: For he did not test us by fire, as he did them, to examine their hearts; nor
    has he taken vengeance on us. Rather, the Lord scourges those who draw near to
    him for admonition.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For he did not burn us as he did them, to test their hearts.' The Greek
      keeps the imagery of fire while using it in the sense of testing.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Lord disciplines/chastens those who draw near to him.' The Greek
      verb is literally 'scourges,' preserving the severity of the corrective image.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπύρωσεν
  chosen: tested ... by fire
  alternatives:
  - burned
  - set on fire
  - refined by fire
  lexicon: LSJ
  rationale: The verb literally relates to burning/fire, but in context with εἰς ἔτασμόν
    it denotes a testing ordeal rather than mere physical burning. 'Tested ... by
    fire' preserves both the fire imagery and the purposive sense.
- source_word: εἰς ἔτασμόν
  chosen: to examine
  alternatives:
  - for testing
  - for examination
  - to test
  lexicon: LSJ
  rationale: The phrase expresses purpose/result connected to the fiery ordeal. 'To
    examine' reads naturally in English with 'their hearts' while preserving the evaluative
    sense of testing.
- source_word: καρδίας
  chosen: hearts
  alternatives:
  - minds
  - inner selves
  lexicon: LSJ
  rationale: '''Hearts'' is the standard biblical rendering and preserves the anthropological
    sense of the inner person without over-interpretation.'
- source_word: ἐξεδίκησεν
  chosen: has he taken vengeance on
  alternatives:
  - has he punished
  - has he exacted justice on
  - has he avenged himself on
  lexicon: LSJ
  rationale: The verb carries the sense of exacting justice or vengeance. 'Taken vengeance
    on' best preserves the force of the Greek and the contrast with disciplinary chastisement
    in the next clause.
- source_word: νουθέτησιν
  chosen: for admonition
  alternatives:
  - for instruction
  - for warning
  - for discipline
  lexicon: LSJ
  rationale: The noun denotes corrective instruction or warning. 'For admonition'
    keeps the moral-corrective nuance and fits the contrast with vengeance. 'Discipline'
    was possible but would blur with μαστιγοῖ.
- source_word: μαστιγοῖ
  chosen: scourges
  alternatives:
  - whips
  - flogs
  - disciplines
  lexicon: LSJ
  rationale: The verb literally refers to scourging/whipping. Retaining 'scourges'
    preserves the severity of the metaphor and avoids softening it into a vague 'disciplines.'
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is rendered 'Lord.' The article is natural
    in English here because the clause is a general theological statement.
- source_word: τοὺς ἐγγίζοντας αὐτῷ
  chosen: those who draw near to him
  alternatives:
  - those approaching him
  - those who come near him
  lexicon: LSJ
  rationale: This participial phrase evokes approaching God in covenantal/religious
    nearness. 'Draw near' is idiomatic biblical English and preserves that theological
    resonance.
