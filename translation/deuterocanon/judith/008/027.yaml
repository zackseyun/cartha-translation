theological_decisions:
- issue: Whether the final clause should be softened into general discipline or retain
    the severe imagery of divine chastisement
  chosen_reading: 'Retain the concrete metaphor: ''the Lord scourges those who draw
    near to him for admonition.'''
  alternative_readings:
  - the Lord disciplines those who draw near to him as a warning
  - the Lord chastens those near him for instruction
  rationale: The Greek μαστιγοῖ is stronger than a generic term for discipline. The
    verse contrasts destructive vengeance with corrective but painful chastisement;
    preserving that tension matches the source and the project's philosophy of not
    flattening theological force.
  doctrine_reference: DOCTRINE.md §§1, 3, 6
- issue: How to express the relation between divine punishment and corrective purpose
  chosen_reading: Translate ἀλλʼ εἰς νουθέτησιν as 'Rather ... for admonition' to
    show that God's action is corrective, not retaliatory.
  alternative_readings:
  - Rather ... for discipline
  - Rather ... as a warning
  rationale: The verse explicitly distinguishes vengeance from corrective chastisement.
    'For admonition' preserves that distinction without importing a broader theology
    beyond the text.
  doctrine_reference: DOCTRINE.md §3
