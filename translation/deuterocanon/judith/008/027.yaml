id: JDT.8.27
reference: Judith 8:27
source:
  edition: lxx-swete-1909
  text: ὅτι οὐ καθὼς ἐκείνους ἐπύρωσεν εἰς ἔτασμόν τῆς καρδίας αὐτῶν, καὶ ἡμᾶς οὐκ
    ἐξεδίκησεν, ἀλλʼ εἰς νουθέτησιν μαστιγοῖ Κύριος τοὺς ἐγγίζοντας αὐτῷ.
  language: Greek
  pages:
  - 798
