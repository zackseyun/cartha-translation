theological_decisions:
- issue: Force of the rebuke in relation to God's prerogatives
  chosen_reading: Judith accuses the hearers of presumptuously assuming a role that
    belongs to God alone.
  alternative_readings:
  - Judith accuses them merely of speaking on God's behalf.
  - Judith accuses them of exalting themselves above God.
  rationale: The Greek wording is compressed and somewhat awkward, but in context
    the point is that they are setting terms for God and thus acting as though they
    occupy his place among mortals. 'In place of God' preserves this theological force
    without overstating it as 'above God.'
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity where the source allows more than one construal.
