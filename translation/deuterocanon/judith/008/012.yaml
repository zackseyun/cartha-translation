translation:
  text: And now, who are you, that you have put God to the test this day, and have
    taken your stand in place of God among the sons of men?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and speak for God among human beings.' The Greek phrase is compressed,
      and the preposition can also suggest acting on behalf of God.
    reason: alternative_reading
  - marker: b
    text: Literally, 'among the sons of men,' a Hebrew-style expression for mortal
      humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειράσατε
  chosen: have put ... to the test
  alternatives:
  - have tested
  - have tempted
  lexicon: BDAG
  rationale: πειράζω can mean test, try, or tempt. In this rebuke, the sense is not
    enticing God to evil but presumptuously testing him, so 'put God to the test'
    best captures the idiom in clear modern English.
- source_word: ἐν τῇ ἡμέρᾳ τῇ σήμερον
  chosen: this day
  alternatives:
  - today
  - on this very day
  lexicon: BDAG
  rationale: The doubled temporal expression is emphatic. 'This day' preserves the
    solemn, rhetorical force better than the flatter 'today' while remaining natural
    English.
- source_word: ὑπεῖρ τοῦ θεοῦ
  chosen: in place of God
  alternatives:
  - for God
  - on behalf of God
  - above God
  lexicon: LSJ
  rationale: The preposition ὑπέρ normally means 'for/on behalf of,' but in this context
    with the following phrase 'among the sons of men' it rebukes the leaders for assuming
    God's role or prerogative. 'In place of God' makes the implied sense explicit
    in idiomatic English.
- source_word: ἐν μέσῳ υἱῶν ἀνθρώπων
  chosen: among the sons of men
  alternatives:
  - among human beings
  - in the midst of men
  lexicon: LSJ
  rationale: The phrase is literally 'among sons of men.' Per project philosophy,
    a gender-accurate rendering is preferred where the source is masculine. Here the
    idiom contrasts God with mortal humanity, so 'sons of men' preserves the rhetorical
    texture; a more inclusive alternative is worth noting in a footnote.
- source_word: τίνες ἐστὲ ὑμεῖς
  chosen: who are you
  alternatives:
  - what sort of people are you
  - who do you think you are
  lexicon: BDAG
  rationale: The phrase is a sharp rhetorical challenge. 'Who are you' is the most
    direct and textually anchored rendering; 'who do you think you are' would be interpretive
    expansion.
