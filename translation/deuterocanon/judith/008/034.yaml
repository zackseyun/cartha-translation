translation:
  text: But you must not investigate what I am doing, for I will not tell you until
    what I am doing has been completed.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξερευνήσετε
  chosen: investigate
  alternatives:
  - search out
  - examine thoroughly
  - probe
  lexicon: LSJ
  rationale: The verb conveys thorough inquiry or probing. 'Investigate' preserves
    the sense of deliberate searching without sounding overly technical or archaic.
- source_word: τὴν πρᾶξίν μου
  chosen: what I am doing
  alternatives:
  - my action
  - my deed
  - my plan
  lexicon: LSJ
  rationale: Although πρᾶξις can be rendered 'action' or 'deed,' idiomatic English
    here is better served by 'what I am doing.' This keeps the focus on Judith's course
    of action without over-specifying it as a single deed or an internal plan.
- source_word: οὐ γὰρ ἐρῶ ὑμῖν
  chosen: for I will not tell you
  alternatives:
  - for I will not speak to you about it
  - for I will not say to you
  lexicon: LSJ
  rationale: ἐρῶ is the future of λέγω, here naturally meaning 'tell' in context,
    since Judith is withholding information from the hearers.
- source_word: ἕως τοῦ τελεσθῆναι
  chosen: until ... has been completed
  alternatives:
  - until ... is finished
  - until the completion of
  lexicon: LSJ
  rationale: 'The construction marks a terminus: Judith will remain silent until the
    matter reaches completion. ''Has been completed'' reflects the passive infinitive
    τελεσθῆναι and reads naturally in English.'
- source_word: ἃ ἐγὼ ποιῶ
  chosen: what I am doing
  alternatives:
  - the things I am doing
  - what I do
  lexicon: LSJ
  rationale: The relative pronoun with ποιῶ refers to Judith's ongoing actions. 'What
    I am doing' best captures the present, unfolding sense in clear English.
