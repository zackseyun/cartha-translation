id: JDT.8.34
reference: Judith 8:34
source:
  edition: lxx-swete-1909
  text: ὑμεῖς δὲ οὐκ ἐξερευνήσετε τὴν πρᾶξίν μου, οὐ γὰρ ἐρῶ ὑμῖν ἕως τοῦ τελεσθῆναι
    ἃ ἐγὼ ποιῶ.
  language: Greek
