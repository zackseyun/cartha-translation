theological_decisions:
- issue: Implicit subject of the verbs referring to Abraham and Isaac
  chosen_reading: The subject is understood as God/he, left implicit in Greek but
    expressed in English as 'he' where needed for clarity.
  alternative_readings:
  - Leave the subject entirely unexpressed in English
  - Specify 'God' explicitly
  rationale: Greek leaves the subject implicit, but English requires a subject for
    natural syntax in the first two clauses. Using 'he' preserves the source's restraint
    better than inserting 'God' explicitly, while still making the sentence readable.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering of ἐπείρασεν in relation to divine action
  chosen_reading: tested
  alternative_readings:
  - tempted
  - tried
  rationale: Because the verse recalls God's dealings with the patriarchs, 'tested'
    best reflects a proving or refining action and avoids the misleading moral sense
    of 'tempted.'
  doctrine_reference: Original-language primacy over translation tradition.
