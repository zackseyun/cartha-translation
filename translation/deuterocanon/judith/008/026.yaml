id: JDT.8.26
reference: Judith 8:26
source:
  edition: lxx-swete-1909
  text: μνήσθητε ὅσα ἐποίησεν μετʼ Ἀβραάμ, καὶ ὅσα ἐπείρασεν τὸν Ἰσαάκ, καὶ ὅσα ἐγένετο
    τῷ Ἰακὼβ ἐν Μεσοποταμίᾳ τῆς Συρίας ποιμαίνοντι τὰ πρόβατα Λαβὰν τοῦ ἀδελφοῦ τῆς
