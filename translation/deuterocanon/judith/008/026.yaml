translation:
  text: Remember what he did with Abraham, and how he tested Isaac, and what happened
    to Jacob in Mesopotamia of Syria while he was shepherding the sheep of Laban,
    his mother's brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tried Isaac.' The Greek verb can mean 'test,' 'try,' or in some contexts
      'tempt'; here the sense is a proving test, not an enticement to evil.
    reason: lexical_alternative
  - marker: b
    text: '''Mesopotamia of Syria'' is the Greek geographical expression; it may also
      be rendered ''Syrian Mesopotamia.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητε
  chosen: Remember
  alternatives:
  - Call to mind
  - Recall
  lexicon: BDAG
  rationale: Aorist imperative plural from μιμνῄσκομαι/μιμνήσκομαι, functioning as
    an exhortation to recollect past divine dealings. 'Remember' is the most natural
    and direct English imperative.
- source_word: ὅσα ἐποίησεν μετʼ Ἀβραάμ
  chosen: what he did with Abraham
  alternatives:
  - what he did for Abraham
  - what he did to Abraham
  lexicon: BDAG
  rationale: The subject is implicit from context and most naturally refers to God.
    μετὰ with the genitive here is best rendered 'with,' indicating God's dealings
    with Abraham without over-specifying benefaction or adversity.
- source_word: ἐπείρασεν
  chosen: tested
  alternatives:
  - tried
  - put to the test
  lexicon: BDAG
  rationale: πειράζω can mean test/try/tempt depending on context. In reference to
    Isaac and the patriarchal narrative, 'tested' best preserves the sense of proving
    faithfulness without implying enticement to evil.
- source_word: ὅσα ἐγένετο τῷ Ἰακώβ
  chosen: what happened to Jacob
  alternatives:
  - what came upon Jacob
  - what took place for Jacob
  lexicon: BDAG
  rationale: The idiom ὅσα ἐγένετο naturally refers to events that befell Jacob. 'What
    happened to Jacob' is idiomatic and sufficiently broad.
- source_word: ἐν Μεσοποταμίᾳ τῆς Συρίας
  chosen: in Mesopotamia of Syria
  alternatives:
  - in Syrian Mesopotamia
  - in Mesopotamia, that is, Syria
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the geographical expression of the
    Greek. 'Mesopotamia of Syria' sounds slightly foreign in English but remains understandable
    and transparent to the source wording.
- source_word: ποιμαίνοντι
  chosen: while he was shepherding
  alternatives:
  - as he was tending
  - while tending
  lexicon: BDAG
  rationale: Present participle describing Jacob's ongoing activity. 'Shepherding'
    keeps the pastoral imagery explicit; 'while he was shepherding' conveys the circumstantial
    force.
- source_word: τὰ πρόβατα
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: BDAG
  rationale: Literally 'the sheep.' Although 'the flock' is possible, the concrete
    noun is preferable here.
- source_word: Λαβὰν τοῦ ἀδελφοῦ τῆς μητρὸς αὐτοῦ
  chosen: of Laban, his mother's brother
  alternatives:
  - of Laban, the brother of his mother
  - of his maternal uncle Laban
  lexicon: BDAG
  rationale: The genitive phrase identifies Laban as Jacob's maternal uncle. 'His
    mother's brother' is clear, close to the Greek, and avoids importing a more interpretive
    kinship term into the main text.
