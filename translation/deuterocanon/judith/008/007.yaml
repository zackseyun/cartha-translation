theological_decisions:
- issue: Status term for household dependents in an estate list
  chosen_reading: male servants and female servants
  alternative_readings:
  - male slaves and female slaves
  - servants and maidservants
  rationale: The Greek παῖδας / παιδίσκας in this context denotes household laborers
    as part of inherited property. Following project guidance on δοῦλος-like status
    language, 'slave' is used where bonded status is especially salient; here the
    verse is primarily inventorying estate assets, so 'servants' is retained in the
    main text while the stronger social-status alternative is preserved here.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1; Contested terms table
    on δοῦλος'
- issue: Sense of ἔμενεν ἐπʼ αὐτῶν
  chosen_reading: she remained over them
  alternative_readings:
  - she remained in charge of them
  - she lived on them
  rationale: The Greek can suggest continued oversight or possession of the estate.
    The chosen rendering preserves the literal prepositional structure and leaves
    the exact nuance open rather than over-interpreting.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3'
