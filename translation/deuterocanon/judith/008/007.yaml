translation:
  text: And she was very beautiful in appearance and lovely to behold; and Manasseh
    her husband had left her gold and silver and male servants and female servants
    and livestock and fields, and she remained over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'male slaves and female slaves.' The Greek terms can denote household
      slaves/servants in an estate inventory.
    reason: lexical_alternative
  - marker: b
    text: Or 'she remained in charge of them' or 'she continued over them.' The Greek
      expression is slightly ambiguous about whether it emphasizes possession, management,
      or both.
    reason: alternative_reading
lexical_decisions:
- source_word: καλή
  chosen: beautiful
  alternatives:
  - good-looking
  - fair
  lexicon: LSJ
  rationale: In the phrase καλὴ τῷ εἴδει, the adjective refers to physical attractiveness
    rather than moral goodness. 'Beautiful' is natural modern English and fits the
    paired description.
- source_word: τῷ εἴδει
  chosen: in appearance
  alternatives:
  - in form
  - in figure
  lexicon: LSJ
  rationale: εἶδος here denotes outward form/appearance. 'In appearance' is idiomatic
    and preserves the external, visual sense.
- source_word: ὡραία
  chosen: lovely
  alternatives:
  - beautiful
  - fair
  lexicon: LSJ
  rationale: Used in parallel with καλή, ὡραία intensifies and varies the description.
    'Lovely' avoids awkward repetition while preserving the positive aesthetic sense.
- source_word: τῇ ὄψει
  chosen: to behold
  alternatives:
  - in appearance
  - to look at
  - in countenance
  lexicon: LSJ
  rationale: ὄψις concerns sight/visual impression. Rendering the phrase ὡραία τῇ
    ὄψει as 'lovely to behold' gives natural English while preserving the visual emphasis.
- source_word: σφόδρα
  chosen: very
  alternatives:
  - exceedingly
  - greatly
  lexicon: LSJ
  rationale: The adverb intensifies the whole description. 'Very' is concise, natural,
    and sufficient in modern English.
- source_word: ὑπελείπετο
  chosen: had left
  alternatives:
  - left behind
  - bequeathed
  lexicon: LSJ
  rationale: The verb indicates that her deceased husband left property to her. 'Had
    left' communicates prior action without over-specifying a formal testamentary
    act implied by 'bequeathed'.
- source_word: παῖδας
  chosen: male servants
  alternatives:
  - servants
  - slaves
  - boys
  lexicon: LSJ
  rationale: In a property list paired with παιδίσκας, the term refers to household
    dependents/servants rather than children. 'Male servants' preserves the gender
    distinction explicit in the Greek. 'Slaves' is possible, but the verse itself
    lists estate assets without highlighting bonded status as theologically salient.
- source_word: παιδίσκας
  chosen: female servants
  alternatives:
  - maidservants
  - slave girls
  lexicon: LSJ
  rationale: The feminine counterpart to παῖδας in this estate list is best rendered
    'female servants.' This keeps the gendered pairing and avoids archaic diction.
- source_word: κτήνη
  chosen: livestock
  alternatives:
  - cattle
  - animals
  lexicon: LSJ
  rationale: κτήνη denotes domesticated animals/property animals generally. 'Livestock'
    is the most accurate broad modern term.
- source_word: ἀγρούς
  chosen: fields
  alternatives:
  - lands
  - farms
  lexicon: LSJ
  rationale: ἀγροί are fields or tracts of cultivated land. 'Fields' is the straightforward
    lexical equivalent.
- source_word: ἔμενεν ἐπʼ αὐτῶν
  chosen: she remained over them
  alternatives:
  - she managed them
  - she stayed in charge of them
  - she lived on them
  lexicon: LSJ
  rationale: The phrase likely indicates continued authority or control over the listed
    property. 'She remained over them' stays close to the Greek and preserves a slight
    ambiguity between possession and administration.
