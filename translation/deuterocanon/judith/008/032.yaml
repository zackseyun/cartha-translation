translation:
  text: And Judith said to them, “Listen to me, and I will do a deed that will reach
    to generations of generations among the children of our people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hear me.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'to generations of generations,' an idiom meaning enduring impact
      across successive generations.
    reason: lexical_alternative
  - marker: c
    text: Or 'the children/descendants of our people.' The Greek reads 'sons,' which
      may function collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσατέ
  chosen: Listen
  alternatives:
  - Hear
  lexicon: BDAG
  rationale: Imperative of ἀκούω. 'Listen' is natural modern English in direct address
    and preserves the call for attentive hearing better than the more archaic-sounding
    'Hear.'
- source_word: ποιήσω
  chosen: I will do
  alternatives:
  - I will make
  lexicon: BDAG
  rationale: Future of ποιέω. 'Do' fits idiomatic English with πρᾶγμα ('do a deed/thing')
    and avoids wooden phrasing.
- source_word: πρᾶγμα
  chosen: a deed
  alternatives:
  - a thing
  - an act
  - a matter
  lexicon: BDAG
  rationale: πρᾶγμα can mean thing, deed, matter, or affair. In context Judith announces
    a concrete action she is about to undertake, so 'a deed' best conveys purposeful
    action without over-specifying.
- source_word: ἀφίξεται
  chosen: will reach
  alternatives:
  - will come
  - will extend
  lexicon: BDAG
  rationale: Future middle of ἀφικνέομαι, literally 'arrive/reach.' With εἰς γενεὰς
    γενεῶν, 'will reach' communicates enduring effect across future generations more
    idiomatically than 'will arrive into.'
- source_word: εἰς γενεὰς γενεῶν
  chosen: to generation after generation
  alternatives:
  - for generations
  - into generations of generations
  lexicon: LEH
  rationale: The phrase is an idiom of long-lasting duration or remembrance. 'Generation
    after generation' preserves the repetitive force more transparently than the flatter
    'for generations.'
- source_word: υἱοῖς
  chosen: the sons of
  alternatives:
  - the children of
  - the descendants of
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural 'sons.' Following the project's
    gender-accurate policy, the masculine form is retained rather than neutralized,
    while the broader collective sense is still clear from context.
- source_word: τοῦ γένους ἡμῶν
  chosen: our people
  alternatives:
  - our race
  - our family line
  - our stock
  lexicon: BDAG
  rationale: γένος here refers to kin-group or people-group. 'Our people' is clear,
    natural English and avoids the misleading modern connotations of 'race' while
    preserving collective ethnic/familial identity.
