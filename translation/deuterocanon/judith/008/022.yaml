translation:
  text: and the slaughter of our brothers, and the captivity of the land, and the
    desolation of our inheritance, will return upon our own heads among the nations
    where we will serve as slaves there; and we will become a stumbling block and
    a reproach before those who possess us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it will return upon our heads.' The Greek verb is singular, but the
      subject is not explicitly stated in the clause.
    reason: alternative_reading
  - marker: b
    text: Or, 'wherever we serve there.' The Greek verb can mean simply 'serve,' but
      in this context of captivity it likely carries the sense of forced service or
      slavery.
    reason: lexical_alternative
lexical_decisions:
- source_word: φόνον
  chosen: slaughter
  alternatives:
  - murder
  - bloodshed
  - killing
  lexicon: LSJ
  rationale: φόνος can denote killing or bloodshed; 'slaughter' fits the wartime context
    and avoids implying a strictly juridical charge of 'murder' while preserving the
    violence of the term.
- source_word: ἀδελφῶν
  chosen: brothers
  alternatives:
  - brothers and sisters
  - kinsmen
  lexicon: LSJ
  rationale: The Greek is grammatically masculine plural. Per doctrine, gender-accurate
    rendering is preferred; 'brothers' preserves the source form and likely refers
    to fellow Israelites more broadly.
- source_word: αἰχμαλωσίαν
  chosen: captivity
  alternatives:
  - exile
  - enslavement
  lexicon: LSJ
  rationale: The term denotes being taken captive. 'Captivity' is broad enough to
    cover the state described without narrowing it to deportation alone ('exile')
    or only the condition of slavery ('enslavement').
- source_word: γῆς
  chosen: the land
  alternatives:
  - the country
  - the earth
  lexicon: LSJ
  rationale: In this national context γῆ refers to the people's land/territory, not
    the earth in general.
- source_word: ἐρήμωσιν
  chosen: desolation
  alternatives:
  - devastation
  - ruin
  lexicon: LSJ
  rationale: '''Desolation'' preserves the sense of being laid waste and suits the
    solemn register of the verse.'
- source_word: κληρονομίας
  chosen: inheritance
  alternatives:
  - heritage
  - possession
  lexicon: LSJ
  rationale: κληρονομία often carries covenantal-land overtones. 'Inheritance' preserves
    that resonance better than the flatter 'possession.'
- source_word: ἐπιστρέψει εἰς κεφαλὴν ἡμῶν
  chosen: he will turn back on our own heads
  alternatives:
  - he will bring back upon our heads
  - it will return upon our heads
  lexicon: LSJ
  rationale: This is an idiom of retribution or consequences returning upon someone.
    The singular verb naturally takes an implicit subject ('he'), most likely God
    in context; the idiom is preserved in readable English.
- source_word: ἐν τοῖς ἔθνεσιν
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: LSJ
  rationale: In the deuterocanonical/Septuagint setting, ἔθνη can mean nations or
    Gentiles. 'Among the nations' is the least interpretively loaded and fits the
    exile/captivity setting.
- source_word: δουλεύσωμεν
  chosen: serve as slaves
  alternatives:
  - serve
  - be enslaved
  lexicon: LSJ
  rationale: From δουλεύω, the bonded nature is salient here because the service is
    rendered under foreign domination. Per doctrine on doulos-family terms, 'serve
    as slaves' makes the coercive sense explicit without overparaphrasing.
- source_word: πρόσκομμα
  chosen: stumbling block
  alternatives:
  - offense
  - cause of stumbling
  lexicon: LSJ
  rationale: The noun literally denotes something against which one stumbles. 'Stumbling
    block' preserves the metaphor and is standard, clear English.
- source_word: ὄνειδος
  chosen: reproach
  alternatives:
  - disgrace
  - shame
  lexicon: LSJ
  rationale: '''Reproach'' captures both disgrace and the sense of being an object
    of scorn from others.'
- source_word: κτωμένων
  chosen: those who possess us
  alternatives:
  - our masters
  - those who have acquired us
  - those who own us
  lexicon: LSJ
  rationale: The participle from κτάομαι means acquire/possess. 'Those who possess
    us' stays close to the Greek and matches the captivity/slavery imagery; 'own us'
    is possible but slightly harsher and more interpretive.
