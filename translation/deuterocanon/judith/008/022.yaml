theological_decisions:
- issue: Implicit subject of ἐπιστρέψει
  chosen_reading: Rendered with explicit singular subject 'he' without identifying
    the subject by name.
  alternative_readings:
  - Rendered impersonally as 'it will return upon our heads'
  - Interpreted explicitly as 'God will turn back on our heads'
  rationale: The Greek has a singular verb but no explicit subject in this clause.
    Leaving the subject as 'he' preserves the grammar and likely divine agency in
    context without importing a noun not stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
