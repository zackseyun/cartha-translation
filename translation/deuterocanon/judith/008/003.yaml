id: JDT.8.3
reference: Judith 8:3
source:
  edition: lxx-swete-1909
  text: ἐτύγγανε γὰρ ἐπὶ τοῦ δεσμεύοντος τὸ δράγμα ἐν τῷ πεδίῳ, καὶ ὁ καύσων ἦλθεν
    ἐπὶ τὴν κεφαλὴν αὐτοῦ, καὶ ἔπεσεν ἐπὶ τὴν κλίνην καὶ ἐτελεύτησεν ἐν Βαιτυλουὰ
    τῇ πόλει αὐτοῦ, καὶ ἔθαψαν αὐτὸν μετὰ τῶν πατέρων αὐτοῦ ἐν τῷ ἀγρῷ τῷ ἀνὰ μέσον
    Δωθαεὶμ καὶ Βαλαμών.
  language: Greek
