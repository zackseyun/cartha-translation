translation:
  text: For if we are captured like this, all Judea will sit down, and our holy things
    will be plundered, and he will require their defilement from our blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when we are taken thus.' The Greek opening is syntactically awkward,
      but the sense is that if they are captured in this condition, disaster follows.
    reason: alternative_reading
  - marker: b
    text: '''Will sit down'' may imply being brought low or left helpless; the translation
      preserves the image of the Greek verb.'
    reason: lexical_alternative
  - marker: c
    text: Or 'their profanation' or 'the desecration of them.' The sense is the violation
      of the sacred things.
    reason: lexical_alternative
  - marker: d
    text: The Greek leaves the subject of 'will require' unstated; context likely
      implies God will call for an accounting for the desecration, at the cost of
      their blood.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπ' ἐν τῷ λημφθῆναι ἡμᾶς οὕτως
  chosen: For if we are captured like this
  alternatives:
  - when we are taken thus
  - if we are seized in this way
  lexicon: LSJ
  rationale: The phrase is syntactically awkward in Swete's text, but the infinitive
    λημφθῆναι with ἡμᾶς clearly conveys 'our being taken/captured.' Rendering with
    'if' best fits the conditional force in context, and 'captured' is more idiomatic
    than 'taken' in a military setting.
- source_word: καθήσεται
  chosen: will sit down
  alternatives:
  - will be brought low
  - will collapse
  lexicon: LSJ
  rationale: The verb literally means 'will sit.' In context it likely implies dejection
    or helplessness, but the translation keeps the concrete image rather than paraphrasing
    it away. This preserves the source's rhetorical force while remaining intelligible.
- source_word: πᾶσα ἡ Ἰουδαία
  chosen: all Judea
  alternatives:
  - the whole of Judea
  - all the Jews
  lexicon: LSJ
  rationale: Ἰουδαία here is the land/region, not the people as an ethnonym. 'All
    Judea' preserves the geographic reference.
- source_word: προνομευθήσεται
  chosen: will be plundered
  alternatives:
  - will be pillaged
  - will be ravaged
  lexicon: LSJ
  rationale: The passive future indicates seizure by enemies. 'Plundered' is a natural
    military term and fits the object 'our holy things.'
- source_word: τὰ ἅγια ἡμῶν
  chosen: our holy things
  alternatives:
  - our sanctuary
  - our sacred things
  lexicon: LSJ
  rationale: The plural neuter most naturally refers broadly to sacred things/holy
    places rather than a singular sanctuary alone. 'Holy things' stays close to the
    Greek while allowing the broader cultic sense.
- source_word: ζητήσει
  chosen: he will require
  alternatives:
  - he will demand
  - he will call to account for
  lexicon: LSJ
  rationale: 'The singular verb with an implicit subject most naturally refers to
    God in context: he will demand an accounting. ''Require'' preserves the judicial
    nuance without overexplaining.'
- source_word: τὴν βεβήλωσιν αὐτῶν
  chosen: their defilement
  alternatives:
  - their profanation
  - the desecration of them
  lexicon: LSJ
  rationale: βεβήλωσις denotes profanation or desecration of sacred things. 'Defilement'
    is readable modern English, though 'profanation' is a viable more formal alternative.
- source_word: ἐκ τοῦ αἵματος ἡμῶν
  chosen: from our blood
  alternatives:
  - at the cost of our blood
  - from us for our blood
  lexicon: LSJ
  rationale: The phrase is idiomatic and difficult; it expresses accountability resting
    on the people at the price of their blood. 'From our blood' is formally close,
    though somewhat stark, and preserves the metaphor without importing a fuller interpretation
    into the main text.
