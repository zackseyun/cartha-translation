theological_decisions:
- issue: Implicit subject of ζητήσει
  chosen_reading: The subject is left implicit in English as 'he,' naturally referring
    to God in context.
  alternative_readings:
  - an indefinite subject such as 'someone will require'
  - the enemy as subject
  rationale: The Greek has a singular verb without an explicit subject. In Judith's
    speech, divine accountability is the most coherent sense, but the translation
    avoids inserting 'God' directly into the text where the Greek does not state it.
  doctrine_reference: Preserve theological tension rather than resolve it.
