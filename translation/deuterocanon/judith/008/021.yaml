id: JDT.8.21
reference: Judith 8:21
source:
  edition: lxx-swete-1909
  text: ἐπ' ἐν τῷ λημφθῆναι ἡμᾶς οὕτως καθήσεται πᾶσα ἡ Ἰουδαία, καὶ προνομευθήσεται
    τὰ ἅγια ἡμῶν, καὶ ζητήσει τὴν βεβήλωσιν αὐτῶν ἐκ τοῦ αἵματος ἡμῶν,
  language: Greek
