theological_decisions:
- issue: Nature of the statement about Judith's reputation
  chosen_reading: The verse states that no one brought any evil or malicious word
    against her, grounding her good reputation in her fear of God.
  alternative_readings:
  - The phrase could be narrowed to 'no one accused her' in a more forensic sense.
  - The phrase could be broadened to 'no one spoke ill of her.'
  rationale: The Greek ἐπήνεγκεν ... ῥῆμα πονηρόν allows a range from hostile speech
    generally to accusation specifically. The main text keeps the image of 'bringing
    an evil word against her,' which preserves both possibilities without importing
    a stronger legal setting than the text requires.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
