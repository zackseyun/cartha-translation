theological_decisions:
- issue: Exclusive devotion to the one God
  chosen_reading: Rendered the confession as acknowledgment of no other god except
    him, preserving monotheistic exclusivity without adding covenantal terminology
    not explicit in the Greek.
  alternative_readings:
  - Rendered more dynamically as 'we have worshiped no other god but him'
  rationale: The Greek speaks of recognition/acknowledgment rather than explicitly
    of worship. The translation keeps the theological force of exclusive allegiance
    while staying close to the wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Meaning of γένος in relation to the community
  chosen_reading: Translated γένος as 'race' in the sense of lineage/people-group.
  alternative_readings:
  - people
  - family line
  - nation
  rationale: The term points to descent-group identity. 'Nation' would import a more
    political concept; 'people' is smoother but less tied to lineage. The chosen rendering
    preserves the ancestral dimension, though an alternative is worth noting because
    modern English usage of 'race' can mislead.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
