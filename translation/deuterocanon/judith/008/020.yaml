id: JDT.8.20
reference: Judith 8:20
source:
  edition: lxx-swete-1909
  text: ἡμεῖς δὲ ἕτερον θεὸν οὐκ ἐπέγνωμεν πλὴν αὐτοῦ· ὅθεν ἐλπίζομεν ὅτι οὐχ ὑπερόψεται
    ἡμᾶς οὐδ' ἀπὸ τοῦ γένους ἡμῶν.
  language: Greek
