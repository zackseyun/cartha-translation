id: JDT.8.2
reference: Judith 8:2
source:
  edition: lxx-swete-1909
  text: καὶ ὁ ἀνὴρ αὐτῆς Μανασσης τῆς φυλῆς αὐτῆς καὶ τῆς πατριᾶς αὐτῆς· καὶ ἀπέθανεν
    ἐν ἡμέραις θερισμοῦ κριθῶν.
  language: Greek
