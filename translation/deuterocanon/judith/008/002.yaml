translation:
  text: And her husband Manasseh was from her own tribe and her own family line; and
    he died in the days of the barley harvest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from her own tribe and her own ancestral house.' The Greek distinguishes
      φυλή ('tribe') from πατριά, a narrower kinship group.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνήρ
  chosen: husband
  alternatives:
  - man
  lexicon: BDAG
  rationale: With the possessive αὐτῆς ('her'), the relational sense 'husband' is
    the natural contextual meaning, not merely 'man'.
- source_word: Μανασσης
  chosen: Manasseh
  rationale: Personal name is transliterated by standard convention, following project
    policy to transliterate names rather than translate them.
- source_word: φυλή
  chosen: tribe
  alternatives:
  - clan
  lexicon: LSJ
  rationale: In Jewish genealogical context, φυλή refers to a tribal division of Israel.
    'Tribe' is the most direct and natural rendering.
- source_word: πατριά
  chosen: family line
  alternatives:
  - ancestral house
  - clan
  - father's house
  lexicon: LSJ
  rationale: πατριά denotes a narrower kinship grouping within the tribe. 'Family
    line' communicates descent-based lineage clearly in modern English without sounding
    overly technical.
- source_word: ἐν ἡμέραις
  chosen: in the days of
  alternatives:
  - during
  - at the time of
  lexicon: LSJ
  rationale: This is a common temporal expression. 'In the days of' preserves the
    idiomatic force while remaining readable.
- source_word: θερισμοῦ κριθῶν
  chosen: the barley harvest
  alternatives:
  - barley reaping
  - harvest of barley
  lexicon: LSJ
  rationale: The genitive construction specifies the crop being harvested. 'The barley
    harvest' is idiomatic modern English and preserves the agricultural reference.
