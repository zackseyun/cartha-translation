id: JDT.8.1
reference: Judith 8:1
source:
  edition: lxx-swete-1909
  text: Καὶ ἤκουσεν ἐν ἐκείναις ταῖς ἡμέραις Ἰουδεὶθ θυγάτηρ Μεραρὶ υἱοῦ Ὢξ υἱοῦ Ἰωσὴφ
    υἱοῦ Ὀζιὴλ υἱοῦ Ἐλκεία υἱοῦ Ἠλειοὺ υἱοῦ Χελκείου υἱοῦ Ἐλεὰβ υἱοῦ Ναθαναὴλ υἱοῦ
    Σαλαμιὴλ υἱοῦ Σαρασαδαὶ υἱοῦ Ἰσραήλ.
  language: Greek
