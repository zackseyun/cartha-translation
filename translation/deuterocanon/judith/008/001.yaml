translation:
  text: And in those days Judith heard, the daughter of Merari son of Ox son of Joseph
    son of Oziel son of Elkiah son of Eliou son of Chelkias son of Eliab son of Nathanael
    son of Salamiel son of Sarasadai son of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Several names in Judith's genealogy are Greek forms of names more familiar
      from Hebrew tradition; possible equivalents include Oziel/Uzziel and Sarasadai/Zurishaddai.
      The main text follows the Greek witness rather than reconstructing Hebrew forms.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - heard about
  - learned
  lexicon: BDAG
  rationale: The verb simply states that Judith received the report. 'Heard' is the
    most direct rendering; 'heard about' is possible from context but adds an object
    not yet expressed in this verse.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  chosen: in those days
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: This is a standard temporal expression. 'In those days' preserves the
    narrative cadence and formal sense without sounding archaic.
- source_word: θυγάτηρ
  chosen: daughter
  lexicon: BDAG
  rationale: Literal genealogical designation; no reason to soften or paraphrase.
- source_word: υἱοῦ
  chosen: son of
  alternatives:
  - descendant of
  lexicon: BDAG
  rationale: The repeated genealogical formula is explicit in Greek. 'Son of' preserves
    the formal lineage structure; 'descendant of' would smooth the text beyond the
    source.
- source_word: Ἰουδεὶθ
  chosen: Judith
  rationale: Standard English transliteration of the personal name.
- source_word: Μεραρὶ / Ὢξ / Ἰωσὴφ / Ὀζιὴλ / Ἐλκεία / Ἠλειοὺ / Χελκείου / Ἐλεὰβ /
    Ναθαναὴλ / Σαλαμιὴλ / Σαρασαδαὶ / Ἰσραήλ
  chosen: Merari / Ox / Joseph / Oziel / Elkiah / Eliou / Chelkias / Eliab / Nathanael
    / Salamiel / Sarasadai / Israel
  alternatives:
  - Merari / Uz / Joseph / Uzziel / Hilkiah / Elihu / Hilkiah / Eliab / Nethanel /
    Shelumiel / Zurishaddai / Israel
  rationale: Personal names are transliterated rather than translated, following project
    philosophy. Because the source is Greek, the main text follows Greek-form transliterations
    rather than retroverting to presumed Hebrew forms. More familiar Hebraized equivalents
    are preserved as alternatives where identifiable.
