theological_decisions:
- issue: Anthropomorphic contrast about God and man
  chosen_reading: Render the statement as a denial that God can be pressured or swayed
    like a human.
  alternative_readings:
  - Render more dynamically as 'God is not a human to be threatened or manipulated'
  rationale: The Greek explicitly contrasts God with man/son of man using two passive
    infinitives. The translation keeps the human-divine contrast and avoids expanding
    it into a broader doctrinal statement beyond the verse's immediate point.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
