id: JDT.8.16
reference: Judith 8:16
source:
  edition: lxx-swete-1909
  text: ὑμεῖς δὲ μὴ ἐνεχυράζετε τὰς βουλὰς κυρίου τοῦ θεοῦ ἡμῶν, ὅτι οὐχ ὡς ἄνθρωπος
    ὁ θεὸς ἀπειληθῆναι, οὐδὲ ὡς υἱὸς ἀνθρώπου διαπεισθῆναι.
  language: Greek
  pages:
