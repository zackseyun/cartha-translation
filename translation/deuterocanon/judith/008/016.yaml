translation:
  text: But do not hold the plans of the Lord our God as security, for God is not
    like a man, to be threatened, nor like a son of man, to be persuaded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not take the plans of the Lord our God as a pledge/collateral.' The
      Greek uses pledge-security imagery.
    reason: lexical_alternative
  - marker: b
    text: '''A son of man'' here is a Hebrew-style way of saying a human being, not
      a messianic title.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐνεχυράζετε
  chosen: hold ... as security
  alternatives:
  - take as a pledge
  - treat as collateral
  - bind by pledge
  lexicon: LSJ
  rationale: The verb literally relates to taking or giving a pledge/security. In
    context Judith warns against trying to place God's purposes under human conditions
    or deadlines. 'Hold ... as security' preserves the pledge/collateral imagery more
    transparently than a looser paraphrase such as 'put to the test.'
- source_word: βουλάς
  chosen: plans
  alternatives:
  - counsels
  - purposes
  - designs
  lexicon: LSJ
  rationale: βουλή commonly denotes counsel, purpose, or plan. 'Plans' is clear modern
    English and fits God's intended course of action without sounding overly abstract.
- source_word: κυρίου τοῦ θεοῦ ἡμῶν
  chosen: the Lord our God
  alternatives:
  - our Lord God
  lexicon: LSJ
  rationale: This preserves κύριος as 'Lord' per project defaults and keeps the genitival/appositional
    structure natural in English.
- source_word: ἀπειληθῆναι
  chosen: to be threatened
  alternatives:
  - to be intimidated
  - to be warned by threats
  lexicon: LSJ
  rationale: The passive infinitive most naturally means 'to be threatened.' This
    fits the contrast that God cannot be manipulated by human pressure.
- source_word: διαπεισθῆναι
  chosen: to be persuaded
  alternatives:
  - to be swayed
  - to be won over
  lexicon: LSJ
  rationale: The verb conveys being persuaded or induced. 'To be persuaded' is the
    most direct rendering and preserves the parallel with the previous infinitive.
- source_word: υἱὸς ἀνθρώπου
  chosen: a son of man
  alternatives:
  - a human being
  - man's son
  lexicon: LSJ
  rationale: The phrase is an idiomatic Semitic-style expression for a human being,
    but here the parallelism with 'man' is best preserved by the more literal 'a son
    of man.' This keeps the rhetoric of the source without importing later messianic
    overtones.
