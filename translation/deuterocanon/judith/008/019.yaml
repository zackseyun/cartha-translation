translation:
  text: For this reason our fathers were handed over to the sword and to plundering,
    and they fell in a great slaughter before our enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'they fell [as] a great fallen body/corpse'—an idiom expressing
      a massive number of slain.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν χάριν
  chosen: For this reason
  alternatives:
  - because of which
  - for which reason
  lexicon: LSJ
  rationale: Idiomatic causal expression; 'For this reason' gives clear modern English
    while preserving the causal force of the Greek.
- source_word: ἐδόθησαν
  chosen: were handed over
  alternatives:
  - were given
  - were delivered
  lexicon: LSJ
  rationale: Passive of δίδωμι here denotes being given up into hostile power or fate,
    not a neutral 'given.' 'Were handed over' preserves the passive and the sense
    of judgment/disaster.
- source_word: εἰς ῥομφαίαν
  chosen: to the sword
  alternatives:
  - to a sword
  - to slaughter by the sword
  lexicon: LSJ
  rationale: The idiom 'given to the sword' is standard and natural in English for
    violent death in war.
- source_word: εἰς διαρπαγήν
  chosen: to plundering
  alternatives:
  - to spoil
  - to pillage
  - to plunder
  lexicon: LSJ
  rationale: The noun denotes being subjected to seizure or looting. 'To plundering'
    matches the parallel structure with 'to the sword' and keeps the abstract noun
    force.
- source_word: οἱ πατέρες ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: LSJ
  rationale: The Greek is explicitly masculine/plural and in ancestral covenantal-historical
    language. Per doctrine, gender-accurate rendering is preferred; 'our fathers'
    best matches the source, though 'ancestors' is a possible smoothing alternative.
- source_word: ἔπεσον
  chosen: they fell
  alternatives:
  - they were struck down
  - they collapsed
  lexicon: LSJ
  rationale: A common biblical idiom for dying in battle. 'They fell' is concise and
    preserves the source image.
- source_word: πτῶμα μέγα
  chosen: in a great slaughter
  alternatives:
  - a great corpse-fall
  - a great downfall
  - many slain
  lexicon: LSJ
  rationale: Literally the phrase is awkward in English ('a great fallen body/corpse').
    In context it denotes a massive battlefield death toll. 'In a great slaughter'
    communicates the sense idiomatically without over-paraphrasing.
- source_word: ἐνώπιον τῶν ἐχθρῶν ἡμῶν
  chosen: before our enemies
  alternatives:
  - in the presence of our enemies
  - before the face of our enemies
  lexicon: LSJ
  rationale: Standard rendering of ἐνώπιον; 'before our enemies' is natural and sufficiently
    formal.
