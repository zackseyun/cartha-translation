theological_decisions:
- issue: Rendering of ancestral term with masculine form
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The verse speaks in Israel's traditional historical idiom. Following
    the project's gender-accurate policy, the masculine term is retained rather than
    neutralized, since the source wording is not genericized.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Interpretation of πτῶμα μέγα
  chosen_reading: they fell in a great slaughter
  alternative_readings:
  - they fell as a great heap of corpses
  - they suffered a great downfall
  rationale: The Greek expression is semantically compressed and not idiomatic in
    English if rendered too literally. The chosen reading preserves the battlefield-death
    sense without importing extra theological meaning.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy; §6 Readable modern
    English
