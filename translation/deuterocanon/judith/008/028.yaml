id: JDT.8.28
reference: Judith 8:28
source:
  edition: lxx-swete-1909
  text: Καὶ εἶπεν πρὸς αὐτὴν Ὀζείας Πάντα ὅσα εἶπας ἀγαθῇ καρδίᾳ ἐλάλησας, καὶ οὐκ
    ἔστιν ὃς ἀντιστήσεται τοῖς λόγοις σου.
  language: Greek
  pages:
