id: JDT.8.23
reference: Judith 8:23
source:
  edition: lxx-swete-1909
  text: ὅτι οὐ κατευθυνθήσεται ἡ δουλεία ἡμῶν εἰς χάριν, ἀλλʼ εἰς ἀτιμίαν θήσει αὐτὴν
    Κύριος ὁ θεὸς ἡμῶν.
  language: Greek
