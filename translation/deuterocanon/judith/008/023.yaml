translation:
  text: For our slavery will not be directed toward favor, but the Lord our God will
    turn it into dishonor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For our bondage will not end in favor, but the Lord our God will make
      it a disgrace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατευθυνθήσεται
  chosen: will be directed
  alternatives:
  - will prosper
  - will be set right
  - will be guided
  lexicon: LSJ
  rationale: The passive future of κατευθύνω here most naturally conveys being directed
    or ordered toward an end. In this context with εἰς χάριν, the sense is not physical
    guidance but outcome or orientation. 'Will be directed toward favor' preserves
    the metaphor without overinterpreting it as 'prosper.'
- source_word: δουλεία
  chosen: slavery
  alternatives:
  - servitude
  - bondage
  lexicon: LSJ
  rationale: δουλεία denotes a state of bondage or slavery. Given the project's guidance
    to use 'slave/slavery' where bonded status is salient, 'slavery' best preserves
    the force of the term here rather than the softer 'servitude.'
- source_word: εἰς χάριν
  chosen: toward favor
  alternatives:
  - to favor
  - for grace
  - for acceptance
  lexicon: LSJ
  rationale: χάρις can mean favor, grace, or goodwill. In this political-social context
    contrasting with ἀτιμία, 'favor' fits better than the more theologically loaded
    'grace.' 'Toward favor' mirrors the Greek prepositional construction.
- source_word: ἀτιμίαν
  chosen: dishonor
  alternatives:
  - disgrace
  - shame
  lexicon: LSJ
  rationale: ἀτιμία denotes dishonor or disgrace. 'Dishonor' pairs well with 'favor'
    and keeps the contrast at the level of status and reputation without adding emotional
    nuance.
- source_word: θήσει αὐτήν
  chosen: will turn it into
  alternatives:
  - will make it
  - will place it as
  lexicon: LSJ
  rationale: τίθημι with a double-object/result sense can mean 'make' or 'set as.'
    In idiomatic English, 'will turn it into dishonor' clearly expresses the resulting
    state while remaining faithful to the Greek construction.
- source_word: Κύριος ὁ θεὸς ἡμῶν
  chosen: the Lord our God
  alternatives:
  - our Lord God
  lexicon: LSJ
  rationale: κύριος is rendered 'Lord' per project doctrine, and the full phrase is
    naturally expressed in English as 'the Lord our God.'
