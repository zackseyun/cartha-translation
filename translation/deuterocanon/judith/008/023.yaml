theological_decisions:
- issue: Rendering of δουλεία in a context of Israel's subjugation
  chosen_reading: slavery
  alternative_readings:
  - servitude
  - bondage
  rationale: Following the doctrine's guidance on δοῦλος-word group, the stronger
    bonded sense is retained because the verse speaks of a condition of humiliation
    and subjection, not mere service.
  doctrine_reference: 'DOCTRINE.md: Contested terms table on δοῦλος *doulos*; Translation
    philosophy #1'
- issue: Rendering χάρις in a non-soteriological context
  chosen_reading: favor
  alternative_readings:
  - grace
  rationale: The contrast with ἀτιμία concerns social standing and outcome, not salvific
    grace. 'Favor' preserves the plain sense without importing later theological associations.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 and #6'
