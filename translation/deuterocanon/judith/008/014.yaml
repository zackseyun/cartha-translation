id: JDT.8.14
reference: Judith 8:14
source:
  edition: lxx-swete-1909
  text: ὅτι βάθος καρδίας ἀνθρώπου οὐχ εὑρήσετε, καὶ λόγους τῆς διανοίας αὐτοῦ οὐ
    διαλήμψεσθε· καὶ πῶς τὸν θεὸν ὃς ἐποίησεν τὰ πάντα ταῦτα ἐρευνήσετε, καὶ τὸν νοῦν
    αὐτοῦ ἐπιγνώσεσθε, καὶ τὸν λογισμὸν αὐτοῦ κατανοήσετε; μηδαμῶς, ἀδελφοί, μὴ παροργίζετε
    κύριον θεὸν ἡμῶν.
  language: Greek
