theological_decisions:
- issue: Generic masculine ἀνθρώπου and communal address ἀδελφοί
  chosen_reading: 'Retain masculine forms in English: ''a man''s heart'' and ''brothers.'''
  alternative_readings:
  - a human heart
  - brothers and sisters
  rationale: The doctrine calls for gender-accurate rather than gender-neutral renderings
    where the source uses masculine forms with representative force. Because the verse
    speaks generally of human limitation and addresses a group, the masculine forms
    are preserved in the main text rather than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
