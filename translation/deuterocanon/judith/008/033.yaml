theological_decisions:
- issue: Rendering of Κύριος
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: Following project doctrine, κύριος is translated 'Lord.' The article
    is retained in English because the Greek has anarthrous proper-title usage that
    idiomatically refers to Israel's God; 'the Lord' is standard and clear in this
    narrative setting.
