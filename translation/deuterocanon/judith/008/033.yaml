id: JDT.8.33
reference: Judith 8:33
source:
  edition: lxx-swete-1909
  text: ὑμεῖς στήσεσθε ἐπὶ τῆς πύλης τὴν νύκτα ταύτην, καὶ ἐξελεύσομαι ἐγὼ μετὰ τῆς
    ἅβρας μου, καὶ ἐν ταῖς ἡμέραις μεθʼ ἃς εἴπατε παραδῶσειν τὴν πόλιν τοῖς ἐχθροῖς
    ἡμῶν, ἐπισκέψεται Κύριος τὸν Ἰσραὴλ ἐν χειρί μου.
  language: Greek
