translation:
  text: You stand at the gate tonight, and I will go out with my maidservant; and
    within the days after which you said you would hand over the city to our enemies,
    the Lord will visit Israel by my hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this night.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'will visit Israel' can also imply active intervention or care,
      not merely a visit in the ordinary sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: στήσεσθε
  chosen: stand
  alternatives:
  - take your stand
  - station yourselves
  lexicon: BDAG
  rationale: Future middle of ἵστημι here calls for remaining posted at a place. 'Stand'
    is natural English and keeps the imperative-like force of Judith's instruction
    without over-specifying military posture.
- source_word: ἐπὶ τῆς πύλης
  chosen: at the gate
  alternatives:
  - by the gate
  - upon the gate
  lexicon: BDAG
  rationale: With ἐπί plus genitive in this context, location near/at the city gate
    is intended. 'At the gate' is idiomatic and fits the scene.
- source_word: τὴν νύκτα ταύτην
  chosen: tonight
  alternatives:
  - this night
  lexicon: BDAG
  rationale: The phrase means 'this night.' 'Tonight' is a readable modern equivalent
    that preserves the temporal reference.
- source_word: ἅβρας
  chosen: maidservant
  alternatives:
  - female servant
  - attendant
  lexicon: LSJ
  rationale: ἅβρα refers to a female personal servant/maid. 'Maidservant' preserves
    both gender and servant status better than the softer 'attendant.'
- source_word: ἐν ταῖς ἡμέραις μεθʼ ἃς
  chosen: within the days after which
  alternatives:
  - in the days after which
  - after those days
  lexicon: BDAG
  rationale: The Greek points to the span of days following the deadline the leaders
    had named. 'Within the days after which' preserves the temporal sequence and the
    sense that the promised divine action will occur before that period runs out.
- source_word: παραδῶσειν
  chosen: hand over
  alternatives:
  - deliver up
  - surrender
  lexicon: BDAG
  rationale: παραδίδωμι commonly means 'hand over' or 'deliver up.' Here the object
    is the city to enemies; 'hand over' is transparent and avoids importing a more
    technical military term than the Greek itself requires.
- source_word: ἐπισκέψεται
  chosen: will visit
  alternatives:
  - will look upon
  - will intervene for
  - will care for
  lexicon: BDAG
  rationale: ἐπισκέπτομαι can denote visiting with concern, often implying saving
    intervention. 'Will visit' keeps the biblical idiom and leaves the precise mode
    of divine action to the context rather than paraphrasing it away.
- source_word: ἐν χειρί μου
  chosen: by my hand
  alternatives:
  - through me
  - by means of me
  lexicon: BDAG
  rationale: The idiom literally means 'in/by my hand,' expressing instrumentality.
    'By my hand' preserves the vivid biblical phrasing and Judith's role as the means
    of the Lord's action.
