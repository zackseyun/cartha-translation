id: JDT.8.10
reference: Judith 8:10
source:
  edition: lxx-swete-1909
  text: καὶ ἀποστείλασα τὴν ἅβραν αὐτῆς τὴν ἐφεστῶσαν πᾶσιν τοῖς ὑπάρχουσιν αὐτῆς
    ἐκάλεσεν Χαβρεὶν καὶ Χαρμεῖν τοὺς πρεσβυτέρους τῆς πόλεως αὐτῆς.
  language: Greek
