translation:
  text: And she sent her maid, who was in charge of all that belonged to her, and
    summoned Chabris and Charmis, the elders of her city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'female servant' or 'handmaid.' The Greek ἅβρα denotes a female attendant.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστείλασα
  chosen: she sent
  alternatives:
  - having sent
  - sending
  lexicon: LSJ
  rationale: Aorist participle preceding the main verb; in natural English, 'she sent
    ... and summoned' best conveys the sequence without awkwardness.
- source_word: ἅβραν
  chosen: maid
  alternatives:
  - female servant
  - handmaid
  lexicon: LSJ
  rationale: Refers to a female attendant/maidservant. 'Maid' is concise, natural
    English and fits the domestic setting; 'handmaid' is archaic, while 'female servant'
    is more wooden.
- source_word: τὴν ἐφεστῶσαν πᾶσιν τοῖς ὑπάρχουσιν αὐτῆς
  chosen: who was in charge of all that belonged to her
  alternatives:
  - who supervised all her possessions
  - who was set over all her property
  lexicon: LSJ
  rationale: ἐφεστῶσαν indicates one placed over or supervising; τοῖς ὑπάρχουσιν αὐτῆς
    refers to her belongings/property. The chosen rendering is clear modern English
    and preserves the managerial sense.
- source_word: ἐκάλεσεν
  chosen: summoned
  alternatives:
  - called
  - invited
  lexicon: LSJ
  rationale: In context Judith sends her attendant to bring city elders to her. 'Summoned'
    better captures the purposeful official sense than the more generic 'called'.
- source_word: Χαβρεὶν καὶ Χαρμεῖν
  chosen: Chabris and Charmis
  alternatives:
  - Habrin and Harmein
  rationale: These are personal names and should be transliterated rather than translated.
    The chosen forms reflect standard Anglicized transliteration from the Greek spellings.
- source_word: τοὺς πρεσβυτέρους τῆς πόλεως αὐτῆς
  chosen: the elders of her city
  alternatives:
  - the city elders
  - the elders of her town
  lexicon: LSJ
  rationale: πρεσβύτεροι here denotes civic elders, not merely older men. 'The elders
    of her city' preserves the formal social role and the possessive αὐτῆς.
