id: JDT.8.18
reference: Judith 8:18
source:
  edition: lxx-swete-1909
  text: ὅτι οὐκ ἀνέστη ἐν ταῖς γενεαῖς ἡμῶν οὐδὲ ἔστιν ἐν τῇ ἡμέρᾳ τῇ σήμερον φυλὴ
    οὔτε πατριὰ οὔτε δῆμος οὔτε πόλις ἐξ ἡμῶν οἱ προσκυνοῦσι θεοῖς χειροποιήτοις,
    καθάπερ ἐγένετο ἐν ταῖς πρότερον ἡμέραις·
  language: Greek
