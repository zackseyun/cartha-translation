theological_decisions:
- issue: Rendering the anti-idolatry phrase θεοῖς χειροποιήτοις
  chosen_reading: gods made by hands
  alternative_readings:
  - idols made by human hands
  - handmade gods
  rationale: The Greek says 'gods made by hands,' a polemical expression for idols.
    The chosen rendering preserves the literal wording and theological irony without
    importing a more interpretive noun into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    lexical transparency.'
