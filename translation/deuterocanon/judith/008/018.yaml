translation:
  text: For in our generations no tribe or clan or people or city has arisen from
    among us that worships gods made by hands, as happened in former days; indeed,
    there is none even to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'idols made by human hands.' The Greek reads literally 'gods made by
      hands,' using a polemical expression for idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέστη
  chosen: has arisen
  alternatives:
  - has appeared
  - rose up
  - came into being
  lexicon: BDAG
  rationale: Aorist of ἀνίστημι here refers to something arising or appearing within
    Israel's generations, not literal resurrection. 'Has arisen' preserves the metaphorical
    sense and fits the negative claim that no idolatrous group has emerged from among
    them.
- source_word: γενεαῖς
  chosen: generations
  alternatives:
  - age
  - family lines
  lexicon: BDAG
  rationale: The plural refers to successive generations of the people, contrasting
    present faithfulness with earlier times. 'Generations' is the most natural and
    direct rendering.
- source_word: φυλή
  chosen: tribe
  alternatives:
  - people-group
  lexicon: BDAG
  rationale: In Jewish/Israelite context φυλή naturally denotes a tribe. This preserves
    the social scale in the list.
- source_word: πατριά
  chosen: clan
  alternatives:
  - family
  - lineage
  lexicon: BDAG
  rationale: πατριά denotes a kinship subdivision smaller than a tribe. 'Clan' best
    captures that social unit in readable English.
- source_word: δῆμος
  chosen: people
  alternatives:
  - district
  - population
  - community
  lexicon: LSJ
  rationale: In this sequence of social units, δῆμος refers to a body of people or
    populace. 'People' is idiomatic and avoids over-specifying a civic technical sense
    that may not be intended here.
- source_word: πόλις
  chosen: city
  alternatives:
  - town
  lexicon: BDAG
  rationale: Standard rendering; it completes the descending/expanding list of social
    entities.
- source_word: ἐξ ἡμῶν
  chosen: from among us
  alternatives:
  - of us
  - out of us
  lexicon: BDAG
  rationale: This phrase marks internal origin within the speaker's people. 'From
    among us' is idiomatic and preserves the communal emphasis.
- source_word: προσκυνοῦσι
  chosen: worships
  alternatives:
  - bows down to
  - pays homage to
  lexicon: BDAG
  rationale: The verb can mean prostrate oneself or worship. With θεοῖς χειροποιήτοις,
    the religious sense is primary, so 'worships' communicates the force clearly.
- source_word: θεοῖς χειροποιήτοις
  chosen: gods made by hands
  alternatives:
  - handmade gods
  - idols made by human hands
  lexicon: BDAG
  rationale: χειροποίητος literally means made by hands. 'Gods made by hands' keeps
    the polemical literalness of the Greek while remaining natural English. 'Idols'
    is interpretive and therefore left as an alternative.
- source_word: καθάπερ ἐγένετο ἐν ταῖς πρότερον ἡμέραις
  chosen: as happened in former days
  alternatives:
  - as it came to pass in earlier days
  - as happened in days before
  lexicon: BDAG
  rationale: This clause contrasts the present with Israel's earlier history of idolatry.
    'Former days' is concise and preserves the retrospective force.
- source_word: οὐδὲ ἔστιν ἐν τῇ ἡμέρᾳ τῇ σήμερον
  chosen: indeed, there is none even to this day
  alternatives:
  - nor is there today
  - and there is not on this day
  lexicon: BDAG
  rationale: The Greek explicitly adds a present-time reinforcement after the past-oriented
    statement. English reads more naturally by fronting the main claim and then adding
    'indeed, there is none even to this day' to preserve the emphatic continuation
    without awkward repetition.
