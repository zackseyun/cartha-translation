translation:
  text: And she fasted all the days of her widowhood, except the days before Sabbaths
    and Sabbaths and the days before new moons and festivals and celebrations of the
    house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “apart from the days before Sabbaths and Sabbaths and
      the days before new moons.” The Greek uses prepositional compounds for the days
      preceding those observances.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνήστευε
  chosen: she fasted
  alternatives:
  - she was fasting
  - she kept fasting
  lexicon: BDAG
  rationale: Imperfect verb indicating customary or ongoing practice in past time;
    simple English past best conveys habitual action in context without awkwardness.
- source_word: πάσας τὰς ἡμέρας τῆς χηρεύσεως αὐτῆς
  chosen: all the days of her widowhood
  alternatives:
  - throughout all the days of her widowhood
  - every day of her widowhood
  lexicon: LSJ
  rationale: This phrase denotes the whole period of her life as a widow, not merely
    isolated days. 'All the days of her widowhood' preserves the formal structure
    and temporal scope.
- source_word: χωρὶς
  chosen: except
  alternatives:
  - apart from
  - besides
  lexicon: BDAG
  rationale: Here the sense is exclusion from the fasting pattern. 'Except' is the
    clearest natural English rendering.
- source_word: προσαββάτων
  chosen: the days before Sabbaths
  alternatives:
  - the eves of Sabbaths
  - pre-Sabbath days
  lexicon: LSJ
  rationale: The compound literally refers to what comes before Sabbaths. 'Days before
    Sabbaths' is transparent and avoids importing later technical terminology such
    as 'Preparation Day' where the text itself is plural and generalized.
- source_word: σαββάτων
  chosen: Sabbaths
  alternatives:
  - the Sabbath days
  lexicon: BDAG
  rationale: Plural in Greek; retained in English to match the recurring weekly observances.
- source_word: προνουμηνιῶν
  chosen: the days before new moons
  alternatives:
  - the eves of new moons
  - pre-new-moon days
  lexicon: LSJ
  rationale: Parallel to προσαββάτων; it denotes the days preceding new-moon observances.
    Rendering the temporal relation explicitly preserves the Greek formation.
- source_word: ἑορτῶν
  chosen: festivals
  alternatives:
  - feasts
  - festival days
  lexicon: BDAG
  rationale: Refers to religious feast occasions. 'Festivals' is modern and accessible
    while preserving the celebratory sacred sense.
- source_word: χαρμοσυνῶν
  chosen: celebrations
  alternatives:
  - times of rejoicing
  - festive occasions
  - gladnesses
  lexicon: LSJ
  rationale: The noun denotes occasions of joy or rejoicing. 'Celebrations' reads
    naturally in English and fits the list of exempted communal observances.
- source_word: οἴκου Ἰσραήλ
  chosen: of the house of Israel
  alternatives:
  - of Israel
  lexicon: BDAG
  rationale: The genitive phrase identifies these observances as belonging to the
    covenant people. Retaining 'house of Israel' preserves the biblical idiom rather
    than flattening it to simply 'Israel'.
