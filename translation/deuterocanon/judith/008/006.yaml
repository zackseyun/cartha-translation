theological_decisions:
- issue: Nature of Judith's fasting exceptions
  chosen_reading: The verse states that Judith fasted habitually during her widowhood
    but did not fast on specified sacred or festive days.
  alternative_readings:
  - The listed items could be taken as days on which she especially fasted rather
    than exceptions, if χωρὶς were misunderstood more loosely.
  rationale: The preposition χωρὶς most naturally marks exclusion here, and the sequence
    of sacred observances fits the idea that fasting ceased on communal holy and joyful
    occasions.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering Israelite calendar terms
  chosen_reading: Translate the terms descriptively rather than replacing them with
    later technical liturgical labels.
  alternative_readings:
  - Use 'Preparation days' for προσαββάτων and analogous technical phrasing for προνουμηνιῶν.
  rationale: Optimal equivalence favors clarity anchored in the Greek source. The
    text itself describes days before Sabbaths and before new moons; later terminology
    would add interpretive specificity not demanded by the source.
  doctrine_reference: Translation philosophy §1, §6
