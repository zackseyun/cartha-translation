  text: καὶ ἦλθον πρὸς αὐτήν· καὶ εἶπεν πρὸς αὐτούς Ἀκούσατέ δή μου, ἄρχοντες τῶν
    κατοικούντων ἐν Βαιτυλουά· ὅτι οὐκ εὐθὺς ὁ λόγος ὑμῶν ὃν ἐλαλήσατε ἐναντίον τοῦ
