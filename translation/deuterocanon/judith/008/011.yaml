translation:
  text: And they came to her, and she said to them, “Listen to me, rulers of the inhabitants
    of Bethulia, for the word that you spoke against the people on this day is not
    right, and you have imposed the oath that you spoke between God and yourselves,
    and said that you would hand over the city to our enemies if within these days
    the Lord does not return to help you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'if not in them'; the pronoun likely refers to the previously
      specified days of the oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρχοντες
  chosen: rulers
  alternatives:
  - leaders
  - princes
  lexicon: LSJ
  rationale: ἄρχοντες denotes those exercising authority. 'Rulers' preserves the governing
    role more clearly than the broader 'leaders' and avoids the aristocratic nuance
    of 'princes'.
- source_word: τῶν κατοικούντων ἐν Βαιτυλουά
  chosen: of those who dwell in Bethulia
  alternatives:
  - of the inhabitants of Bethulia
  - of those living in Bethulia
  lexicon: LSJ
  rationale: The participial phrase is rendered transparently and naturally. 'Those
    who dwell' keeps the verbal force of κατοικούντων while remaining readable.
- source_word: οὐκ εὐθὺς ὁ λόγος ὑμῶν
  chosen: your word ... is not right
  alternatives:
  - your word is not straight
  - what you said is not proper
  - your proposal is not right
  lexicon: LSJ
  rationale: εὐθύς literally means 'straight,' but in this idiom it conveys moral
    or practical rightness. 'Is not right' communicates the sense in idiomatic English
    without over-paraphrasing.
- source_word: ἐναντίον τοῦ λαοῦ
  chosen: against the people
  alternatives:
  - before the people
  - in the presence of the people
  lexicon: LSJ
  rationale: ἐναντίον can mean 'before' spatially or 'against' adversatively. In context
    Judith is rebuking a harmful decision directed against the people, so 'against
    the people' best fits the force of the accusation.
- source_word: ἐστήσατε τὸν ὅρκον
  chosen: you have set up the oath
  alternatives:
  - you have established the oath
  - you have sworn the oath
  lexicon: LSJ
  rationale: The verb is literally 'set/establish.' 'Set up the oath' preserves the
    imagery of formally instituting an oath, whereas 'sworn' would collapse the distinct
    verb-noun combination.
- source_word: ἀνὰ μέσον τοῦ θεοῦ καὶ ὑμῶν
  chosen: between God and yourselves
  alternatives:
  - between God and you
  lexicon: LSJ
  rationale: The phrase marks the oath as made in the space between the parties. 'Between
    God and yourselves' preserves the reflexive emphasis and solemnity.
- source_word: ἐκδώσειν τὴν πόλιν
  chosen: hand over the city
  alternatives:
  - give up the city
  - deliver the city
  lexicon: LSJ
  rationale: ἐκδίδωμι here means to surrender or hand over. 'Hand over' is clear modern
    English and avoids the potentially overly theological resonance of 'deliver.'
- source_word: ἐὰν μὴ ἐν αὐταῖς
  chosen: if within these days
  alternatives:
  - if in them
  - if during this time
  lexicon: LSJ
  rationale: The feminine plural pronoun lacks an explicit noun in this clause, but
    context from the preceding oath indicates a set period of days. 'Within these
    days' makes the implied temporal reference explicit enough for English while staying
    anchored to the Greek.
- source_word: ἐπιστρέψῃ ὁ κύριος βοήθειαν ὑμῖν
  chosen: the Lord does not turn back to help you
  alternatives:
  - the Lord does not return help to you
  - the Lord does not bring back help to you
  - the Lord does not come back with help for you
  lexicon: LSJ
  rationale: ἐπιστρέφω literally means 'turn/return.' The construction is somewhat
    compressed in Greek; 'turn back to help you' preserves the motion metaphor while
    yielding intelligible English. κύριος is rendered 'Lord' per project doctrine.
