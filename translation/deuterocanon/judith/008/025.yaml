theological_decisions:
- issue: Meaning of πειράζει with God as subject
  chosen_reading: testing
  alternative_readings:
  - tempting
  - trying
  rationale: In this context Judith urges gratitude under hardship by appealing to
    God's dealings with earlier generations. 'Testing' preserves the theological tension
    of divine proving without importing the stronger moral implication of 'tempting.'
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English
- issue: Rendering of τοὺς πατέρας ἡμῶν
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The source uses a masculine familial term. The phrase is representative
    of prior generations of Israel, but the project's gender-accurate policy favors
    retaining 'fathers' where that is the form used in the source.
  doctrine_reference: Gender-accurate over gender-neutral
