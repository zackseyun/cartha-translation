translation:
  text: But the people became very thirsty, and they compelled us to do as we had
    said to them, and to bring upon ourselves an oath that we will not break.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to bind ourselves by an oath.' The Greek literally says 'to bring upon
      ourselves an oath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίψησεν σφόδρα
  chosen: became very thirsty
  alternatives:
  - was extremely thirsty
  - thirsted greatly
  lexicon: LSJ
  rationale: The aorist verb with σφόδρα expresses intense thirst. 'Became very thirsty'
    is natural modern English and preserves the severity without archaic phrasing.
- source_word: ἠνάγκασαν
  chosen: compelled
  alternatives:
  - forced
  - constrained
  lexicon: LSJ
  rationale: The verb indicates strong pressure or coercion. 'Compelled' fits the
    formal gravity of the context without sounding overly harsh or colloquial.
- source_word: ποιῆσαι ἡμᾶς καθὰ ἐλάλησαν αὐτοῖς
  chosen: to do as we had spoken to them
  alternatives:
  - to act according to what we told them
  - to do as we said to them
  lexicon: LSJ
  rationale: καθά means 'just as/as,' and ἐλάλησαν here is best understood from context
    as referring to what 'we' had said to the people, despite the awkward Greek construction
    in this witness. 'Had spoken to them' preserves the prior commitment being referenced.
- source_word: ἐπαγαγεῖν ἐφʼ ἡμᾶς ὅρκον
  chosen: to bring upon ourselves an oath
  alternatives:
  - to bind ourselves by an oath
  - to invoke an oath upon ourselves
  lexicon: LSJ
  rationale: The idiom literally speaks of bringing an oath upon oneself. The chosen
    rendering keeps the metaphor while remaining intelligible; the alternatives are
    interpretive expansions.
- source_word: ὃν οὐ παραβησόμεθα
  chosen: that we will not break
  alternatives:
  - which we will not transgress
  - which we will not violate
  lexicon: LSJ
  rationale: παραβαίνω with ὅρκος refers to violating or breaking an oath. 'Break'
    is the clearest idiomatic English equivalent.
