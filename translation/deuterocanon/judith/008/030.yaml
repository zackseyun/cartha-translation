  text: ἀλλὰ ὁ λαὸς ἐδίψησεν σφόδρα, καὶ ἠνάγκασαν ποιῆσαι ἡμᾶς καθὰ ἐλάλησαν αὐτοῖς,
    καὶ ἐπαγαγεῖν ἐφʼ ἡμᾶς ὅρκον ὃν οὐ παραβησόμεθα.
