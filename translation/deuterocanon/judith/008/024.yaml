translation:
  text: Now, brothers, let us show our brothers that their life hangs on us, and that
    the holy things and the house and the altar rest on us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters,' if the address is understood inclusively rather
      than as a strictly male address.
    reason: lexical_alternative
  - marker: b
    text: Or 'their soul'; here the sense is most likely their life or survival.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - kinsmen
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in context addresses
    the people as covenant kin. Per doctrine, gender-accurate rendering is preferred
    over gender-neutral smoothing. Because Judith is addressing a mixed community
    leadership context, an inclusive alternative is possible, but the source form
    is best preserved in the main text.
- source_word: ἐπιδειξώμεθα
  chosen: let us show
  alternatives:
  - let us demonstrate
  - let us prove
  lexicon: LSJ
  rationale: The hortatory subjunctive calls for visible demonstration in action.
    'Show' is natural modern English and preserves the exhortational force without
    overformalizing.
- source_word: ἐξ ἡμῶν κρέμαται
  chosen: hangs on us
  alternatives:
  - depends on us
  - hangs from us
  lexicon: BDAG
  rationale: 'The idiom is vivid: their life ''hangs'' from or upon us. ''Hangs on
    us'' preserves the metaphor while remaining idiomatic English. ''Depends on us''
    is interpretive and less concrete.'
- source_word: ἡ ψυχὴ αὐτῶν
  chosen: their life
  alternatives:
  - their soul
  - their lives
  lexicon: BDAG
  rationale: In this context ψυχή refers to life in the sense of survival, not specifically
    the immaterial soul. Singular collective 'their life' matches the Greek singular
    and English idiom for communal survival.
- source_word: τὰ ἅγια
  chosen: the holy things
  alternatives:
  - the sanctuary
  - the sacred things
  - the holy places
  lexicon: LSJ
  rationale: The plural neuter naturally refers to sacred things/holy things. Since
    ὁ οἶκος and τὸ θυσιαστήριον are then listed separately, rendering this as 'the
    sanctuary' would collapse distinct referents.
- source_word: ὁ οἶκος
  chosen: the house
  alternatives:
  - the temple
  - the house of God
  lexicon: LSJ
  rationale: The Greek says simply 'the house.' In this cultic context it refers to
    the temple, but because 'the altar' is separately named, 'the house' preserves
    the source wording and structure while allowing readers to infer the temple reference.
- source_word: τὸ θυσιαστήριον
  chosen: the altar
  alternatives:
  - the sacrificial altar
  lexicon: BDAG
  rationale: Standard cultic term; 'altar' is the clear and natural equivalent.
- source_word: ἐπεστήρισται ἐφʼ ἡμῖν
  chosen: rest on us
  alternatives:
  - have been supported by us
  - are established upon us
  - depend on us
  lexicon: LSJ
  rationale: The perfect form conveys a present state of reliance/support. 'Rest on
    us' communicates dependence in smooth English and parallels the earlier 'hangs
    on us' without flattening the rhetoric.
