theological_decisions:
- issue: Gendered kinship language in direct address
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - kinsmen
  rationale: Following the project's gender-accurate policy, the masculine plural
    is retained in the main text rather than neutralized. Because the address may
    function representatively, an inclusive alternative is worth preserving in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: ψυχή as life versus soul
  chosen_reading: their life
  alternative_readings:
  - their soul
  rationale: The context is communal survival under threat, not an anthropological
    statement about the soul. Rendering as 'life' avoids importing a theological claim
    the text does not make.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
