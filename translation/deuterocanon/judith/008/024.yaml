id: JDT.8.24
reference: Judith 8:24
source:
  edition: lxx-swete-1909
  text: νῦν, ἀδελφοί, ἐπιδειξώμεθα τοῖς ἀδελφοῖς ἡμῶν, ὅτι ἐξ ἡμῶν κρέμαται ἡ ψυχὴ
    αὐτῶν, καὶ τὰ ἅγια καὶ ὁ οἶκος καὶ τὸ θυσιαστήριον ἐπεστήρισται ἐφʼ ἡμῖν.
