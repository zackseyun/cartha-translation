translation:
  text: And turning away from the tent, they went to their assigned posts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their stations' or 'their appointed places.' The Greek term can refer
      more broadly to an ordered arrangement or assigned position.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστρέψαντες
  chosen: after turning away
  alternatives:
  - having turned back
  - after departing
  lexicon: LSJ
  rationale: Aorist participle of ἀποστρέφω, here marking prior action before the
    main verb. 'Turning away' preserves the literal motion away from the tent without
    overinterpreting it as a full departure formula.
- source_word: σκηνῆς
  chosen: tent
  alternatives:
  - tabernacle
  - camp-tent
  lexicon: LSJ
  rationale: σκηνή commonly means 'tent.' In Judith's narrative setting this refers
    to the tent/household space, not the cultic tabernacle, so 'tent' is the clearest
    English rendering.
- source_word: ἐπορεύθησαν
  chosen: they went
  alternatives:
  - they proceeded
  - they departed
  lexicon: LSJ
  rationale: Standard narrative verb of movement. 'Went' is natural modern English
    and sufficiently formal for the context.
- source_word: διατάξεις
  chosen: assigned posts
  alternatives:
  - stations
  - arrangements
  - orders
  lexicon: LSJ
  rationale: διάταξις can denote an arrangement, order, or assigned station. With
    ἐπὶ plus the accusative and the context of men returning from Judith's tent, 'assigned
    posts' best captures movement back to their designated places/duties.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - their own
  lexicon: LSJ
  rationale: Simple possessive pronoun referring to the subjects; English does not
    require emphasis beyond 'their'.
