id: JDT.6.3
reference: Judith 6:3
source:
  edition: lxx-swete-1909
  text: ἀλλʼ ἡμεῖς οἱ δοῦλοι αὐτοῦ πατάξομεν αὐτοὺς ὡς ἄνθρωπον ἕνα, καὶ οὐχ ὑποστήσονται
    τὸ κράτος τῶν ἵππων ἡμῶν.
  language: Greek
  pages:
  - 807
  confidence: high
  validation: agree
translation:
  text: But we, his slaves, will strike them down as one man, and they will not withstand
    the might of our horses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like one man' or 'as a single man'; the Greek idiom emphasizes either
      unified action against them or how easily they will be overcome.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: The speaker emphasizes total subordination to their master in a military
    context. Per project doctrine, δοῦλος should be rendered 'slave' where bonded
    status is salient; here 'his slaves' best preserves that force better than the
    softer 'servants'.
- source_word: πατάξομεν
  chosen: will strike them down
  alternatives:
  - will strike
  - will smite
  - will defeat
  lexicon: LSJ
  rationale: The verb denotes striking, often with violent or martial force. 'Strike
    them down' communicates the military aggression clearly in modern English without
    archaic 'smite'.
- source_word: ὡς ἄνθρωπον ἕνα
  chosen: as one man
  alternatives:
  - like one man
  - as a single man
  lexicon: LSJ
  rationale: This idiom conveys unified treatment or effortless dispatch as though
    the enemy were only one man. 'As one man' is concise and preserves the source
    idiom; the sense is not numerical precision but ease/unity.
- source_word: ὑποστήσονται
  chosen: will withstand
  alternatives:
  - will stand against
  - will endure
  - will hold out against
  lexicon: LSJ
  rationale: In context the future middle indicates being able to stand up under or
    resist opposing force. 'Will withstand' fits the military setting and governs
    the following object naturally in English.
- source_word: κράτος
  chosen: might
  alternatives:
  - strength
  - power
  - force
  lexicon: LSJ
  rationale: κράτος here refers to manifested strength in battle. 'Might' is idiomatic
    with cavalry and preserves the sense of overpowering force.
- source_word: ἵππων
  chosen: horses
  alternatives:
  - cavalry
  - horsemen
  lexicon: LSJ
  rationale: The Greek explicitly says 'horses,' not riders. Although cavalry is the
    implied military arm, the translation should stay anchored to the lexical form
    unless context requires otherwise.
