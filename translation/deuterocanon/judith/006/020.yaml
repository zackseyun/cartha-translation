id: JDT.6.20
reference: Judith 6:20
source:
  edition: lxx-swete-1909
  text: καὶ παρεκάλεσαν τὸν Ἀχιὼρ, καὶ ἐπήνεσαν αὐτὸν σφόδρα.
  language: Greek
  pages:
  - 809
  confidence: high
  validation: agree
translation:
  text: And they encouraged Achior, and praised him greatly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'comforted,' 'urged,' or 'exhorted' for 'encouraged' (παρεκάλεσαν), depending
      on how broadly the verb is taken in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκάλεσαν
  chosen: encouraged
  alternatives:
  - comforted
  - urged
  - exhorted
  lexicon: BDAG
  rationale: The verb παρακαλέω has a broad range including encourage, comfort, exhort,
    and urge. In this narrative context, after Achior's speech and treatment, the
    sense is supportive reassurance rather than formal exhortation, so 'encouraged'
    best captures the likely force in natural English.
- source_word: Ἀχιὼρ
  chosen: Achior
  rationale: Personal names are transliterated by standard convention rather than
    translated.
- source_word: ἐπήνεσαν
  chosen: praised
  alternatives:
  - commended
  - approved
  lexicon: BDAG
  rationale: The verb means to praise or commend. 'Praised' fits the direct object
    construction and the emphatic adverb that follows, while remaining straightforward
    English.
- source_word: σφόδρα
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: LSJ
  rationale: This adverb intensifies the preceding verb. 'Greatly' is concise, idiomatic,
    and preserves the strong commendation without sounding archaic.
