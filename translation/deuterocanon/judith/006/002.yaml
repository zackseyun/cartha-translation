theological_decisions:
- issue: Rendering the speaker's claim about Nebuchadnezzar's divinity
  chosen_reading: And who is god except Nebuchadnezzar?
  alternative_readings:
  - And who is God except Nebuchadnezzar?
  rationale: The Greek lacks a distinct capitalization marker. Lowercase 'god' in
    English best signals that this is Holofernes' arrogant claim, not the narrator's
    theological affirmation. This preserves the blasphemous rhetoric without confusing
    the reader.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than import doctrinal claims the text does not make.'
