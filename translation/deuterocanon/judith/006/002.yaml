id: JDT.6.2
reference: Judith 6:2
source:
  edition: lxx-swete-1909
  text: Καὶ τίς εἶ σύ Ἀχιὼρ καὶ οἱ πρὸς πάντας υἱοὺς Μωὰβ καὶ οἱ μισθωτοὶ Ἐφράιμ,
    ὅτι ἐπροφήτευσας ἐν ἡμῖν καθὼς σήμερον, καὶ εἶπας τὸ γένος Ἰσραὴλ μὴ πολεμῆσαι,
    ὅτι θεὸς αὐτῶν ὑπερασπιεῖ αὐτῶν; καὶ τίς ὁ θεὸς εἰ μὴ Ναβουχοδονοσόρ; οὗτος ἀποστελεῖ
    τὸ κράτος αὐτοῦ καὶ ἐξολεθρεύσει αὐτοὺς ἀπὸ προσώπου τῆς γῆς, καὶ οὐ ῥύσεται αὐτοὺς
    ὁ θεὸς αὐτῶν.
  language: Greek
  pages:
  - 807
  confidence: high
  validation: agree
translation:
  text: And who are you, Achior, and the hirelings of Ephraim among all the sons of
    Moab, that you have prophesied among us as you did today, and said that one should
    not make war against the house of Israel because their God will defend them? And
    who is God except Nebuchadnezzar? He himself will send his force and destroy them
    from the face of the earth, and their God will not rescue them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mercenaries of Ephraim.' The Greek term denotes men serving for pay
      and may carry a contemptuous tone.
    reason: lexical_alternative
  - marker: b
    text: Or 'the people of Israel.' The Greek says 'the race/stock of Israel,' emphasizing
      ethnic lineage.
    reason: lexical_alternative
  - marker: c
    text: The speaker's 'who is god except Nebuchadnezzar?' is a boastful claim, not
      the narrator's endorsement.
    reason: cultural_note
lexical_decisions:
- source_word: μισθωτοὶ
  chosen: hirelings
  alternatives:
  - mercenaries
  - hired men
  lexicon: LSJ
  rationale: The noun denotes those serving for pay. 'Hirelings' preserves the pejorative
    edge in Holofernes' insult better than the more neutral 'hired men'; 'mercenaries'
    is possible but slightly more specific militarily than the Greek requires.
- source_word: Ἐφράιμ
  chosen: Ephraim
  alternatives:
  - of Ephraim
  rationale: Personal/tribal name is transliterated per project philosophy. In context
    it functions in a genitival relation with μισθωτοί, yielding 'the hirelings of
    Ephraim.'
- source_word: ἐπροφήτευσας
  chosen: have prophesied
  alternatives:
  - have spoken as a prophet
  - have foretold
  lexicon: LSJ
  rationale: The verb is the standard word for prophesying. Even though the speaker
    is hostile and likely sarcastic, the text uses prophetic language, so 'have prophesied'
    should be retained rather than flattened.
- source_word: τὸ γένος Ἰσραήλ
  chosen: the race of Israel
  alternatives:
  - the people of Israel
  - the stock of Israel
  lexicon: LSJ
  rationale: γένος refers to kin-group, lineage, or people-group. 'Race' is a somewhat
    stiff but direct rendering here; it preserves the ethnic/ancestral sense better
    than the broader 'people.'
- source_word: μὴ πολεμῆσαι
  chosen: one should not make war against
  alternatives:
  - not to fight against
  - not to wage war against
  lexicon: LSJ
  rationale: The infinitive depends on εἶπας. English requires some smoothing; 'one
    should not make war against' captures the prohibitive sense without over-paraphrase.
- source_word: ὑπερασπιεῖ
  chosen: will defend
  alternatives:
  - will protect
  - will fight for
  lexicon: LSJ
  rationale: The verb means to shield, defend, or champion. 'Will defend' is concise
    and preserves the military-legal force relevant to the context.
- source_word: θεὸς
  chosen: god
  alternatives:
  - God
  lexicon: LSJ
  rationale: In the clause 'who is god except Nebuchadnezzar?' the speaker is making
    a blasphemous claim about Nebuchadnezzar. Lowercase 'god' reflects the predicate
    usage and avoids implying the narrator endorses the claim.
- source_word: τὸ κράτος αὐτοῦ
  chosen: his force
  alternatives:
  - his might
  - his power
  - his army
  lexicon: LSJ
  rationale: κράτος denotes strength, might, dominion, or force. In this military
    context, 'his force' naturally conveys the concrete exercise of power without
    narrowing it strictly to 'army.'
- source_word: ἐξολεθρεύσει
  chosen: destroy
  alternatives:
  - wipe out
  - utterly destroy
  lexicon: LSJ
  rationale: The verb is strong, meaning destroy utterly or exterminate. 'Destroy'
    is the most natural main-text rendering; the stronger nuance can be noted in rationale
    without making the English sound overstated.
- source_word: ἀπὸ προσώπου τῆς γῆς
  chosen: from the face of the earth
  alternatives:
  - from the land
  - off the earth
  lexicon: LSJ
  rationale: This is a conventional biblical idiom. 'From the face of the earth' preserves
    the idiomatic force and gravity.
- source_word: ῥύσεται
  chosen: will rescue
  alternatives:
  - will deliver
  - will save
  lexicon: LSJ
  rationale: The verb means rescue or deliver from danger. 'Will rescue' fits the
    immediate military threat and avoids importing broader soteriological overtones.
