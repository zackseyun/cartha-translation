theological_decisions:
- issue: Ethnic designation υἱῶν Ἀσσούρ
  chosen_reading: the sons of Asshur
  alternative_readings:
  - the Assyrians
  - the sons of Assyria
  rationale: This is not a major doctrinal issue, but it affects how closely the translation
    reflects the Greek's stylized ethnonym. The more literal rendering preserves source
    texture and avoids silently normalizing the expression.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
