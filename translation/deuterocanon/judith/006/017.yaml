id: JDT.6.17
reference: Judith 6:17
source:
  edition: lxx-swete-1909
  text: καὶ ἀποκριθεὶς ἀπήγγειλεν αὐτοῖς τὰ ῥήματα τῆς συνεδρείας Ὀλοφέρνου, καὶ πάντα
    τὰ ῥήματα ὅσα ἐλάλησεν ἐν μέσῳ τῶν ἀρχόντων υἱῶν Ἀσσούρ, καὶ ὅσα ἐμεγαλορρημόνησεν
    Ὀλοφέρνης εἰς τὸν οἶκον Ἰσραήλ.
  language: Greek
  pages:
  - 809
  confidence: high
  validation: minor_mismatch
translation:
  text: And in answer he reported to them the words of Holofernes’ council, and all
    the words that he had spoken in the midst of the rulers of the sons of Asshur,
    and whatever boastful things Holofernes had spoken against the house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Assyrians.' Greek literally, 'the sons of Asshur.'
    reason: lexical_alternative
  - marker: b
    text: Or 'had boasted' / 'had spoken arrogantly.' The Greek verb denotes proud,
      boastful speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: in answer
  alternatives:
  - answering
  - in reply
  lexicon: BDAG
  rationale: A participial formula introducing speech/report. 'In answer' is natural
    English that preserves the responsive force without over-literal awkwardness.
- source_word: ἀπήγγειλεν
  chosen: reported
  alternatives:
  - announced
  - told
  lexicon: BDAG
  rationale: The verb conveys bringing back a report. 'Reported' fits the narrative
    context better than the more formal 'announced' and is more precise than simply
    'told'.
- source_word: τὰ ῥήματα
  chosen: the words
  alternatives:
  - the statements
  - the matters
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the repeated emphasis on the
    actual content spoken.
- source_word: τῆς συνεδρείας
  chosen: council
  alternatives:
  - assembly
  - counsel
  lexicon: LSJ
  rationale: In context this refers to Holofernes' deliberative gathering or council.
    'Council' is the clearest idiomatic English choice.
- source_word: ἐν μέσῳ τῶν ἀρχόντων
  chosen: in the midst of the rulers
  alternatives:
  - before the rulers
  - among the rulers
  lexicon: BDAG
  rationale: The phrase is spatially 'in the midst of,' but idiomatically indicates
    speech delivered among/before the leaders. The chosen rendering stays close to
    the Greek while remaining readable.
- source_word: υἱῶν Ἀσσούρ
  chosen: the sons of Asshur
  alternatives:
  - the Assyrians
  - the sons of Assyria
  lexicon: LSJ
  rationale: The Greek literally has 'sons of Asshur.' Because Judith often uses ethnogeographic
    expressions in a stylized way, the more literal rendering is preserved here rather
    than flattening it to 'Assyrians.'
- source_word: ἐμεγαλορρημόνησεν
  chosen: had spoken boastful things
  alternatives:
  - had boasted
  - had spoken arrogantly
  - had uttered great boasts
  lexicon: LSJ
  rationale: The rare verb carries the sense of speaking proudly or boastfully. 'Had
    spoken boastful things' preserves the verbal connection to the repeated 'words'
    language in the verse and avoids reducing the expression to a bare abstract noun.
- source_word: εἰς τὸν οἶκον Ἰσραήλ
  chosen: against the house of Israel
  alternatives:
  - concerning the house of Israel
  - to the house of Israel
  lexicon: BDAG
  rationale: Given the hostile context and the sense of Holofernes' proud speech,
    'against' best captures the directional force here in idiomatic English.
