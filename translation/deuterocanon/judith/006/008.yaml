id: JDT.6.8
reference: Judith 6:8
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἀπολῇ ἕως οὗ ἐξολεθρευθῇς μετʼ αὐτῶν.
  language: Greek
  pages:
  - 808
  confidence: high
  validation: agree
translation:
  text: and he will not perish until you are destroyed with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will not be destroyed until you are utterly destroyed with them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολῇ
  chosen: will perish
  alternatives:
  - will be destroyed
  - will die
  lexicon: BDAG
  rationale: From ἀπόλλυμι in the middle/intransitive sense, the clause states that
    he will not come to ruin or perish. 'Will perish' preserves the intransitive force
    better than the more transitive-sounding 'will be destroyed,' while remaining
    natural English.
- source_word: ἕως οὗ
  chosen: until
  alternatives:
  - before
  - up to the time when
  lexicon: BDAG
  rationale: Standard temporal conjunction meaning 'until.' The simple English form
    best matches the Greek without overcomplication.
- source_word: ἐξολεθρευθῇς
  chosen: you are destroyed
  alternatives:
  - you are utterly destroyed
  - you are wiped out
  lexicon: BDAG
  rationale: The verb ἐξολεθρεύω intensifies destruction or extermination. 'Destroyed'
    is chosen for readable modern English; the stronger nuance 'utterly destroyed'
    is preserved as an alternative.
- source_word: μετʼ αὐτῶν
  chosen: with them
  alternatives:
  - along with them
  lexicon: BDAG
  rationale: Straightforward accompaniment phrase. 'With them' is concise and accurate.
- source_word: καὶ
  chosen: and
  alternatives:
  - but
  lexicon: BDAG
  rationale: The connective is simply coordinative here. 'And' preserves the Greek
    linkage without adding adversative force.
