theological_decisions:
- issue: Rendering of δοῦλοι in a non-parabolic narrative setting
  chosen_reading: his slaves
  alternative_readings:
  - his servants
  rationale: The project's doctrine specifies servant/slave context-dependently, preferring
    'slave' where bonded status is salient. Here Holofernes commands his own δοῦλοι
    in his tent, which fits a bonded-household context better than the more ambiguous
    'servants.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
- issue: Gendered expression υἱῶν Ἰσραήλ
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source uses the masculine filial term υἱῶν. Following the gender-accurate
    policy, the translation preserves the source form rather than neutralizing it,
    while recognizing that the phrase can corporately denote Israel as a people.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4'
