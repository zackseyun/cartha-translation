id: JDT.6.10
reference: Judith 6:10
source:
  edition: lxx-swete-1909
  text: καὶ προσέταξεν Ὁλοφέρνης τοῖς δούλοις αὐτοῦ, οἳ ἦσαν παρεστηκότες ἐν τῇ σκηνῇ
    αὐτοῦ, συλλαβεῖν τὸν Ἀχιὼρ καὶ ἀποκαταστῆσαι αὐτὸν εἰς Βετυλουὰ καὶ παραδοῦναι
    εἰς χεῖρας υἱῶν Ἰσραήλ.
  language: Greek
  pages:
  - 808
  confidence: high
  validation: agree
translation:
  text: And Holofernes ordered his servants, who were standing by in his tent, to
    seize Achior and take him back to Bethyloua and hand him over into the hands of
    the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Bethulia,' the more traditional English form of the place name.
    reason: lexical_alternative
  - marker: b
    text: '''The sons of Israel'' is a literal rendering of the Greek expression;
      it refers corporately to the people of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέταξεν
  chosen: ordered
  alternatives:
  - commanded
  - directed
  lexicon: LSJ
  rationale: Aorist of προστάσσω denotes giving an authoritative command. 'Ordered'
    is natural modern English and preserves the force without sounding overly stiff.
- source_word: τοῖς δούλοις
  chosen: his slaves
  alternatives:
  - his servants
  - his attendants
  lexicon: LSJ
  rationale: Per doctrine, δοῦλος is rendered 'slave' where bonded status is salient.
    In a military command context referring to Holofernes' owned household personnel,
    'slaves' better reflects the social reality than the softer 'servants.'
- source_word: παρεστηκότες
  chosen: standing by
  alternatives:
  - attending
  - present
  - standing near
  lexicon: LSJ
  rationale: Perfect participle of παρίστημι here describes those in attendance before
    him. 'Standing by' captures both presence and readiness in idiomatic English.
- source_word: σκηνῇ
  chosen: tent
  alternatives:
  - tabernacle
  lexicon: LSJ
  rationale: In Judith's military setting, σκηνή refers to a literal tent, not a cultic
    structure. 'Tent' is the plain contextual sense.
- source_word: συλλαβεῖν
  chosen: to seize
  alternatives:
  - to arrest
  - to take
  lexicon: LSJ
  rationale: The infinitive conveys forceful apprehension. 'Seize' preserves the coercive
    sense without importing formal legal procedure implied by 'arrest.'
- source_word: ἀποκαταστῆσαι
  chosen: take him back
  alternatives:
  - restore him
  - return him
  - bring him back
  lexicon: LSJ
  rationale: Though literally 'restore/return,' in this narrative command the sense
    is to send or bring Achior back to Bethyloua. 'Take him back' is clear, natural,
    and contextually accurate.
- source_word: Βετυλουὰ
  chosen: Bethyloua
  alternatives:
  - Bethulia
  rationale: Personal and place names are transliterated from the Greek source by
    standard convention. 'Bethyloua' stays closest to the form in Swete's Greek; the
    traditional English 'Bethulia' is preserved as an alternative.
- source_word: παραδοῦναι
  chosen: hand him over
  alternatives:
  - deliver him
  - give him over
  lexicon: LSJ
  rationale: The verb means to hand someone over into another's power. 'Hand him over'
    is idiomatic and preserves the hostile transfer of custody.
- source_word: εἰς χεῖρας
  chosen: into the hands of
  alternatives:
  - to
  - into the power of
  lexicon: LSJ
  rationale: This is a common idiom for transfer into someone's control. Retaining
    'into the hands of' preserves the vividness and biblical idiom.
- source_word: υἱῶν Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: The Greek is explicitly filial ('sons'). Per gender-accurate policy,
    the masculine form is retained where it reflects the source wording. 'Israelites'
    would smooth the expression but lose the formal correspondence and biblical resonance.
