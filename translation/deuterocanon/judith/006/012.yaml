id: JDT.6.12
reference: Judith 6:12
source:
  edition: lxx-swete-1909
  text: καὶ ὡς εἶδαν αὐτοὺς οἱ ἄνδρες τῆς πόλεως ἐπὶ τὴν κορυφὴν τοῦ ὄρους, ἀνέλαβον
    τὰ ὅπλα αὐτῶν καὶ ἐπῆλθον ἔξω τῆς πόλεως ἐπὶ τὴν κορυφὴν τοῦ ὄρους· καὶ πᾶς ἀνὴρ
    σφενδονήτης διεκράτησαν τὴν ἀνάβασιν αὐτῶν καὶ ἔβαλλον ἐν λίθοις ἐπʼ αὐτούς.
  language: Greek
  pages:
  - 808
  confidence: high
  validation: minor_mismatch
translation:
  text: And when the men of the city saw them on the top of the mountain, they took
    up their weapons and went out of the city to the top of the mountain; and every
    man who used a sling held back their ascent and kept throwing stones at them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek σφενδονήτης more literally means 'slinger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ὡς εἶδαν
  chosen: And when ... saw
  alternatives:
  - and as ... saw
  - and when ... caught sight of
  lexicon: BDAG
  rationale: ὡς with the aorist here is naturally temporal, introducing the action
    that triggers the response of the townsmen.
- source_word: οἱ ἄνδρες τῆς πόλεως
  chosen: the men of the city
  alternatives:
  - the men of the town
  - the city's men
  lexicon: BDAG
  rationale: A straightforward rendering of the masculine plural. Per project philosophy,
    the gendered term is retained rather than neutralized.
- source_word: ἐπὶ τὴν κορυφὴν τοῦ ὄρους
  chosen: on the top of the mountain
  alternatives:
  - at the summit of the mountain
  - on the mountain ridge
  lexicon: LSJ
  rationale: κορυφή denotes the top or summit. The first occurrence follows εἶδαν
    and is rendered locatively in idiomatic English as 'on the top'; the repeated
    phrase after ἐπῆλθον is kept similarly for consistency.
- source_word: ἀνέλαβον τὰ ὅπλα αὐτῶν
  chosen: they took up their weapons
  alternatives:
  - they picked up their arms
  - they took their weapons
  lexicon: BDAG
  rationale: ἀναλαμβάνω with ὅπλα conveys taking up weapons for action. 'Weapons'
    is clearer for modern readers than 'arms' while preserving the military sense.
- source_word: ἐπῆλθον ἔξω τῆς πόλεως
  chosen: went out of the city
  alternatives:
  - came out of the city
  - advanced out of the city
  lexicon: BDAG
  rationale: The compound verb can suggest movement against or toward, but with ἔξω
    τῆς πόλεως the basic sense is that they went out from the city.
- source_word: πᾶς ἀνὴρ σφενδονήτης
  chosen: every man who used a sling
  alternatives:
  - every slinger
  - every man, a slinger
  - every sling-man
  lexicon: LSJ
  rationale: σφενδονήτης means a slinger. Because the Greek phrase includes ἀνήρ,
    the rendering preserves the explicit masculine noun while making the occupational
    sense natural in English.
- source_word: διεκράτησαν τὴν ἀνάβασιν αὐτῶν
  chosen: held back their ascent
  alternatives:
  - checked their climb
  - prevented their going up
  - resisted their ascent
  lexicon: BDAG
  rationale: The verb conveys restraining or holding in check; ἀνάβασις is the upward
    approach or ascent. 'Held back their ascent' captures both the military resistance
    and the topographical setting.
- source_word: ἔβαλλον ἐν λίθοις ἐπʼ αὐτούς
  chosen: kept throwing stones at them
  alternatives:
  - threw stones at them
  - pelted them with stones
  lexicon: BDAG
  rationale: The imperfect ἔβαλλον suggests ongoing action, so 'kept throwing' reflects
    the repeated attack. ἐν λίθοις is instrumentally expressed in idiomatic English
    as 'stones.'
