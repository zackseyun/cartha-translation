id: JDT.6.18
reference: Judith 6:18
source:
  edition: lxx-swete-1909
  text: καὶ πεσόντες ὁ λαὸς προσεκύνησαν τῷ θεῷ, καὶ ἐβόησαν λέγοντες
  language: Greek
  pages:
  - 809
  confidence: high
  validation: agree
translation:
  text: And the people fell down and worshiped God, and they cried out, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πεσόντες
  chosen: fell down
  alternatives:
  - falling
  - having fallen
  - prostrating themselves
  lexicon: BDAG
  rationale: Aorist participle from πίπτω used adverbially before the main verbs.
    'Fell down' preserves the physical action and naturally conveys the posture associated
    with reverence in context without over-paraphrasing.
- source_word: ὁ λαός
  chosen: the people
  alternatives:
  - the crowd
  - the populace
  lexicon: BDAG
  rationale: Standard rendering for λαός. Singular in Greek but collective in sense;
    English idiom prefers 'the people' here.
- source_word: προσεκύνησαν
  chosen: worshiped
  alternatives:
  - bowed down to
  - paid homage to
  lexicon: BDAG
  rationale: In direct object construction with τῷ θεῷ, the verb clearly denotes religious
    reverence toward God. 'Worshiped' is the most natural and theologically accurate
    English rendering.
- source_word: τῷ θεῷ
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: The article is not normally carried over into English before 'God' in
    this construction. 'God' is idiomatic and faithful.
- source_word: ἐβόησαν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: BDAG
  rationale: The verb conveys a loud urgent cry. 'Cried out' preserves both intensity
    and solemnity better than the flatter 'called out' or harsher 'shouted'.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  - as they said
  lexicon: BDAG
  rationale: Present participle introducing the content of the cry. 'Saying' keeps
    the Greek linkage and fits the sentence flow into the next verse.
