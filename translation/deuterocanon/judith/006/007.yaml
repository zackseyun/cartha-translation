id: JDT.6.7
reference: Judith 6:7
source:
  edition: lxx-swete-1909
  text: καὶ ἀνταποστήσουσίν σε οἱ δοῦλοί μου εἰς τὴν ὀρεινὴν καὶ θήσουσίν σε ἐν μιᾷ
    τῶν πόλεων τῶν ἀναβάσεων,
  language: Greek
  pages:
  - 808
  confidence: high
  validation: agree
translation:
  text: and my slaves will bring you back to the hill country and place you in one
    of the cities of the mountain passes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of the cities of the ascents.' The Greek literally refers to 'ascents,'
      likely meaning the uphill approaches or passes into the hill country.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνταποστήσουσίν
  chosen: will bring ... back
  alternatives:
  - will return
  - will send back
  - will repay by bringing back
  lexicon: LSJ
  rationale: Future verb from ἀνταποστέλλω/related compound, here in context of physically
    taking Achior back after his speech. 'Bring ... back' best captures the directional
    force into the hill country and the sense of returning him to his own region.
- source_word: σε
  chosen: you
  rationale: Direct object singular, referring to Achior.
- source_word: οἱ δοῦλοί μου
  chosen: my slaves
  alternatives:
  - my servants
  - my attendants
  lexicon: BDAG
  rationale: DOCTRINE.md marks δοῦλος as 'servant / slave' context-dependent. Here
    the speaker refers to subordinates under military command; the bonded/subordinate
    status is salient enough that 'slaves' is preferred over the softer 'servants.'
- source_word: εἰς τὴν ὀρεινήν
  chosen: to the hill country
  alternatives:
  - into the mountainous region
  - to the highlands
  lexicon: LSJ
  rationale: ὀρεινή commonly denotes hill country/highland region. 'Hill country'
    is idiomatic modern English and preserves the geographic sense.
- source_word: θήσουσίν σε
  chosen: place you
  alternatives:
  - set you
  - put you
  lexicon: BDAG
  rationale: τίθημι in this context means to put or place someone somewhere. 'Place
    you' is natural English without losing the concrete action.
- source_word: ἐν μιᾷ τῶν πόλεων
  chosen: in one of the cities
  alternatives:
  - in one of the towns
  lexicon: LSJ
  rationale: πόλις can be city or town; 'cities' is the more direct default and fits
    the military-geographic setting.
- source_word: τῶν ἀναβάσεων
  chosen: of the mountain passes
  alternatives:
  - of the ascents
  - of the approaches upward
  lexicon: LSJ
  rationale: ἀνάβασις literally means ascent, but in topographical context it refers
    to uphill approaches or passes. 'Mountain passes' communicates the geographic
    function in clear English while remaining anchored to the Greek.
