id: JDT.6.6
reference: Judith 6:6
source:
  edition: lxx-swete-1909
  text: καὶ τότε διελεύσεται ὁ σίδηρος τῆς στρατείας μου καὶ ὁ λαὸς τῶν θεραπόντων
    μου τὰς πλευράς σου, καὶ πεσῇ ἐν τοῖς τραυματίαις αὐτῶν ὅταν ἐπιστρέψωσιν·
  language: Greek
  pages:
  - 808
  confidence: high
  validation: minor_mismatch
translation:
  text: and then the iron of my army and the people of my attendants will pass through
    your sides, and you will fall among their wounded when they return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'the iron of my army' likely uses 'iron' as a metonym for weaponry
      or armed force; alternatively, it could be rendered more interpretively as 'the
      swords of my army.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'your sides' could also be rendered 'your flanks' or 'your ribs,'
      depending on whether the addressee is heard more corporately or more personally.
    reason: lexical_alternative
  - marker: c
    text: The Greek text is vivid but somewhat compressed in 'you will fall among
      their wounded'; this likely means the addressee will be counted among those
      wounded by Holofernes' forces.
    reason: lexical_alternative
lexical_decisions:
- source_word: διελεύσεται
  chosen: will pass through
  alternatives:
  - will go through
  - will sweep through
  lexicon: LSJ
  rationale: Future middle of διέρχομαι. In this violent military context, 'pass through'
    preserves both motion and the implied piercing/devastating force without over-paraphrasing.
- source_word: ὁ σίδηρος
  chosen: the iron
  alternatives:
  - the sword
  - the weapons
  lexicon: LSJ
  rationale: Literally 'the iron.' In context it is a metonym for iron weaponry or
    armed force. Retaining 'the iron' preserves the vividness of the Greek and avoids
    specifying a single weapon not named in the text.
- source_word: τῆς στρατείας μου
  chosen: of my army
  alternatives:
  - of my campaign
  - of my force
  lexicon: LSJ
  rationale: στρατεία here denotes the military force rather than the abstract campaign.
    'Army' is the most natural English equivalent in context.
- source_word: ὁ λαὸς τῶν θεραπόντων μου
  chosen: the people of my attendants
  alternatives:
  - the troops of my servants
  - the men of my retainers
  lexicon: LSJ
  rationale: θεράπων often denotes an attendant or retainer, especially in elevated
    or military service language. 'Attendants' is more precise than generic 'servants'
    here, while λαός is kept as 'people' rather than reduced to a narrower military
    term not explicit in the Greek.
- source_word: τὰς πλευράς σου
  chosen: your sides
  alternatives:
  - your flanks
  - your ribs
  lexicon: LSJ
  rationale: πλευρά can mean side, flank, or rib. In a threat of military violence
    against a city/community or personified addressee, 'your sides' is the broadest
    and least over-interpreted rendering.
- source_word: πεσῇ
  chosen: you will fall
  alternatives:
  - you will be struck down
  - you will collapse
  lexicon: LSJ
  rationale: Aorist subjunctive after the future-like sequence, functioning in English
    as a future result. 'Fall' preserves the idiomatic sense of defeat/death without
    adding interpretive detail.
- source_word: ἐν τοῖς τραυματίαις αὐτῶν
  chosen: among their wounded
  alternatives:
  - among their casualties
  - with those wounded by them
  lexicon: LSJ
  rationale: τραυματίας denotes a wounded person. 'Among their wounded' is the most
    direct rendering, though the pronoun αὐτῶν is somewhat contextually compressed;
    the phrase likely means the addressee will lie among those wounded by Holofernes'
    forces.
- source_word: ὅταν ἐπιστρέψωσιν
  chosen: when they return
  alternatives:
  - whenever they turn back
  - when they come back
  lexicon: LSJ
  rationale: ὅταν with subjunctive gives an indefinite future temporal clause. 'When
    they return' is idiomatic and fits the military setting.
