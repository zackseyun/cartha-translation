id: JDT.6.11
reference: Judith 6:11
source:
  edition: lxx-swete-1909
  text: καὶ συνέλαβον αὐτὸν οἱ δοῦλοι αὐτοῦ καὶ ἤγαγον αὐτὸν ἔξω τῆς παρεμβολῆς εἰς
    τὸ πεδίον, καὶ ἀπῆραν ἐκ μέσου τῆς πεδινῆς εἰς τὴν ὀρεινήν, καὶ παρεγένοντο ἐπὶ
    τὰς πηγὰς αἳ ἦσαν ὑποκάτω Βετυλουά.
  language: Greek
  pages:
  - 808
  confidence: high
  validation: agree
translation:
  text: And his slaves seized him and led him outside the camp into the plain, and
    they brought him up from the middle of the plain into the hill country, and they
    came to the springs that were below Bethulia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  lexicon: BDAG
  rationale: The default for δοῦλος is context-dependent. Here it refers to Holofernes's
    subordinates under his authority. 'Slaves' preserves the bonded-status sense more
    transparently than 'servants,' in line with project guidance, while still fitting
    the narrative context.
- source_word: συνέλαβον
  chosen: seized
  alternatives:
  - took hold of
  - arrested
  lexicon: LSJ
  rationale: The verb indicates laying hold of someone. 'Seized' is concise and forceful,
    matching the physical action without importing a legal sense like 'arrested.'
- source_word: παρεμβολῆς
  chosen: camp
  alternatives:
  - encampment
  lexicon: LSJ
  rationale: In military narrative παρεμβολή commonly denotes a camp. 'Camp' is natural
    modern English and sufficiently precise.
- source_word: πεδίον
  chosen: plain
  alternatives:
  - field
  - open country
  lexicon: LSJ
  rationale: The context contrasts lowland and highland terrain. 'Plain' best captures
    a broad level area and prepares for the following movement into the hill country.
- source_word: ἀπῆραν
  chosen: brought ... up
  alternatives:
  - carried away
  - took up
  lexicon: LSJ
  rationale: Given the explicit contrast from the plain to the hill country, the verb
    is best rendered with upward movement in view. 'Brought ... up' communicates both
    transfer and ascent in idiomatic English.
- source_word: ἐκ μέσου τῆς πεδινῆς
  chosen: from the middle of the plain
  alternatives:
  - from the midst of the lowland
  - from the center of the plain
  lexicon: LSJ
  rationale: The phrase literally marks movement out from the midst of the lowland/plain
    region. 'From the middle of the plain' is a clear, natural rendering that preserves
    the spatial sense.
- source_word: ὀρεινήν
  chosen: hill country
  alternatives:
  - mountain region
  - highlands
  lexicon: LSJ
  rationale: This term commonly denotes hilly or mountainous country as a region.
    'Hill country' is standard, readable English and fits the topographical contrast
    with the plain.
- source_word: παρεγένοντο
  chosen: came
  alternatives:
  - arrived
  - reached
  lexicon: LSJ
  rationale: The verb marks arrival/presence at a location. 'Came' is simple and idiomatic
    in narrative sequence.
- source_word: πηγάς
  chosen: springs
  alternatives:
  - fountains
  - water sources
  lexicon: LSJ
  rationale: The word refers to natural water sources. 'Springs' is the clearest modern
    equivalent in this geographical setting.
- source_word: ὑποκάτω
  chosen: below
  alternatives:
  - beneath
  - down below
  lexicon: LSJ
  rationale: The preposition indicates lower geographical position relative to Bethulia.
    'Below' is concise and natural.
- source_word: Βετυλουά
  chosen: Bethulia
  alternatives:
  - Betylua
  rationale: This is a place name, so it is transliterated rather than translated,
    following project policy for names. 'Bethulia' is the standard English transliteration.
