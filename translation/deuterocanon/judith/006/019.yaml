theological_decisions:
- issue: Rendering of τῶν ἡγιασμένων σοι
  chosen_reading: those sanctified to you
  alternative_readings:
  - those consecrated to you
  - your holy ones
  rationale: The participle from ἁγιάζω can be rendered more dynamically as 'consecrated'
    or substantivally as 'holy ones.' The chosen wording preserves the holiness/set-apart
    concept without importing a narrower cultic or angelic sense not explicit in the
    text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
