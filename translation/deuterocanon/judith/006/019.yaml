id: JDT.6.19
reference: Judith 6:19
source:
  edition: lxx-swete-1909
  text: Κύριε ὁ θεὸς τοῦ οὐρανοῦ, κάτιδε ἐπὶ τὰς ὑπερηφανίας αὐτῶν, καὶ ἐλέησον τὴν
    ταπείνωσιν τοῦ γένους ἡμῶν, καὶ ἐπίβλεψον ἐπὶ τὸ πρόσωπον τῶν ἡγιασμένων σοι ἐν
    τῇ ἡμέρᾳ ταύτῃ.
  language: Greek
  pages:
  - 809
  confidence: high
  validation: agree
translation:
  text: Lord, God of heaven, look upon their arrogance, and have mercy on the humiliation
    of our people, and look upon the face of those sanctified to you on this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those consecrated to you' or 'your holy ones.' The Greek says 'those
      sanctified to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Vocative of κύριος used as a divine address; per doctrine default, 'Lord'
    is the standard rendering.
- source_word: ὁ θεὸς τοῦ οὐρανοῦ
  chosen: God of heaven
  alternatives:
  - God of the heavens
  lexicon: LSJ
  rationale: A conventional biblical title; singular 'heaven' is idiomatic in English
    while preserving the genitival construction.
- source_word: κάτιδε
  chosen: look upon
  alternatives:
  - see
  - behold
  - look down upon
  lexicon: LSJ
  rationale: Aorist imperative of καθοράω/κατίδωμι in prayer language asking God to
    regard attentively. 'Look upon' preserves the petitionary tone better than the
    flatter 'see'.
- source_word: ὑπερηφανίας
  chosen: arrogance
  alternatives:
  - pride
  - insolence
  lexicon: LSJ
  rationale: The plural noun denotes acts or expressions of haughtiness. 'Arrogance'
    communicates the moral sense clearly in modern English; singular collective English
    is natural here.
- source_word: ἐλέησον
  chosen: have mercy on
  alternatives:
  - show mercy to
  - pity
  lexicon: LSJ
  rationale: Standard rendering for ἐλεέω in prayer contexts; 'have mercy on' is both
    idiomatic and theologically weighty without being archaic.
- source_word: ταπείνωσιν
  chosen: humiliation
  alternatives:
  - humble condition
  - affliction
  - lowliness
  lexicon: LSJ
  rationale: The noun can denote low estate or humiliation. In this context of oppression
    by enemies, 'humiliation' best captures the disgrace and abasement being suffered.
- source_word: γένος ἡμῶν
  chosen: our people
  alternatives:
  - our race
  - our family line
  - our nation
  lexicon: LSJ
  rationale: γένος here refers to the collective kin-group/people of Israel. 'Our
    people' is natural English and avoids the misleading modern connotations of 'race'.
- source_word: ἐπίβλεψον
  chosen: look upon
  alternatives:
  - look favorably upon
  - turn your gaze to
  - regard
  lexicon: LSJ
  rationale: Another imperative of seeing/regarding. Repeating 'look upon' reflects
    the Greek parallelism and prayer cadence.
- source_word: τὸ πρόσωπον
  chosen: the face
  alternatives:
  - the presence
  - the countenance
  lexicon: LSJ
  rationale: Literally 'face.' Although 'presence' is possible idiomatically, the
    Greek is concrete, and retaining 'face' preserves the vividness of the appeal.
- source_word: τῶν ἡγιασμένων σοι
  chosen: those sanctified to you
  alternatives:
  - those consecrated to you
  - your holy ones
  - those made holy for you
  lexicon: LSJ
  rationale: Perfect/passive participle of ἁγιάζω, denoting persons set apart for
    God. 'Sanctified to you' keeps the verbal connection to holiness and the dative
    relation to God.
- source_word: ἐν τῇ ἡμέρᾳ ταύτῃ
  chosen: on this day
  alternatives:
  - in this day
  - today
  lexicon: LSJ
  rationale: Idiomatic temporal expression. 'On this day' preserves the solemnity
    and deictic force better than the simpler 'today'.
