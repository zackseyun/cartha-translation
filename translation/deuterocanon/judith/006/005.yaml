id: JDT.6.5
reference: Judith 6:5
source:
  edition: lxx-swete-1909
  text: σὺ δὲ Ἀχιώρ, μισθωτὲ τοῦ Ἀμμών, ὃς ἐλάλησας τοὺς λόγους τούτους ἐν ἡμέρᾳ ἀδικίας
    σου, οὐκ ὄψῃ ἔτι τὸ πρόσωπόν μου ἀπὸ τῆς ἡμέρας ταύτης ἕως οὗ ἐκδικήσω ⁴⁽ᵇ⁾
  language: Greek
  pages:
  - 808
  confidence: high
  validation: agree
translation:
  text: But you, Achior, hireling of Ammon, who spoke these words in the day of your
    injustice, shall no longer see my face from this day until I take vengeance
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mercenary' or 'hireling' for 'hired man' (μισθωτέ).
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in the day of your injustice' may also be understood as 'on
      the day of your wrongdoing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μισθωτέ
  chosen: hired man
  alternatives:
  - mercenary
  - hireling
  - hired servant
  lexicon: LSJ
  rationale: The noun denotes one who serves for wages. 'Hired man' preserves the
    concrete, slightly contemptuous force in direct address without importing the
    more militarized sense of 'mercenary' unless context requires it.
- source_word: τοῦ Ἀμμών
  chosen: of Ammon
  alternatives:
  - the Ammonite
  - of the Ammonites
  lexicon: LSJ
  rationale: The genitive is rendered straightforwardly as affiliation/origin, matching
    the Greek form as addressed to Achior. 'Of Ammon' stays closer to the source than
    converting it to the adjectival 'Ammonite.'
- source_word: ἐλάλησας
  chosen: spoke
  alternatives:
  - said
  lexicon: BDAG
  rationale: A standard rendering of λαλέω in narrative speech. 'Spoke' fits the formal
    accusation and pairs naturally with 'these words.'
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - these things
  - this message
  lexicon: BDAG
  rationale: A formally close rendering that preserves the explicit reference to Achior's
    prior speech.
- source_word: ἐν ἡμέρᾳ ἀδικίας σου
  chosen: in the day of your injustice
  alternatives:
  - on the day of your wrongdoing
  - in the time of your unrighteousness
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic but clear enough to preserve literally.
    ἀδικία can mean injustice or wrongdoing; 'injustice' keeps the lexical tie while
    allowing the phrase's accusatory tone to stand. Because the Greek itself is unusual
    in English, a slightly formal rendering is preferable to over-interpretation.
- source_word: οὐκ ὄψῃ ἔτι τὸ πρόσωπόν μου
  chosen: shall no longer see my face
  alternatives:
  - will never again see my face
  - shall not see me anymore
  lexicon: BDAG
  rationale: This preserves the idiom of seeing one's face, which in English still
    communicates personal presence and favor/disfavor.
- source_word: ἀπὸ τῆς ἡμέρας ταύτης
  chosen: from this day
  alternatives:
  - from this day on
  - starting today
  lexicon: BDAG
  rationale: A direct and natural rendering of the temporal phrase.
- source_word: ἕως οὗ ἐκδικήσω
  chosen: until I take vengeance
  alternatives:
  - until I avenge
  - until I exact vengeance
  lexicon: BDAG
  rationale: ἐκδικέω here expresses punitive vengeance by the speaker. 'Take vengeance'
    is idiomatic modern English and preserves the force without unnecessary archaism.
