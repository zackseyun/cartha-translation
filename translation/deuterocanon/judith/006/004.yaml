theological_decisions:
- issue: Rendering κύριος in a boastful title for Nebuchadnezzar
  chosen_reading: lord of all the earth
  alternative_readings:
  - master of all the earth
  rationale: The project default renders κύριος as 'Lord/lord.' Because the referent
    is a human king making an imperial claim, lowercase 'lord' is used to avoid confusion
    with the divine title while still translating the Greek directly.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
