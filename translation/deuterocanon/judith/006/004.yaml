id: JDT.6.4
reference: Judith 6:4
source:
  edition: lxx-swete-1909
  text: κατακαύσομεν γὰρ αὐτοῖς ἐν αὐτοῖς, καὶ τὰ ὅρια αὐτῶν μεθυσθήσεται ἐν τῷ αἵματι
    αὐτῶν, καὶ τὰ πεδία αὐτῶν πληρωθήσεται νεκρῶν αὐτῶν· καὶ οὐκ ἀντιστήσεται τὸ ἴχνος
    τῶν ποδῶν αὐτῶν κατὰ πρόσωπον ἡμῶν, ἀλλʼ ἀπωλείᾳ ἀπολοῦνται, λέγει ὁ βασιλεὺς
    Ναβουχοδονοσόρ, κύριος πάσης τῆς γῆς. εἶπεν γάρ· οὐ ματαιωθήσεται τὰ ῥήματα τῶν
    λόγων αὐτοῦ.
  language: Greek
  pages:
  - 807
  confidence: high
  validation: minor_mismatch
translation:
  text: For we will burn them up where they are, and their borders will be drenched
    with their blood, and their plains will be filled with their dead. The trace of
    their feet will not stand before us, but they will utterly perish, says King Nebuchadnezzar,
    lord of all the earth. For he said, ‘The words of his mouth will not prove empty.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'their borders will be made drunk with their blood.'
      The Greek uses a vivid metaphor of intoxication for bloodshed.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Not even the trace of their feet will stand before us,' expressing
      that none of them will remain or withstand the attack.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακαύσομεν
  chosen: we will burn them up
  alternatives:
  - we will utterly burn them
  - we will consume them with fire
  lexicon: LSJ
  rationale: Future of κατακαίω intensifies simple burning; 'burn them up' preserves
    the destructive force without over-paraphrasing.
- source_word: ἐν αὐτοῖς
  chosen: where they are
  alternatives:
  - among them
  - in them
  lexicon: LSJ
  rationale: 'The repeated pronoun after κατακαύσομεν is awkwardly literal in English.
    ''Where they are'' best conveys the locative force in context: destruction in
    their own place.'
- source_word: τὰ ὅρια
  chosen: their borders
  alternatives:
  - their territory
  - their regions
  lexicon: LSJ
  rationale: ὅρια commonly denotes boundaries or borderlands. 'Borders' keeps the
    concrete geographic image, fitting the military threat.
- source_word: μεθυσθήσεται ἐν τῷ αἵματι αὐτῶν
  chosen: will be drenched with their blood
  alternatives:
  - will be made drunk with their blood
  - will be saturated with their blood
  lexicon: LSJ
  rationale: The verb literally means 'be drunk/intoxicated,' but with land or borders
    as subject the image is metaphorical. 'Drenched with' communicates the violent
    image in natural English while avoiding a misleadingly literal anthropomorphism.
- source_word: τὰ πεδία
  chosen: their plains
  alternatives:
  - their fields
  - their open country
  lexicon: LSJ
  rationale: πεδία refers to plains/open fields. 'Plains' fits the military-geographic
    context better than the more agricultural 'fields.'
- source_word: πληρωθήσεται νεκρῶν αὐτῶν
  chosen: will be filled with their dead
  alternatives:
  - will be filled with their corpses
  lexicon: LSJ
  rationale: νεκρῶν can mean 'dead persons' or 'corpses.' 'Their dead' is idiomatic
    and preserves the grim sense without sounding overly clinical.
- source_word: οὐκ ἀντιστήσεται τὸ ἴχνος τῶν ποδῶν αὐτῶν κατὰ πρόσωπον ἡμῶν
  chosen: The trace of their feet will not stand before us
  alternatives:
  - Not even the footprint of their feet will stand against us
  - The mark of their feet will not remain before us
  lexicon: LSJ
  rationale: The phrase is vivid and somewhat idiomatic. Retaining 'trace of their
    feet' preserves the image that none of them will remain or withstand the attackers.
    'Before us' reflects κατὰ πρόσωπον ἡμῶν in a straightforward way.
- source_word: ἀλλʼ ἀπωλείᾳ ἀπολοῦνται
  chosen: they will utterly perish
  alternatives:
  - they will be destroyed with destruction
  - they will perish in ruin
  lexicon: LSJ
  rationale: The noun-plus-verb construction is emphatic. 'Utterly perish' captures
    the intensification in idiomatic English.
- source_word: κύριος πάσης τῆς γῆς
  chosen: lord of all the earth
  alternatives:
  - master of all the earth
  lexicon: LSJ
  rationale: κύριος is rendered 'lord' per project defaults. Here it is a royal boast
    applied to Nebuchadnezzar, so lowercase 'lord' avoids importing divine-title force
    while preserving the claim.
- source_word: οὐ ματαιωθήσεται τὰ ῥήματα τῶν λόγων αὐτοῦ
  chosen: The words of his mouth will not prove empty
  alternatives:
  - The utterances of his words will not be annulled
  - His words will not be in vain
  lexicon: LSJ
  rationale: The Greek is pleonastic ('the words of his words'). 'The words of his
    mouth' preserves the emphatic speech formula in natural English. 'Will not prove
    empty' reflects ματαιωθήσεται without overinterpreting as mere failure or annulment.
