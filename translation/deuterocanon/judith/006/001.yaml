id: JDT.6.1
reference: Judith 6:1
source:
  edition: lxx-swete-1909
  text: Καὶ ὡς κατέπαυσεν ὁ θροῦβος τῶν ἀνδρῶν τῶν κύκλῳ τῆς συνεδρίας, εἶπεν Ὀλοφέρνης
    ἀρχιστράτηγος δυνάμεως Ἀσσοὺρ πρὸς Ἀχιὼρ ἐναντίον παντὸς τοῦ δήμου ἀλλοφύλων·
  language: Greek
  pages:
  - 807
  confidence: high
  validation: agree
translation:
  text: 'And when the uproar of the men around the council had ceased, Holofernes,
    commander-in-chief of the army of Asshur, said to Achior in the presence of all
    the assembly of foreigners:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Assyria.' The Greek has the proper name Asshour, which may be rendered
      as the personal/ethnic name 'Asshur' or as the kingdom name 'Assyria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέπαυσεν
  chosen: had ceased
  alternatives:
  - stopped
  - came to an end
  lexicon: BDAG
  rationale: A pluperfect-like English rendering fits the narrative sequence after
    ὡς ('when/as soon as') and conveys the completed cessation of the noise before
    Holofernes speaks.
- source_word: θροῦβος
  chosen: uproar
  alternatives:
  - commotion
  - noise
  - tumult
  lexicon: LSJ
  rationale: The term denotes noisy disturbance; 'uproar' captures both sound and
    agitation better than the flatter 'noise'.
- source_word: συνεδρίας
  chosen: council
  alternatives:
  - assembly
  - council meeting
  lexicon: LSJ
  rationale: The word refers to a deliberative gathering. 'Council' is concise and
    natural in context, while preserving the institutional sense.
- source_word: ἀρχιστράτηγος
  chosen: commander-in-chief
  alternatives:
  - general
  - supreme commander
  lexicon: LSJ
  rationale: The compound title is stronger than a generic 'general'; 'commander-in-chief'
    best reflects the superlative military rank.
- source_word: δυνάμεως
  chosen: army
  alternatives:
  - force
  - host
  lexicon: BDAG
  rationale: In military context δύναμις commonly denotes an armed force. 'Army' is
    the clearest idiomatic rendering in English.
- source_word: Ἀσσοὺρ
  chosen: Asshur
  alternatives:
  - Assyria
  lexicon: LSJ
  rationale: The Greek form is a proper name corresponding to Asshur/Assur. Following
    the philosophy to transliterate names, 'Asshur' is preferred over the interpretive
    geopolitical label 'Assyria'.
- source_word: ἐναντίον
  chosen: in the presence of
  alternatives:
  - before
  - in front of
  lexicon: BDAG
  rationale: The phrase marks public setting rather than mere spatial orientation.
    'In the presence of' makes the formal, public nature of the speech explicit.
- source_word: δήμου
  chosen: assembly
  alternatives:
  - people
  - multitude
  lexicon: BDAG
  rationale: δήμος can mean people collectively, but with παντός and the public-speaking
    context, 'assembly' better conveys the gathered body.
- source_word: ἀλλοφύλων
  chosen: foreigners
  alternatives:
  - foreign peoples
  - aliens
  - Philistines
  lexicon: LSJ
  rationale: The adjective/noun means those of another tribe or nation. Here it is
    a broad ethnic designation, not the specific ethnonym 'Philistines'; 'foreigners'
    is the most natural and contextually safe rendering.
