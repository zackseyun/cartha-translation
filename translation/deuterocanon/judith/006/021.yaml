id: JDT.6.21
reference: Judith 6:21
source:
  edition: lxx-swete-1909
  text: καὶ παρέλαβεν αὐτὸν Ὀζείας ἐκ τῆς ἐκκλησίας εἰς οἶκον ἑαυτοῦ, καὶ ἐποίησεν
    πότον τοῖς πρεσβυτέροις· καὶ ἐπεκαλέσαντο τὸν θεὸν Ἰσραὴλ εἰς βοήθειαν ὅλην τὴν
    νύκτα ἐκείνην.
  language: Greek
  pages:
  - 809
  confidence: high
  validation: agree
translation:
  text: And Uzziah took him from the assembly into his house, and made a banquet for
    the elders; and they called on the God of Israel for help all that night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἐκκλησία means the gathered assembly or congregation here, not 'church'
      in a later Christian sense.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'made a drinking feast' or 'made drink'; the phrase refers to
      hosting a banquet.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέλαβεν
  chosen: took
  alternatives:
  - received
  - took along
  lexicon: BDAG
  rationale: Aorist of παραλαμβάνω here denotes taking someone with oneself from one
    place to another. 'Took' is natural English and fits the movement from the assembly
    to his house.
- source_word: ἐκ τῆς ἐκκλησίας
  chosen: from the assembly
  alternatives:
  - from the congregation
  lexicon: LEH
  rationale: ἐκκλησία in this narrative context refers to the gathered civic/community
    body, not a church in the later Christian sense. 'Assembly' preserves the public
    gathering sense without anachronism.
- source_word: οἶκον ἑαυτοῦ
  chosen: his house
  alternatives:
  - his home
  lexicon: LEH
  rationale: οἶκος here is the physical household dwelling. 'House' is slightly more
    formal and matches the narrative register.
- source_word: ἐποίησεν πότον
  chosen: made a banquet
  alternatives:
  - prepared a drinking feast
  - gave a feast
  lexicon: LEH
  rationale: Literally 'made a drink/drinking,' an idiom for hosting a feast or drinking
    banquet. 'Made a banquet' communicates the social meal setting in readable English
    without over-literal awkwardness.
- source_word: τοῖς πρεσβυτέροις
  chosen: for the elders
  alternatives:
  - for the older men
  lexicon: BDAG
  rationale: In context this refers to community leaders, not merely men advanced
    in age. 'Elders' is the standard rendering for the office/social role.
- source_word: ἐπεκαλέσαντο
  chosen: called on
  alternatives:
  - invoked
  - called upon
  lexicon: BDAG
  rationale: The middle form here means to call upon deity in prayer. 'Called on'
    is idiomatic modern English and preserves the prayerful sense.
- source_word: τὸν θεὸν Ἰσραήλ
  chosen: the God of Israel
  lexicon: LEH
  rationale: Straightforward genitival title identifying Israel's God; standard English
    biblical rendering.
- source_word: εἰς βοήθειαν
  chosen: for help
  alternatives:
  - for aid
  - for assistance
  lexicon: BDAG
  rationale: The prepositional phrase expresses purpose or appeal toward divine aid.
    'For help' is concise, natural, and faithful.
- source_word: ὅλην τὴν νύκτα ἐκείνην
  chosen: all that night
  alternatives:
  - throughout that whole night
  lexicon: BDAG
  rationale: This accusative of extent of time indicates duration. 'All that night'
    is idiomatic and preserves the full-night sense.
