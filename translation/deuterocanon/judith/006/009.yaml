id: JDT.6.9
reference: Judith 6:9
source:
  edition: lxx-swete-1909
  text: καὶ εἶπερ ἐλπίζεις τῇ καρδίᾳ σου ὅτι οὐ λημφθήσονται, μὴ συμπεσέτω σου τὸ
    πρόσωπον. ἐλά- λησα, καὶ οὐδὲν διαπεσεῖται τῶν ῥημάτων μου.
  language: Greek
  pages:
  - 808
  confidence: high
  validation: agree
translation:
  text: And if you are hoping in your heart that they will not be taken, do not let
    your face fall. I have spoken, and none of my words will fail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will not be captured.' The Greek passive can naturally carry a
      military sense here.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'do not let your face fall,' an idiom for becoming dejected or
      downcast.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπερ
  chosen: And if
  alternatives:
  - if indeed
  - even if
  lexicon: LSJ
  rationale: Introduces a conditional statement with a slightly emphatic force. 'And
    if' preserves the connection to the prior speech and reads naturally in English
    without overstating the emphasis.
- source_word: ἐλπίζεις
  chosen: you are hoping
  alternatives:
  - you hope
  - you expect
  lexicon: BDAG
  rationale: The present tense is well represented by 'are hoping,' conveying ongoing
    inward expectation. 'Expect' is possible but weakens the affective sense of hope.
- source_word: τῇ καρδίᾳ σου
  chosen: in your heart
  alternatives:
  - with your heart
  - within yourself
  lexicon: LSJ
  rationale: A standard idiom for inward thought or confidence. 'In your heart' preserves
    the anthropological language of the Greek and remains idiomatic in English.
- source_word: οὐ λημφθήσονται
  chosen: they will not be taken
  alternatives:
  - they will not be captured
  - they will not be seized
  lexicon: BDAG
  rationale: The passive future of λαμβάνω in military context can mean being taken
    or captured. 'Taken' is concise and preserves the passive form; 'captured' is
    a plausible contextual alternative.
- source_word: μὴ συμπεσέτω σου τὸ πρόσωπον
  chosen: do not let your face fall
  alternatives:
  - do not be downcast
  - do not let your countenance fall
  lexicon: LSJ
  rationale: This idiom refers to visible discouragement or dejection. 'Do not let
    your face fall' preserves the metaphor of the Greek while remaining understandable
    in modern English. A more interpretive rendering like 'do not be downcast' is
    possible but less transparent.
- source_word: ἐλάλησα
  chosen: I have spoken
  alternatives:
  - I spoke
  lexicon: BDAG
  rationale: The aorist can be rendered simply as past, but 'I have spoken' fits the
    solemn, authoritative tone and naturally introduces the assurance that follows.
- source_word: οὐδὲν διαπεσεῖται
  chosen: none ... will fail
  alternatives:
  - nothing ... will fall through
  - nothing ... will pass away
  lexicon: LSJ
  rationale: The verb conveys not falling away or failing to come to pass. 'Will fail'
    communicates the sense clearly in English and suits the context of a declared
    word proving true.
- source_word: τῶν ῥημάτων μου
  chosen: my words
  alternatives:
  - my sayings
  - the things I have said
  lexicon: BDAG
  rationale: ῥήματα here refers to spoken utterances. 'My words' is direct, natural,
    and sufficiently formal for the context.
