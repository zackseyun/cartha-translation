- issue: Idiomatic expression of discouragement
  chosen_reading: do not let your face fall
  alternative_readings:
  - do not be downcast
  rationale: The verse uses a bodily idiom rather than an abstract emotional term.
    Preserving the idiom maintains the texture of the Greek while still being intelligible
    to modern readers.
