id: JDT.6.13
reference: Judith 6:13
source:
  edition: lxx-swete-1909
  text: καὶ ὑποδύσαντες ὑποκάτω τοῦ ὄρους ἔδησαν τὸν Ἀχιὼρ καὶ ἀφῆκαν ἐρριμμένον ὑπὸ
    τὴν ῥίζαν τοῦ ὄρους, καὶ ἀπῴχοντο πρὸς τὸν κύριον αὐτῶν.
  language: Greek
  pages:
  - 808
  confidence: high
  validation: minor_mismatch
translation:
  text: And after going down below the mountain, they bound Achior and left him lying
    at the foot of the mountain, and they went away to their lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast down.' The Greek participle emphasizes that Achior was left in
      the condition of having been thrown down.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποδύσαντες
  chosen: after going down
  alternatives:
  - having gone down
  - after descending
  lexicon: LSJ
  rationale: Aorist participle from ὑποδύω in this context denotes movement downward/under,
    here spatially 'going down below' the mountain. 'After going down' preserves the
    participial sequence in natural English without over-paraphrasing.
- source_word: ὑποκάτω τοῦ ὄρους
  chosen: below the mountain
  alternatives:
  - under the mountain
  - beneath the mountain
  lexicon: LSJ
  rationale: ὑποκάτω indicates a lower position relative to the mountain. 'Below the
    mountain' is idiomatic English and fits the narrative geography better than the
    more literal but potentially misleading 'under the mountain.'
- source_word: ἔδησαν
  chosen: they bound
  alternatives:
  - they tied up
  lexicon: LSJ
  rationale: δέω commonly means 'bind, tie.' 'Bound' is concise and preserves the
    force of restraint.
- source_word: ἀφῆκαν
  chosen: left
  alternatives:
  - abandoned
  - let go
  lexicon: LSJ
  rationale: In sequence with ἐρριμμένον, the sense is that they left him in a condition/location,
    not merely released him. 'Left' best fits the construction.
- source_word: ἐρριμμένον
  chosen: thrown down
  alternatives:
  - cast down
  - lying there
  lexicon: LSJ
  rationale: Perfect/passive participle of ῥίπτω conveys that Achior had been thrown
    down and left in that state. 'Thrown down' preserves the violent nuance better
    than the weaker 'lying there.'
- source_word: ὑπὸ τὴν ῥίζαν τοῦ ὄρους
  chosen: at the foot of the mountain
  alternatives:
  - under the base of the mountain
  - beneath the mountain's root
  lexicon: LSJ
  rationale: ῥίζα literally means 'root,' but in topographical usage the idiomatic
    sense is the mountain's base. 'At the foot of the mountain' is the natural English
    equivalent.
- source_word: ἀπῴχοντο
  chosen: they went away
  alternatives:
  - they departed
  - they went off
  lexicon: LSJ
  rationale: Imperfect/middle form here narrates their departure. 'Went away' is straightforward
    and natural.
- source_word: πρὸς τὸν κύριον αὐτῶν
  chosen: to their lord
  alternatives:
  - to their master
  lexicon: LSJ
  rationale: κύριος here refers to their human superior, not the divine title. In
    keeping with the project's default, 'lord' is retained unless context strongly
    requires otherwise; here the possessive and military setting make the human referent
    clear.
- source_word: τὸν Ἀχιὼρ
  chosen: Achior
  rationale: Personal name transliterated by standard convention per project philosophy.
