theological_decisions:
- issue: Rendering κύριος for a human superior rather than God
  chosen_reading: their lord
  alternative_readings:
  - their master
  rationale: The term κύριος is context-sensitive. Here it plainly refers to the soldiers'
    human commander, so it should not be capitalized as a divine title. 'Lord' preserves
    lexical continuity with the Greek while the possessive clarifies the non-divine
    referent.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; translate titles,
    transliterate names'
