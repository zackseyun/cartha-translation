id: JDT.6.16
reference: Judith 6:16
source:
  edition: lxx-swete-1909
  text: καὶ συνεκάλεσεν πάντας τοὺς πρεσβυτέρους τῆς πόλεως, καὶ συνέδραμον πᾶς νεανίσκος
    αὐτῶν καὶ αἱ γυναῖκες εἰς τὴν ἐκκλησίαν, καὶ ἔστησαν τὸν Ἀχιὼρ ἐν μέσῳ παντὸς
    τοῦ λαοῦ αὐτῶν, καὶ ἐπηρώτησεν αὐτὸν Ὀζείας τὸ συμβεβηκός.
  language: Greek
  pages:
  - 809
  confidence: high
  validation: agree
translation:
  text: And he called together all the elders of the city, and all their young men
    and the women ran together into the assembly, and they set Achior in the midst
    of all their people, and Uzziah asked him what had happened.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνεκάλεσεν
  chosen: called together
  alternatives:
  - assembled
  - summoned
  lexicon: BDAG
  rationale: The compound verb conveys gathering people together. 'Called together'
    is natural English and preserves the causative sense without overformal stiffness.
- source_word: πρεσβυτέρους
  chosen: elders
  alternatives:
  - older men
  lexicon: BDAG
  rationale: In civic context this refers to recognized community leaders, not merely
    men advanced in age; 'elders' best matches the institutional sense.
- source_word: συνέδραμον
  chosen: ran together
  alternatives:
  - gathered together
  - came together
  lexicon: BDAG
  rationale: The verb literally suggests rushing or running together. Retaining 'ran
    together' preserves the urgency present in the Greek better than the flatter 'gathered
    together.'
- source_word: νεανίσκος
  chosen: young men
  alternatives:
  - young man
  - youth
  lexicon: BDAG
  rationale: Although singular in form after πᾶς, the sense here is collective in
    agreement with the plural social groups listed; 'all their young men' reflects
    idiomatic English for the collective reference.
- source_word: ἐκκλησίαν
  chosen: assembly
  alternatives:
  - congregation
  - gathering
  lexicon: BDAG
  rationale: In Judith this denotes the assembled community rather than a later ecclesial
    institution. 'Assembly' is the most transparent and least anachronistic rendering.
- source_word: ἔστησαν
  chosen: set
  alternatives:
  - placed
  - stood
  lexicon: BDAG
  rationale: With an object and location, the verb means to cause someone to stand/place
    them. 'Set Achior in the midst' is concise and idiomatic.
- source_word: ἐν μέσῳ παντὸς τοῦ λαοῦ αὐτῶν
  chosen: in the midst of all their people
  alternatives:
  - before all their people
  - in the middle of all the people
  lexicon: BDAG
  rationale: This phrase emphasizes Achior's placement before the whole community.
    'In the midst of all their people' closely follows the Greek while remaining readable.
- source_word: ἐπηρώτησεν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: The verb here introduces Uzziah's inquiry in straightforward narrative
    style. 'Asked' is the clearest natural equivalent.
- source_word: τὸ συμβεβηκός
  chosen: what had happened
  alternatives:
  - what had taken place
  - the event that had occurred
  lexicon: BDAG
  rationale: The perfect participial substantive refers to the matter that had occurred.
    'What had happened' is idiomatic and accurately captures the sense.
