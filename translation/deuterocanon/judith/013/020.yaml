theological_decisions:
- issue: Rendering the people's acclamation Γένοιτο, γένοιτο
  chosen_reading: Amen, amen
  alternative_readings:
  - May it be, may it be
  - So be it, so be it
  rationale: This is not a doctrinally contested term in the table, but it carries
    communal-liturgical force. 'Amen' communicates the responsive assent of the people
    more naturally in English while preserving the doubled emphasis; the more literal
    alternatives are preserved in a footnote.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve significant alternatives in footnotes where ambiguity remains.'
