id: JDT.13.20
reference: Judith 13:20
source:
  edition: lxx-swete-1909
  text: καὶ ποιήσαι σοι αὐτὰ ὁ θεὸς εἰς ὕψος αἰώνιον, τοῦ ἐπισκέψασθαί σε ἐν ἀγαθοῖς,
    ἀνθʼ ὧν οὐκ ἐφείσω τῆς ψυχῆς σου διὰ τὴν ταπείνωσιν τοῦ γένους ἡμῶν, ἀλλʼ ἐπεξῆλθες
    πτώματι ἡμῶν, ἐπʼ εὐθεῖαν πορευθεῖσα ἐνώπιον τοῦ θεοῦ ἡμῶν. καὶ εἶπεν πᾶς ὁ λαός
    Γένοιτο, γένοιτο.
  language: Greek
  pages:
