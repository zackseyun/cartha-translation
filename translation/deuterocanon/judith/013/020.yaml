translation:
  text: And may God make this for you an everlasting exaltation, to visit you with
    good things, because you did not spare your life on account of the humiliation
    of our people, but went out before our fall, having walked straight before our
    God. And all the people said, “So be it, so be it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “May it be, may it be” / “So be it, so be it.” Greek: “Γένοιτο, γένοιτο.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσαι ... εἰς ὕψος αἰώνιον
  chosen: make these things for you into everlasting exaltation
  alternatives:
  - make this redound to your everlasting honor
  - make this for you an eternal height
  lexicon: LSJ
  rationale: The optative-like wish with ποιέω plus εἰς ὕψος is idiomatic and expresses
    a prayer that God turn Judith's deed into enduring honor/exaltation. 'Everlasting
    exaltation' stays close to the Greek imagery of height while remaining intelligible.
- source_word: τοῦ ἐπισκέψασθαί σε ἐν ἀγαθοῖς
  chosen: by visiting you with good things
  alternatives:
  - when he visits you with blessings
  - to look upon you with favor
  lexicon: LSJ
  rationale: ἐπισκέπτομαι can mean visit, look after, or show concern. In this benefactive
    context with ἐν ἀγαθοῖς, 'visiting you with good things' preserves the verbal
    image and divine favor without over-paraphrasing to 'bless' alone.
- source_word: οὐκ ἐφείσω τῆς ψυχῆς σου
  chosen: you did not spare your life
  alternatives:
  - you did not spare yourself
  - you did not hold back your soul
  lexicon: LSJ
  rationale: ψυχή here refers to life/self in a context of mortal risk. 'Did not spare
    your life' is idiomatic English and conveys the danger Judith embraced.
- source_word: διὰ τὴν ταπείνωσιν τοῦ γένους ἡμῶν
  chosen: on account of the humiliation of our people
  alternatives:
  - because of the affliction of our race
  - because of the low estate of our nation
  lexicon: LSJ
  rationale: ταπείνωσις denotes humiliation, abasement, or affliction. 'Humiliation'
    best matches the public disgrace and oppression in context; γένος here is collective
    and is naturally rendered 'people' rather than the more ethnically loaded 'race'
    in modern English.
- source_word: ἐπεξῆλθες πτώματι ἡμῶν
  chosen: went out against our fallen condition
  alternatives:
  - went out because of our downfall
  - went forth to confront our collapse
  lexicon: LSJ
  rationale: πτῶμα literally means fall/fallen state, and in context refers to the
    people's collapse or ruin. The dative is difficult; 'against our fallen condition'
    captures Judith's action in response to and in opposition to Israel's downfall
    without forcing an overly specific object absent in the Greek.
- source_word: ἐπʼ εὐθεῖαν πορευθεῖσα
  chosen: having walked straight
  alternatives:
  - going on a straight path
  - walking uprightly
  lexicon: LSJ
  rationale: The phrase literally evokes going on straightness/straight course. 'Having
    walked straight' preserves the path metaphor and moral sense; 'uprightly' is possible
    but less concrete.
- source_word: Γένοιτο, γένοιτο
  chosen: Amen, amen
  alternatives:
  - May it be, may it be
  - So be it, so be it
  lexicon: LSJ
  rationale: Although γένοιτο literally means 'may it be,' in congregational response
    English 'Amen' best conveys the liturgical force. Doubling is preserved.
