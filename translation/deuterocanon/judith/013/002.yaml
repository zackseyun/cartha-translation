translation:
  text: For they were all exhausted, because the drinking had gone on too long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because the drinking party had lasted longer' or 'because the bout of
      drinking had become excessive.' The Greek expression combines excess of extent
      with the drinking context.
    reason: lexical_alternative
lexical_decisions:
- source_word: κεκοπωμένοι
  chosen: exhausted
  alternatives:
  - weary
  - worn out
  - fatigued
  lexicon: BDAG
  rationale: The perfect participle indicates a resulting state of weariness. 'Exhausted'
    captures the strong sense in natural English better than the milder 'weary.'
- source_word: διὰ τὸ ... γεγονέναι
  chosen: because ... had gone on
  alternatives:
  - because ... had become
  - on account of ... having been
  lexicon: BDAG
  rationale: The construction gives the reason for their condition. Rendering it causally
    with an English pluperfect-like sense communicates the completed prior action
    that produced their exhaustion.
- source_word: ἐπὶ πλεῖον
  chosen: too long
  alternatives:
  - for longer
  - to a greater extent
  - beyond measure
  lexicon: LSJ
  rationale: In context with drinking, the idiom refers to excessive duration/extent.
    'Too long' is idiomatic English and conveys excess without wooden literalism.
- source_word: τὸν πότον
  chosen: the drinking
  alternatives:
  - the banquet
  - the bout of drinking
  - the wine-drinking
  lexicon: LSJ
  rationale: πότος denotes drinking, often a drinking party or bout. 'The drinking'
    stays close to the Greek while fitting the causal clause; 'banquet' would import
    eating, which the word itself does not require.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  - now
  lexicon: BDAG
  rationale: The conjunction explains the preceding situation. 'For' preserves the
    explanatory link straightforwardly.
