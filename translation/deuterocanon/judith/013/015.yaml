translation:
  text: And coming forward, she brought out the head from the bag and showed it to
    them, and said to them, “Behold, the head of Holofernes, the commander-in-chief
    of the army of Asshur; and behold, the canopy in which he was lying in his drunkenness.
    And the Lord struck him down by the hand of a woman.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “mosquito net” or “bed-curtain” for the hanging over Holofernes’ bed.
    reason: lexical_alternative
lexical_decisions:
- source_word: προελθοῦσα
  chosen: coming forward
  alternatives:
  - stepping out
  - going out before them
  lexicon: LSJ
  rationale: The participle marks Judith's movement into view before displaying the
    items. 'Coming forward' is natural English and preserves the narrative action
    without over-specifying direction.
- source_word: πήρας
  chosen: bag
  alternatives:
  - wallet
  - pouch
  - scrip
  lexicon: LSJ
  rationale: πήρα commonly denotes a bag or pouch used for carrying items. 'Bag' is
    the clearest modern English choice and fits the immediate context of producing
    the severed head.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: The interjection draws emphatic attention. 'Look' preserves the force
    in readable modern English better than the archaic 'Behold.'
- source_word: ἀρχιστρατήγου
  chosen: commander-in-chief
  alternatives:
  - general
  - supreme commander
  lexicon: LSJ
  rationale: The compound title denotes the highest military commander. 'Commander-in-chief'
    best conveys the superlative rank more precisely than the flatter 'general.'
- source_word: δυνάμεως
  chosen: army
  alternatives:
  - force
  - host
  lexicon: LSJ
  rationale: In military context δύναμις refers to an armed force. 'Army' is idiomatic
    and clear in English.
- source_word: Ἀσσούρ
  chosen: Asshur
  alternatives:
  - Assyria
  lexicon: LSJ
  rationale: The Greek form is the proper name Ἀσσούρ. Rendering it as 'Asshur' preserves
    the transliterated name rather than converting it to the geopolitical label 'Assyria.'
- source_word: κωνώπιον
  chosen: canopy
  alternatives:
  - mosquito net
  - bed-curtain
  lexicon: LSJ
  rationale: The term can denote a net or hanging over a bed. In this courtly tent
    setting, 'canopy' gives a dignified, readable rendering while preserving the idea
    of the hanging covering. Because 'mosquito net' is also possible, that alternative
    is preserved in a footnote.
- source_word: κατέκειτο
  chosen: was lying
  alternatives:
  - was reclining
  - lay
  lexicon: BDAG
  rationale: The imperfect middle/passive here describes Holofernes' state on the
    bed. 'Was lying' is straightforward and fits the scene.
- source_word: μέθαις
  chosen: drunkenness
  alternatives:
  - drinking bout
  - carousal
  - drunken revelries
  lexicon: LSJ
  rationale: The plural noun refers to episodes or conditions of intoxication. 'In
    his drunkenness' is idiomatic English that captures the sense without awkward
    literal plurality.
- source_word: ἐπάταξεν
  chosen: struck him down
  alternatives:
  - smote him
  - struck him
  lexicon: LSJ
  rationale: The verb often denotes a decisive blow. 'Struck him down' communicates
    both the action and its lethal result in natural English.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' With the article in Greek and
    in reference to Israel's God, 'the Lord' is the most natural English form here.
- source_word: ἐν χειρὶ θηλείας
  chosen: by the hand of a woman
  alternatives:
  - through a female
  - by a woman's hand
  lexicon: LSJ
  rationale: The idiom ἐν χειρί means agency or instrumentality. θηλείας is explicitly
    female/woman. 'By the hand of a woman' preserves the biblical idiom and the gendered
    emphasis of the Greek.
