theological_decisions:
- issue: Divine agency in Holofernes' death
  chosen_reading: And the Lord struck him down by the hand of a woman
  alternative_readings:
  - And the Lord delivered him into the hand of a woman
  rationale: The Greek verb ἐπάταξεν normally denotes striking, not merely handing
    over. The text explicitly attributes the decisive act to the Lord while also naming
    Judith as the human agent. The translation preserves that theological tension
    rather than softening either divine or human agency.
  doctrine_reference: Preserve theological tension rather than resolve it; κύριος
    → Lord
- issue: Gendered expression θηλείας
  chosen_reading: a woman
  alternative_readings:
  - a female
  rationale: The Greek intentionally highlights the shame of defeat by a female agent.
    'Woman' is idiomatic English and preserves the gendered force without reducing
    the person to a biological label. This follows the project's gender-accurate principle.
  doctrine_reference: Gender-accurate over gender-neutral
