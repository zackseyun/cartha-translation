translation:
  text: And she struck his neck twice with all her strength, and removed his head,
    and rolled his body off the bed, and took the canopy down from the posts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'cut off his head.' The Greek says literally 'removed
      his head,' but the context makes clear that she beheaded him.
    reason: lexical_alternative
  - marker: b
    text: The Greek term can refer to a mosquito net or a bed-canopy.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπάταξεν
  chosen: struck
  alternatives:
  - smote
  - hit
  lexicon: LSJ
  rationale: Aorist of πατάσσω, denoting a forceful blow. 'Struck' is clear modern
    English and preserves the violent action without archaic tone.
- source_word: εἰς τὸν τράχηλον
  chosen: his neck
  alternatives:
  - on his neck
  - at his neck
  lexicon: LSJ
  rationale: τράχηλος means 'neck.' With εἰς after a verb of striking, English idiom
    is best rendered simply 'his neck' rather than a more wooden prepositional phrase.
- source_word: δὶς
  chosen: twice
  alternatives:
  - two times
  lexicon: LSJ
  rationale: Direct adverbial rendering.
- source_word: ἐν τῇ ἰσχύϊ αὐτῆς
  chosen: with all her strength
  alternatives:
  - in her strength
  - with her strength
  lexicon: LSJ
  rationale: The phrase expresses the manner and intensity of the action. 'With all
    her strength' brings out the idiomatic force naturally in English.
- source_word: ἀφεῖλεν τὴν κεφαλὴν αὐτοῦ
  chosen: removed his head
  alternatives:
  - cut off his head
  - took away his head
  lexicon: LSJ
  rationale: ἀφαιρέω is literally 'take away/remove.' Although the context implies
    decapitation, 'removed his head' stays closer to the Greek wording while still
    communicating the result.
- source_word: ἀπεκύλισεν
  chosen: rolled
  alternatives:
  - cast down
  - pushed
  lexicon: LSJ
  rationale: The verb denotes rolling or causing to roll. 'Rolled' best matches the
    lexical sense.
- source_word: τὸ σῶμα αὐτοῦ ἀπὸ τῆς στρωμνῆς
  chosen: his body off the bed
  alternatives:
  - his body from the couch
  - his corpse off the bedding
  lexicon: LSJ
  rationale: στρωμνή refers to a bed or couch. 'Bed' is the most natural modern rendering
    here. 'Body' is retained rather than 'corpse' because the Greek uses σῶμα without
    an explicit term for corpse.
- source_word: ἀφεῖλε τὸ κωνώπιον ἀπὸ τῶν στύλων
  chosen: took the canopy down from the posts
  alternatives:
  - removed the mosquito net from the posts
  - took the curtain from the bedposts
  lexicon: LSJ
  rationale: κωνώπιον can denote a mosquito net or bed-canopy. In this bedchamber
    context, 'canopy' communicates the furnishing naturally in English without over-specifying
    insect protection, while 'from the posts' reflects ἀπὸ τῶν στύλων.
