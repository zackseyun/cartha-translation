- issue: Narrative explicitness of decapitation
  chosen_reading: removed his head
  alternative_readings:
  - cut off his head
  rationale: The Greek verb ἀφεῖλεν is broader than a specialized verb for beheading,
    though the context clearly describes decapitation. The main text preserves the
    Greek's lexical shape while allowing the narrative context to supply the implication.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English.'
