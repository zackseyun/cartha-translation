id: JDT.13.10
reference: Judith 13:10
source:
  edition: lxx-swete-1909
  text: καὶ ἐπάταξεν εἰς τὸν τράχηλον αὐτοῦ δὶς ἐν τῇ ἰσχύϊ αὐτῆς, καὶ ἀφεῖλεν τὴν
    κεφαλὴν αὐτοῦ, καὶ ἀπεκύλισεν τὸ σῶμα αὐτοῦ ἀπὸ τῆς στρωμνῆς, καὶ ἀφεῖλε τὸ κωνώπιον
    ἀπὸ τῶν στύλων.
