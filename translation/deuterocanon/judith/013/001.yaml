id: JDT.13.1
reference: Judith 13:1
source:
  edition: lxx-swete-1909
  text: Ὡς δὲ ὀψία ἐγένετο, ἐσπούδασαν οἱ δοῦλοι αὐτοῦ ἀναλύειν· καὶ Βαγώας συνέκλεισεν
    τὴν σκηνὴν ἔξωθεν, καὶ ἀπέκλεισεν τοὺς παρεστῶτας ἐκ προσώπου τοῦ κυρίου αὐτοῦ,
    καὶ ἀπῴχοντο εἰς τὰς κοίτας αὐτῶν.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 822
  - 823
  - 824
  - 825
  - 826
  - 827
  confidence: high
  validation: minor_mismatch
translation:
  text: When evening came, his servants hurried to depart; and Bagoas shut the tent
    from outside and excluded those in attendance from the presence of his lord, and
    they went away to their beds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his servants.' The Greek has 'his slaves' (δοῦλοι), referring to members
      of his household retinue under his authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀψία
  chosen: evening
  alternatives:
  - late
  - nightfall
  lexicon: LSJ
  rationale: In the phrase ὀψία ἐγένετο, the natural temporal sense is 'evening came.'
    'Nightfall' is possible but slightly stronger than the Greek requires.
- source_word: ἐσπούδασαν
  chosen: hurried
  alternatives:
  - made haste
  - were eager
  lexicon: BDAG
  rationale: The verb conveys haste or urgency. 'Hurried' gives clear modern English
    without archaic tone.
- source_word: οἱ δοῦλοι αὐτοῦ
  chosen: his slaves
  alternatives:
  - his servants
  lexicon: BDAG
  rationale: Per project guidance, δοῦλος is rendered 'slave' where bonded status
    is salient. In a household retinue under a military lord, 'slaves' better preserves
    the social reality than the softer 'servants'.
- source_word: ἀναλύειν
  chosen: to withdraw
  alternatives:
  - to depart
  - to retire
  lexicon: LSJ
  rationale: Here the sense is to break up or withdraw from attendance for the night.
    'Withdraw' fits the immediate context of attendants leaving their master's presence.
- source_word: συνέκλεισεν τὴν σκηνὴν ἔξωθεν
  chosen: shut the tent from outside
  alternatives:
  - closed the tent from outside
  - fastened the tent from outside
  lexicon: LSJ
  rationale: The phrase indicates securing the tent externally. 'Shut' is idiomatic
    and leaves room for the following stronger verb to express barring access.
- source_word: ἀπέκλεισεν
  chosen: barred
  alternatives:
  - shut out
  - excluded
  lexicon: LSJ
  rationale: The compound verb intensifies the act of preventing access. 'Barred'
    captures active exclusion more vividly than the more abstract 'excluded'.
- source_word: τοὺς παρεστῶτας
  chosen: those attending
  alternatives:
  - the attendants
  - those standing by
  lexicon: BDAG
  rationale: The participle refers to those in attendance on the master. 'Those attending'
    is natural English and preserves the verbal nuance.
- source_word: ἐκ προσώπου τοῦ κυρίου αὐτοῦ
  chosen: from the presence of his lord
  alternatives:
  - from before his master
  - away from his lord
  lexicon: BDAG
  rationale: The idiom ἐκ προσώπου means removal from someone's presence. κύριος here
    refers to Holofernes as social superior, not a divine title; 'lord' fits the courtly
    setting.
- source_word: ἀπῴχοντο εἰς τὰς κοίτας αὐτῶν
  chosen: they went away to their beds
  alternatives:
  - they departed to their sleeping places
  - they went off to bed
  lexicon: LSJ
  rationale: κοίτη here denotes bed or sleeping place. 'Went away to their beds' preserves
    the plural and the narrative movement without sounding colloquial.
- source_word: Βαγώας
  chosen: Bagoas
  rationale: Personal names are transliterated rather than translated, following project
    policy.
