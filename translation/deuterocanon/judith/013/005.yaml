id: JDT.13.5
reference: Judith 13:5
source:
  edition: lxx-swete-1909
  text: καὶ ἀπῆλθοσαν πάντες ἐκ προσώπου, καὶ οὐδεὶς κατελείφθη ἐν τῷ κοιτῶνι ἀπὸ
    μικροῦ ἕως μεγάλου.
  language: Greek
  pages:
