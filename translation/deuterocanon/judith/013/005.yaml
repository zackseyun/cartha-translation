translation:
  text: And they all went away from his presence, and no one was left in the bedroom,
    from the least to the greatest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his presence.' The Greek expression is literally 'from before him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθοσαν
  chosen: went away
  alternatives:
  - departed
  - went out
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι, indicating departure. 'Went away' is natural English
    and preserves the motion away from the scene without overformal wording.
- source_word: ἐκ προσώπου
  chosen: from before him
  alternatives:
  - from his presence
  - away from before him
  lexicon: LSJ
  rationale: A literal idiom meaning departure from someone's presence. 'From before
    him' preserves the Semitic/Greek idiom more closely than the smoother 'from his
    presence,' while remaining understandable.
- source_word: οὐδεὶς κατελείφθη
  chosen: no one was left
  alternatives:
  - no one remained
  - not one was left behind
  lexicon: BDAG
  rationale: Passive sense of καταλείπω. 'No one was left' is clear and idiomatic,
    accurately conveying that the room was emptied of attendants.
- source_word: ἐν τῷ κοιτῶνι
  chosen: in the bedroom
  alternatives:
  - in the bedchamber
  - in the sleeping room
  lexicon: LSJ
  rationale: κοιτών refers to a sleeping chamber/private bedroom. 'Bedroom' is modern
    and accessible; 'bedchamber' is possible but more archaic.
- source_word: ἀπὸ μικροῦ ἕως μεγάλου
  chosen: from the least to the greatest
  alternatives:
  - from small to great
  - from youngest to oldest
  lexicon: LSJ
  rationale: An idiomatic merism meaning everyone without exception across rank or
    status. 'From the least to the greatest' preserves the idiom's breadth better
    than age-specific renderings like 'youngest to oldest.'
