translation:
  text: And approaching the bedpost that was at Holofernes’s head, she took down his
    sword from it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἀκινάκης refers more specifically to a short sword or dagger of eastern
      type; 'sword' is used here for clear modern English.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθοῦσα
  chosen: after approaching
  alternatives:
  - approaching
  - coming up to
  - drawing near to
  lexicon: LSJ
  rationale: Aorist participle indicating prior action relative to the main verb.
    'After approaching' makes the sequence clear in natural English without over-paraphrasing.
- source_word: κανόνι
  chosen: bedpost
  alternatives:
  - bed frame
  - rail
  - canopy support
  lexicon: LSJ
  rationale: In context with κλίνης ('bed') and the following relative clause, κανών
    refers to a structural part of the bed. 'Bedpost' is a clear, concrete rendering
    that fits something located at the head of the bed and from which a weapon could
    be taken.
- source_word: κλίνης
  chosen: bed
  alternatives:
  - couch
  lexicon: LSJ
  rationale: Standard rendering for κλίνη in this narrative context; 'bed' is the
    most natural modern English equivalent.
- source_word: πρὸς κεφαλῆς
  chosen: at ... head
  alternatives:
  - by the head of
  - near the head of
  lexicon: LSJ
  rationale: The phrase locates the bedpost in relation to Holofernes. 'At Holofernes’s
    head' is idiomatic English and preserves the spatial sense.
- source_word: καθεῖλε
  chosen: took down
  alternatives:
  - took away
  - removed
  - pulled down
  lexicon: LSJ
  rationale: The verb suggests taking something down from where it was hanging or
    positioned. 'Took down' best matches the likely physical action with the sword
    attached to or resting on the bed structure.
- source_word: ἀκινάκην
  chosen: sword
  alternatives:
  - dagger
  - short sword
  - akinakes
  lexicon: LSJ
  rationale: ἀκινάκης denotes a short sword or dagger of eastern type. 'Sword' is
    preferred in the main text for readability and because English readers do not
    generally know 'akinakes'; the more specific alternative is worth preserving in
    a footnote.
