translation:
  text: And they all ran together, from the least to the greatest among them, because
    it seemed astonishing to them that she had come; and they opened the gate and
    welcomed them. After lighting a fire for light, they gathered around them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The pronoun 'them' refers to Judith and her female companion.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέδραμον
  chosen: ran together
  alternatives:
  - came together
  - rushed together
  lexicon: LSJ
  rationale: The compound verb conveys converging movement in haste. 'Ran together'
    preserves both the motion and the collective sense better than the flatter 'came
    together.'
- source_word: ἀπὸ μικροῦ ἕως μεγάλου
  chosen: from the least to the greatest
  alternatives:
  - from small to great
  - from young to old
  lexicon: LSJ
  rationale: This idiom denotes the whole community across social or age range. 'From
    the least to the greatest' is a natural English equivalent that preserves the
    merism without over-specifying age.
- source_word: παράδοξον
  chosen: astonishing
  alternatives:
  - strange
  - unexpected
  - extraordinary
  lexicon: LSJ
  rationale: The term indicates something surprising or contrary to expectation. 'Astonishing'
    captures the sense of remarkable surprise in context better than the more neutral
    'unexpected' or the potentially negative 'strange.'
- source_word: τοῦ ἐλθεῖν αὐτήν
  chosen: that she had come
  alternatives:
  - at her coming
  - for her to come
  lexicon: LSJ
  rationale: The articular infinitive here expresses the content/cause of their astonishment.
    In idiomatic English, 'that she had come' best conveys the sense.
- source_word: ἀπεδέξαντο
  chosen: welcomed
  alternatives:
  - received
  - accepted
  lexicon: LSJ
  rationale: The verb means to receive favorably. 'Welcomed' fits the narrative context
    of opening the gate and receiving Judith and her attendant.
- source_word: ἅψαντες πῦρ
  chosen: after lighting a fire
  alternatives:
  - having kindled a fire
  - lighting fire
  lexicon: LSJ
  rationale: The participle is antecedent to the main action. 'After lighting a fire'
    gives clear English sequence while remaining close to the Greek.
- source_word: εἰς φάσιν
  chosen: for light
  alternatives:
  - for illumination
  - as a beacon
  lexicon: LSJ
  rationale: 'The phrase indicates purpose: the fire was lit to provide light. ''For
    light'' is concise and natural. ''As a beacon'' would over-interpret the scene.'
- source_word: περιεκύκλωσαν
  chosen: gathered around
  alternatives:
  - surrounded
  - encircled
  lexicon: LSJ
  rationale: Literally 'encircled,' but in this welcoming communal setting 'gathered
    around' avoids an unnecessarily hostile nuance while preserving the spatial sense.
- source_word: αὐτάς
  chosen: them
  alternatives:
  - the two women
  lexicon: LSJ
  rationale: The feminine plural pronoun refers to Judith and her maid/attendant.
    English normally uses 'them'; specifying 'the two women' would be interpretive
    expansion beyond the Greek.
