translation:
  text: And when the men of her city heard her voice, they hurried down to the gate
    of their city and called together the elders of the city.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγένετο ὡς
  chosen: And when
  alternatives:
  - And it happened when
  - Now when
  lexicon: BDAG
  rationale: This idiom introduces the next event in narrative sequence. 'And when'
    preserves the temporal force while avoiding overly wooden English like 'it happened
    when.'
- source_word: οἱ ἄνδρες τῆς πόλεως αὐτῆς
  chosen: the men of her city
  alternatives:
  - the men of that city
  - the men of her town
  lexicon: BDAG
  rationale: ἄνδρες is specifically 'men,' not a gender-neutral collective. αὐτῆς
    refers back to Judith, so 'her city' is the most direct rendering.
- source_word: τὴν φωνὴν αὐτῆς
  chosen: her voice
  alternatives:
  - the sound of her voice
  - her call
  lexicon: BDAG
  rationale: φωνή commonly means 'voice' or 'sound.' Here the straightforward sense
    is that they heard Judith speaking/calling, so 'her voice' is preferred.
- source_word: ἐσπούδασαν
  chosen: they hurried
  alternatives:
  - they hastened
  - they were eager
  lexicon: BDAG
  rationale: The verb conveys prompt, urgent action. 'They hurried' is natural modern
    English and preserves the sense of haste.
- source_word: τοῦ καταβῆναι
  chosen: down
  alternatives:
  - to go down
  - to come down
  lexicon: BDAG
  rationale: The infinitive with τοῦ expresses the action they hastened to do. In
    English, 'hurried down to the gate' captures both the motion and the urgency without
    awkwardness.
- source_word: ἐπὶ τὴν πύλην τῆς πόλεως αὐτῶν
  chosen: to the gate of their city
  alternatives:
  - to the city gate
  - to the gate of the city
  lexicon: BDAG
  rationale: πύλη is 'gate.' The possessive αὐτῶν naturally refers to the men, hence
    'their city.' Retaining 'gate of their city' stays close to the Greek while remaining
    readable.
- source_word: συνεκάλεσαν
  chosen: called together
  alternatives:
  - summoned
  - assembled
  lexicon: BDAG
  rationale: The compound verb means to gather or summon together. 'Called together'
    preserves the communal action and avoids overformal diction.
- source_word: τοὺς πρεσβυτέρους τῆς πόλεως
  chosen: the elders of the city
  alternatives:
  - the city elders
  lexicon: BDAG
  rationale: πρεσβύτεροι here denotes civic leaders/elders. 'The elders of the city'
    is clear and formally close to the source.
