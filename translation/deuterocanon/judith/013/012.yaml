  text: καὶ ἐγένετο ὡς ἤκουσαν οἱ ἄνδρες τῆς πόλεως αὐτῆς τὴν φωνὴν αὐτῆς, ἐσπούδασαν
    τοῦ καταβῆναι ἐπὶ τὴν πύλην τῆς πόλεως αὐτῶν, καὶ συνεκάλεσαν τοὺς πρεσβυτέρους
    τῆς πόλεως.
