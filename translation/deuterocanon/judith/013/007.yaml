translation:
  text: And she went up to the bed, seized the hair of his head, and said, “Strengthen
    me, O God of Israel, on this day.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγγίσασα
  chosen: went up to
  alternatives:
  - approached
  - came near to
  lexicon: LSJ
  rationale: The participle from ἐγγίζω means 'drawing near' or 'approaching.' With
    τῆς κλίνης ('the bed'), 'went up to' gives natural English while preserving the
    movement toward the bed implied by the Greek.
- source_word: κλίνης
  chosen: bed
  alternatives:
  - couch
  - bedstead
  lexicon: LSJ
  rationale: κλίνη commonly denotes a bed or couch. In this narrative setting, 'bed'
    is the clearest and most natural rendering.
- source_word: ἐδράξατο
  chosen: seized
  alternatives:
  - grasped
  - took hold of
  lexicon: LSJ
  rationale: The middle of δράσσομαι conveys taking firm hold. 'Seized' reflects the
    forceful action appropriate to the scene better than the softer 'grasped.'
- source_word: κόμης
  chosen: the hair
  alternatives:
  - locks
  - long hair
  lexicon: LSJ
  rationale: κόμη refers to hair, often the hair of the head. 'The hair' is straightforward
    and avoids adding stylistic color not required by the Greek.
- source_word: κεφαλῆς αὐτοῦ
  chosen: of his head
  alternatives:
  - on his head
  - from his head
  lexicon: LSJ
  rationale: The genitive construction τῆς κόμης τῆς κεφαλῆς αὐτοῦ is most directly
    represented by 'the hair of his head.' This preserves the emphatic, somewhat redundant
    Greek phrasing without becoming awkward.
- source_word: Κραταίωσόν με
  chosen: Strengthen me
  alternatives:
  - Make me strong
  - Give me strength
  lexicon: LSJ
  rationale: The aorist imperative asks God to make or render her strong. 'Strengthen
    me' is concise, prayer-like, and closely matches the verbal force.
- source_word: ὁ θεὸς Ἰσραήλ
  chosen: O God of Israel
  alternatives:
  - God of Israel
  lexicon: LSJ
  rationale: The nominative with direct address is idiomatically rendered as a vocative
    in English. 'O God of Israel' preserves the prayerful solemnity of the appeal.
- source_word: ἐν τῇ ἡμέρᾳ ταύτῃ
  chosen: on this day
  alternatives:
  - this day
  - in this day
  lexicon: LSJ
  rationale: The prepositional phrase is idiomatic for time reference. 'On this day'
    is natural English and preserves the temporal specificity.
