theological_decisions:
- issue: Form of Judith's invocation to God in a moment of violent deliverance
  chosen_reading: Render the prayer directly and solemnly as 'Strengthen me, O God
    of Israel, on this day.'
  alternative_readings:
  - Strengthen me, God of Israel, this day
  - Give me strength, O God of Israel, today
  rationale: The verse presents a brief direct prayer without further theological
    explanation. The translation preserves its urgency and covenantal address without
    expanding or softening the text.
