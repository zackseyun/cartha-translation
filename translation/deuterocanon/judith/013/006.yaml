theological_decisions:
- issue: Rendering of Judith's inward prayer formula
  chosen_reading: said in her heart
  alternative_readings:
  - said to herself
  rationale: The phrase introduces prayer directed to God, not merely private reflection.
    Retaining the heart-language preserves biblical anthropology and the solemn tone
    without adding doctrinal content.
  doctrine_reference: DOCTRINE.md §§1, 6
- issue: Sense of εἰς ὕψωμα Ἰερουσαλήμ
  chosen_reading: for the exaltation of Jerusalem
  alternative_readings:
  - for the deliverance of Jerusalem
  - for the glory of Jerusalem
  rationale: The Greek speaks of elevation/exaltation rather than explicitly 'deliverance.'
    The translation preserves the metaphorical upward sense and avoids importing a
    more interpretive outcome than the text states.
  doctrine_reference: DOCTRINE.md §§1, 3, 5
