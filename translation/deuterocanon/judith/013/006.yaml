translation:
  text: And Judith stood beside his bed and said in her heart, “Lord, God of all power,
    look upon the works of my hands at this hour, for the exaltation of Jerusalem.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “said to herself.” The Greek literally says “said in her heart,” a biblical
      idiom for inward speech or prayer.
    reason: lexical_alternative
  - marker: b
    text: Or “for Jerusalem’s elevation” or “for the lifting up of Jerusalem.” The
      Greek expression speaks of Jerusalem being raised up or exalted.
    reason: alternative_reading
lexical_decisions:
- source_word: στᾶσα
  chosen: stood
  alternatives:
  - having stood
  - standing
  lexicon: LSJ
  rationale: Aorist participle from ἵστημι, introducing Judith's action before speaking.
    Simple past English reads naturally while preserving the sequence.
- source_word: παρὰ τὴν κλίνην αὐτοῦ
  chosen: beside his bed
  alternatives:
  - by his bed
  - at his couch
  lexicon: LSJ
  rationale: παρά with accusative here indicates position alongside; κλίνη can be
    'bed' or 'couch.' 'Bed' is the clearest modern rendering in context.
- source_word: εἶπεν ἐν τῇ καρδίᾳ ἑαυτῆς
  chosen: said in her heart
  alternatives:
  - said to herself
  - said in her mind
  lexicon: LSJ
  rationale: This is a conventional biblical idiom for inward speech/prayer. Retaining
    'in her heart' preserves the source imagery and biblical register without becoming
    archaic.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Direct address to God; DOCTRINE.md specifies κύριος default as 'Lord.'
- source_word: ὁ θεὸς πάσης δυνάμεως
  chosen: God of all power
  alternatives:
  - God of every power
  - God of all might
  lexicon: LSJ
  rationale: πάσης δυνάμεως is a genitive phrase expressing comprehensive power/might.
    'God of all power' is close to the Greek and idiomatic in English.
- source_word: ἐπίβλεψον
  chosen: look upon
  alternatives:
  - look on
  - regard
  - turn your gaze to
  lexicon: LSJ
  rationale: Imperative asking for divine attention or favor. 'Look upon' preserves
    the prayerful tone and the directional force of ἐπί-.
- source_word: ἐν τῇ ὥρᾳ ταύτῃ
  chosen: at this hour
  alternatives:
  - in this hour
  - at this moment
  lexicon: LSJ
  rationale: A temporal expression. 'At this hour' is a natural English equivalent
    that keeps the solemnity of the Greek.
- source_word: ἐπὶ τὰ ἔργα τῶν χειρῶν μου
  chosen: the works of my hands
  alternatives:
  - what my hands are doing
  - the deeds of my hands
  lexicon: LSJ
  rationale: A literal idiom for one's actions or undertaking. The plural 'works'
    reflects ἔργα and preserves the Hebrew/Greek biblical idiom.
- source_word: εἰς ὕψωμα Ἰερουσαλήμ
  chosen: for the exaltation of Jerusalem
  alternatives:
  - for Jerusalem's elevation
  - unto the lifting up of Jerusalem
  lexicon: LSJ
  rationale: ὕψωμα denotes height, elevation, or exaltation. In this prayer context
    it expresses the intended result of Judith's act for Jerusalem's honor and deliverance.
    'For the exaltation of Jerusalem' is both faithful and intelligible.
