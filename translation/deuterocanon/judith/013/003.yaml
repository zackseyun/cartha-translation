translation:
  text: But Judith was left alone in the tent, and Holofernes had fallen face down
    on his bed, for he was drenched with wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had fallen forward on his bed.' The Greek participle can be rendered
      more literally, but the context suggests drunken collapse.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for the wine had been poured around him' or similar; the expression
      is idiomatic for being overcome by wine.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπελείφθη
  chosen: was left
  alternatives:
  - remained
  - was left behind
  lexicon: LSJ
  rationale: Aorist passive of ὑπολείπω here indicates that Judith was the one remaining
    after others departed. 'Was left' preserves the passive sense and the narrative
    implication that others had gone out.
- source_word: μόνη
  chosen: alone
  alternatives:
  - by herself
  lexicon: LSJ
  rationale: μόνη emphasizes Judith's solitary presence in the tent. 'Alone' is concise,
    natural English and preserves the emphasis.
- source_word: σκηνῇ
  chosen: tent
  alternatives:
  - canopy
  - pavilion
  lexicon: LSJ
  rationale: In this military-camp context, σκηνή is best rendered 'tent.' More ornate
    options would overtranslate the setting.
- source_word: προπεπτωκώς
  chosen: had collapsed
  alternatives:
  - had fallen forward
  - was lying prostrate
  - had fallen down
  lexicon: LSJ
  rationale: The perfect participle of προπίπτω depicts Holofernes as having fallen
    down and now lying in that state. 'Had collapsed' communicates both the sudden
    fall and the resulting condition in idiomatic English, fitting the context of
    drunkenness.
- source_word: κλίνην
  chosen: bed
  alternatives:
  - couch
  - couch-bed
  lexicon: LSJ
  rationale: κλίνη can mean bed or couch. 'Bed' is the clearest modern English choice
    here and fits the immediate scene without unnecessary specificity.
- source_word: περικεχυμένος
  chosen: had overwhelmed
  alternatives:
  - had been poured over
  - had overcome
  - had drenched
  lexicon: LSJ
  rationale: The participle from περικχέω is used idiomatically here with wine affecting
    a person. A literal 'poured around him' would be obscure in English; 'had overwhelmed
    him' captures the sense that the wine had overcome him physically.
- source_word: οἶνος
  chosen: the wine
  alternatives:
  - wine
  lexicon: LSJ
  rationale: The article is naturally represented in English as 'the wine' in this
    explanatory clause, referring to the wine he had drunk.
