theological_decisions:
- issue: Rendering of κύριος in an oath formula
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this deuterocanonical narrative
    context it functions as the divine title in a solemn oath.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to make explicit the sexual nature of 'he did not commit sin with
    me'
  chosen_reading: retain the broader wording 'he did not commit sin with me'
  alternative_readings:
  - he did not violate me
  - he did not have sinful relations with me
  rationale: The Greek states the matter more generally, with the following phrase
    'defilement and shame' clarifying the kind of sin in view. The translation preserves
    the source's restraint rather than importing a more explicit formulation.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
