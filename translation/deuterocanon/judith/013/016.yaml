id: JDT.13.16
reference: Judith 13:16
source:
  edition: lxx-swete-1909
  text: καὶ ζῇ Κύριος ὃς διεφύλαξέν με ἐν τῇ ὁδῷ μου ᾗ ἐπορεύθην, ὅτι ἠπάτησεν αὐτὸν
    τὸ πρόσωπόν μου εἰς ἀπώλειαν αὐτοῦ, καὶ οὐκ ἐποίησεν ἁμάρτημα μετʼ ἐμοῦ εἰς μίασμα
    καὶ αἰσχύνην.
