translation:
  text: And as the Lord lives, who guarded me on the way by which I went, my face
    deceived him to his destruction, and he did not commit sin with me for defilement
    and shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'my face deceived him'; the phrase refers to Judith's outward
      appearance misleading Holofernes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζῇ Κύριος
  chosen: as the Lord lives
  alternatives:
  - the Lord lives
  - by the life of the Lord
  lexicon: LSJ
  rationale: Idiomatic oath formula. 'As the Lord lives' preserves the solemn asseveration
    in natural English while keeping κύριος as 'Lord' per doctrine.
- source_word: διεφύλαξέν με
  chosen: guarded me
  alternatives:
  - preserved me
  - kept me safe
  lexicon: LSJ
  rationale: The verb conveys protection/preservation. 'Guarded me' fits the immediate
    context of divine protection during Judith's mission and remains close to the
    Greek.
- source_word: ἐν τῇ ὁδῷ μου ᾗ ἐπορεύθην
  chosen: on the way by which I went
  alternatives:
  - in my journey that I traveled
  - along the path on which I walked
  lexicon: LSJ
  rationale: Retains the concrete travel imagery and the relative clause structure
    without becoming wooden. 'Way' is preferable to a more interpretive 'mission,'
    though the latter is contextually implied.
- source_word: ἠπάτησεν αὐτὸν τὸ πρόσωπόν μου
  chosen: my face deceived him
  alternatives:
  - my appearance deceived him
  - my countenance tricked him
  lexicon: LSJ
  rationale: The Greek subject is literally 'my face.' In context this refers to Judith's
    outward appearance/beauty misleading Holofernes. The literal 'my face' is understandable
    in English and preserves the vividness of the source.
- source_word: εἰς ἀπώλειαν αὐτοῦ
  chosen: to his destruction
  alternatives:
  - for his ruin
  - unto his downfall
  lexicon: LSJ
  rationale: ἀπώλεια here denotes ruin/destruction. 'To his destruction' is direct
    and preserves the resultative force of εἰς.
- source_word: οὐκ ἐποίησεν ἁμάρτημα μετʼ ἐμοῦ
  chosen: he did not commit sin with me
  alternatives:
  - he did not sin with me
  - he did not do a sinful thing with me
  lexicon: LSJ
  rationale: The phrase is somewhat formal in Greek; this rendering keeps the explicit
    noun 'sin' and avoids over-specifying the sexual nature, though that is contextually
    present.
- source_word: εἰς μίασμα καὶ αἰσχύνην
  chosen: resulting in defilement and shame
  alternatives:
  - for pollution and disgrace
  - into uncleanness and shame
  lexicon: LSJ
  rationale: μίασμα carries the sense of defilement/pollution, often with moral or
    cultic overtones. 'Defilement and shame' is readable and preserves both dimensions
    without archaic diction.
