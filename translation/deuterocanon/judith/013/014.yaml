id: JDT.13.14
reference: Judith 13:14
source:
  edition: lxx-swete-1909
  text: ἡ δὲ εἶπεν πρὸς αὐτοὺς φωνῇ μεγάλῃ Αἰνεῖτε τὸν θεόν, αἰνεῖτε· αἰνεῖτε τὸν
    θεὸν ὃς οὐκ ἀπέστησεν τὸ ἔλεος αὐτοῦ ἀπὸ τοῦ οἴκου Ἰσραήλ, ἀλλʼ ἔθραυσε τοὺς ἐχθροὺς
    ἡμῶν διὰ χειρός μου ἐν τῇ νυκτὶ ταύτῃ.
  language: Greek
