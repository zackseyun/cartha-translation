theological_decisions:
- issue: Divine agency and human instrumentality in Judith's victory
  chosen_reading: God is presented as the one who shattered the enemies, acting by
    Judith's hand.
  alternative_readings:
  - Judith shattered the enemies with God's help
  rationale: The syntax makes God the subject of both key actions ('has not withdrawn'
    and 'has shattered'), while 'by my hand' marks Judith as instrument rather than
    primary agent. The translation preserves that theological emphasis.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
