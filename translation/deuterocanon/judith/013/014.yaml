translation:
  text: And she said to them with a loud voice, “Praise God, praise him; praise God,
    who has not withdrawn his mercy from the house of Israel, but has shattered our
    enemies by my hand this night.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: LSJ
  rationale: A straightforward idiomatic rendering of the dative phrase that preserves
    the concrete image of speaking audibly and publicly.
- source_word: Αἰνεῖτε
  chosen: Praise
  alternatives:
  - Give praise to
  - Extol
  lexicon: LSJ
  rationale: The repeated imperative calls for direct exhortation. 'Praise' is the
    most natural and consistent English equivalent without becoming overly formal.
- source_word: τὸν θεόν
  chosen: God
  alternatives:
  - the God
  lexicon: LSJ
  rationale: Although the Greek has the article, English idiom normally omits it before
    'God' when referring to the one God. This preserves natural English while maintaining
    the referent.
- source_word: οὐκ ἀπέστησεν
  chosen: has not withdrawn
  alternatives:
  - has not removed
  - has not turned away
  - has not departed from
  lexicon: LSJ
  rationale: The verb conveys causing something to depart or be removed. With 'his
    mercy' as object and 'from the house of Israel' following, 'has not withdrawn'
    best captures the sense that God has not taken away his covenant mercy.
- source_word: τὸ ἔλεος αὐτοῦ
  chosen: his mercy
  alternatives:
  - his steadfast mercy
  - his compassion
  lexicon: LSJ
  rationale: ἔλεος commonly denotes mercy or compassion. 'Mercy' is concise and preserves
    the covenantal-religious tone without importing a more interpretive gloss like
    'steadfast love.'
- source_word: ἀπὸ τοῦ οἴκου Ἰσραήλ
  chosen: from the house of Israel
  alternatives:
  - from Israel
  - from the household of Israel
  lexicon: LSJ
  rationale: A relatively formal rendering preserves the biblical corporate expression
    'house of Israel' rather than flattening it to simply 'Israel.'
- source_word: ἔθραυσε
  chosen: has shattered
  alternatives:
  - has broken
  - has crushed
  - has struck down
  lexicon: LSJ
  rationale: The verb is forceful and violent. 'Has shattered' conveys decisive destruction
    more vividly than the weaker 'broken' and fits the triumphal context.
- source_word: διὰ χειρός μου
  chosen: by my hand
  alternatives:
  - through my hand
  - by means of me
  lexicon: LSJ
  rationale: This is a standard biblical idiom for agency or instrumentality. 'By
    my hand' preserves the idiom and its theological nuance that God acted through
    Judith as instrument.
- source_word: ἐν τῇ νυκτὶ ταύτῃ
  chosen: in this night
  alternatives:
  - this night
  - during this night
  - tonight
  lexicon: LSJ
  rationale: The Greek is literally 'in this night.' Retaining 'in this night' preserves
    the elevated biblical register and the immediacy of the event, while remaining
    intelligible in English.
