translation:
  text: And when she came near to the bed, she seized the hair of his head and said,
    “Strengthen me, O God of Israel, on this day.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγγίσασα
  chosen: when she came near
  alternatives:
  - having come near
  - approaching
  lexicon: LSJ
  rationale: Aorist participle of ἐγγίζω, indicating prior or attendant action. 'When
    she came near' gives natural English sequence while preserving the movement toward
    the bed.
- source_word: κλίνη
  chosen: bed
  alternatives:
  - couch
  lexicon: LSJ
  rationale: κλίνη commonly denotes a bed or couch. In this narrative setting, 'bed'
    is the clearest and most natural rendering.
- source_word: ἐδράξατο
  chosen: she seized
  alternatives:
  - she grasped
  - she took hold of
  lexicon: LSJ
  rationale: The middle form conveys a forceful taking hold. 'Seized' best reflects
    the decisive, violent action in context.
- source_word: κόμη
  chosen: the hair
  alternatives:
  - locks
  - tresses
  lexicon: LSJ
  rationale: κόμη refers to the hair of the head, often long hair. 'Hair' is straightforward
    modern English; 'locks' or 'tresses' would sound literary beyond the source's
    plain sense.
- source_word: κεφαλή
  chosen: head
  lexicon: LSJ
  rationale: Part of the genitival phrase τῆς κόμης τῆς κεφαλῆς αὐτοῦ. Rendering the
    whole phrase as 'the hair of his head' preserves the emphatic specificity of the
    Greek.
- source_word: Κραταίωσόν
  chosen: Strengthen me
  alternatives:
  - Make me strong
  - Give me strength
  lexicon: LSJ
  rationale: Imperative of κραταιόω, asking for strengthening or empowerment. 'Strengthen
    me' is both direct and prayer-like, matching the solemnity of the appeal.
- source_word: ὁ θεὸς Ἰσραήλ
  chosen: O God of Israel
  alternatives:
  - God of Israel
  lexicon: LSJ
  rationale: Vocative force is conveyed in English by 'O'. This preserves the prayer
    address without adding content.
- source_word: ἐν τῇ ἡμέρᾳ ταύτῃ
  chosen: on this day
  alternatives:
  - this day
  - in this day
  lexicon: LSJ
  rationale: Idiomatic temporal expression. 'On this day' is natural English and preserves
    the immediacy of Judith's prayer.
