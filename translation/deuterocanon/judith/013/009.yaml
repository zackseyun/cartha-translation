  text: καὶ ἐγγίσασα τῆς κλίνης ἐδράξατο τῆς κόμης τῆς κεφαλῆς αὐτοῦ, καὶ εἶπεν Κραταίωσόν
    με, ὁ θεὸς Ἰσραήλ, ἐν τῇ ἡμέρᾳ ταύτῃ.
