  text: καὶ εἶπεν αὐτῇ Ὀζίας Εὐλογητὴ σύ, θυγάτηρ, τῷ θεῷ τῷ ὑψίστῳ παρὰ πάσας τὰς
    γυναῖκας τὰς ἐπὶ τῆς γῆς,
