theological_decisions:
- issue: Force of the blessing formula with dative τῷ θεῷ τῷ ὑψίστῳ
  chosen_reading: Judith is declared blessed by/in relation to God Most High, not
    as one blessing God.
  alternative_readings:
  - Blessed are you to God Most High
  - Blessed are you before God Most High
  rationale: The syntax and context favor a declaration about Judith's blessed status
    rather than an address redirecting blessing to God. This also coheres with the
    following comparative phrase 'above all the women on the earth.'
  doctrine_reference: Translation philosophy §1, §3
