translation:
  text: And Uzziah said to her, “Blessed are you, daughter, by the Most High God above
    all the women on the earth,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blessed are you before God Most High above all the women on the earth.'
      The Greek dative after 'blessed' can be understood in slightly different ways.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐλογητὴ
  chosen: Blessed are you
  alternatives:
  - You are blessed
  - Praised are you
  lexicon: LSJ
  rationale: Predicate adjective used in direct address; 'Blessed are you' is idiomatic
    English and preserves the benedictory force better than a flatter 'You are blessed.'
    'Praised' would shift the sense toward acclaim rather than blessing.
- source_word: θυγάτηρ
  chosen: daughter
  alternatives:
  - O daughter
  - my daughter
  lexicon: LSJ
  rationale: Literal vocative retained. No possessive is present, so 'my daughter'
    would add meaning. The simple 'daughter' preserves the respectful, familial form
    of address.
- source_word: τῷ θεῷ τῷ ὑψίστῳ
  chosen: by God Most High
  alternatives:
  - to God Most High
  - before God Most High
  - with God Most High
  lexicon: LSJ
  rationale: With εὐλογητός-language, the dative can mark the one in whose estimation
    or by whose action the blessing stands. 'By God Most High' is natural English
    and fits the sense that her blessed status is conferred in relation to God. 'To
    God Most High' would suggest Judith is blessing God, which does not fit the syntax
    here.
- source_word: παρὰ πάσας τὰς γυναῖκας
  chosen: above all the women
  alternatives:
  - more than all the women
  - beyond all the women
  - among all the women
  lexicon: LSJ
  rationale: παρά with the accusative in comparative sense indicates superiority/exceeding.
    'Above all the women' is concise, natural, and preserves the comparative force.
- source_word: τὰς ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - upon the earth
  - in the land
  lexicon: LSJ
  rationale: The phrase most naturally means the women dwelling on the earth generally,
    not merely in a local land. 'On the earth' preserves the broad scope and echoes
    biblical diction without becoming archaic.
- source_word: Ὀζίας
  chosen: Uzziah
  alternatives:
  - Ozias
  lexicon: LSJ
  rationale: Standard English transliteration from the Greek name, aligned with common
    biblical naming conventions. 'Ozias' is closer to the Greek form but less familiar
    in English.
