theological_decisions:
- issue: Divine agency in Judith's act
  chosen_reading: who directed you to wound the head of the ruler of our enemies
  alternative_readings:
  - who guided you for the wounding of the head of the ruler of our enemies
  - who made your way straight to strike the head of the ruler of our enemies
  rationale: The Greek explicitly attributes Judith's successful action to God's direction.
    The translation preserves that agency without expanding it into stronger claims
    of causation than the verb itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
