translation:
  text: And she arose toward the morning watch, and sent to Holofernes, saying, “Let
    my lord now give orders to allow your servant to go out for prayer.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your slave.” The Greek has the feminine form of doulos, which can denote
      either a servant or a slave depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέστη
  chosen: arose
  alternatives:
  - got up
  - stood up
  lexicon: BDAG
  rationale: Aorist of ἀνίστημι here marks Judith's getting up at that time. 'Arose'
    is slightly more formal and fits the narrative register better than 'got up.'
- source_word: πρὸς τὴν ἑωθινὴν φυλακήν
  chosen: toward the morning watch
  alternatives:
  - at the morning watch
  - toward dawn watch
  lexicon: LSJ
  rationale: φυλακή can denote a watch of the night; with ἑωθινή it refers to the
    early-morning watch period. 'Toward the morning watch' preserves πρὸς and the
    temporal nuance without over-paraphrasing.
- source_word: ἀπέστειλεν πρὸς Ὁλοφέρνην
  chosen: sent to Holofernes
  alternatives:
  - sent word to Holofernes
  - dispatched a message to Holofernes
  lexicon: BDAG
  rationale: The idiom implies sending a message or messenger to him. English can
    idiomatically say 'sent to Holofernes'; the following participle 'saying' makes
    clear that a message is meant.
- source_word: Ἐπιταξάτω
  chosen: Let ... give orders
  alternatives:
  - Let ... command
  - Let ... order
  lexicon: BDAG
  rationale: The aorist imperative asks that Holofernes issue an instruction. 'Give
    orders' is natural modern English and preserves the authoritative force.
- source_word: ὁ κύριός μου
  chosen: my lord
  alternatives:
  - my master
  lexicon: BDAG
  rationale: In direct address to a superior human figure, κύριος is best rendered
    'lord' here as a social title of deference. 'Master' is possible, but 'my lord'
    better matches courtly speech in context.
- source_word: ἐᾶσαι
  chosen: to allow
  alternatives:
  - to permit
  - to let
  lexicon: BDAG
  rationale: The infinitive expresses what Holofernes is to order. 'Allow' is clear,
    contemporary, and appropriately formal.
- source_word: τὴν δούλην σου
  chosen: your servant
  alternatives:
  - your slave
  lexicon: BDAG
  rationale: Although δοῦλος/δούλη can mean 'slave,' here Judith uses deferential
    self-reference in a court setting. The bonded-status nuance is not the point being
    emphasized, so 'servant' best fits the context while remaining faithful to the
    term.
- source_word: ἐπὶ προσευχὴν
  chosen: for prayer
  alternatives:
  - to pray
  - for a prayer
  lexicon: BDAG
  rationale: The phrase indicates purpose. 'For prayer' stays close to the Greek construction
    and preserves the stated religious purpose of her going out.
- source_word: ἐξελθεῖν
  chosen: to go out
  alternatives:
  - to go outside
  - to depart
  lexicon: BDAG
  rationale: A straightforward infinitive of motion; 'to go out' is the most direct
    rendering.
