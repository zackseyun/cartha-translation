theological_decisions:
- issue: Rendering of κύριος for a human superior rather than a divine title
  chosen_reading: my lord
  alternative_readings:
  - my master
  rationale: The doctrine default renders κύριος as 'Lord' in weighty theological
    contexts, but here the referent is Holofernes and the phrase is a conventional
    deferential address. Lowercase 'lord' communicates social rank without importing
    divine overtones.
  doctrine_reference: 'DOCTRINE.md: ''κύριος Kyrios → Lord'' with context-sensitive
    application to preserve plain sense'
- issue: Rendering of δούλη in Judith's self-description
  chosen_reading: your servant
  alternative_readings:
  - your slave
  rationale: The project's doctrine allows 'servant / slave' context-dependently for
    δοῦλος. In this verse the term functions as a polite self-humbling address before
    a ruler, not as a theological emphasis on bondage; therefore 'servant' is preferred.
  doctrine_reference: 'DOCTRINE.md: ''δοῦλος doulos → servant / slave (context-dependent)'''
