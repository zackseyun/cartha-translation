id: JDT.12.1
reference: Judith 12:1
source:
  edition: lxx-swete-1909
  text: Καὶ ἐκέλευσεν εἰσαγαγεῖν αὐτὴν οὗ ἔτιθετο τὰ ἀργυρώματα αὐτοῦ, καὶ συνέταξεν
    καταστρῶσαι αὐτῇ ἀπὸ τῶν ὀψοποιημάτων αὐτοῦ καὶ τοῦ οἴνου αὐτοῦ πινεῖν.
  language: Greek
