translation:
  text: And Holofernes’s attendants brought her into the tent, and she slept until
    the middle of the night; then she rose at the morning watch,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until midnight.' The Greek literally says 'until the night was in its
      middle.'
    reason: lexical_alternative
  - marker: b
    text: The 'morning watch' refers to an ancient night-watch division near dawn.
    reason: cultural_note
lexical_decisions:
- source_word: θεράποντες
  chosen: attendants
  alternatives:
  - servants
  - retainers
  lexicon: LSJ
  rationale: θεράπων commonly denotes an attendant or personal servant. 'Attendants'
    fits the court/military setting and avoids implying slavery where the term itself
    does not require it.
- source_word: σκηνήν
  chosen: tent
  alternatives:
  - canopy
  - pavilion
  lexicon: LSJ
  rationale: In the military-camp context of Judith, σκηνή naturally refers to a tent.
    'Pavilion' is possible in elevated English but is less transparent for modern
    readers.
- source_word: ὕπνωσεν
  chosen: slept
  alternatives:
  - fell asleep
  - lay sleeping
  lexicon: LSJ
  rationale: The aorist straightforwardly reports that she slept. 'Slept' is the most
    direct and natural rendering.
- source_word: μέχρι μεσούσης τῆς νυκτός
  chosen: until the middle of the night
  alternatives:
  - until midnight
  - until mid-night
  lexicon: LSJ
  rationale: The participial expression literally means 'while the night was at its
    middle.' 'Until the middle of the night' preserves the sense closely; 'until midnight'
    is possible but slightly more idiomatic than the Greek wording.
- source_word: ἀνέστη
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: LSJ
  rationale: ἀνίστημι here means to get up/rise. 'Rose' is concise and suitably dignified
    in narrative style.
- source_word: πρὸς τὴν ἑωθινὴν φυλακήν
  chosen: at the morning watch
  alternatives:
  - toward the morning watch
  - for the morning watch
  - at dawn watch
  lexicon: LSJ
  rationale: φυλακή can denote a watch of the night. With πρός in this temporal context,
    the phrase points to the time of the morning watch. 'At the morning watch' gives
    clear English while preserving the ancient timekeeping reference.
