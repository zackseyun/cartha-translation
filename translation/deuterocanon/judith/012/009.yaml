id: JDT.12.9
reference: Judith 12:9
source:
  edition: lxx-swete-1909
  text: καὶ εἰσπορευομένη καθαρὰ παρέμενεν τῇ σκηνῇ, μέχρι οὗ προσηνέγκατο τὴν τροφὴν
    αὐτῆς πρὸς ἑσπέραν.
  language: Greek
  pages:
