translation:
  text: And when she went in, she remained in the tent purified until she brought
    in her food toward evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clean' or 'ritually clean.' The Greek adjective can denote purity in
      a general or ritual sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσπορευομένη
  chosen: when she went in
  alternatives:
  - going in
  - entering
  lexicon: BDAG
  rationale: The present middle/passive participle of εἰσπορεύομαι is rendered temporally
    in smooth English. 'When she went in' captures the action without awkwardness,
    while preserving the sense of entering.
- source_word: καθαρά
  chosen: in a state of purity
  alternatives:
  - clean
  - pure
  - ritually clean
  lexicon: LSJ
  rationale: καθαρά can mean clean/pure, and in Judith's context it likely carries
    ritual purity implications connected with her practice. 'In a state of purity'
    preserves that nuance without over-specifying 'ritually' in the main text.
- source_word: παρέμενεν
  chosen: she remained
  alternatives:
  - she stayed
  - she continued
  lexicon: BDAG
  rationale: The imperfect indicates continued action. 'She remained' is a natural
    formal rendering that fits the narrative setting.
- source_word: τῇ σκηνῇ
  chosen: in the tent
  alternatives:
  - in the pavilion
  - in the camp-tent
  lexicon: LSJ
  rationale: σκηνή commonly means tent. In this narrative setting, 'tent' is the most
    direct and transparent rendering.
- source_word: μέχρι οὗ
  chosen: until
  alternatives:
  - up to the time when
  lexicon: BDAG
  rationale: This standard temporal expression is best rendered simply as 'until'
    in idiomatic English.
- source_word: προσηνέγκατο
  chosen: she brought in
  alternatives:
  - she brought
  - she presented
  - she offered
  lexicon: BDAG
  rationale: From προσφέρω, the verb can mean bring/present/offer. Here the object
    is her food, so 'brought in' fits the immediate context of entering the tent and
    avoids sacrificial overtones that 'offered' might suggest.
- source_word: τὴν τροφὴν αὐτῆς
  chosen: her food
  alternatives:
  - her meal
  - her provisions
  lexicon: BDAG
  rationale: τροφή denotes food/nourishment. 'Her food' is straightforward and sufficiently
    broad; 'meal' would narrow the sense, and 'provisions' may sound more logistical
    than the Greek requires.
- source_word: πρὸς ἑσπέραν
  chosen: toward evening
  alternatives:
  - at evening
  - by evening
  lexicon: LSJ
  rationale: πρός with a time expression can indicate approach toward that time. 'Toward
    evening' preserves that nuance better than the more punctiliar 'at evening'.
