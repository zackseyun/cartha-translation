theological_decisions:
- issue: Whether καθαρά should be made explicitly ritual in the main text
  chosen_reading: Render generally as 'in a state of purity' and allow ritual nuance
    to remain implicit
  alternative_readings:
  - ritually clean
  - clean
  rationale: The narrative context suggests purity observance, but the adjective itself
    does not require an explicit technical gloss in English. The chosen rendering
    preserves the likely cultic/ritual resonance without importing more specificity
    than the Greek states.
