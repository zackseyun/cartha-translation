translation:
  text: And on the fourth day, Holofernes gave a banquet for his slaves alone, and
    he did not invite any of those assigned to the duties.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for his servants alone.' The Greek uses doulos, which can mean either
      'slave' or 'servant' depending on context; here 'slaves' was chosen to preserve
      the bonded status implied by the term.
    reason: lexical_alternative
  - marker: b
    text: The final clause likely refers to those occupied with practical service
      or official duties; the Greek expression is somewhat idiomatic.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ἐν τῇ ἡμέρᾳ τῇ τετάρτῃ
  chosen: on the fourth day
  alternatives:
  - it happened on the fourth day
  - when the fourth day came
  lexicon: LSJ
  rationale: The idiom introduces a narrative time marker. 'On the fourth day' is
    natural English and preserves the temporal sense without woodenly reproducing
    'it happened.'
- source_word: ἐποίησεν ... πότον
  chosen: gave a banquet
  alternatives:
  - made a drinking party
  - held a feast
  - gave a drinking bout
  lexicon: LSJ
  rationale: πότος denotes a drinking feast or banquet. 'Gave a banquet' is idiomatic
    modern English and fits the social setting better than the more awkward 'made
    a drinking party,' while still reflecting a hosted feast.
- source_word: τοῖς δούλοις αὐτοῦ
  chosen: for his slaves
  alternatives:
  - for his servants
  lexicon: BDAG
  rationale: Following project guidance on δοῦλος, 'slave' is preferred where bonded
    status is in view. In this court setting the term refers to those under Holofernes'
    authority, and 'slaves' better preserves that social reality than the softer 'servants.'
- source_word: μόνοις
  chosen: alone
  alternatives:
  - only
  - exclusively
  lexicon: LSJ
  rationale: μόνοις restricts the guest list to this group. 'Alone' communicates the
    exclusivity clearly in smooth English.
- source_word: οὐκ ἐκάλεσεν
  chosen: he did not invite
  alternatives:
  - he did not summon
  - he did not call
  lexicon: BDAG
  rationale: In banquet context, 'invite' best captures the social force of calling
    people to attend.
- source_word: εἰς τὴν χρῆσιν
  chosen: to the banquet
  alternatives:
  - to the gathering
  - for service
  - to the occasion
  lexicon: LSJ
  rationale: Although χρῆσις can mean use, service, or function, in this context after
    mention of a πότος it most naturally refers to participation in the occasion/entertainment.
    Rendering it 'to the banquet' makes explicit the event to which no one else was
    invited.
- source_word: οὐδένα τῶν πρὸς ταῖς χρείαις
  chosen: any of those assigned to the duties
  alternatives:
  - any of those in attendance
  - any of those on service
  - any of the attendants
  lexicon: LSJ
  rationale: The phrase refers to persons occupied with practical service or official
    duties. 'Those assigned to the duties' preserves the connection to χρεία while
    avoiding overprecision about their exact office.
