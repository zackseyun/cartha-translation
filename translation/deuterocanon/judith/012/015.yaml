translation:
  text: And after undressing, she adorned herself with her clothing and with all her
    womanly ornaments; and her female slave came and spread out for her, on the ground
    opposite Holofernes, the fleeces that she had received from Bagoas for her daily
    use, so that she might recline on them while eating.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after changing clothes' or, more literally, 'after separating herself.'
      The Greek participle is somewhat unusual, and the context suggests preparation
      by removing previous attire before adorning herself.
    reason: lexical_alternative
  - marker: b
    text: '''Female slave'' translates the feminine form of the Greek word related
      to δοῦλος. ''Maidservant'' is a possible softer rendering.'
    reason: lexical_alternative
  - marker: c
    text: That is, she would recline in the customary posture for eating.
    reason: cultural_note
lexical_decisions:
- source_word: διαστασᾶσα
  chosen: after undressing
  alternatives:
  - after separating herself
  - after changing clothes
  lexicon: LSJ
  rationale: The participle likely refers to removing her widow's garments or previous
    attire before dressing herself anew. In context, 'after undressing' best explains
    the sequence before ἐκοσμήθη ('she adorned herself'). A more literal 'after separating
    herself' is possible etymologically but does not fit the immediate narrative action
    as well.
- source_word: ἐκοσμήθη
  chosen: she adorned herself
  alternatives:
  - she dressed herself
  - she arrayed herself
  lexicon: LSJ
  rationale: The verb conveys adornment/arrangement, not merely putting on clothes.
    'Adorned herself' preserves the deliberate beautifying sense important to the
    scene.
- source_word: ἱματισμός
  chosen: clothing
  alternatives:
  - garment
  - attire
  lexicon: LSJ
  rationale: A collective sense fits the English idiom here better than the singular
    'garment,' while still reflecting the clothing she put on.
- source_word: κόσμος
  chosen: ornaments
  alternatives:
  - adornment
  - jewelry
  lexicon: LSJ
  rationale: κόσμος here refers to adornment/accessories. 'Ornaments' captures the
    broader sense without restricting it only to jewelry.
- source_word: γυναικεῖος
  chosen: womanly
  alternatives:
  - women's
  - feminine
  lexicon: LSJ
  rationale: The adjective qualifies the adornments as those proper to a woman. 'Womanly
    ornaments' is natural English and preserves the gendered description.
- source_word: δούλη
  chosen: female slave
  alternatives:
  - maidservant
  - servant
  lexicon: LSJ
  rationale: Given the project's guidance on δοῦλος-terms, the bonded status should
    be preserved where context allows. The feminine form specifically indicates a
    female slave, not merely a generic attendant.
- source_word: ἔστρωσεν
  chosen: spread out
  alternatives:
  - laid out
  - made ready
  lexicon: LSJ
  rationale: The verb refers to preparing bedding or a surface by laying it out. 'Spread
    out' fits the object and setting on the ground.
- source_word: χαμαί
  chosen: on the ground
  alternatives:
  - on the floor
  - down below
  lexicon: LSJ
  rationale: The adverb indicates placement on the ground. In a tent or banquet setting,
    'on the ground' is the clearest general rendering.
- source_word: κώδια
  chosen: fleeces
  alternatives:
  - skins
  - sheepskins
  lexicon: LSJ
  rationale: The term denotes fleeces or skins used as coverings. 'Fleeces' best matches
    the likely bedding material and avoids over-specifying beyond the Greek.
- source_word: παρὰ Βαγώου
  chosen: from Bagoas
  alternatives:
  - at Bagoas's hand
  - from the hand of Bagoas
  lexicon: LSJ
  rationale: παρά with the genitive here indicates source. 'From Bagoas' is straightforward
    and idiomatic.
- source_word: εἰς τὴν καθημερινὴν δίαιταν αὐτῆς
  chosen: for her daily use
  alternatives:
  - for her daily regimen
  - for her daily manner of living
  lexicon: LSJ
  rationale: δίαιτα can denote mode of life or daily regimen. In this immediate context
    of provisions for her repeated meals/reclining arrangement, 'for her daily use'
    captures the practical sense without awkwardness.
- source_word: κατακλινομένην
  chosen: recline
  alternatives:
  - lie down
  - sit at table
  lexicon: LSJ
  rationale: The participle reflects the ancient dining posture of reclining at a
    meal. 'Recline' preserves the cultural setting better than 'sit.'
