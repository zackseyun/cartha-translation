id: JDT.12.15
reference: Judith 12:15
source:
  edition: lxx-swete-1909
  text: καὶ διαστασᾶσα ἐκοσμήθη τῷ ἱματισμῷ καὶ παντὶ τῷ κόσμῳ τῷ γυναικείῳ· καὶ προσῆλθεν
    ἡ δούλη αὐτῆς καὶ ἔστρωσεν αὐτῇ κατέναντι Ὀλοφέρνου χαμαὶ τὰ κώδια, ἃ ἔλαβεν παρὰ
    Βαγώου εἰς τὴν καθημερινὴν δίαιταν αὐτῆς εἰς τὸ ἐσθίειν κατακλινομένην ἐπʼ αὐτῶν.
  language: Greek
