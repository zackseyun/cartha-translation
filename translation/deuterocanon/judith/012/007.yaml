id: JDT.12.7
reference: Judith 12:7
source:
  edition: lxx-swete-1909
  text: καὶ προσέταξεν Ὁλοφέρνης τοῖς σωματοφύλαξι μὴ διακωλύειν αὐτήν. καὶ παρέμεινεν
    ἐν τῇ παρεμβολῇ ἡμέρας τρεῖς· καὶ ἐξεπορεύετο κατὰ νύκτα εἰς τὴν φάραγγα Βαιτυλοῦα,
    καὶ ἐβαπτίζετο ἐν τῇ παρεμβολῇ ἐπὶ τῆς πηγῆς τοῦ ὕδατος.
  language: Greek
  pages:
