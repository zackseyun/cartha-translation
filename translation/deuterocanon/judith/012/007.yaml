translation:
  text: And Holofernes ordered the bodyguards not to hinder her. So she remained in
    the camp for three days, and went out at night into the valley of Bethulia, and
    washed herself at the spring of water by the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ravine' or 'gorge' for 'valley.'
    reason: lexical_alternative
  - marker: b
    text: The Greek verb here is the same root later used for 'baptize'; in this context
      it refers to washing or bathing, not Christian baptism.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέταξεν
  chosen: ordered
  alternatives:
  - commanded
  - gave orders to
  lexicon: LSJ
  rationale: A straightforward past-tense rendering that preserves the authoritative
    force of the verb without sounding overly formal.
- source_word: σωματοφύλαξι
  chosen: bodyguards
  alternatives:
  - guards
  - personal guards
  lexicon: LSJ
  rationale: The compound literally denotes body-guards or personal guards. 'Bodyguards'
    is the most natural concise English equivalent.
- source_word: μὴ διακωλύειν
  chosen: not to hinder
  alternatives:
  - not to prevent
  - not to obstruct
  lexicon: LSJ
  rationale: This preserves the infinitival construction and the sense of not interfering
    with her movements.
- source_word: παρέμεινεν
  chosen: remained
  alternatives:
  - stayed
  lexicon: LSJ
  rationale: A simple narrative verb; 'remained' fits the formal narrative flow slightly
    better than 'stayed'.
- source_word: παρεμβολῇ
  chosen: camp
  alternatives:
  - encampment
  lexicon: LSJ
  rationale: In this military context the word refers to the army camp. 'Camp' is
    idiomatic modern English.
- source_word: ἡμέρας τρεῖς
  chosen: for three days
  alternatives:
  - three days
  lexicon: LSJ
  rationale: English idiom normally supplies 'for' with a duration expression after
    'remained.'
- source_word: ἐξεπορεύετο
  chosen: went out
  alternatives:
  - would go out
  - departed
  lexicon: LSJ
  rationale: The imperfect can suggest customary action, but in this sequence a simple
    narrative rendering is acceptable. The repeated-night sense is already conveyed
    by 'at night' in context.
- source_word: κατὰ νύκτα
  chosen: at night
  alternatives:
  - by night
  - night after night
  lexicon: LSJ
  rationale: '''At night'' is clear modern English. ''By night'' is possible but more
    archaic. The phrase may imply nocturnal habit, but the main text keeps the wording
    restrained.'
- source_word: φάραγγα
  chosen: valley
  alternatives:
  - ravine
  - gorge
  lexicon: LSJ
  rationale: The term can denote a ravine or gorge, but 'valley' is the broadest natural
    rendering here without overstating topographical precision.
- source_word: Βαιτυλοῦα
  chosen: Bethulia
  alternatives:
  - Baitylua
  rationale: Personal/place names are transliterated by standard convention; 'Bethulia'
    is the established English form for this location.
- source_word: ἐβαπτίζετο
  chosen: washed herself
  alternatives:
  - bathed
  - immersed herself
  - purified herself by washing
  lexicon: LSJ
  rationale: The verb literally refers to washing/immersing, but in this context a
    natural English rendering is 'washed herself.' This avoids importing later technical
    sacramental associations of 'baptized herself' while preserving the physical washing
    sense.
- source_word: ἐπὶ τῆς πηγῆς τοῦ ὕδατος
  chosen: at the spring of water
  alternatives:
  - at the water spring
  - by the spring
  lexicon: LSJ
  rationale: The phrase refers to a water source/spring. 'At the spring of water'
    stays close to the Greek while remaining intelligible; in the final sentence it
    is smoothed with 'by the camp' for readability.
