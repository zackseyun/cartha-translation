theological_decisions:
- issue: Rendering of ἐβαπτίζετο in a non-ritual narrative context
  chosen_reading: washed herself
  alternative_readings:
  - bathed
  - immersed herself
  rationale: The Greek verb can denote dipping or washing, but here the context is
    Judith's nocturnal cleansing at a water source near the camp. Rendering it as
    'washed herself' communicates the action without suggesting Christian baptism
    or over-specifying ritual significance not explicit in the verse.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; readable modern English;
    preserve theological tension rather than import doctrinal claims'
