theological_decisions:
- issue: Sexual intent expressed euphemistically
  chosen_reading: to have relations with her
  alternative_readings:
  - to sleep with her
  - to be with her
  rationale: The Greek uses a euphemistic expression for sexual union. The chosen
    rendering makes the meaning explicit enough for modern readers while preserving
    the source's relative restraint.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
- issue: Anthropological language of ψυχή
  chosen_reading: his soul was shaken
  alternative_readings:
  - he was deeply disturbed
  - his inner being was shaken
  rationale: Retaining 'soul' preserves the source's wording and avoids flattening
    the text's inner-life language into a purely psychological paraphrase.
  doctrine_reference: 'Translation philosophy: preserve source meaning and theological
    tension; do not paraphrase beyond what the source warrants.'
