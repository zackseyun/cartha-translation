id: JDT.12.16
reference: Judith 12:16
source:
  edition: lxx-swete-1909
  text: καὶ εἰσελθοῦσα ἀνέπεσεν Ἰουδείθ, καὶ ἐξέστη ἡ καρδία Ὀλοφέρνου ἐπʼ αὐτῇ, ἐσαλεύθη
    ἡ ψυχὴ αὐτοῦ· καὶ ἦν κατενθύμως σφόδρα τοῦ συγγενέσθαι μετʼ αὐτῆς, καὶ ἐτήρει
    καιρὸν τοῦ ἀπατῆσαι αὐτὴν ἀφʼ ἧς ἡμέρας εἶδεν αὐτήν.
  language: Greek
