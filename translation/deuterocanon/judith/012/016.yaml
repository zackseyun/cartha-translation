translation:
  text: And when she entered, Judith reclined, and the heart of Holofernes was beside
    itself over her; his soul was shaken. He was very eager to have relations with
    her, and he was watching for an opportunity to deceive her from the day he saw
    her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to seduce her' or 'to trick her.' The Greek says 'to deceive her,' which
      may include sexual manipulation in context.
    reason: lexical_alternative
  - marker: b
    text: '''Reclined'' reflects the banquet custom of dining while lying back at
      table.'
    reason: cultural_note
lexical_decisions:
- source_word: εἰσελθοῦσα
  chosen: when she entered
  alternatives:
  - having entered
  - after she entered
  lexicon: LSJ
  rationale: Aorist participle introducing the action naturally in English as a temporal
    clause. 'When she entered' is readable and preserves sequence without over-literal
    awkwardness.
- source_word: ἀνέπεσεν
  chosen: reclined
  alternatives:
  - lay down
  - took her place at table
  lexicon: LSJ
  rationale: In banquet context the verb refers to reclining at table rather than
    simply lying down. 'Reclined' preserves the cultural setting more accurately than
    a generic verb.
- source_word: ἐξέστη ἡ καρδία
  chosen: the heart ... was beside itself
  alternatives:
  - the heart ... was carried away
  - the heart ... was overwhelmed
  lexicon: LSJ
  rationale: The idiom conveys being overwhelmed or driven out of normal composure.
    'Was beside itself' preserves the vividness of the Greek while remaining idiomatic
    English.
- source_word: ἐπʼ αὐτῇ
  chosen: over her
  alternatives:
  - because of her
  - toward her
  lexicon: LSJ
  rationale: Here the preposition marks the object/cause of Holofernes's emotional
    agitation. 'Over her' fits the English idiom paired with 'was beside itself,'
    while still indicating that Judith is the cause.
- source_word: ἐσαλεύθη ἡ ψυχὴ αὐτοῦ
  chosen: his soul was shaken
  alternatives:
  - his inner being was stirred
  - he was deeply disturbed
  lexicon: LSJ
  rationale: A relatively formal rendering preserves the anthropological language
    of ψυχή and the force of σαλεύω. 'Soul' is retained rather than flattened to mere
    emotion.
- source_word: κατενθύμως σφόδρα
  chosen: very eager
  alternatives:
  - greatly intent
  - exceedingly desirous
  lexicon: LSJ
  rationale: The phrase indicates strong inward desire or intent. 'Very eager' communicates
    the force in natural modern English without archaic diction.
- source_word: τοῦ συγγενέσθαι μετʼ αὐτῆς
  chosen: to have relations with her
  alternatives:
  - to be with her
  - to sleep with her
  lexicon: LSJ
  rationale: The infinitive here is a sexual euphemism. 'Have relations with her'
    makes the sense clear without becoming crass; 'be with her' would be too vague.
- source_word: ἐτήρει καιρόν
  chosen: he was watching for an opportunity
  alternatives:
  - he was waiting for a time
  - he kept looking for a chance
  lexicon: LSJ
  rationale: The imperfect plus object expresses ongoing watchfulness for a suitable
    moment. 'Watching for an opportunity' captures both duration and intent.
- source_word: τοῦ ἀπατῆσαι αὐτήν
  chosen: to deceive her
  alternatives:
  - to seduce her
  - to trick her
  lexicon: LSJ
  rationale: The Greek verb fundamentally means 'deceive' or 'trick.' In context the
    deception is aimed at sexual exploitation, but the text itself uses the broader
    verb, so 'deceive' best preserves the wording without importing more specificity
    than stated.
- source_word: ἀφʼ ἧς ἡμέρας εἶδεν αὐτήν
  chosen: from the day he saw her
  alternatives:
  - since the day he saw her
  - from the time he first saw her
  lexicon: LSJ
  rationale: A straightforward temporal expression. 'From the day he saw her' is close
    to the Greek and idiomatic in English.
