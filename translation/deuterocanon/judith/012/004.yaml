theological_decisions:
- issue: Implicit subject of ποιήσῃ / ἐβουλεύσατο
  chosen_reading: The subject is rendered as 'he,' left implicit in English contextually,
    referring most naturally to God.
  alternative_readings:
  - 'An impersonal rendering: ''until what was planned is accomplished by my hand'''
  - A less specific antecedent inferred from context
  rationale: The Greek leaves the subject unstated in this clause, but the broader
    Judith context points to God as the one who has purposed and will accomplish deliverance
    through Judith. The translation preserves the masculine singular without over-specifying
    'God' in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity
    remains.
