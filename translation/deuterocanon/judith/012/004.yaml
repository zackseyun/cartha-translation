translation:
  text: And Judith said to him, “As your life lives, my lord, your servant will not
    use up what is with me until he has accomplished by my hand what he has planned.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'As surely as you live, my lord.' The Greek literally
      says, 'Your life lives.'
    reason: lexical_alternative
  - marker: b
    text: '''The things with me'' likely refers to Judith''s own provisions or food
      supplies.'
    reason: lexical_alternative
  - marker: c
    text: The subject of 'has accomplished' / 'has planned' is implicit in Greek;
      in context it is most naturally understood as God acting through Judith.
    reason: alternative_reading
lexical_decisions:
- source_word: Ζῇ ἡ ψυχή σου
  chosen: As your life lives
  alternatives:
  - As surely as you live
  - By your life
  lexicon: LSJ
  rationale: The Greek is an oath formula, literally 'your soul/life lives.' A more
    idiomatic English rendering would be 'As surely as you live,' but the chosen wording
    preserves the source's emphatic life-oath structure while remaining intelligible.
- source_word: κύριέ μου
  chosen: my lord
  alternatives:
  - my master
  lexicon: LSJ
  rationale: Here κύριος is a polite address to Holofernes, not a divine title. 'My
    lord' preserves the social register better than 'my master' in this courtly setting.
- source_word: ἡ δούλη σου
  chosen: your slave
  alternatives:
  - your servant
  lexicon: LSJ
  rationale: Following project guidance on δοῦλος-terms, 'slave' is preferred where
    the bonded status is explicit. In this deferential self-reference, Judith speaks
    of herself as belonging to the addressee in status terms, so 'your slave' best
    preserves the force, though 'servant' is a possible softer alternative.
- source_word: οὐ δαπανήσει
  chosen: will not use up
  alternatives:
  - will not spend
  - will not consume
  lexicon: LSJ
  rationale: The verb means to spend or expend. In context of provisions 'with me,'
    'use up' communicates consumption of supplies more naturally than the more financial-sounding
    'spend.'
- source_word: τὰ ὄντα μετʼ ἐμοῦ
  chosen: the things with me
  alternatives:
  - the provisions with me
  - what I have with me
  lexicon: LSJ
  rationale: Literally 'the things being with me,' referring to Judith's possessions/provisions.
    The chosen rendering stays close to the Greek; the alternatives make the implied
    sense more explicit. Because the context is her food supply, the phrase likely
    refers to provisions.
- source_word: ἕως ἄν ποιήσῃ
  chosen: until he has accomplished
  alternatives:
  - until he does
  - until he carries out
  lexicon: LSJ
  rationale: The subject is most naturally implicit from the previous relative clause's
    referent, namely God, who will carry out what he planned. 'Accomplished' captures
    completion better than the bare 'does.'
- source_word: ἐν χειρί μου
  chosen: by my hand
  alternatives:
  - through me
  - by means of me
  lexicon: LSJ
  rationale: This idiom literally means 'in/by my hand' and denotes agency or instrumentality.
    'By my hand' preserves the biblical idiom and the sense that the planned act will
    be effected through Judith.
- source_word: ἃ ἐβουλεύσατο
  chosen: what he has planned
  alternatives:
  - what he has purposed
  - what he has resolved
  lexicon: LSJ
  rationale: The verb denotes planning, resolving, or purposing. 'Planned' is clear
    modern English and fits the narrative context of a deliberate divine intention.
