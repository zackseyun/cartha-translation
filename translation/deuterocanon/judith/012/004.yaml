  text: καὶ εἶπεν Ἰουδεὶθ πρὸς αὐτόν Ζῇ ἡ ψυχή σου, κύριέ μου, ὅτι οὐ δαπανήσει ἡ
    δούλη σου τὰ ὄντα μετʼ ἐμοῦ ἕως ἄν ποιήσῃ ἐν χειρί μου ἃ ἐβουλεύσατο.
  language: Greek
