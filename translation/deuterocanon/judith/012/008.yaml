  text: καὶ ὡς ἀνέβη, ἐδέετο τοῦ κυρίου θεοῦ Ἰσραὴλ κατευθῦναι τὴν ὁδὸν αὐτῆς εἰς
    ἀνάστημα τῶν υἱῶν τοῦ λαοῦ αὐτοῦ.
