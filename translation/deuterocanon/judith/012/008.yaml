theological_decisions:
- issue: Rendering of κύριος in a Jewish prayer formula
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The project's contested-terms guidance sets κύριος to 'Lord' by default.
    In this deuterocanonical Greek context, 'Lord God of Israel' is the most natural
    and theologically transparent rendering.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Gendered language in υἱῶν
  chosen_reading: sons
  alternative_readings:
  - children
  - people
  rationale: The Greek is grammatically and lexically masculine plural. Per the project's
    gender-accurate policy, the masculine form is preserved unless context clearly
    demands a generic neutral rendering. Here retaining 'sons' best matches the source
    wording.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4'
