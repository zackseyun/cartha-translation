translation:
  text: And when she went up, she was praying to the Lord God of Israel to direct
    her way for the exaltation of the sons of his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the exaltation' or 'for the restoration' of the sons of his people.
      The Greek noun is rare and can suggest a raising up in status or condition,
      not merely physical movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβη
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: LSJ
  rationale: The aorist of ἀναβαίνω commonly means 'go up' or 'ascend.' In narrative
    context, 'went up' is natural English and preserves the spatial movement without
    over-formalizing.
- source_word: ἐδέετο
  chosen: was praying
  alternatives:
  - was beseeching
  - was imploring
  lexicon: BDAG
  rationale: δέομαι can mean 'beg, implore, pray.' Because the object is 'the Lord
    God of Israel,' the sense is explicitly prayer. The imperfect is represented with
    the progressive 'was praying' to preserve ongoing action.
- source_word: κυρίου θεοῦ Ἰσραήλ
  chosen: the Lord God of Israel
  alternatives:
  - the Lord, the God of Israel
  lexicon: LSJ
  rationale: This is a standard reverential title. 'Lord' follows the project's default
    for κύριος, and the phrase is kept close to the Greek without unnecessary expansion.
- source_word: κατευθῦναι
  chosen: to direct
  alternatives:
  - to make straight
  - to guide
  lexicon: BDAG
  rationale: The infinitive means 'to make straight, direct, guide.' 'Direct' best
    preserves both the metaphor of setting a path straight and the prayerful request
    for divine guidance.
- source_word: τὴν ὁδὸν αὐτῆς
  chosen: her way
  alternatives:
  - her path
  lexicon: BDAG
  rationale: ὁδός can be literal 'road/way' or figurative 'course.' Here the phrase
    likely carries both literal and mission-oriented force; 'her way' preserves that
    breadth.
- source_word: εἰς ἀνάστημα
  chosen: for the raising up
  alternatives:
  - for the exaltation
  - for the deliverance
  - unto the restoration
  lexicon: LSJ
  rationale: ἀνάστημα is uncommon and can denote a raising up or elevation. In this
    context of Judith's mission on behalf of Israel, 'raising up' preserves the literal
    sense while allowing the broader idea of vindication or restoration without over-interpreting.
- source_word: τῶν υἱῶν τοῦ λαοῦ αὐτοῦ
  chosen: of the sons of his people
  alternatives:
  - of his people's sons
  - of his people
  lexicon: BDAG
  rationale: The Greek explicitly includes 'sons' (υἱῶν). Following the project's
    gender-accurate policy, this is retained rather than neutralized to 'people,'
    while the genitival relation is rendered in natural English.
