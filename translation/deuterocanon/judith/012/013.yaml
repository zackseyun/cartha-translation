translation:
  text: And Bagoas went out from the presence of Holofernes and went in to her and
    said, “Let this beautiful girl not hesitate to come to my lord, to be honored
    before him, and to drink wine with us in gladness, and to become on this day like
    one daughter of the sons of Assyria who stand in the house of Nebuchadnezzar.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'maidservant' for 'girl' (ἡ παιδίσκη); the Greek term can denote a female
      servant or slave girl, but here it functions as flattering address.
    reason: lexical_alternative
  - marker: b
    text: Or 'who attend in the house of Nebuchadnezzar' for 'who stand in the house
      of Nebuchadnezzar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν ... ἀπὸ προσώπου
  chosen: went out from the presence of
  alternatives:
  - went out from before
  - departed from before
  lexicon: LSJ
  rationale: The phrase is a standard idiom for leaving someone's presence. 'From
    the presence of' preserves the courtly nuance better than a bare 'left.'
- source_word: εἰσῆλθεν πρὸς αὐτήν
  chosen: went in to her
  alternatives:
  - came to her
  - entered to her
  lexicon: LSJ
  rationale: The motion verb is literal here. 'Went in to her' keeps the narrative
    sequence and avoids overinterpreting the phrase sexually in this context.
- source_word: Μὴ ὀκνήσῃς
  chosen: Let ... not hesitate
  alternatives:
  - Do not shrink back
  - Do not delay
  lexicon: BDAG
  rationale: ὀκνέω commonly conveys hesitation or reluctance. 'Not hesitate' is natural
    modern English and fits the invitation context.
- source_word: ἡ παιδίσκη
  chosen: girl
  alternatives:
  - maidservant
  - young woman
  - maid
  lexicon: LSJ
  rationale: Although παιδίσκη can mean female servant or slave girl, here Bagoas
    is addressing Judith with flattering language. 'Girl' best captures the diminutive
    and social tone without importing a status emphasis the immediate context does
    not foreground.
- source_word: ἡ καλὴ
  chosen: beautiful
  alternatives:
  - fair
  - lovely
  lexicon: LSJ
  rationale: In context καλός refers to physical attractiveness in flattering speech.
    'Beautiful' is idiomatic and clear.
- source_word: δόξασθῆναι κατὰ πρόσωπον αὐτοῦ
  chosen: to be honored before him
  alternatives:
  - to be glorified before his face
  - to receive honor in his presence
  lexicon: LSJ
  rationale: The passive infinitive of δοξάζω here concerns receiving honor in Holofernes's
    presence, not theological glorification. 'Before him' renders κατὰ πρόσωπον αὐτοῦ
    idiomatically.
- source_word: πίεσαι ... εἰς εὐφροσύνην οἴνου
  chosen: to drink wine with us in gladness
  alternatives:
  - to drink with us in wine-cheer
  - to drink wine joyfully with us
  lexicon: LSJ
  rationale: The genitive οἴνου is best taken with εὐφροσύνην, expressing festive
    gladness associated with wine. Explicitly supplying 'wine' in English avoids ambiguity
    and reflects the Greek wording.
- source_word: γενηθήναι ... ὡς θυγάτηρ μία
  chosen: to become ... like one daughter
  alternatives:
  - to be as one daughter
  - to become like a daughter
  lexicon: LSJ
  rationale: 'The infinitive γενηθήναι is ingressive: entering a status or role. ''Become
    ... like one daughter'' preserves that nuance.'
- source_word: τῶν υἱῶν Ἀσσούρ
  chosen: of the sons of Assyria
  alternatives:
  - of the Assyrians
  - of Asshur
  lexicon: LSJ
  rationale: A formally closer rendering preserves the ethnic expression as given
    in Greek. Although idiomatic English could say 'the Assyrians,' the phrase 'sons
    of Assyria' retains the source texture.
- source_word: αἱ παρεστηκυῖαι ἐν οἴκῳ Ναβουχοδονόσορ
  chosen: who stand in the house of Nebuchadnezzar
  alternatives:
  - who attend in the house of Nebuchadnezzar
  - who serve in Nebuchadnezzar's house
  lexicon: LSJ
  rationale: The perfect participle of παρίστημι literally denotes standing by or
    attending. 'Who stand in the house' is somewhat formal but preserves the court-attendant
    sense without overdefining their role.
