theological_decisions:
- issue: Rendering of κύριος in a human courtly context
  chosen_reading: my lord
  alternative_readings:
  - my master
  rationale: The speaker refers to Holofernes, not to God. Per doctrine, κύριος is
    normally 'Lord,' but in direct human address and possessive court language, 'my
    lord' is the natural English equivalent and preserves the social hierarchy without
    theological confusion.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord; context-dependent
    human title usage documented per verse'
