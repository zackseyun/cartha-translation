translation:
  text: And he said to Bagoas the eunuch, who was in charge of all that belonged to
    him, “Go now and persuade the Hebrew woman who is with you to come to us and eat
    and drink with us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'convince' or 'urge' for 'persuade' (Πεισὸν); the command is to induce
      her to come.
    reason: lexical_alternative
  - marker: b
    text: '''Eunuch'' can in some contexts mean a high court official, but the Greek
      word here is rendered literally.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Βαγώᾳ
  chosen: Bagoas
  rationale: Personal name is transliterated rather than translated, following project
    policy to transliterate names.
- source_word: εὐνούχῳ
  chosen: eunuch
  alternatives:
  - court official
  lexicon: BDAG
  rationale: The Greek term literally denotes a eunuch, though in some contexts it
    can function more broadly for a court official. Here the literal rendering is
    retained because the text explicitly uses the term and nothing in the verse requires
    weakening it to a title.
- source_word: ἐφεστηκὼς ἐπὶ πάντων τῶν αὐτοῦ
  chosen: who was in charge of all that belonged to him
  alternatives:
  - who was set over all his affairs
  - who supervised all his possessions
  lexicon: BDAG
  rationale: This participial phrase indicates administrative oversight. 'In charge
    of all that belonged to him' is natural English that preserves the sense of delegated
    authority over Holofernes' property/affairs.
- source_word: Πεισὸν
  chosen: persuade
  alternatives:
  - convince
  - urge
  lexicon: BDAG
  rationale: The imperative calls for inducing Judith to come. 'Persuade' best captures
    the causative nuance without overstatement.
- source_word: τὴν γυναῖκα τὴν Ἑβραίαν
  chosen: the Hebrew woman
  alternatives:
  - the Hebrew wife/woman
  - the Jewish woman
  lexicon: BDAG
  rationale: γυνή here means 'woman,' not 'wife,' since no marital sense is in view.
    'Hebrew' closely follows Ἑβραίαν and preserves the ethnic designation used in
    the Greek.
- source_word: ἣ ἔστιν παρὰ σοὶ
  chosen: who is with you
  alternatives:
  - who is in your care
  - who is at your place
  lexicon: BDAG
  rationale: The phrase indicates proximity or attendance. 'Who is with you' is the
    most straightforward rendering in context.
- source_word: τοῦ ἐλθεῖν πρὸς ἡμᾶς
  chosen: to come to us
  alternatives:
  - to come before us
  lexicon: BDAG
  rationale: The articular infinitive expresses the content/purpose of the persuasion.
    'To come to us' is clear and sufficiently formal.
- source_word: φαγεῖν καὶ πιεῖν μεθʼ ἡμῶν
  chosen: eat and drink with us
  alternatives:
  - dine and drink with us
  lexicon: BDAG
  rationale: A direct rendering preserves the banquet setting without adding idiomatic
    color not explicit in the Greek.
