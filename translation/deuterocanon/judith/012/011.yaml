id: JDT.12.11
reference: Judith 12:11
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν Βαγώᾳ τῷ εὐνούχῳ, ὃς ἦν ἐφεστηκὼς ἐπὶ πάντων τῶν αὐτοῦ Πεισὸν δὴ
    πορευθεὶς τὴν γυναῖκα τὴν Ἑβραίαν ἣ ἔστιν παρὰ σοὶ τοῦ ἐλθεῖν πρὸς ἡμᾶς καὶ φαγεῖν
    καὶ πιεῖν μεθʼ ἡμῶν.
  language: Greek
  pages:
