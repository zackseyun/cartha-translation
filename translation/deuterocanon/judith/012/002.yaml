id: JDT.12.2
reference: Judith 12:2
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν Ἰουδεὶθ Οὐ φάγομαι ἐξ αὐτῶν, ἵνα μὴ γένηται σκάνδαλον, ἀλλʼ ἐκ τῶν
    ἠκολουθηκότων μοι χορηγηθήσεται.
  language: Greek
  pages:
  - 798
  - 799
  - 802
