  confidence: high
  validation: agree
translation:
  text: And Judith said, “I will not eat from them, lest it become a stumbling block;
    instead, what has accompanied me will be provided.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offense' or 'a scandal.' The Greek σκάνδαλον can denote a cause of
      stumbling, offense, or downfall.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ φάγομαι
  chosen: I will not eat
  alternatives:
  - I shall not eat
  - I will not partake
  lexicon: LSJ
  rationale: Future middle of ἐσθίω used straightforwardly as a refusal of eating.
    'I will not eat' is clear modern English and keeps the direct force of the statement.
- source_word: ἐξ αὐτῶν
  chosen: from them
  alternatives:
  - of them
  - from these things
  lexicon: LSJ
  rationale: The pronoun refers to the foods just offered. 'From them' preserves the
    partitive sense without over-specifying 'foods' beyond the immediate context.
- source_word: ἵνα μὴ γένηται
  chosen: lest it become
  alternatives:
  - so that there may not be
  - lest there come to be
  lexicon: LSJ
  rationale: This clause expresses intended avoidance of an outcome. 'Lest it become'
    is idiomatic and preserves the prospective force.
- source_word: σκάνδαλον
  chosen: a stumbling block
  alternatives:
  - an offense
  - a scandal
  - a cause for stumbling
  lexicon: LSJ
  rationale: σκάνδαλον can denote a trap, offense, or cause of downfall. 'Stumbling
    block' best preserves the metaphor and avoids flattening the moral-religious concern
    into mere social embarrassment.
- source_word: ἀλλʼ
  chosen: instead
  alternatives:
  - but
  - rather
  lexicon: LSJ
  rationale: Marks contrast between refusing the offered food and accepting another
    provision. 'Instead' reads naturally in English while preserving the adversative
    sense.
- source_word: ἐκ τῶν ἠκολουθηκότων μοι
  chosen: what has accompanied me
  alternatives:
  - from the things that have followed me
  - from what was brought along with me
  - from my provisions that came with me
  lexicon: LSJ
  rationale: Perfect participle of ἀκολουθέω literally means 'the things having followed
    me.' In context it refers to provisions brought with Judith. 'What has accompanied
    me' preserves the Greek image without awkward literalism.
- source_word: χορηγηθήσεται
  chosen: will be provided
  alternatives:
  - will be supplied
  - will be furnished
  lexicon: LSJ
  rationale: Future passive indicating that sustenance will be supplied from her own
    accompanying provisions. 'Will be provided' is natural and sufficiently formal.
