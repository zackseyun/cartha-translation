theological_decisions:
- issue: Meaning of σκάνδαλον in Judith's refusal
  chosen_reading: Rendered as 'a stumbling block' to preserve the moral-religious
    sense of defilement or offense without narrowing it to public scandal alone.
  alternative_readings:
  - an offense
  - a scandal
  rationale: The context is Judith's concern to avoid compromising herself by eating
    the Assyrian food. The metaphorical language should be preserved rather than reduced
    to mere embarrassment.
