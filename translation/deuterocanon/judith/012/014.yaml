theological_decisions:
- issue: Rendering κύριος in a non-divine address
  chosen_reading: my lord
  alternative_readings:
  - my master
  rationale: The term is not a theological title here but a social honorific. The
    project default for κύριος is 'Lord,' but in direct address to a human superior,
    lowercase 'lord' best preserves meaning and register without implying divinity.
