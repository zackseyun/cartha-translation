id: JDT.12.14
reference: Judith 12:14
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν πρὸς αὐτὸν Ἰουδείθ Καὶ τίς εἰμι ἐγὼ ἀντειποῦσα τῷ κυρίῳ μου; ὅτι
    πᾶν ὃ ἔσται ἐν τοῖς ὀφθαλμοῖς αὐτοῦ ἀρεστὸν σπεύσασα ποιήσω, καὶ ἔσται τοῦτό μοι
    ἀγαλλίαμα ἕως ἡμέρας θανάτου μου.
  language: Greek
  pages:
  - 798
  - 799
  - 802
  - 820
  - 821
  - 822
  - 823
  - 824
  - 825
  confidence: high
  validation: agree
translation:
  text: And Judith said to him, “And who am I to speak against my lord? Whatever is
    pleasing in his eyes, I will hasten to do, and this will be my rejoicing until
    the day of my death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to oppose my lord” or “to answer back to my lord.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντειποῦσα
  chosen: to speak back
  alternatives:
  - to oppose
  - to answer back
  - to contradict
  lexicon: BDAG
  rationale: The participial form conveys replying against or contradicting. 'Speak
    back' preserves the deferential social setting and Judith's rhetorical submission
    without overstating it as formal opposition.
- source_word: τῷ κυρίῳ μου
  chosen: to my lord
  alternatives:
  - to my master
  lexicon: BDAG
  rationale: κύριος is rendered 'lord' per project default. Here it functions as a
    respectful address to Holofernes, not a divine title. 'Master' is possible in
    a servile context, but 'lord' better matches the courtly register.
- source_word: πᾶν ὃ ἔσται ἐν τοῖς ὀφθαλμοῖς αὐτοῦ ἀρεστόν
  chosen: Whatever is pleasing in his eyes
  alternatives:
  - Everything that seems good to him
  - Whatever is acceptable before him
  lexicon: BDAG
  rationale: The idiom 'in his eyes' is common and transparent enough in English while
    preserving the source imagery. ἀρεστόν is rendered 'pleasing' to reflect what
    meets his approval.
- source_word: σπεύσασα
  chosen: quickly
  alternatives:
  - promptly
  - with haste
  lexicon: BDAG
  rationale: The participle expresses eagerness or haste accompanying the action.
    Rendering it adverbially as 'quickly' gives natural English while preserving the
    sense of prompt compliance.
- source_word: ἀγαλλίαμα
  chosen: joy
  alternatives:
  - exultation
  - gladness
  - rejoicing
  lexicon: BDAG
  rationale: The noun denotes strong gladness or exultation. 'Joy' is concise and
    natural; 'exultation' is possible but sounds overly elevated here.
- source_word: ἕως ἡμέρας θανάτου μου
  chosen: until the day of my death
  alternatives:
  - until my dying day
  lexicon: BDAG
  rationale: This is a straightforward temporal expression. The more literal rendering
    preserves the solemnity and avoids idiomatic paraphrase.
