theological_decisions:
- issue: Rendering of δούλη in relation to the project's δοῦλος/δούλη policy
  chosen_reading: female slave
  alternative_readings:
  - maidservant
  - servant girl
  rationale: Following the doctrine's guidance to prefer 'slave' where bonded status
    is salient or plainly denoted by the Greek, δούλη is rendered 'female slave.'
    This avoids importing a softer social relation than the source term indicates.
