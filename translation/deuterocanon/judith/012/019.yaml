translation:
  text: And taking it, she ate and drank before him what her female slave had prepared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her maidservant.' The Greek has 'her female slave' (ἡ δούλη αὐτῆς).
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβοῦσα
  chosen: taking it
  alternatives:
  - having taken
  - receiving it
  lexicon: BDAG
  rationale: Aorist participle of λαμβάνω, here naturally rendered as a preceding
    action. 'Taking it' keeps the participial linkage without overformal English.
    The object is implicit from context, referring to the food/drink set before her.
- source_word: ἔφαγεν
  chosen: she ate
  alternatives:
  - she ate of it
  lexicon: BDAG
  rationale: Simple aorist of ἐσθίω. English does not require an explicit object because
    the following relative clause identifies what was consumed.
- source_word: ἔπιεν
  chosen: and drank
  alternatives:
  - and she drank
  lexicon: BDAG
  rationale: Coordinates with ἔφαγεν. 'And drank' is idiomatic after 'she ate,' while
    preserving the sequence of actions.
- source_word: κατέναντι αὐτοῦ
  chosen: before him
  alternatives:
  - in front of him
  - opposite him
  lexicon: BDAG
  rationale: The phrase denotes spatial presence in front of Holofernes. 'Before him'
    is concise, natural, and fits the banquet setting.
- source_word: ἃ
  chosen: what
  alternatives:
  - the things that
  - that which
  lexicon: BDAG
  rationale: Neuter plural relative pronoun referring collectively to the items prepared.
    'What' gives smooth English without losing the collective sense.
- source_word: ἡτοίμασεν
  chosen: had prepared
  alternatives:
  - prepared
  - made ready
  lexicon: BDAG
  rationale: The pluperfect sense in English is appropriate because the preparation
    preceded Judith's eating and drinking. 'Had prepared' clarifies the temporal relation.
- source_word: ἡ δούλη αὐτῆς
  chosen: her female slave
  alternatives:
  - her maidservant
  - her servant girl
  - her slave girl
  lexicon: BDAG
  rationale: ' δούλη is the feminine of δοῦλος and denotes a female slave/servant.
    In this narrative context the bonded status is part of the plain lexical sense,
    so ''female slave'' better reflects the Greek than the softer ''maidservant.'''
