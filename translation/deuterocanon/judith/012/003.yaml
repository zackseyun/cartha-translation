translation:
  text: And Holofernes said to her, “But if the things you have with you run out,
    from where shall we get for you provisions like them? For there is no one with
    us from your nation.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “food” or “supplies” for “provisions”; the Greek uses δύναμιν here in
      an unusual contextual sense, apparently referring to sustenance rather than
      power or strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκλίπῃ
  chosen: run out
  alternatives:
  - fail
  - be exhausted
  - come to an end
  lexicon: LSJ
  rationale: The verb means to fail or give out. In context of supplies carried by
    Judith, 'run out' is natural modern English and accurately conveys depletion of
    provisions.
- source_word: τὰ μετὰ σοῦ ὄντα
  chosen: the things you have with you
  alternatives:
  - your belongings with you
  - the supplies with you
  lexicon: LSJ
  rationale: Literally 'the things being with you.' The phrase is broad, but in context
    it refers specifically to what Judith has brought for her own use, likely food
    provisions. The chosen rendering stays close to the Greek while allowing the following
    clause to clarify the practical sense.
- source_word: ἐξοίσομεν
  chosen: shall we bring
  alternatives:
  - shall we provide
  - shall we fetch
  lexicon: LSJ
  rationale: Future of ἐκφέρω, literally 'bring out' or 'carry out.' In this context
    Holofernes speaks of obtaining something for her use, so 'bring' is idiomatic
    and sufficiently literal.
- source_word: δύναμιν
  chosen: provisions
  alternatives:
  - food
  - supplies
  - strength
  lexicon: LSJ
  rationale: Although δύναμις often means 'power' or 'strength,' here the phrase 'bring
    you δύναμιν like them' in context of Judith's carried items points to sustenance
    or provisions. 'Provisions' best fits the immediate sense without overnarrowing
    to cooked food alone.
- source_word: ὁμοίαν αὐτοῖς
  chosen: like them
  alternatives:
  - similar to those things
  - the same kind as those
  lexicon: LSJ
  rationale: The feminine singular adjective with αὐτοῖς refers back by sense to what
    Judith has with her. 'Like them' is concise and preserves the comparison.
- source_word: ἐκ τοῦ ἔθνους σου
  chosen: from your nation
  alternatives:
  - from your people
  - of your nation
  lexicon: LSJ
  rationale: ἔθνος here denotes Judith's ethnic people-group. 'Nation' is a straightforward
    rendering, while 'your people' would also be possible. 'Nation' preserves the
    ethnic-political nuance.
