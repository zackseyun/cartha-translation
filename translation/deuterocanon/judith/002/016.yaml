id: JDT.2.16
reference: Judith 2:16
source:
  edition: lxx-swete-1909
  text: καὶ διέταξεν αὐτοὺς ὃν τρόπον πολέμου πλῆθος συντάσσεται.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  - 803
  confidence: high
  validation: agree
translation:
  text: And he arranged them in the way a multitude is drawn up for war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And he ordered them as a multitude is marshaled for war.' The Greek
      verb διέταξεν can emphasize either arranging or commanding, and συντάσσεται
      is a military term for being drawn up in formation.
    reason: lexical_alternative
lexical_decisions:
- source_word: διέταξεν
  chosen: arranged
  alternatives:
  - ordered
  - drew up
  - gave orders to
  lexicon: LSJ
  rationale: The verb can mean to arrange, appoint, or give orders. Here, with the
    following clause describing battle formation, 'arranged' best captures the act
    of organizing troops rather than merely issuing commands.
- source_word: αὐτούς
  chosen: them
  lexicon: Greek grammar
  rationale: Direct object referring to the forces previously mentioned; simple pronoun
    is sufficient in English.
- source_word: ὃν τρόπον
  chosen: in the way
  alternatives:
  - as
  - according to the manner in which
  lexicon: LSJ
  rationale: 'This idiom introduces manner: ''in the way that'' or ''as.'' ''In the
    way'' preserves the comparative force without sounding overly wooden.'
- source_word: πολέμου
  chosen: for war
  alternatives:
  - of war
  - for battle
  lexicon: LSJ
  rationale: The genitive modifies the military arrangement. 'For war' is idiomatic
    English and keeps the broad military sense; 'for battle' is possible but slightly
    narrower.
- source_word: πλῆθος
  chosen: a multitude
  alternatives:
  - a mass
  - an army
  - a host
  lexicon: LSJ
  rationale: The noun means a multitude or large number. 'A multitude' preserves the
    lexical sense without importing the more specific term 'army,' which the Greek
    does not explicitly use here.
- source_word: συντάσσεται
  chosen: is drawn up
  alternatives:
  - is arranged
  - is marshaled
  - is deployed
  lexicon: LSJ
  rationale: In military context the verb refers to drawing up troops in formation.
    'Is drawn up' is a natural English military expression and fits the passive form.
