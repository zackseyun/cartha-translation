  - 800
  - 801
  - 802
  - 803
  confidence: high
  validation: agree
translation:
  text: and provisions for every man in abundance, and very much gold and silver from
    the king’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the king’s treasury' or 'from the royal house'; the Greek reads
      literally 'from the king’s house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισιτισμὸν
  chosen: provisions
  alternatives:
  - supplies
  - rations
  - food supply
  lexicon: LSJ
  rationale: The noun denotes provisioning or supply, especially food provisions.
    'Provisions' is natural English and broad enough to include the sense of sustenance
    without over-specifying military 'rations'.
- source_word: παντὶ ἀνδρὶ
  chosen: every man
  alternatives:
  - every soldier
  - everyone
  lexicon: LSJ
  rationale: The Greek is literally masculine singular distributive, 'to every man.'
    In this military context it likely refers to each fighting man, but the text itself
    says 'man,' not specifically 'soldier,' so the gender-accurate rendering is preserved.
- source_word: εἰς πλῆθος
  chosen: in abundance
  alternatives:
  - in plenty
  - abundantly
  - in great quantity
  lexicon: LSJ
  rationale: This idiom conveys plentiful quantity. 'In abundance' is idiomatic English
    and preserves the sense of ample supply.
- source_word: χρυσίον καὶ ἀργύριον
  chosen: gold and silver
  alternatives:
  - money in gold and silver
  lexicon: LSJ
  rationale: The phrase straightforwardly names precious metals. No need to expand
    to 'money,' since the Greek does not explicitly do so.
- source_word: ἐξ οἴκου βασιλέως
  chosen: from the king’s house
  alternatives:
  - from the royal house
  - from the king’s treasury
  - from the palace
  lexicon: LSJ
  rationale: Literally 'from the house of the king.' While context may imply royal
    stores or treasury, 'house' should be retained in the main text to avoid importing
    a narrower institutional meaning not explicit in the Greek.
- source_word: σφόδρα
  chosen: very much
  alternatives:
  - in great quantity
  - exceedingly
  - abundantly
  lexicon: LSJ
  rationale: Here σφόδρα intensifies the amount of gold and silver. 'Very much' keeps
    the adverbial force plainly, though in English it modifies the implied quantity
    rather than the nouns directly.
