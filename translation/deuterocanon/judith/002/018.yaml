reference: Judith 2:18
source:
  edition: lxx-swete-1909
  text: καὶ ἐπισιτισμὸν παντὶ ἀνδρὶ εἰς πλῆθος, καὶ χρυσίον καὶ ἀργύριον ἐξ οἴκου
    βασιλέως σφόδρα.
  language: Greek
  pages:
  - 798
