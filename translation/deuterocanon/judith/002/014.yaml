id: JDT.2.14
reference: Judith 2:14
source:
  edition: lxx-swete-1909
  text: Καὶ ἐξῆλθεν Ὁλοφέρνης ἀπὸ προσώπου τοῦ κυρίου αὐτοῦ, καὶ ἐκάλεσεν πάντας τοὺς
    δυνάστας καὶ τοὺς στρατηγοὺς καὶ ἐπιστάτας τῆς δυνάμεως Ἀσσούρ,
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  - 803
  confidence: high
  validation: agree
translation:
  text: And Holofernes went out from the presence of his lord, and he called all the
    nobles and the generals and overseers of the Assyrian army,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - departed
  - came out
  lexicon: BDAG
  rationale: A straightforward narrative aorist of ἐξέρχομαι. 'Went out' preserves
    the concrete movement without adding nuance.
- source_word: ἀπὸ προσώπου
  chosen: from the presence of
  alternatives:
  - from before
  - away from
  lexicon: LEH
  rationale: This is a common Semitic-influenced Greek expression meaning departure
    from someone's presence. 'From the presence of' preserves the idiom's formal courtly
    sense better than the flatter 'away from'.
- source_word: τοῦ κυρίου αὐτοῦ
  chosen: his lord
  alternatives:
  - his master
  lexicon: LEH
  rationale: κύριος here refers to Holofernes's human superior, not the divine title.
    'Lord' fits the hierarchical court setting and aligns with the project's default
    rendering, while context prevents confusion with God.
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  - convened
  lexicon: BDAG
  rationale: The verb simply states that he had these officials come. 'Called' is
    the most direct rendering; 'summoned' is possible but slightly more interpretive
    in tone.
- source_word: δυνάστας
  chosen: nobles
  alternatives:
  - magnates
  - rulers
  - powerful men
  lexicon: LEH
  rationale: The term denotes powerful or high-ranking men in the regime. 'Nobles'
    gives a natural English equivalent for elite officials in a royal-military context
    without sounding overly technical.
- source_word: στρατηγοὺς
  chosen: generals
  alternatives:
  - commanders
  lexicon: BDAG
  rationale: στρατηγός is a military leadership term. 'Generals' is the clearest modern
    equivalent in this list of ranks.
- source_word: ἐπιστάτας
  chosen: overseers
  alternatives:
  - officers
  - superintendents
  lexicon: BDAG
  rationale: The word denotes those set over others in supervisory roles. 'Overseers'
    preserves the administrative sense without over-specifying rank.
- source_word: τῆς δυνάμεως Ἀσσούρ
  chosen: of the Assyrian army
  alternatives:
  - of the force of Assyria
  - of the Assyrian forces
  lexicon: LEH
  rationale: δύναμις in military narrative commonly means armed force or army. Rendering
    the genitive phrase as 'the Assyrian army' is idiomatic English and fits the military
    context.
- source_word: Ἀσσούρ
  chosen: Assyrian
  alternatives:
  - Asshur
  - Assyria
  lexicon: LEH
  rationale: 'In this construction the ethnic adjective in English communicates the
    sense naturally: the army belonging to Assyria/Asshur. ''Assyrian'' is clearer
    in context than a more wooden transliteration.'
