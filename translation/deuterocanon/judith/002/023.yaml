id: JDT.2.23
reference: Judith 2:23
source:
  edition: lxx-swete-1909
  text: καὶ διέκοψεν τὸ Φοὺδ καὶ Λούδ, καὶ ἐπρονόμευσεν υἱοὺς πάντας Ῥασσεῖς καὶ υἱοὺς
    Ἰσμαὴλ τοὺς κατὰ πρόσωπον τῆς ἐρήμου πρὸς νότον τῆς Χαλδαίων.
  language: Greek
  pages:
  - 798
