  confidence: high
  validation: agree
translation:
  text: And he cut down Phud and Lud, and he plundered all the sons of Rasses and
    the sons of Ishmael who were opposite the wilderness, toward the south of the
    Chaldeans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Phut and Lud,' reflecting more familiar biblical spellings of these
      names.
    reason: lexical_alternative
  - marker: b
    text: '''The sons of Ishmael'' could be rendered ''the Ishmaelites.'' The main
      text preserves the Greek''s genealogical wording.'
    reason: lexical_alternative
  - marker: c
    text: The location phrase is terse and may also be understood as 'who were in
      front of the wilderness, south of the Chaldeans.'
    reason: alternative_reading
lexical_decisions:
- source_word: διέκοψεν
  chosen: cut down
  alternatives:
  - cut through
  - destroyed
  - cut off
  lexicon: LSJ
  rationale: The verb literally denotes cutting through or cutting apart. In this
    military context with peoples/regions as objects, it conveys violent defeat or
    devastation. 'Cut down' preserves the concrete force without over-specifying massacre
    where the Greek itself is terse.
- source_word: τὸ Φοὺδ καὶ Λούδ
  chosen: Phud and Lud
  alternatives:
  - Put and Lud
  - Phut and Lud
  lexicon: LSJ
  rationale: These are ethnonyms/place names and should be transliterated rather than
    translated. The Swete spelling supports 'Phud' and 'Lud' directly from the Greek
    forms; more familiar biblical spellings such as 'Phut' may be noted as alternatives
    but are not required by this witness.
- source_word: ἐπρονόμευσεν
  chosen: plundered
  alternatives:
  - ravaged
  - took as spoil
  - despoiled
  lexicon: LSJ
  rationale: The verb refers to taking booty in war. 'Plundered' is idiomatic modern
    English and preserves the military-economic sense better than the broader 'ravaged'.
- source_word: υἱοὺς πάντας Ῥασσεῖς
  chosen: all the sons of Rasses
  alternatives:
  - all the Rasseis
  - all the people of Rasses
  lexicon: LSJ
  rationale: The construction is somewhat awkward in English, but 'sons of' reflects
    the Greek υἱούς and preserves the ethnographic style of the source. Because Ῥασσεῖς
    is a proper group name of uncertain identification, transliteration is preferable
    to interpretive paraphrase.
- source_word: υἱοὺς Ἰσμαήλ
  chosen: the sons of Ishmael
  alternatives:
  - the Ishmaelites
  lexicon: LSJ
  rationale: The Greek literally reads 'sons of Ishmael.' Although 'Ishmaelites' is
    smoother English, the more literal rendering preserves the genealogical-ethnic
    phrasing of the text.
- source_word: τοὺς κατὰ πρόσωπον τῆς ἐρήμου
  chosen: who were opposite the wilderness
  alternatives:
  - who were before the wilderness
  - who were facing the wilderness
  - who were along the front of the wilderness
  lexicon: LSJ
  rationale: The phrase κατά πρόσωπον often means 'opposite' or 'in front of.' 'Opposite
    the wilderness' keeps the spatial relation without forcing a more precise geography
    than the Greek provides.
- source_word: πρὸς νότον τῆς Χαλδαίων
  chosen: toward the south of the Chaldeans
  alternatives:
  - south of the Chaldeans
  - toward the southern region of the Chaldeans
  lexicon: LSJ
  rationale: πρός with νότον indicates direction or orientation toward the south.
    The genitive with 'Chaldeans' is somewhat compressed in Greek; this rendering
    preserves that compression while remaining intelligible.
