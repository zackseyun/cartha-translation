id: JDT.2.1
reference: Judith 2:1
source:
  edition: lxx-swete-1909
  text: Καὶ ἐν τῷ ἔτει τῷ ὀκτωκαιδεκάτῳ, δευτέρᾳ καὶ εἰκάδι τοῦ πρώτου μηνός, ἐγένετο
    λόγος ἐν οἴκῳ Ναβουχοδονοσὸρ βασιλέως Ἀσσυρίων ἐκδικῆσαι πᾶσαν τὴν γῆν καθὼς ἐλάλησεν.
  language: Greek
