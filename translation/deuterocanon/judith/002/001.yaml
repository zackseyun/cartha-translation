theological_decisions:
- issue: Whether to render ἐγένετο λόγος as a more specific royal act such as 'a decree
    was issued'
  chosen_reading: a word came
  alternative_readings:
  - a decree was issued
  - a matter was decided
  rationale: The Greek wording is less specific than 'decree' and should not be narrowed
    without necessity. The chosen rendering preserves the narrative's ambiguity about
    whether this was an internal decision, spoken command, or formal edict.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Whether γῆ here should be translated 'land' or 'earth'
  chosen_reading: all the land
  alternative_readings:
  - all the earth
  rationale: The narrative setting favors a territorial/political sense rather than
    a cosmological one. The translation avoids importing a universal scope beyond
    what the context warrants.
  doctrine_reference: Translation philosophy §1
