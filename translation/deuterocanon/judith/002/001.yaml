translation:
  text: And in the eighteenth year, on the twenty-second day of the first month, a
    word came in the house of Nebuchodonosor king of the Assyrians, to avenge himself
    on all the land, just as he had spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the palace/court of Nebuchodonosor.' The Greek says 'house,' which
      can also refer to a royal residence or court.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the earth.' Greek γῆ can mean either 'land' or 'earth'; context
      here favors a territorial sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'a decree was issued' / 'a matter was decided.' The Greek more literally
      says 'a word came to be.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ ἔτει τῷ ὀκτωκαιδεκάτῳ
  chosen: in the eighteenth year
  alternatives:
  - in year eighteen
  - during the eighteenth year
  lexicon: LSJ
  rationale: A straightforward temporal dative construction. 'In the eighteenth year'
    is idiomatic English and preserves the formal dating notice.
- source_word: δευτέρᾳ καὶ εἰκάδι
  chosen: on the twenty-second day
  alternatives:
  - on the second and twentieth day
  - on the twenty-second
  lexicon: LSJ
  rationale: This Greek ordinal-plus-εἰκάς expression denotes the twenty-second day
    of the month. The fuller English phrase makes the date clear for modern readers.
- source_word: τοῦ πρώτου μηνός
  chosen: of the first month
  alternatives:
  - in the first month
  lexicon: LSJ
  rationale: Genitive dependent on the date expression; 'of the first month' most
    directly reflects the Greek while remaining natural.
- source_word: ἐγένετο λόγος
  chosen: a word came
  alternatives:
  - a matter arose
  - a decree was issued
  - word came
  lexicon: LSJ
  rationale: The idiom literally says 'a word came to be.' In this court setting it
    can suggest a decision or resolution, but the Greek does not explicitly say 'decree.'
    'A word came' preserves the source's wording and leaves the exact nuance open.
- source_word: ἐν οἴκῳ Ναβουχοδονοσὸρ
  chosen: in the house of Nebuchodonosor
  alternatives:
  - in the palace of Nebuchodonosor
  - at the court of Nebuchodonosor
  lexicon: LSJ
  rationale: οἶκος can mean house, household, or palace. Because the Greek says 'house'
    and does not require the more interpretive 'palace,' the main text keeps the literal
    term; the court/palace nuance is preserved as an alternative.
- source_word: βασιλέως Ἀσσυρίων
  chosen: king of the Assyrians
  alternatives:
  - the Assyrian king
  lexicon: LSJ
  rationale: The genitive phrase identifies Nebuchodonosor's royal title. 'King of
    the Assyrians' follows the Greek form closely.
- source_word: ἐκδικῆσαι
  chosen: to avenge himself on
  alternatives:
  - to take vengeance on
  - to exact punishment from
  - to avenge
  lexicon: LSJ
  rationale: The infinitive expresses the content/purpose of the 'word.' In context
    Nebuchodonosor is the implied subject seeking retribution. 'Avenge himself on'
    makes the reflexive sense explicit in idiomatic English.
- source_word: πᾶσαν τὴν γῆν
  chosen: all the land
  alternatives:
  - the whole land
  - all the earth
  lexicon: LSJ
  rationale: γῆ can mean land or earth/world. In Judith's narrative context, the reference
    is to the lands/territory under consideration rather than the entire globe. 'All
    the land' preserves the singular while avoiding overstatement.
- source_word: καθὼς ἐλάλησεν
  chosen: just as he had spoken
  alternatives:
  - as he had said
  - according as he had declared
  lexicon: LSJ
  rationale: This clause links the action to Nebuchodonosor's prior statement. 'Just
    as he had spoken' is slightly formal but transparent and close to the Greek.
