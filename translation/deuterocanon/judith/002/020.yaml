id: JDT.2.20
reference: Judith 2:20
source:
  edition: lxx-swete-1909
  text: καὶ πολὺς ὁ ἐπίμικτος ὡς ἀκρὶς συνεξῆλθον αὐτοῖς, καὶ ὡς ἡ ἄμμος τῆς γῆς,
    οὐ γὰρ ἦν ἀριθμὸς ἀπὸ πλήθους αὐτῶν.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  - 803
  confidence: high
  validation: agree
translation:
  text: And a great mixed multitude went out with them, like locusts and like the
    sand of the earth, for there was no number because of their multitude.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for they were beyond counting because of their multitude.' The Greek
      expression is a literal way of saying they were innumerable.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολὺς
  chosen: a great
  alternatives:
  - many
  - numerous
  lexicon: LSJ
  rationale: With the singular collective subject ὁ ἐπίμικτος, πολὺς functions idiomatically
    to describe the size of the collective group. 'A great' is natural English for
    a large collective multitude.
- source_word: ὁ ἐπίμικτος
  chosen: mixed multitude
  alternatives:
  - mixed company
  - motley crowd
  lexicon: LSJ
  rationale: The articular adjective is used substantivally for a mixed body of people
    attached to the army. 'Mixed multitude' preserves the collective sense and echoes
    established biblical usage without being archaic in this context.
- source_word: συνεξῆλθον αὐτοῖς
  chosen: went out with them
  alternatives:
  - marched out with them
  - went along with them
  lexicon: LSJ
  rationale: The compound verb indicates accompanying movement. 'Went out with them'
    is the most direct rendering; 'marched' would add military specificity not explicit
    in the verb itself.
- source_word: ὡς ἀκρίς
  chosen: like locusts
  alternatives:
  - as locusts
  lexicon: LSJ
  rationale: This simile emphasizes overwhelming number. 'Like locusts' is idiomatic
    modern English and preserves the imagery.
- source_word: ὡς ἡ ἄμμος τῆς γῆς
  chosen: like the sand of the earth
  alternatives:
  - like the sand on the ground
  - like the sand of the land
  lexicon: LSJ
  rationale: A very literal rendering best preserves the biblical idiom of innumerability.
    'Of the earth' reflects γῆς straightforwardly and avoids over-interpreting whether
    'land' or 'ground' is intended.
- source_word: οὐ γὰρ ἦν ἀριθμός
  chosen: for there was no number
  alternatives:
  - for there was no counting
  - for they were beyond number
  lexicon: LSJ
  rationale: The clause states the absence of any count. 'There was no number' is
    slightly formal but transparent and closely follows the Greek; it also prepares
    for the explanatory phrase that follows.
- source_word: ἀπὸ πλήθους αὐτῶν
  chosen: because of their multitude
  alternatives:
  - on account of their great number
  - because they were so many
  lexicon: LSJ
  rationale: ἀπό here expresses cause or basis. 'Because of their multitude' preserves
    the causal force and the noun πλήθος.
