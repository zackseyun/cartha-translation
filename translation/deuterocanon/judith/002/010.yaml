id: JDT.2.10
reference: Judith 2:10
source:
  edition: lxx-swete-1909
  text: σὺ δὲ ἐξελθὼν προκαταλήμψῃ μοι πᾶν ὅριον αὐτῶν, καὶ ἐκδώσουσίν σοι ἑαυτούς,
    καὶ διατηρήσεις ἐμοὶ αὐτοὺς εἰς ἡμέραν ἐλεγμοῦ αὐτῶν.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  - 803
  confidence: high
  validation: agree
translation:
  text: But you, after going out, shall seize all their territory in advance for me,
    and they will surrender themselves to you; and you shall keep them for me until
    the day of their punishment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until the day of their rebuke' or 'until the day of their chastisement.'
      The Greek ἐλεγμός can denote rebuke, censure, or punitive correction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  chosen: after going out
  alternatives:
  - going out
  - having gone out
  lexicon: LSJ
  rationale: Aorist participle of ἐξέρχομαι, functioning temporally prior to the main
    verb. 'After going out' gives clear English sequence without over-literal awkwardness.
- source_word: προκαταλήμψῃ
  chosen: shall seize ... in advance
  alternatives:
  - shall take beforehand
  - shall occupy beforehand
  - shall overrun
  lexicon: LSJ
  rationale: The compound verb carries the sense of taking possession beforehand or
    in advance. 'Seize ... in advance' preserves both the forceful military sense
    and the προ- prefix better than a flatter 'take.'
- source_word: πᾶν ὅριον αὐτῶν
  chosen: all their territory
  alternatives:
  - every border of theirs
  - their whole region
  lexicon: LSJ
  rationale: ὅριον can denote boundary, borderland, or territory. In this military
    context, 'territory' best conveys the land under their control rather than merely
    a line of border.
- source_word: ἐκδώσουσίν σοι ἑαυτούς
  chosen: they will surrender themselves to you
  alternatives:
  - they will hand themselves over to you
  - they will give themselves up to you
  lexicon: LSJ
  rationale: The middle/reflexive sense with ἑαυτούς indicates voluntary yielding.
    'Surrender themselves' is idiomatic modern English and fits the military context.
- source_word: διατηρήσεις
  chosen: you shall keep
  alternatives:
  - you shall preserve
  - you shall hold in custody
  lexicon: LSJ
  rationale: The verb means keep/preserve/maintain. Here the context is retaining
    conquered peoples for later action; 'keep' is broad and natural, while the later
    phrase supplies the purpose.
- source_word: εἰς ἡμέραν ἐλεγμοῦ αὐτῶν
  chosen: until the day of their punishment
  alternatives:
  - for the day of their rebuke
  - until the day of their chastisement
  - until the day of their judgment
  lexicon: LSJ
  rationale: ἐλεγμός can mean rebuke, censure, or chastisement. In this royal-military
    threat context, a punitive sense is most likely. 'Punishment' communicates the
    practical force in clear English, though 'rebuke/chastisement' remains a viable
    lexical alternative.
