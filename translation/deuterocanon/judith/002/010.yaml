theological_decisions:
- issue: Force of ἐλεγμός in a military-judicial context
  chosen_reading: punishment
  alternative_readings:
  - rebuke
  - chastisement
  - judgment
  rationale: The verse concerns conquest and the treatment of subdued peoples. Rendering
    ἐλεγμός as 'punishment' best reflects the threatened outcome without importing
    specifically eschatological judgment language. The alternatives are preserved
    because the noun can denote verbal rebuke or disciplinary correction in other
    contexts.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
