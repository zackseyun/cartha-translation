  confidence: high
  validation: agree
translation:
  text: For as I live, and by the power of my kingdom, I have spoken, and I will do
    these things by my hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the might of my kingdom.' The Greek κράτος can denote power, might,
      or ruling strength.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in my hand'; the phrase means 'by my hand,' expressing direct
      personal agency.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - surely
  lexicon: BDAG
  rationale: Introduces the solemn ground or basis for the preceding declaration.
    'For' fits the oath-like explanatory force in context better than a strictly causal
    'because.'
- source_word: ζῶν ἐγώ
  chosen: as I live
  alternatives:
  - I am living
  - I live
  lexicon: BDAG
  rationale: This is a standard oath formula. 'As I live' conveys the idiomatic force
    in natural English better than the more wooden 'I live' or 'I am living.'
- source_word: τὸ κράτος
  chosen: the power
  alternatives:
  - the might
  - the dominion
  lexicon: LSJ
  rationale: κράτος denotes strength, might, or ruling power. 'Power' is clear modern
    English and suits the royal context; 'dominion' would overlap too much with 'kingdom,'
    and 'might' is slightly less idiomatic here.
- source_word: τῆς βασιλείας μου
  chosen: of my kingdom
  alternatives:
  - of my reign
  - of my kingship
  lexicon: LSJ
  rationale: βασιλεία most naturally refers here to the realm or royal rule. 'Of my
    kingdom' preserves the concrete royal sense and matches the genitive relation
    to κράτος.
- source_word: λελάληκα
  chosen: I have spoken
  alternatives:
  - I have said
  - I have declared
  lexicon: BDAG
  rationale: The perfect tense suggests a completed utterance with present force.
    'I have spoken' preserves that aspect better than a simple past; 'declared' is
    possible but slightly more interpretive.
- source_word: ποιήσω
  chosen: I will do
  alternatives:
  - I will carry out
  - I will accomplish
  lexicon: BDAG
  rationale: ποιέω is broad; 'I will do' is the most direct rendering and leaves the
    object 'these things' to carry the sense. More specific options are possible but
    less formally anchored.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - them
  lexicon: BDAG
  rationale: The plural demonstrative is explicit in Greek. 'These things' preserves
    the form and points back to the previously announced actions.
- source_word: ἐν χειρί μου
  chosen: by my hand
  alternatives:
  - with my hand
  - by my own hand
  lexicon: LSJ
  rationale: The phrase is idiomatic for personal agency or direct execution. 'By
    my hand' is a natural biblical-English equivalent that preserves the image of
    personal agency. 'By my own hand' is interpretively stronger than the Greek requires.
