id: JDT.2.12
reference: Judith 2:12
source:
  edition: lxx-swete-1909
  text: ὅτι ζῶν ἐγὼ καὶ τὸ κράτος τῆς βασιλείας μου, λελάληκα καὶ ποιήσω ταῦτα ἐν
    χειρί μου.
  language: Greek
