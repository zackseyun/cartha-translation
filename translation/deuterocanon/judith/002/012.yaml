theological_decisions:
- issue: Rendering the oath-like royal self-attestation
  chosen_reading: For as I live, and by the power of my kingdom
  alternative_readings:
  - Because I live and the power of my kingdom lives
  - As surely as I live and as surely as the power of my kingdom endures
  rationale: The Greek is elliptical and oath-like rather than a full finite clause
    for both elements. The translation preserves the solemn force without over-expanding
    the syntax. This is not a doctrinally contested term, but it is a significant
    interpretive decision affecting tone and meaning.
