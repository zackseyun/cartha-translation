id: JDT.2.13
reference: Judith 2:13
source:
  edition: lxx-swete-1909
  text: καὶ σὺ δὲ οὐ παραβήσῃ ἓν τι τῶν ῥημάτων τοῦ κυρίου σου, ἀλλὰ ἐπιτελῶν ἐπιτελέσεις
    καθότι προστέταχά σοι, καὶ οὐ μακρυνεῖς τοῦ ποιῆσαι αὐτά.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
