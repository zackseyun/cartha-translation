theological_decisions:
- issue: Rendering κύριος for a human superior rather than as a divine title
  chosen_reading: your lord
  alternative_readings:
  - your master
  rationale: The context is a command from Nebuchadnezzar through military hierarchy,
    so κύριος is not a divine title here. Following doctrine, κύριος is normally 'Lord,'
    but lowercase 'lord' is appropriate for a human referent.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord; context-sensitive
    for human referents'
