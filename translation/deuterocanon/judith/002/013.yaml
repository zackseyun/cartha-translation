  - 803
  confidence: high
  validation: agree
translation:
  text: And you also must not transgress a single one of your lord’s words, but you
    shall surely carry out exactly as I have commanded you, and you shall not delay
    to do them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐ παραβήσῃ
  chosen: must not transgress
  alternatives:
  - shall not violate
  - must not go beyond
  - must not disobey
  lexicon: BDAG
  rationale: παραβαίνω commonly means to transgress, violate, or overstep. 'Transgress'
    preserves the formal sense of crossing a stated command while remaining intelligible
    in modern English.
- source_word: ἓν τι τῶν ῥημάτων
  chosen: a single one of ... words
  alternatives:
  - anything of the words
  - one thing from the words
  - one word
  lexicon: BDAG
  rationale: The idiom emphasizes not omitting or violating even one item. 'A single
    one of ... words' captures the distributive force of ἓν τι without flattening
    it to a generic 'anything.'
- source_word: τοῦ κυρίου σου
  chosen: your lord
  alternatives:
  - your master
  lexicon: BDAG
  rationale: κύριος here refers to Holofernes' superior in a human chain of command,
    not the divine name. Lowercase 'lord' preserves the lexical value of κύριος while
    signaling a human referent. 'Master' is possible but less natural in this military-administrative
    context.
- source_word: ἐπιτελῶν ἐπιτελέσεις
  chosen: you shall surely carry out
  alternatives:
  - you shall fully accomplish
  - you must complete completely
  - you shall certainly perform
  lexicon: BDAG
  rationale: The participle plus finite verb intensifies the command. 'Surely carry
    out' conveys the emphatic force in natural English without awkward repetition.
- source_word: καθότι προστέταχά σοι
  chosen: exactly as I have commanded you
  alternatives:
  - just as I have ordered you
  - according as I have instructed you
  lexicon: BDAG
  rationale: προστάσσω denotes giving orders or commands. 'Exactly as' reflects καθότι's
    close correspondence, and 'commanded' fits the military setting.
- source_word: οὐ μακρυνεῖς
  chosen: you shall not delay
  alternatives:
  - you shall not linger
  - you shall not put off
  - you shall not be slow
  lexicon: LSJ
  rationale: From μακρύνω in this context, the sense is to prolong or defer action.
    'Delay' best fits the infinitive complement and the urgency of the order.
- source_word: τοῦ ποιῆσαι αὐτά
  chosen: to do them
  alternatives:
  - from doing them
  - in doing them
  - to carry them out
  lexicon: BDAG
  rationale: The articular infinitive with τοῦ after μακρυνεῖς expresses the action
    delayed. 'To do them' is straightforward and preserves the plural reference back
    to the commands/words.
