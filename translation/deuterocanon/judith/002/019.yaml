id: JDT.2.19
reference: Judith 2:19
source:
  edition: lxx-swete-1909
  text: καὶ ἐξῆλθεν αὐτὸς καὶ πᾶσα ἡ δύναμις αὐτοῦ εἰς πορείαν τοῦ προελθεῖν βασιλέως
    Ναβουχοδονοσὸρ καὶ καλύψαι πᾶν τὸ πρόσωπον τῆς γῆς πρὸς δυσμαῖς ἐν ἅρμασι καὶ
    ἱππεῦσι καὶ πεζοῖς ἐπιλέκτοις αὐτοῦ.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  - 803
  confidence: high
  validation: agree
translation:
  text: And he himself and all his force set out on the march to go before King Nebuchadnezzar
    and to cover the whole face of the land toward the west with his chariots and
    horsemen and his chosen foot soldiers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole face of the earth.' The Greek γῆ can mean either 'land' or
      'earth'; here 'land' is preferred because the context is a westward military
      advance across territories.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: set out
  alternatives:
  - went out
  - marched out
  lexicon: BDAG
  rationale: The verb literally means 'went out,' but in this military context with
    εἰς πορείαν it idiomatically indicates departure on campaign. 'Set out' preserves
    the movement without over-paraphrasing.
- source_word: πᾶσα ἡ δύναμις αὐτοῦ
  chosen: all his force
  alternatives:
  - all his army
  - all his power
  lexicon: BDAG
  rationale: δύναμις can mean power or military force. Here the surrounding military
    terms (march, chariots, horsemen, foot soldiers) make 'force' the best broad military
    rendering. 'Army' is possible, but 'force' stays closer to the Greek while still
    natural.
- source_word: εἰς πορείαν
  chosen: on the march
  alternatives:
  - for a march
  - on campaign
  lexicon: LSJ
  rationale: This phrase marks military movement. 'On the march' is idiomatic English
    that reflects the military sense more clearly than the more wooden 'for a march.'
- source_word: τοῦ προελθεῖν
  chosen: to go before
  alternatives:
  - to advance before
  - to go ahead of
  lexicon: BDAG
  rationale: The infinitive expresses purpose. 'To go before' is a straightforward
    rendering of the compound verb and leaves the exact nuance of leading/preceding
    intact.
- source_word: καλύψαι πᾶν τὸ πρόσωπον τῆς γῆς
  chosen: to cover the whole face of the land
  alternatives:
  - to cover the whole surface of the earth
  - to overrun the whole land
  lexicon: LSJ
  rationale: The phrase is vivid and spatial. 'Cover the whole face of the land' preserves
    the imagery of πλήρης territorial spread better than the more interpretive 'overrun.'
    'Land' fits the likely regional sense better than the global 'earth' in this military
    narrative.
- source_word: πρὸς δυσμαῖς
  chosen: toward the west
  alternatives:
  - westward
  - toward the western regions
  lexicon: LSJ
  rationale: The phrase indicates direction. 'Toward the west' is clear and natural,
    while preserving the directional force without adding specificity.
- source_word: ἅρμασι
  chosen: chariots
  alternatives:
  - war chariots
  lexicon: BDAG
  rationale: The standard military sense is 'chariots.' Adding 'war' is unnecessary
    because the context is already military.
- source_word: ἱππεῦσι
  chosen: horsemen
  alternatives:
  - cavalry
  - mounted troops
  lexicon: BDAG
  rationale: ἱππεῖς are mounted soldiers. 'Horsemen' is more formally transparent
    to the Greek than the collective 'cavalry,' while remaining readable.
- source_word: πεζοῖς ἐπιλέκτοις
  chosen: chosen foot soldiers
  alternatives:
  - picked infantry
  - select foot troops
  - elite infantry
  lexicon: BDAG
  rationale: πεζοῖς means foot soldiers, and ἐπιλέκτοις means selected or picked.
    'Chosen foot soldiers' preserves both elements without importing a modern military
    register like 'elite infantry.'
