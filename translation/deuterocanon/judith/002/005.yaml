theological_decisions:
- issue: Rendering of κύριος in a royal-human context
  chosen_reading: lord
  alternative_readings:
  - master
  rationale: The project default for κύριος is 'Lord'/'lord' depending on context.
    Since this refers to an earthly king's self-description, lowercase 'lord' is appropriate
    and avoids importing divine identification while preserving the title's force.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
