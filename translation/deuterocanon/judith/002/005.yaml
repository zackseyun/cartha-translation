id: JDT.2.5
reference: Judith 2:5
source:
  edition: lxx-swete-1909
  text: Τάδε λέγει ὁ βασιλεὺς ὁ μέγας, ὁ κύριος πάσης τῆς γῆς Ἰδοὺ σὺ ἐξελεύσῃ ἐκ
    τοῦ προσώπου μου, καὶ λήμψῃ μετὰ σεαυτοῦ ἄνδρας πεποιθότας ἐν ἰσχύι αὐτῶν, πεζῶν
    εἰς χιλιάδας ἑκατὸν εἴκοσι καὶ πλῆθος ἵππων σὺν ἀναβάταις μυριάδας δέκα δύο,
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  - 803
  confidence: high
  validation: agree
translation:
  text: 'Thus says the great king, the lord of all the earth: Look, you shall go out
    from my presence, and you shall take with yourself men confident in their strength,
    one hundred twenty thousand foot soldiers, and a multitude of horses with riders,
    twelve myriads.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'twelve myriads,' that is, 120,000.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τάδε λέγει
  chosen: Thus says
  alternatives:
  - These things says
  - This is what ... says
  lexicon: LSJ
  rationale: Standard messenger-formula idiom; 'Thus says' is natural English and
    preserves the formal proclamation tone.
- source_word: ὁ βασιλεὺς ὁ μέγας
  chosen: the great king
  alternatives:
  - the king, the great one
  - the mighty king
  lexicon: LSJ
  rationale: Keeps the appositional royal title straightforwardly and reflects the
    elevated court style.
- source_word: ὁ κύριος πάσης τῆς γῆς
  chosen: the lord of all the earth
  alternatives:
  - the master of all the earth
  - the ruler of all the land
  lexicon: LSJ
  rationale: κύριος is rendered 'lord' per project default. Here it is a royal boast,
    not a divine title, but 'lord' still best matches the Greek claim. γῆ can mean
    'earth' or 'land'; the universalizing phrase πάσης τῆς γῆς favors 'all the earth.'
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: LSJ
  rationale: Readable modern English that still preserves the deictic force of the
    command.
- source_word: ἐξελεύσῃ ἐκ τοῦ προσώπου μου
  chosen: you shall go out from my presence
  alternatives:
  - you shall depart from before me
  - you shall go forth from my face
  lexicon: LSJ
  rationale: A formal royal dismissal/commissioning formula. 'From my presence' preserves
    the idiom τοῦ προσώπου μου without wooden literalism.
- source_word: λήμψῃ μετὰ σεαυτοῦ
  chosen: you shall take with yourself
  alternatives:
  - you shall take with you
  - you shall bring along
  lexicon: LSJ
  rationale: Reflects the middle nuance and the accompanying force of μετὰ σεαυτοῦ.
    Slightly formal wording suits the proclamation style.
- source_word: ἄνδρας πεποιθότας ἐν ἰσχύι αὐτῶν
  chosen: men confident in their strength
  alternatives:
  - men trusting in their strength
  - men relying on their might
  - strong men
  lexicon: LSJ
  rationale: πεποιθότας denotes confidence/trust, not merely physical strength. The
    phrase describes men who rely on their own military power.
- source_word: πεζῶν
  chosen: foot soldiers
  alternatives:
  - infantry
  - men on foot
  lexicon: LSJ
  rationale: Clarifies the military sense in idiomatic English while remaining close
    to the Greek.
- source_word: εἰς χιλιάδας ἑκατὸν εἴκοσι
  chosen: one hundred twenty thousand
  alternatives:
  - to one hundred twenty thousands
  lexicon: LSJ
  rationale: Idiomatic rendering of the Greek numeral expression; the sense is a total
    of 120,000 infantry.
- source_word: πλῆθος ἵππων σὺν ἀναβάταις
  chosen: a multitude of horses with riders
  alternatives:
  - a multitude of cavalry
  - many horses together with riders
  lexicon: LSJ
  rationale: The Greek explicitly mentions horses and riders rather than using a single
    abstract term for cavalry, so the translation preserves that imagery.
- source_word: μυριάδας δέκα δύο
  chosen: twelve myriads
  alternatives:
  - one hundred twenty thousand
  - twelve ten-thousands
  lexicon: LSJ
  rationale: A myriad is a specific Greek numerical unit of ten thousand. Retaining
    'twelve myriads' preserves the source expression and avoids silently harmonizing
    the style of the two number phrases, though the total equals 120,000.
