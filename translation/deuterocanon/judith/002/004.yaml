id: JDT.2.4
reference: Judith 2:4
source:
  edition: lxx-swete-1909
  text: καὶ ἐγένετο ὡς συνετέλεσεν τὴν βουλὴν αὐτοῦ, ἐκάλεσεν Ναβουχοδονοσὸρ βασιλεὺς
    Ἀσσυρίων τὸν Ὀλοφέρνην ἀρχιστράτηγον τῆς δυνάμεως αὐτοῦ, δεύτερον ὄντα μετʼ αὐτόν,
    καὶ εἶπεν πρὸς αὐτόν
  language: Greek
