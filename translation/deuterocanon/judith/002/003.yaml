theological_decisions:
- issue: Rendering of σάρξ in a non-Pauline, literal/idiomatic context
  chosen_reading: all flesh
  alternative_readings:
  - everyone
  - all humanity
  rationale: Per doctrine, σάρξ is rendered 'flesh' when literal or idiomatic rather
    than metaphorical 'sinful nature.' Here the phrase is an idiom for the totality
    of those targeted, and preserving 'all flesh' maintains biblical texture without
    importing Pauline theology.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ; Translation philosophy
    #5'
