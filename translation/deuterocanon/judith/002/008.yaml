id: JDT.2.8
reference: Judith 2:8
source:
  edition: lxx-swete-1909
  text: καὶ οἱ τραυματίαι αὐτῶν πληρώσουσιν τὰς φάραγγας αὐτῶν καὶ τοὺς χειμάρρους,
    καὶ ποταμὸς ἐπικλύζων τοῖς νεκροῖς αὐτῶν πληρωθήσεται·
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  - 803
  confidence: high
  validation: agree
translation:
  text: And their wounded will fill their ravines and the wadis, and an overflowing
    river will be filled with their dead;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the winter torrents” or “the streambeds.” The Greek term refers to a
      seasonal torrent channel.
    reason: lexical_alternative
lexical_decisions:
- source_word: τραυματίαι
  chosen: wounded
  alternatives:
  - wounded men
  - casualties
  lexicon: LSJ
  rationale: The noun denotes those who have been wounded. 'Wounded' is concise and
    natural in English; 'wounded men' adds gender not explicit in the form, and 'casualties'
    is broader than the Greek.
- source_word: πληρώσουσιν
  chosen: will fill
  alternatives:
  - will fill up
  lexicon: LSJ
  rationale: A straightforward future of πληρόω. 'Will fill' preserves the vivid military
    image without unnecessary expansion.
- source_word: φάραγγας
  chosen: ravines
  alternatives:
  - gorges
  - valleys
  lexicon: LSJ
  rationale: The term refers to ravines or mountain gorges. 'Ravines' is natural modern
    English and more specific than 'valleys'; 'gorges' is possible but slightly less
    common.
- source_word: χειμάρρους
  chosen: wadis
  alternatives:
  - winter torrents
  - streambeds
  - brooks
  lexicon: LSJ
  rationale: χείμαρρος often denotes a seasonal torrent or torrent-bed. In this Near
    Eastern military setting, 'wadis' communicates the idea of normally dry channels
    that can flood, better than the misleadingly gentle 'brooks.'
- source_word: ποταμὸς ἐπικλύζων
  chosen: a river overflowing
  alternatives:
  - an overflowing river
  - a flooding river
  lexicon: LSJ
  rationale: The participle ἐπικλύζων describes inundating or overflowing. 'A river
    overflowing' keeps the Greek order and the image of floodwaters swelling with
    corpses.
- source_word: τοῖς νεκροῖς
  chosen: with their dead
  alternatives:
  - with their corpses
  - with the dead of them
  lexicon: LSJ
  rationale: νεκροί can mean dead persons or corpses. 'With their dead' is idiomatic
    and preserves the grim sense without over-literal awkwardness.
