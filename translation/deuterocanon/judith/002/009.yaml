  confidence: high
  validation: agree
translation:
  text: And I will lead their captives to the ends of all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their captivity,' if αἰχμαλωσίαν is taken abstractly rather than as
      referring to the captives themselves.
    reason: lexical_alternative
  - marker: b
    text: Greek γῆ can mean 'land' or 'earth'; here 'earth' is chosen because the
      phrase 'to the ends' suggests a world-spanning claim.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄξω
  chosen: I will lead
  alternatives:
  - I will bring
  - I will drive
  lexicon: LSJ
  rationale: Future of ἄγω, commonly 'lead' or 'bring.' 'Lead' fits the sense of conducting
    captives away and preserves the active, forceful movement without over-specifying
    manner.
- source_word: αἰχμαλωσίαν
  chosen: captives
  alternatives:
  - captivity
  - the captive company
  lexicon: LSJ
  rationale: Although the noun can denote 'captivity' as a state or 'a body of captives,'
    in this context with possessive αὐτῶν and the verb of leading, English 'their
    captives' most naturally conveys the people taken captive rather than the abstract
    condition.
- source_word: ἐπὶ τὰ ἄκρα
  chosen: to the ends
  alternatives:
  - to the extremities
  - to the farthest parts
  lexicon: LSJ
  rationale: The idiom refers to remote extremities. 'To the ends' is idiomatic modern
    English and preserves the geographic breadth of the Greek.
- source_word: πάσης τῆς γῆς
  chosen: of all the earth
  alternatives:
  - of the whole land
  - of the whole earth
  lexicon: LSJ
  rationale: γῆ can mean 'land' or 'earth.' Given the expansive phrase 'to the ends'
    and the imperial boast in context, 'all the earth' better reflects the universalizing
    rhetoric than a more local 'land'.
