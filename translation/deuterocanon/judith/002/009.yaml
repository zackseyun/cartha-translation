id: JDT.2.9
reference: Judith 2:9
source:
  edition: lxx-swete-1909
  text: καὶ ἄξω τὴν αἰχμαλωσίαν αὐτῶν ἐπὶ τὰ ἄκρα πάσης τῆς γῆς.
  language: Greek
  pages:
  - 798
