id: JDT.2.27
reference: Judith 2:27
source:
  edition: lxx-swete-1909
  text: καὶ κατέβη εἰς πεδίον Δαμασκοῦ ἐν ἡμέραις θερισμοῦ πυρῶν καὶ ἐνέπρησεν πάντας
    τοὺς ἀγροὺς αὐτῶν, τὰ ποίμνια καὶ τὰ βουκόλια ἔδωκεν εἰς ἀφανισμόν, καὶ τὰς πόλεις
    αὐτῶν ἐσκύλευσεν καὶ τὰ πεδία αὐτῶν ἐξελίκμησεν, καὶ ἐπάταξεν πάντας τοὺς νεανίσκους
    αὐτῶν ἐν στόματι ῥομφαίας.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  - 803
  confidence: high
  validation: agree
translation:
  text: And he went down into the plain of Damascus in the days of the wheat harvest,
    and he set all their fields on fire; their flocks and herds he gave over to destruction,
    and he plundered their cities and stripped bare their plains, and struck down
    all their young men with the edge of the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'with the mouth of the sword,' an idiom meaning death by the
      sword.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέβη
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: BDAG
  rationale: The verb literally means 'went down/descended.' 'Went down' is natural
    English and preserves the directional sense without over-formality.
- source_word: πεδίον Δαμασκοῦ
  chosen: the plain of Damascus
  alternatives:
  - the plain near Damascus
  - the region of Damascus
  lexicon: LSJ
  rationale: πεδίον denotes a plain or open level land. The genitive is best taken
    as a geographic designation, 'the plain of Damascus.'
- source_word: ἐν ἡμέραις θερισμοῦ πυρῶν
  chosen: in the days of the wheat harvest
  alternatives:
  - at the time of the wheat harvest
  - during the wheat harvest
  lexicon: LSJ
  rationale: This phrase is idiomatic for the harvest season. πυρῶν refers specifically
    to wheat, so 'wheat harvest' is more precise than simply 'harvest.'
- source_word: ἐνέπρησεν
  chosen: set ... on fire
  alternatives:
  - burned
  - kindled against
  lexicon: LSJ
  rationale: The verb means to set ablaze or burn. 'Set ... on fire' preserves the
    causative force and reads clearly in English.
- source_word: ἀγροὺς
  chosen: fields
  alternatives:
  - farmlands
  - country estates
  lexicon: LSJ
  rationale: In this context of agricultural devastation, 'fields' best matches the
    sense of cultivated land.
- source_word: τὰ ποίμνια καὶ τὰ βουκόλια
  chosen: their flocks and herds
  alternatives:
  - their sheepfolds and cattle
  - their livestock
  lexicon: LSJ
  rationale: ποίμνια refers to flocks, while βουκόλια refers to herds/cattle. 'Flocks
    and herds' preserves the paired distinction better than the broader 'livestock.'
- source_word: ἔδωκεν εἰς ἀφανισμόν
  chosen: gave over to destruction
  alternatives:
  - destroyed utterly
  - consigned to annihilation
  lexicon: LSJ
  rationale: The construction is literally 'gave over to destruction.' This preserves
    the Greek idiom and the severity of the action without over-paraphrase.
- source_word: ἐσκύλευσεν
  chosen: plundered
  alternatives:
  - despoiled
  - sacked
  lexicon: BDAG
  rationale: The verb denotes taking spoil. 'Plundered' is direct, idiomatic, and
    appropriately forceful.
- source_word: ἐξελίκμησεν
  chosen: stripped bare
  alternatives:
  - laid waste
  - gleaned clean
  - ravaged
  lexicon: LSJ
  rationale: The verb has the sense of stripping clean, as by thorough gleaning or
    complete devastation. 'Stripped bare' preserves the vivid image and avoids flattening
    it into a generic term.
- source_word: τὰ πεδία αὐτῶν
  chosen: their plains
  alternatives:
  - their open country
  - their fields
  lexicon: LSJ
  rationale: Since ἀγροὺς earlier already refers to agricultural fields, rendering
    πεδία here as 'plains' keeps the lexical distinction visible.
- source_word: ἐπάταξεν
  chosen: struck down
  alternatives:
  - killed
  - smote
  lexicon: BDAG
  rationale: The verb commonly means to strike or strike down. 'Struck down' fits
    the martial context and leaves the instrument phrase to complete the sense.
- source_word: νεανίσκους
  chosen: young men
  alternatives:
  - youths
  - young warriors
  lexicon: BDAG
  rationale: The term denotes young men or youths. 'Young men' is the most straightforward
    and gender-accurate rendering.
- source_word: ἐν στόματι ῥομφαίας
  chosen: with the edge of the sword
  alternatives:
  - by the mouth of the sword
  - with the sword's mouth
  lexicon: LSJ
  rationale: This is a standard Semitic-influenced idiom in Greek. 'With the edge
    of the sword' gives the established English equivalent while accurately conveying
    the literal sense.
