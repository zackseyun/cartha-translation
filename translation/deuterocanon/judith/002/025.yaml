  confidence: high
  validation: agree
translation:
  text: And he seized the territory of Cilicia, and cut down all who resisted him,
    and came as far as the borders of Japheth, toward the south, opposite Arabia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads 'Japheth.' The location is uncertain; some interpreters connect
      it with a more familiar place-name, but the source text itself is preserved
      here without emendation.
    reason: alternative_reading
lexical_decisions:
- source_word: κατελάβετο
  chosen: seized
  alternatives:
  - occupied
  - took possession of
  - captured
  lexicon: LSJ
  rationale: The middle of καταλαμβάνω here denotes taking control of territory. 'Seized'
    conveys forceful acquisition without over-specifying military mechanics.
- source_word: τὰ ὅρια
  chosen: the territory
  alternatives:
  - the borders
  - the region
  lexicon: LSJ
  rationale: Although literally 'the borders/boundaries,' in context with a land name
    it functions metonymically for the territorial extent of Cilicia. Rendering the
    first instance as 'territory' reads naturally in English while preserving the
    geopolitical sense.
- source_word: Κιλικίας
  chosen: Cilicia
  rationale: Standard English transliteration of the place name Κιλικία.
- source_word: κατέκοψε
  chosen: cut down
  alternatives:
  - destroyed
  - killed
  - struck down
  lexicon: LSJ
  rationale: The verb literally suggests cutting down and in military context refers
    to violent slaughter. 'Cut down' preserves the vivid force without becoming wooden.
- source_word: πάντας τοὺς ἀντιστάντας αὐτῷ
  chosen: all who resisted him
  alternatives:
  - all those opposing him
  - all who stood against him
  lexicon: LSJ
  rationale: The participle ἀντιστάντας denotes active resistance or opposition. 'All
    who resisted him' is clear and faithful.
- source_word: ἦλθεν ἕως ὁρίων
  chosen: came as far as the borders
  alternatives:
  - advanced as far as the boundary
  - reached the borders
  lexicon: LSJ
  rationale: Here ὅρια is best rendered literally as 'borders' because the phrase
    marks the limit of advance rather than the whole territory.
- source_word: Ἰάφεθ
  chosen: Japheth
  alternatives:
  - Japheth/Joppa?
  lexicon: LSJ
  rationale: The Greek witness reads Ἰάφεθ, so the draft preserves the transmitted
    place name by transliteration rather than emending to a more familiar toponym.
- source_word: τὰ πρὸς νότον
  chosen: toward the south
  alternatives:
  - on the south side
  - the southern part
  lexicon: LSJ
  rationale: This phrase indicates southern orientation or location. 'Toward the south'
    is concise and natural.
- source_word: κατὰ πρόσωπον τῆς Ἀραβίας
  chosen: opposite Arabia
  alternatives:
  - facing Arabia
  - in front of Arabia
  lexicon: LSJ
  rationale: The idiom κατὰ πρόσωπον commonly means 'opposite' or 'facing.' 'Opposite
    Arabia' best fits a geographical description in English.
