id: JDT.2.25
reference: Judith 2:25
source:
  edition: lxx-swete-1909
  text: καὶ κατελάβετο τὰ ὅρια τῆς Κιλικίας, καὶ κατέκοψε πάντας τοὺς ἀντιστάντας
    αὐτῷ, καὶ ἦλθεν ἕως ὁρίων Ἰάφεθ τὰ πρὸς νότον κατὰ πρόσωπον τῆς Ἀραβίας.
  language: Greek
  pages:
