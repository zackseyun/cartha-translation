id: JDT.2.28
reference: Judith 2:28
source:
  edition: lxx-swete-1909
  text: Καὶ ἐπέπεσεν φόβος καὶ τρόμος αὐτοῦ ἐπὶ τοὺς κατοικοῦντας τὴν παραλίαν, τοὺς
    ὄντας ἐν Σιδῶνι καὶ Τύρῳ, καὶ τοὺς κατοικοῦντας Ἀσσούρ καὶ Ὀκεινὰ, καὶ πάντας
    τοὺς κατοικοῦντας Ἰεμνάν, καὶ οἱ κατοικοῦντες ἐν Ἀζώτῳ καὶ Ἀσκάλωνι ἐφοβήθησαν
    αὐτὸν σφόδρα.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  - 803
  confidence: high
  validation: agree
translation:
  text: And fear and dread of him fell upon those living along the coast—those in
    Sidon and Tyre, those living in Assur and Ocina, and all those living in Jamnia;
    and those living in Azotus and Ascalon were very greatly afraid of him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Azotus is the Greek name for Ashdod; Ascalon is the Greek name for Ashkelon.
    reason: lexical_alternative
  - marker: b
    text: Some English renderings use 'fear and trembling' for the Greek pair 'fear
      and dread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέπεσεν
  chosen: fell upon
  alternatives:
  - came upon
  - descended upon
  lexicon: BDAG
  rationale: The verb ἐπιπίπτω commonly means 'fall upon' or 'come upon.' 'Fell upon'
    preserves the vivid idiom and the aorist narrative force without over-paraphrasing.
- source_word: φόβος καὶ τρόμος
  chosen: fear and dread
  alternatives:
  - fear and trembling
  - terror and fear
  lexicon: BDAG
  rationale: The pair denotes intense alarm. 'Fear and dread' is natural English and
    avoids the more idiomatic 'fear and trembling,' which in English can sound formulaic
    or allusive beyond this context.
- source_word: αὐτοῦ
  chosen: of him
  alternatives:
  - from him
  - caused by him
  lexicon: BDAG
  rationale: The genitive after φόβος/τρόμος can indicate the object inspiring fear.
    'Of him' is a close rendering and leaves the relation transparent.
- source_word: τοὺς κατοικοῦντας τὴν παραλίαν
  chosen: those living along the coast
  alternatives:
  - those inhabiting the seacoast
  - those dwelling in the coastal region
  lexicon: LSJ
  rationale: παραλία refers to the coast/coastal region. Because κατοικέω with an
    accusative place can mean 'inhabit' a region, 'living along the coast' gives clear
    modern English while staying close to the Greek sense.
- source_word: τοὺς ὄντας ἐν Σιδῶνι καὶ Τύρῳ
  chosen: those in Sidon and Tyre
  alternatives:
  - those who were in Sidon and Tyre
  - those dwelling in Sidon and Tyre
  lexicon: BDAG
  rationale: The participle ὄντας is semantically light here, identifying the inhabitants
    by location. 'Those in Sidon and Tyre' is concise and natural.
- source_word: Ἀσσούρ
  chosen: Assur
  alternatives:
  - Asur
  - Assyria
  lexicon: LSJ
  rationale: This is a place name and should be transliterated rather than interpreted.
    'Assur' preserves the Greek form more directly than 'Assyria,' which would suggest
    a larger region not clearly intended by the immediate syntax.
- source_word: Ὀκεινὰ
  chosen: Ocina
  alternatives:
  - Oceina
  - Okeina
  lexicon: LSJ
  rationale: This is a transliterated place name of uncertain familiar English form.
    'Ocina' offers a straightforward Anglicized transliteration from the Greek while
    preserving the proper-name character.
- source_word: Ἰεμνάν
  chosen: Jamnia
  alternatives:
  - Jemnaan
  - Jemnan
  lexicon: LSJ
  rationale: The place is commonly identified with Jamnia/Yamnia. 'Jamnia' is a standard
    English form and more recognizable than a strictly mechanical transliteration.
- source_word: Ἀζώτῳ
  chosen: Azotus
  alternatives:
  - Ashdod
  lexicon: LSJ
  rationale: Since the source text is Greek and uses the Hellenized place name, 'Azotus'
    is the most direct translation. 'Ashdod' reflects the Hebrew form and is worth
    preserving in a footnote rather than replacing the Greek witness.
- source_word: Ἀσκάλωνι
  chosen: Ascalon
  alternatives:
  - Ashkelon
  lexicon: LSJ
  rationale: As with Azotus, the Greek text has the Hellenized form. 'Ascalon' follows
    the source directly, while 'Ashkelon' reflects the Hebrew form and can be noted
    as an alternative.
- source_word: ἐφοβήθησαν αὐτὸν σφόδρα
  chosen: were very greatly afraid of him
  alternatives:
  - feared him greatly
  - were exceedingly afraid of him
  lexicon: BDAG
  rationale: ἐφοβήθησαν with accusative αὐτόν means 'feared him,' and σφόδρα intensifies
    strongly. 'Were very greatly afraid of him' preserves the emphatic force, though
    slightly fuller than a bare 'feared him greatly.'
