  confidence: high
  validation: agree
translation:
  text: But against those who disobey, your eye shall not spare; you shall give them
    over to slaughter and plunder throughout all your land.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπειθοῦντας
  chosen: those who disobey
  alternatives:
  - those who are disobedient
  - those who refuse to obey
  lexicon: BDAG
  rationale: The participle denotes persons refusing obedience. 'Those who disobey'
    is natural English and preserves the active sense better than the more static
    'the disobedient.'
- source_word: οὐ φείσεται ὁ ὀφθαλμός σου
  chosen: your eye shall not spare
  alternatives:
  - your eye shall not pity
  - you shall show no mercy
  lexicon: LSJ
  rationale: This is an idiomatic expression meaning to withhold pity or sparing.
    Retaining 'your eye' preserves the Greek imagery while remaining intelligible
    in English.
- source_word: δοῦναι αὐτοὺς
  chosen: you shall give them over
  alternatives:
  - to hand them over
  - to give them
  lexicon: BDAG
  rationale: 'Although the infinitive literally means ''to give them,'' in context
    it expresses the commanded result: delivering them up to violent treatment. ''Give
    them over'' is idiomatic and conveys that force.'
- source_word: εἰς φόνον
  chosen: to slaughter
  alternatives:
  - to killing
  - to death
  lexicon: LSJ
  rationale: φόνος here refers to violent killing. 'Slaughter' fits the military context
    better than the abstract 'killing' and is more specific than simply 'death.'
- source_word: ἁρπαγήν
  chosen: plunder
  alternatives:
  - spoil
  - seizure
  - pillage
  lexicon: LSJ
  rationale: In conquest context, ἁρπαγή denotes the taking of goods by force. 'Plunder'
    is clear modern English and suits the paired idea with slaughter.
- source_word: ἐν πάσῃ τῇ γῇ σου
  chosen: throughout all your land
  alternatives:
  - in all your land
  - through all your territory
  lexicon: LSJ
  rationale: ἐν with πᾶς and γῆ here indicates the full extent of the addressee's
    territory. 'Throughout all your land' communicates distributive scope naturally.
