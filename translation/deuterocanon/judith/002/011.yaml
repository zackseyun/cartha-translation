theological_decisions:
- issue: Degree of literalness in a violent military command
  chosen_reading: Retain the direct command and the anthropomorphic idiom without
    softening
  alternative_readings:
  - Render more dynamically as 'show them no mercy'
  rationale: The verse is a royal command of ruthless conquest. Softening the violence
    would undertranslate the Greek. At the same time, preserving 'your eye shall not
    spare' keeps the source imagery and avoids importing interpretive language beyond
    the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
