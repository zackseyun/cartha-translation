id: JDT.2.21
reference: Judith 2:21
source:
  edition: lxx-swete-1909
  text: καὶ ἐπῆλθον ἐκ Νινευὴ ὁδὸν τριῶν ἡμερῶν ἐπὶ πρόσωπον τοῦ πεδίου Βαικτειλαίθ,
    καὶ ἐπεστρατοπέδευσαν ἀπὸ Βαικτειλαὶθ πλησίον τοῦ ὄρους τοῦ ἐπʼ ἀρι-
  language: Greek
  pages:
  - 798
