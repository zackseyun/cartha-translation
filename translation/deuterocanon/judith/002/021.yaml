  confidence: high
  validation: minor_mismatch
translation:
  text: And they advanced from Nineveh a journey of three days to the front of the
    plain of Baikteileth, and they encamped from Baikteileth near the mountain that
    is at the left hand of upper Cilicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek line in the provided Swete transcription breaks off at 'ἐπʼ ἀρι-';
      the translation reflects the standard continuation understood as 'at the left
      hand of upper Cilicia.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐπῆλθον
  chosen: advanced
  alternatives:
  - came
  - went
  - marched
  lexicon: LSJ
  rationale: The verb can mean 'came upon,' 'went,' or in military/travel context
    'advanced' or 'marched.' Given the army's movement in context, 'advanced' preserves
    the sense of organized progress without over-militarizing beyond the verb itself.
- source_word: ὁδὸν τριῶν ἡμερῶν
  chosen: a journey of three days
  alternatives:
  - three days' journey
  - for three days
  lexicon: LSJ
  rationale: This idiom denotes distance measured by travel time. 'A journey of three
    days' is natural modern English and keeps the idiomatic force.
- source_word: ἐπὶ πρόσωπον
  chosen: to the front of
  alternatives:
  - before
  - opposite
  - in front of
  lexicon: LSJ
  rationale: Literally 'upon the face/front of.' In geographical description it indicates
    approach to the area facing or before the plain. 'To the front of' keeps the spatial
    imagery more closely than a flatter 'to' or 'before.'
- source_word: πεδίου
  chosen: plain
  alternatives:
  - field
  - open country
  lexicon: LSJ
  rationale: In this topographical context, 'plain' is the most fitting geographical
    term.
- source_word: Βαικτειλαίθ / Βαικτειλαὶθ
  chosen: Baikteileth
  alternatives:
  - Bectileth
  - Baikteilath
  rationale: This is a place name; transliteration is preferred by project philosophy.
    The same place name appears with minor orthographic variation in the verse, so
    one consistent English transliteration is used.
- source_word: ἐπεστρατοπέδευσαν
  chosen: they encamped
  alternatives:
  - they camped
  - they pitched camp
  lexicon: LSJ
  rationale: The compound verb specifically denotes making camp, often in military
    context. 'They encamped' is concise and suitably formal.
- source_word: ἀπὸ Βαικτειλαὶθ
  chosen: from Baikteileth
  alternatives:
  - at Baikteileth
  - starting from Baikteileth
  lexicon: LSJ
  rationale: The preposition ἀπό normally means 'from.' Although the geography is
    somewhat awkward in English, the source text should be followed rather than smoothed
    away.
- source_word: πλησίον
  chosen: near
  alternatives:
  - close to
  - by
  lexicon: LSJ
  rationale: Standard spatial sense; 'near' is the clearest modern rendering.
- source_word: τοῦ ὄρους
  chosen: the mountain
  alternatives:
  - the hill-country
  - the hill
  lexicon: LSJ
  rationale: The singular noun most naturally refers to a mountain or mountainous
    height. 'Mountain' is the straightforward rendering.
- source_word: τοῦ ἐπʼ ἀριστερὰς
  chosen: that is at the left hand of
  alternatives:
  - which is on the left of
  - west of
  lexicon: LSJ
  rationale: The surviving Swete line breaks after ἀρι-, but the phrase is conventionally
    restored as ἐπ' ἀριστεράς, 'on the left side.' A literal rendering preserves the
    directional expression without forcing an interpretive equivalent such as 'west
    of.'
- source_word: τῆς ἄνω Κιλικίας
  chosen: upper Cilicia
  alternatives:
  - Upper Cilicia
  rationale: 'A regional designation. Lowercase ''upper'' is acceptable in running
    English, but the proper name ''Cilicia'' is retained. The phrase likely modifies
    the directional clause: the mountain lies at the left hand of upper Cilicia.'
