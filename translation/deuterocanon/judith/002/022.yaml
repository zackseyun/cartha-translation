id: JDT.2.22
reference: Judith 2:22
source:
  edition: lxx-swete-1909
  text: στερᾶς τῆς ἄνω Κιλικίας. καὶ ἔλαβεν πᾶσαν τὴν δύναμιν αὐτοῦ, τοὺς πεζοὺς καὶ
    τοὺς ἱππεῖς καὶ τὰ ἅρματα αὐτοῦ, καὶ ἀπῆλθεν εἰς τὴν ὀρεινήν.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  - 803
  confidence: high
  validation: minor_mismatch
translation:
  text: of the strongholds of upper Cilicia. And he took all his forces, the foot
    soldiers and the horsemen and his chariots, and went away into the hill country.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening phrase, 'of the strongholds of upper Cilicia,' is a sentence
      fragment in the surviving Greek here and appears to complete the thought of
      the preceding verse.
    reason: textual_variant
lexical_decisions:
- source_word: στερᾶς
  chosen: strongholds
  alternatives:
  - fortresses
  - defenses
  lexicon: LSJ
  rationale: The form is best understood in context as referring to fortified places
    or strong points. 'Strongholds' is natural English and preserves the military
    sense better than the vaguer 'defenses.' Because the phrase is a fragment continuing
    the prior sentence, it is rendered as 'of the strongholds of upper Cilicia.'
- source_word: ἄνω Κιλικίας
  chosen: upper Cilicia
  alternatives:
  - Upper Cilicia
  lexicon: LSJ
  rationale: ἄνω means 'upper' in a geographic sense. Lowercase 'upper' fits normal
    English style for a descriptive regional designation.
- source_word: δύναμιν
  chosen: forces
  alternatives:
  - army
  - power
  - strength
  lexicon: LSJ
  rationale: In this military context δύναμις refers to armed force rather than abstract
    power. 'Forces' is broad enough to include infantry, cavalry, and chariots, which
    the verse immediately specifies.
- source_word: πεζοὺς
  chosen: foot soldiers
  alternatives:
  - infantry
  - footmen
  lexicon: LSJ
  rationale: πεζοί are those fighting on foot. 'Foot soldiers' is clear modern English
    and slightly more accessible than 'infantry' while preserving the military distinction.
- source_word: ἱππεῖς
  chosen: horsemen
  alternatives:
  - cavalry
  - mounted troops
  lexicon: LSJ
  rationale: The term denotes mounted fighters. 'Horsemen' keeps the concrete imagery
    of the Greek; 'cavalry' would also fit but is a more institutional term.
- source_word: ἅρματα
  chosen: chariots
  alternatives:
  - war chariots
  lexicon: LSJ
  rationale: The standard military sense is 'chariots.' Adding 'war' would be interpretive
    and unnecessary in context.
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - went
  lexicon: LSJ
  rationale: The verb marks departure from the prior location. 'Went away' captures
    the movement plainly in readable English.
- source_word: ὀρεινήν
  chosen: the hill country
  alternatives:
  - the mountainous region
  - the highlands
  lexicon: LSJ
  rationale: As a substantive adjective, it denotes the hill or mountain region. 'Hill
    country' is idiomatic biblical English without sounding archaic.
