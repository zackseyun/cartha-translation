  confidence: high
  validation: agree
translation:
  text: And you shall go out to meet all the land in the west, because they disobeyed
    the word of my mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward the west' / 'westward.' The Greek phrase ἐπὶ δυσμᾶς can denote
      direction as well as region.
    reason: lexical_alternative
  - marker: b
    text: The expression 'the word of my mouth' is a literal rendering of a Greek
      phrase meaning a spoken command or decree.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελεύσῃ
  chosen: you shall go out
  alternatives:
  - you will march out
  - you shall set out
  lexicon: LSJ
  rationale: Future middle of ἐξέρχομαι, here a command-like prediction in direct
    speech. 'Go out' preserves the basic motion without over-specifying military nuance,
    though the context is martial.
- source_word: εἰς συνάντησιν
  chosen: to meet
  alternatives:
  - for an encounter with
  - against
  lexicon: LSJ
  rationale: The idiom ἐξέρχομαι εἰς συνάντησιν commonly means 'go out to meet.' In
    this military context it implies confrontation, but 'to meet' keeps the Greek
    wording while allowing the hostile sense to arise from context.
- source_word: πάσῃ τῇ γῇ
  chosen: all the land
  alternatives:
  - the whole land
  - every land
  lexicon: LSJ
  rationale: Singular γῇ with πᾶς is best taken collectively as a territorial whole
    rather than distributive 'every land.' 'All the land' is a natural English rendering.
- source_word: ἐπὶ δυσμᾶς
  chosen: in the west
  alternatives:
  - toward the west
  - westward
  lexicon: LSJ
  rationale: The phrase denotes western direction or region. 'In the west' reads smoothly
    with 'all the land' as a geographic designation.
- source_word: ἠπείθησαν
  chosen: they disobeyed
  alternatives:
  - they refused to obey
  - they were disobedient to
  lexicon: LSJ
  rationale: Aorist of ἀπειθέω. 'Disobeyed' is concise and captures refusal to heed
    a command.
- source_word: τῷ ῥήματι τοῦ στόματός μου
  chosen: the word of my mouth
  alternatives:
  - my spoken word
  - the command from my mouth
  lexicon: LSJ
  rationale: A literal genitival expression emphasizing spoken command. 'The word
    of my mouth' preserves the force and rhetoric of the Greek better than a flattened
    paraphrase.
