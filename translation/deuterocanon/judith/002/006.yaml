reference: Judith 2:6
source:
  edition: lxx-swete-1909
  text: καὶ ἐξελεύσῃ εἰς συνάντησιν πάσῃ τῇ γῇ ἐπὶ δυσμᾶς, ὅτι ἠπείθησαν τῷ ῥήματι
    τοῦ στόματός μου·
  language: Greek
  pages:
