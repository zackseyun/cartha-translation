id: JDT.2.15
reference: Judith 2:15
source:
  edition: lxx-swete-1909
  text: καὶ ἠρίθμησεν ἐκλεκτοὺς ἄνδρας εἰς παράταξιν, καθότι ἐκέλευσεν αὐτῷ ὁ κύριος
    αὐτοῦ, εἰς μυριάδας δέκα δύο καὶ ἱππεῖς τοξότας μυρίους δισχιλίους,
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  - 803
  confidence: high
  validation: agree
translation:
  text: 'And he counted out chosen men for battle formation, just as his lord had
    commanded him: one hundred twenty thousand, and twelve thousand mounted archers,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''twelve myriads'' and ''twelve thousand.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρίθμησεν
  chosen: counted out
  alternatives:
  - numbered
  - counted
  - mustered
  lexicon: LSJ
  rationale: The verb means to count or enumerate. 'Counted out' preserves the concrete
    act of assigning a number, while fitting the military context without over-interpreting
    it as a formal muster.
- source_word: ἐκλεκτοὺς ἄνδρας
  chosen: chosen men
  alternatives:
  - picked men
  - select men
  - chosen warriors
  lexicon: LSJ
  rationale: ἐκλεκτούς denotes selected or choice persons; ἄνδρας is explicitly masculine/plural.
    'Chosen men' is concise and gender-accurate to the source.
- source_word: εἰς παράταξιν
  chosen: for battle formation
  alternatives:
  - for deployment
  - for array
  - for battle line
  lexicon: LSJ
  rationale: παράταξις commonly refers to battle order or military formation. 'For
    battle formation' communicates the military sense clearly in modern English.
- source_word: καθότι
  chosen: just as
  alternatives:
  - according as
  - as
  lexicon: LSJ
  rationale: This comparative conjunction links the action to the prior command. 'Just
    as' is natural English and preserves the sense of conformity.
- source_word: ὁ κύριος αὐτοῦ
  chosen: his lord
  alternatives:
  - his master
  - his Lord
  lexicon: LSJ
  rationale: In Judith this refers to Holofernes' superior, not to God. Lowercase
    'lord' avoids importing divine reference while preserving the hierarchical title.
- source_word: εἰς μυριάδας δέκα δύο
  chosen: one hundred twenty thousand
  alternatives:
  - twelve myriads
  - 120,000
  lexicon: LSJ
  rationale: A myriad is ten thousand; δέκα δύο here yields twelve myriads. Rendering
    the total in standard English is clearer for readers while remaining exact.
- source_word: ἱππεῖς τοξότας
  chosen: mounted archers
  alternatives:
  - horsemen archers
  - cavalry archers
  - archer horsemen
  lexicon: LSJ
  rationale: The phrase combines cavalry and archery. 'Mounted archers' is idiomatic
    modern English and accurately conveys horsemen equipped as archers.
- source_word: μυρίους δισχιλίους
  chosen: twelve thousand
  alternatives:
  - a myriad and two thousand
  - 10,000 and 2,000
  lexicon: LSJ
  rationale: The numeral expression totals 12,000. Rendering the summed number directly
    avoids awkwardness and preserves the quantity.
