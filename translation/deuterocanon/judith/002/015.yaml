- issue: Rendering κύριος in a non-divine military hierarchy context
  chosen_reading: his lord
  alternative_readings:
  - his master
  rationale: Although κύριος defaults to 'Lord' in the project's contested-terms guidance,
    here the referent is plainly a human superior. Lowercase 'lord' best matches the
    source sense without suggesting deity.
