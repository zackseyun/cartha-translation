translation:
  text: And he encircled all the sons of Midian, and burned their encampments, and
    plundered their sheepfolds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the Midianites.' The Greek reads more literally, 'all the sons of
      Midian.'
    reason: lexical_alternative
  - marker: b
    text: Or 'pens' or 'animal enclosures' for 'sheepfolds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκύκλωσεν
  chosen: encircled
  alternatives:
  - surrounded
  - went around
  lexicon: LSJ
  rationale: The verb from κυκλόω literally denotes surrounding or encircling. 'Encircled'
    preserves the military sense and the imagery of moving around them more closely
    than the more generic 'surrounded.'
- source_word: πάντας τοὺς υἱοὺς Μαδιάμ
  chosen: all the sons of Midian
  alternatives:
  - all the Midianites
  - all the descendants of Midian
  lexicon: LSJ
  rationale: The Greek is literally 'all the sons of Midian.' Because this is an ethnogeographic
    expression, 'Midianites' would be idiomatic, but the more literal rendering preserves
    the source wording and biblical style without becoming unclear.
- source_word: ἐνέπρησεν
  chosen: burned
  alternatives:
  - set on fire
  - burned down
  lexicon: LSJ
  rationale: The verb means to set ablaze or burn. 'Burned' is concise and natural;
    'burned down' would add a nuance of total destruction not explicitly stated.
- source_word: τὰ σκηνώματα
  chosen: encampments
  alternatives:
  - tents
  - dwellings
  - camp-sites
  lexicon: LSJ
  rationale: While related to tents, the plural here likely refers to the settled
    tent-complexes or camp dwellings of a nomadic people. 'Encampments' captures the
    collective sense better than the narrower 'tents.'
- source_word: ἐπρονόμευσεν
  chosen: plundered
  alternatives:
  - ravaged
  - took as spoil
  - sacked
  lexicon: LSJ
  rationale: The verb means to take as booty or plunder. 'Plundered' is the clearest
    modern equivalent and fits the military context.
- source_word: τὰς μάνδρας
  chosen: sheepfolds
  alternatives:
  - folds
  - pens
  - enclosures
  lexicon: LSJ
  rationale: μάνδρα denotes an enclosed place for animals, especially a fold or pen.
    'Sheepfolds' is a standard biblical-English equivalent, though the term can be
    broader than sheep alone; it best conveys the pastoral setting.
