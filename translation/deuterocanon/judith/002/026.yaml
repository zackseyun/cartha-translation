  text: καὶ ἐκύκλωσεν πάντας τοὺς υἱοὺς Μαδιάμ, καὶ ἐνέπρησεν τὰ σκηνώματα αὐτῶν,
    καὶ ἐπρονόμευσεν τὰς μάνδρας αὐτῶν.
