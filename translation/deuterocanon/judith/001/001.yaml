id: JDT.1.1
reference: Judith 1:1
source:
  edition: lxx-swete-1909
  text: ἜΤΟΥΣ δωδεκάτου τῆς βασιλείας Ναβουχοδονοσόρ, ὃς ἐβασίλευσεν Ἀσσυρίων ἐν Νινευῇ
    τῇ πόλει τῇ μεγάλῃ, ἐν ταῖς ἡμέραις Ἀρφαξάδ, ὃς ἐβασίλευσεν Μήδων ἐν Ἐκβατάνοις
    καὶ
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  confidence: high
  validation: agree
translation:
  text: In the twelfth year of the reign of Nebuchadnezzar, who reigned over the Assyrians
    in Nineveh, the great city, in the days of Arphaxad, who reigned over the Medes
    in Ecbatana,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text ends with 'and,' continuing directly into the next verse;
      the English uses a comma to reflect the unfinished sentence more naturally.
    reason: textual_variant
lexical_decisions:
- source_word: ἜΤΟΥΣ δωδεκάτου
  chosen: In the twelfth year
  alternatives:
  - Year twelve
  - In year twelve
  lexicon: LSJ
  rationale: The genitive absolute-like dating formula is idiomatically rendered in
    English as 'In the twelfth year,' preserving the chronological notice without
    wooden phrasing.
- source_word: τῆς βασιλείας
  chosen: of the reign
  alternatives:
  - of the kingdom
  - of the kingship
  lexicon: LSJ
  rationale: Here βασιλεία refers to the period/exercise of royal rule rather than
    the realm itself, so 'reign' best matches the temporal dating formula.
- source_word: Ναβουχοδονοσόρ
  chosen: Nebuchadnezzar
  alternatives:
  - Nabouchodonosor
  rationale: Standard English transliteration is preferred for readability, while
    preserving the identity of the Greek form.
- source_word: ὃς ἐβασίλευσεν Ἀσσυρίων
  chosen: who reigned over the Assyrians
  alternatives:
  - who was king of the Assyrians
  - who ruled the Assyrians
  lexicon: LSJ
  rationale: The genitive Ἀσσυρίων is naturally rendered as the people/realm over
    which he ruled. 'Reigned over' keeps the verbal connection with ἐβασίλευσεν and
    reads naturally in English.
- source_word: ἐν Νινευῇ
  chosen: in Nineveh
  rationale: Simple locative rendering.
- source_word: τῇ πόλει τῇ μεγάλῃ
  chosen: the great city
  alternatives:
  - the great town
  - that great city
  lexicon: LSJ
  rationale: The appositional phrase identifies Nineveh with an elevated epithet.
    'The great city' is both natural and formally close.
- source_word: ἐν ταῖς ἡμέραις Ἀρφαξάδ
  chosen: in the days of Arphaxad
  alternatives:
  - during the time of Arphaxad
  lexicon: LSJ
  rationale: This is a standard temporal expression. 'In the days of' preserves the
    literary-historical tone.
- source_word: Μήδων
  chosen: the Medes
  alternatives:
  - Media
  lexicon: LSJ
  rationale: The genitive plural refers to the people over whom Arphaxad ruled. 'The
    Medes' is the most direct rendering.
- source_word: ἐν Ἐκβατάνοις
  chosen: in Ecbatana
  alternatives:
  - at Ecbatana
  rationale: The place name is conventionally rendered 'Ecbatana'; 'in' fits the locative
    sense.
- source_word: καὶ
  chosen: ','
  alternatives:
  - and
  rationale: The Greek verse ends with καὶ because the sentence continues into the
    next verse. In English, a trailing comma better signals continuation without leaving
    an awkward terminal 'and' at verse end.
