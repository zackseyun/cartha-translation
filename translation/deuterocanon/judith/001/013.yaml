id: JDT.1.13
reference: Judith 1:13
source:
  edition: lxx-swete-1909
  text: καὶ παρετάξατο ἐν τῇ δυνάμει αὐτοῦ πρὸς Ἀρφαξὰδ βασιλέα ἐν τῷ ἔτει τῷ ἐπτακαιδεκάτῳ,
    καὶ ἐκραταιώθη ἐν τῷ πολέμῳ αὐτοῦ, καὶ ἀνέστρεψεν πᾶσαν τὴν δύναμιν Ἀρφαξὰδ καὶ
    πᾶσαν τὴν ἵππον αὐτοῦ καὶ πάντα τὰ ἅρματα αὐτοῦ,
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  confidence: high
  validation: agree
translation:
  text: And in the seventeenth year he drew up his forces for battle against King
    Arphaxad, and he prevailed in his war, and routed all the force of Arphaxad, all
    his cavalry, and all his chariots,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρετάξατο
  chosen: drew up his forces for battle
  alternatives:
  - arrayed himself
  - deployed his army
  - set himself in battle order
  lexicon: LSJ
  rationale: The middle of παρατάσσω in military context means to draw up troops in
    battle formation. 'Drew up his forces for battle' makes the military sense explicit
    and reads naturally in modern English.
- source_word: ἐν τῇ δυνάμει αὐτοῦ
  chosen: his forces
  alternatives:
  - with his force
  - in his might
  - with his army
  lexicon: LSJ
  rationale: δύναμις here refers to military strength/troops rather than abstract
    power. Rendering it as 'his forces' fits the immediate battle context and avoids
    the misleading abstract sense 'might'.
- source_word: ἐκραταιώθη
  chosen: he prevailed
  alternatives:
  - he was strengthened
  - he became strong
  - he gained the upper hand
  lexicon: LSJ
  rationale: Although literally 'was strengthened' or 'became strong,' in this war
    report the idiomatic sense is successful military dominance. 'He prevailed' captures
    the result in clear English without over-paraphrasing.
- source_word: ἀνέστρεψεν
  chosen: routed
  alternatives:
  - turned back
  - overthrew
  - put to flight
  lexicon: LSJ
  rationale: In context of defeating enemy forces, the verb conveys turning them back
    in defeat. 'Routed' is concise, military, and communicates decisive reversal.
- source_word: πᾶσαν τὴν δύναμιν Ἀρφαξὰδ
  chosen: all the force of Arphaxad
  alternatives:
  - all the army of Arphaxad
  - all Arphaxad's forces
  lexicon: LSJ
  rationale: Again δύναμις is military force. 'All the force of Arphaxad' stays close
    to the Greek while remaining intelligible; the possessive relation is preserved.
- source_word: πᾶσαν τὴν ἵππον αὐτοῦ
  chosen: all his cavalry
  alternatives:
  - all his horsemen
  - all his horse
  lexicon: LSJ
  rationale: Though literally 'horse,' the collective singular in military context
    refers to mounted troops. 'Cavalry' is the most natural equivalent in English.
- source_word: πάντα τὰ ἅρματα αὐτοῦ
  chosen: all his chariots
  alternatives:
  - all his chariotry
  lexicon: LSJ
  rationale: ἅρματα straightforwardly denotes chariots. 'All his chariots' is direct
    and clear.
