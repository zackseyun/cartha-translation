id: JDT.1.10
reference: Judith 1:10
source:
  edition: lxx-swete-1909
  text: ἕως τοῦ ἐλθεῖν ἐπάνω Τάνεως καὶ Μέμφεως, καὶ πάντας τοὺς κατοικοῦντας τὴν
    Αἴγυπτον ἕως τοῦ ἐλθεῖν ἐπὶ τὰ ὅρια τῆς Αἰθιοπίας.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  confidence: high
  validation: minor_mismatch
translation:
  text: as far as Tanis and Memphis, and all those inhabiting Egypt, as far as the
    borders of Ethiopia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally repeats 'as far as the coming/approach to' before both geographic
      limits; the English smooths this slightly while preserving the boundary-marking
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως τοῦ ἐλθεῖν
  chosen: as far as the approach to
  alternatives:
  - until one comes to
  - up to
  - as far as reaching
  lexicon: LSJ
  rationale: The repeated construction ἕως τοῦ + infinitive marks a spatial limit
    here, not primarily a temporal one. Rendering it with 'as far as the approach
    to' preserves the somewhat formal boundary-marking sense of the Greek without
    over-paraphrasing.
- source_word: ἐπάνω
  chosen: to
  alternatives:
  - upon
  - up to
  - above
  lexicon: LSJ
  rationale: With place names in this context, ἐπάνω functions idiomatically for movement
    toward/up to a location. English 'to' is the most natural equivalent here.
- source_word: Τάνεως
  chosen: Tanis
  alternatives:
  - Taneos
  lexicon: LSJ
  rationale: This is the standard English form of the Egyptian place name and follows
    the policy of transliterating names by standard conventions.
- source_word: Μέμφεως
  chosen: Memphis
  alternatives:
  - Memphis (unchanged)
  lexicon: LSJ
  rationale: Standard English transliteration of the place name.
- source_word: κατοικοῦντας
  chosen: inhabiting
  alternatives:
  - dwelling in
  - living in
  lexicon: LSJ
  rationale: The participle denotes those residing in a place. 'Inhabiting' keeps
    the formal geographic flavor of the list while remaining clear.
- source_word: τὴν Αἴγυπτον
  chosen: Egypt
  alternatives:
  - the land of Egypt
  lexicon: LSJ
  rationale: The direct object with the participle is naturally rendered as the country
    name in English. 'The land of Egypt' would be possible but is not required by
    the Greek.
- source_word: ἐπὶ τὰ ὅρια
  chosen: to the borders of
  alternatives:
  - to the boundary of
  - up to the frontiers of
  lexicon: LSJ
  rationale: ὅρια refers to territorial limits. 'Borders' is idiomatic modern English
    and fits the geographic scope.
- source_word: Αἰθιοπίας
  chosen: Ethiopia
  alternatives:
  - Aithiopia
  - Cush
  lexicon: LSJ
  rationale: The Greek proper name is best rendered by its standard English form 'Ethiopia.'
    Although the ancient referent overlaps with regions elsewhere called Cush, the
    source text here is Greek and names Aithiopia directly.
