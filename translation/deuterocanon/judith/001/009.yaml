id: JDT.1.9
reference: Judith 1:9
source:
  edition: lxx-swete-1909
  text: καὶ πάντας τοὺς ἐν Σαμαρείᾳ καὶ ταῖς πόλεσιν αὐτῆς, καὶ πέραν τοῦ Ἰορδάνου
    ἕως Ἰερουσαλὴμ καὶ Βαττανὴ καὶ Χελούς καὶ Κάδης καὶ τοῦ ποταμοῦ Αἰγύπτου, καὶ
    Τάφνας καὶ Ραμεσσὴ καὶ πᾶσαν γῆν Γέσεμ
  language: Greek
  pages:
  - 798
  - 799
