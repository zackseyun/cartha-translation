  confidence: high
  validation: agree
translation:
  text: and all those in Samaria and its cities, and beyond the Jordan as far as Jerusalem,
    and Batane and Chelous and Kadesh and the river of Egypt, and Taphnas and Rameses
    and all the land of Goshen,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wadi/brook of Egypt.' The Greek text here reads 'river of Egypt'
      (ποταμός), but the boundary name is rendered variously in English biblical tradition.
    reason: lexical_alternative
  - marker: b
    text: Taphnas is the Greek form of the place more commonly known in English as
      Tahpanhes.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντας τοὺς ἐν Σαμαρείᾳ
  chosen: all those in Samaria
  alternatives:
  - all who were in Samaria
  - everyone in Samaria
  lexicon: LSJ
  rationale: The phrase is elliptical in this list context; 'those' supplies the implied
    people without over-specifying gender or status. 'All those in Samaria' preserves
    the distributive force of πάντας while reading naturally in English.
- source_word: ταῖς πόλεσιν αὐτῆς
  chosen: its cities
  alternatives:
  - her cities
  - the cities belonging to it
  lexicon: LSJ
  rationale: αὐτῆς refers back to Samaria as a region/city-name; 'its cities' is idiomatic
    modern English and avoids archaic personification.
- source_word: πέραν τοῦ Ἰορδάνου
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the far side of the Jordan
  lexicon: LSJ
  rationale: πέραν commonly means 'beyond/across.' 'Beyond the Jordan' keeps the geographic
    flavor and is a conventional but still transparent rendering.
- source_word: ἕως Ἰερουσαλήμ
  chosen: as far as Jerusalem
  alternatives:
  - up to Jerusalem
  lexicon: LSJ
  rationale: ἕως marks extent. 'As far as Jerusalem' best conveys the boundary sense
    in a geographic list.
- source_word: Βαττανὴ
  chosen: Batane
  alternatives:
  - Battanē
  - Bashan
  lexicon: LSJ
  rationale: This is a place-name and should be transliterated. 'Bashan' would be
    interpretive harmonization rather than direct translation of the Greek form.
- source_word: Χελούς
  chosen: Chelous
  alternatives:
  - Chelus
  - Helous
  lexicon: LSJ
  rationale: The Greek place-name is transliterated directly. Because the identification
    is uncertain, a conservative transliteration is preferable to a conjectural equivalent.
- source_word: Κάδης
  chosen: Kadesh
  alternatives:
  - Cades
  lexicon: LSJ
  rationale: Standard English transliteration for this biblical place-name.
- source_word: τοῦ ποταμοῦ Αἰγύπτου
  chosen: the river of Egypt
  alternatives:
  - the wadi of Egypt
  - the brook of Egypt
  lexicon: LSJ
  rationale: The Greek explicitly has ποταμός, 'river.' Although some biblical boundary
    texts are rendered 'wadi' or 'brook,' this verse's Greek witness should be represented
    directly in the main text; alternatives are worth preserving in a footnote because
    of broader biblical geography.
- source_word: Τάφνας
  chosen: Taphnas
  alternatives:
  - Tahpanhes
  lexicon: LSJ
  rationale: A direct transliteration from the Greek form is preferred in the main
    text. 'Tahpanhes' reflects a more familiar Hebrew/English form and is preserved
    as an alternative.
- source_word: Ραμεσσὴ
  chosen: Rameses
  alternatives:
  - Raamses
  lexicon: LSJ
  rationale: This is the standard English form corresponding to the Greek transliteration
    and is readily recognizable.
- source_word: πᾶσαν γῆν Γέσεμ
  chosen: all the land of Goshen
  alternatives:
  - the whole land of Gesem
  lexicon: LSJ
  rationale: Γέσεμ corresponds to the familiar biblical place-name Goshen. Using the
    standard English form aids recognition while remaining faithful to the referent.
