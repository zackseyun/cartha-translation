id: JDT.1.14
reference: Judith 1:14
source:
  edition: lxx-swete-1909
  text: καὶ ἐκυρίευσεν τῶν πόλεων αὐτοῦ· καὶ ἀφίκετο ἕως Ἐκβατάνων, καὶ ἐκράτησεν
    τῶν πύργων καὶ ἐπρονόμευσε τὰς πλατείας αὐτῆς, καὶ τὸν κόσμον αὐτῆς ἔθηκεν εἰς
    ὄνειδος αὐτῆς.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  confidence: high
  validation: agree
translation:
  text: And he gained control of his cities, and he came as far as Ecbatana, and he
    seized its towers and plundered its streets, and he turned its splendor into disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek πλατείας can more specifically mean the city's broad streets or public
      squares, not merely any streets.
    reason: lexical_alternative
  - marker: b
    text: Greek κόσμος here means the city's adornment or splendor, not 'world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκυρίευσεν
  chosen: gained control of
  alternatives:
  - ruled over
  - became master of
  - subdued
  lexicon: BDAG
  rationale: The verb from κυριεύω denotes exercising dominion or mastery. 'Gained
    control of' fits the military-conquest context without sounding overly wooden,
    and avoids implying settled long-term governance more strongly than the immediate
    narrative requires.
- source_word: πόλεων
  chosen: cities
  alternatives:
  - towns
  lexicon: LSJ
  rationale: πόλις normally means 'city.' 'Cities' is the straightforward rendering
    and suits the conquest list.
- source_word: ἀφίκετο ἕως Ἐκβατάνων
  chosen: came as far as Ecbatana
  alternatives:
  - advanced as far as Ecbatana
  - arrived at Ecbatana
  lexicon: LSJ
  rationale: ἀφικνέομαι means to arrive or come, and ἕως marks extent. 'Came as far
    as' preserves the sense of reaching that far in campaign movement. Ἐκβατάνων is
    rendered by the standard English place-name 'Ecbatana.'
- source_word: ἐκράτησεν τῶν πύργων
  chosen: seized its towers
  alternatives:
  - took possession of its towers
  - captured the towers
  lexicon: BDAG
  rationale: κρατέω with the genitive can mean to gain control of or seize. 'Seized'
    conveys forceful military action. The possessive 'its' is supplied from the following
    αὐτῆς and the city context for natural English.
- source_word: ἐπρονόμευσε
  chosen: plundered
  alternatives:
  - sacked
  - ravaged
  lexicon: LSJ
  rationale: The verb denotes taking spoil. 'Plundered' is precise and does not overstate
    destruction beyond looting.
- source_word: πλατείας
  chosen: streets
  alternatives:
  - broad ways
  - squares
  - avenues
  lexicon: LSJ
  rationale: πλατεῖα can denote a broad street or open city thoroughfare. 'Streets'
    is the clearest modern English choice, though the Greek may suggest broad public
    spaces.
- source_word: κόσμον
  chosen: splendor
  alternatives:
  - adornment
  - beauty
  - ornament
  lexicon: BDAG
  rationale: κόσμος here refers not to 'world' but to adornment or ordered beauty.
    'Splendor' best captures the city's visible magnificence in context.
- source_word: ἔθηκεν εἰς ὄνειδος
  chosen: turned ... into ... disgrace
  alternatives:
  - made ... a reproach
  - put ... to shame
  lexicon: BDAG
  rationale: The idiom means to make something an object of reproach or disgrace.
    'Turned its splendor into its disgrace' preserves the rhetorical reversal in idiomatic
    English.
- source_word: ὄνειδος
  chosen: disgrace
  alternatives:
  - reproach
  - shame
  lexicon: BDAG
  rationale: ὄνειδος denotes reproach or disgrace. 'Disgrace' reads naturally in the
    city-destruction context and pairs well with 'splendor'.
