id: JDT.1.6
reference: Judith 1:6
source:
  edition: lxx-swete-1909
  text: καὶ συνήντησαν πρὸς αὐτὸν πάντες οἱ κατοικοῦντες τὴν ὀρεινήν, καὶ πάντες οἱ
    κατοικοῦντες τὸν Εὐφράτην καὶ τὸν Τίγριν καὶ τὸν Ὑδάσπην, καὶ πεδίῳ Ἀριὼχ ὁ βασιλεὺς
    Ἐλυμαίων. καὶ συνῆλθον ἔθνη πολλὰ εἰς παράταξιν υἱῶν Χελεούλ.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  confidence: high
  validation: agree
translation:
  text: And all who lived in the hill country joined him, and all who lived along
    the Euphrates and the Tigris and the Hydaspes, and in the plain of Ariok king
    of the Elymaeans. And many nations assembled for battle with the sons of Cheleoul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek συνήντησαν literally means 'met' or 'came to meet'; here it likely
      carries the sense of joining his side.
    reason: lexical_alternative
  - marker: b
    text: Ariok may also be rendered 'Arioch' in English transliteration.
    reason: lexical_alternative
  - marker: c
    text: '''Battle line'' translates a military term meaning battle array or formation.'
    reason: cultural_note
lexical_decisions:
- source_word: συνήντησαν πρὸς αὐτόν
  chosen: joined him
  alternatives:
  - met him
  - came to him
  lexicon: BDAG
  rationale: The verb literally denotes meeting or encountering, but in this military-political
    context the sense is that these groups came over to him or joined his cause. 'Joined
    him' communicates allegiance more clearly than the more neutral 'met him'.
- source_word: οἱ κατοικοῦντες τὴν ὀρεινήν
  chosen: those who lived in the hill country
  alternatives:
  - those inhabiting the highlands
  - the dwellers in the mountainous region
  lexicon: LSJ
  rationale: τὴν ὀρεινήν is a substantivized adjective meaning the hill country or
    mountainous region. 'Hill country' is natural modern English and preserves the
    geographic sense.
- source_word: οἱ κατοικοῦντες τὸν Εὐφράτην καὶ τὸν Τίγριν καὶ τὸν Ὑδάσπην
  chosen: those who lived along the Euphrates and the Tigris and the Hydaspes
  alternatives:
  - those inhabiting the Euphrates and the Tigris and the Hydaspes region
  lexicon: LSJ
  rationale: With κατοικέω plus river names, idiomatic English prefers 'along' rather
    than the overly literal 'inhabiting the Euphrates.' The named rivers are transliterated
    as proper names.
- source_word: πεδίῳ
  chosen: on the plain
  alternatives:
  - in the plain
  - in the open country
  lexicon: LSJ
  rationale: The dative is locative. 'On the plain' is idiomatic and keeps the geographical
    reference concise.
- source_word: Ἀριὼχ
  chosen: Ariok
  alternatives:
  - Arioch
  lexicon: LSJ
  rationale: A straightforward transliteration from the Greek form is preferred. English
    tradition often has 'Arioch,' which remains a viable alternative.
- source_word: Ἐλυμαίων
  chosen: Elymaeans
  alternatives:
  - Elamites
  lexicon: LSJ
  rationale: The Greek points to the people of Elymais rather than the broader biblical
    ethnonym 'Elamites.' 'Elymaeans' better reflects the Greek form and avoids importing
    a different ethnic-geographic identification.
- source_word: συνῆλθον
  chosen: assembled
  alternatives:
  - came together
  - gathered
  lexicon: BDAG
  rationale: The verb denotes coming together in a collective sense. 'Assembled' fits
    the military setting well.
- source_word: εἰς παράταξιν
  chosen: for the battle line
  alternatives:
  - for battle array
  - into battle formation
  lexicon: LSJ
  rationale: παράταξις is a military term for drawn-up formation or battle line. 'For
    the battle line' preserves the nounal force without becoming too technical.
- source_word: υἱῶν Χελεούλ
  chosen: the sons of Cheleoul
  alternatives:
  - the descendants of Cheleoul
  - the forces of Cheleoul
  lexicon: LSJ
  rationale: υἱοί plus a proper name is most transparently rendered 'sons of.' Since
    the referent is an ethnic or clan designation, a more interpretive rendering like
    'forces of' is possible but goes beyond the wording.
