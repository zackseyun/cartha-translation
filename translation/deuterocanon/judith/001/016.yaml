translation:
  text: And he returned with them, he himself and his force, for one hundred twenty
    days.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνέστρεψεν
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: LSJ
  rationale: The aorist of ἀναστρέφω here in narrative context denotes returning/backtracking
    rather than moral conduct. 'Returned' is natural English and preserves the directional
    sense.
- source_word: μετʼ αὐτῶν
  chosen: with them
  alternatives:
  - along with them
  lexicon: LSJ
  rationale: μετά with the genitive indicates accompaniment. 'With them' is the straightforward
    rendering.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  lexicon: LSJ
  rationale: The explicit pronoun adds emphasis, distinguishing the leader personally
    along with his troops. 'He himself' preserves that emphasis.
- source_word: ἡ δύναμις αὐτοῦ
  chosen: his force
  alternatives:
  - his army
  - his troops
  lexicon: LSJ
  rationale: δύναμις in military narrative commonly refers to an armed force. 'Force'
    is slightly broader and closer to the Greek than the more specific 'army,' while
    still clearly military in context.
- source_word: ἐφʼ ἡμέρας ἑκατὸν εἴκοσι
  chosen: for one hundred twenty days
  alternatives:
  - during one hundred twenty days
  - over one hundred twenty days
  lexicon: LSJ
  rationale: The preposition ἐπί with accusative of time expresses duration. 'For
    one hundred twenty days' is idiomatic and accurate.
