id: JDT.1.7
reference: Judith 1:7
source:
  edition: lxx-swete-1909
  text: Καὶ ἀπέστειλεν Ναβουχοδονοσὸρ βασιλεὺς Ἀσσυρίων ἐπὶ πάντας τοὺς κατοικοῦντας
    τὴν Περσίδα καὶ ἐπὶ πάντας τοὺς κατοικοῦντας πρὸς δυσμαῖς, τοὺς κατοικοῦντας τὴν
    Κιλικίαν καὶ Δαμασκόν, τὸν Λίβανον καὶ Ἀντιλίβανον, καὶ πάντας τοὺς κατοικοῦντας
    κατὰ πρόσωπον παραλίας,
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  confidence: high
  validation: minor_mismatch
translation:
  text: And Nebuchadnezzar king of the Assyrians sent to all who lived in Persia and
    to all who lived toward the west—to those living in Cilicia and Damascus, Lebanon
    and Anti-Lebanon, and to all who lived along the seacoast—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to all the inhabitants of the western regions.' The Greek literally
      says 'to all who lived toward the west.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - sent word
  - dispatched
  lexicon: BDAG
  rationale: The verb simply states that Nebuchadnezzar sent messengers or a summons;
    'sent' is the most natural English equivalent and leaves the object implicit as
    in the Greek.
- source_word: ἐπὶ πάντας τοὺς κατοικοῦντας
  chosen: to all who lived
  alternatives:
  - against all who dwelt
  - to all the inhabitants
  lexicon: BDAG
  rationale: Although ἐπί can sometimes suggest motion against, here with ἀποστέλλω
    and repeated geographic addressees it functions as direction toward recipients.
    'To all who lived' preserves the participial construction without overformal awkwardness.
- source_word: τὴν Περσίδα
  chosen: Persia
  alternatives:
  - the Persian land
  - Persis
  lexicon: LSJ
  rationale: The toponym refers to the region of Persia. 'Persia' is the standard
    English geographical form.
- source_word: πρὸς δυσμαῖς
  chosen: toward the west
  alternatives:
  - in the west
  - westward
  lexicon: LSJ
  rationale: The phrase is directional rather than a fixed regional title. 'Toward
    the west' reflects the preposition πρὸς and keeps the geographic orientation.
- source_word: κατοικοῦντας τὴν Κιλικίαν
  chosen: those living in Cilicia
  alternatives:
  - those inhabiting Cilicia
  lexicon: BDAG
  rationale: English idiom prefers 'living in' for κατοικέω with a place name. This
    keeps the repeated structure of the Greek.
- source_word: Δαμασκόν
  chosen: Damascus
  lexicon: LSJ
  rationale: Standard English transliteration of the city name.
- source_word: τὸν Λίβανον καὶ Ἀντιλίβανον
  chosen: Lebanon and Anti-Lebanon
  alternatives:
  - Lebanon and the Anti-Lebanon
  lexicon: LSJ
  rationale: These are paired mountain regions. 'Anti-Lebanon' is the conventional
    English geographical name and best preserves the distinction in the Greek.
- source_word: κατὰ πρόσωπον παραλίας
  chosen: along the seacoast
  alternatives:
  - opposite the coast
  - facing the coast
  - on the coastal front
  lexicon: LSJ
  rationale: The idiom denotes the coastal region/fronting the sea. 'Along the seacoast'
    gives clear modern English without forcing a wooden rendering of πρόσωπον.
