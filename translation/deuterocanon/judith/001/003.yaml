id: JDT.1.3
reference: Judith 1:3
source:
  edition: lxx-swete-1909
  text: πλάτος αὐτοῦ πηχῶν πεντήκοντα· καὶ τοὺς πύργους αὐτοῦ ἔστησεν ἐπὶ ταῖς πύλαις
    αὐτῆς πηχῶν ἑκατόν, καὶ τὸ πλάτος αὐτῆς ἐθεμελίωσεν εἰς πήχεις ἑξήκοντα·
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  confidence: high
  validation: minor_mismatch
translation:
  text: its width was fifty cubits; and he set up its towers at its gates, one hundred
    cubits high, and he founded its breadth at sixty cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek literally repeats ''its width'' in the final clause: ''and its width
      he founded to sixty cubits.'' The wording is somewhat compressed; the translation
      makes explicit that the measurement refers to the foundation dimension.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλάτος
  chosen: width
  alternatives:
  - breadth
  lexicon: LSJ
  rationale: The noun denotes horizontal extent. 'Width' is more natural modern English
    than 'breadth' while remaining formally close.
- source_word: πηχῶν πεντήκοντα
  chosen: fifty cubits
  alternatives:
  - fifty cubits in breadth
  lexicon: LSJ
  rationale: A straightforward measurement phrase; 'cubits' preserves the ancient
    unit rather than converting it.
- source_word: πύργους
  chosen: towers
  alternatives:
  - turrets
  lexicon: LSJ
  rationale: The standard sense is defensive towers. 'Turrets' is possible but less
    neutral and potentially too architectural/stylistic.
- source_word: ἔστησεν
  chosen: set up
  alternatives:
  - erected
  - placed
  lexicon: LSJ
  rationale: The verb here describes construction/establishment. 'Set up' is idiomatic
    and clear; 'erected' is possible but slightly stiffer.
- source_word: ἐπὶ ταῖς πύλαις αὐτῆς
  chosen: at its gates
  alternatives:
  - over its gates
  - upon its gates
  lexicon: LSJ
  rationale: ἐπί with the dative can indicate position at/on. In this building context,
    'at its gates' is the most natural English without overcommitting to a more specific
    architectural relation.
- source_word: πηχῶν ἑκατόν
  chosen: one hundred cubits high
  alternatives:
  - one hundred cubits
  lexicon: LSJ
  rationale: The Greek gives the measurement after the towers; in English, adding
    'high' clarifies that the number refers to tower height, which is the natural
    implied dimension.
- source_word: ἐθεμελίωσεν
  chosen: laid ... in the foundation
  alternatives:
  - founded
  - made its foundation
  lexicon: LSJ
  rationale: 'The verb means to lay a foundation or found. Because the object is again
    ''its width,'' the English needs slight expansion to remain intelligible: the
    width was laid in the foundation at sixty cubits.'
- source_word: εἰς πήχεις ἑξήκοντα
  chosen: at sixty cubits
  alternatives:
  - to sixty cubits
  - for sixty cubits
  lexicon: LSJ
  rationale: The phrase gives the extent/dimension reached in the foundation. 'At
    sixty cubits' is concise and readable, though the Greek construction is somewhat
    compressed.
