id: JDT.1.15
reference: Judith 1:15
source:
  edition: lxx-swete-1909
  text: καὶ ἔλαβε τὸν Ἀρφαξὰδ ἐν τοῖς ὄρεσι Ῥαγαῦ, καὶ κατηνάγκισεν αὐτὸν ἐν ταῖς
    σιβύναις αὐτοῦ, καὶ ἐξωλέθρευσεν αὐτὸν ἕως τῆς ἡμέρας ἐκείνης.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  confidence: high
  validation: agree
translation:
  text: And he captured Arphaxad in the mountains of Ragau, and overpowered him with
    his javelins, and destroyed him to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Rages,' a more traditional place-name form in some renderings; the Greek
      witness here reads Ragau.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔλαβε
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: BDAG
  rationale: In this military narrative context, the verb denotes taking an enemy
    in battle rather than merely 'taking' in a neutral sense. 'Captured' makes the
    hostile action clear in natural English.
- source_word: ἐν τοῖς ὄρεσι
  chosen: in the mountains
  alternatives:
  - on the mountains
  - in the hill country
  lexicon: BDAG
  rationale: The plural with ὄρη is most naturally rendered 'mountains.' 'In the mountains'
    is idiomatic English for a battle location.
- source_word: Ῥαγαῦ
  chosen: Ragau
  alternatives:
  - Rages
  lexicon: LSJ
  rationale: The project philosophy prefers transliterating personal and place names
    from the source form rather than importing a traditional English equivalent from
    other textual traditions. Swete's Greek reads Ῥαγαῦ.
- source_word: κατηνάγκισεν
  chosen: overpowered
  alternatives:
  - compelled
  - pressed hard
  - brought down by force
  lexicon: LSJ
  rationale: The verb is built on force/compulsion. In this battle setting, 'overpowered'
    best conveys violent subjugation without sounding wooden. 'Compelled' would be
    too abstract and insufficiently martial.
- source_word: σιβύναις
  chosen: javelins
  alternatives:
  - spears
  - darts
  lexicon: LSJ
  rationale: σιβύνη refers to a hunting spear or javelin-like weapon. 'Javelins' best
    captures a lighter thrown weapon and preserves the concrete military image.
- source_word: ἐξωλέθρευσεν
  chosen: destroyed
  alternatives:
  - utterly destroyed
  - wiped out
  - killed
  lexicon: BDAG
  rationale: The verb is stronger than simply 'killed' and denotes complete destruction.
    'Destroyed' preserves that force while remaining readable. 'Utterly destroyed'
    would risk overtranslation unless the adverbial force is explicit.
- source_word: ἕως τῆς ἡμέρας ἐκείνης
  chosen: to that very day
  alternatives:
  - until that day
  - to this day
  lexicon: BDAG
  rationale: The phrase points to the enduring result from the narrator's standpoint.
    'To that very day' preserves the demonstrative force of ἐκείνης better than the
    more idiomatic but interpretively stronger 'to this day.'
