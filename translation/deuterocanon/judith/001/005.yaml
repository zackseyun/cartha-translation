id: JDT.1.5
reference: Judith 1:5
source:
  edition: lxx-swete-1909
  text: καὶ ἐποίησεν πόλεμον ἐν ταῖς ἡμέραις ἐκείναις βασιλεὺς Ναβουχοδονοσὸρ πρὸς
    βασιλέα Ἀρφαξὰδ ἐν τῷ πεδίῳ τῷ μεγάλῳ, τοῦτʼ ἔστιν τοῖς ὁρίοις Ῥαγαῦ.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  confidence: high
  validation: agree
translation:
  text: And in those days King Nebuchadnezzar made war against King Arphaxad in the
    great plain, that is, in the territory of Ragae.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'within the borders of Ragae.' The Greek says 'in the boundaries/territory
      of Ragae.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν πόλεμον
  chosen: made war
  alternatives:
  - waged war
  - fought a war
  lexicon: LSJ
  rationale: The idiom literally means 'made war.' 'Made war' preserves the Greek
    construction while remaining natural English; 'waged war' is possible but slightly
    more interpretive.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: LSJ
  rationale: A standard temporal expression best rendered straightforwardly as 'in
    those days.'
- source_word: βασιλεὺς Ναβουχοδονοσὸρ
  chosen: King Nebuchadnezzar
  rationale: βασιλεύς is translated as the title 'King,' while the personal name is
    transliterated per project policy.
- source_word: πρὸς βασιλέα Ἀρφαξὰδ
  chosen: against King Arphaxad
  alternatives:
  - with King Arphaxad
  - toward King Arphaxad
  lexicon: LSJ
  rationale: With πολεμεῖν/ποιεῖν πόλεμον contexts, πρός marks hostile direction;
    'against' best conveys the adversarial sense in idiomatic English.
- source_word: ἐν τῷ πεδίῳ τῷ μεγάλῳ
  chosen: in the great plain
  alternatives:
  - on the great plain
  - in the great field
  lexicon: LSJ
  rationale: πεδίον commonly denotes a plain or level open country. 'Plain' fits the
    military-geographical setting better than the more literal but misleading 'field.'
    'In' is retained from the Greek preposition.
- source_word: τοῦτʼ ἔστιν
  chosen: that is
  alternatives:
  - namely
  lexicon: LSJ
  rationale: A simple explanatory gloss introducing identification of the location.
- source_word: τοῖς ὁρίοις Ῥαγαῦ
  chosen: in the territory of Ragae
  alternatives:
  - within the borders of Ragae
  - at the region of Ragae
  lexicon: LSJ
  rationale: ὅρια refers to borders, bounds, or territory. In English, 'territory
    of Ragae' communicates the geographical sense naturally. The place name is rendered
    by standard transliteration as 'Ragae' rather than reproducing the Greek form
    more mechanically.
