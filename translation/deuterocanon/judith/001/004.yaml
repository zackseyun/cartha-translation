id: JDT.1.4
reference: Judith 1:4
source:
  edition: lxx-swete-1909
  text: αὐτῆς ἐθεμελίωσεν εἰς πήχεις ἑξήκοντα· καὶ ἐποίησεν τὰς πύλας αὐτῆς πύλας
    διεγειρμένας εἰς ὕψος πηχῶν ἑβδομήκοντα, καὶ τὸ πλάτος αὐτῆς πήχεις τεσσεράκοντα,
    εἰς ἐξόδους δυνάμεως δυνατῶν αὐτοῦ καὶ διατάξεις τῶν πεζῶν αὐτοῦ.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  confidence: high
  validation: agree
translation:
  text: He laid its foundation to a depth of sixty cubits, and he made its gates,
    gates raised to a height of seventy cubits, and its width forty cubits, for the
    sorties of his mighty forces and the formations of his foot soldiers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the sorties of the army of his mighty men and the ranks of his infantry.'
      The Greek of the final clause is military and somewhat compressed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθεμελίωσεν
  chosen: laid its foundation
  alternatives:
  - founded
  - set its foundations
  lexicon: LSJ
  rationale: The verb denotes establishing or laying a foundation. 'Laid its foundation'
    is idiomatic English and preserves the construction imagery.
- source_word: εἰς πήχεις ἑξήκοντα
  chosen: to a depth of sixty cubits
  alternatives:
  - for sixty cubits
  - sixty cubits deep
  lexicon: LSJ
  rationale: With foundation language, the measure most naturally describes depth/extent
    of the foundation. English requires an explicit dimensional sense; 'to a depth
    of' makes the construction intelligible without overparaphrasing.
- source_word: πύλας διεγειρμένας
  chosen: gates raised
  alternatives:
  - lofty gates
  - elevated gates
  - high gates
  lexicon: LSJ
  rationale: The participle from διεγείρω literally means 'raised up.' Rendering it
    explicitly preserves the image better than collapsing it into a simple adjective
    like 'high.'
- source_word: εἰς ὕψος πηχῶν ἑβδομήκοντα
  chosen: to a height of seventy cubits
  alternatives:
  - seventy cubits high
  lexicon: LSJ
  rationale: This is a straightforward dimensional phrase; 'to a height of' is clear
    and formally close.
- source_word: τὸ πλάτος αὐτῆς πήχεις τεσσεράκοντα
  chosen: its width forty cubits
  alternatives:
  - forty cubits wide
  lexicon: LSJ
  rationale: A direct rendering of the noun phrase. Slightly compressed English keeps
    the measured-description style of the Greek.
- source_word: εἰς ἐξόδους
  chosen: for the departures
  alternatives:
  - for the sorties
  - for the exits
  - for the going out
  lexicon: LSJ
  rationale: ἔξοδος commonly means 'going out' or 'departure.' In military context
    it may imply troop movements or sorties. 'Departures' keeps the literal sense
    while allowing the military nuance to be explained in a footnote.
- source_word: δυνάμεως
  chosen: the force
  alternatives:
  - the army
  - the host
  - the power
  lexicon: LSJ
  rationale: The noun can denote military force/army. 'Force' preserves the lexical
    breadth and fits the military setting.
- source_word: δυνατῶν αὐτοῦ
  chosen: his mighty men
  alternatives:
  - his warriors
  - his strong men
  lexicon: LSJ
  rationale: δυνατός here likely refers to strong or valiant fighting men. 'Mighty
    men' is a natural English equivalent that preserves the valor nuance.
- source_word: διατάξεις
  chosen: the formations
  alternatives:
  - the ranks
  - the battle lines
  - the arrangements
  lexicon: LSJ
  rationale: In military context the noun refers to arrangement in order, hence troop
    formations or ranks. 'Formations' is precise and readable.
- source_word: τῶν πεζῶν αὐτοῦ
  chosen: his foot soldiers
  alternatives:
  - his infantry
  - his men on foot
  lexicon: LSJ
  rationale: πεζοί are soldiers on foot. 'Foot soldiers' is accessible modern English
    and preserves the contrast with the broader force.
