id: JDT.1.11
reference: Judith 1:11
source:
  edition: lxx-swete-1909
  text: καὶ ἐφαύλισαν πάντες οἱ κατοικοῦντες πᾶσαν τὴν γῆν τὸ ῥῆμα Ναβουχοδονοσὸρ
    βασιλέως Ἀσσυρίων καὶ οὐ συνῆλθον αὐτῷ εἰς τὸν πόλεμον, ὅτι οὐκ ἐφοβήθησαν αὐτὸν
    ἀλλʼ ἦν ἐναντίον αὐτῶν ὡς ἀνὴρ ἴσος, καὶ ἀνέστρεψαν τοὺς ἀγγέλους αὐτοῦ κενοὺς
    ἐν ἀτιμίᾳ πρὸ προσώπου αὐτοῦ.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  confidence: high
  validation: agree
translation:
  text: And all who inhabited the whole land treated the word of Nebuchodonosor king
    of the Assyrians with contempt, and they did not join him in the war, because
    they did not fear him, but he was before them like an ordinary man, and they sent
    his messengers back empty in dishonor from before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'despised the message/command of Nebuchodonosor.' The Greek τὸ ῥῆμα can
      mean 'word,' 'message,' or 'command,' and ἐφαύλισαν conveys treating it as of
      little account.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he was before them like a man equal.' The sense is that they
      regarded him as merely a man on their own level, not as one to be feared.
    reason: lexical_alternative
  - marker: c
    text: Or 'they turned back his envoys empty-handed, with disgrace, from his presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφαύλισαν
  chosen: treated ... with contempt
  alternatives:
  - despised
  - made light of
  - disregarded
  lexicon: LSJ
  rationale: The verb conveys treating something as of little worth or contemptible.
    'Treated ... with contempt' preserves the active sense toward τὸ ῥῆμα while sounding
    natural in English. 'Despised' is possible but can sound more emotional than the
    context requires.
- source_word: οἱ κατοικοῦντες πᾶσαν τὴν γῆν
  chosen: all who inhabited the whole land
  alternatives:
  - all the inhabitants of the whole land
  - all dwelling in all the land
  lexicon: LSJ
  rationale: This participial phrase is rendered with a relative clause for readable
    English while preserving the universal scope marked by πάντες and πᾶσαν τὴν γῆν.
- source_word: τὸ ῥῆμα
  chosen: the word
  alternatives:
  - the message
  - the command
  lexicon: LSJ
  rationale: ῥῆμα can mean word, message, or matter. Here it refers to Nebuchodonosor's
    communicated demand. 'Word' keeps the Greek's breadth without over-specifying
    as a formal decree, though the context implies a royal command.
- source_word: οὐ συνῆλθον αὐτῷ εἰς τὸν πόλεμον
  chosen: they did not join him for the war
  alternatives:
  - they did not assemble with him for battle
  - they did not come together with him into the war
  lexicon: LSJ
  rationale: συνέρχομαι with αὐτῷ and εἰς τὸν πόλεμον indicates joining or assembling
    with him for military action. 'Join him for the war' is idiomatic and preserves
    the sense.
- source_word: οὐκ ἐφοβήθησαν αὐτόν
  chosen: they did not fear him
  alternatives:
  - they were not afraid of him
  lexicon: LSJ
  rationale: A straightforward rendering best matches the clause and explains their
    refusal.
- source_word: ἦν ἐναντίον αὐτῶν ὡς ἀνὴρ ἴσος
  chosen: he was before them like an ordinary man
  alternatives:
  - he was in their eyes like an equal man
  - he seemed to them like a man on their level
  lexicon: LSJ
  rationale: The phrase means they regarded him as no more than a man on their own
    level, not as a fearsome overlord. 'Ordinary man' communicates the comparative
    force of ἴσος in natural English. 'Equal man' is too wooden.
- source_word: ἀνέστρεψαν τοὺς ἀγγέλους αὐτοῦ κενούς
  chosen: they sent his messengers back empty
  alternatives:
  - they turned back his envoys empty-handed
  - they sent away his messengers empty
  lexicon: LSJ
  rationale: ἀναστρέφω here has the sense of sending back/turning back. κενούς idiomatically
    means without result or empty-handed. 'Sent ... back empty' is concise and clear.
- source_word: ἐν ἀτιμίᾳ
  chosen: in dishonor
  alternatives:
  - with disgrace
  - in humiliation
  lexicon: LSJ
  rationale: The phrase denotes shameful treatment. 'In dishonor' stays close to the
    Greek while remaining readable.
- source_word: πρὸ προσώπου αὐτοῦ
  chosen: from before him
  alternatives:
  - from his presence
  - before his face
  lexicon: LSJ
  rationale: The idiom literally means from before his face/presence. 'From before
    him' preserves the formal flavor and likely refers to returning to Nebuchodonosor's
    presence after being rebuffed.
