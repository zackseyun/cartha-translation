theological_decisions:
- issue: Oath formula εἰ μὴ after ὤμοσεν
  chosen_reading: 'Rendered as emphatic oath content: ''that he would surely...,''
    not as a literal negative conditional.'
  alternative_readings:
  - '''unless he avenged...'''
  rationale: This is a linguistic rather than doctrinal issue, but it materially affects
    meaning. The oath formula in Greek is best represented idiomatically in English
    so the sense is not reversed or obscured.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
