id: JDT.1.12
reference: Judith 1:12
source:
  edition: lxx-swete-1909
  text: Καὶ ἐθυμώθη Ναβουχοδονοσὸρ ἐπὶ πᾶσαν τὴν γῆν ταύτην σφόδρα, καὶ ὤμοσεν κατὰ
    τοῦ θρόνου καὶ τῆς βασιλείας αὐτοῦ, εἰ μὴ ἐκδικήσει πάντα τὰ ὅρια τῆς Κιλικίας
    καὶ Δαμασκηνῆς καὶ Συρίας, ἀνελεῖν τῇ ῥομφαίᾳ αὐτοὺς καὶ πάντας τοὺς κατοικοῦντας
    ἐν τῇ Μωὰβ καὶ τοὺς υἱοὺς Ἀμμὼν καὶ πᾶσαν τὴν Ἰδουμαίαν καὶ πάντας τοὺς ἐν Αἰγύπτῳ
    ἕως τοῦ ἐλθεῖν ἐπὶ τὰ ὅρια τῶν δύο θαλασσῶν.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  confidence: high
  validation: agree
translation:
  text: And Nebuchadnezzar became very angry with all this land, and he swore by his
    throne and his kingdom that he would surely take vengeance on all the territories
    of Cilicia and Damascus and Syria, putting them to the sword, and all who lived
    in Moab and the Ammonites and all Idumea and all those in Egypt, until he came
    to the borders of the two seas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'unless he avenges'; in this oath formula the Greek
      expresses a strong sworn resolve rather than a simple negative condition.
    reason: lexical_alternative
  - marker: b
    text: '''The two seas'' likely refers to the full extent of the region in view,
      expressed by its bounding seas.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐθυμώθη
  chosen: became very angry
  alternatives:
  - was enraged
  - grew furious
  lexicon: LSJ
  rationale: The passive/deponent form conveys being angered or enraged. 'Became very
    angry' is natural English and preserves the intensification supplied further by
    σφόδρα.
- source_word: σφόδρα
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: LSJ
  rationale: Used adverbially to intensify Nebuchadnezzar's anger. 'Very' is idiomatic
    in modern English; the force is retained without archaism.
- source_word: κατὰ τοῦ θρόνου καὶ τῆς βασιλείας αὐτοῦ
  chosen: by his throne and his kingdom
  alternatives:
  - against his throne and his kingdom
  lexicon: LSJ
  rationale: With ὀμνύω, κατά can introduce the object by which one swears in Hellenistic
    usage. 'By his throne and his kingdom' fits the oath context better than a literal
    'against,' which would mislead English readers.
- source_word: εἰ μὴ ἐκδικήσει
  chosen: that he would surely avenge himself on
  alternatives:
  - unless he avenged himself on
  - that he would exact vengeance on
  lexicon: LSJ
  rationale: The idiom ὤμοσεν ... εἰ μὴ commonly has asseverative force in Greek oath
    formulas. Rendering it as a straightforward negative conditional ('unless') would
    sound awkward in English and obscure the oath's meaning. 'Would surely' captures
    the emphatic force.
- source_word: ἐκδικήσει
  chosen: avenge himself on
  alternatives:
  - take vengeance on
  - exact justice from
  lexicon: LSJ
  rationale: In context this is retaliatory vengeance for refusal to assist him, not
    neutral legal justice. 'Avenge himself on' preserves the personal, hostile force.
- source_word: τὰ ὅρια
  chosen: the territories
  alternatives:
  - the borders
  - the regions
  lexicon: LSJ
  rationale: Although literally 'borders' or 'boundaries,' here it refers metonymically
    to the lands/regions bounded by those borders. 'Territories' communicates the
    intended geopolitical sense.
- source_word: Κιλικίας καὶ Δαμασκηνῆς καὶ Συρίας
  chosen: Cilicia and Damascus and Syria
  alternatives:
  - Cilicia and the region of Damascus and Syria
  lexicon: LSJ
  rationale: The Greek lists place names in sequence. 'Damascus' is retained as the
    proper name represented in the text, even though it may stand for the Damascene
    region.
- source_word: ἀνελεῖν τῇ ῥομφαίᾳ
  chosen: put them to the sword
  alternatives:
  - kill them with the sword
  - destroy them by the sword
  lexicon: LSJ
  rationale: This is a standard idiom for violent slaughter. 'Put them to the sword'
    is clear, established English and preserves the military brutality of the phrase.
- source_word: τοὺς υἱοὺς Ἀμμών
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  lexicon: LSJ
  rationale: The ethnonym is the natural English equivalent of the Hebrew-style expression
    'sons of Ammon.' This is optimal-equivalence rather than woodenly formal.
- source_word: Ἰδουμαίαν
  chosen: Idumea
  alternatives:
  - Edom
  lexicon: LSJ
  rationale: The Greek text has the Hellenized geographical form Ἰδουμαία. 'Idumea'
    preserves the Greek witness more directly than substituting the Hebrew-associated
    'Edom.'
- source_word: ἕως τοῦ ἐλθεῖν ἐπὶ τὰ ὅρια τῶν δύο θαλασσῶν
  chosen: until one came to the borders of the two seas
  alternatives:
  - until he came to the borders of the two seas
  - as far as the borders of the two seas
  lexicon: LSJ
  rationale: The infinitival construction with ἕως marks extent or limit. The Greek
    subject of ἐλθεῖν is not explicit; an impersonal English 'one came' preserves
    the source's indeterminacy better than specifying 'he,' though the sense is territorial
    advance to the extremity marked by the two seas.
