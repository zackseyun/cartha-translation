translation:
  text: And he built around Ecbatana walls of cut stone, three cubits wide and six
    cubits long, and he made the wall seventy cubits high and its
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The supplied Greek text for this verse is truncated after 'and its' (καὶ
      τὸ). The English therefore preserves the incomplete ending rather than reconstructing
      the missing words from another edition.
    reason: textual_variant
  - marker: b
    text: Or 'at Ecbatana.' The Greek prepositional phrase is somewhat compressed,
      but the context clearly describes fortifying the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠκοδόμησεν
  chosen: built
  alternatives:
  - constructed
  lexicon: LSJ
  rationale: Standard rendering of the aorist of οἰκοδομέω for building activity;
    'built' is natural and sufficiently formal.
- source_word: ἐπʼ Ἐκβατάνων
  chosen: around Ecbatana
  alternatives:
  - at Ecbatana
  - upon Ecbatana
  lexicon: LSJ
  rationale: With the following καὶ κύκλῳ τείχη, the phrase is best taken locatively
    with the city name Ecbatana; 'around Ecbatana' fits the sense of fortification
    encircling the city. The exact prepositional nuance is somewhat compressed in
    the transmitted wording.
- source_word: κύκλῳ τείχη
  chosen: walls
  alternatives:
  - a surrounding wall
  - walls all around
  lexicon: LSJ
  rationale: κύκλῳ adds the encircling sense; in idiomatic English this is naturally
    conveyed by 'walls' in context, while the surrounding force is already reflected
    by 'around Ecbatana'.
- source_word: λίθων λελαξευμένων
  chosen: cut stone
  alternatives:
  - hewn stone
  - carved stone
  lexicon: LSJ
  rationale: The participle indicates stones worked by cutting. 'Cut stone' is clear
    modern English; 'hewn stone' is possible but slightly more archaic.
- source_word: εἰς πλάτος πηχῶν τριῶν
  chosen: three cubits wide
  alternatives:
  - to a width of three cubits
  lexicon: LSJ
  rationale: This expresses the breadth measurement of the stones or masonry units;
    'three cubits wide' is concise and accurate.
- source_word: εἰς μῆκος πηχῶν ἕξ
  chosen: six cubits long
  alternatives:
  - to a length of six cubits
  lexicon: LSJ
  rationale: Parallel to the previous measurement phrase; rendered in natural English.
- source_word: ἐποίησεν τὸ ὕψος τοῦ τείχους πηχῶν ἑβδομήκοντα
  chosen: he made the wall seventy cubits high
  alternatives:
  - he made the height of the wall seventy cubits
  lexicon: LSJ
  rationale: This preserves the causative/building sense while expressing the measurement
    idiomatically.
- source_word: καὶ τὸ
  chosen: and its
  alternatives:
  - and the
  lexicon: Greek text
  rationale: The Zone 1 text is truncated at this point, so the verse as supplied
    breaks off after καὶ τὸ. 'And its' reflects the unfinished Greek syntax honestly
    without inventing the missing continuation.
