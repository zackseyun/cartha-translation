translation:
  text: And the men came to Holofernes and reported to him according to these words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'reported to him in these words.' The Greek more
      literally says 'according to these words,' likely pointing back to the exact
      message just delivered.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεγένοντο
  chosen: came
  alternatives:
  - arrived
  - presented themselves
  - went
  lexicon: BDAG
  rationale: The verb can mean 'arrive' or 'come/be present.' In this narrative context,
    a simple motion verb is most natural in English. 'Came' preserves the straightforward
    sense without overformalizing.
- source_word: οἱ ἄνδρες
  chosen: the men
  alternatives:
  - the menfolk
  - the representatives
  lexicon: BDAG
  rationale: The phrase is explicitly masculine plural and refers to the men previously
    sent from the city. 'The men' is the most direct and gender-accurate rendering.
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - announced
  - told
  - declared
  lexicon: BDAG
  rationale: The verb denotes bringing back a message or reporting what was said.
    'Reported' fits the messenger context better than the more generic 'told' and
    is less elevated than 'declared'.
- source_word: κατὰ τὰ ῥήματα ταῦτα
  chosen: according to these words
  alternatives:
  - in these words
  - with these words
  - to this effect
  lexicon: BDAG
  rationale: This phrase indicates that the report matched the wording just given.
    'According to these words' is somewhat formal but closely reflects the Greek and
    preserves the link to the preceding speech. A smoother English alternative like
    'to this effect' would weaken the verbal correspondence.
