id: JDT.3.4
reference: Judith 3:4
source:
  edition: lxx-swete-1909
  text: ἰδοὺ καὶ αἱ πόλεις ἡμῶν καὶ οἱ κατοικοῦντες ἐν αὐταῖς δοῦλοί σοί εἰσιν, ἐλθὼν
    ἀπάντησον αὐταῖς ὡς ἔστιν ἀγαθὸν ἐν ὀφθαλμοῖς σου.
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  - 803
  - 804
  - 805
  confidence: high
  validation: agree
translation:
  text: Look, our cities also, and those who live in them, are your slaves; come and
    deal with them as is good in your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants.' The Greek word can denote either, but here it likely emphasizes
      subjection under conquest.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Introduces an emphatic presentation. 'Look' preserves the deictic force
    in readable modern English better than the more archaic 'Behold.'
- source_word: πόλεις
  chosen: cities
  alternatives:
  - towns
  lexicon: BDAG
  rationale: The ordinary sense is urban settlements or city-centers. 'Cities' is
    the most direct rendering.
- source_word: κατοικοῦντες
  chosen: those who live
  alternatives:
  - the inhabitants
  - those dwelling
  lexicon: BDAG
  rationale: The participle refers to the people residing in the cities. 'Those who
    live' is natural English while preserving the verbal idea.
- source_word: δοῦλοί
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Following project guidance, δοῦλος is rendered 'slave' where bonded subjection
    is salient. Here the speakers are offering total political submission to Holofernes,
    so 'slaves' better conveys the force than the softer 'servants.'
- source_word: ἐλθὼν
  chosen: come
  alternatives:
  - having come
  - come here
  lexicon: BDAG
  rationale: 'An aorist participle used imperativally with the following verb. English
    idiom naturally renders it as a coordinate command: ''come and ...''.'
- source_word: ἀπάντησον
  chosen: deal with
  alternatives:
  - meet
  - answer
  - confront
  lexicon: BDAG
  rationale: Although the verb can mean 'meet,' the object here is the cities and
    inhabitants in a surrender context, so the sense is to act toward or handle them.
    'Deal with' captures the practical force without overinterpreting the manner.
- source_word: ὡς ἔστιν ἀγαθὸν ἐν ὀφθαλμοῖς σου
  chosen: as is good in your eyes
  alternatives:
  - as seems good to you
  - as is pleasing in your sight
  lexicon: BDAG
  rationale: This is a common idiom for acting according to one's own judgment or
    pleasure. The chosen rendering stays close to the Greek while remaining understandable
    in English.
