translation:
  text: And they sent messengers to him with peaceful words, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with peaceful words' or 'on peaceable terms.' The Greek phrase λόγοις
      εἰρηνικοῖς can denote conciliatory speech or the terms of a peace overture.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλαν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Aorist active of ἀποστέλλω, straightforwardly meaning 'send.' 'Sent'
    is natural modern English and sufficiently formal.
- source_word: ἀγγέλους
  chosen: messengers
  alternatives:
  - angels
  - envoys
  lexicon: BDAG
  rationale: In this narrative context the referent is human representatives, not
    heavenly beings. 'Messengers' is the broad, contextually secure rendering; 'envoys'
    is possible but slightly more interpretive/political.
- source_word: λόγοις εἰρηνικοῖς
  chosen: with words of peace
  alternatives:
  - with peaceful words
  - with peaceable terms
  lexicon: BDAG
  rationale: The dative phrase expresses the manner/content of the message. 'Words
    of peace' preserves the lexical force of λόγοι and εἰρηνικοῖς while remaining
    idiomatic. It also leaves open whether the sense is conciliatory or treaty-oriented.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: Present participle introducing the content of the message. 'Saying' is
    the standard concise rendering in English narrative.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: With verbs of sending, πρὸς + accusative commonly indicates the recipient/destination.
    'To him' is the natural English equivalent.
