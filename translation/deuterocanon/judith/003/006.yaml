translation:
  text: And he and his force went down to the coast, and he garrisoned the high cities,
    and from them they took chosen men as allies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'they took' is plural, though the surrounding narrative has singular
      verbs ('he went down,' 'he garrisoned'). The plural may refer to his forces
      acting under his command; some English renderings smooth this to 'he took.'
    reason: alternative_reading
lexical_decisions:
- source_word: κατέβη
  chosen: went down
  alternatives:
  - came down
  - marched down
  lexicon: LSJ
  rationale: The aorist of καταβαίνω commonly means 'go down/come down.' 'Went down'
    preserves the directional sense without over-specifying military nuance.
- source_word: παραλίαν
  chosen: the coast
  alternatives:
  - the seacoast
  - the coastal region
  lexicon: LSJ
  rationale: παραλία denotes the seashore/coastal region. 'The coast' is natural modern
    English and fits the geographic movement.
- source_word: δύναμις
  chosen: force
  alternatives:
  - army
  - power
  - troops
  lexicon: LSJ
  rationale: In this military context δύναμις refers to an armed force. 'Force' is
    slightly broader and closer to the Greek than the more interpretive 'army,' while
    still clear in context.
- source_word: ἐφρούρησε
  chosen: garrisoned
  alternatives:
  - guarded
  - secured
  lexicon: LSJ
  rationale: The verb means to guard or keep watch; with cities as object in a military
    narrative, 'garrisoned' best conveys stationing troops for control rather than
    merely watching.
- source_word: πόλεις τὰς ὑψηλάς
  chosen: the high cities
  alternatives:
  - the elevated cities
  - the hill cities
  - the strong cities
  lexicon: LSJ
  rationale: ὑψηλάς literally means 'high.' 'High cities' preserves the topographical
    sense; 'strong cities' would import an interpretive idea of fortification not
    explicit in the adjective.
- source_word: συμμαχίαν
  chosen: as allies
  alternatives:
  - for alliance
  - into alliance
  lexicon: LSJ
  rationale: The phrase εἰς συμμαχίαν indicates incorporation for alliance/support.
    'As allies' gives idiomatic English while preserving the political-military sense.
- source_word: ἄνδρας ἐπιλέκτους
  chosen: chosen men
  alternatives:
  - picked men
  - select men
  - elite men
  lexicon: LSJ
  rationale: ἐπιλέκτους means selected/chosen. 'Chosen men' is straightforward and
    preserves the masculine reference of ἄνδρας in line with the project's gender-accurate
    policy.
- source_word: ἔλαβον
  chosen: they took
  alternatives:
  - he took
  - they received
  lexicon: LSJ
  rationale: The Greek form is plural, so the translation preserves that number even
    though the surrounding verbs are singular. This likely refers to Holofernes' forces
    acting under his command; smoothing to singular would obscure the source wording.
