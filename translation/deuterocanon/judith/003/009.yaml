translation:
  text: And he came to the front of Esdrelon, near Dothaia, which is opposite the
    great ridge of Judea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before Esdrelon' or 'facing Esdrelon'; the Greek expression κατὰ πρόσωπον
      can be rendered in several closely related spatial ways.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the great saw of Judea.' The Greek likely uses 'saw' metaphorically
      for a jagged mountain ridge or escarpment.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ πρόσωπον
  chosen: to the front of
  alternatives:
  - before
  - opposite
  - facing
  lexicon: LSJ
  rationale: The idiom with motion verb ἦλθεν indicates arrival at or toward the face/front
    of a place. 'To the front of' preserves the spatial sense without overinterpreting
    it as direct confrontation.
- source_word: Ἐσδρηλών
  chosen: Esdrelon
  alternatives:
  - Esdraelon
  - Jezreel
  lexicon: LSJ
  rationale: A transliteration is preferred for the Greek place-name form, following
    the project's policy to transliterate names rather than replace them with a later
    or harmonized English equivalent such as 'Jezreel'.
- source_word: πλησίον
  chosen: near
  alternatives:
  - close to
  - beside
  lexicon: LSJ
  rationale: '''Near'' is the most natural modern English equivalent and accurately
    conveys proximity.'
- source_word: Δοταίας
  chosen: Dothaia
  alternatives:
  - Dothan
  lexicon: LSJ
  rationale: The Greek form is best represented by transliteration. 'Dothan' may reflect
    identification with a more familiar biblical site, but the source text here gives
    the Greek place-name form Δοταίας.
- source_word: ἀπέναντι
  chosen: opposite
  alternatives:
  - facing
  - across from
  lexicon: LSJ
  rationale: The term straightforwardly denotes being opposite or facing. 'Opposite'
    is concise and fits the geographic description.
- source_word: πρίονος
  chosen: ridge
  alternatives:
  - saw
  - mountain-ridge
  - escarpment
  lexicon: LSJ
  rationale: Although πρίων ordinarily means 'saw,' in topographical context τοῦ πρίονος
    τοῦ μεγάλου τῆς Ἰουδαίας is best understood metaphorically for a serrated ridge
    or mountain spine. 'Ridge' gives readable English while preserving the geographic
    sense.
- source_word: τῆς Ἰουδαίας
  chosen: of Judea
  alternatives:
  - of Judaea
  - of the Judean region
  lexicon: LSJ
  rationale: '''Judea'' is the standard English form for Ἰουδαία and suits the geographical
    reference.'
