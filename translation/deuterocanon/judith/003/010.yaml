id: JDT.3.10
reference: Judith 3:10
source:
  edition: lxx-swete-1909
  text: καὶ κατεστρατοπέδευσαν ἀνὰ μέσον Γαιβαὶ καὶ Σκυθῶν πόλεως, καὶ ἦν ἐκεῖ μῆνα
    ἡμερῶν εἰς τὸ συλλέξαι πᾶσαν τὴν ἀπαρτίαν τῆς δυνάμεως αὐτοῦ.
  language: Greek
