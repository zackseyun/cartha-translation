translation:
  text: And he tore down all their borders and cut down their sacred groves; and it
    had been granted to him to destroy all the gods of the land, so that all the nations
    might worship him alone—Nebuchadnezzar—and that all their tongues and all their
    tribes might call on him as god.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boundaries.' The Greek term can refer to borders or boundary markers.
    reason: lexical_alternative
  - marker: b
    text: Or simply 'groves'; the Greek often refers to cultic or sacred groves.
    reason: lexical_alternative
  - marker: c
    text: Or 'might invoke him as god.' The Greek expression combines calling upon
      him with treating him as divine.
    reason: alternative_reading
lexical_decisions:
- source_word: κατέσκαψεν
  chosen: tore down
  alternatives:
  - dug down
  - demolished
  - razed
  lexicon: LSJ
  rationale: The verb can denote digging down or demolishing. With πάντα τὰ ὅρια ('all
    their borders/boundaries'), the sense is destructive dismantling rather than literal
    excavation, so 'tore down' gives clear modern English without over-specifying
    method.
- source_word: ὅρια
  chosen: borders
  alternatives:
  - boundaries
  - territories
  - frontiers
  lexicon: LSJ
  rationale: ὅρια commonly means boundaries or border regions. Here, in a military-conquest
    context, 'borders' best captures the political/geographical sense. 'Territories'
    would shift from boundary markers to the lands themselves.
- source_word: ἄλση
  chosen: sacred groves
  alternatives:
  - groves
  lexicon: LSJ
  rationale: In biblical Greek this term often refers not merely to trees but to cultic
    groves associated with worship. 'Sacred groves' makes the religious significance
    explicit and fits the following clause about destroying gods.
- source_word: ἐξέκοψεν
  chosen: cut down
  alternatives:
  - felled
  - cut off
  lexicon: LSJ
  rationale: With ἄλση, the natural English rendering is 'cut down.' It is concrete
    and idiomatic.
- source_word: δεδομένον αὐτῷ
  chosen: it had been granted to him
  alternatives:
  - it had been given to him
  - he had been commissioned
  lexicon: LSJ
  rationale: The periphrastic construction indicates something given/assigned to him.
    'Granted' preserves the passive sense without implying a specific granter beyond
    the context.
- source_word: ἐξολοθρεῦσαι
  chosen: destroy
  alternatives:
  - wipe out
  - exterminate
  lexicon: LSJ
  rationale: The verb is strong, but here the object is 'all the gods of the land,'
    referring to eradication of their worship/images rather than literal killing.
    'Destroy' is forceful and contextually appropriate; 'exterminate' sounds too biologically
    literal in English.
- source_word: λατρεύσωσι
  chosen: might worship
  alternatives:
  - might render service to
  - might serve in worship
  lexicon: LSJ
  rationale: λατρεύω in religious contexts means to worship or render cultic service.
    'Worship' is the clearest idiomatic equivalent here.
- source_word: γλῶσσαι
  chosen: tongues
  alternatives:
  - languages
  - peoples
  lexicon: LSJ
  rationale: The Greek literally says 'tongues.' In this context it stands metonymically
    for language-groups or peoples. Retaining 'tongues' preserves the vivid source
    wording while remaining intelligible in English.
- source_word: φυλαὶ
  chosen: tribes
  alternatives:
  - clans
  - peoples
  lexicon: LSJ
  rationale: φυλή commonly means tribe or ethnic grouping. 'Tribes' is the most direct
    rendering and pairs naturally with 'tongues'.
- source_word: ἐπικαλέσωνται αὐτὸν εἰς θεόν
  chosen: might call on him as god
  alternatives:
  - might invoke him as god
  - might call him god
  - might acknowledge him as god
  lexicon: LSJ
  rationale: ἐπικαλέω can mean call upon/invoke, and with εἰς θεόν the sense is treating
    or invoking him in the role/status of god. 'Call on him as god' preserves both
    the verbal action and the predicate force better than the flatter 'call him god'.
- source_word: μόνῳ
  chosen: alone
  alternatives:
  - only
  lexicon: LSJ
  rationale: μόνῳ emphasizes exclusivity of worship. 'Alone' reads naturally after
    'him' in English.
