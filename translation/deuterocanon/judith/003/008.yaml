theological_decisions:
- issue: Rendering the claim that conquered nations should treat Nebuchadnezzar as
    divine
  chosen_reading: 'Translate the statement straightforwardly as imperial self-deification:
    ''call on him as god.'''
  alternative_readings:
  - call him a god
  - invoke him as God
  rationale: The Greek presents Nebuchadnezzar as the sole object of worship and as
    one invoked εἰς θεόν. Lowercase 'god' avoids importing Israel's unique divine
    identity into the English while still reflecting the blasphemous claim of divinization
    in the narrative.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
