translation:
  text: Look, our homesteads and every field of wheat and the flocks and the herds
    and all the enclosures of our tents lie before you; use them as pleases you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'farmsteads' for 'homesteads' (ἐπαύλεις). The Greek suggests rural properties
      or settled dwellings in an agricultural setting.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'all the enclosures of our tents.' The phrase likely refers to
      the fenced or bounded areas associated with their encampments or livestock holdings.
    reason: cultural_note
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Rendered as a direct attention-getter in natural modern English. 'Look'
    preserves the deictic force without archaic tone.
- source_word: ἐπαύλεις
  chosen: homesteads
  alternatives:
  - farmsteads
  - dwellings
  - estates
  lexicon: LSJ
  rationale: The term denotes country residences or settled properties rather than
    merely 'houses.' 'Homesteads' fits the agrarian context alongside fields, flocks,
    and herds.
- source_word: πᾶν πεδίον πυρῶν
  chosen: every field of wheat
  alternatives:
  - all the grain fields
  - every plain of wheat
  lexicon: LSJ
  rationale: πεδίον is 'field/plain'; with πυρῶν ('wheat'), the phrase refers to cultivated
    wheat land. 'Every field of wheat' is clear and close to the Greek.
- source_word: ποίμνια
  chosen: flocks
  alternatives:
  - sheepfold flocks
  - small livestock
  lexicon: BDAG
  rationale: Standard rendering for groups of sheep/goats; paired naturally with βουκόλια
    as a contrasting livestock category.
- source_word: βουκόλια
  chosen: herds
  alternatives:
  - cattle
  - oxen
  lexicon: LSJ
  rationale: The word refers to bovine livestock collectively. 'Herds' preserves the
    collective sense and pairs idiomatically with 'flocks.'
- source_word: μάνδραι
  chosen: enclosures
  alternatives:
  - folds
  - pens
  lexicon: LSJ
  rationale: A general term for enclosed places for animals or camp property. 'Enclosures'
    avoids over-specifying while fitting the following genitive phrase.
- source_word: τῶν σκηνῶν ἡμῶν
  chosen: of our tents
  alternatives:
  - of our camps
  - belonging to our encampments
  lexicon: BDAG
  rationale: σκηναί literally means 'tents.' Although 'camps' is possible by extension,
    the literal rendering is sufficiently natural here and preserves the imagery.
- source_word: παράκεινται πρὸ προσώπου σου
  chosen: lie before you
  alternatives:
  - are laid before you
  - are at your disposal before you
  lexicon: BDAG
  rationale: The idiom expresses being set out in someone's presence and available
    to them. 'Lie before you' is natural English that keeps the spatial metaphor.
- source_word: χρῆσαι
  chosen: use them
  alternatives:
  - make use of them
  - deal with them
  lexicon: BDAG
  rationale: 'Imperatival infinitive sense in context: an invitation to make use of
    the listed goods. English requires an explicit object for clarity.'
- source_word: καθʼ ὃ ἂν ἀρέσκῃ σοι
  chosen: as it pleases you
  alternatives:
  - however you wish
  - as seems good to you
  lexicon: BDAG
  rationale: Conveys permission according to the addressee's preference. 'As it pleases
    you' is idiomatic and suitably deferential.
