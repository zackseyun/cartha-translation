id: 1MA.5.51
reference: 1 Maccabees 5:51
source:
  edition: lxx-swete-1909
  text: καὶ ἀπώλεσεν πᾶν ἀρσενικὸν ἐν στόματι ῥομφαίας, καὶ ἐξερρίζωσεν αὐτήν, καὶ
    ἔλαβεν τὰ σκῦλα τῆς πόλεως, καὶ διῆλθεν διὰ τῆς πόλεως ἐπάνω τῶν ἀπεκταμμένων.
  language: Greek
  pages:
  - 637
  confidence: high
  validation: agree
translation:
  text: And he destroyed every male with the edge of the sword, and uprooted it, and
    took the plunder of the city, and passed through the city over the slain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in the mouth of the sword,' an idiom meaning 'with the edge
      of the sword.'
    reason: lexical_alternative
  - marker: b
    text: Or 'rooted it out' / 'eradicated it.' The verb keeps the image of uprooting
      by the roots.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπώλεσεν
  chosen: destroyed
  alternatives:
  - killed
  - wiped out
  lexicon: LSJ
  rationale: Aorist of ἀπόλλυμι here denotes causing destruction/death in a military
    context. 'Destroyed' preserves the broader force of annihilation without narrowing
    it merely to individual killing, though the following phrase specifies the means.
- source_word: πᾶν ἀρσενικόν
  chosen: every male
  alternatives:
  - every male person
  - all the males
  lexicon: LSJ
  rationale: The phrase is comprehensive and gender-specific. 'Every male' is concise
    and preserves the starkness of the Greek; it should not be softened to a generic
    term.
- source_word: ἐν στόματι ῥομφαίας
  chosen: with the edge of the sword
  alternatives:
  - by the mouth of the sword
  - with the sword
  lexicon: LSJ
  rationale: This is a standard Semitic/Greek idiom literally 'in/by the mouth of
    the sword.' 'With the edge of the sword' is the established idiomatic English
    equivalent that preserves the image better than the flatter 'with the sword.'
- source_word: ἐξερρίζωσεν
  chosen: uprooted it
  alternatives:
  - rooted it out
  - eradicated it
  lexicon: LSJ
  rationale: The verb literally means to uproot by the roots. 'Uprooted it' keeps
    the metaphor and likely refers to the city as removed/destroyed as a settlement.
    'Eradicated it' is possible but less transparent to the Greek image.
- source_word: αὐτήν
  chosen: it
  alternatives:
  - her
  lexicon: Greek grammar
  rationale: The pronoun refers back to πόλις, grammatically feminine in Greek. English
    normally uses 'it' for a city unless personification is intended, which is not
    demanded here.
- source_word: τὰ σκῦλα
  chosen: the plunder
  alternatives:
  - the spoils
  - the booty
  lexicon: LSJ
  rationale: The term denotes goods taken in war. 'Plunder' is clear modern English
    and suitably grave; 'booty' is too colloquial for this context, while 'spoils'
    is also possible.
- source_word: διῆλθεν διὰ τῆς πόλεως
  chosen: passed through the city
  alternatives:
  - went through the city
  - marched through the city
  lexicon: LSJ
  rationale: The verb means to go/pass through. 'Passed through' is a natural rendering;
    'marched through' would add military color not explicit in the verb itself.
- source_word: ἐπάνω τῶν ἀπεκταμμένων
  chosen: over the slain
  alternatives:
  - over those who had been killed
  - upon the dead
  lexicon: LSJ
  rationale: The participle denotes those who have been killed/slain. 'Over the slain'
    is concise and vivid, preserving the grim image of traversing the city over corpses.
