theological_decisions:
- issue: Violence language and scope of destruction
  chosen_reading: Retain the full force of the military violence in straightforward
    English ('destroyed every male,' 'with the edge of the sword,' 'uprooted it').
  alternative_readings:
  - Soften to 'defeated' or 'captured'
  - Interpret 'uprooted it' metaphorically without explicit destruction
  rationale: The Greek is explicit and severe. The translation should not mute the
    text's brutality or narrow its scope beyond what the source states.
  doctrine_reference: Translation philosophy §§1, 6
