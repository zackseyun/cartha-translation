theological_decisions:
- issue: Whether to make the military hostility explicit in translating ἐξῆλθεν
  chosen_reading: went out against them
  alternative_readings:
  - went out
  rationale: The verse is embedded in battle narrative, so a bare 'went out' risks
    obscuring the military action. The chosen rendering clarifies the sense while
    remaining anchored in the Greek context.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
- issue: Number shift between singular ἐσάλπισεν and plural ἐβόησαν
  chosen_reading: they sounded the trumpets
  alternative_readings:
  - he sounded the trumpets
  rationale: The Greek presents a singular verb followed by a plural verb. Because
    the action is military and collective, and because English prefers consistency
    here, the main text uses the likely collective sense. The singular is preserved
    in a footnote as a textual/grammatical note for auditability.
  doctrine_reference: Translation philosophy §5, consistency of key terms, or documented
    exception
