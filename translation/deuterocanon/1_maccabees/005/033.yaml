id: 1MA.5.33
reference: 1 Maccabees 5:33
source:
  edition: lxx-swete-1909
  text: καὶ ἐξῆλθεν ἐν τρισὶν ἀρχαῖς ἔξωθεν αὐτῶν· καὶ ἐσάλπισεν ταῖς σάλπιγξιν, καὶ
    ἐβόησαν ἐν προσευχῇ.
  language: Greek
  pages:
  - 636
  confidence: high
  validation: agree
translation:
  text: And he went out against them in three divisions from outside them; and they
    sounded the trumpets and cried out in prayer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''he sounded the trumpets''; the source then continues with the
      plural, ''and they cried out in prayer.'' The English smooths this to a collective
      plural.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out against
  alternatives:
  - went out
  - marched out against
  lexicon: LSJ
  rationale: The verb literally means 'went out,' but in military narrative with ἔξωθεν
    αὐτῶν and hostile context it implies a sortie against the enemy. 'Went out against'
    makes the adversarial force explicit without overparaphrasing.
- source_word: ἐν τρισὶν ἀρχαῖς
  chosen: in three divisions
  alternatives:
  - in three companies
  - under three commanders
  - in three detachments
  lexicon: LSJ
  rationale: ἀρχή can denote a body organized under command or a command-unit in military
    context. 'Divisions' communicates three tactical groupings better than the overly
    literal 'beginnings' and avoids overcommitting to 'commanders,' which would shift
    the phrase from unit-structure to persons.
- source_word: ἔξωθεν αὐτῶν
  chosen: from outside them
  alternatives:
  - from outside their position
  - from outside the camp
  - against them from outside
  lexicon: LSJ
  rationale: ἔξωθεν means 'from outside' or 'outside.' The phrase likely describes
    approaching or attacking from outside their position. 'From outside them' stays
    close to the Greek while remaining intelligible; the adversarial sense is already
    carried by the context and by 'went out against them.'
- source_word: ἐσάλπισεν ταῖς σάλπιγξιν
  chosen: they sounded the trumpets
  alternatives:
  - he sounded the trumpets
  - blew the trumpets
  lexicon: LSJ
  rationale: Although the verb form is singular in Swete's text, the following plural
    ἐβόησαν suggests collective action, and English idiom naturally renders the military
    signal as plural. 'Sounded the trumpets' is slightly more formal and fits battle
    narrative. The singular could be retained more woodenly, but the plural yields
    a smoother and likely intended sense.
- source_word: ἐβόησαν
  chosen: cried out
  alternatives:
  - shouted
  - raised a cry
  lexicon: LSJ
  rationale: The verb denotes a loud cry or shout. 'Cried out' preserves the vocal
    intensity while fitting the following prepositional phrase 'in prayer.'
- source_word: ἐν προσευχῇ
  chosen: in prayer
  alternatives:
  - with prayer
  - in supplication
  lexicon: LSJ
  rationale: The dative/prepositional phrase indicates the manner or sphere of their
    cry. 'In prayer' is the most direct rendering and preserves the religious character
    of the action without expanding it.
