id: 1MA.5.38
reference: 1 Maccabees 5:38
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέστειλεν Ἰούδας κατασκοπῆσαι τὴν παρεμβολήν· καὶ ἀπήγγειλαν αὐτῷ λέγοντες
    Ἐπισυνηγμένοι εἰσὶν πρὸς αὐτοὺς πάντα τὰ ἔθνη τὰ κύκλῳ ὑμῶν, δύναμις πολλὴ σφόδρα.
  language: Greek
  pages:
  - 636
  confidence: high
  validation: agree
translation:
  text: And Judas sent men to spy out the camp, and they reported to him, saying,
    “All the nations around you have gathered together against them—a very great force.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''against them.'' The pronouns in this report are somewhat unexpected
      in context (''around you ... against them''), but the translation preserves
      the transmitted wording rather than smoothing it to ''against you'' or ''around
      us.'''
    reason: textual_variant
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Standard narrative aorist of ἀποστέλλω; 'sent' is natural modern English
    and sufficiently formal.
- source_word: κατασκοπῆσαι
  chosen: to spy out
  alternatives:
  - to scout
  - to reconnoiter
  lexicon: LSJ
  rationale: The infinitive denotes reconnaissance of enemy positions. 'Spy out' preserves
    the military-surveillance sense without becoming overly technical.
- source_word: παρεμβολήν
  chosen: the camp
  alternatives:
  - the encampment
  - the army camp
  lexicon: LSJ
  rationale: In military context παρεμβολή commonly refers to a camp/encampment. 'The
    camp' is concise and idiomatic.
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - announced
  - brought word
  lexicon: BDAG
  rationale: The verb indicates bringing back a report. 'Reported' fits the reconnaissance
    context well.
- source_word: Ἐπισυνηγμένοι εἰσὶν
  chosen: have gathered together
  alternatives:
  - are assembled
  - have been gathered together
  lexicon: BDAG
  rationale: Perfect periphrastic construction expressing a present state resulting
    from gathering. 'Have gathered together' communicates both completed action and
    current situation.
- source_word: πρὸς αὐτοὺς
  chosen: against them
  alternatives:
  - to them
  - with them
  lexicon: BDAG
  rationale: In this military setting, πρὸς with persons most naturally indicates
    hostile alignment rather than mere direction. Since the scouts are describing
    enemy coalition strength, 'against them' best fits the context. The pronoun is
    retained as 'them' rather than harmonized to 'us' because the Greek reads αὐτούς,
    not ἡμᾶς.
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - all the peoples
  lexicon: BDAG
  rationale: ἔθνη can mean nations, Gentiles, or peoples. Here it refers to surrounding
    ethnic-political groups, so 'nations' is the broadest and least interpretively
    loaded rendering.
- source_word: τὰ κύκλῳ ὑμῶν
  chosen: around you
  alternatives:
  - surrounding you
  - around us
  lexicon: LSJ
  rationale: The phrase denotes the peoples in the surrounding region. The second-person
    pronoun is preserved from the Greek as transmitted.
- source_word: δύναμις πολλὴ σφόδρα
  chosen: a very great force
  alternatives:
  - an exceedingly large army
  - very great strength
  lexicon: BDAG
  rationale: δύναμις in military narrative often means force/troop strength. 'A very
    great force' captures both quantity and martial sense, while σφόδρα intensifies
    πολλή.
