theological_decisions:
- issue: Reference of τὰ ἔθνη in a deuterocanonical Jewish historical context
  chosen_reading: the surrounding nations
  alternative_readings:
  - the surrounding Gentiles
  - the peoples around them
  rationale: The Greek itself says 'the nations around [them].' In this context it
    refers to neighboring non-Jewish peoples hostile to Judean restoration. 'Nations'
    preserves the source wording without importing later NT-specific connotations
    of 'Gentiles.'
  doctrine_reference: 'DOCTRINE.md: original-language primacy; consistency of key
    terms'
