id: 1MA.5.1
reference: 1 Maccabees 5:1
source:
  edition: lxx-swete-1909
  text: Καὶ ἐγένετο ὅτε ἤκουσαν τὰ ἔθνη κυκλόθεν ὅτι ᾠκοδομήθη τὸ θυσιαστήριον καὶ
    ἐνεκαινίσθη τὸ ἁγίασμα ὡς τὸ πρότερον, καὶ ὠργίσθη σφόδρα.
  language: Greek
  pages:
  - 633
  confidence: high
  validation: agree
translation:
  text: And it happened that when the surrounding nations heard that the altar had
    been rebuilt and the sanctuary rededicated as before, they became very angry.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἐγένετο ὅτε
  chosen: And it happened that when
  alternatives:
  - And when
  - Now when it happened that
  lexicon: LSJ
  rationale: This narrative formula is common in Greek influenced by Semitic style.
    Rendering it with 'And it happened that when' preserves the formal transition
    and temporal setup without becoming unintelligible in modern English.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: LSJ
  rationale: In 1 Maccabees this commonly refers to the surrounding non-Jewish peoples.
    'Nations' is the most direct and contextually appropriate rendering; 'Gentiles'
    is possible but more interpretive and more at home in later Jewish/Christian discourse.
- source_word: κυκλόθεν
  chosen: surrounding
  alternatives:
  - around
  - round about
  lexicon: LSJ
  rationale: The adverb indicates the nations around Judea geographically. 'Surrounding'
    gives natural English while preserving the spatial sense.
- source_word: ᾠκοδομήθη
  chosen: had been rebuilt
  alternatives:
  - was built
  - had been built
  lexicon: LSJ
  rationale: Given the context of restoration after desecration, 'rebuilt' better
    captures the sense than a simple 'built.' The pluperfect-like English 'had been
    rebuilt' fits the prior action reported as the content of what they heard.
- source_word: τὸ θυσιαστήριον
  chosen: the altar
  alternatives:
  - the altar of sacrifice
  lexicon: LSJ
  rationale: The term straightforwardly denotes the altar. The shorter rendering is
    sufficient here because the cultic context is already clear.
- source_word: ἐνεκαινίσθη
  chosen: rededicated
  alternatives:
  - was dedicated anew
  - was renewed
  lexicon: LSJ
  rationale: The verb denotes renewal/dedication, and in this temple context 'rededicated'
    is the clearest idiomatic English equivalent, matching the restoration of proper
    worship.
- source_word: τὸ ἁγίασμα
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy precinct
  lexicon: LSJ
  rationale: The noun refers to the sacred sanctuary area rather than holiness in
    the abstract. 'Sanctuary' is natural and sufficiently precise in context.
- source_word: ὡς τὸ πρότερον
  chosen: as before
  alternatives:
  - as formerly
  - as it was previously
  lexicon: LSJ
  rationale: This concise phrase indicates restoration to an earlier state. 'As before'
    is idiomatic and faithful.
- source_word: ὠργίσθη σφόδρα
  chosen: they became very angry
  alternatives:
  - they were greatly enraged
  - they became exceedingly angry
  lexicon: LSJ
  rationale: The aorist passive/deponent with the adverb expresses strong anger. 'Became
    very angry' is clear modern English; 'greatly enraged' is possible but slightly
    more elevated than needed.
