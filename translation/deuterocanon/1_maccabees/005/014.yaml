id: 1MA.5.14
reference: 1 Maccabees 5:14
source:
  edition: lxx-swete-1909
  text: Ἔτι αἱ ἐπιστολαὶ ἀνεγινώ- σκοντο, καὶ ἰδοὺ ἄγγελοι ἕτεροι παρεγένοντο ἐκ τῆς
    Γαλιλαίας διερρηχότες τὰ ἱμάτια, ἀπαγγέλλοντες κατὰ τὰ ῥήματα ταῦτα,
  language: Greek
  pages:
  - 634
  confidence: high
  validation: agree
translation:
  text: 'While the letters were still being read, behold, other messengers arrived
    from Galilee with their garments torn, reporting these words:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'other envoys arrived from Galilee, having torn their garments.' The
      Greek term for 'messengers' here refers to human bearers of news, not heavenly
      angels, and the torn garments signify grief or alarm.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι
  chosen: while ... still
  alternatives:
  - still
  - yet
  lexicon: LSJ
  rationale: 'In context with the imperfect/passive reading process, ἔτι marks ongoing
    action: the letters were in the process of being read when the new arrivals came.'
- source_word: αἱ ἐπιστολαὶ
  chosen: the letters
  alternatives:
  - the written messages
  - the epistles
  lexicon: LSJ
  rationale: A straightforward rendering of the plural noun; 'letters' is natural
    modern English and fits the narrative setting.
- source_word: ἀνεγινώσκοντο
  chosen: were being read
  alternatives:
  - were read
  - were being recited
  lexicon: LSJ
  rationale: Imperfect passive indicates ongoing action in past time, best represented
    by English progressive passive.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - and see
  lexicon: LSJ
  rationale: Retains the narrative deictic force and suddenness of the Greek without
    paraphrasing it away.
- source_word: ἄγγελοι ἕτεροι
  chosen: other messengers
  alternatives:
  - other envoys
  - other angels
  lexicon: LSJ
  rationale: In this historical narrative ἄγγελοι refers to human bearers of news,
    not heavenly beings. 'Messengers' is the clearest default; ἕτεροι adds 'other,'
    distinguishing them from previous carriers.
- source_word: παρεγένοντο
  chosen: arrived
  alternatives:
  - came
  - presented themselves
  lexicon: LSJ
  rationale: Conveys the sense of coming on the scene in idiomatic English.
- source_word: ἐκ τῆς Γαλιλαίας
  chosen: from Galilee
  alternatives:
  - out of Galilee
  lexicon: LSJ
  rationale: Standard geographical rendering.
- source_word: διερρηχότες τὰ ἱμάτια
  chosen: with their garments torn
  alternatives:
  - having torn their garments
  - with clothes torn
  lexicon: LSJ
  rationale: Perfect participle describes their state upon arrival. 'Garments' preserves
    the formal mourning/distress expression better than the more casual 'clothes.'
- source_word: ἀπαγγέλλοντες
  chosen: reporting
  alternatives:
  - announcing
  - bringing word
  - telling
  lexicon: LSJ
  rationale: A participle of communication introducing the content that follows; 'reporting'
    fits the messenger context.
- source_word: κατὰ τὰ ῥήματα ταῦτα
  chosen: these words
  alternatives:
  - this message
  - to this effect
  lexicon: LSJ
  rationale: The phrase introduces the wording/content of the report. 'These words'
    stays close to the Greek while remaining readable.
