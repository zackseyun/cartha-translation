id: 1MA.5.44
reference: 1 Maccabees 5:44
source:
  edition: lxx-swete-1909
  text: καὶ προκατελάβοντο τὴν πόλιν, καὶ τὸ τέμενος ἐνεπύρισαν ἐν πυρὶ σὺν πᾶσιν
    τοῖς οὖσιν ἐν αὐτῷ· καὶ ἐτροπώθη ἡ Καρναῒν, καὶ οὐκ ἐδύ- νατο ἔτι ὑποστῆναι κατὰ
    πρόσωπον Ἰούδα.
  language: Greek
  pages:
  - 637
  confidence: high
  validation: agree
translation:
  text: And they seized the city in advance, and they burned the temple precinct with
    fire, together with all who were in it; and Karnain was routed, and it could no
    longer stand against Judas face to face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with all that was in it.' The Greek phrase could be read more broadly,
      though in context it likely refers to the people inside the sacred precinct.
    reason: lexical_alternative
lexical_decisions:
- source_word: προκατελάβοντο
  chosen: seized ... in advance
  alternatives:
  - took beforehand
  - occupied first
  - preemptively captured
  lexicon: LSJ
  rationale: The compound verb with προ- conveys taking possession ahead of opposition
    or before others. 'Seized ... in advance' preserves both the force of capture
    and the prefixed sense without becoming too wooden.
- source_word: πόλιν
  chosen: city
  alternatives:
  - town
  lexicon: LSJ
  rationale: Standard rendering for πόλις; 'city' is the natural English equivalent
    here.
- source_word: τέμενος
  chosen: temple precinct
  alternatives:
  - sanctuary
  - temple
  lexicon: LSJ
  rationale: τέμενος denotes a sacred precinct or consecrated enclosure, not necessarily
    only the shrine building itself. 'Temple precinct' best preserves that broader
    sense.
- source_word: ἐνεπύρισαν ἐν πυρί
  chosen: burned ... with fire
  alternatives:
  - set ... on fire
  - burned up
  lexicon: LSJ
  rationale: The Greek is emphatic and somewhat redundant in English. 'Burned ...
    with fire' keeps the explicit instrumentality of ἐν πυρί while remaining readable.
- source_word: σὺν πᾶσιν τοῖς οὖσιν ἐν αὐτῷ
  chosen: together with all who were in it
  alternatives:
  - with everything in it
  - with all that was in it
  lexicon: LSJ
  rationale: The masculine/neuter plural participial phrase can in some contexts be
    broad, but in this military narrative the most natural sense is the persons inside
    the precinct. The following singular feminine subject for Karnain confirms the
    city remains distinct from those within. The choice avoids flattening the likely
    human tragedy into mere objects, while an alternative is preserved in a footnote.
- source_word: ἐτροπώθη
  chosen: was routed
  alternatives:
  - was turned back
  - was defeated
  lexicon: LSJ
  rationale: From τρέπω in the passive with military sense, indicating being put to
    flight or routed. 'Was routed' fits the battle context.
- source_word: Καρναῒν
  chosen: Karnain
  alternatives:
  - Carnaim
  - Carnain
  lexicon: LSJ
  rationale: Personal and place names are transliterated by standard convention. 'Karnain'
    reflects the Greek form closely in modern English spelling.
- source_word: οὐκ ἐδύνατο ἔτι ὑποστῆναι
  chosen: could no longer stand
  alternatives:
  - could no longer withstand
  - was no longer able to resist
  lexicon: LSJ
  rationale: ὑποστῆναι here means to stand one's ground or withstand. 'Could no longer
    stand' is concise, and the following phrase clarifies the adversarial sense.
- source_word: κατὰ πρόσωπον Ἰούδα
  chosen: against Judas face to face
  alternatives:
  - before Judas
  - in the presence of Judas
  - against Judas directly
  lexicon: LSJ
  rationale: The idiom κατὰ πρόσωπον literally means 'face to face' and in conflict
    contexts implies direct confrontation. Retaining 'face to face' preserves the
    vividness of the Greek.
