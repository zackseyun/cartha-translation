id: 1MA.5.40
reference: 1 Maccabees 5:40
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν Τιμόθεος τοῖς ἄρχουσιν τῆς δυνάμεως αὐτοῦ ἐν τῷ ἐγγίζειν Ἰούδαν
    καὶ τὴν παρεμβολὴν αὐτοῦ Λ ἐπὶ τοῦ χειμάρρουν τοῦ ὕδατος Ἐὰν διαβῇ πρὸς ἡμᾶς πρότερος,
    οὐ δυνησόμεθα ὑποστῆναι αὐτόν, ὅτι δυνήσεται πρὸς ἡμᾶς.
  language: Greek
  pages:
  - 636
  confidence: high
  validation: agree
translation:
  text: And Timotheus said to the commanders of his forces, when Judas and his camp
    were drawing near to the wadi, “If he crosses over to us first, we will not be
    able to withstand him, because he will surely prevail against us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the torrent/stream of water.' The expression likely refers
      to a wadi or seasonal watercourse rather than a major river.
    reason: cultural_note
  - marker: b
    text: Or, more literally, 'he will be able against us.' The sense in context is
      that Judas would overpower them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρχουσιν
  chosen: commanders
  alternatives:
  - leaders
  - rulers
  - officers
  lexicon: BDAG
  rationale: In this military context, the term refers to those in authority over
    troops. 'Commanders' best conveys functional military leadership in natural English.
- source_word: δυνάμεως
  chosen: forces
  alternatives:
  - army
  - power
  - troops
  lexicon: BDAG
  rationale: Here δύναμις denotes military strength or armed force. 'Forces' fits
    the genitive phrase 'of his forces' and avoids over-specifying a formal army unit.
- source_word: ἐν τῷ ἐγγίζειν
  chosen: when ... were drawing near
  alternatives:
  - as ... approached
  - at the approach of
  lexicon: BDAG
  rationale: The articular infinitive with ἐν expresses contemporaneous time. 'When
    ... were drawing near' preserves the temporal sense while reading naturally in
    English.
- source_word: παρεμβολὴν
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: BDAG
  rationale: The word commonly denotes a camp or encamped force. 'Camp' is concise
    and idiomatic here.
- source_word: χειμάρρουν τοῦ ὕδατος
  chosen: wadi of water
  alternatives:
  - watercourse
  - streambed
  - torrent-bed
  lexicon: LSJ
  rationale: χειμάρρους often refers to a winter-flowing torrent or ravine. Because
    the phrase is literally 'torrent/stream of water' and likely denotes a seasonal
    watercourse, 'wadi of water' preserves the terrain sense better than a generic
    'river' or 'brook'.
- source_word: διαβῇ
  chosen: crosses over
  alternatives:
  - passes across
  - comes across
  lexicon: BDAG
  rationale: The verb indicates crossing from one side to another, likely of the watercourse.
    'Crosses over' is the most straightforward rendering.
- source_word: ὑποστῆναι
  chosen: withstand
  alternatives:
  - stand against
  - resist
  - hold our ground against
  lexicon: BDAG
  rationale: The verb here means to stand up against an opponent in battle. 'Withstand'
    is concise and suitably martial.
- source_word: δυνήσεται πρὸς ἡμᾶς
  chosen: he will surely prevail against us
  alternatives:
  - he will be too strong for us
  - he will be able against us
  lexicon: BDAG
  rationale: The Greek is somewhat compressed and idiomatic, literally 'he will be
    able toward/against us.' In context it means Judas will overpower them. 'Surely
    prevail against us' brings out the military sense without wooden awkwardness.
- source_word: Τιμόθεος
  chosen: Timotheus
  alternatives:
  - Timothy
  lexicon: LSJ
  rationale: As a personal name in a deuterocanonical Greek historical book, 'Timotheus'
    is a standard transliteration closer to the Greek form than the anglicized 'Timothy'.
- source_word: Ἰούδαν
  chosen: Judas
  alternatives:
  - Judah
  lexicon: LSJ
  rationale: The referent is the person Judas Maccabeus, so the conventional personal-name
    transliteration 'Judas' is appropriate, not the tribal/geographical 'Judah'.
