id: 1MA.5.31
reference: 1 Maccabees 5:31
source:
  edition: lxx-swete-1909
  text: καὶ εἶδεν Ἰούδας ὅτι ἦρκται ὁ πόλεμος, καὶ ἡ κραυγὴ τῆς πόλεως ἀνέβη ἕως οὐρανοῦ
    σάλπιγξιν καὶ κραυγῇ μεγάλῃ·
  language: Greek
  pages:
  - 636
  confidence: high
  validation: agree
translation:
  text: And Judas saw that the battle had begun, and the outcry of the city went up
    to heaven with trumpet blasts and a great cry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with trumpets and loud shouting.' The Greek datives can be rendered
      more instrumentally or more generally as accompanying sounds.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦρκται
  chosen: had begun
  alternatives:
  - had started
  - was underway
  lexicon: LSJ
  rationale: Perfect middle/passive of ἄρχω conveys that the battle was already in
    progress when Judas perceived it; English pluperfect fits the narrative sequence
    after 'saw that'.
- source_word: ὁ πόλεμος
  chosen: the battle
  alternatives:
  - the war
  - the fighting
  lexicon: LSJ
  rationale: Although πόλεμος can mean 'war,' in this immediate scene it refers to
    the present engagement rather than the whole campaign, so 'battle' is more natural
    and contextually precise.
- source_word: ἡ κραυγὴ τῆς πόλεως
  chosen: the outcry of the city
  alternatives:
  - the cry of the city
  - the shouting from the city
  lexicon: LSJ
  rationale: 'κραυγή denotes a loud cry or outcry. The genitive τῆς πόλεως is best
    taken as source/association: the city''s outcry, i.e., the cry arising from within
    the city.'
- source_word: ἀνέβη ἕως οὐρανοῦ
  chosen: went up to heaven
  alternatives:
  - rose to heaven
  - went up as far as heaven
  lexicon: LSJ
  rationale: A conventional idiom for a cry ascending heavenward. 'Went up to heaven'
    preserves the vertical imagery without over-literal stiffness.
- source_word: σάλπιγξιν
  chosen: with trumpet blasts
  alternatives:
  - with trumpets
  - with trumpet calls
  lexicon: LSJ
  rationale: Dative plural likely expresses accompaniment or manner. 'Trumpet blasts'
    makes explicit the sounding implied by the instrument in this military context.
- source_word: κραυγῇ μεγάλῃ
  chosen: and a great cry
  alternatives:
  - and loud shouting
  - and a loud cry
  lexicon: LSJ
  rationale: The phrase intensifies the scene with another dative of accompaniment/manner.
    'Great cry' is a transparent rendering of the adjective μεγάλη while remaining
    idiomatic enough in English.
