id: 1MA.5.41
reference: 1 Maccabees 5:41
source:
  edition: lxx-swete-1909
  text: ἐὰν δὲ διέλθωμεν καὶ παρεμβάλῃ πέραν τοῦ ποταμοῦ, διαπεράσομεν πρὸς αὐτόν.
  language: Greek
  pages:
  - 637
  confidence: high
  validation: agree
translation:
  text: But if we cross over and camp beyond the river, we will cross over against
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward him.' The Greek phrase can be read more neutrally, but in this
      battle context it likely means advancing against him.
    reason: lexical_alternative
lexical_decisions:
- source_word: διέλθωμεν
  chosen: we cross over
  alternatives:
  - we pass through
  - we go across
  lexicon: LSJ
  rationale: The aorist subjunctive after ἐὰν expresses a future contingency. 'Cross
    over' fits the military movement context and pairs naturally with the later διαπεράσομεν.
- source_word: παρεμβάλῃ
  chosen: camp
  alternatives:
  - encamp
  - set up camp
  lexicon: LSJ
  rationale: In military context the verb refers to making camp or encamping. 'Camp'
    is concise modern English while preserving the military sense.
- source_word: πέραν τοῦ ποταμοῦ
  chosen: beyond the river
  alternatives:
  - across the river
  - on the far side of the river
  lexicon: LSJ
  rationale: πέραν denotes the far side or beyond. 'Beyond the river' preserves the
    spatial perspective of the Greek without over-specifying.
- source_word: διαπεράσομεν
  chosen: we will cross over
  alternatives:
  - we will pass across
  - we will go over
  lexicon: LSJ
  rationale: The future verb again denotes crossing. Retaining 'cross over' reflects
    the repeated Greek root and keeps the tactical sequence clear.
- source_word: πρὸς αὐτόν
  chosen: against him
  alternatives:
  - to him
  - toward him
  lexicon: LSJ
  rationale: In this military setting, movement πρὸς a person implies advancing to
    engage him, not merely approaching neutrally. 'Against him' makes the hostile
    force of the context explicit without adding content beyond the scene.
