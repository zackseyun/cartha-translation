id: 1MA.5.59
reference: 1 Maccabees 5:59
source:
  edition: lxx-swete-1909
  text: καὶ ἐξῆλθεν Γοργίας ἐκ τῆς πόλεως, καὶ οἱ ἄνδρες αὐτοῦ εἰς συνάντησιν αὐτοῖς
    εἰς πόλεμον.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
translation:
  text: And Gorgias came out from the city, and his men, to meet them in battle.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: came out
  alternatives:
  - went out
  lexicon: BDAG
  rationale: The aorist of ἐξέρχομαι denotes movement out from within a place. 'Came
    out' is natural English here and fits the narrative viewpoint from the battlefield;
    'went out' is possible but less idiomatic in this context.
- source_word: πόλεως
  chosen: city
  alternatives:
  - town
  lexicon: BDAG
  rationale: πόλις normally means 'city' or 'town'; 'city' is the standard rendering
    and best preserves the military-urban setting.
- source_word: οἱ ἄνδρες αὐτοῦ
  chosen: his men
  alternatives:
  - the men with him
  - his soldiers
  lexicon: BDAG
  rationale: ἄνδρες here refers to Gorgias's male fighting force. 'His men' is concise
    and natural; 'his soldiers' is interpretive, since the Greek does not explicitly
    use a military technical term, though the context is martial.
- source_word: εἰς συνάντησιν αὐτοῖς
  chosen: to meet them
  alternatives:
  - for an encounter with them
  - against them
  lexicon: BDAG
  rationale: The idiom εἰς συνάντησιν + dative means 'to meet' or 'for a meeting with.'
    In this military context it implies hostile engagement, which is then made explicit
    by the following εἰς πόλεμον.
- source_word: εἰς πόλεμον
  chosen: in battle
  alternatives:
  - for battle
  - to war
  lexicon: BDAG
  rationale: Literally 'into battle/war.' 'In battle' gives smooth English while preserving
    the martial sense and avoiding an overly wooden repetition of 'to' after 'to meet
    them.'
