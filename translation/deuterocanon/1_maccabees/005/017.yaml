id: 1MA.5.17
reference: 1 Maccabees 5:17
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν Ἰούδας Σίμωνι τῷ ἀδελφῷ αὐτοῦ Ἐπίλεξον σεαυτῷ ἄνδρας, καὶ πορεύου
    καὶ ῥῦσαι τοὺς ἀδελφούς σου ἐν τῇ Γαλιλαίᾳ· ἐγὼ δὲ καὶ Ἰωναθὰν ὁ ἀδελφός μου πορευσόμεθα
    εἰς τὴν Γαλααδῖτιν.
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
translation:
  text: And Judas said to Simon his brother, “Choose men for yourself, and go and
    rescue your brothers in Galilee; but I and Jonathan my brother will go into Gileaditis.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “into Gilead.” The Greek names the region as “Gileaditis,” a more specific
      regional form.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπίλεξον
  chosen: Choose
  alternatives:
  - Select
  - Pick out
  lexicon: LSJ
  rationale: Aorist imperative of ἐπιλέγω. 'Choose' is natural modern English and
    preserves the directive force without sounding overly formal.
- source_word: σεαυτῷ
  chosen: for yourself
  alternatives:
  - for yourself personally
  - for your own part
  lexicon: LSJ
  rationale: The reflexive dative indicates Simon is to choose the men for his own
    assigned expedition. 'For yourself' preserves the reflexive nuance.
- source_word: ἄνδρας
  chosen: men
  alternatives:
  - soldiers
  - fighters
  lexicon: LSJ
  rationale: The Greek literally says 'men.' While the context implies fighting men,
    the text does not explicitly specify 'soldiers,' so the more direct rendering
    is retained.
- source_word: πορεύου
  chosen: go
  alternatives:
  - set out
  - travel
  lexicon: LSJ
  rationale: Common imperative meaning 'go' or 'proceed.' 'Go' is the clearest and
    most idiomatic choice in English.
- source_word: ῥῦσαι
  chosen: rescue
  alternatives:
  - deliver
  - save
  lexicon: LSJ
  rationale: Aorist middle imperative of ῥύομαι. In this military-danger context,
    'rescue' best conveys active deliverance from threat, more concretely than 'save'
    and more idiomatically than 'deliver'.
- source_word: τοὺς ἀδελφούς σου
  chosen: your brothers
  alternatives:
  - your fellow Jews
  - your kindred
  lexicon: LSJ
  rationale: The Greek is literally 'your brothers.' In 1 Maccabees this can denote
    fellow Israelites/kinsmen, but the text uses kinship language directly, so it
    is preserved rather than interpreted.
- source_word: ἐν τῇ Γαλιλαίᾳ
  chosen: in Galilee
  alternatives:
  - who are in Galilee
  lexicon: LSJ
  rationale: Locative phrase indicating where the endangered brothers are. 'In Galilee'
    is sufficient and natural.
- source_word: ἐγὼ δὲ καὶ Ἰωναθὰν ὁ ἀδελφός μου
  chosen: but I and Jonathan my brother
  alternatives:
  - and as for me, and Jonathan my brother
  - while Jonathan my brother and I
  lexicon: LSJ
  rationale: The contrastive δέ marks a division of assignments. This rendering keeps
    the contrast and the Greek order reasonably closely. Although 'Jonathan my brother
    and I' is smoother English, the chosen wording stays nearer the source while remaining
    intelligible.
- source_word: πορευσόμεθα
  chosen: will go
  alternatives:
  - will proceed
  - will set out
  lexicon: LSJ
  rationale: Future middle of πορεύομαι. 'Will go' is the most straightforward English
    future.
- source_word: εἰς τὴν Γαλααδῖτιν
  chosen: into Gileaditis
  alternatives:
  - into Gilead
  - to the Gileadite region
  lexicon: LSJ
  rationale: Γαλααδῖτις is a regional designation derived from Gilead. 'Gileaditis'
    preserves the proper-place form found in the Greek more transparently than flattening
    it to 'Gilead,' though 'Gilead' is a plausible simplification.
