id: 1MA.5.25
reference: 1 Maccabees 5:25
source:
  edition: lxx-swete-1909
  text: καὶ συνήντησαν τοῖς Ναβαταίοις, καὶ ὑπήντησαν αὐτοῖς εἰρηνικῶς, καὶ διηγήσαντο
    αὐτοῖς ἅπαντα τὰ συμβεβηκότα τοῖς ἀδελφοῖς αὐτῶν ἐν τῇ Γαλααδίτιδι·
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
translation:
  text: And they met the Nabateans, and they greeted them peaceably, and they told
    them everything that had happened to their brothers in Gilead,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they greeted them peacefully' or 'they met them in peace.' The Greek
      verb can denote going out to meet or receiving someone, and the adverb emphasizes
      peaceful intent.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήντησαν
  chosen: met
  alternatives:
  - encountered
  - came upon
  lexicon: BDAG
  rationale: A straightforward narrative verb meaning to meet or encounter. 'Met'
    is natural English and preserves the simple event without implying hostility.
- source_word: Ναβαταίοις
  chosen: Nabateans
  alternatives:
  - Nabataeans
  lexicon: LSJ
  rationale: Standard English transliteration for the people group Ναβαταῖοι. This
    follows the philosophy of transliterating names and ethnonyms by standard convention.
- source_word: ὑπήντησαν αὐτοῖς εἰρηνικῶς
  chosen: they received them peaceably
  alternatives:
  - they greeted them peacefully
  - they met them in peace
  lexicon: BDAG
  rationale: The verb ὑπαντάω can mean to go to meet or receive, and with εἰρηνικῶς
    the sense is clearly non-hostile. 'Received them peaceably' captures the interpersonal
    welcome implied by the dative and adverb better than a bare repetition of 'met.'
- source_word: διηγήσαντο
  chosen: they told
  alternatives:
  - they related
  - they recounted
  - they reported
  lexicon: BDAG
  rationale: The verb means to relate in detail or recount. 'Told' is slightly less
    formal but still accurate in context; the object 'everything that had happened'
    carries the fuller reporting sense.
- source_word: ἅπαντα τὰ συμβεβηκότα
  chosen: everything that had happened
  alternatives:
  - all the things that had taken place
  - everything that had befallen
  lexicon: BDAG
  rationale: This phrase refers comprehensively to the events that had occurred. 'Everything
    that had happened' is idiomatic modern English and preserves the totalizing force
    of ἅπαντα.
- source_word: τοῖς ἀδελφοῖς αὐτῶν
  chosen: their brothers
  alternatives:
  - their brothers and kin
  - their fellow Jews
  lexicon: BDAG
  rationale: ἀδελφοί is literally 'brothers.' In this military-ethnic context it likely
    refers to fellow Israelites/Jews, but the text itself uses kinship language, so
    'their brothers' best preserves the source wording and social force.
- source_word: ἐν τῇ Γαλααδίτιδι
  chosen: in Gilead
  alternatives:
  - in the land of Gilead
  - in the Gilead region
  lexicon: LSJ
  rationale: The toponym refers to the region of Gilead. 'In Gilead' is the most natural
    concise rendering.
