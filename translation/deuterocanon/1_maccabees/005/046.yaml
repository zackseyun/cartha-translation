id: 1MA.5.46
reference: 1 Maccabees 5:46
source:
  edition: lxx-swete-1909
  text: καὶ ἦλθον ἕως Ἐφρών, καὶ αὕτη ἡ πόλις μεγάλη ἡ τῆς εἰσόδου, ἰσχυρὰ σφόδρα·
    οὐκ ἦν ἐκκλῖναι ἀπ’ αὐτῆς δεξιὰν ἢ ἀριστεράν, ἀλλ’ ἢ διὰ μέσου αὐτῆς πορεύεσθαι.
  language: Greek
  pages:
  - 637
  confidence: high
  validation: agree
translation:
  text: And they came as far as Ephron, a large city at the entrance, very strong.
    There was no turning aside from it to the right or to the left, but only to go
    through the middle of it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the pass' or 'at the approach'; the Greek phrase identifies Ephron
      as controlling the entrance route, which explains why they could not go around
      it.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον ἕως Ἐφρών
  chosen: they came as far as Ephron
  alternatives:
  - they arrived at Ephron
  - they came to Ephron
  lexicon: LSJ
  rationale: ἕως with a place name naturally marks extent, 'as far as.' 'Ephron' is
    transliterated as a place name per project philosophy.
- source_word: αὕτη ἡ πόλις μεγάλη
  chosen: a large city
  alternatives:
  - this city was large
  - that city was large
  lexicon: LSJ
  rationale: 'Although αὕτη is literally ''this,'' English reads more naturally by
    apposition after the place name: ''Ephron, a large city.'' This preserves the
    descriptive force without awkwardness.'
- source_word: ἡ τῆς εἰσόδου
  chosen: at the entrance
  alternatives:
  - of the entrance
  - at the pass
  - at the approach
  lexicon: LSJ
  rationale: The genitive phrase identifies the city's strategic position at an entrance/approach.
    'At the entrance' is clear modern English and fits the following statement that
    one could not go around it.
- source_word: ἰσχυρὰ σφόδρα
  chosen: very strong
  alternatives:
  - exceedingly strong
  - very fortified
  - very powerful
  lexicon: LSJ
  rationale: ἰσχυρά can describe strength generally; in context of a city, it implies
    strong defenses. 'Very strong' stays close to the Greek while allowing the military
    sense to be inferred.
- source_word: οὐκ ἦν ἐκκλῖναι
  chosen: There was no turning aside
  alternatives:
  - it was not possible to turn aside
  - there was no way to turn off
  lexicon: LSJ
  rationale: The impersonal construction expresses impossibility. 'There was no turning
    aside' is idiomatic and preserves the Greek structure's force.
- source_word: ἀπ’ αὐτῆς δεξιὰν ἢ ἀριστεράν
  chosen: from it to the right or to the left
  alternatives:
  - past it on the right or the left
  - around it to the right or to the left
  lexicon: LSJ
  rationale: The phrase indicates one could not bypass the city on either side. 'From
    it to the right or to the left' is a close rendering, clarified by the following
    clause.
- source_word: ἀλλ’ ἢ διὰ μέσου αὐτῆς πορεύεσθαι
  chosen: but only to go through the middle of it
  alternatives:
  - except to travel through its midst
  - but only to pass through it
  lexicon: LSJ
  rationale: The construction means the only option was passage through the city itself.
    'Through the middle of it' reflects διὰ μέσου and preserves the tactical sense
    that the route ran directly through the city.
