id: 1MA.5.47
reference: 1 Maccabees 5:47
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέκλεισαν αὐτοὺς οἱ ἐκ τῆς πόλεως, καὶ ἐνέφραξαν τὰς πύλας λίθοις.
  language: Greek
  pages:
  - 637
  confidence: high
  validation: agree
translation:
  text: And those from the city shut them in and blocked the gates with stones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπέκλεισαν
  chosen: shut ... in
  alternatives:
  - hemmed ... in
  - confined
  - shut off
  lexicon: LSJ
  rationale: The verb conveys enclosing or shutting in. 'Shut them in' is idiomatic
    modern English and preserves the sense that those inside were trapped by the city's
    defenders.
- source_word: οἱ ἐκ τῆς πόλεως
  chosen: the men from the city
  alternatives:
  - those from the city
  - the people of the city
  - the inhabitants of the city
  lexicon: LSJ
  rationale: Literally 'those from the city.' In this military context it refers to
    the city's defenders or inhabitants acting collectively. 'The men from the city'
    gives a natural English rendering without over-specifying beyond the Greek.
- source_word: ἐνέφραξαν
  chosen: blocked
  alternatives:
  - stopped up
  - barred
  - closed off
  lexicon: LSJ
  rationale: The verb means to fence in, stop up, or block. Since the object is gates
    and the instrument is stones, 'blocked' best captures the physical action in clear
    English.
- source_word: τὰς πύλας
  chosen: the gates
  alternatives:
  - the gate entrances
  - the gateways
  lexicon: LSJ
  rationale: Standard rendering for city gates; plural should be preserved.
- source_word: λίθοις
  chosen: with stones
  alternatives:
  - by means of stones
  - using stones
  lexicon: LSJ
  rationale: Instrumental dative indicating the material used to obstruct the gates.
