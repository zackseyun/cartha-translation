id: 1MA.5.19
reference: 1 Maccabees 5:19
source:
  edition: lxx-swete-1909
  text: καὶ ἐνετείλατο αὐτοῖς λέγων Πρόσεχετε, τοῦ λαοῦ τούτου, καὶ μὴ συνάψητε πόλεμον
    πρὸς τὰ ἔθνη ἕως τοῦ ἐπιστρέψαι ἡμᾶς.
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
translation:
  text: And he commanded them, saying, “Take care of this people, and do not join
    battle with the nations until we return.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “watch over this people.” The Greek imperative can emphasize protective
      attention as well as general caution.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνετείλατο
  chosen: commanded
  alternatives:
  - gave orders to
  - instructed
  lexicon: BDAG
  rationale: The middle of ἐντέλλομαι commonly denotes giving a charge or command.
    'Commanded' preserves the authoritative force better than the softer 'instructed.'
- source_word: Πρόσεχετε
  chosen: Take care of
  alternatives:
  - watch over
  - be on guard for
  - pay attention to
  lexicon: BDAG
  rationale: In this context, with the genitive τοῦ λαοῦ τούτου, the sense is not
    merely mental attention but protective care or watchfulness toward the people.
    'Take care of this people' captures the practical charge.
- source_word: τοῦ λαοῦ τούτου
  chosen: this people
  alternatives:
  - these people
  - this nation
  lexicon: BDAG
  rationale: λαός here refers to a collective people-group under their protection.
    'This people' is a natural singular collective in English and stays close to the
    Greek.
- source_word: μὴ συνάψητε πόλεμον
  chosen: do not join battle
  alternatives:
  - do not engage in war
  - do not begin a battle
  - do not wage war
  lexicon: LSJ
  rationale: The idiom συνάπτειν πόλεμον means to enter into or engage in conflict.
    'Join battle' is concise, idiomatic English that reflects the military sense without
    overexpanding it.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: BDAG
  rationale: In 1 Maccabees, ἔθνη often refers to surrounding non-Jewish peoples,
    but 'the nations' is the more transparent and less interpretively loaded rendering
    in English. 'Gentiles' would import later NT usage more strongly than necessary
    here.
- source_word: ἕως τοῦ ἐπιστρέψαι ἡμᾶς
  chosen: until we return
  alternatives:
  - until our returning
  - until we come back
  lexicon: BDAG
  rationale: The articular infinitive with ἕως expresses a temporal limit. 'Until
    we return' is natural English and accurately conveys the sense.
