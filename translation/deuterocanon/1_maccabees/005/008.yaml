id: 1MA.5.8
reference: 1 Maccabees 5:8
source:
  edition: lxx-swete-1909
  text: καὶ προκατελάβε τὴν Ἰαζὴρ καὶ τὰς θυγατέρας αὐτῆς, καὶ ἀπέστρεψεν εἰς τὴν
    Ἰουδαίαν.
  language: Greek
  pages:
  - 634
  confidence: high
  validation: minor_mismatch
translation:
  text: And he captured Jazer and its villages, and returned to Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'its daughters,' an idiom for the smaller settlements belonging
      to a city.
    reason: lexical_alternative
lexical_decisions:
- source_word: προκατελάβε
  chosen: captured
  alternatives:
  - took
  - seized beforehand
  - occupied
  lexicon: LSJ
  rationale: The compound verb from προκαταλαμβάνω here denotes taking possession
    of a place in a military context. 'Captured' best fits the narrative setting and
    natural English, while avoiding an overly wooden 'took beforehand,' since the
    preverb is not clearly foregrounded in English here.
- source_word: Ἰαζήρ
  chosen: Jazer
  alternatives:
  - Jazēr
  rationale: Standard English transliteration of the place name, matching conventional
    biblical usage while preserving the Greek referent.
- source_word: θυγατέρας
  chosen: villages
  alternatives:
  - daughter towns
  - dependent towns
  lexicon: LSJ
  rationale: In geographic usage, 'daughters' refers to satellite settlements belonging
    to a main city. 'Villages' communicates the sense clearly in modern English; the
    more literal 'daughter towns' would be obscure.
- source_word: ἀπέστρεψεν
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: LSJ
  rationale: The verb means to turn back or return. 'Returned' is idiomatic and suits
    the concise military narrative.
- source_word: Ἰουδαίαν
  chosen: Judea
  alternatives:
  - the Judean land
  - Judah
  rationale: Ἰουδαία in Hellenistic Greek normally refers to Judea, the region. 'Judah'
    could suggest the older tribal territory and is less precise here.
