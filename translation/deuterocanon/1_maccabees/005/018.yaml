id: 1MA.5.18
reference: 1 Maccabees 5:18
source:
  edition: lxx-swete-1909
  text: καὶ κατέ- λιπεν Ἰώσηφον τὸν τοῦ Ζαχαρίου καὶ Ἀζαρίαν ἡγούμενον τοῦ λαοῦ μετὰ
    τῶν ἐπιλοίπων τῆς δυνάμεως ἐν τῇ Ἰουδαίᾳ εἰς τήρησιν·
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
translation:
  text: And he left Joseph son of Zechariah and Azariah, leaders of the people, with
    the rest of the forces in Judea for defense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for guarding' or 'for protection.' The Greek phrase εἰς τήρησιν emphasizes
      keeping watch or guarding.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέλιπεν
  chosen: left
  alternatives:
  - appointed
  - remained behind with
  lexicon: LSJ
  rationale: The verb straightforwardly means 'left behind' or 'left.' 'Appointed'
    would overread the context, though the leaving has an implicit commissioning function.
- source_word: Ἰώσηφον τὸν τοῦ Ζαχαρίου
  chosen: Joseph son of Zechariah
  alternatives:
  - Joseph, the son of Zechariah
  lexicon: LSJ
  rationale: The idiom τὸν τοῦ + genitive identifies parentage. 'Son of Zechariah'
    is natural English and preserves the genealogical marker.
- source_word: Ἀζαρίαν
  chosen: Azariah
  rationale: Standard transliteration of the personal name.
- source_word: ἡγούμενον τοῦ λαοῦ
  chosen: leader of the people
  alternatives:
  - governor of the people
  - commander of the people
  lexicon: LSJ
  rationale: ἡγούμενος can denote one who leads or governs. 'Leader' is broad and
    fits the military-administrative setting without overstating a formal office.
- source_word: μετὰ τῶν ἐπιλοίπων τῆς δυνάμεως
  chosen: with the rest of the forces
  alternatives:
  - with the remaining army
  - with the rest of the strength
  lexicon: LSJ
  rationale: ἐπίλοιπος means 'remaining' or 'rest,' and δύναμις in military contexts
    commonly refers to forces/troops. 'Forces' is idiomatic modern English.
- source_word: ἐν τῇ Ἰουδαίᾳ
  chosen: in Judea
  alternatives:
  - in Judaea
  lexicon: LSJ
  rationale: Standard English geographical rendering.
- source_word: εἰς τήρησιν
  chosen: for defense
  alternatives:
  - for guarding
  - for keeping watch
  - for protection
  lexicon: LSJ
  rationale: τήρησις denotes guarding, keeping, or watch. In this military context,
    'for defense' best conveys the purpose of leaving troops in Judea, while remaining
    faithful to the noun's protective sense.
