id: 1MA.5.58
reference: 1 Maccabees 5:58
source:
  edition: lxx-swete-1909
  text: καὶ παρήγγειλαν τοῖς ἀπὸ τῆς δυνάμεως τῆς μετʼ αὐτῶν, καὶ ἐπορεύθησαν ἐπὶ
    Ἰαμνίαν.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
translation:
  text: And they gave orders to those from the force with them, and they marched against
    Jamnia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Jamnia.' The Greek phrase can denote movement toward a place, but
      in this military context it likely implies hostile advance.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρήγγειλαν
  chosen: gave orders
  alternatives:
  - commanded
  - instructed
  lexicon: BDAG
  rationale: The verb denotes issuing instructions or commands. 'Gave orders' is natural
    modern English and preserves the military setting without sounding overly stiff.
- source_word: τοῖς ἀπὸ τῆς δυνάμεως τῆς μετʼ αὐτῶν
  chosen: to those from the force with them
  alternatives:
  - to those of the army with them
  - to the men from the force that was with them
  lexicon: LSJ
  rationale: δύναμις in this context refers to a military force. The phrase is somewhat
    awkward in Greek, so the rendering stays close while remaining readable. 'Those
    from the force with them' preserves the partitive sense of ἀπό better than simply
    'the force with them.'
- source_word: ἐπορεύθησαν
  chosen: they marched
  alternatives:
  - they went
  - they proceeded
  lexicon: BDAG
  rationale: In a military narrative, 'marched' brings out the movement of troops
    more clearly than the generic 'went,' while remaining within the verb's contextual
    sense.
- source_word: ἐπὶ Ἰαμνίαν
  chosen: against Jamnia
  alternatives:
  - to Jamnia
  - toward Jamnia
  lexicon: LSJ
  rationale: With a verb of military movement, ἐπί plus accusative commonly carries
    hostile direction. 'Against Jamnia' best reflects the likely sense in context.
- source_word: Ἰαμνίαν
  chosen: Jamnia
  alternatives:
  - Iamnia
  lexicon: LSJ
  rationale: Standard English transliteration for the place-name.
