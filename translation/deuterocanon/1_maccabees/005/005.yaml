theological_decisions:
- issue: Rendering of ἀνεθεμάτισεν in a holy-war context
  chosen_reading: devoted them to destruction
  alternative_readings:
  - put them under the ban
  - utterly destroyed them
  rationale: The Greek carries more than ordinary military destruction; it evokes
    the ban/devotion-to-destruction concept known from biblical warfare language.
    The chosen rendering preserves that theological and lexical weight without resorting
    to less familiar jargon in the main text.
