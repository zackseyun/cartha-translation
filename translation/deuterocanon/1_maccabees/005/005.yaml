id: 1MA.5.5
reference: 1 Maccabees 5:5
source:
  edition: lxx-swete-1909
  text: καὶ διεκλείσθησαν ὑπʼ αὐτοῦ εἰς τοὺς πύργους, καὶ παρέβαλεν ἐπʼ αὐτούς, καὶ
    ἀνεθεμάτισεν αὐτούς, καὶ ἐνεπύρισεν τοὺς πύργους αὐτῆς ἐν πυρὶ σὺν πᾶσιν τοῖς
    ἐνοῦσιν.
  language: Greek
  pages:
  - 634
  confidence: high
  validation: minor_mismatch
translation:
  text: And they were shut up by him in the towers, and he encamped against them,
    and he devoted them to destruction, and he burned its towers with fire, along
    with all who were in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put them under the ban.' The Greek verb carries the sense of devoting
      persons or things to destruction, not merely cursing them.
    reason: lexical_alternative
  - marker: b
    text: The Greek has a singular pronoun, literally 'its towers,' likely referring
      to the city in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεκλείσθησαν
  chosen: were shut up
  alternatives:
  - were enclosed
  - were confined
  - were trapped
  lexicon: LSJ
  rationale: The passive indicates that they were closed in or confined by Judas'
    action. 'Were shut up' preserves the force of being penned in without overinterpreting
    the exact military mechanism.
- source_word: πύργους
  chosen: towers
  alternatives:
  - strongholds
  - fortified towers
  lexicon: LSJ
  rationale: The ordinary sense is 'towers.' In military context these are defensive
    structures, but the simple rendering best matches the Greek while remaining clear.
- source_word: παρέβαλεν ἐπʼ αὐτούς
  chosen: he encamped against them
  alternatives:
  - he laid siege to them
  - he camped before them
  lexicon: LSJ
  rationale: The verb literally refers to pitching camp; in context it implies hostile
    military positioning. 'He encamped against them' keeps the concrete image and
    lets the siege sense arise from context.
- source_word: ἀνεθεμάτισεν
  chosen: devoted them to destruction
  alternatives:
  - put them under the ban
  - utterly destroyed them
  lexicon: LSJ
  rationale: This verb reflects the concept of placing under a ban for destruction,
    not merely cursing. 'Devoted them to destruction' communicates the sacral-war
    nuance more accurately than a simple 'destroyed,' while remaining readable.
- source_word: ἐνεπύρισεν
  chosen: burned
  alternatives:
  - set on fire
  - burned up
  lexicon: LSJ
  rationale: The verb denotes setting ablaze. 'Burned' is concise and natural in English;
    the following phrase 'with fire' preserves the Greek emphasis.
- source_word: αὐτῆς
  chosen: its
  alternatives:
  - their
  - the city's
  lexicon: LSJ
  rationale: The singular feminine pronoun most naturally refers back to the city
    implied in the broader context rather than to the plural 'towers.' Rendering it
    as 'its' preserves the singular reference, even though English readers may infer
    the city from context.
- source_word: σὺν πᾶσιν τοῖς ἐνοῦσιν
  chosen: along with all who were in them
  alternatives:
  - with everyone inside
  - together with all those dwelling there
  lexicon: LSJ
  rationale: The phrase includes all persons inside the towers. Because the immediate
    antecedent in English is 'towers,' 'in them' is the clearest way to express the
    location, while preserving the totality of πᾶσιν.
