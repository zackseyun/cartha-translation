id: 1MA.5.7
reference: 1 Maccabees 5:7
source:
  edition: lxx-swete-1909
  text: καὶ συνῆψεν πρὸς αὐτοὺς πολέμους πολλούς, καὶ συνετρίβησαν πρὸ προσώπου αὐτοῦ,
    καὶ ἐπάταξεν αὐτούς.
  language: Greek
  pages:
  - 634
  confidence: high
  validation: minor_mismatch
translation:
  text: And he joined many battles against them, and they were crushed before him,
    and he struck them down.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνῆψεν
  chosen: joined
  alternatives:
  - engaged
  - waged
  lexicon: LSJ
  rationale: From συνάπτω in a military idiom with πολέμους, the sense is to engage
    or join battle. 'Joined many battles' stays close to the Greek while remaining
    intelligible; 'waged' is possible but slightly more interpretive.
- source_word: πρὸς αὐτοὺς
  chosen: against them
  alternatives:
  - with them
  lexicon: LSJ
  rationale: Although πρός with accusative can be rendered broadly, in this hostile
    military context it clearly means opposition, so 'against them' best conveys the
    sense.
- source_word: πολέμους πολλούς
  chosen: many battles
  alternatives:
  - many wars
  - much warfare
  lexicon: LSJ
  rationale: The plural πολέμους can denote acts of warfare or battles. In this immediate
    narrative sequence of combat actions, 'many battles' is more natural English than
    'many wars' and avoids overstating the scale.
- source_word: συνετρίβησαν
  chosen: were crushed
  alternatives:
  - were shattered
  - were broken
  lexicon: LSJ
  rationale: The passive of συντρίβω conveys decisive defeat or breaking. 'Were crushed'
    communicates the military rout vividly and naturally.
- source_word: πρὸ προσώπου αὐτοῦ
  chosen: before him
  alternatives:
  - before his face
  - in his presence
  lexicon: LSJ
  rationale: This is a common idiom for defeat in someone's presence or before their
    advance. 'Before him' is idiomatic English and preserves the force without wooden
    literalism.
- source_word: ἐπάταξεν
  chosen: struck them down
  alternatives:
  - smote them
  - struck them
  lexicon: LSJ
  rationale: πατάσσω often means to strike, smite, or deal a blow. 'Struck them down'
    fits the military context and communicates lethal defeat in contemporary English
    better than the archaic 'smote'.
