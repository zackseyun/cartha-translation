id: 1MA.5.11
reference: 1 Maccabees 5:11
source:
  edition: lxx-swete-1909
  text: καὶ ἑτοιμάζοντές εἰσιν ἐλθεῖν καὶ προκαταλαβέσθαι τὸ ὀχύρωμα εἰς ὃ κατεφύγομεν·
    καὶ Τιμόθεος ἡγεῖται τῆς παρεμβολῆς αὐτῶν.
  language: Greek
  pages:
  - 634
  confidence: high
  validation: minor_mismatch
translation:
  text: And they are preparing to come and seize the stronghold into which we have
    fled; and Timothy is leading their camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to take the stronghold before us' or 'to occupy the stronghold first.'
      The Greek verb emphasizes preemptive seizure.
    reason: lexical_alternative
  - marker: b
    text: '''Camp'' here refers to the hostile military encampment, and by extension
      the force associated with it.'
    reason: cultural_note
lexical_decisions:
- source_word: ἑτοιμάζοντές
  chosen: are preparing
  alternatives:
  - are getting ready
  - are making ready
  lexicon: LSJ
  rationale: Present participle with εἰσιν forms a periphrastic present, indicating
    ongoing preparation rather than a simple future action.
- source_word: προκαταλαβέσθαι
  chosen: to seize ... ahead of us
  alternatives:
  - to take beforehand
  - to occupy first
  - to capture in advance
  lexicon: LSJ
  rationale: The compound verb includes the sense of taking beforehand or preemptively.
    'Seize ... ahead of us' preserves both the hostile action and the preemptive nuance
    in idiomatic English.
- source_word: τὸ ὀχύρωμα
  chosen: the stronghold
  alternatives:
  - the fortress
  - the fortified place
  lexicon: LSJ
  rationale: ὀχύρωμα denotes a fortified position. 'Stronghold' is natural English
    and fits a place of refuge under threat.
- source_word: εἰς ὃ κατεφύγομεν
  chosen: into which we have fled
  alternatives:
  - to which we fled
  - where we took refuge
  lexicon: LSJ
  rationale: καταφεύγω means to flee for refuge. The perfect-like English 'have fled'
    reflects the completed action with present relevance, though simple past would
    also be possible.
- source_word: ἡγεῖται
  chosen: is leading
  alternatives:
  - commands
  - is at the head of
  lexicon: LSJ
  rationale: The verb means to lead or command. 'Is leading' stays close to the Greek
    while allowing the military context to imply command.
- source_word: τῆς παρεμβολῆς
  chosen: their camp
  alternatives:
  - their army camp
  - their force
  - their encampment
  lexicon: LSJ
  rationale: παρεμβολή can mean camp or army in camp. 'Camp' is the most direct rendering;
    the military sense is clear from context.
