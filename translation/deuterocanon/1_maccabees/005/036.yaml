id: 1MA.5.36
reference: 1 Maccabees 5:36
source:
  edition: lxx-swete-1909
  text: ἐκεῖθεν ἀπῆρεν καὶ προκατελάβετο τὴν Χασφώθ, Μακέδ, Βοσόρ, καὶ τὰς λοιπὰς
    πόλεις τῆς Γαλααδίτιδος. ✓
  language: Greek
  pages:
  - 636
  confidence: high
  validation: agree
translation:
  text: From there he departed and seized Hasphoth, Maked, Bosor, and the rest of
    the cities of Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb rendered 'took' (προκατελάβετο) can also carry the sense 'seized'
      or 'occupied.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖθεν
  chosen: From there
  alternatives:
  - From that place
  - Thence
  lexicon: LSJ
  rationale: A straightforward adverb of place marking movement away from the prior
    location. 'From there' is clear modern English.
- source_word: ἀπῆρεν
  chosen: he departed
  alternatives:
  - he went away
  - he set out
  lexicon: LSJ
  rationale: The aorist of ἀπαίρω here denotes departure from a place. 'He departed'
    preserves the movement sense without over-specifying manner.
- source_word: προκατελάβετο
  chosen: took
  alternatives:
  - seized
  - occupied in advance
  - captured
  lexicon: LSJ
  rationale: The compound verb can suggest taking possession beforehand or seizing.
    In this military-geographical context, 'took' is idiomatic and broad enough to
    cover capture/occupation without importing nuance beyond the text.
- source_word: τὴν Χασφώθ, Μακέδ, Βοσόρ
  chosen: Hasphoth, Maked, Bosor
  alternatives:
  - Chasphoth, Maked, Bosor
  rationale: These are place names and are transliterated rather than translated,
    following project policy for names. Spellings are kept close to the Greek forms
    in readable English transliteration.
- source_word: τὰς λοιπὰς πόλεις
  chosen: the rest of the cities
  alternatives:
  - the remaining cities
  - the other cities
  lexicon: LSJ
  rationale: λοιπός means remaining/rest. 'The rest of the cities' is natural and
    preserves the sense that additional cities beyond those named were taken.
- source_word: τῆς Γαλααδίτιδος
  chosen: of Gilead
  alternatives:
  - of the land of Gilead
  - of the Gileadite region
  lexicon: LSJ
  rationale: The genitive identifies the region to which the cities belong. 'Of Gilead'
    is the most natural English geographical rendering.
