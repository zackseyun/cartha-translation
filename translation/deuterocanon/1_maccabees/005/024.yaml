id: 1MA.5.24
reference: 1 Maccabees 5:24
source:
  edition: lxx-swete-1909
  text: Καὶ Ἰούδας ὁ Μακκαβαῖος καὶ Ἰωναθὰν ὁ ἀδελφὸς αὐτοῦ διέβησαν τὸν Ἰορδάνην,
    καὶ ἐπορεύθησαν ὁδὸν τριῶν ἡμερῶν ἐν τῇ ἐρήμῳ.
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
translation:
  text: And Judas Maccabeus and Jonathan his brother crossed the Jordan, and they
    went a three-day journey in the wilderness.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διέβησαν
  chosen: crossed
  alternatives:
  - went across
  - passed over
  lexicon: LSJ
  rationale: The verb denotes crossing from one side to another. 'Crossed' is natural
    modern English and fits the direct object 'the Jordan' without unnecessary formality.
- source_word: τὸν Ἰορδάνην
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: LSJ
  rationale: The Greek names the river with the article. English commonly says 'the
    Jordan'; adding 'River' is possible but not required by the text.
- source_word: ἐπορεύθησαν
  chosen: traveled
  alternatives:
  - went
  - journeyed
  lexicon: LSJ
  rationale: The verb is a common motion term. 'Traveled' gives clear contemporary
    English while preserving the sense of purposeful movement over distance.
- source_word: ὁδὸν τριῶν ἡμερῶν
  chosen: a three-day journey
  alternatives:
  - for three days
  - a journey of three days
  lexicon: LSJ
  rationale: Literally 'a road/journey of three days.' The accusative construction
    expresses extent of travel. 'A three-day journey' is idiomatic and more precise
    than the looser 'for three days.'
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: LSJ
  rationale: ἔρημος can mean desert or wilderness. 'Wilderness' better preserves the
    broader sense of sparsely inhabited wild country and avoids implying only sandy
    desert terrain.
- source_word: Ἰούδας ὁ Μακκαβαῖος
  chosen: Judas Maccabeus
  alternatives:
  - Judas the Maccabee
  rationale: Standard English transliteration for the personal name and epithet. This
    keeps the familiar historical designation while remaining close to the Greek.
- source_word: Ἰωναθὰν ὁ ἀδελφὸς αὐτοῦ
  chosen: Jonathan his brother
  alternatives:
  - Jonathan, his brother
  rationale: The appositional phrase identifies Jonathan in relation to Judas. The
    unpunctuated rendering is smooth and faithful.
