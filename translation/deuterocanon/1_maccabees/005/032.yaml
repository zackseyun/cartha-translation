id: 1MA.5.32
reference: 1 Maccabees 5:32
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν τοῖς ἀνδράσιν τῆς δυνάμεως Πολεμήσατε σήμερον ὑπὲρ τῶν ἀδελφῶν ἡμῶν.
  language: Greek
  pages:
  - 636
  confidence: high
  validation: agree
translation:
  text: And he said to the men of the force, “Fight today for our brothers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the soldiers” / “the warriors”; Greek literally “the men of the force.”
    reason: lexical_alternative
  - marker: b
    text: “Our brothers” may refer broadly to fellow Israelites, not only to biological
      brothers.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς ἀνδράσιν
  chosen: to the men
  alternatives:
  - to the soldiers
  - to the warriors
  lexicon: LSJ
  rationale: ἀνήρ here refers specifically to male members of the fighting group,
    not generic people. 'Men' preserves the gendered wording of the Greek in keeping
    with the project's gender-accurate policy.
- source_word: τῆς δυνάμεως
  chosen: of the force
  alternatives:
  - of the army
  - of the host
  lexicon: LSJ
  rationale: δύναμις in military contexts can denote a force or army. 'Force' stays
    close to the Greek while remaining natural English; 'army' is possible but slightly
    more interpretive.
- source_word: Πολεμήσατε
  chosen: Fight
  alternatives:
  - Wage war
  - Do battle
  lexicon: LSJ
  rationale: The aorist imperative calls for immediate martial action. 'Fight' is
    direct, idiomatic, and fits the exhortational context without overformalizing.
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: LSJ
  rationale: σήμερον marks the urgency of the present moment. 'Today' is the natural
    modern equivalent.
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  - in defense of
  lexicon: LSJ
  rationale: ὑπέρ here expresses advocacy/protection in battle. 'For' is concise and
    idiomatic; the defensive nuance is contextually clear.
- source_word: τῶν ἀδελφῶν ἡμῶν
  chosen: our brothers
  alternatives:
  - our brothers and sisters
  - our kin
  lexicon: LSJ
  rationale: ἀδελφοί is grammatically masculine plural and in this military-national
    context likely refers to fellow Israelites/brothers. 'Our brothers' preserves
    the source wording and communal solidarity without expanding beyond the text.
