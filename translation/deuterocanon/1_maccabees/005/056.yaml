id: 1MA.5.56
reference: 1 Maccabees 5:56
source:
  edition: lxx-swete-1909
  text: ἤκουσεν Ἰωσὴφ ὁ τοῦ Ζαχαρία καὶ Ζαχαρίας ἄρχοντες τῶν δυνάμεων τῶν ἀνδραγαθήσεων
    καὶ τοῦ πολέμου οἷα ἐποίησαν.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: minor_mismatch
translation:
  text: Joseph son of Zechariah and Azariah, commanders of the forces, heard of the
    brave deeds and of the warlike exploits that they had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek source as transcribed in Swete appears to read 'Zechariah' for the
      second name; the narrative context and standard text tradition support 'Azariah'
      here.
    reason: textual_variant
lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard of
  alternatives:
  - heard
  lexicon: LSJ
  rationale: The verb means 'heard' or 'learned by hearing.' In English, 'heard of'
    naturally introduces the reported deeds that follow and fits the construction
    with οἷα ἐποίησαν.
- source_word: Ἰωσὴφ ὁ τοῦ Ζαχαρία
  chosen: Joseph son of Zechariah
  alternatives:
  - Joseph the son of Zechariah
  - Joseph of Zechariah
  lexicon: LSJ
  rationale: The article with the genitive is a standard filial designation. 'Son
    of' is the clearest idiomatic English rendering.
- source_word: Ζαχαρίας
  chosen: Azariah
  alternatives:
  - Zachariah
  - Zechariah
  lexicon: LSJ
  rationale: The context in 1 Maccabees identifies the pair as Joseph son of Zechariah
    and Azariah. The Swete line appears to read Ζαχαρίας here, but the verse is marked
    minor_mismatch and the known narrative context strongly supports Azariah as the
    second name. This is treated as a source-level uncertainty and preserved in a
    footnote.
- source_word: ἄρχοντες τῶν δυνάμεων
  chosen: commanders of the forces
  alternatives:
  - leaders of the forces
  - rulers of the troops
  - commanders of the army
  lexicon: LSJ
  rationale: ἄρχοντες denotes leaders or rulers; with τῶν δυνάμεων, 'commanders of
    the forces' best captures a military office without over-specifying a modern rank.
- source_word: ἀνδραγαθήσεων
  chosen: brave deeds
  alternatives:
  - acts of valor
  - manly deeds
  - heroic deeds
  lexicon: LSJ
  rationale: The noun refers to displays of courage or valor. 'Brave deeds' is natural
    modern English and preserves the commendatory sense without archaic gendered phrasing
    like 'manly deeds.'
- source_word: τοῦ πολέμου
  chosen: warlike exploits
  alternatives:
  - war
  - battle
  - military deeds
  lexicon: LSJ
  rationale: In this paired construction with ἀνδραγαθήσεων, a more concrete English
    phrase is needed. 'Warlike exploits' conveys martial achievements rather than
    the abstract concept of war itself.
- source_word: οἷα ἐποίησαν
  chosen: that they had done
  alternatives:
  - what they did
  - the things they had done
  lexicon: LSJ
  rationale: This relative expression sums up the reported actions. 'That they had
    done' reads smoothly after the preceding paired nouns and preserves the retrospective
    sense.
