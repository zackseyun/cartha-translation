id: 1MA.5.42
reference: 1 Maccabees 5:42
source:
  edition: lxx-swete-1909
  text: ὡς δὲ ἤγγισεν Ἰούδας ἐπὶ τὸν χειμάρρουν τοῦ ὕδατος, ἔστησεν τοὺς γραμματεῖς
    τοῦ λαοῦ ἐπὶ τοῦ χειμάρρου, καὶ ἐνετείλατο αὐτοῖς, λέγων Μὴ ἀφῆτε ἄνθρωπον παρεμβαλεῖν,
    ἀλλὰ ἐρχέσθωσαν πάντες εἰς τὸν πόλεμον.
  language: Greek
  pages:
  - 637
  confidence: high
  validation: agree
translation:
  text: And when Judas came near to the wadi of water, he stationed the scribes of
    the people at the wadi and commanded them, saying, “Do not let any man encamp,
    but let them all come into the battle.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'torrent,' 'brook,' or 'streambed.' The Greek refers to a seasonal watercourse;
      'wadi' is chosen to preserve the terrain sense.
    reason: lexical_alternative
  - marker: b
    text: '''Scribes of the people'' may denote administrative officers or record-keepers
      serving the army, but the translation preserves the literal term ''scribes.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισεν
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: LSJ
  rationale: A straightforward narrative verb of approach. 'Came near' is natural
    modern English and preserves the sense without archaism.
- source_word: χειμάρρουν τοῦ ὕδατος
  chosen: wadi of water
  alternatives:
  - torrent
  - brook
  - streambed
  lexicon: LSJ
  rationale: χειμάρρους denotes a winter-flowing torrent or ravine; in this military-geographical
    context 'wadi' best captures a seasonal watercourse. The genitive τοῦ ὕδατος is
    retained by 'of water' rather than flattened away.
- source_word: ἔστησεν
  chosen: stationed
  alternatives:
  - set
  - posted
  lexicon: LSJ
  rationale: In a military setting, 'stationed' conveys placing personnel at a location
    for a task more clearly than the more generic 'set'.
- source_word: γραμματεῖς τοῦ λαοῦ
  chosen: the scribes of the people
  alternatives:
  - the officers of the people
  - the secretaries of the people
  lexicon: LSJ
  rationale: The Greek literally says 'scribes.' Although the function may overlap
    with administrative officers in context, the translation keeps the lexical form
    'scribes' and lets readers see the source term.
- source_word: ἐπὶ τοῦ χειμάρρου
  chosen: at the wadi
  alternatives:
  - by the wadi
  - over the wadi
  lexicon: LSJ
  rationale: ἐπί with the genitive here indicates position at or by the location.
    'At the wadi' is concise and idiomatic.
- source_word: Μὴ ἀφῆτε ἄνθρωπον παρεμβαλεῖν
  chosen: Do not let any man encamp
  alternatives:
  - Do not allow anyone to pitch camp
  - Leave no man to make camp
  lexicon: LSJ
  rationale: ἀφῆτε with infinitive gives a prohibition against permitting an action.
    παρεμβάλλω in military usage means to encamp or pitch camp. 'Any man' reflects
    singular ἄνθρωπον and the project's gender-accurate policy in a military context
    referring to fighting men.
- source_word: ἐρχέσθωσαν πάντες εἰς τὸν πόλεμον
  chosen: let them all come into the battle
  alternatives:
  - let them all go into battle
  - let them all come to the fight
  lexicon: LSJ
  rationale: The imperative calls for universal participation. 'Come into the battle'
    preserves the motion plus the article with πόλεμος as the immediate military engagement.
