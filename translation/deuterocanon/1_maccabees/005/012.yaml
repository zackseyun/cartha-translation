id: 1MA.5.12
reference: 1 Maccabees 5:12
source:
  edition: lxx-swete-1909
  text: νῦν οὖν ἐλθὼν ἔξελου ἡμᾶς ἐκ χειρὸς αὐτῶν, ὅτι πέπτωκεν ἐξ ἡμῶν πλῆθος.
  language: Greek
  pages:
  - 634
  confidence: high
  validation: agree
translation:
  text: Now then, come and rescue us from their hand, because a great number of our
    people has fallen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliver us from their power.' The Greek says literally 'from their hand,'
      a common idiom for hostile control.
    reason: lexical_alternative
  - marker: b
    text: Or 'many from among us have fallen.' The Greek does not specify whether
      'fallen' emphasizes death, defeat, or both.
    reason: alternative_reading
lexical_decisions:
- source_word: νῦν οὖν
  chosen: Now then
  alternatives:
  - So now
  - Therefore now
  lexicon: LSJ
  rationale: The combination marks an urgent inference or transition. 'Now then' preserves
    both the temporal and inferential force in natural English.
- source_word: ἐλθὼν
  chosen: come
  alternatives:
  - having come
  - come here
  lexicon: LSJ
  rationale: 'Although formally an aorist participle (''having come''), in this plea
    it functions idiomatically with the following imperative. English naturally renders
    the sense as a direct appeal: ''come and rescue.'''
- source_word: ἔξελου
  chosen: rescue
  alternatives:
  - deliver
  - take out
  lexicon: LSJ
  rationale: From ἐξαιρέω, here meaning to remove from danger or hostile power. 'Rescue'
    is vivid and idiomatic; 'deliver' is possible but slightly more traditional and
    less immediate in contemporary English.
- source_word: ἐκ χειρὸς αὐτῶν
  chosen: from their hand
  alternatives:
  - out of their hand
  - from their power
  lexicon: LSJ
  rationale: The phrase is a standard idiom for hostile control or power. 'From their
    hand' keeps the source metaphor while remaining understandable in English.
- source_word: πέπτωκεν
  chosen: has fallen
  alternatives:
  - has been defeated
  - has perished
  lexicon: LSJ
  rationale: The perfect of πίπτω literally means 'has fallen.' In military context
    it can imply defeat or death, but the Greek does not specify more than that. 'Has
    fallen' preserves the ambiguity and gravity without over-interpreting.
- source_word: ἐξ ἡμῶν
  chosen: of our people
  alternatives:
  - from us
  - among us
  lexicon: LSJ
  rationale: Literally 'from us.' In English, 'a great number from us has fallen'
    is awkward. 'Of our people' conveys that members of their group have been lost,
    which fits the context of communal military distress.
- source_word: πλῆθος
  chosen: a great number
  alternatives:
  - a multitude
  - many
  lexicon: LSJ
  rationale: πλῆθος denotes a large number or multitude. 'A great number' is clear
    modern English and preserves the quantitative emphasis.
