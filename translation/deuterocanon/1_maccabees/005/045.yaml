id: 1MA.5.45
reference: 1 Maccabees 5:45
source:
  edition: lxx-swete-1909
  text: Καὶ συνήγαγεν Ἰούδας πάντα Ἰσραὴλ τοὺς ἐν τῇ Γαλααδίτιδι ἀπὸ μικροῦ ἕως μεγά-
    λου, καὶ τὰς γυναῖκας αὐτῶν καὶ τὰ τέκνα αὐτῶν καὶ τὴν ἀποσκευὴν, παρεμβολὴν μεγάλην
    σφόδρα, ἐλθεῖν εἰς γῆν Ἰούδα.
  language: Greek
  pages:
  - 637
  confidence: high
  validation: agree
translation:
  text: And Judas gathered all Israel who were in Gilead, from the least to the greatest,
    along with their wives and their children and their baggage, a very great company,
    to come into the land of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a very large camp.' The Greek παρεμβολή can denote a camp, especially
      in military contexts, but here it refers broadly to the gathered company with
      families and baggage.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήγαγεν
  chosen: gathered
  alternatives:
  - assembled
  - brought together
  lexicon: LSJ
  rationale: The aorist of συνάγω here denotes collecting people together. 'Gathered'
    is natural English and preserves the concrete action without overinterpreting
    military nuance.
- source_word: πάντα Ἰσραὴλ τοὺς ἐν τῇ Γαλααδίτιδι
  chosen: all Israel who were in Gilead
  alternatives:
  - all the Israelites in Gilead
  - all Israel in the land of Gilead
  lexicon: LSJ
  rationale: πάντα Ἰσραήλ in this context refers to the whole Israelite population
    present there, not the nation abstractly. 'All Israel who were in Gilead' keeps
    the idiom while remaining readable.
- source_word: ἀπὸ μικροῦ ἕως μεγάλου
  chosen: from the least to the greatest
  alternatives:
  - from small to great
  - from young to old
  lexicon: LSJ
  rationale: This is a stock expression for totality across social or age range. 'From
    the least to the greatest' preserves the idiomatic breadth better than narrowing
    it to age alone.
- source_word: ἀποσκευήν
  chosen: baggage
  alternatives:
  - supplies
  - belongings
  - equipment
  lexicon: LSJ
  rationale: ἀποσκευή refers to baggage or portable goods accompanying a group on
    the move. 'Baggage' is the most direct rendering here; 'supplies' would be too
    narrow and 'belongings' too diffuse.
- source_word: παρεμβολὴν μεγάλην σφόδρα
  chosen: a very great assembly
  alternatives:
  - a very large camp
  - an exceedingly great company
  lexicon: LSJ
  rationale: παρεμβολή often means 'camp,' especially military camp, but here it appositionally
    summarizes the gathered people including families and baggage. 'Assembly' communicates
    the large gathered company without implying only a fixed encampment, while 'very
    great' reflects μεγάλην σφόδρα.
- source_word: ἐλθεῖν εἰς γῆν Ἰούδα
  chosen: to come into the land of Judah
  alternatives:
  - to go into the land of Judah
  - to enter the land of Judah
  lexicon: LSJ
  rationale: The infinitive expresses purpose/result of the gathering. 'To come into'
    follows the Greek verb closely; 'enter' is possible but slightly more formal.
    'Land of Judah' is the standard geographical rendering.
