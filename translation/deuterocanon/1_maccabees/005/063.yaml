id: 1MA.5.63
reference: 1 Maccabees 5:63
source:
  edition: lxx-swete-1909
  text: καὶ ὁ ἀνὴρ Ἰούδας καὶ οἱ ἀδελφοὶ αὐτοῦ ἐδοξάζοντο σφόδρα ἐναντίον παντὸς Ἰσραὴλ
    καὶ τῶν ἐθνῶν πάντων, οὗ ἠκού- ετο τὸ ὄνομα αὐτῶν.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
translation:
  text: And Judas and his brothers were greatly honored before all Israel and all
    the nations, wherever their name was heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the man Judas,' an appositional expression retained here
      rather than smoothed to simply 'Judas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἀνὴρ
  chosen: the man
  alternatives:
  - the man Judas
  - Judas
  - the warrior
  lexicon: LSJ
  rationale: The Greek explicitly includes ὁ ἀνήρ before the proper name. Retaining
    'the man' reflects the source wording rather than smoothing it away. Here ἀνήρ
    is not generic 'humanity' but an individual male designation attached appositionally
    to Judas.
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  lexicon: LSJ
  rationale: Standard transliteration of the Greek proper name; 'Judas' is the conventional
    English form for Ἰούδας in 1 Maccabees.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  chosen: his brothers
  alternatives:
  - his brethren
  lexicon: LSJ
  rationale: Literal familial term; 'brothers' is modern English and matches the masculine
    plural reference to Judas's male siblings/kinsmen in context.
- source_word: ἐδοξάζοντο
  chosen: were greatly glorified
  alternatives:
  - were honored greatly
  - were held in great honor
  - were highly esteemed
  lexicon: LSJ
  rationale: The passive/imperfective form from δοξάζω conveys being given glory/honor.
    'Were greatly glorified' preserves the verbal connection to glory more closely
    than the flatter 'honored,' while remaining intelligible in English.
- source_word: σφόδρα
  chosen: greatly
  alternatives:
  - exceedingly
  - very much
  lexicon: LSJ
  rationale: Common intensifier; 'greatly' is natural with the passive verb and preserves
    the strong emphasis.
- source_word: ἐναντίον
  chosen: before
  alternatives:
  - in the sight of
  - in the presence of
  lexicon: LSJ
  rationale: In this context ἐναντίον marks standing in the view or estimation of
    others. 'Before' is concise and idiomatic.
- source_word: παντὸς Ἰσραήλ
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: LSJ
  rationale: Standard collective expression for the people of Israel; 'all Israel'
    is both literal and idiomatic.
- source_word: τῶν ἐθνῶν πάντων
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - all the peoples
  lexicon: LSJ
  rationale: In this deuterocanonical historical context ἔθνη refers to the nations/peoples
    generally, not specifically 'Gentiles' as a theological category. 'All the nations'
    best fits the broad political sense.
- source_word: οὗ ἠκούετο τὸ ὄνομα αὐτῶν
  chosen: wherever their name was heard
  alternatives:
  - where their name was heard
  - wherever news of them was heard
  - where their reputation was heard of
  lexicon: LSJ
  rationale: 'The relative adverb with passive ἠκούετο naturally yields a locative-general
    sense: in any place where their name became known. ''Wherever their name was heard''
    preserves the idiom without over-paraphrasing into ''reputation'' or ''fame,''
    though that idea is implied.'
