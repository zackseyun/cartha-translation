theological_decisions:
- issue: Referent of αὐτοῦ in βουλομένου αὐτοῦ ἀνδραγαθῆσαι
  chosen_reading: Rendered as singular 'he,' leaving the antecedent implicit rather
    than specifying a name.
  alternative_readings:
  - understood as referring to a leader mentioned in context
  - more generally, 'they wanted to act bravely' if one emends or interprets differently
  rationale: The Greek text as given has a singular genitive absolute. Since the immediate
    verse does not name the antecedent, the translation preserves the singular pronoun
    without over-resolving the referent from context outside the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
