id: 1MA.5.67
reference: 1 Maccabees 5:67
source:
  edition: lxx-swete-1909
  text: ἐν τῇ ἡμέρᾳ ἐκείνῃ ἔπεσαν ἱερεῖς πολέμῳ βουλομένου αὐτοῦ ἀνδραγαθῆσαι, ἐν
    τῷ αὐτοὺς ἐξελθεῖν εἰς τὸν πόλεμον ἀβουλεύτως.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
translation:
  text: On that day priests fell in battle, because they wanted to act bravely, when
    they went out into battle without counsel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to distinguish himself' or 'to perform a heroic deed.' The Greek verb
      conveys showing valor.
    reason: lexical_alternative
  - marker: b
    text: Or 'without deliberation' or 'rashly.' The Greek literally means 'without
      counsel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσαν
  chosen: fell
  alternatives:
  - were killed
  - died
  lexicon: BDAG
  rationale: A common idiom for death in battle; 'fell' preserves the martial register
    and remains natural English.
- source_word: ἱερεῖς
  chosen: priests
  alternatives:
  - the priests
  lexicon: BDAG
  rationale: The anarthrous plural is naturally rendered 'priests,' referring to members
    of the priestly class rather than requiring a definite article.
- source_word: πολέμῳ
  chosen: in battle
  alternatives:
  - by war
  - in war
  lexicon: BDAG
  rationale: 'The dative is best expressed idiomatically in English as the sphere/circumstance
    of their death: ''in battle.'''
- source_word: βουλομένου αὐτοῦ
  chosen: because he wanted
  alternatives:
  - while he was wanting
  - since he desired
  lexicon: BDAG
  rationale: 'The genitive absolute gives the circumstance or cause. Here a causal
    nuance fits the context: their death occurred because of his desire.'
- source_word: ἀνδραγαθῆσαι
  chosen: to act bravely
  alternatives:
  - to prove himself a man
  - to perform a heroic deed
  - to distinguish himself
  lexicon: LSJ
  rationale: The verb denotes showing manly courage or valor. 'Act bravely' is clear
    modern English and avoids importing a gendered idiom that would sound unnatural,
    while preserving the sense of valor.
- source_word: ἐν τῷ αὐτοὺς ἐξελθεῖν
  chosen: when they went out
  alternatives:
  - in their going out
  - as they went out
  lexicon: BDAG
  rationale: 'The articular infinitive with accusative subject is naturally temporal
    here: ''when they went out.'''
- source_word: εἰς τὸν πόλεμον
  chosen: into the battle
  alternatives:
  - to war
  - into battle
  lexicon: BDAG
  rationale: A concrete military engagement is in view. 'Into the battle' closely
    reflects the Greek while remaining idiomatic.
- source_word: ἀβουλεύτως
  chosen: without counsel
  alternatives:
  - rashly
  - without deliberation
  - without taking counsel
  lexicon: LSJ
  rationale: The adverb literally denotes acting without counsel or deliberation.
    'Without counsel' preserves the lexical idea and leaves open whether the failure
    was strategic or consultative.
