id: 1MA.5.13
reference: 1 Maccabees 5:13
source:
  edition: lxx-swete-1909
  text: καὶ πάντες οἱ ἀδελφοὶ ἡμῶν οἱ ὄντες ἐν τοῖς Τουβίου τεθανάτωνται, καὶ αἰχμαλωτίκασι
    τὰς γυναῖκας αὐτῶν καὶ τὰ τέκνα αὐτῶν καὶ τὴν ὑποσκευήν, καὶ ἀπώλεσαν ἐκεῖ ὡς
    μίαν χιλιάδα ἀνδρῶν.
  language: Greek
  pages:
  - 634
  confidence: high
  validation: minor_mismatch
translation:
  text: And all our brothers who are in the region of Tob have been killed, and they
    have taken their wives and their children and their goods captive, and they destroyed
    about one thousand men there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''in the [place/people] of Toubiou''; the exact place-name form
      is difficult, and ''the region of Tob'' reflects the likely geographic sense.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their baggage' or 'their property' for 'their goods' (Greek ὑποσκευήν).
    reason: lexical_alternative
  - marker: c
    text: Or 'they killed about one thousand men there'; Greek literally, 'they destroyed
      about one thousand men there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἀδελφοὶ ἡμῶν
  chosen: our brothers
  alternatives:
  - our kindred
  - our fellow Jews
  lexicon: LSJ
  rationale: ἀδελφοί is literally 'brothers.' In this military/familial context it
    likely refers to fellow Israelites/kinsmen, but the source uses the kinship term
    directly. Per gender-accurate philosophy, 'brothers' is retained rather than neutralizing.
- source_word: οἱ ὄντες ἐν τοῖς Τουβίου
  chosen: who are in the region of Tob
  alternatives:
  - who are in Tob
  - who are among the Toubians
  lexicon: LSJ
  rationale: The phrase points to those located in the territory associated with Tob/Tobias.
    Because τοῖς Τουβίου is somewhat awkward in English if rendered woodenly, 'in
    the region of Tob' best captures the locative sense without overcommitting to
    an ethnonym.
- source_word: τεθανάτωνται
  chosen: have been killed
  alternatives:
  - have died
  - are dead
  lexicon: LSJ
  rationale: Perfect form indicates a completed state resulting from death. In context
    of hostile action followed by captivity and destruction, the passive-like English
    'have been killed' better reflects violent death than the more neutral 'have died.'
- source_word: αἰχμαλωτίκασι
  chosen: have taken ... captive
  alternatives:
  - have carried off
  - have made prisoners of
  lexicon: LSJ
  rationale: The verb denotes taking as captives in war. 'Have taken ... captive'
    is clear modern English and preserves the military sense.
- source_word: τὴν ὑποσκευήν
  chosen: their goods
  alternatives:
  - their baggage
  - their property
  - their equipment
  lexicon: LSJ
  rationale: ὑποσκευή can denote baggage, equipment, or movable property. Since wives
    and children are mentioned alongside what was seized, 'their goods' best conveys
    possessions generally without sounding overly technical.
- source_word: ἀπώλεσαν
  chosen: they destroyed
  alternatives:
  - they killed
  - they wiped out
  lexicon: LSJ
  rationale: The verb broadly means destroy/ruin. Because the direct object is 'about
    one thousand men,' English could idiomatically say 'killed,' but retaining 'destroyed'
    stays closer to the Greek wording while still fitting the wartime context.
- source_word: ὡς μίαν χιλιάδα ἀνδρῶν
  chosen: about one thousand men
  alternatives:
  - some one thousand men
  - approximately a thousand men
  lexicon: LSJ
  rationale: ὡς with a number marks approximation. 'About one thousand men' is natural
    and accurate.
