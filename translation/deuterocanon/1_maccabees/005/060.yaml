id: 1MA.5.60
reference: 1 Maccabees 5:60
source:
  edition: lxx-swete-1909
  text: καὶ ἐτροπώθη Ἰωσὴφ καὶ Ἀζαρίας, καὶ ἐδιώχθησαν ἕως τῶν ὁρίων τῆς Ἰουδαίας·
    καὶ ἔπεσον ἐν τῇ ἡμέρᾳ ἐκείνῃ ἐκ τοῦ λαοῦ Ἰσραὴλ εἰς δισχιλίους ἄνδρας.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
translation:
  text: And Joseph and Azariah were routed and were pursued as far as the borders
    of Judea; and on that day about two thousand men of the people of Israel fell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'fell ... to two thousand men'; the expression likely gives
      an approximate total, hence 'about two thousand men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτροπώθη
  chosen: were routed
  alternatives:
  - were turned back
  - were defeated
  - were put to flight
  lexicon: LSJ
  rationale: Passive of τροπόω/τρέπω in military context indicates being driven into
    rout or defeat. 'Were routed' captures the military sense more precisely than
    the broader 'were defeated.'
- source_word: ἐδιώχθησαν
  chosen: were pursued
  alternatives:
  - were chased
  - were driven
  lexicon: LSJ
  rationale: The passive of διώκω here naturally means hostile pursuit after defeat.
    'Were pursued' is idiomatic and preserves the sequence after the rout.
- source_word: ἕως τῶν ὁρίων τῆς Ἰουδαίας
  chosen: as far as the borders of Judea
  alternatives:
  - to the borders of Judea
  - as far as the territory of Judea
  lexicon: LSJ
  rationale: ὅρια commonly denotes borders or boundaries. 'As far as the borders of
    Judea' reflects both ἕως and the plural noun naturally.
- source_word: ἔπεσον
  chosen: fell
  alternatives:
  - were killed
  - died
  lexicon: LSJ
  rationale: In battle narrative, 'fell' is a conventional and faithful rendering
    that preserves the Greek idiom without over-interpreting, though death in combat
    is clearly implied.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  chosen: on that day
  alternatives:
  - in that day
  - that day
  lexicon: LSJ
  rationale: Standard temporal expression; 'on that day' is natural modern English
    and adequately formal.
- source_word: ἐκ τοῦ λαοῦ Ἰσραήλ
  chosen: of the people of Israel
  alternatives:
  - from the people of Israel
  - among the people of Israel
  lexicon: LSJ
  rationale: The phrase marks those who fell as belonging to Israel's people. 'Of
    the people of Israel' reads smoothly in English while preserving the genitival
    relationship.
- source_word: εἰς δισχιλίους ἄνδρας
  chosen: about two thousand men
  alternatives:
  - two thousand men
  - up to two thousand men
  lexicon: LSJ
  rationale: With numerals, εἰς can express approximation or total reaching a number.
    'About two thousand men' best reflects the idiom without overstating mathematical
    exactness.
