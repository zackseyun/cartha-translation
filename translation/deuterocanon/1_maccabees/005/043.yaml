id: 1MA.5.43
reference: 1 Maccabees 5:43
source:
  edition: lxx-swete-1909
  text: καὶ διεπέρασεν πρὸς αὐτοὺς πρότερον, καὶ πᾶς ὁ λαὸς αὐτοῦ ἔμπροσθεν αὐτοῦ·
    καὶ συνετρί- βησαν πρὸ προσώπου αὐτοῦ πάντα τὰ ἔθνη, καὶ ἔρριψαν πάντα τὰ ὅπλα
    αὐτῶν, καὶ ἔφυγον εἰς τὸ τέμενος ἐν Καρναΐν.
  language: Greek
  pages:
  - 637
  confidence: high
  validation: agree
translation:
  text: And he crossed over to them first, and all his people were before him; and
    all the nations were crushed before him, and they threw down all their weapons
    and fled into the sanctuary at Carnain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against them'; the Greek πρὸς αὐτούς can carry either a directional
      sense ('to/toward them') or, in context, a hostile sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'shrine' or 'temple precinct'; the Greek τέμενος refers to a sacred enclosure
      or sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεπέρασεν
  chosen: crossed over
  alternatives:
  - passed over
  - went across
  lexicon: LSJ
  rationale: The verb denotes crossing from one side to another. 'Crossed over' is
    natural English and preserves the movement implied by the Greek without over-specifying
    the terrain.
- source_word: πρὸς αὐτοὺς
  chosen: to them
  alternatives:
  - against them
  - toward them
  lexicon: LSJ
  rationale: πρός with accusative can mean 'toward' or, in hostile contexts, effectively
    'against.' Here the immediate military setting allows either nuance, but 'to them'
    keeps the Greek's directional sense while the following battle clause supplies
    the hostility.
- source_word: πρότερον
  chosen: first
  alternatives:
  - beforehand
  - in advance
  lexicon: LSJ
  rationale: The adverb most simply marks Judas/his leader as going ahead of the others.
    'First' is concise and idiomatic.
- source_word: πᾶς ὁ λαὸς αὐτοῦ
  chosen: all his people
  alternatives:
  - all his army
  - all his men
  lexicon: LSJ
  rationale: λαός is literally 'people.' In this military narrative it refers to his
    force, but 'all his people' preserves the source wording without narrowing it
    more than necessary.
- source_word: ἔμπροσθεν αὐτοῦ
  chosen: before him
  alternatives:
  - in front of him
  - ahead of him
  lexicon: LSJ
  rationale: A straightforward spatial expression. 'Before him' fits the narrative
    style and can indicate the troops moving in front of their leader.
- source_word: συνετρίβησαν
  chosen: were crushed
  alternatives:
  - were shattered
  - were broken
  lexicon: LSJ
  rationale: The passive conveys decisive defeat. 'Were crushed' communicates military
    rout vividly while remaining close to the Greek image of being broken.
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - all the peoples
  lexicon: LSJ
  rationale: ἔθνη in 1 Maccabees often refers to non-Jewish peoples. 'Nations' is
    the broad, standard rendering and avoids importing a narrower theological sense
    unless context requires it.
- source_word: ἔρριψαν
  chosen: threw down
  alternatives:
  - cast away
  - dropped
  lexicon: LSJ
  rationale: The verb indicates forceful discarding. 'Threw down' suits the image
    of defeated troops abandoning arms.
- source_word: τὰ ὅπλα
  chosen: weapons
  alternatives:
  - arms
  - armor
  lexicon: LSJ
  rationale: ὅπλα can mean weapons or arms generally. 'Weapons' is the clearest modern
    English choice in this battle context.
- source_word: τέμενος
  chosen: sanctuary
  alternatives:
  - temple precinct
  - sacred enclosure
  - shrine
  lexicon: LSJ
  rationale: τέμενος denotes a consecrated precinct or sanctuary. 'Sanctuary' is readable
    and preserves the religious character of the refuge; 'temple precinct' is possible
    but more interpretive.
- source_word: ἐν Καρναΐν
  chosen: at Carnain
  alternatives:
  - in Carnain
  - at Karnaim
  lexicon: LSJ
  rationale: The place name is transliterated. 'At Carnain' fits the sense of a sanctuary
    located at that site; spelling follows the Greek form in standard English transliteration.
