id: 1MA.5.3
reference: 1 Maccabees 5:3
source:
  edition: lxx-swete-1909
  text: καὶ ἐπολέμει Ἰούδας πρὸς τοὺς υἱοὺς Ἠσαῦ ἐν τῇ Ἰουδαίᾳ τὴν Ἀκραβαττήνην, ὅτι
    περικάθηντο τὸν Ἰσραήλ. καὶ ἐπάταξεν αὐτοῖς πληγὴν μεγάλην, καὶ συνέστειλεν αὐτούς,
    καὶ ἔλαβεν τὰ σκῦλα αὐτῶν.
  language: Greek
  pages:
  - 633
  confidence: high
  validation: agree
translation:
  text: And Judas fought against the sons of Esau in Judea, in the Akrabattene region,
    because they were hemming in Israel. And he struck them with a great blow, and
    humbled them, and took their spoils.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the descendants of Esau'; that is, likely the Edomites. The Greek reads
      'the sons of Esau.'
    reason: lexical_alternative
  - marker: b
    text: Akrabattene is a regional place name in Judea; the Greek syntax is compressed
      and may also be understood as 'in Judea, at Akrabattene.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐπολέμει
  chosen: fought against
  alternatives:
  - was making war against
  - waged war against
  lexicon: LSJ
  rationale: Imperfect of πολεμέω indicates ongoing military action. 'Fought against'
    is natural modern English and preserves the adversative sense with πρὸς.
- source_word: υἱοὺς Ἠσαῦ
  chosen: the sons of Esau
  alternatives:
  - the descendants of Esau
  - the Edomites
  lexicon: LSJ
  rationale: A literal rendering preserves the ethnic-genealogical expression of the
    Greek. 'Edomites' is interpretive and historically likely, but the text itself
    says 'sons of Esau,' so that is retained.
- source_word: ἐν τῇ Ἰουδαίᾳ τὴν Ἀκραβαττήνην
  chosen: in Judea, in the Akrabattene region
  alternatives:
  - in Judea at Akrabattene
  - in Judea, namely Akrabattene
  lexicon: LSJ
  rationale: The construction is somewhat appositional/compressed. Rendering the place
    name as a region best accounts for the accusative proper noun after ἐν τῇ Ἰουδαίᾳ
    and yields clear English without over-resolving the syntax.
- source_word: περικάθηντο
  chosen: were hemming in
  alternatives:
  - were surrounding
  - were besieging
  - were pressing hard on
  lexicon: LSJ
  rationale: The verb conveys encircling or sitting around, here in hostile pressure
    against Israel. 'Were hemming in' communicates sustained constriction without
    implying a formal siege of a city.
- source_word: τὸν Ἰσραήλ
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: LSJ
  rationale: The Greek uses the collective singular 'Israel.' Retaining 'Israel' preserves
    the biblical-national sense better than the more distributive 'the Israelites.'
- source_word: ἐπάταξεν ... πληγὴν μεγάλην
  chosen: struck them with a great blow
  alternatives:
  - dealt them a great defeat
  - struck them a severe blow
  lexicon: LSJ
  rationale: This is a common idiom of military defeat. 'Struck them with a great
    blow' stays close to the Greek while remaining idiomatic.
- source_word: συνέστειλεν αὐτούς
  chosen: humbled them
  alternatives:
  - crushed them
  - drove them back
  - brought them low
  lexicon: LSJ
  rationale: The verb can mean to contract, reduce, or suppress. In this military
    context it likely means he reduced or subdued them. 'Humbled them' captures subjugation
    without overstating annihilation.
- source_word: τὰ σκῦλα
  chosen: their spoils
  alternatives:
  - their plunder
  - the booty from them
  lexicon: LSJ
  rationale: Military spoils taken after victory are in view. 'Spoils' is concise
    and natural in this context.
