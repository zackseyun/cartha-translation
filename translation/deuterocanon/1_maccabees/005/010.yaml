id: 1MA.5.10
reference: 1 Maccabees 5:10
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέστειλαν γράμματα πρὸς Ἰούδαν καὶ τοὺς ἀδελφοὺς αὐτοῦ, λέγοντες Ἐπισυνηγμένοι
    εἰσὶν ἐφʼ ἡμᾶς τὰ ἔθνη τὰ κύκλῳ ἡμῶν τοῦ ἐξᾶραι ἡμᾶς,
  language: Greek
  pages:
  - 634
  confidence: high
  validation: minor_mismatch
translation:
  text: And they sent letters to Judas and his brothers, saying, “The nations around
    us have gathered together against us to wipe us out,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to destroy us.” The Greek infinitive can be rendered more formally as
      “to destroy us,” while “to wipe us out” brings out the force of total elimination
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλαν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard aorist of ἀποστέλλω; 'sent' is natural modern English and fits
    the epistolary context.
- source_word: γράμματα
  chosen: letters
  alternatives:
  - written messages
  - documents
  lexicon: LSJ
  rationale: In context this refers to written communication sent to Judas; 'letters'
    is the most idiomatic and precise rendering.
- source_word: Ἰούδαν
  chosen: Judas
  alternatives:
  - Judah
  lexicon: LSJ
  rationale: As a personal name in 1 Maccabees, the standard transliteration is 'Judas,'
    not the tribal/geographical form 'Judah'.
- source_word: τοὺς ἀδελφοὺς αὐτοῦ
  chosen: his brothers
  alternatives:
  - his brothers and sisters
  - his kinsmen
  lexicon: LSJ
  rationale: The phrase refers to Judas's male siblings/close family collaborators
    in the narrative. Per doctrine, gender-accurate rendering favors 'brothers' rather
    than an inclusive expansion not demanded by the text.
- source_word: Ἐπισυνηγμένοι εἰσὶν
  chosen: have gathered together
  alternatives:
  - are assembled
  - have been gathered together
  lexicon: LSJ
  rationale: Perfect periphrastic construction conveying a present state resulting
    from gathering. 'Have gathered together' preserves the completed action with present
    relevance in readable English.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: LSJ
  rationale: In 1 Maccabees this commonly denotes surrounding non-Jewish peoples.
    'The nations' is the most direct and least interpretively loaded rendering here;
    'Gentiles' is possible but more theologically freighted in later usage.
- source_word: τὰ κύκλῳ ἡμῶν
  chosen: around us
  alternatives:
  - surrounding us
  - all around us
  lexicon: LSJ
  rationale: This idiom denotes the neighboring peoples geographically encircling
    them. 'Around us' is concise and natural.
- source_word: τοῦ ἐξᾶραι ἡμᾶς
  chosen: to wipe us out
  alternatives:
  - to destroy us
  - to remove us
  lexicon: LSJ
  rationale: The infinitive expresses hostile purpose. 'Wipe us out' captures the
    force of exterminatory intent in contemporary but not informal English; 'destroy
    us' is possible but slightly less vivid.
