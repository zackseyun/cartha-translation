theological_decisions:
- issue: Rendering of ἔθνη in a deuterocanonical historical context
  chosen_reading: the nations
  alternative_readings:
  - the Gentiles
  - the peoples
  rationale: The term here is ethnic-political rather than a developed theological
    category. 'The nations' preserves the historical sense without importing later
    NT connotations of 'Gentiles.'
  doctrine_reference: 'DOCTRINE.md: original-language primacy; consistency of key
    terms, or documented exception'
- issue: Gender rendering of ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - siblings
  rationale: The narrative refers specifically to Judas's brothers as named male leaders
    in 1 Maccabees. Per gender-accurate policy, 'brothers' best matches the source
    intent.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
