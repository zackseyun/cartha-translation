id: 1MA.5.53
reference: 1 Maccabees 5:53
source:
  edition: lxx-swete-1909
  text: καὶ ἦν Ἰούδας ἐπισυνάγων τοὺς ἐσχατίζοντας καὶ παρακαλῶν τὸν λαὸν κατὰ πᾶσαν
    τὴν ὁδόν, ἕως ἦλθεν εἰς γῆν Ἰούδα.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: minor_mismatch
translation:
  text: And Judas was gathering up those who were falling behind and encouraging the
    people all along the way, until he came into the land of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the laggards' / 'those at the rear.' The Greek likely refers to people
      straggling behind during the march.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνάγων
  chosen: gathering up
  alternatives:
  - bringing together
  - collecting
  - assembling
  lexicon: LSJ
  rationale: The participle describes Judas's ongoing action of drawing stragglers
    back together during the march. 'Gathering up' fits the travel context better
    than the more formal 'assembling' and preserves the sense of collecting dispersed
    people.
- source_word: τοὺς ἐσχατίζοντας
  chosen: those who were falling behind
  alternatives:
  - the laggards
  - those at the rear
  - those left behind
  lexicon: LSJ
  rationale: From ἐσχατίζω, here likely meaning to be at the end or rear of the column.
    In context of travel, it refers to stragglers rather than a fixed military rear
    guard. 'Those who were falling behind' communicates the participial, ongoing sense
    in natural English.
- source_word: παρακαλῶν
  chosen: encouraging
  alternatives:
  - exhorting
  - urging
  - comforting
  lexicon: BDAG
  rationale: παρακαλέω can range from exhorting to comforting. In this march setting,
    Judas is strengthening morale and urging perseverance; 'encouraging' captures
    both without sounding overly formal.
- source_word: τὸν λαόν
  chosen: the people
  alternatives:
  - the army
  - the troops
  lexicon: LSJ
  rationale: The Greek says 'the people,' and there is no need to narrow it to a purely
    military term, even though the context is a military expedition. This preserves
    the source wording.
- source_word: κατὰ πᾶσαν τὴν ὁδόν
  chosen: all along the way
  alternatives:
  - throughout the whole journey
  - the whole way
  lexicon: LSJ
  rationale: This idiom indicates continuous action over the course of the route.
    'All along the way' is idiomatic modern English and preserves the distributive
    sense of κατά with the whole journey.
- source_word: γῆν Ἰούδα
  chosen: the land of Judah
  alternatives:
  - Judea
  - the territory of Judah
  lexicon: LSJ
  rationale: The Greek is literally 'land of Judah.' 'Judea' is possible as a geographic
    equivalent, but 'the land of Judah' stays closer to the source and preserves the
    traditional biblical place-name resonance.
