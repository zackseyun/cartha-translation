id: 1MA.5.39
reference: 1 Maccabees 5:39
source:
  edition: lxx-swete-1909
  text: καὶ Ἄραβες μεμίσθωνται εἰς βοήθειαν αὐτοῖς, καὶ παρεμβάλλουσιν πέραν τοῦ χειμάρρου,
    ἕτοιμοι τοῦ ἐλθεῖν ἐπὶ σὲ εἰς πόλεμον. καὶ ἐπορεύθη Ἰούδας εἰς συνάντησιν αὐτῶν.
  language: Greek
  pages:
  - 636
  confidence: high
  validation: agree
translation:
  text: And Arabs had been hired to help them, and they were encamped beyond the wadi,
    ready to come against you in battle. And Judas went out to meet them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'across the torrent.' The Greek word can denote a seasonal streambed
      or rushing brook; 'wadi' is used here to reflect the likely terrain.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'against you' in the singular, reflecting the direct report
      being relayed to Judas.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄραβες
  chosen: Arabs
  alternatives:
  - Arabians
  lexicon: LSJ
  rationale: A straightforward ethnic designation. 'Arabs' is the most natural modern
    English rendering; 'Arabians' is possible but less idiomatic here.
- source_word: μεμίσθωνται
  chosen: had been hired
  alternatives:
  - had been enlisted for pay
  - had been engaged as mercenaries
  lexicon: LSJ
  rationale: Perfect middle/passive of μισθόω indicates they were hired for payment.
    'Had been hired' preserves the completed state without over-specifying 'mercenaries,'
    though that idea is implicit.
- source_word: εἰς βοήθειαν αὐτοῖς
  chosen: to help them
  alternatives:
  - for assistance to them
  - as aid for them
  lexicon: LSJ
  rationale: This phrase expresses purpose/result of the hiring. 'To help them' is
    clear modern English and preserves the sense of assistance.
- source_word: παρεμβάλλουσιν
  chosen: they were encamped
  alternatives:
  - they encamp
  - they had camped
  lexicon: LSJ
  rationale: Although formally present, in narrative context it describes the military
    situation currently obtaining. 'They were encamped' gives natural English and
    reflects the durative military sense of making camp.
- source_word: πέραν τοῦ χειμάρρου
  chosen: beyond the wadi
  alternatives:
  - across the torrent
  - beyond the brook
  lexicon: LSJ
  rationale: χείμαρρος denotes a winter-flow stream or torrent-bed. 'Wadi' best captures
    the Near Eastern geographical feature in readable modern English; 'torrent' is
    possible but less location-specific.
- source_word: ἕτοιμοι τοῦ ἐλθεῖν ἐπὶ σὲ εἰς πόλεμον
  chosen: ready to come against you in battle
  alternatives:
  - ready to attack you in war
  - prepared to come upon you for battle
  lexicon: LSJ
  rationale: This infinitival construction expresses readiness for hostile advance.
    'Come against you in battle' preserves both motion and military intent without
    paraphrase.
- source_word: εἰς συνάντησιν αὐτῶν
  chosen: to meet them
  alternatives:
  - for an encounter with them
  - to meet them in battle
  lexicon: LSJ
  rationale: The phrase means going out to meet or confront them. 'To meet them' is
    sufficient; the military context already implies confrontation.
