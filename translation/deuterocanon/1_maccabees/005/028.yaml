id: 1MA.5.28
reference: 1 Maccabees 5:28
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέστρεψεν Ἰούδας καὶ ἡ παρεμβολὴ αὐτοῦ ὁδὸν εἰς τὴν ἔρημον εἰς Βοσὸρ
    ἄφνω· καὶ κατελάβετο τὴν πόλιν, καὶ ἀπέκτεινεν πᾶν ἀρσενικὸν ἐν στόματι ῥομφαίας,
    καὶ ἔλαβεν πάντα τὰ σκῦλα αὐτῶν, καὶ ἐνέπρησεν αὐτὴν πυρί.
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
translation:
  text: And Judas and his camp turned suddenly by the road into the wilderness toward
    Bosor; and he captured the city and killed every male with the edge of the sword,
    and took all their spoils, and burned it with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'in the mouth of the sword,' a standard idiom meaning death
      by the sword.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστρεψεν
  chosen: turned
  alternatives:
  - turned back
  - changed course
  lexicon: LSJ
  rationale: The verb denotes turning or changing direction. 'Turned' is concise and
    fits the military movement context without implying retreat, which 'turned back'
    might suggest.
- source_word: ἡ παρεμβολὴ αὐτοῦ
  chosen: his camp
  alternatives:
  - his army
  - his force
  lexicon: LSJ
  rationale: παρεμβολή literally refers to a camp or encamped force. 'His camp' preserves
    the concrete military sense of the Greek while still functioning naturally in
    English.
- source_word: ὁδὸν εἰς τὴν ἔρημον
  chosen: by the road into the wilderness
  alternatives:
  - on the road to the wilderness
  - along the desert road
  lexicon: LSJ
  rationale: The phrase is somewhat compressed in Greek. This rendering preserves
    both ὁδόν ('road/way') and εἰς τὴν ἔρημον ('into the wilderness/desert') without
    over-smoothing.
- source_word: εἰς Βοσὸρ
  chosen: toward Bosor
  alternatives:
  - to Bosor
  lexicon: LSJ
  rationale: With the preceding directional phrasing, 'toward Bosor' reads naturally
    in English and reflects movement in that direction. The place name is transliterated.
- source_word: ἄφνω
  chosen: suddenly
  alternatives:
  - unexpectedly
  - at once
  lexicon: LSJ
  rationale: The adverb marks the abruptness of the maneuver. 'Suddenly' is the most
    direct equivalent.
- source_word: κατελάβετο
  chosen: captured
  alternatives:
  - seized
  - took
  lexicon: LSJ
  rationale: In military context the verb means to seize or take possession of a city.
    'Captured' is idiomatic and precise.
- source_word: πᾶν ἀρσενικόν
  chosen: every male
  alternatives:
  - every man
  - all the males
  lexicon: LSJ
  rationale: The Greek is broader and more literal than 'every man,' referring to
    all males. 'Every male' preserves that force, even though it is stark in English.
- source_word: ἐν στόματι ῥομφαίας
  chosen: with the edge of the sword
  alternatives:
  - by the mouth of the sword
  - with the sword
  lexicon: LSJ
  rationale: This is a standard Semitic/Septuagintal idiom literally 'in the mouth
    of the sword.' 'With the edge of the sword' is the established idiomatic English
    equivalent that preserves the sense without awkwardness.
- source_word: τὰ σκῦλα
  chosen: spoils
  alternatives:
  - plunder
  - booty
  lexicon: LSJ
  rationale: The term refers to goods taken in war. 'Spoils' is clear, dignified,
    and fits the military register.
- source_word: ἐνέπρησεν αὐτὴν πυρί
  chosen: burned it with fire
  alternatives:
  - set it on fire
  - burned it down
  lexicon: LSJ
  rationale: The Greek explicitly includes 'with fire.' Retaining the fuller phrase
    reflects the source text's emphasis and common biblical style.
