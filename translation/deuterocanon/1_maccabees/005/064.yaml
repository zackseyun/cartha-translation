id: 1MA.5.64
reference: 1 Maccabees 5:64
source:
  edition: lxx-swete-1909
  text: καὶ ἐπισυνήγοντο πρὸς αὐτοὺς εὐφημοῦντες.
  language: Greek
  pages:
