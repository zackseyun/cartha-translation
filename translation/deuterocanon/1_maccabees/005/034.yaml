id: 1MA.5.34
reference: 1 Maccabees 5:34
source:
  edition: lxx-swete-1909
  text: καὶ ἐπέγνω ἡ παρεμβολὴ Τιμοθέου ὅτι ὁ Μακκαβαῖός ἐστιν, καὶ ἔφυγον ἀπὸ προσώπου
    αὐτοῦ, καὶ ἐπάταξεν αὐτοὺς πληγὴν μεγάλην· καὶ ἔπεσον ἐξ αὐτῶν ἐν ἐκείνῃ τῇ ἡμέρᾳ
    εἰς ὀκτακισχιλίους ἄνδρας.
  language: Greek
  pages:
  - 636
  confidence: high
  validation: agree
translation:
  text: And Timothy’s camp recognized that it was Maccabeus, and they fled from before
    him; and he struck them with a great blow, and as many as eight thousand of them
    fell on that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “eight thousand men”; the Greek expression may be read as an approximate
      or rounded total.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέγνω
  chosen: recognized
  alternatives:
  - realized
  - came to know
  lexicon: BDAG
  rationale: 'The verb indicates coming to recognize or identify someone. ''Recognized''
    fits the military context: Timothy''s camp identified who he was.'
- source_word: ἡ παρεμβολὴ Τιμοθέου
  chosen: Timothy’s camp
  alternatives:
  - the camp of Timothy
  - Timothy’s army camp
  lexicon: LSJ
  rationale: παρεμβολή commonly denotes a camp or encampment, especially military.
    'Timothy’s camp' is concise and natural while preserving the possessive genitive.
- source_word: ὁ Μακκαβαῖός
  chosen: Maccabeus
  alternatives:
  - the Maccabee
  lexicon: LSJ
  rationale: The proper name/title is best represented by the conventional transliteration
    'Maccabeus.' Retaining the article's force in English ('the Maccabee') is possible
    but less idiomatic here.
- source_word: ἔφυγον ἀπὸ προσώπου αὐτοῦ
  chosen: fled from before him
  alternatives:
  - fled from him
  - retreated before him
  lexicon: LSJ
  rationale: The phrase is a literal Semitic-style expression meaning to flee from
    someone's presence. 'From before him' preserves the source flavor without becoming
    obscure.
- source_word: ἐπάταξεν αὐτοὺς πληγὴν μεγάλην
  chosen: he struck them with a great blow
  alternatives:
  - he dealt them a great defeat
  - he smote them with a great slaughter
  lexicon: LSJ
  rationale: The idiom combines the verb 'strike' with 'a great blow/plague.' 'Struck
    them with a great blow' stays close to the Greek while conveying decisive military
    defeat. More interpretive renderings like 'great defeat' are possible but less
    transparent.
- source_word: ἔπεσον
  chosen: fell
  alternatives:
  - were killed
  - died
  lexicon: BDAG
  rationale: In battle contexts 'fell' is the conventional and sufficiently clear
    rendering, preserving the idiomatic military sense without over-paraphrasing.
- source_word: εἰς ὀκτακισχιλίους ἄνδρας
  chosen: about eight thousand men
  alternatives:
  - eight thousand men
  - as many as eight thousand men
  lexicon: LSJ
  rationale: The construction can indicate a total reaching to that number. 'About
    eight thousand men' gives idiomatic English for the approximate tally implied
    by the expression.
