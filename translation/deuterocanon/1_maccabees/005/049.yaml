id: 1MA.5.49
reference: 1 Maccabees 5:49
source:
  edition: lxx-swete-1909
  text: καὶ ἐπέταξεν Ἰούδας κηρῦξαι ἐν τῇ παρεμβολῇ τοῦ παρεμβαλεῖν ἕκαστον ἐν ᾧ ἐστιν
    τόπῳ.
  language: Greek
  pages:
  - 637
  confidence: high
  validation: agree
translation:
  text: And Judas gave orders to proclaim in the camp that each should encamp in the
    place where he is.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that each should camp where he was.' The Greek phrase can be understood
      as a directive for everyone to remain in his present position.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέταξεν
  chosen: gave orders
  alternatives:
  - commanded
  - ordered
  lexicon: LSJ
  rationale: The verb denotes issuing a directive. 'Gave orders' is natural modern
    English and preserves the authoritative force without sounding overly stiff.
- source_word: κηρῦξαι
  chosen: to make proclamation
  alternatives:
  - to proclaim
  - to have it announced
  lexicon: LSJ
  rationale: The aorist infinitive after ἐπέταξεν expresses what Judas ordered to
    be done. Because the verb is related to public heralding, 'make proclamation'
    preserves the formal announcement sense better than a bare 'announce.'
- source_word: παρεμβολῇ
  chosen: camp
  alternatives:
  - encampment
  lexicon: LSJ
  rationale: In military context παρεμβολή refers to the camp. 'Camp' is the clearest
    and most idiomatic rendering.
- source_word: παρεμβαλεῖν
  chosen: should encamp
  alternatives:
  - should camp
  - should pitch camp
  lexicon: LSJ
  rationale: The infinitive here conveys the content of the proclamation. 'Encamp'
    keeps the military nuance and echoes the cognate noun παρεμβολή.
- source_word: ἕκαστον
  chosen: each
  alternatives:
  - each man
  - everyone
  lexicon: LSJ
  rationale: The Greek is singular distributive. 'Each' preserves that force without
    adding 'man,' which is not explicit here.
- source_word: ἐν ᾧ ἐστιν τόπῳ
  chosen: in the place where he is
  alternatives:
  - where he is
  - in whatever place he is
  lexicon: LSJ
  rationale: This phrase most naturally refers to each person's present location in
    the camp. Rendering it fully avoids flattening the locative expression and explains
    the sense of remaining stationed where one already is.
