id: 1MA.5.22
reference: 1 Maccabees 5:22
source:
  edition: lxx-swete-1909
  text: καὶ ἐδίωξεν αὐτοὺς ἕως τῶν πόλεων Πτολεμαΐδος· καὶ ἔπεσον ἐκ τῶν ἐθνῶν εἰς
    τρισχιλίους ἄνδρας, καὶ ἔλαβεν τὰ σκῦλα αὐτῶν.
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
translation:
  text: And he pursued them as far as the cities of Ptolemais; and from the nations
    about three thousand men fell, and he took their spoils.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'three thousand men' without the nuance of approximation; the Greek expression
      εἰς τρισχιλίους ἄνδρας can be read as an approximate total or as a simple count.
    reason: lexical_alternative
  - marker: b
    text: '''From the nations'' refers to non-Israelite peoples in the opposing forces;
      some translations render this ''of the Gentiles.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίωξεν
  chosen: pursued
  alternatives:
  - chased
  - drove after
  lexicon: BDAG
  rationale: A straightforward military verb here; 'pursued' is natural modern English
    and preserves the sense of continued chase after a defeated force.
- source_word: ἕως τῶν πόλεων Πτολεμαΐδος
  chosen: as far as the cities of Ptolemais
  alternatives:
  - up to the cities of Ptolemais
  - as far as Ptolemais' cities
  lexicon: LSJ
  rationale: ἕως with the genitive marks extent. The plural πόλεων is explicit in
    the Greek and should be preserved rather than flattened to the singular place-name
    alone, even if the exact geographical nuance may reflect the district or settlements
    associated with Ptolemais.
- source_word: ἔπεσον
  chosen: fell
  alternatives:
  - were killed
  - died
  lexicon: BDAG
  rationale: In battle context the verb means falling in combat. 'Fell' preserves
    the idiomatic military sense while staying close to the Greek; 'were killed' is
    interpretive but not necessary in the main text.
- source_word: ἐκ τῶν ἐθνῶν
  chosen: from the nations
  alternatives:
  - of the Gentiles
  - from among the nations
  lexicon: BDAG
  rationale: The phrase denotes those belonging to the non-Jewish peoples in the conflict.
    'From the nations' is a transparent rendering of the Greek and avoids importing
    later NT-specific connotations of 'Gentiles' where the broader ethnic sense is
    sufficient.
- source_word: εἰς τρισχιλίους ἄνδρας
  chosen: about three thousand men
  alternatives:
  - to the number of three thousand men
  - three thousand men
  lexicon: LSJ
  rationale: With numerals, εἰς can indicate amount or total. English idiom prefers
    'about three thousand men' or simply 'three thousand men.' 'About' reflects the
    approximating force often conveyed in such constructions without overstating precision.
- source_word: τὰ σκῦλα
  chosen: their spoils
  alternatives:
  - the spoils
  - their plunder
  lexicon: LSJ
  rationale: The term refers to booty taken after battle. 'Spoils' is concise and
    idiomatic in military narrative; adding 'their' reflects the possessive αὐτῶν.
