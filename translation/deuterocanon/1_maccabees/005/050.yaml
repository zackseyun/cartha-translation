id: 1MA.5.50
reference: 1 Maccabees 5:50
source:
  edition: lxx-swete-1909
  text: καὶ παρενέβαλον οἱ ἄνδρες τῆς πόλεως, καὶ ἐπολέμησαν τὴν πόλιν ὅλην τὴν ἡμέραν
    ἐκείνην καὶ ὅλην τὴν νύκτα, καὶ παρεδόθη ἡ πόλις ἐν χερσὶν αὐτοῦ.
  language: Greek
  pages:
  - 637
  confidence: high
  validation: agree
translation:
  text: And the men of the city encamped, and they fought all that day and all that
    night, and the city was delivered into his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''into his hands'' (singular). Some translators smooth this to ''their
      hands'' to match the earlier plural subjects, but the source text here reads
      singular.'
    reason: alternative_reading
lexical_decisions:
- source_word: παρενέβαλον
  chosen: encamped
  alternatives:
  - drew up camp
  - made camp
  - set themselves in battle array
  lexicon: LSJ
  rationale: The verb commonly means to encamp or pitch camp. In military context
    it can imply taking up position against an enemy. 'Encamped' preserves the concrete
    military sense without overinterpreting beyond the Greek.
- source_word: οἱ ἄνδρες τῆς πόλεως
  chosen: the men of the city
  alternatives:
  - the city's men
  - the inhabitants of the city
  lexicon: LSJ
  rationale: ἄνδρες is specifically 'men,' not a generic term for inhabitants. This
    follows the project's gender-accurate principle and keeps the martial sense of
    fighting men.
- source_word: ἐπολέμησαν
  chosen: they fought against
  alternatives:
  - they attacked
  - they waged war against
  lexicon: LSJ
  rationale: A straightforward rendering of the verb for engaging in battle. 'Fought
    against' is natural English and does not overstate the action.
- source_word: τὴν πόλιν
  chosen: the city
  alternatives:
  - against the city
  lexicon: LSJ
  rationale: The Greek object is 'the city.' In English, with 'fought against,' the
    preposition is supplied idiomatically to express the object relation clearly.
- source_word: ὅλην τὴν ἡμέραν ἐκείνην καὶ ὅλην τὴν νύκτα
  chosen: all that day and all that night
  alternatives:
  - the whole of that day and the whole night
  - throughout that entire day and all night
  lexicon: LSJ
  rationale: This preserves the repeated ὅλην emphasis and the temporal sequence in
    clear modern English.
- source_word: παρεδόθη
  chosen: was delivered
  alternatives:
  - was given over
  - was handed over
  lexicon: LSJ
  rationale: The passive verb often means 'was handed over' or 'was delivered.' 'Was
    delivered' is concise and preserves the passive sense, leaving implicit agency
    as in the Greek.
- source_word: ἐν χερσὶν αὐτοῦ
  chosen: into his hands
  alternatives:
  - into their hands
  lexicon: LSJ
  rationale: The Greek reads singular αὐτοῦ, so the translation keeps 'his hands'
    despite the preceding plural subjects. This may refer to the leader representing
    the attacking force; the singular should not be flattened into a plural without
    textual basis.
