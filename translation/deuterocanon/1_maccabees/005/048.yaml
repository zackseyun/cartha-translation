id: 1MA.5.48
reference: 1 Maccabees 5:48
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέστειλεν πρὸς αὐτοὺς Ἰούδας λόγους εἰρηνικοὺς λέγων Διελευσόμεθα εἰς
    τὴν γῆν σου, τοῦ ἀπελθεῖν εἰς τὴν γῆν ἡμῶν· καὶ οὐδεὶς κακοποιήσει ὑμᾶς, πλὴν
    τοῖς ποσὶν παρελευσόμεθα. καὶ οὐκ ἠβούλοντο ἀνοῖξαι αὐτῷ.
  language: Greek
  pages:
  - 637
  confidence: high
  validation: agree
translation:
  text: And Judas sent them peaceful words, saying, “We will pass through your land
    to go to our own land, and no one will harm you; we will only pass through on
    foot.” But they were not willing to open to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, they would grant neither entry nor passage, with the implied object
      of 'open' left unstated in the Greek.
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγους εἰρηνικούς
  chosen: peaceful words
  alternatives:
  - words of peace
  - peaceable terms
  lexicon: LSJ
  rationale: A direct but natural rendering of the accusative phrase. 'Peaceful words'
    preserves the diplomatic tone without sounding wooden; 'words of peace' is possible
    but less idiomatic in modern English.
- source_word: Διελευσόμεθα
  chosen: We will pass through
  alternatives:
  - We will go through
  - We will cross through
  lexicon: LSJ
  rationale: Future middle of διέρχομαι here expresses intended transit through territory.
    'Pass through' is the most idiomatic and contextually precise English equivalent.
- source_word: τοῦ ἀπελθεῖν εἰς τὴν γῆν ἡμῶν
  chosen: to go to our own land
  alternatives:
  - in order to depart to our land
  - to return to our land
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose. 'To go to our own land' captures
    the sense clearly. 'Return to our land' is interpretive; the Greek says 'go/depart
    to our land,' so the less interpretive wording is preferred.
- source_word: οὐδεὶς κακοποιήσει ὑμᾶς
  chosen: no one will harm you
  alternatives:
  - no one will do evil to you
  - no one will mistreat you
  lexicon: LSJ
  rationale: κακοποιέω can mean to do harm or ill-treat. 'Harm' is concise, natural,
    and fits the military-diplomatic context.
- source_word: πλὴν τοῖς ποσὶν παρελευσόμεθα
  chosen: we will only pass through on foot
  alternatives:
  - except that we will pass by with our feet
  - we will merely pass through with our feet
  lexicon: LSJ
  rationale: The idiom emphasizes mere passage without hostile action. 'On foot' brings
    the Greek phrase τοῖς ποσίν into readable English while preserving the image.
    It likely conveys peaceful transit rather than a technical contrast with mounted
    travel, so a natural idiomatic rendering is best.
- source_word: οὐκ ἠβούλοντο ἀνοῖξαι αὐτῷ
  chosen: they were not willing to open to him
  alternatives:
  - they refused to open to him
  - they were unwilling to open for him
  lexicon: LSJ
  rationale: The Greek literally says they were not willing to open to him. This likely
    means opening the city/gate or granting passage. The chosen rendering stays close
    to the Greek while leaving the object implicit as in the source; 'refused' is
    slightly more interpretive.
