id: 1MA.5.66
reference: 1 Maccabees 5:66
source:
  edition: lxx-swete-1909
  text: καὶ ἀπῆρεν τοῦ πορευθῆναι εἰς γῆν ἀλλοφύλων, καὶ διεπορεύετο τὴν Σαμάριαν.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
translation:
  text: And he set out to go into the land of the foreigners, and he passed through
    Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, 'the land of the Philistines,' since Greek ἀλλόφυλοι can function
      as a conventional designation for Philistines in biblical usage; here the broader
      rendering 'foreigners' is retained because the verse itself does not specify
      more narrowly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  chosen: he set out
  alternatives:
  - he departed
  - he went away
  lexicon: LSJ
  rationale: The aorist of ἀπαίρω here marks the beginning of movement. 'Set out'
    captures the ingressive sense naturally in English better than the more wooden
    'departed.'
- source_word: τοῦ πορευθῆναι
  chosen: to go
  alternatives:
  - to travel
  - to proceed
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose or intended action after ἀπῆρεν.
    'To go' is the most direct and idiomatic rendering in context.
- source_word: γῆν ἀλλοφύλων
  chosen: the land of the foreigners
  alternatives:
  - the land of the Philistines
  - foreign land
  lexicon: LSJ
  rationale: ἀλλόφυλος literally means 'of another tribe/race,' often used in biblical
    Greek for Philistines, but the text here lacks an explicit ethnic identifier beyond
    the adjective used substantivally in the genitive plural. 'The foreigners' preserves
    the Greek wording without importing a narrower identification not demanded by
    this verse alone.
- source_word: διεπορεύετο
  chosen: he passed through
  alternatives:
  - he traveled through
  - he went through
  lexicon: LSJ
  rationale: The imperfect indicates ongoing movement through a region. 'Passed through'
    gives the sense clearly in idiomatic English.
- source_word: τὴν Σαμάριαν
  chosen: Samaria
  lexicon: LSJ
  rationale: Standard transliteration of the place name.
