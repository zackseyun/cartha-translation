theological_decisions:
- issue: Cultic terminology for ὁλοκαυτώματα
  chosen_reading: whole burnt offerings
  alternative_readings:
  - burnt offerings
  rationale: The verse reports temple worship after military deliverance. Rendering
    the term with 'whole' preserves the sacrificial specificity of offerings entirely
    consumed, without importing later associations.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English.'
