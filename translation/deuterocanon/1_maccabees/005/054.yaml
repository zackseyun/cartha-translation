id: 1MA.5.54
reference: 1 Maccabees 5:54
source:
  edition: lxx-swete-1909
  text: καὶ ἀνέβησαν εἰς τὸ ὄρος Σιὼν ἐν εὐφροσύνῃ καὶ χαρᾷ· καὶ προσήγαγον ὁλοκαυτώματα,
    ὅτι οὐκ ἔπεσεν ἐξ αὐτῶν οὐθεὶς ἕως τοῦ ἐπιστρέψαι ἐν εἰρήνῃ. (β΄. 24)
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
translation:
  text: And they went up to Mount Zion with gladness and joy, and they offered whole
    burnt offerings, because not one of them had fallen until they returned in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, “burnt offerings.” The Greek term refers to offerings wholly
      consumed on the altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβησαν
  chosen: went up
  alternatives:
  - ascended
  - came up
  lexicon: LSJ
  rationale: The verb literally means 'went up/ascended.' 'Went up' is natural English
    and preserves the idiom of ascent to Zion without sounding overly elevated.
- source_word: τὸ ὄρος Σιὼν
  chosen: Mount Zion
  alternatives:
  - the mountain of Zion
  lexicon: LSJ
  rationale: Standard English rendering of the place name phrase; concise and idiomatic
    while preserving the geographic/theological reference.
- source_word: ἐν εὐφροσύνῃ καὶ χαρᾷ
  chosen: with gladness and joy
  alternatives:
  - in rejoicing and joy
  - with merriment and joy
  lexicon: LSJ
  rationale: Both nouns denote celebratory happiness. 'Gladness and joy' preserves
    the pair distinctly in readable modern English.
- source_word: προσήγαγον
  chosen: offered
  alternatives:
  - brought forward
  - presented
  lexicon: LSJ
  rationale: In sacrificial context the verb means to bring as an offering. 'Offered'
    communicates the cultic action clearly in English.
- source_word: ὁλοκαυτώματα
  chosen: whole burnt offerings
  alternatives:
  - burnt offerings
  - holocausts
  lexicon: LSJ
  rationale: The term refers to offerings wholly consumed by fire. 'Whole burnt offerings'
    makes that sense explicit and avoids the misleading modern connotations of 'holocausts.'
- source_word: οὐκ ἔπεσεν
  chosen: had fallen
  alternatives:
  - fell
  - was lost
  lexicon: LSJ
  rationale: In military context 'fall' is a conventional idiom for dying in battle.
    The English perfect 'had fallen' fits the causal clause looking back over the
    campaign.
- source_word: ἐξ αὐτῶν οὐθεὶς
  chosen: not one of them
  alternatives:
  - none of them
  - no one from among them
  lexicon: LSJ
  rationale: This preserves the emphatic negation and partitive sense in natural English.
- source_word: ἕως τοῦ ἐπιστρέψαι
  chosen: until they returned
  alternatives:
  - until the returning
  - up to their return
  lexicon: LSJ
  rationale: The articular infinitive with ἕως expresses temporal limit. 'Until they
    returned' is the clearest idiomatic rendering.
- source_word: ἐν εἰρήνῃ
  chosen: in peace
  alternatives:
  - safely
  - peacefully
  lexicon: LSJ
  rationale: The phrase can imply safe return, but 'in peace' preserves the source
    wording and its broader sense of unharmed, peaceful return.
