theological_decisions:
- issue: Rendering ἐκκλησία in a deuterocanonical Jewish historical context
  chosen_reading: assembly
  alternative_readings:
  - congregation
  - gathering
  rationale: To avoid importing later ecclesial/church connotations, the civic-public
    sense 'assembly' is preferred here.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy
    and readable modern English
- issue: Rendering ἀδελφοῖς with gender-accurate language
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - kinsmen
  - fellow Jews
  rationale: The Greek uses the masculine kinship term. Per project policy, the translation
    keeps the source-oriented form rather than neutralizing it, while recognizing
    the broader communal reference.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
