id: 1MA.5.16
reference: 1 Maccabees 5:16
source:
  edition: lxx-swete-1909
  text: Ὡς δὲ ἤκουσεν Ἰούδας καὶ ὁ λαὸς τοὺς λόγους τούτους, ἐπισυνήχθη ἐκκλησία μεγάλη
    βουλεύσασθαι τί ποιήσωσιν τοῖς ἀδελφοῖς αὐτῶν τοῖς οὖσιν ἐν θλίψει καὶ πολεμουμένοις
    ὑπʼ αὐτῶν.
  language: Greek
  pages:
  - 634
  confidence: high
  validation: minor_mismatch
translation:
  text: When Judas and the people heard these words, a great assembly gathered to
    consider what they should do for their brothers who were in distress and being
    attacked by them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these reports' / 'these things'; Greek 'these words.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here refers to their fellow members of the Jewish people who
      were under pressure.'
    reason: cultural_note
lexical_decisions:
- source_word: Ὡς δὲ ἤκουσεν
  chosen: When ... heard
  alternatives:
  - Now when ... heard
  - And when ... heard
  - As soon as ... heard
  lexicon: LSJ
  rationale: Ὡς with the aorist commonly introduces a temporal clause. 'When' is natural
    English and preserves the narrative sequence without over-specifying immediacy.
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  lexicon: LSJ
  rationale: As a personal name in 1 Maccabees, Ἰούδας is best transliterated 'Judas'
    by standard convention rather than translated as 'Judah'.
- source_word: ὁ λαός
  chosen: the people
  alternatives:
  - the army
  - the nation
  lexicon: LSJ
  rationale: The phrase refers broadly to the gathered Jewish people aligned with
    Judas, not specifically a military unit. 'The people' is the most direct and contextually
    appropriate rendering.
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - this report
  - these things
  lexicon: LSJ
  rationale: λόγοι can mean 'words' or 'message/report.' Because the text literally
    says 'these words' and the context is hearing a communicated plea, 'these words'
    preserves the form while remaining idiomatic.
- source_word: ἐπισυνήχθη
  chosen: gathered
  alternatives:
  - was assembled
  - came together
  lexicon: LSJ
  rationale: The passive/deponent sense indicates the assembly came together. 'Gathered'
    is concise, natural English and fits the subject 'a great assembly.'
- source_word: ἐκκλησία μεγάλη
  chosen: a great assembly
  alternatives:
  - a large congregation
  - a great gathering
  lexicon: LSJ
  rationale: In this pre-Christian Jewish context, ἐκκλησία denotes an assembly or
    gathered body, not a church. 'Great assembly' preserves both the formal public
    sense and the adjective μεγάλη.
- source_word: βουλεύσασθαι
  chosen: to consider
  alternatives:
  - to deliberate
  - to take counsel
  - to decide
  lexicon: LSJ
  rationale: The infinitive expresses the purpose of the gathering. 'To consider'
    communicates deliberation in readable modern English without sounding overly technical;
    'deliberate' is possible but slightly stiffer.
- source_word: τί ποιήσωσιν
  chosen: what they should do
  alternatives:
  - what they might do
  - what to do
  lexicon: LSJ
  rationale: The deliberative sense is well represented by 'what they should do,'
    which captures the practical decision under discussion.
- source_word: τοῖς ἀδελφοῖς αὐτῶν
  chosen: for their brothers
  alternatives:
  - for their brothers and sisters
  - for their kin
  - for their fellow Jews
  lexicon: LSJ
  rationale: ἀδελφοῖς here refers to fellow members of their people. Per the project's
    gender-accurate policy, 'brothers' is retained as the source term, while the broader
    kinship sense is acknowledged among alternatives.
- source_word: τοῖς οὖσιν ἐν θλίψει
  chosen: who were in distress
  alternatives:
  - who were in affliction
  - who were in trouble
  lexicon: LSJ
  rationale: θλίψις denotes pressure, affliction, or distress. 'In distress' is clear
    modern English and preserves the seriousness of their condition.
- source_word: πολεμουμένοις ὑπʼ αὐτῶν
  chosen: being attacked by them
  alternatives:
  - being warred against by them
  - being fought by them
  - under attack from them
  lexicon: LSJ
  rationale: The passive participle indicates hostile military action against the
    brothers. 'Being attacked by them' is idiomatic and conveys the sense clearly.
    The pronoun 'them' most naturally refers back to the hostile surrounding nations
    described in the context.
