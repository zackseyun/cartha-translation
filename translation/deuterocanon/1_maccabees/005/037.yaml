id: 1MA.5.37
reference: 1 Maccabees 5:37
source:
  edition: lxx-swete-1909
  text: Μετὰ δὲ τὰ ῥήματα ταῦτα συνήγαγεν Τιμόθεος παρεμβολὴν ἄλλην, καὶ παρενέβαλεν
    κατὰ πρόσωπον Ῥαφὼν ἐκ πέραν τοῦ χειμάρρου.
  language: Greek
  pages:
  - 636
  confidence: high
  validation: agree
translation:
  text: After these words, Timotheus gathered another camp and encamped opposite Raphon,
    beyond the stream.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'across the torrent' or 'on the far side of the wadi'; the Greek χειμάρρου
      can refer to a seasonal watercourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τὰ ῥήματα ταῦτα
  chosen: After these words
  alternatives:
  - After these things
  - After this speech
  lexicon: LSJ
  rationale: A natural temporal transition. ῥήματα can mean 'words' or 'matters/things';
    here the phrase most directly points back to what was just said, so 'After these
    words' preserves the Greek wording without sounding wooden.
- source_word: συνήγαγεν
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: LSJ
  rationale: The verb means to bring together or assemble. 'Gathered' is straightforward
    and broad enough for military forces; 'mustered' is possible but slightly more
    interpretive.
- source_word: παρεμβολὴν ἄλλην
  chosen: another camp
  alternatives:
  - another army camp
  - another force
  lexicon: LSJ
  rationale: παρεμβολή commonly denotes a camp or encampment, and by extension the
    force in camp. Because the next verb is 'encamped,' rendering this as 'camp' keeps
    the military setting clear while preserving the Greek's concrete imagery. 'Another
    force' is possible but less literal.
- source_word: παρενέβαλεν
  chosen: encamped
  alternatives:
  - pitched camp
  - camped
  lexicon: LSJ
  rationale: Standard military sense of making camp. 'Encamped' matches the formal
    narrative style and corresponds closely to the Greek.
- source_word: κατὰ πρόσωπον
  chosen: opposite
  alternatives:
  - in front of
  - facing
  lexicon: LSJ
  rationale: In military-geographical context, the phrase indicates position over
    against a place. 'Opposite' is concise and idiomatic in English.
- source_word: Ῥαφὼν
  chosen: Raphon
  alternatives:
  - Raphon (transliterated)
  rationale: Personal and place names are transliterated by project policy. The form
    'Raphon' reflects the Greek spelling naturally in English.
- source_word: ἐκ πέραν τοῦ χειμάρρου
  chosen: beyond the stream
  alternatives:
  - on the far side of the wadi
  - across the torrent
  lexicon: LSJ
  rationale: χειμάρρους can denote a winter-flowing stream, torrent, or wadi. 'Stream'
    is readable modern English and fits the narrative geography; 'wadi' would be more
    region-specific but less accessible, while 'torrent' may overstate the flow in
    context.
