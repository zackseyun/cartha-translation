id: 1MA.5.62
reference: 1 Maccabees 5:62
source:
  edition: lxx-swete-1909
  text: αὐτοὶ δὲ οὐκ ἦσαν ἐκ τοῦ σπέρματος τῶν ἀνδρῶν ἐκείνων, οἷς ἐδόθη σωτηρία Ἰσραὴλ
    διὰ χειρὸς αὐτῶν.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
translation:
  text: But they were not from the offspring of those men to whom deliverance for
    Israel had been given through their hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by their hand' or more idiomatically 'through them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σπέρματος
  chosen: offspring
  alternatives:
  - seed
  - descendants
  - lineage
  lexicon: BDAG
  rationale: The phrase ἐκ τοῦ σπέρματος denotes descent or lineage. 'Offspring' preserves
    the familial/genealogical sense in natural English without the awkwardness of
    'seed' here.
- source_word: ἀνδρῶν
  chosen: men
  alternatives:
  - warriors
  - people
  lexicon: BDAG
  rationale: The Greek is specifically masculine plural and refers to particular male
    figures, not people in general. 'Men' is therefore gender-accurate and contextually
    appropriate.
- source_word: ἐδόθη
  chosen: had been given
  alternatives:
  - was given
  lexicon: BDAG
  rationale: A passive of δίδωμι. The English pluperfect fits the retrospective sense
    in context, referring to men through whom Israel's deliverance had previously
    been granted.
- source_word: σωτηρία
  chosen: deliverance
  alternatives:
  - salvation
  - victory
  lexicon: BDAG
  rationale: In 1 Maccabees this term commonly refers to concrete military rescue
    or national preservation. 'Deliverance' preserves that sense without importing
    later doctrinal overtones that 'salvation' may carry in English.
- source_word: διὰ χειρὸς αὐτῶν
  chosen: through their hand
  alternatives:
  - by their hand
  - through them
  lexicon: BDAG
  rationale: This is a common idiom for agency. 'Through their hand' keeps the Hebrew/Septuagintal
    flavor and the concrete imagery while remaining intelligible in English.
- source_word: αὐτοὶ δὲ
  chosen: But they
  alternatives:
  - Now they
  - Yet they
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding context. 'But they' clearly signals
    that contrast in straightforward English.
