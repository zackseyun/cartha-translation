theological_decisions:
- issue: Rendering σωτηρία in a historical-military context
  chosen_reading: deliverance
  alternative_readings:
  - salvation
  - victory
  rationale: The verse speaks of Israel being saved through certain men in a concrete
    historical setting. 'Deliverance' best preserves the source sense while avoiding
    unnecessary theological narrowing or expansion.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    readable modern English'
- issue: Retention of the agency idiom διὰ χειρὸς αὐτῶν
  chosen_reading: through their hand
  alternative_readings:
  - by their hand
  - through them
  rationale: The idiom is transparent enough in English and preserves the scriptural
    texture of mediated divine/human agency without over-paraphrasing.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source meaning without
    paraphrase'
