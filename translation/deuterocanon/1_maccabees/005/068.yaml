id: 1MA.5.68
reference: 1 Maccabees 5:68
source:
  edition: lxx-swete-1909
  text: καὶ Α ἐξέκλινεν Ἰούδας εἰς Ἄζωτον γῆν ἀλλοφύλων, καὶ καθεῖλεν τοὺς βωμοὺς
    αὐτῶν, καὶ τὰ γλυπτὰ τῶν θεῶν αὐτῶν κατέκαυσαν, καὶ ἐσκύλευσεν τὰ σκῦλα τῶν πόλεων,
    καὶ ἐπέστρεψεν εἰς τὴν Ἰουδαίαν.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
translation:
  text: And Judas turned aside into Azotus, the land of foreigners, and he tore down
    their altars, and burned the carved images of their gods with fire, and plundered
    the spoil of the cities, and returned to Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically in historical context, 'the land of the Philistines.'
      The Greek reads more literally 'the land of foreigners.'
    reason: alternative_reading
  - marker: b
    text: The Greek verb here is plural ('they burned'), though the surrounding verbs
      are singular. This likely refers to Judas's forces rather than Judas alone.
    reason: textual_variant
lexical_decisions:
- source_word: ἐξέκλινεν
  chosen: turned aside
  alternatives:
  - went over
  - deviated
  - marched aside
  lexicon: LSJ
  rationale: The verb commonly means to turn aside or deviate from a course. 'Turned
    aside' preserves the sense of changing direction without over-specifying motive.
- source_word: Ἄζωτον
  chosen: Azotus
  alternatives:
  - Ashdod
  lexicon: LSJ
  rationale: The Greek text has the Hellenized place name Ἄζωτος. Following the project's
    practice of transliterating names from the source text, 'Azotus' is preferred
    in the main text; 'Ashdod' is a historically identifiable equivalent but not the
    form present here.
- source_word: γῆν ἀλλοφύλων
  chosen: the land of foreigners
  alternatives:
  - the land of the Philistines
  - foreign land
  lexicon: LSJ
  rationale: ἀλλόφυλοι literally means 'those of another tribe/race,' often used in
    the LXX for Philistines. Since the Greek here uses the broader ethnic term rather
    than a direct ethnic name, 'the land of foreigners' best reflects the wording,
    while the more specific historical identification is preserved as an alternative.
- source_word: καθεῖλεν
  chosen: tore down
  alternatives:
  - pulled down
  - destroyed
  lexicon: LSJ
  rationale: '''Tore down'' gives the concrete force of demolishing structures such
    as altars and is idiomatic modern English.'
- source_word: βωμοὺς
  chosen: altars
  alternatives:
  - high places
  - shrines
  lexicon: LSJ
  rationale: βωμός is the standard term for an altar. 'High places' would be too interpretive
    and 'shrines' too broad.
- source_word: γλυπτὰ
  chosen: carved images
  alternatives:
  - graven images
  - idols
  lexicon: LSJ
  rationale: The noun denotes carved representations. 'Carved images' is both accurate
    and readable; 'graven images' is traditional but archaic, and 'idols' loses the
    material nuance.
- source_word: κατέκαυσαν
  chosen: they burned
  alternatives:
  - he burned
  - they burned up
  lexicon: LSJ
  rationale: The transmitted Greek form is plural, so the English should reflect that
    number rather than smoothing it to singular. The subject is somewhat abrupt after
    singular verbs, likely implying Judas's forces. This is a material source feature
    and should be preserved.
- source_word: ἐσκύλευσεν
  chosen: plundered
  alternatives:
  - took spoil from
  - despoiled
  lexicon: LSJ
  rationale: The verb means to strip or plunder. 'Plundered' is concise and natural
    in context.
- source_word: τὰ σκῦλα
  chosen: the spoil
  alternatives:
  - booty
  - plunder
  lexicon: LSJ
  rationale: The cognate noun refers to spoils taken in war. 'The spoil' preserves
    the military sense without sounding colloquial or archaic.
- source_word: ἐπέστρεψεν
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: LSJ
  rationale: In narrative context, 'returned' is the most natural rendering.
- source_word: Ἰουδαίαν
  chosen: Judea
  alternatives:
  - the land of Judah
  - Judaea
  lexicon: LSJ
  rationale: Ἰουδαία in this period is naturally rendered 'Judea.' This is standard
    modern English for the region.
