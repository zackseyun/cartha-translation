theological_decisions:
- issue: Ethnic designation ἀλλόφυλοι in a context historically associated with Philistia
  chosen_reading: the land of foreigners
  alternative_readings:
  - the land of the Philistines
  rationale: The Greek wording is broader and more literal than a direct ethnic label.
    To avoid importing a specificity not explicit in the source, the main text keeps
    the literal sense, while the historically common identification is preserved in
    a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: Number shift in the verb κατέκαυσαν after singular verbs
  chosen_reading: they burned
  alternative_readings:
  - he burned
  rationale: The source text presents a plural verb where the surrounding narrative
    has singular verbs about Judas. Rather than harmonizing the text, the translation
    preserves the plural, likely referring to Judas and his men. This maintains transparency
    to the Greek witness.
  doctrine_reference: PHILOSOPHY.md transparency principle
