id: 1MA.5.26
reference: 1 Maccabees 5:26
source:
  edition: lxx-swete-1909
  text: καὶ ὅτι πολλοὶ ἐξ αὐτῶν συνειλημμένοι εἰσὶν εἰς Βοσσορὰ καὶ Βοσόρ, ἐν Ἀλάμοις,
    Κασφὼρ, Μακέδ, καὶ Καρναΐν· πᾶσαι αἱ πόλεις αὗται ὀχυραὶ καὶ μεγάλαι.
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
translation:
  text: and that many of them are confined in Bosora and Bosor, in Alamis, Casphor,
    Maked, and Carnaim—all these cities are fortified and large.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek place names are difficult and vary in English tradition; this
      draft preserves a close transliteration of the Swete text rather than harmonizing
      them to more familiar forms.
    reason: cultural_note
lexical_decisions:
- source_word: συνειλημμένοι
  chosen: are confined
  alternatives:
  - are shut up
  - are hemmed in
  - are besieged
  lexicon: LSJ
  rationale: The participle indicates being enclosed or trapped within the listed
    cities. 'Are confined' communicates that many of them are being held in or restricted
    to those places without over-specifying a military technical sense like 'besieged.'
- source_word: εἰς
  chosen: in
  alternatives:
  - into
  lexicon: BDAG
  rationale: With the passive participle and place names, εἰς functions idiomatically
    for location/resulting state rather than motion in English. 'Confined in' is natural
    and reflects the sense.
- source_word: Βοσσορὰ καὶ Βοσόρ, ἐν Ἀλάμοις, Κασφὼρ, Μακέδ, καὶ Καρναΐν
  chosen: Bosora and Bosor, in Alamis, Casphor, Maked, and Carnaim
  alternatives:
  - Bozora and Bosor, in Alama, Casphon, Maked, and Karnain
  rationale: These are place names, so transliteration is preferred. The forms follow
    the Greek witness conservatively rather than harmonizing to more familiar English
    spellings from other traditions. 'In' is retained before the sequence because
    ἐν explicitly governs at least Ἀλάμοις and naturally extends over the list in
    translation.
- source_word: ὀχυραὶ
  chosen: fortified
  alternatives:
  - strong
  - well-fortified
  lexicon: LSJ
  rationale: The adjective denotes fortified or strong in the sense of defensive strength.
    'Fortified' is the clearest and most concrete rendering for cities.
- source_word: μεγάλαι
  chosen: large
  alternatives:
  - great
  - important
  lexicon: LSJ
  rationale: In direct description of cities, 'large' best conveys size without importing
    evaluative overtones such as political importance.
- source_word: πᾶσαι αἱ πόλεις αὗται
  chosen: all these cities
  alternatives:
  - all these towns
  lexicon: BDAG
  rationale: πόλεις is straightforwardly 'cities' here, and the phrase sums up the
    listed locations.
