theological_decisions:
- issue: Causal force of the clause explaining the defeat
  chosen_reading: The defeat happened because they had not listened to Judas and his
    brothers.
  alternative_readings:
  - The clause could be read more loosely as a narrative explanation without strong
    moral causality.
  rationale: ὅτι naturally introduces the reason for the rout. This is a narrative-historical
    judgment, not a doctrinal expansion, and should be preserved in translation.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import claims beyond the text.
