id: 1MA.5.61
reference: 1 Maccabees 5:61
source:
  edition: lxx-swete-1909
  text: καὶ ἐγενήθη τροπὴ μεγάλη ἐν τῷ λαῷ, ὅτι οὐκ ἤκουσαν Ἰούδα καὶ τῶν ἀδελφῶν
    αὐτοῦ, οἰόμενοι ἀνδραγαθῆσαι αὐτοί.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
translation:
  text: And there was a great rout among the people, because they had not listened
    to Judas and his brothers, thinking that they themselves would act bravely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great defeat' or 'a great panic'; the Greek term denotes a turning
      to flight, hence 'rout.'
    reason: lexical_alternative
  - marker: b
    text: Or 'thinking that they would prove themselves valiant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τροπή
  chosen: rout
  alternatives:
  - defeat
  - turning
  - panic
  lexicon: LSJ
  rationale: In military context τροπή commonly denotes a turning to flight or rout
    rather than a mere generic 'change.' 'Rout' captures the sudden collapse of the
    force among the people.
- source_word: λαός
  chosen: the people
  alternatives:
  - the army
  - the troops
  lexicon: LSJ
  rationale: The Greek says 'the people.' In this narrative context it refers to the
    fighting body/community involved, but 'the people' stays closer to the source
    without over-specifying.
- source_word: οὐκ ἤκουσαν
  chosen: had not listened to
  alternatives:
  - did not obey
  - did not heed
  lexicon: LSJ
  rationale: ἀκούω with genitive can mean hear/listen to, and in context implies failure
    to heed counsel. 'Had not listened to' preserves the verbal idea while allowing
    the causal sense to emerge naturally.
- source_word: Ἰούδα
  chosen: Judas
  alternatives:
  - Judah
  lexicon: standard transliteration
  rationale: For 1 Maccabees the conventional transliteration of Ἰούδας as the personal
    name 'Judas' is standard and distinguishes the individual from the tribe/region
    Judah.
- source_word: ἀδελφῶν
  chosen: brothers
  alternatives:
  - kinsmen
  lexicon: LSJ
  rationale: The term plainly refers to Judas's male siblings in context. 'Brothers'
    is both accurate and natural English.
- source_word: οἰόμενοι
  chosen: thinking
  alternatives:
  - supposing
  - imagining
  lexicon: LSJ
  rationale: The participle gives the motive or assumption behind their action. 'Thinking'
    is idiomatic and sufficiently close.
- source_word: ἀνδραγαθῆσαι
  chosen: would act bravely
  alternatives:
  - would prove themselves valiant
  - would perform heroic deeds
  - would show their manly valor
  lexicon: LSJ
  rationale: The verb means to act with courage or distinguish oneself in valor. 'Would
    act bravely' is readable modern English; more literal options like 'play the man'
    are archaic and potentially misleading.
- source_word: αὐτοί
  chosen: they themselves
  alternatives:
  - themselves
  - on their own
  lexicon: LSJ
  rationale: The pronoun is emphatic. 'They themselves' preserves the emphasis that
    they presumed they could achieve valor independently of Judas and his brothers.
