id: 1MA.5.35
reference: 1 Maccabees 5:35
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέκλινεν εἰς Μααφὰ καὶ ἐπολέμησεν αὐτήν, καὶ κατελάβετο αὐτὴν καὶ ἀπέκτεινεν
    πᾶν ἀρσενικὸν αὐτῆς, καὶ ἔλαβεν τὰ σκῦλα αὐτῆς, καὶ ἐνέπρησεν αὐτὴν ἐν πυρί.
  language: Greek
  pages:
  - 636
  confidence: high
  validation: agree
translation:
  text: And he turned aside to Maapha and fought against it, and he captured it and
    killed every male in it, and he took its spoils and burned it with fire.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπέκλινεν
  chosen: turned aside
  alternatives:
  - turned toward
  - deviated to
  - marched against
  lexicon: LSJ
  rationale: The verb commonly means to turn aside or deviate from a route. 'Turned
    aside to' preserves the movement nuance without overinterpreting it as a full
    military advance formula.
- source_word: Μααφὰ
  chosen: Maapha
  alternatives:
  - Maaphah
  - Maafa
  rationale: Personal and place names are transliterated. 'Maapha' closely reflects
    the Greek form Μααφά in Swete.
- source_word: ἐπολέμησεν αὐτήν
  chosen: fought against it
  alternatives:
  - made war on it
  - attacked it
  lexicon: BDAG
  rationale: A standard military expression. 'Fought against it' is clear modern English
    and remains close to the Greek without adding intensity beyond the verb itself.
- source_word: κατελάβετο
  chosen: captured
  alternatives:
  - seized
  - took
  lexicon: LSJ
  rationale: In this military context the verb indicates taking possession of the
    city. 'Captured' best fits the sequence of assault and conquest.
- source_word: πᾶν ἀρσενικὸν αὐτῆς
  chosen: every male in it
  alternatives:
  - every male of it
  - all its males
  lexicon: LSJ
  rationale: ἀρσενικόν denotes the male sex. 'Every male in it' gives idiomatic English
    while preserving the grim comprehensiveness of the phrase.
- source_word: τὰ σκῦλα
  chosen: its spoils
  alternatives:
  - the plunder from it
  - its booty
  lexicon: BDAG
  rationale: The term refers to war plunder. 'Spoils' is concise, natural, and suitably
    martial.
- source_word: ἐνέπρησεν αὐτὴν ἐν πυρί
  chosen: burned it with fire
  alternatives:
  - set it on fire
  - burned it down
  lexicon: LSJ
  rationale: The Greek explicitly includes 'with fire.' Retaining that phrase preserves
    the source wording and the formulaic destruction language.
