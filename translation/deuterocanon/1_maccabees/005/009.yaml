id: 1MA.5.9
reference: 1 Maccabees 5:9
source:
  edition: lxx-swete-1909
  text: Καὶ ἐπισυνήχθησαν τὰ ἔθνη τὰ ἐν τῇ Γαλααδίτιδι ἐπὶ τὸν Ἰσραὴλ τοὺς ὄντας ἐπὶ
    τοῖς ὁρίοις αὐτῶν τοῦ ἐξᾶραι αὐτούς· καὶ ἔφυγον εἰς Δάθεμα τὸ ὀχύ- ρωμα.
  language: Greek
  pages:
  - 634
  confidence: high
  validation: agree
translation:
  text: And the nations in Gilead gathered together against the Israelites who were
    on their borders, to wipe them out; and they fled into the stronghold at Dathema.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to destroy them' or 'to root them out.' The Greek expression conveys
      an intent to remove them completely.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνήχθησαν
  chosen: gathered together
  alternatives:
  - assembled
  - were gathered together
  lexicon: LSJ
  rationale: The compound verb emphasizes coming together as a group. 'Gathered together'
    preserves the collective and somewhat hostile mobilization without sounding overly
    wooden.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: LSJ
  rationale: In 1 Maccabees this commonly refers to surrounding non-Israelite peoples.
    'The nations' is the most direct rendering and avoids importing later NT-specific
    overtones of 'Gentiles,' though that sense is contextually present.
- source_word: Γαλααδίτιδι
  chosen: Gilead
  alternatives:
  - the land of Gilead
  - Galaaditis
  lexicon: LSJ
  rationale: This place-name refers to the region of Gilead. 'In Gilead' gives clear
    modern English while preserving the geographic reference.
- source_word: ἐπὶ τὸν Ἰσραὴλ
  chosen: against the Israelites
  alternatives:
  - against Israel
  - against the sons of Israel
  lexicon: LSJ
  rationale: Although the Greek has singular 'Israel,' the following participial phrase
    identifies the people living there. 'Against the Israelites' makes the referent
    explicit in idiomatic English without changing the sense.
- source_word: τοὺς ὄντας ἐπὶ τοῖς ὁρίοις αὐτῶν
  chosen: who were on their borders
  alternatives:
  - who were within their borders
  - who were at their borders
  lexicon: LSJ
  rationale: The phrase describes Israelites located in the border regions of those
    nations. 'On their borders' is a natural English rendering that preserves the
    territorial tension of the Greek.
- source_word: τοῦ ἐξᾶραι αὐτούς
  chosen: to wipe them out
  alternatives:
  - to destroy them
  - to root them out
  lexicon: LSJ
  rationale: The infinitive expresses hostile intent toward total removal. 'Wipe them
    out' communicates the force clearly in contemporary English; 'root them out' is
    possible but less immediately clear.
- source_word: ἔφυγον
  chosen: they fled
  alternatives:
  - they escaped
  - they took refuge by fleeing
  lexicon: LSJ
  rationale: A straightforward past narrative verb; 'they fled' is the plain and accurate
    rendering.
- source_word: Δάθεμα
  chosen: Dathema
  alternatives:
  - Dathaema
  lexicon: LSJ
  rationale: This is a transliterated place-name. Standard transliteration is preferred
    for personal and place names.
- source_word: τὸ ὀχύρωμα
  chosen: the stronghold
  alternatives:
  - the fortress
  - the fortified place
  lexicon: LSJ
  rationale: The noun denotes a fortified defensive site. 'Stronghold' is concise
    and natural, while still conveying military fortification.
