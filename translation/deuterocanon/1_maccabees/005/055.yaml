id: 1MA.5.55
reference: 1 Maccabees 5:55
source:
  edition: lxx-swete-1909
  text: Καὶ ἐν ταῖς ἡμέραις αἷς ἦν Ἰούδας καὶ Ἰωναθὰν ἐν τῇ Γαλαάδ, καὶ Σίμων ὁ ἀδελφὸς
    αὐτοῦ ἐν τῇ Γαλιλαίᾳ κατὰ πρόσωπον Πτολεμαΐδος,
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
translation:
  text: And in the days when Judas and Jonathan were in Gilead, and Simon his brother
    was in Galilee opposite Ptolemais,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'facing Ptolemais' or 'toward Ptolemais'; the Greek is a spatial expression
      indicating location relative to the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ταῖς ἡμέραις αἷς
  chosen: in the days when
  alternatives:
  - during the days in which
  - at the time when
  lexicon: LSJ
  rationale: Idiomatic temporal expression; 'in the days when' preserves the Greek
    construction while reading naturally in English.
- source_word: ἦν
  chosen: were
  alternatives:
  - was
  lexicon: LSJ
  rationale: Although singular in form, the verb governs the compound subject 'Judas
    and Jonathan'; English requires plural agreement.
- source_word: Γαλαάδ
  chosen: Gilead
  lexicon: LSJ
  rationale: Standard English transliteration of the place name.
- source_word: Γαλιλαίᾳ
  chosen: Galilee
  lexicon: LSJ
  rationale: Standard English transliteration of the region name.
- source_word: κατὰ πρόσωπον Πτολεμαΐδος
  chosen: opposite Ptolemais
  alternatives:
  - facing Ptolemais
  - toward Ptolemais
  - in front of Ptolemais
  lexicon: LSJ
  rationale: The phrase literally means 'according to/opposite the face of Ptolemais'
    and is a geographical expression. 'Opposite Ptolemais' is concise and preserves
    the spatial sense without overinterpreting the exact military positioning.
- source_word: Πτολεμαΐδος
  chosen: Ptolemais
  lexicon: LSJ
  rationale: Standard English transliteration of the city name.
