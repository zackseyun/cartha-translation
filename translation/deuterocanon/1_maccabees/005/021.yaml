id: 1MA.5.21
reference: 1 Maccabees 5:21
source:
  edition: lxx-swete-1909
  text: Καὶ ἐπορεύθη Σίμων εἰς τὴν Γαλιλαίαν, καὶ συνῆψεν πόλεμους πολλοὺς πρὸς τὰ
    ἔθνη· καὶ συνετρίβη τὰ ἔθνη ἀπὸ προσώπου αὐτοῦ.
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
translation:
  text: And Simon went into Galilee, and fought many battles against the nations;
    and the nations were crushed before him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπορεύθη
  chosen: went
  alternatives:
  - traveled
  - marched
  lexicon: LSJ
  rationale: Aorist middle of πορεύομαι commonly means 'go' or 'travel.' 'Went' is
    the most natural English rendering here; 'marched' would over-specify a military
    nuance not inherent in the verb itself, though the context is military.
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: into Galilee
  alternatives:
  - to Galilee
  lexicon: LSJ
  rationale: εἰς naturally indicates movement into a region. 'Into Galilee' preserves
    the directional force slightly better than the flatter 'to Galilee.'
- source_word: συνῆψεν πόλεμους πολλοὺς
  chosen: fought many battles
  alternatives:
  - joined many battles
  - engaged in many wars
  - waged many wars
  lexicon: LSJ
  rationale: The idiom συνάπτειν πόλεμον/πολέμους means to engage in warfare or battle.
    'Fought many battles' is idiomatic English and fits the immediate narrative better
    than the more abstract 'waged many wars.'
- source_word: πρὸς τὰ ἔθνη
  chosen: against the nations
  alternatives:
  - against the Gentiles
  - with the nations
  lexicon: LSJ
  rationale: ἔθνη here refers to surrounding non-Jewish peoples/groups in a military
    setting. 'Nations' is the default, more neutral rendering; 'Gentiles' is possible
    but can sound more theologically loaded than the context requires.
- source_word: συνετρίβη
  chosen: were crushed
  alternatives:
  - were broken
  - were shattered
  - were defeated
  lexicon: LSJ
  rationale: The passive of συντρίβω conveys being broken or crushed. 'Were crushed'
    preserves the force of the Greek better than the weaker 'were defeated,' while
    remaining natural in English military narrative.
- source_word: ἀπὸ προσώπου αὐτοῦ
  chosen: before him
  alternatives:
  - from before him
  - at his presence
  lexicon: LSJ
  rationale: This idiom often means 'from before' someone, i.e., in their presence
    or before their advance. 'Before him' is concise, idiomatic English that captures
    the sense that the nations collapsed in the face of Simon's attack.
