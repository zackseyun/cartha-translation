id: 1MA.5.6
reference: 1 Maccabees 5:6
source:
  edition: lxx-swete-1909
  text: καὶ διεπέρασεν ἐπὶ τοὺς υἱοὺς Ἀμμών, καὶ εὗρεν χεῖρα κραταιὰν καὶ λαὸν πολύν,
    καὶ Τιμόθεον ἡγούμενον αὐτῶν.
  language: Greek
  pages:
  - 634
  confidence: high
  validation: minor_mismatch
translation:
  text: And he crossed over against the sons of Ammon, and found a strong force and
    a large people, with Timothy leading them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ammonites' for 'the sons of Ammon.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'a strong hand'; here the expression likely means military strength
      or force.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεπέρασεν
  chosen: crossed over
  alternatives:
  - passed through
  - went across
  lexicon: LSJ
  rationale: The verb commonly denotes crossing over or traversing. In this military
    movement context, 'crossed over' is a natural English rendering that preserves
    the directional sense without overinterpreting the route.
- source_word: ἐπὶ
  chosen: against
  alternatives:
  - to
  - toward
  lexicon: LSJ
  rationale: With a verb of military advance and the object 'the sons of Ammon,' ἐπί
    plausibly carries hostile direction. 'Against' best reflects the likely adversarial
    movement in context.
- source_word: τοὺς υἱοὺς Ἀμμών
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  lexicon: LSJ
  rationale: The Greek is literally 'the sons of Ammon.' This preserves the source
    expression while remaining intelligible in English. 'Ammonites' is a valid idiomatic
    alternative but is less formally transparent.
- source_word: χεῖρα κραταιὰν
  chosen: a strong force
  alternatives:
  - a mighty hand
  - strong power
  lexicon: LSJ
  rationale: Although literally 'a strong hand,' χείρ in military contexts can denote
    force or power. 'A strong force' communicates the idiomatic sense in readable
    English without flattening the military nuance.
- source_word: λαὸν πολύν
  chosen: a large people
  alternatives:
  - many people
  - a large army
  lexicon: LSJ
  rationale: The phrase literally means 'a numerous people.' 'A large people' keeps
    the collective sense of λαός. 'A large army' would be too specific, since the
    Greek says 'people,' not explicitly 'army,' though the military setting is clear.
- source_word: ἡγούμενον
  chosen: leading
  alternatives:
  - commanding
  - governing
  lexicon: LSJ
  rationale: The participle indicates Timothy's role as leader over them. 'Leading'
    is broad enough to fit the Greek while suiting the military context; 'commanding'
    is possible but slightly more interpretive.
