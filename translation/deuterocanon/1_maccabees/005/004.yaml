id: 1MA.5.4
reference: 1 Maccabees 5:4
source:
  edition: lxx-swete-1909
  text: καὶ ἐμνήσθη τῆς κακίας υἱῶν Βαιάν, οἳ ἦσαν τῷ λαῷ εἰς παγίδα καὶ εἰς σκάνδαλον
    ἐν τῷ ἐνεδρεύειν αὐτοὺς ἐν ταῖς ὁδοῖς.
  language: Greek
  pages:
  - 634
  confidence: high
  validation: agree
translation:
  text: And he remembered the evil of the sons of Baian, who were a snare and a stumbling
    block to the people, lying in ambush for them on the roads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sons of Baean'; the Greek proper name Βαιάν can be transliterated
      in more than one way.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμνήσθη
  chosen: remembered
  alternatives:
  - called to mind
  - took note of
  lexicon: BDAG
  rationale: The aorist of μιμνῄσκομαι here introduces Judas's recollection of prior
    hostility as motivation for action. 'Remembered' is the most natural and sufficiently
    formal English rendering.
- source_word: κακίας
  chosen: evil
  alternatives:
  - wickedness
  - malice
  lexicon: BDAG
  rationale: κακία can denote wickedness or malicious harm. In this narrative context
    it refers to hostile wrongdoing done against the Jews; 'evil' preserves the broad
    moral force without over-specifying motive.
- source_word: υἱῶν Βαιάν
  chosen: the sons of Baian
  alternatives:
  - the descendants of Baian
  - the sons of Baean
  lexicon: LSJ
  rationale: υἱοί with a proper name can denote a clan or group identified with an
    ancestor. 'Sons of Baian' keeps the source form and avoids interpretive expansion.
    The proper name is transliterated rather than translated, per project philosophy.
- source_word: παγίδα
  chosen: a snare
  alternatives:
  - a trap
  lexicon: BDAG
  rationale: παγίς/pagida imagery is metaphorical for a dangerous trap set for others.
    'Snare' preserves the figurative and literary quality of the Greek better than
    the flatter 'trap.'
- source_word: σκάνδαλον
  chosen: a stumbling block
  alternatives:
  - an offense
  - a cause of downfall
  lexicon: BDAG
  rationale: σκάνδαλον literally denotes something causing stumbling and often carries
    metaphorical force. 'Stumbling block' is the standard transparent rendering and
    fits the paired imagery with 'snare.'
- source_word: ἐν τῷ ἐνεδρεύειν
  chosen: by lying in ambush
  alternatives:
  - while ambushing
  - in ambushing
  lexicon: BDAG
  rationale: The articular infinitive with ἐν expresses circumstance or means. Here
    it explains how they functioned as a snare and stumbling block. 'By lying in ambush'
    captures both the durative sense and the instrumental nuance.
- source_word: αὐτοὺς
  chosen: for them
  alternatives:
  - them
  lexicon: BDAG
  rationale: The pronoun refers back to 'the people' as the object of the ambush.
    In English, 'lying in ambush for them' is idiomatic and makes the hostile direction
    explicit.
- source_word: ἐν ταῖς ὁδοῖς
  chosen: on the roads
  alternatives:
  - in the roads
  - along the ways
  lexicon: BDAG
  rationale: ὁδοί here are travel routes. 'On the roads' is idiomatic modern English
    and suits the setting of roadside ambushes.
