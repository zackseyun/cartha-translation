id: 1MA.5.20
reference: 1 Maccabees 5:20
source:
  edition: lxx-swete-1909
  text: καὶ ἐμερίσθησαν Σίμωνι ἄνδρες τρισχίλιοι τοῦ πορευθῆναι εἰς τὴν Γαλιλαίαν,
    Ἰούδα δὲ ἄνδρες ὀκτακισχίλιοι εἰς τὴν Γαλααδῖτιν.
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
translation:
  text: And three thousand men were assigned to Simon to go into Galilee, but to Judas
    eight thousand men into Gilead.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐμερίσθησαν
  chosen: were assigned
  alternatives:
  - were divided
  - were apportioned
  - were distributed
  lexicon: LSJ
  rationale: The passive of μερίζω here describes the allotment of troops to commanders.
    'Were assigned' communicates the military-administrative sense more naturally
    in English than the more literal 'were divided,' while remaining anchored to the
    idea of apportionment.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - soldiers
  lexicon: LSJ
  rationale: The Greek explicitly says 'men.' In this military context they are fighting
    men, but 'men' preserves the source wording and matches the gender-accurate policy
    without adding an interpretive gloss.
- source_word: τρισχίλιοι
  chosen: three thousand
  lexicon: LSJ
  rationale: Straightforward numeral; rendered directly.
- source_word: τοῦ πορευθῆναι
  chosen: to go
  alternatives:
  - to march
  - for going
  lexicon: LSJ
  rationale: 'The articular infinitive expresses purpose: the men were assigned for
    the purpose of going. ''To go'' is simple and accurate; ''to march'' would add
    military coloring not explicit in the verb itself.'
- source_word: Γαλιλαίαν
  chosen: Galilee
  lexicon: LSJ
  rationale: Standard English transliteration of the place name.
- source_word: Ἰούδα
  chosen: Judas
  alternatives:
  - Judah
  lexicon: LSJ
  rationale: As a personal name in Greek, Ἰούδας is regularly rendered 'Judas' in
    1 Maccabees. 'Judah' would suggest the tribal/geographical name rather than the
    individual commander.
- source_word: ὀκτακισχίλιοι
  chosen: eight thousand
  lexicon: LSJ
  rationale: Straightforward numeral; rendered directly.
- source_word: Γαλααδῖτιν
  chosen: Gilead
  alternatives:
  - the land of Gilead
  - the Gileadite region
  lexicon: LSJ
  rationale: The term refers to the region of Gilead. 'Gilead' is the natural English
    geographic rendering; fuller expansions are possible but unnecessary in the main
    text.
