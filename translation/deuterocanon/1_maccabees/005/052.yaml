id: 1MA.5.52
reference: 1 Maccabees 5:52
source:
  edition: lxx-swete-1909
  text: καὶ διέβησαν τὸν Ἰορδάνην εἰς τὸ πεδίον τὸ μέγα κατὰ πρόσωπον Βαισάν.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: minor_mismatch
translation:
  text: And they crossed the Jordan into the great plain opposite Baisan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Baisan is the Greek place-name form often identified with Beth-shan.
    reason: cross_reference
lexical_decisions:
- source_word: διέβησαν
  chosen: crossed
  alternatives:
  - went across
  - passed over
  lexicon: LSJ
  rationale: Aorist of διαβαίνω in a travel narrative naturally means crossing from
    one side to another. 'Crossed' is concise, idiomatic English and fits the object
    'the Jordan.'
- source_word: τὸν Ἰορδάνην
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: LSJ
  rationale: The proper name with article refers to the river Jordan. English commonly
    says 'the Jordan'; adding 'River' is possible but unnecessary here.
- source_word: εἰς τὸ πεδίον τὸ μέγα
  chosen: into the great plain
  alternatives:
  - into the great valley
  - into the broad plain
  lexicon: LSJ
  rationale: πεδίον ordinarily denotes a plain or level region. 'Great plain' preserves
    both the noun and the attributive adjective μέγα without over-interpreting the
    geography.
- source_word: κατὰ πρόσωπον
  chosen: opposite
  alternatives:
  - before
  - facing
  - in front of
  lexicon: LSJ
  rationale: This idiom in geographical description indicates position over against
    or facing a place. 'Opposite' is the clearest natural English in this context.
- source_word: Βαισάν
  chosen: Baisan
  alternatives:
  - Beth-shan
  - Beisan
  lexicon: LSJ
  rationale: Per project philosophy, personal and place names are transliterated rather
    than translated. 'Baisan' closely reflects the Greek form Βαισάν. 'Beth-shan'
    is a historically identified equivalent but would import a Hebraized form not
    present in the Greek text.
