id: 1MA.5.23
reference: 1 Maccabees 5:23
source:
  edition: lxx-swete-1909
  text: καὶ παρέλαβεν αὐτοὺς ἐκ τῆς Γαλιλαίας καὶ ἐν Ἀρβάκτοις σὺν ταῖς γυναιξὶν καὶ
    τοῖς τέκνοις, καὶ πάντα ὅσα ἦν αὐτοῖς, καὶ ἤγαγον εἰς τὴν Ἰουδαίαν μετʼ εὐφροσύνης
    μεγάλης.
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
translation:
  text: And he took them from Galilee and from Arbactis, together with the women and
    the children and all that belonged to them, and they brought them into Judea with
    great rejoicing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text shifts from singular ('he took') to plural ('they brought').
      The translation preserves this as transmitted rather than harmonizing it.
    reason: textual_variant
  - marker: b
    text: Or 'in Arbactis.' The Greek uses 'in' with the place-name, though English
      idiom in this context may be expressed as 'from Arbactis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέλαβεν
  chosen: took
  alternatives:
  - received
  - took along
  lexicon: LSJ
  rationale: The verb can mean receive or take over, but in this narrative context
    of gathering and escorting people to safety, 'took' is the most natural concise
    English rendering.
- source_word: ἐκ τῆς Γαλιλαίας
  chosen: from Galilee
  lexicon: LSJ
  rationale: Straightforward geographic source phrase; 'Galilee' is the standard English
    transliteration.
- source_word: ἐν Ἀρβάκτοις
  chosen: from Arbactis
  alternatives:
  - in Arbactis
  lexicon: LSJ
  rationale: The Greek has ἐν with a place-name, but in coordination with ἐκ τῆς Γαλιλαίας
    and the movement context, English idiom favors 'from Arbactis.' The place-name
    is transliterated because it is a proper location name.
- source_word: σὺν ταῖς γυναιξὶν καὶ τοῖς τέκνοις
  chosen: together with the women and the children
  alternatives:
  - with their wives and children
  lexicon: LSJ
  rationale: The Greek explicitly says 'the women' and 'the children,' not necessarily
    'wives'; the more literal rendering avoids importing a narrower family relation
    than the text states.
- source_word: πάντα ὅσα ἦν αὐτοῖς
  chosen: all that belonged to them
  alternatives:
  - all that they had
  - all their possessions
  lexicon: LSJ
  rationale: This phrase refers broadly to their belongings or property. 'All that
    belonged to them' preserves the breadth without sounding overly formal.
- source_word: ἤγαγον
  chosen: they brought
  alternatives:
  - he brought
  - led
  lexicon: LSJ
  rationale: The transmitted Greek shifts to a plural verb. The translation preserves
    that grammatical number rather than smoothing it to singular, since the text as
    given supports 'they brought.'
- source_word: εἰς τὴν Ἰουδαίαν
  chosen: into Judea
  alternatives:
  - to Judea
  lexicon: LSJ
  rationale: The preposition εἰς naturally indicates movement into a region; 'into
    Judea' reflects that directional force.
- source_word: μετʼ εὐφροσύνης μεγάλης
  chosen: with great rejoicing
  alternatives:
  - with great gladness
  - with great joy
  lexicon: LSJ
  rationale: The phrase denotes celebratory joy. 'With great rejoicing' fits the public,
    communal tone of the narrative.
