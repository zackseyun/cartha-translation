id: 1MA.5.57
reference: 1 Maccabees 5:57
source:
  edition: lxx-swete-1909
  text: καὶ εἶπαν Ποιήσωμεν καὶ αὐτοὶ ἑαυτοῖς ὄνομα, καὶ πορευθῶμεν πολεμῆσαι πρὸς
    τὰ ἔθνη τὰ κύκλῳ ἡμῶν.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: minor_mismatch
translation:
  text: And they said, “Let us also make a name for ourselves, and let us go to wage
    war against the nations around us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'win renown for ourselves.' Literally, 'make a name for ourselves.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Gentiles around us.' The Greek term can denote the surrounding non-Jewish
      peoples.
    reason: alternative_reading
lexical_decisions:
- source_word: Ποιήσωμεν
  chosen: Let us make
  alternatives:
  - Let us do
  - Let us accomplish
  lexicon: LSJ
  rationale: Aorist subjunctive in a hortatory construction after εἶπαν, introducing
    direct speech. In idiom with ὄνομα, ποιέω is best rendered 'make' rather than
    the more generic 'do'.
- source_word: καὶ αὐτοὶ
  chosen: also
  alternatives:
  - we too
  - even we
  lexicon: LSJ
  rationale: 'The combination marks addition/emphasis: they want to do likewise themselves.
    English ''also'' captures the sense smoothly; the subject ''they'' is already
    explicit in the narrative frame.'
- source_word: ἑαυτοῖς
  chosen: for ourselves
  alternatives:
  - for themselves
  lexicon: LSJ
  rationale: Within the direct quotation the reflexive is first-person in sense, matching
    the hortatory verbs. English shifts naturally to 'ourselves' inside the quoted
    speech.
- source_word: ὄνομα
  chosen: a name
  alternatives:
  - renown
  - a reputation
  lexicon: LSJ
  rationale: The idiom ποιεῖν ὄνομα means to gain fame or renown. 'Make a name' preserves
    the source idiom transparently and remains natural English.
- source_word: πορευθῶμεν
  chosen: let us go
  alternatives:
  - let us march
  - let us proceed
  lexicon: LSJ
  rationale: Basic motion verb in another hortatory subjunctive. 'Go' is the least
    interpretive rendering; 'march' would add military color not explicit in the verb
    itself.
- source_word: πολεμῆσαι
  chosen: to wage war
  alternatives:
  - to fight
  - to make war
  lexicon: LSJ
  rationale: The infinitive denotes engaging in warfare, not merely a single fight.
    'Wage war' conveys sustained military action more clearly than the flatter 'fight'.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: LSJ
  rationale: In 1 Maccabees this commonly refers to surrounding non-Jewish peoples.
    'Nations' is the broad, source-near rendering; 'Gentiles' is possible but more
    interpretive and more loaded in later religious English.
- source_word: τὰ κύκλῳ ἡμῶν
  chosen: around us
  alternatives:
  - surrounding us
  - all around us
  lexicon: LSJ
  rationale: κύκλῳ with the genitive/pronominal expression indicates surrounding location.
    'Around us' is concise and idiomatic.
