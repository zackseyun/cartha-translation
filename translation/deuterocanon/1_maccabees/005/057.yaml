theological_decisions:
- issue: Idiomatic force of 'make a name'
  chosen_reading: Retained the idiom literally as 'make a name for ourselves'
  alternative_readings:
  - win renown for ourselves
  - gain a reputation for ourselves
  rationale: The phrase echoes a recognizable biblical idiom for seeking fame or honor.
    Keeping the idiom preserves literary resonance without obscuring meaning.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of ἔθνη
  chosen_reading: the nations
  alternative_readings:
  - the Gentiles
  rationale: The verse is historical and military, not primarily making a theological
    Jew/Gentile contrast. 'The nations' preserves the Greek term's ordinary sense
    while allowing the context to imply neighboring foreign peoples.
  doctrine_reference: Translation philosophy §1, §5
