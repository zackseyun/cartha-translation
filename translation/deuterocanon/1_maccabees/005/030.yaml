id: 1MA.5.30
reference: 1 Maccabees 5:30
source:
  edition: lxx-swete-1909
  text: καὶ ἐγένετο ἑωθινή, καὶ ἦραν τοὺς ὀφθαλμοὺς αὐτῶν καὶ ἰδοὺ λαὸς πολὺς οὗ οὐκ
    ἦν ἀριθμός, αἴροντες κλίμακας καὶ μηχανὰς καταλαβεῖσθαι τὸ ὀχύρωμα· καὶ ἐπολέμουν
    αὐτούς.
  language: Greek
  pages:
  - 636
  confidence: high
  validation: agree
translation:
  text: And when morning came, they lifted up their eyes, and behold, a great multitude,
    beyond number, carrying ladders and siege engines to capture the stronghold; and
    they were fighting them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without number' or 'too many to count.'
    reason: lexical_alternative
  - marker: b
    text: Greek μηχανάς refers to siege devices or engines used in an assault on a
      fortified place.
    reason: cultural_note
lexical_decisions:
- source_word: ἐγένετο ἑωθινή
  chosen: when morning came
  alternatives:
  - it became morning
  - daybreak came
  lexicon: LSJ
  rationale: Idiomatic temporal expression. 'When morning came' is natural English
    while preserving the narrative transition marked by ἐγένετο + time expression.
- source_word: ἦραν τοὺς ὀφθαλμοὺς αὐτῶν
  chosen: they lifted up their eyes
  alternatives:
  - they looked up
  - they raised their eyes
  lexicon: LSJ
  rationale: A common biblical idiom for looking up. Retained fairly literally because
    it is clear in English and preserves the source's narrative style.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: LSJ
  rationale: Preserves the deictic force and suddenness of the scene. Though somewhat
    elevated, it remains readable and reflects the Greek's attention-directing particle.
- source_word: λαὸς πολὺς
  chosen: a great multitude
  alternatives:
  - a large crowd
  - many people
  lexicon: LSJ
  rationale: λαός here denotes a large body of people, likely troops. 'Great multitude'
    captures both size and the elevated narrative register better than the flatter
    'many people.'
- source_word: οὗ οὐκ ἦν ἀριθμός
  chosen: beyond number
  alternatives:
  - without number
  - too many to count
  lexicon: LSJ
  rationale: Concise idiomatic rendering of innumerability. 'Beyond number' is natural
    and preserves the emphatic sense.
- source_word: αἴροντες κλίμακας
  chosen: carrying ladders
  alternatives:
  - bringing ladders
  - bearing ladders
  lexicon: LSJ
  rationale: Present participle describing the multitude's action in preparation for
    assault. 'Carrying' is straightforward and contextually apt.
- source_word: μηχανὰς
  chosen: siege engines
  alternatives:
  - machines
  - engines of war
  lexicon: LSJ
  rationale: In military context μηχαναί refers to devices used in siege warfare.
    'Siege engines' communicates the historical sense more clearly than the generic
    'machines.'
- source_word: καταλαβεῖσθαι τὸ ὀχύρωμα
  chosen: to capture the stronghold
  alternatives:
  - to seize the fortress
  - to take the fortification
  lexicon: LSJ
  rationale: 'The infinitive expresses purpose: they brought assault equipment in
    order to take the fortified position. ''Stronghold'' is a natural rendering of
    ὀχύρωμα in this military setting.'
- source_word: ἐπολέμουν αὐτούς
  chosen: they were fighting them
  alternatives:
  - they attacked them
  - they were making war on them
  lexicon: LSJ
  rationale: Imperfect verb indicates ongoing action. 'Were fighting them' preserves
    the aspect better than the simple past 'attacked them.' The subject is most naturally
    the previously mentioned multitude.
