id: 1MA.5.27
reference: 1 Maccabees 5:27
source:
  edition: lxx-swete-1909
  text: καὶ ἐν ταῖς λοιπαῖς πόλεσιν τῆς Γαλααδίτιδος εἰσὶν συνειλημμένοι· εἰς αὔριον
    πάσονται παρεμβαλεῖν ἐπὶ τὰ ὀχυρώματα, καὶ καταλαβέσθαι καὶ ἐξᾶραι ἅπαντας αὐτοὺς
    ἐν ἡμέρᾳ μιᾷ.
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
translation:
  text: And in the other cities of Gilead they are shut in; tomorrow they are set
    to encamp against the strongholds, seize them, and destroy all of them in a single
    day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are hemmed in' or 'are besieged' for 'are shut in.' The Greek describes
      people confined under threat, without requiring a more technical siege term.
    reason: lexical_alternative
  - marker: b
    text: Or 'they are about to' instead of 'they are set to'; the Greek verb conveys
      imminent intention.
    reason: lexical_alternative
  - marker: c
    text: '''Destroy all of them'' could also be rendered ''wipe them all out''; the
      Greek is forceful and likely refers to total destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λοιπαῖς πόλεσιν
  chosen: the other cities
  alternatives:
  - the remaining cities
  - the rest of the cities
  lexicon: LSJ
  rationale: λοιπός commonly means remaining/rest. 'The other cities' is natural English
    and fits the contrast with the previously mentioned location(s).
- source_word: τῆς Γαλααδίτιδος
  chosen: of Gilead
  alternatives:
  - of the Gileaditis
  - of the Gilead region
  lexicon: LSJ
  rationale: The adjective/noun refers to the region of Gilead. 'Of Gilead' is the
    standard clear geographic rendering in English.
- source_word: συνειλημμένοι
  chosen: are shut in
  alternatives:
  - are hemmed in
  - are enclosed
  - are besieged
  lexicon: LSJ
  rationale: The perfect/passive sense indicates being confined or trapped. 'Are shut
    in' preserves the state resulting from hostile pressure without over-specifying
    a formal siege, though that idea is nearby.
- source_word: εἰς αὔριον
  chosen: tomorrow
  alternatives:
  - by tomorrow
  - for tomorrow
  lexicon: LSJ
  rationale: Straight temporal expression; 'tomorrow' is the most direct rendering.
- source_word: πάσονται
  chosen: they are set to
  alternatives:
  - they are about to
  - they intend to
  - they will
  lexicon: LSJ
  rationale: The verb here conveys imminent intention or readiness. 'They are set
    to' captures planned imminence better than a bare future.
- source_word: παρεμβαλεῖν
  chosen: encamp against
  alternatives:
  - camp against
  - attack
  - lay siege to
  lexicon: LSJ
  rationale: The military verb literally refers to making camp, often against an enemy.
    'Encamp against' keeps the military image without collapsing it into the broader
    result of siege.
- source_word: τὰ ὀχυρώματα
  chosen: the strongholds
  alternatives:
  - the fortresses
  - the fortified places
  lexicon: LSJ
  rationale: ὀχύρωμα denotes a fortified place/stronghold. 'Strongholds' is concise
    and idiomatic.
- source_word: καταλαβέσθαι
  chosen: seize
  alternatives:
  - capture
  - take
  lexicon: LSJ
  rationale: The verb means to take possession of or capture. 'Seize' is vivid and
    fits the rapid military sequence.
- source_word: ἐξᾶραι
  chosen: destroy
  alternatives:
  - wipe out
  - remove
  - carry off
  lexicon: LSJ
  rationale: In this military context, with ἅπαντας αὐτούς as object, the sense is
    exterminatory/removal by destruction rather than mere relocation. 'Destroy' is
    strong but appropriately broad.
- source_word: ἅπαντας αὐτοὺς
  chosen: all of them
  alternatives:
  - every one of them
  - them all
  lexicon: LSJ
  rationale: Emphatic totality is preserved with natural English word order.
- source_word: ἐν ἡμέρᾳ μιᾷ
  chosen: in a single day
  alternatives:
  - in one day
  - within one day
  lexicon: LSJ
  rationale: The phrase emphasizes the brevity/completeness of the action. 'In a single
    day' brings out that force idiomatically.
