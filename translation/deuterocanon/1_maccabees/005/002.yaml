theological_decisions:
- issue: Ethnic-covenantal designation in τὸ γένος Ἰακώβ
  chosen_reading: the offspring of Jacob
  alternative_readings:
  - the race of Jacob
  - the family of Jacob
  - the people of Jacob
  rationale: The phrase identifies the Jewish people by descent from Jacob/Israel.
    The chosen rendering preserves that covenant-historical identity while avoiding
    modern racial connotations that 'race' may import.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of extermination language in ἆραι ... θανατοῦν ... ἐξαίρειν
  chosen_reading: remove ... kill ... wipe out
  alternative_readings:
  - destroy ... kill ... root out
  rationale: The verse escalates from plotting removal to active killing and eradication.
    The translation preserves that progression rather than flattening all three verbs
    into a single English idea.
  doctrine_reference: Translation philosophy §1, §5
