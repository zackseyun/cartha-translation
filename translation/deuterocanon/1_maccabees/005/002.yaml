id: 1MA.5.2
reference: 1 Maccabees 5:2
source:
  edition: lxx-swete-1909
  text: καὶ ἐβουλεύοντο τοῦ ἆραι τὸ γένος Ἰακὼβ τοὺς ὄντας ἐν μέσῳ αὐτῶν, καὶ ἤρξαντο
    τοῦ θανατοῦν ἐν τῷ λαῷ καὶ ἐξαίρειν.
  language: Greek
  pages:
  - 633
  confidence: high
  validation: agree
translation:
  text: And they were plotting to remove the offspring of Jacob who were among them,
    and they began to kill and wipe out people from the nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the race of Jacob' or 'the people of Jacob.' The Greek γένος emphasizes
      descent or kinship.
    reason: lexical_alternative
  - marker: b
    text: Or 'among the people.' The Greek phrase ἐν τῷ λαῷ is somewhat compressed
      and may be understood locatively or partitivally in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβουλεύοντο
  chosen: were plotting
  alternatives:
  - were taking counsel
  - were planning
  - were deliberating
  lexicon: LSJ
  rationale: Imperfect middle indicates ongoing deliberation or scheming. 'Were plotting'
    captures both the durative sense and the hostile intent evident from the infinitive
    that follows.
- source_word: ἆραι
  chosen: to remove
  alternatives:
  - to take away
  - to destroy
  lexicon: LSJ
  rationale: Aorist infinitive of αἴρω can mean 'take away/remove.' Here it introduces
    the aim of the plot against Jacob's offspring. 'Remove' preserves the lexical
    sense without prematurely specifying the exact manner, since the next clause explicitly
    states killing.
- source_word: τὸ γένος Ἰακώβ
  chosen: the offspring of Jacob
  alternatives:
  - the race of Jacob
  - the family of Jacob
  - the people of Jacob
  lexicon: LSJ
  rationale: γένος denotes kin, stock, or lineage. 'Offspring of Jacob' preserves
    the genealogical and covenantal identity of the Jewish people without using the
    potentially misleading modern term 'race.'
- source_word: τοὺς ὄντας ἐν μέσῳ αὐτῶν
  chosen: who were among them
  alternatives:
  - being in their midst
  - living among them
  lexicon: LSJ
  rationale: 'This participial phrase identifies the specific group targeted: those
    Jews residing among the surrounding peoples. ''Who were among them'' is natural
    English and keeps the locative force.'
- source_word: ἤρξαντο τοῦ θανατοῦν
  chosen: they began to kill
  alternatives:
  - they started killing
  - they began putting to death
  lexicon: LSJ
  rationale: The construction ἄρχομαι + infinitive marks inception. θανατοῦν means
    'to kill/put to death.' 'Began to kill' is straightforward and readable.
- source_word: ἐν τῷ λαῷ
  chosen: from the nation
  alternatives:
  - among the people
  - in the people
  lexicon: LSJ
  rationale: The phrase is somewhat compressed in Greek. Given the context of targeting
    the Jewish people as a collective, 'from the nation' conveys that they were killing
    members of the people. 'Among the people' is possible, but in English it can sound
    merely locative rather than partitive.
- source_word: ἐξαίρειν
  chosen: wipe out
  alternatives:
  - root out
  - remove
  - destroy
  lexicon: LSJ
  rationale: ἐξαιρέω can mean remove or take away, but in this violent context alongside
    'kill' it intensifies the sense toward eradication. 'Wipe out' communicates the
    exterminatory thrust without excessive paraphrase.
