theological_decisions:
- issue: Ethnonym versus literal kinship expression in τοὺς υἱοὺς Ἠσαῦ
  chosen_reading: the sons of Esau
  alternative_readings:
  - the Edomites
  - the descendants of Esau
  rationale: This is not a major doctrinal crux, but it bears on how strongly the
    translation preserves biblical intertextuality. The literal expression was retained
    to reflect the Greek and its resonance with Israel-Edom relations, while more
    interpretive ethnic labels are preserved as alternatives.
  doctrine_reference: Translation philosophy §§1, 5
