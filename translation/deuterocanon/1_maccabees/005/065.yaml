id: 1MA.5.65
reference: 1 Maccabees 5:65
source:
  edition: lxx-swete-1909
  text: Καὶ ἐξῆλθεν Ἰούδας καὶ οἱ ἀδελφοὶ αὐτοῦ, καὶ ἐπολέμουν τοὺς υἱοὺς Ἠσαῦ ἐν
    τῇ γῇ τῇ πρὸς νότον, καὶ ἐπάταξεν τὴν Χεβρὼν καὶ τὰς θυγατέρας αὐτῆς· καὶ καθεῖλεν
    τὸ ὀχύρωμα αὐτῆς, καὶ τοὺς πύργους αὐτῆς ἐνεπύρισεν κυκλόθεν.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
translation:
  text: And Judas and his brothers went out, and they fought the sons of Esau in the
    land to the south, and he struck Hebron and its daughter towns; he tore down its
    fortress, and he burned its towers all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Edomites' (literally, 'the sons of Esau').
    reason: alternative_reading
  - marker: b
    text: '''Daughter towns'' refers to smaller settlements dependent on a main city.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - set out
  - marched out
  lexicon: LSJ
  rationale: A straightforward narrative aorist of ἐξέρχομαι. 'Went out' preserves
    the idiom without adding military nuance beyond what the context already supplies.
- source_word: ἐπολέμουν
  chosen: fought
  alternatives:
  - were fighting
  - made war against
  lexicon: LSJ
  rationale: The imperfect can suggest ongoing action, but in English narrative 'fought'
    is the most natural optimal-equivalence rendering. 'Made war against' is more
    formal but less idiomatic.
- source_word: τοὺς υἱοὺς Ἠσαῦ
  chosen: the sons of Esau
  alternatives:
  - the descendants of Esau
  - the Edomites
  lexicon: LSJ
  rationale: The Greek literally says 'sons of Esau.' This likely refers to Edomites,
    but the literal rendering preserves the source wording and its biblical resonance
    without over-interpreting.
- source_word: ἐν τῇ γῇ τῇ πρὸς νότον
  chosen: in the land to the south
  alternatives:
  - in the southern land
  - in the Negeb
  lexicon: LSJ
  rationale: The phrase is literally 'in the land toward the south.' 'In the land
    to the south' is clear and close. 'Negeb' may be geographically apt, but the Greek
    here does not use a transliterated place-name.
- source_word: ἐπάταξεν
  chosen: he struck
  alternatives:
  - he attacked
  - he defeated
  lexicon: LSJ
  rationale: The singular verb after the plural subject likely foregrounds Judas as
    leader. 'Struck' preserves the broad military force of πατάσσω without specifying
    more than the Greek states.
- source_word: τὴν Χεβρὼν
  chosen: Hebron
  lexicon: LSJ
  rationale: Standard transliteration of the place-name.
- source_word: τὰς θυγατέρας αὐτῆς
  chosen: its daughter towns
  alternatives:
  - its villages
  - its dependent towns
  lexicon: LSJ
  rationale: '''Daughters'' is a known Semitic/Greek geographical idiom for satellite
    settlements. ''Daughter towns'' preserves the idiom while remaining understandable.'
- source_word: καθεῖλεν
  chosen: tore down
  alternatives:
  - pulled down
  - demolished
  lexicon: LSJ
  rationale: A vivid but natural rendering of καθαιρέω in a military context.
- source_word: τὸ ὀχύρωμα αὐτῆς
  chosen: its fortress
  alternatives:
  - its stronghold
  - its fortification
  lexicon: LSJ
  rationale: ὀχύρωμα denotes a fortified structure or strong defensive work. 'Fortress'
    is concise and natural.
- source_word: ἐνεπύρισεν κυκλόθεν
  chosen: he burned ... all around
  alternatives:
  - he set ... on fire all around
  - he burned ... round about
  lexicon: LSJ
  rationale: The verb means to burn or set on fire, and κυκλόθεν adds the sense 'all
    around/on every side.' The English preserves both elements.
