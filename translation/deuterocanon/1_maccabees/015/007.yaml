id: 1MA.15.7
reference: 1 Maccabees 15:7
source:
  edition: lxx-swete-1909
  text: Ἰερουσαλὴμ δὲ καὶ τὰ ἅγια εἶναι ἐλεύθερα· καὶ πάντα τὰ ὅπλα ὅσα κατεσκεύασας,
    καὶ τὰ ὀχυρώματα ἃ ᾠκοδόμησας, ὧν κρατεῖς, μενέτω σοι.
  language: Greek
  pages:
  - 680
  confidence: high
  validation: agree
translation:
  text: But Jerusalem and the holy places are to be free; and all the weapons that
    you have made, and the strongholds that you have built, which you hold, shall
    remain yours.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctuary' or 'the holy things' for 'the holy places' (τὰ ἅγια).
      The Greek plural can refer either to sacred precincts or to holy objects; the
      broader rendering fits the context of Jerusalem's freedom and possession rights.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  lexicon: LSJ
  rationale: Standard transliteration of the place name.
- source_word: τὰ ἅγια
  chosen: the holy places
  alternatives:
  - the sanctuary
  - the holy things
  lexicon: LSJ
  rationale: The neuter plural can denote sacred precincts or holy things. In this
    political-territorial context alongside Jerusalem being free, 'the holy places'
    best captures the likely reference to the temple precincts/sacred area without
    narrowing too specifically to a single building.
- source_word: ἐλεύθερα
  chosen: free
  alternatives:
  - exempt
  - independent
  lexicon: LSJ
  rationale: In context of royal concessions, the term indicates freedom from interference
    or obligation. 'Free' is the most direct and natural rendering.
- source_word: ὅπλα
  chosen: weapons
  alternatives:
  - arms
  lexicon: LSJ
  rationale: Refers to military equipment; 'weapons' is clear modern English.
- source_word: κατεσκεύασας
  chosen: have made
  alternatives:
  - have prepared
  - have equipped
  lexicon: LSJ
  rationale: Aorist verb meaning to make or prepare. 'Have made' is broad and fits
    the direct object 'weapons'.
- source_word: ὀχυρώματα
  chosen: strongholds
  alternatives:
  - fortresses
  - fortified places
  lexicon: LSJ
  rationale: Denotes fortified installations. 'Strongholds' preserves the military
    sense while reading smoothly in English.
- source_word: ᾠκοδόμησας
  chosen: have built
  alternatives:
  - have established
  lexicon: LSJ
  rationale: Straightforward rendering of the verb 'to build' in relation to fortified
    structures.
- source_word: ὧν κρατεῖς
  chosen: which you hold
  alternatives:
  - which you control
  - of which you are in possession
  lexicon: LSJ
  rationale: κρατέω here conveys holding or controlling these strongholds. 'Which
    you hold' is concise and close to the Greek.
- source_word: μενέτω σοι
  chosen: shall remain yours
  alternatives:
  - let it remain to you
  - shall remain for you
  lexicon: LSJ
  rationale: Singular verb with collective sense after neuter plural subjects; idiomatically
    this grants continued possession. 'Shall remain yours' expresses the legal-political
    force in natural English.
