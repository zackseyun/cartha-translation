id: 1MA.15.26
reference: 1 Maccabees 15:26
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέστειλεν αὐτῷ Σίμων διαχιλίους ἄνδρας ἐκλεκτοὺς συμμαχῆσαι αὐτῷ καὶ
    ἀργύριον καὶ χρυσίον καὶ σκεύη ἱκανά.
  language: Greek
  pages:
  - 681
  confidence: high
  validation: agree
translation:
  text: And Simon sent him two thousand chosen men to fight alongside him, and silver
    and gold and sufficient equipment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be his ally' / 'to assist him.' The Greek verb can denote allied
      support more broadly; the context here favors military assistance.
    reason: lexical_alternative
  - marker: b
    text: Or 'sufficient supplies.' The Greek says 'sufficient/e enough σκεύη,' a
      broad term that can refer to equipment, gear, or supplies depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard narrative verb for sending; 'sent' is natural modern English
    and sufficiently formal.
- source_word: διαχιλίους ἄνδρας
  chosen: two thousand men
  alternatives:
  - two thousand soldiers
  lexicon: LSJ
  rationale: The compound numeral with ἄνδρας straightforwardly denotes 'two thousand
    men.' 'Soldiers' is contextually plausible but not explicit, so 'men' is retained.
- source_word: ἐκλεκτούς
  chosen: chosen
  alternatives:
  - picked
  - select
  lexicon: LSJ
  rationale: Conveys that these men were selected or elite. 'Chosen' preserves the
    adjectival force without overinterpreting military status.
- source_word: συμμαχῆσαι
  chosen: to fight alongside him
  alternatives:
  - to be his ally
  - to assist him in war
  - to join in alliance with him
  lexicon: LSJ
  rationale: In this military context, the infinitive implies giving armed support
    rather than merely entering a formal alliance. 'Fight alongside him' makes the
    practical sense explicit while remaining anchored in the Greek.
- source_word: ἀργύριον
  chosen: silver
  alternatives:
  - money
  lexicon: LSJ
  rationale: The noun literally denotes silver; although it can function as money,
    the paired list with gold favors the more concrete rendering.
- source_word: χρυσίον
  chosen: gold
  lexicon: LSJ
  rationale: Direct lexical equivalent.
- source_word: σκεύη ἱκανά
  chosen: enough equipment
  alternatives:
  - sufficient supplies
  - adequate vessels
  - enough gear
  lexicon: LSJ
  rationale: σκεύη is broad ('equipment, gear, implements, vessels'). In a military-support
    context, 'equipment' best fits; ἱκανά means sufficient or enough. 'Supplies' is
    possible but less directly tied to σκεύη.
