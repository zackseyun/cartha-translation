id: 1MA.15.8
reference: 1 Maccabees 15:8
source:
  edition: lxx-swete-1909
  text: καὶ πᾶν ὀφείλημα βασιλικὸν καὶ τὰ ἐσόμενα βασιλικὰ, ἀπὸ τοῦ νῦν καὶ εἰς τὸν
    ἅπαντα χρόνον, ἀφέσθω σοι.
  language: Greek
  pages:
  - 680
  confidence: high
  validation: agree
translation:
  text: And let every royal debt, and the royal revenues yet to come, from now on
    and for all time, be remitted to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'future royal dues' or 'what will accrue to the king.' The Greek does
      not specify the exact category of income beyond its royal character and future
      accrual.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν
  chosen: every
  alternatives:
  - all
  lexicon: LSJ
  rationale: 'The distributive sense fits the singular noun ὀφείλημα: each item of
    royal indebtedness/revenue obligation is included.'
- source_word: ὀφείλημα
  chosen: debt
  alternatives:
  - what is owed
  - obligation
  - due
  lexicon: LSJ
  rationale: The core sense is something owed. 'Debt' is the most natural concise
    English equivalent here in a fiscal decree context.
- source_word: βασιλικὸν
  chosen: royal
  alternatives:
  - belonging to the king
  - of the crown
  lexicon: LSJ
  rationale: Adjectival modifier indicating what pertains to the king/royal treasury.
    'Royal' is idiomatic and preserves the governmental setting.
- source_word: τὰ ἐσόμενα βασιλικά
  chosen: the royal revenues yet to come
  alternatives:
  - future royal dues
  - what will become royal income
  - the coming royal taxes
  lexicon: LSJ
  rationale: The neuter plural with future participle points to future amounts accruing
    to the king. 'Revenues yet to come' captures prospective fiscal income without
    over-specifying a tax category not explicit in the Greek.
- source_word: ἀπὸ τοῦ νῦν
  chosen: from now on
  alternatives:
  - from the present time
  - henceforth
  lexicon: LSJ
  rationale: Idiomatic temporal phrase best rendered in contemporary English as 'from
    now on.'
- source_word: εἰς τὸν ἅπαντα χρόνον
  chosen: for all time
  alternatives:
  - for the whole time
  - forever
  - for all the time
  lexicon: LSJ
  rationale: The phrase denotes an ongoing, unrestricted duration. 'For all time'
    is natural English and preserves the decree's permanence.
- source_word: ἀφέσθω
  chosen: be remitted
  alternatives:
  - be forgiven
  - be released
  - be canceled
  lexicon: LSJ
  rationale: From ἀφίημι in a legal/fiscal context, the sense is cancellation or release
    of an obligation. 'Be remitted' fits financial language better than 'forgiven'
    and is slightly more formal than 'canceled,' matching the decree style.
- source_word: σοι
  chosen: to you
  alternatives:
  - for you
  lexicon: LSJ
  rationale: The dative marks the beneficiary of the remission; 'to you' is straightforward
    and preserves the direct address.
