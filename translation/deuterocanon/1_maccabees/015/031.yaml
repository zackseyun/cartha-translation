id: 1MA.15.31
reference: 1 Maccabees 15:31
source:
  edition: lxx-swete-1909
  text: εἰ δὲ μή, δότε ἀντʼ αὐτῶν πεντακόσια τάλαντα ἀργυρίου, καὶ τῆς καταφθορᾶς
    ἧς κατεφθάρατε καὶ τῶν φόρων τῶν πόλεων ἀλλὰ τάλαντα πεντακόσια· εἰ δὲ μή, παραγενόμενοι
    ἐκπολεμήσουσιν ὑμᾶς.
  language: Greek
  pages:
  - 681
  confidence: high
  validation: agree
translation:
  text: But if not, give five hundred talents of silver in place of them, and another
    five hundred talents for the destruction that you have caused and for the taxes
    of the cities. But if not, they will come and make war against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and for the destruction that you have caused and for the taxes
      of the cities, another five hundred talents.'' The syntax is compressed; this
      translation takes the final sum as an additional payment covering both the damage
      and the cities'' taxes/tribute.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the tribute of the cities' instead of 'the taxes of the cities.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ δὲ μή
  chosen: But if not
  alternatives:
  - But otherwise
  - If not
  lexicon: LSJ
  rationale: A straightforward conditional transition. Repeating it both times preserves
    the Greek's emphatic ultimatum structure.
- source_word: δότε
  chosen: give
  alternatives:
  - pay
  - hand over
  lexicon: LSJ
  rationale: The imperative broadly means 'give'; in this financial context 'pay'
    is possible, but 'give' stays closer to the Greek while remaining natural.
- source_word: ἀντʼ αὐτῶν
  chosen: in place of them
  alternatives:
  - instead of them
  - as compensation for them
  lexicon: LSJ
  rationale: ἀντί marks substitution or exchange. 'In place of them' preserves the
    compensatory sense without over-interpreting the referent beyond the immediate
    context.
- source_word: πεντακόσια τάλαντα ἀργυρίου
  chosen: five hundred talents of silver
  alternatives:
  - five hundred silver talents
  lexicon: LSJ
  rationale: This is the natural English rendering of the monetary amount while preserving
    the ancient unit 'talents'.
- source_word: τῆς καταφθορᾶς
  chosen: the destruction
  alternatives:
  - the damage
  - the devastation
  lexicon: LSJ
  rationale: The noun denotes ruin or destruction. 'Destruction' best matches the
    verbal cognate that follows and preserves the severity of the charge.
- source_word: ἧς κατεφθάρατε
  chosen: that you have caused
  alternatives:
  - which you destroyed
  - that you brought about
  lexicon: LSJ
  rationale: The cognate verb with the noun suggests causing ruin/destruction. 'That
    you have caused' yields idiomatic English and reflects responsibility for the
    damage rather than awkwardly saying 'the destruction which you destroyed.'
- source_word: τῶν φόρων τῶν πόλεων
  chosen: the taxes of the cities
  alternatives:
  - the tribute of the cities
  - the revenues of the cities
  lexicon: LSJ
  rationale: φόροι commonly refers to tribute or taxes. 'Taxes' is clear modern English;
    'tribute' is possible, but the phrase likely concerns financial exactions associated
    with the cities.
- source_word: ἀλλὰ τάλαντα πεντακόσια
  chosen: another five hundred talents
  alternatives:
  - but five hundred talents
  - five hundred talents besides
  lexicon: LSJ
  rationale: Although ἀλλά often means 'but,' in this compressed accounting demand
    it functions adverbially as an addition/contrast. 'Another five hundred talents'
    best conveys that a second sum is demanded.
- source_word: παραγενόμενοι
  chosen: they will come
  alternatives:
  - having arrived, they will
  - they will appear and
  lexicon: LSJ
  rationale: 'The participle preceding the finite verb is naturally rendered with
    an English finite verb for readability: ''they will come and...'' preserves the
    sequence of arrival followed by action.'
- source_word: ἐκπολεμήσουσιν ὑμᾶς
  chosen: make war against you
  alternatives:
  - fight against you
  - wage war against you
  lexicon: LSJ
  rationale: The compound verb intensifies hostile military action. 'Make war against
    you' is idiomatic and suitably formal for a royal threat.
