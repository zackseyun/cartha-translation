id: 1MA.15.40
reference: 1 Maccabees 15:40
source:
  edition: lxx-swete-1909
  text: καὶ παρεγενήθη Κενδεβαῖος εἰς Ἰαμνείαν, καὶ ἤρξατο τοῦ ἐρεθίζειν τὸν λαὸν
    καὶ ἐμβατεύειν εἰς τὴν Ἰουδαίαν καὶ αἰχμαλωτίζειν τὸν λαὸν καὶ φονεύειν.
  language: Greek
  pages:
  - 682
  confidence: high
  validation: agree
translation:
  text: And Cendebeus came to Jamnia, and began to provoke the people and to invade
    Judea and to take the people captive and to kill them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to enter into Judea'; the Greek verb can be rendered more literally,
      but the context suggests a hostile military incursion.
    reason: lexical_alternative
  - marker: b
    text: 'The final ''them'' is supplied in English from the repeated object implied
      by the Greek sequence: ''to take the people captive and to kill [them].'''
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεγενήθη
  chosen: came
  alternatives:
  - arrived
  - appeared
  lexicon: LSJ
  rationale: Aorist middle of παραγίνομαι here denotes arrival/presence at a place.
    'Came' is natural modern English and fits the narrative sequence.
- source_word: Κενδεβαῖος
  chosen: Cendebeus
  alternatives:
  - Kendebaios
  rationale: Personal names are transliterated by standard conventions. 'Cendebeus'
    is a conventional English transliteration for this Greek form.
- source_word: Ἰαμνείαν
  chosen: Jamnia
  alternatives:
  - Iamnia
  - Jamneia
  rationale: Place name transliterated in its conventional English form. 'Jamnia'
    is the standard recognizable rendering.
- source_word: ἤρξατο τοῦ ἐρεθίζειν
  chosen: began to provoke
  alternatives:
  - began stirring up
  - began harassing
  lexicon: LSJ
  rationale: The construction ἄρχομαι + infinitive means 'begin to.' ἐρεθίζω can mean
    provoke, irritate, stir up. 'Provoke' preserves the hostile incitement without
    over-specifying the manner.
- source_word: τὸν λαόν
  chosen: the people
  alternatives:
  - the populace
  lexicon: LSJ
  rationale: λαός commonly means 'people' in a collective sense. Here it likely refers
    to the Jewish population under attack; 'the people' preserves the collective force.
- source_word: ἐμβατεύειν εἰς τὴν Ἰουδαίαν
  chosen: to invade Judea
  alternatives:
  - to enter into Judea
  - to march into Judea
  lexicon: LSJ
  rationale: Although literally 'to go into/enter,' in this military context alongside
    captivity and killing, the sense is hostile incursion. 'Invade' captures the contextual
    force better than a flat 'enter.'
- source_word: αἰχμαλωτίζειν
  chosen: to take ... captive
  alternatives:
  - to capture
  - to carry off as captives
  lexicon: LSJ
  rationale: The verb specifically denotes taking persons captive in war. 'Take the
    people captive' is clear and preserves the military sense.
- source_word: φονεύειν
  chosen: to kill them
  alternatives:
  - to murder
  - to put them to death
  lexicon: LSJ
  rationale: The verb means kill/murder. Because the direct object is not repeated
    in Greek after αἰχμαλωτίζειν τὸν λαόν, English naturally supplies 'them.' 'Kill'
    is straightforward and avoids importing a legal nuance beyond the context.
