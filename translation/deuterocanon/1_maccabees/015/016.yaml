id: 1MA.15.16
reference: 1 Maccabees 15:16
source:
  edition: lxx-swete-1909
  text: Λεύκιος ὕπατος Ῥωμαίων Πτολεμαίῳ βασιλεῖ χαίρειν.
  language: Greek
  pages:
  - 680
  confidence: high
  validation: minor_mismatch
translation:
  text: Lucius, consul of the Romans, to King Ptolemy, greetings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has the conventional letter-opening formula 'to King Ptolemy, greetings.'
    reason: cultural_note
lexical_decisions:
- source_word: Λεύκιος
  chosen: Lucius
  lexicon: LSJ
  rationale: Proper personal name; transliterated by standard English convention rather
    than translated, in keeping with the project's policy for names.
- source_word: ὕπατος
  chosen: consul
  alternatives:
  - chief magistrate
  - proconsul
  lexicon: LSJ
  rationale: In Hellenistic Greek this term commonly renders the Roman office of consul.
    'Consul' is the historically precise and natural English equivalent here.
- source_word: Ῥωμαίων
  chosen: of the Romans
  alternatives:
  - Roman
  lexicon: LSJ
  rationale: The genitive plural is best represented explicitly as 'of the Romans,'
    modifying 'consul' and preserving the formal epistolary identification of office.
- source_word: Πτολεμαίῳ
  chosen: Ptolemy
  lexicon: LSJ
  rationale: Proper royal name in the dative, functioning as the addressee of the
    letter formula; transliterated in standard English form.
- source_word: βασιλεῖ
  chosen: King
  alternatives:
  - the king
  lexicon: LSJ
  rationale: Appositional title for Ptolemy in the dative. 'King' preserves the royal
    title directly and fits normal English epistolary style.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - hail
  lexicon: LSJ
  rationale: Standard Greek letter-opening infinitive meaning 'greetings' in epistolary
    convention. A literal 'rejoice' would be misleading in English; 'greetings' best
    captures the formula.
