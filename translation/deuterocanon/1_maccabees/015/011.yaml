id: 1MA.15.11
reference: 1 Maccabees 15:11
source:
  edition: lxx-swete-1909
  text: καὶ ἐδίωξεν αὐτὸν Ἀντίοχος ὁ βασιλεύς, καὶ ἦλθεν εἰς Δῶρα φεύγων τὴν ἐπὶ τὴν
    θάλασσαν.
  language: Greek
  pages:
  - 680
  confidence: high
  validation: agree
translation:
  text: And King Antiochus pursued him, and he came to Dora, fleeing to the seacoast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to Dora, fleeing to the place by the sea' or 'to the
      seacoast.' The Greek phrase emphasizes Dora's location on the sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίωξεν
  chosen: pursued
  alternatives:
  - chased
  - pressed after
  lexicon: BDAG
  rationale: The aorist of διώκω here denotes active pursuit in a military-political
    context. 'Pursued' is natural modern English and preserves the force without overinterpreting
    the manner.
- source_word: Ἀντίοχος ὁ βασιλεύς
  chosen: King Antiochus
  alternatives:
  - Antiochus the king
  lexicon: LSJ
  rationale: English idiom normally places the title before the name. This translates
    the title rather than leaving the Greek order woodenly intact.
- source_word: ἦλθεν εἰς Δῶρα
  chosen: he came to Dora
  alternatives:
  - he went to Dora
  - he arrived at Dora
  lexicon: LSJ
  rationale: ἔρχομαι commonly means 'come/go' depending on viewpoint. 'Came to Dora'
    is a straightforward rendering of the narrative movement into the city.
- source_word: φεύγων
  chosen: fleeing
  alternatives:
  - while fleeing
  - as he fled
  lexicon: BDAG
  rationale: The present participle expresses attendant circumstance or manner concurrent
    with the main verb. 'Fleeing' preserves the participial force compactly in English.
- source_word: τὴν ἐπὶ τὴν θάλασσαν
  chosen: to the coast
  alternatives:
  - to the seacoast
  - to the place by the sea
  - to the maritime region
  lexicon: LSJ
  rationale: The phrase literally points to the area 'upon/by the sea.' In idiomatic
    English, with Dora being a coastal city, 'to the coast' best captures the geographic
    sense without awkward literalism.
