id: 1MA.15.23
reference: 1 Maccabees 15:23
source:
  edition: lxx-swete-1909
  text: καὶ εἰς πάσας τὰς χώρας, καὶ Σαμψάμῃ, καὶ Σπαρτιάταις, καὶ εἰς Δῆλον καὶ εἰς
    Μίνδον καὶ εἰς Σικυῶνα καὶ εἰς τὴν Καρίδα καὶ εἰς Σάμον καὶ εἰς τὴν Παμφυλίαν
    καὶ Λυκίαν καὶ εἰς Ἁλικαρνασσὸν καὶ εἰς Κῶ καὶ εἰς Σίδην καὶ εἰς Ἄραδον καὶ εἰς
    Ῥόδον καὶ εἰς τὴν Φασηλίδα καὶ Γόρτυναν καὶ Κνίδον καὶ Κύπρον καὶ Κυρήνην.
  language: Greek
  pages:
  - 681
  confidence: high
  validation: agree
translation:
  text: and to all the regions, and to Sampsame, and to the Spartans, and to Delos
    and to Myndus and to Sicyon and to Caria and to Samos and to Pamphylia and Lycia
    and to Halicarnassus and to Cos and to Side and to Aradus and to Rhodes and to
    Phaselis and Gortyna and Cnidus and Cyprus and Cyrene.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some place names have alternate English spellings, such as Kos for Cos and
      Knidos for Cnidus.
    reason: lexical_alternative
  - marker: b
    text: The place name Sampsame is uncertain in English transliteration; the rendering
      follows the Greek form closely.
    reason: cultural_note
lexical_decisions:
- source_word: πάσας τὰς χώρας
  chosen: all the regions
  alternatives:
  - all the countries
  - all the territories
  - all the lands
  lexicon: LSJ
  rationale: χώρα can denote a region, territory, or country. In this context it introduces
    a list of recipient places and peoples, so 'regions' is broad and natural without
    implying modern nation-states.
- source_word: Σαμψάμῃ
  chosen: Sampsame
  alternatives:
  - Sampsame/Sampsama (uncertain place-name transliteration)
  lexicon: LSJ
  rationale: This is a proper name of a place in dative form. Following the project's
    policy, names are transliterated rather than translated. The exact English conventional
    form is uncertain, so a close transliteration from the Greek is retained.
- source_word: Σπαρτιάταις
  chosen: the Spartans
  alternatives:
  - Spartans
  lexicon: LSJ
  rationale: This is an ethnic plural referring to the people of Sparta, not merely
    the city. 'The Spartans' makes the personal/ethnic reference explicit in English.
- source_word: καὶ εἰς ...
  chosen: and to ...
  alternatives:
  - and into ...
  - and for ...
  lexicon: LSJ
  rationale: The repeated εἰς with place names functions idiomatically for destinations
    or recipients in a dispatch list. 'To' is the most natural English rendering in
    this administrative context.
- source_word: τὴν Καρίδα
  chosen: Caria
  alternatives:
  - the Caria region
  lexicon: LSJ
  rationale: The form refers to the region Caria. English idiom normally omits the
    article with regional names, so 'Caria' is preferred.
- source_word: τὴν Παμφυλίαν καὶ Λυκίαν
  chosen: Pamphylia and Lycia
  alternatives:
  - the Pamphylia region and Lycia
  lexicon: LSJ
  rationale: Both are regional names in a geographic list. English naturally renders
    them without articles.
- source_word: Κῶ
  chosen: Cos
  alternatives:
  - Kos
  lexicon: LSJ
  rationale: The island name is commonly rendered either 'Cos' or 'Kos' in English.
    'Cos' reflects a long-standing Anglicized form from Greek Κῶς; the alternative
    is preserved as a lexical alternative.
- source_word: Ἄραδον
  chosen: Aradus
  alternatives:
  - Arad
  lexicon: LSJ
  rationale: The Greek form points to the Hellenized city name Aradus; retaining that
    form best reflects the source text.
- source_word: τὴν Φασηλίδα
  chosen: Phaselis
  alternatives:
  - Phaselis
  lexicon: LSJ
  rationale: The accusative Greek form corresponds to the place name Phaselis in standard
    English transliteration.
- source_word: Κνίδον
  chosen: Cnidus
  alternatives:
  - Knidos
  lexicon: LSJ
  rationale: The Greek city name is commonly Anglicized as 'Cnidus'; 'Knidos' is a
    more direct transliteration. The chosen form is readable while remaining close
    to the source.
