id: 1MA.15.20
reference: 1 Maccabees 15:20
source:
  edition: lxx-swete-1909
  text: ἔδοξεν δὲ ἡμῖν δέξασθαι τὴν ἀσπίδα παρʼ αὐτῶν.
  language: Greek
  pages:
  - 681
  confidence: high
  validation: agree
translation:
  text: And it seemed good to us to receive the shield from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to accept the shield from them.' The Greek ἀσπίς can denote a shield
      generally; in this diplomatic context it may refer to an honorific gift, traditionally
      understood as a golden shield.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδοξεν
  chosen: it seemed good
  alternatives:
  - it seemed best
  - it was decided
  lexicon: BDAG
  rationale: The impersonal aorist of δοκέω commonly expresses what seemed good or
    fitting to a group. 'It seemed good' preserves the formal diplomatic tone better
    than the more interpretive 'it was decided.'
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - for us
  lexicon: BDAG
  rationale: Dative pronoun marking the party to whom the course of action seemed
    good. 'To us' is idiomatic with the chosen rendering of ἔδοξεν.
- source_word: δέξασθαι
  chosen: to receive
  alternatives:
  - to accept
  lexicon: BDAG
  rationale: The aorist middle infinitive of δέχομαι means to receive or accept. 'Receive'
    stays closer to the Greek and fits the formal register of a diplomatic letter.
- source_word: τὴν ἀσπίδα
  chosen: the shield
  alternatives:
  - the golden shield
  - the buckler
  lexicon: LSJ
  rationale: ἀσπίς normally means 'shield.' Although in this historical context it
    may refer to an honorific golden shield sent as a diplomatic gift, the Greek text
    here simply says 'the shield,' so the main text should not add 'golden' without
    explicit support in this verse.
- source_word: παρʼ αὐτῶν
  chosen: from them
  alternatives:
  - at their hands
  - from their side
  lexicon: BDAG
  rationale: παρά with the genitive indicates source or origin. 'From them' is the
    clearest natural English rendering.
