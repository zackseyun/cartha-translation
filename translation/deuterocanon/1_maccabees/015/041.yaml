id: 1MA.15.41
reference: 1 Maccabees 15:41
source:
  edition: lxx-swete-1909
  text: καὶ ᾠκοδόμησεν τὴν Κεδρὼν καὶ ἔταξεν ἐκεῖ ἵππεις καὶ δυνάμεις ὅπως ἐκπορευόμενοι
    ἐξοδεύωσιν τὰς ὁδοὺς τῆς Ἰουδαίας, καθὰ συνετέταξεν αὐτῷ ὁ βασιλεύς. XVI
  language: Greek
  pages:
  - 682
  confidence: high
  validation: agree
translation:
  text: And he fortified Kedron and stationed there cavalry and forces, so that by
    going out they might patrol the roads of Judea, just as the king had ordered him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'built up Kedron.' The Greek verb can mean 'built' more literally; 'fortified'
      is chosen here because the context is military and immediately mentions the
      stationing of troops.
    reason: lexical_alternative
  - marker: b
    text: Or 'horsemen' for 'cavalry.'
    reason: lexical_alternative
  - marker: c
    text: The verb rendered 'patrol' may also suggest moving along the roads to control,
      harass, or raid them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠκοδόμησεν
  chosen: fortified
  alternatives:
  - built
  - rebuilt
  lexicon: LSJ
  rationale: Although the verb literally means 'built' or 'built up,' in this military
    context with a place-name and subsequent stationing of troops, 'fortified' best
    conveys construction for defensive/strategic purposes without over-paraphrasing.
- source_word: τὴν Κεδρὼν
  chosen: Kedron
  alternatives:
  - Cedron
  lexicon: LSJ
  rationale: This is a place-name, so it is transliterated rather than translated.
    'Kedron' follows a straightforward transliteration of the Greek form Κεδρών.
- source_word: ἔταξεν
  chosen: stationed
  alternatives:
  - appointed
  - posted
  - arranged
  lexicon: BDAG
  rationale: In a military setting with cavalry and forces as the object, 'stationed'
    naturally expresses assigning troops to a location.
- source_word: ἵππεις
  chosen: cavalry
  alternatives:
  - horsemen
  lexicon: LSJ
  rationale: The plural noun denotes mounted troops. 'Cavalry' is idiomatic modern
    English and fits the military register.
- source_word: δυνάμεις
  chosen: forces
  alternatives:
  - troops
  - armed forces
  lexicon: LSJ
  rationale: A broad military term; 'forces' preserves the generality of the Greek
    without specifying unit type beyond what the text states.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is clear modern English and preserves the
    purposive force.
- source_word: ἐκπορευόμενοι
  chosen: by going out
  alternatives:
  - going out
  - sallying out
  lexicon: BDAG
  rationale: The participle explains the manner or circumstance of the patrol activity.
    'By going out' preserves the participial connection without sounding wooden. 'Sallying
    out' is possible but too interpretive.
- source_word: ἐξοδεύωσιν
  chosen: patrol
  alternatives:
  - make raids along
  - traverse
  - go through
  lexicon: LSJ
  rationale: Given the object 'the roads of Judea,' the sense is movement along routes
    for military control or harassment. 'Patrol' best captures this strategic use
    of roads while remaining concise and natural.
- source_word: τὰς ὁδοὺς τῆς Ἰουδαίας
  chosen: the roads of Judea
  alternatives:
  - the roads in Judea
  - the ways of Judea
  lexicon: LSJ
  rationale: A straightforward rendering of the phrase. 'Roads of Judea' is natural
    and preserves the geographic genitive.
- source_word: καθὰ συνετέταξεν αὐτῷ ὁ βασιλεύς
  chosen: just as the king had ordered him
  alternatives:
  - as the king had commanded him
  - just as the king instructed him
  lexicon: BDAG
  rationale: The verb conveys authoritative direction. 'Ordered' fits the royal-military
    context and reads naturally in English.
