id: 1MA.15.27
reference: 1 Maccabees 15:27
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἠβούλετο αὐτὰ δέξασθαι, ἀλλὰ ἠθέτησεν πάντα ὅσα συνέθετο αὐτῷ τὸ πρότερον,
    καὶ ἠλλοτριοῦτο αὐτῷ.
  language: Greek
  pages:
  - 681
  confidence: high
  validation: agree
translation:
  text: And he was not willing to accept them, but rejected everything that he had
    previously agreed to with him, and became estranged from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set aside' or 'nullified' everything he had previously agreed to with
      him.
    reason: lexical_alternative
  - marker: b
    text: Or 'became alienated from him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠβούλετο
  chosen: was willing
  alternatives:
  - wanted
  - was disposed
  lexicon: BDAG
  rationale: The imperfect middle of βούλομαι expresses ongoing disposition or willingness
    rather than a simple punctiliar act. 'Was willing' preserves that nuance in natural
    English.
- source_word: αὐτὰ
  chosen: them
  alternatives:
  - these things
  - it
  lexicon: BDAG
  rationale: The neuter plural pronoun refers back to previously mentioned proposals/gifts/terms
    in the context. 'Them' is the most natural English anaphoric rendering without
    over-specifying beyond the verse itself.
- source_word: δέξασθαι
  chosen: accept
  alternatives:
  - receive
  - take
  lexicon: BDAG
  rationale: '''Accept'' fits the context of refusing what had been sent or offered
    and reads more idiomatically here than the more wooden ''receive.'''
- source_word: ἠθέτησεν
  chosen: rejected
  alternatives:
  - set aside
  - nullified
  - broke
  lexicon: BDAG
  rationale: ἀθετέω can mean to set aside or invalidate. In this diplomatic-political
    context, 'rejected' communicates repudiation of prior arrangements without importing
    overly technical legal language.
- source_word: πάντα ὅσα συνέθετο
  chosen: everything that he had previously agreed to
  alternatives:
  - all that he had arranged before
  - all the terms he had made earlier
  - everything he had covenanted before
  lexicon: BDAG
  rationale: συντίθημι in the middle can denote making an agreement or arrangement.
    'Agreed to' best captures the relational and diplomatic sense in accessible English;
    'everything' renders πάντα comprehensively.
- source_word: τὸ πρότερον
  chosen: previously
  alternatives:
  - before
  - earlier
  lexicon: BDAG
  rationale: The adverbial accusative points to prior time. 'Previously' is concise
    and natural in modern English.
- source_word: ἠλλοτριοῦτο
  chosen: became estranged
  alternatives:
  - became alienated
  - turned hostile
  - withdrew himself as a stranger
  lexicon: LSJ
  rationale: The imperfect of ἀλλοτριόω/ἀλλοτριόομαι conveys becoming alienated or
    acting as a stranger. 'Became estranged' preserves the relational rupture without
    overstating it as open warfare.
- source_word: αὐτῷ
  chosen: from him
  alternatives:
  - toward him
  - to him
  lexicon: BDAG
  rationale: With a verb of alienation in English, 'from him' best expresses the broken
    relationship indicated by the dative in Greek.
