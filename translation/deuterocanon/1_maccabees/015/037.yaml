id: 1MA.15.37
reference: 1 Maccabees 15:37
source:
  edition: lxx-swete-1909
  text: Τρύφων δὲ ἐμβὰς εἰς πλοῖον ἔφυγεν εἰς Ὀρθωσίαν.
  language: Greek
  pages:
  - 682
  confidence: high
  validation: agree
translation:
  text: But Tryphon boarded a ship and fled to Orthosia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τρύφων
  chosen: Tryphon
  rationale: Proper name transliterated by standard English convention, following
    the project's policy to transliterate personal names rather than translate them.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: LSJ
  rationale: δέ here marks a mild narrative transition with slight contrast to the
    preceding action; 'But' preserves that turn more clearly than a simple 'And' in
    English.
- source_word: ἐμβὰς
  chosen: boarded
  alternatives:
  - having gone aboard
  - embarked on
  lexicon: LSJ
  rationale: Aorist participle of ἐμβαίνω, used with εἰς πλοῖον, means going aboard
    a vessel. 'Boarded' gives natural modern English while preserving the concrete
    action.
- source_word: εἰς πλοῖον
  chosen: a ship
  alternatives:
  - the ship
  - a boat
  - into a ship
  lexicon: LSJ
  rationale: The anarthrous phrase does not require definiteness in English. 'Ship'
    fits the historical setting and the likely scale better than 'boat.'
- source_word: ἔφυγεν
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: LSJ
  rationale: φεύγω commonly means 'flee' or 'escape.' 'Fled' best preserves the sense
    of hurried retreat in this military-political context.
- source_word: εἰς Ὀρθωσίαν
  chosen: to Orthosia
  alternatives:
  - into Orthosia
  rationale: εἰς with a place name is naturally rendered 'to' for motion toward a
    destination. 'Orthosia' is the standard transliteration of the place name.
