id: 1MA.15.4
reference: 1 Maccabees 15:4
source:
  edition: lxx-swete-1909
  text: βού- λομαι δὲ ἐκβῆναι κατὰ τὴν χώραν, ὅπως μετέλθω τοὺς κατεφθαρκότας τὴν
    χώραν ἡμῶν καὶ τοὺς ἠρημωκότας πόλεις πολλὰς ἐν τῇ βασιλείᾳ·
  language: Greek
  pages:
  - 679
  confidence: high
  validation: agree
translation:
  text: But I want to go out into the country, so that I may pursue those who have
    devastated our country and laid waste many cities in the kingdom;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout the land'; the Greek phrase κατὰ τὴν χώραν can denote movement
      through the territory more generally.
    reason: lexical_alternative
  - marker: b
    text: Or 'proceed against' or 'punish'; the verb μετέλθω can carry the sense of
      pursuing offenders with hostile intent.
    reason: lexical_alternative
lexical_decisions:
- source_word: βούλομαι
  chosen: I want
  alternatives:
  - I wish
  - I intend
  - I desire
  lexicon: LSJ
  rationale: Expresses personal will or intention. 'I want' is natural modern English
    and fits the direct royal statement without sounding overly formal.
- source_word: ἐκβῆναι
  chosen: to go out
  alternatives:
  - to march out
  - to set out
  lexicon: LSJ
  rationale: The infinitive literally means 'to go out.' In military-political context
    it can imply setting out on campaign, but the broader phrase is adequately conveyed
    by 'to go out,' with the following clause supplying purpose.
- source_word: κατὰ τὴν χώραν
  chosen: through the country
  alternatives:
  - through the land
  - against the country
  - throughout the region
  lexicon: LSJ
  rationale: With motion, κατά can mean 'through' or 'throughout.' Here it most naturally
    describes movement across the territory rather than hostility toward it. 'Country'
    also matches the repeated χώρα later in the verse.
- source_word: ὅπως μετέλθω
  chosen: so that I may pursue
  alternatives:
  - so that I may go after
  - so that I may punish
  lexicon: LSJ
  rationale: The purpose clause indicates intended action against offenders. μετέρχομαι
    can mean 'pursue' or 'proceed against'; 'pursue' preserves the active retaliatory
    sense without over-interpreting it as judicial punishment.
- source_word: τοὺς κατεφθαρκότας
  chosen: those who have ruined
  alternatives:
  - those who have corrupted
  - those who have devastated
  - those who have destroyed
  lexicon: LSJ
  rationale: Perfect participle of καταφθείρω denotes those responsible for bringing
    ruin. 'Ruined' fits the object 'our country' well and avoids overstating to total
    destruction.
- source_word: τὴν χώραν ἡμῶν
  chosen: our country
  alternatives:
  - our land
  - our region
  lexicon: LSJ
  rationale: χώρα commonly denotes land, territory, or country. 'Our country' is idiomatic
    in this royal-political context and preserves the possessive force.
- source_word: τοὺς ἠρημωκότας
  chosen: those who have laid waste
  alternatives:
  - those who have desolated
  - those who have made desolate
  lexicon: LSJ
  rationale: Perfect participle of ἐρημόω means to make desolate or lay waste. 'Laid
    waste' is clear, forceful English for devastation of cities.
- source_word: πόλεις πολλὰς
  chosen: many cities
  alternatives:
  - many towns
  lexicon: LSJ
  rationale: Straightforward rendering of the accusative object; 'cities' is the normal
    equivalent for πόλεις.
- source_word: ἐν τῇ βασιλείᾳ
  chosen: in the kingdom
  alternatives:
  - within the kingdom
  - in my kingdom
  lexicon: LSJ
  rationale: The Greek has the definite phrase 'in the kingdom' without an explicit
    possessive. Since the speaker is a king, 'my kingdom' is inferable, but the translation
    keeps the wording closer to the source.
