id: 1MA.15.22
reference: 1 Maccabees 15:22
source:
  edition: lxx-swete-1909
  text: καὶ ταῦτα ἔγραψεν Δημητρίῳ τῷ βασιλεῖ καὶ Ἀττάλῳ καὶ Ἀράθῃ καὶ Ἀρσάκῃ,
  language: Greek
  pages:
  - 681
  confidence: high
  validation: agree
translation:
  text: And he wrote these things to Demetrius the king, and to Attalus, and to Ariarathes,
    and to Arsaces,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Ἀράθῃ likely refers to Ariarathes; some might render the name more
      mechanically as 'Arathes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - also
  - then
  lexicon: LSJ
  rationale: Standard connective introducing continuation of the narrative/list. 'And'
    preserves the paratactic Greek style without over-interpreting sequence.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - the following things
  lexicon: LSJ
  rationale: Neuter plural demonstrative referring back to the contents just mentioned.
    'These things' is a natural formal rendering that preserves the plural.
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - sent in writing
  - addressed by letter
  lexicon: LSJ
  rationale: Aorist of γράφω, here simply indicating written communication. 'Wrote'
    is the most direct and idiomatic rendering.
- source_word: Δημητρίῳ
  chosen: Demetrius
  rationale: Standard English transliteration of the proper name Δημήτριος in dative
    case after 'wrote ... to.'
- source_word: τῷ βασιλεῖ
  chosen: the king
  alternatives:
  - King
  lexicon: LSJ
  rationale: 'The article plus noun functions appositionally with Demetrius: ''Demetrius
    the king.'' Lowercase ''king'' fits English style for a descriptive title rather
    than a direct address.'
- source_word: Ἀττάλῳ
  chosen: Attalus
  rationale: Standard transliteration of the proper name in dative case.
- source_word: Ἀράθῃ
  chosen: Ariarathes
  alternatives:
  - Arathes
  rationale: Although Swete prints Ἀράθῃ, the historical royal name conventionally
    represented here is Ariarathes. This English form best identifies the referent
    for readers while remaining a transliteration choice anchored to the Greek witness.
- source_word: Ἀρσάκῃ
  chosen: Arsaces
  alternatives:
  - Arsakes
  rationale: Standard Anglicized transliteration of the royal name Ἀρσάκης/Ἀρσάκης-form
    in dative spelling here. 'Arsaces' is the conventional English historical form.
