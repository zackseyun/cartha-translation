theological_decisions:
- issue: Rendering the political-ethnic term Ἰουδαίων
  chosen_reading: Jews
  alternative_readings:
  - Judeans
  rationale: The term can denote either ethnic-religious Jews or inhabitants/people
    of Judea depending on context. Here, in a royal letter addressed both to Simon
    and to the broader ἔθνος, 'Jews' best captures the collective people-group sense
    without restricting it merely to geography. The alternative remains viable and
    is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
- issue: How idiomatic to make the document-introduction formula
  chosen_reading: kept relatively close to the Greek ('they were containing this form')
  alternative_readings:
  - 'fully idiomatic English: ''they read as follows'''
  rationale: This is not a doctrinal issue in the narrow sense, but it affects transparency.
    The draft favors a more formally transparent rendering so readers can see the
    underlying Greek structure, while preserving the idiomatic alternative in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence.'
