id: 1MA.15.2
reference: 1 Maccabees 15:2
source:
  edition: lxx-swete-1909
  text: καὶ ἦσαν περιέχουσαι τὸν τρόπον τοῦτον Βασιλεὺς Ἀντίοχος Σίμωνι ἱερεῖ μεγάλῳ
    καὶ ἐθνάρχῃ καὶ ἔθνει Ἰουδαίων χαίρειν.
  language: Greek
  pages:
  - 679
  confidence: high
  validation: agree
translation:
  text: 'And they were containing this form: “King Antiochus to Simon the high priest
    and ethnarch, and to the nation of the Jews, greetings.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, “they read as follows.”
    reason: lexical_alternative
  - marker: b
    text: Or “the nation of the Judeans.” The Greek Ἰουδαίων can refer either to Jews
      as a people or to Judeans in a more geographic sense.
    reason: alternative_reading
lexical_decisions:
- source_word: ἦσαν περιέχουσαι
  chosen: they were containing
  alternatives:
  - they contained
  - their contents were
  - they read as follows
  lexicon: LSJ
  rationale: The participial phrase refers to the letters/documents mentioned in the
    surrounding context and literally means 'were containing.' For transparent auditability,
    the draft keeps the underlying imagery rather than fully idiomatizing it as 'read
    as follows,' though that is a natural English alternative.
- source_word: τὸν τρόπον τοῦτον
  chosen: this form
  alternatives:
  - this manner
  - the following wording
  - as follows
  lexicon: LSJ
  rationale: τρόπος here refers to the manner or form of the document's wording. 'This
    form' preserves the documentary sense with relatively natural English, while still
    reflecting the Greek more closely than a freer 'as follows.'
- source_word: ἱερεῖ μεγάλῳ
  chosen: the high priest
  alternatives:
  - great priest
  lexicon: LSJ
  rationale: The standard sense in Jewish and Hellenistic usage is the office 'high
    priest.' 'Great priest' would be overly literal and unnatural in English.
- source_word: ἐθνάρχῃ
  chosen: ethnarch
  alternatives:
  - ruler of the nation
  - national leader
  lexicon: LSJ
  rationale: The Greek title is specific and historically loaded. Retaining 'ethnarch'
    preserves the formal title and avoids flattening it into a generic political description.
- source_word: ἔθνει Ἰουδαίων
  chosen: the nation of the Jews
  alternatives:
  - the Jewish nation
  - the people of the Jews
  - the nation of Judeans
  lexicon: LSJ
  rationale: ἔθνος denotes a people/nation. 'Nation of the Jews' is a close rendering
    of the genitival construction. 'Judeans' is possible in some contexts, but in
    1 Maccabees this phrase commonly denotes the Jewish people more broadly, so 'Jews'
    is retained.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - greeting
  lexicon: LSJ
  rationale: In epistolary formulae χαίρειν functions as a conventional salutation.
    'Greetings' is the natural English equivalent.
