id: 1MA.15.38
reference: 1 Maccabees 15:38
source:
  edition: lxx-swete-1909
  text: καὶ κατέστησεν ὁ βασιλεὺς τὸν Κενδεβαῖον ἐπιστράτηγον τῆς παραλίας, καὶ δυνάμεις
    πεζικὰς καὶ ἱππικὰς ἔδωκεν αὐτῷ.
  language: Greek
  pages:
  - 682
  confidence: high
  validation: agree
translation:
  text: And the king appointed Cendebaeus commander of the coastal region, and gave
    him infantry and cavalry forces.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατέστησεν
  chosen: appointed
  alternatives:
  - set up
  - installed
  - put in charge
  lexicon: BDAG
  rationale: In administrative context with a direct object and office, the verb denotes
    appointing someone to a position rather than merely causing to stand. 'Appointed'
    is natural modern English and preserves the official action.
- source_word: Κενδεβαῖον
  chosen: Cendebaeus
  alternatives:
  - Kendebaios (transliteration closer to Greek)
  rationale: Personal names are transliterated by standard English conventions. 'Cendebaeus'
    is a conventional and recognizable rendering of the Greek name.
- source_word: ἐπιστράτηγον
  chosen: commander
  alternatives:
  - general
  - military governor
  lexicon: LSJ
  rationale: The term denotes a military official set over a region. 'Commander' preserves
    the military sense without over-specifying a constitutional office. 'Military
    governor' may be too interpretive; 'general' may underrepresent the regional charge.
- source_word: τῆς παραλίας
  chosen: of the coastal region
  alternatives:
  - of the coast
  - of the seacoast
  lexicon: LSJ
  rationale: παραλία refers to the coast/coastal district. Because the genitive depends
    on an office title, 'of the coastal region' communicates a territorial jurisdiction
    more clearly than the bare 'of the coast.'
- source_word: δυνάμεις
  chosen: forces
  alternatives:
  - troops
  - military forces
  lexicon: BDAG
  rationale: Here the word refers to military units/resources. 'Forces' is concise
    and fits the following specification of infantry and cavalry.
- source_word: πεζικὰς
  chosen: infantry
  alternatives:
  - foot soldiers
  - foot troops
  lexicon: LSJ
  rationale: The adjective modifies military forces and contrasts with cavalry. 'Infantry'
    is the standard English military equivalent.
- source_word: ἱππικὰς
  chosen: cavalry
  alternatives:
  - horsemen
  - mounted troops
  lexicon: LSJ
  rationale: The adjective denotes mounted military forces. 'Cavalry' is the standard
    concise equivalent and pairs naturally with 'infantry'.
- source_word: ἔδωκεν αὐτῷ
  chosen: gave him
  alternatives:
  - assigned to him
  - provided him with
  lexicon: BDAG
  rationale: The simple verb 'gave' is fully warranted by the Greek and avoids unnecessary
    paraphrase. The military object already clarifies the nature of what was given.
