id: 1MA.15.12
reference: 1 Maccabees 15:12
source:
  edition: lxx-swete-1909
  text: ᾔδει γὰρ ὅτι ἐπισυνῆκται ἐπʼ αὐτὸν κακά, καὶ ἀφῆκαν αὐτὸν αἱ δυνάμεις.
  language: Greek
  pages:
  - 680
  confidence: high
  validation: agree
translation:
  text: For he knew that troubles had massed against him, and the forces had abandoned
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamities had gathered against him.' The Greek verb suggests hostile
      forces or troubles having assembled in a concentrated way.
    reason: lexical_alternative
  - marker: b
    text: Or 'the troops had left him.' The Greek 'the forces' is a military term
      and likely refers to his armed support.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾔδει
  chosen: he knew
  alternatives:
  - he had known
  - he realized
  lexicon: LSJ
  rationale: Imperfect/pluperfect form of οἶδα commonly functions as a past stative,
    best rendered simply as 'he knew' in natural English.
- source_word: ἐπισυνῆκται
  chosen: had massed
  alternatives:
  - had gathered
  - had come together
  lexicon: LSJ
  rationale: Perfect middle/passive of ἐπισυνάγω conveys a completed state of things
    gathered together against him. 'Had massed' preserves the hostile concentration
    implied by the prepositional phrase better than the more neutral 'had gathered'.
- source_word: ἐπʼ αὐτόν
  chosen: against him
  alternatives:
  - upon him
  - to him
  lexicon: LSJ
  rationale: With hostile κακά and a verb of gathering, ἐπί with accusative is best
    expressed idiomatically as 'against him' rather than the more wooden 'upon him'.
- source_word: κακά
  chosen: troubles
  alternatives:
  - evils
  - calamities
  - disasters
  lexicon: LSJ
  rationale: κακά here denotes adverse circumstances rather than moral evil. 'Troubles'
    is readable modern English and broad enough to include the military-political
    distress in context.
- source_word: ἀφῆκαν
  chosen: had abandoned
  alternatives:
  - left
  - forsook
  lexicon: LSJ
  rationale: The aorist of ἀφίημι here means to leave behind or desert. 'Had abandoned'
    brings out the sense that his support had failed him, stronger than the bare 'left'.
- source_word: αἱ δυνάμεις
  chosen: the forces
  alternatives:
  - the troops
  - the armies
  - his forces
  lexicon: LSJ
  rationale: δυνάμεις in military narrative commonly refers to armed forces or troops.
    'The forces' is sufficiently literal while fitting the context; 'his forces' is
    interpretive because the possessive is not explicit in Greek, though context implies
    they were his.
