theological_decisions:
- issue: Rendering the political title ἐθνάρχης
  chosen_reading: ethnarch
  alternative_readings:
  - ruler of the nation
  - governor
  rationale: This is not primarily a theological issue, but it bears on how Simon's
    office is understood. Preserving the title avoids importing a more specific constitutional
    model than the Greek states and keeps the historical-political nuance visible.
