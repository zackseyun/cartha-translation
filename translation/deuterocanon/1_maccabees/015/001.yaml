id: 1MA.15.1
reference: 1 Maccabees 15:1
source:
  edition: lxx-swete-1909
  text: Καὶ ἀπέστειλεν Ἀντίοχος υἱὸς Δημητρίου τοῦ βασιλέως ἐπι- XV στολὰς ἀπὸ τῶν
    νήσων τῆς θαλάσσης Σίμωνι ἱερεῖ καὶ ἐθνάρχῃ τῶν Ἰουδαίων καὶ παντὶ τῷ ἔθνει.
  language: Greek
  pages:
  - 679
  confidence: high
  validation: agree
translation:
  text: And Antiochus son of King Demetrius sent letters from the islands of the sea
    to Simon, priest and ethnarch of the Jews, and to all the nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of Judeans' for 'of the Jews'; the Greek term can denote the Jewish
      people in either an ethnic-religious or regional-political sense depending on
      context.
    reason: lexical_alternative
  - marker: b
    text: '''Ethnarch'' is a formal title meaning a ruler or leader of a people-group
      or nation.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  - sent off
  lexicon: BDAG
  rationale: Standard aorist of ἀποστέλλω meaning to send; 'sent' is natural modern
    English and fits the object 'letters'.
- source_word: ἐπιστολάς
  chosen: letters
  alternatives:
  - a letter
  - written messages
  - epistles
  lexicon: BDAG
  rationale: Plural accusative clearly indicates multiple written communications.
    'Letters' is idiomatic and avoids the archaic/churchly feel of 'epistles'.
- source_word: ἀπὸ τῶν νήσων τῆς θαλάσσης
  chosen: from the islands of the sea
  alternatives:
  - from the sea islands
  - from the islands in the sea
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the geographic expression of the
    Greek. 'Of the sea' sounds natural enough in English and reflects the genitival
    construction without over-interpreting which islands are meant.
- source_word: ἱερεῖ
  chosen: priest
  alternatives:
  - the priest
  lexicon: BDAG
  rationale: Dative in apposition to Simon. The Greek lacks the article here, so 'priest'
    rather than 'the priest' best matches the source while remaining clear.
- source_word: ἐθνάρχῃ
  chosen: ethnarch
  alternatives:
  - ruler of the nation
  - national leader
  - governor
  lexicon: BDAG
  rationale: This is a specific political title. Translating it as 'ruler of the nation'
    would explain but flatten the formal designation. 'Ethnarch' preserves the historical
    title transparently enough in English.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of Judeans
  lexicon: BDAG
  rationale: In 1 Maccabees this term can denote the Jewish people ethnically and
    politically. Here, because Simon is addressed as leader of the people broadly
    and the following phrase mentions 'all the nation,' 'Jews' is the more straightforward
    English rendering, while 'Judeans' remains a viable alternative in some contexts.
- source_word: παντὶ τῷ ἔθνει
  chosen: all the nation
  alternatives:
  - the whole nation
  - all the people
  lexicon: BDAG
  rationale: The dative coordinates with Simon as an additional recipient. 'All the
    nation' stays close to the Greek and preserves the corporate-political sense of
    ἔθνος here, not merely 'people' in a generic sense.
- source_word: τοῦ βασιλέως
  chosen: King
  alternatives:
  - the king
  lexicon: BDAG
  rationale: In the phrase 'son of King Demetrius,' English idiom commonly omits the
    article before a royal title used attributively with a proper name. This preserves
    the sense without awkwardness.
