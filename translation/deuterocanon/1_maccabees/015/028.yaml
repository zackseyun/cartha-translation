id: 1MA.15.28
reference: 1 Maccabees 15:28
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέστειλεν πρὸς αὐτὸν Ἀθηνόβιον ἕνα τῶν φίλων αὐτοῦ κοινολογησόμενον αὐτῷ,
    λέγων Ὑμεῖς κατακρατεῖτε τῆς Ἰόππης καὶ Γαζάρων καὶ τῆς ἄκρας ἐν Ἰερουσαλήμ, πόλεις
    τῆς βασιλείας μου.
  language: Greek
  pages:
  - 681
  confidence: high
  validation: agree
translation:
  text: And he sent to him Athenobius, one of his Friends, to speak with him, saying,
    “You are holding Joppa and Gazara and the citadel in Jerusalem, cities of my kingdom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Acra in Jerusalem.” The Greek word means “citadel” or “fortress,”
      but it can also function here as the established name of Jerusalem’s Seleucid
      stronghold.
    reason: lexical_alternative
  - marker: b
    text: Gazara is the Greek place-name form; the site is commonly identified with
      Gezer.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard narrative verb for sending; 'sent' is natural modern English
    and sufficiently formal.
- source_word: Ἀθηνόβιον
  chosen: Athenobius
  rationale: Personal names are transliterated by project philosophy.
- source_word: ἕνα τῶν φίλων αὐτοῦ
  chosen: one of his Friends
  alternatives:
  - one of his friends
  lexicon: LSJ
  rationale: In Hellenistic royal context, 'Friends' can function as a court title
    rather than a merely personal description. Capitalizing preserves that likely
    official nuance without overtranslating.
- source_word: κοινολογησόμενον αὐτῷ
  chosen: to speak with him
  alternatives:
  - to confer with him
  - to negotiate with him
  lexicon: LSJ
  rationale: The participle indicates engaging him in discussion. 'Speak with him'
    is broad and contextually appropriate; 'negotiate' would be too specific, while
    'confer' is slightly stiffer English.
- source_word: κατακρατεῖτε
  chosen: are holding
  alternatives:
  - are occupying
  - are seizing control of
  - are in possession of
  lexicon: LSJ
  rationale: The verb conveys exercising control or holding fast. 'Are holding' preserves
    the accusatory force without adding a stronger military nuance than the Greek
    requires.
- source_word: Ἰόππης
  chosen: Joppa
  alternatives:
  - Joppe
  rationale: Standard English transliteration of the place name.
- source_word: Γαζάρων
  chosen: Gazara
  alternatives:
  - Gezer
  rationale: The Greek form points to 'Gazara'; this keeps the translation anchored
    to the Greek witness. 'Gezer' is the more familiar Hebrew-related form, but it
    is not the form represented in the source text.
- source_word: ἄκρας
  chosen: the citadel
  alternatives:
  - the Acra
  - the fortress
  lexicon: LSJ
  rationale: The common noun sense is 'citadel/fortress.' 'The citadel' is clear modern
    English; the historically specific transliteration 'Acra' is worth preserving
    in a footnote as an alternative.
- source_word: πόλεις τῆς βασιλείας μου
  chosen: cities of my kingdom
  alternatives:
  - cities belonging to my kingdom
  - cities of my realm
  lexicon: LSJ
  rationale: A straightforward rendering of the genitive construction. 'Kingdom' is
    the most direct equivalent for βασιλεία here.
