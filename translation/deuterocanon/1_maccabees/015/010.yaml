id: 1MA.15.10
reference: 1 Maccabees 15:10
source:
  edition: lxx-swete-1909
  text: Ἔτους τετάρτου καὶ ἑβδομηκοστοῦ καὶ ἑκατοστοῦ ἐξῆλθεν Ἀντίοχος εἰς τὴν γῆν
    τῶν πατέρων αὐτοῦ, καὶ συνῆλθον πρὸς αὐτὸν πᾶσαι αἱ δυνάμεις, ὥστε ὀλίγους εἶναι
    σὺν Τρύφωνι.
  language: Greek
  pages:
  - 680
  confidence: high
  validation: agree
translation:
  text: In the one hundred seventy-fourth year, Antiochus went out into the land of
    his fathers, and all the forces gathered to him, so that only a few were left
    with Tryphon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that few were with Tryphon.' The Greek states the result tersely;
      'were left with' makes the implied sense explicit in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτους τετάρτου καὶ ἑβδομηκοστοῦ καὶ ἑκατοστοῦ
  chosen: In the one hundred seventy-fourth year
  alternatives:
  - In year one hundred and seventy-four
  - In the 174th year
  lexicon: LSJ
  rationale: The genitive absolute-like dating formula is idiomatically rendered in
    English as a temporal phrase. 'One hundred seventy-fourth year' preserves the
    Seleucid-era dating without adding interpretive material.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - set out
  - marched out
  - came out
  lexicon: LSJ
  rationale: The verb literally means 'went out.' In this military-historical context
    it can imply setting out or marching, but 'went out' best preserves the source
    wording without over-specifying military nuance not explicit in the verb itself.
- source_word: εἰς τὴν γῆν τῶν πατέρων αὐτοῦ
  chosen: into the land of his fathers
  alternatives:
  - to the land of his fathers
  - into his ancestral land
  - into the land of his ancestors
  lexicon: LSJ
  rationale: γῆ is 'land,' and τῶν πατέρων αὐτοῦ is literally 'of his fathers.' 'Land
    of his fathers' is a natural yet transparent rendering that preserves the ancestral
    sense without paraphrasing.
- source_word: συνῆλθον πρὸς αὐτόν
  chosen: gathered to him
  alternatives:
  - came together to him
  - joined him
  - assembled around him
  lexicon: LSJ
  rationale: συνέρχομαι with πρός here conveys coming together in support of Antiochus.
    'Gathered to him' is idiomatic English that retains the movement and alignment
    implied by the Greek.
- source_word: πᾶσαι αἱ δυνάμεις
  chosen: all the forces
  alternatives:
  - all the troops
  - all the armies
  - all the military forces
  lexicon: LSJ
  rationale: δυνάμεις in military narrative commonly refers to forces or troops. 'Forces'
    is broad enough to preserve the Greek while fitting the context of military support.
- source_word: ὥστε ὀλίγους εἶναι σὺν Τρύφωνι
  chosen: so that only a few were left with Tryphon
  alternatives:
  - with the result that few were with Tryphon
  - so that there were few with Tryphon
  lexicon: LSJ
  rationale: ὥστε introduces result. The infinitive construction expresses the outcome
    that only a small number remained aligned with Tryphon. 'Were left with Tryphon'
    makes the implied result clear in natural English without adding a new claim beyond
    the context.
