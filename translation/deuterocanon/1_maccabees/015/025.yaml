id: 1MA.15.25
reference: 1 Maccabees 15:25
source:
  edition: lxx-swete-1909
  text: Ἀντίοχος δὲ ὁ βασιλεὺς παρενέβαλεν ἐπὶ Δωρὰ ἐν τῇ δευτέρᾳ, προσάγων διὰ παντὸς
    αὐτῇ τὰς χεῖρας καὶ μηχανὰς ποιούμενος, καὶ συνέκλεισεν τὸν Τρύφωνα τοῦ εἰσπορεύεσθαι
    καὶ ἐκπορεύεσθαι.
  language: Greek
  pages:
  - 681
  confidence: high
  validation: minor_mismatch
translation:
  text: But King Antiochus encamped against Dora a second time, continually bringing
    his forces against it and constructing siege engines, and he shut Tryphon in so
    that he could neither go in nor go out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'continually bringing hands against it,' an idiom for
      sustained assault or pressure during a siege.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'a second time' could be understood differently if taken
      more mechanically, but in this military context it most naturally indicates
      repeated action.
    reason: alternative_reading
lexical_decisions:
- source_word: παρενέβαλεν ἐπὶ Δωρὰ
  chosen: encamped against Dora
  alternatives:
  - camped at Dora
  - marched against Dora
  lexicon: LSJ
  rationale: παρεμβάλλω in military context commonly means to encamp or set camp against
    a place. The preposition ἐπί with the city name gives hostile direction, so 'encamped
    against' preserves the siege setting better than the more neutral 'camped at'.
- source_word: ἐν τῇ δευτέρᾳ
  chosen: a second time
  alternatives:
  - on the second day
  - in the second position
  lexicon: LSJ
  rationale: In context of repeated military action, the phrase is best taken adverbially
    as a second approach/assault rather than a calendar note. 'A second time' is idiomatic
    English and fits the narrative flow.
- source_word: προσάγων διὰ παντὸς αὐτῇ τὰς χεῖρας
  chosen: continually bringing his forces against it
  alternatives:
  - continually applying his hands to it
  - continually pressing the attack against it
  lexicon: LSJ
  rationale: The literal 'bringing hands' is an idiom for active assault or pressure
    in siege warfare. 'Forces' makes explicit the military sense without over-paraphrasing,
    while διὰ παντός is captured by 'continually.'
- source_word: μηχανὰς ποιούμενος
  chosen: constructing siege engines
  alternatives:
  - making machines
  - preparing siege devices
  lexicon: LSJ
  rationale: μηχαναί in this context are military engines used in siege operations.
    'Siege engines' is the clearest modern equivalent and avoids the overly vague
    'machines.'
- source_word: συνέκλεισεν
  chosen: he shut Tryphon in
  alternatives:
  - he confined Tryphon
  - he hemmed in Tryphon
  lexicon: LSJ
  rationale: The verb conveys enclosing or shutting in. 'Shut ... in' is vivid, natural
    English and prepares for the following infinitives of movement.
- source_word: τοῦ εἰσπορεύεσθαι καὶ ἐκπορεύεσθαι
  chosen: so that he could neither go in nor go out
  alternatives:
  - from entering and going out
  - from coming in and going out
  lexicon: LSJ
  rationale: This genitive articular infinitive construction expresses result or effective
    prevention. 'So that he could neither go in nor go out' communicates the total
    blockade in idiomatic English.
