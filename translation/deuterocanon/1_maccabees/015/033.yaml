theological_decisions:
- issue: Rendering the ancestral claim without importing covenantal-nationalist interpretation
    beyond the text
  chosen_reading: but only the inheritance of our fathers
  alternative_readings:
  - but rather our ancestral inheritance
  rationale: The Greek asserts a claim to inherited patrimony, not an expanded theological
    argument. The translation preserves the text's own justification without adding
    explanatory language.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gender-accurate rendering of πατέρων
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The source is explicitly masculine plural and refers to forefathers.
    Per doctrine, gender-accurate wording is preferred over neutralizing unless context
    demands otherwise.
  doctrine_reference: Translation philosophy §4
