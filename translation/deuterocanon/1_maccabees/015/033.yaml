id: 1MA.15.33
reference: 1 Maccabees 15:33
source:
  edition: lxx-swete-1909
  text: καὶ ἀποκριθεὶς Σίμων εἶπεν αὐτῷ Οὔτε γῆν ἀλλοτρίαν εἴλημμεν, οὔτε ἀλλοτρίων
    κεκρατήκαμεν, ἀλλὰ τῆς κληρονομίας τῶν πατέρων ἡμῶν· ὑπὸ δὲ ἐχθρῶν ἡμῶν ἀκρίτως
    ἐν τινι καιρῷ κατεκρατήθη.
  language: Greek
  pages:
  - 682
  confidence: high
  validation: agree
translation:
  text: And Simon answered and said to him, “We have neither taken foreign land nor
    seized what belongs to foreigners, but only the inheritance of our fathers, which
    for a time was unjustly taken over by our enemies.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “another’s land” for “foreign land”; the Greek emphasizes land belonging
      to others.
    reason: lexical_alternative
  - marker: b
    text: Or “was arbitrarily taken” or “was taken without due process”; the Greek
      adverb can stress lack of proper judgment as well as injustice.
    reason: lexical_alternative
lexical_decisions:
- source_word: γῆν ἀλλοτρίαν
  chosen: foreign land
  alternatives:
  - another's land
  - land belonging to others
  lexicon: LSJ
  rationale: ἀλλότριος commonly means belonging to another, чужой/foreign. 'Foreign
    land' is concise and natural, while still conveying land not rightfully theirs.
- source_word: εἴλημμεν
  chosen: have taken
  alternatives:
  - have received
  - have appropriated
  lexicon: LSJ
  rationale: λαμβάνω here in the perfect indicates possession resulting from taking.
    'Have taken' fits the denial of unlawful acquisition.
- source_word: ἀλλοτρίων
  chosen: what belongs to foreigners
  alternatives:
  - others' property
  - what belongs to others
  lexicon: LSJ
  rationale: The genitive plural with κεκρατήκαμεν is broader than land alone and
    refers to possessions/holdings of others. 'What belongs to foreigners' keeps the
    parallel with the previous clause's ἀλλοτρίαν while making the ellipsis explicit
    in English.
- source_word: κεκρατήκαμεν
  chosen: seized
  alternatives:
  - held fast to
  - occupied
  - taken possession of
  lexicon: LSJ
  rationale: κρατέω can mean hold, control, or seize. In this political-territorial
    context, 'seized' best matches Simon's denial of wrongful domination.
- source_word: κληρονομίας τῶν πατέρων ἡμῶν
  chosen: the inheritance of our fathers
  alternatives:
  - our ancestral inheritance
  - the heritage of our fathers
  lexicon: LSJ
  rationale: κληρονομία denotes inherited possession. 'The inheritance of our fathers'
    preserves the familial and covenantal resonance without overinterpreting.
- source_word: ἀκρίτως
  chosen: unjustly
  alternatives:
  - without due process
  - arbitrarily
  - wrongfully
  lexicon: LSJ
  rationale: ἀκρίτως literally suggests without judgment or without proper examination.
    In context, the sense is that the seizure lacked justice or legal right; 'unjustly'
    is the clearest idiomatic rendering.
- source_word: ἐν τινι καιρῷ
  chosen: for a time
  alternatives:
  - at one time
  - at a certain time
  lexicon: LSJ
  rationale: The phrase is temporally indefinite. 'For a time' reads naturally in
    English and conveys a past period during which the enemies held it.
- source_word: κατεκρατήθη
  chosen: was taken over
  alternatives:
  - was occupied
  - was seized
  - was held in subjection
  lexicon: LSJ
  rationale: The passive of κατακρατέω indicates being overpowered or occupied. 'Was
    taken over' is natural modern English and fits the territorial context.
