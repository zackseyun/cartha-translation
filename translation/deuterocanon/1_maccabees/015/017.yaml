id: 1MA.15.17
reference: 1 Maccabees 15:17
source:
  edition: lxx-swete-1909
  text: οἱ πρεσβευταὶ τῶν Ἰουδαίων ἦλθαν πρὸς ἡμᾶς φίλοι ἡμῶν καὶ σύμμαχοι, ἀνανεούμενοι
    τὴν ἐξ ἀρχῆς φιλίαν καὶ συμμαχίαν, ἀπεσταλμένοι ἀπὸ Σιμωνος τοῦ ἀρχιερέως καὶ
    τοῦ δήμου τῶν Ἰουδαίων·
  language: Greek
  pages:
  - 680
  confidence: high
  validation: agree
translation:
  text: The envoys of the Jews came to us as our friends and allies, renewing the
    friendship and alliance from the beginning, having been sent from Simon the high
    priest and from the people of the Jews;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ambassadors' for 'envoys'; the Greek term denotes official diplomatic
      representatives.
    reason: lexical_alternative
  - marker: b
    text: '''The people of the Jews'' could also be rendered ''the nation of the Jews''
      or ''the assembly of the Jews,'' since the Greek word can denote the people
      as a civic body.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρεσβευταὶ
  chosen: envoys
  alternatives:
  - ambassadors
  - delegates
  lexicon: LSJ
  rationale: πρεσβευτής denotes an official representative or ambassador. 'Envoys'
    is natural modern English and preserves the diplomatic sense without sounding
    overly formal.
- source_word: φίλοι
  chosen: friends
  alternatives:
  - friendly partners
  lexicon: LSJ
  rationale: The noun plainly means 'friends.' In this diplomatic context it may imply
    recognized friendship between states, but 'friends' best preserves the source
    wording.
- source_word: σύμμαχοι
  chosen: allies
  alternatives:
  - confederates
  - partners in alliance
  lexicon: LSJ
  rationale: σύμμαχος is a standard political-military term for an ally. 'Allies'
    is the clearest idiomatic equivalent.
- source_word: ἀνανεούμενοι
  chosen: renewing
  alternatives:
  - reaffirming
  - reviving
  lexicon: LSJ
  rationale: The participle conveys making new again or renewing. 'Renewing' closely
    matches the verbal idea and fits the diplomatic context of reaffirming prior relations.
- source_word: ἐξ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - of old
  - from the first
  lexicon: LSJ
  rationale: The phrase points back to the original establishment of the relationship.
    'From the beginning' is straightforward and transparent.
- source_word: φιλίαν
  chosen: friendship
  alternatives:
  - amity
  lexicon: LSJ
  rationale: In diplomatic context φιλία refers to a formal bond of friendship. 'Friendship'
    is the direct and readable rendering.
- source_word: συμμαχίαν
  chosen: alliance
  alternatives:
  - treaty alliance
  lexicon: LSJ
  rationale: The noun denotes alliance as a political arrangement. 'Alliance' is the
    standard English equivalent.
- source_word: ἀπεσταλμένοι
  chosen: having been sent
  alternatives:
  - sent
  - commissioned
  lexicon: LSJ
  rationale: The perfect/passive participial sense is preserved by 'having been sent.'
    This keeps the relation to the preceding clause clear and avoids overinterpreting
    official commissioning language.
- source_word: τοῦ δήμου τῶν Ἰουδαίων
  chosen: the people of the Jews
  alternatives:
  - the nation of the Jews
  - the assembly of the Jews
  lexicon: LSJ
  rationale: δῆμος can mean people, populace, or civic body. Here 'the people of the
    Jews' preserves the collective-political sense without importing a more technical
    constitutional nuance than the Greek requires.
- source_word: Σιμωνος τοῦ ἀρχιερέως
  chosen: Simon the high priest
  alternatives:
  - Simon, the chief priest
  lexicon: LSJ
  rationale: ἀρχιερεύς is regularly rendered 'high priest.' The proper name is transliterated
    per project philosophy.
