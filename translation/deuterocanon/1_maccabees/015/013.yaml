  confidence: high
  validation: agree
translation:
  text: And Antiochus encamped against Dora, and with him were twelve myriads of fighting
    men and eight thousand cavalry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one hundred twenty thousand fighting men.' The Greek says 'twelve myriads,'
      using the ancient unit 'myriad' for ten thousand.
    reason: lexical_alternative
  - marker: b
    text: The Greek literally has 'eight thousand horse,' a collective military expression
      meaning mounted troops or cavalry.
    reason: lexical_alternative
  - marker: c
    text: The place name appears here in Greek as 'Dora'; some English traditions
      use 'Dor.'
    reason: alternative_reading
lexical_decisions:
- source_word: παρενέβαλεν
  chosen: encamped against
  alternatives:
  - camped against
  - set up camp against
  - marched against
  lexicon: LSJ
  rationale: The verb commonly means to encamp or pitch camp, especially in military
    contexts. With ἐπί plus the place name, 'encamped against' best conveys a siege
    or hostile military positioning rather than merely traveling there.
- source_word: Δῶρα
  chosen: Dora
  alternatives:
  - Dor
  lexicon: LSJ
  rationale: The Greek form is Δῶρα. 'Dora' is the straightforward transliteration
    from the Greek witness used here. 'Dor' is a familiar form from Hebrew/English
    tradition, but the Greek source supports 'Dora'.
- source_word: δώδεκα μυριάδες
  chosen: twelve myriads
  alternatives:
  - one hundred twenty thousand
  - twelve ten-thousands
  lexicon: LSJ
  rationale: A myriad is literally ten thousand. Retaining 'twelve myriads' preserves
    the source expression transparently and avoids silently converting the ancient
    numerical idiom, while remaining understandable in context.
- source_word: ἀνδρῶν πολεμιστῶν
  chosen: fighting men
  alternatives:
  - warriors
  - men of war
  - soldiers
  lexicon: LSJ
  rationale: The phrase denotes male combatants. 'Fighting men' is natural modern
    English and preserves the masculine reference better than the more generic 'soldiers.'
- source_word: ὀκτακισχίλια
  chosen: eight thousand
  alternatives:
  - eight thousand strong
  lexicon: LSJ
  rationale: Straight numerical rendering of the Greek compound numeral.
- source_word: ἵππος
  chosen: cavalry
  alternatives:
  - horsemen
  - horse
  lexicon: LSJ
  rationale: Although literally 'horse,' in military enumeration it functions collectively
    for mounted troops. 'Cavalry' is the most idiomatic English equivalent in this
    context.
