  text: καὶ παρενέβαλεν Ἀντίοχος ἐπὶ Δῶρα, καὶ σὺν αὐτῷ δώδεκα μυριάδες ἀνδρῶν πολεμιστῶν
    καὶ ὀκτακισχίλια ἵππος.
  language: Greek
  pages:
