id: 1MA.15.21
reference: 1 Maccabees 15:21
source:
  edition: lxx-swete-1909
  text: εἴ τινες οὖν λοιμοὶ διαπεφεύγασιν ἐκ τῆς χώρας αὐτῶν πρὸς ἡμᾶς, παράδοτε αὐτοὺς
    τῷ Σίμωνι τῷ ἀρχιερεῖ, ὅπως ἐκδικήσει αὐτοὺς κατὰ τὸν νόμον αὐτῶν.
  language: Greek
  pages:
  - 681
  confidence: high
  validation: agree
translation:
  text: If, then, any pestilent men have escaped from their land to us, hand them
    over to Simon the high priest, so that he may punish them according to their law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pernicious men,' 'troublemakers,' or more literally 'pestilent men.'
      The Greek λοιμοί is a harsh term for dangerous or troublesome persons.
    reason: lexical_alternative
  - marker: b
    text: Or 'may exact justice on them' or 'may avenge them.' The Greek can carry
      either punitive or avenging force, but the legal phrase 'according to their
      law' favors a judicial sense here.
    reason: alternative_reading
lexical_decisions:
- source_word: λοιμοὶ
  chosen: pestilent men
  alternatives:
  - plague-bearers
  - troublemakers
  - criminals
  - pests
  lexicon: LSJ
  rationale: λοιμός literally relates to plague/pestilence, but in personal reference
    it functions as a strong term of abuse for harmful or pernicious persons. 'Pestilent
    men' preserves the vividness and hostility of the Greek better than the flatter
    'criminals' or colloquial 'pests.'
- source_word: διαπεφεύγασιν
  chosen: have escaped
  alternatives:
  - have fled through
  - have taken refuge
  - have gotten away
  lexicon: LSJ
  rationale: The perfect form indicates completed escape with present result. 'Have
    escaped' is the most natural English equivalent in this extradition context.
- source_word: χώρας
  chosen: land
  alternatives:
  - country
  - territory
  - region
  lexicon: LSJ
  rationale: χώρα can mean land, country, or territory. 'Land' is broad and natural
    here, avoiding over-specification while matching the political-geographical sense.
- source_word: παράδοτε
  chosen: hand ... over
  alternatives:
  - deliver
  - surrender
  - turn ... over
  lexicon: LSJ
  rationale: In context this is an order to transfer fugitives into Simon's custody.
    'Hand over' is idiomatic modern English and preserves the force of the imperative.
- source_word: ἀρχιερεῖ
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: LSJ
  rationale: ἀρχιερεύς is the standard term for the Jewish high priest. 'High priest'
    is the established and accurate rendering.
- source_word: ἐκδικήσει
  chosen: may punish
  alternatives:
  - may exact justice on
  - may avenge himself on
  - may carry out justice against
  lexicon: LSJ
  rationale: ἐκδικέω can denote avenging or exacting justice. In this legal setting,
    with 'according to their law' following, 'may punish' best conveys judicial action
    without importing personal vengeance.
- source_word: κατὰ τὸν νόμον αὐτῶν
  chosen: according to their law
  alternatives:
  - according to his law
  - according to the law of the Jews
  lexicon: LSJ
  rationale: The Greek reads plural αὐτῶν, naturally 'their law.' This likely refers
    to the law governing Simon's people or the fugitives' own community. The plural
    should be preserved rather than harmonized to singular.
