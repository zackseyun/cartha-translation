theological_decisions:
- issue: Force of ἐκδικήσει in a legal-political context
  chosen_reading: judicial punishment/exaction of justice rather than personal vengeance
  alternative_readings:
  - avenge them
  - take vengeance on them
  rationale: The phrase 'according to their law' frames the action as legal adjudication,
    so the English should not suggest private revenge. This preserves the text's juridical
    sense without softening its severity.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
