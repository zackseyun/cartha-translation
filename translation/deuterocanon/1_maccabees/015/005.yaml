id: 1MA.15.5
reference: 1 Maccabees 15:5
source:
  edition: lxx-swete-1909
  text: νῦν οὖν ἵστημί σοι πάντα τὰ ἀφαιρέματα ἃ ἀφῆκάν σοι οἱ πρὸ ἐμοῦ βασιλεῖς,
    καὶ ὅσα ἄλλα ἀφαιρέματα ἀφῆκέν σοι·
  language: Greek
  pages:
  - 679
  confidence: high
  validation: agree
translation:
  text: Now therefore I confirm for you all the remissions that the kings before me
    granted you, and whatever other remissions he granted you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text ends with a singular verb, 'he granted you,' after the plural
      subject 'the kings before me.' This may reflect the transmitted wording as preserved
      in Swete's text; some readers may expect 'they granted you.'
    reason: textual_variant
  - marker: b
    text: '''Remissions'' refers to royal fiscal concessions or reductions in dues,
      not necessarily complete exemption from all obligations.'
    reason: cultural_note
lexical_decisions:
- source_word: νῦν οὖν
  chosen: Now therefore
  alternatives:
  - So now
  - Therefore now
  lexicon: LSJ
  rationale: Keeps the inferential and transitional force of both particles, matching
    the formal opening of a royal declaration.
- source_word: ἵστημί
  chosen: I confirm
  alternatives:
  - I establish
  - I set in place
  lexicon: LSJ
  rationale: In this administrative context, the verb carries the sense of putting
    into force or ratifying a grant rather than physically 'setting.' 'Confirm' communicates
    legal validation in natural English.
- source_word: σοι
  chosen: for you
  alternatives:
  - to you
  lexicon: LSJ
  rationale: Either is possible, but 'confirm for you' reads more naturally in English
    while preserving the beneficiary sense.
- source_word: πάντα τὰ ἀφαιρέματα
  chosen: all the remissions
  alternatives:
  - all the exemptions
  - all the tax remissions
  - all the deductions
  lexicon: LSJ
  rationale: The noun refers to amounts taken off or remitted, likely fiscal concessions
    in this royal letter. 'Remissions' preserves the broad administrative sense without
    over-specifying beyond the Greek. 'Exemptions' is possible but can imply total
    release from obligation rather than reductions or remitted dues.
- source_word: ἃ ἀφῆκάν σοι
  chosen: that ... granted you
  alternatives:
  - that ... remitted to you
  - that ... released to you
  lexicon: LSJ
  rationale: The aorist of ἀφίημι here refers to granting or remitting obligations.
    'Granted you' is idiomatic with the preceding noun 'remissions' and avoids awkward
    repetition.
- source_word: οἱ πρὸ ἐμοῦ βασιλεῖς
  chosen: the kings before me
  alternatives:
  - the former kings
  - the kings prior to me
  lexicon: LSJ
  rationale: A direct and natural rendering of the temporal phrase in a royal succession
    context.
- source_word: καὶ ὅσα ἄλλα ἀφαιρέματα
  chosen: and whatever other remissions
  alternatives:
  - and as many other remissions as
  - and any other remissions
  lexicon: LSJ
  rationale: ὅσα ἄλλα introduces additional unspecified concessions. 'Whatever other
    remissions' preserves the open-ended scope.
- source_word: ἀφῆκέν σοι
  chosen: he granted you
  alternatives:
  - it granted you
  - was granted to you
  lexicon: LSJ
  rationale: The singular verb after plural 'kings' is syntactically unexpected in
    the transmitted text. The translation preserves the attested singular by rendering
    'he granted you,' reflecting the Greek as given rather than silently normalizing
    it.
