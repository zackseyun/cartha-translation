id: 1MA.15.36
reference: 1 Maccabees 15:36
source:
  edition: lxx-swete-1909
  text: ἀπέστρεψεν δὲ μετὰ θυμοῦ πρὸς τὸν βασιλέα, καὶ ἀπήγγειλεν αὐτῷ τοὺς λόγους
    τούτους καὶ τὴν δόξαν Σίμωνος καὶ πάντα ὅσα εἶδεν· καὶ ὠργίσθη ὁ βασιλεὺς ὀργὴν
    μεγάλην.
  language: Greek
  pages:
  - 682
  confidence: high
  validation: agree
translation:
  text: But he returned to the king in anger, and reported to him these words and
    the splendor of Simon and everything that he had seen; and the king was greatly
    angered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the glory of Simon.' The Greek δόξα can denote honor, glory, or visible
      magnificence; here it likely refers to the impressive display surrounding Simon.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστρεψεν
  chosen: turned back
  alternatives:
  - returned
  - turned away
  lexicon: LSJ
  rationale: The aorist verb indicates a return movement. 'Turned back' preserves
    the directional sense of ἀπο- while remaining natural English.
- source_word: μετὰ θυμοῦ
  chosen: in anger
  alternatives:
  - with anger
  - in wrath
  lexicon: LSJ
  rationale: This idiom expresses the manner of his return. 'In anger' is idiomatic
    modern English and preserves the emotional force without sounding archaic.
- source_word: ἀπήγγειλεν
  chosen: reported
  alternatives:
  - announced
  - told
  lexicon: LSJ
  rationale: The verb conveys bringing a message back to someone. 'Reported' fits
    the context of relaying what was said and seen to the king.
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - this message
  - these matters
  lexicon: LSJ
  rationale: λόγοι here most directly refers to the specific statements just delivered.
    'These words' keeps the concrete wording of the Greek.
- source_word: τὴν δόξαν Σίμωνος
  chosen: the splendor of Simon
  alternatives:
  - the glory of Simon
  - Simon's magnificence
  - Simon's honor
  lexicon: LSJ
  rationale: δόξα in this narrative context likely refers to Simon's visible grandeur
    or display of status rather than abstract honor alone. 'Splendor' communicates
    observable magnificence in contemporary English.
- source_word: πάντα ὅσα εἶδεν
  chosen: everything that he had seen
  alternatives:
  - all that he saw
  - everything he saw
  lexicon: LSJ
  rationale: The phrase is comprehensive and retrospective. 'Everything that he had
    seen' clearly marks prior observation relative to the reporting.
- source_word: ὠργίσθη ὁ βασιλεὺς ὀργὴν μεγάλην
  chosen: the king became very angry
  alternatives:
  - the king was enraged with great anger
  - the king grew exceedingly angry
  lexicon: LSJ
  rationale: The Greek uses a cognate construction for emphasis. Rather than woodenly
    reproducing 'was angered a great anger,' 'became very angry' conveys the intensification
    naturally in English.
