id: 1MA.15.29
reference: 1 Maccabees 15:29
source:
  edition: lxx-swete-1909
  text: τὰ ὅρια αὐτῶν ἠρημώσατε, καὶ ἐποιήσατε πληγὴν μεγάλην ἐπὶ τῆς γῆς, καὶ ἐκυριεύσατε
    τόπων πολλῶν ἐν τῇ βασιλείᾳ μου.
  language: Greek
  pages:
  - 681
  confidence: high
  validation: agree
translation:
  text: You have laid waste their borders, and you have inflicted a great blow on
    the land, and you have gained control of many places in my kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have devastated their territory'; the Greek can denote making a region
      desolate.
    reason: lexical_alternative
  - marker: b
    text: Or 'have inflicted great damage on the land'; 'a great blow' renders a term
      that can also mean wound, stroke, or plague depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or 'have ruled over many places in my kingdom'; the Greek verb denotes exercising
      mastery or dominion.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ὅρια
  chosen: their borders
  alternatives:
  - their territory
  - their boundaries
  lexicon: LSJ
  rationale: ὅρια commonly denotes boundaries, border regions, or territorial limits.
    'Borders' is natural English and fits the geopolitical context better than the
    more abstract 'boundaries.'
- source_word: ἠρημώσατε
  chosen: have laid waste
  alternatives:
  - have devastated
  - have made desolate
  lexicon: LSJ
  rationale: The verb conveys causing desolation or devastation. 'Have laid waste'
    preserves the force of ruin while remaining idiomatic in English.
- source_word: πληγὴν μεγάλην
  chosen: a great blow
  alternatives:
  - a great plague
  - a great wound
  - great damage
  lexicon: LSJ
  rationale: πληγή can mean blow, stroke, wound, or plague depending on context. Here,
    with ἐποιήσατε ἐπὶ τῆς γῆς in a military-political complaint, 'a great blow' best
    captures inflicted damage without implying disease.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the land
  alternatives:
  - upon the earth
  - in the country
  lexicon: LSJ
  rationale: γῆ here refers to the land/territory affected, not the whole earth. 'On
    the land' keeps the Greek preposition visible while sounding natural enough in
    context.
- source_word: ἐκυριεύσατε
  chosen: have gained control of
  alternatives:
  - have ruled over
  - have seized
  - have become masters of
  lexicon: LSJ
  rationale: The verb means to exercise lordship or gain mastery over. In this context
    of territorial encroachment, 'have gained control of' communicates effective domination
    without overstating formal sovereignty.
- source_word: τόπων πολλῶν
  chosen: many places
  alternatives:
  - many regions
  - many localities
  lexicon: LSJ
  rationale: τόποι is a broad term for places/localities. 'Many places' is the most
    direct rendering and avoids over-specifying administrative regions.
- source_word: ἐν τῇ βασιλείᾳ μου
  chosen: in my kingdom
  alternatives:
  - within my realm
  - in my royal domain
  lexicon: LSJ
  rationale: βασιλεία here denotes the king's realm or kingdom. 'In my kingdom' is
    the straightforward and contextually appropriate rendering.
