id: 1MA.15.6
reference: 1 Maccabees 15:6
source:
  edition: lxx-swete-1909
  text: ποιῆσαι κόμμα ἴδιον νόμισμα τῆς χώρας σου·
  language: Greek
  pages:
  - 680
  confidence: high
  validation: agree
translation:
  text: to make your own coinage for the currency of your country;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to mint your own coin as the currency of your country.' The Greek uses
      a general verb ('make') with terms for coined money and currency.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιῆσαι
  chosen: to make
  alternatives:
  - to produce
  - to mint
  lexicon: LSJ
  rationale: Aorist infinitive of ποιέω, broadly 'to make/do.' In this construction
    it introduces the granted right. 'Mint' would be more specific but is not directly
    encoded in the verb itself, so 'make' preserves the Greek while the object clarifies
    the monetary sense.
- source_word: κόμμα
  chosen: coinage
  alternatives:
  - coin
  - minted money
  lexicon: LSJ
  rationale: In this context κόμμα refers to coined money or coinage. 'Coinage' best
    captures the collective/administrative sense of the privilege being granted, rather
    than a single coin.
- source_word: ἴδιον
  chosen: your own
  alternatives:
  - private
  - distinctive
  - peculiar to you
  lexicon: LSJ
  rationale: ἴδιον marks possession or what belongs particularly to the addressee.
    'Your own' is the most natural English expression here and fits the political
    privilege of issuing coinage.
- source_word: νόμισμα
  chosen: currency
  alternatives:
  - money
  - legal tender
  - coinage
  lexicon: LSJ
  rationale: 'νόμισμα denotes current money/currency. Because κόμμα already carries
    the idea of coined money, rendering νόμισμα as ''currency'' avoids awkward repetition
    while preserving the sense: coinage serving as the country''s money.'
- source_word: τῆς χώρας σου
  chosen: of your country
  alternatives:
  - of your land
  - for your territory
  lexicon: LSJ
  rationale: χώρα commonly means land, region, or country. In this royal-political
    context, 'country' communicates the territorial domain more idiomatically than
    'land' in modern English.
