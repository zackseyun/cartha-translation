id: 1MA.15.19
reference: 1 Maccabees 15:19
source:
  edition: lxx-swete-1909
  text: ἤρεσεν οὖν ἡμῖν γράψαι τοῖς βασιλεῦσιν καὶ ταῖς χώραις, ὅπως μὴ ἐκζητήσωσιν
    αὐτοῖς κακά, καὶ μὴ πολεμήσωσιν αὐτοὺς καὶ τὰς Α πόλεις αὐτῶν καὶ τὰς χώρας αὐτῶν,
    καὶ ἵνα μὴ συμμαχώσιν τοῖς πολεμοῦσιν αὐτούς.
  language: Greek
  pages:
  - 680
  confidence: high
  validation: agree
translation:
  text: It therefore seemed good to us to write to the kings and the countries, that
    they should not seek harm against them, and should not make war against them and
    their cities and their countries, and that they should not join in alliance with
    those who are making war against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has 'countries' (χῶραι) both for the recipients of the letter and
      for the lands belonging to the Jews; 'lands' or 'territories' are possible alternatives
      in both places.
    reason: lexical_alternative
  - marker: b
    text: The printed Swete text reads 'A cities' at one point, which appears to reflect
      an edition/transcription issue; the sense is naturally 'their cities' in context.
    reason: textual_variant
lexical_decisions:
- source_word: ἤρεσεν
  chosen: it seemed good
  alternatives:
  - it pleased
  - it was decided
  lexicon: LSJ
  rationale: Idiomatic epistolary/governmental formula indicating approval or decision.
    'It seemed good' preserves the formal tone without over-paraphrasing.
- source_word: γράψαι
  chosen: to write
  alternatives:
  - to send a letter
  lexicon: LSJ
  rationale: The infinitive directly means 'to write'; the context implies official
    correspondence, but 'to write' stays closer to the Greek.
- source_word: τοῖς βασιλεῦσιν
  chosen: to the kings
  alternatives:
  - to kings
  lexicon: LSJ
  rationale: The article supports a definite reference to surrounding rulers addressed
    by the Roman authority in context.
- source_word: ταῖς χώραις
  chosen: to the countries
  alternatives:
  - to the lands
  - to the regions
  lexicon: LSJ
  rationale: χώρα can mean land, country, or region. Here, paired with kings as political
    entities receiving letters, 'countries' best reflects territorial polities. The
    same term later is also rendered 'countries' for consistency.
- source_word: μὴ ἐκζητήσωσιν αὐτοῖς κακά
  chosen: that they should not seek harm against them
  alternatives:
  - that they should not plot evil against them
  - that they should not pursue wrongs against them
  lexicon: LSJ
  rationale: ἐκζητέω with κακά conveys actively seeking to do harm. 'Seek harm against
    them' preserves the volitional sense without importing a stronger nuance like
    'plot' unless required.
- source_word: μὴ πολεμήσωσιν
  chosen: should not make war
  alternatives:
  - should not fight
  - should not wage war
  lexicon: LSJ
  rationale: A formal political-military context favors 'make war' or 'wage war';
    'make war' is clear and slightly more literal in structure.
- source_word: τὰς πόλεις αὐτῶν
  chosen: their cities
  alternatives:
  - their towns
  lexicon: LSJ
  rationale: πόλις in this context refers to civic centers under Judean control; 'cities'
    is the standard and sufficiently broad rendering.
- source_word: καὶ τὰς χώρας αὐτῶν
  chosen: their countries
  alternatives:
  - their lands
  - their territories
  lexicon: LSJ
  rationale: Repeated χώρα is kept consistent as 'countries,' though 'territories'
    is possible. The phrase likely means the lands under their control; consistency
    is preferred here.
- source_word: συμμαχώσιν
  chosen: join in alliance with
  alternatives:
  - ally themselves with
  - give military aid to
  lexicon: LSJ
  rationale: The verb denotes acting as an ally or giving allied support. 'Join in
    alliance with' captures both the formal and military sense in readable English.
- source_word: τοῖς πολεμοῦσιν αὐτούς
  chosen: those who are making war against them
  alternatives:
  - those fighting them
  - their attackers
  lexicon: LSJ
  rationale: The participle is durative/present, referring to ongoing hostile parties.
    'Those who are making war against them' preserves that active military sense.
