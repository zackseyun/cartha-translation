id: 1MA.15.24
reference: 1 Maccabees 15:24
source:
  edition: lxx-swete-1909
  text: τὸ δὲ ἀντίγραφον αὐτῶν ἔγραψεν Σίμωνι τῷ ἀρχιερεῖ.
  language: Greek
  pages:
  - 681
  confidence: high
  validation: agree
translation:
  text: And he wrote a copy of it to Simon the high priest.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀντίγραφον
  chosen: copy
  alternatives:
  - duplicate
  - written copy
  lexicon: LSJ
  rationale: The noun denotes a copy or duplicate of a document. 'Copy' is the most
    natural modern English rendering and fits the administrative context without over-specifying
    the form.
- source_word: αὐτῶν
  chosen: of it
  alternatives:
  - of them
  - thereof
  lexicon: LSJ
  rationale: Although formally plural, in context it refers to the contents/document
    just mentioned as a collective item. English idiom prefers singular 'of it' here
    rather than the awkward 'of them.'
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - sent in writing
  - inscribed
  lexicon: LSJ
  rationale: The basic sense is 'wrote.' Nothing in the verse itself requires a more
    expansive rendering such as 'sent a written copy,' so the simpler verb is preferred.
- source_word: ἀρχιερεῖ
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: LSJ
  rationale: Standard rendering for ἀρχιερεύς in Jewish cultic and political contexts.
    'High priest' is clear, conventional, and accurate.
- source_word: Σίμωνι
  chosen: Simon
  alternatives:
  - Symeon
  lexicon: LSJ
  rationale: Standard English transliteration for the proper name Σίμων in this historical
    context.
