id: 1MA.15.35
reference: 1 Maccabees 15:35
source:
  edition: lxx-swete-1909
  text: περὶ δὲ Ἰόππης καὶ Γαζαρηνῶν αἰτεῖς· αὗται ἐποίουν ἐν τῷ λαῷ πληγὴν μεγάλην
    καὶ τῇ γῇ ἡμῶν· τούτων δώσομεν τάλαντα ἑκατόν. καὶ οὐκ ἀπεκρίθη αὐτῷ λόγον.
  language: Greek
  pages:
  - 682
  confidence: high
  validation: minor_mismatch
translation:
  text: But concerning Joppa and Gazara, you ask for them. They were inflicting great
    harm on the people and on our land. For these we will give one hundred talents.
    And he answered him not a word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'Gazarenōn' is formally a plural referring to Gazara and its people/inhabitants;
      the translation renders the place name directly because the request concerns
      possession of the city/territory.
    reason: lexical_alternative
  - marker: b
    text: Or 'These places were causing a great blow among the people and to our land.'
      The Greek term for 'harm' can also denote a blow, wound, or plague-like calamity.
    reason: lexical_alternative
  - marker: c
    text: The clause 'For these we will give one hundred talents' is terse in Greek
      and may mean compensation in place of surrendering Joppa and Gazara.
    reason: alternative_reading
lexical_decisions:
- source_word: περὶ δὲ
  chosen: But concerning
  alternatives:
  - Now concerning
  - As for
  lexicon: LSJ
  rationale: Marks a transition to a new point in the reply; 'But concerning' preserves
    both the connective δέ and the topical περὶ.
- source_word: Ἰόππης
  chosen: Joppa
  alternatives:
  - Joppe
  lexicon: LSJ
  rationale: Standard English transliteration of the place name.
- source_word: Γαζαρηνῶν
  chosen: Gazara
  alternatives:
  - Gezer
  - Gazera
  lexicon: LSJ
  rationale: The form refers to the inhabitants/people of Gazara, but in English the
    request is naturally for the city/territory itself. 'Gazara' stays close to the
    Greek deuterocanonical naming convention while avoiding an awkward 'the Gazarenes'
    in this context.
- source_word: αἰτεῖς
  chosen: you ask for
  alternatives:
  - you request
  - you demand
  lexicon: LSJ
  rationale: A straightforward present-tense request verb; 'ask for' is idiomatic
    and not stronger than the Greek warrants.
- source_word: αὗται
  chosen: These
  alternatives:
  - These places
  - They
  lexicon: LSJ
  rationale: Feminine plural naturally refers back to the cities/places just named.
    'These' keeps the antecedent implicit as in Greek.
- source_word: ἐποίουν
  chosen: were inflicting
  alternatives:
  - were causing
  - did
  - used to inflict
  lexicon: LSJ
  rationale: Imperfect aspect suggests ongoing or repeated action in past time. 'Were
    inflicting' captures that durative sense.
- source_word: ἐν τῷ λαῷ
  chosen: on the people
  alternatives:
  - among the people
  - in the people
  lexicon: LSJ
  rationale: With πληγήν μεγάλην, the sense is harm done to the populace. 'On the
    people' is natural English for the affected object.
- source_word: πληγὴν μεγάλην
  chosen: great harm
  alternatives:
  - a great blow
  - a great plague
  - a great wound
  lexicon: LSJ
  rationale: πληγή can denote a blow, stroke, plague, or calamity. Here the broad
    sense of serious damage best fits the political-military context; 'great harm'
    is clear modern English without over-specifying.
- source_word: τῇ γῇ ἡμῶν
  chosen: our land
  alternatives:
  - our country
  - our territory
  lexicon: LSJ
  rationale: γῆ here refers to the national territory rather than soil in a literal
    sense. 'Our land' is both natural and close to the source.
- source_word: τούτων δώσομεν
  chosen: For these we will give
  alternatives:
  - Instead of these we will pay
  - For them we will give
  lexicon: LSJ
  rationale: The genitive τούτων is somewhat compressed; in context it indicates compensation
    in relation to these places. 'For these we will give' preserves the compactness
    without adding too much interpretation.
- source_word: τάλαντα ἑκατόν
  chosen: one hundred talents
  alternatives:
  - a hundred talents
  lexicon: LSJ
  rationale: Standard rendering of the monetary unit; retaining 'talents' preserves
    the ancient measure rather than flattening it into a modern currency estimate.
- source_word: οὐκ ἀπεκρίθη αὐτῷ λόγον
  chosen: he answered him not a word
  alternatives:
  - he gave him no answer
  - he did not answer him a word
  lexicon: LSJ
  rationale: Idiomatic Greek expression for complete silence. The chosen English is
    natural while preserving the emphatic 'not a word'.
