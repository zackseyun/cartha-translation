id: 1MA.15.18
reference: 1 Maccabees 15:18
source:
  edition: lxx-swete-1909
  text: ἤνεγκαν δὲ ἀσπίδα χρυσῆν ἀπὸ μνῶν πεντακισχιλίων.
  language: Greek
  pages:
  - 680
  confidence: high
  validation: agree
translation:
  text: And they brought a gold shield worth five thousand minas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a golden shield of five thousand minas.' The Greek phrase may be rendered
      more formally, but here likely indicates the shield's value.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνεγκαν
  chosen: they brought
  alternatives:
  - they carried
  - they presented
  lexicon: LSJ
  rationale: Aorist of φέρω in context of delivering a diplomatic gift. 'Brought'
    is natural modern English and preserves the simple narrative action without over-interpreting
    it as a formal presentation.
- source_word: ἀσπίδα
  chosen: shield
  alternatives:
  - buckler
  lexicon: LSJ
  rationale: The ordinary sense is 'shield.' 'Buckler' is archaic and too specific
    for readable modern English.
- source_word: χρυσῆν
  chosen: gold
  alternatives:
  - golden
  lexicon: LSJ
  rationale: As an attributive adjective modifying 'shield,' English can render either
    'gold shield' or 'golden shield.' 'Gold shield' more directly conveys material/value
    and fits the following valuation phrase.
- source_word: ἀπὸ μνῶν πεντακισχιλίων
  chosen: worth five thousand minas
  alternatives:
  - from five thousand minas
  - of five thousand minas
  lexicon: LSJ
  rationale: The phrase literally uses ἀπό with a sum of money. In this gift context
    it most naturally indicates valuation or cost rather than physical origin. 'Worth
    five thousand minas' communicates the idiomatic sense in clear English while remaining
    anchored to the Greek amount.
- source_word: μνῶν
  chosen: minas
  alternatives:
  - pounds
  lexicon: LSJ
  rationale: The ancient monetary/weight unit is best transliterated rather than converted
    into an inexact modern equivalent. This preserves historical specificity.
