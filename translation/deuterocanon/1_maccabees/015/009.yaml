id: 1MA.15.9
reference: 1 Maccabees 15:9
source:
  edition: lxx-swete-1909
  text: ὡς δʼ ἂν καταστήσωμεν τὴν βασιλείαν ἡμῶν, δοξάσωμέν σε καὶ τὸ ἔθνος σου καὶ
    τὸ ἱερὸν δόξῃ μεγάλῃ, ὥστε φανερὰν γενέσθαι τὴν δόξαν ὑμῶν ἐν πάσῃ τῇ γῇ.
  language: Greek
  pages:
  - 680
  confidence: high
  validation: agree
translation:
  text: And when we establish our kingdom, we will honor you and your nation and the
    sanctuary with great glory, so that your glory may become evident in all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'glorify ... with great glory ... your glory.' The Greek uses cognate
      forms of δόξα/δοξάζω throughout; 'honor' is chosen in the main text because
      the context is diplomatic and political rather than overtly theological.
    reason: lexical_alternative
  - marker: b
    text: '''The sanctuary'' could also be rendered ''the temple,'' since ἱερόν can
      refer to the sacred precinct.'
    reason: lexical_alternative
  - marker: c
    text: '''In all the earth'' may also be understood as ''throughout all the land/world'';
      the Greek γῆ can bear more than one geographic scope depending on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταστήσωμεν
  chosen: establish
  alternatives:
  - set up
  - secure
  lexicon: LSJ
  rationale: 'The aorist subjunctive after ὡς δʼ ἂν here points to a future contingency:
    ''when/once we establish.'' ''Establish'' fits the political sense of setting
    the kingdom in firm order without overinterpreting as military conquest alone.'
- source_word: βασιλείαν
  chosen: kingdom
  alternatives:
  - kingship
  - reign
  lexicon: LSJ
  rationale: In this diplomatic-political context, βασιλεία refers to the realm/rule
    of the speaker. 'Kingdom' is the most natural English rendering and preserves
    the institutional sense.
- source_word: δοξάσωμέν
  chosen: will honor
  alternatives:
  - will glorify
  lexicon: LSJ
  rationale: Although δοξάζω can mean 'glorify,' in a royal letter addressed to an
    ally the idiomatic sense is to bestow honor. Rendering both occurrences with 'honor'
    keeps the rhetoric coherent in English and avoids overly theological diction not
    demanded by the context.
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - people
  - ethnic group
  lexicon: LSJ
  rationale: Here it refers to the Jewish people as a corporate political entity.
    'Nation' best matches the diplomatic register of the letter.
- source_word: ἱερὸν
  chosen: the sanctuary
  alternatives:
  - the temple
  - the holy place
  lexicon: LSJ
  rationale: ἱερόν can denote the temple complex or sacred precinct. 'Sanctuary' preserves
    the sacred reference without specifying more narrowly than the Greek requires;
    'the temple' is possible but slightly more interpretive.
- source_word: δόξῃ μεγάλῃ
  chosen: with great honor
  alternatives:
  - with great glory
  lexicon: LSJ
  rationale: Instrumental dative expressing the manner or means of honoring. Because
    δοξάζω was rendered 'honor,' 'with great honor' preserves lexical connection and
    reads naturally in English.
- source_word: φανερὰν γενέσθαι
  chosen: may become evident
  alternatives:
  - may become manifest
  - may be made visible
  lexicon: LSJ
  rationale: The infinitive expresses result after ὥστε. 'Become evident' communicates
    public visibility/reputation in idiomatic modern English.
- source_word: τὴν δόξαν ὑμῶν
  chosen: your honor
  alternatives:
  - your glory
  lexicon: LSJ
  rationale: Given the diplomatic context and the earlier use of δοξάζω, 'your honor'
    better conveys public prestige or renown than the more elevated 'your glory,'
    while preserving the lexical link.
- source_word: ἐν πάσῃ τῇ γῇ
  chosen: in all the earth
  alternatives:
  - throughout all the land
  - in the whole world
  lexicon: LSJ
  rationale: γῆ can mean land or earth. In royal correspondence expressing broad international
    renown, 'all the earth' is a conventional and suitably expansive rendering.
