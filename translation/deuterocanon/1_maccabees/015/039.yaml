id: 1MA.15.39
reference: 1 Maccabees 15:39
source:
  edition: lxx-swete-1909
  text: καὶ ἐνετείλατο αὐτῷ παρεμβάλλειν κατὰ πρόσωπον τῆς Ἰουδαίας· καὶ ἐνετείλατο
    αὐτῷ οἰκοδομῆσαι τὴν Κεδρὼν καὶ ὀχυρῶσαι τὰς πόλεις, καὶ ὅπως πολεμῇ τὸν λαόν·
    ὁ δὲ βασιλεὺς ἐδί- ωκε τὸν Τρύφωνα.
  language: Greek
  pages:
  - 682
  confidence: high
  validation: agree
translation:
  text: And he commanded him to encamp opposite Judea; and he commanded him to build
    up Kedron and fortify the cities, and to fight against the people. But the king
    was pursuing Tryphon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'facing Judea.' The Greek phrase is spatial, indicating position opposite
      or in front of Judea.
    reason: lexical_alternative
  - marker: b
    text: Or 'build Kedron' or 'rebuild Kedron.' The Greek verb itself does not specify
      whether the site was being newly built or restored.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνετείλατο
  chosen: he commanded
  alternatives:
  - he ordered
  - he instructed
  lexicon: BDAG
  rationale: Aorist middle of ἐντέλλομαι denotes giving a directive or command. 'Commanded'
    best preserves the authoritative force without unnecessary stiffness.
- source_word: παρεμβάλλειν
  chosen: to encamp
  alternatives:
  - to camp
  - to set up camp
  lexicon: LSJ
  rationale: The verb commonly refers to making camp or encamping, especially in a
    military context. 'To encamp' preserves the military nuance more precisely than
    the more casual 'camp'.
- source_word: κατὰ πρόσωπον τῆς Ἰουδαίας
  chosen: opposite Judea
  alternatives:
  - before Judea
  - facing Judea
  - against Judea
  lexicon: LSJ
  rationale: The phrase literally means 'according to/in front of the face of Judea,'
    idiomatically 'opposite' or 'facing' Judea. 'Opposite Judea' is concise and spatial,
    avoiding the more hostile implication of 'against' at this point in the sentence.
- source_word: οἰκοδομῆσαι
  chosen: to build up
  alternatives:
  - to build
  - to rebuild
  lexicon: BDAG
  rationale: The verb means 'to build' or 'build up.' Because the object is a place
    name and the context is military preparation, 'build up' can suggest strengthening
    or developing the site without overcommitting to 'rebuild,' which the Greek does
    not explicitly state.
- source_word: τὴν Κεδρὼν
  chosen: Kedron
  alternatives:
  - Cedron
  rationale: This is a transliterated place name. Following project policy, names
    are transliterated rather than translated. 'Kedron' reflects the Greek form more
    directly than the Latinate 'Cedron.'
- source_word: ὀχυρῶσαι
  chosen: fortify
  alternatives:
  - make strong
  - strengthen defenses of
  lexicon: LSJ
  rationale: The verb denotes making a place strong or fortified, especially militarily.
    'Fortify' is the most natural and precise English equivalent.
- source_word: τὰς πόλεις
  chosen: the cities
  alternatives:
  - the towns
  lexicon: BDAG
  rationale: πόλις normally means 'city.' Although some locations might be smaller
    settlements, 'cities' is the standard and sufficiently broad rendering.
- source_word: ὅπως πολεμῇ τὸν λαόν
  chosen: to fight against the people
  alternatives:
  - so that he might wage war against the people
  - that he should fight the people
  lexicon: BDAG
  rationale: ὅπως with the subjunctive expresses intended result or purpose. πολεμέω
    in this context is hostile military action. 'To fight against the people' communicates
    the purpose clearly in idiomatic English; 'against' makes the hostility explicit.
- source_word: τὸν λαόν
  chosen: the people
  alternatives:
  - the nation
  lexicon: BDAG
  rationale: λαός here refers to the Jewish people collectively. 'The people' is the
    direct lexical equivalent and avoids importing a more modern political sense with
    'nation.'
- source_word: ἐδίωκε
  chosen: was pursuing
  alternatives:
  - was chasing
  - pursued
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action in past time. 'Was pursuing' preserves
    that aspect better than the simple past 'pursued.'
- source_word: Τρύφωνα
  chosen: Tryphon
  rationale: Personal name transliterated according to project policy.
