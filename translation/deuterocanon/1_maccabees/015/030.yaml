theological_decisions:
- issue: Interpretation of the boundary phrase τῶν ὁρίων τῶν ἐκ τῆς Ἰουδαίας
  chosen_reading: outside the borders of Judea
  alternative_readings:
  - from the borders of Judea
  - of the borders belonging to Judea
  rationale: This is not a major doctrinal issue, but it is a significant interpretive
    decision. The prepositional force of ἐκ with ὁρίων is awkward if rendered woodenly.
    In context the speaker demands return of cities and taxes from areas taken beyond
    Judea proper, so 'outside the borders of Judea' best reflects the likely sense
    for modern readers.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity
    where genuine, but render the plain sense in readable modern English.'
