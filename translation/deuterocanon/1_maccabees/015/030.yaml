id: 1MA.15.30
reference: 1 Maccabees 15:30
source:
  edition: lxx-swete-1909
  text: νῦν οὖν παράδοτε τὰς πόλεις ἃς κατελάβετε, καὶ τοὺς φόρους τῶν τόπων ὧν κατεκυριεύσατε,
    τῶν ὁρίων τῶν ἐκ τῆς Ἰουδαίας.
  language: Greek
  pages:
  - 681
  confidence: high
  validation: agree
translation:
  text: Now then, hand over the cities that you seized, and the taxes of the places
    over which you gained control, beyond the borders of Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from the borders of Judea.' The Greek boundary phrase
      is somewhat compressed; the translation gives the likely contextual sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν οὖν
  chosen: Now then
  alternatives:
  - Therefore now
  - So now
  lexicon: LSJ
  rationale: The combination marks an inferential transition with immediacy. 'Now
    then' is natural English that preserves both the logical and rhetorical force.
- source_word: παράδοτε
  chosen: hand over
  alternatives:
  - deliver up
  - surrender
  - give back
  lexicon: LSJ
  rationale: Imperative demanding transfer of control or possession. 'Hand over' is
    direct and idiomatic without adding the stronger military nuance of 'surrender'
    or the restorative implication of 'give back' beyond the context.
- source_word: τὰς πόλεις ἃς κατελάβετε
  chosen: the cities that you seized
  alternatives:
  - the cities that you captured
  - the cities that you occupied
  lexicon: LSJ
  rationale: καταλαμβάνω here refers to taking possession by force or conquest. 'Seized'
    preserves that force while remaining readable.
- source_word: τοὺς φόρους
  chosen: the taxes
  alternatives:
  - the tribute
  - the revenues
  lexicon: LSJ
  rationale: φόροι commonly denotes taxes or tribute payments. 'Taxes' is the clearest
    modern rendering; 'tribute' is possible but can sound more specialized or archaic.
    The political context still makes clear these are imposed payments.
- source_word: τῶν τόπων
  chosen: of the places
  alternatives:
  - of the districts
  - of the territories
  lexicon: LSJ
  rationale: τόποι is broad and need not specify formal administrative districts.
    'Places' stays close to the Greek while remaining intelligible.
- source_word: ὧν κατεκυριεύσατε
  chosen: over which you gained control
  alternatives:
  - which you dominated
  - which you took possession of
  - over which you became lord
  lexicon: LSJ
  rationale: κατακυριεύω means to gain mastery or dominion over. 'Gained control'
    communicates political domination in natural English without importing overly
    theological language from 'lord it over.'
- source_word: τῶν ὁρίων τῶν ἐκ τῆς Ἰουδαίας
  chosen: outside the borders of Judea
  alternatives:
  - from the borders of Judea
  - belonging to the borders of Judea
  lexicon: LSJ
  rationale: The phrase is elliptical and most naturally means territories lying from/outside
    Judea's borders, i.e., not properly within Judea. In context the demand concerns
    cities and revenues taken beyond Judea's rightful boundary. 'Outside the borders
    of Judea' best conveys the sense in idiomatic English.
