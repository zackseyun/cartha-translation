id: 1MA.15.15
reference: 1 Maccabees 15:15
source:
  edition: lxx-swete-1909
  text: Καὶ ἦλθεν Νουμήνιος καὶ οἱ παρʼ αὐτοῦ εἰς ἐκ Ῥώμης ἔχοντες ἐπιστολὰς τοῖς
    βασιλεῦσι καὶ ταῖς χώραις, ἐν αἷς ἐγέγραπτο τάδε
  language: Greek
  pages:
  - 680
  confidence: high
  validation: agree
translation:
  text: 'And Numenius and those with him came back from Rome, bringing letters to
    the kings and the countries, in which these things had been written:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'came ... from Rome,' but the context indicates a return
      from an embassy there; hence 'came back from Rome.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  chosen: came back
  alternatives:
  - came
  - arrived
  lexicon: LSJ
  rationale: The basic sense is 'came,' but in context Numenius is returning from
    a mission to Rome (cf. 15:14), so 'came back' makes the movement clearer in natural
    English without exceeding the context.
- source_word: οἱ παρʼ αὐτοῦ
  chosen: those with him
  alternatives:
  - his companions
  - those from him
  lexicon: LSJ
  rationale: The idiom denotes the people accompanying him. 'Those with him' is transparent
    and close to the Greek, avoiding over-interpretive specification while still conveying
    companionship.
- source_word: ἐκ Ῥώμης
  chosen: from Rome
  alternatives:
  - out of Rome
  lexicon: LSJ
  rationale: Standard rendering of ἐκ with a place of origin.
- source_word: ἔχοντες ἐπιστολάς
  chosen: bringing letters
  alternatives:
  - having letters
  - carrying letters
  lexicon: LSJ
  rationale: A participial construction expressing attendant circumstance. 'Bringing
    letters' is idiomatic English and preserves the sense that they arrived in possession
    of official correspondence.
- source_word: τοῖς βασιλεῦσι καὶ ταῖς χώραις
  chosen: to the kings and the countries
  alternatives:
  - to the kings and the lands
  - for the kings and the regions
  lexicon: LSJ
  rationale: 'The dative here is best taken with ἐπιστολάς: letters addressed to or
    intended for these recipients. χώρα can mean ''country,'' ''land,'' or ''region'';
    ''countries'' is the most straightforward modern equivalent here.'
- source_word: ἐν αἷς ἐγέγραπτο τάδε
  chosen: in which these things had been written
  alternatives:
  - in which the following was written
  - which contained these words
  lexicon: LSJ
  rationale: The phrase introduces the contents of the letters. 'These things had
    been written' stays close to the Greek plural τάδε and the periphrastic sense,
    while remaining readable. 'The following was written' would also be possible,
    but the plural is worth preserving.
