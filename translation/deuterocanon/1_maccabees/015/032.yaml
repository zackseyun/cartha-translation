id: 1MA.15.32
reference: 1 Maccabees 15:32
source:
  edition: lxx-swete-1909
  text: Καὶ ἦλθεν Ἀθηνόβιος φίλος τοῦ βασιλέως εἰς Ἰερουσαλήμ, καὶ εἶδεν τὴν δόξαν
    Σίμωνος καὶ κυλίκιον μετὰ χρυσωμάτων καὶ ἀργυρωμάτων καὶ παράστασιν ἱκανήν· καὶ
    ἐξίστατο, καὶ ἀπήγγειλεν αὐτῷ τοὺς λόγους τοῦ βασιλέως.
  language: Greek
  pages:
  - 682
  confidence: high
  validation: minor_mismatch
translation:
  text: And Athenobius, the king’s friend, came to Jerusalem, and he saw the splendor
    of Simon, and a display of gold and silver vessels, and an impressive retinue;
    and he was astonished, and reported to him the king’s words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek κυλίκιον is rare and difficult; it may refer more specifically to
      a drinking service or table display of costly gold and silver ware.
    reason: lexical_alternative
lexical_decisions:
- source_word: φίλος τοῦ βασιλέως
  chosen: the king’s friend
  alternatives:
  - friend of the king
  - royal friend
  - courtier of the king
  lexicon: LSJ
  rationale: A formal rendering preserves the court title as given in Greek without
    over-interpreting it as a technical office such as 'courtier,' though that nuance
    may be present.
- source_word: δόξαν
  chosen: splendor
  alternatives:
  - glory
  - magnificence
  lexicon: LSJ
  rationale: In this narrative context the term refers to visible grandeur and prestige
    rather than theological 'glory'; 'splendor' communicates external magnificence
    naturally in English.
- source_word: κυλίκιον
  chosen: a display of gold and silver vessels
  alternatives:
  - drinking service of gold and silver
  - sideboard with gold and silver ware
  - cup-service with gold and silver ornaments
  lexicon: LSJ
  rationale: The noun is difficult and refers to tableware or a display/service associated
    with cups or vessels. Because the phrase is modified by 'with gold and silver
    things,' this rendering captures the visible luxury Athenobius observes without
    forcing an overly narrow technical term.
- source_word: χρυσωμάτων καὶ ἀργυρωμάτων
  chosen: gold and silver vessels
  alternatives:
  - gold and silver objects
  - gold and silver ornaments
  lexicon: LSJ
  rationale: These terms denote articles made of gold and silver. 'Vessels' fits the
    likely table-display context created by κυλίκιον, though 'objects' is possible.
- source_word: παράστασιν ἱκανήν
  chosen: an impressive retinue
  alternatives:
  - a considerable attendance
  - a substantial display
  - a large establishment
  lexicon: LSJ
  rationale: The phrase points to a substantial attendant presence or establishment
    surrounding Simon. 'Impressive retinue' conveys both size and courtly effect in
    idiomatic English.
- source_word: ἐξίστατο
  chosen: he was astonished
  alternatives:
  - he was amazed
  - he was beside himself
  lexicon: LSJ
  rationale: Here the verb expresses strong amazement at what he saw. 'He was astonished'
    is natural and avoids the more literal but misleading English idiom 'beside himself.'
- source_word: ἀπήγγειλεν αὐτῷ τοὺς λόγους τοῦ βασιλέως
  chosen: reported to him the king’s words
  alternatives:
  - announced to him the king’s message
  - told him the king’s words
  lexicon: LSJ
  rationale: The Greek straightforwardly states that Athenobius conveyed the king's
    statements to Simon. 'Reported to him the king’s words' stays close to the wording
    while remaining readable.
