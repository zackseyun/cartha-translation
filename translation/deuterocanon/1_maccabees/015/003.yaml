id: 1MA.15.3
reference: 1 Maccabees 15:3
source:
  edition: lxx-swete-1909
  text: ἐπειδὴ τινες λοιμοὶ κατεκράτησαν τῆς βασιλείας τῶν πατέρων ἡμῶν, βούλομαι
    δὲ ἀντιποιήσασθαι τῆς βασιλείας, ὅπως ἀποκαταστήσω αὐτὴν ὡς ἦν τὸ πρότερον· ἐξενολό-
    γησα δὲ πλῆθος δυνάμεων καὶ κατεσκεύασα πλοῖα πολεμικά·
  language: Greek
  pages:
  - 679
  confidence: high
  validation: agree
translation:
  text: Since certain pestilent men seized control of the kingdom of our fathers,
    and I want to reclaim the kingdom so that I may restore it as it was before, I
    have enlisted a multitude of forces and equipped warships;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'certain plagues seized the kingdom of our fathers'; the Greek uses λοιμοί,
      literally 'plagues/pestilences,' metaphorically for harmful people.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have recruited many troops' or possibly 'I have levied a body of foreign/hired
      forces'; the verb can carry a military recruitment nuance.
    reason: lexical_alternative
  - marker: c
    text: '''Equipped warships'' may also be rendered ''prepared'' or ''built warships,''
      since the Greek verb can cover making ready as well as constructing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειδὴ
  chosen: Since
  alternatives:
  - Because
  - Inasmuch as
  lexicon: LSJ
  rationale: Introduces the stated grounds for the king's action. 'Since' fits the
    causal-explanatory force in natural English.
- source_word: τινες λοιμοὶ
  chosen: certain pestilent men
  alternatives:
  - certain plagues
  - certain pests
  - certain destructive men
  lexicon: LSJ
  rationale: λοιμοί literally can denote 'plagues/pestilences,' but applied to persons
    here it is metaphorical and pejorative. Rendering it as 'pestilent men' preserves
    the insult without flattening it into a neutral term. 'Certain' reflects τινες.
- source_word: κατεκράτησαν
  chosen: seized control of
  alternatives:
  - gained possession of
  - prevailed over
  - took hold of
  lexicon: LSJ
  rationale: With the genitive τῆς βασιλείας, the verb conveys taking mastery or control.
    'Seized control of' captures both the forceful and political sense.
- source_word: τῆς βασιλείας τῶν πατέρων ἡμῶν
  chosen: the kingdom of our fathers
  alternatives:
  - the ancestral kingdom
  - the kingship of our fathers
  lexicon: LSJ
  rationale: A straightforward genitival construction. 'Kingdom of our fathers' preserves
    the dynastic and ancestral reference without overinterpreting βασιλεία as abstract
    'kingship'.
- source_word: βούλομαι
  chosen: I want
  alternatives:
  - I intend
  - I desire
  - I am resolved
  lexicon: LSJ
  rationale: Expresses the speaker's will or intention. 'I want' is direct and readable;
    the following infinitive and purpose clause supply the formal political context.
- source_word: ἀντιποιήσασθαι τῆς βασιλείας
  chosen: to lay claim to the kingdom
  alternatives:
  - to reclaim the kingdom
  - to take possession of the kingdom
  - to assert my right to the kingdom
  lexicon: LSJ
  rationale: The middle verb with genitive often means to claim or assert a right
    to something. 'Lay claim to' preserves that nuance better than the more result-oriented
    'reclaim.'
- source_word: ὅπως ἀποκαταστήσω αὐτὴν
  chosen: so that I may restore it
  alternatives:
  - in order that I may reestablish it
  - so that I may set it back
  lexicon: LSJ
  rationale: ὅπως marks purpose; ἀποκαταστήσω means restore/reestablish. 'Restore
    it' is idiomatic and sufficient.
- source_word: ὡς ἦν τὸ πρότερον
  chosen: as it was before
  alternatives:
  - as formerly
  - to its previous state
  lexicon: LSJ
  rationale: This phrase indicates restoration to an earlier condition. 'As it was
    before' is clear and natural.
- source_word: ἐξενολόγησα
  chosen: I have enlisted
  alternatives:
  - I have recruited
  - I have levied
  - I have gathered as mercenaries
  lexicon: LSJ
  rationale: The verb denotes collecting or levying troops, often with the nuance
    of raising foreign or hired forces. 'Enlisted' is broad enough for the military
    context without overstating a mercenary nuance that the immediate English text
    need not force.
- source_word: πλῆθος δυνάμεων
  chosen: a multitude of forces
  alternatives:
  - many troops
  - a large army
  - a great number of forces
  lexicon: LSJ
  rationale: πλῆθος emphasizes quantity; δυνάμεων in this context refers to military
    forces. 'A multitude of forces' stays close to the Greek while remaining intelligible.
- source_word: κατεσκεύασα πλοῖα πολεμικά
  chosen: equipped warships
  alternatives:
  - prepared warships
  - built warships
  - fitted out warships
  lexicon: LSJ
  rationale: κατασκευάζω can mean prepare, equip, or construct. With ships in a military
    context, 'equipped warships' captures the sense of making them ready for war without
    overcommitting to literal shipbuilding.
