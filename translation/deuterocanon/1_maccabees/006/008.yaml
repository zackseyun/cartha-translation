translation:
  text: And it happened that when the king heard these words, he was astonished and
    greatly shaken; and he fell upon his bed and became sick from grief, because it
    had not happened for him as he had planned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it had not turned out for him as he had intended.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ὡς ἤκουσεν
  chosen: it happened that when he heard
  alternatives:
  - when he heard
  - as soon as he heard
  lexicon: BDAG
  rationale: The idiom καὶ ἐγένετο ὡς introduces a narrative transition. 'And it happened
    that when' preserves the Semitic-flavored narrative style without becoming unintelligible;
    simpler alternatives are possible but less formally transparent.
- source_word: ἐθαμβήθη
  chosen: he was astonished
  alternatives:
  - he was appalled
  - he was amazed
  lexicon: BDAG
  rationale: The verb conveys being struck with amazement or shock. In this context
    of bad news, 'astonished' preserves the force without overinterpreting it as horror.
- source_word: ἐσαλεύθη σφόδρα
  chosen: greatly shaken
  alternatives:
  - deeply disturbed
  - greatly agitated
  lexicon: BDAG
  rationale: σαλεύω here is metaphorical for inner upheaval. 'Greatly shaken' is vivid,
    natural English and keeps the intensifying σφόδρα.
- source_word: ἔπεσεν ἐπὶ τὴν κοίτην
  chosen: he fell upon his bed
  alternatives:
  - he took to his bed
  - he collapsed onto the couch
  lexicon: LSJ
  rationale: A fairly literal rendering fits the sequence of emotional collapse leading
    to illness. 'Took to his bed' is more idiomatic but slightly interpretive.
- source_word: ἐνέπεσεν εἰς ἀρρωστίαν
  chosen: became sick
  alternatives:
  - fell ill
  - fell into sickness
  lexicon: BDAG
  rationale: The expression means entering into a state of illness. 'Became sick'
    is clear modern English; 'fell ill' is also good but slightly more idiomatic than
    the chosen wording.
- source_word: ἀπὸ τῆς λύπης
  chosen: from grief
  alternatives:
  - from sorrow
  - because of distress
  lexicon: BDAG
  rationale: λύπη denotes sorrow or grief. 'From grief' naturally expresses the causal
    force of ἀπό here.
- source_word: οὐκ ἐγένετο αὐτῷ
  chosen: it had not happened for him
  alternatives:
  - it had not turned out for him
  - it had not come about for him
  lexicon: BDAG
  rationale: The Greek is somewhat literal and impersonal. The chosen rendering preserves
    that structure while remaining understandable; alternatives smooth it more idiomatically.
- source_word: καθὼς ἐνεθυμεῖτο
  chosen: as he had planned
  alternatives:
  - as he had intended
  - as he had in mind
  lexicon: BDAG
  rationale: ἐνθυμέομαι can mean to consider, intend, or plan. In context, the king's
    expectations and designs have failed, so 'planned' best captures the practical
    sense.
