translation:
  text: And I said in my heart, ‘Into what distress I have come, and into a great
    storm, in which I now am; for I was kind and beloved.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek κλύδωνος μεγάλου, literally 'of a great surge/billow'; here rendered
      metaphorically as overwhelming turmoil or storm.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπα τῇ καρδίᾳ
  chosen: I said in my heart
  alternatives:
  - I said to myself
  - I said in my mind
  lexicon: LSJ
  rationale: A standard idiom for inward speech. 'In my heart' preserves the anthropological
    language of the Greek while remaining natural English.
- source_word: Ἕως τίνος
  chosen: Into what
  alternatives:
  - How far
  - To what extent
  - How long
  lexicon: LSJ
  rationale: In this context with ἦλθον ('I have come'), the phrase is best taken
    exclamatorily as 'to what a point/into what [state] I have come,' not temporally
    as 'how long.' English 'Into what' captures the movement into a condition.
- source_word: θλίψεως
  chosen: distress
  alternatives:
  - affliction
  - tribulation
  - trouble
  lexicon: LSJ
  rationale: '''Distress'' is clear modern English and fits a king lamenting his dire
    condition. ''Tribulation'' is too ecclesiastically loaded here.'
- source_word: κλύδωνος μεγάλου
  chosen: a great סער?
  alternatives:
  - a great storm
  - a great turmoil
  - a great billow
  lexicon: LSJ
  rationale: κλύδων literally denotes surge, billow, or storm-tossing. The sense here
    is metaphorical upheaval. The intended English is 'a great storm,' preserving
    the vivid image of overwhelming turmoil.
- source_word: ἐν ᾧ νῦν εἰμί
  chosen: now I am in it
  alternatives:
  - in which I now am
  - wherein I now am
  lexicon: LSJ
  rationale: The clause refers back to the state of distress/tumult just mentioned.
    'Now I am in it' is idiomatic and preserves the referential force.
- source_word: χρηστὸς
  chosen: kind
  alternatives:
  - good
  - gracious
  - benevolent
  lexicon: LSJ
  rationale: χρηστός can mean good, kind, or benevolent. 'Kind' fits the king's self-description
    without overstating moral goodness.
- source_word: ἀγαπώμενος
  chosen: beloved
  alternatives:
  - loved
  - dear
  lexicon: LSJ
  rationale: The participle indicates being loved or cherished by others. 'Beloved'
    is concise and suitably elevated for royal lament.
