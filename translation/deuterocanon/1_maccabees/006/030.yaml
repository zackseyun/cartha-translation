translation:
  text: And the number of his forces was one hundred thousand foot soldiers, and twenty
    thousand horsemen, and thirty-two elephants trained for war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'twenty thousand of the horses'; the Greek likely uses 'horses'
      metonymically for mounted troops.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'elephants knowing war,' that is, elephants trained or experienced
      for battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀριθμός
  chosen: number
  alternatives:
  - total
  - count
  lexicon: LSJ
  rationale: A straightforward numerical term; 'number' best matches the plain sense
    in this military census context.
- source_word: δυνάμεων
  chosen: forces
  alternatives:
  - troops
  - army
  lexicon: LSJ
  rationale: In context this refers to military strength or troops collectively. 'Forces'
    preserves the broad military sense without over-specifying a single branch.
- source_word: πεζῶν
  chosen: foot soldiers
  alternatives:
  - infantry
  - footmen
  lexicon: LSJ
  rationale: The genitive plural denotes those on foot in contrast to cavalry. 'Foot
    soldiers' is clear modern English and slightly more accessible than 'infantry'
    while preserving the military distinction.
- source_word: ἵππων
  chosen: horsemen
  alternatives:
  - cavalry
  - horses
  lexicon: LSJ
  rationale: Although literally 'horses,' in this military enumeration after 'πεζῶν'
    it functions metonymically for mounted troops. 'Horsemen' makes the implied sense
    explicit in English. 'Cavalry' is possible but less directly tied to the Greek
    wording.
- source_word: ἐλέφαντες
  chosen: elephants
  lexicon: LSJ
  rationale: Direct lexical equivalent.
- source_word: εἰδότες πόλεμον
  chosen: trained for war
  alternatives:
  - knowing war
  - experienced in battle
  - battle-trained
  lexicon: LSJ
  rationale: Literally 'knowing war,' an idiom for being trained or experienced in
    warfare. Because the phrase modifies elephants, 'trained for war' communicates
    the intended sense naturally in English.
