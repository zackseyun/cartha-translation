lexical_decisions:
- source_word: παρεμβολῆς
  chosen: camp
  alternatives:
  - encampment
  lexicon: LSJ
  rationale: In military context, παρεμβολή refers to a camp or encampment. 'Camp'
    is the more natural modern English term while preserving the military sense.
- source_word: ἀνέβησαν
  chosen: went up
  alternatives:
  - marched up
  - came up
  lexicon: LSJ
  rationale: The verb literally means 'went up' or 'ascended.' Because Jerusalem is
    the destination, 'went up' preserves the conventional topographical sense without
    over-specifying military movement.
- source_word: εἰς συνάντησιν αὐτῶν
  chosen: to meet them
  alternatives:
  - for an encounter with them
  - to meet with them
  lexicon: LSJ
  rationale: This idiom commonly means going out or going up to meet someone. 'To
    meet them' is the clearest idiomatic English rendering.
- source_word: παρενέβαλεν
  chosen: encamped
  alternatives:
  - camped
  - pitched camp
  lexicon: LSJ
  rationale: The aorist of παρεμβάλλω in military narrative means to encamp. 'Encamped'
    is concise and suitably formal for the narrative register.
- source_word: Ἰουδαίαν
  chosen: Judea
  alternatives:
  - the Judean region
  - Judah
  lexicon: LSJ
  rationale: Ἰουδαία in Hellenistic historical narrative normally denotes Judea, the
    geographic-political region, not specifically the tribal territory of Judah.
- source_word: ὄρος Σιών
  chosen: Mount Zion
  alternatives:
  - the hill of Zion
  lexicon: LSJ
  rationale: This is the standard and transparent rendering of the Greek phrase, preserving
    the place name in familiar English form.
