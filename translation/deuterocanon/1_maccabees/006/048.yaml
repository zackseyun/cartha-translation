  text: Καὶ ἐκ τῆς παρεμβολῆς τοῦ βασιλέως ἀνέβησαν εἰς συνάντησιν αὐτῶν εἰς Ἰερουσαλήμ,
    καὶ παρενέβαλεν ὁ βασιλεὺς εἰς τὴν Ἰουδαίαν καὶ εἰς τὸ ὄρος Σιών.
