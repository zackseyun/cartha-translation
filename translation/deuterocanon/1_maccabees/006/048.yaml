translation:
  text: And from the king’s camp they went up to meet them at Jerusalem, and the king
    encamped in Judea and at Mount Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'encampment' for 'camp' in both military references.
