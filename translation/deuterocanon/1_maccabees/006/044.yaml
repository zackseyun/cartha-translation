lexical_decisions:
- source_word: ἔδωκεν ἑαυτὸν
  chosen: gave himself
  alternatives:
  - offered himself
  - gave up himself
  lexicon: LSJ
  rationale: The idiom straightforwardly expresses self-giving or self-commitment.
    'Gave himself' is the most natural English rendering and preserves the force without
    importing sacrificial overtones that the context itself does not explicitly require.
- source_word: τοῦ σῶσαι
  chosen: to save
  alternatives:
  - in order to save
  - to rescue
  lexicon: LSJ
  rationale: The articular infinitive with τοῦ expresses purpose. 'To save' is concise
    and idiomatic; 'rescue' is possible, but 'save' better preserves the broader sense
    and echoes the Greek verbal root directly.
- source_word: τὸν λαὸν αὐτοῦ
  chosen: his people
  alternatives:
  - his nation
  lexicon: LSJ
  rationale: λαός commonly means 'people' in the collective sense. 'His people' fits
    the military-national context without narrowing the term to a modern political
    'nation'.
- source_word: περιποιῆσαι
  chosen: to win for himself
  alternatives:
  - to acquire for himself
  - to preserve for himself
  - to gain
  lexicon: LSJ
  rationale: The verb can mean acquire, gain, or secure for oneself. In this context,
    with ὄνομα as object, the sense is gaining or winning a name/reputation. 'Win
    for himself' is natural English and preserves the middle/reflexive nuance signaled
    by αὐτῷ.
- source_word: αὐτῷ
  chosen: for himself
  alternatives:
  - for him
  lexicon: Greek grammar / LSJ
  rationale: The dative is reflexive in sense here, referring back to the subject.
    'For himself' makes the relation explicit in English.
- source_word: ὄνομα αἰώνιον
  chosen: an everlasting name
  alternatives:
  - an eternal name
  - a lasting name
  lexicon: LSJ
  rationale: The phrase denotes enduring renown or memorial reputation. 'Everlasting
    name' is idiomatic, weighty, and close to the Greek; 'eternal name' is possible
    but sounds less natural in English for reputation.
