lexical_decisions:
- source_word: ἐπέγνω
  chosen: learned
  alternatives:
  - came to know
  - recognized
  - found out
  lexicon: BDAG
  rationale: The aorist indicates Lysias became aware of the fact. 'Learned' is natural
    modern English and fits the informational sense here better than the more wooden
    'came to know.'
- source_word: τέθνηκεν
  chosen: had died
  alternatives:
  - is dead
  - was dead
  lexicon: BDAG
  rationale: The perfect of θνῄσκω denotes a completed death with continuing result.
    In English narrative after a past-tense reporting verb, 'had died' best conveys
    the prior completed event.
- source_word: κατέστησεν
  chosen: installed
  alternatives:
  - appointed
  - set up
  - made
  lexicon: BDAG
  rationale: The verb here conveys causing someone to assume a role or office. 'Installed'
    captures formal placement into kingship more clearly than the generic 'made' or
    'set up.'
- source_word: βασιλεύειν
  chosen: to reign
  alternatives:
  - to be king
  - to rule as king
  lexicon: BDAG
  rationale: The infinitive specifies the royal function. 'To reign' is concise, idiomatic,
    and preserves the monarchical nuance.
- source_word: ἀντʼ αὐτοῦ
  chosen: in his place
  alternatives:
  - instead of him
  - in place of him
  lexicon: BDAG
  rationale: This expresses succession after the deceased king. 'In his place' is
    idiomatic English for dynastic replacement.
- source_word: ἐξέθρεψεν
  chosen: had reared
  alternatives:
  - had brought up
  - had raised
  - had nurtured
  lexicon: BDAG
  rationale: The verb denotes bringing up or nourishing a child. 'Had reared' preserves
    the formal historical tone and the sense of personal upbringing by Lysias.
- source_word: νεώτερον
  chosen: from youth
  alternatives:
  - while still young
  - from childhood
  - as a youth
  lexicon: BDAG
  rationale: The adverbial accusative indicates the period from which the upbringing
    began. 'From youth' is compact and suitably literal without over-specifying exact
    age.
