translation:
  text: And he charged boldly into the middle of the phalanx, and kept killing right
    and left, and they were split apart before him on both sides.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they parted before him this way and that.' The Greek ἔνθα καὶ ἔνθα can
      be rendered more literally as movement or division in either direction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέδραμεν
  chosen: charged
  alternatives:
  - rushed
  - ran upon
  - attacked
  lexicon: LSJ
  rationale: The verb conveys a forceful rush or assault, not mere movement. 'Charged'
    captures the military aggression and momentum in natural English.
- source_word: θράσει
  chosen: boldly
  alternatives:
  - with boldness
  - courageously
  lexicon: LSJ
  rationale: The dative expresses manner. 'Boldly' is concise, idiomatic, and preserves
    the sense of daring action.
- source_word: εἰς μέσον τῆς φάλαγγος
  chosen: into the middle of the phalanx
  alternatives:
  - into the midst of the battle line
  - into the center of the formation
  lexicon: LSJ
  rationale: φάλαγξ here is a formed military line or mass. 'Phalanx' preserves the
    specific military image better than the more generic 'formation,' while remaining
    understandable in context.
- source_word: ἐθανάτου
  chosen: kept killing
  alternatives:
  - was killing
  - struck down
  - put to death
  lexicon: LSJ
  rationale: The imperfect tense suggests ongoing action during the charge. 'Kept
    killing' reflects repeated or continuous action more clearly than a simple past.
- source_word: δεξιὰ καὶ εὐώνυμα
  chosen: right and left
  alternatives:
  - on the right and on the left
  - to the right and to the left
  lexicon: LSJ
  rationale: This idiom indicates both sides around him. 'Right and left' is the most
    natural compact English equivalent.
- source_word: ἐσχίζοντο
  chosen: were split apart
  alternatives:
  - were torn apart
  - parted
  - were cut through
  lexicon: LSJ
  rationale: The passive imperfect depicts the ranks opening or being torn as he advanced.
    'Were split apart' preserves the vividness without over-specifying the mechanism.
- source_word: ἀπʼ αὐτοῦ
  chosen: before him
  alternatives:
  - from before him
  - away from him
  - by him
  lexicon: LSJ
  rationale: In context the sense is that the line opened in front of him as he drove
    forward. 'Before him' gives the clearest idiomatic English sense.
- source_word: ἔνθα καὶ ἔνθα
  chosen: on both sides
  alternatives:
  - here and there
  - this way and that
  - on this side and that
  lexicon: LSJ
  rationale: Given the military context and the preceding 'right and left,' the phrase
    describes division to either side rather than random scattering. 'On both sides'
    communicates the effect clearly.
