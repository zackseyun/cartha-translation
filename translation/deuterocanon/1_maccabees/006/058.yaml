lexical_decisions:
- source_word: νῦν οὖν
  chosen: Now then
  alternatives:
  - Therefore now
  - So now
  lexicon: LSJ
  rationale: The combination marks an inferential transition with immediacy. 'Now
    then' preserves both the discourse move and natural English flow.
- source_word: δῶμεν δεξιὰν
  chosen: let us give our right hand
  alternatives:
  - let us give a pledge
  - let us extend the right hand
  lexicon: LSJ
  rationale: Literally 'give [the] right hand,' an idiom for offering a pledge of
    good faith or alliance. The literal image is retained in the main text for transparency,
    since the idiom remains intelligible in English and preserves the formal gesture
    behind the proposal.
- source_word: τοῖς ἀνθρώποις τούτοις
  chosen: to these men
  alternatives:
  - to these people
  - to these persons
  lexicon: LSJ
  rationale: ἄνθρωποι can mean people/humans generally, but here it refers to a specific
    male group in a military-political context. 'These men' is gender-accurate and
    contextually natural.
- source_word: ποιήσωμεν ... εἰρήνην
  chosen: let us make peace
  alternatives:
  - let us establish peace
  - let us conclude peace
  lexicon: LSJ
  rationale: A standard expression for entering into peaceful relations. 'Make peace'
    is idiomatic, direct, and faithful to the Greek construction.
- source_word: μετʼ αὐτῶν
  chosen: with them
  lexicon: LSJ
  rationale: Straightforward prepositional phrase indicating the parties to the peace.
- source_word: μετὰ παντὸς ἔθνους αὐτῶν
  chosen: with their whole nation
  alternatives:
  - with all their nation
  - with all their people
  lexicon: LSJ
  rationale: ἔθνος here denotes the people-group/nation to which 'them' belong. 'Their
    whole nation' best captures παντός as comprehensive and avoids the awkwardness
    of 'all their nation.'
