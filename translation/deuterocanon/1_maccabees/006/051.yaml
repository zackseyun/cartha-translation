translation:
  text: And he encamped against the sanctuary for many days, and there he set up missile-launchers
    and engines and fire-throwers and stone-throwers and scorpions, to shoot arrows
    and slingstones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scorpion-engines,' a type of small military projectile launcher.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλεν
  chosen: encamped
  alternatives:
  - camped
  - laid siege
  lexicon: LSJ
  rationale: The verb commonly means to encamp or pitch camp. In this military context
    it implies siege activity, but the Greek itself states the encamping action rather
    than using a more explicit siege verb, so 'encamped' preserves the source wording
    while fitting the context.
- source_word: ἐπὶ τὸ ἁγίασμα
  chosen: against the sanctuary
  alternatives:
  - at the sanctuary
  - before the sanctuary
  - against the holy place
  lexicon: LSJ
  rationale: With a military verb, ἐπί plus accusative naturally conveys movement
    or hostile positioning toward/against a target. ἁγίασμα here refers to the sacred
    precinct/temple area. 'Against the sanctuary' best reflects the hostile military
    posture.
- source_word: ἡμέρας πολλάς
  chosen: for many days
  alternatives:
  - many days
  lexicon: LSJ
  rationale: Idiomatic temporal accusative; 'for many days' is natural modern English
    and preserves duration.
- source_word: ἔστησεν
  chosen: set up
  alternatives:
  - stationed
  - placed
  - erected
  lexicon: LSJ
  rationale: A broad verb for establishing or placing military equipment. 'Set up'
    is clear, natural, and suitable for siege devices.
- source_word: βελοστασίσεις
  chosen: missile-launchers
  alternatives:
  - arrow-launchers
  - batteries for darts
  - engines for shooting missiles
  lexicon: LSJ
  rationale: The term denotes devices associated with launching βέλη ('missiles,'
    often arrows or darts). Because the verse later explicitly mentions shooting arrows,
    a broader rendering like 'missile-launchers' avoids over-narrowing while still
    conveying military machinery.
- source_word: μηχανὰς
  chosen: engines
  alternatives:
  - machines
  - siege engines
  lexicon: LSJ
  rationale: A general term for military machines. 'Engines' is concise and idiomatic
    in siege context; 'siege engines' would be slightly more explicit but somewhat
    redundant amid the list.
- source_word: πυροβόλα
  chosen: fire-throwers
  alternatives:
  - fire-projectors
  - devices for throwing fire
  lexicon: LSJ
  rationale: A compound meaning things that cast or throw fire. 'Fire-throwers' is
    transparent and preserves the imagery without importing later technological assumptions.
- source_word: λιθοβόλα
  chosen: stone-throwers
  alternatives:
  - stone-casters
  - catapults
  lexicon: LSJ
  rationale: Literally 'stone-throwers.' Although catapult-like devices are likely
    intended, the literal rendering is preferable because it stays close to the Greek
    and avoids over-specifying the exact machine type.
- source_word: σκορπίδια
  chosen: scorpions
  alternatives:
  - small dart-throwers
  - scorpion-engines
  lexicon: LSJ
  rationale: The Greek uses the established military term 'scorpions' for a type of
    projectile engine. Retaining the historical name is defensible, but because modern
    readers may not recognize it, a footnote preserves the explanation.
- source_word: εἰς τὸ βάλλεσθαι
  chosen: to shoot
  alternatives:
  - for shooting
  - so as to cast
  lexicon: LSJ
  rationale: This articular infinitive expresses purpose. 'To shoot' is the most natural
    English rendering in context of arrows and slingstones.
- source_word: βέλη
  chosen: arrows
  alternatives:
  - darts
  - missiles
  lexicon: LSJ
  rationale: Though βέλος can be broader than 'arrow,' the immediate collocation with
    slingstones suggests specific projectiles; 'arrows' is the most accessible and
    likely sense here.
- source_word: σφενδόνας
  chosen: slingstones
  alternatives:
  - stones from slings
  - sling-bullets
  lexicon: LSJ
  rationale: The noun can refer to sling-related projectiles or, less likely here,
    slings themselves. Since the purpose clause lists what is being shot, 'slingstones'
    best fits the syntax and military sense.
