translation:
  text: And Judas moved away from the citadel and encamped at Beth-zachariah, opposite
    the king’s camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Acra,” the fortified citadel in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  chosen: moved away
  alternatives:
  - departed
  - set out
  - withdrew
  lexicon: LSJ
  rationale: From ἀπαίρω/ἀπαίρω in context, the verb indicates removal or departure
    from a place. 'Moved away' is natural English and preserves the sense without
    over-specifying motive; 'withdrew' could imply retreat, which the Greek itself
    does not require.
- source_word: ἄκρας
  chosen: the citadel
  alternatives:
  - the Acra
  - the fortress
  lexicon: LSJ
  rationale: ἄκρα can mean citadel/fortress, and in 1 Maccabees often refers to the
    fortified stronghold in Jerusalem known as the Acra. For readability, the main
    text uses the common noun 'citadel'; the more technical place-name sense is preserved
    as an alternative.
- source_word: παρενέβαλεν
  chosen: encamped
  alternatives:
  - made camp
  - camped
  lexicon: LSJ
  rationale: The military verb means to encamp or pitch camp. 'Encamped' best matches
    the formal military setting and aligns with the following reference to the king's
    camp.
- source_word: εἰς Βεθζαχαριά
  chosen: at Beth-zachariah
  alternatives:
  - in Beth-zachariah
  - to Beth-zachariah
  lexicon: LSJ
  rationale: With a verb of encamping, English idiom prefers 'encamped at' for location,
    even though εἰς literally marks movement toward/into the place. The transliterated
    place name follows the project's policy for names.
- source_word: ἀπέναντι
  chosen: opposite
  alternatives:
  - facing
  - across from
  - in front of
  lexicon: LSJ
  rationale: The preposition indicates position opposite or facing another location.
    'Opposite' is concise and spatially clear.
- source_word: παρεμβολῆς
  chosen: camp
  alternatives:
  - encampment
  lexicon: LSJ
  rationale: The noun denotes a camp or army encampment. 'Camp' is the most natural
    rendering in English here.
- source_word: τοῦ βασιλέως
  chosen: the king’s
  alternatives:
  - of the king
  lexicon: LSJ
  rationale: Simple possessive rendering is idiomatic English and preserves the genitival
    relation.
