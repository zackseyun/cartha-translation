translation:
  text: And the king was enraged when he heard it, and he gathered all his friends,
    the commanders of his forces, and those over the reins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the chariot officers' or 'those in charge of the cavalry';
      the Greek reads literally 'those over the reins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠργίσθη
  chosen: was enraged
  alternatives:
  - was angry
  - became furious
  lexicon: LSJ
  rationale: Aorist passive/deponent of ὀργίζω here denotes a strong emotional reaction.
    'Was enraged' conveys more force than the flatter 'was angry' while remaining
    natural English.
- source_word: συνήγαγεν
  chosen: gathered
  alternatives:
  - assembled
  - brought together
  lexicon: LSJ
  rationale: Standard rendering of συνάγω in narrative context. 'Gathered' is concise
    and idiomatic.
- source_word: φίλους
  chosen: Friends
  alternatives:
  - friends
  - courtiers
  lexicon: LSJ
  rationale: In Hellenistic royal context, φίλοι can function as a quasi-technical
    designation for the king's official companions/court associates, not merely personal
    friends. Capitalizing 'Friends' signals this court title without over-paraphrasing.
- source_word: ἄρχοντας
  chosen: commanders
  alternatives:
  - rulers
  - leaders
  - officers
  lexicon: LSJ
  rationale: Given the military genitive that follows, the sense is military leadership
    rather than generic rulers. 'Commanders' best fits the context.
- source_word: δυνάμεως
  chosen: forces
  alternatives:
  - army
  - power
  - troops
  lexicon: LSJ
  rationale: In military context δύναμις commonly refers to armed force(s). 'Forces'
    preserves the breadth of the term better than the singular 'army'.
- source_word: τοὺς ἐπὶ τῶν ἡνιῶν
  chosen: those over the reins
  alternatives:
  - the chariot officers
  - those in charge of the cavalry
  - the charioteers
  lexicon: LSJ
  rationale: The phrase is literally 'those over the reins.' Because the exact office
    can be understood in more than one way, the main text keeps the concrete image
    close to the Greek, while an explanatory alternative is preserved in a footnote.
