translation:
  text: They were being put to death, and our inheritances were being plundered. And
    they stretched out their hand not only against us, but also against all their
    territories.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all their borders' or 'all the regions around them.' The Greek term
      can denote boundary lines or the territories defined by them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθανατοῦντο
  chosen: were being put to death
  alternatives:
  - were killed
  - were being slain
  lexicon: LSJ
  rationale: Imperfect passive indicates ongoing or repeated action in past time.
    'Were being put to death' preserves both the passive voice and the severity of
    θανατόω more clearly than the simpler 'were killed.'
- source_word: κληρονομίαι
  chosen: inheritances
  alternatives:
  - inheritance lands
  - possessions
  - allotments
  lexicon: LSJ
  rationale: κληρονομία can denote inherited property or hereditary possession. 'Inheritances'
    keeps the familial/ancestral sense better than the broader 'possessions.'
- source_word: διηρπάζοντο
  chosen: were being plundered
  alternatives:
  - were being seized
  - were being pillaged
  lexicon: LSJ
  rationale: The verb conveys violent seizure or plundering. 'Were being plundered'
    fits the imperfect passive and the context of hostile depredation.
- source_word: ἐξέτειναν χεῖρα
  chosen: stretched out their hand against
  alternatives:
  - raised their hand against
  - attacked
  lexicon: LSJ
  rationale: This is an idiomatic expression for hostile action. The more literal
    'stretched out their hand against' preserves the imagery while remaining understandable
    in English.
- source_word: ὅρια
  chosen: neighboring territories
  alternatives:
  - borders
  - territories
  - regions
  lexicon: LSJ
  rationale: ὅρια can mean borders or territories. Because the phrase says 'all their
    ὅρια,' a strictly spatial 'borders' is awkward in English; 'neighboring territories'
    captures the sense of surrounding regions under or near their control.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - theirs
  lexicon: LSJ
  rationale: The pronoun most naturally refers to the same hostile group just mentioned.
    Rendering it as 'their' preserves the Greek wording, though the exact nuance of
    possession/association in 'their territories' is somewhat compressed in English.
