translation:
  text: He named him Eupator. And those from the citadel were hemming Israel in around
    the sanctuary, seeking evil continually and serving as a support to the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'around the holy precincts'; the Greek literally has 'the holy things/places,'
      likely referring to the sanctuary area.
    reason: lexical_alternative
  - marker: b
    text: Or 'a support for the Gentiles.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκάλεσεν τὸ ὄνομα αὐτοῦ
  chosen: He named him
  alternatives:
  - He called his name
  - He gave him the name
  lexicon: LSJ
  rationale: Idiomatic Greek expression for assigning a name; English 'named him'
    is natural and preserves the sense without wooden literalism.
- source_word: Εὐπάτωρ
  chosen: Eupator
  rationale: Personal name/title is transliterated per project philosophy to transliterate
    names rather than translate them.
- source_word: οἱ ἐκ τῆς ἄκρας
  chosen: those from the citadel
  alternatives:
  - those in the citadel
  - the men of the citadel
  lexicon: LSJ
  rationale: ἄκρα refers to the fortified citadel in Jerusalem; 'those from the citadel'
    captures the group associated with it without over-specifying gender.
- source_word: συγκλείοντες
  chosen: hemming ... in
  alternatives:
  - shutting up
  - besieging
  - confining
  lexicon: LSJ
  rationale: The participle conveys enclosing or confining from all sides. 'Hemming
    in' fits the following κύκλῳ and reads naturally in English.
- source_word: τὸν Ἰσραὴλ
  chosen: Israel
  alternatives:
  - the Israelites
  rationale: The singular collective 'Israel' is the direct object in Greek and should
    be preserved.
- source_word: κύκλῳ τῶν ἁγίων
  chosen: around the sanctuary
  alternatives:
  - around the holy place
  - around the holy precincts
  - around the holy things
  lexicon: LSJ
  rationale: In 1 Maccabees this phrase refers to the temple area/sanctuary precinct.
    'Sanctuary' is concise and contextually clear, though the plural form may suggest
    holy precincts.
- source_word: ζητοῦντες κακὰ
  chosen: seeking evil
  alternatives:
  - plotting harm
  - seeking mischief
  - seeking to do harm
  lexicon: LSJ
  rationale: The phrase denotes hostile intent against Israel. 'Seeking evil' stays
    close to the Greek while remaining intelligible; the object is moral/hostile harm
    rather than mere inconvenience.
- source_word: διʼ ὅλου
  chosen: continually
  alternatives:
  - all the time
  - constantly
  - throughout
  lexicon: LSJ
  rationale: The idiom indicates ongoing, persistent action. 'Continually' captures
    the durative force in smooth English.
- source_word: στήριγμα τοῖς ἔθνεσιν
  chosen: a support to the nations
  alternatives:
  - a stronghold for the Gentiles
  - a support for the Gentiles
  - a bulwark to the nations
  lexicon: LSJ
  rationale: στήριγμα can mean support or prop. Given the dative τοῖς ἔθνεσιν, the
    sense is that the citadel faction functioned as backing for the foreign nations.
    'Nations' is the standard rendering of ἔθνη in this deuterocanonical context,
    with 'Gentiles' as a viable alternative.
