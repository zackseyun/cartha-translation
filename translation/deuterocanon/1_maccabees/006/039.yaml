translation:
  text: And when the sun flashed on the golden shields, the mountains flashed from
    them and shone like torches of fire.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔστιλβεν
  chosen: flashed
  alternatives:
  - gleamed
  - shone
  - glittered
  lexicon: LSJ
  rationale: The verb denotes emitting a bright gleam or flash. 'Flashed' fits the
    repeated use in the verse and conveys the sudden brilliance caused by sunlight
    on metal better than the flatter 'shone.'
- source_word: χρυσᾶς
  chosen: golden
  alternatives:
  - gold
  - gold-covered
  lexicon: LSJ
  rationale: As an adjective modifying shields, 'golden' is the most natural English
    rendering and need not imply solid gold beyond what the Greek itself states.
- source_word: ἀσπίδας
  chosen: shields
  alternatives:
  - bucklers
  lexicon: LSJ
  rationale: Standard military term for shields. 'Bucklers' is archaic and less readable.
- source_word: τὰ ὄρη
  chosen: the mountains
  alternatives:
  - the hills
  lexicon: LSJ
  rationale: ὄρη normally means 'mountains' or 'highlands.' 'Mountains' preserves
    the grandeur of the scene and is the more direct rendering.
- source_word: ἀπʼ αὐτῶν
  chosen: from them
  alternatives:
  - from these
  - because of them
  - with reflected light from them
  lexicon: LSJ
  rationale: The phrase indicates the mountains' brightness came from the reflected
    light of the shields. 'From them' is concise and faithful, while the causal-reflective
    sense is clear in context.
- source_word: κατήγαζεν
  chosen: shone
  alternatives:
  - beamed
  - radiated
  - gave light
  lexicon: LSJ
  rationale: The verb means to illuminate or shine forth. 'Shone' is idiomatic in
    English and pairs well with the simile that follows.
- source_word: ὡς λαμπάδες πυρός
  chosen: like torches of fire
  alternatives:
  - like fiery torches
  - like firebrands
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the vivid simile. 'Torches of fire'
    sounds slightly Hebraic/Septuagintal but remains clear in modern English.
