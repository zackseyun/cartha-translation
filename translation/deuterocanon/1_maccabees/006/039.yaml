id: 1MA.6.39
reference: 1 Maccabees 6:39
source:
  edition: lxx-swete-1909
  text: ὡς δὲ ἔστιλβεν ὁ ἥλιος ἐπὶ τὰς χρυσᾶς ἀσπίδας, ἔστιλβεν τὰ ὄρη ἀπʼ αὐτῶν,
    καὶ κατήγαζεν ὡς λαμπάδες πυρός.
