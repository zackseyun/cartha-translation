translation:
  text: And he departed in haste and returned to Antioch, and he found Philip in control
    of the city, and he fought against him and took the city by force.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπῆρεν
  chosen: departed
  alternatives:
  - set out
  - went away
  lexicon: LSJ
  rationale: Aorist of ἀπαίρω/ἀπέρχομαι in context marks leaving the present location.
    'Departed' is natural English and preserves the movement away without over-specifying
    manner.
- source_word: κατὰ σπουδήν
  chosen: in haste
  alternatives:
  - quickly
  - with urgency
  lexicon: LSJ
  rationale: The idiom conveys speed and urgency. 'In haste' preserves the compact
    adverbial force and the narrative urgency better than a flatter 'quickly.'
- source_word: ἀπέστρεψεν εἰς Ἀντιόχειαν
  chosen: returned to Antioch
  alternatives:
  - turned back to Antioch
  - went back to Antioch
  lexicon: LSJ
  rationale: ἀποστρέφω with εἰς here indicates return to a prior destination. 'Returned
    to Antioch' is idiomatic and accurately reflects the directional sense.
- source_word: εὗρεν Φίλιππον κυριεύοντα τῆς πόλεως
  chosen: he found Philip in control of the city
  alternatives:
  - he found Philip ruling the city
  - he found Philip master of the city
  lexicon: LSJ
  rationale: κυριεύω means to rule, control, or have dominion over. 'In control of
    the city' is clear modern English and avoids importing regal nuance stronger than
    the Greek requires.
- source_word: ἐπολέμησεν πρὸς αὐτόν
  chosen: he fought against him
  alternatives:
  - he made war against him
  - he battled him
  lexicon: LSJ
  rationale: The verb πολεμέω denotes engaging in warfare or fighting. 'Fought against
    him' is straightforward and fits the immediate military context.
- source_word: κατελάβετο τὴν πόλιν βίᾳ
  chosen: took the city by force
  alternatives:
  - captured the city by force
  - seized the city violently
  lexicon: LSJ
  rationale: καταλαμβάνω here has the sense of seizing/capturing, and βίᾳ specifies
    forceful means. 'Took the city by force' is concise, idiomatic, and preserves
    the military outcome and manner.
