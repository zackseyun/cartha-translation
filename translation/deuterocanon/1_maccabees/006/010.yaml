translation:
  text: And he called all his friends and said to them, “Sleep departs from my eyes,
    and my heart sinks from anxiety.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all his companions' or 'all his advisers'; Greek 'friends' can also
      refer to members of a ruler's inner circle.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Sleep departs from my eyes.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'my heart is cast down' or 'I am faint at heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: LSJ
  rationale: Standard aorist of καλέω meaning 'call' or 'summon.' 'Called' is natural
    English and sufficiently formal here.
- source_word: πάντας τοὺς φίλους αὐτοῦ
  chosen: all his friends
  alternatives:
  - all his companions
  - all his advisers
  lexicon: LSJ
  rationale: φίλοι literally means 'friends.' In Hellenistic court context it can
    denote royal associates or advisers, but the text itself says 'friends,' so the
    main text preserves that straightforwardly without importing a technical court
    title.
- source_word: Ἀφίσταται ἀπὸ τῶν ὀφθαλμῶν μου ὁ ὕπνος
  chosen: Sleep departs from my eyes
  alternatives:
  - Sleep has left my eyes
  - Sleep is gone from my eyes
  lexicon: LSJ
  rationale: ἀφίσταται means 'withdraws/departs.' The idiom with 'from my eyes' expresses
    sleeplessness. 'Departs from my eyes' keeps the vivid source-language imagery
    while remaining readable.
- source_word: συνέπεπτον τῇ καρδίᾳ
  chosen: my heart sinks
  alternatives:
  - I collapse in heart
  - my heart is cast down
  - I am faint at heart
  lexicon: LSJ
  rationale: The perfect form conveys a state of collapse or dejection. The dative
    τῇ καρδίᾳ marks the sphere ('in heart'). 'My heart sinks' is an idiomatic English
    equivalent that preserves the emotional force without wooden awkwardness.
- source_word: ἀπὸ τῆς μερίμνης
  chosen: from anxiety
  alternatives:
  - from worry
  - because of care
  lexicon: LSJ
  rationale: μέριμνα denotes anxiety, worry, or care. 'Anxiety' best matches the gravity
    of the king's troubled state in this context.
