translation:
  text: And Lysias heard that Philip, whom King Antiochus had appointed while he was
    still alive to bring up Antiochus his son so that he might reign,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that he might become king.' The Greek infinitive βασιλεῦσαι can
      be rendered either as 'reign' or more explicitly as accession to kingship.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - was informed
  lexicon: LSJ
  rationale: The aorist of ἀκούω here introduces reported news. 'Heard' is the most
    direct and natural English equivalent, while still allowing the sense of receiving
    information.
- source_word: κατέστησεν
  chosen: had appointed
  alternatives:
  - appointed
  - put in charge
  - established
  lexicon: LSJ
  rationale: The verb indicates formal designation to a role. 'Had appointed' fits
    the past-perfect relationship in English, since the appointment preceded Lysias's
    hearing.
- source_word: ἔτι ζῶντος αὐτοῦ
  chosen: while he was still alive
  alternatives:
  - while he yet lived
  - during his lifetime
  lexicon: LSJ
  rationale: This genitive absolute refers to King Antiochus being alive at the time
    of the appointment. 'While he was still alive' is clear modern English and preserves
    the temporal force.
- source_word: ἐκθρέψαι
  chosen: to bring up
  alternatives:
  - to rear
  - to raise
  - to nurture
  lexicon: LSJ
  rationale: The infinitive denotes rearing or bringing up a child. 'Bring up' is
    idiomatic and broad enough to include guardianship and education without overstating
    a specific pedagogical role.
- source_word: εἰς τὸ βασιλεῦσαι αὐτόν
  chosen: so that he might reign
  alternatives:
  - for him to become king
  - to make him king
  - for his reigning
  lexicon: LSJ
  rationale: 'The construction expresses purpose or intended result: Philip was to
    rear the king''s son with a view to his accession. ''So that he might reign''
    preserves that purposive nuance without adding an explicit object not present
    in Greek.'
- source_word: βασιλεύς
  chosen: King
  alternatives:
  - the king
  lexicon: LSJ
  rationale: 'With ὁ βασιλεὺς Ἀντίοχος, English idiom prefers the title before the
    name: ''King Antiochus.'''
