translation:
  text: And they showed the elephants the blood of grapes and mulberries, to provoke
    them for battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the blood of grapes and mulberries,' a vivid expression for
      their red juice.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδειξαν
  chosen: they showed
  alternatives:
  - they displayed
  - they presented
  lexicon: LSJ
  rationale: A straightforward past narrative verb; 'showed' is the most natural English
    equivalent and fits the construction with the dative 'to the elephants.'
- source_word: τοῖς ἐλέφασιν
  chosen: the elephants
  alternatives:
  - to the elephants
  lexicon: LSJ
  rationale: Dative plural after ἔδειξαν. In idiomatic English the indirect object
    can be rendered without repeating 'to' in the main text.
- source_word: αἷμα σταφυλῆς καὶ μόρων
  chosen: the blood of grapes and mulberries
  alternatives:
  - grape-blood and mulberries
  - juice of grapes and mulberries
  - blood of grapes and of mulberries
  lexicon: LSJ
  rationale: The Greek literally says 'blood of grape and mulberries.' Retaining 'blood'
    preserves the vivid metaphor of red juice rather than flattening it to 'juice.'
    'Grapes' is supplied idiomatically from the singular collective σταφυλῆς. The
    second noun μόρων refers to mulberries, not 'myrrh' or another substance.
- source_word: τοῦ παραστῆσαι
  chosen: to provoke
  alternatives:
  - to set
  - to bring forward
  - to incite
  - to make ready
  lexicon: LSJ
  rationale: The articular infinitive with τοῦ expresses purpose. In this military
    context, with elephants being stimulated by the sight/smell of red fruit juice,
    the sense is to stir them up or incite them. 'Provoke' captures that purposive
    activation better than the more wooden 'set before' or 'present.'
- source_word: εἰς τὸν πόλεμον
  chosen: for battle
  alternatives:
  - into battle
  - for the war
  lexicon: LSJ
  rationale: A military idiom. 'For battle' is concise and natural in English while
    preserving the purposive sense of preparation for combat.
