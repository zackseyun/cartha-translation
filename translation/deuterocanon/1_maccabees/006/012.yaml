theological_decisions:
- issue: Moral characterization of Antiochus's actions in his own speech
  chosen_reading: Rendered κακῶν as 'evils'
  alternative_readings:
  - wrongs
  - evil things
  rationale: The verse presents the speaker acknowledging moral guilt, not merely
    political mistakes. 'Evils' preserves the ethical weight without adding doctrinal
    interpretation.
