translation:
  text: 'But now I remember the evils that I did in Jerusalem: I took all the silver
    vessels and the gold vessels that were in it, and I sent orders to wipe out the
    inhabitants of Judah for nothing.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without cause' or 'groundlessly' for the idiom 'for nothing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μιμνήσκομαι
  chosen: I remember
  alternatives:
  - I recall
  - I am mindful of
  lexicon: LSJ
  rationale: Present middle conveys present recollection; 'I remember' is natural
    modern English and preserves the king's reflective admission.
- source_word: τῶν κακῶν
  chosen: the evils
  alternatives:
  - the wrongs
  - the wicked things
  - the harms
  lexicon: LSJ
  rationale: κακά here refers to morally evil deeds rather than merely unfortunate
    events. 'Evils' preserves the ethical force of his confession.
- source_word: σκεύη
  chosen: vessels
  alternatives:
  - articles
  - objects
  - utensils
  lexicon: LSJ
  rationale: In temple-plunder context, 'vessels' is the standard and suitably concrete
    rendering for cultic valuables.
- source_word: τὰ ἀργυρᾶ καὶ τὰ χρυσᾶ
  chosen: the silver vessels and the gold vessels
  alternatives:
  - the silver and gold vessels
  - the silverware and goldware
  lexicon: LSJ
  rationale: The adjectives are substantivized by repetition with σκεύη understood/apposed;
    repeating 'vessels' in English avoids ambiguity and keeps the inventory-like force.
- source_word: ἐξαπέστειλα
  chosen: I sent orders
  alternatives:
  - I sent out
  - I dispatched
  lexicon: LSJ
  rationale: The verb by itself is 'I sent out,' but the following articular infinitive
    expresses purpose/content. 'I sent orders' makes explicit in idiomatic English
    that a command was dispatched, not merely a person.
- source_word: τοῦ ἐξᾶραι
  chosen: to wipe out
  alternatives:
  - to root out
  - to remove
  - to destroy
  lexicon: LSJ
  rationale: The infinitive from ἐξαίρω here has a force of removing utterly or extirpating
    inhabitants. 'Wipe out' communicates the severity better than the weaker 'remove.'
- source_word: τοὺς κατοικοῦντας Ἰούδα
  chosen: the inhabitants of Judah
  alternatives:
  - those dwelling in Judah
  - the people living in Judea
  lexicon: LSJ
  rationale: The participle with Ἰούδα denotes the people residing in the region.
    'Inhabitants of Judah' is concise and faithful.
- source_word: διὰ κενῆς
  chosen: for nothing
  alternatives:
  - without cause
  - in vain
  - groundlessly
  lexicon: LSJ
  rationale: The idiom indicates emptiness or lack of cause. 'For nothing' is a direct
    rendering, though it carries the sense 'without good reason' rather than 'without
    result.'
