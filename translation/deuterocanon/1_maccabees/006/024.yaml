translation:
  text: and to follow his commands, because those of our people were becoming alienated
    from us on account of this, except for as many as were found among us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek text is syntactically compressed in the final clause; 'except for
      as many as were found among us' preserves the wording closely, though the exact
      nuance of affiliation may also be understood as 'except those found on our side.'
    reason: alternative_reading
lexical_decisions:
- source_word: κατακολουθεῖν
  chosen: to follow
  alternatives:
  - to comply with
  - to adhere to
  lexicon: LSJ
  rationale: The infinitive means to follow after or comply with. With τοῖς προστάγμασιν,
    'follow' is natural modern English that preserves the sense of obedience without
    over-paraphrasing.
- source_word: προστάγμασιν
  chosen: commands
  alternatives:
  - orders
  - decrees
  lexicon: LSJ
  rationale: The term denotes authoritative directives. 'Commands' fits the personal
    possessive αὐτοῦ ('his') better than the more impersonal 'decrees,' while still
    conveying authority.
- source_word: οἱ τοῦ λαοῦ ἡμῶν
  chosen: those of our people
  alternatives:
  - our people
  - the men of our people
  lexicon: LSJ
  rationale: The Greek is somewhat elliptical, literally 'those of our people.' This
    preserves the wording without adding 'men' where the text does not require it,
    and avoids flattening the phrase to simply 'our people.'
- source_word: χάριν τούτου
  chosen: on account of this
  alternatives:
  - for this reason
  - because of this
  lexicon: LSJ
  rationale: The phrase expresses cause. 'On account of this' is a clear and fairly
    formal rendering that matches the explanatory ὅτι-clause.
- source_word: ἠλλοτριοῦντο
  chosen: were becoming alienated
  alternatives:
  - were estranging themselves
  - were becoming separated
  - were turning into foreigners
  lexicon: LSJ
  rationale: The imperfect middle/passive suggests an ongoing process of becoming
    alien or estranged. 'Were becoming alienated' best captures the social-political
    distancing implied here.
- source_word: ἀφʼ ἡμῶν
  chosen: from us
  alternatives:
  - away from us
  lexicon: LSJ
  rationale: Standard rendering of separation with ἀπό; 'from us' is sufficient and
    idiomatic.
- source_word: πλὴν ὅσοι εὑρίσκοντο ἀφʼ ἡμῶν
  chosen: except for as many as were found among us
  alternatives:
  - except those who were found with us
  - except as many as were on our side
  lexicon: LSJ
  rationale: πλήν introduces an exception. εὑρίσκοντο is literally 'were found.' The
    repeated ἀφʼ ἡμῶν is awkward if rendered identically; in this clause 'among us'
    communicates location/association more naturally in English while preserving the
    sense.
