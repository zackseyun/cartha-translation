translation:
  text: And they went to the king and said, “How long will you not act…?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Zone 1 Greek for this verse is incomplete in the provided witness,
      ending after 'How long will you not act/do…?' The ellipsis reflects source-level
      truncation rather than a deliberate paraphrase.
    reason: textual_variant
  - marker: b
    text: Or, more formally, 'How long will you not do…?' The Greek verb ποιήσεις
      can mean 'do' broadly; 'act' was chosen for clearer English in a truncated clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθησαν
  chosen: went
  alternatives:
  - traveled
  - proceeded
  lexicon: LSJ
  rationale: Aorist passive/deponent of πορεύομαι commonly means 'go' or 'travel.'
    In this narrative setting, 'went' is the most natural and sufficiently formal
    rendering.
- source_word: πρὸς τὸν βασιλέα
  chosen: to the king
  alternatives:
  - toward the king
  - before the king
  lexicon: LSJ
  rationale: πρός with the accusative here marks movement toward a person for audience
    or petition. 'To the king' is idiomatic English and fits the narrative context.
- source_word: Ἕως πότε
  chosen: How long
  alternatives:
  - Until when
  - How much longer
  lexicon: LSJ
  rationale: This idiom introduces a complaint or urgent question about delay. 'How
    long' is the standard and natural English equivalent.
- source_word: οὐ ποιήσεις
  chosen: will you not act
  alternatives:
  - will you not do
  - will you not take action
  lexicon: LSJ
  rationale: ποιέω is semantically broad ('do, make, act'). Because the object is
    absent in the extant Zone 1 text and the clause is truncated, 'act' preserves
    the sense of demanded intervention without over-specifying what is to be done.
