translation:
  text: in the one hundred and fiftieth year; and he made against them missile-launchers
    and siege engines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'engines for shooting missiles'; the Greek term βελοστασίεις refers to
      devices for launching projectiles and is not necessarily limited to one specific
      type of artillery.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτους πεντηκοστοῦ καὶ ἑκατοστοῦ
  chosen: in the one hundred and fiftieth year
  alternatives:
  - in year one hundred and fifty
  - in the hundred and fiftieth year
  lexicon: LSJ
  rationale: The genitive dating formula is idiomatically rendered in English with
    'in the ... year.' The Greek order literally gives 'of year fiftieth and hundredth,'
    meaning year 150.
- source_word: ἐποίησεν
  chosen: he made
  alternatives:
  - he constructed
  - he built
  lexicon: LSJ
  rationale: ποιέω is broad ('make/do'). Here it refers to preparing military devices;
    'made' stays close to the Greek while remaining natural English.
- source_word: ἐπʼ αὐτούς
  chosen: against them
  alternatives:
  - for use against them
  - upon them
  lexicon: LSJ
  rationale: With hostile military context, ἐπί with accusative/pronoun is best expressed
    as opposition or direction against the besieged party.
- source_word: βελοστασίεις
  chosen: missile-launchers
  alternatives:
  - engines for shooting missiles
  - battering devices for darts
  lexicon: LSJ
  rationale: The term denotes devices associated with launching projectiles (belos
    = missile/dart). 'Missile-launchers' is concise, understandable modern English,
    and avoids overprecision such as 'catapults' where the Greek is somewhat broader.
- source_word: μηχανάς
  chosen: siege engines
  alternatives:
  - machines
  - war engines
  lexicon: LSJ
  rationale: In this military context, μηχαναί are engineered devices used in siege
    warfare. 'Siege engines' gives the contextual sense more clearly than the generic
    'machines.'
