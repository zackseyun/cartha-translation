translation:
  text: to raise him up to reign. And Antiochus the king died there, in the one hundred
    forty-ninth year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'to raise him to reign as king.' The infinitive depends
      on the preceding context and refers to rearing the successor for kingship.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκθρέψαι
  chosen: to raise him up
  alternatives:
  - to rear him
  - to bring him up
  - to nourish him
  lexicon: LSJ
  rationale: The infinitive continues the prior context and denotes bringing up or
    rearing a child. 'Raise him up' is natural modern English and fits the succession
    context without over-paraphrasing.
- source_word: βασιλεύειν
  chosen: to reign as king
  alternatives:
  - to rule
  - to be king
  lexicon: LSJ
  rationale: The verb specifically denotes exercising kingship. 'Reign as king' preserves
    the royal sense more explicitly than the broader 'rule.'
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - passed away
  lexicon: LSJ
  rationale: The plain verb for death should be rendered directly and without euphemism.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: LSJ
  rationale: A straightforward adverb of place; 'there' is the most natural equivalent.
- source_word: ἔτους ἐνάτου καὶ τεσσερακοστοῦ καὶ ἑκατοστοῦ
  chosen: in the one hundred forty-ninth year
  alternatives:
  - in year one hundred and forty-nine
  lexicon: LSJ
  rationale: The Greek expresses the Seleucid year numerically. English idiom is best
    served by 'the one hundred forty-ninth year,' preserving the chronological notice
    clearly.
