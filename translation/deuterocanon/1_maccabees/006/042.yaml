lexical_decisions:
- source_word: ἤγγισεν
  chosen: advanced
  alternatives:
  - drew near
  - approached
  lexicon: LSJ
  rationale: The verb literally means 'drew near/approached,' but in this military
    context with εἰς παράταξιν following, 'advanced' conveys movement toward engagement
    in natural English without losing the sense of approach.
- source_word: παρεμβολὴ
  chosen: camp
  alternatives:
  - army camp
  - encampment
  lexicon: LSJ
  rationale: παρεμβολή commonly denotes a camp or encampment, especially military.
    'Camp' is concise and fits both occurrences in the verse.
- source_word: εἰς παράταξιν
  chosen: into battle formation
  alternatives:
  - for battle
  - into line of battle
  - into formation
  lexicon: LSJ
  rationale: The phrase indicates arrangement for combat, not merely generic movement.
    'Into battle formation' preserves the military nuance more clearly than the broader
    'for battle.'
- source_word: ἔπεσαν
  chosen: fell
  alternatives:
  - were killed
  - died
  lexicon: LSJ
  rationale: The Greek says 'fell,' a standard battle idiom that can imply death without
    over-interpreting beyond the wording. It preserves the source's martial style.
- source_word: ἑξακισχίλιοι ἄνδρες
  chosen: six thousand men
  alternatives:
  - six thousand soldiers
  lexicon: LSJ
  rationale: The text reads 'six thousand men.' While they are clearly combatants
    in context, 'men' is the direct rendering and matches the source's gendered wording.
