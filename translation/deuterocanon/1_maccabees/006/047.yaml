translation:
  text: And they saw the strength of the kingdom and the onrush of the forces, and
    they turned away from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the onslaught of the forces' or 'the charge of the troops.' The Greek
      term conveys a forceful forward movement in battle.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'from them' (plural), likely referring to the opposing forces,
      though it may also summarize the royal power just mentioned.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰσχὺν
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: LSJ
  rationale: ἰσχύς commonly denotes strength or might. 'Strength' is clear modern
    English and fits the military-political context of the kingdom's power without
    overstating abstraction.
- source_word: βασιλείας
  chosen: kingdom
  alternatives:
  - royal power
  - kingship
  - realm
  lexicon: LSJ
  rationale: βασιλεία can denote reign, kingship, or kingdom. Here, with military
    force in view, it refers to the power/domain of the monarchy. 'Kingdom' is the
    most natural and sufficiently broad rendering.
- source_word: ὁρμήμα
  chosen: fierce rush
  alternatives:
  - onslaught
  - impetus
  - charge
  lexicon: LSJ
  rationale: ὁρμήμα denotes a violent movement, rush, or assault. 'Fierce rush' preserves
    the vividness of the noun while remaining readable; 'onslaught' was possible but
    slightly more interpretive.
- source_word: δυνάμεων
  chosen: forces
  alternatives:
  - armies
  - troops
  - host
  lexicon: LSJ
  rationale: δυνάμεις in military contexts often means forces or troops. 'Forces'
    is broad and natural, avoiding overprecision where the Greek is general.
- source_word: ἐξέκλιναν
  chosen: turned away
  alternatives:
  - withdrew
  - veered away
  - fell back
  lexicon: LSJ
  rationale: ἐκκλίνω means to turn aside or turn away. 'Turned away' stays close to
    the Greek while allowing the military retreat sense to be inferred from context.
- source_word: ἀπʼ αὐτῶν
  chosen: from them
  alternatives:
  - from it
  lexicon: Greek grammar
  rationale: The plural αὐτῶν most naturally refers back to the immediately preceding
    plural 'forces,' though it may summarize the opposing power more broadly. 'From
    them' preserves the Greek number and avoids collapsing the referent.
