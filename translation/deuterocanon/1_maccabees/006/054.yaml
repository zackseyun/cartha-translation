translation:
  text: And a few men were left in the sanctuary, because the famine had overpowered
    them; and they were scattered, each to his own place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the holy place' or 'in the holy precincts.' The Greek literally says
      'in the holy [things/places],' a temple-related expression referring to the
      sacred area.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπελείφθησαν
  chosen: were left
  alternatives:
  - remained
  - were left behind
  lexicon: LSJ
  rationale: Passive of ὑπολείπω, indicating that only a remnant remained after others
    had gone. 'Were left' is natural English and preserves the passive sense.
- source_word: ἐν τοῖς ἁγίοις
  chosen: in the sanctuary
  alternatives:
  - in the holy place
  - in the holy precincts
  - in the holy things
  lexicon: LSJ
  rationale: In this military-temple context, the phrase refers to the sacred temple
    area rather than abstract 'holy things.' 'Sanctuary' gives a clear singular English
    rendering for the sacred precinct intended.
- source_word: ἄνδρες ὀλίγοι
  chosen: a few men
  alternatives:
  - few men
  - a small number of men
  lexicon: LSJ
  rationale: ἄνδρες is specifically masculine, not generic humanity; 'men' preserves
    the gendered reference, and 'a few' idiomatically renders ὀλίγοι.
- source_word: κατεκράτησεν αὐτῶν ὁ λιμός
  chosen: the famine had overpowered them
  alternatives:
  - the famine had prevailed against them
  - the famine had seized them
  - the famine had mastered them
  lexicon: LSJ
  rationale: κατακρατέω here conveys gaining mastery over or overpowering. 'Overpowered'
    communicates the force of the famine's effect more clearly than the more wooden
    'prevailed against.'
- source_word: ἐσκορπίσθησαν
  chosen: they were scattered
  alternatives:
  - they dispersed
  - they were dispersed
  lexicon: LSJ
  rationale: The passive indicates the result that they ended up scattered. 'Were
    scattered' preserves both the image and the passive form.
- source_word: ἕκαστος εἰς τὸν τόπον αὐτοῦ
  chosen: each to his own place
  alternatives:
  - each to his own home
  - each to his own location
  lexicon: LSJ
  rationale: τόπος is broadly 'place.' 'Home' would over-specify the destination;
    'his own place' stays closer to the Greek while remaining readable.
