translation:
  text: And Judas decided to root them out, and he assembled all the people to besiege
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to surround them' more literally, 'to sit around them.' The phrase is
      a military expression for laying siege.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλογίσατο
  chosen: decided
  alternatives:
  - considered
  - resolved
  - planned
  lexicon: BDAG
  rationale: The middle of λογίζομαι here expresses deliberate resolve rather than
    mere mental calculation. 'Decided' gives the sense of a settled intention in natural
    English.
- source_word: ἐξᾶραι
  chosen: to root them out
  alternatives:
  - to remove them
  - to destroy them
  - to take them away
  lexicon: LSJ
  rationale: The infinitive conveys forceful removal. 'Root them out' captures the
    hostile, eliminative sense better than the weaker 'remove,' while avoiding overprecision
    beyond the Greek.
- source_word: ἐξεκκλησίασεν
  chosen: assembled
  alternatives:
  - called together
  - convened
  lexicon: LSJ
  rationale: The verb means to gather or convene an assembly. 'Assembled' is concise
    and idiomatic, with 'all the people' supplying the object.
- source_word: πάντα τὸν λαόν
  chosen: all the people
  alternatives:
  - the whole people
  - all the army
  lexicon: LSJ
  rationale: The phrase is literally 'all the people.' In context it likely refers
    to the gathered fighting force/community, but the Greek says 'people,' so that
    wording is retained.
- source_word: τοῦ περικαθίσαι ἐπʼ αὐτούς
  chosen: to besiege them
  alternatives:
  - to sit around them
  - to encamp against them
  - to surround them
  lexicon: LSJ
  rationale: The articular infinitive with purpose sense indicates why he assembled
    the people. περικάθημαι/περικαθίζω in military context means to sit around, hence
    'besiege.' This is clearer in English than the more literal but awkward 'sit around
    them.'
