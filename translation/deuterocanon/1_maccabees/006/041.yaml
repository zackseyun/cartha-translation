  text: καὶ ἐσαλεύοντο πάντες οἱ ἀκούοντες φωνῆς πλήθους αὐτῶν καὶ ὁδοιπορίας τοῦ
    πλήθους καὶ συγκρουσμοὺς τῶν ὅπλων· ἦν γὰρ ἡ παρεμβολὴ μεγάλη σφόδρα καὶ ἰσχυρά.
