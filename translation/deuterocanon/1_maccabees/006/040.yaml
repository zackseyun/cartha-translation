translation:
  text: And part of the king’s camp spread out over the high mountains, and some over
    the lowlands; and they advanced securely and in formation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'some over the lower places.' The Greek contrasts the high mountains
      with lower ground.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξετάθη
  chosen: spread out
  alternatives:
  - was extended
  - deployed itself
  lexicon: LSJ
  rationale: The passive/aorist form conveys extension or deployment of troops over
    terrain. 'Spread out' is natural military English and fits the camp's distribution
    across elevations.
- source_word: μέρος τι
  chosen: part
  alternatives:
  - a certain part
  - some portion
  lexicon: LSJ
  rationale: The idiom indicates an indefinite portion of the army. 'Part' is concise
    and preserves the non-specific sense without awkwardness.
- source_word: παρεμβολῆς
  chosen: camp
  alternatives:
  - army camp
  - encampment
  lexicon: LSJ
  rationale: In military context the term refers to the encamped force. 'Camp' is
    the most direct rendering; the following clauses show troop movement, so the sense
    is the king's military encampment/host.
- source_word: ἐπὶ τὰ ὑψηλὰ ὄρη
  chosen: over the high mountains
  alternatives:
  - onto the high mountains
  - upon the high hills
  lexicon: LSJ
  rationale: ἐπί with the accusative here marks extension over terrain. 'High mountains'
    reflects the literal wording better than smoothing to 'hills.'
- source_word: τινες ἐπὶ τὰ ταπεινά
  chosen: some over the lowlands
  alternatives:
  - some onto the low ground
  - some over the lower places
  lexicon: LSJ
  rationale: The adjective used substantivally contrasts with the high mountains and
    denotes lower ground. 'Lowlands' gives clear English while preserving the topographical
    contrast.
- source_word: ἤρχοντο
  chosen: they advanced
  alternatives:
  - they came
  - they proceeded
  - they marched
  lexicon: LSJ
  rationale: In this military narrative, the imperfect describes movement of the forces.
    'Advanced' captures purposeful troop movement better than the more generic 'came.'
- source_word: ἀσφαλῶς
  chosen: securely
  alternatives:
  - safely
  - confidently
  lexicon: LSJ
  rationale: The adverb indicates movement with security or without fear of disruption.
    'Securely' preserves that nuance more closely than merely 'safely.'
- source_word: τεταγμένως
  chosen: in formation
  alternatives:
  - in order
  - in battle order
  - in an orderly way
  lexicon: LSJ
  rationale: From military ordering/arrangement, the adverb suggests disciplined array.
    'In formation' communicates ordered troop movement in idiomatic English.
