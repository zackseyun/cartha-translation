translation:
  text: And he came to terms with those in Bethsura and went out from the city, because
    they had no provisions there to remain shut up in it, because it was a sabbath
    year for the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'it was a sabbath for the land,' referring to the sabbatical
      year when the land lay fallow.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν μετὰ τῶν ἐκ Βεθσούρων
  chosen: he came to terms with those in Bethsura
  alternatives:
  - he made an agreement with those in Bethsura
  - he dealt with those from Bethsura
  lexicon: LSJ
  rationale: The idiom ἐποιεῖν μετά τινος in historical narrative commonly conveys
    making terms or an agreement with someone. 'Came to terms with' fits the military-siege
    context better than the overly vague 'dealt with.'
- source_word: ἐξῆλθε ἐκ τῆς πόλεως
  chosen: went out from the city
  alternatives:
  - left the city
  - came out of the city
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist verb plus prepositional phrase.
    'Went out from' preserves the movement without overinterpreting whether it implies
    surrender or evacuation.
- source_word: διατροφή
  chosen: provisions
  alternatives:
  - food
  - supplies
  - sustenance
  lexicon: LSJ
  rationale: διατροφή denotes means of nourishment or maintenance. In a siege setting,
    'provisions' best captures the practical sense of stored food/supplies without
    narrowing too strictly to food alone.
- source_word: τοῦ συνκλεισθαι ἐν αὐτῇ
  chosen: to remain shut up in it
  alternatives:
  - to be shut up in it
  - to stay confined in it
  lexicon: LSJ
  rationale: The articular infinitive expresses the circumstance/purpose related to
    their lack of provisions. 'Remain shut up in it' brings out the ongoing state
    of being enclosed in the city during siege conditions.
- source_word: σάββατον ἦν τῇ γῇ
  chosen: it was a sabbath year for the land
  alternatives:
  - the land was observing a sabbath
  - it was a sabbath for the land
  lexicon: LSJ
  rationale: The phrase refers to the land's sabbatical rest year, explaining the
    shortage of provisions. English normally requires 'year' to make the sense clear;
    without it, readers may mistake it for a weekly Sabbath.
