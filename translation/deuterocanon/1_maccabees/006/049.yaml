theological_decisions:
- issue: Interpretation of σάββατον ἦν τῇ γῇ
  chosen_reading: sabbath year for the land
  alternative_readings:
  - a sabbath for the land
  rationale: The historical context in 1 Maccabees concerns scarcity during siege
    because agricultural production was interrupted in a sabbatical year. Rendering
    the phrase as 'sabbath year for the land' communicates the likely referent without
    importing extra theology beyond the text.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve source sense over traditional ambiguity.'
