translation:
  text: And the king rose early in the morning and moved the camp out in full force
    on the road to Beth-zachariah, and the forces drew up for battle, and they sounded
    the trumpets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the way of Beth-zachariah.' The Greek expression can denote movement
      along the route leading there.
    reason: lexical_alternative
  - marker: b
    text: Or 'with its full rush/impetus.' The phrase translated 'in full force' reflects
      the Greek word for onset or momentum in a military movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤρθρισεν
  chosen: rose early
  alternatives:
  - set out at dawn
  - was up early
  lexicon: LSJ
  rationale: The verb denotes rising or being active early, at dawn. 'Rose early'
    is natural English and preserves the temporal emphasis without over-specifying
    departure.
- source_word: ἀπῆρεν τὴν παρεμβολὴν
  chosen: moved the camp out
  alternatives:
  - broke camp
  - marched the camp
  lexicon: LSJ
  rationale: ἀπαίρω here with παρεμβολή refers to lifting or moving the encampment.
    'Moved the camp out' is clear modern English and keeps the military sense. 'Broke
    camp' is possible but can sound slightly idiomatic and may underplay the organized
    movement.
- source_word: ἐν ὁρμήματι αὐτῆς
  chosen: in full force
  alternatives:
  - with its full rush
  - with all its momentum
  - with its whole assaulting force
  lexicon: LSJ
  rationale: ὁρμή can denote rush, onset, or impetuous movement. In this military
    context modifying the camp's movement, the phrase conveys the army advancing with
    its full strength/impetus. 'In full force' captures the martial sense idiomatically.
- source_word: κατὰ τὴν ὁδὸν Βεθζαχαριά
  chosen: on the road to Beth-zachariah
  alternatives:
  - by the way of Beth-zachariah
  - along the road toward Beth-zachariah
  lexicon: LSJ
  rationale: κατά with ὁδός commonly indicates movement along or by way of a road.
    'On the road to' is concise and natural, expressing direction toward Beth-zachariah.
- source_word: διετάξαντο αἱ δυνάμεις εἰς τὸν πόλεμον
  chosen: the forces drew up for battle
  alternatives:
  - the forces were arrayed for battle
  - the troops deployed for war
  lexicon: LSJ
  rationale: διατάσσω in military contexts means arrange or draw up in battle order.
    'Drew up for battle' preserves the tactical sense in readable English.
- source_word: ἐσάλπισαν ταῖς σάλπιγξιν
  chosen: they sounded the trumpets
  alternatives:
  - they blew the trumpets
  - they gave a trumpet blast
  lexicon: LSJ
  rationale: The cognate verb-object construction emphasizes the act of trumpet signaling.
    'Sounded the trumpets' is standard English for military signaling and preserves
    the plural instruments.
- source_word: Βεθζαχαριά
  chosen: Beth-zachariah
  alternatives:
  - Beth-zacharias
  - Beth Zechariah
  rationale: A standard transliteration of the place name is preferred, following
    the project's policy to transliterate names rather than translate them.
