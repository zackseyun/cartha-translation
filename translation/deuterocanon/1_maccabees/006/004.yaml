translation:
  text: And they rose up against him in battle, and he fled and went away from there
    with great sorrow, to return to Babylon.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνέστησαν ... εἰς πόλεμον
  chosen: rose up against him in battle
  alternatives:
  - went to war against him
  - attacked him
  - rose against him for battle
  lexicon: LSJ
  rationale: ἀνίστημι with εἰς πόλεμον idiomatically conveys hostile action or taking
    the field against someone. 'Rose up against him in battle' preserves the verbal
    imagery while remaining natural English.
- source_word: ἔφυγεν
  chosen: he fled
  alternatives:
  - he escaped
  - he ran away
  lexicon: LSJ
  rationale: The verb straightforwardly means 'fled.' This is more precise than the
    broader 'escaped' and keeps the narrative force.
- source_word: ἀπῆλθεν ἐκεῖθεν
  chosen: went away from there
  alternatives:
  - departed from there
  - left there
  lexicon: LSJ
  rationale: The phrase marks physical departure from the place. 'Went away from there'
    is clear modern English and preserves the deictic ἐκεῖθεν.
- source_word: μετὰ λύπης μεγάλης
  chosen: with great sorrow
  alternatives:
  - in great grief
  - with great distress
  lexicon: LSJ
  rationale: λύπη denotes sorrow, grief, or distress. 'Great sorrow' is a direct and
    readable rendering that fits the emotional tone without overinterpreting.
- source_word: ἀποστρέψαι εἰς Βαβυλῶνα
  chosen: to return to Babylon
  alternatives:
  - to turn back to Babylon
  - to go back to Babylon
  lexicon: LSJ
  rationale: The infinitive expresses purpose or result connected with his departure.
    'To return to Babylon' is idiomatic English for ἀποστρέψαι here and preserves
    the directional sense.
