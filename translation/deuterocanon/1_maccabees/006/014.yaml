translation:
  text: Look, I am perishing in great grief in a foreign land. And he called Philip,
    one of his friends, and appointed him over all his kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am dying in great sorrow.' The Greek ἀπόλλυμαι can express perishing
      or dying, and λύπη can be rendered 'grief,' 'sorrow,' or 'distress.'
    reason: lexical_alternative
  - marker: b
    text: '''One of his friends'' may also reflect a court title for a royal associate
      or courtier, not merely a private friend.'
    reason: cultural_note
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Rendered as a natural but still vivid discourse marker in modern English.
    'Look' preserves the immediacy of the dying speaker better than the more archaic
    'Behold.'
- source_word: ἀπόλλυμαι
  chosen: I am perishing
  alternatives:
  - I am dying
  - I am being destroyed
  lexicon: BDAG
  rationale: The middle/passive form can denote ruin or death. In this context of
    the king's final words, 'I am perishing' preserves the Greek's broader sense of
    wasting away without over-specifying beyond the text, while still implying impending
    death.
- source_word: λύπῃ μεγάλῃ
  chosen: in great grief
  alternatives:
  - in great sorrow
  - from great distress
  lexicon: BDAG
  rationale: λύπη commonly denotes grief, sorrow, or distress. 'In great grief' closely
    reflects the dative construction and the emotional force of the phrase.
- source_word: ἐν γῇ ἀλλοτρίᾳ
  chosen: in a foreign land
  alternatives:
  - in an alien land
  - in another's land
  lexicon: BDAG
  rationale: A straightforward rendering of the phrase indicating he is away from
    his own country. 'Foreign land' is idiomatic and preserves the sense of estrangement.
- source_word: ἐκάλεσεν
  chosen: he called
  alternatives:
  - he summoned
  lexicon: BDAG
  rationale: The verb simply states that he had Philip brought or called. 'Called'
    is sufficiently broad and avoids adding procedural nuance unless context requires
    'summoned.'
- source_word: Φίλιππον
  chosen: Philip
  rationale: Personal name transliterated according to project policy.
- source_word: ἕνα τῶν φίλων αὐτοῦ
  chosen: one of his friends
  alternatives:
  - one of his companions
  - one of his courtiers
  lexicon: BDAG
  rationale: φίλος literally means 'friend,' though in Hellenistic court language
    it can denote a royal associate. The plain sense 'one of his friends' is retained
    in the main text; the courtly nuance is worth noting as an alternative but need
    not displace the literal rendering here.
- source_word: κατέστησεν
  chosen: appointed
  alternatives:
  - placed
  - set
  lexicon: BDAG
  rationale: In context the verb indicates formal installation into authority. 'Appointed'
    best communicates official designation in natural English.
- source_word: ἐπὶ πάσης τῆς βασιλείας αὐτοῦ
  chosen: over all his kingdom
  alternatives:
  - over his whole kingdom
  - over all his kingship
  lexicon: BDAG
  rationale: The phrase denotes authority over the entirety of the realm. 'Over all
    his kingdom' is idiomatic and clear; 'kingship' would sound abstract and less
    natural here.
