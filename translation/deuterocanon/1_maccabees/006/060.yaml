  text: καὶ ἤρεσεν ὁ λόγος ἐναντίον τοῦ βασιλέως καὶ τῶν ἀρχόντων, καὶ ἀπέστειλεν
    πρὸς αὐτοὺς εἰρηνεῦσαι, καὶ ἐπεδέξαντο.
