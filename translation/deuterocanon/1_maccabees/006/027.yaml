translation:
  text: And if he does not get ahead of them quickly, they will do greater things
    than these, and he will not be able to restrain them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'preempt them quickly' or 'overtake them quickly'; the Greek verb suggests
      acting before them or forestalling them.
    reason: lexical_alternative
  - marker: b
    text: Literally 'greater things than these'; in context this may mean more serious
      or more extensive actions.
    reason: lexical_alternative
lexical_decisions:
- source_word: προκαταλάβῃ
  chosen: get ahead of
  alternatives:
  - overtake
  - anticipate
  - preempt
  lexicon: LSJ
  rationale: The verb conveys acting before or forestalling others. 'Get ahead of'
    in context communicates preemptive action without over-specifying military imagery.
    'Preempt' is possible but more technical; 'overtake' can suggest mere pursuit
    rather than acting first.
- source_word: διὰ τάχους
  chosen: quickly
  alternatives:
  - with speed
  - swiftly
  - without delay
  lexicon: LSJ
  rationale: The phrase is idiomatic for promptness or speed. 'Quickly' is natural
    modern English and preserves the urgency.
- source_word: μείζονα τούτων
  chosen: greater things than these
  alternatives:
  - worse things than these
  - things greater than these
  lexicon: LSJ
  rationale: The comparative adjective literally means 'greater.' In context it likely
    implies more serious or more extensive actions, but 'greater things than these'
    preserves the Greek wording while allowing the contextual negative force to be
    inferred.
- source_word: κατασχεῖν
  chosen: restrain
  alternatives:
  - hold back
  - check
  - stop
  - gain control of
  lexicon: LSJ
  rationale: The infinitive from κατέχω/κατασχέω here denotes holding down or keeping
    in check. 'Restrain' fits the political-military context and reads naturally with
    'will not be able.'
- source_word: αὐτῶν
  chosen: them
  alternatives:
  - of them
  - over them
  lexicon: Greek grammar
  rationale: 'The genitive depends on the infinitive and is best rendered as the object
    in English: ''restrain them.'' A more literal ''of them'' would be unidiomatic.'
- source_word: οὐ δυνήσεται
  chosen: he will not be able
  alternatives:
  - he cannot
  - he will be unable
  lexicon: LSJ
  rationale: Future middle of δύναμαι expresses future inability. 'He will not be
    able' is the most straightforward rendering.
