translation:
  text: and that the temple in it was exceedingly rich, and that there were gold coverings
    there, and breastplates and weapons, which Alexander son of Philip, the Macedonian
    king, who first reigned over the Greeks, had left there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'golden coverings.' The Greek does not specify the exact form of these
      objects beyond their being coverings made of gold.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερὸν
  chosen: temple
  alternatives:
  - sanctuary
  - holy place
  lexicon: LSJ
  rationale: In this context ἱερὸν refers to the temple complex/shrine in the city,
    not merely a generic holy thing. 'Temple' is the most natural English rendering.
- source_word: πλούσιον σφόδρα
  chosen: exceedingly rich
  alternatives:
  - very wealthy
  - extremely rich
  lexicon: LSJ
  rationale: The phrase emphasizes great wealth. 'Exceedingly rich' preserves the
    intensification of σφόδρα while sounding natural in English.
- source_word: καλύμματα χρυσᾶ
  chosen: gold coverings
  alternatives:
  - golden coverings
  - golden veils
  lexicon: LSJ
  rationale: καλύμματα broadly denotes coverings. The exact objects are not fully
    specified by the Greek, so a transparent rendering 'gold coverings' is preferable
    to a more interpretive choice.
- source_word: θώρακες
  chosen: breastplates
  alternatives:
  - cuirasses
  - armor
  lexicon: LSJ
  rationale: θώρακες specifically denotes body armor/breastplates. 'Breastplates'
    is more precise than the broader 'armor' and more readable than 'cuirasses'.
- source_word: ὅπλα
  chosen: weapons
  alternatives:
  - arms
  - equipment
  lexicon: LSJ
  rationale: ὅπλα here refers to military gear left behind by Alexander. 'Weapons'
    is clear modern English and fits the list with 'breastplates'.
- source_word: κατέλειπεν
  chosen: had left
  alternatives:
  - left behind
  - deposited
  lexicon: LSJ
  rationale: The aorist refers to what Alexander left there in the past. English past
    perfect fits the reported-speech context introduced by the preceding verse.
- source_word: Ἀλέξανδρος ὁ τοῦ Φιλίππου
  chosen: Alexander son of Philip
  alternatives:
  - Alexander, the son of Philip
  - Alexander, Philip's son
  lexicon: LSJ
  rationale: The Greek patronymic is naturally rendered 'son of Philip' in English.
- source_word: ὁ βασιλεὺς ὁ Μακεδών
  chosen: the Macedonian king
  alternatives:
  - the king, the Macedonian
  - the Macedonian ruler
  lexicon: LSJ
  rationale: This appositional phrase identifies Alexander. 'The Macedonian king'
    is idiomatic and preserves both elements.
- source_word: ὃς ἐβασίλευσεν τοῖς Ἕλλησι πρῶτος
  chosen: who first reigned over the Greeks
  alternatives:
  - who was the first to reign over the Greeks
  - who first became king of the Greeks
  lexicon: LSJ
  rationale: ἐβασίλευσεν with dative τοῖς Ἕλλησι is best rendered 'reigned over the
    Greeks.' Including 'first' preserves πρῶτος without overexplaining the historical
    claim.
