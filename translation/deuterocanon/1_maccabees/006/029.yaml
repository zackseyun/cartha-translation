translation:
  text: And from other kings and from islands of the seas, mercenary forces came to
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mercenary forces.' The Greek literally has 'hired troops.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλέων ἑτέρων
  chosen: other kings
  alternatives:
  - other rulers
  lexicon: LSJ
  rationale: βασιλεύς ordinarily means 'king'; ἑτέρων marks them as distinct from
    the speaker's own side or realm. 'Other kings' is the most direct rendering.
- source_word: νήσων θαλασσῶν
  chosen: islands of the seas
  alternatives:
  - sea islands
  - islands
  lexicon: LSJ
  rationale: The genitive phrase is somewhat Hebraic/Septuagintal in feel. 'Islands
    of the seas' preserves the plural and the geographic breadth better than flattening
    to simply 'islands.'
- source_word: δυνάμεις
  chosen: troops
  alternatives:
  - forces
  - armies
  lexicon: LSJ
  rationale: In this military context δυνάμεις refers to armed forces. 'Troops' is
    natural modern English and fits the plural sense without overstating to full 'armies.'
- source_word: μισθωταί
  chosen: hired
  alternatives:
  - mercenary
  - mercenaries
  lexicon: LSJ
  rationale: μισθωτός/μισθωταί denotes those serving for pay. Rendering it adjectivally
    as 'hired troops' communicates the sense clearly in English. 'Mercenaries' is
    possible, but 'hired troops' stays closer to the Greek construction δυνάμεις μισθωταί.
- source_word: ἦλθον πρὸς αὐτόν
  chosen: came to him
  alternatives:
  - came to his aid
  - came to join him
  lexicon: LSJ
  rationale: The Greek states movement toward him without explicitly specifying purpose.
    'Came to him' preserves that restraint and avoids importing 'aid' or 'join' beyond
    the text.
