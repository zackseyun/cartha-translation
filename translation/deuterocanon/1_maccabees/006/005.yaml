translation:
  text: And someone came reporting to him in Persia that the forces that had gone
    into the land of Judah had been routed;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had turned back' or 'had been defeated.' The Greek verb can denote being
      turned or put to flight; the context favors a military setback.
    reason: lexical_alternative
  - marker: b
    text: '''Camps'' may also stand metonymically for the military forces in those
      camps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαγγέλλων
  chosen: reporting
  alternatives:
  - announcing
  - bringing word
  lexicon: BDAG
  rationale: The participle denotes bringing a report or message. 'Reporting' fits
    natural English while preserving the sense of relaying news to the king.
- source_word: Περσίδα
  chosen: Persia
  alternatives:
  - the Persian land
  - Persis
  lexicon: LSJ
  rationale: The accusative with εἰς indicates location/direction 'into Persia.' In
    idiomatic English after ἦλθεν, 'came ... in Persia' conveys that the report reached
    him while he was there.
- source_word: τετρόπωνται
  chosen: had been routed
  alternatives:
  - had turned back
  - had been defeated
  lexicon: LSJ
  rationale: The perfect form here conveys that the military force had been turned/put
    to flight. 'Had been routed' captures the military sense more specifically than
    the vaguer 'turned back,' while 'defeated' is possible but less vivid.
- source_word: παρεμβολαὶ
  chosen: camps
  alternatives:
  - army camps
  - encampments
  - forces
  lexicon: LSJ
  rationale: The noun literally refers to camps/encampments, but in military narrative
    it can stand for the encamped forces. 'Camps' keeps the concrete Greek term while
    remaining intelligible in context.
- source_word: πορευθεῖσαι
  chosen: had gone
  alternatives:
  - had marched
  - had set out
  lexicon: BDAG
  rationale: The participle indicates movement into Judah. 'Had gone' is straightforward
    and avoids overstating the military nuance, though 'marched' is contextually possible.
- source_word: γῆν Ἰούδα
  chosen: the land of Judah
  alternatives:
  - Judea
  - the land of Judea
  lexicon: LSJ
  rationale: A more formal rendering preserves the wording 'land of Judah' rather
    than normalizing to the later regional term 'Judea.' This stays closer to the
    Greek and the book's Jewish setting.
