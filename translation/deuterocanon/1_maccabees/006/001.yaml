translation:
  text: And King Antiochus was traveling through the upper regions, and he heard that
    in Elymais, in Persia, there was a city renowned for wealth, silver, and gold;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Persis,' the Persian region/province. The Greek term can be rendered
      more specifically than the broader 'Persia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διεπορεύετο
  chosen: was traveling through
  alternatives:
  - was passing through
  - went through
  - journeyed through
  lexicon: LSJ
  rationale: Imperfect middle conveys ongoing movement through a region rather than
    a single punctiliar act. 'Was traveling through' preserves the durative sense
    in natural English.
- source_word: τὰς ἐπάνω χώρας
  chosen: the upper regions
  alternatives:
  - the upper countries
  - the inland regions
  - the upland territories
  lexicon: LSJ
  rationale: χῶραι refers broadly to lands/regions. ἐπάνω literally means 'upper,'
    likely geographically inland/eastern from the narrator's perspective. 'Upper regions'
    keeps the spatial wording without over-interpreting it.
- source_word: Ἐλυμαΐς
  chosen: Elymais
  alternatives:
  - Elamais
  lexicon: LSJ
  rationale: This is a proper name and is transliterated per project philosophy. 'Elymais'
    is the standard English transliteration of the Greek form.
- source_word: ἐν τῇ Περσίδι
  chosen: in Persia
  alternatives:
  - in Persis
  lexicon: LSJ
  rationale: The phrase locates Elymais within the Persian region. 'Persia' is more
    immediately readable modern English, while still accurately reflecting the geographical
    sense of Περσίς/Περσίδι.
- source_word: πόλις ἔνδοξος
  chosen: a city renowned
  alternatives:
  - a famous city
  - a glorious city
  - an illustrious city
  lexicon: LSJ
  rationale: ἔνδοξος denotes being notable, famous, or illustrious. 'Renowned' communicates
    public fame without implying moral glory.
- source_word: πλούτῳ, ἀργυρίῳ, καὶ χρυσίῳ
  chosen: for wealth, silver, and gold
  alternatives:
  - in wealth, silver, and gold
  - for riches, silver, and gold
  lexicon: LSJ
  rationale: The dative list expresses the respect in which the city was renowned.
    'For wealth, silver, and gold' is idiomatic English and preserves the cumulative
    emphasis on riches, with silver and gold specified.
