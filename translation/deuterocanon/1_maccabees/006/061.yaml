translation:
  text: And the king and the rulers swore this to them; then he came out from the
    stronghold,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on these terms,' making explicit that the oath concerned the previously
      stated conditions.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb is singular ('he came out'), though the immediate context
      may lead some to understand a broader or collective subject; compare 'they came
      out.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὤμοσεν
  chosen: swore
  alternatives:
  - gave an oath
  - promised under oath
  lexicon: BDAG
  rationale: The aorist of ὄμνυμι denotes taking an oath. 'Swore' is the most direct
    and natural English rendering and preserves the formal covenantal/legal force
    better than a weaker 'promised'.
- source_word: ὁ βασιλεὺς
  chosen: the king
  lexicon: BDAG
  rationale: Standard rendering of βασιλεύς in historical narrative. The article is
    retained naturally in English.
- source_word: οἱ ἄρχοντες
  chosen: the rulers
  alternatives:
  - the leaders
  - the officials
  lexicon: BDAG
  rationale: ἄρχοντες refers broadly to governing authorities or leading officials.
    'Rulers' best matches the political sense in this military-political context.
- source_word: ἐπὶ τούτοις
  chosen: this
  alternatives:
  - on these terms
  - concerning these things
  lexicon: BDAG
  rationale: The phrase refers back to the agreed conditions just mentioned. English
    idiom works best with 'swore this to them,' though the sense is effectively 'swore
    on these terms.' The more literal alternative is preserved as a lexical alternative.
- source_word: ἐξῆλθεν
  chosen: he came out
  alternatives:
  - he went out
  - they came out
  lexicon: BDAG
  rationale: The singular verb in Swete's text is best rendered 'he came out' or 'he
    went out.' 'Came out' is straightforward English. Because the subject is implicit
    and context may suggest a collective referent in the surrounding narrative, 'they
    came out' is preserved as an alternative in a footnote.
- source_word: τοῦ ὀχυρώματος
  chosen: the stronghold
  alternatives:
  - the fortress
  - the fortified place
  lexicon: LSJ
  rationale: ὀχύρωμα denotes a fortified strong place. 'Stronghold' is concise, natural,
    and preserves the military sense without over-specifying architecture.
