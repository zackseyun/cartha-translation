theological_decisions:
- issue: Rendering of βδέλυγμα in a cultic-polemical context
  chosen_reading: the abomination
  alternative_readings:
  - the detestable thing
  rationale: The term carries established cultic force in Jewish scripture and Second
    Temple usage. 'The abomination' preserves that weight without expanding to a traditional
    phrase not present in the Greek.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source meaning without importing tradition beyond the text.'
