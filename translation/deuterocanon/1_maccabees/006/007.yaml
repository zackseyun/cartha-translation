translation:
  text: and they tore down the abomination that he had built upon the altar in Jerusalem,
    and they surrounded the sanctuary, as before, with high walls, and also Bethsura,
    his city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the detestable thing.' The Greek has 'the abomination,' a cultically
      charged term for something offensive in worship.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'Bethsura, his city' is compressed in Greek. 'His' likely refers
      to Judas in the narrative context; some may understand it more generally as
      a city under his control.
    reason: alternative_reading
lexical_decisions:
- source_word: καθεῖλαν
  chosen: they tore down
  alternatives:
  - they pulled down
  - they demolished
  lexicon: LSJ
  rationale: Aorist of καθαιρέω, here describing forceful removal of a structure or
    installation. 'Tore down' is natural modern English and preserves the physical
    sense better than a softer 'removed.'
- source_word: τὸ βδέλυγμα
  chosen: the abomination
  alternatives:
  - the detestable thing
  - the abomination of desolation
  lexicon: LSJ
  rationale: βδέλυγμα commonly denotes something abhorrent or detestable, especially
    in cultic contexts. 'The abomination' preserves the likely technical/cultic resonance
    without importing the fuller phrase 'of desolation,' which is not present in this
    verse.
- source_word: ᾠκοδόμησεν
  chosen: had built
  alternatives:
  - built
  - set up
  lexicon: LSJ
  rationale: The verb is literally 'built.' English past perfect fits the reported
    speech context ('that he had built'). 'Set up' is possible in context but is less
    directly tied to the Greek wording.
- source_word: ἐπὶ τὸ θυσιαστήριον
  chosen: upon the altar
  alternatives:
  - on the altar
  lexicon: LSJ
  rationale: ἐπί with the accusative here indicates position upon the altar. 'Upon'
    slightly better preserves the elevated/cultic register while remaining readable.
- source_word: τὸ ἁγίασμα
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy precinct
  lexicon: LSJ
  rationale: ἁγίασμα refers to the sacred place/holy precinct. 'Sanctuary' is the
    most idiomatic and sufficiently precise rendering in this temple context.
- source_word: καθὼς τὸ πρότερον
  chosen: as before
  alternatives:
  - as formerly
  - as it was previously
  lexicon: LSJ
  rationale: This phrase indicates restoration to an earlier state. 'As before' is
    concise and natural.
- source_word: ἐκύκλωσαν τείχεσιν ὑψηλοῖς
  chosen: they surrounded ... with high walls
  alternatives:
  - they enclosed ... with high walls
  - they fortified ... with high walls
  lexicon: LSJ
  rationale: The verb means to encircle/surround. The instrumental dative τείχεσιν
    ὑψηλοῖς is well represented by 'with high walls.' 'Fortified' is interpretive;
    'surrounded' stays closer to the Greek.
- source_word: τὴν Βεθσουρὰ πόλιν αὐτοῦ
  chosen: also Bethsura, his city
  alternatives:
  - and Bethsura, his city
  - and the city Bethsura belonging to him
  lexicon: LSJ
  rationale: The phrase is somewhat compressed. αὐτοῦ most naturally refers back to
    Judas in the narrative frame ('his city/stronghold'). 'Also' makes clear that
    Bethsura is an additional object of the surrounding/fortifying action. The exact
    force of αὐτοῦ is retained rather than paraphrased away.
