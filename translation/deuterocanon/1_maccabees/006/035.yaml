translation:
  text: And they divided the beasts among the units, and beside each elephant they
    stationed a thousand men in coats of mail, with bronze helmets on their heads,
    and five hundred picked horsemen assigned to each beast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the divisions/companies.' The Greek phrase εἰς τὰς φάραγγας is
      contextually difficult; a military sense is likely here.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the beasts'; the context makes clear these are elephants.
    reason: lexical_alternative
  - marker: c
    text: Or 'for each elephant' or 'at each elephant.' The Greek preposition can
      be understood in more than one way here.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεῖλον
  chosen: they divided
  alternatives:
  - they distributed
  - they apportioned
  lexicon: LSJ
  rationale: The aorist of διαιρέω means to divide or distribute. 'Divided' is straightforward
    and preserves the military arrangement sense without overinterpreting.
- source_word: τὰ θηρία
  chosen: the beasts
  alternatives:
  - the animals
  - the elephants
  lexicon: LSJ
  rationale: Literally 'the beasts.' In context the referent is elephants, but the
    Greek itself uses θηρία here and later distinguishes ἐλέφαντι explicitly. Rendering
    'beasts' preserves the source wording while the following 'each elephant' clarifies
    the referent.
- source_word: εἰς τὰς φάραγγας
  chosen: among the units
  alternatives:
  - into the divisions
  - into the companies
  - among the squadrons
  lexicon: LSJ
  rationale: The phrase is difficult in this context. φάραγξ/φάραγγες can denote a
    military formation or division rather than the more common topographical sense.
    'Among the units' gives the likely military sense in readable English without
    forcing a highly technical term.
- source_word: παρέστησαν
  chosen: they stationed
  alternatives:
  - they placed
  - they posted
  lexicon: LSJ
  rationale: In military context παρίστημι commonly means to place or station beside.
    'Stationed' fits the tactical deployment described.
- source_word: ἐφʼ ἑκάστῳ ἐλέφαντι
  chosen: beside each elephant
  alternatives:
  - on each elephant
  - for each elephant
  - at each elephant
  lexicon: LSJ
  rationale: ἐπί with dative can mean on, at, or by. Since the verse distinguishes
    the men from the elephant and describes them as deployed with it, 'beside each
    elephant' best fits the military scene and avoids implying all thousand were physically
    mounted on the animal.
- source_word: χιλίους ἄνδρας τεθωρακισμένους
  chosen: a thousand men in coats of mail
  alternatives:
  - a thousand armored men
  - a thousand men wearing cuirasses
  lexicon: LSJ
  rationale: τεθωρακισμένους indicates being armored or equipped with a breastplate/cuirass.
    'In coats of mail' is a natural rendering here, especially since the next phrase
    specifies helmets; it conveys substantial armor without excessive technicality.
- source_word: ἐν ἁλυσιδωτοῖς
  chosen: in coats of mail
  alternatives:
  - in chain armor
  - in mail
  lexicon: LSJ
  rationale: 'The term refers to chain-like armor. Rather than leave it detached,
    the English folds it into the description of the armored men: ''in coats of mail.''
    This is more idiomatic while preserving the specific armor type.'
- source_word: περικεφαλαῖαι χαλκαῖ
  chosen: bronze helmets
  alternatives:
  - brazen helmets
  lexicon: LSJ
  rationale: A direct rendering of the military equipment phrase. 'Bronze' is modern
    and precise.
- source_word: διατεταγμένοι
  chosen: assigned
  alternatives:
  - drawn up
  - arrayed
  - deployed
  lexicon: LSJ
  rationale: The participle indicates ordered arrangement. For the horsemen attached
    to each elephant, 'assigned' communicates their designated tactical role clearly.
- source_word: ἐκλελεγμένοι
  chosen: picked
  alternatives:
  - chosen
  - select
  lexicon: LSJ
  rationale: The perfect participle denotes selected men. 'Picked' is concise, idiomatic,
    and preserves the sense of elite selection.
