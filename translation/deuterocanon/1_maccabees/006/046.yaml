translation:
  text: And he slipped in under the elephant, struck it from beneath, and killed it;
    and it fell to the ground on top of him, and he died there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stabbed it underneath.' The Greek ὑπέθηκεν αὐτῷ is somewhat idiomatic
      in this context; the main text keeps the sense of an attack delivered from below
      without specifying more than the wording warrants.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσέδυσεν
  chosen: slipped in
  alternatives:
  - went in
  - crept in
  - got in under
  lexicon: LSJ
  rationale: The verb conveys entering by slipping or diving into a confined space.
    'Slipped in' preserves the vividness and the tactical movement under the elephant
    better than the flatter 'went in.'
- source_word: ὑπὸ τὸν ἐλέφαντα
  chosen: under the elephant
  alternatives:
  - beneath the elephant
  lexicon: LSJ
  rationale: A straightforward spatial phrase. 'Under the elephant' is idiomatic modern
    English and keeps the scene concrete.
- source_word: ὑπέθηκεν αὐτῷ
  chosen: struck it from beneath
  alternatives:
  - stabbed it underneath
  - dealt a blow under it
  - attacked it from below
  lexicon: LSJ
  rationale: The phrase is difficult in isolation, but in context it describes the
    attack delivered from underneath the elephant. 'Struck it from beneath' preserves
    the directional force without over-specifying the weapon beyond what the Greek
    here explicitly states.
- source_word: ἀνεῖλεν αὐτόν
  chosen: killed it
  alternatives:
  - slew it
  lexicon: LSJ
  rationale: This common verb means to kill or do away with. 'Killed it' is clear,
    natural English and avoids archaic diction.
- source_word: ἔπεσεν ἐπὶ τὴν γῆν ἐπάνω αὐτοῦ
  chosen: it fell to the ground on top of him
  alternatives:
  - it fell upon him to the ground
  - it collapsed over him onto the earth
  lexicon: LSJ
  rationale: The double spatial expression emphasizes both the fall to the ground
    and that the elephant landed over him. 'On top of him' communicates the fatal
    result plainly in modern English.
- source_word: ἀπέθανεν ἐκεῖ
  chosen: he died there
  alternatives:
  - he died on the spot
  - he died there on the spot
  lexicon: LSJ
  rationale: A simple concluding clause. 'He died there' stays close to the Greek
    without adding emphasis not explicitly present.
