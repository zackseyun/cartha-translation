translation:
  text: And they kept urging and pressing to depart. And he said to the king and the
    leaders of the army and the men, “We are growing weaker day by day, and our food
    is scant, and the place where we are encamped is strong, and the affairs of the
    kingdom are pressing upon us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “We are giving out day by day”; the Greek verb can denote failing, dwindling,
      or being exhausted.
    reason: lexical_alternative
  - marker: b
    text: Or “the kingdom’s business is pressing upon us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέσπευδον
  chosen: kept urging
  alternatives:
  - were hurrying
  - were pressing on
  - were hastening
  lexicon: LSJ
  rationale: Imperfect verb indicating continued or repeated action. In context with
    ἐπενύοντο and the infinitive τοῦ ἀπελθεῖν, it conveys active pressure to leave
    rather than mere physical haste.
- source_word: ἐπενύοντο
  chosen: pressing
  alternatives:
  - insisting
  - urging strongly
  lexicon: LSJ
  rationale: Paired with κατέσπευδον, this intensifies the sense of insistence. 'Pressing'
    preserves the rhetorical force without overparaphrasing.
- source_word: τοῦ ἀπελθεῖν
  chosen: to depart
  alternatives:
  - to go away
  - to leave
  lexicon: BDAG
  rationale: Aorist infinitive of ἀπέρχομαι; 'depart' fits military withdrawal language
    in readable English.
- source_word: Ἐκλείπομεν
  chosen: We are failing
  alternatives:
  - we are giving out
  - we are dwindling
  - we are exhausted
  lexicon: LSJ
  rationale: The verb can denote failing, giving out, or being spent. In this siege
    context it likely refers to their strength/resources diminishing generally, not
    necessarily only troop numbers. 'We are failing' preserves that breadth.
- source_word: τροφὴ
  chosen: food
  alternatives:
  - provisions
  - nourishment
  lexicon: LSJ
  rationale: τροφὴ refers to sustenance. 'Food' is the most natural modern English,
    while the adjective ὀλίγη supplies the scarcity idea.
- source_word: ὀλίγη
  chosen: scant
  alternatives:
  - little
  - meager
  lexicon: LSJ
  rationale: '''Scant'' idiomatically conveys shortage in connection with food without
    sounding archaic.'
- source_word: παρεμβάλλομεν
  chosen: we are encamped
  alternatives:
  - we camp
  - we have pitched camp
  lexicon: LSJ
  rationale: Military present tense; 'are encamped' best reflects the ongoing state
    in a military setting.
- source_word: ὀχυρός
  chosen: strong
  alternatives:
  - fortified
  - secure
  lexicon: LSJ
  rationale: The adjective denotes strength/fortification. Here it describes the place
    as difficult to take or operate in. 'Strong' is concise and leaves the military
    nuance intact.
- source_word: ἐπίκειται ἡμῖν
  chosen: are pressing upon us
  alternatives:
  - lie upon us
  - are urgent for us
  - are hanging over us
  lexicon: BDAG
  rationale: The idiom conveys burden or urgent pressure. 'Are pressing upon us' matches
    the political urgency of the next phrase.
- source_word: τὰ τῆς βασιλείας
  chosen: the affairs of the kingdom
  alternatives:
  - the kingdom's business
  - matters of the kingdom
  - royal affairs
  lexicon: LSJ
  rationale: This idiom refers broadly to matters concerning the kingdom, likely political
    and administrative concerns requiring attention elsewhere. 'Affairs of the kingdom'
    is clear and suitably formal.
