  text: καὶ κατέσπευδον καὶ ἐπενύοντο τοῦ ἀπελθεῖν· καὶ εἶπεν πρὸς τὸν βασιλέα καὶ
    τοὺς ἡγουμένους τῆς δυνάμεως καὶ τοὺς ἄνδρας Ἐκλείπομεν καθʼ ἡμέραν, καὶ ἡ τροφὴ
