translation:
  text: And the king captured Bethsura, and he stationed a garrison there to guard
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'took Bethsura' or 'seized Bethsura.' The Greek verb can be rendered
      more generally as taking possession of the city.
    reason: lexical_alternative
  - marker: b
    text: Or 'posted a guard there' or 'appointed a garrison there.' The Greek emphasizes
      assigning a military force to hold the place.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατελάβετο
  chosen: captured
  alternatives:
  - took
  - seized
  - occupied
  lexicon: LSJ
  rationale: The middle form here in military context indicates taking possession
    of a place. 'Captured' best conveys the successful seizure of a fortified location
    in natural English, more specifically than the broader 'took' and less interpretive
    than 'occupied'.
- source_word: ὁ βασιλεύς
  chosen: the king
  lexicon: LSJ
  rationale: A straightforward rendering of the subject title; no contextual reason
    to substitute a personal name in the translation.
- source_word: τὴν Βεθσούραν
  chosen: Bethsura
  alternatives:
  - Beth-zur
  rationale: Personal/place names are transliterated by project policy. 'Bethsura'
    follows the Greek form Βεθσούρα rather than harmonizing to the Hebrew place-name
    form 'Beth-zur'.
- source_word: ἐπέταξεν
  chosen: stationed
  alternatives:
  - appointed
  - posted
  - ordered
  lexicon: LSJ
  rationale: In context with φρουράν and the infinitive τηρεῖν, the verb means to
    assign or post a military force. 'Stationed' captures the military sense more
    idiomatically than the more general 'appointed' or the potentially ambiguous 'ordered'.
- source_word: φρουράν
  chosen: a garrison
  alternatives:
  - a guard
  - a military guard
  - a watch
  lexicon: LSJ
  rationale: Given the military setting and the object being a captured town, 'garrison'
    is the most precise English term for a force left in place to hold and protect
    the site.
- source_word: τηρεῖν αὐτήν
  chosen: to guard it
  alternatives:
  - to keep it
  - to hold it
  - to watch over it
  lexicon: LSJ
  rationale: τηρεῖν can mean keep, guard, or watch. Here, after stationing a garrison
    in a captured city, 'to guard it' best expresses the protective/holding function
    in clear English.
