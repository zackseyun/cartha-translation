translation:
  text: And Jonathan heard that Demetrius’s commanders had come to Kedesh in Galilee
    with a large force, intending to remove him from his office.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to depose him from his position.' The Greek phrase can denote removing
      him from his assigned function or office.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - was informed
  lexicon: LSJ
  rationale: The aorist of ἀκούω here introduces reported intelligence. 'Heard' is
    the most direct and natural rendering in English, while still allowing that the
    information came by report.
- source_word: οἱ ἄρχοντες Δημητρίου
  chosen: Demetrius’s commanders
  alternatives:
  - Demetrius's rulers
  - Demetrius's officials
  - Demetrius's leaders
  lexicon: LSJ
  rationale: ἄρχοντες can denote rulers, leaders, or officials. In this military context,
    especially with 'with a large force,' 'commanders' best captures the sense of
    leading officers rather than civil magistrates.
- source_word: παρῆσαν
  chosen: had come
  alternatives:
  - were present
  - arrived
  lexicon: LSJ
  rationale: The verb indicates presence after arrival. 'Had come' fits the English
    clause smoothly and conveys that they were now at Kedesh.
- source_word: Κῆδες τὴν ἐν τῇ Γαλιλαίᾳ
  chosen: Kedesh in Galilee
  alternatives:
  - Kedesh, the one in Galilee
  - Kedes in Galilee
  lexicon: LSJ
  rationale: The appositional phrase distinguishes this Kedesh by location. 'Kedesh
    in Galilee' is idiomatic English and preserves the identifying force of the Greek.
- source_word: μετὰ δυνάμεως πολλῆς
  chosen: with a large force
  alternatives:
  - with great power
  - with a great army
  - with many troops
  lexicon: LSJ
  rationale: δύναμις in military narrative commonly refers to armed strength or forces.
    'With a large force' is concise and contextually appropriate without over-specifying
    'army' if the Greek does not require it.
- source_word: βουλόμενοι
  chosen: intending
  alternatives:
  - wanting
  - planning
  - seeking
  lexicon: LSJ
  rationale: The participle expresses purpose or intention. 'Intending' preserves
    that purposive nuance clearly in English.
- source_word: μεταστῆσαι αὐτὸν τῆς χρείας
  chosen: to remove him from his office
  alternatives:
  - to depose him from his position
  - to turn him aside from the task
  - to remove him from service
  lexicon: LSJ
  rationale: μεταστῆσαι can mean remove, transfer, or depose; χρεία can mean need,
    service, function, or office. In this political-military context, the phrase most
    naturally means removing Jonathan from his assigned role or position. 'From his
    office' communicates that official sense better than the overly vague 'from the
    task.'
