translation:
  text: And Jonathan sent three thousand men, mighty in their strength, to Antioch,
    and they came to the king, and the king rejoiced at their arrival.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at their approach' or 'because of their coming'; the Greek term can
      denote an approach or coming-on, but here likely refers to the arrival of Jonathan's
      men before the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard narrative verb for sending; 'sent' is natural modern English
    and sufficiently formal.
- source_word: ἄνδρας τρισχιλίους
  chosen: three thousand men
  alternatives:
  - three thousand soldiers
  lexicon: LSJ
  rationale: ἄνδρας literally means 'men.' Although the context is military, the Greek
    does not explicitly say 'soldiers,' so the more direct rendering is preferred.
- source_word: δυνατοὺς ἰσχύι αὐτῶν
  chosen: mighty in their strength
  alternatives:
  - strong in might
  - valiant in strength
  - powerful men
  lexicon: LSJ
  rationale: The phrase is somewhat emphatic and tautological in Greek, stressing
    capability or prowess. 'Mighty in their strength' preserves that emphasis without
    flattening it into a single adjective.
- source_word: εἰς Ἀντιοχίαν
  chosen: to Antioch
  alternatives:
  - into Antioch
  lexicon: LSJ
  rationale: Directional εἰς here is naturally rendered 'to' in English for movement
    toward a city.
- source_word: ἦλθοσαν πρὸς τὸν βασιλέα
  chosen: they came to the king
  alternatives:
  - they went to the king
  - they arrived before the king
  lexicon: LSJ
  rationale: A straightforward rendering of motion toward the king; 'came to' fits
    the narrative sequence well.
- source_word: ηὐφράνθη
  chosen: rejoiced
  alternatives:
  - was glad
  - was delighted
  lexicon: LSJ
  rationale: The verb denotes gladness or joy. 'Rejoiced' preserves the elevated but
    still readable tone.
- source_word: ἐπὶ τῇ ἐφόδῳ αὐτῶν
  chosen: at their arrival
  alternatives:
  - because of their coming
  - at their approach
  - at their expedition
  lexicon: LSJ
  rationale: ἐφοδος can denote an approach, coming on, or onset. In this context,
    after their coming to the king, it most naturally refers to their arrival/presence
    rather than a military assault or expedition.
