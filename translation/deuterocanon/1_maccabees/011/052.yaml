translation:
  text: And King Demetrius sat on the throne of his kingdom, and the land was quiet
    before him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκάθισεν
  chosen: sat
  alternatives:
  - took his seat
  - sat down
  lexicon: LSJ
  rationale: The aorist of καθίζω here denotes enthronement or taking one's place
    on the royal throne. 'Sat' is concise and natural in English while preserving
    the formal image; 'took his seat' is possible but slightly more interpretive.
- source_word: θρόνου τῆς βασιλείας αὐτοῦ
  chosen: the throne of his kingdom
  alternatives:
  - his royal throne
  - the throne of his kingship
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the genitival construction and the
    royal setting. 'His royal throne' is smoother but compresses the explicit βασιλείας.
- source_word: ἡσύχασεν
  chosen: was quiet
  alternatives:
  - was at peace
  - was calm
  - was at rest
  lexicon: LSJ
  rationale: The verb indicates becoming quiet or undisturbed. 'Was quiet' preserves
    the political sense without overstating it as full peace or prosperity. 'Was at
    peace' could imply a stronger condition than the Greek requires.
- source_word: ἡ γῆ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: LSJ
  rationale: In this historical context γῆ refers to the territory or realm under
    rule, not the whole earth. 'The land' is the most natural contextual rendering.
- source_word: ἐνώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  - under him
  lexicon: LSJ
  rationale: The phrase literally means 'before him.' In context it conveys that the
    land was quiet in relation to his rule or presence. The literal rendering is clear
    and avoids over-interpreting the political nuance.
- source_word: ὁ βασιλεὺς Δημήτριος
  chosen: King Demetrius
  alternatives:
  - Demetrius the king
  lexicon: LSJ
  rationale: English idiom normally places the title before the name. This preserves
    the referent and royal emphasis cleanly.
