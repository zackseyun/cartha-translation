translation:
  text: And some lawless men from the nation were making accusations against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were petitioning against him,' that is, bringing a complaint before
      authority. The Greek verb can denote an appeal or petition; in this context
      it is hostile and so is rendered as accusation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνετύγχανον
  chosen: were making accusations
  alternatives:
  - were petitioning
  - were appealing
  - were interceding
  lexicon: LSJ/BDAG
  rationale: In this hostile context with κατʼ αὐτοῦ ('against him'), the verb carries
    the sense of bringing a complaint or accusation rather than neutral petition or
    positive intercession. The imperfect is represented with progressive aspect, 'were
    making accusations.'
- source_word: κατʼ αὐτοῦ
  chosen: against him
  alternatives:
  - concerning him
  lexicon: LSJ/BDAG
  rationale: The preposition κατά with genitive here indicates opposition directed
    at the person, so 'against him' best captures the adversative force.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  - some people
  lexicon: LSJ
  rationale: An indefinite subset is intended; 'some' is natural modern English and
    preserves the nonspecific reference.
- source_word: ἄνομοι
  chosen: lawless men
  alternatives:
  - outlaws
  - wicked men
  - men without law
  lexicon: LSJ
  rationale: The adjective denotes people characterized by disregard for law. 'Lawless
    men' preserves the moral and legal force without overparaphrase. Because the Greek
    is masculine plural referring to persons, 'men' is retained per gender-accurate
    policy.
- source_word: τῶν ἐκ τοῦ ἔθνους
  chosen: from the nation
  alternatives:
  - from the people
  - from their own nation
  - from the Gentiles
  lexicon: LSJ
  rationale: In 1 Maccabees, ἔθνος can denote the people/nation in an ethnic-political
    sense. Here it most naturally refers to members of the Jewish nation from whom
    these lawless men came. 'From the nation' stays close to the Greek while avoiding
    the misleading NT-associated sense 'Gentiles.'
