translation:
  text: And those who had fled from him saw it, and they returned to him, and with
    him they pursued as far as Kadesh, as far as their camp, and they encamped there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'saw this'—the Greek leaves the object unstated, referring
      back to the preceding events.
    reason: lexical_alternative
  - marker: b
    text: '''Their camp'' most naturally refers to the camp of the force being pursued;
      the Greek pronoun itself does not spell this out.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ φυγόντες
  chosen: those who had fled
  alternatives:
  - the fugitives
  - those who had run away
  lexicon: LSJ
  rationale: A participial substantive referring to the men who had previously fled.
    'Those who had fled' is natural English and preserves the prior action implied
    by the aorist participle.
- source_word: παρ᾽ αὐτοῦ
  chosen: from him
  alternatives:
  - away from him
  - from his side
  lexicon: LSJ
  rationale: The phrase indicates separation from the leader previously abandoned.
    'From him' is the most direct rendering; the context already conveys withdrawal.
- source_word: ἴδον
  chosen: saw it
  alternatives:
  - saw
  - observed
  lexicon: LSJ
  rationale: Although the object is not explicit in Greek, English normally requires
    one here. 'It' refers generally to what had just happened in context, namely the
    successful turn of events, without over-specifying.
- source_word: ἐπέστρεψαν πρὸς αὐτόν
  chosen: they returned to him
  alternatives:
  - they turned back to him
  - they came back to him
  lexicon: LSJ
  rationale: This straightforwardly expresses reversal of their earlier flight and
    renewed allegiance.
- source_word: ἐδίωκον μετ᾽ αὐτοῦ
  chosen: with him they pursued
  alternatives:
  - they joined him in pursuing
  - they chased with him
  lexicon: LSJ
  rationale: The imperfect depicts continued pursuit; 'with him they pursued' keeps
    the coordination with the leader explicit while remaining readable.
- source_word: ἕως Κάδης
  chosen: as far as Kadesh
  alternatives:
  - up to Kadesh
  lexicon: LSJ
  rationale: ἕως with a place name marks the limit of pursuit. The proper name is
    transliterated.
- source_word: παρεμβολῆς
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: LSJ
  rationale: In military context this denotes a camp. 'Camp' is concise and idiomatic.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - the enemy's
  - of them
  lexicon: LSJ
  rationale: The pronoun most naturally refers to the pursued party's camp in the
    immediate syntax. Because English readers may wonder whose camp is meant, the
    literal 'their' is retained rather than interpretively specifying 'enemy's.'
- source_word: παρενέβαλον ἐκεῖ
  chosen: they encamped there
  alternatives:
  - they camped there
  - they pitched camp there
  lexicon: LSJ
  rationale: Military verb matching the noun παρεμβολή. 'They encamped there' preserves
    the formal military sense and echoes the Greek wording.
