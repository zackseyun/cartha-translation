translation:
  text: And they asked him to receive pledges from them, and he gave them; then he
    drove them out from there and took the city, and stationed a garrison in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to receive right hands.' The phrase refers to exchanging pledges
      or assurances of peace or loyalty, likely symbolized by clasping right hands.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠξίωσαν
  chosen: they asked
  alternatives:
  - they requested
  - they demanded
  lexicon: LSJ
  rationale: The verb can mean ask, request, or deem worthy. With the complementary
    infinitive construction here, 'asked' best fits the narrative context without
    overstating the force as 'demanded'.
- source_word: δεξιὰς
  chosen: pledges of good faith
  alternatives:
  - right hands
  - oaths
  - assurances
  lexicon: LSJ
  rationale: Literally 'right hands,' but in this idiom λαβεῖν/δοῦναι δεξιάς refers
    to giving or receiving pledges, often by clasping right hands as a sign of agreement
    or truce. Rendering the idiomatic sense in the main text is clearer in modern
    English.
- source_word: λαβεῖν
  chosen: to receive
  alternatives:
  - to take
  lexicon: LSJ
  rationale: The infinitive with δεξιὰς is retained in idiomatic English as 'to receive
    pledges of good faith.' 'Receive' better reflects the social-ceremonial act than
    the blunter 'take'.
- source_word: ἔδωκεν αὐτοῖς
  chosen: he gave them
  alternatives:
  - he granted it to them
  - he gave pledges to them
  lexicon: LSJ
  rationale: The Greek is concise and elliptical after the prior idiom. 'He gave them'
    preserves the compactness while allowing the preceding phrase to supply the object
    implicitly. The sense is that he granted or gave the requested pledges.
- source_word: ἐξέβαλεν
  chosen: he drove them out
  alternatives:
  - he expelled them
  - he cast them out
  lexicon: LSJ
  rationale: '''Drove them out'' is natural narrative English and preserves the force
    of forcible removal.'
- source_word: κατελάβετο
  chosen: took control of
  alternatives:
  - seized
  - occupied
  - captured
  lexicon: LSJ
  rationale: The middle form here conveys taking possession of the city. 'Took control
    of' communicates successful occupation without implying details beyond the Greek.
- source_word: φρουράν
  chosen: a garrison
  alternatives:
  - a guard
  - troops
  lexicon: LSJ
  rationale: In military context, φρουρά denotes a guarding force or garrison. 'Garrison'
    is the most precise English military term here.
- source_word: ἔθετο ἐπʼ αὐτὴν
  chosen: stationed ... over it
  alternatives:
  - placed in it
  - set over it
  lexicon: LSJ
  rationale: The preposition ἐπί with the city suggests appointment or stationing
    over/for control of the city. 'Stationed a garrison over it' conveys military
    oversight more clearly than a wooden rendering.
