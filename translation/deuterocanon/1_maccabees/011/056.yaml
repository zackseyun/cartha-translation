translation:
  text: And Tryphon took the elephants and gained control of Antioch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the beasts'; in this military context the referent is
      war elephants.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν
  chosen: took
  alternatives:
  - captured
  - received
  lexicon: LSJ
  rationale: Aorist of λαμβάνω with direct object τὰ θηρία most naturally means 'took'
    in a military-political narrative. 'Captured' is possible as an interpretive expansion,
    but 'took' stays closer to the Greek while remaining clear.
- source_word: Τρύφων
  chosen: Tryphon
  rationale: Personal name is transliterated according to project policy.
- source_word: τὰ θηρία
  chosen: the elephants
  alternatives:
  - the beasts
  - the animals
  lexicon: LSJ
  rationale: Although literally 'the beasts/animals,' in Hellenistic military context
    and especially in 1 Maccabees this expression commonly refers to war elephants.
    Rendering it as 'the elephants' communicates the referent rather than leaving
    an unnatural literalism that could mislead English readers.
- source_word: κατεκράτησεν
  chosen: gained control of
  alternatives:
  - seized
  - took possession of
  - prevailed over
  lexicon: LSJ
  rationale: The verb κατακρατέω here governs the genitive Ἀντιοχίας and in context
    denotes securing mastery or control over the city. 'Gained control of' is idiomatic
    English that preserves the political-military sense without overstating a momentary
    assault.
- source_word: Ἀντιοχίας
  chosen: Antioch
  rationale: Genitive of the city name after κατακρατέω; standard English form is
    'Antioch.'
