translation:
  text: And the king called the Jews to his aid, and they all gathered to him together;
    and they spread out in the city, and on that day they killed ten thousand in the
    city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'were scattered in the city'; the rendering 'spread out
      through the city' reflects the likely military sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: LSJ
  rationale: The aorist of καλέω here straightforwardly means 'called' or 'summoned.'
    'Called' is natural modern English and preserves the narrative simplicity.
- source_word: εἰς βοήθειαν
  chosen: to his aid
  alternatives:
  - for help
  - for assistance
  lexicon: LSJ
  rationale: 'The phrase indicates purpose/result: the king called the Jews to come
    as help for him. ''To his aid'' is idiomatic and keeps the personal reference
    αὐτόν/implicit beneficiary clear.'
- source_word: ἐπισυνήχθησαν
  chosen: gathered
  alternatives:
  - assembled
  lexicon: LSJ
  rationale: The passive/middle sense here is that they came together to him. 'Gathered'
    is concise and natural; 'assembled' is possible but slightly stiffer.
- source_word: πάντες ἅμα
  chosen: they all gathered to him together
  alternatives:
  - all together
  - all at once
  lexicon: LSJ
  rationale: Both πάντες and ἅμα intensify the totality and simultaneity of the response.
    Rendering both with 'they all ... together' preserves the emphasis without sounding
    overly wooden.
- source_word: διεσπάρησαν
  chosen: spread out through
  alternatives:
  - were dispersed in
  - scattered through
  lexicon: LSJ
  rationale: The verb literally suggests being scattered/dispersed. In context of
    moving into the city for combat, 'spread out through the city' communicates tactical
    dispersal more clearly than the more passive 'were dispersed.'
- source_word: ἀπέκτειναν
  chosen: killed
  alternatives:
  - slew
  lexicon: LSJ
  rationale: '''Killed'' is the plain modern equivalent. ''Slew'' is archaic and contrary
    to the project''s readability aims.'
- source_word: εἰς μυριάδας δέκα
  chosen: ten thousand
  alternatives:
  - to the number of ten thousand
  lexicon: LSJ
  rationale: The idiom with μυριάς denotes a count of ten thousand. 'Ten thousand'
    is the natural English rendering.
