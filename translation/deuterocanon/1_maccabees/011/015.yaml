translation:
  text: And Alexander heard, and came against him in war; and Ptolemy marched out
    and met him with a strong hand, and routed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with mighty force.' The Greek literally says 'with a strong hand,' a
      military idiom for acting with power.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - heard of it
  lexicon: LSJ
  rationale: The aorist of ἀκούω here introduces Alexander's response to prior events.
    'Heard' is the most direct rendering; 'heard of it' is possible contextually but
    adds an object not explicit in the Greek.
- source_word: ἦλθεν ἐπʼ αὐτὸν ἐν πολέμῳ
  chosen: came against him in war
  alternatives:
  - came against him for battle
  - advanced against him in war
  lexicon: LSJ
  rationale: The phrase combines hostile movement (ἐπʼ αὐτόν) with the sphere or manner
    (ἐν πολέμῳ). 'Came against him in war' preserves both elements without overinterpreting.
- source_word: ἐξήγαγεν
  chosen: marched out
  alternatives:
  - led out
  - went out
  lexicon: LSJ
  rationale: Although literally 'led out,' in military context the verb commonly refers
    to bringing forces out for engagement. 'Marched out' conveys the military sense
    naturally in English.
- source_word: ἀπήντησεν αὐτῷ
  chosen: met him
  alternatives:
  - went to meet him
  - encountered him
  lexicon: LSJ
  rationale: The verb means to meet or go to meet. 'Met him' is concise and idiomatic,
    and the military setting is already clear from the surrounding clauses.
- source_word: ἐν χειρὶ ἰσχυρᾷ
  chosen: with a strong hand
  alternatives:
  - with mighty force
  - powerfully
  lexicon: LSJ
  rationale: This idiom literally means 'with a strong hand.' Retaining 'hand' preserves
    the source image and military forcefulness; it is still understandable in English.
- source_word: ἐτροπώσατο αὐτόν
  chosen: routed him
  alternatives:
  - defeated him
  - put him to flight
  lexicon: LSJ
  rationale: The verb from τροπόω/τρέπω in battle context suggests turning the enemy
    back or putting him to flight. 'Routed him' captures the military nuance more
    precisely than the broader 'defeated him.'
