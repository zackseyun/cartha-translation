translation:
  text: Not one of them was left, except Mattathias son of Absalom and Judas son of
    Chalphi, commanders of the army forces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'commanders of the army troops.' The Greek combines two military terms
      (στρατιά, δυνάμεις), and the exact nuance of the pairing may be rendered in
      more than one natural English way.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ εἷς
  chosen: Not one
  alternatives:
  - No one
  - Not even one
  lexicon: LSJ
  rationale: The idiom emphatically states total absence of survivors from the group.
    'Not one' preserves the force concisely in natural English.
- source_word: κατελείφθη
  chosen: was left
  alternatives:
  - remained
  - was left behind
  lexicon: LSJ
  rationale: Passive aorist of καταλείπω here indicates that none remained after the
    conflict. 'Was left' is straightforward and idiomatic; 'was left behind' would
    over-specify.
- source_word: ἀπʼ αὐτῶν
  chosen: of them
  alternatives:
  - from them
  - among them
  lexicon: LSJ
  rationale: In context this partitive expression refers to the group just mentioned.
    'Of them' reads naturally with 'Not one ... was left' in English.
- source_word: πλὴν
  chosen: except
  alternatives:
  - save
  - but
  lexicon: LSJ
  rationale: Standard exceptive sense; 'except' is the clearest modern rendering.
- source_word: Ματταθίας ὁ τοῦ Ἀψαλώμου
  chosen: Mattathias son of Absalom
  alternatives:
  - Mattathias, the son of Absalom
  lexicon: LSJ
  rationale: The article plus genitive identifies parentage/family relation. 'Son
    of' is the normal English way to render this construction for personal identification.
- source_word: Ἰούδας ὁ τοῦ Χαλφεί
  chosen: Judas son of Chalphi
  alternatives:
  - Judas, the son of Chalphi
  lexicon: LSJ
  rationale: As with the previous name, the genitive marks filiation or family identification.
    'Judas' is the standard transliteration of Ἰούδας in this corpus.
- source_word: ἄρχοντες
  chosen: commanders
  alternatives:
  - leaders
  - rulers
  - officers
  lexicon: LSJ
  rationale: In military context, ἄρχοντες denotes those exercising command. 'Commanders'
    best fits the immediate setting and avoids the broader political sense of 'rulers'.
- source_word: τῆς στρατιᾶς
  chosen: of the army
  alternatives:
  - of the host
  - of the force
  lexicon: LSJ
  rationale: στρατιά can mean army/host. 'Army' is the most accessible and contextually
    precise rendering in modern English.
- source_word: τῶν δυνάμεων
  chosen: forces
  alternatives:
  - troops
  - companies
  - power
  lexicon: LSJ
  rationale: δυνάμεις in military contexts often refers to forces/troops. Because
    the Greek has both στρατιά and δυνάμεις, rendering the latter as 'forces' preserves
    the double military expression without collapsing the terms entirely.
