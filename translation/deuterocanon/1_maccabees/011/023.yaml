translation:
  text: But when Jonathan heard, he ordered them to be surrounded; and he chose some
    of the elders of Israel and some of the priests, and put himself in danger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and gave him to danger.'' The wording is awkward; the sense is
      likely that Jonathan exposed himself to danger.'
    reason: textual_variant
lexical_decisions:
- source_word: περικαθίσθαι
  chosen: to be surrounded
  alternatives:
  - to encamp around
  - to sit around
  - to besiege
  lexicon: LSJ
  rationale: The middle/passive infinitive from περικαθίζω in this military context
    most naturally means to have the opposing party surrounded or hemmed in. 'To be
    surrounded' preserves the compact Greek sense without over-specifying siege warfare.
- source_word: ἐπέλεξεν
  chosen: he chose
  alternatives:
  - he selected
  - he picked out
  lexicon: LSJ
  rationale: A straightforward rendering that matches the verb's ordinary sense and
    keeps the narrative style plain.
- source_word: τῶν πρεσβυτέρων Ἰσραήλ
  chosen: some of the elders of Israel
  alternatives:
  - the elders of Israel
  lexicon: LSJ
  rationale: 'With ἐπέλεξεν governing a genitive, the sense is partitive: Jonathan
    selected from among the elders, not necessarily all of them.'
- source_word: τῶν ἱερέων
  chosen: some of the priests
  alternatives:
  - the priests
  lexicon: LSJ
  rationale: As with 'elders,' the genitive after ἐπέλεξεν is best taken partitively.
- source_word: ἔδωκεν αὐτὸν τῷ κινδύνῳ
  chosen: put himself in danger
  alternatives:
  - exposed himself to danger
  - gave himself over to danger
  - put him in danger
  lexicon: LSJ
  rationale: The Greek as transmitted reads singular αὐτόν ('him'), which is awkward
    after Jonathan as subject and after the plural groups just mentioned. Idiomatically,
    δίδωμι with dative of danger means to expose to danger. Given the narrative flow,
    the sense is that Jonathan personally risked himself. This rendering reflects
    the probable sense while acknowledging the underlying awkwardness.
