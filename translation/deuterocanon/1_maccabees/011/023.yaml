theological_decisions:
- issue: Awkward pronoun reference in ἔδωκεν αὐτὸν τῷ κινδύνῳ
  chosen_reading: 'Render idiomatically as Jonathan''s self-endangerment: ''put himself
    in danger.'''
  alternative_readings:
  - '''put him in danger'' (taking αὐτόν strictly as singular object)'
  - '''gave himself over to danger'''
  rationale: This is not a doctrinal issue but a text-interpretive one. The singular
    pronoun in Swete's text is difficult if taken woodenly. In context, Jonathan is
    the active subject throughout, and the clause most plausibly means that he exposed
    himself to danger in connection with the selected elders and priests. The English
    therefore resolves the idiom toward the most coherent narrative sense while preserving
    the difficulty in a footnote.
  doctrine_reference: Preserve source ambiguity rather than over-resolve; document
    the decision transparently.
