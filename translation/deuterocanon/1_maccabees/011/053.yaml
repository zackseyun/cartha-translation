translation:
  text: And he proved false in everything that he said, and became estranged from
    Jonathan, and did not repay the favors that Jonathan had repaid to him, and he
    oppressed him severely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he lied about everything he said' / 'he dealt falsely in all that he
      said.' The Greek verb can emphasize falsehood in speech or broader deceitful
      conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐψεύσατο
  chosen: proved false
  alternatives:
  - lied
  - acted deceitfully
  - falsified
  lexicon: LSJ
  rationale: The middle form can mean 'lied' or 'dealt falsely.' 'Proved false' fits
    the construction with πάντα ὅσα εἶπεν ('in everything that he said') and conveys
    that his words turned out untrue without over-paraphrasing.
- source_word: πάντα ὅσα εἶπεν
  chosen: everything that he said
  alternatives:
  - all that he said
  - all his words
  lexicon: LSJ
  rationale: A straightforward rendering preserving the comprehensive force of πάντα
    ὅσα.
- source_word: ἠλλοτριώθη
  chosen: became estranged
  alternatives:
  - became alienated
  - turned away
  - became hostile
  lexicon: LSJ
  rationale: The passive conveys becoming alien/estranged in relation to Jonathan.
    'Became estranged' preserves the relational rupture without importing a stronger
    hostility than the verb itself requires.
- source_word: τῷ Ἰωνάθαν
  chosen: from Jonathan
  alternatives:
  - toward Jonathan
  - to Jonathan
  lexicon: LSJ
  rationale: Although the Greek uses the dative, idiomatic English with 'estranged'
    normally takes 'from.' This best communicates the sense of separation in natural
    English.
- source_word: οὐκ ἀνταπέδωκεν
  chosen: did not repay
  alternatives:
  - did not return
  - did not recompense
  lexicon: LSJ
  rationale: The verb means to give back or repay. 'Repay' works well with εὐνοίας
    and preserves the reciprocity implied by the repeated verb.
- source_word: τὰς εὐνοίας
  chosen: the favors
  alternatives:
  - the goodwill
  - the kindnesses
  - the benefits
  lexicon: LSJ
  rationale: εὐνοία can denote goodwill or a favorable act. In this context of reciprocal
    political support, 'favors' best captures concrete benefactions rather than mere
    inward disposition.
- source_word: ἃς ἀνταπέδωκεν αὐτῷ
  chosen: that Jonathan had repaid to him
  alternatives:
  - that he had shown him
  - that he had returned to him
  lexicon: LSJ
  rationale: The relative clause is awkward in English if rendered too literally.
    Supplying 'Jonathan' clarifies the referent from context, and 'had repaid' preserves
    the same Greek verb, indicating reciprocal benefaction already rendered by Jonathan.
- source_word: ἔθλιψεν
  chosen: oppressed
  alternatives:
  - afflicted
  - pressed hard
  - troubled
  lexicon: LSJ
  rationale: The verb can mean to press, oppress, or afflict. In this political-military
    context, 'oppressed' conveys sustained harsh treatment better than the more general
    'troubled.'
- source_word: σφόδρα
  chosen: severely
  alternatives:
  - greatly
  - very much
  lexicon: LSJ
  rationale: An adverb of intensity; 'severely' fits naturally with 'oppressed' in
    English.
