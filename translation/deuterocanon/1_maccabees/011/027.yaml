translation:
  text: And he confirmed for him the high priesthood, and whatever other honors he
    had formerly held, and he made him rank among the first friends.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the chief friends.' The Greek likely reflects a formal court rank
      in the Seleucid administration.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐστήρισεν
  chosen: confirmed
  alternatives:
  - established
  - secured
  - strengthened
  lexicon: LSJ
  rationale: In this administrative-political context, the verb indicates making Jonathan's
    office firm or officially secure. 'Confirmed' best conveys ratification of an
    already granted position rather than initial appointment.
- source_word: ἀρχιερωσύνην
  chosen: the high priesthood
  alternatives:
  - high-priestly office
  lexicon: LSJ
  rationale: The noun denotes the office/dignity of the high priest. 'The high priesthood'
    is the most natural and standard English rendering.
- source_word: τίμια
  chosen: honors
  alternatives:
  - privileges
  - distinctions
  - valuable things
  lexicon: LSJ
  rationale: Here the adjective functions substantivally for things of honor or distinction
    previously possessed. In context of royal favor and rank, 'honors' fits better
    than a material sense such as 'valuable things.'
- source_word: τὸ πρότερον
  chosen: formerly
  alternatives:
  - before
  - previously
  lexicon: LSJ
  rationale: Adverbial sense referring to what Jonathan had held earlier. 'Formerly'
    reads smoothly in English while preserving the temporal reference.
- source_word: τῶν πρώτων φίλων
  chosen: among the first friends
  alternatives:
  - among the chief friends
  - one of the foremost friends
  lexicon: LSJ
  rationale: This is a court title in Hellenistic royal administration. A relatively
    literal rendering preserves the formal title while remaining intelligible; 'chief
    friends' is possible but slightly more interpretive.
- source_word: ἡγεῖσθαι
  chosen: rank
  alternatives:
  - be considered
  - be counted
  - hold rank
  lexicon: LSJ
  rationale: With the accusative and genitive construction, the sense is to regard
    or appoint someone as belonging to a class. 'Made him rank among' captures both
    status and appointment idiomatically.
