translation:
  text: And behold, a camp of foreigners met him in the plain, and they set an ambush
    against him in the mountains, while they themselves advanced from the front.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'laid an ambush against him in the mountains, while they themselves met
      him head-on.' The final clause can be rendered more literally as 'they themselves
      met from the opposite side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεμβολὴ
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: LSJ
  rationale: The noun commonly denotes a camp or encampment, especially a military
    one. 'Camp' is concise and natural in English while preserving the military sense.
- source_word: ἀλλοφύλων
  chosen: foreigners
  alternatives:
  - Philistines
  - men of another race
  - aliens
  lexicon: LSJ
  rationale: Literally 'those of another tribe/people.' In this Maccabean context
    it refers broadly to non-Jewish hostile forces, not specifically Philistines,
    so 'foreigners' best preserves the generic ethnic sense without over-specifying.
- source_word: ἀπήντα αὐτῷ
  chosen: met him
  alternatives:
  - came to meet him
  - encountered him
  lexicon: LSJ
  rationale: The verb means to meet or go to meet. 'Met him' is idiomatic and fits
    the narrative flow.
- source_word: ἐν τῷ πεδίῳ
  chosen: in the plain
  alternatives:
  - in the field
  - on the plain
  lexicon: LSJ
  rationale: Here πεδίον refers to open level ground in contrast with the mountains
    mentioned next. 'In the plain' best captures that geographical contrast.
- source_word: ἐξέβαλον ἔνεδρον
  chosen: set an ambush
  alternatives:
  - laid an ambush
  - threw out an ambush
  lexicon: LSJ
  rationale: The idiom means to place or deploy an ambush. 'Set an ambush' is clear
    modern English and preserves the military tactic.
- source_word: ἐπʼ αὐτόν
  chosen: against him
  alternatives:
  - for him
  - upon him
  lexicon: LSJ
  rationale: In ambush contexts the preposition conveys hostile direction. 'Against
    him' makes the adversarial force explicit in natural English.
- source_word: ἐν τοῖς ὄρεσιν
  chosen: in the mountains
  alternatives:
  - among the hills
  - in the hill country
  lexicon: LSJ
  rationale: A straightforward locative plural. 'In the mountains' preserves the contrast
    with the plain and avoids interpretive narrowing.
- source_word: αὐτοὶ δὲ ἀπήντησαν ἐξ ἐναντίας
  chosen: while they themselves advanced from the front
  alternatives:
  - but they themselves met him head-on
  - and they themselves came from the opposite direction
  lexicon: LSJ
  rationale: The emphatic αὐτοί contrasts the ambushers in the mountains with the
    main force. ἐξ ἐναντίας indicates facing him from the opposite/front side. 'Advanced
    from the front' communicates the tactical maneuver in readable English.
