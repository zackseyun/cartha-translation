translation:
  text: And Jonathan met the king at Joppa with honor, and they greeted one another,
    and they spent the night there.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνήντησεν
  chosen: met
  alternatives:
  - went to meet
  - encountered
  lexicon: LSJ
  rationale: The aorist of συναντάω here denotes Jonathan's meeting with the king.
    'Met' is natural English and preserves the event without over-specifying initiative
    beyond the context.
- source_word: εἰς Ἰόππην
  chosen: at Joppa
  alternatives:
  - in Joppa
  - to Joppa
  lexicon: LSJ
  rationale: With verbs of meeting, εἰς plus place can indicate the location where
    the meeting occurred. Since the English clause already has 'met,' 'at Joppa' best
    conveys the sense idiomatically.
- source_word: μετὰ δόξης
  chosen: with honor
  alternatives:
  - with glory
  - with splendor
  lexicon: LSJ
  rationale: δόξα can mean glory, splendor, or honor. In this diplomatic setting,
    the phrase most naturally indicates an honorable or ceremonious reception rather
    than abstract glory, so 'with honor' fits the context.
- source_word: ἠσπάσαντο ἀλλήλους
  chosen: they greeted one another
  alternatives:
  - they welcomed one another
  - they embraced one another
  lexicon: BDAG
  rationale: ἀσπάζομαι commonly means to greet or welcome. 'Greeted one another' is
    the most direct and contextually appropriate rendering; 'embraced' would be too
    specific.
- source_word: ἐκοιμήθησαν
  chosen: they spent the night
  alternatives:
  - they slept
  - they lodged
  lexicon: LSJ
  rationale: The verb literally means 'slept,' but in travel narrative it idiomatically
    refers to staying overnight. 'Spent the night' communicates the narrative sense
    in clear modern English.
