translation:
  text: And they set the city on fire, and took much plunder on that day, and saved
    the king.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐνεπύρισαν
  chosen: set ... on fire
  alternatives:
  - burned
  - kindled a fire in
  lexicon: LSJ
  rationale: The verb denotes setting something ablaze. 'Set the city on fire' is
    idiomatic modern English and preserves the causative force better than the less
    natural 'enfired' or the potentially over-broad 'burned'.
- source_word: πόλιν
  chosen: city
  alternatives:
  - town
  lexicon: LSJ
  rationale: πόλις normally means 'city'; nothing in context requires the smaller-scale
    'town'.
- source_word: ἐλάβοσαν σκῦλα πολλὰ
  chosen: took much plunder
  alternatives:
  - seized many spoils
  - took many spoils
  lexicon: LSJ
  rationale: σκῦλα refers to spoils/plunder taken in war. 'Much plunder' is natural
    English and conveys quantity without sounding archaic.
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  chosen: on that day
  alternatives:
  - in that day
  - that very day
  lexicon: LSJ
  rationale: The phrase is a standard temporal expression. 'On that day' is the most
    straightforward idiomatic rendering.
- source_word: ἔσωσαν
  chosen: saved
  alternatives:
  - rescued
  - delivered
  lexicon: LSJ
  rationale: The verb means to save or rescue. 'Saved' is broad and direct; 'rescued'
    is possible, but 'saved' fits both the immediate danger and the narrative style.
- source_word: τὸν βασιλέα
  chosen: the king
  lexicon: LSJ
  rationale: A straightforward rendering of the direct object with the article preserved
    in sense.
