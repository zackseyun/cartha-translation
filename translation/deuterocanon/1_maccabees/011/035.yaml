translation:
  text: And the rest of the things belonging to us—from now on, the tithes and the
    taxes belonging to us, and the salt lakes, and the crowns belonging to us—we will
    grant all these to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the salt pans' or 'the saltworks'; the Greek reads literally 'the lakes
      of salt,' likely referring to salt-producing resources or their revenues.
    reason: lexical_alternative
  - marker: b
    text: Literally 'crowns.' In this fiscal context it may refer to a customary crown-tribute
      or honorary payment owed to the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἄλλα
  chosen: the rest of the things
  alternatives:
  - the other things
  - the remaining things
  lexicon: LSJ
  rationale: A broad phrase introducing additional royal revenues or rights beyond
    those already named. 'The rest of the things' preserves the open-ended administrative
    sense without over-specifying.
- source_word: ἀνήκοντα ἡμῖν / τῶν ἀνηκόντων ἡμῖν / τοὺς ἀνήκοντας ἡμῖν
  chosen: belonging to us
  alternatives:
  - due to us
  - pertaining to us
  lexicon: LSJ
  rationale: The repeated participle marks items that are the king's rightful revenues
    or prerogatives. 'Belonging to us' is natural English and keeps the possessive/legal
    force.
- source_word: ἀπὸ τοῦ νῦν
  chosen: from now on
  alternatives:
  - henceforth
  - from this time
  lexicon: LSJ
  rationale: This temporal phrase indicates the decree takes effect immediately going
    forward. 'From now on' is clear modern English.
- source_word: δεκατῶν
  chosen: tithes
  alternatives:
  - tenths
  lexicon: LSJ
  rationale: The standard fiscal-religious term for a tenth. 'Tithes' is the normal
    English equivalent and fits the revenue context.
- source_word: τελῶν
  chosen: taxes
  alternatives:
  - duties
  - customs
  lexicon: LSJ
  rationale: In this context the word refers broadly to levies or revenues. 'Taxes'
    is the clearest umbrella term in English; 'duties/customs' is possible but narrower.
- source_word: τὰς τῶν ἁλῶν λίμνας
  chosen: the salt lakes
  alternatives:
  - the salt pans
  - the saltworks
  lexicon: LSJ
  rationale: Literally 'the lakes of salt.' The phrase likely refers to salt-producing
    resources or rights. 'Salt lakes' stays close to the Greek while remaining intelligible;
    more interpretive renderings are preserved as alternatives.
- source_word: στεφάνους
  chosen: crowns
  alternatives:
  - crown-tax
  - tribute in the form of crowns
  lexicon: LSJ
  rationale: Literally 'crowns,' but in Hellenistic royal-administrative usage this
    can denote a customary tribute or honorary payment presented as a golden crown.
    The main text keeps the literal term for transparency, with the fiscal sense preserved
    in a footnote.
- source_word: πάντα ἐπαρκέσομεν αὐτοῖς
  chosen: we will grant all these to them
  alternatives:
  - we will remit all these to them
  - we will provide all these for them
  lexicon: LSJ
  rationale: In context of royal concessions, the sense is that the king will make
    over or remit these revenues to the Jews. 'Grant all these to them' communicates
    the administrative transfer more clearly than a wooden 'provide.'
