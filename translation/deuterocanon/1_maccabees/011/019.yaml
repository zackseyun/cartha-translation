lexical_decisions:
- source_word: ἐβασίλευσεν
  chosen: reigned
  alternatives:
  - became king
  - ruled as king
  lexicon: LSJ
  rationale: The aorist of βασιλεύω here reports the accession/reign of Demetrius.
    'Reigned' is the most natural concise English rendering and fits the chronological
    notice style of 1 Maccabees.
- source_word: Δημήτριος
  chosen: Demetrius
  rationale: Personal name transliterated by standard English convention, following
    project policy to transliterate names rather than translate them.
- source_word: ἔτους ἑβδομοῦ καὶ ἑξηκοστοῦ καὶ ἑκατοστοῦ
  chosen: in the one hundred sixty-seventh year
  alternatives:
  - in year one hundred and sixty-seven
  - in the 167th year
  lexicon: LSJ
  rationale: The genitive phrase is a date formula, literally 'of the seventh and
    sixtieth and hundredth year.' English idiom expresses this as 'in the one hundred
    sixty-seventh year.' This preserves the chronological force without woodenly reproducing
    Greek number order.
