translation:
  text: And Zabdiel the Arab cut off Alexander’s head and sent it to Ptolemy.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀφεῖλεν
  chosen: cut off
  alternatives:
  - removed
  - took away
  lexicon: BDAG
  rationale: In context with 'the head' as direct object, the verb denotes severing/removing
    the head. 'Cut off' is the most natural and explicit English rendering for decapitation,
    whereas 'removed' or 'took away' are too weak or ambiguous.
- source_word: Ζαβδιὴλ
  chosen: Zabdiel
  alternatives:
  - Zabdiel
  rationale: Personal name transliterated by standard English convention, following
    the project's policy to transliterate names rather than translate them.
- source_word: ὁ Ἀραβ
  chosen: the Arab
  alternatives:
  - the Arabian
  lexicon: LSJ
  rationale: The Greek functions as an ethnic designation/appositive identifying Zabdiel.
    'The Arab' is the most direct rendering; 'the Arabian' is possible but less idiomatic
    here.
- source_word: τὴν κεφαλὴν Ἀλεξάνδρου
  chosen: Alexander’s head
  alternatives:
  - the head of Alexander
  lexicon: BDAG
  rationale: The genitive is naturally rendered as possession in English. 'Alexander’s
    head' is concise and clear while preserving the sense exactly.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  - sent off
  lexicon: BDAG
  rationale: Standard narrative verb for sending. 'Sent' is the plain and sufficient
    English equivalent.
- source_word: τῷ Πτολεμαίῳ
  chosen: to Ptolemy
  alternatives:
  - to King Ptolemy
  rationale: The Greek names Ptolemy without the title 'king' in this verse, so the
    translation should not add it.
