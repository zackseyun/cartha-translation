translation:
  text: But King Ptolemy gained control of the cities of the coast as far as Seleucia-by-the-Sea,
    and he was devising evil plans against Alexander.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was considering evil designs concerning Alexander.' The Greek περὶ Ἀλεξάνδρου
      is literally 'concerning Alexander,' but in context the sense is hostile.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκυρίευσεν
  chosen: gained control of
  alternatives:
  - ruled over
  - became master of
  - took possession of
  lexicon: LSJ
  rationale: The verb denotes exercising mastery or dominion. 'Gained control of'
    fits the military-political context of advancing through and securing coastal
    cities, while sounding natural in modern English. It avoids overstating permanent
    sovereignty with 'ruled over' and is clearer than the more literal but less idiomatic
    'became master of.'
- source_word: πόλεων τῆς παραλίας
  chosen: the cities of the coast
  alternatives:
  - the coastal cities
  - the cities of the seaboard
  lexicon: LSJ
  rationale: The genitive phrase literally refers to the coastal region. 'The cities
    of the coast' preserves the structure and geographic sense without becoming stiff.
    'Coastal cities' would also be possible, but the chosen rendering stays slightly
    closer to the Greek wording.
- source_word: ἕως Σελευκίας τῆς παραθαλασσίας
  chosen: as far as Seleucia-by-the-Sea
  alternatives:
  - as far as Seleucia on the sea
  - as far as seaside Seleucia
  lexicon: LSJ
  rationale: The phrase identifies which Seleucia is meant by adding 'the maritime/coastal
    one.' 'Seleucia-by-the-Sea' is a clear English geographical designation that preserves
    the distinguishing epithet.
- source_word: διελογίζετο
  chosen: was devising
  alternatives:
  - was considering
  - was plotting
  - was reasoning
  lexicon: LSJ
  rationale: The middle/imperfect form conveys ongoing deliberation. Because it is
    immediately qualified by 'evil plans,' English 'was devising' captures both the
    deliberative process and the hostile intent without importing more than the context
    already implies. 'Was plotting' is possible but slightly more interpretive.
- source_word: λογισμοὺς πονηρούς
  chosen: evil plans
  alternatives:
  - wicked schemes
  - evil thoughts
  - malicious designs
  lexicon: LSJ
  rationale: The noun can denote calculations, designs, or plans; with πονηρούς it
    clearly carries a hostile sense. 'Evil plans' is direct, readable, and preserves
    the moral force of πονηρούς. 'Wicked schemes' is vivid but somewhat more stylized.
- source_word: περὶ Ἀλεξάνδρου
  chosen: against Alexander
  alternatives:
  - concerning Alexander
  - about Alexander
  lexicon: LSJ
  rationale: 'Although περὶ often means ''concerning,'' in this context of ''evil
    plans'' the sense is adversative in effect: the plans are directed toward Alexander.
    ''Against Alexander'' makes the implied hostility explicit in idiomatic English
    and best reflects the contextual force.'
