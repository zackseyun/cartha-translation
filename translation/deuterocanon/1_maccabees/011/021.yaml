translation:
  text: And some lawless men, who hated their own nation, went to the king and reported
    to him that Jonathan was besieging the citadel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Acra,” the fortified citadel in Jerusalem.
