lexical_decisions:
- source_word: ἐπορεύθησάν
  chosen: went
  alternatives:
  - set out
  - traveled
  lexicon: BDAG
  rationale: A straightforward narrative verb of movement; 'went' is natural modern
    English and adequately reflects the aorist without overtranslating.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  - some men
  lexicon: BDAG
  rationale: Indefinite plural; 'some' preserves the nonspecific reference. 'Men'
    is supplied from the following apposition ἄνδρες.
- source_word: μισοῦντες
  chosen: who hated
  alternatives:
  - hating
  lexicon: BDAG
  rationale: Rendered as a relative clause for idiomatic English while preserving
    the participle's descriptive force.
- source_word: τὸ ἔθνος αὐτῶν
  chosen: their own nation
  alternatives:
  - their people
  - their own people
  lexicon: BDAG
  rationale: ἔθνος here refers to the Jewish national community rather than 'Gentiles'
    or a generic ethnic group. 'Their own nation' best conveys the political-ethnic
    sense in context.
- source_word: ἄνδρες παράνομοι
  chosen: lawless men
  alternatives:
  - outlaws
  - wicked men
  - men without law
  lexicon: BDAG
  rationale: παράνομοι is a moral-legal characterization, not merely criminal status.
    'Lawless men' preserves both the evaluative force and the appositional emphasis.
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - announced
  - informed
  - told
  lexicon: BDAG
  rationale: The verb denotes bringing a report to an authority. 'Reported' fits the
    court setting and avoids sounding overly formal.
- source_word: περικάθηται
  chosen: was besieging
  alternatives:
  - was surrounding
  - was blockading
  - was encamped around
  lexicon: LSJ
  rationale: In military context with a fortified target, the verb means to sit around
    or invest a place. 'Was besieging' best captures the hostile military action implied.
- source_word: τὴν ἄκραν
  chosen: the citadel
  alternatives:
  - the Acra
  - the fortress
  lexicon: LSJ
  rationale: ἄκρα can denote a citadel or fortress. 'The citadel' gives the common
    sense directly in English; the historically specific name 'Acra' is a possible
    alternative worth preserving in a footnote.
