translation:
  text: And King Ptolemy died on the third day, and those who were in his strongholds
    were destroyed by those in the strongholds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek repeats 'in the strongholds' in both clauses. The wording likely distinguishes
      those in Ptolemy's strongholds from those in the strongholds who turned against
      them, but the exact relationship is compressed in the Greek.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - passed away
  lexicon: BDAG
  rationale: The aorist verb straightforwardly denotes death. 'Died' is the plain,
    direct English equivalent and avoids euphemism.
- source_word: ἐν τῇ ἡμέρᾳ τῇ τρίτῃ
  chosen: on the third day
  alternatives:
  - on day three
  - on the third day after that
  lexicon: BDAG
  rationale: This idiom is naturally rendered 'on the third day.' The Greek does not
    explicitly restate the reference point beyond the narrative sequence, so no expansion
    was added.
- source_word: οἱ ὄντες
  chosen: those who were
  alternatives:
  - the men who were
  - those being
  lexicon: BDAG
  rationale: The participial expression refers generally to the persons present in
    the locations mentioned. 'Those who were' is natural English and preserves the
    broad reference without adding 'men,' which the Greek does not specify.
- source_word: ὀχυρώμασιν
  chosen: strongholds
  alternatives:
  - fortresses
  - fortified places
  lexicon: LSJ
  rationale: ὀχύρωμα denotes a fortified place or stronghold. 'Strongholds' preserves
    the military sense while remaining readable. 'Fortresses' is possible, but the
    plural repeated in both clauses reads more smoothly as 'strongholds.'
- source_word: ἀπώλοντο
  chosen: were destroyed
  alternatives:
  - perished
  - were killed
  lexicon: BDAG
  rationale: The passive/intransitive aorist here indicates that they met destruction.
    'Were destroyed' preserves the force of the verb and leaves open whether this
    occurred by slaughter or broader ruin. 'Were killed' is too narrow; 'perished'
    is possible but less clearly agentive in context.
- source_word: ὑπὸ τῶν ἐν τοῖς ὀχυρώμασιν
  chosen: by those in the strongholds
  alternatives:
  - by those who were in the strongholds
  - by the men in the fortresses
  lexicon: BDAG
  rationale: ὑπό with the genitive marks agency. The phrase is somewhat terse and
    repetitive in Greek; this rendering keeps the repetition visible and preserves
    the likely sense that one group occupying fortified positions destroyed another.
