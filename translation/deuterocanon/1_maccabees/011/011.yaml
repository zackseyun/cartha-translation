translation:
  text: and he reproached him because he desired his kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blamed him for coveting his kingdom.' The Greek verb for 'desired' can
      carry the stronger sense 'coveted' in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐψόγισεν
  chosen: reproached
  alternatives:
  - blamed
  - found fault with
  - rebuked
  lexicon: LSJ
  rationale: The verb ψογίζω means to blame, censure, or reproach. 'Reproached' preserves
    the personal and accusatory force without overstating it into a formal judicial
    'condemned' or a stronger moral 'rebuked.'
- source_word: χάριν τοῦ
  chosen: because
  alternatives:
  - on account of
  - for
  lexicon: LSJ
  rationale: The construction χάριν with the articular infinitive expresses cause
    or reason. 'Because' is natural modern English and accurately conveys the causal
    sense.
- source_word: ἐπιθυμῆσαι
  chosen: desired
  alternatives:
  - coveted
  - longed for
  - set his desire on
  lexicon: LSJ
  rationale: ἐπιθυμέω can range from neutral 'desire' to stronger 'covet.' Here the
    context is political ambition toward another's rule; 'desired' keeps the wording
    close to the Greek while allowing the surrounding narrative to supply the negative
    coloring. 'Coveted' is possible but slightly more interpretive.
- source_word: τῆς βασιλείας
  chosen: kingdom
  alternatives:
  - kingship
  - royal rule
  lexicon: LSJ
  rationale: βασιλεία commonly denotes kingdom or reign. In this context it refers
    to the royal dominion belonging to the other ruler. 'Kingdom' is the most straightforward
    and idiomatic rendering.
- source_word: αὐτοῦ ... αὐτοῦ
  chosen: him ... his
  lexicon: Greek grammar
  rationale: 'The repeated pronouns create a compact Greek expression: he reproached
    ''him'' because he desired ''his'' kingdom. English preserves the ambiguity of
    the pronouns as in the Greek, with the most natural reading being that one person
    reproached another for desiring that other''s kingdom.'
