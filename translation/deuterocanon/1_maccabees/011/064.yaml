translation:
  text: And he went to meet them, but he left his brother Simon in the country.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the land' or 'in the region'; the Greek χώρα can denote territory
      more broadly than cultivated countryside.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήντησεν
  chosen: went to meet
  alternatives:
  - met
  - encountered
  lexicon: LSJ
  rationale: The verb means to go to meet or encounter. 'Went to meet' preserves the
    directional nuance implied by the compound verb better than the flatter 'met.'
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - him
  lexicon: Greek lexicon
  rationale: The dative plural is straightforwardly 'them' in the Swete text, so the
    English should reflect the plural object.
- source_word: κατέλιπεν
  chosen: left
  alternatives:
  - stationed
  - left behind
  lexicon: LSJ
  rationale: The verb commonly means 'left' or 'left behind.' 'Left' is the most natural
    English here; the sense of leaving someone in a place is preserved by the following
    phrase.
- source_word: ἐν τῇ χώρᾳ
  chosen: in the country
  alternatives:
  - in the land
  - in the region
  lexicon: LSJ
  rationale: χώρα can mean country, land, or region. In this military-geographical
    context, 'in the country' naturally conveys that Simon remained behind in the
    territory rather than accompanying him.
- source_word: ἀδελφὸν αὐτοῦ Σίμωνα
  chosen: his brother Simon
  alternatives:
  - Simon his brother
  lexicon: Greek lexicon
  rationale: This preserves both the familial relation and the proper name in clear
    modern English without changing the sense.
