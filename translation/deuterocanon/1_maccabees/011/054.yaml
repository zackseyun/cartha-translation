translation:
  text: After these things Tryphon returned, and Antiochus with him, a younger boy;
    and he became king and put on the crown.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a younger child' or 'a very young boy.' The Greek παιδάριον νεώτερον
      emphasizes Antiochus's youth.
    reason: lexical_alternative
  - marker: b
    text: Literally 'put on the diadem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: LSJ
  rationale: A straightforward temporal transition. 'After these things' preserves
    the plural demonstrative phrase without unnecessary smoothing.
- source_word: ἀπέστρεψεν
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: LSJ
  rationale: The verb commonly means to turn back or return. 'Returned' is idiomatic
    English and fits the narrative movement.
- source_word: παιδάριον νεώτερον
  chosen: a younger boy
  alternatives:
  - a very young boy
  - a younger child
  - a younger lad
  lexicon: LSJ
  rationale: παιδάριον denotes a child/boy, and νεώτερον marks comparative youthfulness.
    'A younger boy' preserves both the diminutive/juvenile sense and the comparative
    adjective without overinterpreting exact age.
- source_word: ἐβασίλευσεν
  chosen: he reigned
  alternatives:
  - he became king
  - he ruled as king
  lexicon: LSJ
  rationale: The aorist can denote accession or reign. Here, in sequence with 'put
    on the crown,' the sense is royal assumption. 'He reigned' stays close to the
    Greek while allowing the enthronement context to be inferred.
- source_word: ἐπέθετο διάδημα
  chosen: put on the crown
  alternatives:
  - placed the diadem on himself
  - put on the diadem
  lexicon: LSJ
  rationale: διάδημα is specifically the royal headband/diadem. 'Crown' is the most
    natural modern English equivalent; 'put on' reflects the middle sense of ἐπέθετο.
