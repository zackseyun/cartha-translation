theological_decisions:
- issue: Royal terminology for διάδημα
  chosen_reading: crown
  alternative_readings:
  - diadem
  rationale: The verse is historical rather than doctrinal, and 'crown' communicates
    the royal symbol clearly in modern English. The more formal 'diadem' is preserved
    as an alternative because it is lexically more specific.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
- issue: Force of ἐβασίλευσεν in context
  chosen_reading: he reigned
  alternative_readings:
  - he became king
  rationale: The Greek verb itself does not require an explicit ingressive rendering.
    Since the following clause already narrates the crowning, 'he reigned' preserves
    the source wording without adding interpretive emphasis.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §5
    (consistency of key terms, or documented exception)
