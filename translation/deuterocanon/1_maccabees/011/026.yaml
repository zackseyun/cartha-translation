translation:
  text: And the king did for him as those before him had done for him, and he exalted
    him above all his friends.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the presence of all his friends.' The Greek phrase can denote public
      elevation before the king's court, though the context also supports the sense
      of rank above them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν αὐτῷ
  chosen: dealt with him
  alternatives:
  - did for him
  - treated him
  lexicon: LSJ
  rationale: ποιέω with dative here is idiomatic and refers to the king's treatment
    or action toward Jonathan, not merely 'made' in a literal sense. 'Dealt with him'
    captures the relational/political action in natural English while staying close
    to the Greek.
- source_word: καθὼς ἐποίησαν αὐτῷ οἱ πρὸ αὐτοῦ
  chosen: as those before him had dealt with him
  alternatives:
  - as his predecessors had done for him
  - as those before him had treated him
  lexicon: LSJ
  rationale: οἱ πρὸ αὐτοῦ means those before the king, i.e., his predecessors. Rendering
    it more literally as 'those before him' preserves the Greek structure while the
    full clause makes the sense clear in context.
- source_word: ὕψωσεν
  chosen: he exalted
  alternatives:
  - raised
  - honored
  - promoted
  lexicon: LSJ
  rationale: ὑψόω commonly means to raise or exalt. In this courtly-political context
    it denotes elevation in rank or honor. 'Exalted' preserves the formal dignity
    and leaves the exact mode of advancement broad, as in the Greek.
- source_word: ἐναντίον πάντων τῶν φίλων αὐτοῦ
  chosen: above all his friends
  alternatives:
  - before all his friends
  - in the presence of all his friends
  - over all his friends
  lexicon: LSJ
  rationale: Although ἐναντίον often means 'before/in the presence of,' with ὕψωσεν
    in a rank-setting context the sense is comparative elevation over others at court.
    'Above all his friends' best conveys the political meaning. 'Friends' reflects
    the technical Hellenistic court term φίλοι, members of the king's circle, while
    remaining readable.
