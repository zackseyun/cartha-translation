translation:
  text: And he stayed close to him, so that he might hand him over to him, so that
    he might reign in place of his father. And they reported to him all that Demetrius
    had done, and the hostility with which his forces were hostile to him; and he
    remained there many days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek wording is repetitive and somewhat awkward: literally, ''the
      hostility which his forces are hostile to him.'' The translation keeps the sense
      that Demetrius''s own forces were acting against him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσήδρευσεν
  chosen: kept close to
  alternatives:
  - sat beside
  - attended closely to
  - courted the favor of
  lexicon: LSJ
  rationale: The verb suggests staying near or attaching oneself closely to someone.
    In this political context, 'kept close to' preserves the physical/social nearness
    without over-interpreting motive as flattery alone.
- source_word: παραδοῖ
  chosen: might hand ... over
  alternatives:
  - might deliver
  - might surrender
  lexicon: BDAG
  rationale: παραδίδωμι commonly means 'hand over/deliver up.' 'Hand over' fits the
    political betrayal/extradition sense here and is idiomatic in English.
- source_word: βασιλεύσῃ ἀντὶ τοῦ πατρὸς αὐτοῦ
  chosen: might reign in place of his father
  alternatives:
  - might be king instead of his father
  - might rule after his father
  lexicon: LSJ
  rationale: This clause expresses succession to royal rule. 'Reign in place of his
    father' is natural English and keeps the force of ἀντί as replacement/succession.
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - announced
  - told
  lexicon: BDAG
  rationale: The verb denotes bringing a report. 'Reported' best matches the formal
    political/military setting.
- source_word: συνετέλεσεν
  chosen: had done
  alternatives:
  - had accomplished
  - had carried out
  lexicon: LSJ
  rationale: Although the verb can mean 'bring to completion' or 'accomplish,' in
    this context the object is the totality of Demetrius's actions. 'Had done' is
    broad enough to cover the sense without implying success or approval.
- source_word: ἔχθραν
  chosen: hostility
  alternatives:
  - enmity
  - hatred
  lexicon: BDAG
  rationale: '''Hostility'' conveys active opposition in a military-political context
    better than the more emotional ''hatred,'' while remaining readable.'
- source_word: ἣν ἐχθραίνονσιν αὐτῷ αἱ δυνάμεις αὐτοῦ
  chosen: with which his forces were hostile to him
  alternatives:
  - that his forces bore against him
  - which his forces showed toward him
  lexicon: LSJ
  rationale: The Greek is somewhat awkward and repetitive, using cognate noun and
    verb for enmity/hostility. The translation preserves that sense without smoothing
    away the fact that Demetrius's own forces were acting hostile toward him.
- source_word: αἱ δυνάμεις αὐτοῦ
  chosen: his forces
  alternatives:
  - his troops
  - his army
  lexicon: LSJ
  rationale: δυνάμεις in military narrative often refers to armed forces or troops.
    'His forces' is broad and fits the plural form.
- source_word: ἔμεινεν ἐκεῖ ἡμέρας πολλάς
  chosen: he remained there many days
  alternatives:
  - he stayed there a long time
  - he remained there for many days
  lexicon: BDAG
  rationale: A straightforward temporal notice. 'Remained there many days' is close
    to the Greek and idiomatic.
