translation:
  text: And he turned back to make war against them, and routed them, and they fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'he turned back toward them war'; the translation renders
      the compressed idiom as 'turned back to make war against them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέστρεψεν
  chosen: turned back
  alternatives:
  - returned
  - turned
  lexicon: LSJ
  rationale: The verb commonly means 'turn back/return.' 'Turned back' preserves the
    directional force of ἐπί- while fitting the narrative context of reengagement
    in battle.
- source_word: πρὸς αὐτοὺς πόλεμον
  chosen: to make war against them
  alternatives:
  - against them in battle
  - war against them
  lexicon: LSJ
  rationale: The phrase is somewhat compressed in Greek. Rendering it verbally as
    'to make war against them' gives clear English sense while preserving the hostile
    action indicated by πόλεμον with πρὸς αὐτούς.
- source_word: ἐτροπώσατο
  chosen: routed
  alternatives:
  - defeated
  - put to flight
  lexicon: LSJ
  rationale: The verb denotes causing an enemy to turn in flight or suffer rout. 'Routed'
    is more precise militarily than the broader 'defeated' and fits the following
    clause 'and they fled.'
- source_word: ἔφυγον
  chosen: they fled
  alternatives:
  - they ran away
  - they took flight
  lexicon: LSJ
  rationale: A straightforward past narrative rendering of the aorist; 'fled' is concise
    and suitably formal for battle narrative.
