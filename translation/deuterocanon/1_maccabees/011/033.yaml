translation:
  text: To the nation of the Jews, our friends, who also maintain what is right toward
    us, we have decided to do good, because of their goodwill toward us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who also uphold their obligations toward us.' The Greek phrase literally
      reads 'who maintain the just things toward us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ ἔθνει τῶν Ἰουδαίων
  chosen: to the nation of the Jews
  alternatives:
  - to the Jewish nation
  - to the people of the Jews
  - for the nation of the Jews
  lexicon: LSJ
  rationale: ἔθνος commonly means 'nation' or 'people.' The dative here is best taken
    as the indirect object of ἐκρίναμεν ἀγαθοποιῆσαι. 'Nation of the Jews' stays close
    to the Greek while remaining natural enough in English.
- source_word: φίλοις ἡμῶν
  chosen: our friends
  alternatives:
  - friends of ours
  - those friendly to us
  lexicon: LSJ
  rationale: Predicate/appositional description of the Jews. 'Our friends' is the
    most direct and idiomatic rendering.
- source_word: συντηροῦσι
  chosen: who also maintain
  alternatives:
  - who preserve
  - who keep
  - who uphold
  lexicon: LSJ
  rationale: The participle describes continued loyalty or observance. 'Maintain'
    captures ongoing adherence without sounding overly wooden; 'also' reflects the
    connective force in context.
- source_word: τὰ πρὸς ἡμᾶς δίκαια
  chosen: what is right toward us
  alternatives:
  - their obligations toward us
  - justice toward us
  - what is just in relation to us
  lexicon: LSJ
  rationale: Literally 'the just things toward us.' The phrase likely refers to proper
    or loyal conduct in relation to the speaker. 'What is right toward us' preserves
    the moral-legal sense without over-specifying formal obligations.
- source_word: ἐκρίναμεν
  chosen: we have decided
  alternatives:
  - we judged
  - we determined
  - we resolved
  lexicon: LSJ
  rationale: In epistolary royal style, the verb expresses an official determination.
    'We have decided' is clear modern English and fits the decree-like context.
- source_word: ἀγαθοποιῆσαι
  chosen: to do good
  alternatives:
  - to act kindly
  - to benefit
  - to show favor
  lexicon: LSJ
  rationale: The infinitive means to do good or act beneficently. 'To do good' is
    sufficiently broad and close to the Greek, leaving the specific benefits to the
    following verses/context.
- source_word: χάριν
  chosen: because of
  alternatives:
  - for the sake of
  - on account of
  lexicon: LSJ
  rationale: Introduces the reason for the favorable decision. 'Because of' is the
    most natural causal rendering here.
- source_word: τῆς ἑαυτῶν εὐνοίας πρὸς ἡμᾶς
  chosen: their goodwill toward us
  alternatives:
  - their loyalty toward us
  - their favor toward us
  - their benevolence toward us
  lexicon: LSJ
  rationale: εὔνοια denotes goodwill, favor, or loyal disposition. 'Their goodwill
    toward us' best matches the relational and political tone of the sentence.
