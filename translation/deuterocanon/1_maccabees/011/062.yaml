translation:
  text: And the men from Gaza asked terms of Jonathan, and he gave them pledges of
    peace; and he took the sons of their rulers as hostages and sent them to Jerusalem.
    And he passed through the country as far as Damascus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness here includes the isolated word 'Asalim' (Ἀσαλήμ) after
      'Jerusalem.' Because it does not fit the sentence smoothly, it may reflect a
      textual corruption or stray place-name in this line of transmission.
    reason: textual_variant
  - marker: b
    text: Literally, 'he gave them right hands,' an idiom for giving pledges of peace
      or good faith.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠξίωσαν
  chosen: asked terms
  alternatives:
  - requested
  - appealed to
  - sued for peace
  lexicon: LSJ
  rationale: In this military-political context, the verb likely means more than a
    simple request; it conveys making an appeal or seeking favorable terms. 'Asked
    terms' preserves the compressed Greek sense without overinterpreting as a full
    idiom like 'sued for peace.'
- source_word: οἱ ἀπὸ Γάζης
  chosen: the men from Gaza
  alternatives:
  - those from Gaza
  - the people of Gaza
  lexicon: LSJ
  rationale: Literally 'those from Gaza.' 'The men from Gaza' gives natural English
    while retaining the reference to representatives from the city rather than the
    city abstractly.
- source_word: ἔδωκεν αὐτοῖς δεξιάς
  chosen: he gave them pledges of peace
  alternatives:
  - he gave them right hands
  - he gave them assurances
  - he gave them his right hand
  lexicon: LSJ
  rationale: The plural δεξιάς reflects the idiom of giving the right hand as a pledge
    of good faith or peace. A literal rendering would be obscure in modern English,
    so the idiomatic sense is brought into the main text.
- source_word: τοὺς υἱοὺς τῶν ἀρχόντων αὐτῶν
  chosen: the sons of their rulers
  alternatives:
  - the sons of their leaders
  - their rulers' sons
  lexicon: LSJ
  rationale: ἀρχόντων denotes ruling officials or leaders. 'Rulers' best fits the
    political setting and keeps the formal tone.
- source_word: εἰς ὅμηρα
  chosen: as hostages
  alternatives:
  - for hostages
  - as pledges
  lexicon: LSJ
  rationale: The phrase indicates the function for which the sons were taken. 'As
    hostages' is the clearest idiomatic English rendering.
- source_word: διῆλθεν τὴν χώραν
  chosen: he passed through the country
  alternatives:
  - he went through the land
  - he traversed the region
  lexicon: LSJ
  rationale: χώρα can mean land, country, or region. 'Country' is natural here and
    broad enough for the surrounding territory.
- source_word: ἕως Δαμασκοῦ
  chosen: as far as Damascus
  alternatives:
  - up to Damascus
  lexicon: LSJ
  rationale: Standard spatial rendering of ἕως with a place name.
- source_word: Ἀσαλήμ
  chosen: omitted from main text as likely corrupt or stray in the transmitted line
  alternatives:
  - Asalim
  - Salem
  lexicon: LSJ
  rationale: The Swete line includes 'Ἀσαλήμ' after 'Jerusalem,' but in this context
    it does not integrate syntactically into the sentence and appears to reflect a
    textual corruption or intrusive place-name in the diplomatic witness. Because
    the source witness is otherwise high-confidence but this token is anomalous, it
    is not represented in the main translation and is preserved in a footnote.
