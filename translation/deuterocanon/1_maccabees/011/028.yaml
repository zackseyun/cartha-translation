translation:
  text: And Jonathan asked the king to make Judea, the three toparchies, and Samaria
    tax-free, and he promised him three hundred talents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A toparchy was an administrative district. The Greek preserves a technical
      territorial term rather than a generic word for region.
    reason: cultural_note
lexical_decisions:
- source_word: ἠξίωσεν
  chosen: asked
  alternatives:
  - requested
  - urged
  - demanded
  lexicon: LSJ
  rationale: The verb can range from 'think worthy/claim' to 'ask/request.' In this
    context, with an infinitive of what the king should do, it denotes a formal request
    made to the king. 'Asked' is natural modern English and avoids overstating the
    force as 'demanded.'
- source_word: ποιῆσαι
  chosen: to make
  alternatives:
  - to render
  - to grant as
  lexicon: LSJ
  rationale: 'The infinitive expresses the content of Jonathan''s request: that the
    king cause these territories to have a certain status. ''To make'' is the most
    direct and idiomatic rendering in English.'
- source_word: ἀφορολόγητον
  chosen: tax-free
  alternatives:
  - exempt from tribute
  - free from taxation
  lexicon: LSJ
  rationale: The adjective denotes exemption from taxation/tribute. 'Tax-free' is
    concise, accurate, and readable modern English. 'Exempt from tribute' is possible
    but narrower and more formal.
- source_word: τὰς τρεῖς τοπαρχίας
  chosen: the three toparchies
  alternatives:
  - the three districts
  - the three administrative districts
  lexicon: LSJ
  rationale: Τοπαρχία is an administrative territorial term. Retaining 'toparchies'
    preserves the technical governmental sense and avoids flattening a specific ancient
    office/region structure into a generic 'districts.'
- source_word: τὴν Σαμαρῖτιν
  chosen: Samaria
  alternatives:
  - the Samaritan region
  - the district of Samaria
  lexicon: LSJ
  rationale: The term refers to the region of Samaria. 'Samaria' is the standard English
    geographical rendering and is sufficiently clear in context.
- source_word: ἐπηγγείλατο
  chosen: he promised
  alternatives:
  - he offered
  - he pledged
  lexicon: LSJ
  rationale: The middle verb means 'promised' or 'undertook.' Here it introduces what
    Jonathan committed to give the king. 'Promised' best matches the Greek while remaining
    idiomatic.
- source_word: τάλαντα τριακόσια
  chosen: three hundred talents
  alternatives:
  - 300 talents
  lexicon: LSJ
  rationale: A talent is a large ancient monetary/weight unit. The traditional term
    should be retained rather than converted into speculative modern currency equivalents.
