translation:
  text: And Jonathan tore his clothes, and put earth on his head, and prayed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Putting earth or dust on the head was a customary sign of grief, distress,
      or lament.
    reason: cultural_note
  - marker: b
    text: Or 'dust on his head.' The Greek reads 'earth' (γῆ), but English often uses
      'dust' in this mourning context.
    reason: lexical_alternative
lexical_decisions:
- source_word: διέρρηξεν
  chosen: tore
  alternatives:
  - rent
  - tore apart
  lexicon: LSJ
  rationale: Aorist of διαρρήγνυμι, used idiomatically for tearing garments in grief
    or distress. 'Tore' is clear modern English; 'rent' is traditional but archaic.
- source_word: τὰ ἱμάτια αὐτοῦ
  chosen: his clothes
  alternatives:
  - his garments
  - his robes
  lexicon: LSJ
  rationale: ἱμάτια refers broadly to garments/clothing. 'Clothes' is natural modern
    English; 'garments' is possible but slightly more formal. No indication that 'robes'
    is required.
- source_word: ἐπέθετο γῆν ἐπὶ τὴν κεφαλὴν αὐτοῦ
  chosen: put earth on his head
  alternatives:
  - placed dust on his head
  - put soil on his head
  lexicon: LSJ
  rationale: γῆ can mean earth/ground/soil. In mourning contexts English often uses
    'dust,' but the Greek here is γῆ rather than κονιορτός or σποδός. 'Earth' stays
    closer to the source while remaining intelligible.
- source_word: προσηύξατο
  chosen: prayed
  alternatives:
  - offered prayer
  lexicon: LSJ
  rationale: Straightforward middle aorist of προσεύχομαι. 'Prayed' is the plain and
    accurate rendering.
- source_word: Ἰωνάθαν
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
