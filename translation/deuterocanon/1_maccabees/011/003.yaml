translation:
  text: And as he entered the cities of Ptolemais, he stationed forces as a garrison
    in each city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'into the cities Ptolemais.' The phrase is syntactically
      compressed; it is taken here to mean the cities belonging to or controlled by
      Ptolemy.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  chosen: And as
  alternatives:
  - Now as
  - And when
  lexicon: LSJ
  rationale: Marks a temporal transition in the narrative. 'And as' preserves both
    the connective δέ and the contemporaneous sense of ὡς without sounding overly
    wooden.
- source_word: εἰσεπορεύετο
  chosen: he entered into
  alternatives:
  - he was going into
  - he came into
  lexicon: LSJ
  rationale: Imperfect middle/passive form of εἰσπορεύομαι conveys repeated or progressive
    movement through locations. 'Entered into' fits the iterative sense in context
    and works naturally with the following plural 'cities.'
- source_word: εἰς τὰς πόλεις Πτολεμαΐς
  chosen: into the cities of Ptolemais
  alternatives:
  - into the cities, to Ptolemais
  - into the Ptolemaic cities
  lexicon: LSJ
  rationale: The Greek construction is somewhat compressed. The most natural sense
    in context is that Πτολεμαΐς functions adjectivally/genitivally with πόλεις, referring
    to the cities under Ptolemy's control rather than the single city Ptolemais. This
    avoids the awkwardness of treating a singular city name as the destination of
    a plural noun phrase.
- source_word: ἀπετάσσε
  chosen: he stationed
  alternatives:
  - he posted
  - he assigned
  - he set
  lexicon: LSJ
  rationale: In military context the verb denotes arranging or assigning troops. 'Stationed'
    is idiomatic English for placing troops in fixed positions and matches the following
    garrison phrase.
- source_word: τὰς δυνάμεις
  chosen: forces
  alternatives:
  - troops
  - armies
  lexicon: LSJ
  rationale: A military term for armed personnel. 'Forces' is broad enough for the
    context and avoids implying multiple full armies, while still conveying organized
    military units.
- source_word: φρουράν
  chosen: as a garrison
  alternatives:
  - for a garrison
  - on guard
  lexicon: LSJ
  rationale: Accusative in apposition/predicative use indicating the role for which
    the forces were stationed. 'As a garrison' clearly expresses function in English.
- source_word: ἐν ἑκάστῃ πόλει
  chosen: in each city
  alternatives:
  - in every city
  lexicon: LSJ
  rationale: Straightforward distributive phrase. 'Each city' preserves the individualizing
    force of ἑκάστῃ.
