translation:
  text: Now then, take care to make a copy of these things, and let it be given to
    Jonathan, and let it be placed on the holy mountain in a prominent place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a conspicuous place.' The Greek expression suggests a location that
      is publicly noticeable or officially marked out.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν οὖν
  chosen: Now then
  alternatives:
  - Therefore now
  - So now
  lexicon: LSJ
  rationale: The combination marks a transition and inference. 'Now then' gives natural
    English while preserving the exhortatory turn.
- source_word: ἐπιμελεῖσθε
  chosen: take care
  alternatives:
  - be diligent
  - see to it
  lexicon: LSJ
  rationale: The middle imperative calls for careful attention to carrying out the
    order. 'Take care' is idiomatic and suitably formal without sounding archaic.
- source_word: τοῦ ποιῆσαι
  chosen: to make
  alternatives:
  - to prepare
  - to produce
  lexicon: LSJ
  rationale: With ἀντίγραφον, the infinitive means making a written copy. 'Make' is
    the most straightforward English equivalent.
- source_word: τούτων
  chosen: of these things
  alternatives:
  - of these
  - of this
  lexicon: LSJ
  rationale: The plural demonstrative most naturally refers to the contents just mentioned
    in the document. 'These things' preserves the plural and avoids over-specifying
    'this decree' where the Greek is broader.
- source_word: ἀντίγραφον
  chosen: a copy
  alternatives:
  - a duplicate
  - a transcript
  lexicon: LSJ
  rationale: The term denotes a written copy of a document. 'Copy' is clear modern
    English and fits the administrative context.
- source_word: δοθήτω
  chosen: let it be given
  alternatives:
  - it shall be given
  - give it
  lexicon: LSJ
  rationale: The aorist passive imperative is well represented by 'let it be given,'
    preserving the formal directive tone.
- source_word: Ἰωνάθαν
  chosen: Jonathan
  alternatives:
  - Jonathas
  rationale: Standard English transliteration of the personal name, following the
    project's policy to transliterate names by standard conventions.
- source_word: τεθήτω
  chosen: let it be placed
  alternatives:
  - let it be set
  - let it be deposited
  lexicon: LSJ
  rationale: The passive imperative indicates official placement of the copy. 'Placed'
    is natural and broad enough for the context.
- source_word: ἐν ὄρει τῷ ἁγίῳ
  chosen: on the holy mountain
  alternatives:
  - in the holy hill
  - on the sacred mountain
  lexicon: LSJ
  rationale: The phrase refers to Jerusalem's temple mount or Zion. 'On the holy mountain'
    is the most idiomatic English rendering for ἐν with a topographical location here.
- source_word: ἐν τόπῳ ἐπισήμῳ
  chosen: in a prominent place
  alternatives:
  - in a conspicuous place
  - in a distinguished place
  lexicon: LSJ
  rationale: ἐπίσημος here conveys visibility or public notice. 'Prominent place'
    communicates that the document is to be set where it is publicly notable.
