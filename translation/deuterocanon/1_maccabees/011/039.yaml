translation:
  text: Now Tryphon had formerly been among those with Alexander, and seeing that
    all the forces were grumbling against Demetrius, he went to Simmakoues the Arab,
    who was rearing Antiochus, the little child of Alexander.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the child of Alexander,' that is, Alexander's son.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τρύφων
  chosen: Tryphon
  rationale: Personal name transliterated by standard convention.
- source_word: τῶν παρὰ Ἀλεξάνδρου
  chosen: among those with Alexander
  alternatives:
  - from Alexander's party
  - one of Alexander's men
  lexicon: LSJ
  rationale: The idiom παρὰ + genitive with a personal name here denotes association
    or belonging to someone's side/party. 'Among those with Alexander' preserves the
    relational sense without over-interpreting rank.
- source_word: τὸ πρότερον
  chosen: formerly
  alternatives:
  - previously
  - earlier
  lexicon: LSJ
  rationale: Adverbial accusative indicating prior time; 'formerly' is concise and
    natural.
- source_word: πᾶσαι αἱ δυνάμεις
  chosen: all the forces
  alternatives:
  - all the troops
  - all the armies
  lexicon: LSJ
  rationale: δυνάμεις in military context refers to armed forces/troops. 'Forces'
    preserves breadth and avoids implying multiple separate armies more strongly than
    the Greek requires.
- source_word: καταγογγύζουσιν
  chosen: were grumbling
  alternatives:
  - were murmuring
  - were complaining
  lexicon: LSJ
  rationale: The verb conveys muttering or discontented complaint. 'Were grumbling'
    captures the hostile dissatisfaction in idiomatic modern English.
- source_word: κατὰ τοῦ Δημητρίου
  chosen: against Demetrius
  alternatives:
  - about Demetrius
  lexicon: LSJ
  rationale: κατά with genitive here indicates opposition directed against Demetrius,
    not merely complaint concerning him.
- source_word: ἐπορεύθη πρὸς
  chosen: he went to
  alternatives:
  - he traveled to
  - he came to
  lexicon: LSJ
  rationale: Standard movement expression; 'went to' is straightforward and sufficient.
- source_word: Σιμμάκουην τὸν Ἄραβα
  chosen: Simmakoues the Arab
  alternatives:
  - Simmakuēs the Arab
  rationale: The personal name is transliterated directly from the Greek form in Swete.
    'The Arab' translates the ethnic designation/appositional title.
- source_word: ἔτρεφεν
  chosen: was rearing
  alternatives:
  - was raising
  - was bringing up
  - was caring for
  lexicon: LSJ
  rationale: τρέφω can mean nourish or bring up. In context of a royal child under
    protection, 'was rearing' preserves both care and upbringing without sounding
    overly domestic.
- source_word: τὸν Ἀντίοχον
  chosen: Antiochus
  rationale: Personal name transliterated by standard convention.
- source_word: τὸ παιδάριον
  chosen: the young boy
  alternatives:
  - the child
  - the little boy
  - the boy
  lexicon: LSJ
  rationale: παιδάριον is a diminutive for a child/boy. 'The young boy' preserves
    the diminutive sense and highlights his youth, which is politically relevant in
    context.
- source_word: τὸ τοῦ Ἀλεξάνδρου
  chosen: of Alexander
  alternatives:
  - Alexander's son
  lexicon: LSJ
  rationale: The article plus genitive is elliptical, referring to the child belonging
    to Alexander, i.e., his son. The main text keeps the Greek's concise relation
    as 'of Alexander'; the filial sense is clear from context and can be preserved
    in a footnote.
