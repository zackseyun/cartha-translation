translation:
  text: But when he came near Ashdod, they showed him the temple of Dagon burned down,
    and Ashdod and its surrounding villages torn down, and the bodies thrown about,
    and those burned in the war—for they had made heaps of them along his route.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its suburbs' or 'its outlying districts' for 'its surrounding villages'
      (τὰ περιπόλια αὐτῆς).
    reason: lexical_alternative
  - marker: b
    text: The rare term βωμίας is uncertain in nuance; it may mean 'heaps,' 'mounds,'
      or possibly 'funeral pyres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισεν
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: LSJ
  rationale: A straightforward motion verb; 'came near' is natural modern English
    and preserves the sense without sounding archaic.
- source_word: Ἄζωτον
  chosen: Ashdod
  alternatives:
  - Azotus
  lexicon: LSJ
  rationale: Standard English transliteration follows the well-known place name Ashdod
    rather than the Greek form Azotus.
- source_word: ἱερὸν Δαγὼν
  chosen: the temple of Dagon
  alternatives:
  - the sanctuary of Dagon
  lexicon: LSJ
  rationale: ἱερόν commonly denotes a temple or sacred precinct. Here 'temple' is
    the clearest idiomatic rendering for a pagan cult site.
- source_word: ἐνεπυρισμένον
  chosen: burned down
  alternatives:
  - set on fire
  - burned
  lexicon: LSJ
  rationale: The participle indicates the result of burning; 'burned down' conveys
    the visible ruined condition being shown to him.
- source_word: τὰ περιπόλια αὐτῆς
  chosen: its surrounding villages
  alternatives:
  - its suburbs
  - its outlying districts
  - its environs
  lexicon: LSJ
  rationale: περιπόλια refers to settlements or districts around a city. 'Surrounding
    villages' is more concrete and readable than 'suburbs' in an ancient setting.
- source_word: καθῃρημένα
  chosen: torn down
  alternatives:
  - demolished
  - razed
  lexicon: LSJ
  rationale: The participle denotes structures pulled down or destroyed. 'Torn down'
    is vivid and accessible.
- source_word: τὰ σώματα ἐρριμμένα
  chosen: the bodies thrown about
  alternatives:
  - the corpses cast out
  - the bodies strewn about
  lexicon: LSJ
  rationale: σώματα here refers to dead bodies in context. 'Thrown about' preserves
    the violent, disorderly sense of ἐρριμμένα.
- source_word: τοὺς ἐμπεπυρισμένους
  chosen: those burned
  alternatives:
  - the burned men
  - those who had been burned
  lexicon: LSJ
  rationale: The perfect participle points to persons who had been burned. 'Those
    burned' is concise and fits the list of devastation being displayed.
- source_word: ἐν τῷ πολέμῳ
  chosen: in the war
  alternatives:
  - in battle
  - during the war
  lexicon: LSJ
  rationale: πόλεμος is broader than a single clash; 'in the war' best matches the
    term.
- source_word: βωμίας
  chosen: heaps
  alternatives:
  - funeral pyres
  - mounds
  lexicon: LSJ
  rationale: The noun is rare and contextually difficult. Given the immediately preceding
    reference to bodies and burned persons, it likely denotes heaps or piles made
    from them; this avoids over-specifying 'pyres' where the form is uncertain while
    preserving the grim image.
- source_word: ἐν τῇ ὁδῷ αὐτοῦ
  chosen: along his route
  alternatives:
  - in his way
  - on the road before him
  - along his road
  lexicon: LSJ
  rationale: The phrase indicates placement on the path he was taking or would see
    as he passed. 'Along his route' is idiomatic and clear.
