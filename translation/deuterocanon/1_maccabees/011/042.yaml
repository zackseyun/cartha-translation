translation:
  text: And Demetrius sent to Jonathan, saying, “Not only will I do these things for
    you and for your nation, but I will greatly honor you and your nation, if I find
    a suitable opportunity.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'I will honor with honor/glory,' an emphatic expression
      meaning 'I will greatly honor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - sent word
  - dispatched
  lexicon: LSJ
  rationale: Standard narrative aorist of ἀποστέλλω; 'sent' is the natural modern
    English equivalent in this epistolary context.
- source_word: πρὸς Ἰωνάθαν
  chosen: to Jonathan
  alternatives:
  - unto Jonathan
  lexicon: LSJ
  rationale: πρός with accusative here marks the recipient of the message; 'to Jonathan'
    is idiomatic modern English.
- source_word: Οὐ μόνον ταῦτα ποιήσω
  chosen: Not only will I do these things
  alternatives:
  - I will not only do these things
  - Not only these things will I do
  lexicon: LSJ
  rationale: Future ποιήσω with οὐ μόνον introduces a comparative promise; this rendering
    preserves the emphasis and reads naturally in English.
- source_word: τῷ ἔθνει σου
  chosen: your nation
  alternatives:
  - your people
  lexicon: LSJ
  rationale: ἔθνος in 1 Maccabees commonly refers to the Jewish national community
    as a people-group/polity. 'Nation' preserves the collective-political sense better
    than the more generic 'people' here.
- source_word: ἀλλʼ ἢ δόξῃ δοξάσω
  chosen: I will greatly honor
  alternatives:
  - I will glorify with glory
  - I will honor gloriously
  - I will surely honor
  lexicon: LSJ
  rationale: The construction intensifies the verb δοξάζω by means of the cognate
    noun/adverbial force ('with honor/glory'). In English, 'greatly honor' conveys
    the emphatic sense without wooden repetition.
- source_word: σε καὶ τὸ ἔθνος σου
  chosen: you and your nation
  alternatives:
  - you and your people
  lexicon: LSJ
  rationale: Maintains the parallel with the earlier phrase and preserves the political-national
    nuance of ἔθνος.
- source_word: ἐὰν εὐκαιρίας τύχω
  chosen: if I find a suitable opportunity
  alternatives:
  - if I get the chance
  - if I obtain an opportune time
  lexicon: LSJ
  rationale: τύχω with the genitive means 'obtain/meet with,' and εὐκαιρία denotes
    a favorable or suitable occasion. 'Find a suitable opportunity' is clear, idiomatic,
    and preserves the conditional nature of the promise.
