lexical_decisions:
- source_word: Ἀλέξανδρος
  chosen: Alexander
  lexicon: LSJ
  rationale: Standard transliteration of the personal name, following the project's
    practice of transliterating names rather than translating them.
- source_word: ὁ βασιλεὺς
  chosen: King
  alternatives:
  - the king
  lexicon: LSJ
  rationale: Rendered as the title 'King' before the name in natural English. The
    article is absorbed into idiomatic English word order.
- source_word: ἦν ἐν Κιλικίᾳ
  chosen: was in Cilicia
  alternatives:
  - was at Cilicia
  lexicon: LSJ
  rationale: Simple locative sense of ἐν with the place name Κιλικία; 'in Cilicia'
    is the straightforward geographic rendering.
- source_word: κατὰ τοὺς καιροὺς ἐκείνους
  chosen: in those days
  alternatives:
  - at that time
  - during those times
  lexicon: LSJ
  rationale: Idiomatic temporal expression. 'In those days' preserves the plural καιρούς
    while sounding natural in English.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: LSJ
  rationale: Introduces the reason Alexander was in Cilicia. 'Because' makes the causal
    force explicit in clear modern English.
- source_word: ἀπεστάτουν
  chosen: were rebelling
  alternatives:
  - were revolting
  - were defecting
  - were in revolt
  lexicon: LSJ
  rationale: Imperfect verb indicating ongoing or repeated rebellion/apostasy. 'Were
    rebelling' captures the durative sense without overstating the political nuance.
- source_word: οἱ ἀπὸ τῶν τόπων ἐκείνων
  chosen: the people from those regions
  alternatives:
  - those from those places
  - the men from those places
  - the inhabitants of those places
  lexicon: LSJ
  rationale: The phrase refers collectively to people originating from those localities.
    'The people from those regions' is natural English and avoids an overly wooden
    repetition of 'places ... those places,' while preserving the geographic reference.
