id: 1MA.11.74
reference: 1 Maccabees 11:74
source:
  edition: lxx-swete-1909
  text: καὶ ἔπεσον ἐκ τῶν ἀλλοφύλων ἐν τῇ ἡμέρᾳ ἐκείνῃ εἰς ἄνδρας τρισχιλίους· καὶ
    ἐπέ- στρεψεν Ἰωναθὰν εἰς Ἰερουσαλήμ.
  language: Greek
  pages:
  - 667
  confidence: high
  validation: agree
translation:
  text: And on that day about three thousand men of the foreigners fell, and Jonathan
    returned to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'three thousand men.' The Greek expression may indicate the
      total number reached rather than an approximation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσον
  chosen: fell
  alternatives:
  - were killed
  - died
  lexicon: BDAG
  rationale: The verb literally means 'fell' and is a common battle idiom for casualties.
    'Fell' preserves the martial register of the Greek without over-interpreting the
    exact manner of death.
- source_word: ἐκ τῶν ἀλλοφύλων
  chosen: of the foreigners
  alternatives:
  - of the Philistines
  - from the enemy foreigners
  - of the aliens
  lexicon: LEH
  rationale: ἀλλόφυλοι literally denotes 'those of another tribe/people.' In the LXX
    it can function as a conventional label for Philistines, but in 1 Maccabees this
    context concerns non-Jewish opponents more generally. 'Of the foreigners' stays
    close to the Greek and avoids importing the more specific ethnic term 'Philistines'
    where the verse itself does not require it.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  chosen: on that day
  alternatives:
  - in that day
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the temporal phrase in English.
- source_word: εἰς ἄνδρας τρισχιλίους
  chosen: about three thousand men
  alternatives:
  - three thousand men
  - to the number of three thousand men
  lexicon: LEH
  rationale: The construction with εἰς can mark extent or approximate total. 'About
    three thousand men' reflects natural English and the likely sense of the idiom
    without forcing mathematical precision.
- source_word: ἐπέστρεψεν
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: BDAG
  rationale: In this travel context the verb means returning to a place. 'Returned'
    is the clearest natural English equivalent.
- source_word: Ἰωναθάν
  chosen: Jonathan
  rationale: Standard English transliteration of the proper name.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
