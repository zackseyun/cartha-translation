translation:
  text: And the king of Egypt gathered many forces, like the sand by the seashore,
    and many ships; and he sought to gain control of Alexander’s kingdom by deceit,
    and to add it to his own kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to seize Alexander’s kingdom by deceit' or 'to gain mastery over Alexander’s
      kingdom by deceit.' The Greek verb can carry the sense of overpowering or taking
      control.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤθροισεν
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: LSJ
  rationale: Aorist of ἀθροίζω, meaning to gather or collect together. 'Gathered'
    is natural modern English and broad enough to cover military mobilization without
    over-specifying formal mustering.
- source_word: δυνάμεις πολλὰς
  chosen: many forces
  alternatives:
  - many troops
  - great forces
  - many armies
  lexicon: LSJ
  rationale: δυνάμεις in military narrative commonly refers to forces or troops. 'Many
    forces' stays close to the Greek while remaining idiomatic; 'armies' would be
    slightly more interpretive, and 'troops' somewhat narrower.
- source_word: ὡς ἡ ἄμμος ἡ παρὰ τὸ χεῖλος τῆς θαλάσσης
  chosen: like the sand by the seashore
  alternatives:
  - like the sand on the shore of the sea
  - like the sand beside the edge of the sea
  lexicon: LSJ
  rationale: This is a conventional biblical simile for vast number. 'By the seashore'
    preserves the image in readable English without unnecessary literal stiffness.
- source_word: πλοῖα πολλά
  chosen: many ships
  alternatives:
  - numerous ships
  lexicon: LSJ
  rationale: Straightforward rendering of the phrase; 'many ships' is both accurate
    and natural.
- source_word: ἐζήτησεν
  chosen: he sought
  alternatives:
  - he tried
  - he attempted
  lexicon: LSJ
  rationale: ζητέω here introduces purpose or attempt. 'Sought' preserves the verbal
    nuance and literary tone better than the flatter 'tried.'
- source_word: κατακρατῆσαι
  chosen: to gain control of
  alternatives:
  - to seize
  - to overpower
  - to take possession of
  lexicon: LSJ
  rationale: The verb conveys prevailing over or gaining mastery/control. 'Gain control
    of' fits the political context of taking over a kingdom and avoids implying only
    military conquest.
- source_word: τῆς βασιλείας Ἀλεξάνδρου
  chosen: Alexander’s kingdom
  alternatives:
  - the kingdom of Alexander
  - Alexander's kingship
  lexicon: LSJ
  rationale: βασιλεία here denotes realm/kingdom rather than abstract kingship. The
    possessive form is idiomatic English.
- source_word: δόλῳ
  chosen: by deceit
  alternatives:
  - by treachery
  - by guile
  - through trickery
  lexicon: LSJ
  rationale: δόλος denotes deceit or craft. 'By deceit' is direct and sufficiently
    broad; 'treachery' would add a stronger moral coloring than the noun itself requires.
- source_word: προσθεῖναι αὐτὴν τῇ βασιλείᾳ αὐτοῦ
  chosen: to add it to his own kingdom
  alternatives:
  - to annex it to his kingdom
  - to join it to his kingdom
  lexicon: LSJ
  rationale: The infinitive προσθεῖναι means to add. 'Add it to his own kingdom' preserves
    the metaphor and political sense; 'annex' is possible but more modern-political
    and interpretive.
