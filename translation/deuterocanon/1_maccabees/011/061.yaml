translation:
  text: And he went from there to Gaza, and the men of Gaza shut him out; and he encamped
    around it, and burned its outlying parts with fire, and plundered them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he besieged it.' The Greek literally says he 'encamped/sat around it.'
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'its outlying parts' is difficult; it may refer to the
      areas around Gaza, such as its environs or suburbs.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθεν
  chosen: went
  alternatives:
  - departed
  - set out
  lexicon: LSJ
  rationale: A straightforward narrative aorist of motion; 'went' is natural modern
    English and sufficiently formal.
- source_word: ἀπέκλεισαν
  chosen: shut him out
  alternatives:
  - closed against him
  - excluded him
  - shut him off
  lexicon: LSJ
  rationale: The verb conveys closing off or barring access. 'Shut him out' captures
    the hostile action in idiomatic English better than the more wooden 'closed against
    him.'
- source_word: οἱ ἀπὸ Γάζης
  chosen: the men of Gaza
  alternatives:
  - those from Gaza
  - the people of Gaza
  lexicon: LSJ
  rationale: Literally 'those from Gaza.' In this military context it refers to the
    Gazan inhabitants/defenders. 'The men of Gaza' preserves the masculine form and
    the likely sense of the city's defenders more closely than the broader 'people
    of Gaza.'
- source_word: περιεκάθισεν περὶ αὐτήν
  chosen: he encamped around it
  alternatives:
  - he besieged it
  - he sat around it
  lexicon: LSJ
  rationale: The expression literally describes sitting/encamping around the city.
    'He encamped around it' preserves the imagery and implies siege activity without
    overcompressing the wording, though 'besieged it' is a viable contextual gloss.
- source_word: τὰ περίπολα αὐτῆς
  chosen: its outlying parts
  alternatives:
  - its environs
  - its surrounding districts
  - its suburbs
  - its patrol posts
  lexicon: LSJ
  rationale: The noun is contextually difficult. In this siege setting it most naturally
    refers to areas around the city rather than persons. 'Its outlying parts' is broad
    enough to reflect the Greek while fitting the following plural pronoun 'them.'
- source_word: ἐνεπύρισεν ... ἐν πυρί
  chosen: burned ... with fire
  alternatives:
  - set ... on fire
  - burned up
  lexicon: LSJ
  rationale: The Greek is emphatic and somewhat pleonastic. 'Burned ... with fire'
    preserves the force and biblical narrative style without becoming awkward.
- source_word: ἐσκύλευσεν
  chosen: plundered
  alternatives:
  - spoiled
  - despoiled
  - looted
  lexicon: LSJ
  rationale: A standard military term for taking spoil. 'Plundered' is clear, contemporary,
    and appropriately forceful.
