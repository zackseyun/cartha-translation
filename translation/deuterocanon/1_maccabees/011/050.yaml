translation:
  text: Give us your right hands, and let the Jews stop fighting against us and the
    city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Give us right hands'—an idiom for offering a pledge of peace,
      alliance, or good faith.
    reason: cultural_note
lexical_decisions:
- source_word: Δὸς
  chosen: Give
  alternatives:
  - Grant
  lexicon: LSJ
  rationale: Aorist imperative of δίδωμι; a direct command/request. 'Give' is the
    plainest English equivalent.
- source_word: δεξιάς
  chosen: your right hands
  alternatives:
  - pledges
  - right hands in pledge
  lexicon: LSJ
  rationale: Plural 'right hands' reflects the Greek literally and preserves the idiom
    of extending the right hand as a sign of agreement or peace. The possessive 'your'
    is supplied naturally in English from the second-person singular imperative context.
    A more interpretive rendering like 'pledges' would flatten the concrete image.
- source_word: παυσάσθωσαν
  chosen: let ... stop
  alternatives:
  - let ... cease
  lexicon: LSJ
  rationale: Third-person aorist imperative of παύω in the middle/passive form, here
    functioning as a command that they cease an action. 'Let ... stop' is idiomatic
    modern English.
- source_word: πολεμοῦντες
  chosen: fighting against
  alternatives:
  - making war on
  - warring against
  lexicon: LSJ
  rationale: Present participle of πολεμέω, indicating ongoing hostile action. 'Fighting
    against' is clear and natural while preserving the adversative force of ἡμᾶς.
- source_word: τὴν πόλιν
  chosen: the city
  alternatives:
  - our city
  lexicon: LSJ
  rationale: The Greek has the definite article only, not an explicit possessive.
    'The city' should be retained rather than supplying 'our city,' which would add
    information not present in the text.
