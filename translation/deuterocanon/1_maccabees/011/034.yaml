  text: ἐστήκαμεν οὖν αὐτοῖς τὰ ὅρια τῆς Ἰουδαίας καὶ τοὺς τρεῖς νομοὺς, Ἀφαίρεμα
    καὶ Λυδδὰ καὶ Ραμαθείμ· προσετέθησαν τῇ Ἰουδαίᾳ ἀπὸ τῆς Σαμαρίτιδος· καὶ πάντα
