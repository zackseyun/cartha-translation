translation:
  text: Therefore we have confirmed for them the borders of Judea, and the three districts—Aphairema,
    Lydda, and Ramathaim—which were added to Judea from Samaria, along with all that
    belongs with them, for all who offer sacrifice in Jerusalem, instead of the royal
    taxes that the king formerly received from them each year from the produce of
    the land and of the fruit trees.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek νομοὺς literally refers to administrative districts; older scholarship
      sometimes leaves this as 'nomes.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'all that belongs with them' renders a broad Greek expression
      that may include dependent villages, lands, or other appurtenances associated
      with the three districts.
    reason: lexical_alternative
  - marker: c
    text: Or 'the fruits of the trees.' The Greek term can refer broadly to produce
      from trees, including fruit or nuts.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐστήκαμεν
  chosen: we have confirmed
  alternatives:
  - we have established
  - we have fixed
  - we have set
  lexicon: LSJ
  rationale: Perfect form of ἵστημι here carries the sense of putting into force or
    establishing/confirming an arrangement. 'Have confirmed' fits the royal decree
    context better than a more physical 'have set.'
- source_word: τὰ ὅρια
  chosen: the borders
  alternatives:
  - the boundaries
  - the territory limits
  lexicon: LSJ
  rationale: ὅρια commonly means borders or boundaries. 'Borders' is concise and natural
    in a political-administrative context.
- source_word: τοὺς τρεῖς νομοὺς
  chosen: the three districts
  alternatives:
  - the three nomes
  - the three administrative regions
  lexicon: LSJ
  rationale: νομός in Hellenistic administrative usage denotes a district or province.
    'Districts' communicates the sense in clear modern English; 'nomes' would be too
    technical for the main text.
- source_word: Ἀφαίρεμα καὶ Λυδδὰ καὶ Ραμαθείμ
  chosen: Aphairema, Lydda, and Ramathaim
  rationale: These are place names and are therefore transliterated according to project
    policy.
- source_word: προσετέθησαν τῇ Ἰουδαίᾳ ἀπὸ τῆς Σαμαρίτιδος
  chosen: which were added to Judea from Samaria
  alternatives:
  - which were annexed to Judea from Samaria
  - which were joined to Judea out of Samaria
  lexicon: LSJ
  rationale: Passive προσετέθησαν indicates transfer/addition. 'Were added to Judea
    from Samaria' preserves the administrative reassignment without overinterpreting
    the political mechanism.
- source_word: πάντα τὰ συγκυροῦντα αὐτοῖς
  chosen: all that belongs with them
  alternatives:
  - all that is attached to them
  - all that pertains to them
  - all the adjoining matters/lands
  lexicon: LSJ
  rationale: The phrase is somewhat broad and likely refers to appurtenances or associated
    dependencies. 'All that belongs with them' preserves the inclusive sense without
    forcing a narrower geographic or legal interpretation.
- source_word: πᾶσιν τοῖς θυσιάζουσιν εἰς Ἰερουσαλήμ
  chosen: for all who offer sacrifice in Jerusalem
  alternatives:
  - for all those sacrificing in Jerusalem
  - for all worshipers in Jerusalem
  lexicon: LSJ
  rationale: 'θυσιάζω specifically means to offer sacrifice, not merely to worship.
    The dative phrase is best taken with the grant''s beneficiaries: those who sacrifice
    in Jerusalem.'
- source_word: ἀντὶ τῶν βασιλικῶν
  chosen: instead of the royal taxes
  alternatives:
  - in place of the royal dues
  - instead of the king's revenues
  lexicon: LSJ
  rationale: τὰ βασιλικά refers to royal revenues/dues. 'Royal taxes' is idiomatic
    and fits the fiscal context established by the following clause.
- source_word: ὧν ἐλάμβανεν ὁ βασιλεὺς παρʼ αὐτῶν τὸ πρότερον
  chosen: that the king formerly received from them
  alternatives:
  - which the king used to collect from them
  - that the king had previously taken from them
  lexicon: LSJ
  rationale: Imperfect ἐλάμβανεν with τὸ πρότερον indicates customary prior collection.
    'Formerly received' is accurate and smooth.
- source_word: κατʼ ἐνιαυτόν
  chosen: each year
  alternatives:
  - year by year
  - annually
  lexicon: LSJ
  rationale: Standard distributive temporal expression; 'each year' is natural modern
    English.
- source_word: τῶν γενημάτων τῆς γῆς
  chosen: the produce of the land
  alternatives:
  - the crops of the land
  - the yield of the soil
  lexicon: LSJ
  rationale: γενήματα denotes produce/yield. 'Produce of the land' is broad enough
    to cover agricultural output generally.
- source_word: τῶν ἀκροδρύων
  chosen: the fruit trees
  alternatives:
  - tree fruit
  - orchard produce
  - the fruits of the trees
  lexicon: LSJ
  rationale: ἀκρόδρυα refers to tree produce, often fruits or nuts. 'Fruit trees'
    is a compact rendering that conveys produce derived from trees; 'tree fruit' is
    possible but less natural in running English.
