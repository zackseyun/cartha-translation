translation:
  text: And those from the city gathered in the middle of the city, about one hundred
    twenty thousand men, and they wanted to kill the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''twelve myriads of men,'' that is, 120,000 men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνώχθησαν
  chosen: gathered
  alternatives:
  - assembled
  - were gathered together
  lexicon: LSJ
  rationale: The verb denotes coming together or assembling. 'Gathered' is natural
    modern English and preserves the collective action without unnecessary stiffness.
- source_word: οἱ ἐκ τῆς πόλεως
  chosen: those from the city
  alternatives:
  - the men of the city
  - the people from the city
  lexicon: LSJ
  rationale: The Greek literally says 'those from the city.' This avoids adding 'men'
    or 'people' where the phrase itself is not explicitly gendered, while still indicating
    the city's inhabitants or faction.
- source_word: εἰς τὸ μέσον τῆς πόλεως
  chosen: in the middle of the city
  alternatives:
  - into the center of the city
  - in the midst of the city
  lexicon: LSJ
  rationale: The phrase is spatial and straightforward. 'In the middle of the city'
    is clear, readable English that reflects the Greek sense of central location.
- source_word: εἰς ἄνδρας δώδεκα μυριάδας
  chosen: about one hundred twenty thousand men
  alternatives:
  - to the number of one hundred twenty thousand men
  - twelve myriads of men
  lexicon: LSJ
  rationale: δώδεκα μυριάδες is literally 'twelve myriads,' i.e., 120,000. The preposition
    εἰς with ἄνδρας here expresses number or total. 'About' reflects idiomatic numerical
    approximation in English for this construction while keeping the stated figure.
    'Men' is retained because ἄνδρας is explicitly masculine.
- source_word: ἠβούλοντο
  chosen: they wanted
  alternatives:
  - they intended
  - they were determined
  lexicon: LSJ
  rationale: The imperfect middle of βούλομαι expresses volition or intention. 'They
    wanted' is the most direct rendering; stronger options like 'were determined'
    overstate the form.
- source_word: ἀνελεῖν
  chosen: to kill
  alternatives:
  - to do away with
  - to slay
  lexicon: LSJ
  rationale: In this context the infinitive means to take away life. 'To kill' is
    plain and accurate modern English; 'slay' is too elevated, and 'do away with'
    is too euphemistic.
