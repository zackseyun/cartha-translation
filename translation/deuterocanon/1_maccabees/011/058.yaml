translation:
  text: And he sent him gold vessels and table service, and gave him authority to
    drink from gold vessels and to be clothed in purple and to wear a gold buckle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gold objects' or 'gold plate' for the repeated Greek term χρυσώματα.
    reason: lexical_alternative
  - marker: b
    text: The phrase translated 'table service' may also mean service equipment or,
      less likely, attendants for service.
    reason: lexical_alternative
  - marker: c
    text: The final item could also be rendered 'a gold clasp' or 'a gold brooch.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χρυσώματα
  chosen: gold vessels
  alternatives:
  - gold objects
  - gold plate
  - goldware
  lexicon: LSJ
  rationale: The plural denotes articles made of gold, and in the immediate context
    of drinking from them, 'vessels' best captures tableware/cups without over-specifying
    beyond the Greek.
- source_word: διακονίαν
  chosen: table service
  alternatives:
  - service
  - attendants
  - household service
  lexicon: LSJ
  rationale: In coordination with 'gold vessels,' the term likely refers to service
    equipment or service at table rather than abstract ministry. 'Table service' preserves
    the courtly gift context and avoids implying personal servants too strongly.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - right
  - permission
  - privilege
  lexicon: BDAG
  rationale: The noun indicates granted authorization from a king. 'Authority' is
    slightly more formal and fits the royal bestowal of court privileges; the sense
    overlaps with 'permission/privilege' but remains close to the Greek.
- source_word: πίνειν ἐν χρυσώμασιν
  chosen: to drink from gold vessels
  alternatives:
  - to drink in gold cups
  - to drink from golden ware
  lexicon: LSJ
  rationale: The idiom means using gold drinking vessels. 'From gold vessels' is natural
    English and keeps the concrete image without narrowing χρυσώματα to cups alone.
- source_word: εἶναι ἐν πορφύρᾳ
  chosen: to be clothed in purple
  alternatives:
  - to be in purple
  - to wear purple
  lexicon: LSJ
  rationale: The phrase denotes wearing royal or high-status purple garments. 'To
    be clothed in purple' makes the idiom explicit in clear English while preserving
    the ceremonial nuance.
- source_word: πόρπην χρυσῆν
  chosen: a gold buckle
  alternatives:
  - a golden clasp
  - a gold brooch
  - a golden fastening
  lexicon: LSJ
  rationale: πόρπη is a fastening or clasp for garments. 'Buckle' is concise and readable,
    though 'clasp' is possible; the exact form is less important than the sign of
    rank conveyed by a gold garment-fastener.
