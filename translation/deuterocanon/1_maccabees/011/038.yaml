translation:
  text: And King Demetrius saw that the land was quiet before him and that nothing
    opposed him, so he dismissed all his forces, each to his own place, except for
    the foreign forces that he had recruited from the islands of the nations; and
    all the forces from the time of his fathers became hostile to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mercenary forces' for 'foreign forces'; the Greek specifically refers
      to non-native troops and may imply hired foreign soldiers.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'all the forces from the time of his fathers' likely means the
      traditional troops inherited from his forefathers' rule, in contrast to the
      foreign troops he retained.
    reason: cultural_note
lexical_decisions:
- source_word: ἡσύχασεν
  chosen: was quiet
  alternatives:
  - was at peace
  - was tranquil
  - had become quiet
  lexicon: LSJ
  rationale: The verb denotes being quiet or at rest. 'Was quiet' preserves the political-military
    sense here without overstating it as full peace.
- source_word: ἡ γῆ
  chosen: the land
  alternatives:
  - the country
  - the earth
  lexicon: LSJ
  rationale: In this historical context γῆ refers to the realm/territory under discussion,
    not the whole earth. 'The land' is a natural and sufficiently broad rendering.
- source_word: ἐνώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  - under him
  lexicon: LSJ
  rationale: The phrase literally means 'before him.' In context it conveys the land
    being quiet in relation to his rule; 'before him' keeps the idiom close to the
    Greek.
- source_word: οὐθὲν αὐτῷ ἀνθεστήκει
  chosen: nothing opposed him
  alternatives:
  - nothing resisted him
  - nothing stood against him
  lexicon: LSJ
  rationale: The pluperfect/imperfective sense of ἀνθίστημι here indicates ongoing
    lack of resistance. 'Nothing opposed him' is idiomatic and faithful.
- source_word: ἀπέλυσεν
  chosen: dismissed
  alternatives:
  - sent away
  - disbanded
  - released
  lexicon: LSJ
  rationale: In a military context the king is sending troops away from service. 'Dismissed'
    fits the context better than the more generic 'released' and is less interpretive
    than 'disbanded.'
- source_word: πάσας τὰς δυνάμεις αὐτοῦ
  chosen: all his forces
  alternatives:
  - all his troops
  - all his armies
  lexicon: LSJ
  rationale: δυνάμεις can mean military forces or troops. 'Forces' preserves the collective
    military sense and allows for multiple units.
- source_word: ἕκαστον εἰς τὸν ἴδιον τόπον
  chosen: each to his own place
  alternatives:
  - each to his own home
  - each to his own region
  lexicon: LSJ
  rationale: The singular distributive ἕκαστον with τόπον indicates each contingent/person
    returning to its proper place. 'Place' is broad enough to cover station, home
    area, or posting.
- source_word: ξένων δυνάμεων
  chosen: foreign forces
  alternatives:
  - mercenary forces
  - alien troops
  lexicon: LSJ
  rationale: ξένος means foreign/strange, and in military contexts can imply mercenary
    outsiders. Because the next clause specifies recruitment from foreign islands,
    'foreign forces' is the least overdetermined main-text rendering.
- source_word: ἐξενολόγησεν
  chosen: had recruited
  alternatives:
  - had enlisted
  - had hired as mercenaries
  lexicon: LSJ
  rationale: The verb means to levy or recruit foreigners. 'Had recruited' captures
    the action without forcing the more specific 'hired as mercenaries,' though that
    nuance is possible.
- source_word: ἀπὸ τῶν νήσων τῶν ἐθνῶν
  chosen: from the islands of the nations
  alternatives:
  - from the islands of the Gentiles
  - from the foreign islands
  lexicon: LSJ
  rationale: The Greek is literally 'from the islands of the nations.' Since this
    is deuterocanonical historical narrative rather than a theologically charged Jew/Gentile
    contrast, 'nations' is preferable in the main text; the more interpretive 'foreign
    islands' is avoided.
- source_word: ἠχθρασαν αὐτῷ
  chosen: became hostile to him
  alternatives:
  - were hostile to him
  - turned against him
  - became his enemies
  lexicon: LSJ
  rationale: The verb conveys enmity or hostile disposition. 'Became hostile to him'
    reflects the ingressive sense better than the stative 'were hostile.'
- source_word: πᾶσαι αἱ δυνάμεις αἱ ἀπὸ τῶν πατέρων
  chosen: all the forces from the time of his fathers
  alternatives:
  - all the ancestral forces
  - all the troops inherited from his fathers
  - all the forces from his fathers
  lexicon: LSJ
  rationale: The phrase is somewhat compressed. It most naturally refers to the long-standing
    native forces associated with his forefathers' reigns, in contrast to the foreign
    troops just mentioned. 'From the time of his fathers' makes that temporal-dynastic
    sense explicit without overparaphrasing.
