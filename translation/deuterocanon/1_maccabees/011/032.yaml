translation:
  text: King Demetrius to Lasthenes his father, greetings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek letter-opening formula: literally, ''King Demetrius to Lasthenes
      his father, to rejoice.'''
    reason: lexical_alternative
  - marker: b
    text: '''His father'' likely functions as an honorific or court title in context,
