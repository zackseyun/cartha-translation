lexical_decisions:
- source_word: Βασιλεὺς
  chosen: King
  alternatives:
  - The king
  lexicon: LSJ
  rationale: Used as the royal title introducing the sender of the letter. English
    epistolary style naturally renders it as 'King' before the personal name.
- source_word: Δημήτριος
  chosen: Demetrius
  rationale: Standard transliteration of the personal name, following the project's
    policy to transliterate names rather than translate them.
- source_word: Λασθένει
  chosen: Lasthenes
  rationale: Dative of indirect address in the letter formula; rendered as the recipient's
    name in standard English epistolary order.
- source_word: τῷ πατρὶ
  chosen: his father
  alternatives:
  - the father
  - father
  lexicon: LSJ
  rationale: With the article and dative apposition to Λασθένει, the phrase identifies
    Lasthenes as 'his father' in the sense of a courtly or honorific designation rather
    than biological paternity being asserted by the translator. English keeps the
    literal wording while allowing readers to infer the social nuance from context.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - sends greetings
  lexicon: LSJ
  rationale: Standard Greek epistolary infinitive used in letter openings. 'Greetings'
    is the idiomatic English equivalent and avoids an overly wooden 'rejoice.'
