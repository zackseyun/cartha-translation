theological_decisions:
- issue: Sense of ἀδελφός in royal correspondence
  chosen_reading: courteous/political 'brother' retained in the main text
  alternative_readings:
  - literal familial brotherhood
  - generic ally/associate without 'brother'
  rationale: The Greek explicitly includes ἀδελφός, and the epistolary context favors
    a diplomatic title of solidarity or honor. Retaining 'his brother' preserves the
    source wording and its political nuance without asserting literal kinship.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
