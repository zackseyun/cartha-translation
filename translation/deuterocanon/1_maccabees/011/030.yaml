lexical_decisions:
- source_word: Βασιλεὺς
  chosen: King
  alternatives:
  - The king
  lexicon: LSJ
  rationale: Used as the royal title introducing the sender in epistolary style. English
    keeps the title directly before the name without an article for natural formal
    address.
- source_word: Δημήτριος
  chosen: Demetrius
  rationale: Standard transliteration of the personal name.
- source_word: Ἰωνάθαν
  chosen: Jonathan
  alternatives:
  - Jonathan
  rationale: Standard English biblical form of the name; personal names are transliterated
    by convention.
- source_word: τῷ ἀδελφῷ
  chosen: to ... his brother
  alternatives:
  - to ... the brother
  - to ... brother
  lexicon: LSJ
  rationale: 'Dative with article in a letter address. ἀδελφός here is relational
    and political/courteous, not necessarily a statement of literal siblinghood. English
    idiom requires the possessive: ''his brother.'''
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - sends greetings
  lexicon: LSJ
  rationale: Standard Hellenistic epistolary infinitive used in salutations. 'Greetings'
    best captures the formula in concise natural English without over-paraphrasing.
- source_word: ἔθνει
  chosen: nation
  alternatives:
  - people
  - ethnos
  lexicon: LSJ
  rationale: ἔθνος denotes a people-group or nation. 'Nation' preserves the political-corporate
    sense appropriate in a royal letter.
- source_word: Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of Judeans
  lexicon: LSJ
  rationale: The genitive identifies the nation addressed. 'Jews' is the most conventional
    and immediately intelligible rendering in 1 Maccabees; 'Judeans' is possible but
    less natural here and not required by the immediate context.
