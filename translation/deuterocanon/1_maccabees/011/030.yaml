translation:
  text: King Demetrius to Jonathan his brother, greetings, and to the nation of the
    Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the nation of the Judeans.' The Greek Ἰουδαίων can be rendered either
      way depending on whether ethnic or geographic emphasis is foregrounded.
