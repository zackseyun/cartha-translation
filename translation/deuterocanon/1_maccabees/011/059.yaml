translation:
  text: And he appointed Simon his brother as commander from the Ladder of Tyre as
    far as the borders of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'general.' The Greek στρατηγός denotes a military leader and may be rendered
      more specifically depending on context.
    reason: lexical_alternative
  - marker: b
    text: The 'Ladder of Tyre' is a place-name, likely referring to the coastal pass
      or escarpment near Tyre rather than a literal ladder.
    reason: cultural_note
lexical_decisions:
- source_word: κατέστησεν
  chosen: appointed
  alternatives:
  - made
  - established
  - installed
  lexicon: LSJ
  rationale: The verb denotes placing someone into an office or role. 'Appointed'
    is natural modern English and preserves the official sense better than the more
    wooden 'made'.
- source_word: στρατηγὸν
  chosen: commander
  alternatives:
  - general
  - governor
  - military commander
  lexicon: LSJ
  rationale: The term can denote a military commander or general. 'Commander' communicates
    the military office clearly without implying a precise later rank structure; 'general'
    is possible but slightly more specific.
- source_word: ἀπὸ τῆς κλίμακος Τύρου
  chosen: from the Ladder of Tyre
  alternatives:
  - from the ascent of Tyre
  - from Tyre's Ladder
  lexicon: LSJ
  rationale: κλίμαξ literally means 'ladder' or 'stair,' but here it functions as
    a place-name. Retaining 'Ladder of Tyre' preserves the toponym while remaining
    intelligible.
- source_word: ἕως τῶν ὁρίων Αἰγύπτου
  chosen: as far as the borders of Egypt
  alternatives:
  - up to the borders of Egypt
  - to the frontier of Egypt
  lexicon: LSJ
  rationale: ὅρια refers to boundaries or border regions. 'As far as the borders of
    Egypt' reflects the territorial extent in straightforward English.
- source_word: Σίμωνα τὸν ἀδελφὸν αὐτοῦ
  chosen: Simon his brother
  alternatives:
  - Simon, his brother
  lexicon: LSJ
  rationale: The phrase identifies Simon in relation to the subject. English can render
    this smoothly without overpunctuation; the familial identification is preserved
    directly.
