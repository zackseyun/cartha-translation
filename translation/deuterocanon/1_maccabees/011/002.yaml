translation:
  text: And he went out into Syria with peaceful words, and the men from the cities
    opened to him and went out to meet him, because Alexander the king had given an
    order to meet him, since he was his father-in-law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'opened their gates to him.' The Greek leaves the object
      unstated.
    reason: lexical_alternative
  - marker: b
    text: That is, Alexander had ordered the cities to receive and meet him favorably
      because Ptolemy was Alexander's father-in-law.
    reason: cross_reference
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - set out
  - went forth
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist of ἐξέρχομαι. 'Went out' preserves
    the narrative movement without adding nuance beyond the Greek.
- source_word: λόγοις εἰρηνικοῖς
  chosen: with peaceful words
  alternatives:
  - with words of peace
  - peaceably
  lexicon: LSJ
  rationale: The dative phrase is instrumental or manner-based. 'With peaceful words'
    keeps the concrete wording of λόγοι while remaining natural English. It suggests
    diplomatic assurances rather than merely an inward peaceful disposition.
- source_word: ἤνοιγον αὐτῷ
  chosen: opened to him
  alternatives:
  - opened their gates to him
  - received him
  lexicon: LSJ
  rationale: The Greek object is unstated. 'Opened to him' preserves the ellipsis
    and likely sense of opening the cities or gates, without importing 'gates' into
    the main text. The more explicit sense is preserved as an alternative.
- source_word: οἱ ἀπὸ τῶν πόλεων
  chosen: the men from the cities
  alternatives:
  - those from the cities
  - the people from the cities
  lexicon: LSJ
  rationale: The article with ἀπό marks representatives or inhabitants from the cities.
    'The men from the cities' is a gender-accurate rendering of the masculine form
    and fits the likely civic-delegation context better than the vaguer 'people.'
- source_word: συνήντων αὐτῷ
  chosen: went out to meet him
  alternatives:
  - met him
  - came to meet him
  lexicon: LSJ
  rationale: Given the following infinitive συναντᾷν, the sense is clearly that of
    meeting or going to meet. 'Went out to meet him' fits the narrative context and
    avoids flattening the action to a bare 'met him.'
- source_word: ἐντολή
  chosen: order
  alternatives:
  - command
  - instruction
  lexicon: LSJ
  rationale: '''Order'' conveys an authoritative royal directive in idiomatic English.
    ''Command'' is possible, but ''order'' reads more naturally in this historical
    narrative.'
- source_word: συναντᾷν αὐτῷ
  chosen: to meet him
  alternatives:
  - to go out to meet him
  lexicon: LSJ
  rationale: The infinitive expresses the content of Alexander's directive. 'To meet
    him' is the core sense; the fuller motion nuance is already reflected earlier
    in the verse.
- source_word: διὰ τὸ πενθερὸν αὐτοῦ εἶναι
  chosen: since he was his father-in-law
  alternatives:
  - because he was related to him by marriage
  - because he was his wife's father
  lexicon: LSJ
  rationale: πενθερός specifically means 'father-in-law.' The clause explains the
    political reason for the favorable reception. The pronouns are contextually awkward
    in English, but the most natural antecedent is that Ptolemy was Alexander's father-in-law.
