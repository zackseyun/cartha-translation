translation:
  text: In those days Jonathan gathered those from Judea to make war against the citadel
    in Jerusalem, and they built many siege engines against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Acra,' the fortified stronghold in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήγαγεν
  chosen: gathered
  alternatives:
  - assembled
  - brought together
  lexicon: LSJ
  rationale: Aorist of συνάγω here denotes collecting people together for a military
    purpose. 'Gathered' is natural English and preserves the basic sense without over-specifying
    formal assembly.
- source_word: τοὺς ἐκ τῆς Ἰουδαίας
  chosen: those from Judea
  alternatives:
  - the men of Judea
  - those out of Judea
  lexicon: LSJ
  rationale: The phrase is somewhat elliptical in Greek, referring to people drawn
    from Judea. 'Those from Judea' preserves the wording without adding 'men' where
    the text does not explicitly state it, though a military context implies fighting
    personnel.
- source_word: τοῦ ἐκπολεμῆσαι
  chosen: to make war against
  alternatives:
  - to fight against
  - to wage war against
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose. ἐκπολεμέω is stronger than
    a generic 'fight'; 'make war against' captures the hostile military action while
    remaining idiomatic.
- source_word: τὴν ἄκραν
  chosen: the citadel
  alternatives:
  - the Acra
  - the fortress
  lexicon: LSJ
  rationale: ἄκρα can denote a citadel or fortified height. In 1 Maccabees it often
    refers specifically to the Seleucid stronghold in Jerusalem known as the Acra.
    For readability in the main text, 'the citadel' conveys the sense; the more technical
    proper-name-like rendering is preserved in a footnote.
- source_word: μηχανὰς πολλάς
  chosen: many siege engines
  alternatives:
  - many machines
  - many war engines
  lexicon: LSJ
  rationale: μηχανή in siege context refers to military engines/devices rather than
    generic machines. 'Siege engines' best fits the immediate context of attacking
    a fortified stronghold.
- source_word: ἐποίησαν ἐπʼ αὐτὴν
  chosen: they built many siege engines against it
  alternatives:
  - they made many siege engines against it
  - they constructed many engines to use against it
  lexicon: LSJ
  rationale: ποιέω with μηχαναί here means constructing military devices. 'Built'
    is more idiomatic than 'made' in English for siege works, and ἐπʼ αὐτήν is represented
    by 'against it' to show hostile direction.
