translation:
  text: And after taking his daughter away from him, he gave her to Demetrius; and
    Alexander’s attitude changed, and their hostility became evident.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Alexander’s face was altered.' The phrase likely refers to a
      change in disposition or demeanor rather than only facial expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφελόμενος
  chosen: after taking ... away
  alternatives:
  - having taken away
  - removing
  lexicon: LSJ
  rationale: Aorist middle participle of ἀφαιρέω, here indicating the prior action
    of removing or taking away the daughter from Alexander. 'After taking ... away'
    is natural English while preserving the force of deprivation implied by the verb.
- source_word: αὐτοῦ
  chosen: from him
  alternatives:
  - his
  lexicon: LSJ
  rationale: The pronoun with ἀφελόμενος is best taken as the person from whom the
    daughter was taken, i.e., Alexander, not merely a possessive with 'daughter.'
    Rendering it 'from him' makes the relational force explicit in English.
- source_word: τὴν θυγατέρα
  chosen: his daughter
  alternatives:
  - the daughter
  lexicon: LSJ
  rationale: 'Although the Greek has the article, English idiom in this context naturally
    supplies the possessive from context: the daughter in question is the king''s
    daughter previously associated with Alexander.'
- source_word: ἔδωκεν αὐτὴν τῷ Δημητρίῳ
  chosen: he gave her to Demetrius
  alternatives:
  - he gave her in marriage to Demetrius
  lexicon: LSJ
  rationale: The basic verb is 'gave.' While the context is marital transfer, the
    Greek does not explicitly add 'in marriage' here, so the simpler rendering stays
    closer to the wording without losing the sense.
- source_word: ἠλλοιώθη τὸ πρόσωπον Ἀλεξάνδρου
  chosen: Alexander’s attitude changed
  alternatives:
  - Alexander's face changed
  - Alexander's countenance changed
  lexicon: LSJ
  rationale: Literally 'the face of Alexander was altered.' In Greek idiom this can
    denote a change in disposition or demeanor, not merely facial appearance. 'Attitude
    changed' conveys the narrative sense in readable modern English.
- source_word: ἐφάνη
  chosen: became evident
  alternatives:
  - appeared
  - was revealed
  - came to light
  lexicon: LSJ
  rationale: The passive-like intransitive sense here marks that the hostility was
    now openly manifest. 'Became evident' captures that emergence clearly.
- source_word: ἡ ἔχθρα αὐτῶν
  chosen: their hostility
  alternatives:
  - their enmity
  - the hostility between them
  lexicon: LSJ
  rationale: ἔχθρα denotes enmity or hostility. 'Their hostility' is concise, natural
    English and preserves the mutual antagonism indicated by αὐτῶν.
