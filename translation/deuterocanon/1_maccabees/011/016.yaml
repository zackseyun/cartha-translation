translation:
  text: And Alexander fled to Arabia, so that he might find shelter there; but King
    Ptolemy was exalted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be sheltered there,' 'to be hidden there,' or 'to be protected there.'
      The Greek purpose expression can suggest refuge, concealment, or protection.
    reason: lexical_alternative
  - marker: b
    text: Or 'was elevated' or 'became powerful.' The Greek more literally says 'was
      exalted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφυγεν
  chosen: fled
  alternatives:
  - escaped
  - went away
  lexicon: LSJ
  rationale: The aorist of φεύγω commonly means 'fled' or 'escaped.' 'Fled' best conveys
    a hurried retreat in the military-political context without adding interpretation
    beyond the Greek.
- source_word: Ἀραβίαν
  chosen: Arabia
  rationale: Proper place name; transliterated by standard English convention.
- source_word: τοῦ σκεπασθῆναι αὐτὸν ἐκεῖ
  chosen: so that he might find shelter there
  alternatives:
  - to be sheltered there
  - to be hidden there
  - for him to be protected there
  lexicon: LSJ
  rationale: The articular infinitive with τοῦ expresses purpose. σκεπάζω can mean
    cover, shelter, or protect. In this context, 'find shelter' communicates the purpose
    naturally in English while preserving the sense of seeking protection/refuge,
    without overcommitting to concealment alone.
- source_word: ὁ δὲ βασιλεὺς Πτολεμαῖος
  chosen: but King Ptolemy
  alternatives:
  - and King Ptolemy
  - now King Ptolemy
  rationale: δέ marks contrast or transition. 'But' fits the narrative contrast between
    Alexander's flight and Ptolemy's rise.
- source_word: ὑψώθη
  chosen: was exalted
  alternatives:
  - was raised up
  - was elevated
  - became powerful
  lexicon: LSJ
  rationale: The passive of ὑψόω literally means 'was exalted' or 'was lifted up.'
    'Was exalted' preserves the formal sense and leaves open whether the emphasis
    is political elevation, honor, or success. 'Became powerful' would interpret more
    than translate.
