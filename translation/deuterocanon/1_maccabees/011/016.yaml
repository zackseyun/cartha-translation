theological_decisions:
- issue: Rendering of ὑψώθη in a royal-political context
  chosen_reading: was exalted
  alternative_readings:
  - became powerful
  - was elevated
  rationale: Although not a major doctrinal crux, the verb can carry elevated or honorific
    resonance. The translation preserves that tension rather than flattening it into
    a purely political paraphrase.
