translation:
  text: And all the forces that Demetrius had dismissed gathered to him, and they
    fought against him; and he fled and was routed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had sent away' or 'had discharged.' The Greek verb can denote removing
      troops from service or dismissing them from one's presence; the context favors
      a military dismissal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνήχθησαν
  chosen: gathered
  alternatives:
  - were assembled
  - came together
  lexicon: LSJ
  rationale: Aorist passive with πρὸς αὐτόν indicates the forces came together to
    join the person in view. 'Gathered' is natural English and preserves the military
    sense without over-paraphrase.
- source_word: δυνάμεις
  chosen: forces
  alternatives:
  - troops
  - armies
  lexicon: LSJ
  rationale: In this military context the term refers to armed forces. 'Forces' is
    broad and accurate, avoiding the possible over-specificity of 'armies' while sounding
    more military than 'powers'.
- source_word: ἀπεκρόακεν
  chosen: had dismissed
  alternatives:
  - had rejected
  - had sent away
  - had discharged
  lexicon: LSJ
  rationale: In context Demetrius had previously removed these troops from service
    or sent them away; 'dismissed' best fits the narrative setting and the pluperfect-like
    English sense for the prior action relative to the main verbs.
- source_word: ἐπολέμησαν πρὸς αὐτόν
  chosen: they fought against him
  alternatives:
  - they made war against him
  - they fought with him
  lexicon: LSJ
  rationale: The preposition πρὸς with the verb in this context is adversative. 'Fought
    against him' is the clearest idiomatic rendering.
- source_word: ἔφυγεν
  chosen: he fled
  alternatives:
  - he ran away
  - he escaped
  lexicon: LSJ
  rationale: Simple aorist narrative verb; 'fled' is concise and appropriately formal
    for battle narrative.
- source_word: ἐτροπώθη
  chosen: was routed
  alternatives:
  - was defeated
  - was put to flight
  lexicon: LSJ
  rationale: The passive of τρέπω in military contexts commonly means being turned
    back or put to rout. 'Was routed' preserves the battlefield nuance better than
    the more generic 'was defeated'.
