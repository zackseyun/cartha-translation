translation:
  text: And none of these things shall be set aside from now on for all time.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀθετήσεται
  chosen: shall be set aside
  alternatives:
  - shall be annulled
  - shall be rejected
  - shall be invalidated
  lexicon: LSJ
  rationale: The future passive of ἀθετέω here refers to nullifying or disregarding
    the provisions just mentioned. 'Set aside' is clear modern English that preserves
    the passive sense without sounding overly technical. 'Annulled' is possible but
    more legalistic than the context requires.
- source_word: οὐδὲν τούτων
  chosen: none of these things
  alternatives:
  - nothing of these things
  - none of this
  lexicon: LSJ
  rationale: This straightforwardly refers back to the preceding concessions or decrees.
    'None of these things' is idiomatic English and preserves the plural demonstrative
    force.
- source_word: ἀπὸ τοῦ νῦν
  chosen: from now on
  alternatives:
  - from this time
  - henceforth
  lexicon: LSJ
  rationale: '''From now on'' gives the temporal force in natural contemporary English.
    ''Henceforth'' is accurate but archaic for the project''s style.'
- source_word: ἐπὶ τὸν ἅπαντα χρόνον
  chosen: for all time
  alternatives:
  - for the whole time
  - forever
  - for all future time
  lexicon: LSJ
  rationale: The phrase intensifies the enduring validity of the decree. 'For all
    time' is concise and natural, while preserving the comprehensive temporal scope.
    'Forever' is possible but can sound more absolute or idiomatic than the Greek's
    temporal phrasing.
