translation:
  text: And Antiochus the younger wrote to Jonathan, saying, “I appoint for you the
    high priesthood, and I appoint you over the four districts, and that you are to
    be among the king’s Friends.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the king’s friends.” The Greek likely refers to an official court rank
      in the Hellenistic monarchy, not merely personal companions.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - sent a letter
  - wrote a letter
  lexicon: LSJ
  rationale: The aorist simply states the act of writing; 'wrote' is the most direct
    rendering and leaves the epistolary context to be inferred from the following
    participle 'saying.'
- source_word: ὁ νεώτερος
  chosen: the younger
  alternatives:
  - the younger one
  - junior
  lexicon: LSJ
  rationale: This distinguishes Antiochus from another Antiochus and is naturally
    rendered as an epithet in English.
- source_word: Ἵστημί
  chosen: I appoint
  alternatives:
  - I establish
  - I set
  lexicon: LSJ
  rationale: In this administrative context, the verb conveys official installation
    into office rather than mere physical setting; 'appoint' communicates the political-legal
    force clearly in modern English.
- source_word: τὴν ἀρχιερωσύνην
  chosen: the high priesthood
  alternatives:
  - the office of high priest
  lexicon: LSJ
  rationale: The noun denotes the office/dignity of the high priest. 'The high priesthood'
    is concise and standard English for the institution being conferred.
- source_word: καθίστημί
  chosen: I appoint you over
  alternatives:
  - I set you over
  - I place you over
  - I establish you over
  lexicon: LSJ
  rationale: The verb in governance contexts means to put someone in charge of a sphere.
    Repeating 'appoint' reflects the formal administrative tone and matches the preceding
    installation language.
- source_word: τῶν τεσσάρων νομῶν
  chosen: the four districts
  alternatives:
  - the four provinces
  - the four nomes
  lexicon: LSJ
  rationale: νόμος/νομός here refers to administrative districts. 'Districts' is clear
    modern English; 'nomes' is too technical, while 'provinces' may suggest a larger
    unit than intended.
- source_word: τῶν φίλων τοῦ βασιλέως
  chosen: the king’s Friends
  alternatives:
  - the king's friends
  - the king's companions
  lexicon: LSJ
  rationale: In Hellenistic court usage, 'Friends' can function as a semi-technical
    title for royal courtiers. Capitalizing 'Friends' preserves that likely titular
    nuance without overexplaining in the main text.
