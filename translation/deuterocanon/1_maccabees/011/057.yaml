theological_decisions:
- issue: Court title φίλων τοῦ βασιλέως
  chosen_reading: the king’s Friends
  alternative_readings:
  - the king's friends
  - the king's companions
  rationale: This is not a major doctrinal issue, but it is historically significant.
    The phrase likely denotes an official court rank rather than mere personal friendship,
    so the translation preserves the titular sense in the main text.
