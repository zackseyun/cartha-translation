translation:
  text: And Ptolemy entered Antioch and put on the crown of Asia, and he put two crowns
    on his head, that of Asia and Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''two diadems.'' The Greek uses the same royal term twice: first for
      ''the crown of Asia,'' then for ''two crowns''—those of Asia and Egypt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - went into
  - came into
  lexicon: LSJ
  rationale: A straightforward narrative aorist of motion into a city; 'entered' is
    natural modern English and keeps the formal sense.
- source_word: περιέθετο
  chosen: put on
  alternatives:
  - placed on himself
  - set around himself
  - assumed
  lexicon: LSJ
  rationale: The middle verb literally conveys placing something on oneself. 'Put
    on' preserves the concrete image of donning royal insignia better than the more
    interpretive 'assumed'.
- source_word: διάδημα
  chosen: crown
  alternatives:
  - diadem
  lexicon: LSJ
  rationale: The term denotes the royal headband/crown. 'Crown' is clearer in contemporary
    English; 'diadem' is more technical and less accessible. The repeated use is preserved
    for transparency.
- source_word: τῆς Ἀσίας
  chosen: of Asia
  alternatives:
  - of the Asian kingdom
  - of Asia Minor
  lexicon: LSJ
  rationale: The Greek is simply 'of Asia.' In this Hellenistic context it refers
    to the Seleucid realm in Asia, but the text itself uses the geographic-political
    term directly, so the translation retains it without expansion.
- source_word: δύο διαδήματα
  chosen: two crowns
  alternatives:
  - two diadems
  lexicon: LSJ
  rationale: The numeral plus repeated noun emphasizes the unusual act of wearing
    both royal insignia; 'two crowns' is idiomatic and clear.
- source_word: περὶ τὴν κεφαλὴν αὐτοῦ
  chosen: on his head
  alternatives:
  - around his head
  - about his head
  lexicon: LSJ
  rationale: Although περὶ is literally 'around,' in this context with royal headgear
    idiomatic English is 'on his head.' This preserves the sense without awkwardness.
