theological_decisions:
- issue: Royal symbolism of wearing two διαδήματα
  chosen_reading: Translate concretely as the physical act of putting on two crowns
  alternative_readings:
  - Render more interpretively as claiming rule over Asia and Egypt
  rationale: The verse narrates a symbolic political act, but the Greek expresses
    it through concrete action. The translation preserves the literal wording and
    lets the political implication arise from the image rather than importing explanation
    into the main text.
  doctrine_reference: Translation philosophy §§1, 6
