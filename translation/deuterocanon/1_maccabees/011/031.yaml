translation:
  text: We have also written to you a copy of the letter that Lasthenes wrote to our
    kinsman concerning you, so that you may see it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to our relative.' The Greek συγγενής can denote a blood relative, a
      kinsman, or an honored associate/compatriot depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ἀντίγραφον
  chosen: a copy
  alternatives:
  - the copy
  - a transcript
  lexicon: LSJ
  rationale: ἀντίγραφον denotes a copy or transcript of a document. English 'a copy'
    is natural and sufficiently formal; the Greek article is idiomatic in this documentary
    context and need not be rendered as 'the' in English.
- source_word: τῆς ἐπιστολῆς
  chosen: of the letter
  alternatives:
  - of the document
  - of the epistle
  lexicon: LSJ
  rationale: ἐπιστολή is the standard term for a letter. 'Letter' is the plain modern
    equivalent.
- source_word: ἧς ἔγραψεν
  chosen: that ... wrote
  alternatives:
  - which ... wrote
  - which ... sent
  lexicon: LSJ
  rationale: The relative clause straightforwardly modifies 'letter.' ἔγραψεν is 'wrote,'
    not the broader 'sent.'
- source_word: Λασθένεις
  chosen: Lasthenes
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: τῷ συγγενεῖ ἡμῶν
  chosen: to our kinsman
  alternatives:
  - to our relative
  - to ourinsman
  lexicon: LSJ
  rationale: 'συγγενής can mean relative, kinsman, or compatriot/associate depending
    on context. Here, in royal-diplomatic correspondence, ''kinsman'' preserves the
    formal courtly sense often used for an allied or honored associate without over-specifying
    blood relation. This also matches the dative governed by ἔγραψεν: ''wrote to our
    kinsman.'''
- source_word: περὶ ὑμῶν
  chosen: concerning you
  alternatives:
  - about you
  - on your behalf
  lexicon: LSJ
  rationale: περί with genitive most naturally means 'concerning/about.' 'Concerning
    you' fits the formal register of the letter.
- source_word: γεγράφαμεν καὶ πρὸς ὑμᾶς
  chosen: We have also written to you
  alternatives:
  - we have written also to you
  - we wrote also to you
  lexicon: LSJ
  rationale: The perfect γεγράφαμεν can be rendered as an English present perfect
    here, reflecting a completed act with present relevance. καί is best captured
    as 'also,' indicating that the same copy has been written/sent to the recipients
    as well. The phrase implies the dispatch of the copy to them.
- source_word: ὅπως ἰδῆτε
  chosen: so that you may see it
  alternatives:
  - so that you may know
  - in order that you may see
  lexicon: LSJ
  rationale: ὅπως with subjunctive expresses purpose. ἰδῆτε is literally 'you may
    see'; adding 'it' makes the English object explicit from context, namely the copy
    of the letter.
