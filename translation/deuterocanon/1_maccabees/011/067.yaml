translation:
  text: And Jonathan and his camp encamped by the water of Gennesar, and they rose
    early in the morning for the plain of Nasor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the plain of Nasor.' The Greek says literally 'rose early in the
      morning into/to the plain of Nasor,' with the motion toward the plain implied
      rather than expressed by a separate travel verb.
    reason: lexical_alternative
  - marker: b
    text: Gennesar is the form found in the Greek text here; many readers will know
      the place-name as Gennesaret.
    reason: alternative_reading
lexical_decisions:
- source_word: παρεμβολὴ
  chosen: camp
  alternatives:
  - army
  - encampment
  lexicon: LSJ
  rationale: In military narrative παρεμβολή commonly denotes a camp or body of troops
    in camp. 'Camp' preserves both the collective military sense and the connection
    with the following verb 'encamped' without over-specifying as 'army'.
- source_word: παρενέβαλον
  chosen: encamped
  alternatives:
  - pitched camp
  - marched and camped
  lexicon: LSJ
  rationale: The verb means to make camp or encamp. 'Encamped' is the most direct
    rendering and matches the military setting.
- source_word: ἐπὶ τὸ ὕδωρ
  chosen: by the water
  alternatives:
  - at the water
  - upon the water
  lexicon: LSJ
  rationale: With encamping language, ἐπί plus accusative here is naturally locative
    in sense. 'By the water' is idiomatic English and fits the scene better than the
    more wooden 'upon the water.'
- source_word: τοῦ Γεννησάρ
  chosen: of Gennesar
  alternatives:
  - of Gennesaret
  lexicon: LSJ
  rationale: The Greek form in Swete is Γεννησάρ, so the transliteration should reflect
    the source form rather than harmonize to the more familiar 'Gennesaret.' The place
    is a body of water associated with that region.
- source_word: ὤρθρισαν
  chosen: rose early
  alternatives:
  - set out early
  - were up at dawn
  lexicon: LSJ
  rationale: The verb denotes rising early or being abroad at dawn. 'Rose early' keeps
    the temporal nuance without importing motion not explicit in the verb itself.
- source_word: τὸ πρωὶ
  chosen: in the morning
  alternatives:
  - at morning
  - early that morning
  lexicon: LSJ
  rationale: This adverbial accusative reinforces the early-morning timing. Rendering
    it explicitly avoids losing the emphasis created by pairing it with ὤρθρισαν.
- source_word: εἰς τὸ πεδίον Νασώρ
  chosen: for the plain of Nasor
  alternatives:
  - to the plain of Nasor
  - into the plain of Nasor
  lexicon: LSJ
  rationale: εἰς marks movement toward a destination. Because the finite verb is 'rose
    early' rather than an explicit travel verb, 'for the plain of Nasor' captures
    intended movement while staying close to the Greek construction. 'Nasor' reflects
    the Greek form Νασώρ.
