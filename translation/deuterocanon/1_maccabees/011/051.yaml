translation:
  text: And they threw down their weapons and made peace. And the Jews were honored
    before the king and before all those in his kingdom, and they returned to Jerusalem
    with much plunder.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔρριψαν τὰ ὅπλα
  chosen: threw down their weapons
  alternatives:
  - cast away their arms
  - laid down their weapons
  lexicon: LSJ
  rationale: The idiom conveys surrender/disarmament. 'Threw down their weapons' is
    vivid and natural English while staying close to the Greek verb ἔρριψαν ('threw').
- source_word: ἐποίησαν εἰρήνην
  chosen: made peace
  alternatives:
  - made peace with them
  - came to terms
  lexicon: LSJ
  rationale: A standard idiom meaning to conclude peace. 'Made peace' is concise and
    direct; adding an explicit object would go beyond the Greek wording here.
- source_word: ἐδοξάσθησαν
  chosen: were honored
  alternatives:
  - were glorified
  - were held in honor
  lexicon: LSJ
  rationale: Although the passive of δοξάζω can be rendered 'were glorified,' in this
    historical context it refers to public esteem or honor rather than theological
    glorification. 'Were honored' best fits idiomatic English and context.
- source_word: ἐναντίον τοῦ βασιλέως
  chosen: before the king
  alternatives:
  - in the sight of the king
  - in the presence of the king
  lexicon: LSJ
  rationale: ἐναντίον here indicates standing in someone's view or estimation. 'Before
    the king' is idiomatic and preserves the public-relational sense.
- source_word: ἐνώπιον πάντων τῶν ἐν τῇ βασιλείᾳ αὐτοῦ
  chosen: before all those in his kingdom
  alternatives:
  - in the sight of everyone in his kingdom
  - before all who were in his realm
  lexicon: LSJ
  rationale: The phrase broadens the sphere of recognition from the king to the populace
    of the kingdom. 'All those in his kingdom' is clear and sufficiently formal.
- source_word: ἐπέστρεψαν εἰς Ἰερουσαλήμ
  chosen: returned to Jerusalem
  alternatives:
  - went back to Jerusalem
  lexicon: LSJ
  rationale: ἐπέστρεψαν naturally means 'returned' in this narrative setting.
- source_word: σκῦλα πολλά
  chosen: much plunder
  alternatives:
  - many spoils
  - much spoil
  lexicon: LSJ
  rationale: σκῦλα denotes spoils taken in war. 'Much plunder' is modern, clear English;
    'spoils' is possible but slightly less natural for contemporary readers.
