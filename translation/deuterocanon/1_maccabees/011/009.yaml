translation:
  text: And he sent envoys to King Demetrius, saying, “Come, let us make a covenant
    with one another, and I will give you my daughter whom Alexander has, and you
    will reign over your father's kingdom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let us conclude a treaty with one another.' The Greek uses διαθήκη,
      a formal pact term often rendered 'covenant.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'my daughter whom Alexander has,' referring to the daughter presently
      in Alexander's possession as wife.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard narrative aorist of ἀποστέλλω; 'sent' is natural modern English
    and sufficiently formal.
- source_word: πρέσβεις
  chosen: envoys
  alternatives:
  - ambassadors
  - messengers
  lexicon: LSJ
  rationale: πρέσβεις here denotes official diplomatic representatives, not ordinary
    messengers. 'Envoys' captures the political setting without sounding overly technical.
- source_word: συνθώμεθα ... διαθήκην
  chosen: let us make a covenant
  alternatives:
  - let us make an agreement
  - let us conclude a treaty
  lexicon: LSJ
  rationale: The combination of συντίθημι with διαθήκη expresses entering into a formal
    pact. 'Covenant' preserves the lexical weight of διαθήκη and avoids flattening
    it to a merely informal agreement; 'treaty' is possible in this interstate context
    but is narrower and more interpretive.
- source_word: πρὸς ἑαυτούς
  chosen: with one another
  alternatives:
  - between ourselves
  lexicon: LSJ
  rationale: Idiomatic reciprocal sense in context; 'with one another' is clear modern
    English.
- source_word: δώσω σοι τὴν θυγατέρα μου
  chosen: I will give you my daughter
  alternatives:
  - I will give my daughter to you
  lexicon: LSJ
  rationale: This is marriage-alliance language. The chosen wording is direct and
    idiomatic while preserving the transactional force of the Greek.
- source_word: ἣν ἔχει Ἀλέξανδρος
  chosen: whom Alexander has
  alternatives:
  - who is with Alexander
  - whom Alexander possesses
  lexicon: LSJ
  rationale: ἔχει literally means 'has.' In this context it refers to Alexander presently
    having her as wife. 'Whom Alexander has' stays close to the Greek while remaining
    intelligible; more explicit marital wording would add information not directly
    stated in this clause.
- source_word: βασιλεύσεις
  chosen: you will reign
  alternatives:
  - you will be king
  - you will rule as king
  lexicon: LSJ
  rationale: Future of βασιλεύω is best rendered verbally as 'reign,' preserving the
    royal action rather than reducing it to a title.
- source_word: τῆς βασιλείας τοῦ πατρός σου
  chosen: over your father's kingdom
  alternatives:
  - in your father's kingdom
  - your father's kingship
  lexicon: LSJ
  rationale: The genitive after βασιλεύω is naturally rendered in English with 'over.'
    βασιλεία here refers to the realm/kingdom inherited from his father, not merely
    abstract kingship.
