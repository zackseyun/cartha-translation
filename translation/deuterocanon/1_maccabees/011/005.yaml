translation:
  text: And they reported to the king what Jonathan had done, in order to accuse him;
    but the king kept silent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in order to bring reproach on him' or 'in order to blame him.' The Greek
      verb can denote censure or disparagement as well as formal accusation.
    reason: lexical_alternative
lexical_decisions:
- source_word: διηγήσαντο
  chosen: reported
  alternatives:
  - related
  - recounted
  - told
  lexicon: LSJ
  rationale: The verb means to relate or narrate in detail. 'Reported' fits the court
    setting with τῷ βασιλεῖ and reads naturally in English without overstating the
    level of detail.
- source_word: ἃ ἐποίησεν
  chosen: what Jonathan had done
  alternatives:
  - the things Jonathan did
  - what Jonathan did
  lexicon: LSJ
  rationale: This relative construction refers to Jonathan's actions. The English
    past perfect ('had done') fits the narrative sequence after they came before the
    king.
- source_word: εἰς τὸ ψογίσαι
  chosen: in order to accuse
  alternatives:
  - so as to blame
  - to disparage
  - to bring reproach on
  lexicon: LSJ
  rationale: ψογίζω carries the sense of blaming, censuring, or casting reproach.
    In this political context, 'accuse' best conveys hostile denunciation before a
    ruler, while remaining within the semantic range.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - Jonathan
  lexicon: Greek grammar
  rationale: The pronoun most naturally refers back to Jonathan, the immediately preceding
    named person and the object of the hostile report. English keeps the pronoun for
    natural flow.
- source_word: ἐσίγησεν
  chosen: kept silent
  alternatives:
  - was silent
  - said nothing
  lexicon: LSJ
  rationale: The aorist indicates that the king did not respond. 'Kept silent' preserves
    the narrative force and suggests deliberate non-response better than a merely
    stative 'was silent'.
- source_word: ὁ βασιλεύς
  chosen: the king
  lexicon: LSJ
  rationale: Standard rendering of the title in this historical narrative.
