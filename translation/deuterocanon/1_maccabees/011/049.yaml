translation:
  text: And when those in the city saw that the Jews had gained control of the city
    as they wished, they lost heart, and they cried out to the king with a plea, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ ὑπὸ τῆς πόλεως
  chosen: those in the city
  alternatives:
  - those under the city
  - those from the city
  - the people of the city
  lexicon: LSJ
  rationale: The idiom refers to the inhabitants or party within the city, not a literal
    spatial sense 'under the city.' 'Those in the city' is natural English and preserves
    the referent without over-specifying.
- source_word: κατεκράτησαν
  chosen: had gained control
  alternatives:
  - had prevailed over
  - had seized
  - had become masters of
  lexicon: LSJ
  rationale: κρατέω with genitive here conveys exercising power over or mastering
    the city. 'Had gained control' captures the resultative force in readable English
    without implying more violence than the verb itself states.
- source_word: τῆς πόλεως
  chosen: of the city
  alternatives:
  - over the city
  lexicon: LSJ
  rationale: The genitive depends on κατεκράτησαν. In idiomatic English this is best
    expressed in the verbal phrase 'gained control of the city.'
- source_word: ὡς ἠβούλοντο
  chosen: as they wished
  alternatives:
  - as they wanted
  - just as they desired
  lexicon: LSJ
  rationale: This clause indicates that the Jews' control matched their intention
    or desire. 'As they wished' is concise and faithful.
- source_word: ἠσθένησαν ταῖς διανοίαις αὐτῶν
  chosen: they lost heart
  alternatives:
  - they became weak in their minds
  - they were discouraged
  - their resolve failed
  lexicon: LSJ
  rationale: Literally 'they became weak in their minds/thoughts.' In context this
    is an idiom of discouragement or collapse of resolve. 'They lost heart' is an
    optimal-equivalence rendering that preserves the emotional force.
- source_word: ἐκέκραξαν πρὸς τὸν βασιλέα
  chosen: they cried out to the king
  alternatives:
  - they called out to the king
  - they appealed to the king
  lexicon: LSJ
  rationale: κράζω is a strong verb of crying out. Since the following phrase already
    specifies the supplicatory manner, 'cried out' preserves the intensity better
    than the flatter 'appealed.'
- source_word: μετὰ δεήσεως
  chosen: with a plea
  alternatives:
  - with supplication
  - in supplication
  - with an entreaty
  lexicon: LSJ
  rationale: δέησις denotes earnest petition or supplication. 'With a plea' is accessible
    modern English while retaining the sense of urgent request.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: LSJ
  rationale: This participle introduces the direct speech of the next verse. 'Saying'
    preserves the connection cleanly.
