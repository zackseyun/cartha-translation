translation:
  text: And Simon encamped at Bethsura, and fought against it for many days, and shut
    it in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blockaded it' / 'hemmed it in.' The Greek verb means to shut in or enclose,
      likely describing siege containment.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεβάλλεν
  chosen: encamped
  alternatives:
  - camped
  - laid siege
  lexicon: LSJ
  rationale: The verb commonly means to encamp or pitch camp. In a military context
    it can imply taking position against a city, but the following verbs already express
    active warfare and enclosure, so 'encamped' preserves the sequence without collapsing
    it into 'besieged' too early.
- source_word: Βεθσούρᾳ
  chosen: Bethsura
  alternatives:
  - Beth-zur
  rationale: A standard transliteration of the place name from the Greek form. This
    follows the philosophy of transliterating names rather than translating them.
- source_word: ἐπολέμει
  chosen: fought against
  alternatives:
  - made war on
  - attacked
  lexicon: LSJ
  rationale: The imperfect verb denotes ongoing military action. 'Fought against'
    is natural modern English and preserves the hostile action without overstating
    a single assault.
- source_word: ἡμέρας πολλὰς
  chosen: for many days
  alternatives:
  - many days
  lexicon: LSJ
  rationale: This accusative of duration is best rendered explicitly in English as
    'for many days.'
- source_word: συνέκλεισεν
  chosen: shut it in
  alternatives:
  - blockaded it
  - hemmed it in
  - confined it
  lexicon: LSJ
  rationale: The verb means to shut in or enclose. 'Shut it in' stays close to the
    Greek while still conveying siege-like containment. 'Blockaded' is possible but
    slightly more interpretive and modernized.
