translation:
  text: And the king fled into the court, and the men of the city seized the passages
    of the city and began to fight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'courtyard'; the Greek can refer to the court area of a palace.
    reason: lexical_alternative
  - marker: b
    text: Or 'those from the city seized the approaches/entrances of the city.' The
      Greek term can denote passages or access routes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφυγεν
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: BDAG
  rationale: The aorist of φεύγω denotes flight from danger. 'Fled' is the most natural
    concise English rendering and preserves the sense of urgent retreat.
- source_word: αὐλήν
  chosen: court
  alternatives:
  - courtyard
  - palace court
  lexicon: LSJ
  rationale: αὐλή commonly means a court or courtyard. 'Court' is chosen as a readable
    rendering; the context is the royal complex, but the Greek does not explicitly
    say 'palace,' so the broader term is retained.
- source_word: κατελάβοντο
  chosen: seized
  alternatives:
  - occupied
  - took control of
  lexicon: BDAG
  rationale: The middle form here conveys taking possession/control. 'Seized' fits
    the military setting and is more immediate than 'occupied,' while avoiding over-interpretation.
- source_word: οἱ ἐκ τῆς πόλεως
  chosen: the men of the city
  alternatives:
  - those from the city
  - the people of the city
  lexicon: BDAG
  rationale: Literally 'those from the city.' In this battle context it refers to
    the city's inhabitants acting militarily. 'The men of the city' gives a natural
    English expression and reflects the likely active combatants without claiming
    more than the context suggests.
- source_word: τὰς διόδους τῆς πόλεως
  chosen: the passages of the city
  alternatives:
  - the approaches of the city
  - the streets of the city
  - the city entrances
  lexicon: LSJ
  rationale: δίοδος can denote a passage, way through, or access route. 'Passages
    of the city' stays close to the Greek while allowing for streets, routes, or access
    points within/through the city. More specific options like 'entrances' are possible
    but narrower than the Greek warrants.
- source_word: ἤρξαντο ἐκπολεμεῖν
  chosen: began to fight
  alternatives:
  - began making war
  - began to wage battle
  lexicon: BDAG
  rationale: The construction means 'began to engage in warfare.' 'Began to fight'
    is idiomatic modern English and adequately conveys the onset of hostilities.
