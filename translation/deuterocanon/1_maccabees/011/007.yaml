translation:
  text: And Jonathan went with the king as far as the river called Eleutherus, and
    he returned to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Eleutherus is the proper name of a river marking a northern boundary region;
      the Greek simply says 'the river called Eleutherus.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐπορεύθη
  chosen: went
  alternatives:
  - traveled
  - journeyed
  lexicon: LSJ
  rationale: Aorist of πορεύομαι, denoting movement or travel. 'Went' is the most
    natural modern English rendering and adequately conveys the simple narrative action
    without unnecessary formality.
- source_word: μετὰ τοῦ βασιλέως
  chosen: with the king
  alternatives:
  - along with the king
  lexicon: LSJ
  rationale: μετά with the genitive indicates accompaniment. 'With the king' is direct
    and idiomatic.
- source_word: ἕως τοῦ ποταμοῦ
  chosen: as far as the river
  alternatives:
  - up to the river
  - to the river
  lexicon: LSJ
  rationale: ἕως marks extent or limit. 'As far as' best preserves the sense that
    Jonathan accompanied the king up to a boundary point.
- source_word: τοῦ καλουμένου Ἐλευθέρου
  chosen: called Eleutherus
  alternatives:
  - named Eleutherus
  lexicon: LSJ
  rationale: καλουμένου means 'being called/named.' Since Ἐλευθέρου is a proper geographical
    name, it is transliterated rather than translated, in keeping with the project's
    policy on names.
- source_word: ἐπέστρεψεν
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: LSJ
  rationale: The verb indicates returning or turning back. 'Returned' is concise and
    idiomatic in this travel context.
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: LSJ
  rationale: εἰς with a place name commonly indicates motion toward a destination.
    'To Jerusalem' is standard English and fits the narrative context.
