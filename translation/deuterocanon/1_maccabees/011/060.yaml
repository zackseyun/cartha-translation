id: 1MA.11.60
reference: 1 Maccabees 11:60
source:
  edition: lxx-swete-1909
  text: καὶ ἐξῆλεν Ἰωνάθᾳ, καὶ διεπορεύετο πέραν τοῦ ποταμοῦ καὶ ἐν ταῖς πόλεσιν,
    καὶ ἠθροίσθησαν πρὸς αὐτὸν πᾶσαι αἱ δυνάμεις Συρίας εἰς συμμαχίαν, καὶ ἦλθεν εἰς
    Ἀσκαλῶνα, καὶ ἀπήντησαν αὐτῷ οἱ ἐκ τῆς πόλεως ἐνδόξως.
