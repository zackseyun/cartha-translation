translation:
  text: And Jonathan went out, and he traveled beyond the river and through the cities,
    and all the forces of Syria gathered to him as allies, and he came to Ashkelon,
    and the men of the city met him with honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"The river" is left unspecified in the Greek; in this historical setting
      it likely refers to the Euphrates.'
    reason: cultural_note
  - marker: b
    text: Or "for an alliance" / "into alliance." The Greek phrase εἰς συμμαχίαν indicates
      that the Syrian forces gathered in support of Jonathan.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλεν
  chosen: went out
  alternatives:
  - set out
  - marched out
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist of ἐξέρχομαι. 'Went out' preserves
    the narrative movement without over-specifying military nuance, though the context
    is martial.
- source_word: διεπορεύετο
  chosen: traveled
  alternatives:
  - passed through
  - went on
  lexicon: LSJ
  rationale: The imperfect/middle form conveys continued movement. 'Traveled' gives
    natural English while retaining the sense of ongoing progress through the region.
- source_word: πέραν τοῦ ποταμοῦ
  chosen: beyond the river
  alternatives:
  - across the river
  - on the far side of the river
  lexicon: LSJ
  rationale: A fairly literal rendering. 'The river' likely refers to the Euphrates
    as a known regional boundary, but the Greek itself does not name it here, so the
    translation keeps the generic expression.
- source_word: ἐν ταῖς πόλεσιν
  chosen: through the cities
  alternatives:
  - in the cities
  - among the cities
  lexicon: LSJ
  rationale: Although ἐν is literally 'in,' with a verb of movement in context it
    naturally conveys movement through the cities. This avoids awkward English while
    staying close to the sense.
- source_word: ἠθροίσθησαν
  chosen: gathered
  alternatives:
  - were assembled
  - came together
  lexicon: LSJ
  rationale: The passive form indicates that the Syrian forces came together toward
    Jonathan. 'Gathered' is concise and idiomatic.
- source_word: δυνάμεις
  chosen: forces
  alternatives:
  - troops
  - armies
  lexicon: LSJ
  rationale: In military context δυνάμεις refers to armed forces. 'Forces' is broad
    enough to cover the collective military groups without implying a single unified
    army.
- source_word: εἰς συμμαχίαν
  chosen: as allies
  alternatives:
  - for alliance
  - into alliance
  lexicon: LSJ
  rationale: The phrase expresses the purpose/result of their gathering in relation
    to Jonathan. 'As allies' communicates the sense idiomatically in English better
    than the more wooden 'for alliance.'
- source_word: Ἀσκαλῶνα
  chosen: Ashkelon
  alternatives:
  - Ascalon
  lexicon: LSJ
  rationale: Standard English transliteration of the place name.
- source_word: ἀπήντησαν αὐτῷ
  chosen: met him
  alternatives:
  - went out to meet him
  - received him
  lexicon: LSJ
  rationale: The verb means to meet or go to meet. 'Met him' is sufficient here because
    the following adverb supplies the manner of reception.
- source_word: ἐνδόξως
  chosen: with honor
  alternatives:
  - gloriously
  - honorably
  - splendidly
  lexicon: LSJ
  rationale: The adverb denotes an honorable or splendid manner. 'With honor' fits
    idiomatic English and captures the city's respectful reception without sounding
    inflated.
