translation:
  text: And Jonathan sent to Demetrius the king, asking that he remove those from
    the citadel out of Jerusalem, and those in the strongholds; for they were making
    war against Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'those from the Acra,' the Seleucid citadel in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard narrative verb for sending; 'sent' is natural modern English
    and sufficiently formal.
- source_word: πρὸς Δημήτριον τὸν βασιλέα
  chosen: to Demetrius the king
  alternatives:
  - to King Demetrius
  lexicon: LSJ
  rationale: The Greek order apposes the royal title after the name. 'Demetrius the
    king' stays close to the source while remaining readable.
- source_word: ἵνα ἐκβάλῃ
  chosen: asking that he remove
  alternatives:
  - that he cast out
  - that he drive out
  lexicon: LSJ
  rationale: After a verb of sending, ἵνα introduces the requested action. 'Remove'
    fits the political-military context without sounding overly wooden; 'cast out'
    is more literal but less idiomatic here.
- source_word: τοὺς ἐκ τῆς ἄκρας
  chosen: those from the citadel
  alternatives:
  - the men of the Acra
  - those from the Acra fortress
  lexicon: LSJ
  rationale: ἄκρα can denote a citadel/fortress; in 1 Maccabees it often refers specifically
    to the Seleucid stronghold in Jerusalem. 'The citadel' gives the sense directly
    in English without requiring transliteration, while the more technical 'Acra'
    is preserved in a footnote-worthy alternative.
- source_word: ἐξ Ἱερουσαλήμ
  chosen: out of Jerusalem
  alternatives:
  - from Jerusalem
  lexicon: LSJ
  rationale: The repeated ἐκ/ἐξ is spatial and emphatic; 'out of Jerusalem' preserves
    the expulsion sense slightly better than the flatter 'from Jerusalem.'
- source_word: τοὺς ἐν τοῖς ὀχυρώμασιν
  chosen: those in the strongholds
  alternatives:
  - those in the fortresses
  - those in the fortified places
  lexicon: LSJ
  rationale: ὀχύρωμα refers to a fortified place. 'Strongholds' is concise and natural;
    'fortresses' is possible but slightly more concrete than the Greek requires.
- source_word: ἦσαν γὰρ πολεμοῦντες
  chosen: for they were making war
  alternatives:
  - for they were fighting
  - for they were waging war
  lexicon: LSJ
  rationale: The periphrastic construction conveys ongoing hostile action. 'Making
    war' preserves the durative and organized military sense better than the more
    generic 'fighting.'
- source_word: τὸν Ἰσραήλ
  chosen: against Israel
  alternatives:
  - with Israel
  lexicon: LSJ
  rationale: With πολεμέω, the accusative marks the party attacked. 'Against Israel'
    makes the adversative force explicit in idiomatic English.
