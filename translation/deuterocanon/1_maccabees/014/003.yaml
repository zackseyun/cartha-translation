id: 1MA.14.3
reference: 1 Maccabees 14:3
source:
  edition: lxx-swete-1909
  text: καὶ ἐπορεύθη καὶ ἐπάταξεν τὴν παρεμβολὴν Δημητρίου καὶ συνέλαβεν αὐτόν, καὶ
    ἤγαγεν αὐτὸν πρὸς Ἀρσάκην, καὶ ἔθετο αὐτὸν ἐν φυλακῇ.
  language: Greek
  pages:
  - 675
  confidence: high
  validation: agree
translation:
  text: And he went and struck the camp of Demetrius, and captured him, and brought
    him to Arsaces, and put him in prison.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπορεύθη
  chosen: went
  alternatives:
  - marched
  - set out
  lexicon: LSJ
  rationale: Aorist of πορεύομαι, here a simple narrative movement verb. 'Went' is
    natural English and avoids over-specifying military nuance, which is already supplied
    by the following action against the camp.
- source_word: ἐπάταξεν
  chosen: struck
  alternatives:
  - defeated
  - attacked
  - smote
  lexicon: LSJ
  rationale: πάτασσω commonly means 'strike' or 'smite.' 'Struck' preserves the directness
    of the Greek without importing a fuller result such as 'defeated,' which the verb
    itself does not require.
- source_word: παρεμβολὴν
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: LSJ
  rationale: In military context παρεμβολή refers to a camp or encampment. 'Camp'
    is concise, idiomatic, and sufficiently clear in modern English.
- source_word: συνέλαβεν
  chosen: captured
  alternatives:
  - seized
  - took prisoner
  - arrested
  lexicon: LSJ
  rationale: The verb means to seize or capture. 'Captured' fits the military setting
    and avoids the modern legal connotations of 'arrested.' 'Took prisoner' is possible
    but slightly more interpretive than the Greek wording.
- source_word: ἤγαγεν
  chosen: brought
  alternatives:
  - led
  - took
  lexicon: LSJ
  rationale: ἄγω here indicates conducting someone to another person. 'Brought' reads
    smoothly in English and matches the destination phrase 'to Arsaces.'
- source_word: Ἀρσάκην
  chosen: Arsaces
  alternatives:
  - Arsakes
  rationale: Personal names are transliterated by standard conventions. 'Arsaces'
    is the conventional English form for Ἀρσάκης.
- source_word: ἔθετο
  chosen: put
  alternatives:
  - placed
  - confined
  lexicon: LSJ
  rationale: τίθημι literally means 'put' or 'place.' 'Put' keeps the concrete force
    of the Greek; the imprisonment sense is already expressed by the following phrase.
- source_word: ἐν φυλακῇ
  chosen: in prison
  alternatives:
  - in custody
  - under guard
  - in confinement
  lexicon: LSJ
  rationale: φυλακή can denote guard, watch, or prison; in this context, with 'put
    him in,' the sense is clearly imprisonment. 'In prison' is the most straightforward
    rendering.
