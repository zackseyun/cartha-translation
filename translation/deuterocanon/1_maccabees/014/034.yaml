id: 1MA.14.34
reference: 1 Maccabees 14:34
source:
  edition: lxx-swete-1909
  text: καὶ Ἰόππην ὠχύρωσεν τὴν ἐπὶ τῆς θαλάσσης, καὶ τὴν Γάζαραν τὴν ἐπὶ τῶν ὁρίων
    Ἀζώτου, ἐν ᾗ ᾤκουν οἱ πολέμιοι τὸ πρότερον ἐκεῖ, καὶ κατῴκισεν ἐκεῖ Ἰουδαίους,
    καὶ ὅσα ἐπιτήδεια πρὸς τὴν τούτων ἐπανόρθωσιν ἔθετο ἐν αὐτοῖς.
  language: Greek
  pages:
  - 678
  confidence: high
  validation: agree
translation:
  text: And he fortified Joppa, which is on the sea, and Gazara, which is on the borders
    of Azotus, where the enemies had formerly lived there; and he settled Jews there,
    and placed in them whatever was needed for their restoration.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Gezer' for 'Gazara,' reflecting a more familiar Hebrew-associated place
      name; the Greek source here reads 'Gazara.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'for their restoration' may refer to the reestablishment of these
      places or of the Jewish communities settled in them; the Greek wording is concise
      and allows either nuance.
    reason: alternative_reading
lexical_decisions:
- source_word: ὠχύρωσεν
  chosen: fortified
  alternatives:
  - made strong
  - strengthened
  lexicon: LSJ
  rationale: The verb denotes making a place secure by fortification. 'Fortified'
    is the most natural military-political English equivalent in this context of cities.
- source_word: Ἰόππην
  chosen: Joppa
  alternatives:
  - Jaffa
  lexicon: LSJ
  rationale: A standard transliteration of the Greek place name, preserving the ancient
    form used in English Bible tradition while remaining recognizable.
- source_word: τὴν ἐπὶ τῆς θαλάσσης
  chosen: which is on the sea
  alternatives:
  - by the sea
  - on the coast
  lexicon: LSJ
  rationale: The phrase literally locates Joppa 'on the sea.' 'Which is on the sea'
    stays close to the Greek while remaining readable.
- source_word: Γάζαραν
  chosen: Gazara
  alternatives:
  - Gezer
  lexicon: LSJ
  rationale: The Greek text reads the Hellenized form Gazara. Since the philosophy
    prefers transliterating names from the source text, 'Gazara' is retained rather
    than harmonizing to the Hebrew-associated 'Gezer'.
- source_word: τὴν ἐπὶ τῶν ὁρίων Ἀζώτου
  chosen: which is on the borders of Azotus
  alternatives:
  - which is near the territory of Azotus
  - which is at the frontier of Azotus
  lexicon: LSJ
  rationale: ὅρια refers to boundaries or borderlands. 'Borders of Azotus' is a transparent
    rendering of the Greek geographical description.
- source_word: οἱ πολέμιοι
  chosen: the enemies
  alternatives:
  - the hostile ones
  - the enemy forces
  lexicon: LSJ
  rationale: A straightforward rendering of the substantive adjective meaning hostile
    opponents. The plural is preserved.
- source_word: τὸ πρότερον
  chosen: formerly
  alternatives:
  - previously
  - before
  lexicon: LSJ
  rationale: This adverbial phrase marks prior time. 'Formerly' is concise and idiomatic.
- source_word: κατῴκισεν
  chosen: settled
  alternatives:
  - caused to dwell
  - resettled
  - established
  lexicon: LSJ
  rationale: The causative sense is that he caused Jews to inhabit the place. 'Settled'
    captures this naturally in English without over-paraphrase.
- source_word: Ἰουδαίους
  chosen: Jews
  alternatives:
  - Judeans
  lexicon: LSJ
  rationale: In 1 Maccabees this term can carry ethnic, religious, and political identity.
    'Jews' is the clearest and most natural English rendering here; 'Judeans' is possible
    but less idiomatic in this context of population settlement.
- source_word: ὅσα ἐπιτήδεια
  chosen: whatever was needed
  alternatives:
  - whatever supplies were suitable
  - all necessary provisions
  lexicon: LSJ
  rationale: ἐπιτήδεια can denote necessities, useful things, or provisions. The context
    is broad enough that 'whatever was needed' best captures the unspecified necessities
    without narrowing to food alone.
- source_word: πρὸς τὴν τούτων ἐπανόρθωσιν
  chosen: for their restoration
  alternatives:
  - for their recovery
  - for their reestablishment
  - for its repair
  lexicon: LSJ
  rationale: ἐπανόρθωσις denotes restoration or setting right again. Because τούτων
    is plural, the phrase most naturally refers to the restoration or reestablishment
    of the settled communities/places just mentioned. 'For their restoration' preserves
    that breadth, though the exact referent is somewhat compressed in Greek.
- source_word: ἔθετο ἐν αὐτοῖς
  chosen: placed in them
  alternatives:
  - put there
  - established among them
  lexicon: LSJ
  rationale: The verb is literally 'placed' and the pronoun is plural. 'Placed in
    them' is formally close, though in idiomatic English the sense is effectively
    'put there/in those places.'
