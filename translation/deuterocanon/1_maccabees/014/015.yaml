id: 1MA.14.15
reference: 1 Maccabees 14:15
source:
  edition: lxx-swete-1909
  text: τὰ ἅγια ἐδόξασεν, καὶ ἐπλήθυνεν τὰ σκεύη τῶν ἁγίων.
  language: Greek
  pages:
  - 676
  confidence: high
  validation: agree
translation:
  text: He honored the holy things and increased the vessels of the sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He glorified the sanctuary' or 'He honored the sacred things.' The Greek
      τὰ ἅγια can refer either to holy things or, by extension, to the sanctuary.
    reason: lexical_alternative
  - marker: b
    text: That is, the sacred vessels or implements used in the sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: τὰ ἅγια
  chosen: the holy things
  alternatives:
  - the sanctuary
  - the sacred things
  lexicon: LSJ
  rationale: The neuter plural can denote holy things or the sanctuary/holy place
    by extension. Here the following phrase already mentions vessels associated with
    the holy place, so rendering it as 'the holy things' preserves the broader sense
    without collapsing both clauses into the same idea.
- source_word: ἐδόξασεν
  chosen: honored
  alternatives:
  - glorified
  - magnified
  lexicon: LSJ
  rationale: The verb literally relates to giving glory or honor. In this historical
    context, 'honored' is more idiomatic in English for showing reverence to sacred
    things, while still reflecting the semantic core.
- source_word: ἐπλήθυνεν
  chosen: increased
  alternatives:
  - multiplied
  - made numerous
  lexicon: LSJ
  rationale: The verb means to make more numerous. 'Increased' is natural modern English
    and fits the likely sense of augmenting the temple inventory.
- source_word: τὰ σκεύη
  chosen: the vessels
  alternatives:
  - the utensils
  - the furnishings
  lexicon: LSJ
  rationale: In cultic contexts σκεύη commonly refers to vessels/implements used in
    worship. 'Vessels' is the most standard and suitably formal rendering here.
- source_word: τῶν ἁγίων
  chosen: of the sanctuary
  alternatives:
  - of the holy things
  - of the holy place
  lexicon: LSJ
  rationale: The genitive likely specifies the sacred sphere to which the vessels
    belong. 'Of the sanctuary' gives clear English sense and reflects cultic context
    better than the more opaque 'of the holy things.'
