id: 1MA.14.37
reference: 1 Maccabees 14:37
source:
  edition: lxx-swete-1909
  text: καὶ κατῴκισεν ἐν αὐτῇ ἄνδρας Ἰουδαίους, καὶ ὠχύρωσεν αὐτὴν πρὸς ἀσφάλειαν
    τῆς χώρας καὶ τῆς πόλεως, καὶ ὕψωσεν τὰ τείχη Ἰερουσαλήμ.
  language: Greek
  pages:
  - 678
  confidence: high
  validation: agree
translation:
  text: And he settled Jewish men in it, and fortified it for the security of the
    country and the city, and raised the walls of Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατῴκισεν
  chosen: settled
  alternatives:
  - caused to dwell
  - settled as inhabitants
  - colonized
  lexicon: LSJ
  rationale: The verb means to establish people as residents in a place. 'Settled'
    is natural modern English and preserves the causative sense better than the more
    wooden 'caused to dwell.' 'Colonized' is possible but sounds more interpretive
    and politically loaded than the Greek requires.
- source_word: ἄνδρας Ἰουδαίους
  chosen: Jewish men
  alternatives:
  - Jews
  - Judean men
  - Jewish inhabitants
  lexicon: LSJ
  rationale: ἄνδρας is explicitly masculine plural ('men'), so a gender-accurate rendering
    is required by project philosophy. Ἰουδαίους can mean 'Jewish' or 'Judean'; here
    the ethnic-religious sense fits well, and 'Jewish men' keeps both elements visible.
    'Jews' would omit the explicit ἄνδρας.
- source_word: ὠχύρωσεν
  chosen: fortified
  alternatives:
  - made strong
  - strengthened defensively
  lexicon: LSJ
  rationale: The verb is standard for fortifying a place. 'Fortified' is concise,
    accurate, and idiomatic in military-historical context.
- source_word: πρὸς ἀσφάλειαν
  chosen: for the security
  alternatives:
  - for safety
  - as a safeguard
  lexicon: LSJ
  rationale: The phrase expresses purpose. 'For the security' preserves the formal
    sense and fits the military-administrative context better than the broader 'for
    safety.'
- source_word: τῆς χώρας
  chosen: of the country
  alternatives:
  - of the land
  - of the region
  lexicon: LSJ
  rationale: χώρα can denote territory, countryside, or region. 'Country' works well
    in context as the broader territory contrasted with 'the city.' 'Land' is possible
    but can sound overly biblical or ambiguous in English.
- source_word: τῆς πόλεως
  chosen: the city
  alternatives:
  - the town
  lexicon: LSJ
  rationale: πόλις is straightforwardly 'city' here, likely referring to Jerusalem
    in contrast with the wider χώρα. The article is retained.
- source_word: ὕψωσεν
  chosen: raised
  alternatives:
  - heightened
  - made higher
  - built up
  lexicon: LSJ
  rationale: The verb means to make high or raise. 'Raised' is idiomatic for increasing
    the height of walls and avoids overinterpreting whether this was rebuilding or
    merely heightening.
- source_word: τὰ τείχη Ἰερουσαλήμ
  chosen: the walls of Jerusalem
  alternatives:
  - Jerusalem's walls
  lexicon: LSJ
  rationale: A direct and natural genitival rendering. The plural 'walls' reflects
    the Greek.
