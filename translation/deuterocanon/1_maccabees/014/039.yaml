id: 1MA.14.39
reference: 1 Maccabees 14:39
source:
  edition: lxx-swete-1909
  text: καὶ ἐποίησεν αὐτὸν τῶν φίλων αὐτοῦ, καὶ ἐδόξασεν αὐτὸν δόξῃ μεγάλῃ.
  language: Greek
  pages:
  - 678
  confidence: high
  validation: agree
translation:
  text: and he made him one of his Friends, and he honored him with great honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of his friends.' The Greek may refer either to personal friendship
      or, more likely here, to the recognized court rank of the king's 'Friends.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐποίησεν
  chosen: made
  alternatives:
  - appointed
  - constituted
  lexicon: LSJ
  rationale: ποιέω with a double-object/complement construction here means to make
    or appoint someone as something. 'Made' preserves the Greek wording closely while
    remaining natural in English.
- source_word: τῶν φίλων αὐτοῦ
  chosen: one of his Friends
  alternatives:
  - one of his friends
  - among his friends
  lexicon: LSJ
  rationale: 'The genitive plural after ἐποίησεν indicates incorporation into a class:
    ''made him one of his friends.'' In Hellenistic court language, ''Friends'' can
    function as an official rank or court title, so capitalization preserves the likely
    institutional sense without overtranslating.'
- source_word: ἐδόξασεν
  chosen: honored
  alternatives:
  - glorified
  - bestowed honor on
  lexicon: LSJ
  rationale: Although δοξάζω often means 'glorify,' in this royal-political context
    it refers to conferring honor or distinction. 'Honored' communicates the sense
    clearly in modern English without importing later theological resonance.
- source_word: δόξῃ μεγάλῃ
  chosen: with great honor
  alternatives:
  - with great glory
  - with high distinction
  lexicon: LSJ
  rationale: The instrumental dative expresses the manner or means of the honoring.
    'Great honor' matches the political-social sense of δόξα in context better than
    the more theologically loaded 'glory.'
