theological_decisions:
- issue: Whether φίλοι should be rendered as a simple relational term or as a court
    title
  chosen_reading: Rendered as 'Friends' with capitalization to preserve probable titular
    force
  alternative_readings:
  - friends
  - among his companions
  rationale: In 1 Maccabees and wider Hellenistic royal usage, 'Friends' often denotes
    an official circle of royal associates, not merely personal affection. Capitalization
    signals this likely status function while staying close to the Greek wording.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
