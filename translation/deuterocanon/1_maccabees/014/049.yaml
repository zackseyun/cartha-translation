id: 1MA.14.49
reference: 1 Maccabees 14:49
source:
  edition: lxx-swete-1909
  text: τὰ δὲ ἀντίγραφα αὐτῶν θέσθαι ἐν τῷ γαζοφυλακίῳ, ὅπως ἔχῃ Σίμων καὶ οἱ υἱοὶ
    αὐτοῦ.
  language: Greek
  pages:
  - 679
  confidence: high
  validation: agree
translation:
  text: And the copies of them were to be placed in the treasury, so that Simon and
    his sons might have them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'duplicates' or 'transcripts' for 'copies.' The Greek refers to documentary
      reproductions.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντίγραφα
  chosen: copies
  alternatives:
  - duplicates
  - transcripts
  lexicon: LSJ
  rationale: ἀντίγραφα denotes copied documents or duplicates. 'Copies' is the most
    natural modern English rendering and fits the documentary context without over-specifying
    the form.
- source_word: θέσθαι
  chosen: were to be placed
  alternatives:
  - to place
  - to deposit
  - to set
  lexicon: LSJ
  rationale: The infinitive expresses the content of what was decreed or arranged
    in the preceding context. 'Were to be placed' brings that directive force into
    idiomatic English better than a bare infinitive.
- source_word: γαζοφυλάκιον
  chosen: treasury
  alternatives:
  - treasure chamber
  - storehouse
  lexicon: LSJ
  rationale: γαζοφυλάκιον commonly refers to a treasury or treasury chamber. 'Treasury'
    is concise and idiomatic, and suits the archival-storage setting here.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - so that thereby
  lexicon: LSJ
  rationale: ὅπως introduces purpose. 'So that' is clear modern English and preserves
    the purposive sense.
- source_word: ἔχῃ
  chosen: might have them
  alternatives:
  - may have them
  - might possess them
  lexicon: LSJ
  rationale: The singular subjunctive with compound subject headed by Simon is naturally
    rendered in English as 'might have them.' Supplying 'them' makes explicit the
    object implied from 'the copies.'
