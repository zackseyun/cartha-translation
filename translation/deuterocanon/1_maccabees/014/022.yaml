id: 1MA.14.22
reference: 1 Maccabees 14:22
source:
  edition: lxx-swete-1909
  text: καὶ ἀναγραψάμενοι τὰ ὑπ' αὐτῶν εἰρημένα ἐν ταῖς βουλαῖς τοῦ δήμου οὕτως Νουμήνιος
    Ἀντιόχου καὶ Ἀντίπατρος Ἰάσονος πρεσβευταὶ Α Ἰουδαίων ἦλθοσαν πρὸς ἡμᾶς ἀνανεούμενοι
    τὴν πρὸς ἡμᾶς φιλίαν
  language: Greek
  pages:
  - 676
  confidence: high
  validation: agree
translation:
  text: 'And after recording in the public records what had been said by them, thus:
    “Numenius son of Antiochus and Antipater son of Jason, ambassadors of the Jews,
    came to us renewing their friendship with us.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text as transmitted here includes an isolated alpha before 'Jews'
      (Α Ἰουδαίων), likely a scribal or editorial artifact rather than a meaningful
      word; the translation follows the clear sense, 'ambassadors of the Jews.'
    reason: textual_variant
  - marker: b
    text: Or 'in the resolutions/councils of the people.' The Greek expression likely
      refers to official civic documentation rather than merely oral deliberation.
    reason: lexical_alternative
  - marker: c
    text: '''Friendship'' here carries diplomatic force and may imply formal friendly
      relations or alliance.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀναγραψάμενοι
  chosen: after recording
  alternatives:
  - having recorded
  - after entering in writing
  lexicon: LSJ
  rationale: The participle denotes committing something to writing or registering
    it. 'After recording' is natural English while preserving the sequential participial
    force.
- source_word: τὰ ὑπ᾽ αὐτῶν εἰρημένα
  chosen: what had been said by them
  alternatives:
  - the things spoken by them
  - what they had said
  lexicon: LSJ
  rationale: This phrase refers to the content previously spoken by the envoys. The
    passive perfect-participial sense is preserved without awkwardness.
- source_word: ἐν ταῖς βουλαῖς τοῦ δήμου
  chosen: in the public records
  alternatives:
  - in the councils of the people
  - in the resolutions of the assembly
  - in the deliberations of the populace
  lexicon: LSJ
  rationale: Literally the phrase combines 'councils/resolutions' with 'of the people.'
    In this documentary context, it refers to official civic records or decrees of
    the public body, not merely private deliberation. 'Public records' best conveys
    the administrative sense in idiomatic English.
- source_word: οὕτως
  chosen: thus
  alternatives:
  - as follows
  - in this way
  lexicon: LSJ
  rationale: Introduces the wording of the recorded notice. 'Thus' is concise and
    suitably formal.
- source_word: πρεσβευταὶ
  chosen: ambassadors
  alternatives:
  - envoys
  - delegates
  lexicon: LSJ
  rationale: The term denotes official representatives sent on diplomatic business.
    'Ambassadors' fits the interstate diplomatic setting of 1 Maccabees.
- source_word: Α Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - from the Jews
  lexicon: LSJ
  rationale: The transmitted text appears to include a stray character before Ἰουδαίων;
    the meaningful phrase is 'ambassadors of the Jews.' The sense is representation
    on behalf of the Jewish people.
- source_word: ἀνανεούμενοι
  chosen: renewing
  alternatives:
  - reaffirming
  - restoring
  lexicon: LSJ
  rationale: The middle participle conveys making new again, here in the sense of
    renewing an existing diplomatic relationship.
- source_word: τὴν πρὸς ἡμᾶς φιλίαν
  chosen: their friendship with us
  alternatives:
  - friendship toward us
  - alliance with us
  lexicon: LSJ
  rationale: φιλία in Hellenistic diplomatic contexts can denote friendly relations
    or alliance. 'Friendship with us' preserves the lexical sense while fitting the
    political context; 'alliance' would be somewhat more interpretive.
