theological_decisions:
- issue: Rendering ἔθνος in a Jewish national context
  chosen_reading: nation
  alternative_readings:
  - people
  rationale: In 1 Maccabees this term often carries corporate-national force, especially
    in political and commemorative contexts. 'Nation' preserves that dimension without
    importing later nationalism.
  doctrine_reference: Translation philosophy §5 consistency of key terms, or documented
    exception.
- issue: Rendering τὰ ἅγια αὐτῶν
  chosen_reading: their sanctuary
  alternative_readings:
  - their holy place
  - their holy things
  rationale: The plural form can denote sacred precincts or holy things, but the context
    of defending cult and law favors the temple sanctuary as the institutional referent.
    This is a contextual, not doctrinal, decision.
  doctrine_reference: Translation philosophy §1 original-language primacy over translation
    tradition.
