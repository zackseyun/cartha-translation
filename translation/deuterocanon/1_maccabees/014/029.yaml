id: 1MA.14.29
reference: 1 Maccabees 14:29
source:
  edition: lxx-swete-1909
  text: ἐπεὶ πολλάκις ἐγενήθησαν πό- λεμοι ἐν τῇ χώρᾳ, Σίμων δὲ ὁ υἱὸς Ματταθίου ὁ
    υἱὸς τῶν υἱῶν Ἰωαρὶβ καὶ οἱ ἀδελφοὶ αὐτοῦ ἔδωκαν ἑαυτοὺς τῷ κινδύνῳ, καὶ ἀντέστησαν
    τοῖς ὑπεναντίοις τοῦ ἔθνους αὐτῶν, ὅπως σταθῇ τὰ ἅγια αὐτῶν καὶ ὁ νόμος, καὶ δόξῃ
    μεγάλῃ ἐδόξασαν τὸ ἔθνος αὐτῶν.
  language: Greek
  pages:
  - 677
  confidence: high
  validation: agree
translation:
  text: Since wars had often arisen in the land, Simon son of Mattathias, son of the
    sons of Joarib, and his brothers gave themselves to danger and stood against the
    adversaries of their nation, so that their sanctuary and the law might stand,
    and they glorified their nation with great glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'risked themselves' for 'gave themselves to danger.' The Greek idiom
      emphasizes voluntary self-exposure to peril.
    reason: lexical_alternative
  - marker: b
    text: Or 'their holy place' / 'their holy things' for 'their sanctuary.' The Greek
      uses a plural form that can refer collectively to sacred things or the sanctuary
      precincts.
    reason: lexical_alternative
  - marker: c
    text: Or 'they brought great honor to their nation.' The Greek says literally,
      'they glorified their nation with great glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  chosen: Since
  alternatives:
  - because
  - for
  lexicon: LSJ
  rationale: Introduces the grounds for the honor being described; 'Since' gives a
    natural causal opening in English.
- source_word: πολλάκις
  chosen: often
  alternatives:
  - many times
  - frequently
  lexicon: LSJ
  rationale: Straightforward adverb of repeated occurrence; 'often' is idiomatic and
    concise.
- source_word: ἐγενήθησαν πόλεμοι
  chosen: wars had often arisen
  alternatives:
  - there had often been wars
  - wars had often occurred
  lexicon: LSJ
  rationale: The aorist passive/middle of γίνομαι with πόλεμοι indicates wars coming
    about; 'arisen' preserves the sense of outbreak without over-literal awkwardness.
- source_word: ἐν τῇ χώρᾳ
  chosen: in the land
  alternatives:
  - in the country
  - in the region
  lexicon: LSJ
  rationale: χώρα here refers to the territory/land of the people rather than merely
    a political 'country'; 'land' fits biblical register and context.
- source_word: ἔδωκαν ἑαυτοὺς τῷ κινδύνῳ
  chosen: gave themselves to danger
  alternatives:
  - risked themselves
  - exposed themselves to danger
  lexicon: LSJ
  rationale: The idiom literally means handing themselves over to danger. 'Gave themselves
    to danger' preserves the vivid self-sacrificial expression better than the flatter
    'risked themselves.'
- source_word: ἀντέστησαν
  chosen: stood against
  alternatives:
  - resisted
  - opposed
  lexicon: LSJ
  rationale: The verb conveys active resistance. 'Stood against' preserves the concrete,
    martial force while remaining natural English.
- source_word: τοῖς ὑπεναντίοις
  chosen: the adversaries
  alternatives:
  - the opponents
  - those set against them
  - the enemies
  lexicon: LSJ
  rationale: The term denotes those hostile or opposed. 'Adversaries' is suitably
    formal and does not overstate beyond the Greek.
- source_word: τοῦ ἔθνους αὐτῶν
  chosen: of their nation
  alternatives:
  - of their people
  lexicon: LSJ
  rationale: ἔθνος in 1 Maccabees often refers to the Jewish nation/people corporately.
    'Nation' preserves the political-communal sense in this public inscriptional context.
- source_word: ὅπως σταθῇ
  chosen: so that ... might stand
  alternatives:
  - so that ... might be established
  - so that ... might endure
  lexicon: LSJ
  rationale: From ἵστημι in passive/intransitive sense, the phrase points to being
    maintained or standing firm. 'Might stand' keeps the verbal imagery and allows
    the object pair to remain unified.
- source_word: τὰ ἅγια αὐτῶν
  chosen: their sanctuary
  alternatives:
  - their holy place
  - their holy things
  lexicon: LSJ
  rationale: Although literally plural ('holy things/places'), in this context it
    refers to the sanctuary/temple precinct as a collective sacred institution. Singular
    'sanctuary' is the clearest contextual rendering.
- source_word: ὁ νόμος
  chosen: the law
  alternatives:
  - the Law
  lexicon: LSJ
  rationale: Refers to the Jewish law/Torah. Lowercase 'law' is readable English;
    capitalization is an interpretive convention not required by the Greek.
- source_word: δόξῃ μεγάλῃ ἐδόξασαν
  chosen: they glorified ... with great glory
  alternatives:
  - they brought great honor to
  - they honored greatly
  lexicon: LSJ
  rationale: The cognate construction is emphatic. Retaining 'glorified' and 'glory'
    preserves the rhetorical force of the Greek better than smoothing it away, even
    if slightly weighty in English.
