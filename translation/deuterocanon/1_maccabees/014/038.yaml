id: 1MA.14.38
reference: 1 Maccabees 14:38
source:
  edition: lxx-swete-1909
  text: καὶ ὁ βασιλεὺς Δημήτριος ἔστησεν αὐτῷ τὴν ἀρχιερωσύνην κατὰ ταῦτα,
  language: Greek
  pages:
  - 678
  confidence: high
  validation: agree
translation:
  text: And King Demetrius confirmed the high priesthood to him accordingly,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔστησεν
  chosen: confirmed
  alternatives:
  - established
  - appointed
  - set
  lexicon: LSJ
  rationale: In context with αὐτῷ τὴν ἀρχιερωσύνην, the verb means to set or establish
    someone in an office. 'Confirmed' fits the political-administrative sense in English
    and avoids implying first creation of the office itself; Demetrius is ratifying
    Simon's position.
- source_word: ἀρχιερωσύνην
  chosen: the high priesthood
  alternatives:
  - high-priestly office
  - high priest's office
  lexicon: LSJ
  rationale: The noun denotes the office or dignity of high priest, not merely priestly
    activity. 'The high priesthood' is the most natural and sufficiently formal rendering.
- source_word: κατὰ ταῦτα
  chosen: accordingly
  alternatives:
  - according to these things
  - in accordance with this
  - on these terms
  lexicon: LSJ
  rationale: The phrase is idiomatic and refers back to the preceding terms or circumstances.
    'Accordingly' gives clear English while preserving the backward-looking force
    without wooden literalism.
- source_word: βασιλεὺς Δημήτριος
  chosen: King Demetrius
  alternatives:
  - Demetrius the king
  lexicon: LSJ
  rationale: Standard English title-plus-name order is clear and natural while preserving
    the royal title.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - for him
  lexicon: LSJ
  rationale: The dative marks the person to whom the office is confirmed. 'To him'
    is the straightforward rendering.
