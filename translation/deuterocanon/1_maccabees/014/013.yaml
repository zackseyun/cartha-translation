id: 1MA.14.13
reference: 1 Maccabees 14:13
source:
  edition: lxx-swete-1909
  text: καὶ ἐξέλιπεν πολεμῶν αὐτοὺς ἐπὶ τῆς γῆς, καὶ οἱ βασιλεῖς αὐτῶν συνετρίβησαν
    ἐν ταῖς ἡμέραις ἐκείναις.
  language: Greek
  pages:
  - 676
  confidence: high
  validation: minor_mismatch
translation:
  text: And he ceased fighting against them in the land, and their kings were crushed
    in those days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stopped making war against them in the land.' The Greek participial
      construction can be rendered more explicitly with 'making war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέλιπεν
  chosen: ceased
  alternatives:
  - failed
  - came to an end
  - disappeared
  lexicon: LSJ
  rationale: The verb commonly means to leave off or cease. In context with the participle
    πολεμῶν, it idiomatically means 'ceased' or 'stopped' fighting, not physical disappearance.
- source_word: πολεμῶν
  chosen: fighting
  alternatives:
  - making war
  - warring
  lexicon: BDAG
  rationale: Present participle of πολεμέω, expressing the activity that ceased. 'Fighting'
    is natural modern English while preserving the military sense.
- source_word: αὐτούς
  chosen: them
  lexicon: N/A
  rationale: Straightforward object pronoun referring back to the hostile parties
    in context.
- source_word: ἐπὶ τῆς γῆς
  chosen: in the land
  alternatives:
  - upon the land
  - on the earth
  lexicon: LSJ
  rationale: γῆ can mean earth, land, or territory. In 1 Maccabees' historical-political
    setting, 'the land' best fits the territorial sense rather than the whole earth.
- source_word: οἱ βασιλεῖς αὐτῶν
  chosen: their kings
  alternatives:
  - the kings over them
  - its kings
  lexicon: LSJ
  rationale: The genitive pronoun is most naturally rendered 'their,' referring to
    the rulers associated with the enemies just mentioned.
- source_word: συνετρίβησαν
  chosen: were crushed
  alternatives:
  - were shattered
  - were broken
  lexicon: LSJ
  rationale: The passive of συντρίβω conveys decisive defeat or breaking. 'Were crushed'
    communicates military overthrow vividly and naturally.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  chosen: in those days
  alternatives:
  - during those days
  - at that time
  lexicon: LSJ
  rationale: A common temporal expression. 'In those days' is idiomatic and sufficiently
    formal.
