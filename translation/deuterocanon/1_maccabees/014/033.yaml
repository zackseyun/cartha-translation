theological_decisions:
- issue: Rendering of Ἰουδαίας / Ἰουδαίους
  chosen_reading: Judea / Jewish men
  alternative_readings:
  - Judea / Judean men
  rationale: The place name Ἰουδαία is naturally 'Judea.' For the adjective/noun Ἰουδαίους,
    either ethnic-religious 'Jewish' or geo-political 'Judean' is possible in this
    period. Because the verse contrasts local defenders with prior enemy occupation
    and does not narrowly stress provincial identity alone, 'Jewish men' was chosen,
    while preserving 'Judean men' as a lexical alternative.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception) and §4 (gender-accurate over gender-neutral)
