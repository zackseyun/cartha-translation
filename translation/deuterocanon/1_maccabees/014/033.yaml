id: 1MA.14.33
reference: 1 Maccabees 14:33
source:
  edition: lxx-swete-1909
  text: καὶ ὠχύρωσεν τὰς πόλεις τῆς Ἰουδαίας καὶ τὴν Βαιθσουρὰμ τὴν ἐπὶ τῶν ὁρίων
    τῆς Ἰουδαίας, οὗ ἦν τὰ ὅπλα τῶν πολεμίων τὸ πρότερον, καὶ ἔθετο ἐκεῖ φρουρὰν ἄνδρας
    Ἰουδαίους.
  language: Greek
  pages:
  - 678
  confidence: high
  validation: agree
translation:
  text: And he fortified the cities of Judea, and Bethsura on the borders of Judea,
    where formerly the weapons of the enemies had been, and he stationed there a garrison
    of Jewish men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judean men.' The Greek Ἰουδαίους can denote either ethnic-religious
      identity ('Jewish') or regional identity ('Judean') in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠχύρωσεν
  chosen: fortified
  alternatives:
  - strengthened
  - made secure
  lexicon: LSJ
  rationale: The verb denotes making places strong by defensive works or military
    preparation. 'Fortified' is the most natural military-political rendering in English
    for cities and a border stronghold.
- source_word: πόλεις
  chosen: cities
  alternatives:
  - towns
  lexicon: LSJ
  rationale: The ordinary sense is 'cities' or 'towns'; 'cities' better matches the
    administrative and military context of fortified urban centers.
- source_word: Βαιθσουρὰμ
  chosen: Bethsura
  alternatives:
  - Beth-zur
  rationale: Personal and place names are transliterated by standard conventions.
    'Bethsura' closely reflects the Greek form in the source text.
- source_word: ἐπὶ τῶν ὁρίων
  chosen: on the borders
  alternatives:
  - at the borders
  - on the frontier
  lexicon: LSJ
  rationale: The phrase indicates location at the boundary region of Judea. 'On the
    borders' is a clear, natural rendering that preserves the plural noun.
- source_word: ὅπλα
  chosen: weapons
  alternatives:
  - arms
  - armaments
  lexicon: LSJ
  rationale: The term commonly means weapons or arms. 'Weapons' is accessible modern
    English and fits the statement that enemy military equipment had previously been
    there.
- source_word: πολεμίων
  chosen: enemies
  alternatives:
  - hostile forces
  - foes
  lexicon: LSJ
  rationale: The genitive identifies those to whom the weapons belonged. 'Enemies'
    is the straightforward contextual rendering.
- source_word: τὸ πρότερον
  chosen: formerly
  alternatives:
  - previously
  - before
  lexicon: LSJ
  rationale: This adverbial phrase marks an earlier state of affairs. 'Formerly' is
    concise and idiomatic in narrative English.
- source_word: ἔθετο
  chosen: stationed
  alternatives:
  - placed
  - set
  lexicon: LSJ
  rationale: In military context with φρουράν, the sense is not merely 'put' but 'stationed'
    or 'posted'.
- source_word: φρουρὰν
  chosen: a garrison
  alternatives:
  - a guard
  - a military guard
  lexicon: LSJ
  rationale: The noun in this context refers to a military guard force assigned to
    hold a place. 'Garrison' best captures the institutional military sense.
- source_word: ἄνδρας Ἰουδαίους
  chosen: Jewish men
  alternatives:
  - Judean men
  - Jewish soldiers
  lexicon: LSJ
  rationale: ἄνδρας is explicitly masculine and should be preserved per gender-accurate
    policy. Ἰουδαίους can be rendered 'Jewish' or 'Judean'; here 'Jewish men' is chosen
    as the broader ethnic-political sense is likely, while 'Judean men' remains a
    viable alternative. 'Soldiers' is interpretive and not stated directly, though
    implied by garrison context.
