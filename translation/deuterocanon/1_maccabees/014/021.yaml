id: 1MA.14.21
reference: 1 Maccabees 14:21
source:
  edition: lxx-swete-1909
  text: οἱ πρεσβεῖαι οἱ ἀποσταλέντες πρὸς τὸν δῆμον ἡμῶν ἀπήγγειλαν ἡμῖν περὶ τῆς
    δόξης ὑμῶν καὶ τιμῆς, καὶ ηὐφράνθημεν ἐπὶ τῇ ἐφόδῳ αὐτῶν.
  language: Greek
  pages:
  - 676
  confidence: high
  validation: agree
translation:
  text: The envoys who had been sent to our people reported to us about your glory
    and honor, and we rejoiced at their arrival.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The embassy/delegation that had been sent to our people reported to
      us …' The Greek οἱ πρεσβεῖαι can be understood either for the mission itself
      or for the envoys as persons; the latter is reflected in the main text because
      the verse continues with 'their arrival.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πρεσβεῖαι
  chosen: the envoys
  alternatives:
  - the embassies
  - the delegations
  - the ambassadors
  lexicon: LSJ
  rationale: Although the form is formally plural and can denote embassies or diplomatic
    missions, in English the personal sense fits the participle 'having been sent'
    and the later reference to 'their arrival.' 'Envoys' is natural modern English
    that preserves the diplomatic setting without awkwardness.
- source_word: οἱ ἀποσταλέντες
  chosen: who had been sent
  alternatives:
  - having been sent
  - who were sent
  lexicon: LSJ
  rationale: A participial modifier of the envoys/delegation. 'Who had been sent'
    gives smooth English and reflects prior action relative to the reporting.
- source_word: πρὸς τὸν δῆμον ἡμῶν
  chosen: to our people
  alternatives:
  - to our nation
  - to our populace
  - to our assembly
  lexicon: LSJ
  rationale: δῆμος here refers to the civic body or people as a political community.
    'Our people' is idiomatic and broad enough to cover the national-civic sense without
    sounding overly technical.
- source_word: ἀπήγγειλαν ἡμῖν
  chosen: reported to us
  alternatives:
  - announced to us
  - brought us word
  - told us
  lexicon: LSJ
  rationale: The verb conveys formal reporting. 'Reported to us' preserves the diplomatic
    tone better than the more casual 'told us.'
- source_word: περὶ τῆς δόξης ὑμῶν καὶ τιμῆς
  chosen: about your glory and honor
  alternatives:
  - concerning your splendor and honor
  - about your renown and honor
  - about your glory and esteem
  lexicon: LSJ
  rationale: δόξα and τιμή are paired terms of public esteem and distinction. 'Glory
    and honor' is the most direct rendering and suits the elevated diplomatic register.
- source_word: ηὐφράνθημεν
  chosen: we rejoiced
  alternatives:
  - we were glad
  - we were delighted
  lexicon: LSJ
  rationale: The verb denotes gladness or rejoicing. 'We rejoiced' preserves the formal
    tone and the strength of the response.
- source_word: ἐπὶ τῇ ἐφόδῳ αὐτῶν
  chosen: at their arrival
  alternatives:
  - at their coming
  - because of their visit
  - at their return
  lexicon: LSJ
  rationale: ἐφοδος can denote an approach, arrival, or visit. In this context, after
    the envoys returned and reported, the phrase most naturally refers to their arrival
    back with the report. 'At their arrival' is concise and idiomatic.
