theological_decisions:
- issue: Rendering πίστις in a commendation of Simon's character and conduct
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: The immediate context could support 'faithfulness' as a characterization
    of Simon's reliability toward the nation. However, DOCTRINE.md sets 'faith' as
    the default rendering for πίστις, with alternatives preserved where contested.
    Because this is not a doctrinally charged NT debate but still a meaningful lexical
    ambiguity, the main text keeps 'faith' and a footnote preserves 'faithfulness.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις default ''faith''; preserve
    alternatives in footnotes where contested'
- issue: Rendering δικαιοσύνη in a political-historical context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: In this context the term may point to upright governance or just dealing,
    so 'justice' is a viable alternative. The project default is 'righteousness,'
    and the alternative is preserved in a footnote rather than resolved away.
  doctrine_reference: 'DOCTRINE.md: Contested terms — δικαιοσύνη default ''righteousness'';
    alternatives preserved in footnotes where appropriate'
