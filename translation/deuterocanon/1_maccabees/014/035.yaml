id: 1MA.14.35
reference: 1 Maccabees 14:35
source:
  edition: lxx-swete-1909
  text: καὶ εἶδεν ὁ λαὸς τὴν πίστιν τοῦ Σίμωνος καὶ τὴν δόξαν ἣν ἐβουλεύσατο ποιῆσαι
    τῷ ἔθνει αὐτοῦ, καὶ ἔθεντο αὐτὸν ἡγούμενον αὐτῶν καὶ ἀρχιερέα, διὰ τὸ πεποιηκέναι
    αὐτὸν ταῦτα πάντα, καὶ τὴν δικαιοσύνην καὶ τὴν πίστιν ἣν συνετήρησεν τῷ ἔθνει
    αὐτοῦ, καὶ ἐζήτησεν παντὶ τρόπῳ ὑψῶσαι τὸν λαὸν αὐτοῦ.
  language: Greek
  pages:
  - 678
  confidence: high
  validation: agree
translation:
  text: And the people saw the faith of Simon and the glory that he had purposed to
    bring about for his nation, and they appointed him as their leader and high priest,
    because he had done all these things, and because of the righteousness and the
    faith that he had maintained for his nation, and because he had sought in every
    way to exalt his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness' in both occurrences of 'faith'; the Greek πίστις can denote
      reliability or fidelity as well as faith.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness'; the Greek δικαιοσύνη can carry a civic
      or ethical sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: The project default for πίστις is 'faith.' In this historical-political
    context, 'faithfulness' is also plausible, especially as a commendation of Simon's
    reliability. I retain 'faith' in the main text for consistency with project policy,
    while the surrounding clauses make clear that his proven conduct is in view.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - honor
  - renown
  lexicon: LSJ
  rationale: δόξα can denote honor, splendor, or renown. 'Glory' preserves the Greek
    term's breadth and leaves open whether the sense is the honor Simon intended for
    the nation or the elevated status resulting from his policy.
- source_word: ἐβουλεύσατο ποιῆσαι
  chosen: had purposed to bring about
  alternatives:
  - planned to do
  - resolved to accomplish
  lexicon: LSJ
  rationale: The middle of βουλεύομαι conveys deliberate resolve or planning. 'Had
    purposed to bring about' captures both intention and execution-oriented purpose
    without sounding wooden.
- source_word: ἔθνει
  chosen: nation
  alternatives:
  - people
  lexicon: LSJ
  rationale: Here ἔθνος refers to Simon's own national community, not Gentiles in
    contrast to Jews. 'Nation' best fits the political-corporate sense in this Maccabean
    context.
- source_word: ἔθεντο
  chosen: appointed
  alternatives:
  - made
  - set
  lexicon: LSJ
  rationale: The verb here describes formal installation into office. 'Appointed'
    communicates that institutional sense more clearly than the more literal but less
    idiomatic 'set'.
- source_word: ἡγούμενον
  chosen: leader
  alternatives:
  - governor
  - ruler
  lexicon: LSJ
  rationale: ἡγούμενος is a broad term for one who leads or governs. 'Leader' is suitably
    general and readable, avoiding over-specification beyond the Greek.
- source_word: ἀρχιερέα
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: LSJ
  rationale: Standard rendering for ἀρχιερεύς in Jewish cultic context.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Although 'justice' is possible in a public-political setting, the project
    default is 'righteousness.' Here it can encompass upright conduct toward the nation;
    the alternative is preserved in a footnote because the civic nuance is real.
- source_word: συνετήρησεν
  chosen: had maintained
  alternatives:
  - had preserved
  - had kept
  lexicon: LSJ
  rationale: The compound verb suggests continued preservation or maintenance. 'Had
    maintained' fits the ongoing support Simon provided to the nation in relation
    to righteousness and faith.
- source_word: ἐζήτησεν παντὶ τρόπῳ
  chosen: had sought in every way
  alternatives:
  - had endeavored by every means
  - had tried in every way
  lexicon: LSJ
  rationale: This phrase expresses comprehensive effort. 'Had sought in every way'
    is natural English and preserves the breadth of παντὶ τρόπῳ.
- source_word: ὑψῶσαι
  chosen: to exalt
  alternatives:
  - to raise up
  - to elevate
  lexicon: LSJ
  rationale: ὑψόω here refers to raising the status or standing of the people. 'Exalt'
    preserves the elevated register and public-honor sense.
- source_word: λαὸν
  chosen: people
  alternatives:
  - nation
  lexicon: LSJ
  rationale: λαός commonly denotes the people as a collective body. Rendering it 'people'
    distinguishes it from ἔθνος earlier in the verse, where the national-political
    nuance is stronger.
