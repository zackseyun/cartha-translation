id: 1MA.14.24
reference: 1 Maccabees 14:24
source:
  edition: lxx-swete-1909
  text: Μετὰ ταῦτα ἀπέστειλεν Σίμων τὸν Νουμήνιον εἰς Ῥώμην ἔχοντα ἀσπίδα χρυσῆν μεγάλην
    ὁλκὴν μνῶν χιλίων, εἰς τὸ στῆσαι πρὸς αὐτοὺς τὴν συμμαχίαν.
  language: Greek
  pages:
  - 677
  confidence: high
  validation: agree
translation:
  text: After these things Simon sent Numenius to Rome, carrying a large gold shield
    weighing a thousand minas, to establish the alliance with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A mina was an ancient unit of weight; the phrase indicates an exceptionally
      heavy and valuable diplomatic gift.
    reason: cultural_note
lexical_decisions:
- source_word: Μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: LSJ
  rationale: A standard temporal transition. 'After these things' preserves the plural
    demonstrative and the narrative linkage without sounding overly wooden.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: The aorist verb straightforwardly means 'sent.' 'Dispatched' is possible
    but less natural in modern English and adds unnecessary formality.
- source_word: Νουμήνιον
  chosen: Numenius
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: εἰς Ῥώμην
  chosen: to Rome
  alternatives:
  - into Rome
  lexicon: LSJ
  rationale: Directional εἰς with a city is naturally rendered 'to Rome' in English.
- source_word: ἔχοντα
  chosen: carrying
  alternatives:
  - having
  - bearing
  lexicon: LSJ
  rationale: The participle modifies Numenius and indicates what he took with him.
    'Carrying' is idiomatic and fits the context of an envoy bringing a diplomatic
    gift.
- source_word: ἀσπίδα χρυσῆν μεγάλην
  chosen: a large gold shield
  alternatives:
  - a great golden shield
  - a large golden buckler
  lexicon: LSJ
  rationale: ἀσπίς is a shield; 'gold shield' is clear modern English. 'Golden' is
    also possible, but 'gold' better suggests material composition here. μεγάλην is
    rendered 'large' rather than 'great' to describe physical size.
- source_word: ὁλκὴν μνῶν χιλίων
  chosen: weighing a thousand minas
  alternatives:
  - of the weight of a thousand minas
  - weighing one thousand minas
  lexicon: LSJ
  rationale: ὁλκή denotes weight or burden. The phrase specifies the shield's weight.
    'Weighing a thousand minas' is concise and accurate.
- source_word: εἰς τὸ στῆσαι
  chosen: to establish
  alternatives:
  - to confirm
  - to set up
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose. In diplomatic context, στῆσαι
    with συμμαχίαν means to set or establish an alliance, likely in the sense of confirming
    it formally.
- source_word: πρὸς αὐτοὺς
  chosen: with them
  alternatives:
  - toward them
  lexicon: LSJ
  rationale: With συμμαχίαν, πρὸς plus pronoun is best rendered relationally as 'with
    them,' referring to the Romans.
- source_word: τὴν συμμαχίαν
  chosen: the alliance
  alternatives:
  - the treaty
  - the friendship alliance
  lexicon: LSJ
  rationale: συμμαχία denotes an alliance, especially political or military. 'Alliance'
    is the most direct and contextually appropriate rendering.
