id: 1MA.14.46
reference: 1 Maccabees 14:46
source:
  edition: lxx-swete-1909
  text: καὶ εὐδόκησεν πᾶς ὁ λαὸς θέσθαι Σίμωνι ποιῆσαι κατὰ τοὺς λόγους τούτους.
  language: Greek
  pages:
  - 679
  confidence: high
  validation: agree
translation:
  text: And all the people approved that Simon should act according to these words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in accordance with these terms.' The Greek says 'according to these
      words,' likely referring to the preceding stated provisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐδόκησεν
  chosen: approved
  alternatives:
  - was pleased
  - thought it good
  - consented
  lexicon: LSJ
  rationale: The aorist verb here expresses collective approval or favorable decision
    by the people. 'Approved' fits the public, formal sense in context better than
    the more emotive 'was pleased.'
- source_word: πᾶς ὁ λαός
  chosen: all the people
  alternatives:
  - the whole people
  - all the nation
  lexicon: LSJ
  rationale: A straightforward rendering preserving both πᾶς and ὁ λαός. 'People'
    is the most natural English equivalent here without over-interpreting as 'nation.'
- source_word: θέσθαι
  chosen: that Simon should
  alternatives:
  - to appoint Simon to
  - to establish for Simon to
  lexicon: LSJ
  rationale: The infinitive is somewhat compressed in Greek and introduces what the
    people resolved regarding Simon. In idiomatic English, 'approved that Simon should'
    best captures the construction without forcing an overly wooden rendering.
- source_word: ποιῆσαι
  chosen: act
  alternatives:
  - do
  - carry out
  - perform
  lexicon: LSJ
  rationale: ποιέω is broad, but in this political-administrative context 'act' conveys
    practical implementation of the stated terms. 'Do' is too vague in English.
- source_word: κατὰ τοὺς λόγους τούτους
  chosen: according to these words
  alternatives:
  - according to these matters
  - in accordance with these terms
  lexicon: LSJ
  rationale: A relatively formal rendering preserves the wording of the Greek. 'These
    words' likely refers to the preceding written provisions or declarations; a more
    interpretive 'these terms' is possible but not necessary in the main text.
