translation:
  text: and they were read before the assembly in Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνεγνώσθησαν
  chosen: were read
  alternatives:
  - were publicly read
  - were recited
  lexicon: LSJ
  rationale: Aorist passive of ἀναγινώσκω, here referring to documents being read
    aloud. 'Were read' is the most direct and natural English rendering; 'publicly'
    is implied by the setting but not explicit in the verb itself.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: LSJ
  rationale: The preposition denotes presence before a group. 'Before' is idiomatic
    and sufficiently formal without over-literalizing.
- source_word: ἐκκλησίας
  chosen: assembly
  alternatives:
  - congregation
  - gathering
  lexicon: LSJ
  rationale: In this Second Temple civic-religious context, ἐκκλησία refers to the
    assembled body in Jerusalem, not specifically a later Christian 'church.' 'Assembly'
    preserves the public/corporate sense without anachronism.
- source_word: ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  lexicon: LSJ
  rationale: Standard locative phrase; straightforwardly rendered.
