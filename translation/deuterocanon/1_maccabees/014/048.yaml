id: 1MA.14.48
reference: 1 Maccabees 14:48
source:
  edition: lxx-swete-1909
  text: καὶ τὴν γραφὴν ταύτην εἶπαν θέσθαι ἐν δέλτοις χαλκαῖς, καὶ στῆσαι αὐτὰς ἐν
    περιβόλῳ τῶν ἁγίων ἐν τόπῳ πιστῷ.
  language: Greek
  pages:
  - 679
  confidence: high
  validation: agree
translation:
  text: And they said that this document should be put on bronze tablets and set up
    in the court of the sanctuary, in a secure place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'writing' or 'record' for 'document.' The Greek term refers to the formal
      written resolution.
    reason: lexical_alternative
  - marker: b
    text: Or 'bronze plaques' or 'bronze plates.' The phrase denotes inscribed metal
      tablets intended for durable public display.
    reason: lexical_alternative
  - marker: c
    text: Or 'in a trustworthy place.' The Greek may emphasize either the reliability
      of the location or its security.
    reason: lexical_alternative
lexical_decisions:
- source_word: γραφήν
  chosen: document
  alternatives:
  - writing
  - record
  - decree
  lexicon: LSJ
  rationale: γραφὴ can mean a written text or record. Here it refers to the formal
    written resolution just described, so 'document' conveys a specific written instrument
    without over-specifying it as a 'decree'.
- source_word: θέσθαι
  chosen: be put
  alternatives:
  - be placed
  - be deposited
  lexicon: LSJ
  rationale: The infinitive of τίθημι here expresses placing or setting the writing
    onto bronze tablets. 'Be put' is natural English and broad enough to cover the
    act without adding nuance not explicit in the Greek.
- source_word: δέλτοις χαλκαῖς
  chosen: bronze tablets
  alternatives:
  - bronze plaques
  - bronze plates
  lexicon: LSJ
  rationale: δέλτος denotes a writing tablet; with χαλκαῖς it refers to durable metal
    tablets for inscription. 'Bronze tablets' is a clear, fairly formal rendering
    anchored in the Greek.
- source_word: στῆσαι
  chosen: set up
  alternatives:
  - erect
  - place
  lexicon: LSJ
  rationale: The verb indicates causing the tablets to stand in a public location.
    'Set up' captures the public, visible installation better than the more generic
    'place'.
- source_word: περιβόλῳ
  chosen: court
  alternatives:
  - enclosure
  - precinct
  lexicon: LSJ
  rationale: περίβολος can denote an enclosed area or precinct. In this temple context,
    'court' is idiomatic English for the enclosed sacred area, while still reflecting
    the spatial sense.
- source_word: τῶν ἁγίων
  chosen: of the sanctuary
  alternatives:
  - of the holy place
  - of the holy things
  lexicon: LSJ
  rationale: The genitive likely refers to the sacred precinct rather than abstract
    'holy things.' 'Of the sanctuary' gives a natural temple-context rendering without
    forcing a narrower technical term.
- source_word: ἐν τόπῳ πιστῷ
  chosen: in a secure place
  alternatives:
  - in a trustworthy place
  - in a safe place
  lexicon: LSJ
  rationale: πιστός can mean trustworthy, reliable, or secure. For a location where
    official tablets are kept, 'secure place' best conveys a place considered safe
    and dependable for preservation.
