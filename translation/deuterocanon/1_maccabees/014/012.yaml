id: 1MA.14.12
reference: 1 Maccabees 14:12
source:
  edition: lxx-swete-1909
  text: καὶ ἐκάθισεν ἕκαστος ὑπὸ τὴν ἄμπελον αὐτοῦ καὶ τὴν συκῆν αὐτοῦ, καὶ οὐκ ἦν
    ὁ ἐκφοβῶν αὐτούς.
  language: Greek
  pages:
  - 676
  confidence: high
  validation: agree
translation:
  text: And each sat under his own vine and his own fig tree, and there was no one
    to frighten them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This wording echoes a biblical idiom for peace and security; compare 1 Kings
      4:25 and Micah 4:4.
    reason: cross_reference
lexical_decisions:
- source_word: ἐκάθισεν
  chosen: sat
  alternatives:
  - dwelt
  - settled down
  lexicon: LSJ
  rationale: Aorist of καθίζω/κάθημαι here depicts being seated or settled in security.
    'Sat' preserves the concrete image and echoes the idiom of peaceful repose without
    over-paraphrasing.
- source_word: ἕκαστος
  chosen: each
  alternatives:
  - every man
  - everyone
  lexicon: LSJ
  rationale: 'The distributive sense is primary: each individual enjoyed this security.
    ''Each'' is concise and avoids importing an explicit masculine term not present
    in the Greek wording here.'
- source_word: ὑπὸ
  chosen: under
  alternatives:
  - beneath
  lexicon: LSJ
  rationale: The preposition is spatial and idiomatic in the stock biblical expression
    of peace and safety under one's vine and fig tree. 'Under' is the natural English
    equivalent.
- source_word: ἄμπελον
  chosen: vine
  alternatives:
  - grapevine
  lexicon: LSJ
  rationale: '''Vine'' is the standard rendering and preserves the familiar agrarian
    image. ''Grapevine'' is more explicit but unnecessarily heavy in this idiom.'
- source_word: συκῆν
  chosen: fig tree
  alternatives:
  - fig
  lexicon: LSJ
  rationale: The noun refers to the tree, and 'fig tree' is the established and precise
    English rendering in this biblical peace formula.
- source_word: οὐκ ἦν ὁ ἐκφοβῶν
  chosen: there was no one to frighten
  alternatives:
  - there was no one making afraid
  - there was no one to terrify
  lexicon: LSJ
  rationale: 'The articular participle functions substantivally: ''the one frightening''
    = ''one to frighten.'' ''Frighten'' is natural modern English and preserves the
    causative sense of inducing fear.'
- source_word: αὐτούς
  chosen: them
  alternatives:
  - the people
  - those ones
  lexicon: LSJ
  rationale: The pronoun refers back to the people collectively enjoying security.
    'Them' is the direct and sufficient rendering.
