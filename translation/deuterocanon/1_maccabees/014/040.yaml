id: 1MA.14.40
reference: 1 Maccabees 14:40
source:
  edition: lxx-swete-1909
  text: ἠκούσθη γὰρ ὅτι προσηγορεῦνται Ἰουδαῖοι ὑπὸ Ῥωμαίων φίλοι καὶ σύμμαχοι καὶ
    οἱ ἀδελφοί, καὶ ὅτι ἀπήντησαν τοῖς πρεσβευταῖς Σίμωνος ἐνδόξως.
  language: Greek
  pages:
  - 678
  confidence: high
  validation: agree
translation:
  text: For it was heard that the Jews are called friends and allies and brothers
    by the Romans, and that they received Simon’s envoys honorably.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'received Simon’s ambassadors with honor.' The Greek verb is literally
      'met,' but in context it refers to an official diplomatic reception.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκούσθη
  chosen: it was heard
  alternatives:
  - it was reported
  - word was heard
  lexicon: LSJ
  rationale: A passive impersonal expression. 'It was heard' preserves the Greek form
    and sense that this information had become publicly known, without over-interpreting
    the source of the report.
- source_word: προσηγορεῦνται
  chosen: are called
  alternatives:
  - are addressed as
  - are designated
  lexicon: LSJ
  rationale: The verb denotes being named or addressed by a title. 'Are called' is
    idiomatic and preserves the formal recognition implied in the diplomatic context.
- source_word: φίλοι
  chosen: friends
  alternatives:
  - friendly partners
  lexicon: LSJ
  rationale: In Hellenistic diplomatic language this can function as a quasi-technical
    term, but 'friends' remains the most direct rendering and fits the list of Roman
    honors.
- source_word: σύμμαχοι
  chosen: allies
  alternatives:
  - confederates
  - partners in alliance
  lexicon: LSJ
  rationale: This is the standard political-military term for those joined in alliance.
    'Allies' is the natural modern equivalent.
- source_word: οἱ ἀδελφοί
  chosen: brothers
  alternatives:
  - kinsmen
  - brother-allies
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural and in this diplomatic formula
    likely denotes fraternal political relationship. Per doctrine, the gendered term
    is retained rather than neutralized.
- source_word: ἀπήντησαν
  chosen: received
  alternatives:
  - met
  - welcomed
  lexicon: LSJ
  rationale: Literally 'met,' but in context of ambassadors the sense is that the
    Romans met/received them officially. 'Received' best conveys the diplomatic action
    in natural English.
- source_word: πρεσβευταῖς
  chosen: envoys
  alternatives:
  - ambassadors
  - delegates
  lexicon: LSJ
  rationale: The term refers to official representatives. 'Envoys' is concise, accurate,
    and avoids sounding overly formal while preserving diplomatic status.
- source_word: ἐνδόξως
  chosen: honorably
  alternatives:
  - with honor
  - gloriously
  lexicon: LSJ
  rationale: The adverb indicates honorable or distinguished treatment. 'Honorably'
    communicates the manner of reception in clear modern English.
