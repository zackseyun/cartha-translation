id: 1MA.14.20
reference: 1 Maccabees 14:20
source:
  edition: lxx-swete-1909
  text: καὶ τοῦτο τὸ ἀντίγραφον τῶν ἐπιστολῶν ὧν ἀπέστειλαν οἱ Σπαρτιᾶται Σπαρτιατῶν
    ἄρχοντες καὶ ἡ πόλις Σίμωνι ἱερεῖ μεγάλῳ καὶ τοῖς πρεσβυτέροις καὶ τοῖς ἱερεῦσι
    καὶ τῷ λοιπῷ δήμῳ τῶν Ἰουδαίων ἀδελφοῖς χαίρειν.
  language: Greek
  pages:
  - 676
  confidence: high
  validation: agree
translation:
  text: And this is the copy of the letter that the Spartans sent—the rulers of the
    Spartans and the city—to Simon the high priest, and to the elders and the priests
    and the rest of the people of the Jews, their brothers, greetings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the copy of the letters''; the Greek uses a plural noun (''letters''),
      though the sentence functions as the introduction to a single piece of correspondence.
      English singular ''letter'' is used for clarity.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the rest of the Jewish people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντίγραφον
  chosen: copy
  alternatives:
  - transcript
  - duplicate
  lexicon: LSJ
  rationale: The term denotes a written copy or transcript of a document. 'Copy' is
    the most natural modern English equivalent and fits the epistolary context.
- source_word: ἐπιστολῶν
  chosen: letter
  alternatives:
  - letters
  - epistle
  lexicon: LSJ
  rationale: Although the Greek is plural ('letters'), the following singular relative
    construction and the sense of the sentence point to the content being presented
    as a single diplomatic communication. English idiom is clearer with singular here,
    while the plural alternative is preserved as a lexical possibility.
- source_word: οἱ Σπαρτιᾶται Σπαρτιατῶν ἄρχοντες καὶ ἡ πόλις
  chosen: the Spartans sent—the rulers of Sparta and the city—
  alternatives:
  - the Spartans, the rulers and the city of the Spartans
  - the rulers of the Spartans and the city
  lexicon: LSJ
  rationale: The Greek is somewhat appositional and compressed. The sense is that
    the official senders are the Spartan authorities together with the civic body.
    Rendering ἄρχοντες as 'rulers' preserves the political office, and 'of Sparta'
    clarifies the genitive Σπαρτιατῶν in idiomatic English.
- source_word: ἱερεῖ μεγάλῳ
  chosen: high priest
  alternatives:
  - great priest
  lexicon: LSJ
  rationale: The idiomatic title in Jewish and English usage is 'high priest.' A more
    literal 'great priest' would be misleadingly non-idiomatic.
- source_word: πρεσβυτέροις
  chosen: elders
  alternatives:
  - older men
  lexicon: LSJ
  rationale: In this civic-religious context the term refers to recognized leaders,
    not merely men advanced in age.
- source_word: τῷ λοιπῷ δήμῳ τῶν Ἰουδαίων
  chosen: the rest of the people of the Jews
  alternatives:
  - the remaining populace of the Jews
  - the rest of the Jewish people
  lexicon: LSJ
  rationale: δῆμος denotes the people as a civic body. 'The rest of the Jewish people'
    would be smoother English, but 'the people of the Jews' stays closer to the Greek
    construction while remaining intelligible.
- source_word: ἀδελφοῖς
  chosen: their brothers
  alternatives:
  - brothers
  - kinsmen
  lexicon: LSJ
  rationale: The dative ἀδελφοῖς is linked to the recipients and expresses the diplomatic
    kinship claim between Spartans and Jews. 'Their brothers' makes the relationship
    explicit in English.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - hail
  lexicon: LSJ
  rationale: Standard epistolary infinitive best rendered by the conventional English
    salutation 'greetings.'
