id: 1MA.14.41
reference: 1 Maccabees 14:41
source:
  edition: lxx-swete-1909
  text: καὶ ὅτι οἱ Ἰουδαῖοι καὶ οἱ ἱερεῖς εὐδόκησαν τοῦ εἶναι αὐτῶν Σίμωνα ἡγούμενον
    καὶ ἀρχιερέα εἰς τὸν αἰῶνα, ἕως τοῦ ἀναστῆναι προφήτην πιστόν·
  language: Greek
  pages:
  - 678
  confidence: high
  validation: agree
translation:
  text: and that the Jews and the priests were pleased that Simon should be their
    leader and high priest forever, until a trustworthy prophet should arise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a faithful prophet' or 'a true prophet.' The Greek πιστόν can denote
      one who is faithful or trustworthy.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐδόκησαν
  chosen: were pleased
  alternatives:
  - approved
  - thought it good
  - were well pleased
  lexicon: BDAG
  rationale: The verb denotes favorable approval or satisfaction. 'Were pleased' is
    natural modern English and preserves the sense of formal approval without sounding
    overly wooden.
- source_word: ἡγούμενον
  chosen: leader
  alternatives:
  - governor
  - ruler
  - commander
  lexicon: BDAG
  rationale: The participle here functions as a title for Simon's governing role.
    'Leader' is broad enough to fit the political context without importing a more
    specific office not stated by the Greek.
- source_word: ἀρχιερέα
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: Standard rendering for the recognized priestly office; clear and consistent
    in English Bible usage.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - for the age
  lexicon: BDAG
  rationale: In idiomatic English this phrase is best rendered 'forever.' In context
    it expresses an enduring or open-ended grant, though the following clause qualifies
    its duration.
- source_word: ἕως τοῦ ἀναστῆναι
  chosen: until ... should arise
  alternatives:
  - until ... arose
  - until the arising of
  lexicon: BDAG
  rationale: 'The construction marks a terminus: Simon''s status stands until the
    emergence of the specified prophet. ''Should arise'' conveys the prospective force
    naturally in English.'
- source_word: προφήτην πιστόν
  chosen: a trustworthy prophet
  alternatives:
  - a faithful prophet
  - a true prophet
  lexicon: BDAG
  rationale: πιστός can mean faithful, trustworthy, or reliable. Here the sense is
    likely a prophet whose legitimacy can be trusted. 'Trustworthy' communicates that
    clearly in contemporary English, while 'faithful' is preserved as an alternative
    because it is also possible.
