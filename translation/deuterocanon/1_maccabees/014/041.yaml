theological_decisions:
- issue: Force of Simon's tenure in light of εἰς τὸν αἰῶνα followed by ἕως clause
  chosen_reading: The text grants Simon an enduring office 'forever' in conventional
    covenantal/political language, but explicitly qualifies it with 'until a trustworthy
    prophet should arise.'
  alternative_readings:
  - Treat 'forever' as absolute and the following clause as merely explanatory
  - Render more weakly as 'in perpetuity' without highlighting the tension
  rationale: The Greek preserves both an apparently permanent grant and a limiting
    clause. Following project philosophy, the translation keeps both rather than resolving
    the tension.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it.
