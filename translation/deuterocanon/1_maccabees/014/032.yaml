theological_decisions:
- issue: Rendering of ἔθνος in a Jewish national context
  chosen_reading: nation
  alternative_readings:
  - people
  rationale: The verse emphasizes Simon's defense and support of the Jewish body as
    a political-national entity. 'Nation' preserves that force without importing later
    nationalism.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Gendered reference in τοὺς ἄνδρας
  chosen_reading: the men
  alternative_readings:
  - the soldiers
  - the warriors
  rationale: The Greek is explicitly masculine and refers to male combatants. Per
    the project's gender-accurate policy, the masculine reference is preserved rather
    than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
