id: 1MA.14.32
reference: 1 Maccabees 14:32
source:
  edition: lxx-swete-1909
  text: τότε ἀνέστησενσεν Σίμων, καὶ ἐπολέμησεν περὶ τοῦ ἔθνους αὐτοῦ, καὶ ἐδαπάνησεν
    χρήματα πολλὰ τῶν ἑαυτοῦ, καὶ ὡπλοδότησεν τοὺς ἄνδρας τῆς δυνάμεως τοῦ ἔθνους
    αὐτοῦ, καὶ ἔδωκεν αὐτοῖς ὀψώνια.
  language: Greek
  pages:
  - 677
  confidence: high
  validation: agree
translation:
  text: Then Simon rose up and fought for his nation, and spent much of his own money,
    and armed the men of his nation's forces, and gave them wages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἔθνος can also be rendered 'people' here; 'nation' was chosen to preserve
      the collective political sense in context.
    reason: lexical_alternative
  - marker: b
    text: The source text's printed form appears as ἀνέστησενσεν, likely reflecting
      a duplicated syllable in transcription or printing; the sense is that Simon
      'rose up' or 'arose.'
    reason: textual_variant
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: LSJ
  rationale: Standard temporal/sequential connective; 'Then' preserves the narrative
    progression naturally in English.
- source_word: ἀνέστησενσεν
  chosen: rose up
  alternatives:
  - arose
  - took action
  lexicon: LSJ
  rationale: The form in Swete appears to contain a duplicated syllable in transcription,
    but plainly reflects ἀνέστησεν. 'Rose up' preserves the idiomatic sense of taking
    initiative without over-paraphrasing.
- source_word: ἐπολέμησεν περὶ τοῦ ἔθνους αὐτοῦ
  chosen: fought for his nation
  alternatives:
  - fought on behalf of his people
  - went to war for his nation
  lexicon: LSJ
  rationale: περὶ with this verb conveys action in defense of or on behalf of. 'Nation'
    is retained for ἔθνος because the verse speaks corporately and politically, not
    merely of a crowd of individuals.
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - people
  lexicon: LSJ
  rationale: In 1 Maccabees this term often denotes the Jewish people as a national
    body. 'Nation' better preserves the collective-political sense here than 'people,'
    though the latter is possible.
- source_word: ἐδαπάνησεν χρήματα πολλὰ τῶν ἑαυτοῦ
  chosen: spent much of his own money
  alternatives:
  - spent much of his own wealth
  - expended much of his own funds
  lexicon: LSJ
  rationale: ἐδαπάνησεν means to spend or expend; χρήματα can mean money/means/wealth.
    'Money' is the most straightforward modern rendering, while 'of his own' preserves
    τῶν ἑαυτοῦ.
- source_word: ὡπλοδότησεν
  chosen: armed
  alternatives:
  - equipped with weapons
  - supplied arms to
  lexicon: LSJ
  rationale: The verb denotes furnishing with arms. 'Armed' is concise, accurate,
    and idiomatic.
- source_word: τοὺς ἄνδρας τῆς δυνάμεως τοῦ ἔθνους αὐτοῦ
  chosen: the men of his nation's forces
  alternatives:
  - the men of the army of his nation
  - the warriors of his people
  lexicon: LSJ
  rationale: δυνάμεως here refers to military force. 'Forces' preserves the military
    sense without forcing a singular 'army' where the Greek is more general. 'Men'
    is retained because ἄνδρας is explicitly masculine and refers to male fighters.
- source_word: ὀψώνια
  chosen: wages
  alternatives:
  - pay
  - rations
  lexicon: BDAG
  rationale: Though often used for soldiers' pay and historically connected with provisions,
    in this military context 'wages' best captures regular compensation. 'Pay' is
    possible, but 'wages' fits the syntax 'gave them wages' well.
