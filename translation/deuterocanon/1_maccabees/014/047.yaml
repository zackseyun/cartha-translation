theological_decisions:
- issue: Rendering the political title ἐθνάρχης
  chosen_reading: ethnarch
  alternative_readings:
  - ruler of the nation
  - national leader
  rationale: This is not a theological title but a historically significant office.
    Preserving the transliterated title maintains the political texture of the text
    and avoids over-interpreting the exact constitutional nuance.
  doctrine_reference: Translation philosophy §2, translate titles; transliterate names
- issue: Rendering Ἰουδαίων
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  rationale: The term can denote either ethnic Jews or Judeans in a territorial sense.
    In this verse, paired with 'priests' and within a national-political decree, the
    broader people-group sense is best represented by 'the Jews,' while the alternative
    remains viable.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
