id: 1MA.14.47
reference: 1 Maccabees 14:47
source:
  edition: lxx-swete-1909
  text: καὶ ἐπεδέξατο Σίμων, καὶ εὐδόκησεν ἀρχιερατεύσαι καὶ εἶναι στρατηγὸς καὶ ἐθνάρχης
    τῶν Ἰουδαίων καὶ ἱερέων καὶ τοῦ προστῆσαι ἁπάντων.
  language: Greek
  pages:
  - 679
  confidence: high
  validation: agree
translation:
  text: And Simon accepted it, and agreed to be high priest and to be commander and
    ethnarch of the Jews and priests, and to be over them all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans.' The Greek Ἰουδαίων can refer to Jews as a people or to
      Judeans in a geo-ethnic sense.
    reason: lexical_alternative
  - marker: b
    text: '''Ethnarch'' is a historical political title, roughly a ruler or leader
      of a people.'
    reason: cultural_note
  - marker: c
    text: Or 'to preside over all of them' or 'to be in charge of them all.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεδέξατο
  chosen: accepted it
  alternatives:
  - accepted
  - received
  lexicon: LSJ
  rationale: The middle of ἐπιδέχομαι here refers to Simon's acceptance of the office/arrangement
    just described. 'Accepted it' makes the implied object explicit in natural English
    without adding new content.
- source_word: εὐδόκησεν
  chosen: agreed
  alternatives:
  - was pleased
  - consented
  - approved
  lexicon: LSJ
  rationale: In this context the verb introduces Simon's willing consent to hold the
    offices named. 'Agreed' captures volitional acceptance more idiomatically than
    the more literal but potentially misleading 'was pleased.'
- source_word: ἀρχιερατεύσαι
  chosen: serve as high priest
  alternatives:
  - be high priest
  - exercise the high priesthood
  lexicon: LSJ
  rationale: The infinitive denotes functioning in the office of high priest. 'Serve
    as high priest' is clear modern English and preserves the official sense.
- source_word: στρατηγός
  chosen: commander
  alternatives:
  - general
  - military leader
  lexicon: LSJ
  rationale: The term denotes military leadership. 'Commander' is broad enough for
    the office while remaining accessible; 'general' is possible but can sound more
    narrowly modern-military.
- source_word: ἐθνάρχης
  chosen: ethnarch
  alternatives:
  - ruler of the nation
  - national leader
  lexicon: LSJ
  rationale: This is a technical political title. Retaining 'ethnarch' preserves the
    historical specificity better than flattening it to a generic leadership term.
- source_word: Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: LSJ
  rationale: Either ethnic ('Jews') or geo-ethnic ('Judeans') is possible in Hellenistic
    usage. Here the phrase names the people over whom Simon is appointed in a broad
    national sense, and 'the Jews' is the more natural English rendering in this context.
- source_word: ἱερέων
  chosen: priests
  lexicon: LSJ
  rationale: Straightforward rendering of the plural noun; the text distinguishes
    the Jews and the priests as groups under Simon's authority.
- source_word: προστῆσαι
  chosen: stand over
  alternatives:
  - preside over
  - be in charge of
  - lead
  lexicon: LSJ
  rationale: The infinitive from προΐστημι carries the sense of being set over or
    presiding over others. 'Stand over' stays close to the Greek image while remaining
    intelligible; the object 'them' is supplied from the context of the listed groups.
- source_word: ἁπάντων
  chosen: them all
  alternatives:
  - all
  - everyone
  lexicon: LSJ
  rationale: The genitive plural refers collectively to the previously mentioned groups.
    'Them all' makes the reference explicit in idiomatic English.
