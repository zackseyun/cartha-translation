id: 1MA.14.2
reference: 1 Maccabees 14:2
source:
  edition: lxx-swete-1909
  text: καὶ ἤκουσεν Ἀρσάκης ὁ βασιλεὺς Περσίδος καὶ Μηδίας ὅτι ἦλθεν Δημήτριος εἰς
    τὰ ὅρια αὐτοῦ, καὶ ἀπέστειλεν ἕνα τῶν ἀρχόντων αὐτοῦ συλλαβεῖν αὐτὸν ζῶντα.
  language: Greek
  pages:
  - 675
  confidence: high
  validation: agree
translation:
  text: And Arsaces, the king of Persia and Media, heard that Demetrius had come into
    his territory, and he sent one of his commanders to capture him alive.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - was informed
  lexicon: BDAG
  rationale: The aorist of ἀκούω here introduces reported information. 'Heard' is
    the most direct and natural English equivalent, without overstating the mode of
    reception.
- source_word: Ἀρσάκης
  chosen: Arsaces
  alternatives:
  - Arsakes
  rationale: Standard English transliteration of the royal name; personal names are
    transliterated rather than translated.
- source_word: ὁ βασιλεὺς Περσίδος καὶ Μηδίας
  chosen: the king of Persia and Media
  alternatives:
  - the king of Persis and Media
  lexicon: LSJ
  rationale: Περσίς can denote Persia/Persis. 'Persia' is the more familiar and idiomatic
    English geographical rendering in this historical context.
- source_word: ἦλθεν
  chosen: had come
  alternatives:
  - came
  lexicon: BDAG
  rationale: English past perfect fits the sequence after 'heard that,' marking Demetrius's
    arrival as prior to Arsaces's response.
- source_word: τὰ ὅρια αὐτοῦ
  chosen: his territory
  alternatives:
  - his borders
  - his region
  lexicon: LSJ
  rationale: ὅρια literally means 'boundaries/borders,' but in this context it refers
    to the area under his control. 'Territory' communicates the sense naturally in
    English while remaining faithful to the political-geographical meaning.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: A straightforward rendering of the aorist verb; 'sent' is clear and sufficiently
    formal for narrative prose.
- source_word: ἕνα τῶν ἀρχόντων αὐτοῦ
  chosen: one of his commanders
  alternatives:
  - one of his rulers
  - one of his officials
  - one of his princes
  lexicon: BDAG
  rationale: ἄρχων is broad ('ruler, leader, official'). In a military mission to
    seize Demetrius, 'commanders' best fits the immediate context without claiming
    a narrower office than the Greek states.
- source_word: συλλαβεῖν
  chosen: to capture
  alternatives:
  - to seize
  - to arrest
  lexicon: BDAG
  rationale: The infinitive denotes apprehending a person. 'Capture' suits the royal-military
    setting better than the more legal 'arrest,' while 'seize' is possible but slightly
    less idiomatic here.
- source_word: ζῶντα
  chosen: alive
  alternatives:
  - living
  lexicon: BDAG
  rationale: This participle specifies that Demetrius was to be taken alive rather
    than killed. 'Alive' is the idiomatic English adverbial complement.
