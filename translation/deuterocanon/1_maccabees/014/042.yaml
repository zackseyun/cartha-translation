id: 1MA.14.42
reference: 1 Maccabees 14:42
source:
  edition: lxx-swete-1909
  text: καὶ τοῦ εἶναι ἐπʼ αὐτῶν στρατηγόν, καὶ ὅπως μέλῃ αὐτῷ περὶ τῶν Α ἅγιον, καθιστάναι
    δʼ αὐτοῦ ἐπὶ τῶν ἔργων αὐτῶν καὶ ἐπὶ τῆς χώρας καὶ ἐπὶ τῶν ὅπλων καὶ ἐπὶ τῶν ὀχυρωμάτων.
  language: Greek
  pages:
  - 678
  confidence: high
  validation: agree
translation:
  text: and that he should be their commander, and that he should take thought for
    the sanctuary, and appoint men over their works and over the country and over
    the weapons and over the strongholds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctuary' or 'the holy place'; the Greek wording here is difficult
      in the transmitted text.
    reason: alternative_reading
lexical_decisions:
- source_word: στρατηγόν
  chosen: commander
  alternatives:
  - general
  - governor
  lexicon: LSJ
  rationale: στρατηγός commonly denotes a military leader or commander. 'Commander'
    preserves the military-administrative sense without overcommitting to a modern
    rank title like 'general'.
- source_word: μέλῃ
  chosen: should take thought for
  alternatives:
  - should care for
  - should be concerned about
  lexicon: LSJ
  rationale: The verb μέλω expresses concern or care. 'Take thought for' fits the
    formal public-decree style here while remaining understandable in modern English.
- source_word: τῶν Α ἅγιον
  chosen: the holy things
  alternatives:
  - the sanctuary
  - the holy place
  lexicon: LSJ
  rationale: The transmitted text is awkward, but ἅγιον/ἅγια language in this context
    most naturally refers to sacred matters or holy things. 'The holy things' stays
    close to the Greek form and avoids over-resolving the exact referent. Because
    the source wording is somewhat difficult, a sanctuary-oriented alternative is
    preserved in a footnote.
- source_word: καθιστάναι
  chosen: appoint men over
  alternatives:
  - set over
  - establish over
  lexicon: LSJ
  rationale: καθιστάναι here has the sense of appointing or setting persons in charge.
    English idiom benefits from supplying 'men' from context, since the infinitive
    governs a series of administrative domains.
- source_word: τῶν ἔργων
  chosen: their works
  alternatives:
  - their affairs
  - their tasks
  lexicon: LSJ
  rationale: ἔργα literally means 'works' or 'deeds,' but in administrative context
    can refer to undertakings or affairs. 'Works' preserves the lexical form while
    remaining intelligible.
- source_word: χώρας
  chosen: the country
  alternatives:
  - the land
  - the territory
  lexicon: LSJ
  rationale: χώρα denotes land or territory. 'The country' reads naturally in English
    and suits the civic-political context.
- source_word: ὅπλων
  chosen: the weapons
  alternatives:
  - the arms
  lexicon: LSJ
  rationale: ὅπλα refers to arms or weapons. 'Weapons' is the clearest modern equivalent.
- source_word: ὀχυρωμάτων
  chosen: the strongholds
  alternatives:
  - the fortresses
  - the fortified places
  lexicon: LSJ
  rationale: ὀχυρώματα are fortified places or strongholds. 'Strongholds' is concise
    and natural while preserving the military sense.
