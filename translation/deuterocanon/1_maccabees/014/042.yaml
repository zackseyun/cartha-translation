theological_decisions:
- issue: Referent of the difficult phrase τῶν Α ἅγιον
  chosen_reading: Rendered broadly as 'the holy things' in the main text
  alternative_readings:
  - the sanctuary
  - the holy place
  rationale: This is primarily a lexical-textual difficulty rather than a doctrinal
    dispute. The Greek as transmitted in Swete is not fully straightforward, so the
    translation avoids falsely precise interpretation while preserving a sanctuary-related
    alternative in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
