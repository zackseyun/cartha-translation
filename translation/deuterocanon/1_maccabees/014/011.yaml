id: 1MA.14.11
reference: 1 Maccabees 14:11
source:
  edition: lxx-swete-1909
  text: ἐποίησεν τὴν εἰρήνην ἐπὶ τῆς γῆς, καὶ ηὐφράνθη Ἰσραήλ εὐφροσύνην μεγάλην.
  language: Greek
  pages:
  - 676
  confidence: high
  validation: agree
translation:
  text: He made peace upon the land, and Israel rejoiced with great joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the land'; Greek 'upon the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν
  chosen: He made
  alternatives:
  - He brought about
  - He established
  lexicon: LSJ
  rationale: The aorist of ποιέω here takes εἰρήνην as its object. 'Made' is the most
    direct rendering and preserves the simple verbal force; 'brought about' or 'established'
    are possible contextual expansions but less transparent to the Greek.
- source_word: τὴν εἰρήνην
  chosen: peace
  alternatives:
  - the peace
  lexicon: LSJ
  rationale: The article is natural in Greek but not required in idiomatic English
    here. 'Peace' best conveys the state of public tranquility intended in context.
- source_word: ἐπὶ τῆς γῆς
  chosen: upon the land
  alternatives:
  - in the land
  - on the earth
  lexicon: LSJ
  rationale: γῆ can mean 'land' or 'earth.' In 1 Maccabees this commonly refers to
    the land/territory rather than the whole world. 'Upon the land' stays close to
    the Greek preposition ἐπί while remaining intelligible; 'in the land' is possible
    but slightly less formal to the wording.
- source_word: ηὐφράνθη
  chosen: rejoiced
  alternatives:
  - was gladdened
  - was made glad
  lexicon: LSJ
  rationale: The passive/deponent form conveys joyful response. 'Rejoiced' is idiomatic
    English and captures the sense without awkward passivity.
- source_word: Ἰσραήλ
  chosen: Israel
  lexicon: LSJ
  rationale: Standard transliteration of the people/nation name.
- source_word: εὐφροσύνην μεγάλην
  chosen: with great joy
  alternatives:
  - great gladness
  - a great rejoicing
  lexicon: LSJ
  rationale: The accusative functions adverbially/intensively after ηὐφράνθη. 'With
    great joy' is natural modern English and preserves the emphatic duplication of
    joy language in the Greek.
