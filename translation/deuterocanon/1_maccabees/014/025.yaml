id: 1MA.14.25
reference: 1 Maccabees 14:25
source:
  edition: lxx-swete-1909
  text: Ὡς δὲ ἤκουσεν ὁ δῆμος τῶν λόγων τούτων, εἶπαν Τίνα χάριν ἀποδώσομεν Σίμωνι
    καὶ τοῖς υἱοῖς αὐτοῦ;
  language: Greek
  pages:
  - 677
  confidence: high
  validation: agree
translation:
  text: When the people heard these words, they said, “What favor shall we repay to
    Simon and to his sons?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What gratitude shall we return to Simon and to his sons?' The Greek
      χάρις can denote favor, thanks, or gratitude; with 'repay' it carries a reciprocal
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  chosen: When
  alternatives:
  - And when
  - Now when
  lexicon: LSJ
  rationale: Introduces the temporal circumstance for the response. 'When' gives clear
    modern English without overtranslating δέ.
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - had heard
  - listened to
  lexicon: LSJ
  rationale: Aorist of ἀκούω, straightforwardly 'heard.' English simple past fits
    the narrative sequence.
- source_word: ὁ δῆμος
  chosen: the people
  alternatives:
  - the populace
  - the assembly
  - the nation
  lexicon: LSJ
  rationale: δῆμος here refers to the public body/community responding collectively.
    'The people' is natural and sufficiently broad; 'assembly' would suggest a more
    formal institution than the Greek requires in this sentence.
- source_word: τῶν λόγων τούτων
  chosen: these words
  alternatives:
  - these statements
  - these things
  lexicon: LSJ
  rationale: λόγοι commonly means 'words' or 'statements.' 'These words' preserves
    the direct reference to the preceding speech.
- source_word: Τίνα χάριν
  chosen: What favor
  alternatives:
  - What gratitude
  - What thanks
  - What kindness
  lexicon: LSJ
  rationale: χάρις in this context concerns a return of favor or expression of gratitude.
    'What favor' best matches the reciprocal sense when paired with ἀποδώσομεν ('repay/return').
- source_word: ἀποδώσομεν
  chosen: shall we repay
  alternatives:
  - shall we return
  - shall we render
  - can we repay
  lexicon: LSJ
  rationale: Future of ἀποδίδωμι, 'give back, repay, render.' 'Shall we repay' captures
    the deliberative force in context and fits the reciprocal idea with χάρις.
- source_word: Σίμωνι
  chosen: Simon
  rationale: Standard transliteration of the personal name Σίμων.
- source_word: τοῖς υἱοῖς αὐτοῦ
  chosen: his sons
  alternatives:
  - his children
  lexicon: LSJ
  rationale: υἱοί specifically means 'sons,' and the translation should remain gender-accurate
    rather than neutralize the term.
