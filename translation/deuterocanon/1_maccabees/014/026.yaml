id: 1MA.14.26
reference: 1 Maccabees 14:26
source:
  edition: lxx-swete-1909
  text: ἐστήρισεν γὰρ αὐτὸς καὶ οἱ ἀδελφοὶ αὐτοῦ καὶ ὁ οἶκος τοῦ πατρὸς αὐτοῦ, καὶ
    ἐπολέμησαν τοὺς ἐχθροὺς Ἰσραὴλ ἀπʼ αὐτῶν, καὶ ἔστησαν αὐτῷ ἐλευθερίαν, καὶ κατέγραψαν
    ἐν δέλτοις χαλκαῖς, καὶ ἔθεντο ἐν στήλῃ ἐν ὄρει Σιών.
  language: Greek
  pages:
  - 677
  confidence: high
  validation: agree
translation:
  text: For he and his brothers and his father's house stood firm, and they fought
    the enemies of Israel away from them, and established freedom for him, and recorded
    it on bronze tablets, and set them on a pillar on Mount Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'secured liberty for it,' referring to Israel as a nation; the Greek
      reads literally 'for him.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐστήρισεν
  chosen: stood firm
  alternatives:
  - strengthened
  - made firm
  - established
  lexicon: LSJ
  rationale: The verb can mean to strengthen or establish, but with the singular subject
    followed by coordinated family members, the sense is that he proved steadfast/firm.
    'Stood firm' fits the military-political context and avoids implying he strengthened
    someone else.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  chosen: his brothers
  alternatives:
  - his kinsmen
  lexicon: LSJ
  rationale: The ordinary familial sense is most natural here; there is no contextual
    pressure to broaden to 'kinsmen.'
- source_word: ὁ οἶκος τοῦ πατρὸς αὐτοῦ
  chosen: his father's house
  alternatives:
  - his ancestral house
  - his father's family
  lexicon: LSJ
  rationale: A semitic-style expression for the wider family/household line. 'Father's
    house' preserves the source idiom transparently in readable English.
- source_word: ἐπολέμησαν
  chosen: fought
  alternatives:
  - waged war against
  - battled
  lexicon: LSJ
  rationale: Simple past 'fought' best matches the aorist narrative sequence without
    over-expanding the military sense.
- source_word: τοὺς ἐχθροὺς Ἰσραὴλ
  chosen: the enemies of Israel
  alternatives:
  - Israel's enemies
  lexicon: LSJ
  rationale: Both are possible; the fuller phrasing preserves the genitival structure
    clearly.
- source_word: ἀπʼ αὐτῶν
  chosen: away from them
  alternatives:
  - from them
  - off them
  lexicon: LSJ
  rationale: The phrase indicates removal of hostile pressure from Israel/the people
    just mentioned implicitly. 'Away from them' makes the protective force explicit
    in idiomatic English.
- source_word: ἔστησαν αὐτῷ ἐλευθερίαν
  chosen: established freedom for him
  alternatives:
  - secured liberty for him
  - won independence for him
  - established freedom for it
  lexicon: LSJ
  rationale: ἐλευθερίαν is 'freedom/liberty.' The dative αὐτῷ is awkward in English
    because its antecedent is collective/national; the Greek likely refers to Israel/the
    nation represented grammatically by a masculine singular. 'Established freedom
    for him' stays close to the Greek while preserving the personified national reference.
- source_word: κατέγραψαν
  chosen: recorded it
  alternatives:
  - inscribed it
  - wrote it down
  lexicon: LSJ
  rationale: The verb means to record/register in writing. Because the following phrase
    specifies bronze tablets, 'recorded it' avoids redundancy while still allowing
    the material medium to define the inscriptional context.
- source_word: ἐν δέλτοις χαλκαῖς
  chosen: on bronze tablets
  alternatives:
  - in bronze tablets
  - on bronze plaques
  lexicon: LSJ
  rationale: δέλτοι are writing tablets; with bronze as material, 'bronze tablets'
    is the most straightforward rendering.
- source_word: ἔθεντο ἐν στήλῃ
  chosen: set them on a pillar
  alternatives:
  - placed them on a stele
  - put them on a monument
  lexicon: LSJ
  rationale: στήλη is an inscribed pillar/stele. 'Pillar' is accessible English; the
    pronoun 'them' naturally refers to the bronze tablets.
- source_word: ἐν ὄρει Σιών
  chosen: on Mount Zion
  alternatives:
  - in Mount Zion
  lexicon: LSJ
  rationale: Standard English idiom for ὄρος with a named mount is 'on Mount Zion.'
