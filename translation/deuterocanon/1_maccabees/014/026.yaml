theological_decisions:
- issue: Referent of αὐτῷ in 'ἔστησαν αὐτῷ ἐλευθερίαν'
  chosen_reading: a personified reference to Israel/the nation
  alternative_readings:
  - for him (Simon personally)
  - for it (the nation/people rendered non-literally)
  rationale: The immediate context speaks of fighting 'the enemies of Israel,' so
    the freedom secured is most naturally national rather than merely personal. The
    Greek dative is masculine singular, which can reflect a personified collective
    referent. The main text keeps the literal masculine pronoun while the rationale
    documents the likely national sense.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
