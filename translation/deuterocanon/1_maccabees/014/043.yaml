id: 1MA.14.43
reference: 1 Maccabees 14:43
source:
  edition: lxx-swete-1909
  text: καὶ ὅπως μέλῃ αὐτῷ περὶ τῶν ἁγίων, καὶ ὅπως ἀκούηται ὑπὸ πάντων, καὶ ὅπως
    γράφωνται ἐπὶ τῷ ὀνόματι αὐτοῦ πᾶσαι συγγραφαὶ ἐν τῇ χώρᾳ, καὶ ὅπως περιβάλληται
    πορφύραν καὶ χρυσοφορῇ.
  language: Greek
  pages:
  - 679
  confidence: high
  validation: agree
translation:
  text: and that he should have charge of the holy things, and that he should be obeyed
    by all, and that all documents in the country should be written in his name, and
    that he should wear purple and gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctuary' or 'the sacred matters.' The Greek says 'the holy things,'
      a broad expression for sacred affairs.
    reason: lexical_alternative
  - marker: b
    text: Literally 'be heard by all'; in this context the sense is that his authority
      is to be heeded or obeyed.
    reason: lexical_alternative
  - marker: c
    text: That is, all official documents in the land were to be issued under his
      authority.
    reason: cultural_note
  - marker: d
    text: Purple and gold were marks of high rank and official honor.
    reason: cultural_note
lexical_decisions:
- source_word: μέλῃ ... περὶ
  chosen: should have charge of
  alternatives:
  - should care for
  - should be concerned about
  lexicon: LSJ
  rationale: 'The construction with μέλω plus περὶ can mean to care for or be concerned
    with. In this administrative decree context, a more official sense fits best:
    Simon is being granted oversight/responsibility regarding sacred matters, not
    merely personal concern.'
- source_word: τῶν ἁγίων
  chosen: the holy things
  alternatives:
  - the sanctuary
  - the sacred things
  - the holy places
  lexicon: LSJ
  rationale: The plural neuter naturally refers to sacred/holy matters or things.
    'The holy things' preserves the Greek form and leaves scope broad enough to include
    temple-related sacred affairs. 'Sanctuary' is possible contextually but is narrower
    than the plural wording.
- source_word: ἀκούηται
  chosen: should be obeyed
  alternatives:
  - should be heard
  - should be listened to
  lexicon: BDAG
  rationale: Although literally 'be heard,' in administrative and authority contexts
    the passive can imply being heeded or obeyed. Since the verse lists honors and
    powers granted to Simon, 'obeyed' best conveys the practical force in English.
- source_word: συγγραφαὶ
  chosen: documents
  alternatives:
  - records
  - writings
  - contracts
  lexicon: LSJ
  rationale: The term can denote written instruments or official writings. In this
    governmental context, 'documents' is broad, natural English that fits decrees
    and legal/administrative records without over-specifying.
- source_word: ἐπὶ τῷ ὀνόματι αὐτοῦ
  chosen: in his name
  alternatives:
  - under his name
  - in the name of him
  lexicon: LSJ
  rationale: This idiom indicates official authorization or issuance under someone's
    authority. 'In his name' is standard English and preserves the formal sense.
- source_word: πορφύραν
  chosen: purple
  alternatives:
  - a purple robe
  - purple clothing
  lexicon: LSJ
  rationale: The Greek names the prestigious purple associated with rulership and
    honor. 'Wear purple' is idiomatic English and preserves the symbolic status marker
    without adding a noun absent from the text.
- source_word: χρυσοφορῇ
  chosen: gold
  alternatives:
  - wear gold
  - bear gold ornaments
  lexicon: LSJ
  rationale: The verb means to wear or bear gold. Rendering the whole phrase as 'wear
    purple and gold' gives clear, natural English while preserving the paired insignia
    of rank.
