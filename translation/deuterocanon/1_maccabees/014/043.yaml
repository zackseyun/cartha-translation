- issue: Scope of τῶν ἁγίων
  chosen_reading: the holy things
  alternative_readings:
  - the sanctuary
  - the sacred matters
  rationale: The phrase concerns temple-related authority, but the Greek plural is
    broader than a single building. The translation preserves that breadth rather
    than narrowing it to 'the sanctuary.'
