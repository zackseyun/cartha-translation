id: 1MA.14.23
reference: 1 Maccabees 14:23
source:
  edition: lxx-swete-1909
  text: καὶ ἤρεσεν τῷ δήμῳ ἐπιδέξασθαι τοὺς ἄνδρας ἐνδόξως, καὶ τοῦ δέσθαι τὸ ἀντίγραφον
    τῶν λόγων αὐτῶν ἐν τοῖς ἀποδεδειγμένοις τῷ δήμῳ βιβλίοις, τοῦ μνημόσυνον ἔχειν
    τὸν δῆμον τῶν Σπαρτιατῶν· τὸ δὲ ἀντίγραφον τούτων ἔγραψαν Σίμωνι τῷ ἀρχιερεῖ.
  language: Greek
  pages:
  - 677
  confidence: high
  validation: agree
translation:
  text: And it pleased the people to receive the men with honor, and to place a copy
    of their words in the public records of the people, so that the people of the
    Spartans might have a memorial of them; and they wrote a copy of these things
    to Simon the high priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Spartan people.' The Greek literally reads 'the people of the Spartans.'
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'public records' is literally 'the books designated
      for the people,' referring to official civic archives or registers.
    reason: cultural_note
lexical_decisions:
- source_word: ἤρεσεν τῷ δήμῳ
  chosen: it pleased the people
  alternatives:
  - the people approved
  - it seemed good to the people
  lexicon: LSJ
  rationale: The impersonal construction with dative δήμῳ is naturally rendered 'it
    pleased the people.' This preserves the formal public-decision tone without sounding
    overly wooden.
- source_word: ἐπιδέξασθαι
  chosen: to receive
  alternatives:
  - to welcome
  - to accept
  lexicon: LSJ
  rationale: The verb here denotes favorable reception. 'Receive' fits the formal
    civic context and avoids adding emotional warmth beyond the Greek.
- source_word: τοὺς ἄνδρας
  chosen: the men
  alternatives:
  - these men
  - the envoys
  lexicon: LSJ
  rationale: ἄνδρας is explicitly 'men.' While context suggests official representatives,
    'envoys' would interpret rather than translate. 'The men' keeps the source wording.
- source_word: ἐνδόξως
  chosen: with honor
  alternatives:
  - honorably
  - gloriously
  - with distinction
  lexicon: LSJ
  rationale: The adverb conveys honorable treatment in a public setting. 'With honor'
    is idiomatic English and preserves the dignified civic sense better than the less
    natural 'gloriously.'
- source_word: δέσθαι
  chosen: to place
  alternatives:
  - to deposit
  - to record
  lexicon: LSJ
  rationale: In context with ἀντίγραφον ... ἐν ... βιβλίοις, the sense is to put or
    deposit a copy into official records. 'Place' is broad enough to preserve the
    action without overtechnical wording.
- source_word: τὸ ἀντίγραφον τῶν λόγων αὐτῶν
  chosen: a copy of their words
  alternatives:
  - a copy of their message
  - a transcript of their statements
  lexicon: LSJ
  rationale: ἀντίγραφον is 'copy,' and λόγοι can mean words, statements, or message.
    'Words' stays closest to the Greek while remaining intelligible in context.
- source_word: ἐν τοῖς ἀποδεδειγμένοις τῷ δήμῳ βιβλίοις
  chosen: in the public records of the people
  alternatives:
  - in the books designated for the people
  - in the officially approved books of the people
  lexicon: LSJ
  rationale: The phrase refers to books/registers set apart or officially designated
    for civic use. 'Public records of the people' captures the institutional sense
    in natural English better than a wooden 'designated books.'
- source_word: τοῦ μνημόσυνον ἔχειν
  chosen: so that ... might have a memorial
  alternatives:
  - for ... to have a remembrance
  - so that ... might keep a record
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose. μνημόσυνον is 'memorial'
    or 'remembrance.' 'Might have a memorial' preserves the commemorative nuance rather
    than reducing it to mere archival record.
- source_word: τὸν δῆμον τῶν Σπαρτιατῶν
  chosen: the people of the Spartans
  alternatives:
  - the Spartan people
  - the Spartans
  lexicon: LSJ
  rationale: The Greek explicitly has δῆμον plus a genitive. 'The people of the Spartans'
    is slightly formal but preserves the source structure and civic emphasis. A smoother
    alternative would be 'the Spartan people,' but the chosen rendering remains clear.
- source_word: τὸ δὲ ἀντίγραφον τούτων ἔγραψαν
  chosen: and they wrote a copy of these things
  alternatives:
  - and they wrote out a copy of this
  - and they sent a copy of these matters in writing
  lexicon: LSJ
  rationale: ἔγραψαν with ἀντίγραφον indicates producing a written copy. 'These things'
    reflects τούτων in its broad documentary sense without overinterpreting the exact
    contents.
- source_word: Σίμωνι τῷ ἀρχιερεῖ
  chosen: to Simon the high priest
  alternatives:
  - for Simon the high priest
  lexicon: LSJ
  rationale: 'The dative here is best taken as indirect object: the copy was written
    to or for Simon. ''To Simon the high priest'' is the most straightforward English
    rendering.'
