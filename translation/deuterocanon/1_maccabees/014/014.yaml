theological_decisions:
- issue: Whether νόμος should be rendered with explicit covenantal capitalization
  chosen_reading: the law
  alternative_readings:
  - the Law
  rationale: The context strongly suggests the Jewish law/Torah, but the Greek itself
    does not mark capitalization. The main text keeps a readable, minimally interpretive
    rendering while preserving the covenantal sense in the rationale.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    readable modern English'
- issue: Whether ταπεινοὺς is primarily social ('lowly/poor') or moral ('humble')
  chosen_reading: the humble
  alternative_readings:
  - the lowly
  - the poor
  rationale: The term can carry both social and moral overtones. 'The humble' preserves
    that breadth and avoids prematurely resolving the nuance in one direction.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
