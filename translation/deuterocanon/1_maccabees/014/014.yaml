id: 1MA.14.14
reference: 1 Maccabees 14:14
source:
  edition: lxx-swete-1909
  text: καὶ ἐστήρισεν πάντας τοὺς ταπεινοὺς τοῦ λαοῦ αὐτοῦ· τὸν νόμον ἐξεζήτησεν,
    καὶ ἐξῆρεν πάντα ἄνομον καὶ πονηρόν.
  language: Greek
  pages:
  - 676
  confidence: high
  validation: agree
translation:
  text: And he strengthened all the humble of his people; he sought out the law, and
    removed every lawless and evil thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the lowly of his people.' The Greek can point to those of humble
      status as well as the humble in disposition.
    reason: lexical_alternative
  - marker: b
    text: '''The law'' likely refers to the ancestral Jewish law, that is, the Torah.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐστήρισεν
  chosen: strengthened
  alternatives:
  - established
  - supported
  - made firm
  lexicon: LSJ
  rationale: The verb commonly means to make firm or strengthen. In this context of
    Simon's governance toward the lowly, 'strengthened' preserves the concrete sense
    without sounding overly wooden.
- source_word: πάντας τοὺς ταπεινοὺς
  chosen: all the humble
  alternatives:
  - all the lowly
  - all the poor
  - all the oppressed
  lexicon: LSJ
  rationale: ταπεινός can denote humble, lowly, or socially afflicted persons. 'The
    humble' keeps the Greek adjective closely while allowing both social and moral
    nuance. 'Poor' would narrow the sense too much.
- source_word: τοῦ λαοῦ αὐτοῦ
  chosen: of his people
  alternatives:
  - among his people
  - of the people
  lexicon: LSJ
  rationale: A straightforward genitival relation. 'Of his people' is the most natural
    English rendering and preserves the possessive force.
- source_word: τὸν νόμον
  chosen: the law
  alternatives:
  - the Law
  lexicon: LSJ
  rationale: νόμος here likely refers to the Jewish law/Torah. Because 1 Maccabees
    often uses the term in a covenantal-national sense, 'the law' is accurate; capitalization
    as 'the Law' is possible, but the lower-case form avoids over-interpreting while
    remaining clear.
- source_word: ἐξεζήτησεν
  chosen: sought out
  alternatives:
  - sought diligently
  - investigated
  - searched out
  lexicon: LSJ
  rationale: The compound verb intensifies seeking. 'Sought out' conveys active, deliberate
    concern for the law without becoming cumbersome.
- source_word: ἐξῆρεν
  chosen: removed
  alternatives:
  - took away
  - eliminated
  - rooted out
  lexicon: LSJ
  rationale: The verb means to take away or remove. 'Removed' is broad enough to cover
    persons, practices, or conditions, which the neuter adjectives that follow may
    summarize.
- source_word: πάντα ἄνομον καὶ πονηρόν
  chosen: every lawless and evil thing
  alternatives:
  - everything lawless and wicked
  - every unlawful and evil thing
  lexicon: LSJ
  rationale: The neuter singular adjectives used substantivally after πάντα are well
    represented by 'every ... thing.' 'Lawless' echoes ἄνομον and keeps the connection
    with νόμος in the prior clause; 'evil' is the plain sense of πονηρόν.
