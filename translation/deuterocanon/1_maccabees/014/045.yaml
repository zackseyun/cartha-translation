id: 1MA.14.45
reference: 1 Maccabees 14:45
source:
  edition: lxx-swete-1909
  text: δʼ ἂν παρὰ ταῦτα ποιήσῃ ἢ ἀθετήσῃ τι τούτων, ἔνοχος ἔσται.
  language: Greek
  pages:
  - 679
  confidence: high
  validation: agree
translation:
  text: But if anyone does anything contrary to these things, or sets aside any of
    them, he shall be liable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he shall be guilty.' The Greek expression can denote legal liability
      or culpability.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρὰ ταῦτα
  chosen: contrary to these things
  alternatives:
  - against these things
  - besides these things
  lexicon: LSJ
  rationale: With ποιήσῃ, παρά + accusative here most naturally means acting in violation
    of or contrary to the stated provisions, not merely 'besides' them.
- source_word: ποιήσῃ
  chosen: does anything
  alternatives:
  - acts
  - does
  lexicon: BDAG
  rationale: The verb is broad and indefinite in this legal context. 'Does anything'
    brings out the implied object supplied by the surrounding phrase and fits the
    conditional formulation.
- source_word: ἀθετήσῃ
  chosen: sets aside
  alternatives:
  - nullifies
  - rejects
  - disregards
  lexicon: BDAG
  rationale: In a decree or legal setting, ἀθετέω means to invalidate, reject, or
    set aside. 'Sets aside' is clear modern English and preserves the juridical force
    without overtechnical wording.
- source_word: τι τούτων
  chosen: any of them
  alternatives:
  - anything of these
  - any of these things
  lexicon: LSJ
  rationale: The partitive expression refers to any item among the previously listed
    provisions. 'Any of them' is idiomatic English.
- source_word: ἔνοχος ἔσται
  chosen: he shall be liable
  alternatives:
  - he shall be guilty
  - he shall be held accountable
  lexicon: BDAG
  rationale: ἔνοχος in legal contexts denotes being liable or answerable to penalty.
    'Liable' best fits the formal decree context and avoids implying a specific moral
    nuance beyond the text.
