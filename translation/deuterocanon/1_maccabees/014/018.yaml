id: 1MA.14.18
reference: 1 Maccabees 14:18
source:
  edition: lxx-swete-1909
  text: καὶ ἔγραψαν πρὸς αὐτὸν δέλτους χαλκᾶς τοῦ ἀνανεώσασθαι πρὸς αὐτὸν φιλίαν καὶ
    τὴν συμμαχίαν ἣν ἔστησαν πρὸς Ἰούδαν καὶ Ἰωνάθαν τοὺς ἀδελφοὺς αὐτοῦ.
  language: Greek
  pages:
  - 676
  confidence: high
  validation: agree
translation:
  text: And they wrote to him on bronze tablets to renew with him the friendship and
    the alliance that they had established with Judas and Jonathan his brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bronze plaques.' The Greek refers to formal written tablets made of
      bronze, likely for durable public or diplomatic record.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψαν
  chosen: they wrote
  alternatives:
  - they inscribed
  - they sent in writing
  lexicon: LSJ
  rationale: The basic sense is 'wrote.' Because the object is bronze tablets, inscription
    is implied, but the verb itself does not require the more specific English 'inscribed.'
- source_word: δέλτους χαλκᾶς
  chosen: bronze tablets
  alternatives:
  - bronze plaques
  - tablets of bronze
  lexicon: LSJ
  rationale: δέλτος denotes a writing tablet; with χαλκᾶς it refers to tablets made
    of bronze. 'Bronze tablets' is natural modern English and preserves the material
    and formal character of the diplomatic document.
- source_word: τοῦ ἀνανεώσασθαι
  chosen: to renew
  alternatives:
  - for renewing
  - to renew formally
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose. 'To renew' captures the intended
    action succinctly in English.
- source_word: φιλίαν
  chosen: the friendship
  alternatives:
  - friendship
  - amicable relations
  lexicon: LSJ
  rationale: In diplomatic context φιλία refers to formal friendly relations between
    parties. 'The friendship' preserves the article and the quasi-technical treaty
    sense without overcomplicating the English.
- source_word: συμμαχίαν
  chosen: the alliance
  alternatives:
  - alliance
  - treaty alliance
  lexicon: LSJ
  rationale: συμμαχία is a military-political alliance. 'Alliance' is the standard
    concise rendering and pairs well with 'friendship' in this diplomatic formula.
- source_word: ἔστησαν
  chosen: they had established
  alternatives:
  - they made
  - they set up
  lexicon: LSJ
  rationale: Here the verb means to establish or conclude an arrangement. The pluperfect-like
    English 'had established' fits the prior relationship being renewed.
- source_word: πρὸς αὐτόν
  chosen: with him
  alternatives:
  - toward him
  - to him
  lexicon: LSJ
  rationale: In the treaty context, πρὸς with accusative after verbs of relationship
    is best rendered idiomatically as 'with him,' not woodenly as 'toward him.'
- source_word: Ἰούδαν καὶ Ἰωνάθαν τοὺς ἀδελφοὺς αὐτοῦ
  chosen: Judas and Jonathan his brothers
  alternatives:
  - Judas and Jonathan, his brothers
  - Judas and Jonathan, the brothers of him
  lexicon: LSJ
  rationale: The phrase identifies Simon's brothers. English naturally places 'his
    brothers' after both names; punctuation is not required in the main text.
