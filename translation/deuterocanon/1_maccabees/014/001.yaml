id: 1MA.14.1
reference: 1 Maccabees 14:1
source:
  edition: lxx-swete-1909
  text: Καὶ ἐν ἔτει δευτέρῳ καὶ ἑβδομηκοστῷ καὶ ἑκατοστῷ συνήγαγεν XIV Δημήτριος ὁ
    βασιλεὺς τὰς δυνάμεις αὐτοῦ, καὶ ἐπορεύθη εἰς Μηδίαν, τοῦ ἐπισπάσθαι βοήθειαν
    ἑαυτῷ, ὅπως πολεμήσῃ τὸν Τρύφωνα.
  language: Greek
  pages:
  - 675
  confidence: high
  validation: agree
translation:
  text: And in the one hundred seventy-second year, King Demetrius gathered his forces
    and went into Media, to obtain help for himself so that he might make war against
    Tryphon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The dating formula is usually understood according to the Seleucid era:
      literally, ''in the second and seventieth and hundredth year.'''
    reason: cultural_note
  - marker: b
    text: Or 'to secure help for himself' / 'to win assistance for himself.' The Greek
      verb suggests drawing or attracting aid.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἔτει δευτέρῳ καὶ ἑβδομηκοστῷ καὶ ἑκατοστῷ
  chosen: in the one hundred seventy-second year
  alternatives:
  - in year one hundred and seventy-two
  - in the 172nd year
  lexicon: LSJ
  rationale: The Greek expresses the Seleucid-era date with additive numeration ('second
    and seventieth and hundredth'). Idiomatic modern English renders this as 'the
    one hundred seventy-second year' while preserving the chronological reference.
- source_word: συνήγαγεν
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: LSJ
  rationale: Aorist of συνάγω here refers to bringing military forces together. 'Gathered'
    is clear and natural; 'mustered' is possible but slightly more specialized.
- source_word: τὰς δυνάμεις αὐτοῦ
  chosen: his forces
  alternatives:
  - his troops
  - his army
  lexicon: LSJ
  rationale: δυνάμεις in military context denotes armed forces. 'His forces' stays
    close to the Greek plural and avoids over-specifying a single army unit.
- source_word: ἐπορεύθη εἰς Μηδίαν
  chosen: went into Media
  alternatives:
  - marched into Media
  - went to Media
  lexicon: LSJ
  rationale: ἐπορεύθη is a common verb of going/journeying. 'Went into Media' preserves
    the movement into the region without adding the stronger military nuance of 'marched'
    beyond what the verb itself requires.
- source_word: τοῦ ἐπισπάσθαι βοήθειαν ἑαυτῷ
  chosen: to draw support to himself
  alternatives:
  - to secure help for himself
  - to win assistance for himself
  lexicon: LSJ
  rationale: The articular infinitive with τοῦ expresses purpose. ἐπισπάσθαι literally
    suggests drawing or attracting, and βοήθεια is help/assistance. 'Draw support
    to himself' preserves that sense of attracting aid while remaining readable.
- source_word: ὅπως πολεμήσῃ
  chosen: so that he might make war against
  alternatives:
  - so that he might fight
  - in order to wage war against
  lexicon: LSJ
  rationale: ὅπως with subjunctive marks intended result/purpose. πολεμέω in this
    context is broader than a single fight; 'make war against' captures sustained
    military action.
- source_word: τὸν Τρύφωνα
  chosen: Tryphon
  alternatives:
  - Triphon
  lexicon: LSJ
  rationale: Personal names are transliterated by standard convention. 'Tryphon' is
    the established English form from the Greek Τρύφων.
