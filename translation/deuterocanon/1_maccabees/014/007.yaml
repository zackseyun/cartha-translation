id: 1MA.14.7
reference: 1 Maccabees 14:7
source:
  edition: lxx-swete-1909
  text: καὶ συνήγαγεν αἰχμαλωσίαν πολλήν, καὶ ἐκυρίευσεν Γαζάρων καὶ Βαιθσούρων καὶ
    τῆς ἄκρας καὶ ἐξῆρεν τὰς ἀκαθαρσίας ἐξ αὐτῆς, καὶ οὐκ ἦν ὁ ἀντικείμενος αὐτῷ.
  language: Greek
  pages:
  - 675
  confidence: high
  validation: agree
translation:
  text: And he gathered a great number of captives, and he took control of Gezer and
    Beth-zur and the citadel, and he removed the uncleannesses from it, and there
    was no one opposing him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Acra,' the specific fortified stronghold in Jerusalem.
    reason: alternative_reading
lexical_decisions:
- source_word: συνήγαγεν
  chosen: gathered
  alternatives:
  - collected
  - assembled
  lexicon: LSJ
  rationale: The aorist of συνάγω here describes bringing together the results of
    conquest. 'Gathered' is a natural English equivalent that preserves the concrete
    action without overinterpreting motive.
- source_word: αἰχμαλωσίαν πολλήν
  chosen: a great number of captives
  alternatives:
  - much captivity
  - many prisoners of war
  lexicon: LSJ
  rationale: Literally the phrase can denote 'much captivity,' but in context it refers
    to persons taken captive. 'A great number of captives' communicates the sense
    in idiomatic English while staying close to the Greek.
- source_word: ἐκυρίευσεν
  chosen: took control of
  alternatives:
  - gained mastery over
  - captured
  - ruled
  lexicon: LSJ
  rationale: The verb means to become lord/master over or gain control of. 'Took control
    of' fits military-political seizure of places better than the narrower 'captured'
    alone and avoids implying long-term royal rule.
- source_word: Γαζάρων
  chosen: Gezer
  alternatives:
  - Gazara
  - Gazaron
  lexicon: LSJ
  rationale: The Greek place-name corresponds to the well-known site Gezer. Following
    the philosophy to transliterate names by standard conventions, 'Gezer' is preferable
    to a more Greek-shaped form.
- source_word: Βαιθσούρων
  chosen: Beth-zur
  alternatives:
  - Bethsura
  - Beth-zour
  lexicon: LSJ
  rationale: Standard English transliteration of the place-name is 'Beth-zur.' This
    preserves recognizability and aligns with common rendering of Semitic toponyms.
- source_word: τῆς ἄκρας
  chosen: the citadel
  alternatives:
  - the Acra
  - the fortress
  lexicon: LSJ
  rationale: ἄκρα can function as a common noun meaning citadel/fortress, though in
    Maccabean context it can also denote the specific Jerusalem stronghold known as
    the Acra. The common-noun rendering is transparent from the Greek; the proper-name
    alternative is preserved in a footnote.
- source_word: ἐξῆρεν
  chosen: removed
  alternatives:
  - cleared away
  - took away
  lexicon: LSJ
  rationale: The verb indicates taking out or removing. 'Removed' is concise and fits
    the cleansing action described.
- source_word: τὰς ἀκαθαρσίας
  chosen: the uncleannesses
  alternatives:
  - the impurities
  - the defilements
  - the unclean things
  lexicon: LSJ
  rationale: The plural denotes sources or instances of ritual/moral impurity. 'Uncleannesses'
    keeps the cultic sense more directly than 'impurities,' though English is slightly
    less idiomatic; this preserves the likely religious dimension of the cleansing.
- source_word: ἐξ αὐτῆς
  chosen: from it
  alternatives:
  - from her
  - out of it
  lexicon: LSJ
  rationale: The pronoun most naturally refers back to the immediately preceding feminine
    noun ἄκρα. English 'it' is appropriate for a place.
- source_word: ὁ ἀντικείμενος αὐτῷ
  chosen: no one opposing him
  alternatives:
  - no adversary against him
  - none who resisted him
  lexicon: LSJ
  rationale: The participle means one who opposes or stands against. 'No one opposing
    him' is readable modern English and preserves the ongoing sense of opposition
    being absent.
