theological_decisions:
- issue: Cultic significance of ἀκαθαρσίαι
  chosen_reading: 'Rendered with cultically marked language: ''uncleannesses.'''
  alternative_readings:
  - impurities
  - defilements
  rationale: In the Maccabean context, cleansing a captured stronghold likely carries
    religious as well as physical significance. The chosen wording preserves that
    theological/cultic resonance without specifying more than the Greek states.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Whether ἄκρα is translated as title-like proper name or common noun
  chosen_reading: Translated in the main text as 'the citadel.'
  alternative_readings:
  - the Acra
  rationale: The Greek article with ἄκρα can be read as a common noun, and optimal
    equivalence favors transparent meaning in the main text. Because the term may
    also denote the historically specific Jerusalem Acra, that alternative is preserved
    in a footnote rather than suppressed.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
