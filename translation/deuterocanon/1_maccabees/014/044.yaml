id: 1MA.14.44
reference: 1 Maccabees 14:44
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἔξεστιν οὐδενὶ τοῦ λαοῦ καὶ τῶν ἱερέων ἀθετῆσαί τι τούτων καὶ ἀντειπεῖν
    τοῖς ὑπʼ αὐτοῦ ῥηθησομένοις, καὶ ἐπιστρέψαι συστροφὴν ἐν τῇ χώρᾳ ἄνευ αὐτοῦ, καὶ
    περιβαλέσθαι πορφύραν καὶ ἐνπορποῦσθαι πόρπην χρυσῆν.
  language: Greek
  pages:
  - 679
  confidence: high
  validation: agree
translation:
  text: And it is not permitted for anyone of the people or of the priests to set
    aside any of these things, or to contradict what is said by him, or to convene
    an assembly in the country without him, or to put on purple and wear a gold clasp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'to organize a faction in the country without him.' The Greek
      phrase involving συστροφή can suggest a gathering, coalition, or potentially
      a factional assembly.
    reason: lexical_alternative
  - marker: b
    text: Purple clothing and a gold clasp were marks of rank or official honor.
    reason: cultural_note
lexical_decisions:
- source_word: οὐκ ἔξεστιν
  chosen: it is not permitted
  alternatives:
  - it is not lawful
  - no one may
  lexicon: LSJ
  rationale: Conveys formal prohibition in clear modern English without over-legalizing
    beyond the Greek idiom.
- source_word: ἀθετῆσαί
  chosen: to set aside
  alternatives:
  - to nullify
  - to reject
  lexicon: LSJ
  rationale: Captures the sense of invalidating or disregarding enacted provisions;
    'set aside' is idiomatic and broad enough for the decrees in view.
- source_word: τούτων
  chosen: these things
  alternatives:
  - these provisions
  - these decrees
  lexicon: LSJ
  rationale: The pronoun refers back to the previously stated resolutions. 'These
    things' stays close to the Greek while remaining intelligible.
- source_word: ἀντειπεῖν
  chosen: to contradict
  alternatives:
  - to oppose
  - to speak against
  lexicon: LSJ
  rationale: The verb denotes speaking against or objecting. 'Contradict' fits the
    immediate context of resisting his pronouncements.
- source_word: τοῖς ὑπʼ αὐτοῦ ῥηθησομένοις
  chosen: what is said by him
  alternatives:
  - the things that will be spoken by him
  - what he says
  lexicon: LSJ
  rationale: The future passive participle literally points to things to be spoken
    by him. English idiom favors a present-like rendering here for standing authority,
    while preserving that the content originates with him.
- source_word: ἐπιστρέψαι συστροφὴν
  chosen: to convene an assembly
  alternatives:
  - to stir up a gathering
  - to organize a faction
  lexicon: LSJ
  rationale: The phrase is difficult, but in context it forbids calling together a
    public gathering or organized body apart from his authority. 'Convene an assembly'
    best fits the civic setting without importing a stronger negative sense like 'rebellion'
    unless the text requires it.
- source_word: ἐν τῇ χώρᾳ
  chosen: in the country
  alternatives:
  - in the land
  - in the region
  lexicon: LSJ
  rationale: Refers to the territory or land under governance. 'Country' is natural
    English in this administrative context.
- source_word: περιβαλέσθαι πορφύραν
  chosen: to put on purple
  alternatives:
  - to wear purple clothing
  - to clothe oneself in purple
  lexicon: LSJ
  rationale: Purple signifies high status or official dignity. The concise rendering
    preserves the symbolic force.
- source_word: ἐνπορποῦσθαι πόρπην χρυσῆν
  chosen: wear a gold clasp
  alternatives:
  - fasten on a gold brooch
  - be adorned with a gold buckle
  lexicon: LSJ
  rationale: The verb and noun together describe fastening or wearing a golden ornamental
    clasp/brooch, likely an insignia of rank. 'Gold clasp' is understandable and suitably
    restrained.
