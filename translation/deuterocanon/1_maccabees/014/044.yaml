theological_decisions:
- issue: Nature of the prohibition in the civic decree
  chosen_reading: The verse is rendered as a legal-political restriction establishing
    Simon's exclusive authority, not as a theological claim.
  alternative_readings:
  - A stronger rendering could imply rebellion or sedition in the clause about συστροφή.
  rationale: The context in 1 Maccabees 14 is a public decree honoring and empowering
    Simon. The translation avoids importing theological or moral judgments beyond
    the civic language of the Greek.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    tension rather than resolve it'
