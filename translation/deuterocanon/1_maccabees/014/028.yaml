id: 1MA.14.28
reference: 1 Maccabees 14:28
source:
  edition: lxx-swete-1909
  text: ἐν Σαραμέλ, ἐπὶ συναγωγῆς μεγάλης τῶν ἱερέων καὶ λαοῦ καὶ ἀρχόντων ἔθνους
    καὶ τῶν πρεσβυτέρων τῆς χώρας ἐγνώσθη ἡμῖν.
  language: Greek
  pages:
  - 677
  confidence: high
  validation: agree
translation:
  text: 'At Saramel, in a great assembly of the priests and the people and the leaders
    of the nation and the elders of the country, it was made known to us:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In Saramel.' The Greek preposition can be rendered either way with a
      place name.
    reason: lexical_alternative
  - marker: b
    text: Or 'rulers of the nation ... elders of the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν Σαραμέλ
  chosen: At Saramel
  alternatives:
  - In Saramel
  lexicon: LSJ
  rationale: ἐν with a place name can be rendered 'in' or 'at'; 'at' fits an event-location
    formula in English. The place name is transliterated rather than translated, following
    the philosophy for names.
- source_word: συναγωγῆς μεγάλης
  chosen: a great assembly
  alternatives:
  - a great gathering
  - a large assembly
  lexicon: LSJ
  rationale: συναγωγή here denotes an assembled gathering rather than a later technical
    synagogue building. 'Assembly' best captures the corporate public meeting; μεγάλη
    is rendered 'great' to preserve the formal, honorific tone rather than merely
    numerical size.
- source_word: τῶν ἱερέων καὶ λαοῦ καὶ ἀρχόντων ἔθνους καὶ τῶν πρεσβυτέρων τῆς χώρας
  chosen: of the priests and the people and the leaders of the nation and the elders
    of the country
  alternatives:
  - of the priests and people and rulers of the nation and elders of the land
  lexicon: LSJ
  rationale: The genitive chain is preserved with coordinated groups. ἀρχόντων is
    rendered 'leaders' for readable modern English; 'rulers' is possible but may overstate
    formal office. ἔθνος in this Jewish national context is best rendered 'nation.'
    χώρα is rendered 'country' as a natural equivalent for the territory/land.
- source_word: ἐγνώσθη ἡμῖν
  chosen: it was made known to us
  alternatives:
  - it became known to us
  - it was known by us
  lexicon: LSJ
  rationale: The aorist passive of γινώσκω here functions idiomatically to introduce
    a formal public declaration. 'It was made known to us' preserves the passive and
    the official tone better than the less explicit 'it became known to us'.
