theological_decisions:
- issue: Political encomium of Simon's leadership
  chosen_reading: Render the verse as a historical commendation without importing
    covenantal or messianic overtones.
  alternative_readings:
  - Read 'the land was at rest' as a theologically loaded statement of divinely granted
    peace
  rationale: The Greek presents a positive summary of Simon's rule in national-historical
    terms. Nothing in the verse explicitly attributes the rest to divine action or
    frames Simon in messianic categories, so the translation remains restrained.
  doctrine_reference: Translation philosophy §§1, 3
