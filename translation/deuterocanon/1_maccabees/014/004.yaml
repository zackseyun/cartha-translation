id: 1MA.14.4
reference: 1 Maccabees 14:4
source:
  edition: lxx-swete-1909
  text: Καὶ ἡσύχασεν ἡ γῆ πάσας τὰς ἡμέρας Σίμωνος, καὶ ἐζήτησεν ἀγαθὰ τῷ ἔθνει αὐτοῦ·
    καὶ ἤρεσεν αὐτοῖς ἡ ἐξουσία αὐτοῦ καὶ ἡ δόξα αὐτοῦ πάσας τὰς ἡμέρας.
  language: Greek
  pages:
  - 675
  confidence: high
  validation: agree
translation:
  text: And the land was at rest all the days of Simon, and he sought good for his
    nation; and his authority and his glory were pleasing to them all his days.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡσύχασεν
  chosen: was at rest
  alternatives:
  - was quiet
  - had peace
  - was tranquil
  lexicon: LSJ
  rationale: The aorist of ἡσυχάζω here describes the land's settled condition under
    Simon. 'Was at rest' preserves the stative sense and reads naturally in English
    without overstating it as a formal peace treaty.
- source_word: ἡ γῆ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: LSJ
  rationale: In this historical-national context, γῆ refers to the territory/land
    of the people rather than the whole earth. 'The land' is the most natural and
    contextually precise rendering.
- source_word: ἐζήτησεν ἀγαθὰ
  chosen: sought good
  alternatives:
  - sought what was good
  - worked for the good
  - sought benefits
  lexicon: LSJ
  rationale: The phrase is straightforward and idiomatic enough to retain closely.
    'Sought good' preserves the verbal idea of actively pursuing the welfare of the
    nation without adding interpretive expansion.
- source_word: τῷ ἔθνει αὐτοῦ
  chosen: for his nation
  alternatives:
  - for his people
  - for his people-group
  lexicon: LSJ
  rationale: ἔθνος in 1 Maccabees often denotes the Jewish nation as a corporate political-ethnic
    body. 'Nation' better preserves that collective sense than the more general 'people'.
- source_word: ἡ ἐξουσία αὐτοῦ
  chosen: his authority
  alternatives:
  - his rule
  - his power
  - his dominion
  lexicon: LSJ
  rationale: ἐξουσία denotes delegated or exercised authority/power. 'Authority' is
    broad and accurate, avoiding the stronger monarchical nuance of 'dominion' and
    the more interpretive 'rule'.
- source_word: ἡ δόξα αὐτοῦ
  chosen: his glory
  alternatives:
  - his honor
  - his splendor
  - his renown
  lexicon: LSJ
  rationale: δόξα can denote honor, reputation, or glory. 'Glory' keeps the elevated
    tone of the Greek and pairs well with 'authority,' while still fitting a historical
    encomium.
- source_word: ἤρεσεν αὐτοῖς
  chosen: were pleasing to them
  alternatives:
  - pleased them
  - found favor with them
  lexicon: LSJ
  rationale: The singular verb with the compound subject can be represented naturally
    in English by 'were pleasing to them.' This preserves the evaluative sense without
    flattening the two subjects into a single abstract idea.
- source_word: πάσας τὰς ἡμέρας ... πάσας τὰς ἡμέρας
  chosen: all the days ... all his days
  alternatives:
  - throughout all the days
  - all his lifetime
  lexicon: LSJ
  rationale: 'The repetition is retained to reflect the Greek''s emphatic framing:
    the land''s rest lasted throughout Simon''s days, and his authority and glory
    were pleasing throughout his lifetime.'
