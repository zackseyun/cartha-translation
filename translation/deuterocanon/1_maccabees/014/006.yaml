id: 1MA.14.6
reference: 1 Maccabees 14:6
source:
  edition: lxx-swete-1909
  text: καὶ ἐπλάτυνεν τὰ ὅρια τῷ ἔθνει αὐτοῦ, καὶ ἐκράτησεν τῆς χώρας.
  language: Greek
  pages:
  - 675
  confidence: high
  validation: agree
translation:
  text: And he enlarged the borders of his nation, and gained control of the country.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπλάτυνεν
  chosen: enlarged
  alternatives:
  - widened
  - extended
  lexicon: LSJ
  rationale: The verb from πλατύνω literally means to make broad or widen. In context
    of territorial expansion, 'enlarged' is natural modern English while preserving
    the concrete sense.
- source_word: τὰ ὅρια
  chosen: the borders
  alternatives:
  - the boundaries
  - the territory
  lexicon: LSJ
  rationale: ὅρια refers to boundaries or border limits. 'Borders' best fits the geopolitical
    context and pairs naturally with territorial enlargement.
- source_word: τῷ ἔθνει αὐτοῦ
  chosen: of his nation
  alternatives:
  - for his people
  - for his nation
  lexicon: LSJ
  rationale: ἔθνος can mean nation, people, or ethnic group. Here the political-national
    sense is prominent in a military-administrative context, so 'his nation' is preferred
    over the more generic 'his people'.
- source_word: ἐκράτησεν
  chosen: gained control of
  alternatives:
  - took possession of
  - prevailed over
  - ruled
  lexicon: LSJ
  rationale: κρατέω commonly means to be strong over, seize, or gain mastery. With
    the genitive τῆς χώρας, the sense is exercising dominion or control. 'Gained control
    of' communicates the result clearly without overstating legal ownership.
- source_word: τῆς χώρας
  chosen: the country
  alternatives:
  - the land
  - the region
  lexicon: LSJ
  rationale: χώρα can denote land, country, or region. Since τὰ ὅρια already covers
    border language, 'the country' avoids repetition and conveys the broader territorial
    domain.
