id: 1MA.14.30
reference: 1 Maccabees 14:30
source:
  edition: lxx-swete-1909
  text: καὶ ἠθροισεν Ἰωνάθαν τὸ ἔθνος αὐτῶν, καὶ ἐγενήθη αὐτοῖς ἀρχιερεύς, καὶ προσετέθη
    πρὸς τὸν λαὸν αὐτοῦ.
  language: Greek
  pages:
  - 677
  confidence: high
  validation: agree
translation:
  text: And Jonathan gathered their nation, and became their high priest, and was
    added to his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'was gathered to his people,' a familiar biblical idiom for death.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠθροισεν
  chosen: gathered
  alternatives:
  - assembled
  - brought together
  lexicon: LSJ
  rationale: Aorist of ἀθροίζω, meaning to gather or assemble. 'Gathered' is natural
    English and preserves the action without over-specifying the manner.
- source_word: τὸ ἔθνος αὐτῶν
  chosen: their nation
  alternatives:
  - their people
  - their ethnic group
  lexicon: LSJ
  rationale: ἔθνος can mean nation, people, or gentile group depending on context.
    Here it refers to the collective body belonging to 'them'; 'nation' preserves
    the corporate-political sense better than the more generic 'people.'
- source_word: ἐγενήθη ... ἀρχιερεύς
  chosen: became their high priest
  alternatives:
  - was made their high priest
  - served as their high priest
  lexicon: LSJ
  rationale: ἐγενήθη with predicate noun naturally yields 'became.' ἀρχιερεύς is the
    standard term for 'high priest.' The possessive αὐτοῖς is represented as 'their.'
- source_word: προσετέθη πρὸς τὸν λαὸν αὐτοῦ
  chosen: was added to his people
  alternatives:
  - was gathered to his people
  - was joined to his people
  lexicon: LSJ
  rationale: This is a conventional idiom for death or reunion with one's ancestors/people.
    'Was added to his people' is the most direct rendering of the Greek; the more
    idiomatic 'was gathered to his people' is worth preserving in a footnote because
    it may better signal the idiomatic sense.
- source_word: λαός
  chosen: people
  alternatives:
  - folk
  lexicon: LSJ
  rationale: λαός commonly means 'people' in a collective sense. 'People' is standard
    and dignified English.
