id: 1MA.14.8
reference: 1 Maccabees 14:8
source:
  edition: lxx-swete-1909
  text: καὶ ἦσαν γεωργοῦντες τὴν γῆν αὐτῶν μετʼ εἰρήνης, καὶ ἡ γῆ ἐδίδου 8 τὰ γενήματα
    αὐτῆς, καὶ τὰ ξύλα τῶν πεδίων τὸν καρπὸν αὐτῶν. Α
  language: Greek
  pages:
  - 675
  confidence: high
  validation: agree
translation:
  text: And they were cultivating their land in peace, and the land was yielding its
    produce, and the trees of the plains their fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the trees of the fields their fruit.' The Greek πεδίων can mean 'plains'
      or more generally 'open fields/countryside.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γεωργοῦντες
  chosen: cultivating
  alternatives:
  - farming
  - working
  lexicon: LSJ
  rationale: The participle denotes agricultural labor on the land. 'Cultivating'
    preserves the active, ongoing sense without narrowing it merely to ownership or
    generic labor.
- source_word: γῆν
  chosen: land
  alternatives:
  - earth
  - soil
  - country
  lexicon: LSJ
  rationale: In context this refers to their agricultural territory/fields rather
    than the earth in general. 'Land' is the most natural and contextually precise
    English rendering.
- source_word: μετʼ εἰρήνης
  chosen: in peace
  alternatives:
  - peacefully
  - in safety
  lexicon: LSJ
  rationale: The phrase expresses the condition under which they farmed. 'In peace'
    keeps the noun-based expression of the Greek and can include both tranquility
    and security.
- source_word: ἐδίδου
  chosen: was yielding
  alternatives:
  - gave
  - was giving
  lexicon: LSJ
  rationale: The imperfect indicates ongoing or customary action. 'Was yielding' conveys
    repeated/productive agricultural output in idiomatic English.
- source_word: γενήματα
  chosen: produce
  alternatives:
  - crops
  - harvest
  - fruits
  lexicon: LSJ
  rationale: A broad agricultural term is needed here. 'Produce' fits the land's output
    generally, while the next clause separately specifies the fruit of the trees.
- source_word: ξύλα
  chosen: trees
  alternatives:
  - wood
  - timber
  lexicon: LSJ
  rationale: Although literally 'woods' or 'trees/wood,' the following phrase 'their
    fruit' shows living fruit-bearing trees are meant, not timber.
- source_word: πεδίων
  chosen: of the plains
  alternatives:
  - of the fields
  - of the open country
  lexicon: LSJ
  rationale: πέδιον commonly denotes a plain or level open land. 'Of the plains' preserves
    the geographic nuance better than the more generic 'fields,' especially since
    γῆ already covered the cultivated land.
- source_word: καρπὸν
  chosen: fruit
  alternatives:
  - crop
  - produce
  lexicon: LSJ
  rationale: With trees as the subject, 'fruit' is the most direct and natural rendering.
