id: 1MA.14.27
reference: 1 Maccabees 14:27
source:
  edition: lxx-swete-1909
  text: καὶ τοῦτο τὸ ἀντίγραφον τῆς γραφῆς Ὀκτωκαιδεκάτῃ Ἐλοὺλ, ἔτους δευτέρου ἑβδομηκοστοῦ
    καὶ ἑκατοστοῦ, καὶ τοῦτο τρίτον ἔτος ἐπὶ Σίμωνος τοῦ ἀρχιερέως,
  language: Greek
  pages:
  - 677
  confidence: high
  validation: agree
translation:
  text: 'And this is the copy of the writing: On the eighteenth of Elul, in the one
    hundred seventy-second year, and this was the third year under Simon the high
    priest,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the copy of the writing.' The Greek term can be rendered more literally
      as 'writing,' but here it refers to an official written document.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντίγραφον
  chosen: copy
  alternatives:
  - transcript
  - duplicate
  lexicon: LSJ
  rationale: ἀντίγραφον denotes a copy or duplicate of a written text. 'Copy' is the
    most natural modern English rendering and fits the documentary context.
- source_word: γραφῆς
  chosen: document
  alternatives:
  - writing
  - record
  lexicon: LSJ
  rationale: γραφῆς here refers to a written instrument or record rather than 'Scripture.'
    'Document' best conveys an official written text in this administrative setting.
- source_word: Ὀκτωκαιδεκάτῃ
  chosen: eighteenth
  alternatives:
  - on the eighteenth day
  lexicon: LSJ
  rationale: The dative feminine ordinal functions with the month name to date the
    document. English idiom supplies 'On the eighteenth of Elul' naturally.
- source_word: Ἐλοὺλ
  chosen: Elul
  lexicon: LSJ
  rationale: Month names are transliterated rather than translated, following the
    project's policy for names and preserving the Jewish calendrical setting.
- source_word: ἔτους δευτέρου ἑβδομηκοστοῦ καὶ ἑκατοστοῦ
  chosen: in the one hundred seventy-second year
  alternatives:
  - in year one hundred and seventy-two
  - in the hundred and seventy-second year
  lexicon: LSJ
  rationale: This is the standard Greek way of expressing a regnal/era year. 'One
    hundred seventy-second year' is clear modern English while staying close to the
    source.
- source_word: τοῦτο τρίτον ἔτος
  chosen: this was the third year
  alternatives:
  - this being the third year
  - and this the third year
  lexicon: LSJ
  rationale: The clause is explanatory, clarifying the dating relative to Simon's
    tenure. Rendering it as a finite clause reads naturally in English without losing
    the appositional force.
- source_word: ἐπὶ Σίμωνος
  chosen: under Simon
  alternatives:
  - in the time of Simon
  - during Simon's tenure
  lexicon: LSJ
  rationale: ἐπί with the genitive in dating formulas commonly means 'in the time
    of' or 'under' a ruler/official. 'Under Simon' is concise and idiomatic in an
    official chronological notice.
- source_word: τοῦ ἀρχιερέως
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: LSJ
  rationale: ἀρχιερεύς is the standard term for the Jewish high priest. 'High priest'
    is the established and accurate English equivalent.
