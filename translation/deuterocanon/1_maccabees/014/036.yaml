theological_decisions:
- issue: Cultic terminology near the temple
  chosen_reading: Render defilement and purity language in explicitly cultic terms
    ('defile,' 'sanctuary,' 'purity')
  alternative_readings:
  - Use more generalized language such as 'corrupt' and 'sacred place'
  rationale: The Greek emphasizes ritual contamination in relation to the holy precincts.
    Preserving that cultic register avoids flattening the temple-centered theology
    of the passage.
