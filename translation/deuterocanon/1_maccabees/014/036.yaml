id: 1MA.14.36
reference: 1 Maccabees 14:36
source:
  edition: lxx-swete-1909
  text: καὶ ἐν ταῖς ἡμέραις αὐτοῦ εὐοδώθη ἐν ταῖς χερσὶν αὐτοῦ, τοῦ ἐξαρθῆναι τὰ ἔθνη
    ἐκ τῆς χώρας αὐτῶν, καὶ τοὺς ἐν τῇ πόλει Δαυεὶδ τοὺς ἐν Ἰερουσαλὴμ οἳ ἐποίησαν
    ἑαυτοῖς ἄκραν ἐξ ἧς ἐξεπορεύοντο, καὶ ἐμίανον κύκλῳ τῶν ἁγίων, καὶ ἐποίουν πληγὴν
    μεγάλην ἐν τῇ ἁγνείᾳ.
  language: Greek
  pages:
  - 678
  confidence: high
  validation: agree
translation:
  text: And in his days it prospered in his hands to remove the nations from their
    land, and those in the city of David in Jerusalem who had made for themselves
    a citadel, from which they would go out and defile the area around the sanctuary,
    and they inflicted great damage on its purity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Acra,' the fortified citadel in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐοδώθη
  chosen: it prospered
  alternatives:
  - he prospered
  - it succeeded
  lexicon: LSJ
  rationale: The verb is passive/aorist and here functions impersonally with ἐν ταῖς
    χερσὶν αὐτοῦ, indicating success/prosperity attending his efforts. 'It prospered
    in his hands' preserves the Greek idiom more closely than a fully smoothed 'he
    succeeded,' while remaining understandable.
- source_word: ἐν ταῖς χερσὶν αὐτοῦ
  chosen: in his hands
  alternatives:
  - under his control
  - through him
  lexicon: LSJ
  rationale: This is a common idiom for agency or effective power. Retaining 'in his
    hands' preserves the source imagery and keeps the clause auditable.
- source_word: τοῦ ἐξαρθῆναι
  chosen: to remove
  alternatives:
  - to root out
  - to expel
  lexicon: LSJ
  rationale: The infinitive expresses the successful outcome. 'Remove' fits both the
    nations and the hostile occupants of the citadel without over-specifying whether
    the emphasis is extermination or expulsion; 'root out' is possible but stronger.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the foreign nations
  lexicon: LSJ
  rationale: In 1 Maccabees this often refers to surrounding non-Jewish peoples/powers,
    but the basic lexical sense is 'nations.' 'Gentiles' is possible yet more interpretive;
    'nations' is the more transparent rendering.
- source_word: χώρα
  chosen: land
  alternatives:
  - country
  - territory
  lexicon: LSJ
  rationale: '''Land'' is the most natural and broad equivalent here for the territory
    from which the nations were removed.'
- source_word: ἄκραν
  chosen: a citadel
  alternatives:
  - the Acra
  - a fortress
  lexicon: LSJ
  rationale: Lexically ἄκρα means a citadel/fortress. Because in Maccabean context
    this likely refers to the well-known Acra in Jerusalem, that proper-name-like
    sense is worth preserving in a footnote, but the main text translates the common
    noun.
- source_word: ἐμίανον
  chosen: defile
  alternatives:
  - pollute
  - profane
  lexicon: LSJ
  rationale: The verb denotes ritual/moral contamination. 'Defile' best matches the
    cultic context near the sanctuary.
- source_word: κύκλῳ τῶν ἁγίων
  chosen: the area around the sanctuary
  alternatives:
  - the environs of the holy place
  - all around the holy things
  lexicon: LSJ
  rationale: The phrase is somewhat compressed. Given the temple context and the following
    reference to purity, 'the area around the sanctuary' communicates the likely sense
    in idiomatic English while preserving cultic reference. A more literal 'around
    the holy things' is possible but less clear in English.
- source_word: πληγὴν μεγάλην
  chosen: great damage
  alternatives:
  - a great blow
  - a great wound
  lexicon: LSJ
  rationale: The expression is metaphorical here for serious harm done to sacred purity/order.
    'Great damage' is idiomatic and fits the context better than a bodily metaphor.
- source_word: ἁγνείᾳ
  chosen: its purity
  alternatives:
  - holiness
  - purity
  - consecration
  lexicon: LSJ
  rationale: ἁγνεία emphasizes purity/cleanness rather than holiness in the abstract.
    The pronoun 'its' refers to the sanctuary area/context implied by the preceding
    clause, making the English coherent.
