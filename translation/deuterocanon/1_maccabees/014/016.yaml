id: 1MA.14.16
reference: 1 Maccabees 14:16
source:
  edition: lxx-swete-1909
  text: Καὶ ἤκουσεν ἐν Ῥώμῃ ὅτι ἀπέθανεν Ἰωνάθαν, καὶ ἕως Σπάρτης, καὶ ἐλυπήθησαν
    σφόδρα.
  language: Greek
  pages:
  - 676
  confidence: high
  validation: agree
translation:
  text: And in Rome, and even as far as Sparta, they heard that Jonathan had died,
    and they were deeply grieved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a singular verb (''heard'') before the plural ''they were grieved.''
      The translation renders the sense collectively: the people in Rome, and as far
      as Sparta, heard the news.'
    reason: textual_variant
lexical_decisions:
- source_word: ἤκουσεν
  chosen: they heard
  alternatives:
  - he heard
  - news was heard
  lexicon: LSJ
  rationale: 'The singular form in the transmitted text sits awkwardly with the following
    plural verb ἐλυπήθησαν and the plural locations. The sense is collective/impersonal:
    the people in Rome and Sparta heard the news. English idiom is best served by
    rendering the understood plural subject explicitly as ''they heard.'''
- source_word: ἐν Ῥώμῃ
  chosen: in Rome
  alternatives:
  - at Rome
  lexicon: LSJ
  rationale: Straightforward locative use of ἐν with the city name.
- source_word: καὶ ἕως Σπάρτης
  chosen: and as far as Sparta
  alternatives:
  - and even to Sparta
  - and in Sparta
  lexicon: LSJ
  rationale: ἕως with the genitive naturally expresses extent, 'as far as Sparta.'
    This preserves the geographic spread of the report rather than flattening it to
    a second simple location.
- source_word: ἀπέθανεν
  chosen: had died
  alternatives:
  - died
  - was dead
  lexicon: LSJ
  rationale: 'English past perfect fits the reported-news context: they heard that
    Jonathan had died.'
- source_word: ἐλυπήθησαν σφόδρα
  chosen: they were deeply grieved
  alternatives:
  - they were very grieved
  - they were greatly saddened
  lexicon: LSJ
  rationale: The passive/deponent verb with σφόδρα conveys strong sorrow. 'Deeply
    grieved' is natural modern English while preserving the intensity.
