id: 1MA.14.9
reference: 1 Maccabees 14:9
source:
  edition: lxx-swete-1909
  text: πρεσβύτεροι ἐν ταῖς πλατείαις ἐκάθηντο, πάντες περὶ ἀγαθῶν ἐκοινολόγουν, καὶ
    οἱ νεανίσκοι ἐνεδύσαντο δόξας καὶ στολὰς πολέμου.
  language: Greek
  pages:
  - 676
  confidence: high
  validation: agree
translation:
  text: The elders sat in the public squares; all of them talked together about good
    things, and the young men put on splendid garments and armor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'glories and garments of war.' The first term is idiomatic
      in context and likely refers to splendid adornment or honorable attire.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρεσβύτεροι
  chosen: elders
  alternatives:
  - older men
  lexicon: LSJ
  rationale: In this civic setting the term naturally denotes senior men/elders of
    the community rather than merely men advanced in age. 'Elders' preserves the social
    nuance without over-specifying an official office.
- source_word: ἐν ταῖς πλατείαις
  chosen: in the public squares
  alternatives:
  - in the streets
  - in the broad places
  lexicon: LSJ
  rationale: πλατεῖαι refers to broad streets or open squares within a town. 'Public
    squares' best conveys the communal urban setting in idiomatic modern English.
- source_word: ἐκάθηντο
  chosen: sat
  alternatives:
  - were sitting
  - took their seats
  lexicon: LSJ
  rationale: The imperfect describes a customary or scene-setting action. Simple past
    'sat' reads naturally in English while preserving the basic posture/image.
- source_word: πάντες
  chosen: all of them
  alternatives:
  - all
  - everyone
  lexicon: LSJ
  rationale: The phrase emphasizes the collective participation of the elders. 'All
    of them' makes the referent explicit in English.
- source_word: περὶ ἀγαθῶν
  chosen: about good things
  alternatives:
  - about good matters
  - about prosperity
  - about blessings
  lexicon: LSJ
  rationale: The Greek is broad and does not specify a single concrete topic. 'Good
    things' preserves that openness and matches the positive social picture of peace
    and wellbeing.
- source_word: ἐκοινολόγουν
  chosen: talked together
  alternatives:
  - conversed
  - discussed together
  lexicon: LSJ
  rationale: The verb denotes conversing or talking in company. 'Talked together'
    preserves the communal sense signaled by the compound form without sounding overly
    formal.
- source_word: οἱ νεανίσκοι
  chosen: the young men
  alternatives:
  - the youths
  lexicon: LSJ
  rationale: The term refers to younger males of the community. 'Young men' is clear,
    natural, and gender-accurate to the Greek.
- source_word: ἐνεδύσαντο
  chosen: put on
  alternatives:
  - clothed themselves with
  - wore
  lexicon: LSJ
  rationale: The middle verb literally means to dress oneself. 'Put on' is straightforward
    and preserves the action.
- source_word: δόξας
  chosen: splendid garments
  alternatives:
  - glories
  - ornaments
  - marks of honor
  lexicon: LSJ
  rationale: Literally 'glories,' but in this clothing context the sense is of splendid
    or honorable adornment. Rendering it woodenly as 'glories' would be obscure in
    English, so 'splendid garments' conveys visible finery while staying anchored
    to the context.
- source_word: στολὰς πολέμου
  chosen: armor
  alternatives:
  - military attire
  - war garments
  lexicon: LSJ
  rationale: The phrase literally means 'robes/garments of war,' referring to martial
    dress or equipment. 'Armor' is concise and idiomatic, though broader than strictly
    textile clothing; it captures the military sense for modern readers.
