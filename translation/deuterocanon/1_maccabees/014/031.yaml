id: 1MA.14.31
reference: 1 Maccabees 14:31
source:
  edition: lxx-swete-1909
  text: καὶ ἐβουλήθησαν οἱ ἐχθροὶ αὐτῶν ἐμβατεῦσαι εἰς τὴν χώραν αὐτῶν τοῦ ἐκτρῖψαι
    τὴν χώραν αὐτῶν, καὶ ἐκτεῖναι τὰς χεῖρας ἐπὶ τὰ ἅγια αὐτῶν.
  language: Greek
  pages:
  - 677
  confidence: high
  validation: agree
translation:
  text: And their enemies planned to invade their land, to wipe out their land and
    to stretch out their hands against their holy places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sanctuary' or 'their holy things' for 'their holy places'; Greek
      has the plural τὰ ἅγια.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβουλήθησαν
  chosen: planned
  alternatives:
  - resolved
  - decided
  - intended
  lexicon: LSJ
  rationale: The verb denotes forming a plan or intention. 'Planned' fits the hostile
    deliberative sense in clear modern English without overstating formal resolution.
- source_word: ἐμβατεῦσαι
  chosen: to invade
  alternatives:
  - to enter
  - to march into
  lexicon: LSJ
  rationale: Although literally 'to step into' or 'enter,' in this military context
    with εἰς τὴν χώραν it carries the sense of hostile incursion. 'Invade' makes the
    implied aggression explicit from context.
- source_word: χώραν
  chosen: land
  alternatives:
  - country
  - territory
  - region
  lexicon: LSJ
  rationale: '''Land'' is the most natural rendering here and works both for the first
    and second occurrence, preserving repetition in the Greek.'
- source_word: τοῦ ἐκτρῖψαι
  chosen: to wipe out
  alternatives:
  - to destroy
  - to blot out
  - to ravage
  lexicon: LSJ
  rationale: The infinitive expresses purpose. ἐκτρίβω can mean to wear out or destroy
    utterly; 'wipe out' captures the force of thorough devastation in accessible English.
- source_word: ἐκτεῖναι τὰς χεῖρας
  chosen: to stretch out their hands against
  alternatives:
  - to lay hands on
  - to attack
  - to reach out against
  lexicon: LSJ
  rationale: This idiom can imply hostile action. A relatively literal rendering preserves
    the imagery and leaves the exact mode of aggression open, while 'against' makes
    the hostility explicit from ἐπί with accusative.
- source_word: τὰ ἅγια
  chosen: their holy places
  alternatives:
  - their sanctuary
  - their holy things
  - the sanctuary
  lexicon: LSJ
  rationale: The neuter plural naturally suggests sacred places or holy precincts
    rather than a singular abstract. 'Holy places' preserves the plural and fits the
    temple/sacred-site context.
