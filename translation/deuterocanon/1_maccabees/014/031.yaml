theological_decisions:
- issue: Rendering of τὰ ἅγια in a cultic context
  chosen_reading: their holy places
  alternative_readings:
  - their sanctuary
  - their holy things
  rationale: The Greek is plural and can denote sacred precincts or holy things. The
    main text preserves the plural form rather than collapsing it into the singular
    'sanctuary.' Because the referent is cultic rather than doctrinally contested,
    the alternative is noted lexically rather than treated as a major theological
    dispute.
  doctrine_reference: 'Translation philosophy §5: consistency of key terms, or documented
    exception'
