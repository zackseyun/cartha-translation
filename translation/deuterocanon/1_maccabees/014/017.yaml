id: 1MA.14.17
reference: 1 Maccabees 14:17
source:
  edition: lxx-swete-1909
  text: ὡς δὲ ἤκουσαν ὅτι Σίμων ὁ ἀδελφὸς αὐτοῦ γέγονεν ἀντ' αὐτοῦ ἀρχιερεὺς καὶ ἐπικρατεῖ
    τῆς χώρας καὶ τῶν πόλεων τῶν ἐν αὐτῇ,
  language: Greek
  pages:
  - 676
  confidence: high
  validation: agree
translation:
  text: But when they heard that Simon his brother had become high priest in his place
    and was ruling over the country and the cities in it,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς δὲ ἤκουσαν
  chosen: But when they heard
  alternatives:
  - And when they heard
  - Now when they heard
  lexicon: BDAG
  rationale: ὡς with the aorist can introduce a temporal clause, 'when,' while δέ
    marks mild narrative progression or contrast. 'But when they heard' preserves
    the flow into the sentence without overstating contrast.
- source_word: γέγονεν
  chosen: had become
  alternatives:
  - became
  - has become
  lexicon: BDAG
  rationale: The perfect form indicates a resulting state from a completed event.
    In English narrative sequence after ἤκουσαν, 'had become' best conveys that Simon's
    appointment preceded the hearing and remained in effect.
- source_word: ἀντ' αὐτοῦ
  chosen: in his place
  alternatives:
  - instead of him
  - in place of him
  lexicon: BDAG
  rationale: ἀντί here denotes succession or replacement. 'In his place' is idiomatic
    English and clearly expresses that Simon succeeded his brother in the office.
- source_word: ἀρχιερεὺς
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: The standard rendering for the Jewish office is 'high priest'; it is
    both accurate and familiar without being archaic.
- source_word: ἐπικρατεῖ
  chosen: was ruling over
  alternatives:
  - has control over
  - was in power over
  - was prevailing over
  lexicon: BDAG
  rationale: ἐπικρατέω can mean to be master of, control, or rule over. In this political
    context, 'was ruling over' best fits the governance of χώρα and cities. The progressive
    English form suits the ongoing state reported at the time of hearing.
- source_word: τῆς χώρας
  chosen: the country
  alternatives:
  - the land
  - the territory
  - the region
  lexicon: BDAG
  rationale: χώρα can denote land, region, or country. Here, paired with 'the cities
    in it,' it refers to the broader territorial domain; 'the country' is natural
    and sufficiently broad.
- source_word: τῶν πόλεων τῶν ἐν αὐτῇ
  chosen: the cities in it
  alternatives:
  - the cities within it
  - its cities
  lexicon: BDAG
  rationale: The phrase specifies the cities located within the χώρα. 'The cities
    in it' is a transparent rendering that preserves the explicit spatial relation
    of the Greek.
- source_word: Σίμων ὁ ἀδελφὸς αὐτοῦ
  chosen: Simon his brother
  alternatives:
  - Simon, his brother
  - Simon the brother of him
  lexicon: BDAG
  rationale: The appositional phrase identifies Simon as the brother of the previously
    referenced person. 'Simon his brother' is concise and natural in English narrative.
