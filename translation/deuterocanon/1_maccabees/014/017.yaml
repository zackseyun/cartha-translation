theological_decisions:
- issue: Political force of ἐπικρατεῖ in a historical narrative
  chosen_reading: was ruling over
  alternative_readings:
  - had control over
  - was master of
  rationale: This is not a major doctrinally contested term, but it affects how Simon's
    authority is portrayed. The context is civic and territorial governance, so 'was
    ruling over' communicates political authority without importing later theological
    notions.
