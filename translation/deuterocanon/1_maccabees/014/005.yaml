id: 1MA.14.5
reference: 1 Maccabees 14:5
source:
  edition: lxx-swete-1909
  text: καὶ μετὰ πάσης τῆς δόξης αὐτοῦ ἔλαβεν τὴν Ἰόππην εἰς λιμένα, καὶ ἐποίησεν
    εἴσοδον ταῖς νήσοις τῆς θαλάσσης.
  language: Greek
  pages:
  - 675
  confidence: high
  validation: agree
translation:
  text: And with all his glory he took Joppa as a harbor, and made it an access point
    for the islands of the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made an entrance to the islands of the sea.' The Greek expression can
      be rendered more literally, but here it likely means that Joppa served as a
      point of access for maritime connections.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ πάσης τῆς δόξης αὐτοῦ
  chosen: with all his glory
  alternatives:
  - with all his splendor
  - with all his honor
  - amid all his glory
  lexicon: LSJ
  rationale: δόξα can denote glory, splendor, or honor. In this historical encomium
    context, 'glory' preserves the elevated tone and leaves open both prestige and
    magnificence without over-interpreting the phrase.
- source_word: ἔλαβεν
  chosen: took
  alternatives:
  - captured
  - received
  - seized
  lexicon: LSJ
  rationale: λαμβάνω commonly means 'take.' 'Took' is broad enough to cover acquisition
    or occupation without specifying military force more strongly than the Greek itself
    does in this clause.
- source_word: τὴν Ἰόππην
  chosen: Joppa
  alternatives:
  - Joppe
  rationale: Standard English transliteration of the place name Ἰόππη is 'Joppa.'
- source_word: εἰς λιμένα
  chosen: as a harbor
  alternatives:
  - for a harbor
  - into a harbor
  - as a port
  lexicon: LSJ
  rationale: 'The preposition εἰς here expresses result or purpose: Joppa was taken
    so as to function as a harbor. ''As a harbor'' is idiomatic and preserves that
    sense. ''Port'' is possible, but ''harbor'' more directly reflects λιμήν.'
- source_word: ἐποίησεν εἴσοδον
  chosen: made it an access point
  alternatives:
  - made an entrance
  - provided access
  - made a gateway
  lexicon: LSJ
  rationale: ποιέω + εἴσοδος means to make or provide an entrance/access. Because
    the object is implicit from context (Joppa's function), 'made it an access point'
    communicates the practical sense in natural English.
- source_word: ταῖς νήσοις τῆς θαλάσσης
  chosen: for the islands of the sea
  alternatives:
  - to the islands of the sea
  - for the sea islands
  - for the islands in the sea
  lexicon: LSJ
  rationale: 'The dative ταῖς νήσοις is best taken as advantage or relation: Joppa
    became an access point for the islands. The genitive τῆς θαλάσσης is retained
    literally as ''of the sea,'' matching the Greek''s elevated phrasing.'
