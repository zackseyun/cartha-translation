theological_decisions:
- issue: Ritual-status term κοινά in a Jewish law context
  chosen_reading: defiled food
  alternative_readings:
  - unclean food
  - common food
  rationale: The verse concerns refusal to violate Jewish dietary holiness under persecution.
    'Defiled food' preserves the ritual nuance without importing later technical distinctions
    too heavily. Alternatives are worth preserving because English traditions often
    use 'unclean.'
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; consistency of key terms, or documented exception.'
