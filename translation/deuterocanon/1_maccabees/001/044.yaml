theological_decisions:
- issue: Scope of νόμιμα in a persecution context
  chosen_reading: laws
  alternative_readings:
  - customs
  - ordinances
  rationale: The verse concerns royal imposition of non-Judean religious-legal norms.
    Rendering νόμιμα as 'laws' preserves the coercive and official character of the
    decree, while not excluding customary aspects.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of the infinitive clause after the sending of letters
  chosen_reading: that they should follow
  alternative_readings:
  - ordering them to follow
  - to go after
  rationale: English requires some smoothing to express the content/purpose of the
    letters. 'That they should follow' reflects the directive force without adding
    more than the Greek warrants.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
