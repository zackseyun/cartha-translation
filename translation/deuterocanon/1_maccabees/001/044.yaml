translation:
  text: And the king sent letters by the hand of messengers to Jerusalem and the cities
    of Judah, that they should follow laws foreign to the land,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'customs foreign to the land.' The Greek νόμιμα can denote customary
      practices as well as laws.
    reason: lexical_alternative
lexical_decisions:
- source_word: βιβλία
  chosen: letters
  alternatives:
  - books
  - documents
  - written orders
  lexicon: LSJ
  rationale: In this administrative context, βιβλία refers to written communications
    sent by the king, not 'books' in the modern sense. 'Letters' best fits the act
    of dispatching royal directives.
- source_word: ἐν χειρὶ ἀγγέλων
  chosen: by the hand of messengers
  alternatives:
  - by messengers
  - in the hand of messengers
  lexicon: LSJ
  rationale: The idiom ἐν χειρί literally means 'in the hand of' and commonly denotes
    agency or delivery. 'By the hand of messengers' preserves the Semitic/administrative
    flavor while remaining clear in English.
- source_word: προπορεύθηναι ὀπίσω
  chosen: that they should follow
  alternatives:
  - to go after
  - to proceed after
  lexicon: LSJ
  rationale: The infinitive with ὀπίσω conveys following after or adopting a course.
    In context of royal command regarding customs, 'follow' communicates the intended
    obedience more naturally than a more wooden 'go after.'
- source_word: νομίμων
  chosen: laws
  alternatives:
  - customs
  - ordinances
  - practices
  lexicon: LSJ
  rationale: νόμιμα can mean customary laws or established practices. Because the
    king is issuing empire-wide decrees about religious-legal observance, 'laws' best
    captures the normative force, though 'customs' remains a viable nuance.
- source_word: ἀλλοτρίων
  chosen: foreign
  alternatives:
  - alien
  - belonging to others
  - strange
  lexicon: LSJ
  rationale: ἀλλότριος here marks what belongs to others, i.e., non-native and non-Judean
    legal-religious norms. 'Foreign' is idiomatic and preserves the contrast with
    the land's own laws.
- source_word: τῆς γῆς
  chosen: the land
  alternatives:
  - the country
  - their land
  - Judah
  lexicon: LSJ
  rationale: The Greek says simply 'the land.' In context this refers to the land
    of Judah/Judea, but the text itself is less explicit. 'The land' preserves the
    source wording without over-specifying.
