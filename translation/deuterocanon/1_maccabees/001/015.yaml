translation:
  text: and they made themselves foreskins, and turned away from the holy covenant,
    and yoked themselves to the nations, and sold themselves to do evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'made themselves foreskins'; that is, they concealed or reversed
      the visible mark of circumcision.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησαν ἑαυτοῖς ἀκροβυστίαν
  chosen: they made themselves foreskins
  alternatives:
  - they restored their foreskins
  - they made themselves uncircumcised
  lexicon: LSJ
  rationale: The Greek is literally 'made foreskin for themselves,' an idiom referring
    to reversing the visible mark of circumcision. The chosen rendering stays close
    to the Greek and preserves the shocking concreteness of the expression. Because
    the idiom may be opaque in English, a lexical-alternative footnote preserves the
    more idiomatic sense.
- source_word: ἀπέστησαν
  chosen: turned away
  alternatives:
  - apostatized
  - departed
  - withdrew
  lexicon: LSJ
  rationale: The verb conveys departure or defection. 'Turned away' is clear modern
    English and fits covenantal disloyalty without importing later technical ecclesiastical
    language such as 'apostatized.'
- source_word: διαθήκης ἁγίας
  chosen: the holy covenant
  alternatives:
  - a holy covenant
  lexicon: LSJ
  rationale: The anarthrous Greek still naturally refers to the known covenant of
    Israel with God in this context. 'The holy covenant' best reflects that specificity
    and matches the covenantal force of the passage.
- source_word: ἐζευγίσθησαν
  chosen: yoked themselves
  alternatives:
  - joined themselves
  - bound themselves
  lexicon: LSJ
  rationale: The verb is related to yoking and evokes being harnessed together. 'Yoked
    themselves' preserves the metaphor and the negative sense of binding themselves
    in alliance or conformity with the nations.
- source_word: τοῖς ἔθνεσιν
  chosen: the nations
  alternatives:
  - the Gentiles
  - the heathen
  lexicon: LSJ
  rationale: In this Jewish-Greek context the term refers to non-Israelite peoples.
    'The nations' is the most direct and least theologically loaded rendering, while
    still allowing readers to hear the covenantal contrast.
- source_word: ἐπράθησαν
  chosen: sold themselves
  alternatives:
  - were sold
  - gave themselves over
  lexicon: LSJ
  rationale: The middle/passive form here is best taken in the sense of self-enslavement
    or self-surrender. 'Sold themselves' captures deliberate moral self-abandonment
    and parallels biblical idiom elsewhere.
- source_word: τοῦ ποιῆσαι πονηρόν
  chosen: to do evil
  alternatives:
  - to do what is evil
  - to commit wickedness
  lexicon: LSJ
  rationale: A straightforward infinitival construction expressing purpose or result.
    'To do evil' is concise, natural, and faithful to the Greek.
