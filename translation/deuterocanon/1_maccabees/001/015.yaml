theological_decisions:
- issue: How explicitly to render the circumcision-reversal idiom
  chosen_reading: Retain the literal expression 'made themselves foreskins' in the
    main text
  alternative_readings:
  - render the sense directly as 'restored their foreskins'
  rationale: Optimal equivalence here favors preserving the source's concrete wording
    because it is central to the verse's portrayal of covenant abandonment. The idiomatic
    sense is important, so it is preserved in a footnote rather than replacing the
    literal image in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
