theological_decisions:
- issue: Referent of feminine possessives αὐτῆς
  chosen_reading: Render as 'her' throughout, leaving the antecedent implicit as in
    the Greek context of Jerusalem/Zion.
  alternative_readings:
  - Render explicitly as 'Jerusalem's' or 'the city's'
  rationale: The Greek uses feminine possessives repeatedly without restating the
    noun. English can preserve this with 'her,' maintaining the lament style and personification
    of the city.
  doctrine_reference: 'Translation philosophy: readable modern English with original-language
    primacy; preserve the source''s literary force where natural.'
