translation:
  text: Her sanctuary was laid waste like a wilderness; her feasts were turned into
    mourning, her Sabbaths into reproach, her honor into contempt,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ ἁγίασμα
  chosen: sanctuary
  alternatives:
  - holy place
  - sanctified place
  lexicon: LSJ
  rationale: ἁγίασμα here refers to the sacred precinct or holy sanctuary of Jerusalem,
    not abstract holiness. 'Sanctuary' is natural English and preserves the cultic
    sense.
- source_word: ἠρημώθη
  chosen: was laid waste
  alternatives:
  - was desolated
  - was made desolate
  lexicon: LSJ
  rationale: The passive verb conveys devastation or desolation. 'Was laid waste'
    is idiomatic modern English while retaining the force of ruin.
- source_word: ὡς ἔρημος
  chosen: like a wilderness
  alternatives:
  - like a desert
  - like a desolate place
  lexicon: LSJ
  rationale: The comparison is explicit with ὡς. 'Wilderness' better preserves the
    biblical resonance of ἔρημος than the narrower 'desert'.
- source_word: αἱ ἑορταὶ
  chosen: feasts
  alternatives:
  - festivals
  - appointed feasts
  lexicon: LSJ
  rationale: In this temple-centered context, ἑορταί refers to Israel's religious
    festival celebrations. 'Feasts' is concise and traditional without being archaic.
- source_word: ἐστράφησαν εἰς πένθος
  chosen: were turned into mourning
  alternatives:
  - were changed into grief
  - became mourning
  lexicon: LSJ
  rationale: The passive with εἰς marks transformation. 'Were turned into mourning'
    closely follows the Greek and reads naturally.
- source_word: τὰ σάββατα
  chosen: Sabbaths
  alternatives:
  - sabbath days
  lexicon: LSJ
  rationale: The plural refers to the recurring Sabbath observances. 'Sabbaths' is
    the standard direct rendering.
- source_word: εἰς ὀνειδισμόν
  chosen: into reproach
  alternatives:
  - into disgrace
  - into mockery
  lexicon: LSJ
  rationale: ὀνειδισμός denotes reproach, insult, or public disgrace. 'Reproach' preserves
    the shame dimension without over-specifying the agent.
- source_word: τιμὴ
  chosen: honor
  alternatives:
  - glory
  - dignity
  lexicon: LSJ
  rationale: τιμή here denotes status or honor formerly attached to Jerusalem. 'Honor'
    is the most straightforward rendering in context.
- source_word: εἰς ἐξουδένωσιν
  chosen: into contempt
  alternatives:
  - into humiliation
  - into utter disregard
  lexicon: LSJ
  rationale: ἐξουδένωσις expresses being treated as nothing, despised, or reduced
    to worthlessness. 'Into contempt' captures the result in concise English.
