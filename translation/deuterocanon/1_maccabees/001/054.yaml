theological_decisions:
- issue: Rendering βδέλυγμα ἐρημώσεως, a phrase with later biblical-theological resonance
  chosen_reading: the abomination of desolation
  alternative_readings:
  - a desolating abomination
  - the abomination that causes desolation
  rationale: The phrase is already a marked cultic expression in Jewish scripture
    and tradition. Preserving the traditional wording maintains intertextual continuity
    without adding interpretation beyond the Greek. A more explanatory rendering is
    preserved in a footnote rather than replacing the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
