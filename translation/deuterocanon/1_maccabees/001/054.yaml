translation:
  text: And on the fifteenth day of Chislev, in the one hundred forty-fifth year,
    they built the abomination of desolation upon the altar; and in the cities of
    Judah all around they built altars,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a desolating abomination' or 'the abomination that causes desolation.'
      The Greek phrase is compact and can be understood either as a fixed title-like
      expression or as a descriptive phrase.
    reason: lexical_alternative
  - marker: b
    text: The 'one hundred forty-fifth year' refers to Seleucid-era reckoning.
    reason: cultural_note
lexical_decisions:
- source_word: πεντεκαιδεκάτῃ ἡμέρᾳ
  chosen: on the fifteenth day
  alternatives:
  - on the fifteenth
  lexicon: LSJ
  rationale: The dative phrase is temporal, naturally rendered in English with 'on
    the fifteenth day.' Including 'day' makes the dating explicit and readable.
- source_word: Χασελεὺ
  chosen: Chislev
  alternatives:
  - Kislev
  - Casleu
  lexicon: LSJ
  rationale: This is a transliterated month name. 'Chislev' closely reflects the Greek
    form while remaining recognizable as the Jewish month Kislev.
- source_word: τῷ πέμπτῳ καὶ τεσσερακοστῷ ἔτει
  chosen: in the one hundred forty-fifth year
  alternatives:
  - in year one hundred forty-five
  - in the hundred and forty-fifth year
  lexicon: LSJ
  rationale: The phrase denotes Seleucid-era dating. 'In the one hundred forty-fifth
    year' is clear modern English while preserving the formal dating structure.
- source_word: ᾠκοδόμησαν
  chosen: they built
  alternatives:
  - they erected
  - they constructed
  lexicon: LSJ
  rationale: The verb straightforwardly means 'built.' Although 'erected' could fit
    the cultic object, using 'built' here and later in the verse preserves the repeated
    Greek verb.
- source_word: βδέλυγμα ἐρημώσεως
  chosen: the abomination of desolation
  alternatives:
  - a desolating abomination
  - the abomination that causes desolation
  lexicon: LSJ
  rationale: This phrase is a recognized Jewish apocalyptic/cultic expression and
    is best preserved in a relatively formal rendering. The article is retained because
    the Greek lacks an indefinite marker and the phrase functions as a known designation.
- source_word: ἐπὶ τὸ θυσιαστήριον
  chosen: upon the altar
  alternatives:
  - on the altar
  - over the altar
  lexicon: LSJ
  rationale: ἐπί with the accusative here indicates placement onto/upon the altar.
    'Upon' preserves the elevated and spatial sense without becoming unnatural.
- source_word: πόλεσιν Ἰούδα κύκλῳ
  chosen: in the cities of Judah all around
  alternatives:
  - in the surrounding cities of Judah
  - in the cities around Judah
  lexicon: LSJ
  rationale: κύκλῳ modifies the distribution of the cities. 'In the cities of Judah
    all around' stays close to the Greek word order and sense, indicating widespread
    local installation throughout Judah.
- source_word: βωμούς
  chosen: altars
  alternatives:
  - high places
  - shrines
  lexicon: LSJ
  rationale: βωμός is the standard term for an altar, often distinct from θυσιαστήριον
    but still appropriately rendered 'altar' in English. 'Shrines' would over-interpret;
    'high places' is a different concept.
