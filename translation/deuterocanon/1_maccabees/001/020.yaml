translation:
  text: And after striking Egypt, Antiochus returned in the one hundred forty-third
    year; and he went up against Israel and Jerusalem with a heavy multitude.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a massive force' or 'with a large host.' The Greek literally says
      'with a heavy multitude.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέστρεψεν
  chosen: returned
  alternatives:
  - turned back
  - came back
  lexicon: BDAG
  rationale: The aorist of ἐπιστρέφω here denotes physical return after a campaign.
    'Returned' is the most natural modern English rendering in narrative context.
- source_word: μετὰ τὸ πατάξαι
  chosen: after striking
  alternatives:
  - after defeating
  - after smiting
  lexicon: BDAG
  rationale: The construction μετὰ τό + infinitive marks subsequent time, 'after.'
    πατάσσω literally means 'strike' or 'smite'; 'striking' preserves the military
    force without overstating the result beyond the Greek.
- source_word: Αἴγυπτον
  chosen: Egypt
  rationale: Standard geographical name.
- source_word: ἐν τῷ ἑκατοστῷ καὶ τεσσερακοστῷ καὶ τρίτῳ ἔτει
  chosen: in the one hundred forty-third year
  alternatives:
  - in year one hundred forty-three
  rationale: This reproduces the Seleucid-era dating formula in clear English while
    staying close to the Greek structure.
- source_word: ἀνέβη
  chosen: went up against
  alternatives:
  - went up to attack
  - advanced against
  lexicon: BDAG
  rationale: ἀναβαίνω literally means 'go up.' In military and Jerusalem-oriented
    narrative, 'went up against' preserves both the directional idiom and hostile
    sense indicated by ἐπί with the accusative.
- source_word: ἐπὶ Ἰσραὴλ καὶ Ἱεροσόλυμα
  chosen: against Israel and Jerusalem
  alternatives:
  - to Israel and Jerusalem
  - against the land of Israel and Jerusalem
  lexicon: BDAG
  rationale: Given the military context, ἐπί with accusative is best rendered adversatively
    as 'against.' The text names both the people/land designation and the city; both
    are retained.
- source_word: ἐν ὄχλῳ βαρεῖ
  chosen: with a heavy multitude
  alternatives:
  - with a great crowd
  - with a massive force
  - with a large host
  lexicon: LEH
  rationale: ὄχλος can mean crowd, multitude, or host; in military context it refers
    to a large body of troops. βαρεῖ literally means 'heavy,' conveying weight/strength.
    'Heavy multitude' is slightly formal but preserves the Greek image without importing
    a more specific military term not present in the text.
