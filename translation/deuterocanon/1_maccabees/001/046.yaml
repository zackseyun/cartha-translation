translation:
  text: and to defile the sanctuary and the holy things;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the saints' or 'holy people.' The Greek literally says 'the holy ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μιᾶναι
  chosen: to defile
  alternatives:
  - to pollute
  - to profane
  lexicon: BDAG
  rationale: The infinitive μιᾶναι denotes making something ritually or morally unclean.
    'Defile' best preserves the cultic force in a concise, natural English rendering.
    'Profane' is possible in temple contexts, but the Greek verb more directly emphasizes
    uncleanness than desacralization.
- source_word: ἁγίασμα
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the consecrated place
  lexicon: LEH
  rationale: In this context of Antiochus's decrees against Jewish worship, ἁγίασμα
    most naturally refers to the temple as sacred space. 'The sanctuary' is idiomatic
    and preserves the cultic reference better than the broader 'holy place' or the
    less natural 'consecrated place'.
- source_word: ἁγίους
  chosen: the holy ones
  alternatives:
  - the saints
  - holy people
  - the sacred things
  lexicon: LEH
  rationale: The form is masculine plural and most naturally refers to persons rather
    than objects. 'The holy ones' preserves the literal sense without importing later
    Christian connotations that 'saints' may carry. 'Holy people' is interpretive;
    'sacred things' is less likely given the morphology.
