theological_decisions:
- issue: Referent of ἁγίους
  chosen_reading: persons consecrated to God ('the holy ones')
  alternative_readings:
  - the saints
  - holy people
  - sacred things
  rationale: The masculine plural adjective used substantivally ordinarily points
    to people. In the immediate sequence of decrees against temple, people, and law,
    rendering it as persons best fits the grammar and context while avoiding over-interpretation
    about a specific subgroup such as priests.
