translation:
  text: And the kingdom was established before Antiochus, and he undertook to rule
    the land of Egypt, so that he might rule over the two kingdoms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the kingdom was made ready before Antiochus.' The Greek
      wording may imply that his rule was secured for him before he turned toward
      Egypt.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡτοιμάσθη
  chosen: was established
  alternatives:
  - was prepared
  - was made ready
  - was secured
  lexicon: LSJ
  rationale: The passive of ἑτοιμάζω literally means 'was prepared/made ready,' but
    in context of kingship it refers to the kingdom being set in order or secured
    for Antiochus. 'Was established' communicates the political sense in natural English
    without overparaphrasing.
- source_word: ἡ βασιλεία
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal power
  lexicon: LSJ
  rationale: βασιλεία can denote either reign/kingship or kingdom. Here the following
    clause about ruling Egypt and 'the two kingdoms' favors the concrete-political
    sense 'kingdom,' while still implying royal authority.
- source_word: ἐνώπιον Ἀντιόχου
  chosen: before Antiochus
  alternatives:
  - in the presence of Antiochus
  - for Antiochus
  lexicon: LSJ
  rationale: The phrase is formally 'before Antiochus.' In this context it likely
    means the kingdom was set before him, i.e., made secure for him or in his favor.
    The main text keeps the literal preposition to remain close to the Greek; the
    contextual nuance is noted here rather than expanded in translation.
- source_word: ὑπέλαβεν
  chosen: undertook
  alternatives:
  - took in hand
  - resolved
  - assumed
  lexicon: LSJ
  rationale: ὑπολαμβάνω can mean 'take up, undertake, suppose.' Here with the infinitive
    βασιλεῦσαι it indicates taking up the plan or attempt to reign over Egypt. 'Undertook'
    fits the narrative sense better than the more ambiguous 'supposed' or the overly
    interpretive 'resolved.'
- source_word: βασιλεῦσαι
  chosen: to rule
  alternatives:
  - to reign
  - to become king over
  lexicon: LSJ
  rationale: The infinitive denotes exercising royal rule. 'To rule' is idiomatic
    with 'the land of Egypt' in English; 'to reign' is possible but less natural with
    a direct territorial object.
- source_word: γῆς Αἰγύπτου
  chosen: the land of Egypt
  alternatives:
  - Egypt
  - the territory of Egypt
  lexicon: LSJ
  rationale: The genitive construction is preserved with 'the land of Egypt,' reflecting
    the Greek wording and its territorial emphasis.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - with the result that
  lexicon: LSJ
  rationale: ὅπως introduces purpose here. 'So that' is clear modern English and preserves
    the purposive force.
- source_word: ἐπὶ τὰς δύο βασιλείας
  chosen: over the two kingdoms
  alternatives:
  - over both kingdoms
  - upon the two kingdoms
  lexicon: LSJ
  rationale: The phrase refers to two distinct realms, Antiochus's own kingdom and
    Egypt. 'Over the two kingdoms' is the most direct rendering; 'both kingdoms' is
    possible but slightly less explicit.
