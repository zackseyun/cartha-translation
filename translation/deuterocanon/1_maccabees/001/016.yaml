id: 1MA.1.16
reference: 1 Maccabees 1:16
source:
  edition: lxx-swete-1909
  text: Καὶ ἡτοιμάσθη ἡ βασιλεία ἐνώπιον Ἀντιόχου· καὶ ὑπέλαβεν βασιλεῦσαι γῆς Αἰγύπτου,
    ὅπως βασιλεύσῃ ἐπὶ τὰς δύο βασιλείας.
  language: Greek
  pages:
