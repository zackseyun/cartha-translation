theological_decisions:
- issue: Agency of the women in circumcising the children
  chosen_reading: The women are presented as those who had circumcised their children.
  alternative_readings:
  - The women are those who had their children circumcised.
  rationale: The Greek active participle favors direct agency, though in idiomatic
    context it may include arranging for the act. The main text keeps the active sense
    while noting the causative possibility as a lexical alternative.
  doctrine_reference: Translation philosophy §1, §5
- issue: Scope of τέκνα in a circumcision context
  chosen_reading: Render τέκνα as 'children' rather than interpretively narrowing
    to 'sons.'
  alternative_readings:
  - sons
  rationale: Although circumcision concerns males, the Greek noun used is broader.
    Preserving 'children' follows original-language primacy and avoids adding specificity
    not stated in the text.
  doctrine_reference: Translation philosophy §1
