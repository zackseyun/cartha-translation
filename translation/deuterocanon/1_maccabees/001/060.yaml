translation:
  text: And they put to death the women who had circumcised their children, according
    to the decree,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the women who had their children circumcised'; the Greek uses an active
      participle ('having circumcised'), which may describe either direct action or
      arranged circumcision.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιτετμηκυίας
  chosen: who had circumcised
  alternatives:
  - who had their children circumcised
  - who were circumcising
  lexicon: LSJ
  rationale: The perfect active participle feminine plural from περιτέμνω most naturally
    describes the women as the agents who had performed or caused the circumcision
    of their children. English 'had circumcised' captures the completed action prior
    to the execution. 'Had their children circumcised' is possible as a causative
    nuance, but the Greek active form does not require making that explicit.
- source_word: τὰ τέκνα αὐτῶν
  chosen: their children
  alternatives:
  - their sons
  - their infants
  lexicon: LSJ
  rationale: τέκνα is the ordinary plural for 'children.' In context circumcision
    applies to males, so 'sons' is an interpretive narrowing, but the Greek itself
    says 'children,' and the translation preserves that wording without importing
    the biological restriction.
- source_word: ἐθανάτωσαν
  chosen: they put to death
  alternatives:
  - they killed
  - they executed
  lexicon: LSJ
  rationale: The verb means to cause death/put to death. 'Put to death' is slightly
    more formal and fits the official, decree-driven context better than the blunter
    'killed.' 'Executed' is possible, but the Greek verb itself does not explicitly
    encode judicial procedure apart from the following phrase.
- source_word: κατὰ τὸ πρόσταγμα
  chosen: according to the decree
  alternatives:
  - according to the command
  - by order
  lexicon: LSJ
  rationale: πρόσταγμα denotes an order, edict, or decree. Given the surrounding persecution
    narrative and official policy context, 'decree' best conveys a formal state command.
