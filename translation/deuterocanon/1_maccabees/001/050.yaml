translation:
  text: And whoever does not act according to the word of the king shall die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the king’s command.' The Greek says 'according to the word
      of the king,' which in context refers to his order.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς ἂν μὴ ποιήσῃ
  chosen: whoever does not act
  alternatives:
  - whoever does not do
  - whoever should not carry out
  lexicon: BDAG
  rationale: The construction is indefinite/general ('whoever') with aorist subjunctive
    after ἄν. ποιέω here refers to carrying out a command. 'Act' is slightly more
    idiomatic in English than 'do' while still preserving the sense of compliance
    with an order.
- source_word: κατὰ τὸ ῥῆμα
  chosen: according to the word
  alternatives:
  - according to the command
  - in accordance with the decree
  lexicon: BDAG
  rationale: ῥῆμα is literally 'word, statement, utterance.' In royal-command context
    it can imply an order, but the Greek does not use a more specific term like ἐντολή
    or πρόσταγμα here. 'According to the word' preserves the source wording while
    remaining intelligible.
- source_word: τοῦ βασιλέως
  chosen: of the king
  alternatives:
  - of the royal king
  lexicon: BDAG
  rationale: 'Straightforward genitive: the word/order belongs to the king. ''King''
    is the natural and precise rendering.'
- source_word: ἀποθανεῖται
  chosen: shall die
  alternatives:
  - will be put to death
  - shall be executed
  lexicon: BDAG
  rationale: The future middle/passive form of ἀποθνῄσκω most directly means 'will
    die/shall die.' In context it expresses the death penalty, but the Greek does
    not explicitly state the agent of execution. 'Shall die' preserves that formal
    ambiguity better than 'be put to death.'
