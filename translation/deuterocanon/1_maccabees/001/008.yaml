translation:
  text: And his sons became strong, each in his own place;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each in his own region' or 'each in his own territory,' since 'place'
      here likely refers to the area under each son's control.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεκράτησαν
  chosen: gained power
  alternatives:
  - became strong
  - prevailed
  - ruled
  lexicon: LSJ
  rationale: The verb ἐπικρατέω commonly conveys becoming strong or prevailing. In
    this succession context, it refers to the sons establishing effective control
    after Alexander's death. 'Gained power' captures accession to power more idiomatically
    than the more literal 'prevailed,' while avoiding the over-specific 'ruled,' since
    the object of rule is not stated in this clause.
- source_word: οἱ παῖδες αὐτοῦ
  chosen: his sons
  alternatives:
  - his children
  - his servants
  lexicon: LSJ
  rationale: Although παῖδες can mean children or servants in some contexts, here
    the historical context is dynastic succession, so 'his sons' best reflects the
    intended referent.
- source_word: ἕκαστος
  chosen: each
  alternatives:
  - each one
  lexicon: LSJ
  rationale: Standard distributive sense; 'each' is concise and natural in English.
- source_word: ἐν τῷ τόπῳ αὐτοῦ
  chosen: in his own place
  alternatives:
  - in his own region
  - in his own position
  - in his own territory
  lexicon: LSJ
  rationale: τόπος literally means 'place.' In context it likely refers to the sphere
    or locality allotted to each successor. 'In his own place' preserves the Greek
    wording while remaining intelligible; more interpretive options like 'territory'
    are possible but go beyond the explicit wording.
