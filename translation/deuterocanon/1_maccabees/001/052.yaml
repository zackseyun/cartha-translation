translation:
  text: And many from the people gathered to them, everyone who abandoned the law;
    and they did evil in the land,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνηθροίσθησαν
  chosen: gathered
  alternatives:
  - were gathered together
  - assembled
  lexicon: LSJ
  rationale: Aorist passive of συνάγω/συναθροίζω in context denotes people coming
    together or joining a group. 'Gathered' is natural English and preserves the collective
    movement without over-specifying agency.
- source_word: ἀπὸ τοῦ λαοῦ
  chosen: from the people
  alternatives:
  - out of the people
  - from among the people
  lexicon: LSJ
  rationale: The phrase marks that these many came from within the Jewish populace.
    'From the people' is concise and faithful; 'from among the people' is possible
    but slightly more interpretive.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - with them
  - joined them
  lexicon: LSJ
  rationale: πρός with accusative here indicates movement toward/alignment with the
    previously mentioned apostate group. 'To them' keeps the Greek image; the joining
    sense is conveyed by the whole clause.
- source_word: πολλοί
  chosen: many
  alternatives:
  - a great many
  lexicon: LSJ
  rationale: Simple quantitative adjective; 'many' is sufficient and idiomatic.
- source_word: πᾶς ὁ ἐγκαταλείπων τὸν νόμον
  chosen: everyone who was abandoning the law
  alternatives:
  - all who abandoned the law
  - everyone forsaking the law
  lexicon: LSJ
  rationale: The articular present participle characterizes the group by ongoing or
    defining action. 'Everyone who was abandoning the law' preserves that descriptive
    force better than a simple past.
- source_word: νόμον
  chosen: the law
  alternatives:
  - the Law
  lexicon: LSJ
  rationale: In 1 Maccabees this refers to the Jewish law/Torah. Lowercase 'law' is
    readable and avoids importing later English convention, while still clearly referring
    to the covenantal law in context.
- source_word: ἐποίησαν κακὰ
  chosen: did evil
  alternatives:
  - committed evils
  - did wicked things
  lexicon: LSJ
  rationale: A common idiom for acting wickedly. 'Did evil' is direct, idiomatic,
    and preserves the moral force.
- source_word: ἐν τῇ γῇ
  chosen: in the land
  alternatives:
  - in the country
  lexicon: LSJ
  rationale: γῆ here most naturally refers to the land of Judea/Israel rather than
    earth in general. 'In the land' preserves the biblical-geographic sense.
