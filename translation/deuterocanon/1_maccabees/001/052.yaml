  text: καὶ συνηθροίσθησαν ἀπὸ τοῦ λαοῦ πρὸς αὐτοὺς πολλοί, πᾶς ὁ ἐγκαταλείπων τὸν
    νόμον· καὶ ἐποίησαν κακὰ ἐν τῇ γῇ,
  language: Greek
