id: 1MA.1.19
reference: 1 Maccabees 1:19
source:
  edition: lxx-swete-1909
  text: καὶ κατελάβοντο τὰς πόλεις τὰς ὀχυρὰς ἐν γῇ Αἰγύπτῳ· καὶ ἔλαβεν τὰ σκῦλα γῆς
    Αἰγύπτου.
