translation:
  text: And they captured the fortified cities in the land of Egypt, and he took the
    plunder of the land of Egypt.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατελάβοντο
  chosen: captured
  alternatives:
  - seized
  - took possession of
  - occupied
  lexicon: LSJ
  rationale: Aorist middle of καταλαμβάνω here refers to taking control of cities
    by force. 'Captured' fits the military context better than the broader 'seized'
    or 'took possession of.'
- source_word: πόλεις
  chosen: cities
  alternatives:
  - towns
  lexicon: LSJ
  rationale: The ordinary sense is 'cities'; in a military-historical narrative this
    is the most natural English equivalent.
- source_word: ὀχυράς
  chosen: fortified
  alternatives:
  - strong
  - stronghold-like
  - well-defended
  lexicon: LSJ
  rationale: As an attributive adjective modifying 'cities,' it denotes defensive
    strength. 'Fortified cities' is idiomatic and accurately reflects the Greek.
- source_word: γῇ
  chosen: land
  alternatives:
  - country
  lexicon: LSJ
  rationale: ἐν γῇ Αἰγύπτῳ is best rendered 'in the land of Egypt,' a natural geographic
    expression that stays close to the Greek.
- source_word: ἔλαβεν
  chosen: he took
  alternatives:
  - he seized
  - he carried off
  lexicon: LSJ
  rationale: The singular verb shifts from the prior plural and likely refers back
    to the king as the principal actor. 'He took' preserves the simple verbal force
    without over-interpreting.
- source_word: σκῦλα
  chosen: the plunder
  alternatives:
  - spoils
  - booty
  lexicon: LSJ
  rationale: σκῦλα denotes goods taken in war. 'Plunder' is clear modern English and
    preserves the military sense; 'booty' is dated, while 'spoils' is possible but
    slightly less vivid here.
