translation:
  text: Every bridegroom took up lamentation; she who sat in the bridal chamber became
    one in mourning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more simply, 'Every bridegroom lamented; she who sat in the bridal chamber
      was in mourning.' The Greek uses compressed poetic phrasing.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  chosen: Every
  alternatives:
  - all
  lexicon: LSJ
  rationale: Used distributively with singular νυμφίος, so 'Every' is more natural
    English than 'all' while preserving the scope.
- source_word: νυμφίος
  chosen: bridegroom
  alternatives:
  - groom
  - newlywed husband
  lexicon: LSJ
  rationale: '''Bridegroom'' best matches the marriage-context term and preserves
    the formal, lament-like tone of the verse.'
- source_word: ἀνέλαβε
  chosen: took up
  alternatives:
  - raised
  - undertook
  - began
  lexicon: LSJ
  rationale: With θρῆνον, the idiom suggests taking up or raising a lament. 'Took
    up' is idiomatic English and keeps the verbal image.
- source_word: θρῆνον
  chosen: lamentation
  alternatives:
  - lament
  - dirge
  - mourning
  lexicon: LSJ
  rationale: Refers to a lament or mourning-song. 'Lamentation' preserves the solemn
    register and avoids narrowing it only to a formal funeral dirge.
- source_word: καθημένη
  chosen: she who sat
  alternatives:
  - the one sitting
  - the seated woman
  lexicon: LSJ
  rationale: The feminine participle is left somewhat literal because the subject
    is implied rather than explicitly named; this preserves the poetic compression
    of the Greek, likely referring to the bride.
- source_word: ἐν παστῷ
  chosen: in the bridal chamber
  alternatives:
  - in the marriage chamber
  - in the wedding room
  - in the bridal canopy
  lexicon: LSJ
  rationale: παστός denotes the bridal chamber or nuptial room. 'Bridal chamber' is
    clear modern English and preserves the wedding setting.
- source_word: ἐγένετο ἐν πένθει
  chosen: became one in mourning
  alternatives:
  - came to be in mourning
  - was in mourning
  - became mournful
  lexicon: LSJ
  rationale: The construction marks a change of state. 'Became one in mourning' preserves
    that transition more clearly than a simple stative rendering.
