translation:
  text: And on the doorways of the houses and in the streets they burned incense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they offered incense.' The Greek verb can denote the act of burning
      incense as a cultic offering.
    reason: lexical_alternative
  - marker: b
    text: '''Streets'' may also be understood as ''broad streets'' or ''public squares.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: θυρίδων
  chosen: doorways
  alternatives:
  - doors
  - doorposts
  - entrances
  lexicon: LSJ
  rationale: θυρίς/θυρίδων can denote a door, opening, or doorway. 'Doorways' best
    fits the plural genitive construction with houses and avoids over-specifying architectural
    details such as 'doorposts.'
- source_word: οἰκιῶν
  chosen: houses
  alternatives:
  - homes
  lexicon: LSJ
  rationale: A straightforward rendering of οἰκία in this narrative context. 'Houses'
    is slightly more formal and concrete than 'homes,' matching the physical locations
    named in the verse.
- source_word: πλατείαις
  chosen: streets
  alternatives:
  - broad streets
  - public squares
  lexicon: LSJ
  rationale: πλατεῖα often refers to broad streets or open city spaces. 'Streets'
    is the most natural English in context, while the plural and public setting still
    convey activity in open urban areas. The alternative 'public squares' is possible
    but narrower than the Greek may require.
- source_word: ἐθυμίων
  chosen: they burned incense
  alternatives:
  - they offered incense
  - they made offerings of incense
  lexicon: LSJ
  rationale: θυμιάω means to burn incense or offer incense. 'Burned incense' is direct,
    idiomatic, and preserves the cultic action without adding interpretive detail
    beyond the Greek.
- source_word: ἐπὶ ... καὶ ἐν
  chosen: on ... and in
  alternatives:
  - at ... and in
  - upon ... and in
  lexicon: LSJ
  rationale: 'The prepositions distinguish location: ἐπί with the doorways and ἐν
    with the streets. ''On the doorways ... and in the streets'' preserves the Greek
    contrast, even if English might otherwise smooth both to ''at/in.'''
