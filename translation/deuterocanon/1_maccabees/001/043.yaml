  text: καὶ πολλοὶ ἀπὸ Ἰσραὴλ ηὐδόκησαν τῇ λατρίᾳ αὐτοῦ, καὶ ἔθυσαν τοῖς εἰδώλοις,
    καὶ ἐβεβήλωσαν τὸ σάββατον.
