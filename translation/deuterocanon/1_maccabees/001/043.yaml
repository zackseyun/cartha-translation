translation:
  text: And many from Israel approved of his worship, and they sacrificed to the idols
    and profaned the Sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were pleased with his worship' or 'consented to his worship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ ἀπὸ Ἰσραήλ
  chosen: many from Israel
  alternatives:
  - many of Israel
  - many Israelites
  lexicon: LSJ
  rationale: ἀπό with a people name naturally conveys origin or membership from within
    the group. 'Many from Israel' stays close to the Greek while remaining idiomatic;
    'many Israelites' is possible but slightly less transparent to the source phrasing.
- source_word: ηὐδόκησαν
  chosen: approved of
  alternatives:
  - took pleasure in
  - were pleased with
  - consented to
  lexicon: LSJ
  rationale: The verb denotes taking pleasure in or approving. In this context of
    apostasy, 'approved of' best captures volitional acceptance without overstating
    emotional delight.
- source_word: τῇ λατρίᾳ αὐτοῦ
  chosen: his worship
  alternatives:
  - his service
  - his cult
  lexicon: LSJ
  rationale: λατρεία here refers to cultic/religious worship or service. 'His worship'
    communicates participation in the king's imposed religious system in accessible
    English. 'Cult' is possible but can sound anachronistically pejorative in modern
    English.
- source_word: ἔθυσαν
  chosen: sacrificed
  alternatives:
  - offered sacrifices
  lexicon: LSJ
  rationale: The aorist verb straightforwardly means to sacrifice. 'Sacrificed' is
    concise and preserves the cultic action.
- source_word: τοῖς εἰδώλοις
  chosen: to the idols
  alternatives:
  - to idols
  - to images
  lexicon: LSJ
  rationale: εἴδωλον in this context refers to idols. The article is retained in English
    for naturalness with the preposition and to reflect the Greek dative plural with
    article.
- source_word: ἐβεβήλωσαν
  chosen: profaned
  alternatives:
  - defiled
  - made common
  lexicon: LSJ
  rationale: The verb means to profane or desecrate what is holy. 'Profaned' best
    matches the religious violation in view.
- source_word: τὸ σάββατον
  chosen: the Sabbath
  alternatives:
  - the sabbath day
  lexicon: LSJ
  rationale: Standard rendering for σάββατον in Jewish cultic context. Capitalized
    'Sabbath' reflects the recognized holy day in English usage.
