theological_decisions:
- issue: Rendering λατρεία in a context of pagan royal religion
  chosen_reading: his worship
  alternative_readings:
  - his service
  - his cult
  rationale: The phrase refers to the king's imposed religious observance. 'His worship'
    preserves the cultic sense without importing technical or overly modern sociological
    language. It also keeps the focus on religious allegiance, which is central to
    the verse.
