  text: καὶ ἐπεδέξαντο ἀποθανεῖν, ἵνα μὴ μιανθῶσιν τοῖς βρώμασιν, καὶ μὴ βεβηλώσωσιν
    διαθήκην ἁγίαν· καὶ ἀπέθανον.
