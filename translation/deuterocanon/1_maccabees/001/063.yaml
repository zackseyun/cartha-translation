translation:
  text: And they chose to die, so that they might not be defiled by the foods and
    might not profane the holy covenant; and they died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the meats.' The Greek term refers to food items, here specifically those
      whose consumption would defile according to the covenantal law.
    reason: lexical_alternative
  - marker: b
    text: Or 'a holy covenant.' The Greek phrase lacks the article, but the context
      strongly suggests the covenant known to Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπεδέξαντο
  chosen: accepted
  alternatives:
  - welcomed
  - submitted to
  - chose
  lexicon: LSJ
  rationale: The middle voice here conveys taking upon themselves or accepting a fate.
    'Accepted' preserves the volitional sense without overstating emotion ('welcomed')
    or introducing interpretive expansion ('chose').
- source_word: ἀποθανεῖν
  chosen: death
  alternatives:
  - to die
  lexicon: LSJ
  rationale: With ἐπεδέξαντο, idiomatic English prefers 'accepted death' rather than
    the more wooden 'accepted to die.' This keeps the infinitive's sense while producing
    natural English.
- source_word: μιανθῶσιν
  chosen: be defiled
  alternatives:
  - be polluted
  - be made unclean
  lexicon: LSJ
  rationale: '''Be defiled'' best captures ritual/moral contamination in this Jewish
    covenantal context. ''Be made unclean'' is possible but can sound narrower and
    more technical in English.'
- source_word: τοῖς βρώμασιν
  chosen: the foods
  alternatives:
  - the meats
  - the food
  lexicon: LSJ
  rationale: The plural article and noun naturally refer to the prohibited food items
    in view. 'Foods' is broader and more source-near than 'meats,' which could over-specify
    the referent.
- source_word: βεβηλώσωσιν
  chosen: profane
  alternatives:
  - defile
  - violate
  lexicon: LSJ
  rationale: For a covenant described as holy, 'profane' fittingly expresses treating
    what is sacred as common. 'Violate' is possible but less tied to the holiness
    contrast in the Greek.
- source_word: διαθήκην ἁγίαν
  chosen: the holy covenant
  alternatives:
  - a holy covenant
  - the sacred covenant
  lexicon: LSJ
  rationale: The anarthrous phrase in Greek can still be definite in context, referring
    to Israel's covenant with God. 'The holy covenant' is the most natural covenantal
    rendering here.
- source_word: ἀπέθανον
  chosen: they died
  alternatives:
  - they were put to death
  lexicon: LSJ
  rationale: The Greek simply states 'they died.' While the broader context implies
    martyrdom, the verse itself does not explicitly use a causative expression, so
    the translation should not overstate it.
