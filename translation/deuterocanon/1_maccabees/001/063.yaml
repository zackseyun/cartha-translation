theological_decisions:
- issue: Nature of the contamination in μιανθῶσιν τοῖς βρώμασιν
  chosen_reading: ritual/moral defilement from prohibited foods
  alternative_readings:
  - general moral corruption through food practices
  rationale: In 1 Maccabees' covenantal setting, the concern is specifically that
    eating forbidden foods would render them defiled in relation to the law and covenant.
    The wording preserves both ritual and moral dimensions without collapsing them
    into merely symbolic language.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Force of διαθήκην ἁγίαν
  chosen_reading: the covenant is rendered as a definite, sacred covenantal reality
  alternative_readings:
  - a holy covenant
  rationale: Although Greek lacks the article here, the historical and literary context
    points to the known covenant of Israel with God. Rendering it definitely communicates
    the referent without importing extra doctrinal content.
  doctrine_reference: Translation philosophy §§1, 5
