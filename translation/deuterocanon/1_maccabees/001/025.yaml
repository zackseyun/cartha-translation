translation:
  text: And there was great mourning upon Israel in all their places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout all their places.' The Greek emphasizes the spread of the
      mourning across all the places belonging to or inhabited by Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: there was
  alternatives:
  - it came to be
  - it happened
  lexicon: BDAG
  rationale: Idiomatic English existential rendering fits the narrative formula without
    woodenly reproducing the verb 'became/came to be'.
- source_word: πένθος μέγα
  chosen: great mourning
  alternatives:
  - great grief
  - great lamentation
  lexicon: BDAG
  rationale: πένθος denotes mourning/grief, often in response to calamity or death.
    'Great mourning' preserves both the emotional and communal sense and stays close
    to the Greek phrase.
- source_word: ἐπὶ Ἰσραήλ
  chosen: upon Israel
  alternatives:
  - over Israel
  - in Israel
  lexicon: BDAG
  rationale: The preposition ἐπί here conveys something coming upon Israel. 'Upon
    Israel' preserves the weight and direction of the affliction more closely than
    the flatter 'in Israel.'
- source_word: ἐν παντὶ τόπῳ αὐτῶν
  chosen: in all their places
  alternatives:
  - in every place of theirs
  - throughout all their places
  - in every one of their places
  lexicon: BDAG
  rationale: The phrase is distributive and refers to the various localities where
    the people were. 'In all their places' is natural English while retaining the
    plural nuance better than simply 'everywhere.'
