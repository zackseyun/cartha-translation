translation:
  text: By their power they kept doing this to Israel, to those who were found in
    the cities month after month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by force'; the Greek phrase can emphasize coercive strength as the means
      by which they acted.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in every month and month,' that is, repeatedly each month.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἰσχύϊ αὐτῶν
  chosen: By their power
  alternatives:
  - with their might
  - in their strength
  - by force
  lexicon: LSJ
  rationale: The phrase is instrumental, indicating the means by which the action
    was carried out. 'By their power' preserves the Greek construction and conveys
    coercive force without over-specifying physical violence. 'By force' is possible
    but slightly more interpretive.
- source_word: ἐποίουν οὕτω
  chosen: they kept doing this
  alternatives:
  - they did thus
  - they acted this way
  - they were doing so
  lexicon: LSJ
  rationale: The imperfect ἐποίουν suggests repeated or ongoing action, not a single
    event. 'They kept doing this' captures the iterative sense in natural English
    better than the wooden 'they did thus.'
- source_word: τῷ Ἰσραήλ
  chosen: to Israel
  alternatives:
  - against Israel
  - for Israel
  lexicon: LSJ
  rationale: The dative is best rendered straightforwardly as 'to Israel' here, with
    the hostile sense supplied by context. 'Against Israel' makes the adversative
    force explicit, but the Greek itself uses the dative rather than a preposition
    of opposition.
- source_word: τοῖς εὑρισκομένοις
  chosen: to those found
  alternatives:
  - to those who were found
  - to those discovered
  - to those present
  lexicon: LSJ
  rationale: The participle refers to persons being found or discovered by the authorities.
    'Those found' is concise and preserves the passive nuance. 'Those present' is
    smoother but weakens the sense of being located by search or inspection.
- source_word: ἐν παντὶ μηνὶ καὶ μηνὶ
  chosen: month after month
  alternatives:
  - every month
  - in each and every month
  lexicon: LSJ
  rationale: The distributive repetition μηνὶ καὶ μηνὶ emphasizes recurrence. 'Month
    after month' captures the repeated, ongoing pattern more idiomatically than the
    more literal 'every month,' while remaining faithful to the sense.
- source_word: ἐν ταῖς πόλεσιν
  chosen: in the cities
  alternatives:
  - in the towns
  - throughout the cities
  lexicon: LSJ
  rationale: πόλεις is the standard term for cities/towns. 'In the cities' is the
    most direct rendering. 'Throughout the cities' adds a distributive nuance not
    explicit in the Greek.
