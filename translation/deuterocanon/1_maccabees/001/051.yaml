translation:
  text: According to all these words he wrote to his whole kingdom, and he appointed
    overseers over all the people; and he commanded the cities of Judah to offer sacrifices,
    city by city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he wrote to his kingdom.' The Greek dative can be rendered more tersely;
      'whole' is an interpretive expansion to reflect the broad scope implied by the
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ πάντας τοὺς λόγους τούτους
  chosen: According to all these words
  alternatives:
  - In accordance with all these decrees
  - Following all these orders
  lexicon: LSJ
  rationale: λόγοι literally means 'words,' and κατὰ here conveys conformity ('according
    to'). Retaining 'words' keeps the formal link to the preceding proclamation, while
    still reading naturally in English.
- source_word: ἔγραψεν τῇ βασιλείᾳ αὐτοῦ
  chosen: he wrote to his whole kingdom
  alternatives:
  - he wrote to his kingdom
  - he issued a written decree to his kingdom
  lexicon: LSJ
  rationale: The dative τῇ βασιλείᾳ αὐτοῦ indicates the realm addressed by the writing.
    'Whole kingdom' is supplied from context because the following phrase extends
    the command broadly; it makes explicit the distributive scope without changing
    the sense.
- source_word: ἐποίησεν ἐπισκόπους
  chosen: he appointed overseers
  alternatives:
  - he made inspectors
  - he appointed officers
  lexicon: LSJ
  rationale: ἐπίσκοποι in this context refers to supervisory officials, not later
    ecclesiastical 'bishops.' 'Overseers' preserves the literal sense and avoids anachronism.
- source_word: ἐπὶ πάντα τὸν λαόν
  chosen: over all the people
  alternatives:
  - over the whole people
  - for all the people
  lexicon: LSJ
  rationale: ἐπὶ with the accusative here marks authority or jurisdiction. 'Over all
    the people' best conveys the officials' supervisory role.
- source_word: ἐνετείλατο
  chosen: he commanded
  alternatives:
  - he ordered
  - he gave instructions to
  lexicon: LSJ
  rationale: The verb denotes authoritative command. 'Commanded' preserves the force
    of royal imposition in context.
- source_word: ταῖς πόλεσιν Ἰούδα
  chosen: the cities of Judah
  alternatives:
  - Judah's cities
  - the towns of Judah
  lexicon: LSJ
  rationale: πόλεις can be rendered 'cities' or 'towns'; 'cities of Judah' is a straightforward
    formal rendering and matches the geographic-political reference.
- source_word: θυσιάζειν
  chosen: to offer sacrifices
  alternatives:
  - to sacrifice
  lexicon: LSJ
  rationale: The infinitive means 'to sacrifice.' 'Offer sacrifices' is idiomatic
    English and makes the cultic action explicit.
- source_word: κατὰ πόλιν καὶ πόλιν
  chosen: city by city
  alternatives:
  - in each city
  - from city to city
  lexicon: LSJ
  rationale: The distributive expression indicates action in each individual city.
    'City by city' preserves that repeated, localized force.
