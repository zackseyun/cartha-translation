theological_decisions:
- issue: Potential anachronistic reading of ἐπισκόπους
  chosen_reading: overseers
  alternative_readings:
  - bishops
  - officers
  - inspectors
  rationale: Because 1 Maccabees is describing royal administrative enforcement, the
    term should not be rendered with later church-office connotations. 'Overseers'
    preserves the lexical sense without importing ecclesiastical theology.
  doctrine_reference: Translation philosophy §1, §6
