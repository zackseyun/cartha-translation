translation:
  text: And he entered Egypt with a heavy force, with chariots and elephants and horsemen
    and a great army.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great armament' or 'a great expeditionary force' for 'a great fleet'
      (στόλῳ μεγάλῳ); the Greek term can refer more broadly to military equipment
      or an armed expedition, though 'fleet' best fits this campaign context.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - went into
  - invaded
  lexicon: LSJ
  rationale: The aorist of εἰσέρχομαι straightforwardly means 'entered' or 'went into.'
    'Entered' is natural English and avoids importing the more interpretive 'invaded,'
    though the military context already implies hostile entry.
- source_word: ὄχλῳ βαρεῖ
  chosen: with a heavy force
  alternatives:
  - with a great multitude
  - with a massive host
  lexicon: LSJ
  rationale: ὄχλος can mean crowd, throng, or host/multitude; in military context
    it refers to a body of troops. βαρεῖ literally means 'heavy,' here conveying weight/strength
    rather than mere size. 'Heavy force' preserves the military nuance better than
    the more generic 'great multitude.'
- source_word: ἅρμασιν
  chosen: chariots
  alternatives:
  - war chariots
  lexicon: LSJ
  rationale: The standard sense is 'chariots.' Since the military setting is explicit,
    adding 'war' is unnecessary.
- source_word: ἐλέφανσιν
  chosen: elephants
  lexicon: LSJ
  rationale: A direct rendering of the Greek term; in context these are war elephants,
    but the simple 'elephants' is sufficient and closest to the source.
- source_word: ἱππεῦσιν
  chosen: horsemen
  alternatives:
  - cavalry
  lexicon: LSJ
  rationale: ἱππεύς means horseman/rider. 'Horsemen' is slightly more formal and closer
    to the Greek form, while still clearly denoting mounted troops.
- source_word: στόλῳ μεγάλῳ
  chosen: a great fleet
  alternatives:
  - a great armament
  - a great expeditionary force
  lexicon: LSJ
  rationale: στολή can denote equipment, outfit, or in Hellenistic military contexts
    a naval expedition/fleet. Given the campaign into Egypt and the collocation with
    land forces, 'fleet' best accounts for the term here and preserves the likely
    military sense.
