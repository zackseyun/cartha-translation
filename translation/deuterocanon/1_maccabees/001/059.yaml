theological_decisions:
- issue: Distinction between βωμός and θυσιαστήριον in a desecration context
  chosen_reading: Render βωμός as 'altar' and θυσιαστήριον as 'altar of burnt offering'
  alternative_readings:
  - Render both simply as 'altar'
  - Render βωμός as 'pagan altar' and θυσιαστήριον as 'altar'
  rationale: The Greek deliberately uses two different cultic terms, likely describing
    a smaller altar erected upon the temple's main altar. The translation preserves
    that distinction without importing more interpretation than the text states. 'Pagan
    altar' is interpretively plausible from context but is not explicit in this verse,
    so it is not placed in the main text.
  doctrine_reference: Translation philosophy §§1, 5
