translation:
  text: And on the twenty-fifth day of the month they were sacrificing on the altar
    that was upon the altar of burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek uses two different words here: ''altar'' (βωμός) and ''altar of burnt
      offering'' (θυσιαστήριον), indicating an altar set upon the temple altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πέμπτῃ καὶ εἰκάδι
  chosen: the twenty-fifth day
  alternatives:
  - the five-and-twentieth day
  - the twenty-fifth
  lexicon: LSJ
  rationale: This idiom denotes the twenty-fifth day of the month. Modern English
    expresses the date naturally as 'the twenty-fifth day.'
- source_word: τοῦ μηνός
  chosen: of the month
  alternatives:
  - in the month
  lexicon: LSJ
  rationale: The genitive with the date formula is most naturally rendered 'of the
    month.'
- source_word: θυσιάζοντες
  chosen: they were sacrificing
  alternatives:
  - offering sacrifice
  - sacrificing
  lexicon: LSJ
  rationale: The participle is rendered with an English finite verb for readability
    in context. The imperfective sense is preserved with 'were sacrificing,' matching
    the narrative description of cultic action.
- source_word: ἐπὶ τὸν βωμόν
  chosen: on the altar
  alternatives:
  - upon the altar
  - at the altar
  lexicon: LSJ
  rationale: ἐπί with the accusative here indicates action directed onto the altar
    surface. 'On the altar' is the clearest natural rendering.
- source_word: βωμός
  chosen: altar
  alternatives:
  - high altar
  lexicon: LSJ
  rationale: βωμός is the ordinary Greek term for an altar, often distinct from θυσιαστήριον.
    Since both terms occur in this verse, both must be represented transparently even
    though English uses the same base word.
- source_word: θυσιαστήριον
  chosen: altar of burnt offering
  alternatives:
  - sacrificial altar
  - altar
  lexicon: LSJ
  rationale: Because the verse distinguishes βωμός from θυσιαστήριον, a more specific
    rendering helps preserve the distinction. In this temple context, 'altar of burnt
    offering' best conveys the larger established altar on which the added pagan altar
    stood.
