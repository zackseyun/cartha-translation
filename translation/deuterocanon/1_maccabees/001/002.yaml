translation:
  text: And he waged many wars, and seized strongholds, and slaughtered kings,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνεστήσατο
  chosen: waged
  alternatives:
  - undertook
  - engaged in
  - began
  lexicon: LSJ
  rationale: In the idiom συνεστήσατο πολέμους, the verb conveys entering into or
    carrying on wars rather than merely 'setting up' them. 'Waged' is natural English
    and preserves the military sense without paraphrase.
- source_word: πολέμους πολλούς
  chosen: many wars
  alternatives:
  - many campaigns
  - many battles
  lexicon: LSJ
  rationale: The plural of πόλεμος is best rendered 'wars,' referring broadly to military
    conflicts. 'Campaigns' is possible but slightly more interpretive; 'battles' is
    too narrow.
- source_word: ἐκράτησεν
  chosen: seized
  alternatives:
  - took
  - gained control of
  - captured
  lexicon: LSJ
  rationale: κρατέω here means to gain mastery over or take possession of. 'Seized'
    fits the forceful military context and works well with ὀχυρωμάτων.
- source_word: ὀχυρωμάτων
  chosen: strongholds
  alternatives:
  - fortresses
  - fortified places
  lexicon: LSJ
  rationale: ὀχύρωμα denotes a fortified place or stronghold. 'Strongholds' is concise
    and idiomatic; 'fortresses' is also possible, but 'strongholds' better captures
    the general category.
- source_word: ἔσφαξεν
  chosen: slaughtered
  alternatives:
  - killed
  - slew
  - butchered
  lexicon: LSJ
  rationale: σφάζω is a strong verb for slaughtering or butchering, often violent
    and bloody. 'Slaughtered' preserves that severity better than the milder 'killed';
    'slew' is archaic.
- source_word: βασιλεῖς
  chosen: kings
  alternatives:
  - rulers
  lexicon: LSJ
  rationale: The straightforward sense is 'kings.' 'Rulers' would flatten the specific
    political title present in the Greek.
