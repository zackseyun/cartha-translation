theological_decisions:
- issue: Rendering the morally charged descriptors ἁμαρτωλόν and παρανόμους
  chosen_reading: Retain both as 'sinful' and 'lawless' without softening or expanding
    them.
  alternative_readings:
  - wicked nation
  - evil men
  - men hostile to the law
  rationale: The verse characterizes the installed group in explicitly moral and legal
    terms. The translation preserves that evaluative force without adding explanatory
    theology beyond the Greek wording.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological
    tension rather than resolve it.'
- issue: Gender rendering of ἄνδρας
  chosen_reading: Translate as 'men' rather than a gender-neutral term.
  alternative_readings:
  - people
  - persons
  rationale: The Greek uses the masculine noun ἄνδρας, not a generic human term. Following
    the project's gender-accurate policy, the English should reflect that marked form.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
