translation:
  text: And they stationed there a sinful people, lawless men, and they strengthened
    themselves in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'placed there a sinful people' or 'posted there a sinful foreign force.'
      The Greek ἔθνος can denote a nation or people-group, and in context may imply
      a foreign body installed there.
    reason: lexical_alternative
  - marker: b
    text: Or 'they became strong there' or 'they fortified themselves in it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθηκαν
  chosen: stationed
  alternatives:
  - placed
  - set
  - posted
  lexicon: LSJ
  rationale: The verb literally means 'put/placed,' but in this military-political
    context 'stationed' best conveys the establishment of a garrisoning presence without
    overparaphrasing.
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - people
  - gentile force
  lexicon: LSJ
  rationale: The basic sense is 'nation/people.' Here it likely refers to a foreign
    ethnic body or force installed in the city. 'Nation' preserves the lexical value
    of ἔθνος more directly than 'people,' while avoiding importing 'Gentiles' where
    the text itself does not explicitly frame the contrast that way.
- source_word: ἁμαρτωλόν
  chosen: sinful
  alternatives:
  - wicked
  - sinner
  lexicon: LSJ
  rationale: As an attributive adjective modifying ἔθνος, 'sinful' is the most natural
    English equivalent. 'Wicked' is possible but slightly more interpretive in tone.
- source_word: ἄνδρας παρανόμους
  chosen: lawless men
  alternatives:
  - men outside the law
  - wicked men
  lexicon: LSJ
  rationale: ἄνδρας is explicitly masculine plural, and παρανόμους means 'lawless'
    or 'contrary to law.' 'Lawless men' preserves both the gendered form and the legal-moral
    force of the Greek.
- source_word: ἐνίσχυσαν
  chosen: strengthened themselves
  alternatives:
  - became strong
  - fortified themselves
  - gained strength
  lexicon: LSJ
  rationale: The verb means 'strengthen' or 'grow strong.' In context, with ἐν αὐτῇ
    ('in it'), the sense is that they consolidated their position there. 'Strengthened
    themselves' stays close to the Greek while remaining idiomatic.
- source_word: ἐν αὐτῇ
  chosen: in it
  alternatives:
  - there
  - in her
  lexicon: LSJ
  rationale: The pronoun is feminine singular and most naturally refers back to the
    previously mentioned city/stronghold context. 'In it' is idiomatic English and
    avoids over-specifying the antecedent beyond the immediate discourse.
