translation:
  text: And they fortified the city of David with a great and strong wall, with strong
    towers, and it became a citadel for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it became an Acra for them.' The Greek ἄκρα can be read as a common
      noun ('citadel, stronghold') or as the historically recognized name of the Seleucid
      fortress.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠκοδόμησαν
  chosen: they built
  alternatives:
  - they fortified
  - they rebuilt
  lexicon: LSJ
  rationale: The verb οἰκοδομέω ordinarily means 'build' or 'construct.' Although
    the context is military, the direct object and following description of wall and
    towers support the straightforward rendering 'built' rather than the more interpretive
    'fortified.'
- source_word: τὴν πόλιν Δαυείδ
  chosen: the city of David
  alternatives:
  - David City
  lexicon: LSJ
  rationale: This is the standard literal rendering of the place name expression.
    Translating rather than paraphrasing preserves the historical/topographical reference.
- source_word: τείχει μεγάλῳ καὶ ὀχυρῷ
  chosen: with a great and strong wall
  alternatives:
  - with a large and fortified wall
  - with a great and secure wall
  lexicon: LSJ
  rationale: The dative is instrumental or associative, describing how they built
    it up. μέγας is naturally 'great,' and ὀχυρός in military context is 'strong'
    or 'fortified.' 'Strong' is idiomatic English and avoids overloading the line
    with repeated 'fortified.'
- source_word: πύργοις ὀχυροῖς
  chosen: with strong towers
  alternatives:
  - with fortified towers
  - with mighty towers
  lexicon: LSJ
  rationale: Again the dative describes accompanying defensive works. ὀχυρός has a
    defensive nuance; 'strong towers' is natural English and keeps the military sense.
- source_word: ἐγένετο αὐτοῖς εἰς ἄκραν
  chosen: it became a citadel for them
  alternatives:
  - it became their stronghold
  - it became an acra for them
  lexicon: LSJ
  rationale: ἄκρα denotes a fortified height, citadel, or stronghold. 'Citadel' best
    captures the architectural/military sense in clear English. 'Acra' is a historical
    transliteration sometimes used for the Seleucid fortress in Jerusalem, but here
    a common-noun rendering is preferable in the main text; the transliterated alternative
    is worth preserving in a footnote because of its historical significance in Maccabean
    literature.
