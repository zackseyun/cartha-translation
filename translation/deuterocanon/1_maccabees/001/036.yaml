theological_decisions:
- issue: Whether διάβολον should be rendered with the title-like 'Devil' or a common
    noun
  chosen_reading: 'common noun: ''adversary'''
  alternative_readings:
  - devil
  - slanderer
  rationale: In this historical narrative context, the word describes the hostile
    role of the citadel/occupying force toward Israel, not a personal supernatural
    being. Rendering it as 'Devil' would overread later theological usage into the
    text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
