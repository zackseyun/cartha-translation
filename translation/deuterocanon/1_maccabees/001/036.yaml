translation:
  text: And it became an ambush against the sanctuary, and an evil adversary against
    Israel continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wicked slanderer.' The Greek διάβολος can denote a slanderer or adversary;
      here the hostile contextual sense favors 'adversary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it became
  alternatives:
  - it was
  - it turned into
  lexicon: BDAG
  rationale: The aorist middle of γίνομαι commonly marks a resulting state or development.
    'It became' preserves the sense that the previously mentioned fortress/garrison
    came to function in this way.
- source_word: εἰς ἔνεδρον
  chosen: an ambush
  alternatives:
  - a lurking place
  - a trap
  lexicon: LSJ
  rationale: ἔνεδρον denotes an ambush or place of lying in wait. 'An ambush' is concise
    and idiomatic in English, preserving the hostile military sense directed toward
    the sanctuary.
- source_word: τῷ ἁγιάσματι
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the temple sanctuary
  lexicon: LSJ
  rationale: ἁγίασμα refers to a holy/sanctified place. In this Jerusalem temple context,
    'the sanctuary' is the most natural rendering and avoids over-specifying beyond
    the Greek.
- source_word: εἰς διάβολον πονηρόν
  chosen: an evil adversary
  alternatives:
  - a wicked slanderer
  - a malicious enemy
  - an evil devil
  lexicon: BDAG
  rationale: διάβολος in pre-Christian and non-title usage can mean slanderer, accuser,
    or adversary. Here, with πονηρόν and in parallel with military hostility, 'an
    evil adversary' best fits the context without importing the later proper-name
    sense 'Devil.'
- source_word: τῷ Ἰσραήλ
  chosen: against Israel
  alternatives:
  - to Israel
  - for Israel
  lexicon: BDAG
  rationale: The dative here is governed by the hostile predicate construction and
    is best rendered in English with 'against' to make the adversative force explicit
    and natural.
- source_word: διὰ παντός
  chosen: continually
  alternatives:
  - always
  - at all times
  lexicon: BDAG
  rationale: The phrase means continuously or constantly. 'Continually' is natural
    modern English and preserves the durative force.
