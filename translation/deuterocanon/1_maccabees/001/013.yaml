theological_decisions:
- issue: Rendering of ἐθνῶν in a Jewish-context polemical setting
  chosen_reading: nations
  alternative_readings:
  - Gentiles
  rationale: The Greek term can be rendered either way, but 'nations' is the more
    literal and less interpretively loaded choice here. The context clearly concerns
    non-Jewish practices, and that nuance is preserved without importing later technical
    usage.
