translation:
  text: And some from the people eagerly desired this, and they went to the king;
    and he gave them authority to practice the customs of the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the practices of the Gentiles.' The Greek says 'the nations,' a common
      Jewish way of referring to non-Israelite peoples.
    reason: lexical_alternative
lexical_decisions:
- source_word: προεθυμήθησάν
  chosen: eagerly desired this
  alternatives:
  - became willing
  - were eager
  - desired it beforehand
  lexicon: LSJ
  rationale: The verb conveys strong inclination or eagerness. Because the object
    is implicit from context, 'this' is supplied in English for clarity. 'Eagerly
    desired' preserves the volitional force better than the weaker 'were willing'.
- source_word: τινες ἀπὸ τοῦ λαοῦ
  chosen: some from the people
  alternatives:
  - some of the people
  - certain men from the people
  lexicon: LSJ
  rationale: This phrase identifies a subset within the Jewish people. 'Some from
    the people' is close to the Greek structure; 'of the people' would also be possible.
    'Men' is not explicit and is therefore avoided.
- source_word: ἐπορεύθησαν πρὸς τὸν Βασιλέα
  chosen: they went to the king
  alternatives:
  - they approached the king
  - they traveled to the king
  lexicon: LSJ
  rationale: A straightforward movement verb; 'went to the king' is natural and sufficiently
    formal.
- source_word: ἔδωκαν αὐτοῖς ἐξουσίαν
  chosen: he gave them authority
  alternatives:
  - they gave them authority
  - granted them permission
  - gave them power
  lexicon: LSJ
  rationale: The Greek form is plural ('they gave'), but with the immediately preceding
    singular 'the king,' English idiom naturally construes the grant as coming from
    the king. 'Authority' fits ἐξουσία better than the narrower 'permission' and avoids
    overstating with 'power'.
- source_word: ποιῆσαι
  chosen: to practice
  alternatives:
  - to do
  - to carry out
  - to observe
  lexicon: LSJ
  rationale: With τὰ δικαιώματα, the sense is not merely 'do' in a generic sense but
    to carry out or adopt prescribed practices. 'Practice' reads naturally in English
    for customs or ordinances.
- source_word: τὰ δικαιώματα τῶν ἐθνῶν
  chosen: the customs of the nations
  alternatives:
  - the ordinances of the nations
  - the practices of the Gentiles
  - the statutes of the nations
  lexicon: LSJ
  rationale: δικαιώματα can mean ordinances, requirements, or customary legal-religious
    practices. In this context of adopting non-Jewish ways, 'customs of the nations'
    best communicates the sense. 'Gentiles' is possible, but 'nations' stays closer
    to ἐθνῶν and preserves the broader ethnic-political sense.
