  text: καὶ ἐπέθεντο πάντες διαδήματα μετὰ τὸ ἀποθανεῖν αὐτόν, καὶ οἱ υἱοὶ αὐτῶν ὀπίσω
    αὐτῶν ἔτη πολλά· καὶ ἐπλήθυναν κακὰ ἐν τῇ γῇ.
