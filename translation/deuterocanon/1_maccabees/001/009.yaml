translation:
  text: And they all put on crowns after his death, and their sons after them for
    many years; and they multiplied evils in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'diadems.' The Greek term refers specifically to royal insignia.
    reason: lexical_alternative
  - marker: b
    text: Or 'they increased wickedness' or 'they increased calamities in the land.'
      The Greek 'evils' is broad enough to include both moral evil and harmful consequences.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπέθεντο
  chosen: put on
  alternatives:
  - placed on
  - assumed
  - set on
  lexicon: LSJ
  rationale: Middle voice with διαδήματα naturally refers to taking or putting on
    royal insignia. 'Put on' is idiomatic English and preserves the concrete image
    better than the more interpretive 'assumed.'
- source_word: διαδήματα
  chosen: crowns
  alternatives:
  - diadems
  - royal headbands
  lexicon: LSJ
  rationale: The term denotes royal insignia worn by kings. 'Crowns' is the clearest
    modern English equivalent; 'diadems' is more formally precise but less accessible.
    The regal sense is preserved.
- source_word: μετὰ τὸ ἀποθανεῖν αὐτόν
  chosen: after his death
  alternatives:
  - after he died
  - after his dying
  lexicon: BDAG
  rationale: The articular infinitive with μετά expresses time subsequent to Alexander's
    death. 'After his death' is concise and natural while accurately reflecting the
    construction.
- source_word: ὀπίσω αὐτῶν
  chosen: after them
  alternatives:
  - behind them
  - in succession after them
  lexicon: LSJ
  rationale: In this dynastic context the phrase indicates succession rather than
    physical position. 'After them' communicates hereditary succession without over-expanding
    the text.
- source_word: ἔτη πολλά
  chosen: for many years
  alternatives:
  - many years
  - for a long time
  lexicon: LSJ
  rationale: Accusative of extent/duration is well rendered by 'for many years' in
    English.
- source_word: ἐπλήθυναν
  chosen: multiplied
  alternatives:
  - increased
  - made many
  lexicon: LSJ
  rationale: The verb means to make numerous or increase. 'Multiplied' preserves the
    active force and echoes biblical diction without sounding archaic here.
- source_word: κακὰ
  chosen: evils
  alternatives:
  - wickedness
  - troubles
  - calamities
  lexicon: LSJ
  rationale: The plural is broad and can include moral evil and harmful outcomes.
    'Evils' preserves that breadth better than narrowing to either moral 'wickedness'
    or circumstantial 'calamities' alone.
- source_word: ἐν τῇ γῇ
  chosen: in the land
  alternatives:
  - on the earth
  - in the country
  lexicon: LSJ
  rationale: In 1 Maccabees this commonly refers to the land in the historical-political
    sense, not the whole earth. 'In the land' fits the narrative setting.
