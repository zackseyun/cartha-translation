theological_decisions:
- issue: Scope of κακὰ
  chosen_reading: broadly 'evils' rather than a narrower moral or political term
  alternative_readings:
  - wickedness
  - calamities
  rationale: The verse summarizes the harmful legacy of the successor dynasties in
    a way that likely includes both moral corruption and destructive consequences.
    A broad rendering preserves the text's tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
