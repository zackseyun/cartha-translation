translation:
  text: And he waged war against Ptolemy the king of Egypt; and Ptolemy was routed
    before him and fled, and many fell wounded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ptolemy was turned back before him.' The Greek verb can more generally
      denote being driven back or defeated; 'was routed' brings out the military context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'many wounded [men] fell.' The phrase may denote numerous battle
      casualties rather than specifying only those who survived with wounds.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεστήσατο πόλεμον
  chosen: waged war
  alternatives:
  - undertook war
  - began war
  - engaged in war
  lexicon: LSJ
  rationale: The idiom literally means 'set/organized war,' but in context it denotes
    initiating and carrying on military conflict. 'Waged war' is idiomatic modern
    English that preserves the force without woodenness.
- source_word: πρὸς
  chosen: against
  alternatives:
  - with
  - toward
  lexicon: LSJ
  rationale: With πόλεμον, πρὸς marks hostile direction. 'Against' best conveys adversarial
    military action in English.
- source_word: ἐνετράπη
  chosen: was routed
  alternatives:
  - was turned back
  - was put to shame
  - was defeated
  lexicon: LSJ
  rationale: In this battle context, the passive indicates being turned back or driven
    into defeat before an opponent. 'Was routed' captures the military sense more
    sharply than the broader 'was defeated.'
- source_word: ἀπὸ προσώπου αὐτοῦ
  chosen: before him
  alternatives:
  - from before him
  - from his presence
  lexicon: LSJ
  rationale: This is a common idiom for retreating in the face of an opponent. 'Before
    him' is concise, natural English and preserves the sense of being driven back
    by his presence/power.
- source_word: ἔφυγεν
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: LSJ
  rationale: The verb straightforwardly denotes flight from battle. 'Fled' is the
    most direct and suitably dignified rendering.
- source_word: ἔπεσαν
  chosen: fell
  alternatives:
  - were struck down
  - died
  lexicon: LSJ
  rationale: The Greek says 'fell,' a common battle expression. Retaining 'fell' preserves
    the source imagery and avoids overstating the outcome beyond what the text explicitly
    says.
- source_word: τραυματίαι πολλοί
  chosen: many fell wounded
  alternatives:
  - many wounded men fell
  - many casualties fell
  - many were wounded
  lexicon: LSJ
  rationale: τραυματίαι refers to wounded persons; combined with ἔπεσαν, the phrase
    likely means many were struck down as wounded casualties in battle. 'Many fell
    wounded' preserves both the battle idiom and the adjective's force without awkwardness.
