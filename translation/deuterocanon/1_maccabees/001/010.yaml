translation:
  text: And from them came forth a sinful root, Antiochus Epiphanes, son of King Antiochus,
    who had been a hostage in Rome. And he became king in the one hundred forty-seventh
    year of the kingdom of the Greeks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''a wicked root'' or ''a sinful shoot.'' The Greek keeps the plant metaphor
      literally: ''root.'''
    reason: lexical_alternative
  - marker: b
    text: That is, according to the Seleucid era dating system, 'the kingdom of the
      Greeks.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐξῆλθεν ἐξ αὐτῶν
  chosen: came forth from them
  alternatives:
  - went out from them
  - arose from them
  lexicon: LSJ
  rationale: The idiom marks emergence from the previously mentioned group or line.
    'Came forth' preserves the imagery without sounding overly wooden; 'from them'
    keeps the genealogical/political connection explicit.
- source_word: ῥίζα ἁμαρτωλός
  chosen: a sinful root
  alternatives:
  - a sinful shoot
  - a wicked root
  - a root of sin
  lexicon: LSJ
  rationale: ῥίζα is literally 'root.' Although metaphorical, the image is important
    and should be preserved rather than flattened to 'man' or 'offspring.' ἁμαρτωλός
    is rendered 'sinful' rather than 'wicked' to stay closer to the Greek adjective
    while remaining natural English.
- source_word: Ἀντίοχος Ἐπιφανής
  chosen: Antiochus Epiphanes
  rationale: Personal name and epithet are transliterated per project policy to transliterate
    names rather than translate them.
- source_word: ὅμηρα
  chosen: a hostage
  alternatives:
  - hostage
  - a captive
  lexicon: LSJ
  rationale: The singular English fits the referent Antiochus, though the Greek form
    is plural in idiomatic usage. 'Hostage' best captures the political sense of a
    person held as security.
- source_word: ἐβασίλευσεν
  chosen: he became king
  alternatives:
  - he reigned
  - he began to reign
  lexicon: LSJ
  rationale: In this context the verb marks accession rather than emphasizing the
    duration of rule. 'Became king' communicates the event clearly in modern English.
- source_word: ἔτει ἑκατοστῷ καὶ ἑβδόμῳ καὶ τεσσαρακοστῷ
  chosen: in the one hundred forty-seventh year
  alternatives:
  - in year one hundred and forty-seven
  - in the hundred and forty-seventh year
  lexicon: LSJ
  rationale: This reproduces the Greek dating formula in idiomatic English. The numeral
    is combined in standard English form.
- source_word: βασιλείας Ἑλλήνων
  chosen: of the kingdom of the Greeks
  alternatives:
  - of the reign of the Greeks
  - of the Greek kingdom
  - of the kingdom of the Greeks
  lexicon: LSJ
  rationale: The genitive phrase identifies the era reckoning tied to Greek rule.
    'Kingdom of the Greeks' is a straightforward rendering that preserves the political
    frame better than the vaguer 'Greek era.'
