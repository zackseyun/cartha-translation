theological_decisions:
- issue: Metaphorical moral characterization in ῥίζα ἁμαρτωλός
  chosen_reading: Retain the metaphor as 'a sinful root'
  alternative_readings:
  - flatten to 'a sinful man'
  - intensify to 'a wicked offshoot'
  rationale: The verse introduces Antiochus with a charged metaphor that shapes the
    narrative's moral evaluation. Preserving 'root' keeps the literary force and avoids
    importing a more interpretive paraphrase.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
