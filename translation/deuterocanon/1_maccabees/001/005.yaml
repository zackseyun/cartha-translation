translation:
  text: And after these things he fell upon his bed, and knew that he was dying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fell onto the bed' or more idiomatically 'took to his bed.' The Greek
      keeps the more physical expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ ταῦτα
  chosen: after these things
  alternatives:
  - after this
  - afterward
  lexicon: LSJ
  rationale: A straightforward temporal transition. 'After these things' preserves
    the Greek sequence closely while remaining natural English.
- source_word: ἔπεσεν
  chosen: fell
  alternatives:
  - lay down
  - collapsed
  lexicon: LSJ
  rationale: The verb literally means 'fell.' In context it describes taking to bed
    at the onset of final illness. 'Fell' keeps the concrete imagery of the Greek
    better than the more interpretive 'lay down' or 'collapsed'.
- source_word: ἐπὶ τὴν κοίτην
  chosen: upon his bed
  alternatives:
  - onto the bed
  - to his bed
  lexicon: LSJ
  rationale: κοίτη can mean bed or couch. 'Upon his bed' is a fairly formal but clear
    rendering of the prepositional phrase and fits the narrative tone. The possessive
    'his' is idiomatic in English though not explicit in Greek.
- source_word: ἔγνω
  chosen: knew
  alternatives:
  - realized
  - perceived
  lexicon: LSJ
  rationale: The aorist of γινώσκω is best rendered 'knew.' 'Realized' is possible
    in idiomatic English, but 'knew' more directly reflects the Greek and preserves
    the solemnity of the statement.
- source_word: ἀποθνήσκει
  chosen: he was dying
  alternatives:
  - he was about to die
  - he dies
  lexicon: LSJ
  rationale: The present tense here conveys ongoing process rather than simple future
    event. 'He was dying' captures that aspect naturally in English better than the
    more wooden 'he dies' or the more inferential 'was about to die'.
