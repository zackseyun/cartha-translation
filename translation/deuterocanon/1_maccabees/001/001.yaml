theological_decisions:
- issue: Historical-geographical name Χεττιείμ
  chosen_reading: Kittim
  alternative_readings:
  - Cyprus
  - Macedonia
  - western coastlands
  rationale: This is not a doctrinally contested term, but it is interpretively significant.
    The translation preserves the traditional form in the main text rather than collapsing
    it into one historical identification, since the Greek uses the biblical toponym
    itself.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; transliterate names.'
