translation:
  text: And it happened, after Alexander the Macedonian, the son of Philip, who had
    come out from the land of Kittim, struck down Darius king of the Persians and
    Medes, that he reigned in his place, first over Greece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kittim is a traditional biblical place-name. It can refer more specifically
      to Cyprus or, more broadly, western lands depending on context.
    reason: cultural_note
  - marker: b
    text: Or 'defeated Darius.' The Greek verb literally means 'struck down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it happened that
  lexicon: BDAG
  rationale: Common narrative formula in Greek; 'it happened' preserves the historiographic
    opening without archaic English.
- source_word: μετὰ τὸ πατάξαι
  chosen: after ... struck down
  alternatives:
  - after ... defeated
  - after ... smote
  lexicon: BDAG
  rationale: The articular infinitive with μετά marks temporal sequence, 'after.'
    πατάσσω can mean strike/smite/defeat; 'struck down' preserves the forceful military
    sense without archaic diction.
- source_word: Ἀλέξανδρον τὸν Φιλίππου τὸν Μακεδόνα
  chosen: Alexander the Macedonian, the son of Philip
  alternatives:
  - Alexander son of Philip, the Macedonian
  lexicon: BDAG
  rationale: Appositional identifiers are all retained. Reordered slightly for natural
    English while preserving both lineage and ethnic/geographic designation.
- source_word: ἐξῆλθεν ἐκ τῆς γῆς Χεττιείμ
  chosen: had come out from the land of Kittim
  alternatives:
  - came from the land of Kittim
  - went out from the land of Kittim
  lexicon: BDAG
  rationale: ἐξέρχομαι literally means 'go/come out.' In English historical narrative,
    'had come out from' fits the prior relative clause and preserves the directional
    sense. 'Kittim' is transliterated as a place-name rather than interpretively rendered.
- source_word: Χεττιείμ
  chosen: Kittim
  alternatives:
  - Citium
  - Cyprus
  - western lands
  lexicon: LSJ
  rationale: The Greek reflects the traditional biblical toponym Kittim. Transliteration
    best preserves the source wording and avoids over-resolving the historical reference.
- source_word: ἐπάταξεν
  chosen: struck down
  alternatives:
  - defeated
  - smote
  lexicon: BDAG
  rationale: Same verb family as earlier πατάξαι; rendered consistently with vivid
    military force.
- source_word: ἐβασίλευσεν ἀντʼ αὐτοῦ
  chosen: he reigned in his place
  alternatives:
  - he became king in his place
  - he ruled instead of him
  lexicon: BDAG
  rationale: ἀντʼ αὐτοῦ indicates succession to Darius. 'Reigned in his place' is
    idiomatic and preserves the monarchical nuance of βασιλεύω.
- source_word: πρότερον ἐπὶ τὴν Ἑλλάδα
  chosen: first over Greece
  alternatives:
  - first over Hellas
  - previously over Greece
  lexicon: BDAG
  rationale: πρότερον here is best taken adverbially with the sense 'first,' indicating
    the initial sphere of rule before later expansion. Ἑλλάς is rendered 'Greece'
    for accessible modern English.
