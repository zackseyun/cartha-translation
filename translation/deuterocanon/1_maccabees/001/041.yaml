translation:
  text: And the king wrote to all his kingdom that all should become one people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his whole kingdom' or 'throughout all his kingdom.' The Greek phrase
      indicates the full extent of the king's realm as the audience of the order.
    reason: lexical_alternative
  - marker: b
    text: Or 'that all should be one people.' The Greek can be rendered more literally
      with 'be,' but 'become' brings out the assimilating force of the command.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - issued in writing
  - wrote a decree to
  lexicon: LSJ
  rationale: The verb is the ordinary aorist of γράφω, 'write.' Although the context
    is royal policy and thus decree-like, the Greek itself says 'wrote'; the administrative
    force can be carried by the context without overtranslating the verb.
- source_word: πάσῃ τὴν βασιλεία αὐτοῦ
  chosen: to all his kingdom
  alternatives:
  - to his whole kingdom
  - throughout all his kingdom
  lexicon: LSJ
  rationale: The dative with πᾶς plus βασιλεία naturally indicates the full extent
    of the king's realm as the addressee/sphere of the writing. 'To all his kingdom'
    preserves the directness of the Greek while remaining intelligible English.
- source_word: εἶναι πάντας
  chosen: that all should become
  alternatives:
  - that all should be
  - that everyone should be made
  lexicon: LSJ
  rationale: The infinitive clause expresses the content of the royal order. In context
    with εἰς λαὸν ἕνα, English 'become' better conveys movement into a unified status
    than the more static 'be,' while still staying close to the Greek construction.
- source_word: εἰς λαὸν ἕνα
  chosen: one people
  alternatives:
  - a single people
  - one nation
  lexicon: LSJ
  rationale: λαός commonly means 'people' as an ethnic or political body. 'One people'
    is the most natural rendering here and preserves the king's homogenizing policy.
    'Nation' would sound more modern-political than the Greek requires.
