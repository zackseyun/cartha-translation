  text: καὶ ἐγκαταλείπειν ἕκαστον τὰ νόμιμα αὐτοῦ· καὶ ἐπεδέξαντο πάντα τὰ ἔθνη κατὰ
    τὸν λόγον τοῦ βασιλέως.
