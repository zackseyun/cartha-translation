translation:
  text: and that each should abandon his own customs. And all the nations accepted
    the word of the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his own laws' or 'his own ancestral customs.' The Greek τὰ νόμιμα can
      denote customary legal-religious practices, especially traditional observances.
    reason: lexical_alternative
  - marker: b
    text: Or 'the command of the king' or 'the decree of the king.' The Greek says
      literally 'the word of the king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγκαταλείπειν
  chosen: abandon
  alternatives:
  - forsake
  - leave behind
  - give up
  lexicon: BDAG
  rationale: The infinitive denotes leaving or forsaking established practice. 'Abandon'
    conveys a decisive renunciation stronger than the more neutral 'leave behind'
    and fits the coercive context.
- source_word: ἕκαστον
  chosen: each
  alternatives:
  - everyone
  - every one
  lexicon: LSJ
  rationale: ἕκαστον is distributive singular. 'Each' preserves the distributive force
    more precisely than the collective 'everyone'.
- source_word: τὰ νόμιμα αὐτοῦ
  chosen: his own customs
  alternatives:
  - his own laws
  - his own ancestral customs
  - his own ordinances
  lexicon: LSJ
  rationale: In Hellenistic Jewish usage, νόμιμα commonly refers to customary legal-religious
    practices or ancestral observances, not merely codified statutes. 'Customs' is
    the clearest natural English here; 'ancestral customs' is possible but adds nuance
    not explicit in the phrase itself.
- source_word: ἐπεδέξαντο
  chosen: accepted
  alternatives:
  - received
  - adopted
  - complied with
  lexicon: BDAG
  rationale: The verb means to receive or accept. 'Accepted' best matches the lexical
    sense while allowing the context to imply compliance with the royal decree without
    overtranslating.
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - all the peoples
  lexicon: LSJ
  rationale: ἔθνη here refers broadly to the peoples/nations under the king's decree.
    'Nations' is the most straightforward rendering in this historical narrative context;
    'Gentiles' would import a more specifically Jewish contrast not required by the
    immediate syntax.
- source_word: κατὰ τὸν λόγον τοῦ βασιλέως
  chosen: the word of the king
  alternatives:
  - the command of the king
  - the decree of the king
  lexicon: BDAG
  rationale: λόγος can mean word, statement, matter, or command depending on context.
    Because this refers to a royal directive, 'command' or 'decree' are interpretive
    possibilities, but 'word of the king' stays closer to the Greek while remaining
    intelligible.
