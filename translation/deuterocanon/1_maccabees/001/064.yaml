id: 1MA.1.64
reference: 1 Maccabees 1:64
source:
  edition: lxx-swete-1909
  text: καὶ ἐγένετο ὀργὴ μεγάλη ἐπὶ Ἰσραὴλ σφόδρα.
  language: Greek
  pages:
  - 621
  confidence: high
  validation: major_mismatch
translation:
  text: And there came to be very great wrath against Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was very great wrath upon Israel.' The Greek leaves the source
      of the wrath unstated.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: there came to be
  alternatives:
  - there was
  - it came about
  lexicon: BDAG
  rationale: The idiom καὶ ἐγένετο commonly introduces a resulting state or event.
    'There came to be' preserves the verbal force more transparently than the flatter
    'there was,' while remaining natural enough in English.
- source_word: ὀργὴ
  chosen: wrath
  alternatives:
  - anger
  - indignation
  lexicon: BDAG
  rationale: '''Wrath'' best conveys intense anger in a judgment/disaster context.
    ''Anger'' is possible but feels weaker than the Greek in this climactic summary
    statement.'
- source_word: μεγάλη
  chosen: great
  alternatives:
  - severe
  - mighty
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the adjective's intensifying
    force without overinterpreting the nature of the wrath.
- source_word: ἐπὶ Ἰσραήλ
  chosen: against Israel
  alternatives:
  - upon Israel
  - over Israel
  lexicon: BDAG
  rationale: With ὀργή, ἐπί here is most naturally rendered directionally as wrath
    directed 'against' Israel. 'Upon Israel' is more literal but less idiomatic in
    contemporary English.
- source_word: σφόδρα
  chosen: very
  alternatives:
  - exceedingly
  - greatly
  lexicon: BDAG
  rationale: σφόδρα intensifies the whole clause. Rendering it as 'very' before 'great
    wrath' gives natural English while preserving the emphatic force.
