theological_decisions:
- issue: Nature of the implied agent of wrath
  chosen_reading: The text leaves the source of the wrath implicit; the translation
    does not specify God, enemies, or circumstances.
  alternative_readings:
  - divine wrath
  - wrath from the oppressors / persecution
  rationale: The Greek simply states that great wrath came upon/against Israel without
    naming an agent. To preserve the text's ambiguity and avoid importing a doctrinal
    conclusion, the English leaves the agent unstated.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological
    tension rather than resolve it)
