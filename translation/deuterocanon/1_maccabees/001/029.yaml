  text: Μετὰ δύο ἐτῶν ἡμερῶν ἀπέστειλεν ὁ βασιλεὺς ἄρχοντα φορολογίας εἰς τὰς πόλεις
    Ἰούδα καὶ ἦλθεν εἰς Ἰερουσαλὴμ ἐν ὄχλῳ βαρεῖ.
