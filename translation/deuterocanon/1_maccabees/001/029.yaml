translation:
  text: After two years had passed, the king sent a chief collector of tribute to
    the cities of Judah, and he came to Jerusalem with a large force.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a large multitude' or 'with a massive force.' The Greek literally
      says 'with a heavy crowd,' an idiom suggesting a substantial accompanying body.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δύο ἐτῶν ἡμερῶν
  chosen: After two years had passed
  alternatives:
  - After two years
  - After an interval of two years
  lexicon: LSJ
  rationale: The idiom literally combines 'after' with 'two years of days.' In context
    it marks elapsed time. 'After two years had passed' gives natural English while
    preserving the temporal sense without over-literal awkwardness.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard aorist of sending. 'Sent' is the plain and sufficient English
    equivalent.
- source_word: ἄρχοντα φορολογίας
  chosen: a chief collector of tribute
  alternatives:
  - a ruler over tribute
  - an official of taxation
  - a tax collector
  lexicon: LSJ
  rationale: ἄρχων denotes a ruler/official, and φορολογία concerns tribute or taxation.
    The phrase likely refers to a royal fiscal officer rather than a mere local tax
    collector. 'Chief collector of tribute' preserves both official status and the
    tribute/taxation domain.
- source_word: εἰς τὰς πόλεις Ἰούδα
  chosen: to the cities of Judah
  alternatives:
  - into the cities of Judah
  lexicon: LSJ
  rationale: εἰς with motion after 'sent' is naturally rendered 'to.' 'Judah' is the
    standard transliteration for Ἰούδα in this geographical sense.
- source_word: ἐν ὄχλῳ βαρεῖ
  chosen: with a heavy crowd
  alternatives:
  - with a large crowd
  - with a massive force
  - with a burdensome multitude
  lexicon: LSJ
  rationale: ὄχλος is a crowd/multitude, and βαρύς literally means heavy. In military-administrative
    context the phrase suggests a substantial accompanying body. 'Heavy crowd' stays
    close to the Greek while signaling size and weightiness; the more interpretive
    'force' is possible but not demanded.
