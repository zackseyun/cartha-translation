id: 1MA.1.31
reference: 1 Maccabees 1:31
source:
  edition: lxx-swete-1909
  text: καὶ ἔλαβεν τὰ σκῦλα τῆς πόλεως καὶ ἐνεπύρισεν αὐτὴν πυρί, καὶ καθεῖλεν τοὺς
    οἴκους αὐτῆς καὶ τὰ τείχη αὐτῆς κύκλῳ,
  language: Greek
  pages:
