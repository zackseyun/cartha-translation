  confidence: high
  validation: agree
translation:
  text: And he took the plunder of the city and burned it with fire, and he tore down
    its houses and its walls all around.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔλαβεν
  chosen: took
  alternatives:
  - seized
  - captured
  lexicon: BDAG
  rationale: A straightforward past-tense rendering of λαμβάνω fits the narrative
    sequence. 'Took' is natural English and does not overinterpret the manner of acquisition.
- source_word: τὰ σκῦλα
  chosen: the plunder
  alternatives:
  - the spoils
  - the booty
  lexicon: LSJ
  rationale: σκῦλα denotes goods taken in war or pillage. 'Plunder' is clear modern
    English and preserves the violent, military sense better than the somewhat archaic
    'spoils' or more colloquial 'booty'.
- source_word: τῆς πόλεως
  chosen: of the city
  alternatives:
  - from the city
  lexicon: BDAG
  rationale: The genitive most naturally specifies what city was plundered. English
    idiom prefers 'the plunder of the city' here, though the sense includes plunder
    taken from it.
- source_word: ἐνεπύρισεν
  chosen: burned
  alternatives:
  - set on fire
  - burned up
  lexicon: LSJ
  rationale: The verb means to burn or set ablaze. 'Burned' is concise and is reinforced
    by the following dative πυρί, which is retained as 'with fire' to reflect the
    Greek emphasis.
- source_word: αὐτὴν
  chosen: it
  alternatives:
  - her
  lexicon: BDAG
  rationale: The pronoun refers back to πόλις, grammatically feminine in Greek but
    naturally neuter in English when rendered as 'city.'
- source_word: πυρί
  chosen: with fire
  alternatives:
  - by fire
  lexicon: BDAG
  rationale: The instrumental dative is idiomatically rendered 'with fire.' Though
    somewhat redundant in English after 'burned,' it should be preserved because it
    is explicit in the source text.
- source_word: καθεῖλεν
  chosen: tore down
  alternatives:
  - pulled down
  - demolished
  lexicon: BDAG
  rationale: The verb conveys forceful dismantling or destruction. 'Tore down' is
    vivid, natural, and fits the military devastation described.
- source_word: τοὺς οἴκους
  chosen: its houses
  alternatives:
  - its dwellings
  - its homes
  lexicon: BDAG
  rationale: οἶκοι here refers to physical houses/buildings in the city. 'Houses'
    is the most direct rendering.
- source_word: τὰ τείχη
  chosen: its walls
  alternatives:
  - its fortifications
  - its city walls
  lexicon: BDAG
  rationale: τείχη refers to defensive walls. 'Walls' is sufficient in context, since
    the referent is already the city.
- source_word: κύκλῳ
  chosen: all around
  alternatives:
  - round about
  - around
  lexicon: BDAG
  rationale: κύκλῳ indicates surrounding extent. 'All around' captures the comprehensiveness
    of the destruction in clear modern English.
