translation:
  text: And they poured out innocent blood around the sanctuary, and they defiled
    the sanctuary.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξέχεαν
  chosen: poured out
  alternatives:
  - shed
  lexicon: BDAG
  rationale: The verb literally means 'poured out.' In a blood context, 'shed' is
    idiomatic English, but 'poured out' preserves the vividness of the Greek while
    remaining natural.
- source_word: αἷμα ἀθῷον
  chosen: innocent blood
  alternatives:
  - guiltless blood
  lexicon: BDAG
  rationale: This is a standard biblical expression for blood unjustly spilled. 'Innocent
    blood' is the clearest and most established English equivalent.
- source_word: κύκλῳ
  chosen: around
  alternatives:
  - all around
  - surrounding
  lexicon: BDAG
  rationale: The adverb/preposition indicates location encircling the sanctuary. 'Around'
    is concise and accurate.
- source_word: τοῦ ἁγιάσματος
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the temple sanctuary
  lexicon: BDAG
  rationale: ἁγίασμα here refers to the sacred precinct/place rather than holiness
    as an abstract quality. 'Sanctuary' best fits the cultic setting and matches the
    repeated term in the verse.
- source_word: ἐμόλυναν
  chosen: defiled
  alternatives:
  - polluted
  - made unclean
  lexicon: BDAG
  rationale: The verb denotes ritual/moral contamination. 'Defiled' preserves the
    cultic and theological force better than the more generic 'polluted'.
- source_word: τὸ ἁγίασμα
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the temple sanctuary
  lexicon: BDAG
  rationale: Using the same English gloss as earlier in the verse preserves the repetition
    of the Greek and the rhetorical emphasis on the desecration of the sacred place.
