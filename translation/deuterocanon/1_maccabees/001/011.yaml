translation:
  text: In those days lawless men came out from Israel and persuaded many, saying,
    “Let us go and make a covenant with the nations around us, because from the time
    we separated ourselves from them, many evils have found us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sons of lawlessness.' The Greek expression is more literally familial,
      but here it refers idiomatically to people characterized by lawlessness.
    reason: lexical_alternative
  - marker: b
    text: Or 'since we were separated from them.' The Greek may be read with a more
      passive sense.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'many evils found us'; that is, many calamities or troubles came
      upon us.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν ἐξ Ἰσραὴλ
  chosen: came out from Israel
  alternatives:
  - went out from Israel
  - arose from Israel
  lexicon: LSJ
  rationale: The idiom literally means 'went out from Israel,' but in context it denotes
    emergence from within Israel. 'Came out from Israel' preserves the movement imagery
    and the source-oriented sense without overinterpreting it as merely 'arose.'
- source_word: υἱοὶ παράνομος
  chosen: lawless men
  alternatives:
  - lawless sons
  - sons of lawlessness
  - renegades
  lexicon: LSJ
  rationale: The Greek is somewhat irregular in number/agreement in Swete's text,
    but the phrase clearly denotes persons characterized by lawlessness. 'Lawless
    men' gives idiomatic English while preserving the masculine personal reference.
    'Sons of lawlessness' is more literal but less natural in English here.
- source_word: ἀνέπεισαν πολλοὺς
  chosen: persuaded many
  alternatives:
  - won over many
  - misled many
  lexicon: LSJ
  rationale: The verb means to persuade or induce. 'Persuaded many' is the most direct
    rendering. 'Misled' would import a negative evaluative nuance beyond the lexical
    core, though the context itself already signals disapproval.
- source_word: Πορευθῶμεν
  chosen: Let us go
  alternatives:
  - Come, let us go
  lexicon: LSJ
  rationale: A straightforward hortatory subjunctive. 'Let us go' is natural and sufficiently
    formal.
- source_word: διαθώμεθα διαθήκην
  chosen: make a covenant
  alternatives:
  - enter into a covenant
  - make an agreement
  lexicon: LSJ
  rationale: The collocation is covenantal language, not merely a generic agreement.
    'Make a covenant' preserves the biblical-theological register and matches the
    noun διαθήκη consistently.
- source_word: τῶν ἐθνῶν τῶν κύκλῳ ἡμῶν
  chosen: the nations around us
  alternatives:
  - the Gentiles around us
  - the surrounding nations
  lexicon: LSJ
  rationale: In this deuterocanonical historical context, ἔθνη refers to surrounding
    peoples/nations. 'Nations around us' is clear and avoids importing later NT-specific
    'Gentiles' language, though that remains a possible contextual gloss.
- source_word: ἀφʼ ἧς ἐχωρίσθημεν ὑπʼ αὐτῶν
  chosen: from the time we separated ourselves from them
  alternatives:
  - since we were separated from them
  - from when we were set apart from them
  lexicon: LSJ
  rationale: The clause can be taken temporally ('since/from the time') and the passive
    form may be rendered naturally in English with a reflexive sense given the historical
    context of Israel's distinctness. 'Separated ourselves from them' best fits the
    speakers' complaint about Israel's distinct identity, while preserving the separation
    idea.
- source_word: εὗρεν ἡμᾶς κακὰ πολλὰ
  chosen: many evils have found us
  alternatives:
  - many troubles have come upon us
  - many calamities have overtaken us
  lexicon: LSJ
  rationale: The Greek literally says 'many evils found us.' Retaining 'found us'
    preserves the vivid idiom. 'Evils' reflects κακά closely; in context it denotes
    calamities/misfortunes rather than moral evil committed by the speakers.
