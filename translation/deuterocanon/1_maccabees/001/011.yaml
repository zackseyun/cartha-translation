theological_decisions:
- issue: Covenantal terminology in a politically and religiously charged context
  chosen_reading: make a covenant
  alternative_readings:
  - make an agreement
  - enter into an alliance
  rationale: Because διαθήκη is a key biblical term, the translation preserves 'covenant'
    rather than flattening it to a merely political arrangement. This keeps the theological
    weight of Israel seeking formal alignment with surrounding nations.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
