translation:
  text: And Alexander reigned twelve years, and died.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐβασίλευσεν
  chosen: reigned
  alternatives:
  - was king
  - ruled as king
  lexicon: BDAG
  rationale: Aorist of βασιλεύω, denoting the exercise of kingship. 'Reigned' is the
    natural concise English equivalent in historical narrative.
- source_word: ἔτη δώδεκα
  chosen: twelve years
  alternatives:
  - for twelve years
  lexicon: BDAG
  rationale: Accusative of extent/duration. English can express this either as a bare
    duration or with 'for'; the bare phrase keeps closer to the Greek while remaining
    idiomatic after 'reigned'.
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - passed away
  lexicon: BDAG
  rationale: Simple aorist of ἀποθνῄσκω. 'Died' is direct and appropriately plain;
    euphemistic alternatives add tone not present in the source.
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - then ... and
  - and then
  lexicon: BDAG
  rationale: The repeated καί links the two historical actions straightforwardly.
    Retaining 'and' preserves the paratactic style of the Greek narrative without
    over-interpreting sequence.
- source_word: Ἀλέξανδρος
  chosen: Alexander
  lexicon: LSJ
  rationale: Standard English transliteration of the personal name Ἀλέξανδρος, in
    keeping with the project's policy to transliterate names rather than translate
    them.
