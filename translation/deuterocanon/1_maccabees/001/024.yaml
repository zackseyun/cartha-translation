theological_decisions:
- issue: Moral force of φονοκτονίαν
  chosen_reading: murder
  alternative_readings:
  - bloodshed
  - slaughter
  rationale: The Greek term carries a strong sense of unlawful killing. Rendering
    it as 'murder' preserves the condemnation implied by the narrator rather than
    weakening it to a more neutral 'killing.'
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not flattening theological or moral weight.'
