translation:
  text: And after taking everything, he went away to his own land. And they committed
    murder, and spoke great arrogance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bloodshed' or 'slaughter' for 'murder.'
    reason: lexical_alternative
  - marker: b
    text: Or 'spoke great pride/haughtiness.' The Greek uses a noun phrase, literally
      'spoke great arrogance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβὼν
  chosen: after taking
  alternatives:
  - having taken
  - taking
  lexicon: LSJ
  rationale: Aorist participle preceding the main verb; 'after taking' conveys the
    action completed before 'he went away' in natural English.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - it all
  lexicon: LSJ
  rationale: Neuter plural used comprehensively; 'everything' is idiomatic and preserves
    the totality of what was seized.
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - went
  lexicon: LSJ
  rationale: The verb denotes departure; 'went away' is clear modern English and slightly
    fuller than bare 'went'.
- source_word: εἰς τὴν γῆν αὐτοῦ
  chosen: to his own land
  alternatives:
  - into his land
  - to his land
  lexicon: LSJ
  rationale: γῆ can mean land/country. 'His own land' brings out the possessive force
    naturally in English.
- source_word: ἐποίησαν
  chosen: they committed
  alternatives:
  - they did
  - they carried out
  lexicon: LSJ
  rationale: With φονοκτονίαν, the idiom means to commit an act of killing; 'committed'
    is the natural English collocation.
- source_word: φονοκτονίαν
  chosen: murder
  alternatives:
  - bloodshed
  - slaughter
  - homicide
  lexicon: LSJ
  rationale: The noun denotes killing/murder. 'Murder' best preserves the moral weight
    of the term in this context, though 'bloodshed' is a possible broader alternative.
- source_word: ἐλάλησαν
  chosen: spoke
  alternatives:
  - uttered
  - said
  lexicon: LSJ
  rationale: A straightforward rendering of the verb of speech; no need to intensify
    beyond the Greek.
- source_word: ὑπερηφανίαν μεγάλην
  chosen: great arrogance
  alternatives:
  - great pride
  - great haughtiness
  - very proudly
  lexicon: LSJ
  rationale: The phrase denotes arrogant or haughty speech. 'Great arrogance' keeps
    the noun construction and reflects the moral tone of the Greek.
