reference: 1 Maccabees 1:24
source:
  edition: lxx-swete-1909
  text: καὶ λαβὼν πάντα ἀπῆλθεν εἰς τὴν γῆν αὐτοῦ. καὶ ἐποίησαν φονοκτονίαν, καὶ ἐλάλησαν
    ὑπερηφανίαν μεγάλην.
