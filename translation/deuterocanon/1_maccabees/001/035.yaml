translation:
  text: And they stored up weapons and provisions, and after gathering the spoils
    of Jerusalem they deposited them there, and it became a great snare,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spoils from Jerusalem.' The Greek genitive can be rendered either
      way in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέθεντο
  chosen: stored up
  alternatives:
  - placed
  - laid up
  - deposited
  lexicon: LSJ
  rationale: In context the verb describes stockpiling military supplies in the fortified
    place. 'Stored up' conveys purposeful accumulation better than the more generic
    'placed.'
- source_word: ὅπλα
  chosen: weapons
  alternatives:
  - arms
  - armor
  lexicon: LSJ
  rationale: The term can denote arms or weapons generally. 'Weapons' is clear modern
    English and fits the military context.
- source_word: τροφήν
  chosen: provisions
  alternatives:
  - food
  - supplies
  lexicon: LSJ
  rationale: Although literally 'food/nourishment,' in a military stockpiling context
    'provisions' best captures stored sustenance for a garrison.
- source_word: συναγαγόντες
  chosen: after gathering
  alternatives:
  - having collected
  - collecting
  lexicon: LSJ
  rationale: The participle is antecedent to the main verb ἀπέθεντο, so 'after gathering'
    makes the sequence explicit in natural English.
- source_word: τὰ σκῦλα
  chosen: the spoils
  alternatives:
  - plunder
  - booty
  lexicon: LSJ
  rationale: The word refers to goods taken by force. 'Spoils' is idiomatic and suitably
    dignified; 'booty' is too colloquial in modern English.
- source_word: Ἰερουσαλήμ
  chosen: of Jerusalem
  alternatives:
  - from Jerusalem
  lexicon: LSJ
  rationale: The genitive most naturally identifies the source of the spoils. English
    can express this as 'of Jerusalem'; the sense is effectively spoils taken from
    Jerusalem.
- source_word: ἀπέθεντο
  chosen: they deposited
  alternatives:
  - they stored
  - they put away
  - they laid aside
  lexicon: LSJ
  rationale: This verb refers to placing the gathered spoils in that location. 'Deposited'
    distinguishes it from the earlier παρέθεντο while preserving the sense of putting
    into storage.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: LSJ
  rationale: A straightforward locative adverb referring back to the fortified city
    mentioned in the previous verse.
- source_word: παγίδα
  chosen: snare
  alternatives:
  - trap
  - stumbling block
  lexicon: LSJ
  rationale: 'The image is metaphorical: the fortified, hostile presence became a
    dangerous entrapment for Israel/Jerusalem. ''Snare'' preserves the figurative
    force and biblical register.'
