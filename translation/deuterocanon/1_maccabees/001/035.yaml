theological_decisions:
- issue: Metaphorical force of μεγάλην παγίδα
  chosen_reading: it became a great snare
  alternative_readings:
  - it became a great trap
  rationale: This is not a technical theological term, but the metaphor carries interpretive
    weight. 'Snare' preserves the figurative and ominous sense without over-interpreting
    whom it ensnared; the following context supplies that implication.
  doctrine_reference: Preserve theological tension rather than resolve it.
