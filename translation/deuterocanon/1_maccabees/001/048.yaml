theological_decisions:
- issue: Rendering ψυχή in a ritual-covenantal context
  chosen_reading: their souls
  alternative_readings:
  - their lives
  - their persons
  rationale: The verse concerns forced abandonment of covenant markers and embrace
    of impurity. 'Souls' best preserves the text's moral and religious gravity without
    over-paraphrasing. The alternative senses are possible lexically but weaker in
    this context.
