translation:
  text: and to leave their sons uncircumcised, to defile their souls with every unclean
    thing and to profane them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to make their souls abominable' or 'to pollute their persons'; the Greek
      wording can emphasize abhorrence as well as defilement.
    reason: lexical_alternative
  - marker: b
    text: The final 'them' refers back to 'their souls' in Greek, though English may
      hear it more broadly as referring to the people themselves.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφεῖναι
  chosen: to leave
  alternatives:
  - to let remain
  - to allow to remain
  lexicon: LSJ
  rationale: Aorist infinitive of ἀφίημι here means to leave or let remain in a given
    state. 'To leave' is the most natural English infinitive in this decree context.
- source_word: τοὺς υἱοὺς αὐτῶν
  chosen: their sons
  alternatives:
  - their children
  lexicon: LSJ
  rationale: υἱούς is specifically 'sons,' not a gender-neutral term. This also fits
    the immediate reference to circumcision, which applies to males.
- source_word: ἀπεριτμήτους
  chosen: uncircumcised
  alternatives:
  - without circumcision
  lexicon: LSJ
  rationale: Direct and standard rendering of the adjective; it preserves the covenantal
    and ritual force of the term.
- source_word: βδελύξαι
  chosen: to defile
  alternatives:
  - to make abominable
  - to pollute
  lexicon: LSJ
  rationale: The verb is related to abhorrence/abomination, but in this context of
    ritual contamination paired with ἀκαθάρτῳ and βεβηλώσαι, 'to defile' best conveys
    the intended result in readable English.
- source_word: τὰς ψυχὰς αὐτῶν
  chosen: their souls
  alternatives:
  - their lives
  - their persons
  lexicon: LSJ
  rationale: ψυχή can mean soul, life, or self. Here, in a context of ritual and covenantal
    corruption, 'souls' preserves the moral-religious weight better than the flatter
    'lives' or 'persons'.
- source_word: ἐν παντὶ ἀκαθάρτῳ
  chosen: with every unclean thing
  alternatives:
  - by every uncleanness
  - with everything unclean
  lexicon: LSJ
  rationale: The phrase is instrumental/associative in sense. 'With every unclean
    thing' is idiomatic and keeps the broad scope of ritual impurity.
- source_word: βεβηλώσαι
  chosen: to profane them
  alternatives:
  - to desecrate them
  lexicon: LSJ
  rationale: 'βεβηλόω means to profane or desecrate. ''Profane'' pairs well with the
    preceding ''defile'' while preserving a distinction: defilement by impurity and
    profanation by violation of holiness.'
