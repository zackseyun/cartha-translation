id: 1MA.1.49
reference: 1 Maccabees 1:49
source:
  edition: lxx-swete-1909
  text: ὥστε ἐπιλαθέσθαι τοῦ νόμου, καὶ ἀλλάξαι πάντα τὰ δικαιώματα.
  language: Greek
