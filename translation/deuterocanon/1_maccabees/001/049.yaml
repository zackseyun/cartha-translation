  confidence: high
  validation: agree
translation:
  text: so that they might forget the law and change all the ordinances.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the result that they forgot the law and changed all the statutes.'
      The Greek ὥστε can express either intended result or actual result, and δικαιώματα
      can also be rendered 'statutes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - so as to
  lexicon: LSJ
  rationale: Introduces purpose/result. In this context, following the preceding commands,
    'so that' naturally conveys intended result without over-specifying whether purpose
    or consequence is primary.
- source_word: ἐπιλαθέσθαι
  chosen: might forget
  alternatives:
  - to forget
  - neglect
  lexicon: BDAG
  rationale: The aorist middle infinitive from ἐπιλανθάνομαι means 'to forget.' 'Might
    forget' fits the dependent construction after ὥστε in idiomatic English. 'Neglect'
    is weaker and less direct than the Greek.
- source_word: τοῦ νόμου
  chosen: the law
  alternatives:
  - the Law
  lexicon: LSJ
  rationale: νόμος here refers to the Jewish law/Torah in the Maccabean context. Lowercase
    'law' keeps the translation readable while still accurately referring to the covenantal
    law; capitalization is an English interpretive convention not required by the
    Greek.
- source_word: ἀλλάξαι
  chosen: alter
  alternatives:
  - change
  - replace
  lexicon: LSJ
  rationale: '''Alter'' captures the sense of changing what already exists without
    implying total replacement. ''Change'' is possible but less precise; ''replace''
    goes beyond the Greek.'
- source_word: πάντα
  chosen: all
  alternatives:
  - every
  lexicon: LSJ
  rationale: The adjective is comprehensive. 'All' reads naturally with the plural
    noun phrase in English.
- source_word: τὰ δικαιώματα
  chosen: the ordinances
  alternatives:
  - the statutes
  - the decrees
  - the requirements
  lexicon: LSJ
  rationale: δικαιώματα in biblical Greek often denotes prescribed ordinances or statutes.
    'Ordinances' preserves the formal legal-religious sense here better than the broader
    'requirements' and is less potentially misleading than 'decrees,' which can suggest
    royal edicts rather than covenantal prescriptions.
