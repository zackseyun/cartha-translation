theological_decisions:
- issue: Rendering of νόμος in a Jewish covenantal context
  chosen_reading: the law
  alternative_readings:
  - the Law
  - the Torah
  rationale: The Greek simply has τοῦ νόμου. 'The law' is the most transparent English
    rendering from the source text. 'The Torah' would foreground Jewish specificity
    but imports a transliterated term not present in the Greek; 'the Law' is a capitalization
    choice rather than a lexical distinction.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    readable modern English'
- issue: Rendering of δικαιώματα in covenantal/legal context
  chosen_reading: ordinances
  alternative_readings:
  - statutes
  - decrees
  rationale: The term refers to established legal/religious prescriptions. 'Ordinances'
    best preserves that sense in accessible English without narrowing the source to
    civil decrees alone.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception;
    readable modern English'
