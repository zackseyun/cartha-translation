translation:
  text: And the books of the law that they found, they tore to pieces and burned with
    fire.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰ βιβλία
  chosen: the books
  alternatives:
  - the scrolls
  - the book-rolls
  lexicon: LSJ
  rationale: βιβλία is the plural of βιβλίον and broadly denotes written documents/books;
    'books' is the most natural modern English rendering, while 'scrolls' is possible
    in ancient context but more interpretive than the Greek itself requires.
- source_word: τοῦ νόμου
  chosen: of the law
  alternatives:
  - of the Law
  lexicon: LSJ
  rationale: νόμος here refers to the Jewish law/Torah. 'the law' preserves the Greek
    wording closely; capitalization as 'Law' is possible as an interpretive signal
    toward Torah, but the lower-case form keeps the translation transparent while
    still conveying the referent in context.
- source_word: ἃ εὗρον
  chosen: that they found
  alternatives:
  - which they found
  - whatever they found
  lexicon: LSJ
  rationale: The relative pronoun with εὗρον straightforwardly means 'which/that they
    found.' 'That they found' is idiomatic modern English and does not overstate the
    distributive force.
- source_word: κατασχίσαντες
  chosen: they tore to pieces
  alternatives:
  - having torn up
  - after tearing apart
  - they tore up
  lexicon: LSJ
  rationale: The participle denotes tearing apart or shredding. 'Tore to pieces' conveys
    the violent destruction clearly in natural English. Rendering it as a finite verb
    alongside 'burned' reflects normal English style for a participle of attendant
    action in narrative.
- source_word: ἐνεπύρισαν πυρί
  chosen: burned with fire
  alternatives:
  - set on fire
  - burned in the fire
  - consigned to the fire
  lexicon: LSJ
  rationale: The verb means to burn/set afire, and the dative πυρί explicitly adds
    'with fire.' 'Burned with fire' preserves the emphatic wording of the Greek, even
    if slightly redundant in English, because the phrase is formulaic and forceful.
