theological_decisions:
- issue: Whether γῆ should be rendered narrowly as 'land' or more broadly as 'earth'
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: The verse uses elevated lament language and pairs γῆ with 'those who
    lived on it,' which naturally reads broadly. Rendering 'earth' preserves the rhetorical
    scope without forcing a modern scientific literalism.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English.'
- issue: Whether to preserve the clothing metaphor in ἐνεδύσατο αἰσχύνην
  chosen_reading: put on shame
  alternative_readings:
  - was clothed with shame
  - was covered in shame
  rationale: The metaphor is explicit in the Greek and should be preserved rather
    than paraphrased away. This also maintains the verse's poetic force and intertextual
    biblical style.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning without unnecessary paraphrase.'
