translation:
  text: And the earth shook for those who dwelt on it, and the whole house of Jacob
    clothed itself with shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land shook.' The Greek γῆ can mean either 'earth' or 'land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσείσθη
  chosen: shook
  alternatives:
  - was shaken
  - quaked
  lexicon: LSJ
  rationale: Aorist passive of σείω, used of shaking or quaking. 'Shook' is natural
    modern English and preserves the vividness without overinterpreting whether the
    sense is literal, metaphorical, or both.
- source_word: ἡ γῆ
  chosen: the earth
  alternatives:
  - the land
  lexicon: LSJ
  rationale: γῆ can mean 'earth' or 'land.' Here the universalizing phrase 'those
    who lived on it' and the lament-like tone favor 'the earth' rather than the narrower
    'land,' while still allowing rhetorical force rather than a strictly geological
    statement.
- source_word: ἐπὶ τοὺς κατοικοῦντας αὐτήν
  chosen: over those who lived on it
  alternatives:
  - against those who dwelt in it
  - upon its inhabitants
  lexicon: LSJ
  rationale: The preposition ἐπί with the accusative can mark movement or extension
    over/upon, and κατοικοῦντας denotes inhabitants. 'Over those who lived on it'
    keeps the Greek image fairly closely while remaining readable. 'Its inhabitants'
    is possible but less transparent to the underlying wording.
- source_word: πᾶς ὁ οἶκος Ἰακώβ
  chosen: the whole house of Jacob
  alternatives:
  - all the house of Jacob
  - all Israel
  lexicon: LSJ
  rationale: This is a conventional covenantal-national expression. 'The whole house
    of Jacob' preserves the source wording and biblical resonance better than interpretive
    expansion to 'all Israel.'
- source_word: ἐνεδύσατο
  chosen: put on
  alternatives:
  - clothed itself with
  - was clothed in
  lexicon: LSJ
  rationale: Middle of ἐνδύω, literally 'put on' or 'clothe oneself.' The metaphor
    of wearing shame is important, so the concrete idiom should be retained rather
    than flattened.
- source_word: αἰσχύνην
  chosen: shame
  alternatives:
  - disgrace
  - humiliation
  lexicon: LSJ
  rationale: αἰσχύνη commonly denotes shame or disgrace. 'Shame' is the most direct
    and broadly intelligible rendering; 'disgrace' is possible but slightly more external/public
    in nuance.
