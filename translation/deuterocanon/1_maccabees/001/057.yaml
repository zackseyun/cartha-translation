translation:
  text: And wherever a book of the covenant was found with anyone, or if anyone consented
    to the law, the king’s decree put him to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a covenant document' or 'a book of the law/covenant.' The Greek literally
      reads 'a book of the covenant.'
    reason: lexical_alternative
  - marker: b
    text: That is, anyone who aligned himself with or remained loyal to the Jewish
      law.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου
  chosen: wherever
  alternatives:
  - where
  - in whatever place
  lexicon: LSJ
  rationale: The indefinite-relative sense fits the distributive context of enforcement
    in multiple locations.
- source_word: εὑρίσκετο
  chosen: was found
  alternatives:
  - was discovered
  lexicon: LSJ
  rationale: Imperfect/passive form is naturally rendered as an ongoing or customary
    passive in context; 'was found' is idiomatic and sufficiently formal.
- source_word: παρὰ τινι
  chosen: with anyone
  alternatives:
  - in someone's possession
  - beside someone
  lexicon: LSJ
  rationale: The phrase indicates possession or custody. 'With anyone' is concise
    modern English that preserves the sense without over-specifying legal possession.
- source_word: βιβλίον διαθήκης
  chosen: a book of the covenant
  alternatives:
  - a covenant book
  - a book of the law/covenant
  lexicon: LSJ
  rationale: διαθήκη here most naturally means 'covenant,' not merely 'testament.'
    The phrase likely refers to a covenant document/scriptural book, and the more
    literal rendering preserves that biblical resonance.
- source_word: συνευδόκει
  chosen: consented
  alternatives:
  - agreed
  - approved
  - was favorable
  lexicon: BDAG
  rationale: The verb conveys approving or siding with something. 'Consented' captures
    active alignment with the law in this coercive setting better than the flatter
    'agreed.'
- source_word: τῷ νόμῳ
  chosen: the law
  alternatives:
  - the Law
  lexicon: LSJ
  rationale: νόμος here refers to the Jewish law/Torah. Lowercase 'law' keeps readable
    English while still allowing the context to signal the Mosaic law; capitalization
    is interpretive and not required by the Greek.
- source_word: τὸ σύγκριμα τοῦ βασιλέως
  chosen: the king’s decree
  alternatives:
  - the king's sentence
  - the king's ordinance
  - the king's decision
  lexicon: LSJ
  rationale: The phrase denotes the king's formal ruling or judicial order. 'Decree'
    is natural English for an official royal command with penal force.
- source_word: ἐθάνατου αὐτόν
  chosen: put him to death
  alternatives:
  - killed him
  - executed him
  lexicon: LSJ
  rationale: This expresses state-imposed killing under royal authority. 'Put him
    to death' preserves the formal judicial tone better than 'killed him' and is less
    interpretively narrow than 'executed him,' though that idea is present.
