theological_decisions:
- issue: Reference of 'the law' (τῷ νόμῳ)
  chosen_reading: the Jewish law/Torah is intended
  alternative_readings:
  - law in a more generic sense
  rationale: In the context of Antiochus' suppression of Jewish practice in 1 Maccabees
    1, νόμος refers specifically to the ancestral/Mosaic law. The translation keeps
    the wording 'the law' rather than expanding to 'the Law of Moses,' avoiding unnecessary
    interpretive addition while preserving the contextual sense.
  doctrine_reference: 'Translation philosophy: original-language primacy; avoid importing
    claims beyond the text.'
