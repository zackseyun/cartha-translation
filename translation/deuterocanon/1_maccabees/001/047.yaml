translation:
  text: to build altars and shrines and idols, and to sacrifice swine and unclean
    animals,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common animals'; the Greek adjective can mean 'common,' but here likely
      carries the sense of ritually unclean in a Jewish purity context.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκοδομῆσαι
  chosen: to build
  alternatives:
  - to construct
  lexicon: LSJ
  rationale: Aorist infinitive expressing the commanded action. 'Build' is the natural
    modern English equivalent and fits all three following objects.
- source_word: βωμούς
  chosen: altars
  alternatives:
  - high places
  lexicon: LSJ
  rationale: βωμός ordinarily denotes an altar, especially for sacrifice. 'Altars'
    is the direct and contextually appropriate rendering.
- source_word: τεμένη
  chosen: shrines
  alternatives:
  - sanctuaries
  - sacred precincts
  lexicon: LSJ
  rationale: τέμενος can denote a consecrated place or sacred precinct. In this list
    of illicit cultic installations, 'shrines' is concise and readable, while 'sacred
    precincts' would sound overly technical and expansive for the immediate context.
- source_word: εἴδωλα
  chosen: idols
  alternatives:
  - images
  lexicon: LSJ
  rationale: In Jewish polemical and cultic context, εἴδωλα is best rendered 'idols'
    rather than the more neutral 'images,' since the verse concerns pagan worship
    objects.
- source_word: θύειν
  chosen: to sacrifice
  alternatives:
  - to offer sacrifices
  lexicon: LSJ
  rationale: The infinitive continues the list of required actions. 'To sacrifice'
    is compact and idiomatic in English.
- source_word: ὕεια
  chosen: swine
  alternatives:
  - pigs
  - pig flesh
  lexicon: LSJ
  rationale: The term refers to pigs/hogs. 'Swine' preserves the formal cultic tone
    and matches the sacrificial context better than the more colloquial 'pigs.'
- source_word: κτῆνη κοινά
  chosen: unclean animals
  alternatives:
  - common animals
  - defiled livestock
  lexicon: LSJ
  rationale: κοινός in Jewish purity contexts means 'common' in the sense of ritually
    profane/unclean, not merely ordinary. Since the phrase refers to animals offered
    in violation of Torah purity distinctions, 'unclean animals' communicates the
    intended sense clearly in English. κτῆνη is broad ('beasts,' 'cattle,' 'animals'),
    so 'animals' is the most natural generic rendering here.
