theological_decisions:
- issue: Rendering κοινά in a Jewish purity context
  chosen_reading: unclean animals
  alternative_readings:
  - common animals
  rationale: Although κοινός literally means 'common,' in Hellenistic Jewish usage
    it often carries ritual impurity force. Because the verse describes anti-Torah
    cultic practices, translating the phrase as 'unclean animals' best reflects the
    semantic value in context rather than a wooden gloss that could obscure the offense
    intended.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
