translation:
  text: And they took the women and the children captive, and they seized the livestock
    as spoil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the livestock they took possession of' or 'they inherited.'
      The Greek verb normally has the sense of receiving a possession, but here it
      functions in a conquest context for taking animals as plunder.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾐχμαλώτευσεν
  chosen: took ... captive
  alternatives:
  - led away captive
  - captured
  lexicon: LSJ
  rationale: The verb means to take as prisoners of war or carry off into captivity.
    'Took ... captive' is natural modern English and preserves the coercive wartime
    sense better than the flatter 'captured.'
- source_word: τὰς γυναῖκας
  chosen: the women
  alternatives:
  - wives
  lexicon: LSJ
  rationale: Although γυνή can mean either 'woman' or 'wife,' the plural here in a
    list of victims alongside children is best taken generically as 'women,' not specifically
    married women.
- source_word: τὰ τέκνα
  chosen: the children
  alternatives:
  - the sons
  - the offspring
  lexicon: LSJ
  rationale: τέκνα is the broad term 'children,' not specifically male children. This
    keeps the scope of the victims accurate.
- source_word: τὰ κτήνη
  chosen: the livestock
  alternatives:
  - the cattle
  - the beasts
  lexicon: LSJ
  rationale: κτήνη refers to domesticated animals/property animals. 'Livestock' is
    the clearest modern equivalent; 'cattle' would be too narrow and 'beasts' too
    archaic or vague.
- source_word: ἐκληρονόμησαν
  chosen: seized ... as spoil
  alternatives:
  - inherited
  - took possession of
  - appropriated
  lexicon: LSJ
  rationale: Literally the verb is related to inheriting or obtaining possession,
    but in this military-plundering context with livestock as the object, the sense
    is that the invaders took possession of them as plunder. 'Seized ... as spoil'
    makes the contextual force clear in English without implying lawful inheritance.
