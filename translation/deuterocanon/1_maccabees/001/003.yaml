translation:
  text: And he passed on to the ends of the earth, and took plunder from a multitude
    of nations; and the earth was quiet before him, and he was exalted, and his heart
    was lifted up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his heart grew proud.' The Greek literally says, 'his heart was lifted
      up,' an idiom often associated with pride.
    reason: lexical_alternative
lexical_decisions:
- source_word: διῆλθεν
  chosen: passed on
  alternatives:
  - went through
  - advanced
  - traversed
  lexicon: LSJ
  rationale: The verb denotes moving through or across territory. 'Passed on' preserves
    the sense of onward advance in conquest without over-specifying route or manner.
- source_word: ἕως ἄκρων τῆς γῆς
  chosen: to the ends of the earth
  alternatives:
  - as far as the extremities of the earth
  - to the farthest parts of the land
  lexicon: LSJ
  rationale: This is a conventional idiom for the farthest reaches of the world/land.
    'Ends of the earth' is natural English and preserves the expansive, hyperbolic
    scope.
- source_word: ἔλαβεν σκῦλα
  chosen: took plunder
  alternatives:
  - seized spoils
  - took spoil
  lexicon: LSJ
  rationale: σκῦλα refers to spoils taken in war. 'Plunder' is clear modern English
    and fits the military context.
- source_word: πλήθους ἐθνῶν
  chosen: from a multitude of nations
  alternatives:
  - from many nations
  - of a host of nations
  lexicon: LSJ
  rationale: The genitive construction indicates the source or sphere from which the
    spoils were taken. 'A multitude of nations' reflects both πλήθους and ἐθνῶν without
    flattening the phrase.
- source_word: ἡσύχασεν ἡ γῆ ἐνώπιον αὐτοῦ
  chosen: the earth was quiet before him
  alternatives:
  - the land was at rest before him
  - the earth became still before him
  lexicon: LSJ
  rationale: ἡσυχάζω conveys quietness or rest. 'Was quiet before him' preserves the
    image of subdued calm under his dominance; 'earth' matches γῆ in the broader world-conquest
    context.
- source_word: ὑψώθη
  chosen: he was exalted
  alternatives:
  - he was lifted up
  - he became great
  lexicon: LSJ
  rationale: The passive verb suggests being raised high in status. 'Was exalted'
    captures the elevation of rank or prestige and prepares for the following statement
    about his heart.
- source_word: ἐπήρθη ἡ καρδία αὐτοῦ
  chosen: his heart was lifted up
  alternatives:
  - his heart was raised
  - he became proud
  lexicon: LSJ
  rationale: The Greek idiom literally speaks of the heart being lifted up, often
    implying pride or arrogance. The more literal rendering preserves the idiom and
    lets readers hear the moral nuance without importing an interpretive paraphrase.
