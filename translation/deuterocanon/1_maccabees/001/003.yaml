theological_decisions:
- issue: Moral evaluation of ἐπήρθη ἡ καρδία αὐτοῦ
  chosen_reading: his heart was lifted up
  alternative_readings:
  - he became proud
  - his heart grew proud
  rationale: The phrase likely carries a negative connotation of pride, but the Greek
    expresses this idiomatically rather than with an explicit adjective. The main
    text preserves the source idiom; the interpretive alternative is worth noting
    but not necessary in the main line.
  doctrine_reference: Preserve theological tension rather than resolve it.
