translation:
  text: According to her glory, her dishonor was multiplied, and her exaltation was
    turned into mourning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'According to her glory, her disgrace increased'; κατά may express correspondence,
      and ἀτιμασμός may be rendered 'disgrace' or 'humiliation.'
    reason: lexical_alternative
  - marker: b
    text: '''Height'' may also be understood figuratively as ''exaltation'' or ''loftiness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  chosen: In proportion to
  alternatives:
  - according to
  - in keeping with
  lexicon: LSJ
  rationale: With the accusative τὴν δόξαν, κατά here expresses correspondence or
    proportion, not mere spatial or adversative sense. 'In proportion to' makes the
    comparative force clear in natural English.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: LSJ
  rationale: δόξα can denote honor, reputation, or splendor. 'Glory' best preserves
    the elevated register and the contrast with ἀτιμασμός in the same clause.
- source_word: ἐπληθύνθη
  chosen: was multiplied
  alternatives:
  - increased
  - became great
  lexicon: LSJ
  rationale: The passive aorist is retained with 'was multiplied,' preserving the
    formal contrast and the sense of disgrace increasing greatly.
- source_word: ἀτιμασμὸς
  chosen: dishonor
  alternatives:
  - disgrace
  - humiliation
  lexicon: LSJ
  rationale: The noun denotes dishonor or disgrace. 'Dishonor' pairs well with 'glory'
    as an antonym and keeps the abstract noun structure of the Greek.
- source_word: ὕψος
  chosen: height
  alternatives:
  - exaltation
  - loftiness
  lexicon: LSJ
  rationale: ὕψος can be literal height or figurative exalted status. 'Height' preserves
    the metaphor and allows readers to hear both elevation and status without over-interpreting.
- source_word: ἐστράφη εἰς πένθος
  chosen: was turned into mourning
  alternatives:
  - was changed to mourning
  - became mourning
  lexicon: LSJ
  rationale: The passive with εἰς marks transformation. 'Was turned into mourning'
    is idiomatic and preserves the reversal imagery.
