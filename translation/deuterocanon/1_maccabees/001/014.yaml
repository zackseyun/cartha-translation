theological_decisions:
- issue: Rendering of ἐθνῶν in a Jewish contrastive context
  chosen_reading: of the nations
  alternative_readings:
  - of the Gentiles
  - of the pagans
  rationale: The verse contrasts Jerusalem's new institution with non-Jewish patterns.
    'Nations' preserves the lexical form and avoids importing a stronger pejorative
    judgment than the Greek itself states, while readers can still infer the Jewish/non-Jewish
    contrast from context.
