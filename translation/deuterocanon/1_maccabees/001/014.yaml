translation:
  text: And they built a gymnasium in Jerusalem according to the customs of the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the Gentiles.' The Greek says 'of the nations,' a common Jewish way
      of referring to non-Jewish peoples.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠκοδόμησαν
  chosen: built
  alternatives:
  - constructed
  lexicon: BDAG
  rationale: The aorist verb straightforwardly denotes building or constructing. 'Built'
    is the most natural modern English rendering and preserves the concrete action.
- source_word: γυμνάσιον
  chosen: gymnasium
  alternatives:
  - training ground
  - exercise hall
  lexicon: LSJ
  rationale: The Greek names the Hellenistic institution itself, not merely a generic
    place for exercise. 'Gymnasium' preserves the historical-cultural specificity
    important in 1 Maccabees.
- source_word: ἐν Ἱεροσολύμοις
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: BDAG
  rationale: Standard locative rendering. 'In Jerusalem' is idiomatic modern English.
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in keeping with
  - after the manner of
  lexicon: BDAG
  rationale: Here κατά with the accusative expresses conformity to a standard or pattern.
    'According to' is clear and sufficiently formal.
- source_word: τὰ νόμιμα
  chosen: the customs
  alternatives:
  - the laws
  - the practices
  - the institutions
  lexicon: LSJ
  rationale: In this context νόμιμα refers to customary institutions or accepted practices
    rather than formal legislation alone. 'Customs' best captures the social-religious
    sense in context.
- source_word: τῶν ἐθνῶν
  chosen: of the nations
  alternatives:
  - of the Gentiles
  - of the pagans
  lexicon: BDAG
  rationale: The basic sense is 'nations' or 'Gentiles.' In this deuterocanonical
    Jewish context it refers to non-Jewish peoples. 'Nations' is the more literal
    and less interpretively loaded choice, while still conveying the contrast with
    Jewish practice.
