theological_decisions:
- issue: Personification of Jerusalem in feminine singular clauses
  chosen_reading: Retain feminine personification with 'she' and 'her' throughout
    the verse.
  alternative_readings:
  - Use repeated 'Jerusalem' instead of pronouns
  - Neutralize the personification into impersonal description
  rationale: The Greek shifts from naming Jerusalem to describing her as a feminine
    entity. Preserving this personification maintains the lament-like force of the
    verse and supports the maternal imagery in 'her children.'
  doctrine_reference: 'Translation philosophy: readable modern English while preserving
    source meaning; do not flatten significant imagery.'
