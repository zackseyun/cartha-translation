translation:
  text: And the inhabitants of Jerusalem fled because of them, and she became a dwelling
    place of foreigners; she became foreign to her offspring, and her children abandoned
    her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she became alien to her produce.' The Greek term can refer either to
      offspring/descendants or to what is produced; the immediate parallel with 'her
      children' favors 'offspring.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφυγον
  chosen: fled
  alternatives:
  - ran away
  - took flight
  lexicon: LSJ
  rationale: A straightforward past action of escaping. 'Fled' is concise and natural
    English while preserving the force of departure under pressure.
- source_word: οἱ κάτοικοι
  chosen: the inhabitants
  alternatives:
  - those dwelling
  - the residents
  lexicon: LSJ
  rationale: Refers to those living in Jerusalem. 'Inhabitants' is slightly more formal
    than 'residents' and fits the historical register.
- source_word: διʼ αὐτούς
  chosen: because of them
  alternatives:
  - on account of them
  - from them
  lexicon: LSJ
  rationale: The preposition with accusative here indicates cause or occasion. 'Because
    of them' best captures that the inhabitants fled due to the oppressors mentioned
    in context.
- source_word: κατοικία ἀλλοτρίων
  chosen: a dwelling place of foreigners
  alternatives:
  - a habitation of strangers
  - a home for foreigners
  lexicon: LSJ
  rationale: The phrase describes Jerusalem as occupied by non-native outsiders. 'Dwelling
    place of foreigners' preserves the concrete image and the alienation theme.
- source_word: ἐγένετο ἀλλοτρία
  chosen: she became foreign
  alternatives:
  - she became estranged
  - she became alien
  lexicon: LSJ
  rationale: The feminine adjective agrees with Jerusalem understood as a feminine
    city. 'Became foreign' keeps the lexical link with ἀλλοτρίων in the previous clause
    and preserves the stark personification.
- source_word: τοῖς γενήμασιν αὐτῆς
  chosen: to her offspring
  alternatives:
  - to her produce
  - to those born from her
  lexicon: LSJ
  rationale: γενήματα can denote offspring or produce. In this context, followed by
    'her children abandoned her,' the sense of descendants/offspring best fits the
    personified city and parallelism.
- source_word: τὰ τέκνα αὐτῆς
  chosen: her children
  alternatives:
  - her sons
  - her offspring
  lexicon: LSJ
  rationale: τέκνα is broader than 'sons' and naturally rendered 'children.' This
    preserves the familial metaphor of Jerusalem as mother-city.
- source_word: ἐγκατέλειπον
  chosen: abandoned
  alternatives:
  - forsook
  - left behind
  lexicon: LSJ
  rationale: The verb conveys desertion, not mere departure. 'Abandoned' communicates
    the emotional and covenantal weight without archaic diction.
