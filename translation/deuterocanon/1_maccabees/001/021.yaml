reference: 1 Maccabees 1:21
source:
  edition: lxx-swete-1909
  text: καὶ εἰσῆλθεν εἰς τὸ ἁγίασμα ἐν ὑπερηφανίᾳ, καὶ ἔλαβεν τὸ θυσιαστήριον τὸ χρυσοῦν,
    καὶ τὴν λυχνίαν τοῦ φωτὸς καὶ πάντα τὰ σκεύη αὐτῆς,
  language: Greek
  pages:
