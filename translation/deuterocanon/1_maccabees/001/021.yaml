  confidence: high
  validation: agree
translation:
  text: And he entered the sanctuary in arrogance, and took the golden altar, and
    the lampstand of the light with all its utensils,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy place.' The Greek ἁγίασμα can be rendered more specifically,
      but 'sanctuary' was chosen to avoid over-specifying the exact chamber beyond
      what the wording itself requires.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁγίασμα
  chosen: sanctuary
  alternatives:
  - holy place
  - holy sanctuary
  lexicon: LSJ
  rationale: ἁγίασμα denotes a sacred place or sanctuary. 'Sanctuary' is natural modern
    English and fits the temple context without over-specifying an inner chamber not
    stated by the Greek.
- source_word: ἐν ὑπερηφανίᾳ
  chosen: in arrogance
  alternatives:
  - proudly
  - in pride
  - with arrogance
  lexicon: LSJ
  rationale: The phrase expresses manner. 'In arrogance' preserves the noun-based
    construction and the moral force of ὑπερηφανία better than the flatter adverb
    'proudly.'
- source_word: θυσιαστήριον τὸ χρυσοῦν
  chosen: the golden altar
  alternatives:
  - the altar of gold
  - the gold altar
  lexicon: LSJ
  rationale: This is the natural English rendering of the articular noun plus adjective.
    'Golden altar' is idiomatic and preserves the likely reference to the altar associated
    with the sanctuary furnishings.
- source_word: λυχνίαν τοῦ φωτός
  chosen: the lampstand for the light
  alternatives:
  - the lampstand of the light
  - the lampstand
  lexicon: LSJ
  rationale: The genitive τοῦ φωτός is retained in sense rather than omitted. 'For
    the light' communicates function in clear English while staying close to the Greek
    expression.
- source_word: σκεύη
  chosen: utensils
  alternatives:
  - vessels
  - implements
  - articles
  lexicon: LSJ
  rationale: σκεύη here refers to the associated temple items belonging to the lampstand.
    'Utensils' is concrete and readable; 'vessels' could sound too narrow or archaic
    in this context.
