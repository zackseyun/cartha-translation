translation:
  text: and the table for the presentation of the bread, and the libation vessels
    and the bowls and the golden censers and the curtain and the crowns and the gold
    decoration on the front of the temple—and he stripped it all off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the table of the Presence' / 'the showbread table.' The Greek literally
      refers to the table associated with the setting out of the bread before God.
    reason: lexical_alternative
  - marker: b
    text: The verb can mean 'peeled off' or 'stripped off,' suggesting the removal
      of gold plating or decorative overlay from the temple frontage.
    reason: lexical_alternative
lexical_decisions:
- source_word: τράπεζαν τῆς προθέσεως
  chosen: the table for the presentation of the bread
  alternatives:
  - the table of presentation
  - the table of the Presence
  - the showbread table
  lexicon: LSJ
  rationale: πρόθεσις in temple context refers to the setting out of the bread before
    God. 'Table for the presentation of the bread' makes the cultic function explicit
    in clear English without importing later traditional wording too strongly. 'Table
    of the Presence' is possible by association with the bread of the Presence, but
    the Greek here names the presentation arrangement itself.
- source_word: σπονδεῖα
  chosen: libation vessels
  alternatives:
  - drink-offering vessels
  - cups for libations
  lexicon: LSJ
  rationale: The term denotes implements associated with libations. 'Libation vessels'
    is concise, natural English and preserves the ritual sense better than a bare
    'cups'.
- source_word: φιάλας
  chosen: bowls
  alternatives:
  - pateras
  - saucers
  lexicon: LSJ
  rationale: φιάλη commonly denotes a broad bowl used in ritual contexts. 'Bowls'
    is the standard accessible rendering.
- source_word: θυΐσκας
  chosen: censers
  alternatives:
  - incense burners
  - incense pans
  lexicon: LSJ
  rationale: The word refers to implements for burning incense. 'Censers' is a familiar
    cultic term in English and fits the temple inventory.
- source_word: χρυσᾶς
  chosen: golden
  alternatives:
  - made of gold
  - gold
  lexicon: LSJ
  rationale: The adjective directly modifies the censers. 'Golden' is idiomatic and
    sufficiently precise.
- source_word: καταπέτασμα
  chosen: curtain
  alternatives:
  - veil
  lexicon: LSJ
  rationale: The term denotes the temple hanging/veil. 'Curtain' is more accessible
    modern English; 'veil' remains possible but can sound more traditional than necessary.
- source_word: στεφάνους
  chosen: crowns
  alternatives:
  - wreaths
  - ornamental crowns
  lexicon: LSJ
  rationale: The basic sense is 'crowns' or 'wreaths.' In a temple-furnishing list,
    these are ornamental elements. 'Crowns' keeps the formal lexical correspondence
    while allowing readers to infer decorative use from context.
- source_word: κόσμον τὸν χρυσοῦν
  chosen: the gold decoration
  alternatives:
  - the golden ornamentation
  - the gold adornment
  lexicon: LSJ
  rationale: κόσμος here means ornament/adornment, not 'world.' 'Gold decoration'
    is clear and natural in context.
- source_word: κατὰ πρόσωπον τοῦ ναοῦ
  chosen: on the front of the temple
  alternatives:
  - before the temple
  - facing the temple
  lexicon: LSJ
  rationale: The phrase most naturally describes the location of the ornamentation
    as being on the temple's front/facade. 'Before the temple' is possible more literally,
    but in an inventory of architectural plunder the facade sense fits better.
- source_word: ἐλέπισεν
  chosen: he stripped it all off
  alternatives:
  - he peeled it all off
  - he stripped everything away
  lexicon: LSJ
  rationale: The verb literally suggests peeling or stripping off, likely of gold
    plating or decorative overlay. 'He stripped it all off' captures the force in
    idiomatic English and matches the object list culminating in removable ornamentation.
