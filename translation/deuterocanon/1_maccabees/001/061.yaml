theological_decisions:
- issue: Referent and implied verb for the final two accusative phrases
  chosen_reading: 'The verse is rendered as an elliptical list of additional victims
    after the main verb: they hung the infants, and also their household members,
    and those who had circumcised them.'
  alternative_readings:
  - The final phrases could be expanded interpretively as separate objects of execution,
    e.g., 'they hung the infants ... and killed their families and those who had circumcised
    them.'
  rationale: The Greek has one explicit finite verb (ἐκρέμασαν) followed by three
    accusative objects. The most transparent rendering is to let the single verb govern
    all three objects rather than importing a second verb not present in the text.
    This preserves the harsh compression of the Greek and avoids paraphrastic expansion.
  doctrine_reference: Translation philosophy §§1, 3, 5
