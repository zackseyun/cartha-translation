translation:
  text: And they hung the infants from their necks, and their household members, and
    those who had circumcised them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their families' or 'their relatives' for 'their household members' (τοὺς
      οἰκείους αὐτῶν).
    reason: lexical_alternative
  - marker: b
    text: The Greek uses one verb ('hung') with all three objects in compressed style;
      some readers may understand the final two groups as likewise subjected to execution.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκρέμασαν
  chosen: hung
  alternatives:
  - hanged
  - suspended
  lexicon: LSJ
  rationale: Aorist active of κρεμάννυμι/κρεμάννυμι, meaning to hang or suspend. 'Hung'
    is the most natural modern English in narrative context; 'hanged' is more restricted
    in contemporary usage to judicial execution, which the Greek does not specifically
    mark.
- source_word: τὰ βρέφη
  chosen: the infants
  alternatives:
  - the babies
  - the little children
  lexicon: LSJ
  rationale: βρέφη refers to very young children/infants. 'Infants' preserves the
    brutality and age specificity more precisely than the broader 'children.'
- source_word: ἐκ τῶν τραχήλων αὐτῶν
  chosen: from their necks
  alternatives:
  - by their necks
  - around their necks
  lexicon: LSJ
  rationale: The preposition ἐκ with τραχήλων is most straightforwardly rendered 'from
    their necks,' indicating the point of suspension. 'By their necks' is possible
    idiomatic English, but 'from' stays closer to the Greek construction.
- source_word: τοὺς οἰκείους αὐτῶν
  chosen: their household members
  alternatives:
  - their families
  - their relatives
  - their own people
  lexicon: LSJ
  rationale: οἰκεῖοι can denote members of one's household or close family. 'Household
    members' preserves the domestic sense without overcommitting to blood relatives
    alone.
- source_word: τοὺς περιτετμηκότας αὐτούς
  chosen: those who had circumcised them
  alternatives:
  - those who circumcised them
  - their circumcisers
  lexicon: LSJ
  rationale: Perfect active participle of περιτέμνω identifies the persons responsible
    for performing the circumcision. The pluperfect-like English 'had circumcised'
    reflects the prior action relative to the hanging.
