translation:
  text: And he took the silver and the gold, and the precious vessels; and he took
    the hidden treasures that he found.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'precious vessels' for 'desirable vessels'; the Greek literally means
      'desired' or 'desirable.'
    reason: lexical_alternative
  - marker: b
    text: Or 'concealed treasures' or 'secret treasure stores'; the Greek can refer
      either to hidden valuables or to hidden storehouses of treasure.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν
  chosen: took
  alternatives:
  - seized
  - carried off
  lexicon: LSJ
  rationale: Common aorist of λαμβάνω meaning 'took.' 'Took' is the most direct and
    neutral rendering; 'seized' or 'carried off' are possible contextual expansions
    but go beyond the bare verb.
- source_word: τὸ ἀργύριον
  chosen: the silver
  alternatives:
  - silver
  lexicon: LSJ
  rationale: With the article, the phrase points to specific temple wealth rather
    than silver in general. 'The silver' preserves that specificity.
- source_word: τὸ χρυσίον
  chosen: the gold
  alternatives:
  - gold
  lexicon: LSJ
  rationale: As with 'the silver,' the article suggests identifiable valuables. 'The
    gold' keeps the concrete sense.
- source_word: τὰ σκεύη
  chosen: vessels
  alternatives:
  - articles
  - utensils
  - implements
  lexicon: LSJ
  rationale: In temple-plunder context, σκεύη commonly refers to cultic vessels or
    articles. 'Vessels' is natural English and preserves likely sacred-object nuance
    without over-specifying.
- source_word: τὰ ἐπιθυμητά
  chosen: desirable
  alternatives:
  - precious
  - choice
  - coveted
  lexicon: LSJ
  rationale: Literally 'desired/desirable.' 'Desirable' stays close to the Greek.
    'Precious' is idiomatic in context but interprets value more explicitly than the
    adjective itself states.
- source_word: τοὺς θησαυροὺς
  chosen: the treasures
  alternatives:
  - treasure stores
  - valuables
  lexicon: LSJ
  rationale: θησαυροί can denote treasures or treasure stores. Here, with ἀποκρύφους
    and the verb 'found,' 'treasures' reads smoothly while retaining the sense of
    stored wealth.
- source_word: τοὺς ἀποκρύφους
  chosen: hidden
  alternatives:
  - secret
  - concealed
  lexicon: LSJ
  rationale: ἀπόκρυφος means hidden or concealed. 'Hidden' is the clearest modern
    English equivalent and fits the discovery motif in 'that he found.'
- source_word: οὓς εὗρεν
  chosen: that he found
  alternatives:
  - which he discovered
  lexicon: LSJ
  rationale: Straightforward relative clause. 'That he found' is idiomatic and closely
    reflects the Greek.
