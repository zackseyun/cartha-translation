  text: καὶ ἔλαβεν τὸ ἀργύριον καὶ τὸ χρυσίον, καὶ τὰ σκεύη τὰ ἐπιθυμητά· καὶ ἔλαβεν
    τοὺς θησαυροὺς τοὺς ἀποκρύφους οὓς εὗρεν.
