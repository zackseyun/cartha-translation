theological_decisions:
- issue: Whether νόμου should be rendered abstractly ('law') or specifically ('the
    law')
  chosen_reading: the law
  alternative_readings:
  - law
  rationale: In 1 Maccabees, νόμος commonly refers to the ancestral/Jewish law rather
    than a generic legal principle. The English article helps readers hear that covenantal
    specificity without importing extra interpretation.
