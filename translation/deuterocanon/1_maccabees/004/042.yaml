translation:
  text: And he chose blameless priests, devoted to the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unblemished priests, zealous for the law.' The Greek can emphasize both
      freedom from defect and eager commitment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέλεξεν
  chosen: chose
  alternatives:
  - selected
  - picked out
  lexicon: LSJ
  rationale: Aorist of ἐπιλέγω, indicating deliberate selection. 'Chose' is natural
    modern English and preserves the intentional act without overformal wording.
- source_word: ἱερεῖς
  chosen: priests
  lexicon: LSJ
  rationale: Standard rendering of ἱερεύς in cultic/Jewish temple context; no contextual
    reason to vary.
- source_word: ἀμώμους
  chosen: blameless
  alternatives:
  - without blemish
  - unblemished
  lexicon: LSJ
  rationale: The adjective can denote freedom from defect or blame. In context of
    priestly qualification, it likely carries both moral and fitness connotations.
    'Blameless' preserves suitability in readable English, while 'without blemish'
    is preserved as an alternative with stronger ritual coloring.
- source_word: θελητὰς
  chosen: devoted to
  alternatives:
  - willing for
  - zealous for
  - desirous of
  lexicon: LSJ
  rationale: θελητής denotes one who wills or desires something. With νόμου, the sense
    is not mere voluntariness but positive commitment. 'Devoted to' communicates active
    allegiance in idiomatic English better than the wooden 'willing for.'
- source_word: νόμου
  chosen: the law
  alternatives:
  - law
  lexicon: LSJ
  rationale: Anarthrous Greek often still refers to the Jewish law/Torah in this literature.
    English idiom favors 'the law' here to signal the known covenantal law rather
    than law in the abstract.
