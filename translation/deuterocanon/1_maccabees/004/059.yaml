translation:
  text: And Judas and his brothers and all the assembly of Israel decreed that the
    days of the dedication of the altar should be observed at their appointed times,
    year by year, for eight days, from the twenty-fifth day of the month Chislev,
    with gladness and joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Χασελεύ reflects the Jewish month name often spelled 'Kislev' in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστησεν
  chosen: decreed
  alternatives:
  - established
  - ordained
  - set up
  lexicon: LSJ
  rationale: In this context with a following ἵνα-clause expressing the content of
    a communal decision, the verb carries the sense of establishing or ordaining a
    practice. 'Decreed' communicates a formal communal determination more naturally
    in English than the overly literal 'set up.'
- source_word: ἐκκλησία
  chosen: assembly
  alternatives:
  - congregation
  - community
  lexicon: LSJ
  rationale: For pre-Christian Israel in 1 Maccabees, 'assembly' best reflects the
    gathered people without importing later ecclesiastical associations of 'church.'
- source_word: ἵνα ἄγωνται
  chosen: should be observed
  alternatives:
  - should celebrate
  - should keep
  lexicon: LSJ
  rationale: The passive/middle construction here refers to the annual keeping of
    festival days. 'Observed' is broad enough to include celebration while fitting
    idiomatic English for recurring sacred days.
- source_word: ἐγκαινισμοῦ
  chosen: dedication
  alternatives:
  - consecration
  - renewal
  lexicon: LSJ
  rationale: The noun denotes dedication, especially in a cultic setting. 'Dedication
    of the altar' is the clearest rendering and matches the historical context of
    the rededicated altar.
- source_word: τοῦ θυσιαστηρίου
  chosen: of the altar
  alternatives:
  - of the sacrificial altar
  lexicon: LSJ
  rationale: '''Altar'' is the natural English equivalent; adding ''sacrificial''
    would be more explicit than the Greek requires.'
- source_word: ἐν τοῖς καιροῖς αὐτῶν
  chosen: at their appointed times
  alternatives:
  - in their seasons
  - at the proper time
  lexicon: LSJ
  rationale: The phrase indicates the fixed annual recurrence of the festival. 'At
    their appointed times' preserves the calendrical and somewhat formal sense.
- source_word: ἐνιαυτὸν κατʼ ἐνιαυτὸν
  chosen: year by year
  alternatives:
  - every year
  - from year to year
  lexicon: LSJ
  rationale: This idiom expresses annual repetition. 'Year by year' is both accurate
    and suitably formal.
- source_word: ἡμέρας ὀκτώ
  chosen: for eight days
  alternatives:
  - eight days
  lexicon: LSJ
  rationale: English idiom prefers 'for eight days' when describing the duration of
    observance.
- source_word: ἀπὸ τῆς πέμπτης καὶ εἰκάδος
  chosen: beginning on the twenty-fifth day
  alternatives:
  - from the twenty-fifth day
  lexicon: LSJ
  rationale: The preposition ἀπό marks the starting point of the eight-day observance.
    'Beginning on' makes that temporal force explicit in natural English.
- source_word: τοῦ μηνὸς Χασελεὺ
  chosen: of the month Chislev
  alternatives:
  - of the month Kislev
  - of the month Casleu
  lexicon: LSJ
  rationale: The Greek transliterates the Hebrew month name כסלו. 'Chislev' stays
    close to the Greek form while remaining recognizable in English; alternative spellings
    are worth preserving in a footnote.
- source_word: μετʼ εὐφροσύνης καὶ χαρᾶς
  chosen: with gladness and joy
  alternatives:
  - with rejoicing and joy
  - with merriment and joy
  lexicon: LSJ
  rationale: The paired nouns emphasize festive happiness. 'Gladness and joy' is natural
    English and preserves the rhetorical fullness of the double expression.
