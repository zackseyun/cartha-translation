translation:
  text: And he said to the people, “Do not desire the spoils, for the battle is before
    us,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do not covet the plunder.”
    reason: lexical_alternative
  - marker: b
    text: Literally “for battle is opposite us” or “against us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμήσητε
  chosen: desire
  alternatives:
  - covet
  - set your heart on
  - long for
  lexicon: BDAG
  rationale: The verb denotes strong desire. 'Desire' is natural modern English and
    fits the military exhortation without importing the specifically Decalogue-shaped
    moral nuance of 'covet,' though that remains a possible alternative.
- source_word: σκύλων
  chosen: spoils
  alternatives:
  - booty
  - plunder
  lexicon: LSJ
  rationale: In context this refers to goods taken in war. 'Spoils' is clear, idiomatic,
    and suitably dignified. 'Booty' is traditional but less natural in contemporary
    English; 'plunder' can suggest the act rather than the goods.
- source_word: πόλεμος
  chosen: battle
  alternatives:
  - war
  - fighting
  lexicon: LSJ
  rationale: Although the noun can mean 'war,' here the immediate tactical situation
    is in view, so 'battle' better matches the present confrontation.
- source_word: ἐξ ἐναντίας ἡμῶν
  chosen: before us
  alternatives:
  - against us
  - opposite us
  - facing us
  lexicon: LSJ
  rationale: The phrase literally indicates being opposite or facing. In this exhortational
    context, 'before us' communicates the imminent confrontation succinctly. 'Against
    us' is also possible, but 'before us' better preserves the spatial sense.
- source_word: λαόν
  chosen: the people
  alternatives:
  - the troops
  - the army
  lexicon: LSJ
  rationale: The Greek says 'the people.' Since the address is to the assembled force
    but the text uses the broader term, the translation keeps 'the people' rather
    than narrowing it interpretively to 'troops' or 'army'.
