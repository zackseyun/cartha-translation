theological_decisions:
- issue: Cultic rendering of τὰ ἅγια and καθαρίσαι in the temple context
  chosen_reading: Translate as 'cleanse the sanctuary'
  alternative_readings:
  - cleanse the holy place
  - purify the sanctuary
  rationale: The verse concerns restoration of the Jerusalem temple after defilement.
    'Sanctuary' communicates the cultic referent clearly in English, while 'cleanse'
    preserves ritual overtones without technical obscurity.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Whether ἐγκαινίσαι should be rendered simply 'dedicate' or contextually 'rededicate'
  chosen_reading: rededicate it
  alternative_readings:
  - dedicate it
  - consecrate it anew
  rationale: Because the sanctuary already existed and had been defiled, the action
    is a renewed dedication. 'Rededicate' conveys the historical and theological force
    of restoration while remaining faithful to the context.
  doctrine_reference: Translation philosophy §§1, 6
