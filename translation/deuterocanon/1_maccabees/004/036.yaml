translation:
  text: Then Judas and his brothers said, “Look, our enemies have been crushed. Let
    us go up to cleanse the sanctuary and dedicate it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dedicate it'; the Greek verb can mean 'dedicate' or 'inaugurate,' but
      here the context is the renewed dedication of the defiled temple.
    reason: lexical_alternative
  - marker: b
    text: '''Go up'' preserves the Greek wording, likely reflecting ascent to Jerusalem
      and the temple mount.'
    reason: cultural_note
lexical_decisions:
- source_word: Εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: LSJ
  rationale: Standard narrative aorist of λέγω; 'said' is the natural modern English
    rendering.
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  lexicon: LSJ
  rationale: Standard transliteration of the personal name in 1 Maccabees; preserves
    established distinction for this historical figure.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  chosen: his brothers
  alternatives:
  - his brethren
  - his kinsmen
  lexicon: LSJ
  rationale: Literal familial term; 'brothers' is gender-accurate and natural English,
    matching the source without archaic diction.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: LSJ
  rationale: Deictic/interjection drawing attention. 'Look' preserves the force in
    readable modern English better than archaic 'Behold.'
- source_word: συνετρίβησαν
  chosen: have been crushed
  alternatives:
  - were crushed
  - have been shattered
  - have been broken
  lexicon: LSJ
  rationale: From συντρίβω, conveying decisive defeat/breaking. Perfective English
    'have been crushed' captures the completed result now in view. 'Crushed' fits
    military context better than the more literal but less idiomatic 'broken.'
- source_word: οἱ ἐχθροὶ ἡμῶν
  chosen: our enemies
  alternatives:
  - the enemies of us
  lexicon: LSJ
  rationale: Straightforward possessive rendering in idiomatic English.
- source_word: ἀναβῶμεν
  chosen: Let us go up
  alternatives:
  - Let us go
  lexicon: LSJ
  rationale: Subjunctive of exhortation. 'Go up' preserves the directional nuance
    often used for ascent to Jerusalem/temple area and should not be flattened without
    need.
- source_word: καθαρίσαι
  chosen: to cleanse
  alternatives:
  - to purify
  - to clean
  lexicon: LSJ
  rationale: Cultic context favors 'cleanse' over merely physical 'clean'; 'purify'
    is possible, but 'cleanse' balances ritual sense and readability.
- source_word: τὰ ἅγια
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy things
  - the sacred precincts
  lexicon: LSJ
  rationale: In this temple-rededication context, the phrase refers to the holy sanctuary/temple
    area rather than abstract 'holy things.' 'The sanctuary' is the clearest concise
    rendering in English.
- source_word: ἐγκαινίσαι
  chosen: rededicate
  alternatives:
  - dedicate
  - consecrate anew
  - renew
  lexicon: LSJ
  rationale: The verb means to dedicate or inaugurate; in context of restoring defiled
    temple worship, 'rededicate' makes explicit the renewed dedication implied by
    the narrative setting without over-paraphrasing.
