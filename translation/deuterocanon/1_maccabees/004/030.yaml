theological_decisions:
- issue: Rendering δοῦλος in reference to David
  chosen_reading: your slave David
  alternative_readings:
  - your servant David
  rationale: The project's doctrine directs 'servant / slave' contextually, preferring
    'slave' where bonded status is theologically salient. In a prayer to God, David's
    status as one belonging wholly to God is foregrounded, so 'slave' was chosen while
    acknowledging the traditional alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
- issue: Whether to make the allusion explicit by naming Goliath or Philistines
  chosen_reading: retain the Greek's generic expressions in the main text
  alternative_readings:
  - the onslaught of Goliath
  - the camp of the Philistines
  rationale: The verse clearly echoes 1 Samuel traditions, but the Greek text itself
    uses generic descriptors ('the mighty man,' 'the foreigners'). To avoid importing
    details not stated in this verse, the translation preserves the wording of the
    source and leaves the historical identification implicit.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1 and §3'
