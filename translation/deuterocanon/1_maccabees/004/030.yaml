translation:
  text: And when he saw that the camp was strong, he prayed and said, “Blessed are
    you, O Savior of Israel, who crushed the assault of the mighty one by the hand
    of your servant David, and gave the camp of the foreigners into the hands of Jonathan
    son of Saul and of the one who carried his armor.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your servant David.' The Greek word is δοῦλος, which can mean either
      'slave' or 'servant' depending on context.
    reason: lexical_alternative
  - marker: b
    text: The prayer alludes to the story of David and Goliath, and to Jonathan with
      his armor-bearer in battle; the Greek here says 'the mighty man' and 'the foreigners'
      rather than naming them explicitly.
    reason: cross_reference
lexical_decisions:
- source_word: παρεμβολή
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: LSJ
  rationale: In military context παρεμβολή refers to a camp or encamped force. 'Camp'
    is concise and natural, while still allowing the sense of the military host.
- source_word: ἰσχυράν
  chosen: strong
  alternatives:
  - powerful
  - formidable
  lexicon: LSJ
  rationale: The adjective describes the enemy camp as militarily strong. 'Strong'
    is the most direct rendering and preserves the compactness of the Greek.
- source_word: σωτήρ
  chosen: savior
  alternatives:
  - deliverer
  lexicon: LSJ
  rationale: The term is a title addressed to God. 'Savior' preserves the theological
    weight and direct lexical sense better than the slightly more interpretive 'deliverer'.
- source_word: συντρίψας
  chosen: crushed
  alternatives:
  - shattered
  - broke
  lexicon: LSJ
  rationale: The participle evokes decisive defeat. 'Crushed' communicates forceful
    destruction in idiomatic English and fits the martial context.
- source_word: ὅρμημα
  chosen: assault
  alternatives:
  - rush
  - onslaught
  - attack
  lexicon: LSJ
  rationale: ὅρμημα denotes a violent rush or attack. 'Assault' captures the military
    action clearly without over-paraphrasing.
- source_word: τοῦ δυνατοῦ
  chosen: the mighty man
  alternatives:
  - the strong man
  - the mighty one
  lexicon: LSJ
  rationale: The singular with article likely recalls Goliath in the David narrative
    allusion. 'The mighty man' preserves the singular personal reference more clearly
    than a generic abstract rendering.
- source_word: ἐν χειρὶ
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: LSJ
  rationale: This is a common biblical idiom for agency or instrumentality. Retaining
    'by the hand of' preserves the scriptural texture and allusive character.
- source_word: δούλου
  chosen: slave
  alternatives:
  - servant
  lexicon: BDAG
  rationale: Per project doctrine, δοῦλος should be rendered 'slave' where bonded
    status is salient. In this prayer formula for David's relation to God, the term
    denotes belonging and subordination; 'slave' preserves that force more transparently
    than the traditional 'servant'.
- source_word: ἀλλοφύλων
  chosen: foreigners
  alternatives:
  - Philistines
  - aliens
  - those of another race
  lexicon: LSJ
  rationale: The Greek word literally means foreigners/people of another stock. Although
    the David-Jonathan allusion points toward Philistines in the background story,
    this verse itself says ἀλλόφυλοι, so 'foreigners' stays anchored to the Greek
    rather than importing the historical referent into the main text.
- source_word: αἰρόντος τὰ σκεύη αὐτοῦ
  chosen: the one who carried his armor
  alternatives:
  - his armor-bearer
  - the one bearing his weapons
  lexicon: LSJ
  rationale: Literally the phrase refers to the one carrying his equipment/weapons.
    'The one who carried his armor' is slightly more formal than 'armor-bearer' and
    keeps the participial structure visible while remaining natural English.
