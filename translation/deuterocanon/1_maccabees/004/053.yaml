theological_decisions:
- issue: Cultic terminology for temple worship
  chosen_reading: 'Retain explicit sacrificial language: ''offered sacrifice'' and
    ''altar of burnt offering.'''
  alternative_readings:
  - Use more generalized worship language such as 'made an offering' or 'on the altar'
  rationale: The verse is specifically about restoration of lawful temple sacrifice.
    More generalized wording would flatten the text's priestly and legal emphasis.
