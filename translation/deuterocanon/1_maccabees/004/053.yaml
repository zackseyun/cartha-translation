lexical_decisions:
- source_word: ἀνήνεγκαν
  chosen: offered
  alternatives:
  - brought up
  - presented
  lexicon: LSJ
  rationale: Aorist of ἀναφέρω in sacrificial context commonly means to offer up a
    sacrifice. 'Offered' is natural English and preserves the cultic sense without
    awkwardness.
- source_word: θυσίαν
  chosen: sacrifice
  alternatives:
  - offering
  lexicon: LSJ
  rationale: θυσία is the sacrificial act or victim. 'Sacrifice' fits the direct object
    of ἀνήνεγκαν and keeps the formal cultic register.
- source_word: κατὰ τὸν νόμον
  chosen: according to the law
  alternatives:
  - in accordance with the law
  lexicon: LSJ
  rationale: This phrase indicates conformity to the Mosaic legal requirements. 'According
    to the law' is concise and idiomatic while preserving the explicit reference to
    law.
- source_word: θυσιαστήριον τῶν ὁλοκαυτωμάτων
  chosen: altar of burnt offering
  alternatives:
  - altar of whole burnt offerings
  - altar for burnt offerings
  lexicon: LSJ
  rationale: The genitive specifies the altar used for burnt offerings. Singular 'burnt
    offering' works idiomatically in English as a cultic category; it refers to the
    standard altar designation rather than a single offering only.
- source_word: τὸ καινόν
  chosen: new
  alternatives:
  - freshly made
  - newly built
  lexicon: LSJ
  rationale: The adjective simply marks the altar as new in contrast to the defiled
    prior altar. 'New' is sufficient; the making is already expressed by the following
    clause.
- source_word: ὃ ἐποίησαν
  chosen: that they had made
  alternatives:
  - which they made
  - that they built
  lexicon: LSJ
  rationale: ἐποίησαν here refers to constructing the altar. 'Had made' reads smoothly
    in English as a prior action relative to the offering and avoids over-specifying
    with 'built,' though that sense is included.
