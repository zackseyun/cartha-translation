lexical_decisions:
- source_word: ἐγενήθη
  chosen: there was
  alternatives:
  - it came to be
  - it happened
  lexicon: BDAG
  rationale: The impersonal-style English 'there was' naturally renders the aorist
    of γίνομαι here, expressing the occurrence of a state/result rather than emphasizing
    the process of becoming.
- source_word: σωτηρία
  chosen: deliverance
  alternatives:
  - salvation
  - victory
  - rescue
  lexicon: BDAG
  rationale: In 1 Maccabees' military-historical context, σωτηρία refers to concrete
    national rescue rather than primarily spiritual salvation. 'Deliverance' preserves
    the breadth of rescue without narrowing it merely to battlefield 'victory.'
- source_word: μεγάλη
  chosen: great
  alternatives:
  - mighty
  - large
  lexicon: BDAG
  rationale: The adjective straightforwardly intensifies σωτηρία. 'Great' is the most
    natural and sufficiently weighty English equivalent.
- source_word: τῷ Ἰσραήλ
  chosen: for Israel
  alternatives:
  - to Israel
  - for the Israelites
  lexicon: BDAG
  rationale: 'The dative is best expressed idiomatically as beneficiary: the deliverance
    was ''for Israel.'' Retaining ''Israel'' matches the Greek collective/national
    designation.'
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  chosen: on that day
  alternatives:
  - in that day
  - that day
  lexicon: BDAG
  rationale: English idiom prefers 'on that day' for a specific time reference. This
    preserves the demonstrative emphasis of ἐκείνῃ.
