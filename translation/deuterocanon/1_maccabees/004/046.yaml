translation:
  text: And they set the stones aside on the temple hill in a suitable place, until
    a prophet should come to give an answer concerning them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'on the mountain of the house,' that is, the temple mount or
      temple hill.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέθεντο
  chosen: set ... aside
  alternatives:
  - laid aside
  - put away
  - deposited
  lexicon: BDAG
  rationale: The middle form here conveys placing something away for later disposition.
    'Set ... aside' is natural modern English and preserves the sense of temporary
    removal and reservation.
- source_word: τοὺς λίθους
  chosen: the stones
  alternatives:
  - the stones from the altar
  - these stones
  lexicon: BDAG
  rationale: The phrase refers back to the previously removed stones, likely altar
    stones from the immediate context, but the Greek here simply says 'the stones.'
    The translation keeps the explicit wording and lets the context specify which
    stones are meant.
- source_word: ἐν τῷ ὄρει τοῦ οἴκου
  chosen: on the temple hill
  alternatives:
  - on the mountain of the house
  - on the mount of the house
  - in the hill-country of the house
  lexicon: LEH
  rationale: Literally 'on the mountain of the house,' an idiom for the temple mount/hill.
    'Temple hill' communicates the location clearly in modern English without unnecessary
    woodenness.
- source_word: ἐν τόπῳ ἐπιτηδείῳ
  chosen: in a suitable place
  alternatives:
  - in a fitting place
  - in a convenient place
  - in an appropriate place
  lexicon: BDAG
  rationale: ἐπιτήδειος denotes suitability or fitness. 'Suitable place' is concise
    and idiomatic while preserving the evaluative sense.
- source_word: μέχρι τοῦ παραγενηθῆναι
  chosen: until ... should come
  alternatives:
  - until ... came
  - until the coming of
  - until ... might appear
  lexicon: BDAG
  rationale: The construction expresses a future point awaited from the narrative
    perspective. 'Should come' captures the prospective sense in idiomatic English.
- source_word: προφήτην
  chosen: a prophet
  alternatives:
  - the prophet
  lexicon: BDAG
  rationale: The anarthrous accusative is best rendered indefinitely here. The text
    does not identify a specific known prophet, but expresses hope for prophetic guidance.
- source_word: τοῦ ἀποκριθῆναι περὶ αὐτῶν
  chosen: to give an answer concerning them
  alternatives:
  - to decide about them
  - to answer about them
  - to pronounce concerning them
  lexicon: BDAG
  rationale: ἀποκριθῆναι is literally 'to answer,' and περὶ αὐτῶν means 'concerning
    them.' 'Give an answer concerning them' preserves the formal, consultative sense
    without over-interpreting it as a judicial ruling.
