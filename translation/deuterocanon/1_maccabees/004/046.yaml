theological_decisions:
- issue: Nature of the expected prophetic role
  chosen_reading: a future prophet is awaited to provide authoritative guidance about
    the stones
  alternative_readings:
  - a prophet is expected to render a formal legal decision about the stones
  - the phrase is merely a conventional way of postponing a decision
  rationale: The Greek states that the stones were stored until a prophet should come
    to answer concerning them. The translation preserves this expectation of prophetic
    adjudication without specifying more than the text says about office, timing,
    or legal mechanism.
  doctrine_reference: Preserve theological tension rather than resolve it.
