translation:
  text: But all the rear guard fell by the sword, and they pursued them as far as
    Gazara and as far as the plains of Judea and Azotus and Jamnia, and about three
    thousand of them fell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gazara is the Greek place-name, commonly identified with Gezer.
    reason: cross_reference
  - marker: b
    text: Azotus is the Greek form of Ashdod; Jamnia is commonly identified with Jabneh/Yavneh.
    reason: cross_reference
  - marker: c
    text: Or 'three thousand men of them fell'; the Greek idiom expresses the number
      of the slain.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἔσχατοι πάντες
  chosen: all the rear guard
  alternatives:
  - all those at the rear
  - all the last men
  - all the hindmost
  lexicon: LSJ
  rationale: ἔσχατοι literally means 'last' or 'furthest,' but in this military context
    it most naturally refers to those at the rear of the force. 'Rear guard' gives
    the likely sense in readable English while staying close to the Greek.
- source_word: ἔπεσαν ἐν ῥομφαίᾳ
  chosen: fell by the sword
  alternatives:
  - were struck down with the sword
  - fell in battle by the sword
  lexicon: LSJ
  rationale: This is a standard idiom for death in combat. 'By the sword' preserves
    the martial imagery and avoids over-paraphrase.
- source_word: ἐδίωξαν
  chosen: they pursued
  alternatives:
  - they chased
  - they drove
  lexicon: LSJ
  rationale: '''Pursued'' is the straightforward military sense and fits the sequence
    of battle action.'
- source_word: ἕως Γαζήρων
  chosen: as far as Gazara
  alternatives:
  - as far as Gezer
  lexicon: LSJ
  rationale: The Greek form Γαζήρων points to the place-name commonly identified with
    Gezer. Following the project's preference to transliterate names, 'Gazara' reflects
    the Greek witness directly, while the more familiar identification can be preserved
    in a footnote.
- source_word: τῶν πεδίων τῆς Ἰουδαίας
  chosen: the plains of Judea
  alternatives:
  - the fields of Judea
  - the lowlands of Judea
  lexicon: LSJ
  rationale: πεδίον denotes a plain or open level region. 'Plains' is the clearest
    geographic rendering here.
- source_word: Ἀζώτου
  chosen: Azotus
  alternatives:
  - Ashdod
  lexicon: LSJ
  rationale: The Greek text has the Hellenized place-name Ἄζωτος. Per project philosophy,
    names are transliterated rather than translated back into their Hebrew form.
- source_word: Ἰαννείας
  chosen: Jamnia
  alternatives:
  - Janneia
  - Jabneh
  lexicon: LSJ
  rationale: The place is commonly identified with Jamnia/Yavneh. 'Jamnia' is a standard
    English transliteration for the Greek toponym and is more recognizable than a
    stricter letter-for-letter form.
- source_word: ἔπεσαν ἐξ αὐτῶν εἰς ἄνδρας τρισχιλίους
  chosen: about three thousand of them fell
  alternatives:
  - three thousand men of them fell
  - the fallen from among them numbered three thousand
  lexicon: LSJ
  rationale: The construction εἰς ἄνδρας with a number idiomatically gives an approximate
    total or count in men. 'About three thousand of them fell' is natural English
    and reflects the sense without forcing a wooden rendering.
