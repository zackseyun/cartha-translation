translation:
  text: And the foreigners lifted up their eyes and saw them encamped opposite them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drawn up opposite them' or 'positioned facing them.' The Greek participle
      can denote being situated or arrayed in place; 'encamped' reflects the military
      setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλόφυλοι
  chosen: foreigners
  alternatives:
  - Philistines
  - aliens
  - foreign troops
  lexicon: LSJ
  rationale: In broader Greek usage the term can denote foreigners or those of another
    tribe/people. In 1 Maccabees 4 this refers to the non-Jewish enemy forces generally,
    not specifically Philistines, so 'foreigners' preserves the ethnic outsider sense
    without over-specifying.
- source_word: ἦραν ... τοὺς ὀφθαλμοὺς αὐτῶν
  chosen: lifted up their eyes
  alternatives:
  - looked up
  - raised their eyes
  lexicon: LSJ
  rationale: This is a common idiom meaning to look up. Retaining 'lifted up their
    eyes' preserves the vividness and recognizable biblical idiom while remaining
    clear in English.
- source_word: ἶδαν
  chosen: saw
  alternatives:
  - caught sight of
  - looked and saw
  lexicon: LSJ
  rationale: Simple past 'saw' matches the aorist and keeps the narration direct.
- source_word: ἐχομένους
  chosen: encamped
  alternatives:
  - drawn up
  - positioned
  - holding themselves
  lexicon: LSJ
  rationale: In this military context, with ἐξ ἐναντίας ('opposite/facing them'),
    the participle describes the opposing force as being in position. 'Encamped' fits
    the battle setting and is more natural than a wooden participial rendering.
- source_word: ἐξ ἐναντίας
  chosen: opposite them
  alternatives:
  - against them
  - facing them
  - in front of them
  lexicon: LSJ
  rationale: The phrase indicates position directly opposite. 'Opposite them' is spatially
    precise and avoids importing hostility beyond what the context already supplies.
