theological_decisions:
- issue: Implicit subject in the praise formula
  chosen_reading: 'Render the line personally as referring to God: ''For he is good;
    his mercy endures forever.'''
  alternative_readings:
  - 'Render impersonally: ''For it is good; his mercy endures forever.'''
  rationale: The wording echoes well-known biblical thanksgiving formulae directed
    to God, and the possessive 'his mercy' makes a personal subject the most natural
    English rendering. This preserves the liturgical-theological force without adding
    content beyond the Greek idiom.
  doctrine_reference: Translation philosophy §1, §6
