translation:
  text: 'And when they returned, they sang hymns and gave praise to heaven: “For he
    is good; his mercy endures forever.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'to heaven,' a reverential way of directing praise to God.
    reason: cultural_note
  - marker: b
    text: Or, more literally, 'for it is good; his mercy is forever.' The main text
      renders the likely personal sense of the liturgical formula.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιστρέψαντες
  chosen: when they turned back
  alternatives:
  - having returned
  - after returning
  lexicon: LSJ
  rationale: 'Aorist participle from ἐπιστρέφω, here naturally temporal in context:
    after the battle action they return and then praise. ''Turned back'' preserves
    the movement sense without over-specifying destination.'
- source_word: ὕμνουν
  chosen: they sang hymns
  alternatives:
  - they sang
  - they were singing praise
  lexicon: LSJ
  rationale: The verb ὑμνέω specifically denotes singing hymns or songs of praise,
    so 'sang hymns' preserves the musical and liturgical nuance better than the flatter
    'sang'.
- source_word: ᾐνοῦν
  chosen: gave praise
  alternatives:
  - praised
  - were praising
  lexicon: LSJ
  rationale: From αἰνέω, 'praise.' Rendering it distinctly from ὕμνουν avoids collapsing
    the paired verbs into one English idea; 'gave praise' keeps the parallelism readable.
- source_word: εἰς οὐρανόν
  chosen: to heaven
  alternatives:
  - toward heaven
  - to Heaven
  lexicon: LSJ
  rationale: The phrase literally means 'to/toward heaven.' In this idiom it indicates
    the direction or object of praise. Lowercase 'heaven' is preferred here as the
    Greek lacks an explicit divine title, though the referent is clearly God in reverential
    circumlocution.
- source_word: Ὅτι καλὸν
  chosen: For he is good
  alternatives:
  - Because he is good
  - for it is good
  lexicon: LSJ
  rationale: 'This echoes biblical praise formulae in which God''s goodness is confessed.
    Although καλόν can be impersonal (''it is good''), the following ''his mercy''
    strongly supports the personal sense in English: ''he is good.'''
- source_word: εἰς τὸν αἰῶνα
  chosen: endures forever
  alternatives:
  - is forever
  - lasts for the age
  lexicon: LSJ
  rationale: In the formula modifying divine mercy, idiomatic English is best expressed
    as enduring permanence. This is a standard equivalent for the phrase in praise
    contexts.
- source_word: τὸ ἔλεος αὐτοῦ
  chosen: his mercy
  alternatives:
  - his steadfast mercy
  - his lovingkindness
  lexicon: LSJ
  rationale: ἔλεος denotes mercy or compassionate kindness. 'Mercy' is the most direct
    and accessible rendering; more interpretive covenantal expansions such as 'steadfast
    love' are not required by the Greek here.
