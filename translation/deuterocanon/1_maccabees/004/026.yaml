lexical_decisions:
- source_word: Ὅσοι
  chosen: as many as
  alternatives:
  - those who
  - all who
  lexicon: LSJ
  rationale: The correlative quantitative sense is best preserved with 'as many as,'
    though smoothed in English by the full clause. It marks a subset rather than simply
    introducing a new group.
- source_word: ἀλλοφύλων
  chosen: foreigners
  alternatives:
  - Gentiles
  - aliens
  - those of another people
  lexicon: LSJ
  rationale: In this military context the term denotes people of another nation/people-group,
    not specifically non-Jews in a later theological sense. 'Foreigners' is natural
    modern English and preserves the ethnic outsider sense without importing NT-era
    'Gentiles' terminology.
- source_word: διεσώθησαν
  chosen: escaped
  alternatives:
  - were saved
  - survived
  - got away safely
  lexicon: LSJ
  rationale: The verb here refers to surviving and getting away from the battle. 'Escaped'
    best fits the immediate narrative context of defeated troops who survived and
    fled, while 'were saved' could sound overly theological.
- source_word: παραγενηθέντες
  chosen: after they arrived
  alternatives:
  - having come
  - when they came
  - after coming
  lexicon: LSJ
  rationale: The participle indicates arrival/presence before the main action of reporting.
    'After they arrived' makes the temporal sequence clear in idiomatic English.
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - announced
  - told
  - brought word
  lexicon: LSJ
  rationale: The verb conveys giving a report to a superior. 'Reported' fits the military
    setting and the object clause that follows.
- source_word: τὰ συμβεβηκότα
  chosen: what had happened
  alternatives:
  - the things that had happened
  - what had taken place
  - the events
  lexicon: LSJ
  rationale: This perfect-participial substantive refers to the events that had occurred.
    'What had happened' is idiomatic and sufficiently precise.
