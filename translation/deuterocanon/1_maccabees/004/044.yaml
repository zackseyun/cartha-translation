lexical_decisions:
- source_word: ἐβουλεύσαντο
  chosen: they deliberated
  alternatives:
  - they took counsel
  - they discussed
  - they decided
  lexicon: BDAG
  rationale: The middle form conveys consultation/counseling together rather than
    merely a final decision. 'Deliberated' preserves the sense of collective consideration
    in natural English.
- source_word: θυσιαστηρίου
  chosen: altar
  alternatives:
  - sacrificial altar
  lexicon: BDAG
  rationale: The standard sense is 'altar.' The following genitive specifies its function,
    so a simple 'altar' is sufficient in English.
- source_word: ὁλοκαυτώσεως
  chosen: of burnt offering
  alternatives:
  - for whole burnt offerings
  - of whole burnt offering
  lexicon: BDAG
  rationale: This genitive identifies the altar as the altar used for burnt offerings.
    'Altar of burnt offering' is a clear and established English rendering without
    being overly archaic.
- source_word: βεβηλωμένου
  chosen: defiled
  alternatives:
  - profaned
  - desecrated
  lexicon: BDAG
  rationale: The participle describes the altar as having been rendered ritually unclean/profaned.
    'Defiled' is concise and fits the cultic context well; 'desecrated' is possible
    but slightly more interpretive in tone.
- source_word: τί αὐτῷ ποιήσωσιν
  chosen: what they should do with it
  alternatives:
  - what they might do with it
  - what they should do to it
  lexicon: BDAG
  rationale: The clause expresses deliberation over the proper course of action regarding
    the altar. 'With it' is the most natural English for αὐτῷ here, indicating concern
    about its disposition rather than necessarily an action against it.
