translation:
  text: And Judas heard, and he and the mighty men set out to strike the king’s force
    that was at Emmaus,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - heard of it
  lexicon: LSJ
  rationale: The aorist of ἀκούω can mean either literal hearing or receiving news.
    In this military narrative, 'heard' is sufficiently natural and leaves the object
    implicit as in the Greek, while 'heard of it' would add content not stated explicitly.
- source_word: ἀπῆρεν
  chosen: set out
  alternatives:
  - departed
  - marched off
  - went up
  lexicon: LSJ
  rationale: ἀπαίρω here denotes departure for action. 'Set out' captures purposeful
    movement in readable English without over-specifying route or military formation.
    'Went up' would be too literal and potentially misleading without clear topographical
    emphasis.
- source_word: οἱ δυνατοὶ
  chosen: the mighty men
  alternatives:
  - the strong men
  - the warriors
  - his valiant men
  lexicon: LSJ
  rationale: The phrase literally denotes 'the strong/mighty ones.' 'The mighty men'
    preserves the lexical force and military connotation while remaining idiomatic.
    'Warriors' is possible but less transparent to the Greek wording; 'his valiant
    men' adds a possessive not present in the text.
- source_word: πατάξαι
  chosen: to strike
  alternatives:
  - to attack
  - to smite
  - to defeat
  lexicon: LSJ
  rationale: The infinitive expresses intended hostile action. 'To strike' preserves
    the verbal imagery and does not prematurely interpret the outcome as victory.
    'Smite' is archaic; 'attack' is acceptable but flatter; 'defeat' overstates the
    lexical content.
- source_word: τὴν δύναμιν
  chosen: the force
  alternatives:
  - the army
  - the troops
  - the power
  lexicon: LSJ
  rationale: In context δύναμις refers to a military force. 'The force' is a close
    and readable rendering. 'Army' is possible, but 'force' better reflects the Greek
    term without implying a formal standing army beyond what the text states.
- source_word: τοῦ βασιλέως
  chosen: the king’s
  alternatives:
  - of the king
  - royal
  lexicon: LSJ
  rationale: The genitive is possessive. 'The king’s force' is idiomatic English and
    preserves the relation clearly.
- source_word: τὴν ἐν Ἐμμαούμ
  chosen: that was at Emmaus
  alternatives:
  - which was in Emmaus
  - stationed at Emmaus
  lexicon: LSJ
  rationale: The article with ἐν + place identifies the force by location. 'That was
    at Emmaus' is natural and sufficiently literal. 'Stationed at Emmaus' may be contextually
    true but adds a nuance not explicit in the Greek.
