translation:
  text: And Gorgias took five thousand men and one thousand chosen horsemen, and the
    camp set out by night,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the force set out at night'; Greek 'the camp' can refer collectively
      to the encamped troops.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέλαβεν
  chosen: took
  alternatives:
  - took along
  - received
  - took command of
  lexicon: BDAG
  rationale: In this military context, the verb indicates that Gorgias took with him
    or assumed charge of the force named next. 'Took' is concise and natural English
    while preserving the action without over-specifying whether the emphasis is receiving
    troops or leading them out.
- source_word: πεντακισχιλίους ἄνδρας
  chosen: five thousand men
  alternatives:
  - five thousand soldiers
  lexicon: LSJ
  rationale: ἄνδρας is literally 'men.' In a military setting it refers to fighting
    men, but the source uses the ordinary masculine term, so 'men' preserves the wording
    more closely; 'soldiers' is possible but slightly more interpretive.
- source_word: χιλίαν ἵππον ἐκλεκτήν
  chosen: one thousand select cavalry
  alternatives:
  - one thousand chosen horsemen
  - one thousand picked cavalry
  lexicon: LSJ
  rationale: ἵππον here is a collective singular for cavalry/horsemen, modified by
    ἐκλεκτήν ('chosen, select'). 'Select cavalry' communicates both the collective
    sense and the elite quality in readable English.
- source_word: ἀπῆρεν
  chosen: set out
  alternatives:
  - departed
  - marched out
  lexicon: BDAG
  rationale: The verb means to depart or go away. 'Set out' fits the narrative movement
    and works well with the following temporal phrase 'by night.' 'Marched out' would
    foreground military motion more strongly than the Greek itself requires.
- source_word: ἡ παρεμβολή
  chosen: the camp
  alternatives:
  - the army camp
  - the force
  lexicon: LSJ
  rationale: παρεμβολή commonly means camp or encampment, and by extension the camped
    force. Here the subject is singular and collective. 'The camp' preserves the Greek
    image, though it refers to the body of troops moving out.
- source_word: νυκτός
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: BDAG
  rationale: The genitive adverbially expresses time. 'By night' is idiomatic and
    slightly more literary, fitting the military stealth implied by the context without
    adding interpretation.
