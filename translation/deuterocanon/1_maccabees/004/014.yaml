translation:
  text: And they joined battle, and the nations were crushed, and they fled into the
    plain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Gentiles were crushed,' since 'the nations' can refer specifically
      to non-Jewish peoples in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆψαν
  chosen: they joined battle
  alternatives:
  - they engaged
  - they joined
  - they attacked
  lexicon: LSJ
  rationale: From συνάπτω in military context, the verb means to engage or join in
    battle, not merely to come together. 'Joined battle' preserves the martial sense
    in idiomatic English.
- source_word: συνετρίβησαν
  chosen: were crushed
  alternatives:
  - were shattered
  - were broken
  - were defeated
  lexicon: LSJ
  rationale: The passive of συντρίβω conveys being broken or crushed. 'Were crushed'
    keeps the vivid force of the Greek better than the flatter 'were defeated,' while
    still fitting battle context.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the foreigners
  - the enemy forces
  lexicon: LSJ
  rationale: The Greek literally reads 'the nations.' In 1 Maccabees this often refers
    to non-Jewish peoples or forces, but here the text itself uses the broader ethnic-political
    term. 'The nations' stays closest to the source without importing a narrower interpretation.
- source_word: τὸ πεδίον
  chosen: the plain
  alternatives:
  - the open country
  - the field
  - the plain country
  lexicon: LSJ
  rationale: πεδίον commonly denotes a plain or level open area. 'The plain' is concise
    and natural, and fits a military retreat into open ground.
