theological_decisions:
- issue: Whether to make the Torah background explicit in the stone description
  chosen_reading: Keep the main text as 'whole stones' and let 'according to the law'
    carry the legal reference.
  alternative_readings:
  - Render 'unhewn stones' in the main text to reflect likely Torah implication
  rationale: The Greek explicitly says 'whole/complete stones' and separately adds
    'according to the law.' Rendering the adjective itself as 'unhewn' would fold
    an inferred legal specification into the lexical gloss. Optimal equivalence favors
    preserving the source wording while allowing the legal allusion to remain visible
    through the following phrase.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Whether κατὰ τὸ πρότερον should be rendered adverbially or as comparison
    to the previous altar
  chosen_reading: Render as 'like the former one.'
  alternative_readings:
  - as before
  - according to the former pattern
  rationale: The phrase likely refers to rebuilding in conformity with the earlier
    altar. 'Like the former one' preserves that referential sense more clearly than
    the broader adverbial 'as before.'
  doctrine_reference: Translation philosophy §§1, 6
