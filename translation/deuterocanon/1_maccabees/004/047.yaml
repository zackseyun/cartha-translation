translation:
  text: And they took whole stones according to the law, and built a new altar as
    before.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unhewn stones'; the Greek says 'whole/complete stones,' while the following
      phrase 'according to the law' likely alludes to Torah requirements for altar
      stones.
    reason: lexical_alternative
  - marker: b
    text: Or 'as before' or 'according to the former pattern.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔλαβον
  chosen: they took
  alternatives:
  - they gathered
  - they received
  lexicon: LSJ
  rationale: Aorist active of λαμβάνω here denotes the concrete action of taking/acquiring
    materials. 'Took' is the most natural and direct English rendering in context.
- source_word: λίθους ὁλοκλήρους
  chosen: whole stones
  alternatives:
  - unhewn stones
  - complete stones
  - sound stones
  lexicon: LSJ
  rationale: ὁλόκληρος means whole, complete, intact. The phrase likely refers to
    stones suitable under Torah requirements for altar construction. 'Whole stones'
    stays close to the Greek; 'unhewn stones' captures likely implication from the
    law but is more interpretive than the wording itself, so that implication is left
    to context rather than imported into the main text.
- source_word: κατὰ τὸν νόμον
  chosen: according to the law
  alternatives:
  - in accordance with the law
  lexicon: LSJ
  rationale: Standard idiom meaning conformity to legal prescription. 'According to
    the law' is clear, natural, and preserves the explicit appeal to Torah.
- source_word: ᾠκοδόμησαν
  chosen: built
  alternatives:
  - rebuilt
  - constructed
  lexicon: LSJ
  rationale: The verb means to build/construct. Although the context may imply replacement
    of a defiled altar, the Greek here simply says they built, so 'rebuilt' would
    over-specify.
- source_word: θυσιαστήριον καινὸν
  chosen: a new altar
  alternatives:
  - a fresh altar
  lexicon: LSJ
  rationale: θυσιαστήριον is 'altar'; καινός emphasizes newness. 'A new altar' is
    the straightforward rendering.
- source_word: κατὰ τὸ πρότερον
  chosen: like the former one
  alternatives:
  - as before
  - according to the former pattern
  lexicon: LSJ
  rationale: The phrase points to correspondence with what was earlier/former. 'Like
    the former one' makes explicit that the new altar was built in continuity with
    the previous altar, while remaining faithful to the comparative force of κατά.
