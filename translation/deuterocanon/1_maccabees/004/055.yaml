translation:
  text: And all the people fell on their faces, and they worshiped and blessed toward
    heaven the one who had prospered them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to heaven'; the Greek may express direction ('toward heaven') or, by
      reverent circumlocution, reference to God in heaven.
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who had given them success.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔπεσον ... ἐπὶ πρόσωπον
  chosen: fell on their faces
  alternatives:
  - fell facedown
  - fell upon their face
  lexicon: LSJ
  rationale: The idiom ἐπὶ πρόσωπον denotes prostration. English pluralizes naturally
    with the collective subject πᾶς ὁ λαός, yielding an idiomatic but still close
    rendering.
- source_word: πᾶς ὁ λαός
  chosen: all the people
  alternatives:
  - the whole people
  - all the nation
  lexicon: LSJ
  rationale: This is the natural rendering of the collective expression here. 'Nation'
    would over-specify a political sense not required by the immediate context.
- source_word: προσεκύνησαν
  chosen: worshiped
  alternatives:
  - bowed down
  - paid homage
  lexicon: BDAG
  rationale: In this cultic setting at the rededication of the altar, the verb refers
    to reverential worship directed to God, not merely physical obeisance.
- source_word: ηὐλόγησαν
  chosen: blessed
  alternatives:
  - praised
  - spoke well of
  lexicon: BDAG
  rationale: The verb literally means 'blessed.' In English, 'blessed' can take God
    as object in the sense of praising him, and preserves the source wording better
    than the more interpretive 'praised.'
- source_word: εἰς οὐρανόν
  chosen: toward heaven
  alternatives:
  - to heaven
  - heavenward
  lexicon: LSJ
  rationale: With verbs of worship and blessing, εἰς οὐρανόν likely indicates direction
    of the act toward heaven, a reverent circumlocution for God. 'Toward heaven' preserves
    that directional nuance better than the more abstract 'to heaven.'
- source_word: τὸν εὐοδώσαντα αὐτούς
  chosen: the one who had prospered them
  alternatives:
  - him who had given them success
  - the one who had made their way prosper
  lexicon: BDAG
  rationale: The articular participle functions as a reverent designation for God.
    εὐοδόω commonly conveys causing success or prosperity. 'Had prospered them' is
    concise and faithful, while 'given them success' is a viable alternative.
