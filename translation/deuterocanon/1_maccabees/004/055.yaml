theological_decisions:
- issue: Referent of 'the one who had prospered them'
  chosen_reading: An implicit reference to God, expressed as a reverent circumlocution
    rather than naming God directly.
  alternative_readings:
  - 'A more explicit translation: ''God, who had prospered them'''
  rationale: The Greek uses the articular participle τὸν εὐοδώσαντα αὐτούς after 'toward
    heaven,' allowing the text to refer to God indirectly. The translation preserves
    that literary-theological nuance rather than making the referent explicit in the
    main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
