translation:
  text: And in the following year he assembled sixty thousand chosen men and five
    thousand cavalry, so as to make war against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the coming year.' The Greek expression is literally 'in the coming
      year,' referring to the next year in the narrative sequence.
    reason: lexical_alternative
  - marker: b
    text: Or 'five thousand horsemen.' The Greek uses 'horse' as a military collective.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ ἐρχομένῳ ἐνιαυτῷ
  chosen: in the following year
  alternatives:
  - in the coming year
  - in the next year
  lexicon: LSJ
  rationale: The dative phrase with ἐρχομένῳ literally means 'in the coming year,'
    but in narrative English 'in the following year' best conveys the temporal sense
    relative to the prior events.
- source_word: συνελόχησεν
  chosen: assembled
  alternatives:
  - mustered
  - gathered together
  lexicon: LSJ
  rationale: The verb denotes collecting or marshalling troops. 'Assembled' is clear
    modern English and fits the military context without over-specifying beyond the
    Greek.
- source_word: ἀνδρῶν ἐπιλέκτων
  chosen: chosen men
  alternatives:
  - picked men
  - select men
  - elite men
  lexicon: LSJ
  rationale: ἐπίλεκτος means selected or choice. 'Chosen men' preserves the sense
    of specially selected troops while remaining natural English. 'Elite' is possible
    but slightly more interpretive.
- source_word: ἑξήκοντα χιλιάδας
  chosen: sixty thousand
  lexicon: LSJ
  rationale: Straightforward cardinal number modifying the troop count.
- source_word: πεντακισχιλίαν ἵππον
  chosen: five thousand cavalry
  alternatives:
  - five thousand horsemen
  - five thousand horse
  lexicon: LSJ
  rationale: ἵππος can stand metonymically for cavalry/horsemen in military contexts.
    'Cavalry' is idiomatic English for a troop category and avoids the awkward singular
    collective 'horse.'
- source_word: ὥστε ἐκπολεμῆσαι αὐτούς
  chosen: so as to make war against them
  alternatives:
  - in order to fight them
  - so as to wage war against them
  lexicon: LSJ
  rationale: ὥστε with infinitive expresses intended result/purpose here. ἐκπολεμέω
    carries the sense of waging war or campaigning against. 'Make war against them'
    is slightly more formal and preserves the military force better than the flatter
    'fight them.'
