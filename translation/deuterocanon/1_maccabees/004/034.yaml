translation:
  text: And they engaged one another in battle, and about five thousand men from the
    camp of Lysias fell, and they fell before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'five thousand men fell from Lysias's camp'; the Greek phrase with εἰς
      may be taken as an approximate or total number.
    reason: lexical_alternative
  - marker: b
    text: Or 'before them' or 'opposite them' for 'facing them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέβαλλον ἀλλήλοις
  chosen: they joined battle with one another
  alternatives:
  - they engaged one another
  - they clashed with each other
  - they fought one another
  lexicon: LSJ
  rationale: The idiom with συμβάλλω in military context means to engage or join battle.
    'Joined battle' preserves the martial sense without over-paraphrasing. 'With one
    another' reflects ἀλλήλοις, here reciprocal between the opposing forces.
- source_word: ἔπεσον
  chosen: fell
  alternatives:
  - were killed
  - collapsed
  lexicon: LSJ
  rationale: In battle narrative, 'fell' is the standard literal and idiomatic rendering,
    allowing the military implication of death without making it more explicit than
    the Greek does.
- source_word: ἐκ τῆς παρεμβολῆς Λυσίου
  chosen: from the camp of Lysias
  alternatives:
  - from Lysias's army camp
  - from the encampment of Lysias
  lexicon: LSJ
  rationale: παρεμβολή commonly means camp or encampment in military settings. 'From
    the camp of Lysias' is concise and natural while preserving the genitive relation.
- source_word: εἰς πεντακισχιλίους ἄνδρας
  chosen: about five thousand men
  alternatives:
  - five thousand men
  - as many as five thousand men
  lexicon: LSJ
  rationale: With verbs of number and extent, εἰς can mark approximation or total
    reaching a number. 'About five thousand men' captures the idiomatic force more
    naturally in English than a wooden 'to five thousand men.'
- source_word: ἐξ ἐναντίας αὐτῶν
  chosen: facing them
  alternatives:
  - before them
  - opposite them
  - in front of them
  lexicon: LSJ
  rationale: The phrase denotes position over against the opposing side. 'Facing them'
    fits the battle context and avoids awkward literalism. The repetition of ἔπεσαν
    is retained by rendering 'and they fell facing them,' though the exact nuance
    may be adverbial ('before them/in front of them').
