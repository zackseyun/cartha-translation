translation:
  text: And Gorgias came to the camp of Judas by night, and found no one; and he was
    seeking them in the mountains, because he said, “These men are fleeing from us.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρεμβολήν
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: LSJ
  rationale: In military context παρεμβολή refers to a camp or encampment. 'Camp'
    is the most natural modern English rendering and fits the narrative setting.
- source_word: νυκτός
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: LSJ
  rationale: The genitive adverbially expresses time. 'By night' preserves the concise
    narrative force and slightly formal military tone better than the more colloquial
    'at night.'
- source_word: οὐδένα
  chosen: no one
  alternatives:
  - nobody
  - not anyone
  lexicon: LSJ
  rationale: Straightforward indefinite negative object. 'No one' is clear, idiomatic,
    and suitably neutral in register.
- source_word: ἐζήτει
  chosen: was looking for
  alternatives:
  - sought
  - was seeking
  lexicon: LSJ
  rationale: The imperfect indicates ongoing or attempted action. 'Was looking for'
    communicates the durative sense more naturally than the more formal 'sought.'
- source_word: ἐν τοῖς ὄρεσιν
  chosen: in the mountains
  alternatives:
  - on the mountains
  - in the hill country
  lexicon: LSJ
  rationale: ὄρη commonly means mountains or highlands. 'In the mountains' is the
    most direct rendering; 'hill country' is possible but less literal and not required
    by the context.
- source_word: Φεύγουσιν
  chosen: are fleeing
  alternatives:
  - flee
  - have fled
  - are running away
  lexicon: LSJ
  rationale: Present tense in direct speech is best represented as 'are fleeing,'
    reflecting Gorgias's immediate assumption about Judas's forces.
- source_word: οὗτοι
  chosen: these men
  alternatives:
  - these
  - these people
  lexicon: LSJ
  rationale: The demonstrative refers to Judas's group. 'These men' makes the referent
    explicit in natural English without overtranslating; the military context supports
    'men' rather than the vaguer 'people'.
- source_word: ἀφʼ ἡμῶν
  chosen: from us
  alternatives:
  - away from us
  - before us
  lexicon: LSJ
  rationale: The preposition ἀπό marks separation. 'From us' is the most direct rendering;
    the sense is that they are retreating away from Gorgias's force.
