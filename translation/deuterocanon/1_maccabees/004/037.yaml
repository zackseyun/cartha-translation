lexical_decisions:
- source_word: συνήχθη
  chosen: assembled
  alternatives:
  - was gathered together
  - came together
  lexicon: BDAG
  rationale: Aorist passive of συνάγω here functions naturally in English as an intransitive
    collective action. 'Assembled' is concise, idiomatic, and preserves the sense
    of the group coming together.
- source_word: ἡ παρεμβολὴ πᾶσα
  chosen: the whole camp
  alternatives:
  - the entire army camp
  - the whole encampment
  lexicon: LSJ
  rationale: παρεμβολή commonly denotes a camp or encampment, especially a military
    one. In this Maccabean context 'camp' is the most natural rendering; πᾶσα is brought
    forward as 'the whole' to reflect totality.
- source_word: ἀνέβησαν
  chosen: they went up
  alternatives:
  - they ascended
  - they marched up
  lexicon: BDAG
  rationale: The verb literally means 'went up' and can reflect both elevation and
    movement toward a significant place. 'Went up' preserves the common biblical idiom
    without overinterpreting the manner as military marching.
- source_word: εἰς ὄρος Σιών
  chosen: to Mount Zion
  alternatives:
  - onto Mount Zion
  - to the hill of Zion
  lexicon: LSJ
  rationale: ὄρος is straightforwardly 'mountain/mount'; with the proper name Σιών,
    standard English biblical usage is 'Mount Zion.' 'To' fits εἰς naturally in this
    movement context.
