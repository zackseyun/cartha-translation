translation:
  text: Then Judas ordered men to fight those in the citadel until he had cleansed
    the sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those in the Acra,' the fortified stronghold in Jerusalem.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπέταξεν
  chosen: ordered
  alternatives:
  - commanded
  - gave orders to
  lexicon: BDAG
  rationale: The aorist of ἐπιτάσσω denotes giving a directive or command. 'Ordered'
    is natural modern English and preserves the authoritative force without sounding
    overly stiff.
- source_word: ἀνδράσιν
  chosen: men
  alternatives:
  - soldiers
  - some men
  lexicon: LSJ
  rationale: The dative plural literally means 'to men.' While the context is military,
    the Greek does not explicitly say 'soldiers,' so 'men' better preserves the wording.
    The phrase implies he assigned men for the task.
- source_word: πολεμεῖν
  chosen: to fight
  alternatives:
  - to make war against
  - to wage war against
  lexicon: BDAG
  rationale: The infinitive expresses the commanded action. 'To fight' is concise
    and idiomatic, while still conveying military conflict.
- source_word: τοὺς ἐν τῇ ἄκρᾳ
  chosen: those in the citadel
  alternatives:
  - those in the Acra
  - those in the fortress
  lexicon: LSJ
  rationale: ἄκρα can mean citadel or fortress; in 1 Maccabees it commonly refers
    to the fortified stronghold in Jerusalem known as the Acra. For readability in
    the main text, 'the citadel' communicates the sense; the more technical proper-name-like
    'Acra' is preserved in a footnote.
- source_word: ἕως
  chosen: until
  alternatives:
  - while
  - up to the point that
  lexicon: BDAG
  rationale: Here ἕως marks the goal or temporal limit of the fighting assignment.
- source_word: καθαρίσῃ
  chosen: he had cleansed
  alternatives:
  - he cleansed
  - he should cleanse
  - the sanctuary was cleansed
  lexicon: BDAG
  rationale: 'The aorist subjunctive after ἕως can be rendered with an English perfect
    in a past narrative to show the intended endpoint from Judas''s perspective: the
    fighting was to continue until the cleansing was accomplished. The subject is
    most naturally Judas from the singular verb, not an impersonal passive.'
- source_word: τὰ ἅγια
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy things
  - the sacred precincts
  lexicon: LSJ
  rationale: In this temple context, τὰ ἅγια refers to the holy sanctuary area rather
    than abstract 'holy things.' 'The sanctuary' is the clearest idiomatic rendering
    in English.
