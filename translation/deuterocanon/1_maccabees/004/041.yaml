theological_decisions:
- issue: Referent of ἄκρα
  chosen_reading: rendered descriptively as 'the citadel' in the main text, with 'Acra'
    preserved in a footnote
  alternative_readings:
  - the Acra
  - the fortress
  rationale: This is primarily a historical-geographical decision rather than a doctrinal
    one. Because the Greek uses the common noun ἄκρα with the article, an English
    descriptive rendering is justified; however, in Maccabean context it likely denotes
    the specific Jerusalem stronghold often called the Acra, so that alternative is
    worth preserving for auditability.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; consistency of key terms, or documented exception.'
