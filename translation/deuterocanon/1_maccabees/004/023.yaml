translation:
  text: And Judas returned to the plunder of the camp, and took much gold and silver,
    and blue cloth and purple cloth and sea goods, and great wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'sea-blue cloth' or 'marine-purple'; the Greek term literally
      means 'of the sea,' and its exact referent in this list of valuables is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Greek 'he took'; the singular may refer to Judas as representative leader,
      though the sense can be collective in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέστρεψεν
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: BDAG
  rationale: The verb commonly means to return or turn back. In this military narrative
    context, 'returned' is natural English and fits movement back to the camp's spoil.
- source_word: σκυλίαν
  chosen: plunder
  alternatives:
  - spoils
  - booty
  lexicon: LSJ
  rationale: '''Plunder'' communicates seized goods in readable modern English. ''Booty''
    is dated in this context, and ''spoils'' is possible but slightly less direct
    for contemporary readers.'
- source_word: παρεμβολῆς
  chosen: camp
  alternatives:
  - encampment
  lexicon: LSJ
  rationale: The term refers to the military camp. 'Camp' is the clearest modern rendering.
- source_word: ἔλαβε
  chosen: they took
  alternatives:
  - he took
  - received
  lexicon: BDAG
  rationale: Although the Greek form is singular ('he took'), the surrounding narrative
    can use a singular leader representatively for the group under him. Since the
    items are the army's captured goods, English naturally expresses the collective
    action as 'they took' without changing the sense.
- source_word: ὑάκινθον
  chosen: blue cloth
  alternatives:
  - hyacinth-colored cloth
  - violet cloth
  - blue
  lexicon: LSJ
  rationale: The word denotes a blue or blue-purple dyed fabric/color. 'Blue cloth'
    makes explicit that the list concerns valuable goods/textiles, not abstract colors.
- source_word: πορφύραν
  chosen: purple cloth
  alternatives:
  - purple
  - purple fabric
  lexicon: LSJ
  rationale: This commonly refers to purple dye or purple cloth, a luxury textile.
    'Purple cloth' clarifies the material sense in context.
- source_word: θαλασσίαν
  chosen: goods from the sea
  alternatives:
  - sea-blue cloth
  - marine goods
  - sea products
  lexicon: LSJ
  rationale: The adjective literally means 'of the sea' or 'marine.' In this inventory
    of valuables, the standalone feminine accusative likely refers elliptically to
    marine products or sea-derived goods rather than another color term. Because the
    exact referent is not fully transparent in English, a broader rendering is chosen
    and the lexical uncertainty is preserved in a footnote.
- source_word: πλοῦτον μέγαν
  chosen: great wealth
  alternatives:
  - great riches
  - a great amount of wealth
  lexicon: BDAG
  rationale: This idiom summarizes the abundance of the captured valuables. 'Great
    wealth' is concise and natural.
