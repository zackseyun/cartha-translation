translation:
  text: Remember how our fathers were saved in the Red Sea when Pharaoh pursued them
    with force.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the Red Sea'; alternatively, some prefer 'in the Reed Sea' to reflect
      the Hebrew background of the Exodus tradition.
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητε
  chosen: Remember
  alternatives:
  - Recall
  - Be mindful
  lexicon: BDAG
  rationale: Aorist imperative calling the hearers to active recollection. 'Remember'
    is the most natural and direct English imperative.
- source_word: ἐσώθησαν
  chosen: were saved
  alternatives:
  - were delivered
  - were rescued
  lexicon: BDAG
  rationale: Passive of σῴζω. 'Were saved' preserves the verbal link to divine deliverance
    language, while still fitting the historical setting of rescue at the sea.
- source_word: οἱ πατέρες ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: BDAG
  rationale: The Greek is explicitly masculine and refers to Israel's forefathers.
    Per doctrine, gender-accurate rendering is preferred over flattening to 'ancestors,'
    though the broader referent is the previous generation of Israel.
- source_word: ἐν θαλάσσῃ ἐρυθρᾷ
  chosen: in the Red Sea
  alternatives:
  - at the Red Sea
  - in the Reed Sea
  lexicon: BDAG
  rationale: The Greek phrase conventionally denotes the Red Sea in biblical Greek
    usage. 'In the Red Sea' follows the preposition ἐν closely. 'Reed Sea' reflects
    Hebrew-background discussion but is not the plain sense of this Greek witness,
    so it is preserved as an alternative only.
- source_word: ἐδίωξεν
  chosen: pursued
  alternatives:
  - chased
  - pressed after
  lexicon: BDAG
  rationale: Standard rendering of διώκω in a military/narrative context. 'Pursued'
    is idiomatic and suitably formal.
- source_word: ἐν δυνάμει
  chosen: with force
  alternatives:
  - with might
  - with an army
  - in strength
  lexicon: BDAG
  rationale: The phrase can denote power or military force. 'With force' preserves
    the sense of powerful armed pursuit without over-specifying beyond the Greek.
