- issue: Rendering of salvation language in a historical deliverance context
  chosen_reading: were saved
  alternative_readings:
  - were delivered
  - were rescued
  rationale: Although the context is historical rather than explicitly soteriological,
    σῴζω naturally carries 'save' language. Retaining 'were saved' preserves biblical
    intertextual resonance without importing later doctrinal claims.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Gendered ancestral language
  chosen_reading: our fathers
