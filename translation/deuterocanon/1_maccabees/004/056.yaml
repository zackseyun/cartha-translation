theological_decisions:
- issue: Cultic rendering of θυσίαν σωτηρίου
  chosen_reading: a sacrifice of deliverance
  alternative_readings:
  - a peace offering
  - a sacrifice of salvation
  rationale: The Greek text uses σωτηρίου, whose plain sense is salvation/deliverance.
    While some English traditions may render with a more technical sacrificial label
    influenced by Hebrew categories, the project prioritizes the Greek source text
    for deuterocanonical books. The chosen wording preserves the text's theological
    emphasis on God's saving help without importing a category not explicit in the
    Greek wording.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation
    tradition
- issue: Rendering of sacrificial language in accessible modern English
  chosen_reading: whole burnt offerings ... a sacrifice of deliverance and praise
  alternative_readings:
  - burnt offerings ... peace offerings of thanksgiving
  rationale: The verse is heavily cultic; the translation keeps sacrificial terminology
    visible rather than flattening it, while still using readable modern English.
    This preserves the religious and theological weight of the rededication ceremony.
  doctrine_reference: Translation philosophy §6, Readable modern English, not archaic
    or academic
