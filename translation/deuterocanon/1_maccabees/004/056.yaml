lexical_decisions:
- source_word: ἐποίησαν
  chosen: they celebrated
  alternatives:
  - they made
  - they performed
  - they kept
  lexicon: BDAG
  rationale: Although literally 'they did/made,' with ἐγκαινισμός as its object the
    idiom refers to carrying out or observing a dedication celebration. 'Celebrated'
    conveys the event sense in natural English without over-paraphrasing.
- source_word: ἐγκαινισμὸν
  chosen: dedication
  alternatives:
  - consecration
  - festival of dedication
  lexicon: LSJ
  rationale: The noun denotes dedication or inauguration. 'Dedication' is the most
    direct rendering here and preserves the connection to the altar's rededication.
- source_word: θυσιαστηρίου
  chosen: of the altar
  alternatives:
  - of the sacrificial altar
  lexicon: LSJ
  rationale: Standard rendering of the cultic term for altar. The simpler English
    is sufficient in context.
- source_word: ἡμέρας ὀκτώ
  chosen: for eight days
  alternatives:
  - eight days
  lexicon: BDAG
  rationale: Accusative of duration; 'for eight days' makes the temporal force explicit
    in idiomatic English.
- source_word: προσήνεγκαν
  chosen: they offered
  alternatives:
  - they brought near
  - they presented
  lexicon: BDAG
  rationale: In sacrificial context the verb means to offer. This is the standard
    and clearest cultic English equivalent.
- source_word: ὁλοκαυτώματα
  chosen: whole burnt offerings
  alternatives:
  - burnt offerings
  - holocausts
  lexicon: LSJ
  rationale: The term refers to offerings wholly consumed by fire. 'Whole burnt offerings'
    preserves that nuance better than simply 'burnt offerings,' while avoiding the
    misleading modern associations of 'holocausts.'
- source_word: μετʼ εὐφροσύνης
  chosen: with gladness
  alternatives:
  - with rejoicing
  - with joy
  lexicon: BDAG
  rationale: The phrase expresses joyful celebration accompanying the offerings. 'With
    gladness' is natural and suitably elevated.
- source_word: ἔθυσαν
  chosen: they sacrificed
  alternatives:
  - they offered
  lexicon: BDAG
  rationale: Using 'sacrificed' here preserves the distinction from the previous verb
    and reflects the explicit sacrificial action.
- source_word: θυσίαν σωτηρίου
  chosen: a sacrifice of deliverance
  alternatives:
  - a peace offering
  - a sacrifice of salvation
  - a saving sacrifice
  lexicon: LSJ
  rationale: The Greek singular σωτηρίου most naturally denotes salvation/deliverance.
    Because this is 1 Maccabees in Greek, the rendering should follow the Greek wording
    rather than import the more technical Hebrew sacrificial category 'peace offering'
    unless the context requires it. 'Deliverance' fits the celebratory context after
    military and cultic restoration.
- source_word: αἰνέσεως
  chosen: and praise
  alternatives:
  - of praise
  - thanksgiving
  lexicon: LSJ
  rationale: Genitive dependent on θυσίαν, describing the sacrifice as characterized
    by praise. 'Praise' is the most direct lexical equivalent; 'thanksgiving' is possible
    but less exact.
