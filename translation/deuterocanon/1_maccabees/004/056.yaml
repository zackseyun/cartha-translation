translation:
  text: And they celebrated the dedication of the altar for eight days, and they offered
    whole burnt offerings with gladness, and they sacrificed a sacrifice of peace
    offerings and praise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a peace offering'; the Greek reads 'a sacrifice of deliverance/salvation
      and praise.'
