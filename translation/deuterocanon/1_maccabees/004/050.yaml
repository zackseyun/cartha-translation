translation:
  text: And they burned incense on the altar, and they lit the lamps that were on
    the lampstand, and they shone in the temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they shone in the temple.' The Greek verb can be rendered more literally
      as the lamps shining.
    reason: lexical_alternative
  - marker: b
    text: '''Temple'' here may more specifically denote the sanctuary area.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθυμίασαν
  chosen: they burned incense
  alternatives:
  - they offered incense
  - they made an offering of incense
  lexicon: LSJ
  rationale: The verb θυμιάω refers specifically to burning incense, not sacrifice
    in general. 'Burned incense' is the clearest natural English rendering and preserves
    the cultic specificity.
- source_word: ἐπὶ τὸ θυσιαστήριον
  chosen: on the altar
  alternatives:
  - upon the altar
  - at the altar
  lexicon: LSJ
  rationale: The preposition ἐπί with the accusative here naturally indicates motion/result
    onto the altar surface in cultic action. 'On the altar' is idiomatic and sufficiently
    formal.
- source_word: ἐξῆψαν
  chosen: they lit
  alternatives:
  - they kindled
  - they set alight
  lexicon: LSJ
  rationale: The verb means to kindle or light. 'Lit' is modern, concise English and
    fits the lamps naturally.
- source_word: τοὺς λύχνους
  chosen: the lamps
  alternatives:
  - the lights
  lexicon: LSJ
  rationale: λύχνος denotes a lamp, not light abstractly. 'Lamps' preserves the concrete
    temple furnishing.
- source_word: τῆς λυχνίας
  chosen: the lampstand
  alternatives:
  - the menorah
  lexicon: LSJ
  rationale: λυχνία is the stand that holds the lamps. 'Lampstand' is the standard
    transparent rendering; 'menorah' is possible culturally but would introduce a
    transliterated term not required by the Greek.
- source_word: ἐφαίνοντο
  chosen: they gave light
  alternatives:
  - they shone
  - they were shining
  lexicon: LSJ
  rationale: The imperfect/middle-passive form here describes the lamps' visible shining
    in the sanctuary. 'They gave light' makes explicit the lamps as subject in natural
    English and fits the temple-lighting context better than the less idiomatic 'they
    were appearing.'
- source_word: ἐν τῷ ναῷ
  chosen: in the temple
  alternatives:
  - in the sanctuary
  lexicon: LSJ
  rationale: ναός can mean the sanctuary proper, but in this context 'temple' is clear
    and readable. 'Sanctuary' is possible, yet the broader English audience will understand
    'temple' more readily without serious loss.
