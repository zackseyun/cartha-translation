  chosen_reading: 'Retain concrete ritual language: ''burned incense,'' ''altar,''
    ''lampstand,'' and ''temple.'''
  alternative_readings:
  - Use more interpretive or generalized worship language
  rationale: The verse narrates specific temple actions in rededication, so the translation
    should preserve the ritual concreteness rather than flatten it into generic worship
    terminology.
