translation:
  text: But when they saw these things, they were greatly terrified; and when they
    also saw Judas's camp in the plain, ready for battle,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ready for deployment' or 'ready for battle array'; the Greek military
      term refers specifically to being drawn up in formation.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνιδόντες
  chosen: when they saw
  alternatives:
  - having perceived
  - when they realized
  lexicon: LSJ
  rationale: The participle from συνοράω/συνιδεῖν can mean perceive or observe. In
    this narrative context, a simple temporal-causal rendering, 'when they saw,' is
    natural English and adequately conveys the force without over-interpreting as
    mental realization.
- source_word: ἐδειλώθησαν
  chosen: they were greatly terrified
  alternatives:
  - they became cowardly
  - they were very afraid
  lexicon: LSJ
  rationale: The verb carries the sense of becoming fearful or losing courage. 'Were
    greatly terrified' captures both the emotional fear and the military discouragement
    in context better than the more wooden 'became cowardly.'
- source_word: σφόδρα
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: LSJ
  rationale: An adverb of intensity; 'greatly' is concise, natural, and preserves
    the emphatic force.
- source_word: παρεμβολή
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: LSJ
  rationale: In military context παρεμβολή refers to a camp or encampment. 'Camp'
    is the most idiomatic modern English rendering and fits the immediate scene.
- source_word: ἐν τῷ πεδίῳ
  chosen: in the plain
  alternatives:
  - in the field
  - on the plain
  lexicon: LSJ
  rationale: πεδίον denotes a plain or open level ground. 'In the plain' reflects
    the article and location naturally in English, while preserving the geographical
    sense better than the broader 'field.'
- source_word: ἑτοίμην
  chosen: ready
  alternatives:
  - prepared
  - made ready
  lexicon: LSJ
  rationale: The adjective means prepared or ready. 'Ready' is the clearest and most
    economical English choice here.
- source_word: εἰς παράταξιν
  chosen: for battle
  alternatives:
  - for battle line
  - for deployment
  - for array
  lexicon: LSJ
  rationale: παράταξις is a military term for drawn-up battle order or deployment.
    'For battle' is slightly less formal but communicates the intended military readiness
    in readable English. The more literal 'for battle line' is awkward in English.
