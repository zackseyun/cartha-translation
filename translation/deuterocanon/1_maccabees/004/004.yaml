translation:
  text: while the forces were still scattered from the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until the forces were still scattered from the camp.' The Greek ἕως
      ἔτι is somewhat compressed; here it is taken idiomatically as a temporal clause
      meaning 'while ... still.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως ἔτι
  chosen: while ... still
  alternatives:
  - until still
  - as long as still
  lexicon: LSJ
  rationale: In context this idiom introduces the time during which action should
    occur, not a destination point alone. Rendering it as 'while ... still' gives
    natural English and preserves the temporal force of ἔτι.
- source_word: αἱ δυνάμεις
  chosen: the forces
  alternatives:
  - the army
  - the troops
  - the military forces
  lexicon: LSJ
  rationale: δυνάμεις can denote military forces or troops. 'The forces' is broad
    enough to reflect the plural Greek and the military setting without over-specifying
    unit structure.
- source_word: ἐσκορπισμέναι
  chosen: scattered
  alternatives:
  - dispersed
  - spread out
  lexicon: LSJ
  rationale: The participle indicates the forces were not concentrated together. 'Scattered'
    is the most direct military-context rendering.
- source_word: ἀπὸ τῆς παρεμβολῆς
  chosen: away from the camp
  alternatives:
  - from the camp
  - out from the camp
  - from the encampment
  lexicon: LSJ
  rationale: παρεμβολή commonly means camp or encampment in military contexts. Adding
    'away' makes explicit the separative force of ἀπό in idiomatic English.
