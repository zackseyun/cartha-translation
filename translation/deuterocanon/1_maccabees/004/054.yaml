translation:
  text: At the time, on the very day when the nations had defiled it, on that very
    day it was rededicated with songs and lyres and harps and cymbals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had profaned it.' The Greek verb can denote making something profane
      or defiled in a sacred context.
    reason: lexical_alternative
  - marker: b
    text: The instrument rendered 'harps' (κινύραις) may refer more broadly to a type
      of stringed instrument; exact identification is uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: κατὰ τὸν καιρὸν
  chosen: At the time
  alternatives:
  - At the season
  - According to the time
  lexicon: LSJ
  rationale: The phrase is idiomatic and temporal. 'At the time' gives natural English
    while preserving the temporal marker without over-literal awkwardness.
- source_word: κατὰ τὴν ἡμέραν
  chosen: on the very day
  alternatives:
  - on the day
  - according to the day
  lexicon: LSJ
  rationale: In combination with the repeated temporal phrasing and the following
    relative clause, the sense is emphatic correspondence to the exact date. 'On the
    very day' captures that emphasis.
- source_word: ἐν ᾗ
  chosen: when
  alternatives:
  - in which
  - on which
  lexicon: LSJ
  rationale: The relative pronoun refers back to 'day.' English idiom prefers 'when'
    here rather than the more wooden 'on which.'
- source_word: ἐβεβήλωσαν
  chosen: had defiled
  alternatives:
  - had profaned
  - profaned
  lexicon: LSJ
  rationale: The verb denotes making something profane or defiled. 'Defiled' is accessible
    modern English and fits the temple context; 'profaned' is possible but slightly
    more technical. The pluperfect-like English 'had defiled' fits the temporal relation
    to the rededication.
- source_word: αὐτό
  chosen: it
  alternatives:
  - the sanctuary
  - the altar
  lexicon: LSJ
  rationale: The pronoun's referent is supplied by context from the preceding narrative,
    but the Greek here uses only the pronoun. Retaining 'it' avoids importing a more
    specific noun than the verse itself states.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the heathen
  lexicon: LSJ
  rationale: The standard sense is 'nations' or 'Gentiles.' 'The nations' preserves
    the Greek wording and avoids the more interpretive or archaic 'heathen.' In 1
    Maccabees this commonly refers to the non-Jewish peoples.
- source_word: ἐν ἐκείνῃ
  chosen: on that very day
  alternatives:
  - on that day
  - in that
  lexicon: LSJ
  rationale: The repetition intensifies the exact correspondence between desecration
    and restoration. Rendering with 'that very day' preserves the rhetorical emphasis.
- source_word: ἐνεκαινίσθη
  chosen: it was rededicated
  alternatives:
  - it was dedicated anew
  - it was renewed
  lexicon: LSJ
  rationale: The verb denotes dedication/renewal in cultic context. Given the temple
    setting and the Hanukkah/rededication theme in the chapter, 'rededicated' is the
    clearest and most contextually precise English rendering.
- source_word: ἐν ᾠδαῖς
  chosen: with songs
  alternatives:
  - in songs
  - with hymns
  lexicon: LSJ
  rationale: The preposition with instruments and music is best rendered instrumentally
    in English. 'Songs' is broad and natural; 'hymns' would be more specific than
    the Greek requires.
- source_word: κιθάραις
  chosen: lyres
  alternatives:
  - harps
  lexicon: LSJ
  rationale: κιθάρα is more specifically a lyre-type stringed instrument. Using 'lyres'
    helps distinguish it from the following κινύραις.
- source_word: κινύραις
  chosen: harps
  alternatives:
  - lutes
  - stringed instruments
  lexicon: LSJ
  rationale: The exact ancient instrument is difficult to map onto a modern term,
    but 'harps' is a conventional and serviceable rendering that also preserves distinction
    from κιθάραις. A lexical alternative is worth noting because the identification
    is not fully certain.
- source_word: κυμβάλοις
  chosen: cymbals
  alternatives:
  - clashing cymbals
  lexicon: LSJ
  rationale: Straightforward rendering of the percussion instrument; no expansion
    is needed in the main text.
