theological_decisions:
- issue: Cultic verb for restoration of the desecrated sanctuary
  chosen_reading: it was rededicated
  alternative_readings:
  - it was dedicated anew
  - it was renewed
  rationale: The chapter narrates the restoration of worship after desecration. 'Rededicated'
    best conveys the cultic and historical sense without overexplaining. It also preserves
    the connection to the feast of dedication while remaining a direct translation
    of the Greek verb.
  doctrine_reference: Translation philosophy §1, §6
