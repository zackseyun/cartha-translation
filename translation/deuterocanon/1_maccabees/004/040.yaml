translation:
  text: And they fell facedown on the ground, and they sounded the signal trumpets,
    and they cried out to heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the trumpets of the signals.' The phrase likely refers
      to trumpets used for signaling rather than to physical standards or banners.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσον ἐπὶ πρόσωπον ἐπὶ τὴν γῆν
  chosen: fell facedown on the ground
  alternatives:
  - fell on their faces to the ground
  - prostrated themselves on the ground
  lexicon: LSJ
  rationale: The idiom literally means falling on the face to the earth/ground. 'Fell
    facedown on the ground' preserves the physical posture in natural English without
    over-paraphrasing.
- source_word: ἐσάλπισαν
  chosen: sounded
  alternatives:
  - blew
  - sounded a trumpet blast
  lexicon: LSJ
  rationale: The verb means to blow/sound a trumpet. 'Sounded' works smoothly with
    the following dative phrase and avoids adding words not explicit in the Greek.
- source_word: ταῖς σάλπιγξιν τῶν σημαιῶν
  chosen: the signal trumpets
  alternatives:
  - the trumpets of the signals
  - the trumpets for the standards
  - the signaling trumpets
  lexicon: LSJ
  rationale: The genitive τῶν σημαιῶν is most naturally taken as specifying the function
    of the trumpets, i.e., trumpets used for signals. 'Signal trumpets' gives clear
    English while staying close to the Greek. A more literal 'trumpets of the signals'
    is awkward, and 'standards' is less likely here in context.
- source_word: ἐβόησαν εἰς οὐρανόν
  chosen: cried out to heaven
  alternatives:
  - shouted to heaven
  - cried to heaven
  lexicon: LSJ
  rationale: The phrase expresses a loud appeal directed heavenward. 'Cried out to
    heaven' preserves both the intensity of ἐβόησαν and the directional force of εἰς
    in idiomatic English.
