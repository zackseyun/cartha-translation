theological_decisions:
- issue: Referent of 'the people' and 'the nations'
  chosen_reading: '''the people'' refers to Israel/Judea, and ''the nations'' refers
    to surrounding non-Israelite peoples'
  alternative_readings:
  - more generic 'people' and 'nations' without covenantal nuance
  rationale: The historical context of 1 Maccabees concerns the restoration of Jewish
    worship and the removal of shame imposed by foreign peoples. The translation preserves
    this by retaining the biblical contrast 'people' / 'nations' without importing
    extra interpretation into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
