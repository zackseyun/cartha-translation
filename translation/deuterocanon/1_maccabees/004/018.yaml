  text: καὶ Γοργίας καὶ ἡ δύναμις ἐν τῷ ὄρει ἐγγὺς ἡμῶν· ἀλλὰ στῆτε νῦν ἐναντίον τῶν
    ἐχθρῶν ἡμῶν καὶ πολεμήσατε αὐτούς, καὶ μετὰ ταῦτα λάβετε σκῦλα καὶ μετὰ παρρησίας.
