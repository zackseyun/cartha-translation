translation:
  text: And Gorgias and the force are in the hill country near us. But now stand against
    our enemies and fight them, and after this take the spoils with boldness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the mountain near us.' The Greek phrase can refer either to a specific
      mountain or more broadly to the upland region.
    reason: lexical_alternative
  - marker: b
    text: Or 'take the spoils confidently' or 'boldly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δύναμις
  chosen: force
  alternatives:
  - army
  - troops
  lexicon: LSJ
  rationale: In military context δύναμις commonly denotes an armed force. 'Force'
    is concise and natural, while avoiding over-specifying size or structure implied
    by 'army'.
- source_word: ἐν τῷ ὄρει
  chosen: in the hill country
  alternatives:
  - on the mountain
  - in the mountain region
  lexicon: LSJ
  rationale: The singular ὄρος/ὄρει can denote mountainous terrain or upland region,
    not merely one peak. 'Hill country' fits the military-geographic sense in idiomatic
    English.
- source_word: ἐγγὺς ἡμῶν
  chosen: near us
  alternatives:
  - close to us
  - nearby
  lexicon: LSJ
  rationale: A straightforward spatial rendering preserving the immediacy of the threat.
- source_word: στῆτε
  chosen: stand against
  alternatives:
  - take your stand against
  - stand firm before
  lexicon: LSJ
  rationale: The imperative calls for resolute opposition in battle. 'Stand against'
    is direct and idiomatic, preserving the martial force without unnecessary expansion.
- source_word: πολεμήσατε
  chosen: fight
  alternatives:
  - make war on
  - do battle with
  lexicon: LSJ
  rationale: '''Fight'' is the most natural modern English equivalent in this immediate
    battle command.'
- source_word: σκῦλα
  chosen: the spoils
  alternatives:
  - plunder
  - booty
  lexicon: LSJ
  rationale: Refers to goods taken after victory. 'Spoils' is standard, clear, and
    suitably dignified; 'booty' is archaic or potentially distracting, and 'plunder'
    can sound more like the act than the objects.
- source_word: μετὰ παρρησίας
  chosen: with boldness
  alternatives:
  - boldly
  - with confidence
  - openly
  lexicon: LSJ
  rationale: παρρησία often carries the sense of boldness or confidence. Here it likely
    means they may collect the spoils without fear after victory. 'With boldness'
    preserves the noun phrase and the tone of fearless action.
- source_word: Γοργίας
  chosen: Gorgias
  rationale: Personal name transliterated according to project policy.
