translation:
  text: And they rebuilt the sanctuary and the interior of the house, and they consecrated
    the courts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy place' for 'the sanctuary'; the Greek τὰ ἅγια can denote the
      sacred area of the temple.
    reason: lexical_alternative
  - marker: b
    text: '''House'' here refers to the temple building.'
    reason: cultural_note
lexical_decisions:
- source_word: ᾠκοδόμησαν
  chosen: rebuilt
  alternatives:
  - built
  - restored
  lexicon: LSJ
  rationale: The verb οἰκοδομέω literally means 'build,' but in this context of rededicating
    and repairing the desecrated temple complex, 'rebuilt' best conveys construction/restoration
    activity without over-paraphrasing. 'Restored' is possible but less directly tied
    to the building verb.
- source_word: τὰ ἅγια
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy things
  lexicon: LSJ
  rationale: In temple context, τὰ ἅγια commonly refers to the sacred sanctuary area
    rather than abstract 'holy things.' 'The sanctuary' is clear modern English and
    fits the paired reference with 'the interior of the house.'
- source_word: τὰ ἐντὸς τοῦ οἴκου
  chosen: the interior of the house
  alternatives:
  - the inner parts of the house
  - what was inside the house
  lexicon: LSJ
  rationale: 'The phrase is spatial and concrete: ''the things/areas inside the house.''
    Rendering οἶκος as ''house'' preserves the temple idiom while making clear this
    is the temple building''s interior.'
- source_word: οἴκου
  chosen: house
  alternatives:
  - temple
  lexicon: LSJ
  rationale: Although it refers to the temple, 'house' reflects the Greek wording
    more closely and preserves biblical temple diction ('house' for God's house).
    The surrounding context already makes the referent clear.
- source_word: τὰς αὐλάς
  chosen: the courts
  alternatives:
  - the courtyards
  lexicon: LSJ
  rationale: In temple architecture αὐλαί are courts/courtyards. 'Courts' is the more
    idiomatic biblical-English term in a temple setting.
- source_word: ἡγίασαν
  chosen: consecrated
  alternatives:
  - sanctified
  - made holy
  lexicon: LSJ
  rationale: '''Consecrated'' communicates ritual setting-apart in accessible modern
    English. ''Sanctified'' is possible but more ecclesiastical; ''made holy'' is
    more interpretive.'
