theological_decisions:
- issue: Temple terminology for sacred spaces
  chosen_reading: Render τὰ ἅγια as 'the sanctuary' and distinguish it from 'the interior
    of the house.'
  alternative_readings:
  - Render τὰ ἅγια as 'the holy place'
  - Render τὰ ἅγια as 'the holy things'
  rationale: The verse lists multiple temple areas being repaired and purified. Translating
    τὰ ἅγια as a sacred locale rather than objects best fits the sequence of architectural
    references and avoids flattening the temple-space distinctions.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; consistency of key terms, or documented exception.'
