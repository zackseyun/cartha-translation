translation:
  text: And they rose early in the morning on the twenty-fifth day of the ninth month—that
    is, the month Chislev—in the one hundred and forty-eighth year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the month Chaseleu''; the Jewish month name is commonly known
      in English as Kislev or Chislev.'
    reason: lexical_alternative
  - marker: b
    text: The year is given simply as 'the one hundred and forty-eighth year' in Greek;
      historically this refers to the Seleucid era.
    reason: cultural_note
lexical_decisions:
- source_word: ὤρθρισαν
  chosen: they rose early
  alternatives:
  - they got up at dawn
  - they were up early
  lexicon: LSJ
  rationale: The verb denotes rising early or being abroad at dawn. 'They rose early'
    is natural English and preserves the temporal emphasis without over-paraphrasing.
- source_word: τὸ πρωὶ
  chosen: in the morning
  alternatives:
  - at morning
  - early in the morning
  lexicon: LSJ
  rationale: This adverbial accusative reinforces the early-time expression already
    present in ὤρθρισαν. Rendering it as 'in the morning' preserves the Greek's slight
    redundancy without awkward English overloading.
- source_word: τῇ πέμπτῃ καὶ εἰκάδι
  chosen: on the twenty-fifth day
  alternatives:
  - on the five-and-twentieth day
  - on the twenty-fifth
  lexicon: LSJ
  rationale: This is the standard Greek way of expressing the twenty-fifth day of
    the month. 'On the twenty-fifth day' is clear modern English.
- source_word: τοῦ μηνὸς τοῦ ἐνάτου
  chosen: of the ninth month
  alternatives:
  - of month nine
  lexicon: LSJ
  rationale: A straightforward genitival date expression; 'of the ninth month' is
    the most natural formal rendering.
- source_word: Χασελεὺ
  chosen: Chislev
  alternatives:
  - Casleu
  - Kislev
  lexicon: LSJ
  rationale: This is the Greek form of the Jewish month name Kislev/Chislev. 'Chislev'
    reflects a conventional English transliteration from the Greek form while remaining
    recognizable.
- source_word: τοῦ ὀγδόου καὶ τεσσερακοστοῦ καὶ ἑκατοστοῦ ἔτους
  chosen: in the one hundred and forty-eighth year
  alternatives:
  - of the one hundred forty-eighth year
  - in year one hundred forty-eight
  lexicon: LSJ
  rationale: The phrase gives the Seleucid-era year. 'In the one hundred and forty-eighth
    year' is idiomatic and preserves the dating formula.
