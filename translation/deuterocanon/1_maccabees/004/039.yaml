translation:
  text: And they tore their garments, and made great lamentation, and put ashes on
    their heads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: These actions—tearing garments, lamenting, and putting ashes on the head—are
      conventional signs of grief and mourning in biblical literature.
    reason: cultural_note
lexical_decisions:
- source_word: διέρρηξαν
  chosen: tore
  alternatives:
  - rent
  - tore apart
  lexicon: LSJ
  rationale: The verb denotes tearing or rending. 'Tore' is clear modern English;
    'rent' is traditional but archaic. The object 'their garments' makes the mourning
    gesture explicit.
- source_word: τὰ ἱμάτια
  chosen: garments
  alternatives:
  - clothes
  - robes
  lexicon: LSJ
  rationale: ἱμάτια refers broadly to garments/clothing. 'Garments' preserves the
    solemn register and fits the mourning context better than the more casual 'clothes.'
- source_word: ἐκόψαντο κοπετὸν μέγαν
  chosen: made great lamentation
  alternatives:
  - mourned greatly
  - beat their breasts in great mourning
  - made a great mourning
  lexicon: LSJ
  rationale: The idiom combines the cognate verb and noun for mourning/lamentation,
    often expressed in ritual grief. 'Made great lamentation' preserves the formal,
    public sense without over-specifying a bodily gesture not explicit in this Greek
    wording.
- source_word: σποδὸν
  chosen: ashes
  alternatives:
  - dust
  - ash
  lexicon: LSJ
  rationale: The singular collective noun is naturally rendered 'ashes' in English,
    especially in the stock mourning expression 'put ashes on their heads.'
- source_word: ἐπέθεντο
  chosen: put
  alternatives:
  - placed
  - laid
  lexicon: LSJ
  rationale: A straightforward rendering of the verb of placing. 'Put' is idiomatic
    in English for this mourning action.
- source_word: ἐπὶ τὴν κεφαλὴν αὐτῶν
  chosen: on their heads
  alternatives:
  - upon their head
  lexicon: LSJ
  rationale: Although Greek has singular 'head' with plural possessive, idiomatic
    English uses the plural 'heads' distributively.
