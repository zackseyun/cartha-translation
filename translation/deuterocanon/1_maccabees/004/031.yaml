theological_decisions:
- issue: Military prayer language asking God to give the enemy to Israel
  chosen_reading: Hand over this camp into the hands of your people Israel
  alternative_readings:
  - Shut up this camp into the hands of your people Israel
  - Deliver this camp into the hands of your people Israel
  rationale: The verse is a petition for divinely granted victory, not a doctrinally
    contested formula. 'Hand over' best communicates the prayer's sense in clear modern
    English while preserving the agency of God and the idiom of transfer into Israel's
    power.
