translation:
  text: Deliver this camp into the hands of your people Israel, and let them be put
    to shame because of their army and their cavalry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Deliver this camp into the hands of your people Israel.' The Greek verb
      can more literally mean 'shut up' or 'confine,' but here it carries the sense
      of giving the enemy force over to Israel.
    reason: lexical_alternative
  - marker: b
    text: '''Because of their army and their cavalry'' may also be understood as ''in
      their strength and their cavalry,'' with δύναμις referring more generally to
      military power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σύγκλεισον
  chosen: Hand over
  alternatives:
  - shut up
  - confine
  - deliver over
  lexicon: LSJ
  rationale: In this prayer context, the imperative asks God to give the enemy force
    over to Israel's power. A literal 'shut up' or 'confine' is possible from the
    verb's core sense, but idiomatic English here is better served by 'hand over,'
    which captures the military-prayer sense of delivering an army into another's
    control.
- source_word: παρεμβολήν
  chosen: camp
  alternatives:
  - army
  - encampment
  lexicon: LSJ
  rationale: The noun can denote a camp or an armed force. Here 'this camp' preserves
    the concrete military image while still implying the hostile force gathered there.
    'Army' is possible, but the Greek more directly names the encamped host.
- source_word: εἰς χεῖρας
  chosen: into the hands of
  alternatives:
  - into the power of
  lexicon: LSJ
  rationale: This is a standard idiom for being given into someone's power. Retaining
    'into the hands of' preserves the biblical idiom and remains natural in English.
- source_word: λαοῦ σου Ἰσραήλ
  chosen: your people Israel
  alternatives:
  - your people, Israel
  lexicon: LSJ
  rationale: The phrase identifies Israel as God's covenant people. The appositional
    sense is clear without adding punctuation in the running text.
- source_word: αἰσχυνθήτωσαν
  chosen: let them be put to shame
  alternatives:
  - let them be ashamed
  - let them be disgraced
  lexicon: LSJ
  rationale: '''Be put to shame'' best reflects the passive/jussive force and the
    biblical theme of enemies being shamed by defeat. ''Be ashamed'' can sound too
    internal; ''be disgraced'' is possible but slightly more interpretive.'
- source_word: ἐπὶ τῇ δυνάμει
  chosen: because of their army
  alternatives:
  - in their strength
  - because of their strength
  - for their power
  lexicon: LSJ
  rationale: δύναμις can mean strength, power, or military force. In this battle setting,
    paired with cavalry, it most naturally refers to their armed might, hence 'army.'
    This makes explicit the military sense latent in the Greek.
- source_word: τῇ ἵππῳ αὐτῶν
  chosen: their cavalry
  alternatives:
  - their horsemen
  - their horses
  lexicon: LSJ
  rationale: The singular ἵππος can function collectively for horse or cavalry. In
    military context, 'cavalry' is the clearest modern rendering, especially alongside
    'army.'
