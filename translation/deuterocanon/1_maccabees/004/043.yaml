lexical_decisions:
- source_word: ἐκαθάρισαν
  chosen: cleansed
  alternatives:
  - purified
  - cleaned
  lexicon: BDAG
  rationale: The verb denotes making something clean/pure, especially in a cultic
    sense. 'Cleansed' preserves both the physical and ritual dimensions better than
    the more ordinary 'cleaned,' while remaining more natural than 'purified' in this
    narrative context.
- source_word: τὰ ἅγια
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy things
  lexicon: LSJ
  rationale: In this temple-rededication context, the neuter plural idiom refers to
    the sacred precinct/holy sanctuary rather than abstract 'holy things.' 'The sanctuary'
    is the clearest idiomatic English rendering for the temple area being cleansed.
- source_word: ἦραν
  chosen: carried
  alternatives:
  - removed
  - took away
  - lifted
  lexicon: BDAG
  rationale: The verb literally means 'lifted/took up,' but in context it describes
    transporting the defiled stones away. 'Carried' captures the physical action without
    overinterpreting; 'removed' is possible but less concrete.
- source_word: τοὺς λίθους τοῦ μιασμοῦ
  chosen: the stones of defilement
  alternatives:
  - the defiled stones
  - the polluted stones
  - the stones of pollution
  lexicon: LSJ
  rationale: 'The genitive construction is most naturally rendered with an abstract
    noun: stones associated with defilement because of pagan contamination of the
    altar area. ''Stones of defilement'' stays close to the Greek while conveying
    ritual impurity.'
- source_word: εἰς τόπον ἀκάθαρτον
  chosen: to an unclean place
  alternatives:
  - to an impure place
  - to a defiled place
  lexicon: BDAG
  rationale: ἀκάθαρτος is a standard term for ritual uncleanness. 'Unclean place'
    preserves the cultic register and echoes biblical purity language better than
    the more generic 'impure place.'
