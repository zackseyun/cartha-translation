translation:
  text: They all fled into the land of the foreigners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the land of the Gentiles.' The Greek means 'those of another people'
      and here likely refers generally to foreign nations rather than to the Philistines
      specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφυγον
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: BDAG
  rationale: Aorist of φεύγω, denoting flight from danger. 'Fled' is concise, natural
    English and preserves the military-retreat sense better than the looser 'ran away.'
- source_word: πάντες
  chosen: they all
  alternatives:
  - all of them
  - all
  lexicon: BDAG
  rationale: The adjective functions substantivally with the implied subject. 'They
    all' makes the subject explicit in idiomatic English while preserving the totality
    emphasized by πάντες.
- source_word: γῆν
  chosen: land
  alternatives:
  - country
  - territory
  lexicon: BDAG
  rationale: γῆ can mean land, earth, or region. In this military-geographical context,
    'land' is the most straightforward and least interpretively loaded rendering.
- source_word: ἀλλοφύλων
  chosen: the foreigners
  alternatives:
  - the Philistines
  - those of another race
  - the Gentiles
  lexicon: BDAG
  rationale: ἀλλόφυλος literally denotes those of another people/tribe. In 1 Maccabees
    it commonly refers broadly to non-Judean foreign peoples rather than specifically
    Philistines here. 'The foreigners' is clear modern English and fits the plural
    genitive after γῆν.
