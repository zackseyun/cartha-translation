theological_decisions:
- issue: Implicit subject of the substantival participles 'the one redeeming and saving
    Israel'
  chosen_reading: Render existentially as 'there is one who redeems and saves Israel'
    without naming the referent in the main text.
  alternative_readings:
  - '''he is the one who redeems and saves Israel'''
  - '''there is a redeemer and savior of Israel'''
  rationale: The Greek leaves the subject implicit. In context the referent is God,
    but the clause itself states the reality of such a redeemer/savior rather than
    explicitly naming him. The chosen rendering preserves that textual restraint while
    remaining intelligible in English.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve
    it
