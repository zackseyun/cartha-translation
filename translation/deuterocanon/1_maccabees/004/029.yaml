translation:
  text: And they came into Idumea and encamped at Beth-zur, and Judas met them with
    ten thousand men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Βηθορούς, conventionally rendered 'Beth-horon.'
