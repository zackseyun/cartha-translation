lexical_decisions:
- source_word: ἦλθον εἰς
  chosen: came into
  alternatives:
  - went into
  - entered
  lexicon: LSJ
  rationale: A straightforward narrative movement formula. 'Came into' preserves the
    simple aorist sense without over-specifying direction beyond entry into the region.
- source_word: τὴν Ἰδουμαίαν
  chosen: Idumea
  alternatives:
  - Edom
  lexicon: LSJ
  rationale: Ἰδουμαία is the Greek regional name 'Idumea,' not the older Hebrew ethnogeographic
    name 'Edom.' Transliteration preserves the historical setting and standard English
    usage for the Hellenistic-era region.
- source_word: παρεμβάλον
  chosen: encamped
  alternatives:
  - camped
  - made camp
  lexicon: LSJ
  rationale: The verb commonly denotes setting up camp in military contexts. 'Encamped'
    best matches the martial narrative register.
- source_word: ἐν Βηθορούς
  chosen: at Beth-horon
  alternatives:
  - in Beth-horon
  - at Bethoron
  lexicon: LSJ
  rationale: The place name is conventionally represented in English as 'Beth-horon.'
    With encampment, English idiom prefers 'at' for a location near or by a town/site.
    The Greek form reflects the toponym rather than requiring a more literal but less
    natural 'in.'
- source_word: συνήντησεν αὐτοῖς
  chosen: met them
  alternatives:
  - came to meet them
  - encountered them
  lexicon: LSJ
  rationale: The singular verb with dative pronoun indicates Judas came into engagement
    with the opposing force. 'Met them' is concise and natural; 'came to meet them'
    is possible but less direct in English.
- source_word: ἐν δέκα χιλιάσιν ἀνδρῶν
  chosen: with ten thousand men
  alternatives:
  - with ten thousand soldiers
  - with ten thousand troops
  lexicon: LSJ
  rationale: The phrase indicates accompanying force size. 'Men' is the direct rendering
    of ἀνδρῶν and fits the military context without adding the interpretive specificity
    of 'soldiers,' though that sense is implied.
