translation:
  text: And they saw our sanctuary laid waste, and the altar defiled, and the gates
    burned down, and in the courts plants growing as in a thicket or as on one of
    the mountains, and the chambers torn down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'profaned' for 'defiled.' The Greek emphasizes desecration of what is
      sacred.
    reason: lexical_alternative
  - marker: b
    text: The Greek term rendered 'side chambers' refers to rooms attached to or associated
      with the temple complex; the exact architectural nuance is uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: ἁγίασμα
  chosen: sanctuary
  alternatives:
  - holy place
  - sanctified place
  lexicon: LSJ
  rationale: In this temple context, ἁγίασμα refers to the sacred precinct/shrine
    rather than abstract holiness. 'Sanctuary' is natural English and preserves the
    cultic sense.
- source_word: ἠρημωμένον
  chosen: laid waste
  alternatives:
  - desolated
  - made desolate
  lexicon: LSJ
  rationale: The participle conveys devastation and abandonment. 'Laid waste' is idiomatic
    modern English that preserves the force without sounding overly technical.
- source_word: θυσιαστήριον
  chosen: altar
  lexicon: LSJ
  rationale: Standard cultic term for altar; no contextual reason to vary.
- source_word: βεβηλωμένον
  chosen: defiled
  alternatives:
  - profaned
  lexicon: LSJ
  rationale: '''Defiled'' communicates ritual desecration clearly in modern English;
    ''profaned'' is possible but slightly less accessible.'
- source_word: πύλας
  chosen: gates
  alternatives:
  - gateways
  lexicon: LSJ
  rationale: Straightforward rendering of the plural; 'gates' fits the temple-complex
    setting.
- source_word: κατακεκαυμένας
  chosen: burned down
  alternatives:
  - burned
  - completely burned
  lexicon: LSJ
  rationale: The perfect participle with intensive prefix suggests completed destruction
    by fire. 'Burned down' captures that result naturally.
- source_word: αὐλαῖς
  chosen: courts
  alternatives:
  - courtyards
  lexicon: LSJ
  rationale: Refers to the temple courts. 'Courts' is concise and standard in biblical
    architectural contexts.
- source_word: φυτὰ πεφυκότα
  chosen: plants growing
  alternatives:
  - vegetation sprung up
  - growth growing
  lexicon: LSJ
  rationale: The phrase emphasizes unchecked plant growth. 'Plants growing' is simple
    and faithful, avoiding over-interpretation about specific species.
- source_word: δρυμῷ
  chosen: thicket
  alternatives:
  - woodland
  - forest
  lexicon: LSJ
  rationale: The comparison is to wild, overgrown vegetation. 'Thicket' best conveys
    dense unmanaged growth in this context.
- source_word: παστοφόρια
  chosen: side chambers
  alternatives:
  - store chambers
  - priestly chambers
  - porticoes
  lexicon: LSJ
  rationale: The term denotes chambers/rooms associated with the temple complex. 'Side
    chambers' is a cautious architectural rendering that avoids over-specifying function
    where the Greek alone does not require it.
- source_word: καθῃρημένα
  chosen: torn down
  alternatives:
  - demolished
  - pulled down
  lexicon: LSJ
  rationale: Conveys that these structures had been dismantled or ruined. 'Torn down'
    is vivid and natural.
