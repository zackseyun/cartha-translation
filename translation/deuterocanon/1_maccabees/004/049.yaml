theological_decisions:
- issue: Identification of temple furnishings and whether to expand implicit referents
  chosen_reading: Keep the Greek's concise list of furnishings without adding explanatory
    expansions in the main text.
  alternative_readings:
  - Render 'the table' as 'the table for the bread of the Presence'
  - Render ναός as 'sanctuary' to stress the inner temple
  rationale: The verse lists restored sacred objects in compressed cultic language.
    Optimal equivalence favors preserving that compactness while using recognizable
    English temple terms. Explanatory expansions are possible but are better left
    out of the main text because they add information not explicitly stated here.
  doctrine_reference: Translation philosophy §§1, 5, 6
