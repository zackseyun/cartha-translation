translation:
  text: And they made new holy vessels, and they brought the lampstand and the altar
    of burnt offerings and of incense and the table into the temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the altar for burnt offerings and incense.' The Greek places both 'burnt
      offerings' and 'incense' in relation to 'altar,' though the sense is the familiar
      pair of temple altars.
    reason: lexical_alternative
  - marker: b
    text: '''Temple'' here refers to the sanctuary building, not the wider temple
      complex.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐποίησαν
  chosen: they made
  alternatives:
  - they fashioned
  - they prepared
  lexicon: LSJ
  rationale: A straightforward past-tense rendering of ποιέω fits the context of manufacturing
    replacement cultic items. 'Made' is natural and sufficiently formal without over-specifying
    craftsmanship.
- source_word: τὰ σκεύη τὰ ἅγια
  chosen: the holy vessels
  alternatives:
  - the sacred vessels
  - the holy implements
  lexicon: LSJ
  rationale: σκεύη in temple context refers to cultic articles or implements. 'Vessels'
    preserves traditional temple terminology and remains understandable; 'holy' directly
    reflects ἅγια.
- source_word: καινά
  chosen: new
  alternatives:
  - fresh
  - renewed
  lexicon: LSJ
  rationale: καινά indicates newly made items, not merely repaired ones. 'New' is
    the plain and accurate rendering.
- source_word: εἰσήνεγκαν
  chosen: they brought ... into
  alternatives:
  - they carried ... into
  - they brought in
  lexicon: LSJ
  rationale: The compound verb with εἰς τὸν ναόν naturally conveys movement into the
    sanctuary area. 'Brought ... into' captures both the action and destination clearly.
- source_word: τὴν λυχνίαν
  chosen: the lampstand
  alternatives:
  - the lamp
  lexicon: LSJ
  rationale: In tabernacle/temple furnishing language, λυχνία denotes the lampstand
    rather than a generic lamp. This is the standard cultic referent.
- source_word: τὸ θυσιαστήριον τῶν ὁλοκαυτωμάτων
  chosen: the altar of burnt offerings
  alternatives:
  - the altar of whole burnt offerings
  - the altar for burnt offerings
  lexicon: LSJ
  rationale: The genitive specifies the altar associated with burnt offerings. 'Altar
    of burnt offerings' is idiomatic English and matches established sacrificial terminology.
- source_word: θυμιαμάτων
  chosen: of incense
  alternatives:
  - for incense
  - of incense offerings
  lexicon: LSJ
  rationale: The Greek coordinates two genitives after θυσιαστήριον. In context this
    refers to the incense altar. Rendering the second genitive as 'of incense' keeps
    close to the Greek while remaining intelligible.
- source_word: τὴν τράπεζαν
  chosen: the table
  alternatives:
  - the table of the bread of the Presence
  lexicon: LSJ
  rationale: The Greek here simply says 'the table.' While the referent is the temple
    table, expanding it in the main text would import words not present in this verse.
- source_word: εἰς τὸν ναόν
  chosen: into the temple
  alternatives:
  - into the sanctuary
  lexicon: LSJ
  rationale: ναός here refers to the temple sanctuary/building rather than the broader
    temple precincts. 'Temple' is acceptable in context and more accessible, while
    the cultic furnishings make the inner sacred space clear.
