translation:
  text: And they went out from the camp for battle, and those with Judas sounded the
    trumpets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those with Judas blew the trumpets.' The Greek phrase identifies Judas's
      accompanying force; English may render it more or less explicitly as 'men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθαν
  chosen: went out
  alternatives:
  - came out
  - marched out
  lexicon: BDAG
  rationale: The aorist verb straightforwardly denotes movement out from a place.
    'Went out' is the most direct rendering; 'marched out' would add military color
    not explicit in the verb itself.
- source_word: παρεμβολῆς
  chosen: camp
  alternatives:
  - encampment
  lexicon: LEH
  rationale: In military context παρεμβολή commonly refers to a camp or encampment.
    'Camp' is natural modern English and preserves the military setting.
- source_word: εἰς πόλεμον
  chosen: for battle
  alternatives:
  - to battle
  - for war
  lexicon: LEH
  rationale: The phrase expresses purpose or engagement in combat. 'For battle' is
    idiomatic and suitably concise; 'for war' sounds too broad for the immediate clash.
- source_word: ἐσάλπισαν
  chosen: sounded the trumpets
  alternatives:
  - blew the trumpets
  - blew the trumpet
  lexicon: BDAG
  rationale: The verb means to sound a trumpet. English idiom normally supplies the
    instrument, and the plural is appropriate given the likely collective military
    signal and the plural subject.
- source_word: οἱ παρὰ Ἰούδου
  chosen: the men with Judas
  alternatives:
  - those with Judas
  - Judas's men
  lexicon: BDAG
  rationale: The phrase identifies the group associated with Judas. 'The men with
    Judas' is clear and natural. 'Judas's men' is possible but slightly more interpretive,
    implying formal command structure beyond the phrase itself.
- source_word: Ἰούδου
  chosen: Judas
  alternatives:
  - Judah
  lexicon: Greek proper name tradition
  rationale: In 1 Maccabees this refers to Judas Maccabeus; standard English transliteration
    is 'Judas.'
