translation:
  text: And they adorned the front of the temple with golden crowns and small shields,
    and they renewed the gates and the side chambers, and they fitted them with doors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'golden wreaths' or 'golden garlands'; the Greek στεφάνοις can denote
      ornamental wreaths as well as crowns.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεκόσμησαν
  chosen: adorned
  alternatives:
  - decorated
  - ornamented
  lexicon: LSJ
  rationale: The verb denotes furnishing or decorating with ornament. 'Adorned' is
    natural English and preserves the sense of beautifying rather than merely arranging.
- source_word: τὸ κατὰ πρόσωπον τοῦ ναοῦ
  chosen: the front of the temple
  alternatives:
  - the facade of the temple
  - the part before the temple
  lexicon: LSJ
  rationale: The phrase literally refers to what is before or facing the temple. 'The
    front of the temple' gives clear idiomatic English without overtechnical architectural
    language.
- source_word: στεφάνοις χρυσοῖς
  chosen: golden crowns
  alternatives:
  - golden wreaths
  - golden garlands
  lexicon: LSJ
  rationale: στέφανος can mean a crown or wreath. In a temple-decoration context,
    ornamental wreaths/garlands are possible, but 'crowns' is the more direct lexical
    rendering and remains understandable. The alternative is preserved in a footnote
    because the decorative sense may be intended.
- source_word: ἀσπιδίσκαις
  chosen: small shields
  alternatives:
  - shieldlets
  - bucklers
  lexicon: LSJ
  rationale: The diminutive form indicates small shields used as decorative or votive
    items. 'Small shields' is clear modern English; 'bucklers' is possible but less
    accessible.
- source_word: ἐνεκαίνισαν
  chosen: renewed
  alternatives:
  - rededicated
  - restored
  lexicon: LSJ
  rationale: Although the verb can carry the sense of dedicating or inaugurating anew,
    here its objects are 'the gates and the side chambers,' which favors the sense
    of renewing/restoring them rather than ceremonially rededicating architectural
    elements.
- source_word: πύλας
  chosen: gates
  alternatives:
  - doors
  - gateways
  lexicon: LSJ
  rationale: πύλαι normally refers to gates rather than ordinary doors. Since doors
    are mentioned explicitly in the next clause, 'gates' preserves the distinction.
- source_word: παστοφόρια
  chosen: side chambers
  alternatives:
  - chambers
  - storerooms
  - priestly rooms
  lexicon: LSJ
  rationale: The term refers to rooms attached to the sanctuary complex. 'Side chambers'
    best captures attached temple rooms without overcommitting to a narrower function
    such as storage or priestly use.
- source_word: ἐθύρωσαν
  chosen: fitted with doors
  alternatives:
  - provided with doors
  - doorred
  lexicon: LSJ
  rationale: The verb means to furnish with doors. 'Fitted with doors' is idiomatic
    and accurately conveys the action.
- source_word: αὐτά
  chosen: them
  alternatives:
  - those things
  lexicon: LSJ
  rationale: The pronoun most naturally refers back to the gates and side chambers
    collectively. 'Them' is the straightforward English rendering.
