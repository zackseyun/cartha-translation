translation:
  text: And Judas and the force turned back from pursuing them,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπέστρεψεν
  chosen: turned back
  alternatives:
  - returned
  - turned around
  lexicon: BDAG
  rationale: The aorist of ἐπιστρέφω here denotes a change of direction in the course
    of action. 'Turned back' fits the military movement context better than the more
    neutral 'returned' and preserves the concrete sense.
- source_word: ἡ δύναμις
  chosen: the force
  alternatives:
  - the army
  - the troops
  lexicon: LSJ
  rationale: δύναμις in military narrative can denote an armed force or body of troops.
    'The force' stays close to the Greek while remaining natural English; 'army' may
    sound more formalized than the context requires.
- source_word: ἀπὸ τοῦ διώκειν
  chosen: from pursuing
  alternatives:
  - from the pursuit
  - from continuing to pursue
  lexicon: BDAG
  rationale: The construction ἀπό + articular infinitive expresses cessation or withdrawal
    from an activity. 'From pursuing' renders the idiom clearly and compactly in English.
- source_word: ὀπίσθεν αὐτῶν
  chosen: after them
  alternatives:
  - behind them
  lexicon: LSJ
  rationale: In context of pursuit, ὀπίσθεν αὐτῶν means following after the fleeing
    enemy. 'After them' is the most idiomatic English in this military setting, while
    'behind them' is more spatially literal but less natural.
