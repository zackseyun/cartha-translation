lexical_decisions:
- source_word: παρεμβολὴν
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: LSJ
  rationale: The term denotes a military camp or encampment. 'Camp' is concise and
    natural in English while preserving the military sense.
- source_word: ἐθνῶν
  chosen: of the nations
  alternatives:
  - of the Gentiles
  - of the foreigners
  lexicon: LSJ
  rationale: In 1 Maccabees this commonly refers to non-Jewish peoples. 'Of the nations'
    stays close to the Greek and avoids importing later NT-specific connotations of
    'Gentiles,' though that sense is related.
- source_word: ἰσχυρὰν
  chosen: strong
  alternatives:
  - mighty
  - powerful
  lexicon: LSJ
  rationale: A straightforward rendering that fits a fortified or formidable military
    camp without overstating the nuance.
- source_word: τεθωρακισμένην
  chosen: armored
  alternatives:
  - equipped with armor
  - heavily armed
  lexicon: LSJ
  rationale: The perfect participle indicates being furnished with armor. 'Armored'
    is compact and idiomatic for a military force or camp prepared for battle.
- source_word: ἵππον
  chosen: cavalry
  alternatives:
  - horsemen
  - horse troops
  - horses
  lexicon: LSJ
  rationale: Although literally related to 'horse,' in this military context with
    the singular used collectively, it refers to mounted forces. 'Cavalry' best conveys
    the collective military sense in modern English.
- source_word: κυκλοῦσαν
  chosen: surrounding
  alternatives:
  - circling around
  - encircling
  lexicon: LSJ
  rationale: The participle describes the cavalry positioned around the camp. 'Surrounding'
    is clear and natural.
- source_word: διδακτοὶ πολέμου
  chosen: trained for war
  alternatives:
  - trained in war
  - experienced in battle
  lexicon: LSJ
  rationale: The phrase means instructed or trained in warfare. 'Trained for war'
    is idiomatic and preserves the military training emphasis.
