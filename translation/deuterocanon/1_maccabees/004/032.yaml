theological_decisions:
- issue: Imprecatory prayer language
  chosen_reading: Retain the direct petitions for the enemies' cowardice, collapse,
    and shaking without softening them.
  alternative_readings:
  - Soften into generalized defeat language
  rationale: The Greek is a prayer asking God to act against hostile forces. The translation
    preserves that theological and rhetorical force rather than muting it for modern
    sensibilities.
