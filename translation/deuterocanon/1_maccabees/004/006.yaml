translation:
  text: And at daybreak Judas appeared in the plain with three thousand men; but they
    did not have armor and swords as they wished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they did not have armor and swords as they wished.' The Greek reads
      'armor and a sword,' with the singular 'sword' possibly used collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅμα ἡμέρᾳ
  chosen: at daybreak
  alternatives:
  - with the day
  - at the same time as day came
  - when day came
  lexicon: LSJ
  rationale: The idiom denotes the coming of daylight. 'At daybreak' gives natural
    English while preserving the temporal force more clearly than a wooden 'with day.'
- source_word: ὤφθη
  chosen: appeared
  alternatives:
  - was seen
  - came into view
  lexicon: LSJ
  rationale: The passive form literally means 'was seen,' but in context it functions
    idiomatically to indicate Judas' visible arrival on the field. 'Appeared' is concise
    and natural without overstating the action.
- source_word: ἐν τῷ πεδίῳ
  chosen: in the plain
  alternatives:
  - in the field
  - on the plain
  lexicon: LSJ
  rationale: πεδίον commonly refers to a plain or open level area. 'In the plain'
    fits the military setting better than the more agricultural-sounding 'field.'
- source_word: ἐν τρισχιλίοις ἀνδράσιν
  chosen: with three thousand men
  alternatives:
  - among three thousand men
  - in three thousand men
  lexicon: LSJ
  rationale: The preposition here expresses accompaniment or force strength. 'With
    three thousand men' is the natural military sense in English.
- source_word: πλὴν
  chosen: but
  alternatives:
  - except that
  - nevertheless
  - only
  lexicon: LSJ
  rationale: Here πλὴν introduces a limiting contrast to Judas' appearance with his
    men. 'But' communicates the adversative force smoothly.
- source_word: καλύμματα
  chosen: armor
  alternatives:
  - coverings
  - protective gear
  - shields
  lexicon: LSJ
  rationale: The noun literally denotes coverings, but in this martial context it
    refers to protective equipment. 'Armor' best captures the intended military sense
    in readable English. 'Shields' is too specific for the plural noun by itself.
- source_word: μάχαιραν
  chosen: a sword
  alternatives:
  - sword
  lexicon: LSJ
  rationale: The singular is retained in translation because the Greek has singular
    μάχαιραν. The phrase likely uses singular collectively or distributively, but
    preserving the singular keeps closer to the source.
- source_word: καθὼς ἠβούλοντο
  chosen: as they wished
  alternatives:
  - as they wanted
  - as they desired
  lexicon: LSJ
  rationale: This clause expresses that their equipment fell short of what they desired.
    'As they wished' is idiomatic and sufficiently formal for the narrative tone.
