translation:
  text: so as to fall upon the camp of the Jews and strike them suddenly; and the
    men of the citadel were his guides.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sons of the Akra were his guides.' 'Akra' is the Greek name often
      used for the fortified citadel in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: so as to
  alternatives:
  - with the result that
  - so that
  lexicon: BDAG
  rationale: Here ὥστε introduces purpose/intended result in connection with the preceding
    movement of the army. 'So as to' preserves that infinitival construction naturally
    in English without overstating consequence.
- source_word: ἐπιβαλεῖν ἐπὶ
  chosen: fall upon
  alternatives:
  - attack
  - launch an assault on
  - come against
  lexicon: LSJ
  rationale: The phrase conveys a forceful movement against a target. 'Fall upon'
    preserves the vivid military sense better than the flatter 'attack,' while remaining
    idiomatic.
- source_word: παρεμβολή
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: LEH
  rationale: In this military context παρεμβολή refers to the camp/encampment. 'Camp'
    is concise and natural English.
- source_word: πατάξαι
  chosen: strike
  alternatives:
  - smite
  - attack
  - kill
  lexicon: BDAG
  rationale: πατάσσω can mean strike/smite, sometimes with lethal force depending
    on context. 'Strike' preserves the direct physical assault without importing a
    stronger result such as 'kill' that the verb itself does not require here.
- source_word: ἄφνω
  chosen: suddenly
  alternatives:
  - by surprise
  - unexpectedly
  lexicon: BDAG
  rationale: The adverb denotes suddenness. 'Suddenly' is the most direct rendering;
    the ambush nuance is already conveyed by the larger clause, so no expansion is
    needed.
- source_word: οἱ υἱοὶ τῆς ἄκρας
  chosen: the sons of the citadel
  alternatives:
  - the men of the citadel
  - the garrison of the citadel
  lexicon: LSJ
  rationale: Literally 'sons of the Akra/citadel.' Because the phrase is ethnogeographic/political
    rather than biological, 'men of the citadel' is possible; however, the project
    prefers transparency to the source, and 'sons of the citadel' keeps the formal
    shape while remaining understandable. 'Citadel' renders ἄκρα as the fortified
    stronghold in Jerusalem.
- source_word: ἄκρα
  chosen: citadel
  alternatives:
  - Akra
  - fortress
  lexicon: LSJ
  rationale: As a common noun, ἄκρα means citadel/fortress. Since the verse does not
    require preserving it as a place-name transliteration, 'citadel' communicates
    the sense directly. The transliterated alternative is preserved in a footnote
    because this likely refers to the well-known Jerusalem Akra.
- source_word: ὁδηγοί
  chosen: guides
  alternatives:
  - leaders
  - scouts
  lexicon: BDAG
  rationale: The word denotes those who lead the way. 'Guides' best fits the military
    setting of directing an attack route.
