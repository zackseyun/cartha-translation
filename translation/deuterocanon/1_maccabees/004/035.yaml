translation:
  text: But when Lysias saw the rout that had happened to his own force, and the boldness
    that had arisen in Judas’s men, and how they were ready either to live or to die
    nobly, he departed for Antioch, and recruited foreign troops, intending, after
    becoming stronger in number, to come again into Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the boldness of Judas'; the sense in context is the courage
      of Judas's side or forces, since the next clause uses the plural 'they were
      ready.'
    reason: lexical_alternative
  - marker: b
    text: Or 'recruited mercenaries.' The Greek verb emphasizes enlisting foreigners;
      whether they are specifically mercenaries is an interpretive refinement.
    reason: alternative_reading
lexical_decisions:
- source_word: τροπή
  chosen: rout
  alternatives:
  - turning
  - defeat
  lexicon: LSJ
  rationale: In military context with συντάξεως ('formation/array'), τροπή denotes
    a rout or decisive turning of the battle. 'Rout' captures the battlefield sense
    more precisely than the more generic 'defeat'.
- source_word: σύνταξις
  chosen: formation
  alternatives:
  - battle line
  - array
  lexicon: LSJ
  rationale: Refers to the ordered arrangement of troops. 'Formation' is natural modern
    English and preserves the military nuance.
- source_word: θάρσος
  chosen: boldness
  alternatives:
  - courage
  - confidence
  lexicon: LSJ
  rationale: The noun denotes courage or daring. 'Boldness' fits the context of renewed
    resolve after victory and pairs well with the following readiness to live or die
    nobly.
- source_word: τῆς δὲ Ἰούδα τὸ γεγενημένον θάρσος
  chosen: the boldness that had arisen in Judas’s men
  alternatives:
  - the boldness of Judas
  - the courage shown by Judas
  lexicon: LSJ
  rationale: The Greek is somewhat compressed. A strictly literal 'the boldness of
    Judas' could be read as Judas personally, but the following plural 'they were
    ready' shows the courage belongs to Judas's side. Supplying 'men' makes the referent
    clear in English without overparaphrasing.
- source_word: ἕτοιμοι εἶεν ἢ ζῆν ἢ τεθνάναι γενναίως
  chosen: they were ready either to live or to die nobly
  alternatives:
  - they were ready either to survive or to die bravely
  - they were prepared either to live or to die courageously
  lexicon: LSJ
  rationale: The infinitives are balanced and should be preserved. γενναίως carries
    the sense of nobly/bravely; 'nobly' reflects the honor-laden register of the Greek.
- source_word: ἀπῆρεν
  chosen: he departed
  alternatives:
  - he withdrew
  - he went away
  lexicon: LSJ
  rationale: A straightforward narrative verb of departure. 'Departed' is neutral
    and fits the move to Antioch.
- source_word: ἐξενολόγει
  chosen: recruited foreign troops
  alternatives:
  - enlisted mercenaries
  - raised a foreign force
  lexicon: LSJ
  rationale: The verb literally involves levying or collecting foreigners. In this
    military context it likely means recruiting non-native troops. 'Mercenaries' is
    possible, but the Greek itself emphasizes foreignness more directly than pay-status.
- source_word: πλεοναστὸν πάλιν γενηθέντα
  chosen: after becoming stronger in number
  alternatives:
  - after becoming more numerous again
  - after increasing his forces again
  lexicon: LSJ
  rationale: The phrase points to numerical increase before returning. This rendering
    keeps the comparative force while making the implied military sense explicit enough
    for English.
- source_word: παραγίνεσθαι εἰς τὴν Ἰουδαίαν
  chosen: to come again into Judea
  alternatives:
  - to arrive again in Judea
  - to return to Judea
  lexicon: LSJ
  rationale: The infinitive expresses intended future arrival. 'Come again into Judea'
    preserves the directional force and the sense of renewed campaign.
