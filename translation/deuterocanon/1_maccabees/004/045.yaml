translation:
  text: And it seemed to them a good plan to tear it down, lest it become a reproach
    to them because the nations had defiled it; so they tore down the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Gentiles had defiled it.' The Greek τὰ ἔθνη can be rendered 'the
      nations' or, in this Jewish context, 'the Gentiles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσεν αὐτοῖς βουλὴ ἀγαθή
  chosen: it seemed to them a good plan
  alternatives:
  - a good counsel came to them
  - a good decision occurred to them
  lexicon: LSJ
  rationale: The idiom literally speaks of a 'good counsel' falling to them, but in
    English this is best rendered idiomatically as an idea or plan seeming good to
    them. 'Plan' fits the immediate deliberative context.
- source_word: καθελεῖν
  chosen: to tear down
  alternatives:
  - to pull down
  - to demolish
  lexicon: LSJ
  rationale: The infinitive refers to dismantling the altar. 'Tear down' is natural
    modern English and preserves the physical force of the verb without overtechnical
    wording.
- source_word: αὐτό
  chosen: it
  alternatives:
  - the altar
  lexicon: LSJ
  rationale: The pronoun refers back to the altar in context from the surrounding
    passage. English can keep the pronoun in the first clause and then make the referent
    explicit in the final clause.
- source_word: μή ποτε γένηται αὐτοῖς εἰς ὄνειδος
  chosen: lest it become a reproach to them
  alternatives:
  - lest it become a disgrace to them
  - so that it might not be for them a shame
  lexicon: LSJ
  rationale: ὄνειδος commonly denotes reproach, disgrace, or shame. 'Reproach' preserves
    the public-honor dimension and matches biblical register without becoming archaic.
- source_word: ἐμίαναν
  chosen: had defiled
  alternatives:
  - had polluted
  - had profaned
  lexicon: LSJ
  rationale: μιαίνω often means to defile or stain, especially in cultic contexts.
    'Defiled' best captures ritual contamination here. 'Profaned' is possible but
    shifts toward violation of holiness rather than impurity.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the heathen
  lexicon: LSJ
  rationale: ἔθνη here refers to the non-Jewish peoples who had polluted the altar.
    'The nations' is the most direct and least interpretively loaded rendering; 'Gentiles'
    is possible but more tradition-bound.
- source_word: καθεῖλον τὸ θυσιαστήριον
  chosen: they tore down the altar
  alternatives:
  - they pulled down the altar
  - they demolished the altar
  lexicon: LSJ
  rationale: θυσιαστήριον is 'altar.' Repeating 'tore down' maintains lexical consistency
    with καθελεῖν and reflects the completed action stated by the aorist.
