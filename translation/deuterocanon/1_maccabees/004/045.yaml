theological_decisions:
- issue: Cultic impurity language for the altar
  chosen_reading: defiled
  alternative_readings:
  - profaned
  - polluted
  rationale: Because the context concerns an altar contaminated by pagan use, the
    translation preserves ritual-impurity language rather than flattening it into
    a merely emotional or symbolic disgrace. This reflects the source text's cultic
    concern without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 5
