translation:
  text: And they stationed a force there to guard it, and they fortified it to guard
    Bethsura, so that the people might have a stronghold facing Idumea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they ordered a force there to guard it.' The Greek verb can mean 'ordered/appointed,'
      but here likely implies assigning troops to a post.
    reason: lexical_alternative
  - marker: b
    text: Bethsura is a fortified site south of Jerusalem, strategically positioned
      toward Idumea.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπέταξαν
  chosen: they stationed
  alternatives:
  - they ordered
  - they appointed
  lexicon: LSJ
  rationale: Although the verb can mean 'command' or 'order,' in this construction
    with δύναμιν and the infinitive τηρεῖν, the sense is effectively to assign or
    station a military force for guard duty. 'Stationed' brings out the military action
    in natural English.
- source_word: δύναμιν
  chosen: a force
  alternatives:
  - troops
  - an armed force
  lexicon: LSJ
  rationale: The term denotes military strength or a body of troops. 'A force' is
    concise and idiomatic, preserving the military sense without over-specifying size.
- source_word: τηρεῖν
  chosen: to guard
  alternatives:
  - to keep
  - to watch over
  lexicon: LSJ
  rationale: In this military context, τηρεῖν refers to guarding or keeping watch
    over a place. 'Guard' is the clearest contextual rendering in both occurrences.
- source_word: ὠχύρωσαν
  chosen: they fortified
  alternatives:
  - they made secure
  - they strengthened
  lexicon: LSJ
  rationale: The verb refers to making a place strong or fortified. 'Fortified' preserves
    the military/defensive nuance.
- source_word: τὴν Βαιθσουρά
  chosen: Bethsura
  alternatives:
  - Beth-zur
  lexicon: LSJ
  rationale: This is a place name and is therefore transliterated rather than translated,
    following project policy. 'Bethsura' closely reflects the Greek form Βαιθσουρά.
- source_word: τοῦ ἔχειν
  chosen: so that ... might have
  alternatives:
  - in order that ... may have
  - for ... to have
  lexicon: LSJ
  rationale: The articular infinitive with τοῦ expresses purpose. 'So that the people
    might have' gives clear English purpose syntax.
- source_word: ὀχύρωμα
  chosen: a stronghold
  alternatives:
  - a fortress
  - a fortified place
  lexicon: LSJ
  rationale: The noun denotes a defensive fortification or strong place. 'Stronghold'
    is natural English and fits the strategic sense of the verse.
- source_word: κατὰ πρόσωπον τῆς Ἰδουμαίας
  chosen: facing Idumea
  alternatives:
  - opposite Idumea
  - toward Idumea
  lexicon: LSJ
  rationale: The phrase literally means 'before the face of Idumea' and idiomatically
    indicates position opposite or facing that region. 'Facing Idumea' is clear and
    readable while preserving the spatial sense.
