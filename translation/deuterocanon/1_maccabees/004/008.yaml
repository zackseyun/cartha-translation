lexical_decisions:
- source_word: Μὴ φοβεῖσθε
  chosen: Do not fear
  alternatives:
  - Do not be afraid of
  lexicon: BDAG
  rationale: Present middle/passive imperative of φοβέομαι gives a direct prohibition
    against fearing. 'Do not fear' is concise, natural English and preserves the force
    of the command.
- source_word: τὸ πλῆθος αὐτῶν
  chosen: their multitude
  alternatives:
  - their great number
  - their crowd
  lexicon: LSJ
  rationale: πλῆθος denotes a large number or multitude. 'Their multitude' stays close
    to the Greek while remaining understandable; it emphasizes numerical superiority
    rather than a specific formation like 'crowd.'
- source_word: τὸ ὅρμημα αὐτῶν
  chosen: their attack
  alternatives:
  - their rush
  - their assault
  - their onset
  lexicon: LSJ
  rationale: ὅρμημα can denote a violent rush, onset, or attack. 'Attack' is the clearest
    modern English rendering in this military context, while 'rush' or 'onset' are
    more literal but less natural.
- source_word: μὴ δειλωθῆτε
  chosen: do not be terrified
  alternatives:
  - do not lose courage
  - do not be cowardly
  - do not be intimidated
  lexicon: BDAG
  rationale: The passive/aorist form from δειλόω conveys becoming fearful or losing
    heart. 'Do not be terrified' matches the emotional force in context and pairs
    well with the preceding prohibition against fear, while avoiding the moralizing
    nuance of 'be cowardly.'
- source_word: τοῖς ἀνδράσιν τοῖς μετʼ αὐτοῦ
  chosen: to the men with him
  alternatives:
  - to his men
  - to the men who were with him
  lexicon: BDAG
  rationale: ἀνδράσιν is specifically masculine, and the context is a military force,
    so 'men' is gender-accurate. 'With him' is a straightforward rendering of τοῖς
    μετʼ αὐτοῦ.
