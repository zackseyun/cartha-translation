translation:
  text: And Judas said to the men with him, “Do not fear their multitude, and do not
    be terrified by their attack.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their rush' or 'their onset' for 'their attack' (τὸ ὅρμημα αὐτῶν).
