theological_decisions:
- issue: Implicit subject of the verbs after the conditional clause
  chosen_reading: Render the subject as 'he,' implicitly referring to God
  alternative_readings:
  - leave the subject fully implicit in English
  rationale: The appeal is directed 'to heaven,' and the following singular verbs
    naturally refer to God. English requires an explicit subject for clarity.
  doctrine_reference: Translation philosophy §1, §6
- issue: Meaning of εἰ θελήσει ἡμᾶς
  chosen_reading: Retain the more literal personal-object sense ('desire us') rather
    than smoothing fully to 'favor us' in the main text
  alternative_readings:
  - if he favors us
  - if he is pleased with us
  rationale: The Greek wording is somewhat marked. Preserving that markedness in the
    draft keeps the translation auditable, while alternatives are documented for possible
    revision.
  doctrine_reference: Translation philosophy §1, §5
