translation:
  text: Strike them down by the sword of those who love you, and let all who know
    your name praise you with hymns.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατάβαλε
  chosen: Strike ... down
  alternatives:
  - bring down
  - cast down
  - overthrow
  lexicon: LSJ
  rationale: The aorist imperative calls for a forceful petition in prayer. In this
    military context, 'strike down' conveys decisive defeat more naturally in English
    than the more literal but less idiomatic 'cast down' or 'bring down'.
- source_word: ῥομφαίᾳ
  chosen: with the sword
  alternatives:
  - by the sword
  - with a blade
  lexicon: LSJ
  rationale: ῥομφαία denotes a sword, often emphasizing a large or deadly weapon.
    'With the sword' is clear, idiomatic, and preserves the instrumental sense of
    the dative.
- source_word: ἀγαπώντων σε
  chosen: of those who love you
  alternatives:
  - of your lovers
  - of the ones loving you
  lexicon: LSJ
  rationale: The present participle with object σε identifies the agents associated
    with the sword. 'Those who love you' is the natural English rendering and preserves
    the covenantal/religious sense of devotion without awkward literalism.
- source_word: αἰνεσάτωσάν
  chosen: let ... praise
  alternatives:
  - let ... extol
  - let ... commend
  lexicon: LSJ
  rationale: The imperative expresses a wish or exhortation directed toward all who
    know God's name. 'Praise' is the standard and most transparent rendering in worship
    contexts.
- source_word: εἰδότες τὸ ὄνομά σου
  chosen: who know your name
  alternatives:
  - who have known your name
  - who acknowledge your name
  lexicon: LSJ
  rationale: The perfect participle εἰδότες functions as a present-state expression.
    'Know your name' preserves the biblical sense of relational recognition and reverence,
    not mere awareness.
- source_word: ἐν ὕμνοις
  chosen: with hymns
  alternatives:
  - in hymns
  - with songs of praise
  lexicon: LSJ
  rationale: The phrase indicates the manner or accompaniment of praise. 'With hymns'
    is idiomatic in English and stays close to the Greek without expanding to a paraphrase.
