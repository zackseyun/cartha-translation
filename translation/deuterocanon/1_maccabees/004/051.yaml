- issue: Cultic terminology for sanctuary furnishings
  chosen_reading: Use ordinary English terms ('table,' 'bread,' 'curtains') in the
    main text without importing later traditional labels.
  alternative_readings:
  - '''table of the bread of the Presence'''
  - '''veils'' for καταπετάσματα'
  rationale: The Greek wording in this verse is not expanded with technical descriptors,
    so the translation avoids over-specifying the ritual objects while preserving
    the temple-restoration setting.
