theological_decisions:
- issue: Rendering of τὰ ἔθνη in a deuterocanonical historical context
  chosen_reading: the nations
  alternative_readings:
  - the Gentiles
  rationale: The term denotes non-Jewish peoples hostile to Judea in context. 'The
    nations' is closer to the Greek's basic sense and avoids importing later Christian
    technical usage into this historical narrative. The alternative remains viable
    and is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    preserve significant alternatives in footnotes where useful.'
