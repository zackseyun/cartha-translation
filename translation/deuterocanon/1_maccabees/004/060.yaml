translation:
  text: And at that time they built up Mount Zion with high walls all around and strong
    towers, lest the nations come and trample it, as they had done before.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Gentiles come and trample it.' The Greek τὰ ἔθνη can mean 'the nations'
      or 'the Gentiles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠκοδόμησαν
  chosen: they fortified
  alternatives:
  - they built
  - they rebuilt
  lexicon: LSJ
  rationale: Although the verb literally means 'they built,' the direct object and
    following apposition ('Mount Zion, high walls all around and strong towers') show
    that the sense here is construction for defense. 'Fortified' captures the military
    purpose in natural English without overparaphrasing.
- source_word: ἐν τῷ καιρῷ ἐκείνῳ
  chosen: at that time
  alternatives:
  - in that season
  - then
  lexicon: LSJ
  rationale: A standard temporal expression. 'At that time' is clear, idiomatic, and
    preserves the narrative setting.
- source_word: τὸ ὄρος Σιὼν
  chosen: Mount Zion
  alternatives:
  - the hill of Zion
  - the mountain Zion
  lexicon: LSJ
  rationale: Conventional and accurate rendering of the place name phrase. 'Mount
    Zion' is standard English for ὄρος + Σιὼν.
- source_word: κυκλόθεν
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: LSJ
  rationale: This adverb modifies the defensive structures, indicating encirclement.
    'All around' is natural modern English and preserves the spatial force.
- source_word: τείχη ὑψηλά
  chosen: high walls
  alternatives:
  - lofty walls
  - tall walls
  lexicon: LSJ
  rationale: A straightforward rendering of the noun-adjective pair. 'High walls'
    is idiomatic in English for fortification language.
- source_word: πύργους ἰσχυρούς
  chosen: strong towers
  alternatives:
  - mighty towers
  - fortified towers
  lexicon: LSJ
  rationale: ἰσχυρούς emphasizes strength rather than size. 'Strong towers' preserves
    that emphasis without adding interpretive detail.
- source_word: μή ποτε
  chosen: lest
  alternatives:
  - so that not
  - for fear that
  lexicon: LSJ
  rationale: This introduces a clause of precaution. 'Lest' is concise and accurate,
    and remains understandable in context.
- source_word: παραγενηθέντα τὰ ἔθνη
  chosen: the nations come
  alternatives:
  - the Gentiles come
  - the nations having arrived
  lexicon: LSJ
  rationale: τὰ ἔθνη can mean 'nations' or 'Gentiles.' In 1 Maccabees, the reference
    is to surrounding non-Jewish peoples; 'nations' is the more transparent and less
    theologically loaded English choice, while still fitting the historical sense.
    The participle is naturally rendered with a finite verb in English.
- source_word: καταπατήσωσιν
  chosen: trample it
  alternatives:
  - trample them
  - overrun it
  lexicon: LSJ
  rationale: The verb means to tread down or trample. The object αὐτά is formally
    plural, likely referring to the fortifications or the site collectively; English
    idiom works better with singular 'it' referring back to Mount Zion as the fortified
    place. 'Overrun' is possible but less literal.
- source_word: αὐτά
  chosen: it
  alternatives:
  - them
  lexicon: LSJ
  rationale: Though plural in Greek, the pronoun likely points to the fortified complex
    just described. English can naturally use singular 'it' for the site as a whole.
    This avoids awkwardness while preserving the sense.
- source_word: ὡς ἐποίησαν τὸ πρότερον
  chosen: as they had done before
  alternatives:
  - as they did formerly
  - as they had done previously
  lexicon: LSJ
  rationale: This comparative clause points back to earlier desecration or oppression.
    'As they had done before' is idiomatic and preserves the retrospective force.
