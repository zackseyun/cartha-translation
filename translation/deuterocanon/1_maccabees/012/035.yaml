  text: Καὶ ἐπέστρεψεν Ἰωναθὰν καὶ ἐξεκκλησίασεν τοὺς πρεσβυτέρους τοῦ λαοῦ, καὶ ἐβουλεύσατο
    μετ’ αὐτῶν τοῦ οἰκοδομῆσαι ὀχυρώματα ἐν τῇ Ἰουδαίᾳ,
