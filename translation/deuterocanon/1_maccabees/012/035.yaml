lexical_decisions:
- source_word: ἐπέστρεψεν
  chosen: returned
  alternatives:
  - turned back
  - came back
  lexicon: LSJ
  rationale: The aorist of ἐπιστρέφω here denotes physical return to a prior location,
    not repentance or metaphorical turning. 'Returned' is the most natural modern
    English rendering.
- source_word: ἐξεκκλησίασεν
  chosen: assembled
  alternatives:
  - called together
  - convened
  lexicon: LSJ
  rationale: The verb means to gather or convene an assembly. 'Assembled' keeps the
    formal public sense without sounding overly technical; the object is the elders
    rather than an abstract assembly.
- source_word: πρεσβυτέρους
  chosen: elders
  alternatives:
  - older men
  lexicon: LSJ
  rationale: In this political/community context the term refers to recognized leaders,
    not merely men advanced in age. 'Elders' best captures the institutional sense.
- source_word: ἐβουλεύσατο μετ’ αὐτῶν
  chosen: he took counsel with them
  alternatives:
  - he consulted with them
  - he deliberated with them
  lexicon: LSJ
  rationale: The middle voice conveys deliberation/consultation. 'Took counsel with
    them' preserves the formal advisory nuance better than the flatter 'consulted
    with them.'
- source_word: οἰκοδομῆσαι
  chosen: to build
  alternatives:
  - to construct
  lexicon: LSJ
  rationale: The infinitive straightforwardly expresses the purpose/content of the
    counsel. 'Build' is idiomatic and sufficiently precise.
- source_word: ὀχυρώματα
  chosen: fortresses
  alternatives:
  - strongholds
  - fortifications
  lexicon: LSJ
  rationale: The noun denotes fortified defensive structures. 'Fortresses' communicates
    actual fortified sites; 'fortifications' is possible but more abstract, while
    'strongholds' can sound metaphorical in English.
- source_word: ἐν τῇ Ἰουδαίᾳ
  chosen: in Judea
  alternatives:
  - in Judaea
  lexicon: LSJ
  rationale: The phrase indicates the region where the fortresses were to be built.
    'Judea' is the standard modern English spelling.
