translation:
  text: And they gave them letters to the people in each place, so that they might
    send them on to the land of Judah in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'place by place'; the phrase indicates letters addressed to local people
      or authorities along the route.
    reason: lexical_alternative
  - marker: b
    text: Or 'escort them onward'; the Greek verb can include the sense of accompanying
      travelers and helping them on their way.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκαν
  chosen: they gave
  alternatives:
  - they provided
  - they handed over
  lexicon: LSJ
  rationale: A straightforward past-tense rendering of δίδωμι. 'Gave' is the plain
    sense and fits the narrative style.
- source_word: ἐπιστολὰς
  chosen: letters
  alternatives:
  - written letters
  - documents
  lexicon: LSJ
  rationale: ἐπιστολή commonly means a letter or written communication. 'Letters'
    is natural English and sufficiently specific.
- source_word: αὐτοῖς ... πρὸς αὐτοὺς
  chosen: them ... to the people there
  alternatives:
  - them ... to them
  - them ... concerning them
  lexicon: LSJ
  rationale: 'The Greek uses pronouns in a compressed way: letters were given to Jonathan''s
    party, directed to those at each place along the route. Rendering the second pronoun
    woodenly as ''to them'' would be unclear in English, so ''to the people there''
    makes the referent explicit without adding new content.'
- source_word: κατὰ τόπον
  chosen: to the people there
  alternatives:
  - for each place
  - place by place
  - to every locality
  lexicon: LSJ
  rationale: The phrase means 'according to place' or 'place by place,' indicating
    local destinations along the journey. In idiomatic English within this sentence,
    'to the people there' conveys that letters were addressed to local authorities
    or inhabitants in each place.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: LSJ
  rationale: Introduces purpose. 'So that' is clear modern English and preserves the
    purposive force.
- source_word: προπέμπωσιν
  chosen: they might send them on
  alternatives:
  - they might escort them onward
  - they might conduct them onward
  lexicon: LSJ
  rationale: προπέμπω can mean to send forward, escort, or speed on a journey. 'Send
    them on' captures the travel-assistance sense in accessible English; 'escort'
    is possible but slightly narrower.
- source_word: γῆν Ἰούδα
  chosen: the land of Judah
  alternatives:
  - Judea
  - the territory of Judah
  lexicon: LSJ
  rationale: A more literal rendering of the Greek phrase than 'Judea.' 'Land of Judah'
    preserves the wording of the source while remaining readable.
- source_word: μετʼ εἰρήνης
  chosen: in peace
  alternatives:
  - safely
  - peacefully
  lexicon: LSJ
  rationale: Literally 'with peace.' In travel context it implies safe, unhindered
    passage. 'In peace' preserves the source expression while allowing the safety
    nuance to be inferred.
