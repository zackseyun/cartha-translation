translation:
  text: And the kings around us fought against us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made war on us'; the Greek verb can carry the fuller military sense
      of waging war.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπολέμησαν
  chosen: fought against
  alternatives:
  - made war on
  - fought
  lexicon: BDAG
  rationale: Aorist active of πολεμέω denotes engaging in war or hostilities. 'Fought
    against' is natural English and preserves the adversative force toward ἡμᾶς better
    than the more formal 'made war on.'
- source_word: οἱ βασιλεῖς
  chosen: the kings
  alternatives:
  - kings
  lexicon: BDAG
  rationale: The article is retained in idiomatic English because it refers to a definite
    group already identifiable in context.
- source_word: οἱ κύκλῳ ἡμῶν
  chosen: around us
  alternatives:
  - surrounding us
  - around us on every side
  - neighboring us
  lexicon: BDAG
  rationale: κύκλῳ with a genitive/pronominal complement indicates surrounding location.
    'Around us' is concise, idiomatic, and captures the geopolitical sense of neighboring
    rulers.
