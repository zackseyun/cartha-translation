translation:
  text: And they learned that he had been captured and had perished, and those with
    him; and they encouraged one another and went on in close formation, ready for
    battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they took courage.' The Greek literally says 'they encouraged themselves,'
      a reflexive expression for mutual strengthening.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέγνωσαν
  chosen: they learned
  alternatives:
  - they recognized
  - they came to know
  - they found out
  lexicon: LSJ
  rationale: The verb indicates coming to know or realizing information. In this narrative
    context, 'they learned' is natural modern English and fits receipt of news.
- source_word: συνελήμφθη
  chosen: had been captured
  alternatives:
  - had been seized
  - was taken
  lexicon: LSJ
  rationale: The aorist passive of συλλαμβάνω here most naturally means being seized/captured.
    'Captured' is clear and idiomatic in a military setting.
- source_word: ἀπώλωλεν
  chosen: had perished
  alternatives:
  - had died
  - was lost
  - had been destroyed
  lexicon: LSJ
  rationale: Perfect of ἀπόλλυμι can mean 'has perished' or 'is dead/destroyed.' 'Had
    perished' preserves the gravity without over-specifying the manner of death.
- source_word: οἱ μετʼ αὐτοῦ
  chosen: those with him
  alternatives:
  - his companions
  - the men with him
  lexicon: LSJ
  rationale: The phrase is semantically broad. 'Those with him' stays close to the
    Greek without adding 'men' where the text does not explicitly state it.
- source_word: παρεκάλεσαν ἑαυτούς
  chosen: they encouraged one another
  alternatives:
  - they exhorted themselves
  - they took courage
  lexicon: LSJ
  rationale: The reflexive expression literally means they exhorted/encouraged themselves.
    In idiomatic English for a group, 'they encouraged one another' best conveys mutual
    strengthening.
- source_word: ἐπορεύοντο
  chosen: went on
  alternatives:
  - marched
  - proceeded
  lexicon: LSJ
  rationale: The verb is a common movement verb. 'Went on' is suitably neutral; the
    military nuance is supplied by the following phrase 'ready for battle.'
- source_word: συνεστραμμένοι
  chosen: in close formation
  alternatives:
  - drawn together
  - closed up
  - ranks closed
  lexicon: LSJ
  rationale: The participle suggests being compacted or drawn together. 'In close
    formation' communicates the military sense in readable English.
- source_word: ἕτοιμοι εἰς πόλεμον
  chosen: ready for battle
  alternatives:
  - ready for war
  - prepared for combat
  lexicon: LSJ
  rationale: This is a straightforward military expression. 'Ready for battle' is
    idiomatic and fits the immediate scene better than the broader 'war'.
