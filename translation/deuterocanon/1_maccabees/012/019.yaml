translation:
  text: Therefore we did not wish to trouble you, and the rest of our allies and friends,
    in these wars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to burden you ... in these conflicts.' The Greek verb can mean to trouble,
      annoy, or impose upon; the sense here is likely diplomatic or military burden
      rather than personal irritation.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἠβουλόμεθα
  chosen: we did not wish
  alternatives:
  - we were not willing
  - we did not want
  lexicon: LSJ
  rationale: Imperfect middle of βούλομαι expresses volition/intention in past time.
    'Did not wish' is natural modern English while preserving the deliberate sense
    better than the flatter 'did not want.'
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: LSJ
  rationale: Marks an inferential connection to the preceding context. 'Therefore'
    preserves the logical force more clearly than the looser 'so.'
- source_word: παρενοχλεῖν
  chosen: to trouble
  alternatives:
  - to harass
  - to bother
  - to inconvenience
  lexicon: LSJ
  rationale: The verb denotes causing disturbance or annoyance. In diplomatic/military
    context, 'to trouble' fits idiomatic English and can include burdening allies
    with requests or involvement, without overstating to 'harass.'
- source_word: ὑμῖν
  chosen: you
  lexicon: LSJ
  rationale: Second person plural indirect object, referring to the recipients of
    the letter.
- source_word: τοὺς λοιποὺς
  chosen: the rest
  alternatives:
  - the others
  - our remaining
  lexicon: LSJ
  rationale: λοιπός here distinguishes additional parties beyond the addressees. 'The
    rest' is concise and natural in English.
- source_word: συμμάχους
  chosen: allies
  alternatives:
  - confederates
  - supporters
  lexicon: LSJ
  rationale: Standard political-military term for those joined in alliance. 'Allies'
    is the clearest contemporary equivalent.
- source_word: φίλους
  chosen: friends
  alternatives:
  - friendly states
  - associates
  lexicon: LSJ
  rationale: In Hellenistic diplomatic style φίλοι can have quasi-political nuance,
    but 'friends' remains the direct and sufficiently broad rendering; the political
    coloring is carried by the surrounding context.
- source_word: ἐν τοῖς πολέμοις τούτοις
  chosen: in these wars
  alternatives:
  - in these conflicts
  - with these wars
  lexicon: LSJ
  rationale: ἐν with the dative here indicates the sphere/circumstance in which they
    would be troubled or involved. 'In these wars' is a straightforward rendering
    that preserves the plural πολέμοις.
