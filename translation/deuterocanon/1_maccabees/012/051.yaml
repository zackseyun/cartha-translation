translation:
  text: And when the pursuers saw that it was a matter of life for them, they turned
    back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'that it is concerning life for them,' an idiom meaning
      that their lives were at stake.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  chosen: when ... saw
  alternatives:
  - having seen
  - seeing
  lexicon: LSJ
  rationale: 'The aorist participle is naturally rendered temporally in English here:
    ''when ... saw.'' Although singular in form, it functions with the plural subject
    ''the pursuers'' in the transmitted text, so idiomatic English uses a plural finite
    verb.'
- source_word: οἱ διώκοντες
  chosen: the pursuers
  alternatives:
  - those pursuing
  - the ones chasing
  lexicon: LSJ
  rationale: The articular present participle denotes the group engaged in pursuit.
    'The pursuers' is concise, natural English and preserves the military/narrative
    sense.
- source_word: ὅτι περὶ ψυχῆς ἐστιν αὐτοῖς
  chosen: that it was a matter of life for them
  alternatives:
  - that their lives were at stake
  - that it concerned their life
  lexicon: LSJ
  rationale: The idiom περὶ ψυχῆς expresses mortal danger or a life-and-death situation.
    'A matter of life for them' keeps the underlying 'life/soul' term in view while
    reading naturally; the sense is that their lives were at stake.
- source_word: ψυχῆς
  chosen: life
  alternatives:
  - soul
  lexicon: LSJ
  rationale: In this idiom the meaning is not the immaterial 'soul' but physical life.
    'Life' best fits the context of pursuit and danger.
- source_word: ἐπέστρεψαν
  chosen: they turned back
  alternatives:
  - they returned
  - they turned around
  lexicon: LSJ
  rationale: In context of a chase, the verb indicates reversing course rather than
    merely arriving back somewhere. 'Turned back' is the clearest narrative rendering.
