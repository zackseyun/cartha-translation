translation:
  text: It was found in a writing concerning both the Spartans and the Jews that they
    are brothers and that they are from the family line of Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a document' or 'in a record.' The Greek term here refers to a written
      source and does not necessarily mean sacred Scripture.
    reason: lexical_alternative
  - marker: b
    text: That is, a claimed shared descent from Abraham in the written source being
      cited.
    reason: cultural_note
lexical_decisions:
- source_word: εὑρέθη
  chosen: It was found
  alternatives:
  - There was found
  - It has been found
  lexicon: BDAG
  rationale: Aorist passive; simple past fits the narrative context and preserves
    the impersonal passive sense without adding an explicit subject.
- source_word: ἐν γραφῇ
  chosen: in a writing
  alternatives:
  - in a document
  - in a record
  - in Scripture
  lexicon: BDAG
  rationale: γραφῇ here most naturally refers to a written document or record, not
    necessarily sacred Scripture. 'Writing' is broad and transparent, while avoiding
    the potentially over-theological 'Scripture'.
- source_word: περὶ τε τῶν Σπαρτιατῶν καὶ Ἰουδαίων
  chosen: concerning both the Spartans and the Jews
  alternatives:
  - about the Spartans and the Jews
  - regarding the Spartans and Jews
  lexicon: BDAG
  rationale: περί with genitive means 'concerning/regarding'; τε ... καί is well represented
    by 'both ... and' to preserve the paired construction.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - kindred
  - kinsmen
  - brothers and sisters
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in this context denotes
    kinship or claimed ethnic brotherhood between peoples. Per doctrine, gender-accurate
    rendering is preferred; 'brothers' preserves the source wording better than an
    inclusive expansion.
- source_word: ἐκ γένους Ἀβραάμ
  chosen: from the family line of Abraham
  alternatives:
  - of the stock of Abraham
  - from the race of Abraham
  - from the lineage of Abraham
  - from the seed of Abraham
  lexicon: BDAG
  rationale: γένος denotes lineage, family, stock, or descent. 'Family line' communicates
    descent clearly in modern English without the archaic feel of 'stock' or the potential
    ambiguity of 'race.' 'Seed' is more literal but less natural here.
