theological_decisions:
- issue: Nature of the claimed relationship between Spartans and Jews
  chosen_reading: Render the statement straightforwardly as a claim of kinship/descent
    without endorsing its historical truth.
  alternative_readings:
  - Translate more loosely as political friendship or alliance
  rationale: The Greek explicitly states that they are 'brothers' and 'from the family
    line of Abraham.' The translation should preserve the text's claim as written,
    not soften it into mere diplomatic affinity. Historical evaluation belongs outside
    the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
