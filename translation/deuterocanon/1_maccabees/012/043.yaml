translation:
  text: And he received him honorably, introduced him to all his friends, gave him
    gifts, and commanded his friends and his forces likewise to obey him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'presented him to all his friends.' The Greek verb can denote introducing
      or presenting someone publicly.
    reason: lexical_alternative
  - marker: b
    text: '''Friends'' may carry a courtly-political sense in a Hellenistic royal
      setting, referring to members of the king''s circle rather than merely personal
      companions.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐπεδέξατο
  chosen: received
  alternatives:
  - welcomed
  - accepted
  lexicon: LSJ
  rationale: The middle of ἐπιδέχομαι here denotes receiving or welcoming a person.
    'Received' is slightly more formal and pairs naturally with the adverb ἐνδόξως,
    while avoiding over-interpretation beyond the Greek.
- source_word: ἐνδόξως
  chosen: honorably
  alternatives:
  - gloriously
  - with honor
  - splendidly
  lexicon: LSJ
  rationale: The adverb conveys honorable or distinguished treatment. 'Honorably'
    gives clear modern English and fits the courtly context better than the more wooden
    'gloriously.'
- source_word: συνέστησεν
  chosen: introduced
  alternatives:
  - presented
  - commended
  - made known
  lexicon: LSJ
  rationale: In context, with αὐτὸν πᾶσιν τοῖς φίλοις αὐτοῦ, the sense is that he
    presented or introduced Jonathan to his associates. 'Introduced' is the most idiomatic
    English for this social-political setting.
- source_word: φίλοις
  chosen: friends
  alternatives:
  - courtiers
  - allies
  - companions
  lexicon: LSJ
  rationale: The Greek literally says 'friends.' In Hellenistic royal contexts this
    can function as a court title, but the text itself uses the ordinary term. The
    literal rendering is retained, with the political nuance left implicit rather
    than imported into the main text.
- source_word: δόματα
  chosen: gifts
  alternatives:
  - presents
  lexicon: LSJ
  rationale: A straightforward rendering of the plural noun for gifts or presents.
    'Gifts' is natural and sufficiently formal.
- source_word: δυνάμεσιν
  chosen: forces
  alternatives:
  - troops
  - military forces
  - power
  lexicon: LSJ
  rationale: Here the plural refers to military forces under the ruler's authority.
    'Forces' is concise and accurate; 'power' would be too abstract.
- source_word: ὑπακούειν
  chosen: to obey
  alternatives:
  - to listen to
  - to submit to
  lexicon: LSJ
  rationale: The infinitive means to obey or heed. In this command context, 'to obey'
    best captures the force of the order.
- source_word: ὡσαύτως
  chosen: likewise
  alternatives:
  - also
  - in the same way
  lexicon: LSJ
  rationale: The adverb indicates that his friends and forces were to treat Jonathan
    in the same manner. 'Likewise' preserves that comparative sense compactly.
