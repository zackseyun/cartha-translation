lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - was informed
  lexicon: BDAG
  rationale: A straightforward narrative aorist of hearing/report reception. 'Heard'
    is natural and sufficiently broad in English, covering receipt of news without
    over-interpreting the mode.
- source_word: οἱ ἄρχοντες Δημητρίου
  chosen: Demetrius’s commanders
  alternatives:
  - the rulers of Demetrius
  - Demetrius's leaders
  - Demetrius's officers
  lexicon: LSJ
  rationale: ἄρχοντες can mean rulers, leaders, or officials. In this military context,
    with a force returning for battle, 'commanders' best conveys functional sense
    without implying royal sovereignty.
- source_word: ἐπέστρεψαν
  chosen: had returned
  alternatives:
  - returned
  - turned back
  lexicon: BDAG
  rationale: The verb denotes return. English past perfect fits the reported action
    relative to Jonathan's hearing, though simple past would also be possible. 'Returned'
    is clearer than the more literal but less idiomatic 'turned back' here.
- source_word: μετὰ δυνάμεως πολλῆς
  chosen: with a much larger force
  alternatives:
  - with a great force
  - with much strength
  - with a large army
  lexicon: LSJ
  rationale: δύναμις in military narrative commonly refers to force/troops rather
    than abstract power. The comparative phrase ὑπὲρ τὸ πρότερον sharpens the sense,
    so 'much larger force' brings the comparison into idiomatic English.
- source_word: ὑπὲρ τὸ πρότερον
  chosen: than before
  alternatives:
  - more than previously
  - beyond the former time
  lexicon: LSJ
  rationale: This comparative idiom contrasts the present force with an earlier one.
    'Than before' is concise, natural, and faithful.
- source_word: τοῦ πολεμῆσαι πρὸς αὐτόν
  chosen: to make war against him
  alternatives:
  - to fight against him
  - to wage war against him
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose. πολεμέω is stronger than
    a single skirmish, so 'make war against him' preserves the military hostility
    without sounding overly formal.
