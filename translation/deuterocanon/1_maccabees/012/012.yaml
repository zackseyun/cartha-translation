lexical_decisions:
- source_word: εὐφραινόμεθα
  chosen: we rejoice
  alternatives:
  - we are glad
  - we take delight
  lexicon: LSJ
  rationale: The middle/passive form here expresses gladness or rejoicing. 'We rejoice'
    is natural modern English and preserves the verbal force better than a flatter
    'we are glad.'
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: LSJ
  rationale: δέ commonly marks a mild contrast or transition. In context, 'but' preserves
    the connective force without overtranslating it.
- source_word: ἐπὶ
  chosen: in
  alternatives:
  - over
  - because of
  - at
  lexicon: LSJ
  rationale: With the dative, ἐπί can indicate basis or occasion. English idiom with
    'rejoice' commonly uses 'in' or 'over'; 'in your glory' is slightly more formal
    and stays close to the Greek construction while remaining readable.
- source_word: τῇ δόξῃ
  chosen: glory
  alternatives:
  - honor
  - renown
  lexicon: LSJ
  rationale: δόξα here refers to the honored standing or reputation of the recipients,
    not necessarily visible splendor. 'Glory' is the most direct equivalent; 'honor'
    or 'renown' are possible but narrower interpretive choices.
- source_word: ὑμῶν
  chosen: your
  lexicon: LSJ
  rationale: Straightforward second-person plural possessive modifying 'glory.'
