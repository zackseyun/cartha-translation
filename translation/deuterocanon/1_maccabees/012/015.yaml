translation:
  text: Therefore we, at every time, continually remember you at the festivals and
    on the other appointed days, when we offer sacrifices and in our prayers, as it
    is right and fitting to remember brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "feasts" for "festivals."
    reason: lexical_alternative
  - marker: b
    text: '"Appointed days" renders a phrase meaning the other days that are due or
      prescribed for observance.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀδιαλείπτως
  chosen: continually
  alternatives:
  - unceasingly
  - without interruption
  lexicon: LSJ
  rationale: Conveys persistent regularity in natural English without overstating
    absolute nonstop action; fits the liturgical context of repeated remembrance.
- source_word: ἑορταῖς
  chosen: festivals
  alternatives:
  - feasts
  lexicon: LSJ
  rationale: '"Festivals" is clear modern English for religious feast days and avoids
    archaic churchy tone while preserving cultic-calendar sense.'
- source_word: καθηκούσαις ἡμέραις
  chosen: appointed days
  alternatives:
  - proper days
  - fitting days
  - customary days
  lexicon: LSJ
  rationale: The phrase refers to days that are due, appropriate, or prescribed in
    the religious calendar. "Appointed days" best captures the sense of recognized
    observance days in context.
- source_word: μνημονεύομεν ὑμῶν
  chosen: remember you
  alternatives:
  - make mention of you
  - keep you in remembrance
  lexicon: LSJ
  rationale: Straightforward English that preserves both mental remembrance and liturgical
    mention in prayer/sacrifice context.
- source_word: ἐφʼ ὧν
  chosen: when
  alternatives:
  - during which
  - on which occasions
  lexicon: LSJ
  rationale: Here the prepositional relative links the festivals and appointed days
    to the acts of offering and prayer. "When" gives the temporal force idiomatically.
- source_word: προσφέρομεν θυσίων
  chosen: we offer sacrifices
  alternatives:
  - we present sacrifices
  - we make offerings of sacrifices
  lexicon: LSJ
  rationale: Natural rendering of cultic language. Although the genitive θυσίων is
    somewhat unusual after προσφέρομεν, the sense is plainly sacrificial offering.
- source_word: προσευχαῖς
  chosen: prayers
  alternatives:
  - prayers offered
  - petitions
  lexicon: LSJ
  rationale: Simple and accurate; the plural likely reflects repeated liturgical acts
    rather than a single prayer.
- source_word: ὡς δέον ἐστὶν καὶ πρέπον
  chosen: as it is right and fitting
  alternatives:
  - as is necessary and proper
  - as is due and appropriate
  lexicon: LSJ
  rationale: Captures both moral propriety and social/religious appropriateness in
    smooth English.
- source_word: ἀδελφῶν
  chosen: brothers
  alternatives:
  - brothers and kin
  - kindred
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural and in this diplomatic-political
    context refers to fellow Jews addressed as brothers. Per doctrine, gender-accurate
    rendering is preferred over neutralizing.
