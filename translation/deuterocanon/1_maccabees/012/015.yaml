theological_decisions:
- issue: Kinship term ἀδελφῶν
  chosen_reading: brothers
  alternative_readings:
  - kinsmen
  - brothers and sisters
  rationale: The term functions as a covenantal/ethnic-political kinship designation
    between Jewish communities. The source is masculine plural; no contextual pressure
    requires inclusive expansion, so the gender-accurate form is retained.
