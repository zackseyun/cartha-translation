translation:
  text: 'And we also write back to you: Your livestock and your possessions are ours,
    and ours are yours. Therefore we are giving orders that they report this to you
    accordingly.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we copy to you' if ἀντιγράφομεν is taken more literally; in this context
      it likely means 'we write back' or 'we send a written reply.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Your livestock and your property are ours, and ours are yours'—a
      diplomatic formula expressing alliance and mutual solidarity, not necessarily
      abolition of legal ownership.
    reason: cultural_note
  - marker: c
    text: Or 'that they inform you to the same effect.' The Greek leaves the object
      of 'report' implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντιγράφομεν
  chosen: write back
  alternatives:
  - copy
  - reply in writing
  - write in return
  lexicon: LSJ
  rationale: In epistolary context the verb naturally means to write in response/return
    rather than merely to copy. 'Write back' gives the reciprocal sense in clear modern
    English.
- source_word: κτήνη
  chosen: livestock
  alternatives:
  - beasts
  - cattle
  - animals
  lexicon: LSJ
  rationale: The term refers to domesticated animals/property in herds rather than
    animals generally. 'Livestock' is natural modern English and fits the diplomatic
    formula about shared possessions.
- source_word: ὕπαρξις
  chosen: property
  alternatives:
  - possessions
  - substance
  - goods
  lexicon: LSJ
  rationale: Here it denotes material holdings or estate. 'Property' is concise and
    pairs well with 'livestock,' while still covering broader possessions.
- source_word: ἐντελλόμεθα
  chosen: we are giving orders
  alternatives:
  - we command
  - we instruct
  - we direct
  lexicon: LSJ
  rationale: The middle/deponent form conveys issuing instructions or commands. 'We
    are giving orders' preserves the official diplomatic tone without sounding overly
    archaic.
- source_word: ἀπαγγείλωσιν
  chosen: they report these things to you
  alternatives:
  - they announce to you
  - they inform you
  - they convey this to you
  lexicon: LSJ
  rationale: The verb means to report or convey a message. Because the object is implicit
    in Greek, 'these things' is supplied in English for clarity.
- source_word: κατὰ τὰ αὐτά
  chosen: accordingly
  alternatives:
  - in the same way
  - to the same effect
  - likewise
  lexicon: LSJ
  rationale: The phrase indicates correspondence with what has just been stated. 'Accordingly'
    captures the sense idiomatically in English, though 'to the same effect' is also
    possible.
