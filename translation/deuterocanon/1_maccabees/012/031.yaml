translation:
  text: And Jonathan turned aside against the Arabs called the Zabadeans, and struck
    them, and took their spoils.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξέκλινεν
  chosen: turned aside against
  alternatives:
  - turned toward
  - deviated toward
  - marched against
  lexicon: LSJ
  rationale: The verb literally denotes turning aside or inclining. In this military
    narrative context, 'turned aside against' preserves the directional sense while
    making clear that Jonathan redirected his movement to attack this group. 'Marched
    against' is possible contextually but is less directly tied to the Greek wording.
- source_word: Ἀράβας
  chosen: Arabs
  alternatives:
  - Arabians
  lexicon: LSJ
  rationale: The accusative plural refers to Arab people/groups. 'Arabs' is the most
    natural modern English rendering; 'Arabians' is older and less idiomatic.
- source_word: τοὺς καλουμένους
  chosen: called
  alternatives:
  - who were called
  - known as
  lexicon: LSJ
  rationale: A straightforward participial expression identifying the subgroup by
    name. 'Called' is concise and natural; 'known as' is possible but slightly more
    interpretive.
- source_word: Ζαβαδαίους
  chosen: Zabadeans
  alternatives:
  - Zabadæans
  - Zabadaeans
  lexicon: LSJ
  rationale: This is a transliterated ethnonym/group name. 'Zabadeans' gives a standard
    readable English transliteration from the Greek form without overcomplicating
    the spelling.
- source_word: ἐπάταξεν
  chosen: struck
  alternatives:
  - defeated
  - smote
  - attacked
  lexicon: LSJ
  rationale: The verb commonly means 'strike' or 'smite.' 'Struck' preserves the directness
    of the Greek and fits the battle context. 'Defeated' may be an implication but
    is more interpretive than the source wording.
- source_word: σκῦλα
  chosen: spoils
  alternatives:
  - plunder
  - booty
  lexicon: LSJ
  rationale: The noun refers to goods taken in war. 'Spoils' is standard, clear, and
    suitably dignified. 'Booty' is dated in tone; 'plunder' can suggest the act as
    much as the goods.
