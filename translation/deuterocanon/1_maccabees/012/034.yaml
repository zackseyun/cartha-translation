translation:
  text: For he heard that they intended to hand over the stronghold to those on Demetrius's
    side, and he stationed a garrison there so that they might guard it.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤκουσεν
  chosen: he heard
  alternatives:
  - he learned
  - he was informed
  lexicon: BDAG
  rationale: The aorist of ἀκούω here introduces the reason for the following action.
    'He heard' is the most direct and natural rendering, while still allowing the
    sense of receiving report.
- source_word: βούλονται
  chosen: they intended
  alternatives:
  - they wanted
  - they were planning
  lexicon: BDAG
  rationale: βούλομαι can denote will, desire, or intention. In this military-political
    context, 'intended' best captures a concrete plan without overstating certainty.
- source_word: τὸ ὀχύρωμα
  chosen: the stronghold
  alternatives:
  - the fortress
  - the fortification
  lexicon: LSJ
  rationale: ὀχύρωμα denotes a fortified place or strong defensive installation. 'Stronghold'
    is clear modern English and fits the military setting well.
- source_word: παραδοῦναι
  chosen: to hand over
  alternatives:
  - to surrender
  - to deliver up
  lexicon: BDAG
  rationale: παραδίδωμι in this context means to give over control of a place to another
    party. 'Hand over' is idiomatic and does not imply more than the Greek states.
    'Surrender' is possible but slightly more interpretive.
- source_word: τοῖς παρὰ Δημητρίου
  chosen: to those on Demetrius's side
  alternatives:
  - to Demetrius's men
  - to those from Demetrius
  - to Demetrius's party
  lexicon: LSJ
  rationale: The phrase literally refers to those associated with or belonging to
    Demetrius. 'Those on Demetrius's side' communicates political allegiance clearly
    in natural English without narrowing the group too specifically to soldiers.
- source_word: ἔθετο
  chosen: he stationed
  alternatives:
  - he placed
  - he set
  lexicon: BDAG
  rationale: With φρουράν as object, the verb means to place or post a guard force.
    'Stationed' is the most idiomatic military rendering.
- source_word: φρουράν
  chosen: a garrison
  alternatives:
  - a guard
  - troops
  lexicon: LSJ
  rationale: φρουρά can mean guard duty or a guarding force. Here it refers to a military
    detachment left in place, so 'a garrison' best fits.
- source_word: ὅπως φυλάσσωσιν αὐτήν
  chosen: so that they might guard it
  alternatives:
  - in order that they might keep it
  - so that they might protect it
  lexicon: BDAG
  rationale: ὅπως with the subjunctive expresses purpose. φυλάσσω here means guard
    or keep watch over. 'Guard it' is concise and suits the fortified-location context.
