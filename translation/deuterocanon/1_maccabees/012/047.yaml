translation:
  text: But he left three thousand men with himself; about two thousand he left in
    Galilee, and a thousand went with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'with himself.'
    reason: lexical_alternative
  - marker: b
    text: Or 'joined him'; the Greek verb more literally means 'came together with
      him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέλιπεν
  chosen: left
  alternatives:
  - kept
  - retained
  lexicon: LSJ
  rationale: The verb means to leave behind or leave remaining. In this military narrative,
    'left' is the most natural English rendering and fits both clauses in the verse.
- source_word: μεθʼ ἑαυτοῦ
  chosen: with himself
  alternatives:
  - with him
  lexicon: LSJ
  rationale: Literally 'with himself.' This preserves the reflexive force of the Greek,
    though in English the later clause naturally uses 'with him.'
- source_word: ἄνδρας τρισχιλίους
  chosen: three thousand men
  alternatives:
  - three thousand soldiers
  lexicon: LSJ
  rationale: ἄνδρας is literally 'men.' Since the context is military, 'soldiers'
    is possible, but 'men' stays closer to the Greek without losing sense.
- source_word: ὡς δισχιλίους
  chosen: about two thousand
  alternatives:
  - some two thousand
  - approximately two thousand
  lexicon: LSJ
  rationale: ὡς with a numeral often marks approximation. 'About two thousand' reflects
    that nuance better than a bare numeral.
- source_word: ἀφῆκεν
  chosen: he left
  alternatives:
  - he stationed
  - he left behind
  lexicon: LSJ
  rationale: The verb can mean to leave or let remain. 'He left' is sufficiently clear
    and avoids over-interpreting the action as a formal military deployment.
- source_word: ἐν τῇ Γαλιλαίᾳ
  chosen: in Galilee
  alternatives:
  - at Galilee
  lexicon: LSJ
  rationale: Standard locative rendering of ἐν with a region name.
- source_word: χίλιοι
  chosen: a thousand
  alternatives:
  - one thousand
  lexicon: LSJ
  rationale: Idiomatic English prefers 'a thousand' in running narrative.
- source_word: συνῆλθον αὐτῷ
  chosen: went with him
  alternatives:
  - joined him
  - came together with him
  lexicon: LSJ
  rationale: Although the verb literally involves coming together, in this context
    it indicates accompanying him. 'Went with him' communicates the movement and relationship
    clearly in English.
