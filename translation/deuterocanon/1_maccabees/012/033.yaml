translation:
  text: And Simon went out and passed through as far as Ashkelon and the nearby strongholds,
    and he turned aside to Joppa and seized it in advance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'occupied it beforehand' or 'preemptively captured it'; the Greek verb
      suggests taking control ahead of another party.
    reason: lexical_alternative
lexical_decisions:
- source_word: διώδευσεν
  chosen: passed through
  alternatives:
  - went through
  - marched through
  - traveled through
  lexicon: LSJ
  rationale: The verb denotes moving through a region or route. 'Passed through' is
    a natural English equivalent that preserves the sense of traversing territory
    without overstating military action.
- source_word: ἕως Ἀσκάλωνος
  chosen: as far as Ashkelon
  alternatives:
  - to Ashkelon
  lexicon: LSJ
  rationale: ἕως marks extent or limit. 'As far as Ashkelon' preserves the boundary
    nuance more precisely than a simple destination gloss.
- source_word: τὰ πλησίον ὀχυρώματα
  chosen: the nearby strongholds
  alternatives:
  - the neighboring fortresses
  - the adjacent fortified places
  lexicon: LSJ
  rationale: ὀχυρώματα refers to fortified places or strongholds. 'Strongholds' is
    concise and readable; πλησίον is rendered 'nearby' to show proximity.
- source_word: ἐξέκλινεν εἰς Ἰόππην
  chosen: he turned aside to Joppa
  alternatives:
  - he diverted to Joppa
  - he turned toward Joppa
  lexicon: LSJ
  rationale: ἐκκλίνω can mean to turn aside or deviate from a route. 'Turned aside
    to Joppa' reflects a change in direction from the prior movement.
- source_word: προκατελάβετο
  chosen: seized it in advance
  alternatives:
  - occupied it beforehand
  - took possession of it first
  - preemptively captured it
  lexicon: LSJ
  rationale: The compound verb carries a sense of taking possession beforehand or
    preemptively. 'Seized it in advance' preserves that anticipatory nuance better
    than simply 'captured it.'
- source_word: αὐτήν
  chosen: it
  alternatives:
  - her
  lexicon: Greek grammar
  rationale: Although Ἰόππην is grammatically feminine, idiomatic English refers to
    a city as 'it' in this context.
