  text: καὶ νῦν ἀπόστειλον αὐτοὺς εἰς τοὺς οἴκους αὐτῶν, ἐπίλεξαι δὲ σεαυτῷ ἄνδρας
    ὀλίγους οἵτινες ἔσονται μετὰ σοῦ· καὶ δεῦρο μετ’ ἐμοῦ εἰς Πτολεμαΐδα, καὶ παραδώσω
