translation:
  text: And now send them away to their homes, but choose for yourself a few men who
    will be with you; and come with me to Ptolemais, and I will hand it over to you,
    along with the rest of the strongholds and the large forces and all those in charge
    of affairs, and then I will depart after turning back; for this is why I have
    come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the officials' for 'all those in charge of affairs'; the Greek literally
      refers to those set over the needs or business.
    reason: lexical_alternative
  - marker: b
    text: The clause 'I will depart after turning back' is somewhat compressed in
      Greek; it indicates that the speaker will first turn back/return and then leave,
      without specifying the destination.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόστειλον
  chosen: send ... away
  alternatives:
  - send
  - dismiss
  lexicon: LSJ
  rationale: The imperative calls for dispatching the troops from the present setting
    back home. 'Send ... away' captures both the motion and the dismissive force in
    context better than the bare 'send'.
- source_word: οἴκους
  chosen: homes
  alternatives:
  - houses
  - households
  lexicon: LSJ
  rationale: In the phrase 'to their houses,' the idiomatic sense is return to their
    own homes rather than the physical buildings alone. 'Homes' is natural English
    and preserves the sense.
- source_word: ἐπίλεξαι
  chosen: choose for yourself
  alternatives:
  - select
  - pick out
  lexicon: LSJ
  rationale: The middle voice suggests selecting for one's own purpose or benefit.
    'Choose for yourself' reflects that nuance more clearly than a simple 'choose'.
- source_word: ἄνδρας ὀλίγους
  chosen: a few men
  alternatives:
  - a small number of men
  - a few soldiers
  lexicon: LSJ
  rationale: ἄνδρας is literally 'men.' Although the context is military, the Greek
    does not explicitly say 'soldiers,' so 'a few men' stays closer to the source
    while remaining clear.
- source_word: δεῦρο
  chosen: come
  alternatives:
  - come here
  - come along
  lexicon: LSJ
  rationale: The particle functions as an invitation or summons. In smooth English
    before 'with me to Ptolemais,' simple 'come' conveys the sense without overtranslating.
- source_word: παραδώσω
  chosen: I will hand ... over
  alternatives:
  - I will deliver
  - I will surrender
  lexicon: LSJ
  rationale: The verb denotes transferring control. 'Hand over' is idiomatic and fits
    the political-military context without implying more than the Greek states.
- source_word: τὰ λοιπὰ ὀχυρώματα
  chosen: the rest of the strongholds
  alternatives:
  - the remaining fortresses
  - the other fortified places
  lexicon: LSJ
  rationale: ὀχυρώματα refers to fortified positions. 'Strongholds' is concise, natural,
    and suitably military.
- source_word: τὰς δυνάμεις τὰς πολλὰς
  chosen: the large forces
  alternatives:
  - the many forces
  - the numerous troops
  lexicon: LSJ
  rationale: δυνάμεις here refers to military forces. 'Large forces' communicates
    quantity and military sense in idiomatic English; 'many forces' is more wooden.
- source_word: πάντας τοὺς ἐπὶ τῶν χρειῶν
  chosen: all those in charge of affairs
  alternatives:
  - all the officials
  - all those over the business
  - all those in charge of the matters
  lexicon: LSJ
  rationale: The phrase literally refers to those set over the needs/matters. 'Those
    in charge of affairs' preserves the administrative sense without narrowing too
    specifically to a modern office title.
- source_word: ἐπιστρέψας ἀπελεύσομαι
  chosen: I will depart after turning back
  alternatives:
  - I will go away after returning
  - once I have returned, I will leave
  lexicon: LSJ
  rationale: The participle plus future verb indicates a prior action before departure.
    The exact destination of the 'turning back/returning' is not specified, so the
    translation keeps the sequence without overexplaining.
- source_word: τούτου γὰρ χάριν πάρειμι
  chosen: for this is why I have come
  alternatives:
  - for for this reason I am here
  - for this purpose I am present
  lexicon: LSJ
  rationale: The clause gives the stated purpose of the speaker's presence. 'This
    is why I have come' is natural English and accurately reflects the explanatory
    force.
