translation:
  text: And he became afraid that Jonathan might not permit him and might make war
    against him, and he was seeking a way to seize him and kill him; and he set out
    and came to Beth-shan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'might not allow him.' The object is left implicit in the
      Greek; the translation supplies 'it' for clear English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ηὐλαβήθη
  chosen: became afraid
  alternatives:
  - was apprehensive
  - feared
  lexicon: LSJ
  rationale: The verb can denote fear or cautious apprehension. 'Became afraid' captures
    the aorist as an ingressive reaction in clear modern English without overstating
    piety-related senses the verb can have elsewhere.
- source_word: μὴ ποτε οὐκ ἐάσῃ αὐτὸν
  chosen: might not allow it
  alternatives:
  - might not permit him
  - might not let him
  lexicon: LSJ
  rationale: The Greek literally has 'might not allow him,' but the object is contextually
    elliptical. English requires smoothing; 'allow it' preserves the sense of refusing
    permission or preventing the intended plan without awkward ambiguity.
- source_word: πολεμήσῃ πρὸς αὐτόν
  chosen: might make war against him
  alternatives:
  - might fight against him
  - might wage war against him
  lexicon: LSJ
  rationale: The verb is military in register. 'Make war against him' preserves that
    stronger sense better than the more general 'fight against him.'
- source_word: ἐζήτει πόρον
  chosen: was seeking a way
  alternatives:
  - was looking for an opportunity
  - was seeking a means
  lexicon: LSJ
  rationale: πόρος commonly means a way, means, or resource. Here it refers to a practical
    means/opportunity to carry out the plot. 'A way' is natural English and broad
    enough to include both means and opportunity.
- source_word: τοῦ συλλαβεῖν αὐτὸν τοῦ ἀποκτεῖναι
  chosen: to seize him and kill him
  alternatives:
  - to capture him in order to kill him
  - to arrest him and put him to death
  lexicon: LSJ
  rationale: The paired articular infinitives express purpose. 'Seize' is preferable
    to 'arrest' because the text does not imply legal process; 'kill' is the plain
    sense of ἀποκτείνω.
- source_word: ἀπάρας
  chosen: set out
  alternatives:
  - departed
  - broke camp and went
  lexicon: LSJ
  rationale: The participle indicates departure before arrival. 'Set out' is idiomatic
    and preserves the movement sequence without over-specifying military encampment.
- source_word: Βεθσά
  chosen: Beth-shan
  alternatives:
  - Bethsa
  lexicon: LSJ
  rationale: The Greek form corresponds to the place commonly known in English as
    Beth-shan. Using the standard transliterated place-name aids recognition while
    remaining anchored to the Greek witness.
