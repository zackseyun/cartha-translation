translation:
  text: And Tryphon saw that he had arrived with a large force, and he was afraid
    to stretch out his hands against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to lay hands on him.' The Greek idiom 'stretch out his hands against
      him' can denote hostile action more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέστη
  chosen: had arrived
  alternatives:
  - was present
  - stood by
  - appeared
  lexicon: LSJ
  rationale: Aorist of παρίστημι here describes Jonathan's coming onto the scene with
    troops. 'Had arrived' fits the narrative context better than the more static 'was
    present' while remaining close to the Greek.
- source_word: μετὰ δυνάμεως πολλῆς
  chosen: with a large force
  alternatives:
  - with great power
  - with many troops
  - with a great army
  lexicon: LSJ
  rationale: δύναμις in military narrative commonly refers to force/troops rather
    than abstract power. 'Large force' is natural English and preserves the military
    sense without over-specifying 'army'.
- source_word: ἐκτείνειν χεῖρας ἐπʼ αὐτόν
  chosen: to stretch out his hands against him
  alternatives:
  - to lay hands on him
  - to attack him
  - to raise his hand against him
  lexicon: LSJ
  rationale: The idiom literally means extending the hands against someone, often
    for hostile action. The more literal rendering preserves the idiomatic force and
    leaves the exact mode of hostility open; a smoother alternative is worth preserving
    in a footnote.
- source_word: ηὐλαβήθη
  chosen: he was afraid
  alternatives:
  - he shrank back
  - he was cautious
  - he feared
  lexicon: BDAG
  rationale: The verb conveys fear/caution. 'He was afraid' is straightforward modern
    English and best matches the immediate reason given in the clause.
