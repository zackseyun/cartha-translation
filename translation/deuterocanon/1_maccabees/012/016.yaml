translation:
  text: But we rejoice in your glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we rejoice over your honor' or 'we are glad because of your renown.'
      The Greek δόξα here can denote honor or reputation as well as glory.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐφραινόμεθα
  chosen: we rejoice
  alternatives:
  - we are glad
  - we celebrate
  - we take delight
  lexicon: BDAG
  rationale: The middle/passive form here expresses gladness or rejoicing. 'We rejoice'
    is natural modern English and preserves the present-tense sense without over-paraphrasing.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ commonly marks a mild contrast or transition. 'But' best reflects
    the connective force in this short clause, though the contrast is light.
- source_word: ἐπὶ
  chosen: in
  alternatives:
  - over
  - because of
  - concerning
  lexicon: BDAG
  rationale: With the dative here, ἐπί conveys the basis or occasion of rejoicing.
    English idiom can say 'rejoice in' or 'rejoice over'; 'in' is concise and preserves
    the close association with 'your glory.'
- source_word: τῇ δόξῃ
  chosen: glory
  alternatives:
  - honor
  - renown
  - splendor
  lexicon: BDAG
  rationale: δόξα in this context most naturally refers to honor, reputation, or distinguished
    standing rather than visible splendor. 'Glory' keeps the lexical connection and
    elevated tone, though 'honor' is a viable contextual alternative.
- source_word: ὑμῶν
  chosen: your
  lexicon: BDAG
  rationale: Second-person plural possessive, referring to the recipients collectively.
