lexical_decisions:
- source_word: κατεδίωξεν
  chosen: pursued
  alternatives:
  - chased
  - pressed after
  lexicon: LSJ
  rationale: Aorist of καταδιώκω denotes active pursuit. 'Pursued' is natural modern
    English and preserves the military/narrative sense without overtranslation.
- source_word: ὀπίσω αὐτῶν
  chosen: after them
  alternatives:
  - behind them
  lexicon: LSJ
  rationale: The phrase literally means 'behind them,' but in English with a verb
    of pursuit 'after them' is the idiomatic equivalent and best reflects the sense.
- source_word: οὐκ ἐκατέλαβεν
  chosen: did not overtake
  alternatives:
  - did not catch
  - did not reach
  lexicon: LSJ
  rationale: καταλαμβάνω here refers to catching up with fugitives rather than merely
    understanding or seizing. 'Did not overtake' fits the pursuit context more precisely
    than 'did not catch.'
- source_word: διέβησαν
  chosen: had crossed
  alternatives:
  - crossed
  - went across
  lexicon: LSJ
  rationale: The aorist gives the reason they were not overtaken; English past perfect
    smoothly conveys prior action relative to the failed pursuit.
- source_word: τὸν Ἐλεύθερον ποταμόν
  chosen: the Eleutherus River
  alternatives:
  - the river Eleutherus
  lexicon: LSJ
  rationale: Ἐλεύθερον is a proper name and should be transliterated. Rendering ποταμόν
    as 'River' in apposition is standard English style for named rivers.
