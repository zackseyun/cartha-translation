translation:
  text: And they went to Rome, and they entered the council chamber, and said, “Jonathan
    the high priest and the nation of the Jews have sent us to renew for them the
    alliance as before.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “senate house” / “council hall”; the Greek names the meeting place of
      the governing council rather than using a formal Roman institutional title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθησαν
  chosen: went
  alternatives:
  - traveled
  - journeyed
  lexicon: LSJ
  rationale: The verb simply denotes movement/travel here. 'Went' is the most natural
    modern English rendering and avoids unnecessary formality.
- source_word: βουλευτήριον
  chosen: council chamber
  alternatives:
  - senate house
  - council hall
  - council
  lexicon: LSJ
  rationale: The term denotes the place where the governing council meets. 'Council
    chamber' preserves the concrete locative sense better than the institutional shorthand
    'Senate,' which would import a more interpretive Roman title than the Greek itself
    states.
- source_word: Ἰωναθὰν ὁ ἀρχιερεύς
  chosen: Jonathan the high priest
  alternatives:
  - Jonathan, the chief priest
  lexicon: LSJ
  rationale: ἀρχιερεύς is the standard term for 'high priest.' This is both lexically
    straightforward and historically appropriate in 1 Maccabees.
- source_word: τὸ ἔθνος τῶν Ἰουδαίων
  chosen: the nation of the Jews
  alternatives:
  - the Jewish nation
  - the people of the Jews
  - the nation of the Judeans
  lexicon: LSJ
  rationale: ἔθνος here refers to the people as a national body. 'Nation of the Jews'
    stays close to the Greek structure. 'Judeans' is possible in some contexts, but
    in 1 Maccabees 'Jews' is the more established and broadly intelligible rendering
    for Ἰουδαῖοι.
- source_word: ἀπέστειλαν ἡμῖς
  chosen: have sent us
  alternatives:
  - sent us
  lexicon: LSJ
  rationale: The aorist is naturally rendered as simple past, but in English direct
    speech 'have sent us' can idiomatically convey the present relevance of the commission.
    It reads naturally while preserving the sense that the speakers are acting under
    a current mandate.
- source_word: ἀνανεώσασθαι
  chosen: to renew
  alternatives:
  - to restore
  - to renew again
  lexicon: LSJ
  rationale: The infinitive means 'to renew' or 'make new again.' 'Renew' is concise
    and fits the diplomatic context.
- source_word: συμμαχίαν
  chosen: alliance
  alternatives:
  - treaty
  - friendship alliance
  - compact
  lexicon: LSJ
  rationale: In this political context, συμμαχία denotes an alliance between parties.
    'Alliance' is the clearest and least over-specific English equivalent.
- source_word: κατὰ τὸ πρότερον
  chosen: as before
  alternatives:
  - as formerly
  - according to the former arrangement
  lexicon: LSJ
  rationale: This phrase points back to the prior state of relations. 'As before'
    is idiomatic and sufficiently precise.
