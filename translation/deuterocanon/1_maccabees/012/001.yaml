translation:
  text: And when Jonathan saw that the time was favorable to him, he chose men and
    sent them to Rome to establish and renew the friendship with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that the opportunity favored him' or 'that the time was working in his
      favor.' The Greek expression is somewhat idiomatic, indicating that circumstances
      were advantageous to Jonathan.
    reason: lexical_alternative
  - marker: b
    text: '''Friendship'' here likely refers to formal diplomatic relations, not merely
      private affection.'
    reason: cultural_note
lexical_decisions:
- source_word: ἰδὼν
  chosen: when ... saw
  alternatives:
  - having seen
  - seeing
  lexicon: LSJ
  rationale: Aorist participle introducing the circumstance for the main actions;
    'when ... saw' gives natural English while preserving the temporal-causal force.
- source_word: ὁ καιρὸς
  chosen: the time
  alternatives:
  - the occasion
  - the opportunity
  - the moment
  lexicon: LSJ
  rationale: καιρός here denotes a favorable juncture or opportune time. 'The time'
    is kept in the main text to stay close to the Greek, while the following phrase
    clarifies its favorable sense.
- source_word: συνεργεῖ
  chosen: was working with him
  alternatives:
  - favored him
  - was helping him
  - was working in his favor
  lexicon: LSJ
  rationale: The verb literally means 'works together with' or 'cooperates with.'
    'Was working with him' preserves the metaphor and sense that circumstances were
    aiding Jonathan, without over-paraphrasing.
- source_word: ἐπέλεξεν ἄνδρας
  chosen: he chose men
  alternatives:
  - he selected men
  - he picked men
  lexicon: LSJ
  rationale: Straightforward selection language. 'Men' matches the masculine noun
    ἄνδρας and likely refers to male envoys in context.
- source_word: ἀπέστειλεν εἰς Ῥώμην
  chosen: sent them to Rome
  alternatives:
  - dispatched them to Rome
  lexicon: LSJ
  rationale: Standard diplomatic sending; 'sent them to Rome' is clear and direct.
- source_word: στῆσαι
  chosen: to establish
  alternatives:
  - to confirm
  - to set up
  lexicon: LSJ
  rationale: Infinitive of purpose after ἀπέστειλεν. In diplomatic context, it conveys
    setting a relationship on firm footing; 'establish' fits well in English.
- source_word: ἀνανεῶσαι
  chosen: renew
  alternatives:
  - restore
  - renew again
  lexicon: LSJ
  rationale: The verb means to renew or make fresh again. 'Renew' is the natural diplomatic
    equivalent.
- source_word: τὴν πρὸς αὐτοὺς φιλίαν
  chosen: the friendship with them
  alternatives:
  - their friendship with them
  - friendly relations with them
  - alliance with them
  lexicon: LSJ
  rationale: φιλία can denote friendship or political friendship/alliance. 'Friendship
    with them' preserves the Greek term while fitting the diplomatic context; 'alliance'
    would be somewhat more interpretive.
