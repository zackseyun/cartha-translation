  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναζεύξας
  chosen: after breaking camp
  alternatives:
  - after setting out
  - after marching on
  - after departing
  lexicon: LSJ
  rationale: The participle from ἀναζεύγνυμι commonly refers to striking camp or setting
    out on a march. 'After breaking camp' preserves the military/travel nuance better
    than the more generic 'after departing,' while remaining natural English in narrative
    context.
- source_word: ἦλθεν
  chosen: he came
  alternatives:
  - he went
  - he arrived
  lexicon: BDAG
  rationale: ἔρχομαι can be rendered 'came' or 'went' depending on viewpoint. With
    εἰς Δαμασκόν, 'came to Damascus' is idiomatic and straightforward in English.
- source_word: διώδευσεν
  chosen: traveled through
  alternatives:
  - passed through
  - went through
  lexicon: LSJ
  rationale: The verb denotes making one's way through an area. 'Traveled through'
    fits the sense of movement across territory and avoids the slightly flatter 'passed
    through.'
- source_word: ἐν πάσῃ τῇ χώρᾳ
  chosen: through the whole region
  alternatives:
  - through all the land
  - through the entire country
  lexicon: BDAG
  rationale: χώρα can mean region, land, or country depending on scope. Here 'region'
    best fits the likely territorial sense around Damascus without overstating it
    as a modern nation-state.
- source_word: καὶ ... καὶ
  chosen: And ... and
  alternatives:
  - Then ... and
  - So ... and
  lexicon: —
  rationale: The repeated καί marks simple narrative sequence. Retaining 'And' at
    the start reflects the Greek flow without sounding unnatural in English biblical
    narrative.
