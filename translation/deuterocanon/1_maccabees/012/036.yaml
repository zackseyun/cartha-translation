translation:
  text: and to fortify the walls of Jerusalem, and to raise a great height between
    the citadel and the city so as to separate it from the city, so that it might
    stand by itself, in order that they might neither buy nor sell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Acra,' the fortified stronghold in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: προφυῶσαι
  chosen: to fortify
  alternatives:
  - to build up in front
  - to strengthen further
  - to add outworks to
  lexicon: LSJ
  rationale: The infinitive is from a rare verb suggesting strengthening or adding
    defensive structure. In context with 'the walls of Jerusalem,' 'to fortify' best
    captures the military-construction sense in clear English without over-specifying
    the exact engineering detail.
- source_word: τείχη
  chosen: walls
  alternatives:
  - fortifications
  lexicon: LSJ
  rationale: The ordinary sense is 'walls'; 'fortifications' is possible but broader.
    Since the object is specifically Jerusalem's city walls, 'walls' is the more direct
    rendering.
- source_word: ὑψῶσαι ὕψος μέγα
  chosen: to raise a great height
  alternatives:
  - to build a great wall high
  - to raise a great barrier
  lexicon: LSJ
  rationale: The Greek is somewhat pleonastic, literally 'to raise a great height.'
    Retaining 'height' preserves the wording's emphasis on elevation without importing
    'wall' where the noun is not explicit in this clause.
- source_word: ἄκρας
  chosen: the citadel
  alternatives:
  - the Acra
  - the fortress
  lexicon: LSJ
  rationale: Ἄκρα here refers to the fortified stronghold in Jerusalem. 'Citadel'
    communicates the function in English. The more technical historical name 'Acra'
    is a viable alternative but less immediately transparent in the main text.
- source_word: εἰς τὸ διαχωρίσαι
  chosen: so as to separate
  alternatives:
  - in order to divide off
  - to cut off
  lexicon: LSJ
  rationale: The construction expresses purpose. 'Separate' is the most natural English
    equivalent and fits the political-military context.
- source_word: αὐτὴν τῆς πόλεως
  chosen: it from the city
  alternatives:
  - her from the city
  lexicon: LSJ
  rationale: The pronoun most naturally refers back to the citadel, which is grammatically
    feminine in Greek. English idiom uses 'it' for an inanimate stronghold.
- source_word: κατὰ μόνας
  chosen: by itself
  alternatives:
  - alone
  - in isolation
  lexicon: LSJ
  rationale: The phrase indicates isolation or separation. 'By itself' is idiomatic
    and suits the result clause.
- source_word: ὅπως μήτε ἀγοράζωσιν μήτε πωλῶσιν
  chosen: in order that they might neither buy nor sell
  alternatives:
  - so that they could neither buy nor sell
  lexicon: LSJ
  rationale: The clause expresses intended consequence/purpose. The plural subject
    is left implicit in Greek; English preserves that with 'they,' referring to those
    in the isolated citadel.
