translation:
  text: But Jonathan and those with him did not know until morning, for they saw the
    fires burning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the lights burning.' In context this likely refers to
      fires left burning in the camp.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔγνωσαν
  chosen: did not know
  alternatives:
  - did not realize
  - were unaware
  lexicon: BDAG
  rationale: A straightforward past negation of γινώσκω. 'Did not know' best preserves
    the simple verbal sense without adding interpretive nuance beyond the Greek.
- source_word: ἕως πρωί
  chosen: until morning
  alternatives:
  - until dawn
  - before morning
  lexicon: LSJ
  rationale: The phrase marks the limit of their ignorance. 'Until morning' is the
    most direct rendering; 'until dawn' is possible but slightly more interpretive.
- source_word: ἔβλεπον
  chosen: they saw
  alternatives:
  - they were seeing
  - they kept seeing
  lexicon: BDAG
  rationale: The imperfect likely gives background explanation for why they did not
    know. In idiomatic English, simple past 'they saw' communicates the sense clearly
    without awkwardness; the durative force is sufficiently conveyed by context.
- source_word: τὰ φῶτα
  chosen: the fires
  alternatives:
  - the lights
  - the campfires
  lexicon: LSJ
  rationale: Although literally 'the lights,' in this military-night context the referent
    is actual visible fires left burning. 'The fires' is clearer modern English while
    remaining anchored to the Greek. 'Campfires' is plausible but adds specificity
    not explicit in the text.
- source_word: καιόμενα
  chosen: burning
  alternatives:
  - being burned
  - still burning
  - ablaze
  lexicon: BDAG
  rationale: The participle describes the visible state of the fires. 'Burning' is
    the natural English equivalent and preserves the explanatory force of the clause.
- source_word: οἱ παρʼ αὐτοῦ
  chosen: those with him
  alternatives:
  - his men
  - those around him
  - his companions
  lexicon: LSJ
  rationale: The phrase denotes Jonathan's accompanying group. 'Those with him' is
    faithful and avoids importing a narrower military term like 'his men,' though
    the context is military.
