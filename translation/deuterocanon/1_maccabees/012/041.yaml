translation:
  text: And Jonathan went out to meet him with forty thousand chosen men for battle,
    and he came to Beth-shan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for battle formation' or 'for deployment'; the Greek phrase refers more
      literally to being drawn up in battle array.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - set out
  - marched out
  lexicon: LSJ
  rationale: The aorist of ἐξέρχομαι commonly means 'go out' or 'come out.' 'Went
    out' preserves the straightforward narrative movement without adding military
    nuance beyond what the context already supplies.
- source_word: εἰς ἀπάντησιν αὐτῷ
  chosen: to meet him
  alternatives:
  - for a meeting with him
  - to encounter him
  lexicon: LSJ
  rationale: This idiom regularly means going out to meet someone. 'To meet him' is
    natural English and accurately reflects the purposive force of εἰς + noun.
- source_word: ἐν τεσσεράκοντα χιλιάσιν
  chosen: with forty thousand
  alternatives:
  - among forty thousand
  - in forty thousand
  lexicon: LSJ
  rationale: 'Here ἐν with a numeral and accompanying personnel expression is best
    rendered instrumentally/associatively in English: Jonathan went accompanied by
    forty thousand men.'
- source_word: ἀνδρῶν
  chosen: men
  alternatives:
  - soldiers
  lexicon: LSJ
  rationale: The Greek explicitly says 'men.' While the context is military, 'soldiers'
    would interpret rather than translate; 'men' keeps closer to the source while
    the following phrase clarifies their martial role.
- source_word: ἐπιλεγμέναις
  chosen: chosen
  alternatives:
  - picked
  - selected
  lexicon: LSJ
  rationale: The participial adjective denotes men specially selected. 'Chosen' is
    concise, idiomatic, and preserves the elevated military sense.
- source_word: εἰς παρατάξιν
  chosen: for battle
  alternatives:
  - for deployment
  - for battle line
  - for arraying in formation
  lexicon: LSJ
  rationale: παράταξις can denote battle array or drawn-up formation. In this context,
    'for battle' communicates the military purpose clearly in modern English without
    awkwardness; more literal options are possible but less readable.
- source_word: ἦλθεν
  chosen: he came
  alternatives:
  - he went
  - he arrived
  lexicon: LSJ
  rationale: The subject remains Jonathan. 'He came' follows the Greek verb directly
    and suits the destination phrase that follows.
- source_word: εἰς Βεθσάν
  chosen: to Beth-shan
  alternatives:
  - to Bethshan
  - to Beth-shean
  lexicon: LSJ
  rationale: The Greek place name is transliterated. 'Beth-shan' is a standard English
    form and reflects the instruction to transliterate names rather than translate
    them.
