translation:
  text: 'And this is a copy of the letters that Jonathan wrote to the Spartans:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''letters'' (plural). The singular ''letter'' is used in English
      because the context presents the copy of one specific communication.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντίγραφον
  chosen: a copy
  alternatives:
  - copy
  - transcript
  - duplicate
  lexicon: LSJ
  rationale: The noun denotes a written copy or transcript. 'A copy' is natural modern
    English and fits the documentary context without sounding overly technical.
- source_word: ἐπιστολῶν
  chosen: the letter
  alternatives:
  - the letters
  - the epistle
  lexicon: LSJ
  rationale: Although the Greek form is plural ('letters'), the immediate context
    introduces the text of a single communication from Jonathan to the Spartans. English
    idiom prefers the singular here for the specific letter being reproduced. The
    plural sense is preserved as an alternative because the Greek morphology is plural.
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - sent
  - composed
  lexicon: LSJ
  rationale: The verb straightforwardly means 'wrote.' No contextual pressure justifies
    a more interpretive rendering.
- source_word: Ἰωνάθαν
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name, following the
    project's policy to transliterate names rather than translate them.
- source_word: Σπαρτιάταις
  chosen: the Spartans
  alternatives:
  - Spartans
  - the people of Sparta
  lexicon: LSJ
  rationale: The dative marks the recipients of the letter. 'To the Spartans' is the
    most direct and idiomatic rendering.
