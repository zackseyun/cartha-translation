translation:
  text: Arius, king of the Spartans, to Onias the high priest, greetings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Ἄρης could be transliterated more literally as 'Ares,' but in this
      historical setting it is taken as the royal name 'Arius.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄρης
  chosen: Arius
  alternatives:
  - Ares
  lexicon: LSJ
  rationale: As a personal name in an epistolary heading, it is best transliterated
    rather than translated. Although the Greek form matches the name of the god Ares,
    in this historical context it refers to the Spartan king customarily rendered
    'Arius.'
- source_word: βασιλεὺς
  chosen: king
  alternatives:
  - ruler
  lexicon: LSJ
  rationale: The standard political title is straightforward here and should be translated
    rather than transliterated.
- source_word: Σπαρτιατῶν
  chosen: of the Spartans
  alternatives:
  - of Sparta
  lexicon: LSJ
  rationale: The genitive plural denotes the people group, not merely the city as
    a place-name. 'King of the Spartans' reflects the Greek more precisely than 'king
    of Sparta.'
- source_word: Ὀνείᾳ
  chosen: to Onias
  alternatives:
  - for Onias
  lexicon: LSJ
  rationale: The dative in a letter address is naturally rendered with English 'to'.
- source_word: ἱερεῖ μεγάλῳ
  chosen: the high priest
  alternatives:
  - the great priest
  - high priest
  lexicon: LSJ
  rationale: This is the established and contextually correct rendering of the Jewish
    office. 'Great priest' would be overly literal and less idiomatic in English.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - hail
  lexicon: LSJ
  rationale: In epistolary formulae, χαίρειν conventionally means 'greetings' rather
    than the more literal verbal sense 'rejoice.'
