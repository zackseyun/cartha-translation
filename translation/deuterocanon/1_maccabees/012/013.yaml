lexical_decisions:
- source_word: ἀπρόσδεοι
  chosen: having no need
  alternatives:
  - being without need
  - not needing
  lexicon: LSJ
  rationale: The adjective means 'not in need of' or 'independent of.' In context
    the writers say they do not require the external supports just mentioned. 'Having
    no need' is idiomatic English and preserves the sense without overstating self-sufficiency.
- source_word: τούτων
  chosen: of these things
  alternatives:
  - of these
  - for these things
  lexicon: LSJ
  rationale: The genitive pronoun refers back to the preceding matters or supports.
    'Of these things' makes the reference explicit in English while staying close
    to the Greek.
- source_word: παράκλησιν
  chosen: encouragement
  alternatives:
  - comfort
  - consolation
  - exhortation
  lexicon: BDAG
  rationale: In this context the sense is inward support or strengthening derived
    from the sacred writings. 'Encouragement' fits modern English well and avoids
    the narrower emotional tone of 'comfort' or the more active sense 'exhortation.'
- source_word: τὰ βιβλία τὰ ἅγια
  chosen: the holy books
  alternatives:
  - the sacred books
  - the holy scriptures
  lexicon: LSJ
  rationale: Literally 'the holy books.' 'Holy books' is a transparent rendering of
    the Greek phrase. 'Scriptures' is possible, but 'books' better preserves the concrete
    wording of the source.
- source_word: τὰ ἐν ταῖς χερσὶν ἡμῶν
  chosen: that are in our hands
  alternatives:
  - in our possession
  - in our keeping
  lexicon: LSJ
  rationale: The phrase is literally spatial, 'in our hands,' and likely idiomatic
    for possession or ready access. Retaining the literal expression preserves the
    vividness of the Greek while remaining natural in English.
