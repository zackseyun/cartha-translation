translation:
  text: And all the nations around them sought to wipe them out, for they said, “They
    have no man ruling and helping them. Now then, let us make war against them, and
    remove their memory from among men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blot them out' for 'wipe them out'; the Greek verb conveys eradication.
    reason: lexical_alternative
  - marker: b
    text: Greek 'They have no man ruling and helping them'; alternatively, 'They have
      no ruler to lead and help them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'erase their remembrance from among humanity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήτησαν
  chosen: sought
  alternatives:
  - tried
  - planned
  - desired
  lexicon: LSJ
  rationale: The aorist of ζητέω here introduces intent/purpose rather than mere mental
    desire. 'Sought' preserves the formal sense and fits the infinitive complement
    'to wipe them out.'
- source_word: πάντα τὰ ἔθνη τὰ κύκλῳ αὐτῶν
  chosen: all the nations around them
  alternatives:
  - all the surrounding Gentiles
  - all the peoples around them
  lexicon: LSJ
  rationale: ἔθνη can mean 'nations' or 'Gentiles.' In this historical setting it
    refers to surrounding peoples/polities hostile to the Jews. 'Nations' is the more
    neutral and contextually natural English choice.
- source_word: ἐκτρῖψαι
  chosen: to wipe them out
  alternatives:
  - to destroy them
  - to blot them out
  lexicon: LSJ
  rationale: The verb conveys eradication or rubbing out. 'Wipe them out' is idiomatic
    modern English that preserves the force of attempted annihilation without becoming
    paraphrastic.
- source_word: ἄνδρα ἄρχοντα
  chosen: man ruling
  alternatives:
  - male ruler
  - leader
  - man as ruler
  lexicon: LSJ
  rationale: The Greek explicitly has ἄνδρα ('man') plus participle ἄρχοντα ('ruling').
    Following the project's gender-accurate policy, the masculine singular is retained
    rather than neutralized to 'leader' alone.
- source_word: βοηθοῦντα
  chosen: helping
  alternatives:
  - coming to their aid
  - supporting
  - defending
  lexicon: LSJ
  rationale: The participle is coordinated with ἄρχοντα and describes active support.
    'Helping' is simple and direct, preserving the participial structure.
- source_word: πολεμήσωμεν
  chosen: let us make war against them
  alternatives:
  - let us fight them
  - let us wage war against them
  lexicon: LSJ
  rationale: The hortatory subjunctive calls for organized hostilities, not merely
    a skirmish. 'Make war against' preserves that broader military sense.
- source_word: ἐξαροῦμεν ἐξ ἀνθρώπων τὸ μνημόσυνον αὐτῶν
  chosen: remove their memory from among men
  alternatives:
  - erase their remembrance from among mankind
  - cut off their memorial from humanity
  lexicon: LSJ
  rationale: μνημόσυνον denotes remembrance/memorial. The phrase expresses total obliteration
    of their remembered existence. 'Remove their memory from among men' is faithful
    and readable, while preserving the masculine generic ἀνθρώπων as 'men' per gender-accurate
    policy.
