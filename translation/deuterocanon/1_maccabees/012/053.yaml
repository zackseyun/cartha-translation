theological_decisions:
- issue: Gendered language in hostile speech
  chosen_reading: Retain 'man' and 'men' in the main text
  alternative_readings:
  - They have no leader... remove their memory from among humanity
  rationale: The Greek uses explicitly masculine terms (ἄνδρα; ἀνθρώπων in a generic
    human sense). Per doctrine, gender-accurate renderings are preferred over neutralization
    unless context demands otherwise. Here the hostile speakers emphasize the absence
    of a male ruler, and the idiom about memory 'from among men' is preserved.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
