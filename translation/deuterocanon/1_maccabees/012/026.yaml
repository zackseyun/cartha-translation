translation:
  text: And he sent scouts into their camp, and they returned and reported to him
    that this is how they are arranging to fall upon them by night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thus they are drawn up to attack them at night.' The Greek τάσσονται
      can suggest being arranged or deployed in formation, not only making plans.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard narrative aorist of ἀποστέλλω; 'sent' is natural modern English
    and sufficiently formal.
- source_word: κατασκόπους
  chosen: scouts
  alternatives:
  - spies
  - reconnaissance men
  lexicon: LSJ
  rationale: The term denotes persons sent to observe an enemy position. 'Scouts'
    fits the military context and avoids the potentially overdramatic nuance of 'spies,'
    while still conveying reconnaissance.
- source_word: παρεμβολήν
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: LSJ
  rationale: In military context παρεμβολή refers to a camp or encampment. 'Camp'
    is concise and idiomatic.
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - announced
  - told
  lexicon: LSJ
  rationale: The verb indicates bringing back a report. 'Reported' preserves the reconnaissance
    setting better than the more generic 'told'.
- source_word: Οὕτως τάσσονται
  chosen: this is how they are arranging
  alternatives:
  - thus they are drawn up
  - they are positioning themselves in this way
  - they are preparing in this way
  lexicon: LSJ
  rationale: τάσσω in the middle/passive can mean arrange oneself, be drawn up, or
    be deployed. Here it introduces the enemy's tactical preparation for a night attack.
    'This is how they are arranging' preserves the present tense and the sense of
    tactical disposition without overcommitting to a purely static formation.
- source_word: ἐπιπεσεῖν
  chosen: to fall upon
  alternatives:
  - to attack
  - to rush upon
  lexicon: LSJ
  rationale: The infinitive conveys hostile assault. 'Fall upon' preserves the vivid
    military force of the Greek better than the flatter 'attack.'
- source_word: τὴν νύκτα
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: LSJ
  rationale: The accusative of time can be rendered several ways. 'By night' is concise,
    idiomatic, and suits the military tone.
