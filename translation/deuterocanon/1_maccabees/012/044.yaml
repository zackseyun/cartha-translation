translation:
  text: And he said to Jonathan, “Why have you cut off all this people, when no war
    is pressing upon us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'Why have you cut off all this people, with war not being
      present to us?' The wording is somewhat abrupt in Greek; the translation smooths
      the idiom but preserves the sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκοψας
  chosen: have you cut off
  alternatives:
  - have you struck down
  - have you destroyed
  - have you routed
  lexicon: LSJ
  rationale: The aorist of κόπτω literally means 'cut' and in military/population
    contexts can extend to striking down or cutting off. 'Cut off' preserves the vivid
    metaphor and leaves the exact nuance broad enough for the context, without overcommitting
    to total slaughter if the phrase refers more generally to decimation or crippling
    defeat.
- source_word: πάντα τὸν λαὸν τοῦτον
  chosen: all this people
  alternatives:
  - all these people
  - this whole people
  - all this army
  lexicon: LSJ
  rationale: λαός normally means 'people' rather than specifically 'army.' The singular
    with demonstrative is naturally rendered 'all this people' or 'this whole people.'
    'All this people' stays close to the Greek while remaining intelligible in English.
- source_word: πολέμου μὴ ἐνεστῶτος ἡμῖν
  chosen: when no war is pressing upon us
  alternatives:
  - since war is not upon us
  - though no war confronts us
  - when we are not in a state of war
  lexicon: LSJ
  rationale: ἐνεστῶτος from ἐνίστημι can mean 'being present,' 'having come upon,'
    or 'pressing.' With πολέμου and dative ἡμῖν, the sense is that war is not presently
    upon or confronting them. 'Pressing upon us' conveys the immediacy of the Greek
    idiom in natural English.
- source_word: Τίνα τί
  chosen: Why
  alternatives:
  - For what reason
  - Why then
  lexicon: LSJ
  rationale: 'The transmitted text has an awkward interrogative sequence. In context
    it functions as a request for reason: ''why?'' A simple ''Why'' best reflects
    the sense without reproducing Greek roughness that would confuse English readers.'
- source_word: τῷ Ἰωναθάν
  chosen: to Jonathan
  rationale: Dative indirect object; standard transliteration of the personal name
    is retained per project policy.
