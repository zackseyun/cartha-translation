translation:
  text: And when the adversaries heard that Jonathan and those with him were prepared
    for war, they were afraid and lost heart, and they lit fires in their camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'they fixed/froze their heart,' an idiom expressing discouragement
      or loss of courage.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ὑπεναντίοι
  chosen: the adversaries
  alternatives:
  - the enemies
  - the opponents
  lexicon: LSJ
  rationale: The term denotes those set against Jonathan. 'Adversaries' preserves
    the oppositional sense without over-specifying military hostility beyond the context,
    though the war setting makes 'enemies' possible.
- source_word: ἡτοίμασται
  chosen: were prepared
  alternatives:
  - had made ready
  - were ready
  lexicon: LSJ
  rationale: Perfect/passive-middle form conveys a state of readiness. 'Were prepared'
    captures the resulting condition in natural English.
- source_word: οἱ παρʼ αὐτοῦ
  chosen: those with him
  alternatives:
  - his men
  - those around him
  lexicon: LSJ
  rationale: The phrase literally refers to those alongside Jonathan. 'Those with
    him' is faithful and avoids adding 'men' where the Greek does not explicitly do
    so.
- source_word: εἰς πόλεμον
  chosen: for war
  alternatives:
  - for battle
  - for combat
  lexicon: LSJ
  rationale: The phrase indicates readiness directed toward warfare. 'For war' is
    the most direct rendering; 'for battle' would narrow the scope slightly.
- source_word: ἐφοβήθησαν
  chosen: they were afraid
  alternatives:
  - they feared
  - they became afraid
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist passive/deponent. 'They were
    afraid' is idiomatic modern English.
- source_word: ἔπηξαν τὴν καρδίαν αὐτῶν
  chosen: lost heart
  alternatives:
  - their heart froze
  - they became fainthearted
  lexicon: LSJ
  rationale: Literally the idiom suggests the heart congealing or freezing from fear.
    'Lost heart' communicates the idiomatic sense clearly in English, while the more
    literal image is preserved as an alternative.
- source_word: ἀνέκαυσαν πυρὰς
  chosen: they lit fires
  alternatives:
  - they kindled fires
  - they built campfires
  lexicon: LSJ
  rationale: The verb means to kindle or light, and πυράς refers to fires. 'Lit fires'
    is clear and natural.
- source_word: ἐν τῇ παρεμβολῇ αὐτῶν
  chosen: in their camp
  alternatives:
  - in their encampment
  lexicon: LSJ
  rationale: παρεμβολή in military context is 'camp' or 'encampment.' 'Camp' is concise
    and natural in English.
