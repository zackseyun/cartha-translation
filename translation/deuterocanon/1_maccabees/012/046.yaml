lexical_decisions:
- source_word: ἐμπιστεύσας
  chosen: trusting
  alternatives:
  - having trusted
  - placing confidence in
  lexicon: BDAG
  rationale: Aorist participle from ἐμπιστεύω/ἐμπιστεύομαι expressing confidence placed
    in someone. 'Trusting him' is natural English and preserves the causal nuance
    leading into the main verb.
- source_word: ἐποίησεν καθὼς εἶπεν
  chosen: he did as he said
  alternatives:
  - he did as he had said
  - he acted as he said
  lexicon: BDAG
  rationale: The phrase straightforwardly indicates action in accordance with the
    prior statement. 'He did as he said' is idiomatic and sufficiently formal; 'had
    said' is possible but not required by the Greek form here.
- source_word: ἐξαπέστειλεν
  chosen: sent out
  alternatives:
  - dispatched
  - sent forth
  lexicon: BDAG
  rationale: The compound verb intensifies simple sending and fits a military context.
    'Sent out' is clear modern English without becoming overly interpretive.
- source_word: τὰς δυνάμεις
  chosen: the forces
  alternatives:
  - the troops
  - the army
  lexicon: BDAG
  rationale: In military narrative δυνάμεις refers to armed forces/troops. 'The forces'
    stays close to the Greek plural and avoids over-specifying whether the whole army
    or a contingent is meant.
- source_word: ἀπῆλθον
  chosen: went away
  alternatives:
  - departed
  - went
  lexicon: BDAG
  rationale: The verb denotes departure. 'Went away' preserves the sense of leaving
    from the current location more explicitly than simple 'went.'
- source_word: εἰς γῆν Ἰούδα
  chosen: into the land of Judah
  alternatives:
  - to the land of Judah
  - into Judea
  lexicon: BDAG
  rationale: γῆ with a proper name commonly means 'land of.' 'Into the land of Judah'
    is a transparent rendering of the Greek; 'Judea' is possible but slightly more
    interpretive and less formally tied to the wording.
