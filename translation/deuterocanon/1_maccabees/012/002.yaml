translation:
  text: And he sent letters to the Spartans and to other places in the same terms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to the same effect' or 'likewise'; the Greek phrase indicates that
      these letters matched the content of the one just mentioned.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: BDAG
  rationale: Aorist active of ἀποστέλλω, straightforwardly indicating the act of sending.
    'Sent' is natural modern English and sufficiently formal.
- source_word: ἐπιστολὰς
  chosen: letters
  alternatives:
  - a letter
  - written messages
  lexicon: BDAG
  rationale: Plural accusative clearly indicates multiple letters. 'Letters' is the
    standard and most transparent rendering.
- source_word: πρὸς Σπαρτιάτας
  chosen: to the Spartans
  alternatives:
  - for the Spartans
  lexicon: BDAG
  rationale: With verbs of sending, πρός commonly marks the recipients/destination.
    'To the Spartans' best reflects the sense in idiomatic English.
- source_word: τόπους ἑτέρους
  chosen: other places
  alternatives:
  - other regions
  - other localities
  lexicon: BDAG
  rationale: τόπους literally means 'places'; ἑτέρους adds 'other.' Since no more
    specific political or geographic nuance is explicit here, 'other places' stays
    closest to the Greek without over-interpreting.
- source_word: κατὰ ταὐτά
  chosen: in the same terms
  alternatives:
  - likewise
  - to the same effect
  - in the same way
  lexicon: BDAG
  rationale: The phrase indicates correspondence of content/form with what has just
    been described. 'In the same terms' preserves that the letters to other recipients
    matched the same wording or substance, more precisely than the looser 'likewise'.
