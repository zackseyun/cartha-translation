translation:
  text: And Tryphon sought to rule Asia, to put on the crown, and to lay hands on
    Antiochus the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Asia” here refers to the Hellenistic kingdom in view, not the modern continent.
    reason: cultural_note
  - marker: b
    text: Or “to attack Antiochus the king”; literally, “to stretch out hands against
      Antiochus the king.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήτησεν
  chosen: sought
  alternatives:
  - desired
  - attempted
  lexicon: BDAG
  rationale: The aorist of ζητέω here denotes an intention or aim rather than mere
    inquiry. “Sought” preserves that purposive sense without overstating success.
- source_word: βασιλεῦσαι
  chosen: to rule
  alternatives:
  - to become king
  - to reign
  lexicon: LSJ
  rationale: The infinitive from βασιλεύω can mean to be king or to reign. “To rule”
    is clear modern English and fits the political ambition in context; “become king”
    is possible but is partly expressed already by the following phrase about putting
    on the crown.
- source_word: τῆς Ἀσίας
  chosen: Asia
  alternatives:
  - the province of Asia
  lexicon: LSJ
  rationale: In 1 Maccabees this refers to the Seleucid realm/Asia in Hellenistic
    usage, not the modern continent. The simple transliteration “Asia” best matches
    the source while avoiding over-interpretation in the main text.
- source_word: περιθέσθαι τὸ διάδημα
  chosen: to put on the crown
  alternatives:
  - to place the diadem on himself
  - to wear the royal headband
  lexicon: LSJ
  rationale: διάδημα is specifically the royal diadem/crown. “Put on the crown” is
    idiomatic English and communicates assumption of kingship. “Diadem” is more formal
    but less accessible.
- source_word: ἐκτεῖναι χεῖρας ἐπ’ Ἀντίοχον
  chosen: to lay hands on Antiochus
  alternatives:
  - to attack Antiochus
  - to reach out against Antiochus
  lexicon: LSJ
  rationale: The idiom literally means to stretch out hands against someone and commonly
    conveys hostile action. “Lay hands on” preserves the idiomatic force and leaves
    the exact mode of violence broad, which suits the Greek.
- source_word: τὸν βασιλέα
  chosen: the king
  lexicon: LSJ
  rationale: The appositional title identifies Antiochus' status and should be retained
    explicitly.
