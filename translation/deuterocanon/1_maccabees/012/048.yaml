translation:
  text: But when Jonathan entered Ptolemais, the men of Ptolemais shut the gates and
    seized him, and they killed with the sword all who had come with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'all those who had come together with him.' The context
      of entering the city supports 'come in with him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  chosen: But when
  alternatives:
  - And when
  - Now when
  lexicon: LSJ
  rationale: Marks a narrative transition with temporal force; 'But when' preserves
    both the connective and the adversative turn in the plot.
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - went into
  - came into
  lexicon: LSJ
  rationale: Simple aorist of motion into a place; 'entered' is natural modern English
    and suitably formal.
- source_word: Πτολεμαΐδα
  chosen: Ptolemais
  rationale: Standard transliteration of the place name, following the project's policy
    to transliterate names.
- source_word: ἀπέκλεισαν
  chosen: shut
  alternatives:
  - closed
  - barred
  lexicon: LSJ
  rationale: The verb means to close off or shut. 'Shut the gates' is idiomatic and
    conveys the hostile action without overinterpreting it as physically barring,
    though that is implied.
- source_word: οἱ Πτολεμαεῖται
  chosen: the men of Ptolemais
  alternatives:
  - the Ptolemaeans
  - the people of Ptolemais
  lexicon: LSJ
  rationale: The ethnicon refers to the inhabitants/citizens of the city. 'The men
    of Ptolemais' is concise and natural in a military-political narrative; 'Ptolemaeans'
    is less accessible.
- source_word: συνέλαβον
  chosen: seized
  alternatives:
  - arrested
  - captured
  lexicon: LSJ
  rationale: The verb denotes taking hold of or apprehending. 'Seized' fits the sudden
    treacherous action and avoids importing formal legal process implied by 'arrested'.
- source_word: πάντας τοὺς συνελθόντας μετʼ αὐτοῦ
  chosen: all who had come in with him
  alternatives:
  - all those who had come with him
  - all his companions who had come with him
  lexicon: LSJ
  rationale: The participle refers to those who came together with Jonathan into the
    city. 'Come in with him' makes explicit the local sense supplied by the context
    of entering Ptolemais.
- source_word: ἀπέκτειναν ἐν ῥομφαίᾳ
  chosen: they killed with the sword
  alternatives:
  - they put to death by the sword
  - they slew with the sword
  lexicon: LSJ
  rationale: A standard idiom for violent execution in battle or massacre. 'Killed
    with the sword' is clear modern English; 'slew' is archaic.
