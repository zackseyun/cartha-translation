translation:
  text: When the sun had set, Jonathan commanded those with him to stay awake and
    remain at their weapons, to be ready for battle through the whole night; and he
    posted sentries around the camp.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς δὲ ἔδυ ὁ ἥλιος
  chosen: When the sun had set
  alternatives:
  - As the sun was setting
  - When the sun went down
  lexicon: LSJ
  rationale: The clause marks the onset of evening. 'When the sun had set' is natural
    modern English and fits the aorist sense of completed sunset before Jonathan's
    command.
- source_word: ἐπέταξεν
  chosen: commanded
  alternatives:
  - ordered
  - gave orders to
  lexicon: LSJ
  rationale: The verb denotes issuing an authoritative order. 'Commanded' preserves
    the military force without unnecessary expansion.
- source_word: τοῖς παρʼ αὐτοῦ
  chosen: those with him
  alternatives:
  - his men
  - those around him
  lexicon: LSJ
  rationale: Literally 'those beside/with him.' 'Those with him' stays close to the
    Greek while naturally implying his accompanying force. 'His men' is possible but
    slightly more interpretive.
- source_word: γρηγορεῖν
  chosen: to stay awake
  alternatives:
  - to keep watch
  - to be vigilant
  lexicon: LSJ
  rationale: The basic sense is wakefulness/watchfulness. Because the verse separately
    mentions posted sentries, 'stay awake' avoids collapsing this command into the
    later guard-posting action.
- source_word: εἶναι ἐπὶ τοῖς ὅπλοις
  chosen: remain at their weapons
  alternatives:
  - be at arms
  - stand by their arms
  - be under arms
  lexicon: LSJ
  rationale: The idiom conveys readiness with weapons at hand. 'Remain at their weapons'
    is clear and idiomatic in modern English while preserving the concrete military
    image.
- source_word: ἑτοιμάζεσθαι εἰς πόλεμον
  chosen: to be ready for battle
  alternatives:
  - to prepare for war
  - to make ready for battle
  lexicon: LSJ
  rationale: The infinitive expresses purpose/result of the command. 'Be ready for
    battle' is concise and suits the immediate tactical context better than the broader
    'war.'
- source_word: διʼ ὅλης τῆς νυκτός
  chosen: through the whole night
  alternatives:
  - all night
  - throughout the night
  lexicon: LSJ
  rationale: This phrase emphasizes the full duration. 'Through the whole night' preserves
    that fullness slightly more explicitly than 'all night.'
- source_word: ἐξέβαλεν προφύλακας
  chosen: he posted sentries
  alternatives:
  - he set out advance guards
  - he stationed guards
  lexicon: LSJ
  rationale: Although literally 'threw out/put out guards,' the military idiom means
    to deploy outposts or sentries. 'Posted sentries' is idiomatic and contextually
    precise.
- source_word: κύκλῳ τῆς παρεμβολῆς
  chosen: around the camp
  alternatives:
  - around the encampment
  - in a circle around the camp
  lexicon: LSJ
  rationale: παρεμβολή here is the military camp/encampment. 'Around the camp' is
    straightforward and captures κύκλῳ without awkwardness.
