translation:
  text: And Simon rebuilt Adida in the Shephelah, and fortified it with gates and
    bars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'built Adida'; the Greek verb can mean either 'built' or 'rebuilt/restored'
      depending on context.
    reason: lexical_alternative
  - marker: b
    text: '''Shephelah'' is the Judean foothill region; alternatively, ''the lowland.'''
    reason: cultural_note
lexical_decisions:
- source_word: ᾠκοδόμησεν
  chosen: rebuilt
  alternatives:
  - built
  - constructed
  lexicon: LSJ
  rationale: Although the verb can simply mean 'built,' in a military-administrative
    context involving an already known site, 'rebuilt' naturally conveys restoration
    or strengthening of an existing town. This fits the surrounding narrative better
    than a de novo founding sense while remaining within the verb's semantic range.
- source_word: τὴν Ἀδιδὰ
  chosen: Adida
  alternatives:
  - Adidah
  rationale: Personal and place names are transliterated rather than translated. 'Adida'
    is a straightforward transliteration of Ἀδιδά.
- source_word: ἐν τῇ σεφηλά
  chosen: in the Shephelah
  alternatives:
  - in the lowland
  - in the plain
  lexicon: LSJ
  rationale: σεφηλά reflects the geographic term Shephelah, the Judean foothill region.
    Retaining the proper regional name is more precise than flattening it to 'lowland'
    or 'plain,' while still being readable in English.
- source_word: ὠχύρωσεν
  chosen: fortified
  alternatives:
  - made secure
  - strengthened
  lexicon: LSJ
  rationale: The verb denotes making a place strong or defensible. 'Fortified' is
    the most natural military term in English for this context.
- source_word: θύρας
  chosen: gates
  alternatives:
  - doors
  lexicon: LSJ
  rationale: In a city-fortification context, 'gates' is the appropriate rendering
    rather than the more domestic 'doors.'
- source_word: μοχλούς
  chosen: bars
  alternatives:
  - bolts
  - crossbars
  lexicon: LSJ
  rationale: The term refers to securing bars or bolts used with gates. 'Bars' is
    concise and idiomatic in English, while preserving the fortification imagery.
