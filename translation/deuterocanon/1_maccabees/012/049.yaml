translation:
  text: And Tryphon sent forces and cavalry into Galilee, into the great plain, to
    destroy all those who were with Jonathan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all those on Jonathan’s side.' The Greek phrase literally reads 'all
      those beside/with Jonathan' and likely refers to his supporters or men.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: The aorist verb straightforwardly denotes sending out troops. 'Sent'
    is natural modern English and sufficiently formal for the military context.
- source_word: δυνάμεις
  chosen: forces
  alternatives:
  - troops
  - armed forces
  lexicon: LSJ
  rationale: In this context the plural refers to military units rather than abstract
    'powers.' 'Forces' preserves the breadth of the term without over-specifying infantry.
- source_word: ἵππον
  chosen: cavalry
  alternatives:
  - horsemen
  - horse troops
  lexicon: LSJ
  rationale: Although singular in form, it functions collectively for mounted troops.
    'Cavalry' gives the collective military sense idiomatically in English.
- source_word: εἰς Γαλιλαίαν
  chosen: into Galilee
  alternatives:
  - to Galilee
  lexicon: LSJ
  rationale: '''Into Galilee'' reflects εἰς naturally and fits the movement of troops
    into the region.'
- source_word: εἰς τὸ πεδίον τὸ μέγα
  chosen: into the great plain
  alternatives:
  - to the great plain
  - into the broad plain
  lexicon: LSJ
  rationale: The repeated εἰς marks destination. πεδίον is 'plain'; τὸ μέγα is attributive,
    'the great plain.' The phrase is kept fairly literal because the text names a
    known geographic area without further explanation.
- source_word: τοῦ ἀπολέσαι
  chosen: to destroy
  alternatives:
  - to wipe out
  - to kill
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose. 'Destroy' is broad enough
    to cover lethal military elimination without adding colloquial force.
- source_word: πάντας τοὺς παρὰ Ἰωνάθου
  chosen: all those who were with Jonathan
  alternatives:
  - all those on Jonathan's side
  - all those from Jonathan
  lexicon: LSJ
  rationale: παρὰ with a personal name here denotes association or allegiance. 'Those
    who were with Jonathan' is the most transparent rendering and avoids over-interpreting
    the exact nuance as merely geographic origin.
