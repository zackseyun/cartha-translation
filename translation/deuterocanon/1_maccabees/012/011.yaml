theological_decisions:
- issue: Gendered familial term ἀδελφῶν
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - kindred
  rationale: The Greek is grammatically masculine and functions as covenantal/familial-political
    language. Following the project's gender-accurate policy, the masculine term is
    retained rather than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Cultic language of sacrifices and prayers
  chosen_reading: retain explicit sacrificial wording
  alternative_readings:
  - generalize to offerings or worship
  rationale: The Greek specifically mentions sacrifices and prayers; broadening to
    generic worship would obscure the temple-cultic setting and import less precise
    language than the source warrants.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
