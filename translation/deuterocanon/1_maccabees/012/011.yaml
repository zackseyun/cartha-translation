translation:
  text: Therefore, at all times we continually remember you at the festivals and on
    the other appointed days, when we offer sacrifices and in our prayers, as it is
    right and fitting to remember brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the other proper/prescribed days.' The Greek καθηκούσαις can denote
      days that are fitting, customary, or appointed for observance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδιαλείπτως
  chosen: continually
  alternatives:
  - unceasingly
  - without interruption
  lexicon: BDAG
  rationale: Conveys persistent regularity without sounding overly wooden in English.
    In context with 'at all times,' 'continually' avoids awkward redundancy while
    preserving emphasis.
- source_word: ἑορταῖς
  chosen: festivals
  alternatives:
  - feasts
  lexicon: LSJ
  rationale: Refers to religious feast occasions. 'Festivals' is clear modern English;
    'feasts' is possible but can sound narrower or more traditional than the context
    requires.
- source_word: λοιπαῖς καθηκούσαις ἡμέραις
  chosen: the other appointed days
  alternatives:
  - the other proper days
  - the remaining customary days
  - the other prescribed days
  lexicon: LSJ
  rationale: καθηκούσαις carries the sense of what is fitting, due, or appointed in
    context. With ἡμέραις and alongside festivals, it most naturally refers to other
    observance days appropriate for worship/remembrance.
- source_word: μιμνησκόμεθα ὑμῶν
  chosen: we remember you
  alternatives:
  - we make mention of you
  - we keep you in mind
  lexicon: BDAG
  rationale: Straightforward rendering of the middle verb with genitive object. The
    context of sacrifices and prayers supports active remembrance rather than merely
    mental recollection.
- source_word: ἐφʼ ὧν
  chosen: when
  alternatives:
  - on which occasions
  - during which
  lexicon: LSJ
  rationale: Idiomatic temporal rendering in English. The phrase links remembrance
    to the occasions of offering sacrifices and prayer.
- source_word: προσφέρομεν θυσιῶν
  chosen: we offer sacrifices
  alternatives:
  - we present sacrifices
  lexicon: BDAG
  rationale: Natural English for cultic offering language. The genitive after προσφέρω
    is idiomatic in Greek; 'offer sacrifices' best captures the sense.
- source_word: προσευχαῖς
  chosen: our prayers
  alternatives:
  - the prayers
  - prayer
  lexicon: BDAG
  rationale: The possessive is not explicit, but 'in our prayers' is idiomatic English
    and reflects the communal first-person setting without adding substantial meaning.
- source_word: ὡς δέον ἐστὶν καὶ πρέπον
  chosen: as it is right and fitting
  alternatives:
  - as is necessary and proper
  - as it ought to be and is appropriate
  lexicon: LSJ
  rationale: Preserves the paired ethical/propriety emphasis of δέον and πρέπον in
    natural English.
- source_word: ἀδελφῶν
  chosen: brothers
  alternatives:
  - brothers and sisters
  - kinsmen
  lexicon: BDAG
  rationale: Per project policy, render the masculine form accurately. Here it reflects
    the diplomatic and familial language between allied peoples; 'brothers' preserves
    the source wording and rhetorical force.
