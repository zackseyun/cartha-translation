lexical_decisions:
- source_word: ἀπροσδεεῖς
  chosen: having no need
  alternatives:
  - being without need
  - not needing
  lexicon: LSJ
  rationale: The adjective means 'having no need of, independent of.' In context Jonathan
    says they do not require 'these things' from Sparta, so 'having no need' preserves
    the sense without sounding wooden.
- source_word: τούτων
  chosen: these things
  alternatives:
  - these
  - such things
  lexicon: LSJ
  rationale: The pronoun is neuter plural and refers back generally to the proposed
    supports or tokens of friendship mentioned in context. 'These things' is the most
    transparent rendering.
- source_word: παράκλησιν
  chosen: encouragement
  alternatives:
  - comfort
  - consolation
  - exhortation
  lexicon: BDAG
  rationale: In this context the sense is the strengthening or comfort derived from
    the sacred writings. 'Encouragement' communicates that support in natural English
    while avoiding overly narrow 'exhortation.'
- source_word: τὰ βιβλία τὰ ἅγια
  chosen: the holy books
  alternatives:
  - the sacred books
  - the holy scriptures
  lexicon: LSJ
  rationale: Literally 'the holy books.' 'Holy books' stays close to the Greek and
    fits the Second Temple Jewish setting; 'scriptures' is possible but slightly more
    interpretive.
- source_word: τὰ ἐν ταῖς χερσὶν ἡμῶν
  chosen: that are in our hands
  alternatives:
  - in our possession
  - in our keeping
  lexicon: LSJ
  rationale: The phrase is literally 'in our hands.' Retaining the idiom preserves
    the concrete image, while still being clear in English as a way of expressing
    possession or ready access.
