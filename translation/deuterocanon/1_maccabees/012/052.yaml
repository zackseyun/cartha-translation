translation:
  text: And they all came in peace into the land of Judah, and they mourned for Jonathan
    and those with him, and they were greatly afraid; and Israel mourned with great
    mourning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Israel mourned a great mourning.' The Greek uses an emphatic cognate
      expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον
  chosen: came
  alternatives:
  - arrived
  - went
  lexicon: LSJ
  rationale: Aorist of ἔρχομαι; 'came' is the natural narrative rendering in English
    and fits the movement back into Judah from the prior context.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all of them
  - all
  lexicon: LSJ
  rationale: Explicitly preserves the distributive force of the Greek subject.
- source_word: μετʼ εἰρήνης
  chosen: in peace
  alternatives:
  - peacefully
  - safely
  lexicon: LSJ
  rationale: The prepositional phrase is kept fairly literally. 'In peace' preserves
    both the idiomatic sense of safe return and the formal shape of the Greek.
- source_word: γῆν Ἰούδα
  chosen: the land of Judah
  alternatives:
  - Judah
  - the land of Judea
  lexicon: LSJ
  rationale: γῆ with a proper name is naturally 'land of.' 'Judah' is preferred over
    'Judea' here because the Greek uses Ἰούδα, and the phrase has a traditional territorial
    sense rather than a later Roman provincial nuance.
- source_word: ἐπένθησαν
  chosen: they mourned
  alternatives:
  - they lamented
  - they grieved
  lexicon: LSJ
  rationale: The verb denotes mourning, especially for the dead or lost. 'Mourned'
    best matches the solemn public sense here.
- source_word: τὸν Ἰωνάθαν
  chosen: for Jonathan
  alternatives:
  - Jonathan
  lexicon: LSJ
  rationale: English idiom normally supplies 'for' after 'mourned' to express the
    object of grief.
- source_word: τοὺς μετʼ αὐτοῦ
  chosen: those with him
  alternatives:
  - those who were with him
  - his companions
  lexicon: LSJ
  rationale: A close rendering that preserves the open reference to Jonathan's associates
    without over-interpreting their status.
- source_word: ἐφοβήθησαν σφόδρα
  chosen: they were greatly afraid
  alternatives:
  - they feared greatly
  - they were very afraid
  lexicon: LSJ
  rationale: This keeps both the passive/deponent verbal sense and the intensifier
    σφόδρα. 'Greatly afraid' preserves the gravity of the reaction.
- source_word: ἐπένθησεν Ἰσραὴλ πένθος μέγα
  chosen: Israel mourned with great mourning
  alternatives:
  - Israel mourned a great mourning
  - Israel mourned greatly
  lexicon: LSJ
  rationale: The Greek uses a cognate accusative construction for emphasis. 'Mourned
    with great mourning' preserves that emphatic form better than the smoother but
    flatter 'mourned greatly.'
