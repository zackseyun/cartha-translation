id: 1MA.16.20
reference: 1 Maccabees 16:20
source:
  edition: lxx-swete-1909
  text: καὶ ἑτέρους ἀπέστειλεν καταλαβέσθαι τὴν Ἰερουσαλὴμ καὶ τὸ ὄρος τοῦ ἱεροῦ.
  language: Greek
  pages:
  - 684
  confidence: high
  validation: agree
translation:
  text: And he sent others to seize Jerusalem and the hill of the sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the temple hill' or 'the Temple Mount.' The Greek
      reads literally 'the hill of the sanctuary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑτέρους
  chosen: others
  alternatives:
  - other men
  - some others
  lexicon: LSJ
  rationale: Indefinite plural referring to additional agents distinct from those
    previously mentioned. 'Others' is the most natural concise English rendering.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard narrative verb for sending persons on a mission. 'Sent' is clear
    modern English and sufficiently formal.
- source_word: καταλαβέσθαι
  chosen: to seize
  alternatives:
  - to capture
  - to take possession of
  lexicon: LSJ
  rationale: In this military-political context, the infinitive denotes taking control
    by force or stratagem. 'Seize' best conveys the hostile, sudden action without
    over-specifying method.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: τὸ ὄρος τοῦ ἱεροῦ
  chosen: the hill of the sanctuary
  alternatives:
  - the temple hill
  - the mount of the sanctuary
  - the temple mount
  lexicon: LSJ
  rationale: ὄρος is literally 'mountain/hill,' and ἱερόν refers to the sanctuary/temple
    precinct. 'Hill of the sanctuary' preserves the Greek imagery and relation more
    transparently than the more interpretive conventional term 'Temple Mount,' while
    remaining understandable.
