id: 1MA.16.2
reference: 1 Maccabees 16:2
source:
  edition: lxx-swete-1909
  text: καὶ ἐκάλεσεν Α Σίμων τοὺς δύο υἱοὺς αὐτοῦ τοὺς πρεσβυτέρους Ἰούδαν καὶ Ἰωάννην,
    καὶ εἶπεν αὐτοῖς Ἐγὼ καὶ οἱ ἀδελφοί μου καὶ ὁ οἶκος τοῦ πατρός μου ἐπολεμήσαμεν
    τοὺς πολέμους Ἰσραὴλ ἀπὸ νεότητος ἕως τῆς σήμερον ἡμέρας, καὶ εὐώδωθη ἐν ταῖς
    χερσὶν ἡμῶν ῥύσασθαι τὸν Ἰσραὴλ πλεονάκις.
  language: Greek
  pages:
  - 682
  confidence: high
  validation: agree
translation:
  text: And Simon called his two elder sons, Judas and John, and said to them, “I
    and my brothers and my father’s house have fought the wars of Israel from youth
    until this day, and it has prospered in our hands to deliver Israel many times.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, “we have succeeded in delivering Israel many times.”
      The Greek says literally, “it has prospered in our hands to deliver Israel many
      times.”
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὺς δύο υἱοὺς αὐτοῦ τοὺς πρεσβυτέρους
  chosen: his two older sons
  alternatives:
  - his two elder sons
  - his two eldest sons
  lexicon: LSJ
  rationale: πρεσβυτέρους is comparative ('older/elder'), modifying the two sons.
    'Older sons' is natural modern English and avoids implying there were only two
    sons in total as strongly as 'eldest' might.
- source_word: ἐπολεμήσαμεν
  chosen: have fought
  alternatives:
  - fought
  - have waged war
  lexicon: LSJ
  rationale: The aorist summarizes past action up to the present speech. English present
    perfect conveys the span from youth until now more naturally than a simple past.
- source_word: τοὺς πολέμους Ἰσραήλ
  chosen: the wars of Israel
  alternatives:
  - Israel's wars
  - the battles of Israel
  lexicon: LSJ
  rationale: A fairly formal rendering preserves the genitival relationship without
    over-interpreting whether these are wars fought by, for, or belonging to Israel.
    'Battles' is too narrow for πολέμους.
- source_word: ἀπὸ νεότητος ἕως τῆς σήμερον ἡμέρας
  chosen: from youth until this day
  alternatives:
  - from our youth until today
  - from youth to this present day
  lexicon: LSJ
  rationale: This idiom marks duration from early life to the present. 'From youth
    until this day' is concise and idiomatic; the singular 'youth' works generically
    with the plural subject in English.
- source_word: εὐώδωθη
  chosen: it has prospered
  alternatives:
  - it has succeeded
  - there has been success
  - it has gone well
  lexicon: LSJ
  rationale: The verb denotes prospering/succeeding. The impersonal-like construction
    with ἐν ταῖς χερσὶν ἡμῶν is awkward in English; 'it has prospered in our hands'
    preserves the Greek image while communicating successful outcome.
- source_word: ἐν ταῖς χερσὶν ἡμῶν
  chosen: in our hands
  alternatives:
  - by our hands
  - through our hands
  lexicon: LSJ
  rationale: The phrase is retained fairly literally because it is a common biblical
    idiom for agency or instrumentality. 'In our hands' keeps the source texture and
    remains understandable in context.
- source_word: ῥύσασθαι
  chosen: to deliver
  alternatives:
  - to rescue
  - to save
  lexicon: LSJ
  rationale: '''Deliver'' fits biblical military-rescue context well without importing
    fuller soteriological overtones that ''save'' may carry.'
- source_word: πλεονάκις
  chosen: many times
  alternatives:
  - often
  - repeatedly
  lexicon: LSJ
  rationale: The adverb indicates repeated occasions. 'Many times' is straightforward
    and preserves the emphasis on multiple acts of deliverance.
