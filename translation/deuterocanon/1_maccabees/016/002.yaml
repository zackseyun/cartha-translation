theological_decisions:
- issue: Agency in Israel's deliverance
  chosen_reading: The text attributes successful deliverance to the speaker's family
    as the human agents, expressed with a prosperity/success idiom rather than an
    explicit divine subject.
  alternative_readings:
  - The success could be rendered more dynamically as 'we have succeeded in delivering
    Israel many times'.
  rationale: The Greek does not explicitly name God here, though the idiom may imply
    providential success. The translation preserves the wording without suppressing
    the human-agent emphasis or adding an explicit divine agent.
  doctrine_reference: Preserve theological tension rather than resolve it.
