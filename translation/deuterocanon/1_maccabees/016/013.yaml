id: 1MA.16.13
reference: 1 Maccabees 16:13
source:
  edition: lxx-swete-1909
  text: καὶ ὑψώθη ἡ καρδία αὐτοῦ, καὶ ἐβουλήθη κατακρατῆσαι τῆς χώρας, καὶ ἐβούλευετο
    δόλῳ κατὰ Σίμωνος καὶ κατὰ τῶν υἱῶν αὐτοῦ ἆραι αὐτούς.
  language: Greek
  pages:
  - 683
  confidence: high
  validation: agree
translation:
  text: And his heart was lifted up, and he intended to seize control of the country,
    and he was plotting deceitfully against Simon and against his sons, to remove
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he became proud'; literally, 'his heart was lifted up.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to do away with them.' The Greek says 'to remove them,' which in context
      likely implies violent elimination.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑψώθη ἡ καρδία αὐτοῦ
  chosen: his heart was lifted up
  alternatives:
  - he became proud
  - his heart was exalted
  lexicon: LSJ
  rationale: A literal rendering preserves the idiom's metaphor while remaining intelligible
    in English. The phrase conveys arrogance or self-exaltation, but 'was lifted up'
    keeps the source imagery without over-paraphrasing.
- source_word: ἐβουλήθη
  chosen: he intended
  alternatives:
  - he decided
  - he wanted
  lexicon: LSJ
  rationale: The verb indicates formed intention or resolve. 'Intended' fits the deliberative
    sense better than the weaker 'wanted' and avoids overstating finality with 'decided.'
- source_word: κατακρατῆσαι τῆς χώρας
  chosen: to seize control of the country
  alternatives:
  - to gain mastery over the land
  - to take possession of the region
  lexicon: LSJ
  rationale: κατακρατέω with the genitive suggests gaining power over or mastering
    something. 'Seize control' communicates political domination clearly in modern
    English; 'country' is a natural rendering of χώρα here in a territorial-political
    sense.
- source_word: ἐβούλευετο
  chosen: he was plotting
  alternatives:
  - he was taking counsel
  - he was devising
  lexicon: LSJ
  rationale: In context, with δόλῳ and the hostile object, the verb is not neutral
    deliberation but scheming. 'Was plotting' captures the ongoing conspiratorial
    sense.
- source_word: δόλῳ
  chosen: deceitfully
  alternatives:
  - by treachery
  - with deceit
  lexicon: LSJ
  rationale: The dative expresses means or manner. 'Deceitfully' reads smoothly in
    English while preserving the idea of treacherous scheming. 'By treachery' is possible
    but slightly more interpretive.
- source_word: ἆραι αὐτούς
  chosen: to remove them
  alternatives:
  - to do away with them
  - to take them out
  lexicon: LSJ
  rationale: αἴρω can mean 'take away/remove.' In this hostile context it likely implies
    elimination, probably by murder, but 'remove them' preserves the Greek's wording
    without importing more than the text states explicitly.
- source_word: χώρα
  chosen: country
  alternatives:
  - land
  - region
  lexicon: LSJ
  rationale: The term can denote land, territory, or country. Here the political context
    of seizing control favors 'country' over the more physical 'land.'
