id: 1MA.16.16
reference: 1 Maccabees 16:16
source:
  edition: lxx-swete-1909
  text: καὶ ὅτε ἐμεθύσθη Σίμων καὶ οἱ υἱοὶ αὐτοῦ, ἐξανέστη Πτολεμαῖος καὶ οἱ μετʼ
    αὐτοῦ, καὶ ἔλαβον τὰ ὅπλα αὐτῶν, καὶ ἐπεισῆλθοσαν τῷ Σίμωνι εἰς τὸ συμπόσιον,
    καὶ ἀπέκτειναν αὐτὸν καὶ τοὺς υἱοὺς αὐτοῦ, καί τινας τῶν παιδαρίων αὐτοῦ.
  language: Greek
  pages:
  - 684
  confidence: high
  validation: agree
translation:
  text: And when Simon and his sons became drunk, Ptolemy and those with him rose
    up and took their weapons, and they came in against Simon into the banquet and
    killed him and his sons, and some of his young servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drinking party' for 'banquet'; the Greek term can refer specifically
      to a drinking feast.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμεθύσθη
  chosen: became drunk
  alternatives:
  - were drunk
  - got drunk
  lexicon: LSJ
  rationale: The aorist passive of μεθύσκω here denotes entering a state of intoxication.
    'Became drunk' preserves the ingressive sense better than the stative 'were drunk'
    while remaining natural English.
- source_word: ἐξανέστη
  chosen: rose up
  alternatives:
  - got up
  - stood up
  lexicon: LSJ
  rationale: The verb marks decisive action at the start of the attack. 'Rose up'
    keeps the narrative force and slight formal weight better than the more casual
    'got up.'
- source_word: οἱ μετʼ αὐτοῦ
  chosen: those with him
  alternatives:
  - his men
  - his companions
  lexicon: LSJ
  rationale: The Greek is nonspecific. 'Those with him' stays close to the wording
    without importing a more defined social or military relationship.
- source_word: ἔλαβον τὰ ὅπλα αὐτῶν
  chosen: took their weapons
  alternatives:
  - seized their weapons
  - took up their arms
  lexicon: LSJ
  rationale: ὅπλα commonly means weapons/arms. 'Took their weapons' is straightforward
    and avoids overinterpreting whether the sense is simply taking hold of them or
    arming themselves for attack.
- source_word: ἐπεισῆλθοσαν
  chosen: came in against
  alternatives:
  - entered against
  - burst in on
  - went in to attack
  lexicon: LSJ
  rationale: The compound verb with dative conveys hostile entry upon someone. 'Came
    in against' preserves both the motion and adversative force without becoming too
    paraphrastic.
- source_word: συμπόσιον
  chosen: banquet
  alternatives:
  - drinking party
  - feast
  lexicon: LSJ
  rationale: Given the immediate mention of drunkenness, συμπόσιον could be rendered
    'drinking party,' but 'banquet' is broader, idiomatic, and fits the assassination
    setting while not overstating the specifically sympotic nuance.
- source_word: ἀπέκτειναν
  chosen: killed
  alternatives:
  - slew
  - murdered
  lexicon: LSJ
  rationale: '''Killed'' is the basic lexical sense and avoids importing the evaluative
    force of ''murdered,'' even though the context clearly depicts treachery.'
- source_word: παιδαρίων
  chosen: young servants
  alternatives:
  - servants
  - boys
  - attendants
  lexicon: LSJ
  rationale: παιδάριον can denote a boy or youthful attendant/servant. In this courtly
    setting, 'young servants' best captures both the age nuance and their service
    role; 'boys' would sound too bare, while 'attendants' loses the age element.
