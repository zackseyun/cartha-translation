id: 1MA.16.18
reference: 1 Maccabees 16:18
source:
  edition: lxx-swete-1909
  text: καὶ ἔγραψεν ταῦτα Πτολεμαῖος, καὶ ἀπέστειλεν τῷ βασιλεῖ ὅπως ἀποστείλῃ αὐτῷ
    δυνάμεις εἰς βοήθειαν, καὶ παραδῷ τὴν χώραν αὐτῶν καὶ τὰς πόλεις.
  language: Greek
  pages:
  - 684
  confidence: high
  validation: agree
translation:
  text: And Ptolemy wrote these things and sent word to the king that he should send
    him forces as help, and hand over their country and the cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sent a message to the king.' The Greek verb is simply 'sent,' but the
      context indicates a written or verbal communication.
    reason: lexical_alternative
  - marker: b
    text: Or 'their land.' The Greek χώρα can mean 'country,' 'land,' or 'territory'
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - wrote about
  - sent in writing
  lexicon: BDAG
  rationale: The aorist of γράφω straightforwardly means 'wrote.' Since ταῦτα follows
    directly, 'wrote these things' preserves the Greek structure without unnecessary
    expansion.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these matters
  lexicon: BDAG
  rationale: The neuter plural demonstrative is best kept as 'these things' or 'these
    matters.' 'These things' is slightly more formal but remains natural and closely
    reflects the Greek.
- source_word: ἀπέστειλεν τῷ βασιλεῖ
  chosen: sent word to the king
  alternatives:
  - sent to the king
  - dispatched a message to the king
  lexicon: BDAG
  rationale: Although ἀποστέλλω literally means 'send,' the dative recipient and following
    content clause imply a message or communication. 'Sent word to the king' conveys
    the idiom in natural English without over-paraphrasing.
- source_word: ὅπως ἀποστείλῃ αὐτῷ δυνάμεις
  chosen: that he should send him forces
  alternatives:
  - so that he might send him troops
  - that he send him military forces
  lexicon: BDAG
  rationale: ὅπως introduces the content/purpose of the message. δυνάμεις in military
    context refers to armed forces or troops. 'Forces' preserves the breadth of the
    Greek while remaining idiomatic.
- source_word: εἰς βοήθειαν
  chosen: as help
  alternatives:
  - for help
  - for assistance
  - as reinforcements
  lexicon: BDAG
  rationale: Literally 'for help/assistance.' 'As help' fits the syntax after 'send
    him forces' and avoids importing the more specific military nuance 'reinforcements,'
    which the Greek does not explicitly state.
- source_word: παραδῷ
  chosen: hand over
  alternatives:
  - deliver over
  - surrender
  lexicon: BDAG
  rationale: παραδίδωμι commonly means 'hand over' or 'deliver over.' 'Hand over'
    is clear modern English and preserves the sense of transfer without adding interpretive
    force.
- source_word: τὴν χώραν αὐτῶν
  chosen: their country
  alternatives:
  - their land
  - their territory
  lexicon: BDAG
  rationale: χώρα can mean country, land, or territory. 'Country' works well in narrative
    English here, while αὐτῶν is retained as 'their,' referring to the people betrayed
    by Ptolemy.
- source_word: τὰς πόλεις
  chosen: the cities
  alternatives:
  - their cities
  - the towns
  lexicon: BDAG
  rationale: The Greek has the article but no explicit possessive with πόλεις. 'The
    cities' is the most formally accurate rendering; the possessive relation is already
    implied by the preceding phrase.
