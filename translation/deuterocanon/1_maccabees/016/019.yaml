id: 1MA.16.19
reference: 1 Maccabees 16:19
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέστειλεν ἑτέρους εἰς Γάζαρα ἄραι τὸν Ἰωάννην, καὶ τοῖς χιλιάρχοις ἀπέστειλεν
    ἐπιστολὰς παραγενέσθαι πρὸς αὐτόν, ὅπως δῷ αὐτοῖς ἀργύριον καὶ χρυσίον καὶ δόματα.
  language: Greek
  pages:
  - 684
  confidence: high
  validation: agree
translation:
  text: And he sent others to Gazara to take John away, and to the commanders of thousands
    he sent letters to come to him, so that he might give them silver and gold and
    gifts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to remove John'; the Greek infinitive can denote taking away or carrying
      off, and the context suggests hostile intent without requiring a more specific
      verb such as 'seize.'
    reason: lexical_alternative
  - marker: b
    text: Gazara is the Greek place-name form in the source text; it corresponds to
      the better-known Gezer.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: BDAG
  rationale: Standard narrative verb for sending; 'sent' is natural and sufficiently
    formal in English.
- source_word: ἑτέρους
  chosen: others
  alternatives:
  - other men
  lexicon: BDAG
  rationale: The Greek leaves the object implicit; 'others' preserves the ellipsis
    without adding 'men' unnecessarily.
- source_word: Γάζαρα
  chosen: Gazara
  alternatives:
  - Gezer
  lexicon: LSJ
  rationale: The Greek form is Γάζαρα; 'Gazara' is a straightforward transliteration
    from the source witness. 'Gezer' reflects the better-known Hebrew place-name but
    is not the form present in this Greek text.
- source_word: ἄραι
  chosen: to take John away
  alternatives:
  - to remove John
  - to seize John
  lexicon: BDAG
  rationale: Aorist infinitive of αἴρω can mean take up, remove, or carry off. In
    this hostile plot context, 'take ... away' preserves the ambiguity of removal
    without over-specifying violent seizure.
- source_word: τοῖς χιλιάρχοις
  chosen: to the commanders of thousands
  alternatives:
  - to the chiliarchs
  - to the commanders
  lexicon: BDAG
  rationale: χιλίαρχος is literally a commander of a thousand. Rendering the title
    rather than transliterating fits the project's philosophy and preserves the military
    sense.
- source_word: ἐπιστολάς
  chosen: letters
  alternatives:
  - written orders
  lexicon: BDAG
  rationale: The ordinary sense is 'letters'; nothing in the verse requires the more
    interpretive 'orders,' though the context implies instruction.
- source_word: παραγενέσθαι πρὸς αὐτόν
  chosen: to come to him
  alternatives:
  - to present themselves to him
  - to join him
  lexicon: BDAG
  rationale: The phrase means to arrive or appear before someone. 'Come to him' is
    idiomatic and adequate in context.
- source_word: ὅπως δῷ αὐτοῖς
  chosen: so that he might give them
  alternatives:
  - in order that he might give them
  lexicon: BDAG
  rationale: ὅπως with the subjunctive expresses purpose. 'So that he might give them'
    preserves that purposive nuance.
- source_word: ἀργύριον καὶ χρυσίον
  chosen: silver and gold
  alternatives:
  - money and gold
  lexicon: BDAG
  rationale: The literal pairing 'silver and gold' is conventional and clear; it may
    denote precious wealth generally, but the literal rendering is preferable.
- source_word: δόματα
  chosen: gifts
  alternatives:
  - presents
  - grants
  lexicon: BDAG
  rationale: δώματα/δόματα here refers to gifts or presents. 'Gifts' is the broadest
    and most natural English equivalent.
