id: 1MA.16.23
reference: 1 Maccabees 16:23
source:
  edition: lxx-swete-1909
  text: Καὶ τὰ λοιπὰ τῶν λόγων Ἰωάννου καὶ τῶν πολέμων αὐτοῦ καὶ τῶν ἀνδραγαθιῶν αὐτοῦ
    ὧν ἠνδραγάθησεν καὶ τῆς οἰκοδομῆς τῶν τειχέων ὧν ᾠκοδόμησεν καὶ τῶν πράξεων αὐτοῦ,
  language: Greek
  pages:
  - 684
  confidence: high
  validation: agree
translation:
  text: And the rest of the accounts concerning John, and his wars, and his mighty
    deeds that he did, and the building of the walls that he built, and his acts—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰ λοιπά
  chosen: the rest
  alternatives:
  - the remaining things
  - what remains
  lexicon: LSJ
  rationale: Idiomatic summary formula introducing material not recounted here; 'the
    rest' is concise and natural in English.
- source_word: λόγων
  chosen: accounts
  alternatives:
  - words
  - matters
  - records
  lexicon: LSJ
  rationale: In this historiographic context, λόγοι refers not merely to spoken words
    but to matters or accounts concerning John's career. 'Accounts' best fits the
    catalog-like closing formula.
- source_word: πολέμων
  chosen: wars
  alternatives:
  - battles
  - campaigns
  lexicon: LSJ
  rationale: The plural denotes his military conflicts broadly. 'Wars' preserves the
    scope better than the narrower 'battles'.
- source_word: ἀνδραγαθιῶν
  chosen: mighty deeds
  alternatives:
  - brave deeds
  - heroic deeds
  - acts of valor
  lexicon: LSJ
  rationale: The term denotes valorous or heroic exploits. 'Mighty deeds' is readable
    modern English and preserves the commendatory force without sounding overly archaic.
- source_word: ἠνδραγάθησεν
  chosen: he did
  alternatives:
  - he performed
  - he accomplished
  - he showed his valor
  lexicon: LSJ
  rationale: The verb is cognate with ἀνδραγαθίαι and means to act valiantly or perform
    heroic deeds. Because the noun already carries the valor nuance, rendering the
    verb simply as 'he did' avoids awkward repetition like 'heroic deeds that he heroically
    did' while remaining faithful to the relative clause.
- source_word: οἰκοδομῆς
  chosen: the building
  alternatives:
  - the construction
  lexicon: LSJ
  rationale: A straightforward rendering of the noun; paired with 'of the walls' it
    naturally describes the construction activity.
- source_word: τειχέων
  chosen: walls
  alternatives:
  - fortification walls
  - ramparts
  lexicon: LSJ
  rationale: τειχῶν refers to defensive walls. 'Walls' is sufficient here; the military
    context already implies fortification.
- source_word: πράξεων
  chosen: acts
  alternatives:
  - deeds
  - actions
  - accomplishments
  lexicon: LSJ
  rationale: A broad concluding term in the list. 'Acts' preserves the generality
    and echoes historiographic style.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: LSJ
  rationale: The verse continues a formal narrative conclusion. 'And' preserves the
    connective structure of the Greek.
