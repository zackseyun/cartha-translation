id: 1MA.16.1
reference: 1 Maccabees 16:1
source:
  edition: lxx-swete-1909
  text: καὶ ἀνέβη Ἰωάννης ἐκ Γαζάρων, καὶ ἀπήγγειλεν Σίμωνι τῷ πατρὶ αὐτοῦ ἃ συνετέλει
    Κενδεβαῖος.
  language: Greek
  pages:
  - 682
  confidence: high
  validation: agree
translation:
  text: And John came up from Gazara and reported to Simon his father what Cendebeus
    was doing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what Cendebeus was doing' or 'what Cendebeus was carrying out.' The
      Greek verb can denote ongoing action or the execution of a plan.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβη
  chosen: came up
  alternatives:
  - went up
  - ascended
  lexicon: BDAG
  rationale: The aorist of ἀναβαίνω commonly means 'go up/come up.' In narrative English,
    'came up' works naturally from the narrator's perspective and preserves the directional
    sense without over-formalizing.
- source_word: Γαζάρων
  chosen: Gazara
  alternatives:
  - Gezer
  - Gazara(s)
  lexicon: LSJ
  rationale: The Greek form points to Gazara, the Hellenized place-name used in 1
    Maccabees. 'Gezer' reflects the Hebrew place-name and may be historically equivalent,
    but the translation follows the Greek witness while using a standard English singular
    place form.
- source_word: ἀπήγγειλεν
  chosen: reported
  alternatives:
  - announced
  - told
  lexicon: BDAG
  rationale: ἀπαγγέλλω here denotes bringing a report. 'Reported' preserves the formal
    sense of relaying information, fitting the military-political context better than
    the more generic 'told.'
- source_word: συνετέλει
  chosen: was accomplishing
  alternatives:
  - was doing
  - was carrying out
  - had completed
  lexicon: BDAG
  rationale: συντελέω can mean bring to completion, carry out, accomplish. The imperfect
    suggests ongoing action rather than a simple completed act, so 'was accomplishing'
    best reflects aspect while retaining the sense of executing plans or actions.
- source_word: Κενδεβαῖος
  chosen: Cendebeus
  alternatives:
  - Kendebaios
  - Kendebeus
  lexicon: LSJ
  rationale: Personal names are transliterated by standard conventions. 'Cendebeus'
    is a conventional English transliteration of the Greek name and keeps the source
    form visible.
