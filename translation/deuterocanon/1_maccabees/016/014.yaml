id: 1MA.16.14
reference: 1 Maccabees 16:14
source:
  edition: lxx-swete-1909
  text: Σίμων δὲ ἦν ἐφοδεύων τὰς πόλεις τὰς ἐν τῇ χώρᾳ καὶ φροντί- ζω τὰς ἐπιμελίας
    αὐτῶν, καὶ κατέβη εἰς Ἰεριχὼ αὐτὸς καὶ Ματταθίας καὶ Ἰούδας καὶ οἱ υἱοὶ αὐτοῦ
    ἔτους ἑβδόμου καὶ ἑβδομηκοστοῦ καὶ ἑκατοστοῦ ἐν μηνὶ ἐνδεκάτῳ· οὗτος ὁ μὴν Σαβάτ.
  language: Greek
  pages:
  - 683
  confidence: high
  validation: agree
translation:
  text: Now Simon was making a circuit of the cities in the country and taking care
    of their administration, and he went down to Jericho, he and Mattathias and Judas
    his sons, in the one hundred seventy-seventh year, in the eleventh month—that
    is, the month Shebat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the month Sabat''; rendered ''Shebat'' as a standard English transliteration
      of the month name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφοδεύων
  chosen: making a circuit of
  alternatives:
  - visiting
  - going around
  - inspecting
  lexicon: LSJ
  rationale: The participle describes Simon's movement through the cities rather than
    merely being present among them. 'Making a circuit of' captures repeated travel/inspection
    in administrative oversight better than the flatter 'visiting.'
- source_word: τὰς πόλεις τὰς ἐν τῇ χώρᾳ
  chosen: the cities in the country
  alternatives:
  - the cities in the land
  - the towns in the region
  lexicon: LSJ
  rationale: χώρα commonly means country, land, or region. 'Country' is natural English
    here and distinguishes the broader territory from the individual cities.
- source_word: φροντίζω τὰς ἐπιμελίας αὐτῶν
  chosen: taking care of their administration
  alternatives:
  - attending to their needs
  - managing their affairs
  - seeing to their oversight
  lexicon: LSJ
  rationale: The phrase is somewhat awkward in Swete's text, but the sense is administrative
    concern for the cities' affairs. 'Taking care of their administration' preserves
    both φροντίζω ('take thought/care') and ἐπιμέλεια ('care, oversight, administration')
    without over-paraphrase.
- source_word: κατέβη εἰς Ἰεριχώ
  chosen: went down to Jericho
  alternatives:
  - came down to Jericho
  lexicon: LSJ
  rationale: καταβαίνω is regularly rendered 'go down' in travel contexts. 'Went down'
    is idiomatic and preserves the directional nuance.
- source_word: αὐτὸς καὶ Ματταθίας καὶ Ἰούδας καὶ οἱ υἱοὶ αὐτοῦ
  chosen: he and Mattathias and Judas his sons
  alternatives:
  - he himself, and Mattathias and Judas his sons
  - he, along with his sons Mattathias and Judas
  lexicon: LSJ
  rationale: The Greek lists Simon first, then names his sons. English smooths this
    best as 'he and Mattathias and Judas his sons,' preserving the appositional relation
    without adding information.
- source_word: ἔτους ἑβδόμου καὶ ἑβδομηκοστοῦ καὶ ἑκατοστοῦ
  chosen: in the one hundred seventy-seventh year
  alternatives:
  - in year one hundred and seventy-seven
  lexicon: LSJ
  rationale: This is the standard Greek way of expressing the Seleucid year number.
    The fully written English numeral is clear and natural.
- source_word: μηνὶ ἐνδεκάτῳ
  chosen: in the eleventh month
  alternatives:
  - in month eleven
  lexicon: LSJ
  rationale: A straightforward formal rendering.
- source_word: Σαβάτ
  chosen: Shebat
  alternatives:
  - Sabat
  - Shevat
  lexicon: LSJ
  rationale: This is the Semitic month name represented in Greek letters. 'Shebat'
    is a standard English transliteration that reflects the underlying month name
    while remaining readable.
