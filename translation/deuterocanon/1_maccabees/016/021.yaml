id: 1MA.16.21
reference: 1 Maccabees 16:21
source:
  edition: lxx-swete-1909
  text: καὶ προδραμὼν ἀπήγγειλεν Ἰωάννῃ εἰς Γάζαρα, ὅτι ἀπώλετο ὁ πατὴρ αὐτοῦ καὶ
    οἱ ἀδελφοὶ αὐτοῦ, καὶ ὅτι Ἀπέσταλκεν καὶ σὲ ἀποκτεῖναι.
  language: Greek
  pages:
  - 684
  confidence: high
  validation: agree
translation:
  text: And he ran on ahead and reported to John in Gazara that his father and his
    brothers had perished, and that he had sent men to kill you also.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and that he has sent also you to be killed.' The Greek
      leaves the implied object of 'sent' unstated; English supplies 'men' for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: προδραμὼν
  chosen: ran on ahead
  alternatives:
  - ran ahead
  - hurried ahead
  - went on before
  lexicon: LSJ
  rationale: The participle indicates going ahead in advance with haste. 'Ran on ahead'
    preserves both the motion and the urgency better than the flatter 'went on before.'
- source_word: ἀπήγγειλεν
  chosen: reported
  alternatives:
  - announced
  - brought word
  - told
  lexicon: BDAG
  rationale: The verb denotes bringing a message or report. 'Reported' fits the messenger
    context and reads naturally in modern English without overstating formality.
- source_word: εἰς Γάζαρα
  chosen: in Gazara
  alternatives:
  - to Gazara
  lexicon: LSJ
  rationale: With verbs of reporting to a person, εἰς plus place can be represented
    idiomatically in English as the location where John was found. 'To John in Gazara'
    is the most natural rendering of the whole phrase.
- source_word: ἀπώλετο
  chosen: had perished
  alternatives:
  - had died
  - was destroyed
  - was lost
  lexicon: BDAG
  rationale: The aorist middle/passive of ἀπόλλυμι can mean 'perish' or 'be killed/die.'
    Here it reports violent death without specifying the mechanism in the verb itself.
    'Had perished' preserves that sense and suits the grim report.
- source_word: Ἀπέσταλκεν
  chosen: he had sent men
  alternatives:
  - he has sent
  - he had sent
  - he sent
  lexicon: BDAG
  rationale: 'The perfect points to a completed action with present relevance: orders
    have already been dispatched. English often requires an object with ''sent'' in
    this context; ''men'' is implied by the infinitive ''to kill'' and makes the sentence
    idiomatic without adding a new claim beyond the context.'
- source_word: καὶ σὲ ἀποκτεῖναι
  chosen: to kill you also
  alternatives:
  - also to kill you
  - to put you to death as well
  lexicon: BDAG
  rationale: ἀποκτείνω straightforwardly means 'kill' or 'put to death.' 'To kill
    you also' preserves the emphasis of καὶ σέ, linking John's danger with the deaths
    already reported.
