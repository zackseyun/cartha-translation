id: 1MA.16.12
reference: 1 Maccabees 16:12
source:
  edition: lxx-swete-1909
  text: ἦν γὰρ γαμβρὸς τοῦ ἀρχιερέως.
  language: Greek
  pages:
  - 683
  confidence: high
  validation: agree
translation:
  text: For he was the son-in-law of the high priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek γαμβρός can more broadly denote a relation by marriage; here it is
      rendered 'son-in-law' as the most likely specific sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν
  chosen: was
  alternatives:
  - had been
  lexicon: BDAG
  rationale: Imperfect of εἰμί gives the simple past-state in context; English 'was'
    is the natural rendering.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives explanatory force connecting this clause to the prior context;
    'for' preserves that relation compactly.
- source_word: γαμβρὸς
  chosen: son-in-law
  alternatives:
  - relative by marriage
  - bridegroom
  lexicon: LSJ
  rationale: In this context the kinship term most naturally means 'son-in-law,' indicating
    relation by marriage to the high priest. Broader affine meanings are possible
    lexically, but the specific familial sense is the clearest English equivalent
    here.
- source_word: τοῦ ἀρχιερέως
  chosen: of the high priest
  alternatives:
  - of the chief priest
  lexicon: BDAG
  rationale: ἀρχιερεύς is standardly 'high priest' in Jewish context; this is the
    established and accurate title.
