id: 1MA.16.3
reference: 1 Maccabees 16:3
source:
  edition: lxx-swete-1909
  text: νῦν δὲ γεγήρακα, καὶ ὑμεῖς δὲ ἐν τῷ ἐλέει ἱκανοί ἐστε ἐν τοῖς ἔτεσιν· γίνεσθε
    ἀντʼ ἐμοῦ καὶ τοῦ ἀδελφοῦ μου, καὶ ἐξελθόντες ὑπερμαχεῖτε ὑπὲρ τοῦ ἔθνους ἡμῶν,
    ἡ δὲ ἐκ τοῦ οὐρανοῦ βοήθεια ἤτω μεθʼ ὑμῶν.
  language: Greek
  pages:
  - 683
  confidence: high
  validation: agree
translation:
  text: But now I have grown old, and you also, by mercy, are mature in years. Become
    my replacements, and my brother’s, and go out and fight on behalf of our nation,
    and may the help from heaven be with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through mercy'; the Greek does not explicitly say whose mercy, though
      the context naturally suggests divine mercy.
    reason: lexical_alternative
  - marker: b
    text: Or 'Take my place and my brother’s.' The Greek expresses substitution with
      'instead of.'
    reason: alternative_reading
  - marker: c
    text: '''Help from heaven'' is a reverent way of speaking of divine aid without
      naming God directly.'
    reason: cultural_note
lexical_decisions:
- source_word: γεγήρακα
  chosen: I have grown old
  alternatives:
  - I am old
  - I have become old
  lexicon: LSJ
  rationale: Perfect form of γηράσκω expresses a present state resulting from aging.
    'I have grown old' preserves both the process and present condition in natural
    English.
- source_word: ἐν τῷ ἐλέει
  chosen: by mercy
  alternatives:
  - by the mercy of God
  - through mercy
  - in mercy
  lexicon: LSJ
  rationale: The phrase literally means 'in the mercy.' The object of mercy is not
    explicitly stated in the Greek, so the translation avoids adding 'of God' to the
    main text. 'By mercy' conveys that their reaching maturity is owing to merciful
    favor.
- source_word: ἱκανοί ἐστε ἐν τοῖς ἔτεσιν
  chosen: are mature in years
  alternatives:
  - are old enough
  - are sufficient in years
  - are of suitable age
  lexicon: LSJ
  rationale: ἱκανοί denotes sufficiency/fitness; with ἐν τοῖς ἔτεσιν it refers to
    being of adequate age or maturity. 'Mature in years' is idiomatic and preserves
    the sense of readiness without overstating old age.
- source_word: γίνεσθε ἀντʼ ἐμοῦ καὶ τοῦ ἀδελφοῦ μου
  chosen: Become my replacements, and my brother’s
  alternatives:
  - Take my place and my brother's
  - Stand in place of me and my brother
  lexicon: LSJ
  rationale: ἀντί with genitive indicates substitution. 'Become my replacements, and
    my brother’s' keeps the substitutional sense concise, though the English is slightly
    elliptical like the Greek.
- source_word: ὑπερμαχεῖτε
  chosen: fight on behalf of
  alternatives:
  - defend
  - fight for
  lexicon: LSJ
  rationale: The verb means to fight in defense of or champion a cause. 'Fight on
    behalf of' preserves the advocacy/defense nuance better than the flatter 'fight
    for.'
- source_word: ἔθνους
  chosen: nation
  alternatives:
  - people
  - ethnic people
  lexicon: LSJ
  rationale: In this Maccabean context, ἔθνος refers to the Jewish national community.
    'Nation' best reflects the collective political-ethnic sense here.
- source_word: ἐκ τοῦ οὐρανοῦ βοήθεια
  chosen: the help from heaven
  alternatives:
  - help from Heaven
  - heavenly help
  lexicon: LSJ
  rationale: The phrase denotes aid whose source is heaven, reverently implying divine
    assistance. 'Help from heaven' is clear and preserves the source imagery without
    overinterpreting.
- source_word: ἤτω μεθʼ ὑμῶν
  chosen: may ... be with you
  alternatives:
  - let ... be with you
  lexicon: LSJ
  rationale: 'Third-person imperative used jussively is naturally rendered in English
    as a wish or blessing: ''may ... be with you.'''
