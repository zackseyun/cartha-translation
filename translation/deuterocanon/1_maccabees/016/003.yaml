theological_decisions:
- issue: Implicit divine reference in 'mercy' and 'help from heaven'
  chosen_reading: Retain the implicit wording without inserting 'God' into the main
    text.
  alternative_readings:
  - '''by the mercy of God'''
  - '''may God''s help from heaven be with you'''
  rationale: The Greek implies divine agency, especially in 'help from heaven,' but
    does not explicitly name God in this verse. Following the translation philosophy,
    the draft preserves the theological implication without making it more explicit
    than the source text does.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it.'
