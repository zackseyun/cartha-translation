id: 1MA.16.4
reference: 1 Maccabees 16:4
source:
  edition: lxx-swete-1909
  text: καὶ ἐπέλεξεν ἐκ τῆς χώρας εἴκοσι χιλιάδας ἀνδρῶν πολεμιστῶν καὶ ἱππεῖς, καὶ
    ἐπορεύθησαν ἐπὶ τὸν Κενδεβαῖον, καὶ ἐκοιμήθησαν ἐν Μωδαείμ.
  language: Greek
  pages:
  - 683
  confidence: high
  validation: agree
translation:
  text: And he selected from the country twenty thousand fighting men and horsemen,
    and they marched against Kendebaios, and camped in Modein.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'slept in Modein'; in this military context the sense
      is that they camped there for the night.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέλεξεν
  chosen: selected
  alternatives:
  - chose
  - picked out
  lexicon: LSJ
  rationale: The verb denotes choosing out from a larger group. 'Selected' preserves
    the deliberate military sense without sounding overly colloquial.
- source_word: χώρας
  chosen: the country
  alternatives:
  - the land
  - the region
  lexicon: LSJ
  rationale: 'χώρα commonly refers to territory or countryside. ''The country'' fits
    the military recruitment context: men were drawn from the surrounding territory
    rather than from a single city.'
- source_word: εἴκοσι χιλιάδας ἀνδρῶν πολεμιστῶν
  chosen: twenty thousand fighting men
  alternatives:
  - twenty thousand warriors
  - twenty thousand men of war
  lexicon: LSJ
  rationale: ἀνδρῶν is explicitly masculine and refers to male combatants; πολεμιστῶν
    specifies them as fighters. 'Fighting men' is natural modern English and preserves
    the gendered military reference better than a generic 'troops'.
- source_word: ἱππεῖς
  chosen: horsemen
  alternatives:
  - cavalry
  lexicon: LSJ
  rationale: The noun literally means mounted men/horsemen. 'Horsemen' stays closer
    to the Greek than the more abstract collective 'cavalry,' while remaining clear.
- source_word: ἐπορεύθησαν ἐπὶ τὸν Κενδεβαῖον
  chosen: they marched against Kendebaios
  alternatives:
  - they went against Kendebaios
  - they advanced on Kendebaios
  lexicon: LSJ
  rationale: In military narrative, πορεύομαι often means to march or proceed. ἐπί
    with the accusative here indicates movement against an opponent. 'Marched against'
    captures the hostile military advance.
- source_word: ἐκοιμήθησαν
  chosen: camped
  alternatives:
  - spent the night
  - encamped
  lexicon: LSJ
  rationale: Literally 'slept' or 'lay down,' but in campaign context it refers to
    making camp for the night. 'Camped' communicates the narrative sense idiomatically
    without unnecessary literalism.
- source_word: Μωδαείμ
  chosen: Modein
  alternatives:
  - Modaeim
  lexicon: LSJ
  rationale: A standard English transliteration of the place-name is 'Modein.' This
    follows the philosophy of transliterating names while using a recognizable English
    form.
