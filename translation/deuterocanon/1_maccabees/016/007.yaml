id: 1MA.16.7
reference: 1 Maccabees 16:7
source:
  edition: lxx-swete-1909
  text: καὶ διεῖλεν τὸν λαὸν καὶ τοὺς ἱππεῖς ἐν μέσῳ τῶν πεζῶν· ἡ δὲ ἵππος τῶν ὑπεναντίων
    πολλὴ σφόδρα.
  language: Greek
  pages:
  - 683
  confidence: high
  validation: agree
translation:
  text: And he divided the people and the horsemen among the foot soldiers; but the
    cavalry of the enemy was very numerous.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διεῖλεν
  chosen: divided
  alternatives:
  - distributed
  - arranged
  lexicon: LSJ
  rationale: The verb means to divide or distribute. 'Divided' keeps the military-organizational
    sense without overinterpreting the exact tactical arrangement.
- source_word: τὸν λαόν
  chosen: the people
  alternatives:
  - the troops
  - the force
  lexicon: LSJ
  rationale: Literally 'the people.' In 1 Maccabees this often refers to the fighting
    force or men under command, but 'the people' preserves the Greek wording while
    remaining intelligible in context.
- source_word: τοὺς ἱππεῖς
  chosen: the horsemen
  alternatives:
  - the cavalry
  lexicon: LSJ
  rationale: The noun denotes mounted soldiers. 'Horsemen' is the more direct lexical
    equivalent here; the collective military sense is then echoed by 'cavalry' in
    the second clause where ἵππος is collective.
- source_word: ἐν μέσῳ τῶν πεζῶν
  chosen: among the foot soldiers
  alternatives:
  - in the midst of the infantry
  - among the infantry
  lexicon: LSJ
  rationale: πεζῶν refers to those on foot, i.e., infantry. 'Among the foot soldiers'
    is clear modern English and reflects the placement of the horsemen within the
    infantry ranks.
- source_word: ἡ δὲ ἵππος
  chosen: the cavalry
  alternatives:
  - the horsemen
  - the mounted force
  lexicon: LSJ
  rationale: Although literally 'the horse,' the singular here functions collectively
    for cavalry. 'The cavalry' best conveys the military collective in English.
- source_word: τῶν ὑπεναντίων
  chosen: of the enemy
  alternatives:
  - of the opponents
  - of the adversaries
  lexicon: LSJ
  rationale: The term means those set against someone. 'The enemy' is the most natural
    military rendering in this context.
- source_word: πολλὴ σφόδρα
  chosen: very numerous
  alternatives:
  - exceedingly many
  - very great
  lexicon: LSJ
  rationale: The phrase intensifies the size of the enemy cavalry. 'Very numerous'
    communicates quantity more naturally in English than a wooden 'very many/great.'
