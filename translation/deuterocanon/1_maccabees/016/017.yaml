theological_decisions:
- issue: Moral characterization of ἀθεσία
  chosen_reading: Rendered as relational betrayal ('act of treachery') rather than
    a more abstract 'lawlessness.'
  alternative_readings:
  - a great lawless act
  - great faithlessness
  - a great breach of faith
  rationale: The verse condemns a concrete betrayal in context, and the chosen rendering
    preserves that narrative and ethical force without importing later technical theological
    categories.
