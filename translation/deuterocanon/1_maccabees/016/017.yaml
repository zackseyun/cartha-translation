id: 1MA.16.17
reference: 1 Maccabees 16:17
source:
  edition: lxx-swete-1909
  text: καὶ ἐποίησεν ἀθεσίαν μεγάλην, καὶ ἀνταπέδωκεν κακὰ ἀντὶ ἀγαθῶν.
  language: Greek
  pages:
  - 684
  confidence: high
  validation: agree
translation:
  text: And he committed a great act of treachery, and repaid evil for good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great breach of faith' or 'great faithlessness.' The Greek term can
      denote violation of trust or obligation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν
  chosen: committed
  alternatives:
  - did
  - performed
  - worked
  lexicon: BDAG
  rationale: With ἀθεσίαν as its object, the verb idiomatically means to carry out
    or commit an act, not merely 'make' in a wooden sense. 'Committed' is natural
    English and preserves the moral force.
- source_word: ἀθεσίαν
  chosen: act of treachery
  alternatives:
  - lawlessness
  - faithlessness
  - breach of faith
  - treason
  lexicon: LSJ
  rationale: The noun denotes a violation of faith, agreement, or obligation. In this
    narrative context, the sense is betrayal rather than abstract impiety. 'Act of
    treachery' captures both the concrete deed and its relational/moral character
    better than the broader 'lawlessness'.
- source_word: μεγάλην
  chosen: great
  alternatives:
  - grave
  - serious
  lexicon: BDAG
  rationale: The adjective intensifies the severity of the deed. 'Great' is straightforward
    and close to the Greek; the moral weight is already carried by 'act of treachery'.
- source_word: ἀνταπέδωκεν
  chosen: repaid
  alternatives:
  - returned
  - paid back
  - rendered in return
  lexicon: BDAG
  rationale: The verb expresses requital or repayment. 'Repaid' fits the reciprocal
    construction ἀντὶ and preserves the sense of returning something in exchange.
- source_word: κακὰ
  chosen: evil
  alternatives:
  - harm
  - wrong
  lexicon: BDAG
  rationale: The plural neuter here refers to evil deeds or treatment. 'Evil' keeps
    the moral dimension prominent; 'harm' would narrow it to consequences.
- source_word: ἀντὶ ἀγαθῶν
  chosen: for good
  alternatives:
  - in return for good things
  - instead of good
  - for benefits
  lexicon: BDAG
  rationale: The phrase marks exchange or requital. 'For good' is concise, idiomatic,
    and preserves the contrast with 'evil' in English.
