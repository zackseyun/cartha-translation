id: 1MA.16.11
reference: 1 Maccabees 16:11
source:
  edition: lxx-swete-1909
  text: Καὶ Πτολεμαῖος ὁ τοῦ Ἀβούβου ἦν καθεστημένος στρατηγὸς εἰς τὸ πεδίον Ἰεριχώ,
    καὶ εἶχεν ἀργύριον καὶ χρυσίον πολύ·
  language: Greek
  pages:
  - 683
  confidence: high
  validation: agree
translation:
  text: And Ptolemy son of Abubus had been appointed governor over the plain of Jericho,
    and he had much silver and gold;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek στρατηγός can also mean 'general' or 'military governor.' Here it
      is rendered 'governor' because the phrase describes authority over a district
      rather than only battlefield command.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: LSJ
  rationale: Standard connective; simple continuation fits the narrative flow without
    adding temporal nuance beyond the Greek.
- source_word: Πτολεμαῖος
  chosen: Ptolemy
  rationale: Standard transliteration of the personal name, following the project's
    policy to transliterate names rather than translate them.
- source_word: ὁ τοῦ Ἀβούβου
  chosen: son of Abubus
  alternatives:
  - the son of Abubus
  - of Abubus
  lexicon: LSJ
  rationale: This genitival identification functions as patronymic designation. Rendering
    it explicitly as 'son of Abubus' is natural English and makes the relationship
    clear.
- source_word: ἦν καθεστημένος
  chosen: had been appointed
  alternatives:
  - was appointed
  - had been established
  - was stationed
  lexicon: LSJ
  rationale: The periphrastic construction with καθεστημένος indicates an existing
    state resulting from prior appointment. 'Had been appointed' captures that resultant
    status better than the flatter 'was appointed.'
- source_word: στρατηγὸς
  chosen: governor
  alternatives:
  - general
  - commander
  - military governor
  lexicon: LSJ
  rationale: Although στρατηγός can mean 'general,' in this administrative context
    with jurisdiction over a region, 'governor' best conveys the office in idiomatic
    English. The military-administrative overlap is real, but 'general over the plain'
    would sound misleadingly narrow in English.
- source_word: εἰς τὸ πεδίον Ἰεριχώ
  chosen: over the plain of Jericho
  alternatives:
  - in the plain of Jericho
  - for the plain of Jericho
  - over the region of Jericho
  lexicon: LSJ
  rationale: With στρατηγός, εἰς marks sphere/jurisdiction. 'Over the plain of Jericho'
    expresses administrative authority over that district. 'Plain' preserves πεδίον
    more closely than the broader 'region.'
- source_word: ἀργύριον καὶ χρυσίον πολύ
  chosen: much silver and gold
  alternatives:
  - a great deal of silver and gold
  - abundant silver and gold
  lexicon: LSJ
  rationale: This is a straightforward statement of wealth. 'Much silver and gold'
    is direct, readable, and close to the Greek word order and emphasis.
