id: 1MA.16.5
reference: 1 Maccabees 16:5
source:
  edition: lxx-swete-1909
  text: καὶ ἀναστάντες τὸ πρωὶ ἐπορεύοντο εἰς τὸ πεδίον· καὶ ἰδοὺ δύναμις πολλὴ εἰς
    συνάντησιν αὐτοῖς, πεζικοὶ καὶ ἱππεῖς, καὶ χειμάρρους ἦν ἀνὰ μέσον αὐτῶν.
  language: Greek
  pages:
  - 683
  confidence: high
  validation: agree
translation:
  text: And when they rose early in the morning, they were going out into the plain;
    and behold, a large force came to meet them, infantry and cavalry, and a wadi
    was between them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a torrent-bed' or 'a seasonal stream.' The Greek term refers to a winter-flowing
      watercourse and may denote either the stream itself or its channel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστάντες τὸ πρωὶ
  chosen: when they rose early in the morning
  alternatives:
  - having risen in the morning
  - after getting up early
  lexicon: BDAG
  rationale: The participle plus temporal phrase marks the action preceding the march.
    'Rose early in the morning' is natural English and preserves the temporal sequence
    without unnecessary stiffness.
- source_word: ἐπορεύοντο
  chosen: they were going out
  alternatives:
  - they went
  - they marched
  - they were proceeding
  lexicon: BDAG
  rationale: The imperfect suggests ongoing movement rather than a simple punctiliar
    event. 'Were going out' preserves that aspect better than simple 'went'; 'marched'
    would add military coloring not explicit in the verb itself.
- source_word: τὸ πεδίον
  chosen: the plain
  alternatives:
  - the field
  - the open country
  lexicon: BDAG
  rationale: In this military setting, πεδίον refers to open level ground rather than
    an agricultural field. 'The plain' best fits the context and remains idiomatic.
- source_word: δύναμις πολλὴ
  chosen: a large force
  alternatives:
  - a great army
  - a large host
  lexicon: BDAG
  rationale: δύναμις in military narrative commonly denotes an armed force. 'Large
    force' is accurate and avoids over-specifying as a formal 'army' if the text simply
    indicates a sizable body of troops.
- source_word: εἰς συνάντησιν αὐτοῖς
  chosen: came to meet them
  alternatives:
  - was for an encounter with them
  - advanced against them
  lexicon: BDAG
  rationale: The idiom indicates movement into confrontation. 'Came to meet them'
    is the most direct rendering; 'advanced against them' would sharpen hostility
    beyond the phrase itself, though the context implies opposition.
- source_word: πεζικοὶ καὶ ἱππεῖς
  chosen: infantry and cavalry
  alternatives:
  - foot soldiers and horsemen
  lexicon: BDAG
  rationale: These are standard military categories. 'Infantry and cavalry' is concise,
    clear modern English and preserves the contrast between troops on foot and mounted
    troops.
- source_word: χειμάρρους
  chosen: a wadi
  alternatives:
  - a torrent-bed
  - a stream
  - a ravine
  lexicon: LSJ
  rationale: χειμάρρους denotes a winter-flowing stream or torrent, often a seasonal
    watercourse. 'Wadi' captures the geographical sense well in a Near Eastern setting;
    alternatives like 'stream' can sound too permanent, while 'ravine' omits the watercourse
    idea.
- source_word: ἦν ἀνὰ μέσον αὐτῶν
  chosen: was between them
  alternatives:
  - lay between them
  - was in the midst between them
  lexicon: BDAG
  rationale: This straightforwardly describes the terrain separating the two sides.
    'Was between them' is clear and faithful.
