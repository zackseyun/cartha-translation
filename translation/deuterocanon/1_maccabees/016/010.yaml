id: 1MA.16.10
reference: 1 Maccabees 16:10
source:
  edition: lxx-swete-1909
  text: καὶ ἔφυγον εἰς τοὺς πύργους τοὺς ἐν τοῖς ἀγροῖς Ἀζώτου, καὶ ἐνεπύρισεν αὐτὴν
    ἐν πυρί· καὶ ἔπεσον ἐξ αὐτῶν εἰς ἄνδρας χιλίους, καὶ ἀπέστρεψεν εἰς τὴν Ἰουδαίαν
    μετʼ εἰρήνης.
  language: Greek
  pages:
  - 683
  confidence: high
  validation: agree
translation:
  text: And they fled into the towers in the fields of Azotus, and he burned them
    with fire; and about a thousand men fell among them, and he returned to Judea
    in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Azotus is the Greek name for Ashdod.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'he burned it with fire'; the singular 'it' may refer collectively
      to the stronghold area rather than to the plural 'towers' taken individually.
    reason: lexical_alternative
  - marker: c
    text: Or 'a thousand men'; the Greek expression may indicate an approximate total.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔφυγον
  chosen: they fled
  alternatives:
  - they escaped
  - they took flight
  lexicon: LSJ
  rationale: A straightforward past narrative verb; 'fled' best matches the military
    retreat context without adding nuance beyond the Greek.
- source_word: πύργους
  chosen: towers
  alternatives:
  - fortresses
  - strongholds
  lexicon: LSJ
  rationale: The basic sense is 'towers.' In context these are defensive structures
    in the countryside, but 'towers' preserves the concrete image of the Greek better
    than the more interpretive 'fortresses.'
- source_word: ἀγροῖς
  chosen: fields
  alternatives:
  - countryside
  - farmlands
  lexicon: LSJ
  rationale: The phrase τοὺς ἐν τοῖς ἀγροῖς naturally means 'those in the fields/countryside.'
    'Fields' is the more literal rendering and remains intelligible in English.
- source_word: Ἀζώτου
  chosen: Azotus
  alternatives:
  - Ashdod
  lexicon: LSJ
  rationale: As a Greek deuterocanonical text, the place name is given in its Greek
    form. Following the project's preference to transliterate names, 'Azotus' is retained
    in the main text, while the more familiar Hebrew equivalent can be preserved as
    an alternative.
- source_word: ἐνεπύρισεν αὐτὴν ἐν πυρί
  chosen: he burned it with fire
  alternatives:
  - he set it on fire
  - he burned them with fire
  lexicon: LSJ
  rationale: The singular pronoun αὐτήν is best taken as referring to the nearest
    singular collective or city/stronghold concept rather than the plural 'towers'
    strictly construed. 'Burned it with fire' closely follows the Greek wording, though
    idiomatic English could shorten it to 'set it on fire.'
- source_word: ἔπεσον
  chosen: fell
  alternatives:
  - were killed
  - died
  lexicon: LSJ
  rationale: In battle narrative, 'fell' is a conventional and accurate rendering
    that preserves the Greek idiom without overexplaining.
- source_word: ἐξ αὐτῶν
  chosen: from among them
  alternatives:
  - of them
  - from them
  lexicon: LSJ
  rationale: This expresses that the casualties came out of that fleeing group. 'From
    among them' is natural English and reflects the partitive sense.
- source_word: εἰς ἄνδρας χιλίους
  chosen: about a thousand men
  alternatives:
  - a thousand men
  - up to a thousand men
  lexicon: LSJ
  rationale: The construction is somewhat unusual in this context; it indicates the
    number reached roughly a thousand. 'About a thousand men' communicates the likely
    quantitative sense without forcing a wooden rendering.
- source_word: ἀπέστρεψεν
  chosen: he returned
  alternatives:
  - he turned back
  - he went back
  lexicon: LSJ
  rationale: In this narrative conclusion, 'returned' is the most natural English
    equivalent.
- source_word: μετʼ εἰρήνης
  chosen: in peace
  alternatives:
  - peacefully
  - with peace
  lexicon: LSJ
  rationale: The phrase denotes a peaceful return after victory. 'In peace' is both
    literal and idiomatic in biblical narrative.
