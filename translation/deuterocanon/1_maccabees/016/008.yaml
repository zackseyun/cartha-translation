id: 1MA.16.8
reference: 1 Maccabees 16:8
source:
  edition: lxx-swete-1909
  text: καὶ ἐσάλπισαν ταῖς σάλπιγξιν, καὶ ἐτροπώθη Κενδεβαῖος καὶ ἡ παρεμβολὴ αὐτοῦ,
    καὶ ἔπεσον ἐξ αὐτῶν τραυματίαι πολλοί· οἱ δὲ καταλειφθέντες ἔφυγον εἰς τὸ ὀχύρωμα.
  language: Greek
  pages:
  - 683
  confidence: high
  validation: agree
translation:
  text: And they sounded the trumpets, and Cendebeus and his camp were thrown into
    confusion, and many of them fell wounded; but those who were left fled into the
    stronghold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were routed' / 'were put to flight' for 'were thrown into confusion'
      (ἐτροπώθη). The Greek military verb can carry the stronger sense of defeat and
      dispersal.
    reason: lexical_alternative
  - marker: b
    text: '''Fell wounded'' reflects the Greek closely and need not mean all died;
      it can denote men struck down in battle as wounded.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσάλπισαν
  chosen: sounded
  alternatives:
  - blew
  lexicon: LSJ
  rationale: The verb means to sound a trumpet. 'Sounded' fits idiomatic English with
    the following dative phrase 'the trumpets' and preserves the military signal sense.
- source_word: ταῖς σάλπιγξιν
  chosen: the trumpets
  alternatives:
  - with trumpets
  lexicon: LSJ
  rationale: The dative can be rendered instrumentally ('with trumpets'), but in English
    'sounded the trumpets' is the most natural equivalent and keeps the concrete military
    image.
- source_word: ἐτροπώθη
  chosen: were thrown into confusion
  alternatives:
  - were routed
  - were turned back
  - were put to flight
  lexicon: LSJ
  rationale: The passive of τρέπω in military context can denote being routed or put
    to flight. Because the verse later explicitly says the survivors fled, 'were thrown
    into confusion' preserves the immediate effect without collapsing it into the
    later action.
- source_word: παρεμβολὴ
  chosen: camp
  alternatives:
  - army
  - encampment
  lexicon: LSJ
  rationale: The term can mean camp or army. Here, paired with Cendebeus and followed
    by casualties and flight, it refers to his military force as encamped; 'camp'
    preserves the concrete sense while still implying the troops.
- source_word: ἔπεσον
  chosen: fell
  alternatives:
  - were struck down
  lexicon: LSJ
  rationale: A standard battle idiom meaning fell in combat. 'Fell' is concise and
    faithful.
- source_word: τραυματίαι
  chosen: wounded
  alternatives:
  - wounded men
  - casualties
  lexicon: LSJ
  rationale: The adjective/substantive denotes those wounded. 'Fell wounded' reflects
    the Greek directly, even if the English is slightly marked; it avoids overstating
    the text as necessarily meaning death.
- source_word: καταλειφθέντες
  chosen: those who were left
  alternatives:
  - the survivors
  - those left behind
  lexicon: LSJ
  rationale: The participle means those left remaining. 'Those who were left' is a
    transparent rendering; 'survivors' is interpretive but close. The chosen wording
    stays nearer the Greek while the context still implies survivors.
- source_word: ὀχύρωμα
  chosen: stronghold
  alternatives:
  - fortress
  - fortified place
  lexicon: LSJ
  rationale: The noun denotes a fortified place. 'Stronghold' is natural, military,
    and slightly broader than 'fortress,' fitting the context.
