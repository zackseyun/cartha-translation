id: 1MA.16.22
reference: 1 Maccabees 16:22
source:
  edition: lxx-swete-1909
  text: καὶ ἀκούσας ἐξέστη σφόδρα, καὶ συνέλαβεν τοὺς ἄνδρας τοὺς ἐλθόντας ἀπολέσαι
    αὐτόν, καὶ ἀπέκτεινεν αὐτούς, ἔγνω γὰρ ὅτι ἐζήτουν αὐτὸν ἀπολέσαι.
  language: Greek
  pages:
  - 684
  confidence: high
  validation: agree
translation:
  text: And when he heard, he was greatly alarmed, and he seized the men who had come
    to destroy him and killed them, for he knew that they were seeking to destroy
    him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀκούσας
  chosen: when he heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle of ἀκούω, naturally rendered temporally in English
    here. 'When he heard' is idiomatic and preserves the sequence without sounding
    wooden.
- source_word: ἐξέστη σφόδρα
  chosen: he was greatly alarmed
  alternatives:
  - he was utterly astonished
  - he was beside himself
  lexicon: BDAG
  rationale: ἐξίστημι can denote being amazed or emotionally overwhelmed. In this
    assassination context, 'greatly alarmed' best fits the narrative sense better
    than mere astonishment, and σφόδρα intensifies it as 'greatly'.
- source_word: συνέλαβεν
  chosen: he seized
  alternatives:
  - he arrested
  - he took hold of
  lexicon: BDAG
  rationale: The verb means to seize or apprehend. 'Seized' is broad and contextually
    apt without importing formal legal procedure implied by 'arrested'.
- source_word: τοὺς ἄνδρας
  chosen: the men
  alternatives:
  - the men involved
  - those men
  lexicon: BDAG
  rationale: ἄνδρας is straightforwardly masculine plural 'men.' Per gender-accurate
    policy, the masculine sense is retained.
- source_word: τοὺς ἐλθόντας ἀπολέσαι αὐτόν
  chosen: who had come to destroy him
  alternatives:
  - who had come to kill him
  - who had come to do away with him
  lexicon: BDAG
  rationale: ἀπόλλυμι can mean destroy or kill depending on context. Because the verse
    repeats the same verb twice, 'destroy' preserves lexical consistency while still
    fitting an assassination attempt.
- source_word: ἀπέκτεινεν
  chosen: killed
  alternatives:
  - put to death
  - slew
  lexicon: BDAG
  rationale: ἀποκτείνω specifically denotes killing. 'Killed' is clear modern English
    and avoids archaic 'slew'.
- source_word: ἔγνω
  chosen: he knew
  alternatives:
  - he realized
  - he came to know
  lexicon: BDAG
  rationale: The aorist here states his recognition of their intent. 'He knew' is
    direct and sufficiently natural.
- source_word: ἐζήτουν αὐτὸν ἀπολέσαι
  chosen: they were seeking to destroy him
  alternatives:
  - they were trying to kill him
  - they were seeking to do away with him
  lexicon: BDAG
  rationale: ζητέω with infinitive expresses purposeful intent. 'Were seeking to destroy
    him' preserves the imperfect's ongoing/planned sense and matches the repeated
    ἀπολέσαι for consistency.
