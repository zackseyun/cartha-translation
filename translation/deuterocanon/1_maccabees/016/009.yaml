id: 1MA.16.9
reference: 1 Maccabees 16:9
source:
  edition: lxx-swete-1909
  text: τότε ἐτραυματίσθη Ἰούδας ὁ ἀδελφὸς Ἰωάννου· Ἰωάννης δὲ κατεδίωξεν αὐτοὺς ἕως
    ἐλθεῖν εἰς Κεδρών, ἣν οἰκοδόμησεν.
  language: Greek
  pages:
  - 683
  confidence: high
  validation: agree
translation:
  text: Then Judas, the brother of John, was wounded; but John pursued them until
    they came to Kedron, which he had built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cedron.' The Greek place name Κεδρών may be represented in English with
      either K or the traditional Latinized C.
    reason: lexical_alternative
  - marker: b
    text: The clause 'which he had built' most naturally refers to Kedron as a place
      previously built by John, though the Greek does not expand the antecedent further.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐτραυματίσθη
  chosen: was wounded
  alternatives:
  - was injured
  - was struck
  lexicon: LSJ
  rationale: The passive aorist indicates Judas received a wound in battle. 'Was wounded'
    is the most natural and specific English rendering in a military context.
- source_word: κατεδίωξεν
  chosen: pursued
  alternatives:
  - chased down
  - pressed after
  lexicon: LSJ
  rationale: The verb denotes active pursuit of fleeing opponents. 'Pursued' is idiomatic,
    sufficiently formal, and fits the narrative sequence.
- source_word: ἕως ἐλθεῖν
  chosen: until they came
  alternatives:
  - until coming
  - as far as their reaching
  lexicon: LSJ
  rationale: The construction expresses the limit of the pursuit. Rendering the infinitive
    idiomatically as 'until they came' communicates the sense clearly in English.
- source_word: Κεδρών
  chosen: Kedron
  alternatives:
  - Cedron
  lexicon: LSJ
  rationale: A straightforward transliteration of the Greek place name is preferred.
    'Kedron' reflects the kappa more directly, while 'Cedron' is a traditional Latinized
    form.
- source_word: οἰκοδόμησεν
  chosen: had built
  alternatives:
  - built
  - fortified
  lexicon: LSJ
  rationale: The verb normally means 'built.' English past perfect is used because
    the building of Kedron is prior to the moment when John reaches it. 'Fortified'
    would add a nuance not explicit in the Greek.
