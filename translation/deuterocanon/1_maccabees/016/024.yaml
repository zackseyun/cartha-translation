id: 1MA.16.24
reference: 1 Maccabees 16:24
source:
  edition: lxx-swete-1909
  text: ἰδοὺ ταῦτα γέγραπται ἐπὶ βιβλίῳ ἡμερῶν ἀρχιερωσύνης αὐτοῦ, ἀφʼ οὗ ἐγενήθη
    ἀρχιερεὺς μετὰ τὸν πατέρα αὐτοῦ.
  language: Greek
  pages:
  - 684
  confidence: high
  validation: minor_mismatch
translation:
  text: Behold, these things are written in the book of the days of his high priesthood,
    from the time when he became high priest after his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'in the annals of his high priesthood.' The Greek
      reads more literally, 'in the book of the days of his high priesthood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: LSJ
  rationale: Retains the demonstrative, attention-directing force of the Greek in
    a formal but still intelligible way, fitting the concluding archival notice.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these
  - this
  lexicon: LSJ
  rationale: The neuter plural points broadly to the preceding matters just narrated;
    'these things' preserves that scope more clearly than the bare 'these'.
- source_word: γέγραπται
  chosen: are written
  alternatives:
  - have been written
  - stand written
  lexicon: LSJ
  rationale: The perfect passive indicates a completed written record with continuing
    existence; 'are written' is idiomatic English that preserves the archival sense.
- source_word: ἐπὶ βιβλίῳ
  chosen: in the book
  alternatives:
  - on the book
  - in a book
  - upon the scroll
  lexicon: LSJ
  rationale: Although ἐπί with dative is literally 'on/upon,' in documentary contexts
    it commonly indicates location within a written record. 'In the book' is the most
    natural English rendering here.
- source_word: ἡμερῶν
  chosen: of the days
  alternatives:
  - of the annals
  - of the records
  lexicon: LSJ
  rationale: A formally close rendering is preferred because the phrase likely reflects
    an annalistic title. More interpretive options such as 'annals' are possible but
    go beyond the explicit wording.
- source_word: ἀρχιερωσύνης
  chosen: high priesthood
  alternatives:
  - high-priestly office
  lexicon: LSJ
  rationale: This noun denotes the office or tenure of the high priest. 'High priesthood'
    is standard, clear English.
- source_word: ἀφʼ οὗ
  chosen: from the time when
  alternatives:
  - since
  - from when
  lexicon: LSJ
  rationale: This idiom marks the starting point of the period covered by the record.
    'From the time when' makes the temporal force explicit and smooth in English.
- source_word: ἐγενήθη
  chosen: he became
  alternatives:
  - he was made
  - he came to be
  lexicon: LSJ
  rationale: The aorist here refers to accession to office. 'He became' is natural
    English and avoids implying an explicit agent not stated in the Greek.
- source_word: μετὰ τὸν πατέρα αὐτοῦ
  chosen: after his father
  alternatives:
  - following his father
  - in succession to his father
  lexicon: LSJ
  rationale: The phrase indicates succession in office after his father. 'After his
    father' is concise and faithful; the succession nuance is sufficiently clear in
    context.
