id: 1MA.16.15
reference: 1 Maccabees 16:15
source:
  edition: lxx-swete-1909
  text: καὶ ὑπεδέξατο αὐτοὺς ὁ τοῦ Ἀβουβον εἰς τὸ ὀχύρωματιν τὸ καλούμενον Δὼκ μετὰ
    δόλου, ὃ ᾠκοδόμησεν, καὶ ἐποίησεν αὐτοῖς πότον μέγαν· καὶ ἐνέκρυψεν ἐκεῖ ἄνδρας.
  language: Greek
  pages:
  - 684
  confidence: high
  validation: agree
translation:
  text: And the son of Abubus welcomed them into the stronghold called Dok with deceit,
    which he had built, and he gave them a great banquet; and he had men hidden there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he prepared a great drinking feast for them.' The Greek phrase literally
      emphasizes drink (πότον), though the broader sense is a lavish banquet.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπεδέξατο
  chosen: welcomed
  alternatives:
  - received
  - entertained
  lexicon: LSJ
  rationale: The verb denotes receiving or welcoming guests. 'Welcomed' fits the hospitality
    setting and prepares for the treachery expressed by 'with deceit.'
- source_word: ὁ τοῦ Ἀβουβον
  chosen: the son of Abubus
  alternatives:
  - the one of Abubus
  - Abubus's son
  lexicon: LSJ
  rationale: This elliptical Greek expression identifies the subject by patronymic.
    In context it refers to Ptolemy son of Abubus from the surrounding narrative;
    since the Greek here uses the patronymic rather than the personal name, the translation
    preserves that form.
- source_word: ὀχύρωματιν
  chosen: stronghold
  alternatives:
  - fortress
  - fortified place
  lexicon: LSJ
  rationale: Despite the unusual form in Swete's text, the sense is clearly that of
    a fortified location. 'Stronghold' is natural English and suitably military without
    over-specifying architecture.
- source_word: τὸ καλούμενον Δὼκ
  chosen: called Dok
  alternatives:
  - named Dok
  lexicon: LSJ
  rationale: A straightforward rendering of the participial naming formula; 'Dok'
    is a standard transliteration of Δώκ.
- source_word: μετὰ δόλου
  chosen: with deceit
  alternatives:
  - deceitfully
  - treacherously
  - by treachery
  lexicon: LSJ
  rationale: The prepositional phrase is best kept explicit. 'With deceit' preserves
    the noun and highlights the manner of the welcome without adding interpretive
    color beyond the Greek.
- source_word: ὃ ᾠκοδόμησεν
  chosen: which he had built
  alternatives:
  - which he built
  lexicon: LSJ
  rationale: The relative clause refers to the stronghold. English past perfect is
    slightly smoother in context, indicating the building preceded the reception.
- source_word: ἐποίησεν αὐτοῖς πότον μέγαν
  chosen: he gave them a great banquet
  alternatives:
  - he made a great drinking feast for them
  - he prepared a great feast for them
  lexicon: LSJ
  rationale: Literally the phrase centers on drinking, but in context it denotes lavish
    hospitality as part of the trap. 'Great banquet' communicates the event naturally
    in modern English while retaining the sense of abundance.
- source_word: ἐνέκρυψεν ἐκεῖ ἄνδρας
  chosen: he had men hidden there
  alternatives:
  - he hid men there
  - he concealed men there
  lexicon: LSJ
  rationale: The clause indicates that men were concealed at that location in preparation
    for the ambush. 'Had men hidden there' reads naturally in English and preserves
    the deliberate setup.
