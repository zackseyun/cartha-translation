id: 1MA.16.6
reference: 1 Maccabees 16:6
source:
  edition: lxx-swete-1909
  text: καὶ παρενέβαλεν κατὰ πρόσωπον αὐτῶν αὐτὸς καὶ ὁ λαὸς αὐτοῦ· καὶ εἶδεν τὸν
    λαὸν δειλούμενον διαπερᾶσαι τὸν χειμάρρουν, καὶ διεπέρασεν πρῶτος· καὶ εἶδον αὐτὸν
    οἱ ἄνδρες, καὶ διεπέρασαν κατόπισθεν αὐτοῦ.
  language: Greek
  pages:
  - 683
  confidence: high
  validation: agree
translation:
  text: And he himself and his people encamped opposite them; and when he saw the
    people afraid to cross the wadi, he crossed first, and the men saw him and crossed
    after him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the torrent' or 'the stream-bed'; the Greek term refers to a seasonal
      watercourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλεν
  chosen: encamped
  alternatives:
  - drew up camp
  - pitched camp
  lexicon: LSJ
  rationale: The verb commonly denotes making camp or encamping in a military context.
    'Encamped' preserves the martial setting without unnecessary expansion.
- source_word: κατὰ πρόσωπον αὐτῶν
  chosen: opposite them
  alternatives:
  - before them
  - facing them
  lexicon: LSJ
  rationale: The phrase indicates position in front of or opposite another party.
    'Opposite them' is natural English and fits the tactical scene.
- source_word: δειλούμενον
  chosen: afraid
  alternatives:
  - cowardly
  - timid
  - hesitating in fear
  lexicon: LSJ
  rationale: The participle describes fearfulness here, not a moral judgment of cowardice.
    'Afraid' best captures the immediate sense in readable English.
- source_word: διαπερᾶσαι
  chosen: to cross
  alternatives:
  - to pass through
  - to go across
  lexicon: LSJ
  rationale: In context with the torrent-bed, the verb means crossing over. 'To cross'
    is the clearest idiomatic rendering.
- source_word: τὸν χειμάρρουν
  chosen: the wadi
  alternatives:
  - the torrent
  - the stream-bed
  - the winter torrent
  lexicon: LSJ
  rationale: χείμαρρους denotes a seasonal torrent or wadi. 'Wadi' communicates the
    geographical reality more precisely than 'brook,' while remaining accessible enough
    in context.
- source_word: διεπέρασεν πρῶτος
  chosen: he crossed first
  alternatives:
  - he went across first
  - he passed over first
  lexicon: LSJ
  rationale: The phrase emphasizes Simon's leading action. 'He crossed first' is direct
    and preserves the narrative force.
- source_word: οἱ ἄνδρες
  chosen: the men
  alternatives:
  - his men
  - the soldiers
  lexicon: LSJ
  rationale: The Greek says 'the men' without an explicit possessive. In context they
    are his forces, but the translation keeps the more literal wording.
- source_word: κατόπισθεν αὐτοῦ
  chosen: after him
  alternatives:
  - behind him
  - following him
  lexicon: LSJ
  rationale: The phrase marks movement in his wake. 'After him' is concise and idiomatic
    in this narrative sequence.
