theological_decisions:
- issue: Nature of ἀφέσεως in a royal-administrative context
  chosen_reading: release
  alternative_readings:
  - remission
  - pardon
  rationale: The verse is a political decree about privileges granted on sacred days,
    not a theological statement about sin. Therefore ἀφεσις is rendered in a civic-administrative
    sense rather than with explicitly religious language.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source-context meaning'
