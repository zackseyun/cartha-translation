translation:
  text: And let all the festivals and the Sabbaths and the new moons and the appointed
    days, and the three days before a festival and the three days after a festival,
    all be days of tax exemption and release for all the Jews who are in all my kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remission' or 'pardon'; the Greek term can denote release from obligations,
      and here likely refers to administrative relief granted on these days.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑορταὶ
  chosen: festivals
  alternatives:
  - feasts
  lexicon: LSJ
  rationale: ἑορτή denotes a festal celebration or feast day. 'Festivals' is natural
    modern English and fits the list of sacred observances without sounding archaic.
- source_word: σάββατα
  chosen: Sabbaths
  alternatives:
  - sabbath days
  lexicon: LSJ
  rationale: A straightforward rendering of the plural, preserving the Jewish calendrical
    reference.
- source_word: νουμηνίαι
  chosen: new moons
  alternatives:
  - new moon festivals
  lexicon: LSJ
  rationale: The term refers to new-moon observances. 'New moons' is the standard
    concise rendering and is intelligible in a calendrical list.
- source_word: ἡμέραι ἀποδεδειγμέναι
  chosen: appointed days
  alternatives:
  - designated days
  - fixed days
  lexicon: LSJ
  rationale: The participle ἀποδεδειγμέναι conveys days that have been designated
    or appointed. 'Appointed days' best captures official/religious designation in
    idiomatic English.
- source_word: ἔστωσαν
  chosen: let ... be
  alternatives:
  - shall be
  lexicon: LSJ
  rationale: The imperative force in this royal decree is well conveyed by 'let ...
    be,' which sounds natural in English while preserving the formal declarative command.
- source_word: ἀτελείας
  chosen: tax exemption
  alternatives:
  - immunity from taxes
  - freedom from tribute
  lexicon: LSJ
  rationale: ἀτέλεια commonly denotes exemption from taxes, tribute, or dues. 'Tax
    exemption' is precise and accessible in modern English.
- source_word: ἀφέσεως
  chosen: release
  alternatives:
  - remission
  - pardon
  lexicon: LSJ
  rationale: ἀφεσις here is paired with ἀτέλεια in an administrative context, so a
    broad civic 'release' is preferable to a more theological 'forgiveness.' It likely
    refers to remission from obligations or liabilities during these days.
- source_word: πᾶσι τοῖς Ἰουδαίοις
  chosen: for all the Jews
  alternatives:
  - to all the Jews
  lexicon: LSJ
  rationale: The dative with the predicate nouns indicates the beneficiaries of the
    decree. 'For all the Jews' reads naturally in English.
- source_word: τοῖς οὖσιν ἐν πάσῃ τῇ βασιλείᾳ μου
  chosen: who are in all my kingdom
  alternatives:
  - throughout my whole kingdom
  - who are within my entire realm
  lexicon: LSJ
  rationale: This phrase identifies the Jews located anywhere within the king's realm.
    'Who are in all my kingdom' stays close to the Greek while remaining clear.
