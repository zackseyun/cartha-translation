translation:
  text: And pestilent men from Israel gathered against him, lawless men, to bring
    charges against him; but the king paid no attention to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'troublesome men' or 'men like a plague'; the Greek insult is unusually
      strong and metaphorical.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'to bring charges against him' could also be rendered 'to petition
      against him' or 'to accuse him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν
  chosen: gathered
  alternatives:
  - assembled
  - came together
  lexicon: LSJ
  rationale: 'A straightforward past passive/intransitive sense fits the narrative:
    hostile persons came together as a group against him.'
- source_word: ἐπʼ αὐτόν
  chosen: against him
  alternatives:
  - to him
  - upon him
  lexicon: LSJ
  rationale: In this hostile legal-political context, the prepositional phrase is
    adversative rather than merely directional.
- source_word: ἄνδρες λοιμοί
  chosen: pestilent men
  alternatives:
  - troublesome men
  - plague-like men
  - worthless men
  lexicon: LSJ
  rationale: λοιμός literally relates to plague/pestilence and can be used metaphorically
    for a pest or public menace. 'Pestilent men' preserves the sharp invective of
    the Greek better than a flatter idiom like 'troublemakers.'
- source_word: ἐξ Ἰσραήλ
  chosen: from Israel
  alternatives:
  - out of Israel
  - among the Israelites
  lexicon: LSJ
  rationale: The phrase marks their origin or constituency. 'From Israel' is concise
    and natural in English.
- source_word: ἄνδρες παράνομοι
  chosen: lawless men
  alternatives:
  - outlaws
  - wicked men
  - men acting unlawfully
  lexicon: LSJ
  rationale: παράνομος denotes being contrary to law. 'Lawless men' preserves both
    the formal sense and the rhetorical force.
- source_word: ἐντυχεῖν κατʼ αὐτοῦ
  chosen: to bring charges against him
  alternatives:
  - to petition against him
  - to accuse him
  - to appeal against him
  lexicon: LSJ
  rationale: ἐντυγχάνω with κατά in administrative/judicial contexts commonly means
    to make an approach or petition against someone, effectively to lodge accusations.
    'Bring charges against him' makes the legal thrust clear in modern English without
    overparaphrasing.
- source_word: οὐ προσέσχεν αὐτοῖς
  chosen: paid no attention to them
  alternatives:
  - did not listen to them
  - gave them no heed
  lexicon: LSJ
  rationale: προσέχω here means to attend to or heed. 'Paid no attention to them'
    is idiomatic modern English and captures the king's refusal to entertain their
    case.
- source_word: ὁ βασιλεύς
  chosen: the king
  lexicon: LSJ
  rationale: Standard rendering of the title in this narrative context.
