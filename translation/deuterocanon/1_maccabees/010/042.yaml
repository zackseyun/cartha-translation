translation:
  text: And in addition to these things, the five thousand shekels of silver that
    they used to take from the revenues, as in the former years, from the sanctuary
    account each year, these also are remitted, because they belong to the priests
    who minister.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the sanctuary's annual account' or 'from the annual reckoning of
      the sanctuary.' The Greek phrase involving λόγος is administrative and somewhat
      compressed.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεντακισχιλίους σίκλους ἀργυρίου
  chosen: the five thousand shekels of silver
  alternatives:
  - five thousand silver shekels
  lexicon: LSJ
  rationale: A straightforward monetary expression. 'Shekels of silver' is idiomatic
    English and preserves the ancient unit rather than converting it.
- source_word: ἐλάμβανον
  chosen: they used to take
  alternatives:
  - they were taking
  - they took
  lexicon: LSJ
  rationale: The imperfect indicates customary past action, so 'used to take' best
    captures the repeated practice.
- source_word: ἀπὸ τῶν χρειῶν
  chosen: from the revenues
  alternatives:
  - from the dues
  - from the receipts
  - from the needs
  lexicon: LSJ
  rationale: In this fiscal context, χρεῖαι refers to financial proceeds or income
    rather than 'needs.' 'Revenues' fits the administrative setting and the following
    remission language.
- source_word: ὡς ἐν τοῖς πρώτοις ἔτεσιν
  chosen: as in the former years
  alternatives:
  - as in the earlier years
  - as in the first years
  lexicon: LSJ
  rationale: This compares the present levy with prior customary practice. 'Former
    years' is natural English and preserves the retrospective comparison.
- source_word: τοῦ ἁγίου
  chosen: from the sanctuary
  alternatives:
  - from the holy place
  - from the temple
  lexicon: LSJ
  rationale: The phrase is tied to temple finances and priestly service. 'Sanctuary'
    is broad enough to preserve the cultic reference without over-specifying a sub-area
    of the temple.
- source_word: ἀπὸ τοῦ λόγου
  chosen: account
  alternatives:
  - reckoning
  - record
  - assessment
  lexicon: LSJ
  rationale: λόγος in administrative contexts can denote an account or reckoning.
    Because the phrase concerns annual temple revenues, 'account' best conveys a fiscal
    register or accounting basis.
- source_word: κατʼ ἐνιαυτόν
  chosen: each year
  alternatives:
  - year by year
  - annually
  lexicon: LSJ
  rationale: This is a standard distributive temporal phrase. 'Each year' is clear
    and natural.
- source_word: ἀφίεται
  chosen: are remitted
  alternatives:
  - are released
  - are forgiven
  - are canceled
  lexicon: LSJ
  rationale: In a taxation and revenue context, the sense is cancellation or remission
    of an obligation. 'Are remitted' preserves the formal administrative tone.
- source_word: διὰ τὸ ἀνήκειν αὐτὰ
  chosen: because they belong
  alternatives:
  - because they pertain
  - because they are due
  lexicon: LSJ
  rationale: ἀνήκειν here expresses rightful attachment or entitlement. 'Belong' communicates
    that the funds properly fall to the priests.
- source_word: τοῖς ἱερεῦσιν τοῖς λειτουργοῦσιν
  chosen: to the priests who minister
  alternatives:
  - to the priests who serve
  - to the officiating priests
  lexicon: LSJ
  rationale: λειτουργέω language in cultic settings refers to priestly service. 'Who
    minister' preserves the formal temple-service nuance better than the more generic
    'serve.'
