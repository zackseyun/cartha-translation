translation:
  text: And the king gave orders to them, and they stripped Jonathan of his garments
    and clothed him in purple; and they did so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has singular verbs ('stripped,' 'clothed him') after 'the king gave
      orders to them'; the sense is that the attendants carried out the king's command.
    reason: textual_variant
  - marker: b
    text: '''Purple'' signifies royal or high-status attire in this court setting.'
    reason: cultural_note
lexical_decisions:
- source_word: προσέταξεν
  chosen: gave orders
  alternatives:
  - commanded
  - ordered
  lexicon: BDAG
  rationale: The verb denotes issuing an authoritative command. 'Gave orders' is natural
    modern English and preserves the royal authority implied by the aorist verb.
- source_word: ἐξέδυσεν
  chosen: they stripped ... of his garments
  alternatives:
  - undressed
  - took off ... clothes
  lexicon: BDAG
  rationale: Although the Greek form is singular, the surrounding plural references
    ('to them' and later 'they did so') indicate the king's attendants are the implied
    agents carrying out the action. 'Stripped ... of his garments' reflects the formal
    act of removing official clothing better than the softer 'undressed.'
- source_word: ἱμάτια
  chosen: garments
  alternatives:
  - clothes
  - robes
  lexicon: BDAG
  rationale: A general term for clothing. 'Garments' fits the elevated court setting
    better than 'clothes' and avoids over-specifying with 'robes.'
- source_word: ἐνέδυσεν
  chosen: clothed him
  alternatives:
  - dressed him
  - put on him
  lexicon: BDAG
  rationale: '''Clothed him'' is idiomatic and preserves the ceremonial sense of investiture
    in context.'
- source_word: πορφύραν
  chosen: purple
  alternatives:
  - a purple robe
  - purple clothing
  lexicon: BDAG
  rationale: The noun can denote purple cloth or a purple garment. Since the Greek
    does not explicitly repeat 'garment,' the simpler 'purple' best mirrors the source
    while still conveying royal attire by context.
- source_word: ἐποίησαν οὕτως
  chosen: they did so
  alternatives:
  - they did thus
  - they acted accordingly
  lexicon: BDAG
  rationale: A straightforward idiomatic rendering of the summary clause indicating
    compliance with the king's command.
