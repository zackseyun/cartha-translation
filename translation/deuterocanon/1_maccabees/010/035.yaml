lexical_decisions:
- source_word: οὐχ ἕξει ἐξουσίαν
  chosen: will have authority
  alternatives:
  - will have power
  - will be permitted
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes authority, right, or power to act. 'Will have
    authority' preserves the juridical sense in this royal decree context better than
    the broader 'power' and more directly reflects the Greek than an inferred passive
    such as 'will be permitted.'
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  - not anyone
  lexicon: BDAG
  rationale: A straightforward indefinite negative; 'no one' is standard, clear modern
    English.
- source_word: πρᾶξαι
  chosen: to act against
  alternatives:
  - to do anything against
  - to proceed against
  - to exact
  lexicon: LSJ
  rationale: The infinitive from πράσσω is broad ('do, act, carry out'), but in this
    legal-protective context and paired with 'harass,' it likely refers to taking
    action against someone. 'To act against' keeps the breadth without over-specifying
    a legal penalty.
- source_word: παρενοχλεῖν
  chosen: harass
  alternatives:
  - molest
  - trouble
  - annoy
  lexicon: LSJ
  rationale: The verb denotes causing trouble or interference. 'Harass' fits the decree's
    prohibition of hostile interference and avoids the archaic or misleading connotations
    of 'molest' in modern English.
- source_word: τινα αὐτῶν
  chosen: any of them
  alternatives:
  - anyone among them
  - one of them
  lexicon: BDAG
  rationale: This naturally refers to any individual within the protected group. 'Any
    of them' is idiomatic and precise.
- source_word: περὶ παντὸς πράγματος
  chosen: in any matter
  alternatives:
  - concerning any thing
  - with respect to any matter
  - for any reason
  lexicon: BDAG
  rationale: πρᾶγμα here means matter, affair, or case. 'In any matter' captures the
    comprehensive scope of the protection in natural English.
