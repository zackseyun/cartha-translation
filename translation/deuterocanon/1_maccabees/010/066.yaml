translation:
  text: And Jonathan returned to Jerusalem with peace and gladness.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπέστρεψεν
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: BDAG
  rationale: In narrative context with εἰς Ἱερουσαλήμ, the verb denotes returning
    to a place rather than merely turning around. 'Returned' is natural English and
    preserves the directional sense.
- source_word: μετʼ εἰρήνης
  chosen: with peace
  alternatives:
  - in peace
  - peacefully
  lexicon: LSJ
  rationale: The preposition μετά with the genitive is literally 'with.' 'With peace'
    preserves the Greek construction and likely conveys a state of safe, untroubled
    return. 'In peace' is possible, but 'with peace' keeps the coordinate parallel
    with καὶ εὐφροσύνης.
- source_word: εὐφροσύνης
  chosen: gladness
  alternatives:
  - joy
  - rejoicing
  lexicon: LSJ
  rationale: The noun denotes joy, merriment, or gladness. 'Gladness' fits the simple
    narrative register and pairs smoothly with 'peace' without sounding overly liturgical.
- source_word: Ἰωνάθαν
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
- source_word: Ἱερουσαλήμ
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
