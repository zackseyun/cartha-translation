lexical_decisions:
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - sent word
  - wrote a letter
  lexicon: LSJ
  rationale: The aorist of γράφω straightforwardly means 'wrote.' 'Sent word' is too
    interpretive, and 'wrote a letter' adds an object not explicit in the Greek, though
    implied by context.
- source_word: ὁ βασιλεὺς Ἀλέξανδρος
  chosen: King Alexander
  alternatives:
  - Alexander the king
  lexicon: LSJ
  rationale: English idiom naturally places the title before the name. This preserves
    both the royal title and the personal name without awkwardness.
- source_word: Ἰωνάθῃ
  chosen: to Jonathan
  lexicon: LSJ
  rationale: Dative indirect object after ἔγραψεν indicates the recipient of the writing.
    The standard transliteration 'Jonathan' is appropriate for the personal name.
- source_word: ἐλθεῖν
  chosen: to come
  alternatives:
  - to go
  lexicon: LSJ
  rationale: The infinitive of ἔρχομαι normally means 'to come.' In invitation contexts
    English could use 'come' from the speaker's perspective; 'go' would weaken the
    deictic force present in the Greek.
- source_word: εἰς συνάντησιν αὐτῷ
  chosen: and meet him
  alternatives:
  - for a meeting with him
  - to meet with him
  lexicon: LSJ
  rationale: Literally 'into a meeting with him,' an idiom meaning to come for an
    encounter/meeting. 'And meet him' is natural modern English and preserves the
    sense without over-literal awkwardness. 'Meet with him' is possible, but 'meet
    him' is slightly cleaner and still accurate.
