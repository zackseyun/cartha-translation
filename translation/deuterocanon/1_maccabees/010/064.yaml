translation:
  text: And it happened that, when those who met him saw his splendor, just as it
    had been proclaimed, and that he was clothed in linen, they all fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his glory.' In this context the Greek likely refers to visible royal
      magnificence rather than a specifically theological sense.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'clothed in linen' (or 'wearing a linen garment'); the term
      refers to linen cloth or clothing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ὡς
  chosen: And it happened that, when
  alternatives:
  - And when
  - Now when
  lexicon: LSJ
  rationale: Retains the narrative transition and temporal force without overly wooden
    English. 'And it happened that, when' reflects the Greek formula more transparently
    than a bare 'when.'
- source_word: οἱ ἐντυγχάνοντες
  chosen: those who met him
  alternatives:
  - those who encountered him
  - those present
  - those who approached him
  lexicon: LSJ
  rationale: The participle denotes people coming into contact with or meeting him.
    'Those who met him' is natural English and preserves the interpersonal sense better
    than the vaguer 'those present.' The object 'him' is supplied from context.
- source_word: τὴν δόξαν αὐτοῦ
  chosen: his splendor
  alternatives:
  - his glory
  - his magnificence
  lexicon: LSJ
  rationale: In this royal/public setting, δόξα refers to visible magnificence or
    impressive display rather than explicitly theological 'glory.' 'Splendor' best
    fits the context while preserving the elevated tone.
- source_word: καθὼς ἐκήρυξεν
  chosen: just as it had been proclaimed
  alternatives:
  - as had been announced
  - according as proclamation had been made
  lexicon: LSJ
  rationale: The verb κηρύσσω here refers to public proclamation. English idiom prefers
    an impersonal passive ('it had been proclaimed') since the Greek leaves the subject
    implicit. This also connects naturally to the public report of his royal display.
- source_word: περιβεβλημένον αὐτὸν σινδόνα
  chosen: that he was clothed in linen
  alternatives:
  - him wrapped in a linen garment
  - him wearing fine linen
  - him clothed with a linen cloth
  lexicon: LSJ
  rationale: περιβεβλημένον indicates being clothed or wrapped, and σινδών denotes
    linen cloth/garment. 'Clothed in linen' is concise and idiomatic, while preserving
    the material reference. 'Fine linen' is possible but adds a nuance not explicit
    in the Greek.
- source_word: ἔφυγον πάντες
  chosen: they all fled
  alternatives:
  - all of them fled
  - they all ran away
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist verb plus πάντες. 'Fled' preserves
    the force better than the more colloquial 'ran away.'
