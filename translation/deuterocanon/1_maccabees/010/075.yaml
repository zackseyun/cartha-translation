translation:
  text: And he encamped against Joppa, but the men from the city shut him out, because
    a garrison of Apollonius was in Joppa; so they fought against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those from the city shut him out.' The Greek phrase is literally 'those
      from the city.'
    reason: lexical_alternative
  - marker: b
    text: The final 'it' refers to Joppa, the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλεν ἐπὶ Ἰόππην
  chosen: encamped against Joppa
  alternatives:
  - camped by Joppa
  - marched against Joppa
  lexicon: LSJ
  rationale: παρεμβάλλω in military context commonly means to encamp or draw up camp
    against a place. 'Encamped against' preserves the military sense better than the
    more general 'marched against.'
- source_word: ἀπέκλεισαν αὐτόν
  chosen: shut him out
  alternatives:
  - excluded him
  - closed the gates against him
  - blocked him off
  lexicon: LSJ
  rationale: ἀποκλείω means to shut out or exclude. 'Shut him out' is idiomatic and
    fits the likely sense that the city's inhabitants denied him entry.
- source_word: οἱ ἐκ τῆς πόλεως
  chosen: the men from the city
  alternatives:
  - those from the city
  - the people of the city
  lexicon: LSJ
  rationale: The phrase literally means 'those from the city.' 'The men from the city'
    gives a natural English rendering in a military narrative, while reflecting the
    masculine form without overgeneralizing.
- source_word: φρουρὰ Ἀπολλωνίου
  chosen: a garrison of Apollonius
  alternatives:
  - Apollonius's garrison
  - a guard force of Apollonius
  lexicon: LSJ
  rationale: φρουρά in this context denotes a military garrison. The genitive identifies
    it as belonging to or loyal to Apollonius.
- source_word: ἐπολέμησαν αὐτήν
  chosen: they fought against it
  alternatives:
  - they attacked it
  - they made war on it
  lexicon: LSJ
  rationale: πολεμέω means to wage war or fight against. The pronoun αὐτήν is feminine
    singular and most naturally refers to the city, so 'it' refers to Joppa. This
    keeps the Greek referent rather than shifting to a more interpretive object.
