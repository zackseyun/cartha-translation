translation:
  text: And Simon deployed his force and joined battle with the phalanx, for the cavalry
    had been thrown into disorder; and they were crushed by him and fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'joined battle with the phalanx.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the horse'; that is, the cavalry.
    reason: lexical_alternative
  - marker: c
    text: Or 'was broken up' / 'was undone,' referring to the cavalry's loss of cohesion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέλυσεν
  chosen: deployed
  alternatives:
  - loosed
  - set in motion
  - drew out
  lexicon: LSJ
  rationale: In military context with τὴν δύναμιν αὐτοῦ ('his force'), the verb is
    best taken as releasing or bringing troops into action rather than a literal 'loosed.'
    'Deployed' gives clear modern military sense while staying close to the Greek
    action.
- source_word: τὴν δύναμιν αὐτοῦ
  chosen: his force
  alternatives:
  - his army
  - his troops
  lexicon: LSJ
  rationale: δύναμις here refers to military strength or contingent. 'Force' preserves
    the singular collective sense and avoids over-specifying a full national army.
- source_word: συνῆψεν πρὸς τὴν φάλαγγα
  chosen: engaged the phalanx
  alternatives:
  - joined battle with the phalanx
  - closed with the phalanx
  lexicon: LSJ
  rationale: The idiom indicates entering combat against the infantry formation. 'Engaged
    the phalanx' is concise, natural English and preserves the military specificity
    of φάλαγξ.
- source_word: φάλαγγα
  chosen: phalanx
  alternatives:
  - battle line
  - infantry formation
  lexicon: LSJ
  rationale: Because φάλαγξ names a recognizable Hellenistic military formation, retaining
    'phalanx' preserves historical specificity better than a generalized term.
- source_word: ἡ γὰρ ἵππος
  chosen: the cavalry
  alternatives:
  - the horsemen
  - the horse
  lexicon: LSJ
  rationale: Although literally 'the horse,' the collective military sense is cavalry.
    This is standard and clear in English.
- source_word: ἐξελύθη
  chosen: had been thrown into disorder
  alternatives:
  - was broken up
  - was undone
  - was routed
  lexicon: LSJ
  rationale: The passive of the same verb used earlier suggests the cavalry came apart
    or lost cohesion. 'Thrown into disorder' captures disintegration without prematurely
    duplicating the later explicit flight.
- source_word: συνετρίβησαν
  chosen: were crushed
  alternatives:
  - were shattered
  - were broken
  lexicon: LSJ
  rationale: The verb conveys decisive breaking or crushing in battle. 'Were crushed'
    is vivid and natural, matching the military defeat context.
- source_word: ἀπʼ αὐτοῦ
  chosen: before him
  alternatives:
  - by him
  - from before him
  lexicon: LSJ
  rationale: The phrase can denote agency or movement away from someone's presence.
    In battle narrative, 'before him' idiomatically conveys that they collapsed in
    Simon's presence/under his assault, followed by 'fled.'
