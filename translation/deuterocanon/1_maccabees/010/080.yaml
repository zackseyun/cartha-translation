translation:
  text: And Jonathan realized that there was an ambush behind him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔγνω
  chosen: realized
  alternatives:
  - knew
  - recognized
  - learned
  lexicon: BDAG
  rationale: Aorist of γινώσκω here marks Jonathan's coming to awareness in the moment
    of battle. 'Realized' conveys this eventive recognition more naturally than the
    flatter 'knew,' while staying close to the Greek sense.
- source_word: ἔνεδρον
  chosen: an ambush
  alternatives:
  - an ambush party
  - a trap
  - an ambuscade
  lexicon: LSJ
  rationale: ἔνεδρον denotes an ambush or men lying in wait. 'An ambush' is concise,
    idiomatic modern English, and adequately represents the singular neuter noun used
    collectively.
- source_word: κατόπισθεν αὐτοῦ
  chosen: behind him
  alternatives:
  - at his rear
  - behind him/from behind him
  lexicon: LSJ
  rationale: The phrase indicates position to Jonathan's rear. 'Behind him' is the
    most direct rendering. 'At his rear' is possible in military English but less
    natural for a general audience.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: The conjunction simply links this clause to the narrative sequence. 'And'
    preserves the Greek connective without adding interpretive force.
