translation:
  text: But the people stood as Jonathan had commanded, and their horses grew weary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek simply says 'their horses'; in context this most likely refers
      to the enemy cavalry's horses becoming tired while Jonathan's people held position.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ λαός
  chosen: But the people
  alternatives:
  - And the people
  - Now the people
  lexicon: LSJ
  rationale: λαός is straightforwardly 'people' here, referring to Jonathan's forces
    or the assembled body. δέ is rendered 'But' to mark narrative progression with
    mild contrast from the preceding action.
- source_word: ἱστήκει
  chosen: stood
  alternatives:
  - were standing
  - remained standing
  - held their position
  lexicon: LSJ
  rationale: The pluperfect/imperfect-like form conveys a state of standing or remaining
    in place. 'Stood' is concise and natural in English while preserving the sense
    that they maintained position as ordered.
- source_word: καθὼς ἐπέταξεν Ἰωναθάν
  chosen: as Jonathan had commanded
  alternatives:
  - just as Jonathan commanded
  - as Jonathan ordered
  lexicon: LSJ
  rationale: ἐπιτάσσω commonly means 'command' or 'order.' 'Had commanded' fits the
    prior action relative to their standing and reads naturally in English narrative.
- source_word: ἐκοπίασαν
  chosen: grew weary
  alternatives:
  - became tired
  - were exhausted
  - wearied themselves
  lexicon: LSJ
  rationale: κοπιάω can mean to grow weary or become tired from exertion. 'Grew weary'
    preserves the intransitive/resultative sense here without overstating the degree
    as 'were exhausted.'
- source_word: οἱ ἵπποι αὐτῶν
  chosen: their horses
  alternatives:
  - the horses of them
  lexicon: LSJ
  rationale: A direct possessive rendering is idiomatic English. The pronoun most
    naturally refers to the opposing side's horses in context, but the Greek itself
    simply says 'their horses,' so the translation preserves that wording.
