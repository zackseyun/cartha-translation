translation:
  text: And King Alexander heard the promises that Demetrius had sent to Jonathan,
    and they told him about the wars and the brave deeds that he and his brothers
    had done, and the hardships they had endured.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπαγγελίας
  chosen: promises
  alternatives:
  - offers
  - pledges
  lexicon: BDAG
  rationale: The noun denotes commitments or assurances made by Demetrius to Jonathan.
    'Promises' is the most natural English equivalent and fits the political context
    without overstating formality.
- source_word: διηγήσαντο
  chosen: they told
  alternatives:
  - they related
  - they recounted
  lexicon: BDAG
  rationale: The verb means to narrate or recount in detail. 'They told' keeps the
    sense in readable modern English; the following objects supply the content of
    the report.
- source_word: πόλεμους
  chosen: wars
  alternatives:
  - battles
  - campaigns
  lexicon: BDAG
  rationale: Plural 'wars' reflects the Greek directly and conveys repeated military
    conflicts. 'Battles' would narrow the scope too much.
- source_word: ἀνδραγαθίας
  chosen: brave deeds
  alternatives:
  - acts of valor
  - heroic deeds
  lexicon: LSJ
  rationale: The term refers to displays of courage or valor. 'Brave deeds' is clear,
    idiomatic, and preserves the commendatory force without sounding overly elevated.
- source_word: κόπους
  chosen: hardships
  alternatives:
  - toils
  - labors
  - troubles
  lexicon: BDAG
  rationale: In this context the word points to the burdens and sufferings endured
    in conflict, not merely physical work. 'Hardships' best captures that broader
    sense in natural English.
- source_word: ἔσχοσαν
  chosen: had endured
  alternatives:
  - had experienced
  - had borne
  lexicon: BDAG
  rationale: With κόπους, the verb conveys undergoing or bearing hardships. 'Had endured'
    expresses the completed experience naturally in English.
- source_word: ἀδελφοὶ
  chosen: brothers
  alternatives:
  - kinsmen
  lexicon: BDAG
  rationale: The reference is to Jonathan's literal male siblings in the Maccabean
    family, so 'brothers' is both accurate and contextually specific.
