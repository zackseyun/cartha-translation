  text: Καὶ ἤκουσεν ὁ βασιλεὺς Ἀλέξανδρος τὰς ἐπαγγελίας ὅσας ἀπέστειλεν Δημήτριος
    τῷ Ἰωναθάν, καὶ διηγήσαντο αὐτῷ τοὺς πολέμους καὶ τὰς ἀνδραγαθίας ἃς ἐποίησεν
    αὐτὸς καὶ οἱ ἀδελφοὶ αὐτοῦ, καὶ τοὺς κόπους οὓς ἔσχοσαν.
