translation:
  text: And those from the citadel handed Jonathan the hostages, and he returned them
    to their parents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἄκρα refers to the fortified citadel, traditionally called the Acra.
    reason: cultural_note
lexical_decisions:
- source_word: παρέδωκαν
  chosen: handed
  alternatives:
  - delivered
  - gave over
  lexicon: BDAG
  rationale: The verb means to hand over or deliver. 'Handed' is natural modern English
    and fits the straightforward narrative action without adding legal or hostile
    nuance beyond the context.
- source_word: οἱ ἐκ τῆς ἄκρας
  chosen: those from the citadel
  alternatives:
  - the men from the citadel
  - those in the citadel
  lexicon: LSJ
  rationale: ἄκρα in this historical context refers to the fortified citadel/acra
    in Jerusalem. 'Those from the citadel' preserves the Greek construction and avoids
    over-specifying gender where the text does not explicitly do so, though a male
    group is likely in context.
- source_word: Ἰωναθὰν
  chosen: Jonathan
  alternatives:
  - Jonathas
  rationale: Standard English transliteration of the personal name.
- source_word: τὰ ὅμηρα
  chosen: the hostages
  alternatives:
  - the pledges
  lexicon: LSJ
  rationale: ὅμηρα ordinarily means hostages. 'Pledges' is possible in some contexts,
    but here actual persons are in view, confirmed by the next clause returning them
    to their parents.
- source_word: ἀπέδωκαν
  chosen: returned
  alternatives:
  - gave back
  - restored
  lexicon: BDAG
  rationale: The verb denotes giving back what had been held. 'Returned' is concise
    and idiomatic in English.
- source_word: τοῖς γονεῦσιν αὐτῶν
  chosen: to their parents
  alternatives:
  - to their fathers and mothers
  - to their families
  lexicon: BDAG
  rationale: γονεῦσιν means parents. 'Parents' is the most accurate and natural rendering;
    'families' would be broader than the Greek.
