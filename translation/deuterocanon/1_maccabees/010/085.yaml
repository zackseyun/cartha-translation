translation:
  text: And those who fell by the sword, together with those who were burned, came
    to eight thousand men.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγένοντο
  chosen: came to
  alternatives:
  - were
  - amounted to
  - numbered
  lexicon: LSJ
  rationale: In numerical statements, γίνομαι can function idiomatically to indicate
    the resulting total. 'Came to' is natural English and preserves the sense of reaching
    a number.
- source_word: οἱ πεπτωκότες
  chosen: those who fell
  alternatives:
  - the fallen
  - those who had fallen
  lexicon: LSJ
  rationale: The perfect participle used substantivally refers to the casualties.
    'Those who fell' is idiomatic and clear in English.
- source_word: μαχαίρᾳ
  chosen: by the sword
  alternatives:
  - with the sword
  - in battle
  lexicon: LSJ
  rationale: The dative here is instrumental; 'by the sword' is the standard English
    rendering for death in combat and stays close to the Greek.
- source_word: σὺν
  chosen: together with
  alternatives:
  - with
  - along with
  lexicon: LSJ
  rationale: Marks addition of a second group to the first in the total count. 'Together
    with' makes the combining force explicit.
- source_word: τοῖς ἐμπυρισθεῖσιν
  chosen: those who were burned
  alternatives:
  - those burned up
  - those set on fire
  - those consumed by fire
  lexicon: LSJ
  rationale: The aorist passive participle denotes people burned in the conflict.
    'Those who were burned' is direct and avoids overstating whether they were merely
    set on fire or fully consumed.
- source_word: εἰς ἄνδρας ὀκτακισχιλίους
  chosen: to eight thousand men
  alternatives:
  - eight thousand men
  - as many as eight thousand men
  lexicon: LSJ
  rationale: εἰς with a numeral expresses the total reached. 'To eight thousand men'
    reflects the Greek structure; in the full sentence this is smoothed as 'came to
    eight thousand men.' 'Men' is retained because ἄνδρας is explicitly masculine
    rather than a generic population term.
