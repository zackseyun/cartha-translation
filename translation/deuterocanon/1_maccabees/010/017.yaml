translation:
  text: And he wrote letters and sent them to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek has the plural 'letters,' not singular 'letter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - composed
  - wrote out
  lexicon: LSJ
  rationale: The aorist of γράφω is straightforwardly rendered 'wrote.' 'Composed'
    is possible but less natural and adds nuance not required by the Greek.
- source_word: ἐπιστολὰς
  chosen: letters
  alternatives:
  - a letter
  - epistles
  lexicon: LSJ
  rationale: The plural accusative clearly indicates multiple letters. 'Letters' is
    idiomatic modern English; 'epistles' is too formal for this narrative context.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Aorist of ἀποστέλλω is best rendered 'sent.' 'Dispatched' is possible
    but stylistically heavier without added precision.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to Jonathan
  - to that one
  lexicon: LSJ
  rationale: The dative pronoun means 'to him.' Since the Greek does not repeat the
    proper name in this clause, the translation preserves the pronoun rather than
    supplying the antecedent in the main text.
