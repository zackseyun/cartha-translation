translation:
  text: And Demetrius appointed Apollonius, who was over Coele-Syria, and he gathered
    a great force and encamped in Jamnia;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembled a large army.' The Greek δύναμις can denote a military force
      broadly, not only a formally defined army.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέστησεν
  chosen: appointed
  alternatives:
  - set over
  - installed
  lexicon: BDAG
  rationale: In this administrative context, the verb denotes placing someone into
    an office or position. 'Appointed' is natural modern English and preserves the
    official sense without over-specifying the mechanics.
- source_word: τὸν ὄντα ἐπὶ Κοίλης Συρίας
  chosen: who was over Coele-Syria
  alternatives:
  - who was in charge of Coele-Syria
  - the one over Coele-Syria
  lexicon: BDAG
  rationale: The participial phrase identifies Apollonius by his governing role. 'Over'
    reflects ἐπί with authority/governance sense and stays close to the Greek. 'Coele-Syria'
    is the standard transliteration of the regional name.
- source_word: συνήγαγεν
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: BDAG
  rationale: The verb means to bring together. 'Gathered' is straightforward and sufficiently
    military in context when paired with 'force.' 'Mustered' is possible but slightly
    more interpretive.
- source_word: δύναμιν μεγάλην
  chosen: a great force
  alternatives:
  - a large army
  - a great army
  lexicon: LSJ
  rationale: δύναμις in military narrative commonly refers to an armed force. 'A great
    force' preserves the broader military sense and mirrors the Greek adjective-noun
    pairing without narrowing too quickly to a formal 'army.'
- source_word: παρενέβαλεν
  chosen: encamped
  alternatives:
  - camped
  - made camp
  lexicon: BDAG
  rationale: The verb is the standard military term for pitching camp or encamping.
    'Encamped' preserves the narrative's military register better than the more casual
    'camped.'
- source_word: ἐν Ἰαμνείᾳ
  chosen: in Jamnia
  alternatives:
  - at Jamnia
  lexicon: LSJ
  rationale: The preposition ἐν most naturally yields 'in,' though in military English
    'at Jamnia' is also possible. 'In Jamnia' stays closer to the Greek form while
    remaining idiomatic enough.
