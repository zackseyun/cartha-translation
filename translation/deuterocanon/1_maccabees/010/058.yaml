translation:
  text: And King Alexander met him and gave him Cleopatra his daughter, and he held
    her wedding in Ptolemais, as kings do, with great splendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gave his daughter Cleopatra to him in marriage.' The Greek verb explicitly
      carries a marriage sense in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the manner of kings' or 'as kings are accustomed to do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήντησεν
  chosen: met
  alternatives:
  - went to meet
  - received
  lexicon: LSJ
  rationale: The verb commonly means 'to meet' or 'go to meet.' In this narrative
    context, simple 'met' is natural English and adequately conveys Alexander's responsive
    encounter with him without over-specifying motion.
- source_word: ἐξέδοτο
  chosen: gave
  alternatives:
  - gave in marriage
  - handed over
  lexicon: LSJ
  rationale: In marriage context the verb means to give a woman in marriage. 'Gave'
    is concise and idiomatic when followed by 'his daughter,' while the marital sense
    is made explicit by the surrounding wedding language.
- source_word: Κλεοπάτραν τὴν θυγατέρα αὐτοῦ
  chosen: Cleopatra his daughter
  alternatives:
  - his daughter Cleopatra
  rationale: The Greek places the personal name before the appositional phrase. English
    can preserve this naturally as 'Cleopatra his daughter,' though either order is
    possible.
- source_word: ἐποίησεν τὸν γάμον αὐτῆς
  chosen: he held her wedding
  alternatives:
  - he celebrated her marriage
  - he made her wedding feast
  lexicon: LSJ
  rationale: ποιέω with γάμος means to hold or celebrate a wedding/marriage feast.
    'Held her wedding' is readable modern English and preserves the event sense without
    unnecessary expansion.
- source_word: ἐν Πτολεμαΐδι
  chosen: in Ptolemais
  rationale: Standard transliteration of the place name, preserving the Greek location
    reference.
- source_word: καθὼς οἱ βασιλεῖς
  chosen: as kings do
  alternatives:
  - as kings are accustomed to do
  - in the manner of kings
  lexicon: LSJ
  rationale: This comparative phrase indicates royal custom or manner. 'As kings do'
    is idiomatic and preserves the sense of customary royal style.
- source_word: ἐν δόξῃ μεγάλῃ
  chosen: with great splendor
  alternatives:
  - in great glory
  - with great pomp
  lexicon: LSJ
  rationale: δόξα here refers to magnificence or honor displayed in ceremony rather
    than theological 'glory.' 'With great splendor' communicates the regal ceremonial
    grandeur in contemporary English.
