translation:
  text: And in the one hundred sixtieth year, Alexander, the son of Antiochus Epiphanes,
    came up and seized Ptolemais, and they received him, and he became king there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went up' for 'came up'; the Greek preserves the conventional directional
      idiom often used for military movement.
    reason: lexical_alternative
  - marker: b
    text: Or 'captured Ptolemais' for 'seized Ptolemais.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he reigned there'; the Greek verb may be understood either as accession
      ('became king') or as the exercise of kingship ('reigned').
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ἔτει ἑξηκοστῷ καὶ ἑκατοστῷ
  chosen: in the one hundred sixtieth year
  alternatives:
  - in year one hundred and sixty
  - in the hundred and sixtieth year
  lexicon: LSJ
  rationale: The Greek expresses a date formula literally 'in the sixtieth and hundredth
    year.' Standard English idiom is 'in the one hundred sixtieth year,' which preserves
    the chronological force without awkwardness.
- source_word: ἀνέβη
  chosen: came up
  alternatives:
  - went up
  - advanced
  lexicon: LSJ
  rationale: ἀναβαίνω commonly means 'go up/come up.' In historical narrative it can
    denote military advance. 'Came up' preserves the directional idiom of the Greek
    while remaining natural in English.
- source_word: ὁ τοῦ Ἀντιόχου ὁ Ἐπιφανής
  chosen: the son of Antiochus Epiphanes
  alternatives:
  - son of Antiochus the Illustrious
  - of Antiochus Epiphanes
  lexicon: LSJ
  rationale: 'The article-plus-genitive construction identifies Alexander by parentage:
    ''the one of Antiochus Epiphanes,'' idiomatically ''the son of Antiochus Epiphanes.''
    The epithet Ἐπιφανής is retained as the conventional royal name element rather
    than translated.'
- source_word: κατελάβετο
  chosen: seized
  alternatives:
  - captured
  - took possession of
  - occupied
  lexicon: LSJ
  rationale: The middle form here conveys taking control of Ptolemais. 'Seized' is
    concise and suitably forceful, fitting the military-political context better than
    the more neutral 'took.'
- source_word: ἐπεδέξαντο αὐτόν
  chosen: they received him
  alternatives:
  - they welcomed him
  - they accepted him
  lexicon: LSJ
  rationale: The verb means to receive or welcome. 'Received him' stays closer to
    the Greek and leaves open whether the reception was political acceptance, welcome,
    or both.
- source_word: ἐβασίλευσεν ἐκεῖ
  chosen: he became king there
  alternatives:
  - he reigned there
  - he ruled there as king
  lexicon: LSJ
  rationale: The aorist can denote accession rather than ongoing reign in this context
    following his reception at Ptolemais. 'Became king there' best captures the ingressive
    sense.
