lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Aorist of ἀποστέλλω; 'sent' is the natural modern English equivalent
    and fits narrative style without unnecessary formality.
- source_word: πρὸς
  chosen: to
  alternatives:
  - toward
  lexicon: LSJ
  rationale: With a verb of sending and an accusative personal object, πρὸς is best
    rendered 'to' in idiomatic English.
- source_word: πρέσβεις
  chosen: ambassadors
  alternatives:
  - envoys
  - messengers
  lexicon: LSJ
  rationale: The term denotes official representatives in a diplomatic context. 'Ambassadors'
    best conveys the political and royal setting here; 'messengers' would understate
    the formal status.
- source_word: κατὰ τοὺς λόγους τούτους
  chosen: with these words
  alternatives:
  - according to these words
  - in these terms
  lexicon: LSJ
  rationale: This idiom introduces the content of a message. 'With these words' is
    clear, natural English while remaining close to the Greek.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: LSJ
  rationale: The participle introduces the quoted message that follows in the next
    verse. 'Saying' preserves the Greek construction and keeps the sentence open appropriately.
- source_word: βασιλέα Αἰγύπτου
  chosen: king of Egypt
  alternatives:
  - the king of Egypt
  lexicon: LSJ
  rationale: The anarthrous Greek functions appositionally after the proper name Ptolemy.
    English idiom naturally renders this as the title 'king of Egypt' without needing
    to force an article.
