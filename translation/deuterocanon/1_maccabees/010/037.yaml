theological_decisions:
- issue: Rendering of πίστις-related language in a non-theological administrative
    context
  chosen_reading: trustworthy
  alternative_readings:
  - faithful
  - reliable
  rationale: Although DOCTRINE.md gives 'faith' as the default for πίστις, context
    governs. Here εἰς πίστιν describes suitability for royal service, so an adjectival
    rendering of reliability is required by the context rather than a theological
    gloss.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy #5'
