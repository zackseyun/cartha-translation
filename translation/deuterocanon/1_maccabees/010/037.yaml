translation:
  text: And some of them shall be appointed in the king’s great strongholds, and from
    among them some shall be appointed over the needs of the kingdom, being trustworthy;
    and let those over them and the rulers be from among them, and let them live by
    their own laws, just as the king commanded in the land of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the affairs/business of the kingdom.' The Greek phrase 'over the
      needs of the kingdom' can refer broadly to administrative responsibilities.
    reason: lexical_alternative
  - marker: b
    text: Or 'walk according to their laws.' The Greek idiom uses 'go/walk' with laws
      to mean conduct life in accordance with them.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατασταθήσεται
  chosen: shall be appointed
  alternatives:
  - shall be established
  - shall be assigned
  lexicon: LSJ
  rationale: Future passive of καθίστημι in administrative context naturally means
    appointment to office or post rather than physical establishment.
- source_word: ὀχυρώμασιν
  chosen: strongholds
  alternatives:
  - fortresses
  - fortified places
  lexicon: LSJ
  rationale: Refers to fortified military positions. 'Strongholds' is clear modern
    English and preserves the military sense without over-specifying architecture.
- source_word: τοῖς μεγάλοις
  chosen: great
  alternatives:
  - major
  - large
  lexicon: LSJ
  rationale: The adjective modifies the king's strongholds. 'Great' is a straightforward
    rendering; 'major' is possible but slightly more interpretive.
- source_word: ἐπὶ χρειῶν τῆς βασιλείας
  chosen: over the needs of the kingdom
  alternatives:
  - over the affairs of the kingdom
  - for the business of the kingdom
  lexicon: LSJ
  rationale: χρεῖαι can denote needs, business, or affairs. 'Needs of the kingdom'
    stays close to the Greek while fitting an administrative context.
- source_word: οὖσιν εἰς πίστιν
  chosen: being trustworthy
  alternatives:
  - being faithful
  - being reliable
  lexicon: LSJ; BDAG
  rationale: πίστις here is not theologically 'faith' but trustworthiness/reliability
    in office. 'Being trustworthy' expresses the adjectival force of the phrase in
    context.
- source_word: οἱ ἐπʼ αὐτῶν
  chosen: those over them
  alternatives:
  - their overseers
  - those in charge of them
  lexicon: LSJ
  rationale: The phrase is somewhat compressed, referring to superiors or officials
    set over the previously mentioned appointees. 'Those over them' preserves the
    relational wording without over-clarifying beyond the Greek.
- source_word: οἱ ἄρχοντες
  chosen: the rulers
  alternatives:
  - the leaders
  - the officials
  lexicon: LSJ
  rationale: ἄρχοντες denotes governing authorities. 'Rulers' is suitably broad and
    formal in this royal decree context.
- source_word: πορευέσθωσαν τοῖς νόμοις αὐτῶν
  chosen: let them live by their own laws
  alternatives:
  - let them walk according to their laws
  - let them conduct themselves by their laws
  lexicon: LSJ
  rationale: πορεύομαι with laws is an idiom for ordering one's conduct according
    to them. 'Live by' gives natural English while preserving the legal-ethical sense.
- source_word: καθὰ καὶ προσέταξεν
  chosen: just as ... commanded
  alternatives:
  - as also ... ordered
  - according as ... decreed
  lexicon: LSJ
  rationale: προστάσσω in royal context is a command/order. 'Just as the king commanded'
    is idiomatic and sufficiently formal.
- source_word: ἐν γῇ Ἰούδα
  chosen: in the land of Judah
  alternatives:
  - in Judea
  lexicon: LSJ
  rationale: The Greek is literally 'in the land of Judah.' This preserves the wording
    of the source better than the more interpretive regional label 'Judea.'
