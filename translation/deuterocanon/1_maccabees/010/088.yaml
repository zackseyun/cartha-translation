translation:
  text: And it happened that when Alexander the king heard these words, he continued
    to honor Jonathan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he continued to honor Jonathan' or 'he honored Jonathan still more.'
      The Greek προσέθετο δοξάσαι expresses added or increased honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἐγένετο ὡς
  chosen: And it happened that when
  alternatives:
  - And when
  - Now when it happened that
  lexicon: BDAG
  rationale: This narrative formula marks a transition in the story. Rendering it
    with 'And it happened that when' preserves the Greek structure and narrative feel
    without becoming overly wooden; a simpler 'And when' is possible but omits the
    explicit ἐγένετο.
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - listened to
  lexicon: BDAG
  rationale: The aorist of ἀκούω here naturally means 'heard' in response to reported
    speech or message. 'Learned' is interpretive and less direct.
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - these things
  - this message
  lexicon: BDAG
  rationale: λόγοι can mean 'words,' 'statements,' or by extension 'message.' Here
    'these words' is the most straightforward and formally anchored rendering, while
    still idiomatic in English.
- source_word: προσέθετο
  chosen: added to
  alternatives:
  - continued to
  - proceeded to
  - further
  lexicon: BDAG
  rationale: The idiom προστίθημι with an infinitive commonly means to add or continue
    doing something. 'Added to' preserves the verbal force and leaves the sense of
    increase/intensification visible.
- source_word: δοξάσαι
  chosen: honoring
  alternatives:
  - glorify
  - show honor to
  - magnify
  lexicon: BDAG
  rationale: 'In this royal-political context, δοξάζω is best rendered as ''honor''
    rather than the more theologically loaded ''glorify.'' The infinitive after προσέθετο
    is smoothed into English as a gerund: ''added to honoring.'''
- source_word: τὸν Ἰωναθάν
  chosen: Jonathan
  rationale: Personal names are transliterated by project policy. The article is not
    separately represented in English.
