translation:
  text: And he sent him a gold clasp, as is the custom to give to the king’s kinsmen;
    and he gave him Accaron and all its territory as an inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Accaron is the Greek form of the place-name more commonly known from Hebrew
      as Ekron.
    reason: lexical_alternative
lexical_decisions:
- source_word: πόρπην χρυσῆν
  chosen: a gold clasp
  alternatives:
  - a golden buckle
  - a gold brooch
  - a golden ornament
  lexicon: LSJ
  rationale: πόρπη commonly denotes a clasp, brooch, or fastening ornament. 'Gold
    clasp' is clear modern English and preserves the concrete object without over-specifying
    its exact form.
- source_word: ὡς ἔθος ἐστὶν διδόσθαι
  chosen: as is the custom to give
  alternatives:
  - as it is customary to give
  - as is the practice to bestow
  lexicon: LSJ
  rationale: This idiom states customary royal practice. 'As is the custom to give'
    stays close to the Greek while remaining natural English.
- source_word: τοῖς συγγενεῦσιν τῶν βασιλέων
  chosen: to the king’s kinsmen
  alternatives:
  - to the relatives of kings
  - to the royal kindred
  - to the king's relatives
  lexicon: LSJ
  rationale: συγγενεύς means relative or kinsman. The plural with τῶν βασιλέων expresses
    the class of royal relatives; in idiomatic English, singular possessive 'the king’s
    kinsmen' fits the immediate context of a royal court custom.
- source_word: Ἀκκαρὼν
  chosen: Accaron
  alternatives:
  - Ekron
  lexicon: LSJ
  rationale: The Greek text has Ἀκκαρών, so the translation transliterates the Greek
    form as 'Accaron' in keeping with the project's policy to transliterate names
    from the source text. 'Ekron' reflects the more familiar Hebrew-based form and
    is worth preserving as an alternative.
- source_word: τὰ ὅρια αὐτῆς
  chosen: all its borders
  alternatives:
  - all its territory
  - all its districts
  - all its boundaries
  lexicon: LSJ
  rationale: ὅρια literally means borders or boundaries, and by extension the territory
    within them. 'All its borders' is formally closer; the territorial sense can be
    inferred in context.
- source_word: εἰς κληρονομίαν
  chosen: as an inheritance
  alternatives:
  - for a possession
  - as hereditary property
  lexicon: LSJ
  rationale: κληρονομία denotes inheritance or inherited possession. 'As an inheritance'
    preserves the legal-dynastic nuance without paraphrase.
