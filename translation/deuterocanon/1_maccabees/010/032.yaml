translation:
  text: I also relinquish the authority over the citadel in Jerusalem, and I give
    it to the high priest, so that he may appoint in it men whom he himself chooses
    to guard it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Acra in Jerusalem,' using the traditional transliteration of the
      fortified stronghold's name.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφίημι
  chosen: I also release
  alternatives:
  - I remit
  - I relinquish
  - I let go of
  lexicon: BDAG
  rationale: In this administrative context, ἀφίημι conveys giving up or releasing
    a claim/control rather than forgiving. 'Release' fits the transfer of jurisdiction
    expressed by the following clause.
- source_word: ἐξουσίαν
  chosen: authority over
  alternatives:
  - control of
  - jurisdiction over
  - power over
  lexicon: BDAG
  rationale: ἐξουσία denotes delegated authority/right to rule. 'Authority over' preserves
    the legal-administrative sense without overstating raw force.
- source_word: ἄκρας
  chosen: the citadel
  alternatives:
  - the fortress
  - the Acra
  lexicon: LSJ
  rationale: ἄκρα here refers to the fortified stronghold in Jerusalem. 'Citadel'
    communicates a fortified urban stronghold in readable English. 'Acra' is a possible
    transliteration but less transparent in the main text.
- source_word: δίδωμι
  chosen: I give it
  alternatives:
  - I grant it
  - I hand it over
  lexicon: BDAG
  rationale: The verb marks formal transfer to the high priest. 'I give it' is straightforward
    and preserves the directness of the Greek.
- source_word: ἀρχιερεῖ
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: Standard rendering for ἀρχιερεύς in Jewish cultic-political context.
- source_word: ὅπως ἂν καταστῇ
  chosen: so that he may appoint
  alternatives:
  - so that he may station
  - so that he may install
  - so that he may set
  lexicon: BDAG
  rationale: καθίστημι in this context means to place or appoint persons into a role/post.
    'Appoint' best captures the administrative nuance.
- source_word: ἄνδρας
  chosen: men
  alternatives:
  - persons
  - soldiers
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural and likely refers to male guards.
    Per translation philosophy, gender-accurate rendering is preferred over neutralizing.
- source_word: οὓς ἂν ἐκλέξηται αὐτός
  chosen: whom he himself chooses
  alternatives:
  - whomever he chooses
  - whom he selects personally
  lexicon: BDAG
  rationale: The reflexive emphasis of αὐτός is preserved with 'himself,' highlighting
    the high priest's personal discretion in selection.
- source_word: τοῦ φυλάσσειν αὐτήν
  chosen: to guard it
  alternatives:
  - to keep it secure
  - to watch over it
  lexicon: BDAG
  rationale: φυλάσσω here means to guard or protect the citadel. 'Guard it' is concise
    and fits the military setting.
