translation:
  text: And for the rebuilding and the renovation of the works of the sanctuary, the
    expense will be given by order of the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the king’s order.” The Greek phrase can be read administratively
      either as a fiscal account/register or as the king’s directive; the financial
      context here favors “account.”
    reason: lexical_alternative
  - marker: b
    text: “The sanctuary” renders Greek “the holy things/holy places,” referring here
      to the sacred temple complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκοδομηθῆναι
  chosen: the rebuilding
  alternatives:
  - to be built
  - the building
  lexicon: LSJ
  rationale: The articular infinitive with τοῦ functions substantivally, referring
    to the act/project of building rather than a simple finite clause. 'Rebuilding'
    fits the temple-restoration context better than the more generic 'building.'
- source_word: ἐπικαινισθῆναι
  chosen: the renovation
  alternatives:
  - the renewal
  - the rededication
  lexicon: LSJ
  rationale: The verb denotes making new again or renewing. In this construction alongside
    rebuilding, 'renovation' best conveys physical restoration work. 'Rededication'
    would shift the sense toward ceremony rather than material repair.
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - the structures
  - the work
  lexicon: LSJ
  rationale: A straightforward rendering of the plural noun. It likely refers to the
    construction/restoration works associated with the holy place. Retaining 'works'
    preserves the Greek's breadth without over-specifying.
- source_word: τῶν ἁγίων
  chosen: of the sanctuary
  alternatives:
  - of the holy things
  - of the holy places
  lexicon: LSJ
  rationale: In this temple context, the genitive plural of ἅγια commonly refers to
    the sacred precincts or sanctuary. 'Sanctuary' gives clear English sense while
    remaining faithful to the cultic reference. A more literal 'holy things' would
    be less natural and potentially misleading here.
- source_word: ἡ δαπάνη
  chosen: the expense
  alternatives:
  - the cost
  - the expenditure
  lexicon: LSJ
  rationale: Refers to the financial outlay for the rebuilding/renovation. 'Expense'
    is natural modern English and suits the singular collective sense.
- source_word: δοθήσεται
  chosen: will be given
  alternatives:
  - will be paid
  - shall be provided
  lexicon: LSJ
  rationale: The future passive is preserved directly. 'Will be given' stays close
    to the Greek while allowing the following phrase to specify the source of funds.
- source_word: ἐκ τοῦ λόγου τοῦ βασιλέως
  chosen: from the king’s account
  alternatives:
  - by the king's order
  - from the king's treasury
  - from the king's revenues
  lexicon: LSJ
  rationale: λόγος in administrative contexts can denote an account, reckoning, or
    official fiscal register. Since the phrase specifies the source from which the
    expense is supplied, 'from the king’s account' best fits the financial context.
    'By the king's order' would treat λόγος as command rather than funding source,
    and 'treasury' is interpretive beyond the wording.
