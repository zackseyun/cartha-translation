translation:
  text: And he pursued him as far as Azotus, and the camps joined battle behind him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the camps engaged in battle after him.' The repeated Greek phrase 'behind/after
      him' is somewhat awkward in English; the translation preserves the sequence
      of pursuit and ensuing combat.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεδίωξεν
  chosen: pursued
  alternatives:
  - chased
  - pressed after
  lexicon: LSJ
  rationale: The verb denotes active pursuit in a military context. 'Pursued' is natural
    modern English and preserves the martial sense without over-paraphrasing.
- source_word: ὀπίσω αὐτοῦ
  chosen: him
  alternatives:
  - after him
  - behind him
  lexicon: LSJ
  rationale: With κατεδίωξεν, the phrase functions idiomatically as 'after him.' In
    English, 'pursued him' conveys the sense smoothly without repeating 'after.'
- source_word: εἰς Ἄζωτον
  chosen: as far as Azotus
  alternatives:
  - to Azotus
  - into Azotus
  lexicon: LSJ
  rationale: εἰς marks movement toward the city; in context of pursuit, 'as far as
    Azotus' captures the extent of the chase naturally. 'Azotus' is the standard transliteration
    of Ἄζωτος.
- source_word: συνῆψαν
  chosen: joined battle
  alternatives:
  - engaged
  - came together
  lexicon: LSJ
  rationale: In military context, the verb means to engage or join in conflict. 'Joined
    battle' is concise, idiomatic, and preserves the formal military register.
- source_word: αἱ παρεμβολαὶ
  chosen: the camps
  alternatives:
  - the armies
  - the encampments
  - the forces
  lexicon: LSJ
  rationale: παρεμβολή commonly refers to a camp or army camp; the plural here is
    best kept as 'camps' rather than interpreted more freely as 'armies.' This preserves
    the source image while remaining intelligible in context.
- source_word: ὀπίσω αὐτοῦ εἰς πόλεμον
  chosen: behind him
  alternatives:
  - after him in battle
  - in pursuit of him for battle
  lexicon: LSJ
  rationale: The Greek repeats ὀπίσω αὐτοῦ and then adds εἰς πόλεμον, indicating military
    engagement in his wake. English cannot reproduce the full structure elegantly;
    'the camps joined battle behind him' preserves the spatial sequence and the onset
    of combat, while the battle sense is carried by 'joined battle.'
