translation:
  text: And the king honored him, and enrolled him among the first friends, and appointed
    him general and governor of a district.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'listed him among the chief friends.' The phrase 'the first friends'
      likely reflects an official court rank.
    reason: lexical_alternative
  - marker: b
    text: The Greek term rendered 'governor of a district' refers to an administrative
      ruler over a territorial division.
    reason: cultural_note
lexical_decisions:
- source_word: ἐδόξασεν
  chosen: honored
  alternatives:
  - glorified
  - bestowed honor on
  lexicon: LSJ
  rationale: In this courtly-political context, the verb denotes conferring honor
    or distinction rather than theological 'glorifying.' 'Honored' is natural English
    and fits the royal setting.
- source_word: ἔγραψεν αὐτὸν τῶν πρώτων φίλων
  chosen: enrolled him among the first friends
  alternatives:
  - registered him as one of the first friends
  - listed him among the chief friends
  lexicon: LSJ
  rationale: The idiom uses γράφω in the sense of entering someone on an official
    list or rank. 'First friends' appears to be a technical court title, so it is
    preserved rather than paraphrased away; 'among' makes the English idiomatic.
- source_word: τῶν πρώτων φίλων
  chosen: the first friends
  alternatives:
  - the chief friends
  - the foremost friends
  lexicon: LSJ
  rationale: This likely refers to a recognized rank among royal associates. Retaining
    'first friends' keeps the formal title close to the Greek while remaining understandable;
    alternatives are possible but slightly more interpretive.
- source_word: στρατηγόν
  chosen: general
  alternatives:
  - commander
  - governor
  lexicon: LSJ
  rationale: The military sense is primary here, especially since it is paired with
    another administrative title. 'General' best distinguishes this office from the
    following civil role.
- source_word: μεριδάρχην
  chosen: governor of a district
  alternatives:
  - district ruler
  - provincial governor
  - meridarch
  lexicon: LSJ
  rationale: The term denotes rule over a district or division. A partially explanatory
    rendering communicates the administrative office better than a bare transliteration,
    while avoiding overprecision about exact Hellenistic bureaucracy.
