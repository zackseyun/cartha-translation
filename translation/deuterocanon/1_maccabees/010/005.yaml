lexical_decisions:
- source_word: μνησθήσεται
  chosen: he will remember
  alternatives:
  - he will recall
  - he will keep in mind
  lexicon: BDAG
  rationale: Future middle/passive form of μιμνῄσκομαι functioning deponently; straightforward
    future sense. 'Remember' is the plain English equivalent and fits the causal γάρ
    clause.
- source_word: πάντων τῶν κακῶν
  chosen: all the wrongs
  alternatives:
  - all the evils
  - all the harms
  - all the injuries
  lexicon: BDAG
  rationale: κακά can denote evil deeds or harms done. In this political/interpersonal
    context, 'wrongs' naturally conveys misdeeds committed against someone without
    sounding overly abstract or moralizing.
- source_word: συνετελέσαμεν
  chosen: we committed
  alternatives:
  - we carried out
  - we accomplished
  - we brought about
  lexicon: BDAG
  rationale: Though συντελέω often means 'bring to completion' or 'carry out,' with
    κακά and πρὸς αὐτόν it refers to actions done against him. 'Committed' is idiomatic
    in English for wrongful acts and best matches the object 'wrongs.'
- source_word: πρὸς αὐτόν
  chosen: against him
  alternatives:
  - toward him
  - to him
  lexicon: BDAG
  rationale: With hostile actions, πρός plus accusative is best rendered adversatively
    here. 'Against him' makes the relational force explicit in English.
- source_word: τοὺς ἀδελφοὺς αὐτοῦ
  chosen: his brothers
  alternatives:
  - his kinsmen
  lexicon: BDAG
  rationale: ἀδελφοί is literally 'brothers.' Per project philosophy, gender-accurate
    rendering is preferred unless context clearly demands a broader inclusive sense;
    here likely literal male siblings or close dynastic brothers.
- source_word: τὸ ἔθνος αὐτοῦ
  chosen: his nation
  alternatives:
  - his people
  - his ethnic group
  lexicon: BDAG
  rationale: ἔθνος can mean nation or people. In 1 Maccabees' political-national setting,
    'nation' preserves the collective and political sense better than the more generic
    'people'.
