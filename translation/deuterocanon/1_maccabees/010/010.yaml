translation:
  text: And Jonathan lived in Jerusalem, and he began to build and restore the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwelled in Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: Or 'build and restore the city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾤκησεν
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: LSJ
  rationale: From οἰκέω, the verb denotes residing or dwelling. 'Lived' is natural
    modern English and fits the narrative context without sounding archaic like 'dwelt.'
    'Settled' could imply a transition into residence more strongly than the Greek
    requires.
- source_word: ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: LSJ
  rationale: Standard ingressive sense of ἄρχομαι with infinitives. 'Began' is the
    most straightforward narrative rendering.
- source_word: οἰκοδομεῖν
  chosen: to build
  alternatives:
  - to rebuild
  - to construct
  lexicon: LSJ
  rationale: The infinitive means 'to build.' Although context may suggest restoration
    work, the Greek here does not explicitly add the prefix for 'rebuild,' so 'build'
    is retained in the main text.
- source_word: καινίζειν
  chosen: renew
  alternatives:
  - restore
  - renovate
  - make new
  lexicon: LSJ
  rationale: The verb carries the sense of making new or renewing. 'Renew' preserves
    that lexical force while pairing well with 'build.' 'Restore' is possible, but
    'renew' more directly reflects the Greek root idea of newness.
- source_word: τὴν πόλιν
  chosen: the city
  alternatives:
  - Jerusalem
  - the town
  lexicon: LSJ
  rationale: The noun is explicitly 'the city.' Since Jerusalem has already been named,
    retaining 'the city' reflects the Greek wording and avoids unnecessary repetition.
