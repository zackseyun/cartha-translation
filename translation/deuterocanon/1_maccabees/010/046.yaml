translation:
  text: But when Jonathan and the people heard these words, they did not believe them
    or accept them, because they remembered the great evil that he had done in Israel,
    and how he had oppressed them severely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they did not trust them or receive them.' The Greek distinguishes between
      not believing the words and not accepting them.
    reason: lexical_alternative
  - marker: b
    text: Or 'the great evil that he had done against Israel.' The Greek literally
      says 'in Israel,' which may imply wrongdoing carried out within Israel or against
      Israel as a people.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ ἐπίστευσαν
  chosen: they did not believe
  alternatives:
  - they did not trust
  - they put no faith in
  lexicon: BDAG
  rationale: In this narrative context, the verb denotes refusing to credit the truthfulness
    or sincerity of the message. 'Believe' is the most natural modern English rendering
    and fits the object 'these words'.
- source_word: ἐπεδέξαντο
  chosen: accept
  alternatives:
  - receive
  - welcome
  lexicon: LSJ
  rationale: The sense is not merely hearing but receiving favorably or accepting
    the proposal/message. 'Accept' pairs well with 'believe' and preserves the distinction
    between inward credence and outward reception.
- source_word: ἐμνήσθησαν
  chosen: they remembered
  alternatives:
  - they recalled
  - they kept in mind
  lexicon: BDAG
  rationale: A straightforward past narrative rendering. 'Remembered' preserves the
    causal force for their refusal.
- source_word: τῆς κακίας τῆς μεγάλης
  chosen: the great evil
  alternatives:
  - the great wickedness
  - the great harm
  lexicon: LSJ
  rationale: κακία here refers broadly to grievous wrongdoing done against Israel.
    'Great evil' is both natural and weighty without over-specifying moral nuance.
- source_word: ἧς ἐποίησεν ἐν Ἰσραήλ
  chosen: that he had done in Israel
  alternatives:
  - that he had committed against Israel
  - that he had done among Israel
  lexicon: LSJ
  rationale: The preposition ἐν is formally 'in,' and the phrase can denote actions
    carried out within Israel. English idiom allows 'done in Israel'; 'against Israel'
    is interpretive and is therefore left as an alternative.
- source_word: ἔθλιψεν
  chosen: he had oppressed
  alternatives:
  - he had afflicted
  - he had harassed
  lexicon: BDAG
  rationale: The verb conveys causing severe distress or oppression. 'Oppressed' best
    captures sustained harmful treatment in this political-military context.
- source_word: σφόδρα
  chosen: severely
  alternatives:
  - greatly
  - very much
  lexicon: LSJ
  rationale: Used adverbially to intensify the oppression. 'Severely' reads naturally
    with 'oppressed' in contemporary English.
