theological_decisions:
- issue: Referent of the implicit subject behind prior hostile actions
  chosen_reading: Rendered as singular 'he' to match the Greek verbs and the immediate
    narrative reference to the sender of the message.
  alternative_readings:
  - A more generic 'they' if one interprets the subject corporately from the broader
    political context
  rationale: The Greek relative clause and following verb are singular (ἧς ἐποίησεν
    ... καὶ ἔθλιψεν), so the translation preserves the singular referent without importing
    broader historical interpretation.
