translation:
  text: And the king seated him with himself, and said to his officials, “Go out with
    him into the middle of the city, and proclaim that no one is to bring a complaint
    against him about any matter, and let no one trouble him for any reason.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that no one should petition against him concerning any matter.' The
      Greek verb can denote making an approach or petition, here likely in an official
      or legal sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάθισεν αὐτὸν ὁ βασιλεὺς μετʼ αὑτοῦ
  chosen: the king seated him with himself
  alternatives:
  - the king sat him beside himself
  - the king had him sit with him
  lexicon: LSJ
  rationale: The causative aorist of καθίζω means 'seat' or 'cause to sit.' 'Seated
    him with himself' preserves both the causative force and the honor implied by
    the king placing Jonathan at his own side.
- source_word: τοῖς ἄρχουσιν
  chosen: his officials
  alternatives:
  - his rulers
  - his commanders
  - the princes
  lexicon: LSJ
  rationale: ἄρχοντες are persons in authority. In this court setting, 'officials'
    is natural modern English and broad enough to cover royal functionaries without
    over-specifying military rank.
- source_word: Ἐξέλθατε μετʼ αὐτοῦ εἰς μέσον τῆς πόλεως
  chosen: Go out with him into the middle of the city
  alternatives:
  - Go out with him into the midst of the city
  - Escort him into the center of the city
  lexicon: LSJ
  rationale: εἰς μέσον is literally 'into the middle/midst.' 'Middle of the city'
    is slightly more idiomatic than 'midst' while retaining the public, central setting
    of the proclamation.
- source_word: κηρύξατε
  chosen: proclaim
  alternatives:
  - announce
  - make proclamation
  lexicon: LSJ
  rationale: κηρύσσω is the formal act of heralding publicly. 'Proclaim' preserves
    the official and public character better than the flatter 'announce.'
- source_word: τοῦ μηδένα ἐντυγχάνειν κατὰ τούτου περὶ μηδενὸς πράγματος
  chosen: that no one is to bring a complaint against him about any matter
  alternatives:
  - that no one should petition against him concerning any matter
  - that no one should accuse him in any affair
  lexicon: LSJ
  rationale: ἐντυγχάνειν can mean approach, petition, or make an accusation/complaint,
    especially in a legal or administrative sense when paired with κατά + genitive.
    In context, the king is forbidding hostile legal or official action against Jonathan,
    so 'bring a complaint against him' best captures the force in clear English.
- source_word: μηδεὶς αὐτῷ ἐνοχλείτω
  chosen: let no one trouble him
  alternatives:
  - let no one harass him
  - let no one molest him
  lexicon: LSJ
  rationale: ἐνοχλέω means to trouble, annoy, or harass. 'Trouble him' is broad and
    natural, fitting the king's general order of noninterference.
- source_word: περὶ παντὸς λόγου
  chosen: for any reason
  alternatives:
  - about any matter
  - on any account
  - for any cause
  lexicon: LSJ
  rationale: λόγος here carries the sense of matter, account, or cause. Since the
    previous clause already used 'matter' for πρᾶγμα, varying the English avoids awkward
    repetition while preserving the comprehensive scope of the prohibition.
