translation:
  text: And he told those doing the work to build the walls and Mount Zion all around
    with squared stones for fortification, and they did so.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἶπεν πρὸς
  chosen: told
  alternatives:
  - said to
  - spoke to
  - ordered
  lexicon: BDAG
  rationale: The phrase introduces Jonathan's directive to the workers. 'Told' is
    natural English and preserves the speech-act without overstating it as a formal
    command ('ordered'), though the context is directive.
- source_word: τοὺς ποιοῦντας τὰ ἔργα
  chosen: those doing the work
  alternatives:
  - the workmen
  - those carrying out the works
  - the builders
  lexicon: BDAG
  rationale: A fairly literal rendering of the participial phrase. 'Workmen' is possible,
    but 'those doing the work' stays closer to the Greek and avoids adding gender
    not explicit in the phrase itself.
- source_word: οἰκοδομεῖν
  chosen: to build
  alternatives:
  - to rebuild
  - to construct
  lexicon: BDAG
  rationale: The infinitive expresses the content of what he told them to do. 'Build'
    is the straightforward sense; 'rebuild' may fit the broader context but is not
    explicit in this verb here.
- source_word: τὰ τείχη
  chosen: the walls
  alternatives:
  - the city walls
  - the fortification walls
  lexicon: BDAG
  rationale: τείχη normally refers to defensive walls. 'The walls' is sufficient in
    context without importing 'city' into the text.
- source_word: τὸ ὄρος Σιὼν
  chosen: Mount Zion
  alternatives:
  - the hill of Zion
  lexicon: BDAG
  rationale: Standard rendering of the place name phrase; 'Mount Zion' is idiomatic
    English and preserves the proper-name force.
- source_word: κυκλόθεν
  chosen: all around
  alternatives:
  - round about
  - around
  lexicon: BDAG
  rationale: Conveys the encircling sense in clear modern English.
- source_word: ἐκ λίθων τετραγώνων
  chosen: with squared stones
  alternatives:
  - from squared stones
  - with hewn square stones
  - with cut stones
  lexicon: LSJ
  rationale: The phrase denotes the material used, specifically stones shaped square/quadrangular.
    'With squared stones' is concise and preserves the construction detail better
    than the vaguer 'cut stones'.
- source_word: εἰς ὀχύρωσιν
  chosen: for fortification
  alternatives:
  - as a fortification
  - for defense
  - for strengthening
  lexicon: LSJ
  rationale: 'Expresses purpose/result: the building was intended to fortify. ''For
    fortification'' is slightly formal but accurate and compact.'
- source_word: ἐποίησαν οὕτως
  chosen: and they did so
  alternatives:
  - and they did thus
  - and they did accordingly
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the concluding compliance formula.
