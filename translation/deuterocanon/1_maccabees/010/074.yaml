translation:
  text: But when Jonathan heard the words of Apollonius, he was stirred in his mind,
    and he chose ten thousand men and went out from Jerusalem, and Simon his brother
    met him to help him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he was moved in his mind,' 'he was provoked in his mind.' The Greek
      describes an inner stirring or agitation without specifying the exact emotion.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ ἤκουσεν
  chosen: But when ... heard
  alternatives:
  - And when ... heard
  - Now when ... heard
  lexicon: LSJ
  rationale: Ὡς with aorist can mark temporal sequence, 'when,' while δέ is a mild
    connective. 'But when' preserves the narrative transition without overformal stiffness.
- source_word: τῶν λόγων
  chosen: the words
  alternatives:
  - the message
  - what ... said
  lexicon: LSJ
  rationale: λόγοι here refers to Apollonius's spoken challenge or statements. 'The
    words' is formally close and natural in English.
- source_word: ἐκινήθη τῇ διανοίᾳ
  chosen: he was stirred in his mind
  alternatives:
  - he was moved in his mind
  - he was provoked in his mind
  - he was troubled in his mind
  lexicon: LSJ
  rationale: The passive of κινέω with dative τῇ διανοίᾳ indicates an inner stirring
    or agitation. 'Was stirred in his mind' preserves the internal reaction without
    overinterpreting it as anger alone.
- source_word: ἐπέλεξεν
  chosen: he chose
  alternatives:
  - he selected
  - he picked out
  lexicon: LSJ
  rationale: The verb straightforwardly means 'choose/select.' 'Chose' is concise
    and idiomatic in military context.
- source_word: δέκα χιλιάδας ἀνδρῶν
  chosen: ten thousand men
  alternatives:
  - ten thousand soldiers
  - ten thousand troops
  lexicon: LSJ
  rationale: ἀνδρῶν is literally 'men.' In context they are fighting men, but 'men'
    keeps closer to the Greek while remaining clear.
- source_word: ἐξῆλθεν ἐξ Ἱερουσαλήμ
  chosen: went out from Jerusalem
  alternatives:
  - marched out from Jerusalem
  - departed from Jerusalem
  lexicon: LSJ
  rationale: ἐξῆλθεν is a common motion verb. 'Went out from' is accurate and avoids
    adding military color beyond the text.
- source_word: συνήντησεν αὐτῷ
  chosen: met him
  alternatives:
  - joined him
  - came to meet him
  lexicon: LSJ
  rationale: συναντάω means 'meet' or 'come to meet.' 'Met him' is the most direct
    rendering.
- source_word: ἐπὶ βοήθειαν αὐτοῦ
  chosen: to help him
  alternatives:
  - for his aid
  - as help for him
  - to assist him
  lexicon: LSJ
  rationale: 'The phrase expresses purpose or result: Simon met Jonathan in order
    to aid him. ''To help him'' is clear modern English and semantically precise.'
