translation:
  text: And the foreigners who were in the strongholds that Bacchides had built fled.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔφυγον
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: BDAG
  rationale: Aorist of φεύγω denotes flight or fleeing. 'Fled' is concise, natural
    English and preserves the sense of retreat without adding nuance not explicit
    in the Greek.
- source_word: ἀλλογενεῖς
  chosen: foreigners
  alternatives:
  - Gentiles
  - people of another race
  - aliens
  lexicon: LSJ
  rationale: The term literally denotes those of another people or race. In this military-historical
    context, 'foreigners' best captures the ethnic outsider sense without importing
    later theological overtones that 'Gentiles' can carry.
- source_word: ὀχυρώμασιν
  chosen: strongholds
  alternatives:
  - fortresses
  - fortified places
  lexicon: LSJ
  rationale: The word refers to fortified positions. 'Strongholds' is idiomatic and
    suitably military, while remaining close to the Greek.
- source_word: οἷς οἰκοδόμησεν
  chosen: that Bacchides had built
  alternatives:
  - which Bacchides built
  lexicon: BDAG
  rationale: The relative clause modifies the strongholds. English past perfect ('had
    built') fits the narrative sequence naturally, indicating the building preceded
    the fleeing, though simple past would also be possible.
- source_word: Βακχίδης
  chosen: Bacchides
  rationale: Personal names are transliterated by project policy. 'Bacchides' is the
    standard English transliteration of Βακχίδης.
