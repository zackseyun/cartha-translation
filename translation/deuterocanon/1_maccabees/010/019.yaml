lexical_decisions:
- source_word: Ἰωνάθαν
  chosen: Jonathan
  lexicon: LSJ
  rationale: Standard transliteration of the personal name, following the project's
    policy to transliterate names rather than translate them.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - hail
  lexicon: LSJ
  rationale: In epistolary formulae χαίρειν functions idiomatically as a salutation
    rather than an imperative command to rejoice. 'Greetings' best reflects the conventional
    letter opening in natural English.
- source_word: ἀκηκόαμεν
  chosen: we have heard
  alternatives:
  - we heard
  lexicon: LSJ
  rationale: Perfect tense conveys a present state resulting from hearing; 'we have
    heard' preserves that nuance in readable English.
- source_word: περὶ σοῦ
  chosen: about you
  alternatives:
  - concerning you
  lexicon: LSJ
  rationale: '''About you'' is idiomatic modern English and accurately reflects περὶ
    with the genitive here.'
- source_word: ἀνὴρ
  chosen: man
  alternatives:
  - person
  lexicon: LSJ
  rationale: The Greek is grammatically masculine singular and refers specifically
    to Jonathan, so 'man' is the gender-accurate rendering per project philosophy.
- source_word: ἀγαθὸς
  chosen: good
  alternatives:
  - noble
  - worthy
  lexicon: LSJ
  rationale: ἀγαθός here gives a broad positive evaluation. 'Good' is the most direct
    rendering and avoids importing a more specific moral or social nuance than the
    text requires.
- source_word: ἰσχύϊ
  chosen: in strength
  alternatives:
  - mighty
  - strong
  lexicon: LSJ
  rationale: The dative is preserved most transparently with 'in strength.' Because
    the source text as provided ends mid-sentence after καί, a more interpretive smoothing
    such as 'mighty' would risk over-completing an incomplete clause.
