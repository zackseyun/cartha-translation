translation:
  text: And all the surplus that they did not pay from the revenues, as in the former
    years, from now on they shall give for the works of the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the temple; 'the house' is a literal rendering of the Greek expression.
    reason: cultural_note
  - marker: b
    text: Or 'excess' / 'remainder' for 'surplus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλεονάζον
  chosen: surplus
  alternatives:
  - excess
  - remainder
  - what is over
  lexicon: LSJ
  rationale: The participial substantive denotes what remains over and above ordinary
    outlay. 'Surplus' is concise and natural in administrative/financial context.
- source_word: ἀπέδωσαν
  chosen: did not pay
  alternatives:
  - did not render
  - did not give back
  - did not hand over
  lexicon: LSJ
  rationale: In this fiscal setting the verb refers to payment/remittance rather than
    simple return. 'Pay' best fits the context of revenues and allocations.
- source_word: χρειῶν
  chosen: revenues
  alternatives:
  - needs
  - funds
  - resources
  lexicon: LSJ
  rationale: Although χρεία often means 'need' or 'use,' in this administrative sentence
    introduced by ἀπό and contrasted with what is to be given for temple works, it
    refers to the financial receipts/resources from which payment had been made. 'Revenues'
    best captures the fiscal sense in idiomatic English.
- source_word: ἐν τοῖς πρώτοις ἔτεσιν
  chosen: in the former years
  alternatives:
  - in the earlier years
  - in the first years
  lexicon: LSJ
  rationale: πρῶτος here is comparative to the present arrangement, referring to previous
    years rather than literally the first years of an era. 'Former years' is the clearest
    English equivalent.
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - the work
  - the building work
  - the repairs
  lexicon: LSJ
  rationale: The plural can denote works/projects connected with the temple. 'The
    works' preserves the Greek number while remaining understandable; more specific
    options like 'repairs' would overinterpret.
- source_word: τοῦ οἴκου
  chosen: the house
  alternatives:
  - the temple
  lexicon: LSJ
  rationale: Literally 'the house,' a common reverential designation for the temple.
    Retaining 'house' preserves the source wording and biblical register; the temple
    referent is clear from context.
