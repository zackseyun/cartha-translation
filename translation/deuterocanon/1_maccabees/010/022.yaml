lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: LSJ
  rationale: Standard connective conjunction; simple 'And' preserves the paratactic
    narrative flow of the Greek.
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - listened to
  lexicon: LSJ
  rationale: Aorist of ἀκούω, here denoting reception of the reported speech. 'Heard'
    is the plain narrative sense.
- source_word: Δημήτριος
  chosen: Demetrius
  rationale: Personal name is transliterated by standard English convention, following
    project policy to transliterate names rather than translate them.
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - these statements
  - these things
  lexicon: LSJ
  rationale: λόγοι can mean 'words,' 'statements,' or 'message.' In this immediate
    context, 'these words' is a natural and sufficiently literal rendering of the
    accusative object with demonstrative.
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  lexicon: LSJ
  rationale: The verse as supplied is textually incomplete and ends with a second
    conjunction. Retaining 'and' honestly reflects the extant Zone 1 wording rather
    than smoothing away the unfinished clause.
