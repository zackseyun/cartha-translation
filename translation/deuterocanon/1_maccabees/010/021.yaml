translation:
  text: And Jonathan put on the holy robe in the seventh month, in the one hundred
    sixtieth year, at the feast of Booths, and he gathered forces and made many weapons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the feast of Tabernacles.' The Greek literally refers to the festival
      of booth-building/shelters.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεδύσατο
  chosen: put on
  alternatives:
  - clothed himself with
  - dressed in
  lexicon: LSJ
  rationale: Middle verb from ἐνδύω, here referring to Jonathan's donning of official/priestly
    attire. 'Put on' is natural modern English and preserves the concrete action.
- source_word: τὴν ἁγίαν στολήν
  chosen: the holy robe
  alternatives:
  - the sacred vestment
  - the holy garment
  lexicon: LSJ
  rationale: στολή denotes a robe or stately garment; with ἁγίαν it points to consecrated
    priestly clothing. 'Holy robe' is clear and sufficiently formal without over-specifying
    beyond the Greek.
- source_word: τῷ ἑβδόμῳ μηνί
  chosen: in the seventh month
  alternatives:
  - during the seventh month
  lexicon: LSJ
  rationale: Dative of time; straightforward temporal expression best rendered idiomatically
    with 'in.'
- source_word: ἔτους ἑξηκοστοῦ καὶ ἑκατοστοῦ
  chosen: in the one hundred sixtieth year
  alternatives:
  - in year one hundred sixty
  - of the one hundred sixtieth year
  lexicon: LSJ
  rationale: The Greek ordinal construction denotes the 160th year. Expanded English
    wording is clearer for modern readers while remaining close to the source.
- source_word: ἐν ἑορτῇ σκηνοπηγίας
  chosen: at the feast of Booths
  alternatives:
  - at the festival of Tabernacles
  - at the feast of Tabernacles
  lexicon: LSJ
  rationale: σκηνοπηγία refers to the Jewish festival of temporary shelters. 'Feast
    of Booths' translates the sense directly from Greek and preserves Jewish context
    better than the tradition-bound 'Tabernacles,' which is worth preserving in a
    footnote.
- source_word: συνήγαγεν δυνάμεις
  chosen: he gathered forces
  alternatives:
  - he assembled troops
  - he gathered an army
  lexicon: LSJ
  rationale: δυνάμεις can mean forces or military strength. 'Gathered forces' stays
    close to the Greek while naturally implying military mobilization.
- source_word: κατεσκεύασεν ὅπλα πολλά
  chosen: made many weapons
  alternatives:
  - prepared many weapons
  - manufactured many arms
  lexicon: LSJ
  rationale: κατασκευάζω here conveys making or preparing; ὅπλα are weapons/arms.
    'Made many weapons' is direct and readable.
