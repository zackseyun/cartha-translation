lexical_decisions:
- source_word: κατέλιπεν
  chosen: left
  alternatives:
  - abandoned
  - departed from
  lexicon: BDAG
  rationale: The aorist of καταλείπω here denotes leaving a location behind. 'Left'
    is natural English and preserves the straightforward narrative sense without overstating
    it as 'abandoned'.
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each
  - every man
  lexicon: BDAG
  rationale: 'ἕκαστος emphasizes individual distribution: each person acted separately.
    ''Each one'' preserves that force clearly. ''Every man'' would import masculine
    specificity not explicit in the form here.'
- source_word: τὸν τόπον αὐτοῦ
  chosen: his place
  alternatives:
  - his position
  - his post
  lexicon: BDAG
  rationale: τόπος commonly means 'place.' In this military-political narrative it
    could contextually suggest a station or position, but the phrase is broad and
    the simple 'his place' best matches the Greek without over-interpreting.
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - went
  lexicon: BDAG
  rationale: ἀπέρχομαι means to go away/depart. 'Went away' captures the motion away
    from the current setting and reads naturally in sequence with 'left his place.'
- source_word: εἰς τὴν γῆν αὐτοῦ
  chosen: to his own land
  alternatives:
  - to his land
  - to his country
  lexicon: BDAG
  rationale: γῆ can mean land, earth, or country. Here it refers to each person's
    home territory. 'His own land' brings out the possessive force of αὐτοῦ more idiomatically
    than repeating 'his' alone, while avoiding the more modern-national nuance of
    'country'.
