translation:
  text: And those in the city, being afraid, opened the gates, and Jonathan took control
    of Joppa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'opened'; the Greek does not explicitly say 'opened the gates,' though
      that is likely implied by the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβηθέντες
  chosen: being afraid
  alternatives:
  - having become afraid
  - in fear
  lexicon: LSJ
  rationale: Aorist passive participle of φοβέω used intransitively/state-wise here;
    'being afraid' gives the causal circumstance naturally in English without overinterpreting
    intensity.
- source_word: ἤνοιξαν
  chosen: opened up
  alternatives:
  - opened
  - opened the gates
  lexicon: LSJ
  rationale: The verb simply says 'opened.' 'Opened up' is idiomatic English for opening
    the city to the approaching force. 'Opened the gates' is plausible from context
    but not explicit in the Greek, so it is not adopted in the main text.
- source_word: οἱ ἐκ τῆς πόλεως
  chosen: those from the city
  alternatives:
  - the men of the city
  - the people of the city
  - those in the city
  lexicon: LSJ
  rationale: The expression is literally 'those from the city.' This avoids importing
    'men' or 'people' where the Greek is less specific, while still reading naturally
    enough.
- source_word: ἐκυρίευσεν
  chosen: took control of
  alternatives:
  - gained possession of
  - became master of
  - captured
  lexicon: LSJ
  rationale: From κυριεύω, meaning to rule over or gain mastery/control. 'Took control
    of' fits the military-political context and avoids the potentially too narrow
    'captured' while remaining clear.
- source_word: Ἰόππης
  chosen: Joppa
  alternatives:
  - Joppe
  lexicon: LSJ
  rationale: Standard English transliteration for the place-name Ἰόππη is 'Joppa.'
