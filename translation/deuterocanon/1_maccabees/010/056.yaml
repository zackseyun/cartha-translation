translation:
  text: And now I will do for you what you wrote; but meet me at Ptolemais, so that
    we may see one another, and I will become related by marriage to you, just as
    you said.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will make a marriage alliance with you.' The Greek verb refers to
      establishing a relationship by marriage; the broader narrative clarifies that
      a dynastic marriage is in view.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσω
  chosen: I will do
  alternatives:
  - I will grant
  - I will carry out
  lexicon: LSJ
  rationale: ποιέω here refers broadly to carrying out the request expressed in the
    letter. 'I will do' is the most direct and natural rendering, preserving the open-endedness
    of the Greek without over-specifying the action.
- source_word: ἃ ἔγραψας
  chosen: what you wrote
  alternatives:
  - the things you wrote
  - what you requested in writing
  lexicon: LSJ
  rationale: The relative clause is straightforwardly referential to the contents
    of the recipient's letter. 'What you wrote' is idiomatic English and sufficiently
    precise.
- source_word: ἀπάντησον
  chosen: meet me
  alternatives:
  - come to meet me
  - present yourself
  lexicon: LSJ
  rationale: The imperative calls for an encounter at Ptolemais. 'Meet me' captures
    the intended action in concise modern English; 'come to meet me' is possible but
    less natural in context.
- source_word: εἰς Πτολεμαΐδα
  chosen: at Ptolemais
  alternatives:
  - to Ptolemais
  lexicon: LSJ
  rationale: Although εἰς normally marks motion toward, English idiom with 'meet'
    commonly uses 'at' for the meeting place. This is an optimal-equivalence adjustment
    for natural English while preserving the location.
- source_word: ὅπως ἰδωμεν ἀλλήλους
  chosen: so that we may see one another
  alternatives:
  - so that we may meet each other
  - that we may see each other
  lexicon: LSJ
  rationale: The Greek literally speaks of seeing one another. Retaining 'see one
    another' preserves the wording while still sounding natural in English.
- source_word: ἐπιγαμβρεύσω
  chosen: I will become related by marriage to you
  alternatives:
  - I will make a marriage alliance with you
  - I will give you my daughter in marriage
  lexicon: LSJ
  rationale: The verb denotes entering into an affinal relationship, not merely generic
    friendship. 'Become related by marriage to you' preserves the kinship sense without
    importing a more specific object not stated in this verse alone. Because the broader
    context implies a marriage alliance, that alternative is preserved in a footnote.
- source_word: καθὼς εἴρηκας
  chosen: just as you said
  alternatives:
  - as you have said
  - as you proposed
  lexicon: LSJ
  rationale: The perfect-like force of the Greek can be represented simply in English.
    'Just as you said' is natural and adequately reflects the prior proposal.
