translation:
  text: And he sent to Jonathan the high priest, saying, “You alone are exalting yourself
    against us, while I have become an object of ridicule and reproach because of
    you; and why do you exercise authority over us in the mountains?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “are lifting yourself up against us.” The Greek verb can suggest self-exaltation
      or aggressive rising against someone.
    reason: lexical_alternative
  - marker: b
    text: Or, “I have become a laughingstock and a reproach because of you.”
    reason: lexical_alternative
  - marker: c
    text: “In the mountains” may refer more broadly to the hill country rather than
      only high mountains.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπέστειλεν πρὸς
  chosen: sent to
  alternatives:
  - sent word to
  - dispatched to
  lexicon: BDAG
  rationale: The idiom with πρὸς + accusative naturally means sending a message or
    envoy to someone. 'Sent to' is concise and preserves the narrative flow without
    over-specifying the medium.
- source_word: τὸν ἀρχιερέα
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: ἀρχιερεύς is standardly rendered 'high priest' in Jewish cultic and political
    contexts. The article is retained because it is present in Greek and functions
    as Jonathan's recognized office.
- source_word: μονώτατος
  chosen: you alone
  alternatives:
  - you only
  - you by yourself alone
  lexicon: LSJ
  rationale: The superlative intensifies exclusivity. 'You alone' captures the force
    idiomatically in English without awkward literalism.
- source_word: ἐπαίρῃ ἐφʼ ἡμᾶς
  chosen: are exalting yourself against us
  alternatives:
  - are lifting yourself up against us
  - are rising up against us
  lexicon: BDAG
  rationale: ἐπαίρω can denote lifting oneself up in pride or self-assertion. Given
    the accusatory tone and the following complaint about authority, 'exalting yourself
    against us' preserves both the reflexive sense and hostile posture better than
    the more military 'rising up.'
- source_word: ἐγενήθην εἰς καταγέλωτα καὶ ὀνειδισμόν
  chosen: I have become an object of ridicule and reproach
  alternatives:
  - I have become a laughingstock and a disgrace
  - I have become mockery and insult
  lexicon: BDAG
  rationale: The phrase expresses resulting public shame. 'Object of ridicule and
    reproach' is natural English and preserves the paired nouns without becoming colloquial.
    'Laughingstock' was considered but 'ridicule' stays closer to καταγέλωτα.
- source_word: διὰ σέ
  chosen: because of you
  alternatives:
  - on account of you
  - through you
  lexicon: BDAG
  rationale: The causal force of διά with accusative is straightforward here; 'because
    of you' is the clearest modern rendering.
- source_word: ἐξουσιάζῃ ἐφʼ ἡμᾶς
  chosen: do you exercise authority over us
  alternatives:
  - do you rule over us
  - do you dominate us
  lexicon: BDAG
  rationale: ἐξουσιάζω denotes exercising authority or control. 'Exercise authority
    over' is semantically precise and avoids importing either a neutral administrative
    tone ('rule') or an overly negative one ('dominate') beyond what the Greek itself
    states.
- source_word: ἐν τοῖς ὄρεσιν
  chosen: in the mountains
  alternatives:
  - in the hill country
  - in the hills
  lexicon: LSJ
  rationale: ὄρη literally means mountains/hill country. 'In the mountains' is the
    most direct rendering from the Greek witness; 'hill country' is possible contextually
    but less formally anchored to the source wording.
