lexical_decisions:
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in accordance with
  - with reference to
  lexicon: LSJ
  rationale: With the accusative τοὺς λόγους, κατά most naturally means 'according
    to' or 'in accordance with.' Because the Greek here is fragmentary and reads like
    part of a letter heading or transition, a close rendering best preserves the source
    form.
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - these matters
  - this message
  lexicon: LSJ
  rationale: λόγοι can mean 'words,' 'statements,' or 'message.' In this formulaic
    context, 'these words' is the most transparent and formally anchored rendering.
- source_word: λέγων
  chosen: saying
  alternatives:
  - saying as follows
  - speaking
  lexicon: LSJ
  rationale: The present participle introduces quoted or reported speech. 'Saying'
    is the standard concise English equivalent and preserves the participial structure.
- source_word: Βασιλεὺς Ἀλέξανδρος
  chosen: King Alexander
  alternatives:
  - Alexander the king
  lexicon: LSJ
  rationale: Either word order is possible in English, but 'King Alexander' is natural
    modern English while accurately reflecting the royal title.
- source_word: τῷ ἀδελφῷ
  chosen: to his brother
  alternatives:
  - to the brother
  - to his kinsman
  lexicon: LSJ
  rationale: In Hellenistic royal correspondence, ἀδελφός can function as a diplomatic
    address ('brother'). English normally requires a possessive here for readability.
    Because the surviving Greek as provided lacks the addressee's name, 'to his brother'
    best reflects the dative phrase without overreconstructing.
