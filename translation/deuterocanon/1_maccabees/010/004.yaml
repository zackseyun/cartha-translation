translation:
  text: For he said, “Let us get ahead of him in making peace with him, before he
    makes common cause with Alexander against us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “before he allies himself with Alexander against us.” The Greek literally
      says “before he places himself with Alexander against us,” an idiom for political
      alignment.
    reason: lexical_alternative
lexical_decisions:
- source_word: Προφθάσωμεν
  chosen: Let us get ahead of him
  alternatives:
  - Let us anticipate him
  - Let us be first
  lexicon: LSJ
  rationale: 'Aorist subjunctive of προφθάνω in a hortatory sense: to act before another,
    to get ahead of or anticipate. ''Get ahead of him'' is idiomatic modern English
    and preserves the strategic nuance better than the more wooden ''anticipate.'''
- source_word: τοῦ εἰρηνεῦσαι
  chosen: in making peace
  alternatives:
  - to make peace
  - to come to terms
  lexicon: LSJ
  rationale: Articular infinitive expressing the action in which they should precede
    him. 'In making peace' fits naturally after 'get ahead of him' and keeps the diplomatic
    sense of εἰρηνεύω.
- source_word: μετʼ αὐτοῦ
  chosen: with him
  lexicon: LSJ
  rationale: Standard rendering of μετά with genitive in this context, referring to
    Jonathan as the party with whom peace is sought.
- source_word: πρὶν ἢ
  chosen: before
  alternatives:
  - before that
  - sooner than
  lexicon: LSJ
  rationale: Temporal conjunction introducing the feared prior action.
- source_word: θεῖναι
  chosen: he makes common cause
  alternatives:
  - he allies himself
  - he joins himself
  lexicon: LSJ
  rationale: From τίθημι with μετὰ Ἀλεξάνδρου, idiomatically 'place himself with Alexander.'
    In context the political sense is alliance, so 'makes common cause' communicates
    the idiom clearly without overparaphrasing.
- source_word: μετὰ Ἀλεξάνδρου
  chosen: with Alexander
  lexicon: LSJ
  rationale: μετά with genitive marks association/alliance; Alexander is transliterated
    as a personal name.
- source_word: καθʼ ἡμῶν
  chosen: against us
  alternatives:
  - in opposition to us
  lexicon: LSJ
  rationale: κατά with genitive here indicates hostility directed toward the speaker's
    side.
