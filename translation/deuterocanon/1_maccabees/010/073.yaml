translation:
  text: And now you will not be able to withstand the cavalry and so great a force
    in the plain, where there is neither stone nor pebble nor a place to flee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'the horse' uses a collective singular, meaning the cavalry or mounted
      troops.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ δυνήσῃ
  chosen: you will not be able
  alternatives:
  - you cannot
  - you shall not be able
  lexicon: BDAG
  rationale: Future middle indicative of δύναμαι; rendered as a straightforward future
    inability in natural English.
- source_word: ὑποστῆναι
  chosen: to withstand
  alternatives:
  - to resist
  - to stand against
  - to endure
  lexicon: BDAG
  rationale: In this military context the infinitive conveys standing up against an
    attacking force. 'Withstand' best captures active resistance without overparaphrase.
- source_word: τὴν ἵππον
  chosen: the cavalry
  alternatives:
  - the horsemen
  - the horse
  lexicon: LSJ
  rationale: Although literally 'the horse,' the singular collective commonly denotes
    cavalry as a military arm. 'Cavalry' is idiomatic and contextually precise.
- source_word: δύναμιν τοσαύτην
  chosen: so great a force
  alternatives:
  - such a great army
  - so large a power
  lexicon: BDAG
  rationale: δύναμις here refers to military force rather than abstract power. 'So
    great a force' preserves the demonstrative intensity of τοσαύτην and remains broad
    enough to include more than infantry alone.
- source_word: ἐν τῷ πεδίῳ
  chosen: in the plain
  alternatives:
  - on the plain
  - in the open field
  lexicon: LSJ
  rationale: πέδιον denotes a plain or level open country. 'In the plain' fits the
    terrain contrast developed by the following clause.
- source_word: λίθος
  chosen: stone
  alternatives:
  - rock
  lexicon: LSJ
  rationale: A basic term for stone; likely refers to larger stones useful for cover
    or defense. Kept distinct from κόχλας.
- source_word: κόχλας
  chosen: pebble
  alternatives:
  - small stone
  - gravel
  lexicon: LSJ
  rationale: The term contrasts with λίθος and points to smaller stones. 'Pebble'
    preserves the distinction and the sense that the terrain offers no material advantage
    at all.
- source_word: τόπος τοῦ φυγεῖν
  chosen: a place to flee
  alternatives:
  - a place of escape
  - room to retreat
  - a place to run away
  lexicon: BDAG
  rationale: The genitive articular infinitive expresses purpose or possibility of
    escape. 'A place to flee' is close to the Greek while remaining readable.
