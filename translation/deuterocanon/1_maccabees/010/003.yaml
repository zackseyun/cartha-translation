translation:
  text: And Demetrius sent letters to Jonathan with peaceful words, so as to honor
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with words of peace.' The Greek phrase λόγοις εἰρηνικοῖς can be rendered
      more literally this way.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to make him great.' The sense here is to honor or elevate Jonathan.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard aorist of ἀποστέλλω meaning 'send'; 'sent' is natural modern
    English and fits the epistolary context.
- source_word: ἐπιστολὰς
  chosen: letters
  alternatives:
  - a letter
  - written messages
  lexicon: LSJ
  rationale: Plural accusative clearly indicates multiple letters or a set of written
    communications; 'letters' is the straightforward rendering.
- source_word: λόγοις εἰρηνικοῖς
  chosen: with peaceful words
  alternatives:
  - with words of peace
  - in peaceable terms
  lexicon: LSJ
  rationale: The dative phrase describes the character/content of the letters. 'With
    peaceful words' preserves the lexical force of both λόγοις and εἰρηνικοῖς without
    over-idiomatizing.
- source_word: ὥστε
  chosen: so as to
  alternatives:
  - in order to
  - with the result that
  lexicon: LSJ
  rationale: Here ὥστε introduces intended purpose in context rather than merely result.
    'So as to' preserves that nuance in readable English.
- source_word: μεγαλῦναι
  chosen: honor
  alternatives:
  - magnify
  - exalt
  - make great
  lexicon: LSJ
  rationale: Literally 'make great,' but in this political context Demetrius is seeking
    to elevate Jonathan's status or show him distinction. 'Honor' communicates the
    intended sense in idiomatic English while remaining anchored to the Greek.
- source_word: Ἰωναθὰν
  chosen: Jonathan
  rationale: Personal name transliterated according to standard English convention,
    per project philosophy.
