translation:
  text: And we will repay you with good things for what you do with us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in return for what you are doing for us' or 'toward us.' The Greek
      literally says 'with us,' which may imply cooperation or favorable dealings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνταποδώσομεν
  chosen: we will repay
  alternatives:
  - we will return
  - we will recompense
  lexicon: BDAG
  rationale: Future active verb meaning to give back or repay in return. 'Repay' is
    natural modern English and preserves the reciprocal sense without sounding overly
    formal.
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Dative indirect object. English can express this naturally as 'repay
    you,' which includes the dative force.
- source_word: ἀγαθὰ
  chosen: good things
  alternatives:
  - good
  - benefits
  - kindnesses
  lexicon: BDAG
  rationale: Neuter plural adjective used substantivally. 'Good things' preserves
    the plural and the broad, non-specific sense better than the more interpretive
    'benefits' or the abstract singular 'good'.
- source_word: ἀνθʼ ὧν
  chosen: for what
  alternatives:
  - because of what
  - in return for what
  lexicon: BDAG
  rationale: Idiomatic expression introducing the basis for repayment. 'For what'
    is concise and natural in English while retaining the causal/reciprocal sense.
- source_word: ποιεῖτε
  chosen: you are doing
  alternatives:
  - you do
  - you have done
  lexicon: BDAG
  rationale: Present tense indicates ongoing action. 'You are doing' best reflects
    the aspect in context.
- source_word: μεθʼ ἡμῶν
  chosen: with us
  alternatives:
  - for us
  - toward us
  lexicon: BDAG
  rationale: The preposition μετά with genitive normally means 'with.' Here it likely
    refers to actions done in alliance or cooperation with the speaker's side. 'With
    us' stays closest to the Greek; 'for us' would be more interpretive.
