translation:
  text: And he gave him authority to gather forces, and to make weapons, and for him
    to be his ally, and he said that the hostages in the citadel should be handed
    over to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Acra,' the fortified citadel in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκεν ... ἐξουσίαν
  chosen: gave ... authority
  alternatives:
  - gave ... power
  - granted ... permission
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes authority or delegated right. 'Authority' best
    captures an official grant in this political-military context without overstating
    inherent power.
- source_word: συναγαγεῖν δυνάμεις
  chosen: to gather forces
  alternatives:
  - to assemble troops
  - to muster forces
  lexicon: LSJ
  rationale: δυνάμεις here refers to military forces rather than abstract powers.
    'Gather forces' stays close to the Greek while remaining natural English.
- source_word: κατασκευάζειν ὅπλα
  chosen: to make weapons
  alternatives:
  - to prepare arms
  - to manufacture weapons
  lexicon: LSJ
  rationale: κατασκευάζειν can mean prepare or equip; with ὅπλα in a military setting,
    'make weapons' is a clear, accessible rendering that reflects production/provisioning.
- source_word: εἶναι ... σύμμαχον
  chosen: for him to be his ally
  alternatives:
  - that he should be his ally
  - to be an ally to him
  lexicon: LSJ
  rationale: σύμμαχος means ally. The infinitival construction after ἔδωκεν ἐξουσίαν
    is somewhat compressed in Greek; this English preserves the sense that alliance
    status was granted or recognized.
- source_word: τὰ ὅμηρα
  chosen: the hostages
  alternatives:
  - the pledges
  lexicon: LSJ
  rationale: ὅμηρα ordinarily means hostages given as security. 'Hostages' is the
    plain and historically appropriate rendering.
- source_word: ἡ ἄκρα
  chosen: the citadel
  alternatives:
  - the Acra
  - the fortress
  lexicon: LSJ
  rationale: ἄκρα means citadel/fortress. 'Citadel' translates the common noun directly;
    'Acra' would preserve the place-name association but is less transparent in the
    main text. The alternative is worth preserving in a footnote because in 1 Maccabees
    it can refer specifically to Jerusalem's Akra/Acra.
- source_word: παραδοῦναι
  chosen: should be handed over
  alternatives:
  - to hand over
  - to deliver up
  lexicon: BDAG
  rationale: The aorist infinitive after εἶπεν expresses what was ordered or declared.
    'Should be handed over' makes the directive force explicit in idiomatic English.
