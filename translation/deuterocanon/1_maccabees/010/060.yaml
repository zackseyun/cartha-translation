translation:
  text: And he went with splendor to Ptolemais, and met the two kings; and he gave
    them silver and gold, and to their friends many gifts, and found favor before
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with glory' or 'with pomp'; the Greek phrase μετὰ δόξης denotes a display
      of honor or magnificence in his arrival.
    reason: lexical_alternative
  - marker: b
    text: '''Friends'' may refer more specifically to royal associates or courtiers
      in a Hellenistic court setting.'
    reason: cultural_note
  - marker: c
    text: Or 'found favor with them' or 'won their favor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθη
  chosen: went
  alternatives:
  - traveled
  - proceeded
  lexicon: LSJ
  rationale: A straightforward narrative aorist of movement; 'went' is natural English
    and sufficiently formal without over-specifying manner.
- source_word: μετὰ δόξης
  chosen: with splendor
  alternatives:
  - with glory
  - in state
  - with pomp
  lexicon: LSJ
  rationale: The phrase indicates public magnificence or honor in his approach. 'With
    splendor' preserves the sense of visible grandeur without importing specifically
    theological overtones that 'glory' can carry in English.
- source_word: Πτολεμαΐδα
  chosen: Ptolemais
  rationale: Personal and place names are transliterated by standard convention.
- source_word: ἀπήντησεν
  chosen: met
  alternatives:
  - went to meet
  - greeted
  lexicon: LSJ
  rationale: The verb can mean to go out to meet or encounter. In this context, 'met'
    is concise and idiomatic, while the destination and following gifts make the diplomatic
    encounter clear.
- source_word: τοῖς δυσὶν βασιλεῦσιν
  chosen: the two kings
  alternatives:
  - both kings
  lexicon: LSJ
  rationale: The article plus numeral naturally identifies the pair already in view.
    'The two kings' is the most direct rendering.
- source_word: ἔδωκεν
  chosen: gave
  alternatives:
  - presented
  lexicon: LSJ
  rationale: The common verb 'gave' should be retained; the courtly context already
    implies formal presentation.
- source_word: ἀργύριον καὶ χρυσίον
  chosen: silver and gold
  lexicon: LSJ
  rationale: Standard material terms; no reason to paraphrase.
- source_word: τοῖς φίλοις αὐτῶν
  chosen: to their friends
  alternatives:
  - to their companions
  - to their courtiers
  lexicon: LSJ
  rationale: φίλοι in Hellenistic court contexts can denote royal associates or courtiers,
    but the base sense 'friends' is what the Greek says. Since the text does not explicitly
    mark an official title here, the simpler rendering is preferred.
- source_word: δόματα πολλά
  chosen: many gifts
  alternatives:
  - many presents
  lexicon: LSJ
  rationale: A natural rendering of the plural noun with adjective; 'gifts' fits the
    diplomatic setting.
- source_word: εὗρεν χάριν ἐναντίον αὐτῶν
  chosen: found favor before them
  alternatives:
  - found favor with them
  - won their favor
  lexicon: LSJ
  rationale: This reproduces the idiom fairly closely. 'Before them' is slightly more
    formal and reflects ἐναντίον, while remaining understandable in English.
