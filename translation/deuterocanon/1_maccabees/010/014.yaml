translation:
  text: But in Bethsura some of those who had abandoned the law and the commandments
    were left behind, for it was a refuge for them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πλὴν
  chosen: But
  alternatives:
  - Nevertheless
  - Except that
  lexicon: LSJ
  rationale: Introduces a contrast with the preceding context. 'But' is natural modern
    English and preserves the adversative force without sounding overly formal.
- source_word: ἐν Βεθσούροις
  chosen: in Bethsura
  alternatives:
  - at Bethsura
  lexicon: LSJ
  rationale: Place name transliterated per project policy. 'In Bethsura' fits the
    sense of location within/at the stronghold or settlement.
- source_word: ὑπελείφθησάν
  chosen: were left behind
  alternatives:
  - remained
  - were left
  lexicon: LSJ
  rationale: The passive verb indicates that certain persons were still there or remained
    over. 'Were left behind' preserves the passive nuance more clearly than the simpler
    'remained'.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  lexicon: LSJ
  rationale: Indefinite plural best rendered idiomatically as 'some'.
- source_word: τῶν καταλειπόντων
  chosen: of those who had abandoned
  alternatives:
  - of those who had left
  - of those forsaking
  lexicon: LSJ
  rationale: The participle denotes people who had left behind or abandoned something.
    In context, with 'the law and the commandments' as object, 'abandoned' best conveys
    defection from covenantal observance.
- source_word: τὸν νόμον
  chosen: the law
  lexicon: LSJ
  rationale: Standard rendering for νόμος in Jewish covenantal context; here it refers
    to the ancestral law.
- source_word: τὰ προστάγματα
  chosen: the commandments
  alternatives:
  - the decrees
  - the ordinances
  - the commands
  lexicon: LSJ
  rationale: Refers to prescribed commands. 'Commandments' pairs naturally with 'the
    law' and preserves the religious-legal sense.
- source_word: φυγαδευτήριον
  chosen: a refuge
  alternatives:
  - a place of escape
  - a hiding place
  - an asylum
  lexicon: LSJ
  rationale: The noun denotes a place of flight or refuge. 'Refuge' is concise, natural
    English and fits the military-political context without overinterpreting.
