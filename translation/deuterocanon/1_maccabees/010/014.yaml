theological_decisions:
- issue: Moral characterization of the group described by καταλειπόντων τὸν νόμον
    καὶ τὰ προστάγματα
  chosen_reading: Render as 'those who had abandoned the law and the commandments'
  alternative_readings:
  - those who had left the law and the commandments
  - those who had forsaken the law and the commandments
  rationale: The Greek presents these people negatively as defectors from covenantal
    norms. 'Abandoned' communicates that force clearly without adding extra theological
    interpretation beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; consistency of key terms'
