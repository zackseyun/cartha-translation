translation:
  text: And Jonathan returned with those who were with him, carrying much plunder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoils.' The Greek term refers to goods taken in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέστρεψεν
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: LSJ
  rationale: The aorist verb denotes returning from the battle scene. 'Returned' is
    natural modern English and preserves the straightforward narrative sense without
    over-specifying direction.
- source_word: σὺν τοῖς παρʼ αὐτοῦ
  chosen: with those who were with him
  alternatives:
  - with his men
  - together with those around him
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic, literally 'with those from/by him,'
    referring to Jonathan's accompanying group. 'Those who were with him' stays close
    to the Greek while remaining readable; 'his men' is possible but adds a military
    nuance not explicit in the wording.
- source_word: ἔχοντες
  chosen: carrying
  alternatives:
  - having
  - bringing back
  lexicon: LSJ
  rationale: The participle describes the manner accompanying the return. 'Carrying'
    fits the concrete object 'plunder' better than the more wooden 'having,' while
    avoiding the added directional nuance of 'bringing back.'
- source_word: σκῦλα
  chosen: plunder
  alternatives:
  - spoils
  - booty
  lexicon: LSJ
  rationale: The noun refers to goods taken in war. 'Plunder' is clear contemporary
    English; 'spoils' is also valid but slightly more traditional, while 'booty' is
    potentially distracting in modern usage.
- source_word: πολλά
  chosen: much
  alternatives:
  - a great amount of
  - many
  lexicon: LSJ
  rationale: With a collective noun like 'plunder,' English idiom prefers 'much plunder.'
    This preserves the quantitative emphasis of the Greek without awkwardness.
