translation:
  text: And Apollonius secretly left a thousand horsemen behind them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'secretly behind them.' The Greek adverb κρυπτῶς can be rendered adverbially
      ('secretly') rather than with the participial sense implied by 'hidden.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέλειπεν
  chosen: left
  alternatives:
  - kept back
  - left behind
  lexicon: LSJ
  rationale: The imperfect verb indicates that Apollonius caused a force to remain
    apart from the main body. 'Left' is natural English and fits the military context
    without overinterpreting aspect.
- source_word: χιλίαν
  chosen: a thousand
  alternatives:
  - one thousand
  lexicon: LSJ
  rationale: Cardinal numeral; 'a thousand' is idiomatic modern English.
- source_word: ἵππον
  chosen: horsemen
  alternatives:
  - cavalry
  - horse
  lexicon: LSJ
  rationale: Although singular in form, the noun here functions collectively in military
    usage. 'Horsemen' makes explicit that mounted troops, not literal horses, are
    meant. 'Cavalry' is possible, but 'horsemen' stays closer to the Greek wording.
- source_word: κρυπτῶς
  chosen: hidden
  alternatives:
  - secretly
  - in secret
  - covertly
  lexicon: LSJ
  rationale: The adverb describes the concealed deployment of the troops. Rendering
    it as 'hidden' works smoothly with the military ambush context in English.
- source_word: κατόπισθεν αὐτῶν
  chosen: behind them
  alternatives:
  - at their rear
  - behind them in the rear
  lexicon: LSJ
  rationale: The phrase indicates position to the rear of the opposing group already
    in view from the context. 'Behind them' is the most direct rendering.
