translation:
  text: And the battle continued fiercely until the sun set, and Demetrius fell on
    that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'made the battle strong.' The Greek idiom indicates
      that the fighting intensified or held firm.
    reason: lexical_alternative
  - marker: b
    text: '''Fell'' here is battle language implying that Demetrius was killed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐστερέωσεν
  chosen: raged
  alternatives:
  - grew strong
  - was pressed hard
  - continued strongly
  lexicon: LSJ
  rationale: The verb from στερεόω literally means 'make firm/strong,' but with πόλεμον
    as object it idiomatically conveys that the fighting intensified or was sustained
    with force. 'Raged' gives natural English while preserving the sense of severe,
    ongoing combat better than the wooden 'made war strong.'
- source_word: πόλεμον
  chosen: the battle
  alternatives:
  - war
  - fighting
  lexicon: LSJ
  rationale: Although πόλεμος often means 'war,' in this immediate narrative scene
    it refers to the concrete engagement underway. 'The battle' fits the event-level
    context more precisely in English.
- source_word: σφόδρα
  chosen: fiercely
  alternatives:
  - greatly
  - very much
  - severely
  lexicon: LSJ
  rationale: σφόδρα intensifies the manner of the combat. 'Fiercely' expresses the
    adverbial force naturally in English and matches the martial context.
- source_word: ἕως ἔδυ ὁ ἥλιος
  chosen: until the sun set
  alternatives:
  - until the sun went down
  - until sunset
  lexicon: LSJ
  rationale: This is a straightforward temporal clause. 'Until the sun set' is idiomatic
    modern English and preserves the concrete imagery of the Greek.
- source_word: ἔπεσεν
  chosen: fell
  alternatives:
  - was slain
  - died
  lexicon: LSJ
  rationale: The Greek says literally 'fell.' In battle narrative this commonly implies
    death, but the text itself uses the less explicit verb. 'Fell' preserves that
    wording and lets the context communicate the fatal sense.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  chosen: on that day
  alternatives:
  - in that day
  - that very day
  lexicon: LSJ
  rationale: The phrase is a standard temporal expression. 'On that day' is the most
    natural equivalent in contemporary English.
