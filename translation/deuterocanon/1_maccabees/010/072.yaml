translation:
  text: Ask and learn who I am, and who the rest are who are helping us; and they
    say, ‘You have no footing to stand against us, because your fathers were routed
    twice in their own land.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'there is not for you a standing of foot before our face.' The
      translation renders the Greek idiom as 'You have no footing to stand against
      us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρώτησον
  chosen: Ask
  alternatives:
  - Inquire
  - Question
  lexicon: LSJ
  rationale: Imperative of ἐρωτάω; 'Ask' is direct, natural English and fits the challenge
    tone.
- source_word: μάθε
  chosen: learn
  alternatives:
  - know
  - find out
  lexicon: LSJ
  rationale: Imperative of μανθάνω; paired with 'ask' it conveys gaining information.
    'Learn' preserves the sequence better than the stative 'know'.
- source_word: οἱ λοιποὶ οἱ βοηθοῦντές ἡμῖν
  chosen: the rest are who are helping us
  alternatives:
  - the others who are helping us
  - the rest who support us
  lexicon: LSJ
  rationale: λοιποί means 'the rest/others'; βοηθοῦντες denotes active assistance.
    'Helping us' is straightforward and avoids overreading military nuance, though
    the context is martial.
- source_word: λέγουσιν
  chosen: they say
  alternatives:
  - they are saying
  - it is said
  lexicon: LSJ
  rationale: Present indicative retained as vivid present in English. The subject
    is indefinite but plural in Greek, so 'they say' is the most natural rendering.
- source_word: Οὐκ ἔστιν ὑμῖν στάσις ποδὸς
  chosen: You have no footing
  alternatives:
  - There is no standing for you
  - You have no place to set your foot
  - You have no foothold
  lexicon: LSJ
  rationale: The idiom literally involves 'standing of foot' and conveys inability
    to hold one's ground. 'You have no footing' preserves the metaphor in idiomatic
    English.
- source_word: κατὰ πρόσωπον ἡμῶν
  chosen: to stand against us
  alternatives:
  - before us
  - face to face with us
  - in our presence
  lexicon: LSJ
  rationale: 'Literally ''before our face,'' but in military challenge context it
    means opposition in front of or against. This is brought into smooth English by
    linking it with the footing idiom: ''to stand against us.'''
- source_word: δὶς
  chosen: twice
  alternatives:
  - on two occasions
  lexicon: LSJ
  rationale: Simple adverb; 'twice' is exact and concise.
- source_word: ἐτροπώθησαν
  chosen: were routed
  alternatives:
  - were turned back
  - were defeated
  - were put to flight
  lexicon: LSJ
  rationale: Passive of τροπόω/τρέπω in military context suggests being turned in
    battle or put to flight. 'Were routed' best captures the martial force.
- source_word: οἱ πατέρες σου
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: LSJ
  rationale: Formal plural with ancestral sense. 'Your fathers' stays closer to the
    Greek and preserves the rhetoric of dynastic/ancestral shame.
- source_word: ἐν τῇ γῇ αὐτῶν
  chosen: in their own land
  alternatives:
  - in their land
  lexicon: LSJ
  rationale: Adding 'own' makes explicit the possessive force of αὐτῶν in idiomatic
    English and sharpens the taunt.
