translation:
  text: And Alexander the king gathered great forces and encamped opposite Demetrius.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνήγαγεν
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: LSJ
  rationale: Aorist of συνάγω here refers to bringing military resources together.
    'Gathered' is straightforward and natural; 'mustered' is possible in military
    context but slightly more interpretive.
- source_word: δυνάμεις μεγάλας
  chosen: great forces
  alternatives:
  - large forces
  - great armies
  - a great army
  lexicon: LSJ
  rationale: δυνάμεις in military narrative commonly denotes forces/troops rather
    than abstract 'powers.' The plural is preserved with 'forces,' and μεγάλας is
    rendered 'great' in a quantitatively military sense.
- source_word: παρενέβαλεν
  chosen: encamped
  alternatives:
  - camped
  - set up camp
  lexicon: LSJ
  rationale: The verb παρεμβάλλω in military contexts means to encamp or pitch camp.
    'Encamped' is concise and suitably formal for narrative prose.
- source_word: ἐξ ἐναντίας
  chosen: opposite
  alternatives:
  - against
  - facing
  - over against
  lexicon: LSJ
  rationale: The phrase indicates spatial opposition in battle formation. 'Opposite'
    preserves the positional sense without overinterpreting it as immediate attack;
    'against' is possible but more combative than the Greek requires.
- source_word: Δημητρίῳ
  chosen: Demetrius
  rationale: Standard English transliteration of the proper name Δημήτριος.
- source_word: Ἀλέξανδρος ὁ βασιλεύς
  chosen: Alexander the king
  alternatives:
  - King Alexander
  rationale: The Greek apposition places the title after the name. 'Alexander the
    king' follows the source order more closely while remaining natural English.
