translation:
  text: And the three districts added to Judea from the territory of Samaria, let
    them be attached to Judea, so as to be reckoned as one, and not to obey any other
    authority except that of the high priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the three nomes,' using the Hellenistic administrative term for districts.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to become under one,' that is, to be treated as a single administrative
      unit.
    reason: lexical_alternative
lexical_decisions:
- source_word: νομοὺς
  chosen: districts
  alternatives:
  - nomes
  - administrative regions
  - territories
  lexicon: LSJ
  rationale: In Hellenistic administrative usage, νόμος can denote a district or administrative
    division rather than 'law.' Given the context of territories added from Samaria,
    'districts' best conveys the geographic-administrative sense in clear modern English.
- source_word: προστεθέντας / προστεθήτω
  chosen: added / let them be attached
  alternatives:
  - annexed
  - joined
  - assigned
  lexicon: LSJ
  rationale: The participle and imperative of προστίθημι describe territorial addition
    or attachment. Using 'added' for the prior state and 'let them be attached' for
    the decree preserves the verbal distinction while remaining natural in English.
- source_word: χώρας
  chosen: territory
  alternatives:
  - land
  - region
  - country
  lexicon: LSJ
  rationale: Here χώρα refers to the land or territorial domain of Samaria. 'Territory'
    fits the administrative context better than the broader 'country' or more generic
    'land.'
- source_word: πρὸς τὸ λογισθῆναι
  chosen: so as to be reckoned
  alternatives:
  - in order to be counted
  - for being considered
  lexicon: LSJ
  rationale: The construction expresses purpose. 'So as to be reckoned' preserves
    the formal administrative nuance of λογίζομαι without sounding overly wooden.
- source_word: τοῦ γενέσθαι ὑφʼ ἕνα
  chosen: as one
  alternatives:
  - under one
  - into one unit
  lexicon: LSJ
  rationale: The phrase is somewhat compressed, literally 'to become under one.' In
    context it refers to unified administration/jurisdiction. 'As one' communicates
    the intended unity succinctly; the more literal 'under one' is preserved conceptually
    in the following clause about authority.
- source_word: ὑπακοῦσαι
  chosen: to obey
  alternatives:
  - to be subject to
  - to submit to
  lexicon: LSJ
  rationale: The infinitive straightforwardly means 'to obey.' This is clear and sufficiently
    formal for the legal context.
- source_word: ἄλλης ἐξουσίας
  chosen: any other authority
  alternatives:
  - another jurisdiction
  - any other power
  lexicon: LSJ
  rationale: ἐξουσία here denotes governing authority or jurisdiction. 'Any other
    authority' preserves the breadth of the term and fits the legal-administrative
    setting.
- source_word: ἀλλʼ ἢ τοῦ ἀρχιερέως
  chosen: except that of the high priest
  alternatives:
  - except the high priest
  - except under the high priest's authority
  lexicon: LSJ
  rationale: The genitive depends on the idea of authority/jurisdiction. 'Except that
    of the high priest' makes explicit that the exception concerns authority, not
    mere personal obedience in abstraction.
