theological_decisions:
- issue: Nature of the high priest's role in the decree
  chosen_reading: The verse is rendered in administrative-political terms, indicating
    jurisdiction under the high priest rather than importing broader theological claims.
  alternative_readings:
  - A more expansive reading could imply comprehensive religious and civil subjection
    to the high priest.
  rationale: The Greek concerns territorial attachment and obedience to authority.
    The translation preserves that legal sense without overstating the scope beyond
    what the decree explicitly says.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
