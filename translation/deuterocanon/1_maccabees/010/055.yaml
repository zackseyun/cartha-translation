translation:
  text: And King Ptolemy answered, saying, “A good day is this, on which you returned
    to the land of your fathers and sat on the throne of their kingdom.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπεκρίθη
  chosen: answered
  alternatives:
  - replied
  - responded
  lexicon: LSJ
  rationale: The verb introduces Ptolemy's response in direct speech. 'Answered' is
    the most straightforward narrative equivalent in English.
- source_word: Ἀγαθὴ ἡμέρα
  chosen: A good day is this
  alternatives:
  - This is a good day
  - Blessed is the day
  lexicon: LSJ
  rationale: The Greek is an exclamatory nominal clause. 'A good day is this' preserves
    the elevated tone and word order more closely than a flatter modern rearrangement,
    without becoming archaic.
- source_word: ἀνέστρεψας
  chosen: you returned
  alternatives:
  - you turned back
  - you came back
  lexicon: LSJ
  rationale: In context the verb refers to returning to one's ancestral land. 'Returned'
    is idiomatic and fits the directional phrase εἰς γῆν πατέρων σου.
- source_word: γῆν πατέρων σου
  chosen: the land of your fathers
  alternatives:
  - your fathers' land
  - your ancestral land
  lexicon: LSJ
  rationale: This preserves the familial and dynastic emphasis of the Greek. 'Ancestral
    land' is possible, but the more literal wording better reflects the source.
- source_word: ἐκάθισας
  chosen: sat
  alternatives:
  - took your seat
  - were seated
  lexicon: LSJ
  rationale: The aorist verb is simple and direct. 'Sat' keeps the concrete enthronement
    imagery; 'took your seat' is interpretive.
- source_word: ἐπὶ θρόνου βασιλείας αὐτῶν
  chosen: on the throne of their kingdom
  alternatives:
  - on their royal throne
  - on the throne of their kingship
  lexicon: LSJ
  rationale: βασιλεία here denotes royal rule/kingdom. 'The throne of their kingdom'
    preserves the genitival construction and dynastic sense linking the throne to
    the fathers' realm.
