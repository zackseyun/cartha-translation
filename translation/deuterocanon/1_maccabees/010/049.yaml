translation:
  text: And the two kings joined battle, and Demetrius's camp fled, and Alexander
    pursued him and prevailed over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Demetrius''s camp fled ... Alexander pursued him and prevailed
      over them.'' The shift from singular (''him'') to plural (''them'') likely reflects
      pursuit of Demetrius as commander and victory over his forces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆψαν πόλεμον
  chosen: joined battle
  alternatives:
  - engaged in war
  - joined in battle
  - fought
  lexicon: LSJ
  rationale: The idiom literally means 'joined war/battle' and refers to entering
    combat. 'Joined battle' is concise, idiomatic English that preserves the military
    sense without over-paraphrasing.
- source_word: οἱ δύο βασιλεῖς
  chosen: the two kings
  alternatives:
  - both kings
  lexicon: LSJ
  rationale: A straightforward rendering of the explicit subject, retained in apposition
    for clarity in English.
- source_word: ἡ παρεμβολὴ Δημητρίου
  chosen: Demetrius's camp
  alternatives:
  - the camp of Demetrius
  - Demetrius's army
  - Demetrius's encampment
  lexicon: LSJ
  rationale: παρεμβολή commonly denotes a camp or encamped force. 'Camp' is the most
    direct rendering; in battle context it can stand metonymically for the troops.
    'Army' would interpret beyond the lexical form.
- source_word: ἔφυγεν
  chosen: fled
  alternatives:
  - ran away
  - was routed
  lexicon: LSJ
  rationale: The verb simply means 'fled.' 'Was routed' may be contextually true but
    adds interpretive color not explicit in the verb.
- source_word: ἐδίωξεν αὐτόν
  chosen: pursued him
  alternatives:
  - chased him
  - pressed after him
  lexicon: LSJ
  rationale: A standard military verb for pursuit. The singular object naturally refers
    to Demetrius as the leader just mentioned by name, even though his camp had fled.
- source_word: ἴσχυσεν ἐπʼ αὐτούς
  chosen: prevailed over them
  alternatives:
  - was strong against them
  - gained the upper hand over them
  - defeated them
  lexicon: LSJ
  rationale: The phrase indicates superiority or victory over opponents. 'Prevailed
    over them' preserves the broader sense without overstating it as a total defeat.
