translation:
  text: And King Demetrius heard, and he gathered very many forces, and went out to
    meet him in battle.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - heard about
  lexicon: LSJ
  rationale: The aorist of ἀκούω here introduces Demetrius's reaction to news. 'Heard'
    is the most direct and natural rendering; 'learned' is possible but slightly more
    interpretive.
- source_word: συνήγαγεν
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: LSJ
  rationale: The verb means to bring together. 'Gathered' preserves the basic sense
    without over-specifying military procedure; 'mustered' is plausible in context
    but more interpretive.
- source_word: δυνάμεις
  chosen: forces
  alternatives:
  - troops
  - army
  lexicon: LSJ
  rationale: In military context δυνάμεις refers to armed forces or troops. 'Forces'
    is broad and accurate; 'army' could imply a singular organized body not explicit
    in the plural.
- source_word: πολλὰς σφόδρα
  chosen: very many
  alternatives:
  - a great many
  - exceedingly many
  lexicon: LSJ
  rationale: The combination intensifies quantity. 'Very many' reflects both πολλὰς
    and σφόδρα in straightforward English.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - marched out
  - set out
  lexicon: LSJ
  rationale: The verb literally means 'went out.' Because the military destination
    is already clear from context, the more formal 'went out' preserves the source
    wording better than the more interpretive 'marched out.'
- source_word: εἰς συνάντησιν αὐτῷ
  chosen: to meet him
  alternatives:
  - against him
  - for an encounter with him
  lexicon: LSJ
  rationale: The idiom means going out to meet someone. Since the following phrase
    εἰς πόλεμον clarifies hostile intent, 'to meet him' is sufficient and lets the
    next phrase carry the warlike sense.
- source_word: εἰς πόλεμον
  chosen: in battle
  alternatives:
  - for war
  - to wage war
  lexicon: LSJ
  rationale: This phrase expresses the purpose or sphere of the encounter. 'In battle'
    is idiomatic English and conveys the military confrontation without unnecessary
    expansion.
