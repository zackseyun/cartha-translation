translation:
  text: And let up to thirty thousand men from the Jews be enrolled in the king’s
    forces, and provisions shall be given to them, as is fitting for all the king’s
    forces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rations,' 'maintenance,' or more literally 'hospitality'; the Greek
      ξενιά here denotes the support supplied to troops.
    reason: lexical_alternative
lexical_decisions:
- source_word: προγραφήθήτωσαν
  chosen: let ... be enrolled
  alternatives:
  - let ... be registered
  - let ... be listed
  lexicon: LSJ
  rationale: The passive imperative calls for official inscription or registration
    for service. 'Be enrolled' fits the military-administrative context better than
    the more generic 'be listed' or 'be registered.'
- source_word: τῶν Ἰουδαίων
  chosen: from the Jews
  alternatives:
  - of the Jews
  - from among the Jews
  lexicon: LSJ
  rationale: With the partitive sense in context, the phrase indicates that the thirty
    thousand men are to be drawn from the Jewish population. 'From the Jews' is concise
    and natural English.
- source_word: εἰς τὰς δυνάμεις τοῦ βασιλέως
  chosen: in the king’s forces
  alternatives:
  - into the king’s armies
  - for the king’s forces
  lexicon: LSJ
  rationale: δυνάμεις here refers to military forces. 'In the king’s forces' communicates
    incorporation into royal military service without overstating the structure as
    multiple separate armies.
- source_word: τριάκοντα χιλιάδας ἀνδρῶν
  chosen: thirty thousand men
  alternatives:
  - thirty thousand males
  lexicon: LSJ
  rationale: ἀνδρῶν in a military census context naturally means men, not generic
    persons. This follows the project's gender-accurate policy.
- source_word: δοθήσεται
  chosen: shall be given
  alternatives:
  - will be given
  lexicon: LSJ
  rationale: A simple future passive. 'Shall be given' preserves the formal administrative
    tone of the decree.
- source_word: ξενιά
  chosen: provisions
  alternatives:
  - rations
  - hospitality
  - maintenance
  lexicon: LSJ
  rationale: In this military context ξενιά refers not to social hospitality in a
    narrow sense but to support supplied to troops. 'Provisions' is broad and natural,
    while 'rations' is possible but slightly narrower.
- source_word: ὡς καθῆκει
  chosen: as is fitting
  alternatives:
  - as is proper
  - as is due
  lexicon: LSJ
  rationale: The phrase expresses what is appropriate or customary. 'As is fitting'
    preserves the formal tone and links the support to standard royal practice.
- source_word: πάσαις ταῖς δυνάμεσιν τοῦ βασιλέως
  chosen: for all the king’s forces
  alternatives:
  - for all the king’s armies
  - to all the king’s forces
  lexicon: LSJ
  rationale: 'The dative marks the comparison standard: what is fitting for all royal
    forces. ''For all the king’s forces'' reads smoothly in English and keeps the
    military sense.'
