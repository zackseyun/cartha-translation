translation:
  text: And Apollonius heard, and he encamped three thousand cavalry and a large force,
    and went to Azotus as though passing through, and at the same time advanced into
    the plain, because he had a multitude of cavalry and trusted in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as if merely passing by.' The Greek suggests that Apollonius presented
      his movement as a transit rather than an overt attack.
    reason: lexical_alternative
  - marker: b
    text: The Greek uses 'horse' collectively for mounted troops; hence 'cavalry.'
    reason: cultural_note
lexical_decisions:
- source_word: παρενέβαλεν
  chosen: encamped
  alternatives:
  - drew up camp
  - marched in and camped
  lexicon: LSJ
  rationale: The verb commonly means to encamp or pitch camp. In military narrative
    this is more precise than a generic 'advanced' and fits the following troop description.
- source_word: τρισχιλίαν ἵππον
  chosen: three thousand cavalry
  alternatives:
  - three thousand horsemen
  - three thousand horse
  lexicon: LSJ
  rationale: ἵππος can stand metonymically for cavalry/horsemen in military contexts.
    'Three thousand cavalry' is idiomatic modern English while preserving the military
    sense.
- source_word: δύναμιν πολλήν
  chosen: a large force
  alternatives:
  - a great army
  - many troops
  lexicon: LSJ
  rationale: δύναμις here refers to military force rather than abstract power. 'A
    large force' is natural English and suitably broad.
- source_word: ἐπορεύθη εἰς Ἄζωτον
  chosen: went to Azotus
  alternatives:
  - marched to Azotus
  lexicon: LSJ
  rationale: The verb is the common 'went/proceeded.' 'Went to Azotus' keeps the wording
    close to the Greek without over-specifying the manner.
- source_word: ὡς διοδεύων
  chosen: as though passing through
  alternatives:
  - as if merely passing by
  - as one passing through
  lexicon: LSJ
  rationale: The participle suggests the appearance of simply passing through rather
    than openly preparing an attack. 'As though passing through' preserves the feigned
    or incidental sense.
- source_word: ἅμα προσῆγεν εἰς τὸ πεδίον
  chosen: at the same time advanced into the plain
  alternatives:
  - meanwhile brought his forces into the plain
  - simultaneously moved toward the plain
  lexicon: LSJ
  rationale: ἅμα marks simultaneity, and προσάγω in military context can mean bring
    forward/advance. 'Advanced into the plain' captures the tactical movement succinctly.
- source_word: διὰ τὸ ἔχειν αὐτὸν πλῆθος ἵππου
  chosen: because he had a multitude of cavalry
  alternatives:
  - because he had many horsemen
  - because he had a mass of cavalry
  lexicon: LSJ
  rationale: The construction gives the reason for his maneuver. Again ἵππου is collective
    for cavalry. 'Multitude of cavalry' reflects the Greek πλῆθος while remaining
    readable.
- source_word: πεποιθέναι ἐπʼ αὐτήν
  chosen: trusted in it
  alternatives:
  - relied on it
  - was confident in it
  lexicon: LSJ
  rationale: The perfect infinitive expresses settled confidence. The feminine pronoun
    most naturally refers back to the collective cavalry force; 'trusted in it' preserves
    that reference.
