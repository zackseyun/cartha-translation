lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - set out
  - departed
  lexicon: LSJ
  rationale: Aorist of ἐξέρχομαι, literally 'went out.' In this travel context it
    denotes departure from Egypt. 'Went out' preserves the source wording while remaining
    natural enough in English.
- source_word: αὐτὸς καὶ Κλεοπάτρα ἡ θυγάτηρ αὐτοῦ
  chosen: he and Cleopatra his daughter
  alternatives:
  - he himself and Cleopatra his daughter
  - along with Cleopatra his daughter
  lexicon: LSJ
  rationale: The pronoun αὐτός here is naturally intensive or resumptive, identifying
    Ptolemy himself as traveling, together with his daughter. 'He and Cleopatra his
    daughter' captures the coordination without over-translating the emphasis.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  - went
  lexicon: LSJ
  rationale: ἔρχομαι commonly means 'come' or 'go' depending on viewpoint. Since the
    Greek says 'came into/to Ptolemais,' 'came' is the most direct rendering.
- source_word: εἰς Πτολεμαΐδα
  chosen: to Ptolemais
  alternatives:
  - into Ptolemais
  lexicon: LSJ
  rationale: With a city name, εἰς is idiomatically rendered 'to' in English travel
    narrative.
- source_word: ἔτους δευτέρου καὶ ἑξηκοστοῦ καὶ ἑκατοστοῦ
  chosen: in the one hundred sixty-second year
  alternatives:
  - in year one hundred and sixty-two
  - in the 162nd year
  lexicon: LSJ
  rationale: This is the Seleucid-era dating formula expressed additively in Greek.
    English normally compresses it to 'the one hundred sixty-second year.'
