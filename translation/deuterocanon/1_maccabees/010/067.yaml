translation:
  text: And in the one hundred sixty-fifth year, Demetrius the son of Demetrius came
    from Crete into the land of his fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'into the land of his fathers,' an idiom for his ancestral land.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἔτει πέμπτῳ καὶ ἑξηκοστῷ καὶ ἑκατοστῷ
  chosen: in the one hundred sixty-fifth year
  alternatives:
  - in year one hundred and sixty-five
  - in the hundred and sixty-fifth year
  lexicon: LSJ
  rationale: The Greek expresses the Seleucid-era date with additive numerals literally
    'in year fifth and sixtieth and hundredth.' Smooth English idiom renders this
    as 'in the one hundred sixty-fifth year' while preserving the chronological reference.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  - went
  lexicon: LSJ
  rationale: The common narrative verb is most naturally rendered 'came' here, matching
    the movement into a destination specified by εἰς. 'Arrived' is possible but slightly
    more interpretive; 'went' is less suitable from the narrator's perspective.
- source_word: Δημήτριος ὁ υἱὸς Δημητρίου
  chosen: Demetrius the son of Demetrius
  alternatives:
  - Demetrius son of Demetrius
  rationale: Personal names are transliterated. The article-plus-apposition is represented
    straightforwardly in English genealogy style.
- source_word: ἐκ Κρήτης
  chosen: from Crete
  alternatives:
  - out of Crete
  lexicon: LSJ
  rationale: ἐκ marks source/origin; 'from Crete' is the natural English rendering.
- source_word: εἰς τὴν γῆν τῶν πατέρων αὐτοῦ
  chosen: into the land of his fathers
  alternatives:
  - to the land of his fathers
  - into his ancestral land
  lexicon: LSJ
  rationale: γῆ can mean 'land' or 'country'; 'land' preserves the broad territorial
    sense. The plural 'of his fathers' reflects the Greek and keeps the ancestral
    nuance without over-paraphrasing to 'homeland.' 'Into' follows εἰς more closely
    than 'to.'
