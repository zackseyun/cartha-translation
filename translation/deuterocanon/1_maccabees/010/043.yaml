translation:
  text: And as for any who flee to the sanctuary in Jerusalem and in all its borders,
    owing royal taxes or any other obligation, let them be released, along with everything
    that belongs to them in my kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take refuge in the temple in Jerusalem and throughout its territory.'
      The Greek terms can be understood more broadly of the temple precincts or associated
      territory.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'owing royal dues and every matter.' The phrase may include taxes,
      debts, or other legal claims.
    reason: alternative_reading
lexical_decisions:
- source_word: φύγωσιν
  chosen: flee
  alternatives:
  - take refuge
  - escape
  lexicon: LSJ
  rationale: The aorist subjunctive of φεύγω denotes flight. In context of seeking
    asylum at the temple, 'flee' preserves the movement implied by the Greek better
    than the more interpretive 'take refuge,' though the asylum nuance is clear from
    the destination.
- source_word: ἱερὸν
  chosen: sanctuary
  alternatives:
  - temple
  - holy place
  lexicon: LSJ
  rationale: ἱερόν can mean the temple precincts broadly. 'Sanctuary' fits the asylum
    context and avoids implying only the building proper, while still conveying sacred
    space.
- source_word: ὁρίοις
  chosen: borders
  alternatives:
  - territory
  - districts
  - limits
  lexicon: LSJ
  rationale: ὅρια refers to boundaries or territories. 'Borders' is a natural rendering
    here for the areas attached to Jerusalem/the sanctuary's jurisdiction, while remaining
    close to the Greek.
- source_word: ὀφείλων
  chosen: owing
  alternatives:
  - being indebted for
  - being liable for
  lexicon: LSJ
  rationale: The participle marks those under obligation. 'Owing' is concise and works
    with both the following royal taxes and broader obligations.
- source_word: βασιλικὰ
  chosen: royal taxes
  alternatives:
  - royal dues
  - what is owed to the king
  lexicon: LSJ
  rationale: In this fiscal context, βασιλικά refers to obligations belonging to the
    crown. 'Royal taxes' makes the sense explicit in idiomatic English.
- source_word: πᾶν πρᾶγμα
  chosen: any other debt
  alternatives:
  - any matter
  - any claim
  - any obligation
  lexicon: LSJ
  rationale: Though literally 'every matter,' in coordination with ὀφείλων and βασιλικά
    the phrase refers to any other financial or legal claim. 'Any other debt' captures
    the practical force without overgeneralizing to every conceivable issue.
- source_word: ἀπολελύσθωσαν
  chosen: let them be released
  alternatives:
  - let them be exempted
  - let them be acquitted
  lexicon: LSJ
  rationale: The perfect passive imperative of ἀπολύω conveys being set free or released
    from obligation. 'Let them be released' preserves the formal decree style and
    fits remission of liabilities.
- source_word: πάντα ὅσα ἐστὶν αὐτοῖς
  chosen: everything that belongs to them
  alternatives:
  - all that is theirs
  - all their property
  lexicon: LSJ
  rationale: The phrase is broad and naturally includes possessions. 'Everything that
    belongs to them' is clear modern English and avoids narrowing the scope too quickly,
    though property is likely in view.
- source_word: ἐν τῇ βασιλείᾳ μου
  chosen: in my kingdom
  alternatives:
  - within my realm
  lexicon: LSJ
  rationale: A straightforward rendering of the king's territorial domain; 'kingdom'
    is the standard and most transparent choice.
