theological_decisions:
- issue: Scope of asylum/remission connected to the Jerusalem sanctuary
  chosen_reading: The decree grants release from royal taxes and other claims to those
    who flee to the sanctuary in Jerusalem and its associated borders.
  alternative_readings:
  - The decree grants only tax exemption, with 'any matter' left more general and
    not necessarily financial.
  - The phrase 'in all its borders' could modify Jerusalem more broadly rather than
    the sanctuary's jurisdiction.
  rationale: The syntax links flight to the sanctuary with release from obligations.
    Because ὀφείλων governs both βασιλικὰ and πᾶν πρᾶγμα, the verse most naturally
    concerns remission of liabilities for asylum-seekers. The exact administrative
    scope of 'its borders' is somewhat ambiguous, so the translation keeps the wording
    broad rather than specifying temple precincts or city districts too narrowly.
