theological_decisions:
- issue: Relationship between 'holy' and 'ἀφιεμένη'
  chosen_reading: 'Render both terms distinctly: ''holy and set apart'''
  alternative_readings:
  - holy and dedicated
  - sacred and consecrated
  rationale: The Greek uses two coordinated descriptors, so the translation should
    preserve the rhetorical fullness rather than reduce them to a single English concept.
    This is not a major doctrinal dispute, but it affects how the sanctity and legal
    dedication of Jerusalem are heard.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Scope of the exempted/privileged area in 'τὰ ὅρια αὐτῆς'
  chosen_reading: '''its surrounding territory'''
  alternative_readings:
  - its borders
  - its boundaries
  rationale: The context is administrative and fiscal, so the phrase likely extends
    the status of Jerusalem to the lands attached to it. 'Borders' in English could
    misleadingly suggest only boundary lines rather than the area governed with the
    city.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
