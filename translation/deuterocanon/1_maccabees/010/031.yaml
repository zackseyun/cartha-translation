translation:
  text: And let Jerusalem be holy and set apart, along with its surrounding territory,
    its tithes, and its taxes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dedicated' or 'consecrated' for 'set apart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'its borders'/'its boundaries'; the Greek may refer either to boundary
      lines or to the territory attached to Jerusalem.
    reason: lexical_alternative
  - marker: c
    text: Or 'its tolls' or 'its customs duties' for 'its taxes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤτω
  chosen: let ... be
  alternatives:
  - shall be
  - must be
  lexicon: LSJ
  rationale: Third-person imperative of εἰμί; in this royal decree context, English
    'let ... be' preserves the jussive/decretal force without sounding overly wooden.
- source_word: ἁγία
  chosen: holy
  alternatives:
  - sacred
  lexicon: LSJ
  rationale: Standard rendering of ἅγιος. 'Holy' best preserves the cultic and religious
    force attached to Jerusalem in this context.
- source_word: ἀφιεμένη
  chosen: set apart
  alternatives:
  - dedicated
  - consecrated
  lexicon: LSJ
  rationale: Perfect/passive participial idea from ἀφίημι/ἀφιέρω-related usage in
    dedicatory contexts is best captured here as 'set apart.' 'Dedicated' and 'consecrated'
    are possible, but 'set apart' is clear modern English and complements 'holy' without
    collapsing the two terms into one idea.
- source_word: τὰ ὅρια αὐτῆς
  chosen: its surrounding territory
  alternatives:
  - its borders
  - its boundaries
  - its districts
  lexicon: LSJ
  rationale: ὅρια can mean borders/boundaries or the territory within them. In a fiscal-administrative
    sentence that continues with tithes and taxes, the sense likely includes the lands
    attached to Jerusalem, not merely abstract boundary lines; hence 'surrounding
    territory.'
- source_word: αἱ δεκάται
  chosen: its tithes
  alternatives:
  - the tithes
  lexicon: LSJ
  rationale: The article with the following possessive context naturally refers to
    revenues associated with Jerusalem and its territory. Rendering with 'its' makes
    the English relation explicit.
- source_word: τὰ τέλη
  chosen: its taxes
  alternatives:
  - its tolls
  - its customs duties
  - its revenues
  lexicon: LSJ
  rationale: τέλη commonly denotes taxes, dues, tolls, or customs. In this decree
    context, 'taxes' is the broadest natural English term, while a footnote preserves
    the more specific alternatives 'tolls' and 'customs duties.'
