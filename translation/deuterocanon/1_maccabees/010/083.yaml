translation:
  text: And the cavalry was scattered in the plain, and they fled to Azotus and entered
    Beth-dagon, their idol temple, to save themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'entered Beth-dagon, their idol.' The Greek apposition
      is compressed; the sense is that they entered the sanctuary associated with
      their idol.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ ἵππος
  chosen: the cavalry
  alternatives:
  - the horsemen
  - the horse
  lexicon: LSJ
  rationale: Although ἵππος is singular in form here, in military context it functions
    collectively for mounted troops. Rendering it as 'the cavalry' best reflects the
    sense in context and avoids the misleading singular 'horse.'
- source_word: ἐσκορπίσθη
  chosen: was scattered
  alternatives:
  - was dispersed
  lexicon: LSJ
  rationale: The passive indicates the mounted force was broken up across the battlefield.
    'Was scattered' is a natural and sufficiently formal rendering.
- source_word: ἐν τῷ πεδίῳ
  chosen: in the plain
  alternatives:
  - in the field
  - on the plain
  lexicon: LSJ
  rationale: πεδίον commonly denotes a plain or open level area. 'In the plain' fits
    the military-geographical setting better than the more generic 'field.'
- source_word: ἔφυγον εἰς Ἄζωτον
  chosen: they fled to Azotus
  alternatives:
  - they fled into Azotus
  - they fled to Ashdod
  lexicon: LSJ
  rationale: The subject shifts naturally from the scattered cavalry to the fleeing
    forces. 'Azotus' preserves the Greek place-name form used in the source text;
    'Ashdod' would reflect the Hebrew form rather than the immediate Greek witness.
- source_word: Βηθδαγὼν
  chosen: Beth-dagon
  alternatives:
  - the house of Dagon
  - Bethdagon
  lexicon: LSJ
  rationale: As a place-name, it is best transliterated. Because the following apposition
    explains its function, a simple transliteration is preferable in the main text.
- source_word: τὸ εἴδωλον αὐτῶν
  chosen: their idol temple
  alternatives:
  - their idol
  - the temple of their idol
  - their shrine
  lexicon: LSJ
  rationale: Literally the phrase is 'their idol,' but in context people enter Beth-dagon
    as a sanctuary. The apposition identifies Beth-dagon with the cultic site associated
    with their idol. 'Their idol temple' makes the sense explicit in idiomatic English
    without losing the polemical force of εἴδωλον.
- source_word: τοῦ σωθῆναι
  chosen: to save themselves
  alternatives:
  - to be saved
  - for safety
  lexicon: LSJ
  rationale: 'The articular infinitive expresses purpose. ''To save themselves'' captures
    the reflexive practical sense in context: they entered seeking deliverance or
    protection.'
