theological_decisions:
- issue: Rendering of εἴδωλον in a Philistine cultic context
  chosen_reading: idol temple
  alternative_readings:
  - idol
  - temple of their idol
  - shrine
  rationale: The Greek uses the pejorative εἴδωλον rather than a neutral term for
    deity or temple. The translation preserves that negative valuation while still
    making clear that Beth-dagon is a cultic refuge people can enter.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
