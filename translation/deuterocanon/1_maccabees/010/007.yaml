translation:
  text: And Jonathan came to Jerusalem, and read the letters in the hearing of all
    the people and those in the citadel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'those in the Acra,' the fortified stronghold in
      Jerusalem.
