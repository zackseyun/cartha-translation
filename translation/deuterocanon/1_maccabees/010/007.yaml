lexical_decisions:
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: LSJ
  rationale: Aorist of ἔρχομαι here is most naturally rendered 'came' in straightforward
    narrative. 'Arrived' is possible but slightly more interpretive; 'went' would
    shift the deictic perspective without warrant.
- source_word: ἀνέγνω
  chosen: read
  alternatives:
  - read aloud
  - publicly read
  lexicon: LSJ
  rationale: The verb ἀναγινώσκω means 'read'; the following phrase 'into the ears/in
    the hearing of' already conveys the public oral setting, so 'read' is sufficient
    in the main text without overtranslating.
- source_word: τὰς ἐπιστολὰς
  chosen: the letters
  alternatives:
  - the documents
  - the messages
  lexicon: LSJ
  rationale: ἐπιστολή ordinarily means 'letter' or 'written message.' Since the immediate
    context concerns written communications, 'letters' is the most direct rendering.
- source_word: εἰς τὰ ὦτα
  chosen: in the hearing of
  alternatives:
  - into the ears of
  - before
  lexicon: LSJ
  rationale: The idiom εἰς τὰ ὦτα means something heard by an audience. 'In the hearing
    of' preserves the public-recitation sense in natural English better than the overly
    literal 'into the ears of.'
- source_word: παντὸς τοῦ λαοῦ
  chosen: all the people
  alternatives:
  - the whole people
  - all the populace
  lexicon: LSJ
  rationale: A natural rendering of the genitive phrase after the hearing idiom. 'All
    the people' is idiomatic and preserves the collective scope.
- source_word: τῶν ἐκ τῆς ἄκρας
  chosen: those from the citadel
  alternatives:
  - those of the citadel
  - those in the Acra
  lexicon: LSJ
  rationale: ἄκρα can denote a citadel/fortress, and in 1 Maccabees often refers specifically
    to the Seleucid stronghold in Jerusalem known as the Acra. To keep the text readable
    while preserving sense from the Greek alone, 'those from the citadel' is used
    in the main text; the more technical proper-name-like 'Acra' is preserved in a
    footnote.
