translation:
  text: He was grieved and said, “What is this that we have done, that Alexander has
    gotten ahead of us in securing friendship with the Jews as a support?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in gaining the friendship of the Jews for support.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλυπήθη
  chosen: He was grieved
  alternatives:
  - He was distressed
  - He was upset
  lexicon: BDAG
  rationale: Aorist passive of λυπέω here conveys emotional pain or vexation. 'Was
    grieved' preserves the seriousness without overstating it.
- source_word: Τί τοῦτο ἐποιήσαμεν
  chosen: What is this that we have done
  alternatives:
  - What have we done
  - Why have we done this
  lexicon: BDAG
  rationale: The idiom is retained fairly closely to preserve the rhetorical self-reproach.
    A smoother English alternative would be possible, but this keeps the Greek emphasis
    on 'this'.
- source_word: προέφθακεν ἡμᾶς
  chosen: has gotten ahead of us
  alternatives:
  - has anticipated us
  - has outstripped us
  - has forestalled us
  lexicon: BDAG
  rationale: προφθάνω means to come before, precede, or get ahead of. 'Has gotten
    ahead of us' is idiomatic modern English and fits the political context.
- source_word: φιλίαν
  chosen: friendship
  alternatives:
  - alliance
  - friendly relations
  lexicon: LSJ
  rationale: The noun denotes friendship or friendly relations. In this diplomatic
    setting it implies political alliance, but 'friendship' is the direct lexical
    sense and lets the context carry the diplomatic force.
- source_word: καταλαβέσθαι
  chosen: in securing
  alternatives:
  - to obtain
  - to win
  - to gain
  lexicon: BDAG
  rationale: The middle infinitive here expresses obtaining or winning for oneself.
    'Securing' fits the diplomatic nuance with φιλίαν and reads naturally after 'has
    gotten ahead of us'.
- source_word: τοῖς Ἰουδαίοις
  chosen: with the Jews
  alternatives:
  - from the Jews
  lexicon: BDAG
  rationale: 'With φιλίαν and καταλαβέσθαι in this context, the dative is best understood
    relationally: friendship with the Jews, not merely from them.'
- source_word: εἰς στήριγμα
  chosen: as a support
  alternatives:
  - for support
  - as backing
  - as a stronghold
  lexicon: LSJ
  rationale: στήριγμα denotes support, prop, or means of strengthening. Here it likely
    refers to political backing. 'As a support' preserves the metaphor while remaining
    understandable.
