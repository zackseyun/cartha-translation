translation:
  text: and for the walls of Jerusalem to be rebuilt and fortified all around, the
    expense will be paid from the king’s account, and also for the rebuilding of the
    walls in Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'the expense will be provided by the king’s decree/order.'
      The Greek phrase 'from the king’s λόγος' can carry either an administrative-accounting
      sense or an official-authority sense; the main text adopts the financial nuance
      because it best fits 'the expense will be paid.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκοδομηθῆναι
  chosen: to be rebuilt
  alternatives:
  - to be built
  - to be constructed
  lexicon: LSJ
  rationale: The infinitive denotes building activity; with τὰ τείχη as its object
    in a context of restoring defenses, 'to be rebuilt' best conveys the likely sense
    in natural English without overparaphrasing.
- source_word: τείχη
  chosen: walls
  alternatives:
  - fortifications
  - city walls
  lexicon: LSJ
  rationale: The standard sense is 'walls,' especially city walls. 'Fortifications'
    would be broader than the Greek, while 'city walls' is interpretive; 'walls' is
    sufficiently clear in context.
- source_word: ὀχυρῶσαι
  chosen: fortified
  alternatives:
  - made strong
  - strengthened
  lexicon: LSJ
  rationale: The verb means to make secure/fortify. 'Fortified' is concise and idiomatic
    for defensive works.
- source_word: κυκλόθεν
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: LSJ
  rationale: This adverb indicates surrounding extent. 'All around' is clear modern
    English and preserves the spatial force.
- source_word: δαπάνη
  chosen: expense
  alternatives:
  - cost
  - expenditure
  lexicon: LSJ
  rationale: The noun refers to the financial outlay. 'Expense' fits the administrative
    context and reads naturally with 'will be paid.'
- source_word: δοθήσεται
  chosen: will be paid
  alternatives:
  - will be given
  - will be provided
  lexicon: LSJ
  rationale: Literally 'will be given,' but in context of funding construction costs,
    'will be paid' expresses the intended financial sense more idiomatically.
- source_word: ἐκ τοῦ λόγου τοῦ βασιλέως
  chosen: from the king’s account
  alternatives:
  - by order of the king
  - from the king’s treasury
  - from the king’s word
  lexicon: LSJ
  rationale: Literally the phrase includes 'word/account' of the king. In administrative-financial
    context with δαπάνη, λόγος likely carries an accounting or official-authority
    sense. 'From the king’s account' best matches the funding statement. 'By order
    of the king' misses the financial source, while 'treasury' is not the word used.
- source_word: Ἰουδαίᾳ
  chosen: Judea
  alternatives:
  - the Judean region
  - Judah
  lexicon: LSJ
  rationale: In Hellenistic Greek this place name normally refers to Judea. 'Judah'
    would suggest the older tribal/kingdom designation and is less fitting here.
