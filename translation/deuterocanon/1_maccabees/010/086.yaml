translation:
  text: And Jonathan departed from there and encamped at Ashkelon, and the people
    of the city came out to meet him with great honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with great splendor' or 'with great glory'; the Greek expression emphasizes
      the magnificence of the city's reception of Jonathan.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  chosen: departed
  alternatives:
  - set out
  - went away
  - moved on
  lexicon: LSJ
  rationale: Aorist of ἀπαίρω in context marks leaving the previous location. 'Departed'
    is natural modern English and preserves the movement sense without over-specifying
    manner.
- source_word: παρενέβαλεν
  chosen: encamped
  alternatives:
  - camped
  - pitched camp
  - made camp
  lexicon: LSJ
  rationale: The verb commonly denotes making camp or encamping, especially in military/travel
    contexts. 'Encamped' preserves the slightly formal narrative register and likely
    military nuance.
- source_word: Ἀσκάλωνα
  chosen: Ashkelon
  alternatives:
  - Ascalon
  lexicon: LSJ
  rationale: Standard English transliteration of the place name is 'Ashkelon.' This
    follows the project's practice of transliterating names by standard conventions.
- source_word: ἐξῆλθον
  chosen: came out
  alternatives:
  - went out
  lexicon: LSJ
  rationale: Although literally 'went out,' English idiom with 'to meet him' is smoother
    as 'came out to meet him' while preserving the directional sense from the city.
- source_word: οἱ ἐκ τῆς πόλεως
  chosen: the people of the city
  alternatives:
  - those from the city
  - the men of the city
  - the city's inhabitants
  lexicon: LSJ
  rationale: The phrase is broader than explicitly male 'men' and naturally refers
    to the city's people or inhabitants. 'The people of the city' is accurate and
    readable.
- source_word: εἰς συνάντησιν αὐτῷ
  chosen: to meet him
  alternatives:
  - for a meeting with him
  - to greet him
  lexicon: LSJ
  rationale: This idiom regularly means going out to meet someone. 'To meet him' is
    the clearest direct rendering.
- source_word: ἐν δόξῃ μεγάλῃ
  chosen: with great honor
  alternatives:
  - in great splendor
  - with great pomp
  - with great glory
  lexicon: LSJ
  rationale: δόξα can mean glory, splendor, or honor. Here the city's public reception
    of Jonathan is in view, so 'with great honor' best conveys an honoring reception
    in idiomatic English without implying divine glory.
