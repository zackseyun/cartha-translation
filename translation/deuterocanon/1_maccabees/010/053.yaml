translation:
  text: And I joined battle with him, and he and his camp were crushed by us, and
    we sat on the throne of his kingdom;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'he and his camp was crushed by us'; the English uses plural
      agreement for natural sense with the compound subject.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆψα ... μάχην
  chosen: joined battle
  alternatives:
  - engaged in battle
  - fought
  lexicon: LSJ
  rationale: The idiom συνάπτω μάχην means to enter into or join battle. 'Joined battle'
    preserves the military idiom more closely than the flatter 'fought' while remaining
    natural English.
- source_word: συνετρίβη
  chosen: were crushed
  alternatives:
  - was crushed
  - were defeated
  - were shattered
  lexicon: LSJ
  rationale: The singular verb is followed by the compound subject 'he and his camp.'
    English idiom prefers a plural predicate here. 'Crushed' reflects the force of
    συντρίβω more strongly than the weaker 'defeated.'
- source_word: ἡ παρεμβολὴ αὐτοῦ
  chosen: his camp
  alternatives:
  - his army
  - his encampment
  lexicon: LSJ
  rationale: παρεμβολή in military context denotes a camp or army in camp. 'Camp'
    is the most direct rendering and fits the paired reference to the leader and his
    forces.
- source_word: ὑφʼ ἡμῶν
  chosen: by us
  alternatives:
  - at our hands
  - by our forces
  lexicon: LSJ
  rationale: A straightforward agentive phrase is sufficient. 'By us' keeps the first-person
    royal/plural voice of the speaker without expansion.
- source_word: ἐκαθίσαμεν
  chosen: we sat
  alternatives:
  - we took our seat
  - we were seated
  lexicon: LSJ
  rationale: The verb is literally 'we sat.' In context it refers to enthronement,
    but the following phrase 'on the throne of his kingdom' already makes that clear,
    so the simple verb is retained.
- source_word: ἐπὶ θρόνου βασιλείας αὐτοῦ
  chosen: on the throne of his kingdom
  alternatives:
  - on the royal throne of his kingdom
  - on his kingdom's throne
  lexicon: LSJ
  rationale: This preserves both θρόνος and βασιλεία without overinterpreting. 'His
    kingdom' naturally refers to the kingdom formerly ruled by the defeated opponent.
