translation:
  text: We rejoiced. And now continue still to keep faith with us,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'continue still to maintain faithfulness toward us,' or more idiomatically,
      'continue still in loyalty to us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐχάρημεν
  chosen: We rejoiced
  alternatives:
  - We were glad
  - We were pleased
  lexicon: LSJ
  rationale: Aorist passive/deponent of χαίρω, here functioning intransitively. 'We
    rejoiced' preserves the simple past force and the formal tone of the royal correspondence
    better than the flatter 'we were glad.'
- source_word: καὶ νῦν
  chosen: And now
  alternatives:
  - So now
  - Now then
  lexicon: LSJ
  rationale: A straightforward connective plus temporal adverb. 'And now' preserves
    the letter-like progression from prior statement to present exhortation.
- source_word: ἐμείνατε
  chosen: continue
  alternatives:
  - remain
  - persist
  lexicon: LSJ
  rationale: Imperative sense from μένω. In English, 'continue' best conveys the exhortational
    force with the following infinitive phrase; 'remain' would sound incomplete or
    overly literal here.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  - further
  lexicon: LSJ
  rationale: Adds the nuance of ongoing continuance. 'Still' is idiomatic modern English
    and fits the appeal to maintain an existing relationship.
- source_word: τοῦ συντηρῆσαι
  chosen: to keep
  alternatives:
  - to preserve
  - to maintain
  lexicon: LSJ
  rationale: Articular infinitive of συντηρέω expressing the content/purpose of the
    command. 'Keep' is concise and natural with 'faith' in English, while still reflecting
    the idea of preserving or maintaining.
- source_word: πρὸς ἡμᾶς
  chosen: with us
  alternatives:
  - toward us
  - for us
  lexicon: LSJ
  rationale: With πίστιν in a relational-political context, πρὸς ἡμᾶς indicates orientation
    of loyalty toward the speaker's side. 'With us' is the most idiomatic English
    expression for maintaining fidelity in alliance.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - loyalty
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith' in the main text unless
    context strongly requires otherwise. In this diplomatic-political context the
    sense is closer to 'faithfulness' or 'loyalty,' so those alternatives are preserved
    in a footnote for transparency.
