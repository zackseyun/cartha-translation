translation:
  text: And every Jewish person who has been taken captive from the land of Judah
    into any part of my kingdom I release as free, without payment; and let all also
    remit the taxes on their livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'let all remit the taxes and those on their livestock.' The Greek can
      be read as referring either specifically to taxes assessed on livestock or more
      broadly to taxes and related dues connected with property.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσαν ψυχὴν Ἰουδαίων
  chosen: every Jewish person
  alternatives:
  - every soul of the Jews
  - every Jew
  lexicon: LSJ
  rationale: ψυχή in administrative or census-like contexts can denote a person/life
    rather than the inner soul. 'Every Jewish person' is natural English and preserves
    the distributive force of πᾶσαν.
- source_word: τὴν αἰχμαλωτισθεῖσαν
  chosen: who has been taken captive
  alternatives:
  - who has been captured
  - who has been led away captive
  lexicon: LSJ
  rationale: The participle denotes being made captive. The perfect-like English 'has
    been taken captive' fits the state resulting from prior capture.
- source_word: ἀπὸ γῆς Ἰούδα
  chosen: from the land of Judah
  alternatives:
  - out of the land of Judah
  - from Judea
  lexicon: LSJ
  rationale: γῆ here is 'land,' and retaining 'Judah' reflects the Greek wording more
    closely than the more interpretive 'Judea.'
- source_word: εἰς πᾶσαν βασιλείαν μου
  chosen: into any part of my kingdom
  alternatives:
  - into all my kingdom
  - throughout my whole kingdom
  - into my entire kingdom
  lexicon: LSJ
  rationale: The phrase is idiomatic for dispersion anywhere within the king's realm,
    not movement into the abstract institution of kingship. 'Any part of my kingdom'
    conveys distributive scope in clear English.
- source_word: ἀφίημι ἐλευθέραν δωρεάν
  chosen: I release as free, without payment
  alternatives:
  - I set free gratis
  - I let go free of charge
  - I grant freedom freely
  lexicon: LSJ
  rationale: ἀφίημι with ἐλευθέραν expresses manumission/release; δωρεάν adds the
    sense 'gratis, without payment.' The wording makes explicit that no ransom or
    fee is required.
- source_word: πάντες ἀφιέτωσαν
  chosen: let all also remit
  alternatives:
  - let everyone release
  - let all forgive
  - let all exempt
  lexicon: LSJ
  rationale: The imperative calls for others under royal authority to waive or release
    obligations. 'Remit' fits fiscal context better than the more general 'forgive'
    or 'release.'
- source_word: τοὺς φόρους
  chosen: the taxes
  alternatives:
  - the tribute
  - the levies
  lexicon: LSJ
  rationale: φόροι are taxes/tribute payments. 'Taxes' is the clearest modern equivalent
    in this administrative decree.
- source_word: κτηνῶν αὐτῶν
  chosen: on their livestock
  alternatives:
  - of their cattle
  - on their beasts
  lexicon: LSJ
  rationale: κτῆνος commonly denotes livestock or beasts of burden. In connection
    with φόροι, the sense is taxes assessed on their animals/property. 'Livestock'
    is the most natural modern rendering.
