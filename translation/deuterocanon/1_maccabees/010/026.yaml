translation:
  text: Since you have kept faith with us in the treaties, and have remained in our
    friendship and have not joined our enemies, we have heard, and
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kept faithfulness/loyalty toward us in the treaties.' The Greek πίστις
      in this diplomatic setting can carry the sense of fidelity or loyalty.
    reason: lexical_alternative
  - marker: b
    text: The Greek text as transmitted here ends with 'we have heard, and,' continuing
      into the next verse; the sentence is incomplete at this verse boundary.
    reason: textual_variant
lexical_decisions:
- source_word: ἐπεὶ
  chosen: Since
  alternatives:
  - because
  - inasmuch as
  lexicon: LSJ
  rationale: Introduces the stated grounds for what follows. 'Since' fits the causal
    sense naturally in English.
- source_word: συνετηρήσατε
  chosen: you have kept
  alternatives:
  - you have maintained
  - you have observed
  lexicon: LSJ
  rationale: The compound verb conveys preserving or maintaining something. 'Kept'
    is concise and idiomatic with 'faith' in English.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - loyalty
  lexicon: LSJ
  rationale: Although in this diplomatic-political context the sense is close to 'faithfulness'
    or 'loyalty,' the project's default for πίστις is 'faith' unless context requires
    otherwise. Here 'kept faith with us' is a natural English idiom that preserves
    both semantic range and consistency.
- source_word: πρὸς ἡμᾶς
  chosen: with us
  alternatives:
  - toward us
  - to us
  lexicon: LSJ
  rationale: With πίστιν, English idiom prefers 'kept faith with us' rather than a
    more wooden prepositional rendering.
- source_word: συνθήκας
  chosen: in the treaties
  alternatives:
  - in the agreements
  - in the covenants
  lexicon: LSJ
  rationale: The noun refers to formal political agreements. 'Treaties' best matches
    the interstate context of 1 Maccabees.
- source_word: ἐνεμείνατε
  chosen: have remained
  alternatives:
  - have continued
  - have persisted
  lexicon: LSJ
  rationale: The verb denotes continuing steadfastly in a relationship. 'Have remained'
    is clear and preserves the relational nuance.
- source_word: τῇ φιλία ἡμῶν
  chosen: in our friendship
  alternatives:
  - in friendship with us
  - in our alliance
  lexicon: LSJ
  rationale: φιλία can denote friendship and, in political contexts, alliance. 'In
    our friendship' stays close to the Greek while still allowing the diplomatic undertone
    to be heard.
- source_word: οὐ προσεχωρήσατε
  chosen: have not joined
  alternatives:
  - have not gone over to
  - have not sided with
  lexicon: LSJ
  rationale: The verb suggests attaching oneself to another side or defecting. 'Have
    not joined' is straightforward and fits the military-political setting.
- source_word: τοῖς ἐχθροῖς ἡμῶν
  chosen: our enemies
  alternatives:
  - the ones hostile to us
  lexicon: LSJ
  rationale: Direct and natural rendering of the dative object after the verb of joining.
- source_word: ἠκούσαμεν
  chosen: we have heard
  alternatives:
  - we heard
  - we have learned
  lexicon: LSJ
  rationale: The aorist can be rendered simply as past, but 'we have heard' works
    well in the epistolary context and preserves the connection to the present response.
