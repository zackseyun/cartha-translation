lexical_decisions:
- source_word: ἐφοβήθησαν φόβον μέγαν
  chosen: they were greatly afraid
  alternatives:
  - they feared a great fear
  - they were seized with great fear
  lexicon: BDAG
  rationale: The Greek uses a cognate accusative with φοβέομαι for emphasis, literally
    'they feared a great fear.' In natural English, 'they were greatly afraid' preserves
    the intensity without wooden repetition.
- source_word: ὅτε ἤκουσαν
  chosen: when they heard
  alternatives:
  - after they heard
  - upon hearing
  lexicon: BDAG
  rationale: A straightforward temporal clause; 'when they heard' best reflects the
    Greek sequence and keeps the narrative flow.
- source_word: ἔδωκεν αὐτοῖς
  chosen: had given them
  alternatives:
  - gave them
  lexicon: BDAG
  rationale: English past perfect fits the reported-content construction after 'heard,'
    clarifying that the grant of authority was the content of the report already received.
- source_word: ὁ βασιλεὺς
  chosen: the king
  lexicon: BDAG
  rationale: Standard rendering of βασιλεύς in this historical narrative context.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG
  rationale: ἐξουσία denotes delegated authorization or official right. 'Authority'
    best captures the king's grant of legal permission in context.
- source_word: συναγαγεῖν δυνάμεις
  chosen: to gather forces
  alternatives:
  - to assemble troops
  - to muster an army
  lexicon: BDAG
  rationale: The infinitive συναγαγεῖν means 'to gather/assemble,' and δυνάμεις in
    military context refers to forces or troops. 'Gather forces' stays close to the
    Greek while remaining idiomatic; 'assemble troops' is possible but slightly more
    interpretive.
