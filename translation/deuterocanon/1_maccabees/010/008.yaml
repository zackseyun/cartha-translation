translation:
  text: And they were greatly afraid when they heard that the king had given them
    authority to gather forces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'they feared a great fear,' a Greek idiom expressing intense
      fear.
