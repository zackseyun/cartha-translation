translation:
  text: After I returned to my kingdom and sat on the throne of my fathers, and took
    control of the rule, and crushed Demetrius and gained control of our land,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my ancestors' throne.' The Greek literally says 'the throne of my fathers,'
      a dynastic expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπεὶ
  chosen: After
  alternatives:
  - Since
  - When
  lexicon: LSJ
  rationale: In this royal letter context, Ἐπεὶ introduces the prior circumstances
    on which the following action is based. 'After' gives a clear temporal sense in
    idiomatic English while preserving the causal backdrop better than a more wooden
    'since'.
- source_word: ἀνέστρεψα
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: LSJ
  rationale: With εἰς τὴν βασιλείαν μου, the verb denotes returning to one's realm.
    'Returned' is natural English and fits the political-restoration context.
- source_word: βασιλείαν
  chosen: kingdom
  alternatives:
  - kingship
  - realm
  lexicon: LSJ
  rationale: Here the noun refers to the territorial-political domain rather than
    merely abstract royal authority. 'Kingdom' best matches that sense in context.
- source_word: ἐκάθισα ἐπὶ θρόνου πατέρων μου
  chosen: sat on the throne of my fathers
  alternatives:
  - took my seat on my fathers' throne
  - sat upon the throne of my ancestors
  lexicon: LSJ
  rationale: This is dynastic royal language. 'Fathers' preserves the literal ancestral
    idiom and the succession claim embedded in the phrase.
- source_word: ἐκράτησα τῆς ἀρχῆς
  chosen: took hold of the rule
  alternatives:
  - seized power
  - took control of the government
  - assumed authority
  lexicon: LSJ
  rationale: κρατέω with the genitive conveys obtaining or exercising mastery over
    authority. 'Took hold of the rule' preserves the force of grasping control without
    over-interpreting it as illegitimate seizure; 'rule' reflects ἀρχή as governing
    authority.
- source_word: συνέτριψα
  chosen: crushed
  alternatives:
  - shattered
  - defeated
  lexicon: LSJ
  rationale: The verb is forceful and martial. 'Crushed' preserves the emphatic tone
    better than the flatter 'defeated'.
- source_word: ἐπεκράτησα τῆς χώρας ἡμῶν
  chosen: gained control of our land
  alternatives:
  - prevailed over our country
  - became master of our territory
  lexicon: LSJ
  rationale: The verb again expresses mastery or dominance. 'Gained control of our
    land' communicates successful political-military control in clear modern English.
    'Land' is preferred over 'country' to avoid anachronistic nation-state overtones
    while still being readable.
