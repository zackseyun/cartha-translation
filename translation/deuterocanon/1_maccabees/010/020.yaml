translation:
  text: And now today we have appointed you high priest of your nation, and to be
    called the king’s Friend—and they sent him a purple robe and a crown of gold—and
    to take our side and maintain friendship with us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'friend of the king.' The Greek may reflect an official court title in
      Hellenistic usage.
    reason: lexical_alternative
  - marker: b
    text: The Greek text shifts here from first-person royal speech ('we have appointed')
      to third-person narration ('they sent him'), and the translation preserves that
      shift.
    reason: textual_variant
  - marker: c
    text: Literally 'think our things'; the idiom means to favor our interests or
      side with us.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθεστάκαμέν
  chosen: we have appointed
  alternatives:
  - we have established
  - we have set
  lexicon: LSJ
  rationale: Perfect form of καθίστημι in an official appointment context; 'appointed'
    best conveys formal installation into office in natural English.
- source_word: ἀρχιερέα
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: LSJ
  rationale: Standard rendering for the Jewish office; 'high priest' is the established
    and accurate title in this context.
- source_word: τοῦ ἔθνους σου
  chosen: of your nation
  alternatives:
  - of your people
  lexicon: LSJ
  rationale: ἔθνος here refers to the Jewish national body rather than merely an ethnic
    crowd; 'nation' preserves the political-corporate sense present in the royal decree.
- source_word: φίλον βασιλέως
  chosen: the king’s Friend
  alternatives:
  - friend of the king
  - royal friend
  lexicon: LSJ
  rationale: In Hellenistic court language this is likely an honorific title, not
    merely personal affection. Capitalizing 'Friend' signals titulary force while
    retaining transparency to the Greek.
- source_word: καλεῖσθαι
  chosen: be called
  alternatives:
  - be named
  lexicon: LSJ
  rationale: Infinitive dependent on the appointment formula; 'be called' is the most
    direct and idiomatic rendering.
- source_word: πορφύραν
  chosen: a purple robe
  alternatives:
  - purple
  - a purple garment
  lexicon: LSJ
  rationale: The noun can denote purple cloth or a purple garment; in a royal gift
    context, 'robe' makes the implied garment explicit in idiomatic English without
    over-paraphrasing.
- source_word: στέφανον χρυσοῦν
  chosen: a crown of gold
  alternatives:
  - a golden crown
  - a gold wreath
  lexicon: LSJ
  rationale: στέφανος can denote a wreath or crown; in this investiture setting 'crown'
    is the clearer English choice, while 'of gold' stays close to the Greek wording.
- source_word: φρονεῖν τὰ ἡμῶν
  chosen: take our side
  alternatives:
  - think our thoughts
  - be minded toward our interests
  - support our cause
  lexicon: LSJ
  rationale: The idiom means to be favorably disposed to someone's interests or party.
    'Take our side' communicates the political allegiance implied here more naturally
    than a wooden rendering.
- source_word: συντηρεῖν φιλίαν πρὸς ἡμᾶς
  chosen: maintain friendship with us
  alternatives:
  - preserve friendship with us
  - keep friendship toward us
  lexicon: LSJ
  rationale: The phrase expresses continuing diplomatic loyalty; 'maintain friendship
    with us' is both natural and faithful to the relational-political sense.
- source_word: ἀπέστειλαν αὐτῷ
  chosen: they sent him
  alternatives:
  - he sent him
  - we sent him
  lexicon: LSJ
  rationale: The transmitted text has third person plural, creating a shift from first
    person speech to narrative notice. This is best represented directly rather than
    harmonized away.
