theological_decisions:
- issue: Court title φίλον βασιλέως
  chosen_reading: rendered as the titulary-sounding 'the king’s Friend'
  alternative_readings:
  - friend of the king
  - royal friend
  rationale: This is primarily a historical-political rather than doctrinal issue,
    but the title carries official status in Hellenistic royal correspondence. The
    chosen rendering preserves that nuance without obscuring the Greek.
  doctrine_reference: Translation philosophy §1, §5
- issue: Person shift in ἀπέστειλαν αὐτῷ within the quoted decree
  chosen_reading: preserved the third-person narrative shift in the main text
  alternative_readings:
  - harmonize to 'and we sent him'
  - treat as indirect summary rather than direct quotation
  rationale: The Greek text as given shifts from first-person royal speech to third-person
    narration. Since the source confidence is high and no apparatus is provided here,
    the translation preserves the shift rather than smoothing it, allowing readers
    to see the source texture.
  doctrine_reference: Translation philosophy §1, §3
