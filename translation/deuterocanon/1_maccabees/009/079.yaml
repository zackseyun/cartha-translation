id: 1MA.9.79
reference: 1 Maccabees 9:79
source:
  edition: lxx-swete-1909
  text: κρυπτῶς κατόπισθεν αὐτῶν. καὶ ἔγνω Ἰωναθὰν ὅτι ἐστιν ἔνεδρον
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: secretly behind them. And Jonathan knew that it was an ambush
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek witness here is a sentence fragment: ''secretly behind them.
      And Jonathan knew that it was an ambush.'' The abrupt opening likely depends
      on the preceding context rather than preserving a complete standalone sentence
      in this verse.'
    reason: textual_variant
lexical_decisions:
- source_word: κρυπτῶς
  chosen: secretly
  alternatives:
  - in secret
  - stealthily
  lexicon: LSJ
  rationale: Adverb meaning covertly or in a hidden manner. 'Secretly' is natural
    modern English and preserves the clandestine sense.
- source_word: κατόπισθεν
  chosen: behind
  alternatives:
  - after
  - at the rear of
  lexicon: LSJ
  rationale: Spatial adverb/preposition meaning behind or in the rear. In this military
    context, 'behind' best fits the immediate sense.
- source_word: αὐτῶν
  chosen: them
  alternatives:
  - him
  lexicon: Greek grammar
  rationale: Genitive plural pronoun; the surviving clause points to a plural referent,
    so 'them' is required.
- source_word: ἔγνω
  chosen: knew
  alternatives:
  - recognized
  - found out
  lexicon: LSJ
  rationale: Aorist of γινώσκω. 'Knew' is the most direct rendering; 'recognized'
    or 'found out' are possible contextual expansions but less literal.
- source_word: ἔνεδρον
  chosen: an ambush
  alternatives:
  - an ambush party
  - a trap
  lexicon: LSJ
  rationale: Military term for an ambush or those lying in wait. 'An ambush' is concise
    and idiomatic in English, while still allowing the military sense.
