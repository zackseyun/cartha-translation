translation:
  text: And Jonathan and Simon his brother, and all those with him, learned of it,
    and they fled into the wilderness of Tekoa and encamped by the water of the cistern
    of Asphar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'found out.' The Greek simply says they came to know, with the object
      implied by the context.
    reason: lexical_alternative
  - marker: b
    text: '''Cistern'' could also be rendered ''pit'' or ''well,'' but the phrase
      ''water of the cistern'' suggests a water source or reservoir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνω
  chosen: learned of it
  alternatives:
  - came to know
  - found out
  - knew
  lexicon: LSJ
  rationale: The aorist of γινώσκω here introduces the group's awareness of a threat
    or development and is best rendered as receiving information rather than simple
    stative 'knew.' 'Learned of it' captures the ingressive sense in natural English.
- source_word: ἔφυγον
  chosen: fled
  alternatives:
  - escaped
  - went away
  lexicon: LSJ
  rationale: The verb denotes flight in response to danger. 'Fled' preserves the urgency
    better than the weaker 'went away.'
- source_word: ἔρημον Θεκώε
  chosen: the wilderness of Tekoa
  alternatives:
  - the desert of Tekoa
  lexicon: LSJ
  rationale: ἔρημος in geographical narrative commonly refers to wilderness/desert
    country. 'Wilderness' is idiomatic biblical English and fits the Judean setting
    without over-specifying aridity.
- source_word: παρενέβαλον
  chosen: encamped
  alternatives:
  - camped
  - made camp
  lexicon: LSJ
  rationale: The military/narrative verb for setting up camp is well represented by
    'encamped,' which preserves the formal narrative tone.
- source_word: ἐπὶ τὸ ὕδωρ
  chosen: by the water
  alternatives:
  - at the water
  - upon the water
  lexicon: LSJ
  rationale: With encamping language, ἐπί plus accusative here is naturally locative
    in sense. 'By the water' is the clearest idiomatic English for the campsite's
    position.
- source_word: λάκκου
  chosen: cistern
  alternatives:
  - pit
  - well
  - reservoir
  lexicon: LSJ
  rationale: λάκκος can mean pit or cistern; with ὕδωρ, a water-holding installation
    is in view. 'Cistern' best fits the phrase and avoids the ambiguity of 'pit.'
- source_word: Ἀσφάρ
  chosen: Asphar
  alternatives:
  - Aphar
  rationale: This is a place name transliterated from the Greek witness. 'Asphar'
    follows the source form directly and respects the project's policy of transliterating
    names.
