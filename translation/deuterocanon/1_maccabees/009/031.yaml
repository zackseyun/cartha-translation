translation:
  text: And Jonathan took up the leadership at that time, and arose in place of Judas
    his brother.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπεδέξατο
  chosen: took up
  alternatives:
  - accepted
  - received
  lexicon: LSJ
  rationale: The middle of ἐπιδέχομαι here conveys assuming or accepting an office.
    'Took up' is natural English for assuming leadership while preserving the sense
    of receiving the role.
- source_word: ἡγεσίαν
  chosen: the leadership
  alternatives:
  - leadership
  - command
  - rule
  lexicon: LSJ
  rationale: ἡγεσία denotes leadership or command. 'The leadership' fits the context
    of succession after Judas and avoids overstating monarchical rule.
- source_word: ἐν τῷ καιρῷ ἐκείνῳ
  chosen: at that time
  alternatives:
  - in that time
  - then
  lexicon: LSJ
  rationale: This temporal phrase is idiomatically rendered 'at that time' in clear
    modern English.
- source_word: ἀνέστη
  chosen: arose
  alternatives:
  - stood up
  - rose up
  - came forward
  lexicon: LSJ
  rationale: ἀνίστημι can mean 'arise' or 'stand up,' and in succession contexts can
    imply emerging to take a role. 'Arose' preserves the formal narrative tone and
    the sense of stepping into Judas's place.
- source_word: ἀντί
  chosen: in place of
  alternatives:
  - instead of
  - in place of
  lexicon: LSJ
  rationale: ἀντί marks substitution or succession. 'In place of' communicates replacement
    in office without implying hostility or contrast.
- source_word: Ἰούδου
  chosen: Judas
  alternatives:
  - Judah
  rationale: Standard transliteration from the Greek form Ἰούδας in 1 Maccabees is
    'Judas.' This also matches the established naming in the immediate narrative.
