  text: καὶ ἐπεδέξατο Ἰωναθὰν ἐν τῷ καιρῷ ἐκείνῳ τὴν ἡγεσίαν· καὶ ἀνέστη ἀντὶ Ἰούδου
    τοῦ ἀδελφοῦ αὐτοῦ.
