id: 1MA.9.86
reference: 1 Maccabees 9:86
source:
  edition: lxx-swete-1909
  text: ἐκεῖθεν Ἰωναθάν, καὶ παρενέβαλεν εἰς Ἀσκάλωνα, καὶ ἐξῆλθον οἱ ἐκ τῆς πόλεως
    εἰς συνάντησιν αὐτῷ ἐν δόξῃ μεγάλῃ. καὶ ἐπέ-
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: From there Jonathan moved on and encamped at Ashkelon, and those from the
    city came out to meet him with great honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek source line in Swete is cut off after καὶ ἐπέ-, but the clause
      up to 'with great honor' is complete and yields a stable translation for this
      verse segment.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκεῖθεν
  chosen: From there
  alternatives:
  - from that place
  - thence
  lexicon: LSJ
  rationale: A straightforward spatial transition. 'From there' is natural modern
    English and preserves the narrative movement.
- source_word: παρενέβαλεν
  chosen: encamped
  alternatives:
  - camped
  - marched and camped
  lexicon: LSJ
  rationale: The verb commonly means to set up camp or encamp. 'Encamped' preserves
    the military nuance better than the more casual 'camped.'
- source_word: εἰς Ἀσκάλωνα
  chosen: at Ashkelon
  alternatives:
  - into Ashkelon
  - to Ashkelon
  lexicon: LSJ
  rationale: Although εἰς is literally 'into,' with verbs of encamping English idiom
    normally uses 'at.' This best conveys the sense without wooden phrasing.
- source_word: ἐξῆλθον οἱ ἐκ τῆς πόλεως
  chosen: those from the city came out
  alternatives:
  - the people of the city came out
  - the inhabitants of the city came out
  lexicon: LSJ
  rationale: 'The Greek is somewhat indefinite: literally ''those from the city came
    out.'' This avoids over-specifying while remaining clear.'
- source_word: εἰς συνάντησιν αὐτῷ
  chosen: to meet him
  alternatives:
  - for a meeting with him
  - to encounter him
  lexicon: LSJ
  rationale: This is the standard idiomatic sense of the phrase in narrative contexts.
- source_word: ἐν δόξῃ μεγάλῃ
  chosen: with great honor
  alternatives:
  - in great splendor
  - with great glory
  lexicon: LSJ
  rationale: Here δόξα refers to an honorable, splendid reception rather than abstract
    'glory.' 'With great honor' communicates the social sense clearly in English while
    fitting the context of a public welcome.
