translation:
  text: How the mighty one has fallen, the one saving Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The wording echoes the biblical lament formula 'How the mighty have fallen'
      (compare 2 Samuel 1:19, 25, 27).
    reason: cross_reference
lexical_decisions:
- source_word: Πῶς
  chosen: How
  alternatives:
  - Alas how
  - How indeed
  lexicon: LSJ
  rationale: Introduces an exclamatory lament, not a request for information. 'How'
    preserves the idiomatic force familiar in lament contexts without adding interpretive
    material like 'alas.'
- source_word: ἔπεσεν
  chosen: has fallen
  alternatives:
  - fell
  lexicon: LSJ
  rationale: Aorist verb meaning 'fell' or 'has fallen.' English present perfect conveys
    the vivid, lamenting sense in context and reads naturally in an exclamation over
    a recent death.
- source_word: δυνατός
  chosen: the mighty one
  alternatives:
  - a mighty man
  - the strong one
  - the warrior
  lexicon: LSJ
  rationale: The adjective is used substantivally. 'The mighty one' preserves the
    singular and the elevated lament tone, likely referring to Judas without inserting
    his name into the text.
- source_word: σώζων
  chosen: he who was saving
  alternatives:
  - saving
  - the one saving
  - who saved
  lexicon: LSJ
  rationale: Present participle indicating ongoing or characteristic action. 'He who
    was saving' captures the participial force in relation to the fallen hero and
    avoids flattening it into a simple past finite verb.
- source_word: τὸν Ἰσραήλ
  chosen: Israel
  alternatives:
  - the people of Israel
  lexicon: LSJ
  rationale: Direct object with article; in English the article is not normally retained
    before the proper name. 'Israel' is sufficient and faithful.
