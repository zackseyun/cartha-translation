- issue: Echo of biblical lament formula
  chosen_reading: Retain the wording 'How the mighty one has fallen' to preserve the
    likely allusion and lament tone.
  alternative_readings:
  - How a mighty man fell
  - See how the strong one fell
  rationale: The Greek strongly echoes the lament idiom known from earlier Scripture.
    Preserving that resonance is a literary-theological decision, but without over-expanding
    the text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
