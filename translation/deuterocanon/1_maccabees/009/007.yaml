translation:
  text: And Judas saw that his camp was failing, because the battle was pressing hard
    on him; and he was crushed in heart, because he had no time to gather them together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek wording after 'Judas saw' is terse and somewhat elliptical. The
      translation understands it to mean that Judas saw his own force giving way under
      pressure.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεμβολὴ
  chosen: camp
  alternatives:
  - army
  - encampment
  - force
  lexicon: LSJ
  rationale: In military context παρεμβολή commonly denotes a camp or encamped force.
    Here 'camp' preserves the concrete military sense while also allowing the implied
    reference to his troops.
- source_word: ὅτι ἡ παρεμβολὴ αὐτοῦ
  chosen: that his camp was failing
  alternatives:
  - that his camp was broken
  - that his force was giving way
  lexicon: LSJ
  rationale: The Greek as transmitted is compressed and elliptical after ἰδεν. Given
    the following clause 'because the battle was pressing hard on him' and the narrative
    context, the sense is that Judas perceived the collapse or weakening of his own
    force. 'Was failing' expresses that sense in readable English without over-specifying.
- source_word: ὁ πόλεμος ἔθλιβεν αὐτόν
  chosen: the battle was pressing hard on him
  alternatives:
  - the war was afflicting him
  - the fighting was crushing him
  lexicon: LSJ
  rationale: ἔθλιβεν conveys pressure, oppression, or hard pressing. 'Battle' fits
    the immediate combat scene better than the broader 'war,' and 'pressing hard on
    him' captures the ongoing military pressure.
- source_word: συνετρίβη τῇ καρδίᾳ
  chosen: he was crushed in heart
  alternatives:
  - he was brokenhearted
  - his heart was crushed
  lexicon: LSJ
  rationale: The passive verb with dative 'in heart' is vivid and idiomatic enough
    to preserve with slight smoothing. 'Crushed in heart' keeps the metaphor and gravity
    better than the more interpretive 'brokenhearted.'
- source_word: καιρὸν
  chosen: time
  alternatives:
  - opportunity
  - occasion
  lexicon: LSJ
  rationale: καιρός can mean a fitting time or opportunity. In this urgent military
    setting, 'time' is the most natural English rendering, with the nuance of opportunity
    implied by context.
- source_word: συναγαγεῖν αὐτούς
  chosen: to gather them together
  alternatives:
  - to rally them
  - to assemble them
  lexicon: LSJ
  rationale: The verb means to gather or assemble. 'Gather them together' stays close
    to the Greek; 'rally them' is possible in context but slightly more interpretive.
