translation:
  text: And the wedding was turned into mourning, and the sound of their musicians
    into lamentation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the sound of their musical instruments.' The Greek μουσικῶν can refer
      either to musicians or to musical performance/instrumentation.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετεστράφη
  chosen: was turned into
  alternatives:
  - was changed into
  - was transformed into
  lexicon: LSJ
  rationale: The passive verb indicates a reversal or change of state. 'Was turned
    into' is natural English and preserves the sense of sudden conversion from one
    condition to another.
- source_word: ὁ γάμος
  chosen: the wedding
  alternatives:
  - the marriage feast
  - the marriage
  lexicon: LSJ
  rationale: In context the reference is to the public celebration rather than the
    institution of marriage itself. 'Wedding' best captures the event setting in concise
    modern English.
- source_word: πένθος
  chosen: mourning
  alternatives:
  - grief
  - sorrow
  lexicon: LSJ
  rationale: The term denotes mourning, especially in response to death or calamity.
    'Mourning' fits the communal and ceremonial contrast with 'wedding.'
- source_word: φωνὴ
  chosen: the sound
  alternatives:
  - the voice
  - the noise
  lexicon: LSJ
  rationale: Although literally 'voice,' here it refers to what is heard from the
    musicians. 'The sound' is idiomatic and suits the musical context better than
    'voice.'
- source_word: μουσικῶν
  chosen: musicians
  alternatives:
  - musical instruments
  - music-makers
  lexicon: LSJ
  rationale: The genitive plural can denote musicians or musical performers. Because
    the phrase is 'sound of their musicians,' this reading is more straightforward
    than taking it as instruments, though the latter remains possible enough to preserve
    in a footnote.
- source_word: θρῆνον
  chosen: lamentation
  alternatives:
  - lament
  - dirge
  lexicon: LSJ
  rationale: The noun denotes a formal lament, especially mourning song. 'Lamentation'
    preserves the elevated, communal tone and balances 'mourning' without sounding
    overly technical.
