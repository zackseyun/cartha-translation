id: 1MA.9.78
reference: 1 Maccabees 9:78
source:
  edition: lxx-swete-1909
  text: δίωξεν ὀπίσω αὐτοῦ εἰς Ἄζωτον, καὶ συνῆψαν αἱ παρεμβολαὶ ὀπίσω αὐτοῦ εἰς πόλεμον.
    καὶ ἀπέλειπεν Ἀπολλώνιος χιλίαν ἵππον
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: He pursued after him as far as Azotus, and the camps joined battle behind
    him. And Apollonius left behind a thousand horsemen
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the camps joined behind him into battle.' The wording
      likely refers to military forces engaging in battle in his rear.
    reason: lexical_alternative
  - marker: b
    text: The Greek text as given ends with 'And Apollonius left behind a thousand
      horsemen,' which reads like an incomplete clause and likely continues in the
      following verse.
    reason: textual_variant
lexical_decisions:
- source_word: δίωξεν
  chosen: pursued
  alternatives:
  - chased
  - pressed after
  lexicon: LSJ
  rationale: Aorist of διώκω in a military narrative commonly means to pursue or chase.
    'Pursued' is natural modern English and preserves the hostile military sense without
    over-paraphrase.
- source_word: ὀπίσω αὐτοῦ
  chosen: after him
  alternatives:
  - behind him
  lexicon: LSJ
  rationale: With verbs of pursuit, ὀπίσω naturally yields 'after him' in English.
    Later in the verse the same phrase is retained more literally in a battle-position
    sense.
- source_word: εἰς Ἄζωτον
  chosen: as far as Azotus
  alternatives:
  - to Azotus
  lexicon: LSJ
  rationale: εἰς with a place after a pursuit verb can be rendered simply 'to,' but
    'as far as Azotus' better conveys the extent of the pursuit.
- source_word: συνῆψαν
  chosen: joined battle
  alternatives:
  - engaged
  - closed in
  lexicon: LSJ
  rationale: In military context συνάπτω can mean to engage or join battle. 'Joined
    battle' is idiomatic and reflects the onset of combat.
- source_word: αἱ παρεμβολαὶ
  chosen: the camps
  alternatives:
  - the armies
  - the forces
  - the encampments
  lexicon: LSJ
  rationale: παρεμβολή literally denotes a camp or encampment, and the plural likely
    refers to military divisions/camps. 'The camps' stays close to the Greek while
    still making sense in context.
- source_word: ὀπίσω αὐτοῦ
  chosen: behind him
  alternatives:
  - after him
  lexicon: LSJ
  rationale: Here the phrase follows the subject 'the camps' and precedes 'into battle';
    a spatial sense, 'behind him,' is more natural than the pursuit idiom 'after him.'
    The referent of αὐτοῦ is contextually masculine singular and left implicit as
    in the Greek.
- source_word: εἰς πόλεμον
  chosen: battle
  alternatives:
  - war
  - combat
  lexicon: LSJ
  rationale: In this immediate narrative setting the phrase indicates engagement in
    fighting, so 'battle' is more precise than the broader 'war.'
- source_word: ἀπέλειπεν
  chosen: left behind
  alternatives:
  - left
  - stationed
  lexicon: LSJ
  rationale: The imperfect/aoristic narrative form here indicates that Apollonius
    left a force in reserve or to the rear. 'Left behind' best captures the separative
    force of ἀπο- without specifying more than the Greek states.
- source_word: χιλίαν ἵππον
  chosen: a thousand horsemen
  alternatives:
  - a thousand cavalry
  - a thousand horse
  lexicon: LSJ
  rationale: Although ἵππος literally means 'horse,' in military counting it can stand
    metonymically for cavalry/horsemen. 'A thousand horsemen' is clear English and
    avoids the awkwardness of 'a thousand horse.'
