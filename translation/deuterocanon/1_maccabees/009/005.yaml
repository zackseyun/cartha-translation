translation:
  text: And Judas was encamped at Alasa, and three thousand chosen men were with him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρεβεβληκὼς
  chosen: was encamped
  alternatives:
  - had encamped
  - was camped
  lexicon: LSJ
  rationale: Perfect participle of παρεμβάλλω in military context denotes being in
    camp or stationed in encampment. 'Was encamped' gives the stative sense in natural
    English and fits the narrative setting.
- source_word: ἐν Ἀλασά
  chosen: at Alasa
  alternatives:
  - in Alasa
  lexicon: LSJ
  rationale: With a place name in a military setting, English idiom prefers 'at' for
    location of an encampment, though the Greek preposition is literally 'in.' The
    name is transliterated rather than translated, per project philosophy.
- source_word: τρισχίλιοι
  chosen: three thousand
  lexicon: LSJ
  rationale: Straightforward cardinal numeral.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - soldiers
  lexicon: LSJ
  rationale: The Greek explicitly says 'men.' While the context implies fighting men,
    'soldiers' would add specificity not stated in the text. This follows the project's
    gender-accurate policy.
- source_word: ἐκλεκτοὶ
  chosen: chosen
  alternatives:
  - picked
  - select
  lexicon: LSJ
  rationale: ἐκλεκτοί denotes selected or choice men. 'Chosen' is both accurate and
    idiomatic, preserving the sense of specially selected troops without over-paraphrasing.
- source_word: μετʼ αὐτοῦ
  chosen: were with him
  alternatives:
  - accompanied him
  lexicon: LSJ
  rationale: The phrase simply indicates presence with Judas. 'Were with him' is the
    most direct rendering and avoids adding nuance beyond the Greek.
