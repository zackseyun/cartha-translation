translation:
  text: And they rose up against them from the ambush and killed them; and many fell
    wounded, and the rest fled to the mountain, and they took all their equipment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many fell as casualties.' The Greek τραυματίαι can denote wounded men
      or battle casualties more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or 'their baggage' or 'their gear.' The Greek σκεύη is a broad term for
      articles or equipment; here the military setting favors personal or campaign
      equipment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξανέστησαν
  chosen: rose up
  alternatives:
  - came out
  - attacked
  lexicon: LSJ
  rationale: The verb literally means 'rose up' or 'stood up,' and in military context
    can imply sudden hostile action. 'Rose up' preserves the Greek image while remaining
    natural in English when followed by 'against them.'
- source_word: ἐπʼ αὐτούς
  chosen: against them
  alternatives:
  - upon them
  lexicon: LSJ
  rationale: With a hostile verb in this context, the preposition is best rendered
    'against' rather than the more wooden 'upon.'
- source_word: ἀπὸ τοῦ ἐνέδρου
  chosen: from the ambush
  alternatives:
  - out of the ambush
  - from ambush
  lexicon: LSJ
  rationale: The phrase indicates the attackers emerged from a concealed position.
    'From the ambush' is clear and closely tied to the Greek construction.
- source_word: ἀπέκτειναν
  chosen: killed
  alternatives:
  - slew
  lexicon: LSJ
  rationale: Standard rendering for the verb of killing; 'slew' is unnecessarily archaic.
- source_word: ἔπεσαν τραυματίαι πολλοί
  chosen: many fell wounded
  alternatives:
  - many fell as casualties
  - many were wounded and fell
  lexicon: LSJ
  rationale: τραυματίαι denotes wounded men or casualties. 'Many fell wounded' preserves
    both the falling and the injury without over-specifying whether all died, especially
    since killing has already been mentioned separately.
- source_word: οἱ ἐπίλοιποι
  chosen: the rest
  alternatives:
  - the remainder
  - those left
  lexicon: LSJ
  rationale: A straightforward rendering for those who survived and escaped.
- source_word: ἔφυγον εἰς τὸ ὄρος
  chosen: fled to the mountain
  alternatives:
  - fled into the hill country
  - fled to the hills
  lexicon: LSJ
  rationale: The Greek is singular, 'the mountain.' 'Hill country' would be interpretive;
    'mountain' keeps the source form.
- source_word: τὰ σκεύη αὐτῶν
  chosen: their equipment
  alternatives:
  - their goods
  - their baggage
  - their vessels
  lexicon: LSJ
  rationale: In a military narrative, σκεύη commonly refers to gear, baggage, or equipment
    rather than household vessels. 'Equipment' best fits the context of stripping
    the defeated party of their belongings.
