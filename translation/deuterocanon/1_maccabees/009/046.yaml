- issue: Whether 'heaven' should be rendered literally or interpreted explicitly as
    God
  chosen_reading: to heaven
  alternative_readings:
  - to God
  - to the Lord in heaven
  rationale: The Greek says 'to heaven,' likely as a reverential metonym, but the
    text itself does not explicitly name God. Following the translation philosophy,
    the rendering preserves the source wording and theological restraint rather than
    resolving the metonym into an explicit divine title.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Original-language primacy over translation tradition.'
