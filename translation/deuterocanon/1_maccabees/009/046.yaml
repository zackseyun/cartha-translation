translation:
  text: Now then, cry out to heaven, so that you may be delivered from the hand of
    our enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to God'; the Greek reads 'to heaven,' using 'heaven' as a reverential
      way of referring to the divine realm or to God himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν οὖν
  chosen: Now then
  alternatives:
  - Now therefore
  - So now
  lexicon: LSJ
  rationale: The combination marks an inferential and urgent transition. 'Now then'
    preserves both the temporal and logical force in natural modern English.
- source_word: κεκράξατε
  chosen: cry out
  alternatives:
  - call out
  - shout
  lexicon: LSJ
  rationale: Aorist imperative of κράζω, here an urgent appeal rather than mere loud
    speech. 'Cry out' best captures a forceful plea directed upward to God.
- source_word: εἰς οὐρανόν
  chosen: to heaven
  alternatives:
  - to the heavens
  - toward heaven
  lexicon: LSJ
  rationale: In this context 'heaven' functions as a reverential metonym for God or
    the divine realm. Singular 'heaven' is the most idiomatic English rendering and
    preserves the upward-directed appeal.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: LSJ
  rationale: Introduces purpose or intended result. 'So that' is clear modern English
    and preserves the clause's purposive force.
- source_word: διασωθῆτε
  chosen: you may be delivered
  alternatives:
  - you may be saved
  - you may escape
  lexicon: LSJ
  rationale: Passive subjunctive of διασῴζω. In this military setting, 'delivered'
    communicates rescue from danger without importing later theological overtones
    that 'saved' may carry in English.
- source_word: ἐκ χειρὸς
  chosen: from the hand of
  alternatives:
  - from the power of
  - out of the grasp of
  lexicon: LSJ
  rationale: A standard idiom for power or control. Retaining 'hand of' preserves
    the biblical idiom while remaining understandable in English.
- source_word: ἐχθρῶν ἡμῶν
  chosen: our enemies
  alternatives:
  - the enemies of us
  - those hostile to us
  lexicon: LSJ
  rationale: Straightforward possessive construction. 'Our enemies' is the natural
    and accurate English equivalent.
