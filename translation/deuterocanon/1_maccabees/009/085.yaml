id: 1MA.9.85
reference: 1 Maccabees 9:85
source:
  edition: lxx-swete-1909
  text: σὺν τοῖς ἐμπυρισθεῖσιν εἰς ἄνδρας ὀκτακισχιλίους. καὶ ἀπῆρεν
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: together with those burned, to eight thousand men. And he departed
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness for this verse is fragmentary in sense, preserving only
      the clause 'together with those burned, to eight thousand men. And he departed.'
      The English follows the surviving wording closely without reconstructing omitted
      context.
    reason: textual_variant
lexical_decisions:
- source_word: σὺν
  chosen: together with
  alternatives:
  - with
  lexicon: LSJ
  rationale: The preposition marks addition to a previously stated number or group.
    'Together with' makes the additive force explicit in natural English.
- source_word: τοῖς ἐμπυρισθεῖσιν
  chosen: those burned
  alternatives:
  - those set on fire
  - those burned alive
  lexicon: LSJ
  rationale: Aorist passive participle from ἐμπυρίζω, referring to persons who were
    burned. 'Those burned' is the most direct rendering from the surviving Greek.
    'Burned alive' may be historically implied but is stronger than the wording preserved
    here, so it is kept only as an alternative.
- source_word: εἰς
  chosen: to
  alternatives:
  - amounting to
  - making
  lexicon: LSJ
  rationale: Here εἰς introduces the resulting total. 'To' is concise and idiomatic
    in English for a summed figure.
- source_word: ἄνδρας
  chosen: men
  alternatives:
  - persons
  lexicon: LSJ
  rationale: The Greek specifically uses ἄνδρας, not a generic term for people. Per
    project philosophy, the gendered term is preserved as 'men'.
- source_word: ὀκτακισχιλίους
  chosen: eight thousand
  lexicon: LSJ
  rationale: Straightforward cardinal number.
- source_word: ἀπῆρεν
  chosen: he departed
  alternatives:
  - he went away
  - he set out
  lexicon: LSJ
  rationale: Aorist of ἀπαίρω/ἀπέρχομαι in context indicates departure. 'He departed'
    is formal enough to match the narrative style while remaining clear.
