translation:
  text: And they remembered John their brother, and they went up and hid under the
    cover of the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the cover of the mountain.' The Greek σκέπη can denote covering,
      shelter, or protective cover.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμνήσθησαν
  chosen: remembered
  alternatives:
  - called to mind
  - thought of
  lexicon: LSJ
  rationale: Aorist middle of μιμνῄσκομαι here naturally means 'remembered' or 'called
    to mind.' 'Remembered' is idiomatic and sufficiently direct without adding interpretive
    nuance.
- source_word: Ἰωάνου
  chosen: John
  alternatives:
  - Johanan
  lexicon: LSJ
  rationale: As a Greek personal name, Ἰωάνης/Ἰωάνου is regularly rendered 'John'
    in English Bible tradition. 'Johanan' would reflect a Hebrew form not present
    in the Greek wording.
- source_word: τοῦ ἀδελφοῦ αὐτῶν
  chosen: their brother
  alternatives:
  - the brother of theirs
  lexicon: LSJ
  rationale: The genitive phrase straightforwardly identifies John as their brother.
    'Their brother' is the natural English equivalent.
- source_word: ἀνέβησαν
  chosen: went up
  alternatives:
  - went up into the hill country
  - ascended
  lexicon: LSJ
  rationale: The verb literally means 'went up/ascended.' 'Went up' preserves the
    spatial movement without over-specifying destination beyond what the text states.
- source_word: ἐκρύβησαν
  chosen: hid
  alternatives:
  - hid themselves
  - were hidden
  lexicon: LSJ
  rationale: The passive/deponent form in context conveys that they concealed themselves.
    'Hid' is concise modern English and captures the sense.
- source_word: ὑπὸ τὴν σκέπην
  chosen: under the shelter
  alternatives:
  - under the cover
  - beneath the protection
  lexicon: LSJ
  rationale: σκέπη denotes covering, shelter, or protection. 'Under the shelter' preserves
    the concrete image while remaining idiomatic.
- source_word: τοῦ ὄρους
  chosen: of the mountain
  alternatives:
  - of the hill
  - of the hill country
  lexicon: LSJ
  rationale: ὄρος most basically means 'mountain' or 'hill.' With the article and
    singular, 'the mountain' is the most direct rendering; broader topographical paraphrases
    go beyond the Greek.
