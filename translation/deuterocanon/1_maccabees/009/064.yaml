translation:
  text: And he came and encamped against Bethbasi, and fought against it for many
    days, and made siege engines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'constructed machines'; the Greek term refers to military devices used
      in a siege.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  chosen: he came
  alternatives:
  - having come
  - after he came
  lexicon: LSJ
  rationale: Aorist participle of ἔρχομαι introducing the next action. In natural
    English narrative, 'he came' preserves the sequence without awkward subordination.
- source_word: παρεβάλεν ἐπὶ
  chosen: encamped against
  alternatives:
  - camped against
  - laid siege to
  lexicon: LSJ
  rationale: παρεμβάλλω with ἐπί in military context commonly means to encamp against
    or draw up against a place. 'Encamped against' keeps the military sense without
    prematurely collapsing it into full siege language.
- source_word: Βεθβασί
  chosen: Bethbasi
  alternatives:
  - Beth-basi
  rationale: Proper place name transliterated rather than translated, following project
    policy for names.
- source_word: ἐπολέμησεν αὐτήν
  chosen: fought against it
  alternatives:
  - attacked it
  - made war on it
  lexicon: LSJ
  rationale: πολεμέω means to wage war or fight. 'Fought against it' is straightforward
    and preserves the repeated military action directed toward the city.
- source_word: ἡμέρας πολλὰς
  chosen: for many days
  alternatives:
  - many days
  lexicon: LSJ
  rationale: Accusative of duration; 'for many days' is idiomatic English and preserves
    the temporal force.
- source_word: ἐποίησεν μηχανάς
  chosen: made siege engines
  alternatives:
  - constructed machines
  - built siege works
  lexicon: LSJ
  rationale: μηχαναί in siege context refers to military engines or contrivances.
    'Siege engines' makes the military reference explicit for modern readers while
    remaining faithful to the context.
