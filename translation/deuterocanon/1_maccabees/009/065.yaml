translation:
  text: And Jonathan left Simon his brother in the city, and went out into the country,
    and came with a number of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'came with a number.' The expression is elliptical and
      likely means he came with a numbered group or company of men.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέλιπεν
  chosen: left
  alternatives:
  - remained behind leaving
  - left behind
  lexicon: LSJ
  rationale: Aorist of ἀπολείπω here means Jonathan left Simon in a place while he
    himself departed. Simple 'left' is natural English and preserves the action without
    overinterpreting.
- source_word: ἐν τῇ πόλει
  chosen: in the city
  alternatives:
  - in the town
  lexicon: LSJ
  rationale: πόλις can mean city or town; 'city' is the standard rendering and fits
    the military-geographical setting.
- source_word: ἐξῆλθεν εἰς τὴν χώραν
  chosen: went out into the country
  alternatives:
  - went out into the region
  - went out into the countryside
  lexicon: LSJ
  rationale: χώρα commonly denotes country, region, or open land as opposed to the
    city. 'Into the country' preserves the contrast with 'in the city' and reads idiomatically.
- source_word: ἦλθεν ἀρίθμῳ
  chosen: came with a number of men
  alternatives:
  - came in number
  - came with a force
  - came with a company
  lexicon: LSJ
  rationale: The phrase is elliptical in Greek; ἀριθμός can denote a number, body,
    or company. In context of military movement, the sense is that he came accompanied
    by a contingent. 'With a number of men' makes the implied sense explicit enough
    for English while staying close to the Greek.
- source_word: Σίμωνα τὸν ἀδελφὸν αὐτοῦ
  chosen: Simon his brother
  alternatives:
  - Simon, his brother
  lexicon: LSJ
  rationale: The appositional phrase identifies Simon as Jonathan's brother. English
    can render this smoothly without losing the familial identification.
