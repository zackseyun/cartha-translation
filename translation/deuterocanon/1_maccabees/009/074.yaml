id: 1MA.9.74
reference: 1 Maccabees 9:74
source:
  edition: lxx-swete-1909
  text: φυγεῖν. Ὡς δὲ ἤκουσεν Ἰωνάθαν τῶν λόγων Ἀπολλωνίου, ἐκινήθη τῇ διανοίᾳ, καὶ
    ἐπέλεξεν δέκα χιλιάδας ἀνδρῶν, καὶ ἐξῆλθεν ἐξ Ἱερουσαλήμ, καὶ συνήντησεν αὐτῷ
    Σίμων ὁ ἀδελφὸς αὐτοῦ ἐπὶ βοήθειαν αὐτοῦ.
  language: Greek
  pages:
  - 660
  validation: no_reference
translation:
  text: When Jonathan heard the words of Apollonius, he was stirred in his mind, and
    he chose ten thousand men and went out from Jerusalem; and Simon his brother joined
    him to help him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek literally, ''met him for his help.'' The rendering ''joined him to
      help him'' brings out the likely sense in context: Simon came to support Jonathan
      rather than merely to encounter him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ ἤκουσεν
  chosen: When ... heard
  alternatives:
  - And when ... heard
  - Now when ... heard
  lexicon: LSJ
  rationale: Ὡς with the aorist introduces a temporal clause; 'When ... heard' is
    natural English and preserves the sequence.
- source_word: τῶν λόγων
  chosen: the words
  alternatives:
  - what ... said
  - the message
  lexicon: LSJ
  rationale: λόγοι is literally 'words'; 'the words' keeps closer to the Greek while
    still reading naturally.
- source_word: ἐκινήθη τῇ διανοίᾳ
  chosen: he was stirred in his mind
  alternatives:
  - he was moved in mind
  - he was troubled in his mind
  - he was stirred in spirit
  lexicon: LSJ
  rationale: The passive of κινέω with dative διανοίᾳ indicates inward mental agitation
    or arousal. 'Stirred in his mind' preserves the mental sphere of διάνοια better
    than 'spirit' and avoids overinterpreting the emotion as either anger or fear.
- source_word: ἐπέλεξεν
  chosen: he chose
  alternatives:
  - he selected
  - he picked out
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist verb; 'chose' is idiomatic
    and sufficiently formal.
- source_word: δέκα χιλιάδας ἀνδρῶν
  chosen: ten thousand men
  alternatives:
  - ten thousand soldiers
  - ten thousand troops
  lexicon: LSJ
  rationale: ἀνδρῶν is literally 'men.' Although the context is military, the Greek
    does not explicitly say 'soldiers' here, so 'men' is retained per gender-accurate
    policy.
- source_word: ἐξῆλθεν ἐξ Ἱερουσαλήμ
  chosen: went out from Jerusalem
  alternatives:
  - marched out from Jerusalem
  - departed from Jerusalem
  lexicon: LSJ
  rationale: The verb simply states departure. 'Went out from Jerusalem' is close
    to the Greek and avoids adding military color not explicit in the wording.
- source_word: συνήντησεν αὐτῷ
  chosen: joined him
  alternatives:
  - met him
  - came to meet him
  lexicon: LSJ
  rationale: While the verb can mean 'met,' in this context with ἐπὶ βοήθειαν αὐτοῦ
    it implies meeting in order to accompany and support him. 'Joined him' communicates
    the functional sense in natural English.
- source_word: ἐπὶ βοήθειαν αὐτοῦ
  chosen: to help him
  alternatives:
  - for his aid
  - as help for him
  - to assist him
  lexicon: LSJ
  rationale: This prepositional phrase expresses purpose. 'To help him' is concise,
    natural, and faithful to the sense of coming in support.
