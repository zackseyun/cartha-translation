translation:
  text: And those on the left wing, seeing that the right wing had been crushed, turned
    back and followed close behind Judas and those with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'left horn' and 'right horn,' a Greek military expression for
      the left and right wings or flanks of an army.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'turned back at the heels of Judas and those with him from behind,'
      an idiom expressing close pursuit from the rear.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀριστερὸν κέρας
  chosen: left wing
  alternatives:
  - left horn
  - left flank
  lexicon: LSJ
  rationale: Although κέρας literally means 'horn,' in military context it refers
    to a wing or flank of an army. 'Wing' is the most natural military English and
    matches the paired use with 'right wing' in the verse.
- source_word: δεξιὸν κέρας
  chosen: right wing
  alternatives:
  - right horn
  - right flank
  lexicon: LSJ
  rationale: As with ἀριστερὸν κέρας, the military sense is intended rather than the
    literal anatomical image. 'Right wing' preserves the battle formation sense clearly.
- source_word: συνετρίβη
  chosen: had been crushed
  alternatives:
  - was broken
  - had been shattered
  - was routed
  lexicon: BDAG/LSJ
  rationale: The verb conveys being broken or crushed. 'Had been crushed' preserves
    the force of the passive and fits the military collapse being observed. 'Routed'
    would be more interpretive than the Greek wording itself.
- source_word: ἐπέστρεψαν
  chosen: turned back
  alternatives:
  - returned
  - turned around
  lexicon: BDAG/LSJ
  rationale: The verb indicates reversal of movement. 'Turned back' fits the battlefield
    context and prepares for the following phrase describing pursuit from behind.
- source_word: κατὰ πόδας
  chosen: followed close behind
  alternatives:
  - at the heels of
  - in pursuit of
  - close on the heels of
  lexicon: LSJ
  rationale: The idiom literally means 'according to the feet,' i.e., at someone's
    heels. 'Followed close behind' gives clear modern English while preserving the
    image of immediate pursuit.
- source_word: ἐκ τῶν ὄπισθεν
  chosen: from behind
  alternatives:
  - in the rear
  - from the rear
  lexicon: LSJ
  rationale: This phrase specifies the direction of the movement or attack relative
    to Judas and his men. In English, the sense is naturally incorporated into the
    pursuit wording; the translation preserves it by indicating they were close behind
    Judas and those with him.
- source_word: τῶν μετʼ αὐτοῦ
  chosen: those with him
  alternatives:
  - his men
  - those who were with him
  lexicon: BDAG/LSJ
  rationale: The Greek is broader than 'his men' and simply denotes Judas's companions.
    'Those with him' stays close to the source without adding specificity not explicit
    in the text.
