id: 1MA.9.89
reference: 1 Maccabees 9:89
source:
  edition: lxx-swete-1909
  text: χρυσῆν, ὡς ἔθος ἐστὶν διδόσθαι τοῖς συγγενεῦσιν τῶν βασιλέων· καὶ ἔδωκεν αὐτῷ
    τὴν Ἀκκαρὼν καὶ πάντα τὰ ὅρια αὐτῆς εἰς κληρονομίαν. XI
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: a gold buckle, as is customary to give to the kinsmen of kings; and he gave
    him Accaron and all its territories as an inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has only 'gold' (feminine), with the noun implied from the previous
      context; 'buckle' is supplied to make the English sentence complete. Other possibilities
      include 'brooch' or 'ornament.'
    reason: lexical_alternative
  - marker: b
    text: Accaron is the Greek form of the place-name more commonly known in English
      as Ekron.
    reason: alternative_reading
lexical_decisions:
- source_word: χρυσῆν
  chosen: gold
  alternatives:
  - golden
  lexicon: LSJ
  rationale: The adjective means 'gold'/'golden' and here modifies an implied feminine
    object from the previous context; English supplies the material sense naturally
    as 'gold' before the inferred noun.
- source_word: '[implied object from context]'
  chosen: buckle
  alternatives:
  - brooch
  - ornament
  - clasp
  rationale: The Greek in this verse preserves only the feminine adjective χρυσῆν,
    with the noun understood from the preceding context. English requires an object;
    'buckle' fits the courtly gift context and avoids overgeneralizing to any ornament.
    Because the noun is ellipsed in this verse, the supplied term is interpretive
    and should remain auditable.
- source_word: ἔθος
  chosen: customary
  alternatives:
  - the custom
  - the usual practice
  lexicon: LSJ
  rationale: The phrase ὡς ἔθος ἐστὶν διδόσθαι is idiomatic; rendering it 'as is customary
    to give' preserves the sense in natural English.
- source_word: συγγενεῦσιν
  chosen: kinsmen
  alternatives:
  - relatives
  - kinsfolk
  lexicon: LSJ
  rationale: The term denotes those of the same family/kin. 'Kinsmen' preserves the
    masculine reference in context ('of kings') and matches the source's gendered
    form more closely than a neutral collective.
- source_word: τῶν βασιλέων
  chosen: of kings
  alternatives:
  - of the kings
  - of royal family members
  lexicon: LSJ
  rationale: A straightforward genitive plural. 'Of kings' is concise and natural
    in English.
- source_word: Ἀκκαρὼν
  chosen: Accaron
  alternatives:
  - Ekron
  lexicon: LSJ
  rationale: Personal and place names are transliterated by project policy. The Greek
    form Ἀκκαρών is therefore represented as 'Accaron' rather than normalized to the
    Hebrew/English traditional 'Ekron.' The traditional form is worth preserving in
    a footnote.
- source_word: ὅρια
  chosen: territories
  alternatives:
  - borders
  - districts
  - boundaries
  lexicon: LSJ
  rationale: In this administrative-land context, ὅρια refers not merely to boundary
    lines but to the lands within the borders. 'Territories' communicates the practical
    sense better than the more literal 'borders'.
- source_word: εἰς κληρονομίαν
  chosen: as an inheritance
  alternatives:
  - for a possession
  - as hereditary property
  lexicon: LSJ
  rationale: The phrase indicates grant as a hereditary holding. 'As an inheritance'
    is idiomatic and preserves the legal sense without overexpansion.
