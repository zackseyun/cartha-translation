id: 1MA.9.82
reference: 1 Maccabees 9:82
source:
  edition: lxx-swete-1909
  text: φάλαγγα, ἡ γὰρ ἵππος ἐξελύθη· καὶ συνετρίβησαν ἀπʼ αὐτοῦ, καὶ ἔφυγαν. καὶ
    ἡ ἵππος ἐσκορπίσθη ἐν τῷ πεδίῳ, καὶ ἔφυγον εἰς
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: the phalanx, for the cavalry broke up; and they were crushed before him and
    fled. And the cavalry was scattered in the plain, and they fled into
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness in Swete appears to preserve only the latter part of the
      sentence in this verse, ending with an incomplete phrase ('and they fled into
      ...'). The English therefore reflects the extant wording without supplying missing
      material.
    reason: textual_variant
lexical_decisions:
- source_word: φάλαγγα
  chosen: the phalanx
  alternatives:
  - the battle line
  - the formation
  lexicon: LSJ
  rationale: φάλαγξ commonly denotes a battle line or compact military formation.
    Because the Greek here appears to continue a sentence fragment, retaining the
    more specific military term 'phalanx' best preserves the source wording and its
    abruptness.
- source_word: ἵππος
  chosen: cavalry
  alternatives:
  - horsemen
  - horse
  lexicon: LSJ
  rationale: Although singular in form, ἡ ἵππος can function collectively for mounted
    troops. 'Cavalry' conveys the collective military sense better than the more literal
    but potentially misleading 'horse.'
- source_word: ἐξελύθη
  chosen: broke up
  alternatives:
  - was dissolved
  - was thrown into confusion
  - was routed
  lexicon: LSJ
  rationale: The verb suggests loosening, breaking apart, or collapsing. 'Broke up'
    fits the military context and explains the subsequent scattering without overstating
    the defeat beyond the Greek.
- source_word: συνετρίβησαν
  chosen: were crushed
  alternatives:
  - were shattered
  - were broken
  lexicon: LSJ
  rationale: The compound verb conveys severe defeat or breaking. 'Were crushed' gives
    the force of the Greek in idiomatic English.
- source_word: ἀπʼ αὐτοῦ
  chosen: before him
  alternatives:
  - by him
  - from him
  lexicon: LSJ
  rationale: The preposition with pronoun is terse and context-dependent. In battle
    narrative, 'before him' naturally expresses defeat in his presence/at his hands
    while preserving some ambiguity.
- source_word: ἐσκορπίσθη
  chosen: was scattered
  alternatives:
  - was dispersed
  lexicon: LSJ
  rationale: A straightforward military dispersal term; 'was scattered' is both natural
    and close to the Greek.
- source_word: πεδίῳ
  chosen: the plain
  alternatives:
  - the field
  lexicon: LSJ
  rationale: In military narrative πεδίον often denotes open country or plain rather
    than an agricultural field. 'The plain' better suits the scene.
