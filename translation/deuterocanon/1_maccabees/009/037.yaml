translation:
  text: After these words it was reported to Jonathan and Simon his brother that the
    sons of Jambri were holding a great wedding, and were bringing the bride from
    Nadabath, the daughter of one of the great nobles of Canaan, with a large escort.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a great procession.' The Greek παραπομπή can denote the accompanying
      escort or the festive procession itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ δὲ τοὺς λόγους τούτους
  chosen: After these words
  alternatives:
  - After these things
  - After these events
  lexicon: LSJ
  rationale: A conventional temporal transition. λόγοι can mean 'words' or more broadly
    'matters,' but here the phrase naturally points back to the preceding report/discourse.
    'After these words' stays close to the Greek while remaining idiomatic.
- source_word: ἀπηγγέλησαν
  chosen: it was reported
  alternatives:
  - they were informed
  - word was brought
  lexicon: LSJ
  rationale: Impersonal passive in Greek; English impersonal passive preserves the
    sense without supplying an unnecessary subject.
- source_word: Ἰωναθὰν καὶ Σίμωνι τῷ ἀδελφῷ αὐτοῦ
  chosen: to Jonathan and Simon his brother
  alternatives:
  - to Jonathan and Simon, his brother
  - to Jonathan and to Simon his brother
  lexicon: LSJ
  rationale: The dative marks indirect object. The phrase most naturally identifies
    Simon as Jonathan's brother. Comma omitted in the main text for smoother modern
    English.
- source_word: Υἱοὶ Ἰαμβρὶ
  chosen: the sons of Jambri
  alternatives:
  - the sons of Jambrin
  - the Jambri clan
  lexicon: LSJ
  rationale: A patronymic/group designation. 'Sons of Jambri' is the most transparent
    rendering and preserves the familial/clan idiom of the Greek.
- source_word: ποιοῦσιν γάμον μέγαν
  chosen: were holding a great wedding
  alternatives:
  - were celebrating a great marriage feast
  - were making a great wedding
  lexicon: LSJ
  rationale: ποιεῖν γάμον is an idiom for celebrating or holding a wedding. 'Great
    wedding' preserves μέγαν without overexpanding to 'feast,' though a feast is likely
    implied culturally.
- source_word: ἄγουσι τὴν νύμφην
  chosen: were bringing the bride
  alternatives:
  - were leading the bride
  - were escorting the bride
  lexicon: LSJ
  rationale: ἄγω commonly means 'lead/bring.' In wedding context, 'bringing the bride'
    is natural English and fits the movement described.
- source_word: ἀπὸ Ναδαβάθ
  chosen: from Nadabath
  alternatives:
  - out of Nadabath
  lexicon: LSJ
  rationale: ἀπό marks source/origin. The place name is transliterated directly from
    the Greek witness.
- source_word: θυγατέρα ἑνὸς τῶν μεγάλων μεγιστάνων Χαναάν
  chosen: the daughter of one of the great nobles of Canaan
  alternatives:
  - the daughter of one of the great magnates of Canaan
  - the daughter of one of the leading lords of Canaan
  lexicon: LSJ
  rationale: μεγιστάν denotes a high-ranking notable or magnate. 'Nobles' is clear
    modern English; retaining 'great' reflects both μεγάλων and the elevated status
    language, even though the phrase is somewhat pleonastic in Greek.
- source_word: μετὰ παραπομπῆς μεγάλης
  chosen: with a large escort
  alternatives:
  - with a great procession
  - with much pomp
  lexicon: LSJ
  rationale: παραπομπή refers to an escort or accompanying procession. 'Large escort'
    best captures the concrete sense while remaining readable; 'procession' is possible
    and preserved as an alternative.
