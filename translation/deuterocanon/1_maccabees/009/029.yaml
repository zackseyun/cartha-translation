translation:
  text: Since your brother Judas has died, and there is no man like him to go out
    against the enemies and Bacchides, and against those who hate our nation,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has an awkward phrase after ''Bacchides'' (literally, ''and in those
      hating our nation''). The translation renders the apparent sense in context:
      another hostile group opposed by the speaker.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀφʼ οὗ
  chosen: Since
  alternatives:
  - From the time when
  - After
  lexicon: LSJ
  rationale: The phrase introduces the circumstance resulting from Judas's death.
    'Since' gives the causal-temporal sense naturally in English without over-literal
    awkwardness.
- source_word: ὁ ἀδελφός σου
  chosen: your brother
  lexicon: LSJ
  rationale: Straightforward possessive noun phrase; no reason to expand beyond the
    familial term used in Greek.
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  lexicon: LSJ
  rationale: Standard transliteration of the Greek proper name Ἰούδας in 1 Maccabees
    is 'Judas' in English usage for this figure.
- source_word: τετελεύτηκεν
  chosen: has died
  alternatives:
  - has come to his end
  - has passed away
  lexicon: LSJ
  rationale: The perfect indicates a completed death with present consequence. 'Has
    died' is clear, direct, and avoids euphemism.
- source_word: ἀνὴρ ὅμοιος αὐτῷ
  chosen: a man like him
  alternatives:
  - a man equal to him
  - one like him
  lexicon: LSJ
  rationale: Retains the masculine singular noun ἀνήρ and the comparison ὅμοιος. 'A
    man like him' is the most natural close rendering.
- source_word: οὐκ ἔστιν
  chosen: there is no
  alternatives:
  - there is not
  - no one is
  lexicon: LSJ
  rationale: Idiomatic existential rendering in English.
- source_word: ἐξελθεῖν
  chosen: to go out
  alternatives:
  - to march out
  - to go forth
  lexicon: LSJ
  rationale: The infinitive likely expresses military action, but 'go out' preserves
    the Greek wording while remaining readable. The hostile object clarifies the martial
    sense.
- source_word: πρὸς τοὺς ἐχθρούς
  chosen: against the enemies
  alternatives:
  - to confront the enemies
  - against our enemies
  lexicon: LSJ
  rationale: In this military context πρὸς with hostile persons is best rendered 'against.'
    The article is preserved generically as 'the enemies.'
- source_word: καὶ Βακχίδην
  chosen: and Bacchides
  alternatives:
  - and against Bacchides
  lexicon: LSJ
  rationale: The Greek coordinates Bacchides with 'the enemies' under the same infinitival
    construction. English can leave the repeated preposition implicit, though the
    sense remains adversative.
- source_word: καὶ ἐν τοῖς ἐχθαίνουσιν τοῦ ἔθνους ἡμῶν
  chosen: and against those who hate our nation
  alternatives:
  - and among those who hate our nation
  - and with those hostile to our nation
  lexicon: LSJ
  rationale: The transmitted ἐν is awkward after ἐξελθεῖν and in context likely carries
    an adversative sense in the diplomatic text; rendering the phrase as another hostile
    target best fits the syntax and context. 'Nation' reflects ἔθνος here as the Jewish
    people/polity, not merely 'Gentiles' or an abstract ethnicity.
