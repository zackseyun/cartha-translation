theological_decisions:
- issue: Rendering ἀνήρ in a representative military context
  chosen_reading: man
  alternative_readings:
  - one
  rationale: The Greek specifically uses ἀνήρ, not a gender-neutral term. Following
    the project's gender-accurate policy, 'man' is retained.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering ἔθνος ἡμῶν
  chosen_reading: our nation
  alternative_readings:
  - our people
  rationale: In 1 Maccabees this term often denotes the Jewish nation as a collective
    political-religious people. 'Nation' preserves that force better than the more
    diffuse 'people.'
