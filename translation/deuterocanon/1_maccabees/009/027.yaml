translation:
  text: And there was great distress in Israel, such as had not been since the day
    when a prophet was no longer seen among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'such as had not happened since the day no prophet appeared to them.'
      The Greek passive 'was seen' can also be understood as 'appeared.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: there came to be
  alternatives:
  - there was
  - it happened
  lexicon: BDAG
  rationale: Uses an English existential construction that reflects the Greek narrative
    formula without sounding overly wooden. 'There was' is possible, but 'there came
    to be' preserves the eventive onset of the distress.
- source_word: θλίψις μεγάλη
  chosen: great distress
  alternatives:
  - great tribulation
  - great affliction
  lexicon: BDAG
  rationale: θλίψις denotes severe trouble, pressure, or affliction. 'Great distress'
    is natural modern English and fits the historical crisis context without importing
    later technical eschatological overtones that 'tribulation' may carry.
- source_word: ἐν τῷ Ἰσραήλ
  chosen: in Israel
  alternatives:
  - among Israel
  - for Israel
  lexicon: BDAG
  rationale: The phrase is most naturally rendered locatively/corporately as 'in Israel,'
    referring to the people/nation as the sphere of the crisis.
- source_word: ἥτις
  chosen: such as
  alternatives:
  - which
  - the kind that
  lexicon: BDAG
  rationale: ἥτις here introduces a qualitative relative clause explaining the nature
    of the distress. 'Such as' captures the idiomatic force in English better than
    a bare 'which.'
- source_word: οὐκ ἐγένετο
  chosen: had not been
  alternatives:
  - did not happen
  - had not occurred
  lexicon: BDAG
  rationale: In the comparative clause, English idiom prefers 'had not been' with
    the noun 'distress,' conveying unprecedented severity up to that time.
- source_word: ἀφʼ ἧς ἡμέρας
  chosen: since the day
  alternatives:
  - from the day when
  - since the time when
  lexicon: BDAG
  rationale: A straightforward temporal rendering that preserves the Greek point of
    reference.
- source_word: οὐκ ὤφθη
  chosen: was no longer seen
  alternatives:
  - was not seen
  - did not appear
  lexicon: BDAG
  rationale: The passive of ὁράω can mean 'was seen' or 'appeared.' In context, the
    sense is that prophets had ceased to be present/manifest among the people. 'Was
    no longer seen' makes the implied cessation clear in idiomatic English.
- source_word: προφήτης
  chosen: a prophet
  alternatives:
  - prophet
  lexicon: BDAG
  rationale: 'The singular is retained as in Greek, functioning generically: not that
    only one specific prophet was absent, but that prophetic presence had ceased.'
- source_word: αὐτοῖς
  chosen: among them
  alternatives:
  - to them
  - for them
  lexicon: BDAG
  rationale: Although formally dative, in this context English 'among them' best conveys
    the idea of prophetic presence within the community rather than merely a message
    delivered to them.
