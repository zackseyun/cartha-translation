translation:
  text: And Judas said, “Far be it from me to do this thing—to flee from them. And
    if our time has drawn near, let us die bravely for the sake of our brothers, and
    let us not leave a cause for reproach to our glory.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let us die with courage'; more literally, 'let us die manfully.' The
      Greek expression uses a term associated with courage or valor.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'our glory' can also be understood as 'our honor' or 'our reputation'
      in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μή μοι γένοιτο
  chosen: Far be it from me
  alternatives:
  - May it never be for me
  - By no means
  lexicon: LSJ
  rationale: Idiomatic optative of repudiation. 'Far be it from me' conveys strong
    personal refusal in natural English better than a wooden literalism.
- source_word: ποιῆσαι τὸ πρᾶγμα τοῦτο
  chosen: to do this thing
  alternatives:
  - to do this deed
  - to do this
  lexicon: LSJ
  rationale: Retains the explicit object πρᾶγμα rather than collapsing it entirely,
    while still sounding natural in English.
- source_word: φυγεῖν ἀπʼ αὐτῶν
  chosen: to flee from them
  alternatives:
  - to run away from them
  - to escape from them
  lexicon: LSJ
  rationale: φυγεῖν straightforwardly means 'to flee.' 'From them' preserves the preposition
    ἀπʼ and the military context.
- source_word: ἤγγικεν ὁ καιρὸς ἡμῶν
  chosen: our time has drawn near
  alternatives:
  - our appointed time has come near
  - our hour is near
  lexicon: LSJ
  rationale: καιρός here denotes the decisive or appointed moment, likely death in
    battle. 'Our time has drawn near' preserves the solemn ambiguity without over-interpreting.
- source_word: ἀποθάνωμεν ἀνδρίᾳ
  chosen: let us die bravely
  alternatives:
  - let us die manfully
  - let us die with courage
  lexicon: LSJ
  rationale: ἀνδρίᾳ is an adverbial dative from ἀνδρεία, denoting courage/valor. 'Bravely'
    is idiomatic modern English; 'manfully' is more literal to the gendered imagery
    but archaic and potentially misleading in current usage.
- source_word: χάριν τῶν ἀδελφῶν ἡμῶν
  chosen: for the sake of our brothers
  alternatives:
  - on behalf of our brothers
  - for our brothers
  lexicon: LSJ
  rationale: χάριν with the genitive means 'for the sake of.' 'Brothers' is retained
    per gender-accurate philosophy and fits the military/familial context.
- source_word: μὴ καταλίπωμεν αἰτίαν
  chosen: let us not leave a cause for reproach
  alternatives:
  - let us not leave a charge
  - let us not leave a pretext
  - let us not leave blame
  lexicon: LSJ
  rationale: αἰτία can mean cause, charge, or ground of accusation. In context Judas
    urges conduct that will not furnish grounds for dishonor after their death; 'cause
    for reproach' captures that sense.
- source_word: τῇ δόξῃ ἡμῶν
  chosen: against our glory
  alternatives:
  - to our honor
  - against our honor
  - to our reputation
  lexicon: LSJ
  rationale: δόξα here refers to honor/reputation rather than abstract glory. 'Against
    our glory' stays closer to the Greek construction, while the preceding 'cause
    for reproach' clarifies the idiom.
