theological_decisions:
- issue: Rendering the masculine familial term ἀδελφῶν
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - kinsmen
  rationale: The Greek is explicitly masculine plural and in this war setting likely
    refers primarily to fellow Jewish brothers/compatriots rather than a mixed-gender
    sibling address. Per doctrine, the gendered form is retained rather than neutralized.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Rendering δόξα in an honor-shame military context
  chosen_reading: glory
  alternative_readings:
  - honor
  - reputation
  rationale: Although the contextual sense is close to 'honor' or 'reputation,' retaining
    'glory' preserves the lexical link to δόξα while the phrase 'cause for reproach'
    signals the honor-shame nuance. This avoids importing a narrower interpretation
    than the Greek requires.
  doctrine_reference: DOCTRINE.md §5 Consistency of key terms, or documented exception
