id: 1MA.9.77
reference: 1 Maccabees 9:77
source:
  edition: lxx-swete-1909
  text: παρενέβαλεν τρισχιλίαν ἵππον καὶ δύναμιν πολλήν, καὶ ἐπορεύθη εἰς Ἄζωτον ὡς
    διοδεύων, καὶ ἅμα προσῆγεν εἰς τὸ πεδίον, καὶ διὰ τὸ ἔχειν αὐτὸν πλῆθος ἵππου
    καὶ πεποιθέναι ἐπʼ αὐτήν. καὶ κατε-
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: He encamped three thousand cavalry and a large force, and went to Azotus as
    though passing through; at the same time he was leading them into the plain, because
    he had a multitude of cavalry and trusted in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek source line ends mid-word ('καὶ κατε-'), indicating the sentence
      continues in the next verse. This translation renders only the complete portion
      preserved in this verse unit.
    reason: textual_variant
  - marker: b
    text: Or 'as though merely passing through,' suggesting a deceptive appearance
      rather than a straightforward march.
    reason: lexical_alternative
  - marker: c
    text: The pronoun in 'trusted in it' is singular in Greek and may refer specifically
      to his force or, more particularly, to his cavalry as the basis of his confidence.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλεν
  chosen: He encamped
  alternatives:
  - He set in camp
  - He deployed
  lexicon: LSJ
  rationale: The verb commonly means to encamp or pitch camp. In this military context,
    'encamped' preserves the concrete military sense better than the broader 'deployed.'
- source_word: τρισχιλίαν ἵππον
  chosen: three thousand cavalry
  alternatives:
  - three thousand horsemen
  - three thousand horse
  lexicon: LSJ
  rationale: ἵππος can stand collectively for cavalry/horsemen in military narrative.
    'Three thousand cavalry' is idiomatic modern English while preserving the collective
    military force.
- source_word: δύναμιν πολλήν
  chosen: a large force
  alternatives:
  - a great army
  - many troops
  lexicon: LSJ
  rationale: δύναμις here refers to military force rather than abstract power. 'A
    large force' is natural English and suitably broad.
- source_word: ἐπορεύθη εἰς Ἄζωτον
  chosen: went to Azotus
  alternatives:
  - marched to Azotus
  - proceeded to Azotus
  lexicon: LSJ
  rationale: The verb is the common 'went/proceeded.' 'Went to Azotus' keeps the wording
    simple and avoids over-specifying the manner unless required by context.
- source_word: ὡς διοδεύων
  chosen: as though passing through
  alternatives:
  - as if traveling through
  - as though merely passing by
  lexicon: LSJ
  rationale: The participle suggests movement through an area, likely with deceptive
    appearance. 'As though passing through' preserves the feigned or apparent character
    introduced by ὡς.
- source_word: ἅμα προσῆγεν εἰς τὸ πεδίον
  chosen: at the same time he was bringing them into the plain
  alternatives:
  - meanwhile he led them into the plain
  - at once he advanced into the plain
  lexicon: LSJ
  rationale: προσάγω here is causative/leading rather than simply arriving. The object
    is implicit from context, namely his forces. 'Into the plain' reflects εἰς τὸ
    πεδίον straightforwardly.
- source_word: διὰ τὸ ἔχειν αὐτὸν πλῆθος ἵππου
  chosen: because he had a multitude of cavalry
  alternatives:
  - because he had many horsemen
  - because he had a mass of horse
  lexicon: LSJ
  rationale: The construction gives the reason for his maneuver or confidence. πλῆθος
    ἵππου is a collective military expression; 'multitude of cavalry' is clear and
    close.
- source_word: πεποιθέναι ἐπʼ αὐτήν
  chosen: trusted in it
  alternatives:
  - relied on it
  - placed confidence in it
  lexicon: LSJ
  rationale: The perfect infinitive conveys settled confidence. The feminine pronoun
    most naturally refers back to δύναμις ('force') or collectively to the mounted
    force as a military arm; 'it' preserves the Greek singular without over-resolving
    the antecedent.
