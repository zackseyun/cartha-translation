translation:
  text: And Judas fell, and the rest fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was struck down' / 'died.' The Greek says 'fell,' a common battle expression
      that can imply death without stating it more explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  lexicon: LSJ
  rationale: Proper name transliterated by standard convention. In 1 Maccabees this
    refers to Judas Maccabeus, and 'Judas' is the normal English form for Ἰούδας in
    Greek narrative.
- source_word: ἔπεσεν
  chosen: fell
  alternatives:
  - died
  - was struck down
  lexicon: LSJ
  rationale: The aorist of πίπτω literally means 'fell.' In battle narrative it can
    imply death, but the Greek here states the event with the conventional idiom 'fell.'
    'Fell' preserves the source wording and its martial solemnity without over-interpreting
    beyond the text.
- source_word: οἱ λοιποὶ
  chosen: the rest
  alternatives:
  - the others
  - those remaining
  lexicon: LSJ
  rationale: λοιποί denotes those left besides the named figure. 'The rest' is concise,
    natural English and fits the narrative contrast with Judas.
- source_word: ἔφυγον
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: LSJ
  rationale: φεύγω in this context means to flee from danger. 'Fled' is the most direct
    and suitably grave rendering for a battlefield retreat.
