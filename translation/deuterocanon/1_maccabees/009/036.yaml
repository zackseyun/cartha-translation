translation:
  text: And the sons of Jambri came out from Medaba, and they seized John and all
    that he had, and went away with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went away taking him and all his possessions.' The Greek literally says
      'went away having [them],' referring back to John and everything he had.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ υἱοὶ Ἰαμβρεὶ
  chosen: the sons of Jambri
  alternatives:
  - the sons of Jambrin
  - the sons of Jambre
  lexicon: LSJ
  rationale: υἱοὶ is straightforwardly 'sons.' Ἰαμβρεὶ is a proper name transliterated
    rather than translated, following project policy for personal/family names. 'Sons
    of Jambri' likely denotes members of a clan or household rather than only immediate
    male offspring, but the literal expression is retained.
- source_word: ἐκ Μηδαβά
  chosen: from Medaba
  alternatives:
  - out of Medaba
  lexicon: LSJ
  rationale: ἐκ marks movement out from a place. 'From Medaba' is idiomatic English
    while preserving the geographic origin. The place name is transliterated.
- source_word: συνέλαβον
  chosen: seized
  alternatives:
  - captured
  - arrested
  - took
  lexicon: BDAG
  rationale: The verb conveys taking hold of or capturing. 'Seized' best fits the
    hostile action in context without importing formal judicial overtones that 'arrested'
    might suggest.
- source_word: Ἰωάνην
  chosen: John
  alternatives:
  - Johanan
  lexicon: LSJ
  rationale: The Greek form is Ἰωάνης/Ἰωάνην, conventionally rendered 'John' in English
    from Greek. 'Johanan' would reflect a Semitic back-form not directly given in
    the Greek source, so 'John' is preferred.
- source_word: πάντα ὅσα εἶχεν
  chosen: everything he had
  alternatives:
  - all that he had
  - all his possessions
  lexicon: LSJ
  rationale: The phrase is comprehensive and idiomatic. 'Everything he had' preserves
    both the totality of πάντα and the relative construction ὅσα εἶχεν in natural
    English.
- source_word: ἀπῆλθον ἔχοντες
  chosen: went away with them
  alternatives:
  - departed carrying them off
  - went away taking him and his goods
  lexicon: LSJ
  rationale: The participle ἔχοντες is somewhat terse after the prior object sequence.
    In context it indicates that they departed having John and his possessions in
    their control. 'Went away with them' captures the sense compactly, with 'them'
    referring to John and the things seized.
