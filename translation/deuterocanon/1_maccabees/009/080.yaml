id: 1MA.9.80
reference: 1 Maccabees 9:80
source:
  edition: lxx-swete-1909
  text: κατόπισθεν αὐτοῦ. καὶ ἐκύκλωσαν αὐτὸν τὴν παρεμβολήν, καὶ ἐξετί- ναξαν τὰς
    σχίζας εἰς τὸν λαὸν ἐκ πρωΐθεν ἕως δείλης. ὁ δὲ λαὸς
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: behind him. And they surrounded the camp around him, and from early morning
    until evening they shot arrows at the people. But the people
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they hurled missiles/shafts at the people.' The Greek term for the projectiles
      is uncommon, and 'arrows' is a context-based rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατόπισθεν
  chosen: behind
  alternatives:
  - from behind
  - after
  lexicon: LSJ
  rationale: The adverb/preposition indicates position to the rear. Because the Greek
    fragment begins mid-thought with αὐτοῦ, the natural rendering is 'behind him,'
    preserving the incomplete sentence carried over from the previous verse.
- source_word: ἐκύκλωσαν
  chosen: surrounded
  alternatives:
  - encircled
  lexicon: LSJ
  rationale: The verb means to encircle or surround. 'Surrounded' is idiomatic modern
    English and fits military context.
- source_word: παρεμβολήν
  chosen: camp
  alternatives:
  - encampment
  - army camp
  lexicon: LSJ
  rationale: In military narrative παρεμβολή commonly denotes a camp or encampment.
    'Camp' is concise and natural.
- source_word: ἐξετίναξαν
  chosen: shot
  alternatives:
  - hurled
  - discharged
  lexicon: LSJ
  rationale: Given the direct object τὰς σχίζας and the battle setting, the sense
    is launching projectiles. 'Shot' best conveys the military action in readable
    English without over-specifying the mechanism.
- source_word: σχίζας
  chosen: arrows
  alternatives:
  - missiles
  - shafts
  - darts
  lexicon: LSJ
  rationale: The noun here refers to projectiles; in this context 'arrows' is the
    most likely and intelligible rendering. Because the term is less common and could
    be rendered more generally, the alternative is worth preserving in a footnote.
- source_word: ἐκ πρωΐθεν ἕως δείλης
  chosen: from early morning until evening
  alternatives:
  - from dawn until dusk
  - from morning until evening
  lexicon: LSJ
  rationale: This phrase marks the duration of the attack across the day. 'From early
    morning until evening' preserves the temporal span clearly.
- source_word: λαός
  chosen: people
  alternatives:
  - troops
  - army
  lexicon: LSJ
  rationale: λαός literally means 'people.' In context it refers to the fighting force,
    but 'people' preserves the Greek wording without importing a more technical military
    term.
