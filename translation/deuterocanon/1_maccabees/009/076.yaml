id: 1MA.9.76
reference: 1 Maccabees 9:76
source:
  edition: lxx-swete-1909
  text: καὶ φοβηθέντες ἤνοιξαν οἱ ἐκ τῆς πόλεως, καὶ ἐκυρίευσεν Ἰωναθὰν Ἰόππης. καὶ
    ἤκουσεν Ἀπολλώνιος, καὶ
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: And those from the city, being afraid, opened up, and Jonathan gained control
    of Joppa. And Apollonius heard, and
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek leaves the object of 'opened up' unstated; in context this likely
      refers to opening the city or its gates.
    reason: lexical_alternative
  - marker: b
    text: The verse ends with 'and Apollonius heard, and' because the source text
      here is incomplete at this point in the supplied witness.
    reason: textual_variant
lexical_decisions:
- source_word: φοβηθέντες
  chosen: being afraid
  alternatives:
  - having become afraid
  - in fear
  lexicon: LSJ
  rationale: Aorist passive participle from φοβέω used in an intransitive/passive
    sense, indicating the city's people acted out of fear. 'Being afraid' is natural
    English and preserves the causal nuance without overinterpreting.
- source_word: ἤνοιξαν
  chosen: opened up
  alternatives:
  - opened
  - opened the gates
  lexicon: LSJ
  rationale: The verb simply says 'opened.' Because the object is unstated, the translation
    avoids supplying 'the gates' in the main text, though that is likely implied by
    the military-city context. 'Opened up' sounds natural while preserving the ellipsis.
- source_word: οἱ ἐκ τῆς πόλεως
  chosen: those from the city
  alternatives:
  - the men from the city
  - the people of the city
  - those in the city
  lexicon: LSJ
  rationale: The phrase is substantival and identifies the inhabitants or defenders
    associated with the city. 'Those from the city' stays close to the Greek without
    adding 'men' or over-specifying.
- source_word: ἐκυρίευσεν
  chosen: gained control of
  alternatives:
  - took possession of
  - mastered
  - captured
  lexicon: LSJ
  rationale: From κυριεύω, meaning to rule over or gain mastery/control. 'Gained control
    of' fits the military-political context and avoids the potentially too narrow
    'captured' while still conveying successful seizure.
- source_word: Ἰόππης
  chosen: Joppa
  alternatives:
  - Joppe
  lexicon: LSJ
  rationale: Standard English transliteration for the place-name Ἰόππη is 'Joppa.'
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned of
  - got word
  lexicon: LSJ
  rationale: Straightforward rendering of the aorist of ἀκούω. 'Heard' is sufficient
    and leaves the sentence fragment intact as in the source.
