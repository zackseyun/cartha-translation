translation:
  text: And in the first month of the one hundred and fifty-second year, they encamped
    in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'they encamped into Jerusalem.' English 'at Jerusalem'
      reflects normal idiom for a military camp's location.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ μηνὸς τοῦ πρώτου
  chosen: in the first month
  alternatives:
  - of the first month
  - during the first month
  lexicon: LSJ
  rationale: The genitive phrase functions temporally. English idiom prefers 'in the
    first month' to express the time reference naturally without losing the formal
    sense.
- source_word: ἔτους δευτέρου καὶ πεντηκοστοῦ καὶ ἑκατοστοῦ
  chosen: of the one hundred and fifty-second year
  alternatives:
  - of year one hundred fifty-two
  - in the one hundred and fifty-second year
  lexicon: LSJ
  rationale: The Greek gives the Seleucid-style year number in additive form ('second
    and fiftieth and hundredth'). Rendering it as 'one hundred and fifty-second year'
    preserves the numerical value in standard English.
- source_word: παρενέβαλον
  chosen: they encamped
  alternatives:
  - they camped
  - they pitched camp
  lexicon: LSJ
  rationale: The verb commonly means to encamp or set up camp, especially in military
    movement. 'They encamped' preserves the martial and somewhat formal narrative
    tone better than the more colloquial 'pitched camp'.
- source_word: εἰς Ἱερουσαλήμ
  chosen: at Jerusalem
  alternatives:
  - in Jerusalem
  - against Jerusalem
  - to Jerusalem
  lexicon: LSJ
  rationale: With verbs of encamping, εἰς can mark movement toward a place, but in
    English the resulting location is best expressed as 'at Jerusalem.' 'Against Jerusalem'
    would overstate hostility not explicit in the phrase itself, and 'to Jerusalem'
    is less idiomatic with 'encamped'.
