translation:
  text: And they took the sons of the leaders of the land as hostages, and put them
    under guard in the citadel at Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the Acra,' the fortified citadel in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβον
  chosen: they took
  alternatives:
  - they seized
  - they captured
  lexicon: BDAG
  rationale: A straightforward past narrative verb; 'took' is the most natural English
    rendering and fits the context of taking persons into custody.
- source_word: τοὺς υἱοὺς
  chosen: the sons
  alternatives:
  - the children
  lexicon: BDAG
  rationale: The Greek specifically says 'sons,' not a gender-neutral term. Per gender-accurate
    philosophy, the masculine familial term is preserved.
- source_word: τῶν ἡγουμένων
  chosen: of the leaders
  alternatives:
  - of the rulers
  - of those leading
  lexicon: BDAG
  rationale: The participial noun denotes those in leadership. 'Leaders' is clear
    modern English and avoids overstating formal political office implied by 'rulers'.
- source_word: τῆς χώρας
  chosen: of the land
  alternatives:
  - of the country
  - of the region
  lexicon: BDAG
  rationale: χώρα can mean land, country, or region. 'Land' is suitably broad and
    idiomatic in this historical setting.
- source_word: ὁμήρα
  chosen: as hostages
  alternatives:
  - hostages
  lexicon: LSJ
  rationale: ὁμήρα denotes hostages. English requires either a predicate complement
    ('as hostages') or recasting; 'as hostages' makes the function explicit.
- source_word: ἔθεντο
  chosen: put
  alternatives:
  - placed
  - set
  lexicon: BDAG
  rationale: A simple placement verb in narrative sequence; 'put' is natural and concise.
- source_word: ἐν τῇ ἄκρᾳ
  chosen: in the citadel
  alternatives:
  - in the Acra
  - in the fortress
  lexicon: LSJ
  rationale: ἄκρα can mean citadel/fortress, and in 1 Maccabees often refers specifically
    to the Jerusalem citadel known as the Acra. For readability, the main text uses
    'the citadel,' while the more technical proper-name-like alternative is preserved
    in a footnote.
- source_word: ἐν φυλακῇ
  chosen: under guard
  alternatives:
  - in custody
  - in prison
  - in confinement
  lexicon: BDAG
  rationale: φυλακή can denote guarding, custody, or prison. Here the phrase describes
    their secured detention within the citadel; 'under guard' captures the custodial
    sense without overcommitting to a prison building.
