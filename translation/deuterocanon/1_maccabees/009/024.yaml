translation:
  text: In those days a very great famine came about, and the land defected with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the country went over to their side.' The Greek verb indicates defection
      or desertion to another party.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  chosen: In those days
  alternatives:
  - At that time
  - In those times
  lexicon: LSJ
  rationale: Standard temporal idiom; 'In those days' is natural English and preserves
    the narrative formula.
- source_word: ἐγενήθη
  chosen: came about
  alternatives:
  - arose
  - occurred
  - came to be
  lexicon: LSJ
  rationale: A flexible verb of happening/origin. 'Came about' keeps the eventive
    sense without sounding wooden.
- source_word: λιμὸς μεγάλη σφόδρα
  chosen: a very great famine
  alternatives:
  - an exceedingly severe famine
  - a very severe famine
  lexicon: LSJ
  rationale: λιμός means 'famine'; μεγάλη with adverbial σφόδρα intensifies it strongly.
    'Very great famine' is slightly formal but transparent and close to the Greek
    emphasis.
- source_word: αὐτομόλησεν
  chosen: defected
  alternatives:
  - went over
  - revolted
  - deserted
  lexicon: LSJ
  rationale: The verb denotes going over to the other side, defecting, or deserting.
    'Defected' best captures political/military realignment in concise English.
- source_word: ἡ χώρα
  chosen: the land
  alternatives:
  - the country
  - the region
  lexicon: LSJ
  rationale: χώρα can mean land, country, or region. Here it likely refers broadly
    to the territory/population of the countryside rather than a modern nation-state;
    'the land' preserves that breadth.
- source_word: μετʼ αὐτῶν
  chosen: with them
  alternatives:
  - to their side
  - along with them
  lexicon: LSJ
  rationale: The preposition μετά with genitive means 'with.' In context it indicates
    alignment with the same party as 'them'; the concise rendering keeps the Greek
    wording while allowing readers to infer political allegiance.
