id: 1MA.9.72
reference: 1 Maccabees 9:72
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέδωκεν αὐτῷ τὴν αἰχμαλωσίαν ἣν ᾐχμαλώτευσεν τὸ πρότερον ἐκ γῆς Ἰούδα,
    καὶ ἀποστρέψας ἀπῆλθεν εἰς τὴν γῆν αὐτοῦ, καὶ οὐ προσέθετο ἔτι ἐλθεῖν εἰς τὰ ὅρια
    αὐτῶν.
