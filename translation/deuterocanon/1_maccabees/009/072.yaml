translation:
  text: And he returned to him the captives whom he had formerly taken captive from
    the land of Judah, and he turned back and went away to his own land, and he no
    longer continued to come into their borders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally 'the captivity,' used here for the body of people taken
      captive; hence 'the captives.'
    reason: lexical_alternative
  - marker: b
    text: The Greek idiom 'did not add still to come' means that he did not come again
      or no longer kept coming into their territory.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέδωκεν
  chosen: returned
  alternatives:
  - gave back
  - restored
  lexicon: BDAG
  rationale: The verb denotes giving back what had been taken. 'Returned' is natural
    in English and fits the object 'the captives' without sounding overly formal.
- source_word: τὴν αἰχμαλωσίαν
  chosen: the captives
  alternatives:
  - the captivity
  - the prisoners of war
  lexicon: LSJ
  rationale: Although literally 'captivity/captive body,' in context it refers to
    the people taken away. 'The captives' communicates the concrete referent better
    than the abstract 'captivity.'
- source_word: ᾐχμαλώτευσεν
  chosen: had ... taken captive
  alternatives:
  - captured
  - had carried off
  lexicon: LSJ
  rationale: Using 'taken captive' preserves the lexical connection with αἰχμαλωσίαν
    and reflects the military sense of seizing people as captives.
- source_word: τὸ πρότερον
  chosen: formerly
  alternatives:
  - before
  - previously
  - earlier
  lexicon: BDAG
  rationale: This adverbial phrase marks prior time relative to the present action.
    'Formerly' is concise and idiomatic.
- source_word: γῆς Ἰούδα
  chosen: the land of Judah
  alternatives:
  - Judah
  - the country of Judah
  lexicon: LSJ
  rationale: The explicit 'land' should be preserved because γῆ is present in the
    Greek and gives geographic concreteness.
- source_word: ἀποστρέψας
  chosen: he turned back
  alternatives:
  - turning back
  - having turned back
  - he withdrew
  lexicon: BDAG
  rationale: The participle introduces the next movement. Rendering it verbally as
    'he turned back' keeps the sequence clear in English.
- source_word: ἀπῆλθεν εἰς τὴν γῆν αὐτοῦ
  chosen: went away to his own land
  alternatives:
  - went to his land
  - departed to his country
  lexicon: BDAG
  rationale: This preserves both the departure sense of ἀπῆλθεν and the possessive
    force of αὐτοῦ. 'Own land' is natural and sufficiently literal.
- source_word: οὐ προσέθετο ἔτι ἐλθεῖν
  chosen: he no longer continued to come
  alternatives:
  - he did not again come
  - he no longer came
  - he did not add any more to come
  lexicon: BDAG
  rationale: The idiom προστίθημι + infinitive means to continue or repeat an action.
    'He no longer continued to come' preserves the idiomatic force more closely than
    a bare 'he no longer came,' while remaining readable.
- source_word: τὰ ὅρια αὐτῶν
  chosen: their borders
  alternatives:
  - their territory
  - their region
  - their boundaries
  lexicon: LSJ
  rationale: ὅρια refers to territorial limits or borderlands. 'Borders' is concise
    and fits the military-political context.
