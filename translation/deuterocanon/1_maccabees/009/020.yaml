translation:
  text: And they mourned for him there, and all Israel mourned for him with great
    mourning, and they grieved for many days and said,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek uses repeated mourning language: first a verb for lamenting/mourning,
      then the noun ''great mourning,'' then a second verb meaning ''they grieved.''
      The English preserves this buildup rather than smoothing it away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκόψαντο
  chosen: mourned
  alternatives:
  - lamented
  - beat their breasts in mourning
  lexicon: LSJ
  rationale: The middle of κόπτω in mourning contexts refers to ritual lamentation
    or mourning. 'Mourned' gives clear modern English, while the repeated use preserves
    the Greek repetition. More explicit physical renderings such as 'beat their breasts'
    are possible but would over-specify beyond what the immediate English context
    requires.
- source_word: αὐτόν
  chosen: him
  lexicon: Greek grammar
  rationale: The pronoun refers back to Judas in the preceding context; 'him' is the
    natural English rendering.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: LSJ
  rationale: A straightforward locative adverb; 'there' is idiomatic and sufficiently
    precise.
- source_word: πᾶς Ἰσραήλ
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: LSJ
  rationale: This is a collective national expression. 'All Israel' is the standard
    and natural rendering in biblical English and preserves the corporate sense.
- source_word: κοπετὸν μέγαν
  chosen: with great mourning
  alternatives:
  - a great lamentation
  - great mourning rites
  lexicon: LSJ
  rationale: κοπετός denotes lamentation/mourning, cognate with the preceding verb.
    Rendering it as 'with great mourning' preserves the intensifying construction
    without sounding archaic. 'A great lamentation' is possible, but the chosen phrase
    better reflects the verbal-nominal repetition in Greek.
- source_word: ἔπενθουν
  chosen: they grieved
  alternatives:
  - they mourned
  - they lamented
  lexicon: LSJ
  rationale: πενθέω overlaps with mourning language but is distinct from the earlier
    ἐκόψαντο. 'They grieved' preserves some lexical variation in English corresponding
    to the Greek shift while keeping the sense of bereavement.
- source_word: ἡμέρας πολλὰς
  chosen: for many days
  alternatives:
  - many days
  lexicon: LSJ
  rationale: Accusative of duration; 'for many days' is idiomatic English.
- source_word: καὶ εἶπαν
  chosen: and said,
  alternatives:
  - and they said,
  lexicon: LSJ
  rationale: The clause introduces the following quotation in the next verse, so the
    translation retains the connective and terminal comma.
