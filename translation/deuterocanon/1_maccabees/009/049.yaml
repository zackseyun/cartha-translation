translation:
  text: And about a thousand men fell with Bacchides on that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a thousand men fell on Bacchides’ side that day.' The Greek phrase with
      παρά may indicate association with Bacchides rather than direct agency.
    reason: lexical_alternative
lexical_decisions:
- source_word: διέπεσαν
  chosen: fell
  alternatives:
  - were slain
  - fell in battle
  lexicon: LSJ
  rationale: The verb literally means 'fell' and in battle context idiomatically denotes
    death in combat. 'Fell' preserves the Greek imagery while remaining natural English;
    the military sense is clear from context.
- source_word: παρὰ Βακχίδα
  chosen: beside Bacchides
  alternatives:
  - at the hands of Bacchides
  - on Bacchides' side
  - near Bacchides
  lexicon: LSJ
  rationale: παρά with the accusative can indicate motion or relation 'alongside/beside';
    in this battle summary it most naturally marks those falling on Bacchides' side
    or in connection with him. 'Beside Bacchides' stays close to the Greek while leaving
    the exact nuance open. 'At the hands of Bacchides' would overinterpret agency
    not explicitly marked.
- source_word: τῇ ἡμέρᾳ ἐκείνῃ
  chosen: on that day
  alternatives:
  - that day
  lexicon: LSJ
  rationale: Standard temporal dative expression; 'on that day' is straightforward
    and idiomatic.
- source_word: εἰς χιλίους ἄνδρας
  chosen: about a thousand men
  alternatives:
  - to a thousand men
  - a thousand men
  lexicon: LSJ
  rationale: The construction with εἰς plus numeral can express extent/total, approximately
    'to the number of a thousand.' 'About a thousand men' conveys the idiomatic force
    better than a wooden 'to a thousand men.'
