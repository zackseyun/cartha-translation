translation:
  text: And all the friends of Judas gathered together and said to Jonathan,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠθροίσθησαν
  chosen: gathered together
  alternatives:
  - were assembled
  - came together
  lexicon: LSJ
  rationale: Aorist passive of ἀθροίζω in an intransitive/middle-like sense; 'gathered
    together' is natural English and preserves the collective assembling action without
    overformal stiffness.
- source_word: πάντες
  chosen: all
  alternatives:
  - every one of
  lexicon: LSJ
  rationale: Straightforward distributive/collective force; 'all' best matches the
    Greek succinctly.
- source_word: οἱ φίλοι
  chosen: the friends
  alternatives:
  - the companions
  - the supporters
  - the allies
  lexicon: LSJ
  rationale: The noun φίλοι literally means 'friends.' In 1 Maccabees it can carry
    a political/supporter nuance, but here the plain relational term is appropriate
    and should not be expanded beyond the text.
- source_word: Ἰούδου
  chosen: of Judas
  alternatives:
  - belonging to Judas
  lexicon: LSJ
  rationale: Genitive dependent on 'friends'; standard possessive/associative rendering.
- source_word: εἶπον
  chosen: said
  alternatives:
  - spoke
  lexicon: LSJ
  rationale: Default rendering of λέγω in narrative; concise and idiomatic.
- source_word: τῷ Ἰωναθάν
  chosen: to Jonathan
  alternatives:
  - to Jonathan
  lexicon: LSJ
  rationale: Dative indirect object; standard transliteration of the personal name.
