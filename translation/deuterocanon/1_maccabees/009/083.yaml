theological_decisions:
- issue: Meaning of σωθῆναι in a military-flight context
  chosen_reading: physical rescue/safety
  alternative_readings:
  - spiritual salvation in a religious sense
  rationale: The narrative context is military retreat into a pagan sanctuary. The
    infinitive therefore refers to seeking protection or escape, not theological salvation.
  doctrine_reference: Preserve contextual sense without importing doctrinal claims
    the text does not make.
