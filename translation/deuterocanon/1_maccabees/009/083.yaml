id: 1MA.9.83
reference: 1 Maccabees 9:83
source:
  edition: lxx-swete-1909
  text: Ἄζωτον, καὶ εἰσῆλθον εἰς Βηθδαγὼν τὸ εἴδωλον αὐτῶν τοῦ σωθῆναι. καὶ ἐνεπύρισεν
    Ἰωναθὰν τὴν Ἄζωτον καὶ τὰς πόλεις τὰς κύκλῳ
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: to Azotus, and they entered Beth-dagon, their idol temple, to be saved. And
    Jonathan burned Azotus and the cities around it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Azotus is the Greek name for Ashdod.
    reason: lexical_alternative
  - marker: b
    text: Or possibly, more literally, 'their idol'; the Greek likely refers to the
      idol sanctuary at Beth-dagon rather than only to a statue.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄζωτον
  chosen: Azotus
  alternatives:
  - Ashdod
  lexicon: LSJ
  rationale: The Greek form is a Hellenized place name. Standard transliteration policy
    favors preserving the Greek name in a Greek-source deuterocanonical book, though
    'Ashdod' is the Hebrew equivalent and worth noting as an alternative.
- source_word: εἰσῆλθον
  chosen: they entered into
  alternatives:
  - they went into
  - they entered
  lexicon: BDAG
  rationale: A straightforward aorist of motion. 'Entered into' preserves the directional
    force toward Beth-dagon without unnecessary paraphrase.
- source_word: Βηθδαγὼν
  chosen: Beth-dagon
  alternatives:
  - the house of Dagon
  - Bethdagon
  lexicon: LSJ
  rationale: As a place/building name, transliteration best fits project policy. Because
    the following apposition explains its function, a full translation 'house of Dagon'
    is not necessary in the main text.
- source_word: τὸ εἴδωλον αὐτῶν
  chosen: their idol temple
  alternatives:
  - their idol
  - their image
  - the idol of theirs
  lexicon: LSJ
  rationale: Literally the phrase is 'their idol,' but in context with 'entered into
    Beth-dagon' it refers to the idol sanctuary/temple complex rather than merely
    a statue. Rendering it 'idol temple' makes the sense intelligible in English while
    staying anchored to εἴδωλον.
- source_word: τοῦ σωθῆναι
  chosen: to be saved
  alternatives:
  - for safety
  - to escape
  - to be delivered
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose. 'To be saved' is the most
    direct rendering of σωθῆναι here, in the concrete sense of seeking rescue/safety
    rather than theological salvation.
- source_word: ἐνεπύρισεν
  chosen: burned
  alternatives:
  - set on fire
  - burned down
  lexicon: LSJ
  rationale: The verb denotes setting ablaze. 'Burned' is concise and natural; 'burned
    down' would overstate total destruction beyond what the verb itself explicitly
    says.
- source_word: τὰς πόλεις τὰς κύκλῳ
  chosen: the cities around it
  alternatives:
  - the surrounding cities
  - the cities round about
  lexicon: LSJ
  rationale: The phrase denotes nearby surrounding towns. 'Around it' makes explicit
    the relation to Azotus in idiomatic English.
