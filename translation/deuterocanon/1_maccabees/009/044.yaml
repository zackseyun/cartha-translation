translation:
  text: And Jonathan said to his brothers, “Let us rise now and fight for our lives,
    for today is not as yesterday and the day before.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, “not as yesterday and the third day,” an idiom meaning
      “not as yesterday and the day before.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναστῶμεν
  chosen: Let us rise
  alternatives:
  - Let us get up
  - Let us stand up
  lexicon: LSJ
  rationale: Aorist subjunctive in a hortatory sense. 'Let us rise' preserves the
    force and military urgency without over-interpreting it as merely physical standing.
- source_word: πολεμήσωμεν
  chosen: fight
  alternatives:
  - make war
  - do battle
  lexicon: LSJ
  rationale: The verb denotes engaging in battle. 'Fight' is idiomatic modern English
    and fits the immediate exhortation.
- source_word: ὑπὲρ τῶν ψυχῶν ἡμῶν
  chosen: for our lives
  alternatives:
  - for our souls
  - for ourselves
  lexicon: LSJ
  rationale: In this battle context, ψυχή refers to life rather than the immaterial
    soul. 'For our lives' best conveys the sense of fighting for survival.
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: LSJ
  rationale: Straightforward temporal adverb; 'today' is natural modern English.
- source_word: ὡς ἐχθὲς καὶ τρίτην ἡμέραν
  chosen: as yesterday and the day before
  alternatives:
  - as yesterday and the third day
  - as yesterday and the previous day
  lexicon: LSJ
  rationale: The idiom contrasts the present situation with the preceding two days.
    In English, 'yesterday and the day before' communicates the temporal reference
    clearly; a more literal 'third day' would be obscure here.
- source_word: ἀδελφοῖς
  chosen: brothers
  alternatives:
  - brothers and companions
  - kinsmen
  lexicon: LSJ
  rationale: The Greek explicitly uses the masculine familial term. Per translation
    philosophy, gender-accurate rendering is preferred; here it likely refers to his
    fellow Jewish fighters, including literal or close fraternal associates, and 'brothers'
    preserves the source wording.
