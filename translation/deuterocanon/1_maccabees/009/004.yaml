translation:
  text: And they set out and went to Berea with twenty thousand men and two thousand
    horsemen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'two thousand horses'; the phrase likely refers to mounted
      troops, hence 'horsemen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆραν
  chosen: set out
  alternatives:
  - broke camp
  - departed
  - marched out
  lexicon: LSJ
  rationale: The verb here idiomatically marks departure or breaking camp. 'Set out'
    is natural modern English and preserves the narrative movement without over-specifying
    military encampment.
- source_word: ἐπορεύθησαν
  chosen: went
  alternatives:
  - marched
  - traveled
  lexicon: LSJ
  rationale: A common verb of going/journeying. 'Went' keeps the wording straightforward;
    'marched' is possible in military context but would add nuance not explicit in
    the verb itself.
- source_word: εἰς Βερέαν
  chosen: to Berea
  alternatives:
  - into Berea
  lexicon: LSJ
  rationale: Standard directional rendering of εἰς with a place name. The proper name
    is transliterated in keeping with project policy for names.
- source_word: ἐν εἴκοσι χιλιάσιν ἀνδρῶν
  chosen: with twenty thousand men
  alternatives:
  - among twenty thousand men
  - in twenty thousand men
  lexicon: LSJ
  rationale: Although ἐν is literally 'in,' in this construction it expresses accompanying
    force strength. 'With twenty thousand men' is idiomatic English and fits the military
    census context.
- source_word: δισχιλίοις ἵπποις
  chosen: two thousand horsemen
  alternatives:
  - two thousand cavalry
  - two thousand horses
  lexicon: LSJ
  rationale: Literally 'two thousand horses,' but in military narrative this metonymically
    denotes mounted troops. 'Horsemen' communicates the force composition clearly
    in English without the awkwardness of counting animals when troops are intended.
