translation:
  text: And Bacchides saw that Alcimus had died, and he returned to the king, and
    the land of Judah was quiet for two years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἶδεν
  chosen: saw
  alternatives:
  - learned
  - realized
  lexicon: LSJ
  rationale: The aorist of ὁράω literally means 'saw,' but in narrative can extend
    to 'perceived/learned.' Here the direct object clause ὅτι ἀπέθανεν makes 'saw
    that' acceptable idiomatic English while staying close to the Greek.
- source_word: ἀπέθανεν
  chosen: had died
  alternatives:
  - died
  - was dead
  lexicon: LSJ
  rationale: English past perfect fits the sequence after Bacchides became aware of
    Alcimus's death. The Greek aorist simply states the event; 'had died' clarifies
    temporal relation in natural English without adding content.
- source_word: ἀπέστρεψεν
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: LSJ
  rationale: The verb means 'turned back/returned.' 'Returned' is the most natural
    concise rendering with πρὸς τὸν βασιλέα indicating destination.
- source_word: πρὸς τὸν βασιλέα
  chosen: to the king
  alternatives:
  - toward the king
  - back to the king
  lexicon: LSJ
  rationale: πρός with accusative here marks movement toward a person; idiomatic English
    is 'to the king.'
- source_word: ἡσύχασεν
  chosen: was quiet
  alternatives:
  - was at rest
  - was undisturbed
  - had peace
  lexicon: LSJ
  rationale: The verb denotes being quiet or at rest. 'Was quiet' preserves the understated
    political calm of the Greek without importing the fuller theological sense of
    'peace' unless context demands it.
- source_word: ἡ γῆ Ἰούδα
  chosen: the land of Judah
  alternatives:
  - the land of Judea
  - Judah
  lexicon: LSJ
  rationale: γῆ is explicitly 'land.' Retaining 'Judah' rather than 'Judea' follows
    the Greek form Ἰούδα and keeps continuity with biblical territorial language.
- source_word: ἔτη δύο
  chosen: for two years
  alternatives:
  - two years
  lexicon: LSJ
  rationale: English requires 'for' to express duration naturally, though the Greek
    accusative of extent is simply 'two years.'
