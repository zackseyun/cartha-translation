lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - then
  - so
  lexicon: LSJ
  rationale: Standard connective; simple coordination is sufficient and preserves
    the terse narrative style.
- source_word: κατέπαυσεν
  chosen: ceased
  alternatives:
  - stopped
  - came to rest
  - was brought to an end
  lexicon: LSJ
  rationale: The aorist of καταπαύω here denotes cessation. 'Ceased' is concise and
    idiomatic in English, matching the abrupt summary style of the Greek.
- source_word: ῥομφαία
  chosen: the sword
  alternatives:
  - the slaughter
  - the warfare
  - the blade
  lexicon: LSJ
  rationale: ῥομφαία literally denotes a sword, often a large sword. In context it
    functions metonymically for armed violence or war, but the Greek uses the concrete
    noun. 'The sword' preserves the source image while allowing the idiomatic sense
    of warfare ceasing.
