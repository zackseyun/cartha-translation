translation:
  text: And they kept seeking out and searching for the friends of Judas, and they
    were bringing them to Bacchides, and he took vengeance on them and mocked them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the supporters/allies of Judas.' The Greek literally says 'the friends
      of Judas,' which can also denote political or military adherents in context.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb can mean 'punished,' 'exacted justice from,' or 'took vengeance
      on.' The chosen rendering reflects the hostile, retributive sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεζήτουν
  chosen: kept seeking out
  alternatives:
  - were seeking
  - searched for
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated action; 'kept seeking out'
    conveys persistent pursuit better than a simple past.
- source_word: ἐξηραύνων
  chosen: searching for
  alternatives:
  - investigating
  - tracking down
  lexicon: BDAG
  rationale: Paired with ἐξεζήτουν, this intensifies the idea of active investigation.
    'Searching for' is natural English and preserves the overlap without over-paraphrasing.
- source_word: τοὺς φίλους Ἰούδου
  chosen: the friends of Judas
  alternatives:
  - the supporters of Judas
  - Judas's allies
  lexicon: LSJ
  rationale: φίλοι literally means 'friends,' but in political/military context can
    imply adherents or allies. The main text keeps the literal rendering; the broader
    sense is preserved as an alternative.
- source_word: ἦγον
  chosen: they were bringing
  alternatives:
  - they brought
  - they led
  lexicon: BDAG
  rationale: The imperfect again suggests repeated action. 'Bringing' fits the context
    of delivering captives to Bacchides.
- source_word: πρὸς Βακχίδην
  chosen: to Bacchides
  alternatives:
  - before Bacchides
  - into the presence of Bacchides
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward a person. 'To Bacchides'
    is concise and contextually sufficient.
- source_word: ἐξεδίκα
  chosen: he took vengeance on
  alternatives:
  - he punished
  - he exacted justice from
  lexicon: LSJ
  rationale: The verb carries the sense of exacting justice or vengeance. In this
    hostile narrative context, 'took vengeance on' best reflects the punitive force
    without softening it to neutral judicial language.
- source_word: ἐνέπαιζον αὐτοῖς
  chosen: mocked them
  alternatives:
  - made sport of them
  - abused them
  lexicon: BDAG
  rationale: The verb denotes derision or making sport of someone. 'Mocked them' is
    idiomatic modern English and preserves the humiliating aspect.
