translation:
  text: And Demetrius heard that Nicanor and his forces had made war, and he proceeded
    to send Bacchides and Alcimus into the land of Judah a second time, and the right
    wing with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the right horn'; in military usage this refers to the right
      wing or flank of the army.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - was informed
  lexicon: BDAG
  rationale: A straightforward past narrative verb; 'heard' preserves the simple report
    without adding interpretive nuance.
- source_word: ἐποίησεν ... πόλεμον
  chosen: had made war
  alternatives:
  - waged war
  - made battle
  lexicon: LSJ
  rationale: The idiom literally means 'made war.' 'Had made war' keeps the Greek
    construction's force while fitting English narrative sequence after 'heard that.'
- source_word: αἱ δυνάμεις αὐτοῦ
  chosen: his forces
  alternatives:
  - his army
  - his troops
  lexicon: LSJ
  rationale: δυνάμεις can denote military forces broadly. 'Forces' is slightly more
    literal and leaves the scope open without over-specifying a formal army unit.
- source_word: προσέθετο ... ἀποστεῖλαι
  chosen: he proceeded to send
  alternatives:
  - he sent again
  - he added to send
  - he undertook to send
  lexicon: BDAG
  rationale: προστίθημι with an infinitive commonly means to continue or proceed to
    do something. 'Proceeded to send' captures the idiom better than a wooden 'added
    to send' while preserving the sense of renewed action.
- source_word: ἐκ δευτέρου
  chosen: a second time
  alternatives:
  - again
  - for the second time
  lexicon: LSJ
  rationale: The phrase explicitly marks repetition. 'A second time' is clear modern
    English and preserves the numerical force better than simply 'again.'
- source_word: γῆν Ἰούδα
  chosen: the land of Judah
  alternatives:
  - Judea
  - the land of Judea
  lexicon: LSJ
  rationale: The Greek is literally 'land of Judah.' This avoids importing the later
    conventional regional name 'Judea' where the source uses the older ethnic-geographic
    expression.
- source_word: τὸ δεξιὸν κέρας
  chosen: the right wing
  alternatives:
  - the right horn
  - the right flank
  lexicon: LSJ
  rationale: Although κέρας literally means 'horn,' in military context it refers
    to a wing or flank of an army. 'Right wing' is the most natural military equivalent
    in English.
