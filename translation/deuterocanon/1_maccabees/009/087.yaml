id: 1MA.9.87
reference: 1 Maccabees 9:87
source:
  edition: lxx-swete-1909
  text: στρεψεν Ἰωναθὰν σὺν τοῖς παρʼ αὐτοῦ ἔχοντες σκῦλα πολλά.
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: Jonathan returned with those who were with him, carrying much plunder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turned back ... having many spoils.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στρεψεν
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: LSJ
  rationale: Aorist of στρέφω in this narrative context denotes returning/backtracking
    rather than merely turning. 'Returned' is idiomatic English and preserves the
    movement sense.
- source_word: σὺν τοῖς παρʼ αὐτοῦ
  chosen: with those who were with him
  alternatives:
  - with his men
  - together with those around him
  lexicon: LSJ
  rationale: The phrase is literally 'with those from/beside him,' referring to Jonathan's
    accompanying group. 'Those who were with him' stays close to the Greek without
    over-specifying them as soldiers, though that may be implied by context.
- source_word: ἔχοντες
  chosen: carrying
  alternatives:
  - having
  - bringing
  lexicon: LSJ
  rationale: The participle modifies Jonathan and his companions and indicates attendant
    circumstance. 'Carrying' expresses possession of physical spoil in natural English
    better than the bare 'having.'
- source_word: σκῦλα πολλά
  chosen: much plunder
  alternatives:
  - many spoils
  - a great deal of booty
  lexicon: LSJ
  rationale: σκῦλα refers to spoils taken in conflict. 'Plunder' is clear modern English
    and avoids the awkward plural 'spoils'; 'booty' can sound dated or misleading
    in contemporary usage. πολλά is rendered by 'much' to reflect quantity.
