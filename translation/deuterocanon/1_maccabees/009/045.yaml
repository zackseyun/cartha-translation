  text: ἰδοὺ γὰρ ὁ πόλεμος ἐξ ἐναντίας ἡμῶν καὶ ἐξόπισθεν ἡμῶν· τὸ δὲ ὕδωρ τοῦ Ἰορδάνου
    ἔνθεν καὶ ἔνθεν καὶ ἕλος καὶ δρυμός, καὶ οὐκ ἔστι τόπος τοῦ ἐκκλῖναι.
