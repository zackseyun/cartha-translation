translation:
  text: And Simon and those with him went out from the city and set fire to the siege
    engines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the engines” or “the machines”; in context these are
      military devices used in the attack on the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ μετʼ αὐτοῦ
  chosen: those with him
  alternatives:
  - his men
  - those who were with him
  lexicon: LSJ
  rationale: A natural rendering of the substantivized phrase that preserves the Greek's
    broad reference to Simon's companions without specifying military status more
    narrowly than the text does.
- source_word: ἐξῆλθον ἐκ τῆς πόλεως
  chosen: went out from the city
  alternatives:
  - came out of the city
  - went out of the city
  lexicon: LSJ
  rationale: Keeps the movement explicit and closely follows the Greek prepositional
    phrase. 'From the city' is idiomatic and sufficiently formal.
- source_word: ἐνεπύρισαν
  chosen: set fire to
  alternatives:
  - burned
  - kindled against
  lexicon: LSJ
  rationale: The verb denotes setting something on fire. 'Set fire to' is clear modern
    English and slightly more explicit than simply 'burned,' which can describe either
    the act or the resulting state.
- source_word: τὰς μηχανάς
  chosen: the siege engines
  alternatives:
  - the machines
  - the war engines
  - the engines
  lexicon: LSJ
  rationale: In this military context μηχαναί refers to engines or contrivances used
    in siege warfare, not generic machines. 'Siege engines' communicates the historical
    sense clearly for modern readers.
