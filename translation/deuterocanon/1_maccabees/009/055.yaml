theological_decisions:
- issue: Nature of Alcimus's affliction
  chosen_reading: Rendered as a severe disabling affliction without specifying divine
    causation beyond the text.
  alternative_readings:
  - Interpreting the stroke explicitly as divine judgment
  - Rendering more medically as a stroke or seizure
  rationale: The Greek describes what happened to Alcimus in a sequence of passive
    verbs but does not explicitly name God as agent in this verse or identify a precise
    medical condition. The translation preserves the event's severity without importing
    a theological or medical explanation not stated here.
  doctrine_reference: Preserve theological tension rather than resolve it.
