translation:
  text: At that time Alcimus was struck down, and his works were hindered; his mouth
    was stopped up, and he was paralyzed, and he could no longer speak a word or give
    orders concerning his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his household' or 'his affairs'; Greek 'house' (οἶκος) can refer to
      the household establishment, not only the physical building.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλήγη
  chosen: was struck down
  alternatives:
  - was afflicted
  - was struck
  - was smitten
  lexicon: LSJ
  rationale: Aorist passive of πλήσσω/πλήττω can denote being struck or afflicted
    by a disabling blow or judgment. 'Was struck down' captures both the suddenness
    and the severe incapacitation implied by the following clauses without over-specifying
    the cause.
- source_word: ἐνεποδίσθη
  chosen: were hindered
  alternatives:
  - were impeded
  - were obstructed
  - were brought to a halt
  lexicon: LSJ
  rationale: The passive indicates that his activities were checked or obstructed.
    'Were hindered' is natural English and preserves the sense without adding a stronger
    finality than the Greek itself states.
- source_word: τὰ ἔργα αὐτοῦ
  chosen: his works
  alternatives:
  - his deeds
  - his activities
  - his undertakings
  lexicon: LSJ
  rationale: ἔργα is broad. Here it likely refers to his ongoing actions or projects
    rather than moral 'deeds' in an abstract sense. 'His works' stays close to the
    Greek while remaining intelligible in context.
- source_word: ἀπεφράγη τὸ στόμα αὐτοῦ
  chosen: his mouth was stopped up
  alternatives:
  - his mouth was shut
  - his speech was blocked
  - his mouth was closed
  lexicon: LSJ
  rationale: The verb ἀποφράσσω literally conveys stopping up or blocking. Rendering
    the image concretely preserves the vivid physical sense that explains why he could
    not speak.
- source_word: παρελύθη
  chosen: he was paralyzed
  alternatives:
  - he became disabled
  - he was incapacitated
  - he was weakened
  lexicon: LSJ
  rationale: παραλύω commonly denotes paralysis or severe physical disablement. 'He
    was paralyzed' best matches the ordinary force of the verb and coheres with the
    surrounding description of speech loss and incapacity.
- source_word: οὐκ ἠδύνατο ἔτι λαλῆσαι λόγον
  chosen: he could no longer speak a word
  alternatives:
  - he was no longer able to say anything
  - he could not speak further
  lexicon: LSJ
  rationale: The idiom λαλῆσαι λόγον is naturally rendered 'speak a word.' Including
    'no longer' reflects ἔτι in context.
- source_word: ἐντείλασθαι
  chosen: give orders
  alternatives:
  - command
  - issue instructions
  - direct
  lexicon: LSJ
  rationale: The middle infinitive here refers to giving commands or instructions.
    'Give orders' is idiomatic and fits the domestic-administrative context.
- source_word: περὶ τοῦ οἴκου αὐτοῦ
  chosen: concerning his house
  alternatives:
  - about his household
  - regarding his affairs
  - concerning his household
  lexicon: LSJ
  rationale: οἶκος can mean house, household, or family establishment. In this context
    of giving orders, 'his house' preserves the Greek term while allowing the broader
    household sense to be heard.
