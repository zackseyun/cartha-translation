id: 1MA.9.88
reference: 1 Maccabees 9:88
source:
  edition: lxx-swete-1909
  text: καὶ ἐγένετο ὡς ἤκουσεν Ἀλέξανδρος ὁ βασιλεὺς τοὺς λόγους τούτους, καὶ προσέθετο
    δοξάσαι τὸν Ἰωναθάν. καὶ ἀπέστειλεν αὐτῷ πόρπην
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: And it happened that when Alexander the king heard these words, he continued
    to honor Jonathan, and he sent him a clasp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a brooch' or 'a buckle'; the Greek term denotes a fastening ornament.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ὡς
  chosen: And it happened that when
  alternatives:
  - And when
  - Now when it happened that
  lexicon: LSJ
  rationale: The formula introduces a narrative development. Rendering both ἐγένετο
    and ὡς preserves the Greek's event-transition force without becoming overly wooden.
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - listened to
  lexicon: BDAG
  rationale: A straightforward auditory/report verb fits the context of receiving
    a message.
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - this message
  - these matters
  lexicon: LSJ
  rationale: λόγοι can mean words, message, or matters. 'These words' stays closer
    to the Greek while still making sense in context.
- source_word: προσέθετο
  chosen: went on to
  alternatives:
  - continued to
  - proceeded to
  - added to
  lexicon: LSJ
  rationale: The idiom προστίθημι with an infinitive commonly means to continue or
    proceed to do something. 'Went on to' is natural modern English and preserves
    the sequential sense.
- source_word: δοξάσαι
  chosen: honor
  alternatives:
  - glorify
  - show honor to
  lexicon: LSJ
  rationale: In this royal-political context, the sense is best captured by 'honor'
    rather than the more theologically loaded 'glorify.'
- source_word: πόρπην
  chosen: a clasp
  alternatives:
  - a brooch
  - a buckle
  - a fastening ornament
  lexicon: LSJ
  rationale: πόρπη denotes a fastening ornament such as a clasp or brooch. 'Clasp'
    is concise and sufficiently general without over-specifying the object's form.
