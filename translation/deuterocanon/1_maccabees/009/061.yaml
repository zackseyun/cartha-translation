theological_decisions:
- issue: Shift from plural to singular subject in the final clause
  chosen_reading: 'Retain the singular in English: ''and he killed them.'''
  alternative_readings:
  - 'Smooth to plural: ''and they killed them'''
  rationale: The Greek text has a clear number shift from συνέλαβον ('they seized')
    to ἀπέκτεινεν ('he killed'). Since the source confidence is high and there is
    no supplied textual warning, the translation preserves the grammatical tension
    rather than harmonizing it away. The singular likely refers back to the principal
    leader in context, but the translation does not over-specify.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
