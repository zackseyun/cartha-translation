lexical_decisions:
- source_word: συνέλαβον
  chosen: seized
  alternatives:
  - captured
  - arrested
  lexicon: BDAG
  rationale: The verb denotes taking hold of persons. 'Seized' is direct and natural
    English, preserving the force without implying a formal legal process as 'arrested'
    might.
- source_word: ἀπὸ τῶν ἀνδρῶν τῆς χώρας
  chosen: from the men of the country
  alternatives:
  - from the men of the land
  - from the people of the countryside
  lexicon: LSJ
  rationale: ἀπό marks selection out from a larger group, and χώρα commonly means
    country/land/region. 'Men of the country' stays close to the Greek and preserves
    the masculine reference.
- source_word: τῶν ἀρχηγῶν
  chosen: leaders
  alternatives:
  - chiefs
  - ringleaders
  lexicon: LSJ
  rationale: ἀρχηγός here refers to leading figures. 'Leaders' is the most straightforward
    rendering; 'ringleaders' is interpretive and more pejorative than the Greek itself.
- source_word: τῆς κακίας
  chosen: of the evil
  alternatives:
  - of wickedness
  - of the wrongdoing
  lexicon: LSJ
  rationale: κακία can denote evil, wickedness, or malice. 'Of the evil' reflects
    the genitive construction closely, though it refers to their evil activity or
    faction rather than abstract evil alone.
- source_word: εἰς πεντήκοντα ἄνδρας
  chosen: fifty men
  alternatives:
  - to the number of fifty men
  - about fifty men
  lexicon: LSJ
  rationale: The phrase gives the total number seized. Smooth English omits a wooden
    reproduction of εἰς while preserving the count exactly.
- source_word: ἀπέκτεινεν
  chosen: killed
  alternatives:
  - put to death
  - executed
  lexicon: BDAG
  rationale: The singular verb means 'he killed.' 'Killed' is the basic sense and
    avoids importing judicial nuance that 'executed' might suggest.
