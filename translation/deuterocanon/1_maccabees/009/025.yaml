translation:
  text: And Bacchides chose wicked men and appointed them rulers over the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lords of the land.' The Greek literally uses a term meaning 'lords'
      or 'masters,' but here it likely refers to political authorities.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέλεξεν
  chosen: chose
  alternatives:
  - selected
  - picked out
  lexicon: LSJ
  rationale: A straightforward past-tense rendering of the aorist verb meaning to
    choose or select. 'Chose' is natural modern English and preserves the directness
    of the Greek.
- source_word: Βακχίδης
  chosen: Bacchides
  rationale: Personal names are transliterated rather than translated, following project
    philosophy.
- source_word: τοὺς ἀσεβεῖς ἄνδρας
  chosen: wicked men
  alternatives:
  - ungodly men
  - impious men
  - evil men
  lexicon: LSJ
  rationale: ἀσεβεῖς denotes impious or ungodly people; in this political-moral context
    'wicked' communicates moral corruption clearly. ἄνδρας is explicitly masculine
    and refers to men, so the translation preserves that gendered reference rather
    than neutralizing it.
- source_word: κατέστησεν
  chosen: appointed
  alternatives:
  - installed
  - set
  lexicon: LSJ
  rationale: The verb here means to put or establish someone in an office or position.
    'Appointed' best conveys formal placement into authority in readable English.
- source_word: κυρίους
  chosen: rulers
  alternatives:
  - lords
  - masters
  lexicon: LSJ
  rationale: Although the noun is literally 'lords/masters,' in this administrative
    context it refers to those exercising authority over a territory. 'Rulers' communicates
    the functional sense without importing feudal or household connotations that 'lords'
    or 'masters' might suggest in English.
- source_word: τῆς χώρας
  chosen: over the land
  alternatives:
  - of the country
  - over the region
  lexicon: LSJ
  rationale: χώρα can mean land, country, or region. 'The land' is concise and fits
    the political-territorial sense here; rendering with 'over' reflects the English
    idiom required by 'appointed them rulers.'
