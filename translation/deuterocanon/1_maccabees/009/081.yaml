id: 1MA.9.81
reference: 1 Maccabees 9:81
source:
  edition: lxx-swete-1909
  text: ὑστήκει καθὼς ἐπέταξεν Ἰωναθάν, καὶ ἐκοπίασαν οἱ ἵπποι αὐτῶν. καὶ ἐξέλυσεν
    Σίμων τὴν δύναμιν αὐτοῦ, καὶ συνῆψεν πρὸς τὴν
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: it stood as Jonathan had commanded, and their horses grew weary. Then Simon
    deployed his force and joined battle with the
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek source provided for this verse ends mid-sentence at 'the' (τὴν).
      The translation preserves that incompleteness rather than reconstructing the
      missing continuation from other editions or translations.
    reason: textual_variant
lexical_decisions:
- source_word: ὑστήκει
  chosen: it stood
  alternatives:
  - he stood
  - it remained in position
  lexicon: LSJ
  rationale: Imperfect/pluperfect-like form of ὑστήκω conveys being in a standing
    or fixed position. Because the subject is not explicit in the surviving clause
    and the neuter/collective sense is possible from context, 'it stood' preserves
    the Greek's ambiguity better than specifying a personal subject.
- source_word: καθὼς ἐπέταξεν
  chosen: as Jonathan had commanded
  alternatives:
  - just as Jonathan ordered
  - as Jonathan instructed
  lexicon: BDAG
  rationale: καθώς marks correspondence ('as/just as'), and ἐπιτάσσω commonly means
    command or order. 'Had commanded' fits the prior action relative to the standing
    position.
- source_word: ἐκοπίασαν
  chosen: grew weary
  alternatives:
  - became tired
  - were exhausted
  lexicon: BDAG
  rationale: κοπιάω can denote becoming weary from exertion. 'Grew weary' is natural
    English and preserves the process/result nuance without overstating total exhaustion.
- source_word: οἱ ἵπποι αὐτῶν
  chosen: their horses
  alternatives:
  - the horses belonging to them
  lexicon: LSJ
  rationale: Straightforward possessive construction; no reason to expand beyond the
    Greek.
- source_word: ἐξέλυσεν
  chosen: deployed
  alternatives:
  - led out
  - set in motion
  - released
  lexicon: LSJ
  rationale: Literally 'loosed out' or 'sent forth.' In military context with τὴν
    δύναμιν, 'deployed' captures the tactical sense in idiomatic English better than
    the more wooden 'loosed' or potentially misleading 'released'.
- source_word: τὴν δύναμιν αὐτοῦ
  chosen: his force
  alternatives:
  - his army
  - his troops
  lexicon: BDAG
  rationale: δύναμις in historical narrative often refers to military force. 'Force'
    is broad enough to preserve the Greek while fitting the military setting.
- source_word: συνῆψεν πρὸς
  chosen: joined battle with
  alternatives:
  - engaged with
  - joined with against
  lexicon: LSJ
  rationale: συνάπτω with πρός in battle narrative can mean engage or join battle.
    'Joined battle with' makes the military sense explicit and natural in English.
- source_word: τὴν
  chosen: the
  lexicon: Greek article
  rationale: The verse as supplied ends mid-phrase at τὴν, indicating the source line
    is incomplete in this excerpt. The English likewise ends unfinished to reflect
    the extant Zone 1 wording rather than reconstructing beyond the witness.
