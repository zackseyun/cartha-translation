translation:
  text: And Jonathan and those with him jumped into the Jordan and swam across to
    the other side, and they did not cross the Jordan after them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they did not cross the Jordan after them' or 'to attack them.' The Greek
      phrase is compressed and can indicate hostile movement toward Jonathan's group.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεπήδησεν
  chosen: jumped into
  alternatives:
  - leaped into
  - sprang into
  lexicon: LSJ
  rationale: The verb denotes a sudden jump or leap. 'Jumped into' is natural modern
    English and preserves the abrupt action better than a flatter 'entered.'
- source_word: οἱ μετ᾿ αὐτοῦ
  chosen: those with him
  alternatives:
  - his companions
  - the men with him
  lexicon: LSJ
  rationale: The phrase is semantically broad and does not explicitly specify 'men'
    in the Greek. 'Those with him' stays close to the source while remaining natural.
- source_word: διεκολύμβησαν
  chosen: swam across
  alternatives:
  - crossed by swimming
  - swam over
  lexicon: LSJ
  rationale: The compound verb specifically indicates crossing by swimming. 'Swam
    across' is concise and preserves the manner of crossing.
- source_word: εἰς τὸ πέραν
  chosen: to the other side
  alternatives:
  - across
  - to the far side
  lexicon: LSJ
  rationale: This idiom refers to reaching the opposite bank. 'To the other side'
    is the clearest idiomatic English rendering.
- source_word: οὐ διέβησαν ἐπ᾿ αὐτούς τὸν Ἰορδάνην
  chosen: they did not cross the Jordan against them
  alternatives:
  - they did not cross the Jordan after them
  - they did not cross the Jordan to attack them
  lexicon: LSJ
  rationale: The Greek literally says they did not cross the Jordan 'upon/against
    them.' The subject is most naturally Jonathan's pursuers from the prior context.
    'Against them' preserves the adversative force of ἐπί with accusative without
    over-interpreting whether the intent was pursuit or attack.
- source_word: Ἰορδάνην
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: LSJ
  rationale: The proper name normally appears in English as 'the Jordan.' Adding 'River'
    is possible but not required by the Greek.
