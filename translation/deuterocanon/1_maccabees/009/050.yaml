translation:
  text: 'And they returned to Jerusalem and built fortified cities in Judea: the stronghold
    in Jericho, and Emmaus, and Beth-horon, and Bethel, and Thamnatha-pharathon, and
    Tephon, with high walls and gates and bars.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Thamnatha-pharathon may also be rendered 'Timnath-pharathon,' reflecting
      a more familiar form of the place name in other traditions.
    reason: lexical_alternative
  - marker: b
    text: Tephon is a transliteration of the Greek form; some traditions reflect a
      different spelling such as 'Taphon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστρεψαν
  chosen: they returned
  alternatives:
  - they turned back
  - they went back
  lexicon: BDAG
  rationale: The aorist verb indicates a return to a prior location. 'Returned' is
    natural modern English and preserves the directional sense without unnecessary
    literalism.
- source_word: ᾠκοδόμησαν
  chosen: built
  alternatives:
  - rebuilt
  - constructed
  lexicon: BDAG
  rationale: The verb means 'built' or 'built up.' Although fortification may imply
    rebuilding in context, the Greek here does not explicitly mark repetition, so
    'built' is the safer rendering.
- source_word: πόλεις ὀχυράς
  chosen: fortified cities
  alternatives:
  - strong cities
  - fortress cities
  lexicon: LSJ
  rationale: ὀχυρός denotes strength/fortification. 'Fortified cities' is idiomatic
    English and accurately conveys urban sites strengthened for defense.
- source_word: τὸ ὀχύρωμα
  chosen: the stronghold
  alternatives:
  - the fortress
  - the fortification
  lexicon: LSJ
  rationale: The singular noun refers to a fortified installation. 'Stronghold' is
    concise and fits the military context; 'fortress' would also work, but 'stronghold'
    better matches the generic force of the Greek.
- source_word: Ἰερειχὼ
  chosen: Jericho
  alternatives:
  - Jericho
  rationale: Standard English transliteration of the place name.
- source_word: Ἐμμαοὺμ
  chosen: Emmaus
  alternatives:
  - Emmaus
  rationale: Standard English transliteration of the place name.
- source_word: Βεθωρὼν
  chosen: Beth-horon
  alternatives:
  - Beth Horon
  rationale: Standard English transliteration; hyphenation helps modern readers recognize
    the compound Semitic place name.
- source_word: Βαιθήλ
  chosen: Bethel
  alternatives:
  - Beth-el
  rationale: Conventional English form of the place name.
- source_word: Θεμανάθα Φαραθών
  chosen: Thamnatha-pharathon
  alternatives:
  - Themanatha-pharathon
  - Timnath-pharathon
  rationale: This is a transliteration of a place name with orthographic uncertainty
    across traditions. The chosen form stays close to the Greek witness supplied in
    Zone 1 while remaining readable. A footnote preserves a more familiar alternative
    form.
- source_word: Τεφών
  chosen: Tephon
  alternatives:
  - Taphon
  - Tophon
  rationale: The place name is transliterated directly from the Greek form in Swete.
    Because ancient place-name spellings vary, a footnote preserves an alternative
    transliteration.
- source_word: ἐν τείχεσιν ὑψηλοῖς
  chosen: with high walls
  alternatives:
  - in high walls
  - with lofty walls
  lexicon: LSJ
  rationale: The phrase describes the manner or features of the fortification. English
    idiom prefers 'with high walls' rather than the more wooden 'in high walls.'
- source_word: πύλαις
  chosen: gates
  alternatives:
  - gatehouses
  lexicon: BDAG
  rationale: The ordinary meaning is 'gates.' Nothing in the verse requires the more
    specific 'gatehouses.'
- source_word: μοχλοῖς
  chosen: bars
  alternatives:
  - bolts
  - crossbars
  lexicon: LSJ
  rationale: The term refers to bars/bolts used to secure gates. 'Bars' is broad,
    clear, and fits the collocation 'gates and bars.'
