translation:
  text: And they stationed a garrison in them to keep acting hostile toward Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be hostile against Israel.' The Greek infinitive τοῦ ἐχθραίνειν expresses
      the purpose for which the garrison was posted.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθεντο
  chosen: they stationed
  alternatives:
  - they placed
  - they set
  lexicon: LSJ
  rationale: From τίθημι, here in the sense of placing or posting personnel. 'Stationed'
    fits the military context better than the more wooden 'placed' or 'set'.
- source_word: φρουράν
  chosen: a garrison
  alternatives:
  - a guard
  - a watch
  lexicon: LSJ
  rationale: In this context the noun refers to a military guard force posted in fortified
    places, so 'garrison' is more precise than the broader 'guard'.
- source_word: ἐν αὐτοῖς
  chosen: in them
  alternatives:
  - among them
  - in those places
  lexicon: LSJ
  rationale: The pronoun most naturally refers back to the locations just mentioned
    in the preceding context. 'In them' preserves the Greek wording without over-specifying
    the referent in the verse itself.
- source_word: τοῦ ἐχθραίνειν
  chosen: to keep acting hostile
  alternatives:
  - to be hostile
  - to harass
  - to make war against
  lexicon: LSJ
  rationale: 'The articular infinitive with τοῦ expresses purpose: the garrison was
    posted for the purpose of hostile action against Israel. ''Keep acting hostile''
    captures the ongoing force of the infinitive in context without overstating it
    as full-scale warfare.'
- source_word: τῷ Ἰσραήλ
  chosen: toward Israel
  alternatives:
  - against Israel
  - to Israel
  lexicon: LSJ
  rationale: The dative after ἐχθραίνειν indicates the object of hostility. 'Toward
    Israel' is slightly more literal, while still natural English; 'against Israel'
    is possible and preserved as an alternative.
