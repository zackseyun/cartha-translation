translation:
  text: And he refrained from coming with a large force, and secretly sent letters
    to all his allies in Judea, so that they might seize Jonathan and those with him;
    but they were not able, because their plan became known to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he was not able,' taking the singular verb as referring to the principal
      plotter rather than the conspirators collectively.
    reason: lexical_alternative
  - marker: b
    text: The final clause means that the conspiracy was exposed to the intended targets,
      i.e., Jonathan and those with him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν τοῦ ἐλθεῖν
  chosen: refrained from coming
  alternatives:
  - held back from coming
  - desisted from coming
  - gave up coming
  lexicon: LSJ
  rationale: The construction conveys withdrawal or desisting from the action of coming.
    'Refrained from coming' gives clear modern English without overinterpreting motive.
- source_word: μετὰ δυνάμεως πολλῆς
  chosen: with a large force
  alternatives:
  - with a great army
  - with much force
  lexicon: LSJ
  rationale: δύναμις here refers to military strength or troops. 'Large force' is
    natural and sufficiently formal; 'army' is possible but slightly more specific
    than the Greek requires.
- source_word: ἐπιστολὰς λάθρᾳ
  chosen: secretly sent letters
  alternatives:
  - sent letters secretly
  - sent letters in secret
  lexicon: LSJ
  rationale: λάθρᾳ modifies the sending as done covertly. English idiom is best served
    by placing 'secretly' with the verb.
- source_word: πᾶσι τοῖς συμμάχοις αὐτοῦ
  chosen: to all his allies
  alternatives:
  - to all his confederates
  - to all his supporters
  lexicon: LSJ
  rationale: σύμμαχος commonly means ally in a political or military sense. 'Allies'
    is the most straightforward rendering.
- source_word: τοῖς ἐν τῇ Ἰουδαίᾳ
  chosen: in Judea
  alternatives:
  - who were in Judea
  - those in Judea
  lexicon: LSJ
  rationale: The phrase identifies the location of the allies. 'In Judea' is concise
    and preserves the geographic reference.
- source_word: ὅπως συλλάβωσι
  chosen: so that they might seize
  alternatives:
  - so that they might arrest
  - in order that they might capture
  lexicon: LSJ
  rationale: συλλαμβάνω here means to seize or capture. 'Seize' preserves the broad
    sense without importing a formal legal nuance.
- source_word: τοὺς σὺν αὐτῷ
  chosen: those with him
  alternatives:
  - his companions
  - the men with him
  lexicon: LSJ
  rationale: The Greek is general. 'Those with him' stays close to the wording and
    avoids specifying gender or number beyond the text.
- source_word: οὐκ ἠδύνατο
  chosen: they were not able
  alternatives:
  - they could not
  - he was not able
  lexicon: LSJ
  rationale: Although the singular form could be rendered 'he was not able,' the following
    plural αὐτοῖς and αὐτῶν makes the plural sense natural in English, referring to
    the conspirators collectively. This avoids awkwardness while reflecting the clause's
    collective force.
- source_word: ἔγνωσθη αὐτοῖς ἡ βουλὴ αὐτῶν
  chosen: their plan became known to them
  alternatives:
  - their scheme was discovered by them
  - their counsel became known to them
  lexicon: LSJ
  rationale: βουλή here means plan or scheme. The passive ἔγνωσθη with αὐτοῖς indicates
    that the plot became known to Jonathan's side. Because the pronouns are somewhat
    compressed in Greek, the English keeps the ambiguity minimal while preserving
    the sense that the conspiracy was exposed.
