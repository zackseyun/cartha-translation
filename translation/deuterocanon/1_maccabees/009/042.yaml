translation:
  text: And they avenged the blood of their brother, and returned to the hill country
    of the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'they avenged the vengeance of blood of their brother,'
      an emphatic expression for blood-revenge.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the mountain of the Jordan.' The Greek ὄρος may denote mountainous
      or hill-country terrain rather than a single peak.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεδίκησαν
  chosen: avenged
  alternatives:
  - took vengeance for
  - vindicated
  lexicon: BDAG
  rationale: The verb denotes carrying out vengeance or exacting justice. 'Avenged'
    is concise and idiomatic in English, and fits the cognate-object construction
    that follows.
- source_word: τὴν ἐκδίκησιν αἵματος
  chosen: the blood
  alternatives:
  - vengeance for blood
  - blood vengeance
  lexicon: LSJ
  rationale: The Greek literally says 'they avenged the vengeance of blood,' an emphatic
    Semitic-style expression. In natural English, 'avenged the blood' preserves the
    sense of blood-revenge without awkward redundancy.
- source_word: ἀδελφοῦ αὐτῶν
  chosen: their brother
  alternatives:
  - their kinsman
  lexicon: BDAG
  rationale: The singular 'brother' is the plain lexical sense and likely refers to
    a specific slain relative or comrade. 'Kinsman' would broaden the sense beyond
    what the Greek directly states.
- source_word: ἀπέστρεψαν
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: BDAG
  rationale: In this narrative context the verb indicates movement back to a prior
    region. 'Returned' is natural English and preserves that directional sense.
- source_word: εἰς τὸ ὄρος τοῦ Ἰορδάνου
  chosen: to the hill country of the Jordan
  alternatives:
  - to the mountain of the Jordan
  - to the Jordan highlands
  lexicon: LSJ
  rationale: Although ὄρος can be rendered 'mountain,' in geographic narrative it
    often refers to hill country or highland terrain. 'Hill country of the Jordan'
    best conveys a regional destination in readable English while staying close to
    the Greek.
