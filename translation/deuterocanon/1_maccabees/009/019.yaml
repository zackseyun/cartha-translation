translation:
  text: And Jonathan and Simon carried Judas their brother and buried him in the tomb
    of his fathers at Modein.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'his brother'; the sense with the compound subject is 'their
      brother.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in Modein.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦραν
  chosen: carried
  alternatives:
  - took up
  - lifted
  lexicon: LSJ
  rationale: From αἴρω; in this burial context it most naturally means physically
    carrying or taking up the body. 'Carried' is idiomatic English and fits the narrative
    action better than the more wooden 'took up.'
- source_word: Ἰωναθὰν καὶ Σίμων
  chosen: Jonathan and Simon
  rationale: Personal names are transliterated rather than translated, following project
    philosophy.
- source_word: Ἰούδα τὸν ἀδελφὸν αὐτοῦ
  chosen: Judas their brother
  alternatives:
  - Judas, his brother
  lexicon: LSJ
  rationale: 'Although αὐτοῦ is singular in form, the coordinated subject ''Jonathan
    and Simon'' makes the sense collective: Judas is the brother of both men. English
    idiom therefore prefers ''their brother'' to avoid misleading singular reference.'
- source_word: ἔθαψαν
  chosen: buried
  alternatives:
  - entombed
  lexicon: LSJ
  rationale: Standard rendering for θάπτω in burial contexts. 'Entombed' would over-specify
    beyond the verb itself, since the tomb location is already expressed separately.
- source_word: ἐν τῷ τάφῳ
  chosen: in the tomb
  alternatives:
  - in the grave
  - in the burial place
  lexicon: LSJ
  rationale: τάφος denotes a tomb or burial place. 'Tomb' fits the family sepulcher
    context better than 'grave.'
- source_word: τῶν πατέρων αὐτοῦ
  chosen: of his fathers
  alternatives:
  - of his ancestors
  - of his forefathers
  lexicon: LSJ
  rationale: A fairly formal but still clear rendering that preserves the plural πατέρων
    and the familial ancestral sense. 'Ancestors' is possible, but 'fathers' stays
    closer to the Greek and biblical idiom.
- source_word: ἐν Μωδεείμ
  chosen: at Modein
  alternatives:
  - in Modein
  - at Modiin
  rationale: Place name transliterated from the Greek form. 'At Modein' is natural
    with burial in a location; 'in' would also be possible. 'Modein' reflects the
    Greek witness more directly than later standardized spellings.
