translation:
  text: And he sent his brother as leader of the crowd, and he urged his Nabatean
    friends to take charge of their abundant baggage for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'receive their large amount of baggage in trust.' The Greek infinitive
      can carry the sense of receiving and safeguarding property for someone.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: The common narrative verb means 'sent' or 'dispatched.' 'Sent' is natural
    modern English and fully adequate here.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  chosen: his brother
  lexicon: LSJ
  rationale: Straightforward possessive phrase; no reason to expand beyond the Greek.
- source_word: ἡγούμενον
  chosen: to lead
  alternatives:
  - as leader of
  - to command
  lexicon: LSJ
  rationale: As a participle modifying 'his brother,' it indicates appointed function.
    Rendering it verbally as 'to lead' gives clear English while preserving the sense
    of leadership without overstating military rank.
- source_word: τοῦ ὄχλου
  chosen: the crowd
  alternatives:
  - the company
  - the multitude
  - the band
  lexicon: LSJ
  rationale: ὄχλος often denotes a group or crowd. In this travel/military setting
    it refers to the accompanying body of people. 'Crowd' is the most direct rendering
    from the Greek, though 'company' is possible.
- source_word: παρεκάλεσεν
  chosen: urged
  alternatives:
  - asked
  - entreated
  - appealed to
  lexicon: LSJ
  rationale: The verb can mean ask, exhort, or urge. 'Urged' fits the practical request
    being made and conveys more than a bare request without becoming overly formal.
- source_word: τοὺς Ναβαταίους φίλους αὐτοῦ
  chosen: his Nabatean friends
  alternatives:
  - his friends, the Nabateans
  - the Nabateans who were his friends
  lexicon: LSJ
  rationale: The adjective/noun Ναβαταίους identifies the ethnic group, and φίλους
    αὐτοῦ indicates a friendly relationship. 'His Nabatean friends' is concise and
    faithful.
- source_word: παραθέσθαι
  chosen: to take charge of
  alternatives:
  - to receive
  - to place beside themselves
  - to keep in trust
  lexicon: LSJ
  rationale: In context the middle infinitive concerns receiving and safeguarding
    property entrusted to them. 'Take charge of' communicates the custodial sense
    better than the overly vague 'receive'.
- source_word: τὴν ἀποσκευήν
  chosen: baggage
  alternatives:
  - supplies
  - equipment
  - belongings
  lexicon: LSJ
  rationale: ἀποσκευή refers to baggage, gear, or equipment carried along. 'Baggage'
    best fits the travel context and avoids implying only military materiel.
- source_word: τὴν πολλήν
  chosen: plentiful
  alternatives:
  - much
  - large
  lexicon: LSJ
  rationale: The adjective marks quantity. 'Plentiful baggage' is idiomatic English
    for 'their much baggage,' preserving the emphasis on abundance.
