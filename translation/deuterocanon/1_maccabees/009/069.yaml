translation:
  text: And he became angry with those lawless men who had advised him to come into
    the country, and he killed many of them, and he decided to depart to his own land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek manuscripts as represented by Swete read literally, ''and they killed
      many of them.'' Because the surrounding verbs are singular and the sense is
      that the same leader acted, the main text renders the clause as singular: ''he
      killed many of them.'''
    reason: textual_variant
lexical_decisions:
- source_word: ὠργίσθη
  chosen: became angry
  alternatives:
  - was enraged
  - grew angry
  lexicon: BDAG
  rationale: Aorist passive/deponent of ὀργίζομαι; 'became angry' is natural modern
    English and preserves the ingressive sense without overstating intensity.
- source_word: τοῖς ἀνδράσι τοῖς ἀνόμοις
  chosen: those lawless men
  alternatives:
  - the lawless men
  - those wicked men
  lexicon: BDAG
  rationale: ἀνόμοις is literally 'lawless'; this is preferable to the broader 'wicked'
    because it preserves the concrete moral-legal force of the Greek. The demonstrative
    force is supplied by context in English.
- source_word: τοῖς συμβουλεύσασιν αὐτῷ
  chosen: who had advised him
  alternatives:
  - who had counseled him
  - who had given him this advice
  lexicon: BDAG
  rationale: The participle identifies the men as those who gave him counsel. 'Advised'
    is idiomatic and sufficiently formal.
- source_word: ἐλθεῖν εἰς τὴν χώραν
  chosen: to come into the country
  alternatives:
  - to enter the region
  - to come into the land
  lexicon: BDAG
  rationale: χώρα can mean country, region, or land. 'Country' fits the military-geographical
    setting and avoids overloading 'land,' which can sound covenantal in English where
    no such nuance is required here.
- source_word: ἀπέκτειναν ἐξ αὐτῶν πολλούς
  chosen: he killed many of them
  alternatives:
  - they killed many of them
  lexicon: BDAG
  rationale: The Greek form is third plural ('they killed'), but the surrounding singular
    verbs and narrative flow strongly suggest a singular sense referring to the same
    subject. The English main text adopts the coherent singular sense while preserving
    the literal plural as a textual note.
- source_word: ἐβουλεύσατο
  chosen: he decided
  alternatives:
  - he resolved
  - he took counsel
  lexicon: BDAG
  rationale: In context the verb expresses a settled decision rather than merely deliberation.
    'Decided' is clear modern English.
- source_word: τοῦ ἀπελθεῖν
  chosen: to depart
  alternatives:
  - to go away
  - to leave
  lexicon: BDAG
  rationale: The articular infinitive after ἐβουλεύσατο conveys the content of his
    decision. 'Depart' suits the narrative register.
- source_word: εἰς τὴν γῆν αὐτοῦ
  chosen: to his own land
  alternatives:
  - to his land
  - to his own country
  lexicon: BDAG
  rationale: γῆ here denotes homeland/territory. 'His own land' is idiomatic and preserves
    the possessive emphasis.
