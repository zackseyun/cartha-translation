translation:
  text: And Jonathan learned of it, and sent ambassadors to him to make peace with
    him and to return the captives to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'envoys' for 'ambassadors.' The Greek term denotes official diplomatic
      representatives.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the captivity'; here it refers to the people who had been taken
      captive, hence 'the captives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνω
  chosen: learned of it
  alternatives:
  - knew
  - found out
  - became aware
  lexicon: LSJ
  rationale: Aorist of γινώσκω here marks coming to know some development, not merely
    possessing knowledge. 'Learned of it' captures the ingressive sense in natural
    English.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard rendering of ἀποστέλλω; 'sent' is clear and sufficient.
- source_word: πρέσβεις
  chosen: ambassadors
  alternatives:
  - envoys
  - messengers
  lexicon: LSJ
  rationale: The term denotes official representatives in a diplomatic context. 'Ambassadors'
    best conveys the formal political sense, though 'envoys' is possible.
- source_word: τοῦ συνθέσθαι ... εἰρήνην
  chosen: to make peace
  alternatives:
  - to come to terms in peace
  - to conclude peace
  - to make a treaty of peace
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose. συντίθεσθαι with εἰρήνην
    refers to arranging or concluding peace. 'To make peace' is idiomatic and faithful
    without over-specifying treaty formality.
- source_word: ἀποδοῦναι
  chosen: to return
  alternatives:
  - to give back
  - to restore
  lexicon: LSJ
  rationale: The verb means to give back what is held. 'Return' fits the object 'the
    captives' naturally in English.
- source_word: τὴν αἰχμαλωσίαν
  chosen: the captives
  alternatives:
  - the captivity
  - the prisoners of war
  lexicon: LSJ
  rationale: Although literally 'captivity/captive body,' in context it refers concretely
    to the people taken captive. 'The captives' communicates the intended referent
    more clearly than the abstract 'captivity.'
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to Jonathan's side
  - back to his people
  lexicon: LSJ
  rationale: The dative pronoun is retained straightforwardly as 'to them.' The Greek
    does not explicitly identify the group beyond the pronoun, so the translation
    should not over-interpret.
