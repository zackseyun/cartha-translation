id: 1MA.9.75
reference: 1 Maccabees 9:75
source:
  edition: lxx-swete-1909
  text: καὶ παρενέβαλεν ἐπὶ Ἰόππην, καὶ ἀπέκλεισαν Α αὐτὸν οἱ ἐκ τῆς πόλεως, ὅτι φρουρὰ
    Ἀπολλωνίου ἐν Ἰόππῃ, καὶ ἐπολέμησαν αὐτήν.
  language: Greek
  pages:
  - 660
  validation: no_reference
translation:
  text: And he encamped against Joppa, but those from the city shut him out, because
    a garrison of Apollonius was in Joppa; and they fought against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''they fought against it.'' The subject shifts to plural in the
      source text after the earlier singular verbs, and the pronouns likely refer
      to Jonathan and his forces on the one hand and to Joppa on the other. The wording
      is retained rather than smoothed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλεν ἐπὶ
  chosen: encamped against
  alternatives:
  - camped by
  - marched against
  lexicon: LSJ
  rationale: The verb commonly refers to making camp or drawing up forces; with ἐπί
    plus accusative of a city, the military sense is hostile approach. 'Encamped against'
    preserves both the literal camping and the siege-context.
- source_word: Ἰόππην
  chosen: Joppa
  alternatives:
  - Joppe
  rationale: Standard English transliteration of the place name.
- source_word: ἀπέκλεισαν
  chosen: shut him out
  alternatives:
  - excluded him
  - closed against him
  - shut him off
  lexicon: LSJ
  rationale: The verb means to shut out or block access. Because the object is αὐτόν
    ('him'), the sense is that the city's inhabitants denied him entry, not merely
    that they closed the city in general.
- source_word: οἱ ἐκ τῆς πόλεως
  chosen: those from the city
  alternatives:
  - the men of the city
  - the people of the city
  - the inhabitants of the city
  lexicon: LSJ
  rationale: A formally close rendering that avoids adding 'men' where the Greek does
    not specify it, while still indicating the city's residents as the acting group.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: LSJ
  rationale: Introduces the reason for the city's refusal.
- source_word: φρουρὰ Ἀπολλωνίου
  chosen: a garrison of Apollonius
  alternatives:
  - Apollonius's garrison
  - the garrison of Apollonius
  lexicon: LSJ
  rationale: The phrase indicates troops belonging to or associated with Apollonius
    stationed in the city. The anarthrous Greek is naturally rendered with an indefinite
    article in English.
- source_word: ἐπολέμησαν αὐτήν
  chosen: they fought against it
  alternatives:
  - he fought against it
  - they attacked it
  lexicon: LSJ
  rationale: The Greek verb is third person plural, so 'they fought' is the straightforward
    rendering. αὐτήν most naturally refers back to the city, yielding 'against it.'
    Although the shift from singular subject earlier to plural here is somewhat abrupt,
    the source text supports the plural and should not be harmonized away.
