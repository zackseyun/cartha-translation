translation:
  text: And they fortified the city, and Beth-zur, and Gazara, and the citadel, and
    they stationed forces in them and supplies of food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Acra,' a historical name for the fortified stronghold in Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: Gazara reflects the Greek form; the site is often identified with Gezer.
    reason: cross_reference
lexical_decisions:
- source_word: ὠχύρωσαν
  chosen: fortified
  alternatives:
  - made strong
  - strengthened
  lexicon: LSJ
  rationale: The verb denotes making a place secure by fortification or strengthening
    defenses. 'Fortified' is the most natural military-English rendering in this context
    of cities and strongholds.
- source_word: τὴν πόλιν
  chosen: the city
  alternatives:
  - the town
  lexicon: LSJ
  rationale: πόλις normally means 'city.' The article suggests a specific city already
    known in context, so 'the city' is retained rather than generalized.
- source_word: Βεθοσούραν
  chosen: Beth-zur
  alternatives:
  - Bethsura
  - Beth-sura
  rationale: This is a place name and is transliterated rather than translated, following
    project policy. 'Beth-zur' is a standard English transliteration for the location.
- source_word: Γάζαρα
  chosen: Gazara
  alternatives:
  - Gezer
  - Gazera
  rationale: The Greek form is Γάζαρα, so 'Gazara' most directly reflects the source
    text. 'Gezer' is the more familiar Hebrew/English form of the site, but the translation
    remains anchored to the Greek witness.
- source_word: ἄκραν
  chosen: the citadel
  alternatives:
  - the Acra
  - the fortress
  lexicon: LSJ
  rationale: ἄκρα can denote a fortified height or citadel. In 1 Maccabees it can
    function almost as a proper designation for the Seleucid stronghold in Jerusalem.
    'The citadel' gives the sense clearly in modern English; the more technical historical
    label 'Acra' is preserved as an alternative worth noting.
- source_word: ἔθεντο
  chosen: placed
  alternatives:
  - stationed
  - set
  lexicon: LSJ
  rationale: The verb literally means 'put' or 'set.' With military forces in fortified
    locations, 'placed' is idiomatic and broad enough to cover stationing troops.
- source_word: δυνάμεις
  chosen: forces
  alternatives:
  - troops
  - garrisons
  lexicon: LSJ
  rationale: The noun can mean military forces or troops. 'Forces' is a close rendering;
    'garrisons' would interpret the function more specifically than the Greek explicitly
    states, though the context implies stationed troops.
- source_word: παραθέσεις βρωμάτων
  chosen: stores of food
  alternatives:
  - supplies of provisions
  - stockpiles of food
  lexicon: LSJ
  rationale: παράθεσις here refers to a laying up or deposit, and βρώματα means food/provisions.
    'Stores of food' is concise, natural English that preserves the idea of stored
    provisions.
