translation:
  text: And they traveled on the road to Galgala, and encamped against Mesaloth in
    Arbela, and captured it, and destroyed many people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek verb rendered 'took it beforehand' (προκατελίβοντο) is uncommon
      and difficult; it may also be understood as 'seized it first' or more generally
      'overran it.'
    reason: lexical_alternative
  - marker: b
    text: Greek literally, 'destroyed many lives of men,' an idiom meaning that many
      people were killed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθησαν
  chosen: traveled
  alternatives:
  - went
  - marched
  lexicon: LSJ
  rationale: Aorist middle/passive of πορεύομαι, denoting movement/journey. 'Traveled'
    is natural English and broad enough for military movement without over-specifying.
- source_word: ὁδὸν τὴν εἰς Γάλγαλα
  chosen: on the road to Galgala
  alternatives:
  - by the way to Galgala
  - toward Galgala
  lexicon: LSJ
  rationale: The accusative construction with ὁδόν is idiomatic for taking a route.
    'On the road to' preserves the concrete sense better than a bare 'toward'.
- source_word: παρενέβαλον
  chosen: encamped against
  alternatives:
  - camped at
  - pitched camp against
  - made camp by
  lexicon: LSJ
  rationale: In military contexts παρεμβάλλω commonly means to encamp. The preposition
    ἐπί with the place name suggests hostile positioning, so 'against' best reflects
    the siege-like context.
- source_word: Μεσσαλὼθ τὴν ἐν Ἀρβήλοις
  chosen: Mesaloth in Arbela
  alternatives:
  - Mesaloth that is in Arbela
  - Mesaloth in the region of Arbela
  lexicon: LSJ
  rationale: The article and prepositional phrase identify the specific Mesaloth associated
    with Arbela. A concise appositional rendering communicates the location without
    awkwardness.
- source_word: προκατελίβοντο
  chosen: took it beforehand
  alternatives:
  - seized it first
  - occupied it in advance
  - overran it
  lexicon: LSJ
  rationale: The compound verb is difficult and relatively rare; the προ- prefix suggests
    prior action or preemption. 'Took it beforehand' preserves that nuance without
    claiming more certainty than the form allows. The object αὐτήν is feminine singular,
    referring to the town.
- source_word: ἀπώλεσεν
  chosen: destroyed
  alternatives:
  - killed
  - wiped out
  lexicon: LSJ
  rationale: The verb ἀπόλλυμι can mean destroy or kill. Because the object is 'many
    lives of men,' 'destroyed' stays close to the Greek expression while still conveying
    lethal force.
- source_word: ψυχὰς ἀνθρώπων πολλὰς
  chosen: many lives of men
  alternatives:
  - many people
  - many human lives
  - many men
  lexicon: LSJ
  rationale: ψυχή here refers to lives/persons. Retaining 'lives of men' reflects
    the Greek wording and preserves the masculine ἀνθρώπων as written, in line with
    the project's gender-accurate policy, though idiomatic English could also say
    'many people'.
