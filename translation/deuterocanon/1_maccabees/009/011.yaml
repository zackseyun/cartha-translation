  text: καὶ ἀπῆρεν ἡ δύναμις ἀπὸ τῆς παρεμβολῆς, καὶ ἔστησαν εἰς συνάντησιν αὐτοῖς,
    καὶ ἐμερίσθη ἡ ἵππος εἰς δύο μέρη, καὶ οἱ σφενδονῆται καὶ οἱ τοξόται προεπορεύοντο
    τῆς δυνάμεως, καὶ οἱ πρωταγωνισταὶ πάντες οἱ δυνατοί.
