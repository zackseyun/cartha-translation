translation:
  text: And the force moved out from the camp and took their stand to meet them, and
    the cavalry was divided into two parts, and the slingers and the archers went
    before the force, and all the mighty men were in the front ranks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the mighty men were the front-line fighters.' The Greek phrase καὶ
      οἱ πρωταγωνισταὶ πάντες οἱ δυνατοί is compressed, and 'πρωταγωνισταί' likely
      refers to those fighting in the foremost position.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  chosen: moved out
  alternatives:
  - set out
  - advanced
  - departed
  lexicon: LSJ
  rationale: From ἀπαίρω/ἀπαίρω in military movement context, the sense is the force's
    departure from its encampment into action. 'Moved out' is natural modern English
    and preserves the military nuance better than the more generic 'departed'.
- source_word: ἡ δύναμις
  chosen: the force
  alternatives:
  - the army
  - the troops
  lexicon: LSJ
  rationale: δύναμις in 1 Maccabees often denotes an armed force or body of troops.
    'Force' is slightly more formal and broad enough to include the mixed units named
    in the verse; 'army' is possible but can sound more totalizing than the immediate
    tactical unit.
- source_word: παρεμβολῆς
  chosen: camp
  alternatives:
  - encampment
  lexicon: LSJ
  rationale: παρεμβολή commonly means camp/encampment in military narrative. 'Camp'
    is the clearest idiomatic English rendering.
- source_word: ἔστησαν εἰς συνάντησιν αὐτοῖς
  chosen: took their stand to meet them
  alternatives:
  - stood to meet them
  - drew up to meet them
  lexicon: LSJ
  rationale: The idiom combines standing/setting oneself with an encounter. 'Took
    their stand to meet them' conveys deliberate battle formation and avoids overly
    wooden phrasing.
- source_word: ἡ ἵππος
  chosen: the cavalry
  alternatives:
  - the horsemen
  - the mounted troops
  lexicon: LSJ
  rationale: Although literally 'the horse,' in military Greek this collective refers
    to cavalry. 'Cavalry' is the standard English military equivalent.
- source_word: ἐμερίσθη ... εἰς δύο μέρη
  chosen: was divided into two parts
  alternatives:
  - was split into two divisions
  lexicon: LSJ
  rationale: A straightforward passive describing tactical deployment. 'Two parts'
    stays close to the Greek μέρη while remaining idiomatic.
- source_word: σφενδονῆται
  chosen: slingers
  lexicon: LSJ
  rationale: Standard military term for troops armed with slings.
- source_word: τοξόται
  chosen: archers
  lexicon: LSJ
  rationale: Standard military term for bowmen.
- source_word: προεπορεύοντο τῆς δυνάμεως
  chosen: went before the force
  alternatives:
  - marched in front of the force
  - led the force
  lexicon: LSJ
  rationale: The verb indicates going ahead of the main body. 'Went before the force'
    is close to the Greek; 'led' could overstate command rather than position.
- source_word: πρωταγωνισταὶ
  chosen: the front ranks
  alternatives:
  - champions
  - front-line fighters
  - leading men
  lexicon: LSJ
  rationale: Literally something like those fighting in the foremost place. In this
    military context, the phrase likely denotes the men in the front line rather than
    theatrical 'protagonists.' Rendering the phrase adverbially/locatively in English
    ('in the front ranks') communicates the tactical sense.
- source_word: πάντες οἱ δυνατοί
  chosen: all the mighty men
  alternatives:
  - all the strong men
  - all the valiant warriors
  lexicon: LSJ
  rationale: δυνατοί here refers to strong/valiant fighting men. 'Mighty men' is concise
    and preserves the martial weight without excessive paraphrase.
