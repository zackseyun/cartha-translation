translation:
  text: And Judas saw that Bacchides and the main strength of the camp were on the
    right, and all the men courageous in heart gathered around him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the main strength of the camp.' The Greek expression refers to the firm
      or strongest body of Bacchides's forces.
    reason: lexical_alternative
  - marker: b
    text: Literally 'all the courageous in heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδεν
  chosen: saw
  alternatives:
  - perceived
  - realized
  lexicon: LSJ
  rationale: Aorist of ὁράω; 'saw' is the plain narrative rendering and fits the military
    scene without over-interpreting as mental inference.
- source_word: τὸ στερέωμα τῆς παρεμβολῆς
  chosen: the strongest part of the camp
  alternatives:
  - the main strength of the camp
  - the solid body of the camp
  - the camp's force
  lexicon: LSJ
  rationale: στερέωμα can denote firmness/strength/support. In this battle context
    it refers not to a physical fortification but to the solid or strongest body of
    troops. 'The strongest part of the camp' preserves the metaphor while making sense
    in English.
- source_word: ἐν τοῖς δεξιοῖς
  chosen: on the right
  alternatives:
  - at the right wing
  - on the right side
  lexicon: LSJ
  rationale: The phrase denotes position on the right side/right wing. 'On the right'
    is concise and natural; the military nuance remains clear from context.
- source_word: συνῆλθον αὐτῷ
  chosen: gathered to him
  alternatives:
  - joined him
  - came together with him
  lexicon: LSJ
  rationale: The verb means to come together; with αὐτῷ it indicates rallying to Judas.
    'Gathered to him' preserves the movement and collective sense better than the
    flatter 'joined him.'
- source_word: πάντες οἱ εὔψυχοι τῇ καρδίᾳ
  chosen: all the men courageous in heart
  alternatives:
  - all who were stouthearted
  - all the brave-hearted men
  - all the courageous of heart
  lexicon: LSJ
  rationale: εὔψυχοι denotes being of good courage or stouthearted; τῇ καρδίᾳ specifies
    inward disposition. Because the Greek masculine plural refers to male fighters
    in context, 'men' is gender-accurate rather than neutral. 'Courageous in heart'
    keeps the Hebraic/Greek idiom without sounding archaic.
