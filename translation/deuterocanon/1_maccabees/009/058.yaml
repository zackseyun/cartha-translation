translation:
  text: And all the lawless men took counsel, saying, “Look, Jonathan and those with
    him are living in peace, confident; so now let us bring Bacchides, and he will
    seize them all in a single night.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwelling quietly, confident.' The Greek combines quiet residence (ἐν
      ἡσυχίᾳ κατοικοῦσιν) with a participle meaning 'being confident' or 'trusting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβουλεύσαντο
  chosen: took counsel
  alternatives:
  - plotted
  - deliberated
  - made plans
  lexicon: LSJ
  rationale: The middle verb indicates deliberate consultation among themselves. 'Took
    counsel' preserves the formal sense without over-interpreting it as necessarily
    secretive, though the context is hostile.
- source_word: οἱ ἄνομοι
  chosen: the lawless men
  alternatives:
  - the lawless
  - the wicked
  - the outlaws
  lexicon: LSJ
  rationale: ἄνομοι literally denotes those without or against law. 'Lawless men'
    keeps the moral-political force and reflects the masculine plural reference to
    a group of male actors in context.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: LSJ
  rationale: A deictic attention-getter. 'Look' is natural modern English and preserves
    the immediacy better than archaic 'Behold.'
- source_word: οἱ παρ᾿ αὐτοῦ
  chosen: those with him
  alternatives:
  - his men
  - those around him
  - his companions
  lexicon: LSJ
  rationale: The phrase denotes Jonathan's associates without specifying military
    status. 'Those with him' is broad and faithful, avoiding importing 'men' or 'companions'
    more specifically than the Greek states.
- source_word: ἐν ἡσυχίᾳ κατοικοῦσιν
  chosen: are living in peace
  alternatives:
  - are dwelling quietly
  - are living undisturbed
  - are settled in tranquility
  lexicon: LSJ
  rationale: The expression conveys quiet, undisturbed residence. 'Living in peace'
    communicates the practical sense of security and calm in idiomatic English.
- source_word: πεποιθότες
  chosen: confident
  alternatives:
  - trusting
  - secure
  - unsuspecting
  lexicon: LSJ
  rationale: 'Perfect participle of πείθω in the intransitive sense: being confident
    or trusting. ''Confident'' best fits the immediate context of feeling secure;
    ''unsuspecting'' is interpretive and therefore avoided in the main text.'
- source_word: ἄξομεν
  chosen: let us bring
  alternatives:
  - we will bring
  - let us lead here
  lexicon: LSJ
  rationale: The hortatory force in context is well represented by 'let us bring.'
    It expresses the conspirators' proposal more naturally than a simple future.
- source_word: συλλήψεται
  chosen: he will seize
  alternatives:
  - he will capture
  - he will arrest
  lexicon: LSJ
  rationale: The verb means to seize or capture. 'Seize' is vivid and broad enough
    for a military ambush context, whereas 'arrest' sounds too juridical.
- source_word: ἐν νυκτὶ μιᾷ
  chosen: in a single night
  alternatives:
  - in one night
  - during one night
  lexicon: LSJ
  rationale: The phrase emphasizes the brevity and concentrated timing of the action.
    'In a single night' is idiomatic and preserves the emphasis of μία.
