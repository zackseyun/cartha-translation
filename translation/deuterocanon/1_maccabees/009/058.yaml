  text: Καὶ ἐβουλεύσαντο οἱ ἄνομοι πάντες λέγοντες Ἰδοὺ Ἰωναθὰν καὶ οἱ παρ᾿ αὐτοῦ
    ἐν ἡσυχίᾳ κατοικοῦσιν πεποιθότες· νῦν οὖν ἄξομεν τὸν Βακχίδην, καὶ συλλήψεται
    αὐτοὺς πάντας ἐν νυκτὶ μιᾷ.
