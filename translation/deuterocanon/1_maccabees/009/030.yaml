lexical_decisions:
- source_word: ἡρετισάμεθα
  chosen: we have chosen
  alternatives:
  - we have appointed
  - we have elected
  lexicon: LSJ
  rationale: The middle aorist conveys selecting or choosing someone for a role. 'Chosen'
    is natural English and leaves room for the formal appointment implied by context
    without overstating a technical electoral process.
- source_word: ἀντʼ αὐτοῦ
  chosen: in his place
  alternatives:
  - instead of him
  - as his replacement
  lexicon: LSJ
  rationale: The phrase marks succession to the role previously held by another person.
    'In his place' is idiomatic and preserves the relational sense without sounding
    overly mechanical.
- source_word: ἄρχοντα
  chosen: a ruler
  alternatives:
  - a prince
  - a chief
  - a commander
  lexicon: LSJ
  rationale: ἄρχων is a broad term for one who rules or holds authority. 'Ruler' best
    preserves the general governing sense here, especially since ἡγούμενον follows
    and adds the leadership nuance.
- source_word: ἡγούμενον
  chosen: leader
  alternatives:
  - governor
  - guide
  - commander
  lexicon: LSJ
  rationale: The participial noun denotes one who leads. 'Leader' pairs well with
    'ruler' and preserves the twofold description rather than collapsing both terms
    into one English office title.
- source_word: τοῦ πολεμῆσαι
  chosen: to fight
  alternatives:
  - to wage
  - to carry on
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose. 'To fight' is direct, readable,
    and fits the military context.
- source_word: τὸν πόλεμον ἡμῶν
  chosen: our war
  alternatives:
  - our battle
  - the war for us
  - our warfare
  lexicon: LSJ
  rationale: πόλεμος normally denotes war rather than a single battle. 'Our war' preserves
    both the noun's scope and the possessive ἡμῶν, indicating the conflict undertaken
    on behalf of the group.
