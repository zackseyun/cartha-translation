translation:
  text: And Bacchides learned of it on the Sabbath day, and he himself and all his
    army came to the other side of the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'on the day of the Sabbaths,' an idiom meaning 'on the
      Sabbath day.'
    reason: lexical_alternative
  - marker: b
    text: Or 'beyond the Jordan.' The Greek expression can denote the region across
      the river or movement to the other side.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔγνω
  chosen: learned of it
  alternatives:
  - found out
  - knew
  lexicon: BDAG
  rationale: Aorist of γινώσκω here denotes coming to know information rather than
    simple stative knowledge. 'Learned of it' captures the ingressive sense in natural
    English. 'Of it' is supplied because the Greek object is implicit from context.
- source_word: τῇ ἡμέρᾳ τῶν σαββάτων
  chosen: on the Sabbath day
  alternatives:
  - on the day of the Sabbaths
  - on the sabbath
  lexicon: LSJ
  rationale: The plural σαββάτων is a common idiom for the singular Sabbath. 'On the
    Sabbath day' gives clear English while preserving the temporal reference.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - personally
  lexicon: BDAG
  rationale: The pronoun is emphatic. 'He himself' preserves the emphasis that Bacchides
    personally came along with the army.
- source_word: πᾶν τὸ στράτευμα αὐτοῦ
  chosen: all his army
  alternatives:
  - his whole army
  - all his forces
  lexicon: LSJ
  rationale: στράτευμα refers to the military force under his command. 'All his army'
    is direct and idiomatic.
- source_word: πέραν τοῦ Ἰορδάνη
  chosen: to the far side of the Jordan
  alternatives:
  - beyond the Jordan
  - across the Jordan
  lexicon: BDAG
  rationale: πέραν can mean 'beyond' or 'across/to the other side.' 'To the far side
    of the Jordan' communicates movement to the opposite side without relying on the
    somewhat traditional but potentially ambiguous 'beyond the Jordan.'
