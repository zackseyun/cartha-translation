lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - was informed
  lexicon: LSJ
  rationale: The aorist of ἀκούω here most naturally means receiving news/report.
    'Heard' is the most direct English equivalent and leaves implicit object understood
    from context without over-specifying 'was informed.'
- source_word: τῇ ἡμέρᾳ τῶν σαββάτων
  chosen: on the Sabbath day
  alternatives:
  - on the day of the Sabbaths
  - on the sabbath
  lexicon: LSJ
  rationale: The plural σαββάτων is a standard idiom for the singular Sabbath in Greek
    Jewish usage. 'On the Sabbath day' gives clear modern English while preserving
    the temporal reference.
- source_word: ἕως τῶν κρηπῖδων τοῦ Ἰορδάνου
  chosen: as far as the banks of the Jordan
  alternatives:
  - as far as the edges of the Jordan
  - as far as the riverbanks of the Jordan
  - as far as the footings of the Jordan
  lexicon: LSJ
  rationale: κρηπίς literally can denote a base, edge, or bank. In this geographical
    context, 'banks' best fits the sense of reaching the river's edge. 'Footings'
    would be misleading in English, suggesting architecture rather than terrain.
- source_word: ἐν δυνάμει πολλῇ
  chosen: with a great force
  alternatives:
  - with great strength
  - with a large army
  - in great force
  lexicon: LSJ
  rationale: δύναμις can mean power, force, or military strength. In this military
    narrative, the phrase indicates a substantial armed contingent. 'With a great
    force' preserves the military sense without adding the more specific 'army' beyond
    the Greek.
- source_word: Βακχίδης
  chosen: Bacchides
  rationale: Personal name transliterated according to standard English convention,
    following project policy to transliterate names rather than translate them.
