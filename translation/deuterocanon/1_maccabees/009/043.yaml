translation:
  text: And Bacchides heard, and on the day of the Sabbaths he came as far as the
    banks of the Jordan with a great force.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'on the day of the sabbaths,' a Jewish Greek idiom meaning
