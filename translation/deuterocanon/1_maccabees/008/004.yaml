translation:
  text: And they gained control of the whole region by their counsel and by the sword—though
    the region was very far away from them—and of the kings who came against them
    from the end of the earth, until they crushed them and struck them with a great
    blow; and the rest give them tribute year by year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'from the end of the earth,' an idiom for from a very great
      distance.
    reason: lexical_alternative
  - marker: b
    text: The final clause refers to the remaining rulers or peoples as continuing
      to pay annual tribute.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεκράτησαν
  chosen: gained control of
  alternatives:
  - prevailed over
  - mastered
  - took possession of
  lexicon: LSJ
  rationale: The verb conveys forceful dominance or mastery. 'Gained control of' is
    natural English and fits the political-military context better than a more wooden
    'prevailed over' or an overly possessive 'took possession of.'
- source_word: τοῦ τόπου παντός
  chosen: the whole region
  alternatives:
  - the whole place
  - the whole territory
  - every land
  lexicon: LSJ
  rationale: τόπος literally means 'place,' but here in geopolitical context it refers
    to territory/region under Roman influence. 'Whole region' communicates the territorial
    sense without overstating universality as 'every land.'
- source_word: τῇ βουλῇ αὐτῶν
  chosen: by their counsel
  alternatives:
  - by their policy
  - by their strategy
  - by their deliberation
  lexicon: LSJ
  rationale: βουλή can denote counsel, plan, or policy. 'Counsel' preserves the idea
    of deliberate political judgment and pairs well with 'by the sword' as wisdom
    plus military force.
- source_word: τῇ ῥομφαίᾳ
  chosen: by the sword
  alternatives:
  - by warfare
  - by force of arms
  lexicon: LSJ
  rationale: A standard metonymy for military power. 'By the sword' is idiomatic,
    concise, and faithful.
- source_word: μακρὰν ἀπέχων ἀπʼ αὐτῶν σφόδρα
  chosen: was very far away from them
  alternatives:
  - was at a great distance from them
  - lay very far from them
  lexicon: LSJ
  rationale: This clause explains the impressiveness of their dominance despite distance.
    'Was very far away from them' is straightforward modern English and preserves
    σφόδρα intensification.
- source_word: τῶν βασιλέων τῶν ἐπελθόντων ἐπʼ αὐτούς
  chosen: of the kings who came against them
  alternatives:
  - and the kings who attacked them
  - of the kings who advanced against them
  lexicon: LSJ
  rationale: The genitive continues the object sphere of κατεκράτησαν. 'Came against
    them' is a clear rendering of hostile advance without overinterpreting the exact
    military action.
- source_word: ἀπʼ ἄκρου τῆς γῆς
  chosen: from the end of the earth
  alternatives:
  - from the ends of the earth
  - from the farthest part of the land
  lexicon: LSJ
  rationale: The phrase is idiomatic for extreme distance. Singular 'end of the earth'
    follows the Greek closely while remaining intelligible in English.
- source_word: συνέτριψαν
  chosen: crushed
  alternatives:
  - shattered
  - broke
  lexicon: LSJ
  rationale: A strong military verb; 'crushed' conveys decisive defeat in natural
    English.
- source_word: ἐπάταξαν ἐν αὐτοῖς πληγὴν μεγάλην
  chosen: struck them with a great blow
  alternatives:
  - inflicted a great defeat on them
  - dealt them a severe blow
  lexicon: LSJ
  rationale: The idiom combines striking with a μεγάλη πληγή. 'Struck them with a
    great blow' preserves the metaphor and avoids flattening it entirely into abstract
    military language.
- source_word: οἱ ἐπίλοιποι
  chosen: the rest
  alternatives:
  - the survivors
  - those remaining
  lexicon: LSJ
  rationale: This likely refers to the remaining kings/nations not destroyed. 'The
    rest' is broad enough to preserve the Greek's ambiguity.
- source_word: ὀιδόασιν αὐτοῖς φόρον
  chosen: pay them tribute
  alternatives:
  - give them tribute
  - render them tax
  lexicon: LSJ
  rationale: Despite the unusual form in Swete's text, the sense is clearly that the
    remaining parties render φόρος to the Romans. 'Pay them tribute' is idiomatic
    political language.
- source_word: κατʼ ἐνιαυτόν
  chosen: year by year
  alternatives:
  - annually
  - each year
  lexicon: LSJ
  rationale: The distributive phrase indicates recurring annual payment. 'Year by
    year' preserves the iterative sense with good rhythm.
