translation:
  text: and the land of India and Media and Lydia, some of the finest of their lands—they
    took them from him and gave them to King Eumenes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their choicest territories.' The Greek literally says 'from their
      most beautiful lands,' an idiom for especially desirable or excellent regions.
    reason: lexical_alternative
lexical_decisions:
- source_word: χώραν
  chosen: the land
  alternatives:
  - territory
  - country
  - region
  lexicon: LSJ
  rationale: χώρα commonly denotes a land, territory, or region. Here it introduces
    named geopolitical areas, so 'the land of' preserves the singular construction
    while reading naturally in English.
- source_word: τὴν Ἰνδικὴν
  chosen: India
  alternatives:
  - the Indian country
  lexicon: LSJ
  rationale: The adjective used substantivally refers to the region of India. 'India'
    is the standard English geographical rendering.
- source_word: Μηδίαν
  chosen: Media
  lexicon: LSJ
  rationale: Standard transliteration of the regional name Μηδία.
- source_word: Λυδίαν
  chosen: Lydia
  lexicon: LSJ
  rationale: Standard transliteration of the regional name Λυδία.
- source_word: ἀπὸ τῶν καλλίστων χωρῶν αὐτῶν
  chosen: some of the finest of their lands
  alternatives:
  - from their best territories
  - from the choicest parts of their land
  lexicon: LSJ
  rationale: 'The phrase is partitive: ''from their most beautiful/best lands.'' ''Finest''
    captures καλλίστων idiomatically in a geopolitical context better than the overly
    literal ''most beautiful.'' ''Some of'' makes the partitive force explicit in
    English.'
- source_word: λαβόντες
  chosen: they took
  alternatives:
  - having taken
  - after taking
  lexicon: LSJ
  rationale: Although formally an aorist participle, in this narrative sequence it
    is naturally rendered with a finite verb in English for readability while preserving
    the action.
- source_word: παρ' αὐτοῦ
  chosen: from him
  alternatives:
  - from that king
  - from Antiochus
  lexicon: LSJ
  rationale: The pronoun refers back to the previously mentioned ruler. 'From him'
    preserves the Greek wording without importing an explicit antecedent not repeated
    in this verse.
- source_word: ἔδωκαν αὐτὰς Εὐμενεῖ τῷ βασιλεῖ
  chosen: gave them to King Eumenes
  alternatives:
  - granted them to Eumenes the king
  lexicon: LSJ
  rationale: ἔδωκαν is straightforwardly 'gave.' Rendering τῷ βασιλεῖ as 'King' before
    the name is idiomatic English and preserves the royal title.
