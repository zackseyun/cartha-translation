translation:
  text: and to remove their yoke, because they saw that the kingdom of the Greeks
    was enslaving Israel to slavery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'was reducing Israel to bondage.' The Greek is emphatic,
      literally 'enslaving Israel to slavery.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἆραι
  chosen: to remove
  alternatives:
  - to lift
  - to take away
  lexicon: LSJ
  rationale: Aorist infinitive of αἴρω. In the idiom with 'yoke,' the sense is removing
    or taking off a burden, not merely physically lifting it.
- source_word: ζυγόν
  chosen: yoke
  alternatives:
  - burden
  lexicon: LSJ
  rationale: ζυγός literally means 'yoke' and commonly functions metaphorically for
    oppressive domination. The metaphor is clear and should be preserved in English.
- source_word: βασιλείαν
  chosen: kingdom
  alternatives:
  - rule
  - realm
  lexicon: LSJ
  rationale: βασιλεία can denote kingship or kingdom. Here it refers to the political
    power of the Greeks as a ruling kingdom/empire; 'kingdom' is the most direct formal
    equivalent.
- source_word: καταδουλουμένους
  chosen: was enslaving
  alternatives:
  - was subjugating
  - was reducing to slavery
  lexicon: LSJ
  rationale: The verb καταδουλόω intensifies δουλόω and means to bring into slavery
    or complete subjection. 'Was enslaving' best preserves the force of the participle
    and the bonded nature of the oppression.
- source_word: δουλίαν
  chosen: to slavery
  alternatives:
  - into bondage
  - in servitude
  lexicon: LSJ
  rationale: The accusative δουλίαν functions as the result/complement of the enslaving
    action. Rendering it explicitly as 'to slavery' preserves the emphatic repetition
    present in the Greek ('enslaving ... to slavery').
- source_word: Ἑλλήνων
  chosen: the Greeks
  alternatives:
  - the Greek kingdom
  - the Greek power
  lexicon: LSJ
  rationale: Genitive plural of Ἕλλην. The phrase is literally 'the kingdom of the
    Greeks'; retaining 'the Greeks' avoids over-interpretation while preserving the
    ethnic-political designation.
