theological_decisions:
- issue: Rendering the slavery language in a politically charged historical context
  chosen_reading: 'Retain the doubled slavery imagery: ''was enslaving Israel to slavery'''
  alternative_readings:
  - was subjugating Israel
  - was holding Israel in bondage
  rationale: The Greek uses both καταδουλουμένους and δουλίαν, creating deliberate
    emphasis. In line with the project's preference to preserve bonded/slavery language
    where salient, the translation keeps the force rather than softening it to generic
    oppression.
  doctrine_reference: 'DOCTRINE.md: δοῦλος / slavery-language principle under original-language
