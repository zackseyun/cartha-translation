translation:
  text: To those who make war on them they shall neither give nor supply grain, weapons,
    silver, or ships, as Rome has decided; and they shall keep their obligations,
    taking nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they shall observe their terms' or 'they shall keep their treaty provisions'
      for 'they shall keep their obligations.' The Greek uses a cognate expression,
      literally 'they shall keep their things-to-be-kept,' in a treaty context.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς πολεμοῦσιν
  chosen: to those who make war on them
  alternatives:
  - to those waging war
  - to their attackers
  - to those fighting
  lexicon: LSJ
  rationale: The participle πολεμοῦσιν is substantival, referring to hostile parties.
    The dative is governed by the verbs of giving/supplying. 'On them' is supplied
    in English from the treaty context and the implicit object of hostility, avoiding
    an overly vague 'to those who make war.'
- source_word: οὐ δώσουσιν οὐδὲ ἐπαρκέσουσιν
  chosen: they shall neither give nor supply
  alternatives:
  - they shall neither give nor furnish
  - they shall neither provide nor support
  lexicon: LSJ
  rationale: 'The paired futures express two related prohibitions: direct giving and
    furnishing/supplying assistance. ''Supply'' captures ἐπαρκέω here in the sense
    of providing what is needed.'
- source_word: σῖτον
  chosen: grain
  alternatives:
  - food
  - wheat
  lexicon: LSJ
  rationale: σίτος commonly denotes grain or provisions of grain. 'Grain' is more
    precise than the broader 'food' and less specific than 'wheat,' which the Greek
    does not require.
- source_word: ὅπλα
  chosen: weapons
  alternatives:
  - arms
  - armaments
  lexicon: LSJ
  rationale: A straightforward military term in this treaty list. 'Weapons' is clear
    modern English.
- source_word: ἀργύριον
  chosen: silver
  alternatives:
  - money
  lexicon: LSJ
  rationale: The Greek literally says 'silver.' Although it can function metonymically
    for money, retaining 'silver' preserves the source wording and ancient economic
    setting.
- source_word: πλοῖα
  chosen: ships
  alternatives:
  - vessels
  - boats
  lexicon: LSJ
  rationale: In a military-diplomatic context, 'ships' is the natural rendering.
- source_word: ὡς ἔδοξεν Ῥώμῃ
  chosen: as Rome has decided
  alternatives:
  - as it seemed good to Rome
  - as was resolved by Rome
  lexicon: LSJ
  rationale: The idiom ἔδοξεν + dative often introduces an official decision or decree.
    'Has decided' communicates the formal sense in natural English.
- source_word: φυλάξονται τὰ φυλάγματα αὐτῶν
  chosen: they shall keep their obligations
  alternatives:
  - they shall observe their terms
  - they shall keep their treaty provisions
  - they shall guard their ordinances
  lexicon: LSJ
  rationale: The cognate verb-noun pairing literally means 'they shall keep their
    things-to-be-kept.' In treaty context this refers to stipulated obligations or
    terms. 'Keep their obligations' is idiomatic while preserving the covenantal/legal
    force.
- source_word: οὐθὲν λαβόντες
  chosen: taking nothing
  alternatives:
  - receiving nothing
  - accepting nothing in return
  lexicon: LSJ
  rationale: The participial phrase indicates that this observance is done without
    receiving anything. 'Taking nothing' is concise and close to the Greek; context
    implies from the other party or as compensation.
