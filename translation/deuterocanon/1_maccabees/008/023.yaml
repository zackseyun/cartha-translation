translation:
  text: May it go well for the Romans and for the nation of the Jews, on sea and on
    land forever; and may sword and enemy be far from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at sea and on land.' The Greek uses a conventional pair of domains to
      express well-being in every sphere.
    reason: lexical_alternative
  - marker: b
    text: '''Sword'' likely stands for warfare by metonymy, but the main text keeps
      the concrete term used in Greek.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καλῶς γένοιτο
  chosen: May it go well
  alternatives:
  - May it be well
  - May good come
  lexicon: LSJ
  rationale: Optative expression of wish/blessing. 'May it go well' is idiomatic modern
    English that preserves the volitional force without sounding archaic.
- source_word: Ῥωμαίοις
  chosen: the Romans
  alternatives:
  - Romans
  lexicon: LSJ
  rationale: Dative plural referring to the Roman people. The article is natural in
    English here because the phrase is paired with 'the nation of the Jews.'
- source_word: τῷ ἔθνει τῶν Ἰουδαίων
  chosen: the nation of the Jews
  alternatives:
  - the Jewish nation
  - the people of the Jews
  lexicon: LSJ
  rationale: ἔθνος here denotes a people/nation in a political-ethnic sense. 'Nation
    of the Jews' stays close to the Greek while remaining readable.
- source_word: ἐν τῇ θαλάσσῃ καὶ ἐπὶ τῆς ξηρᾶς
  chosen: on sea and on land
  alternatives:
  - at sea and on land
  - in the sea and on the dry land
  lexicon: LSJ
  rationale: A merism for all spheres of activity. 'On sea and on land' is concise
    and natural, preserving the paired domains without over-literal awkwardness.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - for all time
  - into the age
  lexicon: LSJ
  rationale: Idiomatic expression for enduring duration. 'Forever' is the clearest
    modern rendering in this treaty-blessing context.
- source_word: ῥομφαία
  chosen: sword
  alternatives:
  - war-sword
  - blade
  lexicon: LSJ
  rationale: Standard rendering for the weapon term. In context it stands metonymically
    for warfare, but 'sword' preserves the concrete image of the Greek.
- source_word: ἐχθρός
  chosen: enemy
  alternatives:
  - foe
  lexicon: LSJ
  rationale: Singular collective or representative noun. 'Enemy' is the most straightforward
    English equivalent.
- source_word: μακρυνθείη ἀπ' αὐτῶν
  chosen: be far from them
  alternatives:
  - be removed from them
  - be kept away from them
  lexicon: LSJ
  rationale: Optative passive expressing a wish that sword and enemy be distanced
    from them. 'Be far from them' is both natural and close to the Greek imagery.
