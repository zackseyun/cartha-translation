translation:
  text: And in all these matters not one of them put on a crown, nor did they clothe
    themselves in purple so as to exalt themselves by it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'diadem' instead of 'crown'; the Greek term denotes a royal headband
      associated with kingship.
    reason: lexical_alternative
  - marker: b
    text: That is, purple as a mark of royal or high status.
    reason: cultural_note
lexical_decisions:
- source_word: ἐν ἅπασιν τούτοις
  chosen: in all these matters
  alternatives:
  - in all these things
  - in all this
  lexicon: LSJ
  rationale: The phrase refers back to the preceding description of Roman political
    practice. 'Matters' gives natural English while preserving the broad referential
    sense of τούτοις.
- source_word: ἐπέθετο ... διάδημα
  chosen: put on a crown
  alternatives:
  - placed a diadem on himself
  - wore a diadem
  lexicon: LSJ
  rationale: διάδημα is specifically a royal headband/diadem, but 'crown' is the clearest
    natural English here. 'Put on' reflects ἐπέθετο straightforwardly without over-literal
    awkwardness.
- source_word: πορφύραν
  chosen: purple
  alternatives:
  - purple robe
  - purple clothing
  lexicon: LSJ
  rationale: The Greek names the purple garment/material metonymically. 'Purple' preserves
    the concise source wording and its association with royal status; English readers
    can infer regal clothing from context.
- source_word: ἁδρυνθῆναι
  chosen: to exalt themselves
  alternatives:
  - to magnify themselves
  - to make themselves grand
  - to become haughty
  lexicon: LSJ
  rationale: The infinitive expresses the purpose/result of wearing purple in a self-aggrandizing
    way. 'Exalt themselves' captures the sense of making oneself appear grand without
    importing a narrower moral nuance than the context requires.
- source_word: ἐν αὐτῇ
  chosen: by it
  alternatives:
  - in it
  - through it
  lexicon: LSJ
  rationale: The pronoun most naturally refers to the purple as the means of self-exaltation.
    'By it' makes the instrumental sense clear in idiomatic English.
