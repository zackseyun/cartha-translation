translation:
  text: And when the report became known to them, they sent one general against them,
    and they fought against them, and many of them fell wounded, and they took their
    wives and their children captive, and plundered them, and gained control of their
    land, and pulled down their strongholds, and plundered them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek repeats 'and plundered them' at the end of the verse. The repetition
      is retained in the main text because it is present in the source, though it
      may reflect either deliberate emphasis or a transmissional duplication.
    reason: textual_variant
lexical_decisions:
- source_word: ἐγνώσθη ὁ λόγος
  chosen: the report became known
  alternatives:
  - the matter became known
  - the news was made known
  - the word became known
  lexicon: LSJ
  rationale: λόγος here refers not to a spoken 'word' in isolation but to a report
    or matter that came to the Romans' attention. The passive ἐγνώσθη is naturally
    rendered 'became known' rather than a more wooden 'was known.'
- source_word: ἀπέστειλαν ἐπʼ αὐτοὺς στρατηγὸν ἕνα
  chosen: they sent one general against them
  alternatives:
  - they sent a single commander against them
  - they dispatched one general to them
  lexicon: LSJ
  rationale: στρατηγός is best rendered 'general' in this military context. ἕνα is
    retained as 'one'/'single' to preserve the emphasis that a lone commander was
    sufficient for the campaign.
- source_word: ἐπολέμησαν πρὸς αὐτούς
  chosen: they fought against them
  alternatives:
  - they made war on them
  - they waged war against them
  lexicon: LSJ
  rationale: A straightforward military verb; 'fought against' is clear modern English
    and preserves the adversative force of πρὸς.
- source_word: ἔπεσαν ἐξ αὐτῶν τραυματίαι πολλοί
  chosen: many of them fell wounded
  alternatives:
  - many of them fell as casualties
  - many were wounded and fell
  lexicon: LSJ
  rationale: τραυματίαι denotes wounded men or casualties. 'Fell wounded' preserves
    both the military idiom of falling and the specific sense of being struck in battle,
    without over-specifying death.
- source_word: ᾐχμαλώτισαν
  chosen: they took ... captive
  alternatives:
  - they led ... away captive
  - they captured
  lexicon: LSJ
  rationale: The verb specifically denotes taking persons as captives of war. 'Took
    captive' is idiomatic and precise.
- source_word: ἐπρονόμευσαν αὐτούς
  chosen: plundered them
  alternatives:
  - despoiled them
  - spoiled them
  lexicon: LSJ
  rationale: The verb means to ravage or plunder after victory. 'Plundered' is the
    clearest modern equivalent. The Greek repeats this verb twice in the verse; the
    English preserves that repetition for transparency, even if stylistically heavy.
- source_word: κατεκράτησαν τῆς γῆς αὐτῶν
  chosen: gained control of their land
  alternatives:
  - took possession of their land
  - prevailed over their land
  - seized their land
  lexicon: LSJ
  rationale: κατακρατέω with the genitive conveys gaining mastery or control over
    something. 'Gained control of' reflects domination without implying a technical
    legal possession beyond the text.
- source_word: καθεῖλον τὰ ὀχυρώματα αὐτῶν
  chosen: pulled down their strongholds
  alternatives:
  - demolished their fortresses
  - threw down their fortifications
  lexicon: LSJ
  rationale: ὀχυρώματα are fortified places or strongholds. 'Pulled down' reflects
    καθεῖλον in accessible English while preserving the image of dismantling defenses.
