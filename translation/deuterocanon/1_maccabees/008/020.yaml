translation:
  text: Judas, who is also called Maccabeus, and his brothers and the multitude of
    the Jews sent us to you, to establish an alliance and peace with you, and to have
    us enrolled as your allies and friends.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that we might be registered/written down as your allies and friends.'
      The Greek likely refers to formal diplomatic enrollment or inscription.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  lexicon: LSJ
  rationale: Standard transliteration of the personal name in Greek narrative context;
    'Judas' is the conventional English form for Ἰούδας as a personal name in Second
    Temple literature.
- source_word: ὁ καὶ Μακκαβαῖος
  chosen: who is also called Maccabeus
  alternatives:
  - also Maccabeus
  - the one also called Maccabeus
  lexicon: LSJ
  rationale: The construction ὁ καὶ + name identifies an alternate name or epithet.
    'Who is also called' makes that appositional sense clear in natural English.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  chosen: his brothers
  alternatives:
  - his brethren
  lexicon: LSJ
  rationale: Literal and natural rendering of the familial term; no contextual reason
    to generalize beyond male siblings here.
- source_word: τὸ πλῆθος τῶν Ἰουδαίων
  chosen: the multitude of the Jews
  alternatives:
  - the assembly of the Jews
  - the body of the Jews
  - the mass of the Jews
  lexicon: LSJ
  rationale: πλῆθος denotes a large body or multitude. 'Multitude' preserves the collective
    sense without over-specifying a formal institution.
- source_word: ἀπέστειλαν ἡμᾶς πρὸς ὑμᾶς
  chosen: sent us to you
  alternatives:
  - dispatched us to you
  lexicon: LSJ
  rationale: Straightforward rendering of the aorist verb with object and destination;
    'sent us to you' is idiomatic and sufficiently formal.
- source_word: στῆσαι
  chosen: to establish
  alternatives:
  - to set up
  - to make
  lexicon: LSJ
  rationale: In this diplomatic context, the infinitive conveys the formal setting
    in place of a political arrangement. 'Establish' fits the register better than
    the more generic 'make'.
- source_word: συμμαχίαν
  chosen: an alliance
  alternatives:
  - a treaty of alliance
  - a military alliance
  lexicon: LSJ
  rationale: συμμαχία is a formal alliance, often political or military. 'Alliance'
    preserves that diplomatic force without adding details not explicit in the verse.
- source_word: εἰρήνην
  chosen: peace
  alternatives:
  - peace treaty
  lexicon: LSJ
  rationale: The noun is simply 'peace.' While diplomatic overtones are present, the
    text does not explicitly say 'treaty,' so the simpler rendering is preferred.
- source_word: γραφῆναι ἡμᾶς
  chosen: that we should be enrolled
  alternatives:
  - that we should be registered
  - to have us written down
  lexicon: LSJ
  rationale: The passive infinitive of γράφω here likely refers to formal inscription
    or registration in an official diplomatic record. 'Be enrolled' captures the administrative
    sense in readable English.
- source_word: συμμάχους καὶ φίλους ὑμῶν
  chosen: your allies and friends
  alternatives:
  - allies and friends of yours
  lexicon: LSJ
  rationale: A standard diplomatic pairing. 'Your allies and friends' is concise and
    reflects the genitive relation naturally in English.
