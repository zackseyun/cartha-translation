translation:
  text: and what they did in the land of Spain, to gain control of the silver and
    gold mines there,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the silver and gold resources there'; the Greek term can refer either
      to the metals themselves or to the mines from which they were obtained.
    reason: lexical_alternative
lexical_decisions:
- source_word: χώρα
  chosen: land
  alternatives:
  - region
  - country
  lexicon: LSJ
  rationale: χώρα commonly denotes a land, region, or territory. 'Land' fits the geographic
    sense here without implying a modern nation-state too strongly, while still reading
    naturally in English.
- source_word: Σπανίας
  chosen: Spain
  alternatives:
  - Hispania
  lexicon: LSJ
  rationale: The genitive after χώρα refers to the well-known western territory. 'Spain'
    is the standard modern English geographical rendering; 'Hispania' would be more
    transliterative but less natural for readers.
- source_word: κατακρατῆσαι
  chosen: gain control of
  alternatives:
  - seize
  - master
  - take possession of
  lexicon: LSJ
  rationale: 'The aorist infinitive expresses purpose: what they did was aimed at
    securing dominance over the resources. ''Gain control of'' captures the force
    of κρατέω with κατά better than the narrower ''seize,'' and is smoother than the
    more literal but less idiomatic ''master.'''
- source_word: μέταλλα
  chosen: mines
  alternatives:
  - metals
  - mineral resources
  lexicon: LSJ
  rationale: Although the term can denote metals or mines, the phrase 'of the silver
    and gold there' in context points to mining resources or workings rather than
    the abstract substances alone. 'Mines' best conveys the economic-military objective
    described.
- source_word: ἀργύριον
  chosen: silver
  lexicon: LSJ
  rationale: Standard rendering for the precious metal; no contextual reason to vary.
- source_word: χρυσίον
  chosen: gold
  lexicon: LSJ
  rationale: Standard rendering for the precious metal; paired naturally with 'silver'
    in English.
- source_word: τοῦ ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: LSJ
  rationale: The article with the adverb functions idiomatically to specify the mines
    located in that region. 'There' is concise and natural.
