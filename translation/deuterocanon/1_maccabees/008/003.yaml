  text: καὶ ὅσα ἐποίησαν ἐν χώρᾳ Σπανίας, τοῦ κατακρατῆσαι τῶν μετάλλων τοῦ ἀργυρίου
    καὶ τοῦ χρυσίου τοῦ ἐκεῖ,
