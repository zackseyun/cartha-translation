translation:
  text: And Philip, and Perseus king of the Kittians, and those who rose up against
    them—they crushed them in war and prevailed over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'king of the Kittians.' The expression may refer historically to the
      Macedonian realm; some translations render the sense rather than the ethnicon.
    reason: alternative_reading
  - marker: b
    text: The Greek text as transmitted here contains repeated καὶ ('and and and');
      this appears to be a textual irregularity, but it does not materially change
      the sense.
    reason: textual_variant
lexical_decisions:
- source_word: Φίλιππον
  chosen: Philip
  lexicon: LSJ
  rationale: Personal name transliterated by standard English convention.
- source_word: Περσέα
  chosen: Perseus
  lexicon: LSJ
  rationale: Personal name transliterated by standard English convention.
- source_word: Κιτιέων
  chosen: of the Kittians
  alternatives:
  - of Citium
  - of the Macedonians
  lexicon: LSJ
  rationale: The Greek ethnicon is literally 'Kittians/Citians.' In historical context
    it likely refers to Macedonians, but the source text itself uses the ethnicon,
    so the translation preserves it rather than replacing it with a historical interpretation.
    'Of Citium' is possible as a more place-specific rendering, but 'of the Kittians'
    better reflects the plural ethnicon form.
- source_word: βασιλέα
  chosen: king
  lexicon: LSJ
  rationale: Standard rendering of the royal title.
- source_word: τοὺς ἐπηρμένους ἐπʼ αὐτοὺς
  chosen: those who rose up against them
  alternatives:
  - those who were lifted up against them
  - those who attacked them
  lexicon: LSJ
  rationale: The participle from ἐπαίρω here idiomatically conveys hostile rising
    up or rebellion. 'Rose up against' preserves the metaphor while remaining natural
    English.
- source_word: συνέτριψαν
  chosen: they crushed
  alternatives:
  - they shattered
  - they broke
  lexicon: LSJ
  rationale: Conveys decisive military defeat with strong force; 'crushed' fits the
    war context naturally.
- source_word: πολέμῳ
  chosen: in war
  alternatives:
  - by war
  - in battle
  lexicon: LSJ
  rationale: Instrumental/dative sense in a military context; 'in war' is concise
    and idiomatic.
- source_word: κατεκράτησαν αὐτῶν
  chosen: prevailed over them
  alternatives:
  - gained mastery over them
  - overpowered them
  lexicon: LSJ
  rationale: The verb means to gain control or mastery over. 'Prevailed over' is clear
    modern English and avoids overstating permanent political domination beyond the
    verse's wording.
