  - of the Macedonians
  rationale: This is not a doctrinally contested term, but it is interpretively significant.
    The translation follows the Greek wording rather than substituting a historical
    identification. Because many readers will understand the referent as Macedonian
    rulers, that alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
