translation:
  text: And concerning the wrongs that King Demetrius is doing to them, we wrote to
    him, saying, “Why have you made your yoke heavy upon our friends and allies, the
    Jews?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the evils' or 'the harms' that King Demetrius is bringing upon them.'
      The Greek expression can denote injurious acts or oppressive measures, not only
      moral evil in the abstract.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ τῶν κακῶν
  chosen: concerning the wrongs
  alternatives:
  - about the evils
  - concerning the harms
  - concerning the troubles
  lexicon: LSJ
  rationale: κακά here refers to harmful actions or injuries done to the Jews, not
    abstract moral evil alone. 'Wrongs' captures concrete mistreatment in idiomatic
    English while staying close to the Greek.
- source_word: συντελεῖται εἰς αὐτούς
  chosen: is carrying out against them
  alternatives:
  - is accomplishing against them
  - is bringing upon them
  - is perpetrating toward them
  lexicon: LSJ
  rationale: The middle/passive-form verb with εἰς αὐτούς conveys actions being effected
    against the Jews. 'Is carrying out against them' preserves the sense of ongoing
    hostile measures without over-paraphrasing.
- source_word: ἐγράψαμεν αὐτῷ
  chosen: we wrote to him
  alternatives:
  - we have written to him
  lexicon: LSJ
  rationale: Aorist narrative context favors simple past in English.
- source_word: Διὰ τί ἐβάρυνας
  chosen: Why have you made ... heavy
  alternatives:
  - Why did you burden
  - Why have you burdened
  lexicon: LSJ
  rationale: The verb means to weigh down or burden. Rendering with 'made ... heavy'
    keeps the metaphor linked explicitly to 'yoke' and reflects the Greek wording.
- source_word: τὸν ζυγόν σου
  chosen: your yoke
  alternatives:
  - your burden
  lexicon: LSJ
  rationale: ζυγός literally means 'yoke' and is a common metaphor for oppressive
    rule or imposed burden. The literal image should be preserved.
- source_word: ἐπὶ τοὺς φίλους ἡμῶν τοὺς συμμάχους Ἰουδαίους
  chosen: upon our friends and allies, the Jews
  alternatives:
  - on our Jewish friends and allies
  - upon the Jews, our friends and allies
  lexicon: LSJ
  rationale: The appositional structure identifies the Jews as both friends and allies.
    The chosen order preserves the Greek sequence while remaining natural English.
