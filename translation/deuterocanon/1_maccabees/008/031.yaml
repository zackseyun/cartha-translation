  text: καὶ περὶ τῶν κακῶν ὧν ὁ βασιλεὺς Δημήτριος συντελεῖται εἰς αὐτούς, ἐγράψαμεν
    αὐτῷ λέγοντες Διὰ τί ἐβάρυνας τὸν ζυγόν σου ἐπὶ τοὺς φίλους ἡμῶν τοὺς συμμάχους
    Ἰουδαίους;
