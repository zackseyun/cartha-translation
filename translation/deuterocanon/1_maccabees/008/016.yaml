  text: καὶ πιστεύουσιν ἑνὶ ἀνθρώπῳ ἄρχειν αὐτῶν κατ' ἐνιαυτὸν καὶ κυριεύειν πάσης
    τῆς γῆς αὐτῶν, καὶ πάντες ἀκούουσιν τοῦ ἑνός, καὶ οὐκ ἔστιν φθόνος οὔτε ζῆλος
