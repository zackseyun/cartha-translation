translation:
  text: And they entrust one man to rule over them each year and to exercise lordship
    over all their land, and all listen to the one, and there is no envy or jealousy
    among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obey the one man.' The Greek says literally 'all listen to the one,'
      which can imply obedience in this governing context.
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστεύουσιν
  chosen: entrust
  alternatives:
  - appoint
  - trust
  - commit
  lexicon: LSJ
  rationale: In this political context with an infinitive complement ('to rule...
    and to exercise lordship'), the verb conveys placing authority in someone's hands
    rather than merely believing him. 'Entrust' captures delegated authority better
    than the flatter 'trust' or the more interpretive 'appoint'.
- source_word: ἑνὶ ἀνθρώπῳ
  chosen: one man
  alternatives:
  - one person
  - a single man
  lexicon: LSJ
  rationale: The Greek is explicitly masculine singular. Per gender-accurate philosophy,
    'one man' is preferred over the more neutral 'one person'.
- source_word: ἄρχειν
  chosen: to rule over
  alternatives:
  - to govern
  - to lead
  lexicon: LSJ
  rationale: The verb denotes exercising governing authority. 'Rule over' preserves
    the political force more clearly than 'lead' and is slightly more direct than
    'govern'.
- source_word: κατ' ἐνιαυτόν
  chosen: each year
  alternatives:
  - for a year
  - year by year
  - annually
  lexicon: LSJ
  rationale: The phrase indicates a yearly term of office. 'Each year' is natural
    English and preserves the recurring annual sense.
- source_word: κυριεύειν
  chosen: to exercise lordship over
  alternatives:
  - to have dominion over
  - to rule
  - to be master over
  lexicon: LSJ
  rationale: The verb is stronger than a second generic 'rule' and overlaps with the
    semantic field of lordship/mastery. 'Exercise lordship over' preserves that force
    without becoming archaic.
- source_word: πάσης τῆς γῆς αὐτῶν
  chosen: all their land
  alternatives:
  - their whole land
  - all their territory
  lexicon: LSJ
  rationale: γῆ can mean land/territory/earth. In this civic-political setting, 'land'
    is the most straightforward rendering; 'territory' is possible but slightly more
    interpretive.
- source_word: ἀκούουσιν τοῦ ἑνός
  chosen: listen to the one
  alternatives:
  - obey the one man
  - heed the one
  lexicon: LSJ
  rationale: ἀκούω with genitive can mean hear/listen to, and in context implies compliance.
    'Listen to the one' keeps the Greek's wording while allowing the political implication
    to be heard; 'obey' would be a stronger interpretive step.
- source_word: φθόνος
  chosen: envy
  alternatives:
  - resentment
  lexicon: LSJ
  rationale: A standard rendering for φθόνος, denoting envious ill will.
- source_word: ζῆλος
  chosen: jealousy
  alternatives:
  - rivalry
  - zeal
  lexicon: LSJ
  rationale: In this paired negative social context with φθόνος, the sense is negative
    jealousy or rivalry rather than positive zeal. 'Jealousy' preserves the lexical
    distinction while remaining idiomatic.
