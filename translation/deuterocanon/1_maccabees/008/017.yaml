translation:
  text: And Judas chose Eupolemus son of John, the son of Accos, and Jason son of
    Eleazar, and sent them to Rome to establish friendship and alliance with them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'Eupolemus son of John of Accos,' if the final genitive is
      taken as linked directly to John rather than as a second-generation patronymic.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέλεξεν
  chosen: chose
  alternatives:
  - selected
  - appointed
  lexicon: BDAG
  rationale: The verb straightforwardly denotes choosing or selecting. 'Chose' is
    the most natural modern English rendering and fits the narrative context without
    overstating formal appointment.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Standard narrative verb for sending. 'Sent' is clear and idiomatic.
- source_word: στῆσαι
  chosen: to establish
  alternatives:
  - to set up
  - to secure
  lexicon: BDAG
  rationale: 'The aorist infinitive here expresses purpose: they were sent in order
    to bring about or establish a formal relationship. ''Establish'' best fits diplomatic
    context with φιλίαν καὶ συμμαχίαν.'
- source_word: φιλίαν
  chosen: friendship
  alternatives:
  - friendly relations
  lexicon: LSJ
  rationale: In diplomatic context φιλία can denote formal friendship between states
    or parties. 'Friendship' preserves the lexical form while remaining understandable;
    the political nuance is supported by its pairing with συμμαχίαν.
- source_word: συμμαχίαν
  chosen: alliance
  alternatives:
  - treaty alliance
  - military alliance
  lexicon: LSJ
  rationale: The term denotes an alliance, often political or military. 'Alliance'
    is concise and accurate; adding 'military' would over-specify beyond the immediate
    wording.
- source_word: τοῦ Ἀκχώς
  chosen: the son of Accos
  alternatives:
  - of Accos
  lexicon: LSJ
  rationale: 'The repeated article with genitive after υἱὸν Ἰωάνου naturally continues
    the patronymic chain: ''son of John, the son of Accos.'' This preserves the Greek
    structure more transparently than leaving the final genitive unattached.'
- source_word: αὐτοῖς
  chosen: with them
  alternatives:
  - for them
  lexicon: BDAG
  rationale: With φιλίαν καὶ συμμαχίαν in a diplomatic setting, the dative is best
    represented relationally as 'with them,' referring to the Romans. 'For them' is
    less idiomatic and less precise in English.
