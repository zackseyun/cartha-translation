translation:
  text: According to these terms, the Romans thus established matters with the people
    of the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the Judeans.' The Greek Ἰουδαίων can denote either the Jewish people
      or the people of Judea, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  chosen: According to
  alternatives:
  - In accordance with
  - By
  lexicon: BDAG
  rationale: The preposition with the accusative here introduces conformity to the
    preceding stipulations; 'According to' is natural English and preserves the legal/formulaic
    sense.
- source_word: τοὺς λόγους τούτους
  chosen: these terms
  alternatives:
  - these words
  - these provisions
  lexicon: BDAG
  rationale: Although literally 'these words,' in treaty/legal context λόγοι refers
    to the stated clauses or terms. 'These terms' best conveys the juridical force
    without wooden literalism.
- source_word: οὕτως
  chosen: thus
  alternatives:
  - so
  - in this way
  lexicon: BDAG
  rationale: οὕτως points back to the manner just described. 'Thus' keeps the formal
    register of the sentence.
- source_word: ἔστησαν
  chosen: established matters with
  alternatives:
  - made
  - set up
  - confirmed
  lexicon: LSJ
  rationale: The aorist of ἵστημι in diplomatic/legal context can mean to set in place
    or establish an arrangement. Because the Greek does not explicitly repeat 'covenant'
    or 'treaty,' 'established matters with' reflects the elliptical legal sense without
    over-specifying.
- source_word: Ῥωμαῖοι
  chosen: the Romans
  alternatives:
  - Romans
  lexicon: BDAG
  rationale: 'The anarthrous proper ethnonym is naturally rendered as a people-group
    subject in English: ''the Romans.'''
- source_word: τῷ δήμῳ
  chosen: with the people
  alternatives:
  - for the people
  - with the assembly
  - with the nation
  lexicon: LSJ
  rationale: δῆμος commonly means 'people' or civic body. Here dative after ἔστησαν
    marks the party with whom the arrangement was established. 'People' is the clearest
    English equivalent.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Judeans
  lexicon: BDAG
  rationale: Ἰουδαῖοι can mean either 'Jews' or 'Judeans.' In 1 Maccabees this often
    carries ethnoreligious force broader than mere geographic origin. 'Jews' is the
    default here, while the geographic nuance remains possible.
