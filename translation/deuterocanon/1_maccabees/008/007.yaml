translation:
  text: and they took him alive, and imposed on them that he and those reigning after
    him should pay a great tribute, and give hostages and a territory cession,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'captured him alive.'
    reason: lexical_alternative
  - marker: b
    text: The Greek term rendered 'territory cession' (διαστολήν) is difficult and
      may denote a territorial division, demarcation, or concession of land as part
      of the imposed settlement.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβον αὐτὸν ζῶντα
  chosen: they took him alive
  alternatives:
  - they captured him alive
  - they seized him alive
  lexicon: LSJ
  rationale: The participle ζῶντα specifies that he was taken alive rather than killed.
    'Took him alive' is concise and natural English while preserving the force of
    the Greek.
- source_word: ἔστησαν αὐτοῖς διδόναι
  chosen: imposed on them that ... should pay / give
  alternatives:
  - required them to give
  - compelled them to pay
  lexicon: LSJ
  rationale: The construction with ἔστησαν plus infinitive conveys establishing or
    imposing an obligation. 'Imposed on them that...' preserves the causative/legal
    sense better than a weaker 'asked' or overly interpretive 'forced.'
- source_word: φόρον μέγαν
  chosen: a great tribute
  alternatives:
  - a heavy tribute
  - a large tax
  lexicon: LSJ
  rationale: φόρος in this political context is tribute paid by a subjected ruler
    or people. 'Tribute' is more historically precise than 'tax.' 'Great' follows
    the adjective μέγαν closely; 'heavy' is possible but slightly more interpretive.
- source_word: ὅμηρα
  chosen: hostages
  alternatives:
  - pledges
  lexicon: LSJ
  rationale: ὅμηρα refers to persons given as security in political arrangements.
    'Hostages' is the standard and clearest rendering.
- source_word: διαστολήν
  chosen: a territory cession
  alternatives:
  - a division of land
  - a district
  - separation
  lexicon: LSJ
  rationale: In this treaty context, διαστολή likely refers to a territorial concession
    or demarcated portion yielded as part of the settlement. Because the bare noun
    is not transparent in English, 'territory cession' makes explicit the probable
    political sense without overexpanding into a full paraphrase.
- source_word: τοὺς βασιλεύοντας μετʼ αὐτόν
  chosen: those reigning after him
  alternatives:
  - his successors on the throne
  - those who would reign after him
  lexicon: LSJ
  rationale: The participle βασιλεύοντας denotes those exercising kingship, and μετʼ
    αὐτόν marks succession. 'Those reigning after him' stays close to the Greek while
    remaining readable.
