translation:
  text: Likewise, if war should come first upon the nation of the Jews, the Romans
    will fight as allies with full commitment, as the occasion may indicate to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wholeheartedly' for 'with full commitment' (ἐκ ψυχῆς).
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be rendered 'as circumstances may suggest to them'
      or 'as the time may prescribe to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ τὰ αὐτὰ
  chosen: Likewise
  alternatives:
  - In the same way
  - Similarly
  lexicon: LSJ
  rationale: Idiomatic transitional phrase referring back to the reciprocal terms
    just stated; 'Likewise' gives natural English while preserving the comparative
    force.
- source_word: ἔθνει Ἰουδαίων
  chosen: the nation of the Jews
  alternatives:
  - the Jewish nation
  - the people of the Jews
  lexicon: LSJ
  rationale: ἔθνος here denotes a people/nation rather than 'Gentiles.' 'The nation
    of the Jews' stays close to the Greek construction and avoids importing later
    ethnic-political nuances beyond the text.
- source_word: συμβῇ
  chosen: should come
  alternatives:
  - should happen
  - should occur
  - should befall
  lexicon: LSJ
  rationale: The verb means 'happen' or 'occur'; with πόλεμος as subject, 'war should
    come' is idiomatic English and preserves the contingent sense of ἐὰν + subjunctive.
- source_word: προτέρῳ
  chosen: first
  alternatives:
  - beforehand
  - earlier
  lexicon: LSJ
  rationale: 'The adverbial comparative indicates priority in time: if war comes to
    the Jews first, before it comes to Rome. ''First'' is concise and clear.'
- source_word: συμμαχήσουσιν
  chosen: will fight as allies
  alternatives:
  - will ally themselves with
  - will give military assistance
  lexicon: LSJ
  rationale: The future verb denotes rendering allied military aid, not merely entering
    an alliance abstractly. 'Will fight as allies' makes the military sense explicit
    from context.
- source_word: ἐκ ψυχῆς
  chosen: with full commitment
  alternatives:
  - wholeheartedly
  - from the soul
  - sincerely
  lexicon: LSJ
  rationale: The phrase expresses wholeheartedness or earnestness. 'With full commitment'
    is natural modern English and fits the treaty context without sounding colloquial.
- source_word: ὡς ἂν αὐτοῖς ὁ καιρὸς ὑπογράφῃ
  chosen: as the occasion may indicate to them
  alternatives:
  - as the time may prescribe to them
  - as circumstances may suggest to them
  - as opportunity may direct them
  lexicon: LSJ
  rationale: ὁ καιρός here is the fitting occasion/circumstance, and ὑπογράφῃ conveys
    indicating, prescribing, or setting out what is appropriate. The clause limits
    Roman aid according to circumstances. 'As the occasion may indicate to them' preserves
    that open-ended conditional nuance.
