  text: μετὰ δὲ τῶν φίλων αὐτῶν καὶ τῶν ἐπαναπαυομένων αὐτοῖς συνετήρησαν αὐτοῖς φιλίαν,
    καὶ κατεκράτησαν τῶν βασιλειῶν τῶν ἐγγὺς καὶ τῶν μακρῶν· καὶ ὅσοι ἤκουσαν τὸ ὄνομα
    αὐτῶν ἐφοβοῦντο αὐτούς·
