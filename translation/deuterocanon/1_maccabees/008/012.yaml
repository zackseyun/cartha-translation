translation:
  text: But with their allies and with those who relied on them they maintained friendship,
    and they gained control over the kingdoms near and far; and all who heard their
    name feared them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their friends' for 'their allies'; the Greek φίλοι can denote personal
      friends or political allies, and the diplomatic context favors 'allies.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'heard their name,' an expression that can mean hearing of their
      reputation or renown.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ δὲ
  chosen: But with
  alternatives:
  - And with
  - Now with
  lexicon: LSJ
  rationale: δέ marks continuation with mild contrast or progression; 'But with' preserves
    the connective force in readable English without overstating contrast.
- source_word: τῶν φίλων αὐτῶν
  chosen: their allies
  alternatives:
  - their friends
  lexicon: LSJ
  rationale: φίλοι can mean literal 'friends,' but in political/military context here
    it refers to friendly states or partners; 'allies' better fits the diplomatic
    setting.
- source_word: τῶν ἐπαναπαυομένων αὐτοῖς
  chosen: those who relied on them
  alternatives:
  - those who trusted them
  - those who rested on them
  lexicon: LSJ
  rationale: The middle/passive participle of ἐπαναπαύομαι conveys dependence or confidence
    placed in someone. 'Relied on them' is idiomatic and suits the interstate context.
- source_word: συνετήρησαν αὐτοῖς φιλίαν
  chosen: they maintained friendship
  alternatives:
  - they kept friendship with them
  - they preserved friendship for them
  lexicon: LSJ
  rationale: συντηρέω here means to keep or maintain; φιλία in context is diplomatic
    friendship. 'Maintained friendship' is natural English and preserves the formal
    relationship implied.
- source_word: κατεκράτησαν
  chosen: they gained control over
  alternatives:
  - they prevailed over
  - they ruled
  - they mastered
  lexicon: LSJ
  rationale: κατακρατέω can mean seize mastery over or dominate. 'Gained control over'
    captures successful political domination without implying a formal title of kingship.
- source_word: τῶν βασιλειῶν
  chosen: the kingdoms
  alternatives:
  - the kingdoms' rulers
  - the royal realms
  lexicon: LSJ
  rationale: The genitive plural naturally refers to kingdoms/realms here, not individual
    kings, and matches the territorial sense of Roman expansion.
- source_word: τῶν ἐγγὺς καὶ τῶν μακρῶν
  chosen: near and far
  alternatives:
  - those nearby and those far away
  - the nearby and the distant
  lexicon: LSJ
  rationale: This concise pair is idiomatic in English and preserves the merism of
    geographical extent.
- source_word: ὅσοι ἤκουσαν τὸ ὄνομα αὐτῶν
  chosen: all who heard their name
  alternatives:
  - as many as heard of them
  - all who heard their reputation
  lexicon: LSJ
  rationale: The phrase literally says 'heard their name,' which in context implies
    hearing of their renown. Retaining 'name' preserves the source wording and its
    connotation of reputation.
- source_word: ἐφοβοῦντο αὐτούς
  chosen: feared them
  alternatives:
  - were afraid of them
  - stood in fear of them
  lexicon: LSJ
  rationale: φοβέομαι here denotes fear in response to Roman power. 'Feared them'
    is direct and sufficiently weighty.
