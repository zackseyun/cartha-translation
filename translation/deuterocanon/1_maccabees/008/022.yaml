  text: καὶ τοῦτο τὸ ἀντίγραφον τῆς γραφῆς ἧς ἀντέγραψαν ἐπὶ δέλτους χαλκαῖς καὶ ἀπέστειλαν
    εἰς Ἱερουσαλήμ· εἶναι παρ' αὐτοῖς ἐκεῖ μνημόσυνον εἰρήνης καὶ συμμαχίας
