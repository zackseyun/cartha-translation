translation:
  text: And this is the copy of the document that they copied onto bronze tablets
    and sent to Jerusalem, to be there among them as a memorial of peace and alliance.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀντίγραφον
  chosen: copy
  alternatives:
  - transcript
  - duplicate
  lexicon: LSJ
  rationale: The term denotes a reproduced written text. 'Copy' is the most natural
    modern English equivalent and fits the administrative context.
- source_word: γραφῆς
  chosen: document
  alternatives:
  - writing
  - record
  lexicon: LSJ
  rationale: Here γραφή refers to the written instrument or record just mentioned,
    not 'Scripture.' 'Document' best conveys an official written text in context.
- source_word: ἀντέγραψαν
  chosen: they copied
  alternatives:
  - they transcribed
  - they inscribed as a copy
  lexicon: LSJ
  rationale: The verb is cognate with ἀντίγραφον and indicates making a copy. 'They
    copied' is straightforward and preserves the repetition with 'copy' in English.
- source_word: ἐπὶ δέλτους χαλκαῖς
  chosen: onto bronze tablets
  alternatives:
  - on bronze tablets
  - onto bronze plates
  lexicon: LSJ
  rationale: δέλτοι are writing tablets; χαλκαῖς specifies bronze material. 'Bronze
    tablets' is idiomatic and suits an official treaty inscription.
- source_word: μνημόσυνον
  chosen: memorial
  alternatives:
  - reminder
  - record
  lexicon: LSJ
  rationale: The noun denotes something kept in remembrance. 'Memorial' preserves
    the formal, commemorative sense appropriate to a deposited treaty copy.
- source_word: εἰρήνης
  chosen: peace
  alternatives:
  - peace treaty
  lexicon: LSJ
  rationale: The Greek noun is simply 'peace.' Although treaty context is present,
    the text itself does not explicitly say 'peace treaty,' so the simpler rendering
    is preferred.
- source_word: συμμαχίας
  chosen: alliance
  alternatives:
  - treaty
  - military alliance
  lexicon: LSJ
  rationale: συμμαχία commonly denotes an alliance, often political or military. 'Alliance'
    is the most direct rendering and leaves the exact scope to the context.
- source_word: παρ' αὐτοῖς
  chosen: among them
  alternatives:
  - with them
  - in their possession
  lexicon: LSJ
  rationale: The phrase indicates the copy's presence with the Jerusalem community.
    'Among them' reads naturally in the clause 'to be there among them' while preserving
    the relational sense.
