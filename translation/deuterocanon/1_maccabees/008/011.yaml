translation:
  text: And they enslaved them to this day. And the remaining kingdoms and the islands—as
    many as ever resisted them—they ruined and enslaved to themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until this day.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they destroyed' or 'they laid waste'; the Greek verb can denote severe
      devastation.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεδουλώσαντο
  chosen: enslaved
  alternatives:
  - subjugated
  - made slaves of
  lexicon: LSJ
  rationale: From καταδουλόω, the sense is to bring into slavery or complete subjection.
    Given the verse's military-political context and project guidance on bonded terms,
    'enslaved' best preserves the force more strongly than the softer 'subjugated'.
- source_word: ἕως τῆς ἡμέρας ταύτης
  chosen: to this day
  alternatives:
  - until this day
  lexicon: LSJ
  rationale: Standard idiom meaning the condition continued up to the writer's present.
    'To this day' is natural modern English and preserves the durative force.
- source_word: τὰς ἐπιλοίπους βασιλείας
  chosen: the remaining kingdoms
  alternatives:
  - the other kingdoms
  - the rest of the kingdoms
  lexicon: LSJ
  rationale: ἐπίλοιπος means remaining or left over. 'The remaining kingdoms' fits
    the catalog-like style and likely refers to kingdoms not yet named in the preceding
    context.
- source_word: τὰς νήσους
  chosen: the islands
  alternatives:
  - the island territories
  lexicon: LSJ
  rationale: νήσοι straightforwardly means islands. No expansion beyond the Greek
    is needed.
- source_word: ὅσοι ποτὲ ἀντέστησαν αὐτοῖς
  chosen: as many as ever resisted them
  alternatives:
  - whoever at any time opposed them
  - all who ever stood against them
  lexicon: LSJ
  rationale: The phrase is indefinite and comprehensive. 'As many as ever resisted
    them' preserves both the breadth of ὅσοι and the emphatic ποτέ.
- source_word: κατέφθειραν
  chosen: they ruined
  alternatives:
  - they destroyed
  - they laid waste
  lexicon: LSJ
  rationale: καταφθείρω can mean destroy, ruin, or corrupt. Here, paired with subsequent
    enslavement, 'ruined' captures severe devastation without implying total annihilation,
    which the following enslavement might seem to complicate.
- source_word: ἐδούλωσαν αὐτοῖς
  chosen: enslaved to themselves
  alternatives:
  - made subject to them
  - enslaved them
  lexicon: LSJ
  rationale: The dative αὐτοῖς is explicit and should be represented. 'Enslaved to
    themselves' is slightly wooden but transparent to the Greek, showing that these
    peoples were made subject as slaves to the Romans.
