translation:
  text: And Judas heard the name of the Romans, that they are mighty in strength,
    and that they are well disposed toward all who attach themselves to them, and
    that as many as come to them obtain friendship with them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the reputation of the Romans.' The Greek says literally 'the name of
      the Romans,' with 'name' carrying the sense of renown or report.
    reason: lexical_alternative
  - marker: b
    text: '''Friendship'' here likely includes formal political friendship or alliance,
      not merely personal affection.'
    reason: cultural_note
lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned of
  - heard about
  lexicon: BDAG
  rationale: Basic aorist of hearing/report reception. 'Heard' is the most direct
    rendering; the following object 'the name of the Romans' naturally carries the
    sense of hearing reports about them without needing expansion.
- source_word: τὸ ὄνομα τῶν Ῥωμαίων
  chosen: the name of the Romans
  alternatives:
  - the reputation of the Romans
  - report of the Romans
  lexicon: LSJ
  rationale: ὄνομα can denote 'name' literally and, by extension, reputation. The
    Greek wording is formally 'heard the name'; retaining 'name' preserves the idiom
    and lets the following clauses unpack the content of that reputation.
- source_word: δυνατοὶ ἐν ἰσχύϊ
  chosen: mighty in strength
  alternatives:
  - powerful in might
  - strong in power
  lexicon: LSJ
  rationale: The phrase is somewhat emphatic and slightly redundant in Greek. 'Mighty
    in strength' preserves that intensification without becoming awkwardly wooden.
- source_word: εὐδοκοῦσιν
  chosen: are well disposed toward
  alternatives:
  - show favor to
  - take pleasure in
  lexicon: BDAG
  rationale: In this context the verb concerns favorable treatment of political associates,
    not inward delight alone. 'Are well disposed toward' captures the relational-political
    sense.
- source_word: τοῖς προστεθειμένοις αὐτοῖς
  chosen: all who attach themselves to them
  alternatives:
  - all who join them
  - all who ally themselves with them
  lexicon: LSJ
  rationale: The perfect middle/passive participle of προστίθημι here denotes persons
    who align or associate themselves with the Romans. 'Attach themselves to them'
    stays close to the Greek while remaining intelligible; 'ally themselves' is possible
    but slightly more interpretive.
- source_word: ὅσοι ἐὰν προσέλθωσιν αὐτοῖς
  chosen: as many as come to them
  alternatives:
  - whoever approaches them
  - all who go over to them
  lexicon: BDAG
  rationale: The construction is indefinite/general. 'As many as come to them' reflects
    the open-ended sense and keeps the movement/approach imagery.
- source_word: ἐσπῶντο αὐτοῖς φιλίαν
  chosen: obtain friendship with them
  alternatives:
  - win their friendship
  - secure an alliance with them
  lexicon: LSJ
  rationale: φιλία can mean friendship and, in political contexts, alliance/friendly
    relations. 'Obtain friendship with them' keeps the lexical value 'friendship'
    while allowing the diplomatic nuance to be heard from context. 'Alliance' is a
    plausible interpretive alternative worth preserving in a footnote.
