translation:
  text: Whomever they wish to help and make king, they make king; and whomever they
    wish, they remove, and they have become very great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they depose' for 'they remove'; the Greek verb can carry the sense of
      removing someone from office in a political setting.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they were exalted greatly'; the phrase summarizes their rise
      to great power.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷς δʼ ἂν βούλωνται
  chosen: Whomever they wish
  alternatives:
  - Those whom they wish
  - Whoever they want
  lexicon: BDAG
  rationale: The construction with ἄν and the subjunctive expresses an indefinite
    relative sense. 'Whomever they wish' is natural English and preserves the open-ended
    force.
- source_word: βοηθεῖν
  chosen: to help
  alternatives:
  - to aid
  - to come to the aid of
  lexicon: BDAG
  rationale: The verb means to help or aid. 'Help' is the clearest modern English
    equivalent and fits the political-military context without over-specifying.
- source_word: καὶ βασιλεύειν
  chosen: and make king
  alternatives:
  - and cause to reign
  - and establish as king
  lexicon: LSJ
  rationale: 'Although βασιλεύειν often means ''to reign'' or ''to be king,'' in this
    context after βούλωνται and followed by βασιλεύουσιν it carries a causative sense
    in English: they choose whom to support as king. ''Make king'' best captures the
    political agency described.'
- source_word: βασιλεύουσιν
  chosen: they make king
  alternatives:
  - they cause to reign
  - they rule
  lexicon: LSJ
  rationale: 'Given the parallel with the preceding infinitive and the object οἷς,
    the sense is transitive in context: they install or make someone king, not merely
    ''they reign.'' This preserves the syntax and political meaning.'
- source_word: μεθιστῶσιν
  chosen: they remove
  alternatives:
  - they depose
  - they transfer
  - they change
  lexicon: LSJ
  rationale: In this political context the verb refers to removing rulers from position.
    'Remove' is broad and readable; 'depose' is possible but slightly more interpretive.
- source_word: ὑψώθησαν σφόδρα
  chosen: they have become very great
  alternatives:
  - they were greatly exalted
  - they became exceedingly powerful
  lexicon: LSJ
  rationale: The aorist passive of ὑψόω can mean 'be exalted' or 'be raised high.'
    In context it summarizes Rome's rise in power and status. 'Have become very great'
    communicates the result in idiomatic English without importing extra nuance.
