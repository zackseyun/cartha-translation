translation:
  text: The nation of the Jews shall be an ally, whenever the occasion may prescribe
    it for them, with a full heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'wholeheartedly.' The Greek reads literally, 'with a full heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συμμαχήσει
  chosen: shall be an ally
  alternatives:
  - shall ally itself
  - shall fight alongside
  - shall make common cause
  lexicon: LSJ
  rationale: Future of συμμαχέω denotes entering or acting in alliance. 'Shall be
    an ally' fits the treaty context and reads naturally in English without over-specifying
    military action.
- source_word: τὸ ἔθνος τῶν Ἰουδαίων
  chosen: the nation of the Jews
  alternatives:
  - the Jewish nation
  - the people of the Jews
  lexicon: LSJ
  rationale: ἔθνος is most directly 'nation' or 'people.' In this diplomatic context,
    'nation' preserves the political-corporate sense. 'Of the Jews' reflects the genitive
    plainly.
- source_word: ὡς ἂν ὁ καιρὸς ὑπογράφῃ αὐτοῖς
  chosen: whenever the occasion may prescribe it for them
  alternatives:
  - as the time may indicate to them
  - whenever circumstances may require of them
  - as occasion may be set forth for them
  lexicon: LSJ
  rationale: ὡς ἄν with subjunctive gives an indefinite temporal sense, 'whenever/as
    occasion may.' καιρός here is the fitting occasion or circumstance. ὑπογράφῃ literally
    can mean 'write under, sketch, indicate, prescribe'; in a treaty setting 'prescribe'
    captures the sense of circumstances laying down what is fitting, while retaining
    some formal flavor.
- source_word: καρδίᾳ πλήρει
  chosen: with a full heart
  alternatives:
  - wholeheartedly
  - with full commitment
  - with an undivided heart
  lexicon: LSJ
  rationale: The dative phrase is idiomatic for sincerity or wholeheartedness. 'With
    a full heart' stays close to the Greek while remaining intelligible; the more
    idiomatic sense is effectively 'wholeheartedly.'
