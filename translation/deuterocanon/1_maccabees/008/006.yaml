translation:
  text: and Antiochus the great king of Asia, who came against them in war, having
    one hundred twenty elephants and cavalry and chariots and a very great force,
    was crushed by them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally has 'horse' (singular), but in this military inventory it
      is best understood collectively as cavalry or mounted troops.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀντίοχον
  chosen: Antiochus
  lexicon: LSJ
  rationale: Personal name transliterated by standard convention per project philosophy.
- source_word: τὸν μέγαν βασιλέα τῆς Ἀσίας
  chosen: the great king of Asia
  alternatives:
  - the great king over Asia
  - the mighty king of Asia
  lexicon: LSJ
  rationale: Retains the appositional title structure and the adjective μέγαν as 'great,'
    the most direct rendering in this royal context.
- source_word: τὸν πορευθέντα ἐπʼ αὐτοὺς εἰς πόλεμον
  chosen: who came against them in war
  alternatives:
  - who marched against them for war
  - who advanced against them into battle
  lexicon: LSJ
  rationale: Aorist participle of πορεύομαι here denotes military movement; 'came
    against them in war' is idiomatic English that preserves the hostile military
    sense without over-paraphrase.
- source_word: ἔχοντα
  chosen: having
  alternatives:
  - with
  - bringing
  lexicon: LSJ
  rationale: Keeps the participial linkage to Antiochus and straightforwardly introduces
    the list of military assets.
- source_word: ἑκατὸν εἴκοσι ἐλέφαντας
  chosen: one hundred twenty elephants
  alternatives:
  - a hundred and twenty elephants
  lexicon: LSJ
  rationale: Direct numerical rendering; modern English style favors 'one hundred
    twenty.'
- source_word: ἵππον
  chosen: cavalry
  alternatives:
  - horsemen
  - horse
  lexicon: LSJ
  rationale: Although singular in form, ἵππον in military listing functions collectively;
    'cavalry' best reflects the force category alongside chariots and army.
- source_word: ἅρματα
  chosen: chariots
  lexicon: LSJ
  rationale: Standard military term; direct rendering.
- source_word: δύναμιν πολλὴν σφόδρα
  chosen: a very great force
  alternatives:
  - an exceedingly large army
  - a very large force
  lexicon: LSJ
  rationale: δύναμις in this context refers to military force/army; 'force' preserves
    breadth, while πολλὴν σφόδρα is represented by 'very great' without sounding archaic.
- source_word: συνετρίβη
  chosen: was crushed
  alternatives:
  - was shattered
  - was defeated
  lexicon: LSJ
  rationale: The passive of συντρίβω is stronger than a generic 'was defeated'; 'was
    crushed' preserves the forceful sense of being broken by the opposing side.
- source_word: ἀπʼ αὐτῶν
  chosen: by them
  alternatives:
  - at their hands
  - by those men
  lexicon: LSJ
  rationale: In context this marks agency/source of the defeat; 'by them' is the most
    direct English rendering.
