translation:
  text: and that they are mighty in strength. They told him about their wars and the
    brave deeds they do among the Galatians, and that they had subdued them and brought
    them under tribute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acts of valor' for 'brave deeds.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'among the Galatians'; the phrase may refer to Roman exploits
      in relation to the Galatians or in Galatian territory.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνατοὶ ἰσχύϊ
  chosen: mighty in strength
  alternatives:
  - powerful in might
  - strong in power
  lexicon: LSJ
  rationale: The phrase is somewhat pleonastic in Greek, emphasizing military power.
    'Mighty in strength' preserves the intensification without sounding overly wooden.
- source_word: διηγήσαντο
  chosen: they told
  alternatives:
  - they recounted
  - they related
  lexicon: LSJ
  rationale: The verb denotes giving an account or narration. 'They told' is natural
    modern English; the object clause and following details carry the sense of recounting.
- source_word: πολέμους
  chosen: wars
  alternatives:
  - campaigns
  - battles
  lexicon: LSJ
  rationale: Plural 'wars' best matches the broad military conflicts in view. 'Battles'
    would be too narrow; 'campaigns' is possible but more interpretive.
- source_word: ἀνδραγαθίας
  chosen: brave deeds
  alternatives:
  - acts of valor
  - heroic deeds
  - manly exploits
  lexicon: LSJ
  rationale: The term refers to valorous acts. 'Brave deeds' is clear modern English
    and avoids archaic or potentially misleading gendered phrasing such as 'manly
    exploits,' while preserving the sense of martial valor.
- source_word: ποιοῦσιν ἐν τοῖς Γαλάταις
  chosen: they do among the Galatians
  alternatives:
  - they performed against the Galatians
  - they did in Galatia
  lexicon: LSJ
  rationale: The Greek literally says 'they do among the Galatians.' This likely refers
    to Roman exploits in relation to the Galatians. 'Among the Galatians' stays close
    to the wording while remaining intelligible; more adversative renderings are interpretive.
- source_word: κατεκράτησαν αὐτῶν
  chosen: had subdued them
  alternatives:
  - had prevailed over them
  - had gained mastery over them
  lexicon: LSJ
  rationale: The verb conveys overpowering or gaining control. 'Subdued' fits the
    military-political context and leads naturally into the tribute clause.
- source_word: ὑπὸ φόρον
  chosen: under tribute
  alternatives:
  - subject to tribute
  - to pay tribute
  - under taxation
  lexicon: LSJ
  rationale: The idiom indicates subjection through imposed tribute. 'Brought them
    under tribute' is a concise English equivalent that preserves the political sense.
