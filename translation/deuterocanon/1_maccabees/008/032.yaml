theological_decisions:
- issue: Apparent shift in addressee/object in the final clause
  chosen_reading: Retain the Greek wording 'we will fight you by sea and by land'
    in the main text.
  alternative_readings:
  - we will fight for you by sea and by land
  - we will fight them by sea and by land
  rationale: The extant Greek text reads πολεμήσομέν σε, literally 'we will fight
    you.' In context this is awkward, since the speaker is promising support to the
    addressee. Rather than emend or paraphrase beyond the source, the translation
    preserves the attested wording and notes the contextual alternatives in a footnote.
  doctrine_reference: Preserve theological/interpretive tension rather than resolve
    it; original-language primacy over translation tradition.
