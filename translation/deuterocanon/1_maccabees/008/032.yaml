translation:
  text: If they still bring charges against you, we will execute judgment on them,
    and we will fight you by sea and by land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''we will fight you by sea and by land.'' In context, this likely
      means either ''we will fight for you'' or reflects a textual difficulty in the
      transmitted wording.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐὰν
  chosen: If
  alternatives:
  - But if
  - And if
  lexicon: BDAG
  rationale: Introduces a conditional clause; simple 'If' best fits the syntax and
    keeps the sentence direct.
- source_word: οὖν
  chosen: still
  alternatives:
  - therefore
  - then
  - accordingly
  lexicon: BDAG
  rationale: In this context οὖν follows ἔτι and contributes to the sense of continuation
    from the prior stipulations. English 'still' captures the combined force naturally
    without an awkward 'therefore' in the middle of a condition.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  - further
  - again
  lexicon: BDAG
  rationale: 'Marks continued or renewed action: ''if they still...'' conveys the
    sense that hostile action persists despite prior arrangements.'
- source_word: ἐντύχωσιν
  chosen: bring charges against
  alternatives:
  - petition against
  - appeal against
  - attack
  lexicon: BDAG
  rationale: The verb can mean to approach, petition, or make an appeal/complaint.
    With κατὰ σοῦ ('against you'), the sense is hostile legal-diplomatic action rather
    than physical assault. 'Bring charges against' communicates that adversarial appeal
    clearly in modern English.
- source_word: κατὰ σοῦ
  chosen: against you
  alternatives:
  - concerning you
  - in opposition to you
  lexicon: BDAG
  rationale: Standard adversative sense of κατά with the genitive/pronoun in this
    context.
- source_word: ποιήσομεν
  chosen: we will execute
  alternatives:
  - we will do
  - we will carry out
  - we will inflict
  lexicon: BDAG
  rationale: With τὴν κρίσιν, the idiom means to carry out a judicial decision. 'Execute'
    preserves the formal force without sounding archaic.
- source_word: τὴν κρίσιν
  chosen: judgment
  alternatives:
  - justice
  - sentence
  - decision
  lexicon: BDAG
  rationale: κρίσις here is judicial action or judgment rendered against offenders.
    'Judgment' is the most straightforward and sufficiently weighty English equivalent.
- source_word: πολεμήσομέν
  chosen: we will fight
  alternatives:
  - we will wage war against
  - we will make war on
  lexicon: BDAG
  rationale: The future verb denotes military action. 'We will fight' is clear and
    natural; the object 'you' is retained as in the Greek, even though the broader
    context implies fighting on behalf of the addressee against his enemies.
- source_word: διὰ τῆς θαλάσσης
  chosen: by sea
  alternatives:
  - through the sea
  - on the sea
  lexicon: BDAG
  rationale: Idiomatic military expression indicating the maritime sphere of warfare;
    'by sea' is standard English.
- source_word: διὰ τῆς ξηρᾶς
  chosen: by land
  alternatives:
  - through the dry land
  - on land
  lexicon: BDAG
  rationale: Paired with 'by sea' in a conventional merism for total military support
    across both domains.
