translation:
  text: and that those from Greece had planned to come and remove them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wipe them out' / 'destroy them'; the Greek verb can imply forcible elimination,
      but 'remove' is retained in the main text as the broader rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἐκ τῆς Ἑλλάδος
  chosen: those from Greece
  alternatives:
  - the Greeks
  - those from Hellas
  lexicon: LSJ
  rationale: The phrase is literally 'those from Greece/Hellas.' 'Those from Greece'
    stays close to the Greek wording without over-specifying ethnicity beyond the
    source. 'The Greeks' is possible but slightly more interpretive.
- source_word: ἐβουλεύσαντο
  chosen: had planned
  alternatives:
  - took counsel
  - resolved
  - plotted
  lexicon: LSJ
  rationale: The middle verb denotes deliberation or forming a plan. 'Had planned'
    gives clear modern English and fits the infinitive sequence that follows. 'Plotted'
    would add a more sinister nuance than the verb itself requires.
- source_word: ἐλθεῖν
  chosen: to come
  alternatives:
  - to go
  - to arrive
  lexicon: LSJ
  rationale: The infinitive straightforwardly means 'to come.' This is the most direct
    rendering in context.
- source_word: ἐξᾶραι
  chosen: remove
  alternatives:
  - wipe out
  - destroy
  - root out
  lexicon: LSJ
  rationale: The verb can carry the sense of taking away or removing, and in military-political
    context may imply elimination. 'Remove' preserves the lexical breadth and avoids
    overstating the degree of destruction where the immediate Greek does not explicitly
    specify total annihilation.
- source_word: αὐτούς
  chosen: them
  lexicon: LSJ
  rationale: Standard accusative pronoun referring to the people under discussion
    in context.
