translation:
  text: But if war comes first to Rome, or to any of their allies, anywhere within
    their dominion,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'if war arises for Rome first, or for all their allies,
      in all their dominion.' The Greek wording is compressed and treaty-like; 'any
      of their allies' brings out the likely distributive sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν ... ἐνστῇ
  chosen: if ... comes
  alternatives:
  - if ... arises
  - if ... breaks out
  - if ... comes upon
  lexicon: BDAG
  rationale: ἐνίστημι with πόλεμος here denotes the onset or occurrence of war. 'Comes'
    is natural English and preserves the conditional sense without overinterpreting
    the manner of outbreak.
- source_word: πόλεμος
  chosen: war
  alternatives:
  - battle
  - conflict
  lexicon: BDAG
  rationale: The standard sense is 'war'; 'battle' would be too narrow and 'conflict'
    too vague for a treaty context.
- source_word: Ῥώμῃ
  chosen: to Rome
  alternatives:
  - against Rome
  - for Rome
  lexicon: LSJ
  rationale: The dative after ἐνστῇ can indicate the party affected by the outbreak
    of war. 'To Rome' keeps the Greek construction transparent in English treaty language;
    context implies war affecting Rome rather than specifying the aggressor.
- source_word: προτέρα
  chosen: first
  alternatives:
  - beforehand
  - previously
  lexicon: LSJ
  rationale: 'προτέρα here functions adverbially, indicating priority in sequence:
    if war comes first to Rome before it comes to others. ''First'' is concise and
    fits the treaty formulation.'
- source_word: πᾶσι τοῖς συμμάχοις αὐτῶν
  chosen: any of their allies
  alternatives:
  - all their allies
  - any one of their allies
  lexicon: BDAG
  rationale: Although πᾶσι is formally 'all,' in this distributive legal context the
    sense is that the clause applies if war comes to Rome or to any member among all
    their allies. English legal style is clearer with 'any of their allies.'
- source_word: ἐν πάσῃ κυρίᾳ αὐτῶν
  chosen: anywhere within their dominion
  alternatives:
  - in all their domain
  - throughout all their sovereignty
  - in all their jurisdiction
  lexicon: LSJ
  rationale: κυρία here refers to sphere of authority or dominion. The phrase is idiomatic
    for territory under Roman control. 'Anywhere within their dominion' conveys both
    the territorial scope and the legal force of the phrase in readable English.
