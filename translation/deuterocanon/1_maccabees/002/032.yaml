translation:
  text: And many ran after them, and when they caught up with them, they encamped
    against them and joined battle with them on the Sabbath day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'on the day of the Sabbaths,' an idiomatic way of referring
      to the Sabbath day.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδραμον ὀπίσω αὐτῶν
  chosen: ran after them
  alternatives:
  - pursued them
  - ran behind them
  lexicon: LSJ
  rationale: The phrase is idiomatic for pursuit. 'Ran after them' is natural modern
    English and preserves the vividness of the Greek without overformal 'ran behind
    them.' 'Pursued them' is possible but slightly less concrete than the Greek wording.
- source_word: πολλοί
  chosen: many
  alternatives:
  - a large number
  lexicon: LSJ
  rationale: A straightforward quantitative term; 'many' is the plain and sufficient
    rendering.
- source_word: καταλαβόντες αὐτούς
  chosen: when they caught up with them
  alternatives:
  - having overtaken them
  - after seizing them
  lexicon: LSJ
  rationale: καταλαμβάνω here fits the pursuit context as 'overtake/catch up with,'
    not necessarily 'seize.' 'When they caught up with them' reads naturally in English
    and matches the sequence of pursuit followed by military action.
- source_word: παρενέβαλον ἐπʼ αὐτούς
  chosen: they encamped against them
  alternatives:
  - they camped against them
  - they drew up camp against them
  lexicon: LSJ
  rationale: παρεμβάλλω in military contexts commonly means to encamp or set camp.
    The preposition ἐπί with persons gives the adversative sense 'against them.' 'Encamped
    against them' preserves the military nuance better than a vaguer 'attacked them.'
- source_word: συνεστείλαντο πρὸς αὐτοὺς πόλεμον
  chosen: joined battle with them
  alternatives:
  - waged war against them
  - engaged them in battle
  - began war with them
  lexicon: LSJ
  rationale: The expression indicates undertaking or commencing hostile action. 'Joined
    battle with them' captures the immediate military engagement in context better
    than the broader 'waged war.'
- source_word: ἐν τῇ ἡμέρᾳ τῶν σαββάτων
  chosen: on the Sabbath day
  alternatives:
  - on the day of the Sabbaths
  - on the Sabbath
  lexicon: LSJ
  rationale: 'Although the Greek is literally plural (''of the Sabbaths''), the idiomatic
    sense is singular in English: ''the Sabbath day.'' This is the clearest natural
    rendering and fits the narrative context of fighting on the Sabbath.'
