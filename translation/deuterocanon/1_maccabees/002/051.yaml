  text: μνήσθητε τῶν πατέρων ἡμῶν ἔργα ἃ ἐποίησαν ταῖς γενεαῖς αὐτῶν, καὶ δέξασθε
    δόξαν μεγάλην καὶ δόξαν αἰώνιον.
