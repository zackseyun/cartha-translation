translation:
  text: Remember the deeds of our fathers, which they did in their generations, and
    receive great glory and everlasting glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'and receive great glory and everlasting glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητε
  chosen: Remember
  alternatives:
  - Call to mind
  - Be mindful of
  lexicon: BDAG
  rationale: Aorist middle imperative of μιμνῄσκομαι/μιμνήσκομαι, functioning as an
    exhortation to recall actively. 'Remember' is the most natural imperative in English
    and preserves the force without paraphrase.
- source_word: τῶν πατέρων ἡμῶν
  chosen: of our fathers
  alternatives:
  - of our ancestors
  lexicon: BDAG
  rationale: πατέρων is literally 'fathers.' In this context it refers to forefathers/ancestors,
    but the project prefers gender-accurate renderings where the source is masculine.
    'Our fathers' preserves the wording and biblical resonance.
- source_word: ἔργα
  chosen: deeds
  alternatives:
  - works
  - acts
  lexicon: BDAG
  rationale: ἔργα here refers to notable actions performed by the forefathers. 'Deeds'
    communicates concrete, memorable actions better than the more ambiguous 'works'
    in modern English.
- source_word: ταῖς γενεαῖς αὐτῶν
  chosen: in their generations
  alternatives:
  - in their times
  - throughout their generations
  lexicon: BDAG
  rationale: The dative phrase is somewhat idiomatic. 'In their generations' is a
    close rendering that preserves the Greek expression and likely means within the
    successive periods in which they lived.
- source_word: δέξασθε
  chosen: receive
  alternatives:
  - obtain
  - gain
  lexicon: BDAG
  rationale: 'Aorist middle imperative of δέχομαι. ''Receive'' is the direct lexical
    equivalent and leaves the exhortation open-ended: by imitating the fathers, the
    hearers are to come into possession of what follows.'
- source_word: δόξαν μεγάλην
  chosen: great glory
  alternatives:
  - great honor
  lexicon: BDAG
  rationale: δόξα can denote glory, honor, or renown. Here, paired with 'everlasting'
    in the next phrase, it points to honor/reputation bestowed for faithfulness. 'Great
    glory' keeps the elevated register and lexical continuity.
- source_word: δόξαν αἰώνιον
  chosen: everlasting renown
  alternatives:
  - eternal glory
  - everlasting glory
  lexicon: BDAG
  rationale: Although δόξα is repeated, rendering both instances identically as 'glory'
    is awkward in English. The second phrase likely emphasizes enduring fame/honor.
    'Everlasting renown' preserves the sense of lasting honor while avoiding clumsy
    repetition; the more literal alternative is preserved in a footnote.
