theological_decisions:
- issue: Rendering the masculine ancestral term πατέρων
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Greek explicitly uses a masculine familial term. Following the project's
    gender-accurate policy, the main text retains 'fathers' rather than neutralizing
    it, while recognizing that the referent is the forefathers of Israel.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Nuance of δόξα in the second occurrence
  chosen_reading: everlasting renown
  alternative_readings:
  - everlasting glory
  - eternal glory
  rationale: The verse exhorts the hearers to remember the exemplary deeds of the
    fathers and thereby share in enduring honor. Because English style resists repeating
    'glory' twice in immediate succession, the second δόξα is rendered with a near-equivalent
    that highlights lasting reputation without changing the basic sense. A more literal
    alternative is preserved in a footnote for auditability.
  doctrine_reference: DOCTRINE.md §5 Consistency of key terms, or documented exception
