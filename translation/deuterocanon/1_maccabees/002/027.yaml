translation:
  text: And Mattathias cried out in the city with a loud voice, saying, “Everyone
    who is zealous for the law and upholds the covenant, let him come out after me.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνέκραξεν
  chosen: cried out
  alternatives:
  - called out
  - shouted
  lexicon: LSJ
  rationale: The verb denotes a forceful public outcry. 'Cried out' preserves the
    intensity without sounding overly colloquial.
- source_word: ἐν τῇ πόλει
  chosen: in the city
  alternatives:
  - throughout the city
  - in the town
  lexicon: LSJ
  rationale: The prepositional phrase is straightforwardly locative. 'City' is the
    most direct rendering of πόλις here.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: LSJ
  rationale: This instrumental/dative phrase is idiomatically rendered 'with a loud
    voice,' preserving the concrete expression of the Greek.
- source_word: Πᾶς ὁ ζηλῶν τῷ νόμῳ
  chosen: Everyone who is zealous for the law
  alternatives:
  - Whoever is zealous for the law
  - Everyone zealous for the law
  lexicon: LSJ
  rationale: ζηλόω with the dative here conveys ardent commitment or zeal directed
    toward the law. 'Zealous for the law' is the natural English equivalent and preserves
    the covenantal-religious force.
- source_word: νόμῳ
  chosen: the law
  alternatives:
  - the Law
  lexicon: LSJ
  rationale: In 1 Maccabees this refers to the Jewish law/Torah. Lowercase 'law' keeps
    the translation readable while still conveying the referent in context.
- source_word: ἱστῶν διαθήκην
  chosen: upholds the covenant
  alternatives:
  - maintains the covenant
  - stands by the covenant
  - establishes the covenant
  lexicon: LSJ
  rationale: The participle from ἵστημι with διαθήκη here means maintaining or standing
    by the covenant, not initiating it. 'Upholds the covenant' captures active fidelity
    in idiomatic English.
- source_word: διαθήκην
  chosen: the covenant
  alternatives:
  - covenant
  lexicon: LSJ
  rationale: The article is not explicit in Greek here, but in context the covenant
    with God is definite. English idiom naturally supplies 'the covenant.'
- source_word: ἐξελθέτω ὀπίσω μου
  chosen: let him come out after me
  alternatives:
  - let him follow me out
  - let him come after me
  lexicon: LSJ
  rationale: ἐξελθέτω retains the sense of physically going out, important in the
    narrative as Mattathias calls supporters to leave with him. 'After me' preserves
    ὀπίσω μου more closely than simply 'follow me.'
