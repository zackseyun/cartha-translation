theological_decisions:
- issue: Sabbath warfare policy
  chosen_reading: The verse states a practical resolution to fight defensively on
    the Sabbath if attacked.
  alternative_readings:
  - A broader authorization for offensive warfare on the Sabbath
  rationale: 'The wording is conditional and reactive: ''if any man comes against
    us... we will fight against him.'' The translation preserves that limited scope
    and does not expand it into a general doctrine of Sabbath warfare.'
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
