translation:
  text: And on that day they decided, saying, “Every man who comes against us for
    battle on the Sabbath day, we will fight against him, and we will certainly not
    all die as our brothers died in the hiding places.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'on the day of the Sabbaths,' an idiomatic way of saying
      'on the Sabbath day.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in secret places.' The Greek refers generally to concealed locations,
      not explicitly to caves in this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβουλεύσαντο
  chosen: they decided
  alternatives:
  - they took counsel
  - they resolved
  - they deliberated
  lexicon: LSJ
  rationale: The middle verb denotes taking counsel and arriving at a resolution.
    'They decided' gives the result in clear modern English while preserving the collective
    deliberative sense.
- source_word: Πᾶς ἄνθρωπος
  chosen: any man
  alternatives:
  - every person
  - anyone
  lexicon: LSJ
  rationale: The Greek is singular and masculine/generic. Per gender-accurate philosophy,
    'any man' preserves the source form and representative force better than the more
    neutral 'anyone.'
- source_word: ἔλθῃ πρὸς ἡμᾶς εἰς πόλεμον
  chosen: comes against us for battle
  alternatives:
  - comes to us for war
  - attacks us in battle
  - comes against us to make war
  lexicon: LSJ
  rationale: The idiom indicates hostile approach for warfare. 'Comes against us for
    battle' is natural English and keeps the military sense without over-paraphrasing.
- source_word: τῇ ἡμέρᾳ τῶν σαββάτων
  chosen: on the Sabbath day
  alternatives:
  - on the day of the Sabbaths
  - on the sabbath
  lexicon: LSJ
  rationale: The plural σαββάτων is a standard idiom for the Sabbath. Singular English
    is the natural equivalent.
- source_word: πολεμήσομεν κατέναντι αὐτοῦ
  chosen: we will fight against him
  alternatives:
  - we will make war against him
  - we will fight in opposition to him
  lexicon: LSJ
  rationale: κατέναντι intensifies the adversarial stance. 'Fight against him' is
    direct and idiomatic.
- source_word: οὐ μὴ ἀποθάνωμεν πάντες
  chosen: we will certainly not all die
  alternatives:
  - we shall by no means all die
  - we will not die, all of us
  lexicon: LSJ
  rationale: οὐ μή with the aorist subjunctive is emphatic negation. 'Certainly not'
    captures the force in readable English.
- source_word: οἱ ἀδελφοὶ ἡμῶν
  chosen: our brothers
  alternatives:
  - our kindred
  - our brothers and sisters
  lexicon: LSJ
  rationale: The text uses the masculine plural 'brothers.' In context it refers to
    fellow Jews previously killed; 'our brothers' preserves the source wording and
    communal solidarity.
- source_word: ἐν τοῖς κρυφοῖς
  chosen: in the hiding places
  alternatives:
  - in secret places
  - in the caves
  - in concealment
  lexicon: LSJ
  rationale: The plural adjective used substantivally refers to hidden places. 'Hiding
    places' communicates the sense clearly without specifying caves, which the Greek
    here does not explicitly say.
