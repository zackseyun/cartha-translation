translation:
  text: And Mattathias saw it and was zealous, and his inward parts trembled, and
    he brought forth wrath according to the judgment, and running up he slaughtered
    him on the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'his kidneys trembled,' a Hebrew-style expression for deep inner
      agitation or emotion.
    reason: cultural_note
  - marker: b
    text: Or 'as the judgment required' / 'in accordance with the ordinance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήλωσεν
  chosen: was zealous
  alternatives:
  - was filled with zeal
  - burned with zeal
  lexicon: LSJ
  rationale: The aorist of ζηλόω here denotes zealous indignation rather than mere
    jealousy. 'Was zealous' stays close to the Greek and preserves the covenantal/Phinehas-like
    zeal motif without over-paraphrasing.
- source_word: οἱ νεφροὶ αὐτοῦ
  chosen: his inward parts
  alternatives:
  - his kidneys
  - his heart trembled within him
  lexicon: LSJ
  rationale: Literally 'his kidneys,' an idiom for the inner self or deepest emotions.
    'His inward parts' preserves the bodily metaphor more transparently than the interpretive
    'heart,' while avoiding an overly anatomical rendering in the main text.
- source_word: ἀνήνεγκεν θυμόν
  chosen: he brought up wrath
  alternatives:
  - he gave vent to anger
  - he brought forth anger
  lexicon: LSJ
  rationale: The phrase is vivid and somewhat idiomatic. 'Brought up wrath' keeps
    the verbal imagery of ἀναφέρω plus θυμός rather than flattening it to a generic
    emotional statement, while remaining intelligible in English.
- source_word: κατὰ τὸ κρίμα
  chosen: according to the judgment
  alternatives:
  - as the judgment required
  - in accordance with the ordinance
  - according to justice
  lexicon: LSJ
  rationale: κρίμα can denote judgment, legal decision, or sentence. 'According to
    the judgment' preserves the formal judicial sense and leaves open whether the
    reference is to divine law or judicial sentence, rather than resolving it interpretively.
- source_word: δραμὼν
  chosen: running up
  alternatives:
  - running
  - rushing forward
  lexicon: LSJ
  rationale: The participle conveys swift action. 'Running up' reflects the movement
    toward the victim/altar in context more naturally than bare 'running' while staying
    close to the Greek.
- source_word: ἔσφαξεν
  chosen: slaughtered
  alternatives:
  - killed
  - slew
  lexicon: LSJ
  rationale: σφάζω commonly denotes slaughtering, especially in sacrificial or violent
    contexts. 'Slaughtered' preserves the harshness and possible sacrificial resonance
    of the act better than the milder 'killed'.
- source_word: ἐπὶ τὸν βωμόν
  chosen: on the altar
  alternatives:
  - at the altar
  - upon the altar
  lexicon: LSJ
  rationale: The preposition with accusative here is naturally rendered 'on the altar'
    in this narrative setting. This keeps the shocking location of the act explicit.
