theological_decisions:
- issue: How explicitly to preserve the allusion to covenantal zeal and judicial execution
  chosen_reading: Retain the language of zeal, judgment, and slaughter without softening
    or expanding it.
  alternative_readings:
  - Interpretively render as 'he was enraged' or 'he executed him according to the
    law'
  rationale: The verse presents Mattathias's act in terms evocative of zeal for the
    law and punitive judgment. The translation preserves that theological tension
    and narrative framing without adding explanatory wording not present in the Greek.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
