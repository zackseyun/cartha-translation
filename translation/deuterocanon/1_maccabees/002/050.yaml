theological_decisions:
- issue: Gendered ancestral language in πατέρων ἡμῶν
  chosen_reading: of our fathers
  alternative_readings:
  - of our ancestors
  rationale: The source text explicitly uses 'fathers' in covenantal ancestral language.
    Following the project's gender-accurate principle, the translation preserves this
    rather than neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sense of ψυχή in a martyrdom/exhortation context
  chosen_reading: lives
  alternative_readings:
  - souls
  - selves
  rationale: The verse exhorts self-sacrifice in defense of the covenant, so ψυχή
    is best understood as life rather than the immaterial soul. This avoids importing
    a narrower anthropological claim the text does not require.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
