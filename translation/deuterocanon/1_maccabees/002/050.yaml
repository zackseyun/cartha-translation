translation:
  text: And now, children, be zealous for the law, and give your lives for the covenant
    of our fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sons' for 'children.' The Greek term is τέκνα, a familial address that
      can denote offspring generally.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the sake of the covenant of our fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  lexicon: LSJ
  rationale: Vocative plural of τέκνον is a familial address. 'Children' preserves
    the direct paternal appeal without over-specifying male offspring; although the
    immediate audience is Mattathias's sons, English 'children' best reflects the
    Greek term itself.
- source_word: ζηλώσατε
  chosen: be zealous for
  alternatives:
  - be jealous for
  - show zeal for
  - be eager for
  lexicon: LSJ
  rationale: The aorist imperative calls for ardent commitment. 'Be zealous for' is
    idiomatic English and preserves the covenantal/religious intensity better than
    the misleading modern sense of 'be jealous.'
- source_word: τῷ νόμῳ
  chosen: the law
  alternatives:
  - the Law
  lexicon: LSJ
  rationale: νόμος here refers to the ancestral Torah in the Maccabean context. 'The
    law' is clear and readable; capitalization as 'Law' is possible, but the lower-case
    form avoids importing later stylistic convention while still conveying the referent.
- source_word: δότε τὰς ψυχὰς ὑμῶν
  chosen: give your lives
  alternatives:
  - give your souls
  - lay down your lives
  - give yourselves
  lexicon: LSJ
  rationale: ψυχή in this context denotes life itself, especially in a call to self-sacrifice.
    'Give your lives' is a natural English rendering that captures the sense without
    the potentially misleading English 'souls.' 'Lay down your lives' is interpretive
    and more idiomatic than the Greek warrants.
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: LSJ
  rationale: ὑπέρ here expresses cause or behalf in a sacrificial context. 'For' is
    concise and natural; the fuller sense is that they are to sacrifice themselves
    for the sake of defending the covenant.
- source_word: διαθήκης
  chosen: the covenant
  alternatives:
  - the testament
  - the covenant agreement
  lexicon: LSJ
  rationale: In Jewish scriptural context διαθήκη is best rendered 'covenant,' referring
    to God's binding relationship with the ancestors. 'Testament' would be archaic
    and potentially misleading.
- source_word: πατέρων ἡμῶν
  chosen: of our fathers
  alternatives:
  - of our ancestors
  lexicon: LSJ
  rationale: The Greek is explicitly masculine and refers to the ancestral fathers
    of Israel. Per project philosophy, gender-accurate language is preferred where
    it matches the source's intent, so 'our fathers' is retained rather than neutralizing
    to 'ancestors'.
