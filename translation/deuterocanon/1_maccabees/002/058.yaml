theological_decisions:
- issue: Whether to render ὡς explicitly in Elijah's ascent
  chosen_reading: 'Retain the comparative nuance: ''as into heaven.'''
  alternative_readings:
  - '''into heaven'''
  - '''to heaven'''
  rationale: The Greek includes ὡς before εἰς τὸν οὐρανόν. Preserving it maintains
    transparency to the source and avoids silently resolving the phrase into a more
    definite statement than the wording itself makes.
  doctrine_reference: Preserve theological tension rather than resolve it.
