translation:
  text: Elijah, in his zeal for the law, was taken up into heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into heaven.' The Greek includes 'as' (ὡς), which may soften or characterize
      the expression rather than simply state destination.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἠλίας
  chosen: Elijah
  lexicon: LSJ
  rationale: Standard English transliteration of the personal name Ἠλίας.
- source_word: ἐν τῷ ζηλῶσαι
  chosen: in being zealous
  alternatives:
  - when he was zealous
  - because he was zealous
  - for being zealous
  lexicon: LSJ
  rationale: The articular infinitive with ἐν can express circumstance or occasion.
    'In being zealous' preserves the Greek structure while remaining intelligible;
    it avoids over-interpreting the relation as strictly causal.
- source_word: ζῆλον
  chosen: zeal
  alternatives:
  - jealousy
  - ardor
  lexicon: LSJ
  rationale: The cognate accusative intensifies the verbal idea ζηλῶσαι. 'Zeal' is
    the natural rendering and preserves the rhetorical emphasis.
- source_word: νόμου
  chosen: for the law
  alternatives:
  - for law
  - for the Law
  lexicon: LSJ
  rationale: νόμος here refers to the Jewish law/Torah in the Maccabean context. 'the
    law' is clear and idiomatic; capitalization 'Law' is possible but not required
    by the Greek itself.
- source_word: ἀνελήμφθη
  chosen: was taken up
  alternatives:
  - was taken
  - was assumed
  lexicon: LSJ
  rationale: Aorist passive of ἀναλαμβάνω, commonly used for being taken up. 'Was
    taken up' best matches the upward nuance in context.
- source_word: ὡς εἰς τὸν οὐρανόν
  chosen: as into heaven
  alternatives:
  - into heaven
  - as if into heaven
  - to heaven
  lexicon: LSJ
  rationale: The presence of ὡς should be represented rather than flattened. 'As into
    heaven' preserves the wording's nuance, echoing the traditional description of
    Elijah's ascent without overstating beyond the Greek phrasing.
