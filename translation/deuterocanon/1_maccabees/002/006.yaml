translation:
  text: And seeing the blasphemies being committed in Judah and in Jerusalem,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἰδών
  chosen: seeing
  alternatives:
  - when he saw
  - having seen
  lexicon: BDAG
  rationale: Aorist participle of ὁράω. 'Seeing' preserves the participial linkage
    to the following speech/action in context without over-specifying temporal nuance.
    'Having seen' is possible but less natural in modern English here.
- source_word: βλασφημίας
  chosen: blasphemies
  alternatives:
  - outrages
  - sacrileges
  - blasphemous acts
  lexicon: BDAG
  rationale: The noun denotes acts of blasphemy or profanation. 'Blasphemies' is the
    most direct formal equivalent and fits the religious desecration context of 1
    Maccabees. 'Sacrileges' captures context but narrows the term interpretively beyond
    the Greek wording.
- source_word: τὰς γινομένας
  chosen: being committed
  alternatives:
  - being done
  - taking place
  lexicon: BDAG
  rationale: Present middle/passive participle of γίνομαι here describes ongoing acts
    occurring in the land. 'Being committed' idiomatically suits wrongful acts in
    English and conveys the moral force implied by the object 'blasphemies.'
- source_word: ἐν Ἰούδᾳ
  chosen: in Judah
  alternatives:
  - in Judea
  lexicon: BDAG
  rationale: Ἰούδα can be rendered 'Judah' or 'Judea.' In 1 Maccabees, 'Judah' preserves
    the traditional territorial and ethnic resonance closer to the Greek form and
    avoids importing later Roman-administrative associations.
- source_word: ἐν Ἱερουσαλήμ
  chosen: in Jerusalem
  lexicon: BDAG
  rationale: Standard rendering of the place name; no significant ambiguity affects
    translation.
