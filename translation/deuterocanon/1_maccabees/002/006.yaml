theological_decisions:
- issue: Rendering βλασφημίας in a deuterocanonical historical context
  chosen_reading: blasphemies
  alternative_readings:
  - sacrileges
  - outrages
  rationale: The text describes impious acts against God and holy things. 'Blasphemies'
    preserves the explicit religious offense of the Greek without reducing it merely
    to general 'outrages.' No doctrinally contested term from the project table is
    involved, but the theological weight of the offense is retained.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    readable modern English without flattening theological weight'
