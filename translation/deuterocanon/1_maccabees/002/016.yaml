lexical_decisions:
- source_word: τὴν πόλιν
  chosen: to the city
  alternatives:
  - into the city
  - in the city
  lexicon: LSJ
  rationale: The phrase is the object of motion from the preceding context and is
    best carried over as 'to the city.' Because the surviving Zone 1 text begins mid-sentence,
    the translation preserves the accusative phrase without overreconstructing what
    precedes.
- source_word: ἵνα θυσιάσωσιν
  chosen: so that they might offer sacrifice
  alternatives:
  - to sacrifice
  - so that they might sacrifice
  lexicon: LSJ
  rationale: ἵνα with the subjunctive expresses purpose. θυσιάζω refers to offering
    sacrifice; 'offer sacrifice' is slightly more explicit and natural in English
    than the bare 'sacrifice' while remaining close to the Greek cultic sense.
- source_word: πολλοὶ ἀπὸ Ἰσραήλ
  chosen: many from Israel
  alternatives:
  - many of Israel
  - many Israelites
  lexicon: LSJ
  rationale: ἀπό here marks origin or membership. 'Many from Israel' stays close to
    the Greek wording and avoids adding interpretive specificity beyond the text.
- source_word: πρὸς αὐτοὺς προσῆλθαν
  chosen: came over to them
  alternatives:
  - joined them
  - came to them
  - went over to them
  lexicon: LSJ
  rationale: προσέρχομαι with πρός indicates movement toward persons. In this context
    of aligning with the king's agents, 'came over to them' preserves both motion
    and the likely sense of siding with them, without making the stronger interpretive
    move of 'joined them' in the main text.
- source_word: συνήχθησαν
  chosen: gathered together
  alternatives:
  - were gathered
  - assembled
  lexicon: LSJ
  rationale: The passive/deponent form conveys coming together or being assembled.
    'Gathered together' is idiomatic and preserves the collective action of Mattathias
    and his sons.
