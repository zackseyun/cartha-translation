theological_decisions:
- issue: Political-religious alignment implied by πρὸς αὐτοὺς προσῆλθαν
  chosen_reading: Render as 'came over to them' rather than the more interpretive
    'joined them.'
  alternative_readings:
  - joined them
  - went over to them
  rationale: The verse narrates Israelites aligning with the king's representatives
    in the context of illicit sacrifice, but the Greek itself states movement toward
    them rather than using a more explicit verb for enlistment or allegiance. The
    translation preserves the narrative tension without overstating the degree of
    commitment.
  doctrine_reference: Preserve theological tension rather than resolve it.
