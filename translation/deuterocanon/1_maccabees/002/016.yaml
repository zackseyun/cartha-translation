translation:
  text: to the city, so that they might offer sacrifice. And many from Israel came
    over to them, and Mattathias and his sons were gathered together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'joined them' or 'went over to them.' The Greek says 'came to/toward
      them,' which in context likely implies siding with them.
    reason: lexical_alternative
