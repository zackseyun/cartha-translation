theological_decisions:
- issue: Reference of the chronological formula
  chosen_reading: Rendered the date straightforwardly as 'the one hundred forty-sixth
    year' without specifying the era in the main text.
  alternative_readings:
  - the one hundred forty-sixth year of the Seleucid era
  rationale: The Greek text itself gives only 'in the one hundred forty-sixth year.'
    Supplying 'Seleucid era' in the main text would add historical interpretation
    beyond the wording, though it is historically likely.
  doctrine_reference: Preserve theological/historical tension rather than resolve
    it beyond the source text; original-language primacy.
