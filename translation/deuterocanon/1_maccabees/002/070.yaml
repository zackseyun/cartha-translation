translation:
  text: And he died in the one hundred forty-sixth year, and his sons buried him in
    the tombs of his fathers at Modein, and all Israel mourned for him with great
    mourning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, likely the one hundred forty-sixth year of the Seleucid era.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - passed away
  lexicon: BDAG
  rationale: The aorist simply states death; 'died' is the plain, direct English equivalent
    and avoids euphemism.
- source_word: ἐν τῷ ἕκτῳ καὶ τεσσερακοστῷ καὶ ἑκατοστῷ ἔτει
  chosen: in the one hundred forty-sixth year
  alternatives:
  - in the hundred and forty-sixth year
  lexicon: LSJ
  rationale: This reproduces the Greek dating formula naturally in modern English
    while preserving the ordinal sense.
- source_word: ἔθαψαν
  chosen: buried
  alternatives:
  - laid to rest
  - entombed
  lexicon: BDAG
  rationale: Standard burial verb; 'buried' is both accurate and idiomatic.
- source_word: τάφοις πατέρων αὐτοῦ
  chosen: the tombs of his fathers
  alternatives:
  - his ancestral tombs
  - the graves of his fathers
  lexicon: LSJ
  rationale: τάφος denotes a grave or tomb. 'Tombs of his fathers' preserves the familial/ancestral
    wording of the Greek more transparently than the smoother 'ancestral tombs.'
- source_word: Μωδεείν
  chosen: Modein
  alternatives:
  - Modiin
  - Modin
  lexicon: LSJ
  rationale: A standard English transliteration of the place name from the Greek form,
    preserving the proper name rather than translating it.
- source_word: ἐκόψαντο
  chosen: mourned
  alternatives:
  - lamented
  - beat their breasts in mourning
  lexicon: BDAG
  rationale: The verb can refer specifically to ritual mourning actions, but in this
    context 'mourned' best captures the sense in clear English without over-specifying
    a gesture not explicit in the translation line.
- source_word: κοπετὸν μέγαν
  chosen: with great mourning
  alternatives:
  - a great lamentation
  - great mourning rites
  lexicon: LSJ
  rationale: This cognate accusative intensifies the mourning. 'With great mourning'
    preserves both the emphasis and the connection to the preceding verb.
- source_word: πᾶς Ἰσραήλ
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: BDAG
  rationale: A conventional collective expression referring to the people as a whole;
    'all Israel' is the most natural and transparent rendering.
