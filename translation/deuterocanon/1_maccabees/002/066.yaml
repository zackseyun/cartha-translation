theological_decisions:
- issue: Handling of the difficult phrase ἐκ αὐτοῦ ἐκ νεότητος αὐτοῦ
  chosen_reading: 'Render the clause by its clear sense: Judas is strong from his
    youth.'
  alternative_readings:
  - Attempt a more literal but obscure rendering such as 'strong in might from him,
    from his youth'
  rationale: This is not a major doctrinal issue, but it is a significant translational
    crux. Because the first ἐκ αὐτοῦ is awkward in English and does not materially
    alter the sense of the commendation, the main text reflects the probable force
    of the clause rather than reproducing opacity. The unusual wording is preserved
    in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    primacy without opaque English where the sense is recoverable.'
