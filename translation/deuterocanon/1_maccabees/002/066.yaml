translation:
  text: And Judas Maccabeus himself, strong in might from his youth, shall be your
    commander of the army, and you shall fight the war against the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek text literally reads something like ''strong in might from him, from
      his youth''; the wording is awkward, and the translation gives the apparent
      sense: that Judas has been strong since his youth.'
    reason: textual_variant
lexical_decisions:
- source_word: Ἰούδας ὁ Μακκαβαῖος
  chosen: Judas Maccabeus
  alternatives:
  - Judah the Maccabee
  - Judas the Maccabee
  lexicon: LSJ
  rationale: Ἰούδας is regularly transliterated as 'Judas' in Greek contexts, and
    ὁ Μακκαβαῖος functions as the established epithet/name 'Maccabeus.' This follows
    the project's principle to transliterate personal names rather than translate
    titles or epithets as common nouns in the main text.
- source_word: ἰσχυρὸς δυνάμει
  chosen: strong in might
  alternatives:
  - mighty in strength
  - strong in power
  lexicon: LSJ
  rationale: The phrase is somewhat pleonastic, combining ἰσχυρός with δύναμις for
    emphasis. 'Strong in might' preserves the intensification without sounding overly
    wooden.
- source_word: ἐκ αὐτοῦ ἐκ νεότητος αὐτοῦ
  chosen: from his youth
  alternatives:
  - from his young age
  - from his youth onward
  lexicon: LSJ
  rationale: The transmitted text includes a difficult ἐκ αὐτοῦ before ἐκ νεότητος
    αὐτοῦ. The clear sense is that Judas has shown strength since youth. The English
    rendering reflects the intelligible force of the clause while avoiding an opaque
    literalism for the first ἐκ αὐτοῦ.
- source_word: ἄρχοντα στρατιᾶς
  chosen: commander of the army
  alternatives:
  - leader of the host
  - ruler of the army
  lexicon: LSJ
  rationale: ἄρχων here denotes one who leads or commands, and στρατιά in military
    context is best rendered 'army.' 'Commander of the army' is natural modern English
    and fits the military setting.
- source_word: πολεμήσετε πόλεμον
  chosen: you shall fight the battle
  alternatives:
  - you shall wage war
  - you shall fight a war
  lexicon: LSJ
  rationale: This cognate construction intensifies the action. 'Fight the battle'
    preserves the verbal-nominal pairing better than the smoother but less literal
    'wage war.'
- source_word: λαῶν
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentiles
  lexicon: LSJ
  rationale: λαοί can mean peoples or nations. In this military-national context,
    'the nations' best reflects collective foreign opponents without importing the
    more theologically loaded 'Gentiles.'
