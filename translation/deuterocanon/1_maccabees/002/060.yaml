translation:
  text: Daniel, in his integrity, was rescued from the mouth of lions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his simplicity' or 'in his single-mindedness.' The Greek term can
      denote sincerity or undividedness as well as moral integrity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁπλότης
  chosen: integrity
  alternatives:
  - simplicity
  - single-mindedness
  - uprightness
  lexicon: BDAG
  rationale: In this context recalling Daniel's blameless conduct before God and the
    king, ἁπλότης is better rendered as moral integrity than mere simplicity. 'Integrity'
    communicates uprightness and wholeness of character in idiomatic modern English.
- source_word: ἐρύσθη
  chosen: was rescued
  alternatives:
  - was delivered
  - was saved
  lexicon: BDAG
  rationale: The passive aorist indicates deliverance from danger. 'Was rescued' is
    clear modern English and fits the concrete peril of the lions' den without importing
    broader soteriological overtones.
- source_word: ἐκ στόματος λεόντων
  chosen: from the mouth of lions
  alternatives:
  - from lions' mouths
  - out of the mouth of lions
  lexicon: BDAG
  rationale: The singular στόματος with plural λεόντων is a natural Greek expression.
    'From the mouth of lions' preserves the vivid idiom while remaining readable in
    English.
- source_word: Δανιήλ
  chosen: Daniel
  rationale: Standard English transliteration of the personal name.
