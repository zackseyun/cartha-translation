- issue: Rendering ἁπλότης in a commendatory summary of Daniel
  chosen_reading: integrity
  alternative_readings:
  - simplicity
  - single-mindedness
  rationale: The verse presents Daniel as an exemplar of faithful conduct. 'Integrity'
    best captures the ethical sense likely intended in this Jewish scriptural allusion,
