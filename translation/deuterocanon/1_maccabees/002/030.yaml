  text: αὐτοὶ καὶ οἱ υἱοὶ αὐτῶν καὶ αἱ γυναῖκες αὐτῶν καὶ τὰ κτήνη αὐτῶν· ὅτι ἐσκληρύνθη
    ἐπʼ αὐτοὺς τὰ κακά.
  language: Greek
