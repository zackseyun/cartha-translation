translation:
  text: they and their sons and their wives and their livestock, because the evils
    had become severe upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the troubles' or 'the calamities had become severe upon them.' The Greek
      phrase uses 'the evils' idiomatically for afflictions or hardships.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: LSJ
  rationale: Simple personal pronoun continuing the subject from the previous verse;
    English 'they' is sufficient without adding emphatic force unless context requires
    it.
- source_word: υἱοὶ
  chosen: sons
  alternatives:
  - children
  lexicon: LSJ
  rationale: The Greek specifically says 'sons,' not a gender-neutral term for children.
    This follows the project's gender-accurate policy.
- source_word: γυναῖκες
  chosen: wives
  alternatives:
  - women
  lexicon: LSJ
  rationale: In this family-list context, 'wives' best fits the possessive 'their'
    and the household setting, rather than the more generic 'women'.
- source_word: κτήνη
  chosen: livestock
  alternatives:
  - cattle
  - beasts
  lexicon: LSJ
  rationale: Refers broadly to domesticated animals/property animals. 'Livestock'
    is natural modern English and suitably broad.
- source_word: ἐσκληρύνθη
  chosen: had pressed hard
  alternatives:
  - had become severe
  - were hardened
  - grew harsh
  lexicon: LSJ
  rationale: Although literally related to hardening, in context with 'the evils'
    coming upon them it conveys that their troubles had become severe or oppressive.
    'Had pressed hard' captures the idiomatic force in readable English.
- source_word: τὰ κακά
  chosen: the evils
  alternatives:
  - the troubles
  - the calamities
  - the misfortunes
  lexicon: LSJ
  rationale: The phrase can denote bad things, troubles, or calamities. 'The evils'
    preserves the lexical form while still making sense in context; the oppressive
    nuance is carried by 'had pressed hard upon them.'
