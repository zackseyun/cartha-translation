lexical_decisions:
- source_word: Χαλὲβ
  chosen: Caleb
  rationale: Proper name transliterated by standard English convention, following
    project policy to transliterate names rather than translate them.
- source_word: ἐν τῷ ἐπιμαρτυρῆσαι
  chosen: when he testified
  alternatives:
  - when he bore witness
  - in testifying
  lexicon: LSJ
  rationale: The articular infinitive with ἐν can express circumstance or time; here
    it naturally means 'when he testified/bore witness.' 'Testified' is clear modern
    English and preserves the forensic/witness sense of ἐπιμαρτυρέω without sounding
    overly technical.
- source_word: τῇ ἐκκλησίᾳ
  chosen: in the assembly
  alternatives:
  - to the assembly
  - before the congregation
  - in the congregation
  lexicon: LSJ
  rationale: ἐκκλησία in this pre-Christian Jewish context refers to the gathered
    assembly/congregation of Israel, not the later Christian 'church.' Because the
    dative here is governed by the verbal idea in context, English idiom is best expressed
    as 'in the assembly' rather than a wooden 'to the assembly.'
- source_word: ἔλαβε
  chosen: received
  alternatives:
  - obtained
  - took
  lexicon: LSJ
  rationale: λαμβάνω here denotes coming into possession as the result of divine or
    covenantal allotment. 'Received' fits the inheritance context better than the
    more active 'took.'
- source_word: γῆν
  chosen: the land
  alternatives:
  - land
  - a land
  lexicon: LSJ
  rationale: Although anarthrous in Greek, English idiom and biblical context favor
    'the land,' referring to the promised land allotted to Caleb. The article makes
    the referent natural in English without adding a new theological claim.
- source_word: κληρονομίαν
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as his inheritance
  lexicon: LSJ
  rationale: κληρονομία denotes inherited possession or allotted heritage. 'As an
    inheritance' preserves the resultative sense and keeps the phrase readable. Adding
    'his' would be interpretive beyond the Greek wording.
