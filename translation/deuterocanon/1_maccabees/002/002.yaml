lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: LSJ
  rationale: Standard connective introducing the next item in the narrative; 'And'
    preserves the simple paratactic flow of the Greek.
- source_word: αὐτῷ
  chosen: he had
  alternatives:
  - to him
  - for him
  lexicon: LSJ
  rationale: 'The dative pronoun with an implied existential/possessive sense is idiomatically
    rendered in English as possession: ''he had.'' A more literal ''to him were''
    would be awkward.'
- source_word: υἱοὶ πέντε
  chosen: five sons
  alternatives:
  - five male children
  lexicon: LSJ
  rationale: Direct rendering of the noun phrase. 'Sons' is gender-accurate and natural
    English.
- source_word: Ἰωάννης
  chosen: John
  alternatives:
  - Johanan
  lexicon: LSJ
  rationale: As a Greek personal name, Ἰωάννης is conventionally transliterated 'John'
    in English. 'Johanan' would reflect a Semitic form not present in the Greek text.
- source_word: ὁ ἐπικαλούμενος
  chosen: who was called
  alternatives:
  - the one called
  - who was surnamed
  - who was also called
  lexicon: LSJ
  rationale: This participial expression introduces an epithet or additional name.
    'Who was called' is clear, natural, and close to the Greek without sounding archaic.
- source_word: Γαδδίς
  chosen: Gaddis
  alternatives:
  - Gaddis (transliterated form retained)
  lexicon: LSJ
  rationale: Personal epithet/name should be transliterated rather than translated,
    following project policy to translate titles but transliterate names.
