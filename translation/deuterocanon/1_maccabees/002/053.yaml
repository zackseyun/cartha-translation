translation:
  text: Joseph, in the time of his distress, kept the commandment, and became lord
    of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a commandment' or 'the command'; the Greek does not specify which commandment
      is meant, and may summarize Joseph's obedience generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν καιρῷ
  chosen: in the time of
  alternatives:
  - at the time of
  - in a time of
  lexicon: LSJ
  rationale: A straightforward temporal phrase. 'In the time of' preserves the Greek
    construction naturally in English without over-literal awkwardness.
- source_word: στενοχωρίας
  chosen: distress
  alternatives:
  - affliction
  - trouble
  - anguish
  lexicon: LSJ
  rationale: The noun denotes a state of hardship or constriction. 'Distress' is concise,
    natural English and fits Joseph's period of testing without overstating the emotional
    nuance.
- source_word: ἐφύλαξε
  chosen: kept
  alternatives:
  - observed
  - guarded
  lexicon: BDAG
  rationale: For ἐντολήν, 'kept' is the most idiomatic English collocation and preserves
    the sense of faithful obedience.
- source_word: ἐντολήν
  chosen: the commandment
  alternatives:
  - the command
  - a commandment
  lexicon: BDAG
  rationale: The singular anarthrous object in this context likely refers generically
    to God's commandment as a category of divine requirement rather than one specified
    order. 'The commandment' gives the moral-religious force expected in this summary
    of Joseph's faithfulness.
- source_word: κύριος
  chosen: lord
  alternatives:
  - master
  - ruler
  lexicon: BDAG
  rationale: Here κύριος refers to Joseph's elevated authority in Egypt, not the divine
    title. 'Lord of Egypt' is a natural rendering that preserves the elevated status
    language of the Greek; 'master' could sound too domestic, and 'ruler' is interpretive.
- source_word: Αἰγύπτου
  chosen: of Egypt
  alternatives:
  - over Egypt
  lexicon: LSJ
  rationale: The genitive is well represented by 'of Egypt' after 'lord,' preserving
    the compact dignity of the Greek expression.
