reference: 1 Maccabees 2:53
source:
  edition: lxx-swete-1909
  text: Ἰωσὴφ ἐν καιρῷ στενοχωρίας αὐτοῦ ἐφύλαξε ἐντολήν, καὶ ἐγένετο κύριος Αἰγύπτου.
