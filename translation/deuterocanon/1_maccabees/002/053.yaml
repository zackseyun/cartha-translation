theological_decisions:
- issue: Reference of Joseph's obedience
  chosen_reading: A general statement that Joseph remained obedient to God's command
    in his trial.
  alternative_readings:
  - A more specific allusion to Joseph's refusal of Potiphar's wife as obedience to
    a particular command
  rationale: The Greek gives no explicit specification of which commandment is in
    view. The translation therefore preserves the general wording rather than narrowing
    it to one episode, though the narrative background may evoke Genesis 39.
  doctrine_reference: Preserve theological tension rather than resolve it.
