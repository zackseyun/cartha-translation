translation:
  text: All her glory was taken away; instead of being free, she became a slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All her splendor/adornment was removed.' The Greek κόσμος here means
      adornment or splendor, not 'world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  chosen: all
  alternatives:
  - the whole of
  - every
  lexicon: LSJ
  rationale: 'With the singular noun κόσμος, πᾶς has a collective force: ''all'' or
    ''the whole of.'' ''All her glory'' is idiomatic English and preserves the totality
    expressed in Greek.'
- source_word: κόσμος
  chosen: glory
  alternatives:
  - adornment
  - splendor
  - ornament
  lexicon: LSJ
  rationale: In this context κόσμος refers not to 'world' but to what adorns or gives
    honor/splendor. Given the lament over Jerusalem/Zion's humiliation, 'glory' best
    captures the loss of honor and splendor in natural English, while 'adornment'
    is possible but too concrete and narrow here.
- source_word: ἀφηρέθη
  chosen: was taken away
  alternatives:
  - was removed
  - was stripped away
  lexicon: LSJ
  rationale: The passive aorist indicates deprivation by an external agent. 'Was taken
    away' is clear, natural, and preserves the passive sense without overinterpreting
    the manner.
- source_word: ἀντί
  chosen: instead of
  alternatives:
  - in place of
  - rather than as
  lexicon: LSJ
  rationale: ἀντί marks replacement or exchange. 'Instead of' communicates the reversal
    of status succinctly in English.
- source_word: ἐλευθέρας
  chosen: being free
  alternatives:
  - a free woman
  - free
  lexicon: LSJ
  rationale: The feminine adjective refers to the city's prior status, personified
    as a woman. 'Being free' reads smoothly in English while preserving the contrast
    with δούλην. 'A free woman' is possible but slightly more wooden in this sentence.
- source_word: δούλην
  chosen: a slave
  alternatives:
  - a servant
  - a bondwoman
  lexicon: LSJ
  rationale: Per project doctrine, terms from δοῦλος/δούλη are rendered with 'slave'
    where bonded status is salient. Here the contrast with ἐλευθέρα ('free') makes
    the loss of liberty central, so 'slave' is the strongest and most accurate rendering.
