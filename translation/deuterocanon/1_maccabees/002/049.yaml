translation:
  text: And the days drew near for Mattathias to die, and he said to his sons, “Now
    arrogance and reproach have grown strong, and it is a time of ruin and furious
    wrath.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have been established' for 'have grown strong'; the Greek verb can emphasize
      that arrogance and reproach have become firmly entrenched.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'furious wrath' literally combines two closely related Greek
      terms for anger, intensifying the sense. The text does not specify whose wrath
      is meant.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισαν
  chosen: drew near
  alternatives:
  - approached
  - came near
  lexicon: LSJ
  rationale: A standard rendering of ἐγγίζω in narrative time expressions; 'drew near'
    is idiomatic English and preserves the metaphor of approaching days.
- source_word: αἱ ἡμέραι ... ἀποθανεῖν
  chosen: the days drew near ... to die
  alternatives:
  - the time came ... to die
  - his death was near
  lexicon: LSJ
  rationale: The Greek uses an infinitive construction literally, 'the days of Mattathias
    to die.' English smooths this to a natural expression while retaining the temporal
    sense and the focus on impending death.
- source_word: Νῦν
  chosen: Now
  alternatives:
  - At this time
  - As things are
  lexicon: LSJ
  rationale: Keeps the discourse marker that introduces Mattathias's assessment of
    the present crisis.
- source_word: ἐστηρίχθη
  chosen: have grown strong
  alternatives:
  - has been established
  - has become entrenched
  - has been strengthened
  lexicon: LSJ
  rationale: 'The aorist passive of στηρίζω can mean ''be established/strengthened.''
    With abstract subjects (''arrogance and reproach''), idiomatic English prefers
    a resultative sense: these evils have become firmly established or strong. ''Have
    grown strong'' captures the present force of the condition in context.'
- source_word: ὑπερηφανία
  chosen: arrogance
  alternatives:
  - pride
  - insolence
  lexicon: LSJ
  rationale: Refers to haughty, overbearing pride. 'Arrogance' communicates the moral
    vice clearly in modern English without sounding merely internal or neutral.
- source_word: ἔλεγμος
  chosen: reproach
  alternatives:
  - rebuke
  - disgrace
  - shame
  lexicon: LSJ
  rationale: The term can denote reproach or rebuke. In this context of national/moral
    crisis paired with arrogance, 'reproach' best conveys a condition of public disgrace
    or opprobrium rather than a spoken act of correction.
- source_word: καιρὸς καταστροφῆς
  chosen: a time of ruin
  alternatives:
  - a time of destruction
  - a season of overthrow
  lexicon: LSJ
  rationale: καιρός is a decisive time/season, and καταστροφή denotes destruction
    or ruin. 'A time of ruin' is concise and natural while preserving the ominous
    force.
- source_word: ὀργὴ θυμοῦ
  chosen: furious wrath
  alternatives:
  - wrath of anger
  - burning anger
  - angry wrath
  lexicon: LSJ
  rationale: The doubled anger terms intensify one another. Rather than a wooden 'wrath
    of anger,' 'furious wrath' preserves the emphatic piling up of indignation in
    readable English.
