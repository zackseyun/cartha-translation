theological_decisions:
- issue: Nature of Mattathias's description of the crisis
  chosen_reading: Render the statement as a general description of the present moral
    and political situation, without specifying a divine subject for the wrath.
  alternative_readings:
  - Interpret the wrath as explicitly God's wrath
  - Interpret the wrath as human rage or persecution
  rationale: The Greek names 'wrath' but does not state whose wrath it is. The translation
    preserves that ambiguity rather than importing a theological conclusion not explicit
    in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
