  text: καὶ ἀνηγγέλη τοῖς ἀνδράσιν τοῦ βασιλέως καὶ ταῖς δυνάμεσιν αἳ ἦσαν ἐν Ἰερουσαλὴμ
    πόλει Δαυείδ, ὅτι κατέβησαν ἄνδρες, οἵτινες διεσκέδασαν τὴν ἐντολὴν τοῦ βασιλέως,
    εἰς τοὺς κρυφοὺς ἐν τῇ ἐρήμῳ.
