translation:
  text: And it was reported to the king’s men and to the forces that were in Jerusalem,
    the city of David, that men who had scattered because of the king’s command had
    gone down into the hidden places in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that men who had disregarded the king’s command had gone down into
      hiding places in the wilderness.' The Greek clause is compressed and can be
      understood either as dispersal in response to the decree or as violation of
      it.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνηγγέλη
  chosen: it was reported
  alternatives:
  - it was announced
  - word was brought
  lexicon: LSJ
  rationale: Passive aorist naturally renders as an impersonal report formula in English;
    'it was reported' is clear and idiomatic without adding detail.
- source_word: τοῖς ἀνδράσιν τοῦ βασιλέως
  chosen: to the king’s men
  alternatives:
  - to the king's officers
  - to the king's soldiers
  lexicon: LSJ
  rationale: ἄνδρες is literally 'men.' In this military-administrative context it
    likely refers to the king's personnel broadly, not necessarily a formal office;
    'men' preserves the source's wording and leaves the exact role open.
- source_word: ταῖς δυνάμεσιν
  chosen: the forces
  alternatives:
  - the troops
  - the army
  lexicon: LSJ
  rationale: δυνάμεις in military context denotes armed forces/troops. 'Forces' is
    broad and fits the plural Greek without over-specifying a single army unit.
- source_word: ἐν Ἰερουσαλὴμ πόλει Δαυείδ
  chosen: in Jerusalem, the city of David
  alternatives:
  - in Jerusalem City of David
  - in Jerusalem, in the City of David
  lexicon: LSJ
  rationale: The appositional phrase is best represented naturally in English as 'Jerusalem,
    the city of David.' This preserves both place names without awkward literalism.
- source_word: κατέβησαν
  chosen: had gone down
  alternatives:
  - went down
  - descended
  lexicon: LSJ
  rationale: Aorist in indirect report after ὅτι can be rendered as simple past, but
    pluperfect English ('had gone down') better reflects the prior action relative
    to the reporting.
- source_word: διεσκέδασαν
  chosen: had scattered because of
  alternatives:
  - had dispersed because of
  - had disregarded
  - had broken
  lexicon: LSJ
  rationale: The verb ordinarily means 'scatter/disperse.' Given the object τὴν ἐντολὴν
    τοῦ βασιλέως, the sense is difficult if rendered woodenly as 'scattered the command.'
    Context suggests the men dispersed in response to or because of the king's decree,
    fleeing to hiding places. This keeps close to the lexical core while making coherent
    sense of the clause.
- source_word: τὴν ἐντολὴν τοῦ βασιλέως
  chosen: the king’s command
  alternatives:
  - the king's decree
  - the king's order
  lexicon: LSJ
  rationale: ἐντολή is command/order. 'Command' is a straightforward rendering and
    matches the narrative's emphasis on royal directive.
- source_word: εἰς τοὺς κρυφοὺς
  chosen: into the hidden places
  alternatives:
  - into the secret places
  - into hiding places
  lexicon: LSJ
  rationale: The phrase refers to concealed locations. 'Hidden places' is slightly
    more formal and stays close to the Greek adjective used substantivally.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: LSJ
  rationale: ἔρημος can be 'desert' or 'wilderness.' 'Wilderness' better fits biblical
    narrative style and need not imply sandy desert specifically.
