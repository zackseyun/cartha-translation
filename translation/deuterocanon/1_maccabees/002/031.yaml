theological_decisions:
- issue: Interpretation of διεσκέδασαν τὴν ἐντολὴν τοῦ βασιλέως
  chosen_reading: The men are described as having scattered because of the king's
    command, then gone into hiding in the wilderness.
  alternative_readings:
  - the men had violated/disregarded the king's command and gone into hiding
  - the text may preserve an awkward or compressed expression in the Greek witness
  rationale: The Greek wording is syntactically awkward because διεσκέδασαν normally
    means 'scatter/disperse,' while the direct object 'the king's command' could suggest
    a looser sense like 'set aside' or 'disregard.' Since the immediate context concerns
    fugitives hiding in the wilderness, the main text preserves the dispersal idea
    while making the relation to the command explicit in idiomatic English. The alternative
    interpretive possibility is preserved in a footnote for transparency.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
