theological_decisions:
- issue: How literally to render the awkward royal-domain phrase οἴκῳ τῆς βασιλείας
    τοῦ βασιλέως
  chosen_reading: the house of the king’s kingdom
  alternative_readings:
  - the realm of the king
  - the king’s kingdom
  rationale: This is not a major doctrinal issue, but it is a significant translation
    decision. The chosen rendering preserves the source’s unusual phrasing rather
    than normalizing it away, which supports auditability and keeps the reader close
    to the Greek texture.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether ἀκούουσιν should be rendered as 'listen' or 'obey'
  chosen_reading: listen to him
  alternative_readings:
  - obey him
  rationale: The context concerns compliance with the king, but the Greek verb is
    the ordinary verb for hearing/listening. Rendering it as 'obey' would interpret
    the implication rather than translate the lexical form directly.
  doctrine_reference: Translation philosophy §1, §5
