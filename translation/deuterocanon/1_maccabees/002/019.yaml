translation:
  text: And Mattathias answered and said with a loud voice, “Even if all the nations
    in the house of the king’s kingdom listen to him, each one turning away from the
    worship of his fathers, and have chosen his commandments,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the realm of the king.'' The Greek phrase is unusually worded: literally,
      ''the house of the kingdom of the king.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'obey him.' The Greek more literally says 'listen to him,' though obedience
      is implied by the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the vivid narrative force without
    sounding unnatural.
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: LSJ
  rationale: In this context the reference is to the various subject peoples under
    royal rule, so 'nations' is the most straightforward and least interpretively
    loaded choice.
- source_word: οἴκῳ τῆς βασιλείας τοῦ βασιλέως
  chosen: the house of the king’s kingdom
  alternatives:
  - the realm of the king
  - the kingdom of the king
  - the royal house
  lexicon: LSJ
  rationale: The Greek is somewhat awkward and likely reflects a court/realm expression.
    'House of the king’s kingdom' keeps the source texture more transparently than
    smoothing it fully into 'realm,' while remaining intelligible.
- source_word: ἀκούουσιν αὐτοῦ
  chosen: listen to him
  alternatives:
  - obey him
  - hear him
  lexicon: LSJ
  rationale: The basic sense is 'hear/listen.' While obedience is implied by context,
    the verb itself is not as explicit as a direct verb for obeying, so 'listen to
    him' best preserves the wording.
- source_word: ἀποστῆναι
  chosen: turning away
  alternatives:
  - to depart
  - to apostatize from
  - to withdraw from
  lexicon: LSJ
  rationale: The infinitive depends on the preceding statement of what the nations
    are doing. 'Turning away' communicates defection without importing later technical
    theological language such as 'apostatize.'
- source_word: λατρίας πατέρων αὐτοῦ
  chosen: the worship of his fathers
  alternatives:
  - the service of his fathers
  - the ancestral worship of his fathers
  lexicon: LSJ
  rationale: λατρεία here refers to cultic/religious service. 'Worship' is natural
    English and fits the context of ancestral religious practice.
- source_word: ᾑρετίσαντο
  chosen: have chosen
  alternatives:
  - have preferred
  - have adopted
  lexicon: LSJ
  rationale: The verb denotes choosing or preferring. 'Have chosen' is the clearest
    direct rendering.
- source_word: ἐν ταῖς ἐντολαῖς αὐτοῦ
  chosen: his commandments
  alternatives:
  - his commands
  - the things he commands
  lexicon: LSJ
  rationale: ἐντολαί regularly means commands/commandments. 'Commandments' preserves
    the formal, authoritative sense appropriate to royal decrees in this context.
