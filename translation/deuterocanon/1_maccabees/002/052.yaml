theological_decisions:
- issue: Relation of Abraham's testing to the reckoning of righteousness
  chosen_reading: Render both clauses straightforwardly without harmonizing or resolving
    the chronology implied by the allusion.
  alternative_readings:
  - Interpret the verse as collapsing Genesis 22 and Genesis 15:6 into a theological
    summary
  - Translate more interpretively to make Abraham's faith under trial explicit
  rationale: The Greek presents a rhetorical question linking Abraham's testing and
    the reckoning of righteousness. The translation preserves that linkage without
    forcing a doctrinal explanation of how the two scriptural moments relate.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: δικαιοσύνη rendering
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine table gives 'righteousness' as the default for δικαιοσύνη,
    with alternatives preserved where appropriate. This context is not a Pauline passage
    requiring a footnoteed alternative in the main apparatus, but the lexical alternative
    is documented.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
