translation:
  text: Was not Abraham found faithful in testing, and was it counted to him as righteousness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in trial'; the Greek term can also mean 'temptation,' but here it refers
      to Abraham's being tested.
    reason: lexical_alternative
  - marker: b
    text: An allusion to Gen 15:6, linked here with Abraham's testing.
    reason: cross_reference
lexical_decisions:
- source_word: Ἀβραάμ
  chosen: Abraham
  rationale: Standard English transliteration of the patriarch's name.
- source_word: πειρασμῷ
  chosen: in testing
  alternatives:
  - in trial
  - under trial
  - in temptation
  lexicon: BDAG
  rationale: πειρασμός can denote testing, trial, or temptation depending on context.
    Here the allusion is to Abraham's being tested, not enticed to sin, so 'in testing'
    best preserves the sense while remaining natural in English.
- source_word: εὑρέθη πιστός
  chosen: was found faithful
  alternatives:
  - was found trustworthy
  - proved faithful
  lexicon: BDAG
  rationale: The passive plus predicate adjective naturally yields 'was found faithful.'
    'Faithful' fits πιστός well here and preserves the evaluative sense of Abraham
    being shown or recognized as such through testing.
- source_word: ἐλογίσθη
  chosen: was counted
  alternatives:
  - was reckoned
  - was credited
  lexicon: BDAG
  rationale: This verb echoes Genesis 15:6 language. 'Was counted' is clear modern
    English and preserves the accounting/imputation sense without importing later
    doctrinal elaboration.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults, δικαιοσύνη is rendered 'righteousness' here. In
    this Abrahamic allusion, that rendering best matches the covenantal and declarative
    sense of the source text.
