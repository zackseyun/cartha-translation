id: 1MA.2.28
reference: 1 Maccabees 2:28
source:
  edition: lxx-swete-1909
  text: καὶ ἔφυγον αὐτὸς καὶ οἱ υἱοὶ αὐτοῦ εἰς τὰ ὄρη, καὶ ἐγκατέλιπον ὅσα εἶχον ἐν
    τῇ πόλει.
