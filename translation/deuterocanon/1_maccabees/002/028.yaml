translation:
  text: And he and his sons fled to the mountains, and they abandoned whatever they
    had in the city.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔφυγον
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: LSJ
  rationale: The aorist of φεύγω denotes flight from danger. 'Fled' is concise, natural
    English and preserves the urgency better than the weaker 'went away' or the more
    interpretive 'escaped'.
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - Mattathias himself
  lexicon: LSJ
  rationale: The pronoun is singular and refers back to Mattathias from the prior
    context. Rendering it as 'he' keeps the sentence aligned with the Greek wording
    without importing the name into this verse.
- source_word: οἱ υἱοὶ αὐτοῦ
  chosen: his sons
  alternatives:
  - the sons of him
  lexicon: LSJ
  rationale: Standard idiomatic rendering of the phrase; no reason to preserve a more
    wooden form in English.
- source_word: εἰς τὰ ὄρη
  chosen: to the mountains
  alternatives:
  - into the hills
  - to the hill country
  lexicon: LSJ
  rationale: ὄρη is literally 'mountains.' 'To the mountains' preserves the concrete
    topographical sense and the traditional refuge motif without unnecessary smoothing.
- source_word: ἐγκατέλιπον
  chosen: left behind
  alternatives:
  - abandoned
  - forsook
  lexicon: LSJ
  rationale: The verb means to leave behind or abandon. 'Left behind' fits the immediate
    context of fleeing and leaving possessions in the city, while 'forsook' sounds
    too elevated and 'abandoned' slightly overstates intentionality.
- source_word: ὅσα εἶχον
  chosen: whatever they had
  alternatives:
  - all that they had
  - their possessions
  lexicon: LSJ
  rationale: 'The neuter plural relative expression is broad: ''whatever they had.''
    This preserves the open-ended scope of possessions without narrowing it to a technical
    term.'
- source_word: ἐν τῇ πόλει
  chosen: in the city
  alternatives:
  - in town
  lexicon: LSJ
  rationale: πόλις is straightforwardly 'city' here. The phrase locates the possessions
    left behind and should remain explicit.
