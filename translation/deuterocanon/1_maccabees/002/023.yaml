  chosen_reading: Jewish man
  alternative_readings:
  - Jew
  - Judean man
  rationale: This verse concerns covenantal and communal identity under royal pressure,
    not merely regional origin. 'Jewish man' best communicates the ethnic-religious
    sense while preserving the masculine singular of ἀνήρ.
