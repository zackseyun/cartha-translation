theological_decisions:
- issue: Rendering νόμος in a Maccabean Jewish context
  chosen_reading: the law
  alternative_readings:
  - the Law
  rationale: The Greek has τοῦ νόμου without any special marker beyond the article.
    In this Jewish context it refers to the ancestral law/Torah, but lower-case 'the
    law' keeps the translation readable and avoids importing a capitalization convention
    not explicit in the source.
  doctrine_reference: Translation philosophy §6; §5 consistency of key terms
