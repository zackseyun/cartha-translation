translation:
  text: And you, gather to yourselves all who practice the law, and take vengeance
    for your people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the doers of the law.' The Greek expression is more literally 'all
      the doers/practitioners of the law.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'avenge vengeance of your people,' a Greek cognate construction
      intensifying the command to avenge them.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσάξετε πρὸς ὑμᾶς
  chosen: gather to yourselves
  alternatives:
  - bring to yourselves
  - draw to yourselves
  - take to yourselves
  lexicon: LSJ
  rationale: The verb with the prepositional phrase calls for bringing people into
    one's own company or side. 'Gather to yourselves' is natural English and preserves
    the sense of rallying supporters to them.
- source_word: πάντας τοὺς ποιητὰς τοῦ νόμου
  chosen: all who practice the law
  alternatives:
  - all the doers of the law
  - all who keep the law
  - all the makers of the law
  lexicon: LSJ
  rationale: ποιητής here means one who does or practices, not one who composes. 'Practice
    the law' communicates active observance in idiomatic English, while remaining
    close to the Greek.
- source_word: ἐκδικήσατε ἐκδίκησιν
  chosen: take vengeance
  alternatives:
  - exact vengeance
  - avenge
  - execute vengeance
  lexicon: LSJ
  rationale: The cognate verb-object construction intensifies the command to avenge.
    'Take vengeance' is concise and forceful in English; the object is then specified
    by the following genitive phrase.
- source_word: τοῦ λαοῦ ὑμῶν
  chosen: for your people
  alternatives:
  - of your people
  - on behalf of your people
  lexicon: LSJ
  rationale: Although formally a genitive after the cognate noun, idiomatic English
    expresses the sense as vengeance undertaken on behalf of the people. 'For your
    people' preserves that sense without overexpansion.
