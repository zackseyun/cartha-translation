translation:
  text: And they pursued the sons of arrogance, and the work prospered in their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the arrogant' or 'the sons of pride.' The Greek uses a literal expression,
      'sons of arrogance.'
    reason: lexical_alternative
  - marker: b
    text: That is, the undertaking succeeded under their direction; literally, 'the
      work prospered in their hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίωξαν
  chosen: pursued
  alternatives:
  - drove out
  - persecuted
  - chased
  lexicon: BDAG
  rationale: The aorist of διώκω here describes active hostile pursuit in battle or
    suppression. 'Pursued' preserves the verbal force without over-specifying whether
    the result was expulsion or killing.
- source_word: τοὺς υἱοὺς τῆς ὑπερηφανίας
  chosen: the sons of arrogance
  alternatives:
  - the arrogant
  - the sons of pride
  - the proud
  lexicon: LEH
  rationale: The Greek is a Semitic-style expression literally meaning 'sons of arrogance/pride.'
    Retaining 'sons of arrogance' preserves the idiom and rhetorical sharpness better
    than flattening it to the adjectival 'the arrogant,' while still being understandable
    in English.
- source_word: ὑπερηφανίας
  chosen: arrogance
  alternatives:
  - pride
  - haughtiness
  lexicon: LSJ
  rationale: '''Arrogance'' communicates the morally charged sense of overbearing
    pride in contemporary English. ''Pride'' is possible but can sound broader or
    less pejorative.'
- source_word: κατευωδώθη
  chosen: prospered
  alternatives:
  - succeeded
  - was made successful
  - went well
  lexicon: LEH
  rationale: The passive form conveys that the undertaking met with success. 'Prospered'
    is concise and idiomatic while preserving the favorable outcome implied by the
    verb.
- source_word: τὸ ἔργον
  chosen: the work
  alternatives:
  - the undertaking
  - the cause
  - the task
  lexicon: BDAG
  rationale: ἔργον here refers broadly to what they were doing in the revolt. 'The
    work' is the most direct rendering and leaves the scope appropriately open.
- source_word: ἐν χειρὶ αὐτῶν
  chosen: in their hand
  alternatives:
  - under their hand
  - through them
  - by their power
  lexicon: LEH
  rationale: This is a common idiom for agency or control. Retaining 'in their hand'
    preserves the biblical texture and the sense that the success attended their action.
