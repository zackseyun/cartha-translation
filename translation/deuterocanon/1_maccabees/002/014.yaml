translation:
  text: And Mattathias and his sons tore their clothes, put on sackcloth, and mourned
    greatly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally has 'sackcloths,' but English normally uses the collective
      singular 'sackcloth' for this mourning practice.
    reason: lexical_alternative
lexical_decisions:
- source_word: διέρρηξεν
  chosen: tore
  alternatives:
  - rent
  - tore apart
  lexicon: LSJ
  rationale: The verb denotes tearing garments as a sign of grief or outrage. 'Tore'
    is clear modern English; 'rent' is traditional but archaic. The singular verb
    with compound subject is retained in sense rather than mirrored awkwardly in English.
- source_word: τὰ ἱμάτια
  chosen: clothes
  alternatives:
  - garments
  - robes
  lexicon: LSJ
  rationale: ἱμάτια refers broadly to outer garments/clothing. 'Clothes' is natural
    modern English and fits the mourning gesture; 'garments' is possible but slightly
    more formal.
- source_word: περιεβάλοντο σάκκους
  chosen: put on sackcloth
  alternatives:
  - clothed themselves with sackcloth
  - put on sackcloth garments
  lexicon: LSJ
  rationale: This is a conventional mourning expression. English idiom normally uses
    singular mass noun 'sackcloth' even though Greek has the plural σάκκους.
- source_word: ἐπένθησαν
  chosen: mourned
  alternatives:
  - lamented
  - grieved
  lexicon: LSJ
  rationale: The verb indicates mourning in grief. 'Mourned' best matches the ritual
    context created by torn clothes and sackcloth.
- source_word: σφόδρα
  chosen: greatly
  alternatives:
  - bitterly
  - very much
  - exceedingly
  lexicon: LSJ
  rationale: σφόδρα intensifies the mourning. 'Greatly' is straightforward and avoids
    adding emotional color such as 'bitterly' not explicit in the adverb itself.
- source_word: Ματταθίας
  chosen: Mattathias
  rationale: Personal names are transliterated by project policy.
