  text: καὶ διέρρηξεν Ματταθίας καὶ οἱ υἱοὶ αὐτοῦ τὰ ἱμάτια αὐτῶν, καὶ περιεβάλοντο
    σάκκους, καὶ ἐπένθησαν σφόδρα.
