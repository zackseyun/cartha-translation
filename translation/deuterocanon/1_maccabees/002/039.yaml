translation:
  text: And Mattathias and his friends learned of it, and they mourned for them very
    greatly.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔγνω
  chosen: learned of it
  alternatives:
  - came to know
  - found out
  - knew
  lexicon: BDAG
  rationale: Aorist of γινώσκω here refers to receiving news or becoming aware of
    the event just mentioned, not merely possessing knowledge. 'Learned of it' captures
    the ingressive sense naturally in English.
- source_word: οἱ φίλοι αὐτοῦ
  chosen: his friends
  alternatives:
  - his companions
  - those with him
  lexicon: LSJ
  rationale: φίλοι can mean friends or close associates. 'His friends' is the most
    direct rendering and fits the narrative context of Mattathias's loyal circle.
- source_word: ἐπένθησαν
  chosen: they mourned
  alternatives:
  - they lamented
  - they grieved
  lexicon: BDAG
  rationale: The verb denotes mourning, often in response to death. Since the previous
    context concerns those who were killed, 'mourned' is the clearest and most contextually
    appropriate choice.
- source_word: ἐπʼ αὐτούς
  chosen: for them
  alternatives:
  - over them
  - because of them
  lexicon: LSJ
  rationale: With verbs of mourning, ἐπί plus accusative can indicate the persons
    over whom mourning is made. 'For them' is idiomatic English while preserving the
    relational sense.
- source_word: ἕως σφόδρα
  chosen: very greatly
  alternatives:
  - exceedingly
  - to a very great extent
  lexicon: LSJ
  rationale: This intensifying expression emphasizes the depth of mourning. 'Very
    greatly' preserves the strong adverbial force without sounding archaic.
