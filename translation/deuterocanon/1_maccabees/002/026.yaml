theological_decisions:
- issue: How explicitly to render Mattathias's imitation of Phinehas in a violent
    zeal context
  chosen_reading: Retain the comparison straightforwardly without softening or expanding
    it
  alternative_readings:
  - Paraphrase to explain the allusion
  - Soften the zeal language to avoid endorsing violence
  rationale: The Greek explicitly compares Mattathias's zeal to Phinehas's action
    in Numbers 25. The translation should preserve that theological and narrative
    parallel without importing approval beyond what the text states and without muting
    the force of the allusion.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
