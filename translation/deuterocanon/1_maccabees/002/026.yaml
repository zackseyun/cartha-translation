translation:
  text: And he was zealous for the law, just as Phinehas was against Zambri son of
    Salom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek names here are Zambri son of Salom; the same figures are more commonly
      known from Numbers 25 as Zimri son of Salu.
    reason: cross_reference
lexical_decisions:
- source_word: ἐζήλωσεν
  chosen: burned with zeal
  alternatives:
  - was zealous
  - showed zeal
  - was jealous
  lexicon: BDAG
  rationale: The aorist of ζηλόω here denotes ardent zeal expressed in decisive action,
    not mere inward feeling. 'Burned with zeal' captures the intensity in context
    while remaining idiomatic English. 'Was zealous' is possible but flatter; 'was
    jealous' would mislead in English.
- source_word: τῷ νόμῳ
  chosen: for the law
  alternatives:
  - for the Law
  - with respect to the law
  lexicon: BDAG
  rationale: The dative after ζηλόω expresses the object/cause of zeal. 'For the law'
    is natural English. Lowercase 'law' is preferred here because the Greek has no
    special marker and the context is Jewish Torah without requiring a capitalization
    convention.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - in the way that
  lexicon: BDAG
  rationale: Introduces a historical comparison to Phinehas. 'Just as' preserves the
    explicit analogy and rhetorical force.
- source_word: ἐποίησεν
  chosen: did
  alternatives:
  - acted
  - dealt
  lexicon: BDAG
  rationale: The verb is semantically broad. In this comparison clause, 'did' is the
    most direct and least interpretively loaded rendering, allowing the following
    dative phrase to specify the action's target.
- source_word: Φινεὲς
  chosen: Phinehas
  alternatives:
  - Phinees
  lexicon: LSJ
  rationale: Standard English transliteration aligned with familiar biblical usage
    for the figure from Numbers 25.
- source_word: τῷ Ζαμβρὶ
  chosen: against Zambri
  alternatives:
  - to Zambri
  - with Zambri
  lexicon: BDAG
  rationale: 'Although formally dative, in this idiom and narrative allusion the sense
    is adversative: Phinehas acted against the offender. Rendering the relation as
    ''against'' makes the historical reference intelligible in English.'
- source_word: υἱῷ Σαλώμ
  chosen: son of Salom
  alternatives:
  - the son of Salom
  - son of Salu
  lexicon: LSJ
  rationale: 'This follows the Greek forms in the Zone 1 witness by transliterating
    the names as given: Ζαμβρὶ = Zambri, Σαλώμ = Salom. The underlying Hebrew tradition
    is commonly known in English as Zimri son of Salu, but the translation should
    remain anchored to the Greek source; the more familiar Hebrew-form names are worth
    preserving in a footnote.'
