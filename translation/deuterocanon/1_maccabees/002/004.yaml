lexical_decisions:
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  lexicon: LSJ
  rationale: Proper name transliterated by standard English convention. Although the
    form can correspond to 'Judah' in some contexts, here it is the personal name
    of Mattathias's son, so 'Judas' is the natural rendering.
- source_word: ὁ καλούμενος
  chosen: who was called
  alternatives:
  - the one called
  - called
  lexicon: BDAG
  rationale: The articular participial phrase identifies a commonly used designation
    or epithet. 'Who was called' preserves the Greek structure and reads naturally
    in English.
- source_word: Μακκαβαῖος
  chosen: Maccabeus
  alternatives:
  - Maccabee
  lexicon: LSJ
  rationale: This is a proper epithet/name. 'Maccabeus' is a direct transliteration
    of the Greek form Μακκαβαῖος and stays closely anchored to the source text; 'Maccabee'
    is a later Anglicized form worth preserving as an alternative.
