translation:
  text: David, because of his mercy, inherited the throne of an everlasting kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'by God's mercy he inherited the throne of an everlasting kingdom.'
      The pronoun 'his' may be taken as referring to God rather than to David.
    reason: alternative_reading
lexical_decisions:
- source_word: Δαυείδ
  chosen: David
  lexicon: LSJ
  rationale: Standard transliteration of the personal name.
- source_word: ἐν τῷ ἐλέει αὐτοῦ
  chosen: in his mercy
  alternatives:
  - because of his mercy
  - through his mercy
  - in his steadfast mercy
  lexicon: LSJ
  rationale: The preposition ἐν with the dative can express sphere or means. 'In his
    mercy' preserves the Greek form while remaining natural English. The pronoun most
    naturally refers to David, highlighting his merciful character as the basis for
    what follows.
- source_word: ἐκληρονόμησεν
  chosen: inherited
  alternatives:
  - received as an inheritance
  - obtained
  lexicon: LSJ
  rationale: κληρονομέω ordinarily means 'inherit' or 'receive as a possession/inheritance.'
    'Inherited' keeps the familial/dynastic nuance better than the more generic 'obtained.'
- source_word: θρόνον
  chosen: the throne
  alternatives:
  - a throne
  lexicon: LSJ
  rationale: Although Greek lacks the English article distinction in the same way,
    'the throne' is preferable in context because the reference is to the recognized
    royal throne associated with Davidic kingship.
- source_word: βασιλείας αἰωνίας
  chosen: of an everlasting kingdom
  alternatives:
  - of an eternal kingdom
  - of an everlasting kingship
  - of eternal royalty
  lexicon: LSJ
  rationale: The genitive construction is best rendered as 'of an everlasting kingdom.'
    αἰωνίας here conveys enduring, perpetual royal rule. 'Everlasting' is idiomatic
    and preserves the elevated register of the commendation.
