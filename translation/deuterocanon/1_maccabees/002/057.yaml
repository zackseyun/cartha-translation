theological_decisions:
- issue: Whether αὐτοῦ in 'ἐν τῷ ἐλέει αὐτοῦ' refers to David or to God
  chosen_reading: 'The pronoun refers to David: ''in his mercy.'''
  alternative_readings:
  - in God's mercy
  - because of the Lord's mercy toward him
  rationale: The immediate syntax most naturally points back to David, and the verse
    is part of a sequence praising exemplars for their own notable qualities. Still,
    because divine mercy is a conceivable interpretive alternative in biblical idiom,
    that option is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
