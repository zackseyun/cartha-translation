translation:
  text: And they rose up against them in battle on the Sabbath, and they died—they
    and their wives and their children and their livestock—about a thousand persons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'up to a thousand people'; the Greek expression may indicate an approximate
      upper limit rather than an exact census figure.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέστησαν ἐπʼ αὐτούς
  chosen: rose up against them
  alternatives:
  - attacked them
  - came up against them
  lexicon: LSJ
  rationale: The idiom with ἀνίστημι plus ἐπί conveys hostile action taken against
    someone. 'Rose up against' preserves the verbal imagery and hostility without
    over-specifying military technique.
- source_word: ἐν τῷ πολέμῳ
  chosen: in battle
  alternatives:
  - in the war
  - for battle
  lexicon: LSJ
  rationale: Here the phrase describes the hostile engagement itself rather than a
    prolonged war in the abstract. 'In battle' is natural English and fits the immediate
    event.
- source_word: τοῖς σάββασιν
  chosen: on the Sabbath
  alternatives:
  - on the Sabbaths
  lexicon: LSJ
  rationale: Although the Greek form is plural, Sabbath expressions are often rendered
    idiomatically in English as singular when referring to Sabbath observance on a
    given occasion. The context is a specific attack timed to the Sabbath.
- source_word: ἀπέθανον
  chosen: they died
  alternatives:
  - they were killed
  - they perished
  lexicon: LSJ
  rationale: The Greek verb is intransitive ('died'). While the context implies death
    at enemy hands, 'they died' stays closer to the wording and avoids importing a
    more explicit passive than the text uses.
- source_word: τὰ κτήνη
  chosen: their livestock
  alternatives:
  - their cattle
  - their animals
  lexicon: LSJ
  rationale: κτήνη refers to domesticated animals/property animals. 'Livestock' is
    the clearest modern equivalent and avoids the narrower sense of 'cattle'.
- source_word: ἕως χιλίων ψυχῶν ἀνθρώπων
  chosen: about a thousand persons
  alternatives:
  - up to a thousand human lives
  - as many as a thousand people
  lexicon: LSJ
  rationale: ἕως with a number can mark an approximate upper limit. ψυχαί with ἀνθρώπων
    counts persons/lives. 'About a thousand persons' communicates the approximate
    total naturally in English while preserving the human count.
