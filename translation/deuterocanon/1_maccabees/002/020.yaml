theological_decisions:
- issue: Covenantal idiom in πορευσόμεθα ἐν διαθήκῃ
  chosen_reading: will walk in the covenant of our fathers
  alternative_readings:
  - will go in the covenant of our fathers
  - will live according to the covenant of our fathers
  rationale: The phrase is not merely spatial or directional; it expresses committed
    conduct within inherited covenant obligations. 'Walk' preserves biblical idiom
    and theological resonance without over-paraphrasing.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
- issue: Gendered kinship terms
  chosen_reading: my sons ... my brothers ... our fathers
  alternative_readings:
  - my children ... my family ... our ancestors
  rationale: The Greek uses specifically masculine kinship terms. Per the project's
    gender-accurate policy, these are retained rather than neutralized, since the
    historical and familial specificity matters in context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
