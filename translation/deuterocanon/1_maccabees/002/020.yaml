translation:
  text: But I and my sons and my brothers will walk in the covenant of our fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'will go in the covenant of our fathers.' The Greek
      idiom likely means to conduct one's life in covenant faithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγώ
  chosen: But I
  alternatives:
  - And I
  - I also
  lexicon: LSJ
  rationale: The crasis combines καί + ἐγώ. In context, after the preceding contrastive
    statements, English 'But I' best conveys Mattathias's personal resolve over against
    others' compliance, while still reflecting the connective force.
- source_word: οἱ υἱοί μου
  chosen: my sons
  alternatives:
  - my children
  lexicon: LSJ
  rationale: υἱοί specifically means 'sons,' not the gender-neutral 'children.' This
    follows the gender-accurate principle and matches the immediate narrative context
    of Mattathias and his sons.
- source_word: οἱ ἀδελφοί μου
  chosen: my brothers
  alternatives:
  - my kinsmen
  - my brothers and relatives
  lexicon: LSJ
  rationale: ἀδελφοί most naturally means 'brothers.' Although it can extend to kin
    or associates in some contexts, the plain lexical sense should be preserved here
    absent stronger contextual pressure.
- source_word: πορευσόμεθα
  chosen: will walk
  alternatives:
  - will go
  - will proceed
  - will live
  lexicon: LSJ
  rationale: Though literally 'will go,' with ἐν plus 'covenant' the idiom expresses
    conduct according to covenantal commitment. 'Will walk' preserves the biblical
    covenantal idiom in readable English better than the flatter 'go'.
- source_word: ἐν διαθήκῃ
  chosen: in the covenant
  alternatives:
  - by the covenant
  - according to the covenant
  lexicon: LSJ
  rationale: διαθήκη is 'covenant' here, not merely 'agreement' or 'testament.' Retaining
    'in the covenant' keeps the Greek preposition and works naturally with the idiom
    'walk in.'
- source_word: πατέρων ἡμῶν
  chosen: of our fathers
  alternatives:
  - of our ancestors
  lexicon: LSJ
  rationale: πατέρων literally means 'fathers.' 'Ancestors' is possible dynamically,
    but 'fathers' better preserves the traditional covenantal and familial language
    of the source.
