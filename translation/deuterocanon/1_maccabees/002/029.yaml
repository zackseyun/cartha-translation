translation:
  text: Then many who were seeking righteousness and justice went down into the wilderness
    to settle there,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seeking justice and judgment.' The Greek pairs δικαιοσύνην and κρίμα,
      a combination that can overlap in meaning but likely preserves two related ideals.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: LSJ
  rationale: Temporal adverb marking narrative sequence; 'Then' is the natural concise
    English equivalent.
- source_word: κατέβησαν
  chosen: went down
  alternatives:
  - descended
  lexicon: LSJ
  rationale: Aorist of καταβαίνω, literally 'went down.' Retained rather than smoothing
    to 'went' because the Greek explicitly uses descent language, common for movement
    into a region.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a great many
  lexicon: LSJ
  rationale: Straightforward quantitative adjective; 'many' is sufficient and idiomatic.
- source_word: ζητοῦντες
  chosen: were seeking
  alternatives:
  - seeking
  - looking for
  lexicon: LSJ
  rationale: Present participle conveys ongoing characteristic action; 'were seeking'
    brings out the durative sense in relation to the main verb.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: Although the doctrine table gives 'righteousness' as the default for
    δικαιοσύνη, in this non-Pauline context the term still carries moral uprightness/covenant
    fidelity more naturally than a purely juridical 'justice.' Because κρίμα follows,
    rendering δικαιοσύνη as 'righteousness' helps preserve the distinction between
    the two nouns.
- source_word: καὶ κρίμα
  chosen: and justice
  alternatives:
  - and judgment
  - and what is right
  lexicon: LSJ
  rationale: κρίμα can mean 'judgment' or 'justice/right.' In this collocation with
    δικαιοσύνη, 'justice' best conveys the pair as ethical-judicial ideals being sought,
    rather than a specific court verdict.
- source_word: εἰς τὴν ἔρημον
  chosen: into the wilderness
  alternatives:
  - into the desert
  lexicon: LSJ
  rationale: ἔρημος denotes an uninhabited wild region. 'Wilderness' preserves biblical
    resonance and avoids implying only sandy desert terrain.
- source_word: καθίσαι ἐκεῖ
  chosen: to settle there
  alternatives:
  - to dwell there
  - to sit there
  - to stay there
  lexicon: LSJ
  rationale: Infinitive of καθίζω/καθίζομαι here is idiomatic for taking up residence
    rather than literal sitting. 'To settle there' communicates intended habitation
    in natural English.
