theological_decisions:
- issue: Rendering of ἀνδρίζεσθε with masculine imagery
  chosen_reading: act like men
  alternative_readings:
  - be courageous
  rationale: The Greek uses explicitly masculine imagery. Per the doctrine's gender-accurate
    principle, the translation preserves that imagery rather than neutralizing it,
    while a footnote records the idiomatic sense 'be courageous.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Force of δοξασθήσεσθε
  chosen_reading: you will be glorified
  alternative_readings:
  - you will be honored
  - you will gain glory
  rationale: The text does not specify the agent or exact mode of glorification/honor.
    Preserving 'glorified' keeps the theological tension and avoids over-interpreting
    the promise as merely social honor.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
