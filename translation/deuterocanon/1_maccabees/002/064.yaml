translation:
  text: And you, children, be strong and courageous in your law, because in it you
    will be glorified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''be courageous.'' The Greek literally uses masculine imagery: ''act
      like men'' / ''show yourselves men.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'you will be honored' or 'you will gain glory.'
    reason: alternative_reading
lexical_decisions:
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  lexicon: LSJ
  rationale: τέκνα is the broad term 'children' rather than the more specifically
    male 'sons.' Since the address is to Mattathias's offspring collectively, 'children'
    best matches the Greek without unnecessarily narrowing the referent.
- source_word: ἰσχύετε
  chosen: be strong
  alternatives:
  - be mighty
  - take strength
  lexicon: LSJ
  rationale: The present imperative calls for strength or steadfastness. 'Be strong'
    is idiomatic modern English and preserves the exhortational force.
- source_word: ἀνδρίζεσθε
  chosen: act like men
  alternatives:
  - be courageous
  - show yourselves men
  lexicon: LSJ
  rationale: The verb is literally related to being/manning oneself and conventionally
    conveys courage. Following the project's gender-accurate principle, the masculine
    imagery is preserved rather than flattened to a gender-neutral paraphrase. 'Act
    like men' is natural English that retains the source's rhetorical force.
- source_word: ἐν τῷ νόμῳ ὑμῶν
  chosen: in your law
  alternatives:
  - in the law that is yours
  - for your law
  lexicon: LSJ
  rationale: ἐν with νόμος here expresses the sphere or domain in which they are to
    show strength and courage. The possessive ὑμῶν is explicit in the Greek and is
    retained as 'your law,' likely referring to the ancestral/Jewish law belonging
    to their people.
- source_word: δοξασθήσεσθε
  chosen: you will be glorified
  alternatives:
  - you will gain glory
  - you will be honored
  lexicon: LSJ
  rationale: The future passive of δοξάζω most directly means 'be glorified' or 'be
    honored.' 'Be glorified' preserves the verbal connection to glory and leaves open
    whether the sense is honor from God, from others, or eschatological vindication.
