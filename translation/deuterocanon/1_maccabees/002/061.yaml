theological_decisions:
- issue: Referent of 'him' (αὐτόν)
  chosen_reading: God is the implied referent.
  alternative_readings:
  - an unspecified object of hope
  rationale: The immediate context recounts God's faithfulness to the ancestors and
    exhorts confidence based on that history. Rendering the pronoun as 'him' preserves
    the Greek while understanding the referent as God.
