translation:
  text: And Mattathias and his sons went around and tore down their altars,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκύκλωσεν
  chosen: went around
  alternatives:
  - encircled
  - made a circuit
  - went about
  lexicon: LSJ
  rationale: The verb literally means 'went around' or 'encircled.' In this context
    of anti-idolatry action through the region, 'went around' best conveys movement
    from place to place in natural English without implying a military siege.
- source_word: καθεῖλον
  chosen: tore down
  alternatives:
  - pulled down
  - destroyed
  - demolished
  lexicon: LSJ
  rationale: The aorist verb denotes taking down or demolishing. 'Tore down' is vivid,
    idiomatic, and fits the physical destruction of illicit cultic structures.
- source_word: βωμοὺς
  chosen: altars
  alternatives:
  - high places
  - sacrificial altars
  lexicon: LSJ
  rationale: βωμός ordinarily refers to an altar. 'High places' would import a different
    cultic term not present here. 'Altars' is the most direct and accurate rendering.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - theirs
  - those
  lexicon: Greek grammar
  rationale: The pronoun most naturally refers to the opponents or apostates just
    mentioned in the surrounding context, so 'their altars' preserves the possessive
    force without over-specifying the referent.
- source_word: Ματταθίας
  chosen: Mattathias
  alternatives:
  - Matthathias
  lexicon: Transliteration convention
  rationale: Standard English transliteration for the proper name.
