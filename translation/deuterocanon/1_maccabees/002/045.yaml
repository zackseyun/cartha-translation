theological_decisions:
- issue: Cultic referent of the destroyed structures
  chosen_reading: altars associated with the opposing/idolatrous party
  alternative_readings:
  - altars in general
  rationale: The possessive pronoun and immediate narrative context indicate these
    are not legitimate Israelite altars in general but the illicit altars of the opposition.
    The translation keeps this by rendering 'their altars' rather than flattening
    to simply 'the altars.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
