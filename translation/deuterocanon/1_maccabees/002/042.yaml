theological_decisions:
- issue: Rendering the group name Ἀσιδαίων
  chosen_reading: Hasideans
  alternative_readings:
  - Hasidim
  - Assideans
  rationale: Because the term functions as a historical group designation, the translation
    preserves it as a transliterated name rather than interpreting it as 'the pious.'
    This avoids collapsing a proper group identity into a descriptive label.
  doctrine_reference: Translate titles; transliterate names.
- issue: Force of ἑκουσιαζόμενος τῷ νόμῳ
  chosen_reading: everyone who willingly devoted himself to the law
  alternative_readings:
  - everyone who volunteered for the law
  - everyone who freely committed himself to the law
  rationale: The phrase describes voluntary allegiance to the law, not merely legal
    observance in a generic sense. The chosen rendering preserves the personal, willing
    commitment without overstating militancy.
  doctrine_reference: Preserve theological tension rather than resolve it.
