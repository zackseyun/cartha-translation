translation:
  text: Then a company of Hasideans gathered to them, mighty in strength from Israel,
    everyone who willingly devoted himself to the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hasidim' or 'Assideans,' a named Jewish group associated with zeal for
      the law.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν
  chosen: gathered
  alternatives:
  - were gathered
  - assembled
  - joined
  lexicon: LSJ
  rationale: Aorist passive of συνάγω in this context denotes coming together with/unto
    Mattathias's group. 'Gathered' is natural English and preserves the collective
    movement without overinterpreting as formal enlistment.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - with them
  - unto them
  lexicon: LSJ
  rationale: πρός with accusative here indicates movement toward association with
    the previously mentioned group. 'To them' is slightly more literal; the sense
    of joining is carried by the whole clause.
- source_word: συναγωγὴ
  chosen: company
  alternatives:
  - assembly
  - congregation
  - band
  lexicon: LSJ
  rationale: The noun denotes an assembled group. 'Company' avoids importing later
    synagogue/congregational associations while still conveying a gathered body of
    people.
- source_word: Ἀσιδαίων
  chosen: Hasideans
  alternatives:
  - Hasidim
  - Assideans
  lexicon: LSJ
  rationale: A transliterated group name is preferable because this is a specific
    party/designation, not merely an adjective. 'Hasideans' is a standard English
    form that remains close to the Greek while signaling a named group.
- source_word: ἰσχυρὰ δυνάμει
  chosen: mighty in strength
  alternatives:
  - strong in power
  - powerful in force
  lexicon: LSJ
  rationale: The phrase is somewhat emphatic and slightly redundant in Greek. 'Mighty
    in strength' preserves that emphasis without becoming awkwardly literal.
- source_word: ἀπὸ Ἰσραήλ
  chosen: from Israel
  alternatives:
  - out of Israel
  - of Israel
  lexicon: LSJ
  rationale: ἀπό marks origin/source. 'From Israel' is the most straightforward rendering
    and leaves open whether the sense is ethnic/national provenance rather than a
    technical tribal expression.
- source_word: πᾶς ὁ ἑκουσιαζόμενος
  chosen: everyone who willingly devoted himself
  alternatives:
  - everyone who volunteered
  - everyone who freely gave himself
  - everyone who was zealous of his own will
  lexicon: LSJ
  rationale: The participle conveys willing, voluntary commitment. 'Willingly devoted
    himself' captures both voluntariness and active dedication better than the flatter
    'volunteered,' especially in relation to the law.
- source_word: τῷ νόμῳ
  chosen: to the law
  alternatives:
  - for the law
  - to the Law
  lexicon: LSJ
  rationale: The dative complements the idea of devotion/commitment. 'The law' is
    clear and readable; capitalization is not required by the Greek itself, though
    the referent is the Mosaic law.
