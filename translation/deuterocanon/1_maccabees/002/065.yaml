translation:
  text: And look, Simeon your brother—I know that he is a man of counsel. Listen to
    him all your days; he will be a father to you.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ ἰδοὺ
  chosen: And look
  alternatives:
  - And behold
  - Now look
  lexicon: LSJ
  rationale: Retains the discourse-marking force of ἰδού as an attention-getter without
    archaic 'behold.'
- source_word: Συμεὼν
  chosen: Simeon
  alternatives:
  - Symeon
  rationale: Personal names are transliterated by standard English convention.
- source_word: ἀνὴρ βουλῆς
  chosen: a man of counsel
  alternatives:
  - a prudent man
  - a man of judgment
  - a man of wisdom
  lexicon: LSJ
  rationale: A fairly literal rendering that preserves the idiomatic sense of someone
    characterized by sound counsel or deliberation. 'Man of counsel' keeps the source
    imagery better than a flattened paraphrase.
- source_word: αὐτοῦ ἀκούετε
  chosen: Listen to him
  alternatives:
  - Hear him
  - Obey him
  lexicon: LSJ
  rationale: ἀκούω with a personal object can imply heeding, but 'listen to him' preserves
    the verbal form without over-specifying obedience.
- source_word: πάσας τὰς ἡμέρας
  chosen: all your days
  alternatives:
  - always
  - every day
  lexicon: LSJ
  rationale: The Greek literally says 'all the days'; in context, addressed to the
    sons, 'all your days' is idiomatic English and preserves the durative force.
- source_word: εἰς πατέρα
  chosen: a father to you
  alternatives:
  - as a father to you
  - your father
  lexicon: LSJ
  rationale: The construction indicates role or function rather than literal paternity.
    'A father to you' communicates leadership and care without collapsing the metaphor
    into identity.
