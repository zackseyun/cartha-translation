- issue: Metaphorical use of 'father' for Simeon's role
  chosen_reading: he will be a father to you
  alternative_readings:
  - he will act as your father
  - he will be like a father to you
  rationale: The Greek εἰς πατέρα is metaphorical, indicating a paternal role of guidance
    and authority after Mattathias's death. The translation preserves the metaphor
    directly rather than interpreting it away.
