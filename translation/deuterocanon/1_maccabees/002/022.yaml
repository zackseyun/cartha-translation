translation:
  text: We will not obey the king’s command, turning aside from our worship to the
    right or to the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'We will not listen to the king’s law.' The Greek verb can mean 'listen
      to' or 'obey,' and 'law' is a more literal rendering of νόμος.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκουσόμεθα
  chosen: will obey
  alternatives:
  - will listen to
  - will heed
  lexicon: BDAG
  rationale: Although the verb literally means 'hear/listen,' with a genitive object
    referring to a command or law it commonly carries the sense 'obey' or 'heed.'
    In English, 'obey' best conveys the practical force in this refusal.
- source_word: νόμον
  chosen: decree
  alternatives:
  - law
  - command
  lexicon: LSJ
  rationale: The phrase 'the law of the king' refers here to the royal edict being
    imposed, not to law in an abstract or enduring legal sense. 'Decree' communicates
    the immediate authoritative command more naturally in English while remaining
    faithful to the context.
- source_word: παρελθεῖν
  chosen: by turning aside
  alternatives:
  - to transgress
  - to go beyond
  - to depart from
  lexicon: LSJ
  rationale: The infinitive expresses deviation from established worship practice.
    'Turning aside' preserves the directional metaphor and fits the following idiom
    'to the right or to the left.'
- source_word: λατρίαν
  chosen: worship
  alternatives:
  - service
  - cultic service
  lexicon: BDAG
  rationale: In this context the term refers to Israel's religious observance and
    service to God. 'Worship' is clear, natural English and captures the religious
    sense without overly technical wording.
- source_word: δεξιὰν ἢ ἀριστεράν
  chosen: to the right or to the left
  alternatives:
  - right or left
  lexicon: LSJ
  rationale: This is a fixed idiom for deviating in any direction from the proper
    path. A fairly literal rendering preserves the biblical resonance and the metaphor
    of not swerving.
