id: 1MA.2.22
reference: 1 Maccabees 2:22
source:
  edition: lxx-swete-1909
  text: τὸν νόμον τοῦ βασιλέως οὐκ ἀκουσόμεθα, παρελθεῖν τὴν λατρίαν ἡμῶν δεξιὰν ἢ
    ἀριστεράν.
