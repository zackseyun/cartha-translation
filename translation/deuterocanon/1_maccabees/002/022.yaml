theological_decisions:
- issue: Referent and force of 'the law of the king'
  chosen_reading: Rendered as 'the king’s decree' to indicate a royal command set
    against faithful worship.
  alternative_readings:
  - the king's law
  - the king's command
  rationale: The verse contrasts royal authority with covenantal fidelity. 'Decree'
    avoids implying parity with divine law while still reflecting binding royal legislation.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
