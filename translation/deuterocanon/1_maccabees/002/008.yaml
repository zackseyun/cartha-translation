translation:
  text: Her sanctuary became like a man of honor;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Her temple became like an honored man.' The Greek ναός may be rendered
      'temple' or 'sanctuary,' and ἔνδοξος may mean 'honored' or 'glorious.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ναὸς
  chosen: sanctuary
  alternatives:
  - temple
  - shrine
  lexicon: LSJ
  rationale: ναός can mean the temple or inner sanctuary. Here, with the possessive
    'her' referring to Jerusalem, 'sanctuary' preserves the sacred-cultic sense without
    overcommitting to the whole temple complex, and fits the lament style of the context.
- source_word: ἐγένετο
  chosen: became
  alternatives:
  - was made
  - came to be
  lexicon: LSJ
  rationale: The aorist of γίνομαι marks a change of state. 'Became' is the most natural
    English equivalent and preserves the sense of transformation.
- source_word: ἔνδοξος
  chosen: of honor
  alternatives:
  - glorious
  - honored
  - splendid
  lexicon: LSJ
  rationale: ἔνδοξος often means glorious or honored. In this simile, 'of honor' avoids
    implying positive splendor in a context of lament and better suits the likely
    ironic or tragic comparison to a once-distinguished man now stripped of former
    dignity.
- source_word: ὡς ἀνὴρ ἔνδοξος
  chosen: like a man of honor
  alternatives:
  - like an honored man
  - like a glorious man
  lexicon: LSJ
  rationale: The phrase is comparative and somewhat compressed. 'Like a man of honor'
    keeps the masculine singular image required by the Greek and preserves the dignity-language
    without overinterpreting the exact nuance.
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - its
  lexicon: LSJ
  rationale: The feminine pronoun naturally refers to the city/personified Jerusalem
    in the surrounding context. 'Her' preserves the personification present in the
    Greek.
