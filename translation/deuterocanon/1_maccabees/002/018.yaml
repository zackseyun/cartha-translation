translation:
  text: Now then, come forward first and carry out the king’s command, as all the
    nations have done, and the rulers of Judah, and those left in Jerusalem; and you
    and your house will be among the king’s Friends, and you and your sons will be
    honored with silver and gold and many gifts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king’s friends'; the Greek may refer to the royal court title 'Friends,'
      a recognized class of favored advisers and companions.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'many gifts' translates a term that can denote royal benefits
      or distributions; the sense here is additional rewards beyond silver and gold.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόσελθε
  chosen: come forward
  alternatives:
  - come near
  - approach
  lexicon: LSJ
  rationale: The imperative calls Mattathias to step up publicly before the officials.
    'Come forward' captures both physical approach and the public setting better than
    the more wooden 'come near.'
- source_word: πρῶτος
  chosen: first
  alternatives:
  - as the first one
  - before the others
  lexicon: LSJ
  rationale: 'The adverb indicates precedence: he is being invited to lead by example.
    ''First'' is concise and preserves the social pressure in the scene.'
- source_word: ποίησον τὸ πρόσταγμα
  chosen: carry out the king’s command
  alternatives:
  - do the king's order
  - perform the decree of the king
  lexicon: LSJ
  rationale: πρόσταγμα denotes an authoritative order or command. 'Carry out' is idiomatic
    English for obeying an official directive without over-paraphrasing.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: LSJ
  rationale: In 1 Maccabees this often refers to non-Jewish peoples, but here the
    speaker contrasts them with Judah and Jerusalem while making a broad political
    claim. 'The nations' preserves the Greek wording without importing a more technical
    NT-era sense of 'Gentiles.'
- source_word: οἱ ἄρχοντες Ἰούδα
  chosen: the rulers of Judah
  alternatives:
  - the leaders of Judah
  - the officials of Judah
  lexicon: LSJ
  rationale: ἄρχοντες are governing leaders or officials. 'Rulers' fits the political
    context and keeps the force of recognized authority.
- source_word: οἱ καταλειφθέντες ἐν Ἰερουσαλήμ
  chosen: those left in Jerusalem
  alternatives:
  - those remaining in Jerusalem
  - the survivors in Jerusalem
  lexicon: LSJ
  rationale: The participle means those who have been left behind or remain. 'Those
    left in Jerusalem' is natural and does not over-specify whether the emphasis is
    remnant, survival, or mere residence.
- source_word: τῶν φίλων τοῦ βασιλέως
  chosen: among the king’s Friends
  alternatives:
  - among the king's friends
  - of the king's companions
  lexicon: LSJ
  rationale: In Hellenistic court language, φίλοι can function as an official title
    for royal intimates. Capitalizing 'Friends' signals the likely court-title nuance
    while remaining intelligible in English.
- source_word: δοξασθήσεσθε
  chosen: will be honored
  alternatives:
  - will be glorified
  - will be esteemed
  lexicon: LSJ
  rationale: Here the passive refers to receiving honor or distinction from the king,
    not divine glory. 'Will be honored' best fits the political-reward context.
- source_word: ἀποστολαῖς πολλαῖς
  chosen: many gifts
  alternatives:
  - many commissions
  - many benefits
  - many presents
  lexicon: LSJ
  rationale: In this context alongside silver and gold, the term most naturally refers
    to additional royal benefits or distributions rather than literal 'missions.'
    'Many gifts' communicates the promised material rewards clearly.
