theological_decisions:
- issue: Court-title nuance of φίλοι
  chosen_reading: Render as 'the king’s Friends' with capitalization
  alternative_readings:
  - the king's friends
  rationale: The verse concerns political inducement from royal agents. Capitalization
    preserves the probable Hellenistic court-title sense without requiring a cumbersome
    paraphrase in the main text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Scope of ἔθνη
  chosen_reading: Translate as 'the nations'
  alternative_readings:
  - the Gentiles
  - the peoples
  rationale: The Greek term can bear ethnic-religious force, but here a broad political
    comparison is in view. 'The nations' preserves the source wording and avoids importing
    a narrower theological category not explicit in the verse.
  doctrine_reference: Translation philosophy §1, §5
