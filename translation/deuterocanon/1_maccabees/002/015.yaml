translation:
  text: And the king’s agents, who were compelling apostasy, came to Modein
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ παρὰ τοῦ Βασιλέως
  chosen: the king’s agents
  alternatives:
  - those from the king
  - the men from the king
  - the king’s representatives
  lexicon: LSJ
  rationale: The phrase literally means 'those from the king.' In context it refers
    to officials sent with royal authority. 'The king’s agents' is idiomatic modern
    English that preserves their delegated role without over-specifying office.
- source_word: καταναγκάζοντες
  chosen: compelling
  alternatives:
  - forcing
  - coercing
  - pressuring
  lexicon: LSJ
  rationale: The participle denotes compulsion or coercion. 'Compelling' preserves
    the force of imposed pressure while fitting natural English style in apposition
    to the subject.
- source_word: τὴν ἀποστασίαν
  chosen: apostasy
  alternatives:
  - rebellion
  - defection
  - renunciation
  lexicon: LSJ
  rationale: In this context the term refers to enforced abandonment of ancestral
    Jewish faith and practice, not political revolt. 'Apostasy' best captures religious
    defection and preserves the theological weight of the Greek.
- source_word: εἰς Μωδεείν
  chosen: to Modein
  alternatives:
  - into Modein
  lexicon: LSJ
  rationale: With a verb of motion, εἰς is naturally rendered 'to.' 'Modein' is a
    standard transliteration of the place name Μωδεείν.
- source_word: Καὶ ἦλθον
  chosen: And ... came
  alternatives:
  - Then ... came
  lexicon: LSJ
  rationale: A straightforward narrative opening. 'And' preserves the Greek connective
    and the sequential flow of the account.
