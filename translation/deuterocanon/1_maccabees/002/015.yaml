theological_decisions:
- issue: Meaning of ἀποστασία in a persecution context
  chosen_reading: apostasy in the religious sense
  alternative_readings:
  - rebellion in a political sense
  - defection more generally
  rationale: The immediate Maccabean context concerns pressure to abandon covenantal
    observance and participate in pagan rites. Therefore the religious sense is primary
    and should be explicit in English.
