translation:
  text: And they hastened war against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''they hurried to make war against them'' or ''they launched an attack
      against them.'' The Greek is terse: literally, ''they hastened war against them.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτάχυναν
  chosen: they hastened
  alternatives:
  - they hurried
  - they pressed on
  - they made quickly
  lexicon: LSJ
  rationale: The aorist of ταχύνω means to make swift or hasten. Here it governs the
    action taken against the fugitives; 'they hastened' preserves the verbal force
    without over-interpreting it as a specific military maneuver.
- source_word: ἐπʼ αὐτούς
  chosen: against them
  alternatives:
  - upon them
  - at them
  lexicon: BDAG
  rationale: With hostile military action, ἐπί plus accusative is naturally rendered
    'against them' in English.
- source_word: πόλεμον
  chosen: war
  alternatives:
  - battle
  - attack
  - warfare
  lexicon: LSJ
  rationale: The direct object is literally 'war.' Although English more often says
    'made war' or 'launched an attack,' the Greek wording is compressed. 'War' keeps
    the lexical content visible; the unusual English is tolerated here to stay close
    to the source.
