translation:
  text: And he said, “Alas! Why was I born to see the ruin of my people and the ruin
    of the holy city, and to sit there while it was given into the hand of enemies,
    and the sanctuary into the hand of foreigners?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wreckage/destruction of my people'; the Greek uses a plural form
      that may emphasize the extent of the devastation.
    reason: lexical_alternative
  - marker: b
    text: Literally 'into the hand of enemies ... into the hand of foreigners,' a
      biblical idiom for being handed over to their power.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴμοι
  chosen: Alas!
  alternatives:
  - Woe is me!
  - Oh no!
  lexicon: LSJ
  rationale: An interjection of lament. 'Alas!' preserves the grief-laden exclamation
    in natural modern English without sounding overly archaic like 'Woe is me!'.
- source_word: ἵνα τί
  chosen: Why
  alternatives:
  - For what reason
  - Why indeed
  lexicon: LSJ
  rationale: Idiomatic interrogative asking purpose/reason. 'Why' is the most natural
    English equivalent.
- source_word: ἐγενήθην
  chosen: was I born
  alternatives:
  - did I come to be
  - have I become
  lexicon: LSJ
  rationale: In this lament context, the aorist passive of γίνομαι idiomatically means
    'was I born' or 'came into being.' 'Was I born' best fits the emotional force
    of the complaint.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to witness
  - to look upon
  lexicon: LSJ
  rationale: Infinitive of purpose/complement after 'was I born.' 'To see' is direct
    and sufficiently weighty here.
- source_word: τὰ συντρίμματα
  chosen: the ruin
  alternatives:
  - the wreckage
  - the destruction
  - the shattered state
  lexicon: LSJ
  rationale: Plural form in Greek can function collectively. 'The ruin' gives idiomatic
    English while preserving the sense of devastation affecting the people.
- source_word: τοῦ λαοῦ μου
  chosen: of my people
  alternatives:
  - of my nation
  lexicon: LSJ
  rationale: λαός commonly means 'people'; this keeps the covenantal/national sense
    without over-specifying ethnicity.
- source_word: τὸ σύντριμμα
  chosen: the ruin
  alternatives:
  - the destruction
  - the crushing
  lexicon: LSJ
  rationale: Cognate with the previous term and referring to the city's devastation.
    Rendering both with 'ruin' preserves the parallelism.
- source_word: τῆς πόλεως τῆς ἁγίας
  chosen: of the holy city
  alternatives:
  - of the sacred city
  lexicon: LSJ
  rationale: Standard phrase for Jerusalem. 'Holy city' is the natural and transparent
    rendering of the Greek.
- source_word: καθίσαι ἐκεῖ
  chosen: to sit there
  alternatives:
  - to remain there seated
  - to dwell there
  lexicon: LSJ
  rationale: 'The infinitive continues the lament: not only to see but to remain there
    in helplessness. ''Sit there'' preserves the concrete image and emotional passivity.'
- source_word: ἐν τῷ δοθῆναι αὐτὴν
  chosen: while it was given
  alternatives:
  - when it was handed over
  - in its being given
  lexicon: LSJ
  rationale: The articular infinitive with ἐν conveys contemporaneous circumstance.
    'While it was given' is smoother English than a more wooden construction and preserves
    the passive sense.
- source_word: ἐν χειρὶ ἐχθρῶν
  chosen: into the hand of enemies
  alternatives:
  - into enemies' hands
  - under the power of enemies
  lexicon: LSJ
  rationale: A common biblical idiom for being delivered over to another's power.
    'Into the hand of enemies' keeps the idiom visible in English.
- source_word: τὸ ἁγίασμα
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the temple sanctuary
  lexicon: LSJ
  rationale: Refers specifically to the sacred precinct/holy place rather than the
    city as a whole. 'Sanctuary' is concise and standard.
- source_word: ἐν χειρὶ ἀλλοτρίων
  chosen: into the hand of foreigners
  alternatives:
  - into the hand of strangers
  - into the hand of aliens
  lexicon: LSJ
  rationale: ἀλλότριοι here means those outside the covenant people, foreign outsiders.
    'Foreigners' is clear modern English and fits the lament over desecration.
