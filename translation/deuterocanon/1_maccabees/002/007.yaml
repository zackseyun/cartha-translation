theological_decisions:
- issue: Rendering of covenantal-national terms in a deuterocanonical lament
  chosen_reading: '''my people'' and ''the holy city'' retained without interpretive
    expansion'
  alternative_readings:
  - '''my nation'''
  - '''Jerusalem'' supplied explicitly'
  rationale: The Greek itself uses covenantally charged but straightforward terms.
    The translation preserves that theological weight without adding explanatory identifiers
    not present in the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
