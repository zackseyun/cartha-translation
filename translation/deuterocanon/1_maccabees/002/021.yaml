translation:
  text: Far be it from us to abandon the law and the ordinances.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Far be mercy from us, to abandon the law and the ordinances''—the
      Greek uses an idiom expressing strong rejection: ''far be it from us.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵλεως
  chosen: Far be it from us
  alternatives:
  - May God be gracious to us
  - Mercifully spare us from
  lexicon: LSJ
  rationale: 'Used idiomatically with the infinitive to express strong repudiation
    or abhorrence of an action: ''far be it.'' A more literal appeal to mercy would
    be less natural in English and would miss the established idiomatic force in this
    construction.'
- source_word: ἡμῖν
  chosen: from us
  alternatives:
  - to us
  - for us
  lexicon: LSJ
  rationale: Though formally dative ('to/for us'), in the idiom ἵλεως ἡμῖν + infinitive
    the sense is best conveyed in English by 'from us' within 'Far be it from us.'
    This reflects the construction's meaning rather than a wooden case-for-case rendering.
- source_word: καταλεῖπειν
  chosen: to abandon
  alternatives:
  - to forsake
  - to leave behind
  lexicon: LSJ
  rationale: Conveys deliberate desertion of covenantal obligations. 'Abandon' is
    clear modern English and preserves the seriousness better than the more neutral
    'leave behind.'
- source_word: νόμον
  chosen: the law
  alternatives:
  - law
  lexicon: LSJ
  rationale: With the anarthrous Greek in this context of Jewish covenant fidelity,
    English naturally takes 'the law' as a definite, recognizable body of instruction
    rather than generic 'law.'
- source_word: δικαιώματα
  chosen: the ordinances
  alternatives:
  - the statutes
  - the righteous requirements
  - the decrees
  lexicon: LSJ
  rationale: In biblical Greek this term often denotes prescribed legal requirements
    or statutes. 'Ordinances' is a readable modern rendering that pairs well with
    'the law' without over-specifying ceremonial versus civil aspects.
