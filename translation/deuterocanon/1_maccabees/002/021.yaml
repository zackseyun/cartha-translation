theological_decisions:
- issue: Covenantal force of νόμον καὶ δικαιώματα
  chosen_reading: Rendered as 'the law and the ordinances' to preserve reference to
    Israel's covenantal legal tradition.
  alternative_readings:
  - the law and the statutes
  - law and regulations
  rationale: The verse is a declaration of fidelity to ancestral Jewish law under
    pressure to apostatize. The translation preserves that covenantal weight without
    importing later doctrinal categories.
