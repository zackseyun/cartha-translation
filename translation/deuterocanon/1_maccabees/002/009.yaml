theological_decisions:
- issue: Referent of 'her' throughout the verse
  chosen_reading: Retain the feminine possessive pronoun without explicating the antecedent
    in the verse itself.
  alternative_readings:
  - Explicitly identify the referent as Jerusalem
  - Explicitly identify the referent as Zion
  rationale: The Greek uses feminine possessives αὐτῆς repeatedly, with the antecedent
    supplied by the surrounding context. Preserving 'her' keeps the lament's poetic
    force and avoids importing a more explicit identification than this verse itself
    states.
  doctrine_reference: Preserve theological tension rather than resolve it.
