translation:
  text: The vessels of her glory were carried away captive; her infants were slain
    in her streets, her young men by the enemy’s sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were led away as captives.' The Greek expresses forcible removal into
      captivity.
    reason: lexical_alternative
  - marker: b
    text: The repeated 'her' refers to the city personified in the surrounding context,
      likely Jerusalem/Zion.
    reason: cross_reference
lexical_decisions:
- source_word: σκεύη
  chosen: vessels
  alternatives:
  - articles
  - implements
  lexicon: LSJ
  rationale: σκεύη commonly denotes vessels, utensils, or equipment. In this lament
    context, 'vessels' best preserves the likely reference to precious temple or civic
    objects without over-specifying beyond the Greek.
- source_word: δόξης
  chosen: glory
  alternatives:
  - splendor
  - honor
  lexicon: LSJ
  rationale: δόξα here likely denotes splendor or glory associated with the city and
    its sacred treasures. 'Glory' preserves the elevated tone and possible theological
    resonance better than the flatter 'honor' or 'splendor' alone.
- source_word: αἰχμάλωτα ἀπήχθη
  chosen: were carried away captive
  alternatives:
  - were led away as captives
  - were taken captive
  lexicon: LSJ
  rationale: The adjective αἰχμάλωτα with ἀπήχθη conveys forcible removal into captivity.
    'Were carried away captive' is idiomatic, retains the passive force, and matches
    the lament style.
- source_word: νήπια
  chosen: infants
  alternatives:
  - little children
  - babes
  lexicon: LSJ
  rationale: νήπια refers to very young children. 'Infants' is concise and grave in
    tone, fitting the context of slaughter in the streets.
- source_word: ἀπεκτάθη
  chosen: were slain
  alternatives:
  - were killed
  - were cut down
  lexicon: LSJ
  rationale: The verb denotes killing or slaughter. 'Were slain' preserves the solemn,
    tragic register better than the more ordinary 'were killed.'
- source_word: πλατείαις
  chosen: streets
  alternatives:
  - broad streets
  - public squares
  lexicon: LSJ
  rationale: πλατεῖαι can mean broad streets or open city spaces. 'Streets' is the
    most natural English here; 'public squares' would be too specific, while 'broad
    streets' is unnecessarily wooden.
- source_word: νεανίσκοι
  chosen: young men
  alternatives:
  - youths
  lexicon: LSJ
  rationale: νεανίσκοι denotes young men or youths. 'Young men' is more natural contemporary
    English while preserving the age distinction from the infants.
- source_word: ῥομφαίᾳ
  chosen: sword
  alternatives:
  - blade
  - great sword
  lexicon: LSJ
  rationale: ῥομφαία is a sword, often a large sword. In English biblical style, 'sword'
    is the clearest default unless the larger weapon nuance is contextually crucial,
    which it is not here.
- source_word: ἐχθροῦ
  chosen: the enemy’s
  alternatives:
  - of an enemy
  - of the foe
  lexicon: LSJ
  rationale: The singular genitive functions collectively or representatively in context.
    'The enemy’s' is idiomatic and conveys hostile agency clearly.
