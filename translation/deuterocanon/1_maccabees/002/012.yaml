theological_decisions:
- issue: Scope of τὰ ἅγια
  chosen_reading: Rendered broadly as 'our holy things' rather than narrowing to 'our
    sanctuary.'
  alternative_readings:
  - our sanctuary
  - our holy place
  rationale: The Greek neuter plural naturally refers to holy things or sacred matters
    collectively. Since the text itself does not force a singular architectural reference,
    the translation preserves the broader lament without resolving it too narrowly.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
