translation:
  text: And behold, our holy things, our beauty, and our glory have been laid waste,
    and the nations have defiled them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our sanctuary' or 'our holy place'; the Greek literally says 'our holy
      things.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have profaned' or 'have desecrated them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: LSJ
  rationale: Rendered with a natural but still vivid interjection in modern English.
    'Look' preserves the deictic force and emotional immediacy better than the more
    archaic 'behold.'
- source_word: τὰ ἅγια ἡμῶν
  chosen: our holy things
  alternatives:
  - our sanctuary
  - our holy places
  - our sacred things
  lexicon: LSJ
  rationale: The neuter plural literally denotes 'the holy things.' While it may include
    the sanctuary and its sacred appurtenances, the Greek is broader than a singular
    'sanctuary,' so the plural is preserved in the main text.
- source_word: καλλονὴ
  chosen: beauty
  alternatives:
  - splendor
  - fairness
  lexicon: LSJ
  rationale: '''Beauty'' is the most direct lexical equivalent and works well in the
    lament context. ''Splendor'' is possible, but ''beauty'' better reflects the basic
    sense of καλλονή.'
- source_word: δόξα
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: LSJ
  rationale: '''Glory'' is the standard and weightiest rendering, fitting both the
    rhetorical triad and the likely reference to Israel''s honored state and sacred
    prestige.'
- source_word: ἠρημώθη
  chosen: have been laid waste
  alternatives:
  - have been desolated
  - have been made desolate
  lexicon: LSJ
  rationale: The verb conveys devastation or desolation. 'Have been laid waste' is
    idiomatic modern English that preserves the passive sense and severity.
- source_word: ἐβεβήλωσαν
  chosen: have defiled
  alternatives:
  - have profaned
  - have desecrated
  lexicon: LSJ
  rationale: The verb means to treat as profane or defile what is holy. 'Defiled'
    is accessible and preserves the cultic violation; 'profaned' is slightly more
    technical and remains a viable alternative.
- source_word: ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the heathen
  lexicon: LSJ
  rationale: '''The nations'' is the most literal and contextually appropriate rendering
    in this Jewish-Greek setting. ''Gentiles'' is interpretively possible, but ''nations''
    better preserves the broader ethnic-political sense of ἔθνη.'
