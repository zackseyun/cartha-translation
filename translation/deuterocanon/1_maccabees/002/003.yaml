translation:
  text: Simon, who was called Thassi,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one called Thassi.' The Greek participial expression can be rendered
      more literally, but the main text uses smoother English.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σίμων
  chosen: Simon
  alternatives:
  - Symeon
  lexicon: LSJ
  rationale: Proper personal name; standard English transliteration is 'Simon.' 'Symeon'
    is possible in some contexts, but 'Simon' is the conventional and more natural
    rendering for this Hellenized form.
- source_word: ὁ καλούμενος
  chosen: who was called
  alternatives:
  - the one called
  - who was named
  - called
  lexicon: BDAG
  rationale: The article plus present middle/passive participle functions attributively,
    identifying Simon by an additional designation. 'Who was called' is idiomatic
    English and preserves the sense of a known epithet or surname without over-paraphrase.
- source_word: Θασσίς
  chosen: Thassi
  alternatives:
  - Thassis
  - Thasi
  lexicon: LSJ
  rationale: This is a proper epithet/name and should be transliterated rather than
    translated. 'Thassi' is a straightforward English transliteration from the Greek
    form Θασσίς. 'Thassis' more mechanically reflects the final sigma but is less
    natural in English name styling.
