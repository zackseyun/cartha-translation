theological_decisions:
- issue: Moral descriptors in a military context
  chosen_reading: Retain 'sinners' and 'lawless men' as the text's own evaluative
    categories.
  alternative_readings:
  - wrongdoers and outlaws
  - the wicked and the lawless
  rationale: The Greek explicitly frames the conflict in moral-religious terms. The
    translation should preserve that evaluative language without softening it into
    merely political categories.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Gender rendering of ἄνδρας
  chosen_reading: Render as 'men' rather than a gender-neutral term.
  alternative_readings:
  - people
  rationale: The source uses an explicitly masculine noun, and the project's policy
    is gender-accurate over gender-neutral where the source intent is masculine.
  doctrine_reference: Translation philosophy §4
