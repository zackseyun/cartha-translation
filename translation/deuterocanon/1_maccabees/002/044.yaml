translation:
  text: They joined them and became a support for them. They also formed a force and
    struck down sinners in their anger, and lawless men in their wrath; and the rest
    fled to the nations to save themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were added to them.' The Greek verb can be rendered more formally as
      accession to the group.
    reason: lexical_alternative
  - marker: b
    text: '''To the nations'' likely means to surrounding non-Jewish peoples or territories;
      compare the related sense ''to the Gentiles.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: προσετέθησαν
  chosen: joined
  alternatives:
  - were added
  - attached themselves
  lexicon: LSJ
  rationale: Passive of προστίθημι here idiomatically means people were added to or
    joined a group. 'Joined' is natural English while preserving the sense of accession.
- source_word: εἰς στήριγμα
  chosen: a support
  alternatives:
  - for support
  - as a support
  - for a bulwark
  lexicon: LSJ
  rationale: στήριγμα denotes support or strengthening. 'A support' fits the predicate
    construction ἐγένοντο ... εἰς and keeps the concrete sense without over-militarizing
    it.
- source_word: συνεστήσαντο δύναμιν
  chosen: formed a force
  alternatives:
  - organized a force
  - established an army
  - banded together in strength
  lexicon: LSJ
  rationale: The phrase indicates organizing military strength. 'Formed a force' is
    concise and faithful, avoiding the potentially too formal 'established an army'
    while preserving martial context.
- source_word: ἐπάταξαν
  chosen: struck down
  alternatives:
  - smote
  - defeated
  - killed
  lexicon: LSJ
  rationale: πατάσσω commonly means strike or smite, often lethally in battle contexts.
    'Struck down' preserves the violent force and likely lethal implication without
    overstating beyond the verb itself.
- source_word: ἁμαρτωλούς
  chosen: sinners
  alternatives:
  - sinful men
  lexicon: LSJ
  rationale: The term is morally charged in the Greek and should remain so. 'Sinners'
    is the direct and standard rendering.
- source_word: ἐν ὀργῇ αὐτῶν
  chosen: in their anger
  alternatives:
  - with their anger
  - in their wrath
  lexicon: LSJ
  rationale: ὀργή denotes anger/wrath. Rendering it as 'anger' here allows θυμός in
    the next clause to be distinguished as 'wrath,' preserving the rhetorical parallel
    with slight lexical variation.
- source_word: ἄνδρας ἀνόμους
  chosen: lawless men
  alternatives:
  - lawless people
  - men without law
  - wicked men
  lexicon: LSJ
  rationale: ἀνόμους means lawless, and ἄνδρας is explicitly masculine. Following
    the project's gender-accurate policy, 'men' is retained rather than neutralized.
- source_word: ἐν θυμῷ αὐτῶν
  chosen: in their wrath
  alternatives:
  - in their fury
  - in their passion
  lexicon: LSJ
  rationale: θυμός here conveys heated rage. 'Wrath' gives stronger force than 'anger'
    and preserves the parallel escalation with the previous clause.
- source_word: οἱ λοιποί
  chosen: the rest
  alternatives:
  - the remainder
  - the others
  lexicon: LSJ
  rationale: A straightforward rendering of the residual group in contrast to those
    struck down.
- source_word: εἰς τὰ ἔθνη
  chosen: to the nations
  alternatives:
  - to the Gentiles
  - among the nations
  lexicon: LSJ
  rationale: ἔθνη in this Maccabean Jewish context refers to the surrounding non-Jewish
    peoples or territories. 'To the nations' is formally closer and avoids importing
    NT-specific overtones of 'Gentiles,' though that sense is related.
- source_word: σωθῆναι
  chosen: to save themselves
  alternatives:
  - to be saved
  - for safety
  - to escape
  lexicon: LSJ
  rationale: The passive infinitive after motion expresses purpose/result of seeking
    deliverance. In idiomatic English, 'to save themselves' best captures the reflexive
    practical sense of fleeing for survival.
