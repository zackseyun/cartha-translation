theological_decisions:
- issue: Implied object with 'compelling to sacrifice'
  chosen_reading: who was compelling them to sacrifice
  alternative_readings:
  - who was compelling people to sacrifice
  - who was compelling him to sacrifice
  rationale: The Greek infinitive θύειν lacks an explicit object, but the narrative
    context in 1 Maccabees 2 concerns coercion of the local population into pagan
    sacrifice. 'Them' best reflects the contextual implied object without narrowing
    it to a singular referent.
  doctrine_reference: Translation philosophy §1, §5
