translation:
  text: And he killed the king’s man who was compelling them to sacrifice at that
    time, and he tore down the altar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the king’s man.' This likely refers to a royal officer
      or agent.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν ἄνδρα τοῦ βασιλέως
  chosen: the king’s man
  alternatives:
  - the king’s officer
  - the king’s agent
  lexicon: LSJ
  rationale: ἄνδρα is literally 'man,' and the genitive τοῦ βασιλέως marks him as
    belonging to or representing the king. 'The king’s man' preserves the directness
    of the Greek while naturally conveying an official representative.
- source_word: τὸν ἀναγκάζοντα
  chosen: who was compelling them
  alternatives:
  - who was forcing them
  - who was pressuring them
  lexicon: BDAG
  rationale: ἀναγκάζω commonly means to compel or force. 'Compelling' preserves the
    coercive force without over-paraphrase. 'Them' is supplied in English because
    the infinitive θύειν implies the people being pressured to sacrifice in the narrative
    context.
- source_word: θύειν
  chosen: to sacrifice
  alternatives:
  - to offer sacrifice
  lexicon: LSJ
  rationale: θύω in sacrificial contexts means to offer sacrifice. 'To sacrifice'
    is concise, idiomatic, and fits the immediate cultic setting.
- source_word: ἀπέκτεινεν
  chosen: killed
  alternatives:
  - slew
  - put to death
  lexicon: BDAG
  rationale: Aorist of ἀποκτείνω straightforwardly denotes killing. 'Killed' is clear
    modern English; 'slew' is archaic, and 'put to death' is more formal than the
    context requires.
- source_word: ἐν τῷ καιρῷ ἐκείνῳ
  chosen: at that time
  alternatives:
  - in that moment
  - then
  lexicon: LSJ
  rationale: The phrase is temporal and somewhat emphatic. 'At that time' preserves
    the wording more closely than the flatter 'then' while remaining natural English.
- source_word: τὸν βωμὸν
  chosen: the altar
  lexicon: LSJ
  rationale: βωμός is the standard term for an altar, especially a sacrificial altar.
    No stronger alternative is needed.
- source_word: καθεῖλεν
  chosen: tore down
  alternatives:
  - pulled down
  - destroyed
  lexicon: BDAG
  rationale: καθαιρέω here means to take down or demolish. 'Tore down' captures the
    forceful action against the altar without overstating total destruction.
