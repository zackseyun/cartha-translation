translation:
  text: And they circumcised the uncircumcised boys, as many as they found within
    the borders of Israel, by force.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the territory/regions of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'with strength'; here the sense is coercive, hence 'by force.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιέτεμον
  chosen: they circumcised
  alternatives:
  - they cut around
  - they performed circumcision on
  lexicon: LSJ
  rationale: Aorist active of περιτέμνω, the standard verb for circumcising. 'They
    circumcised' is the natural and precise English equivalent.
- source_word: τὰ παιδάρια
  chosen: the ... boys
  alternatives:
  - the children
  - the little boys
  - the youths
  lexicon: LSJ
  rationale: παιδάριον can denote a child or young boy. In this context, paired with
    'uncircumcised' and the act of circumcision, 'boys' best fits the likely referent
    without over-specifying age.
- source_word: τὰ ἀπερίτμητα
  chosen: uncircumcised
  alternatives:
  - not circumcised
  lexicon: LSJ
  rationale: The adjective directly describes the boys' covenantal status. 'Uncircumcised'
    is the standard and clear rendering.
- source_word: ὅσα εὗρεν
  chosen: as many as they found
  alternatives:
  - whomever they found
  - all that they found
  lexicon: LSJ
  rationale: 'Although the singular εὗρεν appears in Swete''s text, the sense with
    neuter plural ὅσα is distributive/collective: they circumcised all such boys they
    found. English idiom is best captured by ''as many as they found.'''
- source_word: ἐν ὁρίοις Ἰσραήλ
  chosen: within the borders of Israel
  alternatives:
  - in the territory of Israel
  - in the regions of Israel
  lexicon: LSJ
  rationale: ὅρια commonly means borders, territories, or regions. 'Within the borders
    of Israel' preserves the territorial sense and reads naturally in English.
- source_word: ἐν ἰσχύϊ
  chosen: by force
  alternatives:
  - with strength
  - mightily
  - with power
  lexicon: LSJ
  rationale: The phrase here indicates coercive action rather than mere vigor. 'By
    force' best conveys that they compelled the circumcision of those they found.
