translation:
  text: In those days Mattathias son of John, son of Simeon, a priest of the sons
    of Joarib, came from Jerusalem and settled in Modein.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwelt in Modein.' The Greek literally says 'sat in Modein,' an idiom
      for residing or settling there.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ταῖς ἡμέραις ἐκείναις
  chosen: In those days
  alternatives:
  - At that time
  - In those days then
  lexicon: LSJ
  rationale: A standard temporal formula. 'In those days' is natural English and preserves
    the narrative setting without over-interpretation.
- source_word: ἀνέστη
  chosen: rose up
  alternatives:
  - arose
  - appeared
  - came forward
  lexicon: LSJ
  rationale: The verb literally means 'stood up/rose.' In this narrative opening it
    signals Mattathias's emergence onto the scene. 'Rose up' preserves that force
    better than the flatter 'appeared,' while remaining idiomatic.
- source_word: Ματταθίας Ἰωάννου τοῦ Συμεών
  chosen: Mattathias son of John, son of Simeon
  alternatives:
  - Mattathias, of John, of Simeon
  lexicon: LSJ
  rationale: The genitives function genealogically. Supplying 'son of' makes the relationship
    explicit in clear English and matches normal biblical style.
- source_word: ἱερεὺς
  chosen: a priest
  alternatives:
  - priest
  lexicon: LSJ
  rationale: The anarthrous noun is naturally rendered with the English indefinite
    article in this appositional description.
- source_word: τῶν υἱῶν Ἰωαρίβ
  chosen: of the sons of Joarib
  alternatives:
  - from the sons of Joarib
  - of the Joarib division
  lexicon: LSJ
  rationale: The phrase identifies priestly lineage or course. 'Of the sons of Joarib'
    stays close to the Greek while remaining understandable. A more interpretive rendering
    such as 'division' is possible but goes beyond the immediate wording.
- source_word: ἀπὸ Ἱερουσαλήμ
  chosen: from Jerusalem
  alternatives:
  - out of Jerusalem
  lexicon: LSJ
  rationale: A straightforward expression of origin or departure. 'From Jerusalem'
    is the most natural and least interpretive rendering.
- source_word: ἐκάθισεν ἐν Μωδεείν
  chosen: settled in Modein
  alternatives:
  - dwelt in Modein
  - lived in Modein
  - sat down in Modein
  lexicon: LSJ
  rationale: Although the verb is literally 'sat,' in this context it idiomatically
    refers to taking up residence. 'Settled in' communicates the sense in natural
    English better than the overly literal 'sat down.' 'Modein' is a standard transliteration
    of Μωδεείν.
