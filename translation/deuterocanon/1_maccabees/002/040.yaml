translation:
  text: And one man said to his neighbor, “If we all do as our brothers did, and do
    not fight against the Gentiles for our lives and our rights, they will quickly
    destroy us from the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the nations.” The Greek term often means “nations,” but here likely
      refers specifically to non-Jewish peoples opposed to the Jews.
    reason: lexical_alternative
  - marker: b
    text: Or “our ordinances” or “our legal claims.” The Greek can refer to established
      rights, legal norms, or customary claims.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ
  chosen: man
  alternatives:
  - someone
  - a man
  lexicon: LSJ
  rationale: The singular noun plainly denotes an individual male speaker. 'One man'
    preserves the idiomatic distributive sense in context without overgeneralizing.
- source_word: πλησίον
  chosen: neighbor
  alternatives:
  - companion
  - fellow
  lexicon: LSJ
  rationale: Standard rendering for 'the one near' or 'neighbor.' Here it refers to
    another member of the group; 'neighbor' is natural and sufficiently literal.
- source_word: ἀδελφοὶ
  chosen: brothers
  alternatives:
  - kindred
  - kinsmen
  lexicon: LSJ
  rationale: The Greek is masculine plural and likely refers to fellow Jews previously
    mentioned. Per gender-accurate policy, 'brothers' is preferred over an inclusive
    smoothing.
- source_word: πολεμήσωμεν
  chosen: fight
  alternatives:
  - make war
  - go to war
  lexicon: LSJ
  rationale: '''Fight'' is concise modern English and fits the immediate context of
    armed resistance, while remaining faithful to the military sense.'
- source_word: τὰ ἔθνη
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: LSJ
  rationale: In this Jewish context, τὰ ἔθνη refers not merely to nations in general
    but to the surrounding non-Jewish peoples/powers. 'Gentiles' best captures that
    contextual force; 'the nations' remains a viable literal alternative.
- source_word: ψυχῆς
  chosen: lives
  alternatives:
  - souls
  - life
  lexicon: LSJ
  rationale: In the phrase ὑπὲρ τῆς ψυχῆς ἡμῶν, the sense is preservation of life
    rather than an abstract 'soul.' English plural 'our lives' matches the collective
    first-person context.
- source_word: δικαιωμάτων
  chosen: rights
  alternatives:
  - ordinances
  - legal claims
  - customary rights
  lexicon: LSJ
  rationale: In context this refers to the community's lawful or ancestral claims
    and freedoms under threat. 'Rights' is the clearest modern rendering, though the
    Greek can also carry the sense of legal ordinances or established claims.
- source_word: τάχιον
  chosen: quickly
  alternatives:
  - sooner
  - more quickly
  lexicon: LSJ
  rationale: The comparative adverb here intensifies immediacy. 'Quickly' communicates
    the practical sense in idiomatic English without awkwardness.
- source_word: ὀλεθρεύσουσιν
  chosen: destroy
  alternatives:
  - wipe out
  - annihilate
  lexicon: LSJ
  rationale: A strong verb of destruction. 'Destroy' preserves the severity while
    avoiding overstatement beyond the source.
- source_word: ἀπὸ τῆς γῆς
  chosen: from the land
  alternatives:
  - from the earth
  - out of the land
  lexicon: LSJ
  rationale: In this setting γῆ most naturally means the land, likely their homeland/territory,
    not the whole earth. 'From the land' is both natural and contextually precise.
