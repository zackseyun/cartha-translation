theological_decisions:
- issue: Rendering τὰ ἔθνη in a Jewish resistance context
  chosen_reading: the Gentiles
  alternative_readings:
  - the nations
  rationale: The term often literally means 'nations,' but in Jewish literature it
    commonly denotes non-Jewish peoples. Because the verse contrasts 'our brothers'
    with τὰ ἔθνη, 'the Gentiles' better preserves the social-religious distinction
    in context.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English'
- issue: Rendering δικαιωμάτων
  chosen_reading: rights
  alternative_readings:
  - ordinances
  - legal rights
  - customs
  rationale: The immediate argument concerns defending communal existence and legitimate
    claims. 'Rights' communicates this clearly in modern English, while a footnote
    preserves the more formal legal/customary nuance.
  doctrine_reference: 'Translation philosophy: optimal equivalence; consistency of
    key terms, or documented exception'
