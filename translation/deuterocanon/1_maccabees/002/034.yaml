translation:
  text: And they said, “We will not come out, nor will we do the king’s word, to profane
    the Sabbath day.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξελευσόμεθα
  chosen: we will not come out
  alternatives:
  - we will not go out
  - we will not come forth
  lexicon: LSJ
  rationale: Future middle of ἐξέρχομαι, literally 'go/come out.' In context, the
    speakers are being summoned from hiding; 'come out' is natural modern English
    while remaining close to the Greek.
- source_word: ποιήσομεν τὸν λόγον τοῦ βασιλέως
  chosen: we will not obey the king’s word
  alternatives:
  - we will not do the king’s command
  - we will not carry out the king’s word
  lexicon: LSJ
  rationale: Literally 'we will not do the word of the king.' In English, 'obey the
    king’s word' best conveys the idiomatic force of complying with a royal command
    without unnecessary stiffness.
- source_word: βεβηλῶσαι
  chosen: to profane
  alternatives:
  - to desecrate
  - to defile
  lexicon: LSJ
  rationale: The infinitive expresses the purpose or result associated with obeying
    the king's command. 'Profane' preserves the cultic/religious sense of treating
    something holy as common, fitting Sabbath language well.
- source_word: ἡμέραν τῶν σαββάτων
  chosen: the Sabbath day
  alternatives:
  - the day of the Sabbaths
  - the sabbath day
  lexicon: LSJ
  rationale: Though formally plural ('of the sabbaths'), this is a standard idiom
    for the singular Sabbath. 'The Sabbath day' is clear, idiomatic English and preserves
    the sacred-day reference.
