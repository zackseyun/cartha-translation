theological_decisions:
- issue: Rendering of sacred-time language in βεβηλῶσαι τὴν ἡμέραν τῶν σαββάτων
  chosen_reading: to profane the Sabbath day
  alternative_readings:
  - to desecrate the Sabbath day
  rationale: The verse frames refusal in terms of holiness and defilement of the Sabbath,
    not merely civil disobedience. 'Profane' best preserves that theological register
    while remaining understandable.
