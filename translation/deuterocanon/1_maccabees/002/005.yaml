translation:
  text: Eleazar, who was called Avaran; Jonathan, who was called Apphus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Swete reads 'Sapphous' (Σαφφούς) here; Jonathan's epithet is commonly
      given as 'Apphus.' The main text follows the likely intended name while preserving
      the diplomatic form here.
    reason: textual_variant
lexical_decisions:
- source_word: Ἐλεαζάρ
  chosen: Eleazar
  lexicon: LSJ
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project's policy for names.
- source_word: ὁ καλούμενος
  chosen: who was called
  alternatives:
  - called
  - the one called
  - who was named
  lexicon: BDAG
  rationale: A natural English rendering of the articular participial expression identifying
    an alternate name or epithet. 'Who was called' preserves the descriptive force
    without sounding wooden.
- source_word: Αὐαράν
  chosen: Avaran
  alternatives:
  - Auran
  - Abaran
  lexicon: LSJ
  rationale: This is a nickname/epithet functioning as a proper name; transliterated
    directly from the Greek form in the Zone 1 witness. Because the exact underlying
    Semitic form is uncertain, a conservative transliteration is preferable.
- source_word: Ἰωνάθας
  chosen: Jonathan
  lexicon: LSJ
  rationale: Proper personal name; standard English transliteration from the Greek
    form.
- source_word: Σαφφούς
  chosen: Apphus
  alternatives:
  - Sapphous
  - Saphphous
  lexicon: LSJ
  rationale: Although Swete's diplomatic text here reads Σαφφούς, the traditional
    identification of Jonathan's epithet in 1 Maccabees is Apphus. Given the source
    validation note 'minor_mismatch' and the well-known epithet list in the immediate
    context, 'Apphus' best represents the intended name while preserving the source
    uncertainty in a footnote.
