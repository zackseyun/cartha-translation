lexical_decisions:
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  lexicon: LSJ
  rationale: The adjective functions substantivally with the article and participle,
    referring comprehensively to the whole group.
- source_word: οἱ φυγαδεύοντες
  chosen: those fleeing
  alternatives:
  - the fugitives
  - those who had fled
  - those taking refuge
  lexicon: LSJ
  rationale: The present participle with article is best rendered substantivally.
    'Those fleeing' preserves the ongoing/actional sense without over-specifying whether
    they are already established as refugees. 'Fugitives' is possible but sounds more
    criminalized in English than the Greek requires.
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - away from
  lexicon: LSJ
  rationale: The preposition marks separation/source. Simple 'from' is idiomatic and
    sufficient in English.
- source_word: τῶν κακῶν
  chosen: the evils
  alternatives:
  - the wrongs
  - the troubles
  - evil things
  lexicon: LSJ
  rationale: The plural neuter can denote evil deeds, bad conditions, or oppressive
    wrongs. 'The evils' keeps the Greek's breadth and avoids narrowing the reference
    prematurely. In context it likely refers to the oppressive evils just described,
    but the phrase itself remains general.
