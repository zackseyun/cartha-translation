translation:
  text: What nation has not inherited a kingdom and seized its spoils?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its plunder' or 'its booty.' The Greek σκῦλα denotes spoils taken from
      conquest or war.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποῖον ἔθνος
  chosen: What nation
  alternatives:
  - Which nation
  - What people
  lexicon: LSJ
  rationale: An interrogative rhetorical question is in view. 'Nation' fits ἔθνος
    in this political-collective sense better than the more ethnographic 'people.'
- source_word: ἐκληρονόμησεν
  chosen: has not inherited
  alternatives:
  - has not received as an inheritance
  - has not taken possession of
  lexicon: LSJ
  rationale: κληρονομέω commonly denotes receiving by inheritance or allotted possession.
    'Inherited' preserves the metaphor and the aorist's simple past sense within the
    rhetorical question.
- source_word: βασιλείαν
  chosen: a kingdom
  alternatives:
  - royal power
  - kingship
  lexicon: LSJ
  rationale: βασιλεία can mean reign, kingship, or kingdom. Here with ἐκληρονόμησεν
    and in parallel with seizing spoils, the concrete-political sense 'kingdom' is
    most natural.
- source_word: ἐκράτησεν
  chosen: taken hold of
  alternatives:
  - seized
  - gained control of
  lexicon: LSJ
  rationale: κρατέω means to be strong over, seize, or take possession of. 'Taken
    hold of' preserves the verbal force without over-specifying military violence,
    though that nuance is present in context.
- source_word: τῶν σκύλων αὐτῆς
  chosen: its spoils
  alternatives:
  - its plunder
  - its booty
  lexicon: LSJ
  rationale: σκῦλα refers to spoils taken in war. 'Spoils' is clear modern English
    and matches the likely military-political context. The pronoun αὐτῆς is best taken
    as referring back to the kingdom/nation under discussion; English 'its' preserves
    the ambiguity without awkwardness.
