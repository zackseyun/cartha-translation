translation:
  text: Repay the nations with retribution, and pay attention to the commands of the
    law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Repay the Gentiles with repayment.' The Greek uses a cognate expression
      ('repay retribution/repayment') for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνταποδίδοτε
  chosen: Repay
  alternatives:
  - Pay back
  - Return
  lexicon: LSJ
  rationale: Imperative plural from ἀνταποδίδωμι, calling for giving back in kind.
    'Repay' is concise and preserves the retaliatory/reciprocal force without overexpanding
    the wording.
- source_word: ἀνταπόδομα
  chosen: retribution
  alternatives:
  - repayment
  - requital
  lexicon: LSJ
  rationale: Cognate object intensifying ἀνταποδίδοτε. 'Retribution' best conveys
    punitive repayment in this military-national context; 'repayment' is possible
    but weaker in English.
- source_word: τοῖς ἔθνεσιν
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: LSJ
  rationale: In 1 Maccabees this commonly refers to the surrounding non-Jewish nations.
    'The nations' preserves the broader ethnic-political sense and avoids importing
    later NT-specific connotations of 'Gentiles'.
- source_word: προσέχετε
  chosen: pay attention to
  alternatives:
  - heed
  - give attention to
  - observe
  lexicon: LSJ
  rationale: Imperative plural meaning to attend carefully or be attentive. 'Pay attention
    to' is natural modern English and keeps the sense of careful regard; 'heed' is
    slightly more formal, while 'observe' could blur into direct law-keeping rather
    than attentiveness to its directives.
- source_word: εἰς προστάγματα
  chosen: the commands
  alternatives:
  - the ordinances
  - the injunctions
  - the precepts
  lexicon: LSJ
  rationale: προστάγματα denotes orders or commands. 'Commands' is clear and accessible;
    'ordinances' sounds more institutional than the Greek requires.
- source_word: τοῦ νόμου
  chosen: of the law
  alternatives:
  - of the Law
  lexicon: LSJ
  rationale: νόμος here refers to the Jewish law/Torah. Lowercase 'law' is retained
    in the main text for readable English, while the context clearly identifies it
    as the covenantal law of Israel.
