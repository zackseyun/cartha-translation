theological_decisions:
- issue: Whether τοῖς ἔθνεσιν should be rendered 'the nations' or 'the Gentiles'
  chosen_reading: the nations
  alternative_readings:
  - the Gentiles
  rationale: The Greek term can denote Gentiles/non-Jews, but in this context of national
    struggle it also carries a geopolitical sense. 'The nations' preserves the source
    wording and avoids narrowing the reference more than necessary.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
- issue: Whether ἀνταπόδομα should be softened to 'repayment' or rendered more forcefully
  chosen_reading: retribution
  alternative_readings:
  - repayment
  - requital
  rationale: The verse is an exhortation in a conflict setting, and the cognate construction
    emphasizes retaliatory recompense. 'Retribution' reflects that force without adding
    concepts absent from the Greek.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the text''s
    gravity without paraphrase.'
