translation:
  text: And they said to them, “Up to now—come out and do according to the word of
    the king, and you will live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Until now.” The Greek opening is terse and may signal a final chance
      to comply.
    reason: lexical_alternative
  - marker: b
    text: “According to the word of the king” could also be rendered “according to
      the command of the king.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἕως τοῦ νῦν
  chosen: Up to now
  alternatives:
  - Until now
  - By now
  lexicon: LSJ
  rationale: The phrase is somewhat abrupt in Greek and functions as a temporal limit
    or final opportunity. 'Up to now' preserves the idiomatic force without overinterpreting
    it as a command to stop delaying.
- source_word: ἐξέλθοντες
  chosen: come out
  alternatives:
  - go out
  - having come out
  lexicon: LSJ
  rationale: A participle from ἐξέρχομαι. In direct speech to people apparently in
    hiding or enclosed, 'come out' is the most natural English equivalent. Rendering
    it as an English imperative captures the participial command sequence in idiomatic
    English.
- source_word: ποιήσατε
  chosen: do
  alternatives:
  - act
  - carry out
  lexicon: LSJ
  rationale: A straightforward imperative. 'Do' best matches the broad verbal force
    and pairs naturally with 'according to the word of the king.'
- source_word: κατὰ τὸν λόγον τοῦ βασιλέως
  chosen: according to the word of the king
  alternatives:
  - according to the command of the king
  - in accordance with the king's decree
  lexicon: LSJ
  rationale: λόγος can mean 'word,' 'statement,' or 'command' in context. Here it
    refers to the king's directive. 'Word of the king' stays closer to the Greek while
    remaining clear in English.
- source_word: ζήσεσθε
  chosen: you will live
  alternatives:
  - you will survive
  - your lives will be spared
  lexicon: LSJ
  rationale: Future middle of ζάω. 'You will live' preserves both the literal sense
    and the implied offer of spared life without adding explanatory wording not explicit
    in the Greek.
