theological_decisions:
- issue: Whether to render ἀνήρ generically or specifically
  chosen_reading: 'specific masculine: ''man'''
  alternative_readings:
  - person
  - one
  rationale: The Greek uses ἀνδρός, not a generic human term such as ἄνθρωπος. Following
    the project's gender-accurate policy, the translation keeps the masculine singular
    unless context clearly requires a generic rendering.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: How literally to preserve the decay imagery in the final clause
  chosen_reading: 'retain the concrete imagery: ''his glory ends in dung and worms'''
  alternative_readings:
  - his glory will become refuse and decay
  - his honor comes to filth and worms
  rationale: The verse's warning depends on stark imagery of humiliation and mortality.
    A more polished rendering would weaken the rhetorical force. Optimal equivalence
    here favors a relatively literal expression.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
