translation:
  text: And do not fear the word of a sinful man, for his glory is for dung and worms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not fear what a sinful man says.' The Greek literally says 'from
      the word of a sinful man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγου
  chosen: the word
  alternatives:
  - what he says
  - speech
  - threat
  lexicon: LSJ
  rationale: λόγος here is governed by ἀπό after φοβηθῆτε and refers to what proceeds
    from the sinful man—his word or utterance. 'The word' keeps the singular concrete
    expression of the Greek while remaining natural English; broader paraphrases like
    'threat' are possible in context but too interpretive.
- source_word: ἀνδρὸς ἁμαρτωλοῦ
  chosen: of a sinful man
  alternatives:
  - of a sinner
  - of a sinful person
  lexicon: LSJ
  rationale: ἀνήρ is specifically masculine singular, so 'man' fits the gender-accurate
    policy better than a neutral term. ἁμαρτωλοῦ can be rendered adjectivally ('sinful')
    or substantivally ('sinner'); 'sinful man' preserves the Greek structure and tone.
- source_word: μὴ φοβηθῆτε
  chosen: do not fear
  alternatives:
  - do not be afraid of
  - do not be intimidated by
  lexicon: LSJ
  rationale: A straightforward imperative rendering best reflects the Greek. 'Be intimidated'
    is contextually plausible but narrows the sense beyond the source.
- source_word: δόξα
  chosen: glory
  alternatives:
  - honor
  - splendor
  - reputation
  lexicon: LSJ
  rationale: 'δόξα can denote honor, renown, or splendor. ''Glory'' preserves the
    elevated, ironic force: the sinner''s apparent glory is transient and corruptible.
    ''Reputation'' is possible but flattens the imagery.'
- source_word: εἰς κόπρια
  chosen: ends in dung
  alternatives:
  - is for dung
  - comes to dung
  - turns to manure
  lexicon: LSJ
  rationale: Literally 'into dung/manure.' In English, 'ends in dung' conveys the
    movement and outcome implied by εἰς in a natural way. 'Manure' is less blunt than
    the Greek's contemptuous force.
- source_word: καὶ εἰς σκώληκας
  chosen: and worms
  alternatives:
  - and maggots
  lexicon: LSJ
  rationale: σκώληξ commonly refers to worms and can include maggots in decay contexts.
    'Worms' is the broader and more traditional image, matching the verse's mortality-and-decay
    motif without over-specifying.
