translation:
  text: Today he will be exalted, and he will surely not be found, because he has
    returned to his dust, and his plans have perished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be exalted.' The Greek 'will be lifted up' may refer to being raised
      in status or prominence.
    reason: lexical_alternative
  - marker: b
    text: '''His thought'' can also be rendered ''his plan'' or ''his reasoning.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: σήμερον
  chosen: Today
  alternatives:
  - this day
  - now
  lexicon: LSJ
  rationale: Temporal adverb marking immediacy; 'Today' is the most natural modern
    English equivalent and preserves the proverb-like force.
- source_word: ἐπαρθήσεται
  chosen: will be lifted up
  alternatives:
  - will be exalted
  - will be raised up
  lexicon: LSJ
  rationale: Future passive of ἐπαίρω. In context of the proud rich person, it likely
    means being elevated/exalted in status. 'Lifted up' preserves the metaphor without
    over-interpreting it as purely honorific.
- source_word: οὐ μὴ εὑρεθῇ
  chosen: he will surely not be found
  alternatives:
  - he will certainly not be found
  - he will not be found at all
  lexicon: BDAG
  rationale: οὐ μή with aorist subjunctive gives emphatic negation. 'Surely not be
    found' captures the strong denial in readable English.
- source_word: ἐπέστρεψεν
  chosen: has returned
  alternatives:
  - returned
  - turned back
  lexicon: LSJ
  rationale: Aorist referring to the reason for disappearance in death. English present
    perfect works well after 'because' to express completed return with present relevance.
- source_word: εἰς τὸν χοῦν αὐτοῦ
  chosen: to his dust
  alternatives:
  - to the dust that is his
  - to the ground
  lexicon: LSJ
  rationale: χοῦς means dust/loose earth. 'To his dust' preserves the allusion to
    mortality and likely echoes creation-to-dust language better than the flatter
    'ground.'
- source_word: διαλογισμὸς
  chosen: thought
  alternatives:
  - plan
  - scheme
  - reasoning
  lexicon: BDAG
  rationale: The noun can denote thought, reasoning, or design. In this mortality
    saying, the sense is the person's thinking/plans ceasing at death. 'Thought' is
    concise and broad enough, though 'plan' is possible.
- source_word: ἀπώλετο
  chosen: has perished
  alternatives:
  - perished
  - was destroyed
  - came to nothing
  lexicon: LSJ
  rationale: Aorist middle/passive of ἀπόλλυμι. 'Has perished' preserves the stark
    finality and fits the present-perfect cadence established in the clause.
