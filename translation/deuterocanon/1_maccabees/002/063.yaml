theological_decisions:
- issue: Anthropological nuance of διαλογισμός at death
  chosen_reading: Rendered as 'thought' rather than a more specific theological term
    such as 'soul' or 'intentions.'
  alternative_readings:
  - plan
  - scheme
  - reasoning
  rationale: The Greek speaks of the person's deliberation/thought process ceasing,
    not of the annihilation of the person or soul. The translation avoids importing
    a doctrinal claim beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; never import
    doctrinal claims the text does not make.
