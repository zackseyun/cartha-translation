translation:
  text: Hananiah, Azariah, and Mishael, having believed, were saved from the flame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Ananias, Azarias, Misael.'' The translation uses the more familiar
      Hebrew-form names Hananiah, Azariah, and Mishael, referring to the three youths
      in Daniel 3.'
    reason: lexical_alternative
  - marker: b
    text: Or 'having believed, were saved' or 'were delivered from the flame.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀνανίας, Ἀζαρίας, Μισαήλ
  chosen: Hananiah, Azariah, and Mishael
  alternatives:
  - Ananias, Azarias, and Misael
  rationale: Personal names are transliterated rather than translated. The Hebrew-form
    familiar equivalents Hananiah, Azariah, and Mishael best identify the three Judean
    youths known from Daniel, while the alternatives reflect more direct Greek-form
    transliterations.
- source_word: πιστεύσαντες
  chosen: because they believed
  alternatives:
  - having believed
  - by faith
  - because they had faith
  lexicon: BDAG
  rationale: The aorist participle from πιστεύω denotes believing/trusting. 'Because
    they believed' brings out the participial relation to the main verb in natural
    English without overinterpreting it as a technical theological formula. 'By faith'
    is possible contextually but would import the noun πίστις, which is not the form
    present here.
- source_word: ἐσώθησαν
  chosen: were saved
  alternatives:
  - were delivered
  - were rescued
  lexicon: BDAG
  rationale: The passive of σῴζω commonly means 'were saved' or 'were delivered.'
    Here the concrete sense is rescue from mortal danger, but 'were saved' preserves
    the Greek verb more directly while still fitting the narrative context.
- source_word: ἐκ φλογός
  chosen: from the flame
  alternatives:
  - from fire
  - out of the flame
  - from the blaze
  lexicon: LSJ
  rationale: φλόξ means 'flame' or 'blaze.' The singular with ἐκ is naturally rendered
    'from the flame.' This keeps the vivid imagery of the Greek and echoes the Daniel
    narrative without adding words not in the text.
