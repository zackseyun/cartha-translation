theological_decisions:
- issue: Relation of πιστεύσαντες to ἐσώθησαν
  chosen_reading: 'The verse presents their believing as the circumstance or basis
    associated with their rescue: ''because they believed, were saved.'''
  alternative_readings:
  - '''having believed, were saved'''
  - '''by faith were saved'''
  rationale: The participle can be rendered in several idiomatic ways in English.
    'Because they believed' best communicates the connection in readable English while
    avoiding a more interpretive abstraction such as 'by faith.'
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 3; Contested terms: πίστις'
