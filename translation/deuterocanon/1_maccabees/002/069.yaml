translation:
  text: And he blessed them, and was gathered to his fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'was gathered to his fathers,' a traditional expression
      for death.
    reason: lexical_alternative
lexical_decisions:
- source_word: ηὐλόγησεν
  chosen: blessed
  alternatives:
  - spoke well of
  - pronounced a blessing on
  lexicon: LSJ
  rationale: The aorist of εὐλογέω in this context refers to Mattathias giving a blessing
    to those present. 'Blessed' is the natural and sufficiently formal English rendering.
- source_word: προσετέθη
  chosen: was added
  alternatives:
  - was gathered
  - joined
  lexicon: LSJ
  rationale: The passive of προστίθημι literally means 'was added.' In death formulas
    this can idiomatically overlap with 'was gathered,' but the Greek here is straightforwardly
    'was added,' and this preserves the source wording while remaining intelligible.
- source_word: πρὸς τοὺς πατέρας αὐτοῦ
  chosen: to his fathers
  alternatives:
  - to his ancestors
  - to his forefathers
  lexicon: LSJ
  rationale: This is a conventional death idiom meaning joining one's forefathers
    in death. 'To his fathers' keeps the idiom visible and mirrors the Greek closely;
    more interpretive alternatives are possible but less transparent to the source.
