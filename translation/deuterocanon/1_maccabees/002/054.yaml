translation:
  text: Phinehas our father, because he was zealous with zeal, received a covenant
    of holy priesthood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'when he showed zeal.' The Greek uses a cognate expression,
      literally 'in being zealous with zeal,' for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: Φινεὲς
  chosen: Phinehas
  lexicon: LSJ
  rationale: Proper name transliterated by standard English convention, following
    the project's policy to transliterate names rather than translate them.
- source_word: ὁ πατὴρ ἡμῶν
  chosen: our father
  alternatives:
  - our ancestor
  lexicon: LSJ
  rationale: Literally 'our father.' In this ancestral-honor context it refers to
    a forefather, but the formal familial term is retained to preserve the source
    wording and rhetorical force.
- source_word: ἐν τῷ ζηλῶσαι ζῆλον
  chosen: when he was zealous with zeal
  alternatives:
  - when he showed zeal
  - by being zealous
  - when he burned with zeal
  lexicon: LSJ
  rationale: The construction combines the infinitive of ζηλόω with the cognate noun
    ζῆλος/ζῆλον for emphatic intensity. 'Was zealous with zeal' preserves the Hebrew-like
    cognate emphasis better than a flattened 'showed zeal,' while remaining intelligible
    in English.
- source_word: ἔλαβε
  chosen: received
  alternatives:
  - obtained
  - took
  lexicon: LSJ
  rationale: A straightforward rendering of ἔλαβε. 'Received' best fits the sense
    of being granted a covenant by God rather than seizing it.
- source_word: διαθήκην
  chosen: a covenant
  alternatives:
  - an agreement
  - a pact
  lexicon: LSJ
  rationale: '''Covenant'' is the standard biblical rendering and preserves the theological
    and intertextual connection to the Phinehas tradition.'
- source_word: ἱερωσύνης
  chosen: priesthood
  alternatives:
  - priestly office
  lexicon: LSJ
  rationale: The noun denotes priesthood or priestly office. 'Priesthood' is the most
    natural and biblically recognizable English equivalent.
- source_word: ἁγίας
  chosen: holy
  alternatives:
  - sacred
  lexicon: LSJ
  rationale: ἁγίας modifies ἱερωσύνης. 'Holy priesthood' is more transparent and scripturally
    resonant than 'sacred priesthood.'
