theological_decisions:
- issue: How to render the emphatic zeal expression in relation to Phinehas's covenant
  chosen_reading: Retain the cognate emphasis with 'when he was zealous with zeal'
    rather than smoothing it away.
  alternative_readings:
  - when he showed zeal
  - when he burned with zeal
  rationale: The verse alludes to the well-known scriptural tradition of Phinehas
    receiving a covenant because of his zeal. Preserving the emphatic wording keeps
    the intertextual and theological force without adding interpretive detail not
    explicit in the Greek.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
