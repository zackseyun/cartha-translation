translation:
  text: Joshua, in fulfilling the word, became a judge in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he fulfilled the word' or 'by fulfilling the word.' The Greek construction
      can be read as temporal or instrumental.
    reason: lexical_alternative
  - marker: b
    text: '''The word'' could also be understood as ''the command,'' ''the promise,''
      or ''the matter,'' depending on how one construes the allusion to Joshua''s
      faithfulness.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰησοῦς
  chosen: Joshua
  alternatives:
  - Jesus
  lexicon: LSJ
  rationale: In this historical summary of Israel's faithful figures, the referent
    is Joshua son of Nun, not Jesus of Nazareth. Standard English convention transliterates
    the Hebrew name here as 'Joshua' to avoid confusion and to match the Old Testament
    figure intended.
- source_word: ἐν τῷ πληρῶσαι
  chosen: in fulfilling
  alternatives:
  - when he fulfilled
  - by fulfilling
  lexicon: LSJ
  rationale: The articular infinitive with ἐν can express circumstance or means. 'In
    fulfilling' preserves the Greek structure while remaining natural English; it
    leaves slightly open whether the nuance is temporal or instrumental.
- source_word: λόγον
  chosen: the word
  alternatives:
  - the matter
  - the command
  - the promise
  lexicon: LSJ
  rationale: λόγος is broad, but 'the word' best preserves the Greek's compactness
    and likely alludes to a spoken divine directive or declaration in the Joshua narrative.
    More specific options such as 'command' or 'promise' interpret beyond what the
    text explicitly states.
- source_word: ἐγένετο
  chosen: became
  alternatives:
  - was made
  - came to be
  lexicon: LSJ
  rationale: ἐγένετο commonly means 'became' or 'came to be.' 'Became' is idiomatic
    and fits the sense of Joshua's rise to the role named next.
- source_word: κριτὴς
  chosen: a judge
  alternatives:
  - judge
  - leader
  lexicon: LSJ
  rationale: κριτής straightforwardly means 'judge.' Although the role in Israel could
    include leadership beyond judicial activity, 'a judge' is the direct lexical equivalent
    and preserves the biblical-historical category.
- source_word: ἐν Ἰσραήλ
  chosen: in Israel
  alternatives:
  - over Israel
  - among Israel
  lexicon: LSJ
  rationale: The preposition ἐν is most directly rendered 'in.' 'Over Israel' would
    make the leadership nuance more explicit than the Greek requires.
