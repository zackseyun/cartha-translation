theological_decisions:
- issue: Nature of 'the word' fulfilled by Joshua
  chosen_reading: Rendered generically as 'the word' without specifying whether it
    is a divine command, promise, or matter.
  alternative_readings:
  - the command
  - the promise
  - the matter
  rationale: The Greek λόγον does not itself force a narrower theological interpretation.
    Preserving the broader term avoids importing a specific doctrinal or narrative
    construal not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
