translation:
  text: saying, “Let us all die in our innocence; heaven and earth testify for us
    that you are destroying us unjustly.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in our simplicity” or “in our sincerity”; the Greek can denote simplicity
      or singleness, but here likely means blameless innocence.
    reason: lexical_alternative
  - marker: b
    text: Literally “without judgment” or “without trial,” expressing that they are
      being killed without proper examination or justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - saying that
  - they said
  lexicon: LSJ
  rationale: A participial introduction to the quoted speech; 'saying' preserves the
    Greek structure naturally in English.
- source_word: Ἀποθάνωμεν
  chosen: Let us ... die
  alternatives:
  - May we die
  - We will die
  lexicon: LSJ
  rationale: First person plural aorist subjunctive used hortatorily. 'Let us die'
    best captures the volitional force in context.
- source_word: οἱ πάντες
  chosen: all
  alternatives:
  - we all
  - all of us
  lexicon: LSJ
  rationale: Emphatic inclusiveness of the group. Rendered compactly as 'all' within
    the clause.
- source_word: ἐν τῇ ἁπλότητι ἡμῶν
  chosen: in our innocence
  alternatives:
  - in our simplicity
  - in our sincerity
  - in our uprightness
  lexicon: LSJ
  rationale: Although ἁπλότης can denote simplicity or singleness, in this martyrdom
    context the sense is moral blamelessness/non-aggression rather than naivete. 'In
    our innocence' communicates that they are dying without wrongdoing or duplicity.
- source_word: μαρτυρεῖ ἐφʼ ἡμᾶς
  chosen: testify for us
  alternatives:
  - bear witness for us
  - testify concerning us
  lexicon: LSJ
  rationale: The singular verb with compound subject is idiomatic. ἐφʼ ἡμᾶς here is
    best taken in a favorable/judicial sense, 'for us' or 'on our behalf,' since heaven
    and earth are invoked as witnesses to their unjust treatment.
- source_word: ὁ οὐρανὸς καὶ ἡ γῆ
  chosen: heaven and earth
  alternatives:
  - the heaven and the earth
  lexicon: LSJ
  rationale: Standard biblical witness formula; idiomatic English omits the articles.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: LSJ
  rationale: Introduces the content of the testimony rather than a causal clause.
- source_word: ἀκρίτως
  chosen: unjustly
  alternatives:
  - without trial
  - without due process
  - without cause
  - arbitrarily
  lexicon: LSJ
  rationale: The adverb literally suggests action without judgment or proper examination.
    In context, 'unjustly' gives the broader legal-moral force in readable English;
    the more specific procedural nuance is preserved in a footnote.
- source_word: ἀπόλλυτε
  chosen: are destroying
  alternatives:
  - are killing
  - are wiping out
  - are putting to death
  lexicon: LSJ
  rationale: Present tense direct address to the attackers. 'Are destroying us' preserves
    the broader verb while fitting the immediate lethal context.
