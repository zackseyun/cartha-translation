theological_decisions:
- issue: Meaning of ἁπλότης in a martyrdom context
  chosen_reading: moral innocence/blamelessness
  alternative_readings:
  - simplicity
  - sincerity
  - single-heartedness
  rationale: The speakers are not merely claiming simplicity of lifestyle but appealing
    to their non-culpability as they face death. This preserves the ethical force
    of the appeal without overstating a technical doctrine.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of ἀκρίτως
  chosen_reading: unjustly
  alternative_readings:
  - without trial
  - without judgment
  - arbitrarily
  rationale: The Greek carries both procedural and moral force. The main text uses
    accessible modern English, while a footnote preserves the more literal legal nuance.
  doctrine_reference: Translation philosophy §6; transparency principle on preserving
    alternatives in footnotes
