- issue: Metaphorical force of 'horn' in the final clause
  chosen_reading: Preserve the literal image 'did not give the sinner a horn' in the
    main text
  alternative_readings:
  - did not give the sinner strength
  - did not allow the sinner to gain power
  rationale: The Greek uses the established biblical metaphor of the horn for power
    or exaltation. Preserving the image maintains intertextual texture and avoids
    over-resolving the metaphor, while the functional sense is preserved in a footnote
    for clarity.
