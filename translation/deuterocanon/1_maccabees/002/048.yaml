translation:
  text: And they rescued the law from the hand of the nations and from the hand of
    the kings, and they did not give a horn to the sinner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they did not give the sinner strength' or 'they did not allow the sinner
      to gain power.' The 'horn' is a biblical image for power or exaltation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντελάβοντο
  chosen: rescued
  alternatives:
  - took hold of
  - helped
  - defended
  lexicon: LSJ
  rationale: The middle of ἀντιλαμβάνομαι can mean to take hold of in support, help,
    or rescue. In context, with the law as object and hostile powers as the source
    from whose hand it is taken, 'rescued' best conveys active deliverance rather
    than mere assistance.
- source_word: τοῦ νόμου
  chosen: the law
  alternatives:
  - the Law
  lexicon: LSJ
  rationale: νόμος here refers to the Jewish law/Torah in the Maccabean context. Lowercase
    'law' keeps readable modern English while still allowing the historical-religious
    sense; capitalization is an English interpretive convention, not marked in the
    Greek.
- source_word: ἐκ χειρὸς
  chosen: from the hand of
  alternatives:
  - out of the power of
  - from the power of
  lexicon: LSJ
  rationale: The idiom 'from the hand of' is transparent English and preserves the
    concrete metaphor of control or possession present in the Greek.
- source_word: τῶν ἐθνῶν
  chosen: the nations
  alternatives:
  - the Gentiles
  - the pagans
  lexicon: LSJ
  rationale: ἐθνῶν literally means 'nations.' In this Jewish context it refers to
    non-Jewish peoples, but 'the nations' preserves the source wording without importing
    a more interpretive label.
- source_word: τῶν βασιλέων
  chosen: the kings
  alternatives:
  - the rulers
  lexicon: LSJ
  rationale: βασιλέων straightforwardly means 'kings'; no contextual pressure requires
    a broader political term.
- source_word: οὐκ ἔδωκαν κέρας
  chosen: did not give ... a horn
  alternatives:
  - did not give ... strength
  - did not let ... be exalted
  - did not give ... power
  lexicon: LSJ
  rationale: κέρας literally means 'horn' and often functions metaphorically for strength,
    power, or exaltation. Because the idiom is vivid and biblically resonant, the
    main text preserves the literal image, while an explanatory alternative is worth
    noting in a footnote.
- source_word: τῷ ἁμαρτωλῷ
  chosen: the sinner
  alternatives:
  - the sinful one
  - the wicked man
  lexicon: LSJ
  rationale: ἁμαρτωλῷ is singular, 'the sinner.' 'The wicked man' is possible contextually,
    but 'the sinner' is the more direct lexical rendering.
