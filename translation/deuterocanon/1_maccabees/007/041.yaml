translation:
  text: When those from the king were speaking abusively, your angel went out and
    struck down one hundred eighty-five thousand among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were blaspheming.' The Greek verb can mean speaking abusively, reviling,
      or speaking impiously; the broader wording is kept in the main text.
    reason: lexical_alternative
  - marker: b
    text: This alludes to the destruction of the Assyrian army in the days of Hezekiah;
      compare 2 Kings 19:35 and Isaiah 37:36.
    reason: cross_reference
lexical_decisions:
- source_word: Οἱ παρὰ τοῦ βασιλέως
  chosen: those from the king
  alternatives:
  - those sent by the king
  - the king's men
  - those on the king's side
  lexicon: LSJ
  rationale: The phrase literally denotes people 'from' or 'on behalf of' the king.
    'Those from the king' stays close to the Greek while remaining intelligible in
    English; the context implies royal agents or forces without over-specifying beyond
    the text.
- source_word: ἐδυσφήμουν
  chosen: were speaking abusively
  alternatives:
  - were blaspheming
  - were reviling
  - were slandering
  lexicon: LSJ
  rationale: The verb means to speak ill of, revile, or use abusive speech. In this
    prayer's allusion to hostile speech against God, 'were speaking abusively' preserves
    the verbal insult without importing the more technical theological term 'blaspheming'
    unless the context demands it. The object is implicit from the prayer context.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - came out
  - went forth
  lexicon: LSJ
  rationale: A straightforward past tense rendering of the aorist. 'Went out' is natural
    modern English and preserves the movement imagery.
- source_word: ἄγγελός σου
  chosen: your angel
  alternatives:
  - your messenger
  lexicon: LSJ
  rationale: In this historical allusion to divine intervention, 'angel' is the most
    natural rendering and matches the likely heavenly referent. 'Messenger' is lexically
    possible but would understate the supernatural sense in context.
- source_word: ἐπάταξεν
  chosen: struck down
  alternatives:
  - struck
  - smote
  - killed
  lexicon: LSJ
  rationale: The verb commonly means to strike or smite; in this context of mass death,
    'struck down' communicates both the action and its lethal result without archaic
    diction.
- source_word: ἐν αὐτοῖς
  chosen: among them
  alternatives:
  - in them
  lexicon: LSJ
  rationale: The idiomatic sense here is distributive or collective within the group
    affected. 'Among them' is the natural English equivalent.
- source_word: ἑκατὸν ὀγδοήκοντα πέντε χιλιάδας
  chosen: one hundred eighty-five thousand
  alternatives:
  - 185,000
  lexicon: LSJ
  rationale: This is the explicit numeral in the Greek. Spelling it out suits running
    biblical prose.
