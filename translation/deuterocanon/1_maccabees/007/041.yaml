theological_decisions:
- issue: Whether δυσφημέω here should be rendered with explicitly theological language
  chosen_reading: were speaking abusively
  alternative_readings:
  - were blaspheming
  rationale: The verse recalls the destruction of the Assyrian force in response to
    arrogant speech against God, but the Greek verb itself denotes abusive or reviling
    speech more broadly. The chosen rendering preserves the lexical sense while allowing
    the theological implication to arise from context rather than from a more interpretive
    gloss.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referent of 'your angel'
  chosen_reading: your angel
  alternative_readings:
  - your messenger
  rationale: Although ἄγγελος can mean either 'angel' or 'messenger,' the historical
    allusion is to divine judgment executed by a heavenly agent. Rendering it 'angel'
    best reflects the context without unnecessary demythologizing.
  doctrine_reference: Translation philosophy §§1, 6
