lexical_decisions:
- source_word: ἔστησαν
  chosen: they established
  alternatives:
  - they decreed
  - they set
  - they ordained
  lexicon: LSJ
  rationale: Aorist of ἵστημι in this construction carries the sense of setting or
    establishing an observance. 'Established' is natural English and preserves the
    formal sense of instituting a practice.
- source_word: τοῦ ἄγειν
  chosen: should be observed
  alternatives:
  - to celebrate
  - to keep
  - to hold
  lexicon: LSJ
  rationale: 'The articular infinitive with τοῦ expresses the content/purpose of what
    was established: the day was to be kept as an annual observance. ''Observed''
    is broader and slightly more formal than ''celebrated,'' which could overstate
    festivity; it fits commemorative keeping of a date.'
- source_word: κατʼ ἐνιαυτόν
  chosen: year by year
  alternatives:
  - annually
  - every year
  lexicon: LSJ
  rationale: The idiom means on a yearly basis. 'Year by year' closely reflects the
    Greek while remaining idiomatic.
- source_word: τὴν ἡμέραν ταύτην
  chosen: this day
  alternatives:
  - that day
  - this date
  lexicon: LSJ
  rationale: The demonstrative is proximal in Greek, so 'this day' is the most direct
    rendering.
- source_word: τῇ τρισκαιδεκάτῃ
  chosen: on the thirteenth day
  alternatives:
  - on the thirteenth
  - the thirteenth day
  lexicon: LSJ
  rationale: The dative marks the date at which the observance occurs. Supplying 'day'
    makes the English explicit and natural.
- source_word: τοῦ Ἀδάρ
  chosen: of Adar
  lexicon: LSJ
  rationale: Ἀδάρ is a month name and should be transliterated rather than translated,
    per project philosophy for names.
