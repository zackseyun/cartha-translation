translation:
  text: And Nicanor went out from Jerusalem and camped at Beth-horon, and a force
    of Syria met him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a Syrian force met him' or 'the army of Syria met him.' The Greek δύναμις
      can denote a military force or army.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - departed
  - marched out
  lexicon: LSJ
  rationale: The aorist of ἐξέρχομαι straightforwardly denotes movement out from a
    place. 'Went out' is the most direct rendering; 'marched out' would add military
    color not explicit in the verb itself.
- source_word: παρενέβαλεν
  chosen: camped
  alternatives:
  - encamped
  - made camp
  lexicon: LSJ
  rationale: In military context παρεμβάλλω commonly means to encamp. 'Camped' gives
    clear modern English while preserving the military sense; 'encamped' is slightly
    more formal but not necessary.
- source_word: Βεθωρών
  chosen: Beth-horon
  alternatives:
  - Beth Horon
  rationale: This is a place name and is transliterated rather than translated, following
    project policy for names. The hyphenated conventional English form helps readers
    recognize the known location.
- source_word: συνήντησεν αὐτῷ
  chosen: met him
  alternatives:
  - joined him
  - came to meet him
  lexicon: LSJ
  rationale: συναντάω means to meet or encounter. With αὐτῷ, the sense is that the
    Syrian force came into contact with Nicanor. 'Met him' is the most natural and
    semantically broad; 'joined him' would over-specify friendly reinforcement, which
    is likely in context but not encoded by the verb alone.
- source_word: δύναμις Συρίας
  chosen: a force from Syria
  alternatives:
  - the army of Syria
  - a Syrian force
  lexicon: LSJ
  rationale: δύναμις in military narrative often denotes a force or army. Because
    the noun is anarthrous here, 'a force' fits well. 'From Syria' renders the genitive
    plainly without overcommitting to a formal political label; 'Syrian force' is
    also possible but slightly more adjectival than the Greek.
