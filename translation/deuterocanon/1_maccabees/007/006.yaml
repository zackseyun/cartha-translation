theological_decisions:
- issue: Rendering the singular verb Ἀπώλεσεν / ἐσκόρπισεν with the compound subject
    'Judas and his brothers'
  chosen_reading: 'Use idiomatic English plural verbs: ''have destroyed ... and have
    scattered'''
  alternative_readings:
  - Retain a more formally singular structure such as 'Judas has destroyed ... and
    his brothers [with him]'
  rationale: The Greek accusation foregrounds Judas as leader, but the explicit compound
    subject in the quotation is best represented in natural English with plural verbs.
    This is a grammatical, not doctrinal, decision, but it materially affects how
    agency is heard in translation.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic'
