translation:
  text: And they accused the people before the king, saying, “Judas and his brothers
    have destroyed all your friends, and have scattered us from our land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your allies'; in royal contexts 'friends' can refer to the king's political
      supporters or court associates.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατηγόρησαν
  chosen: accused
  alternatives:
  - brought charges against
  - denounced
  lexicon: BDAG
  rationale: The verb means to accuse or bring charges. 'Accused' is concise, natural
    English and fits the hostile report made to the king.
- source_word: τοῦ λαοῦ
  chosen: the people
  alternatives:
  - the nation
  - the populace
  lexicon: BDAG
  rationale: The genitive after κατηγόρησαν indicates the object of accusation. 'The
    people' is the most direct rendering of τοῦ λαοῦ here, without importing a more
    technical national sense than the Greek requires.
- source_word: πρὸς τὸν βασιλέα
  chosen: before the king
  alternatives:
  - to the king
  - against the king
  lexicon: BDAG
  rationale: With verbs of speaking or accusation, πρός can indicate direction toward
    a person. 'Before the king' captures the formal setting of accusation better than
    simple 'to the king'.
- source_word: Ἀπώλεσεν
  chosen: have destroyed
  alternatives:
  - destroyed
  - have wiped out
  - killed
  lexicon: BDAG
  rationale: Although the Greek form is singular ('destroyed'), the quoted accusation
    has Judas as the lead subject followed by 'and his brothers'; idiomatic English
    uses a plural verb for the compound subject. 'Have destroyed' conveys ἀπόλλυμι
    here as ruin/elimination of persons rather than mere loss.
- source_word: οἱ φίλοι σου
  chosen: your friends
  alternatives:
  - your supporters
  - your allies
  lexicon: BDAG
  rationale: In Hellenistic royal contexts φίλοι can function as a court title for
    royal associates, but the plain sense 'friends' is transparent and defensible
    from the Greek alone. The political nuance is real but not necessary to encode
    in the main text.
- source_word: ἐσκόρπισεν
  chosen: have scattered
  alternatives:
  - scattered
  - driven away
  - dispersed
  lexicon: BDAG
  rationale: The verb means to scatter or disperse. 'Have scattered' preserves the
    metaphor and the force of displacement without overinterpreting the mechanism.
- source_word: ἀπὸ τῆς γῆς ἡμῶν
  chosen: from our land
  alternatives:
  - out of our land
  - from our country
  lexicon: BDAG
  rationale: γῆ can mean land, territory, or country. 'Our land' is the most natural
    and sufficiently broad rendering in this political-military context.
