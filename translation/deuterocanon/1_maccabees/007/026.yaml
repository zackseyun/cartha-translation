translation:
  text: And the king sent Nikanor, one of his honored rulers, who hated and was hostile
    to Israel, and commanded him to destroy the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of his illustrious officials.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to root out' or 'to destroy the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard narrative verb for sending; 'sent' is natural modern English
    and sufficiently formal.
- source_word: ὁ Βασιλεὺς
  chosen: the king
  alternatives:
  - the King
  lexicon: LSJ
  rationale: Article plus title refers to the reigning monarch in context, not a divine
    title; lowercase 'king' fits English usage.
- source_word: Νικάνορα
  chosen: Nikanor
  alternatives:
  - Nicanor
  rationale: Personal names are transliterated. 'Nikanor' more directly reflects the
    Greek kappa than the traditional Latinized 'Nicanor'.
- source_word: ἕνα τῶν ἀρχόντων αὐτοῦ τῶν ἐνδόξων
  chosen: one of his honored rulers
  alternatives:
  - one of his illustrious officials
  - one of his distinguished princes
  lexicon: LSJ
  rationale: ἄρχων denotes a ruler/official; ἔνδοξος means honored, distinguished,
    illustrious. 'Honored rulers' preserves status without sounding archaic.
- source_word: μισοῦντα
  chosen: who hated
  alternatives:
  - hating
  lexicon: LSJ
  rationale: Participle describing Nikanor's disposition toward Israel. Relative clause
    reads more naturally in English than a bare participle.
- source_word: ἐχθραίνοντα
  chosen: was hostile to
  alternatives:
  - made himself an enemy to
  - acted as an enemy toward
  lexicon: LSJ
  rationale: The participle intensifies the previous hostility. 'Was hostile to' avoids
    awkward repetition of 'enemy' while preserving active enmity.
- source_word: τῷ Ἰσραήλ
  chosen: Israel
  rationale: Dative object after the hostility verbs; straightforward proper-name
    rendering.
- source_word: ἐνετείλατο
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: LSJ
  rationale: A strong verb of giving orders; 'commanded' best matches the force.
- source_word: ἐξᾶραι
  chosen: to wipe out
  alternatives:
  - to remove
  - to destroy
  - to root out
  lexicon: LSJ
  rationale: In this military-political context, the infinitive carries the sense
    of eliminating the people, not merely relocating them. 'Wipe out' communicates
    the severity clearly in modern English.
- source_word: τὸν λαόν
  chosen: the people
  alternatives:
  - the nation
  lexicon: LSJ
  rationale: Refers to the Jewish people collectively. 'The people' is the direct
    and idiomatic rendering.
