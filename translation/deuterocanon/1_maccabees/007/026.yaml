theological_decisions:
- issue: Severity of ἐξᾶραι τὸν λαόν
  chosen_reading: rendered as 'wipe out the people'
  alternative_readings:
  - remove the people
  - destroy the people
  - root out the people
  rationale: The context is hostile royal action against Israel, and the verb here
    is stronger than simple removal. The chosen rendering preserves the threat's destructive
    force without overinterpreting beyond the Greek.
