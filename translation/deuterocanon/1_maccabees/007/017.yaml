translation:
  text: They poured out the flesh of your holy ones and their blood around Jerusalem,
    and there was no one to bury them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'saints' or 'faithful ones' for 'holy ones.'
    reason: lexical_alternative
  - marker: b
    text: This line closely echoes Psalm 79:2–3 (LXX 78:2–3).
    reason: cross_reference
  - marker: c
    text: Or 'they shed' instead of 'they poured out'; the Greek verb is literally
      'poured out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σάρκας
  chosen: the flesh
  alternatives:
  - bodies
  - flesh
  lexicon: LSJ
  rationale: The plural accusative literally denotes 'fleshes/flesh' in the concrete
    sense. English idiom prefers singular collective 'the flesh' after 'poured out,'
    while preserving the graphic bodily imagery of the Greek rather than softening
    to 'bodies' in the main text.
- source_word: ὁσίων
  chosen: holy ones
  alternatives:
  - saints
  - faithful ones
  - devout ones
  lexicon: LSJ
  rationale: The term denotes those who are holy/devout. 'Holy ones' is transparent
    and avoids importing later ecclesiastical overtones that 'saints' may carry, while
    still reflecting covenantal consecration.
- source_word: ἐξέχεαν
  chosen: they poured out
  alternatives:
  - they shed
  - they spilled
  lexicon: LSJ
  rationale: The verb literally means 'poured out.' This preserves the verbal link
    to the Psalmic source language and the vividness of the Greek. 'Shed' is idiomatic
    for blood but less suitable for the paired object 'flesh ... and blood.'
- source_word: κύκλῳ Ἱερουσαλήμ
  chosen: around Jerusalem
  alternatives:
  - all around Jerusalem
  - surrounding Jerusalem
  lexicon: LSJ
  rationale: κύκλῳ with a place name means 'around' or 'all around.' 'Around Jerusalem'
    is natural English and sufficiently reflects the spatial sense.
- source_word: οὐκ ἦν αὐτοῖς ὁ θάπτων
  chosen: there was no one to bury them
  alternatives:
  - they had no one to bury them
  - there was none burying them
  lexicon: LSJ
  rationale: The construction literally states that there was not for them 'the one
    burying.' The chosen rendering conveys the idiomatic sense in clear modern English
    while preserving the pathos of denied burial.
