translation:
  text: And he went out into all the borders of Judea and the surrounding region,
    and he took vengeance on the men and on those who had deserted, and they were
    prevented from going into the country.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the surrounding areas.' The Greek adverb κυκλόθεν broadens the scope
      beyond Judea's borders proper.
    reason: lexical_alternative
  - marker: b
    text: Or 'those who had defected' or 'the deserters.' The Greek refers to people
      who had gone over to the other side.
    reason: lexical_alternative
  - marker: c
    text: Or 'from entering the region/land.' The Greek χώρα can mean 'country,' 'land,'
      or 'region.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - went forth
  - set out
  lexicon: BDAG
  rationale: A straightforward narrative aorist of ἐξέρχομαι. 'Went out' is natural
    modern English and preserves the movement sense without archaic tone.
- source_word: ὅρια
  chosen: borders
  alternatives:
  - territories
  - districts
  - regions
  lexicon: BDAG
  rationale: ὅρια can denote borders or territories. Here, with πάντα and τῆς Ἰουδαίας,
    'all the borders of Judea' preserves the geographic sweep of the Greek while remaining
    intelligible. 'Territories' is possible but less concrete.
- source_word: κυκλόθεν
  chosen: the surrounding region
  alternatives:
  - round about
  - all around
  - the surrounding areas
  lexicon: LSJ
  rationale: The adverb means 'from around' or 'round about.' Because English does
    not naturally say 'into all the borders of Judea and round about,' the phrase
    is smoothed to 'and the surrounding region' to convey the same geographic extension.
- source_word: ἐποίησεν ἐκδίκησιν
  chosen: took vengeance
  alternatives:
  - executed vengeance
  - carried out punishment
  - took revenge
  lexicon: BDAG
  rationale: This idiom literally means 'did vengeance.' 'Took vengeance' is idiomatic
    English that preserves the punitive force. 'Took revenge' can sound more personal
    and less judicial; 'executed vengeance' is stiffer.
- source_word: ἐν τοῖς ἀνδράσιν
  chosen: on the men
  alternatives:
  - among the men
  - against the men
  lexicon: BDAG
  rationale: With ἐκδίκησιν, the preposition ἐν here is best represented by an English
    object of hostile action. 'On the men' captures the sense of vengeance directed
    toward persons. The phrase likely refers to hostile men in context, but the Greek
    itself simply says 'the men,' so the translation stays close.
- source_word: τοῖς αὐτομολήσασιν
  chosen: those who had deserted
  alternatives:
  - the deserters
  - those who had defected
  - those who had gone over
  lexicon: BDAG
  rationale: The participle from αὐτομολέω denotes desertion or defection to the other
    side. 'Those who had deserted' is clear and preserves the completed action implied
    by the aorist participle.
- source_word: ἐνεστάλησαν
  chosen: were prevented
  alternatives:
  - were checked
  - were restrained
  - were stopped
  lexicon: BDAG
  rationale: The passive indicates that certain people were hindered or held back.
    'Were prevented' best fits the infinitive construction τοῦ πορεύεσθαι and communicates
    effective obstruction.
- source_word: τοῦ πορεύεσθαι εἰς χώραν
  chosen: from going into the country
  alternatives:
  - from traveling through the land
  - from entering the region
  - from going into the territory
  lexicon: BDAG
  rationale: The articular infinitive with τοῦ expresses what they were prevented
    from doing. χώρα can mean land, region, or country. 'Into the country' is a natural
    rendering here, though 'region' is also possible; the phrase likely refers to
    movement into the land generally rather than a specific city.
