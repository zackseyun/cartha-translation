translation:
  text: And all those who were troubling their people gathered to him, and they gained
    control of the land of Judah, and they inflicted a great blow in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among Israel.' The Greek phrase ἐν Ἰσραήλ can denote the blow's occurrence
      within the people of Israel rather than a geographic reference alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν πρὸς αὐτόν
  chosen: gathered to him
  alternatives:
  - were gathered to him
  - joined him
  lexicon: LSJ
  rationale: The passive form with πρός + accusative naturally conveys movement into
    association with him. 'Gathered to him' is idiomatic English and preserves the
    collective alignment without overinterpreting as formal enlistment.
- source_word: πάντες οἱ ταράσσοντες
  chosen: all those who were troubling
  alternatives:
  - all who were disturbing
  - all the troublemakers
  lexicon: LSJ
  rationale: The participle from ταράσσω denotes causing turmoil or disturbance. 'Those
    who were troubling' keeps the verbal force and avoids the more interpretive nominal
    label 'troublemakers.'
- source_word: τὸν λαὸν αὐτῶν
  chosen: their people
  alternatives:
  - the people
  - their nation
  lexicon: LSJ
  rationale: The possessive αὐτῶν is present in the Greek and should be represented.
    'People' is the most natural rendering of λαός here; 'nation' would overstate
    political nuance.
- source_word: κατεκράτησαν
  chosen: gained control of
  alternatives:
  - seized
  - prevailed over
  - took possession of
  lexicon: LSJ
  rationale: κρατέω with κατά can mean to gain mastery over or seize control. With
    γῆν Ἰούδα as object, 'gained control of' best captures effective domination of
    territory without implying permanent legal possession.
- source_word: γῆν Ἰούδα
  chosen: the land of Judah
  alternatives:
  - Judah
  - the territory of Judah
  lexicon: LSJ
  rationale: γῆ can mean land or territory. Rendering it explicitly as 'the land of
    Judah' preserves the concrete territorial sense present in the Greek.
- source_word: ἐποίησαν πληγὴν μεγάλην
  chosen: they inflicted a great blow
  alternatives:
  - they caused great devastation
  - they made a great slaughter
  - they dealt a great plague
  lexicon: LSJ
  rationale: The idiom literally 'made a great blow' is not natural in English. πληγή
    can denote a blow, stroke, or calamity. 'Inflicted a great blow' preserves the
    metaphor of striking while remaining readable and not overnarrowing it to slaughter
    alone.
- source_word: ἐν Ἰσραήλ
  chosen: in Israel
  alternatives:
  - against Israel
  - among Israel
  lexicon: LSJ
  rationale: The preposition ἐν most straightforwardly means 'in' or 'among.' 'In
    Israel' is the least interpretive; the phrase likely denotes the sphere within
    the covenant people rather than the northern kingdom specifically.
