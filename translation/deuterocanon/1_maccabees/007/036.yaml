translation:
  text: “I will burn this house.” And he went out in anger. Then the priests entered
    and stood before the altar and the sanctuary, and they wept and said,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this temple.' The Greek literally says 'this house,' a common way to
      refer to the temple.
    reason: lexical_alternative
  - marker: b
    text: The verse ends with 'and said,' introducing the prayer or speech that continues
      in the next verse.
    reason: cross_reference
lexical_decisions:
- source_word: ἐμπυριῶ
  chosen: I will burn
  alternatives:
  - I will set on fire
  - I will burn down
  lexicon: LSJ
  rationale: Future verb from ἐμπυρίζω, expressing a threat to burn by fire. 'I will
    burn' is direct and natural; 'burn down' slightly overstates the result, while
    'set on fire' is possible but less concise.
- source_word: τὸν οἶκον τοῦτον
  chosen: this house
  alternatives:
  - this temple
  - this building
  lexicon: LSJ
  rationale: Literally 'this house.' In temple context it refers to the temple precinct/building,
    but the Greek says 'house,' and preserving that wording keeps the threat's biblical
    resonance. The surrounding mention of altar and sanctuary clarifies the referent.
- source_word: μετὰ θυμοῦ
  chosen: in anger
  alternatives:
  - with wrath
  - angrily
  lexicon: BDAG
  rationale: The phrase denotes an angry emotional state. 'In anger' is idiomatic
    modern English and preserves the narrative tone without sounding archaic like
    'with wrath.'
- source_word: οἱ ἱερεῖς
  chosen: the priests
  lexicon: LSJ
  rationale: Standard rendering for the temple priests; no contextual reason to vary.
- source_word: ἔστησαν κατὰ πρόσωπον
  chosen: stood before
  alternatives:
  - stood facing
  - took their stand before
  lexicon: LSJ
  rationale: The idiom means to stand before/in the presence of. 'Stood before' is
    the clearest natural English equivalent.
- source_word: τοῦ θυσιαστηρίου
  chosen: the altar
  lexicon: LSJ
  rationale: Standard cultic term for altar.
- source_word: τοῦ ναοῦ
  chosen: the sanctuary
  alternatives:
  - the temple
  - the shrine
  lexicon: LSJ
  rationale: ναός commonly denotes the sanctuary/temple proper rather than the broader
    complex. Since οἶκος earlier already rendered 'house,' using 'sanctuary' here
    preserves the distinction between terms.
- source_word: ἔκλαυσαν
  chosen: they wept
  alternatives:
  - they cried
  - they lamented
  lexicon: BDAG
  rationale: Simple narrative verb for weeping. 'Wept' is faithful and suitably solemn.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Standard narrative introduction to direct speech; the verse ends with
    the speech to follow in the next verse, so 'said,' with trailing comma, preserves
    the continuation.
