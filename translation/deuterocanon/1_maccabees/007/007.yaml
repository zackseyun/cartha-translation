translation:
  text: Now then, send a man whom you trust, and let him go and see all the destruction
    that he has done to us and to the king’s land, and let him punish them and all
    who are helping them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπόστειλον
  chosen: send
  alternatives:
  - dispatch
  lexicon: LSJ
  rationale: A straightforward imperative; 'send' is natural modern English and preserves
    the command force without sounding overly formal.
- source_word: ἄνδρα ᾧ πιστεύεις
  chosen: a man whom you trust
  alternatives:
  - a man in whom you have confidence
  - a trustworthy man
  lexicon: LSJ
  rationale: The relative clause explicitly states the king's trust in the man, not
    merely the man's general trustworthiness. 'Whom you trust' preserves the syntax
    and sense.
- source_word: πορευθεὶς ἰδέτω
  chosen: let him go and see
  alternatives:
  - having gone, let him see
  - let him go and inspect
  lexicon: LSJ
  rationale: The participle plus imperative sequence is idiomatically rendered in
    English as coordinated action. 'Go and see' is clear and sufficiently formal;
    'inspect' would add a nuance not explicit in the Greek.
- source_word: τὴν ἐξολέθρευσιν ἅπασαν
  chosen: all the destruction
  alternatives:
  - the whole devastation
  - the complete ruin
  lexicon: LSJ
  rationale: ἐξολέθρευσις denotes destruction/devastation. The adjective ἅπασαν intensifies
    totality; 'all the destruction' preserves that comprehensively without overinterpreting
    the exact kind of ruin.
- source_word: ἣν ἐποίησεν
  chosen: that he has done
  alternatives:
  - which he did
  - that he caused
  lexicon: LSJ
  rationale: English naturally expresses the completed harmful action as 'has done.'
    'Caused' is possible but less directly tied to the Greek verb ποιέω.
- source_word: τῇ χώρᾳ τοῦ βασιλέως
  chosen: the king’s land
  alternatives:
  - the king's country
  - the royal territory
  lexicon: LSJ
  rationale: χώρα commonly means land, region, or territory. 'The king's land' is
    a direct and readable rendering; 'country' could imply a modern nation-state,
    and 'territory' is somewhat bureaucratic.
- source_word: κολάσατο
  chosen: let him punish
  alternatives:
  - let him take vengeance on
  - let him chastise
  lexicon: LSJ
  rationale: The aorist middle imperative here calls for punitive action. 'Punish'
    is the most neutral and contextually appropriate English equivalent; 'take vengeance'
    would heighten the tone beyond the lexical necessity.
- source_word: τοὺς ἐπιβοηθοῦντας αὐτοῖς
  chosen: those who are helping them
  alternatives:
  - their supporters
  - those who come to their aid
  lexicon: LSJ
  rationale: The participle denotes people giving assistance. 'Those who are helping
    them' keeps the verbal force and avoids narrowing the support to military or political
    aid only.
