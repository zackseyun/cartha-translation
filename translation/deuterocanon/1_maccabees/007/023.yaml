theological_decisions:
- issue: Rendering of υἱοῖς Ἰσραήλ
  chosen_reading: among the sons of Israel
  alternative_readings:
  - among the people of Israel
  - among the Israelites
  rationale: The Greek is explicitly filial and masculine-plural in form. Per the
    project's gender-accurate philosophy, the main text preserves 'sons of Israel'
    rather than flattening to a more generic collective, while alternatives remain
    possible in smoother English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of τὰ ἔθνη
  chosen_reading: the nations
  alternative_readings:
  - the Gentiles
  rationale: In this deuterocanonical Jewish context, τὰ ἔθνη refers to the surrounding
    nations and can carry the sense 'Gentiles.' 'The nations' is more transparent
    and less tradition-bound while preserving the contrast with Israel.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
