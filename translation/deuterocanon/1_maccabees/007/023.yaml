translation:
  text: And Judas saw all the evil that Alcimus and those with him had done among
    the sons of Israel, beyond even the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more than the Gentiles.' The Greek phrase means that the evil done by
      Alcimus and his allies surpassed that of the surrounding nations.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴδεν
  chosen: saw
  alternatives:
  - observed
  - perceived
  lexicon: LSJ
  rationale: A straightforward narrative aorist of ὁράω. 'Saw' is the most natural
    English rendering and can include recognition of the situation, not merely physical
    sight.
- source_word: ἅπαν τὴν κακίαν
  chosen: all the evil
  alternatives:
  - the whole wickedness
  - all the harm
  lexicon: LSJ
  rationale: κακία commonly denotes badness, wickedness, or evil. 'All the evil' preserves
    both the moral force and the comprehensiveness marked by ἅπαν.
- source_word: ἐποίησεν
  chosen: had done
  alternatives:
  - did
  - committed
  lexicon: LSJ
  rationale: English pluperfect fits the narrative flow after 'Judas saw' by presenting
    the evil as prior action already carried out by Alcimus and his associates.
- source_word: οἱ μετ’ αὐτοῦ
  chosen: those with him
  alternatives:
  - his companions
  - those who were with him
  lexicon: LSJ
  rationale: This idiom refers to Alcimus's associates or supporters. 'Those with
    him' is transparent and close to the Greek.
- source_word: ἐν υἱοῖς Ἰσραήλ
  chosen: among the sons of Israel
  alternatives:
  - against the sons of Israel
  - in Israel
  lexicon: LSJ
  rationale: ἐν with persons here is best taken as 'among,' indicating the sphere
    within Israel in which the evil was done. 'Sons of Israel' preserves the source
    expression and its ethnic-covenantal resonance.
- source_word: ὑπὲρ τὰ ἔθνη
  chosen: beyond even the nations
  alternatives:
  - more than the Gentiles
  - beyond the nations
  lexicon: LSJ
  rationale: ὑπέρ here expresses excess or surpassing degree. 'Beyond even the nations'
    captures the comparative force and the rhetorical shock that their wickedness
    exceeded that associated with the surrounding peoples.
