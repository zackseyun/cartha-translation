theological_decisions:
- issue: Sense of δίκαια in a politically charged context
  chosen_reading: what is right
  alternative_readings:
  - justice
  - just terms
  rationale: The verse does not itself specify whether the scribes sought legal redress,
    equitable terms, or moral rightness. 'What is right' preserves that breadth without
    importing a narrower political or theological claim.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence.'
