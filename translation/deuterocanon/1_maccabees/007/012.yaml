translation:
  text: And an assembly of scribes gathered to Alcimus and Bacchides to seek justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to seek justice' or 'to seek what is just.' The Greek δίκαια can carry
      both moral and legal force.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνήχθησαν
  chosen: gathered
  alternatives:
  - were assembled
  - came together
  lexicon: LSJ
  rationale: Aorist passive/middle of ἐπισυνάγω, here describing a group coming together.
    'Gathered' is natural English and preserves the collective action without overformal
    wording.
- source_word: πρὸς
  chosen: to
  alternatives:
  - toward
  - with
  lexicon: LSJ
  rationale: With persons after a verb of gathering, πρὸς indicates movement/association
    toward them. 'To' is concise and fits the sense that the assembly gathered in
    relation to Alcimus and Bacchides.
- source_word: συναγωγὴ
  chosen: assembly
  alternatives:
  - company
  - gathering
  lexicon: LSJ
  rationale: Here the noun denotes a gathered body, not a synagogue building. 'Assembly'
    best conveys a formal collected group in context.
- source_word: γραμματέων
  chosen: of scribes
  alternatives:
  - of secretaries
  - of scholars
  lexicon: LSJ
  rationale: γραμματεύς commonly means 'scribe' in Jewish and Hellenistic contexts.
    'Scribes' is the most transparent and historically appropriate rendering.
- source_word: ἐκζητῆσαι
  chosen: to seek
  alternatives:
  - to inquire after
  - to seek out
  lexicon: LSJ
  rationale: The infinitive expresses purpose. 'To seek' is straightforward and leaves
    the object open enough to match the Greek idiom.
- source_word: δίκαια
  chosen: what is right
  alternatives:
  - justice
  - righteous things
  - what is just
  lexicon: LSJ
  rationale: The neuter plural can mean 'just things' or 'what is right/just.' 'What
    is right' gives idiomatic English while preserving the moral-legal sense. 'Justice'
    is possible but slightly more abstract than the plural expression.
- source_word: Ἄλκιμον
  chosen: Alcimus
  alternatives:
  - Alkimos
  rationale: Standard English transliteration for the personal name.
- source_word: Βακχίδην
  chosen: Bacchides
  alternatives:
  - Bakchides
  rationale: Standard English transliteration for the personal name.
