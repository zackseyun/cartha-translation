  text: καὶ κατέστησεν τὴν χώραν τῷ Ἀλκίμῳ, καὶ ἀφῆκεν μετ’ αὐτοῦ δύναμιν τοῦ βοηθεῖν
    αὐτῷ· καὶ ἀπῆλθεν Βακχίδης πρὸς τὸν βασιλέα.
