translation:
  text: And he appointed Alcimus over the country, and left with him a force to help
    him; and Bacchides went away to the king.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατέστησεν
  chosen: put ... under
  alternatives:
  - appointed over
  - established
  - set
  lexicon: BDAG
  rationale: In this context with τὴν χώραν and dative τῷ Ἀλκίμῳ, the verb conveys
    placing the land under Alcimus' authority or administration. 'Put the country
    under Alcimus' is natural English and preserves the governmental sense better
    than the more wooden 'established the country to Alcimus.'
- source_word: τὴν χώραν
  chosen: the country
  alternatives:
  - the land
  - the region
  lexicon: BDAG
  rationale: χώρα commonly denotes territory, land, or country. 'Country' fits the
    political-administrative context here, where control is being assigned.
- source_word: ἀφῆκεν
  chosen: left
  alternatives:
  - allowed
  - sent away
  - released
  lexicon: BDAG
  rationale: With μετ’ αὐτοῦ δύναμιν, the sense is that he left a military force with
    Alcimus. 'Left' is the most straightforward contextual rendering.
- source_word: δύναμιν
  chosen: a force
  alternatives:
  - troops
  - an army
  - power
  lexicon: BDAG
  rationale: Though δύναμις can mean power or capability, in military narrative it
    often refers to an armed force. 'A force' preserves the military sense without
    overstating the size as 'army.'
- source_word: τοῦ βοηθεῖν αὐτῷ
  chosen: to help him
  alternatives:
  - to support him
  - to come to his aid
  lexicon: BDAG
  rationale: 'The articular infinitive expresses purpose: the force was left with
    him for the purpose of helping him. ''To help him'' is clear and sufficiently
    direct.'
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - went off
  lexicon: BDAG
  rationale: The verb marks Bacchides' departure from the scene. 'Went away' is readable
    modern English and preserves the movement sense.
- source_word: πρὸς τὸν βασιλέα
  chosen: to the king
  alternatives:
  - back to the king
  - to the royal court
  lexicon: BDAG
  rationale: The preposition πρὸς with accusative here indicates movement toward the
    king. 'To the king' is the direct rendering; 'back' is possible from context but
    not explicit in the Greek.
