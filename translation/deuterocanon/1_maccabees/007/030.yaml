translation:
  text: And the matter became known to Judas, that he had come against him with deceit;
    and he was alarmed because of him, and no longer wished to see his face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the report became known to Judas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώσθη
  chosen: became known
  alternatives:
  - was made known
  - was learned
  lexicon: LSJ
  rationale: Aorist passive of γινώσκω; the impersonal/passive sense is best carried
    by 'became known,' preserving that the information came to Judas rather than foregrounding
    an unnamed informer.
- source_word: ὁ λόγος
  chosen: the matter
  alternatives:
  - the report
  - the word
  lexicon: LSJ
  rationale: Here λόγος refers to the report/news of the plot rather than a spoken
    'word' in a narrow sense. 'The matter' is natural English and broad enough to
    cover the disclosed information.
- source_word: μετὰ δόλου
  chosen: with deceit
  alternatives:
  - deceitfully
  - with treachery
  - with guile
  lexicon: LSJ
  rationale: The prepositional phrase is most directly rendered 'with deceit.' 'Treachery'
    is somewhat stronger and more interpretive; 'guile' is accurate but less natural
    in modern English.
- source_word: ἦλθεν ἐπ’ αὐτόν
  chosen: had come against him
  alternatives:
  - came against him
  - had come upon him
  lexicon: LSJ
  rationale: ἐπ’ αὐτόν in this hostile context indicates movement against Judas, not
    merely toward him. The pluperfect-like English 'had come' fits the sequence after
    'became known' and reads naturally.
- source_word: ἐπτοήθη
  chosen: was alarmed
  alternatives:
  - was frightened
  - was disturbed
  - was terrified
  lexicon: LSJ
  rationale: The verb denotes being startled or alarmed. 'Was alarmed' preserves the
    seriousness without overstating it as panic or terror.
- source_word: ἀπ’ αὐτοῦ
  chosen: because of him
  alternatives:
  - by him
  - at him
  - from him
  lexicon: LSJ
  rationale: The preposition marks the source/cause of Judas's alarm. 'Because of
    him' is the clearest idiomatic English expression of that causal sense.
- source_word: οὐκ ἠβουλήθη ἔτι
  chosen: no longer wished
  alternatives:
  - did not want anymore
  - was no longer willing
  lexicon: LSJ
  rationale: This conveys a settled refusal from that point onward. 'No longer wished'
    is concise and idiomatic.
- source_word: ἰδεῖν τὸ πρόσωπον αὐτοῦ
  chosen: to see his face
  alternatives:
  - to see him
  - to look upon his face
  lexicon: LSJ
  rationale: The Greek idiom literally says 'to see his face.' Retaining 'face' preserves
    the personal force of the expression while remaining understandable in English.
