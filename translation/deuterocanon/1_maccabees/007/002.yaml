translation:
  text: And it happened, when he was entering the house of the kingdom of his fathers,
    that the forces seized Antiochus and Lysias to bring them to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the royal house of his fathers' or 'the palace
      of his fathers.' The Greek reads literally 'house of the kingdom of his fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ὡς
  chosen: And it happened, when
  alternatives:
  - And when
  - Now when
  lexicon: LSJ
  rationale: This idiomatic narrative formula marks a transition in the story. Rendering
    both elements preserves the Greek's temporal setup without excessive stiffness.
- source_word: εἰσεπορεύετο
  chosen: he was entering
  alternatives:
  - he entered
  - he was going in
  lexicon: LSJ
  rationale: The imperfect middle suggests action in progress, so 'was entering' best
    reflects the aspect.
- source_word: οἶκον βασιλείας
  chosen: the house of the kingdom
  alternatives:
  - the royal house
  - the palace
  lexicon: LSJ
  rationale: A more literal rendering preserves the unusual phrasing of the Greek.
    'Palace' is possible idiomatically, but the source explicitly says 'house of the
    kingdom,' likely denoting the royal residence/dynastic seat.
- source_word: πατέρων αὐτοῦ
  chosen: of his fathers
  alternatives:
  - of his ancestors
  lexicon: LSJ
  rationale: The plural 'fathers' is a standard ancestral expression. 'Ancestors'
    is smoother English, but 'of his fathers' keeps the dynastic nuance visible.
- source_word: συνέλαβον
  chosen: seized
  alternatives:
  - arrested
  - captured
  lexicon: LSJ
  rationale: The verb can mean seize or arrest. 'Seized' is broad enough to fit the
    military context without importing a formal legal process.
- source_word: αἱ δυνάμεις
  chosen: the forces
  alternatives:
  - the troops
  - the army
  lexicon: LSJ
  rationale: The plural noun refers to military forces. 'The forces' is a natural
    and sufficiently literal rendering.
- source_word: ἀγαγεῖν αὐτοὺς αὐτῷ
  chosen: to bring them to him
  alternatives:
  - to lead them to him
  lexicon: LSJ
  rationale: The infinitive expresses purpose after the seizure. 'Bring them to him'
    is straightforward English and fits the context of delivering prisoners to the
    king.
