translation:
  text: And they took the spoils and the plunder, and they cut off Nikanor’s head
    and his right hand, which he had stretched out in arrogance, and brought them
    and displayed them beside Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'near Jerusalem.' The Greek says literally 'beside Jerusalem,' without
      specifying the exact location.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκῦλα
  chosen: spoils
  alternatives:
  - booty
  lexicon: LSJ
  rationale: σκῦλα commonly denotes spoils taken from the defeated. 'Spoils' is natural
    modern English and preserves the military sense without archaic tone.
- source_word: προνομήν
  chosen: plunder
  alternatives:
  - booty
  - prey
  lexicon: LSJ
  rationale: Distinct from σκῦλα, this term adds the idea of goods seized as prey/plunder.
    Rendering it 'plunder' preserves the paired accumulation rather than collapsing
    both nouns into one English term.
- source_word: ἀφεῖλαν
  chosen: they cut off
  alternatives:
  - they removed
  - they took away
  lexicon: LSJ
  rationale: In context with 'head' and 'right hand,' the verb clearly refers to severing
    these body parts. 'Cut off' makes the implied action explicit in idiomatic English.
- source_word: δεξιὰν
  chosen: right hand
  alternatives:
  - right arm
  lexicon: LSJ
  rationale: δεξιά normally means 'right hand.' Although English can use 'arm' loosely
    in violent contexts, 'hand' matches the Greek more closely and remains intelligible.
- source_word: ἐξέτεινεν
  chosen: had stretched out
  alternatives:
  - extended
  - held out
  lexicon: LSJ
  rationale: 'The imperfective sense is naturally represented in English by a prior
    completed action relative to the mutilation: the hand was the one he had stretched
    out.'
- source_word: ἐν ὑπερηφάνως
  chosen: in arrogance
  alternatives:
  - proudly
  - in pride
  lexicon: LSJ
  rationale: The phrase denotes haughty pride. 'In arrogance' captures the moral coloring
    better than the potentially neutral 'proudly.' The Greek form is somewhat irregular,
    but the sense is clear.
- source_word: ἤνεγκαν
  chosen: brought
  alternatives:
  - carried
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist of φέρω in narrative sequence.
- source_word: ἐξέτειναν
  chosen: displayed
  alternatives:
  - stretched out
  - hung up
  - exhibited
  lexicon: LSJ
  rationale: Literally 'stretched out,' but in this context of bringing the severed
    head and hand to Jerusalem, the sense is public exposure/display. 'Displayed'
    communicates the function in idiomatic English while remaining anchored to the
    action.
- source_word: παρὰ τὴν Ἰερουσαλήμ
  chosen: beside Jerusalem
  alternatives:
  - near Jerusalem
  - outside Jerusalem
  lexicon: LSJ
  rationale: παρά with the accusative here indicates location alongside/near. 'Beside
    Jerusalem' is a close rendering; the exact spot is not specified, so 'outside
    Jerusalem' would overinterpret.
