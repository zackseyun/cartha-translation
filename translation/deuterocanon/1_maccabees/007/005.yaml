theological_decisions:
- issue: Rendering morally charged descriptors for apostate Israelites
  chosen_reading: lawless and ungodly
  alternative_readings:
  - wicked and impious
  - lawless and impious
  rationale: The verse condemns these Israelites in both legal/covenantal and religious
    terms. Using both adjectives distinctly preserves the text's double characterization
    without collapsing them into one generalized insult.
  doctrine_reference: DOCTRINE.md §§1, 5
- issue: Specificity of Alcimus's priestly ambition
  chosen_reading: wanting to be high priest
  alternative_readings:
  - wanting to serve as priest
  - wanting the priesthood
  rationale: The historical context of 1 Maccabees concerns the high priesthood. Making
    that office explicit communicates the likely sense of ἱερατεύειν here while remaining
    anchored in the Greek narrative context.
  doctrine_reference: DOCTRINE.md §1
