translation:
  text: And all the lawless and ungodly men from Israel came to him, and Alcimus led
    them, wanting to be priest,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wanting the priesthood.' The Greek infinitive can more literally mean
      'to act as priest,' but in this context it refers to Alcimus's bid for the high
      priestly office.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - people
  lexicon: BDAG
  rationale: The noun is explicitly masculine plural and here refers to a specific
    group of male actors, not a generic mixed group; 'men' preserves the gender-accurate
    force of the Greek.
- source_word: ἄνομοι
  chosen: lawless
  alternatives:
  - without law
  - wicked
  lexicon: BDAG
  rationale: '''Lawless'' best preserves the sense of acting against the law, likely
    with covenantal/Jewish-law overtones in this context, without flattening it to
    the broader moral term ''wicked''.'
- source_word: ἀσεβεῖς
  chosen: ungodly
  alternatives:
  - impious
  - godless
  lexicon: BDAG
  rationale: The term denotes irreverence or impiety toward God. 'Ungodly' is natural
    modern English and preserves the religious dimension better than the more formal
    'impious'.
- source_word: ἐξ Ἰσραήλ
  chosen: from Israel
  alternatives:
  - out of Israel
  - among Israel
  lexicon: BDAG
  rationale: The phrase identifies these men as arising from within Israel. 'From
    Israel' is the most straightforward rendering in context.
- source_word: ἡγείται
  chosen: led
  alternatives:
  - was leading
  - was their leader
  - took the lead among
  lexicon: BDAG
  rationale: Although formally present tense in narrative, the clause is naturally
    rendered in English past narrative style. 'Led' captures Alcimus's role over the
    group succinctly.
- source_word: βουλόμενος
  chosen: wanting
  alternatives:
  - desiring
  - intending
  lexicon: BDAG
  rationale: The participle expresses Alcimus's motive. 'Wanting' is clear and direct;
    'desiring' is possible but slightly more elevated, while 'intending' can sound
    more merely volitional than aspirational.
- source_word: ἱερατεύειν
  chosen: to be high priest
  alternatives:
  - to serve as priest
  - to hold the priesthood
  lexicon: LSJ
  rationale: In 1 Maccabees Alcimus is seeking the chief priestly office, not merely
    priestly service in general. Rendering the infinitive as 'to be high priest' makes
    the historical office explicit in idiomatic English.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - before him
  lexicon: BDAG
  rationale: The preposition with motion verb indicates approach. 'To him' is the
    plain contextual sense.
