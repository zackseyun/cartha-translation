translation:
  text: And the Hasideans were the first among the sons of Israel, and they sought
    peace from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the Israelites.' The Greek reads 'among the sons of Israel,' a
      traditional covenantal expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρῶτοι
  chosen: the first
  alternatives:
  - first
  - first ones
  - among the first
  lexicon: LSJ
  rationale: Predicative use with ἦσαν indicates priority. Rendered as 'the first'
    to preserve the sense that this group took the initiative before others.
- source_word: Ἀσιδαῖοι
  chosen: Hasideans
  alternatives:
  - Asideans
  - Hasidim
  lexicon: LSJ
  rationale: A transliterated group name is preferable to a descriptive paraphrase,
    since this is a recognized party designation in 1 Maccabees. 'Hasideans' is standard
    and readable in English; 'Hasidim' is possible but more interpretive/Hebraizing.
- source_word: ἐν υἱοῖς Ἰσραήλ
  chosen: among the sons of Israel
  alternatives:
  - from the sons of Israel
  - among the Israelites
  - within the sons of Israel
  lexicon: LSJ
  rationale: ἐν with this plural expression is best taken as 'among/within.' 'Sons
    of Israel' preserves the source's familial-national idiom and follows the project's
    gender-accurate philosophy rather than flattening to 'Israelites' without note.
- source_word: ἐπεζήτουν
  chosen: sought
  alternatives:
  - were seeking
  - asked for
  - looked for
  lexicon: LSJ
  rationale: Imperfect form conveys ongoing or attempted action, but in English a
    simple past 'sought' reads naturally and adequately represents the narrative progression
    without overloading aspect.
- source_word: παρʼ αὐτῶν
  chosen: from them
  alternatives:
  - from him
  - at their hands
  - with them
  lexicon: LSJ
  rationale: παρά with genitive commonly means 'from.' The plural αὐτῶν is retained
    as 'them.' This most naturally refers to the opposing party just mentioned in
    context, and 'from them' fits the idiom 'seek peace from someone.'
- source_word: εἰρήνην
  chosen: peace
  alternatives:
  - peace terms
  - reconciliation
  lexicon: LSJ
  rationale: The basic sense 'peace' is sufficient and preserves the text's wording.
    More expansive renderings like 'peace terms' interpret the political nuance beyond
    what the single noun explicitly states.
