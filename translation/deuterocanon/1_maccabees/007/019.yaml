translation:
  text: And Bacchides departed from Jerusalem and encamped at Bethzaith, and he sent
    and seized many of the men who had deserted to him, and some of the people, and
    slaughtered them in the great pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had defected to him' or 'had gone over to him.'
    reason: lexical_alternative
  - marker: b
    text: The Greek verb here is literally 'sacrificed'; in context it refers to violent
      killing, not a legitimate cultic offering.
    reason: lexical_alternative
  - marker: c
    text: Or 'into the great pit' / 'the great well' / 'the great cistern'; the Greek
      noun can refer to a pit, well, or cistern.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  chosen: departed
  alternatives:
  - went away
  - set out
  lexicon: LSJ
  rationale: Aorist of ἀπαίρω here marks Bacchides' departure from Jerusalem. 'Departed'
    is natural modern English and preserves the movement away from a place.
- source_word: παρενέβαλεν
  chosen: encamped
  alternatives:
  - camped
  - made camp
  lexicon: LSJ
  rationale: Military context favors 'encamped,' which reflects the formal sense of
    establishing a camp.
- source_word: ἐν Βηξέθ
  chosen: at Bethzaith
  alternatives:
  - in Bezez
  - at Bēxeth
  rationale: This is a place name transliterated from the Greek witness. Because the
    exact underlying Semitic form is uncertain from this verse alone, a conservative
    transliteration is preferable to a speculative normalization.
- source_word: συνέλαβεν
  chosen: seized
  alternatives:
  - arrested
  - captured
  lexicon: LSJ
  rationale: The verb denotes taking hold of persons. 'Seized' is broad and fits the
    narrative without importing formal judicial procedure implied by 'arrested.'
- source_word: αὐτομολησάντων
  chosen: had deserted to him
  alternatives:
  - had defected to him
  - had gone over to him
  lexicon: LSJ
  rationale: The participle refers to men who had defected/deserted to Bacchides'
    side. 'Had deserted to him' makes the allegiance shift explicit and fits the hostile
    military setting.
- source_word: τινας τοῦ λαοῦ
  chosen: some of the people
  alternatives:
  - certain ones of the people
  - some from the people
  lexicon: LSJ
  rationale: Idiomatic English for an indefinite subset of the populace; preserves
    the partitive sense without awkwardness.
- source_word: ἔθυσεν
  chosen: slaughtered
  alternatives:
  - killed
  - sacrificed
  lexicon: LSJ
  rationale: Although the verb can literally mean 'sacrificed,' here the context is
    violent execution, not cultic offering. 'Slaughtered' preserves the brutality
    and possible sacrificial coloring better than the flatter 'killed,' while avoiding
    a misleadingly literal cultic reading in the main text.
- source_word: εἰς τὸ φρέαρ τὸ μέγα
  chosen: at the great pit
  alternatives:
  - into the great pit
  - at the great well
  - into the great cistern
  lexicon: LSJ
  rationale: φρέαρ can denote pit, well, or cistern. 'Pit' best fits a place of execution/disposal
    in English. The preposition εἰς could be rendered 'into,' but with ἔθυσεν the
    phrase likely indicates the location associated with the killing; 'at the great
    pit' reads naturally while preserving the scene.
