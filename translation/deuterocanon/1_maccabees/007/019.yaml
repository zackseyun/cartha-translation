theological_decisions:
- issue: Potential sacrificial nuance of ἔθυσεν in a non-cultic execution context
  chosen_reading: slaughtered
  alternative_readings:
  - sacrificed
  - killed
  rationale: The text uses a verb associated with sacrifice, but the narrative context
    concerns Bacchides' violent treatment of captives, not legitimate worship. Rendering
    it 'slaughtered' preserves the harshness and may echo the dehumanizing, quasi-sacrificial
    force without misleading readers into thinking an actual ritual sacrifice occurred.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    lexical weight without importing claims the text does not make.'
