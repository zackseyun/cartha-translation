theological_decisions:
- issue: Referent of αὐτόν ('him') after the singular verb ἐλάλησεν
  chosen_reading: Retain singular 'he/him' rather than pluralizing to the camp or
    army.
  alternative_readings:
  - Interpret the singular collectively of the hostile force or its leader and render
    more generally
  rationale: The Greek shifts from the collective 'this camp' to a singular offender
    who 'has spoken wickedly against your holy things.' Keeping the singular preserves
    the text's grammar and the prayer's focus on a culpable blaspheming individual,
    without importing a specific identification not stated in the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
