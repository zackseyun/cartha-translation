translation:
  text: So crush this camp before us today, and let the rest know that he has spoken
    wickedly against your holy things; judge him according to his wickedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against your sanctuary.' The Greek literally says 'against your holy
      things' (plural), which may refer broadly to what is sacred to God, including
      the sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: σύντριψον
  chosen: crush
  alternatives:
  - shatter
  - break
  - smash
  lexicon: LSJ
  rationale: Aorist imperative of συντρίβω calling for decisive destruction. 'Crush'
    is forceful, natural English and fits both military defeat and divine judgment
    better than the more wooden 'break.'
- source_word: παρεμβολὴν
  chosen: camp
  alternatives:
  - army camp
  - encampment
  - host
  lexicon: LSJ
  rationale: παρεμβολή commonly denotes a camp or encampment, especially military.
    'Camp' is concise and idiomatic; the military sense is clear in context.
- source_word: ἐνώπιον ἡμῶν
  chosen: before us
  alternatives:
  - in our sight
  - in front of us
  lexicon: LSJ
  rationale: Literally 'before us/in our presence.' 'Before us' preserves the directness
    of the Greek while remaining readable.
- source_word: οἱ ἐπίλοιποι
  chosen: the rest
  alternatives:
  - the survivors
  - those remaining
  - the remainder
  lexicon: LSJ
  rationale: The phrase can mean those left over or remaining. In this context it
    likely refers to those remaining after judgment, but the Greek does not explicitly
    specify 'survivors,' so 'the rest' preserves the broader sense.
- source_word: κακῶς ἐλάλησεν
  chosen: has spoken wickedly
  alternatives:
  - has spoken evil
  - has spoken badly
  - has spoken arrogantly
  lexicon: LSJ
  rationale: κακῶς with λαλέω indicates evil or wicked speech, not merely poor speaking.
    'Has spoken wickedly' captures the moral charge.
- source_word: ἐπὶ τὰ ἅγιά σου
  chosen: against your holy things
  alternatives:
  - against your sanctuary
  - against your holy place
  - against your sancta
  lexicon: LSJ
  rationale: The plural τὰ ἅγια literally means 'the holy things' or 'sanctuary precincts/things.'
    Because the Greek is plural and broader than a single building, 'your holy things'
    best preserves the wording without over-specifying 'sanctuary.'
- source_word: κρῖνον αὐτὸν
  chosen: judge him
  alternatives:
  - condemn him
  - give judgment against him
  lexicon: LSJ
  rationale: κρίνω here is a petition for judicial action by God. 'Judge him' preserves
    the lexical core and leaves the punitive outcome to the following phrase.
- source_word: κατὰ τὴν κακίαν αὐτοῦ
  chosen: according to his wickedness
  alternatives:
  - according to his evil
  - as his wickedness deserves
  lexicon: LSJ
  rationale: κακία denotes moral badness or wickedness. 'According to his wickedness'
    is formally close and idiomatic in an imprecatory prayer.
