translation:
  text: at Chaphar-salama. And about five thousand men of those with Nicanor fell,
    and they fled into the city of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The place name Chaphar-salama reflects a difficult Greek toponym (Χαρφαρασαραμά);
      other transliterations are possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  chosen: at
  alternatives:
  - against
  - near
  lexicon: LSJ
  rationale: With a place name in this battle report, κατά functions locatively, indicating
    the site of the engagement rather than opposition.
- source_word: Χαρφαρασαραμά
  chosen: Chaphar-salama
  alternatives:
  - Harpharasarama
  - Capharsalama
  lexicon: LSJ
  rationale: This is a toponym with uncertain conventional English form. Per project
    philosophy, names are transliterated rather than translated. The chosen form aims
    to reflect the Greek consonants transparently in readable English.
- source_word: ἔπεσαν
  chosen: fell
  alternatives:
  - were killed
  - collapsed
  lexicon: LSJ
  rationale: In military narrative, 'fell' is the standard idiomatic rendering for
    death in battle and preserves the Greek's concise style without over-explicating.
- source_word: τῶν παρὰ Νικάνορος
  chosen: of those with Nicanor
  alternatives:
  - of Nicanor's men
  - from Nicanor's side
  lexicon: LSJ
  rationale: The phrase literally denotes those 'beside/with Nicanor,' i.e., his forces.
    'Of those with Nicanor' stays close to the Greek while remaining clear.
- source_word: ὡς πεντακισχίλιοι ἄνδρες
  chosen: about five thousand men
  alternatives:
  - some five thousand men
  - approximately five thousand men
  lexicon: LSJ
  rationale: ὡς before a number marks approximation. 'About' is natural modern English
    and preserves the non-exact figure.
- source_word: ἔφυγον
  chosen: they fled
  alternatives:
  - the rest fled
  - they took flight
  lexicon: LSJ
  rationale: The Greek verb simply states flight. Although the subject shifts naturally
    to the survivors, the text does not explicitly add 'the rest'; the English keeps
    the Greek's brevity.
- source_word: εἰς τὴν πόλιν Δαυείδ
  chosen: into the city of David
  alternatives:
  - to the city of David
  lexicon: LSJ
  rationale: εἰς normally indicates movement into. 'The city of David' is the established
    sense of the Greek phrase and should be translated, not transliterated, because
    it is a descriptive place designation.
