translation:
  text: And he himself fell first in the battle. But when his camp saw that Nicanor
    had fallen, they threw down their weapons and fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his force' or 'his encampment' for 'his camp' (ἡ παρεμβολὴ αὐτοῦ).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσεν
  chosen: fell
  alternatives:
  - was struck down
  - died
  lexicon: LSJ
  rationale: The verb literally means 'fell' and in battle context commonly implies
    being struck down or killed. 'Fell' preserves the Greek idiom and avoids over-specifying
    beyond the wording.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - he personally
  lexicon: LSJ
  rationale: The pronoun is emphatic. 'He himself' preserves the emphasis that Nicanor
    personally was the first to fall.
- source_word: πρῶτος
  chosen: first
  alternatives:
  - before the others
  - as the first one
  lexicon: LSJ
  rationale: A straightforward rendering that keeps the temporal/sequential force
    of the Greek.
- source_word: ἐν τῷ πολέμῳ
  chosen: in the battle
  alternatives:
  - in the war
  - in combat
  lexicon: LSJ
  rationale: Although πόλεμος can mean 'war,' here the immediate engagement is in
    view, so 'battle' is the more natural English equivalent.
- source_word: ἡ παρεμβολὴ αὐτοῦ
  chosen: his camp
  alternatives:
  - his army camp
  - his force
  - his encampment
  lexicon: LSJ
  rationale: παρεμβολή can denote a camp or the body of troops encamped. In this context
    it refers to Nicanor's forces as a military body; 'his camp' is concise and idiomatic
    while retaining the Greek image.
- source_word: ῥίψαντες τὰ ὅπλα αὐτῶν
  chosen: they threw down their weapons
  alternatives:
  - they cast away their arms
  - they dropped their weapons
  lexicon: LSJ
  rationale: The participle indicates abandoning weapons in panic before fleeing.
    'Threw down' captures the force better than the milder 'dropped.'
- source_word: ἔφυγον
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: LSJ
  rationale: Standard military-context rendering; concise and faithful.
