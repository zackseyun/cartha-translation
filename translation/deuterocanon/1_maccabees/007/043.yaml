translation:
  text: And the camps joined battle on the thirteenth day of the month Adar, and Nicanor’s
    camp was crushed,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the armies engaged in battle.' The Greek uses 'camps' for the opposing
      military forces.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆψαν
  chosen: joined battle
  alternatives:
  - engaged in battle
  - came together for battle
  - joined in battle
  lexicon: LSJ
  rationale: From συνάπτω in a military context, the sense is not merely 'joined'
    but 'engaged/closed with' in combat. 'Joined battle' is an idiomatic English military
    rendering that preserves the event's onset without over-paraphrasing.
- source_word: αἱ παρεμβολαὶ
  chosen: the camps
  alternatives:
  - the armies
  - the encampments
  - the forces
  lexicon: LSJ
  rationale: παρεμβολή commonly denotes a camp or encamped force. Because both sides
    are in view and the plural is explicit, 'the camps' best preserves the Greek form
    while naturally implying the opposing military bodies.
- source_word: εἰς πόλεμον
  chosen: battle
  alternatives:
  - for war
  - into battle
  - for combat
  lexicon: LSJ
  rationale: The phrase with συνῆψαν indicates entry into active fighting. 'Joined
    battle' absorbs the force of εἰς πόλεμον idiomatically in English.
- source_word: τῇ τρισκαιδεκάτῃ
  chosen: on the thirteenth day
  alternatives:
  - on the thirteenth
  - on the thirteenth date
  lexicon: LSJ
  rationale: The dative with the article marks time. Supplying 'day' is required for
    clear English and is contextually warranted by the following genitive of the month.
- source_word: τοῦ μηνὸς Ἀδάρ
  chosen: of the month Adar
  alternatives:
  - of Adar
  - in the month Adar
  lexicon: LSJ
  rationale: A straightforward calendrical expression. 'Of the month Adar' stays close
    to the Greek while remaining readable.
- source_word: συνετρίβη
  chosen: was crushed
  alternatives:
  - was shattered
  - was broken
  - was defeated
  lexicon: LSJ
  rationale: συντρίβω is stronger than a generic 'was defeated'; it conveys being
    broken or crushed. 'Was crushed' preserves the force of the passive and the severity
    of the defeat.
- source_word: ἡ παρεμβολὴ Νικάνορος
  chosen: Nicanor’s camp
  alternatives:
  - the camp of Nicanor
  - Nicanor’s army
  - Nicanor’s force
  lexicon: LSJ
  rationale: The singular identifies Nicanor's military encampment/force. 'Nicanor’s
    camp' keeps the lexical link with earlier παρεμβολαί while reading naturally in
    English.
