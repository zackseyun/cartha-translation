theological_decisions:
- issue: Genealogical phrase tied to priestly legitimacy
  chosen_reading: from the seed of Aaron
  alternative_readings:
  - from the line of Aaron
  - of Aaron's descendants
  rationale: The phrase grounds Alcimus's apparent legitimacy in Aaronic descent.
    A more literal rendering preserves the text's appeal to priestly lineage without
    adding interpretive explanation in the main text.
