translation:
  text: For they said, “A man, a priest from the seed of Aaron, has come with the
    forces, and he will not wrong us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the line of Aaron” or “of Aaron’s descendants.” The Greek literally
      says “from the seed of Aaron,” a genealogical expression emphasizing priestly
      descent.
    reason: lexical_alternative
  - marker: b
    text: “With the forces” refers to military forces; alternatively, “with the army”
      or “with the troops.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπαν γάρ
  chosen: For they said
  alternatives:
  - For they were saying
  - For they said indeed
  lexicon: BDAG
  rationale: γάρ gives the explanatory sense 'for,' linking this statement to the
    preceding action; εἶπαν is aorist and is naturally rendered as simple past narrative
    speech.
- source_word: Ἄνθρωπος
  chosen: A man
  alternatives:
  - Man
  - A human being
  lexicon: BDAG
  rationale: The singular noun refers to an individual male person in context, not
    humanity in general. 'A man' preserves the Greek's gender-accurate wording and
    the appositional force before 'priest.'
- source_word: ἱερεὺς
  chosen: a priest
  alternatives:
  - priest
  lexicon: BDAG
  rationale: Rendered with the ordinary cultic term 'priest.' The apposition 'A man,
    a priest...' reflects the Greek sequence without over-smoothing.
- source_word: ἐκ τοῦ σπέρματος Ἀαρών
  chosen: from the seed of Aaron
  alternatives:
  - from the line of Aaron
  - of Aaron's descendants
  lexicon: BDAG
  rationale: σπέρμα literally means 'seed,' and in genealogical contexts denotes offspring/lineage.
    'From the seed of Aaron' keeps the formal genealogical expression while remaining
    understandable in English.
- source_word: ἦλθεν
  chosen: has come
  alternatives:
  - came
  - has arrived
  lexicon: BDAG
  rationale: The aorist can be rendered as simple past, but in direct speech English
    often idiomatically uses present perfect for a recently arrived figure whose presence
    is the basis of the speakers' confidence. This preserves the immediacy of the
    claim.
- source_word: ἐν ταῖς δυνάμεσιν
  chosen: with the forces
  alternatives:
  - with forces
  - with the army
  - with the troops
  lexicon: BDAG
  rationale: δύναμις in the plural commonly refers to military forces. 'With the forces'
    is a close rendering of the article and plural while conveying the military sense
    without over-specifying a single army unit.
- source_word: οὐκ ἀδικήσει ἡμᾶς
  chosen: he will not wrong us
  alternatives:
  - he will not injure us
  - he will not do us injustice
  - he will not harm us
  lexicon: BDAG
  rationale: ἀδικέω means to act unjustly toward, wrong, or injure. 'Wrong us' best
    captures both the ethical and practical sense in concise modern English.
