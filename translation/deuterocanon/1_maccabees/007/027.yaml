translation:
  text: And Nikanor came to Jerusalem with a large force, and he sent to Judas and
    his brothers deceitfully with peaceful words, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δυνάμει πολλῇ
  chosen: with a large force
  alternatives:
  - with great power
  - with a great army
  lexicon: LSJ
  rationale: δύναμις here refers concretely to military strength or troops rather
    than abstract power. 'With a large force' preserves the military sense in natural
    English without over-specifying 'army' beyond the Greek.
- source_word: ἀπέστειλεν πρὸς Ἰούδαν καὶ τοὺς ἀδελφοὺς αὐτοῦ
  chosen: he sent to Judas and his brothers
  alternatives:
  - he sent word to Judas and his brothers
  - he sent messengers to Judas and his brothers
  lexicon: LSJ
  rationale: The verb ἀποστέλλω with πρός can mean sending a message or emissaries.
    Since the object is not explicit, 'he sent to' stays close to the Greek while
    allowing the following accusative phrase to specify the content.
- source_word: μετὰ δόλου
  chosen: deceitfully
  alternatives:
  - with deceit
  - treacherously
  lexicon: LSJ
  rationale: The phrase modifies the manner of Nikanor's communication. 'Deceitfully'
    is idiomatic in English and captures the adverbial force of the prepositional
    phrase.
- source_word: λόγους εἰρηνικούς
  chosen: with peaceful words
  alternatives:
  - peaceful words
  - words of peace
  lexicon: LSJ
  rationale: λόγους is the content of what was sent, and εἰρηνικούς describes them
    as peaceable or conciliatory. 'With peaceful words' fits the syntax after 'he
    sent to ... deceitfully' and preserves the contrast between apparent peace and
    actual deceit.
- source_word: λέγων
  chosen: saying,
  alternatives:
  - and said
  - saying
  lexicon: LSJ
  rationale: The participle introduces the direct speech of the next verse. Rendering
    it as 'saying,' preserves the connection and prepares for the quotation that follows.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  lexicon: LSJ
  rationale: Simple narrative aorist; 'came' is the most direct and natural rendering.
- source_word: Νικάνωρ
  chosen: Nikanor
  alternatives:
  - Nicanor
  rationale: Per project philosophy, personal names are transliterated rather than
    anglicized where practical. 'Nikanor' reflects the Greek form more directly than
    the traditional 'Nicanor'.
- source_word: Ἰούδαν
  chosen: Judas
  alternatives:
  - Judah
  rationale: The Greek form Ἰούδας in 1 Maccabees conventionally refers to Judas Maccabeus.
    'Judas' is the standard transliteration for this Greek personal name in this context.
- source_word: ἀδελφοὺς
  chosen: brothers
  alternatives:
  - kinsmen
  lexicon: LSJ
  rationale: The term here refers to Judas's literal brothers/allied family members,
    not a generic mixed group. 'Brothers' is therefore both accurate and natural.
