translation:
  text: Take vengeance on this man and on his camp, and let them fall by the sword.
    Remember their blasphemies, and grant them no survival.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'insults' or 'slanders' for 'blasphemies'; the Greek can denote abusive
      speech more broadly, but here the prayer context favors the more religiously
      charged sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'give them no abiding place'/'grant them no respite'; the Greek expression
      may refer either to settled security or to rest from judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποίησον ἐκδίκησιν
  chosen: Carry out vengeance
  alternatives:
  - Take vengeance
  - Execute vengeance
  - Bring about justice
  lexicon: LSJ
  rationale: The idiom literally means 'do vengeance.' 'Carry out vengeance' preserves
    the force of an appeal for divine retribution without sounding wooden. 'Justice'
    is too weak here because the prayer explicitly asks for punitive action.
- source_word: ἐν τῷ ἀνθρώπῳ τούτῳ
  chosen: on this man
  alternatives:
  - against this man
  - with this man
  lexicon: LSJ
  rationale: With ἐκδίκησιν, ἐν here is best represented idiomatically in English
    as the object against whom vengeance is enacted. 'On this man' is natural and
    direct.
- source_word: παρεμβολῇ
  chosen: camp
  alternatives:
  - army camp
  - encampment
  - host
  lexicon: LSJ
  rationale: παρεμβολή commonly denotes a camp or encampment, especially military.
    'Camp' is concise and fits the military context.
- source_word: πεσάτωσαν
  chosen: let them fall
  alternatives:
  - may they fall
  - let him and his camp fall
  lexicon: LSJ
  rationale: The third-person plural imperative/prayer formula is naturally rendered
    'let them fall.' The plural matches the following reference to the man and his
    camp collectively.
- source_word: ἐν ῥομφαίᾳ
  chosen: by the sword
  alternatives:
  - with the sword
  - by slaughter
  lexicon: LSJ
  rationale: This is a standard idiom for death in battle or violent judgment. 'By
    the sword' is the clearest established English equivalent.
- source_word: μνήσθητι
  chosen: Remember
  alternatives:
  - Call to mind
  - Take note of
  lexicon: LSJ
  rationale: In prayer addressed to God, 'remember' preserves the covenantal and judicial
    force of invoking divine attention to wrongdoing.
- source_word: δυσφημιῶν
  chosen: blasphemies
  alternatives:
  - insults
  - slanders
  - evil words
  lexicon: LSJ
  rationale: In this context of prayer to God over hostile speech against holy things,
    'blasphemies' best captures speech that is not merely insulting but impious. 'Slanders'
    could suggest false statements against humans rather than irreverence toward God.
- source_word: μὴ δῷς αὐτοῖς μονήν
  chosen: give them no rest
  alternatives:
  - grant them no dwelling
  - give them no abiding place
  - allow them no respite
  lexicon: LSJ
  rationale: μονή can denote staying, abiding, or a resting place. In this imprecatory
    context, 'give them no rest' best conveys a plea that they receive no settled
    security or respite. 'No dwelling' is possible but sounds overly concrete and
    less idiomatic in English here.
