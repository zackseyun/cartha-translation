  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔγνω
  chosen: learned
  alternatives:
  - knew
  - realized
  - found out
  lexicon: BDAG
  rationale: Aorist of γινώσκω here marks coming to know a fact rather than mere stative
    knowledge. 'Learned' captures the moment of discovery in natural English better
    than the more static 'knew.'
- source_word: ἀπεκαλύφθη
  chosen: had been uncovered
  alternatives:
  - had been revealed
  - was disclosed
  - had been exposed
  lexicon: BDAG
  rationale: Passive of ἀποκαλύπτω indicates that Nikanor's counsel/plan became known.
    'Had been uncovered' is idiomatic and preserves the passive sense without importing
    theological overtones that 'revealed' can carry in English.
- source_word: ἡ βουλὴ αὐτοῦ
  chosen: his plan
  alternatives:
  - his counsel
  - his purpose
  - his scheme
  lexicon: BDAG
  rationale: βουλή can mean counsel, purpose, or plan. In this military-political
    context, 'plan' is the clearest modern rendering. 'Scheme' would sound more pejorative
    than the Greek itself requires.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - came out
  - marched out
  lexicon: BDAG
  rationale: The verb literally means 'went out.' Although a military nuance is possible
    from context, the Greek here does not explicitly specify 'marched,' so the more
    direct rendering is preferred.
- source_word: εἰς συνάντησιν
  chosen: to meet
  alternatives:
  - for an encounter with
  - to meet in battle with
  lexicon: LSJ
  rationale: The phrase means going out for a meeting/encounter. Given the surrounding
    conflict, a hostile meeting is implied, but the Greek expression itself is adequately
    represented by 'to meet,' leaving the context to supply the adversarial force.
- source_word: τῷ Ἰούδα
  chosen: Judas
  alternatives:
  - Judah
  lexicon: BDAG
  rationale: As a personal name in 1 Maccabees, Ἰούδας is conventionally transliterated
    'Judas.' This follows the project's policy to transliterate names rather than
    translate them.
