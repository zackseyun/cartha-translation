translation:
  text: But when Alcimus saw that Judas and those with him had grown strong, and realized
    that he was not able to withstand them, he returned to the king and brought wicked
    charges against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek manuscripts as printed here read literally, 'he knew that he was able
      to withstand them.' The context strongly suggests the sense 'he was not able
      to withstand them,' which is followed in the translation.
    reason: textual_variant
lexical_decisions:
- source_word: ὡς δὲ ἴδεν
  chosen: But when ... saw
  alternatives:
  - And when ... saw
  - Now when ... saw
  lexicon: LSJ
  rationale: ὡς with aorist can introduce a temporal clause, 'when/as soon as.' δέ
    is lightly adversative or transitional; 'But when' fits the narrative turn without
    overtranslating.
- source_word: ἐνίσχυσεν
  chosen: had grown strong
  alternatives:
  - became strong
  - prevailed
  - was strengthened
  lexicon: LSJ
  rationale: The verb indicates becoming strong or gaining strength. 'Had grown strong'
    captures the resultant state Judas and his companions had reached in context.
- source_word: οἱ μετ’ αὐτοῦ
  chosen: those with him
  alternatives:
  - his companions
  - the men with him
  lexicon: LSJ
  rationale: A straightforward relational phrase; 'those with him' is natural English
    and avoids adding 'men' where the Greek does not specify it.
- source_word: ἔγνω
  chosen: realized
  alternatives:
  - knew
  - recognized
  - learned
  lexicon: LSJ
  rationale: In context this marks Alcimus's recognition of his inability to oppose
    Judas. 'Realized' conveys that inferential recognition more idiomatically than
    the flatter 'knew.'
- source_word: δύναται ὑποστῆναι αὐτούς
  chosen: he was not able to withstand them
  alternatives:
  - he could not resist them
  - he was unable to stand against them
  lexicon: LSJ
  rationale: Although the transmitted text reads δύναται ('is able'), the sense in
    context after ἔγνω requires inability, since Alcimus then retreats to the king.
    English supplies the negation to reflect the evident sense of the clause and the
    narrative logic.
- source_word: ἐπέστρεψεν πρὸς τὸν βασιλέα
  chosen: he returned to the king
  alternatives:
  - he turned back to the king
  - he went back to the king
  lexicon: LSJ
  rationale: ἐπιστρέφω here denotes turning back/returning. 'Returned to the king'
    is concise and idiomatic.
- source_word: κατηγόρησεν αὐτῶν πονηρά
  chosen: brought wicked charges against them
  alternatives:
  - accused them of evil things
  - made malicious accusations against them
  lexicon: LSJ
  rationale: κατηγορέω means accuse/bring charges; πονηρά can describe the accusations
    as evil, malicious, or wicked. 'Brought wicked charges against them' preserves
    both the legal flavor and the moral evaluation.
