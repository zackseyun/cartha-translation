theological_decisions:
- issue: Sense of δύναται ὑποστῆναι αὐτούς in context
  chosen_reading: 'Render the clause as inability: ''he was not able to withstand
    them.'''
  alternative_readings:
  - 'Literal diplomatic reading without negation: ''he was able to withstand them'''
  rationale: The unnegated wording in the diplomatic Greek is at odds with the immediate
    narrative sequence, since Alcimus withdraws and appeals to the king after seeing
    Judas's strength. The context strongly supports an understood or textually lost
    negation, so the translation reflects the coherent sense while documenting the
    alternative as a textual issue.
  doctrine_reference: Preserve source primacy and document significant exceptions
    transparently; do not smooth without audit trail.
