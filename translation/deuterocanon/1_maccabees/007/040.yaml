  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρενέβαλεν
  chosen: encamped
  alternatives:
  - set up camp
  - pitched camp
  lexicon: LSJ
  rationale: The verb commonly denotes making camp or encamping in a military context.
    'Encamped' is concise, natural English and preserves the martial setting better
    than a looser 'stayed' or 'was stationed.'
- source_word: ἐν Ἀδασὰ
  chosen: at Adasa
  alternatives:
  - in Adasa
  lexicon: LSJ
  rationale: For a place name with ἐν in a military movement context, English idiom
    prefers 'at Adasa' when referring to the location of encampment.
- source_word: ἐν τρισχιλίοις ἀνδράσιν
  chosen: with three thousand men
  alternatives:
  - among three thousand men
  - in the company of three thousand men
  lexicon: LSJ
  rationale: The phrase indicates the force accompanying Judas. 'With three thousand
    men' is the most natural military rendering in English.
- source_word: προσηύξατο
  chosen: prayed
  alternatives:
  - offered prayer
  lexicon: LSJ
  rationale: Standard rendering for the middle form of προσεύχομαι. 'Prayed' is direct
    and readable without loss of meaning.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: LSJ
  rationale: A straightforward narrative verb introducing the following prayer. 'Said'
    best matches normal English narrative style.
