translation:
  text: And Alcimus contended for the high priesthood.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠγωνίσατο
  chosen: contended
  alternatives:
  - fought
  - strove
  - struggled
  lexicon: BDAG
  rationale: The verb ἀγωνίζομαι denotes striving or contending in a struggle. In
    this context, with περὶ plus the office sought, 'contended' best captures active
    political struggle without overstating it as physical combat.
- source_word: Ἄλκιμος
  chosen: Alcimus
  alternatives:
  - Alkimos
  rationale: Personal names are transliterated by standard English convention. 'Alcimus'
    is the established and recognizable English form of Ἄλκιμος.
- source_word: περὶ
  chosen: for
  alternatives:
  - concerning
  - over
  lexicon: BDAG
  rationale: With a verb of striving, περὶ naturally conveys the object at stake.
    'For' is idiomatic English for contending to obtain an office.
- source_word: τῆς ἀρχιερωσύνης
  chosen: the high priesthood
  alternatives:
  - the office of high priest
  - the chief priesthood
  lexicon: LSJ
  rationale: ἀρχιερωσύνη refers to the office or dignity of the high priest. 'The
    high priesthood' is concise, natural, and preserves the institutional sense.
