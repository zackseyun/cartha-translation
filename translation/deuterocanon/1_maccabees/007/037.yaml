translation:
  text: You chose this house for your name to be called upon it, to be a house of
    prayer and petition for your people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to bear your name' or 'for your name to be invoked over it.' The Greek
      uses a biblical formula expressing that the house belongs to God and stands
      under his name.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελέξω
  chosen: you chose
  alternatives:
  - you selected
  - you elected
  lexicon: LSJ
  rationale: Aorist middle of ἐκλέγω, referring to God's choosing of the temple. 'Chose'
    is natural modern English and preserves the covenantal sense without sounding
    technical.
- source_word: τὸν οἶκον τοῦτον
  chosen: this house
  alternatives:
  - this temple
  - this building
  lexicon: LSJ
  rationale: οἶκος literally means 'house.' In temple-prayer contexts it refers to
    the sanctuary, but 'house' preserves the biblical idiom and allows the following
    purpose clause to carry the sacred sense.
- source_word: ἐπικληθῆναι τὸ ὄνομά σου ἐπ’ αὐτόν
  chosen: for your name to be called upon it
  alternatives:
  - for your name to be invoked over it
  - to bear your name
  lexicon: LSJ
  rationale: This is a standard biblical expression for divine ownership/association.
    'Called upon it' stays close to the Greek wording and preserves the allusive temple
    language better than the more interpretive 'to bear your name.'
- source_word: εἶναι
  chosen: to be
  alternatives:
  - as
  - for it to be
  lexicon: LSJ
  rationale: Infinitive of purpose/result continuing the sense of God's choosing the
    house. Simple 'to be' is sufficiently literal and clear.
- source_word: οἶκον προσευχῆς
  chosen: a house of prayer
  alternatives:
  - a house for prayer
  lexicon: LSJ
  rationale: This is a familiar and accurate rendering of the genitive construction,
    preserving the established biblical phrase without unnecessary archaism.
- source_word: καὶ δεήσεως
  chosen: and petition
  alternatives:
  - and supplication
  - and entreaty
  lexicon: LSJ
  rationale: δέησις denotes urgent request or supplication. 'Petition' is readable
    modern English and distinguishes it from the broader προσευχή ('prayer') while
    avoiding overly archaic diction.
- source_word: τῷ λαῷ σου
  chosen: for your people
  alternatives:
  - for the sake of your people
  - by your people
  lexicon: LSJ
  rationale: 'The dative is best taken here as advantage/reference: the house serves
    as a place of prayer and petition for God''s people. ''By your people'' is possible,
    but ''for your people'' better fits the syntax and sense in context.'
