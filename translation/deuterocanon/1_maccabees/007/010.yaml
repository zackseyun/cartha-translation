translation:
  text: And he departed and came into the land of Judah with a large force, and he
    sent messengers to Judas and to his brothers with peaceful words, but with deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'words of peace ... with guile.' The Greek contrasts outwardly peaceful
      speech with deceptive intent.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθεν
  chosen: departed
  alternatives:
  - went away
  - set out
  lexicon: LSJ
  rationale: Aorist of ἀπέρχομαι, marking departure from the previous location. 'Departed'
    preserves the movement away without over-specifying route or manner.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  - went
  lexicon: LSJ
  rationale: Paired with ἀπῆλθεν, the verb marks arrival at the destination. 'Came'
    keeps the simple narrative sequence of departure and arrival.
- source_word: μετὰ δυνάμεως πολλῆς
  chosen: with a large force
  alternatives:
  - with great power
  - with a great army
  lexicon: LSJ
  rationale: In military context δύναμις commonly refers to armed force or troops
    rather than abstract 'power.' 'Large force' is natural English and preserves the
    military sense without adding a term not explicit in the Greek.
- source_word: γῆν Ἰούδα
  chosen: the land of Judah
  alternatives:
  - Judah
  - the territory of Judah
  lexicon: LSJ
  rationale: The phrase explicitly includes γῆ, so 'the land of Judah' is more transparent
    than simply 'Judah' and reflects the territorial sense.
- source_word: ἀπέστειλεν ἀγγέλους
  chosen: sent messengers
  alternatives:
  - sent envoys
  - sent angels
  lexicon: LSJ
  rationale: Here ἀγγέλους clearly denotes human emissaries in a political-military
    setting. 'Messengers' is the broad, accurate rendering; 'envoys' is possible but
    slightly more formal than the context requires.
- source_word: πρὸς Ἰούδαν
  chosen: to Judas
  alternatives:
  - toward Judas
  lexicon: LSJ
  rationale: Standard directional use of πρός with accusative after 'sent'; 'to Judas'
    is idiomatic English.
- source_word: τοὺς ἀδελφοὺς αὐτοῦ
  chosen: his brothers
  alternatives:
  - his kinsmen
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural 'brothers.' Given the historical
    context, literal siblings or close male associates are in view; 'brothers' best
    matches the source and the project's gender-accurate policy.
- source_word: λόγους εἰρηνικοὺς
  chosen: peaceful words
  alternatives:
  - words of peace
  - peaceable words
  lexicon: LSJ
  rationale: The phrase describes the content or tone of the message. 'Peaceful words'
    is readable modern English while staying close to the Greek.
- source_word: μετὰ δόλου
  chosen: but with deceit
  alternatives:
  - with treachery
  - deceitfully
  - with guile
  lexicon: LSJ
  rationale: 'δόλος denotes deceit, trickery, or guile. Rendering it as ''but with
    deceit'' brings out the adversative sense in English: the words were peaceful
    in appearance, yet deceptive in intent.'
