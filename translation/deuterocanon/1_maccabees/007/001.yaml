translation:
  text: In the one hundred fifty-first year, Demetrius son of Seleucus went out from
    Rome, and went up with a few men to a city by the sea, and reigned there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a coastal city.' The Greek says literally 'to a city by the sea.'
    reason: lexical_alternative
  - marker: b
    text: Or 'became king there.' The Greek verb can denote either entering kingship
      or reigning as king, depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἔτους ἑνὸς καὶ πεντηκοστοῦ
  chosen: In the one hundred fifty-first year
  alternatives:
  - In year one hundred fifty-one
  - In the hundred and fifty-first year
  lexicon: LSJ
  rationale: The genitive absolute-like dating formula introduces the time reference.
    English idiom is best served by 'In the one hundred fifty-first year,' preserving
    the chronological notice without awkward literalism.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - departed
  - came out
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist of ἐξέρχομαι. 'Went out' preserves
    the movement from Rome without adding interpretive nuance such as 'escaped' or
    overly polished 'departed.'
- source_word: Δημήτριος ὁ τοῦ Σελεύκου
  chosen: Demetrius son of Seleucus
  alternatives:
  - Demetrius, the son of Seleucus
  - Demetrius of Seleucus
  lexicon: LSJ
  rationale: The article plus genitive patronymic is naturally rendered in English
    as 'son of Seleucus.' This makes the relationship explicit and readable.
- source_word: ἀνέβη
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: LSJ
  rationale: The common narrative verb ἀναβαίνω is retained as 'went up.' Although
    the destination is coastal, Greek narrative often uses 'go up' idiomatically for
    travel inland or to a place of significance; preserving it avoids over-interpretation.
- source_word: σὺν ἀνδράσιν ὀλίγοις
  chosen: with a few men
  alternatives:
  - accompanied by a few men
  - with few men
  lexicon: LSJ
  rationale: This is a simple accompaniment phrase. 'With a few men' is natural English
    and preserves the small size of his company.
- source_word: εἰς πόλιν παραθαλασσίαν
  chosen: to a city by the sea
  alternatives:
  - to a coastal city
  - to a seaside city
  lexicon: LSJ
  rationale: παραθαλάσσιος means 'by the sea' or 'coastal.' 'City by the sea' is transparent
    and slightly more formal than 'coastal city,' while remaining natural.
- source_word: ἐβασίλευσεν
  chosen: reigned there
  alternatives:
  - became king there
  - ruled there
  lexicon: LSJ
  rationale: The verb can mean 'became king' or 'reigned/ruled as king' depending
    on context. Here the narrative reports his assumption of kingship after arrival,
    and 'reigned there' preserves the royal sense without over-specifying enthronement
    mechanics.
