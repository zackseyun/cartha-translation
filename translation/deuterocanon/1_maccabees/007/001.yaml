theological_decisions:
- issue: Royal verb nuance in ἐβασίλευσεν
  chosen_reading: reigned there
  alternative_readings:
  - became king there
  - ruled there as king
  rationale: This is not a major doctrinal issue, but it is historically significant.
    The Greek aorist may summarize the onset of kingship rather than a prolonged reign.
    'Reigned there' keeps the royal office explicit while remaining close to the source;
    alternatives are preserved because the context could support 'became king there.'
  doctrine_reference: 'Translation philosophy §5: consistency of key terms, or documented
    exception.'
