theological_decisions:
- issue: Rendering the pejorative epithet ἀσεβῆ attached to Alcimus
  chosen_reading: the ungodly
  alternative_readings:
  - the impious
  - the wicked
  rationale: The epithet is part of the narrator's moral evaluation. 'Ungodly' preserves
    the explicitly religious dimension of the condemnation without softening it.
  doctrine_reference: Translation philosophy §1, §6
- issue: How literally to render ἔστησαν αὐτῷ τὴν ἱερωσύνην
  chosen_reading: established the priesthood for him
  alternative_readings:
  - appointed him to the priesthood
  rationale: The Greek wording is somewhat wooden in English but transparent. A more
    idiomatic rendering would make explicit that Alcimus was installed in priestly
    office; the chosen wording keeps the source structure more visible while remaining
    understandable.
  doctrine_reference: Translation philosophy §1, §5
- issue: Gendered phrase υἱοῖς Ἰσραήλ
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  rationale: The Greek is explicitly masculine plural and reflects a stock ethnic
    designation. Per gender-accurate policy, the masculine form is retained rather
    than neutralized.
  doctrine_reference: Translation philosophy §4
