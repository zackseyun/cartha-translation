translation:
  text: And he sent him, and Alcimus the ungodly, and established the priesthood for
    him, and commanded him to carry out vengeance among the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appointed him to the priesthood.' The Greek literally says 'established
      the priesthood for him,' referring to Alcimus's installation in priestly office.
    reason: lexical_alternative
  - marker: b
    text: Or 'against the sons of Israel.' The preposition may be understood as indicating
      the people within whom the vengeance was to be carried out, with hostile force
      implied by the context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard narrative verb for sending; 'sent' is natural modern English
    and sufficiently formal.
- source_word: Ἄλκιμον
  chosen: Alcimus
  rationale: Personal name is transliterated per project philosophy.
- source_word: τὸν ἀσεβῆ
  chosen: the ungodly
  alternatives:
  - the impious
  - the wicked
  lexicon: LSJ
  rationale: ἀσεβής denotes impiety or irreverence toward God; 'ungodly' preserves
    the religious-moral force better than the broader 'wicked.'
- source_word: ἔστησαν ... τὴν ἱερωσύνην
  chosen: established the priesthood for him
  alternatives:
  - appointed him to the priesthood
  - set up the priesthood for him
  lexicon: LSJ
  rationale: The Greek literally speaks of 'establishing the priesthood for him.'
    In context this means installing him in the high-priestly office, but 'established
    the priesthood for him' stays closer to the wording while remaining intelligible.
- source_word: ἱερωσύνην
  chosen: the priesthood
  alternatives:
  - priestly office
  lexicon: LSJ
  rationale: The noun denotes priesthood/priestly office. 'The priesthood' is the
    direct lexical equivalent; the contextual implication of office-holding is carried
    by the phrase as a whole.
- source_word: ἐνετείλατο
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: LSJ
  rationale: A straightforward rendering of the verb of command; 'commanded' preserves
    the authoritative force.
- source_word: ποιῆσαι τὴν ἐκδίκησιν
  chosen: to carry out vengeance
  alternatives:
  - to execute vengeance
  - to exact punishment
  lexicon: LSJ
  rationale: The phrase means to perform or inflict vengeance. 'Carry out vengeance'
    is idiomatic and preserves the severity without over-paraphrase.
- source_word: ἐν τοῖς υἱοῖς Ἰσραήλ
  chosen: among the sons of Israel
  alternatives:
  - against the sons of Israel
  - among the Israelites
  lexicon: LSJ
  rationale: ἐν with persons here most naturally indicates the sphere within which
    the vengeance is to be enacted. 'Among the sons of Israel' is a close rendering;
    'against' is interpretive and therefore preserved as an alternative rather than
    chosen in the main text.
