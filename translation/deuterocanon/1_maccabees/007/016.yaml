translation:
  text: 'And they trusted him, and he seized sixty men from among them and killed
    them in one day, according to the words that he wrote:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a mixed construction: ''they seized'' followed by ''he killed.''
      The translation smooths this to singular for coherent English while preserving
      the sense of the principal agent''s action.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐνεπίστευσαν
  chosen: they trusted
  alternatives:
  - they believed
  - they put their trust
  lexicon: BDAG
  rationale: The verb denotes placing trust or confidence in someone. In this narrative
    context, 'trusted' is the most natural English rendering and avoids an overly
    theological sense that 'believed' might suggest.
- source_word: συνέλαβον
  chosen: he seized
  alternatives:
  - they seized
  - he arrested
  - they arrested
  lexicon: LSJ
  rationale: Although the transmitted form is third person plural, the following singular
    verb ἀπέκτεινεν indicates the subject is effectively the hostile leader acting
    through his men. Rendering the clause with singular 'he seized' produces coherent
    English and reflects the narrative sense. The plural form is likely a stylistic
    or transmission-level irregularity preserved in the Greek witness.
- source_word: ἐξ αὐτῶν
  chosen: from among them
  alternatives:
  - from them
  lexicon: BDAG
  rationale: The phrase indicates selection out of a larger group. 'From among them'
    makes that partitive sense explicit in idiomatic English.
- source_word: ἑξήκοντα ἄνδρας
  chosen: sixty men
  alternatives:
  - sixty menfolk
  lexicon: BDAG
  rationale: A straightforward numerical expression referring to male persons. 'Men'
    is the natural and accurate rendering.
- source_word: ἀπέκτεινεν
  chosen: killed
  alternatives:
  - put to death
  - slew
  lexicon: BDAG
  rationale: The verb means to kill. 'Killed' is clear modern English; 'put to death'
    is possible but slightly more formal and may imply judicial process not stated
    here.
- source_word: ἐν ἡμέρᾳ μιᾷ
  chosen: in one day
  alternatives:
  - in a single day
  - on one day
  lexicon: BDAG
  rationale: The dative phrase marks time within which or on which the action occurred.
    'In one day' is idiomatic and preserves the force of the Greek.
- source_word: κατὰ τοὺς λόγους
  chosen: according to the words
  alternatives:
  - in accordance with the words
  - as the words said
  lexicon: BDAG
  rationale: The phrase introduces conformity with a prior written statement, likely
    a scriptural citation in the next verse. 'According to the words' preserves the
    formal link to that written wording.
- source_word: οὓς ἔγραφεν
  chosen: that he wrote
  alternatives:
  - which he wrote
  - that were written
  lexicon: BDAG
  rationale: The Greek is active singular, 'which he wrote.' The wording is somewhat
    abrupt in English because it anticipates the citation that follows, but it should
    be preserved rather than smoothed away. It likely refers to what the writer recorded
    in Scripture.
