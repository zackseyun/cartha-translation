theological_decisions:
- issue: Narrative subject shift between plural συνέλαβον and singular ἀπέκτεινεν
  chosen_reading: Render the seizure and killing with singular subject ('he seized
    ... and killed')
  alternative_readings:
  - 'Render literally: ''they seized ... and he killed'''
  rationale: The Greek witness presents a mixed-number sequence. Because the verse
    narrates the treacherous action of a single principal agent and the singular verb
    for killing governs the sense of the whole event, singular English yields the
    clearest and most coherent translation while documenting the irregularity. This
    is a narrative/grammatical decision, not a doctrinal one, but it materially affects
    interpretation of agency.
  doctrine_reference: 'Translation philosophy §5: consistency of key terms, or documented
    exception'
