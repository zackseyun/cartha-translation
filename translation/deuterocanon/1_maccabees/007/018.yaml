theological_decisions:
- issue: Whether στάσις should be rendered with covenantal language
  chosen_reading: agreement
  alternative_readings:
  - covenant
  - compact
  rationale: The verse condemns breach of a formal arrangement and oath, but the noun
    στάσις does not itself require the stronger theological freight of 'covenant.'
    'Agreement' preserves the legal-relational sense without overstating it.
  doctrine_reference: Translation philosophy §1, §5
