translation:
  text: And fear and dread fell upon all the people, for they said, “There is no truth
    or justice in them, for they have broken the agreement and the oath that they
    swore.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'compact' or 'covenant' for 'agreement'; the Greek term can denote a
      formal arrangement, and the context is strengthened by the accompanying oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέπεσεν
  chosen: fell upon
  alternatives:
  - came upon
  - fell
  lexicon: LSJ
  rationale: The aorist of ἐπιπίπτω commonly conveys something descending or coming
    suddenly upon someone. 'Fell upon' preserves the vivid idiom and fits the paired
    nouns φόβος and τρόμος.
- source_word: ὁ φόβος
  chosen: fear
  alternatives:
  - terror
  lexicon: LSJ
  rationale: φόβος is the broad term for fear. Since τρόμος follows, rendering φόβος
    as 'fear' and τρόμος as 'dread' preserves the distinction without over-intensifying
    both terms.
- source_word: ὁ τρόμος
  chosen: dread
  alternatives:
  - trembling
  - terror
  lexicon: LSJ
  rationale: While τρόμος can literally denote trembling, in this context with ἐπέπεσεν
    and directed toward the people it functions as an emotional state. 'Dread' communicates
    the sense naturally in English while avoiding a redundant 'fear and terror' pairing.
- source_word: εἰς πάντα τὸν λαόν
  chosen: upon all the people
  alternatives:
  - on all the people
  - throughout all the people
  lexicon: LSJ
  rationale: Although εἰς literally means 'into,' with verbs of falling and emotional
    states it can indicate extension over a group. 'Upon all the people' is idiomatic
    and keeps the distributive force of πάντα.
- source_word: ἀλήθεια
  chosen: truth
  alternatives:
  - faithfulness
  - reliability
  lexicon: LSJ
  rationale: The accusation concerns moral and covenantal trustworthiness. 'Truth'
    is the most direct rendering and pairs well with κρίσις; the broader nuance of
    reliability is carried by the context.
- source_word: κρίσις
  chosen: justice
  alternatives:
  - judgment
  - right judgment
  lexicon: LSJ
  rationale: Here κρίσις refers not merely to the act of judging but to just dealing.
    'Justice' best expresses the ethical complaint being made about their conduct.
- source_word: παρῆρσαν
  chosen: have broken
  alternatives:
  - have set aside
  - have violated
  - have transgressed
  lexicon: LSJ
  rationale: In context the verb describes violating obligations previously undertaken.
    'Have broken' is the clearest modern English expression for violating an agreement
    and oath.
- source_word: τὴν στάσιν
  chosen: the agreement
  alternatives:
  - the covenant
  - the compact
  - the pledge
  lexicon: LSJ
  rationale: στάσις often means 'standing' or 'position,' but in this context, paired
    with 'the oath that they swore,' it denotes the arrangement or compact they had
    entered into. 'Agreement' is clear and avoids importing stronger covenantal terminology
    than the Greek itself requires.
- source_word: τὸν ὅρκον ὃν ὤμοσαν
  chosen: the oath that they swore
  alternatives:
  - the sworn oath
  - the oath they took
  lexicon: LSJ
  rationale: This preserves the explicit verbal connection in Greek between ὅρκος
    and ὄμνυμι. The slightly repetitive English reflects the source's emphasis.
