lexical_decisions:
- source_word: ὤμοσεν
  chosen: swore
  alternatives:
  - took an oath
  lexicon: LSJ
  rationale: The aorist of ὄμνυμι denotes making an oath. 'Swore' is concise and natural
    English while preserving the solemn force.
- source_word: μετὰ θυμοῦ
  chosen: in anger
  alternatives:
  - with wrath
  - in fury
  lexicon: LSJ
  rationale: The phrase indicates the manner/emotional state of the oath. 'In anger'
    is idiomatic modern English and adequately reflects θυμός here without over-intensifying.
- source_word: παραδοθῇ
  chosen: are not delivered
  alternatives:
  - are not handed over
  - are not given up
  lexicon: LSJ
  rationale: Passive subjunctive of παραδίδωμι. 'Delivered' preserves the formal sense
    of being handed into another's power and fits the military/legal context.
- source_word: ἡ παρεμβολὴ αὐτοῦ
  chosen: his camp
  alternatives:
  - his army
  - his encampment
  lexicon: LSJ
  rationale: παρεμβολή can denote camp or army in encampment. 'Camp' best matches
    the concrete military sense and avoids overstating the term as the fighting force
    alone.
- source_word: τὸ νῦν
  chosen: now
  alternatives:
  - at once
  - this very time
  lexicon: LSJ
  rationale: The phrase emphasizes immediacy. 'Now' is the most direct rendering;
    stronger options like 'at once' are possible but slightly more interpretive.
- source_word: εἰς χεῖράς μου
  chosen: into my hands
  alternatives:
  - into my power
  lexicon: LSJ
  rationale: This is a common idiom for being given into someone's control. The literal
    'into my hands' is clear in English and preserves the imagery.
- source_word: ἐπιστρέψω ἐν εἰρήνῃ
  chosen: if I return in peace
  alternatives:
  - when I return safely
  - if I come back in peace
  lexicon: LSJ
  rationale: The clause is conditional and likely continues into the next verse. 'Return
    in peace' preserves the idiom and avoids narrowing εἰρήνῃ merely to physical safety.
