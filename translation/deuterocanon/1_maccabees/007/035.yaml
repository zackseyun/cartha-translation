theological_decisions:
- issue: Incomplete oath formula in this verse
  chosen_reading: Retain the sentence as an unfinished conditional clause ending with
    a comma
  alternative_readings:
  - Smooth into a complete English sentence by importing the continuation from the
    next verse
  rationale: The Greek of this verse ends mid-oath, with the apodosis continuing in
    the following verse. To remain anchored to the source witness, the translation
    preserves the incomplete form rather than artificially completing it within this
    verse.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; transparency about
    source form'
