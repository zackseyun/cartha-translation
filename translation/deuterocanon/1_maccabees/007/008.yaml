translation:
  text: And the king chose Bacchides, one of the king’s Friends, ruling in the region
    beyond the River, and great in the kingdom, and faithful to the king,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “The king’s Friends” likely reflects an official court rank or recognized
      class of royal advisers/companions in Hellenistic administration, not merely
      personal friendship.
    reason: cultural_note
  - marker: b
    text: “Beyond the River” is a territorial designation, probably the region west
      of the Euphrates under imperial administration; alternatively, simply “beyond
      the River.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέλεξεν
  chosen: chose
  alternatives:
  - selected
  - appointed
  lexicon: LSJ
  rationale: The verb straightforwardly denotes choosing/selecting. 'Chose' is the
    most natural English equivalent here; 'appointed' is possible by context but slightly
    more interpretive than the Greek itself requires.
- source_word: τῶν φίλων τοῦ βασιλέως
  chosen: one of the king’s Friends
  alternatives:
  - from the king’s friends
  - among the king’s companions
  lexicon: LSJ
  rationale: In Hellenistic court usage, 'Friends' can function as a semi-technical
    title for royal courtiers. Capitalizing 'Friends' preserves that likely official
    nuance while remaining transparent to English readers. The partitive sense is
    retained with 'one of.'
- source_word: κυριεύοντα
  chosen: ruling
  alternatives:
  - governing
  - having authority
  lexicon: LSJ
  rationale: The participle describes Bacchides as exercising authority over a territory.
    'Ruling' is concise and idiomatic; 'governing' is also possible but slightly more
    administrative in tone.
- source_word: ἐν τῷ πέραν τοῦ ποταμοῦ
  chosen: in the region beyond the River
  alternatives:
  - beyond the River
  - in Trans-Euphrates
  lexicon: LSJ
  rationale: The phrase is a known territorial designation, likely referring to the
    satrapy west of the Euphrates. 'Beyond the River' is formally close, but adding
    'the region' helps modern readers hear it as a territorial jurisdiction rather
    than a mere directional phrase. 'Trans-Euphrates' is accurate but too technical
    for the main text.
- source_word: μέγαν ἐν τῇ βασιλείᾳ
  chosen: great in the kingdom
  alternatives:
  - prominent in the kingdom
  - important in the kingdom
  lexicon: LSJ
  rationale: The adjective μέγαν here conveys status or influence rather than physical
    greatness. 'Great in the kingdom' preserves the source wording and leaves the
    social-political nuance intact without overexplaining.
- source_word: πιστὸν τῷ βασιλεῖ
  chosen: faithful to the king
  alternatives:
  - loyal to the king
  - trustworthy to the king
  lexicon: LSJ
  rationale: πιστός here denotes loyalty/reliability in relation to the king. 'Faithful'
    is a direct rendering and fits the political context well; 'loyal' is a viable
    alternative but slightly narrows the semantic range.
