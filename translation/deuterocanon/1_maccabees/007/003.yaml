translation:
  text: And when the matter became known to him, he said, “Do not show me their faces.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “Do not show me their faces,” an idiom for refusing to have them
      brought before him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώσθη
  chosen: became known
  alternatives:
  - was made known
  - was learned
  lexicon: LSJ
  rationale: 'Aorist passive of γινώσκω here is impersonal/passive in sense: the matter
    came to his knowledge. ''Became known'' is natural English while preserving the
    passive nuance better than a more active paraphrase.'
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - by him
  lexicon: LSJ
  rationale: 'Dative is best taken as indirect object with the passive verb: the matter
    became known to him, not that he was the agent of knowing.'
- source_word: τὸ πρᾶγμα
  chosen: the matter
  alternatives:
  - the affair
  - the thing
  lexicon: LSJ
  rationale: πρᾶγμα commonly denotes a matter, affair, or situation. 'The matter'
    is idiomatic and suitably broad in context.
- source_word: Μή μοι δείξητε
  chosen: Do not show me
  alternatives:
  - Do not let me see
  - Do not present to me
  lexicon: LSJ
  rationale: μή with the imperative gives a prohibition. δείκνυμι is literally 'show';
    retaining that wording keeps the force and directness of the command.
- source_word: τὰ πρόσωπα αὐτῶν
  chosen: their faces
  alternatives:
  - their persons
  - their presence
  lexicon: LSJ
  rationale: Literally 'their faces.' In context it idiomatically means bringing them
    before him, but 'their faces' is clear modern English and preserves the concrete
    expression of the Greek.
