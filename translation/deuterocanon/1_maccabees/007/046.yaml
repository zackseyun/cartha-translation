translation:
  text: And they came out from all the villages of Judea all around and outflanked
    them; and these turned back against them, and they all fell by the sword, and
    not even one of them was left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally has a compressed and somewhat awkward sequence, 'and these
      turned back against these,' leaving the exact referents of the pronouns implicit
      in context.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'outflanked' could also be understood more generally as
      'surrounded' or 'had the advantage over' in this battle scene.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξῆλθον
  chosen: came out
  alternatives:
  - went out
  lexicon: LSJ
  rationale: A straightforward narrative movement verb. 'Came out' reads naturally
    in English while preserving the sense of emerging from the villages.
- source_word: κωμῶν
  chosen: villages
  alternatives:
  - hamlets
  - settlements
  lexicon: LSJ
  rationale: κώμη commonly denotes a village rather than a city; 'villages' is the
    standard, clear rendering.
- source_word: κυκλόθεν
  chosen: all around
  alternatives:
  - from every side
  - round about
  lexicon: LSJ
  rationale: The adverb indicates encircling movement or position. 'All around' is
    idiomatic modern English and preserves the tactical sense.
- source_word: ὑπερεφέρων
  chosen: outflanked
  alternatives:
  - surrounded
  - pressed hard upon
  - had the advantage over
  lexicon: LSJ
  rationale: The form is unusual in context, but with κυκλόθεν and the battle setting
    it most plausibly conveys gaining positional advantage around the enemy. 'Outflanked'
    captures the military sense without overparaphrasing. 'Surrounded' is possible
    but stronger than the Greek requires.
- source_word: ἀνέστρεφον
  chosen: turned back
  alternatives:
  - retreated
  - turned around
  lexicon: LSJ
  rationale: The verb can mean turn back or return. In this combat context, 'turned
    back' preserves the ambiguity between reversal of movement and attempted retreat.
- source_word: οὗτοι πρὸς τούτους
  chosen: these turned back against them
  alternatives:
  - they turned back on them
  - the others turned back toward them
  lexicon: LSJ
  rationale: The pronouns are terse and somewhat awkward in Greek. The chosen rendering
    keeps the contrastive force without pretending greater specificity than the text
    provides.
- source_word: ἔπεσαν πάντες ῥομφαίᾳ
  chosen: they all fell by the sword
  alternatives:
  - they all were struck down by the sword
  - they all fell to the sword
  lexicon: LSJ
  rationale: A conventional battle idiom. 'Fell by the sword' is both natural and
    close to the Greek.
- source_word: οὐ κατελείφθη ἐξ αὐτῶν οὐδὲ εἷς
  chosen: not even one of them was left
  alternatives:
  - not one of them remained
  - none of them was left
  lexicon: LSJ
  rationale: This emphatic negation underscores total destruction. 'Not even one of
    them was left' preserves the emphasis of οὐδὲ εἷς.
