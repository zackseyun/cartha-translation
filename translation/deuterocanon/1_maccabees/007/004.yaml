translation:
  text: And the forces killed them, and Demetrius sat on the throne of his kingdom.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αἱ δυνάμεις
  chosen: the forces
  alternatives:
  - the troops
  - the army
  - the armed forces
  lexicon: LSJ
  rationale: δυνάμεις in this military narrative context refers to armed forces/troops
    rather than abstract 'powers.' 'The forces' is concise and preserves the collective
    military sense without over-specifying unit type.
- source_word: ἀπέκτειναν
  chosen: killed
  alternatives:
  - put to death
  - slew
  lexicon: LSJ
  rationale: The aorist verb straightforwardly denotes killing. 'Killed' is clear
    modern English; 'slew' is archaic, and 'put to death' can imply a more formal
    execution than the Greek itself requires.
- source_word: ἐκάθισεν
  chosen: sat
  alternatives:
  - took his seat
  - was seated
  lexicon: LSJ
  rationale: The verb literally means 'sat' and in enthronement context can imply
    accession. 'Sat on the throne' preserves the idiom closely while remaining natural
    English.
- source_word: ἐπὶ θρόνου βασιλείας αὐτοῦ
  chosen: on the throne of his kingdom
  alternatives:
  - on his royal throne
  - on the throne of his kingship
  lexicon: LSJ
  rationale: The phrase is formally 'on a throne of his kingdom/kingship.' 'On the
    throne of his kingdom' stays close to the Greek and conveys accession to royal
    rule. 'His royal throne' is smoother but slightly interpretive.
- source_word: Δημήτριος
  chosen: Demetrius
  rationale: Standard English transliteration of the personal name Δημήτριος.
