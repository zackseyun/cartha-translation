translation:
  text: And he came to Judas, and they greeted one another peaceably; but the enemies
    were ready to seize Judas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'peacefully' or 'in peace.' The Greek adverb emphasizes the apparently
      peaceful manner of the meeting.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb can mean 'snatch away' or 'seize suddenly,' highlighting
      the treacherous intent behind the peaceful greeting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν πρὸς Ἰούδαν
  chosen: came to Judas
  alternatives:
  - went to Judas
  - approached Judas
  lexicon: LSJ
  rationale: The aorist of ἔρχομαι with πρός naturally means movement toward a person.
    'Came to Judas' is straightforward modern English and preserves the narrative
    action without overinterpreting intent.
- source_word: ἠσπάσαντο ἀλλήλους
  chosen: they greeted one another
  alternatives:
  - they embraced one another
  - they exchanged greetings
  lexicon: LSJ
  rationale: ἀσπάζομαι commonly denotes greeting or saluting. While physical embrace
    can accompany the action, the verb itself does not require that nuance here, so
    'greeted one another' is the safer rendering.
- source_word: εἰρηνικῶς
  chosen: peaceably
  alternatives:
  - peacefully
  - in peace
  lexicon: LSJ
  rationale: The adverb marks the outwardly peaceful manner of the greeting. 'Peaceably'
    preserves the adverbial force and fits the ironic contrast with the hostile intent
    in the next clause.
- source_word: οἱ πολέμιοι
  chosen: the enemies
  alternatives:
  - the hostile men
  - his enemies
  lexicon: LSJ
  rationale: πολέμιος as a substantive means enemies or hostile parties. The article
    supports a definite group already understood in context. 'The enemies' is natural
    and sufficiently precise.
- source_word: ἕτοιμοι ἐξαρπάσαι
  chosen: were ready to seize
  alternatives:
  - were prepared to snatch away
  - were ready to capture
  lexicon: LSJ
  rationale: ἐξαρπάζω carries the sense of snatching or seizing suddenly. In this
    ambush context, 'seize' communicates the intended hostile action clearly without
    sounding overly wooden.
