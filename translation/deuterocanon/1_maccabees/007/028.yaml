translation:
  text: Let there be no battle between me and you. I will come with a few men, so
    that I may see your faces in peace.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μὴ ἔστω
  chosen: Let there be no
  alternatives:
  - May there not be
  - There must be no
  lexicon: BDAG
  rationale: The prohibitive construction with ἔστω is naturally rendered as a jussive
    appeal in English. 'Let there be no' preserves the directness without sounding
    overly stiff.
- source_word: μάχη
  chosen: battle
  alternatives:
  - fight
  - conflict
  lexicon: BDAG
  rationale: μάχη denotes fighting or battle. 'Battle' best fits the military-political
    setting of 1 Maccabees, while still working idiomatically in the singular.
- source_word: ἀνὰ μέσον ἐμοῦ καὶ ὑμῶν
  chosen: between me and you
  alternatives:
  - between me and you all
  - between us
  lexicon: BDAG
  rationale: This phrase straightforwardly marks relation between the speaker and
    the addressees. 'Between me and you' stays close to the Greek; 'between us' would
    be smoother but less transparent to the singular/plural distinction.
- source_word: ἥξω
  chosen: I will come
  alternatives:
  - I will arrive
  - I will go
  lexicon: BDAG
  rationale: Future of ἥκω here conveys coming/arriving. 'I will come' is the most
    natural English choice from the speaker's perspective.
- source_word: ἐν ἀνδράσιν ὀλίγοις
  chosen: with a few men
  alternatives:
  - among a few men
  - with few men
  lexicon: BDAG
  rationale: The preposition ἐν with persons can express accompaniment or association
    in this context. 'With a few men' communicates that he will come accompanied by
    only a small number. 'Men' is retained as gender-accurate and contextually appropriate
    for armed retainers.
- source_word: ἵνα ἴδω
  chosen: so that I may see
  alternatives:
  - in order that I may see
  - to see
  lexicon: BDAG
  rationale: The clause expresses purpose. 'So that I may see' preserves the purposive
    force more explicitly than the simpler infinitive 'to see.'
- source_word: ὑμῶν τὰ πρόσωπα
  chosen: your faces
  alternatives:
  - you face to face
  - your presence
  lexicon: BDAG
  rationale: Literally 'your faces.' This is a common idiom for personal encounter.
    Retaining 'your faces' preserves the concrete wording while remaining understandable
    in English.
- source_word: μετ’ εἰρήνης
  chosen: in peace
  alternatives:
  - peacefully
  - in friendship
  lexicon: BDAG
  rationale: The phrase indicates a peaceful manner or setting. 'In peace' is both
    literal and idiomatic enough here, and it preserves the relational emphasis better
    than the adverb 'peacefully.'
