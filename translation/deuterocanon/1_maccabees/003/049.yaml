translation:
  text: And they brought the priestly garments, and the firstfruits and the tithes;
    and they brought forward the Nazirites, who had completed their days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who had fulfilled the days of their vow.' The Greek literally says
      'who had completed the days,' an idiom for finishing the prescribed Nazirite
      period.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνεγκαν
  chosen: they brought
  alternatives:
  - they carried
  - they presented
  lexicon: LSJ
  rationale: Aorist of φέρω in this context naturally means bringing items to a place.
    'Brought' is straightforward modern English and fits both the garments and offerings.
- source_word: τὰ ἱμάτια τῆς ἱερωσύνης
  chosen: the priestly garments
  alternatives:
  - the garments of the priesthood
  - the vestments of the priesthood
  lexicon: LSJ
  rationale: The phrase denotes garments associated with priestly service. 'Priestly
    garments' is clear and natural; 'vestments' is possible but more ecclesiastical
    than needed.
- source_word: τὰ πρωτογεννήματα
  chosen: the firstfruits
  alternatives:
  - the firstborn offerings
  - the first produce
  lexicon: LSJ
  rationale: In cultic context alongside tithes, this refers to first produce or first
    offerings dedicated to God. 'Firstfruits' is the established and accurate cultic
    rendering in English.
- source_word: τὰς δεκάτας
  chosen: the tithes
  alternatives:
  - the tenth portions
  lexicon: LSJ
  rationale: Standard rendering for δεκάται in biblical and cultic contexts; clear
    and consistent.
- source_word: ἤγειραν
  chosen: they brought forward
  alternatives:
  - they raised up
  - they roused
  - they assembled
  lexicon: LSJ
  rationale: Literally 'they raised,' but with persons in this setting it likely means
    causing them to stand forth or presenting them publicly. 'Brought forward' communicates
    the action idiomatically without implying resurrection or mere awakening.
- source_word: τοὺς Ναζιραίους
  chosen: the Nazirites
  alternatives:
  - the Nazirite men
  - those under a Nazirite vow
  lexicon: LSJ
  rationale: Ναζιραῖος is a recognized term for one under the Nazirite vow. Transliteration
    preserves the technical religious category better than a paraphrase.
- source_word: οἳ ἐπλήρωσαν τὰς ἡμέρας
  chosen: who had completed their days
  alternatives:
  - who had fulfilled the days of their vow
  - whose time was completed
  lexicon: LSJ
  rationale: The idiom refers to the completion of the prescribed period of the Nazirite
    vow. 'Completed their days' stays close to the Greek while remaining intelligible;
    the vow-specific sense is preserved in the lexical rationale and footnote.
