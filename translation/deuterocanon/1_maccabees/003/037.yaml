translation:
  text: And the king took half of the forces that had been left behind and departed
    from Antioch, the city of his kingdom, in the one hundred forty-seventh year;
    and he crossed the Euphrates River and traveled through the upper regions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Antioch, the royal city of his kingdom.' The Greek phrase 'from
      the city of his kingdom' may function appositionally to identify Antioch as
      the king's royal/capital city.
    reason: lexical_alternative
  - marker: b
    text: That is, the one hundred forty-seventh year of the Seleucid era.
    reason: cultural_note
  - marker: c
    text: Or 'the upper provinces' or 'the inland regions.' The Greek expression likely
      refers to territories east of the Euphrates.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέλαβεν
  chosen: took
  alternatives:
  - received
  - took along
  lexicon: BDAG
  rationale: In this military context, the verb indicates that the king took with
    him or assumed command of the remaining half of the forces. 'Took' is concise
    and natural English while preserving the action.
- source_word: τὰς ἡμίσεις τῶν δυνάμεων
  chosen: the half of the forces
  alternatives:
  - half of the troops
  - the half of the army
  lexicon: LSJ
  rationale: The phrase is literally 'the halves/half of the forces.' 'Forces' preserves
    the broader military sense of δυνάμεις without over-specifying a single army unit.
    The singular 'half' reflects the intended sense in English.
- source_word: τὰς καταλειφθείσας
  chosen: that had been left behind
  alternatives:
  - that remained
  - that had been left
  lexicon: BDAG
  rationale: The participle modifies the forces and indicates those previously left
    behind. 'Had been left behind' captures the prior action more clearly than the
    flatter 'remained.'
- source_word: ἀπῆρεν
  chosen: departed
  alternatives:
  - set out
  - went away
  lexicon: BDAG
  rationale: A standard travel verb; 'departed' fits the formal narrative style and
    pairs well with the following geographic details.
- source_word: ἀπὸ πόλεως βασιλείας αὐτοῦ
  chosen: from the city of his kingdom
  alternatives:
  - from the royal city of his kingdom
  - from the capital city of his kingdom
  lexicon: LSJ
  rationale: The Greek is somewhat literal and appositional after 'from Antioch.'
    'The city of his kingdom' stays close to the source without importing the interpretive
    term 'capital,' though that is likely the sense.
- source_word: ἔτους ἑβδόμου καὶ τεσσερακοστοῦ καὶ ἑκατοστοῦ
  chosen: in the one hundred forty-seventh year
  alternatives:
  - in year one hundred forty-seven
  lexicon: LSJ
  rationale: This is the standard Greek way of expressing 147. Rendering it in normal
    English number style improves readability while preserving the chronological notice.
- source_word: διεπέρασεν
  chosen: crossed
  alternatives:
  - passed over
  lexicon: BDAG
  rationale: The verb refers to crossing the Euphrates. 'Crossed' is the plain and
    accurate English equivalent.
- source_word: τὸν Εὐφράτην ποταμόν
  chosen: the Euphrates River
  alternatives:
  - the river Euphrates
  lexicon: LSJ
  rationale: Natural English order is preferable here while preserving the proper
    name and the fact that it is a river.
- source_word: διεπορεύετο
  chosen: traveled through
  alternatives:
  - went through
  - journeyed through
  lexicon: BDAG
  rationale: The imperfect suggests continued movement. 'Traveled through' communicates
    ongoing progress through the regions.
- source_word: τὰς ἐπάνω χώρας
  chosen: the upper regions
  alternatives:
  - the inland regions
  - the upper provinces
  lexicon: LSJ
  rationale: ἐπάνω can denote upper or inland territories, likely the interior eastern
    provinces beyond the Euphrates. 'Upper regions' stays close to the Greek and avoids
    over-interpreting the geography.
