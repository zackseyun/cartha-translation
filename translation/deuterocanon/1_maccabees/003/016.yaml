translation:
  text: And he came near as far as the ascent of Beth-horon, and Judas went out to
    meet him with only a few men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Μεθωρών reflects the place commonly known as Beth-horon.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισεν
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: LSJ
  rationale: The aorist of ἐγγίζω denotes approaching or coming near. 'Came near'
    is natural modern English and preserves the movement toward the location without
    overformal diction.
- source_word: ἕως ἀναβάσεως
  chosen: as far as the ascent
  alternatives:
  - up to the ascent
  - to the pass/ascent
  lexicon: LSJ
  rationale: ἕως with the genitive marks extent, and ἀνάβασις here refers to an uphill
    approach or ascent. 'As far as the ascent' preserves the topographical sense and
    the boundary nuance of ἕως.
- source_word: Μεθωρών
  chosen: Beth-horon
  alternatives:
  - Beth Horon
  - Methoron
  lexicon: LSJ
  rationale: Although the Greek form is Μεθωρών, the place is the well-known site
    Beth-horon. Per project philosophy, personal and place names are transliterated
    by standard conventions rather than mechanically reproducing the Greek spelling.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - came out
  - marched out
  lexicon: LSJ
  rationale: The verb literally means 'went out.' 'Marched out' would add military
    color not explicit in the verb itself, so 'went out' is preferred.
- source_word: εἰς συνάντησιν αὐτῷ
  chosen: to meet him
  alternatives:
  - for an encounter with him
  - to meet with him
  lexicon: LSJ
  rationale: This idiom commonly means going out to meet someone. 'To meet him' is
    the clearest idiomatic English equivalent.
- source_word: ὀλίγος
  chosen: with only a few men
  alternatives:
  - being few
  - with a small force
  - few in number
  lexicon: LSJ
  rationale: The adjective stands predicatively with Judas and indicates that he had
    only a small number with him. English requires an explicit complement; 'with only
    a few men' conveys the military context without excessive paraphrase.
