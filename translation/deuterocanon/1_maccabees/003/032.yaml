translation:
  text: And he left Lysias, a distinguished man and of the royal family, over the
    affairs of the king, from the Euphrates River as far as the borders of Egypt,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατέλιπεν
  chosen: left
  alternatives:
  - appointed
  - entrusted
  lexicon: LSJ
  rationale: The verb literally means 'left' or 'left behind,' but in context it implies
    assigning responsibility during absence. 'Left' preserves the Greek wording while
    allowing the administrative sense to be inferred from the following phrase.
- source_word: ἄνθρωπον ἔνδοξον
  chosen: an honored man
  alternatives:
  - a distinguished man
  - a glorious man
  - an eminent man
  lexicon: LSJ
  rationale: ἔνδοξος denotes someone held in honor or distinction. 'Honored' is natural
    English and preserves the sense of recognized status without overstating with
    'glorious.'
- source_word: ἀπὸ γένους τῆς βασιλείας
  chosen: of the royal family
  alternatives:
  - of royal lineage
  - from the kingly stock
  - from the royal race
  lexicon: LSJ
  rationale: The phrase indicates descent from the ruling line. 'Of the royal family'
    is clear modern English and communicates lineage rather than merely political
    association.
- source_word: ἐπὶ τῶν πραγμάτων τοῦ βασιλέως
  chosen: over the affairs of the king
  alternatives:
  - in charge of the king's affairs
  - over the king's business
  - over the matters of the king
  lexicon: LSJ
  rationale: πράγματα here refers to administrative matters or business. 'Over the
    affairs of the king' keeps the governing sense of ἐπί with a genitive construction
    in idiomatic English.
- source_word: ἀπὸ τοῦ ποταμοῦ Εὐφράτου
  chosen: from the Euphrates River
  alternatives:
  - from the river Euphrates
  - from the Euphrates
  lexicon: LSJ
  rationale: The Greek explicitly includes 'the river Euphrates.' 'Euphrates River'
    is standard English order and preserves the geographical designation.
- source_word: ἕως τῶν ὁρίων Αἰγύπτου
  chosen: as far as the borders of Egypt
  alternatives:
  - up to the borders of Egypt
  - to the frontier of Egypt
  lexicon: LSJ
  rationale: ὅρια denotes boundaries or border regions. 'As far as the borders of
    Egypt' clearly expresses the territorial extent of Lysias's charge.
