translation:
  text: and to settle foreigners throughout all their territories, and to distribute
    their land by lot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'foreigners' or 'sons of strangers.' The Greek is
      literally 'foreign sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατοικίσαι
  chosen: to settle
  alternatives:
  - to settle as inhabitants
  - to colonize
  - to cause to dwell
  lexicon: LSJ
  rationale: The aorist infinitive of κατοικίζω here expresses the policy of establishing
    people in residence within the conquered region. 'To settle' is natural English
    and preserves the causative sense without over-paraphrasing. 'Colonize' is possible
    but slightly more interpretive and modern in tone.
- source_word: υἱοὺς ἀλλοτρίους
  chosen: foreign sons
  alternatives:
  - foreigners
  - alien people
  - sons of strangers
  lexicon: LSJ
  rationale: The Greek is literally 'foreign sons.' In this context it refers to outsiders
    planted in the land, but the source uses the masculine noun υἱούς rather than
    a generic ethnos term. Following the project's gender-accurate principle, the
    main text preserves 'sons' rather than flattening to 'foreigners.'
- source_word: ἐν πᾶσι τοῖς ὁρίοις αὐτῶν
  chosen: throughout all their territories
  alternatives:
  - in all their borders
  - within all their regions
  lexicon: LSJ
  rationale: ὅρια can mean borders, boundaries, or territories. In context the sense
    is not merely boundary lines but the full extent of the people's regions. 'Throughout
    all their territories' communicates that scope clearly in modern English.
- source_word: κατακληρονομῆσαι
  chosen: to distribute by lot
  alternatives:
  - to apportion by lot
  - to take possession as an inheritance
  - to parcel out as an inheritance
  lexicon: LSJ
  rationale: The compound verb carries the idea of assigning or apportioning as an
    inheritance, often by lot. Because γῆν is the object and the context is redistribution
    of conquered land, 'to distribute by lot' best captures the action succinctly.
    The lot/inheritance nuance is important and should not be reduced to a generic
    'divide.'
- source_word: τὴν γῆν αὐτῶν
  chosen: their land
  alternatives:
  - their country
  - their territory
  lexicon: LSJ
  rationale: γῆ here refers to the land belonging to the displaced people. 'Their
    land' is the most direct and idiomatic rendering.
