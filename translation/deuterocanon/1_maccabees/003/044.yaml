theological_decisions:
- issue: Rendering συναγωγή in a deuterocanonical historical context
  chosen_reading: the assembly
  alternative_readings:
  - the congregation
  - the synagogue
  rationale: The verse describes the gathered people as a body preparing both for
    war and for prayer. Translating as 'assembly' avoids anachronistically suggesting
    a building or fixed institution while still reflecting the communal dimension
    of the Greek.
