id: 1MA.3.44
reference: 1 Maccabees 3:44
source:
  edition: lxx-swete-1909
  text: καὶ ἠθροίσθη ἡ συναγωγὴ τοῦ εἶναι ἑτοίμους εἰς πόλεμον, καὶ τοῦ προσεύξασθαι
    καὶ αἰτῆσαι ἔλεον καὶ οἰκτειρμούς.
