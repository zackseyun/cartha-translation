translation:
  text: And they cried out with a loud voice to heaven, saying, “What shall we do
    with these, and where shall we take them?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where shall we lead them away?' The Greek verb can more specifically
      suggest taking or leading them away from the present danger.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβόησαν
  chosen: they cried out
  alternatives:
  - they shouted
  - they called out
  lexicon: LSJ
  rationale: The verb denotes a forceful vocal outcry. 'Cried out' preserves the urgency
    and prayer-like appeal in context better than the flatter 'called out.'
- source_word: φωνῇ
  chosen: with a loud voice
  alternatives:
  - with a voice
  - aloud
  lexicon: LSJ
  rationale: Although literally 'with a voice,' the idiom with βοάω commonly intensifies
    the cry. 'With a loud voice' is natural English and preserves the emphatic force
    without paraphrasing.
- source_word: εἰς τὸν οὐρανόν
  chosen: to heaven
  alternatives:
  - into heaven
  - toward heaven
  lexicon: LSJ
  rationale: In this prayer context, the phrase indicates direction of appeal. 'To
    heaven' is idiomatic English and conveys that they are crying upward to God without
    overtranslating the implied referent.
- source_word: Τί ποιήσωμεν
  chosen: What shall we do
  alternatives:
  - What are we to do
  - What should we do
  lexicon: LSJ
  rationale: The deliberative subjunctive is well represented by 'What shall we do,'
    which keeps the urgent, uncertain tone.
- source_word: τούτοις
  chosen: with these
  alternatives:
  - for these
  - about these
  lexicon: LSJ
  rationale: The dative here is contextually flexible. 'With these' is the most direct
    rendering and leaves the object unspecified as in the Greek, likely referring
    to the vulnerable persons mentioned in the surrounding context.
- source_word: ἀπαγάγωμεν
  chosen: take them
  alternatives:
  - lead them away
  - bring them away
  lexicon: LSJ
  rationale: The compound verb includes the sense of leading away from the present
    place. 'Take them' is concise, natural English; the directional nuance is sufficiently
    carried by 'where shall we take them?' without sounding wooden.
