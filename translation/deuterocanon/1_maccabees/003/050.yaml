- issue: Implicit addressee in the cry to heaven
  chosen_reading: Retain 'to heaven' rather than making God explicit
  alternative_readings:
  - to God in heaven
  - to the Lord
  rationale: The Greek names heaven, not God directly. The context implies prayer,
    but the translation should preserve the source wording and not import an explicit
    divine title absent from the text.
