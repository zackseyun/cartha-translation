translation:
  text: And he enlarged the glory of his people; he put on a breastplate like a giant,
    and strapped on his weapons of war; he set battles in order, shielding the camp
    with the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'increased the honor/renown of his people.' The Greek uses a verb meaning
      'made broad' metaphorically for increasing glory.
    reason: lexical_alternative
  - marker: b
    text: '''Like a giant'' may also be understood more generally as ''like a mighty
      warrior'' or ''champion,'' but the Greek word is literally ''giant.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'organized battles' / 'undertook wars.' The Greek expression can emphasize
      arranging military action, not only participating in it.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλάτυνεν
  chosen: enlarged
  alternatives:
  - broadened
  - increased
  - made great
  lexicon: LSJ
  rationale: The verb literally means 'made broad/wide' and idiomatically 'increased'
    or 'magnified.' 'Enlarged' preserves the concrete metaphor while reading naturally
    in English with 'glory.'
- source_word: δόξαν
  chosen: glory
  alternatives:
  - honor
  - renown
  lexicon: LSJ
  rationale: δόξα here refers to public honor or renown gained for the nation. 'Glory'
    keeps the elevated register and allows the phrase to retain its biblical resonance,
    though 'renown' is a plausible contextual alternative.
- source_word: τῷ λαῷ αὐτοῦ
  chosen: his people
  alternatives:
  - his nation
  lexicon: LSJ
  rationale: λαός commonly means 'people' in a collective national sense. 'His people'
    is the most direct rendering and fits the covenantal-national context without
    over-specifying ethnicity.
- source_word: ἐνεδύσατο θώρακα
  chosen: put on a breastplate
  alternatives:
  - clothed himself with a breastplate
  - put on armor
  lexicon: LSJ
  rationale: The phrase is straightforwardly martial. 'Breastplate' is more precise
    than the broader 'armor' and reflects θώραξ accurately.
- source_word: ὡς γίγας
  chosen: like a giant
  alternatives:
  - like a mighty man
  - like a champion
  lexicon: LSJ
  rationale: γίγας literally means 'giant.' In context it functions as a heroic comparison.
    The literal rendering is vivid and sufficiently clear in modern English.
- source_word: συνεζώσατο
  chosen: strapped on
  alternatives:
  - girded on
  - belted on
  lexicon: LSJ
  rationale: The verb refers to girding oneself with equipment. 'Strapped on' communicates
    the action idiomatically in modern English without archaic phrasing.
- source_word: τὰ σκεύη τὰ πολεμικὰ αὐτοῦ
  chosen: his weapons of war
  alternatives:
  - his war gear
  - his military equipment
  lexicon: LSJ
  rationale: σκεύη can mean equipment or gear; with πολεμικά it denotes martial implements.
    'Weapons of war' preserves the military sense and suits the immediate context
    of battle.
- source_word: πολέμους συνεστήσατο
  chosen: he set battles in order
  alternatives:
  - he organized battles
  - he undertook wars
  - he engaged in battles
  lexicon: LSJ
  rationale: The expression suggests arranging or conducting military engagements
    rather than merely fighting. 'Set battles in order' preserves the organizational
    nuance of συνίστημι while remaining readable.
- source_word: σκεπάζων τὴν παρεμβολὴν
  chosen: shielding the camp
  alternatives:
  - covering the camp
  - protecting the army camp
  lexicon: LSJ
  rationale: The participle conveys protective action. παρεμβολή is 'camp' or 'encampment';
    'shielding the camp' captures both the military setting and the defensive nuance.
- source_word: ἐν ῥομφαίᾳ
  chosen: with the sword
  alternatives:
  - by the sword
  - with his sword
  lexicon: LSJ
  rationale: ῥομφαία is a large sword. English usually does not need to distinguish
    the weapon type here. 'With the sword' is natural and preserves the instrumental
    sense of ἐν.
