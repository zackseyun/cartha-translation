translation:
  text: And he said, “I will make a name for myself, and I will be glorified in the
    kingdom, and I will fight Judah and those with him who are disregarding the king’s
    word.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judas'; the Greek name here refers to Judas Maccabeus.
    reason: alternative_reading
  - marker: b
    text: Or 'who are despising the king’s word.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the king’s command' or 'the king’s decree.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ποιήσω ἐμαυτῷ ὄνομα
  chosen: I will make a name for myself
  alternatives:
  - I will win renown for myself
  - I will gain a name for myself
  lexicon: LSJ
  rationale: Idiomatic Greek expression for acquiring fame or reputation. 'Make a
    name for myself' preserves the idiom naturally in English and reflects the self-aggrandizing
    force of ἐμαυτῷ.
- source_word: δοξασθήσομαι
  chosen: I will be glorified
  alternatives:
  - I will be honored
  - I will win glory
  lexicon: LSJ
  rationale: The passive/future form naturally yields 'I will be glorified.' This
    keeps the glory/honor semantic field explicit rather than flattening it to mere
    success.
- source_word: ἐν τῇ βασιλείᾳ
  chosen: in the kingdom
  alternatives:
  - in the realm
  - in the kingdom of the king
  lexicon: LSJ
  rationale: βασιλεία most directly means 'kingdom' or 'realm.' Since the Greek does
    not explicitly repeat 'of the king,' 'in the kingdom' is the most textually restrained
    rendering.
- source_word: πολεμήσω
  chosen: I will fight
  alternatives:
  - I will make war against
  - I will wage war against
  lexicon: LSJ
  rationale: '''Fight'' is concise and natural, while still conveying military hostility.
    ''Make war against'' is possible but slightly more expansive than the immediate
    wording requires.'
- source_word: τὸν Ἰούδαν
  chosen: Judah
  alternatives:
  - Judas
  lexicon: LSJ
  rationale: The Greek form Ἰούδαν can refer to the person Judas Maccabeus, but the
    standard transliteration policy favors forms closer to the source-language name
    family. Here 'Judah' preserves the Greek form while still identifying the individual
    leader in context.
- source_word: τοὺς σὺν αὐτῷ
  chosen: those with him
  alternatives:
  - his companions
  - those who are with him
  lexicon: LSJ
  rationale: A straightforward rendering of the article plus prepositional phrase,
    preserving the open-ended reference to Judah's associates without over-specifying
    their role.
- source_word: τοὺς ἐξουθενοῦντας
  chosen: who are disregarding
  alternatives:
  - who are despising
  - who are treating as nothing
  - who are defying
  lexicon: LSJ
  rationale: ἐξουθενέω carries the sense of treating with contempt or as nothing.
    'Disregarding' fits the object 'the king's word' in idiomatic English while still
    implying contemptuous rejection.
- source_word: τὸν λόγον τοῦ βασιλέως
  chosen: the king’s word
  alternatives:
  - the king's command
  - the king's decree
  lexicon: LSJ
  rationale: λόγος is literally 'word,' and the phrase likely refers to the king's
    command or edict. 'The king's word' preserves the lexical form while remaining
    intelligible in context.
