theological_decisions:
- issue: Collective sense of 'Jacob'
  chosen_reading: Retain 'Jacob' as the text's covenantal name for the people rather
    than substituting 'Israel.'
  alternative_readings:
  - Israel
  rationale: The verse uses the ancestral name in a collective, covenantal sense.
    Preserving 'Jacob' reflects the source wording and avoids smoothing away the biblical
    register.
  doctrine_reference: Translation philosophy §1, §2
- issue: Blessing formula in the final clause
  chosen_reading: Render the idiom as 'his remembrance is for blessing forever.'
  alternative_readings:
  - his memory will be blessed forever
  - his memorial is blessed forever
  rationale: The Greek presents a nominal blessing formula rather than an explicit
    passive verb. Keeping the formulaic structure preserves the scriptural tone without
    overinterpreting.
  doctrine_reference: Translation philosophy §1, §6
