translation:
  text: And he embittered many kings, and he made Jacob glad by his deeds, and his
    remembrance is for blessing forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his memory is blessed forever.' The Greek uses a blessing formula literally,
      'his remembrance is for blessing forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίκρανεν
  chosen: embittered
  alternatives:
  - made bitter
  - grieved
  - provoked
  lexicon: LSJ
  rationale: The verb literally conveys making bitter. 'Embittered' preserves the
    metaphor and the force of Judas's effect on hostile rulers better than the flatter
    'grieved' or the more interpretive 'provoked'.
- source_word: βασιλεῖς πολλούς
  chosen: many kings
  alternatives:
  - many rulers
  lexicon: LSJ
  rationale: βασιλεῖς straightforwardly means 'kings.' 'Rulers' is broader but less
    precise than the Greek.
- source_word: ηὔφρανεν
  chosen: made glad
  alternatives:
  - gladdened
  - gave joy to
  lexicon: LSJ
  rationale: The verb denotes causing joy or gladness. 'Made glad' is clear modern
    English and keeps the causative sense.
- source_word: τὸν Ἰακώβ
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: LSJ
  rationale: The Greek reads 'Jacob,' a collective designation for the people. The
    transliterated form should be preserved rather than replacing it with the interpretive
    equivalent 'Israel'.
- source_word: ἐν τοῖς ἔργοις αὐτοῦ
  chosen: by his deeds
  alternatives:
  - in his works
  - through his actions
  lexicon: LSJ
  rationale: The phrase indicates the means or sphere by which Jacob was gladdened.
    'By his deeds' is idiomatic and faithful without sounding wooden.
- source_word: τὸ μνημόσυνον αὐτοῦ
  chosen: his remembrance
  alternatives:
  - his memory
  - the memory of him
  lexicon: LSJ
  rationale: μνημόσυνον can denote remembrance or memorial. 'His remembrance' stays
    close to the Greek structure and fits the following blessing formula.
- source_word: εἰς εὐλογίαν
  chosen: for blessing
  alternatives:
  - as a blessing
  - in blessing
  lexicon: LSJ
  rationale: This echoes biblical idiom in which a person's memory/remembrance is
    'for blessing.' 'For blessing' preserves that formulaic sense more directly than
    a freer paraphrase.
- source_word: ἕως τοῦ αἰῶνος
  chosen: forever
  alternatives:
  - unto the age
  - for all time
  lexicon: LSJ
  rationale: The idiom means enduring perpetually. 'Forever' is the most natural concise
    rendering in English.
