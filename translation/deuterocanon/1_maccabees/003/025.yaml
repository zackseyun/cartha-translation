translation:
  text: And the fear of Judas and his brothers began, and downfall was falling upon
    the nations around them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fear of Judas and his brothers came to be,' that is, dread of them spread
      among others.
    reason: lexical_alternative
  - marker: b
    text: Or 'ruin kept falling upon the surrounding nations'; the Greek imperfect
      suggests continuing action.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξατο
  chosen: began
  alternatives:
  - came upon
  - arose
  lexicon: LSJ
  rationale: 'Aorist middle of ἄρχομαι here marks the inception of a state: ''began''
    naturally conveys the start of fear spreading.'
- source_word: ὁ φόβος
  chosen: the fear
  alternatives:
  - fear
  - dread
  - terror
  lexicon: LSJ
  rationale: With the article and as subject, the phrase is best rendered literally
    as 'the fear,' meaning fear associated with Judas and his brothers coming into
    effect among others. 'Dread' or 'terror' are possible but stronger than the Greek
    requires.
- source_word: Ἰούδα καὶ τῶν ἀδελφῶν αὐτοῦ
  chosen: of Judas and of his brothers
  alternatives:
  - concerning Judas and his brothers
  - caused by Judas and his brothers
  lexicon: LSJ
  rationale: 'The genitives are most naturally taken as objective/associative after
    φόβος: fear connected with Judas and his brothers. ''Of Judas and of his brothers''
    preserves the Greek structure without over-interpreting the relation.'
- source_word: ἡ πτῶσις
  chosen: downfall
  alternatives:
  - fall
  - collapse
  - ruin
  lexicon: LSJ
  rationale: πτῶσις can denote a fall or ruin. 'Downfall' fits the military-political
    context better than a merely physical 'fall' and avoids overstatement beyond the
    noun's scope.
- source_word: ἐπίπτεν
  chosen: was falling
  alternatives:
  - fell
  - kept falling
  - came upon
  lexicon: LSJ
  rationale: The imperfect indicates ongoing or progressive action. 'Was falling'
    preserves that aspect more transparently than simple past 'fell.'
- source_word: ἐπὶ τὰ ἔθνη
  chosen: upon the nations
  alternatives:
  - on the Gentiles
  - upon the peoples
  lexicon: LSJ
  rationale: In 1 Maccabees, ἔθνη commonly refers to surrounding non-Jewish nations/peoples.
    'Nations' is the broadest and least interpretively loaded rendering in this military
    setting.
- source_word: τὰ κύκλῳ αὐτῶν
  chosen: around them
  alternatives:
  - surrounding them
  - all around them
  lexicon: LSJ
  rationale: The phrase denotes the neighboring peoples geographically around Judas
    and his brothers. 'Around them' is concise and faithful.
