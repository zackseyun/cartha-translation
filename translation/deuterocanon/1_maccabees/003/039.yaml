translation:
  text: And he sent with them forty thousand men and seven thousand cavalry, to come
    into the land of Judah and destroy it, according to the word of the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the command of the king.' The Greek says 'according to
      the word of the king,' where 'word' carries the force of an order in context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'seven thousand horse'; the Greek likely uses 'horse' metonymically
      for mounted troops, hence 'cavalry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: The aorist of ἀποστέλλω here denotes sending out troops with commanders.
    'Sent' is natural modern English and sufficiently formal; 'dispatched' is possible
    but slightly more stylized.
- source_word: μετʼ αὐτῶν
  chosen: with them
  alternatives:
  - along with them
  lexicon: LSJ
  rationale: The phrase indicates that the troops accompanied the previously mentioned
    leaders. 'With them' is the most direct rendering.
- source_word: τεσσεράκοντα χιλιάδας ἀνδρῶν
  chosen: forty thousand men
  alternatives:
  - forty thousand soldiers
  lexicon: LSJ
  rationale: ἀνδρῶν is literally 'men.' In military context 'soldiers' is interpretive,
    but the Greek itself says 'men,' and the number already implies fighting forces.
    This preserves source wording while remaining clear.
- source_word: ἑπτακισχιλίον ἵππον
  chosen: seven thousand cavalry
  alternatives:
  - seven thousand horsemen
  - seven thousand horses
  lexicon: LSJ
  rationale: Although ἵππος literally means 'horse,' in military enumeration it commonly
    stands metonymically for mounted troops. 'Cavalry' communicates the military sense
    idiomatically in English. 'Horsemen' is also possible; 'horses' would be too literal
    and misleading in this context.
- source_word: τοῦ ἐλθεῖν
  chosen: to come
  alternatives:
  - to go
  - for them to come
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose. 'To come' follows the Greek
    verb ἐλθεῖν directly. English can use 'to come' from the narrator's perspective
    without awkwardness here.
- source_word: εἰς γῆν Ἰούδα
  chosen: into the land of Judah
  alternatives:
  - into Judea
  - into Judah's land
  lexicon: LSJ
  rationale: γῆ can mean land/territory. 'The land of Judah' preserves the geographic
    wording of the Greek better than the more interpretive regional label 'Judea.'
- source_word: καταφθεῖραι
  chosen: destroy
  alternatives:
  - devastate
  - lay waste
  lexicon: LSJ
  rationale: The infinitive denotes destructive action against the land. 'Destroy'
    is broad and strong, matching the force of the Greek without over-specifying the
    manner. 'Lay waste' is possible but more idiomatic than necessary.
- source_word: κατὰ τὸν λόγον τοῦ βασιλέως
  chosen: according to the word of the king
  alternatives:
  - according to the command of the king
  - as the king had ordered
  lexicon: LSJ
  rationale: λόγος can mean word, statement, or command depending on context. Since
    this is a royal directive, 'command' is interpretively strong, but 'according
    to the word of the king' preserves the Greek expression transparently while still
    making sense in English.
