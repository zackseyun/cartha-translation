translation:
  text: As his will is in heaven, so he will do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more expansively, 'Whatever his will may be in heaven, that is what
      he will do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δʼ ἂν ᾖ
  chosen: As ... is
  alternatives:
  - Whatever ... may be
  - Just as ... is
  lexicon: LSJ
  rationale: The combination introduces a comparative clause with an indefinite nuance,
    but in idiomatic English here the sense is best carried by 'As ... is' leading
    into the correlative 'so.'
- source_word: θέλημα
  chosen: will
  alternatives:
  - desire
  - purpose
  lexicon: BDAG
  rationale: θέλημα commonly denotes will or intention. 'Will' is the most natural
    and theologically neutral rendering in this context.
- source_word: ἐν οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: LSJ
  rationale: The singular English 'heaven' is standard and idiomatic for the Greek
    singular here.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: LSJ
  rationale: 'The adverb pairs naturally with the opening comparative clause: ''As
    ... so ...''.'
- source_word: ποιήσει
  chosen: he will do
  alternatives:
  - he will act
  - he will accomplish it
  lexicon: BDAG
  rationale: ποιέω is broad. 'He will do' preserves the simplicity and directness
    of the Greek without adding an object not stated in the text.
