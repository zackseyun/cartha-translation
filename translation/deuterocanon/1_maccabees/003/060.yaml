theological_decisions:
- issue: Implicit subject of ποιήσει
  chosen_reading: he will do
  alternative_readings:
  - it will be done
  rationale: The Greek verb is active with an implicit masculine singular subject
    carried from context, not an impersonal passive. The translation preserves that
    personal agency without over-specifying beyond the verse itself.
