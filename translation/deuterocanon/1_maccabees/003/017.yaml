  text: ὡς δὲ ἴδαν τὴν παρεμβολὴν ἐρχομένην εἰς συνάντησιν αὐτῷ, εἶπαν τῷ Ἰούδᾳ Πῶς
    δυνησόμεθα ὀλιγοστοὶ ὄντες πολεμῆσαι πρὸς πλῆθος τοσοῦτο; καὶ ἡμεῖς ἐκλελύμεθα
    ἀσιτοῦντες σήμερον.
