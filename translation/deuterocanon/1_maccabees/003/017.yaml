translation:
  text: But when they saw the camp coming to meet him, they said to Judas, “How can
    we, being so few, fight against so great a multitude? And we are exhausted, having
    gone without food today.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “coming against him.” The Greek phrase can be rendered more neutrally
      as “coming to meet him,” but in this military context it implies hostile encounter.
    reason: lexical_alternative
  - marker: b
    text: Or “we are faint.” The Greek can denote a weakened or dispirited condition;
      here it is linked to having gone without food.
    reason: lexical_alternative
  - marker: c
    text: “Having gone without food” could also be rendered “fasting,” but the wording
      does not by itself require a formal religious fast.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεμβολήν
  chosen: camp
  alternatives:
  - army
  - encampment
  lexicon: LSJ
  rationale: In military context παρεμβολή commonly denotes a camp or army in camp.
    'Camp' preserves the concrete image of the approaching force without overinterpreting
    it as the army abstractly.
- source_word: ἐρχομένην εἰς συνάντησιν αὐτῷ
  chosen: coming to meet him
  alternatives:
  - coming against him
  - advancing to encounter him
  lexicon: LSJ
  rationale: The phrase literally indicates movement into an encounter with him. 'Coming
    to meet him' is natural English and leaves the hostile context to be inferred
    from the military setting.
- source_word: ὀλιγοστοὶ ὄντες
  chosen: being so few
  alternatives:
  - being few
  - few in number
  lexicon: LSJ
  rationale: This expresses their numerical smallness. 'Being so few' is idiomatic
    and reflects the emphatic contrast with the large opposing force.
- source_word: πολεμῆσαι
  chosen: fight
  alternatives:
  - make war
  - do battle
  lexicon: LSJ
  rationale: '''Fight'' is the clearest modern equivalent in this immediate context.'
- source_word: πρὸς πλῆθος τοσοῦτο
  chosen: against such a great multitude
  alternatives:
  - against so large a crowd
  - against such a multitude
  lexicon: LSJ
  rationale: πλῆθος here refers to a large mass of opposing troops. 'Such a great
    multitude' preserves the scale and rhetorical force.
- source_word: ἐκλελύμεθα
  chosen: we are exhausted
  alternatives:
  - we are worn out
  - we are faint
  lexicon: LSJ
  rationale: The perfect/passive form conveys a present state of being weakened or
    dispirited. 'Exhausted' communicates physical depletion well in connection with
    fasting.
- source_word: ἀσιτοῦντες
  chosen: having gone without food
  alternatives:
  - being without food
  - fasting
  lexicon: LSJ
  rationale: The participle denotes not eating. 'Having gone without food' is explicit
    and avoids implying a formal religious fast unless the context requires it.
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: LSJ
  rationale: Simple temporal adverb; 'today' is the natural modern rendering.
