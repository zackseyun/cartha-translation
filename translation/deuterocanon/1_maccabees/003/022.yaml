theological_decisions:
- issue: Identity and emphasis of the subject αὐτὸς
  chosen_reading: The subject is rendered emphatically as 'he himself,' referring
    to God as the one who will defeat the enemies.
  alternative_readings:
  - A less emphatic 'he will crush them'
  rationale: In context Judas is encouraging the people by grounding victory in divine
    action. The emphatic pronoun should be reflected in English without overexplication.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
