translation:
  text: And he himself will crush them before us; but as for you, do not fear them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συντρίψει
  chosen: will crush
  alternatives:
  - will shatter
  - will break
  lexicon: LSJ
  rationale: The future of συντίβω commonly conveys forceful breaking or crushing.
    'Will crush' is vivid, natural English and preserves the martial force better
    than the weaker 'break.'
- source_word: πρὸ προσώπου ἡμῶν
  chosen: before us
  alternatives:
  - from before us
  - in our presence
  lexicon: LSJ
  rationale: The idiom literally means 'before our face/presence.' 'Before us' captures
    both the spatial sense and the likely meaning that the defeat will happen in front
    of or in the face of Israel. 'From before us' is more wooden and less natural
    in English here.
- source_word: μὴ φοβηθῆτε ἀπʼ αὐτῶν
  chosen: do not fear them
  alternatives:
  - do not be afraid of them
  lexicon: LSJ
  rationale: The aorist passive/deponent subjunctive with μή gives a prohibition.
    'Do not fear them' is concise and direct; 'do not be afraid of them' is also possible
    but slightly more expansive without adding meaning.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - he personally
  lexicon: LSJ
  rationale: The pronoun is emphatic. 'He himself' preserves the emphasis that the
    subject—not Israel's own strength—is the decisive actor.
