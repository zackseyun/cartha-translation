translation:
  text: 'And after this Judas appointed leaders of the people: commanders of thousands,
    and of hundreds, and of fifties, and of tens.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chiefs of the people'; the Greek term is a general word for those who
      lead, followed by specific military ranks.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ μετὰ τοῦτο
  chosen: And after this
  alternatives:
  - And after these things
  - Then after this
  lexicon: LSJ
  rationale: A straightforward temporal transition. 'After this' is natural modern
    English while preserving the sequence marked by the Greek.
- source_word: κατέστησεν
  chosen: appointed
  alternatives:
  - set up
  - established
  - placed
  lexicon: LSJ
  rationale: In this context of assigning military-administrative roles, the verb
    denotes installing persons into office or responsibility. 'Appointed' is idiomatic
    and precise.
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  rationale: Standard transliteration of the personal name in 1 Maccabees. 'Judas'
    is the conventional English form for Ἰούδας in this period and context.
- source_word: ἡγουμένους
  chosen: leaders
  alternatives:
  - governors
  - chiefs
  - those leading
  lexicon: LSJ
  rationale: The participial noun refers broadly to those placed in leadership over
    the people. Because the following appositional titles specify military ranks,
    'leaders' preserves the general heading without over-narrowing it to civil governance.
- source_word: τοῦ λαοῦ
  chosen: of the people
  alternatives:
  - over the people
  - for the people
  lexicon: LSJ
  rationale: The genitive naturally attaches to 'leaders' as 'leaders of the people.'
    English does not require an explicit 'over,' and the phrase remains clear in context.
- source_word: χιλιάρχους
  chosen: commanders of thousands
  alternatives:
  - captains over thousands
  - thousand-commanders
  - tribunes
  lexicon: LSJ
  rationale: In this list of graded officers, a transparent rendering is preferable
    to a later Roman-specific term like 'tribunes.' 'Commanders of thousands' preserves
    the numerical structure.
- source_word: ἑκατοντάρχους
  chosen: of hundreds
  alternatives:
  - centurions
  - commanders of hundreds
  lexicon: LSJ
  rationale: 'Because the first item already supplies ''commanders,'' English can
    carry that sense through the coordinated list: ''commanders of thousands, and
    of hundreds...'' This avoids importing the specifically Roman term ''centurions''
    into a Jewish military setting.'
- source_word: πεντηκοντάρχους
  chosen: of fifties
  alternatives:
  - commanders of fifties
  lexicon: LSJ
  rationale: Rendered in parallel with the surrounding numerical ranks to preserve
    the structured hierarchy in concise English.
- source_word: δεκαδάρχους
  chosen: of tens
  alternatives:
  - commanders of tens
  lexicon: LSJ
  rationale: Rendered consistently with the preceding rank terms, preserving the graded
    military organization reflected in the Greek.
