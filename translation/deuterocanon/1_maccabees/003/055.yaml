  text: Καὶ μετὰ τοῦτο κατέστησεν Ἰούδας ἡγουμένους τοῦ λαοῦ, χιλιάρχους καὶ ἑκατοντάρχους
    καὶ πεντηκοντάρχους καὶ δεκαδάρχους.
