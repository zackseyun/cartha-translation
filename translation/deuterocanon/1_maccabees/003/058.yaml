translation:
  text: And Judas said, “Gird yourselves, and become mighty men, and be ready in the
    morning to fight against these nations that have assembled against us to destroy
    us and our holy things.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'show yourselves mighty men' / 'become strong men'; Greek literally,
      'become mighty sons.'
    reason: lexical_alternative
  - marker: b
    text: Or 'our sanctuary'; Greek has the plural 'our holy things,' which may refer
      broadly to the sacred things or holy precincts.
    reason: alternative_reading
lexical_decisions:
- source_word: Περιζώσασθε
  chosen: Gird yourselves
  alternatives:
  - Belt yourselves
  - Prepare yourselves
  lexicon: LSJ
  rationale: The middle imperative literally refers to girding oneself, a martial/preparatory
    idiom. 'Gird yourselves' preserves the vividness and military tone better than
    the flatter 'prepare yourselves.'
- source_word: γίνεσθε εἰς υἱοὺς δυνατούς
  chosen: become mighty sons
  alternatives:
  - show yourselves mighty men
  - be men of strength
  - become strong men
  lexicon: LSJ
  rationale: The Greek is literally 'become into mighty sons.' The phrase is idiomatic
    for valiant/mighty men, but the source explicitly uses 'sons.' Following the project's
    gender-accurate principle, 'sons' is retained rather than neutralizing to 'men,'
    while 'mighty' conveys δυνατούς.
- source_word: ἕτοιμοι
  chosen: ready
  alternatives:
  - prepared
  lexicon: LSJ
  rationale: A straightforward rendering in context; 'ready' is natural modern English
    and fits the military exhortation.
- source_word: εἰς τὸ πρωῒ
  chosen: in the morning
  alternatives:
  - by morning
  - at daybreak
  lexicon: LSJ
  rationale: The phrase points to the coming morning as the time of readiness. 'In
    the morning' is the most direct and least interpretive rendering.
- source_word: πολεμῆσαι
  chosen: to fight
  alternatives:
  - to wage war
  lexicon: LSJ
  rationale: '''To fight'' is idiomatic and clear in English while preserving the
    military sense.'
- source_word: ἔθνεσιν
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: LSJ
  rationale: In 1 Maccabees this often refers to foreign peoples hostile to Judea.
    'Nations' is the broad, source-near rendering; 'Gentiles' would import a more
    specifically Jewish/ethnic contrast not demanded by this immediate context.
- source_word: ἐπισυνηγμένοις
  chosen: have gathered together
  alternatives:
  - have assembled
  - have been gathered
  lexicon: LSJ
  rationale: The participle denotes hostile forces assembled against Judas's group.
    'Have gathered together' reflects both the perfective/resultative sense and the
    compound verb's emphasis.
- source_word: ἐξᾶραι
  chosen: to destroy
  alternatives:
  - to wipe out
  - to take away
  lexicon: LSJ
  rationale: In this context of military threat against persons and sanctuary, the
    infinitive conveys removal by destruction. 'Destroy' is strong and appropriate
    without becoming colloquial.
- source_word: τὰ ἅγια ἡμῶν
  chosen: our holy things
  alternatives:
  - our sanctuary
  - our holy place
  - our sacred things
  lexicon: LSJ
  rationale: The plural τὰ ἅγια is broader than a singular 'sanctuary' and can denote
    sacred things/holy precincts. 'Our holy things' keeps the plural form and avoids
    over-specifying, while still reflecting what the attackers threaten.
