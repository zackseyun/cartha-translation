theological_decisions:
- issue: Gendered martial expression in γίνεσθε εἰς υἱοὺς δυνατούς
  chosen_reading: Retain 'sons' in the main text
  alternative_readings:
  - mighty men
  - men of valor
  rationale: The Greek explicitly uses 'sons,' likely as a Semitic-influenced idiom
    for valiant men. Per doctrine, gender-accurate renderings are preferred over neutralization
    when the source is masculine. The more idiomatic alternatives are preserved as
    lexical alternatives rather than adopted in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Referent of τὰ ἅγια ἡμῶν
  chosen_reading: Translate broadly as 'our holy things'
  alternative_readings:
  - our sanctuary
  - our holy place
  rationale: 'The plural form leaves the referent somewhat open: sacred things, holy
    precincts, or the sanctuary complex. To preserve that breadth and avoid interpretive
    narrowing, the main text keeps the plural and a footnote preserves the more specific
    alternative.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
