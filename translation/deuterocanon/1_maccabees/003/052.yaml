theological_decisions:
- issue: Referent of 'the nations' in a deuterocanonical Jewish war-prayer context
  chosen_reading: Rendered as 'the nations' rather than 'the Gentiles'
  alternative_readings:
  - the Gentiles
  - the peoples
  rationale: The Greek ἔθνη can mean nations/peoples broadly or Gentiles in contrast
    to Israel. Here the military-political sense is primary, and 'the nations' preserves
    the wording without importing later technical religious usage.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy
    over translation tradition
