translation:
  text: And behold, the nations have gathered against us to destroy us; you know what
    they are planning against us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to destroy us.' The Greek verb can denote removing or annihilating;
      'wipe us out' brings out the total threat in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'what they are devising against us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: LSJ
  rationale: Retained as 'behold' to preserve the prayerful urgency and deictic force
    of the Greek without over-paraphrasing.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: LSJ
  rationale: In 1 Maccabees this commonly refers to the surrounding non-Jewish nations/peoples
    hostile to Israel. 'The nations' is the most direct and contextually appropriate
    rendering, avoiding the more theologically loaded 'Gentiles' here.
- source_word: συνῆκται
  chosen: have gathered
  alternatives:
  - have assembled
  - are gathered together
  lexicon: LSJ
  rationale: Perfect tense conveys a present state resulting from gathering; 'have
    gathered' gives natural English while preserving that force.
- source_word: ἐφʼ ἡμᾶς
  chosen: against us
  alternatives:
  - upon us
  - over us
  lexicon: LSJ
  rationale: In this hostile military context, 'against us' best expresses adversarial
    direction.
- source_word: τοῦ ἐξᾶραι ἡμᾶς
  chosen: to wipe us out
  alternatives:
  - to destroy us
  - to remove us
  lexicon: LSJ
  rationale: The infinitive expresses purpose. 'Wipe us out' captures the forceful
    sense of eliminating a people, in idiomatic but not exaggerated English. 'Destroy
    us' is possible, but 'wipe us out' better reflects the totalizing threat in context.
- source_word: σὺ οἶδας
  chosen: you know
  alternatives:
  - you are aware
  - you know well
  lexicon: LSJ
  rationale: Simple direct address to God; plain English best matches the Greek.
- source_word: ἃ λογίζονται
  chosen: what they are planning
  alternatives:
  - what they are devising
  - what they are thinking
  lexicon: LSJ
  rationale: λογίζομαι here refers to hostile calculation or intent, not mere thought.
    'Planning' communicates deliberate design in context.
