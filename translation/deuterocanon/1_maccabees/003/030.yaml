translation:
  text: and he became afraid that he might not have enough, as once and twice before,
    for the expenses and the gifts that he had formerly given with a generous hand,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a lavish hand.' The Greek idiom emphasizes openhanded generosity
      in giving.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλαβήθη
  chosen: became afraid
  alternatives:
  - was apprehensive
  - feared
  lexicon: LSJ
  rationale: Aorist passive/deponent of εὐλαβέομαι here expresses apprehension or
    fear about a possible shortfall. 'Became afraid' preserves the ingressive sense
    without overstating reverential nuance that the verb can have elsewhere.
- source_word: μὴ οὐκ ἔχῃ
  chosen: that he might not have enough
  alternatives:
  - that he might not have
  - lest he should not have
  lexicon: LSJ
  rationale: The construction expresses fear of lacking resources. 'Have enough' makes
    explicit the implied financial sufficiency in context, since the following phrase
    specifies expenses and gifts.
- source_word: ὡς ἅπαξ καὶ δὶς
  chosen: as once and twice before
  alternatives:
  - as formerly once and twice
  - as on previous occasions
  lexicon: LSJ
  rationale: The idiom points to repeated prior occasions, not strictly only two instances.
    'As once and twice before' keeps the Greek wording while signaling prior repetition.
- source_word: δαπάνας
  chosen: expenses
  alternatives:
  - costs
  - expenditures
  lexicon: LSJ
  rationale: A straightforward financial term; 'expenses' is natural modern English
    and fits the royal-fiscal context.
- source_word: δόματα
  chosen: gifts
  alternatives:
  - grants
  - presents
  lexicon: LSJ
  rationale: Refers to distributions or benefactions given out by the king. 'Gifts'
    is broad enough to preserve the sense without narrowing to a technical administrative
    term.
- source_word: ἐδίδου
  chosen: he had formerly given
  alternatives:
  - he used to give
  - he was giving before
  lexicon: LSJ
  rationale: Imperfect indicates customary past action. 'Had formerly given' fits
    the retrospective frame created by ἔμπροσθεν and reads smoothly in English.
- source_word: ἔμπροσθεν
  chosen: formerly
  alternatives:
  - before
  - previously
  lexicon: LSJ
  rationale: Temporal sense is primary here, referring to earlier times of greater
    royal generosity.
- source_word: δαψιλῇ χειρί
  chosen: with a generous hand
  alternatives:
  - with a lavish hand
  - freely
  lexicon: LSJ
  rationale: The phrase is idiomatic for liberality or lavish giving. 'With a generous
    hand' preserves the metaphor while remaining idiomatic in English.
