translation:
  text: And they set out with all their forces and came and encamped near Emmaus in
    the plain country.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more conventionally, 'Emmaus.' The Greek source here reads Ἀμμαοῦν, reflected
      in the main text as 'Ammaus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆραν
  chosen: set out
  alternatives:
  - marched off
  - departed
  - moved out
  lexicon: LSJ
  rationale: The verb here denotes breaking camp or moving off on campaign. 'Set out'
    is natural modern English and preserves the military movement without over-specifying
    pace or formation.
- source_word: σὺν πάσῃ τῇ δυνάμει αὐτῶν
  chosen: with all their forces
  alternatives:
  - with all their army
  - with all their power
  lexicon: LSJ
  rationale: δύναμις in this military context refers to armed strength/troops rather
    than abstract power. 'Forces' captures the collective military sense better than
    the more singular 'army' while remaining idiomatic.
- source_word: παρεβάλον
  chosen: encamped
  alternatives:
  - camped
  - pitched camp
  lexicon: LSJ
  rationale: The verb commonly means to encamp in military narrative. 'Encamped' preserves
    the formal military register and matches the campaign setting.
- source_word: πλησίον
  chosen: near
  alternatives:
  - close to
  - by
  lexicon: LSJ
  rationale: A straightforward spatial term; 'near' is the most direct and idiomatic
    rendering.
- source_word: Ἀμμαοῦν
  chosen: Ammaus
  alternatives:
  - Emmaus
  lexicon: LSJ
  rationale: The Greek form in Swete is Ἀμμαοῦν, which is more directly represented
    by 'Ammaus.' The more familiar 'Emmaus' is a conventional Anglicization and worth
    preserving in a footnote, but the main text should stay anchored to the source
    form.
- source_word: ἐν τῇ γῇ τῇ πεδινῇ
  chosen: in the plain country
  alternatives:
  - in the plain
  - in the lowland
  lexicon: LSJ
  rationale: The phrase literally refers to the level/plain region. 'Plain country'
    is clear English that reflects the adjectival force of πεδινῇ without sounding
    overly technical.
