translation:
  text: And Judas learned of it, and he went out to meet him and struck him down and
    killed him; and many fell wounded, and the rest fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'many fell wounded.' The Greek specifies wounded casualties
      here rather than explicitly saying 'many were killed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνω
  chosen: learned of it
  alternatives:
  - knew
  - found out
  - became aware
  lexicon: BDAG
  rationale: Aorist of γινώσκω here refers to coming to know the situation/report,
    not mere ongoing knowledge. 'Learned of it' captures the ingressive sense in natural
    English and explains Judas's immediate response.
- source_word: ἐξῆλθεν εἰς συνάντησιν αὐτῷ
  chosen: went out to meet him
  alternatives:
  - went out against him
  - came out for an encounter with him
  lexicon: LSJ
  rationale: The idiom εἰς συνάντησιν commonly means 'to meet.' In military context
    it implies confrontation, but 'went out to meet him' preserves the Greek wording
    without over-paraphrasing.
- source_word: ἐπάταξεν αὐτόν
  chosen: struck him down
  alternatives:
  - struck him
  - defeated him
  - smote him
  lexicon: LSJ
  rationale: πατάσσω often denotes a forceful blow or military striking. Because ἀπέκτεινεν
    follows, 'struck him down' distinguishes the initial blow/action from the explicit
    killing while keeping the martial force.
- source_word: ἀπέκτεινεν
  chosen: killed him
  alternatives:
  - slew him
  - put him to death
  lexicon: BDAG
  rationale: Straightforward rendering of ἀποκτείνω. 'Killed' is clear modern English
    and avoids archaic diction.
- source_word: ἔπεσον τραυματίαι πολλοί
  chosen: many fell wounded
  alternatives:
  - many fell as wounded men
  - many were wounded and fell
  - many casualties fell
  lexicon: LSJ
  rationale: τραυματίαι denotes wounded persons. The phrase likely summarizes the
    enemy losses after the leader's death. 'Many fell wounded' is concise and close
    to the Greek, preserving the image of battlefield collapse without importing 'dead'
    where the text says 'wounded.'
- source_word: οἱ ἐπίλοιποι
  chosen: the rest
  alternatives:
  - the remainder
  - those left
  lexicon: BDAG
  rationale: Standard rendering for the survivors/remnant of the opposing force in
    context.
- source_word: ἔφυγον
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: BDAG
  rationale: Simple military retreat language; 'fled' is direct and suitably formal.
