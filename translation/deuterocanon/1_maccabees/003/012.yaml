translation:
  text: And they took their equipment, and Judas took the sword of Apollonius, and
    he fought with it all his days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the days'; the phrase may be taken more literally, but in context
      it likely means for the rest of Judas's life.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκεύη
  chosen: equipment
  alternatives:
  - gear
  - arms
  - spoils
  lexicon: LSJ
  rationale: In military context σκεύη commonly refers to equipment or gear. 'Equipment'
    is broad enough to include military kit without over-specifying items not named
    in the Greek.
- source_word: μάχαιρα
  chosen: sword
  alternatives:
  - dagger
  - short sword
  lexicon: LSJ
  rationale: Although μάχαιρα can denote a shorter blade or large knife, 'sword' is
    the natural English rendering in this martial narrative and avoids unnecessary
    precision beyond the source.
- source_word: ἦν πολεμῶν
  chosen: he kept fighting
  alternatives:
  - he was fighting
  - he fought
  lexicon: LSJ
  rationale: The periphrastic construction with ἦν + participle conveys ongoing or
    customary action. 'Kept fighting' captures the durative sense better than a simple
    past.
- source_word: ἐν αὐτῇ
  chosen: with it
  alternatives:
  - by it
  - in it
  lexicon: LSJ
  rationale: The pronoun most naturally refers back to the sword, and instrumental
    English 'with it' expresses the sense idiomatically.
- source_word: πάσας τὰς ἡμέρας
  chosen: all his days
  alternatives:
  - all the days
  - continually
  lexicon: LSJ
  rationale: The Greek literally reads 'all the days,' but in context it idiomatically
    refers to the remainder of Judas's life or career. 'All his days' is natural English
    and preserves the idiomatic force.
