  text: καὶ ἔλαβον τὰ σκεύη αὐτῶν, καὶ τὴν μάχαιραν Ἀπολλωνίου ἔλαβεν Ἰούδας, καὶ
    ἦν πολεμῶν ἐν αὐτῇ πάσας τὰς ἡμέρας.
