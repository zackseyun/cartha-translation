translation:
  text: And when he stopped speaking, he suddenly charged at them, and Seron and his
    camp were crushed before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sprang upon them' / 'rushed upon them' for the sudden attack implied
      by the Greek verb.
    reason: lexical_alternative
  - marker: b
    text: '''His camp'' may also be understood more broadly as ''his army'' or ''his
      force.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ ἐπαύσατο λαλῶν
  chosen: And when he stopped speaking
  alternatives:
  - And after he finished speaking
  - And as soon as he ceased speaking
  lexicon: LSJ
  rationale: The clause marks immediate sequence after Judas's speech. 'Stopped speaking'
    is natural modern English while remaining close to the Greek participial expression.
- source_word: ἐνήλατο
  chosen: charged at
  alternatives:
  - sprang upon
  - rushed upon
  - attacked
  lexicon: LSJ
  rationale: The verb conveys a sudden aggressive movement. 'Charged at' preserves
    the martial force and works well with ἄφνω ('suddenly').
- source_word: ἐπʼ αὐτούς
  chosen: at them
  alternatives:
  - upon them
  - against them
  lexicon: LSJ
  rationale: With a verb of attack, 'at them' is idiomatic in English and keeps the
    directional force without sounding archaic.
- source_word: ἄφνω
  chosen: suddenly
  alternatives:
  - unexpectedly
  - all at once
  lexicon: LSJ
  rationale: A straightforward adverb indicating abruptness; 'suddenly' is the clearest
    equivalent.
- source_word: συνετρίβη
  chosen: were crushed
  alternatives:
  - was shattered
  - was broken
  - was defeated
  lexicon: LSJ
  rationale: The passive verb literally suggests being broken or crushed. Because
    the subject is compound ('Seron and his camp'), English uses plural 'were crushed.'
    This preserves the vivid force better than the flatter 'were defeated.'
- source_word: Σήρων
  chosen: Seron
  alternatives:
  - Syron
  rationale: Standard transliteration of the proper name from the Greek form Σήρων.
- source_word: ἡ παρεμβολὴ αὐτοῦ
  chosen: his camp
  alternatives:
  - his army
  - his encampment
  - his force
  lexicon: LSJ
  rationale: παρεμβολή can denote a camp or army in camp. Here 'his camp' keeps the
    concrete military image and fits the narrative of a routed force.
- source_word: ἐνώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: LSJ
  rationale: A common idiom meaning 'before him' or 'in front of him.' Here it indicates
    that Seron and his camp were crushed in Judas's presence/by direct confrontation.
