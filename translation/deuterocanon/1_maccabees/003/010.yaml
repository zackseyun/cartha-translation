translation:
  text: And Apollonius gathered Gentiles, and from Samaria a large force to wage war
    against Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nations.' The Greek term can mean 'nations' generally, but here likely
      refers to non-Israelite peoples gathered against Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήγαγεν
  chosen: gathered
  alternatives:
  - assembled
  - collected
  - mustered
  lexicon: LSJ
  rationale: The aorist verb denotes bringing people together. 'Gathered' is straightforward
    and natural English; 'mustered' is possible in a military context, but the object
    includes both peoples and a force, so 'gathered' preserves the broader sense without
    over-specifying.
- source_word: ἔθνη
  chosen: Gentiles
  alternatives:
  - nations
  - pagans
  lexicon: LSJ
  rationale: In this Jewish narrative context, ἔθνη commonly refers to non-Israelite
    peoples rather than 'nations' in a neutral geopolitical sense. 'Gentiles' best
    captures the contrast with Israel in the verse. 'Pagans' would add a religious
    nuance not explicit in the word itself.
- source_word: δύναμιν μεγάλην
  chosen: a large force
  alternatives:
  - great power
  - a great army
  - a large army
  lexicon: LSJ
  rationale: δύναμις here refers to military strength or troops. 'A large force' is
    idiomatic and broad enough to reflect military manpower without forcing a narrower
    term than the Greek. 'Great power' would sound abstract in English.
- source_word: τοῦ πολεμῆσαι
  chosen: to wage war
  alternatives:
  - to fight
  - to make war
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose. 'To wage war' conveys organized
    military action more fully than the simpler 'to fight,' fitting the context of
    gathered peoples and forces.
- source_word: πρὸς Ἰσραήλ
  chosen: against Israel
  alternatives:
  - with Israel
  - toward Israel
  lexicon: LSJ
  rationale: With πολεμέω, πρὸς marks hostile direction. 'Against Israel' is the natural
    English rendering in a warfare context.
- source_word: ἀπὸ Σαμαρίας
  chosen: from Samaria
  alternatives:
  - out of Samaria
  lexicon: LSJ
  rationale: The preposition indicates source/origin of the force. 'From Samaria'
    is the clearest idiomatic rendering.
