translation:
  text: For it is better for us to die in battle than to look on at the evils of our
    nation and of the holy things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctuary' or 'the holy places'; the Greek says 'the holy things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρεῖσσον
  chosen: better
  alternatives:
  - more fitting
  - preferable
  lexicon: LSJ
  rationale: Comparative adjective expressing what is preferable. 'Better' is the
    natural English equivalent in this moral-exhortative context.
- source_word: ἀποθανεῖν
  chosen: to die
  alternatives:
  - to perish
  lexicon: LSJ
  rationale: Standard infinitive of ἀποθνῄσκω. 'To die' is direct and idiomatic; 'perish'
    would add rhetorical coloring not required by the Greek.
- source_word: ἐν πολέμῳ
  chosen: in battle
  alternatives:
  - in war
  lexicon: LSJ
  rationale: While πόλεμος often means 'war,' with the infinitive of dying in an immediate
    military setting, English 'in battle' better captures the concrete sense without
    overgeneralizing to the whole war.
- source_word: ἐφιδεῖν ἐπὶ
  chosen: to look on at
  alternatives:
  - to witness
  - to see
  lexicon: LSJ
  rationale: The verb here conveys seeing as a spectator, with the painful nuance
    of standing by and watching. 'Look on at' preserves that force better than the
    flatter 'see' and more literally than the interpretive 'witness'.
- source_word: τὰ κακά
  chosen: the evils
  alternatives:
  - the calamities
  - the disasters
  - the wrongs
  lexicon: LSJ
  rationale: κακά can denote evils, troubles, or calamities. 'Evils' preserves the
    broad moral and disastrous sense without narrowing it only to suffering or only
    to wrongdoing.
- source_word: τοῦ ἔθνους ἡμῶν
  chosen: of our nation
  alternatives:
  - of our people
  lexicon: LSJ
  rationale: ἔθνος here refers to the Jewish national community. 'Nation' preserves
    the collective-political sense better than the more generic 'people,' while remaining
    natural English.
- source_word: τῶν ἁγίων
  chosen: of the holy things
  alternatives:
  - of the sanctuary
  - of the holy places
  - of the saints
  lexicon: LSJ
  rationale: The neuter plural article and adjective most naturally mean 'the holy
    things,' likely referring to sacred things or the sanctuary complex and its consecrated
    realities. 'Saints' would misread the gender; 'sanctuary' is possible but narrower
    than the Greek plural.
