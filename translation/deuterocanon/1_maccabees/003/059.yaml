theological_decisions:
- issue: Referent of τῶν ἁγίων
  chosen_reading: the holy things
  alternative_readings:
  - the sanctuary
  - the holy places
  rationale: The Greek form is neuter plural, not masculine, so it does not mean 'saints.'
    A broader rendering preserves the literal form while allowing the likely reference
    to the temple and its sacred things in context.
