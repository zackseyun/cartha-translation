translation:
  text: and to provide for Antiochus his son until he returns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to nourish/support Antiochus his son until his return.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τρέφειν
  chosen: to provide for
  alternatives:
  - to nourish
  - to support
  - to rear
  lexicon: LSJ
  rationale: The infinitive τρέφειν can mean to nourish, rear, or maintain/support.
    In this court-political context, the sense is broader than feeding alone and refers
    to sustaining or caring for the king's son during the father's absence. 'Provide
    for' captures that support sense in natural English without over-paraphrasing.
- source_word: Ἀντίοχον
  chosen: Antiochus
  rationale: Personal names are transliterated by standard convention.
- source_word: τὸν υἱὸν αὐτοῦ
  chosen: his son
  alternatives:
  - the son of him
  rationale: A straightforward possessive rendering is idiomatic English and preserves
    the filial relationship explicitly marked in Greek.
- source_word: ἕως τοῦ ἐπιστρέψαι αὐτόν
  chosen: until he returns
  alternatives:
  - until his return
  - until he comes back
  lexicon: LSJ
  rationale: 'The articular infinitive with ἕως expresses a temporal limit: ''until
    his returning/return.'' Rendering with a finite clause is idiomatic English. The
    pronoun αὐτόν most naturally refers back to the absent subject in context, so
    ''until he returns'' is the clearest translation.'
