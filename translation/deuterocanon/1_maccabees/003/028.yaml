translation:
  text: And he opened his treasury and gave pay to his forces for a year, and he commanded
    them to be ready for every need for a year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pay' for ὀψώνια; the term can also carry the sense of provisions or
      rations in military contexts, though the reference to opening the treasury favors
      payment here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνοιξεν
  chosen: opened
  alternatives:
  - unlocked
  lexicon: LSJ
  rationale: The aorist of ἀνοίγω straightforwardly means 'opened.' 'Unlocked' is
    too specific and not required by the context.
- source_word: γαζοφυλάκιον
  chosen: treasury
  alternatives:
  - storehouse
  - treasure chamber
  lexicon: LSJ
  rationale: In this military-fiscal context, the term refers to the place where funds
    are kept. 'Treasury' is the most natural and concise English equivalent.
- source_word: ὀψώνια
  chosen: wages
  alternatives:
  - pay
  - rations
  lexicon: LSJ
  rationale: The word can denote soldiers' pay or provisions, but here the opening
    of the treasury points primarily to monetary compensation. 'Wages' preserves the
    sense of payment without over-specifying modern military salary structures.
- source_word: δυνάμεσιν
  chosen: forces
  alternatives:
  - troops
  - army
  lexicon: LSJ
  rationale: The plural denotes military forces under his command. 'Forces' reflects
    the plural and remains broad enough for the Greek.
- source_word: εἰς τὸ ἐνιαυτόν
  chosen: for a year
  alternatives:
  - for the year
  - for one year
  lexicon: LSJ
  rationale: This idiom indicates duration or provision covering a year's time. 'For
    a year' is idiomatic English and fits both occurrences in the verse.
- source_word: ἐνετείλατο
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: LSJ
  rationale: The verb conveys authoritative direction. 'Commanded' best matches the
    military setting.
- source_word: ἑτοίμους
  chosen: ready
  alternatives:
  - prepared
  lexicon: LSJ
  rationale: The adjective means 'ready' or 'prepared.' 'Ready' is more direct and
    idiomatic here.
- source_word: πᾶσαν χρείαν
  chosen: every need
  alternatives:
  - every necessity
  - every occasion of need
  - every duty
  lexicon: LSJ
  rationale: χρεία commonly means need or necessity. In context, the command is for
    military readiness for any requirement that may arise. 'Every need' is concise
    and faithful, though broader than a narrowly tactical gloss.
