translation:
  text: And each said to his neighbor, “Let us restore the ruin of our people and
    of the holy places.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “restore the downfall of our people and of the holy things.” The Greek
      combines a verb meaning “raise up” with a noun for “ruin/downfall,” expressing
      restoration from devastation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος πρὸς τὸν πλησίον αὐτοῦ
  chosen: each ... to his neighbor
  alternatives:
  - each one ... to the one near him
  - one ... to another
  lexicon: LSJ
  rationale: The distributive ἕκαστος with πρὸς τὸν πλησίον αὐτοῦ idiomatically means
    individuals speaking mutually. 'Each ... to his neighbor' preserves the singular
    Greek while remaining natural English.
- source_word: Ἀναστήσωμεν
  chosen: Let us raise up
  alternatives:
  - let us restore
  - let us rebuild
  lexicon: LSJ
  rationale: ἀνίστημι literally means 'raise up' or 'set up.' In context it carries
    a restorative sense, but 'raise up' keeps the verbal imagery and allows the object
    καθαίρεσιν to supply the sense of reversal from collapse.
- source_word: τὴν καθαίρεσιν
  chosen: the ruin
  alternatives:
  - the downfall
  - the destruction
  - the overthrow
  lexicon: LSJ
  rationale: καθαίρεσις denotes a pulling down, demolition, or ruin. Here the sense
    is the devastated condition of the people and sancta after enemy oppression. 'Ruin'
    is concise and idiomatic in English after 'raise up,' expressing restoration from
    a state of collapse.
- source_word: τοῦ λαοῦ ἡμῶν
  chosen: of our people
  alternatives:
  - of our nation
  lexicon: LSJ
  rationale: λαός in biblical Greek commonly refers to a people-group, especially
    Israel as a covenant people. 'Our people' is the most direct and natural rendering
    here.
- source_word: τῶν ἁγίων
  chosen: of the holy places
  alternatives:
  - of the holy things
  - of the sanctuaries
  - of the saints
  lexicon: LSJ
  rationale: In this Maccabean context, τὰ ἅγια regularly refers to the sanctuary
    or sacred precincts/holy things rather than 'saints.' The plural article and historical
    setting of temple desecration favor 'holy places' as a clear English rendering.
