theological_decisions:
- issue: Referent of τῶν ἁγίων
  chosen_reading: the temple sancta / holy places
  alternative_readings:
  - the holy things
  - the sanctuary
  rationale: The verse concerns national and cultic restoration in the aftermath of
    desecration. Rendering as 'holy places' preserves the cultic reference without
    over-specifying a singular building where the Greek plural can encompass the sacred
    precincts and sancta.
