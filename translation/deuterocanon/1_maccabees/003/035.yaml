  text: ἀποστεῖλαι ἐπʼ αὐτοὺς δύναμιν, τοῦ ἐκρίψαι καὶ ἐξᾶραι τὴν ἰσχὺν Ἰσραὴλ καὶ
    τὸ κατάλιμμα Ἰερουσαλήμ, καὶ ἆραι τὸ μνημόσυνον αὐτοῦ ἀπὸ τοῦ τόπου,
