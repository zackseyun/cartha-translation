theological_decisions:
- issue: Scope of 'the remnant of Jerusalem'
  chosen_reading: Rendered as a broad collective expression rather than only 'survivors.'
  alternative_readings:
  - the survivors of Jerusalem
  - what remained of Jerusalem
  rationale: The Greek κατάλιμμα can denote what remains generally. The verse describes
    a program of suppression against Israel and Jerusalem; a broader collective rendering
    preserves that scope without forcing the referent to persons alone.
  doctrine_reference: 'Translation philosophy: preserve source plain sense; do not
    paraphrase beyond what the source warrants.'
