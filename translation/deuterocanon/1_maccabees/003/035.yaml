translation:
  text: to send a force against them, to crush and remove the strength of Israel and
    the remnant of Jerusalem, and to take away its memory from the place,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to remove its memorial' or 'to blot out its remembrance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστεῖλαι
  chosen: to send
  alternatives:
  - to dispatch
  lexicon: LSJ
  rationale: Aorist infinitive expressing the content/purpose of the prior decision.
    'To send' is the plain and natural English equivalent; 'dispatch' is possible
    but slightly more idiomatic and military than necessary.
- source_word: δύναμιν
  chosen: a force
  alternatives:
  - an army
  - troops
  - power
  lexicon: LSJ
  rationale: In this military context, δύναμις refers to an armed force rather than
    abstract 'power.' 'A force' preserves the Greek's breadth without over-specifying
    the size as 'army.'
- source_word: τοῦ ἐκρίψαι
  chosen: to crush
  alternatives:
  - to strike down
  - to destroy
  lexicon: LSJ
  rationale: The infinitive of purpose conveys violent overthrow. 'To crush' captures
    the hostile military sense while pairing well with the following verb. 'Destroy'
    would be possible but risks collapsing the distinction between the two coordinated
    infinitives.
- source_word: ἐξᾶραι
  chosen: remove
  alternatives:
  - root out
  - take away
  - wipe out
  lexicon: LSJ
  rationale: This verb adds the sense of taking away/removing after the initial assault.
    'Remove' is broad and readable; 'root out' is vivid but somewhat interpretive
    here.
- source_word: τὴν ἰσχὺν Ἰσραήλ
  chosen: the strength of Israel
  alternatives:
  - the might of Israel
  - Israel's power
  lexicon: LSJ
  rationale: ἰσχύς denotes strength or might. 'The strength of Israel' is a transparent
    rendering and preserves the genitival structure.
- source_word: τὸ κατάλιμμα Ἰερουσαλήμ
  chosen: the remnant of Jerusalem
  alternatives:
  - what is left of Jerusalem
  - the survivors of Jerusalem
  lexicon: LSJ
  rationale: κατάλιμμα means that which is left behind, a remnant. 'The remnant of
    Jerusalem' preserves the term's resonance and avoids narrowing it only to persons,
    since the phrase may encompass the surviving community associated with the city.
- source_word: ἆραι τὸ μνημόσυνον αὐτοῦ
  chosen: to take away its memory
  alternatives:
  - to remove its memorial
  - to blot out its remembrance
  lexicon: LSJ
  rationale: μνημόσυνον can denote memory, remembrance, or memorial. 'Its memory'
    is idiomatic and fits the hostile aim of erasing remembrance. 'Memorial' is possible
    but sounds more concrete than the context requires.
- source_word: αὐτοῦ
  chosen: its
  alternatives:
  - their
  - his
  lexicon: Greek grammar/context
  rationale: The singular pronoun most naturally refers back to the collective object
    just described, especially Jerusalem/remnant as a corporate entity. English 'its'
    best reflects that collective singular reference in context.
- source_word: ἀπὸ τοῦ τόπου
  chosen: from the place
  alternatives:
  - from its place
  - from that place
  lexicon: LSJ
  rationale: The Greek has the article with τόπος, literally 'from the place.' Retaining
    the article keeps the wording close to the source and leaves the referent appropriately
    broad, likely the land/locality in view.
