  text: καὶ παρέδωκεν αὐτῷ τὰς ἡμίσεις τῶν δυνάμεων καὶ τοὺς ἐλέφαντας, καὶ ἐνετείλατο
    αὐτῷ περὶ πάντων ὧν ἐβούλετο, καὶ περὶ πάντων τῶν κατοικούντων τὴν Ἰουδαίαν καὶ
    Ἰερουσαλήμ,
