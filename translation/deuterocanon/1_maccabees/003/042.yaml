translation:
  text: And Judas and his brothers saw that the troubles had multiplied, and that
    the forces were encamped within their borders; and they learned of the decrees
    of the kingdom that it had commanded to be carried out against the people for
    destruction and annihilation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the words/decrees of the kingdom'; the Greek uses 'kingdom' or 'royal
      rule' rather than directly saying 'the king.'
    reason: lexical_alternative
  - marker: b
    text: 'Literally ''to the people''; context indicates hostile intent: the orders
      were aimed at the people''s destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ κακά
  chosen: the troubles
  alternatives:
  - the evils
  - the calamities
  - the hardships
  lexicon: LSJ
  rationale: The plural neuter with ἐπληθύνθη denotes worsening adverse circumstances
    rather than abstract moral evil alone. 'The troubles' fits the military-political
    context and reads naturally in English while preserving the sense of mounting
    affliction.
- source_word: αἱ δυνάμεις
  chosen: the forces
  alternatives:
  - the armies
  - the troops
  - the military forces
  lexicon: LSJ
  rationale: In this context δυνάμεις refers to armed forces rather than 'powers'
    in an abstract sense. 'The forces' is concise and natural, while still clearly
    military.
- source_word: παρεμβάλλουσιν
  chosen: were encamped
  alternatives:
  - are encamping
  - camp
  - have camped
  lexicon: LSJ
  rationale: 'The present is rendered with an English progressive/resultative sense
    suited to narrative: the forces are in camp within their territory. ''Were encamped''
    conveys the state produced by the action in idiomatic English.'
- source_word: ἐν τοῖς ὁρίοις αὐτῶν
  chosen: within their borders
  alternatives:
  - in their territory
  - at their borders
  - within their territory
  lexicon: LSJ
  rationale: ὅρια can mean borders, boundaries, or territory. Because the hostile
    forces are said to be stationed there, 'within their borders' preserves both the
    geographic and threatening sense.
- source_word: ἐπέγνωσαν
  chosen: recognized
  alternatives:
  - understood
  - came to know
  - perceived fully
  lexicon: LSJ
  rationale: The verb suggests fuller realization or recognition. 'Recognized' captures
    their dawning understanding of the king's policy without over-translating.
- source_word: τοὺς λόγους τῆς βασιλείας
  chosen: the orders of the kingdom
  alternatives:
  - the words of the kingdom
  - the decrees of the kingdom
  - the commands of the royal power
  lexicon: LSJ
  rationale: βασιλεία here refers to royal rule or the monarchy, not an abstract kingdom
    in a theological sense. λόγοι in context are official directives. 'Orders of the
    kingdom' preserves the Greek wording while conveying governmental command.
- source_word: ἐνετείλατο ποιῆσαι
  chosen: it had commanded to be carried out
  alternatives:
  - it had ordered to do
  - it had commanded to do
  - it had ordered to execute
  lexicon: LSJ
  rationale: The construction combines command with execution. 'To be carried out'
    makes clear that these are royal directives intended for implementation, not merely
    spoken words.
- source_word: τῷ λαῷ
  chosen: against the people
  alternatives:
  - to the people
  - for the people
  lexicon: LSJ
  rationale: Although the dative can be rendered literally as 'to/for the people,'
    the following phrase 'for destruction and annihilation' shows the commands are
    hostile in effect. 'Against the people' brings out the contextual force in idiomatic
    English.
- source_word: εἰς ἀπώλειαν καὶ συντέλειαν
  chosen: for destruction and annihilation
  alternatives:
  - for ruin and extermination
  - for destruction and completion
  - for perdition and utter end
  lexicon: LSJ
  rationale: The paired nouns intensify the intended outcome. 'Destruction and annihilation'
    communicates severe, comprehensive ruin in clear modern English. 'Completion'
    would be too opaque here; the sense is terminal devastation.
