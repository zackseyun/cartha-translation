theological_decisions:
- issue: Rendering τῆς βασιλείας
  chosen_reading: the kingdom
  alternative_readings:
  - the king
  - the royal power
  - the monarchy
  rationale: The Greek text reads the abstract noun βασιλεία rather than a personal
    noun for 'king.' The translation keeps this by rendering 'the kingdom' in the
    main text, though the phrase is understood as the ruling regime issuing orders.
    This avoids silently replacing the source wording with an interpretive singular
    agent.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering τῷ λαῷ with hostile force
  chosen_reading: against the people
  alternative_readings:
  - to the people
  - for the people
  rationale: A more literal rendering of the dative could obscure the sense in English
    and suggest benefit rather than threat. Because the infinitive phrase is explicitly
    'for destruction and annihilation,' the commands are directed adversely toward
    the people. This is an interpretive but context-governed rendering, not a doctrinal
    expansion.
  doctrine_reference: Translation philosophy §1, §6
