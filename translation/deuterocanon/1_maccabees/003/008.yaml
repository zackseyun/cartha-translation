translation:
  text: And he went through the cities of Judah, and destroyed the ungodly from it,
    and turned away wrath from Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the impious' or 'the wicked' for 'the ungodly.'
    reason: lexical_alternative
  - marker: b
    text: '''Wrath'' likely refers to divine wrath in context, though the verse does
      not explicitly name God.'
    reason: alternative_reading
lexical_decisions:
- source_word: διῆλθεν
  chosen: went through
  alternatives:
  - passed through
  - traveled through
  lexicon: BDAG
  rationale: The verb indicates movement through a region or series of places. 'Went
    through' is natural English and preserves the sense of traversing the cities without
    adding nuance beyond the Greek.
- source_word: πόλεσιν Ἰούδα
  chosen: the cities of Judah
  alternatives:
  - Judah's cities
  - the towns of Judah
  lexicon: BDAG
  rationale: 'πόλις can mean city or town, but ''cities'' is the more direct rendering
    and fits the conventional geographic expression. The genitive Ἰούδα is best taken
    territorially: cities belonging to Judah.'
- source_word: ἐξωλόθρευσεν
  chosen: destroyed
  alternatives:
  - cut off
  - exterminated
  lexicon: BDAG
  rationale: The verb is strong and denotes removal by destruction. 'Destroyed' preserves
    the severity without over-specifying method. 'Exterminated' may sound too biologically
    or modernly loaded in English.
- source_word: ἀσεβεῖς
  chosen: the ungodly
  alternatives:
  - the impious
  - the wicked
  lexicon: BDAG
  rationale: ἀσεβής denotes those who are irreverent or impious toward God and covenantal
    order. 'Ungodly' is clear modern English and preserves the religious-moral force
    better than the broader 'wicked.'
- source_word: ἐπʼ αὐτῆς
  chosen: from it
  alternatives:
  - from her
  - from the land
  - from Judah
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to Judah, understood as the land/territory.
    'From it' keeps the Greek's pronominal reference without importing an explicit
    noun not present in the text. Because English readers may find the antecedent
    slightly less explicit, the preceding 'Judah' remains close enough for clarity.
- source_word: ἀπέστρεψεν ὀργὴν
  chosen: turned away wrath
  alternatives:
  - turned back wrath
  - averted wrath
  lexicon: BDAG
  rationale: The idiom means to cause wrath to be removed or averted. 'Turned away
    wrath' is a transparent rendering close to the Greek wording and idiomatically
    understandable in English.
- source_word: ἀπὸ Ἰσραήλ
  chosen: from Israel
  alternatives:
  - from the people of Israel
  - away from Israel
  lexicon: BDAG
  rationale: The phrase marks Israel as the people from whom wrath was removed. 'From
    Israel' is the most direct rendering and preserves the corporate sense of the
    Greek.
