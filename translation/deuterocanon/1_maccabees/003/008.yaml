theological_decisions:
- issue: Meaning of 'wrath' in relation to Israel
  chosen_reading: The verse states that Judas's actions turned away wrath from Israel
    without specifying whether the wrath is explicitly divine or simply covenantal/judicial
    in a broader sense.
  alternative_readings:
  - explicitly divine wrath
  - general calamity or anger against Israel
  rationale: ὀργή in this Jewish scriptural context naturally suggests divine wrath,
    but the text itself does not name God here. To preserve theological tension and
    avoid importing more than the verse states, the main text keeps the simple 'wrath.'
  doctrine_reference: Preserve theological tension rather than resolve it.
