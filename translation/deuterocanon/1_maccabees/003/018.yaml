translation:
  text: And Judas said, “It is easy for many to be hemmed in by the hands of a few,
    and in the sight of heaven there is no difference between saving by many or by
    few.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be delivered into the hands of a few.' The Greek verb literally means
      'to be shut up/enclosed,' here in the sense of being trapped in another's power.
    reason: lexical_alternative
  - marker: b
    text: '''Heaven'' likely functions as a reverential way of referring to God; compare
      ''before God'' as an interpretive alternative.'
    reason: alternative_reading
lexical_decisions:
- source_word: Εὔκοπόν
  chosen: it is easy
  alternatives:
  - it is easier
  - it is no hard thing
  lexicon: LSJ
  rationale: The adjective with ἐστιν forms an impersonal expression meaning something
    is easy or readily done. 'It is easy' is natural modern English and preserves
    the force without archaic phrasing.
- source_word: συγκλεισθῆναι
  chosen: to be shut up into the hands of
  alternatives:
  - to be enclosed in the hands of
  - to be hemmed in by
  - to be delivered into the hands of
  lexicon: LSJ
  rationale: The passive infinitive literally conveys being enclosed or shut up, here
    idiomatically into another's power. 'Shut up into the hands of' keeps the vivid
    metaphor and military sense better than a flatter paraphrase, while still being
    intelligible.
- source_word: πολλοὺς ... ἐν χερσὶν ὀλίγων
  chosen: many ... into the hands of a few
  alternatives:
  - many men ... into the hands of a few men
  - a multitude ... into the hands of a few
  lexicon: LSJ
  rationale: The contrast between many and few is central to the statement. 'A few'
    is sufficient in English without repeating 'men,' since the context is military
    and personal agents are implied.
- source_word: διαφορὰ
  chosen: difference
  alternatives:
  - distinction
  - advantage
  lexicon: LSJ
  rationale: The phrase οὐκ ἔστι διαφορὰ means 'there is no difference/distinction.'
    'Difference' is the clearest idiomatic rendering here and avoids overinterpreting
    the nuance as 'advantage.'
- source_word: ἐναντίον τοῦ οὐρανοῦ
  chosen: in the sight of heaven
  alternatives:
  - before heaven
  - in heaven's presence
  lexicon: LSJ
  rationale: This idiom means before or in the presence/sight of heaven. In Jewish-Greek
    usage 'heaven' can function reverentially for God, but the text says 'heaven,'
    so the translation preserves that wording while making the idiom natural in English.
- source_word: σῴζειν
  chosen: saving
  alternatives:
  - delivering
  - granting victory
  lexicon: LSJ
  rationale: The verb means save/deliver. In this battle context it includes military
    deliverance, but 'saving' preserves the broader theological resonance and leaves
    the object implicit as in Greek.
- source_word: ἐν πολλοῖς ἢ ἐν ὀλίγοις
  chosen: by many or by few
  alternatives:
  - with many or with few
  - through many or through few
  lexicon: LSJ
  rationale: The dative/instrumental sense is well represented by 'by many or by few,'
    expressing the means by which deliverance comes.
