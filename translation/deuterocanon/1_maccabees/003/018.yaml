theological_decisions:
- issue: Reverential use of 'heaven' in ἐναντίον τοῦ οὐρανοῦ
  chosen_reading: Retain 'heaven' rather than substituting 'God'
  alternative_readings:
  - before God
  - in the sight of God
  rationale: The Greek explicitly says 'heaven,' likely as a reverential circumlocution.
    Following original-language primacy, the main text preserves the source wording
    rather than resolving the circumlocution into an explicit divine name.
