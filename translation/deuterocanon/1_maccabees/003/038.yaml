translation:
  text: And Lysias chose Ptolemy son of Dorymenes, Nicanor, and Gorgias, mighty men
    among the king’s friends.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from among the king’s courtiers.' In Hellenistic royal usage, 'the
      king’s friends' could function as a court title rather than merely indicating
      personal friendship.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπέλεξεν
  chosen: chose
  alternatives:
  - selected
  - appointed
  lexicon: LSJ
  rationale: The verb denotes choosing or selecting. 'Chose' is the most direct and
    natural English rendering here; 'appointed' would overstate an official commissioning
    nuance not required by the verb alone.
- source_word: Πτολεμαῖον τὸν Δορυμένους
  chosen: Ptolemy son of Dorymenes
  alternatives:
  - Ptolemy the son of Dorymenes
  - Ptolemy, of Dorymenes
  lexicon: LSJ
  rationale: The article with the genitive personal name functions idiomatically to
    identify Ptolemy by his father/family connection. 'Son of Dorymenes' is the clearest
    English expression of that relationship.
- source_word: ἄνδρας δυνατοὺς
  chosen: mighty men
  alternatives:
  - strong men
  - capable men
  - powerful men
  lexicon: LSJ
  rationale: ἄνδρας is explicitly masculine and refers to adult males, so a gender-accurate
    rendering is appropriate. δυνατούς here conveys strength, capability, or influence;
    'mighty men' preserves both martial and status connotations in a concise phrase
    suited to the military context.
- source_word: τῶν φίλων τοῦ βασιλέως
  chosen: from the king’s friends
  alternatives:
  - of the king's friends
  - from among the king's friends
  - of the king's courtiers
  lexicon: LSJ
  rationale: The genitive phrase identifies these men as belonging to the circle called
    the king's 'friends,' a known court designation in Hellenistic usage. The main
    text keeps the literal term 'friends' while 'from' makes the English relation
    natural. The court-title nuance is worth preserving in a footnote rather than
    replacing the literal wording in the text.
