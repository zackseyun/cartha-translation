translation:
  text: But we are fighting for our lives and our laws.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our souls.' The Greek word can mean either 'lives' or 'souls'; in this
      battle setting, 'lives' best fits the sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'our lawful customs' or 'our ancestral ordinances.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς δὲ
  chosen: But we
  alternatives:
  - And we
  - But as for us
  lexicon: LSJ
  rationale: δέ marks contrast with the preceding statement; 'But we' preserves the
    adversative force and the emphatic subject pronoun.
- source_word: πολεμοῦμεν
  chosen: are fighting
  alternatives:
  - fight
  - wage war
  lexicon: LSJ
  rationale: Present tense verb meaning 'fight' or 'make war.' 'Are fighting' gives
    natural English while preserving the ongoing/immediate sense in context.
- source_word: περὶ
  chosen: for
  alternatives:
  - concerning
  - on behalf of
  lexicon: LSJ
  rationale: With πολεμέω and an object, περί conveys the cause or stake of the conflict.
    'For' is the most idiomatic English rendering here.
- source_word: τῶν ψυχῶν ἡμῶν
  chosen: our lives
  alternatives:
  - our souls
  - our persons
  lexicon: LSJ
  rationale: ψυχή can mean 'life' as well as 'soul.' In a military context, the sense
    is preservation of life rather than an abstract reference to the soul, so 'our
    lives' best matches the plain sense.
- source_word: τῶν νομίμων ἡμῶν
  chosen: our laws
  alternatives:
  - our lawful customs
  - our ordinances
  lexicon: LSJ
  rationale: νόμιμα refers to what is established by law or custom, especially ancestral
    legal-religious observances in this context. 'Our laws' is concise and clear;
    'customs' is possible but narrower than the likely legal-religious scope.
