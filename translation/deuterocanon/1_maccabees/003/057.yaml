translation:
  text: And the camp set out, and they encamped south of Emmaus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Ἀμμαούμ, conventionally rendered Emmaus.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  chosen: set out
  alternatives:
  - moved on
  - departed
  lexicon: LSJ
  rationale: From ἀπαίρω/ἀπαίρω in context of breaking camp and moving from one location
    to another. 'Set out' is natural military/travel English and fits the subject
    'the camp' as a collective force.
- source_word: ἡ παρεμβολή
  chosen: the camp
  alternatives:
  - the army camp
  - the encampment
  lexicon: LSJ
  rationale: παρεμβολή commonly denotes a camp or army encampment. Here it functions
    collectively for the force in camp. 'The camp' is concise and idiomatic, while
    the following verb makes clear movement of the force.
- source_word: παρενεβάλοσαν
  chosen: they encamped
  alternatives:
  - they camped
  - they pitched camp
  lexicon: LSJ
  rationale: Aorist verb from παρεμβάλλω in military/travel usage, meaning to make
    camp. 'They encamped' preserves the formal military sense and matches the narrative
    style.
- source_word: κατὰ νότον
  chosen: to the south of
  alternatives:
  - south of
  - toward the south of
  - on the south side of
  lexicon: LSJ
  rationale: The phrase indicates location relative to Emmaus rather than merely direction
    of travel. 'To the south of' communicates positional sense in smooth English.
- source_word: Ἀμμαούμ
  chosen: Emmaus
  alternatives:
  - Ammaoum
  lexicon: LSJ
  rationale: Standard English transliteration for the place-name is 'Emmaus.' This
    follows the project's practice of transliterating names by standard conventions
    rather than preserving the exact Greek orthography.
