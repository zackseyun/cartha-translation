translation:
  text: And the lawless were restrained because of fear of him, and all the workers
    of lawlessness were thrown into confusion, and deliverance prospered in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'salvation prospered in his hand.' The Greek σωτηρία can mean 'deliverance'
      or 'salvation'; here the context favors national/military rescue.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in his hand' is a biblical idiom meaning that success came through
      his agency or power.
    reason: cultural_note
lexical_decisions:
- source_word: συνεστάλησαν
  chosen: were driven back
  alternatives:
  - were checked
  - were restrained
  - were cowed
  lexicon: LSJ
  rationale: The passive of συστέλλω here conveys being forced back or reduced under
    pressure. 'Were driven back' captures the military/narrative force better than
    the more abstract 'were restrained,' while still reflecting the passive sense.
- source_word: οἱ ἄνομοι
  chosen: the lawless
  alternatives:
  - the wicked
  - the outlaws
  lexicon: BDAG/LSJ
  rationale: ἄνομος denotes those characterized by lawlessness, not merely generic
    moral badness. 'The lawless' preserves the lexical link with ἀνομία later in the
    verse.
- source_word: ἀπὸ τοῦ φόβου αὐτοῦ
  chosen: because of fear of him
  alternatives:
  - from fear of him
  - because they feared him
  lexicon: LSJ
  rationale: 'The phrase marks cause: they were driven back on account of fear of
    him. ''Because of fear of him'' is clear modern English and stays close to the
    Greek construction.'
- source_word: οἱ ἐργάται τῆς ἀνομίας
  chosen: the workers of lawlessness
  alternatives:
  - the evildoers
  - those who practice lawlessness
  lexicon: BDAG/LSJ
  rationale: A relatively formal rendering preserves the deliberate repetition of
    the ἀνομ- word group and the concrete 'workers' imagery. Smoother options lose
    that rhetorical cohesion.
- source_word: συνεταράχθησαν
  chosen: were thrown into confusion
  alternatives:
  - were disturbed
  - were terrified
  - were shaken
  lexicon: LSJ
  rationale: The verb indicates being upset or agitated. 'Were thrown into confusion'
    fits the passive form and the context of enemies disordered by Judas's rise.
- source_word: εὐωδώθη
  chosen: prospered
  alternatives:
  - succeeded
  - was made successful
  - advanced
  lexicon: LSJ
  rationale: The passive verb means to prosper or succeed. 'Prospered' is concise
    and preserves the sense that success attended the deliverance.
- source_word: σωτηρία
  chosen: deliverance
  alternatives:
  - salvation
  - victory
  lexicon: BDAG/LSJ
  rationale: In this military-historical context, σωτηρία refers to rescue or deliverance
    rather than primarily theological 'salvation.' 'Deliverance' preserves the breadth
    of rescue without narrowing it to mere battlefield victory.
- source_word: ἐν χειρὶ αὐτοῦ
  chosen: in his hand
  alternatives:
  - by his hand
  - through his hand
  lexicon: BDAG/LSJ
  rationale: The idiom can denote agency or instrumentality. 'In his hand' keeps the
    biblical idiom and allows readers to hear the source texture, while remaining
    understandable in English.
