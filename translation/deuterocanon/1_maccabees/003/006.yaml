theological_decisions:
- issue: Rendering σωτηρία in a deuterocanonical military context
  chosen_reading: deliverance
  alternative_readings:
  - salvation
  - victory
  rationale: The verse describes Judas's effect on enemies and the success that came
    through him. 'Deliverance' best fits the immediate historical context while avoiding
    importing a narrower later soteriological sense or reducing the term to only military
    triumph.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source sense in context'
