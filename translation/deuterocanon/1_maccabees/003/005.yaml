translation:
  text: And he hunted down the lawless, searching them out, and he burned those who
    troubled his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pursued the lawless, seeking them out.'
    reason: lexical_alternative
  - marker: b
    text: The Greek verb can also be rendered 'set on fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίωξεν
  chosen: hunted down
  alternatives:
  - pursued
  - persecuted
  - chased
  lexicon: LSJ
  rationale: The verb denotes active pursuit. In this military-judicial context, 'hunted
    down' conveys determined pursuit more vividly than the flatter 'pursued,' without
    importing later technical senses of 'persecuted.'
- source_word: ἀνόμους
  chosen: the lawless
  alternatives:
  - outlaws
  - wicked men
  - those without law
  lexicon: LSJ
  rationale: The adjective literally means 'lawless' and in this context refers to
    people acting against the covenantal and communal order. 'The lawless' preserves
    the moral-legal force better than the more idiomatic but narrower 'outlaws.'
- source_word: ἐξερευνῶν
  chosen: searching them out
  alternatives:
  - seeking out
  - tracking down
  - investigating
  lexicon: LSJ
  rationale: The participle intensifies the pursuit by describing careful searching.
    'Searching them out' preserves the sense of deliberate discovery and works naturally
    with 'hunted down.'
- source_word: παράσσοντας
  chosen: troubled
  alternatives:
  - harassed
  - disturbed
  - afflicted
  - oppressed
  lexicon: LSJ
  rationale: The participle describes those causing disruptive harm to the people.
    'Troubled' is broad enough to cover harassment and disturbance without overstating
    the specific mode of harm. 'Oppressed' would be possible but may suggest a more
    formal political domination than the Greek itself requires.
- source_word: ἐφλόγισεν
  chosen: burned
  alternatives:
  - set on fire
  - burned up
  - consumed with fire
  lexicon: LSJ
  rationale: The verb straightforwardly denotes burning with fire. 'Burned' is the
    clearest modern English equivalent and preserves the severity of the action without
    embellishment.
- source_word: τὸν λαὸν αὐτοῦ
  chosen: his people
  alternatives:
  - his nation
  - his folk
  lexicon: LSJ
  rationale: λαός commonly means 'people' in a collective sense. 'His people' is the
    most natural rendering and fits the covenantal-national context of 1 Maccabees.
