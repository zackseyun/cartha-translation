theological_decisions:
- issue: Moral-legal force of ἀνόμους
  chosen_reading: the lawless
  alternative_readings:
  - wicked men
  - outlaws
  rationale: The verse depicts Judas acting against those violating the community's
    covenantal order. Rendering the term as 'the lawless' preserves that moral-legal
    dimension without narrowing it to merely civil criminality.
  doctrine_reference: Translation philosophy §1, §5
- issue: Severity of ἐφλόγισεν
  chosen_reading: he burned those who troubled his people
  alternative_readings:
  - he set on fire those who troubled his people
  rationale: The Greek states the action starkly. The translation preserves the severity
    without softening it or adding explanatory detail not present in the text.
  doctrine_reference: Translation philosophy §1, §6
