translation:
  text: When Antiochus the king heard these words, he became very angry, and he sent
    and gathered all the forces of his kingdom, a very strong army camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a very strong encampment' or 'an exceedingly strong army camp.' The
      Greek παρεμβολή can denote the camp itself or the encamped force.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  chosen: When
  alternatives:
  - Now when
  - And when
  lexicon: LSJ
  rationale: Introduces the next event with temporal force. 'When' is natural modern
    English and preserves the narrative transition without unnecessary archaism.
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - was informed of
  lexicon: LSJ
  rationale: The basic sense is auditory reception/report. 'Heard' is the most direct
    rendering and fits the object 'these words' well.
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - this report
  - these things
  lexicon: LSJ
  rationale: λόγοι can mean 'words,' 'statements,' or 'report.' Because the Greek
    explicitly says 'these words,' the translation keeps that wording rather than
    smoothing to 'report,' while still allowing the idiomatic sense of hearing a message.
- source_word: ὠργίσθη θυμῷ
  chosen: became furiously angry
  alternatives:
  - was enraged
  - became angry with wrath
  - was filled with rage
  lexicon: LSJ
  rationale: The combination of ὀργίζομαι with θυμός intensifies the emotion. 'Became
    furiously angry' preserves the emphatic force without sounding wooden. A simpler
    'was angry' would undertranslate the doubled expression.
- source_word: ἀπέστειλεν
  chosen: sent out
  alternatives:
  - sent
  - dispatched
  lexicon: LSJ
  rationale: The verb likely implies sending messengers/orders to mobilize forces.
    'Sent out' preserves the outward, dispatching sense while remaining concise.
- source_word: συνήγαγεν
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: LSJ
  rationale: The verb means to bring together. 'Gathered' is straightforward; 'mustered'
    is possible in military context, but 'gathered' stays closer to the lexical core
    while the object makes the military sense clear.
- source_word: τὰς δυνάμεις πάσας τῆς βασιλείας αὐτοῦ
  chosen: all the forces of his kingdom
  alternatives:
  - all the troops of his kingdom
  - all the power of his kingdom
  lexicon: LSJ
  rationale: δυνάμεις in this context refers to military forces rather than abstract
    power. 'Forces' is broad and accurate, preserving the military sense without over-specifying
    unit type.
- source_word: παρεμβολὴν
  chosen: camp
  alternatives:
  - army camp
  - encampment
  - host
  lexicon: LSJ
  rationale: παρεμβολή commonly denotes a camp or encamped army. 'Camp' is the most
    direct rendering here, with the following adjective supplying the military scale.
    The phrase appositionally summarizes the assembled forces as a camp/encampment.
- source_word: ἰσχυρὰν σφόδρα
  chosen: very strong
  alternatives:
  - exceedingly strong
  - extremely powerful
  - very mighty
  lexicon: LSJ
  rationale: The adjective plus σφόδρα gives strong intensification. 'Very strong'
    is clear modern English and preserves the emphatic description of the military
    camp.
