translation:
  text: And he was renowned to the ends of the earth, and he gathered those who were
    perishing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he became renowned to the ends of the earth.' The Greek literally says
      'he was named,' an idiom that can refer to widespread fame or reputation.
    reason: lexical_alternative
  - marker: b
    text: Or 'he gathered the lost' / 'those being destroyed.' The Greek participle
      can denote people who were ruined, endangered, or perishing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠνομάσθη
  chosen: was named
  alternatives:
  - was renowned
  - became known
  - was called
  lexicon: LSJ
  rationale: Aorist passive of ὀνομάζω, literally 'was named/called.' In context it
    conveys the spread of Judas's name or reputation. 'Was named' stays close to the
    Greek while allowing the idiom to imply renown; more interpretive options like
    'became famous' are possible but go beyond the explicit wording.
- source_word: ἕως ἐσχάτου τῆς γῆς
  chosen: to the ends of the earth
  alternatives:
  - to the farthest part of the earth
  - to the end of the land
  lexicon: LSJ
  rationale: This is a standard idiom for the furthest reaches of the world/land.
    'To the ends of the earth' is natural English and preserves the expansive sense
    better than the more wooden singular 'to the end of the earth.'
- source_word: συνήγαγεν
  chosen: gathered
  alternatives:
  - assembled
  - brought together
  lexicon: LSJ
  rationale: Aorist of συνάγω, straightforwardly 'gathered' or 'brought together.'
    'Gathered' is concise and idiomatic.
- source_word: ἀπολλυμένους
  chosen: those who were perishing
  alternatives:
  - the lost
  - those being destroyed
  - those who were ruined
  lexicon: LSJ
  rationale: Present middle/passive participle of ἀπόλλυμι. In this military-distress
    context it likely refers to people in danger of destruction or ruin rather than
    a theological category like 'the lost.' 'Those who were perishing' preserves the
    ongoing endangered state without overinterpreting.
