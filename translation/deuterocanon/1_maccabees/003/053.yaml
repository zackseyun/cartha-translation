translation:
  text: How will we be able to stand before them, unless you help us?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stand against them' or 'withstand them'; the Greek expression can carry
      the sense of facing opponents in conflict.
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  chosen: How
  alternatives:
  - How will
  - In what way
  lexicon: LSJ
  rationale: Introduces a rhetorical question about possibility or manner; simple
    'How' is natural and sufficiently formal.
- source_word: δυνησόμεθα
  chosen: will we be able
  alternatives:
  - can we
  - shall we be able
  lexicon: BDAG
  rationale: Future middle of δύναμαι expresses future capability. 'Will we be able'
    preserves both futurity and inability without sounding archaic.
- source_word: ὑποστῆναι
  chosen: to stand
  alternatives:
  - to withstand
  - to hold our ground
  - to stand firm
  lexicon: LSJ
  rationale: In context with κατὰ πρόσωπον αὐτῶν, the sense is standing one's ground
    in confrontation. 'Stand' is concise and idiomatic; the adversarial force is carried
    by 'before them.'
- source_word: κατὰ πρόσωπον αὐτῶν
  chosen: before them
  alternatives:
  - against them
  - face to face with them
  - in their presence
  lexicon: LSJ
  rationale: The phrase literally involves 'according to/against their face,' an idiom
    for facing someone in opposition. 'Before them' in this military-prayer context
    naturally conveys facing them in confrontation without overtranslating.
- source_word: ἐὰν μὴ
  chosen: unless
  alternatives:
  - if not
  lexicon: BDAG
  rationale: Standard conditional idiom; 'unless' is the most natural English equivalent.
- source_word: σὺ
  chosen: you
  lexicon: Greek grammar
  rationale: The explicit pronoun is emphatic in Greek. English can preserve the emphasis
    adequately by retaining 'you' in normal position without typographical stress.
- source_word: βοηθήσῃς
  chosen: help
  alternatives:
  - come to the aid of
  - assist
  lexicon: BDAG
  rationale: Aorist subjunctive of βοηθέω means to help or come to aid. 'Help' is
    clear, direct, and fits the prayerful appeal.
- source_word: ἡμῖν
  chosen: us
  alternatives:
  - for us
  - to us
  lexicon: BDAG
  rationale: Dative object of βοηθέω is naturally rendered 'help us' in English.
