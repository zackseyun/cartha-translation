theological_decisions:
- issue: Address to God in a military plea
  chosen_reading: Retain a direct second-person appeal without expanding the object
    of trust or victory
  alternative_readings:
  - How can we withstand them unless you come to our aid?
  rationale: The verse is a prayerful acknowledgment of dependence on divine help.
    The translation preserves that dependence without importing extra theological
    claims not explicit in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
