translation:
  text: And his name reached even to the king, and every nation spoke of the battle
    lines of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'his fame reached the king.' The Greek reads literally,
      'his name came near to the king.'
    reason: lexical_alternative
  - marker: b
    text: The Greek phrase 'above every battle line' is difficult. It may mean that
      every nation spoke of Judas in connection with his military formations or victories.
    reason: alternative_reading
  - marker: c
    text: Greek Ἰούδα here refers to Judas Maccabeus; 'Judah' reflects a closer transliteration
      of the form, while 'Judas' is the standard English name for this figure.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισεν
  chosen: came near
  alternatives:
  - reached
  - came to
  lexicon: LSJ
  rationale: The verb literally means 'drew near' or 'came near.' With ἕως τοῦ βασιλέως
    it conveys that Judas's reputation reached the king's notice. 'Came near' preserves
    the Greek image more transparently than the more idiomatic 'reached,' though the
    latter is a viable interpretive alternative.
- source_word: τὸ ὄνομα αὐτοῦ
  chosen: his name
  alternatives:
  - his fame
  - his reputation
  lexicon: LSJ
  rationale: Literally 'his name.' In context it refers to reputation or renown, but
    the Greek uses 'name,' and preserving that wording keeps the translation closer
    to the source while still intelligible in English.
- source_word: ὑπὲρ πᾶν παράταξιν
  chosen: above every battle line
  alternatives:
  - beyond every military formation
  - more than every army array
  lexicon: LSJ
  rationale: παράταξις commonly denotes a drawn-up battle line or military formation.
    The phrase is somewhat compressed in Greek; 'above every battle line' preserves
    the military sense and comparative force of ὑπέρ without over-paraphrasing. The
    exact nuance is difficult, but it likely means that Judas was spoken of in connection
    with every military engagement or above all military arrays.
- source_word: ἐξηγεῖτο
  chosen: spoke of
  alternatives:
  - recounted
  - told about
  - described
  lexicon: LSJ
  rationale: The imperfect middle can mean 'related in detail' or 'told of.' 'Spoke
    of' is idiomatic and broad enough to fit the object 'Judah' in this compressed
    construction without forcing an overly specific sense.
- source_word: πᾶν ἔθνος
  chosen: every nation
  alternatives:
  - all the nations
  - every people
  lexicon: LSJ
  rationale: A straightforward rendering of the singular collective phrase. 'Every
    nation' preserves the distributive sense of πᾶν with ἔθνος.
- source_word: Ἰούδα
  chosen: Judah
  alternatives:
  - Judas
  lexicon: LSJ
  rationale: The Greek form Ἰούδα can represent the personal name Judas/Judah. In
    the context of 1 Maccabees 3, the referent is Judas Maccabeus. However, the project's
    philosophy says to transliterate names by standard conventions; for this Second
    Temple figure, 'Judas' is the standard English form. The main text here retains
    'Judah' only if following a more direct transliteration, but 'Judas' is likely
    preferable contextually.
