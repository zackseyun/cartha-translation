translation:
  text: And they spread out the book of the law, concerning which the nations were
    searching for the likenesses of their idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'opened' or 'unrolled' the book of the law.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek is compressed: the sense may be that the nations searched the
      law-book in relation to making or consulting representations of their idols.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξεπέτασαν
  chosen: spread out
  alternatives:
  - opened
  - unrolled
  lexicon: LSJ
  rationale: The verb literally suggests spreading out or unfolding. In context with
    a scroll/book of the law, 'spread out' preserves the physical action without over-specifying
    whether it was a codex or scroll. 'Opened' is smoother but less concrete; 'unrolled'
    may be too specific.
- source_word: τὸ βιβλίον τοῦ νόμου
  chosen: the book of the law
  alternatives:
  - the scroll of the law
  - the book of the Law
  lexicon: LSJ
  rationale: A straightforward rendering of the phrase. 'Book of the law' is idiomatic
    and preserves the likely scriptural reference. Capitalizing 'Law' is interpretive;
    lowercase is retained here for transparency.
- source_word: περὶ ὧν
  chosen: concerning which
  alternatives:
  - about which
  - with respect to which
  lexicon: LSJ
  rationale: This relative phrase links the book of the law to the following action
    of the nations. 'Concerning which' keeps the syntax visible and avoids prematurely
    resolving the exact nuance.
- source_word: ἐξηρεύων
  chosen: were seeking
  alternatives:
  - were searching out
  - were inquiring into
  lexicon: LSJ
  rationale: The imperfect conveys ongoing or customary action. 'Were seeking' is
    clear modern English and broad enough to cover the sense of searching out.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the pagans
  lexicon: LSJ
  rationale: In this deuterocanonical Jewish context, the term refers to non-Israelite
    peoples. 'The nations' is the most direct and least interpretively loaded rendering;
    'Gentiles' is possible but more tradition-shaped.
- source_word: τὰ ὁμοιώματα
  chosen: the likenesses
  alternatives:
  - the images
  - the representations
  lexicon: LSJ
  rationale: The noun denotes likenesses or representations. 'Likenesses' preserves
    the lexical distinction from the following εἰδώλων ('idols'), avoiding flattening
    both terms into 'images.'
- source_word: τῶν εἰδώλων αὐτῶν
  chosen: of their idols
  alternatives:
  - of their images
  - of their false gods
  lexicon: LSJ
  rationale: εἴδωλον commonly means idol/image in a cultic sense. 'Idols' best captures
    the religious polemic of the term.
