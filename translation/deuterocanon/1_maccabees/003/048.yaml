theological_decisions:
- issue: Interpretation of the clause linking the book of the law with pagan idol-likenesses
  chosen_reading: 'The verse is rendered closely, preserving the somewhat compressed
    Greek: the nations were seeking in relation to the book of the law the likenesses
    of their idols.'
  alternative_readings:
  - They opened the law-book to compare it with the images of their idols.
  - They spread out the law-book over matters about which the nations consulted their
    idols' images.
  rationale: The Greek syntax is difficult and likely intentionally terse. Rather
    than smoothing it into a more interpretive reconstruction, the translation preserves
    the tension and leaves the exact practical scenario less resolved. This aligns
    with the project's principle of preserving ambiguity where the source is not fully
    explicit.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
