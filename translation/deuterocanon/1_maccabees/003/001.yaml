theological_decisions:
- issue: Nature of Judas's succession
  chosen_reading: rose up in his place
  alternative_readings:
  - arose instead of him
  - succeeded him
  rationale: The verse narrates Judas's emergence after his father, but the Greek
    does not explicitly use a technical term for official succession. The translation
    preserves the narrative and relational sense without importing a stronger political
    claim.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
