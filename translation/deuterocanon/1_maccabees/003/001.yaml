translation:
  text: And Judas, who was called Maccabeus, his son, rose up in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Μακκαβαῖος; traditionally anglicized as 'Maccabee.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέστη
  chosen: rose up
  alternatives:
  - arose
  - stood up
  - came forward
  lexicon: LSJ
  rationale: The aorist of ἀνίστημι here marks succession and emergence into action
    after the father's death. 'Rose up' preserves the narrative force without over-interpreting
    it as formal accession.
- source_word: ὁ καλούμενος
  chosen: who was called
  alternatives:
  - the one called
  - called
  - known as
  lexicon: BDAG
  rationale: This participial expression identifies Judas by an additional name or
    epithet. 'Who was called' is natural English and stays close to the Greek construction.
- source_word: Μακκαβαῖος
  chosen: Maccabeus
  alternatives:
  - Maccabee
  lexicon: LSJ
  rationale: This is a transliterated personal epithet/name. 'Maccabeus' more directly
    reflects the Greek form Μακκαβαῖος, while 'Maccabee' is a familiar Anglicized
    alternative preserved in a footnote.
- source_word: υἱὸς αὐτοῦ
  chosen: his son
  alternatives:
  - the son of him
  - his own son
  lexicon: BDAG
  rationale: The phrase straightforwardly identifies Judas as the son of the previously
    mentioned figure. 'His son' is the clear and natural rendering.
- source_word: ἀντʼ αὐτοῦ
  chosen: in his place
  alternatives:
  - instead of him
  - in place of him
  - after him
  lexicon: BDAG
  rationale: The preposition ἀντί with genitive indicates replacement or succession.
    'In his place' communicates succession idiomatically in English without implying
    more than the Greek states.
