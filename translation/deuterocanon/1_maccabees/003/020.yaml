translation:
  text: They are coming against us with a great multitude of insolence and lawlessness,
    to wipe out us and our wives and our children, and to plunder us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a multitude of insolence and lawlessness.' The Greek construction
      can be rendered more literally, but the main text expresses the sense in natural
      English.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ ἔρχονται πρὸς ἡμᾶς
  chosen: They are coming against us
  alternatives:
  - They are coming to us
  - They are advancing on us
  lexicon: LSJ
  rationale: πρός with ἡμᾶς in this military context is adversative rather than merely
    directional; 'against us' makes the hostile approach explicit without overparaphrasing.
- source_word: πλήθει
  chosen: in a great mass
  alternatives:
  - with a multitude
  - in great numbers
  lexicon: LSJ
  rationale: The dative expresses manner or attendant circumstance. 'In a great mass'
    preserves the imagery of sheer numbers while remaining natural English.
- source_word: ὕβρεως
  chosen: insolence
  alternatives:
  - arrogance
  - outrage
  lexicon: LSJ
  rationale: ὕβρις denotes violent arrogance and wanton insolence. 'Insolence' preserves
    the moral dimension better than a merely psychological term like 'arrogance.'
- source_word: ἀνομίας
  chosen: lawlessness
  alternatives:
  - wickedness
  - iniquity
  lexicon: LSJ
  rationale: ἀνομία is literally and morally 'lawlessness'; this keeps the lexical
    connection to disregard for law rather than using a broader moral term.
- source_word: τοῦ ἐξᾶραι ἡμᾶς
  chosen: to wipe out us
  alternatives:
  - to destroy us
  - to root us out
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose. ἐξαίρω here carries the sense
    of removing utterly. 'Wipe out' is forceful, idiomatic modern English that reflects
    intended annihilation.
- source_word: τὰς γυναῖκας ἡμῶν καὶ τὰ τέκνα ἡμῶν
  chosen: our wives and our children
  alternatives:
  - our women and our children
  lexicon: LSJ
  rationale: γυναῖκες with possessive pronoun in this context most naturally means
    'wives,' not women in general. τέκνα is straightforwardly 'children.'
- source_word: τοῦ σκυλεῦσαι ἡμᾶς
  chosen: to plunder us
  alternatives:
  - to despoil us
  - to strip us of spoil
  lexicon: LSJ
  rationale: σκυλεύω means to strip or plunder, especially after victory. 'Plunder
    us' is clear and idiomatic, preserving the military-economic sense.
