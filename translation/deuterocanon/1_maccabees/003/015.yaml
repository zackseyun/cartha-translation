theological_decisions:
- issue: Rendering ἀσεβῶν in a military-political context
  chosen_reading: ungodly men
  alternative_readings:
  - wicked men
  - godless men
  - impious men
  rationale: The Greek marks these opponents not merely as morally bad but as irreverent
    toward God and covenant order. 'Ungodly' preserves that theological coloring without
    importing later doctrinal categories.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; readable modern English'
- issue: Rendering υἱοῖς Ἰσραήλ
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  rationale: The Greek explicitly uses the traditional biblical expression 'sons of
    Israel.' Per gender-accurate policy, the masculine form is retained where it functions
    as an ethnic/covenantal designation rather than being flattened to a neutral paraphrase.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
