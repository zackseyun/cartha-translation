translation:
  text: And a strong camp of ungodly men was added and went up with him, to help him
    and to execute vengeance on the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a strong army of ungodly men joined him and went up with him.' The Greek
      παρεμβολή can denote a camp or an army.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to execute vengeance in the sons of Israel'; here the sense
      is punitive action directed against Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσεθέτο
  chosen: was added
  alternatives:
  - joined him
  - was added to him
  lexicon: LSJ
  rationale: The middle form here conveys addition to the force already in view. 'Was
    added' preserves the impersonal/passive sense without over-interpreting the subject
    as acting on its own initiative.
- source_word: ἀνέβη
  chosen: went up
  alternatives:
  - marched up
  - advanced
  lexicon: LSJ
  rationale: A standard rendering of ἀναβαίνω. 'Went up' keeps the literal movement
    language common in biblical narrative; 'marched up' would add military nuance
    already supplied by the context.
- source_word: παρεμβολὴ
  chosen: camp
  alternatives:
  - army
  - encampment
  - host
  lexicon: LSJ
  rationale: The term can denote camp or army. Here it refers to a military body accompanying
    him. 'Camp' stays closer to the Greek while still making sense in English; the
    adjective 'strong' and the context make its military force clear.
- source_word: ἀσεβῶν
  chosen: ungodly men
  alternatives:
  - wicked men
  - impious men
  - godless men
  lexicon: LSJ
  rationale: The genitive describes the character of the force. 'Ungodly' preserves
    the religious-moral dimension of ἀσεβής better than the more general 'wicked.'
    'Men' is supplied in English because the phrase refers to people, not abstract
    ungodliness.
- source_word: ἰσχυρὰ
  chosen: strong
  alternatives:
  - mighty
  - powerful
  lexicon: LSJ
  rationale: '''Strong'' is the most direct and natural equivalent, modifying the
    military force.'
- source_word: βοηθῆσαι
  chosen: to help him
  alternatives:
  - to assist him
  - to support him
  lexicon: LSJ
  rationale: The infinitive expresses purpose. 'Help' is simple and accurate.
- source_word: ποιῆσαι τὴν ἐκδίκησιν
  chosen: to execute vengeance
  alternatives:
  - to take vengeance
  - to inflict punishment
  - to carry out vengeance
  lexicon: LSJ
  rationale: The phrase is idiomatic for carrying out punitive retribution. 'Execute
    vengeance' preserves the force of the noun ἐκδίκησις without softening it to mere
    punishment.
- source_word: ἐν υἱοῖς Ἰσραήλ
  chosen: on the sons of Israel
  alternatives:
  - against the sons of Israel
  - among the sons of Israel
  - on the people of Israel
  lexicon: LSJ
  rationale: With ἐν after verbs of action, the sense can be 'upon/among.' In this
    hostile context, 'on the sons of Israel' best conveys punitive action directed
    at them. 'Sons of Israel' is retained as a conventional biblical ethnic designation,
    consistent with gender-accurate policy and the source wording.
