translation:
  text: And he was like a lion in his deeds, and like a lion’s cub roaring for prey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a young lion roaring for prey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡμοιώθη
  chosen: was like
  alternatives:
  - was made like
  - was likened to
  - became like
  lexicon: LSJ
  rationale: The passive form conveys comparison rather than transformation. 'Was
    like' is natural English and preserves the simile without overformal stiffness.
- source_word: Λέοντι
  chosen: a lion
  alternatives:
  - lion
  lexicon: LSJ
  rationale: 'Dative after ὡμοιώθη expresses the object of comparison. English idiom
    uses the indefinite article: ''like a lion.'''
- source_word: ἐν τοῖς ἔργοις αὐτοῦ
  chosen: in his deeds
  alternatives:
  - in his works
  - by his actions
  - in his actions
  lexicon: LSJ
  rationale: ἔργα here refers to what he did, especially his martial exploits. 'Deeds'
    is concise, elevated but readable, and fits heroic narrative better than the more
    ambiguous 'works.'
- source_word: σκύμνος
  chosen: lion’s cub
  alternatives:
  - young lion
  - whelp
  lexicon: LSJ
  rationale: The word denotes a young lion. 'Lion’s cub' is clear modern English and
    preserves the imagery distinctly from the previous 'lion.' 'Young lion' is possible,
    but 'cub' better reflects the lexical sense.
- source_word: ἐρυγόμενος
  chosen: roaring
  alternatives:
  - growling
  - bellowing
  lexicon: LSJ
  rationale: The participle describes the sound made in predatory pursuit. 'Roaring'
    is the standard and most vivid rendering for leonine imagery.
- source_word: εἰς θήραν
  chosen: for prey
  alternatives:
  - for the hunt
  - toward prey
  - for hunting
  lexicon: LSJ
  rationale: The phrase indicates predatory aim or purpose. 'For prey' is idiomatic
    in English animal imagery and keeps the focus on the object of the hunt rather
    than the activity alone.
