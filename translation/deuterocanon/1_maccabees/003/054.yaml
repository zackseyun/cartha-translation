translation:
  text: And they sounded the trumpets, and cried out with a loud voice.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐσάλπισαν
  chosen: sounded
  alternatives:
  - blew
  lexicon: BDAG
  rationale: The verb means to sound or blow a trumpet. 'Sounded' fits idiomatic English
    with the direct object 'the trumpets' and preserves the formal connection to the
    noun σάλπιγξιν.
- source_word: ταῖς σάλπιγξιν
  chosen: the trumpets
  alternatives:
  - with the trumpets
  - on the trumpets
  lexicon: LSJ
  rationale: The dative with σαλπίζω can be rendered instrumentally ('with the trumpets'),
    but in natural English the idiom is 'sound the trumpets.' This keeps the concrete
    instrument explicit without awkwardness.
- source_word: ἐβόησαν
  chosen: cried out
  alternatives:
  - shouted
  - raised a cry
  lexicon: BDAG
  rationale: The verb denotes a loud cry or shout. 'Cried out' preserves the vocal
    force and suits the solemn, martial context without overinterpreting the exact
    content of the cry.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - loudly
  - with a great voice
  lexicon: BDAG
  rationale: This is a common Greek idiom. 'With a loud voice' is clear modern English
    and retains the concrete phrasing better than the adverbial 'loudly.'
