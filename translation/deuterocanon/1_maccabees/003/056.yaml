translation:
  text: And he said that those building a house, and those betrothed to women, and
    those planting vineyards, and the fearful, should each return to his house, according
    to the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'according to the law' likely alludes to the battle exemptions
      in Deuteronomy 20:5–8.
    reason: cross_reference
  - marker: b
    text: Or 'the timid' / 'the cowardly' for 'the fearful.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκοδομοῦσιν οἰκίαν
  chosen: those building a house
  alternatives:
  - those who are building a house
  - house-builders
  lexicon: LSJ
  rationale: Present participle with object; a straightforward participial phrase
    is best preserved in English. The singular οἰκίαν is naturally rendered 'a house.'
- source_word: μνηστευομένοις γυναῖκας
  chosen: those betrothed to women
  alternatives:
  - those engaged to women
  - those taking wives in betrothal
  lexicon: LSJ
  rationale: μνηστεύω refers to entering betrothal. 'Betrothed' is slightly more formal
    than 'engaged' but better matches the legal/social force of the Greek. The plural
    γυναῖκας is retained as 'women' because the construction is distributive across
    the group, not because each man has multiple fiancées.
- source_word: φυτεύουσιν ἀμπελῶνας
  chosen: those planting vineyards
  alternatives:
  - those who plant vineyards
  - those planting vine-plots
  lexicon: LSJ
  rationale: ἀμπελῶνας denotes vineyards rather than merely vines; the participial
    construction parallels the surrounding categories and is kept.
- source_word: δειλοῖς
  chosen: the fearful
  alternatives:
  - the timid
  - the cowardly
  lexicon: LSJ
  rationale: δειλός can mean cowardly or timid. 'The fearful' preserves the category
    without over-interpreting whether the text is condemning moral cowardice or identifying
    those afraid for battle, and it aligns with the legal background alluded to by
    'according to the law.'
- source_word: ἀποστρέφειν ἕκαστον εἰς τὸν οἶκον αὐτοῦ
  chosen: should each turn back to his house
  alternatives:
  - let each return to his house
  - each is to go back to his house
  lexicon: LSJ
  rationale: The infinitive depends on εἶπεν in an indirect-command sense. 'Should
    each turn back' communicates the directive force while preserving the distributive
    ἕκαστον. 'His house' reflects the singular masculine distributive form in the
    Greek.
- source_word: κατὰ τὸν νόμον
  chosen: according to the law
  alternatives:
  - in accordance with the law
  - as the law says
  lexicon: LSJ
  rationale: A direct rendering is appropriate. The phrase likely evokes the warfare
    exemptions of Deut 20:5–8, but the text itself simply says 'the law,' so the translation
    remains concise and formal enough to preserve that allusion.
