theological_decisions:
- issue: Whether to make the Deuteronomic background explicit in the main text
  chosen_reading: Retain 'according to the law' without expanding the allusion
  alternative_readings:
  - according to the law of Moses
  - as prescribed in the law
  rationale: The Greek names only 'the law.' Expanding to 'law of Moses' would import
    specificity not stated in the verse, though the allusion is strong and can be
    noted in a footnote.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
- issue: Rendering the masculine distributive forms
  chosen_reading: Use 'each ... his house'
  alternative_readings:
  - each ... their house
  - each one ... home
  rationale: The Greek is grammatically masculine and distributive. Per doctrine,
    gender-accurate rendering is preferred over flattening to gender-neutral language
    where the source intent is represented by masculine forms in a military context.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral.
