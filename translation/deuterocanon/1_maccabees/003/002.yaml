theological_decisions:
- issue: Force of 'the war of Israel'
  chosen_reading: A concrete military struggle undertaken on Israel's behalf, rendered
    without expanding it into a theological slogan.
  alternative_readings:
  - the battle for Israel
  - Israel's war
  rationale: The phrase should not be flattened into a vague metaphor nor expanded
    into a doctrinal claim about holy war beyond what the text states. The Greek simply
    presents their fighting as Israel's war.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
