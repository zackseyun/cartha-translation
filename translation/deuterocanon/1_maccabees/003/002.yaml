translation:
  text: And all his brothers helped him, and all who had joined themselves to his
    father, and they fought the war of Israel with gladness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all who had attached themselves to his father,' that is, those who had
      aligned themselves with Mattathias.
    reason: lexical_alternative
  - marker: b
    text: Or 'they waged war for Israel with joy.' The Greek more literally says 'they
      fought the war of Israel with gladness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβοήθουν
  chosen: helped
  alternatives:
  - were helping
  - came to the aid of
  lexicon: BDAG
  rationale: Imperfect verb indicating ongoing/supportive action. 'Helped' gives clear
    natural English in narrative; 'were helping' is possible but unnecessarily wooden
    here.
- source_word: πάντες οἱ ἀδελφοὶ αὐτοῦ
  chosen: all his brothers
  alternatives:
  - all of his brothers
  lexicon: BDAG
  rationale: Straightforward familial reference, not a generic 'brothers' meaning
    associates. Gender-accurate rendering fits the context of Mattathias's sons.
- source_word: ὅσοι ἐκολλήθησαν τῷ πατρὶ αὐτοῦ
  chosen: who had joined themselves to his father
  alternatives:
  - who had attached themselves to his father
  - who had remained loyal to his father
  - who had allied themselves with his father
  lexicon: BDAG
  rationale: ἐκολλήθησαν from κολλάω literally means to join/attach oneself, often
    with the sense of close adherence or allegiance. 'Joined themselves to' preserves
    the reflexive and covenantal-loyalty nuance without overinterpreting.
- source_word: ἐπολέμουν τὸν πόλεμον
  chosen: fought the war
  alternatives:
  - waged war
  - fought
  lexicon: BDAG
  rationale: The Greek uses a cognate construction ('fought the war'). English can
    preserve this naturally enough here. 'Waged war' is idiomatic but slightly more
    interpretive; retaining 'war' also preserves the object specified by the Greek.
- source_word: Ἰσραήλ
  chosen: Israel
  lexicon: BDAG
  rationale: 'Here the genitive identifies the cause or people for whom the conflict
    is undertaken: ''the war of Israel.'' Retained directly rather than paraphrasing
    as ''for Israel'' in the main text.'
- source_word: μετʼ εὐφροσύνης
  chosen: with gladness
  alternatives:
  - with joy
  - joyfully
  lexicon: BDAG
  rationale: εὐφροσύνη denotes gladness/joy/rejoicing. 'With gladness' closely matches
    the prepositional phrase and preserves the tone of willing, spirited participation.
