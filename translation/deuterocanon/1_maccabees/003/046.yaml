translation:
  text: And they assembled and came to Mizpah, opposite Jerusalem, because formerly
    Mizpah had been a place of prayer for Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'facing Jerusalem.' The Greek expression indicates a position opposite
      or in front of Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν
  chosen: they assembled
  alternatives:
  - they gathered together
  - they were gathered
  lexicon: BDAG
  rationale: Aorist passive/deponent in context functions naturally as an intransitive
    collective action. 'Assembled' is concise, natural English and preserves the communal
    gathering sense without over-literal awkwardness.
- source_word: ἦλθοσαν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: BDAG
  rationale: With εἰς plus destination, the verb is best rendered 'came' in English
    narrative from the narrator's perspective. 'Arrived' is possible but slightly
    more interpretive.
- source_word: Μασσηφά
  chosen: Mizpah
  alternatives:
  - Massēpha
  - Massepha
  lexicon: LSJ
  rationale: Standard English transliteration for the biblical place-name is 'Mizpah,'
    which also reflects the known Hebrew toponym and aids reader recognition.
- source_word: κατέναντι Ἰερουσαλήμ
  chosen: opposite Jerusalem
  alternatives:
  - before Jerusalem
  - facing Jerusalem
  - near Jerusalem
  lexicon: LSJ
  rationale: κατέναντι commonly means 'opposite' or 'facing.' 'Opposite Jerusalem'
    preserves the spatial relation most directly without flattening it to mere proximity.
- source_word: τόπος προσευχῆς
  chosen: a place of prayer
  alternatives:
  - a prayer place
  - a place for prayer
  lexicon: BDAG
  rationale: This phrase denotes a recognized location for prayer. 'A place of prayer'
    is idiomatic English and preserves the cultic/devotional sense without importing
    synagogue terminology.
- source_word: τὸ πρότερον
  chosen: formerly
  alternatives:
  - previously
  - in former times
  - before
  lexicon: BDAG
  rationale: The adverbial accusative points to an earlier period. 'Formerly' is compact
    and natural in English.
- source_word: τῷ Ἰσραήλ
  chosen: for Israel
  alternatives:
  - to Israel
  - for the Israelites
  lexicon: BDAG
  rationale: 'The dative here is best taken as reference/advantage: Mizpah had served
    as a place of prayer for the people of Israel. ''For Israel'' is both literal
    and readable.'
