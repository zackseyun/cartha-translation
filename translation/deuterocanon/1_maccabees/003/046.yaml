theological_decisions:
- issue: Nature of Mizpah as a worship site
  chosen_reading: Rendered τόπος προσευχῆς as 'a place of prayer' without specifying
    synagogue, sanctuary, or altar.
  alternative_readings:
  - a prayer house
  - a place for worship
  rationale: The Greek states only that Mizpah was a place associated with prayer
    for Israel in former times. Expanding this into a more specific institutional
    or sacrificial category would import claims not explicit in the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
