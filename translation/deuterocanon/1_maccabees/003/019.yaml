translation:
  text: For victory in war is not in a multitude of strength, but strength is from
    heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but might comes from heaven.' The Greek contrasts human amassed force
      with strength granted from the divine realm.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλήθει
  chosen: a multitude of
  alternatives:
  - abundance of
  - great number of
  lexicon: LSJ
  rationale: πλῆθος commonly denotes a multitude or large number. The dative with
    ἐν expresses the sphere or basis in which victory does not consist.
- source_word: δυνάμεως
  chosen: strength
  alternatives:
  - power
  - force
  lexicon: LSJ
  rationale: δύναμις can mean power, might, or military force. Here, paired with πλήθει
    and contrasted with heaven-given ἰσχύς, 'strength' best preserves the broad sense
    without over-specifying troop numbers alone.
- source_word: νίκη πολέμου
  chosen: victory in war
  alternatives:
  - the victory of battle
  - victory of war
  lexicon: LSJ
  rationale: The genitive πολέμου qualifies the kind of victory. 'Victory in war'
    is idiomatic modern English and preserves the martial context.
- source_word: ἀλλʼ ἢ
  chosen: but
  alternatives:
  - but rather
  - except that
  lexicon: LSJ
  rationale: 'In this contrastive construction, the sense is adversative: victory
    is not grounded in one thing, but in another. English requires smoothing the idiom.'
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - from the sky
  - from Heaven
  lexicon: LSJ
  rationale: In Jewish-Greek usage, 'heaven' is the reverential way of referring to
    the divine source. Lowercase 'heaven' is retained in running text, while preserving
    the theological sense of God's aid.
- source_word: ἰσχύς
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: LSJ
  rationale: ἰσχύς denotes strength or might. Repeating 'strength' in English reflects
    the Greek contrast between human amassed δύναμις and heaven-derived ἰσχύς, though
    the terms are near-synonyms.
