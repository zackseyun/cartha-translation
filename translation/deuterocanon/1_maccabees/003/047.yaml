translation:
  text: And they fasted on that day, and put on sackcloth and ashes on their heads,
    and tore their garments.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐνήστευσαν
  chosen: they fasted
  alternatives:
  - they went without food
  - they observed a fast
  lexicon: BDAG
  rationale: The aorist verb straightforwardly denotes fasting. 'They fasted' is the
    most natural and direct English equivalent and preserves the ritual-religious
    sense.
- source_word: τῇ ἡμέρᾳ ἐκείνῃ
  chosen: on that day
  alternatives:
  - that day
  lexicon: BDAG
  rationale: The dative with temporal force is naturally rendered 'on that day.' This
    is slightly more explicit in English while remaining fully faithful to the Greek.
- source_word: περιεβάλλοντο σάκκους
  chosen: put on sackcloth
  alternatives:
  - clothed themselves with sackcloth
  - wrapped themselves in sackcloth
  lexicon: BDAG
  rationale: The middle/passive form with σάκκους expresses donning mourning attire.
    English idiom prefers the collective-material expression 'put on sackcloth' rather
    than the more wooden plural 'put on sacks' or 'sackcloth garments.'
- source_word: σποδὸν ἐπὶ τὰς κεφαλὰς αὐτῶν
  chosen: put ashes on their heads
  alternatives:
  - put ash on their heads
  - cast ashes on their heads
  lexicon: BDAG
  rationale: This phrase describes a standard mourning gesture. 'Ashes' is idiomatic
    English for the ritual act, even though the Greek singular can be rendered more
    literally as 'ash.'
- source_word: διέρρηξαν τὰ ἱμάτια αὐτῶν
  chosen: tore their garments
  alternatives:
  - rent their clothes
  - tore their clothes
  lexicon: BDAG
  rationale: The verb denotes tearing, especially as a sign of grief or distress.
    'Garments' preserves the slightly elevated register of ἱμάτια without becoming
    archaic.
