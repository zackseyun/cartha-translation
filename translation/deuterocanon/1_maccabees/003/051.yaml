theological_decisions:
- issue: Scope of τὰ ἅγιά σου
  chosen_reading: broad reference to the sacred things/holy precincts belonging to
    God, rendered without narrowing to a single sanctuary structure
  alternative_readings:
  - your sanctuary
  - your holy place
  rationale: The Greek plural is broader than a singular 'sanctuary.' To avoid importing
    a narrower architectural interpretation, the main text keeps the plural sense.
    Because English readers may naturally think of the temple sanctuary, that narrower
    option is preserved as an alternative.
