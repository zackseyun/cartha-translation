translation:
  text: And your holy things have been trampled down and profaned, and your priests
    are in mourning and humiliation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your sanctuary' or 'your holy place.' The Greek is plural, literally
      'your holy things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἅγιά
  chosen: your holy things
  alternatives:
  - your sanctuary
  - your holy place
  - your holy things
  lexicon: LSJ
  rationale: The neuter plural literally means 'the holy things' or 'holy places/things.'
    In this context it likely refers broadly to the sacred precincts and consecrated
    things of the temple rather than a single architectural space. 'Your holy things'
    preserves the plural and avoids over-specifying 'sanctuary,' though that is a
    plausible contextual alternative.
- source_word: κατεπεπάτηται
  chosen: have been trampled down
  alternatives:
  - have been trampled
  - have been trodden underfoot
  lexicon: LSJ
  rationale: Perfect passive form conveying a completed state resulting from desecration.
    'Have been trampled down' is natural modern English and preserves the violent
    imagery of being trodden underfoot.
- source_word: βεβήλωται
  chosen: profaned
  alternatives:
  - defiled
  - desecrated
  lexicon: LSJ
  rationale: '''Profaned'' directly reflects the idea of making something holy into
    something common. ''Desecrated'' is also possible, but ''profaned'' pairs well
    with the holiness language of τὰ ἅγιά.'
- source_word: ἱερεῖς
  chosen: priests
  lexicon: LSJ
  rationale: Standard rendering for the temple clergy; no contextual reason to vary.
- source_word: ἐν πένθει
  chosen: in mourning
  alternatives:
  - mourning
  - grief
  lexicon: LSJ
  rationale: The prepositional phrase denotes their condition or state. 'In mourning'
    is idiomatic and preserves the formal lament setting.
- source_word: ταπεινώσει
  chosen: humiliation
  alternatives:
  - lowliness
  - affliction
  - abasement
  lexicon: LSJ
  rationale: The noun can denote humiliation, abasement, or lowly condition. 'Humiliation'
    best fits the public disgrace and oppression implied by the context, while still
    allowing the emotional and social dimensions of the term.
