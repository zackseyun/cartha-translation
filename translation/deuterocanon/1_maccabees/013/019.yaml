id: 1MA.13.19
reference: 1 Maccabees 13:19
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέστειλε τὰ παιδάρια καὶ τὰ ἑκατὸν τάλαντα· καὶ διεψεύσατο, καὶ οὐκ ἀφῆκεν
    τὸν Ἰωναθάν.
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: And he sent the young men and the hundred talents, but he broke his word and
    did not release Jonathan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he deceived him' or 'he acted falsely.' The Greek verb can denote deceit
      generally; here it specifically refers to failing to keep the promised terms
      after receiving the payment and hostages.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλε
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Standard narrative aorist of ἀποστέλλω; 'sent' is the natural modern
    English equivalent.
- source_word: τὰ παιδάρια
  chosen: the boys
  alternatives:
  - the servants
  - the youths
  lexicon: LSJ
  rationale: παιδάριον commonly denotes a boy or young servant. In this military-political
    narrative, the phrase most naturally refers to the boys/young attendants previously
    demanded as hostages. 'Boys' keeps the age-marked sense more clearly than the
    broader 'servants'.
- source_word: τὰ ἑκατὸν τάλαντα
  chosen: the hundred talents
  alternatives:
  - the one hundred talents
  lexicon: LSJ
  rationale: A straightforward monetary expression; 'the hundred talents' is idiomatic
    and preserves the definite article.
- source_word: διεψεύσατο
  chosen: broke his word
  alternatives:
  - deceived him
  - acted falsely
  - lied
  lexicon: LSJ
  rationale: The middle of διαψεύδομαι here conveys proving false to a promise or
    acting deceitfully after receiving payment. 'Broke his word' best fits the immediate
    context of failing to do what had been promised, while still implying deceit.
- source_word: οὐκ ἀφῆκεν
  chosen: did not release
  alternatives:
  - did not let go
  - did not send away
  lexicon: BDAG
  rationale: In context Jonathan is being held captive, so ἀφίημι is best rendered
    'release' rather than the more general 'send away'.
- source_word: τὸν Ἰωναθάν
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name Ἰωναθάν.
