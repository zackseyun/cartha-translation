id: 1MA.13.5
reference: 1 Maccabees 13:5
source:
  edition: lxx-swete-1909
  text: καὶ νῦν μή μοι γένοιτο φεί- σασθαί μου τῆς ψυχῆς ἐν παντὶ καιρῷ θλίψεως· οὐ
    γάρ εἰμι κρείσσων τῶν ἀδελφῶν μου.
  language: Greek
  pages:
  - 671
  confidence: high
  validation: agree
translation:
  text: And now, far be it from me to spare my life in any time of distress; for I
    am not better than my brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to spare myself'; literally 'to spare my life/soul.' Here ψυχή refers
      to life rather than the immaterial soul.
    reason: lexical_alternative
lexical_decisions:
- source_word: μή μοι γένοιτο
  chosen: far be it from me
  alternatives:
  - may it not happen to me
  - let it never be for me
  lexicon: BDAG
  rationale: Idiomatic optative expression of strong repudiation. 'Far be it from
    me' conveys the force naturally in English better than a wooden literal rendering.
- source_word: φείσασθαί μου τῆς ψυχῆς
  chosen: to spare my life
  alternatives:
  - to spare my soul
  - to spare myself
  lexicon: LSJ
  rationale: ψυχή here refers to one's life/self rather than the immaterial 'soul.'
    The genitive with φείδομαι yields the sense of sparing or preserving one's own
    life.
- source_word: ἐν παντὶ καιρῷ θλίψεως
  chosen: in any time of distress
  alternatives:
  - at every time of affliction
  - in every season of trouble
  lexicon: LSJ
  rationale: θλῖψις in this context denotes trouble, pressure, or distress. 'Any time
    of distress' preserves the distributive force of παντί while sounding natural
    in English.
- source_word: οὐ γάρ εἰμι κρείσσων
  chosen: for I am not better
  alternatives:
  - for I am not stronger
  - for I am not superior
  lexicon: LSJ
  rationale: κρείσσων can mean better, stronger, or superior. In context Simon denies
    that he should preserve himself when his brothers did not; 'better' best captures
    moral/status comparison in idiomatic English.
- source_word: τῶν ἀδελφῶν μου
  chosen: than my brothers
  alternatives:
  - than my brothers and kin
  - than my brethren
  lexicon: BDAG
  rationale: ἀδελφοί here refers to Simon's literal brothers in the narrative. 'Brothers'
    is both accurate and natural; no gender-inclusive adjustment is warranted.
