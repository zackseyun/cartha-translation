id: 1MA.13.48
reference: 1 Maccabees 13:48
source:
  edition: lxx-swete-1909
  text: καὶ ἐξέβαλεν ἐξ αὐτῆς πᾶσαν ἀκαθαρσίαν, καὶ κατῴκισεν ἐν αὐτῇ ἄνδρας οἵτινες
    τὸν νόμον ποιοῦσιν καὶ προσοχύρωσεν αὐτήν, καὶ ᾠκοδόμησεν ἑαυτῷ ἐν αὐτῇ οἴκησιν.
  language: Greek
  pages:
  - 674
  confidence: high
  validation: agree
translation:
  text: And he drove out from it every impurity, and settled in it men who practice
    the law, and he fortified it further, and built for himself a residence in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every uncleanness' or 'every defilement.' The Greek can refer broadly
      to impurity, including ritual or moral contamination.
    reason: lexical_alternative
  - marker: b
    text: Or 'fortified it' simply; the compound verb may imply additional strengthening.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέβαλεν
  chosen: drove out
  alternatives:
  - cast out
  - expelled
  lexicon: LSJ
  rationale: The verb denotes forceful removal. 'Drove out' is natural modern English
    and preserves the active, decisive sense better than the more formal 'cast out'
    here.
- source_word: ἀκαθαρσίαν
  chosen: impurity
  alternatives:
  - uncleanness
  - defilement
  lexicon: LSJ
  rationale: The noun can denote ritual or moral uncleanness. In this context of purging
    a captured stronghold/city for lawful Jewish habitation, 'impurity' preserves
    the broad sense without over-specifying either ritual or moral categories.
- source_word: κατῴκισεν
  chosen: settled
  alternatives:
  - caused to dwell
  - established
  lexicon: LSJ
  rationale: The causative sense is that he installed inhabitants there. 'Settled'
    communicates that he populated the place with suitable residents in idiomatic
    English.
- source_word: ἄνδρας
  chosen: men
  alternatives:
  - people
  - males
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural. Per project philosophy, a gender-accurate
    rendering is preferred over a neutral one unless context clearly demands generic
    force; here the historical reference is to men installed as inhabitants/defenders.
- source_word: οἵτινες τὸν νόμον ποιοῦσιν
  chosen: who practice the law
  alternatives:
  - who keep the law
  - who do the law
  lexicon: LSJ
  rationale: ποιέω with νόμος here means to carry out or observe the law. 'Practice
    the law' is readable and preserves the ongoing behavioral sense; 'do the law'
    is too wooden, while 'keep the law' is possible but slightly narrows the idiom.
- source_word: προσοχύρωσεν
  chosen: fortified it further
  alternatives:
  - fortified it
  - strengthened it additionally
  lexicon: LSJ
  rationale: The prefixed form suggests added fortification or strengthening. 'Fortified
    it further' captures the augmenting force of the compound better than a bare 'fortified
    it.'
- source_word: ᾠκοδόμησεν ... οἴκησιν
  chosen: built for himself a residence
  alternatives:
  - built himself a dwelling
  - built a house for himself
  lexicon: LSJ
  rationale: The cognate noun-construction emphasizes a place to live. 'Residence'
    is concise and natural, avoiding awkward repetition while preserving the personal
    habitation sense.
