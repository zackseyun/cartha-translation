theological_decisions:
- issue: Scope of ἀκαθαρσία in a purification context
  chosen_reading: every impurity
  alternative_readings:
  - every uncleanness
  - every defilement
  rationale: The text does not specify whether the impurity is primarily ritual, moral,
    or political/cultic contamination. Rendering it broadly preserves the historical-religious
    tension without importing a narrower doctrinal claim.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
- issue: Gender rendering of ἄνδρας
  chosen_reading: men
  alternative_readings:
  - people
  rationale: The source uses a masculine term, and the context does not require neutralization.
    This follows the project's gender-accurate policy.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
