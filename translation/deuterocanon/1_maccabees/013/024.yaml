id: 1MA.13.24
reference: 1 Maccabees 13:24
source:
  edition: lxx-swete-1909
  text: καὶ ἐπέστρεψεν Τρύφων καὶ ἀπῆλθεν εἰς τὴν γῆν αὐτοῦ.
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: And Tryphon turned back and went away to his own land.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπέστρεψεν
  chosen: turned back
  alternatives:
  - returned
  - turned around
  lexicon: BDAG
  rationale: The aorist of ἐπιστρέφω commonly means 'turn back' or 'return.' 'Turned
    back' preserves the directional nuance and avoids sounding overly formal, while
    fitting the narrative sequence before ἀπῆλθεν.
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - went
  lexicon: BDAG
  rationale: ἀπέρχομαι here marks departure from the scene. 'Went away' is natural
    modern English and preserves the sense of leaving, while 'departed' is more formal
    and 'went' is too bare in context.
- source_word: γῆν
  chosen: land
  alternatives:
  - country
  - territory
  lexicon: BDAG
  rationale: γῆ can mean land, country, or territory. 'Land' is the broadest and least
    interpretively loaded choice here, matching the simple narrative statement without
    specifying political nuance.
- source_word: αὐτοῦ
  chosen: his own
  alternatives:
  - his
  lexicon: BDAG
  rationale: In English, 'his own land' idiomatically conveys possession and destination
    more clearly than the bare 'his land,' and reflects the Greek possessive naturally.
- source_word: Τρύφων
  chosen: Tryphon
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
