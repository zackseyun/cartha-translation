id: 1MA.13.12
reference: 1 Maccabees 13:12
source:
  edition: lxx-swete-1909
  text: Καὶ ἀπῆρεν Τρύφων ἀπὸ Πτολεμαΐδος μετὰ δυνάμεως πολλῆς εἰσελθεῖν εἰς γῆν Ἰούδα,
    καὶ Ἰωνάθαν μετʼ αὐτοῦ ἐν φυλακῇ·
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: And Tryphon set out from Ptolemais with a large force to enter the land of
    Judah, and Jonathan was with him under guard;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''in custody'' or ''in prison'' for ''under guard'' (Greek: ἐν φυλακῇ).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  chosen: set out
  alternatives:
  - departed
  - marched away
  lexicon: LSJ
  rationale: Aorist of ἀπαίρω here denotes departure/journeying from a place. 'Set
    out' is natural modern English and fits the military movement context without
    over-specifying.
- source_word: μετὰ δυνάμεως πολλῆς
  chosen: with a large force
  alternatives:
  - with a great army
  - with much power
  lexicon: LSJ
  rationale: δύναμις in military narrative commonly refers to armed force/troops rather
    than abstract power. 'Large force' preserves the military sense while remaining
    readable.
- source_word: εἰσελθεῖν εἰς γῆν Ἰούδα
  chosen: to enter the land of Judah
  alternatives:
  - to invade the land of Judah
  - to go into the land of Judah
  lexicon: LSJ
  rationale: 'The infinitive expresses purpose after the motion verb: Tryphon set
    out in order to enter Judah. ''Enter'' is the plain lexical sense; ''invade''
    would add hostile nuance beyond the wording, though the context is military.'
- source_word: γῆν Ἰούδα
  chosen: the land of Judah
  alternatives:
  - Judea
  - the territory of Judah
  lexicon: LSJ
  rationale: A more literal rendering preserves the geographic expression in the Greek.
    'Judea' is possible, but 'land of Judah' stays closer to the source and avoids
    importing later conventional terminology.
- source_word: ἐν φυλακῇ
  chosen: under guard
  alternatives:
  - in custody
  - in prison
  lexicon: LSJ
  rationale: The phrase can denote imprisonment or guarded custody. In this context
    Jonathan is being taken along as a prisoner, so 'under guard' captures the state
    without implying a fixed prison building.
