id: 1MA.13.4
reference: 1 Maccabees 13:4
source:
  edition: lxx-swete-1909
  text: τούτου χάριν ἀπώλοντο οἱ ἀδελφοί μου πάντες χάριν τοῦ Ἰσραήλ, καὶ κατελείφθην
    ἐγὼ μόνος.
  language: Greek
  pages:
  - 671
  confidence: high
  validation: agree
translation:
  text: For this reason all my brothers were destroyed for the sake of Israel, and
    I alone was left.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τούτου χάριν
  chosen: For this reason
  alternatives:
  - Because of this
  - For this cause
  lexicon: LSJ
  rationale: A natural English rendering of the causal phrase that preserves the explicit
    forward/backward causal connection without archaic diction.
- source_word: ἀπώλοντο
  chosen: were destroyed
  alternatives:
  - perished
  - were killed
  lexicon: LSJ
  rationale: The aorist middle/passive here states the brothers' ruin or death. 'Were
    destroyed' preserves the gravity and breadth of the Greek without over-specifying
    the exact manner, while fitting the wartime context.
- source_word: οἱ ἀδελφοί μου πάντες
  chosen: all my brothers
  alternatives:
  - all my brothers of mine
  - my brothers all
  lexicon: LSJ
  rationale: This keeps the emphatic totality of πάντες and the gender-accurate familial
    term ἀδελφοί. In context Simon is speaking of his literal male siblings, so 'brothers'
    is precise.
- source_word: χάριν τοῦ Ἰσραήλ
  chosen: for the sake of Israel
  alternatives:
  - because of Israel
  - on behalf of Israel
  lexicon: LSJ
  rationale: χάριν with the genitive commonly means 'for the sake of' or 'on account
    of.' 'For the sake of Israel' best conveys purposeful sacrifice in context.
- source_word: κατελείφθην
  chosen: was left
  alternatives:
  - was left behind
  - remained
  lexicon: LSJ
  rationale: The passive indicates that he was the one left surviving. 'Was left'
    is concise and idiomatic; 'alone' then carries the force of μόνος.
- source_word: ἐγὼ μόνος
  chosen: I alone
  alternatives:
  - I by myself
  - I only
  lexicon: LSJ
  rationale: This preserves the emphatic pronoun plus μόνος, highlighting Simon as
    the sole surviving brother.
