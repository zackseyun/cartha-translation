id: 1MA.13.26
reference: 1 Maccabees 13:26
source:
  edition: lxx-swete-1909
  text: καὶ ἔκοψαντο αὐτὸν πᾶς Ἰσραὴλ κοπετὸν μέγαν, καὶ ἐπένθησαν αὐτὸν ἡμέρας πολλὰς.
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: And all Israel made great mourning for him, and they mourned for him many
    days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made great lamentation for him.' The Greek uses an idiom with κόπτομαι
      and κοπετός for public mourning.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκοψαντο
  chosen: made mourning
  alternatives:
  - lamented
  - beat their breasts in mourning
  - made lamentation
  lexicon: LSJ
  rationale: From κόπτομαι in the middle, used idiomatically with κοπετόν for ritual
    mourning/lament. Rendering as 'made mourning' preserves the Greek collocation
    without over-specifying a physical gesture not explicit in English here.
- source_word: κοπετὸν μέγαν
  chosen: great mourning
  alternatives:
  - great lamentation
  - a great mourning
  lexicon: LSJ
  rationale: κοπετός denotes lamentation or mourning, often public and intense. 'Great
    mourning' is natural modern English and keeps the emphasis of μέγαν.
- source_word: πᾶς Ἰσραήλ
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: LSJ
  rationale: Standard collective expression for the people as a whole; 'all Israel'
    is both literal and idiomatic.
- source_word: ἐπένθησαν
  chosen: they mourned
  alternatives:
  - they grieved
  - they lamented
  lexicon: LSJ
  rationale: πενθέω commonly means to mourn, especially for the dead. 'Mourned' fits
    the funerary context and distinguishes it slightly from the prior idiom.
- source_word: ἡμέρας πολλὰς
  chosen: many days
  alternatives:
  - for many days
  lexicon: LSJ
  rationale: 'Accusative of duration. In English the preposition is naturally supplied
    with the verb phrase: ''they mourned for him many days.'''
