id: 1MA.13.39
reference: 1 Maccabees 13:39
source:
  edition: lxx-swete-1909
  text: ἀφίεμεν δὲ ὑμῖν ἀγνοήματα καὶ τὰ ἁμαρτήματα ἕως τῆς σήμερον ἡμέρας, καὶ τὸν
    στέφανον ὃν ὠφείλετε· καὶ εἴ τι ἄλλο ἐτελωνεῖτο ἐν Ἱερουσαλήμ, μηκέτι τελωνιζέσθω.
  language: Greek
  pages:
  - 674
  confidence: high
  validation: agree
translation:
  text: But we forgive you the oversights and the sins up to this present day, and
    the crown tax that you owed; and if anything else was being levied in Jerusalem,
    let it no longer be levied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'errors done in ignorance' for 'oversights.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the crown'; likely a royal levy or tax owed to the crown.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφίεμεν
  chosen: we forgive
  alternatives:
  - we remit
  - we release
  - we pardon
  lexicon: BDAG
  rationale: The verb commonly means to forgive, remit, or release. In this fiscal-political
    context it covers cancellation of liabilities, but because it governs both ἀγνοήματα
    and ἁμαρτήματα, 'forgive' best preserves the moral-legal breadth without flattening
    the paired terms into merely financial language.
- source_word: ἀγνοήματα
  chosen: oversights
  alternatives:
  - errors done in ignorance
  - unintentional offenses
  - ignorances
  lexicon: LSJ
  rationale: The noun denotes faults arising from ignorance or inadvertence. 'Oversights'
    is readable modern English and distinguishes it from the stronger ἁμαρτήματα while
    preserving the sense of lesser or inadvertent wrongdoing.
- source_word: ἁμαρτήματα
  chosen: sins
  alternatives:
  - offenses
  - wrongdoings
  lexicon: BDAG
  rationale: The ordinary sense is sins or offenses. 'Sins' keeps the moral force
    of the Greek and preserves the deliberate pairing with ἀγνοήματα rather than reducing
    both to administrative infractions.
- source_word: ἕως τῆς σήμερον ἡμέρας
  chosen: up to this present day
  alternatives:
  - until today
  - up to today
  lexicon: LSJ
  rationale: This phrase marks the temporal limit of the remission. 'Up to this present
    day' is slightly fuller English that reflects the formal tone of the decree.
- source_word: στέφανον
  chosen: crown tax
  alternatives:
  - crown
  - tribute
  - royal levy
  lexicon: LSJ
  rationale: Literally 'crown,' but in Hellenistic administrative usage it can denote
    a royal tax or tribute associated with the crown. Rendering it as 'crown tax'
    preserves the lexical image while making clear that a fiscal obligation is meant
    here.
- source_word: ὠφείλετε
  chosen: you owed
  alternatives:
  - you were owing
  - you were obligated to pay
  lexicon: BDAG
  rationale: The imperfect indicates an outstanding obligation. 'You owed' is natural
    English and fits the decree's cancellation of dues.
- source_word: εἴ τι ἄλλο
  chosen: if anything else
  alternatives:
  - if any other thing
  - and if anything further
  lexicon: LSJ
  rationale: This introduces an additional category of exaction beyond those already
    named. 'If anything else' is idiomatic and sufficiently broad.
- source_word: ἐτελωνεῖτο
  chosen: was being levied
  alternatives:
  - was being taxed
  - was being collected as duty
  lexicon: LSJ
  rationale: The verb is related to tax/customs collection. 'Was being levied' captures
    an imposed charge in a general way, suitable because the exact type of impost
    is not specified here.
- source_word: μηκέτι τελωνιζέσθω
  chosen: let it no longer be levied
  alternatives:
  - let it no longer be taxed
  - let it no longer be collected
  lexicon: LSJ
  rationale: The prohibition continues the taxation language of the previous clause.
    'Let it no longer be levied' preserves the formal decree style and the passive
    sense.
