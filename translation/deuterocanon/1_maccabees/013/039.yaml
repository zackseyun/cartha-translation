theological_decisions:
- issue: Whether to render ἁμαρτήματα with explicitly moral-religious language in
    a royal decree context
  chosen_reading: sins
  alternative_readings:
  - offenses
  - wrongdoings
  rationale: Although the context is political and fiscal, the Greek uses the standard
    moral term ἁμαρτήματα alongside ἀγνοήματα. Rendering it 'sins' preserves the source's
    moral-legal register rather than narrowing it to secular infractions.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Whether στέφανον should be translated literally or interpreted as a fiscal
    term
  chosen_reading: crown tax
  alternative_readings:
  - crown
  - tribute
  - royal levy
  rationale: A purely literal 'crown' would be misleading in English, since the context
    concerns debts and levies. 'Crown tax' keeps the lexical connection to 'crown'
    while communicating the administrative sense required by the context.
  doctrine_reference: Translation philosophy §§1, 6
