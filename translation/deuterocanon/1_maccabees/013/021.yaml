id: 1MA.13.21
reference: 1 Maccabees 13:21
source:
  edition: lxx-swete-1909
  text: οἱ δὲ ἐκ τῆς ἄκρας ἀπέστελλον πρεσβεύτας καὶ κατεσπούδαζον αὐτὸν τοῦ ἐλθεῖν
    Α πρὸς αὐτὸν διὰ τῆς ἐρήμου καὶ ἀποστεῖλαι αὐτοῖς τροφάς.
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: But those in the citadel kept sending envoys and urgently pressing him to
    come to them through the wilderness and to send them provisions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''to come to him''; the context suggests the collective sense ''to
      them,'' referring to those in the citadel.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ ἐκ τῆς ἄκρας
  chosen: those in the citadel
  alternatives:
  - those from the citadel
  - the men of the citadel
  lexicon: LSJ
  rationale: ἄκρα in 1 Maccabees commonly refers to the fortified citadel in Jerusalem,
    not merely a generic 'height.' Rendering the phrase idiomatically as 'those in
    the citadel' fits the military setting and the preposition ἐκ can naturally denote
    those belonging to or coming out from that location.
- source_word: ἀπέστελλον πρεσβεύτας
  chosen: kept sending envoys
  alternatives:
  - sent ambassadors
  - were sending messengers
  lexicon: LSJ
  rationale: The imperfect ἀπέστελλον suggests repeated or continued action, so 'kept
    sending' preserves the aspect better than simple past. πρεσβεύτας denotes official
    representatives, so 'envoys' is preferable to the less formal 'messengers.'
- source_word: κατεσπούδαζον
  chosen: urgently pressing
  alternatives:
  - earnestly urging
  - pressing insistently
  lexicon: LSJ
  rationale: The verb conveys zealous or urgent insistence. 'Urgently pressing' captures
    both the intensity and the ongoing imperfect aspect in readable English.
- source_word: αὐτὸν τοῦ ἐλθεῖν ... πρὸς αὐτόν
  chosen: him to come to them
  alternatives:
  - him to come to him
  lexicon: LSJ
  rationale: 'The Greek as printed has singular αὐτόν after plural αὐτοί are the implied
    recipients. In context, the sense is collective: the envoys were urging him to
    come to the party in the citadel. English ''to them'' communicates the contextual
    referent clearly. The singular form likely reflects a textual or idiomatic irregularity
    and is preserved in a footnote.'
- source_word: διὰ τῆς ἐρήμου
  chosen: through the wilderness
  alternatives:
  - by way of the desert
  - through the desert
  lexicon: LSJ
  rationale: ἐρῆμος can mean wilderness or desert. 'Wilderness' is slightly broader
    and avoids over-specifying terrain while preserving the route sense of διά.
- source_word: ἀποστεῖλαι αὐτοῖς τροφάς
  chosen: to send them provisions
  alternatives:
  - to send them food supplies
  - to dispatch food to them
  lexicon: LSJ
  rationale: τροφαί here refers to sustenance or supplies rather than the abstract
    idea of nourishment. 'Provisions' fits a besieged military context naturally.
