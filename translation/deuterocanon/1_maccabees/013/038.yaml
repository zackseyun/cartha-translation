id: 1MA.13.38
reference: 1 Maccabees 13:38
source:
  edition: lxx-swete-1909
  text: καὶ ὅσα ἐστήσαμεν πρὸς ὑμᾶς ἔστηκεν, καὶ τὰ ὀχυρώματα, ἃ ᾠκοδομήσατε, ὑπαρχέτω
    ὑμῖν.
  language: Greek
  pages:
  - 674
  confidence: high
  validation: agree
translation:
  text: And whatever we established with you stands, and the strongholds that you
    built shall remain yours.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whatever we established with you remains in force.' The Greek leaves
      the object of 'established' implicit; the translation supplies 'agreements'
      from the diplomatic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσα
  chosen: whatever agreements
  alternatives:
  - whatever things
  - all that
  lexicon: LSJ
  rationale: The neuter plural relative pronoun by itself means 'whatever things,'
    but in the diplomatic context of this letter it refers to the arrangements or
    terms previously established. Rendering it as 'agreements' makes the implied object
    explicit in natural English without straying beyond the context supplied by πρὸς
    ὑμᾶς and ἔστηκεν.
- source_word: ἐστήσαμεν
  chosen: we established
  alternatives:
  - we set up
  - we fixed
  - we agreed
  lexicon: LSJ
  rationale: From ἵστημι in an aorist form, here used idiomatically for setting in
    place arrangements or terms. 'Established' fits both the formal sense and the
    diplomatic register better than the more wooden 'set up.'
- source_word: πρὸς ὑμᾶς
  chosen: with you
  alternatives:
  - toward you
  - for you
  lexicon: LSJ
  rationale: In this context πρὸς with persons expresses relation or agreement with
    another party. 'With you' is the most idiomatic English in a treaty-like statement.
- source_word: ἔστηκεν
  chosen: stand
  alternatives:
  - remain in force
  - are established
  lexicon: LSJ
  rationale: Perfect of ἵστημι conveying continuing validity. 'Stand' is concise and
    preserves the metaphor of something fixed and still in effect; 'remain in force'
    is interpretive but possible.
- source_word: ὀχυρώματα
  chosen: strongholds
  alternatives:
  - fortresses
  - fortified places
  lexicon: LSJ
  rationale: The term denotes fortified installations. 'Strongholds' is natural English
    and broad enough to cover fortified sites without over-specifying architectural
    form.
- source_word: ᾠκοδομήσατε
  chosen: you built
  alternatives:
  - you constructed
  - you fortified
  lexicon: LSJ
  rationale: The verb ordinarily means 'build.' Although the objects are fortifications,
    the Greek does not explicitly say 'fortified,' so 'built' stays closer to the
    source.
- source_word: ὑπαρχέτω ὑμῖν
  chosen: shall remain yours
  alternatives:
  - shall belong to you
  - let them be yours
  lexicon: LSJ
  rationale: The imperative-like form in this administrative context grants continued
    possession. 'Shall remain yours' captures both possession and continuity implied
    by the surrounding confirmation language.
