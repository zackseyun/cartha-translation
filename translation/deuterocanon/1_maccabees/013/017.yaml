id: 1MA.13.17
reference: 1 Maccabees 13:17
source:
  edition: lxx-swete-1909
  text: καὶ ἔγνω Σίμων ὅτι δόλῳ λαλοῦσιν πρὸς αὐτόν, καὶ πέμπει τὸ ἀργύριον καὶ τὰ
    παιδάρια, καὶ μή ποτε ἔχθραν ἄρῃ μεγάλην πρὸς τὸν λαόν,
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: And Simon recognized that they were speaking to him deceitfully, yet he sent
    the money and the boys, lest he stir up great hostility among the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the silver.' The Greek ἀργύριον can denote silver as metal or money/payment
      silver.
    reason: lexical_alternative
  - marker: b
    text: Or 'against the people' or 'with the people.' The Greek phrase πρὸς τὸν
      λαόν is relationally flexible; the translation takes it as hostility arising
      among the populace.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔγνω
  chosen: recognized
  alternatives:
  - knew
  - perceived
  - realized
  lexicon: LSJ
  rationale: The aorist of γινώσκω here marks Simon's discernment of the situation
    rather than mere possession of information. 'Recognized' captures that he saw
    through their intent.
- source_word: δόλῳ
  chosen: deceitfully
  alternatives:
  - with deceit
  - treacherously
  - by trickery
  lexicon: LSJ
  rationale: 'The dative expresses manner/instrument: they were speaking ''with deceit''
    or ''deceitfully.'' The adverbial English is natural while preserving the sense
    of deliberate deception.'
- source_word: λαλοῦσιν πρὸς αὐτόν
  chosen: were speaking to him
  alternatives:
  - were talking to him
  - were saying to him
  lexicon: LSJ
  rationale: The present tense within indirect discourse conveys ongoing speech directed
    toward Simon. 'Were speaking to him' is a straightforward rendering.
- source_word: πέμπει
  chosen: he sent
  alternatives:
  - he sends
  - he dispatched
  lexicon: LSJ
  rationale: Although the Greek uses a historical present, English narrative style
    normally renders it as a simple past here. 'Sent' preserves the action without
    awkwardness.
- source_word: τὸ ἀργύριον
  chosen: the money
  alternatives:
  - the silver
  lexicon: LSJ
  rationale: ἀργύριον can mean silver literally or money as coined/payment silver.
    In this hostage-payment context, 'money' communicates the intended sense more
    clearly in modern English.
- source_word: τὰ παιδάρια
  chosen: the boys
  alternatives:
  - the youths
  - the lads
  - the children
  lexicon: LSJ
  rationale: παιδάριον is a diminutive referring to boys/young lads. In context these
    are Simon's sons being handed over; 'boys' is the most natural and direct English
    rendering, without implying very small children.
- source_word: μή ποτε
  chosen: lest
  alternatives:
  - so that not perhaps
  - for fear that
  lexicon: LSJ
  rationale: The phrase introduces a preventative purpose or feared result. 'Lest'
    is concise and accurate in this elevated narrative register.
- source_word: ἔχθραν ἄρῃ μεγάλην
  chosen: he stir up great hostility
  alternatives:
  - he raise great enmity
  - he incur great hatred
  - he provoke great hostility
  lexicon: LSJ
  rationale: The idiom literally involves 'raising' enmity. 'Stir up great hostility'
    conveys the causative sense in idiomatic English while preserving the social-political
    force of ἔχθρα.
- source_word: πρὸς τὸν λαόν
  chosen: among the people
  alternatives:
  - against the people
  - with the people
  lexicon: LSJ
  rationale: With ἔχθρα, πρός can indicate relational direction. Given the context,
    the sense is that refusal could generate widespread hostility in relation to the
    populace. 'Among the people' best captures the communal unrest implied, rather
    than hostility directed by Simon against them.
