id: 1MA.13.1
reference: 1 Maccabees 13:1
source:
  edition: lxx-swete-1909
  text: Καὶ ἤκουσεν Σίμων ὅτι συνῆγεν Τρύφων δύναμιν πολλὴν τοῦ ἐλθεῖν εἰς γῆν Ἰούδα
    τοῦ ἐκτρῖψαι αὐτήν.
  language: Greek
  pages:
  - 671
  confidence: high
  validation: agree
translation:
  text: And Simon heard that Tryphon was gathering a large force to come into the
    land of Judah and destroy it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land of Judea.' The Greek reads 'the land of Judah,' which may denote
      the territory historically associated with Judah rather than using later administrative
      terminology.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - was informed
  lexicon: BDAG
  rationale: The aorist of ἀκούω here introduces reported information. 'Heard' is
    the most direct and natural English equivalent, without adding interpretive nuance
    beyond the Greek.
- source_word: συνῆγεν
  chosen: was gathering
  alternatives:
  - was assembling
  - was collecting
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or inceptive action. 'Was gathering'
    preserves that aspect better than a simple past such as 'gathered.'
- source_word: δύναμιν πολλὴν
  chosen: a large force
  alternatives:
  - a great army
  - many troops
  lexicon: BDAG
  rationale: δύναμις in military context refers to armed force or troops. 'A large
    force' is idiomatic and broad enough to reflect the Greek without over-specifying
    formal army structure.
- source_word: τοῦ ἐλθεῖν
  chosen: to come
  alternatives:
  - to go
  - for coming
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose or intended result. 'To come'
    fits the deictic movement into Judah from the narrator's perspective and reads
    naturally in English.
- source_word: γῆν Ἰούδα
  chosen: the land of Judah
  alternatives:
  - the land of Judea
  - Judah
  lexicon: BDAG
  rationale: γῆ can mean land, territory, or region. 'The land of Judah' closely follows
    the Greek and preserves the historical-geographical sense without importing later
    Roman provincial terminology.
- source_word: τοῦ ἐκτρῖψαι αὐτήν
  chosen: and destroy it
  alternatives:
  - to wipe it out
  - to crush it
  - to ravage it
  lexicon: BDAG
  rationale: The infinitive with article again expresses purpose. ἐκτρίβω here carries
    the sense of destroying or wiping out. 'Destroy it' is strong, clear English that
    preserves the hostile intent without sounding colloquial.
