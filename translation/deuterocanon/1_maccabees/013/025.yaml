id: 1MA.13.25
reference: 1 Maccabees 13:25
source:
  edition: lxx-swete-1909
  text: Καὶ ἀπέστειλεν Σίμων, καὶ ἔλαβεν τὰ ὀστᾶ Ἰωναθὰν τοῦ ἀδελφοῦ αὐτοῦ, καὶ ἔθαψεν
    αὐτὸν ἐν Μωδεεὶμ πόλει τῶν πατέρων αὐτοῦ.
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: And Simon sent and took the bones of Jonathan his brother, and buried him
    in Modein, the city of his fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the city of his ancestors.' The Greek literally reads 'the city of his
      fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - sent word
  - dispatched
  lexicon: BDAG
  rationale: The verb simply states that Simon sent, with the object of the sending
    left implicit. English can preserve that brevity with 'sent' rather than expanding
    to 'sent men' or 'sent word,' which would import details not explicit in the Greek.
- source_word: ἔλαβεν
  chosen: took
  alternatives:
  - received
  - retrieved
  lexicon: BDAG
  rationale: The basic sense is 'took.' In context it refers to taking possession
    of Jonathan's remains, but 'retrieved' is slightly more interpretive than the
    Greek requires.
- source_word: τὰ ὀστᾶ
  chosen: the bones
  alternatives:
  - the remains
  lexicon: BDAG
  rationale: The Greek literally says 'the bones.' Although 'remains' is smoother
    in modern English, 'bones' is concrete and faithful to the source.
- source_word: Ἰωναθὰν
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
- source_word: τοῦ ἀδελφοῦ αὐτοῦ
  chosen: his brother
  alternatives:
  - his own brother
  lexicon: BDAG
  rationale: A straightforward possessive construction. 'His brother' is natural English
    and preserves the familial relationship without unnecessary emphasis.
- source_word: ἔθαψεν
  chosen: buried
  alternatives:
  - entombed
  - laid to rest
  lexicon: BDAG
  rationale: The ordinary verb for burial is best rendered 'buried.' The alternatives
    either over-specify or soften the directness of the Greek.
- source_word: ἐν Μωδεεὶμ
  chosen: in Modein
  alternatives:
  - at Modein
  - in Modiin
  rationale: The preposition ἐν is naturally rendered 'in.' 'Modein' is a standard
    transliteration from the Greek form here; alternate spellings reflect different
    transliteration conventions.
- source_word: πόλει τῶν πατέρων αὐτοῦ
  chosen: the city of his fathers
  alternatives:
  - the city of his ancestors
  - his ancestral city
  lexicon: BDAG
  rationale: The phrase is literally 'city of his fathers.' This preserves the source's
    familial and ancestral language; 'ancestors' is possible but less formally aligned
    with the Greek wording.
