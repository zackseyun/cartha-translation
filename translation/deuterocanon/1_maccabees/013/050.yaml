theological_decisions:
- issue: Whether to render δεξιὰς λαβεῖν literally or idiomatically
  chosen_reading: 'idiomatic: ''receive pledges of good faith'''
  alternative_readings:
  - 'literal: ''receive right hands'''
  - 'expanded: ''receive assurances of safety'''
  rationale: The phrase is an idiom, and a literal rendering would be opaque to modern
    readers. The chosen wording preserves the sense of formal assurance without importing
    more specific content than the Greek states.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Whether τὴν ἄκραν should be translated as a common noun or preserved as the
    place-name Akra
  chosen_reading: 'common noun in main text: ''the citadel'''
  alternative_readings:
  - the Akra
  rationale: Because ἄκρα is both a lexical noun and a known Jerusalem place-name
    in this context, the translation uses the transparent common-noun sense in the
    main text and preserves the historical proper-name identification in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5, 6
