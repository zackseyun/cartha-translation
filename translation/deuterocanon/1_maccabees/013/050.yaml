id: 1MA.13.50
reference: 1 Maccabees 13:50
source:
  edition: lxx-swete-1909
  text: καὶ ἐβόησαν πρὸς Σίμωνα δεξιὰς λαβεῖν, καὶ ἔδωκεν αὐτοῖς, καὶ ἐξέβαλεν αὐτοὺς
    ἐκεῖθεν, καὶ ἐκαθάρισεν τὴν ἄκραν ἀπὸ τῶν μιασμάτων.
  language: Greek
  pages:
  - 675
  confidence: high
  validation: agree
translation:
  text: And they cried out to Simon to receive pledges of good faith, and he gave
    them to them, and he drove them out from there, and he cleansed the citadel from
    its defilements.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'to receive right hands,' an idiom for receiving assurances
      or pledges of good faith.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Akra,' the fortified citadel in Jerusalem.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐβόησαν πρὸς Σίμωνα
  chosen: they cried out to Simon
  alternatives:
  - they called out to Simon
  - they appealed to Simon
  lexicon: LSJ
  rationale: ἐβόησαν is the aorist of βοάω, denoting a loud cry or urgent appeal.
    'Cried out' preserves both the vocal force and the urgency better than the flatter
    'appealed.'
- source_word: δεξιὰς λαβεῖν
  chosen: to receive pledges of good faith
  alternatives:
  - to receive right hands
  - to accept assurances
  - to receive a pledge
  lexicon: LSJ
  rationale: Literally 'to receive right hands,' an idiom for giving/receiving assurances,
    often by handshake or pledge. A wooden rendering would be obscure in modern English.
    'Pledges of good faith' communicates the idiomatic sense while preserving the
    covenantal/assurance nuance.
- source_word: ἔδωκεν αὐτοῖς
  chosen: he gave them to them
  alternatives:
  - he granted this to them
  - he gave his pledge to them
  lexicon: LSJ
  rationale: 'The object is implicit from the preceding idiom: Simon gave the requested
    pledges/assurances. ''He gave them to them'' keeps the Greek ellipsis visible,
    though the referent is supplied from context. This avoids overexpanding beyond
    the source while remaining intelligible.'
- source_word: ἐξέβαλεν αὐτοὺς ἐκεῖθεν
  chosen: he drove them out from there
  alternatives:
  - he expelled them from there
  - he cast them out from there
  lexicon: LSJ
  rationale: ἐξέβαλεν commonly means 'cast out' or 'drive out.' In this military-political
    context, 'drove them out' is natural English and preserves the forceful removal.
- source_word: τὴν ἄκραν
  chosen: the citadel
  alternatives:
  - the Akra
  - the fortress
  lexicon: LSJ
  rationale: ἄκρα can mean citadel/fortress, and in 1 Maccabees it often refers specifically
    to the Seleucid stronghold in Jerusalem known as the Akra. For main-text readability,
    'the citadel' conveys the sense directly; the proper-name alternative is worth
    preserving in a footnote.
- source_word: ἀπὸ τῶν μιασμάτων
  chosen: from its defilements
  alternatives:
  - from pollutions
  - from impurities
  - from its uncleannesses
  lexicon: LSJ
  rationale: μίασμα denotes defilement or pollution, often with cultic overtones.
    'Defilements' preserves the plural and the religious/moral sense better than the
    more physical 'impurities.' The possessive 'its' is supplied idiomatically in
    English from the object cleansed.
