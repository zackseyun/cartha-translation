id: 1MA.13.9
reference: 1 Maccabees 13:9
source:
  edition: lxx-swete-1909
  text: πολέμησον τὸν πόλεμον ἡμῶν, καὶ πάντα ὅσα ἐὰν εἴπῃς ἡμῖν ποιήσομεν.
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: Fight our battle, and we will do everything that you tell us.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πολέμησον
  chosen: Fight
  alternatives:
  - Wage war
  - Do battle
  lexicon: LSJ
  rationale: Aorist imperative of πολεμέω, calling for immediate military action.
    'Fight' is concise, natural English and fits the direct appeal.
- source_word: τὸν πόλεμον ἡμῶν
  chosen: our battle
  alternatives:
  - our war
  - the war for us
  lexicon: LSJ
  rationale: The cognate accusative with πολέμησον intensifies the command. 'Our battle'
    preserves the personal stake expressed by ἡμῶν while remaining idiomatic; 'our
    war' is possible but sounds broader and less immediate in English.
- source_word: πάντα ὅσα ἐὰν εἴπῃς
  chosen: everything that you tell us
  alternatives:
  - all that you may say to us
  - whatever you say to us
  lexicon: LSJ
  rationale: The phrase expresses comprehensive willingness to obey future instructions.
    'Everything that you tell us' captures both the totality of πάντα ὅσα and the
    practical force of the subjunctive construction in clear modern English.
- source_word: ποιήσομεν
  chosen: we will do
  alternatives:
  - we will carry out
  - we will act
  lexicon: LSJ
  rationale: Future of ποιέω here denotes obedience to commands. 'We will do' is the
    most direct and least interpretively loaded rendering.
