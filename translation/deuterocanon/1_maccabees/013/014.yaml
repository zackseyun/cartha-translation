id: 1MA.13.14
reference: 1 Maccabees 13:14
source:
  edition: lxx-swete-1909
  text: καὶ ἔγνω Τρύφων ὅτι ἀνέστη Σίμων ἀντὶ Ἰωνάθου τοῦ ἀδελφοῦ αὐτοῦ, καὶ ὅτι συνάπτειν
    αὐτῷ μέλλει εἰς πόλεμον· καὶ ἀπέστειλεν πρὸς αὐτὸν πρέσβεις, λέγων
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: And Tryphon learned that Simon had arisen in place of Jonathan his brother,
    and that he was about to engage in war against him; and he sent envoys to him,
    saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had taken Jonathan's place' / 'had risen up instead of Jonathan.' The
      Greek ἀνέστη with ἀντί can denote emergence as a successor, not merely physical
      rising.
    reason: lexical_alternative
  - marker: b
    text: Or 'to join battle with him' or 'to make war against him.' The Greek expression
      συνάπτειν αὐτῷ εἰς πόλεμον is an idiom for entering into armed conflict.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνω
  chosen: learned
  alternatives:
  - knew
  - came to know
  - found out
  lexicon: BDAG
  rationale: Aorist of γινώσκω here marks Tryphon's coming to awareness of a situation,
    not merely a stative 'knew.' 'Learned' is natural English and preserves the eventive
    sense.
- source_word: ἀνέστη
  chosen: had arisen
  alternatives:
  - rose up
  - stood up
  - had taken his place
  lexicon: BDAG
  rationale: ἀνίστημι can mean 'arise' or 'appear/stand up' in the sense of emerging
    as a leader. 'Had arisen' keeps the source image while fitting the political succession
    context. The following phrase ἀντὶ Ἰωνάθου clarifies that this is succession in
    Jonathan's place.
- source_word: ἀντὶ Ἰωνάθου
  chosen: in place of Jonathan
  alternatives:
  - instead of Jonathan
  - as successor to Jonathan
  lexicon: BDAG
  rationale: ἀντί here indicates replacement or succession. 'In place of' is a close
    and idiomatic rendering without adding interpretive specificity beyond the Greek.
- source_word: συνάπτειν αὐτῷ ... εἰς πόλεμον
  chosen: to engage him in war
  alternatives:
  - to join battle with him
  - to make war against him
  - to enter into war with him
  lexicon: LSJ
  rationale: The infinitive συνάπτειν with αὐτῷ and εἰς πόλεμον expresses entering
    into armed conflict with Tryphon. 'Engage him in war' is readable modern English
    and preserves the hostile military sense.
- source_word: μέλλει
  chosen: was about to
  alternatives:
  - intended to
  - was going to
  lexicon: BDAG
  rationale: μέλλω commonly indicates imminence or intended future action. 'Was about
    to' best captures the sense here without overstating certainty.
- source_word: ἀπέστειλεν ... πρέσβεις
  chosen: sent envoys
  alternatives:
  - sent ambassadors
  - sent messengers
  lexicon: BDAG
  rationale: πρέσβεις are diplomatic representatives rather than ordinary messengers.
    'Envoys' preserves the political nuance in accessible English.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  - with these words
  lexicon: BDAG
  rationale: The participle introduces the content of the envoys' message in the next
    verse. 'Saying' is the standard transparent rendering and appropriately leaves
    the sentence open-ended.
