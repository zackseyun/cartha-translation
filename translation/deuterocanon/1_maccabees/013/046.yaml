theological_decisions:
- issue: Penitential contrast between deserved judgment and divine compassion
  chosen_reading: Render the contrast straightforwardly as a plea not to be treated
    according to their wickedness but according to God's mercy.
  rationale: The verse expresses supplication grounded in divine mercy without adding
    covenantal or doctrinal language not explicit in the Greek.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
