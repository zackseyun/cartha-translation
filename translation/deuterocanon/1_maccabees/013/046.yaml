id: 1MA.13.46
reference: 1 Maccabees 13:46
source:
  edition: lxx-swete-1909
  text: καὶ εἶπαν Μὴ ἡμῖν χρήσῃ κατὰ τὰς πονηρίας ἡμῶν, ἀλλὰ κατὰ τὸ ἔλεός σου.
  language: Greek
  pages:
  - 674
  confidence: high
  validation: agree
translation:
  text: And they said, “Do not deal with us according to our wickedness, but according
    to your mercy.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χρήσῃ
  chosen: deal
  alternatives:
  - treat
  - act
  lexicon: LSJ
  rationale: From χράομαι in the middle, here with dative and κατά-phrase, meaning
    to conduct oneself toward or deal with someone. 'Deal with us' is idiomatic modern
    English and preserves the relational sense better than the more wooden 'use us'.
- source_word: κατὰ τὰς πονηρίας ἡμῶν
  chosen: according to our wickedness
  alternatives:
  - according to our evil deeds
  - in keeping with our wicked acts
  lexicon: LSJ
  rationale: πονηρία can denote wickedness, baseness, or evil conduct. The plural
    τὰς πονηρίας points to acts/manifestations of evil, but English often expresses
    this naturally with the collective singular 'wickedness.' This keeps the moral
    force without awkwardness.
- source_word: ἔλεός
  chosen: mercy
  alternatives:
  - steadfast mercy
  - compassion
  lexicon: LSJ
  rationale: ἔλεος commonly means mercy or compassion. 'Mercy' is the most direct
    and biblically resonant rendering here, especially in the contrast with deserved
    punishment for wickedness.
- source_word: Μὴ ἡμῖν χρήσῃ
  chosen: Do not deal with us
  alternatives:
  - Do not treat us
  - Do not act toward us
  lexicon: LSJ
  rationale: The negative imperative-like request is best rendered as a direct plea.
    'Do not deal with us' is natural English and fits the penitential tone.
