theological_decisions:
- issue: Gendered military designation
  chosen_reading: all the fighting men
  alternative_readings:
  - all the warriors
  - all the soldiers
  rationale: The Greek uses explicitly masculine ἄνδρας along with πολεμιστάς. Following
    the project's gender-accurate policy, the translation preserves the masculine
    reference rather than generalizing to a mixed-gender term unsupported by the source.
