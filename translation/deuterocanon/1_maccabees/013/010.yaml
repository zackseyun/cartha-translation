id: 1MA.13.10
reference: 1 Maccabees 13:10
source:
  edition: lxx-swete-1909
  text: καὶ συνήγαγεν πάντας τοὺς ἄνδρας τοὺς πολεμιστάς, καὶ ἐτάχυνεν τοῦ τελέσαι
    τὰ τείχη Ἰερουσαλήμ, καὶ ὠχύρωσεν αὐτὴν κυκλόθεν.
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: And he gathered all the fighting men, and hastened to finish the walls of
    Jerusalem, and fortified it all around.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνήγαγεν
  chosen: gathered
  alternatives:
  - assembled
  - brought together
  lexicon: LSJ
  rationale: Aorist of συνάγω here denotes collecting people together for a military/public
    purpose. 'Gathered' is natural modern English and stays close to the Greek without
    over-specifying the manner.
- source_word: πάντας τοὺς ἄνδρας τοὺς πολεμιστάς
  chosen: all the fighting men
  alternatives:
  - all the warriors
  - all the men of war
  lexicon: LSJ
  rationale: The phrase is explicitly masculine and military. Per gender-accurate
    philosophy, 'men' is retained rather than neutralizing. 'Fighting men' is readable
    modern English and reflects πολεμιστάς more idiomatically than the archaic 'men
    of war'.
- source_word: ἐτάχυνεν
  chosen: hastened
  alternatives:
  - hurried
  - pressed on
  lexicon: LSJ
  rationale: The verb conveys acting quickly or causing rapid completion. 'Hastened'
    preserves the sense of urgency while fitting the infinitive construction that
    follows.
- source_word: τοῦ τελέσαι
  chosen: to finish
  alternatives:
  - to complete
  - to bring to completion
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose/result with straightforward
    completion language. 'To finish' is concise and idiomatic, while still faithful
    to τελέω.
- source_word: τὰ τείχη Ἰερουσαλήμ
  chosen: the walls of Jerusalem
  alternatives:
  - Jerusalem's walls
  lexicon: LSJ
  rationale: A direct possessive rendering best reflects the Greek genitive construction
    and keeps the civic-fortification sense clear.
- source_word: ὠχύρωσεν
  chosen: fortified
  alternatives:
  - strengthened
  - made secure
  lexicon: LSJ
  rationale: The verb specifically denotes fortifying or making defensible, especially
    in military contexts. 'Fortified' preserves that technical force better than broader
    alternatives.
- source_word: αὐτὴν κυκλόθεν
  chosen: it all around
  alternatives:
  - it on every side
  - it round about
  lexicon: LSJ
  rationale: The feminine pronoun refers back to Jerusalem, but English idiom commonly
    uses 'it' for the city in this construction. κυκλόθεν indicates encircling extent;
    'all around' is natural modern English.
