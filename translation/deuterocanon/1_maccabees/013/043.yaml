id: 1MA.13.43
reference: 1 Maccabees 13:43
source:
  edition: lxx-swete-1909
  text: Ἐν ταῖς ἡμέραις ἐκείναις παρενέβαλεν ἐπὶ Γάζαν, καὶ ἐκύκλωσεν αὐτὴν παρεμβολαῖς,
    καὶ ἐποίησεν ἑλέπολιν καὶ προσήγαγεν τῇ πόλει, καὶ ἐπάταξεν πύργον ἕνα, καὶ κατελάβετο.
  language: Greek
  pages:
  - 674
  confidence: high
  validation: agree
translation:
  text: In those days he encamped against Gaza and surrounded it with encampments,
    and he made a siege engine and brought it up to the city, and he struck one tower
    and captured it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a helepolis,' a specific type of siege machine; the Greek term is more
      precise than the broader English 'siege engine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλεν
  chosen: encamped against
  alternatives:
  - camped against
  - set his camp against
  - marched against
  lexicon: LSJ
  rationale: The verb commonly refers to pitching camp or encamping, especially in
    military contexts. 'Encamped against' preserves the military sense and the preposition
    ἐπί with a hostile target better than the broader 'marched against'.
- source_word: ἐκύκλωσεν
  chosen: surrounded
  alternatives:
  - encircled
  - besieged
  lexicon: LSJ
  rationale: '''Surrounded'' is the plain sense of the verb. Although the context
    is siege warfare, the following phrase ''with encampments'' already conveys the
    military method, so ''besieged'' would compress two elements into one.'
- source_word: παρεμβολαῖς
  chosen: with encampments
  alternatives:
  - with camps
  - with siege camps
  lexicon: LSJ
  rationale: The plural denotes military camps/encampments. 'Encampments' keeps the
    connection with παρενέβαλεν and reflects the repeated military-camp imagery in
    the Greek.
- source_word: ἑλέπολιν
  chosen: a siege engine
  alternatives:
  - a battering engine
  - a city-taker
  - a helepolis
  lexicon: LSJ
  rationale: The term denotes a siege machine used against cities. 'Siege engine'
    is clear modern English and avoids an opaque transliteration, while remaining
    broad enough not to over-specify the exact machine.
- source_word: προσήγαγεν τῇ πόλει
  chosen: brought it up to the city
  alternatives:
  - brought it near the city
  - advanced it to the city
  lexicon: LSJ
  rationale: The verb means to bring or lead toward. 'Brought it up to the city' is
    idiomatic in military narrative and fits the movement of the siege engine into
    position.
- source_word: ἐπάταξεν
  chosen: struck
  alternatives:
  - smote
  - attacked
  - hit
  lexicon: LSJ
  rationale: '''Struck'' is a straightforward rendering that preserves the force of
    the verb without archaic diction like ''smote.'''
- source_word: πύργον ἕνα
  chosen: one tower
  alternatives:
  - a single tower
  - one of the towers
  lexicon: LSJ
  rationale: The Greek literally says 'one tower.' This is best preserved directly;
    'one of the towers' is interpretive and adds a partitive nuance not explicit in
    the text.
- source_word: κατελάβετο
  chosen: captured it
  alternatives:
  - took it
  - seized it
  lexicon: LSJ
  rationale: In context after striking a tower, the verb indicates taking possession.
    'Captured it' clearly communicates military seizure. The object is implicit from
    context, most naturally the tower just mentioned.
