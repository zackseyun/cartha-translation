id: 1MA.13.8
reference: 1 Maccabees 13:8
source:
  edition: lxx-swete-1909
  text: καὶ ἀπεκρίθησαν φωνῇ μεγάλῃ λέγοντες Σὺ εἶ ἡμῶν ἡγούμενος ἀντὶ Ἰούδου καὶ
    Ἰωνάθου τοῦ ἀδελφοῦ σου·
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: And they answered with a loud voice, saying, “You are our leader in place
    of Judas and Jonathan your brother.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπεκρίθησαν
  chosen: answered
  alternatives:
  - replied
  - responded
  lexicon: BDAG
  rationale: Standard narrative aorist of ἀποκρίνομαι; 'answered' is the most direct
    and natural rendering in English.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - loudly
  - in a loud voice
  lexicon: BDAG
  rationale: The dative phrase is idiomatic for manner. 'With a loud voice' preserves
    the concrete expression while remaining readable; 'loudly' would be slightly more
    dynamic.
- source_word: ἡγούμενος
  chosen: leader
  alternatives:
  - ruler
  - governor
  - commander
  lexicon: BDAG
  rationale: ἡγούμενος can denote one who leads or governs. 'Leader' best fits the
    political-military context without overstating a formal office not explicit in
    the Greek.
- source_word: ἀντί
  chosen: in place of
  alternatives:
  - instead of
  - as successor to
  lexicon: BDAG
  rationale: ἀντί here marks substitution/succession. 'In place of' is a clear, fairly
    formal rendering that preserves the sense of taking the role formerly held by
    Judas and Jonathan.
- source_word: Ἰούδου
  chosen: Judas
  alternatives:
  - Judah
  lexicon: Greek proper name
  rationale: Standard transliteration of Ἰούδας in 1 Maccabees in English tradition
    is 'Judas,' especially for Judas Maccabeus; this avoids confusion with the tribe/region
    name 'Judah'.
- source_word: Ἰωνάθου
  chosen: Jonathan
  lexicon: Greek proper name
  rationale: Standard English transliteration of the personal name.
- source_word: τοῦ ἀδελφοῦ σου
  chosen: your brother
  lexicon: BDAG
  rationale: Straightforward genitive apposition identifying Jonathan as Simon's brother;
    retained explicitly because it is present in the Greek and contributes to the
    familial succession context.
