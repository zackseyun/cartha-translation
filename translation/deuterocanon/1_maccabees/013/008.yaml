theological_decisions:
- issue: Nature of Simon's role designated by ἡγούμενος
  chosen_reading: leader
  alternative_readings:
  - ruler
  - governor
  - commander
  rationale: The verse confers recognized leadership on Simon after Judas and Jonathan.
    The Greek does not require a narrowly royal or purely military title, so 'leader'
    preserves the breadth of the term without importing later constitutional or dynastic
    claims.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning without importing doctrinal or interpretive claims the text does not make.'
