id: 1MA.13.41
reference: 1 Maccabees 13:41
source:
  edition: lxx-swete-1909
  text: Ἔτους ἑκατοστοῦ ἑβδομηκοστοῦ πρώτῃ ὁ ζυγὸς τῶν ἐθνῶν ἀπὸ τοῦ Ἰσραήλ.
  language: Greek
  pages:
  - 674
  confidence: high
  validation: agree
translation:
  text: In the one hundred seventy-first year, the yoke of the nations was removed
    from Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the yoke of the Gentiles was removed from Israel.' The Greek word can
      mean 'nations' generally or, in Jewish usage, 'Gentiles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτους ἑκατοστοῦ ἑβδομηκοστοῦ πρώτῃ
  chosen: In the one hundred seventy-first year
  alternatives:
  - In year one hundred seventy-one
  - In the hundred and seventy-first year
  lexicon: LSJ
  rationale: This is a dating formula. English idiom is best served by supplying 'In'
    and rendering the ordinal phrase as 'the one hundred seventy-first year.'
- source_word: ὁ ζυγὸς
  chosen: the yoke
  alternatives:
  - the burden
  - the domination
  lexicon: LSJ
  rationale: ζυγός literally means 'yoke' and commonly functions metaphorically for
    subjugation or oppressive rule. 'Yoke' preserves the image and historical-theological
    force without over-paraphrase.
- source_word: τῶν ἐθνῶν
  chosen: of the nations
  alternatives:
  - of the Gentiles
  - of the foreigners
  lexicon: LSJ
  rationale: ἐθνῶν can mean 'nations' or, in Jewish contexts, 'Gentiles.' Here the
    phrase refers broadly to foreign nations exercising domination over Israel. 'Of
    the nations' is the more literal and less interpretively narrowed rendering; 'Gentiles'
    remains a viable contextual alternative.
- source_word: ἀπὸ τοῦ Ἰσραήλ
  chosen: from Israel
  alternatives:
  - off Israel
  lexicon: LSJ
  rationale: ἀπό marks separation/removal. 'From Israel' is natural English and accurately
    conveys the yoke's removal from the people/nation of Israel.
