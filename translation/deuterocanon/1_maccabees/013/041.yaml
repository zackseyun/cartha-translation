theological_decisions:
- issue: Whether τῶν ἐθνῶν should be rendered with the more contextually charged 'Gentiles'
    or the more literal 'nations'
  chosen_reading: of the nations
  alternative_readings:
  - of the Gentiles
  rationale: The verse celebrates the end of foreign domination over Israel. While
    'Gentiles' would fit Jewish contextual usage, the Greek itself is the ordinary
    plural for 'nations,' and the more literal rendering avoids importing a sharper
    insider/outsider theological nuance than the wording itself requires.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    preserve theological tension rather than resolve it unnecessarily.'
