id: 1MA.13.32
reference: 1 Maccabees 13:32
source:
  edition: lxx-swete-1909
  text: καὶ ἐβασίλευσεν ἀντʼ αὐτοῦ, καὶ περιέθετο τὸ διάδημα τῆς Ἀσίας, καὶ ἐποίησεν
    πληγὴν μεγάλην ἐπὶ τῆς γῆς.
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: And he reigned in his place, and put on the crown of Asia, and inflicted a
    great blow on the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the diadem' instead of 'the crown'; the Greek term refers specifically
      to the royal headband or emblem of kingship.
    reason: lexical_alternative
  - marker: b
    text: Or 'caused great devastation in the land.' The Greek says literally 'made
      a great blow/strike upon the land,' an idiom for severe harm or calamity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβασίλευσεν
  chosen: reigned
  alternatives:
  - became king
  - ruled as king
  lexicon: LSJ
  rationale: The aorist verb denotes exercising kingship. 'Reigned' is concise and
    natural English, while preserving the royal sense without adding an ingressive
    nuance stronger than the Greek requires.
- source_word: ἀντʼ αὐτοῦ
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: LSJ
  rationale: The phrase marks succession. 'In his place' communicates replacement/succession
    clearly in idiomatic English; 'after him' is possible but weaker on the substitutional
    force of ἀντί.
- source_word: περιέθετο
  chosen: put on
  alternatives:
  - placed on himself
  - assumed
  lexicon: LSJ
  rationale: The middle form here naturally conveys putting something on oneself.
    'Put on' is straightforward and preserves the concrete image of donning the royal
    insignia better than the more interpretive 'assumed'.
- source_word: τὸ διάδημα
  chosen: the crown
  alternatives:
  - the diadem
  lexicon: LSJ
  rationale: διάδημα refers specifically to the royal headband/crown. 'Crown' is more
    accessible modern English; 'diadem' is accurate but less common and not necessary
    in the main text.
- source_word: τῆς Ἀσίας
  chosen: of Asia
  alternatives:
  - of the Asian kingdom
  - of Asia Minor
  lexicon: LSJ
  rationale: The genitive is best left as 'of Asia,' reflecting the Seleucid royal
    sphere as named in the Greek. More expansive renderings interpret the historical
    reference beyond the wording of the text.
- source_word: ἐποίησεν πληγὴν μεγάλην
  chosen: inflicted a great blow
  alternatives:
  - caused great devastation
  - dealt a great plague
  - wrought great destruction
  lexicon: LSJ
  rationale: πληγή can denote a blow, stroke, or calamity. In this political-military
    context, 'inflicted a great blow' preserves the metaphorical force without over-specifying
    disease ('plague') or broadening too far to 'devastation.'
- source_word: ἐπὶ τῆς γῆς
  chosen: on the land
  alternatives:
  - upon the earth
  - in the land
  lexicon: LSJ
  rationale: γῆ can mean land or earth. Here 'the land' best fits the likely regional-political
    sense in context, while remaining close to the Greek.
