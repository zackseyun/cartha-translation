id: 1MA.13.29
reference: 1 Maccabees 13:29
source:
  edition: lxx-swete-1909
  text: καὶ ταύτας ἐποίησεν μηχανήματα περιθεὶς στύλους μεγάλους, καὶ ἐποίησεν ἐπὶ
    τοῖς στύλοις πανοπλίας εἰς ὄνομα αἰώνιον, καὶ παρὰ ταῖς πανοπλίαις πλοῖα ἐγγεγλυμμένα,
    εἰς τὸ θεωρεῖσθαι ὑπὸ πάντων τῶν πλεόντων τὴν θάλασσαν.
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: And he made these as devices, setting up great pillars; and on the pillars
    he made suits of armor for an everlasting memorial, and beside the armor, ships
    engraved, to be seen by all who sail the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'for an eternal name.' The translation renders the idiom as 'for
      an everlasting memorial' to express enduring remembrance in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηχανήματα
  chosen: devices
  alternatives:
  - contrivances
  - structures
  - monuments
  lexicon: LSJ
  rationale: The term broadly denotes engineered contrivances or constructed works.
    In this funerary/monumental context it likely refers to crafted architectural
    features rather than military machines, so 'devices' preserves the broad sense
    without over-specifying.
- source_word: περιθεὶς
  chosen: setting up
  alternatives:
  - placing around
  - surrounding with
  - having set around
  lexicon: LSJ
  rationale: From περιτίθημι, literally 'placing around.' Here it describes the addition/installation
    of great pillars as part of the construction. 'Setting up' gives natural English
    while reflecting the participial action tied to the making.
- source_word: στύλους μεγάλους
  chosen: great pillars
  alternatives:
  - large columns
  - great columns
  lexicon: LSJ
  rationale: στῦλος commonly means pillar or column. 'Pillars' fits monumental architecture
    and is straightforward English; 'great' preserves the adjective μεγάλους.
- source_word: πανοπλίας
  chosen: suits of armor
  alternatives:
  - full armor
  - armor
  lexicon: LSJ
  rationale: πανοπλία denotes complete armor. Because the plural is used and the context
    is decorative/commemorative, 'suits of armor' clearly conveys full sets displayed
    on the pillars.
- source_word: εἰς ὄνομα αἰώνιον
  chosen: for an everlasting memorial
  alternatives:
  - for an eternal name
  - for an everlasting name
  lexicon: LSJ
  rationale: Literally 'for an eternal name.' In idiomatic English within a commemorative
    context, the sense is enduring remembrance or renown. 'Everlasting memorial' communicates
    the function without flattening the honorific force.
- source_word: πλοῖα ἐγγεγλυμμένα
  chosen: ships engraved
  alternatives:
  - carved ships
  - ships carved in relief
  lexicon: LSJ
  rationale: ἐγγεγλυμμένα indicates something engraved or carved into a surface. 'Ships
    engraved' keeps the participial form concise and suitable for monumental decoration.
- source_word: εἰς τὸ θεωρεῖσθαι
  chosen: to be seen
  alternatives:
  - for viewing
  - so as to be seen
  - to be looked at
  lexicon: LSJ
  rationale: This articular infinitive expresses purpose/result. 'To be seen' is natural
    and preserves the public-visibility purpose of the carvings.
- source_word: ὑπὸ πάντων τῶν πλεόντων τὴν θάλασσαν
  chosen: by all who sail the sea
  alternatives:
  - by all who voyage on the sea
  - by everyone sailing the sea
  lexicon: LSJ
  rationale: πλέω means to sail. 'All who sail the sea' is direct, idiomatic, and
    preserves the universal scope πάντων.
