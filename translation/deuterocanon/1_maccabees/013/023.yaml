id: 1MA.13.23
reference: 1 Maccabees 13:23
source:
  edition: lxx-swete-1909
  text: ὡς δὲ ἤγγισεν τῆς Βασκαμά, ἀπέκτεινεν τὸν Ἰωναθάν, καὶ ἐτάφη ἐκεῖ.
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: But when he came near to Baskama, he killed Jonathan, and he was buried there.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς δὲ
  chosen: But when
  alternatives:
  - and when
  - now when
  lexicon: LSJ
  rationale: Introduces the next event with mild contrast/continuation. 'But when'
    gives natural English narrative flow without overstating contrast.
- source_word: ἤγγισεν
  chosen: he came near to
  alternatives:
  - he approached
  - he drew near to
  lexicon: LSJ
  rationale: Aorist of ἐγγίζω denotes approaching or coming near. 'Came near to' is
    clear modern English and preserves the motion toward the place.
- source_word: τῆς Βασκαμά
  chosen: Baskama
  alternatives:
  - Bascama
  - Baskamah
  rationale: Place name is transliterated rather than translated, following project
    policy for names. 'Baskama' reflects a straightforward English transliteration
    of Βασκαμά.
- source_word: ἀπέκτεινεν
  chosen: he killed
  alternatives:
  - he put to death
  - he slew
  lexicon: LSJ
  rationale: The verb means to kill or put to death. 'He killed' is the most direct
    and readable rendering; 'slew' is archaic, and 'put to death' may imply formal
    execution more than the Greek itself states.
- source_word: τὸν Ἰωναθάν
  chosen: Jonathan
  alternatives:
  - Jonathan
  rationale: Personal name transliterated by standard convention.
- source_word: ἐτάφη
  chosen: he was buried
  alternatives:
  - he was entombed
  - he was laid to rest
  lexicon: LSJ
  rationale: Passive aorist of θάπτω means 'was buried.' This is the plain sense and
    avoids interpretive embellishment.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: LSJ
  rationale: Simple adverb of place; 'there' is the natural equivalent.
