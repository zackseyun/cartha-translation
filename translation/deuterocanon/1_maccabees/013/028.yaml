id: 1MA.13.28
reference: 1 Maccabees 13:28
source:
  edition: lxx-swete-1909
  text: καὶ ἔστησεν ἑπτὰ πυραμίδας, μίαν κατέ- ναντι τῆς μιᾶς, τῷ πατρὶ καὶ τῇ μητρὶ
    καὶ τέσσαρσιν ἀδελφοῖς.
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: And he set up seven pyramids, one opposite the other, for his father and mother
    and four brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one facing another.' The Greek phrase describes the monuments as arranged
      opposite each other.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστησεν
  chosen: set up
  alternatives:
  - erected
  - established
  lexicon: BDAG
  rationale: In context of constructing memorial monuments, 'set up' is natural modern
    English and preserves the concrete sense of erecting something.
- source_word: ἑπτὰ πυραμίδας
  chosen: seven pyramids
  alternatives:
  - seven monuments shaped like pyramids
  - seven pyramid-like memorials
  lexicon: LSJ
  rationale: πυραμίς ordinarily denotes a pyramid. Since the text likely refers to
    funerary memorial structures, 'pyramids' is retained in the main text as the most
    direct rendering, without over-interpreting their exact architectural form.
- source_word: μίαν κατέναντι τῆς μιᾶς
  chosen: one opposite another
  alternatives:
  - one facing another
  - one over against another
  lexicon: LSJ
  rationale: The phrase indicates reciprocal placement. 'One opposite another' is
    idiomatic enough in English while staying close to the Greek wording.
- source_word: τῷ πατρὶ καὶ τῇ μητρὶ
  chosen: for his father and mother
  alternatives:
  - for the father and the mother
  - to his father and mother
  lexicon: BDAG
  rationale: The datives are best taken as indicating dedication or commemorative
    purpose. 'His' is supplied from the context of Simon honoring his family.
- source_word: τέσσαρσιν ἀδελφοῖς
  chosen: four brothers
  alternatives:
  - his four brothers
  lexicon: BDAG
  rationale: ἀδελφοῖς here clearly means male siblings, not a generic group. 'Four
    brothers' is gender-accurate and contextually precise.
