id: 1MA.13.34
reference: 1 Maccabees 13:34
source:
  edition: lxx-swete-1909
  text: καὶ ἐπελέξατο Σίμων ἄνδρας, καὶ ἀπέστειλεν πρὸς Δημήτριον τὸν βασιλέα τοῦ
    ποιῆσαι ἄφεσιν τῇ χώρᾳ, ὅτι πᾶσαι αἱ πράξεις Τρύφωνος ἦσαν ἁρπασίαι.
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: And Simon chose men and sent them to Demetrius the king to grant remission
    to the land, because all the acts of Tryphon were acts of plundering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to grant remission to the land'; the Greek term can denote release or
      remission, likely in an administrative or fiscal sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπελέξατο
  chosen: chose
  alternatives:
  - selected
  - picked out
  lexicon: LSJ
  rationale: Middle form of ἐπιλέγομαι here straightforwardly means to choose/select.
    'Chose' is natural modern English and keeps the action concise.
- source_word: ἄνδρας
  chosen: men
  alternatives:
  - men as representatives
  - persons
  lexicon: LSJ
  rationale: The Greek specifically uses the masculine plural for adult males, not
    a generic term for people. Per gender-accurate policy, 'men' is retained.
- source_word: ἀπέστειλεν πρὸς Δημήτριον τὸν βασιλέα
  chosen: sent them to Demetrius the king
  alternatives:
  - sent to King Demetrius
  - dispatched them to Demetrius the king
  lexicon: LSJ
  rationale: The object 'them' is implied from the previously chosen men. 'Demetrius
    the king' follows the Greek order and preserves the royal title without overformalizing.
- source_word: τοῦ ποιῆσαι ἄφεσιν τῇ χώρᾳ
  chosen: to grant relief to the land
  alternatives:
  - to make remission for the land
  - to grant release to the country
  - to grant tax remission to the land
  lexicon: LSJ
  rationale: ἄφεσις can mean release, remission, or pardon. In this political-administrative
    context, Simon petitions Demetrius for easing burdens on the territory, likely
    remission of exactions or obligations. 'Grant relief to the land' communicates
    the practical sense without importing a narrower technical term not explicit in
    the verse.
- source_word: χώρᾳ
  chosen: the land
  alternatives:
  - the country
  - the territory
  lexicon: LSJ
  rationale: χώρα commonly denotes land/territory. 'The land' is idiomatic and fits
    the national-political setting of 1 Maccabees.
- source_word: πᾶσαι αἱ πράξεις Τρύφωνος
  chosen: all the acts of Tryphon
  alternatives:
  - all Tryphon's deeds
  - everything Tryphon did
  lexicon: LSJ
  rationale: πράξεις means deeds, actions, or acts. 'Acts' preserves the formal tone
    and allows the following predicate to characterize them.
- source_word: ἦσαν ἁρπασίαι
  chosen: were acts of plundering
  alternatives:
  - were robberies
  - were acts of seizure
  - were rapine
  lexicon: LSJ
  rationale: ἁρπασίαι denotes violent seizure, plundering, or robbery. Because the
    predicate is plural and qualitative, 'were acts of plundering' reflects the sense
    better than the more countable 'were robberies,' while remaining readable.
