theological_decisions:
- issue: Referent of τῶν ἁγίων
  chosen_reading: the sanctuary
  alternative_readings:
  - the holy things
  - the holy places
  - the saints
  rationale: Given 1 Maccabees' temple-centered context and the collocation with nation,
    women, and children as objects under threat, the phrase most likely refers to
    the holy sanctuary/temple rather than holy persons. This is a contextual rather
    than doctrinal decision.
  doctrine_reference: Translation philosophy §1, §5
