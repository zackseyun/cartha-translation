id: 1MA.13.6
reference: 1 Maccabees 13:6
source:
  edition: lxx-swete-1909
  text: πλὴν ἐκδικήσω περὶ τοῦ ἔθνους μου καὶ περὶ τῶν ἁγίων καὶ περὶ τῶν γυναικῶν
    καὶ τῶν τέκνων ἡμῶν, ὅτι συνήχθησαν πάντα τὰ ἔθνη ἐκτρῖψαι ἡμᾶς ἔχθρας χάριν.
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: But I will take vengeance for my nation, and for the sanctuary, and for our
    women and children, because all the nations have gathered to wipe us out out of
    hatred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy things' or 'the holy places'; the Greek literally has 'the
      holy [things/places].'
    reason: lexical_alternative
  - marker: b
    text: Or 'our wives and children.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'for the sake of hatred' or 'because of enmity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  chosen: But
  alternatives:
  - Nevertheless
  - Yet
  - Only
  lexicon: LSJ
  rationale: Introduces a strong contrast with the preceding context; 'But' is natural
    modern English and preserves the adversative force without sounding archaic.
- source_word: ἐκδικήσω
  chosen: I will take vengeance
  alternatives:
  - I will avenge
  - I will exact justice
  lexicon: BDAG/LSJ
  rationale: The future verb carries the sense of avenging or exacting retribution.
    'Take vengeance' preserves the forceful retaliatory sense in this military context
    better than the softer 'avenge,' while remaining idiomatic.
- source_word: τοῦ ἔθνους μου
  chosen: my nation
  alternatives:
  - my people
  lexicon: LSJ
  rationale: ἔθνος here refers to the Jewish national community. 'My nation' preserves
    the collective-political sense more precisely than 'my people,' especially in
    a wartime speech.
- source_word: τῶν ἁγίων
  chosen: the sanctuary
  alternatives:
  - the holy things
  - the holy places
  - the saints
  lexicon: LSJ
  rationale: In 1 Maccabees this plural commonly refers to the holy sanctuary/temple
    precincts rather than to holy persons. 'The sanctuary' gives the likely referent
    in clear English without wooden literalism.
- source_word: τῶν γυναικῶν καὶ τῶν τέκνων ἡμῶν
  chosen: our women and children
  alternatives:
  - our wives and children
  lexicon: LSJ
  rationale: γυναῖκες can mean 'women' or 'wives.' The broader 'women' fits the communal
    scope of the sentence, which lists vulnerable members of the nation generally,
    not only family units of the speaker.
- source_word: συνήχθησαν
  chosen: have gathered
  alternatives:
  - were gathered
  - have assembled
  lexicon: BDAG/LSJ
  rationale: The aorist passive here describes hostile nations coming together. English
    present perfect captures the resulting present threat naturally in context.
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - all the peoples
  lexicon: LSJ
  rationale: In this deuterocanonical historical setting, ἔθνη denotes surrounding
    nations/peoples. 'All the nations' is the most straightforward rendering and avoids
    importing later NT-specific 'Gentiles' usage.
- source_word: ἐκτρῖψαι ἡμᾶς
  chosen: to wipe us out
  alternatives:
  - to destroy us
  - to blot us out
  lexicon: LSJ
  rationale: ἐκτρίβω in this context conveys eradication. 'Wipe us out' is vivid,
    accurate, and natural modern English; 'blot us out' is possible but more idiomatically
    tied to written records.
- source_word: ἔχθρας χάριν
  chosen: out of hatred
  alternatives:
  - for hatred's sake
  - because of enmity
  lexicon: LSJ
  rationale: The phrase expresses motive. 'Out of hatred' is concise and idiomatic,
    preserving the causal force without archaic wording.
