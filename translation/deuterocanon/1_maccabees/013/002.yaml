id: 1MA.13.2
reference: 1 Maccabees 13:2
source:
  edition: lxx-swete-1909
  text: καὶ εἶδεν τὸν λαὸν ὅτι ἐστὶν ἔντρομος καὶ ἔκφοβος, καὶ ἀνέβη εἰς Ἰερουσαλὴμ
    καὶ ἤθροισεν τὸν λαόν.
  language: Greek
  pages:
  - 671
  confidence: high
  validation: minor_mismatch
translation:
  text: And he saw that the people were trembling and afraid, and he went up to Jerusalem
    and assembled the people.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔντρομος
  chosen: trembling
  alternatives:
  - terrified
  - shaking
  lexicon: LSJ
  rationale: The adjective denotes being in a state of trembling from fear. 'Trembling'
    preserves the vivid physical sense without overparaphrasing.
- source_word: ἔκφοβος
  chosen: afraid
  alternatives:
  - terrified
  - fearful
  lexicon: LSJ
  rationale: Paired with ἔντρομος, this term intensifies the people's fearful condition.
    'Afraid' is clear modern English; 'terrified' would risk overstating the second
    adjective when the Greek uses two near-synonyms for emphasis.
- source_word: ἀνέβη
  chosen: went up
  alternatives:
  - ascended
  - came up
  lexicon: LSJ
  rationale: Standard rendering of ἀναβαίνω, especially for travel to Jerusalem. 'Went
    up' preserves the idiomatic/topographical sense and biblical register without
    sounding archaic.
- source_word: ἤθροισεν
  chosen: assembled
  alternatives:
  - gathered together
  - convened
  lexicon: LSJ
  rationale: The verb means to gather or bring together. 'Assembled' fits the transitive
    construction with τὸν λαόν and reads naturally in English.
- source_word: λαός
  chosen: people
  alternatives:
  - nation
  - crowd
  lexicon: LSJ
  rationale: In this context it refers to the people as a collective body, not merely
    a random crowd. 'People' is the most natural and contextually appropriate rendering
    in both occurrences.
