id: 1MA.13.40
reference: 1 Maccabees 13:40
source:
  edition: lxx-swete-1909
  text: καὶ εἴ τινες ἐπιτήδειοι ὑμῶν γράφηναι εἰς τοὺς περὶ ἡμᾶς, ἐγγραφέσθωσαν, καὶ
    γενέσθω ἀνὰ μέσον ἡμῶν εἰρήνη.
  language: Greek
  pages:
  - 674
  confidence: high
  validation: agree
translation:
  text: And if any of you are fit to be enrolled among our people, let them be enrolled,
    and let there be peace between us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'among those around us'; the phrase likely refers to incorporation
      among the speaker's own people or party.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιτήδειοι
  chosen: fit
  alternatives:
  - suitable
  - qualified
  - eligible
  - well-disposed
  lexicon: LSJ
  rationale: The adjective can denote suitability or fitness for a role or relationship.
    In this administrative context, with enrollment following, 'fit' captures practical
    eligibility without over-specifying legal status.
- source_word: γράφηναι
  chosen: to be enrolled
  alternatives:
  - to be registered
  - to be inscribed
  lexicon: LSJ
  rationale: Though the form is unusual in this construction, the sense is administrative
    registration, confirmed by the following ἐγγραφέσθωσαν. Rendering both with enrollment/registration
    language preserves the bureaucratic force.
- source_word: τοὺς περὶ ἡμᾶς
  chosen: among our people
  alternatives:
  - among those around us
  - with us
  - in our circle
  lexicon: LSJ
  rationale: Literally 'those around us,' but in context of political affiliation
    and enrollment it refers to those belonging to the speaker's side or community.
    'Among our people' communicates incorporation into that body more naturally in
    English.
- source_word: ἐγγραφέσθωσαν
  chosen: let them be enrolled
  alternatives:
  - let them be registered
  - let them be entered on the rolls
  lexicon: LSJ
  rationale: The imperative continues the administrative idea of formal inscription.
    'Enrolled' is concise and matches the preceding infinitive.
- source_word: γενέσθω ἀνὰ μέσον ἡμῶν εἰρήνη
  chosen: let there be peace between us
  alternatives:
  - let peace come to be between us
  - let peace exist in our midst
  lexicon: LSJ
  rationale: This is a standard peace formula. 'Between us' best fits the reciprocal
    political sense in context.
