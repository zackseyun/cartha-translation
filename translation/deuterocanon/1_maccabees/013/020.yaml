id: 1MA.13.20
reference: 1 Maccabees 13:20
source:
  edition: lxx-swete-1909
  text: καὶ μετὰ ταῦτα ἦλθεν Τρύφων τοῦ ἐμβατεῦσαι εἰς τὴν πόλιν καὶ ἐκτρῖψαι αὐτήν,
    καὶ ἐκύκλωσεν ὁδὸν τὴν εἰς Ἄδωρά· καὶ Σίμων καὶ ἡ παρεμβολὴ αὐτοῦ ἀντιπαρῆγεν
    αὐτῷ εἰς πάντα τόπον οὗ ἐπορεύετο.
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: And after these things Tryphon came to enter the city and wipe it out, and
    he encircled the road to Adora; and Simon and his camp moved opposite him to every
    place where he went.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blocked the road to Adora.' The Greek literally says 'encircled the
      road to Adora,' which may describe a military maneuver intended to cut off access.
    reason: lexical_alternative
  - marker: b
    text: Or 'marched alongside him' or 'advanced opposite him.' The Greek verb suggests
      Simon's force matched Tryphon's movements from place to place.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ ταῦτα
  chosen: after these things
  alternatives:
  - after this
  - afterward
  lexicon: LSJ
  rationale: A straightforward temporal transition. 'After these things' preserves
    the Greek sequence without over-smoothing.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: LSJ
  rationale: Default narrative sense of ἔρχομαι here is 'came.' English keeps the
    historical movement simple and direct.
- source_word: τοῦ ἐμβατεῦσαι
  chosen: to enter
  alternatives:
  - to invade
  - to march into
  lexicon: LSJ
  rationale: The articular infinitive with τοῦ expresses purpose. 'To enter' is the
    most textually anchored rendering; stronger options like 'invade' interpret the
    hostile intent already made clear by the following clause.
- source_word: τὴν πόλιν
  chosen: the city
  lexicon: LSJ
  rationale: Direct and formal rendering of the object.
- source_word: ἐκτρῖψαι αὐτήν
  chosen: wipe it out
  alternatives:
  - destroy it
  - blot it out
  lexicon: LSJ
  rationale: ἐκτρίβω in this hostile military context conveys eradication/destruction.
    'Wipe it out' is idiomatic modern English that preserves the force without becoming
    paraphrastic.
- source_word: ἐκύκλωσεν ὁδὸν τὴν εἰς Ἄδωρά
  chosen: he encircled the road to Adora
  alternatives:
  - he blocked the road to Adora
  - he surrounded the way to Adora
  lexicon: LSJ
  rationale: The Greek literally says he 'encircled' the road/way leading to Adora.
    'Encircled the road' keeps the image; 'blocked' is possible as an inferred military
    effect but is less formally tied to the wording.
- source_word: Ἄδωρά
  chosen: Adora
  alternatives:
  - Adoraim
  lexicon: LSJ
  rationale: The Greek form is transliterated directly as a place name, following
    the project's policy to transliterate names.
- source_word: ἡ παρεμβολὴ αὐτοῦ
  chosen: his camp
  alternatives:
  - his army
  - his encampment
  lexicon: LSJ
  rationale: παρεμβολή commonly denotes a camp or encamped force. 'His camp' is concise
    and natural, while still allowing the military sense.
- source_word: ἀντιπαρῆγεν αὐτῷ
  chosen: moved opposite him
  alternatives:
  - marched alongside him
  - advanced against him
  lexicon: LSJ
  rationale: The compound verb suggests moving in correspondence/opposition to another's
    route. 'Moved opposite him' preserves the tactical mirroring without overstating
    direct attack.
- source_word: εἰς πάντα τόπον οὗ ἐπορεύετο
  chosen: to every place where he went
  alternatives:
  - wherever he went
  - into every place he traveled
  lexicon: LSJ
  rationale: This phrase indicates repeated matching of movement. 'To every place
    where he went' stays close to the Greek while remaining readable.
