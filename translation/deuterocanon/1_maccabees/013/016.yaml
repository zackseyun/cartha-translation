theological_decisions:
- issue: Referent of the repeated pronoun αὐτόν / implied subject of ἀφεθείς
  chosen_reading: Translate generically as 'him' without identifying the person by
    name in the verse itself.
  alternative_readings:
  - Explicitly identify the referent from context
  rationale: The Greek uses pronouns without naming the individual in this verse.
    Supplying a name would import contextual interpretation into the translation rather
    than reflect the wording of the source text.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
