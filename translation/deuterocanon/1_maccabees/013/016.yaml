id: 1MA.13.16
reference: 1 Maccabees 13:16
source:
  edition: lxx-swete-1909
  text: καὶ νῦν ἀπόστειλον ἀργυρίου ἑκατὸν τάλαντα καὶ δύο τῶν υἱῶν αὐτοῦ ὅμηρα, ὅπως
    μὴ ἀφεθεὶς ἀποστατήσῃ ἀφʼ ἡμῶν, καὶ ἀφήσομεν αὐτόν.
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: And now send a hundred talents of silver, and two of his sons as hostages,
    so that, once released, he may not revolt from us; and we will release him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπόστειλον
  chosen: send
  alternatives:
  - dispatch
  - send over
  lexicon: LSJ
  rationale: Aorist imperative with straightforward sense of sending; 'send' is natural
    modern English and sufficiently formal.
- source_word: ἀργυρίου ἑκατὸν τάλαντα
  chosen: a hundred talents of silver
  alternatives:
  - one hundred silver talents
  - a hundred talents in silver
  lexicon: LSJ
  rationale: 'Keeps the Greek measure ''talents'' rather than converting it, preserving
    historical specificity. The genitive ἀργυρίου is best rendered as material/content:
    talents of silver.'
- source_word: ὅμηρα
  chosen: hostages
  alternatives:
  - pledges
  lexicon: LSJ
  rationale: In this political-military context, ὅμηρα refers to persons held as security
    for compliance. 'Hostages' is the clearest and most accurate English term.
- source_word: ἀφεθείς
  chosen: once released
  alternatives:
  - if released
  - having been released
  - set free
  lexicon: LSJ
  rationale: Aorist passive participle modifying the implied subject of ἀποστατήσῃ.
    'Once released' captures the temporal force naturally in English without overcomplicating
    the syntax.
- source_word: ἀποστατήσῃ
  chosen: may not revolt
  alternatives:
  - may not rebel
  - may not defect
  lexicon: LSJ
  rationale: The verb denotes political rebellion or defection. 'Revolt' fits the
    context of breaking allegiance to a ruler; 'rebel' was possible, but 'revolt from
    us' better reflects the preposition ἀφʼ ἡμῶν.
- source_word: ἀφʼ ἡμῶν
  chosen: from us
  alternatives:
  - against us
  - away from us
  lexicon: LSJ
  rationale: The preposition ἀπό marks separation. 'From us' preserves the image of
    apostasy/defection from allegiance, rather than direct hostile action alone.
- source_word: ἀφήσομεν αὐτόν
  chosen: we will release him
  alternatives:
  - we will let him go
  - we will set him free
  lexicon: LSJ
  rationale: Future verb answering the demand conditionally in context. 'Release'
    also creates a deliberate verbal link with ἀφεθείς earlier in the sentence.
