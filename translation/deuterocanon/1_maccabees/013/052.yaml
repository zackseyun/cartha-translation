id: 1MA.13.52
reference: 1 Maccabees 13:52
source:
  edition: lxx-swete-1909
  text: καὶ ἔστησεν κατʼ ἐνιαυτὸν τοῦ ἄγειν τὴν ἡμέραν ταύτην. καὶ προσωχύρωσεν τὸ
    ὄρος τοῦ ἱεροῦ τὸ παρὰ τὴν ἄκραν, καὶ ᾤκει ἐκεῖ αὐτὸς καὶ οἱ παρʼ αὐτοῦ.
  language: Greek
  pages:
  - 675
  confidence: high
  validation: agree
translation:
  text: And he established it as a yearly observance to celebrate this day. And he
    fortified the hill of the sanctuary beside the citadel, and he lived there, he
    and those with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'near the Akra'; ἄκρα may refer specifically to the Seleucid fortress
      in Jerusalem rather than a citadel in a generic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστησεν
  chosen: established
  alternatives:
  - appointed
  - set up
  - ordained
  lexicon: LSJ
  rationale: The verb here introduces a standing practice for future repetition. 'Established'
    fits the institutional sense better than the more wooden 'set up' and avoids overly
    ecclesiastical overtones of 'ordained'.
- source_word: κατʼ ἐνιαυτόν
  chosen: as a yearly observance
  alternatives:
  - year by year
  - annually
  - every year
  lexicon: LSJ
  rationale: The phrase denotes annual repetition. 'As a yearly observance' brings
    out that Simon instituted an annual commemoration, not merely that something happened
    in a given year.
- source_word: τοῦ ἄγειν
  chosen: to celebrate
  alternatives:
  - to keep
  - to observe
  - to hold
  lexicon: LSJ
  rationale: With ἡμέραν, ἄγω commonly means to keep or celebrate a day/festival.
    'Celebrate' is natural modern English and suits the commemorative context.
- source_word: τὴν ἡμέραν ταύτην
  chosen: this day
  alternatives:
  - that day
  - the day
  lexicon: LSJ
  rationale: The demonstrative is deictic in the narrative, referring to the commemorated
    date just mentioned. 'This day' preserves the Greek wording straightforwardly.
- source_word: προσωχύρωσεν
  chosen: fortified
  alternatives:
  - strengthened
  - made more secure
  lexicon: LSJ
  rationale: The compound verb indicates additional fortification or strengthening
    of defenses. 'Fortified' is concise and contextually precise for military architecture.
- source_word: τὸ ὄρος τοῦ ἱεροῦ
  chosen: the hill of the sanctuary
  alternatives:
  - the temple mount
  - the mountain of the sanctuary
  - the mount of the temple
  lexicon: LSJ
  rationale: ὄρος is literally 'mountain/hill,' and ἱερόν refers to the sanctuary/temple
    precinct. 'Hill of the sanctuary' stays close to the Greek without importing later
    technical terminology like 'Temple Mount' into the main text.
- source_word: τὸ παρὰ τὴν ἄκραν
  chosen: beside the citadel
  alternatives:
  - near the Akra
  - by the citadel
  lexicon: LSJ
  rationale: ἄκρα can function as a common noun 'citadel,' though in 1 Maccabees it
    also refers to the specific Seleucid fortress known as the Akra. The main text
    uses the transparent common-noun rendering, while the proper-name alternative
    is preserved in a footnote.
- source_word: ᾤκει
  chosen: lived
  alternatives:
  - dwelt
  - resided
  lexicon: LSJ
  rationale: The imperfect describes ongoing residence. 'Lived' is idiomatic modern
    English and adequately reflects the durative sense in context.
- source_word: οἱ παρʼ αὐτοῦ
  chosen: those with him
  alternatives:
  - his people
  - his companions
  - those around him
  lexicon: LSJ
  rationale: The phrase denotes those belonging to his immediate company or household/retinue.
    'Those with him' is broad enough to preserve the Greek without over-specifying
    the group.
