id: 1MA.13.36
reference: 1 Maccabees 13:36
source:
  edition: lxx-swete-1909
  text: Βασιλεὺς Δημήτριος Σίμωνι ἀρχιερεῖ καὶ φίλῳ βασιλέων
  language: Greek
  pages:
  - 673
  confidence: high
  validation: minor_mismatch
translation:
  text: 'King Demetrius, to Simon the high priest and friend of kings:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek preserved here is a heading-like address formula: ''King Demetrius,
      to Simon the high priest and friend of kings:'' The sentence continues in the
      following verse.'
    reason: cultural_note
lexical_decisions:
- source_word: Βασιλεὺς
  chosen: King
  alternatives:
  - The king
  lexicon: LSJ
  rationale: Anarthrous title used as part of the epistolary heading; English naturally
    renders it as the royal title 'King' before the personal name.
- source_word: Δημήτριος
  chosen: Demetrius
  rationale: Standard transliteration of the personal name, following the project's
    practice of transliterating names rather than translating them.
- source_word: Σίμωνι
  chosen: Simon
  alternatives:
  - Simeon
  rationale: Standard English transliteration for the dative proper name in this historical
    context.
- source_word: ἀρχιερεῖ
  chosen: the high priest
  alternatives:
  - high priest
  lexicon: LSJ
  rationale: 'The dative apposition identifies Simon by office. English idiom prefers
    the article here: ''to Simon the high priest.'''
- source_word: καὶ
  chosen: and
  lexicon: LSJ
  rationale: Simple coordinating conjunction linking Simon's two titles.
- source_word: φίλῳ βασιλέων
  chosen: friend of kings
  alternatives:
  - friend of the kings
  - royal friend
  lexicon: LSJ
  rationale: The phrase is a courtly honorific. 'Friend of kings' preserves the literal
    plural βασιλέων and the formal titulary flavor better than the more interpretive
    'royal friend.'
