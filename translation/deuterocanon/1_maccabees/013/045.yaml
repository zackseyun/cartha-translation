id: 1MA.13.45
reference: 1 Maccabees 13:45
source:
  edition: lxx-swete-1909
  text: καὶ ἀνέβησαν οἱ ἐν τῇ πόλει σὺν ταῖς γυναιξὶ καὶ τοῖς τέκνοις ἐπὶ τὸ τεῖχος
    διερρωχότες τὰ ἱμάτια αὐτῶν, καὶ ἐβόησαν φωνῇ μεγάλῃ ἀξιοῦντες Σίμωνα δεξιὰς αὐτοῖς
    δοῦναι.
  language: Greek
  pages:
  - 674
  confidence: high
  validation: agree
translation:
  text: And those in the city went up onto the wall with their wives and children,
    having torn their garments, and they cried out with a loud voice, asking Simon
    to give them pledges of peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'give them a pledge' or 'grant them terms of peace.' The Greek literally
      says 'give right hands,' an idiom for offering a pledge of good faith or peaceful
      terms.
    reason: lexical_alternative
  - marker: b
    text: Tearing one's garments was a customary sign of grief, distress, or urgent
      supplication.
    reason: cultural_note
lexical_decisions:
- source_word: ἀνέβησαν
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: LSJ
  rationale: The verb straightforwardly denotes upward movement. 'Went up' is natural
    modern English and preserves the spatial sense without sounding overly elevated.
- source_word: οἱ ἐν τῇ πόλει
  chosen: those in the city
  alternatives:
  - the people in the city
  - those who were in the city
  lexicon: LSJ
  rationale: The substantival phrase is indefinite and collective. 'Those in the city'
    stays close to the Greek without adding 'people' where the text does not explicitly
    do so.
- source_word: σὺν ταῖς γυναιξὶ καὶ τοῖς τέκνοις
  chosen: with their wives and children
  alternatives:
  - with the women and children
  - together with their wives and children
  lexicon: LSJ
  rationale: Given the likely male referent of 'those in the city' in this siege setting,
    'their wives and children' best reflects the relational force of the phrase in
    idiomatic English.
- source_word: ἐπὶ τὸ τεῖχος
  chosen: onto the wall
  alternatives:
  - upon the wall
  - to the wall
  lexicon: LSJ
  rationale: With ἀναβαίνω, the phrase most naturally indicates ascent onto the city
    wall rather than merely movement toward it.
- source_word: διερρωχότες τὰ ἱμάτια αὐτῶν
  chosen: having torn their garments
  alternatives:
  - with their garments torn
  - having rent their clothes
  lexicon: LSJ
  rationale: This perfect participle describes a state resulting from the action of
    tearing garments, a conventional sign of distress or supplication. 'Having torn
    their garments' preserves both the action and its cultural force.
- source_word: ἐβόησαν φωνῇ μεγάλῃ
  chosen: they cried out with a loud voice
  alternatives:
  - they shouted loudly
  - they cried with a great voice
  lexicon: LSJ
  rationale: This is a common emphatic expression. 'Cried out with a loud voice' is
    idiomatic, vivid, and close to the Greek wording.
- source_word: ἀξιοῦντες
  chosen: asking
  alternatives:
  - requesting
  - begging
  - demanding
  lexicon: LSJ
  rationale: The participle indicates making an earnest request. In context, the city's
    inhabitants are pleading for terms, so 'asking' fits the tone better than the
    stronger 'demanding,' while remaining broad enough to cover the verb's force.
- source_word: δεξιὰς ... δοῦναι
  chosen: to give them his right hand
  alternatives:
  - to give them pledges
  - to grant them terms of peace
  - to extend his right hand to them
  lexicon: LSJ
  rationale: Literally 'to give right hands' is an idiom for giving a pledge, especially
    of peace or safe conduct. The main text keeps the concrete image 'his right hand'
    for transparency, while the idiomatic sense is preserved in a footnote.
