id: 1MA.13.18
reference: 1 Maccabees 13:18
source:
  edition: lxx-swete-1909
  text: λέγοντες Ὅτι οὐκ ἀπέστειλα αὐτῷ τὸ ἀργύριον καὶ τὰ παιδάρια, ἀπώλετο·
  language: Greek
  pages:
  - 672
  confidence: high
  validation: minor_mismatch
translation:
  text: saying, “Because I did not send him the silver and the boys, he was ruined.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the servants” or “the attendants” for “the boys” (τὰ παιδάρια). The
      Greek term can refer either to children/youths or to young servants, and the
      immediate context does not require a more specific rendering.
    reason: lexical_alternative
  - marker: b
    text: Or “he perished” / “he was destroyed” for “he was ruined” (ἀπώλετο). The
      Greek allows a range of destruction-language, and the exact nuance is not explicit
      in this clause alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - they were saying
  - with the message
  lexicon: LSJ
  rationale: A participial introduction to the quoted explanation. 'Saying' keeps
    the Greek structure without over-specifying subject or manner.
- source_word: Ὅτι
  chosen: Because
  alternatives:
  - that
  - since
  lexicon: LSJ
  rationale: Here ὅτι introduces the content of the claim in causal form. 'Because'
    best reflects the logic of the accusation/explanation in the direct quotation.
- source_word: οὐκ ἀπέστειλα
  chosen: I did not send
  alternatives:
  - I have not sent
  - I failed to send
  lexicon: LSJ
  rationale: Simple past fits the aorist naturally in English narrative and preserves
    the first-person voice of the quotation.
- source_word: τὸ ἀργύριον
  chosen: the silver
  alternatives:
  - the money
  lexicon: LSJ
  rationale: ἀργύριον is literally 'silver' and often functions as money. 'The silver'
    preserves the concrete wording while remaining intelligible.
- source_word: τὰ παιδάρια
  chosen: the boys
  alternatives:
  - the servants
  - the attendants
  - the youths
  lexicon: LSJ
  rationale: παιδάριον can denote boys/young servants. In this context the term likely
    refers to the young attendants sent with the payment, but 'boys' stays closer
    to the Greek while not importing a more specific social role than the text states.
- source_word: ἀπώλετο
  chosen: he was ruined
  alternatives:
  - he perished
  - he was destroyed
  - he was lost
  lexicon: LSJ
  rationale: The middle/passive form can mean 'perished' or 'was destroyed.' In context
    this is part of a reported explanation about what happened to him; 'was ruined'
    preserves the sense of destruction without forcing a narrower interpretation than
    the Greek alone requires.
