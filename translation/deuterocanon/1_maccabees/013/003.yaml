theological_decisions:
- issue: Scope of τῶν ἁγίων
  chosen_reading: Rendered as 'the holy things' rather than narrowing to 'the sanctuary.'
  alternative_readings:
  - the sanctuary
  - the sacred things
  rationale: The Greek plural adjective used substantivally can denote holy things
    broadly and may include the sanctuary, sacred rites, or consecrated matters. The
    translation preserves the broader wording rather than resolving it to one institution
    not explicitly named.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
