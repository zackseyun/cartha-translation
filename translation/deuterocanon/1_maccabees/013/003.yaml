id: 1MA.13.3
reference: 1 Maccabees 13:3
source:
  edition: lxx-swete-1909
  text: καὶ παρεκάλεσεν αὐτούς, καὶ εἶπεν αὐτοῖς Αὐτοὶ οἴδατε ὅσα ἐγὼ καὶ οἱ ἀδελφοί
    μου καὶ οἶκος τοῦ πατρός μου ἐποιήσαμεν περὶ τῶν νόμων καὶ τῶν ἁγίων, καὶ τοὺς
    πολέμους καὶ τὰς στενοχωρίας.
  language: Greek
  pages:
  - 671
  confidence: high
  validation: agree
translation:
  text: And he encouraged them and said to them, “You yourselves know what I and my
    brothers and my father’s house have done for the laws and the holy things, and
    the wars and the distresses.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the laws and the sanctuary.' The Greek says 'the holy things,' which
      may refer more broadly to the sanctuary and other sacred matters.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκάλεσεν
  chosen: encouraged
  alternatives:
  - exhorted
  - appealed to
  - comforted
  lexicon: BDAG
  rationale: παρακαλέω can mean encourage, exhort, appeal, or comfort depending on
    context. Here Simon is rallying the people before recounting past sacrifices,
    so 'encouraged' best captures supportive strengthening without over-specifying
    a formal exhortation.
- source_word: Αὐτοὶ οἴδατε
  chosen: You yourselves know
  alternatives:
  - You know
  - You know well
  lexicon: BDAG
  rationale: The explicit pronoun αὐτοὶ adds emphasis. 'You yourselves know' preserves
    that emphatic force more clearly than a simple 'you know.'
- source_word: οἶκος τοῦ πατρός μου
  chosen: my father’s house
  alternatives:
  - my father’s family
  - my ancestral house
  lexicon: BDAG
  rationale: This idiom refers to the family/household line, but 'my father’s house'
    is a standard and transparent rendering that preserves the familial-household
    idiom of the source.
- source_word: περὶ τῶν νόμων καὶ τῶν ἁγίων
  chosen: for the laws and the holy things
  alternatives:
  - for the law and the sanctuary
  - for the laws and the sancta
  - concerning the laws and the holy things
  lexicon: BDAG
  rationale: περί with verbs of acting can express concern or commitment 'for/regarding.'
    The plural νόμων is retained as 'laws.' τῶν ἁγίων is literally 'the holy things'
    and likely refers to sacred institutions or the sanctuary and its holy matters;
    the more literal rendering is kept to avoid narrowing the reference beyond the
    Greek.
- source_word: τοὺς πολέμους
  chosen: the wars
  alternatives:
  - the battles
  - the warfare
  lexicon: BDAG
  rationale: The accusative here is best taken as part of the list of what they experienced
    or undertook in defense of the laws and holy things. 'Wars' is the straightforward
    lexical equivalent and preserves the plural.
- source_word: τὰς στενοχωρίας
  chosen: the distresses we have endured
  alternatives:
  - the hardships
  - the afflictions
  - the troubles
  lexicon: BDAG
  rationale: στενοχωρία denotes distress, hardship, or affliction. Because the Greek
    lists 'the wars and the distresses' without an explicit repeated verb, English
    benefits from supplying 'we have endured' to make the sense natural while remaining
    anchored to the implied experience.
- source_word: ἐποιήσαμεν
  chosen: have done
  alternatives:
  - did
  - accomplished
  - undertook
  lexicon: BDAG
  rationale: ποιέω is broad. 'Have done' preserves the plain verbal sense and works
    with the retrospective appeal to known deeds and sufferings.
