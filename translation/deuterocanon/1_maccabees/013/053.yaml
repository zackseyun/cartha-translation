id: 1MA.13.53
reference: 1 Maccabees 13:53
source:
  edition: lxx-swete-1909
  text: καὶ εἶδεν Σίμων τὸν Ἰωάννην τὸν υἱὸν αὐτοῦ, ὅτι ἀνὴρ ἐστίν, καὶ ἔθετο αὐτὸν
    ἡγούμενον τῶν δυνάμεων πάσων· καὶ ᾤκει ἐν Γαζάροις.
  language: Greek
  pages:
  - 675
  confidence: high
  validation: agree
translation:
  text: And Simon saw that John his son was a man, and he appointed him commander
    over all the forces; and he lived in Gazara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gazara is the Greek form of the site more commonly known as Gezer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ
  chosen: a man
  alternatives:
  - grown man
  - mature man
  lexicon: LSJ
  rationale: The clause ὅτι ἀνὴρ ἐστίν marks John as having reached manhood or proven
    adult capability. 'A man' preserves the Greek wording and the gender-accurate
    sense better than a more interpretive expansion like 'grown up,' while the following
    appointment explains the practical implication.
- source_word: ἔθετο
  chosen: appointed
  alternatives:
  - set
  - placed
  lexicon: LSJ
  rationale: In context of assigning office, 'appointed' conveys the administrative
    action more naturally in English than the more literal 'set' or 'placed'.
- source_word: ἡγούμενον
  chosen: commander
  alternatives:
  - leader
  - governor
  lexicon: LSJ
  rationale: With τῶν δυνάμεων πάσων ('of all the forces'), the participle denotes
    military leadership. 'Commander' makes that explicit in idiomatic English without
    overtranslating.
- source_word: τῶν δυνάμεων πάσων
  chosen: over all the forces
  alternatives:
  - of all the forces
  - over all the troops
  lexicon: LSJ
  rationale: δυνάμεις here refers to military forces. 'Over all the forces' reflects
    the genitive construction with ἡγούμενον and preserves the broad military sense.
- source_word: ᾤκει
  chosen: he lived
  alternatives:
  - he dwelt
  - he resided
  lexicon: LSJ
  rationale: The imperfect of οἰκέω indicates ongoing residence. 'He lived' is natural
    modern English and adequately conveys continued dwelling.
- source_word: ἐν Γαζάροις
  chosen: in Gazara
  alternatives:
  - in Gezer
  lexicon: LSJ
  rationale: The Greek text gives the place-name as Gazara/Gazaris. Following the
    project's preference to transliterate names from the source text, 'Gazara' is
    retained in the main text; the historically familiar equivalent 'Gezer' is worth
    preserving in a footnote.
