id: 1MA.13.13
reference: 1 Maccabees 13:13
source:
  edition: lxx-swete-1909
  text: Σίμων δὲ παρενέβαλεν ἐν Ἀδείδοις κατὰ πρόσωπον τοῦ πεδίου.
  language: Greek
  pages:
  - 672
  confidence: high
  validation: minor_mismatch
translation:
  text: But Simon encamped at Adida, opposite the plain.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρενέβαλεν
  chosen: encamped
  alternatives:
  - camped
  - set up camp
  lexicon: LSJ
  rationale: The aorist of παρεμβάλλω in military context commonly means to encamp
    or pitch camp. 'Encamped' is concise, natural English and preserves the military
    sense better than the more colloquial 'set up camp'.
- source_word: ἐν Ἀδείδοις
  chosen: at Adida
  alternatives:
  - in Adida
  lexicon: LSJ
  rationale: With ἐν plus a place name, English idiom for a town or site is often
    'at' rather than 'in' when describing military positioning. 'Adida' is the standard
    transliteration of the place name Ἀδείδοις.
- source_word: κατὰ πρόσωπον
  chosen: opposite
  alternatives:
  - before
  - facing
  - in front of
  lexicon: LSJ
  rationale: The phrase κατὰ πρόσωπον here is spatial, indicating position facing
    or opposite something. 'Opposite' best fits the military-geographical description
    in concise modern English.
- source_word: τοῦ πεδίου
  chosen: the plain
  alternatives:
  - the field
  - the open country
  lexicon: LSJ
  rationale: πεδίον commonly denotes a plain or level open land. In this geographical
    setting, 'the plain' is more natural and specific than 'the field'.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: LSJ
  rationale: δὲ marks a mild transition. 'But' appropriately signals the narrative
    shift to Simon's action, though the contrast is not strong. It is retained for
    discourse flow.
