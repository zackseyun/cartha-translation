id: 1MA.13.37
reference: 1 Maccabees 13:37
source:
  edition: lxx-swete-1909
  text: καὶ πρεσβυτέροις καὶ ἔθνει Ἰουδαίων χαίρειν. τὸν στέφανον τὸν χρυσοῦν, καὶ
    τὴν βαΐν ἣν ἀπεστείλατε, κεκομίσμεθα, καὶ ἕτοιμοί ἐσμεν τοῦ ποιεῖν ὑμῖν εἰρήνην
    μεγάλην, καὶ γράφειν τοῖς ἐπὶ τῶν χρειῶν τοῦ ἀφεῖναι ὑμῖν ἀφέματα.
  language: Greek
  pages:
  - 674
  confidence: high
  validation: minor_mismatch
translation:
  text: And to the elders and the nation of the Jews, greetings. We have received
    the gold crown and the palm branch that you sent, and we are ready to make great
    peace with you and to write to the officials in charge to grant you remissions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the palm frond' or 'the bough'; the Greek term denotes a palm branch
      used ceremonially or honorifically.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'grant you remissions' likely refers to administrative or fiscal
      exemptions, though the Greek itself does not specify the exact kind here.
    reason: cultural_note
lexical_decisions:
- source_word: πρεσβυτέροις
  chosen: elders
  alternatives:
  - older men
  lexicon: LSJ
  rationale: In this political-diplomatic address, the term most naturally refers
    to recognized community leaders rather than merely elderly males.
- source_word: ἔθνει Ἰουδαίων
  chosen: the nation of the Jews
  alternatives:
  - the people of the Jews
  - the Jewish nation
  lexicon: LSJ
  rationale: ἔθνος here denotes a people/nation in a corporate sense. 'Nation of the
    Jews' preserves the formal diplomatic tone of the Greek.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - hail
  lexicon: LSJ
  rationale: Standard epistolary infinitive used in letters; 'greetings' is the natural
    English equivalent rather than the literal but misleading 'rejoice'.
- source_word: στέφανον τὸν χρυσοῦν
  chosen: the gold crown
  alternatives:
  - the golden crown
  lexicon: LSJ
  rationale: A straightforward rendering of the diplomatic gift; 'gold crown' is slightly
    more idiomatic in modern English while remaining formal.
- source_word: βαΐν
  chosen: the palm branch
  alternatives:
  - the bough
  - the palm frond
  lexicon: LSJ
  rationale: βαΐον denotes a palm branch. Singular is retained because the Greek is
    singular here.
- source_word: κεκομίσμεθα
  chosen: we have received
  alternatives:
  - we have obtained
  - we have gotten
  lexicon: LSJ
  rationale: The perfect conveys completed receipt of what was sent. 'We have received'
    fits the diplomatic context naturally.
- source_word: ἕτοιμοί ἐσμεν
  chosen: we are ready
  alternatives:
  - we stand ready
  - we are prepared
  lexicon: LSJ
  rationale: Simple predicate of readiness; 'we are ready' is clear and sufficiently
    formal.
- source_word: ποιεῖν ὑμῖν εἰρήνην μεγάλην
  chosen: to make great peace with you
  alternatives:
  - to make a great peace with you
  - to establish full peace with you
  lexicon: LSJ
  rationale: The Greek is somewhat Semitic in flavor. 'Make great peace' preserves
    the source's emphasis better than flattening it to merely 'make peace,' while
    remaining intelligible.
- source_word: τοῖς ἐπὶ τῶν χρειῶν
  chosen: the officials in charge
  alternatives:
  - those over the affairs
  - the administrators
  lexicon: LSJ
  rationale: An administrative expression for those overseeing governmental business.
    'Officials in charge' communicates function without over-specifying office.
- source_word: ἀφεῖναι ὑμῖν ἀφέματα
  chosen: to grant you remissions
  alternatives:
  - to remit to you exemptions
  - to grant you tax remissions
  - to release to you remissions
  lexicon: LSJ
  rationale: The cognate verb-noun construction points to granting remissions/exemptions,
    likely fiscal or administrative in context. 'Remissions' preserves the formal
    breadth without importing a narrower term not explicit in the Greek.
