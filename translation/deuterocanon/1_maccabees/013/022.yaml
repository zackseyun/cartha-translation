id: 1MA.13.22
reference: 1 Maccabees 13:22
source:
  edition: lxx-swete-1909
  text: καὶ ἡτοίμασεν Τρύφων πᾶσαν τὴν ἵππον αὐτοῦ ἐλθεῖν· καὶ ἐν τῇ νυκτὶ ἐκείνῃ
    ἦν χιών πολλὴ σφόδρα, καὶ οὐκ ἦλθεν διὰ τὴν χιόνα· καὶ ἀπῆρεν καὶ ἦλθεν εἰς τὴν
    Γαλααδῖτιν.
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: And Tryphon prepared all his cavalry to come; but on that night there was
    a very great snowfall, and he did not come because of the snow. So he broke camp
    and went into the Gilead region.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''into the Galaaditis/Gileaditis,'' that is, the region of Gilead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡτοίμασεν
  chosen: prepared
  alternatives:
  - made ready
  - got ready
  lexicon: LSJ
  rationale: A straightforward past-tense rendering that fits military preparation
    without overinterpreting the action.
- source_word: πᾶσαν τὴν ἵππον αὐτοῦ
  chosen: all his cavalry
  alternatives:
  - all his horsemen
  - his whole cavalry force
  lexicon: LSJ
  rationale: ἵππος literally means 'horse,' but in military context the collective
    expression refers to mounted troops. 'Cavalry' is natural modern English and preserves
    the military sense better than a wooden 'horse.'
- source_word: ἐλθεῖν
  chosen: to come
  alternatives:
  - to go
  - to advance
  lexicon: LSJ
  rationale: The infinitive depends on 'prepared' and is rendered simply. Although
    in military context it implies movement/advance, 'to come' matches the Greek wording
    without adding nuance.
- source_word: χιών πολλὴ σφόδρα
  chosen: a very great snowfall
  alternatives:
  - very much snow
  - an extremely heavy snow
  lexicon: LSJ
  rationale: The phrase intensifies the amount of snow. 'A very great snowfall' communicates
    both the event and severity in idiomatic English.
- source_word: οὐκ ἦλθεν διὰ τὴν χιόνα
  chosen: he did not come because of the snow
  alternatives:
  - he did not arrive on account of the snow
  - he could not come because of the snow
  lexicon: LSJ
  rationale: This preserves the explicit causal force of διά with the accusative.
    'Could not come' is interpretive; the Greek states the fact and cause, not explicit
    inability.
- source_word: ἀπῆρεν
  chosen: broke camp
  alternatives:
  - departed
  - set out
  - marched away
  lexicon: LSJ
  rationale: In this military narrative, the verb likely implies striking camp and
    moving on rather than generic departure. 'Broke camp' captures the situational
    force in readable English.
- source_word: Γαλααδῖτιν
  chosen: the Gilead region
  alternatives:
  - Galaaditis
  - Gileaditis
  lexicon: LSJ
  rationale: The place name refers to the district of Gilead. Translating as 'the
    Gilead region' is clearer for modern readers than a bare transliteration of the
    Greek regional form.
