id: 1MA.13.42
reference: 1 Maccabees 13:42
source:
  edition: lxx-swete-1909
  text: καὶ ἤρξατο ὁ λαὸς Ἰσραὴλ γράφειν ἐν ταῖς συγγραφαῖς καὶ συναλλάγμασιν Ἔτους
    πρώτου ἐπὶ Σίμωνος ἀρχιερέως μεγάλου καὶ στρατηγοῦ καὶ ἡγουμένου Ἰουδαίων.
  language: Greek
  pages:
  - 674
  confidence: high
  validation: agree
translation:
  text: And the people of Israel began to write in documents and contracts, “Year
    one of Simon, the great high priest and general and leader of the Jews.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “of the Judeans.” The Greek ethnonym can denote either the Jewish people
      broadly or the people of Judea more specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: LSJ
  rationale: Aorist middle of ἄρχω here marks the inception of a practice. 'Began'
    is the most natural modern English equivalent.
- source_word: ὁ λαὸς Ἰσραήλ
  chosen: the people of Israel
  alternatives:
  - Israel
  - the Israelite people
  lexicon: LSJ
  rationale: The phrase explicitly names the collective people; 'the people of Israel'
    preserves both the noun and the genitive name without over-compressing.
- source_word: γράφειν
  chosen: to write
  alternatives:
  - to record
  lexicon: LSJ
  rationale: The infinitive after ἤρξατο expresses the action initiated. 'To write'
    is formally closer; the context of dating formulas in records is then clarified
    by the following nouns.
- source_word: ἐν ταῖς συγγραφαῖς
  chosen: in documents
  alternatives:
  - in records
  - in written instruments
  lexicon: LSJ
  rationale: συγγραφή can denote a written document or record. 'Documents' is clear
    modern English and fits the administrative context.
- source_word: καὶ συναλλάγμασιν
  chosen: and contracts
  alternatives:
  - and transactions
  - and agreements
  lexicon: LSJ
  rationale: συνάλλαγμα commonly refers to a business dealing or contractual arrangement.
    'Contracts' best fits the sense of formal dated instruments alongside 'documents.'
- source_word: Ἔτους πρώτου
  chosen: Year one
  alternatives:
  - In the first year
  - Year first
  lexicon: LSJ
  rationale: This is a dating formula. 'Year one' is idiomatic in English for an era
    designation and preserves the concise documentary style.
- source_word: ἐπὶ Σίμωνος
  chosen: under Simon
  alternatives:
  - in the time of Simon
  - in the days of Simon
  lexicon: LSJ
  rationale: ἐπί with the genitive in dating formulas indicates the time or administration
    under which something occurs. 'Under Simon' is concise and suits the official
    formula.
- source_word: ἀρχιερέως μεγάλου
  chosen: the great high priest
  alternatives:
  - the high priest
  - the chief priest
  lexicon: LSJ
  rationale: Both words are present and should be represented. The adjective μεγάλου
    is not redundant here but part of Simon's elevated title, so 'the great high priest'
    is retained.
- source_word: στρατηγοῦ
  chosen: general
  alternatives:
  - commander
  - military leader
  lexicon: LSJ
  rationale: στρατηγός is a military title. 'General' is the most direct and readable
    equivalent.
- source_word: ἡγουμένου
  chosen: leader
  alternatives:
  - governor
  - ruler
  lexicon: LSJ
  rationale: ἡγούμενος denotes one who leads or governs. 'Leader' is broad enough
    to preserve the term without overstating a specific constitutional office.
- source_word: Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of Judeans
  lexicon: LSJ
  rationale: In 1 Maccabees this ethnonym can be rendered either 'Jews' or 'Judeans'
    depending on context. Here the phrase functions as a public title in a broad ethnic-political
    sense; 'Jews' is the more natural English rendering, while 'Judeans' remains a
    viable alternative.
