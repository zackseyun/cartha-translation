theological_decisions:
- issue: Rendering of Ἰουδαίων in Simon's title
  chosen_reading: of the Jews
  alternative_readings:
  - of the Judeans
  rationale: This verse is administrative and political rather than explicitly theological,
    but the ethnonym carries interpretive weight. 'Jews' is chosen for natural English
    and because the title appears to denote the people as a recognized collective,
    not merely residents of a geographic district. The geographic nuance is preserved
    as an alternative footnote-worthy option.
  doctrine_reference: 'Translation philosophy: readable modern English; consistency
    of key terms, or documented exception.'
