id: 1MA.13.49
reference: 1 Maccabees 13:49
source:
  edition: lxx-swete-1909
  text: Οἱ δὲ ἐκ τῆς ἄκρας ἐν Ἱερουσαλὴμ ἐκωλύοντο ἐκπορεύεσθαι εἰς τὴν χώραν καὶ
    καὶ ἀγοράζειν καὶ πωλεῖν· καὶ ἐπείνασαν σφόδρα, καὶ ἀπώλοντο ἐξ αὐτῶν ἱκανοὶ τῷ
    λιμῷ.
  language: Greek
  pages:
  - 674
  confidence: high
  validation: agree
translation:
  text: But those in the citadel at Jerusalem were prevented from going out into the
    country and from buying and selling; and they became very hungry, and many of
    them perished from famine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Acra at Jerusalem.' The Greek ἄκρα can function as a common noun
      ('citadel') or as the well-known designation of the Seleucid stronghold in Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: The Greek text reads 'and and buying and selling' (καὶ καὶ ἀγοράζειν καὶ
      πωλεῖν); the sense is clear despite the duplicated conjunction, which is likely
      a scribal or transcriptional repetition rather than a meaningful variant.
    reason: textual_variant
lexical_decisions:
- source_word: ἄκρας
  chosen: the citadel
  alternatives:
  - the Acra
  - the fortress
  lexicon: LSJ
  rationale: ἄκρα in Hellenistic historical context commonly denotes a fortified height
    or citadel. 'Citadel' communicates the function clearly in modern English. 'Acra'
    preserves the place-name flavor but is less transparent; it can be preserved as
    an alternative in a footnote if needed, but the common noun sense is primary here.
- source_word: ἐκωλύοντο
  chosen: were prevented
  alternatives:
  - were hindered
  - were kept from
  lexicon: BDAG
  rationale: The imperfect/passive sense indicates an ongoing state of being obstructed.
    'Were prevented' is natural English and preserves the external constraint implied
    by the passive.
- source_word: ἐκπορεύεσθαι
  chosen: from going out
  alternatives:
  - from going forth
  - from leaving
  lexicon: BDAG
  rationale: The infinitive after ἐκωλύοντο expresses what they were prevented from
    doing. 'Going out' is a straightforward rendering and fits the siege context.
- source_word: εἰς τὴν χώραν
  chosen: into the country
  alternatives:
  - into the land
  - into the surrounding region
  lexicon: LSJ
  rationale: χώρα here refers to the surrounding countryside/territory outside the
    city. 'Into the country' is idiomatic and conveys movement out from Jerusalem
    into the surrounding area.
- source_word: ἀγοράζειν καὶ πωλεῖν
  chosen: from buying and selling
  alternatives:
  - from trading
  - from purchasing and selling
  lexicon: BDAG
  rationale: The paired infinitives specify ordinary market activity. Rendering both
    verbs preserves the concrete economic restriction rather than compressing them
    into the more general 'trading.'
- source_word: ἐπείνασαν σφόδρα
  chosen: they became very hungry
  alternatives:
  - they were extremely hungry
  - they suffered severe hunger
  lexicon: BDAG
  rationale: The aorist with σφόδρα marks the severe onset/result of hunger. 'Became
    very hungry' is direct and readable, preserving the experiential force without
    overinterpreting.
- source_word: ἀπώλοντο
  chosen: perished
  alternatives:
  - died
  - were destroyed
  lexicon: BDAG
  rationale: In this context of famine, the verb denotes death rather than abstract
    ruin. 'Perished' fits the elevated historical register and pairs naturally with
    'from famine.'
- source_word: ἱκανοὶ
  chosen: many
  alternatives:
  - a considerable number
  - quite a few
  lexicon: BDAG
  rationale: ἱκανοί often means 'many' or 'a considerable number.' 'Many' is concise
    and idiomatic, while still reflecting a substantial but unspecified number.
- source_word: τῷ λιμῷ
  chosen: from famine
  alternatives:
  - by famine
  - from hunger
  lexicon: BDAG
  rationale: λιμός denotes famine or severe hunger, and here likely the famine condition
    caused by siege. 'From famine' best captures the broader circumstance rather than
    merely the sensation of hunger.
