theological_decisions:
- issue: Nature of the celebration language
  chosen_reading: Render the procession in straightforward celebratory and musical
    terms without importing later liturgical or messianic overtones.
  alternative_readings:
  - Use more explicitly cultic language such as 'thanksgiving' or 'psalms'
  rationale: The verse describes public rejoicing over deliverance from an enemy.
    The Greek supports praise, music, and song, but does not require later technical
    liturgical terminology or typological expansion.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering of instrumental terms with uncertain exact modern equivalents
  chosen_reading: Use accessible modern categories where exact identification is uncertain,
    while preserving alternatives in footnotes if needed.
  alternative_readings:
  - Translate all instrument names with traditional but archaic equivalents such as
    'psalteries'
  rationale: Optimal equivalence favors readable modern English while remaining anchored
    to the Greek. For νάβλαις especially, a category term is more transparent than
    an archaic label that many readers would not understand.
  doctrine_reference: Translation philosophy §§5, 6
