id: 1MA.13.51
reference: 1 Maccabees 13:51
source:
  edition: lxx-swete-1909
  text: καὶ εἰσῆλθεν εἰς αὐτὴν τῇ τρίτῃ καὶ εἰκάδι τοῦ δευτέρου μηνὸς ἔτους ἑνὸς καὶ
    ἑβδομηκοστοῦ καὶ ἑκατοστοῦ μετὰ αἰνέσεως καὶ βαΐων καὶ ἐν κινύραις καὶ ἐν κυμβάλοις
    καὶ ἐν νάβλαις καὶ ἐν ὕμνοις καὶ ἐν ᾠδαῖς, ὅτι συνετρίβη ἐχθρὸς μέγας ἐξ Ἰσραήλ.
  language: Greek
  pages:
  - 675
  confidence: high
  validation: agree
translation:
  text: And he entered it on the twenty-third day of the second month, in the one
    hundred seventy-first year, with praise and palm branches and with harps and cymbals
    and stringed instruments and with hymns and songs, because a great enemy had been
    crushed out of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lyres' for 'harps' (κινύραις); the exact ancient instrument is not fully
      certain in modern English.
    reason: lexical_alternative
  - marker: b
    text: Or 'harps' or 'psalteries' for 'stringed instruments' (νάβλαις); the Greek
      names a specific stringed instrument, but exact identification is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - went in
  - came into
  lexicon: LSJ
  rationale: A straightforward past-tense rendering of the aorist verb; 'entered'
    is idiomatic and suitably formal without overtranslating motion nuance.
- source_word: εἰς αὐτήν
  chosen: it
  alternatives:
  - her
  - into it
  lexicon: LSJ
  rationale: The pronoun refers to the city/fortress previously in context. English
    uses the neuter 'it' for a place; this avoids importing personification not explicit
    in the context.
- source_word: τῇ τρίτῃ καὶ εἰκάδι
  chosen: on the twenty-third day
  alternatives:
  - on the third and twentieth day
  - on the twenty-third
  lexicon: LSJ
  rationale: This Greek calendrical expression literally means 'the third and twentieth,'
    i.e., the twenty-third day. The chosen rendering is clear modern English.
- source_word: τοῦ δευτέρου μηνός
  chosen: of the second month
  alternatives:
  - in the second month
  lexicon: LSJ
  rationale: The genitive is naturally rendered in English date style as 'of the second
    month,' preserving the source's calendrical form.
- source_word: ἔτους ἑνὸς καὶ ἑβδομηκοστοῦ καὶ ἑκατοστοῦ
  chosen: in the one hundred seventy-first year
  alternatives:
  - in year one hundred and seventy-one
  - of the hundred seventy-first year
  lexicon: LSJ
  rationale: This is the Seleucid-era year notation. The chosen English is natural
    while preserving the exact number.
- source_word: μετὰ αἰνέσεως
  chosen: with praise
  alternatives:
  - with thanksgiving
  - with songs of praise
  lexicon: LSJ
  rationale: αἴνεσις denotes praise or laudation. 'With praise' keeps the broad celebratory-religious
    sense without narrowing it to thanksgiving alone.
- source_word: βαΐων
  chosen: palm branches
  alternatives:
  - palms
  lexicon: LSJ
  rationale: The noun refers to palm branches used in celebration. 'Palm branches'
    is explicit for modern readers and fits the triumphal setting.
- source_word: κινύραις
  chosen: harps
  alternatives:
  - lyres
  lexicon: LSJ
  rationale: κινύρα denotes a stringed instrument; 'harps' is a conventional and accessible
    rendering, though the exact ancient instrument may overlap with 'lyre.' The alternative
    is preserved as a lexical possibility.
- source_word: κυμβάλοις
  chosen: cymbals
  lexicon: LSJ
  rationale: A direct and uncontroversial rendering of the percussion instrument term.
- source_word: νάβλαις
  chosen: stringed instruments
  alternatives:
  - harps
  - psalteries
  lexicon: LSJ
  rationale: νάβλα is a specific stringed instrument, but exact equivalence in modern
    English is uncertain. 'Stringed instruments' preserves the musical category without
    using archaic 'psalteries' or forcing a too-specific identification.
- source_word: ὕμνοις
  chosen: hymns
  alternatives:
  - songs of praise
  lexicon: LSJ
  rationale: A close cognate rendering that preserves the liturgical/celebratory flavor.
- source_word: ᾠδαῖς
  chosen: songs
  alternatives:
  - odes
  lexicon: LSJ
  rationale: A broad term for songs. 'Songs' is natural modern English; 'odes' would
    sound literary and archaic.
- source_word: συνετρίβη
  chosen: had been crushed
  alternatives:
  - was broken
  - was shattered
  - was crushed
  lexicon: LSJ
  rationale: The verb conveys decisive breaking/shattering. 'Had been crushed' captures
    the completed defeat that grounds the celebration and works well with the causal
    clause.
- source_word: ἐχθρὸς μέγας
  chosen: a great enemy
  alternatives:
  - a great foe
  - a mighty enemy
  lexicon: LSJ
  rationale: A direct rendering preserving both the hostility and the magnitude of
    the threat.
- source_word: ἐξ Ἰσραήλ
  chosen: out of Israel
  alternatives:
  - from Israel
  lexicon: LSJ
  rationale: ἐκ/ἐξ here marks removal from the midst of Israel. 'Out of Israel' better
    conveys expulsion/removal than the more ambiguous 'from Israel.'
