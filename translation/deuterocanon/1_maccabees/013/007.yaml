id: 1MA.13.7
reference: 1 Maccabees 13:7
source:
  edition: lxx-swete-1909
  text: καὶ ἀνεζωπύρισεν τὸ πνεῦμα τοῦ λαοῦ αὐτοῦ ἀκοῦσαι τῶν λόγων τούτων·
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: and the spirit of his people was rekindled when they heard these words;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνεζωπύρισεν
  chosen: was rekindled
  alternatives:
  - was revived
  - was stirred up again
  - was inflamed anew
  lexicon: LSJ
  rationale: The verb denotes being brought back to life or flame again. The passive-like
    English 'was rekindled' best captures the intransitive sense here with the imagery
    of renewed courage or vitality, while remaining natural in English.
- source_word: τὸ πνεῦμα
  chosen: the spirit
  alternatives:
  - the courage
  - the inner spirit
  lexicon: LSJ
  rationale: Literally 'the spirit.' In context it refers to the people's inner resolve
    or morale, but 'spirit' preserves the metaphor and avoids over-interpreting it
    as merely emotion.
- source_word: τοῦ λαοῦ αὐτοῦ
  chosen: of his people
  alternatives:
  - of the people
  - of his nation
  lexicon: LSJ
  rationale: The genitive with αὐτοῦ is straightforwardly possessive. 'His people'
    preserves the personal relation implied in the Greek better than the more generic
    'the people.'
- source_word: ἀκοῦσαι
  chosen: when they heard
  alternatives:
  - to hear
  - on hearing
  lexicon: LSJ
  rationale: The infinitive after the main verb functions idiomatically to express
    the occasion or circumstance. 'When they heard' gives clear English sense without
    losing the temporal force.
- source_word: τῶν λόγων τούτων
  chosen: these words
  alternatives:
  - these sayings
  - these statements
  lexicon: LSJ
  rationale: λόγοι here refers to the preceding spoken message. 'These words' is the
    most direct and natural rendering.
