id: 1MA.13.31
reference: 1 Maccabees 13:31
source:
  edition: lxx-swete-1909
  text: Ὁ δὲ Τρύφων ἐπορεύετο δόλῳ μετὰ Ἀντιόχου τοῦ βασιλέως τοῦ νεωτέρου, καὶ ἀπέκτεινεν
    αὐτόν,
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: But Tryphon was proceeding deceitfully with Antiochus the younger king, and
    he killed him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by deceit' or 'with deceit.' The Greek dative δόλῳ can be rendered either
      adverbially or instrumentally.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύετο
  chosen: was proceeding
  alternatives:
  - was going
  - went
  - was traveling
  lexicon: LSJ
  rationale: Imperfect middle/passive form conveys ongoing action in past time. 'Was
    proceeding' preserves the narrative flow without overinterpreting the manner beyond
    the accompanying dative phrase.
- source_word: δόλῳ
  chosen: deceitfully
  alternatives:
  - with deceit
  - treacherously
  - by deceit
  lexicon: LSJ
  rationale: The dative expresses manner/instrument. 'Deceitfully' gives natural English
    while preserving the sense of cunning or treachery. 'With deceit' is more literal
    but less idiomatic in this clause.
- source_word: μετὰ Ἀντιόχου
  chosen: with Antiochus
  alternatives:
  - against Antiochus
  - in company with Antiochus
  lexicon: LSJ
  rationale: μετά with the genitive normally means 'with, in company with.' Although
    the broader context may imply hostile intent toward Antiochus, the Greek wording
    here states accompaniment, not opposition, so the translation keeps 'with'.
- source_word: τοῦ βασιλέως τοῦ νεωτέρου
  chosen: the younger king
  alternatives:
  - the young king
  - the junior king
  - the king, the younger
  lexicon: LSJ
  rationale: νεώτερος is comparative, 'younger.' The phrase distinguishes this Antiochus
    from another of the same name. 'The younger king' is concise and reflects the
    Greek appositional structure.
- source_word: ἀπέκτεινεν
  chosen: killed
  alternatives:
  - slew
  - put to death
  - murdered
  lexicon: LSJ
  rationale: The verb straightforwardly means 'killed.' 'Murdered' would add a legal
    or moral nuance not explicit in the verb itself, while 'slew' is archaic.
