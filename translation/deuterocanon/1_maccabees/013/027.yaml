id: 1MA.13.27
reference: 1 Maccabees 13:27
source:
  edition: lxx-swete-1909
  text: καὶ ᾠκοδόμησεν Σίμων ἐπὶ τὸν τάφον τοῦ πατρὸς αὐτοῦ καὶ τῶν ἀδελφῶν αὐτοῦ,
    καὶ ὕψωσεν αὐτὸν τῇ ὁράσει λίθῳ ξυστῷ ἐκ τῶν ὄπισθεν καὶ ἐκ τῶν ἔμπροσθεν.
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: And Simon built over the tomb of his father and his brothers, and he raised
    it high to be seen, with dressed stone at the back and at the front.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in appearance'; the Greek phrase may describe the monument as visually
      impressive or striking to the eye.
    reason: lexical_alternative
  - marker: b
    text: Or 'with polished stone.' The Greek can denote stone that has been scraped
      smooth or otherwise finely worked.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠκοδόμησεν
  chosen: built
  alternatives:
  - constructed
  - built up
  lexicon: LSJ
  rationale: Aorist of οἰκοδομέω, the ordinary verb for building. 'Built' is the most
    natural English equivalent here.
- source_word: ἐπὶ τὸν τάφον
  chosen: over the tomb
  alternatives:
  - upon the tomb
  - at the tomb
  lexicon: LSJ
  rationale: ἐπί with the accusative can indicate position over/upon. In context of
    a funerary monument, 'built over the tomb' best captures construction associated
    with and above the burial place, not merely nearby.
- source_word: ὕψωσεν αὐτόν
  chosen: he raised it up
  alternatives:
  - made it high
  - elevated it
  lexicon: LSJ
  rationale: ὑψόω means to raise or make high. 'Raised it up' preserves the physical
    sense of height in relation to the monument.
- source_word: τῇ ὁράσει
  chosen: so that it was conspicuous
  alternatives:
  - in appearance
  - to the sight
  - visibly
  lexicon: LSJ
  rationale: The dative phrase is idiomatic and modifies how the monument presented
    itself visually. Because English 'in appearance' can sound vague here, 'so that
    it was conspicuous' brings out the likely sense of being striking to the eye.
- source_word: λίθῳ ξυστῷ
  chosen: with dressed stone
  alternatives:
  - with polished stone
  - with smoothed stone
  lexicon: LSJ
  rationale: ξύστος refers to something scraped/smoothed, hence worked or dressed.
    'Dressed stone' is idiomatic architectural English and avoids overcommitting to
    a glossy finish implied by 'polished'.
- source_word: ἐκ τῶν ὄπισθεν καὶ ἐκ τῶν ἔμπροσθεν
  chosen: at the back and at the front
  alternatives:
  - behind and in front
  - on the rear side and on the front side
  lexicon: LSJ
  rationale: The paired expressions describe the monument's treatment on both sides.
    'At the back and at the front' is clear modern English and preserves the bilateral
    description.
