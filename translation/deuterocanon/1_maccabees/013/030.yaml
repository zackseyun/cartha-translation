id: 1MA.13.30
reference: 1 Maccabees 13:30
source:
  edition: lxx-swete-1909
  text: οὗτος ὁ τάφος ὃν ἐποίησεν ἐν Μωδεεὶμ ἕως τῆς ἡμέρας ταύτης.
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: This is the tomb that he made in Modein, to this day.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τάφος
  chosen: tomb
  alternatives:
  - grave
  - sepulcher
  lexicon: LSJ
  rationale: τάφος denotes a burial place or monument. 'Tomb' fits the monumental
    family burial structure described in context better than the more generic 'grave.'
- source_word: ἐποίησεν
  chosen: he made
  alternatives:
  - he built
  - he constructed
  lexicon: LSJ
  rationale: ποιέω broadly means 'make' or 'do.' In context of a tomb, 'built' is
    possible, but 'made' stays closer to the Greek while remaining natural English.
- source_word: ἐν Μωδεεὶμ
  chosen: in Modein
  alternatives:
  - at Modein
  - in Modiin
  rationale: The preposition ἐν is most naturally rendered 'in.' The place name is
    transliterated from the Greek form as 'Modein'; alternative modernized spellings
    exist but are not required by the source text.
- source_word: ἕως τῆς ἡμέρας ταύτης
  chosen: to this day
  alternatives:
  - until this day
  - down to this day
  lexicon: LSJ
  rationale: This idiom means that the monument remained extant at the time of writing.
    'To this day' is idiomatic modern English and preserves the temporal force.
- source_word: οὗτος
  chosen: This is
  alternatives:
  - This was
  - This
  lexicon: LSJ
  rationale: The demonstrative introduces the identification of the monument. Supplying
    'is' makes natural English from the verbless Greek construction.
