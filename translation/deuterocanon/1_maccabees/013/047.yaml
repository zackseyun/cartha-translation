theological_decisions:
- issue: Cultic significance of cleansing houses containing idols
  chosen_reading: Rendered ἐκαθάρισεν as 'cleansed' rather than a merely physical
    'cleaned.'
  alternative_readings:
  - cleaned
  - purified
  rationale: The verse presents Simon's action as removal of idolatrous defilement
    from the city. 'Cleansed' preserves the religious dimension without importing
    later technical ritual language beyond the text.
