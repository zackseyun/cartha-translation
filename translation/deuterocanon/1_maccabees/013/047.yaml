id: 1MA.13.47
reference: 1 Maccabees 13:47
source:
  edition: lxx-swete-1909
  text: καὶ συνευδὼν αὐτοῖς Σίμων, καὶ οὐκ ἐπολέμησεν αὐτούς· καὶ ἐξέβαλεν αὐτοὺς
    ἐκ τῆς πόλεως, καὶ ἐκαθάρισεν τὰς οἰκίας ἐν αἷς ἦν τὰ εἴδωλα, καὶ οὕτως εἰσῆλθεν
    εἰς αὐτὴν ὑμνῶν καὶ εὐλογῶν.
  language: Greek
  pages:
  - 674
  confidence: high
  validation: agree
translation:
  text: And Simon came to terms with them and did not fight against them. He drove
    them out of the city and cleansed the houses in which the idols had been, and
    so he entered it with hymns and blessing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made an agreement with them.' The Greek participle can suggest reaching
      an accommodation rather than engaging them in battle.
    reason: lexical_alternative
  - marker: b
    text: That is, houses where idol-images had been kept; the cleansing is likely
      religious as well as physical.
    reason: cultural_note
lexical_decisions:
- source_word: συνευδὼν
  chosen: came to terms with
  alternatives:
  - agreed with
  - made an arrangement with
  - was pleased with
  lexicon: LSJ
  rationale: The participle introduces Simon's conciliatory action toward the occupants
    before the expulsion. In context, a sense of reaching an agreement or accommodation
    fits better than an emotional sense such as 'was pleased with.' 'Came to terms
    with' captures the likely practical settlement without over-paraphrasing.
- source_word: ἐπολέμησεν
  chosen: fight against
  alternatives:
  - make war on
  - wage war against
  lexicon: LSJ
  rationale: The verb denotes military conflict. 'Fight against' is natural modern
    English and preserves the sense without sounding overly formal.
- source_word: ἐξέβαλεν
  chosen: drove ... out
  alternatives:
  - cast ... out
  - expelled
  lexicon: LSJ
  rationale: The verb is forceful. 'Drove out' preserves that force and fits the military-political
    context better than the more technical 'expelled,' while avoiding possible overtones
    of exorcism from 'cast out.'
- source_word: ἐκαθάρισεν
  chosen: cleansed
  alternatives:
  - purified
  - cleaned
  lexicon: LSJ
  rationale: Given the mention of idols, the action is more than ordinary cleaning;
    it is cultic or ceremonial removal of defilement. 'Cleansed' preserves that religious
    dimension.
- source_word: τὰ εἴδωλα
  chosen: the idols
  alternatives:
  - images
  - idols/images
  lexicon: LSJ
  rationale: In this context the objects are pagan cult images whose presence defiles
    the houses. 'Idols' makes the religious significance explicit and is the most
    natural rendering.
- source_word: ὑμνῶν
  chosen: with hymns
  alternatives:
  - singing hymns
  - praising
  lexicon: LSJ
  rationale: The participle describes the manner of entry. 'With hymns' is concise
    and preserves the liturgical tone; it pairs well with the following participle.
- source_word: εὐλογῶν
  chosen: blessing
  alternatives:
  - giving blessing
  - speaking blessings
  - praising
  lexicon: LSJ
  rationale: The verb commonly means 'bless.' Here it likely refers to blessing God
    in celebration. 'Blessing' keeps the lexical connection and avoids collapsing
    it into mere praise.
