id: 1MA.13.15
reference: 1 Maccabees 13:15
source:
  edition: lxx-swete-1909
  text: Περὶ ἀργυρίου οὗ ὤφειλεν Ἰωναθὰν ἀδελφός σου εἰς τὸ βασιλικόν, διʼ ἃς εἶχεν
    χρείας, συνέχομεν αὐτόν.
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: As for the silver that your brother Jonathan owed to the royal treasury because
    of the needs he had, we have held him liable for it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because of the needs he had.' The Greek phrase can refer more broadly
      to needs, obligations, or official functions; the main text takes it in an administrative
      sense suited to the context of royal debt.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb literally can mean 'hold fast' or 'constrain.' In this context
      it is understood as remitting or releasing the debt, since the speaker is granting
      Jonathan favor rather than imposing liability.
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ
  chosen: As for
  alternatives:
  - concerning
  - regarding
  lexicon: LSJ
  rationale: Introduces the topic under discussion rather than functioning spatially;
    'As for' gives natural English discourse flow while preserving the topical sense.
- source_word: ἀργυρίου
  chosen: the silver
  alternatives:
  - money
  - silver money
  lexicon: LSJ
  rationale: Literally 'silver'; in financial contexts it can mean money, but retaining
    'silver' stays closer to the Greek while still intelligible.
- source_word: ὤφειλεν
  chosen: owed
  alternatives:
  - was owing
  - was indebted
  lexicon: LSJ
  rationale: Standard sense of financial obligation; simple past fits the narrative
    context.
- source_word: εἰς τὸ βασιλικόν
  chosen: to the royal treasury
  alternatives:
  - to the king's treasury
  - to the royal administration
  lexicon: LSJ
  rationale: The phrase denotes what belongs to the king/royal domain; in this fiscal
    context 'royal treasury' best conveys payment due to the crown.
- source_word: διʼ ἃς εἶχεν χρείας
  chosen: because of the offices he held
  alternatives:
  - because of the needs he had
  - for the obligations he had
  - because of the services he had
  lexicon: LSJ
  rationale: χρεία can mean need, use, business, or office/function. In context of
    money owed to the royal treasury by Jonathan, a reference to official responsibilities
    or positions better explains the debt than personal 'needs.' This avoids an implausibly
    private sense while remaining anchored to the semantic range.
- source_word: συνέχομεν
  chosen: we have released him from it
  alternatives:
  - we have remitted it for him
  - we have held him liable
  - we have excused him
  lexicon: LSJ
  rationale: Although συνέχω often means hold together/constrain, the immediate context
    is a royal letter granting favor and cancelling obligations. The sense here is
    best taken idiomatically as releasing or remitting the debt rather than detaining
    him. The object αὐτόν is rendered with 'from it' to make explicit that the release
    concerns the debt.
