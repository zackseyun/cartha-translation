id: 1MA.13.44
reference: 1 Maccabees 13:44
source:
  edition: lxx-swete-1909
  text: καὶ ἐξήλοντο οἱ ἐν τῇ ἑλεπόλει εἰς τὴν πόλιν, καὶ ἐγένετο κίνημα μέγα ἐν τῇ
    πόλει.
  language: Greek
  pages:
  - 674
  confidence: high
  validation: agree
translation:
  text: And those in the siege tower went out into the city, and there was a great
    commotion in the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great disturbance' or 'a great uproar'; the Greek κίνημα can denote
      agitation or unrest broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξήλοντο
  chosen: went out
  alternatives:
  - came out
  - departed
  lexicon: LSJ
  rationale: Aorist middle of ἐξέρχομαι/related form, indicating movement out from
    the siege tower into the city. 'Went out' is straightforward modern English and
    preserves the directional sense without overinterpreting motive.
- source_word: οἱ ἐν τῇ ἑλεπόλει
  chosen: those in the siege tower
  alternatives:
  - the men in the siege engine
  - those in the helepolis
  lexicon: LSJ
  rationale: ἑλέπολις denotes a siege engine, especially a siege tower. 'Siege tower'
    is the clearest idiomatic rendering for modern readers and fits the immediate
    military context better than a transliteration.
- source_word: πόλιν
  chosen: city
  alternatives:
  - town
  lexicon: LSJ
  rationale: Standard rendering of πόλις. Here it refers to the urban stronghold/city
    area into which the occupants emerged.
- source_word: κίνημα μέγα
  chosen: a great commotion
  alternatives:
  - a great disturbance
  - great turmoil
  - a great uproar
  lexicon: LSJ
  rationale: κίνημα can denote movement, disturbance, or agitation. In this narrative
    context, the sense is not mere physical motion but public unrest or upheaval.
    'A great commotion' preserves the breadth of disturbance without specifying riot
    or revolt more strongly than the Greek requires.
- source_word: ἐγένετο
  chosen: there was
  alternatives:
  - it happened
  - there arose
  lexicon: LSJ
  rationale: Common narrative use of γίνομαι introducing an event or state. 'There
    was' is natural English with κίνημα as the subject-complement idea.
