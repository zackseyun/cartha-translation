translation:
  text: I will not deny you, O law-trained discipline, nor will I spare you, beloved
    self-control.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not prove false to you' or 'I will not betray you.' The Greek
      verb can denote being false to a person as well as lying.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek directly addresses personified virtues: literally, ''O trainer
      law'' and ''beloved self-control.'' The translation makes the relation explicit
      as ''discipline that trains by the law.'''
    reason: cultural_note
lexical_decisions:
- source_word: ψεύσομαί
  chosen: I will not deny
  alternatives:
  - I will not lie to
  - I will not prove false to
  - I will not betray
  lexicon: BDAG
  rationale: Future middle of ψεύδομαι literally involves falsehood, but with a personal
    object in this rhetorical address it carries the sense of proving false to or
    denying one's commitment. 'I will not deny you' is idiomatic English and fits
    the speaker's pledge of fidelity better than the more wooden 'lie to you.'
- source_word: παιδευτὰ
  chosen: discipline that trains
  alternatives:
  - trainer
  - educator
  - instructor
  - discipline
  lexicon: LSJ
  rationale: The noun denotes one who trains or disciplines. Because it is directly
    linked with νόμε and personified, a bare 'trainer' sounds too concrete and potentially
    misleading in English. 'Discipline that trains' preserves both the pedagogical
    and moral-ascetic force in context.
- source_word: νόμε
  chosen: by the law
  alternatives:
  - law
  - law-governed order
  - custom
  lexicon: LSJ
  rationale: Vocative νόμε is personified. In this context of Jewish piety and reasoned
    virtue, νόμος evokes the law as moral instructor. Rendering the phrase with 'that
    trains by the law' brings out the appositional relation to παιδευτά while keeping
    νόμος explicit.
- source_word: φείσομαί
  chosen: will spare
  alternatives:
  - will refrain from harming
  - will hold back from
  - will shrink from
  lexicon: BDAG
  rationale: The future middle of φείδομαι means to spare or refrain from. In this
    martyrdom context the speaker says he will not hold back from exercising self-control
    under torture. 'Will spare' is concise and preserves the idiom.
- source_word: φίλη
  chosen: beloved
  alternatives:
  - dear
  - beloved one
  lexicon: LSJ
  rationale: As a vocative of affection modifying ἐγκράτεια, φίλη expresses cherished
    attachment. 'Beloved' preserves the elevated, personifying tone better than the
    flatter 'dear.'
- source_word: ἐγκράτεια
  chosen: self-control
  alternatives:
  - temperance
  - self-mastery
  - continence
  lexicon: BDAG
  rationale: ἐγκράτεια is the virtue of mastery over desires and impulses. 'Self-control'
    is clear modern English and fits the ethical context without archaic overtones
    like 'temperance.'
