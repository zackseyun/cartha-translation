theological_decisions:
- issue: Personification of moral and legal virtues
  chosen_reading: Retain direct address to 'discipline that trains by the law' and
    'beloved self-control' as personified virtues.
  alternative_readings:
  - Flatten into abstract statements about law and self-control without direct address
  rationale: The Greek uses vocatives and rhetorical apostrophe. Preserving the personification
    reflects the literary style and the moral framework of 4 Maccabees without importing
    additional theology.
  doctrine_reference: Translation philosophy §§1, 6
