theological_decisions:
- issue: Implication of dietary refusal
  chosen_reading: The statement refers to refusal to eat food regarded as defiling
    under the divine law.
  alternative_readings:
  - The verb could be rendered more abstractly as 'we do not defile ourselves by eating'.
  rationale: The compound verb itself carries the notion of defiled eating; the immediate
    context concerns prohibited foods. The chosen English makes the implied object
    explicit for readability while staying anchored to the Greek.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve significant
    lexical decisions.'
- issue: Sense of God's relation to nature in legislation
  chosen_reading: The Creator, in legislating, acts with sympathy toward human nature.
  alternative_readings:
  - The Creator legislates according to nature in a more objective philosophical sense.
  rationale: The dative ἡμῖν with συμπαθεῖ points toward sympathy/consideration toward
    'us,' while κατὰ φύσιν qualifies that sympathy as consonant with nature. The translation
    preserves this without importing a larger philosophical system.
  doctrine_reference: Preserve theological tension rather than resolve it.
