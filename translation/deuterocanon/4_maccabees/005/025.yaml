id: 4MA.5.25
reference: 4 Maccabees 5:25
source:
  edition: lxx-swete-1909
  text: διʼ οὐ μιεροφαγοῦμεν· πιστεύοντες γὰρ θεοῦ καθέστασθαι τὸν νόμον, οἴδαμεν
    ὅτι καὶ κατὰ φύσιν ἡμῖν συμπαθεῖ νομοθετῶν ὁ τοῦ κόσμου κτίστης·
