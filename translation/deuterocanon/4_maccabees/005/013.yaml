id: 4MA.5.13
reference: 4 Maccabees 5:13
source:
  edition: lxx-swete-1909
  text: καὶ γὰρ ἐνθυμήθητι, ὡς εἰ καί τίς ἐστιν τῆσδε τῆς θρησκείας ἐποπτικὴ δύναμις,
    συγγνωμονήσειέν σοι ἐπὶ πᾶσιν διʼ ἀνάγκην παρανομίᾳ γινομένῃ.
  language: Greek
  pages:
  - 752
  - 758
  - 759
  - 760
  - 761
  - 762
  - 763
  - 786
  - 787
  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: 'For consider this also: even if there is some overseeing power of this religion,
    it would pardon you for the lawlessness done under compulsion in all these things.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a watching/supervising power of this religion.' The Greek leaves the
      identity of this power unspecified.
    reason: lexical_alternative
  - marker: b
    text: Or 'would pardon you for the transgression committed by necessity.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐνθυμήθητι
  chosen: consider
  alternatives:
  - reflect
  - think
  lexicon: LSJ
  rationale: Imperative calling for mental reflection. 'Consider' is natural modern
    English and preserves the exhortational force without sounding overly formal.
- source_word: θρησκείας
  chosen: religion
  alternatives:
  - worship
  - religious observance
  lexicon: LSJ
  rationale: Refers broadly to the Jewish religious way/practice in the speaker's
    framing. 'Religion' best fits the generic, somewhat external description used
    by the persecutor.
- source_word: ἐποπτικὴ δύναμις
  chosen: overseeing power
  alternatives:
  - watching power
  - supervising power
  lexicon: LSJ
  rationale: The phrase denotes a power that watches over or oversees. 'Overseeing
    power' preserves the ambiguity of whether this means divine providence or some
    supernatural guardian, without over-interpreting.
- source_word: συγγνωμονήσειέν
  chosen: would forgive
  alternatives:
  - would pardon
  - would excuse
  lexicon: LSJ
  rationale: The optative in this conditional setting expresses potential result.
    'Would forgive' communicates pardon while remaining accessible; 'excuse' could
    weaken the moral force.
- source_word: παρανομίᾳ
  chosen: lawlessness
  alternatives:
  - transgression
  - violation of the law
  lexicon: LSJ
  rationale: The noun literally denotes acting contrary to law. 'Lawlessness' keeps
    the legal-moral sense and reflects the speaker's acknowledgment that the act would
    violate Jewish law.
- source_word: διʼ ἀνάγκην
  chosen: under compulsion
  alternatives:
  - by necessity
  - under necessity
  lexicon: LSJ
  rationale: The phrase indicates coercion rather than voluntary action. 'Under compulsion'
    is idiomatic English and captures the pressure of forced compliance.
- source_word: ἐπὶ πᾶσιν
  chosen: in all these things
  alternatives:
  - for everything
  - in regard to all things
  lexicon: LSJ
  rationale: Given the context of pressure to violate dietary law, the phrase is best
    taken comprehensively with reference to the demanded acts. 'In all these things'
    is slightly interpretive but natural and contextually anchored.
