translation:
  text: You will not even gouge out my eyes and melt away my inward parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my entrails.' The Greek term refers to the internal organs.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδʼ ἂν
  chosen: You will not even
  alternatives:
  - not even if
  - nor would you
  lexicon: LSJ
  rationale: The combination intensifies the negation in context, expressing emphatic
    refusal or impossibility. In English, 'You will not even' captures the rhetorical
    force naturally.
- source_word: ἐκκόψεις
  chosen: gouge out
  alternatives:
  - cut out
  - pluck out
  lexicon: LSJ
  rationale: The verb literally means 'cut out' or 'cut off.' With 'eyes' as the object,
    'gouge out' is the most idiomatic and vivid English equivalent, matching the violent
    imagery without over-paraphrasing.
- source_word: τὰ ὄμματα
  chosen: my eyes
  alternatives:
  - my eye-sockets
  - my sight
  lexicon: LSJ
  rationale: The ordinary plural noun means 'eyes.' No figurative sense is indicated
    here.
- source_word: τὰ σπλάγχνα
  chosen: my inward parts
  alternatives:
  - my entrails
  - my inner organs
  - my bowels
  lexicon: LSJ
  rationale: The term denotes the internal organs or entrails. 'Inward parts' preserves
    the bodily sense in readable modern English; 'bowels' is archaic in this context,
    and 'entrails' is possible but slightly more graphic than necessary.
- source_word: τήξεις
  chosen: melt away
  alternatives:
  - consume
  - dissolve
  - liquefy
  lexicon: LSJ
  rationale: The verb literally means 'melt' or 'cause to waste away.' 'Melt away'
    preserves the concrete violence while sounding natural in English.
