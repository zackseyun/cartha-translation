theological_decisions:
- issue: Meaning of 'law' in παρανομεῖν within the Maccabean martyrdom context
  chosen_reading: Refers to violating the Jewish law, expressed as 'break the law'
    without inserting 'God's' into the main text.
  alternative_readings:
  - break God's law
  - transgress the ancestral law
  rationale: The context clearly concerns Torah-observance under persecution, but
    the Greek says simply 'act unlawfully/break the law.' The main text preserves
    the wording without adding an explicit theological qualifier, while the rationale
    recognizes the covenantal context.
  doctrine_reference: Translation philosophy §§1, 3, 6
