translation:
  text: But in your tyranny you are not only forcing us to break the law, but also
    to eat, so that you may further mock us with this most hateful defilement by food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with this most hateful polluted eating' or 'with this most hateful food-defilement.'
      The Greek term is rare and combines the ideas of eating and ritual/moral defilement.
    reason: lexical_alternative
lexical_decisions:
- source_word: τυραννικὸν
  chosen: in your tyranny
  alternatives:
  - tyrannically
  - tyrannical
  lexicon: LSJ
  rationale: The adjective is used adverbially/predicatively to characterize the ruler's
    action. Rendering it as 'in your tyranny' gives natural English while preserving
    the charge of oppressive, despotic behavior.
- source_word: ἀναγκάζεις
  chosen: you are ... forcing
  alternatives:
  - you compel
  - you coerce
  lexicon: BDAG
  rationale: The verb denotes compulsion. 'Forcing' is clear modern English and fits
    the present-tense accusation.
- source_word: παρανομεῖν
  chosen: to break the law
  alternatives:
  - to act unlawfully
  - to transgress the law
  lexicon: LSJ
  rationale: The compound verb means to act contrary to law. In this Maccabean context
    the law in view is the Jewish law/Torah; 'break the law' is idiomatic and sufficiently
    explicit without overexpanding.
- source_word: ἐσθίειν
  chosen: to eat
  alternatives:
  - to consume
  lexicon: BDAG
  rationale: Simple infinitive; 'to eat' is the direct and natural rendering.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural and preserves the intentionality
    of the tyrant's action.
- source_word: ἐχθίστῃ
  chosen: most hateful
  alternatives:
  - most detestable
  - most loathsome
  lexicon: LSJ
  rationale: Superlative of 'hateful/hostile.' 'Most hateful' preserves the superlative
    force and the speaker's revulsion.
- source_word: μιεροφαγίᾳ
  chosen: defilement by food
  alternatives:
  - polluted eating
  - defiling consumption
  - food-defilement
  lexicon: LSJ
  rationale: A rare compound built on the idea of defilement/pollution and eating.
    The sense is not merely 'eating forbidden food' but the pollution associated with
    it. 'Defilement by food' communicates that the act of eating would render them
    defiled.
- source_word: ἔτι
  chosen: further
  alternatives:
  - still
  - even more
  lexicon: BDAG
  rationale: Here it intensifies the tyrant's mockery as an added indignity. 'Further'
    captures the sense of additional insult.
- source_word: ἐγγελάσῃς
  chosen: you may ... mock us
  alternatives:
  - you may laugh at us
  - you may deride us
  lexicon: LSJ
  rationale: The verb means to laugh at, mock, or deride. 'Mock us' is concise and
    idiomatic.
