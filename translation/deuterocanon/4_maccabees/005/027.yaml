  text: τυραννικὸν δὲ οὐ μόνον ἀναγκάζεις ἡμᾶς παρανομεῖν, ἀλλὰ καὶ ἐσθίειν, ὅπως
    τῇ ἐχθίστῃ ἡμῶν μιεροφαγίᾳ ταύτῃ ἔτι ἐγγελάσῃς.
