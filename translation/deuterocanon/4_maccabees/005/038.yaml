translation:
  text: For you may indeed tyrannize over the ungodly, but over my reasonings concerning
    godliness you will rule neither by words nor by deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my rational judgments concerning piety.' The Greek λογισμῶν is a key
      term in 4 Maccabees for reasoned moral deliberation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσεβῶν
  chosen: the ungodly
  alternatives:
  - the impious
  - godless people
  lexicon: LSJ
  rationale: The genitive plural with τυραννήσεις indicates those over whom the tyrant
    exercises power. 'The ungodly' is natural English and preserves the moral-religious
    contrast with εὐσέβεια in the next clause.
- source_word: τυραννήσεις
  chosen: you may indeed tyrannize over
  alternatives:
  - you will rule over
  - you will act as tyrant over
  lexicon: LSJ
  rationale: The verb is cognate with 'tyrant' and carries the sense of oppressive
    domination, not neutral rule. 'May indeed tyrannize over' preserves both the force
    of the verb and the concessive μὲν ... δέ structure.
- source_word: τῶν δὲ ἐμῶν ... λογισμῶν
  chosen: my reasonings
  alternatives:
  - my thoughts
  - my convictions
  - my rational judgments
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for rational deliberation/reason,
    central to the book's argument about reason governing the passions. 'Reasonings'
    keeps that conceptual link better than the flatter 'thoughts'.
- source_word: περὶ τῆς εὐσεβείας
  chosen: concerning godliness
  alternatives:
  - about piety
  - concerning reverence
  lexicon: LSJ
  rationale: εὐσέβεια in this work denotes devout fidelity toward God and the law.
    'Godliness' is accessible modern English and preserves the religious dimension;
    'piety' is possible but can sound more archaic or narrower.
- source_word: δεσπόσεις
  chosen: you will rule
  alternatives:
  - you will dominate
  - you will be master
  lexicon: LSJ
  rationale: The future of δεσπόζω here contrasts external tyranny with inability
    to master the speaker's inner rational commitments. 'Rule' is idiomatic with the
    following instrumental phrases 'by words' and 'by deeds,' while still conveying
    mastery.
- source_word: οὔτε λόγοις ... οὔτε δι᾽ ἔργων
  chosen: neither by words nor by deeds
  alternatives:
  - neither with arguments nor with actions
  - neither by speech nor through acts
  lexicon: LSJ
  rationale: This preserves the balanced Greek negation and the contrast between verbal
    persuasion/threat and physical action/coercion.
