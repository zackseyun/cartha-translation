- issue: Rendering the key ethical-religious pair ἀσέβεια/εὐσέβεια in a way that preserves
    the book's moral contrast
  chosen_reading: ungodly / godliness
  alternative_readings:
  - impious / piety
  - godless / reverence
  rationale: The verse contrasts the tyrant's power over irreligious people with his
    inability to master the speaker's rational commitments about devotion to God.
    'Ungodly' and 'godliness' preserve that theological polarity in clear English.
