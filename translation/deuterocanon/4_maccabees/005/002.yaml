theological_decisions:
- issue: Rendering of Ἐβραίων
  chosen_reading: Hebrews
  alternative_readings:
  - Jews
  rationale: The Greek explicitly says 'Hebrews.' Since no doctrinal issue requires
    harmonizing to 'Jews,' the translation follows the source wording and preserves
    ethnic-historical texture.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
- issue: Degree of participation in forbidden food implied by ἀπογεύεσθαι
  chosen_reading: taste
  alternative_readings:
  - eat
  - partake of
  rationale: The text emphasizes compelled violation even by tasting, not necessarily
    full consumption. Preserving 'taste' maintains the moral and ritual tension without
    overstating the action.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
