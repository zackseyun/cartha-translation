translation:
  text: Nor will I disgrace you, O philosophical reason, nor will I renounce you,
    honored priesthood and knowledge of the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'philosophical reason' or 'philosophic reason.' The Greek vocative φιλόσοφε
      λόγε is compact and somewhat stylized.
    reason: lexical_alternative
  - marker: b
    text: Or 'esteemed priesthood and expertise in the law.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταισχυνῶ
  chosen: will disgrace
  alternatives:
  - will shame
  - will dishonor
  lexicon: BDAG
  rationale: Future active of καταισχύνω; in context the speaker vows not to bring
    shame upon the addressed ideals. 'Disgrace' is natural English and preserves the
    honor/shame force.
- source_word: φιλόσοφε λόγε
  chosen: reasoned philosophy
  alternatives:
  - philosophic reason
  - philosophical reason
  - philosopher reason
  lexicon: LSJ
  rationale: A vocative phrase addressing λόγος qualified by φιλόσοφος. Because 4
    Maccabees prominently themes reason shaped by philosophy, 'reasoned philosophy'
    keeps both elements without awkward literalism. The phrase is personified in direct
    address.
- source_word: ἑξαρνήσομαί
  chosen: will renounce
  alternatives:
  - will deny
  - will disown
  lexicon: BDAG
  rationale: Future middle of ἐξαρνέομαι, stronger than a simple denial; 'renounce'
    best conveys repudiation of allegiance.
- source_word: ἱεροσύνη
  chosen: priesthood
  alternatives:
  - priestly office
  lexicon: LSJ
  rationale: The noun denotes priesthood or priestly office. 'Priesthood' is the most
    direct and idiomatic rendering here.
- source_word: τιμία
  chosen: honored
  alternatives:
  - precious
  - esteemed
  - noble
  lexicon: LSJ
  rationale: As an adjective modifying ἱεροσύνη, it conveys value and honor. 'Honored'
    fits the vocative, reverential address in English.
- source_word: νομοθεσίας ἐπιστήμη
  chosen: knowledge of the law
  alternatives:
  - understanding of the lawgiving
  - expertise in the law
  lexicon: LSJ
  rationale: ἐπιστήμη is knowledge/expertise; νομοθεσία can denote legislation or
    the law as given. In this Jewish context, 'knowledge of the law' communicates
    mastery of the Mosaic law without overtechnical wording.
