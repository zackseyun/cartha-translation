theological_decisions:
- issue: Reference of 'law' in νομίμου βίου
  chosen_reading: The phrase refers to a life lived in accordance with the Jewish
    law, without over-specifying beyond the text.
  alternative_readings:
  - a generally lawful or respectable life
  rationale: In 4 Maccabees the law is a central theme, so the phrase likely evokes
    Torah-observance. The translation 'law-abiding life' preserves that resonance
    while remaining readable and not inserting 'Mosaic' explicitly where the verse
    itself does not.
