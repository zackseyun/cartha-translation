translation:
  text: Nor will you defile my venerable mouth of old age, nor the age of a law-abiding
    life.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μιαινεῖς
  chosen: defile
  alternatives:
  - pollute
  - stain
  lexicon: BDAG
  rationale: The verb carries the sense of making ritually or morally unclean. 'Defile'
    preserves the ethical and purity-related force better than the weaker 'stain'
    or the more physical 'pollute'.
- source_word: σεμνὸν
  chosen: made venerable
  alternatives:
  - dignified
  - honored
  - revered
  lexicon: LSJ
  rationale: The adjective denotes dignity, gravity, and honor. In context it modifies
    'mouth' in relation to old age, so 'made venerable' brings out that the speaker's
    age has rendered his speech-organ worthy of respect.
- source_word: γήρως
  chosen: by old age
  alternatives:
  - of old age
  - with age
  lexicon: LSJ
  rationale: The genitive is best taken as qualifying why the mouth is venerable.
    'By old age' reads naturally in English while preserving the causal association.
- source_word: στόμα
  chosen: mouth
  alternatives:
  - speech
  lexicon: BDAG
  rationale: The literal 'mouth' should be retained. Although it can metonymically
    imply speech, the Greek names the body part, and the rhetoric of bodily integrity
    is important in this martyrdom context.
- source_word: νομίμου βίου
  chosen: of a law-abiding life
  alternatives:
  - of a lawful life
  - of a life according to the law
  lexicon: LSJ
  rationale: νόμιμος means in accordance with law or custom. In this Jewish context
    it likely refers to life lived in obedience to the law. 'Law-abiding life' is
    concise and natural while preserving that sense.
- source_word: ἡλικίαν
  chosen: the years
  alternatives:
  - age
  - maturity
  - lifetime
  lexicon: BDAG
  rationale: The term can mean age or stage of life. Here, paired with 'law-abiding
    life,' it points to the span of years lived in that manner. 'The years' makes
    the idiom natural in English and avoids awkward repetition with 'old age' earlier
    in the verse.
