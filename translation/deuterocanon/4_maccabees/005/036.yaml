id: 4MA.5.36
reference: 4 Maccabees 5:36
source:
  edition: lxx-swete-1909
  text: οὐδέ μιαινεῖς μου τὸ σεμνὸν γήρως στόμα, οὐδὲ νομίμου βίου ἡλικίαν.
  language: Greek
  pages:
