theological_decisions:
- issue: Relation of 'lawless' to Jewish dietary law in the martyrdom context
  chosen_reading: Rendered ἔκθεσμον as 'lawless' and left the object as 'eating of
    flesh,' allowing the context to signal that the violation is of the ancestral/divine
    law.
  alternative_readings:
  - Rendered more explicitly as 'unlawful eating of pork/meat'
  rationale: The Greek text here does not specify pork in this clause, even though
    the broader context makes the issue clear. The translation avoids importing a
    more specific object than the verse itself states while preserving the legal-religious
    offense.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
