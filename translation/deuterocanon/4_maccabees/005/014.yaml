id: 4MA.5.14
reference: 4 Maccabees 5:14
source:
  edition: lxx-swete-1909
  text: Τοῦτον τὸν τρόπον ἐπὶ τὴν ἔκθεσμον σαρκοφαγίαν ἐποτρύνοντος τοῦ τυράννου,
    λόγον ᾔτησεν ὁ Ἐλεάζαρος.
  language: Greek
  pages:
