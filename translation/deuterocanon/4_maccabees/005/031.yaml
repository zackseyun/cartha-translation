  text: οὐχ οὕτως εἰμὶ γέρων ἐγὼ καὶ ἀνδρῶδης, ὥστε μοι διὰ τὴν εὐσέβειαν μὴ νεάζειν
    τὸν λογισμόν.
  language: Greek
