- issue: Rendering εὐσέβεια in a Jewish martyrdom context
  chosen_reading: godliness
  alternative_readings:
  - piety
  - reverence
  rationale: The verse speaks of steadfast devotion to God under persecution. 'Godliness'
    preserves explicit theological orientation and aligns with the book's repeated
    emphasis on reverent fidelity, while avoiding an overly technical or archaic tone.
  doctrine_reference: 'DOCTRINE.md: Readable modern English, not archaic or academic;
    consistency of key terms, or documented exception.'
- issue: Gendered force of ἀνδρῶδης
