translation:
  text: I am not so old and manly that, for the sake of godliness, my reason should
    not be youthful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'piety' for 'godliness.' The Greek term denotes reverent devotion to
      God.
    reason: lexical_alternative
lexical_decisions:
- source_word: γέρων
  chosen: old
  alternatives:
  - an old man
  - aged
  lexicon: LSJ
  rationale: The adjective denotes advanced age. 'Old' fits natural English in the
    predicative construction ('I am not so old') without overloading the line with
    a noun phrase.
- source_word: ἀνδρῶδης
  chosen: manly
  alternatives:
  - vigorous
  - mature
  - courageous
  lexicon: LSJ
  rationale: The word literally carries a sense of being manlike/manly, here paired
    with γέρων. 'Manly' preserves the gendered and rhetorical force better than a
    flattened term like 'mature.' In context it points to full adult firmness rather
    than specifically sexual masculinity.
- source_word: εὐσέβειαν
  chosen: godliness
  alternatives:
  - piety
  - reverence
  lexicon: LSJ
  rationale: In 4 Maccabees this term is a key virtue denoting reverent devotion to
    God and his law. 'Godliness' communicates that theological orientation more clearly
    for modern readers than the somewhat narrower or more archaic 'piety,' though
    'piety' remains a viable alternative.
- source_word: νεάζειν
  chosen: be youthful
  alternatives:
  - be young
  - act young
  - be rejuvenated
  lexicon: LSJ
  rationale: The infinitive expresses being or becoming young/youthful. 'Be youthful'
    preserves the metaphorical contrast with old age while sounding idiomatic in English.
- source_word: λογισμόν
  chosen: reason
  alternatives:
  - mind
  - thinking
  - rational faculty
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a central term for reasoned judgment governing
    the passions. 'Reason' best captures the philosophical and thematic force in this
    book, more precisely than the broader 'mind'.
- source_word: ὥστε μοι ... μὴ νεάζειν τὸν λογισμόν
  chosen: that ... my reason should not be youthful
  alternatives:
  - so that ... my reason would not be youthful
  - that ... my reason should not stay young
  lexicon: Greek grammar
  rationale: 'The ὥστε + infinitive construction expresses result with the dative
    μοι functioning as reference/interest. The negative is retained directly: he is
    not so old and manly as to prevent his reason from remaining youthful for godliness''
    sake.'
