- issue: How explicitly to render the impurity concept in μιεροφαγήσαμεν
  chosen_reading: eat defiled food
  alternative_readings:
  - eat polluted food
  - eat what is unclean
  rationale: The context is martyrdom over forbidden consumption, so the impurity
    is cultic/moral rather than merely physical. 'Defiled' preserves that religious
    dimension while remaining readable.
