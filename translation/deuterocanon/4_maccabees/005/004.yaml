translation:
  text: But when many had been seized, one man, first from the company, a Hebrew named
    Eleazar, a priest by birth, learned in the law, advanced in age, and known to
    many around the tyrant because of his age, opened his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one man, first from the group.' The Greek literally says 'from the flock,'
      using a metaphor for the company of Hebrews.
    reason: lexical_alternative
  - marker: b
    text: Or 'an expert in the law.' The Greek describes Eleazar as learned with respect
      to the law, not as a legal professional in the modern sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: συναρπασθέντων
  chosen: had been seized
  alternatives:
  - had been snatched away
  - had been dragged off
  lexicon: LSJ
  rationale: The participle indicates forceful apprehension. 'Had been seized' is
    natural modern English and preserves the coercive sense without over-specifying
    the manner.
- source_word: ἀγέλης
  chosen: flock
  alternatives:
  - band
  - group
  lexicon: LSJ
  rationale: Literally 'flock' or 'herd.' Here it metaphorically refers to the group
    of Hebrews. 'Flock' preserves the image and the formal texture of the Greek better
    than the flatter 'group.'
- source_word: Ἑβραῖος
  chosen: a Hebrew
  alternatives:
  - a Jew
  - an Israelite
  lexicon: LSJ
  rationale: The Greek explicitly says 'Hebrew.' 'Jew' would be more interpretive
    and less formally aligned to the source wording.
- source_word: τὸ γένος ἱερεύς
  chosen: a priest by birth
  alternatives:
  - a priest by lineage
  - of priestly descent
  lexicon: LSJ
  rationale: The phrase identifies Eleazar's family origin or stock as priestly. 'A
    priest by birth' is concise and readable while preserving the genealogical sense.
- source_word: τὴν ἐπιστήμην νομικός
  chosen: trained in the law in knowledge
  alternatives:
  - an expert in the law
  - learned in legal knowledge
  - skilled in the law
  lexicon: LSJ
  rationale: νομικός here relates to the law, and ἐπιστήμη denotes knowledge or learning.
    Rather than importing later technical connotations of 'lawyer,' the rendering
    expresses learned competence in the law. The somewhat formal phrasing reflects
    the appositional style of the Greek.
- source_word: τὴν ἡλικίαν προήκων
  chosen: advanced in age
  alternatives:
  - well along in years
  - elderly
  lexicon: LSJ
  rationale: This phrase denotes old age or being far advanced in years. 'Advanced
    in age' is idiomatic and dignified, fitting the context.
- source_word: πολλοῖς τῶν περὶ τὸν τύραννον
  chosen: many around the tyrant
  alternatives:
  - many of those about the tyrant
  - many in the tyrant's circle
  lexicon: LSJ
  rationale: The expression refers to those in the tyrant's entourage or surrounding
    circle. 'Around the tyrant' stays close to the Greek while remaining readable.
- source_word: γνώριμος
  chosen: known
  alternatives:
  - well known
  - familiar
  lexicon: LSJ
  rationale: The adjective means known or familiar. 'Known' is sufficient; the context
    already explains to whom he was known.
- source_word: ἠνῴχετο τὸ στόμιον αὐτοῦ
  chosen: opened his mouth
  alternatives:
  - began to speak
  - opened his lips
  lexicon: LSJ
  rationale: This is a conventional idiom for beginning to speak. The more literal
    'opened his mouth' preserves the rhetorical solemnity of the Greek.
