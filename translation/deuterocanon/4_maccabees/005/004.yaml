id: 4MA.5.4
reference: 4 Maccabees 5:4
source:
  edition: lxx-swete-1909
  text: πολλῶν δὲ συναρπασθέντων, εἷς πρῶτος ἐκ τῆς ἀγέλης Ἑβραῖος ὀνόματι Ἐλεάζαρος,
    τὸ γένος ἱερεύς, τὴν ἐπιστήμην νομικός, καὶ τὴν ἡλικίαν προήκων, καὶ πολλοῖς τῶν
    περὶ τὸν τύραννον διὰ τὴν ἡλικίαν γνώριμος, ἠνῴχετο τὸ στόμιον αὐτοῦ.
  language: Greek
  pages:
