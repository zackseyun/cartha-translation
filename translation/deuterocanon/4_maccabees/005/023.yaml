- issue: Rendering Greek ethical virtue terms in a deuterocanonical philosophical-martyrdom
    context
  chosen_reading: Translate the virtues with standard English ethical terms ('self-control,'
    'courage') rather than more literal but less idiomatic forms.
  alternative_readings:
  - '''temperance'' for σωφροσύνην'
  - '''fortitude'' or ''manliness'' for ἀνδρείαν'
  rationale: The verse presents reasoned instruction in virtue. Standard modern ethical
    terms preserve the sense without archaic or gender-loaded wording, in line with
    optimal equivalence and readable modern English.
