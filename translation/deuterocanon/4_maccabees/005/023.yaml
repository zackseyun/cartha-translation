translation:
  text: For it teaches us self-control, so that we may master all pleasures and desires,
    and to practice courage, so that we may willingly endure every pain;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σωφροσύνην
  chosen: self-control
  alternatives:
  - sound-mindedness
  - temperance
  lexicon: LSJ
  rationale: In this ethical context, the noun denotes disciplined mastery over oneself.
    'Self-control' is clear modern English and fits the following infinitive clause
    about mastering pleasures and desires.
- source_word: ἐκδιδάσκει
  chosen: teaches
  alternatives:
  - trains
  - instructs thoroughly
  lexicon: LSJ
  rationale: The compound verb can suggest thorough instruction, but 'teaches' best
    captures the sense in readable English without overstating nuance. The following
    result clauses unpack the content of that teaching.
- source_word: κρατεῖν
  chosen: master
  alternatives:
  - control
  - prevail over
  lexicon: LSJ
  rationale: The verb means to be strong over or gain mastery over. 'Master' preserves
    the active sense of dominion over pleasures and desires better than the flatter
    'control'.
- source_word: ἡδονῶν
  chosen: pleasures
  alternatives:
  - delights
  - sensual pleasures
  lexicon: LSJ
  rationale: The ordinary sense is 'pleasures.' Adding 'sensual' would narrow the
    term beyond what the Greek explicitly states.
- source_word: ἐπιθυμιῶν
  chosen: desires
  alternatives:
  - cravings
  - lusts
  lexicon: LSJ
  rationale: The term can be morally negative, but here paired broadly with pleasures
    it is best rendered 'desires.' 'Lusts' would import a narrower sexual sense not
    required by the text.
- source_word: ἀνδρείαν
  chosen: courage
  alternatives:
  - manliness
  - fortitude
  lexicon: LSJ
  rationale: Although etymologically linked to manliness, in Hellenistic ethical usage
    the virtue is 'courage' or 'fortitude.' 'Courage' is the most natural and accurate
    English virtue term.
- source_word: ἐξασκεῖν
  chosen: practice
  alternatives:
  - train in
  - exercise
  lexicon: LSJ
  rationale: The verb conveys active cultivation or exercise of a virtue. 'Practice'
    communicates habitual formation in accessible English.
- source_word: πόνον
  chosen: pain
  alternatives:
  - hardship
  - toil
  lexicon: LSJ
  rationale: In this martyrdom-context sentence, the word refers broadly to suffering
    borne. 'Pain' is the most direct rendering and matches the universal 'every' that
    follows.
- source_word: ἑκουσίως
  chosen: willingly
  alternatives:
  - voluntarily
  - of one's own accord
  lexicon: LSJ
  rationale: The adverb stresses voluntary acceptance. 'Willingly' is idiomatic and
    preserves the moral emphasis on chosen endurance.
- source_word: ὑπομένειν
  chosen: endure
  alternatives:
  - bear up under
  - remain steadfast under
  lexicon: LSJ
  rationale: The verb means to remain under or endure. 'Endure' is concise and fits
    the collocation with pain.
