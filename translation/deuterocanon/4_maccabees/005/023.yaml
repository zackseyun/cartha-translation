id: 4MA.5.23
reference: 4 Maccabees 5:23
source:
  edition: lxx-swete-1909
  text: σωφροσύνην τε γὰρ ἡμᾶς ἐκδιδάσκει, ὥστε πασῶν τῶν ἡδονῶν καὶ ἐπιθυμιῶν κρατεῖν,
    καὶ ἀνδρείαν ἐξασκεῖν, ὥστε πάντα πόνον ἑκουσίως ὑπομένειν·
  language: Greek
