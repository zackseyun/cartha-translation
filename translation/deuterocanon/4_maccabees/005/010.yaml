  text: εἰ κενοδοξῶν περὶ τὸ ἀληθὲς ἔτι κἀμοῦ καταφρονήσεις ἐπὶ τῇ ἰδίᾳ τιμωρίᾳ· οὐκ
    ἐξυπνώσεις ἀπὸ τῆς φλυάρου φιλοσοφίας ὑμῶν;
  language: Greek
