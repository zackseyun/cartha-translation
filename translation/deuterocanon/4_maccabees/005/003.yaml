translation:
  text: But if any should be unwilling to eat defiling food, let them be broken on
    the wheel and put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to eat polluted food' or 'to partake of defiled meat.' The Greek verb
      itself carries the idea of eating what is ritually defiling; the object is not
      separately stated in this clause.
    reason: lexical_alternative
  - marker: b
    text: Or, 'be racked/tortured on the wheel.' The Greek participle refers to wheel-based
      torture; 'broken on the wheel' makes the likely method explicit in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δέ τινες
  chosen: But if any
  alternatives:
  - But if some
  - Now if any
  lexicon: LSJ
  rationale: Introduces a conditional exception or further case. 'Any' is idiomatic
    English for the indefinite plural τινες in this legal/threat context.
- source_word: μὴ θέλοιεν
  chosen: should be unwilling
  alternatives:
  - would not wish
  - should refuse
  lexicon: LSJ
  rationale: θέλω denotes willing/wishing. 'Should be unwilling' preserves the volitional
    nuance better than a bare 'refuse,' while fitting the conditional construction.
- source_word: μιεροφαγῆσαι
  chosen: to eat defiling food
  alternatives:
  - to eat polluted food
  - to partake of defiled meat
  - to eat unclean food
  lexicon: LSJ
  rationale: The compound verb conveys eating what is ritually defiling/profane. Because
    the object is implicit in the verb, English supplies 'food.' 'Defiling' preserves
    the cultic-moral force without over-specifying 'meat,' which is not explicit in
    this word alone.
- source_word: τούτους
  chosen: them
  alternatives:
  - those people
  - such ones
  lexicon: LSJ
  rationale: Direct object referring back to the indefinite plural. 'Them' is natural
    modern English.
- source_word: τροχισθέντας
  chosen: be broken on the wheel
  alternatives:
  - be racked on the wheel
  - be tortured on the wheel
  lexicon: LSJ
  rationale: The participle refers to punishment associated with the wheel (τροχός).
    'Broken on the wheel' is the most concrete and historically recognizable rendering;
    'tortured on the wheel' is broader but less specific.
- source_word: ἀναιρεθῆναι
  chosen: put to death
  alternatives:
  - killed
  - executed
  - done away with
  lexicon: LSJ
  rationale: A common verb for killing/removing. 'Put to death' is suitably formal
    and fits the judicial tone better than the blunter 'killed'.
