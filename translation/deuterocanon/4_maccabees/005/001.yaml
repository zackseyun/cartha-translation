translation:
  text: So then, when the tyrant Antiochus had taken his seat with his council on
    a certain high place, and their fully armed troops were standing around on every
    side,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on some elevated place.' The Greek phrase indicates a raised location,
      not necessarily a cultic 'high place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Προκαθίσας
  chosen: had taken his seat
  alternatives:
  - having sat down first
  - having presided
  lexicon: LSJ
  rationale: The participle introduces Antiochus as seated in a position of authority
    before the ensuing action. 'Had taken his seat' is idiomatic English that preserves
    the formal scene-setting better than the wooden 'having sat down first.'
- source_word: γέ τοι
  chosen: So then
  alternatives:
  - indeed
  - now then
  lexicon: LSJ
  rationale: This particle combination adds discourse force rather than concrete content.
    'So then' captures the transitional, emphatic movement into the scene without
    overtranslating.
- source_word: μετὰ τῶν συνέδρων
  chosen: with his council
  alternatives:
  - with the councilors
  - with his advisers
  lexicon: LSJ
  rationale: συνέδρων refers to those sitting in council with him. 'With his council'
    is concise and natural, while still conveying an official advisory body.
- source_word: ὁ τύραννος
  chosen: the tyrant
  alternatives:
  - the ruler
  - the despot
  lexicon: LSJ
  rationale: The Greek explicitly characterizes Antiochus negatively. 'The tyrant'
    preserves the author's evaluative term and should not be softened to a neutral
    political title.
- source_word: ἐπὶ τινος ὑψηλοῦ τόπου
  chosen: on a certain high place
  alternatives:
  - on some elevated place
  - on a certain raised platform
  lexicon: LSJ
  rationale: The phrase denotes an elevated location. 'High place' is the most direct
    rendering, though here it need not imply cultic significance; 'certain' reflects
    the indefinite τινος.
- source_word: τῶν στρατευμάτων
  chosen: troops
  alternatives:
  - forces
  - soldiers
  lexicon: LSJ
  rationale: The term denotes military bodies or forces. 'Troops' fits the collective
    sense in context better than the more abstract 'forces' or the individually focused
    'soldiers.'
- source_word: παρεστηκότων
  chosen: were standing
  alternatives:
  - having been stationed
  - were present
  lexicon: LSJ
  rationale: The participle describes the troops as standing by/in attendance around
    him. 'Were standing' preserves the visual scene and the ongoing posture.
- source_word: κυκλόθεν
  chosen: around on every side
  alternatives:
  - all around
  - round about
  lexicon: LSJ
  rationale: The adverb emphasizes encirclement. 'Around on every side' brings out
    the comprehensive surrounding force.
- source_word: εὐόπλων
  chosen: fully armed
  alternatives:
  - well-armed
  - in full armor
  lexicon: LSJ
  rationale: The adjective indicates that the troops were well equipped for battle.
    'Fully armed' is clear modern English and preserves the threatening atmosphere.
