- issue: Authorial evaluation of Antiochus in τύραννος
  chosen_reading: Retain the explicitly negative term 'the tyrant' in the main text
  alternative_readings:
  - the ruler
  - the king
  rationale: The source text itself uses a morally charged designation, not a neutral
    royal title. Preserving this avoids muting the rhetoric of 4 Maccabees and does
    not import theology beyond the text.
