translation:
  text: 'Before I begin the tortures against you, old man, I would advise you of this:
    by tasting the pork, you may save yourself. For I respect your age and your gray
    hair, though, after having had it for so long, you do not seem to me to be philosophizing
    by practicing the religion of the Jews.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'by tasting swine's flesh, you might preserve your life.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'be philosophizing,' preserving the book's recurring language
      of philosophy and reason.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὶν ἄρξασθαι
  chosen: Before I begin
  alternatives:
  - Before beginning
  - Before I start
  lexicon: LSJ
  rationale: The infinitive construction with πρίν is naturally temporal. 'Before
    I begin' gives clear modern English while preserving the first-person framing.
- source_word: τῶν κατὰ σοῦ βασάνων
  chosen: the tortures against you
  alternatives:
  - the torments against you
  - the tortures for you
  lexicon: LSJ
  rationale: βάσανοι here refers to acts of torture/interrogation, not merely inner
    anguish. 'Against you' reflects κατὰ σοῦ straightforwardly.
- source_word: ὦ πρεσβῦτα
  chosen: old man
  alternatives:
  - elder
  - old sir
  lexicon: LSJ
  rationale: The address is to an aged man, not an office-holder. 'Old man' preserves
    the direct, somewhat blunt vocative force in context.
- source_word: συμβουλεύσαιμʼ ἂν σοι ταῦτα
  chosen: I would advise you of this
  alternatives:
  - I would counsel you in these matters
  - I would give you this advice
  lexicon: LSJ
  rationale: The optative with ἄν expresses a courteous or tentative proposal. 'I
    would advise you of this' captures the rhetorical politeness before the threat.
- source_word: ὅπως ἀπογευσάμενος τῶν ὑείων σώζοιο
  chosen: by tasting the pork, you may save yourself
  alternatives:
  - so that, after tasting the pork, you might be saved
  - that by sampling swine's flesh you might preserve your life
  lexicon: LSJ
  rationale: ὑείων means pork/swine flesh. 'Pork' is idiomatic and precise. σώζοιο
    in context means physical preservation from execution/torture, hence 'save yourself'
    rather than a theological 'be saved.'
- source_word: αἰδοῦμαι γάρ σου τὴν ἡλικίαν καὶ τὴν πολιάν
  chosen: For I respect your age and your gray hair
  alternatives:
  - For I feel shame before your age and gray hair
  - For I reverence your age and white hair
  lexicon: LSJ
  rationale: αἰδέομαι can denote reverence/respect. In this context the speaker claims
    deference toward Eleazar's advanced age. 'Gray hair' renders πολιά naturally in
    English.
- source_word: ἣν μετὰ τοσοῦτον ἔχων χρόνον
  chosen: though, after having had it for so long
  alternatives:
  - which, having borne for so long
  - which after so much time possessing
  lexicon: LSJ
  rationale: The relative clause refers most naturally to the gray hair/old age just
    mentioned. The participial phrase is rendered idiomatically without losing the
    temporal sense.
- source_word: οὔ μοι δοκεῖς φιλοσοφεῖν
  chosen: you do not seem to me to be philosophizing
  alternatives:
  - you do not seem to me to be acting philosophically
  - you do not appear to be wise
  lexicon: LSJ
  rationale: φιλοσοφεῖν is an important term in 4 Maccabees and should be preserved
    rather than flattened to 'be wise.' Retaining 'philosophizing' keeps the book's
    reason/virtue vocabulary visible.
- source_word: τῇ Ἰουδαίων χρωμένῃ θρησκείᾳ
  chosen: by practicing the religion of the Jews
  alternatives:
  - by adhering to the Jews' religion
  - by making use of the Jewish religion
  lexicon: LSJ
  rationale: χρῶμαι with the dative can mean to make use of or practice. θρησκεία
    is religious observance/religion. 'Practicing the religion of the Jews' communicates
    the sense clearly in modern English.
