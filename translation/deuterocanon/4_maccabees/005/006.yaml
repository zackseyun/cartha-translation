theological_decisions:
- issue: Meaning of σώζοιο
  chosen_reading: physical self-preservation from impending torture/death
  alternative_readings:
  - broader 'be saved' language without specifying physical rescue
  rationale: In context the tyrant urges Eleazar to eat forbidden meat to avoid punishment.
    The verb therefore concerns immediate bodily preservation, not spiritual salvation.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import
    doctrinal claims the text does not make.'
- issue: Rendering φιλοσοφεῖν
  chosen_reading: retain explicit philosophy language
  alternative_readings:
  - render more generally as 'be sensible' or 'be wise'
  rationale: 4 Maccabees repeatedly frames Jewish piety in discourse about reason
    and philosophy. Preserving the verbal form keeps that thematic texture visible
    rather than domesticating it.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented
    exception.'
