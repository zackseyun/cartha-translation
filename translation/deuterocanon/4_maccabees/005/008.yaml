id: 4MA.5.8
reference: 4 Maccabees 5:8
source:
  edition: lxx-swete-1909
  text: καὶ γὰρ ἀνόητον τοῦτ᾽ τὸ μὴ ἀπολαύειν τῶν χωρὶς ὀνείδους ἡδέων, καὶ ἄδικον
    ἀποστρέφεσθαι τὰς τῆς φύσεως χάριτας.
  language: Greek
  pages:
  - 752
  - 758
  - 759
  - 760
  - 761
  - 762
  - 763
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: For it is foolish not to enjoy the pleasant things that are without reproach,
    and unjust to turn away from the gifts of nature.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the blameless pleasures.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνόητον
  chosen: foolish
  alternatives:
  - senseless
  - unreasonable
  lexicon: LSJ
  rationale: The adjective denotes lack of sense or understanding. 'Foolish' is natural
    English and preserves the moral-intellectual force without sounding overly technical.
- source_word: ἀπολαύειν
  chosen: to enjoy
  alternatives:
  - to partake of
  - to benefit from
  lexicon: LSJ
  rationale: The infinitive here refers to taking enjoyment in pleasurable things.
    'Enjoy' is the clearest idiomatic rendering in context.
- source_word: τῶν χωρὶς ὀνείδους ἡδέων
  chosen: the pleasant things that bring no reproach
  alternatives:
  - the blameless pleasures
  - pleasant things without disgrace
  lexicon: LSJ
  rationale: ἡδέων refers to pleasant or pleasurable things; χωρὶς ὀνείδους qualifies
    them as free from reproach/disgrace. The chosen phrasing keeps both the pleasurable
    sense and the moral qualification explicit.
- source_word: ἄδικον
  chosen: unjust
  alternatives:
  - wrong
  - unfair
  lexicon: LSJ
  rationale: The term carries an ethical sense stronger than mere impropriety. 'Unjust'
    preserves the moral register of the argument.
- source_word: ἀποστρέφεσθαι
  chosen: to turn away from
  alternatives:
  - to reject
  - to avoid
  lexicon: LSJ
  rationale: The middle infinitive suggests turning oneself away from something. 'Turn
    away from' reflects the verbal image more closely than the more interpretive 'reject.'
- source_word: τὰς τῆς φύσεως χάριτας
  chosen: the gifts of nature
  alternatives:
  - nature's graces
  - the favors of nature
  lexicon: LSJ
  rationale: χάριτες here refers to benefits or gracious endowments, and φύσεως indicates
    what belongs to nature. 'Gifts of nature' is idiomatic and communicates naturally
    given benefits without importing later theological overtones into χάρις.
