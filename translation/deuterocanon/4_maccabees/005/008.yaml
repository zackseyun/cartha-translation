theological_decisions:
- issue: Moral characterization of natural pleasures
  chosen_reading: The verse affirms that some pleasurable things are morally permissible
    ('that bring no reproach') and should not be refused.
  alternative_readings:
  - The phrase could be compressed as 'blameless pleasures'.
  rationale: The Greek explicitly qualifies the pleasant things as χωρὶς ὀνείδους,
    so the translation preserves both the enjoyment and the moral limitation rather
    than flattening the statement into a blanket endorsement of pleasure.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
