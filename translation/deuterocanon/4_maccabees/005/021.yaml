theological_decisions:
- issue: Personification of the law
  chosen_reading: Retain the personified expression 'the law takes equal pride' rather
    than flattening it to an abstract statement about approval.
  alternative_readings:
  - the law is equally honored through both
  - the law glories equally in both
  rationale: The Greek explicitly personifies ὁ νόμος with ὑπερηφανεῖται. Preserving
    that personification respects the rhetoric of 4 Maccabees and avoids importing
    a more interpretive abstraction.
  doctrine_reference: Translation philosophy §§1, 6
