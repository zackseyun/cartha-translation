id: 4MA.5.21
reference: 4 Maccabees 5:21
source:
  edition: lxx-swete-1909
  text: διʼ ἑκατέρου γὰρ ὡς ὁμοίως ὁ νόμος ὑπερηφανεῖται.
  language: Greek
  pages:
  - 752
  - 758
  - 759
  - 760
  - 761
  - 762
  - 763
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: For through each of them alike, the law takes pride.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through each of the two'; the Greek ἑκατέρου refers specifically to
      two items or persons in view.
    reason: lexical_alternative
  - marker: b
    text: Or 'the law glories equally.' The Greek personifies the law with a verb
      of pride/exultation.
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ ἑκατέρου
  chosen: through either one
  alternatives:
  - through each of the two
  - by means of either
  lexicon: LSJ
  rationale: ἑκάτερος refers to each of two items/persons. In context the sense is
    distributive over two alternatives already under discussion. 'Through either one'
    preserves the concise Greek while sounding natural in English.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: LSJ
  rationale: γάρ gives explanatory support to the preceding statement. 'For' best
    preserves the connective force without overinterpreting.
- source_word: ὡς ὁμοίως
  chosen: equally
  alternatives:
  - in the same way
  - alike
  lexicon: LSJ
  rationale: The combination intensifies the idea of sameness/equivalence. Rendering
    it adverbially as 'equally' captures the sense in idiomatic English more cleanly
    than a more wooden 'in like manner alike.'
- source_word: ὁ νόμος
  chosen: the law
  lexicon: LSJ
  rationale: νόμος here refers to the Jewish law/Torah as throughout the context.
    'The law' is the standard and sufficiently transparent rendering.
- source_word: ὑπερηφανεῖται
  chosen: takes pride
  alternatives:
  - glories
  - is exalted
  - boasts proudly
  lexicon: LSJ
  rationale: The verb can denote being proud or exulting. Since 'the law' is personified,
    'takes pride' communicates the figurative sense clearly in modern English without
    sounding awkward. 'Glories' is possible but less natural for contemporary readers.
