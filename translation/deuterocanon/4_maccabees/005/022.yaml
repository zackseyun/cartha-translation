theological_decisions:
- issue: Meaning of φιλοσοφία in 4 Maccabees
  chosen_reading: Retain 'philosophy' in the main text rather than replacing it with
    an explicitly religious paraphrase.
  alternative_readings:
  - our way of life
  - our teaching
  rationale: The book self-consciously presents Jewish piety and reasoned devotion
    as a philosophy. Preserving the term avoids importing a narrower doctrinal label
    and lets the author's own framing stand.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
- issue: Force of εὐλογιστίας
  chosen_reading: Render as 'blessedness' rather than a flatter term like 'happiness.'
  alternative_readings:
  - happiness
  - good repute
  rationale: The context concerns the honorable and divinely favored quality of life
    under this philosophy, not mere emotional satisfaction. 'Blessedness' preserves
    that moral-religious resonance without overinterpreting.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
