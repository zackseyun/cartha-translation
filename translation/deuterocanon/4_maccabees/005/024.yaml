translation:
  text: And it trains in righteousness, so that one may be impartial in all matters
    of conduct, and it teaches piety, so that one may worship only the one who truly
    is God with due majesty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''justice'': the Greek δικαιοσύνη can denote righteousness or justice;
      here the main text keeps the project''s default ''righteousness.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'only the true God.' The Greek literally emphasizes 'the God who is,'
      contrasting the real God with false gods.
    reason: alternative_reading
lexical_decisions:
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: The default project rendering for δικαιοσύνη is 'righteousness.' In this
    ethical formation context, the term denotes moral uprightness rather than merely
    judicial justice, though 'justice' remains a plausible nuance and is preserved
    as an alternative.
- source_word: παιδεύει
  chosen: trains
  alternatives:
  - disciplines
  - instructs
  - educates
  lexicon: BDAG
  rationale: παιδεύω here refers to moral formation or training, not merely classroom
    instruction. 'Trains' captures the formative, habituating sense in readable English.
- source_word: διὰ πάντων τῶν ἠθῶν
  chosen: in all matters of conduct
  alternatives:
  - through all character traits
  - in every sphere of behavior
  lexicon: LSJ
  rationale: ἤθη concerns habits, character, or conduct. The phrase is idiomatic and
    points to the whole range of moral behavior; 'in all matters of conduct' communicates
    that scope naturally.
- source_word: ἰσονομεῖν
  chosen: be impartial
  alternatives:
  - observe equality
  - deal justly and equally
  lexicon: LSJ
  rationale: Literally the verb relates to equality under law or equal treatment.
    In this ethical context, 'be impartial' best expresses the practical moral sense
    without over-literal awkwardness.
- source_word: εὐσεβείαν
  chosen: piety
  alternatives:
  - godliness
  - reverence
  lexicon: BDAG
  rationale: εὐσέβεια denotes reverent devotion toward God. 'Piety' is concise and
    fitting here, while 'godliness' is possible but can sound more generalized in
    English.
- source_word: σέβειν
  chosen: worship
  alternatives:
  - revere
  - venerate
  lexicon: BDAG
  rationale: Given the explicit object 'the one who truly is God,' the verb carries
    religious devotion. 'Worship' makes that cultic-religious force clear.
- source_word: μόνον τὸν ὄντα θεὸν
  chosen: only the one who truly is God
  alternatives:
  - only the existing God
  - only the real God
  lexicon: LSJ
  rationale: The participle ὄντα with θεόν emphasizes the true/existent God in contrast
    to false gods. 'The one who truly is God' preserves that ontological emphasis
    more clearly than a flat 'the true God' while remaining idiomatic.
- source_word: μεγαλοπρεπῶς
  chosen: with due majesty
  alternatives:
  - magnificently
  - in a lofty manner
  - with magnificence
  lexicon: LSJ
  rationale: The adverb denotes a manner befitting greatness or splendor. 'With due
    majesty' conveys worship offered in a way worthy of God's greatness, and reads
    more naturally than the more wooden 'magnificently'.
