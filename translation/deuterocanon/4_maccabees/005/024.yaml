id: 4MA.5.24
reference: 4 Maccabees 5:24
source:
  edition: lxx-swete-1909
  text: καὶ δικαιοσύνην παιδεύει, ὥστε διὰ πάντων τῶν ἠθῶν ἰσονομεῖν καὶ εὐσεβείαν
    διδάσκειν, ὥστε μόνον τὸν ὄντα θεὸν σέβειν μεγαλοπρεπῶς.
  language: Greek
