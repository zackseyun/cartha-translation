theological_decisions:
- issue: Rendering δικαιοσύνη in a non-Pauline ethical context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Following the project's default, 'righteousness' is retained in the main
    text. Because the verse concerns ethical instruction and equal treatment, 'justice'
    is a meaningful alternative and is preserved in a footnote rather than replacing
    the default.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; alternatives
    preserved where relevant'
- issue: Force of μόνον τὸν ὄντα θεὸν
  chosen_reading: only the one who truly is God
  alternative_readings:
  - only the true God
  rationale: The Greek stresses God's real being over against idols. The chosen rendering
    preserves that theological contrast without adding doctrinal content beyond the
    text.
  doctrine_reference: Translation philosophy §1 original-language primacy; §3 preserve
    theological tension rather than resolve it
