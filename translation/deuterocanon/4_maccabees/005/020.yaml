theological_decisions:
- issue: Moral equivalence of lesser and greater violations
  chosen_reading: The verse states that violating the law in minor matters and major
    matters is equivalent in kind.
  alternative_readings:
  - The verse means only that any violation counts as lawbreaking, without implying
    equal seriousness in every respect.
  rationale: The Greek ἰσοδύναμόν ἐστιν makes a strong equivalence claim, but the
    translation should not import a full theory of identical consequences beyond the
    text. 'Equivalent' preserves the assertion while leaving its exact scope to context.
  doctrine_reference: Preserve theological tension rather than resolve it.
