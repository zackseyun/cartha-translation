translation:
  text: For to break the law in small matters and in great is equivalent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to transgress in small things and in great things is the same.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρανομεῖν
  chosen: to break the law
  alternatives:
  - to transgress
  - to act unlawfully
  - to violate the law
  lexicon: LSJ
  rationale: The verb denotes acting contrary to law. 'Break the law' is clear modern
    English and preserves the legal force better than the more technical 'transgress'.
- source_word: ἐν μικροῖς καὶ ἐν μεγάλοις
  chosen: in small matters and in great
  alternatives:
  - in small things and in great things
  - in lesser matters and in greater matters
  lexicon: LSJ
  rationale: The paired neuter plurals function substantivally, contrasting lesser
    and greater matters. 'Small matters and in great' keeps the concise antithesis
    of the Greek while remaining natural enough in English.
- source_word: ἰσοδύναμόν
  chosen: equivalent
  alternatives:
  - equal in force
  - equally weighty
  - the same
  lexicon: LSJ
  rationale: The adjective means equal in strength or value. 'Equivalent' best captures
    the claim that lawbreaking in either sphere is of the same moral kind, without
    overinterpreting the degree of punishment or consequence.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: LSJ
  rationale: This gives the explanatory force linking the statement to the preceding
    argument.
