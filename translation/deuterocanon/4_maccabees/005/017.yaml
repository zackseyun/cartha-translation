theological_decisions:
- issue: Nature of 'law' in context
  chosen_reading: Rendered generically as 'the law' without specifying Mosaic law
    in the English text.
  alternative_readings:
  - the Law
  rationale: The Greek has no explicit qualifier here. In context the speaker refers
    to the ancestral/Jewish law, but the verse itself states it generically. Lowercase
    'law' avoids importing a capitalization decision not demanded by the source while
    preserving the legal-ethical force.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
