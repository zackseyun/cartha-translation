translation:
  text: Therefore, indeed, we consider it right to break the law in no way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we deem it proper to transgress the law in no way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: LSJ
  rationale: Inferential conjunction drawing a conclusion from the preceding argument;
    'Therefore' preserves the logical force in natural English.
- source_word: δὴ
  chosen: indeed
  alternatives:
  - surely
  - then
  - ''
  lexicon: LSJ
  rationale: Adds emphasis to the assertion. 'Indeed' keeps the particle's strengthening
    force without overtranslating.
- source_word: κατʼ οὐδένα τρόπον
  chosen: in no way
  alternatives:
  - by no means
  - in no manner
  lexicon: LSJ
  rationale: Idiomatic expression of absolute negation. 'In no way' is clear modern
    English and preserves the categorical force.
- source_word: παρανομεῖν
  chosen: break the law
  alternatives:
  - act unlawfully
  - transgress the law
  lexicon: LSJ
  rationale: The verb means to act contrary to law. 'Break the law' is idiomatic and
    accessible, while still reflecting the legal/moral sense of the Greek.
- source_word: ἀξιοῦμεν
  chosen: we consider it right
  alternatives:
  - we deem worthy
  - we think fit
  - we judge proper
  lexicon: LSJ
  rationale: Here the verb expresses considered judgment about what is fitting or
    proper. 'We consider it right' best fits the infinitive construction in clear
    English.
