lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; simple coordination fits the narrative flow without
    adding temporal force beyond the Greek.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Accusative masculine singular pronoun referring to the person just introduced
    in context; straightforwardly rendered as 'him'.
- source_word: ἰδὼν
  chosen: when ... saw
  alternatives:
  - having seen
  - seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω used adverbially before the main verb. English
    'when ... saw' gives natural narrative sequence while preserving the participial
    relationship better than the more wooden 'having seen'.
- source_word: ὁ Ἀντίοχος
  chosen: Antiochus
  lexicon: BDAG
  rationale: Personal name with article; English normally omits the article before
    proper names. Standard transliteration is used per project philosophy.
- source_word: ἔφη
  chosen: he said
  alternatives:
  - said
  - spoke
  lexicon: BDAG
  rationale: Common narrative speech verb. 'He said' preserves the explicit subject
    carried by the Greek finite verb and reads naturally in English narrative.
