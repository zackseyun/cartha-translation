- issue: Philosophical terminology in 4 Maccabees
  chosen_reading: Retain explicit philosophical diction ('reasonings,' 'mind,' 'philosophize')
  alternative_readings:
  - Use more generalized moral language such as 'thoughts' and 'reflect'
  rationale: The verse belongs to a work that intentionally presents Jewish piety
    in philosophical categories. Preserving that diction avoids flattening the author's
    conceptual world into generic exhortation.
