  text: καὶ ἀποσκεδάσεις σου τὸν λῆρον τῶν λογισμῶν, καὶ ἄξιον τῆς ἡλικίας ἀναλαβὼν
    νοῦν φιλοσοφήσεις τὴν τοῦ συμφέροντος ἀλήθειαν,
