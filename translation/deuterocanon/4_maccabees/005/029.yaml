translation:
  text: nor will I disregard the sacred oaths of our fathers to keep the law,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacred oaths of our ancestors.' The Greek προγόνων can mean 'ancestors'
      or 'forefathers'; 'fathers' is retained to reflect the source's masculine ancestral
      language.
    reason: lexical_alternative
  - marker: b
    text: That is, the Jewish ancestral law; alternatively, 'the Law.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔτε
  chosen: nor
  alternatives:
  - and not
  - neither
  lexicon: LSJ
  rationale: Continues a preceding negated series; 'nor' best reflects the connective
    force in natural English.
- source_word: ἱεροὺς
  chosen: sacred
  alternatives:
  - holy
  - consecrated
  lexicon: LSJ
  rationale: Modifies 'oaths' and conveys religious solemnity without sounding overly
    archaic; 'sacred oaths' is idiomatic and preserves cultic weight.
- source_word: τῶν προγόνων
  chosen: of our fathers
  alternatives:
  - of our ancestors
  - of the forefathers
  lexicon: LSJ
  rationale: The Greek means 'ancestors/forefathers.' 'Our fathers' preserves the
    familial and tradition-bearing force and matches the speaker's appeal to inherited
    covenantal loyalty. Though 'ancestors' is possible, 'fathers' better reflects
    the masculine ancestral language of the source per gender-accurate policy.
- source_word: περὶ τοῦ φυλάξαι τὸν νόμον
  chosen: to keep the law
  alternatives:
  - concerning keeping the law
  - for the purpose of keeping the law
  - to guard the law
  lexicon: LSJ
  rationale: The articular infinitive with περί here expresses the matter/content
    of the oaths. 'To keep the law' is concise, idiomatic, and preserves φυλάσσω's
    covenantal sense of observant keeping.
- source_word: τὸν νόμον
  chosen: the law
  alternatives:
  - the Law
  lexicon: LSJ
  rationale: In this Jewish context it refers to the ancestral law/Torah. Lowercase
    'law' is retained for readability and because the Greek itself does not mark capitalization;
    the referent remains clear from context.
- source_word: ὅρκους
  chosen: oaths
  alternatives:
  - vows
  - sworn obligations
  lexicon: LSJ
  rationale: ὅρκος is specifically an oath rather than a general vow. 'Oaths' preserves
    the solemn sworn character of ancestral commitment.
- source_word: οὐ παρήσω
  chosen: will I disregard
  alternatives:
  - will I neglect
  - will I set aside
  - will I abandon
  lexicon: LSJ
  rationale: From παρίημι in the sense of letting pass, neglecting, or disregarding.
    'Disregard' fits the object 'oaths' well and communicates refusal to treat them
    as void. 'Abandon' would overstate by implying total apostasy rather than failure
    to honor.
