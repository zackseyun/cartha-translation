theological_decisions:
- issue: Rendering ancestral language in τῶν προγόνων
  chosen_reading: of our fathers
  alternative_readings:
  - of our ancestors
  - of the forefathers
  rationale: The source uses masculine ancestral language. Per doctrine, gender-accurate
    rendering is preferred over flattening to a neutral term unless context demands
    otherwise. Here the appeal is to inherited covenantal tradition, and 'fathers'
    preserves that rhetorical force.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Reference of τὸν νόμον
  chosen_reading: the law
  alternative_readings:
  - the Law
  - the ancestral law
  rationale: The phrase clearly refers to the Jewish law observed by the ancestors.
    The main text keeps the simple source-near rendering 'the law' without importing
    interpretive expansion; capitalization or 'ancestral' can be noted as alternatives
    but are not required by the Greek wording itself.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
