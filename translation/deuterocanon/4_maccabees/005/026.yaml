id: 4MA.5.26
reference: 4 Maccabees 5:26
source:
  edition: lxx-swete-1909
  text: τὰ μὲν οἰκειωθησόμενα ἡμῶν ταῖς ψυχαῖς ἐπέτρεψεν ἐσθίειν, τὰ δὲ ἐναντιωθησόμενα
    ἐκώλυσεν σαρκοφαγεῖν.
  language: Greek
