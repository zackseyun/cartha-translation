theological_decisions:
- issue: Anthropological force of ψυχαῖς in relation to dietary law
  chosen_reading: Rendered as 'souls' and retained the moral correspondence language
    ('suited... opposed')
  alternative_readings:
  - Rendered more concretely as 'lives' or 'ourselves'
  rationale: The verse argues that the law distinguishes foods according to their
    relation to the inner moral life, not merely bodily health. Preserving 'souls'
    keeps the text's ethical-anthropological claim without expanding it into later
    doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 3, 6
