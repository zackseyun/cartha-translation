  chosen_reading: a divine law
  alternative_readings:
  - the divine law
  - a law from God
  rationale: The anarthrous θείῳ νόμῳ can be rendered indefinitely or qualitatively.
    'A divine law' preserves the Greek form while clearly affirming the law's divine
    status without importing a more dogmatic phrasing than the text itself states.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
