translation:
  text: But we, Antiochus, having been persuaded by a divine law, order our lives
    by it, and we consider no compulsion to be stronger than our obedience to our
    law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'having been convinced by the divine law, we conduct our lives accordingly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θείῳ
  chosen: divine
  alternatives:
  - godly
  - from God
  lexicon: LSJ
  rationale: The adjective modifies νόμῳ and denotes the law's divine character or
    origin. 'Divine' is natural English and preserves the claim without over-specifying
    whether the emphasis is quality or source.
- source_word: πεπεισμένοι
  chosen: having been persuaded
  alternatives:
  - being convinced
  - having been convinced
  lexicon: LSJ
  rationale: Perfect passive participle of πείθω. 'Having been persuaded' preserves
    the passive form and the settled resulting state. It avoids implying merely subjective
    opinion.
- source_word: νόμῳ
  chosen: law
  alternatives:
  - instruction
  - custom
  lexicon: LSJ
  rationale: In this Maccabean context νόμος refers to the Jewish law/Torah. 'Law'
    is the standard and most transparent rendering; the possessive later ('our law')
    clarifies communal reference.
- source_word: πολιτευόμεθα
  chosen: order our lives by it
  alternatives:
  - live as citizens
  - conduct our lives
  - govern our lives
  lexicon: LSJ
  rationale: The verb can mean to live or conduct oneself as a member of a polity.
    Here it refers to practical manner of life under the law. 'Order our lives by
    it' captures both conduct and normativity in idiomatic English.
- source_word: οὐδεμίαν ἀνάγκην
  chosen: no compulsion
  alternatives:
  - no necessity
  - no constraint
  lexicon: LSJ
  rationale: ἀνάγκη here is coercive pressure rather than abstract necessity. 'Compulsion'
    best fits the tyrant's attempted coercion in context.
- source_word: βιαιοτέραν
  chosen: stronger
  alternatives:
  - more violent
  - more forceful
  lexicon: LSJ
  rationale: Comparative of βίαιος. In context the sense is coercive force. 'Stronger'
    reads smoothly with 'compulsion' while still reflecting comparative force; 'more
    violent' would sound awkward in English here.
- source_word: τῆς πρὸς τὸν νόμον ἡμῶν εὐπειθείας
  chosen: than our obedience to our law
  alternatives:
  - than compliance with our law
  - than dutiful submission to our law
  lexicon: LSJ
  rationale: εὐπείθεια denotes readiness to obey or compliance. 'Obedience' is the
    clearest English equivalent and preserves the moral seriousness of fidelity to
    the law.
