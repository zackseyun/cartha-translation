id: 4MA.5.33
reference: 4 Maccabees 5:33
source:
  edition: lxx-swete-1909
  text: οὐχ οὕτως οἰκτειρήσω τὸ ἐμαυτοῦ γῆρας, ὥστε με διʼ ἐμαυτοῦ τὸν πάτριον καταλῦσαι
    νόμον.
  language: Greek
  pages:
  - 752
