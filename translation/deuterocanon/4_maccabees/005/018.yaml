theological_decisions:
- issue: Status of the law as θεῖος
  chosen_reading: rendered as 'divine' without expanding to 'given by God'
  alternative_readings:
  - from God
  - God-given
  rationale: The verse frames a rhetorical concession about whether the law is divine.
    Translating simply as 'divine' preserves the exact level of claim made in the
    Greek and avoids importing a fuller doctrinal formulation.
  doctrine_reference: Translation philosophy §1, §3
- issue: εὐσέβεια terminology
  chosen_reading: translated as 'piety'
  alternative_readings:
  - godliness
  - religion
  - devotion
  rationale: In 4 Maccabees, εὐσέβεια is a key virtue term tied to reverence toward
    God and faithful observance. 'Piety' best preserves that moral-religious category
    in this context.
  doctrine_reference: Translation philosophy §5, §6
