id: 4MA.5.18
reference: 4 Maccabees 5:18
source:
  edition: lxx-swete-1909
  text: καίτοι εἰ κατὰ ἀλήθειαν μὴ ἦν ὁ νόμος ἡμῶν, ὡς σὺ ὑπολαμβάνεις, θεῖος, ἄλλως
    δὲ νομίζομεν αὐτὸν εἶναι θεῖον, οὐδὲ οὕτως ἔχων ἡμῖν ἦν τὴν ἐπὶ τῇ εὐσεβείᾳ δόξαν
    ἀκυρῶσαι.
  language: Greek
  pages:
  - 752
  - 758
  - 759
  - 760
  - 761
  - 762
  - 763
  - 786
  - 787
