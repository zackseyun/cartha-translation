translation:
  text: For it would indeed be irrational, if, after living our life up to old age
    in truth and lawfully preserving the reputation based on it, we should now change
    course,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄλογιστον
  chosen: irrational
  alternatives:
  - unreasonable
  - senseless
  lexicon: LSJ
  rationale: The adjective denotes what is contrary to reason or rational judgment.
    'Irrational' fits the book's recurring emphasis on reason and self-mastery better
    than the more generic 'unreasonable' or 'senseless'.
- source_word: πρὸς ἀλήθειαν
  chosen: in truth
  alternatives:
  - according to truth
  - with reference to truth
  lexicon: LSJ
  rationale: The phrase indicates life oriented toward or in conformity with truth.
    'In truth' is idiomatic English while preserving the moral and philosophical force
    of the Greek.
- source_word: ζήσαντες
  chosen: after living
  alternatives:
  - having lived
  - living
  lexicon: LSJ
  rationale: An aorist participle preceding the main conditional verb; 'after living'
    makes the temporal sequence clear in natural English.
- source_word: τὸν μέχρι γήρως βίον
  chosen: our whole life up to old age
  alternatives:
  - the life until old age
  - the course of life to old age
  lexicon: LSJ
  rationale: The phrase refers to the span of life reaching old age. 'Our whole life
    up to old age' communicates duration clearly and suits the speaker's retrospective
    argument.
- source_word: τὴν ἐπ’ αὐτῶν δόξαν
  chosen: the reputation founded on it
  alternatives:
  - the glory based on these things
  - the honor resting on them
  lexicon: LSJ
  rationale: δόξα here is social esteem or honorable repute, not divine glory. The
    pronoun phrase most naturally points back to the truthful life just mentioned;
    'reputation founded on it' captures that derived honor in idiomatic English.
- source_word: νομίμως
  chosen: lawfully
  alternatives:
  - rightly
  - according to law
  lexicon: LSJ
  rationale: The adverb carries the sense of acting in accordance with law or proper
    norm. 'Lawfully' preserves that explicit legal-ethical nuance, important in this
    martyrdom context.
- source_word: φυλάσσοντες
  chosen: preserving
  alternatives:
  - guarding
  - keeping
  lexicon: LSJ
  rationale: The participle means maintaining or guarding something already possessed.
    'Preserving' works well with 'reputation' in English.
- source_word: μεταβαλοίμεθα
  chosen: change course
  alternatives:
  - change
  - turn aside
  - alter our position
  lexicon: LSJ
  rationale: The verb means to change or alter oneself/one's stance. 'Change course'
    makes explicit the moral reversal implied in context without overparaphrasing.
