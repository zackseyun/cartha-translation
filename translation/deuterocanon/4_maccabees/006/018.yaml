- issue: Moral-philosophical force of ἄλογιστον in a book centered on reason
  chosen_reading: irrational
  alternative_readings:
  - unreasonable
  - senseless
  rationale: 4 Maccabees repeatedly frames faithful endurance in terms of reason governing
    the passions. Rendering ἄλογιστον as 'irrational' preserves that thematic connection
    better than flatter alternatives.
