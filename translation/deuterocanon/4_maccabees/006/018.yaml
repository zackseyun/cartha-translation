  text: καὶ γὰρ ἄλογιστον, εἰ πρὸς ἀλήθειαν ζήσαντες τὸν μέχρι γήρως βίον, καὶ τὴν
    ἐπ’ αὐτῶν δόξαν νομίμως φυλάσσοντες, εἰ νῦν μεταβαλοίμεθα,
  language: Greek
