theological_decisions:
- issue: Representative force of the martyrs' suffering in περὶ αὐτῶν
  chosen_reading: The verse presents the speakers' punishment as borne on behalf of
    the nation, without importing a full later doctrinal theory of atonement.
  alternative_readings:
  - for them in a looser sense of 'with reference to them'
  rationale: The immediate context is intercessory and representative. Rendering περὶ
    αὐτῶν as 'on their behalf' preserves that force while avoiding over-specification
    beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
