translation:
  text: But you, the tyrant’s bodyguards—why do you delay?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'spear-bearers'; that is, the tyrant’s armed guards or bodyguards.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ... δορυφόροι
  chosen: the ... bodyguards
  alternatives:
  - spearmen
  - guards
  - attendants
  lexicon: LSJ
  rationale: δορυφόροι literally denotes spear-bearers, but in context it refers to
    the tyrant’s armed attendants/guards. 'Bodyguards' conveys the functional sense
    in natural English without losing the coercive setting.
- source_word: τοῦ τυράννου
  chosen: the tyrant’s
  alternatives:
  - of the tyrant
  lexicon: LSJ
  rationale: A possessive rendering is the most natural English equivalent of the
    genitive here. 'Tyrant' preserves the negative political-moral force of τύραννος.
- source_word: τί μέλλετε;
  chosen: why do you delay?
  alternatives:
  - what are you waiting for?
  - why are you hesitating?
  - what are you about to do?
  lexicon: BDAG/LSJ
  rationale: With μέλλω used absolutely in a direct rebuke, the sense is not simple
    futurity ('what are you about to do?') but delay/hesitation before action. 'Why
    do you delay?' captures the impatient challenge directed at the guards.
- source_word: οἱ δὲ
  chosen: But you
  alternatives:
  - and the
  - but the
  lexicon: LSJ
  rationale: Although formally third person ('but the...'), the following direct address
    makes an English vocative-like rendering more natural. 'But you' preserves the
    adversative turn and the speaker's direct confrontation.
