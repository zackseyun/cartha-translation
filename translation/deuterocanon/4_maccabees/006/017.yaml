  text: Μὴ οὕτως κακῶς φρονήσαιμεν, οἱ Ἀβραὰμ παῖδες, ὥστε μαλακοψυχήσαντας ἀπρεπὲς
    ἡμῖν δρᾶμα ὑποκρίνασθαι.
  language: Greek
