  alternative_readings:
  - we, Abraham’s sons
  - we, the descendants of Abraham
  rationale: The phrase is an appeal to ancestral covenant identity and honor. 'Children'
    preserves the familial and representative force without importing a narrower male-only
    sense beyond what the rhetoric requires.
  doctrine_reference: Gender-accurate over gender-neutral; transliterate names.
