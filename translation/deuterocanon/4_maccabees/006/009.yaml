id: 4MA.6.9
reference: 4 Maccabees 6:9
source:
  edition: lxx-swete-1909
  text: ὁ δὲ ὑπέμενεν τοὺς πόνους καὶ περιεφρόνει τῆς ἀνάγκης καὶ διεκαρτέρει τοὺς
    αἰκισμούς,
  language: Greek
  pages:
  - 752
  - 760
  - 761
  - 762
  - 763
  - 764
  - 765
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: But he endured the pains, and he despised the compulsion, and he persevered
    through the tortures,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the coercion' or 'the necessity'; the Greek term can denote force, constraint,
      or necessity, but here likely refers to the pressure being imposed on him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπέμενεν
  chosen: endured
  alternatives:
  - remained steadfast under
  - bore up under
  lexicon: BDAG
  rationale: The imperfect verb conveys ongoing steadfast endurance under suffering.
    'Endured' is concise, natural English and preserves the sense of sustained bearing
    up under trial.
- source_word: τοὺς πόνους
  chosen: the pains
  alternatives:
  - the sufferings
  - the agonies
  lexicon: BDAG
  rationale: πόνοι refers to painful experiences or sufferings. 'Pains' stays close
    to the concrete plural in Greek and fits the immediate context of physical torment.
- source_word: περιεφρόνει
  chosen: scorned
  alternatives:
  - despised
  - treated with contempt
  lexicon: BDAG
  rationale: The verb denotes looking down on or treating as negligible. 'Scorned'
    captures both contempt and dismissiveness in idiomatic English.
- source_word: τῆς ἀνάγκης
  chosen: the compulsion
  alternatives:
  - the necessity
  - the coercion
  - the pressure
  lexicon: BDAG
  rationale: In this martyrdom context, ἀνάγκη is not abstract necessity but imposed
    pressure or coercion. 'Compulsion' best reflects external force without overparaphrasing.
- source_word: διεκαρτέρει
  chosen: persevered through
  alternatives:
  - persisted through
  - held out against
  - remained steadfast through
  lexicon: BDAG
  rationale: The compound imperfect intensifies continued steadfastness. 'Persevered
    through' communicates sustained resistance in the midst of ongoing abuse.
- source_word: τοὺς αἰκισμούς
  chosen: the tortures
  alternatives:
  - the maltreatments
  - the torments
  - the acts of torture
  lexicon: BDAG
  rationale: αἰκισμοί refers to abusive physical mistreatment, especially torture.
    'Tortures' is the clearest modern rendering in this context and matches the severity
    of the scene.
