theological_decisions:
- issue: Sense of σῴζεσθαι in a martyrdom context
  chosen_reading: physical rescue/preservation is primary, rendered as 'to be saved'
  alternative_readings:
  - to escape safely
  - to be delivered
  rationale: The immediate contrast is between an available means of avoiding death
    and the speaker's actual death under torture for the law. The wording should not
    force a later doctrinal sense of spiritual salvation, though the English 'saved'
    preserves the lexical link transparently.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
- issue: Force of διὰ τὸν νόμον
  chosen_reading: causal commitment to the Jewish law, rendered 'because of the law'
  alternative_readings:
  - for the sake of the law
  rationale: The text presents martyrdom as resulting from fidelity to the law. 'Because
    of the law' is formally close and readable, without importing extra interpretive
    language beyond the Greek.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not import
    doctrinal claims the text does not make'
