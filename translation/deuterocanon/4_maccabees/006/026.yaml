id: 4MA.6.26
reference: 4 Maccabees 6:26
source:
  edition: lxx-swete-1909
  text: ὁ δὲ μέχρι ὀστέων ἤδη κατακεκαυμένος καὶ μέλλων λιποθυμεῖν, ἀνέτεινεν τὰ ὄμματα
    πρὸς τὸν θεόν, καὶ εἶπεν
  language: Greek
  pages:
  - 752
  - 760
  - 761
  - 762
  - 763
  - 764
  - 765
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: But he, already burned even to his bones and about to faint, lifted his eyes
    to God and said,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μέχρι ὀστέων
  chosen: down to his bones
  alternatives:
  - to the bones
  - as far as his bones
  lexicon: LSJ
  rationale: The phrase is idiomatic for extreme bodily devastation. 'Down to his
    bones' is natural modern English while preserving the graphic force of the Greek.
- source_word: κατακεκαυμένος
  chosen: burned
  alternatives:
  - consumed by burning
  - scorched
  - burned up
  lexicon: LSJ
  rationale: The perfect participle indicates a completed or advanced state resulting
    from burning. 'Burned' keeps the sense straightforward; the surrounding phrase
    supplies the severity.
- source_word: ἤδη
  chosen: already
  alternatives:
  - by now
  - now already
  lexicon: LSJ
  rationale: Marks that the suffering had already reached this stage before the next
    action.
- source_word: μέλλων λιποθυμεῖν
  chosen: about to faint
  alternatives:
  - on the verge of collapsing
  - about to lose consciousness
  lexicon: LSJ
  rationale: Conveys imminent physical failure without over-specifying medical detail.
    'Faint' fits the context of torture and exhaustion.
- source_word: ἀνέτεινεν τὰ ὄμματα
  chosen: lifted his eyes
  alternatives:
  - raised his eyes
  - looked up
  lexicon: LSJ
  rationale: A fairly literal rendering that preserves the solemn, prayer-like gesture.
    'Looked up' is possible but less explicit.
- source_word: πρὸς τὸν θεόν
  chosen: to God
  alternatives:
  - toward God
  lexicon: LSJ
  rationale: Standard directional use with the accusative after a verb of motion/gesture;
    'to God' is idiomatic in English.
- source_word: ὁ δὲ
  chosen: But he
  alternatives:
  - And he
  - Now he
  lexicon: LSJ
  rationale: δέ here marks contrast or continuation. 'But he' best reflects the adversative
    nuance in context.
