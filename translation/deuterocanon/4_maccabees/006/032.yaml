id: 4MA.6.32
reference: 4 Maccabees 6:32
source:
  edition: lxx-swete-1909
  text: εἰ γὰρ τὰ πάθη τοῦ λογισμοῦ κεκράτηκει, τούτοις ἂν ἀπεδόμην τὴν τῆς ἐπικρατίας
    μαρτυρίαν.
  language: Greek
  pages:
  - 752
  - 760
  - 761
  - 762
  - 763
  - 764
  - 765
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: For if the passions had gained mastery over reason, I would have given them
    testimony to my self-control.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if the passions had prevailed over reason.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I would have rendered to them the witness/proof of my self-mastery.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάθη
  chosen: the passions
  alternatives:
  - sufferings
  - passionate impulses
  - desires
  lexicon: LSJ
  rationale: In this philosophical-moral context, πάθη refers to passions or emotional
    impulses, not external sufferings. 'The passions' preserves the technical ethical
    sense and fits the argument about reason and self-mastery.
- source_word: λογισμοῦ
  chosen: reason
  alternatives:
  - rational judgment
  - mind
  - reasoning
  lexicon: LSJ
  rationale: The genitive with κεκράτηκει expresses mastery over the faculty of rational
    judgment. 'Reason' is concise, natural English and preserves the contrast with
    πάθη central to 4 Maccabees.
- source_word: κεκράτηκει
  chosen: had gained mastery over
  alternatives:
  - had prevailed over
  - had ruled
  - had overcome
  lexicon: LSJ
  rationale: κρατέω here conveys dominance or prevailing power. 'Had gained mastery
    over' brings out the completed force of the pluperfect and matches the ethical
    theme of control.
- source_word: ἀπεδόμην
  chosen: I would have given
  alternatives:
  - I would have rendered
  - I would have yielded
  - I would have ascribed
  lexicon: LSJ
  rationale: The verb means to give back, render, or assign. Here the speaker says
    he would have assigned or given testimony to the passions. 'I would have given'
    is idiomatic and sufficiently literal.
- source_word: ἐπικρατίας
  chosen: my self-control
  alternatives:
  - mastery
  - dominance
  - supremacy
  lexicon: LSJ
  rationale: ἐπικράτεια denotes self-mastery or self-control in moral discourse. Because
    the phrase concerns the speaker's own demonstrated restraint, 'my self-control'
    communicates the ethical sense better than the more abstract 'mastery'.
- source_word: μαρτυρίαν
  chosen: the testimony
  alternatives:
  - witness
  - proof
  - evidence
  lexicon: LSJ
  rationale: μαρτυρία can mean testimony or witness. 'The testimony' preserves the
    forensic flavor of the Greek while allowing the sense that his conduct would have
    borne witness in favor of the passions.
