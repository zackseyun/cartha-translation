theological_decisions:
- issue: Anthropological framing of reason versus passions in a deuterocanonical philosophical
    context
  chosen_reading: Retain the moral-philosophical contrast as stated, without importing
    later doctrinal categories such as 'sinful nature.'
  alternative_readings:
  - Render more dynamically as 'if my desires had overcome my better judgment'
  rationale: The verse argues for the supremacy of reasoned self-control over passions.
    A more interpretive rendering could flatten the text's explicit philosophical
    vocabulary. The chosen wording preserves the source's categories and tension.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
