  rationale: The context is a torture scene, and ἐξανίσταιτο here refers to forcing
    the victim back to his feet. The translation keeps the idiomatic sense while noting
    that the phrase is not theological resurrection language in this verse.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
