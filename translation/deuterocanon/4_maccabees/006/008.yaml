id: 4MA.6.8
reference: 4 Maccabees 6:8
source:
  edition: lxx-swete-1909
  text: λάξ γέ τοι τῶν πικρῶν τις δορυφόρων εἰς τοὺς κενεῶνας ἐναλλόμενος ἔτυπτεν,
    ὅπως ἐξανίσταιτο πίπτων.
  language: Greek
