id: 4MA.6.25
reference: 4 Maccabees 6:25
source:
  edition: lxx-swete-1909
  text: ἔνθα διὰ κακοτέχνων ὀργάνων καταφλέγοντες αὐτὸν ὑπερίπτοσαν καὶ δυσώδεις χυλοὺς
    εἰς τοὺς μυκτῆρας αὐτοῦ κατέχεον.
  language: Greek
  pages:
