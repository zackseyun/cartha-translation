translation:
  text: There, while burning him with instruments devised for torture, they leaped
    upon him and poured foul-smelling liquids into his nostrils.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with cruelly contrived instruments.' The Greek phrase emphasizes devices
      skillfully made for harmful use.
    reason: lexical_alternative
  - marker: b
    text: Or 'they rushed upon him.' The verb can suggest a violent springing or assaulting
      movement.
    reason: lexical_alternative
  - marker: c
    text: Or 'fetid liquids' for 'foul-smelling broths.' The noun may denote a liquid
      mixture rather than a thick porridge.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔνθα
  chosen: There
  alternatives:
  - Then
  - At that point
  lexicon: LSJ
  rationale: Locative/adverbial transition pointing to the scene just described; 'There'
    preserves the vivid narrative setting better than a purely temporal 'Then'.
- source_word: διὰ κακοτέχνων ὀργάνων
  chosen: with instruments devised for torture
  alternatives:
  - through cruel instruments
  - with wickedly contrived instruments
  - with instruments of evil art
  lexicon: LSJ
  rationale: κακότεχνος denotes something skillfully but maliciously contrived; ὄργανα
    are instruments/tools. The phrase likely refers to torture devices rather than
    generic tools. 'Devised for torture' brings out the malicious craftsmanship in
    idiomatic English without over-literal awkwardness.
- source_word: καταφλέγοντες
  chosen: burning
  alternatives:
  - scorching
  - setting ablaze
  lexicon: LSJ
  rationale: The participle indicates intense burning/scorching inflicted on him.
    'Burning' is the clearest natural rendering; 'scorching' is possible but slightly
    narrower.
- source_word: ὑπερίπτοσαν
  chosen: they flung themselves upon him
  alternatives:
  - they rushed upon him
  - they leaped over him
  lexicon: LSJ
  rationale: The verb suggests springing or rushing upon/over someone. In this torture
    context, 'flung themselves upon him' conveys violent assault more naturally than
    the spatially ambiguous 'leaped over him'.
- source_word: δυσώδεις χυλούς
  chosen: foul-smelling broths
  alternatives:
  - fetid liquids
  - stinking gruels
  - malodorous juices
  lexicon: LSJ
  rationale: δυσώδης means foul-smelling; χυλός can denote juice, broth, or gruel-like
    liquid. Because the liquid is being poured into the nostrils, 'broths' or 'liquids'
    fit better than 'gruels'; 'broths' preserves the concrete sense without sounding
    overly technical.
- source_word: μυκτῆρας
  chosen: nostrils
  alternatives:
  - nose
  lexicon: LSJ
  rationale: The plural specifically denotes nostrils rather than the nose generally,
    and the gruesome precision suits the passage.
- source_word: κατέχεον
  chosen: poured
  alternatives:
  - kept pouring
  - poured down
  lexicon: LSJ
  rationale: Imperfective past in narrative context; English simple past is natural.
    'Poured' captures the action without overcomplicating aspect.
