theological_decisions:
- issue: Rendering εὐσεβής in a philosophical-theological expression
  chosen_reading: godly
  alternative_readings:
  - pious
  - devout
  rationale: The verse presents reason not as autonomous rationality but as reason
    ordered by reverence toward God. 'Godly' communicates this clearly in modern English
    without sounding overly technical or archaic.
