translation:
  text: Therefore, it is agreed that godly reason is master of the passions.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁμολογουμένως
  chosen: it is agreed
  alternatives:
  - confessedly
  - admittedly
  - by common acknowledgment
  lexicon: LSJ
  rationale: The adverb signals something acknowledged or conceded. 'It is agreed'
    gives natural modern English while preserving the sense of common acknowledgment
    better than the archaic 'confessedly.'
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: LSJ
  rationale: Marks an inferential conclusion from the preceding argument. 'Therefore'
    best reflects the logical force.
- source_word: δεσπότης
  chosen: master
  alternatives:
  - lord
  - ruler
  lexicon: LSJ
  rationale: The term denotes one who has controlling authority. 'Master' fits the
    philosophical context of reason ruling passions without importing the stronger
    covenantal/theological associations of 'Lord.'
- source_word: τῶν παθῶν
  chosen: of the passions
  alternatives:
  - over the passions
  - of the sufferings
  - of the emotions
  lexicon: LSJ
  rationale: In 4 Maccabees, πάθη commonly refers to the passions or impulses that
    reason governs. 'Passions' is the established and contextually precise rendering
    in this philosophical-moral argument.
- source_word: ὁ εὐσεβὴς λογισμός
  chosen: godly reason
  alternatives:
  - pious reason
  - devout reasoning
  - reverent reason
  lexicon: LSJ
  rationale: The phrase is central to 4 Maccabees and refers to reason shaped by reverence
    toward God. 'Godly reason' is concise, readable, and preserves both the rational
    and religious dimensions better than the somewhat stiffer 'pious reason.'
