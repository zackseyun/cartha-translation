id: 4MA.6.35
reference: 4 Maccabees 6:35
source:
  edition: lxx-swete-1909
  text: εἰ καὶ γελοῖον. καὶ οὐ μόνον τῶν ἀλγηδόνων ἐπιδείκνυμι κεκρατηκέναι τὸν λογισμόν,
    ἀλλὰ καὶ τῶν ἡδονῶν κρατεῖν, μηδὲ αὐταῖς ὑπείκειν.
