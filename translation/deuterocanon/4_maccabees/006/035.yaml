translation:
  text: Even if it is ridiculous, I demonstrate not only that reason has gained mastery
    over pains, but also that it rules over pleasures and does not yield to them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰ καὶ γελοῖον
  chosen: Even if it is ridiculous
  alternatives:
  - Although it is laughable
  - Even if it seems absurd
  lexicon: LSJ
  rationale: The phrase is elliptical; γελοῖον can mean 'ridiculous' or 'laughable.'
    'Ridiculous' preserves the speaker's concessive acknowledgment without sounding
    flippant.
- source_word: ἀλγηδόνων
  chosen: pains
  alternatives:
  - sufferings
  - torments
  lexicon: LSJ
  rationale: The term denotes experiences of pain. 'Pains' is the most direct lexical
    match here; 'torments' would over-intensify beyond the word itself, though the
    context is martyrdom.
- source_word: ἐπιδείκνυμι
  chosen: I demonstrate
  alternatives:
  - I show
  - I prove
  lexicon: LSJ
  rationale: The verb carries the sense of showing or demonstrating publicly. 'Demonstrate'
    fits the rhetorical context of reason being exhibited in action.
- source_word: κεκρατηκέναι τὸν λογισμόν
  chosen: reason has gained mastery
  alternatives:
  - reason has prevailed
  - reason has controlled
  lexicon: LSJ
  rationale: The perfect infinitive of κρατέω indicates an achieved state of mastery.
    λογισμός in 4 Maccabees is a key term for rational judgment or reason; 'reason
    has gained mastery' preserves both the completed aspect and the philosophical
    emphasis.
- source_word: τὸν λογισμόν
  chosen: reason
  alternatives:
  - rational judgment
  - the rational mind
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a programmatic term for reason governing the
    passions. 'Reason' is concise and idiomatic, while still reflecting the book's
    philosophical vocabulary.
- source_word: τῶν ἡδονῶν κρατεῖν
  chosen: it rules over pleasures
  alternatives:
  - it masters pleasures
  - it controls pleasures
  lexicon: LSJ
  rationale: κρατέω again conveys mastery or rule. Rendering the second clause with
    'rules over' avoids awkward repetition while preserving the same semantic force.
- source_word: μηδὲ αὐταῖς ὑπείκειν
  chosen: and does not yield to them
  alternatives:
  - nor does it give way to them
  - and does not submit to them
  lexicon: LSJ
  rationale: ὑπείκω means to give way or yield. 'Does not yield to them' is natural
    English and preserves the image of steadfast resistance to pleasures.
