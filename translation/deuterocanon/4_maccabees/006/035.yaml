theological_decisions:
- issue: Rendering λογισμός in a philosophically charged martyrdom context
  chosen_reading: reason
  alternative_readings:
  - rational judgment
  - the rational mind
  rationale: The book argues for devout reason's mastery over passions. 'Reason' best
    preserves the conceptual force without importing later technical philosophical
    jargon beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Whether to intensify ἀλγηδόνων in light of the torture context
  chosen_reading: pains
  alternative_readings:
  - torments
  - sufferings
  rationale: The immediate context involves severe suffering, but the noun itself
    is more basically 'pains.' The translation avoids importing extra intensity not
    explicitly carried by the word.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
