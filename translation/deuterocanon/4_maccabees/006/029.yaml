translation:
  text: Make my blood their purification, and take my life in exchange for theirs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Make my blood their cleansing.' The Greek καθαρσόν can denote purification/cleansing
      in a cultic sense.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'take my life as an exchange for theirs'; the phrase expresses
      substitution of life for life. 'As a ransom for theirs' is a possible but more
      interpretive rendering.
    reason: alternative_reading
lexical_decisions:
- source_word: καθαρσόν
  chosen: purification
  alternatives:
  - cleansing
  - atonement
  lexicon: LSJ
  rationale: 'The adjective/noun form here functions predicatively with ποίησον: ''make
    my blood a purification for them.'' ''Purification'' preserves the cultic-cleansing
    sense without over-specifying a later technical doctrine. ''Atonement'' is possible
    in context but is more interpretive; ''cleansing'' is slightly less weighty than
    the sacrificial setting suggests.'
- source_word: αἷμα
  chosen: blood
  lexicon: LSJ
  rationale: Literal 'blood' is required; the verse explicitly presents the speaker's
    death in sacrificial/substitutionary terms.
- source_word: ἀντίψυχον
  chosen: in exchange for
  alternatives:
  - as a ransom for
  - as a substitute for
  lexicon: LSJ
  rationale: The compound conveys exchange/substitution of life for life. 'In exchange
    for' is natural English and preserves the reciprocal force without importing the
    fuller commercial nuance of 'ransom' unless context demands it. The substitutionary
    sense is retained by the phrase as a whole.
- source_word: ψυχήν
  chosen: life
  alternatives:
  - soul
  lexicon: LSJ
  rationale: In this martyrdom context ψυχή refers to the speaker's life being surrendered,
    not primarily the immaterial soul. 'Life' is clearer modern English and fits the
    parallel with blood and exchange.
- source_word: λάβε
  chosen: take
  alternatives:
  - receive
  lexicon: LSJ
  rationale: '''Take'' is the direct and natural rendering of the imperative here,
    matching the sacrificial plea addressed to God.'
