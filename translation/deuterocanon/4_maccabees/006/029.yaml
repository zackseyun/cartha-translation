id: 4MA.6.29
reference: 4 Maccabees 6:29
source:
  edition: lxx-swete-1909
  text: καθαρσὸν αὐτῶν ποίησον τὸ ἐμὸν αἷμα, καὶ ἀντίψυχον αὐτῶν λάβε τὴν ἐμὴν ψυχήν.
  language: Greek
