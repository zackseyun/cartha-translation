theological_decisions:
- issue: Sacrificial/substitutionary language in the martyr's prayer
  chosen_reading: Retain explicit purification and exchange language without softening
    it
  alternative_readings:
  - Make my blood their cleansing, and receive my soul as a substitute for them
  - Let my blood bring atonement for them, and take my life as their ransom
  rationale: The Greek plainly uses cultic and substitutionary language. The translation
    should preserve that theological tension without either muting it or systematizing
    it into later doctrinal categories beyond what the text itself states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
