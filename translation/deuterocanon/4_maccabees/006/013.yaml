  text: τὰ δὲ ἐν συμπαθείᾳ τῆς συνηθείας ὄντες, τὰ δὲ ἐν θαυμαστῷ τῆς καρτερίας προσίοντες
    αὐτῷ τινες τῶν τοῦ βασιλέως ἔλεγον
