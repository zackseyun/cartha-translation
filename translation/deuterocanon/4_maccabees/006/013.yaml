translation:
  text: Some of the king’s men, being moved by sympathy because of their long acquaintance
    with him, and others approaching him in admiration of his endurance, were saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of familiarity with him.' The Greek τῆς συνηθείας can denote
      long-standing association or familiarity.
    reason: lexical_alternative
  - marker: b
    text: Or 'in wonder at his steadfastness.' The Greek καρτερία carries the sense
      of endurance or steadfast perseverance under trial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν συμπαθείᾳ
  chosen: being moved by sympathy
  alternatives:
  - with sympathy
  - in sympathy
  - out of compassion
  lexicon: LSJ
  rationale: The prepositional phrase expresses the manner or emotional state in which
    they were acting. 'Being moved by sympathy' makes the participial relation natural
    in English while preserving the affective sense of συμπάθεια.
- source_word: τῆς συνηθείας
  chosen: because of their long acquaintance with him
  alternatives:
  - because of familiarity
  - because of habitual association
  - because of friendship
  lexicon: LSJ
  rationale: συνήθεια denotes familiarity or long association/custom. In context it
    explains why some felt sympathy toward him. 'Long acquaintance with him' captures
    relational familiarity without overstating it as intimate friendship.
- source_word: ἐν θαυμαστῷ τῆς καρτερίας
  chosen: in admiration of his endurance
  alternatives:
  - with wonder at his steadfastness
  - in amazement at his perseverance
  lexicon: LSJ
  rationale: The phrase indicates the attitude of others as they approached. καρτερία
    is endurance/steadfastness under suffering. 'Admiration of his endurance' is idiomatic
    and preserves the commendatory force.
- source_word: προσίοντες αὐτῷ
  chosen: approaching him
  alternatives:
  - coming up to him
  - drawing near to him
  lexicon: LSJ
  rationale: A straightforward participial action; 'approaching him' is clear modern
    English and keeps the physical movement toward Eleazar.
- source_word: τινες τῶν τοῦ βασιλέως
  chosen: some of the king’s men
  alternatives:
  - some of those belonging to the king
  - some of the king’s attendants
  - some of the king’s people
  lexicon: LSJ
  rationale: The genitival expression refers to persons attached to the king's service
    or entourage. 'The king’s men' is concise and natural, without over-specifying
    an official rank.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: LSJ
  rationale: The imperfect suggests ongoing or repeated speech, and 'were saying'
    preserves that aspect while fitting the narrative flow into the following verse.
