translation:
  text: And first they stripped the old man of the noble bearing with which he was
    adorned in regard to godliness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''piety'': ''the seemly grace associated with piety.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: πρῶτον μὲν
  chosen: And first
  alternatives:
  - First of all
  - And to begin with
  lexicon: LSJ
  rationale: Marks the first step in a sequence of abuses; 'And first' preserves the
    connective καὶ and the sequential force of the phrase without sounding overly
    stiff.
- source_word: περιέδυσαν
  chosen: they stripped
  alternatives:
  - they undressed
  - they stripped off
  lexicon: LSJ
  rationale: The verb means to strip off clothing from someone. 'They stripped' is
    idiomatic and preserves the humiliating action directed at the elderly man.
- source_word: τὸν γεραιὸν
  chosen: the old man
  alternatives:
  - the aged man
  - the elderly man
  lexicon: LSJ
  rationale: γεραιός denotes an old or aged person. 'The old man' is the most direct
    rendering, though respectful context is maintained by the surrounding phrasing.
- source_word: ἐκκεκοσμημένον
  chosen: adorned
  alternatives:
  - arrayed
  - decked out
  - ornamented
  lexicon: LSJ
  rationale: The participle conveys being furnished or adorned. 'Adorned' works naturally
    with the metaphorical object that follows and preserves the elevated tone.
- source_word: τὴν περὶ τὴν εὐσέβειαν εὐσχημοσύνην
  chosen: the noble bearing with which he was adorned in regard to godliness
  alternatives:
  - the dignity concerning godliness
  - the seemly grace of piety
  - the decorousness associated with godliness
  lexicon: LSJ
  rationale: εὐσχημοσύνη denotes propriety, gracefulness, or noble/comely bearing.
    The phrase περὶ τὴν εὐσέβειαν qualifies this quality as related to piety/godliness.
    The Greek is somewhat compressed, so the English expands slightly to make clear
    that what was stripped was his clothing, thereby removing the outward expression
    of his dignified piety.
- source_word: εὐσέβειαν
  chosen: godliness
  alternatives:
  - piety
  - reverence
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees is a key virtue denoting devout fidelity to God
    and the law. 'Godliness' is accessible modern English and preserves the theological
    weight; 'piety' remains a viable alternative but can sound narrower or more formal.
