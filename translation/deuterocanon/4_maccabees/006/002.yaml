  rationale: In this book εὐσέβεια is a central theological and ethical category.
    'Godliness' communicates devotion to God in readable modern English while avoiding
    an overly technical or archaic feel. 'Piety' is preserved as an alternative because
    it is traditional and contextually plausible.
