translation:
  text: “Obey the king’s commands,” another herald cried out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from another side a herald crying out.' The Greek highlights
      that the call came from another quarter, likely from a different herald.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πείσθητι
  chosen: Obey
  alternatives:
  - Be persuaded
  - Submit
  lexicon: LSJ
  rationale: Aorist passive imperative of πείθω can mean 'be persuaded' in form, but
    in this context of compliance with royal decrees it functions idiomatically as
    an exhortation to obey or submit. 'Obey' gives the natural English sense without
    over-paraphrase.
- source_word: ταῖς ... ἐντολαῖς
  chosen: the ... commands
  alternatives:
  - orders
  - injunctions
  lexicon: LSJ
  rationale: ἐντολαί are authoritative directives. 'Commands' preserves the force
    of royal authority better than the softer 'instructions.'
- source_word: τοῦ βασιλέως
  chosen: the king’s
  alternatives:
  - of the king
  - royal
  lexicon: LSJ
  rationale: Simple possessive English best reflects the genitive construction and
    keeps the sentence natural.
- source_word: ἑτέρωθεν
  chosen: another
  alternatives:
  - from another place
  - from another side
  lexicon: LSJ
  rationale: Adverbially the word means 'from another quarter/side.' In context with
    κῆρυκος it indicates that a different herald was calling out. English expresses
    this most clearly as 'another herald,' rather than preserving the spatial idiom
    woodenly.
- source_word: κῆρυκος
  chosen: herald
  alternatives:
  - messenger
  - public crier
  lexicon: LSJ
  rationale: κῆρυξ is specifically a herald or official announcer. 'Herald' is the
    most precise and concise rendering.
- source_word: ἐπιβοῶντος
  chosen: shouted out
  alternatives:
  - crying out
  - calling out
  lexicon: LSJ
  rationale: The participle denotes loud public proclamation. 'Shouted out' conveys
    the volume and urgency of the herald's speech in idiomatic modern English.
