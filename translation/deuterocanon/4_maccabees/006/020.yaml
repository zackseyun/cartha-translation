id: 4MA.6.20
reference: 4 Maccabees 6:20
source:
  edition: lxx-swete-1909
  text: αἰσχρὸν γὰρ εἰ ἐπιβιώσομεν ὀλίγον χρόνον, καὶ τοῦτον καταγελώμενοι πρὸς ἀπάντων
    ἐπὶ δειλίᾳ.
  language: Greek
  pages:
  - 752
