translation:
  text: For it would be shameful if we should live on for a little while, and that
    while being mocked by everyone for cowardice.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αἰσχρόν
  chosen: shameful
  alternatives:
  - disgraceful
  - base
  lexicon: LSJ
  rationale: Conveys moral disgrace and dishonor in clear modern English. 'Shameful'
    fits the speaker's concern for honor without sounding archaic.
- source_word: ἐπιβιώσομεν
  chosen: we should live on
  alternatives:
  - we survive
  - we continue to live
  lexicon: LSJ
  rationale: The compound verb suggests continuing life beyond the present threat.
    'Live on' captures survival/continued existence naturally in English.
- source_word: ὀλίγον χρόνον
  chosen: for a little while
  alternatives:
  - for a short time
  - a little time
  lexicon: LSJ
  rationale: Idiomatic rendering of the accusative of duration; preserves the brevity
    emphasized in the Greek.
- source_word: καταγελώμενοι
  chosen: being mocked
  alternatives:
  - being laughed at
  - being ridiculed
  lexicon: LSJ
  rationale: A present passive participle indicating ongoing public derision. 'Being
    mocked' is concise and preserves the shame dynamic.
- source_word: πρὸς ἀπάντων
  chosen: by everyone
  alternatives:
  - by all
  - by everyone around us
  lexicon: LSJ
  rationale: The phrase indicates universal social scorn. 'By everyone' is natural
    English and keeps the breadth of the reproach.
- source_word: ἐπὶ δειλίᾳ
  chosen: for cowardice
  alternatives:
  - on account of cowardice
  - for timidity
  lexicon: LSJ
  rationale: Expresses the ground or cause of the mockery. 'Cowardice' best matches
    the moral force of δειλία in this martyrdom context.
