theological_decisions:
- issue: Rendering εὐσέβεια in a martyrdom context
  chosen_reading: godliness
  alternative_readings:
  - piety
  - reverence toward God
  rationale: The verse commends death in defense of faithful devotion to God. 'Godliness'
    communicates the religious and ethical dimension in contemporary English without
    importing later technical theology. 'Piety' remains a viable alternative but is
    less natural for the target readership.
