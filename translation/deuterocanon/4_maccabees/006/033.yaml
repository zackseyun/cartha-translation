id: 4MA.6.33
reference: 4 Maccabees 6:33
source:
  edition: lxx-swete-1909
  text: νυνὶ δὲ τοῦ λογισμοῦ τὰ πάθη νικήσαντος, αὐτῷ προσηκόντως τὴν τῆς ἡγεμονίας
    προσνέμομεν ἐξουσίαν.
  language: Greek
  pages:
  - 752
  - 760
  - 761
  - 762
  - 763
  - 764
  - 765
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: But now, since reason has conquered the passions, we rightly assign to it
    the authority of leadership.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rational judgment has overcome the passions.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'we assign to it the authority of leadership/rule.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δέ
  chosen: But now
  alternatives:
  - Now
  - And now
  lexicon: LSJ
  rationale: Marks a transition with mild contrast; 'But now' preserves the argumentative
    turn better than a bare 'Now.'
- source_word: λογισμοῦ
  chosen: reason
  alternatives:
  - rational judgment
  - reasoning
  - the faculty of reason
  lexicon: LSJ
  rationale: In 4 Maccabees, λογισμός is a key term for rational moral judgment governing
    the passions. 'Reason' is concise and idiomatic while preserving the philosophical
    sense.
- source_word: τὰ πάθη
  chosen: the passions
  alternatives:
  - the sufferings
  - the emotions
  - the passions/desires
  lexicon: LSJ
  rationale: In this book πάθη commonly refers to the passions or irrational impulses,
    not sufferings. 'The passions' best fits the ethical-philosophical contrast with
    λογισμός.
- source_word: νικήσαντος
  chosen: has conquered
  alternatives:
  - having conquered
  - has overcome
  - having prevailed over
  lexicon: LSJ
  rationale: Aorist participle dependent on the genitive absolute-like construction
    with τοῦ λογισμοῦ; rendered with an English perfect-like clause ('since reason
    has conquered') for natural flow while retaining completed victory.
- source_word: αὐτῷ
  chosen: to it
  alternatives:
  - to reason
  - to him
  lexicon: LSJ
  rationale: Refers back to λογισμός. English pronoun 'it' matches the abstract noun
    'reason' and avoids personifying beyond the Greek's rhetorical usage.
- source_word: προσηκόντως
  chosen: rightly
  alternatives:
  - appropriately
  - fittingly
  - as is proper
  lexicon: LSJ
  rationale: Conveys propriety or fittingness. 'Rightly' is compact and natural in
    English while preserving the evaluative force.
- source_word: τὴν τῆς ἡγεμονίας ... ἐξουσίαν
  chosen: the authority of leadership
  alternatives:
  - the authority of rule
  - the power of command
  - the right to govern
  lexicon: LSJ
  rationale: ἡγεμονία denotes leadership/rule, and ἐξουσία denotes authority/right.
    'The authority of leadership' preserves both elements without sounding overly
    technical.
- source_word: προσνέμομεν
  chosen: we assign
  alternatives:
  - we award
  - we attribute
  - we grant
  lexicon: LSJ
  rationale: The verb means to assign or apportion. 'Assign' fits the formal evaluative
    context of granting reason its proper governing status.
