theological_decisions:
- issue: Anthropological-philosophical framing of λογισμός and πάθη
  chosen_reading: Render λογισμός as 'reason' and πάθη as 'the passions'
  alternative_readings:
  - Render λογισμός as 'rational judgment'
  - Render πάθη as 'emotions' or 'sufferings'
  rationale: The verse reflects 4 Maccabees' central thesis that disciplined reason
    rules over irrational passions. Using 'reason' and 'the passions' preserves that
    conceptual framework without importing later theological categories.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
