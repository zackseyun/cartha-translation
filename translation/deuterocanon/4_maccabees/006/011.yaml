  text: ἱδρῶν γέ τοι τὸ πρόσωπον, καὶ ἐπασθμαίνων σφοδρῶς, καὶ ὑπʼ αὐτῶν τῶν βασανιζόντων
    ἐθαυμάζετο ἐπὶ τῇ εὐψυχίᾳ.
