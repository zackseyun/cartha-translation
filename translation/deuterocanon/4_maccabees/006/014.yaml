reference: 4 Maccabees 6:14
source:
  edition: lxx-swete-1909
  text: Τί τοῖς κακοῖς τούτοις σεαυτὸν ἀλογίστως ἀπόλλυες, Ἐλεάζαρ;
  language: Greek
