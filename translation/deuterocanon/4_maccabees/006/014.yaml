theological_decisions:
- issue: Interpretation of κακοῖς in context of Eleazar's martyrdom
  chosen_reading: Rendered broadly as 'evils' rather than more interpretive 'tortures.'
  alternative_readings:
  - tortures
  - sufferings
  - punishments
  rationale: The Greek noun is broader than a single technical term for torture. Since
    the speaker is referring to the painful treatment Eleazar is enduring, 'evils'
    keeps the source wording visible while still making sense in context. More specific
    contextual alternatives are preserved as lexical possibilities rather than imported
    into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source warrants.'
