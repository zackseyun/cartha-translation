theological_decisions:
- issue: Rendering λογισμός in a philosophically charged context
  chosen_reading: reasoning
  alternative_readings:
  - reason
  - rational judgment
  rationale: 4 Maccabees emphasizes the rule of reason over passions. 'Reasoning'
    preserves the conceptual field without making the line sound overly abstract in
    English. The choice avoids importing later technical philosophical terminology
    while retaining the book's moral-psychological emphasis.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
- issue: Rendering ἀνήρ with explicit masculine reference
  chosen_reading: man
  alternative_readings:
  - person
  rationale: The Greek uses ἀνήρ, an adult male term, not a generic human noun. 'Man'
    therefore best matches the source and follows the gender-accurate policy.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
