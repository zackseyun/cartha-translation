  text: καὶ ταῦτα εἰπὼν ὁ ἱερὸς ἀνὴρ εὐγενῶς ταῖς βασάνοις ἐναντεθάνει, καὶ μέχρι
    τῶν θανάτου βασάνων ἀντέστη τῷ λογισμῷ διὰ τὸν νόμον.
