translation:
  text: And though he was falling to the ground because his body could not bear the
    pains, he kept his reason upright and unbending.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his rational judgment' for 'his reason'; the Greek term carries a philosophical
      sense of reasoned moral judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίπτων
  chosen: though he was falling
  alternatives:
  - falling
  - as he fell
  lexicon: LSJ
  rationale: 'Present participle conveying ongoing action concurrent with the main
    clause. ''Though he was falling'' brings out the concessive force in context:
    physical collapse contrasted with mental steadfastness.'
- source_word: ἔδαφος
  chosen: the ground
  alternatives:
  - the floor
  - the earth
  lexicon: LSJ
  rationale: Refers to the surface onto which he falls. 'Ground' is the most natural
    English equivalent in this torture scene.
- source_word: ἀπὸ τοῦ μὴ φέρειν
  chosen: because ... could not bear
  alternatives:
  - from not bearing
  - since ... was unable to endure
  lexicon: LSJ
  rationale: The construction gives the cause of his falling. Rendering it causally
    in idiomatic English best reflects the Greek syntax.
- source_word: τὸ σῶμα
  chosen: his body
  alternatives:
  - the body
  lexicon: LSJ
  rationale: Although the Greek has the article, English idiom in context naturally
    uses the possessive, since it is clearly his own body that cannot endure the pain.
- source_word: τὰς ἀλγηδόνας
  chosen: the pains
  alternatives:
  - the agonies
  - the sufferings
  lexicon: LSJ
  rationale: Denotes severe bodily pain. 'Pains' is direct and readable; 'agonies'
    is possible but slightly more interpretive and heightened.
- source_word: ὀρθὸν εἶχεν
  chosen: he kept ... upright
  alternatives:
  - he held ... straight
  - he maintained ... erect
  lexicon: LSJ
  rationale: The idiom means to maintain in an upright state. 'Kept ... upright' preserves
    the metaphor of moral/intellectual steadfastness in clear English.
- source_word: ἀκλινῆ
  chosen: unbending
  alternatives:
  - unyielding
  - unwavering
  lexicon: LSJ
  rationale: Literally 'not inclining/leaning,' here metaphorical for not giving way
    under pressure. 'Unbending' pairs well with 'upright' and preserves the physical
    metaphor applied to reason.
- source_word: τὸν λογισμόν
  chosen: his reason
  alternatives:
  - his mind
  - his rational judgment
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for rational faculty/reasoned judgment
    governing the passions. 'Reason' is concise and preserves the book's philosophical
    emphasis better than the broader 'mind'.
