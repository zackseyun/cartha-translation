  text: καὶ πίπτων εἰς τὸ ἔδαφος, ἀπὸ τοῦ μὴ φέρειν τὸ σῶμα τὰς ἀλγηδόνας, ὀρθὸν εἶχεν
    καὶ ἀκλινῆ τὸν λογισμόν.
