theological_decisions:
- issue: Rendering λογισμός in a philosophically charged context
  chosen_reading: reason
  alternative_readings:
  - mind
  - rational judgment
  rationale: 4 Maccabees emphasizes the mastery of pious reason over bodily suffering
    and passions. 'Reason' best preserves that thematic and conceptual weight without
    overexpanding the phrase.
