id: 4MA.6.24
reference: 4 Maccabees 6:24
source:
  edition: lxx-swete-1909
  text: Πρὸς τὰς ἀνάγκας οὕτως μεγαλοφρονοῦντα αὐτὸν ἰδόντες, καὶ μηδὲ πρὸς τὸν οἰκτιρμὸν
    αὐτῶν μεταβαλλόμενον, ἐπὶ τὸ πῦρ αὐτὸν ἦγον.
  language: Greek
  pages:
  - 752
  - 760
  - 761
  - 762
  - 763
  - 764
  - 765
  - 786
  - 787
  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: When they saw that he was so noble-minded in the face of these compulsions,
    and that he was not even changing toward pity for them, they led him to the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'constraints' or 'pressures' for 'compulsions' (ἀνάγκας). The Greek refers
      to coercive pressures brought to bear on him, not ordinary necessities.
    reason: lexical_alternative
  - marker: b
    text: '''Noble-minded'' renders μεγαλoφρονοῦντα, a term for greatness of spirit
      or magnanimity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρὸς
  chosen: in the face of
  alternatives:
  - toward
  - with respect to
  - against
  lexicon: LSJ
  rationale: With τὰς ἀνάγκας, πρός expresses relation to the pressures/constraints
    confronting him. 'In the face of' captures the adversative situational force in
    natural English better than a bare 'toward'.
- source_word: ἀνάγκας
  chosen: compulsions
  alternatives:
  - necessities
  - pressures
  - constraints
  lexicon: LSJ
  rationale: In this martyrdom context the word refers not to ordinary needs but to
    coercive pressures imposed on him. 'Compulsions' preserves the sense of external
    force more clearly than 'necessities'.
- source_word: μεγαλοφρονοῦντα
  chosen: was so noble-minded
  alternatives:
  - was high-minded
  - was magnanimous
  - was courageous
  lexicon: LSJ
  rationale: The participle denotes greatness of spirit or nobility of mind. 'Noble-minded'
    preserves the mental-ethical nuance better than the more generic 'courageous'.
- source_word: ἰδόντες
  chosen: they saw
  alternatives:
  - seeing
  - when they saw
  lexicon: LSJ
  rationale: Although formally a participle, in English the temporal sense is best
    conveyed as 'when they saw'/'they saw' introducing the main action.
- source_word: μηδὲ
  chosen: not even
  alternatives:
  - and not
  - nor
  lexicon: LSJ
  rationale: μηδέ intensifies the negation here. 'Not even' reflects the emphatic
    force.
- source_word: οἰκτιρμὸν
  chosen: pity
  alternatives:
  - compassion
  - mercy
  lexicon: LSJ
  rationale: The noun denotes compassionate feeling. 'Pity' fits the immediate emotional
    sense in context and works idiomatically with 'for them.'
- source_word: μεταβαλλόμενον
  chosen: changing
  alternatives:
  - turning
  - being swayed
  - altering his attitude
  lexicon: LSJ
  rationale: The middle/passive participle indicates a change of disposition. 'Changing'
    is kept in the main text, with the fuller sense supplied by the surrounding phrase
    'toward pity for them.'
- source_word: ἐπὶ τὸ πῦρ
  chosen: to the fire
  alternatives:
  - into the fire
  - toward the fire
  lexicon: LSJ
  rationale: The phrase can denote movement toward the place/instrument of execution.
    'To the fire' is the most straightforward rendering without over-specifying whether
    he was immediately cast in.
- source_word: ἦγον
  chosen: they led him
  alternatives:
  - they brought him
  - they took him
  lexicon: LSJ
  rationale: ἄγω commonly means to lead or bring. 'Led' fits the custodial, coercive
    setting.
