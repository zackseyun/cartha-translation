id: 4MA.6.21
reference: 4 Maccabees 6:21
source:
  edition: lxx-swete-1909
  text: καὶ ὑπὸ μὲν τοῦ τυράννου καταφρονηθῶμεν ὡς ἄνανδροι, τὸν δὲ θεῖον ἡμῶν νόμον
    μέχρι θανάτου μὴ προασπίσαιμεν.
  language: Greek
  pages:
