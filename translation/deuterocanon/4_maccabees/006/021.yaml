theological_decisions:
- issue: Rendering the gendered insult ἄνανδροι
  chosen_reading: unmanly
  alternative_readings:
  - cowardly
  rationale: The verse's rhetoric depends on a specifically gendered accusation of
    lacking manly courage. Following the project's gender-accurate principle, the
    main text preserves that form rather than neutralizing it. The semantic alternative
    'cowardly' is worth preserving as a footnote because it may communicate the sense
    more directly in modern English.
