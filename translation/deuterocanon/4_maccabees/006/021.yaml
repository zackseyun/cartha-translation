translation:
  text: and shall we be despised by the tyrant as unmanly, yet not defend our divine
    law even to death?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cowardly.' The Greek term is literally gendered ('unmanly') and denotes
      lack of courage.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταφρονηθῶμεν
  chosen: be despised
  alternatives:
  - be scorned
  - be treated with contempt
  lexicon: BDAG
  rationale: The passive subjunctive conveys being regarded with contempt. 'Be despised'
    is natural English and preserves the shame/honor force without overexpansion.
- source_word: τύραννος
  chosen: tyrant
  alternatives:
  - king
  - ruler
  lexicon: LSJ
  rationale: The Greek specifically denotes a cruel autocratic ruler, not a neutral
    monarch. 'Tyrant' preserves the moral evaluation present in the term and common
    in 4 Maccabees.
- source_word: ἄνανδροι
  chosen: unmanly
  alternatives:
  - cowardly
  - like men without courage
  lexicon: LSJ
  rationale: Literally 'without manliness/courage.' Because the term is gendered in
    Greek and refers to lack of courage, 'unmanly' best preserves the source's rhetoric.
    'Cowardly' captures sense but loses the gender-accurate form; the doctrine prefers
    gender-accurate renderings where the source is masculine.
- source_word: θεῖον
  chosen: divine
  alternatives:
  - godly
  - from God
  lexicon: LSJ
  rationale: The adjective qualifies 'law' as belonging to or characterized by God.
    'Divine' is concise and idiomatic in English.
- source_word: νόμον
  chosen: law
  alternatives:
  - instruction
  lexicon: LSJ
  rationale: In this Jewish context νόμος refers to the ancestral/divine law. 'Law'
    is the standard and clearest rendering.
- source_word: μέχρι θανάτου
  chosen: even to death
  alternatives:
  - unto death
  - to the point of death
  lexicon: BDAG
  rationale: The phrase expresses endurance up to death. 'Even to death' is idiomatic
    and preserves the extremity of commitment.
- source_word: προασπίσαιμεν
  chosen: defend
  alternatives:
  - protect
  - champion
  lexicon: LSJ
  rationale: The verb means to hold before as a shield, hence to defend or protect.
    'Defend' best fits the metaphorical context of standing up for the law under persecution.
