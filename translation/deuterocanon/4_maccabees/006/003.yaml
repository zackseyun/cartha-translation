translation:
  text: Then, after pinning his arms back on both sides, they were torturing him with
    whips,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after binding him by the elbows on both sides.' The Greek participle
      περιαγκωνίσαντες is rare and likely refers to restraining or wrenching the arms/elbows
      from both sides before the whipping.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπειτα
  chosen: Then
  alternatives:
  - After that
  - Next
  lexicon: LSJ
  rationale: Sequential adverb marking the next stage in the torture narrative; 'Then'
    is natural modern English and preserves the progression.
- source_word: περιαγκωνίσαντες
  chosen: after pinning his arms back on both sides
  alternatives:
  - after binding him by the elbows on both sides
  - after wrenching his arms back from both sides
  lexicon: LSJ
  rationale: Aorist participle from a rare verb built on ἀγκών ('elbow/arm'), indicating
    restraint or twisting of the arms/elbows from both sides. 'Pinning his arms back
    on both sides' conveys the physical action in readable English without overclaiming
    a more technical method of binding than the Greek itself states.
- source_word: ἑκατέρωθεν
  chosen: on both sides
  alternatives:
  - from both sides
  - on either side
  lexicon: LSJ
  rationale: Adverb indicating action from each side. With the participle it clarifies
    that the restraint was applied bilaterally; 'on both sides' reads smoothly in
    English.
- source_word: μάστιξιν
  chosen: with whips
  alternatives:
  - with scourges
  - with lashes
  lexicon: LSJ
  rationale: Instrumental dative plural of μάστιξ. 'Whips' is the clearest accessible
    rendering; 'scourges' is possible but more archaic and less immediately transparent.
- source_word: κατήκιζον
  chosen: they were torturing him
  alternatives:
  - they were tormenting him
  - they were maltreating him
  lexicon: LSJ
  rationale: Imperfect verb expressing ongoing abusive treatment. Given the immediate
    instrument 'with whips,' 'they were torturing him' best captures the severity
    and durative force without reducing it to mere beating.
