theological_decisions:
- issue: Characterization of Eleazar's endurance under torture
  chosen_reading: The verse is rendered as a simile describing Eleazar's detachment
    and steadfastness under torture, not as a literal dream-state.
  alternative_readings:
  - The phrase could be taken more loosely as 'as if it were a dream' emphasizing
    unreality rather than detachment.
  rationale: ὥσπερ ἐν ὀνείρῳ modifies the experience of torture figuratively. The
    translation preserves the rhetorical image without importing a philosophical claim
    beyond the text.
