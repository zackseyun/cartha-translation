id: 4MA.6.15
reference: 4 Maccabees 6:15
source:
  edition: lxx-swete-1909
  text: ἡμεῖς μὲν τῶν ἡψημένων βρωμάτων παραθήσομεν· σὺ δὲ ὑποκρινόμενος τῶν ὑείων
    ἀπογεύσασθαι, σώθητι.
  language: Greek
