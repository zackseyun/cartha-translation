theological_decisions:
- issue: Rendering of prohibited pig flesh in a Jewish martyrdom context
  chosen_reading: pork
  alternative_readings:
  - swine's flesh
  rationale: The verse's moral pressure depends on the Jewish prohibition against
    eating pig flesh. 'Pork' communicates the substance plainly in contemporary English
    without softening the issue.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Force of σώθητι
  chosen_reading: save yourself
  alternative_readings:
  - be saved
  rationale: The context is immediate physical survival, not an imported theological
    notion of salvation. The rendering avoids doctrinal overtones the Greek here does
    not require.
  doctrine_reference: Translation philosophy §§1, 3, 6
