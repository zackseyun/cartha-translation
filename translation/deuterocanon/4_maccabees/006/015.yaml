translation:
  text: We will set out some roasted foods, but you, by pretending to taste pork,
    save yourself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'swine's flesh.' The Greek refers specifically to food from a pig.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡψημένων
  chosen: roasted
  alternatives:
  - cooked
  - broiled
  lexicon: LSJ
  rationale: From ἕψω/related culinary usage, referring to food prepared by cooking;
    'roasted' fits the immediate scene of prepared meats/foods and keeps the concrete
    culinary sense better than the broader 'cooked'.
- source_word: βρωμάτων
  chosen: foods
  alternatives:
  - meats
  - things to eat
  lexicon: LSJ
  rationale: βρῶμα can mean food generally, not only meat. 'Foods' preserves the broader
    term, while the context already implies edible items being set before him.
- source_word: παραθήσομεν
  chosen: we will set out
  alternatives:
  - we will place before you
  - we will serve
  lexicon: LSJ
  rationale: Future of παρατίθημι in a meal context means to place or set before someone.
    'Set out' is natural modern English and retains the concrete action.
- source_word: ὑποκρινόμενος
  chosen: by pretending
  alternatives:
  - feigning
  - acting as if
  lexicon: LSJ
  rationale: The participle denotes dissembling or pretending. 'By pretending' clearly
    conveys the means by which the addressee is urged to act.
- source_word: τῶν ὑείων
  chosen: pork
  alternatives:
  - swine's flesh
  - pig meat
  lexicon: LSJ
  rationale: The phrase refers to pig-derived food. 'Pork' is idiomatic modern English
    and avoids archaic phrasing while preserving the dietary-law issue.
- source_word: ἀπογεύσασθαι
  chosen: to taste
  alternatives:
  - to partake of
  - to sample
  lexicon: LSJ
  rationale: The aorist middle infinitive means to taste or sample. 'Taste' is the
    most direct and natural rendering.
- source_word: σώθητι
  chosen: save yourself
  alternatives:
  - be saved
  - escape with your life
  lexicon: LSJ
  rationale: Aorist passive imperative of σῴζω can function idiomatically as an urgent
    appeal for self-preservation. 'Save yourself' best captures the direct exhortation
    in context.
