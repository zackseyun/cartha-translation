theological_decisions:
- issue: Philosophical-anthropological force of λογισμός in 4 Maccabees
  chosen_reading: reason is sovereign
  alternative_readings:
  - reason has mastery
  - rational judgment is dominant
  rationale: The verse argues for the governing power of reason over suffering. 'Is
    sovereign' expresses the predicative force of τὸ κράτος εἶναι τοῦ λογισμοῦ in
    idiomatic English without importing later theological categories.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning over tradition'
