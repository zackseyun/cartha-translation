translation:
  text: And it is right for us to acknowledge that reason is sovereign, since it even
    prevails over outward pains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reason has mastery' or 'the power belongs to reason.' The Greek phrase
      emphasizes the ruling strength of reason.
    reason: lexical_alternative
  - marker: b
    text: Or 'external pains.' The expression refers to pains coming from outside
      the self, likely including bodily suffering.
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιόν
  chosen: it is right
  alternatives:
  - it is just
  - it is fitting
  lexicon: LSJ
  rationale: The impersonal expression δίκαιόν ἐστιν naturally means 'it is right/just.'
    'It is right' fits clear modern English while preserving the moral evaluative
    force.
- source_word: ὁμολογεῖν
  chosen: to acknowledge
  alternatives:
  - to confess
  - to admit
  - to agree
  lexicon: LSJ
  rationale: Here the sense is not confession of sin but open acknowledgment or affirmation
    of a conclusion. 'Acknowledge' best fits the argumentative context.
- source_word: τὸ κράτος
  chosen: is sovereign
  alternatives:
  - has power
  - has mastery
  - has dominion
  lexicon: LSJ
  rationale: κράτος denotes strength, might, or ruling power. Rendering the clause
    as 'reason is sovereign' communicates that reason possesses governing mastery,
    which suits the philosophical argument better than a flatter 'has power.'
- source_word: τοῦ λογισμοῦ
  chosen: reason
  alternatives:
  - rational judgment
  - reasoning
  - the rational mind
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for rational faculty/judgment.
    'Reason' is concise and idiomatic, while still carrying the philosophical weight
    of the term.
- source_word: ὅπου γε καὶ
  chosen: since it even
  alternatives:
  - inasmuch as even there
  - for indeed even where
  - because even
  lexicon: LSJ
  rationale: The phrase introduces supporting grounds with emphatic force. 'Since
    it even' captures both the causal connection and the emphasis of καὶ/γε in context.
- source_word: τῶν ἔξωθεν ἀλγηδόνων
  chosen: outward pains
  alternatives:
  - external pains
  - pains from outside
  - bodily pains
  lexicon: LSJ
  rationale: ἔξωθεν means 'from outside' or 'external,' and ἀλγηδόνες are pains. 'Outward
    pains' is readable and preserves the contrast with the inner rule of reason; 'bodily
    pains' would be interpretive beyond the wording.
- source_word: ἐπικρατεῖ
  chosen: prevails over
  alternatives:
  - masters
  - overcomes
  - has the upper hand over
  lexicon: LSJ
  rationale: ἐπικρατέω means to prevail over or gain mastery over. 'Prevails over'
    is natural English and keeps the image of superiority without over-dramatizing.
