id: 4MA.6.34
reference: 4 Maccabees 6:34
source:
  edition: lxx-swete-1909
  text: καὶ δίκαιόν ἐστιν ὁμολογεῖν ἡμᾶς τὸ κράτος εἶναι τοῦ λογισμοῦ, ὅπου γε καὶ
    τῶν ἔξωθεν ἀλγηδόνων ἐπικρατεῖ.
  language: Greek
