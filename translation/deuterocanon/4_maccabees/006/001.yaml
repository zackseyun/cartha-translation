id: 4MA.6.1
reference: 4 Maccabees 6:1
source:
  edition: lxx-swete-1909
  text: Τοῦτον τὸν τρόπον ἀντιρρητορεύσαντα ταῖς τοῦ τυράννου παρηγορίαις, παραστάντες
    οἱ δορυφόροι πικρῶς ἔσυραν ἐπὶ τὰ βασανιστήρια τὸν Ἐλεάζαρον.
  language: Greek
  pages:
