id: 4MA.6.19
reference: 4 Maccabees 6:19
source:
  edition: lxx-swete-1909
  text: καὶ αὐτοὶ μὲν ἡμεῖς γενοίμεθα τοῖς νέοις ἀσεβείας τύπος, ἵνα παράδειγμα γενώμεθα
    τῆς μιαροφαγίας.
  language: Greek
  pages:
  - 752
  - 760
  - 761
  - 762
  - 763
  - 764
  - 765
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: and we ourselves would become a pattern of ungodliness for the young, so that
    we might become an example of eating what is defiled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "an example of eating what is defiled" or "an example of unclean eating."
    reason: lexical_alternative
lexical_decisions:
- source_word: τύπος
  chosen: pattern
  alternatives:
  - example
  - model
  lexicon: LSJ
  rationale: τύπος can denote a pattern, model, or example. Here it is paired with
    παράδειγμα, so rendering it as "pattern" helps preserve the rhetorical distinction
    rather than flattening both terms into the same English word.
- source_word: ἀσεβείας
  chosen: ungodliness
  alternatives:
  - impiety
  - irreverence
  lexicon: LSJ
  rationale: The noun denotes impiety or irreverence toward God. "Ungodliness" is
    clear modern English and preserves the religious-moral force better than the more
    formal "impiety."
- source_word: τοῖς νέοις
  chosen: for the young
  alternatives:
  - to the young men
  - for the younger people
  lexicon: LSJ
  rationale: 'νέοι can mean young people or young men depending on context. The dative
    here is best taken as reference/advantage: a pattern "for the young." "The young"
    preserves the broad sense without over-specifying sex where the Greek does not
    require it.'
- source_word: παράδειγμα
  chosen: example
  alternatives:
  - warning example
  - model
  lexicon: LSJ
  rationale: παράδειγμα commonly means example or exemplar. Since τύπος is already
    rendered "pattern," "example" gives natural English while maintaining some lexical
    differentiation.
- source_word: μιαροφαγίας
  chosen: defiled eating
  alternatives:
  - polluted eating
  - unclean eating
  - eating what is defiled
  lexicon: LSJ
  rationale: A compound idea from μιαρός (defiled, polluted) and eating/food. In context
    it refers to consuming forbidden or polluted food. "Defiled eating" stays close
    to the Greek expression and avoids importing a more specific interpretation than
    the word itself states.
- source_word: γενοίμεθα / γενώμεθα
  chosen: would become / might become
  alternatives:
  - should become
  - become
  lexicon: LSJ
  rationale: The aorist subjunctives in this construction express potential result/purpose
    in a deliberative or hypothetical sense. English modal phrasing reflects the force
    better than a bare present.
