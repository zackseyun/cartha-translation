theological_decisions:
- issue: Moral-religious force of ἀσεβείας
  chosen_reading: ungodliness
  alternative_readings:
  - impiety
  rationale: The verse concerns not merely social impropriety but behavior contrary
    to reverence for God. "Ungodliness" communicates that theological dimension in
    accessible English.
  doctrine_reference: DOCTRINE.md § Translation philosophy 6
- issue: Specificity of μιαροφαγίας
  chosen_reading: defiled eating
  alternative_readings:
  - eating unclean food
  - polluted food consumption
  rationale: The context is refusal to violate the law by eating forbidden food, but
    the Greek term itself is somewhat broader than a fixed technical label. The translation
    preserves the text's wording without over-explication.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
