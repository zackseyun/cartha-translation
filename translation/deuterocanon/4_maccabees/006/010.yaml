id: 4MA.6.10
reference: 4 Maccabees 6:10
source:
  edition: lxx-swete-1909
  text: καὶ καθάπερ γενναῖος ἀθλητὴς τυπτόμενος ἐνίκα τοὺς βασανίζοντας ὁ γέρων.
  language: Greek
  pages:
  - 752
