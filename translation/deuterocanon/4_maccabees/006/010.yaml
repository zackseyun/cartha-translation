  - 788
  confidence: high
  validation: agree
translation:
  text: And like a noble athlete, though being beaten, the old man was defeating those
    who were torturing him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'just as a brave athlete, while being struck, kept overcoming his torturers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  chosen: like
  alternatives:
  - just as
  - even as
  lexicon: LSJ
  rationale: Introduces a comparison; 'like' is concise and natural in English while
    preserving the simile.
- source_word: γενναῖος
  chosen: noble
  alternatives:
  - brave
  - high-minded
  lexicon: LSJ
  rationale: Conveys both courage and moral nobility. 'Brave' is possible, but 'noble'
    better matches the elevated rhetorical tone of 4 Maccabees.
- source_word: ἀθλητής
  chosen: athlete
  alternatives:
  - contestant
  - champion
  lexicon: LSJ
  rationale: The literal image is athletic competition. 'Athlete' preserves the metaphor
    without importing interpretive expansion.
- source_word: τυπτόμενος
  chosen: though being beaten
  alternatives:
  - while being struck
  - as he was beaten
  lexicon: LSJ
  rationale: A present passive participle describing ongoing physical blows. 'Though
    being beaten' captures both the action and the concessive force implied by the
    contrast with his victory.
- source_word: ἐνίκα
  chosen: was defeating
  alternatives:
  - was conquering
  - kept overcoming
  lexicon: LSJ
  rationale: Imperfect tense suggests ongoing or repeated triumph during the ordeal.
    'Was defeating' preserves the durative sense and the contest imagery.
- source_word: τοὺς βασανίζοντας
  chosen: those who were torturing him
  alternatives:
  - his torturers
  - those tormenting him
  lexicon: LSJ
  rationale: βασανίζω here refers to inflicting torture in the martyrdom context.
    The participle with article is rendered explicitly as a personal group, and 'him'
    is supplied from context for clear English.
- source_word: ὁ γέρων
  chosen: the old man
  alternatives:
  - the elder
  - the aged man
  lexicon: LSJ
  rationale: Literally denotes an old man. 'The elder' could suggest office or status,
    while 'the old man' preserves the contrast between age and athletic victory.
