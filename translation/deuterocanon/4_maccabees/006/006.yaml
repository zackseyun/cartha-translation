translation:
  text: But no—no—no! Lifting his eyes high toward heaven, the old man was exposing
    his flesh to the whips, and was streaming with blood, and his sides were being
    pierced.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the old man was displaying his flesh under the whips.' The Greek verb
      can be understood as making his flesh visible or manifest through the scourging.
    reason: lexical_alternative
  - marker: b
    text: Or 'was streaming with blood.' The Greek expression emphasizes the ongoing
      outflow or covering of blood.
    reason: lexical_alternative
  - marker: c
    text: Or 'his ribs were being wounded.' The Greek term for 'sides' can also refer
      more specifically to the rib area.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ ἀλλὰ ἀλλὰ
  chosen: But no—no—no!
  alternatives:
  - But, but, but
  - No, no, no
  - But indeed, indeed, indeed
  lexicon: LSJ
  rationale: The triple ἀλλὰ is highly emphatic and abrupt. Rendering it as 'But no—no—no!'
    preserves the emotional force and interruption better than a flat repetition of
    'but.'
- source_word: ὑψηλοὺς ... τοὺς ὀφθαλμούς
  chosen: raising his eyes high
  alternatives:
  - lifting up his eyes
  - with his eyes raised aloft
  lexicon: LSJ
  rationale: This idiom describes an upward physical gesture. 'Raising his eyes high'
    keeps the vivid bodily action while remaining natural English.
- source_word: ἀντείνας
  chosen: raising
  alternatives:
  - stretching up
  - lifting
  lexicon: LSJ
  rationale: The participle conveys an upward extension. 'Raising' fits the object
    'eyes' idiomatically in English without over-literal awkwardness.
- source_word: εἰς τὸν οὐρανόν
  chosen: toward heaven
  alternatives:
  - to heaven
  - into heaven
  - toward the sky
  lexicon: LSJ
  rationale: '''Heaven'' is preferable to ''sky'' in this martyrdom context because
    the upward gaze is directed in a religious frame, yet ''toward'' avoids over-specifying
    motion into heaven.'
- source_word: ἀπέφαινετο
  chosen: was exposing
  alternatives:
  - was displaying
  - was presenting
  - showed
  lexicon: LSJ
  rationale: The middle/passive-form verb here depicts his body being made manifest
    under torture. 'Was exposing' captures the sense that his flesh was laid bare
    to view by the scourging.
- source_word: ταῖς μάστιξιν
  chosen: to the whips
  alternatives:
  - under the whips
  - to the scourges
  - to the lashes
  lexicon: LSJ
  rationale: The dative is instrumental or associative with the torture. 'To the whips'
    preserves the starkness of the Greek construction; the following clause clarifies
    the action.
- source_word: τὰς σάρκας
  chosen: his flesh
  alternatives:
  - his body
  - his skin
  - his fleshly parts
  lexicon: LSJ
  rationale: σάρξ here is literal, not metaphorical. Per project guidance, 'flesh'
    should be retained in literal contexts.
- source_word: ὁ γέρων
  chosen: the old man
  alternatives:
  - the elder
  - the aged man
  lexicon: LSJ
  rationale: The term denotes his advanced age, an important feature in the scene's
    pathos. 'The old man' is direct and natural modern English.
- source_word: κατερρεῖτο τῷ αἵματι
  chosen: was being drenched with blood
  alternatives:
  - was streaming with blood
  - was flowing with blood
  - was covered in blood
  lexicon: LSJ
  rationale: The imperfect passive/middle suggests ongoing bodily collapse or pouring
    down with blood. 'Was being drenched with blood' communicates the cumulative effect
    vividly.
- source_word: τὰ πλευρὰ
  chosen: his sides
  alternatives:
  - his ribs
  - his flanks
  lexicon: LSJ
  rationale: πλευρά can denote side/rib area. 'Sides' is broad enough to fit the bodily
    description without implying only the bones.
- source_word: κατετιτρώσκετο
  chosen: were being pierced through
  alternatives:
  - were being wounded
  - were being gashed
  - were being torn open
  lexicon: LSJ
  rationale: The imperfect passive indicates repeated or ongoing wounding. 'Pierced
    through' preserves the severity of the blows more strongly than the generic 'wounded.'
