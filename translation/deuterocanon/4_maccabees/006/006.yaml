id: 4MA.6.6
reference: 4 Maccabees 6:6
source:
  edition: lxx-swete-1909
  text: ἀλλὰ ἀλλὰ ἀλλὰ ὑψηλοὺς ἀντείνας εἰς τὸν οὐρανὸν τοὺς ὀφθαλμούς, ἀπέφαινετο
    ταῖς μάστιξιν τὰς σάρκας ὁ γέρων, καὶ κατερρεῖτο τῷ αἵματι, καὶ τὰ πλευρὰ κατετιτρώσκετο,
  language: Greek
