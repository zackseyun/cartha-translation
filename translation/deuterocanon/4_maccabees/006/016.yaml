id: 4MA.6.16
reference: 4 Maccabees 6:16
source:
  edition: lxx-swete-1909
  text: Καὶ ὁ Ἐλεάζαρος, ὥσπερ πικρότερον διὰ τῆς συμβουλίας αἰκισθείς, ἀνεβόησεν
  language: Greek
  pages:
  - 752
