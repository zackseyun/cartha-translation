theological_decisions:
- issue: Nature of Antiochus's postmortem punishment implied by ἀϊδίων κολάζεται
  chosen_reading: The verse affirms ongoing punishment beyond earthly punishment,
    without over-defining its mechanism.
  alternative_readings:
  - He is punished eternally
  - He is punished with everlasting punishments
  rationale: The Greek juxtaposes earthly punishment with continuing punishment using
    an elliptical adjective. The translation preserves the text's affirmation of enduring
    retribution while avoiding insertion of a noun not explicit in the source.
  doctrine_reference: Preserve theological tension rather than resolve it.
