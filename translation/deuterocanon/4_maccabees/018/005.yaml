  text: καὶ ὁ τύραννος Ἀντίοχος καὶ ἐπὶ γῆς τετιμώρηται, καὶ ἀϊδίων κολάζεται· ὡς
    γὰρ οὐδὲν οὐδαμῶς ἴσχυσεν ἀναγκάσαι τοὺς Ἱεροσολυμείτας ἀλλοφυλῆσαι, καὶ τῶν πατρίων
    ἐθνῶν ἐκδιαιτηθῆναι,
