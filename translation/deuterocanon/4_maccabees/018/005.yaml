translation:
  text: And the tyrant Antiochus has been punished also on earth, and is punished
    with eternal things; for he was utterly unable to compel the people of Jerusalem
    to adopt foreign ways and to abandon the customs of their fathers’ nation,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is punished eternally' or 'is punished with everlasting punishments.'
      The Greek has an elliptical expression with 'eternal' and does not state the
      noun explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: τύραννος
  chosen: tyrant
  alternatives:
  - king
  - ruler
  lexicon: LSJ
  rationale: The term is morally charged in Greek and fits Antiochus's oppressive
    role in 4 Maccabees; 'tyrant' preserves that evaluative force better than the
    more neutral 'king' or 'ruler'.
- source_word: τετιμώρηται
  chosen: has been punished
  alternatives:
  - has paid the penalty
  - has been avenged upon
  lexicon: LSJ
  rationale: Perfect tense indicates a completed punitive action with present relevance.
    'Has been punished' is clear modern English and fits the passive sense here.
- source_word: ἀϊδίων
  chosen: with eternal things
  alternatives:
  - eternally
  - with everlasting punishments
  - with eternal punishment
  lexicon: LSJ
  rationale: The adjective appears without an explicit noun in the transmitted text.
    Rendering it as 'with eternal things' preserves the ellipsis rather than supplying
    'punishments' too confidently, while still signaling ongoing postmortem retribution
    in context.
- source_word: κολάζεται
  chosen: is punished
  alternatives:
  - is tormented
  - is chastised
  lexicon: LSJ
  rationale: A present/passive sense is most natural here, contrasting earthly punishment
    with continuing punishment. 'Is punished' is broad enough not to over-specify
    the mode.
- source_word: οὐδὲν οὐδαμῶς ἴσχυσεν
  chosen: was utterly unable
  alternatives:
  - had no power at all
  - in no way prevailed
  lexicon: LSJ
  rationale: The doubled negation intensifies the statement. 'Was utterly unable'
    captures the emphatic force in idiomatic English.
- source_word: ἀναγκάσαι
  chosen: to compel
  alternatives:
  - to force
  - to coerce
  lexicon: LSJ
  rationale: The infinitive denotes forcing action; 'compel' is natural and suitably
    formal.
- source_word: τοὺς Ἱεροσολυμείτας
  chosen: the people of Jerusalem
  alternatives:
  - the Jerusalemites
  - the inhabitants of Jerusalem
  lexicon: LSJ
  rationale: '''Jerusalemites'' is possible but less natural in contemporary English.
    ''The people of Jerusalem'' preserves the reference clearly and readably.'
- source_word: ἀλλοφυλῆσαι
  chosen: to adopt foreign ways
  alternatives:
  - to become alien in race
  - to live as foreigners
  - to become like another people
  lexicon: LSJ
  rationale: The verb concerns becoming aligned with foreign peoples/gentile practices
    rather than merely relocating. 'Adopt foreign ways' captures the cultural-religious
    assimilation in context.
- source_word: τῶν πατρίων ἐθνῶν
  chosen: their fathers’ nation
  alternatives:
  - their ancestral people
  - their fathers' customs of life
  lexicon: LSJ
  rationale: The phrase is somewhat compressed in this text. Retaining 'fathers' reflects
    πατρίων, and 'nation' reflects ἐθνῶν as transmitted, while the following infinitive
    clarifies that ancestral identity and practice are in view.
- source_word: ἐκδιαιτηθῆναι
  chosen: to abandon the customs of
  alternatives:
  - to be estranged from the way of life of
  - to be driven from the mode of life of
  lexicon: LSJ
  rationale: The verb relates to being separated from or departing from a way of life/dietary
    regimen. In this context of ancestral law and practice, 'abandon the customs of'
    communicates the intended sense without over-literal awkwardness.
