theological_decisions:
- issue: Rendering the Isaianic quotation in relation to its familiar wording
  chosen_reading: Translate the Greek citation as given in 4 Maccabees rather than
    conforming it to a traditional English form of Isaiah.
  alternative_readings:
  - Use a standardized English OT wording such as 'the flame shall not kindle upon
    you'
  rationale: The translation should be anchored in the Greek wording of 4 Maccabees
    itself. The verse cites Isaiah, but this text should not be harmonized to a familiar
    English Bible tradition where the Greek here is simpler and slightly different
    in form.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation
    tradition
- issue: Aspect of the main verb ὑπεμίμνησκεν
  chosen_reading: Express iterative/continuous force with 'kept reminding.'
  alternative_readings:
  - Simple past 'reminded'
  rationale: This preserves the narrative emphasis on repeated exhortation without
    adding content beyond the imperfect tense.
  doctrine_reference: Translation philosophy §5, Consistency/documented exception
