translation:
  text: And he kept reminding you of the Scripture of Isaiah that says, “Even if you
    pass through fire, a flame will not burn you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The quotation echoes Isaiah 43:2. Here 4 Maccabees follows its own Greek
      wording: ''a flame will not burn you.'''
    reason: cross_reference
lexical_decisions:
- source_word: ὑπεμίμνησκεν
  chosen: he kept reminding
  alternatives:
  - he reminded
  - he was reminding
  lexicon: LSJ
  rationale: Imperfect tense suggests repeated or continued action, so 'kept reminding'
    best conveys the ongoing force in natural English.
- source_word: γραφὴν
  chosen: the Scripture
  alternatives:
  - the writing
  - the passage of Scripture
  lexicon: LSJ
  rationale: In this Jewish literary context, γραφή refers to sacred Scripture rather
    than a generic writing.
- source_word: τὴν λέγουσαν
  chosen: that says
  alternatives:
  - which says
  - saying
  lexicon: LSJ
  rationale: A natural English rendering of the attributive participle modifying 'Scripture,'
    preserving the citation formula.
- source_word: Κἂν
  chosen: Even if
  alternatives:
  - And if
  - Although if
  lexicon: LSJ
  rationale: κραasis of καὶ ἐάν introduces a conditional clause with concessive force
    here; 'Even if' best matches the sense in the quoted line.
- source_word: διὰ πυρὸς διέλθῃς
  chosen: you pass through fire
  alternatives:
  - you go through fire
  - you pass through the fire
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist subjunctive clause; the anarthrous
    'fire' is best left without the article in English.
- source_word: φλὸξ
  chosen: a flame
  alternatives:
  - flame
  - blaze
  lexicon: LSJ
  rationale: The singular noun is indefinite in sense here; 'a flame' is idiomatic
    and preserves the image distinctly from the prior 'fire.'
- source_word: οὐ κατακαύσει σε
  chosen: will not burn you
  alternatives:
  - will not consume you
  - will not scorch you
  lexicon: LSJ
  rationale: κατακαίω can mean burn up or consume, but in this Isaianic allusion the
    point is protection from being burned by the flame; 'burn you' is clear and sufficiently
    literal.
