id: 4MA.18.14
reference: 4 Maccabees 18:14
source:
  edition: lxx-swete-1909
  text: ὑπεμίμνησκεν δὲ ὑμᾶς τὴν Ἡσαΐου γραφὴν τὴν λέγουσαν Κἂν διὰ πυρὸς διέλθῃς,
    φλὸξ οὐ κατακαύσει σε.
  language: Greek
