theological_decisions:
- issue: Referent of αὐτοῦ in the citation
  chosen_reading: his will
  alternative_readings:
  - its will
  rationale: The wording alludes to Prov 3:18 but adapts the line. In this context,
    the mother is speaking of fidelity to God, so a personal referent ('his') is the
    most coherent reading. Because the Greek pronoun could be taken more mechanically
    with 'tree of life,' the alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity and preserve alternative in footnote.
