translation:
  text: He held up Solomon before us as a proverb, the one who says, “It is a tree
    of life for all who do his will.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “It is a tree of life for all who do its will.” The Greek pronoun can
      be read with an impersonal referent, though the context favors reference to
      God.
    reason: alternative_reading
  - marker: b
    text: The saying echoes Proverbs 3:18 in adapted form.
    reason: cross_reference
lexical_decisions:
- source_word: ἐπαροιμίαζεν
  chosen: held up ... as a proverb
  alternatives:
  - quoted proverbially
  - used as a proverb
  - spoke proverbially of
  lexicon: LSJ
  rationale: The verb means to speak in a proverbial way or to cite proverbially.
    Because the direct object is τὸν Σαλομῶντα, the sense is that Solomon was invoked
    before 'us' in proverbial citation. 'Held up ... as a proverb' preserves both
    the rhetorical action and the object relationship better than a flat 'quoted.'
- source_word: τὸν Σαλομῶντα
  chosen: Solomon
  alternatives:
  - Solomon himself
  lexicon: LSJ
  rationale: Personal name is transliterated per project philosophy. The accusative
    is governed by ἐπαροιμίαζεν, indicating Solomon as the cited proverbial authority.
- source_word: ἡμῖν
  chosen: before us
  alternatives:
  - to us
  - for us
  lexicon: LSJ
  rationale: Dative pronoun marks the audience of the proverbial citation. 'Before
    us' fits the rhetorical scene naturally in English while preserving that the saying
    was presented to them.
- source_word: τὸν λέγοντα
  chosen: the one who says
  alternatives:
  - who said
  - saying
  lexicon: LSJ
  rationale: Present participle with article identifies Solomon as the speaker of
    the cited maxim. 'The one who says' keeps the participial force without over-formal
    English.
- source_word: Ξύλον ζωῆς
  chosen: a tree of life
  alternatives:
  - tree of life
  lexicon: LSJ
  rationale: This echoes the wisdom idiom from Proverbs. The anarthrous predicate
    in Greek is naturally rendered with the English article here.
- source_word: πᾶσιν τοῖς ποιοῦσιν
  chosen: for all who do
  alternatives:
  - to all who practice
  - for all who perform
  lexicon: LSJ
  rationale: The phrase denotes all persons carrying out the specified action. 'Do'
    is the most natural and sufficiently literal rendering.
- source_word: αὐτοῦ τὸ θέλημα
  chosen: his will
  alternatives:
  - its will
  - what he wills
  lexicon: LSJ
  rationale: The pronoun αὐτοῦ is grammatically ambiguous in isolation, but in context
    the saying is adapted to refer to doing God's will rather than merely 'its' (i.e.,
    wisdom's) will. English 'his will' best reflects the intended personal referent
    in this martyr-theology context while remaining faithful to the Greek form.
