  text: τὸν Σαλομῶντα ἐπαροιμίαζεν ἡμῖν τὸν λέγοντα Ξύλον ζωῆς ἐστιν πᾶσιν τοῖς ποιοῦσιν
    αὐτοῦ τὸ θέλημα.
