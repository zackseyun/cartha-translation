id: 4MA.18.23
reference: 4 Maccabees 18:23
source:
  edition: lxx-swete-1909
  text: οἱ δὲ Ἀβραμιαῖοι Οἱ παῖδες σὺν τῇ ἀθλοφόρῳ μητρὶ εἰς πατέρων χῶρον συναγελιᾶζονται,
    ψυχὰς ἁγνὰς καὶ ἀθανάτους ἀπειληφότες παρὰ τοῦ θεοῦ·
  language: Greek
