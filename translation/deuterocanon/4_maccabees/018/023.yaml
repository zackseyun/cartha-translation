theological_decisions:
- issue: Afterlife imagery in εἰς πατέρων χῶρον
  chosen_reading: Rendered as 'into the place of their fathers' without specifying
    heaven, paradise, or Abraham's bosom.
  alternative_readings:
  - into the realm of their fathers
  - into the company of their fathers
  rationale: The Greek indicates ancestral destination/company but does not explicitly
    name a developed afterlife locale. The translation preserves the text's wording
    and theological restraint rather than importing later doctrinal terminology.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Anthropological sense of ψυχὰς ἁγνὰς καὶ ἀθανάτους
  chosen_reading: Translated as 'pure and immortal souls.'
  alternative_readings:
  - pure and immortal lives
  rationale: In this martyrdom context the phrase speaks of what they receive from
    God beyond death. 'Souls' best preserves the text's claim without reducing it
    to mere continued biography or earthly life.
