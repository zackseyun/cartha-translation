translation:
  text: But the sons of Abraham, together with their victory-bearing mother, are gathered
    into the place of their fathers, having received pure and immortal souls from
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'join the company of their fathers'; the Greek verb can emphasize being
      in company together, not only being gathered.
    reason: lexical_alternative
  - marker: b
    text: '''Victory-bearing mother'' preserves the Greek athletic imagery of contest
      and prize; alternatively, ''prize-winning mother.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀβραμιαῖοι ... παῖδες
  chosen: the sons of Abraham
  alternatives:
  - the children of Abraham
  - Abraham's sons
  lexicon: LSJ
  rationale: Ἀβραμιαῖοι is an adjectival designation meaning those belonging to Abraham;
    with παῖδες it refers to the martyred brothers as Abraham's offspring. 'Sons'
    fits the immediate referent better than the broader 'children,' since the group
    in context is male siblings.
- source_word: σὺν τῇ ἀθλοφόρῳ μητρὶ
  chosen: together with their victory-bearing mother
  alternatives:
  - with their prize-winning mother
  - with their triumphant mother
  lexicon: LSJ
  rationale: ἀθλοφόρος literally denotes bearing or winning the prize of contest.
    In this martyrdom context, 'victory-bearing' preserves the athletic imagery without
    flattening it to a generic 'triumphant.'
- source_word: εἰς πατέρων χῶρον
  chosen: into the place of their fathers
  alternatives:
  - into their fathers' region
  - to the realm of their fathers
  lexicon: LSJ
  rationale: χῶρος is a place, region, or space. Here it likely refers to the abode
    of the ancestors. 'Place of their fathers' is natural English and preserves the
    familial/ancestral sense without over-specifying the afterlife imagery.
- source_word: συναγελιᾶζονται
  chosen: are gathered
  alternatives:
  - join the company
  - are brought together
  - keep company together
  lexicon: LSJ
  rationale: The verb conveys being in company together or joining a company. Given
    the movement phrase εἰς πατέρων χῶρον, 'are gathered' communicates incorporation
    into the company of the fathers in idiomatic English.
- source_word: ψυχὰς
  chosen: souls
  alternatives:
  - lives
  lexicon: LSJ
  rationale: ψυχή can mean life or soul, but with the modifiers ἁγνὰς καὶ ἀθανάτους
    and the context of postmortem reward, 'souls' best reflects the text's anthropological
    and eschatological sense.
- source_word: ἁγνὰς καὶ ἀθανάτους
  chosen: pure and immortal
  alternatives:
  - holy and immortal
  - undefiled and deathless
  lexicon: LSJ
  rationale: ἁγνός commonly means pure/clean/chaste; ἀθάνατος means immortal. 'Pure
    and immortal' is straightforward and preserves the paired qualities attributed
    to the souls.
- source_word: ἀπειληφότες
  chosen: having received
  alternatives:
  - having obtained
  - having been allotted
  lexicon: LSJ
  rationale: The participle from ἀπολαμβάνω here indicates receiving or obtaining
    from God. 'Having received' is the clearest idiomatic rendering in context.
- source_word: παρὰ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - from the hand of God
  lexicon: LSJ
  rationale: παρά with the genitive marks source. 'From God' is sufficient and does
    not add imagery absent from the Greek.
