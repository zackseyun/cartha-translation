  chosen_reading: the Jewish law/Torah as the covenantal law being urged upon Israel
  alternative_readings:
  - law in a more general moral sense
  rationale: The address to Israelites and the context of 4 Maccabees strongly indicate
    the ancestral law, not generic morality.
