translation:
  text: O children, descendants of Abraham’s offspring, Israelites, obey this law,
    and in every way be reverent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Abraham’s seed.' The Greek expression is unusually layered
      and emphatic in its appeal to ancestral identity.
    reason: lexical_alternative
  - marker: b
    text: Or 'show piety' / 'live devoutly.' The verb denotes reverent, God-honoring
      conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ
  chosen: O
  alternatives:
  - Oh
  lexicon: LSJ
  rationale: Retains the vocative exclamation and elevated rhetorical tone of the
    martyr's address without adding content.
- source_word: τῶν Ἀβραμιαίων σπερμάτων ἀπόγονοι
  chosen: descendants of Abraham’s offspring
  alternatives:
  - descendants of Abraham’s seed
  - offspring of Abraham’s descendants
  - children of Abraham’s line
  lexicon: LSJ
  rationale: 'The Greek is rhetorically piled up: ''descendants of the Abrahamic seeds/offspring.''
    I preserved the layered ancestry language rather than flattening it to simply
    ''children of Abraham,'' while using natural English. ''Seed'' is possible but
    sounds less natural here in modern English.'
- source_word: παῖδες
  chosen: children
  alternatives:
  - sons
  - young ones
  lexicon: BDAG
  rationale: Vocative παῖδες addresses the hearers as children/sons. 'Children' is
    gender-accurate enough in English for a collective address and avoids over-specifying
    males where the rhetorical force is filial descent.
- source_word: Ἰσραηλεῖται
  chosen: Israelites
  alternatives:
  - men of Israel
  - Israel's people
  lexicon: LSJ
  rationale: Standard ethnic/national designation; transliterated people-name rendered
    in conventional English form.
- source_word: πείθεσθε
  chosen: obey
  alternatives:
  - be persuaded by
  - heed
  lexicon: BDAG
  rationale: In context with the dative τῷ νόμῳ, the sense is practical compliance
    with the law, not merely inward persuasion.
- source_word: τῷ νόμῳ τούτῳ
  chosen: this law
  alternatives:
  - this Law
  lexicon: BDAG
  rationale: νόμος here refers to the Jewish law/Torah. I rendered it 'law' in the
    main text for readability; capitalization as 'Law' is possible but can import
    English convention beyond the Greek itself.
- source_word: πάντα τρόπον
  chosen: in every way
  alternatives:
  - by every means
  - in every manner
  lexicon: LSJ
  rationale: Idiomatic adverbial phrase expressing comprehensiveness of conduct.
- source_word: εὐσεβεῖτε
  chosen: be reverent
  alternatives:
  - show piety
  - live devoutly
  - act with reverence
  lexicon: BDAG
  rationale: The verb calls for pious, God-honoring conduct. 'Be reverent' is concise
    and accessible, preserving the ethical-religious force without archaic 'be pious.'
