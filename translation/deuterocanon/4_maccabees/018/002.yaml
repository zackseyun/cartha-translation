  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: knowing that godly reason is master of the passions, and not only of inward
    sufferings but also of outward pains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pious reason.' The Greek phrase is a key expression in 4 Maccabees for
      reason shaped by reverence toward God.
    reason: lexical_alternative
  - marker: b
    text: The Greek distinguishes inner πάθη ('passions') from outward πόνοι ('pains'
      or 'sufferings').
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκοντες
  chosen: knowing
  alternatives:
  - since they knew
  - recognizing
  lexicon: BDAG
  rationale: A participial form introducing the basis for the martyrs' endurance.
    'Knowing' preserves the participial connection and keeps the statement concise
    without over-interpreting the temporal or causal nuance.
- source_word: παθῶν
  chosen: the passions
  alternatives:
  - sufferings
  - emotions
  - desires
  lexicon: LSJ
  rationale: In 4 Maccabees, πάθη is a key philosophical term for passions or impulses
    subject to rational mastery. Although the verse later uses πόνων for pains, rendering
    πάθη here as 'passions' preserves the conceptual distinction between inner drives
    and external pain.
- source_word: δεσπότης
  chosen: master
  alternatives:
  - lord
  - ruler
  lexicon: LSJ
  rationale: '''Master'' best conveys governing authority in this philosophical-ethical
    context without importing the stronger covenantal or titular associations that
    ''Lord'' can carry in biblical English.'
- source_word: ὁ εὐσεβὴς λογισμός
  chosen: godly reason
  alternatives:
  - pious reason
  - devout reason
  - reverent reasoning
  lexicon: LSJ
  rationale: 'This is the central concept of 4 Maccabees: reason shaped by reverence
    toward God. ''Godly reason'' is readable modern English and preserves both the
    rational and religious dimensions better than the more awkward ''pious reason.'''
- source_word: τῶν ἔνδοθεν
  chosen: inward
  alternatives:
  - internal
  - within
  lexicon: LSJ
  rationale: Used substantivally in contrast with τῶν ἔξωθεν. 'Inward' gives a natural
    English contrast with 'outward' while preserving the inner/outer distinction.
- source_word: πόνων
  chosen: sufferings
  alternatives:
  - pains
  - torments
  lexicon: LSJ
  rationale: πόνων denotes painful experiences. Because English 'passions' already
    renders πάθη, this term is rendered with a suffering/pain word to preserve the
    contrast between internal passions and external afflictions.
- source_word: τῶν ἔξωθεν πόνων
  chosen: outward pains
  alternatives:
  - external sufferings
  - pains from outside
  lexicon: LSJ
  rationale: The phrase contrasts external bodily pain with inward experiences. 'Outward
    pains' is concise and mirrors the Greek antithesis with 'inward sufferings,' though
    the broader sense 'external sufferings' remains possible.
