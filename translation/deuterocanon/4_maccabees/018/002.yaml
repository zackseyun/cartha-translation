reference: 4 Maccabees 18:2
source:
  edition: lxx-swete-1909
  text: γινώσκοντες ὅτι τῶν παθῶν δεσπότης ἐστὶν ὁ εὐσεβὴς λογισμός, καὶ οὐ μόνον
    τῶν ἔνδοθεν ἀλλὰ καὶ τῶν ἔξωθεν πόνων.
  language: Greek
  pages:
