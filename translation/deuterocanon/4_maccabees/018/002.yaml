theological_decisions:
- issue: Rendering the programmatic phrase ὁ εὐσεβὴς λογισμός in a way that preserves
    the book's theological-philosophical claim
  chosen_reading: godly reason
  alternative_readings:
  - pious reason
  - devout reason
  rationale: The verse asserts that reason, when governed by reverence toward God,
    rules both inner passions and external pains. 'Godly reason' preserves the explicitly
    religious qualifier εὐσεβής while remaining idiomatic English. This avoids reducing
    the phrase to merely secular rationalism.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5, 6'
