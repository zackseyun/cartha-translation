translation:
  text: 'Then indeed, having set out from Jerusalem, he encamped against the Persians.
    And the mother of the seven boys was saying these things also to each one of her
    children:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τότε δὴ
  chosen: Then indeed
  alternatives:
  - Then
  - At that time indeed
  lexicon: LSJ
  rationale: Retains the emphatic/sequential force of the particle combination without
    becoming wooden. 'Indeed' preserves δὴ's intensifying nuance.
- source_word: ὑπάρας
  chosen: having set out
  alternatives:
  - having departed
  - having gone up
  lexicon: LSJ
  rationale: The participle marks prior action before the main verb. 'Having set out'
    fits travel context from Jerusalem without overcommitting to a directional nuance
    not explicit in English.
- source_word: ἐστρατοπέδευσεν
  chosen: he encamped against
  alternatives:
  - he camped against
  - he made camp against
  lexicon: LSJ
  rationale: Military verb from στρατόπεδον; 'encamped against' preserves the martial
    setting and hostile orientation signaled by ἐπί with accusative.
- source_word: ἐπὶ Πέρσας
  chosen: against the Persians
  alternatives:
  - toward the Persians
  - at the Persians
  lexicon: LSJ
  rationale: In this military context, ἐπί with accusative naturally conveys movement
    or stance against an opponent; 'against the Persians' is the clearest idiomatic
    rendering.
- source_word: ἡ μήτηρ τῶν ἑπτὰ παίδων
  chosen: the mother of the seven boys
  alternatives:
  - the mother of the seven children
  - the mother of the seven sons
  lexicon: LSJ
  rationale: παῖδες can mean children, boys, or sons. Here the referents are her seven
    male offspring; 'boys' preserves the maternal and familial tone while remaining
    natural. 'Sons' is possible, but the Greek uses παῖδες rather than υἱοί.
- source_word: Ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  - kept saying
  lexicon: LSJ
  rationale: Imperfect aspect suggests ongoing or repeated speech. 'Was saying' preserves
    that imperfective force without adding interpretive emphasis.
- source_word: καὶ ταῦτα
  chosen: these things also
  alternatives:
  - also these things
  - these things
  lexicon: LSJ
  rationale: Keeps both the demonstrative content and the additive καί, indicating
    continuation or addition to prior speech.
- source_word: ἑνὶ ἑκάστῳ
  chosen: to each one
  alternatives:
  - to each
  - to every single one
  lexicon: LSJ
  rationale: The distributive expression is explicit; 'to each one' preserves the
    individualized address.
- source_word: τοῖς τέκνοις
  chosen: her children
  alternatives:
  - her offspring
  - her sons
  lexicon: LSJ
  rationale: τέκνα is broader and more relational than 'sons'; 'her children' reflects
    the Greek term accurately, even though the children in context are male.
