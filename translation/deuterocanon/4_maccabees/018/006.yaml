theological_decisions:
- issue: Gendered family terms in maternal speech context
  chosen_reading: Use 'boys' for παῖδες and 'children' for τέκνοις in the same verse
  alternative_readings:
  - '''sons'' in both places'
  - '''children'' in both places'
  rationale: 'The verse uses two different Greek kinship terms. Rendering them differently
    preserves the source''s lexical variation: παῖδες here can naturally be ''boys,''
    while τέκνα is best represented by the broader ''children.'' This follows the
    project''s gender-accurate principle without flattening the distinction.'
