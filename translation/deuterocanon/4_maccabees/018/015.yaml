theological_decisions:
- issue: Identification of ὑμνογράφος in relation to David
  chosen_reading: The phrase refers to David as the composer of the quoted sacred
    song.
  alternative_readings:
  - Render idiomatically as 'the psalmist David'
  rationale: The Greek wording is somewhat compressed, but the sense is that David,
    the hymn-composer, uttered the quoted line. The translation keeps the lexical
    force of ὑμνογράφος rather than replacing it outright with the traditional title
    'psalmist.'
  doctrine_reference: Translation philosophy §§1, 5
