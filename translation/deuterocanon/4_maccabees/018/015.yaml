translation:
  text: David sang to us of the hymn-writer, saying, “Many are the afflictions of
    the righteous.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “David the psalmist sang to us, saying, ‘Many are
      the afflictions of the righteous.’”
    reason: lexical_alternative
  - marker: b
    text: The quotation echoes Ps 33:20 LXX (Ps 34:19 in many English versifications).
    reason: cross_reference
lexical_decisions:
- source_word: τὸν ὑμνογράφον
  chosen: the hymn-writer
  alternatives:
  - the psalmist
  - the composer of hymns
  lexicon: LSJ
  rationale: Literally denotes one who writes or composes hymns. In context it refers
    to David as the author of sacred songs. 'The hymn-writer' preserves the Greek
    image more directly than the traditional interpretive gloss 'psalmist,' while
    remaining natural English.
- source_word: ἐμελῴδει
  chosen: sang
  alternatives:
  - sang of
  - chanted
  - melodized
  lexicon: LSJ
  rationale: 'The verb is related to singing or chanting a melody. ''Sang'' is the
    most natural English equivalent. Because the Greek construction includes an accusative
    object and the following quotation, the English supplies ''of'' to make the syntax
    intelligible: David sang to us of the hymn-writer, saying...'
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - for us
  lexicon: BDAG
  rationale: Dative pronoun naturally rendered 'to us' here, indicating the audience
    or beneficiaries of the song.
- source_word: Δαυείδ
  chosen: David
  rationale: Standard transliteration of the personal name.
- source_word: Πολλαὶ
  chosen: Many are
  alternatives:
  - Numerous are
  lexicon: LSJ
  rationale: Straightforward rendering of the predicate opening the citation.
- source_word: αἱ θλίψεις
  chosen: the afflictions
  alternatives:
  - the troubles
  - the distresses
  lexicon: BDAG
  rationale: θλίψεις commonly denotes pressures, troubles, or afflictions. 'Afflictions'
    fits the elevated tone and the likely scriptural citation.
- source_word: τῶν δικαίων
  chosen: of the righteous
  alternatives:
  - of righteous people
  - of the just
  lexicon: BDAG
  rationale: The genitive plural refers to righteous persons. 'The righteous' is concise,
    idiomatic, and preserves the scriptural register.
