theological_decisions:
- issue: Interpretation of the father's blessedness in relation to his sons' martyrdom
  chosen_reading: The verse blesses the father because he died before enduring the
    later state of childlessness caused by his sons' deaths.
  alternative_readings:
  - The verse simply contrasts having children with never having had children, without
    reference to the narrative outcome.
  rationale: The immediate context of 4 Maccabees concerns the deaths of the sons.
    Thus ἀτεκνία here is best understood narratively as the painful condition of being
    left without children, not merely infertility in the abstract. The translation
    preserves that implication without overexplaining it in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
