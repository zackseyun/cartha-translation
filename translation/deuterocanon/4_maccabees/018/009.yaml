id: 4MA.18.9
reference: 4 Maccabees 18:9
source:
  edition: lxx-swete-1909
  text: τούτων δὲ ἐνηλίκων γενομένων ἐτελεύτησεν ὁ πατήρ. μακάριος μὲν ἐκεῖνος· τὸν
    γὰρ τῆς εὐτεκνίας βίον ἐπιστήσας, τὸν τῆς ἀτεκνίας οὐκ ὠδυνήθη καιρόν.
  language: Greek
  pages:
  - 752
  - 782
  - 783
  - 784
  - 785
  - 786
  - 787
  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: But when these sons had reached adulthood, their father died. Blessed was
    that man, for after seeing the life of having good children, he did not suffer
    the time of childlessness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'after knowing the life of fruitful offspring.' The Greek εὐτεκνία can
      emphasize being blessed with children, even many children, and carries a positive
      evaluative sense.
    reason: lexical_alternative
  - marker: b
    text: That is, he died before he had to endure the anguish of being left childless
      after the deaths of his sons.
    reason: cross_reference
lexical_decisions:
- source_word: ἐνηλίκων
  chosen: had reached maturity
  alternatives:
  - were grown
  - had become adults
  - were of age
  lexicon: LSJ
  rationale: The adjective denotes full age or maturity. Rendering it verbally in
    English produces natural style while preserving the temporal sense of γενομένων.
- source_word: γενομένων
  chosen: had reached
  alternatives:
  - having become
  - were
  lexicon: BDAG
  rationale: With ἐνηλίκων in a genitive absolute, the participle marks a completed
    transition into adulthood; 'had reached' is idiomatic and reflects that sense
    better than a wooden 'having become'.
- source_word: ἐτελεύτησεν
  chosen: died
  alternatives:
  - came to his end
  - passed away
  lexicon: BDAG
  rationale: The verb literally means 'came to an end' and commonly functions as a
    reverent term for death. 'Died' is the clearest modern English equivalent without
    unnecessary euphemism.
- source_word: μακάριος
  chosen: Blessed
  alternatives:
  - fortunate
  - happy
  lexicon: BDAG
  rationale: The term expresses an enviable, favored condition. 'Blessed' preserves
    the elevated moral-religious tone better than 'fortunate' or 'happy'.
- source_word: εὐτεκνίας
  chosen: having good children
  alternatives:
  - fruitful offspring
  - many children
  - blessed with children
  lexicon: LSJ
  rationale: The noun refers to the state of being well supplied with children, often
    with a positive evaluative nuance. 'Having good children' preserves both the parental
    state and the commendatory force in context, where the sons' worth is central.
- source_word: βίον ἐπιστήσας
  chosen: after experiencing the life of
  alternatives:
  - having known the life of
  - having lived the life of
  - having attained the life of
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic. ἐπιστήσας here is best taken as having
    come to know or experience a mode of life. 'After experiencing the life of' keeps
    the completed prior experience before his death.
- source_word: ἀτεκνίας
  chosen: childlessness
  alternatives:
  - being without children
  - loss of children
  lexicon: LSJ
  rationale: The noun straightforwardly denotes childlessness. In context it points
    to the condition he did not live to endure after his sons' deaths.
- source_word: οὐκ ὠδυνήθη
  chosen: did not suffer
  alternatives:
  - was not pained by
  - did not grieve
  - did not feel anguish in
  lexicon: BDAG
  rationale: The verb denotes experiencing pain or anguish. 'Did not suffer' is concise
    and fits the following accusative of time/season.
- source_word: καιρόν
  chosen: the season
  alternatives:
  - the time
  - the moment
  - the period
  lexicon: BDAG
  rationale: καιρός often denotes a definite occasion or season rather than mere chronological
    time. 'Season' preserves the qualitative sense of a period marked by childlessness.
