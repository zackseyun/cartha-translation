translation:
  text: And he recounted to us Abel, who was slain by Cain, and Isaac being offered
    up as a whole burnt offering, and Joseph in prison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Isaac being offered as a whole burnt offering.' The
      Greek uses sacrificial language to evoke Genesis 22.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεγίνωσκεν
  chosen: he recounted to us
  alternatives:
  - he read to us
  - he rehearsed to us
  - he reminded us of
  lexicon: LSJ
  rationale: The imperfect of ἀναγινώσκω can mean 'read' or more broadly 'relate/recount.'
    In this context the mother is recalling scriptural exemplars to her sons, so 'recounted
    to us' communicates the sense naturally in English without requiring a literal
    act of reading.
- source_word: τὸν ἀναιρεθέντα
  chosen: who was slain
  alternatives:
  - who was killed
  - who was done away with
  lexicon: BDAG
  rationale: The participle from ἀναιρέω here denotes violent killing. 'Slain' preserves
    the gravity and fits the martyrdom/exemplar context better than the flatter 'killed.'
- source_word: ὁλοκαυτούμενον
  chosen: being offered up whole
  alternatives:
  - being burned as a whole offering
  - being offered as a whole burnt offering
  lexicon: LSJ
  rationale: The participle evokes the language of whole-burnt offering. Because Isaac
    was not actually burned, a too-literal 'being burned' could mislead; 'being offered
    up whole' preserves the sacrificial allusion while fitting the narrative reference
    to Genesis 22.
- source_word: ἐν φυλακῇ
  chosen: in prison
  alternatives:
  - in custody
  - in confinement
  lexicon: BDAG
  rationale: A straightforward locative phrase referring to Joseph's imprisonment.
    'In prison' is the clearest modern English equivalent.
- source_word: Ἄβελ / Κάϊν / Ἰσαάκ / Ἰωσήφ
  chosen: Abel / Cain / Isaac / Joseph
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
