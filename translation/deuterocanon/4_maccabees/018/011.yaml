  text: τὸν ἀναιρεθέντα Ἄβελ ὑπὸ Κάϊν ἀνεγίνωσκεν δὲ ἡμῖν, καὶ τὸν ὁλοκαυτούμενον
    Ἰσαάκ, καὶ τὸν ἐν φυλακῇ Ἰωσήφ.
  language: Greek
  pages:
