theological_decisions:
- issue: Sacrificial wording for Isaac
  chosen_reading: Isaac as he was being offered up whole
  alternative_readings:
  - Isaac being offered as a whole burnt offering
  - Isaac being offered up
  rationale: The Greek uses sacrificial terminology that should be preserved, but
    the English must not imply that Isaac was actually consumed in sacrifice. The
    chosen wording keeps the allusion to the whole offering while remaining historically
    accurate to the Genesis account.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 3, 6'
