theological_decisions:
- issue: Rendering the divine self-declaration quoted from the Song of Moses
  chosen_reading: I will kill, and I will make alive
  alternative_readings:
  - I kill, and I make alive
  - I will put to death, and I will cause to live
  rationale: The Greek in this verse uses future forms, so the main text follows the
    immediate wording rather than harmonizing to other familiar English renderings
    of Deut 32:39. 'Make alive' preserves the strong divine sovereignty claim without
    softening it.
  doctrine_reference: Translation philosophy §§1, 3, 6
