translation:
  text: For she did not forget the song that Moses taught, the one that teaches, ‘I
    will kill, and I will make alive.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'This line echoes the Song of Moses in Deuteronomy 32:39. Some English renderings
      of that passage read, ''I kill and I make alive''; here the Greek wording is
      future: ''I will kill, and I will make alive.'''
    reason: cross_reference
lexical_decisions:
- source_word: ᾠδήν
  chosen: song
  alternatives:
  - ode
  - song of praise
  lexicon: LSJ
  rationale: The ordinary sense is 'song.' 'Ode' is too literary in modern English,
    and 'song of praise' adds specificity not present in the word itself.
- source_word: ἐδίδαξεν
  chosen: taught
  alternatives:
  - instructed
  lexicon: LSJ
  rationale: A straightforward past-tense rendering that matches the educational sense
    of the verb and reads naturally in English.
- source_word: οὐκ ἐπελάθετο
  chosen: did not forget
  alternatives:
  - did not neglect
  - did not lose sight of
  lexicon: LSJ
  rationale: The verb means 'forget' or 'be unmindful of.' 'Did not forget' is the
    most direct and preserves the memory motif in context.
- source_word: τὴν διδάσκουσαν
  chosen: the one that teaches
  alternatives:
  - which teaches
  - teaching
  lexicon: LSJ
  rationale: The feminine participle agrees with 'song' and personifies it slightly.
    'The one that teaches' preserves that force better than a flattened abstract rendering.
- source_word: Ἐγὼ ἀποκτενῶ, καὶ ζῆν ποιήσω
  chosen: I will kill, and I will make alive
  alternatives:
  - I will put to death, and I will cause to live
  - I kill, and I make alive
  lexicon: LSJ
  rationale: This is a quotation echoing Deut 32:39 LXX. The future forms are explicit
    here, so 'I will kill, and I will make alive' is both accurate and idiomatic.
    'Make alive' preserves the causative force of ποιήσω better than simply 'give
    life,' while remaining readable.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: LSJ
  rationale: It introduces an explanation for the preceding statement, and 'For' preserves
    that connective force succinctly.
