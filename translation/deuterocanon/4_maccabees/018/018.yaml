  text: ᾠδὴν μὲν γὰρ ἣν ἐδίδαξεν Μωσῆς οὐκ ἐπελάθετο τὴν διδάσκουσαν Ἐγὼ ἀποκτενῶ,
    καὶ ζῆν ποιήσω.
