theological_decisions:
- issue: Handling the Ezekiel citation formula and allusion to resurrection imagery
  chosen_reading: 'Translate the line as an appeal to Ezekiel''s testimony: ''He bore
    witness to Ezekiel, who says, “Will these dry bones live?”'''
  alternative_readings:
  - He confirmed Ezekiel, saying, “If these dry bones live ...”
  - He called Ezekiel as witness, who said, “Shall these dry bones live?”
  rationale: The verse invokes Ezekiel 37 as scriptural support for hope beyond death.
    The translation preserves the allusive force without importing a fuller doctrinal
    conclusion than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
