translation:
  text: He bore witness to Ezekiel, who says, “Will these dry bones live?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Allusion to Ezekiel 37:3. The Greek wording echoes the prophet's question
      about the valley of dry bones.
    reason: cross_reference
  - marker: b
    text: Or 'confirmed Ezekiel' / 'appealed to Ezekiel as witness.' The Greek verb
      carries a testimonial sense and is somewhat difficult to render with a single
      English expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστοποιεῖτο
  chosen: bore witness to
  alternatives:
  - confirmed
  - called as witness
  - appealed to the testimony of
  lexicon: LSJ
  rationale: The middle/passive form here conveys invoking or confirming by testimony.
    In context the speaker is adducing Ezekiel's prophetic witness, so 'bore witness
    to' preserves the testimonial sense without overparaphrasing.
- source_word: τὸν Ἰεζεκιὴλ
  chosen: Ezekiel
  rationale: Proper name transliterated by standard English convention, per project
    philosophy.
- source_word: τὸν λέγοντα
  chosen: who says
  alternatives:
  - saying
  - who said
  lexicon: BDAG
  rationale: The participle introduces the cited prophetic statement. Present 'who
    says' is natural in English for citation formulae and reflects the Greek participial
    construction.
- source_word: Εἰ ζήσεται
  chosen: Will ... live?
  alternatives:
  - If ... will live
  - Shall ... live?
  lexicon: BDAG
  rationale: Although εἰ can formally mean 'if,' in this citation from Ezekiel 37:3
    it functions in an interrogative sense in Koine/LXX usage. 'Will ... live?' gives
    idiomatic English and matches the prophetic question.
- source_word: τὰ ὀστᾶ τὰ ξηρὰ ταῦτα
  chosen: these dry bones
  alternatives:
  - these bones, the dry ones
  - these dried-up bones
  lexicon: LSJ
  rationale: This is the natural English order for the articular noun plus attributive
    adjective and demonstrative. 'Dry bones' preserves the allusion to Ezekiel's vision
    clearly and idiomatically.
