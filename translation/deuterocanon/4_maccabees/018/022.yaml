reference: 4 Maccabees 18:22
source:
  edition: lxx-swete-1909
  text: ὑπὲρ ὧν ἡ θεία δίκη μετῆλθεν καὶ μετελεύσεται τὸν ἀλιόστορα.
  language: Greek
  pages:
  - 752
  - 782
  - 783
  - 784
  - 785
  - 786
  - 787
  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: for which divine justice has pursued, and will pursue, the accursed one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the defiled one' or 'the abominable one'; the Greek term is rare and
      carries a strong sense of moral-religious condemnation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ ὧν
  chosen: for which
  alternatives:
  - because of which
  - on account of which
  lexicon: LSJ
  rationale: Here ὑπέρ with the relative pronoun introduces the grounds or cause for
    the following judgment. 'For which' is concise and natural English while preserving
    the causal sense.
- source_word: ἡ θεία δίκη
  chosen: divine justice
  alternatives:
  - the divine punishment
  - the justice of God
  - divine vengeance
  lexicon: LSJ
  rationale: δίκη can denote justice, penalty, or vengeance depending on context.
    Because the subject is personified and acts in response to wrongdoing, 'divine
    justice' preserves both judicial and retributive force without over-narrowing
    to either abstract justice or raw vengeance.
- source_word: μετῆλθεν
  chosen: has pursued
  alternatives:
  - went after
  - visited with punishment
  - has come after
  lexicon: LSJ
  rationale: The verb conveys pursuing or going after, often with hostile or punitive
    force. 'Has pursued' fits the completed action in context and pairs well with
    the following future verb.
- source_word: καὶ μετελεύσεται
  chosen: and will pursue
  alternatives:
  - and will go after
  - and will punish
  - and will overtake
  lexicon: LSJ
  rationale: The future form continues the same verbal idea as μετῆλθεν. Rendering
    both with 'pursue' preserves the rhetorical repetition and the sense of ongoing
    divine retribution.
- source_word: τὸν ἀλιόστορα
  chosen: the accursed one
  alternatives:
  - the defiled one
  - the abominable one
  - the criminal one
  lexicon: LSJ
  rationale: This rare term is strongly pejorative and appears to denote one under
    curse or pollution. 'The accursed one' best captures the moral-religious condemnation
    in a readable way. Because the exact nuance is uncommon and somewhat uncertain,
    a lexical alternative is preserved in a footnote.
