theological_decisions:
- issue: How to render δίκη in a context of divine retribution
  chosen_reading: divine justice
  alternative_readings:
  - divine vengeance
  - divine punishment
  rationale: The verse presents God's retributive action without requiring a narrower
    doctrinal claim about vengeance alone. 'Divine justice' preserves theological
    tension between justice as principle and punishment as enacted response.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
