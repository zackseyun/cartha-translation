id: 4MA.18.4
reference: 4 Maccabees 18:4
source:
  edition: lxx-swete-1909
  text: καὶ διʼ αὐτοὺς εἰρήνευσεν τὸ ἔθνος, καὶ τὴν εὐνομίαν τὴν ἐπὶ τῆς πατρίδος
    ἀνανεωσάμενος, ἐκπεπολιόρκηκε τοὺς πολεμίους.
  language: Greek
  pages:
  - 752
  - 782
  - 783
  - 784
  - 785
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: And because of them the nation was at peace, and, having renewed the good
    order in the homeland, it has driven the enemies completely out by siege.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through them'; the Greek can express causation or instrumentality.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb behind 'has driven completely out by siege' is intensive
      and built on 'besiege'; it may also be understood more literally as 'has utterly
      besieged the enemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ αὐτοὺς
  chosen: because of them
  alternatives:
  - through them
  - on account of them
  lexicon: LSJ
  rationale: διά with the accusative here most naturally expresses cause or agency
    mediated through the martyrs' action. 'Because of them' is idiomatic and preserves
    the causal force without over-specifying mechanism.
- source_word: εἰρήνευσεν
  chosen: was at peace
  alternatives:
  - made peace
  - enjoyed peace
  lexicon: LSJ
  rationale: The verb can mean to live in peace or be at peace. With τὸ ἔθνος as subject,
    'the nation was at peace' reads naturally in English and avoids implying a diplomatic
    treaty more strongly than the Greek requires.
- source_word: τὸ ἔθνος
  chosen: the nation
  alternatives:
  - the people
  lexicon: LSJ
  rationale: ἔθνος here refers to the Jewish national community. 'Nation' best preserves
    the collective-political sense in context.
- source_word: εὐνομίαν
  chosen: the good order
  alternatives:
  - lawfulness
  - good governance
  - orderly rule
  lexicon: LSJ
  rationale: εὐνομία denotes a state of good order under sound law. 'Good order' is
    readable modern English and avoids narrowing the sense either to abstract legality
    or to governmental administration alone.
- source_word: τὴν ἐπὶ τῆς πατρίδος
  chosen: in the homeland
  alternatives:
  - throughout the homeland
  - over the homeland
  - in the fatherland
  lexicon: LSJ
  rationale: The phrase locates the renewed εὐνομία with respect to the ancestral
    land. 'In the homeland' is natural English and preserves the patriotic sense of
    πατρίς.
- source_word: ἀνανεωσάμενος
  chosen: having renewed
  alternatives:
  - restoring
  - renewing afresh
  lexicon: LSJ
  rationale: The participle indicates prior or attendant action. 'Having renewed'
    keeps the verbal aspect and links the restoration of order to the following military
    outcome.
- source_word: ἐκπεπολιόρκηκε
  chosen: has driven completely out by siege
  alternatives:
  - has utterly besieged
  - has blockaded and expelled
  - has hemmed in completely
  lexicon: LSJ
  rationale: The perfect form of ἐκπολιορκέω carries an intensive sense built on πολιορκέω
    ('besiege'). In context with τοὺς πολεμίους as object, the sense is not merely
    that the enemies were besieged, but that they were thoroughly forced out/overcome
    by siege. The chosen rendering preserves both the siege imagery and the resultative
    force.
- source_word: τοὺς πολεμίους
  chosen: the enemies
  alternatives:
  - the hostile forces
  - the foes
  lexicon: LSJ
  rationale: Standard rendering; it fits the military context and remains transparent.
