theological_decisions:
- issue: Causal significance of the martyrs in national deliverance
  chosen_reading: The verse states that peace and restored order came because of them,
    without specifying a full doctrine of atonement in this verse itself.
  alternative_readings:
  - The phrase could be read more instrumentally as 'through them'
  rationale: The immediate Greek affirms their causal role in the nation's peace and
    restoration. This verse should not be made to say less than that, but neither
    should it import a fuller sacrificial theology from nearby verses into this line
    alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
