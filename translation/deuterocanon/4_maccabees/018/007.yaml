translation:
  text: For I remained a pure virgin, and I did not go beyond my father's house; rather,
    I guarded the rib that had been built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I did not transgress the bounds of my father's house.' The Greek expression
      may imply both literal remaining within the paternal household and moral restraint.
    reason: alternative_reading
  - marker: b
    text: Or 'the side that had been built.' The phrase likely echoes the creation
      of woman from Adam's side/rib in Genesis, here used as a modest metaphor for
      preserved chastity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγενήθην
  chosen: remained
  alternatives:
  - became
  - was
  lexicon: BDAG
  rationale: Although the verb is literally 'became,' in context the speaker is describing
    her maintained state of chastity up to marriage, so idiomatic English 'remained'
    best conveys the sense without implying a change into virginity.
- source_word: παρθένος ἁγνή
  chosen: a pure virgin
  alternatives:
  - a chaste virgin
  - a holy virgin
  lexicon: BDAG
  rationale: παρθένος denotes 'virgin,' and ἁγνή here carries the moral sense of sexual
    purity/chastity rather than cultic holiness. 'Pure virgin' is natural English
    and preserves both elements.
- source_word: οὐχ ὑπερέβην
  chosen: I did not go beyond
  alternatives:
  - I did not transgress
  - I did not leave
  lexicon: BDAG
  rationale: The verb literally means 'go beyond/overstep.' In this domestic-moral
    context it likely refers to not overstepping the bounds of the paternal household.
    'Go beyond' preserves the metaphor and avoids overinterpreting as either physical
    departure or moral transgression alone.
- source_word: πατρικὸν οἶκον
  chosen: my father's house
  alternatives:
  - the paternal house
  - my ancestral home
  lexicon: BDAG
  rationale: A natural rendering of the idiom for the father's household. The possessive
    'my' is supplied in English because the first-person context makes it explicit.
- source_word: ἐφύλασσον
  chosen: I guarded
  alternatives:
  - I kept
  - I protected
  lexicon: BDAG
  rationale: The imperfect conveys ongoing action. 'Guarded' fits the metaphorical
    language of preserving chastity and is slightly stronger than 'kept.'
- source_word: τὴν ᾠκοδομημένην πλευράν
  chosen: the rib that had been built
  alternatives:
  - the side that had been built
  - the built rib
  lexicon: LSJ
  rationale: πλευρά ordinarily means 'side' or 'rib.' Here the phrase strongly echoes
    the creation of woman from Adam's rib/side (using οἰκοδομέω, 'build'), so 'rib'
    best preserves the allusion and the speaker's reference to her womanly body/chastity.
    'That had been built' reflects the perfect participle and keeps the Genesis resonance.
