theological_decisions:
- issue: Interpretation of the Genesis allusion in 'the rib that had been built'
  chosen_reading: Retain the metaphor in the main text without explicating it as a
    euphemism for virginity.
  alternative_readings:
  - Paraphrase as 'I preserved my chastity'
  - Render πλευρά as 'side' instead of 'rib'
  rationale: The Greek uses unusual, allusive language rather than a plain statement.
    Preserving the metaphor respects the source text's literary texture and avoids
    importing a more explicit sexual paraphrase than the wording itself provides.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Force of 'did not go beyond my father's house'
  chosen_reading: Keep the phrase as a bounded-household expression rather than resolving
    it into a specific claim about seclusion or obedience.
  alternative_readings:
  - '''I did not leave my father''s house'''
  - '''I did not transgress the bounds of my father''s house'''
  rationale: The Greek can suggest both literal remaining within the paternal household
    and moral non-transgression of its bounds. The translation preserves that tension
    rather than collapsing it into one interpretation.
  doctrine_reference: Translation philosophy §3
