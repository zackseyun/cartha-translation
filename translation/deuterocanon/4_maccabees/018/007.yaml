  text: ὅτι Ἐγὼ ἐγενήθην παρθένος ἁγνή, καὶ οὐχ ὑπερέβην πατρικὸν οἶκον· ἐφύλασσον
    δὲ τὴν ᾠκοδομημένην πλευράν.
