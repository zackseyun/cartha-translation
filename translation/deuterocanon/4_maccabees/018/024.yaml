translation:
  text: to whom be the glory forever and ever. Amen.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ᾧ
  chosen: to whom
  alternatives:
  - to him
  - unto whom
  lexicon: LSJ
  rationale: Dative relative pronoun introducing a doxological ascription; 'to whom'
    preserves the relative construction naturally in English.
- source_word: ἡ δόξα
  chosen: the glory
  alternatives:
  - glory
  - honor
  lexicon: LSJ
  rationale: Standard doxological term meaning 'glory.' The article is retained idiomatically
    in English as part of the fixed ascription 'be the glory.' 'Honor' is possible
    but weaker and less conventional for δόξα in worship language.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - for the ages of ages
  - unto the ages of the ages
  lexicon: LSJ
  rationale: Semitic/Greek idiom for unending duration. 'Forever and ever' is the
    clearest natural English equivalent while preserving the superlative force of
    the expression.
- source_word: ἀμήν
  chosen: Amen
  alternatives:
  - truly
  - so be it
  lexicon: LSJ
  rationale: Conventional liturgical transliteration is preferable here; it preserves
    the solemn closing formula better than a paraphrastic rendering.
