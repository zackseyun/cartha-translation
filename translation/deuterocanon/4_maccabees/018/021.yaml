translation:
  text: He gouged out the pupils of their eyes, cut out their tongues, and killed
    them with various tortures.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰς τῶν ὀμμάτων κόρας
  chosen: the pupils of their eyes
  alternatives:
  - the apples of their eyes
  - their eyeballs
  lexicon: LSJ
  rationale: κόραι in this anatomical context refers to the pupils/centers of the
    eyes. 'Pupils of their eyes' is precise and natural in modern English; 'apples
    of their eyes' would import an idiomatic sense not intended here, and 'eyeballs'
    is less exact.
- source_word: ἐπήρωσεν
  chosen: gouged out
  alternatives:
  - maimed
  - blinded
  - mutilated
  lexicon: LSJ
  rationale: The verb denotes disabling or mutilating; with the direct object 'the
    pupils of their eyes,' the sense is specifically violent destruction of sight.
    'Gouged out' makes the brutality explicit and fits the object better than the
    more general 'maimed' or the result-focused 'blinded'.
- source_word: γλώσσας ἐξέτεμεν
  chosen: cut out their tongues
  alternatives:
  - cut off their tongues
  - excised their tongues
  lexicon: LSJ
  rationale: ἐκτέμνω means to cut out or excise. 'Cut out their tongues' is the most
    straightforward idiomatic English rendering and preserves the physical violence.
- source_word: βασάνοις ποικίλαις
  chosen: with various tortures
  alternatives:
  - by various torments
  - with diverse instruments of torture
  lexicon: LSJ
  rationale: βάσανοι are tortures/torments, and ποικίλαις means various/diverse. 'With
    various tortures' keeps the instrumental dative sense and remains readable.
- source_word: ἀπέκτεινεν
  chosen: killed them
  alternatives:
  - put them to death
  - slew them
  lexicon: LSJ
  rationale: The verb is the standard term for killing. 'Killed them' is direct, modern,
    and unembellished; the object 'them' is supplied naturally from context in English
    though not repeated explicitly in Greek.
