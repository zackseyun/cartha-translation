theological_decisions:
- issue: Identity and rhetorical function of exemplary figures
  chosen_reading: The verse presents Phinehas and the three youths as ongoing moral
    instructors through their remembered example.
  alternative_readings:
  - The verbs could be taken as vivid historical imperfects with little emphasis on
    ongoing exemplary force.
  rationale: The imperfect verbs in this context naturally support a rhetorical portrayal
    of these scriptural figures as continuing to 'speak' and 'teach' the audience
    through their stories. This is a literary-theological nuance drawn from the Greek
    aspect, not an added doctrinal claim.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
