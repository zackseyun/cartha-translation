id: 4MA.18.12
reference: 4 Maccabees 18:12
source:
  edition: lxx-swete-1909
  text: ἔλεγεν δὲ ἡμῖν τὸν ζηλωτὴν Φινεές, ἐδίδασκεν δὲ ὑμᾶς τοὺς ἐν πυρὶ Ἀνανίαν
    καὶ Ἀζαρίαν καὶ Μισαήλ.
  language: Greek
