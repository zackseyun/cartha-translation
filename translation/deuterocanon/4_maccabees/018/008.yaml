id: 4MA.18.8
reference: 4 Maccabees 18:8
source:
  edition: lxx-swete-1909
  text: οὐ διέφθειρέν με λυμεὼν τῆς ἐρημίας φθορεὺς ἐν πεδίῳ· οὐδὲ ἐλυμήνατό μου τὰ
    ἁγνὰ τῆς παρθενίας λυμεὼν ἀπάτης ὄφις· ἔμεινα δὲ χρόνον ἀκμῆς σὺν ἀνδρί.
  language: Greek
