theological_decisions:
- issue: Meaning of θείας μερίδος
  chosen_reading: a divine share
  alternative_readings:
  - a portion from God
  - a share in the divine
  - a divine portion
  rationale: The Greek allows either an allotment bestowed by God or participation
    in a divine portion/state. The chosen rendering intentionally preserves this theological
    openness rather than resolving it into a more doctrinally loaded expression such
    as heavenly reward or deification.
  doctrine_reference: Preserve theological tension rather than resolve it.
