id: 4MA.18.3
reference: 4 Maccabees 18:3
source:
  edition: lxx-swete-1909
  text: ἀνθʼ ὧν διὰ τὴν εὐσέβειαν προεμενοι τὰ σώματα τοῖς πόνοις ἐκείνοι, οὐ μόνον
    ὑπὸ τῶν ἀνθρώπων ἐθαυμάσθησαν, ἀλλὰ καὶ θείας μερίδος κατηξιώθησαν.
  language: Greek
  pages:
  - 752
  - 782
  - 783
  - 784
  - 785
  - 786
  - 787
  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: For this reason, because of their godliness, when those men gave up their
    bodies to those sufferings, they were not only admired by men, but were also counted
    worthy of a divine share.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a portion from God' or 'a share in the divine.' The Greek phrase is
      concise and may refer either to a reward allotted by God or to participation
      in a divine portion.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνθʼ ὧν
  chosen: For this reason
  alternatives:
  - therefore
  - because of which
  lexicon: LSJ
  rationale: The idiom introduces an inference from the preceding context. 'For this
    reason' is natural English and preserves the causal-consequential force better
    than a wooden 'instead of which' or overly formal 'wherefore.'
- source_word: διὰ τὴν εὐσέβειαν
  chosen: because of their godliness
  alternatives:
  - because of piety
  - for the sake of reverence
  lexicon: BDAG
  rationale: εὐσέβεια in 4 Maccabees is a key virtue denoting reverent devotion to
    God and the law. 'Godliness' is accessible modern English and keeps the explicitly
    religious sense better than the potentially narrower 'piety.'
- source_word: προεμενοι
  chosen: gave up
  alternatives:
  - surrendered
  - offered up
  - let go of
  lexicon: LSJ
  rationale: The participle conveys yielding or handing over. 'Gave up' fits the martyrdom
    context without importing sacrificial terminology too strongly; 'offered up' would
    risk over-interpreting the act as cultic.
- source_word: τὰ σώματα
  chosen: their bodies
  alternatives:
  - their bodily selves
  lexicon: BDAG
  rationale: A straightforward rendering of the accusative object. The possessive
    is supplied naturally in English from context.
- source_word: τοῖς πόνοις
  chosen: to those sufferings
  alternatives:
  - to those pains
  - to torments
  lexicon: BDAG
  rationale: πόνοι can denote pains or sufferings. 'Sufferings' is broad and idiomatic
    here, while the demonstrative 'those' preserves ἐκείνοι's backward-pointing emphasis
    to the previously described ordeals.
- source_word: ἐκείνοι
  chosen: those
  alternatives:
  - those very
  - the aforementioned
  lexicon: LSJ
  rationale: The demonstrative points to the specific sufferings already narrated.
    'Those' is sufficient in the main text; stronger emphasis can be conveyed by context
    without awkward English.
- source_word: οὐ μόνον ... ἀλλὰ καὶ
  chosen: not only ... but also
  alternatives:
  - not merely ... but even
  lexicon: BDAG
  rationale: This correlative structure is standard and should be preserved clearly
    in English.
- source_word: ὑπὸ τῶν ἀνθρώπων
  chosen: by men
  alternatives:
  - by people
  - by human beings
  lexicon: BDAG
  rationale: The Greek is literally 'by humans/men.' Because the contrast is with
    divine approval in the next clause, 'by men' preserves the human-versus-divine
    contrast succinctly. It is not specifically male-only here, but the traditional
    representative sense is acceptable under the project's gender-accurate policy.
- source_word: ἐθαυμάσθησαν
  chosen: were admired
  alternatives:
  - were marveled at
  - were held in wonder
  lexicon: BDAG
  rationale: The passive indicates that people regarded them with admiration or wonder.
    'Were admired' is idiomatic and clear.
- source_word: θείας μερίδος
  chosen: a divine share
  alternatives:
  - a portion from God
  - a divine portion
  - a share in what is divine
  lexicon: LSJ
  rationale: The phrase is somewhat compressed and can suggest participation in or
    allotment from the divine realm. 'A divine share' preserves the ambiguity without
    over-specifying whether the sense is inheritance, participation, or reward from
    God.
- source_word: κατηξιώθησαν
  chosen: were counted worthy of
  alternatives:
  - were deemed worthy of
  - were granted the honor of
  lexicon: BDAG
  rationale: The verb means to consider or declare worthy. 'Were counted worthy of'
    preserves the evaluative sense and fits the elevated register of the sentence.
