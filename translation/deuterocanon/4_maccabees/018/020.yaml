theological_decisions:
- issue: Rhetorical paradox in καὶ οὐ πικρᾶς
  chosen_reading: and yet not bitter
  alternative_readings:
  - and not bitter
  - though not bitter
  rationale: 'The Greek juxtaposes grief and honor: the day was bitter in suffering
    yet, from the martyrdom context, not bitter in moral or spiritual outcome. The
    translation preserves the tension rather than resolving it into a single explanatory
    paraphrase.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Meaning of καταπέλτης in martyrdom context
  chosen_reading: catapult
  alternative_readings:
  - rack
  - engine of torture
  rationale: The lexical default of the Greek term is retained in the main text to
    stay anchored to the source, while a footnote preserves the probable contextual
    sense as a torture device. This avoids overconfident reinterpretation while still
    informing the reader.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
