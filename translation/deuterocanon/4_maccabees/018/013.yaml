theological_decisions:
- issue: Relation of the verse's praise language to Daniel
  chosen_reading: The verse states that the subject glorified and called Daniel blessed,
    using elevated honor language without implying worship.
  alternative_readings:
  - The first verb could be softened to 'honored' to avoid possible misunderstanding.
  rationale: Because δοξάζω can sound strongly theological in English, there is a
    risk of overreading the line as worship of Daniel. The Greek, however, straightforwardly
    uses exalted praise language in a rhetorical catalogue of exemplars. Retaining
    'glorified' preserves the source's force while the rest of the wording keeps the
    human referent clear.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
