translation:
  text: And he also glorified Daniel in the lions’ pit, whom he also called blessed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the lions’ den.' The Greek literally says 'in the pit of lions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόξαζεν
  chosen: glorified
  alternatives:
  - honored
  - praised
  lexicon: BDAG
  rationale: The imperfect of δοξάζω commonly means to glorify, honor, or praise.
    Here the object is Daniel, not God, so 'glorified' may sound unusual in English,
    but it preserves the elevated rhetoric of the Greek and matches the author's encomiastic
    style better than the flatter 'honored.'
- source_word: ἐν λάκκῳ λεόντων
  chosen: in the lions’ pit
  alternatives:
  - in the lions’ den
  lexicon: LSJ
  rationale: λάκκος is literally a pit or cistern. 'Lions’ den' is the familiar idiom
    from Daniel traditions, but 'pit' more closely reflects the Greek noun while remaining
    natural English.
- source_word: ἐμακάριζεν
  chosen: called blessed
  alternatives:
  - counted blessed
  - pronounced blessed
  - blessed
  lexicon: BDAG
  rationale: μακαρίζω means to call or consider someone blessed. 'Called blessed'
    preserves the verbal force without collapsing it into a simple adjective or importing
    a liturgical sense.
- source_word: καὶ ... καί
  chosen: also ... also
  alternatives:
  - both ... and
  - indeed ... also
  lexicon: LSJ
  rationale: The repeated καί links this clause with the surrounding series and adds
    emphasis. Rendering both instances as 'also' preserves the cumulative rhetorical
    effect.
- source_word: ὃν
  chosen: whom
  alternatives:
  - and him
  - who
  lexicon: BDAG
  rationale: The relative pronoun refers back to Daniel and introduces the second
    predicate. 'Whom' keeps the syntax clear and slightly elevated, fitting the style
    of the passage.
