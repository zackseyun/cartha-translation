theological_decisions:
- issue: Rendering σωτήριον in a martyrdom context
  chosen_reading: bringing deliverance
  alternative_readings:
  - bringing salvation
  - saving
  rationale: In 4 Maccabees the immediate contrast is between death and preservation/vindication
    in relation to the children's faithful endurance. 'Deliverance' preserves the
    semantic force without over-specifying a doctrinal sense not explicit in this
    clause alone.
