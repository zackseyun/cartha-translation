translation:
  text: a mother holding two ballots on behalf of her children, one bringing death
    and one bringing deliverance,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two votes' or, more literally, 'two pebbles,' since ψῆφος originally
      referred to a pebble used in voting.
    reason: lexical_alternative
lexical_decisions:
- source_word: δύο
  chosen: two
  lexicon: LSJ
  rationale: Straightforward cardinal numeral modifying ψήφους.
- source_word: ψήφους
  chosen: ballots
  alternatives:
  - votes
  - pebbles
  - verdicts
  lexicon: LSJ
  rationale: ψῆφος literally denotes a pebble used for voting, and by extension a
    vote or ballot. In this metaphorical context, 'ballots' preserves the image of
    a decisive choice better than the more abstract 'verdicts' or the overly literal
    'pebbles'.
- source_word: κρατοῦσα
  chosen: holding
  alternatives:
  - grasping
  - having in hand
  lexicon: LSJ
  rationale: Present participle describing the mother as possessing or holding these
    two ψῆφοι. 'Holding' is natural English and preserves the concrete imagery.
- source_word: μήτηρ
  chosen: a mother
  alternatives:
  - mother
  lexicon: LSJ
  rationale: Anarthrous noun used predicatively/appositionally in the clause; 'a mother'
    works idiomatically in English while retaining the maternal emphasis.
- source_word: θανατηφόρον
  chosen: bringing death
  alternatives:
  - deadly
  - death-bearing
  - fatal
  lexicon: LSJ
  rationale: The adjective means 'death-bringing' or 'deadly.' Because it is paired
    with σωτήριον and modifies an implied ψῆφον, 'bringing death' makes the contrast
    explicit and readable.
- source_word: σωτήριον
  chosen: bringing deliverance
  alternatives:
  - saving
  - salvific
  - bringing salvation
  lexicon: LSJ
  rationale: The adjective denotes something saving or preserving. 'Bringing deliverance'
    avoids importing later technical soteriological language too strongly while preserving
    the life-saving contrast with θανατηφόρον.
- source_word: ὑπὲρ τέκνων
  chosen: on behalf of her children
  alternatives:
  - for her children
  - concerning her children
  lexicon: LSJ
  rationale: 'ὑπέρ here indicates relation/advantage: the mother''s decisive choice
    concerns and is made for the sake of her children. ''On behalf of her children''
    best captures that representative nuance.'
