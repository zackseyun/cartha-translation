theological_decisions:
- issue: Metaphorical force of maternal childbirth language applied to εὐσέβεια
  chosen_reading: 'Retain the childbirth metaphor literally: ''gave birth to complete
    godliness'''
  alternative_readings:
  - brought complete godliness to birth
  - produced perfect piety
  rationale: The Greek explicitly uses childbirth language, and 4 Maccabees strongly
    develops the mother's role through maternal imagery. Preserving the metaphor avoids
    flattening the rhetoric into a mere abstraction like 'produced.'
