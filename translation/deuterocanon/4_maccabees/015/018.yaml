translation:
  text: O only woman who gave birth to complete godliness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unique woman' or 'woman alone.' The Greek stresses that she stands singular
      among women in this display of devotion.
    reason: lexical_alternative
  - marker: b
    text: Or 'piety.' The Greek εὐσέβεια is a key term in 4 Maccabees for devout fidelity
      toward God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ
  chosen: O
  alternatives:
  - Oh
  lexicon: LSJ
  rationale: Vocative exclamation introducing an address; 'O' preserves the elevated
    rhetorical tone better than the more colloquial 'Oh'.
- source_word: μόνη
  chosen: only
  alternatives:
  - alone
  - unique
  lexicon: LSJ
  rationale: With γύναι in vocative address, the sense is that she is the sole/unique
    woman of this kind. 'Only' is concise and preserves the superlative force.
- source_word: γύναι
  chosen: woman
  alternatives:
  - wife
  - lady
  lexicon: LSJ
  rationale: Vocative singular of γυνή. In this context it addresses her as a woman/mother,
    not specifically as a wife. 'Woman' is the most direct and source-faithful rendering.
- source_word: τὴν εὐσέβειαν
  chosen: godliness
  alternatives:
  - piety
  - reverence
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees often denotes devout fidelity toward God. 'Godliness'
    is readable modern English and retains explicit God-directed religious weight
    better than the somewhat narrower 'piety'.
- source_word: ὁλόκληρον
  chosen: complete
  alternatives:
  - whole
  - entire
  - perfect
  lexicon: LSJ
  rationale: Modifies εὐσέβειαν and emphasizes wholeness or integrity. 'Complete'
    communicates full, undivided godliness in idiomatic English.
- source_word: ἀποκυήσασα
  chosen: gave birth to
  alternatives:
  - brought forth
  - bore
  lexicon: LSJ
  rationale: Aorist participle from ἀποκυέω, literally to give birth or bring forth.
    Because the verse metaphorically portrays the mother as having 'birthed' godliness
    through her sons and example, 'gave birth to' preserves the maternal imagery most
    clearly.
