lexical_decisions:
- source_word: σάρκας
  chosen: flesh
  alternatives:
  - bodies
  - pieces of flesh
  lexicon: LSJ
  rationale: Plural of σάρξ. In this martyrdom context it refers concretely to torn
    flesh rather than the more abstract 'body' or Pauline metaphorical uses. 'Flesh'
    preserves the visceral force of the Greek.
- source_word: ὥσπερ
  chosen: like
  alternatives:
  - as
  - just as
  lexicon: LSJ
  rationale: Introduces a comparison. 'Like' is the most natural concise English equivalent
    here.
- source_word: προσωπεῖα
  chosen: masks
  alternatives:
  - faces
  - visors
  lexicon: LSJ
  rationale: 'The noun ordinarily denotes masks or dramatic faces, not literal human
    faces here. ''Masks'' best preserves the shocking simile: their flayed flesh was
    set out as though it were theatrical masks.'
- source_word: προκειμένας
  chosen: lying before them
  alternatives:
  - set before them
  - laid out before them
  - placed in front of them
  lexicon: LSJ
  rationale: From πρόκειμαι, 'to lie before, be set forth.' Because the participle
    modifies σάρκας and the scene is descriptive, 'lying before them' gives natural
    English while retaining the visual sense of something laid out in front.
