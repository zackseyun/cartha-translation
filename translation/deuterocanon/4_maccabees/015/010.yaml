  text: δίκαιοί τε γὰρ ἦσαν καὶ σώφρονες, καὶ ἀνδρεῖοι καὶ μεγαλόψυχοι καὶ φιλάδελφοι,
    καὶ φιλόμητρος οὕτως, ὥστε καὶ μέχρι θανάτου τὰ νόμιμα φυλάσσοντας πείθεσθαι αὐτῇ.
