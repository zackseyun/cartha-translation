translation:
  text: For they were righteous and self-controlled, brave and noble-minded and loving
    their brothers, and so devoted to their mother that, even while keeping the law's
    requirements to the point of death, they obeyed her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'loving their mother.' The Greek adjective can be rendered more literally,
      but 'devoted to their mother' brings out the sense of affectionate loyalty in
      context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the lawful ordinances' or 'the customs prescribed by the law' for 'the
      law's requirements.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιοι
  chosen: righteous
  alternatives:
  - just
  lexicon: LSJ
  rationale: In this virtue list, δίκαιοι denotes moral uprightness. 'Righteous' preserves
    the ethical-religious force better than the more civic-sounding 'just'.
- source_word: σώφρονες
  chosen: self-controlled
  alternatives:
  - temperate
  - prudent
  lexicon: LSJ
  rationale: The term commonly denotes sound-minded restraint and mastery of desires.
    'Self-controlled' is clear modern English and fits the catalog of virtues.
- source_word: ἀνδρεῖοι
  chosen: brave
  alternatives:
  - courageous
  - manly
  lexicon: LSJ
  rationale: The word refers to courage. 'Brave' is idiomatic and avoids importing
    gendered overtones from 'manly' that are not required in English here.
- source_word: μεγαλόψυχοι
  chosen: noble-minded
  alternatives:
  - magnanimous
  - great-souled
  lexicon: LSJ
  rationale: The Greek literally suggests greatness of soul. 'Noble-minded' communicates
    elevated character in readable English; 'magnanimous' is possible but less transparent
    for many readers.
- source_word: φιλάδελφοι
  chosen: loving their brothers
  alternatives:
  - brother-loving
  - affectionate toward their siblings
  lexicon: LSJ
  rationale: The compound denotes affection for brothers. Because the context is the
    seven brothers, 'loving their brothers' is more precise than a generalized 'loving
    their siblings.'
- source_word: φιλόμητρος
  chosen: devoted to their mother
  alternatives:
  - loving their mother
  - mother-loving
  lexicon: LSJ
  rationale: The adjective expresses affectionate loyalty toward one's mother. 'Devoted
    to their mother' captures both affection and allegiance in context.
- source_word: μέχρι θανάτου
  chosen: to the point of death
  alternatives:
  - until death
  - even to death
  lexicon: LSJ
  rationale: The phrase marks the extremity of their fidelity under persecution. 'To
    the point of death' expresses that limit naturally in English.
- source_word: τὰ νόμιμα
  chosen: the law's requirements
  alternatives:
  - the lawful ordinances
  - the customs prescribed by the law
  lexicon: LSJ
  rationale: In this Maccabean context the phrase refers to the prescriptions of the
    ancestral law. 'The law's requirements' is concise and clear without over-specifying
    ritual or civil aspects.
- source_word: φυλάσσοντας
  chosen: keeping
  alternatives:
  - observing
  - guarding
  lexicon: LSJ
  rationale: With τὰ νόμιμα, the participle means observing or keeping prescribed
    requirements. 'Keeping' is idiomatic and suitably direct.
- source_word: πείθεσθαι αὐτῇ
  chosen: they obeyed her
  alternatives:
  - they listened to her
  - they were persuaded by her
  lexicon: LSJ
  rationale: Middle/passive πείθομαι can mean obey or comply with someone. In this
    context of filial loyalty and exhortation, 'obeyed her' best fits the sense of
    responsive submission to their mother.
