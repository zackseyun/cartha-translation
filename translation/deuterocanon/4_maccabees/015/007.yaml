id: 4MA.15.7
reference: 4 Maccabees 15:7
source:
  edition: lxx-swete-1909
  text: καὶ διὰ πολλὰς τὰς καθʼ ἕκαστον αὐτῶν ὠδῖνας ἠναγκασμένην τὴν εἰς αὐτοὺς ἔχειν
    συμπάθειαν,
  language: Greek
  pages:
  - 752
  - 776
  - 777
  - 778
  - 779
  - 780
  - 781
  - 786
  - 787
  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: and because of the many pangs of each one of them, she was compelled to have
    sympathy for them,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὰ
  chosen: because of
  alternatives:
  - through
  - on account of
  lexicon: LSJ
  rationale: With the accusative πολλὰς ... ὠδῖνας, διὰ expresses cause/reason here
    rather than instrument, so 'because of' best fits the syntax and sense.
- source_word: πολλὰς ... ὠδῖνας
  chosen: the many pangs
  alternatives:
  - the many pains
  - the many birth-pangs
  - the many sufferings
  lexicon: LSJ
  rationale: ὠδίνες denotes severe pains, often birth-pangs, but here refers more
    generally to acute sufferings endured by the sons under torture. 'Pangs' preserves
    the intensity without over-specifying childbirth imagery in the main text.
- source_word: καθʼ ἕκαστον αὐτῶν
  chosen: that each one of them suffered
  alternatives:
  - of each one of them
  - belonging to each of them
  - for each one of them
  lexicon: LSJ
  rationale: 'The phrase modifies the pains distributively: the pains pertaining to
    each individual son. English idiom requires expansion; ''that each one of them
    suffered'' makes the distributive force clear.'
- source_word: ἠναγκασμένην
  chosen: she was compelled
  alternatives:
  - being forced
  - constrained
  lexicon: LSJ
  rationale: The participial form conveys compulsion or necessity. Rendering it verbally
    in English gives a natural clause while preserving the sense of inward constraint.
- source_word: τὴν εἰς αὐτοὺς ἔχειν συμπάθειαν
  chosen: to feel sympathy for them
  alternatives:
  - to have compassion for them
  - to have fellow-feeling toward them
  lexicon: LSJ
  rationale: συμπάθεια is fellow-feeling or sympathy. 'Feel sympathy for them' is
    idiomatic modern English and preserves the emotional sense of the expression ἔχειν
    συμπάθειαν εἰς αὐτούς.
