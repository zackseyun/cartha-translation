translation:
  text: For just as, in her own soul as in a council chamber, she saw fearsome counselors—nature
    and birth and motherly love and the torture of her children—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'the rack of her children,' with 'rack' standing for
      their torture by metonymy.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ γὰρ
  chosen: For just as
  alternatives:
  - For as
  - Just as
  lexicon: LSJ
  rationale: Introduces an explanatory comparison with slightly emphatic force; 'For
    just as' preserves both the connective and comparative sense.
- source_word: ἐν βουλευτηρίῳ
  chosen: as in a council chamber
  alternatives:
  - in a council chamber
  - in a deliberative chamber
  lexicon: LSJ
  rationale: βουλευτήριον denotes a council hall or place of deliberation. Because
    the phrase is metaphorical with ψυχῇ, 'as in a council chamber' makes the simile
    explicit in natural English.
- source_word: τῇ ἑαυτῆς ψυχῇ
  chosen: in her own soul
  alternatives:
  - in her own mind
  - within herself
  lexicon: LSJ
  rationale: ψυχή here refers to the inner self as the seat of deliberation. 'Soul'
    preserves the anthropological weight of the Greek better than the flatter 'mind,'
    while 'her own' reflects ἑαυτῆς.
- source_word: δεινοὺς ... συμβούλους
  chosen: fearsome counselors
  alternatives:
  - terrible counselors
  - formidable advisers
  lexicon: LSJ
  rationale: δεινός can mean terrible, fearsome, formidable. In context these are
    powerful internal pressures confronting the mother; 'fearsome counselors' preserves
    the deliberative metaphor with vivid force.
- source_word: ὁρῶσα
  chosen: she saw
  alternatives:
  - seeing
  - beholding
  lexicon: LSJ
  rationale: A participle modifying the implied subject; rendered as a finite verb
    in English for readability while preserving the sense.
- source_word: φύσιν
  chosen: nature
  alternatives:
  - natural instinct
  lexicon: LSJ
  rationale: φύσις here points to natural impulse or constitution. 'Nature' is concise
    and leaves the broader force intact.
- source_word: γένεσιν
  chosen: birth
  alternatives:
  - parentage
  - the fact of giving birth
  - kinship
  lexicon: LSJ
  rationale: In this maternal context γένεσις likely refers to generation/birth, the
    bond arising from having borne the children. 'Birth' is compact and fits the list
    of internal appeals.
- source_word: φιλοτεκνίαν
  chosen: motherly love
  alternatives:
  - love for her children
  - affection for her children
  lexicon: LSJ
  rationale: The term denotes affection for one's children. Since the subject is the
    mother, 'motherly love' is idiomatic and contextually precise without adding new
    content.
- source_word: τέκνων στρέβλαν
  chosen: the torture of her children
  alternatives:
  - the rack of her children
  - the torment of her children
  lexicon: LSJ
  rationale: στρέβλα literally refers to an instrument of torture, especially the
    rack, but here likely stands metonymically for the children's torture. 'The torture
    of her children' communicates the sense clearly in modern English; the more literal
    'rack' is preserved as an alternative.
