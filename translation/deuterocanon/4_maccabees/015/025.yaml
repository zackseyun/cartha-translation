reference: 4 Maccabees 15:25
source:
  edition: lxx-swete-1909
  text: καθάπερ γὰρ ἐν βουλευτηρίῳ τῇ ἑαυτῆς ψυχῇ δεινοὺς ὁρῶσα συμβούλους, φύσιν
    καὶ γένεσιν καὶ φιλοτεκνίαν καὶ τέκνων στρέβλαν,
  language: Greek
