theological_decisions:
- issue: Rendering λογισμός in a philosophically charged context
  chosen_reading: her reason
  alternative_readings:
  - her rational judgment
  - her resolve
  rationale: 4 Maccabees emphasizes the supremacy of reason over passions. Rendering
    λογισμός as 'reason' preserves that thematic and philosophical claim without importing
    later doctrinal categories. 'Resolve' would underplay the explicit rational dimension.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
