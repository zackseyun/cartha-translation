theological_decisions:
- issue: Rendering θεοσεβοῦς with explicit God-reference
  chosen_reading: who feared God
  alternative_readings:
  - godly Abraham
  - devout Abraham
  - God-fearing Abraham
  rationale: The Greek explicitly contains θεο- ('God'), so the translation preserves
    that reference rather than using the broader English adjective 'godly.' This is
    a lexical-theological choice because Abraham is presented as a model of piety
    before God, not merely generic virtue.
  doctrine_reference: Translation philosophy §1, §6
