translation:
  text: But the daughter remembered the steadfastness of Abraham, who feared God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the godly Abraham' or 'Abraham the God-fearing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - rather
  - yet
  lexicon: LSJ
  rationale: Adversative conjunction marking contrast with the preceding context;
    'But' is the most natural concise English equivalent.
- source_word: θεοσεβοῦς
  chosen: who feared God
  alternatives:
  - godly
  - devout
  - God-fearing
  lexicon: LSJ
  rationale: The adjective means reverent toward God, pious, or God-fearing. Because
    it modifies Ἀβραὰμ and is in attributive position, English can render either adjectivally
    ('godly Abraham') or with a relative phrase. 'Who feared God' preserves the explicit
    God-reference and avoids the slightly flattened modern sense of 'godly'.
- source_word: Ἀβραὰμ
  chosen: Abraham
  rationale: Standard English transliteration of the personal name.
- source_word: καρτερίας
  chosen: steadfastness
  alternatives:
  - endurance
  - fortitude
  - perseverance
  lexicon: LSJ
  rationale: The noun denotes endurance, steadfastness, or fortitude under pressure.
    'Steadfastness' fits the moral-exemplary context and preserves the sense of resolute
    constancy.
- source_word: θυγάτηρ
  chosen: the daughter
  alternatives:
  - his daughter
  lexicon: LSJ
  rationale: The Greek has the articular noun 'the daughter' without an explicit possessive.
    English can keep the definiteness without adding 'his,' which would go beyond
    the wording.
- source_word: ἐμνήσθη
  chosen: remembered
  alternatives:
  - called to mind
  - recalled
  lexicon: LSJ
  rationale: Aorist middle of μιμνῄσκομαι, meaning to remember or call to mind. 'Remembered'
    is the plain and sufficient rendering.
