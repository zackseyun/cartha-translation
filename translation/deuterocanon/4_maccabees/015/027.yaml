theological_decisions:
- issue: Sense of σωτηρία in a martyrdom context
  chosen_reading: temporal preservation/deliverance is in view, expressed as 'the
    salvation that was preserving seven sons for a little while'
  alternative_readings:
  - spiritual salvation in a broader theological sense
  - simple 'deliverance' with no broader resonance
  rationale: In context the mother reflects on the temporary preservation of her sons
    before their martyrdom. The Greek noun σωτηρία naturally allows 'salvation,' but
    the verse's temporal phrase shows that immediate preservation is the foregrounded
    sense. The translation keeps 'salvation' while clarifying its contextual force
    through the participle.
