translation:
  text: seeing on the flesh of her children the flesh of her children cut away, and
    on their hands hands being cut off, and on their heads heads being scalped off,
    and dead falling upon dead, and seeing the burial place of many of her children,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek at 'heads being scalped off' uses a rare and graphic verb; the
      exact nuance may also be rendered more generally as 'heads being cut/mutilated.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a common grave' / 'a mass grave' for 'the burial place of many of her
      children.'
    reason: lexical_alternative
  - marker: c
    text: The Greek text is rhetorically repetitive and somewhat compressed in this
      verse; the translation preserves that effect rather than smoothing it away.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπὶ σαρξὶν τέκνων
  chosen: on the flesh of her children
  alternatives:
  - upon the bodies of her children
  - on her children's flesh
  lexicon: LSJ
  rationale: ἐπί with the dative here is spatial ('on/upon'). σάρξ in this context
    is literal physical flesh, not metaphorical human nature. τέκνων is best taken
    as referring to the mother's children in context, so 'her children' makes the
    English intelligible.
- source_word: σάρκας τέκνων ἀποκεκομμένας
  chosen: the flesh of her children cut away
  alternatives:
  - pieces of her children's flesh cut off
  - the flesh of children having been cut off
  lexicon: LSJ
  rationale: The repeated σάρξ/τέκνα creates a grim rhetorical effect that should
    be preserved. ἀποκεκομμένας conveys flesh severed or cut away; 'cut away' is natural
    English while retaining the violence.
- source_word: ἐπὶ χερσὶν χεῖρας ἀποτεμνομένας
  chosen: on their hands hands being cut off
  alternatives:
  - upon their arms, hands being severed
  - hands cut off from their hands/arms
  lexicon: LSJ
  rationale: The Greek is highly repetitive and somewhat compressed. Retaining 'hands
    ... hands' reflects the rhetorical piling up. ἀποτεμνομένας means 'being cut off'
    or 'severed.' 'Their' is supplied from context to make the phrase readable.
- source_word: ἐπὶ κεφαλαῖς κεφαλὰς ἀποδειροτομουμένας
  chosen: on their heads heads being scalped off
  alternatives:
  - heads being flayed/cut from the neck
  - heads being beheaded
  - scalps being cut away from their heads
  lexicon: LSJ
  rationale: The compound verb is rare and graphically violent, involving cutting
    at the neck/skinning from the neck region. Given the immediate body-part catalogue
    and the phrase 'on their heads heads...', the sense is not simple decapitation
    but a gruesome mutilation. 'Scalped off' best captures the image without overexplaining,
    though the exact nuance is difficult.
- source_word: ἐπὶ νεκροῖς νεκροὺς πίπτοντας
  chosen: dead falling upon dead
  alternatives:
  - corpses falling on corpses
  - the dead falling on the dead
  lexicon: LSJ
  rationale: The phrase is vivid and idiomatic enough in English. 'Dead' rather than
    'corpses' preserves the stark repetition of νεκροῖς/νεκρούς.
- source_word: πολυάνδριον
  chosen: the burial place of many
  alternatives:
  - a common grave
  - a place crowded with the dead
  - a mass grave
  lexicon: LSJ
  rationale: πολυάνδριον denotes a burial place or tomb for many. 'Mass grave' may
    be too specific and modern; 'burial place of many' preserves the literal sense
    while fitting the lament context.
- source_word: ὁρῶσα τῶν τέκνων
  chosen: seeing ... of her children
  alternatives:
  - seeing among her children
  - seeing her children
  lexicon: LSJ
  rationale: 'The transmitted text appears slightly compressed at the end, but τῶν
    τέκνων most naturally completes πολυάνδριον: ''the burial place of many of her
    children.'' The participle ὁρῶσα is resumed for emphasis, and the English reflects
    that.'
