translation:
  text: a mother, with two things set before her—reverence for God, and the temporary
    safety of her seven sons according to the tyrant’s promise—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'piety' or 'godliness' for 'reverence for God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'temporary deliverance' for 'temporary safety.' The Greek term can also
      be rendered 'salvation,' but here it refers to short-lived preservation of life
      under the tyrant's offer.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτηρ
  chosen: a mother
  alternatives:
  - the mother
  - mother
  lexicon: LSJ
  rationale: Anarthrous noun used predicatively/appositionally in the sentence flow;
    English idiom prefers the indefinite 'a mother' here unless broader context requires
    definiteness.
- source_word: δυεῖν προκειμένων
  chosen: with two things set before her
  alternatives:
  - when two things were laid before her
  - with two options before her
  lexicon: LSJ
  rationale: 'The genitive absolute-like construction conveys circumstances: two matters
    lay before the mother for decision. ''Set before her'' preserves the metaphor
    without over-paraphrasing.'
- source_word: εὐσεβείας
  chosen: reverence for God
  alternatives:
  - piety
  - godliness
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees regularly denotes devout fidelity toward God.
    'Piety' is possible but can sound archaic or merely external; 'reverence for God'
    makes the object and religious force clear in modern English.
- source_word: σωτηρίας προσκαίρου
  chosen: the temporary safety
  alternatives:
  - temporary deliverance
  - transient preservation
  - temporary salvation
  lexicon: LSJ
  rationale: σωτηρία can mean rescue/preservation/safety, and προσκαίρου marks it
    as short-lived or temporary. In this context the tyrant offers only earthly, momentary
    sparing of life, so 'temporary safety' communicates the contrast without importing
    soteriological overtones of 'salvation'.
- source_word: τῆς ἑπτὰ υἱῶν
  chosen: of her seven sons
  alternatives:
  - of the seven sons
  lexicon: LSJ
  rationale: The genitive depends on σωτηρίας. Supplying 'her' is natural from the
    context and clarifies the maternal relationship already explicit in μήτηρ.
- source_word: κατὰ τὴν τοῦ τυράννου ὑπόσχεσιν
  chosen: according to the tyrant’s promise
  alternatives:
  - in keeping with the tyrant's offer
  - on the basis of the tyrant's promise
  lexicon: LSJ
  rationale: κατά with the accusative here indicates conformity to the terms of the
    promise. 'Promise' is the straightforward rendering of ὑπόσχεσις.
