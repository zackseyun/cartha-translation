theological_decisions:
- issue: Rendering εὐσέβεια in a martyrdom context
  chosen_reading: reverence for God
  alternative_readings:
  - piety
  - godliness
  rationale: The verse contrasts fidelity to God with temporary physical preservation.
    The chosen rendering preserves the explicitly religious orientation and avoids
    archaic church language while retaining theological weight.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering σωτηρία in a non-soteriological context
  chosen_reading: temporary safety
  alternative_readings:
  - temporary salvation
  - temporary deliverance
  rationale: The text speaks of the tyrant's offer to spare the sons for a time, not
    eternal salvation. The translation avoids importing doctrinal salvation language
    where the context points to temporal preservation.
  doctrine_reference: Translation philosophy §§1, 6
