theological_decisions:
- issue: Meaning of πάθη in this philosophical-martyrological context
  chosen_reading: emotions
  alternative_readings:
  - passions
  - sufferings
  rationale: Because 4 Maccabees centrally argues that devout reason masters the passions,
    πάθη here likely continues that thematic vocabulary rather than referring merely
    to external sufferings. 'Emotions' is chosen for readability, while 'passions'
    is preserved as a lexical alternative.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering εὐσέβεια
  chosen_reading: godliness
  alternative_readings:
  - piety
  rationale: The term denotes reverent devotion toward God. 'Godliness' communicates
    this clearly in modern English without importing extra doctrinal content.
  doctrine_reference: Translation philosophy §6
