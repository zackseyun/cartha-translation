translation:
  text: So you also, guardian of the law, though surrounded on every side by the flood
    of emotions and pressed by the fierce winds of your sons’ torments, bravely endured
    the storms of godliness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the flood of passions.' The Greek πάθη is a key term in 4 Maccabees
      for the passions or emotions that reason must master.
    reason: lexical_alternative
  - marker: b
    text: Or 'the storms of piety.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νομοφύλαξ
  chosen: guardian of the law
  alternatives:
  - keeper of the law
  - law-guarding one
  lexicon: LSJ
  rationale: A compound meaning one who guards or keeps the law. 'Guardian of the
    law' is natural English while preserving the active protective sense better than
    the flatter 'keeper of the law.'
- source_word: πανταχόθεν
  chosen: on every side
  alternatives:
  - from all sides
  - everywhere
  lexicon: LSJ
  rationale: 'In context with περικυκλουμένῃ, the spatial sense is prominent: she
    is encircled from every direction.'
- source_word: ἐν τῷ τῶν παθῶν περικυκλουμένῃ κατακλυσμῷ
  chosen: surrounded on every side by the flood of emotions
  alternatives:
  - in the flood of sufferings that surrounded you
  - amid the deluge of passions encircling you
  lexicon: LSJ
  rationale: πάθη in 4 Maccabees often refers to passions/emotions, a key theme of
    reason mastering the passions. Although 'sufferings' is possible in some contexts,
    here the metaphor and the book's vocabulary favor 'emotions' or 'passions.' 'Flood'
    renders κατακλυσμός vividly without over-literal awkwardness.
- source_word: καρτεροῖς ἀνέμοις
  chosen: the fierce winds
  alternatives:
  - strong winds
  - violent winds
  lexicon: LSJ
  rationale: καρτερός conveys strength, severity, or harshness. 'Fierce' fits the
    storm metaphor and the emotional intensity of the scene.
- source_word: ταῖς τῶν υἱῶν βασάνοις
  chosen: by your sons’ torments
  alternatives:
  - by the tortures of your sons
  - by your sons' ordeals
  lexicon: LSJ
  rationale: 'βάσανοι denotes tortures/torments. The genitive τῶν υἱῶν is most naturally
    possessive/objective in context: the torments inflicted on her sons. ''Your sons''
    torments'' is concise and idiomatic.'
- source_word: συνεχομένη
  chosen: pressed
  alternatives:
  - driven hard
  - afflicted
  - constrained
  lexicon: LSJ
  rationale: The participle suggests being hard-pressed or hemmed in. 'Pressed' works
    well with the wind imagery and avoids over-interpretation.
- source_word: γενναίως
  chosen: bravely
  alternatives:
  - nobly
  - courageously
  lexicon: LSJ
  rationale: The adverb carries both courage and nobility. 'Bravely' is the clearest
    modern rendering in this context.
- source_word: ὑπέμεινας
  chosen: endured
  alternatives:
  - persevered through
  - withstood
  lexicon: LSJ
  rationale: A standard rendering for steadfast endurance under trial; it fits the
    verse's commendation of perseverance.
- source_word: τοὺς τῆς εὐσεβείας χειμῶνας
  chosen: the storms of godliness
  alternatives:
  - the storms of piety
  - the tempests for the sake of godliness
  lexicon: LSJ
  rationale: χειμώνες literally means storms/winters, here metaphorical. εὐσέβεια
    in this book denotes reverence toward God expressed in faithful devotion. 'Godliness'
    is accessible and preserves the religious dimension better than the potentially
    archaic 'piety.'
