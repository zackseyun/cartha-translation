translation:
  text: But of all mothers, the mother of the seven became the most devoted to her
    children, she who through seven pregnancies had her motherly affection for them
    deeply planted within her;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the mother of the seven.' The context identifies them as her
      seven sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλοτεκνωτέρα
  chosen: the most devoted to her children
  alternatives:
  - more loving toward her children
  - more fond of her children
  - most child-loving
  lexicon: LSJ
  rationale: Comparative form from φιλοτεκνέω/φιλοτέκνος expresses exceptional affection
    toward one's children. 'Devoted to her children' is natural modern English and
    preserves the superlative/comparative sense in context ('of all mothers').
- source_word: ἡ τῶν ἑπτὰ μήτηρ
  chosen: the mother of the seven
  alternatives:
  - the mother of the seven sons
  - the mother of the seven brothers
  lexicon: LSJ
  rationale: The Greek literally says 'the mother of the seven.' Since the immediate
    context in 4 Maccabees concerns her seven sons, 'the seven' is accurate and concise;
    adding 'sons' would be interpretive though contextually true.
- source_word: κυοφορίαις
  chosen: through seven pregnancies
  alternatives:
  - by seven pregnancies
  - in seven pregnancies
  - through bearing seven children
  lexicon: LSJ
  rationale: κυοφορία refers to pregnancy/gestation. 'Through seven pregnancies' preserves
    the concrete maternal experience emphasized by the Greek better than a generalized
    'through bearing seven children.'
- source_word: ἐπιφυτευομένην
  chosen: deeply planted within her
  alternatives:
  - implanted
  - planted in her
  - rooted in her
  lexicon: LSJ
  rationale: The participle evokes something planted or engrafted. 'Deeply planted
    within her' brings out the metaphor in readable English and fits the idea that
    repeated pregnancies intensified maternal affection.
- source_word: φιλοστοργίαν
  chosen: motherly affection
  alternatives:
  - natural affection
  - tender affection
  - familial love
  lexicon: LSJ
  rationale: φιλοστοργία denotes tender natural affection, especially within family
    bonds. 'Motherly affection' makes explicit the maternal context without overstating
    the term.
- source_word: πρὸς αὐτούς
  chosen: for them
  alternatives:
  - toward them
  - for her sons
  lexicon: LSJ
  rationale: The preposition marks direction of affection toward the children. 'For
    them' is idiomatic in English and preserves the relational sense.
