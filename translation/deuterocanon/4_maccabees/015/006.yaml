  text: πασῶν δὲ τῶν μητέρων ἐγένετο ἡ τῶν ἑπτὰ μήτηρ φιλοτεκνωτέρα, ἥτις ἑπτὰ κυοφορίαις
    τὴν πρὸς αὐτοὺς ἐπιφυτευομένην φιλοστοργίαν·
