translation:
  text: As she watched each one being tortured and burned, the mother did not change,
    because of her piety.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one by one, being racked and burned.' The Greek participle for 'being
      tortured' can refer more specifically to torture on the rack.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθʼ ἓν
  chosen: each one
  alternatives:
  - one by one
  - individually
  lexicon: LSJ
  rationale: The idiom conveys succession with reference to the sons taken singly.
    'Each one' is natural English and preserves the distributive sense without overexpanding.
- source_word: στρεβλούμενον
  chosen: being tortured
  alternatives:
  - being racked
  - being twisted under torture
  lexicon: LSJ
  rationale: The verb refers to torture, historically including stretching on an instrument.
    'Being tortured' communicates the sense clearly in modern English; 'being racked'
    is more specific but may sound archaic or overly narrow.
- source_word: φλεγόμενον
  chosen: burned
  alternatives:
  - being burned
  - set on fire
  - consumed by fire
  lexicon: LSJ
  rationale: The participle denotes being on fire or burned. 'Burned' fits the paired
    participles smoothly in English and preserves the violent imagery.
- source_word: ὁρῶσα
  chosen: As she watched
  alternatives:
  - seeing
  - while seeing
  lexicon: LSJ
  rationale: The participle is circumstantial and temporal. 'As she watched' gives
    natural English and highlights the ongoing visual witness of the mother.
- source_word: μήτηρ
  chosen: the mother
  alternatives:
  - his mother
  - their mother
  lexicon: LSJ
  rationale: The Greek has simply 'mother' with the article. In context it is the
    mother of the brothers, but 'the mother' stays closest to the text while remaining
    clear.
- source_word: οὐ μετεβάλετο
  chosen: did not change
  alternatives:
  - did not turn aside
  - did not waver
  - did not alter her course
  lexicon: LSJ
  rationale: The verb means to change or alter. In context it refers to remaining
    steadfast in conviction. 'Did not change' is formally close; the context supplies
    the sense of steadfastness.
- source_word: διὰ τὴν εὐσέβειαν
  chosen: because of her piety
  alternatives:
  - on account of piety
  - because of godliness
  - because of reverence toward God
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees is a key virtue denoting reverent devotion to
    God and the law. 'Piety' is concise and traditional enough to preserve the book's
    moral-theological vocabulary; adding 'her' makes the English idiomatic though
    the possessive is implicit.
