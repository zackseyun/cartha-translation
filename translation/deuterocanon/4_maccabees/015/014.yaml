theological_decisions:
- issue: Rendering εὐσέβεια in a Hellenistic Jewish martyrdom context
  chosen_reading: piety
  alternative_readings:
  - godliness
  - reverence toward God
  rationale: The term is central in 4 Maccabees and denotes devout fidelity to God
    expressed in obedience and endurance. 'Piety' best preserves the virtue-language
    of the work without flattening it into a merely emotional or generic religious
    term.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English, not flattening theological weight)
