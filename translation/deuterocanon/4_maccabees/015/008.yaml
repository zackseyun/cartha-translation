theological_decisions:
- issue: Sense of φόβος in relation to God
  chosen_reading: reverent fear toward God
  alternative_readings:
  - reverence for God
  - awe before God
  rationale: The text speaks of pious fear as the motive for the mother's action.
    Retaining 'fear' preserves the stronger biblical category while the phrase 'toward
    God' signals that this is reverential, not craven, fear.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening theological weight.'
- issue: Sense of σωτηρία in this context
  chosen_reading: temporal physical safety, not eternal salvation
  alternative_readings:
  - temporary deliverance
  - temporary preservation
  rationale: The adjective πρόσκαιρον narrows the meaning to short-term rescue or
    preservation of life. Rendering it as 'safety' avoids anachronistically suggesting
    spiritual salvation.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition.'
