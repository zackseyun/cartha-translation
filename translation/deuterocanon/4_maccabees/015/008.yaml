translation:
  text: Because of her fear toward God, she disregarded the temporary safety of her
    children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temporary deliverance of her children.' The Greek σωτηρία can mean
      'deliverance' or 'preservation'; here it refers to short-term physical rescue,
      not eternal salvation.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὸν ... φόβον
  chosen: Because of fear
  alternatives:
  - On account of reverence
  - Because of awe
  lexicon: BDAG
  rationale: The preposition διὰ with the accusative gives causal force, and φόβος
    here denotes reverent fear toward God rather than mere terror. 'Because of fear'
    keeps the causal structure and preserves the strong term, while 'toward God' clarifies
    the object from the Greek phrase.
- source_word: πρὸς τὸν θεόν
  chosen: toward God
  alternatives:
  - for God
  - before God
  lexicon: BDAG
  rationale: πρός with the accusative after φόβον expresses orientation toward God.
    'Toward God' is slightly more literal than 'for God' and avoids importing a broader
    devotional sense not explicit in the text.
- source_word: ὑπερεῖδεν
  chosen: disregarded
  alternatives:
  - overlooked
  - treated as of less importance
  - looked past
  lexicon: LSJ
  rationale: The verb conveys overlooking or paying no regard to something. In context,
    the mother does not fail to notice her children's safety; rather, she sets it
    aside in light of a higher loyalty. 'Disregarded' best captures that evaluative
    sense.
- source_word: τὴν ... σωτηρίαν
  chosen: the ... safety
  alternatives:
  - deliverance
  - preservation
  - salvation
  lexicon: BDAG
  rationale: σωτηρία can mean salvation or deliverance, but in this immediate context
    it refers to the possibility of preserving the children's lives from torture and
    death. 'Safety' communicates the concrete, temporal sense without importing soteriological
    overtones.
- source_word: πρόσκαιρον
  chosen: temporary
  alternatives:
  - brief
  - for a time
  - transient
  lexicon: BDAG
  rationale: The adjective contrasts short-lived earthly preservation with enduring
    faithfulness. 'Temporary' is natural English and preserves the temporal limitation
    clearly.
- source_word: τῶν τέκνων
  chosen: her children
  alternatives:
  - the children
  - her offspring
  lexicon: BDAG
  rationale: τέκνα means children. English idiom naturally supplies the possessive
    in context, since the subject is the mother being described.
