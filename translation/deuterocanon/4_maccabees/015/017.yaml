translation:
  text: O mother, now tested by pains more bitter than the birth pangs for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the pangs at their birth.' The Greek phrase literally refers to the
      labor pains connected with them.
    reason: lexical_alternative
lexical_decisions:
- source_word: πικροτέρων
  chosen: more bitter
  alternatives:
  - more grievous
  - harsher
  lexicon: LSJ
  rationale: Comparative of πικρός, literally 'more bitter'; in context it describes
    the severity of suffering. 'More bitter' preserves the metaphor and rhetorical
    force better than flattening it to 'more grievous.'
- source_word: μήτηρ
  chosen: mother
  lexicon: LSJ
  rationale: Direct address to the woman whose sons are suffering; simple and natural
    English equivalent.
- source_word: πόνων
  chosen: pains
  alternatives:
  - sufferings
  - toils
  lexicon: LSJ
  rationale: Genitive with πειρασθεῖσα, referring to painful experiences. 'Pains'
    fits the comparison with ὠδίνων later in the verse and keeps the maternal imagery
    coherent.
- source_word: πειρασθεῖσα
  chosen: tested
  alternatives:
  - tried
  - having experienced
  lexicon: BDAG/LSJ
  rationale: The participle can denote being tried or put to the test through ordeal.
    'Tested' preserves both experiential and moral-resilience nuance without overinterpreting.
- source_word: ἤπερ
  chosen: than
  alternatives:
  - rather than
  - more than
  lexicon: LSJ
  rationale: Introduces the comparison between present sufferings and prior labor
    pains. In idiomatic English, simple 'than' best conveys the comparative force.
- source_word: τῶν ἐπʼ αὐτοῖς ὠδίνων
  chosen: the birth pangs for them
  alternatives:
  - the labor pains over them
  - the pangs at their birth
  lexicon: LSJ
  rationale: ὠδίνες are birth pangs/labor pains. ἐπʼ αὐτοῖς most naturally refers
    to the sons just mentioned, i.e., the pains associated with bearing them. 'For
    them' is concise and faithful, though the sense is essentially 'at their birth.'
