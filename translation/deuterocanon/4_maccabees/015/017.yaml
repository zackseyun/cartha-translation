id: 4MA.15.17
reference: 4 Maccabees 15:17
source:
  edition: lxx-swete-1909
  text: ὦ πικροτέρων μὲν νῦν μήτηρ πόνων πειρασθεῖσα, ἤπερ τῶν ἐπʼ αὐτοῖς ὠδίνων.
  language: Greek
  pages:
