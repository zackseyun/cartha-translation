theological_decisions:
- issue: Rendering εὐσέβεια in a Jewish martyrdom context
  chosen_reading: godliness
  alternative_readings:
  - piety
  - reverence
  rationale: The verse contrasts maternal attachment to children with devotion to
    God. 'Godliness' makes the God-directed loyalty explicit without importing later
    technical theology.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Handling the difficult compressed rhetoric of the first clause
  chosen_reading: Retain the vivid but somewhat abrupt imagery rather than smoothing
    into paraphrase
  alternative_readings:
  - O reason, ruler of the passions
  - O reason, tyrant over the passions
  rationale: The source text is highly compressed and exclamatory. Because the source
    validation notes a major mismatch and the syntax is terse, the translation stays
    close to the Greek and avoids over-resolving ambiguities not explicit in the witness.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3
