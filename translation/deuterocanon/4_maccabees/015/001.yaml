translation:
  text: O reason, tyrant over the passions, more longed for than children, and godliness
    to a mother than children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek is highly compressed and rhetorically abrupt. The opening exclamation
      may also be rendered, 'O reason, tyrant over the passions,' with 'of children'
      taken differently in the line's syntax.
    reason: alternative_reading
  - marker: b
    text: Or 'piety is more desirable to a mother than children.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λογισμέ
  chosen: reasoning
  alternatives:
  - reason
  - rational judgment
  lexicon: LSJ
  rationale: 'The vocative addresses the faculty/theme central to 4 Maccabees: disciplined
    rationality. ''Reasoning'' preserves the active, governing sense better than the
    more abstract ''reason'' in this exclamatory address.'
- source_word: τέκνων
  chosen: of children
  alternatives:
  - over sons
  - of offspring
  lexicon: LSJ
  rationale: τέκνα is a broad term for children/offspring. 'Children' is the most
    natural and accurate English rendering here; the genitive is retained in the compact
    Greek exclamation, though the exact syntactic relation is difficult.
- source_word: παθῶν
  chosen: passions
  alternatives:
  - sufferings
  - desires
  - emotions
  lexicon: LSJ
  rationale: In 4 Maccabees πάθη commonly denotes the passions or emotional drives
    mastered by reason. 'Passions' best fits the book's philosophical vocabulary.
- source_word: τύραννε
  chosen: tyrant over
  alternatives:
  - master of
  - ruler over
  lexicon: LSJ
  rationale: τύραννος is literally 'tyrant.' In this laudatory paradox, it depicts
    reason's dominating power over the passions. 'Tyrant over' keeps the vivid metaphor.
- source_word: εὐσέβεια
  chosen: godliness
  alternatives:
  - piety
  - reverence
  lexicon: LSJ
  rationale: εὐσέβεια in this work denotes devout fidelity toward God and his law.
    'Godliness' is accessible modern English and preserves the theological dimension
    more clearly than the somewhat narrower 'piety.'
- source_word: μητρί
  chosen: to a mother
  alternatives:
  - for a mother
  - in a mother
  lexicon: LSJ
  rationale: 'The dative is most naturally rendered with reference to the mother''s
    valuation: godliness is more desired to/for a mother than children are.'
- source_word: ποθεινοτέρα
  chosen: more longed-for
  alternatives:
  - more desirable
  - more beloved
  lexicon: LSJ
  rationale: The comparative expresses stronger desire or yearning. 'More longed-for'
    preserves the affective force, though idiomatic English is somewhat strained because
    the Greek itself is highly rhetorical.
