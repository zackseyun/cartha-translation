translation:
  text: But the mother urged each son individually, and all of them together, on toward
    death for the sake of godliness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one by one ... all together.' The Greek contrasts the mother's exhortation
      to each son individually with her exhortation to all of them as a group.
    reason: lexical_alternative
  - marker: b
    text: Or 'toward a death of godliness,' that is, death endured for the sake of
      piety or reverence toward God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ
  chosen: But
  alternatives:
  - But also
  - Yet indeed
  lexicon: LSJ
  rationale: Marks continuation with mild contrast/emphasis from the preceding context.
    English 'But' captures the discourse turn without overloading the sentence.
- source_word: καθʼ ἕνα
  chosen: each ... individually
  alternatives:
  - one by one
  - each one
  lexicon: LSJ
  rationale: The idiom means 'one by one' or 'individually.' Rendering it with 'each
    son individually' makes explicit the distributive force in natural English.
- source_word: παῖδα
  chosen: son
  alternatives:
  - child
  - boy
  lexicon: LSJ
  rationale: Although παῖς can mean 'child' or 'boy,' in this context the referent
    is the mother's male children, so 'son' is the most precise and natural rendering.
- source_word: ὁμοῦ πάντας
  chosen: all of them together
  alternatives:
  - all together
  - all at once
  lexicon: LSJ
  rationale: ὁμοῦ conveys togetherness, and πάντας supplies the totality. 'All of
    them together' preserves both elements clearly.
- source_word: ἡ μήτηρ
  chosen: the mother
  lexicon: LSJ
  rationale: Straightforward nominal reference; the article is naturally represented
    in English by 'the mother.'
- source_word: ἐπὶ ... προέτρεπεν
  chosen: urged ... on toward
  alternatives:
  - encouraged ... toward
  - exhorted ... to
  lexicon: LSJ
  rationale: προτρέπω means to urge on, encourage, or exhort. Because ἐπὶ with the
    accusative goal ('toward death') is present, 'urged ... on toward' preserves the
    directional force better than a flatter 'exhorted to.'
- source_word: τὸν ... θάνατον
  chosen: death
  lexicon: LSJ
  rationale: Direct object of the urging; the context is martyrdom, but the Greek
    simply says 'death,' which should be retained.
- source_word: τῆς εὐσεβείας
  chosen: for the sake of godliness
  alternatives:
  - of godliness
  - for piety
  - for reverence toward God
  lexicon: LSJ
  rationale: The genitive qualifies the death as one connected with εὐσέβεια, a key
    theme in 4 Maccabees. 'For the sake of godliness' makes the relation explicit
    in idiomatic English while preserving the religious-moral sense. 'Piety' is possible
    but less transparent for modern readers.
