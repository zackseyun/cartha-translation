theological_decisions:
- issue: Rendering εὐσέβεια in a martyrdom context
  chosen_reading: godliness
  alternative_readings:
  - piety
  - reverence toward God
  rationale: The book repeatedly frames the brothers' deaths as grounded in faithful
    devotion to God and the law. 'Godliness' is accessible modern English and preserves
    the theological dimension without importing later technical terminology.
