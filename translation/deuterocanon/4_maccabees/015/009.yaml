theological_decisions:
- issue: Whether to make the maternal nuance of φιλοστοργία explicit
  chosen_reading: Explicitly rendered as 'motherly affection'
  alternative_readings:
  - natural affection
  - familial affection
  rationale: The Greek noun itself refers to family affection generally, but in this
    sentence its referent is specifically the mother's love for her sons. Making that
    explicit improves clarity without adding a new theological claim.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
