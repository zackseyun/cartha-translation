translation:
  text: For the more mothers are weak in spirit and have many children, the more they
    are devoted to their children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fainthearted' for 'weak in spirit' (ἀσθενόψυχοι). The Greek speaks of
      weakness of soul/spirit, and the exact nuance may range from emotional frailty
      to lack of courage.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'more child-loving' for 'more devoted to their children' (φιλοτεκνώτεραι).
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσῳ ... τοσούτῳ
  chosen: the more ... the more
  alternatives:
  - insofar as ... so much
  - by as much ... by so much
  lexicon: LSJ
  rationale: This correlative comparative construction is most naturally rendered
    in English as 'the more ... the more,' preserving the proportional logic of the
    Greek.
- source_word: ἀσθενόψυχοι
  chosen: weak in spirit
  alternatives:
  - fainthearted
  - weak-souled
  - feeble in courage
  lexicon: LSJ
  rationale: A compound meaning literally something like 'weak in soul/spirit.' 'Weak
    in spirit' preserves the metaphor and avoids overinterpreting it as mere cowardice,
    while remaining readable.
- source_word: πολυγονώτεραι
  chosen: have many children
  alternatives:
  - more prolific
  - more fruitful
  - more child-bearing
  lexicon: LSJ
  rationale: The comparative adjective refers to being more abundantly endowed with
    offspring. In idiomatic English, predicating that mothers 'have many children'
    best conveys the sense without awkwardness.
- source_word: ὑπάρχουσιν
  chosen: are
  alternatives:
  - exist as
  - happen to be
  - are found to be
  lexicon: LSJ
  rationale: Here the verb functions as a copular/existential support for the predicates;
    simple 'are' is sufficient and natural in English.
- source_word: αἱ μητέρες
  chosen: mothers
  lexicon: LSJ
  rationale: Straightforward rendering of the subject noun.
- source_word: φιλοτεκνώτεραι
  chosen: devoted to their children
  alternatives:
  - more loving toward their children
  - more affectionate to their children
  - more fond of their children
  lexicon: LSJ
  rationale: The comparative adjective denotes strong affection for one's children.
    'Devoted to their children' captures both affection and attachment in natural
    English, while preserving the comparative force with 'the more.'
