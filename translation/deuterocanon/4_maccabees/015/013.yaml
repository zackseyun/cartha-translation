theological_decisions:
- issue: Whether the verse should be rendered as a theological statement about sanctified
    family order or as a rhetorical lament over natural family bonds
  chosen_reading: A rhetorical exclamation praising the sacredness and strength of
    natural family affections
  alternative_readings:
  - A lament invoking the power of maternal and parental bonds without the evaluative
    sense 'sacred'
  rationale: The repeated vocative/exclamatory structure with Ὦ and the string of
    nominative phrases functions as an elevated apostrophe. Rendering ἱερά as 'sacred'
    preserves the author's valuation of these bonds without overstating a doctrinal
    claim.
  doctrine_reference: Translation philosophy §§1, 3, 6
