translation:
  text: O sacred nature, and the affections of parents, and filial love toward parents,
    and nurture, and the unconquerable passions of mothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the natural bond' for 'nature'; the Greek φύσις can point either to
      nature itself or to the natural order embodied in family affection.
    reason: lexical_alternative
  - marker: b
    text: '''Passions'' here means powerful affections or emotions, not necessarily
      disordered desires.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φύσις
  chosen: nature
  alternatives:
  - natural bond
  - natural affection
  lexicon: LSJ
  rationale: The noun broadly denotes nature or natural constitution. In this exclamatory
    context it personifies the natural order of family bonds. 'Nature' is the most
    direct rendering and keeps the elevated tone.
- source_word: ἱερά
  chosen: sacred
  alternatives:
  - holy
  lexicon: LSJ
  rationale: Used attributively with φύσις. 'Sacred' fits the rhetorical praise of
    the family bond without importing specifically cultic overtones that 'holy' might
    suggest.
- source_word: φίλτρα γονέων
  chosen: the affections of parents
  alternatives:
  - parents' love
  - charms of parents
  lexicon: LSJ
  rationale: φίλτρα can denote affections, endearments, or love-charms. In this family
    context, 'affections' best captures the emotional bond without the misleading
    magical sense of 'charms'.
- source_word: γονεύσιν φιλοστόργε
  chosen: filial love toward parents
  alternatives:
  - tender affection for parents
  - child-loving toward parents
  lexicon: LSJ
  rationale: φιλοστόργος denotes tender natural affection, especially within family
    relationships. Because the dative γονεύσιν marks the object of that affection,
    'filial love toward parents' makes the relationship explicit in idiomatic English.
- source_word: τροφεῖα
  chosen: nurture
  alternatives:
  - rearing
  - nursing
  lexicon: LSJ
  rationale: The term refers to the act or provision of bringing up a child. 'Nurture'
    is concise, natural English and broad enough to include maternal care and upbringing.
- source_word: μητέρων ἀδάμαστα πάθη
  chosen: the unconquerable passions of mothers
  alternatives:
  - the irresistible emotions of mothers
  - the indomitable feelings of mothers
  lexicon: LSJ
  rationale: ἀδάμαστα means untamed or unconquerable; πάθη here refers to strong emotions
    or affections. 'Passions' preserves the intensity of the Greek, while 'of mothers'
    keeps the genitive relation explicit.
