translation:
  text: How greatly and how many times, then, was the mother tortured with torments
    while her sons were being tortured with wheels and cauteries?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was tormented by tortures.' The Greek repeats cognate forms of the same
      root for rhetorical force.
    reason: lexical_alternative
  - marker: b
    text: '''Cauteries'' refers to burning instruments; alternatively, ''hot irons''
      or ''branding irons.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: πηλίκοις
  chosen: how greatly
  alternatives:
  - with how great
  - how severe
  lexicon: LSJ
  rationale: Interrogative/exclamatory adjective used adverbially to intensify the
    extent of suffering. 'How greatly' preserves the rhetorical force better than
    a flatter quantitative rendering.
- source_word: πόσαις
  chosen: how many times
  alternatives:
  - how often
  - with how many
  lexicon: LSJ
  rationale: Paired with πηλίκοις in a rhetorical question, it points to repeated
    instances or number of assaults. 'How many times' makes the iterative sense explicit
    in natural English.
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  lexicon: LSJ
  rationale: Marks the narrative moment and rhetorical transition. 'Then' is concise
    and natural.
- source_word: μήτηρ
  chosen: the mother
  alternatives:
  - their mother
  lexicon: LSJ
  rationale: The Greek has the article with 'mother' but no explicit possessive. 'The
    mother' preserves the form while context still makes clear whose mother is meant.
- source_word: βασανιζομένων
  chosen: were being tortured
  alternatives:
  - were being tormented
  lexicon: LSJ
  rationale: The participle denotes severe inflicted suffering in the martyrdom context.
    'Tortured' better matches the physical brutality described by the instruments
    named.
- source_word: τροχοῖς
  chosen: wheels
  alternatives:
  - the wheel
  - racks
  lexicon: LSJ
  rationale: Plural dative of the torture instrument. 'Wheels' is the most direct
    rendering of the Greek; broader paraphrases like 'racks' import interpretation.
- source_word: καυτηρίοις
  chosen: cauteries
  alternatives:
  - branding irons
  - hot irons
  lexicon: LSJ
  rationale: Refers to burning instruments used for cauterizing or branding. 'Cauteries'
    is formally precise; the more interpretive 'branding irons' is possible but narrower
    than the Greek term itself.
- source_word: ἐβασανίζετο
  chosen: was tortured
  alternatives:
  - was tormented
  lexicon: LSJ
  rationale: The mother is described as undergoing intense suffering in response to
    her sons' torture. 'Was tortured' preserves the verbal link with βασανιζομένων
    and the verse's deliberate repetition.
- source_word: βασάνοις
  chosen: with torments
  alternatives:
  - by tortures
  - with tortures
  lexicon: LSJ
  rationale: The cognate noun reinforces the severity and rhetorical repetition. 'With
    torments' avoids awkward repetition of 'tortures' while still conveying inflicted
    agony.
