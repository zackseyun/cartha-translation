theological_decisions:
- issue: Nature of the mother's suffering
  chosen_reading: The verse speaks of the mother's real and intense suffering in response
    to witnessing her sons' torture, without specifying that she herself underwent
    the same physical instruments.
  alternative_readings:
  - The mother was herself physically tortured by comparable means
  - The statement is purely emotional anguish with no torture nuance
  rationale: The repeated βασαν- language strongly conveys severe suffering, but the
    syntax ties the wheels and cauteries directly to the sons ('while her sons were
    being tortured with wheels and cauteries'). The mother's suffering is affirmed
    as intense without over-specifying its mechanism.
  doctrine_reference: Preserve theological tension rather than resolve it
