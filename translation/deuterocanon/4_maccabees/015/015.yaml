id: 4MA.15.15
reference: 4 Maccabees 15:15
source:
  edition: lxx-swete-1909
  text: τὰς σάρκας τῶν τέκνων ἑώρα περὶ τὸ πῦρ τηκομένας, καὶ τοὺς τῶν ποδῶν καὶ χειρῶν
    δακτύλους ἐπὶ γῆς σπαίροντας, καὶ τὰς τῶν κεφαλῶν μέχρι τῶν περὶ τὰ γένεια
  language: Greek
  pages:
  - 752
  - 776
  - 777
  - 778
  - 779
  - 780
  - 781
  - 786
  - 787
  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: she saw the flesh of her children melting around the fire, and the fingers
    of their feet and hands scattered on the ground, and the flesh of their heads
    down to the parts around their beards,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text of this verse is syntactically abrupt at the end ('and the
      [flesh] of their heads down to the parts around their beards'), and the final
      clause may reflect a compressed or damaged description. The translation stays
      close to the surviving wording rather than reconstructing it more freely.
    reason: textual_variant
  - marker: b
    text: The participle rendered 'scattered' can be understood differently; some
      may take it in a sense like 'quivering' or 'twitching.' Because the phrase also
      says the digits were 'on the ground,' the main text adopts the sense that they
      were strewn there.
    reason: lexical_alternative
lexical_decisions:
- source_word: σάρκας
  chosen: flesh
  alternatives:
  - bodies
  - meat
  lexicon: BDAG
  rationale: Literal physical context of torture requires the concrete sense 'flesh,'
    not metaphorical or softened alternatives.
- source_word: ἑώρα
  chosen: she saw
  alternatives:
  - she was seeing
  - she watched
  lexicon: LSJ
  rationale: Imperfect form conveys ongoing perception, but idiomatic English can
    render it simply as 'she saw' in narrative sequence without losing the force.
- source_word: τηκομένας
  chosen: melting
  alternatives:
  - being consumed
  - wasting away
  lexicon: LSJ
  rationale: The participle denotes being melted or dissolved by heat; 'melting' best
    matches the fire imagery and the gruesome concreteness of the scene.
- source_word: περὶ τὸ πῦρ
  chosen: around the fire
  alternatives:
  - by the fire
  - at the fire
  lexicon: LSJ
  rationale: A close formal rendering of the prepositional phrase; it indicates proximity
    to the fire as the place of torment.
- source_word: δακτύλους
  chosen: fingers
  alternatives:
  - digits
  lexicon: BDAG
  rationale: The Greek term covers both fingers and toes depending on context. Because
    the text explicitly says 'of the feet and hands,' 'fingers' preserves the shared
    term while allowing the paired body parts to specify the sense.
- source_word: τῶν ποδῶν καὶ χειρῶν
  chosen: of their feet and hands
  alternatives:
  - of their toes and fingers
  - of their feet and their hands
  lexicon: LSJ
  rationale: Retains the Greek structure in which one noun ('fingers/digits') is qualified
    by both feet and hands. This avoids over-interpreting by splitting into two English
    nouns.
- source_word: σπαίροντας
  chosen: scattered
  alternatives:
  - quivering
  - twitching
  - strewn
  lexicon: LSJ
  rationale: Given the object 'fingers' lying 'on the ground,' the sense is best taken
    as scattered or strewn rather than living motion. The source text is difficult
    here, and this rendering fits the immediate physical description.
- source_word: μέχρι τῶν περὶ τὰ γένεια
  chosen: down to the parts around their beards
  alternatives:
  - as far as the beard
  - to the regions around the chin
  lexicon: LSJ
  rationale: The Greek is abrupt and likely continues the description of flesh from
    the head downward. 'Parts around their beards' stays close to the wording without
    smoothing away the textual roughness.
