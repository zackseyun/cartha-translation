  text: καίπερ ἑπτὰ τέκνων ὁρῶσα ἀπώλειαν καὶ τὴν τῶν στρεβλῶν πολύπλοκον ποικιλίαν,
    ἀπάσασα ἡ γενναία μήτηρ ἐξελυσεν διὰ τὴν πρὸς θεὸν πίστιν.
