translation:
  text: Even while seeing the destruction of her seven children and the intricate
    variety of the tortures, the noble mother, embracing them all, released them because
    of her faith toward God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of her trust in God' or 'because of her faithfulness toward
      God.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'embracing them all' can also mean 'greeting them all'
      or 'bidding them all farewell.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καίπερ
  chosen: Even while
  alternatives:
  - although
  - though
  lexicon: LSJ
  rationale: Concessive particle introducing the mother's action despite what she
    witnessed. 'Even while' preserves the ongoing scene more naturally in English
    than a bare 'although.'
- source_word: ἑπτὰ τέκνων
  chosen: her seven children
  alternatives:
  - seven offspring
  - seven sons
  lexicon: LSJ
  rationale: τέκνα is broader than 'sons' lexically, though the context identifies
    them as her sons elsewhere. 'Children' stays closest to the Greek here while remaining
    natural English.
- source_word: ὁρῶσα
  chosen: seeing
  alternatives:
  - watching
  - beholding
  lexicon: LSJ
  rationale: Present participle describing what she was witnessing. 'Seeing' is straightforward
    and preserves the participial force.
- source_word: ἀπώλειαν
  chosen: destruction
  alternatives:
  - ruin
  - death
  - loss
  lexicon: LSJ
  rationale: The noun can denote destruction or ruin; in this martyrdom context it
    refers to the deadly loss of her children. 'Destruction' keeps the Greek's force
    without over-specifying beyond the noun itself.
- source_word: στρεβλῶν
  chosen: tortures
  alternatives:
  - racks
  - instruments of torture
  lexicon: LSJ
  rationale: The term is associated with torture devices and acts of torment. Because
    the phrase speaks of their 'intricate variety,' rendering the whole expression
    with 'tortures' communicates the sense more idiomatically than the overly concrete
    'racks' in English.
- source_word: πολύπλοκον ποικιλίαν
  chosen: the intricate variety
  alternatives:
  - the manifold complexity
  - the elaborate diversity
  lexicon: LSJ
  rationale: The paired terms intensify the many-sided, complicated nature of the
    torments. 'Intricate variety' preserves both multiplicity and complexity in readable
    English.
- source_word: ἀπάσασα
  chosen: embracing them all
  alternatives:
  - having greeted them all
  - having bid them all farewell
  - having welcomed them all
  lexicon: LSJ
  rationale: From ἀσπάζομαι, often 'greet' or 'embrace.' In this maternal martyrdom
    scene, a physical-affectionate nuance is plausible and fits the emotional context.
    'Embracing them all' best conveys the likely force here while remaining anchored
    in the verb's semantic range.
- source_word: ἡ γενναία μήτηρ
  chosen: the noble mother
  alternatives:
  - the courageous mother
  - the brave mother
  lexicon: LSJ
  rationale: γενναία can denote nobility and courage. 'Noble' preserves both moral
    elevation and bravery, matching the book's praise of reasoned virtue.
- source_word: ἐξελυσεν
  chosen: released them
  alternatives:
  - let them go
  - sent them forth
  - set them free
  lexicon: LSJ
  rationale: The verb literally suggests loosening or releasing. In context it refers
    to her yielding up her sons to death rather than restraining them. 'Released them'
    preserves the metaphorical force without paraphrasing too far.
- source_word: διὰ τὴν πρὸς θεὸν πίστιν
  chosen: because of her faith toward God
  alternatives:
  - through her faith in God
  - because of her trust in God
  - because of her faithfulness toward God
  lexicon: LSJ
  rationale: πίστις defaults to 'faith' per project doctrine. The preposition πρὸς
    with θεόν is well represented by 'toward God,' preserving the relational direction
    of her faith. 'Because of' reflects διὰ with the accusative as causal.
