theological_decisions:
- issue: Rendering of πίστιν
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: Project doctrine sets πίστις to 'faith' by default, while preserving
    alternatives when context could support them. Here the mother's steadfast devotion
    could be described as trust or faithfulness, but 'faith' remains the main-text
    rendering and alternatives are preserved in a footnote.
