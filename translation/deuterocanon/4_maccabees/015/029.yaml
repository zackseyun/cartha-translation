translation:
  text: O mother of the nation, avenger of the law, defender of godliness, and prizewinner
    in the struggle through motherly affections.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mother of the people' or 'mother of the race'; the Greek ἔθνος can denote
      a nation, people, or ethnic group.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'prizewinner of the struggle of the inward affections'; the Greek
      evokes an athletic victory in a contest involving natural maternal compassion.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτηρ
  chosen: mother
  alternatives:
  - matriarch
  lexicon: LSJ
  rationale: Direct vocative address; 'mother' is the plain and natural rendering.
- source_word: ἔθνους
  chosen: of the nation
  alternatives:
  - of the people
  - of the race
  lexicon: LSJ
  rationale: ἔθνος can mean nation, people, or ethnic group. 'Nation' best preserves
    the elevated public sense of the mother's representative role without narrowing
    to ethnicity alone.
- source_word: ἔκδικε
  chosen: avenger
  alternatives:
  - champion
  - vindicator
  lexicon: LSJ
  rationale: The term denotes one who exacts justice or vengeance on behalf of another.
    'Avenger' preserves the forceful judicial sense in relation to the law.
- source_word: τοῦ νόμου
  chosen: of the law
  alternatives:
  - for the law
  lexicon: LSJ
  rationale: The genitive is most naturally rendered 'of the law,' indicating the
    law as that whose cause she avenges.
- source_word: ὑπερασπίστεια
  chosen: defender
  alternatives:
  - protector
  - champion
  lexicon: LSJ
  rationale: The word conveys active protection or advocacy. 'Defender' is concise,
    natural English and pairs well with the surrounding honorifics.
- source_word: τῆς εὐσεβείας
  chosen: of godliness
  alternatives:
  - of piety
  - of reverence
  lexicon: LSJ
  rationale: εὐσέβεια in this literature denotes reverent devotion toward God expressed
    in faithful conduct. 'Godliness' communicates this religious-moral sense in accessible
    modern English; 'piety' is possible but can sound narrower or more archaic.
- source_word: διὰ σπλάγχνων
  chosen: of the affections
  alternatives:
  - through maternal compassion
  - of inward feelings
  - of tender love
  lexicon: LSJ
  rationale: σπλάγχνα literally refers to inward parts and figuratively to deep affections
    or compassion. Here the phrase qualifies the struggle as one involving natural
    maternal feeling. 'Of the affections' preserves the metaphorical force without
    over-paraphrasing.
- source_word: ἀγῶνος
  chosen: struggle
  alternatives:
  - contest
  - conflict
  lexicon: LSJ
  rationale: ἀγών commonly denotes an athletic or agonistic contest, but in context
    it refers to the mother's moral ordeal. 'Struggle' communicates both conflict
    and endurance in idiomatic English.
- source_word: ἀθλοφόρε
  chosen: prizewinner
  alternatives:
  - victor
  - champion
  - athlete crowned with victory
  lexicon: LSJ
  rationale: The term denotes one who bears off the prize in contest. 'Prizewinner'
    preserves the athletic metaphor more explicitly than 'victor,' while remaining
    readable.
