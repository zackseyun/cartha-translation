theological_decisions:
- issue: Rendering εὐσέβεια in a martyrdom context
  chosen_reading: godliness
  alternative_readings:
  - piety
  - reverence
  rationale: The verse praises fidelity to God and the law in a morally charged Jewish
    context. 'Godliness' best captures both devotion and conduct without importing
    later technical theology.
  doctrine_reference: Translation philosophy §6; consistency of key terms per §5
- issue: How explicitly to interpret διὰ σπλάγχνων ἀγῶνος
  chosen_reading: the struggle of the affections
  alternative_readings:
  - the struggle through maternal compassion
  - the contest of natural affection
  rationale: The Greek is rhetorically compressed and evokes conflict involving maternal
    tenderness. The chosen rendering preserves the tension without expanding the phrase
    into a paraphrase.
  doctrine_reference: Translation philosophy §1 and §3
