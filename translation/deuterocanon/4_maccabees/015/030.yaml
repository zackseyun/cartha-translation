theological_decisions:
- issue: Gendered comparative rhetoric in praise of the mother
  chosen_reading: 'Retain the masculine comparison explicitly: “more noble than males
    ... more manly than men.”'
  alternative_readings:
  - Use gender-neutral abstractions such as “braver than any man” or “more courageous
    than men”
  rationale: 'The Greek intentionally uses gendered terms and a rhetorical reversal:
    the woman is praised as surpassing males/men in virtues culturally coded as masculine.
    Per doctrine, gender-accurate rendering is preferred over neutralization, especially
    where the rhetoric depends on the contrast.'
