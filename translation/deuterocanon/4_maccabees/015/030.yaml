translation:
  text: O more noble than males in courage, and more manly than men in endurance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “more courageous than men in endurance.” The Greek says “more manly than
      men,” preserving a deliberate rhetorical play on male-coded virtue.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρρένων
  chosen: males
  alternatives:
  - men
  lexicon: LSJ
  rationale: ἀρρήν denotes the male sex more basically than ἀνήρ. Rendering it as
    “males” preserves the deliberate contrast with the following ἀνδρῶν (“men”), which
    would be flattened if both were translated “men.”
- source_word: πρὸς καρτερίαν
  chosen: in courage
  alternatives:
  - for courage
  - with respect to steadfastness
  - in steadfast endurance
  lexicon: LSJ
  rationale: καρτερία carries the sense of steadfast courage or fortitude. In this
    exclamatory comparative construction, idiomatic English is best served by “in
    courage,” while retaining the virtue being praised.
- source_word: γενναιοτέρα
  chosen: more noble
  alternatives:
  - nobler
  - more high-minded
  lexicon: LSJ
  rationale: The comparative of γενναῖος can denote nobility, bravery, or magnanimity.
    “More noble” preserves both moral elevation and valor in a concise English comparative.
- source_word: ἀνδρῶν
  chosen: men
  alternatives:
  - males
  lexicon: LSJ
  rationale: ἀνήρ commonly means “man” or “men,” often with connotations of adult
    manhood. Using “men” here preserves the rhetorical distinction from ἀρρένων.
- source_word: πρὸς ὑπομονὴν
  chosen: in endurance
  alternatives:
  - for endurance
  - in steadfastness
  - in perseverance
  lexicon: LSJ
  rationale: ὑπομονή denotes patient endurance or perseverance under trial. “In endurance”
    is natural English and fits the comparative praise.
- source_word: ἀνδρειοτέρα
  chosen: more manly
  alternatives:
  - more courageous
  - braver
  lexicon: LSJ
  rationale: The adjective is built on ἀνήρ and explicitly evokes manliness/courage.
    “More manly” preserves the wordplay and rhetorical force better than the more
    generic “braver.”
