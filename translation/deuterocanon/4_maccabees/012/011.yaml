id: 4MA.12.11
reference: 4 Maccabees 12:11
source:
  edition: lxx-swete-1909
  text: Ἀνόσιε, φησίν, καὶ πάντων τῶν πονηρῶν ἀσεβέστατε τύραννε, οὐκ ᾐδέσθης παρὰ
    τοῦ θεοῦ λαβὼν τὰ ἀγαθὰ καὶ τὴν βασιλείαν, τοὺς θεράποντας αὐτοῦ κατακτείνειν,
    καὶ τοὺς τῆς εὐσεβείας ἀσκητὰς στρεβλοῦν;
  language: Greek
  pages:
