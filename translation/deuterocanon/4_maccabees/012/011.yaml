  confidence: high
  validation: agree
translation:
  text: “You unholy man,” she said, “most ungodly tyrant of all wicked men, were you
    not ashamed, after receiving good things and kingship from God, to kill his servants
    and torture the practitioners of godliness?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “most impious tyrant of all the wicked.” The Greek piles up superlatives
      and class language for rhetorical force.
    reason: lexical_alternative
  - marker: b
    text: “Practitioners of godliness” translates a phrase that could also be rendered
      “devotees of piety” or, more literally, “ascetics of godliness.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνόσιε
  chosen: You unholy man
  alternatives:
  - You profane one
  - You godless man
  - You impious man
  lexicon: LSJ
  rationale: Vocative singular of ἀνόσιος, denoting one who is irreverent or unholy.
    'Unholy' is clear modern English and preserves the religious/moral force better
    than the more technical 'impious.' 'Man' is supplied naturally in English for
    the vocative address.
- source_word: πάντων τῶν πονηρῶν ἀσεβέστατε
  chosen: most ungodly tyrant of all evil men
  alternatives:
  - most impious tyrant of all the wicked
  - most godless tyrant of all evildoers
  lexicon: LSJ
  rationale: ἀσεβέστατε is the superlative vocative, 'most ungodly/impious.' πάντων
    τῶν πονηρῶν most naturally qualifies a class of evil persons ('of all evil men'),
    intensifying the insult. This keeps the Greek piling-up of denunciatory terms
    without flattening it.
- source_word: τύραννε
  chosen: tyrant
  alternatives:
  - ruler
  lexicon: LSJ
  rationale: τύραννος in this context is pejorative, not a neutral political title.
    'Tyrant' preserves the moral condemnation.
- source_word: οὐκ ᾐδέσθης
  chosen: were you not ashamed
  alternatives:
  - did you feel no shame
  - were you not embarrassed
  lexicon: LSJ
  rationale: Aorist passive/deponent of αἰδέομαι, expressing shame or reverent restraint.
    'Were you not ashamed' is idiomatic in this rhetorical question and preserves
    the moral accusation.
- source_word: παρὰ τοῦ θεοῦ λαβὼν
  chosen: after receiving ... from God
  alternatives:
  - having received ... from God
  lexicon: LSJ
  rationale: The participle is antecedent in sense to the main action. 'After receiving'
    makes the temporal logic explicit in natural English while preserving the source
    meaning.
- source_word: τὰ ἀγαθὰ
  chosen: good things
  alternatives:
  - benefits
  - blessings
  lexicon: LSJ
  rationale: The phrase is broad and unspecific in Greek. 'Good things' stays close
    to the text; 'blessings' would add a more overtly religious nuance than the Greek
    requires.
- source_word: τὴν βασιλείαν
  chosen: kingship
  alternatives:
  - kingdom
  - royal power
  - rule
  lexicon: LSJ
  rationale: Here the sense is the royal office or sovereignty granted to the ruler,
    not primarily the territory. 'Kingship' best captures that bestowed status.
- source_word: τοὺς θεράποντας αὐτοῦ
  chosen: his servants
  alternatives:
  - his attendants
  - his ministers
  - those who serve him
  lexicon: LSJ
  rationale: θεράπων can denote an attendant or servant, often with dignified religious
    service in view. 'Servants' is the most natural English here and avoids over-specifying
    cultic office while preserving belonging to God.
- source_word: κατακτείνειν
  chosen: to kill
  alternatives:
  - to slaughter
  - to put to death
  lexicon: LSJ
  rationale: The verb is intensive, 'kill down/slay,' but 'to kill' is sufficiently
    direct and readable. 'Slaughter' may over-color the line beyond what the immediate
    context requires.
- source_word: τοὺς τῆς εὐσεβείας ἀσκητάς
  chosen: the practitioners of godliness
  alternatives:
  - the devotees of piety
  - those trained in godliness
  - the ascetics of piety
  lexicon: LSJ
  rationale: ἀσκητής can mean one who practices or trains in a discipline; with τῆς
    εὐσεβείας it refers to those devoted to the disciplined practice of piety. 'Practitioners
    of godliness' communicates both devotion and practice without importing later
    technical 'ascetic' connotations too strongly.
- source_word: στρεβλοῦν
  chosen: to torture
  alternatives:
  - to rack
  - to torment
  lexicon: LSJ
  rationale: The verb denotes torture, often by stretching on the rack. 'Torture'
    is the clearest general rendering; the more specific 'rack' would be too narrow
    unless the instrument were explicit.
