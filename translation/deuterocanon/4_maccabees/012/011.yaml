theological_decisions:
- issue: Rendering εὐσέβεια language in a Jewish martyrdom context
  chosen_reading: godliness
  alternative_readings:
  - piety
  rationale: εὐσέβεια is a key virtue term in 4 Maccabees. 'Godliness' is accessible
    modern English and preserves explicit relation to God; 'piety' remains a viable
    alternative but can sound either archaic or merely external in contemporary English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Rendering θεράποντας for those belonging to God
  chosen_reading: servants
  alternative_readings:
  - ministers
  - attendants
  rationale: The term denotes those who serve God, but the text does not specify an
    office. 'Servants' preserves the relational sense without importing later ecclesiastical
    categories.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
