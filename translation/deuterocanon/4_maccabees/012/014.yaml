translation:
  text: But those who died nobly fulfilled their piety toward God;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their piety toward God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ᾽
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks a contrast with the preceding context; 'But' is the most natural
    concise English adversative here.
- source_word: οἱ μὲν
  chosen: those
  alternatives:
  - indeed those
  - for their part those
  lexicon: BDAG
  rationale: The μέν particle sets up one side of a contrast. English usually leaves
    μέν implicit unless the balancing clause is explicit. 'Those' preserves the referential
    force without awkwardness.
- source_word: εὐγενῶς
  chosen: nobly
  alternatives:
  - honorably
  - with noble courage
  lexicon: BDAG
  rationale: The adverb denotes a noble or honorable manner. 'Nobly' is compact and
    preserves the moral valuation central to the martyrdom context.
- source_word: ἀποθανόντες
  chosen: who died
  alternatives:
  - having died
  - after dying
  lexicon: BDAG
  rationale: Aorist participle referring to the completed act of death. Relative-clause
    English is smoother than a participial construction here while preserving sense.
- source_word: ἐπλήρωσαν
  chosen: fulfilled
  alternatives:
  - completed
  - brought to fullness
  lexicon: BDAG
  rationale: The verb literally conveys filling up or bringing to completion. 'Fulfilled'
    best captures the sense that their death brought their piety to its full expression.
- source_word: τὴν ... εὐσέβειαν
  chosen: their godliness
  alternatives:
  - their piety
  - their reverence
  lexicon: BDAG
  rationale: εὐσέβεια in this Jewish-Greek context denotes reverent devotion expressed
    in faithful conduct toward God. 'Godliness' is readable modern English and preserves
    religious weight; 'piety' is viable but can sound either archaic or overly external.
- source_word: εἰς τὸν θεόν
  chosen: toward God
  alternatives:
  - for God
  - to God
  lexicon: BDAG
  rationale: The preposition εἰς here expresses direction or orientation of devotion.
    'Toward God' most naturally conveys the object of their godliness without implying
    possession.
