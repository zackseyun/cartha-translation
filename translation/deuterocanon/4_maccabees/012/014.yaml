theological_decisions:
- issue: Rendering εὐσέβεια in a martyrdom context
  chosen_reading: godliness
  alternative_readings:
  - piety
  - reverence
  rationale: The verse commends faithful devotion to God brought to completion in
    noble death. 'Godliness' preserves both inward devotion and outward faithful conduct
    without importing later technical theology. 'Piety' remains a strong lexical alternative
    but is less natural for the target audience.
