translation:
  text: and when his mother had encouraged him in the Hebrew language, as we will
    tell a little later,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the Hebrew tongue.' The Greek phrase refers to the language in which
      the mother spoke to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: προτρεψαμένης
  chosen: had urged ... on
  alternatives:
  - had encouraged
  - had exhorted
  - had prompted
  lexicon: LSJ
  rationale: The participle from προτρέπω conveys active encouragement or exhortation.
    'Urged ... on' preserves the force better than the softer 'encouraged' while remaining
    natural English.
- source_word: τῇ Ἑβραΐδι φωνῇ
  chosen: in the Hebrew language
  alternatives:
  - in the Hebrew tongue
  - with the Hebrew voice/speech
  lexicon: LSJ
  rationale: φωνή here refers to speech/language rather than mere sound. 'In the Hebrew
    language' is clear modern English and preserves the ethnic-linguistic reference.
- source_word: μετὰ μικρὸν ὕστερον
  chosen: a little later
  alternatives:
  - shortly afterward
  - later on
  lexicon: LSJ
  rationale: This idiom points forward in the narrative to something to be recounted
    soon. 'A little later' is concise and natural.
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - but
  - ''
  lexicon: LSJ
  rationale: Here δέ functions as a mild connective rather than a strong contrast.
    'And' best fits the flow in English.
- source_word: ὡς ἐροῦμεν
  chosen: as we will tell
  alternatives:
  - as we will say
  - as we will relate
  lexicon: LSJ
  rationale: The future verb marks an authorial aside promising later narration. 'Tell'
    is readable modern English and suits narrative context.
