theological_decisions:
- issue: Idiomatic force of ἀπέδωκεν in a martyrdom narrative
  chosen_reading: he died
  alternative_readings:
  - he gave up his life
  - he yielded up [his life/spirit]
  rationale: The text does not explicitly state 'life' or 'spirit,' but the idiom
    clearly refers to death. Rendering it as 'he died' avoids importing a more specific
    theological claim while still conveying the narrative outcome.
