translation:
  text: But even in the present life, and after you die, he will punish you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'both now in this life and when you are dead, he will punish you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σὲ
  chosen: you
  lexicon: BDAG
  rationale: Second-person singular accusative pronoun, the direct object of the future
    verb; rendered straightforwardly as singular 'you'.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks contrast or continuation with what precedes; 'But' best preserves
    the adversative force in context.
- source_word: καὶ
  chosen: even ... and
  alternatives:
  - also
  - both ... and
  lexicon: BDAG
  rationale: The first καὶ intensifies the scope ('even in the present life'), while
    the second coordinates the two temporal spheres ('and after you die'). English
    uses different idiomatic equivalents to reflect the two occurrences naturally.
- source_word: ἐν τῷ νῦν βίῳ
  chosen: in the present life
  alternatives:
  - in this life now
  - in your present life
  lexicon: BDAG
  rationale: Literally 'in the now life'; idiomatic English is 'in the present life'
    or 'in this life.' 'Present life' preserves the contrast with postmortem punishment.
- source_word: θανόντα
  chosen: after you die
  alternatives:
  - when dead
  - though dead
  - dead
  lexicon: BDAG
  rationale: 'Aorist participle of θνῄσκω agreeing with the object pronoun, functioning
    temporally: punishment will occur also subsequent to death. ''After you die''
    expresses this temporal force clearly in English.'
- source_word: τιμωρήσεται
  chosen: he will punish
  alternatives:
  - will take vengeance on
  - will exact punishment from
  lexicon: BDAG
  rationale: Future middle of τιμωρέω. In context the sense is punitive action by
    an implied subject from the prior discourse, best rendered simply as 'he will
    punish.' 'Take vengeance' is possible but can over-specify the nuance.
