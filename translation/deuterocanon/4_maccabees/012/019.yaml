theological_decisions:
- issue: Implied subject of the future verb
  chosen_reading: he will punish you
  alternative_readings:
  - you will be punished
  rationale: The Greek verb is third-person singular middle, not passive. The subject
    is implicit from context rather than named in this clause, so English supplies
    'he' rather than converting to a passive and obscuring agency.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Temporal scope of punishment
  chosen_reading: in the present life, and after you die
  alternative_readings:
  - both now and after death
  - in this life and when dead
  rationale: The verse explicitly states punishment both during earthly life and after
    death. The translation preserves both temporal dimensions without softening the
    postmortem implication.
  doctrine_reference: Original-language primacy over translation tradition.
