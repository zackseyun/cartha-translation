theological_decisions:
- issue: Anthropological contrast in ἄνθρωπος ὢν ... θηριωδέστατε
  chosen_reading: Retain the human-versus-beast contrast explicitly with 'though you
    are a man, most beastly one.'
  alternative_readings:
  - though you are human, most savage one
  rationale: The verse's moral indictment depends on the irony that a human ruler
    behaves worse than a beast. Preserving the contrast serves the rhetoric without
    adding doctrinal claims.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Meaning of στοιχεῖα in human constitution
  chosen_reading: Translate as 'elements' in the main text.
  alternative_readings:
  - basic components
  - same material constitution
  rationale: The author uses philosophical language for shared human makeup. 'Elements'
    preserves the source's conceptual texture and avoids over-interpretation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
