id: 4MA.12.13
reference: 4 Maccabees 12:13
source:
  edition: lxx-swete-1909
  text: οὐκ ᾐδέσθης ἄνθρωπος ὢν, θηριωδέστατε, τοὺς ὁμοιοπαθεῖς καὶ ἐκ τῶν αὐτῶν γεγονότας
    στοιχείων γλωττοτομῆσαι, καὶ τοῦτον καταικίσας τὸν τρόπον βασανίσαι;
  language: Greek
