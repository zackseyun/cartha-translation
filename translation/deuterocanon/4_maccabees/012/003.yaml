translation:
  text: He sent for him to come nearer, and tried to encourage him, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He summoned him closer, and was trying to comfort him, saying.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλησιέστερον
  chosen: to come nearer
  alternatives:
  - nearer
  - closer
  lexicon: LSJ
  rationale: Comparative adverb from πλησίον, indicating greater proximity. In English,
    'sent for him to come nearer' makes the motion implied by the context natural
    while preserving the comparative sense.
- source_word: αὐτὸν
  chosen: him
  rationale: Direct object pronoun referring to the son being addressed in context;
    straightforward masculine singular accusative.
- source_word: μετεπέμψατο
  chosen: sent for
  alternatives:
  - summoned
  - called for
  lexicon: LSJ
  rationale: Middle of μεταπέμπω commonly means 'send for, summon.' 'Sent for' is
    idiomatic modern English and fits the narrative tone without overstating official
    formality.
- source_word: παρηγορεῖν
  chosen: to encourage
  alternatives:
  - to comfort
  - to console
  lexicon: LSJ
  rationale: The infinitive denotes the content of his attempt toward the young man.
    'Encourage' best fits the immediate setting of exhortation under trial; 'comfort/console'
    are possible but slightly narrower emotionally.
- source_word: ἐπειρᾶτο
  chosen: tried
  alternatives:
  - attempted
  - was trying
  lexicon: LSJ
  rationale: Imperfect middle of πειράω/πειράομαι conveys ongoing attempted action.
    'Tried' is concise and natural; the sequence with 'saying' still reflects the
    continuing effort.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: LSJ
  rationale: Present participle introducing direct speech. 'Saying' preserves the
    participial linkage to the preceding imperfect better than converting it into
    a simple finite verb.
