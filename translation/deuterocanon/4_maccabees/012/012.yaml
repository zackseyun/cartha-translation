id: 4MA.12.12
reference: 4 Maccabees 12:12
source:
  edition: lxx-swete-1909
  text: ἀνθ᾽ ὧν ταμιεύεταί σε ἡ θεία δίκη πυκνοτέρῳ καὶ αἰωνίῳ πυρὶ καὶ βασάνοις,
    αἱ εἰς ὅλον τὸν αἰῶνα οὐκ ἀνήσουσί σε.
