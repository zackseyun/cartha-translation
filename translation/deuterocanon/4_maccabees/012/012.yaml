translation:
  text: For these things, divine justice is storing up for you a more intense and
    eternal fire and torments, which through the whole age will not release you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more intense fire.' The Greek comparative πυκνοτέρῳ is literally 'denser'
      or 'thicker,' here expressing intensified punishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'age-long fire.' The Greek αἰώνιος can be rendered more literally in
      relation to an age, though in this context it commonly carries the sense 'eternal.'
    reason: alternative_reading
  - marker: c
    text: Literally 'through the whole age.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθ᾽ ὧν
  chosen: For these things
  alternatives:
  - because of which
  - for which reason
  - therefore because of these things
  lexicon: LSJ
  rationale: The phrase introduces the ground for the coming punishment. 'For these
    things' is concise, idiomatic English that preserves the causal force without
    over-paraphrasing.
- source_word: ταμιεύεταί
  chosen: is storing up
  alternatives:
  - is reserving
  - is laying up
  - treasures up
  lexicon: LSJ
  rationale: The middle/passive form conveys something being kept in store for a future
    time. 'Is storing up' preserves the metaphor of reserved recompense and fits the
    present tense.
- source_word: ἡ θεία δίκη
  chosen: divine justice
  alternatives:
  - the divine judgment
  - the justice of God
  - divine punishment
  lexicon: LSJ
  rationale: δίκη can denote justice, penalty, or judicial retribution. 'Divine justice'
    keeps both the judicial and retributive sense without importing an explicit divine
    name absent from the text.
- source_word: πυκνοτέρῳ
  chosen: denser
  alternatives:
  - more intense
  - heavier
  - more concentrated
  lexicon: LSJ
  rationale: The comparative literally suggests something thicker or denser. In context
    of fire, it likely intensifies the image. 'Denser' stays close to the Greek while
    remaining intelligible, though 'more intense' is a viable interpretive alternative.
- source_word: αἰωνίῳ
  chosen: eternal
  alternatives:
  - age-long
  - everlasting
  lexicon: LSJ
  rationale: In this punitive context, 'eternal' is the most natural English rendering
    and reflects the strong durative force in Hellenistic Jewish usage. The more literal
    'age-long' is preserved as an alternative because αἰώνιος can be understood in
    relation to the age.
- source_word: πυρὶ
  chosen: fire
  lexicon: LSJ
  rationale: Straightforward lexical rendering.
- source_word: βασάνοις
  chosen: torments
  alternatives:
  - tortures
  - pains
  lexicon: LSJ
  rationale: The plural denotes severe punitive suffering. 'Torments' communicates
    the gravity without sounding overly technical.
- source_word: αἱ
  chosen: which
  alternatives:
  - and these
  - which things
  lexicon: LSJ
  rationale: The feminine plural relative sense is best carried into English by 'which,'
    referring back to 'fire and torments' collectively.
- source_word: εἰς ὅλον τὸν αἰῶνα
  chosen: through the whole age
  alternatives:
  - forever
  - for all eternity
  - throughout all time
  lexicon: LSJ
  rationale: This phrase is more literally age-language than a simple adverb like
    'forever.' 'Through the whole age' preserves the wording and leaves the temporal
    expression transparent.
- source_word: οὐκ ἀνήσουσί
  chosen: will not release
  alternatives:
  - will not let go
  - will not cease from
  - will not relax their hold on
  lexicon: LSJ
  rationale: The verb conveys loosening or letting up. With 'fire and torments' as
    subject, 'will not release you' captures the image of unrelenting punishment.
