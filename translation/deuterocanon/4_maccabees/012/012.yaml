theological_decisions:
- issue: Rendering of αἰώνιος and εἰς ὅλον τὸν αἰῶνα in a punishment context
  chosen_reading: Main text uses 'eternal' for αἰώνιος while preserving the more literal
    age-language in 'through the whole age.'
  alternative_readings:
  - '''age-long fire'' and ''for the whole age'''
  - '''everlasting fire'' and ''forever'''
  rationale: The verse stacks two duration expressions. Rendering αἰώνιος as 'eternal'
    reflects common punitive force in context, while translating εἰς ὅλον τὸν αἰῶνα
    more literally preserves the text's temporal idiom and avoids flattening both
    phrases into the same English expression.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
