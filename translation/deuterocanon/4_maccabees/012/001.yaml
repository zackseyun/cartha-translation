theological_decisions:
- issue: Rendering μακαρίως in a martyrdom context
  chosen_reading: died blessedly
  alternative_readings:
  - died happily
  - died in a blessed way
  rationale: The text presents the brother's death as honorable and spiritually commendable,
    not merely emotionally pleasant. 'Blessedly' preserves that evaluative dimension
    without importing later doctrinal language beyond the Greek.
