id: 4MA.12.1
reference: 4 Maccabees 12:1
source:
  edition: lxx-swete-1909
  text: Ὡς δὲ καὶ αὖτος μακαρίως ἐναπέθανεν καταβληθεὶς εἰς λέβητα, ὁ ἕβδομος παρεγίνετο,
    ὁ πάντων νεώτερος.
  language: Greek
  pages:
  - 752
  - 770
  - 771
  - 772
  - 773
  - 774
  - 775
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: And as he too died blessedly, after being thrown into the cauldron, the seventh
    came forward, the youngest of all.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μακαρίως
  chosen: blessedly
  alternatives:
  - blessed
  - happily
  - in a blessed manner
  lexicon: LSJ
  rationale: The adverb modifies ἐναπέθανεν and conveys the manner of death as enviable
    or blessed. 'Blessedly' preserves the adverbial force and the martyrdom context
    better than the flatter 'happily.'
- source_word: ἐναπέθανεν
  chosen: died
  alternatives:
  - met his death
  - died in it
  lexicon: LSJ
  rationale: The compound verb indicates dying in the imposed circumstance; in English,
    'died' is the most natural core rendering, with the surrounding participle supplying
    the circumstance.
- source_word: καταβληθείς
  chosen: after being thrown
  alternatives:
  - having been cast down
  - having been hurled
  lexicon: LSJ
  rationale: The aorist passive participle denotes forcible casting. 'After being
    thrown' communicates both passivity and sequence in idiomatic English.
- source_word: λέβητα
  chosen: cauldron
  alternatives:
  - kettle
  - boiling pot
  lexicon: LSJ
  rationale: λέβης refers to a metal vessel or cauldron. 'Cauldron' fits the torture
    setting and is more vivid and precise than 'kettle.'
- source_word: παρεγίνετο
  chosen: came forward
  alternatives:
  - appeared
  - presented himself
  - came up
  lexicon: LSJ
  rationale: In this narrative context, the verb marks the next brother stepping into
    the scene for ordeal. 'Came forward' captures that movement and dramatic progression.
- source_word: ὁ πάντων νεώτερος
  chosen: the youngest of all
  alternatives:
  - the youngest of them all
  - the youngest among all
  lexicon: LSJ
  rationale: The superlative phrase identifies the seventh brother as the youngest
    in the group. 'The youngest of all' is concise and natural.
