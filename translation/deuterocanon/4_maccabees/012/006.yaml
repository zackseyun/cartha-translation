theological_decisions:
- issue: Meaning of σωτηρία in a martyrdom context
  chosen_reading: deliverance in the sense of physical rescue from execution
  alternative_readings:
  - salvation in a broader or spiritual sense
  rationale: The immediate narrative concerns the king's effort to spare the remaining
    son if he complies. The context points to temporal rescue rather than a doctrinal
    statement about eternal salvation.
