translation:
  text: And while urging these things, he sent for the boy’s mother, so that, having
    pity on her after she had been deprived of so many sons, he might persuade her
    to make the one left alive compliant for his deliverance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for his salvation.' The Greek can use 'salvation' broadly, but here
      it most naturally refers to physical deliverance.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακαλῶν
  chosen: urging
  alternatives:
  - encouraging
  - exhorting
  - appealing
  lexicon: BDAG
  rationale: The participle denotes earnest verbal appeal in context. 'Urging' fits
    the tyrant's attempt to press his case without sounding too gentle ('encouraging')
    or overly formal ('exhorting').
- source_word: μετεπέμψατο
  chosen: he sent for
  alternatives:
  - he summoned
  - he had ... brought
  lexicon: LSJ
  rationale: The middle verb commonly means to send for or summon someone. 'Sent for'
    is idiomatic modern English and preserves the action without overstating coercive
    nuance.
- source_word: ἐλεήσας
  chosen: having pity on
  alternatives:
  - having mercy on
  - taking compassion on
  lexicon: BDAG
  rationale: The aorist participle expresses the motive attributed to him. 'Having
    pity on' communicates the claimed compassionate impulse in natural English; 'mercy'
    can sound more theological than the context requires.
- source_word: στερηθεῖσαν
  chosen: after she had been deprived of
  alternatives:
  - having been bereft of
  - having lost
  lexicon: BDAG
  rationale: The passive participle literally indicates being deprived. 'After she
    had been deprived of' preserves the passive sense better than the simpler 'having
    lost,' while remaining readable.
- source_word: παρορμήσειεν
  chosen: he might persuade
  alternatives:
  - he might urge on
  - he might induce
  - he might incite
  lexicon: LSJ
  rationale: In this context the goal is to move the mother toward influencing her
    son. 'Persuade' best captures the intended effect in English; 'incite' is too
    harsh and 'urge on' is awkward here.
- source_word: σωτηρίαν
  chosen: deliverance
  alternatives:
  - salvation
  - preservation
  - safety
  lexicon: BDAG
  rationale: Here the reference is immediate physical rescue from death rather than
    explicitly theological salvation. 'Deliverance' preserves the rescue sense without
    importing later doctrinal overtones.
- source_word: εὐπειθῆ ποιῆσαι
  chosen: to make ... compliant
  alternatives:
  - to make ... obedient
  - to make ... persuadable
  - to render ... submissive
  lexicon: LSJ
  rationale: The phrase means to make someone yielding or compliant. 'Compliant' fits
    the coercive court setting and avoids implying a morally positive obedience.
- source_word: τὸν περιλειπόμενον
  chosen: the one left alive
  alternatives:
  - the remaining one
  - the survivor
  - the one left
  lexicon: LSJ
  rationale: The participle refers to the sole son still remaining. 'The one left
    alive' makes the situation explicit for English readers and fits the immediate
    narrative context.
