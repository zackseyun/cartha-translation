id: 4MA.12.6
reference: 4 Maccabees 12:6
source:
  edition: lxx-swete-1909
  text: καὶ ταῦτα παρακαλῶν, τὴν μητέρα τοῦ παιδὸς μετεπέμψατο, ὅπως αὐτὴν ἐλεήσας
    τοσούτων υἱῶν στερηθεῖσαν παρορμήσειεν ἐπὶ τὴν σωτηρίαν εὐπειθῆ ποιῆσαι τὸν περιλειπόμενον.
  language: Greek
