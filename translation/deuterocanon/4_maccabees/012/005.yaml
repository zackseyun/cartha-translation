id: 4MA.12.5
reference: 4 Maccabees 12:5
source:
  edition: lxx-swete-1909
  text: πεισθεὶς δὲ φίλος ἔσῃ, καὶ τῶν ἐπὶ τῆς βασιλείας ἀφήγησιν πραγμάτων.
  language: Greek
