translation:
  text: But if you are persuaded, you will be a friend, and you will have charge of
    the affairs of the kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will have charge of the affairs of the kingdom.' The Greek term
      rendered 'oversight' can denote administration or leadership.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεισθεὶς
  chosen: if you are persuaded
  alternatives:
  - having been persuaded
  - if you comply
  - if you yield
  lexicon: LSJ
  rationale: Aorist passive participle of πείθω used conditionally in context. English
    idiom is clearer with an explicit conditional sense ('if you are persuaded') rather
    than a wooden participial construction. 'Comply' or 'yield' are possible contextual
    expansions but go beyond the plain lexical sense.
- source_word: φίλος
  chosen: friend
  alternatives:
  - ally
  - favorite
  lexicon: LSJ
  rationale: The basic sense is 'friend.' In royal court context it can imply favored
    status, but 'friend' preserves the source term while allowing the political nuance
    to be inferred from the surrounding promise.
- source_word: ἔσῃ
  chosen: you will be
  alternatives:
  - you shall be
  lexicon: LSJ
  rationale: Future of εἰμί. 'You will be' is straightforward modern English.
- source_word: τῶν ἐπὶ τῆς βασιλείας πραγμάτων
  chosen: the affairs of the kingdom
  alternatives:
  - the matters of the kingdom
  - the business of the kingdom
  - the affairs of the royal realm
  lexicon: LSJ
  rationale: πράγματα commonly means matters, affairs, or business. With ἐπὶ τῆς βασιλείας,
    the phrase refers to royal or kingdom affairs. 'Affairs of the kingdom' is natural
    English and preserves the administrative sense.
- source_word: ἀφήγησιν
  chosen: oversight
  alternatives:
  - charge
  - administration
  - leadership
  - governance
  lexicon: LSJ
  rationale: The noun here denotes leadership, guidance, or administration. Because
    the phrase promises a role over royal affairs, 'oversight' best captures delegated
    supervisory authority without overstating it. 'Narration/account' is a different
    sense of the cognate family and does not fit this context.
