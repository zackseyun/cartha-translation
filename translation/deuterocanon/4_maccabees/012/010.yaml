translation:
  text: And running up close to the frying pans, he said,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'near the pans' or 'close by the frying pans.' The Greek phrase ἐπὶ πλησίον
      compresses motion and proximity.
    reason: lexical_alternative
  - marker: b
    text: τήγανα are cooking pans; here they are the heated instruments of torture
      in the narrative context.
    reason: cultural_note
lexical_decisions:
- source_word: δραμὼν
  chosen: running
  alternatives:
  - having run
  - after running
  lexicon: LSJ
  rationale: Aorist participle of τρέχω, indicating swift movement prior to the main
    verb. English participial 'running' preserves the vivid narrative flow better
    than a more wooden pluperfect-like form.
- source_word: ἐπὶ πλησίον
  chosen: up close to
  alternatives:
  - near
  - close by
  - toward the vicinity of
  lexicon: LSJ
  rationale: The phrase conveys movement into close proximity. 'Up close to' captures
    both the directional force of ἐπί and the nearness of πλησίον in readable modern
    English.
- source_word: τῶν τηγάνων
  chosen: the frying pans
  alternatives:
  - the pans
  - the griddles
  lexicon: LSJ
  rationale: τήγανον refers to a frying pan or flat pan used in cooking; in this martyrdom
    context it denotes the torture implements already in view. 'Frying pans' is the
    most direct lexical equivalent, while 'griddles' is possible but less natural
    in contemporary English.
- source_word: ἔφη
  chosen: he said
  alternatives:
  - he spoke
  - he declared
  lexicon: LSJ
  rationale: Imperfect/secondary narrative speech introducer regularly rendered 'he
    said.' This is the most natural English equivalent and fits the immediate quotation-introduction
    function.
