translation:
  text: And, rejoicing especially over the young man's promise, they quickly untied
    him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιχαρέντες
  chosen: rejoicing
  alternatives:
  - being delighted
  - having rejoiced
  lexicon: BDAG
  rationale: A participial form meaning to rejoice over or be glad at something. 'Rejoicing'
    preserves the participial connection to the main verb without overcomplicating
    the English.
- source_word: μάλιστα
  chosen: especially
  alternatives:
  - most of all
  - particularly
  lexicon: LSJ
  rationale: The adverb intensifies the cause of their joy. 'Especially' is natural
    modern English and keeps the emphasis.
- source_word: ἐπαγγελίᾳ
  chosen: promise
  alternatives:
  - pledge
  - assurance
  lexicon: BDAG
  rationale: The noun commonly means 'promise' or 'pledge.' In this context it refers
    to the young man's stated commitment or assurance; 'promise' is the most straightforward
    rendering.
- source_word: τοῦ παιδός
  chosen: the young man's
  alternatives:
  - the boy's
  - the youth's
  - the child's
  lexicon: BDAG
  rationale: παῖς can mean child, boy, servant, or young person depending on context.
    Here the referent is one of the Maccabean brothers, so 'young man' best fits the
    narrative context and avoids implying a small child.
- source_word: ταχέως
  chosen: quickly
  alternatives:
  - at once
  - swiftly
  lexicon: LSJ
  rationale: The adverb indicates prompt action. 'Quickly' is idiomatic and sufficiently
    precise.
- source_word: ἔλυσαν
  chosen: untied
  alternatives:
  - released
  - loosed
  lexicon: BDAG
  rationale: λύω literally means loosen, untie, or release. Given the torture setting
    and the direct object 'him,' 'untied' most concretely reflects freeing him from
    bonds, while 'released' could sound too general.
