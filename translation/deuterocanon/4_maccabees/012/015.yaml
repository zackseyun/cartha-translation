id: 4MA.12.15
reference: 4 Maccabees 12:15
source:
  edition: lxx-swete-1909
  text: σὺ δὲ κακῶς οἰμώξεις, τοὺς τῆς ἀρετῆς ἀγωνιστὰς ἀναίτιως ἀποκτεῖναι.
  language: Greek
