translation:
  text: But you will wail bitterly for having unjustly put to death the champions
    of virtue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the athletes of virtue' or 'the fighters for virtue'; the Greek term
      evokes contestants in a struggle and is used honorifically here.
    reason: lexical_alternative
  - marker: b
    text: Or 'unjustly' or 'without justification.' The Greek says literally 'without
      cause.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ δὲ
  chosen: But you
  alternatives:
  - and you
  - yet you
  lexicon: LSJ
  rationale: Marks a direct contrast and address to the tyrant; 'But you' preserves
    the adversative force naturally in English.
- source_word: κακῶς
  chosen: miserably
  alternatives:
  - badly
  - grievously
  - in misery
  lexicon: LSJ
  rationale: With οἰμώξεις it intensifies the lament; 'miserably' conveys the adverbial
    sense in idiomatic English without flattening the emotional force.
- source_word: οἰμώξεις
  chosen: will wail
  alternatives:
  - will lament
  - will cry out in grief
  - will groan
  lexicon: LSJ
  rationale: Future of οἰμώζω denotes loud lamentation or wailing. 'Will wail' is
    vivid and direct, fitting the denunciatory tone.
- source_word: τοὺς ... ἀγωνιστάς
  chosen: the champions
  alternatives:
  - the contestants
  - the fighters
  - the athletes
  lexicon: LSJ
  rationale: ἀγωνιστής literally refers to one who contends in a contest or struggle.
    In this moral-martyrdom context, 'champions' captures both struggle and honor
    better than the more literal but potentially misleading 'athletes'.
- source_word: τῆς ἀρετῆς
  chosen: of virtue
  alternatives:
  - of excellence
  - of moral excellence
  lexicon: LSJ
  rationale: ἀρετή in 4 Maccabees carries a strong ethical sense. 'Virtue' is the
    most concise and contextually fitting rendering in this philosophical-moral setting.
- source_word: ἀναίτιως
  chosen: without cause
  alternatives:
  - unjustly
  - innocently
  - without justification
  lexicon: LSJ
  rationale: 'The adverb indicates absence of just cause or guilt. ''Without cause''
    preserves the semantic openness: the victims are killed with no valid reason,
    implying injustice without over-interpreting.'
- source_word: ἀποκτεῖναι
  chosen: for putting to death
  alternatives:
  - for killing
  - to kill
  lexicon: LSJ
  rationale: The infinitive depends on the sense of lament over one's deed. Rendering
    it as 'for putting to death' makes the causal relation clear in English while
    retaining the gravity of the act.
