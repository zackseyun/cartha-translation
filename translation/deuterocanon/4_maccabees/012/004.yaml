id: 4MA.12.4
reference: 4 Maccabees 12:4
source:
  edition: lxx-swete-1909
  text: Τῆς μὲν τῶν ἀδελφῶν σου ἀπονοίας τὸ τέλος ὁρᾷς· διὰ γὰρ ἀπείθειαν στρεβλωθέντες
    τεθήκασιν. σύ, εἰ μὲν μὴ πεισθείης, ταλαί βασανισθεὶς καὶ αὐτὸς τεθνήξῃ πρὸ ὥρας.
  language: Greek
