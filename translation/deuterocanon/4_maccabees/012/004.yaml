translation:
  text: You see the outcome of your brothers’ madness; for because of disobedience
    they have been tortured and have died. But you, if you do not obey, will yourself
    also die before your time, after being miserably tortured.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the end' or 'the result' of your brothers' madness.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb for 'have been tortured' can more specifically refer to being
      stretched on the rack.
    reason: cultural_note
  - marker: c
    text: Or 'if you are not persuaded'; here the sense is practical compliance, hence
      'obey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπονοίας
  chosen: madness
  alternatives:
  - folly
  - senselessness
  - recklessness
  lexicon: LSJ
  rationale: The noun denotes irrationality or derangement of judgment. 'Madness'
    best conveys the speaker's hostile assessment in direct speech without sounding
    overly mild; 'folly' is possible but weaker.
- source_word: τὸ τέλος
  chosen: the outcome
  alternatives:
  - the end
  - the result
  lexicon: LSJ
  rationale: In context the phrase points to what has happened to the brothers as
    the consequence of their course. 'Outcome' communicates consequence more naturally
    in English than the more ambiguous 'end,' while remaining close to the Greek.
- source_word: ἀπείθειαν
  chosen: disobedience
  alternatives:
  - refusal to obey
  - unpersuadableness
  lexicon: BDAG
  rationale: The causal phrase διὰ γὰρ ἀπείθειαν refers to their refusal to comply
    with the tyrant's demand. 'Disobedience' is the most straightforward English equivalent
    here.
- source_word: στρεβλωθέντες
  chosen: have been tortured
  alternatives:
  - have been racked
  - have been twisted under torture
  lexicon: LSJ
  rationale: The verb can refer specifically to torture on the rack, but a more general
    'have been tortured' fits optimal equivalence and remains faithful without over-specifying
    the instrument in the main text.
- source_word: τεθήκασιν
  chosen: have died
  alternatives:
  - are dead
  - have been laid low
  lexicon: LSJ
  rationale: In this context the perfect functions idiomatically for death. 'Have
    died' makes the sense explicit in natural English.
- source_word: πεισθείης
  chosen: obey
  alternatives:
  - be persuaded
  - yield
  lexicon: BDAG
  rationale: Although literally 'be persuaded,' in this coercive context the intended
    sense is compliance with the king's command. 'Obey' captures the practical force
    and aligns with the preceding ἀπείθεια.
- source_word: ταλαί
  chosen: miserably
  alternatives:
  - wretchedly
  - poor wretch
  lexicon: LSJ
  rationale: The particle/adverbial form intensifies the suffering and addresses the
    victim with pity or contempt. Rendering it adverbially with 'miserably' fits the
    syntax with βασανισθείς and preserves the emotional force.
- source_word: βασανισθεὶς
  chosen: after being miserably tortured
  alternatives:
  - being tormented wretchedly
  - after being tortured
  lexicon: BDAG
  rationale: The participle denotes undergoing severe torment. Combined with ταλαί,
    the phrase is best represented as intensified torture preceding death.
- source_word: πρὸ ὥρας
  chosen: before your time
  alternatives:
  - prematurely
  - before the appointed time
  lexicon: LSJ
  rationale: The idiom means an untimely or premature death. 'Before your time' is
    idiomatic modern English and preserves the force.
