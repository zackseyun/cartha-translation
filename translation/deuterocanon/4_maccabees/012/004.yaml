theological_decisions:
- issue: Speaker's evaluative description of the brothers' stance
  chosen_reading: Rendered ἀπονοίας as 'madness' to preserve the tyrant's condemnatory
    rhetoric without endorsing it narratively.
  alternative_readings:
  - folly
  - senselessness
  rationale: The verse is hostile speech directed at the remaining brother. The translation
    should preserve the rhetoric of the speaker rather than soften it into neutral
    description.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
