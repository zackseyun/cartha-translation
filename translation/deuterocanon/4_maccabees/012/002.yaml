id: 4MA.12.2
reference: 4 Maccabees 12:2
source:
  edition: lxx-swete-1909
  text: ὃν κατοικτειρήσας ὁ τύραννος, καίπερ δεινῶς ὑπὸ τῶν ἀδελφῶν αὐτοῦ κακισθείς,
    ὁρῶν ἤδη τὰ δεσμὰ περικείμενον,
  language: Greek
