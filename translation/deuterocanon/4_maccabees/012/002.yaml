translation:
  text: Whom the tyrant pitied, even though he had been cruelly mistreated by his
    brothers, seeing that he was already wearing the chains,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'bound in chains' or 'with the chains fastened around him.' The Greek
      literally describes him as having the chains around him.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατοικτειρήσας
  chosen: pitied
  alternatives:
  - had compassion on
  - took pity on
  lexicon: LSJ
  rationale: The participle denotes feeling pity or compassion. 'Pitied' is concise
    and natural in English while preserving the emotional force.
- source_word: ὁ τύραννος
  chosen: the tyrant
  alternatives:
  - the king
  - the ruler
  lexicon: LSJ
  rationale: τύραννος in 4 Maccabees is a morally charged designation for the persecuting
    ruler; 'the tyrant' preserves that evaluative force better than a neutral political
    title.
- source_word: καίπερ
  chosen: even though
  alternatives:
  - although
  - despite the fact that
  lexicon: LSJ
  rationale: This concessive particle introduces a strong concession. 'Even though'
    captures the sense clearly in modern English.
- source_word: δεινῶς
  chosen: cruelly
  alternatives:
  - terribly
  - severely
  lexicon: LSJ
  rationale: The adverb intensifies the mistreatment. 'Cruelly' fits the context of
    torture and abuse better than the more generic 'severely'.
- source_word: ὑπὸ τῶν ἀδελφῶν αὐτοῦ
  chosen: by his brothers
  alternatives:
  - by his brothers of the same family
  - by his siblings
  lexicon: LSJ
  rationale: ἀδελφῶν is grammatically and contextually 'brothers,' referring to the
    male siblings in the martyr narrative. Per project policy, gender-accurate language
    is retained.
- source_word: κακισθείς
  chosen: had been cruelly abused
  alternatives:
  - had been maltreated
  - had been badly treated
  - had been tortured
  lexicon: LSJ
  rationale: The passive participle indicates being subjected to harsh mistreatment.
    'Abused' is broad enough to fit the immediate wording without over-specifying
    a particular form of torture, while 'cruelly' carries the force of δεινῶς.
- source_word: ὁρῶν
  chosen: seeing
  alternatives:
  - when he saw
  - as he saw
  lexicon: LSJ
  rationale: The participle is best rendered with a simple participial or temporal
    sense. 'Seeing' keeps the Greek flow and links the tyrant's pity to what he observed.
- source_word: ἤδη
  chosen: already
  alternatives:
  - by now
  - at this point
  lexicon: LSJ
  rationale: ἤδη marks the state as already in effect; 'already' is the most direct
    equivalent.
- source_word: τὰ δεσμὰ περικείμενον
  chosen: wearing the chains
  alternatives:
  - bound in chains
  - with the chains fastened around him
  lexicon: LSJ
  rationale: The phrase literally describes chains being placed around him. 'Wearing
    the chains' is idiomatic English that preserves the visual sense of the bonds
    being on his body; 'bound in chains' is possible but slightly more interpretive.
