theological_decisions:
- issue: Scope of τῷ γένει μου
  chosen_reading: my people
  alternative_readings:
  - my family line
  - my nation
  - my kin
  rationale: The term γένος is broad. Given the context of solidarity with the Jewish
    people under persecution, the wider communal sense is most likely. This avoids
    narrowing the prayer to biological relatives alone.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering πατρῷον θεόν
  chosen_reading: the God of my fathers
  alternative_readings:
  - the ancestral God
  - the God of my ancestors
  rationale: This phrasing preserves the ancestral-covenantal force in idiomatic English
    and echoes biblical prayer language without importing wording not present in the
    Greek.
  doctrine_reference: Translation philosophy §1, §6
