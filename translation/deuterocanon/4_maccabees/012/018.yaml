translation:
  text: But I call upon the God of my fathers, that he may be merciful to my nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ancestral God' or 'the God of my ancestors.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to my nation,' 'to my kin,' or more literally 'to my race/lineage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικαλοῦμαι
  chosen: I call upon
  alternatives:
  - I invoke
  - I appeal to
  lexicon: BDAG
  rationale: The middle/passive form here conveys an earnest appeal directed to God.
    'Call upon' is idiomatic, preserves the prayerful sense, and avoids the more formal
    or ritual-sounding 'invoke' while remaining closer than a paraphrase like 'pray
    to'.
- source_word: πατρῷον
  chosen: of my fathers
  alternatives:
  - ancestral
  - of my ancestors
  - fatherly
  lexicon: LSJ
  rationale: The adjective denotes what belongs to one's fathers or ancestors, especially
    ancestral tradition. In this Jewish prayer context, 'the God of my fathers' is
    the most natural English expression and preserves the covenantal-historical resonance
    better than the abstract 'ancestral God.'
- source_word: θεόν
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering for θεός. The singular with the modifier πατρῷον identifies
    Israel's God in ancestral terms.
- source_word: ὅπως
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Introduces the content/purpose of the appeal. 'That' gives natural English
    after 'I call upon' without overformalizing the clause.
- source_word: ἐλέως
  chosen: merciful
  alternatives:
  - gracious
  - showing mercy
  lexicon: LSJ
  rationale: Used predicatively with γένηται, expressing that God might become or
    prove merciful. 'Merciful' is the clearest and most direct rendering in English.
- source_word: γένηται
  chosen: he may be
  alternatives:
  - he may become
  - he may prove to be
  lexicon: BDAG
  rationale: Though γίνομαι can mean 'become,' in prayer language with a predicate
    adjective it often functions idiomatically as 'be' or 'prove to be.' 'He may be
    merciful' is natural English and conveys the petition without implying a change
    in God's character.
- source_word: τῷ γένει μου
  chosen: to my people
  alternatives:
  - to my race
  - to my family line
  - to my nation
  - to my kin
  lexicon: BDAG
  rationale: γένος can denote family, lineage, clan, people, or nation. In this martyrdom
    context the speaker intercedes not merely for immediate relatives but for the
    broader Jewish people. 'My people' is natural modern English and avoids the misleading
    modern connotations of 'race.'
