theological_decisions:
- issue: Whether μαρτυρίας should be rendered with explicit martyrdom language
  chosen_reading: testimony
  alternative_readings:
  - martyrdom
  - witness
  rationale: Although 4 Maccabees strongly develops martyr theology, the Greek noun
    here is left in its ordinary sense. Rendering it as 'martyrdom' would import an
    interpretive development rather than translate the word directly. The martyr context
    remains implicit.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
