translation:
  text: I will not renounce the testimony of my brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the witness of my brothers'; in context the word also carries overtones
      associated with martyrdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐκ
  chosen: not
  lexicon: LSJ
  rationale: Straightforward negation governing the verb.
- source_word: ἀπαντυμολοῶ
  chosen: I will renounce
  alternatives:
  - I will not deny
  - I will not recant
  - I will not betray
  lexicon: LSJ
  rationale: The verb conveys refusing, disowning, or renouncing under pressure. 'Renounce'
    best fits the martyrdom context and the object 'the testimony,' expressing refusal
    to repudiate what the brothers have borne witness to.
- source_word: μαρτυρίας
  chosen: testimony
  alternatives:
  - witness
  - martyrdom
  lexicon: LSJ
  rationale: The noun can mean testimony or witness, and in this book carries martyrdom
    associations. 'Testimony' preserves the direct lexical sense while allowing the
    martyr context to resonate without overtranslating.
- source_word: τῶν ἀδελφῶν μου
  chosen: of my brothers
  alternatives:
  - of my brethren
  - of my brothers and sisters
  lexicon: LSJ
  rationale: The referent is the speaker's male siblings in the narrative, so the
    gender-specific 'brothers' is accurate and preferable to an inclusive rendering.
