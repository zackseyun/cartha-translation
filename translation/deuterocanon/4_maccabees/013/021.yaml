translation:
  text: having been brought to full maturity in soul, and having been brought forth
    through equal periods of time, and drinking from the same springs of milk, from
    which they are nourished,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'suckling from the same sources of milk'; the Greek keeps a vivid maternal
      image without explicitly naming the breasts.
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be understood 'from which they are reared together,'
      not only 'from which they are nourished.'
    reason: alternative_reading
lexical_decisions:
- source_word: ψυχῆς
  chosen: in soul
  alternatives:
  - of soul
  - in life
  lexicon: LSJ
  rationale: 'The genitive with τελεσφορηθέντες is best taken as a respect/genitive
    of reference: they were brought to maturity with respect to the soul. ''In soul''
    is idiomatic enough in English while preserving the anthropological emphasis.'
- source_word: τελεσφορηθέντες
  chosen: having been brought to full maturity
  alternatives:
  - having reached maturity
  - having been perfected
  lexicon: LSJ
  rationale: The participle conveys being brought to completion or maturity. 'Brought
    to full maturity' preserves the passive nuance and the sense of development to
    completion better than the more theological-sounding 'perfected'.
- source_word: διὰ τῶν ἴσων ... χρόνων
  chosen: through equal periods of time
  alternatives:
  - during the same length of time
  - through the same times
  lexicon: LSJ
  rationale: The phrase stresses equal gestational/developmental duration among siblings.
    'Equal periods of time' is clear and sufficiently literal.
- source_word: ἀποτεχθέντες
  chosen: having been brought forth
  alternatives:
  - having been born
  - having been delivered
  lexicon: LSJ
  rationale: The passive participle refers to being borne/brought forth from the womb.
    'Brought forth' is slightly more formal than 'born' and matches the maternal imagery
    of the surrounding clauses.
- source_word: γαλακτοποτοῦντες
  chosen: drinking from the same springs of milk
  alternatives:
  - drinking milk from the same breasts
  - suckling from the same sources of milk
  lexicon: LSJ
  rationale: The compound verb means drinking milk. Because πηγῶν ('springs, fountains,
    sources') is explicit, the image is metaphorical for maternal breasts. 'Springs
    of milk' preserves the Greek imagery without over-specifying beyond the text.
- source_word: πηγῶν
  chosen: springs
  alternatives:
  - sources
  - fountains
  lexicon: LSJ
  rationale: The noun literally means springs/fountains. 'Springs' keeps the vivid
    metaphor and reads naturally with 'of milk'.
- source_word: ἀφʼ οὗ
  chosen: from which
  alternatives:
  - from whom
  - since which time
  lexicon: LSJ
  rationale: Here the relative points back to the milk-springs/source imagery rather
    than introducing a temporal clause. 'From which' best fits the immediate syntax.
- source_word: συντρέφονται
  chosen: they are nourished
  alternatives:
  - they are reared together
  - they are brought up
  lexicon: LSJ
  rationale: The verb can mean nourish or rear together. In this context of milk and
    maternal nurture, 'they are nourished' fits the immediate image, though the broader
    sense of being reared is also possible.
