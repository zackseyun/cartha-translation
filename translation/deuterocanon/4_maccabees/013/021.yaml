  text: ψυχῆς τελεσφορηθέντες, καὶ διὰ τῶν ἴσων ἀποτεχθέντες χρόνων, καὶ ἀπὸ τῶν αὐτῶν
    γαλακτοποτοῦντες πηγῶν, ἀφʼ οὗ συντρέφονται
