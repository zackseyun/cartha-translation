theological_decisions:
- issue: Rendering the highly figurative phrase ἡ ἑπτάπυργος τῶν νεανίσκων εὐλογιστία
  chosen_reading: Thus the seven-towered blessedness of the young men
  alternative_readings:
  - Thus the seven-bastioned nobility of the youths
  - Thus the blessed resolve of the seven young men
  rationale: The Greek is densely metaphorical and personifies the virtue displayed
    by the seven brothers as a fortified structure. The main text preserves the metaphor
    rather than resolving it into a simpler explanatory paraphrase. An explanatory
    alternative is worth preserving because the phrase is unusual and could be understood
    more abstractly.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering εὐσεβεία
  chosen_reading: godliness
  alternative_readings:
  - piety
  rationale: The term in 4 Maccabees is central and theological, referring to reverent
    devotion to God expressed in fidelity under suffering. 'Godliness' communicates
    this more directly to modern readers than 'piety,' while remaining faithful to
    the source.
  doctrine_reference: Translation philosophy §§1, 6
