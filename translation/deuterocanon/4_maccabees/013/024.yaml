  chosen_reading: '''the same law'' refers to the shared Jewish law that formed the
    brothers'
  alternative_readings:
  - a more generic moral law
  rationale: Within 4 Maccabees, νόμος regularly carries the specific sense of the
    ancestral/Jewish law. Rendering simply 'law' preserves the source wording while
    the rationale documents the likely referent without over-expanding the translation.
