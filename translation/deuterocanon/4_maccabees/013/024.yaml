id: 4MA.13.24
reference: 4 Maccabees 13:24
source:
  edition: lxx-swete-1909
  text: θέστερον ἔσχον τὴν πρὸς ἀλλήλους ὁμόνοιαν. νόμῳ γὰρ τῷ αὐτῷ παιδευθέντες,
    καὶ τὰς αὐτὰς ἐξασκήσαντες ἀρετάς, καὶ τῷ δικαίῳ συντραφέντες βίῳ, μᾶλλον ἐφʼ
    αὐτοὺς ἤγαγον.
  language: Greek
  pages:
  - 752
  - 772
  - 773
  - 774
  - 775
  - 786
  - 787
  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: For they had a firmer harmony with one another; for, having been trained by
    the same law, having practiced the same virtues, and having been brought up in
    a righteous way of life, they were drawn more closely together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a stronger concord with one another.'
    reason: lexical_alternative
  - marker: b
    text: The closing clause is compressed in Greek; the sense is that their shared
      formation in law, virtue, and righteous living drew them into closer mutual
      unity.
    reason: alternative_reading
lexical_decisions:
- source_word: θέστερον
  chosen: firmer
  alternatives:
  - more firmly
  - stronger
  lexicon: LSJ
  rationale: Comparative adverb/adjectival form conveying greater solidity or stability.
    In English, 'firmer' naturally modifies the resulting harmony and preserves the
    comparative force without awkwardness.
- source_word: ὁμόνοιαν
  chosen: harmony
  alternatives:
  - unity
  - concord
  - like-mindedness
  lexicon: LSJ
  rationale: The term denotes oneness of mind and mutual concord. 'Harmony' fits the
    relational context 'with one another' and reads naturally in modern English while
    preserving the idea of concord.
- source_word: νόμῳ
  chosen: law
  alternatives:
  - instruction
  lexicon: LSJ
  rationale: In 4 Maccabees this normally refers to the Jewish law/Torah-shaped norm.
    'Law' is the standard and most transparent rendering here.
- source_word: παιδευθέντες
  chosen: having been trained
  alternatives:
  - having been educated
  - having been disciplined
  lexicon: LSJ
  rationale: The passive participle includes formation through instruction and discipline.
    'Having been trained' captures both moral formation and education in concise English.
- source_word: ἐξασκήσαντες
  chosen: having practiced
  alternatives:
  - having exercised
  - having cultivated
  lexicon: LSJ
  rationale: The verb suggests active exercise or disciplined practice. 'Having practiced'
    is idiomatic and preserves the moral-training nuance.
- source_word: ἀρετάς
  chosen: virtues
  alternatives:
  - excellences
  lexicon: LSJ
  rationale: In Hellenistic moral discourse the word commonly denotes virtues or moral
    excellences. 'Virtues' is the clearest English equivalent here.
- source_word: τῷ δικαίῳ ... βίῳ
  chosen: in a righteous way of life
  alternatives:
  - in a just life
  - in a righteous life
  lexicon: LSJ
  rationale: The phrase describes the sphere or manner of upbringing. 'Righteous way
    of life' communicates both moral rectitude and lived pattern more naturally than
    the wooden 'righteous life.'
- source_word: συντραφέντες
  chosen: having been brought up
  alternatives:
  - having been reared together
  - having been nurtured
  lexicon: LSJ
  rationale: The verb refers to being raised or nurtured. Because the context already
    stresses shared formation, 'having been brought up' is clear and idiomatic; the
    possible nuance 'together' is reflected in the overall sentence.
- source_word: μᾶλλον ἐφʼ αὐτοὺς ἤγαγον
  chosen: they were drawn more closely together
  alternatives:
  - these things brought them more toward one another
  - they were led more toward each other
  lexicon: LSJ
  rationale: 'The Greek is somewhat compressed, with the preceding participial clauses
    supplying the grounds for increased mutual closeness. A passive English rendering
    makes the sense explicit and natural: their common formation drew them into closer
    mutual unity.'
