id: 4MA.13.18
reference: 4 Maccabees 13:18
source:
  edition: lxx-swete-1909
  text: καὶ Ἰακὼβ ὑποδέξονται, καὶ πάντες οἱ πατέρες ἐπαινέσουσιν. καὶ ἐνὶ ἑκάστῳ
    τῶν ἀποσπωμένων αὐτῶν ἀδελφῶν ἔλεγον οἱ περιλειπόμενοι Μὴ καταισχύνῃς ἡμᾶς, ἀδελφέ,
    μηδὲ ψεύσῃ τοὺς προαποθανόντας.
