theological_decisions:
- issue: Identity of 'Jacob' in an afterlife commendation scene
  chosen_reading: Jacob refers to the patriarch Jacob, who is imagined as welcoming
    the martyrs among the honored ancestors.
  alternative_readings:
  - Jacob as a collective shorthand for Israel
  rationale: The pairing with 'all the fathers' strongly supports the patriarch Jacob
    as an individual ancestral figure rather than the nation collectively. The translation
    keeps the personal name without interpretive expansion.
