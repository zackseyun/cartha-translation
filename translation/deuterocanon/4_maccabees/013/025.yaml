id: 4MA.13.25
reference: 4 Maccabees 13:25
source:
  edition: lxx-swete-1909
  text: ἡ γὰρ ὁμόγνοια τῆς καλοκἀγαθίας ἐπέτεινεν αὐτῶν τὴν πρὸς ἀλλήλους ὁμόνοιαν·
  language: Greek
  pages:
  - 752
  - 772
  - 773
  - 774
  - 775
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: For their like-mindedness in noble goodness intensified their harmony with
    one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For their like-mindedness in virtue strengthened their unity with one
      another.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμόγνοια
  chosen: shared commitment
  alternatives:
  - like-mindedness
  - unity of mind
  - agreement
  lexicon: LSJ
  rationale: The term denotes being of one mind or sharing the same outlook. Because
    the phrase is followed by ὁμόνοια, rendering both with the same English word would
    flatten the distinction. 'Shared commitment' preserves the idea of inward common
    purpose without duplicating 'harmony' for the second noun.
- source_word: καλοκἀγαθίας
  chosen: noble goodness
  alternatives:
  - virtue
  - moral excellence
  - nobility and goodness
  lexicon: LSJ
  rationale: This compressed form of καλοκἀγαθία refers to the ideal of moral nobility
    and goodness. 'Noble goodness' keeps both semantic components visible and avoids
    over-abstracting to simply 'virtue.'
- source_word: ἐπέτεινεν
  chosen: intensified
  alternatives:
  - strengthened
  - increased
  - stretched further
  lexicon: LSJ
  rationale: The verb literally suggests stretching or extending, here metaphorically
    increasing or heightening. 'Intensified' fits the relational context and conveys
    that their mutual concord was made stronger.
- source_word: ὁμόνοιαν
  chosen: harmony
  alternatives:
  - unity
  - concord
  - oneness of mind
  lexicon: LSJ
  rationale: The noun denotes concord or unity among persons. 'Harmony' reads naturally
    in English and differentiates it from the earlier ὁμόγνοια while preserving the
    relational sense.
- source_word: πρὸς ἀλλήλους
  chosen: with one another
  alternatives:
  - toward each other
  - among themselves
  lexicon: LSJ
  rationale: The prepositional phrase marks reciprocal relation. 'With one another'
    is idiomatic English for mutual interpersonal harmony.
