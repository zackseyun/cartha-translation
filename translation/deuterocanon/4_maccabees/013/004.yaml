id: 4MA.13.4
reference: 4 Maccabees 13:4
source:
  edition: lxx-swete-1909
  text: οὐκ ἔστιν παριδεῖν τὴν ἡγεμονίαν τῆς διανοίας· ἐπεκράτησαν γὰρ καὶ πάθους
    καὶ πόνων.
  language: Greek
