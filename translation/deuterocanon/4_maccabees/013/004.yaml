translation:
  text: It is impossible to overlook the rule of reason, for they prevailed over both
    passion and pains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mind' for 'reason.' The Greek term can denote the mind or understanding;
      here it likely emphasizes rational judgment as governing the passions.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔστιν
  chosen: It is impossible
  alternatives:
  - there is not
  - it is not possible
  lexicon: LSJ
  rationale: Idiomatic English best conveys the impersonal construction with infinitive;
    the sense is not mere nonexistence but impossibility.
- source_word: παριδεῖν
  chosen: to overlook
  alternatives:
  - to disregard
  - to ignore
  lexicon: LSJ
  rationale: The verb means to pass by or disregard. 'Overlook' preserves the evaluative
    sense that the evidence cannot be ignored.
- source_word: ἡγεμονίαν
  chosen: the rule
  alternatives:
  - the sovereignty
  - the mastery
  - the governing power
  lexicon: LSJ
  rationale: The noun denotes leadership, rule, or governing authority. In context
    it refers to reason's governing power over the passions; 'rule' is concise and
    natural English.
- source_word: τῆς διανοίας
  chosen: of reason
  alternatives:
  - of the mind
  - of understanding
  - of thought
  lexicon: LSJ
  rationale: In 4 Maccabees, διάνοια participates in the book's argument about rational
    mastery. 'Reason' best captures the faculty in its ethical-philosophical sense
    here, more pointedly than the broader 'mind'.
- source_word: ἐπεκράτησαν
  chosen: they proved stronger than
  alternatives:
  - they prevailed over
  - they overcame
  - they had mastery over
  lexicon: LSJ
  rationale: The verb means to be stronger than or prevail over. 'Proved stronger
    than' fits the retrospective argument from the martyrs' example and reads smoothly
    with the genitives that follow.
- source_word: πάθους
  chosen: passion
  alternatives:
  - suffering
  - emotion
  - desire
  lexicon: LSJ
  rationale: In this work πάθος commonly refers to passion or the passions as irrational
    impulses, not merely suffering. Singular in Greek can function collectively; English
    singular preserves the philosophical register.
- source_word: πόνων
  chosen: pains
  alternatives:
  - torments
  - labors
  - sufferings
  lexicon: LSJ
  rationale: The term here points to bodily pains endured in torture. 'Pains' is direct
    and close to the Greek, while avoiding over-interpretation.
- source_word: καὶ πάθους καὶ πόνων
  chosen: both passion and pains
  alternatives:
  - both the passions and the pains
  - both passion and suffering
  lexicon: LSJ
  rationale: 'The correlative repetition emphasizes two domains over which reason
    triumphed: inward passions and outward pains. ''Both ... and ...'' makes that
    structure explicit in English.'
