theological_decisions:
- issue: Rendering the anthropological/philosophical term διάνοια in a way that preserves
    the book's thesis about rational mastery
  chosen_reading: of reason
  alternative_readings:
  - of the mind
  - of understanding
  rationale: 4 Maccabees argues that devout reason rules the passions. Translating
    διάνοια as 'reason' foregrounds that thesis without importing later doctrinal
    categories. 'Mind' is possible but less precise in this context.
