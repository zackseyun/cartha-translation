translation:
  text: And one said, “Take courage, brother,” while another said, “Endure nobly.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the one said ... but the other ...,' indicating successive
      speakers among the brothers.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θάρρει
  chosen: Take courage
  alternatives:
  - Be courageous
  - Be confident
  - Courage
  lexicon: LSJ
  rationale: Imperative of θαρρέω/θαρσέω expressing encouragement or boldness. 'Take
    courage' is idiomatic modern English and preserves the exhortational force better
    than the less natural bare 'Courage.'
- source_word: ἀδελφέ
  chosen: brother
  alternatives:
  - brother!
  lexicon: LSJ
  rationale: Direct address singular. 'Brother' matches the masculine singular vocative
    and the sibling context; no gender-neutraling is warranted here.
- source_word: Εὐγενῶς
  chosen: nobly
  alternatives:
  - bravely
  - generously
  - with noble spirit
  lexicon: LSJ
  rationale: Adverb from εὐγενής, here describing the manner of endurance in a morally
    elevated, honorable way. 'Nobly' preserves the ethical and honor-laden sense better
    than merely 'bravely.'
- source_word: καρτέρησον
  chosen: Endure
  alternatives:
  - Persevere
  - Hold out
  - Be steadfast
  lexicon: LSJ
  rationale: Aorist imperative of καρτερέω, calling for steadfast endurance under
    suffering. 'Endure' is concise and fits the martyrdom context without overinterpreting.
- source_word: ὁ μέν ... ὁ δέ
  chosen: one ... another
  alternatives:
  - the one ... the other
  - one brother ... another
  lexicon: LSJ
  rationale: The correlative construction contrasts two speakers. English 'one ...
    another' conveys the distributive sense naturally without forcing an explicit
    noun absent from the Greek.
- source_word: ἔλεγεν
  chosen: said
  alternatives:
  - was saying
  - kept saying
  lexicon: LSJ
  rationale: Imperfect of λέγω can suggest repeated or ongoing speech, but in English
    narrative dialogue 'said' is the most natural equivalent unless durative force
    is especially important. The verse presents successive exhortations rather than
    emphasizing prolonged speech.
