lexical_decisions:
- source_word: ἐν ᾗ
  chosen: in which
  alternatives:
  - wherein
  - in whom
  lexicon: LSJ
  rationale: The relative pronoun is feminine singular dative, most naturally referring
    back to a feminine antecedent in the prior context. Without that antecedent in
    this verse fragment, 'in which' preserves the Greek relation without over-specifying.
- source_word: ἀδελφοὶ
  chosen: brothers
  alternatives:
  - siblings
  - brothers and sisters
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural and in context refers to literal
    male siblings, not a mixed-gender group. This follows the gender-accurate policy.
- source_word: τὸν ἴσον ... χρόνον
  chosen: the same span of time
  alternatives:
  - an equal time
  - the same time
  lexicon: LSJ
  rationale: The idiom conveys equality of duration. 'Span of time' reads naturally
    in English while preserving the temporal sense of χρόνον.
- source_word: κατοικήσαντες
  chosen: having lived
  alternatives:
  - having dwelt
  - having resided
  lexicon: LSJ
  rationale: The participle denotes dwelling or living; 'having lived' is idiomatic
    and fits the temporal phrase.
- source_word: ἐν τῷ αὐτῷ χρόνῳ
  chosen: in the same time
  alternatives:
  - at the same time
  - within the same period
  lexicon: LSJ
  rationale: The phrase likely means simultaneity of formation. English idiom could
    be 'at the same time,' but 'in the same time' stays closer to the Greek structure
    while remaining intelligible.
- source_word: πλασθέντες
  chosen: having been formed
  alternatives:
  - having been fashioned
  - having been molded
  lexicon: LSJ
  rationale: The passive participle suggests being formed or fashioned, likely with
    reference to prenatal formation. 'Formed' is clear and suitably literal.
- source_word: ἀπὸ τοῦ αὐτοῦ αἵματος
  chosen: from the same blood
  alternatives:
  - from the same stock
  - of the same blood
  lexicon: LSJ
  rationale: The phrase points to common biological descent. 'From the same blood'
    preserves the concrete imagery.
- source_word: αὐξηθέντες
  chosen: having grown
  alternatives:
  - having been reared
  - having increased
  lexicon: LSJ
  rationale: The participle denotes growth/development. 'Having grown' is the most
    natural rendering in this familial context.
