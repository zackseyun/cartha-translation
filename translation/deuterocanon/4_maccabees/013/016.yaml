theological_decisions:
- issue: Rendering θεῖος λογισμός in a Jewish moral-philosophical context
  chosen_reading: godly reason
  alternative_readings:
  - divine reason
  rationale: The phrase is central to 4 Maccabees' argument that pious rationality
    rules the passions. 'Godly reason' preserves the ethical-religious dimension without
    importing later philosophical or christological connotations that 'divine reason'
    might suggest in English.
  doctrine_reference: Translation philosophy §§1, 3, 6
