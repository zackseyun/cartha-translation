translation:
  text: Therefore, let us arm ourselves with the mastery over the passions that comes
    from godly reason.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the mastery over passions of divine reason.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθοπλισώμεθα
  chosen: let us arm ourselves
  alternatives:
  - let us equip ourselves
  - let us fully arm ourselves
  lexicon: LSJ
  rationale: First person plural hortatory subjunctive from καθοπλίζω, conveying taking
    up arms/equipment for moral struggle. 'Arm ourselves' preserves the martial metaphor
    naturally in English.
- source_word: τοιγαροῦν
  chosen: therefore
  alternatives:
  - then
  - so then
  lexicon: LSJ
  rationale: Inferential particle drawing a conclusion from the preceding exhortation.
    'Therefore' is concise and suitably weighty.
- source_word: τῇ ... παθοκρατίᾳ
  chosen: with the mastery over passions
  alternatives:
  - with dominion over the passions
  - with control of passions
  - with passion-mastery
  lexicon: LSJ
  rationale: The dative expresses the means/instrument with which one is armed. παθοκρατία
    is a key 4 Maccabees virtue term meaning rule or mastery over passions, not mere
    suppression. 'Mastery over passions' is readable modern English while preserving
    the compound's sense.
- source_word: τοῦ θείου λογισμοῦ
  chosen: that comes from godly reason
  alternatives:
  - of divine reason
  - belonging to godly reasoning
  - of the divine rational faculty
  lexicon: LSJ
  rationale: 'Genitive most naturally qualifies the source or character of the passion-mastery:
    it is the mastery exercised by or arising from θεῖος λογισμός. ''Godly reason''
    avoids over-metaphysical phrasing while retaining the religious-moral force of
    θεῖος and the rational-ethical sense of λογισμός in this book.'
- source_word: θείου
  chosen: godly
  alternatives:
  - divine
  - godlike
  lexicon: LSJ
  rationale: θείος can mean divine or pertaining to God. Here 'godly' fits the paraenetic
    context and avoids suggesting an abstract impersonal metaphysic; it describes
    reason shaped by relation to God.
- source_word: λογισμοῦ
  chosen: reason
  alternatives:
  - reasoning
  - rational judgment
  - mind
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a central concept for rational moral judgment
    governing the passions. 'Reason' is the clearest concise rendering in English.
