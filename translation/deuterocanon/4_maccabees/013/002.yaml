theological_decisions:
- issue: Moral-psychological sense of πάθη
  chosen_reading: passions
  alternative_readings:
  - sufferings
  - emotions
  - desires
  rationale: In 4 Maccabees the argument contrasts reason and the passions in a philosophical-ethical
    register. Rendering πάθη as 'passions' preserves that conceptual framework without
    importing later technical theology.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source meaning over tradition.'
- issue: Force of δουλωθέντες
  chosen_reading: enslaved
  alternative_readings:
  - subjected
  - made servants
  rationale: The slavery metaphor is salient in this verse's contrast between mastery
    and defeat. Following the project's guidance on δοῦλος-family terms, the bonded
    nature should be preserved where context makes it significant.
  doctrine_reference: 'Contested terms table: δοῦλος servant/slave (context-dependent);
    use ''slave'' where bonded nature is salient.'
