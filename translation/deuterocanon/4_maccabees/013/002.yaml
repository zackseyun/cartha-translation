translation:
  text: For just as those enslaved to their passions ate delicacies—for we said that
    they had been conquered by these things—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ate luxurious food' or 'lived delicately'; the Greek verb is rare and
      conveys indulgent, refined consumption.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ γὰρ
  chosen: For just as
  alternatives:
  - For as
  - Just as
  lexicon: LSJ
  rationale: Introduces an explanatory comparison. 'For just as' preserves both γάρ's
    explanatory force and ὥσπερ's comparative sense in readable English.
- source_word: τοῖς πάθεσιν δουλωθέντες
  chosen: enslaved to their passions
  alternatives:
  - made slaves to their sufferings
  - enslaved to the passions
  - subjected to their impulses
  lexicon: BDAG/LSJ
  rationale: δουλωθέντες clearly carries bondage/slavery imagery, so 'enslaved' best
    preserves the force. πάθη in this moral-philosophical context refers to passions/desires
    rather than external sufferings. 'Their' is supplied naturally in English from
    the article construction and context.
- source_word: ἡμεροφάγησαν
  chosen: ate delicacies
  alternatives:
  - lived delicately
  - fed on rich foods
  - ate luxurious food
  lexicon: LSJ
  rationale: The rare verb is built on the idea of eating in a refined/luxurious way.
    'Ate delicacies' is concise, idiomatic, and preserves the focus on indulgent consumption
    better than the broader 'lived delicately.'
- source_word: ἐλέγομεν γὰρ
  chosen: for we said
  alternatives:
  - for we were saying
  - for we used to say
  lexicon: BDAG/LSJ
  rationale: Imperfect ἐλέγομεν can be rendered simply in English here without overemphasizing
    aspect. 'For we said' fits the explanatory parenthetical comment.
- source_word: τούτοις νενικῆσθαι
  chosen: had been conquered by these things
  alternatives:
  - had been overcome by them
  - had been defeated by these
  - were mastered by these things
  lexicon: BDAG/LSJ
  rationale: Perfect infinitive of νικάω indicates a completed state of defeat. 'Had
    been conquered' preserves the strong victory/defeat imagery; 'these things' renders
    τούτοις explicitly, referring back to the passions/delicacies.
