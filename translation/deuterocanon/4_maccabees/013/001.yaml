id: 4MA.13.1
reference: 4 Maccabees 13:1
source:
  edition: lxx-swete-1909
  text: δὲ τοίνυν τῶν μέχρι θανάτου πόνων ὑπερεφρόνησαν οἱ ἑπτὰ ἀδελφοί, συνομολογεῖται
    ἀπανταχόθεν, ὅτι αὐτόδεσπότος ἐστιν τῶν παθῶν ὁ εὐσεβὴς λογισμός.
  language: Greek
  pages:
  - 752
  - 772
  - 773
  - 774
  - 775
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: Therefore, since the seven brothers despised pains even unto death, it is
    acknowledged everywhere that godly reason is master of the passions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'despised pains up to death' or 'thought lightly of sufferings unto death.'
    reason: lexical_alternative
  - marker: b
    text: '''Godly reason'' could also be rendered ''pious reason'' or ''devout reason'';
      the Greek expression is a key theme in 4 Maccabees for reason shaped by reverence
      toward God.'
    reason: lexical_alternative
  - marker: c
    text: '''Passions'' refers to disordered drives or impulses in the book''s moral-philosophical
      argument, not merely feelings in general.'
    reason: cultural_note
lexical_decisions:
- source_word: δὲ τοίνυν
  chosen: Therefore
  alternatives:
  - So then
  - Accordingly
  lexicon: LSJ
  rationale: This inferential combination draws a conclusion from the preceding argument.
    'Therefore' captures the logical force in natural English without overloading
    the connective.
- source_word: τῶν μέχρι θανάτου πόνων
  chosen: pains even to death
  alternatives:
  - pains unto death
  - sufferings up to death
  - torments to the point of death
  lexicon: LSJ
  rationale: πόνων denotes pains/sufferings; μέχρι θανάτου marks the extremity of
    those sufferings, reaching death. 'Pains even to death' preserves the concise
    Greek sense and the rhetorical intensity.
- source_word: ὑπερεφρόνησαν
  chosen: looked down on
  alternatives:
  - despised
  - thought lightly of
  - treated with contempt
  lexicon: LSJ
  rationale: The verb conveys regarding something as beneath concern or contemptible.
    'Looked down on' preserves the metaphor of disdain while remaining readable; it
    avoids the harsher moral connotations 'despised' can carry in English.
- source_word: οἱ ἑπτὰ ἀδελφοί
  chosen: the seven brothers
  alternatives:
  - the seven brothers of one family
  - the seven siblings
  lexicon: LSJ
  rationale: ἀδελφοί is masculine plural and here refers specifically to the seven
    male brothers in the narrative. 'Brothers' is gender-accurate and contextually
    precise.
- source_word: συνομολογεῖται ἀπανταχόθεν
  chosen: it is acknowledged from every side
  alternatives:
  - it is universally agreed
  - it is confessed everywhere
  - it is admitted on all hands
  lexicon: LSJ
  rationale: The passive verb indicates common acknowledgment, and ἀπανταχόθεν adds
    the sense 'from all quarters.' 'Acknowledged from every side' preserves both the
    passive and the breadth of agreement.
- source_word: αὐτόδεσπότος
  chosen: sovereign
  alternatives:
  - self-ruling
  - master in its own right
  - absolute master
  lexicon: LSJ
  rationale: This rare adjective denotes having mastery in oneself or being one's
    own master. In context, it predicates full dominion over the passions. 'Sovereign'
    is concise, idiomatic, and conveys ruling authority without awkward literalism.
- source_word: τῶν παθῶν
  chosen: over the passions
  alternatives:
  - over the emotions
  - over the sufferings
  - over the impulses
  lexicon: LSJ
  rationale: In 4 Maccabees, πάθη is a key philosophical term for passions or irrational
    drives, not merely external sufferings. 'Passions' best preserves the work's moral-psychological
    vocabulary.
- source_word: ὁ εὐσεβὴς λογισμός
  chosen: godly reason
  alternatives:
  - pious reason
  - devout reason
  - reverent rationality
  lexicon: LSJ
  rationale: 'This is a central term in 4 Maccabees: λογισμός is reasoned judgment,
    and εὐσεβής qualifies it as shaped by piety toward God. ''Godly reason'' is accessible
    modern English and preserves both the rational and religious dimensions.'
