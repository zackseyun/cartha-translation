theological_decisions:
- issue: Rendering the programmatic phrase εὐσεβὴς λογισμός in a philosophically and
    theologically transparent way
  chosen_reading: godly reason
  alternative_readings:
  - pious reason
  - devout reason
  rationale: The book argues that reason informed by reverence for God governs the
    passions. 'Godly reason' communicates that this is not bare rationality but reason
    ordered by piety, while remaining readable for modern audiences.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
- issue: Rendering πάθη in the ethical-philosophical sense
  chosen_reading: passions
  alternative_readings:
  - emotions
  - impulses
  rationale: The context is not neutral emotional life but the passions as drives
    to be mastered. 'Passions' preserves the conceptual framework of the book without
    importing later doctrinal claims.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    consistency of key terms, or documented exception.'
