translation:
  text: But now it is not so; rather, by the reasoning that is praised by God, they
    overcame the passions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the reason commended by God.' The Greek term can be rendered 'reason,'
      'reasoning,' or 'rational judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  chosen: But now
  alternatives:
  - But as it is now
  - But in fact now
  lexicon: LSJ
  rationale: Marks a contrast with the preceding situation or expectation; 'But now'
    is concise and natural while preserving the adversative force.
- source_word: οὐχ οὕτως
  chosen: it is not so
  alternatives:
  - not thus
  - not like that
  lexicon: LSJ
  rationale: Keeps the elliptical Greek sense without over-specifying the implied
    comparison.
- source_word: ἀλλὰ
  chosen: rather
  alternatives:
  - but
  - instead
  lexicon: LSJ
  rationale: Signals corrective contrast after the negation more clearly in English.
- source_word: τῷ ἐπαινουμένῳ λογισμῷ
  chosen: by the reasoning that is praised by God
  alternatives:
  - by God-praised reason
  - by the reason commended by God
  - by the reasoning approved by God
  lexicon: LSJ
  rationale: λόγισμος in 4 Maccabees is a key term for rational moral judgment; 'reasoning'
    preserves the active, deliberative sense better than the more abstract 'reason.'
    The participle ἐπαινουμένῳ is rendered as a relative clause for readable English.
    The dative is instrumental here, hence 'by.'
- source_word: παρὰ θεῷ
  chosen: by God
  alternatives:
  - before God
  - in God's sight
  - with God
  lexicon: LSJ
  rationale: With ἐπαινουμένῳ, the phrase most naturally indicates the one from whom
    the praise comes. 'By God' is the clearest idiomatic rendering in context.
- source_word: περιεγένοντο
  chosen: they overcame
  alternatives:
  - they prevailed over
  - they proved superior to
  - they got the better of
  lexicon: LSJ
  rationale: Conveys victory over an opposing force in straightforward modern English.
- source_word: τῶν παθῶν
  chosen: the passions
  alternatives:
  - the sufferings
  - the emotions
  - the passions of suffering
  lexicon: LSJ
  rationale: In 4 Maccabees πάθη commonly refers to the passions or emotional drives
    mastered by reason, not merely external sufferings. 'Passions' best fits the book's
    philosophical vocabulary and immediate argument.
