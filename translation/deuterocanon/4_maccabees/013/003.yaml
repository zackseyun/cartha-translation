theological_decisions:
- issue: Rendering the programmatic term λόγισμος in 4 Maccabees
  chosen_reading: reasoning
  alternative_readings:
  - reason
  - rational judgment
  rationale: The book's central theme is that disciplined rational judgment rules
    the passions. 'Reasoning' preserves that moral-intellectual activity without sounding
    overly technical or flattening the term into a mere faculty.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Sense of παρὰ θεῷ with ἐπαινουμένῳ
  chosen_reading: praised by God
  alternative_readings:
  - praised before God
  - praised in God's sight
  rationale: The phrase can denote relation to God more broadly, but in this construction
    it most naturally identifies God as the evaluator who commends such reasoning.
    This avoids importing more theology than the text states while preserving the
    divine approval emphasized here.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
