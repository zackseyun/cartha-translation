id: 4MA.13.15
reference: 4 Maccabees 13:15
source:
  edition: lxx-swete-1909
  text: μέγας γὰρ ψυχῆς ἀγὼν καὶ κίνδυνος ἐν αἰωνίῳ βασάνῳ κείμενος τοῖς παραβαίνουσι
    τὴν ἐντολὴν τοῦ θεοῦ.
  language: Greek
