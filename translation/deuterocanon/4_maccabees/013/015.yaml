translation:
  text: For great is the struggle of the soul and the danger lying in eternal torment
    for those who transgress the commandment of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in everlasting punishment' or 'in eternal suffering.' The Greek says
      'in eternal torment,' with βάσανος carrying the sense of torment or severe suffering.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέγας
  chosen: great
  alternatives:
  - grave
  - mighty
  lexicon: LSJ
  rationale: The adjective intensifies the seriousness of what follows. 'Great' is
    the most natural and direct English equivalent here.
- source_word: ψυχῆς
  chosen: of the soul
  alternatives:
  - of life
  - of the self
  lexicon: LSJ
  rationale: In this context ψυχή refers to the inner life/person under moral and
    spiritual testing, not merely biological life. 'Of the soul' preserves the text's
    anthropological weight without over-paraphrasing.
- source_word: ἀγών
  chosen: struggle
  alternatives:
  - contest
  - conflict
  lexicon: LSJ
  rationale: ἀγών denotes a contest or severe struggle. 'Struggle' fits readable modern
    English while preserving the sense of intense moral conflict.
- source_word: κίνδυνος
  chosen: danger
  alternatives:
  - peril
  - risk
  lexicon: LSJ
  rationale: The noun straightforwardly denotes danger or peril. 'Danger' is the clearest
    modern rendering.
- source_word: ἐν αἰωνίῳ βασάνῳ
  chosen: in eternal torment
  alternatives:
  - in everlasting punishment
  - in eternal suffering
  lexicon: LSJ
  rationale: βάσανος in this context refers to torment/torture, and αἰώνιος qualifies
    it as enduring without limit. 'Eternal torment' is the most direct rendering of
    the phrase as written.
- source_word: κείμενος
  chosen: laid up
  alternatives:
  - set
  - appointed
  - lying in wait
  lexicon: LSJ
  rationale: The participle literally means 'lying' or 'being laid/placed.' Here it
    describes danger as set before or reserved for transgressors. 'Laid up' preserves
    the metaphor of something stored or awaiting them.
- source_word: τοῖς παραβαίνουσι
  chosen: for those who transgress
  alternatives:
  - for those who break
  - for the transgressors of
  lexicon: LSJ
  rationale: The participle denotes people who violate a command. 'Those who transgress'
    is both accurate and suitably weighty in moral-legal context.
- source_word: τὴν ἐντολὴν τοῦ θεοῦ
  chosen: the commandment of God
  alternatives:
  - God's command
  - the command of God
  lexicon: LSJ
  rationale: ἐντολή is commandment/command. 'The commandment of God' preserves the
    singular and the elevated register of the Greek.
