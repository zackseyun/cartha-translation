theological_decisions:
- issue: Rendering of αἰώνιος βάσανος
  chosen_reading: eternal torment
  alternative_readings:
  - everlasting punishment
  - eternal suffering
  rationale: The Greek phrase itself most naturally yields 'eternal torment.' Because
    the verse states the warning directly, the translation preserves that force rather
    than softening it. Alternatives are possible in English nuance, but they do not
    better reflect the lexical sense of βάσανος here.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
