theological_decisions:
- issue: Rendering εὐσέβεια in a martyrdom context
  chosen_reading: piety
  alternative_readings:
  - godliness
  - reverence
  rationale: The book repeatedly frames the martyrs' endurance as arising from reverent
    devotion to God and the law. 'Piety' preserves that thematic vocabulary without
    importing later doctrinal nuance.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms; readable modern English'
- issue: Force of brotherhood language
  chosen_reading: their brothers / affections of brotherhood
  alternative_readings:
  - their siblings / family affection
  rationale: The Greek explicitly uses ἀδελφότητος and ἀδελφούς. Per gender-accurate
    policy, 'brotherhood' and 'brothers' are retained rather than neutralized.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
