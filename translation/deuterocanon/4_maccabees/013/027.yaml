id: 4MA.13.27
reference: 4 Maccabees 13:27
source:
  edition: lxx-swete-1909
  text: ἀλλʼ ὁμοίως καίπερ τῆς φύσεως καὶ τῆς συνηθείας καὶ τῶν τῆς ἀρετῆς ἠθῶν τὰ
    τῆς ἀδελφότητος αὐτοῖς φίλτρα συναξόντων, ἀνέσχοντο διὰ τὴν εὐσέβειαν τοὺς ἀδελφοὺς
    οἱ ὑπολελειμμένοι τοὺς κατοικτιζομένους ὁρῶντες μέχρι θανάτου βασανιζομένους.
  language: Greek
  pages:
  - 752
  - 772
  - 773
  - 774
  - 775
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: But likewise, although nature and habit and the dispositions of virtue were
    drawing together for them the affections of brotherhood, those who were left behind
    endured, because of piety, as they watched their brothers being tortured to death,
    objects of pity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bonds of brotherhood' for 'the affections of brotherhood.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'those remaining endured because of piety, seeing their brothers
      being tortured until death and being pitied.' The Greek packs several participles
      into a compressed sentence.
    reason: lexical_alternative
lexical_decisions:
- source_word: φίλτρα
  chosen: affections
  alternatives:
  - bonds
  - charms
  - attachments
  - ties of affection
  lexicon: LSJ
  rationale: In this context τὰ τῆς ἀδελφότητος φίλτρα refers to the affectionate
    bonds or attractions of brotherhood, not literal 'charms.' 'Affections' preserves
    the emotional force in readable English.
- source_word: συναξόντων
  chosen: were drawing together
  alternatives:
  - were bringing together
  - were uniting
  - were gathering
  lexicon: LSJ
  rationale: The participle describes nature, habit, and virtuous dispositions as
    converging to intensify brotherly affection. 'Were drawing together' captures
    the ongoing causal force without over-paraphrase.
- source_word: ἀνέσχοντο
  chosen: endured
  alternatives:
  - held out
  - bore up
  - restrained themselves
  lexicon: LSJ
  rationale: The verb here conveys steadfast endurance under emotional strain. 'Endured'
    fits the martyrdom context and the following causal phrase διὰ τὴν εὐσέβειαν.
- source_word: εὐσέβειαν
  chosen: piety
  alternatives:
  - godliness
  - reverence
  - devoutness
  lexicon: LSJ
  rationale: In 4 Maccabees εὐσέβεια is a key virtue denoting reverent devotion to
    God and his law. 'Piety' is concise and preserves the book's moral-theological
    vocabulary.
- source_word: οἱ ὑπολελειμμένοι
  chosen: those who were left behind
  alternatives:
  - the survivors
  - those remaining
  lexicon: LSJ
  rationale: The phrase identifies the brothers not yet executed at that moment. 'Those
    who were left behind' is more literal than 'survivors,' which could imply final
    escape.
- source_word: κατοικτιζομένους
  chosen: objects of pity
  alternatives:
  - to be pitied
  - evoking compassion
  - pitiful
  lexicon: LSJ
  rationale: The participle modifies the brothers being seen in torment. Since English
    handles the construction awkwardly, 'objects of pity' preserves the passive sense
    that they elicited compassion.
- source_word: μέχρι θανάτου βασανιζομένους
  chosen: being tortured to death
  alternatives:
  - being tormented unto death
  - being tortured until death
  lexicon: LSJ
  rationale: This phrase expresses torture continuing up to the point of death. 'Being
    tortured to death' is idiomatic and accurately conveys the severity.
- source_word: ἠθῶν
  chosen: dispositions
  alternatives:
  - characters
  - moral habits
  - customs
  lexicon: LSJ
  rationale: With τῶν τῆς ἀρετῆς ἠθῶν, the sense is the moral dispositions or character
    traits associated with virtue. 'Dispositions' avoids redundancy with συνηθείας
    ('habit').
