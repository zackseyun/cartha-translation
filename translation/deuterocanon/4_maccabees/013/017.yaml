lexical_decisions:
- source_word: οὕτως
  chosen: thus
  alternatives:
  - so
  - in this way
  lexicon: LSJ
  rationale: Adverb introducing the manner or result; 'thus' preserves the compact
    connective force without overexplaining.
- source_word: παθόντας
  chosen: have suffered
  alternatives:
  - having suffered
  - after suffering
  - endured these things
  lexicon: BDAG
  rationale: Aorist participle of πάσχω, referring to undergoing suffering. Rendered
    with an English perfect-like sense in relation to ἡμᾶς to make the fragment intelligible
    in English while preserving the idea of completed suffering.
- source_word: ἡμᾶς
  chosen: we
  alternatives:
  - us
  lexicon: BDAG
  rationale: The accusative pronoun is governed by the participial construction in
    Greek, but idiomatic English requires recasting as 'we have suffered' rather than
    the wooden 'us having suffered.'
- source_word: Ἀβραὰμ
  chosen: Abraham
  lexicon: LSJ
  rationale: Standard transliteration of the patriarch's name.
- source_word: καὶ
  chosen: and
  lexicon: LSJ
  rationale: Simple coordinating conjunction.
- source_word: Ἰσαὰκ
  chosen: Isaac
  lexicon: LSJ
  rationale: Standard transliteration of the patriarch's name.
