translation:
  text: Let us not be cowardly in demonstrating our piety.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let us not lose courage in the demonstration of our piety.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ
  chosen: not
  lexicon: BDAG
  rationale: Standard negation used with the hortatory subjunctive; rendered directly
    as 'not' in English.
- source_word: δειλανδρήσωμεν
  chosen: let us be cowardly
  alternatives:
  - let us lose courage
  - let us act like cowards
  - let us be fainthearted
  lexicon: LSJ
  rationale: First person plural hortatory subjunctive from a verb meaning to be cowardly
    or show lack of courage. The idiomatic English hortatory form is 'Let us not be
    cowardly.' This preserves the moral force of the exhortation better than a softer
    rendering like 'lose courage.'
- source_word: πρὸς
  chosen: in
  alternatives:
  - for
  - toward
  - with respect to
  lexicon: BDAG
  rationale: With the accusative here, πρὸς marks relation to the following noun phrase.
    In English, 'in proving' naturally conveys the sphere/respect in which cowardice
    must not occur.
- source_word: τὴν ... ἀπόδειξιν
  chosen: proving
  alternatives:
  - demonstration
  - proof
  - display
  lexicon: BDAG
  rationale: ἀπόδειξις denotes demonstration or proof. A verbal rendering, 'proving,'
    fits the exhortational context and reads naturally in English while preserving
    the idea of publicly demonstrating something.
- source_word: τῆς εὐσεβίας
  chosen: our godliness
  alternatives:
  - piety
  - reverence
  - devotion
  lexicon: BDAG
  rationale: εὐσέβεια in 4 Maccabees commonly refers to reverent devotion to God expressed
    in faithful conduct. 'Godliness' is accessible modern English and preserves the
    God-directed moral-religious sense better than the potentially narrower 'piety.'
    'Our' is supplied in English because the proving is performed by the speakers
    and concerns their own piety/godliness.
