theological_decisions:
- issue: Gendered familial language in a context of literal brothers
  chosen_reading: brothers
  alternative_readings:
  - siblings
  rationale: The verse speaks specifically of male siblings in the narrative of the
    seven brothers, so gender-accurate translation favors 'brothers' rather than an
    inclusive abstraction.
