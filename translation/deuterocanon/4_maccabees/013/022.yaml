translation:
  text: The souls of brothers are affectionate in embraces, and they grow much stronger
    through living together and through daily familiarity and the rest of their upbringing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brotherly souls, affectionate in embraces.' The Greek phrase is compressed
      and allows slightly different ways of relating 'brother-loving' to 'souls.'
    reason: lexical_alternative
  - marker: b
    text: '''Through living together'' may also be understood as ''through companionship''
      or ''through being reared together.'''
    reason: lexical_alternative
  - marker: c
    text: '''The rest of their upbringing'' could also be rendered ''their other education''
      or ''their remaining training.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐναγκαλισμάτων
  chosen: in embraces
  alternatives:
  - with embraces
  - by embraces
  - in acts of embracing
  lexicon: LSJ
  rationale: From the noun for embrace/encircling in the arms. The phrase is compressed
    and somewhat verbless in Greek; 'affectionate in embraces' preserves the concrete
    image without over-paraphrasing.
- source_word: φιλάδελφοι
  chosen: of brothers
  alternatives:
  - brotherly
  - of siblings
  lexicon: LSJ
  rationale: Literally 'brother-loving' or 'loving as brothers.' Because ψυχαί is
    the head noun, rendering the phrase as 'the souls of brothers' keeps the familial
    force and remains gender-accurate to the male sibling context of the seven brothers
    in 4 Maccabees.
- source_word: ψυχαί
  chosen: souls
  alternatives:
  - lives
  - persons
  - inner selves
  lexicon: LSJ
  rationale: In this context ψυχαί refers to the inner life/affections of the brothers.
    'Souls' preserves the elevated register and anthropological weight of the Greek
    better than the flatter 'persons.'
- source_word: αὔξονται
  chosen: grow
  alternatives:
  - increase
  - become
  lexicon: LSJ
  rationale: A straightforward rendering of increase/growth; here it describes the
    strengthening of fraternal affection.
- source_word: σφοδρότερον
  chosen: much stronger
  alternatives:
  - more intensely
  - more vehemently
  - more forcefully
  lexicon: LSJ
  rationale: Comparative adverb indicating greater intensity. 'Much stronger' fits
    the development of affection/bond better than a more violent-sounding English
    option.
- source_word: διὰ συντροφίας
  chosen: through living together
  alternatives:
  - through companionship
  - through being reared together
  - through close association
  lexicon: LSJ
  rationale: συντροφία can denote companionship or being brought up together. In this
    family context, 'living together' captures shared life without narrowing too specifically
    to childhood alone.
- source_word: τῆς καθʼ ἡμέραν συνηθείας
  chosen: through daily familiarity
  alternatives:
  - through daily association
  - through daily intercourse
  - through habitual daily contact
  lexicon: LSJ
  rationale: The phrase points to habitual day-by-day closeness. 'Daily familiarity'
    is natural English and preserves the idea of repeated accustomed contact.
- source_word: τῆς ἄλλης παιδίας
  chosen: the rest of their upbringing
  alternatives:
  - their other education
  - their remaining training
  - their childhood nurture
  lexicon: LSJ
  rationale: παιδεία/paidia language can refer to upbringing, education, or training.
    Given the family setting and the sequence of shared-life factors, 'the rest of
    their upbringing' best conveys the broader formative process.
