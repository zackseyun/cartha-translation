  text: καθάπερ γὰρ προβλῆτες λιμένων πύργοι τὰς κυμάτων ἀπειλὰς ἀνακόπτοντες, γαληνὸν
    παρέχουσιν τοῖς εἰσπλέουσιν τὸν ὅρμον·
