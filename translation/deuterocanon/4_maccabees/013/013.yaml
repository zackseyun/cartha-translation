translation:
  text: Because of godliness Isaac endured. And each one, while looking at the others,
    all together cheerful and very courageous, said, “Let us dedicate ourselves to
    God with our whole heart—to the one who gave us our lives—and let us use our bodies
    to keep watch over the law.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because of piety Isaac endured.' The Greek εὐσέβεια can be rendered
      'godliness' or 'piety.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'to the one who gave [us] the souls/lives.' Greek ψυχή can mean
      either 'soul' or 'life'; here the sense is likely 'life.'
    reason: lexical_alternative
  - marker: c
    text: Or 'let us use our bodies for guarding the law.' The Greek keeps the imagery
      of watchful guarding rather than using a simpler term like 'obey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὴν εὐσέβειαν
  chosen: Because of godliness
  alternatives:
  - For the sake of piety
  - Because of piety
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees is a key virtue term denoting reverence/devotion
    toward God expressed in faithful conduct. 'Godliness' is natural modern English
    and preserves the explicitly God-directed sense better than the somewhat narrower
    or more archaic 'piety.'
- source_word: ὑπέμεινεν
  chosen: endured
  alternatives:
  - persevered
  - remained steadfast
  lexicon: LSJ
  rationale: The verb denotes steadfast endurance under trial. 'Endured' is concise
    and fits the martyrdom context without overinterpreting the manner of endurance.
- source_word: ἐφορῶντες
  chosen: while looking at the others
  alternatives:
  - looking to one another
  - fixing their eyes on one another
  lexicon: LSJ
  rationale: The participle conveys mutual regard/observation among the brothers.
    'While looking at the others' captures the reciprocal encouragement implied by
    ἀλλήλους without sounding overly wooden.
- source_word: φαιδροὶ
  chosen: cheerful
  alternatives:
  - bright-faced
  - radiant
  lexicon: LSJ
  rationale: The adjective suggests brightness of countenance or glad composure. 'Cheerful'
    communicates their unshaken spirit in idiomatic English; 'bright-faced' is too
    literal and awkward.
- source_word: μάλα θαρραλέοι
  chosen: very courageous
  alternatives:
  - exceedingly bold
  - very brave
  lexicon: LSJ
  rationale: μάλα intensifies θαρραλέοι. 'Very courageous' preserves both the intensity
    and the moral courage emphasized in the scene.
- source_word: ἀφιερώσωμεν
  chosen: Let us dedicate ourselves
  alternatives:
  - Let us consecrate ourselves
  - Let us devote ourselves
  lexicon: LSJ
  rationale: The object is implicit from context and then clarified by ἑαυτούς. 'Dedicate
    ourselves' is clear, solemn, and accessible; 'consecrate' is possible but more
    ecclesiastical.
- source_word: τῷ δόντι τὰς ψυχάς
  chosen: to the one who gave us our lives
  alternatives:
  - to the one who gave our souls
  - to him who gave us our souls/lives
  lexicon: LSJ
  rationale: ψυχή can mean 'life' or 'soul.' In this martyrdom context, the sense
    is the life God has given them, not a technical anthropology. 'The one who gave
    us our lives' is idiomatic and faithful to the sense.
- source_word: χρήσωμεν
  chosen: let us use
  alternatives:
  - let us employ
  - let us make use of
  lexicon: LSJ
  rationale: The middle here means to make use of something for a purpose. 'Use' is
    the most natural English equivalent.
- source_word: τῇ περὶ τὸν νόμον φυλακῇ
  chosen: to keep watch over the law
  alternatives:
  - for guarding the law
  - for observance of the law
  lexicon: LSJ
  rationale: φυλακή literally involves guarding/keeping watch. In context it refers
    to vigilant fidelity to the law. 'Keep watch over the law' preserves the guarding
    metaphor; 'observance of the law' is interpretive and flattens the imagery.
- source_word: τὰ σώματα
  chosen: our bodies
  alternatives:
  - the body
  lexicon: LSJ
  rationale: The plural refers to their physical bodies as instruments in their faithful
    resistance. Supplying 'our' is warranted by the reflexive sense of the exhortation
    and makes the English natural.
