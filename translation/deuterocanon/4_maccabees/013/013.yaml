theological_decisions:
- issue: Rendering εὐσέβεια in a book where it functions as a central theological
    virtue
  chosen_reading: godliness
  alternative_readings:
  - piety
  rationale: The book repeatedly frames reason-governed fidelity to God under the
    banner of εὐσέβεια. 'Godliness' better signals devotion to God rather than mere
    religious scrupulosity, while remaining readable modern English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Sense of ψυχαί in τῷ δόντι τὰς ψυχάς
  chosen_reading: lives
  alternative_readings:
  - souls
  rationale: The phrase refers to God as giver of their life, which they are now ready
    to return in martyrdom. Translating 'souls' would be formally possible but may
    suggest a narrower metaphysical claim not required by the context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
