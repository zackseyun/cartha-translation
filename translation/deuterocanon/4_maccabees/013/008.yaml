translation:
  text: For, having formed a sacred chorus of godliness, they kept encouraging one
    another, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a holy chorus of piety.' The Greek combines cultic imagery ('sacred
      chorus') with the book's key virtue term εὐσέβεια.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερὸν
  chosen: sacred
  alternatives:
  - holy
  - consecrated
  lexicon: LSJ
  rationale: ἱερός commonly denotes what is sacred or consecrated. 'Sacred' is natural
    English here and fits the cultic imagery without sounding overly formal.
- source_word: εὐσεβείας
  chosen: of godliness
  alternatives:
  - of piety
  - of reverence
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees is a key virtue denoting devout fidelity toward
    God. 'Godliness' preserves the explicitly religious sense better than the somewhat
    thinner 'piety,' while remaining readable.
- source_word: στήσαντες
  chosen: having formed
  alternatives:
  - having set up
  - having established
  lexicon: LSJ
  rationale: Aorist participle from ἵστημι. In context with χορὸν, the sense is not
    literal construction but arranging/constituting a chorus. 'Having formed' captures
    the idiom in smooth English.
- source_word: χορὸν
  chosen: chorus
  alternatives:
  - choir
  - dance-circle
  - band
  lexicon: LSJ
  rationale: χορός can denote a chorus or dance-group. 'Chorus' best preserves the
    Greek image and the rhetorical/cultic resonance; 'choir' would over-specify singing
    in a modern way.
- source_word: παρεθάρσυνον
  chosen: kept encouraging
  alternatives:
  - encouraged
  - kept exhorting
  - emboldened
  lexicon: LSJ
  rationale: The imperfect indicates ongoing or repeated action. 'Kept encouraging'
    reflects the durative force better than a simple past.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: LSJ
  rationale: Standard reciprocal rendering; 'one another' suits the elevated tone.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - as they said
  - with these words
  lexicon: LSJ
  rationale: A straightforward participial bridge into the following speech; 'saying'
    is concise and formally close to the Greek.
