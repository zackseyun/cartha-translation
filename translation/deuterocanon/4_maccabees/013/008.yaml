theological_decisions:
- issue: Rendering εὐσεβεία in a martyrdom context
  chosen_reading: godliness
  alternative_readings:
  - piety
  - reverence
  rationale: 4 Maccabees uses εὐσέβεια as a central theological-moral category tied
    to faithful devotion to God under suffering. 'Godliness' preserves that theological
    weight without importing later technical terminology.
