id: 4MA.13.26
reference: 4 Maccabees 13:26
source:
  edition: lxx-swete-1909
  text: σὺν γὰρ τῇ εὐσεβείᾳ ποθεινοτέραν αὐτοῖς κατεσκεύαζεν τὴν φιλαδελφίαν.
  language: Greek
  pages:
