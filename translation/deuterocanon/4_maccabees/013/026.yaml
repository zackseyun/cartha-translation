  confidence: high
  validation: agree
translation:
  text: For along with godliness she made brotherly love even more desirable to them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σὺν
  chosen: along with
  alternatives:
  - with
  - together with
  lexicon: LSJ
  rationale: The preposition marks accompaniment. 'Along with' reads naturally in
    English while preserving the sense that one quality was cultivated together with
    another.
- source_word: εὐσεβείᾳ
  chosen: godliness
  alternatives:
  - piety
  - reverence
  lexicon: LSJ
  rationale: In 4 Maccabees, εὐσέβεια is a key virtue denoting devout fidelity toward
    God. 'Godliness' is accessible modern English and preserves the explicitly God-directed
    moral sense better than the somewhat narrower 'piety' or more general 'reverence'.
- source_word: ποθεινοτέραν
  chosen: even more desirable
  alternatives:
  - more beloved
  - more longed for
  - more cherished
  lexicon: LSJ
  rationale: Comparative of ποθεινός conveys something yearned for or cherished. 'Even
    more desirable' fits the comparative force and the construction with κατεσκεύαζεν,
    expressing that she fostered brotherly love as something especially prized.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - for them
  - among them
  lexicon: LSJ
  rationale: 'The dative is best taken as reference/advantage: she made brotherly
    love more desirable to them, i.e., in their estimation. ''To them'' is the most
    straightforward rendering.'
- source_word: κατεσκεύαζεν
  chosen: she made
  alternatives:
  - she prepared
  - she fashioned
  - she cultivated
  lexicon: LSJ
  rationale: The imperfect indicates ongoing action in past time. In context, the
    mother was shaping her sons' character. 'She made' is concise and fits the complement
    ποθεινοτέραν; the nuance of cultivation is carried by the whole clause.
- source_word: φιλαδελφίαν
  chosen: brotherly love
  alternatives:
  - love of brothers
  - familial affection among brothers
  lexicon: LSJ
  rationale: The term denotes affection among siblings, and in this immediate context
    concerns literal brothers. 'Brotherly love' is the natural English equivalent
    and preserves the familial specificity.
