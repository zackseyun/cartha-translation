theological_decisions:
- issue: Rendering εὐσεβείᾳ in a virtue context central to 4 Maccabees
  chosen_reading: godliness
  alternative_readings:
  - piety
  - reverence
  rationale: The book emphasizes devout reason and fidelity to God. 'Godliness' preserves
    the theological orientation without archaic tone. 'Piety' remains possible but
    can sound more formal or externalized in modern English.
