theological_decisions:
- issue: Nuance of apparent versus actual power in τὸν δοκοῦντα ἀποκτενεῖν
  chosen_reading: The persecutor only seems able to kill
  alternative_readings:
  - the one who intends to kill
  - the one who is reputed to kill
  rationale: The plain sense of δοκοῦντα is 'seeming/appearing,' and in this context
    it underscores the limited, merely bodily power of the persecutor. This preserves
    the theological contrast without importing extra wording into the main text.
