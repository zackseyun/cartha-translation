translation:
  text: Let us not fear the one who seems to kill.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the one who appears to kill' or 'the one who is thought able to kill.'
      The Greek emphasizes only apparent power.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ φοβηθῶμεν
  chosen: Let us not fear
  alternatives:
  - Let us not be afraid
  - May we not fear
  lexicon: BDAG
  rationale: A first person plural hortatory subjunctive with μή; 'Let us not fear'
    preserves the exhortational force in natural English.
- source_word: τὸν δοκοῦντα
  chosen: the one who seems
  alternatives:
  - the one who appears
  - the one who is thought
  lexicon: BDAG
  rationale: δοκέω here most naturally means 'to seem/appear.' The phrase suggests
    only apparent power, fitting the martyrdom context; 'the one who seems' keeps
    that nuance without over-interpreting.
- source_word: ἀποκτενεῖν
  chosen: to kill
  alternatives:
  - to put to death
  - to slay
  lexicon: BDAG
  rationale: The infinitive after δοκοῦντα expresses what the person seems able or
    intends to do. 'To kill' is the most direct and idiomatic rendering; 'put to death'
    is possible but slightly more formal than the Greek requires.
