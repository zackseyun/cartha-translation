theological_decisions:
- issue: Rendering πρόνοια in a Hellenistic Jewish theological context
  chosen_reading: providence
  alternative_readings:
  - forethought
  rationale: The term carries both philosophical and theological weight in 4 Maccabees.
    'Providence' best reflects ordered divine governance without importing later doctrinal
    specifics beyond the Greek.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Whether to smooth the paternal and maternal generative language into a generalized
    statement about parenthood
  chosen_reading: retain distinct references to fathers and a mother's womb
  alternative_readings:
  - through parents and in the womb
  rationale: The Greek explicitly distinguishes paternal and maternal roles in generation.
    Preserving that distinction is more transparent to the source and avoids paraphrase.
  doctrine_reference: Translation philosophy §§1, 4, 5
