  - 772
  - 773
  - 774
  - 775
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: And you are not ignorant of the affections of human nature, which the divine
    and all-wise providence apportioned to those who are born through the fathers,
    having planted them through the mother's womb;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the natural affections of humanity' or 'human attachments.' The Greek
      φίλτρα denotes powerful bonds of affection here, not literal magic charms.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐκ ἀγνοεῖτε
  chosen: you are not ignorant
  alternatives:
  - you do not know
  - you are not unaware
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the rhetorical force of the direct
    address. 'Not ignorant' fits the elevated style of 4 Maccabees better than the
    flatter 'do not know.'
- source_word: τὰ τῆς ἀνθρωπότητος φίλτρα
  chosen: the affections of human nature
  alternatives:
  - the natural affections of humanity
  - the charms/bonds of humanity
  - human attachments
  lexicon: LSJ
  rationale: φίλτρα can denote affections, attachments, or love-charms/bonds. In this
    maternal context the sense is not magical but the powerful bonds of natural human
    affection. 'Affections of human nature' preserves both the emotional force and
    the genitival link to ἀνθρωπότης.
- source_word: ἀνθρωπότητος
  chosen: human nature
  alternatives:
  - humanity
  - humanness
  lexicon: LSJ
  rationale: Here the term points to what belongs to being human rather than to humanity
    as a collective. 'Human nature' best conveys the appeal to ordinary human feeling.
- source_word: θεία καὶ πάνσοφος πρόνοια
  chosen: the divine and all-wise providence
  alternatives:
  - divine and supremely wise providence
  - God's divine and all-wise providence
  lexicon: LSJ
  rationale: πρόνοια is well rendered 'providence' in this philosophical-theological
    context. The article with adjectives is represented naturally in English. 'God's'
    is not added because the Greek does not explicitly supply the genitive.
- source_word: ἔμερισεν
  chosen: apportioned
  alternatives:
  - distributed
  - assigned
  - allotted
  lexicon: LSJ
  rationale: The verb suggests distribution by due measure. 'Apportioned' preserves
    the sense of wise ordering by providence.
- source_word: τοῖς γεννωμένοις
  chosen: to those who are born
  alternatives:
  - to those begotten
  - to human beings as they are born
  lexicon: LSJ
  rationale: A participial phrase is retained in clear English. 'Those who are born'
    is idiomatic and keeps the passive sense.
- source_word: διὰ τῶν πατέρων
  chosen: through the fathers
  alternatives:
  - by means of the fathers
  - through fathers
  lexicon: LSJ
  rationale: The phrase is kept fairly literal because the author is describing the
    ordered process of generation from both paternal and maternal sides.
- source_word: διὰ τῆς μητρῴας ... γαστρός
  chosen: through a mother's womb
  alternatives:
  - through the maternal womb
  - through the womb of a mother
  lexicon: LSJ
  rationale: μητρῴας modifies γαστρός and refers to the maternal womb. 'A mother's
    womb' is natural English while preserving the maternal emphasis.
- source_word: φυτεύσασα
  chosen: planted
  alternatives:
  - implanting
  - causing to take root
  lexicon: LSJ
  rationale: The participle uses planting imagery for the inception of life in the
    womb. 'Planted' preserves the metaphor without overexplaining it.
