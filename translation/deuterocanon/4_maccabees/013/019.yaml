id: 4MA.13.19
reference: 4 Maccabees 13:19
source:
  edition: lxx-swete-1909
  text: Οὐκ ἀγνοεῖτε δὲ τὰ τῆς ἀνθρωπότητος φίλτρα, ἅπερ ἡ θεία καὶ πάνσοφος πρόνοια
    διὰ τῶν πατέρων τοῖς γεννωμένοις ἔμερισεν, καὶ διὰ τῆς μητρῴας φυτεύσασα γαστρός·
  language: Greek
  pages:
