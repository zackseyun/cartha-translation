theological_decisions:
- issue: Rendering of τῇ οὐρανίᾳ δίκῃ in a context of divine moral judgment
  chosen_reading: heavenly justice
  alternative_readings:
  - the justice of heaven
  - heavenly judgment
  - divine justice
  rationale: The phrase points to transcendent, God-related justice without explicitly
    naming God. 'Heavenly justice' preserves the text's wording and theological restraint
    better than 'divine justice,' which is interpretively stronger, or 'judgment,'
    which shifts from the abstract principle/personified force of δίκη.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
