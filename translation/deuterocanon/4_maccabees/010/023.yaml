id: 4MA.10.23
reference: 4 Maccabees 10:23
source:
  edition: lxx-swete-1909
  text: αὐτὸς δʼ ἀπʼ ἐμαυτοῦ παρῆλθον, ὅπως κἀμέ κατακτείνας, περὶ πλειόνων ἀδικημάτων
    ὀφλήσῃς τῇ οὐρανίᾳ δίκῃ τιμωρίαν.
  language: Greek
