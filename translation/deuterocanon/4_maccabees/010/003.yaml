  rationale: Per the project's gender-accurate policy, the masculine familial term
    is retained rather than neutralized. In this context it refers to the bond among
    siblings within the martyr family; 'brotherhood' is both lexically defensible
    and stylistically natural, while a more inclusive nuance can be noted as an alternative.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
