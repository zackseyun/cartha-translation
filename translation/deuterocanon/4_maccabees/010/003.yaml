  - 788
  confidence: high
  validation: agree
translation:
  text: I will not disown the noble kinship of our brotherhood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will not renounce the noble bond of siblinghood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ
  chosen: not
  lexicon: BDAG
  rationale: Standard negation; carried directly into English with the finite verb.
- source_word: ἐξόμνυμαι
  chosen: I will disown
  alternatives:
  - I renounce
  - I deny under oath
  - I forswear
  lexicon: LSJ
  rationale: The middle verb can mean to deny, renounce, or forswear. In this context
    of refusing to repudiate family solidarity under pressure, 'disown' best captures
    repudiation of relationship in natural English without over-specifying an oath
    formula.
- source_word: τὴν ... συγγένειαν
  chosen: the ... kinship
  alternatives:
  - relationship
  - family bond
  lexicon: BDAG
  rationale: συγγένεια denotes kinship or family relationship. 'Kinship' preserves
    the familial sense and pairs well with the following genitive phrase.
- source_word: εὐγενῆ
  chosen: noble
  alternatives:
  - well-born
  - honorable
  lexicon: LSJ
  rationale: εὐγενής can denote noble by birth or noble in quality. Here it characterizes
    the family bond as honorable and high-born; 'noble' preserves both dignity and
    lineage better than the more class-specific 'well-born'.
- source_word: τῆς ἀδελφότητος
  chosen: of our brotherhood
  alternatives:
  - of brotherhood
  - of siblinghood
  - of the brotherhood
  lexicon: LSJ
  rationale: ἀδελφότης means brotherhood or fellowship of siblings/brothers. Given
    the immediate family context in 4 Maccabees, 'brotherhood' is the most idiomatic
    rendering. 'Our' is supplied in English because the possessive sense is implicit
    in the speaker's reference to his own familial bond.
