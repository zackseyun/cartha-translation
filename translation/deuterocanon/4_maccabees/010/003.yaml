id: 4MA.10.3
reference: 4 Maccabees 10:3
source:
  edition: lxx-swete-1909
  text: οὐκ ἐξόμνυμαι τὴν εὐγενῆ τῆς ἀδελφότητος συγγένειαν.
  language: Greek
  pages:
  - 752
  - 768
