id: 4MA.10.13
reference: 4 Maccabees 10:13
source:
  edition: lxx-swete-1909
  text: Μὴ μανῇς καὶ σὺ τοῖς ἀδελφοῖς σου τὴν αὐτὴν μανίαν, ἀλλὰ πεισθεὶς τῷ βασιλεῖ
    σῶζε σεαυτόν.
  language: Greek
  pages:
  - 752
