  - 769
  - 770
  - 771
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: Do not be as insane as your brothers with the same madness, but be persuaded
    by the king and save yourself.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μὴ μανῇς
  chosen: Do not be as insane
  alternatives:
  - Do not go mad
  - Do not be mad
  lexicon: LSJ
  rationale: The verb μαίνομαι means to be mad, rave, or be insane. Because the sentence
    immediately repeats the cognate noun μανίαν, rendering with 'insane' helps preserve
    the force of the cognate pair in natural English while keeping the rebuke sharp.
- source_word: τοῖς ἀδελφοῖς σου
  chosen: as your brothers
  alternatives:
  - like your brothers
  - with your brothers
  lexicon: LSJ
  rationale: The dative here is comparative/associative with the verb, expressing
    conformity to the brothers' behavior. 'As your brothers' is concise and idiomatic
    in English.
- source_word: τὴν αὐτὴν μανίαν
  chosen: with the same madness
  alternatives:
  - with the same insanity
  - in the same frenzy
  lexicon: LSJ
  rationale: μανία denotes madness, frenzy, or irrationality. 'Madness' best matches
    the rhetorical insult and preserves the cognate relation to μανῇς without sounding
    overly clinical.
- source_word: πεισθεὶς
  chosen: be persuaded
  alternatives:
  - obey
  - yield
  lexicon: LSJ
  rationale: The aorist passive participle of πείθω can mean 'having been persuaded'
    and in context carries the sense of yielding to the king's appeal. 'Be persuaded'
    stays closer to the Greek than the more interpretive 'obey.'
- source_word: τῷ βασιλεῖ
  chosen: by the king
  alternatives:
  - to the king
  lexicon: LSJ
  rationale: With passive πεισθεὶς, the dative naturally marks the personal agent
    or one whose persuasion is accepted. 'By the king' makes the English syntax clear.
- source_word: σῶζε σεαυτόν
  chosen: save yourself
  alternatives:
  - preserve yourself
  - spare yourself
  lexicon: LSJ
  rationale: σῴζω here refers to preserving one's life from execution. 'Save yourself'
    is the most direct and idiomatic rendering.
