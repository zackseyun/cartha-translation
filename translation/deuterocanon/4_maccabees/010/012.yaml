id: 4MA.10.12
reference: 4 Maccabees 10:12
source:
  edition: lxx-swete-1909
  text: Καὶ τούτου θανόντος ἀδελφοπρεπῶς, τὸν τέταρτον ἐπεσπῶντο, λέγοντες
  language: Greek
  pages:
  - 752
  - 768
