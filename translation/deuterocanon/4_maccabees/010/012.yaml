  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: And when this one had died in a manner worthy of his brothers, they dragged
    forward the fourth, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'having died brother-worthily.' The phrase means he
      died in a way fitting for one of the brothers.
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτου
  chosen: this one
  alternatives:
  - him
  - this man
  lexicon: LSJ
  rationale: The demonstrative refers back to the previously mentioned brother. 'This
    one' preserves the Greek deictic force more transparently than simply 'him,' while
    remaining natural in English.
- source_word: θανόντος
  chosen: had died
  alternatives:
  - having died
  - died
  lexicon: LSJ
  rationale: 'Aorist participle in genitive absolute, rendered with an English pluperfect-style
    clause for smooth narrative sequence: after his death, the next action follows.'
- source_word: ἀδελφοπρεπῶς
  chosen: in a manner worthy of his brothers
  alternatives:
  - brotherly
  - nobly like a brother
  - in a brother-worthy way
  lexicon: LSJ
  rationale: The adverb literally conveys conduct fitting for a brother. In context
    of martyrdom alongside siblings, 'in a manner worthy of his brothers' best captures
    both familial reference and honor-laden sense without sounding awkward.
- source_word: τὸν τέταρτον
  chosen: the fourth
  alternatives:
  - the fourth brother
  lexicon: LSJ
  rationale: The ordinal likely means the fourth brother in sequence. English can
    leave 'brother' implicit because the context already establishes the series of
    brothers; this keeps closer to the Greek wording.
- source_word: ἐπεσπῶντο
  chosen: they dragged forward
  alternatives:
  - they drew forward
  - they hauled up
  - they pulled forward
  lexicon: LSJ
  rationale: The verb suggests drawing or dragging someone toward the place of torture/interrogation.
    'Dragged forward' conveys coercion and physical force appropriate to the scene.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  - while saying
  lexicon: LSJ
  rationale: A present participle introducing direct speech in the next verse; 'saying'
    preserves the participial linkage and narrative flow.
