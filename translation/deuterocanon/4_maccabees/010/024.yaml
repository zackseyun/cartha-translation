id: 4MA.10.24
reference: 4 Maccabees 10:24
source:
  edition: lxx-swete-1909
  text: ὦ μισάρετε καὶ μισάνθρωπε, τί δρῶντες ἡμᾶς τοῦτον προθεῖς τὸν τρόπον;
  language: Greek
  pages:
  - 752
  - 768
  - 769
  - 770
  - 771
  - 786
  - 787
  - 788
  validation: no_reference
translation:
  text: O hateful and misanthropic man, what are you doing by exposing us in this
    way?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by setting us forth in this manner.' The Greek verb can mean 'set forth'
      or 'expose,' and the context favors the sense of publicly presenting them to
      abuse or punishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: μισάρετε
  chosen: hateful
  alternatives:
  - most hateful
  - hater
  lexicon: LSJ
  rationale: A vocative adjective of abuse. 'Hateful' gives the direct force in natural
    English without overcomplicating the insult. 'Most hateful' would overstate unless
    the form is taken as superlative nuance; the context supports a strong but straightforward
    reproach.
- source_word: μισάνθρωπε
  chosen: misanthropic man
  alternatives:
  - man-hater
  - enemy of humanity
  - misanthrope
  lexicon: LSJ
  rationale: The compound literally denotes one who hates people. 'Misanthropic man'
    preserves both the lexical sense and the vocative address. 'Misanthrope' is possible
    but slightly more abstract; 'enemy of humanity' is interpretive.
- source_word: τί δρῶντες
  chosen: what are you doing
  alternatives:
  - why are you acting
  - what are you accomplishing
  lexicon: LSJ
  rationale: The idiom asks what action is being undertaken. In English, singular
    address with plural participle is best represented idiomatically as 'what are
    you doing,' since the speaker is addressing one persecutor. More literal reproductions
    would sound strained.
- source_word: ἡμᾶς
  chosen: us
  lexicon: LSJ
  rationale: Direct object of the hostile action; straightforward first person plural
    pronoun.
- source_word: προθεῖς
  chosen: by exposing
  alternatives:
  - by setting forth
  - by putting forward
  - by displaying
  lexicon: LSJ
  rationale: From προτίθημι in the sense of setting forth or exposing publicly. In
    this martyrdom context, 'exposing' best conveys being put forward to suffering
    or public display. 'Setting forth' is too wooden in modern English.
- source_word: τὸν τρόπον
  chosen: in this way
  alternatives:
  - in this manner
  - thus
  lexicon: LSJ
  rationale: Common idiomatic expression referring to manner. 'In this way' is clear,
    natural, and close to the Greek.
