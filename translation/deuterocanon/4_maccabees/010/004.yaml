theological_decisions:
- issue: Rendering ψυχή in contrast with σῶμα
  chosen_reading: soul
  alternative_readings:
  - life
  rationale: The verse sharply contrasts what persecutors can do to the body versus
    what they cannot do to the ψυχή. Rendering ψυχή as 'soul' preserves that theological-anthropological
    distinction rather than flattening it to mere physical life.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
