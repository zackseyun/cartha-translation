theological_decisions:
- issue: Rendering λογισμός in 4 Maccabees' philosophical-theological context
  chosen_reading: reasoned judgment
  alternative_readings:
  - reason
  - rational resolve
  rationale: The book emphasizes devout reason mastering suffering and passion. 'Reasoned
    judgment' avoids reducing the term to abstract intellect while also not importing
    later technical philosophical jargon. It preserves the text's moral-psychological
    claim without overstating it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
- issue: First person plural ἡμῶν despite singular speaker
  chosen_reading: our reasoned judgment
  alternative_readings:
  - my reasoned judgment
  rationale: The Greek witness supplied in Zone 1 reads plural, and the translation
    should remain anchored to that witness. The plural also fits the martyr's solidarity
    with his brothers and shared commitment. Because the source validation notes a
    mismatch, this choice is documented rather than silently normalized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 5
