translation:
  text: Look, my tongue has been broken; cut it off. For not even by this will you
    cut out our reasoned judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads 'our reasoned judgment,' not 'my'; the plural may express solidarity
      with the speaker's brothers, though some readers may expect a singular from
      the immediate context.
    reason: alternative_reading
  - marker: b
    text: 'The final verb is a vivid tongue-cutting term used figuratively: the speaker
      says that mutilating his tongue cannot remove or silence their rational resolve.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: BDAG
  rationale: A direct attention-getter. 'Look' is natural modern English while preserving
    the force of the deictic interjection better than the more archaic 'Behold.'
- source_word: κέχλασται
  chosen: has been broken
  alternatives:
  - has been shattered
  - has been crushed
  lexicon: LSJ
  rationale: 'Perfect passive/middle form indicating a completed state: the tongue
    is already broken or mangled. ''Has been broken'' is the most transparent rendering
    without over-specifying the manner of injury.'
- source_word: ἡ γλῶσσα
  chosen: my tongue
  alternatives:
  - the tongue
  lexicon: BDAG
  rationale: Greek has the article, but in context the speaker refers to his own tongue.
    English idiom normally makes this possessive explicit.
- source_word: τέμνε
  chosen: cut it off
  alternatives:
  - cut
  - sever it
  lexicon: BDAG
  rationale: An imperative addressed to the torturer. Because the direct object is
    the tongue just mentioned, English benefits from making the object explicit. 'Cut
    it off' captures the violent force more clearly than the bare 'cut.'
- source_word: οὐ γὰρ παρὰ τοῦτο
  chosen: For not even by this
  alternatives:
  - For not by this
  - For not through this
  lexicon: LSJ
  rationale: 'παρὰ with the accusative here conveys means or instrument in context:
    even by doing this, the persecutor will not achieve the intended result. ''Not
    even by this'' preserves the emphatic sense.'
- source_word: τὸν λογισμὸν
  chosen: reasoned judgment
  alternatives:
  - reason
  - rational resolve
  - mind
  lexicon: BDAG
  rationale: In 4 Maccabees λογισμός is a key term for rational, principled reasoning
    governing the passions. 'Reasoned judgment' preserves both the intellectual and
    moral-resolute sense better than the flatter 'reason' alone.
- source_word: ἡμῶν
  chosen: our
  alternatives:
  - my
  lexicon: BDAG
  rationale: The transmitted text reads first person plural. Although the immediate
    speaker is singular, the plural likely identifies him with his brothers/the faithful
    community. The translation preserves the source reading rather than harmonizing
    to the singular.
- source_word: γλωσσοτομήσεις
  chosen: will you cut out
  alternatives:
  - will you silence
  - will you cut off the tongue of
  lexicon: LSJ
  rationale: 'The verb is a vivid compound built on tongue-cutting. Here it is used
    metaphorically against λογισμός: the torturer cannot ''tongue-cut'' or extirpate
    their rational resolve. ''Will you cut out'' keeps the bodily metaphor alive in
    intelligible English.'
