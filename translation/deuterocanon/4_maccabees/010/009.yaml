translation:
  text: And as he was about to die, he said,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μέλλων
  chosen: as he was about to
  alternatives:
  - being about to
  - when he was about to
  lexicon: BDAG
  rationale: The participle of μέλλω commonly indicates imminence. Rendering it with
    a temporal-circumstantial phrase in English preserves both the impending action
    and the flow into the main verb.
- source_word: ἀποθνήσκειν
  chosen: die
  alternatives:
  - be put to death
  - perish
  lexicon: BDAG
  rationale: The infinitive means 'to die.' Although the broader context is martyrdom/execution,
    this clause itself does not explicitly specify agency, so the simpler 'die' best
    matches the Greek.
- source_word: ἔφη
  chosen: he said
  alternatives:
  - he declared
  - he spoke
  lexicon: BDAG
  rationale: A standard narrative speech introducer. 'He said' is the most natural
    and sufficiently formal rendering in modern English.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  - ''
  lexicon: BDAG
  rationale: δέ here lightly advances the narrative rather than strongly contrasting.
    'And' preserves the connective force without overstating contrast.
