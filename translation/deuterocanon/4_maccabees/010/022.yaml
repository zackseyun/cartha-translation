id: 4MA.10.22
reference: 4 Maccabees 10:22
source:
  edition: lxx-swete-1909
  text: Οὐ μέλλω, τύραννε, πρὸς τὸν ὑπὲρ τῆς ἀρετῆς βασανισμὸν παραιτεῖσθαι.
  language: Greek
  pages:
  - 752
  - 768
  - 769
  - 770
  - 771
  - 786
  - 787
  - 788
  validation: no_reference
translation:
  text: I am not about to refuse, tyrant, the torture for the sake of virtue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not decline the torture on behalf of virtue.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ μέλλω
  chosen: I am not about to
  alternatives:
  - I will not
  - I do not intend to
  lexicon: BDAG
  rationale: μέλλω with infinitive can denote intention or imminence. 'I am not about
    to' preserves the speaker's resolute present stance with a forward-looking sense,
    stronger than a simple future but still natural English.
- source_word: τύραννε
  chosen: tyrant
  alternatives:
  - despot
  - tyrant king
  lexicon: LSJ
  rationale: The vocative directly addresses the persecuting ruler with a morally
    charged term. 'Tyrant' is the standard and most transparent English equivalent.
- source_word: πρὸς τὸν ... βασανισμόν
  chosen: the torture
  alternatives:
  - the torment
  - the ordeal of torture
  lexicon: LSJ
  rationale: βασανισμός refers to torture or severe torment. With πρὸς expressing
    relation toward the coming ordeal, idiomatic English is best achieved by rendering
    the phrase as 'refuse ... the torture' rather than preserving a wooden prepositional
    structure.
- source_word: ὑπὲρ τῆς ἀρετῆς
  chosen: for the sake of virtue
  alternatives:
  - for virtue
  - on behalf of virtue
  lexicon: LSJ
  rationale: ὑπέρ here conveys purpose or cause, and ἀρετή denotes moral excellence/virtue.
    'For the sake of virtue' clearly expresses suffering endured in defense of moral
    excellence.
- source_word: παραιτεῖσθαι
  chosen: refuse
  alternatives:
  - decline
  - shrink from
  - beg off from
  lexicon: BDAG
  rationale: The middle infinitive can mean to refuse or decline. In context the speaker
    means he will not reject or evade the torture set before him. 'Refuse' is concise
    and idiomatic.
