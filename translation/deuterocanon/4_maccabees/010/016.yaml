theological_decisions:
- issue: Gendered kinship term ἀδελφός in a family-martyrdom context
  chosen_reading: a brother
  alternative_readings:
  - one of the siblings
  rationale: The Greek is explicitly masculine singular and the context is a male
    speaker identifying himself with his already tortured brothers. Per doctrine,
    gender-accurate rendering is preferred over neutralization.
