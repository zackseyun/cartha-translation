- issue: Martyrdom language of suffering for God
  chosen_reading: for the sake of God
  alternative_readings:
  - for God
  - on behalf of God
  rationale: The phrase indicates suffering endured out of loyalty to God, not that
    the speakers act as God's substitute. The chosen rendering preserves devotion
    without importing later doctrinal formulations of atonement or representation.
