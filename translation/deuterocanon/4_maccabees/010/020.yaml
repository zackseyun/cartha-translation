translation:
  text: For the sake of God, we gladly have the limbs of our body mutilated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For God, we willingly are mutilated in the limbs of the body.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡδέως
  chosen: gladly
  alternatives:
  - with pleasure
  - willingly
  lexicon: LSJ
  rationale: Adverb expressing cheerful willingness. 'Gladly' preserves both readiness
    and positive resolve without sounding flippant.
- source_word: ὑπὲρ τοῦ θεοῦ
  chosen: for the sake of God
  alternatives:
  - for God
  - on behalf of God
  lexicon: LSJ
  rationale: ὑπέρ with genitive commonly conveys 'for the sake of' or 'for' in the
    sense of devotion or cause. 'For the sake of God' makes the martyrdom context
    explicit without overinterpreting.
- source_word: τὰ τοῦ σώματος μέλη
  chosen: the limbs of our body
  alternatives:
  - the members of our body
  - our bodily members
  lexicon: LSJ
  rationale: μέλη literally means 'limbs' or 'members.' Because the context is physical
    dismemberment, 'limbs' is more natural and concrete in English than 'members.'
    The possessive sense from τοῦ σώματος is retained.
- source_word: ἀκρωτηριαζόμεθα
  chosen: have ... mutilated
  alternatives:
  - are mutilated
  - are dismembered
  - are cut off
  lexicon: LSJ
  rationale: The verb denotes mutilation or amputation. An English passive with complementary
    object ('have the limbs ... mutilated') best reflects the Greek passive while
    keeping the body-part object explicit. 'Dismembered' would be stronger and potentially
    overstate the specific wording.
