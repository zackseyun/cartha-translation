  text: Καὶ τούτου τὸν ἀοίδιμον θάνατον καρτερήσαντος, ὁ τρίτος ἤγετο, παρακαλούμενος
    πολλὰ ὑπὸ πολλῶν ὅπως ἀπογευσάμενος σώζοιτο.
