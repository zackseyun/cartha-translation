theological_decisions:
- issue: Martyrological elevation in ἀοίδιμον θάνατον
  chosen_reading: Render with elevated language ('death, worthy to be sung of')
  alternative_readings:
  - renowned death
  - glorious death
  - celebrated death
  rationale: The verse praises the previous brother's martyrdom in exalted rhetorical
    terms. The chosen rendering preserves that honorific tone without importing later
    doctrinal categories beyond the text itself.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Implicit object of ἀπογευσάμενος
  chosen_reading: Supply 'it' in English
  alternative_readings:
  - leave the object unstated
  - supply 'the meat' or 'the forbidden food'
  rationale: English normally requires an object here, but the Greek leaves it implicit
    from context. Supplying the minimal 'it' avoids over-interpretation while keeping
    the sentence readable.
  doctrine_reference: Translation philosophy §§1, 6
