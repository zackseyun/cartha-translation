translation:
  text: And after he had endured this death, worthy to be sung of, the third was led
    in, being urged much by many to save himself by tasting it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his celebrated death' or 'his renowned death.' The Greek adjective literally
      suggests a death 'sung of' or commemorated in praise.
    reason: lexical_alternative
  - marker: b
    text: That is, by tasting the forbidden food and so preserving his life.
    reason: cultural_note
lexical_decisions:
- source_word: ἀοίδιμον
  chosen: worthy to be sung of
  alternatives:
  - renowned
  - memorable
  - glorious
  - celebrated
  lexicon: LSJ
  rationale: The adjective literally carries the sense of being sung of or celebrated
    in song. Rendering it this way preserves the elevated rhetorical tone better than
    the flatter 'renowned' or 'memorable,' while remaining intelligible in English.
- source_word: θάνατον
  chosen: death
  alternatives:
  - dying
  lexicon: LSJ
  rationale: The noun straightforwardly denotes death. 'Death' fits the formal structure
    of the clause and preserves the focus on the martyr's end rather than merely the
    process of dying.
- source_word: καρτερήσαντος
  chosen: had endured
  alternatives:
  - had borne
  - had persevered through
  - had faced steadfastly
  lexicon: LSJ
  rationale: The participle conveys steadfast endurance under suffering. 'Had endured'
    is natural English and preserves the moral emphasis on resolute perseverance.
- source_word: ὁ τρίτος ἤγετο
  chosen: the third was led in
  alternatives:
  - the third was brought forward
  - the third was led away
  lexicon: LSJ
  rationale: In context the third brother is being brought before the tyrant for torture/interrogation.
    'Was led in' best captures movement into the scene of examination without over-specifying
    beyond the Greek.
- source_word: παρακαλούμενος πολλὰ ὑπὸ πολλῶν
  chosen: being urged repeatedly by many
  alternatives:
  - being exhorted much by many
  - being earnestly entreated by many
  lexicon: LSJ
  rationale: The phrase intensifies the appeal both by quantity ('much/repeatedly')
    and by number of speakers ('by many'). 'Being urged repeatedly by many' communicates
    both emphases in idiomatic English.
- source_word: ὅπως ἀπογευσάμενος σώζοιτο
  chosen: to save himself by tasting it
  alternatives:
  - that by tasting he might be saved
  - to preserve his life by taking a taste
  - to escape by tasting
  lexicon: LSJ
  rationale: ἀπογευσάμενος means 'having tasted' or 'by tasting,' referring to compliance
    with the forbidden food. σώζοιτο here means preserving one's life. 'Save himself
    by tasting it' is concise and clear; 'it' is supplied in English from context
    because the object is implicit in the Greek.
