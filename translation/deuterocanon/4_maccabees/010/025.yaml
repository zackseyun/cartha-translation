translation:
  text: Or does it not seem evil to you that we worship the Creator of all and live
    according to his virtuous law?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Or does it not seem evil...?' The Greek rhetorical
      question may be understood as challenging the opponent's moral judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: κακὸν
  chosen: evil
  alternatives:
  - wrong
  - bad
  lexicon: BDAG
  rationale: The adjective denotes what is morally bad or blameworthy. 'Evil' best
    preserves the moral charge in the mother's rhetorical question, stronger than
    the flatter 'bad' and more direct than 'wrong.'
- source_word: οὐ δοκεῖ
  chosen: does it not seem
  alternatives:
  - does it not appear
  - is it not thought
  lexicon: BDAG
  rationale: δοκέω here expresses appearance or judgment. 'Does it not seem' gives
    natural English while preserving the rhetorical force of the Greek question.
- source_word: τὸν πάντων κτίστην
  chosen: the Creator of all
  alternatives:
  - the maker of all things
  - the creator of everything
  lexicon: BDAG
  rationale: κτίστης is 'creator/founder.' 'Creator of all' is concise, elevated,
    and faithful to the genitive πάντων without unnecessary expansion.
- source_word: εὐσεβοῦμεν
  chosen: we worship
  alternatives:
  - we are devout toward
  - we show reverence to
  lexicon: BDAG
  rationale: The verb conveys pious reverence toward deity. In this context, where
    the object is the Creator, 'we worship' communicates the religious devotion clearly
    in idiomatic English.
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in accordance with
  - by
  lexicon: BDAG
  rationale: κατά with the accusative here marks conformity or standard. 'According
    to' is the most straightforward rendering.
- source_word: τὸν ἔναρετον αὐτοῦ νόμον
  chosen: his virtuous law
  alternatives:
  - his excellent law
  - his noble law
  lexicon: LSJ
  rationale: ἔναρετος means morally excellent or virtuous. Since it modifies νόμον,
    'virtuous law' preserves the explicit moral quality attributed to the law; 'excellent'
    is possible but less ethically specific.
- source_word: ζῶμεν
  chosen: live
  alternatives:
  - conduct our lives
  - go on living
  lexicon: BDAG
  rationale: The present tense refers to manner of life. 'Live' is simple and sufficiently
    broad, with the ethical sense supplied by 'according to his virtuous law.'
