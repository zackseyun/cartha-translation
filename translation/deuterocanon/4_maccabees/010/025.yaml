theological_decisions:
- issue: Referent and force of the rhetorical question
  chosen_reading: The speaker asks whether worshiping the Creator and living by his
    law should be considered evil.
  alternative_readings:
  - The question may be heard more pointedly as 'Does it seem evil to you...?' with
    an implied addressee.
  rationale: The Greek lacks an explicit second-person pronoun, but the rhetorical
    setting implies an opponent's judgment. The English keeps the rhetorical question
    while making the implied audience natural in English with 'to you.'
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
