id: 4MA.10.25
reference: 4 Maccabees 10:25
source:
  edition: lxx-swete-1909
  text: ἢ κακὸν οὐ δοκεῖ, ὅτι τὸν πάντων κτίστην εὐσεβοῦμεν, καὶ κατὰ τὸν ἔναρετον
    αὐτοῦ ζῶμεν νόμον;
  language: Greek
