theological_decisions:
- issue: Rendering σωτηρίου in a deuterocanonical martyrdom context
  chosen_reading: deliverance
  alternative_readings:
  - salvation
  rationale: The term can bear either a broad 'salvation' sense or a more immediate
    'deliverance/rescue' sense. In this verse the speaker's challenge concerns expected
    rescue from suffering, so 'deliverance' better matches the local context without
    denying broader theological resonance.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
