id: 4MA.10.27
reference: 4 Maccabees 10:27
source:
  edition: lxx-swete-1909
  text: εἴπερ ἠσθάνου ἀνθρώπους πόθων, καὶ ἐλπίδα εἶχες παρὰ θεῷ σωτηρίου.
  language: Greek
  pages:
  - 752
  - 768
  - 769
  - 770
  - 771
  - 786
  - 787
  - 788
  validation: no_reference
translation:
  text: if indeed you had human affections, and had hope from God for deliverance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'human longings' or 'human affections.' The Greek phrase is compressed
      and appeals to ordinary human attachment.
    reason: lexical_alternative
  - marker: b
    text: Or 'salvation.' The Greek can denote either immediate deliverance or broader
      salvation; 'deliverance' is chosen for the immediate context.
    reason: alternative_reading
lexical_decisions:
- source_word: εἴπερ
  chosen: if indeed
  alternatives:
  - if really
  - since indeed
  lexicon: LSJ
  rationale: The particle adds emphasis to the conditional sense. 'If indeed' preserves
    the rhetorical force without overcommitting to a causal sense like 'since.'
- source_word: ἠσθάνου
  chosen: you had ... feelings
  alternatives:
  - you perceived
  - you felt
  - you were aware
  lexicon: LSJ
  rationale: From αἰσθάνομαι, here in a context of emotional appeal. 'Had feelings'
    best fits the idiom with ἀνθρώπους πόθων and communicates affective capacity rather
    than mere perception.
- source_word: ἀνθρώπους
  chosen: human
  alternatives:
  - of men
  - humane
  - manly
  lexicon: LSJ
  rationale: Used adjectivally with πόθων in sense of what is characteristically human.
    'Human' is the most natural English equivalent here.
- source_word: πόθων
  chosen: feelings
  alternatives:
  - longings
  - affections
  - desires
  lexicon: LSJ
  rationale: πόθος often denotes longing or affection. In this compressed phrase,
    'human feelings' is idiomatic English and captures the appeal to natural human
    affection; 'human longings' is possible but less natural here.
- source_word: ἐλπίδα
  chosen: hope
  alternatives:
  - expectation
  lexicon: LSJ
  rationale: Standard rendering; no contextual pressure suggests a stronger or weaker
    term.
- source_word: παρὰ θεῷ
  chosen: from God
  alternatives:
  - with God
  - before God
  lexicon: LSJ
  rationale: παρά with dative can indicate proximity or relation, but in this context
    'hope from God' best conveys hope grounded in or supplied by God, fitting the
    following genitive σωτηρίου.
- source_word: σωτηρίου
  chosen: for deliverance
  alternatives:
  - for salvation
  - of rescue
  lexicon: LSJ
  rationale: The genitive depends on ἐλπίδα and denotes the content/object of hope.
    'Deliverance' fits the immediate context of threatened suffering and death better
    than the more doctrinally loaded 'salvation,' while remaining faithful to the
    Greek.
