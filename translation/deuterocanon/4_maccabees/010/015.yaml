id: 4MA.10.15
reference: 4 Maccabees 10:15
source:
  edition: lxx-swete-1909
  text: μὰ τὸν μακάριον τῶν ἀδελφῶν μου θάνατον, καὶ τὸν αἰώνιον τοῦ τυράννου ὄλεθρον,
    καὶ τὸν ἀΐδιον τῶν εὐσεβῶν βίον, οὐκ ἀρνήσομαι τὴν εὐγένῃ ἀδελφότητα.
  language: Greek
