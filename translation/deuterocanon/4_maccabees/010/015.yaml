theological_decisions:
- issue: Eschatological contrast between the tyrant and the godly
  chosen_reading: The verse affirms enduring destruction for the tyrant and eternal
    life for the godly without specifying a later doctrinal system beyond the text.
  alternative_readings:
  - Read as general moral contrast without developed afterlife doctrine
  - Read as explicit statement of postmortem reward and punishment
  rationale: The Greek sets a sharp contrast between αἰώνιος destruction and ἀΐδιος
    life. The translation preserves that contrast directly without softening it or
    importing more detailed theological categories than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
