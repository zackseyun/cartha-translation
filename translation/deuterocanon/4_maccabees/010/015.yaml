translation:
  text: By the blessed death of my brothers, and by the tyrant’s eternal destruction,
    and by the everlasting life of the godly, I will not renounce my noble brotherhood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the noble brotherhood.' The Greek phrase may be taken more generally,
      but in context it refers to the speaker's bond with his brothers.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek uses two near-synonymous adjectives for enduring duration: ''everlasting''
      for the tyrant''s destruction and ''eternal'' for the godly''s life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὰ
  chosen: By
  alternatives:
  - No, by
  - Indeed, by
  lexicon: LSJ
  rationale: μὰ with the accusative introduces a solemn oath formula, best rendered
    in idiomatic English as 'By ...'.
- source_word: μακάριον ... θάνατον
  chosen: blessed death
  alternatives:
  - happy death
  - fortunate death
  lexicon: LSJ
  rationale: μακάριος denotes blessedness rather than mere happiness; retaining 'blessed'
    preserves the honor and religious valuation attached to the brothers' martyrdom.
- source_word: τῶν ἀδελφῶν μου
  chosen: of my brothers
  alternatives:
  - of my brethren
  - of my siblings
  lexicon: LSJ
  rationale: ἀδελφῶν is grammatically masculine and contextually refers to the speaker's
    male brothers. 'Brothers' is gender-accurate and natural English.
- source_word: αἰώνιον
  chosen: everlasting
  alternatives:
  - eternal
  - age-long
  lexicon: LSJ
  rationale: For the tyrant's ὄλεθρος, 'everlasting' communicates enduring finality
    in idiomatic English. It also provides a slight stylistic distinction from ἀΐδιον
    later in the verse while preserving the semantic overlap.
- source_word: ὄλεθρον
  chosen: destruction
  alternatives:
  - ruin
  - doom
  lexicon: LSJ
  rationale: ὄλεθρος commonly denotes destruction or ruin. 'Destruction' is the clearest
    modern equivalent and fits the eschatological contrast with the godly's life.
- source_word: ἀΐδιον
  chosen: eternal
  alternatives:
  - everlasting
  - perpetual
  lexicon: LSJ
  rationale: ἀΐδιος denotes perpetual, enduring existence. 'Eternal' is a natural
    rendering here and pairs well with 'life' in English.
- source_word: τῶν εὐσεβῶν
  chosen: of the godly
  alternatives:
  - of the pious
  - of the devout
  lexicon: LSJ
  rationale: εὐσεβῶν refers to those marked by reverence and piety toward God. 'Godly'
    is accessible modern English and preserves the religious sense.
- source_word: οὐκ ἀρνήσομαι
  chosen: I will not renounce
  alternatives:
  - I will not deny
  - I will not disown
  lexicon: LSJ
  rationale: ἀρνέομαι can mean deny, refuse, or renounce. In context the speaker refuses
    to repudiate his familial and covenantal solidarity, so 'renounce' best captures
    the force.
- source_word: τὴν εὐγένῃ ἀδελφότητα
  chosen: my noble brotherhood
  alternatives:
  - the noble brotherhood
  - my noble kinship
  - my noble fraternity
  lexicon: LSJ
  rationale: ἀδελφότης is brotherhood/fraternity; εὐγενής conveys noble birth or nobility
    of character. Because the possessive is implicit from the context and English
    idiom, 'my noble brotherhood' clearly expresses refusal to disown his brothers
    and their shared honorable lineage.
