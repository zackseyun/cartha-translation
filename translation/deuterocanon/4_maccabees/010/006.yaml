id: 4MA.10.6
reference: 4 Maccabees 10:6
source:
  edition: lxx-swete-1909
  text: καὶ τοὺς δακτύλους καὶ τοὺς βραχίονας καὶ τὰ σκέλη καὶ τοὺς ἀγκῶνας περίειλκον.
  language: Greek
