  - 788
  confidence: high
  validation: agree
translation:
  text: and they tore away the fingers and the arms and the legs and the elbows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stripped off' / 'pulled away'; the Greek verb conveys forcible removal
      of the limbs or limb-parts in the torture scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: περίειλκον
  chosen: they tore away
  alternatives:
  - they stripped off
  - they pulled off
  - they wrenched away
  lexicon: LSJ
  rationale: The imperfect/plural verb describes violent removal in the torture context.
    'Tore away' communicates forcible mutilation in natural English without overparaphrasing.
    More literal options like 'stripped off' are possible but can sound less violent
    than the context requires.
- source_word: δακτύλους
  chosen: fingers
  lexicon: LSJ
  rationale: Standard anatomical sense; no contextual reason to broaden or narrow.
- source_word: βραχίονας
  chosen: arms
  alternatives:
  - forearms
  lexicon: LSJ
  rationale: The ordinary sense is 'arms.' Although the exact limb segment can vary,
    'arms' is the most straightforward and idiomatic rendering here.
- source_word: σκέλη
  chosen: legs
  alternatives:
  - shanks
  lexicon: LSJ
  rationale: Refers to the legs; 'shanks' would be more anatomically specific but
    is less natural in modern English.
- source_word: ἀγκῶνας
  chosen: elbows
  alternatives:
  - forearms
  - joints of the arm
  lexicon: LSJ
  rationale: The noun commonly denotes 'elbows' or the bend/joint of the arm. 'Elbows'
    is the clearest direct rendering, even though the verse's piling up of body parts
    is rhetorically gruesome rather than anatomically technical.
