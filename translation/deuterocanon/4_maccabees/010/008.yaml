id: 4MA.10.8
reference: 4 Maccabees 10:8
source:
  edition: lxx-swete-1909
  text: περὶ ὃν ἐκ σφονδύλων ἐκμελιζόμενος ἔωρα τὰς ἑαυτοῦ σάρκας περιλακιζομένας
    καὶ κατὰ σπλάγχνον σταγόνας αἵματος ἀπορρεούσας.
  language: Greek
  pages:
  - 752
  - 768
  - 769
  - 770
  - 771
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: while he was being dislocated on the wheel, I saw his own flesh being torn
    all around and drops of blood flowing down from his inward parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'being wrenched from the vertebrae/joints'; the Greek phrase
      ἐκ σφονδύλων is difficult and may point more directly to bodily joints than
      to the torture wheel itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ ὃν
  chosen: while he was being dislocated on the wheel
  alternatives:
  - concerning whom
  - around whom, as he was being stretched
  lexicon: LSJ
  rationale: The phrase introduces the circumstance surrounding the martyr's torture.
    Given the immediate context and the instrumental phrase that follows, an idiomatic
    temporal rendering best conveys the sense in English rather than a wooden 'concerning
    whom.' 'On the wheel' is supplied from the torture imagery implied by the following
    term and context.
- source_word: ἐκ σφονδύλων
  chosen: on the wheel
  alternatives:
  - by vertebrae/joints
  - from the vertebrae
  lexicon: LSJ
  rationale: σφόνδυλος can denote vertebrae or a rounded whorl/wheel-like element.
    In this torture context, the phrase most plausibly refers to the rack/wheel apparatus
    by which the body is disjointed. A strictly anatomical rendering ('from the vertebrae')
    is possible but less coherent with ἐκμελιζόμενος as a torture description.
- source_word: ἐκμελιζόμενος
  chosen: being dislocated
  alternatives:
  - being torn limb from limb
  - being dismembered
  - being wrenched out of joint
  lexicon: LSJ
  rationale: The participle denotes violent pulling apart at the joints. 'Being dislocated'
    preserves the bodily specificity without overstating to full dismemberment, which
    the verse does not explicitly state.
- source_word: ἔωρα
  chosen: I saw
  alternatives:
  - I was seeing
  - I watched
  lexicon: LSJ
  rationale: Imperfect of ὁράω can be rendered as a simple past in English here. 'I
    saw' is natural and preserves eyewitness force.
- source_word: τὰς ἑαυτοῦ σάρκας
  chosen: his own flesh
  alternatives:
  - his own body
  - his own fleshly parts
  lexicon: LSJ
  rationale: σάρξ here is literal, not metaphorical. 'His own flesh' preserves the
    visceral concreteness of the Greek.
- source_word: περιλακιζομένας
  chosen: being torn all around
  alternatives:
  - being mangled around
  - being lacerated on every side
  - being battered around
  lexicon: LSJ
  rationale: The participle conveys violent abuse or mangling from all sides. 'Being
    torn all around' communicates the physical brutality in readable English while
    reflecting the prefix περι-.
- source_word: κατὰ σπλάγχνον
  chosen: from his inward parts
  alternatives:
  - from his entrails
  - from his inner organs
  - through his belly
  lexicon: LSJ
  rationale: σπλάγχνον refers to the inward parts/viscera. 'Inward parts' is vivid
    but less clinically jarring than 'entrails,' fitting the project's readable-modern-English
    aim.
- source_word: σταγόνας αἵματος ἀπορρεούσας
  chosen: drops of blood flowing down
  alternatives:
  - drops of blood trickling away
  - blood-drops running off
  lexicon: LSJ
  rationale: The phrase depicts visible drops of blood running down from the wounded
    body. 'Flowing down' captures the motion of ἀπορρεούσας naturally in English.
