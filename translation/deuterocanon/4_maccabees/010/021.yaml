translation:
  text: But God will swiftly pursue you, for you are cutting out the tongue that sings
    the melodies of divine hymns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God will swiftly punish you' / 'God will swiftly come after you.' The
      Greek verb carries the sense of pursuing or going after, here in a context of
      divine judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: ταχέως
  chosen: swiftly
  alternatives:
  - quickly
  - soon
  lexicon: LSJ
  rationale: Adverb modifying the verb of divine action; 'swiftly' preserves the manner
    of rapid pursuit/judgment without forcing a temporal nuance alone.
- source_word: μετελεύσεται
  chosen: will pursue
  alternatives:
  - will come after
  - will prosecute
  - will punish
  lexicon: LSJ
  rationale: The middle of μετέρχομαι can mean 'go after, pursue.' In this threat
    context it implies punitive pursuit by God, but 'will pursue' keeps the image
    of God coming after the tyrant without over-interpreting to 'punish' in the main
    text.
- source_word: ὁ θεός
  chosen: God
  lexicon: LSJ
  rationale: Straightforward rendering of the subject.
- source_word: τὴν ... γλῶτταν
  chosen: the tongue
  alternatives:
  - the speech organ
  - the tongue of song
  lexicon: LSJ
  rationale: Literal object of ἐκτέμνεις; the physical mutilation is central to the
    martyrdom scene, so the concrete term should be retained.
- source_word: τῶν θείων ὕμνων
  chosen: of divine hymns
  alternatives:
  - of sacred hymns
  - of hymns to God
  lexicon: LSJ
  rationale: θείων is adjectival, 'divine' or 'sacred.' 'Divine hymns' is concise
    and preserves the elevated register of the Greek.
- source_word: μελῳδόν
  chosen: that sings the melodies
  alternatives:
  - melodious
  - song-making
  - chanting
  lexicon: LSJ
  rationale: As an attributive descriptor of γλῶτταν, the term denotes producing song/melody.
    Rendering it verbally in English avoids the awkwardness of 'the melodist tongue'
    while preserving the musical sense.
- source_word: ἐκτέμνεις
  chosen: you are cutting out
  alternatives:
  - you cut out
  - you are cutting off
  lexicon: LSJ
  rationale: Present tense suits the immediate scene of torture. 'Cutting out' fits
    the object 'tongue' idiomatically and vividly.
