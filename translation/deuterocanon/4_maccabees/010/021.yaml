theological_decisions:
- issue: Force of divine retribution in μετελεύσεται ὁ θεός
  chosen_reading: God will pursue the persecutor in judgment
  alternative_readings:
  - God will punish you swiftly
  - God will come after you swiftly
  rationale: The Greek expresses God as actively coming after the tyrant; the context
    clearly implies judgment, but the main text preserves the pursuit metaphor rather
    than collapsing it into an abstract statement of punishment.
  doctrine_reference: Preserve theological tension rather than resolve it.
