id: 4MA.10.26
reference: 4 Maccabees 10:26
source:
  edition: lxx-swete-1909
  text: ἀλλὰ ταῦτα ὑμῶν, οὐ βασάνων ἐστὶν ἄξια,
  language: Greek
  pages:
  - 752
  - 768
  - 769
  - 770
  - 771
  - 786
  - 787
  - 788
  validation: no_reference
translation:
  text: But these things from you are not worthy even of tortures,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'But these things of yours are not worthy of tortures.'
      The phrase ὑμῶν is idiomatic and may mean 'from you' or 'on your part.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Adversative conjunction marking a sharp contrast with the preceding thought;
    'But' is the most natural concise English equivalent.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - such things
  lexicon: BDAG
  rationale: Neuter plural demonstrative; 'these things' preserves the plural and
    leaves the referent broad, as in the Greek.
- source_word: ὑμῶν
  chosen: from you
  alternatives:
  - of you
  - belonging to you
  - on your part
  lexicon: BDAG
  rationale: The genitive here is somewhat compressed idiomatically. In context it
    most naturally means 'coming from you' or 'on your part.' 'From you' keeps the
    force concise while remaining transparent to the Greek.
- source_word: βασάνων
  chosen: tortures
  alternatives:
  - torments
  - tests by torture
  lexicon: BDAG
  rationale: βάσανος in this martyrdom context refers to instruments or acts of torture,
    not merely abstract distress. 'Tortures' is direct, idiomatic, and fits the plural
    genitive after ἄξια.
- source_word: ἄξια
  chosen: not worthy even of
  alternatives:
  - not worthy of
  - not deserving of
  lexicon: BDAG
  rationale: 'ἄξια with the genitive means ''worthy/deserving of.'' The English adds
    ''even'' to reflect the rhetorical force of the line in context: what the tyrant
    offers or threatens is beneath the level of true torture. This is a slight dynamic
    adjustment but remains anchored in the Greek sense.'
