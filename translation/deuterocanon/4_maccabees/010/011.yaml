id: 4MA.10.11
reference: 4 Maccabees 10:11
source:
  edition: lxx-swete-1909
  text: σὺ δὲ διὰ τὴν ἀσέβειαν καὶ μιαιφονίαν ἀκαταλύτους καρτερήσεις βασάνους.
  language: Greek
  pages:
