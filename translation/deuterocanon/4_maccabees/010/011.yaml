  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: But because of your ungodliness and blood-guilt, you will endure unending
    torments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bloodguilt' or 'polluting murder.' The Greek term carries both the idea
      of bloodshed and the defilement it brings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσέβειαν
  chosen: ungodliness
  alternatives:
  - impiety
  - godlessness
  lexicon: BDAG
  rationale: ἀσέβεια denotes irreverence or impiety toward God. 'Ungodliness' is natural
    modern English and preserves the religious/moral force better than the more formal
    'impiety.'
- source_word: μιαιφονίαν
  chosen: blood-pollution
  alternatives:
  - bloodguilt
  - polluting murder
  - bloodshed defilement
  lexicon: LSJ
  rationale: The compound combines the idea of bloodshed/murder with ritual or moral
    defilement. 'Blood-pollution' preserves the defiling force of μιαίνω better than
    the flatter 'murder,' while remaining concise. 'Bloodguilt' is possible but shifts
    the emphasis from defilement to liability.
- source_word: ἀκαταλύτους
  chosen: unending
  alternatives:
  - unceasing
  - incessant
  - unrelenting
  lexicon: LSJ
  rationale: The adjective literally conveys something not dissolved, not brought
    to an end, or not interrupted. With βασάνους, 'unending' communicates the sense
    clearly in idiomatic English. 'Unrelenting' would emphasize intensity more than
    duration.
- source_word: καρτερήσεις
  chosen: you will endure
  alternatives:
  - you will bear
  - you will suffer steadfastly
  lexicon: BDAG
  rationale: καρτερέω carries the sense of holding out or enduring firmly. 'You will
    endure' is idiomatic and preserves the future force without adding interpretive
    nuance.
- source_word: βασάνους
  chosen: torments
  alternatives:
  - tortures
  - punishments
  lexicon: BDAG
  rationale: βάσανος in this context refers to severe punitive suffering. 'Torments'
    fits the moral-judicial context and avoids narrowing the term to only physical
    torture, while still conveying severity.
