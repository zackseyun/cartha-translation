theological_decisions:
- issue: Moral-religious force of the accusation against the tyrant
  chosen_reading: Render ἀσέβειαν as 'ungodliness' and μιαιφονίαν with explicit defilement
    language ('blood-pollution')
  alternative_readings:
  - '''impiety and murder'''
  - '''godlessness and bloodguilt'''
  rationale: The verse condemns not merely criminal violence but violence that defiles
    before God. Preserving both the vertical offense ('ungodliness') and the defiling
    character of bloodshed best reflects the Greek's theological weight without overexpansion.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
