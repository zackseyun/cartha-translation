theological_decisions:
- issue: Force of θεοῦ with παιδείαν καὶ ἀρετήν
  chosen_reading: θεοῦ qualifies both nouns, expressed idiomatically as 'godly training
    and virtue.'
  alternative_readings:
  - '''training and virtue from God'''
  - '''the discipline and virtue of God'''
  rationale: The Greek genitive follows both coordinated nouns and likely characterizes
    the moral-religious quality of both. English requires smoothing; 'godly' preserves
    the theological relation without implying that God is the one being disciplined.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
