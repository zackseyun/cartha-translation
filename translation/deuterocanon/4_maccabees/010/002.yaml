id: 4MA.10.2
reference: 4 Maccabees 10:2
source:
  edition: lxx-swete-1909
  text: ὁ δὲ ἀναβοήσας ἔφη Ἢ ἀγνοεῖτε ὅτι αὐτός με τοῖς ἀποθανοῦσιν ἔσπειρεν πατήρ,
    καὶ ἡ αὐτὴ μήτηρ ἐγέννησεν, καὶ ἐπὶ τοῖς αὐτοῖς ἀνετράφην δόγμασιν;
  language: Greek
