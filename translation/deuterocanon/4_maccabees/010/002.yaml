theological_decisions:
- issue: Metaphorical force of the father's action in ἔσπειρεν
  chosen_reading: Retain the generative metaphor with 'planted me' rather than flattening
    to 'begot me.'
  alternative_readings:
  - sowed me
  - begot me
  rationale: The speaker emphasizes common origin and mortal condition. Preserving
    the metaphor reflects the Greek wording while remaining intelligible in English.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sense of τοῖς ἀποθανοῦσιν
  chosen_reading: Render as 'those who die' to express the class of mortals.
  alternative_readings:
  - the dying
  - the dead
  rationale: The present participle points to those subject to death, not necessarily
    already dead. This preserves the statement's anthropological force without importing
    a doctrinal claim beyond shared mortality.
  doctrine_reference: Translation philosophy §1, §3
