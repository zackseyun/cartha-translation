translation:
  text: But he cried out and said, “Do you not know that the same father sowed me
    among those who die, and the same mother gave birth to me, and I was brought up
    in the same principles?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sowed me among the dying.” The Greek keeps an agricultural metaphor
      for human generation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβοήσας
  chosen: cried out
  alternatives:
  - called out
  - shouted
  lexicon: LSJ
  rationale: The participle denotes a loud vocal outburst. 'Cried out' preserves the
    intensity without sounding overly colloquial.
- source_word: ἀγνοεῖτε
  chosen: do you not know
  alternatives:
  - are you ignorant
  - do you not understand
  lexicon: LSJ
  rationale: A rhetorical question is in view. 'Do you not know' is idiomatic modern
    English and preserves the force of the rebuke better than the harsher but less
    natural 'are you ignorant.'
- source_word: τοῖς ἀποθανοῦσιν
  chosen: among those who die
  alternatives:
  - with the dying
  - for those who are dying
  - to the dead
  lexicon: LSJ
  rationale: The present participle naturally refers to mortals, those subject to
    death. 'Among those who die' captures the sense that he shares the mortal condition
    with his brothers and all humans, rather than implying he was sown 'to the dead.'
- source_word: ἔσπειρεν
  chosen: planted
  alternatives:
  - sowed
  - begot
  lexicon: LSJ
  rationale: The verb is literally 'sowed,' used metaphorically of procreation. 'Planted'
    keeps the generative metaphor while reading more naturally in English than 'sowed
    me'; 'begot' would lose the agricultural imagery present in the Greek.
- source_word: πατήρ
  chosen: father
  lexicon: LSJ
  rationale: Straightforward familial term; no contextual reason to vary.
- source_word: μήτηρ
  chosen: mother
  lexicon: LSJ
  rationale: Straightforward familial term; paired with 'father' to stress common
    parentage.
- source_word: ἐγέννησεν
  chosen: gave birth to
  alternatives:
  - bore
  - brought forth
  lexicon: LSJ
  rationale: This is the natural English equivalent in contemporary style and preserves
    the maternal nuance of the verb.
- source_word: ἀνετράφην
  chosen: I was brought up
  alternatives:
  - I was raised
  - I was reared
  lexicon: LSJ
  rationale: The passive refers to upbringing or nurture. 'Brought up' is clear, natural,
    and slightly broader than merely physical raising.
- source_word: δόγμασιν
  chosen: teachings
  alternatives:
  - principles
  - decrees
  - traditions
  lexicon: LSJ
  rationale: In this context the word refers to the formative convictions or instruction
    shared by the brothers. 'Teachings' is broad enough to include moral-religious
    instruction without the overly legal sound of 'decrees.'
- source_word: ἐπὶ τοῖς αὐτοῖς
  chosen: in the same
  alternatives:
  - on the same
  - according to the same
  lexicon: LSJ
  rationale: The preposition with the dative here expresses basis or sphere. In idiomatic
    English, 'brought up in the same teachings' best conveys shared formation.
