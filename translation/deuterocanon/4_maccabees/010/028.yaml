id: 4MA.10.28
reference: 4 Maccabees 10:28
source:
  edition: lxx-swete-1909
  text: νῦν ἰδὲ ἀλλότριος ὢν θεοῦ, πολεμεῖς τοὺς εὐσεβοῦντας εἰς τὸν θεόν.
  language: Greek
  pages:
  - 752
  - 768
  - 769
  - 770
  - 771
  - 786
  - 787
  - 788
  validation: no_reference
translation:
  text: Now look, being alien to God, you are making war against those who are reverent
    toward God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'being alien to God' or 'being foreign to God.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'you fight against' or 'you wage war against.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'those acting reverently toward God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν
  chosen: Now
  alternatives:
  - as it is
  - at this point
  lexicon: LSJ
  rationale: Temporal/discourse marker introducing the speaker's pointed conclusion
    or immediate appeal.
- source_word: ἰδὲ
  chosen: look
  alternatives:
  - see
  - behold
  lexicon: LSJ
  rationale: Imperative of attention. 'Look' is natural modern English and preserves
    the confrontational force better than the more archaic 'behold.'
- source_word: ἀλλότριος ὢν θεοῦ
  chosen: being estranged from God
  alternatives:
  - being alien to God
  - being foreign to God
  - being separated from God
  lexicon: LSJ
  rationale: ἀλλότριος with genitive conveys belonging to another / being alien or
    foreign to someone. In context it is relational and theological, not ethnic, so
    'estranged from God' communicates alienation clearly in idiomatic English while
    preserving the participial force with 'being.'
- source_word: πολεμεῖς
  chosen: you are making war against
  alternatives:
  - you fight against
  - you wage war against
  lexicon: LSJ
  rationale: The verb denotes active hostility or warfare. 'Making war against' keeps
    the vividness and ongoing force without sounding overly formal; 'fight against'
    is possible but somewhat weaker.
- source_word: τοὺς εὐσεβοῦντας
  chosen: those who worship God reverently
  alternatives:
  - the godly
  - those who are devout
  - those who show piety
  lexicon: LSJ
  rationale: The participle εὐσεβοῦντας means acting with reverence/piety, here directed
    by εἰς τὸν θεόν. Rendering the whole phrase verbally avoids the potentially flattened
    label 'the godly' and makes explicit the object of devotion present in the Greek
    construction.
- source_word: εἰς τὸν θεόν
  chosen: God
  alternatives:
  - toward God
  - with respect to God
  lexicon: LSJ
  rationale: This phrase specifies the direction/object of εὐσεβοῦντας. In English
    it is best incorporated as the object of worship/reverence rather than translated
    woodenly as 'toward God.'
