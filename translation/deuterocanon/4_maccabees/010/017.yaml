translation:
  text: When bloodthirsty and murderous and most savage Antiochus heard these things,
    he ordered his tongue to be cut out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''most savage''; the rare superlative adjective intensifies Antiochus''s
      brutality and could also be rendered ''most cruel'' or ''most fierce.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these words
  lexicon: LSJ
  rationale: The neuter plural demonstrative naturally refers back to the preceding
    statements. 'These things' preserves the broad reference without narrowing it
    only to spoken words.
- source_word: ἀκούσας
  chosen: heard
  alternatives:
  - having heard
  - on hearing
  lexicon: LSJ
  rationale: Aorist participle indicating antecedent action. In idiomatic English
    narrative, 'heard' within the temporal clause conveys the sense clearly without
    over-formalizing.
- source_word: αἱμοβόρος
  chosen: bloodthirsty
  alternatives:
  - blood-devouring
  - blood-guilty
  lexicon: LSJ
  rationale: The compound vividly depicts one who delights in bloodshed. 'Bloodthirsty'
    is the most natural English equivalent and preserves the moral force.
- source_word: φονώδης
  chosen: murderous
  alternatives:
  - bloody
  - homicidal
  - murder-loving
  lexicon: LSJ
  rationale: This adjective denotes a murderous character or disposition. 'Murderous'
    is direct, readable, and suitably severe.
- source_word: πανμμερώτατος
  chosen: most savage
  alternatives:
  - most cruel
  - most fierce
  - utterly savage
  lexicon: LSJ
  rationale: A superlative intensifier describing extreme brutality. 'Most savage'
    preserves the superlative force and fits the string of condemnatory epithets.
    The spelling in Swete appears as πανμμερώτατος, but the sense is clear.
- source_word: ἐκέλευσεν
  chosen: he ordered
  alternatives:
  - he commanded
  - he gave orders
  lexicon: LSJ
  rationale: Standard verb for issuing a command. 'Ordered' is concise modern English
    and fits the narrative register.
- source_word: τὴν γλῶτταν αὐτοῦ
  chosen: his tongue
  alternatives:
  - the tongue of him
  lexicon: LSJ
  rationale: The accusative direct object with possessive pronoun is best rendered
    idiomatically as 'his tongue.'
- source_word: ἐκτεμεῖν
  chosen: to be cut out
  alternatives:
  - to cut out
  - to cut off
  lexicon: LSJ
  rationale: The infinitive means 'to cut out' or 'excise.' Because Antiochus orders
    others to perform the act, English passive infinitive ('to be cut out') best reflects
    the implied execution of the command.
