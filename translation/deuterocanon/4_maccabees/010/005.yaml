translation:
  text: But bitterly resenting the man's boldness, they dislocated his hands and feet
    with joint-wrenching instruments, and prying them out of their sockets, they dismembered
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'having bitterly borne the man's boldness'—that is,
      they reacted with bitter resentment to his fearless speech.
    reason: lexical_alternative
  - marker: b
    text: The Greek uses rare language for instruments used on the joints and for
      tearing limbs apart, emphasizing the brutality of the torture.
    reason: cultural_note
lexical_decisions:
- source_word: πικρῶς
  chosen: bitterly
  alternatives:
  - harshly
  - with bitterness
  lexicon: LSJ
  rationale: The adverb conveys intense hostile feeling rather than mere severity
    of action. 'Bitterly' preserves the emotional force and fits the participial clause.
- source_word: ἐνέγκαντες
  chosen: resented
  alternatives:
  - endured
  - bore
  - took
  lexicon: LSJ
  rationale: Although the verb literally means 'having borne/endured,' in context
    with τὴν παρρησίαν τοῦ ἀνδρός and πικρῶς it idiomatically indicates that they
    could not tolerate his bold speech and reacted with hostility. 'Resented' brings
    out the sense in natural English without over-paraphrasing.
- source_word: παρρησίαν
  chosen: boldness
  alternatives:
  - frankness
  - outspokenness
  lexicon: BDAG
  rationale: The term denotes fearless openness of speech. 'Boldness' is concise and
    preserves both courage and public candor.
- source_word: τοῦ ἀνδρός
  chosen: the man's
  alternatives:
  - of the man
  - of the husband
  lexicon: LSJ
  rationale: Here ἀνήρ refers to the male martyr, not specifically a husband. 'The
    man's' is idiomatic and gender-accurate.
- source_word: ἀρθρεμβόλοις ὀργάνοις
  chosen: with joint-wrenching instruments
  alternatives:
  - with rack-like tools for the joints
  - with limb-dislocating instruments
  lexicon: LSJ
  rationale: This rare compound points to instruments used against the joints. 'Joint-wrenching
    instruments' is vivid, readable, and closely tied to the following verb of dislocation.
- source_word: ἐξήρθρουν
  chosen: they dislocated
  alternatives:
  - they disjointed
  - they tore out of joint
  lexicon: LSJ
  rationale: The verb means to put out of joint/dislocate. 'Dislocated' is the clearest
    modern medical equivalent and matches the torture context.
- source_word: ἐξ ἁρμῶν
  chosen: out of their sockets
  alternatives:
  - from the joints
  - out of joint
  lexicon: LSJ
  rationale: ἁρμός refers to a joint or fastening point. Since hands and feet are
    in view, 'out of their sockets' communicates the bodily image more concretely
    in English while remaining faithful to the sense of joint separation.
- source_word: ἀναμοχλεύοντες
  chosen: prying them out
  alternatives:
  - wrenching them loose
  - levering them out
  lexicon: LSJ
  rationale: The participle suggests forceful stirring up or levering loose. 'Prying
    them out' captures the mechanical violence implied by the torture instruments.
- source_word: ἐξέμελιζον
  chosen: they tore them from the limbs
  alternatives:
  - they dismembered
  - they tore them apart
  lexicon: LSJ
  rationale: The verb denotes tearing limb from limb or dismembering. Because the
    immediate objects are his hands and feet, 'they tore them from the limbs' preserves
    the gruesome specificity better than the broader 'dismembered'.
