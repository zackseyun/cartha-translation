theological_decisions:
- issue: Violence imagery and degree of literalness
  chosen_reading: Render the torture in explicit bodily terms ('dislocated,' 'out
    of their sockets,' 'tore them from the limbs')
  alternative_readings:
  - Use more general language such as 'mutilated' or 'dismembered him'
  rationale: The Greek is graphically specific about joints, hands, feet, and forcible
    separation. Optimal equivalence here favors preserving the horror of the martyrdom
    rather than softening it.
  doctrine_reference: Translation philosophy §§1, 6
