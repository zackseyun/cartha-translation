id: 4MA.10.5
reference: 4 Maccabees 10:5
source:
  edition: lxx-swete-1909
  text: οἱ δὲ πικρῶς ἐνέγκαντες τὴν παρρησίαν τοῦ ἀνδρός, ἀρθρεμβόλοις ὀργάνοις τὰς
    χεῖρας αὐτοῦ καὶ τοὺς πόδας ἐξήρθρουν, καὶ ἐξ ἁρμῶν ἀναμοχλεύοντες ἐξέμελιζον.
  language: Greek
