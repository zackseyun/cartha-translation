id: 4MA.10.7
reference: 4 Maccabees 10:7
source:
  edition: lxx-swete-1909
  text: καὶ κατὰ μηδένὰ τρόπον ἰσχύοντες αὐτὸν ἄγξαι, περισύραντες τὸ δέρμα σὺν ἄκραις
    ταῖς τῶν δακτύλων κορυφαῖς ἀπεσκύθισον, καὶ εὐθέως ἦγον ἐπὶ τὸν τροχόν.
  language: Greek
  pages:
  - 752
  - 768
  - 769
  - 770
  - 771
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: And since they were in no way able to strangle him, they tore off the skin
    from the very tips of his fingers and scalped him, and immediately they led him
    to the wheel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with the fingertips'; the Greek phrase is unusually graphic, likely
      indicating that the skin was pulled away as far as the ends of the fingers.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ μηδένὰ τρόπον
  chosen: in no way
  alternatives:
  - by no means
  - in no manner
  lexicon: LSJ
  rationale: Idiomatic negated expression indicating complete inability; 'in no way'
    is natural modern English while preserving the force.
- source_word: ἰσχύοντες
  chosen: were able
  alternatives:
  - were strong enough
  - prevailed
  lexicon: LSJ
  rationale: Here the participle expresses capability rather than mere strength; 'were
    able' best fits the infinitive that follows.
- source_word: ἄγξαι
  chosen: to strangle
  alternatives:
  - to throttle
  - to choke
  lexicon: LSJ
  rationale: The verb denotes constricting the throat; 'strangle' is the clearest
    standard English rendering in this torture context.
- source_word: περισύραντες
  chosen: dragged off
  alternatives:
  - pulled away
  - tore away
  lexicon: LSJ
  rationale: The participle conveys forceful pulling/stripping around or away. 'Dragged
    off' preserves the violent physical action without overparaphrasing.
- source_word: τὸ δέρμα
  chosen: the skin
  alternatives:
  - the hide
  lexicon: LSJ
  rationale: Literal bodily sense; 'skin' is the plain and appropriate English term.
- source_word: σὺν ἄκραις ταῖς τῶν δακτύλων κορυφαῖς
  chosen: with the very tips of his fingers
  alternatives:
  - together with the extremities of his fingers
  - with the fingertips
  lexicon: LSJ
  rationale: The phrase is graphic and specific, referring to the extremities/tips
    of the fingers. 'The very tips of his fingers' preserves the vividness and likely
    sense that the skin was pulled off down to the fingertips.
- source_word: ἀπεσκύθισον
  chosen: flayed him
  alternatives:
  - scalped him
  - stripped him raw
  lexicon: LSJ
  rationale: The verb refers to skinning or flaying. 'Flayed him' is the most precise
    English equivalent for this torture scene.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: LSJ
  rationale: Marks rapid succession; 'immediately' is clear modern English.
- source_word: ἦγον ἐπὶ τὸν τροχόν
  chosen: they led him to the wheel
  alternatives:
  - they brought him to the wheel
  - they took him to the wheel
  lexicon: LSJ
  rationale: Standard motion expression toward an instrument of torture. 'Led him
    to the wheel' is direct and readable.
