reference: 4 Maccabees 10:14
source:
  edition: lxx-swete-1909
  text: ὁ δὲ αὐτοῖς ἔφη Οὐχ οὕτω καυστικώτερον ἔχετε κατʼ ἐμοῦ τὸ πῦρ, ὥστε με δειλανδρῆσαι.
