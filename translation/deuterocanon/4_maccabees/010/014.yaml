translation:
  text: But he said to them, “The fire you have against me is not so scorching as
    to make me a coward.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “as to make me act like a coward,” or more literally, “as to make me
      unmanly.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καυστικώτερον
  chosen: so scorching
  alternatives:
  - more burning
  - more searing
  - more intense
  lexicon: LSJ
  rationale: Comparative adjective from καυστικός conveys burning or searing intensity.
    In idiomatic English with οὐχ οὕτω ... ὥστε, 'not so scorching as to...' captures
    the degree construction naturally while preserving the imagery of heat.
- source_word: ἔχετε ... κατʼ ἐμοῦ τὸ πῦρ
  chosen: the fire you have against me
  alternatives:
  - you have the fire against me
  - your fire against me
  - the fire directed against me
  lexicon: LSJ
  rationale: The Greek keeps 'fire' as the subject/object of their hostile action,
    likely referring literally to the torture by fire while also carrying adversarial
    force through κατʼ ἐμοῦ. The chosen rendering preserves the concrete image and
    the hostile orientation without overexplaining.
- source_word: δειλανδρῆσαι
  chosen: make me cowardly
  alternatives:
  - make me a coward
  - break my courage
  - make me act like a coward
  lexicon: LSJ
  rationale: The verb means to make cowardly or unmanly in courage. Because the context
    is steadfastness under torture, 'make me cowardly' preserves the causative sense
    without importing a specifically gendered English expression not required by the
    immediate context.
- source_word: ὁ δὲ αὐτοῖς ἔφη
  chosen: But he said to them
  alternatives:
  - And he said to them
  - Then he said to them
  lexicon: LSJ
  rationale: δέ here marks continuation with mild contrast. 'But' reflects the adversative
    turn in his reply to the torturers.
- source_word: οὐχ οὕτω ... ὥστε
  chosen: is not so ... as to
  alternatives:
  - is not such that it would
  - is not so much that it could
  lexicon: LSJ
  rationale: This standard degree/result construction is best represented in English
    by 'not so ... as to,' which preserves both the comparative force and the intended
    result clause.
