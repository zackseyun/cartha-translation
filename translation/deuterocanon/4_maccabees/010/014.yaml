theological_decisions:
- issue: Rendering of δειλανδρῆσαι, whose etymology can suggest 'to make unmanly'
    as well as 'to make cowardly'
  chosen_reading: make me cowardly
  alternative_readings:
  - make me unmanly
  - make me act like a coward
  rationale: The verse concerns moral courage under martyrdom rather than a theological
    claim about masculinity. 'Cowardly' communicates the ethical point clearly in
    modern English while avoiding an unnecessarily literal gendered expression that
    could mislead readers about the focus of the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, readable modern English;
    gender-accurate over gender-neutral
