lexical_decisions:
- source_word: διὰ
  chosen: through
  alternatives:
  - by means of
  - amid
  lexicon: BDAG
  rationale: 'With the genitive πασῶν τῶν βασάνων, διὰ most naturally expresses means
    or passage: ''through every torture'' or ''by means of all the tortures.'' ''Through''
    preserves the vivid sense of enduring the whole range of sufferings.'
- source_word: πασῶν ... τῶν βασάνων
  chosen: every torture
  alternatives:
  - all the tortures
  - every torment
  lexicon: BDAG
  rationale: βάσανος here refers to instruments or experiences of torture. Rendering
    the phrase idiomatically as 'every torture' communicates comprehensiveness while
    remaining close to the Greek. The article with the plural could also be rendered
    'all the tortures.'
- source_word: πείσω
  chosen: I will convince
  alternatives:
  - I will persuade
  - I will prove to
  lexicon: BDAG
  rationale: πείθω in the future active commonly means 'persuade' or 'convince.' 'Convince'
    fits the context of demonstrated endurance under torture better than a softer
    'persuade.'
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object of πείσω, addressed to the tyrant and/or onlookers. Simple
    second-person plural is sufficient in English.
- source_word: μόνοι
  chosen: only
  alternatives:
  - alone
  lexicon: BDAG
  rationale: μόνοι marks exclusivity. In English, 'only' before the subject phrase
    is the most natural way to convey that exclusivity.
- source_word: οἱ παῖδες Ἑβραίων
  chosen: the sons of the Hebrews
  alternatives:
  - the Hebrew youths
  - the children of the Hebrews
  lexicon: BDAG
  rationale: παῖδες can mean children, boys, youths, or servants depending on context.
    Here it refers to the martyred brothers as male offspring of the Jewish people.
    'Sons of the Hebrews' preserves both the masculine reference and the familial/ethnic
    force. 'Hebrew youths' is possible but slightly smooths over the genitival construction.
