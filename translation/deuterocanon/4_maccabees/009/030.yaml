translation:
  text: Do you not think, O most savage tyrant of all, that you are now being tortured
    more than I am, as you see the proud reasoning of your tyranny being conquered
    by our endurance for the sake of godliness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the arrogant mindset of your tyranny.' The Greek λογισμός can denote
      reasoning, thought, or governing mindset; the rendering 'reasoning' preserves
      the book's emphasis on rationality.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of our piety.' The phrase may be understood as endurance motivated
      by devotion to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ δοκεῖς
  chosen: Do you not think
  alternatives:
  - Do you not suppose
  - Does it not seem to you
  lexicon: LSJ
  rationale: A direct rhetorical question fits the Greek idiom and preserves the confrontational
    tone. 'Think' is natural modern English without losing the force of δοκεῖς.
- source_word: ὦ πάντων ὠμότατε τύραννε
  chosen: O most savage tyrant of all
  alternatives:
  - O cruelest tyrant of all
  - O most brutal tyrant of all
  lexicon: LSJ
  rationale: ὠμότατε is a superlative of brutality/cruelty. 'Savage' conveys ferocity
    and moral harshness well in readable English; 'of all' preserves πάντων.
- source_word: πλεῖον ἐμοῦ σε νῦν βασανίζεσθαι
  chosen: that you are now being tortured more than I am
  alternatives:
  - that you are now suffering torment more than I
  - that you are now being tormented more than I am
  lexicon: LSJ
  rationale: βασανίζεσθαι is the same torment language used of physical torture; rendering
    it 'being tortured' preserves the ironic reversal that the tyrant is more tormented
    inwardly than the martyr outwardly.
- source_word: ὁρῶν
  chosen: as you see
  alternatives:
  - seeing
  - while seeing
  lexicon: LSJ
  rationale: This participle is causal/circumstantial. 'As you see' gives smooth English
    while preserving the connection to the tyrant's perception.
- source_word: σου νικώμενον
  chosen: being conquered
  alternatives:
  - being defeated
  - being overcome
  lexicon: LSJ
  rationale: The passive participle indicates the tyrant's own principle is being
    overcome. 'Being conquered' keeps the conflict imagery vivid.
- source_word: τὸν τῆς τυραννίδος ὑπερήφανον λογισμὸν
  chosen: the proud reasoning of your tyranny
  alternatives:
  - the arrogant mindset of your tyranny
  - the haughty resolve of your tyranny
  lexicon: LSJ
  rationale: λογισμός in 4 Maccabees often denotes reasoned thought or governing rational
    principle. Here it is the tyrant's proud rational scheme or mindset. 'Reasoning'
    preserves the book's recurring concern with reason, while 'of your tyranny' makes
    the genitive concrete in context.
- source_word: ὑπὸ τῆς ... ὑπομονῆς
  chosen: by our endurance
  alternatives:
  - by our steadfastness
  - by our perseverance
  lexicon: LSJ
  rationale: ὑπομονή is patient endurance under suffering. 'Endurance' is concise
    and natural, and suits the martyrdom context.
- source_word: διὰ τὴν εὐσέβειαν ἡμῶν
  chosen: for the sake of godliness
  alternatives:
  - because of our piety
  - for the sake of our piety
  lexicon: LSJ
  rationale: εὐσέβεια in this book denotes reverence/piety toward God expressed in
    covenantal faithfulness. 'Godliness' is accessible English and avoids sounding
    merely formalistic; 'our' is attached to endurance rather than godliness in the
    English to avoid awkwardness while preserving the sense that their endurance is
    motivated by their piety.
