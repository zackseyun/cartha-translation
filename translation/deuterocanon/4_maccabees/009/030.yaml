theological_decisions:
- issue: Rendering εὐσέβεια in a martyrdom context
  chosen_reading: godliness
  alternative_readings:
  - piety
  - reverence
  rationale: The term refers to devout fidelity to God that motivates endurance. 'Godliness'
    is readable modern English and preserves theological weight without reducing the
    term to mere ritual piety.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
- issue: Rendering λογισμός in 4 Maccabees, where reason is a major theme
  chosen_reading: reasoning
  alternative_readings:
  - mindset
  - reason
  - resolve
  rationale: Because 4 Maccabees repeatedly foregrounds rational mastery and moral
    reasoning, 'reasoning' preserves the conceptual texture better than a flatter
    psychological term. Here the tyrant's 'reasoning' is ironically defeated by the
    martyrs' endurance.
  doctrine_reference: Translation philosophy §5
