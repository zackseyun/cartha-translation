id: 4MA.9.17
reference: 4 Maccabees 9:17
source:
  edition: lxx-swete-1909
  text: τῶν βασάνων, ὁ δὲ εἶπεν Οὐχ οὕτως ἰσχυρὸς ὑμῶν ἐστιν ὁ τρόπος, ὦ μεροὶ δαῖμον,
    ὥστε μου τὸν λογισμὸν ἆξαι... τέμνετέ μου μέλη, καὶ πυροῦτε τὰς σάρκας, καὶ στρεβλοῦτε
    τὰ ἄρθρα·
  language: Greek
  pages:
  - 752
  - 766
  - 767
  - 768
  - 769
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: But he said, “Your method is not so strong, you limbs of a demon, as to lead
    away my reason. Cut off my limbs, and burn my flesh, and wrench my joints.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Your method is not so strong … as to drag my reason away.”
    reason: lexical_alternative
  - marker: b
    text: The phrase “you limbs of a demon” is a difficult vocative in Greek, likely
      a contemptuous address to the torturers or their body parts as instruments of
      demonic cruelty.
    reason: cultural_note
lexical_decisions:
- source_word: τρόπος
  chosen: device
  alternatives:
  - way
  - method
  - scheme
  lexicon: LSJ
  rationale: In this torture context, τρόπος refers to the persecutors' manner or
    contrivance for breaking him. 'Device' preserves the sense of a means or scheme
    without sounding overly technical; 'way' is too bland, and 'method' too clinical.
- source_word: μεροὶ
  chosen: limbs
  alternatives:
  - parts
  - thighs
  - members
  lexicon: LSJ
  rationale: The vocative phrase ὦ μεροὶ δαῖμον is difficult and somewhat compressed.
    'Limbs' best fits the bodily imagery and the immediate commands about cutting
    off body parts. 'Thighs' is too narrow here; 'members' is possible but less natural
    in modern English.
- source_word: δαῖμον
  chosen: of a demon
  alternatives:
  - demonic
  - of a devil
  lexicon: LSJ
  rationale: The genitive likely characterizes the torturers' bodily members as belonging
    to or animated by a demon. 'Of a demon' keeps the vivid, somewhat shocking metaphor
    close to the Greek. 'Devil' would over-specify.
- source_word: λογισμός
  chosen: reason
  alternatives:
  - rational judgment
  - mind
  - resolve
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for rational mastery. 'Reason'
    is the most concise and thematically appropriate rendering, preserving the book's
    philosophical emphasis better than the more generic 'mind' or the narrower 'resolve'.
- source_word: ἆξαι
  chosen: lead ... away
  alternatives:
  - drag away
  - carry off
  lexicon: LSJ
  rationale: The infinitive expresses causing his reason to be led off course or drawn
    away. 'Lead ... away' is idiomatic and preserves the metaphor without over-intensifying
    it.
- source_word: τέμνετέ
  chosen: Cut off
  alternatives:
  - cut
  - hack off
  lexicon: LSJ
  rationale: The imperative is forceful in context. 'Cut off' fits the object 'my
    limbs' and conveys mutilation more clearly than the bare 'cut'.
- source_word: σάρκας
  chosen: flesh
  alternatives:
  - body
  - skin
  lexicon: LSJ
  rationale: Here the term is literal, referring to bodily tissue under torture. Per
    project guidance, literal σάρξ should be rendered 'flesh'.
- source_word: στρεβλοῦτε
  chosen: wrench
  alternatives:
  - rack
  - twist
  - torture
  lexicon: LSJ
  rationale: The verb denotes twisting or torturing, and with 'joints' the concrete
    sense 'wrench' best matches the bodily image. 'Rack' may suggest a specific instrument
    not explicit in the Greek.
- source_word: ἄρθρα
  chosen: joints
  alternatives:
  - limbs
  - members
  lexicon: LSJ
  rationale: ἄρθρα refers specifically to joints or articulations, so 'joints' is
    the most precise rendering and avoids collapsing it into the earlier μεροὶ.
