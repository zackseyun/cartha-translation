theological_decisions:
- issue: Rendering ἀρετή in a philosophically charged martyrdom context
  chosen_reading: virtue
  alternative_readings:
  - moral excellence
  - excellence
  rationale: 4 Maccabees uses Hellenistic moral-philosophical language to describe
    steadfast obedience and rational self-mastery. 'Virtue' best preserves that conceptual
    world without importing later doctrinal terminology.
  doctrine_reference: Translation philosophy §1, §5
- issue: How explicitly to identify the wheel as an instrument of torture
  chosen_reading: the wheel
  alternative_readings:
  - the torture wheel
  rationale: The Greek says simply 'the wheel.' To preserve source transparency, the
    main text keeps the literal term, while the lexical rationale notes the contextual
    sense.
  doctrine_reference: Translation philosophy §1, §6
