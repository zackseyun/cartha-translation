translation:
  text: They are unconquerable on behalf of virtue. While he was still saying these
    things, they spread fire beneath him, and, by intensifying the wheel, they tightened
    it further.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for virtue.' The Greek phrase ὑπὲρ ἀρετῆς can denote acting or suffering
      for the sake of virtue.
    reason: lexical_alternative
  - marker: b
    text: That is, the wheel used for torture.
    reason: cultural_note
  - marker: c
    text: The final verb is difficult; it conveys increasing the strain or tightening
      the victim further on the wheel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ ἀρετῆς
  chosen: on behalf of virtue
  alternatives:
  - for virtue
  - because of virtue
  lexicon: LSJ
  rationale: ὑπέρ with the genitive commonly expresses 'for, on behalf of.' In this
    martyrdom context, the phrase indicates the cause for which they endure. 'Virtue'
    is the standard rendering of ἀρετή in 4 Maccabees, where it carries moral excellence
    and reasoned piety; retaining 'virtue' preserves the book's philosophical vocabulary.
- source_word: ἀνίκητοι
  chosen: unconquerable
  alternatives:
  - invincible
  - not defeated
  lexicon: LSJ
  rationale: The adjective denotes inability to be conquered. 'Unconquerable' is slightly
    more transparent and less heroic-sounding than 'invincible,' while preserving
    the force of the Greek.
- source_word: ταῦτα λέγων ἔτι
  chosen: while he was still saying these things
  alternatives:
  - as he was still saying this
  - while still speaking these words
  lexicon: LSJ
  rationale: The participial construction with ἔτι conveys ongoing speech interrupted
    by the next action. 'These things' reflects the plural ταῦτα.
- source_word: πῦρ ἐπέστρωσαν
  chosen: they spread fire beneath him
  alternatives:
  - they piled fire around him
  - they heaped on fire
  lexicon: LSJ
  rationale: ἐπιστρώννυμι literally means to spread or strew over/under. In the torture
    setting, the sense is that fire was laid under or around the victim to intensify
    suffering. 'Spread fire beneath him' makes the action intelligible in English
    without over-paraphrasing; the object 'him' is supplied from context.
- source_word: διερεθίζοντες
  chosen: by intensifying
  alternatives:
  - stirring up
  - provoking
  - agitating
  lexicon: LSJ
  rationale: The participle denotes rousing up or increasing the force of something.
    Here it modifies the action done to the wheel of torture, so 'intensifying' best
    captures the practical sense.
- source_word: τὸν τροχόν
  chosen: the wheel
  alternatives:
  - the torture wheel
  lexicon: LSJ
  rationale: τροχός is literally 'wheel.' Because the context is judicial torture,
    the referent is a torture wheel, but the main text keeps the literal term and
    lets context supply the sense.
- source_word: προσεπικατέτεινον
  chosen: they tightened it further
  alternatives:
  - they stretched him further on it
  - they increased the strain further
  lexicon: LSJ
  rationale: The compound verb is intensive and contextually difficult, but in connection
    with the wheel it indicates further tightening or increasing the strain. 'They
    tightened it further' preserves the escalation without claiming more specificity
    than the wording securely gives.
