  text: ὑπὲρ ἀρετῆς εἰσὶν ἀνίκητοι. ταῦτα λέγων ἔτι πῦρ ἐπέστρωσαν, καὶ διερεθίζοντες
    τὸν τροχὸν προσεπικατέτεινον.
