theological_decisions:
- issue: Rendering of πατρίους ἡμῶν with gendered ancestral language
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Greek explicitly uses masculine ancestral language. Per doctrine,
    gender-accurate rendering is preferred over neutralizing language unless context
    demands otherwise. Here the phrase points to inherited Jewish tradition through
    the fathers, so 'our fathers' is retained.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
