translation:
  text: Why do you hesitate, O tyrant? For we are ready to die rather than transgress
    the commandments of our fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What are you waiting for, O tyrant?' The Greek idiom can express delay
      or hesitation.
    reason: lexical_alternative
  - marker: b
    text: Or, 'our ancestral commandments.' The phrase refers to the inherited commands
      of the Jewish tradition.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί μέλλεις
  chosen: Why do you hesitate
  alternatives:
  - What are you waiting for
  - Why are you delaying
  lexicon: LSJ
  rationale: The idiom with μέλλω here conveys delay or hesitation in acting, framed
    as a rhetorical challenge. 'Why do you hesitate' captures the force naturally
    in English without over-paraphrasing.
- source_word: ὦ τύραννε
  chosen: O tyrant
  alternatives:
  - tyrant
  - O ruler
  lexicon: LSJ
  rationale: τύραννος here is plainly pejorative, referring to the oppressive king.
    'O tyrant' preserves both the direct address and the moral judgment present in
    the Greek.
- source_word: ἑτοῖμοι
  chosen: ready
  alternatives:
  - prepared
  lexicon: LSJ
  rationale: ἑτοῖμοι denotes readiness or preparedness. 'Ready' is the most natural
    modern English equivalent and fits the martyrdom context.
- source_word: ἀποθνήσκειν
  chosen: to die
  alternatives:
  - to be put to death
  lexicon: LSJ
  rationale: The infinitive means 'to die.' Although the context involves execution,
    the Greek does not explicitly specify passive causation here, so the simpler 'to
    die' is preferred.
- source_word: ἢ
  chosen: rather than
  alternatives:
  - than
  lexicon: LSJ
  rationale: In this construction ἢ marks the alternative rejected in favor of death.
    'Rather than' makes the contrast explicit and idiomatic in English.
- source_word: παραβαίνειν
  chosen: transgress
  alternatives:
  - break
  - violate
  lexicon: LSJ
  rationale: παραβαίνειν means to transgress or violate a command. 'Transgress' preserves
    the formal ethical-religious register appropriate to commandments.
- source_word: τὰς πατρίους ἡμῶν ἐντολάς
  chosen: the commandments of our fathers
  alternatives:
  - our ancestral commandments
  - the commandments handed down by our fathers
  lexicon: LSJ
  rationale: πατρίους means ancestral or inherited from the fathers. 'The commandments
    of our fathers' is a clear, source-near rendering that preserves the familial-ancestral
    emphasis without unnecessary expansion.
