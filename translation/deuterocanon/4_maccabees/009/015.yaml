theological_decisions:
- issue: Sense of δίκη in the phrase 'enemy of heavenly justice'
  chosen_reading: A broad moral-judicial sense ('justice') rather than a narrower
    eschatological 'judgment'
  alternative_readings:
  - enemy of heavenly judgment
  - enemy of divine vengeance
  rationale: The speaker denounces the tyrant as opposed to the righteous order and
    retribution of heaven. 'Justice' preserves that wider sense and avoids over-specifying
    timing or mechanism.
