id: 4MA.9.15
reference: 4 Maccabees 9:15
source:
  edition: lxx-swete-1909
  text: Τύραννε μιερώτατε καὶ τῆς οὐρανίου δίκης ἐχθρὲ καὶ ὠμόφρον, οὐκ ἀνδροφονήσαντά
    με τοῦτον καταικίζεις τὸν τρόπον, οὐδὲ ἀσεβήσαντα, ἀλλὰ θείου νόμου προασπίζοντα.
  language: Greek
  pages:
  - 752
  - 766
  - 767
  - 768
  - 769
  - 786
  - 787
  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: Most defiled tyrant, enemy of heavenly justice, and savage-minded man, you
    are not torturing me in this way because I have committed murder, nor because
    I have acted impiously, but because I am defending the divine law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'enemy of heavenly judgment.' The Greek term can refer either to justice
      in a broad sense or to judicial punishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: μιερώτατε
  chosen: most defiled
  alternatives:
  - most polluted
  - most abominable
  - most impious
  lexicon: LSJ
  rationale: Superlative vocative of a term denoting pollution/defilement. 'Most defiled'
    preserves the moral-religious force and the direct insult better than a flatter
    term like 'wicked.'
- source_word: τῆς οὐρανίου δίκης
  chosen: of heavenly justice
  alternatives:
  - of heavenly judgment
  - of divine justice
  lexicon: LSJ
  rationale: δίκη can denote justice, penalty, or judgment. Here, with ἐχθρέ, the
    sense is opposition to the just order or retribution that comes from heaven. 'Heavenly
    justice' keeps the broader moral-judicial sense without narrowing it only to a
    future verdict.
- source_word: ὠμόφρον
  chosen: savage-minded
  alternatives:
  - cruel-minded
  - brutal in mind
  - fierce-minded
  lexicon: LSJ
  rationale: Compound expressing harshness/cruelty of disposition. 'Savage-minded'
    is vivid, natural English and preserves the focus on inner character rather than
    merely outward action.
- source_word: καταικίζεις
  chosen: are torturing
  alternatives:
  - are maltreating
  - are abusing
  - are tormenting
  lexicon: LSJ
  rationale: In context of martyrdom and physical abuse, the verb refers to violent
    mistreatment. 'Are torturing' best matches the concrete situation and rhetorical
    force.
- source_word: ἀνδροφονήσαντά
  chosen: have murdered anyone
  alternatives:
  - have killed a man
  - have committed murder
  lexicon: LSJ
  rationale: The participle denotes homicide/murder. 'Have murdered anyone' communicates
    the criminal accusation naturally in English while preserving the denial of bloodguilt.
- source_word: ἀσεβήσαντα
  chosen: have acted impiously
  alternatives:
  - have been ungodly
  - have acted irreverently
  - have committed impiety
  lexicon: LSJ
  rationale: ἀσεβέω denotes impious or ungodly conduct, especially against God or
    sacred obligations. 'Acted impiously' preserves the religious dimension more precisely
    than 'done wrong.'
- source_word: θείου νόμου
  chosen: the divine law
  alternatives:
  - God's law
  - the law of God
  lexicon: LSJ
  rationale: θείου means divine/godlike. 'The divine law' is a close rendering of
    the Greek phrasing and suits the elevated rhetoric of 4 Maccabees.
- source_word: προασπίζοντα
  chosen: am defending
  alternatives:
  - am championing
  - am protecting
  - am standing up for
  lexicon: LSJ
  rationale: The verb means to defend or fight in front of as a protector. 'Am defending'
    is clear, direct, and fits the forensic contrast with the preceding accusations.
