theological_decisions:
- issue: Force of the rhetorical comparison introduced by ὥσπερ οὐχί
  chosen_reading: as though you had not learned from Eleazar a little while ago
  alternative_readings:
  - even though you did learn from Eleazar a little while ago
  rationale: The Greek frames the tyrant's action as if he were acting contrary to
    what Eleazar's example should already have taught him. 'As though you had not
    learned' preserves the sarcasm and rhetorical sting better than a concessive paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English without paraphrase.
