id: 4MA.9.5
reference: 4 Maccabees 9:5
source:
  edition: lxx-swete-1909
  text: ἐκφοβεῖς δὲ ἡμᾶς, τὸν διὰ τῶν βασάνων ἡμῖν θάνατον ἀπειλῶν, ὥσπερ οὐχὶ πρὸ
    βραχέως παρὰ Ἐλεαζάρου μαθών.
  language: Greek
  pages:
