  - 788
  confidence: high
  validation: agree
translation:
  text: But you are trying to frighten us by threatening us with death through tortures,
    as though you had not learned from Eleazar a little while ago.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'as if you had learned nothing from Eleazar recently.' The sense is
      rhetorical and sarcastic, not a literal denial that he witnessed Eleazar's example.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκφοβεῖς
  chosen: you are trying to frighten
  alternatives:
  - you frighten
  - you terrify
  - you intimidate
  lexicon: LSJ
  rationale: Present indicative with an active sense of causing fear; 'are trying
    to frighten' fits the rhetorical rebuke in context and sounds natural in English
    without overstating to 'terrify.'
- source_word: βασάνων
  chosen: tortures
  alternatives:
  - torments
  - torture
  lexicon: LSJ
  rationale: βάσανος in this martyrdom context refers to instruments/processes of
    torture rather than generic suffering; plural 'tortures' reflects the Greek plural
    and the concrete means of execution.
- source_word: θάνατον
  chosen: death
  lexicon: LSJ
  rationale: Straightforward rendering; the phrase denotes death inflicted by means
    of torture.
- source_word: ἀπειλῶν
  chosen: by threatening
  alternatives:
  - threatening
  - while threatening
  lexicon: LSJ
  rationale: Participial construction explaining the means by which the ruler seeks
    to frighten them; 'by threatening' gives smooth English and preserves the instrumental
    force.
- source_word: διὰ τῶν βασάνων
  chosen: through tortures
  alternatives:
  - by tortures
  - with torture
  lexicon: LSJ
  rationale: διά with the genitive marks means or instrument; 'through tortures' preserves
    the Greek structure and keeps the focus on death inflicted via torture.
- source_word: πρὸ βραχέως
  chosen: a little while ago
  alternatives:
  - recently
  - shortly before
  lexicon: LSJ
  rationale: Idiomatic temporal expression meaning a short time earlier; 'a little
    while ago' is clear modern English.
- source_word: παρὰ Ἐλεαζάρου μαθών
  chosen: learned from Eleazar
  alternatives:
  - been taught by Eleazar
  - taken a lesson from Eleazar
  lexicon: LSJ
  rationale: παρά with the genitive after μανθάνω indicates the source from whom one
    learns. 'Learned from Eleazar' is direct and preserves the allusion to Eleazar's
    example in the preceding narrative.
