id: 4MA.9.31
reference: 4 Maccabees 9:31
source:
  edition: lxx-swete-1909
  text: ἐγὼ μὲν γὰρ ἡδέσι ταῖς διὰ τὴν ἀρετὴν ἡδοναῖς τὸν πόνον ἐπικουφίζομαι·
  language: Greek
