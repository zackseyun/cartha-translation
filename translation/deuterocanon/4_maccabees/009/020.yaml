id: 4MA.9.20
reference: 4 Maccabees 9:20
source:
  edition: lxx-swete-1909
  text: ἐμολύνετο δὲ πάντοθεν αἵματι ὁ τροχός, καὶ ὁ σωρὸς τῆς ἀνθρακιᾶς τοῖς τῶν
    ἰχώρων ἐσβέννυτο σταλαγμοῖς, καὶ περὶ τοὺς ἄξονας τοῦ ὀργάνου περιέρεον αἱ σάρκες.
  language: Greek
