translation:
  text: And the wheel was stained all around with blood, and the heap of coals was
    being quenched by the drops of bodily fluids, and the flesh was flowing around
    the axles of the instrument.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was stained all around with blood.' The Greek verb can denote staining,
      but here likely carries the stronger sense of defilement or contamination.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the drops of the ichors.' The Greek term refers to fluid flowing
      from wounds; 'bodily fluids' is used for clarity in modern English.
    reason: lexical_alternative
  - marker: c
    text: Or 'of the instrument/apparatus.' The Greek word denotes the torture device
      as an implement.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμολύνετο
  chosen: was defiled
  alternatives:
  - was stained
  - was polluted
  lexicon: BDAG
  rationale: The verb conveys more than mere coloration; it denotes contamination/defilement.
    In this torture context, 'was defiled' preserves the visceral and morally charged
    sense better than the flatter 'was stained.'
- source_word: πάντοθεν
  chosen: all around
  alternatives:
  - on every side
  - from all sides
  lexicon: LSJ
  rationale: The adverb describes the wheel as bloodied on every side. 'All around'
    is natural modern English and retains the spatial force.
- source_word: αἵματι
  chosen: with blood
  lexicon: BDAG
  rationale: Straightforward instrumental/dative sense.
- source_word: ὁ τροχός
  chosen: the wheel
  lexicon: LSJ
  rationale: Refers to the torture wheel in the immediate context; 'wheel' is the
    direct and sufficient rendering.
- source_word: ὁ σωρὸς τῆς ἀνθρακιᾶς
  chosen: the heap of coals
  alternatives:
  - the pile of charcoal
  - the mound of burning coals
  lexicon: LSJ
  rationale: ἀνθρακιά denotes a charcoal fire or bed of coals. 'Heap of coals' is
    literal and readable without over-specifying whether the coals are charcoal or
    simply burning embers.
- source_word: τοῖς τῶν ἰχώρων ... σταλαγμοῖς
  chosen: by the drops of their bodily fluids
  alternatives:
  - by the drops of ichor
  - by the drops of discharge
  lexicon: LSJ
  rationale: ἰχώρ can denote the fluid flowing from wounds. Because 'ichor' is opaque
    in modern English and mythologically colored, 'bodily fluids' communicates the
    gruesome sense accessibly. 'Their' is supplied from context since the fluids are
    those of the tortured victims.
- source_word: ἐσβέννυτο
  chosen: was being quenched
  alternatives:
  - was being put out
  - was being extinguished
  lexicon: BDAG
  rationale: The imperfect depicts ongoing action. 'Was being quenched' fits the image
    of coals more idiomatically than 'extinguished' while preserving the processive
    sense.
- source_word: περὶ τοὺς ἄξονας
  chosen: around the axles
  alternatives:
  - about the axles
  lexicon: LSJ
  rationale: A concrete spatial description of flesh flowing around the wheel's axle-points.
- source_word: τοῦ ὀργάνου
  chosen: of the machine
  alternatives:
  - of the instrument
  - of the apparatus
  lexicon: LSJ
  rationale: ὄργανον here refers to the torture device as an implement. 'Machine'
    communicates the mechanical apparatus clearly in modern English; 'instrument'
    could sound too abstract or euphemistic.
- source_word: περιέρεον
  chosen: was flowing around
  alternatives:
  - was streaming around
  - was running around
  lexicon: LSJ
  rationale: The imperfect again suggests continuous motion. Singular English 'flesh
    was flowing' best matches the collective sense of αἱ σάρκες in context.
- source_word: αἱ σάρκες
  chosen: the flesh
  alternatives:
  - the pieces of flesh
  - the fleshly parts
  lexicon: BDAG
  rationale: Although plural in Greek, English commonly uses the collective singular
    'the flesh' for torn human tissue. This preserves the horror without awkwardness.
