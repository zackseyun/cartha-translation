translation:
  text: Go on, then, tyrant; and if you kill our lives because of godliness, do not
    suppose that by torturing us you are harming us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if you put our souls to death'; Greek 'souls' can also mean 'lives,'
      and here the sense is physical life.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεῖραζε
  chosen: Go on
  alternatives:
  - Try it
  - Test us
  - Proceed
  lexicon: LSJ
  rationale: Imperative of πειράζω here functions as a defiant challenge to continue
    the tyrant's attempt. 'Go on' captures the taunting force in natural English better
    than the more wooden 'test' or 'try' alone.
- source_word: τύραννε
  chosen: tyrant
  alternatives:
  - despot
  - oppressor
  lexicon: LSJ
  rationale: Direct address naming the ruler as an illegitimate cruel oppressor. 'Tyrant'
    is the standard and most transparent English equivalent.
- source_word: ψυχάς
  chosen: lives
  alternatives:
  - souls
  - lives/souls
  lexicon: LSJ
  rationale: Although ψυχή can mean 'soul,' in the phrase 'if you kill our ψυχάς'
    the sense is concrete life rather than an immaterial soul. 'Kill our souls' would
    mislead in English, so 'lives' best matches the idiom while preserving the meaning.
- source_word: θανατώσεις
  chosen: kill
  alternatives:
  - put to death
  - execute
  lexicon: LSJ
  rationale: Future of θανατόω. 'Kill' is direct and idiomatic; 'put to death' is
    possible but slightly more formal than needed here.
- source_word: διὰ τὴν εὐσέβειαν
  chosen: because of godliness
  alternatives:
  - for piety
  - because of our devotion
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees is a key virtue denoting reverent devotion to
    God and the law. 'Godliness' preserves the religious dimension clearly; 'piety'
    is possible but can sound archaic or narrower.
- source_word: μὴ νομίσῃς
  chosen: do not suppose
  alternatives:
  - do not think
  - do not imagine
  lexicon: LSJ
  rationale: The prohibition introduces the speaker's correction of the tyrant's assumption.
    'Do not suppose' conveys that nuance well.
- source_word: βλάπτειν
  chosen: harming
  alternatives:
  - injuring
  - damaging
  lexicon: LSJ
  rationale: βλάπτω denotes causing harm. 'Harming' is the most natural present participial
    complement in English here.
- source_word: βασανίζων
  chosen: by torturing
  alternatives:
  - while torturing
  - by tormenting
  lexicon: LSJ
  rationale: The participle expresses means or attendant action. 'By torturing' makes
    the instrumental force explicit and fits the context of martyrdom under torture.
