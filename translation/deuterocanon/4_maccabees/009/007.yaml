theological_decisions:
- issue: Rendering of ψυχή in a martyrdom context
  chosen_reading: Translated as 'lives' rather than 'souls'
  alternative_readings:
  - souls
  rationale: The immediate collocation with 'kill' points to physical life. Using
    'souls' in English could imply a metaphysical claim the Greek does not require
    here. The verse's theology is that bodily death does not constitute true harm
    to the faithful, not that the tyrant literally kills immaterial souls.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering of εὐσέβεια
  chosen_reading: Rendered as 'godliness'
  alternative_readings:
  - piety
  - devotion
  rationale: In 4 Maccabees εὐσέβεια is a programmatic term for reverent fidelity
    toward God. 'Godliness' preserves that theological weight in accessible English
    without importing later technical jargon.
  doctrine_reference: Readable modern English, not archaic or academic; consistency
    of key terms, or documented exception.
