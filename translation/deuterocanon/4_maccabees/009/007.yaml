  text: πεῖραζε γὰρ οὖν, τύραννε· καὶ τὰς ἡμῶν ψυχὰς εἰ θανατώσεις διὰ τὴν εὐσέβειαν,
    μὴ νομίσῃς ἡμᾶς βλάπτειν βασανίζων,
