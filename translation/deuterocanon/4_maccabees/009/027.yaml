id: 4MA.9.27
reference: 4 Maccabees 9:27
source:
  edition: lxx-swete-1909
  text: ὡς δʼ εἰ φαγεῖν βούλοιτο πρὶν βασανίζεσθαι πυνθανόμενοι, τὴν εὐγενῆ γνώμην
    ἤκουσαν,
  language: Greek
