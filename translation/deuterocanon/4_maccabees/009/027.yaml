  - 788
  confidence: high
  validation: agree
translation:
  text: And when they asked whether he wished to eat before being tortured, they heard
    his noble resolve,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his noble purpose' or 'his noble mind'; the Greek γνώμη can denote intention,
      resolve, or way of thinking.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δʼ εἰ
  chosen: And when
  alternatives:
  - and as if
  - then when
  lexicon: LSJ
  rationale: The combination introduces the next narrated circumstance rather than
    a hypothetical in English. 'And when' gives natural narrative flow while staying
    close to the Greek transition.
- source_word: φαγεῖν
  chosen: to eat
  alternatives:
  - to partake of food
  lexicon: LSJ
  rationale: The infinitive plainly means 'to eat.' No expansion is warranted.
- source_word: βούλοιτο
  chosen: he wished
  alternatives:
  - he wanted
  - he was willing
  lexicon: LSJ
  rationale: The optative in indirect question after πυνθανόμενοι is well represented
    by 'wished.' It preserves volitional nuance without sounding too colloquial.
- source_word: πρὶν βασανίζεσθαι
  chosen: before being tortured
  alternatives:
  - before being tormented
  - before being put to the torture
  lexicon: LSJ
  rationale: βασανίζω in this martyrdom context refers to torture under interrogation/punishment.
    'Before being tortured' is clear modern English and preserves the severity better
    than the broader 'tormented.'
- source_word: πυνθανόμενοι
  chosen: when they asked
  alternatives:
  - inquiring
  - asking
  lexicon: LSJ
  rationale: A participle of inquiry; rendered temporally for smooth English narrative.
    The implied subject is the torturers/officials from context.
- source_word: τὴν εὐγενῆ γνώμην
  chosen: his noble resolve
  alternatives:
  - the noble opinion
  - his noble purpose
  - his noble mind
  lexicon: LSJ
  rationale: γνώμη here is not mere opinion but settled intention/disposition. 'Resolve'
    best fits the martyr's steadfast response, while εὐγενῆ conveys nobility of character
    rather than social rank alone.
- source_word: ἤκουσαν
  chosen: they heard
  alternatives:
  - they listened to
  lexicon: LSJ
  rationale: Simple aorist of hearing; 'they heard' is the most direct rendering.
