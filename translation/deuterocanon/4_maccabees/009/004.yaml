translation:
  text: For we consider your pity for our unlawful deliverance to be harsher than
    death itself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mercy for our lawless preservation' or 'compassion aimed at saving us
      unlawfully.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χαλεπώτερον
  chosen: harsher
  alternatives:
  - more grievous
  - more painful
  - worse
  lexicon: LSJ
  rationale: Comparative of χαλεπός conveys something more severe, hard, or grievous.
    'Harsher' fits the moral and emotional force in context without over-specifying
    physical pain.
- source_word: θανάτου
  chosen: death
  lexicon: LSJ
  rationale: 'Straightforward genitive after comparison: ''than death itself.'''
- source_word: νομίζομεν
  chosen: we consider
  alternatives:
  - we think
  - we regard
  lexicon: LSJ
  rationale: Expresses judgment or estimation. 'We consider' is natural modern English
    and preserves the deliberative sense.
- source_word: ἔλεον
  chosen: pity
  alternatives:
  - mercy
  - compassion
  lexicon: LSJ
  rationale: In this context the speaker rejects the tyrant's offer of sparing life
    on unlawful terms. 'Pity' captures the condescending or sparing sense better than
    the more theologically loaded 'mercy.'
- source_word: παρανόμῳ
  chosen: unlawful
  alternatives:
  - lawless
  - contrary to the law
  lexicon: LSJ
  rationale: παράνομος means contrary to law. Here it refers to a deliverance gained
    by violating the ancestral law, so 'unlawful' is concise and accurate.
- source_word: σωτηρίᾳ
  chosen: deliverance
  alternatives:
  - salvation
  - preservation
  - escape
  lexicon: LSJ
  rationale: The sense is rescue or preservation from death, not theological salvation.
    'Deliverance' preserves the gravity while avoiding anachronistic doctrinal overtones.
- source_word: ἐπὶ τῇ παρανόμῳ σωτηρίᾳ ἡμῶν
  chosen: for our unlawful deliverance
  alternatives:
  - toward our unlawful deliverance
  - in view of our unlawful deliverance
  lexicon: LSJ
  rationale: 'The prepositional phrase modifies ἔλεον: pity shown with reference to
    saving them by unlawful compromise. ''For our unlawful deliverance'' is idiomatic
    and keeps the relation clear.'
