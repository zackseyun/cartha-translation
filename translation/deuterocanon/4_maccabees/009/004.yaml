reference: 4 Maccabees 9:4
source:
  edition: lxx-swete-1909
  text: χαλεπώτερον γὰρ αὐτοῦ τοῦ θανάτου νομίζομεν εἶναι σοι τὸν ἐπὶ τῇ παρανόμῳ
    σωτηρίᾳ ἡμῶν ἔλεον.
