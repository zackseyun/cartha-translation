id: 4MA.9.2
reference: 4 Maccabees 9:2
source:
  edition: lxx-swete-1909
  text: καὶ αἰσχυνόμεθα γὰρ τοὺς προγόνους εἰκότως, εἰ μὴ τῇ τοῦ νόμου εὐπειθείᾳ συμβούλῳ
    καὶ γνώσει χρησαίμεθα.
