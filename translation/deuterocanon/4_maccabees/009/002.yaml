theological_decisions:
- issue: Moral relation to the ancestors in αἰσχυνόμεθα ... τοὺς προγόνους
  chosen_reading: The speaker says failure to obey the law would disgrace their ancestors.
  alternative_readings:
  - The speaker says they would be ashamed before their ancestors if they failed to
    obey the law.
  rationale: The accusative object τοὺς προγόνους more naturally marks those affected
    by the shame, yielding the sense of dishonoring ancestral legacy. This also fits
    the martyrological argument of fidelity to inherited law.
