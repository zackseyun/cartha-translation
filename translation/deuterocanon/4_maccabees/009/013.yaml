translation:
  text: and as he was stretched over it, the noble young man was being disjointed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'was becoming out of joint.' The Greek emphasizes the
      ongoing bodily dislocation caused by the torture.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ
  chosen: over
  alternatives:
  - around
  - concerning
  lexicon: LSJ
  rationale: 'With κατατεινόμενος and the implied instrument of torture, περὶ ὃν is
    best taken spatially: the youth is stretched over/around the device, not ''concerning
    which.'' ''Over it'' is idiomatic and fits the scene.'
- source_word: ὃν
  chosen: it
  alternatives:
  - which
  - him
  lexicon: LSJ
  rationale: The relative pronoun refers back to the previously mentioned torture
    wheel/device. English requires a resumptive object in this compressed clause;
    'it' makes the antecedent clear.
- source_word: κατατεινόμενος
  chosen: was stretched
  alternatives:
  - being stretched out
  - being strained
  lexicon: LSJ
  rationale: The participle denotes being stretched tight, likely on an instrument
    of torture. 'Was stretched' preserves the passive force in natural English.
- source_word: εὐγενὴς
  chosen: noble
  alternatives:
  - well-born
  - high-born
  lexicon: LSJ
  rationale: The term can denote noble birth or noble character. In 4 Maccabees it
    often carries both social and moral dignity; 'noble' preserves that breadth better
    than the more class-specific 'well-born.'
- source_word: νεανίας
  chosen: young man
  alternatives:
  - youth
  - young warrior
  lexicon: LSJ
  rationale: A straightforward age designation. 'Young man' is readable modern English
    and avoids sounding overly literary.
- source_word: ἔξαρθρος
  chosen: disjointed
  alternatives:
  - pulled out of joint
  - dismembered
  lexicon: LSJ
  rationale: The adjective literally suggests 'out of joint' or 'dislocated.' In context
    of torture, 'disjointed' conveys the bodily wrenching without overstating to full
    dismemberment.
- source_word: ἐγίνετο
  chosen: was being
  alternatives:
  - became
  - came to be
  lexicon: LSJ
  rationale: The imperfect indicates ongoing process under torture, not a simple punctiliar
    change. 'Was being disjointed' captures the progressive sense.
