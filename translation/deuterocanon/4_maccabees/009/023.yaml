id: 4MA.9.23
reference: 4 Maccabees 9:23
source:
  edition: lxx-swete-1909
  text: στρεβλὰς Μιμήσασθέ με, ἀδελφοί, λέγων, μὴ λειπὼν τὸν ἀγῶνα λειποτακτήσητε,
