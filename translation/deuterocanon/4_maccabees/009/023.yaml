theological_decisions:
- issue: Rendering εὐσέβεια in a martyrdom context
  chosen_reading: godliness
  alternative_readings:
  - piety
  rationale: The term here refers not merely to inward devotion but to steadfast fidelity
    to God under persecution. 'Godliness' communicates devotion with ethical and covenantal
    force in readable English.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
- issue: Gendered address ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The narrative context concerns literal brothers, not a generic mixed
    congregation. Retaining 'brothers' is both contextually accurate and aligned with
    the project's gender-accurate policy.
  doctrine_reference: Translation philosophy §4
