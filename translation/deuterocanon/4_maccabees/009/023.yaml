translation:
  text: 'Imitate me on the rack, brothers, he said: do not, by abandoning the struggle
    when I have not left it, desert your post; nor renounce through me the brotherhood
    of courage. Fight the holy and noble campaign for godliness,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under torture.' The Greek expression evokes the torture-rack specifically,
      so the main text keeps the concrete image.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not become deserters' / 'do not abandon the ranks.' The verb is military
      in tone.
    reason: lexical_alternative
  - marker: c
    text: Or 'piety.' The Greek εὐσέβεια is a key virtue in 4 Maccabees, denoting
      faithful devotion to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μιμήσασθέ
  chosen: Imitate
  alternatives:
  - Follow the example of
  - Copy
  lexicon: LSJ
  rationale: Aorist middle imperative from μιμέομαι, calling for emulation of the
    speaker's example. 'Imitate' is concise and preserves the direct exhortation.
- source_word: στρεβλὰς
  chosen: on the rack
  alternatives:
  - under torture
  - in tortures
  lexicon: LSJ
  rationale: The form is difficult in isolation, but in context it evokes torture
    by the rack/engine of torment. Rendering it 'on the rack' preserves the concrete
    image rather than flattening it to a generic 'under torture.'
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: LSJ
  rationale: The Greek is grammatically masculine plural and addresses his fellow
    brothers in the narrative. Per doctrine, gender-accurate rendering is preferred
    over neutralization.
- source_word: μὴ λειπὼν τὸν ἀγῶνα
  chosen: when I have not left the struggle
  alternatives:
  - since I have not abandoned the contest
  - though I have not given up the struggle
  lexicon: LSJ
  rationale: ἀγών denotes contest/struggle. 'Struggle' reads naturally in English
    while retaining the athletic-martial metaphor. The participial construction is
    represented idiomatically as a temporal-causal clause.
- source_word: λειποτακτήσητε
  chosen: desert your post
  alternatives:
  - become deserters
  - abandon the ranks
  lexicon: LSJ
  rationale: 'The verb carries military force: to desert or play the coward by leaving
    one''s station. ''Desert your post'' preserves the martial imagery and sharpens
    the contrast with steadfast endurance.'
- source_word: ἐξομόσησθέ
  chosen: renounce
  alternatives:
  - disown
  - abjure
  lexicon: LSJ
  rationale: The verb can mean to deny on oath or renounce. Here the sense is repudiation
    of shared fidelity under pressure. 'Renounce' is clear and weighty without over-specifying
    oath language in English.
- source_word: τὴν τῆς εὐψυχίας ἀδελφότητα
  chosen: the brotherhood of courage
  alternatives:
  - the brotherhood of noble spirit
  - the kinship of bravery
  lexicon: LSJ
  rationale: εὐψυχία denotes courage/high spirit in adversity. 'Brotherhood of courage'
    preserves both the familial bond and the virtue being shared.
- source_word: στρατείαν στρατεύσασθε
  chosen: Fight the ... campaign
  alternatives:
  - Serve in the ... campaign
  - Wage the ... warfare
  lexicon: LSJ
  rationale: The cognate noun-verb pair intensifies the military metaphor. 'Fight
    the campaign' keeps the martial force and echoes the Greek repetition better than
    a flattened rendering.
- source_word: ἱερὰν καὶ εὐγενῆ
  chosen: holy and noble
  alternatives:
  - sacred and noble
  - holy and honorable
  lexicon: LSJ
  rationale: ἱεράν points to sacred consecration; εὐγενῆ to nobility. 'Holy and noble'
    is idiomatic and preserves both religious and honor-laden dimensions.
- source_word: περὶ τῆς εὐσεβείας
  chosen: for godliness
  alternatives:
  - for piety
  - on behalf of reverence toward God
  lexicon: LSJ
  rationale: In 4 Maccabees εὐσέβεια is a key term for faithful devotion to God expressed
    in covenant loyalty. 'Godliness' is accessible modern English; 'piety' is possible
    but can sound narrower or more archaic.
