reference: 4 Maccabees 9:26
source:
  edition: lxx-swete-1909
  text: θαυμασάντων δὲ πάντων τὴν καρτεροψυχίαν αὐτοῦ, ἦγον οἱ δορυφόροι τὸν καθʼ
    ἡλικίαν τοῦ προτέρου δεύτερον, καὶ σιδηρᾶς ἐναρμοσάμενοι χεῖρας ὀξέσι τοῖς ὄνυξιν,
    τοῖς ὀργάνοις καὶ καταπέλτῃ προσεδήσαν αὐτόν.
