theological_decisions:
- issue: Rendering εὐσέβεια in a martyrdom context
  chosen_reading: godliness
  alternative_readings:
  - piety
  - reverence
  rationale: The book emphasizes devout fidelity to God expressed in obedience to
    the law. 'Godliness' communicates this broader religious devotion in accessible
    English without importing later technical theology.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Force of δικαιότερον in the comparative exhortation
  chosen_reading: how much more rightly should we die
  alternative_readings:
  - we would die more justly
  - we should die more fittingly
  rationale: The speaker argues that younger men ought all the more to accept death
    if older Hebrews already did so. 'How much more rightly' preserves the comparative
    moral fitness without overstating a doctrine of merit.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
