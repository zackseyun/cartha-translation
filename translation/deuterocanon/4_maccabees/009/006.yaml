translation:
  text: But if the old men of the Hebrews died after enduring tortures because of
    godliness, how much more rightly should we, the young men, die, having disregarded
    the tortures of your compulsion, which the aged instructor also conquered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for piety.' The Greek εὐσέβεια can denote reverent devotion to God expressed
      in faithful conduct.
    reason: lexical_alternative
  - marker: b
    text: Or 'the tortures of your coercions/constraints.' The Greek phrase τῶν σῶν
      ἀναγκῶν is somewhat compressed and refers to the ruler's coercive pressures
      or forced demands.
    reason: lexical_alternative
lexical_decisions:
- source_word: γέροντες
  chosen: old men
  alternatives:
  - elders
  - aged men
  lexicon: LSJ
  rationale: The term denotes men advanced in age. 'Old men' preserves the age contrast
    with 'we, the young men' later in the verse more clearly than 'elders,' which
    could suggest office rather than age.
- source_word: διὰ τὴν εὐσέβειαν
  chosen: because of godliness
  alternatives:
  - for piety
  - because of reverence
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees commonly refers to devout fidelity toward God.
    'Godliness' is natural English and preserves the religious-moral sense without
    narrowing it merely to cultic reverence.
- source_word: βασανισμοὺς ὑπομείναντες
  chosen: after enduring tortures
  alternatives:
  - having endured torments
  - after bearing tortures
  lexicon: LSJ
  rationale: The participle is antecedent to the main verb ἀπέθανον. 'After enduring
    tortures' conveys both the sequence and the severity of βασανισμοί in idiomatic
    English.
- source_word: ἀποθάνοιμεν ἂν δικαιότερον
  chosen: how much more rightly should we die
  alternatives:
  - we should die more justly
  - we would die more rightly
  lexicon: LSJ
  rationale: The optative with ἄν expresses a potential or fitting conclusion in this
    rhetorical condition. 'How much more rightly should we die' captures the comparative
    force of δικαιότερον and the exhortatory-rhetorical tone.
- source_word: οἱ νέοι
  chosen: the young men
  alternatives:
  - the young
  - younger men
  lexicon: LSJ
  rationale: The masculine plural contrasts directly with γέροντες. 'Young men' keeps
    the gender and the age contrast explicit, in line with the project's gender-accurate
    policy.
- source_word: τὰς βασάνους
  chosen: the tortures
  alternatives:
  - the torments
  - the pains
  lexicon: LSJ
  rationale: βασάνοι here refers to inflicted sufferings under persecution. 'Tortures'
    best matches the coercive and judicial context.
- source_word: τῶν σῶν ἀναγκῶν
  chosen: of your compulsion
  alternatives:
  - of your coercions
  - of your constraints
  - that you force on us
  lexicon: LSJ
  rationale: ἀνάγκη can denote force or compulsion. The plural likely refers to the
    tyrant's coercive measures. 'Your compulsion' is slightly compressed English but
    preserves the genitival relation and the coercive sense without overparaphrasing.
- source_word: ὑπεριδόντες
  chosen: having disregarded
  alternatives:
  - having looked down on
  - having despised
  - having treated as nothing
  lexicon: LSJ
  rationale: The participle conveys treating something as negligible or beneath concern.
    'Having disregarded' is idiomatic and fits the martyrs' refusal to be governed
    by the tortures.
- source_word: ὁ παιδευτὴς γέρων
  chosen: the aged instructor
  alternatives:
  - the old teacher
  - the elderly tutor
  lexicon: LSJ
  rationale: The phrase refers to the elderly Eleazar as one who instructs by teaching
    and example. 'Aged instructor' preserves both παιδευτής and the appositional age
    marker γέρων.
- source_word: ἐνίκησεν
  chosen: conquered
  alternatives:
  - overcame
  - was victorious over
  lexicon: LSJ
  rationale: The verb is martial and triumphant in tone. 'Conquered' preserves the
    victory motif prominent in 4 Maccabees.
