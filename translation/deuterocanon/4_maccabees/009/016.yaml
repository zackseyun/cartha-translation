id: 4MA.9.16
reference: 4 Maccabees 9:16
source:
  edition: lxx-swete-1909
  text: καὶ τῶν δορυφόρων λεγόντων Ὁμολόγησον φαγεῖν, ὅπως ἀπαλλαγῇς
  language: Greek
  pages:
