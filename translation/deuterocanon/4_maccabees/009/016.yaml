  confidence: high
  validation: agree
translation:
  text: And when the bodyguards were saying, “Confess that you will eat, so that you
    may be released,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Consent to eat, so that you may be set free.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δορυφόρων
  chosen: bodyguards
  alternatives:
  - guards
  - spearmen
  lexicon: LSJ
  rationale: δορυφόρος literally denotes a spear-bearer, but in Hellenistic narrative
    it commonly refers to royal or official guards/attendants. 'Bodyguards' best conveys
    the functional sense in natural English without over-literalizing the weapon imagery.
- source_word: λεγόντων
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: The genitive absolute with present participle suggests contemporaneous
    ongoing speech. 'Were saying' preserves that durative sense in readable English.
- source_word: Ὁμολόγησον
  chosen: Agree
  alternatives:
  - Confess
  - Admit
  - Consent
  lexicon: BDAG
  rationale: Here the imperative is followed by an infinitive ('to eat'), so the sense
    is not confession of belief but assent/consent to the demanded action. 'Agree'
    is concise and idiomatic; 'consent' is possible but slightly stiffer.
- source_word: φαγεῖν
  chosen: to eat
  alternatives:
  - eat
  lexicon: BDAG
  rationale: The aorist infinitive complements Ὁμολόγησον and is straightforwardly
    rendered 'to eat.' Retaining the infinitive reflects the Greek construction after
    'Agree.'
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: ὅπως introduces purpose or intended result. 'So that' is natural modern
    English and preserves the purposive nuance.
- source_word: ἀπαλλαγῇς
  chosen: you may be released
  alternatives:
  - you may be set free
  - you may escape
  - you may be rid of this
  lexicon: BDAG
  rationale: The passive subjunctive of ἀπαλλάσσω here means to be freed or released
    from the present ordeal/punishment. 'Be released' is broad enough to fit the immediate
    context without specifying more than the Greek states.
