theological_decisions:
- issue: Force of the repeated ἡμᾶς and comparative phrase ὑπὲρ αὐτούς
  chosen_reading: The speaker asks the tyrant to show mercy to 'us' in comparison
    with 'them' ('more than on them'), not merely to pity 'us because of them.'
  alternative_readings:
  - do not hate us because of them; have mercy on us
  - do not hate us above them; have mercy on us
  rationale: The Greek as transmitted is somewhat compressed and stylistically awkward,
    but ὑπὲρ with accusative commonly bears a comparative sense. The repeated ἡμᾶς
    likely heightens the plea rather than requiring literal repetition in English.
    This yields a coherent translation anchored in the source while acknowledging
    minor source awkwardness.
