theological_decisions:
- issue: Reference of 'our righteous and ancestral providence'
  chosen_reading: A reverent reference to God's providential care in relation to Israel's
    ancestral faith
  alternative_readings:
  - A more abstract, impersonal providence
  rationale: In 4 Maccabees, πρόνοια in such elevated language functions theologically,
    not merely philosophically. Rendering it 'providence' preserves the text's theological
    register without adding 'God's' explicitly where the Greek does not.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
