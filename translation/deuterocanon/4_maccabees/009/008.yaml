  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: For through this suffering and endurance, we will indeed carry off the prizes
    of virtue,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''win the rewards of moral excellence.'' The Greek uses contest language:
      literally, ''bear away the prizes of virtue.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς μὲν γὰρ
  chosen: For ... we will indeed
  alternatives:
  - For we
  - Indeed, we
  lexicon: BDAG
  rationale: Captures the explanatory γάρ and the emphatic/discourse-marking μὲν with
    natural English emphasis, anticipating contrast with the following context.
- source_word: διὰ τῆσδε τῆς κακοπαθείας
  chosen: through this suffering
  alternatives:
  - through this hardship
  - because of this ill-treatment
  lexicon: BDAG
  rationale: κακοπάθεια denotes painful hardship or suffering. 'Through this suffering'
    preserves both the demonstrative force of τῆσδε and the instrumental nuance of
    διά.
- source_word: ὑπομονῆς
  chosen: endurance
  alternatives:
  - steadfastness
  - patient endurance
  lexicon: BDAG
  rationale: '''Endurance'' is clear modern English and fits the virtue-language of
    the passage without overexpanding the term.'
- source_word: τὰ τῆς ἀρετῆς ἆθλα
  chosen: the prizes of virtue
  alternatives:
  - the rewards of virtue
  - virtue's prizes
  lexicon: LSJ
  rationale: ἆθλα are contest-prizes or rewards won in struggle; 'prizes' preserves
    the athletic/agonistic metaphor. ἀρετή here is moral excellence/virtue, a key
    theme in 4 Maccabees.
- source_word: οἴσομεν
  chosen: we will ... bear away
  alternatives:
  - we will receive
  - we will win
  lexicon: BDAG
  rationale: Future of φέρω can idiomatically mean 'carry off' a prize. 'Bear away'
    preserves the metaphor more closely than the flatter 'receive,' while remaining
    intelligible.
