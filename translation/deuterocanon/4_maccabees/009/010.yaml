id: 4MA.9.10
reference: 4 Maccabees 9:10
source:
  edition: lxx-swete-1909
  text: Ταῦτα αὐτῶν εἰπόντων, οὐ μόνον ὡς κατὰ ἀπειθούντων ἐχαλέπαινεν ὁ τύραννος,
    ἀλλʼ ὡς καὶ κατὰ ἀχαρίστων ὠργίσθη.
  language: Greek
  pages:
  - 752
  - 766
  - 767
  - 768
  - 769
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: When they said these things, the tyrant was angered not only as against those
    who were disobedient, but was also enraged as against the ungrateful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not only as against the disobedient, but also as against the ungrateful.'
      The Greek uses masculine plurals without explicit nouns; the translation supplies
      'men' to reflect the referents in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  chosen: these things
  alternatives:
  - this
  - such things
  lexicon: LSJ
  rationale: Demonstrative neuter plural referring back to the brothers' preceding
    words; 'these things' preserves the plural and discourse linkage naturally in
    English.
- source_word: εἰπόντων
  chosen: when they said
  alternatives:
  - after they said
  - as they were saying
  lexicon: LSJ
  rationale: Aorist participle in genitive absolute; 'when they said' gives a natural
    temporal sense in English without over-specifying sequence.
- source_word: ὁ τύραννος
  chosen: the tyrant
  alternatives:
  - the king
  - the ruler
  lexicon: LSJ
  rationale: τύραννος is explicitly 'tyrant' here, highlighting oppressive and illegitimate
    cruelty; softening to 'king' or 'ruler' would lose the author's evaluative force.
- source_word: οὐ μόνον ... ἀλλʼ
  chosen: not only ... but also
  alternatives:
  - not merely ... but
  - not only ... rather also
  lexicon: LSJ
  rationale: Standard correlative construction; rendered with idiomatic English parallelism.
- source_word: ὡς κατὰ ἀπειθούντων
  chosen: as against men who were disobedient
  alternatives:
  - as against the disobedient
  - because they were disobedient
  - toward those who were defiant
  lexicon: LSJ
  rationale: ὡς marks the tyrant's construal or regard; κατὰ with the genitive here
    conveys hostile stance 'against.' ἀπειθούντων denotes refusal to obey. 'Men who
    were disobedient' keeps the masculine plural reference and the sense of perceived
    insubordination.
- source_word: ἐχαλέπαινεν
  chosen: was enraged
  alternatives:
  - was harsh
  - was angry
  - grew furious
  lexicon: LSJ
  rationale: The imperfect depicts continuing or developing anger. 'Was enraged' captures
    the strong emotional force better than the flatter 'was angry.'
- source_word: ὡς καὶ κατὰ ἀχαρίστων
  chosen: as against the ungrateful
  alternatives:
  - as against ingrates
  - because they were ungrateful
  lexicon: LSJ
  rationale: Again ὡς signals the tyrant's perspective. ἀχάριστος means ungrateful
    or thankless. 'The ungrateful' is idiomatic and preserves the moral accusation.
- source_word: ὠργίσθη
  chosen: was also angered
  alternatives:
  - became angry
  - was wrathful
  - was enraged
  lexicon: LSJ
  rationale: Aorist passive/deponent from ὀργίζομαι. To preserve the rhetorical distinction
    from ἐχαλέπαινεν, I rendered the first with 'was enraged' and this with 'was also
    angered' rather than repeating the same English verb.
