id: 4MA.9.21
reference: 4 Maccabees 9:21
source:
  edition: lxx-swete-1909
  text: καὶ περιτετηγμένον ἤδη ἔχων τὸ τῶν ὀστέων πῆγμα ὁ μεγαλόφρων καὶ Ἀβραμιαῖος
    νεανίας οὐκ ἐστέναξεν.
  language: Greek
  pages:
  - 752
  - 766
  - 767
  - 768
  - 769
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: And though the framework of his bones was already burned all around, the noble-minded
    and Abraham-like young man did not groan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the structure of his bones was already melted all around.' The Greek
      uses a vivid image of the bones' frame being affected on every side by the fire.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιτετηγμένον
  chosen: burned all around
  alternatives:
  - melted all around
  - consumed all around
  - charred all around
  lexicon: LSJ
  rationale: Perfect participle of περιτήκω/related form conveys being affected on
    all sides by intense heat; in context of torture by fire, 'burned all around'
    communicates the bodily effect more naturally than the overly literal 'melted.'
- source_word: πῆγμα
  chosen: framework
  alternatives:
  - mass
  - structure
  - composition
  lexicon: LSJ
  rationale: Literally something fixed or compacted; with 'of the bones' it refers
    to the bodily structure formed by the bones. 'Framework' is idiomatic in English
    and preserves the concrete image.
- source_word: μεγαλόφρων
  chosen: noble-minded
  alternatives:
  - high-minded
  - magnanimous
  - great-souled
  lexicon: LSJ
  rationale: Describes elevated courage and dignity of mind. 'Noble-minded' is readable
    modern English and retains the moral-psychological force.
- source_word: Ἀβραμιαῖος
  chosen: Abraham-like
  alternatives:
  - Abrahamic
  - like Abraham
  - of Abraham
  lexicon: LSJ
  rationale: Adjectival form meaning characterized by Abraham or resembling Abraham.
    'Abraham-like' makes the comparison explicit in natural English without importing
    later technical senses of 'Abrahamic.'
- source_word: νεανίας
  chosen: young man
  alternatives:
  - youth
  - young warrior
  lexicon: LSJ
  rationale: Standard term for a young male. 'Young man' is natural and gender-accurate.
- source_word: οὐκ ἐστέναξεν
  chosen: did not groan
  alternatives:
  - did not sigh
  - did not moan
  lexicon: LSJ
  rationale: στενάζω denotes groaning or sighing under distress. In this torture context,
    'groan' best conveys audible suffering that he refuses to express.
