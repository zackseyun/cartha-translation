- issue: Rendering of Ἀβραμιαῖος as a characterizing adjective
  chosen_reading: Abraham-like
  alternative_readings:
  - Abrahamic
  - descended from Abraham
  rationale: The immediate context praises the martyr's faith and endurance by likening
    him to Abraham's exemplary devotion, not merely identifying ethnic descent. The
    adjectival force is best preserved as resemblance in character.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source meaning over inherited wording.'
