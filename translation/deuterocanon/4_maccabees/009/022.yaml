lexical_decisions:
- source_word: ἀλλʼ
  chosen: but
  alternatives:
  - yet
  - rather
  lexicon: LSJ
  rationale: Adversative conjunction marking contrast with the preceding description.
- source_word: ὥσπερ
  chosen: as though
  alternatives:
  - just as
  - as if
  lexicon: LSJ
  rationale: Introduces a comparison; 'as though' fits the participial image that
    follows without overstating literal transformation.
- source_word: ἐν πυρί
  chosen: in the fire
  alternatives:
  - by fire
  - amid fire
  lexicon: LSJ
  rationale: Locative/instrumental sense is possible, but the imagery is best preserved
    with the more literal 'in the fire'.
- source_word: μετασχηματιζόμενος
  chosen: being transformed
  alternatives:
  - being changed
  - being transfigured
  lexicon: LSJ
  rationale: Present middle/passive participle conveying change of condition or form.
    'Being transformed' preserves the elevated rhetorical sense.
- source_word: εἰς ἀφθαρσίαν
  chosen: into incorruptibility
  alternatives:
  - into immortality
  - into imperishability
  lexicon: LSJ
  rationale: ἀφθαρσία denotes a state of imperishability/incorruption. 'Incorruptibility'
    is more formally aligned and preserves the moral-eschatological resonance without
    narrowing it to mere endless life.
- source_word: ὑπέμεινεν
  chosen: endured
  alternatives:
  - remained steadfast under
  - bore
  lexicon: LSJ
  rationale: Standard sense of steadfast endurance under suffering; 'endured' is concise
    and natural English.
- source_word: εὐγενῶς
  chosen: nobly
  alternatives:
  - bravely
  - with nobility
  lexicon: LSJ
  rationale: Carries the sense of noble or worthy conduct; 'nobly' preserves the moral
    quality emphasized in 4 Maccabees.
- source_word: τὰς
  chosen: the
  lexicon: Greek grammar
  rationale: The surviving source text ends with the feminine plural article, indicating
    the verse is incomplete in the provided witness and continues into the next line
    or verse segment.
