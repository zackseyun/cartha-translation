theological_decisions:
- issue: Force of εἰς ἀφθαρσίαν in martyrdom context
  chosen_reading: into incorruptibility
  alternative_readings:
  - into immortality
  - into imperishability
  rationale: The phrase evokes the martyr's transition toward an imperishable state,
    but the Greek term itself is broader than simple 'immortality.' The rendering
    preserves the text's elevated theological rhetoric without importing a more specific
    doctrinal formulation than the word requires.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
