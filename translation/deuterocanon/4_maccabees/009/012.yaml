translation:
  text: But when they grew weary from striking him with whips, accomplishing nothing,
    they put him on the wheel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'onto the wheel.' The Greek preposition ἐπί with the accusative can emphasize
      movement onto the instrument.
    reason: lexical_alternative
  - marker: b
    text: The 'wheel' is a torture device, not an ordinary cart wheel.
    reason: cultural_note
lexical_decisions:
- source_word: τύπτοντες
  chosen: striking him
  alternatives:
  - beating him
  - hitting him
  lexicon: LSJ
  rationale: The participle denotes repeated blows. 'Striking' is natural modern English
    and preserves the physical action without adding intensity beyond the Greek.
- source_word: ταῖς μάστιξιν
  chosen: with whips
  alternatives:
  - with scourges
  - with lashes
  lexicon: LSJ
  rationale: μάστιξ refers to a whip/scourge used for flogging. 'Whips' is the clearest
    accessible rendering; 'scourges' is possible but less common in modern English.
- source_word: ἐκοπίασαν
  chosen: grew weary
  alternatives:
  - became exhausted
  - were worn out
  lexicon: BDAG
  rationale: The verb means to become tired from labor. 'Grew weary' fits the aorist
    in context and reads smoothly in narrative English.
- source_word: μηδὲν ἀνύοντες
  chosen: accomplishing nothing
  alternatives:
  - achieving nothing
  - getting nowhere
  lexicon: LSJ
  rationale: The phrase indicates failure to obtain the intended result. 'Accomplishing
    nothing' is idiomatic and preserves the sense of ineffective torture.
- source_word: ἀνέβαλον
  chosen: they put
  alternatives:
  - they lifted
  - they placed
  - they mounted
  lexicon: LSJ
  rationale: In this context the verb means to put or mount someone onto an instrument.
    'Put' is simple and accurate; 'mounted' could sound too specialized without adding
    clarity.
- source_word: ἐπὶ τὸν τροχόν
  chosen: on the wheel
  alternatives:
  - onto the wheel
  lexicon: LSJ
  rationale: τροχός here refers to the torture wheel. 'On the wheel' is the most direct
    rendering; the article is naturally represented in English.
