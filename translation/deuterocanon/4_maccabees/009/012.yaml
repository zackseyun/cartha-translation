id: 4MA.9.12
reference: 4 Maccabees 9:12
source:
  edition: lxx-swete-1909
  text: ὡς δὲ τύπτοντες ταῖς μάστιξιν ἐκοπίασαν, μηδὲν ἀνύοντες, ἀνέβαλον αὐτὸν ἐπὶ
    τὸν τροχόν.
  language: Greek
  pages:
