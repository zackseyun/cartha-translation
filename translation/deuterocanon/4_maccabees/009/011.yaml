translation:
  text: So, when they were ordered to do so, the torturers brought forward the eldest
    of them, and after tearing open his tunic, they bound his hands and arms on both
    sides with straps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek agent noun translated 'the torturers' is textually and lexically
      unusual in this form; the context clearly indicates the king's men who carried
      out the torture.
    reason: textual_variant
lexical_decisions:
- source_word: ὅθεν
  chosen: So
  alternatives:
  - Therefore
  - From thereupon
  - Accordingly
  lexicon: LSJ
  rationale: Introduces the next consequential action in the narrative. 'So' gives
    a natural English transition without overformal stiffness.
- source_word: τὸν πρεσβύτατον αὐτῶν
  chosen: the eldest of them
  alternatives:
  - their eldest
  - the oldest among them
  - the elder
  lexicon: LSJ
  rationale: πρεσβύτατος is the superlative, indicating the oldest brother, not merely
    'an elder.' 'Of them' preserves the partitive sense.
- source_word: κελευσθέντες
  chosen: when they were ordered to do so
  alternatives:
  - having been commanded
  - when ordered
  lexicon: LSJ
  rationale: Aorist passive participle modifying the agents; the temporal-circumstantial
    sense is best conveyed in idiomatic English as 'when they were ordered to do so.'
- source_word: οἱ μιστισταί
  chosen: the torturers
  alternatives:
  - the executioners
  - the tormentors
  lexicon: LSJ
  rationale: In context these are the king's agents inflicting torture. 'Torturers'
    best matches the immediate action and avoids the narrower finality of 'executioners.'
    The transmitted form appears unusual, but the contextual sense is clear enough
    for this rendering.
- source_word: παρήγαγον
  chosen: brought forward
  alternatives:
  - led out
  - produced
  - brought in
  lexicon: LSJ
  rationale: The verb here denotes bringing someone forward into public view or before
    the authorities. 'Brought forward' fits the courtroom/torture setting well.
- source_word: διαρρήξαντες τὸν χιτῶνα
  chosen: after tearing open his tunic
  alternatives:
  - after ripping his garment
  - after tearing his robe
  lexicon: LSJ
  rationale: χιτών is specifically the tunic/inner garment. 'Tearing open' reflects
    the violent preparatory action before binding.
- source_word: διέδησαν
  chosen: they bound
  alternatives:
  - they tied fast
  - they fettered
  lexicon: LSJ
  rationale: The verb indicates fastening or binding securely. 'Bound' is the clearest
    modern equivalent.
- source_word: τὰς χεῖρας αὐτοῦ καὶ τοὺς βραχίονας
  chosen: his hands and arms
  alternatives:
  - his hands and forearms
  - his hands and upper arms
  lexicon: LSJ
  rationale: χείρ is 'hand' and βραχίων is 'arm.' A straightforward rendering preserves
    the bodily detail without over-specifying anatomy.
- source_word: ἱμᾶσιν
  chosen: with straps
  alternatives:
  - with thongs
  - with leather cords
  - with bands
  lexicon: LSJ
  rationale: ἱμᾶς commonly denotes a strap or thong, often leather. 'Straps' is readable
    modern English; 'thongs' is accurate but potentially distracting in contemporary
    usage.
- source_word: ἑκατέρωθεν
  chosen: on both sides
  alternatives:
  - on either side
  - from both sides
  lexicon: LSJ
  rationale: The adverb indicates bilateral positioning. 'On both sides' is the most
    natural English expression here.
