id: 4MA.9.11
reference: 4 Maccabees 9:11
source:
  edition: lxx-swete-1909
  text: ὅθεν τὸν πρεσβύτατον αὐτῶν κελευσθέντες παρήγαγον οἱ μιστισταί, καὶ διαρρήξαντες
    τὸν χιτῶνα διέδησαν τὰς χεῖρας αὐτοῦ καὶ τοὺς βραχίονας ἱμᾶσιν ἑκατέρωθεν.
  language: Greek
