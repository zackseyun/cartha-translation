theological_decisions:
- issue: Personification of θεοσέβεια
  chosen_reading: Translate as 'godliness' with the personification retained through
    the participle 'crowning,' but without a feminine English pronoun.
  alternative_readings:
  - Translate as 'piety' with feminine personification ('her own athletes')
  rationale: The verse personifies devotion to God as the victor in a contest. English
    can preserve that personification through the action 'crowning' without introducing
    potentially distracting feminine pronouns tied to a grammatically feminine Greek
    noun.
  doctrine_reference: Translation philosophy §§3, 6
