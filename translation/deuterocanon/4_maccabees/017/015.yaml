translation:
  text: But godliness won, crowning its own athletes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'piety won, crowning her own athletes.' The Greek personifies θεοσέβεια
      with a feminine form.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεοσέβεια
  chosen: godliness
  alternatives:
  - piety
  - reverence toward God
  lexicon: LSJ
  rationale: The noun denotes reverence or devotion toward God. 'Godliness' is concise
    and natural in English while preserving the explicitly God-directed sense better
    than the broader 'piety.'
- source_word: ἐνίκα
  chosen: won
  alternatives:
  - was victorious
  - prevailed
  - conquered
  lexicon: LSJ
  rationale: The imperfective/aoristic narrative sense here is well conveyed by 'won.'
    'Was victorious' is slightly more formal; 'won' is idiomatic and fits the personified
    contest imagery.
- source_word: τοὺς ἑαυτῆς
  chosen: its own
  alternatives:
  - her own
  lexicon: LSJ
  rationale: The reflexive phrase marks possession by the personified feminine noun
    θεοσέβεια. In English, because 'godliness' is not naturally personified as female,
    'its own' preserves the sense without forcing a gendered pronoun.
- source_word: ἀθλητάς
  chosen: athletes
  alternatives:
  - contestants
  - champions
  lexicon: LSJ
  rationale: The Greek explicitly uses athletic-contest imagery. 'Athletes' preserves
    the metaphor more directly than 'contestants'; 'champions' would over-interpret
    the result rather than translate the noun itself.
- source_word: στεφανοῦσα
  chosen: crowning
  alternatives:
  - awarding a wreath to
  - placing a crown on
  lexicon: LSJ
  rationale: The participle evokes the awarding of the victor's wreath in athletic
    competition. 'Crowning' is compact and preserves the metaphor; the more explicit
    'awarding a wreath to' is interpretive and unnecessary in the main text.
