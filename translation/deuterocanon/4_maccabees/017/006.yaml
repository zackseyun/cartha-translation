- issue: Sense of παῖς applied to Abraham
  chosen_reading: Abraham the servant
  alternative_readings:
  - Abraham the child
  - Abraham the slave
  rationale: The phrase most naturally identifies Abraham with an honorific title
    of service before God. This preserves the likely allusive, reverential force without
    importing a stronger social-status emphasis than the context requires.
