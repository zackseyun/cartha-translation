translation:
  text: For your childbearing was from Abraham the servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Abraham the child'; the Greek word can mean either 'child' or 'servant,'
      though 'servant' fits the context better here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦ γὰρ
  chosen: For ... was
  alternatives:
  - for ... existed
  - for ... indeed was
  lexicon: BDAG
  rationale: γάρ gives explanatory force, best carried by 'for.' ἦ is the imperfect
    of εἰμί, here functioning as a simple past-state copula in English.
- source_word: ἡ παιδοποιία
  chosen: your childbearing
  alternatives:
  - your bearing of children
  - your motherhood
  - your fertility
  lexicon: LSJ
  rationale: The noun denotes the begetting/bearing of children. 'Childbearing' is
    concise and preserves the concrete reproductive sense better than the broader
    'motherhood.'
- source_word: σου
  chosen: your
  lexicon: BDAG
  rationale: Second-person singular possessive, addressing the mother directly.
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - derived from
  - traced back to
  lexicon: BDAG
  rationale: ἀπό here marks source or origin. 'From' is the most direct rendering,
    while the context implies lineage or descent.
- source_word: Ἀβραὰμ
  chosen: Abraham
  rationale: Standard English transliteration of the patriarch's name.
- source_word: τοῦ παιδός
  chosen: the servant
  alternatives:
  - the child
  - the slave
  lexicon: BDAG
  rationale: παῖς can mean 'child' or 'servant/slave.' In relation to Abraham, 'the
    servant' best fits Jewish reverential language for God's servant Abraham and avoids
    the misleading sense that Abraham is here called merely 'the child.' 'Slave' is
    possible lexically, but this context points more to honorific service than bonded-status
    emphasis.
