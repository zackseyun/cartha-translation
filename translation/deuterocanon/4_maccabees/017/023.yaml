id: 4MA.17.23
reference: 4 Maccabees 17:23
source:
  edition: lxx-swete-1909
  text: πρὸς γὰρ τὴν ἀνδρίαν αὐτῶν καὶ τὴν ἀρετὴν καὶ τὴν ἐν ταῖς βασάνοις αὐτῶν ὑπομονὴν
    ὁ τύραννος ἀφιδὼν Ἀντίοχος ἀνεκήρυξεν τοὺς στρατιώτας αὐτοῦ εἰς ὑπόδειγμα τὴν
    ἐκείνων ὑπομονήν.
  language: Greek
  pages:
  - 783
  confidence: high
  validation: minor_mismatch
translation:
  text: For when the tyrant Antiochus saw their courage and virtue and their endurance
    in tortures, he proclaimed their endurance as an example to his soldiers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'courage' or 'bravery' for 'manliness' (ἀνδρίαν). The Greek term is explicitly
      gendered and refers to manly courage or fortitude.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνδρίαν
  chosen: manliness
  alternatives:
  - courage
  - bravery
  lexicon: LSJ
  rationale: The noun denotes manly courage/fortitude. 'Manliness' preserves the gendered
    force of the Greek per the project's gender-accurate policy, while also fitting
    the honor-language of the passage. 'Courage' is possible but loses the explicit
    masculine coloring.
- source_word: ἀρετὴν
  chosen: virtue
  alternatives:
  - excellence
  lexicon: LSJ
  rationale: ἀρετή here refers to moral excellence/nobility. 'Virtue' is the most
    natural concise rendering in this ethical context; 'excellence' is broader and
    less specifically moral.
- source_word: βασάνοις
  chosen: tortures
  alternatives:
  - torments
  - tests
  lexicon: LSJ
  rationale: In this martyrdom context βάσανοι refers to inflicted tortures, not merely
    trials or tests. 'Tortures' makes the physical severity explicit.
- source_word: ὑπομονὴν
  chosen: endurance
  alternatives:
  - steadfastness
  - perseverance
  - patience
  lexicon: BDAG
  rationale: The term denotes steadfast endurance under suffering. 'Endurance' is
    clear modern English and suits both occurrences in the verse. 'Patience' is too
    weak; 'perseverance' is possible but slightly less concrete in a torture context.
- source_word: ἀφιδὼν
  chosen: saw
  alternatives:
  - having observed
  - looking upon
  lexicon: LSJ
  rationale: The participle means seeing/observing. 'Saw' gives smooth English in
    the temporal clause without over-translating the participial form.
- source_word: ἀνεκήρυξεν
  chosen: proclaimed
  alternatives:
  - declared publicly
  - announced
  lexicon: LSJ
  rationale: The verb carries a public declarative sense. 'Proclaimed' preserves that
    formal/public nuance better than the more generic 'announced'.
- source_word: ὑπόδειγμα
  chosen: an example
  alternatives:
  - a model
  - an object lesson
  lexicon: LSJ
  rationale: The word denotes a pattern or example set before others. 'An example'
    is idiomatic and sufficiently precise in context.
- source_word: στρατιώτας
  chosen: soldiers
  alternatives:
  - troops
  lexicon: LSJ
  rationale: The direct referent is military personnel under Antiochus. 'Soldiers'
    is the straightforward rendering.
