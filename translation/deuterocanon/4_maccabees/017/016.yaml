translation:
  text: Who did not marvel at the athletes of the law of truth? Who was not astonished?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the true law.' The Greek phrase can be understood either as a genitive
      expression ('the law of truth') or as describing the law as true.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθαύμασαν
  chosen: did not marvel
  alternatives:
  - did not admire
  - did not wonder
  lexicon: BDAG
  rationale: The verb denotes amazement or admiration. 'Marvel' preserves the rhetorical
    force and elevated tone better than the flatter 'admire' or the more ambiguous
    'wonder.'
- source_word: ἀθλητάς
  chosen: athletes
  alternatives:
  - champions
  - contestants
  - fighters
  lexicon: LSJ
  rationale: The noun literally refers to competitors in an athletic contest. 4 Maccabees
    regularly uses athletic imagery for martyrdom and virtuous endurance, so 'athletes'
    preserves the metaphor rather than interpreting it away as 'champions' or 'fighters.'
- source_word: νομοθεσίας
  chosen: law
  alternatives:
  - legislation
  - lawgiving
  - legal order
  lexicon: LSJ
  rationale: Although the noun can denote legislation or lawgiving, in this genitival
    construction it points to the divinely given legal order to which the martyrs
    are devoted. 'Law' is the most natural English rendering here, while 'legislation'
    is too bureaucratic and 'lawgiving' too process-oriented.
- source_word: ἀληθείας
  chosen: truth
  alternatives:
  - 'true'
  - reality
  lexicon: BDAG
  rationale: The genitive qualifies the law as belonging to or characterized by truth.
    'Truth' is the straightforward rendering and preserves the moral-theological weight
    of the phrase.
- source_word: τῆς ἀληθείας νομοθεσίας
  chosen: the law of truth
  alternatives:
  - the true law
  - the legislation of truth
  lexicon: LSJ
  rationale: The Greek permits either an attributive sense ('true law') or a more
    literal genitival expression. 'The law of truth' keeps the Greek structure visible
    and retains the solemn rhetorical style of the passage.
- source_word: ἐξεπλάγησαν
  chosen: was not astonished
  alternatives:
  - was not amazed
  - was not struck with wonder
  lexicon: BDAG
  rationale: This verb intensifies the reaction of amazement. 'Astonished' differentiates
    it slightly from the previous 'marvel' while preserving the parallel rhetorical
    questions.
- source_word: τίνες
  chosen: Who
  alternatives:
  - What people
  - Which ones
  lexicon: BDAG
  rationale: 'In repeated rhetorical questions, idiomatic English prefers singular
    ''Who'' with generic force: ''Who did not...?'' This best conveys the universalizing
    rhetoric.'
