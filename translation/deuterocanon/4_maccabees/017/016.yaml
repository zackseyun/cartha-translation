theological_decisions:
- issue: Metaphorical framing of the martyrs as ἀθλητάς
  chosen_reading: Retain the athletic metaphor explicitly as 'athletes.'
  alternative_readings:
  - Interpret the metaphor as 'champions' or 'fighters'
  rationale: The verse praises those who contended for fidelity to God's law. Preserving
    the metaphor respects the author's imagery and avoids importing a narrower military
    or purely honorific sense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Rendering τῆς ἀληθείας νομοθεσίας
  chosen_reading: Translate as 'the law of truth.'
  alternative_readings:
  - the true law
  rationale: The phrase likely characterizes the Mosaic law as aligned with truth.
    The more literal rendering preserves the text's theological texture without over-resolving
    the genitive relationship.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
