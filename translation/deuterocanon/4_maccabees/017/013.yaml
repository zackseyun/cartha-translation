translation:
  text: Eleazar was taking the lead in the contest; the mother of the seven sons was
    competing like an athlete; and the brothers were contending.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek uses a sequence of contest verbs: Eleazar ''went before in the contest,''
      the mother ''competed athletically,'' and the brothers ''contended.'' The translation
      preserves the shared struggle imagery with slightly varied English phrasing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προηγωνίζετο
  chosen: was taking the lead in the contest
  alternatives:
  - was fighting in the front
  - was competing first
  - was leading the struggle
  lexicon: LSJ
  rationale: The imperfect middle/passive of προαγωνίζομαι conveys going before others
    in contest, not merely participating. 'Was taking the lead in the contest' preserves
    both the athletic/combat metaphor and the sense that Eleazar precedes the others
    as exemplar.
- source_word: ἐνήθλει
  chosen: was competing like an athlete
  alternatives:
  - was contending
  - was struggling athletically
  - was entering the contest
  lexicon: LSJ
  rationale: From ἀθλέω, the verb is explicitly athletic. Rendering it with 'athlete'
    preserves the metaphorical field that runs through the verse, while still reading
    naturally in English.
- source_word: ἠγωνίζοντο
  chosen: were contending
  alternatives:
  - were competing
  - were fighting
  - were struggling
  lexicon: BDAG
  rationale: ἀγωνίζομαι can denote contest, struggle, or fight. 'Were contending'
    keeps the broad agonistic sense without over-specifying literal combat, fitting
    the martyrdom context and the verse's repeated contest imagery.
- source_word: μήτηρ τῶν ἑπτὰ παίδων
  chosen: the mother of the seven sons
  alternatives:
  - the mother of the seven children
  lexicon: LSJ
  rationale: Although παῖδες can mean 'children,' in this narrative the seven are
    male siblings, so 'sons' is more precise and contextually accurate.
- source_word: ἀδελφοὶ
  chosen: the brothers
  alternatives:
  - the siblings
  lexicon: BDAG
  rationale: The Greek is specifically masculine plural and refers to the seven male
    brothers. Per translation philosophy, a gender-accurate rendering is preferred
    over a neutral one.
