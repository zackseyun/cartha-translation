theological_decisions:
- issue: Sustaining the verse's agonistic metaphor
  chosen_reading: Retain contest/athletic language across all three clauses
  alternative_readings:
  - Flatten the imagery into general endurance language such as 'endured' or 'suffered
    courageously'
  rationale: The Greek deliberately varies cognate contest verbs to portray martyrdom
    as a noble struggle. Preserving that metaphor is important to the rhetoric of
    4 Maccabees and should not be reduced to generic suffering language.
