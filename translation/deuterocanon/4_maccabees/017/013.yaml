id: 4MA.17.13
reference: 4 Maccabees 17:13
source:
  edition: lxx-swete-1909
  text: Ἐλεάζαρ δὲ προηγωνίζετο· ἡ δὲ μήτηρ τῶν ἑπτὰ παίδων ἐνήθλει· οἱ δὲ ἀδελφοὶ
    ἠγωνίζοντο·
  language: Greek
