theological_decisions:
- issue: Sense of ἁγιασθέντες in a martyrdom context
  chosen_reading: The martyrs are described as having been made holy through God.
  alternative_readings:
  - The martyrs are described as consecrated by God in a more cultic sense.
  rationale: The immediate context honors the martyrs and attributes national deliverance
    to their faithfulness. The wording supports a real sanctified status without requiring
    a narrower sacrificial-office meaning. The translation preserves the holiness
    language while avoiding over-specification.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
- issue: Agency in διὰ θεοῦ
  chosen_reading: through God
  alternative_readings:
  - by God
  rationale: The phrase attributes their sanctified status to divine agency while
    retaining the preposition actually used in the Greek. This avoids flattening the
    wording into a more direct formulation than the source text gives.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition.'
