id: 4MA.17.19
reference: 4 Maccabees 17:19
source:
  edition: lxx-swete-1909
  text: καὶ οὗτοι οὖν ἁγιασθέντες διὰ θεοῦ τετίμηνται οὐ μόνον οὖν ταύτῃ τῇ τιμῇ,
    ἀλλὰ καὶ τῷ διʼ αὐτοὺς τὸ ἔθνος ἡμῶν τοὺς πολεμίους μὴ ἐπικρατῆσαι,
  language: Greek
