translation:
  text: And so these men also, having been made holy through God, have been honored
    not only with this honor, but also because through them our nation did not let
    the enemies prevail,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by God' for 'through God'; the Greek uses διά with the genitive, which
      can express agency.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁγιασθέντες
  chosen: having been made holy
  alternatives:
  - having been sanctified
  - having been consecrated
  lexicon: BDAG
  rationale: Aorist passive participle of ἁγιάζω. 'Made holy' is clear modern English
    and preserves the passive sense without importing later technical theological
    nuance more strongly than the context requires. 'Sanctified' is possible but more
    ecclesiastical; 'consecrated' is narrower and can suggest cultic appointment rather
    than the broader holy status conferred here.
- source_word: διὰ θεοῦ
  chosen: through God
  alternatives:
  - by God
  - through the agency of God
  lexicon: BDAG
  rationale: διά with genitive commonly expresses agency or means. 'Through God' stays
    close to the Greek wording and preserves a slightly mediated sense; 'by God' is
    also viable, but the source text explicitly uses διά rather than a simpler agent
    construction.
- source_word: τετίμηνται
  chosen: have been honored
  alternatives:
  - have been esteemed
  - have been given honor
  lexicon: BDAG
  rationale: Perfect passive of τιμάω, indicating a present state resulting from honor
    bestowed. 'Have been honored' is idiomatic and preserves both the passive and
    the enduring result.
- source_word: ταύτῃ τῇ τιμῇ
  chosen: with this honor
  alternatives:
  - by this honor
  - with this distinction
  lexicon: BDAG
  rationale: The dative is best rendered instrumentally or associatively here. 'With
    this honor' is natural and keeps the lexical link with τετίμηνται/τιμή. 'Distinction'
    is interpretive and less transparent.
- source_word: τῷ διʼ αὐτοὺς
  chosen: because through them
  alternatives:
  - in that through them
  - for through them
  lexicon: BDAG
  rationale: The article with the following clause functions substantivally, introducing
    an additional basis of honor. 'Because through them' captures the causal force
    in readable English while retaining διά.
- source_word: τὸ ἔθνος ἡμῶν
  chosen: our nation
  alternatives:
  - our people
  lexicon: BDAG
  rationale: ἔθνος here refers to the Jewish national community. 'Nation' best reflects
    the collective-political sense; 'people' is possible but less specific.
- source_word: τοὺς πολεμίους
  chosen: the enemies
  alternatives:
  - their enemies
  - the hostile ones
  lexicon: BDAG
  rationale: The article marks a definite group already understood in context. 'The
    enemies' is the most direct rendering.
- source_word: μὴ ἐπικρατῆσαι
  chosen: did not let ... prevail
  alternatives:
  - did not allow ... to overpower
  - did not permit ... to gain the upper hand
  lexicon: BDAG
  rationale: The infinitive ἐπικρατῆσαι means to prevail over, overpower, or gain
    mastery. Because the Greek construction ties this to τὸ ἔθνος ἡμῶν, the sense
    is that through these martyrs the nation was not overcome by its enemies. English
    requires some unpacking; 'did not let the enemies prevail' is concise and preserves
    the outcome-oriented sense.
