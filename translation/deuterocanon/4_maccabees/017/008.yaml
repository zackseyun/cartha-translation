translation:
  text: 'For it would indeed have been fitting to inscribe even these words on his
    very tombstone, spoken as a memorial for those of the nation:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the epitaph itself.' The Greek ἐπιτάφιον can refer to the funerary
      inscription or the monument bearing it.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄξιον ἦν
  chosen: it would indeed have been fitting
  alternatives:
  - it was worthy
  - it was proper
  lexicon: LSJ
  rationale: Idiomatic impersonal expression indicating what was appropriate or deserved.
    'Would ... have been fitting' captures the rhetorical force in natural English
    better than the stiffer 'it was worthy.'
- source_word: ἐπὶ αὐτοῦ τοῦ ἐπιταφίου
  chosen: on his very tombstone
  alternatives:
  - on the epitaph itself
  - upon his grave marker itself
  lexicon: LSJ
  rationale: ἐπιτάφιον here refers to a funerary inscription/monument context. Because
    the following verb is 'inscribe,' 'tombstone' communicates the physical object
    naturally, while αὐτοῦ τοῦ adds emphasis, reflected by 'his very.'
- source_word: ἀναγράψαι
  chosen: to inscribe
  alternatives:
  - to write up
  - to engrave
  lexicon: LSJ
  rationale: The verb commonly means to record publicly or inscribe. In the context
    of an epitaph, 'inscribe' is the most precise English choice.
- source_word: καὶ ταῦτα
  chosen: even these words
  alternatives:
  - also these things
  - these too
  lexicon: LSJ
  rationale: The demonstrative likely points forward to the content of the memorial
    statement. 'These words' makes explicit in English what is implied by the participle
    'spoken' and suits epitaph language.
- source_word: τοῖς ἀπὸ τοῦ ἔθνους
  chosen: for those of the nation
  alternatives:
  - for those from the nation
  - for the people of the nation
  - for those of our people
  lexicon: LSJ
  rationale: Literally 'those from the nation.' In 4 Maccabees, ἔθνος commonly refers
    to the Jewish people/nation. 'Those of the nation' preserves the collective-national
    sense without overparaphrasing to 'our people,' which is not explicit.
- source_word: εἰς μνείαν
  chosen: as a memorial
  alternatives:
  - for remembrance
  - for a memorial
  lexicon: LSJ
  rationale: The phrase expresses purpose/result. 'As a memorial' is concise and idiomatic
    in English while preserving commemorative force.
- source_word: λεγόμενα
  chosen: spoken
  alternatives:
  - said
  - being spoken
  lexicon: LSJ
  rationale: The participle modifies 'these words/things.' 'Spoken' keeps the verbal
    nuance while fitting the English sentence structure.
