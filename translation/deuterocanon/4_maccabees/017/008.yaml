  text: καὶ γὰρ ἄξιον ἦν καὶ ἐπὶ αὐτοῦ τοῦ ἐπιταφίου ἀναγράψαι καὶ ταῦτα τοῖς ἀπὸ
    τοῦ ἔθνους εἰς μνείαν λεγόμενα
  language: Greek
