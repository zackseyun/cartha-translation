translation:
  text: These also vindicated the nation, looking to God, and enduring tortures even
    to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'avenged the nation' or 'won justice for the nation.' The Greek verb
      can carry judicial or retributive force; here the context of martyrdom favors
      the sense of vindication before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἳ καὶ
  chosen: These also
  alternatives:
  - who also
  - they too
  lexicon: LSJ
  rationale: Uses a natural demonstrative in English to continue the discourse while
    preserving the additive force of καί.
- source_word: ἐξεδίκησαν
  chosen: vindicated
  alternatives:
  - avenged
  - won justice for
  - defended
  lexicon: LSJ
  rationale: The verb can mean avenge or exact justice, but here the sense is that
    their faithful suffering secured justice/honor for the nation before God rather
    than violent retaliation. 'Vindicated' best fits the context.
- source_word: τὸ ἔθνος
  chosen: the nation
  alternatives:
  - the people
  - the race
  lexicon: LSJ
  rationale: ἔθνος here refers to the Jewish people as a corporate national body.
    'Nation' preserves that collective sense better than the more generic 'people'.
- source_word: εἰς θεὸν ἀφορῶντες
  chosen: looking to God
  alternatives:
  - fixing their gaze on God
  - looking toward God
  lexicon: LSJ
  rationale: ἀφοράω with εἰς conveys directing one's attention toward. 'Looking to
    God' is idiomatic, concise, and preserves the orientation of trust and focus without
    overinterpreting.
- source_word: μέχρι θανάτου
  chosen: even to death
  alternatives:
  - until death
  - to the point of death
  lexicon: LSJ
  rationale: The phrase marks the extremity of their endurance. 'Even to death' communicates
    both limit and emphasis in natural English.
- source_word: τὰς βασάνους
  chosen: tortures
  alternatives:
  - torments
  - sufferings
  lexicon: LSJ
  rationale: βάσανοι in this martyrdom context refers specifically to inflicted tortures,
    not merely general suffering. 'Tortures' preserves the severity.
- source_word: ὑπομείναντες
  chosen: enduring
  alternatives:
  - having endured
  - bearing up under
  lexicon: LSJ
  rationale: A participle of steadfast endurance. 'Enduring' works smoothly in English
    alongside the other participial phrase and keeps the ongoing sense.
