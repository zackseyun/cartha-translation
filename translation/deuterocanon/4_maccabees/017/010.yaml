theological_decisions:
- issue: Sense of ἐξεδίκησαν in a martyrdom context
  chosen_reading: Their deaths 'vindicated' the nation before God.
  alternative_readings:
  - Their deaths 'avenged' the nation.
  - Their deaths 'won justice for' the nation.
  rationale: Because the immediate context is nonviolent martyrdom and appeal to God,
    a rendering implying retaliatory violence would mislead. The line presents their
    faithful endurance as effecting the nation's vindication in relation to God.
  doctrine_reference: 'Translation philosophy: preserve source sense over traditional
    inertia; do not import doctrinal claims the text does not make.'
