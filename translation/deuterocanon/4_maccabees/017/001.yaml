translation:
  text: Some of the king’s guards also said that when she too was about to be seized
    for death, she threw herself onto the pyre so that they might not touch any part
    of her body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bodyguards' or more literally 'spearmen.' The Greek term refers to royal
      guards.
    reason: lexical_alternative
  - marker: b
    text: The verse presents this as a report from some of the guards, not as an unqualified
      narrator statement.
    reason: alternative_reading
lexical_decisions:
- source_word: δορυφόρων
  chosen: the king’s guards
  alternatives:
  - bodyguards
  - spearmen
  - guards
  lexicon: LSJ
  rationale: δορυφόρος literally denotes a spear-bearer, often a royal guard or bodyguard.
    In this context the referent is the ruler’s attendants involved in the executions,
    so 'the king’s guards' conveys the institutional role more clearly than the overly
    literal 'spearmen.' 'King’s' is supplied from context in 4 Maccabees, where the
    persecuting authority is the king.
- source_word: συλλαμβάνεσθαι
  chosen: to be seized
  alternatives:
  - to be arrested
  - to be taken
  lexicon: BDAG
  rationale: The passive infinitive here indicates being physically taken into custody.
    'Seized' fits the violent context and avoids anachronistically formal legal nuance
    that 'arrested' can suggest.
- source_word: πρὸς θάνατον
  chosen: for death
  alternatives:
  - to death
  - for execution
  lexicon: LSJ
  rationale: 'The phrase marks purpose or result: she was being taken with death as
    the intended outcome. ''For death'' preserves the Greek compactness and solemnity;
    in English it naturally implies execution in context.'
- source_word: ψαύσειέν
  chosen: might not touch
  alternatives:
  - might not lay hold of
  - might not handle
  lexicon: BDAG
  rationale: ψαύω commonly means 'touch' or 'take hold of.' Here the concern is physical
    contact with her body before death, so 'touch' is the most natural and sufficiently
    strong rendering.
- source_word: τι τοῦ σώματος αὐτῆς
  chosen: any part of her body
  alternatives:
  - anything of her body
  - her body at all
  lexicon: LSJ
  rationale: The partitive expression is awkward if rendered too literally. 'Any part
    of her body' brings out the sense that she sought to prevent even the slightest
    physical contact.
- source_word: ἑαυτὴν ἔρριψεν
  chosen: she threw herself
  alternatives:
  - she cast herself
  - she hurled herself
  lexicon: BDAG
  rationale: The idiom is reflexive and forceful. 'Threw herself' is vivid, natural
    English and preserves the deliberate self-action.
- source_word: κατὰ τῆς πυρᾶς
  chosen: onto the pyre
  alternatives:
  - upon the pyre
  - into the fire
  lexicon: LSJ
  rationale: πυρά is specifically a funeral or execution pyre, not merely generic
    fire. 'Onto the pyre' preserves that specificity. Although κατά with the genitive
    can suggest motion against/down upon, idiomatic English here is 'onto.'
