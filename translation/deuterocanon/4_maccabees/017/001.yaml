theological_decisions:
- issue: Narrative portrayal of the mother’s final act
  chosen_reading: Render the statement straightforwardly as a reported claim by some
    guards that she deliberately threw herself onto the pyre before they could seize
    and touch her.
  alternative_readings:
  - Interpret the report more loosely as a later tradition rather than a concrete
    historical claim
  - Translate more euphemistically to soften the violence of the act
  rationale: The verse is introduced with ἔλεγον ... τινές ('some ... were saying'),
    which marks this as reported testimony rather than omniscient narration. The translation
    preserves that distancing while still rendering the event plainly. No doctrinal
    pressure warrants softening the self-sacrificial action.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
