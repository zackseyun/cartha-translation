id: 4MA.17.1
reference: 4 Maccabees 17:1
source:
  edition: lxx-swete-1909
  text: ἔλεγον δὲ καὶ τῶν δορυφόρων τινὲς ὡς ὅτε ἔμελλεν καὶ αὐτὴ συλλαμβάνεσθαι πρὸς
    θάνατον, ἵνα μὴ ψαύσειέν τι τοῦ σώματος αὐτῆς, ἑαυτὴν ἔρριψεν κατὰ τῆς πυρᾶς.
  language: Greek
