translation:
  text: and that the tyrant should be punished and the homeland should be purified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cleansed.' The Greek can suggest purification from defilement in a ritual,
      moral, or national sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: τύραννον
  chosen: the tyrant
  alternatives:
  - the king
  - the despot
  lexicon: LSJ
  rationale: τύραννος commonly denotes a ruler with oppressive or absolute power.
    In 4 Maccabees, the term is polemical and morally charged, so 'the tyrant' best
    preserves the author's evaluative force.
- source_word: τιμωρηθῆναι
  chosen: should be punished
  alternatives:
  - to be avenged upon
  - to be penalized
  lexicon: LSJ
  rationale: The aorist passive infinitive expresses the tyrant's receiving punishment.
    'Should be punished' fits the infinitival sequence in English and preserves the
    judicial/retributive sense without over-specifying vengeance.
- source_word: πατρίδα
  chosen: the homeland
  alternatives:
  - the fatherland
  - the country
  lexicon: LSJ
  rationale: πατρίς refers to one's ancestral land or native country. 'Homeland' is
    natural modern English and retains the patriotic and familial resonance better
    than the more archaic 'fatherland'.
- source_word: καθαρισθῆναι
  chosen: should be purified
  alternatives:
  - should be cleansed
  - to be made clean
  lexicon: LSJ
  rationale: καθαρίζω can denote cleansing in ritual or moral-political senses. 'Purified'
    preserves the elevated register and allows both cultic and national restoration
    overtones present in the context.
