id: 4MA.17.7
reference: 4 Maccabees 17:7
source:
  edition: lxx-swete-1909
  text: Εἰ δὲ ἔξον ἡμῖν ἦν, ὥσπερ τινός, ζωγραφῆσαι τὴν τῆς ἱστορίας σου εὐσέβειαν,
    οὐκ ἂν ἔφριττον οἱ θεωροῦντες μητέρα ἑπτὰ τέκνων διʼ εὐσέβειαν ποικίλας βασάνους
    μέχρι θανάτου ὑπομενούσαν;
