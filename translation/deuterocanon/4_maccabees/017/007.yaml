translation:
  text: But if it were possible for us, as for a painter, to portray the godliness
    of your story, would not those who saw it shudder at a mother of seven children
    enduring various tortures unto death because of godliness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'piety' for 'godliness' in both occurrences of εὐσέβεια.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ δὲ ἔξον ἡμῖν ἦν
  chosen: But if it were possible for us
  alternatives:
  - But if it were permitted for us
  - But if we were able
  lexicon: LSJ
  rationale: ἔξον with ἦν expresses possibility/permission. In this rhetorical setup,
    'it were possible for us' is natural English and preserves the hypothetical force
    without over-literal awkwardness.
- source_word: ὥσπερ τινός, ζωγραφῆσαι
  chosen: as for a painter, to depict
  alternatives:
  - like someone, to paint
  - as if by some artist, to portray
  lexicon: LSJ
  rationale: ζωγραφῆσαι specifically means to paint from life/portray vividly. The
    phrase is elliptical; taking τινός in the sense of 'some artist/person skilled
    in painting' yields idiomatic English. 'Depict' preserves the visual metaphor
    without forcing a wooden 'paint' in a nonliteral context.
- source_word: τὴν τῆς ἱστορίας σου εὐσέβειαν
  chosen: the godliness of your story
  alternatives:
  - the piety of your history
  - the devoutness shown in your account
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees is a key virtue denoting reverence/devout fidelity
    toward God; 'godliness' is accessible and weighty. ἱστορία here is best taken
    as 'account/story' rather than modern 'history' in the technical sense. The genitive
    construction is rendered smoothly in English.
- source_word: οὐκ ἂν ἔφριττον
  chosen: would not ... shudder
  alternatives:
  - would not ... tremble
  - would not ... be horrified
  lexicon: LSJ
  rationale: φρίσσω/ἔφριττον conveys shuddering or bristling with horror. 'Shudder'
    captures the visceral reaction and fits the rhetorical question.
- source_word: οἱ θεωροῦντες
  chosen: those who looked on
  alternatives:
  - the spectators
  - those who saw
  lexicon: LSJ
  rationale: The participle denotes observers/spectators. 'Those who looked on' preserves
    the participial sense and the scene's immediacy.
- source_word: μητέρα ἑπτὰ τέκνων
  chosen: a mother of seven children
  alternatives:
  - a mother of seven sons
  lexicon: LSJ
  rationale: τέκνα means 'children' rather than specifically 'sons.' Although the
    broader narrative concerns seven brothers, this verse uses the more general term,
    so the translation should reflect that lexical choice.
- source_word: διʼ εὐσέβειαν
  chosen: because of godliness
  alternatives:
  - for the sake of godliness
  - because of piety
  lexicon: LSJ
  rationale: διά with the accusative indicates reason or motive. Repeating 'godliness'
    preserves the author's thematic emphasis on εὐσέβεια rather than varying the term
    for style.
- source_word: ποικίλας βασάνους
  chosen: varied tortures
  alternatives:
  - various torments
  - many kinds of tortures
  lexicon: LSJ
  rationale: ποικίλας emphasizes diversity of kinds; βάσανοι in this martyrdom context
    are tortures rather than generic sufferings. 'Varied tortures' is concise and
    vivid.
- source_word: μέχρι θανάτου ὑπομενούσαν
  chosen: enduring ... all the way to death
  alternatives:
  - enduring ... until death
  - persevering under ... to the point of death
  lexicon: LSJ
  rationale: ὑπομένω denotes steadfast endurance under suffering. 'All the way to
    death' communicates the extent of endurance in natural English while preserving
    the phrase's force.
