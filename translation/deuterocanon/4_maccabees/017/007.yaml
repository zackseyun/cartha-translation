theological_decisions:
- issue: Rendering εὐσέβεια in a martyrdom context
  chosen_reading: godliness
  alternative_readings:
  - piety
  - devoutness
  rationale: The book repeatedly foregrounds εὐσέβεια as reverent fidelity toward
    God. 'Godliness' preserves the explicitly God-directed dimension better than the
    somewhat narrower or more archaic 'piety,' while remaining readable modern English.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; consistency of key terms,
    or documented exception'
