translation:
  text: Therefore take courage, O mother with a holy soul, bravely holding the hope
    of endurance toward God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holy-souled mother.' The Greek adjective ἱερόψυχε is a compact compound
      expression of sacred or holy inner character.
    reason: lexical_alternative
lexical_decisions:
- source_word: θάρρει
  chosen: take courage
  alternatives:
  - be courageous
  - be of good courage
  - have courage
  lexicon: LSJ
  rationale: Imperative of θαρρέω calling for boldness or courage. 'Take courage'
    is idiomatic modern English and preserves the exhortatory force.
- source_word: τοιγαροῦν
  chosen: therefore
  alternatives:
  - so then
  - accordingly
  lexicon: LSJ
  rationale: Inferential particle drawing a conclusion from the preceding context.
    'Therefore' is concise and natural.
- source_word: μῆτηρ
  chosen: mother
  lexicon: LSJ
  rationale: Direct address to the woman in the narrative; straightforward rendering.
- source_word: ἱερόψυχε
  chosen: of a holy soul
  alternatives:
  - holy-souled
  - sacred-hearted
  - noble-souled
  lexicon: LSJ
  rationale: Compound adjective literally involving holiness/sacredness and soul.
    'Of a holy soul' preserves the semantic components more transparently than the
    less natural 'holy-souled.'
- source_word: ἐλπίδα
  chosen: hope
  alternatives:
  - expectation
  lexicon: LSJ
  rationale: Standard sense is 'hope'; no contextual reason to weaken it.
- source_word: ὑπομονῆς
  chosen: of endurance
  alternatives:
  - of steadfastness
  - of perseverance
  lexicon: LSJ
  rationale: Genitive most naturally qualifying the kind of hope she holds. 'Endurance'
    is a clear, accessible rendering for ὑπομονή in this martyrdom context.
- source_word: γενναίως
  chosen: with noble courage
  alternatives:
  - bravely
  - nobly
  - courageously
  lexicon: LSJ
  rationale: Adverb from γενναῖος can denote nobly or bravely. Because English already
    used 'take courage' for θάρρει, 'with noble courage' preserves the adverb's moral
    nobility without flattening it into repetition.
- source_word: ἔχουσα
  chosen: holding fast
  alternatives:
  - having
  - holding
  lexicon: LSJ
  rationale: Participle describing the manner in which the mother is to take courage.
    'Holding fast' makes explicit the persevering nuance appropriate to the object
    'hope of endurance,' while remaining within the semantic range of ἔχω.
- source_word: πρὸς θεόν
  chosen: toward God
  alternatives:
  - in relation to God
  - before God
  lexicon: LSJ
  rationale: πρός with accusative here indicates orientation or direction. 'Toward
    God' preserves that orientation without overinterpreting it as specifically 'in
    God.'
