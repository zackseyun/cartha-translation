id: 4MA.17.24
reference: 4 Maccabees 17:24
source:
  edition: lxx-swete-1909
  text: ἔσχεν τε αὐτοὺς γενναίους καὶ ἀνδρείους εἰς πεζομαχίαν καὶ πολιορκίαν, καὶ
    ἐκπορθήσας ἐνίκησεν πάντας τοὺς πολεμίους.
  language: Greek
  pages:
  - 783
  confidence: high
  validation: agree
translation:
  text: And it made them noble and courageous in infantry combat and siege warfare,
    and after sacking them, he conquered all the enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for infantry battle'; the Greek literally refers to fighting on foot.
    reason: lexical_alternative
  - marker: b
    text: The Greek participle means 'after sacking' or 'after devastating' and commonly
      has cities or strongholds in view.
    reason: lexical_alternative
  - marker: c
    text: The Greek leaves the subject compressed and somewhat implicit in this clause;
      the English preserves that abruptness rather than specifying a subject from
      the wider context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔσχεν
  chosen: it made
  alternatives:
  - it had
  - it kept
  - it rendered
  lexicon: BDAG
  rationale: 'Although ἔχω commonly means ''have,'' in this context with a double
    accusative construction (αὐτοὺς γενναίους καὶ ἀνδρείους) it carries a causative/resultative
    sense: ''made/kept them noble and courageous.'' ''Made'' is the clearest natural
    English rendering.'
- source_word: γενναίους
  chosen: noble
  alternatives:
  - high-minded
  - brave
  lexicon: LSJ
  rationale: γενναῖος can denote nobility of character or courage. Since ἀνδρείους
    already covers bravery/courage, 'noble' preserves the distinct moral nuance without
    collapsing the pair into a synonym.
- source_word: ἀνδρείους
  chosen: courageous
  alternatives:
  - brave
  - manly
  lexicon: LSJ
  rationale: '''Courageous'' conveys valor without importing the gendered overtones
    of older English ''manly.'' It pairs well with ''noble'' while preserving the
    second adjective''s martial force.'
- source_word: εἰς πεζομαχίαν
  chosen: in hand-to-hand combat
  alternatives:
  - for infantry battle
  - in fighting on foot
  lexicon: LSJ
  rationale: πεζομαχία refers to fighting on foot, i.e., close infantry combat. 'Hand-to-hand
    combat' communicates the practical sense in readable English better than the more
    technical 'infantry battle.'
- source_word: πολιορκίαν
  chosen: siege warfare
  alternatives:
  - siege
  - besieging
  lexicon: LSJ
  rationale: The noun denotes siege activity. 'Siege warfare' fits the military pairing
    with πεζομαχία and sounds natural in English.
- source_word: ἐκπορθήσας
  chosen: after sacking cities
  alternatives:
  - after ravaging
  - after plundering
  - after storming and destroying
  lexicon: LSJ
  rationale: The participle from ἐκπορθέω commonly refers to sacking or devastating
    cities. Because English usually expects an object with 'sack,' 'cities' is supplied
    idiomatically from the verb's normal military sense.
- source_word: ἐνίκησεν
  chosen: he conquered
  alternatives:
  - he defeated
  - he was victorious over
  lexicon: BDAG
  rationale: νικάω means to conquer or defeat. 'Conquered' matches the elevated military
    register of the sentence and pairs naturally with 'all the enemies.'
- source_word: πάντας τοὺς πολεμίους
  chosen: all the enemies
  alternatives:
  - all his enemies
  - every enemy
  lexicon: BDAG
  rationale: The Greek has the article with plural adjective/substantive, 'all the
    enemies.' 'His' is not explicit, so it is not added.
