theological_decisions:
- issue: Metaphorical description of the mother as structural protection/support for
    her sons
  chosen_reading: Retain the architectural metaphor ('roof,' 'pillar,' 'earthquake')
    rather than interpret it away
  alternative_readings:
  - Render more dynamically as 'you protected your children and endured their sufferings
    steadfastly'
  rationale: The Greek is densely metaphorical. Preserving the imagery is more faithful
    to the source and allows readers to see the author's rhetorical portrayal of the
    mother as a stabilizing, protective figure amid persecution.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering τῶν παίδων
  chosen_reading: '''the children'''
  alternative_readings:
  - '''the sons'''
  rationale: The immediate narrative concerns her sons, but the Greek term itself
    is broader. 'Children' preserves the lexical range while still fitting the context.
    This is not a doctrinal issue, but it affects how specifically the family relationship
    is expressed.
  doctrine_reference: Translation philosophy §4
