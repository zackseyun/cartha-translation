id: 4MA.17.3
reference: 4 Maccabees 17:3
source:
  edition: lxx-swete-1909
  text: καθάπερ γὰρ σὺ στέγη ἐπὶ τοῦ στύλου τῶν παίδων γενναίως ἱδρυμένη, ἀκλινῶς
    ὑπήνεγκας τὸν διὰ τῶν βασάνων σεισμόν.
  language: Greek
  pages:
