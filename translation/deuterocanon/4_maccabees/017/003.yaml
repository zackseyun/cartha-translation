translation:
  text: For just as you, like a roof firmly established upon the pillar of the children,
    bravely bore the earthquake brought on through tortures without wavering,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the sons.' The Greek παῖδες can mean 'children,' 'sons,' or 'boys'
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  chosen: For just as
  alternatives:
  - just as
  - for as
  lexicon: LSJ
  rationale: Introduces a comparison with explanatory force; 'For just as' preserves
    both the comparative and connective sense in context.
- source_word: στέγη
  chosen: roof
  alternatives:
  - covering
  - shelter
  lexicon: LSJ
  rationale: The primary sense is 'roof.' The image is architectural and metaphorical;
    'roof' preserves the vividness better than the more abstract 'shelter.'
- source_word: στύλου
  chosen: pillar
  alternatives:
  - column
  - support
  lexicon: LSJ
  rationale: The noun denotes a structural support. 'Pillar' is idiomatic and keeps
    the architectural metaphor intact.
- source_word: τῶν παίδων
  chosen: of the children
  alternatives:
  - of the sons
  - of the boys
  lexicon: LSJ
  rationale: παῖδες can mean children/sons/boys depending on context. Here it refers
    to the woman's sons in the martyrdom narrative. 'Children' is natural English
    and preserves the maternal relationship without over-specifying age.
- source_word: γενναίως
  chosen: bravely
  alternatives:
  - nobly
  - courageously
  lexicon: LSJ
  rationale: The adverb can carry both courage and nobility. 'Bravely' is concise
    and fits the immediate context of enduring torture.
- source_word: ἱδρυμένη
  chosen: firmly established
  alternatives:
  - founded
  - set fast
  lexicon: LSJ
  rationale: The participle conveys being set firmly in place. 'Firmly established'
    communicates stability within the building metaphor.
- source_word: ἀκλινῶς
  chosen: without wavering
  alternatives:
  - unshaken
  - steadfastly
  lexicon: LSJ
  rationale: Literally 'without inclining/leaning.' In context it describes steadfast
    endurance under pressure; 'without wavering' is clear modern English while preserving
    the metaphor of not being bent aside.
- source_word: ὑπήνεγκας
  chosen: bore
  alternatives:
  - endured
  - withstood
  lexicon: LSJ
  rationale: The verb means to bear up under or endure. 'Bore' fits the metaphorical
    object 'earthquake' and keeps the sentence compact.
- source_word: βασάνων
  chosen: tortures
  alternatives:
  - torments
  - tests
  lexicon: LSJ
  rationale: In this martyrdom context the word refers to physical tortures, not merely
    trials or examinations. 'Tortures' is the most direct rendering.
- source_word: σεισμόν
  chosen: earthquake
  alternatives:
  - shaking
  - convulsion
  lexicon: LSJ
  rationale: The literal sense is 'earthquake.' Since the verse extends an architectural
    metaphor, retaining 'earthquake' preserves the force of the imagery rather than
    flattening it to 'shaking.'
- source_word: διὰ τῶν βασάνων
  chosen: brought on through tortures
  alternatives:
  - through tortures
  - caused by tortures
  lexicon: LSJ
  rationale: The prepositional phrase indicates means or agency. 'Brought on through
    tortures' makes explicit that the metaphorical earthquake consists in or comes
    by means of the tortures.
