theological_decisions:
- issue: Nature of the martyrs' postmortem reward
  chosen_reading: They are portrayed as presently standing beside the divine throne
    and living the blessed age.
  alternative_readings:
  - They stand before the divine throne
  - They enjoy blessed eternity
  rationale: The Greek uses present-oriented language ('now stand,' 'live') and depicts
    exalted postmortem vindication. The translation preserves the imagery without
    systematizing it into later doctrinal categories beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
