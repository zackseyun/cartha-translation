id: 4MA.17.17
reference: 4 Maccabees 17:17
source:
  edition: lxx-swete-1909
  text: Αὐτός γέ τοι ὁ τύραννος καὶ ὅλον τὸ συνέδριον αὐτῶν ἐξεθαύμασαν αὐτῶν τὴν
    ὑπομονήν, διʼ ἣν καὶ τῷ θείῳ νῦν παρεστήκασιν θρόνῳ, καὶ τὸν μακάριον βιοῦσιν
    αἰῶνα·
  language: Greek
