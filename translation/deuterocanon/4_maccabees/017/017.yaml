translation:
  text: Indeed, the tyrant himself and all their council marveled at their endurance,
    because of which they now stand beside the divine throne and live the blessed
    age.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stand before the divine throne.' The Greek verb and dative phrase can
      be understood as attendance in the presence of the throne or close station beside
      it.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'live the blessed age'; this likely refers to a blessed eternal
      state.
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτός γέ τοι
  chosen: Indeed, ... himself
  alternatives:
  - Surely, ... himself
  - He himself indeed
  lexicon: LSJ
  rationale: The particle cluster intensifies the statement. 'Indeed' captures the
    emphatic force in natural English, while 'himself' preserves the emphasis on the
    tyrant personally.
- source_word: ὁ τύραννος
  chosen: the tyrant
  alternatives:
  - the king
  - the ruler
  lexicon: LSJ
  rationale: τύραννος is best rendered 'tyrant' here, matching the book's hostile
    characterization of Antiochus rather than neutral political titles.
- source_word: συνέδριον
  chosen: council
  alternatives:
  - assembly
  - court
  lexicon: LSJ
  rationale: The term denotes the tyrant's assembled governing body or tribunal. 'Council'
    is clear and sufficiently formal without over-specifying institutional structure.
- source_word: ἐξεθαύμασαν
  chosen: marveled
  alternatives:
  - were astonished at
  - admired
  lexicon: LSJ
  rationale: The verb expresses strong amazement. 'Marveled' preserves that sense
    and reads smoothly with the object clause.
- source_word: ὑπομονήν
  chosen: endurance
  alternatives:
  - steadfastness
  - patient endurance
  lexicon: LSJ
  rationale: In this martyrdom context, ὑπομονή refers to steadfast perseverance under
    suffering. 'Endurance' is concise and natural, while retaining moral weight.
- source_word: διʼ ἣν
  chosen: because of which
  alternatives:
  - for which reason
  - through which
  lexicon: LSJ
  rationale: The phrase points back to their endurance as the basis for what follows.
    'Because of which' best conveys the causal connection.
- source_word: τῷ θείῳ ... θρόνῳ
  chosen: the divine throne
  alternatives:
  - God's throne
  - the heavenly throne
  lexicon: LSJ
  rationale: θείῳ is adjectival, literally 'divine.' 'The divine throne' stays close
    to the Greek and avoids importing a more explicit wording than the text uses.
- source_word: παρεστήκασιν
  chosen: stand beside
  alternatives:
  - stand before
  - have taken their stand by
  - are present at
  lexicon: LSJ
  rationale: The perfect form indicates a present state of standing in attendance.
    'Stand beside' fits the dative construction and the honorific scene of proximity
    to the throne.
- source_word: τὸν μακάριον ... αἰῶνα
  chosen: the blessed age
  alternatives:
  - the blessed eternity
  - the blessed life forever
  lexicon: LSJ
  rationale: The phrase is literally 'the blessed age.' In context it refers to the
    blessed eternal state, but 'age' preserves the Greek wording without over-paraphrasing.
- source_word: βιοῦσιν
  chosen: live
  alternatives:
  - are living
  - enjoy
  lexicon: LSJ
  rationale: The simple verb 'live' is the direct lexical equivalent and works idiomatically
    with 'the blessed age' in this elevated context.
