theological_decisions:
- issue: How to construe the martyrs' role in the phrase διʼ αὐτῶν
  chosen_reading: The contest is described as having come about through them, highlighting
    their instrumental participation rather than making them the ultimate source of
    its divine character.
  alternative_readings:
  - the divine contest accomplished by them
  - the contest that happened in their case
  rationale: 'The Greek preposition διά with the genitive normally marks means or
    agency. Rendering it ''through them'' preserves the text''s theological tension:
    the struggle is divine, yet it occurs through the faithful witness of the martyrs.'
  doctrine_reference: Preserve theological tension rather than resolve it.
