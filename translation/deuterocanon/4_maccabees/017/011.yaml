translation:
  text: For truly the contest brought about through them was divine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the divine contest accomplished by them.' The Greek phrase can emphasize
      either that the contest came about through their agency or that it was realized
      in their case.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀληθῶς
  chosen: truly
  alternatives:
  - indeed
  - certainly
  lexicon: BDAG
  rationale: Adverb affirming the statement emphatically. 'Truly' preserves the solemn,
    rhetorical force without sounding overly stiff.
- source_word: ἀγών
  chosen: contest
  alternatives:
  - struggle
  - combat
  - conflict
  lexicon: LSJ
  rationale: In this context of martyr endurance, ἀγών evokes an athletic or public
    struggle. 'Contest' preserves that formal sense better than the more generic 'struggle'.
- source_word: θεῖος
  chosen: divine
  alternatives:
  - godly
  - from God
  lexicon: LSJ
  rationale: The adjective describes the character of the contest as belonging to
    or marked by the divine. 'Divine' is the most direct and idiomatic rendering.
- source_word: ὁ διʼ αὐτῶν γεγενημένος
  chosen: brought about through them
  alternatives:
  - which happened through them
  - which came to pass through them
  - accomplished by them
  lexicon: BDAG
  rationale: The perfect participle γεγενημένος with διʼ αὐτῶν indicates an event
    that came into being through their agency or instrumentality. 'Brought about through
    them' preserves both the completed aspect and the mediating force of διά without
    overstating direct authorship.
