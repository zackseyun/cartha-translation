theological_decisions:
- issue: Sense of purification in relation to the homeland
  chosen_reading: '''the homeland purified'' retains a broad sense that can include
    ritual, moral, and communal cleansing'
  alternative_readings:
  - '''the homeland cleansed'' emphasizing removal of defilement'
  - '''the nation purified'' emphasizing the people more than the land'
  rationale: The text does not specify only ritual or only political cleansing. The
    translation preserves that theological and symbolic breadth rather than narrowing
    it.
