theological_decisions:
- issue: Personification of 'the world' and 'the life of mankind' as spectators
  chosen_reading: Retain the personified imagery in the main text.
  alternative_readings:
  - Render more abstractly as 'the world of human life observed'
  rationale: The Greek presents the event as a public, cosmic-human spectacle. Preserving
    the personification keeps the rhetorical force without importing additional theology.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Supplying an implicit object for ἀντηγωνίζετο
  chosen_reading: Add 'against them' in English.
  alternative_readings:
  - 'Leave the verb absolute: ''The tyrant kept struggling'''
  rationale: The immediate context concerns the tyrant's contest with the martyrs;
    English normally requires the adversarial target to be explicit for clarity. This
    is a contextual completion, not a doctrinal expansion.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
