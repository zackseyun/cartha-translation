theological_decisions:
- issue: Sense of πολιτεία in a Jewish martyrdom context
  chosen_reading: the commonwealth of the Hebrews
  alternative_readings:
  - the way of life of the Hebrews
  - the constitution of the Hebrews
  rationale: The term carries more than private religion; it points to the communal,
    law-ordered life of the Jewish people under their ancestral covenantal order.
    'Commonwealth' preserves that breadth while remaining readable.
  doctrine_reference: Translation philosophy §1, §5
