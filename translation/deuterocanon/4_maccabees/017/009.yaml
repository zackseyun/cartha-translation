translation:
  text: Here lie buried an aged priest, and an aged woman, and seven sons, because
    of a tyrant’s violence, who wanted to abolish the commonwealth of the Hebrews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the way of life of the Hebrews' or 'the constitution of the Hebrews.'
      The Greek term includes the idea of a people's ordered communal life, not merely
      private belief.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐντάφθα
  chosen: Here
  alternatives:
  - In this place
  - Herein
  lexicon: LSJ
  rationale: Deictic adverb introducing the burial site; 'Here' is natural English
    and preserves the epitaph-like force.
- source_word: γέρων ἱερεύς
  chosen: an aged priest
  alternatives:
  - an old priest
  - an elderly priest
  lexicon: LSJ
  rationale: γέρων denotes advanced age; 'aged' is dignified and fits the solemn memorial
    context better than 'old.' ἱερεύς is straightforwardly 'priest.'
- source_word: γυνὴ γεραιά
  chosen: an aged woman
  alternatives:
  - an old woman
  - an elderly woman
  lexicon: LSJ
  rationale: The phrase parallels γέρων ἱερεύς. 'Aged woman' preserves the formal,
    commemorative tone.
- source_word: ἑπτὰ παῖδες
  chosen: seven sons
  alternatives:
  - seven children
  - seven boys
  - seven youths
  lexicon: LSJ
  rationale: In context these are the woman's seven male offspring already narrated
    in the book; 'sons' best captures the familial relationship, even though παῖδες
    can more broadly mean children or boys.
- source_word: ἐγκεκήδευνται
  chosen: lie buried
  alternatives:
  - have been buried
  - are entombed
  lexicon: LSJ
  rationale: Perfect passive conveys a present state resulting from burial. 'Lie buried'
    expresses that resultant state idiomatically in English and suits an inscription-like
    statement.
- source_word: διὰ τυράννου βίαν
  chosen: because of a tyrant’s violence
  alternatives:
  - through a tyrant's violence
  - on account of a tyrant's brutality
  lexicon: LSJ
  rationale: διά with the accusative here indicates cause. 'Violence' is a direct
    rendering of βία and keeps the causal sense clear.
- source_word: τὴν Ἑβραίων πολιτίαν
  chosen: the commonwealth of the Hebrews
  alternatives:
  - the way of life of the Hebrews
  - the constitution of the Hebrews
  - the polity of the Hebrews
  lexicon: LSJ
  rationale: πολιτεία can denote civic order, constitution, or commonwealth. In 4
    Maccabees it often refers to the distinctive covenantal order/law-governed national
    life of the Jews. 'Commonwealth' preserves the corporate-political sense without
    flattening it to merely 'religion' or 'way of life.'
- source_word: καταλῦσαι
  chosen: to abolish
  alternatives:
  - to destroy
  - to overthrow
  - to bring to an end
  lexicon: LSJ
  rationale: The infinitive expresses the tyrant's aim toward the Hebrew πολιτεία.
    'Abolish' fits institutional or constitutional objects well.
- source_word: θέλοντος
  chosen: who wanted
  alternatives:
  - while wanting
  - desiring
  lexicon: LSJ
  rationale: Genitive participle modifying τυράννου. Rendering it as a relative clause
    is clear, natural English and preserves the tyrant's intention.
