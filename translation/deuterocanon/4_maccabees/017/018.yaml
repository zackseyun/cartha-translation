id: 4MA.17.18
reference: 4 Maccabees 17:18
source:
  edition: lxx-swete-1909
  text: καὶ γὰρ φησιν ὁ Μωσῆς Καὶ πάντες οἱ ἡγιασμένοι ὑπὸ τὰς χεῖράς σου.
  language: Greek
  pages:
