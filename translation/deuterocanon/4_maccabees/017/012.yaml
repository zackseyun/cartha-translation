translation:
  text: For virtue was then presiding over the contest for those being tested through
    endurance; the victory was in incorruptibility, in long-lasting life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in eternal life.' The Greek literally says 'in life of long duration,'
      and the surrounding phrase 'in incorruptibility' may suggest an everlasting
      sense.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀθλοθέτει
  chosen: was awarding the contest
  alternatives:
  - was setting the prizes
  - was presiding over the games
  - was acting as contest-judge
  lexicon: LSJ
  rationale: The verb is rare and drawn from athletic/contest imagery. In context
    it depicts virtue as the one assigning or administering the prize of the struggle.
    'Was awarding the contest' preserves the agonistic metaphor without overloading
    the English with an obscure technical term.
- source_word: ἀρετή
  chosen: virtue
  alternatives:
  - excellence
  lexicon: LSJ
  rationale: In 4 Maccabees, ἀρετή is a key moral term for virtuous excellence. 'Virtue'
    is the most natural and established English equivalent here and fits the personified
    use in this clause.
- source_word: διʼ ὑπομονῆς
  chosen: through endurance
  alternatives:
  - by perseverance
  - through steadfastness
  lexicon: BDAG
  rationale: ὑπομονή denotes steadfast endurance under trial. 'Through endurance'
    is concise and preserves the instrumental force of διά.
- source_word: δοκιμάζουσι
  chosen: to those being tested
  alternatives:
  - to those proving themselves
  - to those under trial
  - to the ones being tried
  lexicon: BDAG
  rationale: The participial form here refers to the brothers undergoing testing/trial.
    Because the immediate context is martyrdom under torture, the passive sense 'being
    tested' best fits the situation and keeps the focus on ordeal rather than self-demonstration.
- source_word: τὸ νῖκος
  chosen: the victory
  alternatives:
  - the prize of victory
  - the conquest
  lexicon: LSJ
  rationale: The noun continues the athletic imagery. 'Victory' is the straightforward
    rendering and works well with the following prepositional phrases.
- source_word: ἐν ἀφθαρσίᾳ
  chosen: in incorruptibility
  alternatives:
  - in immortality
  - in imperishability
  lexicon: BDAG
  rationale: ἀφθαρσία can denote imperishability/incorruptibility and by extension
    immortality. 'In incorruptibility' stays closer to the Greek while still conveying
    the sphere or quality of the victory.
- source_word: ἐν ζωῇ πολυχρονίῳ
  chosen: in long-lasting life
  alternatives:
  - in eternal life
  - in life of many years
  - in enduring life
  lexicon: LSJ
  rationale: πολυχρόνιος literally means long-lasting or of long duration. Since the
    Greek does not use the standard term for 'eternal,' 'long-lasting life' avoids
    importing a stronger doctrinal term than the text itself states, while still fitting
    the context of imperishable life.
