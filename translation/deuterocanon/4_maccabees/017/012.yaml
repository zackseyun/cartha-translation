id: 4MA.17.12
reference: 4 Maccabees 17:12
source:
  edition: lxx-swete-1909
  text: ἀθλοθέτει γὰρ τότε ἀρετὴ διʼ ὑπομονῆς δοκιμάζουσι· τὸ νῖκος ἐν ἀφθαρσίᾳ ἐν
    ζωῇ πολυχρονίῳ.
  language: Greek
  pages:
