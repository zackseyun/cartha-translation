theological_decisions:
- issue: Whether ζωῇ πολυχρονίῳ should be rendered with the more doctrinally loaded
    'eternal life'
  chosen_reading: long-lasting life
  alternative_readings:
  - eternal life
  - life of many years
  rationale: The phrase literally speaks of life of long duration. Given the project's
    commitment not to import doctrinal claims beyond the source text, the main text
    avoids 'eternal life' while preserving that alternative in a footnote because
    the context of martyr reward and ἀφθαρσία may lead some readers to hear an eschatological
    sense.
