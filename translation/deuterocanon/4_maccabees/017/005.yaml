theological_decisions:
- issue: Whether οὐρανός in the final clause should be rendered 'sky' or 'heaven'
  chosen_reading: heaven
  alternative_readings:
  - sky
  rationale: The verse begins with a literal celestial comparison ('moon...in the
    sky with the stars') but concludes with the mother's posthumous status 'with them.'
    In context of martyr vindication, the final οὐρανός is best taken as heaven rather
    than merely the visible sky. This preserves the rhetorical movement from simile
    to eschatological honor without overstating beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    contextual variance.
