id: 4MA.17.5
reference: 4 Maccabees 17:5
source:
  edition: lxx-swete-1909
  text: οὐχ οὕτω σελήνη κατʼ οὐρανὸν σὺν ἄστροις σεμνὴ καθεστήκεν, ὡς σὺ τοὺς ἰσαστέρους
    ἑπτὰ παῖδας φωταγωγήσασα πρὸς τὴν εὐσέβειαν ἔντιμος καθεστήκας θεῷ, καὶ ἐστήρισαι
    ἐν οὐρανῷ σὺν αὐτοῖς.
  language: Greek
