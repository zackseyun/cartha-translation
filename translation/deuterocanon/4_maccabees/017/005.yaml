translation:
  text: Not so does the moon stand in majesty in heaven with the stars, as you, having
    guided your seven sons, equal to the stars, toward godliness, have come to stand
    honored before God and have been established in heaven with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having enlightened your seven sons, equal to the stars, toward piety.'
      The participle φωταγωγήσασα can be rendered more explicitly as 'having enlightened'
      or 'having led to the light.'
    reason: lexical_alternative
  - marker: b
    text: The final phrase may also be understood more literally as 'have been established
      in the sky with them,' but in context it likely refers to heavenly honor with
      her sons.
    reason: alternative_reading
lexical_decisions:
- source_word: σελήνη
  chosen: moon
  alternatives:
  - the moon
  lexicon: LSJ
  rationale: Straightforward celestial term; anarthrous in Greek but naturally definite
    in English. Kept as 'moon' within the comparison image.
- source_word: σεμνὴ
  chosen: in majesty
  alternatives:
  - noble
  - august
  - dignified
  lexicon: LSJ
  rationale: The adjective conveys dignity or august splendor. 'In majesty' fits the
    elevated comparison and reads naturally with 'stand' in English.
- source_word: καθεστήκεν / καθεστήκας
  chosen: stand / have come to stand
  alternatives:
  - are established
  - stand fixed
  - have been appointed
  lexicon: LSJ
  rationale: The verb can denote being set or established in a state. Because the
    verse uses it first of the moon and then of the mother, 'stand' preserves the
    rhetorical parallel while 'have come to stand' reflects the perfect sense in the
    second clause.
- source_word: ἰσαστέρους
  chosen: equal to the stars
  alternatives:
  - star-like
  - as many as the stars
  - peer to the stars
  lexicon: LSJ
  rationale: Compound adjective built on 'equal' and 'star'; in context it describes
    the seven sons by comparison with stars. 'Equal to the stars' is more transparent
    than a compressed English adjective.
- source_word: παῖδας
  chosen: sons
  alternatives:
  - children
  - boys
  lexicon: LSJ
  rationale: Although παῖδες can mean children broadly, the immediate referent is
    the woman's seven male offspring in the martyr narrative. 'Sons' is gender-accurate
    and contextually precise.
- source_word: φωταγωγήσασα
  chosen: having given light
  alternatives:
  - having illumined
  - having led to the light
  - having enlightened
  lexicon: LSJ
  rationale: The participle literally evokes bringing or leading by light. Here the
    mother is portrayed as directing her sons toward piety. 'Having given light' preserves
    the luminosity imagery that matches the moon/stars comparison.
- source_word: πρὸς τὴν εὐσέβειαν
  chosen: toward godliness
  alternatives:
  - to piety
  - toward reverence
  lexicon: LSJ
  rationale: εὐσέβεια in this book denotes reverent devotion to God expressed in faithful
    obedience. 'Godliness' is accessible English and preserves the explicitly religious
    sense.
- source_word: ἔντιμος
  chosen: honored
  alternatives:
  - precious
  - esteemed
  - held in honor
  lexicon: LSJ
  rationale: The adjective denotes honor or high esteem. 'Honored before God' captures
    both the predicate force and the dative θεῷ.
- source_word: ἐστήρισαι
  chosen: have been established
  alternatives:
  - have been fixed
  - have been made firm
  - have been set fast
  lexicon: LSJ
  rationale: The passive/perfect sense suggests being firmly set. In the heavenly
    context, 'have been established in heaven with them' conveys enduring placement.
- source_word: ἐν οὐρανῷ σὺν αὐτοῖς
  chosen: in heaven with them
  alternatives:
  - in the sky with them
  - among them in heaven
  lexicon: LSJ
  rationale: Although οὐρανός can mean sky, the final clause shifts from simile to
    exalted reward language. 'In heaven with them' best fits the martyrdom context
    and the contrast with the earlier literal sky imagery.
