theological_decisions:
- issue: Rendering of ἱλαστηρίου in a martyrdom/sacrificial context
  chosen_reading: their atoning-sacrifice death
  alternative_readings:
  - their propitiatory death
  - their death as a mercy-seat
  rationale: Following DOCTRINE.md, ἱλαστήριον is rendered 'atoning sacrifice' by
    default, with alternatives preserved in a footnote. In this context the term is
    metaphorical and linked to death, so 'mercy-seat' would be too literal and potentially
    misleading, though worth noting as a lexical alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: ἱλαστήριον → atoning sacrifice'
- issue: Extent of substitutionary force in ἀντίψυχον γεγονότας
  chosen_reading: as though they had become a ransom for the sin of the nation
  alternative_readings:
  - as though they had become a substitute for the nation's sin
  - as though they had given their lives in exchange for the nation's sin
  rationale: The Greek presents the martyrs' deaths in exchange/substitution language.
    'Ransom' best captures the exchange idea in concise English while leaving the
    exact mechanism of atonement unstated.
