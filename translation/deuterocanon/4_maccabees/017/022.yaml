id: 4MA.17.22
reference: 4 Maccabees 17:22
source:
  edition: lxx-swete-1909
  text: ρισθῆναι. ὥσπερ ἀντίψυχον γεγονότας τῆς τοῦ ἔθνους ἁμαρτίας καὶ A διὰ τοῦ
    αἵματος τῶν εὐσεβῶν ἐκείνων καὶ τοῦ ἱλαστηρίου θανάτου αὐτῶν, ἡ θεία πρόνοια τὸν
    Ἰσραὴλ προκακωθέντα διέσωσεν.
  language: Greek
  pages:
  - 782
  confidence: high
  validation: agree
translation:
  text: as though they had become a ransom for the sin of the nation, and through
    the blood of those devout ones and their atoning-sacrifice death, divine providence
    preserved Israel, though it had been mistreated before.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a substitute life for the sin of the nation' or 'an exchange for life
      for the nation's sin.'
    reason: lexical_alternative
  - marker: b
    text: '''Atoning-sacrifice'' renders Greek hilastērion; alternatives include ''propitiatory''
      and, more literally in some contexts, ''mercy seat.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἀντίψυχον
  chosen: a ransom
  alternatives:
  - a substitute life
  - an exchange for life
  lexicon: LSJ
  rationale: The term denotes something given in exchange for a life, hence a compensatory
    or ransom sense. 'Ransom' is concise and preserves the sacrificial-substitutionary
    force better than the more awkward 'substitute life.'
- source_word: ἁμαρτίας
  chosen: sin
  alternatives:
  - offense
  lexicon: BDAG
  rationale: The genitive is most naturally rendered 'for the sin of the nation.'
    'Sin' preserves the moral-religious sense without weakening it to merely 'offense.'
- source_word: εὐσεβῶν
  chosen: devout
  alternatives:
  - godly
  - pious
  lexicon: BDAG
  rationale: The adjective describes reverence toward God. 'Devout' is natural modern
    English and avoids overly churchly diction while retaining religious weight.
- source_word: ἱλαστηρίου
  chosen: atoning-sacrifice
  alternatives:
  - atoning sacrifice
  - propitiatory
  - mercy-seat
  lexicon: BDAG
  rationale: Per doctrine, ἱλαστήριον defaults to 'atoning sacrifice,' with alternatives
    preserved in footnotes where useful. Here it modifies 'death' metaphorically,
    indicating a death with expiatory/atoning effect, not the literal cult object
    'mercy seat.' Hyphenation reflects its adjectival function before 'death.'
- source_word: θανάτου
  chosen: death
  alternatives:
  - dying
  lexicon: BDAG
  rationale: The noun refers to the martyrs' death as the means by which preservation
    came. 'Death' is the straightforward rendering.
- source_word: θεία πρόνοια
  chosen: divine providence
  alternatives:
  - God's providence
  - the divine forethought
  lexicon: LSJ
  rationale: The phrase personifies or names God's providential care. 'Divine providence'
    is idiomatic and preserves the theological concept without over-specifying beyond
    the Greek.
- source_word: προκακωθέντα
  chosen: though it had been mistreated before
  alternatives:
  - previously afflicted
  - already suffering evil
  lexicon: LSJ
  rationale: The participle indicates prior harsh treatment or affliction of Israel.
    The concessive English clause captures the temporal prefix προ- and the passive
    sense in readable English.
- source_word: διέσωσεν
  chosen: preserved
  alternatives:
  - saved
  - brought safely through
  lexicon: BDAG
  rationale: The compound verb suggests preserving through danger. 'Preserved' fits
    the context of national deliverance without importing fuller soteriological overtones
    that 'saved' might carry.
