translation:
  text: O mother, who with your seven children brought down the tyrant’s violence,
    and nullified his evil schemes, and displayed the nobility of faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the courage of faith' or 'faithfulness'; the Greek phrase can emphasize
      either the nobility shown by faith or the noble steadfastness of faithful devotion.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ μήτηρ
  chosen: O mother
  alternatives:
  - Mother!
  - O mother!
  lexicon: LSJ
  rationale: Retains the direct vocative and elevated rhetorical tone of the Greek
    exclamation without becoming archaic beyond the source’s register.
- source_word: σὺν ἑπτὰ παισίν
  chosen: with your seven children
  alternatives:
  - with seven children
  - with your seven sons
  lexicon: LSJ
  rationale: παῖς can mean child or son. In this context the referents are her sons,
    but 'children' is a natural rendering of the lexical form and avoids over-specifying
    beyond the immediate phrase; 'your' is supplied naturally in English from the
    maternal address and context.
- source_word: καταλύσασα
  chosen: brought down
  alternatives:
  - overthrew
  - destroyed
  - broke down
  lexicon: LSJ
  rationale: The participle conveys overthrowing or bringing to ruin. 'Brought down'
    preserves the metaphorical force against the tyrant’s power while reading idiomatically
    in English.
- source_word: τὴν τοῦ τυράννου βίαν
  chosen: the tyrant’s violence
  alternatives:
  - the violence of the tyrant
  - the tyrant’s force
  - the tyrant’s brutality
  lexicon: LSJ
  rationale: βία denotes force or violence. 'Violence' best captures the oppressive
    and cruel force in context; the possessive construction is smoother English than
    a more wooden genitive rendering.
- source_word: ἀκυρώσασα
  chosen: nullified
  alternatives:
  - invalidated
  - frustrated
  - canceled
  lexicon: LSJ
  rationale: The verb means to make ineffective or void. 'Nullified' preserves that
    sense of rendering the tyrant’s plans powerless.
- source_word: τὰς κακὰς ἐπινοίας αὐτοῦ
  chosen: his evil schemes
  alternatives:
  - his wicked designs
  - his evil plans
  - his malicious devices
  lexicon: LSJ
  rationale: ἐπινοία refers to a plan, design, or contrivance. 'Schemes' fits the
    hostile plotting context, and 'evil' directly reflects κακάς.
- source_word: ἐπιδείξασα
  chosen: displayed
  alternatives:
  - showed
  - demonstrated
  - proved
  lexicon: LSJ
  rationale: The participle means to show forth or demonstrate. 'Displayed' preserves
    the public, exemplary sense in the encomiastic context.
- source_word: τὴν τῆς πίστεως γενναιότητα
  chosen: the nobility of faith
  alternatives:
  - the courage of faith
  - faith’s nobility
  - the greatness of faith
  lexicon: LSJ
  rationale: γενναιότης denotes nobility, high-mindedness, or courage. 'Nobility'
    best matches the moral excellence emphasized here, while retaining πίστις as 'faith'
    per project default.
