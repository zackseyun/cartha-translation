  text: Ὦ μήτηρ σὺν ἑπτὰ παισὶν καταλύσασα τὴν τοῦ τυράννου βίαν, καὶ ἀκυρώσασα τὰς
    κακὰς ἐπινοίας αὐτοῦ, καὶ ἐπιδείξασα τὴν τῆς πίστεως γενναιότητα.
  language: Greek
