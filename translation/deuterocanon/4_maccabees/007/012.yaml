translation:
  text: Thus Eleazar, the descendant of Aaron, though being burned through the fire,
    did not change his resolve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the Aaronide.' That is, one belonging to the line of Aaron.
    reason: lexical_alternative
  - marker: b
    text: Or 'did not change his reason' / 'did not alter his rational purpose.' The
      Greek term can denote reasoned resolve, an important theme in 4 Maccabees.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως
  chosen: Thus
  alternatives:
  - So
  - In this way
  lexicon: LSJ
  rationale: Introduces the conclusion or manner from the preceding account; 'Thus'
    is concise and preserves the rhetorical linkage.
- source_word: ὁ Ἀαρωνίδης
  chosen: the descendant of Aaron
  alternatives:
  - the Aaronide
  - the son of Aaron
  - the Aaronic one
  lexicon: LSJ
  rationale: The adjective/noun denotes membership in Aaron's line. 'Descendant of
    Aaron' is clear modern English and avoids the opaque transliteration 'Aaronide'
    in the main text.
- source_word: Ἐλεάζαρος
  chosen: Eleazar
  rationale: Standard English transliteration of the personal name.
- source_word: διὰ τοῦ πυρός
  chosen: through the fire
  alternatives:
  - by the fire
  - amid the fire
  lexicon: LSJ
  rationale: διά with the genitive can express means or circumstance. 'Through the
    fire' preserves the vividness of the Greek while allowing the participle to carry
    the sense of undergoing fiery torment.
- source_word: ὑπερτηκόμενος
  chosen: being consumed
  alternatives:
  - melting away
  - wasting away
  - being overcome
  lexicon: LSJ
  rationale: The participle evokes being melted down or consumed by intense heat.
    'Being consumed' communicates the effect of the fire in idiomatic English without
    over-paraphrasing.
- source_word: οὐ μετετράπη
  chosen: did not change
  alternatives:
  - was not turned
  - did not alter
  - was not transformed
  lexicon: LSJ
  rationale: The verb here refers to a change of mind or turning aside under pressure.
    'Did not change' is natural English and fits the object that follows.
- source_word: τὸν λογισμόν
  chosen: his resolve
  alternatives:
  - his reason
  - his purpose
  - his way of thinking
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός often carries the sense of rational resolve or
    governing reason. 'Resolve' best captures the steadfast moral-intellectual commitment
    in this context.
