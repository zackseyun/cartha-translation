theological_decisions:
- issue: Rendering λογισμός in a book centered on reason mastering the passions
  chosen_reading: his resolve
  alternative_readings:
  - his reason
  - his rational purpose
  rationale: The term is philosophically weighty in 4 Maccabees, but in this sentence
    it refers specifically to Eleazar's steadfast inner determination under torture.
    'Resolve' preserves that force in readable English, while alternatives are noted
    because 'reason' is also contextually significant in the book's argument.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
