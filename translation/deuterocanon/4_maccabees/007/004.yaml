translation:
  text: No city under siege ever held out against many and varied siege engines as
    that most holy man, while his sacred soul was being burned by tortures and the
    wheel, stirred up those besieging him, because of the reason that defended godliness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'racks' or more generally 'instruments of torture' for 'the wheel' (στρέβλαις).
      The exact device term is difficult, though it clearly refers to torturous means.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of reason defending godliness/piety.' The Greek places strong
      emphasis on λογισμός ('reason') as the power by which he resisted.
    reason: lexical_alternative
lexical_decisions:
- source_word: πόλις
  chosen: city
  alternatives:
  - town
  lexicon: LSJ
  rationale: The military siege metaphor naturally takes πόλις as 'city,' not merely
    'town.'
- source_word: μηχανήμασιν
  chosen: siege engines
  alternatives:
  - devices
  - contrivances
  - engines
  lexicon: LSJ
  rationale: In the context of πολιορκουμένη and πολιορκοῦντας, the term is best specified
    as military engines rather than generic devices.
- source_word: ἀντέσχεν
  chosen: held out against
  alternatives:
  - withstood
  - resisted
  lexicon: LSJ
  rationale: This conveys endurance under assault in idiomatic English while preserving
    the siege imagery.
- source_word: πανάγιος
  chosen: most holy
  alternatives:
  - all-holy
  - utterly holy
  lexicon: LSJ
  rationale: A superlative sense is present; 'most holy' is natural English and preserves
    the elevated commendation.
- source_word: ἱερὰν ψυχὴν
  chosen: sacred soul
  alternatives:
  - holy soul
  - consecrated life
  lexicon: LSJ
  rationale: ἱεράν carries a sacral sense; 'sacred soul' preserves the author's elevated
    rhetoric. 'Life' is possible for ψυχή, but 'soul' better matches the moral-psychological
    emphasis in this context.
- source_word: αἰκισμοῖς
  chosen: tortures
  alternatives:
  - maltreatments
  - torments
  lexicon: LSJ
  rationale: The word denotes acts of cruel abuse; 'tortures' fits the martyrdom context
    clearly and idiomatically.
- source_word: στρέβλαις
  chosen: the wheel
  alternatives:
  - racks
  - instruments of torture
  lexicon: LSJ
  rationale: The plural likely refers to torture devices associated with twisting;
    'the wheel' gives a concrete rendering commonly associated with such punishment,
    though a broader sense is possible.
- source_word: πυρπολούμενος
  chosen: was being burned
  alternatives:
  - was being scorched
  - was being set ablaze
  lexicon: LSJ
  rationale: The participle conveys being subjected to burning; 'was being burned'
    is direct and readable.
- source_word: ἐκίνησεν
  chosen: stirred up
  alternatives:
  - shook
  - moved
  - agitated
  lexicon: LSJ
  rationale: The sense is that his steadfastness affected or unsettled his attackers;
    'stirred up' preserves that impact without overinterpreting.
- source_word: τοὺς πολιορκοῦντας
  chosen: those besieging him
  alternatives:
  - his besiegers
  - those laying siege
  lexicon: LSJ
  rationale: This keeps the siege metaphor coherent by applying it to the persecutors.
- source_word: λογισμόν
  chosen: reason
  alternatives:
  - rational resolve
  - mind
  - principle
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for rational faculty or reason.
    'Reason' is the default concise rendering, though the ethical nuance is strong.
- source_word: ὑπερασπίζοντα τῆς εὐσεβείας
  chosen: that defended godliness
  alternatives:
  - that championed piety
  - that fought for reverence
  lexicon: LSJ
  rationale: εὐσέβεια in this book is best rendered 'godliness' or 'piety.' 'Godliness'
    is more accessible modern English, and ὑπερασπίζοντα conveys active defense.
