  text: οὐχ οὕτως πόλις πολλοῖς καὶ ποικίλοις μηχανήμασιν ἀντέσχεν ποτὲ πολιορκουμένη,
    ὡς ὁ πανάγιος ἐκεῖνος τὴν ἱερὰν ψυχὴν αἰκισμοῖς τε καὶ στρέβλαις πυρπολούμενος
    ἐκίνησεν τοὺς πολιορκοῦντας, διὰ τὸν ὑπερασπίζοντα τῆς εὐσεβείας λογισμόν.
  language: Greek
