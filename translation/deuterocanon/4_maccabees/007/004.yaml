theological_decisions:
- issue: Rendering εὐσέβεια
  chosen_reading: godliness
  alternative_readings:
  - piety
  rationale: The term denotes reverent devotion to God expressed in faithful conduct.
    'Godliness' is more natural in contemporary English while preserving theological
    weight; 'piety' remains a viable alternative but can sound archaic or narrower.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
- issue: Rendering λογισμός in 4 Maccabees
  chosen_reading: reason
  alternative_readings:
  - rational resolve
  - reasoning faculty
  rationale: The book centrally argues for the rule of reason over the passions. 'Reason'
    preserves that thematic vocabulary without importing a more technical philosophical
    term into the main text.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
