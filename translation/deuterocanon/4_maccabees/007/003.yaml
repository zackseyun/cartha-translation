theological_decisions:
- issue: Interpretation of the genitive phrase τὸν τῆς θανάτου νίκης λιμένα
  chosen_reading: the harbor of victory over death
  alternative_readings:
  - the harbor of death's victory
  rationale: The Greek phrase is compact and could be construed more than one way
    at a purely formal level. In context, however, the author is praising steadfast
    endurance unto martyrdom, so rendering the phrase as a victorious arrival rather
    than as death's triumph best fits the rhetorical movement of the sentence. The
    translation preserves the theological theme of faithful endurance conquering death
    without importing claims beyond the metaphor.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity and preserve alternatives where appropriate.
