translation:
  text: In no way did he turn aside the rudders of godliness, until he sailed into
    the harbor of victory over death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally but less likely in context, 'the harbor of death's victory.'
      The Greek genitive sequence is compressed.
    reason: alternative_reading
lexical_decisions:
- source_word: κατʼ οὐδένα τρόπον
  chosen: In no way
  alternatives:
  - by no means
  - in no manner
  lexicon: LSJ
  rationale: The phrase is an emphatic negation meaning 'in no way' or 'by no means.'
    'In no way' is idiomatic modern English and preserves the force.
- source_word: μετέτρεψεν
  chosen: did he turn aside
  alternatives:
  - did he alter
  - did he change course
  - did he turn
  lexicon: LSJ
  rationale: The verb means to turn, alter, or divert. Because the sentence uses a
    nautical metaphor with 'rudders' and 'sailed,' 'turn aside' best preserves the
    imagery of changing course.
- source_word: τοὺς ... οἴακας
  chosen: the rudders
  alternatives:
  - the steering oars
  - the helm
  lexicon: LSJ
  rationale: οἴαξ is a nautical term for rudder or steering oar. The plural in Greek
    is retained with 'rudders,' preserving the concrete maritime metaphor rather than
    flattening it to the abstract 'helm.'
- source_word: τῆς εὐσεβείας
  chosen: of godliness
  alternatives:
  - of piety
  - of reverence
  lexicon: LSJ
  rationale: εὐσέβεια in this literature denotes devout fidelity toward God and the
    law. 'Godliness' is natural English and carries the religious-moral sense better
    than the somewhat narrower 'piety,' while remaining accessible.
- source_word: ἕως οὗ
  chosen: until
  alternatives:
  - up to the point when
  lexicon: LSJ
  rationale: A straightforward temporal marker; 'until' is the natural English equivalent.
- source_word: ἔπλευσεν
  chosen: he sailed
  alternatives:
  - he voyaged
  - he came by sailing
  lexicon: LSJ
  rationale: The verb literally means 'sailed.' Retaining the nautical verb keeps
    the extended metaphor coherent.
- source_word: ἐπὶ ... λιμένα
  chosen: into the harbor
  alternatives:
  - to the harbor
  - to port
  lexicon: LSJ
  rationale: With the sailing imagery, 'into the harbor' reads naturally in English
    and conveys arrival at a safe destination. 'Port' is possible but less elevated
    in tone.
- source_word: τὸν τῆς θανάτου νίκης λιμένα
  chosen: the harbor of victory over death
  alternatives:
  - the harbor of death's victory
  - the harbor of victory in death
  lexicon: LSJ
  rationale: The genitival chain is somewhat compressed. Given the context of martyrdom
    and steadfastness, the most coherent sense is not that death won, but that he
    reached the harbor characterized by victory over death. This preserves the commendatory
    thrust of the passage and the likely semantic relation of νίκης to θανάτου.
