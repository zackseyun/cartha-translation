translation:
  text: O Eleazar, elder stronger than torments, old man more intense than fire, and
    king greater than sufferings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tortures' for 'torments'; the Greek can denote torture more specifically
      in this context.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek uses exalted metaphorical vocatives: ''elder,'' ''old man,''
      and ''king'' are honorific acclamations addressed to Eleazar, not statements
      of political office.'
    reason: cultural_note
lexical_decisions:
- source_word: βασάνων
  chosen: torments
  alternatives:
  - tortures
  - tests
  lexicon: LSJ
  rationale: βάσανος/βασάνων in this martyrdom context refers to instruments or experiences
    of torture/torment, not mere testing. 'Torments' fits the elevated vocative praise
    and reads naturally in English.
- source_word: βιαιότερε
  chosen: more violent than
  alternatives:
  - stronger than
  - more forceful than
  lexicon: LSJ
  rationale: Comparative of βίαιος, literally 'more violent/forceful.' In context
    it praises Eleazar as surpassing the violence of the torments themselves in moral
    force. 'More violent than' is formally close, though metaphorical in English.
- source_word: γέρων
  chosen: elder
  alternatives:
  - old man
  - aged man
  lexicon: LSJ
  rationale: γέρων denotes an old man/elder. 'Elder' preserves dignity in direct address
    and avoids redundancy with the following πρεσβῦτα, which is then rendered differently.
- source_word: πυρός
  chosen: fire
  lexicon: LSJ
  rationale: Literal reference to fire, likely the torture by flames in the narrative
    context.
- source_word: εὐτονώτερε
  chosen: more intense than
  alternatives:
  - more vigorous than
  - more resolute than
  - more taut than
  lexicon: LSJ
  rationale: Comparative of εὔτονος, conveying tension, vigor, intensity, or resoluteness.
    In comparison with fire, 'more intense than' best captures the rhetorical force
    in idiomatic English.
- source_word: πρεσβῦτα
  chosen: old man
  alternatives:
  - elder
  lexicon: LSJ
  rationale: Another vocative for an aged man. Since γέρων already carries 'elder,'
    varying this as 'old man' preserves the parallelism without flattening both terms
    into one English gloss.
- source_word: παθῶν
  chosen: sufferings
  alternatives:
  - passions
  - afflictions
  lexicon: LSJ
  rationale: In this context πάθη refers to sufferings or afflictive experiences,
    not inner passions. The surrounding references to torments and fire favor 'sufferings.'
- source_word: μέγιστε
  chosen: greater than
  alternatives:
  - greatest over
  - mightiest over
  lexicon: LSJ
  rationale: Though literally 'greatest,' the construction with a genitive of comparison
    is best brought into idiomatic English as 'greater than' to match the preceding
    comparatives.
- source_word: βασιλεῦ
  chosen: king
  alternatives:
  - ruler
  - sovereign
  lexicon: LSJ
  rationale: Literal vocative 'king.' Here it is honorific and metaphorical, acclaiming
    Eleazar's mastery over suffering.
- source_word: Ἐλεαζάρ
  chosen: Eleazar
  rationale: Standard English transliteration of the personal name.
