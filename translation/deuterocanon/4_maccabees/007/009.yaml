theological_decisions:
- issue: Meaning of φιλοσοφία in 4 Maccabees
  chosen_reading: philosophy
  alternative_readings:
  - wisdom
  - reasoned teaching
  rationale: The book self-consciously uses Hellenistic philosophical vocabulary.
    Rendering φιλοσοφία as 'philosophy' preserves that conceptual world rather than
    domesticating it to a more generic 'wisdom.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
