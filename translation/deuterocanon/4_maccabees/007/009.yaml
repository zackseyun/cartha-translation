id: 4MA.7.9
reference: 4 Maccabees 7:9
source:
  edition: lxx-swete-1909
  text: σὺ, πάτερ, τὴν εὐνομίαν ἡμῶν διὰ τῶν ὑπομονῶν εἰς δόξαν ἐκύρωσας, καὶ τὴν
    ἁγιαστίαν σεμνολογήσας οὐ κατέλυσας, καὶ διὰ τῶν ἔργων ἐπιστοποίησας τοὺς τῆς
    φιλοσοφίας λόγους.
  language: Greek
