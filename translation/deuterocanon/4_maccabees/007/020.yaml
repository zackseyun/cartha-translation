translation:
  text: Therefore, nothing is opposed by the fact that some appear to be ruled by
    passions because of weak reason.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nothing is opposed by the fact that some appear to be mastered by passions
      because of weak reasoning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲν
  chosen: nothing
  alternatives:
  - in no way
  - not at all
  lexicon: LSJ
  rationale: Indefinite neuter used absolutely; 'nothing' is the most natural English
    subject for the impersonal claim.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: LSJ
  rationale: Marks an inferential conclusion from the preceding argument; 'therefore'
    preserves the logical force clearly.
- source_word: ἐναντιοῦται
  chosen: is contradicted
  alternatives:
  - is opposed
  - stands against
  lexicon: LSJ
  rationale: The verb conveys being in opposition or conflict. In this argumentative
    context, 'is contradicted' best fits the sense that the preceding thesis is not
    disproved by the apparent counterexample.
- source_word: τὸ φαίνεσθαί
  chosen: the fact that ... seem
  alternatives:
  - the appearing that
  - the seeming that
  lexicon: LSJ
  rationale: Articular infinitive functioning substantivally. English idiom requires
    expansion to 'the fact that ... seem' to preserve both the nominal force and the
    appearance/reality nuance of φαίνεσθαι.
- source_word: τινας
  chosen: some
  alternatives:
  - certain people
  - some persons
  lexicon: LSJ
  rationale: Indefinite accusative plural referring to unspecified persons. 'Some'
    is concise and natural.
- source_word: παθοκρατεῖσθαι
  chosen: to be ruled by passions
  alternatives:
  - to be mastered by passions
  - to be dominated by suffering/emotions
  lexicon: LSJ
  rationale: Compound idea of being controlled by πάθη. 'Ruled by passions' preserves
    the governance imagery important in 4 Maccabees' contrast between reason and passions.
- source_word: πάθος (within παθοκρατεῖσθαι)
  chosen: passions
  alternatives:
  - desires
  - emotions
  - sufferings
  lexicon: LSJ
  rationale: In 4 Maccabees, πάθη commonly denotes the passions/appetites that reason
    is meant to govern. 'Passions' best matches the book's philosophical vocabulary.
- source_word: διὰ
  chosen: because of
  alternatives:
  - through
  - on account of
  lexicon: LSJ
  rationale: With the accusative here it indicates cause; 'because of' is the clearest
    causal rendering in modern English.
- source_word: τὸν ἀσθενῆ λογισμόν
  chosen: weak reason
  alternatives:
  - feeble reasoning
  - weak rational judgment
  lexicon: LSJ
  rationale: λογισμός in this work refers to the faculty/exercise of reasoned judgment;
    ἀσθενής qualifies it as weak or infirm. 'Weak reason' is compact and preserves
    the conceptual contrast with mastery over passions.
