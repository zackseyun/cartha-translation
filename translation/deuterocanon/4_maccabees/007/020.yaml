theological_decisions:
- issue: Anthropological/philosophical contrast between reason and passions
  chosen_reading: Render λογισμός as 'reason' and παθοκρατεῖσθαι as 'ruled by passions'
  alternative_readings:
  - Render λογισμός as 'mind' or 'thought'
  - Render παθοκρατεῖσθαι as 'overcome by emotions'
  rationale: The verse belongs to 4 Maccabees' sustained argument about reason's rule
    over the passions. 'Reason' and 'ruled by passions' preserve that conceptual framework
    without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 5, 6
