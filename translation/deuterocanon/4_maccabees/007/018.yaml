  text: ἀλλʼ ὅσοι τῆς εὐσεβείας προνοοῦσιν ἐξ ὅλης καρδίας, οὗτοι μόνοι δύνανται κρατεῖν
    τῶν τῆς σαρκὸς παθῶν.
