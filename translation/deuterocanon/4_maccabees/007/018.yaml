translation:
  text: But all who care for godliness with their whole heart, these alone are able
    to master the passions of the flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with all their heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'can control the fleshly passions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλʼ
  chosen: But
  alternatives:
  - rather
  - however
  lexicon: LSJ
  rationale: Marks contrast with the preceding argument; 'But' is natural English
    and preserves the adversative force.
- source_word: ὅσοι
  chosen: all who
  alternatives:
  - whoever
  - as many as
  lexicon: LSJ
  rationale: The plural relative expression refers to a class of people; 'all who'
    is idiomatic and keeps the inclusive scope.
- source_word: τῆς εὐσεβείας
  chosen: godliness
  alternatives:
  - piety
  - reverence
  lexicon: LSJ
  rationale: In 4 Maccabees, εὐσέβεια is a central virtue denoting devout fidelity
    toward God and his law. 'Godliness' is accessible modern English and preserves
    the explicitly God-directed sense better than the somewhat narrower 'piety'.
- source_word: προνοοῦσιν
  chosen: care for
  alternatives:
  - give thought to
  - provide for
  - are concerned for
  lexicon: LSJ
  rationale: The verb conveys active concern and intentional regard. 'Care for' reads
    naturally in English and fits the object 'godliness' without sounding overly wooden.
- source_word: ἐξ ὅλης καρδίας
  chosen: with their whole heart
  alternatives:
  - from the whole heart
  - with all their heart
  lexicon: LSJ
  rationale: This phrase expresses wholehearted devotion. 'With their whole heart'
    is clear and close to the Greek; the possessive is supplied naturally in English.
- source_word: οὗτοι μόνοι
  chosen: these alone
  alternatives:
  - only these
  - they alone
  lexicon: LSJ
  rationale: The phrase is emphatic, restricting the ability that follows to this
    group alone. 'These alone' preserves the emphasis and structure.
- source_word: δύνανται κρατεῖν
  chosen: are able to master
  alternatives:
  - can control
  - are able to prevail over
  lexicon: LSJ
  rationale: κρατεῖν here means exercising control or mastery over something. 'Master'
    preserves the stronger sense of dominion better than the flatter 'control'.
- source_word: τῶν τῆς σαρκὸς παθῶν
  chosen: the passions of the flesh
  alternatives:
  - the sufferings of the flesh
  - fleshly passions
  - bodily passions
  lexicon: LSJ
  rationale: πάθη in this moral-philosophical context means passions or impulses,
    not sufferings. σάρξ is best rendered 'flesh' here, preserving the anthropological
    term without importing the more interpretive 'sinful nature'; the phrase denotes
    bodily desires/passions.
