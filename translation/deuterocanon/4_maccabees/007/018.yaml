theological_decisions:
- issue: Rendering of σάρξ in an ethical-anthropological context
  chosen_reading: flesh
  alternative_readings:
  - sinful nature
  - body
  rationale: The doctrine guidance defaults σάρξ to 'flesh' when literal and to 'sinful
    nature' when metaphorical. Here the phrase concerns passions associated with embodied
    human appetites, but the text does not require the more doctrinally loaded 'sinful
    nature.' 'Flesh' preserves the source term and leaves the moral nuance to the
    context.
