  text: καὶ εἰδὼς ὅτι διὰ τὴν ἀρετὴν πάντα πόνον ὑπομένειν μακάριόν ἐστιν, οὐκ ἂν
    περικρατήσειεν τῶν παθῶν διὰ τὴν εὐσέβειαν;
