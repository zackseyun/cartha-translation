theological_decisions:
- issue: Rendering the ethical-philosophical contrast between virtue, passions, and
    godliness
  chosen_reading: Translate ἀρετή as 'virtue,' πάθη as 'the passions,' and εὐσέβεια
    as 'godliness' to preserve the work's moral and religious vocabulary.
  alternative_readings:
  - '''excellence'' for ἀρετή'
  - '''emotions'' or ''impulses'' for πάθη'
  - '''piety'' for εὐσέβεια'
  rationale: 4 Maccabees uses a Hellenistic moral framework integrated with Jewish
    devotion. The chosen renderings keep both the philosophical texture and the explicitly
    religious aim of the sentence without flattening either side.
  doctrine_reference: Translation philosophy §§1, 5, 6
