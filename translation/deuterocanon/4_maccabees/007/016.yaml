id: 4MA.7.16
reference: 4 Maccabees 7:16
source:
  edition: lxx-swete-1909
  text: Εἰ δὲ τοίνυν γέρων τῶν μέχρι θανάτου βασάνων περιεφρόνησεν διʼ εὐσέβειαν,
    ὁμολογουμένως ἡγεμὼν ἐστιν τῶν παθῶν ὁ εὐσεβὴς λογισμός.
