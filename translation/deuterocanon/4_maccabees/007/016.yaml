theological_decisions:
- issue: Rendering the key philosophical-theological phrase ὁ εὐσεβὴς λογισμός
  chosen_reading: pious reason
  alternative_readings:
  - godly reason
  - reason shaped by piety
  rationale: The phrase is central to 4 Maccabees' thesis that reason, when ordered
    by reverence toward God, governs the passions. 'Pious reason' preserves both the
    rational and devotional dimensions without importing later doctrinal categories.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
- issue: Force of διʼ εὐσέβειαν
  chosen_reading: because of piety
  alternative_readings:
  - for the sake of piety
  rationale: 'The phrase can be heard causally or purposively. Here the causal sense
    fits the argument: the old man''s contempt for torture arose from his reverent
    devotion. The purposive nuance is close enough to preserve in a footnote.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
