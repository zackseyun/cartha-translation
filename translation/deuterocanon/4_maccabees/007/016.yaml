translation:
  text: If, then, an old man despised tortures even to the point of death because
    of piety, then surely pious reason is ruler over the passions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for the sake of piety.' The Greek phrase may be taken with a purposive
      nuance as well as a causal one.
    reason: lexical_alternative
lexical_decisions:
- source_word: γέρων
  chosen: an old man
  alternatives:
  - an elder
  - an aged man
  lexicon: LSJ
  rationale: The noun denotes an aged male person. 'Old man' is the most natural modern
    English equivalent and preserves the masculine singular reference in context.
- source_word: τῶν μέχρι θανάτου βασάνων
  chosen: tortures even to the point of death
  alternatives:
  - torments unto death
  - ordeals up to death
  lexicon: LSJ
  rationale: βάσανοι refers to severe physical torments or tortures, not merely general
    suffering. μέχρι θανάτου intensifies the extent, indicating tortures reaching
    death or endured up to death.
- source_word: περιεφρόνησεν
  chosen: despised
  alternatives:
  - scorned
  - treated with contempt
  - made light of
  lexicon: LSJ
  rationale: The verb means to think little of or disdain. 'Despised' preserves the
    strong rhetorical force and the idea that he regarded the tortures as negligible
    in comparison with fidelity to God.
- source_word: διʼ εὐσέβειαν
  chosen: because of piety
  alternatives:
  - for the sake of godliness
  - because of reverence toward God
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees carries the sense of reverent devotion toward
    God. 'Piety' is concise and fits the book's recurring terminology, while the causal
    διά is well represented by 'because of'.
- source_word: ὁμολογουμένως
  chosen: surely
  alternatives:
  - admittedly
  - confessedly
  - it is agreed
  lexicon: LSJ
  rationale: The adverb marks an inference accepted by common acknowledgment. 'Surely'
    communicates the rhetorical force in idiomatic English without sounding overly
    technical.
- source_word: ἡγεμὼν
  chosen: ruler
  alternatives:
  - leader
  - governor
  - master
  lexicon: LSJ
  rationale: In this philosophical context the word denotes governing authority or
    mastery. 'Ruler' best conveys dominion over internal impulses while avoiding political
    overtones that 'governor' would introduce.
- source_word: τῶν παθῶν
  chosen: the passions
  alternatives:
  - the emotions
  - the sufferings
  - the impulses
  lexicon: LSJ
  rationale: In 4 Maccabees πάθη refers to the passions or disordered emotional drives,
    a key philosophical term in the argument. 'Passions' preserves that technical
    sense better than 'emotions'.
- source_word: ὁ εὐσεβὴς λογισμός
  chosen: pious reason
  alternatives:
  - godly reason
  - devout rationality
  - reason shaped by piety
  lexicon: LSJ
  rationale: This is a programmatic phrase in 4 Maccabees for reason governed by reverence
    toward God. 'Pious reason' is concise, preserves the adjective-noun structure,
    and fits the book's repeated theme.
