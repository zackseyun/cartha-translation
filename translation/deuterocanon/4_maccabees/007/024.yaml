theological_decisions:
- issue: Rendering the programmatic phrase linking reason and piety in 4 Maccabees
  chosen_reading: with the reasoning of piety
  alternative_readings:
  - by pious reason
  - with godly reason
  rationale: The book's central thesis concerns reason's rule when shaped by devotion
    to God. This rendering preserves both conceptual elements without importing later
    technical philosophical jargon or flattening εὐσέβεια to generic morality.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
