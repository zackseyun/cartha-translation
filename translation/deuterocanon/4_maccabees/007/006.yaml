  text: Ὦ ἄξιε τῆς ἱερωσύνης ἱερεῦ, οὐκ ἐμίανας τοὺς ἱεροὺς ὀδόντας, οὐδὲ τὴν θεοσέβειαν
    καὶ καθαρισμὸν χωρήσασαν γαστέρα ἐκοινώνησας μιεροφαγίᾳ.
