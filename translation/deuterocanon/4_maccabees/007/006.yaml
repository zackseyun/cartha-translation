theological_decisions:
- issue: Cultic purity language applied metaphorically to bodily members and eating
  chosen_reading: Retain the concrete imagery of 'sacred teeth' and a stomach associated
    with godliness and purity
  alternative_readings:
  - Interpret more dynamically as a general statement about refusing unclean food
  rationale: The Greek is rhetorically vivid and intentionally bodily. Preserving
    the imagery better reflects the martyr's fidelity to Jewish dietary holiness without
    flattening the text into abstraction.
  doctrine_reference: Translation philosophy §§1, 6
