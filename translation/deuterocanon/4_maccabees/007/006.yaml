translation:
  text: O priest, worthy of the priesthood, you did not defile your sacred teeth,
    nor did you make your stomach—which had room for godliness and purity—a partner
    in defiling food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor did you share in defiling eating.' The Greek term refers to participation
      in food that brings ritual or moral defilement.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ ἄξιε τῆς ἱερωσύνης ἱερεῦ
  chosen: O priest, worthy of the priesthood
  alternatives:
  - O priest worthy of the priesthood
  - O priest, worthy of your priestly office
  lexicon: LSJ
  rationale: 'Vocative address with emphatic praise. Rendering both ἱερεῦ and ἱερωσύνης
    preserves the rhetorical force: the man is addressed as a priest and declared
    worthy of the priesthood.'
- source_word: ἐμίανας
  chosen: defile
  alternatives:
  - stain
  - pollute
  lexicon: LSJ
  rationale: Cultic/moral contamination is in view, so 'defile' best preserves the
    purity language of the sentence.
- source_word: τοὺς ἱεροὺς ὀδόντας
  chosen: your sacred teeth
  alternatives:
  - your holy teeth
  lexicon: LSJ
  rationale: The phrase is strikingly concrete and should remain so. 'Sacred' fits
    the cultic register while sounding natural in English.
- source_word: θεοσέβειαν
  chosen: godliness
  alternatives:
  - reverence for God
  - piety
  lexicon: LSJ
  rationale: The term denotes reverent devotion toward God. 'Godliness' is concise
    and preserves the religious-moral sense without becoming overly technical.
- source_word: καθαρισμόν
  chosen: purity
  alternatives:
  - cleanness
  - purification
  lexicon: LSJ
  rationale: In this context the noun describes the moral/cultic state associated
    with dietary faithfulness. 'Purity' reads naturally alongside 'godliness'.
- source_word: χωρήσασαν γαστέρα
  chosen: your stomach—which had room for
  alternatives:
  - your stomach that contained
  - your belly that had received
  lexicon: LSJ
  rationale: χωρέω here conveys having room for or containing. The idiom is unusual
    in English, so a lightly smoothed rendering preserves the metaphor while remaining
    readable.
- source_word: ἐκοινώνησας
  chosen: make ... a partner in
  alternatives:
  - share in
  - join to
  lexicon: LSJ
  rationale: 'The verb is causative/associative here: he did not bring his stomach
    into participation with what defiles. ''Make ... a partner in'' preserves that
    relational nuance better than a flat ''share in''.'
- source_word: μιεροφαγίᾳ
  chosen: defiling food
  alternatives:
  - polluted eating
  - defilement by eating
  - unclean consumption
  lexicon: LSJ
  rationale: A rare compound referring to eating what is defiling or sacrilegiously
    polluted. 'Defiling food' communicates the dietary impurity in idiomatic English
    without over-paraphrasing.
