  text: τοιούτους δεῖ εἶναι τοὺς δημιουργοῦντας τὸν νόμον ἰδίῳ αἵματι, καὶ γενναίῳ
    ἱδρῶτι τοῖς μέχρι θανάτου πάθεσιν ὑπερασπίζοντας.
