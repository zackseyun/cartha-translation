theological_decisions:
- issue: Sense of δημιουργοῦντας τὸν νόμον
  chosen_reading: those who establish the law
  alternative_readings:
  - those who uphold the law
  - those who make the law
  rationale: The immediate context concerns martyrs whose embodied endurance vindicates
    and confirms the law. Rendering the phrase as 'make the law' would mislead English
    readers into thinking of legislating rather than establishing or validating it
    by faithful action.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering the masculine reference
  chosen_reading: Such men
  alternative_readings:
  - Such ones
  rationale: The Greek masculine article/participle construction is retained with
    gender-accurate English, in keeping with project policy, since the context speaks
    of exemplary men rather than an abstract generic only.
  doctrine_reference: Translation philosophy §4
