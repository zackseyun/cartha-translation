translation:
  text: Such men must be those who establish the law with their own blood, and defend
    it with noble sweat through sufferings unto death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who uphold the law'; the Greek verb can suggest making, producing,
      or causing something to stand, and here likely means establishing the law by
      faithful action rather than legislating it.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιούτους
  chosen: Such men
  alternatives:
  - Such ones
  - Men like these
  lexicon: LSJ
  rationale: Demonstrative adjective referring to the kind of persons under discussion.
    'Such men' is natural English and preserves the masculine reference in context.
- source_word: δεῖ
  chosen: must be
  alternatives:
  - ought to be
  - it is necessary that they be
  lexicon: LSJ
  rationale: Expresses necessity. 'Must be' is concise and preserves the force without
    sounding overly wooden.
- source_word: τοὺς δημιουργοῦντας τὸν νόμον
  chosen: those who establish the law
  alternatives:
  - those who uphold the law
  - those who make the law
  - those who bring the law into effect
  lexicon: LSJ
  rationale: δημιουργέω literally can mean to make or produce, but here the sense
    is not legislative invention; in context of martyrdom and fidelity, it refers
    to making the law stand or be realized by one's actions. 'Establish the law' best
    captures that enacted, confirmatory sense.
- source_word: νόμον
  chosen: the law
  alternatives:
  - Law
  lexicon: LSJ
  rationale: In this Jewish context it refers to the ancestral/divine law. Lowercase
    'the law' is clear in English without importing later technical capitalization.
- source_word: ἰδίῳ αἵματι
  chosen: with their own blood
  alternatives:
  - by their own blood
  lexicon: LSJ
  rationale: Instrumental dative expressing means. 'With their own blood' is idiomatic
    and preserves the sacrificial, bodily force.
- source_word: γενναίῳ ἱδρῶτι
  chosen: with noble sweat
  alternatives:
  - with brave sweat
  - with generous sweat
  - with courageous toil
  lexicon: LSJ
  rationale: The phrase is vivid and bodily. While 'sweat' is somewhat literal, it
    preserves the concrete imagery of strenuous exertion better than abstract 'toil.'
    'Noble' reflects γενναῖος as brave/noble.
- source_word: τοῖς μέχρι θανάτου πάθεσιν
  chosen: through sufferings up to death
  alternatives:
  - by sufferings unto death
  - with sufferings even to death
  lexicon: LSJ
  rationale: πάθη here denotes sufferings/endured afflictions. 'Up to death' preserves
    μέχρι θανάτου without overinterpreting whether death has already occurred or is
    the limit of endurance.
- source_word: ὑπερασπίζοντας
  chosen: defend it
  alternatives:
  - champion it
  - fight for it
  - protect it
  lexicon: LSJ
  rationale: The participle means to defend or fight in defense of. 'Defend it' is
    direct and fits the law as the implied object from the previous phrase.
