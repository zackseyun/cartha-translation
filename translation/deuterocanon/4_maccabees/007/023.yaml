theological_decisions:
- issue: Gendered generic expression in ethical maxim
  chosen_reading: man
  alternative_readings:
  - person
  - one
  rationale: The Greek uses masculine singular substantivally. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral smoothing, especially in a maxim framed
    in masculine ethical language.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering κύριος in a non-divine context
  chosen_reading: the master
  alternative_readings:
  - lord
  - master
  rationale: Although κύριος defaults to 'Lord' when used as a title, here the context
    is philosophical anthropology, not divine address or title. 'Master' best conveys
    dominion over passions without suggesting a divine referent.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
