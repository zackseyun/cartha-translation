id: 4MA.7.23
reference: 4 Maccabees 7:23
source:
  edition: lxx-swete-1909
  text: μόνος γὰρ ὁ σοφὸς καὶ σώφρων ἀνδρεῖός ἐστιν τῶν παθῶν κύριος.
  language: Greek
  pages:
  - 752
  - 762
  - 763
  - 764
  - 765
  - 766
  - 767
  - 786
  - 787
  - 788
  confidence: high
  validation: major_mismatch
translation:
  text: For only the wise and self-controlled man is courageous, the master of the
    passions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'person' or 'one'; Greek has a masculine singular form used generically
      in this ethical statement.
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνος
  chosen: only
  alternatives:
  - alone
  lexicon: LSJ
  rationale: 'Adverbial/emphatic use introducing an exclusive claim: the statement
    applies uniquely to the person described.'
- source_word: σοφὸς
  chosen: wise
  alternatives:
  - skilled
  - prudent
  lexicon: LSJ
  rationale: In this ethical-philosophical context, σοφός denotes moral-intellectual
    wisdom, best rendered by the standard English 'wise'.
- source_word: σώφρων
  chosen: self-controlled
  alternatives:
  - temperate
  - sensible
  - sound-minded
  lexicon: LSJ
  rationale: Given the verse's focus on mastery over passions, 'self-controlled' brings
    out the ethical sense of disciplined restraint more clearly than the somewhat
    archaic 'temperate'.
- source_word: ἀνδρεῖός
  chosen: courageous
  alternatives:
  - brave
  - manly
  lexicon: LSJ
  rationale: The term denotes courage/fortitude. 'Courageous' is natural modern English
    and avoids importing the gendered nuance of 'manly' into the predicate itself.
- source_word: τῶν παθῶν
  chosen: of the passions
  alternatives:
  - over the passions
  - of the sufferings
  - of the emotions
  lexicon: LSJ
  rationale: In 4 Maccabees, πάθη commonly refers to passions or impulses subject
    to reason, not merely neutral emotions or external sufferings. The genitive depends
    on κύριος.
- source_word: κύριος
  chosen: the master
  alternatives:
  - lord
  - master
  - in control
  lexicon: LSJ
  rationale: Here κύριος is not a divine title but denotes mastery or dominion. 'The
    master of the passions' preserves the nominal force and the idea of rule better
    than a paraphrase like 'in control of.'
- source_word: ἀνδρεῖός ἐστιν τῶν παθῶν κύριος
  chosen: is courageous, the master of the passions
  alternatives:
  - is courageous and master of the passions
  - is brave as master over the passions
  lexicon: LSJ
  rationale: The Greek places two predicates after ἐστιν. Rendering the second appositionally
    with a comma preserves the compact rhetorical style while remaining clear in English.
- source_word: ὁ ... ἀνήρ (implicit in masculine adjectives/article)
  chosen: man
  alternatives:
  - person
  - one
  lexicon: Greek grammar / context
  rationale: The substantival masculine singular is represented in English as 'man'
    in keeping with the project's gender-accurate policy. The statement is generic,
    but the Greek form is masculine and should not be flattened without note.
