theological_decisions:
- issue: How to render θείου βίου
  chosen_reading: the divine life
  alternative_readings:
  - the godly life
  - a life devoted to God
  rationale: The Greek phrase is compact and somewhat elevated. 'The divine life'
    preserves the formal rhetorical register and the genitival relation without paraphrasing
    into an interpretive expansion. Alternatives are possible, but the chosen wording
    stays closest to the source while remaining intelligible.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Whether νόμου should be capitalized as a title
  chosen_reading: the law
  alternative_readings:
  - the Law
  rationale: Although the context is Jewish and likely refers to the Mosaic law, the
    Greek here lacks a capitalization signal. Lowercase 'the law' avoids importing
    later English convention while still conveying the referent naturally.
  doctrine_reference: Translation philosophy §§1, 6
