translation:
  text: O you who are in harmony with the law and a philosopher of the divine life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in accord with the law' or 'agreeing with the law.' The Greek uses a
      term of consonance or harmony.
    reason: lexical_alternative
  - marker: b
    text: Or 'a philosopher of the godly way of life.' The phrase 'divine life' can
      also mean a life characterized by devotion to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ
  chosen: O
  alternatives:
  - Oh
  lexicon: LSJ
  rationale: Vocative particle introducing direct address; 'O' preserves the elevated
    rhetorical tone better than the more conversational 'Oh'.
- source_word: σύμφωνε
  chosen: who are in harmony with
  alternatives:
  - agreeing with
  - consonant with
  - in accord with
  lexicon: LSJ
  rationale: Vocative adjective from σύμφωνος, here addressing a person as aligned
    with or in accord with something. 'In harmony with' preserves the metaphor of
    consonance while remaining natural English.
- source_word: νόμου
  chosen: the law
  alternatives:
  - law
  lexicon: LSJ
  rationale: 'Genitive dependent on σύμφωνε: the person addressed is in accord with
    the law. The article is supplied in English for idiomatic sense; in this Jewish
    context ''the law'' naturally refers to the ancestral/divine law.'
- source_word: καὶ
  chosen: and
  lexicon: LSJ
  rationale: Simple coordinating conjunction linking the two vocative descriptions.
- source_word: φιλόσοφε
  chosen: a philosopher
  alternatives:
  - philosophic one
  - lover of wisdom
  lexicon: LSJ
  rationale: Vocative noun/adjective used predicatively in address. 'Philosopher'
    is the most direct and idiomatic rendering and fits 4 Maccabees' explicit engagement
    with philosophical vocabulary.
- source_word: θείου
  chosen: divine
  alternatives:
  - godly
  - of God
  lexicon: LSJ
  rationale: Genitive adjective modifying βίου. 'Divine' best reflects θεῖος in Hellenistic
    Greek without over-specifying a confessional phrase not explicit in the text.
- source_word: βίου
  chosen: life
  alternatives:
  - way of life
  - mode of life
  lexicon: LSJ
  rationale: βίος can denote life in the sense of manner of living. 'Life' is concise
    and natural; the phrase 'divine life' here conveys a life oriented to God, while
    the broader nuance of 'way of life' is preserved in the rationale.
