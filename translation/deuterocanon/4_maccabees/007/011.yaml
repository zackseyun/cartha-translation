translation:
  text: For just as the father Aaron, armed with the censer, running through the midst
    of the multitude, overcame the fire-bearing angel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the angel of fire' or 'the destroying angel.' The phrase likely alludes
      to Aaron's intervention during the plague in Numbers 16.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥσπερ γὰρ
  chosen: For just as
  alternatives:
  - For as
  - Just as indeed
  lexicon: LSJ
  rationale: Introduces a comparison grounding the argument. 'For just as' preserves
    both the explanatory γάρ and the comparative ὥσπερ in natural English.
- source_word: ὁ πατὴρ Ἀαρὼν
  chosen: father Aaron
  alternatives:
  - the father Aaron
  - Aaron the father
  lexicon: LSJ
  rationale: The article with πατήρ functions honorifically here, presenting Aaron
    as ancestral father. 'Father Aaron' is idiomatic and preserves the honorific force
    better than a wooden 'the father Aaron.'
- source_word: τῷ θυμιατηρίῳ
  chosen: with the censer
  alternatives:
  - by the censer
  - with his incense pan
  lexicon: LSJ
  rationale: θυμιατήριον denotes a censer/incense pan. 'With the censer' fits the
    instrumental dative and keeps the cultic image accessible without over-specifying.
- source_word: καθωπλισμένος
  chosen: armed
  alternatives:
  - equipped
  - arrayed
  lexicon: LSJ
  rationale: The participle carries martial imagery ('armed, equipped'). 'Armed' preserves
    the vivid metaphor that reason/virtue is being compared to combat.
- source_word: διὰ τοῦ ἔθνοπλήθους
  chosen: through the mass of the people
  alternatives:
  - through the crowd of the nation
  - through the multitude of the people
  lexicon: LSJ
  rationale: The compound noun suggests a populous throng. 'Mass of the people' conveys
    the dense multitude without sounding archaic.
- source_word: ἐπιτρέχων
  chosen: ran
  alternatives:
  - rushing
  - running upon
  lexicon: LSJ
  rationale: The participle denotes swift movement. 'Ran' is concise and natural in
    English while preserving the urgency of Aaron's action.
- source_word: τὸν ἐμπυριστὴν ἄγγελον
  chosen: the fire-bearing angel
  alternatives:
  - the angel of fire
  - the incendiary angel
  lexicon: LSJ
  rationale: The adjective/noun element points to one associated with fire, alluding
    to the destroying angel in the plague narrative. 'Fire-bearing angel' is transparent
    and avoids the misleading implication that the angel is himself made of fire.
- source_word: ἐνίκησεν
  chosen: overcame
  alternatives:
  - defeated
  - conquered
  lexicon: LSJ
  rationale: νικάω is victory language. 'Overcame' preserves the sense of prevailing
    while fitting the elevated but readable style.
