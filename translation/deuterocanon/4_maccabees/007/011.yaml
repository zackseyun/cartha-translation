id: 4MA.7.11
reference: 4 Maccabees 7:11
source:
  edition: lxx-swete-1909
  text: Ὥσπερ γὰρ ὁ πατὴρ Ἀαρὼν τῷ θυμιατηρίῳ καθωπλισμένος, διὰ τοῦ ἔθνοπλήθους ἐπιτρέχων
    τὸν ἐμπυριστὴν ἐνίκησεν ἄγγελον,
  language: Greek
