theological_decisions:
- issue: Identity of the angel in the allusion to Aaron's stopping the plague
  chosen_reading: Rendered generically as 'the fire-bearing angel' without expanding
    to 'destroying angel' in the main text
  alternative_readings:
  - the destroying angel
  - the angel who kindled the fire/plague
  rationale: The Greek itself says 'the fire-bearing angel.' The likely allusion is
    to Aaron halting divine judgment in Num 16, but the translation should not import
    a fuller interpretive label into the main text beyond what the wording states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
