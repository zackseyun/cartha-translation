theological_decisions:
- issue: Force of βίου νομίμου in a Jewish martyrdom context
  chosen_reading: a law-abiding life
  alternative_readings:
  - a lawful life
  - a life according to the law
  rationale: The phrase likely praises a life lived in fidelity to the Jewish law
    central to 4 Maccabees. 'Law-abiding' is concise and natural, while still allowing
    readers to hear the book's emphasis on Torah-obedience. A more explicit 'according
    to the law' would be possible but slightly more expansive than the Greek phrase
    itself.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering ἐτελείωσεν without over-theologizing
  chosen_reading: brought to completion
  alternative_readings:
  - perfected
  - consummated
  rationale: In martyrdom contexts, τελειόω can carry strong connotations of fulfillment
    or perfection. 'Brought to completion' preserves that weight while avoiding doctrinal
    overreading not explicit in the verse alone.
  doctrine_reference: Translation philosophy §3
