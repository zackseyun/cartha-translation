translation:
  text: O blessed old age, and venerable gray hair, and a law-abiding life, which
    a faithful seal of death brought to completion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which a true/trustworthy seal of death perfected.' The Greek compresses
      the metaphor, and 'faithful seal of death' may also be understood as death serving
      as the reliable confirmation of such a life.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακαρίου
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: LSJ
  rationale: The adjective conveys blessedness or enviable honor rather than mere
    emotional happiness. 'Blessed' preserves the elevated, laudatory tone of the exclamation.
- source_word: γήρως
  chosen: old age
  alternatives:
  - agedness
  - elderliness
  lexicon: LSJ
  rationale: The noun refers to advanced age itself. 'Old age' is idiomatic English
    and fits the rhetorical praise of the mother's life stage.
- source_word: σεμνῆς
  chosen: venerable
  alternatives:
  - dignified
  - revered
  - honorable
  lexicon: LSJ
  rationale: The term denotes dignity and reverence. 'Venerable' matches the solemn
    tone and naturally modifies 'gray hair' in English.
- source_word: πολιᾶς
  chosen: gray hair
  alternatives:
  - gray head
  - hoary hair
  lexicon: LSJ
  rationale: Literally the grayness of age, often metonymic for advanced years. 'Gray
    hair' is clear modern English without becoming archaic.
- source_word: βίου νομίμου
  chosen: a law-abiding life
  alternatives:
  - a lawful life
  - a life according to the law
  lexicon: LSJ
  rationale: νομίμου means lawful or in accordance with law/custom. In 4 Maccabees,
    fidelity to the ancestral/Jewish law is central, so 'law-abiding life' captures
    both legality and covenantal obedience without overexpanding the phrase.
- source_word: σφραγὶς
  chosen: seal
  alternatives:
  - confirmation
  - attestation
  lexicon: LSJ
  rationale: 'The image is metaphorical: death functions as the seal that authenticates
    or consummates the life described. ''Seal'' preserves the metaphor directly.'
- source_word: πιστὴ
  chosen: faithful
  alternatives:
  - trustworthy
  - sure
  - 'true'
  lexicon: LSJ
  rationale: The adjective modifies 'seal' and suggests reliability or genuineness.
    'Faithful seal' is somewhat unusual in English but preserves the compact metaphor
    better than a more interpretive rendering.
- source_word: θανάτου
  chosen: of death
  alternatives:
  - through death
  - by death
  lexicon: LSJ
  rationale: The genitive is best retained as part of the metaphor, 'seal of death,'
    rather than converted into an instrumental phrase. This keeps the Greek imagery
    intact.
- source_word: ἐτελείωσεν
  chosen: brought to completion
  alternatives:
  - perfected
  - completed
  - consummated
  lexicon: LSJ
  rationale: The verb can mean complete, bring to fulfillment, or perfect. 'Brought
    to completion' preserves the sense of consummation without importing later technical
    theological language.
