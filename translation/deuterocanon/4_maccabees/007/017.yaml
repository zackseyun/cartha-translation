  text: ἴσως δʼ ἂν εἴποιέν τινες, τῶν παθῶν οὐ πάντες περικρατοῦσιν· ὅτι οὐδὲ πάντες
    φρόνιμον ἔχουσιν τὸν λογισμόν.
