translation:
  text: But perhaps some might say, “Not all master their passions, because not all
    have prudent reason.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “overcome the passions” or “gain control over their passions.”
    reason: lexical_alternative
  - marker: b
    text: Or “have reason that is wise/sound.” The Greek uses a key term for rational
      judgment central to 4 Maccabees’ argument.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴσως
  chosen: perhaps
  alternatives:
  - possibly
  - it may be
  lexicon: LSJ
  rationale: Introduces a tentative objection; 'perhaps' is natural English and preserves
    the concessive/speculative force.
- source_word: εἴποιέν τινες
  chosen: some might say
  alternatives:
  - certain people might say
  - some would say
  lexicon: LSJ
  rationale: Optative with ἄν expresses potentiality; 'some might say' captures the
    rhetorical introduction of an imagined objection.
- source_word: τῶν παθῶν
  chosen: their passions
  alternatives:
  - the passions
  - their sufferings
  - their emotions
  lexicon: LSJ
  rationale: In 4 Maccabees πάθη commonly refers to passions/emotions/desires to be
    governed by reason, not external sufferings. English idiom prefers an implied
    possessive with 'master their passions.'
- source_word: οὐ πάντες περικρατοῦσιν
  chosen: not all master
  alternatives:
  - not all prevail over
  - not all gain control over
  - not all overcome
  lexicon: LSJ
  rationale: περικρατέω here means to gain mastery over or control. 'Master' is concise,
    idiomatic, and fits the philosophical argument about reason ruling passions.
- source_word: φρόνιμον
  chosen: prudent
  alternatives:
  - wise
  - sensible
  - sound
  lexicon: LSJ
  rationale: φρόνιμος denotes practical wisdom or sound judgment. 'Prudent' preserves
    the ethical-philosophical nuance better than the broader 'wise.'
- source_word: τὸν λογισμόν
  chosen: reason
  alternatives:
  - the faculty of reason
  - rational judgment
  - rational mind
  lexicon: LSJ
  rationale: In this book λογισμός is a key term for rational judgment/reason. 'Reason'
    is the most readable and sufficiently precise rendering in context.
- source_word: φρόνιμον ἔχουσιν τὸν λογισμόν
  chosen: have prudent reason
  alternatives:
  - have reason that is prudent
  - possess sound reason
  - have rational judgment that is wise
  lexicon: LSJ
  rationale: The phrase describes the quality of one's reason rather than mere possession
    of rationality. 'Have prudent reason' is compact and preserves the predicate adjective's
    force.
