theological_decisions:
- issue: Anthropological-philosophical claim about moral self-mastery
  chosen_reading: The verse states that failure to master passions is due to not all
    people possessing reason in a prudent/sound state.
  alternative_readings:
  - The verse could be read more weakly as not all people exercising prudent reason
    rather than lacking it in any sense.
  rationale: The Greek ἔχουσιν with predicate adjective φρόνιμον most naturally describes
    possessing reason characterized by prudence. This should not be overstated into
    a denial of human rationality as such; the context is ethical quality and governance.
