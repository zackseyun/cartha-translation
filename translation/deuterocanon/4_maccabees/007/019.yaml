translation:
  text: those who believe that to God they do not die, just as our patriarchs Abraham,
    Isaac, and Jacob, but live to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before God' or 'in God's sight'; the Greek dative can express relation
      rather than simple direction.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πιστεύοντες
  chosen: those who believe
  alternatives:
  - those who have faith
  - the believers
  lexicon: BDAG
  rationale: Present participle used substantivally; 'those who believe' is natural
    English and preserves the ongoing character better than the more label-like 'the
    believers.'
- source_word: θεῷ
  chosen: to God
  alternatives:
  - for God
  - before God
  - with respect to God
  lexicon: BDAG
  rationale: 'The dative here expresses relation or sphere: they do not die in relation
    to God, and instead live in relation to him. ''To God'' preserves the compact
    Greek phrasing and matches the repeated dative later in the verse.'
- source_word: οὐκ ἀποθνήσκουσιν
  chosen: do not die
  alternatives:
  - are not dying
  - do not perish
  lexicon: BDAG
  rationale: Straightforward present indicative. 'Do not die' is the plain lexical
    sense and should not be weakened to 'perish.'
- source_word: ὥσπερ γὰρ
  chosen: just as
  alternatives:
  - for just as
  - as indeed
  lexicon: LSJ
  rationale: The combination introduces the comparison with the patriarchs. English
    can render the force smoothly with 'just as' without overloading the sentence
    with particles.
- source_word: οἱ πατριάρχαι ἡμῶν
  chosen: our patriarchs
  alternatives:
  - the patriarchs of us
  - our fathers
  lexicon: BDAG
  rationale: πατριάρχαι specifically denotes the ancestral patriarchs, not merely
    'fathers.' 'Our patriarchs' preserves the historical and covenantal reference.
- source_word: ἀλλὰ ζῶσιν
  chosen: but live
  alternatives:
  - rather, they live
  - instead they are alive
  lexicon: BDAG
  rationale: ἀλλά marks contrast with 'do not die.' 'But live' is concise and mirrors
    the Greek antithesis.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - for God
  - before God
  lexicon: BDAG
  rationale: Repeats the dative relation from the first clause. Retaining 'to God'
    in both places preserves the rhetorical symmetry of the Greek.
