theological_decisions:
- issue: Meaning of the dative θεῷ / τῷ θεῷ in the statement about death and life
  chosen_reading: Rendered relationally as 'to God,' expressing that the faithful
    are not dead in God's regard but live in relation to him.
  alternative_readings:
  - '''for God'''
  - '''before God'''
  - '''in God''s sight'''
  rationale: The verse alludes to the well-known idea that the patriarchs are alive
    to God. 'To God' is slightly formal but transparent and preserves the theological
    tension without over-interpreting the dative into a full paraphrase such as 'in
    God's sight.'
  doctrine_reference: Preserve theological tension rather than resolve it.
