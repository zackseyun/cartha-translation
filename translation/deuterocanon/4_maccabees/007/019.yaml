id: 4MA.7.19
reference: 4 Maccabees 7:19
source:
  edition: lxx-swete-1909
  text: οἱ πιστεύοντες, ὅτι θεῷ οὐκ ἀποθνήσκουσιν, ὥσπερ γὰρ οἱ πατριάρχαι ἡμῶν Ἀβραάμ,
    Ἰσαάκ, Ἰακώβ, ἀλλὰ ζῶσιν τῷ θεῷ.
  language: Greek
