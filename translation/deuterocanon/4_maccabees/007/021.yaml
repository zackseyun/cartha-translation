theological_decisions:
- issue: Rendering πιστεύω-related language in a deuterocanonical philosophical-martyrdom
    context
  chosen_reading: having put his trust in God
  alternative_readings:
  - having believed God
  - trusting God
  rationale: The verb here denotes reliance on God rather than mere assent. This aligns
    with the project's default handling of πίστις/πιστεύω language as 'faith/trust'
    where context supports it, while avoiding unnecessary doctrinal loading.
