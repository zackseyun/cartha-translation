  text: Ὥσπερ γὰρ ἄριστος κυβερνήτης ὁ τοῦ πατρὸς ἡμῶν Ἐλεαζάρου λογισμός, πηδαλιουχῶν
    τὴν τῆς εὐσεβείας ναῦν ἐν τῷ τῶν παθῶν πελάγει,
