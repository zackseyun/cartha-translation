theological_decisions:
- issue: Rendering λογισμός in a philosophically and theologically loaded context
  chosen_reading: the reasoning
  alternative_readings:
  - reason
  - the rational mind
  - rational judgment
  rationale: 4 Maccabees emphasizes reason's rule over the passions under the law
    and in devotion to God. 'The reasoning' keeps the term concrete and active without
    importing later technical philosophical jargon too strongly. This preserves the
    text's moral-psychological tension rather than flattening it.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering εὐσέβεια
  chosen_reading: godliness
  alternative_readings:
  - piety
  rationale: The term denotes reverent devotion toward God expressed in faithful conduct.
    'Godliness' communicates this clearly in modern English while retaining theological
    weight.
  doctrine_reference: Translation philosophy §6
