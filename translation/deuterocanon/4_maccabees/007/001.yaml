translation:
  text: For just as the reasoning of our father Eleazar, like an excellent helmsman,
    was steering the ship of godliness on the sea of the passions,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ship of piety.' The Greek εὐσέβεια can denote reverent devotion
      toward God expressed in faithful conduct.
    reason: lexical_alternative
  - marker: b
    text: The Greek πάθη here likely means 'passions' or disordered emotions, a key
      theme in 4 Maccabees, rather than merely 'sufferings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥσπερ γὰρ
  chosen: For just as
  alternatives:
  - For as
  - Just as indeed
  lexicon: LSJ
  rationale: Introduces a comparison with explanatory force; 'For just as' preserves
    both the comparative and connective sense in readable English.
- source_word: ἄριστος
  chosen: excellent
  alternatives:
  - best
  - very skillful
  lexicon: LSJ
  rationale: In this simile modifying κυβερνήτης, the sense is qualitative excellence
    or skill. 'Excellent' is natural English and avoids the potentially absolute-sounding
    'best'.
- source_word: κυβερνήτης
  chosen: helmsman
  alternatives:
  - pilot
  - captain
  - steersman
  lexicon: LSJ
  rationale: The nautical metaphor is central in the verse. 'Helmsman' fits the immediate
    participle πηδαλιουχῶν ('steering with a rudder') better than the broader 'captain'
    or 'pilot'.
- source_word: ὁ ... λογισμός
  chosen: the reasoning
  alternatives:
  - the rational mind
  - reason
  - rational judgment
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for reasoned moral judgment governing
    the passions. 'The reasoning' preserves the active, governing sense here while
    remaining idiomatic in English.
- source_word: τοῦ πατρὸς ἡμῶν Ἐλεαζάρου
  chosen: of our father Eleazar
  alternatives:
  - of Eleazar our father
  lexicon: LSJ
  rationale: The genitive identifies Eleazar as the possessor of this reasoning. 'Our
    father Eleazar' preserves the honorific familial language used by the narrator.
- source_word: πηδαλιουχῶν
  chosen: was steering
  alternatives:
  - guiding by the helm
  - piloting
  lexicon: LSJ
  rationale: The participle is contemporaneous and vividly nautical. 'Was steering'
    conveys ongoing action and matches the ship metaphor naturally.
- source_word: τὴν τῆς εὐσεβείας ναῦν
  chosen: the ship of godliness
  alternatives:
  - the ship of piety
  - the vessel of reverence
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees denotes devout fidelity toward God. 'Godliness'
    is accessible modern English and carries the religious-moral sense better than
    the somewhat narrower 'piety' for many readers.
- source_word: ἐν τῷ τῶν παθῶν πελάγει
  chosen: on the sea of the passions
  alternatives:
  - in the open sea of passions
  - on the sea of sufferings
  - amid the passions' deep
  lexicon: LSJ
  rationale: πέλαγος is the open sea; πάθη in this book regularly refers to passions/emotions
    rather than external sufferings. 'On the sea of the passions' preserves the metaphor
    and the book's philosophical vocabulary.
