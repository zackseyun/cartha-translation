translation:
  text: and, being overwhelmed by the tyrant’s threats and being swamped by the billows
    of torments,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being flooded by the tyrant’s threats and drenched by the storm-waves
      of tortures.' The Greek uses sustained flood and sea-storm imagery in both participles
      and the final noun.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακλυζόμενος
  chosen: being overwhelmed
  alternatives:
  - being flooded
  - being inundated
  lexicon: LSJ
  rationale: The participle is built on imagery of flooding/being deluged. 'Being
    overwhelmed' preserves the metaphor in idiomatic English without sounding wooden,
    and fits the paired sea-storm imagery of the clause.
- source_word: ἀπειλαῖς
  chosen: threats
  alternatives:
  - menaces
  lexicon: BDAG
  rationale: Standard sense is verbal threats. 'Threats' is clear modern English and
    matches the coercive context.
- source_word: καταντλούμενος
  chosen: being swamped
  alternatives:
  - being bailed out upon
  - being drenched
  - being overwhelmed
  lexicon: LSJ
  rationale: The verb is rare and vivid, continuing the water/storm metaphor. Given
    the following 'billows,' 'being swamped' best conveys forceful engulfment in natural
    English. A more literal rendering tied to drawing/bailing water would be obscure
    here.
- source_word: βασάνων
  chosen: torments
  alternatives:
  - tortures
  - trials
  lexicon: BDAG
  rationale: In this martyrdom context the word denotes severe inflicted suffering.
    'Torments' preserves the intensity without over-specifying a technical mode of
    punishment, though 'tortures' is a viable alternative.
- source_word: τρικυμίαις
  chosen: billows
  alternatives:
  - surging waves
  - storm-waves
  lexicon: LSJ
  rationale: The noun denotes rough sea/surge and extends the flooding metaphor. 'Billows'
    is concise and literary enough for the elevated style, while remaining understandable.
- source_word: τοῦ τυράννου
  chosen: the tyrant’s
  alternatives:
  - of the tyrant
  lexicon: LSJ
  rationale: The genitive is naturally rendered possessively in English. 'Tyrant'
    is the plain sense and important to the book's moral framing.
