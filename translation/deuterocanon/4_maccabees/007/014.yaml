translation:
  text: by the spirit of reason, and by Isaac-like reasoning he nullified the many-headed
    wheel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the many-headed torture-wheel'; the Greek στρέβλα denotes an instrument
      of torture, and 'wheel' preserves the concrete image while the broader sense
      may be implied.
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεύματι
  chosen: spirit
  alternatives:
  - mind
  - power
  lexicon: BDAG
  rationale: The dative phrase τῷ πνεύματι τοῦ λογισμοῦ is best rendered literally
    as 'by the spirit of reason/reasoning.' Here πνεῦμα denotes the animating disposition
    or inner force of rational resolve rather than the Holy Spirit. 'Spirit' preserves
    the metaphorical force without overinterpreting it.
- source_word: λογισμοῦ / λογισμῷ
  chosen: reason / reasoning
  alternatives:
  - rationality
  - thought
  - resolve
  lexicon: BDAG
  rationale: The repeated λογισμός language is central in 4 Maccabees, where disciplined
    reason governs the passions. Rendering once as 'reason' and once as 'reasoning'
    keeps the repetition audible while fitting English syntax.
- source_word: Ἰσακείῳ
  chosen: Isaac-like
  alternatives:
  - of Isaac
  - in the manner of Isaac
  lexicon: LSJ
  rationale: The adjective means 'like Isaac' or 'Isaacian.' 'Isaac-like' preserves
    the explicit comparison and allusive force to Isaac as a model of obedient endurance,
    without flattening it into a mere possessive.
- source_word: πολυκέφαλον
  chosen: many-headed
  alternatives:
  - multi-headed
  lexicon: LSJ
  rationale: A straightforward compound adjective meaning 'many-headed.' The vivid
    imagery should be retained.
- source_word: στρέβλαν
  chosen: wheel
  alternatives:
  - rack
  - torture-wheel
  - instrument of torture
  lexicon: LSJ
  rationale: στρέβλα refers to an instrument of torture; in this context 'wheel' best
    matches the concrete image and the modifier 'many-headed.' Because the exact apparatus
    may be unfamiliar, the broader sense is preserved in the rationale rather than
    expanded in the main text.
- source_word: ἠκύρωσεν
  chosen: nullified
  alternatives:
  - rendered powerless
  - canceled
  - overcame
  lexicon: BDAG
  rationale: The verb means to invalidate or make ineffective. 'Nullified' preserves
    the strong sense that the torture device was rendered ineffective in its intended
    purpose, likely by the sufferer's rational steadfastness.
