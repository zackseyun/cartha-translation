theological_decisions:
- issue: Nature of 'spirit' in the phrase τῷ πνεύματι τοῦ λογισμοῦ
  chosen_reading: an inner animating force of rational resolve, not the Holy Spirit
  alternative_readings:
  - mind of reason
  - power of reason
  rationale: The context of 4 Maccabees consistently celebrates reason mastering suffering
    and passion. Nothing in the immediate wording suggests a reference to the divine
    Spirit; capitalizing or theologizing the term would import a claim the text does
    not make.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Force of the Isaac allusion
  chosen_reading: a simile/allusive comparison ('Isaac-like reasoning')
  alternative_readings:
  - reasoning belonging to Isaac
  - reasoning modeled on Isaac's example
  rationale: The adjectival form points to likeness rather than direct possession.
    The translation preserves the allusion without expanding it into a full interpretive
    gloss in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
