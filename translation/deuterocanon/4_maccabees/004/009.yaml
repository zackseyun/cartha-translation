theological_decisions:
- issue: Reference of 'the place' (τόπος)
  chosen_reading: the sacred place refers to the temple site under desecrating threat
  alternative_readings:
  - the city more broadly
  - the sanctuary in a narrower sense
  rationale: Within the immediate clause, the priests are 'in the temple' praying,
    so τόπος most naturally points to the holy place/temple area rather than a generalized
    location. The translation keeps the more literal 'place' but the rationale identifies
    the likely referent.
