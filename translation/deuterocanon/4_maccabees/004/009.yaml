reference: 4 Maccabees 4:9
source:
  edition: lxx-swete-1909
  text: τῶν δὲ ἱερέων μετὰ γυναικῶν καὶ παιδίων ἐν τῷ ἱερῷ ἱκετευόντων τὸν θεὸν ὑπερασπίσαι
    τοῦ καταφρονουμένου τόπου,
  language: Greek
