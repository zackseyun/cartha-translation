translation:
  text: So Apollonius, having fallen half-dead upon the lifeless enclosure of the
    sanctuary, stretched out his hands to heaven and with tears begged the Hebrews
    to pray concerning him, so that they might appease the heavenly host.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the precinct of the sanctuary.' The Greek term refers to an enclosed
      sacred area.
    reason: lexical_alternative
  - marker: b
    text: Or 'to pray for him.' Literally, 'to pray concerning him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the heavenly army' or 'the host of heaven.' The Greek leaves the precise
      referent somewhat open.
    reason: alternative_reading
lexical_decisions:
- source_word: καταπεσὼν
  chosen: having fallen
  alternatives:
  - falling down
  - after collapsing
  lexicon: LSJ
  rationale: Aorist participle indicating prior action relative to the main verb;
    'having fallen' preserves the sequence without over-paraphrasing.
- source_word: ἡμιθανὴς
  chosen: half-dead
  alternatives:
  - nearly dead
  - at the point of death
  lexicon: LSJ
  rationale: The compound plainly means 'half-dead' or 'nearly dead.' 'Half-dead'
    is vivid and close to the Greek.
- source_word: ἄψυχον
  chosen: lifeless
  alternatives:
  - inanimate
  - dead
  lexicon: LSJ
  rationale: Literally 'without life/soul.' Here it describes the stone precinct/enclosure;
    'lifeless' fits the physical setting better than 'dead' and preserves the contrast
    with the dying man.
- source_word: τοῦ ἱεροῦ περίβολον
  chosen: the enclosure of the sanctuary
  alternatives:
  - the temple court enclosure
  - the precinct of the sanctuary
  lexicon: LSJ
  rationale: περίβολος denotes an enclosed area or precinct. Because ἱερόν can refer
    broadly to the sacred complex, 'enclosure of the sanctuary' is a balanced rendering.
- source_word: τὰς χεῖρας ἐκτείνων εἰς τὸν οὐρανόν
  chosen: stretched out his hands to heaven
  alternatives:
  - extended his hands toward heaven
  lexicon: LSJ
  rationale: A conventional gesture of supplication. 'To heaven' is idiomatic English
    and preserves the upward direction.
- source_word: παρεκάλει
  chosen: begged
  alternatives:
  - implored
  - entreated
  - urged
  lexicon: BDAG
  rationale: In this context of desperate appeal from a dying man, 'begged' best conveys
    the emotional force.
- source_word: ὅπως περὶ αὐτοῦ εὐξόμενοι
  chosen: to pray concerning him
  alternatives:
  - to pray for him
  - while praying about him
  lexicon: LSJ
  rationale: The participial construction expresses the content/purpose of his plea.
    'Concerning him' stays close to περὶ αὐτοῦ, though the sense is effectively intercessory
    prayer.
- source_word: ἐξευμενίσωνται
  chosen: they might appease
  alternatives:
  - they might propitiate
  - they might win the favor of
  lexicon: LSJ
  rationale: The verb means to make favorable or appease. 'Appease' is accessible
    modern English without importing later technical atonement language.
- source_word: τὸν ἐπουράνιον ... στρατόν
  chosen: the heavenly host
  alternatives:
  - the heavenly army
  - the host of heaven
  lexicon: LSJ
  rationale: στρατός can mean army or host. In a religious context with ἐπουράνιος,
    'heavenly host' is the most natural English equivalent and preserves the collective
    celestial sense.
