theological_decisions:
- issue: Referent of 'the heavenly host'
  chosen_reading: A collective heavenly power or host is left as stated, without specifying
    angels or God directly.
  alternative_readings:
  - the heavenly army (angelic beings)
  - the heavenly power as a reverential circumlocution for God
  rationale: The Greek says 'the heavenly host' and does not explicitly identify the
    referent more narrowly. The translation preserves that ambiguity rather than resolving
    it.
  doctrine_reference: Preserve theological tension rather than resolve it.
