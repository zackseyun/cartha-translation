id: 4MA.4.19
reference: 4 Maccabees 4:19
source:
  edition: lxx-swete-1909
  text: ὥστε μὴ μόνον ἐπʼ αὐτῇ τῇ ἄκρᾳ τῆς πατρίδος ἡμῶν γυμνάσιον κατασκευάσαι, ἀλλὰ
    καὶ καταλῦσαι τὴν τοῦ ἱεροῦ κηδεμονίαν.
