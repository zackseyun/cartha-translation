translation:
  text: so that he not only built a gymnasium at the very citadel of our homeland,
    but also abolished the guardianship of the temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the very Acra of our homeland,' if ἄκρα is taken as the specific
      Jerusalem citadel rather than a descriptive 'citadel.'
    reason: alternative_reading
  - marker: b
    text: Or 'the oversight/care of the temple.' The Greek speaks of abolishing its
      custodial administration, not of tearing down the temple itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - therefore
  lexicon: LSJ
  rationale: Introduces the consequence of the preceding actions; 'so that' preserves
    the resultative force without overinterpreting it as a simple logical conclusion.
- source_word: μὴ μόνον ... ἀλλὰ καὶ
  chosen: not only ... but also
  alternatives:
  - not merely ... but even
  lexicon: LSJ
  rationale: Standard correlative construction; preserved directly in English for
    rhetorical balance.
- source_word: ἐπʼ αὐτῇ τῇ ἄκρᾳ
  chosen: at the very citadel
  alternatives:
  - on the very height
  - at the very acropolis
  lexicon: LSJ
  rationale: ἄκρα commonly denotes a citadel or fortified height. In this Hellenistic-Jerusalem
    context, 'citadel' best conveys a specific elevated stronghold without requiring
    the transliteration 'Acra.' 'Very' reflects αὐτῇ for emphasis.
- source_word: τῆς πατρίδος ἡμῶν
  chosen: of our homeland
  alternatives:
  - of our fatherland
  - of our native land
  lexicon: LSJ
  rationale: πατρίς refers to one's ancestral/native land. 'Homeland' is natural modern
    English and retains the patriotic sense.
- source_word: γυμνάσιον
  chosen: gymnasium
  alternatives:
  - training school
  lexicon: LSJ
  rationale: The Greek term refers specifically to the Hellenistic gymnasium institution;
    'gymnasium' preserves the cultural specificity better than a generalized paraphrase.
- source_word: κατασκευάσαι
  chosen: built
  alternatives:
  - constructed
  - established
  lexicon: LSJ
  rationale: The infinitive denotes causing to be made or constructed. 'Built' is
    concise and idiomatic in context.
- source_word: καταλῦσαι
  chosen: abolished
  alternatives:
  - did away with
  - dismantled
  - nullified
  lexicon: LSJ
  rationale: The verb can mean destroy, dissolve, or abolish. Here the object is an
    institutional arrangement ('guardianship'), so 'abolished' best fits the abstract-administrative
    sense.
- source_word: κηδεμονίαν
  chosen: guardianship
  alternatives:
  - oversight
  - care
  - custodianship
  lexicon: LSJ
  rationale: κηδεμονία denotes guardianship, protection, or administrative care. 'Guardianship'
    keeps the formal sense of entrusted oversight over the temple.
- source_word: τοῦ ἱεροῦ
  chosen: the temple
  alternatives:
  - the sanctuary
  - the holy place
  lexicon: LSJ
  rationale: In this context ἱερόν refers to the temple complex. 'Temple' is the clearest
    standard rendering.
