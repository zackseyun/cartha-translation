theological_decisions:
- issue: Historical-cultic nuance of ἄκρα in relation to Jerusalem
  chosen_reading: rendered descriptively as 'citadel' rather than transliterated as
    a place-name
  alternative_readings:
  - Acra
  rationale: The Greek noun itself means citadel/fortress. Since the verse does not
    require the technical place-name for comprehension, the descriptive rendering
    better serves readability while preserving the likely historical reference.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; original-language primacy over translation tradition.'
- issue: Force of κηδεμονία τοῦ ἱεροῦ
  chosen_reading: '''the guardianship of the temple'' as an institutional oversight
    that was abolished'
  alternative_readings:
  - the care of the temple
  - the temple administration
  rationale: The phrase points to the protective/administrative custody associated
    with the temple rather than the building's physical destruction. The rendering
    avoids importing a more specific institutional theory than the Greek states.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; never import doctrinal claims the text does not make.'
