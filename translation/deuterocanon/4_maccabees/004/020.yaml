theological_decisions:
- issue: Personification of δίκη
  chosen_reading: Render as 'divine justice' acting personally
  alternative_readings:
  - Render more concretely as 'divine punishment'
  - Render more explicitly as 'God's justice'
  rationale: The Greek personifies δίκη as an active force that becomes indignant
    and wages war. 'Divine justice' preserves that literary-theological personification
    without collapsing it into a direct naming of God or reducing it merely to an
    impersonal penalty.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening theological weight.'
