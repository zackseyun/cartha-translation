translation:
  text: Because of these things, divine justice, having become indignant, made war
    against Antiochus himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divine punishment' or 'divine judgment'; Greek δίκη can denote justice
      in action, judicial penalty, or retribution.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφʼ οἷς
  chosen: Because of these things
  alternatives:
  - for which things
  - on account of which
  lexicon: LSJ
  rationale: The preposition with relative pronoun is causal here, referring back
    to Antiochus's preceding actions. 'Because of these things' gives clear modern
    English while preserving the backward-looking causal force.
- source_word: ἀγανακτήσασα
  chosen: having become indignant
  alternatives:
  - being angered
  - becoming outraged
  lexicon: LSJ
  rationale: The participle denotes strong displeasure or indignation. 'Having become
    indignant' preserves the participial relation to the main verb and fits the elevated
    style of the passage.
- source_word: ἡ θεία δίκη
  chosen: divine justice
  alternatives:
  - the divine justice
  - divine judgment
  - the justice of God
  lexicon: LSJ
  rationale: δίκη can denote justice, penalty, or judicial retribution. Here it is
    personified and qualified by θεία, so 'divine justice' best preserves both the
    abstract and retributive sense without over-specifying as a direct divine name.
    The article is not required in idiomatic English.
- source_word: αὐτόν τοι τὸν Ἀντίοχον
  chosen: Antiochus himself
  alternatives:
  - that very Antiochus
  - Antiochus in person
  lexicon: LSJ
  rationale: The combination is emphatic, singling Antiochus out. 'Antiochus himself'
    captures the emphasis naturally in English. τοι is treated as an enclitic intensifier
    rather than separately translated.
- source_word: ἐπολέμησεν
  chosen: made war against
  alternatives:
  - fought against
  - waged war against
  lexicon: LSJ
  rationale: The verb is martial and metaphorical in this personified context. 'Made
    war against' preserves the elevated, active hostility of the Greek better than
    the flatter 'fought against.'
