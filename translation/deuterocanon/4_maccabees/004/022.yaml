id: 4MA.4.22
reference: 4 Maccabees 4:22
source:
  edition: lxx-swete-1909
  text: καὶ ὡς ἐπόρθησεν αὐτούς, δόγμα ἔθετο ὅπως εἴ τινες αὐτῶν φαίνοιεν τῷ πατρίῳ
    πολιτευόμενοι νόμῳ, θάνοιεν.
