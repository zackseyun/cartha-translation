translation:
  text: And when he had subdued them, he issued a decree that if any of them were
    found living according to the ancestral law, they should be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if any of them appeared to be conducting themselves by the law of their
      fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπόρθησεν
  chosen: had subdued
  alternatives:
  - had ravaged
  - had sacked
  - had overrun
  lexicon: LSJ
  rationale: The verb can denote devastating conquest or plundering. In this context,
    with a following decree imposed on the conquered people, 'had subdued' captures
    the result of military domination in readable English without over-specifying
    physical destruction.
- source_word: δόγμα ἔθετο
  chosen: issued a decree
  alternatives:
  - established a decree
  - set forth an edict
  lexicon: LSJ
  rationale: The idiom means to promulgate an official ruling. 'Issued a decree' is
    natural modern English and preserves the formal governmental sense.
- source_word: φαίνοιεν
  chosen: were found
  alternatives:
  - appeared
  - were seen
  - were shown
  lexicon: LSJ
  rationale: Although literally 'might appear,' in legal-administrative context the
    sense is that persons are discovered or identified as acting in a certain way.
    'Were found' best conveys that practical force in English.
- source_word: τῷ πατρίῳ ... νόμῳ
  chosen: the ancestral law
  alternatives:
  - the law of their fathers
  - the ancestral custom/law
  lexicon: LSJ
  rationale: πάτριος refers to what belongs to the fathers/ancestors. 'Ancestral law'
    is concise and preserves the inherited, traditional character of the Jewish law
    in this context.
- source_word: πολιτευόμενοι
  chosen: living according to
  alternatives:
  - conducting themselves by
  - ordering their lives by
  - observing
  lexicon: LSJ
  rationale: The participle refers to conducting one's life or living as a citizen
    under a norm. 'Living according to' communicates ongoing manner of life under
    the law more clearly than a wooden civic expression.
- source_word: θάνοιεν
  chosen: they should be put to death
  alternatives:
  - they should die
  - they were to die
  lexicon: LSJ
  rationale: 'In the context of a royal decree prescribing punishment, English idiom
    normally expresses the passive penal sense: ''be put to death.'' This makes explicit
    that the death is judicially imposed, not merely eventual.'
