translation:
  text: Now when Seleucus the king had died, his son Antiochus Epiphanes succeeded
    to the rule, a proud and formidable man;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a proud and fearsome man.' The Greek δεινός can carry a range of senses
      including formidable, terrible, or fearsome.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τελευτήσαντος
  chosen: had died
  alternatives:
  - having died
  - after the death of
  lexicon: LSJ
  rationale: Aorist genitive absolute from τελευτάω. 'Had died' gives natural English
    for the prior action while preserving the temporal force of the genitive absolute.
- source_word: διάδεχεται
  chosen: succeeded to
  alternatives:
  - received in succession
  - took over
  - inherited
  lexicon: LSJ
  rationale: The verb indicates succession to office or rule. 'Succeeded to' is idiomatic
    English that preserves the formal sense of dynastic succession better than the
    looser 'took over.'
- source_word: τὴν ἀρχήν
  chosen: the rule
  alternatives:
  - the իշխան?
  - the government
  - the sovereignty
  - the kingdom
  lexicon: LSJ
  rationale: ἀρχή here refers to governing authority or rulership. 'The rule' is concise
    and natural, avoiding over-specification such as 'kingdom' while still conveying
    political authority.
- source_word: Ἐπιφανής
  chosen: Epiphanes
  alternatives:
  - Illustrious
  - Manifest
  lexicon: LSJ
  rationale: This is part of the ruler's established epithet/name in historical usage,
    so it is transliterated rather than translated, in keeping with the policy to
    transliterate personal names.
- source_word: ἀνὴρ
  chosen: man
  alternatives:
  - person
  lexicon: LSJ
  rationale: The Greek explicitly uses the masculine singular noun 'man.' 'Man' is
    gender-accurate and idiomatic in this appositional description.
- source_word: ὑπερήφανος
  chosen: proud
  alternatives:
  - arrogant
  - haughty
  lexicon: LSJ
  rationale: The term denotes arrogance or haughtiness. 'Proud' is readable modern
    English; the negative sense is clear from context, though 'arrogant' is a viable
    stronger alternative.
- source_word: δεινός
  chosen: formidable
  alternatives:
  - terrible
  - fearsome
  - clever
  - dangerous
  lexicon: LSJ
  rationale: δεινός can range from 'terrible/fearsome' to 'capable/skilled' depending
    on context. Here, in a hostile characterization of Antiochus, 'formidable' captures
    his threatening and powerful character without overcommitting to one narrower
    nuance.
