  text: Τελευτήσαντος δὲ Σελεύκου τοῦ βασιλέως, διάδεχεται τὴν ἀρχὴν ὁ υἱὸς αὐτοῦ
    Ἀντίοχος Ἐπιφανής, ἀνὴρ ὑπερήφανος, δεινός·
