id: 4MA.4.1
reference: 4 Maccabees 4:1
source:
  edition: lxx-swete-1909
  text: Σίμων γάρ τις πρὸς Ὀνίαν ἀντιπολιτευόμενος τὸν ποτε τὴν ἀρχιερωσύνην ἔχοντα
    διὰ βίου, καλὸν καὶ ἀγαθὸν ἄνδρα, ἐπειδὴ πάντα τρόπον διαβάλων ὑπὲρ τοῦ ἔθνους
    οὐκ ἴσχυεν κακῶσαι, φυγὰς ᾤχετο, τὴν πατρίδα προδώσων.
  language: Greek
  pages:
