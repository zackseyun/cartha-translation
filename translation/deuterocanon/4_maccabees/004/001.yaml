translation:
  text: For a certain Simon, opposing Onias—the man who had formerly held the high
    priesthood for life, a noble and good man—when he was unable, despite slandering
    him in every way, to harm him in matters concerning the nation, went away as an
    exile, intending to betray his homeland.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'departed as a fugitive'; the Greek φυγάς can denote either an exile
      or one in flight.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in matters concerning the nation' reflects a cautious rendering
      of the Greek ὑπὲρ τοῦ ἔθνους, which may also be understood more specifically
      as 'with respect to the nation' or, less likely in context, 'on behalf of the
      nation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντιπολιτευόμενος
  chosen: opposing
  alternatives:
  - acting politically against
  - being hostile to
  - contending against
  lexicon: LSJ
  rationale: The participle denotes active opposition, likely with political overtones.
    'Opposing' is clear modern English and preserves the adversarial sense without
    over-specifying a technical political nuance.
- source_word: τὸν ποτε τὴν ἀρχιερωσύνην ἔχοντα διὰ βίου
  chosen: the man who had formerly held the high priesthood for life
  alternatives:
  - who once held the high priesthood for life
  - the former lifelong high priest
  lexicon: LSJ
  rationale: ποτε here points to a former state ('formerly/once'). διὰ βίου modifies
    the tenure of the high priesthood. This rendering keeps the temporal and institutional
    details explicit while remaining readable.
- source_word: καλὸν καὶ ἀγαθὸν ἄνδρα
  chosen: a noble and good man
  alternatives:
  - a fine and good man
  - an honorable and good man
  lexicon: LSJ
  rationale: The pair καλός and ἀγαθός is commendatory and somewhat idiomatic. 'Noble
    and good' preserves the elevated moral characterization better than the flatter
    'fine and good.'
- source_word: διαβάλων
  chosen: slandering him
  alternatives:
  - maligning him
  - bringing accusations against him
  - calumniating him
  lexicon: LSJ
  rationale: διαβάλλω commonly carries the sense of malicious accusation or slander.
    'Slandering him' best captures the hostile, defamatory force in accessible English.
- source_word: ὑπὲρ τοῦ ἔθνους
  chosen: in matters concerning the nation
  alternatives:
  - with respect to the nation
  - against the nation
  - on behalf of the nation
  lexicon: LSJ
  rationale: The phrase modifies the sphere in which Simon sought to injure Onias.
    Because ὑπέρ can vary in force, this rendering avoids importing a stronger directional
    claim than the Greek requires while preserving the national/public context.
- source_word: οὐκ ἴσχυεν κακῶσαι
  chosen: was unable ... to harm him
  alternatives:
  - was not strong enough to injure him
  - could not do him harm
  lexicon: LSJ
  rationale: The construction expresses inability to inflict harm. 'Was unable to
    harm him' is natural English and preserves both the incapacity and the hostile
    intent.
- source_word: φυγὰς ᾤχετο
  chosen: went away as an exile
  alternatives:
  - departed as a fugitive
  - went off in exile
  lexicon: LSJ
  rationale: φυγάς can mean exile or fugitive. 'As an exile' fits the narrative register
    and avoids implying mere flight from danger; it suggests his departure under disgrace
    or banishment.
- source_word: τὴν πατρίδα προδώσων
  chosen: intending to betray his homeland
  alternatives:
  - about to betray his fatherland
  - with the intention of betraying his country
  lexicon: LSJ
  rationale: The future participle expresses purpose or intention. πατρίς is best
    rendered 'homeland' here, preserving patriotic and ancestral resonance without
    sounding archaic.
