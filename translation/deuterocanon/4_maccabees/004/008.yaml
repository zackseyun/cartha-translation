translation:
  text: They were preventing whatever was possible. But with threats Apollonius was
    going away to the temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They were hindering as much as they could.' The Greek idiom οἷόν τε
      ἦν can be rendered more explicitly in terms of ability.
    reason: lexical_alternative
  - marker: b
    text: '''Temple'' translates ἱερόν, which can refer to the temple precincts broadly,
      not only the inner sanctuary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷόν τε ἦν
  chosen: whatever was possible
  alternatives:
  - as much as was possible
  - what they were able to do
  lexicon: LSJ
  rationale: The idiom οἷόν τε ἦν expresses possibility or capability. Because ἐκώλυον
    is plural, the sense is that they were hindering to the extent they could. 'Whatever
    was possible' preserves the open-ended force without overparaphrasing.
- source_word: ἐκώλυον
  chosen: they were preventing
  alternatives:
  - they were hindering
  - they were restraining
  lexicon: BDAG
  rationale: Imperfect active plural indicates ongoing attempted obstruction. 'Preventing'
    fits the direct sense of κωλύω, though the context may imply hindering rather
    than total success.
- source_word: μετὰ ἀπειλῆς
  chosen: with threats
  alternatives:
  - with a threat
  - threateningly
  lexicon: LSJ
  rationale: The prepositional phrase denotes accompaniment or manner. Although singular
    in Greek, English idiom more naturally uses the plural 'with threats' for hostile
    intimidation.
- source_word: ἀπῄει
  chosen: was going away
  alternatives:
  - departed
  - went off
  lexicon: BDAG
  rationale: The imperfect suggests movement in progress rather than a simple punctiliar
    departure. 'Was going away' preserves that aspect, though slightly wooden; it
    remains close to the Greek.
- source_word: εἰς τὸ ἱερόν
  chosen: to the temple
  alternatives:
  - into the temple precincts
  - to the sanctuary
  lexicon: BDAG
  rationale: ἱερόν normally denotes the temple complex/precincts rather than the inner
    sanctuary. 'Temple' is the most natural English rendering here; 'precincts' is
    possible but unnecessarily specific in the main text.
- source_word: ὁ Ἀπολλώνιος
  chosen: Apollonius
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
