theological_decisions:
- issue: Scope of τὸν Ἰουδαϊσμόν
  chosen_reading: Rendered as 'Judaism' without narrowing it to either religion alone
    or ethnicity alone.
  alternative_readings:
  - the Jewish religion
  - the Jewish way of life
  rationale: In this context the term includes covenantal practice and communal identity
    under persecution. The simple 'Judaism' preserves that breadth and avoids importing
    a narrower modern category.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Force of μιερῶν τροφῶν
  chosen_reading: Rendered as 'defiling foods' to preserve ritual/moral offense.
  alternative_readings:
  - unclean foods
  - polluted foods
  rationale: The narrator's wording is evaluative and tied to Jewish purity concerns.
    'Defiling' communicates the cultic and moral contamination without overtechnical
    language.
  doctrine_reference: Translation philosophy §§1, 6
