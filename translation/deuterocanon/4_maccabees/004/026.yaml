id: 4MA.4.26
reference: 4 Maccabees 4:26
source:
  edition: lxx-swete-1909
  text: ἐπεὶ οὖν τὰ δόγματα αὐτοῦ κατεφρονεῖτο ὑπὸ τοῦ λαοῦ, αὐτὸς διὰ βασάνων ἕνα
    ἕκαστον τοῦ ἔθνους ἠνάγκαζεν, μιερῶν ἀπογευομένους τροφῶν, ἐξόμνυσθαι τὸν Ἰουδαϊσμόν.
  language: Greek
  pages:
  - 759
  confidence: high
  validation: agree
translation:
  text: Therefore, since his decrees were being despised by the people, he himself
    was compelling each and every one of the nation, by tortures, after tasting defiling
    foods, to renounce Judaism.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unclean foods' or 'polluted foods.' The Greek term emphasizes ritual
      defilement.
    reason: lexical_alternative
  - marker: b
    text: Or 'to forswear Judaism.' The Greek verb can carry the sense of renouncing
      under oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: δόγματα
  chosen: decrees
  alternatives:
  - edicts
  - ordinances
  lexicon: BDAG
  rationale: δόγματα here refers to official rulings or commands issued by the ruler.
    'Decrees' preserves the authoritative force without sounding overly technical.
    'Edicts' was possible, but 'decrees' fits both singular authority and broader
    policy.
- source_word: κατεφρονεῖτο
  chosen: were being despised
  alternatives:
  - were being disregarded
  - were being treated with contempt
  lexicon: BDAG
  rationale: The imperfect passive indicates ongoing contemptuous rejection. 'Were
    being despised' keeps the durative sense and the stronger nuance of contempt better
    than the milder 'disregarded'.
- source_word: διὰ βασάνων
  chosen: by tortures
  alternatives:
  - through tortures
  - by means of torments
  lexicon: BDAG
  rationale: The phrase denotes coercion by torture. 'By tortures' is concise and
    preserves the instrumental force of διά with the gravity of βάσανοι.
- source_word: ἕνα ἕκαστον
  chosen: each and every one
  alternatives:
  - each one
  - every individual
  lexicon: BDAG
  rationale: The doubled distributive expression is emphatic. 'Each and every one'
    reflects that emphasis more clearly than the flatter 'each one'.
- source_word: τοῦ ἔθνους
  chosen: of the nation
  alternatives:
  - of the people
  - of the Jewish nation
  lexicon: BDAG
  rationale: ἔθνος here refers specifically to the Jewish nation as a people-group.
    'Of the nation' preserves the ethnic-national sense already clarified by the context,
    without adding 'Jewish' where the Greek does not repeat it explicitly.
- source_word: μιερῶν ... τροφῶν
  chosen: defiling foods
  alternatives:
  - polluted foods
  - unclean foods
  - abominable foods
  lexicon: LSJ
  rationale: μιερός carries the sense of ritually polluted or defiling. 'Defiling
    foods' communicates the cultic offense in accessible English. 'Unclean foods'
    is possible, but could sound like a fixed technical label rather than the narrator's
    evaluative wording.
- source_word: ἀπογευομένους
  chosen: when they had tasted
  alternatives:
  - after tasting
  - having partaken of
  lexicon: BDAG
  rationale: The participle indicates prior action relative to the infinitive ἐξόμνυσθαι.
    'When they had tasted' preserves that temporal relation and avoids the slightly
    more interpretive 'partaken of'.
- source_word: ἐξόμνυσθαι
  chosen: to renounce
  alternatives:
  - to forswear
  - to abjure
  lexicon: BDAG
  rationale: The verb means to deny on oath or formally renounce. 'To renounce' is
    clear modern English; the oath-related force is present in the verb but need not
    be made overly wooden in the main text.
- source_word: τὸν Ἰουδαϊσμόν
  chosen: Judaism
  alternatives:
  - the Jewish way of life
  - the Jewish religion
  lexicon: BDAG
  rationale: Ἰουδαϊσμός is the established Greek term for Jewish religion/practice/identity.
    'Judaism' is the most direct and transparent rendering, while alternatives are
    more interpretive expansions.
