translation:
  text: And he permitted him to serve as high priest and to lead the nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to govern the nation.' The Greek verb can carry the sense of leading
      as chief.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέτρεψεν
  chosen: permitted
  alternatives:
  - allowed
  - authorized
  lexicon: BDAG
  rationale: The verb denotes granting permission or allowing an action. 'Permitted'
    preserves the sense of authorization without overstating it as a formal appointment
    formula.
- source_word: ἀρχιερασθαι
  chosen: to serve as high priest
  alternatives:
  - to be high priest
  - to hold the high priesthood
  lexicon: LSJ
  rationale: The infinitive expresses exercising the office of high priest. 'Serve
    as high priest' is idiomatic English and conveys function rather than merely status.
- source_word: τοῦ ἔθνους
  chosen: the nation
  alternatives:
  - the people
  - the ethnic group
  lexicon: BDAG
  rationale: In this Jewish national context, ἔθνος refers to the people as a national
    body. 'Nation' best matches the political-communal sense here.
- source_word: ἀφηγεῖσθαι
  chosen: to lead
  alternatives:
  - to govern
  - to be leader of
  - to rule
  lexicon: LSJ
  rationale: The verb means to lead or guide as chief. 'To lead' is broad enough to
    preserve the Greek without importing a stronger claim of domination than the text
    states.
