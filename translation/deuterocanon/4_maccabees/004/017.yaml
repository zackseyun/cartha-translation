theological_decisions:
- issue: Scope of authority granted to him
  chosen_reading: The verse states that permission was given both for the high priesthood
    and for leadership of the nation.
  alternative_readings:
  - The second infinitive could be heard more politically as 'to govern the nation'
    rather than more generally 'to lead the nation'.
  rationale: The Greek coordinates two infinitives under one verb of permission. The
    translation preserves both religious and civic dimensions without sharpening the
    political nuance beyond the wording.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
