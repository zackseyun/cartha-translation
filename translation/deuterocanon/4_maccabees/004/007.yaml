translation:
  text: And when the nation was raging at the proposal and speaking against it, they
    considered it utterly dreadful if those who had entrusted their deposits to the
    sacred treasury should be deprived of them, since
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''to the sacred treasury''; context indicates the temple treasury.'
    reason: cultural_note
  - marker: b
    text: The sentence is incomplete in this verse and continues into the next with
      the reason introduced by 'since.'
    reason: cross_reference
lexical_decisions:
- source_word: τοῦ ἔθνους
  chosen: the nation
  alternatives:
  - the people
  - the populace
  lexicon: LSJ
  rationale: ἔθνος here refers collectively to the Jewish populace, not to a Gentile
    nation in contrast to Israel. 'The nation' preserves the collective-political
    sense better than the more diffuse 'people.'
- source_word: πρὸς τὸν λόγον
  chosen: at the proposal
  alternatives:
  - at the matter
  - at the statement
  - against the plan
  lexicon: LSJ
  rationale: λόγος can mean word, speech, matter, or proposal. In context the populace
    is reacting to the announced plan concerning temple funds, so 'proposal' captures
    the practical sense without over-paraphrasing.
- source_word: σχετλιάζοντος
  chosen: was raging
  alternatives:
  - was indignant
  - was furious
  - was outraged
  lexicon: LSJ
  rationale: The participle conveys vehement anger or savage indignation. 'Was raging'
    communicates the intensity in idiomatic modern English.
- source_word: ἀντιλέγοντός
  chosen: speaking against it
  alternatives:
  - objecting
  - contradicting
  - opposing it
  lexicon: LSJ
  rationale: ἀντιλέγω means to speak against or oppose. 'Speaking against it' preserves
    the verbal force alongside the preceding emotional reaction.
- source_word: πάνδεινον
  chosen: utterly dreadful
  alternatives:
  - altogether terrible
  - most dreadful
  - a complete horror
  lexicon: LSJ
  rationale: The compound intensifies δεινός. 'Utterly dreadful' reflects the superlative
    force in natural English.
- source_word: νομίσαντες
  chosen: they considered
  alternatives:
  - they thought
  - they judged
  lexicon: LSJ
  rationale: Aorist participle of νομίζω here introduces the content of their judgment.
    'They considered' is clear and suitably formal.
- source_word: οἱ τὰς παρακαταθήκας πιστεύσαντες
  chosen: those who had entrusted their deposits
  alternatives:
  - those who had deposited valuables
  - those who had committed their trusts
  lexicon: LSJ
  rationale: παρακαταθήκη denotes something entrusted for safekeeping; πιστεύω with
    the accusative/object and dative recipient means entrust. 'Entrusted their deposits'
    preserves both the act of trust and the stored property.
- source_word: τῷ ἱερῷ θησαυρῷ
  chosen: to the sacred treasury
  alternatives:
  - to the holy treasury
  - to the temple treasury
  lexicon: LSJ
  rationale: ἱερός marks the treasury as sacred/temple-related. 'Sacred treasury'
    stays close to the Greek while remaining readable; 'temple treasury' is interpretive
    but contextually implied.
- source_word: στερηθήσονται
  chosen: should be deprived of them
  alternatives:
  - should lose them
  - should be robbed of them
  lexicon: LSJ
  rationale: στερέω in the passive means to be deprived or bereft. 'Should be deprived
    of them' matches the future passive and the legal-financial context.
- source_word: ὡς
  chosen: since
  alternatives:
  - because
  - inasmuch as
  - on the grounds that
  lexicon: LSJ
  rationale: The verse ends with ὡς introducing the reason or explanation continued
    in the next verse. 'Since' best signals that the sentence is incomplete and forward-looking.
