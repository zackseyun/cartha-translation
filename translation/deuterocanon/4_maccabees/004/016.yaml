translation:
  text: He deposed Onias from the high priesthood and appointed Jason, his own brother,
    as high priest, after he promised to give, if he would grant him the office, three
    thousand six hundred sixty talents per year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'promised to pay'; the Greek simply says 'promised to give,' leaving
      the corrupt character of the payment to be inferred from the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταλύσας
  chosen: deposed
  alternatives:
  - removed
  - dethroned
  - deprived
  lexicon: BDAG
  rationale: In this political/priestly context, the participle denotes bringing Onias'
    tenure to an end rather than literal destruction. 'Deposed' captures formal removal
    from office more precisely than the broader 'removed'.
- source_word: τὸν Ὀνίαν τῆς ἀρχιερωσύνης
  chosen: Onias from the high priesthood
  alternatives:
  - Onias of the high priesthood
  - Onias from being high priest
  lexicon: BDAG
  rationale: The genitive with καταλύσας indicates removal from the office. English
    idiom requires restructuring to express that Onias was stripped of the high priestly
    office.
- source_word: κατέστησεν ἀρχιερέα
  chosen: appointed ... as high priest
  alternatives:
  - made ... high priest
  - installed ... as high priest
  lexicon: BDAG
  rationale: This is an official appointment to office. 'Appointed ... as high priest'
    is clear modern English and preserves the formal sense.
- source_word: ὑποσχόμενον δώσειν
  chosen: after he promised to give
  alternatives:
  - who promised to pay
  - upon promising to give
  lexicon: BDAG
  rationale: The participle modifies Jason and explains the basis for the appointment.
    'Promised to give' stays close to the Greek without overinterpreting the payment
    as a bribe in the main text.
- source_word: εἰ ἐπιτρέψειεν αὐτῷ τὴν ἀρχήν
  chosen: if he would grant him the office
  alternatives:
  - if he would entrust the rule to him
  - if he would permit him the authority
  lexicon: BDAG
  rationale: τὴν ἀρχήν here refers to the governing office/position being sought,
    in context the high priestly authority. 'Grant him the office' is idiomatic and
    contextually precise.
- source_word: κατʼ ἐνιαυτόν
  chosen: per year
  alternatives:
  - yearly
  - annually
  lexicon: BDAG
  rationale: This phrase specifies an annual payment. 'Per year' is concise and natural.
- source_word: τρισχίλια ἑξακόσια ἑξήκοντα τάλαντα
  chosen: three thousand six hundred sixty talents
  alternatives:
  - 3,660 talents
  lexicon: LSJ
  rationale: The amount is rendered fully in words for literary readability while
    preserving the exact figure and the ancient monetary unit 'talents'.
