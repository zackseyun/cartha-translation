theological_decisions:
- issue: Moral characterization of Jason's payment
  chosen_reading: Render the transaction descriptively without adding evaluative language
    such as 'bribe' in the main text.
  alternative_readings:
  - Translate more interpretively as 'after he promised to pay him' or 'by bribing
    him'
  rationale: The Greek states that Jason promised to give a specified annual sum if
    granted the office. The corrupt nature of the act is contextually evident, but
    the verse itself does not use an explicit term for bribery. Optimal equivalence
    favors preserving the stated action without importing stronger moral labeling
    into the main text.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
