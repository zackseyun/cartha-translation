  text: μετὰ τοῦ καταράτου Σίμωνος καὶ βαρυτάτου στρατοῦ. προσελθών, ταῖς τοῦ βασιλέως
    ἐντολαῖς ἥκειν ἔλεγεν, ὅπως τὰ ἰδιωτικὰ τοῦ γαζοφυλακίου λάβοι χρήματα.
