theological_decisions:
- issue: Whether to specify the treasury as 'temple treasury' in the main text
  chosen_reading: of the treasury
  alternative_readings:
  - of the temple treasury
  rationale: The broader context concerns the Jerusalem temple, but this clause itself
    says only γαζοφυλακίου. To avoid importing contextual detail into the lexical
    rendering, the main text keeps the more direct 'treasury'; the contextual specification
    can be inferred by readers from the surrounding passage.
  doctrine_reference: Translation philosophy §1, §5
