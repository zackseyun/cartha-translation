translation:
  text: with the accursed Simon and a very large force. After coming forward, he said
    that he had come by the king’s commands, in order to take the private funds of
    the treasury.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a very large army' or 'a most formidable force'; the Greek literally
      says 'a very heavy force/army,' using 'heavy' metaphorically for oppressive
      or formidable military strength.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the private funds of the treasury' likely refers to monies regarded
      as private or deposited funds within the treasury, not necessarily the whole
      treasury itself.
    reason: cultural_note
lexical_decisions:
- source_word: καταράτου
  chosen: accursed
  alternatives:
  - cursed
  lexicon: LSJ
  rationale: The adjective denotes one under a curse or worthy of cursing. 'Accursed'
    preserves the strong condemnatory force more naturally in elevated narrative English
    than the flatter 'cursed'.
- source_word: βαρυτάτου στρατοῦ
  chosen: a very heavy force
  alternatives:
  - a very large army
  - a most formidable force
  lexicon: LSJ
  rationale: βαρύς literally means 'heavy' but can describe something weighty, oppressive,
    or formidable. Because στρατός is a military body, 'force' keeps the military
    sense while allowing the metaphorical weight/intimidation to remain visible. 'Large
    army' is possible but interprets the metaphor more narrowly than the Greek requires.
- source_word: προσελθών
  chosen: After coming forward
  alternatives:
  - having approached
  - when he came near
  lexicon: LSJ
  rationale: The participle marks attendant action prior to the main verb. 'After
    coming forward' gives clear English sequence while preserving the sense of approach/presentation.
- source_word: ταῖς τοῦ βασιλέως ἐντολαῖς
  chosen: by the king’s commands
  alternatives:
  - under the king’s orders
  - with the king’s commands
  lexicon: LSJ
  rationale: The dative is instrumental or associative here. 'By the king’s commands'
    communicates that his arrival was authorized or occasioned by royal orders without
    overcomplicating the syntax.
- source_word: ἥκειν
  chosen: he had arrived
  alternatives:
  - he had come
  - he was present
  lexicon: LSJ
  rationale: ἥκω commonly means 'have come/arrive' with resultant presence. 'Had arrived'
    fits the indirect statement after ἔλεγεν and sounds natural in English.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - for the purpose that
  lexicon: LSJ
  rationale: Introduces purpose. 'So that' is idiomatic and sufficiently transparent.
- source_word: τὰ ἰδιωτικὰ
  chosen: the private funds
  alternatives:
  - the personal monies
  - the private property
  lexicon: LSJ
  rationale: The adjective ἰδιωτικός contrasts what is private/personal with what
    is public or sacred. Because it modifies χρήματα, 'private funds' best captures
    the financial sense.
- source_word: τοῦ γαζοφυλακίου
  chosen: of the treasury
  alternatives:
  - of the treasury chamber
  - of the temple treasury
  lexicon: LSJ
  rationale: γαζοφυλάκιον denotes a treasury or treasury chamber. 'Treasury' is the
    clearest base rendering. 'Temple treasury' may be contextually true in the broader
    narrative, but the noun itself here does not explicitly require adding 'temple'.
- source_word: λάβοι
  chosen: he might take
  alternatives:
  - he might seize
  - he might receive
  lexicon: LSJ
  rationale: The aorist subjunctive under ὅπως expresses intended action. 'Take' is
    broad and contextually appropriate; 'seize' may overstate the lexical force, though
    the narrative context is hostile.
- source_word: χρήματα
  chosen: funds
  alternatives:
  - money
  - wealth
  lexicon: LSJ
  rationale: χρήματα often means money or funds in administrative contexts. 'Funds'
    fits the treasury setting and pairs naturally with 'private'.
