translation:
  text: Distressed by these words, Onias the high priest, although otherwise being
    careful lest King Seleucus might ever think that Apollonius had been done away
    with by human plotting and not by divine justice, offered some prayer concerning
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had been killed by a human plot and not by divine judgment.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says literally that Onias 'prayed something concerning him,' leaving
      somewhat open whether the prayer was for Apollonius or about the matter involving
      him.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπαχθεὶς
  chosen: Distressed
  alternatives:
  - troubled
  - burdened
  - vexed
  lexicon: LSJ
  rationale: The participle conveys being weighed down or pained by the preceding
    words. 'Distressed' captures the emotional burden in natural English without over-paraphrasing.
- source_word: τοῖς λόγοις
  chosen: by these words
  alternatives:
  - at these words
  - by this speech
  lexicon: LSJ
  rationale: A straightforward rendering of the dative with the demonstrative implied
    by context from the preceding discourse. 'These words' is idiomatic and keeps
    the causal force.
- source_word: εὐλαβηθεὶς
  chosen: being careful
  alternatives:
  - being cautious
  - being apprehensive
  - being reverent/fearing
  lexicon: LSJ
  rationale: Here the verb points to cautious concern about how the king might interpret
    events, not primarily religious reverence. 'Being careful' fits the infinitive
    clause that follows.
- source_word: μὴ ποτε νομίσειεν
  chosen: lest ... might ever think
  alternatives:
  - lest ... should think
  - for fear that ... might suppose
  lexicon: LSJ
  rationale: This construction expresses apprehension about a possible future conclusion.
    'Lest ... might ever think' preserves both the negative purpose/fear nuance and
    ποτε's sense of 'at some time/ever.'
- source_word: ἐξ ἀνθρωπίνης ἐπιβουλῆς
  chosen: by human plotting
  alternatives:
  - from a human conspiracy
  - through human intrigue
  lexicon: LSJ
  rationale: ἐπιβουλή denotes a plot or hostile scheme. 'Human plotting' is concise,
    natural, and preserves the contrast with divine justice.
- source_word: θείας δίκης
  chosen: divine justice
  alternatives:
  - God's justice
  - divine judgment
  lexicon: LSJ
  rationale: The phrase contrasts human agency with a just act from God/the divine
    realm. 'Divine justice' preserves the abstract noun δίκη and avoids over-specifying
    beyond the Greek.
- source_word: ἀνηρῆσθαι
  chosen: had been done away with
  alternatives:
  - had been killed
  - had been destroyed
  - had been taken off
  lexicon: LSJ
  rationale: The perfect infinitive of ἀναιρέω can mean 'to do away with/kill.' Because
    the context concerns Apollonius's death but the Greek uses a somewhat formal expression,
    'had been done away with' preserves that register without bluntly narrowing the
    nuance.
- source_word: ηὔξατό τι περὶ αὐτοῦ
  chosen: offered some prayer concerning him
  alternatives:
  - prayed something about him
  - made some prayer for him
  lexicon: LSJ
  rationale: The phrase is slightly indefinite because of τι. 'Offered some prayer
    concerning him' keeps the indefiniteness and avoids deciding too strongly between
    prayer for or about him, both of which are possible from περὶ αὐτοῦ.
