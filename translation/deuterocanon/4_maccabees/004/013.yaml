id: 4MA.4.13
reference: 4 Maccabees 4:13
source:
  edition: lxx-swete-1909
  text: τούτοις ἐπαχθεὶς τοῖς λόγοις Ὀνίας ὁ ἀρχιερεύς, καίπερ ἄλλως εὐλαβηθεὶς μὴ
    ποτε νομίσειεν ὁ βασιλεὺς Σέλευκος ἐξ ἀνθρωπίνης ἐπιβουλῆς καὶ μὴ θείας δίκης
    ἀνηρῆσθαι τὸν Ἀπολλώνιον, ηὔξατό τι περὶ αὐτοῦ.
  language: Greek
