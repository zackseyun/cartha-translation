theological_decisions:
- issue: Reference and nuance of θείας δίκης
  chosen_reading: Rendered as 'divine justice' without specifying 'God' explicitly
  alternative_readings:
  - God's justice
  - divine judgment
  rationale: The Greek adjective θείας allows 'divine' broadly, while the context
    clearly implies God's just action. The chosen rendering stays close to the source
    wording and preserves the theological claim that Apollonius's end was not due
    to merely human agency.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Force of περὶ αὐτοῦ after ηὔξατό τι
  chosen_reading: Rendered neutrally as 'offered some prayer concerning him'
  alternative_readings:
  - prayed for him
  - prayed about this matter
  rationale: The Greek does not explicitly state whether Onias prayed on Apollonius's
    behalf or simply concerning the situation involving him. A neutral rendering best
    preserves the ambiguity rather than importing a more specific devotional stance.
  doctrine_reference: Preserve theological tension rather than resolve it.
