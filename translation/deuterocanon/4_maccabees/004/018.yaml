theological_decisions:
- issue: Moral characterization of παρανομία in a Jewish law-context
  chosen_reading: lawlessness
  alternative_readings:
  - wickedness
  - transgression
  rationale: The term most directly denotes conduct contrary to law, and in this context
    likely evokes violation of the ancestral law. 'Lawlessness' preserves that connection
    without narrowing it to a specific legal code in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
