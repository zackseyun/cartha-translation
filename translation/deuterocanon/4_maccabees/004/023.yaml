id: 4MA.4.23
reference: 4 Maccabees 4:23
source:
  edition: lxx-swete-1909
  text: καὶ ἐπεὶ κατὰ μηδένα τρόπον ἴσχυεν καταλῦσαι διὰ τῶν δογμάτων τὴν τοῦ ἔθνους
    εὔνοιαν, ἀλλὰ πάσας τὰς ἑαυτοῦ ἀπειλὰς καὶ τιμωρίας ἑώρα καταλυομένας,
  language: Greek
