id: 4MA.4.10
reference: 4 Maccabees 4:10
source:
  edition: lxx-swete-1909
  text: ἀνιόντος τε μετὰ καθωπλισμένης στρατιᾶς τοῦ Ἀπολλωνίου πρὸς τὴν τῶν χρημάτων
    ἁρπαγήν, οὐρανόθεν προυφάνησαν ἔφιπποι ἄγγελοι περιαστράπτοντες τοῖς ὅπλοις, καὶ
    πολὺν αὐτοῖς φόβον τε καὶ τρόμον ἐνιόντες.
  language: Greek
