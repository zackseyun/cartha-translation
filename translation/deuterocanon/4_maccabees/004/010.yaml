theological_decisions:
- issue: Rendering οὐρανόθεν in a supernatural intervention scene
  chosen_reading: from heaven
  alternative_readings:
  - from the sky
  rationale: The narrative presents divine intervention by angels; 'from heaven' preserves
    the theological sense inherent in the scene without adding doctrine beyond the
    text.
  doctrine_reference: Translation philosophy §1, §6
- issue: How explicitly to render ἔφιπποι ἄγγελοι
  chosen_reading: horsemen ... angels
  alternative_readings:
  - mounted angels
  - angels on horseback
  rationale: The text depicts angels in mounted martial form. The chosen rendering
    keeps both the visual image and the angelic identity clear in readable English.
  doctrine_reference: Translation philosophy §6
