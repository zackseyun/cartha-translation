translation:
  text: And when Apollonius came up with an armed force to seize the money, horse-mounted
    angels appeared beforehand from heaven, flashing around with their weapons and
    putting great fear and terror into them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mounted angels' or 'angels on horseback.' The Greek literally identifies
      the heavenly figures as mounted angels.
    reason: lexical_alternative
  - marker: b
    text: Or 'instilling in them great fear and terror.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνιόντος
  chosen: came up
  alternatives:
  - was advancing
  - went up
  lexicon: LSJ
  rationale: Genitive absolute with τοῦ Ἀπολλωνίου; ἀνέρχομαι commonly means 'go up'
    or 'advance.' 'Came up' is natural English and preserves the movement toward the
    target.
- source_word: καθωπλισμένης στρατιᾶς
  chosen: an armed force
  alternatives:
  - a fully armed army
  - an equipped army
  lexicon: LSJ
  rationale: The participle emphasizes being armed/equipped; 'armed force' is idiomatic
    and avoids over-literal awkwardness while retaining military force.
- source_word: πρὸς τὴν τῶν χρημάτων ἁρπαγήν
  chosen: to seize the money
  alternatives:
  - for the plundering of the money
  - for the robbery of the funds
  lexicon: LSJ
  rationale: ἁρπαγή denotes seizure/plunder. 'To seize the money' captures purpose
    clearly in modern English without softening the hostile action.
- source_word: οὐρανόθεν
  chosen: from heaven
  alternatives:
  - from the sky
  lexicon: LSJ
  rationale: In this context the term carries supernatural force, not merely meteorological
    location; 'from heaven' best reflects the narrative's theological register.
- source_word: προυφάνησαν
  chosen: appeared beforehand
  alternatives:
  - appeared
  - showed themselves openly
  lexicon: LSJ
  rationale: The prefixed form suggests appearing forth/before them. 'Appeared beforehand'
    preserves the προ- nuance, indicating sudden manifestation in advance of the attack.
- source_word: ἔφιπποι ἄγγελοι
  chosen: horsemen from heaven appeared beforehand—angels
  alternatives:
  - mounted angels
  - angels on horseback
  lexicon: LSJ
  rationale: ἔφιπποι literally means mounted/on horseback. Because English can stumble
    over 'mounted angels,' the translation apposes 'horsemen' with 'angels' to preserve
    both the mounted imagery and angelic identity.
- source_word: περιαστράπτοντες τοῖς ὅπλοις
  chosen: flashing around with their weapons
  alternatives:
  - gleaming with their weapons
  - brandishing flashing weapons
  lexicon: LSJ
  rationale: The participle conveys flashing like lightning around/about them; τοῖς
    ὅπλοις is instrumental or associative. 'Flashing around with their weapons' preserves
    vividness without overinterpreting.
- source_word: ἐνιόντες
  chosen: they struck into them
  alternatives:
  - instilling in them
  - bringing upon them
  lexicon: LSJ
  rationale: The verb here means to put into or infuse. 'Struck into them' is vivid
    and fits the sudden terror caused by the apparition.
- source_word: φόβον τε καὶ τρόμον
  chosen: great fear and terror
  alternatives:
  - fear and trembling
  - fear and dread
  lexicon: LSJ
  rationale: Both nouns denote overlapping but intensified alarm. 'Fear and terror'
    preserves the doublet; 'trembling' would shift one noun toward physical reaction
    rather than emotional state.
