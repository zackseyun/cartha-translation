translation:
  text: For while he was waging war against Ptolemy in Egypt, he also heard that,
    when a report had spread that he was dead, the people of Jerusalem were rejoicing
    as much as possible; so he quickly marched up against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when a rumor had spread that he had died.' The Greek φήμη can denote
      report, rumor, or public talk; 'report' is used in the main text as the more
      neutral rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειδὴ γὰρ
  chosen: For while
  alternatives:
  - Since indeed
  - For because
  lexicon: LSJ
  rationale: Introduces the narrative background with explanatory force. 'For while'
    captures both the causal/explanatory γάρ and the temporal setting from ἐπειδή
    in readable English.
- source_word: πολεμῶν ἦν
  chosen: he was waging war
  alternatives:
  - he was at war
  - he was fighting
  lexicon: LSJ
  rationale: The periphrastic construction conveys ongoing action. 'Waging war' preserves
    the military sense more fully than the flatter 'was at war.'
- source_word: κατʼ Αἴγυπτον
  chosen: in Egypt
  alternatives:
  - against Egypt
  - toward Egypt
  lexicon: LSJ
  rationale: With πολεμεῖν, κατά can indicate campaigning in a region or against a
    target associated with that region. Because Πτολεμαίῳ follows as the personal
    opponent, 'in Egypt' best reflects the geographic setting without awkwardly making
    Egypt itself the direct enemy.
- source_word: Πτολεμαίῳ
  chosen: Ptolemy
  rationale: Proper name transliterated per project philosophy. The dative is represented
    idiomatically in English by 'against Ptolemy' with the war verb.
- source_word: ἠκούσέν τε
  chosen: he also heard
  alternatives:
  - and he heard
  - he heard as well
  lexicon: LSJ
  rationale: The enclitic τε adds a connective nuance. 'Also' preserves the additive
    sense in natural English.
- source_word: φήμης διαδοθείσης
  chosen: when a report had spread
  alternatives:
  - when a rumor had spread
  - after news had spread
  lexicon: LSJ
  rationale: The genitive absolute marks attendant circumstance prior to the main
    reaction. 'Report' is slightly more neutral than 'rumor,' since the text does
    not itself evaluate the truth-status of the message at that point.
- source_word: περὶ τοῦ τεθνάναι αὐτόν
  chosen: that he was dead
  alternatives:
  - concerning his having died
  - that he had died
  lexicon: LSJ
  rationale: English idiom favors a finite clause here. 'Was dead' communicates the
    content of the report clearly and naturally.
- source_word: ὡς ἔνι μάλιστα
  chosen: as much as possible
  alternatives:
  - to the greatest degree
  - exceedingly
  lexicon: LSJ
  rationale: This idiom intensifies the following verb. 'As much as possible' preserves
    the superlative force without becoming stilted.
- source_word: χαίροιεν
  chosen: were rejoicing
  alternatives:
  - were glad
  - were celebrating
  lexicon: LSJ
  rationale: The optative in indirect discourse is represented by an English finite
    verb. 'Rejoicing' keeps the lexical connection to joy rather than the more event-specific
    'celebrating.'
- source_word: οἱ Ἱεροσολυμεῖται
  chosen: the people of Jerusalem
  alternatives:
  - the Jerusalemites
  - those in Jerusalem
  lexicon: LSJ
  rationale: '''Jerusalemites'' is accurate but less natural for modern readers. ''The
    people of Jerusalem'' is clear and readable while preserving the reference to
    the city''s inhabitants.'
- source_word: ταχέως
  chosen: quickly
  alternatives:
  - swiftly
  - at once
  lexicon: LSJ
  rationale: Simple adverbial rendering fits the narrative pace.
- source_word: ἐπʼ αὐτοὺς ἀνέζευξεν
  chosen: marched up against them
  alternatives:
  - advanced against them
  - set out against them
  lexicon: LSJ
  rationale: The verb is a military movement term. 'Marched up against them' preserves
    the hostile advance and the directional force of ἐπί better than the more generic
    'went against them.'
