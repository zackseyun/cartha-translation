  text: ἔλεγεν γὰρ ἡμαρτηκώς, ὥστε καὶ ἀποθανεῖν ἄξιος ὑπάρχειν, πᾶσίν τε ἀνθρώποις
    ὑμνήσειεν σωθεὶς τὴν τοῦ ἱεροῦ τόπου μακαριότητα.
