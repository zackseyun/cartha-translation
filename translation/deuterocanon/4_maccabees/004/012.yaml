  chosen_reading: temporal deliverance/rescue rather than explicit spiritual salvation
  alternative_readings:
  - saved in a broader religious sense
  rationale: In this narrative setting the speaker refers to being spared from death
    and then publicly praising the holy place. The wording does not require importing
    later doctrinal notions of salvation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
