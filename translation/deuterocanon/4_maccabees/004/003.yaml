theological_decisions:
- issue: Nature of the funds in Jerusalem’s treasuries
  chosen_reading: The verse distinguishes private deposited funds from temple property.
  alternative_readings:
  - The funds were simply not available for temple use
  - The phrase could be read more loosely as 'not shared with the sanctuary'
  rationale: 'The Greek explicitly marks the money as ἰδιωτικῶν χρημάτων and says
    it was μὴ ἐπικοινωνούσας τῷ ἱερῷ, which is best taken as excluding these funds
    from temple ownership. This matters for the accusation’s logic: Simon alleges
    that non-temple private wealth was stored there and thus claimable by the king.'
  doctrine_reference: Translation philosophy §§1, 5
