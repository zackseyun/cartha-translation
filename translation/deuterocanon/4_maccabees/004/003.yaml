  text: Σίμων ὢν τοῖς τοῦ βασιλέως πράγμασιν ἥκω, μηνύων πολλὰς ἰδιωτικῶν χρημάτων
    μυριάδας ἐν τοῖς Ἱεροσολύμων γαζοφυλακίοις τεθησαυρίσθαι τῷ ἱερῷ μὴ ἐπικοινωνούσας,
