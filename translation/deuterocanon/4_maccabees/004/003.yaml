translation:
  text: Simon, being hostile to the king’s interests, reported that many tens of thousands
    of private funds had been stored in the treasuries of Jerusalem, funds not connected
    with the temple, but that these belonged to Seleucus the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king’s affairs' or 'the king’s cause' for the phrase involving τοῖς
      τοῦ βασιλέως πράγμασιν; the Greek expression is somewhat compressed.
    reason: lexical_alternative
  - marker: b
    text: Literally 'many myriads of private monies/funds.'
    reason: lexical_alternative
  - marker: c
    text: Or 'not shared with the temple' or 'not belonging in common to the temple.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥκω
  chosen: being hostile
  alternatives:
  - having come
  - being present
  lexicon: LSJ
  rationale: In this context the phrase Σίμων ὢν τοῖς τοῦ βασιλέως πράγμασιν ἥκω is
    awkward if taken woodenly as 'having come to the king’s affairs.' The idiom is
    best understood as describing Simon as acting in relation to, or against, the
    king’s interests/affairs. Given the narrative context of denunciation, 'being
    hostile to the king’s interests' captures the adversarial force more naturally
    than a literal but obscure rendering.
- source_word: τοῖς τοῦ βασιλέως πράγμασιν
  chosen: the king’s interests
  alternatives:
  - the king’s affairs
  - the king’s cause
  lexicon: LSJ
  rationale: πράγματα can mean matters, affairs, or interests. In context Simon is
    making a political accusation tied to royal claims, so 'the king’s interests'
    communicates the practical sense.
- source_word: μηνύων
  chosen: reported
  alternatives:
  - informed
  - denounced
  - disclosed
  lexicon: BDAG
  rationale: The participle denotes making information known, often by way of accusation
    or report. 'Reported' is neutral and fits the syntax, while the hostile context
    already conveys the accusatory tone.
- source_word: πολλὰς ἰδιωτικῶν χρημάτων μυριάδας
  chosen: many tens of thousands of private funds
  alternatives:
  - many myriads of private money
  - many tens of thousands in private wealth
  lexicon: LSJ
  rationale: μυριάδες literally refers to units of ten thousand; 'many tens of thousands'
    preserves the numerical force without sounding unnatural. ἰδιωτικῶν χρημάτων indicates
    privately owned money or funds.
- source_word: γαζοφυλακίοις
  chosen: treasuries
  alternatives:
  - treasury chambers
  - storehouses
  lexicon: LSJ
  rationale: The term refers to treasury repositories. 'Treasuries' is concise and
    idiomatic in English.
- source_word: τεθησαυρίσθαι
  chosen: had been stored
  alternatives:
  - had been deposited
  - had been laid up
  lexicon: LSJ
  rationale: The perfect infinitive indicates money having been placed in storage.
    'Had been stored' is clear modern English.
- source_word: τῷ ἱερῷ μὴ ἐπικοινωνούσας
  chosen: not connected with the temple
  alternatives:
  - not shared with the temple
  - not belonging in common to the temple
  lexicon: LSJ
  rationale: The participle modifies the funds/myriads and indicates that these monies
    were not in common with, or not pertaining to, the temple. 'Not connected with
    the temple' communicates that they were private deposits rather than temple assets.
- source_word: προσήκειν
  chosen: belonged
  alternatives:
  - pertained
  - were due
  lexicon: LSJ
  rationale: In this legal-financial context, προσήκειν expresses rightful relation
    or claim. 'Belonged' is the most natural English equivalent.
