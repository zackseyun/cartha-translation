translation:
  text: When Apollonius learned each of these things, he praised Simon for his loyalty
    to the king, but went up to Seleucus and reported the treasury of funds;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reported to him the money treasury.' The Greek verb can suggest reporting
      or informing, and the phrase for the treasury emphasizes stored funds.
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτων ἕκαστα
  chosen: each of these things
  alternatives:
  - every one of these things
  - these things one by one
  lexicon: LSJ
  rationale: The distributive sense of ἕκαστα with the genitive τούτων is best conveyed
    by 'each of these things,' preserving the idea that Apollonius learned the matters
    individually/in detail.
- source_word: γνούς
  chosen: learned
  alternatives:
  - having come to know
  - found out
  lexicon: LSJ
  rationale: Aorist participle of γινώσκω here introduces the circumstance preceding
    the main actions. 'Learned' is idiomatic modern English and fits the narrative
    context of receiving information.
- source_word: κηδεμονίας
  chosen: concern
  alternatives:
  - care
  - guardianship
  - loyal devotion
  lexicon: LSJ
  rationale: The phrase τῆς εἰς τὸν βασιλέα κηδεμονίας refers to Simon's professed
    care or solicitude toward the king. 'Concern' is natural English and avoids the
    overly technical 'guardianship,' while still reflecting a posture of protective
    interest.
- source_word: ἐπαινεί
  chosen: praised
  alternatives:
  - commended
  lexicon: LSJ
  rationale: Present-form historical narrative sense is well represented by simple
    past in English. 'Praised' captures explicit approval.
- source_word: ἀναβὰς
  chosen: went up
  alternatives:
  - went
  - ascended
  lexicon: LSJ
  rationale: The participle literally means 'having gone up.' In Hellenistic narrative
    it often reflects travel to a higher or more central place. 'Went up' preserves
    the source wording without overexplaining geography.
- source_word: κατήμηνυε
  chosen: informed him about
  alternatives:
  - reported
  - denounced
  - gave information about
  lexicon: LSJ
  rationale: The verb can carry the sense of reporting or informing, sometimes with
    accusatory force. Here the object is the treasury, not a person, so 'informed
    him about' fits the context without importing a stronger hostile nuance than the
    Greek requires.
- source_word: τὸν τῶν χρημάτων θησαυρόν
  chosen: the treasury of funds
  alternatives:
  - the treasury of money
  - the money treasury
  - the treasure of funds
  lexicon: LSJ
  rationale: The genitive τῶν χρημάτων specifies that the treasury consists of money/funds.
    'Treasury of funds' is slightly formal but clear and preserves the concrete financial
    reference.
- source_word: Σίμωνι
  chosen: Simon
  rationale: Personal name transliterated according to project policy.
- source_word: Σέλευκον
  chosen: Seleucus
  rationale: Personal name transliterated according to project policy.
- source_word: ὁ Ἀπολλώνιος
  chosen: Apollonius
  rationale: Personal name transliterated according to project policy.
