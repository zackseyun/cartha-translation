id: 4MA.4.4
reference: 4 Maccabees 4:4
source:
  edition: lxx-swete-1909
  text: τούτων ἕκαστα γνοὺς ὁ Ἀπολλώνιος, τὴν μὲν Σίμωνι τῆς εἰς τὸν βασιλέα κηδεμονίας
    ἐπαινεί, πρὸς δὲ τὸν Σέλευκον ἀναβὰς κατήμηνυε τὸν τῶν χρημάτων θησαυρόν·
  language: Greek
  pages:
