  - 788
  confidence: high
  validation: major_mismatch
translation:
  text: Therefore, since his decrees were being despised by the people, he himself
    was forcing each one of the nation, by tortures, after tasting defiling foods,
    to renounce Judaism.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to disavow Judaism under oath.' The verb can carry an oath-related nuance,
      though the broader sense 'to renounce' fits well in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: δόγματα
  chosen: decrees
  alternatives:
  - edicts
  - ordinances
  lexicon: LSJ
  rationale: In this political context, the term refers to official commands or policies
    issued by the ruler. 'Decrees' is natural English and preserves the authoritative
    force without sounding overly technical.
- source_word: κατεφρονεῖτο
  chosen: were being despised
  alternatives:
  - were being disregarded
  - were being treated with contempt
  lexicon: LSJ
  rationale: The imperfect passive indicates ongoing contempt or disregard by the
    people toward his decrees. 'Were being despised' keeps the strong negative sense
    of καταφρονέω and reflects the passive form.
- source_word: διὰ βασάνων
  chosen: by tortures
  alternatives:
  - through tortures
  - by means of torture
  lexicon: LSJ
  rationale: The phrase denotes coercion by means of physical torment. The plural
    'tortures' follows the Greek plural and conveys repeated or varied acts of torment.
- source_word: ἕνα ἕκαστον τοῦ ἔθνους
  chosen: each one of the nation
  alternatives:
  - every one of the people
  - each individual of the nation
  lexicon: LSJ
  rationale: The distributive expression emphasizes individual targeting. 'Nation'
    renders ἔθνος straightforwardly here as the Jewish people considered as a people-group.
- source_word: μιερῶν ... τροφῶν
  chosen: defiling foods
  alternatives:
  - polluted foods
  - unclean foods
  - abominable foods
  lexicon: LSJ
  rationale: μιερός carries the sense of ritually defiling or impious. 'Defiling foods'
    communicates the Jewish purity-context more precisely than the broader 'abominable'
    and avoids importing later technical terminology not explicit in the Greek.
- source_word: ἀπογευομένους
  chosen: when they had tasted
  alternatives:
  - after tasting
  - on tasting
  - having partaken of
  lexicon: LSJ
  rationale: The participle indicates the act of tasting/partaking as part of the
    coercive process. 'When they had tasted' fits the syntax in English and preserves
    the temporal relation to the forced renunciation.
- source_word: ἐξόμνυσθαι
  chosen: to renounce
  alternatives:
  - to abjure
  - to disavow under oath
  lexicon: LSJ
  rationale: The verb can imply denying or renouncing, often with oath-related force.
    'Renounce' is the clearest idiomatic English here; the oath nuance is possible
    but not necessary to make explicit in the main text.
- source_word: τὸν Ἰουδαϊσμόν
  chosen: Judaism
  alternatives:
  - the Jewish way of life
  - the Jewish religion
  lexicon: LSJ
  rationale: The noun directly names Jewish identity/practice. 'Judaism' is the most
    direct equivalent, while alternatives interpret the term more expansively. The
    context includes both religious allegiance and ancestral way of life, but the
    simple term is best preserved in the main text.
