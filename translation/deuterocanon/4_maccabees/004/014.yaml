translation:
  text: And the one who had been saved unexpectedly went away, to report to the king
    the things that had happened to him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παραδόξως
  chosen: unexpectedly
  alternatives:
  - remarkably
  - strangely
  - contrary to expectation
  lexicon: LSJ
  rationale: The adverb denotes something occurring in an extraordinary or surprising
    way. 'Unexpectedly' is natural English and preserves the sense that his survival
    was surprising without overstating the miraculous nuance.
- source_word: διασωθεὶς
  chosen: had been saved
  alternatives:
  - had escaped safely
  - had been preserved
  lexicon: BDAG
  rationale: The aorist passive participle indicates being brought safely through
    danger. 'Had been saved' fits the context of surviving an attempted destruction
    and is idiomatic in English.
- source_word: ᾤχετο
  chosen: went away
  alternatives:
  - departed
  - went off
  lexicon: LSJ
  rationale: The imperfect/middle form here conveys departure. 'Went away' is straightforward
    modern English and avoids an overly formal tone.
- source_word: δηλώσων
  chosen: to report
  alternatives:
  - to make known
  - to inform
  - to declare
  lexicon: BDAG
  rationale: 'The future participle expresses purpose: he departed in order to tell
    the king. ''To report'' captures the sense of formally informing a ruler about
    events.'
- source_word: τὰ συμβάντα αὐτῷ
  chosen: the things that had happened to him
  alternatives:
  - what had happened to him
  - the events that had befallen him
  lexicon: BDAG
  rationale: The articular participle with dative refers to the events experienced
    by him. The fuller phrase is slightly more formal and transparent to the Greek
    structure while remaining readable.
