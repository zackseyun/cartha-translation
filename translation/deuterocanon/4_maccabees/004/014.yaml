id: 4MA.4.14
reference: 4 Maccabees 4:14
source:
  edition: lxx-swete-1909
  text: καὶ ὁ μὲν παραδόξως διασωθεὶς ᾤχετο, δηλώσων τῷ βασιλεῖ τὰ συμβάντα αὐτῷ.
  language: Greek
