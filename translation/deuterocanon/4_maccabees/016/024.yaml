translation:
  text: By these words the mother of seven, encouraging each one of her sons, persuaded
    them rather to die than to transgress the commandment of God;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Through these words.' The Greek phrase can express means or instrumentality.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the mother of seven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τούτων τῶν λόγων
  chosen: By these words
  alternatives:
  - Through these words
  - With these words
  lexicon: LSJ
  rationale: διά with the genitive commonly expresses means or instrumentality. 'By
    these words' is natural English and preserves the causal/instrumental force without
    overinterpreting.
- source_word: ἡ ἑπτάμητωρ
  chosen: the mother of seven
  alternatives:
  - the seven-times mother
  - the mother of seven sons
  lexicon: LSJ
  rationale: The compound literally denotes a woman who is mother of seven. 'The mother
    of seven' preserves the compact epithet and its rhetorical force; 'sons' is supplied
    later from the explicit τῶν υἱῶν, so it need not be imported here.
- source_word: ἕνα ἕκαστον τῶν υἱῶν
  chosen: each one of her sons
  alternatives:
  - every one of the sons
  - each of the sons
  lexicon: LSJ
  rationale: ἕνα ἕκαστον is distributive and emphatic. 'Each one of her sons' captures
    the individual focus. 'Her' is idiomatic in English because the subject is the
    mother, though not separately expressed in Greek.
- source_word: παρακαλοῦσα
  chosen: encouraging
  alternatives:
  - exhorting
  - urging
  - appealing to
  lexicon: LSJ
  rationale: παρακαλέω can mean exhort, encourage, urge, or comfort depending on context.
    Here the mother is strengthening her sons toward steadfastness under torture,
    so 'encouraging' best conveys both exhortation and moral support in readable English.
- source_word: ἔπεισε
  chosen: persuaded them
  alternatives:
  - convinced them
  - prevailed on them
  lexicon: LSJ
  rationale: πείθω means to persuade or convince. Because the infinitives that follow
    imply the content of the persuasion and the object is plural in sense from the
    distributive phrase, English naturally supplies 'them.'
- source_word: μᾶλλον ἀποθανεῖν, ἢ παραβῆναι
  chosen: rather to die than to transgress
  alternatives:
  - to die rather than to violate
  - to die rather than to break
  lexicon: LSJ
  rationale: 'The comparative construction μᾶλλον ... ἢ sets a preference: death over
    disobedience. ''Transgress'' fits the elevated moral register and pairs well with
    ''commandment.'''
- source_word: τὴν ἐντολὴν τοῦ θεοῦ
  chosen: the commandment of God
  alternatives:
  - God's commandment
  - the command of God
  lexicon: LSJ
  rationale: ἐντολή is 'commandment' or 'command.' 'Commandment of God' preserves
    the formal, religious sense and echoes scriptural diction appropriate to the context.
