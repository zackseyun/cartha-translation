theological_decisions:
- issue: Whether to render ἑπτάμητωρ with an explicit filial expansion in the main
    clause
  chosen_reading: the mother of seven
  alternative_readings:
  - the mother of seven sons
  rationale: The Greek epithet itself does not explicitly repeat 'sons'; that information
    follows in τῶν υἱῶν. Retaining 'the mother of seven' preserves the rhetorical
    compactness of the source while allowing the next phrase to specify the sons.
  doctrine_reference: Translation philosophy §1, §5
- issue: Register of παραβῆναι τὴν ἐντολὴν τοῦ θεοῦ
  chosen_reading: to transgress the commandment of God
  alternative_readings:
  - to break God's commandment
  - to violate the command of God
  rationale: The verse emphasizes fidelity to divine law under persecution. 'Transgress'
    preserves the moral-legal gravity without adding doctrinal content beyond the
    Greek.
  doctrine_reference: Translation philosophy §6
