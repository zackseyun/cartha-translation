id: 4MA.16.14
reference: 4 Maccabees 16:14
source:
  edition: lxx-swete-1909
  text: Ὦ μήτηρ δὲ εὐσέβειαν θεοῦ στρατιῶτι πρεσβῦτι καὶ γυνή, διὰ καρτερίαν καὶ τύραννον
    ἐνίκησας, καὶ ἔργοις δυνατωτέρα καὶ λόγοις εὑρέθης ἂν ἀνδρός.
  language: Greek
