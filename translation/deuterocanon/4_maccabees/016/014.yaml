translation:
  text: O mother, soldier of godliness, though old and a woman, by endurance you conquered
    even a tyrant, and in deeds and words you were found stronger than a man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'piety toward God.' The Greek εὐσέβεια can denote reverence, piety, or
      devoutness.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσέβειαν θεοῦ
  chosen: devotion to God
  alternatives:
  - godliness toward God
  - piety toward God
  - reverence for God
  lexicon: LSJ
  rationale: εὐσέβεια denotes piety, reverence, or devoutness; with θεοῦ it is best
    expressed idiomatically as devotion directed to God rather than the less natural
    English 'godliness of God.'
- source_word: στρατιῶτι
  chosen: soldier
  alternatives:
  - warrior
  - combatant
  lexicon: LSJ
  rationale: The dative/appositional use addresses the mother metaphorically as a
    soldier in the struggle of piety. 'Soldier' preserves the martial image without
    overinterpreting.
- source_word: πρεσβῦτι
  chosen: though old
  alternatives:
  - aged
  - elderly
  lexicon: LSJ
  rationale: The term marks her advanced age. Rendering it concessively with 'though
    old' fits the rhetorical force of the sentence, which highlights victory despite
    apparent weakness.
- source_word: γυνή
  chosen: a woman
  alternatives:
  - female
  - wife
  lexicon: LSJ
  rationale: Here the contrast is with 'man' at the end of the verse, so 'a woman'
    is the natural and gender-accurate rendering.
- source_word: διὰ καρτερίαν
  chosen: by endurance
  alternatives:
  - through steadfastness
  - through perseverance
  - by fortitude
  lexicon: LSJ
  rationale: καρτερία conveys steadfast endurance under suffering. 'By endurance'
    is concise and natural while preserving the causal/instrumental force of διά.
- source_word: τύραννον ἐνίκησας
  chosen: you conquered even a tyrant
  alternatives:
  - you defeated a tyrant
  - you overcame a tyrant
  lexicon: LSJ
  rationale: ἐνίκησας means 'you conquered/defeated.' Adding 'even' brings out the
    emphatic force in context, where the tyrant represents formidable worldly power.
- source_word: ἔργοις δυνατωτέρα
  chosen: stronger in deeds
  alternatives:
  - more powerful in actions
  - mightier in works
  lexicon: LSJ
  rationale: The comparative δυνατωτέρα is retained as 'stronger,' and ἔργοις is rendered
    'in deeds' to preserve the contrast with λόγοις.
- source_word: λόγοις
  chosen: in words
  alternatives:
  - in speech
  - in what you said
  lexicon: LSJ
  rationale: λόγοις here contrasts with deeds; 'in words' is simple and direct.
- source_word: εὑρέθης ἂν ἀνδρός
  chosen: you were found stronger than a man
  alternatives:
  - you proved stronger than a man
  - you were found more powerful than a man
  lexicon: LSJ
  rationale: The comparison is explicit and should be preserved. 'A man' reflects
    the singular ἀνδρός and maintains the gendered rhetoric of the Greek rather than
    neutralizing it.
