theological_decisions:
- issue: Gendered comparison in the final clause
  chosen_reading: Retain the explicit contrast 'a woman' / 'a man'
  alternative_readings:
  - Render generically as 'stronger than any person'
  rationale: 'The verse deliberately emphasizes the mother''s victory despite socially
    recognized markers of weakness in the rhetoric of the text: age and female sex.
    Per doctrine, gender-accurate rendering is preferred over neutralization.'
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Nature of εὐσέβεια
  chosen_reading: Render as 'devotion to God' rather than a more technical 'piety'
  alternative_readings:
  - piety toward God
  - godliness
  rationale: The term is ethically and religiously charged but not a contested doctrinal
    technicality here. 'Devotion to God' communicates the religious allegiance clearly
    in modern English without flattening the concept.
  doctrine_reference: DOCTRINE.md §6 Readable modern English, not archaic or academic
