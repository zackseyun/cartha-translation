theological_decisions:
- issue: Rendering θεὸν τοῦ κόσμου
  chosen_reading: God, the ruler of the world
  alternative_readings:
  - God of the world
  rationale: A literal 'God of the world' is possible from the Greek form, but in
    English it can imply a limited or rival deity. In context the phrase exalts the
    one God as sovereign over the world. The chosen rendering preserves that sense
    without importing later technical phrasing.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    meaning in readable modern English.'
