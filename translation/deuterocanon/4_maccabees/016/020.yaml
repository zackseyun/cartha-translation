id: 4MA.16.20
reference: 4 Maccabees 16:20
source:
  edition: lxx-swete-1909
  text: διʼ ὃν καὶ ὁ πατὴρ ἡμῶν Ἀβραὰμ ἔσπευδεν τὸν ἐθνοπάτορα υἱὸν σφαγιάσαι Ἰσαάκ,
    καὶ τὴν πατρῴαν χεῖρα ξιφηφόρον καταφερομένην ἐπʼ αὐτὸν ὁρῶν οὐκ ἔπτηξεν.
