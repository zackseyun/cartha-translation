translation:
  text: for whose sake even our father Abraham hurried to slaughter Isaac, his son,
    the ancestor of the nation, and, seeing the ancestral hand bearing the sword descending
    upon him, did not shrink back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his son, who would become the father of the nation.' The Greek compound
      ἐθνοπάτωρ denotes an ancestor or progenitor of a people.
    reason: lexical_alternative
  - marker: b
    text: Or 'did not flinch' / 'did not cower.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ ὃν
  chosen: for whose sake
  alternatives:
  - because of whom
  - for whom
  lexicon: LSJ
  rationale: The preposition with relative pronoun expresses cause or motivating ground.
    'For whose sake' preserves the rhetorical force in context, referring back to
    the motivating principle/person just mentioned, without flattening it to a mere
    causal 'because of whom.'
- source_word: ἔσπευδεν
  chosen: hurried
  alternatives:
  - was eager
  - hastened
  lexicon: LSJ
  rationale: The verb denotes acting quickly or eagerly. 'Hurried' keeps the vividness
    and directness of the Greek while remaining natural modern English.
- source_word: σφαγιάσαι
  chosen: to slaughter
  alternatives:
  - to slay
  - to sacrifice
  - to butcher
  lexicon: LSJ
  rationale: The verb is stronger and more graphic than a generic 'kill.' 'To slaughter'
    preserves the sacrificial and violent nuance without importing the fuller theological
    framing of 'to sacrifice,' which is not the verb itself here.
- source_word: τὸν ἐθνοπάτορα υἱόν
  chosen: his son, the ancestor of the nation
  alternatives:
  - his nation-father son
  - his son who would become father of the nation
  - his son, progenitor of the people
  lexicon: LSJ
  rationale: 'ἐθνοπάτωρ is a compound meaning ancestor/father of a people or nation.
    Since it modifies υἱόν, the sense is appositional: Isaac is Abraham''s son and
    also the one through whom the nation descends. This avoids the misleading impression
    that Abraham is being called the ''ancestor'' at this point in the syntax.'
- source_word: πατρῴαν χεῖρα
  chosen: the ancestral hand
  alternatives:
  - the father's hand
  - the paternal hand
  lexicon: LSJ
  rationale: πατρῷος means ancestral or inherited from one's fathers. In context it
    refers to the hand of his forefather/father Abraham. 'Ancestral hand' preserves
    the elevated rhetoric of the Greek better than the flatter 'father's hand,' though
    the phrase remains somewhat metaphorical in English as in Greek.
- source_word: ξιφηφόρον
  chosen: bearing the sword
  alternatives:
  - sword-bearing
  - carrying a sword
  lexicon: LSJ
  rationale: The adjective literally means sword-bearing. 'Bearing the sword' is idiomatic
    English and preserves the participial vividness attached to the hand.
- source_word: καταφερομένην ἐπʼ αὐτόν
  chosen: descending upon him
  alternatives:
  - being brought down upon him
  - coming down on him
  lexicon: LSJ
  rationale: The participle depicts downward motion toward Isaac. 'Descending upon
    him' preserves the dramatic imagery and avoids over-technical wording.
- source_word: οὐκ ἔπτηξεν
  chosen: did not shrink back
  alternatives:
  - did not cower
  - did not flinch
  - was not terrified
  lexicon: LSJ
  rationale: The verb can denote shrinking in fear or recoiling. 'Did not shrink back'
    captures both the emotional and volitional sense and fits the martyrdom-resolve
    theme of the passage.
