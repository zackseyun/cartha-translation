theological_decisions:
- issue: How to render the allusion to Abraham and Isaac without importing Genesis
    terminology beyond the Greek wording
  chosen_reading: Retain the graphic wording 'hurried to slaughter Isaac' rather than
    softening to 'prepared to offer Isaac'
  alternative_readings:
  - hurried to sacrifice Isaac
  - prepared to offer Isaac
  rationale: The verse intentionally uses vivid language to emphasize steadfastness
    under reason and piety. A softer rendering would mute the rhetorical force and
    import familiar biblical phrasing not present in this Greek sentence.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Referent of διʼ ὃν
  chosen_reading: Translate generically as 'for whose sake' without specifying the
    antecedent in the English text
  alternative_readings:
  - because of whom
  - for which reason
  rationale: The relative pronoun's antecedent lies in the preceding context. Supplying
    a specific noun in translation would over-resolve the discourse connection. The
    English preserves the Greek's dependence on context.
  doctrine_reference: Translation philosophy §3
