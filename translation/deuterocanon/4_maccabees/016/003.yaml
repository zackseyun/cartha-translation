theological_decisions:
- issue: Metaphorical fire imagery for the mother's inner state
  chosen_reading: Retain the fire metaphor ('was being inflamed') rather than reduce
    it to emotional distress alone.
  alternative_readings:
  - was tormented
  - was stirred deeply
  rationale: The verse explicitly compares lions and furnace with the mother's internal
    experience; preserving the combustion metaphor maintains the rhetoric and avoids
    flattening the text's dramatic contrast.
