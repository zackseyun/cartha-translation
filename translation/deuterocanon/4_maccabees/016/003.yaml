id: 4MA.16.3
reference: 4 Maccabees 16:3
source:
  edition: lxx-swete-1909
  text: καὶ οὐχ οὕτως οἱ περὶ Δανιὴλ λέοντες ἦσαν ἄγριοι, οὐδὲ Μισαὴλ ἐκφλεγομένη
    κάμινος λαβροτάτῳ πυρί, ὡς τῆς φιλοτεκνίας πειράλειεν ἐκείνη φύσις, ὁρῶσα αὐτῆς
    τοὺς ἑπτὰ υἱοὺς βασανιζομένους.
