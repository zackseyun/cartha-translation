translation:
  text: And the lions around Daniel were not so savage, nor the blazing furnace with
    its fiercest fire against Mishael, as that mother's own nature was inflamed by
    love for her children when she saw her seven sons being tortured.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was burning more fiercely because of love for her children.' The Greek
      verb uses fire imagery for the mother's inner anguish.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ περὶ Δανιὴλ λέοντες
  chosen: the lions around Daniel
  alternatives:
  - the lions concerning Daniel
  - Daniel's lions
  lexicon: LSJ
  rationale: The idiom οἱ περὶ + accusative/name can denote those around or associated
    with someone. Here it refers to the lions in Daniel's episode. 'Around Daniel'
    is natural English and stays close to the Greek without over-paraphrasing.
- source_word: ἄγριοι
  chosen: savage
  alternatives:
  - wild
  - fierce
  lexicon: LSJ
  rationale: '''Savage'' best conveys dangerous ferocity in context. ''Wild'' is too
    neutral; ''fierce'' is possible but is reserved later for the superlative fire
    expression.'
- source_word: Μισαὴλ
  chosen: Mishael
  alternatives:
  - Misael
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. The Greek form reflects the Hebrew name of one of the three youths.
- source_word: ἐκφλεγομένη κάμινος
  chosen: the blazing furnace
  alternatives:
  - the furnace burning up
  - the burning furnace
  lexicon: LSJ
  rationale: A participial expression modifying κάμινος. 'Blazing furnace' is concise,
    idiomatic, and preserves the image of active burning.
- source_word: λαβροτάτῳ πυρί
  chosen: with its fiercest fire
  alternatives:
  - with most violent fire
  - with raging fire
  lexicon: LSJ
  rationale: The superlative λαβροτάτῳ intensifies the fire's violence. 'Fiercest
    fire' preserves the superlative force in readable English.
- source_word: φιλοτεκνίας
  chosen: love for her children
  alternatives:
  - motherly affection
  - love of children
  lexicon: LSJ
  rationale: The noun denotes affection for one's children. 'Love for her children'
    is explicit and natural in English, and it prepares the contrast with external
    torments.
- source_word: πειράλειεν
  chosen: was being inflamed
  alternatives:
  - was burning more fiercely
  - was set ablaze
  - was scorched
  lexicon: LSJ
  rationale: The rare verb is built on the imagery of fire and here metaphorically
    describes the mother's inner nature under the pressure of maternal love. 'Was
    being inflamed' preserves the metaphor and the imperfective sense better than
    a flattened emotional gloss.
- source_word: ἐκείνη φύσις
  chosen: that mother's own nature
  alternatives:
  - that nature
  - her nature
  lexicon: LSJ
  rationale: The demonstrative plus φύσις points to the mother's natural disposition.
    Because English 'that nature' is unclear, 'that mother's own nature' makes the
    referent explicit from context without changing the sense.
- source_word: ὁρῶσα
  chosen: when she saw
  alternatives:
  - seeing
  - as she looked on
  lexicon: LSJ
  rationale: The participle is temporal-circumstantial. 'When she saw' gives clear
    English syntax and preserves the causal-temporal connection.
- source_word: βασανιζομένους
  chosen: being tortured
  alternatives:
  - being tormented
  - being put to the test by torture
  lexicon: LSJ
  rationale: In this martyrdom context the verb refers to torture, not mere distress.
    'Being tortured' is the most direct and accurate rendering.
