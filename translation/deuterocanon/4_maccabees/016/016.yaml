theological_decisions:
- issue: Rendering παισίν in a martyrdom exhortation
  chosen_reading: sons
  alternative_readings:
  - children
  - boys
  rationale: The verse is addressed by a mother to her male offspring; gender-accurate
    translation is preferred by project doctrine, and 'sons' also heightens the familial
    pathos central to the passage.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering διαμαρτυρία in a Jewish martyrdom context
  chosen_reading: witness
  alternative_readings:
  - testimony
  rationale: The term can bear legal or public-testimony force. 'Witness' preserves
    the public, covenantal sense without importing later specifically Christian martyr
    terminology, while still fitting the book's theme of faithful public confession.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
