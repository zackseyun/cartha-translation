id: 4MA.16.16
reference: 4 Maccabees 16:16
source:
  edition: lxx-swete-1909
  text: ἔλεγες τοῖς παισὶν ἐν τῇ Ἑβραΐδι φωνῇ· Ὦ παῖδες, γενναῖος ὁ ἀγὼν ἐφʼ ὃν κληθέντες
    ὑπὲρ τῆς διαμαρτυρίας τοῦ ἔθνους, ἐναγωνίσασθε
  language: Greek
  pages:
