translation:
  text: you were saying to the children in the Hebrew language, “O children, noble
    is the contest to which, having been called for the testimony of the nation, you
    must struggle earnestly.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for the testimony of the nation.” The Greek διαμαρτυρία can mean “witness”
      or “testimony.”
    reason: lexical_alternative
  - marker: b
    text: Or “you said” or “you kept saying”; the Greek imperfect may suggest repeated
      or ongoing speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγες
  chosen: you were saying
  alternatives:
  - you said
  - you kept saying
  lexicon: LSJ
  rationale: Imperfect indicative suggests ongoing or repeated speech in the recalled
    scene; 'you were saying' preserves that aspect without overinterpreting frequency.
- source_word: τοῖς παισὶν
  chosen: to the sons
  alternatives:
  - to the children
  - to the boys
  lexicon: LSJ
  rationale: In context the mother addresses her seven male offspring facing martyrdom.
    'Sons' best captures both the familial relationship and the masculine reference
    more precisely than the broader 'children'.
- source_word: ἐν τῇ Ἑβραΐδι φωνῇ
  chosen: in the Hebrew language
  alternatives:
  - in the Hebrew tongue
  - in Hebrew
  lexicon: LSJ
  rationale: The phrase denotes the language used in speaking. 'In the Hebrew language'
    is clear modern English while staying close to the Greek.
- source_word: γενναῖος
  chosen: noble
  alternatives:
  - brave
  - glorious
  - valiant
  lexicon: LSJ
  rationale: The adjective can denote nobility or bravery. With ἀγών, 'noble' preserves
    the moral elevation of the struggle, not merely its danger.
- source_word: ὁ ἀγών
  chosen: the contest
  alternatives:
  - the struggle
  - the fight
  lexicon: LSJ
  rationale: ἀγών often refers to an athletic or public contest and in 4 Maccabees
    carries the imagery of heroic struggle. 'Contest' keeps that metaphorical resonance
    better than the flatter 'struggle,' though the latter is preserved conceptually
    in the following verb.
- source_word: ἐφʼ ὃν κληθέντες
  chosen: to which, having been called
  alternatives:
  - for which, having been summoned
  - to which you were called
  lexicon: LSJ
  rationale: The preposition with relative pronoun points to the contest as the goal
    of the calling. The participial construction is retained in natural English to
    preserve the causal/background relation.
- source_word: ὑπὲρ τῆς διαμαρτυρίας τοῦ ἔθνους
  chosen: for the witness of our nation
  alternatives:
  - for the testimony of the nation
  - for the attestation of the people
  lexicon: LSJ
  rationale: διαμαρτυρία here denotes testimony or witness, likely the public witness
    borne by the Jewish people and their law. 'Witness' is more idiomatic than 'testimony.'
    'Our nation' is supplied in English because the speaker is addressing her own
    sons as members of that nation, and English often requires the relational force
    implicit in the discourse context.
- source_word: ἐναγωνίσασθε
  chosen: you must struggle earnestly
  alternatives:
  - struggle in the contest
  - fight it out nobly
  - contend
  lexicon: LSJ
  rationale: The aorist middle imperative calls for vigorous engagement in the contest.
    'You must struggle earnestly' conveys exhortation and intensity in readable English,
    while echoing the ἀγών wordplay.
