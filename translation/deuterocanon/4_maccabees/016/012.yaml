id: 4MA.16.12
reference: 4 Maccabees 16:12
source:
  edition: lxx-swete-1909
  text: οὐδʼ ἵνα μὴ ἀποθάνωσιν ἀπέτρεπεν αὐτῶν τινα, οὐδʼ ὡς ἀποθνῃσκόντων ἐλυπήθη.
  language: Greek
