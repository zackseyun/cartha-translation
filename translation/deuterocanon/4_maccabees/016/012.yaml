translation:
  text: Nor did she try to turn any of them away so that they might not die, nor did
    she grieve as they were dying.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπέτρεπεν
  chosen: try to turn ... away
  alternatives:
  - deterred
  - turned back
  - prevented
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action in past time. In context,
    the mother did not seek to dissuade any of her sons from their course. 'Try to
    turn ... away' captures the attempted discouragement sense without overstating
    successful prevention.
- source_word: αὐτῶν τινα
  chosen: any of them
  alternatives:
  - any one of them
  - one of them
  lexicon: BDAG
  rationale: The partitive expression naturally means 'any one of them.' 'Any of them'
    is idiomatic modern English and preserves the distributive force.
- source_word: ἵνα μὴ ἀποθάνωσιν
  chosen: so that they might not die
  alternatives:
  - lest they die
  - to keep them from dying
  lexicon: BDAG
  rationale: The clause expresses purpose. 'So that they might not die' keeps the
    purposive nuance more transparently than the more interpretive 'to keep them from
    dying,' while remaining readable.
- source_word: ἐλυπήθη
  chosen: grieve
  alternatives:
  - was distressed
  - was saddened
  - mourned
  lexicon: BDAG
  rationale: The verb denotes sorrow or distress. 'Grieve' best conveys substantial
    emotional pain in elevated but still accessible English. 'Mourned' could imply
    postmortem lament more specifically than the Greek requires.
- source_word: ὡς ἀποθνῃσκόντων
  chosen: as they were dying
  alternatives:
  - while they were dying
  - at their dying
  lexicon: BDAG
  rationale: The genitive absolute gives the circumstance contemporaneous with her
    lack of grief. 'As they were dying' is natural English and preserves the ongoing
    aspect of the participle.
