  text: ἣ οὐδʼ ἂν ἀποθάνω, θάπτοντα τῶν υἱῶν ἕξω τινά. ἀλλὰ τούτῳ τῷ θρήνῳ οὐδένα
    ὀλοφύρετο ἡ ἱερὰ καὶ θεοσεβὴς μήτηρ,
