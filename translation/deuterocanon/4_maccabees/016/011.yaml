  - pious
  rationale: The term denotes reverence toward God rather than generic religiosity.
    'God-fearing' preserves explicit theocentric content and aligns with the work's
    emphasis on piety.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Retention of first-person perspective in the opening clause
  chosen_reading: even if I were not to die
  alternative_readings:
  - even if she were not to die
  rationale: The Greek form ἀποθάνω is first person singular in the supplied source
    text. Although the syntax is abrupt, the translation preserves the source witness
    rather than smoothing to third person without textual basis.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
