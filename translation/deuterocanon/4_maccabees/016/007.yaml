theological_decisions:
- issue: Rendering the series of verbless exclamations
  chosen_reading: Kept as compressed exclamatory noun phrases rather than expanding
    into full clauses.
  alternative_readings:
  - O my seven pregnancies were wasted, and my seven ten-month terms were fruitless,
    and my nursing was unproductive, and my suckling was miserable.
  rationale: The Greek is a chain of vocative/exclamatory phrases without explicit
    finite verbs. Preserving that compression better reflects the rhetoric of lament
    while remaining intelligible in English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without unnecessary paraphrase.'
- issue: Ancient gestational idiom δεκάμηνοι
  chosen_reading: Translated literally as 'ten-month terms' with explanatory footnote.
  alternative_readings:
  - full-term pregnancies
  - months of pregnancy
  rationale: The literal wording is culturally specific and should be preserved rather
    than flattened, but modern readers benefit from a note that this reflects ancient
    counting of pregnancy.
  doctrine_reference: Readable modern English, not archaic or academic; preserve source
    meaning and document culturally specific expressions.
