translation:
  text: O I, the mother of many and of beautiful children, a widow and alone, much-lamenting
    woman!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of beautiful children.' The Greek καλλίπαις can refer to beauty or excellence;
      here 'noble children' was chosen because the context honors the children's virtue
      and courage.
    reason: lexical_alternative
  - marker: b
    text: The Greek opens with a lamenting interjection (ὦ); 'Alas for me' expresses
      its mournful force more explicitly than a simple 'Oh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ
  chosen: Alas for me
  alternatives:
  - Oh
  - Ah
  lexicon: LSJ
  rationale: The interjection introduces a lament rather than a neutral vocative.
    'Alas for me' brings out the mournful force in natural English better than a bare
    'Oh.'
- source_word: πολύπαις
  chosen: the mother of many
  alternatives:
  - many-childed
  - having many children
  lexicon: LSJ
  rationale: The compound literally denotes having many children. 'The mother of many'
    is idiomatic English and fits the speaker's self-lament.
- source_word: καλλίπαις
  chosen: of noble children
  alternatives:
  - of beautiful children
  - with fine children
  lexicon: LSJ
  rationale: The adjective can denote beauty or excellence. In this context, where
    the sons are praised for virtue and courage, 'noble children' better captures
    commendable quality rather than mere physical beauty.
- source_word: γυνή
  chosen: the mother
  alternatives:
  - woman
  - I, a woman
  lexicon: BDAG/LSJ
  rationale: Although γυνή ordinarily means 'woman' or 'wife,' the appositional phrase
    here is shaped by the maternal context established by πολύπαις and καλλίπαις.
    Rendering the whole phrase as 'the mother of many and of noble children' communicates
    the sense smoothly in English without losing the speaker's self-reference.
- source_word: χήρα
  chosen: a widow
  alternatives:
  - widowed
  lexicon: BDAG/LSJ
  rationale: The noun straightforwardly identifies her status after her husband's
    death; 'a widow' is the clearest English equivalent.
- source_word: μόνη
  chosen: alone
  alternatives:
  - solitary
  - left alone
  lexicon: BDAG/LSJ
  rationale: The word emphasizes her isolation. 'Alone' is direct and natural.
- source_word: πολύθρηνος
  chosen: much-lamenting
  alternatives:
  - full of mourning
  - greatly mourned
  - much-grieving
  lexicon: LSJ
  rationale: The adjective denotes abundant lamentation or mourning. 'Much-lamenting'
    preserves the active, ongoing sense of grief while staying close to the Greek
    compound.
