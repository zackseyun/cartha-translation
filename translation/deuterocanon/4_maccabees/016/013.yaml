translation:
  text: But, having a mind like adamant, and sending the number of her sons on to
    immortality, she was all the more urging them toward death for the sake of godliness,
    pleading with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'echoing back the number of her sons into immortality.' The Greek participle
      is unusual and metaphorical, so the exact image is difficult to reproduce in
      English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδάμαντινον
  chosen: like adamant
  alternatives:
  - adamantine
  - unyielding
  - hard as diamond
  lexicon: LSJ
  rationale: The adjective evokes extreme hardness and unbreakability. 'Like adamant'
    preserves the metaphor vividly in readable English without over-paraphrasing to
    a mere abstract quality such as 'unyielding'.
- source_word: νοῦν
  chosen: mind
  alternatives:
  - understanding
  - resolve
  lexicon: LSJ
  rationale: νοῦς commonly denotes the mind or faculty of understanding. Here 'mind'
    fits the metaphor of inner firmness; 'resolve' would interpret rather than translate.
- source_word: ἀντικτυποῦσα
  chosen: striking back
  alternatives:
  - echoing back
  - answering
  - resounding against
  lexicon: LSJ
  rationale: The participle is unusual and metaphorical. A basic sense of sounding
    or striking in response best fits the imagery. 'Striking back' preserves the forceful
    metaphor while allowing the phrase to suggest that the mother's thought counters
    the loss of her sons by orienting their number toward immortality.
- source_word: εἰς ἀθανασίαν
  chosen: toward immortality
  alternatives:
  - for immortality
  - into immortality
  lexicon: LSJ
  rationale: εἰς marks direction or goal. 'Toward immortality' preserves that telic
    movement without overstating the mechanics of how the sons attain it.
- source_word: τὸν τῶν υἱῶν ἀριθμόν
  chosen: the number of her sons
  alternatives:
  - the count of her sons
  - her sons' number
  lexicon: LSJ
  rationale: A fairly literal rendering is best. Supplying 'her' is natural in English
    from context, since the mother is the subject.
- source_word: μᾶλλον
  chosen: all the more
  alternatives:
  - rather
  - more
  lexicon: LSJ
  rationale: This comparative adverb intensifies her action in context; 'all the more'
    captures the rhetorical force idiomatically.
- source_word: εὐσεβείας
  chosen: godliness
  alternatives:
  - piety
  - reverence
  lexicon: LSJ
  rationale: In 4 Maccabees εὐσέβεια is a key virtue denoting faithful devotion to
    God and the law. 'Godliness' is accessible modern English and preserves the theological
    dimension better than the somewhat narrower 'piety'.
- source_word: προετρέπετο
  chosen: was urging them on
  alternatives:
  - was exhorting them
  - was encouraging them forward
  lexicon: LSJ
  rationale: The verb means to urge or exhort strongly. 'Was urging them on' conveys
    active encouragement in the face of martyrdom.
- source_word: ἱκετεύουσα
  chosen: pleading with them
  alternatives:
  - entreating
  - imploring
  lexicon: LSJ
  rationale: The participle adds emotional intensity to her exhortation. 'Pleading
    with them' is natural English and preserves the pathos.
