theological_decisions:
- issue: Rendering εὐσέβεια in a martyrdom context
  chosen_reading: godliness
  alternative_readings:
  - piety
  - reverence
  rationale: The term in 4 Maccabees carries covenantal devotion to God expressed
    in faithful endurance. 'Godliness' keeps the Godward orientation explicit without
    importing later technical theology.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms; readable modern English'
- issue: Interpreting the metaphorical clause καὶ εἰς ἀθανασίαν ἀντικτυποῦσα τὸν τῶν
    υἱῶν ἀριθμόν
  chosen_reading: and striking back the number of her sons toward immortality
  alternative_readings:
  - and echoing the number of her sons into immortality
  - and answering with the number of her sons for immortality
  rationale: The Greek is rhetorically dense and metaphorical rather than doctrinally
    technical. The chosen rendering preserves the unusual imagery and avoids flattening
    it into an explanatory paraphrase about martyrdom reward, while still indicating
    immortality as the goal in view.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it'
