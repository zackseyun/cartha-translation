id: 4MA.16.13
reference: 4 Maccabees 16:13
source:
  edition: lxx-swete-1909
  text: ἀλλʼ ὥσπερ ἀδάμαντινον ἔχουσα τὸν νοῦν, καὶ εἰς ἀθανασίαν ἀντικτυποῦσα τὸν
    τῶν υἱῶν ἀριθμόν, μᾶλλον ὑπὲρ τῆς εὐσεβείας ἐπὶ τὸν θάνατον αὐτοὺς προετρέπετο
    ἱκετεύουσα.
  language: Greek
