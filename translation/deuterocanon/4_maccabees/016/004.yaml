translation:
  text: But by the reasoning of godliness the mother extinguished passions so many
    and so great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'so many and so great passions.'
    reason: lexical_alternative
  - marker: b
    text: '''Godliness'' may also be rendered ''piety''; the Greek emphasizes devout
      reverence toward God, not mere rationality.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - rather
  - yet
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding context; 'But' is the most
    natural concise English adversative here.
- source_word: τῷ λογισμῷ
  chosen: by the reasoning
  alternatives:
  - by reason
  - by rational judgment
  lexicon: LSJ
  rationale: λόγισμος in 4 Maccabees is a key term for rational deliberation or reasoned
    judgment. 'By the reasoning' preserves the instrumental dative and keeps the book's
    emphasis on reason active rather than abstract.
- source_word: τῆς εὐσεβείας
  chosen: of godliness
  alternatives:
  - of piety
  - of reverence
  lexicon: BDAG
  rationale: εὐσέβεια denotes piety/devoutness toward God. 'Godliness' is accessible
    modern English and preserves the explicitly religious-moral sense better than
    the potentially narrower 'piety' in contemporary usage.
- source_word: κατεσβεσε
  chosen: extinguished
  alternatives:
  - quenched
  - suppressed
  lexicon: LSJ
  rationale: The verb literally means to quench or extinguish, often of fire. 'Extinguished'
    preserves the vivid metaphor of passions being put out.
- source_word: τοσαῦτα καὶ τηλικαῦτα
  chosen: such many and such great
  alternatives:
  - so many and so great
  - such numerous and such great
  lexicon: LSJ
  rationale: The paired demonstrative intensifiers stress both number and magnitude.
    The idiomatic English sense is 'so many and so great,' but the chosen rendering
    stays closer to the emphatic Greek structure while remaining understandable.
- source_word: πάθη
  chosen: passions
  alternatives:
  - sufferings
  - emotions
  - affections
  lexicon: BDAG
  rationale: In 4 Maccabees πάθη commonly refers to passions or emotional impulses
    subject to reason. 'Passions' best fits the book's philosophical vocabulary here,
    rather than external 'sufferings'.
- source_word: ἡ μήτηρ
  chosen: the mother
  alternatives:
  - their mother
  lexicon: BDAG
  rationale: The Greek has the simple nominative 'the mother.' English can retain
    this without adding 'their,' though the referent is clear from context.
