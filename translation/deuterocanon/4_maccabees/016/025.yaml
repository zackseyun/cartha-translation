translation:
  text: And even more, seeing this—that after dying for God they live to God, just
    as Abraham and Isaac and Jacob, and all the patriarchs do—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they live for God.' The Greek says literally, 'they live to God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι δὲ καὶ
  chosen: And even more
  alternatives:
  - And furthermore
  - And besides this
  lexicon: LSJ
  rationale: Captures the additive and emphatic force of the phrase in natural English
    without sounding wooden.
- source_word: ταῦτα ἰδόντες
  chosen: by seeing this
  alternatives:
  - seeing these things
  - when they saw this
  lexicon: LSJ
  rationale: The participial construction is best represented with an English participial
    phrase. Although ταῦτα is plural in form, English idiom can render the sense collectively
    as 'this' in context, referring to the reality just stated or perceived.
- source_word: διὰ τὸν θεόν
  chosen: for God
  alternatives:
  - because of God
  - on account of God
  lexicon: LSJ
  rationale: 'In martyrdom context, διὰ with the accusative here most naturally expresses
    cause/motive: they died for God''s sake. ''For God'' is concise and idiomatic.'
- source_word: ἀποθανόντες
  chosen: after dying
  alternatives:
  - having died
  - though they died
  lexicon: LSJ
  rationale: 'Aorist participle preceding the main verb ζῶσιν is naturally rendered
    as antecedent action in English: ''after dying.'' This avoids awkwardness while
    preserving sequence.'
- source_word: ζῶσιν τῷ θεῷ
  chosen: they live to God
  alternatives:
  - they live for God
  - they live with God
  lexicon: LSJ
  rationale: The dative τῷ θεῷ is preserved with 'to God' to reflect the Greek closely
    and to echo biblical idiom about living in relation to God. 'With God' would interpret
    more than the text states.
- source_word: ὥσπερ
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: LSJ
  rationale: Introduces the comparison clearly and naturally.
- source_word: οἱ πατριάρχαι
  chosen: the patriarchs
  alternatives:
  - the fathers
  - the ancestral heads
  lexicon: LSJ
  rationale: Standard and accurate rendering for the ancestral figures named; it preserves
    the historical-religious sense of the term.
