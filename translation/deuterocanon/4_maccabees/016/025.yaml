theological_decisions:
- issue: Postmortem life of the righteous martyrs in relation to God
  chosen_reading: they live to God
  alternative_readings:
  - they live for God
  - they live with God
  rationale: The Greek explicitly states that those who died for God 'live' in relation
    to God, and compares them with Abraham, Isaac, Jacob, and the patriarchs. The
    translation preserves the text's affirmation of continued life without over-specifying
    the metaphysical mode beyond the Greek dative construction.
  doctrine_reference: Preserve theological tension rather than resolve it.
