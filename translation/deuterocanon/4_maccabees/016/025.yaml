id: 4MA.16.25
reference: 4 Maccabees 16:25
source:
  edition: lxx-swete-1909
  text: ἔτι δὲ καὶ ταῦτα ἰδόντες ὅτι διὰ τὸν θεὸν ἀποθανόντες ζῶσιν τῷ θεῷ, ὥσπερ
    Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ, καὶ πάντες οἱ πατριάρχαι.
  language: Greek
