translation:
  text: So you also, having the same faith toward God, do not be distressed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the same trust toward God.' The Greek πίστις can also carry the sense
      of trust or faithfulness depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not be embittered' or 'do not be upset.' The verb can denote being
      pained, vexed, or angered.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ὑμεῖς οὖν
  chosen: So you also
  alternatives:
  - And you therefore also
  - Therefore you too
  lexicon: LSJ
  rationale: Combines the connective καὶ, emphatic pronoun ὑμεῖς, and inferential
    οὖν into natural English that preserves both continuity and exhortational force.
- source_word: τὴν αὐτὴν πίστιν
  chosen: the same faith
  alternatives:
  - the same trust
  - the same faithfulness
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per project doctrine. In this exhortational
    context it refers to shared steadfast belief/commitment like that of the martyrs,
    not primarily God's faithfulness. 'The same faith' is the most natural and sufficiently
    broad rendering.
- source_word: πρὸς τὸν θεόν
  chosen: toward God
  alternatives:
  - in God
  - with respect to God
  lexicon: LSJ
  rationale: πρός with the accusative here indicates orientation or relation. 'Toward
    God' stays close to the Greek while remaining intelligible. 'In God' is possible
    idiomatically, but the preposition is not the usual simple dative construction
    for that idea.
- source_word: ἔχοντες
  chosen: having
  alternatives:
  - holding
  - possessing
  lexicon: BDAG
  rationale: 'The participle is contemporaneous and instrumental/circumstantial: because
    they have this faith, they are exhorted not to react negatively. ''Having'' is
    straightforward and preserves the participial structure.'
- source_word: μὴ χαλεπαίνητε
  chosen: do not be distressed
  alternatives:
  - do not be angry
  - do not be embittered
  - do not be upset
  lexicon: LSJ
  rationale: χαλεπαίνω can denote being pained, vexed, or embittered. In this context
    of consoling and exhorting survivors not to react bitterly to martyrdom, 'do not
    be distressed' best captures the emotional force without narrowing it to anger
    alone.
