theological_decisions:
- issue: Interpretation of the mother's lament after the deaths of her sons
  chosen_reading: 'The line is rendered as a bereavement paradox: despite bearing
    seven children, she now counts herself mother of none.'
  alternative_readings:
  - A more idiomatic rendering could flatten the perfect to 'I am no one's mother.'
  rationale: The Greek perfect γεγένημαι carries resultant-state force, and the rhetoric
    depends on the contrast between childbirth and present loss. Preserving that tension
    best reflects the source without importing additional doctrinal meaning.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
