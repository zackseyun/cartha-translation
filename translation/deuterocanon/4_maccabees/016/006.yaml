translation:
  text: Alas for me indeed, miserable and many times thrice-wretched, who, though
    I bore seven children, have become the mother of none.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'O miserable woman' or 'O wretched one.' The Greek exclamation is a
      self-lament.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'thrice-wretched many times over,' an intensified expression
      of grief.
    reason: lexical_alternative
  - marker: c
    text: Or, 'seven sons.' The Greek word can mean 'children' or 'sons'; the context
      indicates male offspring.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ μελέα
  chosen: Alas for me
  alternatives:
  - O miserable woman
  - O wretched one
  lexicon: LSJ
  rationale: An exclamatory self-lament. 'Alas for me' captures the emotional force
    in natural English without over-specifying gender beyond what the adjective implies
    in context.
- source_word: ἔγωγε
  chosen: indeed
  alternatives:
  - for my part
  - surely
  lexicon: LSJ
  rationale: Adds emphatic self-reference. 'Indeed' preserves the intensifying force
    idiomatically in English.
- source_word: πολλάκις τρισαθλία
  chosen: thrice-wretched many times over
  alternatives:
  - many times most miserable
  - again and again thrice-wretched
  lexicon: LSJ
  rationale: πολλάκις intensifies the lament, and τρισαθλία literally means 'thrice-wretched'
    or 'most wretched.' Retaining 'thrice-wretched' preserves the vivid Greek expression
    while 'many times over' reflects πολλάκις.
- source_word: ἥτις
  chosen: Though I
  alternatives:
  - I who
  - she who
  lexicon: LSJ
  rationale: Introduces a self-referential relative clause explaining the grounds
    of lament. 'Though I' brings out the concessive sense naturally in English.
- source_word: ἑπτὰ παῖδας
  chosen: seven children
  alternatives:
  - seven sons
  - seven boys
  lexicon: LSJ
  rationale: παῖδας can mean children or sons. In context they are male offspring,
    but 'children' keeps the Greek term's broader lexical value while remaining accurate
    to a mother's speech.
- source_word: τεκοῦσα
  chosen: bore
  alternatives:
  - having given birth to
  - bearing
  lexicon: LSJ
  rationale: Aorist participle from τίκτω. 'Bore' is concise, natural, and preserves
    the maternal childbirth sense.
- source_word: οὐδενὸς μήτηρ γεγένημαι
  chosen: I have become the mother of none
  alternatives:
  - I am the mother of none
  - I have proved mother to none
  lexicon: LSJ
  rationale: 'Perfect tense γεγένημαι suggests a resulting state. ''I have become
    the mother of none'' preserves the stark paradox: though she bore seven, she is
    now bereft of them all.'
