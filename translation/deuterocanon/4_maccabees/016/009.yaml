translation:
  text: O my children—some unmarried, and others married but childless—I will not
    see your children, nor will I be counted blessed when I am called grandmother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἄνοιντοι likely means 'childless' or 'without offspring'; the sense
      is that even those who had married would leave her no grandchildren.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ τῶν ἐμῶν παίδων
  chosen: O my children
  alternatives:
  - O children of mine
  - O my sons
  lexicon: LSJ
  rationale: παῖδες can mean children or sons depending on context. Since the speaker
    addresses her offspring collectively and the maternal lament is foregrounded,
    'my children' is the most natural and sufficiently literal rendering.
- source_word: ἄγαμοι
  chosen: unmarried
  alternatives:
  - not married
  - single
  lexicon: LSJ
  rationale: ἄγαμος straightforwardly denotes being unmarried. 'Unmarried' is clear,
    modern, and formally close.
- source_word: γαμήσαντες
  chosen: married
  alternatives:
  - having married
  - those who married
  lexicon: LSJ
  rationale: The participle refers to those among her children who had entered marriage.
    In English, 'married' best captures the state implied in this lament without awkwardness.
- source_word: ἄνοιντοι
  chosen: childless
  alternatives:
  - without offspring
  - barren
  lexicon: LSJ
  rationale: In context, after distinguishing unmarried children from married ones,
    the point is that even the married ones leave no descendants. 'Childless' expresses
    the result naturally and prepares for the next clause about not seeing their children.
    'Barren' would be too biologically specific and potentially misleading when applied
    to the group as a whole.
- source_word: οὐκ ὄψομαι ὑμῶν τέκνα
  chosen: I will not see your children
  alternatives:
  - I will not see offspring from you
  - I will not see your descendants
  lexicon: LSJ
  rationale: τέκνα here refers to the next generation descending from her children.
    'Your children' is the most direct rendering and fits the lament's family language.
- source_word: μάμμη
  chosen: grandmother
  alternatives:
  - grandmamma
  - grandmotherly elder
  lexicon: LSJ
  rationale: μάμμη is an affectionate familial term for grandmother. 'Grandmother'
    is the standard modern equivalent and suits the emotional register.
- source_word: κληθεῖσα μακαρισθήσομαι
  chosen: will I be blessed when I am called
  alternatives:
  - will I be counted blessed when called
  - will I be congratulated when named
  lexicon: LSJ
  rationale: The passive future μακαρισθήσομαι conveys being pronounced or regarded
    as blessed/happy. Rendering it as 'will I be blessed when I am called grandmother'
    preserves both the social recognition and the lamented loss.
