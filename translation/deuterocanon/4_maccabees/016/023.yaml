translation:
  text: For, knowing that to be devout is not irrational, they did not resist the
    pains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'knowing that to be pious is not irrational, not to resist
      the pains.' The Greek is compressed, and the clause can be represented more
      literally this way.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλόγιστον
  chosen: not irrational
  alternatives:
  - unreasonable
  - senseless
  - without reason
  lexicon: LSJ
  rationale: The adjective means 'irrational' or 'without reason.' In context it qualifies
    the infinitive εὐσεβεῖν ('to live/devoutly revere'), yielding the sense that piety
    is not contrary to reason. Rendering with negation in English preserves the Greek
    construction and the book's recurring theme that true piety accords with reason.
- source_word: εἰδότας
  chosen: though they knew
  alternatives:
  - knowing
  - since they knew
  lexicon: BDAG
  rationale: 'As an accusative participle agreeing with the implied object of the
    larger sentence, it conveys attendant circumstance/background. ''Though they knew''
    fits the concessive force in context: despite recognizing the rationality of piety,
    they still faced suffering steadfastly.'
- source_word: εὐσεβεῖν
  chosen: reverence toward God
  alternatives:
  - to be devout
  - to live piously
  - to show piety
  lexicon: BDAG
  rationale: The verb denotes acting with piety or reverence, often toward God. 'Reverence
    toward God' makes the object implicit in the term clear for modern readers without
    over-paraphrasing, and suits the theological emphasis of 4 Maccabees.
- source_word: μὴ ἀνθίστασθαι
  chosen: did not shrink back from
  alternatives:
  - did not resist
  - did not oppose
  - did not draw back from
  lexicon: BDAG
  rationale: Literally the infinitive means 'not to stand against/resist.' With τοῖς
    πόνοις ('the pains'), the idiomatic sense is that they did not set themselves
    against or recoil before the sufferings. 'Did not shrink back from' communicates
    courageous endurance in natural English.
- source_word: τοῖς πόνοις
  chosen: the pains
  alternatives:
  - the sufferings
  - the torments
  - the hardships
  lexicon: BDAG
  rationale: πόνος can denote pain, toil, or suffering. In this martyrdom context,
    'pains' is a direct and vivid rendering, while broader options like 'sufferings'
    are possible. 'Torments' would be interpretive and somewhat stronger than the
    lexical base alone requires.
