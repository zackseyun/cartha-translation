theological_decisions:
- issue: Relation of piety and reason in 4 Maccabees
  chosen_reading: The clause is rendered to state that piety/reverence is not irrational.
  alternative_readings:
  - they knew it was irrational to be pious and not to resist the pains
  - knowing irrationally to be pious, not to resist pains
  rationale: The syntax is compressed, but the most coherent reading in the argument
    of 4 Maccabees is that the martyrs recognized piety as rational and therefore
    endured suffering. This preserves the book's central thesis that devout reason
    masters the passions. Alternative construals make the sentence affirm the irrationality
    of piety, which runs against the immediate and broader context.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy'
