translation:
  text: For even when you were arrested with your children, you stood watching Eleazar
    being tortured, and
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text of this verse ends with 'and,' continuing directly into the
      next verse; the dash in English preserves that unfinished syntax.
    reason: textual_variant
lexical_decisions:
- source_word: συνελήμφθης
  chosen: you were arrested
  alternatives:
  - you were seized
  - you were taken
  lexicon: BDAG
  rationale: The passive of συλλαμβάνω here refers to being apprehended by authorities.
    'Arrested' is the most natural modern English equivalent in this martyrdom/judicial
    context, while remaining faithful to the legal force of the verb.
- source_word: παίδων
  chosen: children
  alternatives:
  - sons
  - boys
  lexicon: BDAG
  rationale: παῖς can mean child, servant, or specifically son/boy depending on context.
    Here the mother is addressed in relation to her offspring collectively; 'children'
    best fits the familial sense without over-specifying gender, especially since
    the broader context concerns her sons but this verse itself uses the broader term.
- source_word: εἱστήκεις
  chosen: you stood
  alternatives:
  - you were standing
  - you remained standing
  lexicon: BDAG
  rationale: The pluperfect/imperfective force of ἵστημι here conveys a continuing
    posture. 'You stood' is concise and idiomatic, and the following participle supplies
    the ongoing action.
- source_word: ὁρῶσα
  chosen: watching
  alternatives:
  - seeing
  - looking at
  lexicon: BDAG
  rationale: The participle indicates visual witness to the event. 'Watching' better
    conveys sustained observation than the flatter 'seeing'.
- source_word: βασανιζόμενον
  chosen: being tortured
  alternatives:
  - being tormented
  - being subjected to torture
  lexicon: BDAG
  rationale: In this martyrdom context βασανίζω refers to physical torment under interrogation/punishment.
    'Being tortured' is the clearest and strongest contextually appropriate rendering.
- source_word: Ἐλεάζαρον
  chosen: Eleazar
  lexicon: LSJ
  rationale: Personal names are transliterated by project policy.
- source_word: καὶ
  chosen: and—
  alternatives:
  - and
  - also
  lexicon: BDAG
  rationale: The verse ends with καὶ and is syntactically incomplete in the supplied
    witness, clearly continuing into the next verse. An em dash preserves the unfinished
    connection in English and honestly reflects the source segmentation.
