  text: καὶ γὰρ τοῦτο ἐπιλογίσασθαι, ὅτι εἰ δειλόψυχος ἦν ἡ γυνή, καίπερ μήτηρ οὖσα,
    ὠλοφύρετο ἂν ἐπʼ αὐτοῖς· καὶ ἴσως ἂν ταῦτα οὕτως εἶπεν
