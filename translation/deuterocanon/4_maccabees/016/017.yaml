translation:
  text: willingly for the ancestral law. For it is shameful that this old man should
    endure the pains that come because of godliness, but you—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “because of piety.” The Greek εὐσέβεια can denote reverence or faithful
      devotion toward God.
    reason: lexical_alternative
  - marker: b
