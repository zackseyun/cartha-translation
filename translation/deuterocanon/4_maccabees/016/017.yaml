lexical_decisions:
- source_word: προθύμως
  chosen: willingly
  alternatives:
  - eagerly
  - readily
  lexicon: LSJ
  rationale: Adverb indicating readiness or eagerness of disposition. 'Willingly'
    fits natural English and preserves the voluntary sense without overstating emotion.
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: BDAG
  rationale: 'With the genitive here it expresses cause or purpose: acting/suffering
    for the sake of the ancestral law. ''For'' is concise and idiomatic in English.'
- source_word: τοῦ πατρίου νόμου
  chosen: the ancestral law
  alternatives:
  - the law of our fathers
  - the patrimonial law
  lexicon: LSJ
  rationale: πατρίος denotes what belongs to one's fathers/ancestors, especially inherited
    custom. 'Ancestral law' is a standard, clear rendering in Maccabean context and
    preserves the Jewish covenantal-traditional sense.
- source_word: αἰσχρόν
  chosen: shameful
  alternatives:
  - disgraceful
  - base
  lexicon: LSJ
  rationale: The term denotes moral shame or disgrace. 'Shameful' best matches the
    exhortational tone and direct ethical appeal.
- source_word: γέροντα
  chosen: old man
  alternatives:
  - elderly man
  - aged man
  lexicon: LSJ
  rationale: Refers plainly to an aged male person. 'Old man' is direct and reflects
    the rhetorical contrast with the younger hearers.
- source_word: ὑπομεῖναι
  chosen: should endure
  alternatives:
  - to endure
  - to bear up under
  lexicon: BDAG
  rationale: The infinitive depends on the shame construction and conveys steadfast
    endurance under suffering. 'Should endure' brings the sense into natural English
    within the clause.
- source_word: ἀλγηδόνας
  chosen: the pains
  alternatives:
  - sufferings
  - torments
  lexicon: LSJ
  rationale: The noun denotes pains or sufferings. 'Pains' stays close to the lexical
    sense; 'torments' would be stronger than the word itself requires, though the
    context is severe.
- source_word: διὰ τὴν εὐσέβειαν
  chosen: because of godliness
  alternatives:
  - for piety
  - because of piety
  lexicon: BDAG
  rationale: εὐσέβεια in this literature denotes reverence/piety toward God expressed
    in faithful observance. 'Godliness' is accessible modern English and keeps the
    Godward dimension clearer than bare 'piety'.
