theological_decisions:
- issue: Reference to the three youths by personal names rather than the more familiar
    Babylonian names
  chosen_reading: Hananiah and Azariah and Mishael
  alternative_readings:
  - Shadrach, Meshach, and Abednego
  rationale: The Greek text uses their Hebrew names. Following the source honors original-language
    primacy and avoids importing the more familiar traditional substitutes.
  doctrine_reference: Translation philosophy §1, §2
- issue: Rendering δίκαιος in a non-Pauline narrative context
  chosen_reading: righteous
  alternative_readings:
  - just
  rationale: The default contested-term guidance for δικαιοσύνη does not directly
    govern the adjective here, but the same semantic field is in view. 'Righteous'
    better preserves the moral-religious sense attached to Daniel in this context.
  doctrine_reference: DOCTRINE.md Contested terms (δικαιοσύνη) by semantic extension
