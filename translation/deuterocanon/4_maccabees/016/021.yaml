translation:
  text: And Daniel the righteous man was thrown to the lions; and Hananiah and Azariah
    and Mishael were hurled into a furnace of fire, and they endured because of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English often has 'into a fiery furnace.' The Greek reads more
      literally, 'into a furnace of fire.'
    reason: lexical_alternative
  - marker: b
    text: These are the Hebrew names of the three youths, more commonly known in English
      as Shadrach, Meshach, and Abednego.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δίκαιος
  chosen: the righteous man
  alternatives:
  - the righteous one
  - the just man
  lexicon: LSJ
  rationale: The adjective with article functions substantivally as an epithet for
    Daniel. 'The righteous man' preserves the moral characterization in natural English
    and reflects the masculine singular reference.
- source_word: εἰς λέοντας
  chosen: to the lions
  alternatives:
  - into the lions
  - among lions
  lexicon: LSJ
  rationale: With ἐβλήθη, the phrase denotes being cast into the lions' den contextually.
    English idiom prefers 'thrown to the lions,' which preserves the hostile force
    without over-specifying 'den,' absent from the Greek.
- source_word: ἐβλήθη
  chosen: was thrown
  alternatives:
  - was cast
  - was hurled
  lexicon: LSJ
  rationale: Aorist passive of βάλλω. 'Was thrown' is clear modern English and suitably
    forceful.
- source_word: ἀπεσφενδονήθησαν
  chosen: were hurled
  alternatives:
  - were flung
  - were cast
  lexicon: LSJ
  rationale: The verb is more vivid than a simple 'were thrown.' 'Were hurled' preserves
    the violent imagery and distinguishes it from ἐβλήθη earlier in the verse.
- source_word: εἰς κάμινον πυρὸς
  chosen: into a furnace of fire
  alternatives:
  - into a fiery furnace
  - into a furnace
  lexicon: LSJ
  rationale: A relatively literal rendering preserves both κάμινος and πυρός. 'Fiery
    furnace' is traditional and idiomatic, but 'furnace of fire' stays closer to the
    Greek wording while remaining understandable.
- source_word: ὑπέμειναν
  chosen: they endured
  alternatives:
  - they persevered
  - they remained steadfast
  lexicon: LSJ
  rationale: The verb emphasizes steadfast endurance under trial. 'They endured' is
    concise and faithful to the context of suffering.
- source_word: διὰ τὸν θεόν
  chosen: because of God
  alternatives:
  - for God's sake
  - on account of God
  lexicon: LSJ
  rationale: The phrase indicates the reason or motive for their endurance. 'Because
    of God' is natural English and avoids the potentially colloquial tone of 'for
    God's sake.'
