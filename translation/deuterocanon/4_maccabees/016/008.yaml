translation:
  text: In vain, O children, did I endure many birth pains for you, and the more grievous
    anxieties of raising you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many labor pains ... and the more grievous cares of upbringing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μάτην
  chosen: In vain
  alternatives:
  - for nothing
  - to no purpose
  lexicon: LSJ
  rationale: Adverb expressing futility; 'In vain' is concise and idiomatic in solemn
    speech, preserving the mother's lament that her suffering has proved fruitless.
- source_word: ἐφʼ ὑμῖν
  chosen: for you
  alternatives:
  - on your account
  - because of you
  lexicon: LSJ
  rationale: With verbs of suffering, the phrase indicates reference or beneficiary/cause.
    'For you' fits the maternal context naturally while keeping the focus on suffering
    undergone with respect to her children.
- source_word: ὦ παῖδες
  chosen: O children
  alternatives:
  - O sons
  - O boys
  lexicon: LSJ
  rationale: παῖδες can mean children or sons. Since the speaker addresses her offspring
    collectively and the maternal lament is foregrounded, 'children' is natural English
    and avoids over-specifying beyond the lexical necessity, while retaining direct
    address with 'O'.
- source_word: πολλὰς ... ὠδῖνας
  chosen: many birth pains
  alternatives:
  - many labor pains
  - many pangs of childbirth
  lexicon: LSJ
  rationale: ὠδῖνες commonly denotes birth pangs/labor pains. 'Birth pains' is clear
    modern English and preserves the concrete maternal image rather than flattening
    it to generic suffering.
- source_word: ὑπέμεινα
  chosen: did I endure
  alternatives:
  - I endured
  - I bore
  lexicon: LSJ
  rationale: The aorist verb denotes steadfast endurance. The English auxiliary inversion
    after fronted 'In vain' reproduces the rhetorical force of the Greek word order
    in idiomatic English.
- source_word: χαλεπωτέρας
  chosen: the harder
  alternatives:
  - more grievous
  - more painful
  - more difficult
  lexicon: LSJ
  rationale: Comparative adjective modifying φροντίδας. 'The harder' preserves the
    comparative sense and links the anxieties of childrearing as even more difficult
    than childbirth itself.
- source_word: φροντίδας
  chosen: anxieties
  alternatives:
  - cares
  - worries
  - troubles
  lexicon: LSJ
  rationale: The noun denotes cares or anxious concerns. 'Anxieties' best captures
    the emotional burden in context, where the mother contrasts labor pains with the
    ongoing mental strain of rearing children.
- source_word: ἀνατροφῆς
  chosen: of raising you
  alternatives:
  - of upbringing
  - of rearing
  - of nurture
  lexicon: LSJ
  rationale: 'Genitive specifying the sphere of the anxieties: childrearing/upbringing.
    Rendering it verbally as ''raising you'' makes the English natural while preserving
    the maternal reference already implied by the context and ἐφʼ ὑμῖν.'
