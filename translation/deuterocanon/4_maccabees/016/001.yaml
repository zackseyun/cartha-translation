translation:
  text: If, then, even a woman—an aged woman and a mother of children—endured tortures
    unto death while seeing the sufferings of her children, godly reason is master
    of the passions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'while seeing her children wailing/crying aloud.' The
      Greek syntax in this clause is compressed, and the wording may emphasize the
      mother's witnessing of her children's cries amid their torture.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ δὲ τοίνυν
  chosen: If, then
  alternatives:
  - If therefore
  - Now if indeed
  lexicon: LSJ
  rationale: Carries an inferential and emphatic transition from the preceding argument.
    'If, then' preserves the logical force in natural English without overloading
    the clause.
- source_word: γυνὴ
  chosen: woman
  alternatives:
  - wife
  - female
  lexicon: LSJ
  rationale: The plain sense here is 'woman.' 'Wife' is not contextually indicated,
    and 'female' is too biological and unnatural in English.
- source_word: γεραιὰ
  chosen: an old woman
  alternatives:
  - aged woman
  - elderly woman
  lexicon: LSJ
  rationale: The adjective specifies her advanced age. Rendering it appositionally
    as 'an old woman' is idiomatic and preserves the emphasis on her weakness by worldly
    standards.
- source_word: ἐπὶ παιδῶν μήτηρ
  chosen: a mother of children
  alternatives:
  - a mother over children
  - a mother with children
  - a mother of sons
  lexicon: LSJ
  rationale: The phrase highlights that she was not only a woman and elderly, but
    also a mother with children whose suffering she witnessed. 'Of children' is slightly
    formal but stays close to the Greek without narrowing παίδων to 'sons' in the
    main text.
- source_word: ὑπέμεινεν
  chosen: endured
  alternatives:
  - persevered through
  - remained steadfast under
  lexicon: BDAG
  rationale: A standard rendering for steadfast endurance under suffering. 'Endured'
    is concise and fits the martyrdom context.
- source_word: τὰς μέχρι θανάτου βασάνους
  chosen: the tortures up to death
  alternatives:
  - the torments unto death
  - the sufferings to the point of death
  lexicon: LSJ
  rationale: βασάνοι here refers to inflicted tortures rather than generic suffering.
    'Up to death' preserves μέχρι θανάτου as the extent or limit of the ordeal.
- source_word: ὁρῶσα τῶν τέκνων
  chosen: while seeing the sufferings of her children
  alternatives:
  - while watching her children
  - while seeing her children
  lexicon: LSJ
  rationale: The transmitted Greek is compressed here; in context she is seeing what
    is happening to her children, namely their torture and death. Supplying 'the sufferings
    of' makes the sense explicit without departing from the contextually demanded
    meaning.
- source_word: ὁλολυγμένων
  chosen: the sufferings
  alternatives:
  - wailing
  - lamenting aloud
  - crying out
  lexicon: LSJ
  rationale: The participle literally evokes loud crying or wailing. Because the syntax
    in Swete's text is difficult, the translation absorbs the participle into the
    broader scene of the children's agonized suffering. A more literal alternative
    is preserved in a footnote.
- source_word: αὐτοκράτωρ
  chosen: master
  alternatives:
  - sovereign
  - self-ruling
  - in full control
  lexicon: LSJ
  rationale: In predicate position with 'godly reason,' the sense is that pious reason
    exercises mastery or dominion. 'Master' is compact and idiomatic in the philosophical
    argument of 4 Maccabees.
- source_word: τῶν παθῶν
  chosen: of the passions
  alternatives:
  - over the passions
  - of the emotions
  - of the sufferings
  lexicon: LSJ
  rationale: In this book πάθη is a key philosophical term for passions or disordered
    impulses, not merely emotions in a neutral sense. 'Of the passions' preserves
    the genitival relation with αὐτοκράτωρ.
- source_word: ὁ εὐσεβὴς λογισμός
  chosen: godly reason
  alternatives:
  - pious reason
  - devout rationality
  lexicon: LSJ
  rationale: This is a programmatic expression in 4 Maccabees. 'Godly reason' communicates
    both the religious and rational dimensions in accessible English; 'pious reason'
    is possible but less natural for modern readers.
