  text: ἀπέδειξα οὖν ὅτι οὐ μόνον τῶν παθῶν ἄνδρες ἐπεκράτησαν, ἀλλὰ καὶ γυνὴ τῶν
    μεγίστων βασάνων ὑπερεφρόνησεν.
