theological_decisions:
- issue: Anthropological term πάθη in 4 Maccabees
  chosen_reading: passions
  alternative_readings:
  - emotions
  - sufferings
  rationale: The book's central thesis concerns reason's rule over the passions, so
    πάθη here should be rendered in that ethical-philosophical sense rather than as
    external suffering.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 5
- issue: Gendered contrast between ἄνδρες and γυνή
  chosen_reading: men ... a woman
  alternative_readings:
  - people ... a woman
  rationale: The verse intentionally contrasts male examples with the exemplary mother.
    Preserving the gendered wording reflects the source text's rhetoric.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
