translation:
  text: So I have shown that not only did men master the passions, but even a woman
    despised the greatest tortures.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'despised the greatest tortures' or 'thought little of the greatest tortures.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέδειξα
  chosen: I have shown
  alternatives:
  - I proved
  - I demonstrated
  lexicon: BDAG
  rationale: Aorist of ἀποδείκνυμι can mean 'show, demonstrate, prove.' 'I have shown'
    fits the rhetorical summation in clear modern English without overstating formal
    proof.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding argument. 'So' is
    natural modern English and preserves the discourse connection.
- source_word: τῶν παθῶν
  chosen: their passions
  alternatives:
  - the passions
  - sufferings
  - emotions
  lexicon: BDAG
  rationale: In 4 Maccabees πάθη commonly refers to the passions/emotions that reason
    masters, not external sufferings. Adding 'their' makes idiomatic English sense
    with the generic subject 'men' while preserving the sense of internal impulses.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - people
  - males
  lexicon: BDAG
  rationale: The Greek specifically says 'men,' and the context contrasts male exemplars
    with 'even a woman.' Per doctrine, gender-accurate rendering is preferred over
    neutralization.
- source_word: ἐπεκράτησαν
  chosen: master
  alternatives:
  - overcame
  - gained control over
  - prevailed over
  lexicon: BDAG
  rationale: The verb conveys exercising control or mastery over something. 'Master'
    succinctly captures dominion over passions and suits the ethical theme of the
    book.
- source_word: γυνή
  chosen: a woman
  alternatives:
  - woman
  - wife
  lexicon: BDAG
  rationale: 'Anarthrous singular is best rendered indefinitely here: the author points
    to the mother as an example, ''even a woman.'' ''Wife'' is not indicated by context.'
- source_word: τῶν μεγίστων βασάνων
  chosen: the greatest tortures
  alternatives:
  - the worst torments
  - the severest sufferings
  lexicon: BDAG
  rationale: βάσανοι refers to tortures/torments, especially in martyrdom contexts.
    'Greatest tortures' closely reflects the superlative μεγίστων while remaining
    readable.
- source_word: ὑπερεφρόνησεν
  chosen: looked down on
  alternatives:
  - despised
  - thought lightly of
  - scorned
  lexicon: BDAG
  rationale: The verb means to think above or beyond, hence to disdain or regard as
    negligible. 'Looked down on' communicates that she treated the tortures as beneath
    regard, fitting the context of courageous contempt.
