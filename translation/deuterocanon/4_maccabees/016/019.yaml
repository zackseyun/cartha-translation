translation:
  text: And because of this, you ought to endure every hardship for the sake of God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: because of this
  alternatives:
  - for this reason
  - therefore
  lexicon: BDAG
  rationale: The phrase points back to the preceding argument and is best rendered
    causally in natural English. 'Because of this' preserves the inferential force
    without sounding overly formal.
- source_word: ὀφίλετε
  chosen: you ought
  alternatives:
  - you are obligated
  - you owe it
  - you must
  lexicon: BDAG
  rationale: The verb expresses moral obligation. 'You ought' preserves exhortational
    force while fitting the rhetorical address. 'Must' would be slightly stronger;
    'owe it' is too literal in English here.
- source_word: πάντα πόνον
  chosen: every pain
  alternatives:
  - all suffering
  - every hardship
  - every toil
  lexicon: BDAG
  rationale: πόνος denotes pain, hardship, or suffering. 'Every pain' stays close
    to the singular noun with distributive πάντα and preserves the bodily-afflictive
    context of martyrdom in this chapter. 'All suffering' is possible but less concrete.
- source_word: ὑπομένειν
  chosen: to endure
  alternatives:
  - to bear up under
  - to persevere through
  lexicon: BDAG
  rationale: A standard rendering for steadfastly remaining under suffering. 'Endure'
    is idiomatic, concise, and matches the moral exhortation of the verse.
- source_word: διὰ τὸν θεόν
  chosen: for the sake of God
  alternatives:
  - because of God
  - for God
  lexicon: BDAG
  rationale: The preposition with accusative here expresses motive or cause in a devotional
    sense. 'For the sake of God' communicates suffering borne out of loyalty to God
    more clearly than the bare 'for God,' while avoiding ambiguity in 'because of
    God'.
