translation:
  text: But the young men, who were about to be tortured, said none of these things,
    nor did they even think them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'nor did they even entertain such thoughts.' The Greek verb can mean
      to think on or consider inwardly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Rather
  - Yet
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding context; 'But' is natural
    modern English and preserves the adversative force.
- source_word: τούτων οὐδὲν
  chosen: none of these things
  alternatives:
  - nothing of these things
  - none of this
  lexicon: BDAG
  rationale: A straightforward rendering of the partitive expression, referring back
    to previously mentioned possible words or thoughts.
- source_word: οἱ νεανίαι
  chosen: the young men
  alternatives:
  - the youths
  - the young men
  lexicon: BDAG
  rationale: Refers to the brothers as young males. 'Young men' is clear, natural
    English; 'youths' is possible but slightly less idiomatic here.
- source_word: βασανίζεσθαι μέλλοντες
  chosen: who were about to be tortured
  alternatives:
  - being about to be tortured
  - destined to be tortured
  - about to undergo torture
  lexicon: BDAG
  rationale: The participle with μέλλω indicates impending action. 'Tortured' captures
    the force of βασανίζω in this martyrdom context better than a weaker term like
    'tested' or 'tormented'.
- source_word: εἶπον
  chosen: said
  alternatives:
  - spoke
  - uttered
  lexicon: BDAG
  rationale: Simple past narrative verb; 'said' is the most direct and idiomatic rendering.
- source_word: οὐδὲ ἐνεθυμήθησαν
  chosen: nor did they even think them
  alternatives:
  - nor did they consider them
  - nor did they entertain such thoughts
  - nor did they think of them
  lexicon: BDAG
  rationale: ἐνθυμέομαι can mean to think on, consider, or entertain in the mind.
    The object is implicit from τούτων. 'Nor did they even think them' preserves the
    terse parallelism with 'said none of these things,' though the sense is that they
    did not even entertain such thoughts.
