theological_decisions:
- issue: Interpretation of the difficult phrase ἐὰν ὀργίλως με διαθῆσθε
  chosen_reading: if by your disobedience you provoke me to anger
  alternative_readings:
  - if you deal angrily with me by your disobedience
  - if you dispose me angrily because of your disobedience
  rationale: The Greek wording is somewhat idiomatic and awkward in literal English.
    Given the following clause about being forced to destroy them, the most coherent
    sense is that their disobedience will move the tyrant to anger. This preserves
    the threat without importing extra theology.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
