  text: καὶ μεταδιαιτηθέντες ἐντρυφήσατε ταῖς νεότησιν ὑμῶν. ἐπεὶ ἐὰν ὀργίλως με διαθῆσθε
    διὰ τῆς ἀπειθείας ὑμῶν, ἀναγκάσετέ με ἐπὶ δειναῖς κολάσεσιν ἕνα ἕκαστον ὑμῶν διὰ
    τῶν βασάνων ἀπολέσαι.
