  text: καὶ διὰ τῆς εὐλογιστίας τὴν τυραννίδα αὐτοῦ κατέλυσαν. καίτοι λογισώμεθα·
    εἰ δειλόψυχοί τινες ἦσαν καὶ ἄνανδροι ἐν αὐτοῖς, ποίοις ἂν ἐχρήσαντο λόγοις; οὐχὶ
    τούτοις;
  language: Greek
