theological_decisions:
- issue: Rendering φιλοσοφ- language in 4 Maccabees
  chosen_reading: Preserve explicit philosophical terminology in the main text
  alternative_readings:
  - Use a smoother but less explicit rendering such as 'reasoned with the tyrant'
  rationale: 4 Maccabees intentionally frames Jewish martyrdom through the language
    of reason and philosophy. Preserving the φιλοσοφ- element is important to the
    book's argument and should not be flattened into generic disputation.
