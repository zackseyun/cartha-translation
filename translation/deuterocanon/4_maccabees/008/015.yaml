translation:
  text: But when they heard the inducements and saw the tortures, they not only were
    not afraid, but even reasoned philosophically with the tyrant,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the persuasions' or 'the enticements.' The Greek term refers to attempts
      to win them over before or alongside threats.
    reason: lexical_alternative
  - marker: b
    text: Literally 'terrible things'; in context this refers to the tortures or horrors
      set before them.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'philosophized against the tyrant,' preserving the book's
      emphasis on reasoned philosophical resistance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαγωγὰς
  chosen: the inducements
  alternatives:
  - the persuasions
  - the enticements
  - the appeals
  lexicon: LSJ
  rationale: The noun denotes attempts to lead someone on or win them over. In this
    context of coercion mixed with offers, 'inducements' best captures persuasive
    pressure without narrowing it to purely verbal argument or sensual temptation.
- source_word: δεινά
  chosen: the tortures
  alternatives:
  - the terrible things
  - the horrors
  - the sufferings
  lexicon: LSJ
  rationale: Although literally broad ('terrible things'), the immediate martyrdom
    context points to inflicted sufferings threatened or displayed by the tyrant.
    'Tortures' makes the concrete sense clear in natural English.
- source_word: οὐ μόνον οὐκ ἐφοβήθησαν
  chosen: they not only were not afraid
  alternatives:
  - they not only did not fear
  - they were not merely unafraid
  lexicon: BDAG
  rationale: This preserves the emphatic double structure of the Greek while remaining
    readable. 'Were not afraid' is idiomatic English for the aorist passive/deponent
    sense here.
- source_word: ἀντεφιλοσόφησαν
  chosen: argued philosophy against
  alternatives:
  - reasoned against
  - philosophized against
  - countered with reason against
  lexicon: LSJ
  rationale: The rare compound explicitly contains the idea of philosophizing in response.
    A plain 'argued against' would lose the book's recurring emphasis on reasoned
    philosophical virtue; 'argued philosophy against' preserves that conceptual texture,
    though somewhat marked in English.
- source_word: τῷ τυράννῳ
  chosen: the tyrant
  alternatives:
  - the king
  - the despot
  lexicon: BDAG
  rationale: The Greek specifically says 'tyrant,' not merely 'king.' Retaining it
    preserves the author's moral evaluation of the ruler.
