id: 4MA.8.15
reference: 4 Maccabees 8:15
source:
  edition: lxx-swete-1909
  text: Οἱ δὲ ἀκούσαντες ἐπαγωγὰς καὶ ὁρῶντες δεινά, οὐ μόνον οὐκ ἐφοβήθησαν, ἀλλὰ
    καὶ ἀντεφιλοσόφησαν τῷ τυράννῳ,
  language: Greek
  pages:
  - 752
