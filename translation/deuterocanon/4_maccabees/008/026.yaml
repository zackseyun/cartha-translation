theological_decisions:
- issue: Characterization of the brothers' resolve by the tyrant's speech
  chosen_reading: Render the language as hostile rhetoric ('stubborn rivalry,' 'deadly
    endurance') rather than as narrator-approved virtue terms.
  alternative_readings:
  - Translate more positively as 'zeal' or 'courage'
  rationale: In context this is the king's attempt to shame the brothers into compliance.
    The translation should preserve his negative framing rather than importing the
    book's broader admiration for martyr endurance.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
