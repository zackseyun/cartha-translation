translation:
  text: Why has such stubborn rivalry been instilled in us, and why does deadly endurance
    please us, when it is possible to live in tranquility if we obey the king, after
    becoming afraid of the tortures that lead to death?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek opening is syntactically difficult in Swete's witness; the sense
      is that quiet life was available if they gave way out of fear of the death-dealing
      tortures.
    reason: textual_variant
lexical_decisions:
- source_word: πόθεν
  chosen: Why
  alternatives:
  - From where
  - How is it that
  lexicon: LSJ
  rationale: Introduces a rhetorical question about origin/cause. 'Why' gives natural
    English while preserving the causal force of the Greek.
- source_word: ἡ τοσαύτη ἐντέτηκεν φιλονεικία
  chosen: has such stubborn rivalry been instilled in us
  alternatives:
  - has such contentiousness been implanted in us
  - has such love of strife been melted into us
  lexicon: LSJ
  rationale: φιλονεικία denotes contentiousness or love of strife; in context the
    speaker criticizes the brothers' defiant resolve. ἐντέτηκεν literally suggests
    something infused or melted in; 'been instilled in us' conveys an inwardly fixed
    disposition in readable English.
- source_word: ἡ θανατηφόρος ... καρτερία
  chosen: deadly endurance
  alternatives:
  - death-bringing steadfastness
  - fatal courage
  - endurance unto death
  lexicon: LSJ
  rationale: καρτερία is endurance/steadfastness; θανατηφόρος means death-bringing
    or deadly. 'Deadly endurance' preserves the speaker's hostile characterization
    without overinterpreting whether it means causing death or leading to death.
- source_word: ἀρέσκει
  chosen: please us
  alternatives:
  - is pleasing
  - appeals to us
  lexicon: LSJ
  rationale: The singular verb with καρτερία yields the sense that this endurance
    is pleasing/attractive. 'Please us' is idiomatic and keeps the personal force.
- source_word: παρὸν
  chosen: when it is possible
  alternatives:
  - since it is possible
  - though it is open to us
  lexicon: LSJ
  rationale: The participle conveys availability or possibility. 'When it is possible'
    fits the rhetorical contrast in the sentence.
- source_word: μετὰ ἀταραξίας ζῆν
  chosen: to live in tranquility
  alternatives:
  - to live undisturbed
  - to live in peace
  - to live without trouble
  lexicon: LSJ
  rationale: ἀταραξία denotes calmness, freedom from disturbance. 'Tranquility' preserves
    the philosophical/moral tone better than the flatter 'peace'.
- source_word: τῷ βασιλεῖ πεισθέντας
  chosen: if we obey the king
  alternatives:
  - by being persuaded by the king
  - after yielding to the king
  lexicon: LSJ
  rationale: πεισθέντας can mean being persuaded or obeying, and with a ruler the
    practical sense is compliance. 'If we obey the king' makes the implied condition
    clear in English.
- source_word: θανατοῖ φοβηθέντας τὰ βασανιστήρια
  chosen: after becoming afraid of the tortures that lead to death
  alternatives:
  - fearing the deathly tortures
  - having been frightened by the tortures unto death
  - afraid of the deadly torments
  lexicon: LSJ
  rationale: The opening phrase is textually awkward in Swete's line division, but
    the sense is that one could live quietly by yielding out of fear of the tortures
    associated with death. 'that lead to death' reflects θανατοῖ/θανατηφόρος-type
    deathward force without forcing a more specific reconstruction than the source
    warrants.
