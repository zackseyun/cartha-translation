  text: θανατοῖ φοβηθέντας τὰ βασανιστήρια. πόθεν ἡμῖν ἡ τοσαύτη ἐντέτηκεν φιλονεικία,
    καὶ ἡ θανατηφόρος ἀρέσκει καρτερία, παρὸν μετὰ ἀταραξίας ζῆν τῷ βασιλεῖ πεισθέντας;
