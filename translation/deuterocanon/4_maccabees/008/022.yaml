translation:
  text: But divine justice will also pardon us, since we were compelled and became
    afraid of the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the divine judgment will also forgive us' or 'divine punishment will
      spare us.' The Greek δίκη can mean justice, judgment, or penalty.
    reason: lexical_alternative
lexical_decisions:
- source_word: συγγνώσεται
  chosen: will pardon
  alternatives:
  - will forgive
  - will excuse
  - will show indulgence
  lexicon: LSJ
  rationale: Future middle of συγγιγνώσκω here carries the sense of granting pardon
    or making allowance. 'Will pardon' fits the personal object ἡμῖν and the forensic-moral
    context with θεία δίκη better than the weaker 'will excuse,' while still allowing
    the nuance of leniency.
- source_word: ἡ θεία δίκη
  chosen: divine justice
  alternatives:
  - the divine judgment
  - divine punishment
  - the justice of God
  lexicon: LSJ
  rationale: δίκη can denote justice, judgment, or penalty. In this context it is
    personified as something that can pardon, so 'divine justice' preserves both the
    abstract moral force and the personified sense without over-specifying punitive
    judgment.
- source_word: διʼ ἀνάγκην
  chosen: since we were compelled
  alternatives:
  - because of necessity
  - under compulsion
  - by necessity
  lexicon: LSJ
  rationale: The phrase explains the grounds on which pardon is expected. Rendering
    it verbally in English ('since we were compelled') makes the causal force natural
    and connects clearly with the participle that follows.
- source_word: τὸν βασιλέα
  chosen: the king
  alternatives:
  - the ruler
  lexicon: LSJ
  rationale: βασιλεύς straightforwardly means 'king'; no contextual reason warrants
    a broader political term.
- source_word: φοβηθεῖσιν
  chosen: became afraid
  alternatives:
  - feared
  - having been frightened of
  lexicon: LSJ
  rationale: Aorist passive participle of φοβέω/φοβέομαι here describes their having
    been frightened by the king. 'Became afraid' captures the ingressive sense and
    reads naturally with the causal phrase.
