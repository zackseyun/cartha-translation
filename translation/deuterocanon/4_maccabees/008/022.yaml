id: 4MA.8.22
reference: 4 Maccabees 8:22
source:
  edition: lxx-swete-1909
  text: συγγνώσεται δὲ ἡμῖν καὶ ἡ θεία δίκη διʼ ἀνάγκην τὸν βασιλέα φοβηθεῖσιν.
  language: Greek
