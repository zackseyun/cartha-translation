theological_decisions:
- issue: Whether δίκη should be rendered as punitive 'judgment/punishment' or broader
    'justice' in a statement about divine pardon
  chosen_reading: divine justice
  alternative_readings:
  - the divine judgment
  - divine punishment
  rationale: Because the clause speaks of pardon toward persons acting under compulsion,
    a broader moral-judicial sense best fits the logic. 'Divine justice' preserves
    the theological tension that God's justice can take circumstances into account,
    without importing a narrower doctrine of punishment alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
