translation:
  text: And I pity your beauty. Will you not consider this—that nothing lies before
    you, if you disobey me, except to die amid tortures?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'except to die with tortures'; the phrase means death accompanied
      by torture, hence 'to die amid tortures.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐμορφίας
  chosen: beauty
  alternatives:
  - handsomeness
  - good looks
  - fine form
  lexicon: LSJ
  rationale: The noun denotes physical attractiveness or comeliness. 'Beauty' is the
    most natural modern English rendering and fits the tyrant's appeal to the brothers'
    youthful appearance.
- source_word: οἰκτείρομαι
  chosen: I pity
  alternatives:
  - I feel compassion for
  - I have pity on
  lexicon: BDAG
  rationale: The verb expresses pity or compassion. 'I pity' is concise and preserves
    the speaker's manipulative tone without overexpanding the wording.
- source_word: διαλογιεῖσθε
  chosen: will you not consider
  alternatives:
  - will you not reason
  - will you not reflect
  - do you not think
  lexicon: BDAG
  rationale: The verb can mean to think through, reason, or consider. In this rhetorical
    question, 'consider' communicates reflective calculation in idiomatic English.
- source_word: ἀπειθήσασιν
  chosen: if you disobey me
  alternatives:
  - for those who disobey
  - if you refuse to obey
  - if you are disobedient
  lexicon: BDAG
  rationale: The participle means to disobey or refuse compliance. Rendering it conditionally
    in English fits the rhetorical structure addressed directly to the brothers. 'Me'
    is supplied from context, since the speaker is threatening them with consequences
    for refusing his command.
- source_word: ἀπόκειται
  chosen: lies before you
  alternatives:
  - is reserved
  - awaits
  - is laid up
  lexicon: BDAG
  rationale: The verb literally means 'is laid away/reserved.' In this threat context,
    'lies before you' preserves the sense of an appointed outcome without sounding
    overly wooden.
- source_word: στρεβλῶν
  chosen: tortures
  alternatives:
  - rack-torments
  - instruments of torture
  - twistings
  lexicon: LSJ
  rationale: The plural refers to tortures, originally associated with twisting on
    the rack. 'Tortures' is the clearest idiomatic rendering; the more specific etymological
    sense is too narrow for smooth English here.
- source_word: ἀποθανεῖν
  chosen: to die
  alternatives:
  - to be put to death
  lexicon: BDAG
  rationale: The infinitive simply means 'to die.' Because the surrounding phrase
    already specifies tortures, 'to die' is sufficient and avoids unnecessary expansion.
