id: 4MA.8.11
reference: 4 Maccabees 8:11
source:
  edition: lxx-swete-1909
  text: καὶ τῆς εὐμορφίας οἰκτείρομαι. οὐ διαλογιεῖσθε τοῦτο, ὅτι οὐδὲν ὑμῖν ἀπειθήσασιν
    πλὴν τοῦ μετὰ στρεβλῶν ἀποθανεῖν ἀπόκειται;
