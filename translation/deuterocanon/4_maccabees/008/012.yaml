theological_decisions:
- issue: Rendering of μιεροφαγῆσαι in a Jewish martyrdom context
  chosen_reading: to eat defiled food
  alternative_readings:
  - to partake of unclean food
  - to eat polluted food
  rationale: The context is refusal of food forbidden by the law. 'Defiled' preserves
    the contamination concept while avoiding a narrower ritual term that might over-specify
    the Greek. This keeps the moral-religious force without paraphrasing beyond the
    text.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
