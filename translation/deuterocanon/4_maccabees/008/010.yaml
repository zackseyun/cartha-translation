translation:
  text: Therefore have pity on yourselves, on whom even I, your enemy, have pity because
    of your age.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of your youth.' The Greek term can refer more specifically to
      one's stage of life.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατελεήσατε
  chosen: have pity
  alternatives:
  - show mercy to
  - take pity on
  lexicon: LSJ
  rationale: Aorist imperative of κατελεέω/κατελεάω, calling for an act of compassion.
    'Have pity' is natural English and preserves the emotional appeal without overformalizing.
- source_word: ἑαυτούς
  chosen: yourselves
  alternatives:
  - your own selves
  lexicon: LSJ
  rationale: Reflexive pronoun; the sense is self-directed compassion in light of
    the threatened suffering.
- source_word: οὓς
  chosen: on whom
  alternatives:
  - whom
  - you, whom
  lexicon: LSJ
  rationale: The relative pronoun resumes 'yourselves.' Rendering with 'on whom' makes
    explicit the relation to the verb of pity in English.
- source_word: ὁ πολέμιος
  chosen: your enemy
  alternatives:
  - the enemy
  - your adversary
  lexicon: LSJ
  rationale: Literally 'the enemy.' In context the speaker refers to himself in hostile
    relation to them, so 'your enemy' makes the implied relation explicit and idiomatic.
- source_word: ἔγωγε
  chosen: even I
  alternatives:
  - I myself
  - indeed I
  lexicon: LSJ
  rationale: 'Emphatic form of the first-person pronoun. ''Even I'' captures the rhetorical
    force: despite being their enemy, he claims to pity them.'
- source_word: τῆς ἡλικίας
  chosen: because of your age
  alternatives:
  - because of your youth
  - on account of your years
  lexicon: LSJ
  rationale: ἡλικία can denote age/stage of life, sometimes specifically youth. Here
    the appeal concerns their relative youngness in contrast to the suffering before
    them, but 'age' is the broadest defensible rendering from the Greek alone. The
    more specific 'youth' is preserved as an alternative footnote.
