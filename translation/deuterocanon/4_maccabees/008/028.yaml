id: 4MA.8.28
reference: 4 Maccabees 8:28
source:
  edition: lxx-swete-1909
  text: ἦσαν γὰρ περίφρονες τῶν παθῶν, καὶ αὐτοκράτορες τῶν ἀλγηδόνων.
  language: Greek
