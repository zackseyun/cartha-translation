theological_decisions:
- issue: Relation between reason and bodily suffering in the martyrdom context
  chosen_reading: The verse states that the subjects exercised mastery over bodily
    pain and treated sufferings with contempt, without adding a philosophical explanation
    in the translation itself.
  alternative_readings:
  - The verse could be expanded interpretively to stress Stoic-like impassibility
    or reason's triumph over passion.
  rationale: The Greek is concise and descriptive. The translation preserves the text's
    claim about endurance and self-mastery without importing a fuller philosophical
    system not explicitly stated in this line.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
