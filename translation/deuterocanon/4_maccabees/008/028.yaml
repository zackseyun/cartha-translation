translation:
  text: For they were contemptuous of sufferings, and masters of pains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'despisers of sufferings.' The Greek adjective is strong and conveys
      looking down on sufferings rather than merely enduring them.
    reason: lexical_alternative
  - marker: b
    text: Or 'self-rulers over pains' / 'in control of pains.' The Greek emphasizes
      mastery or dominion over pain.
    reason: lexical_alternative
lexical_decisions:
- source_word: περίφρονες
  chosen: contemptuous of
  alternatives:
  - despisers of
  - scornful of
  - indifferent to
  lexicon: LSJ
  rationale: The adjective conveys looking down on or treating something with contempt.
    'Contemptuous of' preserves the strong evaluative force better than the weaker
    'indifferent to.'
- source_word: τῶν παθῶν
  chosen: sufferings
  alternatives:
  - passions
  - afflictions
  - experiences
  lexicon: LSJ
  rationale: In this martyrdom context, πάθη refers to endured sufferings rather than
    inner passions. 'Sufferings' fits the immediate sense and avoids confusion with
    moral 'passions.'
- source_word: αὐτοκράτορες
  chosen: masters of
  alternatives:
  - self-rulers over
  - in control of
  - sovereigns over
  lexicon: LSJ
  rationale: The term denotes having power over or mastery over something. 'Masters
    of' is idiomatic English and preserves the idea of exercised dominion without
    sounding overly wooden.
- source_word: τῶν ἀλγηδόνων
  chosen: pains
  alternatives:
  - torments
  - agonies
  - sufferings
  lexicon: LSJ
  rationale: ἀλγηδών denotes pain, especially bodily pain. 'Pains' is the most direct
    rendering; 'torments' would heighten the expression beyond the lexical baseline,
    while 'agonies' is possible but more interpretive.
