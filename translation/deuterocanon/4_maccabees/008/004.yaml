id: 4MA.8.4
reference: 4 Maccabees 8:4
source:
  edition: lxx-swete-1909
  text: οὓς ἰδὼν ὁ τύραννος καθάπερ ἐν χορῷ περιέχοντας μέσην τὴν μητέρα, ᾔσθετο ἐπʼ
    αὐτοῖς, καὶ τῆς εὐπρεπείας ἐκπλαγεὶς καὶ τῆς εὐγενίας, προσεμειδίασεν αὐτοῖς,
    καὶ πλησίον καλέσας ἔφη
  language: Greek
