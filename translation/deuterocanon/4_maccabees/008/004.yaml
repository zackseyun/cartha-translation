translation:
  text: When the tyrant saw them surrounding their mother in the middle as if in a
    chorus, he was impressed by them, and astonished at their good bearing and noble
    birth, he smiled at them; and calling them near, he said,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as in a dance/chorus,' preserving the image of a coordinated ring around
      their mother.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'he was struck by them' could also be taken more mildly
      as 'he took notice of them,' but the following mention of astonishment favors
      a stronger reaction.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὓς ἰδὼν
  chosen: When [he] saw them
  alternatives:
  - having seen them
  - on seeing them
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered temporally in English here.
    'When he saw them' gives clear narrative flow without over-literal awkwardness.
- source_word: ὁ τύραννος
  chosen: the tyrant
  alternatives:
  - the king
  - the ruler
  lexicon: LSJ
  rationale: τύραννος in this book is a morally charged designation for the persecuting
    ruler, not a neutral royal title. 'Tyrant' preserves the author's evaluative stance.
- source_word: καθάπερ ἐν χορῷ
  chosen: as if in a chorus
  alternatives:
  - as in a dance
  - as if in a ring
  lexicon: LSJ
  rationale: χορός evokes a chorus/dancing ring. 'As if in a chorus' preserves the
    simile and its formal, coordinated imagery without reducing it merely to dancing.
- source_word: περιέχοντας μέσην τὴν μητέρα
  chosen: encircling their mother in the middle
  alternatives:
  - surrounding their mother at the center
  - having their mother in the midst
  lexicon: BDAG
  rationale: The participle indicates the brothers surrounding their mother, with
    μέσην marking her central position. 'Encircling their mother in the middle' keeps
    the spatial picture vivid and close to the Greek.
- source_word: ᾔσθετο ἐπʼ αὐτοῖς
  chosen: he was struck by them
  alternatives:
  - he was impressed by them
  - he took notice of them
  lexicon: LSJ
  rationale: The idiom suggests a strong impression made upon him. 'He was struck
    by them' captures the force better than the weaker 'took notice,' while avoiding
    over-interpretation.
- source_word: τῆς εὐπρεπείας
  chosen: their good bearing
  alternatives:
  - their comeliness
  - their dignity
  - their fine appearance
  lexicon: LSJ
  rationale: εὐπρέπεια can denote seemliness, grace, or dignified appearance. 'Good
    bearing' conveys both appearance and deportment in accessible English.
- source_word: τῆς εὐγενίας
  chosen: noble birth
  alternatives:
  - nobility
  - high birth
  - noble character
  lexicon: LSJ
  rationale: εὐγένεια commonly refers to nobility of birth or lineage. 'Noble birth'
    makes that sense explicit; 'noble character' would shift the emphasis.
- source_word: ἐκπλαγεὶς
  chosen: astonished
  alternatives:
  - amazed
  - struck with wonder
  lexicon: BDAG
  rationale: The participle intensifies his reaction. 'Astonished' fits the elevated
    narrative tone and pairs well with the preceding impression.
- source_word: προσεμειδίασεν αὐτοῖς
  chosen: he smiled at them
  alternatives:
  - he smiled on them
  - he addressed them with a smile
  lexicon: LSJ
  rationale: The verb denotes smiling toward someone. 'Smiled at them' is the most
    straightforward idiomatic rendering.
- source_word: πλησίον καλέσας
  chosen: calling them near
  alternatives:
  - summoning them closer
  - having called them to him
  lexicon: BDAG
  rationale: The participle introduces the next speech action. 'Calling them near'
    is concise and natural.
- source_word: ἔφη
  chosen: he said
  alternatives:
  - he spoke
  - he declared
  lexicon: BDAG
  rationale: Standard narrative speech verb; 'he said' is sufficient and unobtrusive.
