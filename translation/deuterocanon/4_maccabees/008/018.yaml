theological_decisions:
- issue: Moral characterization of ἀπειθία
  chosen_reading: disobedience
  alternative_readings:
  - rebellion
  - defiance
  rationale: The verse condemns refusal to obey in a way that leads to death, but
    the Greek term itself does not require a more theologically loaded gloss than
    'disobedience.' This preserves the text's warning without importing extra doctrinal
    nuance.
