translation:
  text: Why do we delight ourselves in empty schemes and dare a death-bringing disobedience?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vain plans' or 'futile purposes.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'death-bringing disobedience'; alternatively, 'deadly disobedience.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  chosen: Why
  alternatives:
  - What [is it that]
  lexicon: LSJ
  rationale: In this rhetorical question, τί introduces an admonitory 'why?' rather
    than a simple 'what?'; this best fits the rebuking force of the sentence in idiomatic
    English.
- source_word: βουλήμασιν
  chosen: schemes
  alternatives:
  - plans
  - purposes
  - counsels
  lexicon: LSJ
  rationale: βουλήματα can denote plans or resolves. 'Schemes' captures the deliberative
    sense here while fitting the negative evaluation supplied by κενοῖς ('empty, futile').
- source_word: κενοῖς
  chosen: empty
  alternatives:
  - vain
  - futile
  - worthless
  lexicon: LSJ
  rationale: κενοῖς describes the plans as devoid of substance or value. 'Empty' is
    clear modern English and preserves the metaphor without archaic tone.
- source_word: ἑαυτοὺς εὐφραινόμεν
  chosen: we delight ourselves
  alternatives:
  - we cheer ourselves
  - we take pleasure
  lexicon: LSJ
  rationale: The middle-participial expression literally means 'gladdening ourselves.'
    'Delight ourselves' preserves the reflexive sense and the moral irony of taking
    pleasure in what is empty.
- source_word: θανατηφόρον
  chosen: death-bringing
  alternatives:
  - deadly
  - death-bearing
  - fatal
  lexicon: LSJ
  rationale: The compound literally means 'bringing death.' 'Death-bringing' keeps
    the imagery transparent and avoids flattening the participial force into a mere
    adjective like 'deadly.'
- source_word: ἀπειθίαν
  chosen: disobedience
  alternatives:
  - rebellion
  - defiance
  - unbelief
  lexicon: LSJ
  rationale: ἀπειθία commonly denotes refusal to obey. 'Disobedience' is the most
    direct rendering here; 'rebellion' would heighten the tone beyond what the word
    itself requires.
- source_word: τολμῶμεν
  chosen: dare
  alternatives:
  - venture
  - presume
  lexicon: LSJ
  rationale: τολμῶμεν expresses audacious willingness to undertake something. 'Dare'
    is concise and preserves the sense of reckless boldness.
