theological_decisions:
- issue: Nature of the prohibited food in μαιροφαγῆσαι
  chosen_reading: to eat defiling food
  alternative_readings:
  - to eat polluted meat
  - to eat forbidden meat
  rationale: The verse emphasizes ritual/moral defilement under Torah rather than
    merely the physical substance. The chosen rendering preserves that theological
    dimension without importing more detail than the Greek explicitly states.
  doctrine_reference: Translation philosophy §§1, 6
