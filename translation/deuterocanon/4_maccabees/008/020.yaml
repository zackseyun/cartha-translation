translation:
  text: Let us have mercy on our own youth, and let us pity our mother’s old age,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and let us pity the [thing/condition] of our mother,'' with the
      noun left implicit in this witness. ''Old age'' is supplied from the context
      as the most likely sense.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐλεήσωμεν
  chosen: Let us have mercy
  alternatives:
  - Let us spare
  - Let us show compassion
  lexicon: BDAG
  rationale: First person plural hortatory subjunctive from ἐλεέω. 'Have mercy' preserves
    the appeal to compassion more directly than 'spare,' which would import a stronger
    sense of self-preservation not explicit in the verb itself.
- source_word: τὰς ἑαυτῶν ἡλικίας
  chosen: our own youth
  alternatives:
  - our own age
  - our own years of life
  lexicon: LSJ
  rationale: ἡλικία can denote age, stage of life, or youthful prime. In this context
    the speakers are young brothers being urged to consider their own young lives,
    so 'our own youth' best captures the pathos and situational sense. The plural
    reflects each one's own span/stage of life.
- source_word: κατοικτειρήσωμεν
  chosen: let us pity
  alternatives:
  - let us have compassion on
  - let us feel pity for
  lexicon: LSJ
  rationale: Another hortatory subjunctive, from κατοικτείρω, expressing compassionate
    pity. 'Pity' is concise and natural in English, while still matching the emotional
    force of the Greek.
- source_word: τὸ τῆς μητρὸς
  chosen: our mother’s old age
  alternatives:
  - what belongs to our mother
  - our mother's condition
  - our mother's lot
  lexicon: LSJ
  rationale: As transmitted in Swete, the phrase is elliptical and lacks an explicit
    noun after the article. In context, the appeal is to compassion for the mother's
    condition in relation to her sons' deaths; 'our mother's old age' supplies the
    most plausible implied sense from the surrounding discourse and yields coherent
    English. This is a contextually inferred completion rather than a mechanically
    literal rendering, so the uncertainty is preserved in a footnote.
