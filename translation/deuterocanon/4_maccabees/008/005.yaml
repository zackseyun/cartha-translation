theological_decisions:
- issue: Rendering ἀδελφῶν in a male sibling context
  chosen_reading: brothers
  alternative_readings:
  - siblings
  rationale: The context is explicitly seven sons/brothers; the masculine plural is
    not generic here. This follows the project's gender-accurate policy.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Handling the incomplete clause at verse end
  chosen_reading: retain the unfinished sense with a dash
  alternative_readings:
  - smooth into a complete English sentence
  rationale: The Zone 1 text ends with ἀλλὰ καὶ, indicating continuation into the
    next verse. The translation should preserve that incompleteness rather than supply
    unstated content.
  doctrine_reference: PHILOSOPHY.md transparency principles
