  text: οὐ φοβησόμεθα, ἄνδρες ἀδελφοί, τὰ βασανιστήρια, καὶ λογιούμεθα τὰς τῶν βασάνων
    ἀπειλάς, καὶ φεύξομεν τὴν κενοδοξίαν ταύτην καὶ ὀλεθροφόρον ἀλαζονίαν;
  language: Greek
