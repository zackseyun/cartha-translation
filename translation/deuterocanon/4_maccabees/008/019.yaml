theological_decisions:
- issue: Rhetorical question spanning three coordinated verbs
  chosen_reading: Render the whole clause as a rhetorical question expecting a negative
    answer to cowardice and a positive answer to rejecting vain pride
  alternative_readings:
  - 'Convert to a declarative exhortation: ''We will not fear... nor count... but
    will flee...'''
  rationale: The Greek punctuation and syntax support a rhetorical question. Preserving
    it maintains the emotional force of the speaker's appeal and avoids smoothing
    the rhetoric into a simple statement.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gendered vocative ἄνδρες ἀδελφοί
  chosen_reading: Use 'brothers' in the main text
  alternative_readings:
  - brothers, men
  - siblings
  rationale: The address is explicitly masculine and directed to brothers in the narrative
    context. 'Siblings' would erase the source's gendered wording; 'brothers' is natural
    English and faithful to the context.
  doctrine_reference: Translation philosophy §4
