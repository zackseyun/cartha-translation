id: 4MA.8.14
reference: 4 Maccabees 8:14
source:
  edition: lxx-swete-1909
  text: προέθεσαν, ὑπολαβὼν δὲ ὁ τύραννος ἔφη Μειράκια, φοβήθητε, καὶ ἣν σέβεσθε δίκην,
    ἵλεως ὑμῖν ἔσται διʼ ἀνάγκην παρανομήσασιν.
  language: Greek
