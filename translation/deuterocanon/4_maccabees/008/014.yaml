theological_decisions:
- issue: Sense of δίκη in a morally charged appeal
  chosen_reading: Rendered as 'justice' rather than 'penalty' or 'vengeance.'
  alternative_readings:
  - the penalty you respect
  - the vengeance you fear
  rationale: The tyrant argues that the moral order or justice the youths acknowledge
    will show leniency if they sin under coercion. Because σέβεσθε suggests reverence,
    not mere fear of punishment, 'justice' better preserves the conceptual force without
    importing a specific doctrinal system.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
