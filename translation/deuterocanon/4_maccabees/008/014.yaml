translation:
  text: But the tyrant interrupted and said, “Young men, be afraid, and the justice
    you revere will be merciful to you if, under compulsion, you break the law.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the penalty/judgment you revere will be favorable to you.' The Greek
      δίκη can denote justice, judgment, or penalty.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπολαβών
  chosen: interrupted
  alternatives:
  - took up the word
  - responded
  lexicon: LSJ
  rationale: In narrative dialogue, ὑπολαμβάνω commonly introduces a speaker taking
    up or cutting in on prior speech. 'Interrupted' fits the immediate context after
    the brothers' prior resolve and preserves the adversative force better than the
    flatter 'responded'.
- source_word: τύραννος
  chosen: tyrant
  alternatives:
  - king
  - ruler
  lexicon: LSJ
  rationale: The term is evaluative, not neutral. 'Tyrant' preserves the negative
    moral characterization standard in 4 Maccabees.
- source_word: Μειράκια
  chosen: Young men
  alternatives:
  - boys
  - lads
  - youths
  lexicon: LSJ
  rationale: The vocative addresses the brothers as youths. 'Young men' is natural
    modern English and avoids the overly juvenile sense of 'boys' while preserving
    their relative youth.
- source_word: φοβήθητε
  chosen: be afraid
  alternatives:
  - fear
  - be fearful
  lexicon: LSJ
  rationale: Aorist passive/deponent imperative with direct exhortational force. 'Be
    afraid' is idiomatic and direct in English.
- source_word: δίκην
  chosen: justice
  alternatives:
  - penalty
  - vengeance
  - judgment
  lexicon: LSJ
  rationale: Although δίκη can mean penalty or justice, the phrase ἣν σέβεσθε ('which
    you revere') points to a principle or divine/moral justice rather than merely
    a punishment. 'Justice' best fits the object of reverence in context.
- source_word: σέβεσθε
  chosen: you revere
  alternatives:
  - you worship
  - you honor
  lexicon: LSJ
  rationale: The verb denotes reverence or pious regard. 'Revere' preserves the religious-moral
    tone without overstating it as formal worship.
- source_word: ἵλεως
  chosen: merciful
  alternatives:
  - gracious
  - favorable
  - propitious
  lexicon: LSJ
  rationale: The adjective conveys being favorably disposed. 'Merciful' is clear modern
    English and suits the tyrant's appeal that justice will not hold their compelled
    transgression against them.
- source_word: διʼ ἀνάγκην
  chosen: under compulsion
  alternatives:
  - by necessity
  - because of force
  lexicon: LSJ
  rationale: The phrase explains the mitigating circumstance for the unlawful act.
    'Under compulsion' is idiomatic and captures external coercion.
- source_word: παρανομήσασιν
  chosen: you break the law
  alternatives:
  - you transgress
  - you act unlawfully
  lexicon: LSJ
  rationale: From παρανομέω, to act contrary to law. 'Break the law' is natural English
    and preserves the legal-moral sense. The participle is rendered with a finite
    clause after 'if' for readable English.
