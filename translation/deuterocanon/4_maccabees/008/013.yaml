theological_decisions:
- issue: Rhetorically charged designation of the ruler as τύραννος
  chosen_reading: the tyrant
  alternative_readings:
  - the king
  - the ruler
  rationale: The book's moral framing depends on the oppressive character of Antiochus;
    retaining 'tyrant' preserves the author's evaluative language rather than neutralizing
    it.
  doctrine_reference: Translation philosophy §1, §6
