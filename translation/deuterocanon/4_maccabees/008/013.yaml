id: 4MA.8.13
reference: 4 Maccabees 8:13
source:
  edition: lxx-swete-1909
  text: ὡς δὲ τροχούς τε καὶ ἀρθρενβόλους στρεβλωτήριά τε καὶ τροχαντῆρας καὶ καταπέλτας
    καὶ λέβητας, τήγανά τε καὶ δακτυλήθρας, καὶ χεῖρας σιδηρᾶς καὶ σφῆνας καὶ τὰ ζώπυρα
    τοῦ πυρὸς οἱ δορυφόροι προέθεσαν, ὑπολαβὼν δὲ ὁ τύραννος ἔφη
  language: Greek
  pages:
  - 752
  - 764
