translation:
  text: Then, when the bodyguards set out wheels, joint-rackers, stretching-machines,
    clawing hooks, catapults, cauldrons, frying pans, thumbscrews, iron hands, wedges,
    and the live coals of the fire, the tyrant took up the matter and said,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Several instrument names in this verse are rare or technical, so some renderings
      are approximate. Alternatives include 'limb-breakers' for 'joint-rackers,' 'racks'
      for 'stretching-machines,' and 'finger-presses' for 'thumbscrews.'
    reason: lexical_alternative
  - marker: b
    text: The Greek text reads 'catapults,' an unusual item in this list; the translation
      preserves the source wording rather than replacing it with a conjectured torture
      instrument.
    reason: alternative_reading
lexical_decisions:
- source_word: τροχούς
  chosen: wheels
  alternatives:
  - racks
  - wheels for torture
  lexicon: LSJ
  rationale: The basic sense is 'wheels.' In this torture-instrument list, the referent
    is likely torture wheels, but the noun itself is simply 'wheels,' so the translation
    keeps the concrete term without over-specifying beyond the Greek.
- source_word: ἀρθρενβόλους
  chosen: joint-rackers
  alternatives:
  - limb-breakers
  - joint-dislocators
  lexicon: LSJ
  rationale: A rare compound referring to devices affecting the joints/limbs. 'Joint-rackers'
    communicates the likely torture function while staying close to the compound's
    sense.
- source_word: στρεβλωτήριά
  chosen: stretching-machines
  alternatives:
  - racks
  - torture-engines
  lexicon: LSJ
  rationale: From the verb for twisting/torturing; likely instruments for stretching
    or wrenching the body. 'Stretching-machines' is more transparent to modern readers
    than the traditional but narrower 'racks.'
- source_word: τροχαντῆρας
  chosen: clawing hooks
  alternatives:
  - hooks
  - pincers
  lexicon: LSJ
  rationale: The term denotes hooked instruments used in torture. 'Clawing hooks'
    conveys both shape and violent function without claiming a more precise identification
    than the source allows.
- source_word: καταπέλτας
  chosen: catapults
  alternatives:
  - projectors
  - engines
  lexicon: LSJ
  rationale: The ordinary meaning is 'catapults.' Although unusual in a torture list,
    the source text reads this plainly, so the translation preserves it rather than
    normalizing to a different instrument.
- source_word: λέβητας
  chosen: cauldrons
  alternatives:
  - kettles
  - boilers
  lexicon: LSJ
  rationale: A large metal vessel for boiling. 'Cauldrons' fits the context of heated
    torture implements and is idiomatic English.
- source_word: τήγανά
  chosen: frying pans
  alternatives:
  - pans
  - griddles
  lexicon: LSJ
  rationale: The noun denotes pans used for heating/cooking. 'Frying pans' is the
    clearest modern equivalent.
- source_word: δακτυλήθρας
  chosen: thumbscrews
  alternatives:
  - finger-racks
  - finger-presses
  lexicon: LSJ
  rationale: The word is related to fingers/digits and in context refers to an instrument
    for crushing or constraining them. 'Thumbscrews' is an established English rendering
    for this kind of device, though not a strictly literal gloss.
- source_word: χεῖρας σιδηρᾶς
  chosen: iron hands
  alternatives:
  - iron claws
  - iron grips
  lexicon: LSJ
  rationale: Literally 'iron hands.' The phrase likely refers to grasping implements,
    but the translation retains the vivid literal image.
- source_word: σφῆνας
  chosen: wedges
  alternatives:
  - stakes
  - splinters
  lexicon: LSJ
  rationale: The normal sense is 'wedges.' In torture context these are likely wedges
    driven into the body or apparatus, but the simple lexical value is preserved.
- source_word: τὰ ζώπυρα τοῦ πυρός
  chosen: the live coals of the fire
  alternatives:
  - the glowing embers of the fire
  - the rekindled firebrands
  lexicon: LSJ
  rationale: This phrase refers to burning coals/embers. 'Live coals of the fire'
    preserves the vividness and pleonastic force of the Greek.
- source_word: οἱ δορυφόροι
  chosen: the bodyguards
  alternatives:
  - the guards
  - the spearmen
  lexicon: LSJ
  rationale: Though literally 'spear-bearers,' in royal context it denotes the tyrant's
    guards or bodyguards. 'Bodyguards' best conveys the role in natural English.
- source_word: προέθεσαν
  chosen: set out
  alternatives:
  - placed before them
  - brought forward
  lexicon: LSJ
  rationale: The verb means to place before or set out. 'Set out' fits the scene of
    arranging instruments for display and use.
- source_word: ὑπολαβὼν
  chosen: took up the matter
  alternatives:
  - responding
  - interrupting
  - taking up the speech
  lexicon: LSJ
  rationale: The participle can mean to take up in reply or resume speaking. Here
    it introduces the tyrant's next speech after the instruments are displayed; 'took
    up the matter' captures that transition idiomatically.
- source_word: ὁ τύραννος
  chosen: the tyrant
  alternatives:
  - the king
  - the ruler
  lexicon: LSJ
  rationale: The text explicitly uses 'tyrant,' a morally charged designation important
    to the rhetoric of 4 Maccabees, so it should not be softened.
