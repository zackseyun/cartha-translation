id: 4MA.8.29
reference: 4 Maccabees 8:29
source:
  edition: lxx-swete-1909
  text: ὥστε ἅμα τῷ παύσασθαι τὸν τύραννον συμβουλεύοντα αὐτοῖς μιεροφαγῆσαι, πάντες
    διὰ μιᾶς φωνῆς ὁμοῦ, ὥσπερ ἀπὸ τῆς αὐτῆς ψυχῆς, εἶπον
  language: Greek
  pages:
  - 752
  - 764
  - 765
  - 766
  - 767
  - 768
  - 769
  - 786
  - 787
  - 788
  confidence: high
  validation: major_mismatch
translation:
  text: So when the tyrant stopped urging them to eat defiling food, they all together,
    with one voice, as if from the same soul, said,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to eat unclean food' or 'to eat polluted food.' The Greek term refers
      to food whose consumption would bring religious defilement.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'as if from the same soul,' expressing complete unity of resolve.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: So
  alternatives:
  - therefore
  - thus
  - consequently
  lexicon: LSJ
  rationale: Introduces the result or ensuing action from the prior scene. 'So' gives
    natural English while preserving the inferential force.
- source_word: ἅμα τῷ παύσασθαι
  chosen: when ... stopped
  alternatives:
  - as soon as ... ceased
  - at the same time as ... stopped
  lexicon: LSJ
  rationale: The construction marks contemporaneous time with an infinitive, here
    best rendered idiomatically as 'when ... stopped' rather than a more wooden expression.
- source_word: τὸν τύραννον
  chosen: the tyrant
  alternatives:
  - the king
  - the ruler
  lexicon: LSJ
  rationale: τύραννος is explicitly pejorative in this book's rhetoric; 'the tyrant'
    preserves the moral-political force better than a neutral title.
- source_word: συμβουλεύοντα αὐτοῖς
  chosen: advising them
  alternatives:
  - counseling them
  - urging them
  lexicon: LSJ
  rationale: The participle describes his act of giving counsel/pressure. 'Advising'
    is close to the lexical sense; the coercive context is already supplied by 'the
    tyrant.'
- source_word: μιεροφαγῆσαι
  chosen: to eat defiling food
  alternatives:
  - to eat polluted food
  - to eat unclean food
  - to commit sacrilegious eating
  lexicon: LSJ
  rationale: The rare compound conveys eating what is religiously defiling/profane.
    Rendering it as 'eat defiling food' communicates the cultic impurity involved
    without over-specifying the object beyond the Greek.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all of them
  lexicon: LSJ
  rationale: Straightforward collective subject; 'they all' is natural English.
- source_word: διὰ μιᾶς φωνῆς
  chosen: with one voice
  alternatives:
  - in one voice
  - through one voice
  lexicon: LSJ
  rationale: Idiomatic expression for unified speech; 'with one voice' is the standard
    natural equivalent.
- source_word: ὁμοῦ
  chosen: together
  alternatives:
  - at once
  - simultaneously
  lexicon: LSJ
  rationale: Emphasizes their united action. 'Together' works well alongside 'with
    one voice' without sounding overly technical.
- source_word: ὥσπερ ἀπὸ τῆς αὐτῆς ψυχῆς
  chosen: as if from the same soul
  alternatives:
  - as if from one soul
  - as if from the same mind
  - as if from one life
  lexicon: LSJ
  rationale: ψυχή here denotes the inner life/self animating unified resolve. 'Soul'
    preserves the vivid anthropological imagery better than the flatter 'mind.'
- source_word: εἶπον
  chosen: said
  alternatives:
  - spoke
  lexicon: LSJ
  rationale: Simple narrative verb introducing the direct speech that follows in the
    next verse.
