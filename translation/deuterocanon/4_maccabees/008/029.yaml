theological_decisions:
- issue: Cultic force of μιεροφαγῆσαι
  chosen_reading: to eat defiling food
  alternative_readings:
  - to eat unclean food
  - to eat polluted food
  rationale: The term points to food that would religiously defile the speakers under
    the law. 'Defiling' preserves the theological/cultic dimension without importing
    later technical terminology not explicit in the verse.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic'
- issue: Anthropological nuance of ψυχή
  chosen_reading: as if from the same soul
  alternative_readings:
  - as if from the same mind
  rationale: The phrase highlights profound unity of inner resolve. Retaining 'soul'
    preserves the text's theological and rhetorical weight rather than reducing it
    to mere cognition.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English'
