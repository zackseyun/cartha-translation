lexical_decisions:
- source_word: οὐδὲ
  chosen: Not even
  alternatives:
  - nor
  - not even ... either
  lexicon: LSJ
  rationale: οὐδὲ adds a further negative element with emphatic force; 'Not even'
    best captures the climactic negation in English.
- source_word: αὐτὸς
  chosen: itself
  alternatives:
  - it too
  - the very
  lexicon: LSJ
  rationale: With ὁ νόμος, αὐτὸς is intensive, stressing the law in its own right.
    'Itself' preserves that emphasis naturally.
- source_word: ὁ νόμος
  chosen: the law
  alternatives:
  - Law
  lexicon: LSJ
  rationale: The phrase straightforwardly denotes 'the law.' Lowercase is preferred
    here because the surviving fragment alone does not require a titular capitalization
    in English.
- source_word: ἑκουσίως
  chosen: willingly
  alternatives:
  - voluntarily
  - of our own accord
  lexicon: LSJ
  rationale: ἑκουσίως means 'voluntarily, willingly.' 'Willingly' is concise and idiomatic,
    though the syntax of the fragment leaves its exact attachment somewhat uncertain.
- source_word: ἡμᾶς
  chosen: us
  lexicon: LSJ
  rationale: Direct object pronoun, plainly 'us.'
