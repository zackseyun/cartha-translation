  text: ταῦτα διαταξαμένου τοῦ τυράννου, παρῆσαν ἀγόμενοι μετὰ γεραιᾶς μητρὸς ἑπτὰ
    ἀδελφοί, καλοί τε καὶ αἰδήμονες καὶ γενναῖοι καὶ ἐν παντὶ χαρίεντες.
