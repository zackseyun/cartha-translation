translation:
  text: When the tyrant had given these orders, seven brothers were brought in with
    their aged mother, handsome and modest and noble and gracious in every way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appeared while being led in'; the Greek more literally combines their
      arrival with the fact that they were being escorted under compulsion.
    reason: lexical_alternative
  - marker: b
    text: Or 'charming in every respect' for 'gracious in every way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα διαταξαμένου
  chosen: had given these orders
  alternatives:
  - had commanded these things
  - had issued these instructions
  lexicon: LSJ
  rationale: The genitive absolute marks prior action by the tyrant. διατάσσω can
    mean command, order, or arrange; 'had given these orders' is natural English that
    preserves the authoritative force without sounding wooden.
- source_word: τοῦ τυράννου
  chosen: the tyrant
  alternatives:
  - the king
  - the ruler
  lexicon: LSJ
  rationale: τύραννος is explicitly pejorative in this work's rhetoric; 'the tyrant'
    preserves the moral evaluation present in the Greek better than a neutral political
    title.
- source_word: παρῆσαν ἀγόμενοι
  chosen: were brought in
  alternatives:
  - appeared being led in
  - came forward under escort
  lexicon: LSJ
  rationale: The combination conveys arrival while being led. 'Were brought in' captures
    the passive, coercive sense in idiomatic English better than a more literal but
    awkward rendering.
- source_word: μετὰ γεραιᾶς μητρός
  chosen: with their aged mother
  alternatives:
  - with their elderly mother
  - along with their old mother
  lexicon: LSJ
  rationale: γεραιός denotes advanced age. 'Aged' is dignified and fits the solemn
    tone.
- source_word: ἑπτὰ ἀδελφοί
  chosen: seven brothers
  alternatives:
  - seven siblings
  lexicon: LSJ
  rationale: The Greek is specifically masculine and refers to male siblings; per
    gender-accurate policy, 'brothers' is preferred.
- source_word: καλοί
  chosen: handsome
  alternatives:
  - beautiful
  - fine-looking
  lexicon: LSJ
  rationale: In this personal-description list, καλός most naturally refers to physical
    attractiveness or fine appearance. 'Handsome' fits the masculine plural and the
    context.
- source_word: αἰδήμονες
  chosen: modest
  alternatives:
  - reverent
  - bashful
  - respectable
  lexicon: LSJ
  rationale: The term denotes a sense of shame/modesty and decorum. 'Modest' best
    captures the ethical-social quality in concise modern English.
- source_word: γενναῖοι
  chosen: noble
  alternatives:
  - brave
  - high-minded
  lexicon: LSJ
  rationale: γενναῖος can denote both noble birth and nobility of character, often
    shading into courage. Here, in a virtue list, 'noble' preserves the broader moral
    sense; courage will be displayed in the narrative context.
- source_word: ἐν παντὶ χαρίεντες
  chosen: gracious in every way
  alternatives:
  - charming in every respect
  - winsome in every way
  lexicon: LSJ
  rationale: χαρίεις conveys gracefulness, charm, and attractiveness of manner. 'Gracious
    in every way' preserves both demeanor and breadth signaled by ἐν παντί.
