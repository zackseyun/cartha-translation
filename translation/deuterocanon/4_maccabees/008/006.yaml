theological_decisions:
- issue: Nature of the ruler's offered φιλία
  chosen_reading: Rendered as 'friendship' rather than a more abstract 'favor.'
  alternative_readings:
  - favor
  - goodwill
  rationale: The text presents a personal offer from the ruler tied to obedience.
    'Friendship' preserves the lexical sense of φιλία while allowing readers to hear
    the patronal overtones; the broader political sense is not denied but not substituted
    into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English.'
