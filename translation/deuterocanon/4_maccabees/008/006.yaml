id: 4MA.8.6
reference: 4 Maccabees 8:6
source:
  edition: lxx-swete-1909
  text: παρακαλῶ συνείξαντάς μοι τῆς ἐμῆς ἀπολαῦσαι φιλίας· δύναμιν γὰρ ὥσπερ κολάζειν
    τοὺς ἀπειθοῦντάς μου τοῖς ἐπιτάγμασιν, οὕτως καὶ εὐεργετεῖν τοὺς εὐπειθοῦντάς
    μου.
  language: Greek
  pages:
