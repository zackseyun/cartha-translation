translation:
  text: of the sweet world. Let us not force necessity, nor let us boast over our
    own torture-rack.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let us not compel what is inevitable' or 'Let us not do violence to
      necessity.' The Greek expression is compressed and may refer to not hastening
      the unavoidable ordeal.
    reason: lexical_alternative
  - marker: b
    text: Or 'our own rack.' The Greek στρέβλη refers to an instrument of torture.
    reason: lexical_alternative
lexical_decisions:
- source_word: γλυκέος
  chosen: sweet
  alternatives:
  - pleasant
  - dear
  lexicon: LSJ
  rationale: The adjective literally means 'sweet' and here characterizes the attractiveness
    of worldly life. 'Sweet' preserves the metaphor without over-interpreting it as
    merely emotional ('dear') or flattening it to 'pleasant'.
- source_word: κόσμου
  chosen: world
  alternatives:
  - order
  - adornment
  lexicon: LSJ
  rationale: In this context the phrase refers to worldly life or the present world,
    not 'order' or 'adornment.' 'World' is the most natural English equivalent while
    retaining the moral contrast implied by the speaker.
- source_word: μὴ βιαζώμεθα
  chosen: let us not force
  alternatives:
  - let us not compel
  - let us not do violence to
  lexicon: LSJ
  rationale: The middle/subjunctive exhortation warns against violently pressing what
    is necessary or inevitable. 'Force' is concise and preserves the sense of coercive
    pressure better than a weaker 'compel' in this context.
- source_word: τὴν ἀνάγκην
  chosen: necessity
  alternatives:
  - what is inevitable
  - constraint
  lexicon: LSJ
  rationale: ἀνάγκη commonly denotes necessity, compulsion, or inevitability. 'Necessity'
    keeps the Greek abstraction and fits the rhetorical appeal not to rush or intensify
    the unavoidable suffering/death.
- source_word: μηδὲ κενοδοξήσωμεν
  chosen: nor let us boast
  alternatives:
  - nor let us be vainglorious
  - nor let us glory vainly
  lexicon: LSJ
  rationale: The verb carries the idea of empty boasting or vainglory. 'Boast' is
    idiomatic English; the emptiness component is sufficiently implied by context,
    though preserved in alternatives.
- source_word: ἐπὶ τῇ ἑαυτῶν στρέβλῃ
  chosen: over our own torture-rack
  alternatives:
  - over our own rack
  - because of our own torment
  lexicon: LSJ
  rationale: στρέβλη denotes an instrument of torture, especially the rack. 'Torture-rack'
    makes the referent explicit for modern readers and fits the martyrdom setting
    better than the less transparent 'rack.' The reflexive ἑαυτῶν is retained with
    'our own.'
