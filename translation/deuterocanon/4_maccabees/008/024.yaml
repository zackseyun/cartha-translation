theological_decisions:
- issue: Sense of the exhortation μὴ βιαζώμεθα τὴν ἀνάγκην
  chosen_reading: The speaker urges the brothers not to hasten or intensify the inevitable
    ordeal by their own choice.
  alternative_readings:
  - The speaker means 'let us not resist necessity'
  - The speaker means 'let us not violate what necessity requires'
  rationale: The phrase is somewhat compressed and idiomatic. Given the immediate
    martyrdom context and the following warning against vainglory in torture, the
    most coherent sense is not to force the inevitable situation by rash self-display.
    The English keeps the literal 'force necessity' while allowing this contextual
    sense to remain visible.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
