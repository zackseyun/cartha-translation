theological_decisions:
- issue: Rendering the participle ἀρνησάμενοι in relation to the promise
  chosen_reading: 'Expressed as a conditional clause: ''if you renounce'''
  alternative_readings:
  - '''having renounced'''
  - '''by renouncing'''
  rationale: 'The Greek participle could be rendered more formally, but the sense
    in context is plainly conditional: the promised offices are contingent on apostasy
    from ancestral law. The conditional English makes that relationship explicit without
    adding new content.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering πολιτεία in a Jewish ancestral-law context
  chosen_reading: '''way of life'''
  alternative_readings:
  - '''constitution'''
  - '''commonwealth'''
  - '''citizenship'''
  rationale: The verse concerns abandoning the inherited Jewish order of life, not
    merely a legal charter in abstraction. 'Way of life' preserves the social-religious
    force while remaining readable modern English.
  doctrine_reference: Translation philosophy §6
