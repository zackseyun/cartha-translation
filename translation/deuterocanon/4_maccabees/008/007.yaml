id: 4MA.8.7
reference: 4 Maccabees 8:7
source:
  edition: lxx-swete-1909
  text: πιστεύσατε οὖν, καὶ ἀρχὰς ἐπὶ τῶν ἐμῶν πραγμάτων ἡγεμονικὰς λήμψεσθε, ἀρνησάμενοι
    τὸν πάτριον ὑμῶν τῆς πολιτείας θεσμόν·
