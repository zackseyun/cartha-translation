theological_decisions:
- issue: Nature of the ruler's emotional state in περιπαθὼς
  chosen_reading: emotionally disturbed/agitated rather than specifically wrathful
  alternative_readings:
  - enraged
  - greatly distressed
  rationale: The Greek indicates strong emotion but does not require a single specific
    emotion such as anger. The translation preserves the text's emotional intensity
    without over-interpreting motive.
  doctrine_reference: Preserve theological tension rather than resolve it.
