  text: τότε δὴ σφόδρα περιπαθὼς ἐκέλευσεν ἄλλους ἐκ τῆς ἡλικίας τῶν Ἑβραίων ἀγαγεῖν·
    καὶ εἰ μὲν μηροφαγοῖεν, ἀπολύειν ἀγώντας· εἰ δὲ ἀντιλέγοιεν, πικρότερον βασανίζειν.
  language: Greek
