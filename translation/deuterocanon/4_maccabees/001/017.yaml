theological_decisions:
- issue: Meaning of νόμος in this context
  chosen_reading: law
  alternative_readings:
  - the Law
  rationale: The Greek has τοῦ νόμου without further specification. In 4 Maccabees
    the reference is to the Jewish law/Torah, but rendering it simply as 'the law'
    preserves the Greek wording and avoids over-capitalizing beyond what the text
    itself marks. The context still makes the referent clear.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English.'
