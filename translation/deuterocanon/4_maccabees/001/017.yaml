  text: αὕτη δὴ τοίνυν ἐστὶν ἡ τοῦ νόμου παιδεία, διʼ ἧς τὰ θεῖα σεμνῶς καὶ τὰ ἀνθρώπινα
    συμφερόντως μανθάνομεν.
