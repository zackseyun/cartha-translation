translation:
  text: Wisdom, then, is knowledge of divine and human matters, and of their causes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the causes of these things.' The Greek τούτων points
      back to the divine and human matters just mentioned.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφία
  chosen: Wisdom
  alternatives:
  - wisdom
  lexicon: LSJ
  rationale: Rendered as 'Wisdom' to match the abstract noun directly and preserve
    the verse's definitional tone. Capitalization reflects sentence position rather
    than personification.
- source_word: δὴ τοίνυν
  chosen: then
  alternatives:
  - therefore
  - accordingly
  - so then
  lexicon: LSJ
  rationale: The particle combination marks an inferential transition. 'Then' is concise,
    natural English that preserves the logical flow without sounding overly formal.
- source_word: γνῶσις
  chosen: knowledge
  alternatives:
  - understanding
  - comprehension
  lexicon: LSJ
  rationale: '''Knowledge'' is the most direct equivalent and fits the philosophical
    definition being offered. ''Understanding'' would add an interpretive nuance not
    explicit in the noun itself.'
- source_word: θείων
  chosen: divine
  alternatives:
  - godly
  - heavenly
  - of divine things
  lexicon: LSJ
  rationale: With πραγμάτων, the adjective refers to matters pertaining to the divine
    realm. 'Divine' is idiomatic and sufficiently broad without importing a specifically
    moral sense like 'godly'.
- source_word: ἀνθρωπίνων
  chosen: human
  alternatives:
  - of men
  - human affairs
  lexicon: LSJ
  rationale: Rendered 'human' as the natural counterpart to 'divine.' This avoids
    unnecessarily gendered English while accurately reflecting the adjective's scope.
- source_word: πραγμάτων
  chosen: matters
  alternatives:
  - things
  - affairs
  lexicon: LSJ
  rationale: '''Matters'' best captures the broad philosophical sense here. ''Things''
    is too vague in English, while ''affairs'' can sound more narrowly practical or
    political.'
- source_word: τῶν τούτων αἰτίων
  chosen: their causes
  alternatives:
  - the causes of these things
  - their explanations
  lexicon: LSJ
  rationale: αἰτίων here is best rendered 'causes' in a philosophical sense, and τούτων
    refers back to the divine and human matters just mentioned. 'Their causes' is
    concise and clear in English.
