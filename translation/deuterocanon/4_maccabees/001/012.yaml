id: 4MA.1.12
reference: 4 Maccabees 1:12
source:
  edition: lxx-swete-1909
  text: ἀλλὰ καὶ περὶ τούτου νῦν αὐτίκα δὴ λέγειν ἐξέσται, ἀρξαμένων τῆς ὑποθέσεως,
    ὅπερ εἴωθα ποιεῖν, καὶ οὕτως εἰς τὸν περὶ αὐτῶν τρέψομαι λόγον, δόξαν διδοὺς τῷ
    πανσόφῳ θεῷ.
  language: Greek
  pages:
  - 752
  - 753
  - 754
  - 755
  - 786
  - 787
  - 788
  - 789
  confidence: high
  validation: minor_mismatch
translation:
  text: But even about this it will now be possible to speak at once, beginning with
    the subject, as I am accustomed to do, and thus I will turn to the discourse about
    them, giving glory to the all-wise God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it will now be permitted to speak at once about this'; the Greek ἐξέσται
      can carry a nuance of permission as well as possibility.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'them' may refer to the persons to be discussed in the following
      argument, though 'these matters' is also possible from the immediate wording.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ καὶ
  chosen: But even
  alternatives:
  - But also
  - Yet even
  lexicon: LSJ
  rationale: Retains the connective force and slight emphasis of the transition without
    over-smoothing it.
- source_word: περὶ τούτου
  chosen: about this
  alternatives:
  - concerning this
  - on this matter
  lexicon: LSJ
  rationale: A straightforward rendering of the prepositional phrase; 'about this'
    is natural modern English and keeps the referential link broad.
- source_word: νῦν αὐτίκα δή
  chosen: now ... at once
  alternatives:
  - right now
  - immediately now
  lexicon: LSJ
  rationale: The cluster intensifies immediacy. 'Now ... at once' preserves the rhetorical
    urgency better than collapsing the adverbs into a single English term.
- source_word: λέγειν ἐξέσται
  chosen: it will ... be possible to speak
  alternatives:
  - it will be permitted to speak
  - one may speak
  lexicon: LSJ
  rationale: ἐξέσται can denote possibility or permission. Here the sense is rhetorical
    feasibility within the author's argument structure, so 'it will be possible to
    speak' fits better than a permission nuance.
- source_word: ἀρξαμένων τῆς ὑποθέσεως
  chosen: once I have begun with the subject
  alternatives:
  - after beginning the argument
  - when the theme has been introduced
  lexicon: LSJ
  rationale: The Greek is somewhat compressed and awkward in English if rendered too
    literally. 'Subject' captures ὑπόθεσις as the matter under discussion, and the
    temporal sense is conveyed idiomatically.
- source_word: ὅπερ εἴωθα ποιεῖν
  chosen: as I am accustomed to do
  alternatives:
  - which I usually do
  - as is my custom
  lexicon: LSJ
  rationale: Preserves the author's self-referential aside about his customary method
    in clear English.
- source_word: εἰς τὸν περὶ αὐτῶν τρέψομαι λόγον
  chosen: I will turn to the discourse about them
  alternatives:
  - I will turn to the account concerning them
  - I will direct my discussion to them
  lexicon: LSJ
  rationale: τρέπομαι λόγον suggests turning one's discourse toward a topic. 'Discourse'
    preserves the formal rhetorical register of λόγος in this context.
- source_word: αὐτῶν
  chosen: them
  alternatives:
  - these matters
  - those persons
  lexicon: LSJ
  rationale: The pronoun likely points forward/back to the persons or matters under
    discussion in context. 'Them' preserves the Greek's ambiguity without over-interpreting.
- source_word: δόξαν διδοὺς
  chosen: giving glory
  alternatives:
  - giving honor
  - ascribing glory
  lexicon: LSJ
  rationale: A conventional and accurate rendering for the idiom of attributing glory
    to God.
- source_word: τῷ πανσόφῳ θεῷ
  chosen: to the all-wise God
  alternatives:
  - to God most wise
  - to the supremely wise God
  lexicon: LSJ
  rationale: πανσόφῳ is best represented by 'all-wise,' which is concise and preserves
    the elevated style.
