id: 4MA.1.24
reference: 4 Maccabees 1:24
source:
  edition: lxx-swete-1909
  text: θυμὸς δὲ κοινὸν πάθος ἐστὶν ἡδονῆς καὶ πόνου, ἐὰν ἐννοηθῇ τις ὅτε αὐτῷ περιέπεσεν.
  language: Greek
  pages:
