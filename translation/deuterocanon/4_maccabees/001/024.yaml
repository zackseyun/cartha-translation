  - 788
  - 789
  confidence: high
  validation: agree
translation:
  text: Anger is a passion common to pleasure and pain, if one reflects on the occasion
    when it came upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Anger is a common passion of pleasure and pain, if
      someone considers when it befell him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θυμός
  chosen: anger
  alternatives:
  - wrath
  - passion
  lexicon: LSJ
  rationale: In this philosophical context θυμός denotes the affective state of anger
    rather than a broader faculty like spiritedness. 'Anger' is the clearest modern
    English equivalent; 'wrath' is too elevated, and 'passion' would blur the distinction
    since πάθος also appears in the clause.
- source_word: κοινόν
  chosen: shared
  alternatives:
  - common
  - belonging to both
  lexicon: LSJ
  rationale: κοινόν modifies πάθος and indicates that anger partakes of both pleasure
    and pain. 'Shared' communicates this relation more idiomatically than the wooden
    'common'.
- source_word: πάθος
  chosen: passion
  alternatives:
  - emotion
  - experience
  - affection
  lexicon: LSJ
  rationale: In 4 Maccabees the author uses philosophical terminology for the passions/emotions.
    'Passion' preserves that technical flavor better than the flatter 'emotion,' while
    remaining understandable in English.
- source_word: ἡδονῆς
  chosen: pleasure
  alternatives:
  - delight
  lexicon: LSJ
  rationale: Standard rendering in ethical/philosophical discourse; it pairs naturally
    with πόνου as 'pleasure and pain.'
- source_word: πόνου
  chosen: pain
  alternatives:
  - distress
  - toil
  lexicon: LSJ
  rationale: Here the contrast with ἡδονή points to felt suffering rather than labor,
    so 'pain' is the best fit.
- source_word: ἐὰν ἐννοηθῇ τις
  chosen: if one reflects
  alternatives:
  - if someone considers
  - if it is considered by someone
  lexicon: LSJ
  rationale: The construction is impersonal/generic. 'If one reflects' captures the
    conditional and the mental act of considering without awkward literalism.
- source_word: ὅτε
  chosen: the occasion when
  alternatives:
  - when
  - at the time when
  lexicon: LSJ
  rationale: Used to introduce the circumstance under consideration. Expanding slightly
    to 'the occasion when' helps the English connect the reflection to the onset of
    anger.
- source_word: αὐτῷ περιέπεσεν
  chosen: it came upon him
  alternatives:
  - it befell him
  - he fell into it
  lexicon: LSJ
  rationale: The verb περιπίπτω here conveys something befalling or coming over a
    person. 'It came upon him' is natural English and fits the sense of anger overtaking
    someone.
