theological_decisions:
- issue: Philosophical-anthropological sense of πάθη in relation to λογισμός
  chosen_reading: Render the verse in terms of reason mastering the passions, without
    importing later doctrinal categories such as 'sinful nature.'
  alternative_readings:
  - reason prevails over emotions
  - the mind controls desires
  rationale: The verse is framed in Hellenistic-Jewish moral philosophy. The Greek
    speaks of rational mastery over πάθη; it does not itself specify a later theological
    anthropology. The translation therefore preserves the text's own conceptual world.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
