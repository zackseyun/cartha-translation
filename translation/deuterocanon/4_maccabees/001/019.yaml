id: 4MA.1.19
reference: 4 Maccabees 1:19
source:
  edition: lxx-swete-1909
  text: κυριωτάτη δὲ πάντων ἡ φρόνησις, ἐξ ἧς δὴ τῶν παθῶν ὁ λογισμὸς ἐπικρατεῖ.
  language: Greek
