  - 788
  - 789
  confidence: high
  validation: agree
translation:
  text: But prudence is the most sovereign of all, from which indeed reason gains
    mastery over the passions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prudence is supreme over all.' The Greek superlative κυριωτάτη carries
      the sense of highest authority or dominance.
    reason: lexical_alternative
  - marker: b
    text: Or 'reason prevails over the passions.' The verb can denote prevailing,
      being stronger, or exercising mastery.
    reason: lexical_alternative
lexical_decisions:
- source_word: κυριωτάτη
  chosen: the most sovereign
  alternatives:
  - supreme
  - most authoritative
  - most dominant
  lexicon: LSJ
  rationale: Superlative of κυριος/κυριώτατος language conveying highest rank or lordship.
    'Most sovereign' preserves the ruling nuance more clearly than a flatter 'greatest'
    or merely evaluative 'best.'
- source_word: φρόνησις
  chosen: prudence
  alternatives:
  - practical wisdom
  - understanding
  - good sense
  lexicon: LSJ
  rationale: In this philosophical context φρόνησις denotes rational practical wisdom
    or prudence. 'Prudence' is concise and preserves the ethical-philosophical register
    of the passage.
- source_word: ἐξ ἧς
  chosen: from it
  alternatives:
  - from which
  - out of which
  lexicon: LSJ
  rationale: Refers back to φρόνησις as the source from which reason's mastery proceeds.
    'From it' is natural English while preserving the causal/source relation.
- source_word: λογισμός
  chosen: reason
  alternatives:
  - rational thought
  - reasoning
  - the rational mind
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for rational faculty or reasoned
    judgment. 'Reason' is the most idiomatic and conceptually central rendering in
    this context.
- source_word: ἐπικρατεῖ
  chosen: gains mastery over
  alternatives:
  - prevails over
  - rules over
  - has power over
  lexicon: LSJ
  rationale: The verb expresses prevailing or exercising superior power. 'Gains mastery
    over' communicates active dominance over the passions and fits the argument of
    rational control.
- source_word: πάθη
  chosen: the passions
  alternatives:
  - passions
  - emotions
  - sufferings
  - desires
  lexicon: LSJ
  rationale: In Hellenistic moral discourse πάθη refers to passions or disordered
    emotional impulses, not merely neutral emotions. The article is retained for generic
    class reference in English.
- source_word: δὴ
  chosen: indeed
  alternatives:
  - certainly
  - in fact
  - —
  lexicon: LSJ
  rationale: Particle adds emphasis rather than new content. 'Indeed' lightly preserves
    the rhetorical stress without sounding wooden.
