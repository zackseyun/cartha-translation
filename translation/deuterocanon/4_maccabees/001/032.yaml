id: 4MA.1.32
reference: 4 Maccabees 1:32
source:
  edition: lxx-swete-1909
  text: τῶν δὲ ἐπιθυμιῶν αἱ μὲν εἰσὶν ψυχικαί, αἱ δὲ σωματικαί· καὶ τούτων ἀμφοτέρων
    ὁ λογισμὸς ἐπικρατεῖ φαίνεται.
  language: Greek
  pages:
  - 752
  - 753
  - 754
  - 755
  - 786
  - 787
  - 788
  - 789
  confidence: high
  validation: agree
translation:
  text: Now among desires, some are of the soul and others of the body; and over both
    of these, reason is evidently master.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'reason evidently prevails over both of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμιῶν
  chosen: desires
  alternatives:
  - cravings
  - passions
  - longings
  lexicon: BDAG
  rationale: ἐπιθυμία commonly denotes desire or craving. 'Desires' is broad and natural
    English, fitting the philosophical classification that follows without importing
    an exclusively negative sense.
- source_word: ψυχικαί
  chosen: of the soul
  alternatives:
  - soulish
  - mental
  - psychic
  lexicon: LSJ
  rationale: The adjective contrasts with σωματικαί. 'Of the soul' preserves the anthropological
    distinction in accessible English better than the awkward 'soulish' or the potentially
    misleading 'mental.'
- source_word: σωματικαί
  chosen: of the body
  alternatives:
  - bodily
  - physical
  lexicon: LSJ
  rationale: This is the natural counterpart to ψυχικαί. 'Of the body' keeps the parallel
    structure explicit and readable.
- source_word: λογισμός
  chosen: reason
  alternatives:
  - rational judgment
  - the mind
  - reasoning
  lexicon: LSJ
  rationale: In 4 Maccabees, λογισμός is a key term for rational faculty or reasoned
    judgment. 'Reason' is concise and idiomatic while preserving the book's philosophical
    argument.
- source_word: ἐπικρατεῖ
  chosen: is master
  alternatives:
  - prevails over
  - rules over
  - has control over
  lexicon: LSJ
  rationale: The verb means to be strong over, prevail, or dominate. Rendering it
    as 'is master' captures effective dominance in a compact way and suits the argument
    about reason's governing role.
- source_word: φαίνεται
  chosen: is evidently
  alternatives:
  - appears
  - is seen to be
  - is plainly
  lexicon: LSJ
  rationale: φαίνεται marks what is manifest or apparent from the argument. 'Evidently'
    conveys that inferential force in smooth English better than the more tentative
    'appears'.
