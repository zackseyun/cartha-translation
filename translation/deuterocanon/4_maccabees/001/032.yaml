theological_decisions:
- issue: Anthropological distinction between ψυχικαί and σωματικαί
  chosen_reading: some desires are 'of the soul' and others 'of the body'
  alternative_readings:
  - some are mental and others bodily
  - some are psychic and others physical
  rationale: The verse presents a philosophical classification of desires, not a developed
    doctrinal dualism to be sharpened beyond the Greek. 'Of the soul' / 'of the body'
    preserves the source categories without overinterpreting them.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of λογισμός ἐπικρατεῖ
  chosen_reading: reason is evidently master over both
  alternative_readings:
  - reason evidently prevails over both
  - rational judgment controls both
  rationale: The book argues for the supremacy of disciplined reason over passions
    and appetites. 'Is master' expresses governing superiority without adding later
    theological terminology.
  doctrine_reference: Original-language primacy over translation tradition; readable
    modern English.
