id: 4MA.1.5
reference: 4 Maccabees 1:5
source:
  edition: lxx-swete-1909
  text: πῶς οὖν, ἴσως εἴποιεν ἄν τινες, εἰ τῶν παθῶν ὁ λογισμὸς κρατεῖ, λήθης καὶ
    ἀγνοίας οὐ δεσπόζει; γελοῖον ἐπιχειροῦντες λέγειν.
  language: Greek
  pages:
