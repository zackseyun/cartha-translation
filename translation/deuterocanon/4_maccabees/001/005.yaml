theological_decisions:
- issue: Anthropological-philosophical terminology in 4 Maccabees
  chosen_reading: Render λογισμός as 'reason' and πάθη as 'passions'
  alternative_readings:
  - Render λογισμός as 'mind' or 'rational judgment'
  - Render πάθη as 'emotions'
  rationale: The verse belongs to the book's sustained argument about devout reason
    governing the passions. Using the more philosophically precise pair 'reason'/'passions'
    preserves the conceptual framework without importing later technical theology.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Force of γελοῖον with participial construction
  chosen_reading: 'Apply the ridicule to the unnamed objectors: ''they are being ridiculous'''
  alternative_readings:
  - 'Take it impersonally: ''it is ridiculous to attempt to say this'''
  rationale: The Greek can be represented either impersonally or with the implied
    speakers in view. The chosen rendering makes explicit the likely sense of the
    participle and keeps the polemical tone of the argument.
  doctrine_reference: Translation philosophy §§3, 6
