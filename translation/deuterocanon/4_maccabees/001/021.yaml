translation:
  text: There are also ancient sequences of passions concerning pleasure and pain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There are also ancient series of passions with respect to pleasure and
      pain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παλαιαὶ
  chosen: ancient
  alternatives:
  - old
  - long-standing
  lexicon: LSJ
  rationale: The adjective describes the long-established or ancient character of
    these patterns/series. 'Ancient' fits idiomatic English and preserves the sense
    of longstanding antiquity better than the flatter 'old'.
- source_word: περὶ τὴν ἡδονὴν καὶ τὸν πόνον
  chosen: concerned with pleasure and pain
  alternatives:
  - about pleasure and pain
  - with respect to pleasure and pain
  lexicon: LSJ
  rationale: The preposition περὶ with the accusative here marks reference or sphere.
    'Concerned with' is natural English that keeps the relation without overinterpreting
    it.
- source_word: παθῶν
  chosen: of passions
  alternatives:
  - of emotions
  - of sufferings
  - of affections
  lexicon: LSJ
  rationale: In this philosophical context πάθη refers to passions or emotional impulses
    rather than merely sufferings. 'Passions' best matches the argument of 4 Maccabees
    about reason's mastery over the passions.
- source_word: ἀκολουθίαι
  chosen: sequences
  alternatives:
  - successions
  - series
  - consequences
  lexicon: LSJ
  rationale: The noun denotes following one after another, hence a succession or sequence.
    'Sequences' preserves the ordered sense while remaining readable. 'Consequences'
    would overstate causation, and 'series' is possible but less precise.
