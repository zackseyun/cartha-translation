id: 4MA.1.22
reference: 4 Maccabees 1:22
source:
  edition: lxx-swete-1909
  text: πρὸ μὲν οὖν τῆς ἡδονῆς ἐστιν ἐπιθυμία· μετὰ δὲ τὴν ἡδονήν, χαρά.
  language: Greek
