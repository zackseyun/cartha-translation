translation:
  text: Before pleasure is desire, and after pleasure, joy.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρὸ μὲν οὖν
  chosen: before
  alternatives:
  - then before
  - accordingly before
  lexicon: LSJ
  rationale: πρό with the genitive marks temporal priority; μέν οὖν gives connective
    force in the argument, but in English the sense is best carried smoothly by 'before'
    without overloading the sentence with particles.
- source_word: τῆς ἡδονῆς
  chosen: pleasure
  alternatives:
  - enjoyment
  - delight
  lexicon: LSJ
  rationale: ἡδονή commonly denotes pleasure or gratification. 'Pleasure' is the most
    direct and natural rendering here and fits the author's analysis of passions.
- source_word: ἐστιν ἐπιθυμία
  chosen: desire comes
  alternatives:
  - there is desire
  - desire is
  lexicon: LSJ
  rationale: The clause literally states 'there is desire,' but idiomatic English
    expresses the temporal sequence more clearly with 'desire comes before pleasure.'
    This preserves the sense without paraphrasing beyond the Greek.
- source_word: μετὰ δὲ τὴν ἡδονήν
  chosen: after pleasure
  alternatives:
  - after the pleasure
  - following pleasure
  lexicon: LSJ
  rationale: μετά with the accusative indicates sequence in time. The article is not
    naturally reproduced in English here.
- source_word: χαρά
  chosen: joy
  alternatives:
  - gladness
  - delight
  lexicon: LSJ
  rationale: χαρά is best rendered 'joy.' While 'delight' is possible, using it alongside
    ἡδονή ('pleasure') would blur the distinction the Greek maintains between the
    two terms.
