id: 4MA.1.23
reference: 4 Maccabees 1:23
source:
  edition: lxx-swete-1909
  text: πρὸ δὲ τοῦ πόνου ἐστὶν φόβος· μετὰ δὲ τὸν πόνον, λύπη.
  language: Greek
  pages:
  - 752
  - 753
  - 754
  - 755
  - 786
  - 787
  - 788
  - 789
  confidence: high
  validation: agree
translation:
  text: Before pain there is fear, and after pain, grief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sorrow” for λύπη.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ
  chosen: before
  alternatives:
  - in advance of
  - prior to
  lexicon: LSJ
  rationale: Temporal preposition marking what precedes pain; 'before' is the plain
    and natural English equivalent.
- source_word: πόνου
  chosen: pain
  alternatives:
  - toil
  - suffering
  lexicon: LSJ
  rationale: πόνoς can denote toil or pain, but in this aphoristic sequence with fear
    before and grief after, the experiential sense 'pain' best fits the immediate
    context.
- source_word: φόβος
  chosen: fear
  alternatives:
  - dread
  lexicon: LSJ
  rationale: Standard rendering for φόβος. 'Dread' is possible but stronger and less
    neutral than the Greek requires.
- source_word: μετὰ
  chosen: after
  alternatives:
  - following
  lexicon: LSJ
  rationale: Temporal use with the accusative τὸν πόνον indicates sequence after the
    event/experience.
- source_word: λύπη
  chosen: grief
  alternatives:
  - sorrow
  - distress
  lexicon: LSJ
  rationale: λύπη denotes sorrow or grief. 'Grief' gives a weightier emotional aftermath
    that pairs well with 'fear' and 'pain' in concise English.
