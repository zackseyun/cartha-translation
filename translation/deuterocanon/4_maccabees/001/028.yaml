theological_decisions:
- issue: Anthropological phrasing in σώματος καὶ ψυχῆς
  chosen_reading: body and soul
  alternative_readings:
  - body and life
  - physical and inner life
  rationale: ψυχή can in some contexts mean 'life,' but here the philosophical contrast
    and paired genitives favor the conventional anthropological sense 'soul.' This
    preserves the author's conceptual framework without importing later doctrinal
    precision beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy;
    preserve theological tension rather than resolve it
