id: 4MA.1.28
reference: 4 Maccabees 1:28
source:
  edition: lxx-swete-1909
  text: καθάπερ οὖν δυοῖν τοῦ σώματος καὶ τῆς ψυχῆς φυτῶν ὄντων ἡδονῆς τε καὶ πόνου,
    πολλαὶ τούτων τῶν παθῶν εἰσι παραφυάδες·
  language: Greek
  pages:
  - 752
  - 753
  - 754
  - 755
  - 786
  - 787
  - 788
  - 789
  confidence: high
  validation: agree
translation:
  text: Therefore, just as pleasure and pain are two growths of the body and the soul,
    many passions are offshoots of these;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plants' or 'shoots' of the body and the soul; the Greek uses botanical
      imagery throughout the sentence.
    reason: lexical_alternative
  - marker: b
    text: Or 'emotions' or 'affections'; the Greek word can denote the passions or
      emotional impulses that reason must govern in this work.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ οὖν
  chosen: Therefore, just as
  alternatives:
  - So then, just as
  - Accordingly, just as
  lexicon: LSJ
  rationale: καθάπερ introduces a comparison ('just as'), while οὖν gives inferential
    continuity from the prior argument. 'Therefore, just as' preserves both the logical
    connection and the comparative setup in readable English.
- source_word: δυοῖν
  chosen: two
  alternatives:
  - a pair of
  - twofold
  lexicon: LSJ
  rationale: The dative dual marks exactly two items. 'Two' is the clearest natural
    English rendering.
- source_word: τοῦ σώματος καὶ τῆς ψυχῆς
  chosen: of the body and the soul
  alternatives:
  - belonging to body and soul
  - of body and soul
  lexicon: LSJ
  rationale: The genitives are best taken with φυτῶν, identifying the sphere or source
    to which these 'growths' belong. Retaining 'the soul' reflects ψυχή straightforwardly
    and preserves the anthropological pairing in the Greek.
- source_word: φυτῶν
  chosen: growths
  alternatives:
  - plants
  - things planted
  - shoots
  lexicon: LSJ
  rationale: Literally 'plants,' but in this metaphorical context the author speaks
    of pleasure and pain as primary organic growths from which further passions branch
    out. 'Growths' preserves the botanical metaphor without sounding overly concrete
    or misleading in English.
- source_word: ὄντων
  chosen: are
  alternatives:
  - being
  lexicon: LSJ
  rationale: The participle links pleasure and pain predicatively to the metaphor
    of the two growths. English idiom is smoother with an explicit finite verb in
    the translated clause.
- source_word: ἡδονῆς τε καὶ πόνου
  chosen: pleasure and pain
  alternatives:
  - delight and pain
  - pleasure and suffering
  lexicon: LSJ
  rationale: These are the two basic affective experiences under discussion in the
    argument. 'Pleasure and pain' is the most direct and philosophically recognizable
    pair.
- source_word: πολλαὶ
  chosen: many
  alternatives:
  - numerous
  lexicon: LSJ
  rationale: A simple quantitative adjective; 'many' is natural and sufficient.
- source_word: τούτων
  chosen: of these
  alternatives:
  - from these
  lexicon: LSJ
  rationale: Refers back to pleasure and pain as the two primary sources. In English,
    'offshoots of these' communicates the relation clearly.
- source_word: τῶν παθῶν
  chosen: passions
  alternatives:
  - emotions
  - sufferings
  - affections
  lexicon: LSJ
  rationale: In this philosophical context πάθη refers to passions or emotional impulses,
    not merely passive sufferings. 'Passions' best fits the argument of 4 Maccabees
    about reason governing the passions.
- source_word: εἰσι παραφυάδες
  chosen: are offshoots
  alternatives:
  - are side-growths
  - are branches
  - are derivatives
  lexicon: LSJ
  rationale: παραφυάδες continues the botanical metaphor, denoting shoots or offshoots
    growing from a main stock. 'Offshoots' preserves the imagery and the conceptual
    dependence on pleasure and pain.
