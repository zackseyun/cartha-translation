id: 4MA.1.35
reference: 4 Maccabees 1:35
source:
  edition: lxx-swete-1909
  text: ἀντέχεται γὰρ τὰ τῶν ὀρέξεων πάθη ὑπὸ τοῦ σώφρονος νοὸς ἀνακαμπτόμενα· καὶ
    φιλοτιμοῦνται πάντα τὰ τοῦ σώματος κινήματα ὑπὸ τοῦ λογισμοῦ.
  language: Greek
