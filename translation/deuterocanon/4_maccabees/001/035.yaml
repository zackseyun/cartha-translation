translation:
  text: For the passions of desires are held in check, being turned back by the self-controlled
    mind; and all the body's impulses are made ambitious by reason.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the movements of the body are directed toward honor by reason.'
      The Greek verb here is unusual and carries the idea of aspiring eagerly or loving
      honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντέχεται
  chosen: are held in check
  alternatives:
  - are resisted
  - are restrained
  - are opposed
  lexicon: LSJ
  rationale: The verb conveys resisting or holding against. In this context, with
    the passions as subject and the self-controlled mind as agent in the following
    participial phrase, 'are held in check' gives clear English that preserves the
    sense of restraint rather than annihilation.
- source_word: πάθη
  chosen: passions
  alternatives:
  - sufferings
  - affections
  - emotions
  lexicon: LSJ
  rationale: In Hellenistic moral discourse πάθη commonly refers to passions or disordered
    impulses, not merely neutral emotions. 'Passions' best fits the ethical argument
    of 4 Maccabees.
- source_word: ὀρέξεων
  chosen: of desires
  alternatives:
  - of cravings
  - of appetites
  - of longings
  lexicon: LSJ
  rationale: ὄρεξις denotes desire, appetite, or craving. 'Desires' is broad and readable,
    while still allowing the phrase 'passions of desires' to reflect the Greek's layered
    moral psychology.
- source_word: σώφρονος νοὸς
  chosen: the self-controlled mind
  alternatives:
  - the prudent mind
  - the temperate mind
  - the sober mind
  lexicon: LSJ
  rationale: σώφρων carries the sense of self-control and sound-mindedness. Since
    the book argues for reason's mastery over passions, 'self-controlled mind' captures
    both moral and intellectual dimensions.
- source_word: ἀνακαμπτόμενα
  chosen: being turned back
  alternatives:
  - being checked
  - being bent back
  - being driven back
  lexicon: LSJ
  rationale: The participle literally suggests being turned back or bent back. 'Being
    turned back' preserves the image of reversal or curbing without overinterpreting
    the mechanism.
- source_word: φιλοτιμοῦνται
  chosen: are made ambitious
  alternatives:
  - are directed toward honor
  - are disciplined
  - are inspired to noble action
  lexicon: LSJ
  rationale: The verb normally relates to loving honor or aspiring eagerly. Here it
    is unusual with bodily movements as subject. 'Are made ambitious' keeps the honor-/aspiration-related
    sense visible, even if somewhat idiomatic in English, and avoids flattening the
    Greek into a generic 'are controlled.'
- source_word: κινήματα
  chosen: impulses
  alternatives:
  - movements
  - stirrings
  - motions
  lexicon: LSJ
  rationale: κινήματα can mean movements or stirrings. In this anthropological context,
    'impulses' communicates bodily motions as inward drives, which fits the argument
    better than purely physical 'movements.'
- source_word: λογισμοῦ
  chosen: reason
  alternatives:
  - rational judgment
  - reasoning
  - the faculty of reason
  lexicon: LSJ
  rationale: A central term in 4 Maccabees, λογισμός refers to rational thought or
    reasoned judgment. 'Reason' is concise and preserves the philosophical thrust
    of the passage.
