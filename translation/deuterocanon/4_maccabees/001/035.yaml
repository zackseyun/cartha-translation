theological_decisions:
- issue: Anthropological language of moral psychology
  chosen_reading: The verse is rendered in terms of reason restraining passions and
    directing bodily impulses, without importing later doctrinal categories such as
    'sinful nature.'
  alternative_readings:
  - A more paraphrastic rendering could make the passions explicitly sinful
  - A more literal rendering could preserve 'movements' instead of 'impulses'
  rationale: The Greek reflects Hellenistic Jewish moral philosophy. The translation
    preserves that conceptual world and avoids adding theological claims beyond the
    text.
  doctrine_reference: Translation philosophy §§1, 3, 6
