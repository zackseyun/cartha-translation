theological_decisions:
- issue: Anthropological framing of reason and passions in a Hellenistic Jewish philosophical
    text
  chosen_reading: Render the terms in straightforward ethical-philosophical English
    without importing later doctrinal categories.
  alternative_readings:
  - Use more explicitly Stoic terminology throughout
  - Use more theological language such as 'sinful desires' for πάθη
  rationale: The verse argues that reason governs virtues and masters passions. The
    Greek itself is philosophical rather than explicitly doctrinal in later Christian
    terms, so the translation should preserve that register and not overinterpret
    πάθη as specifically sinful nature.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
