id: 4MA.1.30
reference: 4 Maccabees 1:30
source:
  edition: lxx-swete-1909
  text: Ὁ γὰρ λογισμὸς τῶν μὲν ἀρετῶν ἐστιν ἡγεμών, τῶν δὲ παθῶν αὐτοκράτωρ, ἐπιδείξω
    γε τοίνυν πρῶτον διὰ τῶν κωλυτικῶν τῆς σωφροσύνης ἔργων, ὅτι αὐτοδέσποτός ἐστιν
    τῶν παθῶν ὁ λογισμός.
  language: Greek
  pages:
  - 752
  - 753
  - 754
  - 755
  - 786
  - 787
  - 788
  - 789
  confidence: high
  validation: agree
translation:
  text: For reason is the guide of the virtues and the master of the passions. Therefore,
    I will first demonstrate through the restraining works of self-control that reason
    is self-governing over the passions.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λογισμός
  chosen: reason
  alternatives:
  - rational judgment
  - reasoning
  - mind
  lexicon: LSJ
  rationale: In 4 Maccabees, λογισμός is a key philosophical term for rational faculty
    or reasoned judgment. 'Reason' is concise, natural English and fits the argument
    about mastery over passions.
- source_word: ἡγεμών
  chosen: guide
  alternatives:
  - leader
  - governor
  - ruler
  lexicon: LSJ
  rationale: Here the metaphor is of reason directing the virtues. 'Guide' preserves
    leadership without sounding overly political or bureaucratic.
- source_word: αὐτοκράτωρ
  chosen: master
  alternatives:
  - ruler
  - sovereign
  - one having power over
  lexicon: LSJ
  rationale: The term denotes exercising power over something. 'Master' communicates
    effective control over the passions in idiomatic English.
- source_word: παθῶν
  chosen: passions
  alternatives:
  - emotions
  - sufferings
  - desires
  lexicon: LSJ
  rationale: In this philosophical context πάθη refers to passions or disordered impulses
    rather than mere feelings or sufferings. 'Passions' best matches the ethical contrast
    with reason.
- source_word: κωλυτικῶν
  chosen: restraining
  alternatives:
  - preventive
  - hindering
  - checking
  lexicon: LSJ
  rationale: The adjective describes works that hold passions back. 'Restraining'
    is clear and fits the moral argument better than the more awkward 'hindering'
    or 'preventive'.
- source_word: σωφροσύνης
  chosen: self-control
  alternatives:
  - temperance
  - sound-mindedness
  - moderation
  lexicon: LSJ
  rationale: σωφροσύνη in ethical discourse can be rendered 'temperance,' but 'self-control'
    is more accessible modern English and clearly expresses the virtue's function
    here.
- source_word: ἔργων
  chosen: works
  alternatives:
  - acts
  - deeds
  - operations
  lexicon: LSJ
  rationale: The author refers to concrete expressions or acts of self-control. 'Works'
    is slightly formal but preserves the noun's breadth.
- source_word: αὐτοδέσποτός
  chosen: self-governing
  alternatives:
  - self-mastering
  - its own master
  - self-ruling
  lexicon: LSJ
  rationale: The compound emphasizes independent mastery. 'Self-governing' conveys
    that reason exercises dominion in itself and over the passions without awkward
    literalism.
