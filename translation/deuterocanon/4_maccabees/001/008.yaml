theological_decisions:
- issue: Rendering ἀρετή in a martyrdom context
  chosen_reading: virtue
  alternative_readings:
  - excellence
  rationale: In 4 Maccabees, ἀρετή carries strong ethical-philosophical weight. 'Virtue'
    best preserves the book's moral discourse and the stated reason for the martyrs'
    deaths without importing later doctrinal categories.
