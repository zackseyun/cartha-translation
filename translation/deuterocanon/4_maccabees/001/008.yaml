  text: πολὺ δὲ πλέον τοῦτο ἀποδείξαιμι ἀπὸ τῆς ἀνδραγαθείας τῶν ὑπὲρ ἀρετῆς ἀποθανόντων,
    Ἐλεαζάρου τε καὶ ἑπτὰ ἀδελφῶν καὶ τῆς τούτων μητρός.
