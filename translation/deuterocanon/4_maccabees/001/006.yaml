translation:
  text: For reason does not rule over a person's own passions, but over those things
    that oppose justice and courage and self-control and prudence; and over these,
    not so as to destroy them, but so as not to yield to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'righteousness' instead of 'justice' for δικαιοσύνη.
    reason: lexical_alternative
lexical_decisions:
- source_word: λογισμός
  chosen: reason
  alternatives:
  - rational judgment
  - reasoning
  - mind
  lexicon: LSJ
  rationale: In 4 Maccabees, λογισμός is a key philosophical term for the faculty
    of rational deliberation. 'Reason' is concise, natural English and preserves the
    argument of the book better than the more cumbersome 'rational judgment.'
- source_word: κρατεῖ
  chosen: does not rule over
  alternatives:
  - masters
  - controls
  - prevails over
  lexicon: LSJ
  rationale: κρατέω here denotes exercising mastery or dominion. 'Rule over' preserves
    the governing metaphor and fits the philosophical discussion of reason's mastery
    over impulses.
- source_word: παθῶν
  chosen: passions
  alternatives:
  - sufferings
  - emotions
  - desires
  lexicon: LSJ
  rationale: In this context πάθη refers to passions or impulses rather than sufferings.
    'Passions' best matches the ethical-philosophical sense in 4 Maccabees.
- source_word: τῶν τῆς δικαιοσύνης καὶ ἀνδρείας καὶ σωφροσύνης καὶ φρονήσεως ἐναντίων
  chosen: those things that oppose justice and courage and self-control and prudence
  alternatives:
  - the things contrary to righteousness and courage and temperance and wisdom
  - the opposites of justice and bravery and self-restraint and practical wisdom
  lexicon: LSJ
  rationale: The phrase refers to impulses or factors contrary to the four cardinal
    virtues. 'Justice,' 'courage,' 'self-control,' and 'prudence' are clear modern
    equivalents while remaining close to the Greek ethical vocabulary.
- source_word: δικαιοσύνης
  chosen: justice
  alternatives:
  - righteousness
  lexicon: LSJ
  rationale: Although δικαιοσύνη often defaults to 'righteousness,' here the context
    is a Greek virtue list rather than a specifically covenantal or Pauline theological
    setting. 'Justice' better fits the cardinal-virtue framework while remaining semantically
    faithful.
- source_word: ἀνδρείας
  chosen: courage
  alternatives:
  - manliness
  - bravery
  - fortitude
  lexicon: LSJ
  rationale: ἀνδρεία is the virtue of courage/fortitude. 'Courage' is idiomatic and
    avoids importing gendered overtones from 'manliness' that would distract in English.
- source_word: σωφροσύνης
  chosen: self-control
  alternatives:
  - temperance
  - moderation
  - sound-mindedness
  lexicon: LSJ
  rationale: σωφροσύνη in ethical contexts denotes disciplined self-mastery. 'Self-control'
    is accessible modern English and captures the practical moral sense better than
    the more archaic 'temperance.'
- source_word: φρονήσεως
  chosen: prudence
  alternatives:
  - wisdom
  - practical wisdom
  - understanding
  lexicon: LSJ
  rationale: φρόνησις is practical wisdom or prudence. 'Prudence' preserves the virtue-list
    register and distinguishes it from broader 'wisdom.'
- source_word: καταλῦσαι
  chosen: to destroy them
  alternatives:
  - to abolish them
  - to do away with them
  - to dissolve them
  lexicon: LSJ
  rationale: The infinitive expresses eliminating or undoing the opposing passions.
    'Destroy' is strong but natural and fits the contrast with merely not yielding.
- source_word: μὴ εἴξαι
  chosen: not to yield to them
  alternatives:
  - not to give way to them
  - not to submit to them
  lexicon: LSJ
  rationale: εἴκω here means to yield or give way. 'Not to yield to them' is direct
    and idiomatic.
