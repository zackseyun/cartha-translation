id: 4MA.1.6
reference: 4 Maccabees 1:6
source:
  edition: lxx-swete-1909
  text: οὐ γὰρ τῶν ἑαυτοῦ παθῶν ὁ λογισμὸς κρατεῖ, ἀλλὰ τῶν τῆς δικαιοσύνης καὶ ἀνδρείας
    καὶ σωφροσύνης καὶ φρονήσεως ἐναντίων· καὶ τούτων, οὐχ ὥστε αὐτὰ καταλῦσαι, ἀλλʼ
    ὥστε αὐτοῖς μὴ εἴξαι.
