theological_decisions:
- issue: Philosophical-anthropological sense of λογισμός in 4 Maccabees
  chosen_reading: reason
  alternative_readings:
  - rational judgment
  - the rational faculty
  rationale: The verse argues for the supremacy of disciplined reason over passions.
    'Reason' best preserves the text's philosophical claim without importing later
    technical terminology.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sense of σωφρονούντων within the compressed phrase
  chosen_reading: understood functionally as referring to self-control hindered by
    passions
  alternative_readings:
  - taken more woodenly as 'of the self-controlled'
  rationale: A strictly literal rendering would be obscure in English and may misrepresent
    the relation of the genitive phrase to κωλυτικῶν παθῶν. The chosen rendering makes
    explicit the likely sense already implied by the Greek construction and the broader
    argument of the chapter.
  doctrine_reference: Translation philosophy §6
