translation:
  text: Against the soul are arrogance and love of money and love of honor and contentiousness
    and envy;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the evil eye' for βασκανία, a term that can carry the sense of envious
      or malign ill will.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  chosen: Against
  alternatives:
  - with respect to
  - in relation to
  lexicon: LSJ
  rationale: In this vice-list context, κατά with the genitive ψυχῆς introduces what
    is directed against or pertains adversely to the soul. 'Against' best preserves
    the adversative force and fits the parallel structure of the surrounding catalog.
- source_word: ψυχῆς
  chosen: the soul
  alternatives:
  - life
  - the inner self
  - the mind
  lexicon: LSJ
  rationale: ψυχή here refers to the soul or inner life as the faculty under assault
    by passions/vices in the argument of 4 Maccabees. 'Soul' preserves the anthropological
    sense better than the broader 'life'.
- source_word: ἀλαζονία
  chosen: arrogance
  alternatives:
  - boastfulness
  - pretension
  lexicon: LSJ
  rationale: The term denotes boastful pride or swaggering self-assertion. 'Arrogance'
    is idiomatic modern English and captures the vice without sounding overly narrow.
- source_word: φιλαργυρία
  chosen: love of money
  alternatives:
  - greed
  - avarice
  lexicon: LSJ
  rationale: The compound literally means love of silver/money. 'Love of money' preserves
    the lexical form and moral emphasis more transparently than the more interpretive
    'greed'.
- source_word: φιλοδοξία
  chosen: love of honor
  alternatives:
  - ambition
  - love of glory
  lexicon: LSJ
  rationale: Literally 'love of honor/reputation.' 'Love of honor' keeps the repeated
    φιλο- pattern visible in English and avoids reducing the term to neutral or potentially
    positive 'ambition'.
- source_word: φιλονεικία
  chosen: contentiousness
  alternatives:
  - quarrelsomeness
  - love of strife
  lexicon: LSJ
  rationale: The term denotes a disposition toward strife or wrangling. 'Contentiousness'
    is concise, natural, and morally negative.
- source_word: βασκανία
  chosen: envy
  alternatives:
  - malice
  - the evil eye
  lexicon: LSJ
  rationale: The word can denote envy and, by extension, the harmful attitude associated
    with the 'evil eye.' In a vice list, 'envy' is the clearest main-text rendering;
    the culturally loaded alternative is worth preserving in a footnote.
