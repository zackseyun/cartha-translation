translation:
  text: and, in relation to the body, omnivorousness and gluttony and eating alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a diet of one kind of food' / 'single-food eating.' The Greek μονοφαγία
      can be understood more literally from its components, though 'eating alone'
      fits the vice-list context well.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  chosen: in relation to
  alternatives:
  - with respect to
  - according to
  - as for
  lexicon: LSJ
  rationale: Here κατά with the accusative introduces the sphere or respect in which
    the following vices are categorized. 'In relation to' is natural English and preserves
    the classificatory sense.
- source_word: σῶμα
  chosen: the body
  alternatives:
  - body
  - bodily life
  - physical aspect
  lexicon: LSJ
  rationale: The article and context indicate the bodily sphere in contrast to other
    aspects under discussion. 'The body' keeps the concrete anthropological term without
    overinterpreting it.
- source_word: παντοφαγία
  chosen: omnivorousness
  alternatives:
  - eating everything
  - indiscriminate eating
  - voracity
  lexicon: LSJ
  rationale: The compound literally denotes eating all kinds of things. 'Omnivorousness'
    is the most compact formal equivalent, though somewhat uncommon; it preserves
    the vice-list style and avoids collapsing it into mere quantity of eating.
- source_word: λαμαργία
  chosen: gluttony
  alternatives:
  - greediness
  - gourmandizing
  - voracious appetite
  lexicon: LSJ
  rationale: This term denotes greedy or excessive eating. 'Gluttony' is the standard
    and clear English vice term.
- source_word: μονοφαγία
  chosen: eating alone
  alternatives:
  - solitary eating
  - single-dish eating
  lexicon: LSJ
  rationale: The most likely sense in this ethical list is the antisocial habit of
    eating by oneself. A more literal 'single-food diet' is possible from the morphology,
    but in context 'eating alone' better fits a vice catalogue concerning bodily appetites
    and social conduct.
