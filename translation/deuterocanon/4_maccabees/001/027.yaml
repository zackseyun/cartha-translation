id: 4MA.1.27
reference: 4 Maccabees 1:27
source:
  edition: lxx-swete-1909
  text: κατὰ δὲ τὸ σῶμα παντοφαγία καὶ λαμαργία καὶ μονοφαγία.
  language: Greek
  pages:
