theological_decisions:
- issue: Sense of μονοφαγία
  chosen_reading: eating alone
  alternative_readings:
  - single-food eating
  - a diet of one kind of food
  rationale: This is primarily a lexical and contextual decision rather than a doctrinal
    one, but it affects interpretation of the vice list. The chosen rendering best
    fits an ethical catalogue of bodily excesses and social impropriety; the morphological
    alternative is preserved in a footnote because the Greek can suggest eating only
    one kind of food.
  doctrine_reference: Preserve theological tension rather than resolve it; preserve
    genuine ambiguity in footnotes.
