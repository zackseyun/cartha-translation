translation:
  text: But let us determine what reason is, and what passion is, and how many kinds
    of passions there are, and whether reason rules over all these.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let us distinguish' or 'let us examine.' The Greek verb can emphasize
      separating categories as well as determining them.
    reason: lexical_alternative
  - marker: b
    text: Or 'reasoning' or 'rational judgment' for 'reason.'
    reason: lexical_alternative
  - marker: c
    text: Or 'emotions' or 'impulses' for 'passions,' though the Greek term carries
      a philosophical sense of affective drives.
    reason: lexical_alternative
lexical_decisions:
- source_word: διακρίνωμεν
  chosen: let us determine
  alternatives:
  - let us distinguish
  - let us decide
  - let us examine
  lexicon: LSJ
  rationale: The hortatory subjunctive invites a shared inquiry. In context, the sense
    is not merely separating categories but carefully determining/defining them before
    argument proceeds.
- source_word: λογισμός
  chosen: reason
  alternatives:
  - reasoning
  - rational judgment
  - rational thought
  lexicon: LSJ
  rationale: In 4 Maccabees this term denotes the faculty of rational judgment central
    to the book's thesis. 'Reason' is concise and natural English, while still carrying
    the philosophical sense.
- source_word: πάθος
  chosen: passion
  alternatives:
  - emotion
  - passion/impulse
  - suffering
  lexicon: LSJ
  rationale: In this philosophical context πάθος refers to an affective impulse or
    passion rather than suffering. 'Passion' best preserves the Hellenistic ethical
    register and the contrast with reason.
- source_word: πόσα παθῶν εἰδέα
  chosen: how many kinds of passions there are
  alternatives:
  - how many forms of passions there are
  - how many species of passions there are
  lexicon: LSJ
  rationale: εἰδέα here means kinds/forms. 'Kinds' is clearer modern English than
    'species' or 'forms' while preserving the classificatory sense.
- source_word: ἐπικρατεῖ
  chosen: rules over
  alternatives:
  - prevails over
  - has mastery over
  - controls
  lexicon: LSJ
  rationale: The verb conveys dominance or mastery. 'Rules over' preserves the governing
    metaphor and reads naturally in English; it is slightly more vivid than 'prevails
    over' and less reductive than 'controls'.
- source_word: τούτων
  chosen: all these
  alternatives:
  - all of them
  - all these things
  lexicon: LSJ
  rationale: The pronoun refers back to the passions just mentioned. 'All these' is
    idiomatic and keeps the demonstrative force.
