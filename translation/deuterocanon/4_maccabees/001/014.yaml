  text: διακρίνωμεν δέ, τί ποτέ ἐστιν λογισμός, καὶ τί πάθος, καὶ πόσα παθῶν εἰδέα,
    καὶ εἰ πάντων ἐπικρατεῖ τούτων ὁ λογισμός.
