theological_decisions:
- issue: Rendering the philosophical contrast between λογισμός and πάθος
  chosen_reading: reason ... passion
  alternative_readings:
  - reasoning ... emotion
  - rational judgment ... impulse
  rationale: This verse is programmatic for 4 Maccabees' argument about rational mastery
    over the passions. The chosen pair preserves the text's philosophical tension
    without flattening it into modern psychological terminology.
  doctrine_reference: Translation philosophy §§1, 5, 6
