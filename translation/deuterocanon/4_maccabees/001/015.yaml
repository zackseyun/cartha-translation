theological_decisions:
- issue: Rendering the ethical-philosophical definition without over-systematizing
    λόγος
  chosen_reading: the word of wisdom
  alternative_readings:
  - the principle of wisdom
  - the discourse of wisdom
  rationale: The verse defines reason in relation to wisdom's authoritative expression.
    Because λόγος can denote word, discourse, account, or principle, the translation
    preserves some breadth rather than forcing a later technical philosophical sense.
    No doctrinally contested term from DOCTRINE.md is involved, but transparency is
    warranted because the phrase shapes the book's thesis about reason and piety.
  doctrine_reference: Translation philosophy §§1, 3, 6
