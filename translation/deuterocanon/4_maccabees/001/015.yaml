id: 4MA.1.15
reference: 4 Maccabees 1:15
source:
  edition: lxx-swete-1909
  text: λογισμὸς μὲν δὴ τοίνυν ἐστὶν νοῦς μετὰ ὀρθοῦ βίου προτιμῶν τὸν σοφίας λόγον.
  language: Greek
  pages:
