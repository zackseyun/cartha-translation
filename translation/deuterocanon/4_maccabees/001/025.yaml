reference: 4 Maccabees 1:25
source:
  edition: lxx-swete-1909
  text: ἐν δὲ τῇ ἡδονῇ ἐστιν καὶ ἡ κακοήθης διάθεσις, πολυτροπωτάτη πάντων τῶν παθῶν
    οὖσα.
  language: Greek
