theological_decisions:
- issue: Rendering δικαιοσύνη in a deuterocanonical philosophical virtue list
  chosen_reading: justice
  alternative_readings:
  - righteousness
  rationale: The immediate context is a catalog of the cardinal virtues rather than
    a specifically covenantal or Pauline theological discussion. Therefore 'justice'
    better reflects the Greek ethical category here, while the alternative 'righteousness'
    is preserved in a footnote because of the term's broader biblical significance
    and the project's default preference in many contexts.
