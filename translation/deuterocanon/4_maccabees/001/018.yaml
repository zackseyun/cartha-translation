translation:
  text: And the forms of wisdom are prudence and justice and courage and self-control.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'righteousness' for 'justice' (δικαιοσύνη). Here the context is a virtue
      list, so 'justice' is preferred.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴδεα
  chosen: forms
  alternatives:
  - kinds
  - aspects
  - species
  lexicon: LSJ
  rationale: εἶδος here denotes the constituent forms or kinds under which wisdom
    is expressed. 'Forms' stays close to the Greek while remaining natural in English.
    'Aspects' is possible but slightly more interpretive.
- source_word: καθεστᾶσιν
  chosen: are
  alternatives:
  - consist in
  - stand as
  - are constituted as
  lexicon: LSJ
  rationale: The verb indicates established identity or constitution. In idiomatic
    English, 'are' best conveys the copular force in this list construction without
    overloading the sentence.
- source_word: φρόνησις
  chosen: prudence
  alternatives:
  - practical wisdom
  - understanding
  - good judgment
  lexicon: LSJ
  rationale: In a virtue list, φρόνησις is the classical cardinal virtue of prudent
    practical judgment. 'Prudence' preserves that philosophical register better than
    the broader 'understanding'.
- source_word: δικαιοσύνη
  chosen: justice
  alternatives:
  - righteousness
  lexicon: LSJ
  rationale: Although δικαιοσύνη often defaults to 'righteousness' in more overtly
    theological contexts, here it appears in a Greek philosophical virtue list alongside
    prudence, courage, and self-control. 'Justice' best matches that ethical-philosophical
    sense. This is a documented contextual exception to the project's default rendering.
- source_word: ἀνδρία
  chosen: courage
  alternatives:
  - bravery
  - fortitude
  - manliness
  lexicon: LSJ
  rationale: ἀνδρία is the standard virtue term for courage/fortitude. 'Courage' is
    the clearest modern English equivalent; 'manliness' would over-literalize the
    etymology and mislead readers.
- source_word: σωφροσύνη
  chosen: self-control
  alternatives:
  - temperance
  - sound-mindedness
  - moderation
  lexicon: LSJ
  rationale: σωφροσύνη in virtue discourse denotes disciplined restraint. 'Self-control'
    is accessible modern English and captures the moral sense better for contemporary
    readers than the somewhat archaic 'temperance'.
