id: 4MA.1.20
reference: 4 Maccabees 1:20
source:
  edition: lxx-swete-1909
  text: παθῶν δὲ φύσεις εἰσὶν αἱ περιεκτικώταται δύο, ἡδονή τε καὶ πόνος· τούτων δὲ
    ἑκάτερον καὶ περὶ τὴν ψυχὴν πέφυκεν.
  language: Greek
  pages:
  - 752
  - 753
  - 754
  - 755
  - 786
  - 787
  - 788
  - 789
  confidence: high
  validation: agree
translation:
  text: Now the two most comprehensive kinds of passions are pleasure and pain; and
    each of these also naturally pertains to the soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the two most inclusive natures of the passions.' The Greek wording is
      compressed and may be rendered more formally with 'natures' instead of 'kinds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παθῶν
  chosen: of passions
  alternatives:
  - of sufferings
  - of emotions
  - of affections
  lexicon: LSJ
  rationale: πάθος in this philosophical context refers to passions or affective impulses
    rather than merely sufferings. 'Passions' preserves the moral-psychological sense
    used in 4 Maccabees.
- source_word: φύσεις
  chosen: kinds
  alternatives:
  - natures
  - species
  lexicon: LSJ
  rationale: Although φύσεις literally means 'natures,' the clause classifies categories
    of passions. 'Kinds' communicates the taxonomic sense in natural English while
    remaining close to the Greek.
- source_word: περιεκτικώταται
  chosen: most comprehensive
  alternatives:
  - most inclusive
  - most encompassing
  lexicon: LSJ
  rationale: The superlative indicates the broadest, most all-encompassing categories.
    'Most comprehensive' best conveys that these two headings contain the rest.
- source_word: ἡδονή
  chosen: pleasure
  alternatives:
  - delight
  lexicon: LSJ
  rationale: Standard rendering in ethical/philosophical discourse; clear and direct
    in English.
- source_word: πόνος
  chosen: pain
  alternatives:
  - distress
  - toil
  lexicon: LSJ
  rationale: In contrast with ἡδονή, 'pain' is the most natural antonym here and fits
    the psychological framework.
- source_word: ἑκάτερον
  chosen: each of these
  alternatives:
  - each one
  - either one
  lexicon: LSJ
  rationale: Refers distributively to the two previously named passions.
- source_word: περὶ τὴν ψυχὴν
  chosen: connected with the soul
  alternatives:
  - concerned with the soul
  - around the soul
  - in relation to the soul
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic here; a too-literal 'around the soul'
    is unclear in English. 'Connected with the soul' captures the relation intended
    in the argument about passions affecting inner life.
- source_word: πέφυκεν
  chosen: is by nature
  alternatives:
  - has grown naturally
  - is naturally
  - belongs by nature
  lexicon: LSJ
  rationale: Perfect of φύω expresses an inherent natural condition. 'Is by nature'
    preserves that sense and reads smoothly with the predicate phrase.
