  chosen_reading: soul
  alternative_readings:
  - life
  - self
  rationale: In this philosophical-anthropological context, ψυχή refers to the inner
    immaterial aspect under discussion, not merely biological life. 'Soul' best matches
    the argument of the passage without importing later doctrinal precision beyond
    the text.
