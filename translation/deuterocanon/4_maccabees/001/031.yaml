translation:
  text: Self-control, then, is mastery over desires.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σωφροσύνη
  chosen: self-control
  alternatives:
  - sound-mindedness
  - temperance
  - prudence
  lexicon: LSJ
  rationale: In this context the author is defining a cardinal virtue in relation
    to governing passions and desires. 'Self-control' best captures the practical
    ethical sense in clear modern English. 'Temperance' is too narrow/archaic, and
    'sound-mindedness' is more literal to the root idea but less natural in this definitional
    statement.
- source_word: δὴ τοίνυν
  chosen: then
  alternatives:
  - therefore
  - accordingly
  - indeed then
  lexicon: LSJ
  rationale: The paired particles mark an inferential transition with some emphasis.
    English usually does not preserve both particles separately without sounding stiff.
    'Then' conveys the discourse move naturally; the emphatic force is lightly reflected
    by word order and punctuation.
- source_word: ἐστὶν
  chosen: is
  lexicon: LSJ
  rationale: Simple copula in a formal definition.
- source_word: ἐπικράτεια
  chosen: mastery
  alternatives:
  - control
  - dominion
  - self-mastery
  lexicon: LSJ
  rationale: '''Mastery'' conveys active rule or prevailing over something, fitting
    the ethical definition. ''Control'' is possible but slightly flatter; ''self-mastery''
    would add ''self'' explicitly, which the Greek does not state here, since the
    object is already specified as desires.'
- source_word: τῶν ἐπιθυμιῶν
  chosen: over desires
  alternatives:
  - over passions
  - over cravings
  - of desires
  lexicon: LSJ
  rationale: ἐπιθυμίαι are desires, cravings, or lusts depending on context. Here
    the broad ethical sense favors 'desires.' Rendering the genitive with 'over' makes
    the relation to ἐπικράτεια idiomatic in English ('mastery over'). 'Passions' is
    broader but less exact for this noun.
