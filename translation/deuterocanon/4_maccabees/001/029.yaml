theological_decisions:
- issue: Rendering λογισμός in 4 Maccabees' philosophical-theological argument
  chosen_reading: reason
  alternative_readings:
  - rational judgment
  - reasoned mind
  rationale: In this book λογισμός is a central concept describing the faculty that
    governs passions in accord with piety. 'Reason' is the clearest concise rendering
    and preserves the book's argument without importing later technical terminology.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Rendering πάθη
  chosen_reading: passions
  alternative_readings:
  - sufferings
  - emotions
  - desires
  rationale: In this context πάθη refers to inner impulses or affective drives subject
    to rational mastery, not external sufferings. 'Passions' best preserves the ethical-philosophical
    sense.
