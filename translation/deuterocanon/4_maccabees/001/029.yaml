  text: ὧν ἕκαστος ὁ πανεγώργος λογισμὸς περικαθαίρων τε καὶ ἀποκνίζων καὶ περιπλέκων
    καὶ ἐπάρδων καὶ πάντα τρόπον μεταχέων ἐξημεροῖ τὰς τῶν ἠθῶν καὶ παθῶν ὕλας.
