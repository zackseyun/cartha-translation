  - 789
  confidence: high
  validation: agree
translation:
  text: but it also is shown to rule over the passions that hinder righteousness,
    such as malice, and over the passions that hinder courage—anger, pain, and fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the passions that hinder justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κυριεύειν
  chosen: to rule over
  alternatives:
  - to master
  - to have dominion over
  lexicon: LSJ
  rationale: The infinitive expresses exercising control or dominion. 'Rule over'
    is clear modern English and preserves the sense of mastery without over-paraphrasing.
- source_word: ἀναφαίνεται
  chosen: is shown
  alternatives:
  - appears
  - is plainly seen
  lexicon: LSJ
  rationale: The verb indicates becoming evident or being shown forth. 'Is shown'
    fits the impersonal argumentative style here and avoids overstating visual nuance.
- source_word: ἐμποδιστικῶν
  chosen: that hinder
  alternatives:
  - obstructive
  - impeding
  lexicon: LSJ
  rationale: The adjective describes passions that impede the relevant virtue. Rendering
    it as a relative clause is more natural in English while preserving the force.
- source_word: παθῶν
  chosen: passions
  alternatives:
  - sufferings
  - emotions
  - affections
  lexicon: LSJ
  rationale: In this philosophical context πάθη refers to passions or emotional impulses
    rather than external sufferings. 'Passions' best matches the moral-psychological
    sense in 4 Maccabees.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: Although the term can mean 'justice,' the project's default rendering
    is 'righteousness,' with 'justice' preserved as an alternative. In this virtue
    list, 'righteousness' fits the moral quality in view.
- source_word: κακοηθείας
  chosen: malice
  alternatives:
  - evil disposition
  - malignity
  lexicon: LSJ
  rationale: The noun denotes bad character or ill will. 'Malice' is concise, idiomatic,
    and captures the vice named as opposing righteousness.
- source_word: ἀνδρείας
  chosen: courage
  alternatives:
  - manliness
  - bravery
  - fortitude
  lexicon: LSJ
  rationale: In Hellenistic virtue language ἀνδρεία denotes courage or bravery. 'Courage'
    communicates the virtue clearly in modern English without importing gendered wording
    not required by the context.
- source_word: θυμοῦ
  chosen: anger
  alternatives:
  - wrath
  - spiritedness
  lexicon: LSJ
  rationale: Here the term is listed among passions that impede courage, so the negative
    sense 'anger' fits better than the more neutral 'spirit' or 'spiritedness'.
- source_word: πόνου
  chosen: pain
  alternatives:
  - toil
  - distress
  lexicon: LSJ
  rationale: Within the sequence of passions opposed to courage, 'pain' is the most
    straightforward rendering and suits the ethical context.
- source_word: φόβου
  chosen: fear
  alternatives:
  - terror
  lexicon: LSJ
  rationale: The basic sense is 'fear'; no stronger rendering is demanded by the context.
