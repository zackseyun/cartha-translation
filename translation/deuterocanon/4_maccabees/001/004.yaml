id: 4MA.1.4
reference: 4 Maccabees 1:4
source:
  edition: lxx-swete-1909
  text: ἀλλὰ καὶ τῶν τῆς δικαιοσύνης ἐμποδιστικῶν παθῶν κυριεύειν ἀναφαίνεται, οἷον
    κακοηθείας, καὶ τῶν τῆς ἀνδρείας ἐμποδιστικῶν παθῶν, θυμοῦ τε καὶ πόνου καὶ φόβου.
  language: Greek
  pages:
