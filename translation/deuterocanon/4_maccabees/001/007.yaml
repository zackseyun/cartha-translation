id: 4MA.1.7
reference: 4 Maccabees 1:7
source:
  edition: lxx-swete-1909
  text: Πολλαχόθεν μὲν οὖν καὶ ἀλλαχόθεν ἔχοιμʼ ἂν ὑμῖν ἐπιδεῖξαι, ὅτι αὐτοκράτωρ
    ἐστὶν τῶν παθῶν ὁ εὐσεβὴς λογισμός.
  language: Greek
  pages:
