translation:
  text: For all these, having looked down on the pain that goes as far as death, demonstrated
    that reason rules over the passions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having disregarded the pain even to death.'
    reason: lexical_alternative
  - marker: b
    text: Or 'reasoned judgment has mastery over the passions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅπαντες
  chosen: all
  alternatives:
  - every one
  - all of them
  lexicon: LSJ
  rationale: Conveys the comprehensive scope of the subject group. 'All these' fits
    the demonstrative force created with οὗτοι.
- source_word: οὗτοι
  chosen: these
  alternatives:
  - these men
  - these people
  lexicon: LSJ
  rationale: A simple demonstrative is sufficient; the referent is supplied by context
    from the preceding discussion.
- source_word: πόνον
  chosen: pain
  alternatives:
  - toil
  - suffering
  - affliction
  lexicon: LSJ
  rationale: In this martyrdom context, the word refers to experienced suffering rather
    than ordinary labor. 'Pain' is direct and natural English.
- source_word: ἕως θανάτου
  chosen: that goes as far as death
  alternatives:
  - unto death
  - even to death
  - up to death
  lexicon: LSJ
  rationale: The phrase modifies the extremity of the pain endured. 'That goes as
    far as death' preserves the sense while remaining readable; 'unto death' is more
    formal but less natural in contemporary English.
- source_word: ὑπεριδόντες
  chosen: having looked down on
  alternatives:
  - having disregarded
  - having despised
  - having treated as nothing
  lexicon: LSJ
  rationale: The participle literally suggests looking down on or disregarding. 'Having
    looked down on' preserves the metaphor and communicates contempt for the suffering's
    power over them.
- source_word: ἐπεδείξαντο
  chosen: demonstrated
  alternatives:
  - showed
  - proved
  lexicon: LSJ
  rationale: This verb presents their endurance as evidence. 'Demonstrated' captures
    the argumentative tone of the book.
- source_word: περικρατεῖ
  chosen: rules over
  alternatives:
  - has mastery over
  - prevails over
  - is sovereign over
  lexicon: LSJ
  rationale: The verb denotes exercising superior power or mastery. 'Rules over' is
    clear, strong, and idiomatic.
- source_word: τῶν παθῶν
  chosen: the passions
  alternatives:
  - the emotions
  - the sufferings
  - the impulses
  lexicon: LSJ
  rationale: In 4 Maccabees, πάθη refers to the passions or irrational drives that
    reason masters. 'Passions' best preserves the philosophical and ethical sense.
- source_word: ὁ λογισμός
  chosen: reason
  alternatives:
  - rational judgment
  - the mind
  - reasoned judgment
  lexicon: LSJ
  rationale: A central term in 4 Maccabees for rational, disciplined judgment. 'Reason'
    is the most concise and idiomatic rendering, though the fuller nuance is noted
    by alternatives.
