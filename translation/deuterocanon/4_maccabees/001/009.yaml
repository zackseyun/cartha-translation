theological_decisions:
- issue: Rendering the philosophical term ὁ λογισμός in a way that preserves the book's
    argument without importing later theological categories
  chosen_reading: reason
  alternative_readings:
  - rational judgment
  - reasoned judgment
  rationale: The verse argues that disciplined rationality masters the passions, a
    key thesis of 4 Maccabees. 'Reason' preserves that philosophical claim without
    overinterpreting it as specifically divine revelation or conscience.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Whether to make the martyrdom context explicit in translating ἕως θανάτου
    πόνον
  chosen_reading: the pain that goes as far as death
  alternative_readings:
  - deathly pain
  - pain unto death
  rationale: The Greek itself states the extremity of the pain rather than explicitly
    naming martyrdom in this clause. The chosen rendering keeps the source wording
    and lets the context supply the martyrdom setting.
  doctrine_reference: Translation philosophy §§1, 6
