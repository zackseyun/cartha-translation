translation:
  text: Therefore, though we desire creatures from the water, birds, and four-footed
    animals—all kinds of food forbidden to us by the law—we abstain because of the
    mastery of reason.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'aquatic creatures' for 'creatures from the water.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'because of the supremacy/mastery of reason.' The phrase reflects
      the book's central claim that disciplined reason, shaped by the law, rules bodily
      desires.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιγαροῦν
  chosen: Therefore
  alternatives:
  - So then
  - Accordingly
  lexicon: LSJ
  rationale: Inferential particle drawing a conclusion from the preceding argument;
    'Therefore' is natural modern English and preserves the logical force.
- source_word: ἐνύδρων
  chosen: creatures from the water
  alternatives:
  - water animals
  - aquatic creatures
  lexicon: LSJ
  rationale: The term denotes animals living in water. 'Creatures from the water'
    is clear and broad enough to include fish and other aquatic animals without over-specifying
    beyond the Greek.
- source_word: ἐπιθυμοῦντες
  chosen: though we desire
  alternatives:
  - desiring
  - longing for
  - craving
  lexicon: BDAG
  rationale: 'The participle indicates real appetite, concessive in context: despite
    desiring such foods, ''we abstain.'' ''Though we desire'' brings out that concessive
    sense in idiomatic English.'
- source_word: ὀρνέων
  chosen: birds
  alternatives:
  - fowl
  lexicon: LSJ
  rationale: Common term for birds. 'Birds' is plain modern English; 'fowl' would
    sound archaic or overly specialized.
- source_word: τετραπόδων
  chosen: four-footed animals
  alternatives:
  - quadrupeds
  - four-legged animals
  lexicon: LSJ
  rationale: The Greek literally refers to four-footed creatures. 'Four-footed animals'
    preserves the image while remaining readable.
- source_word: παντοίων βρωμάτων
  chosen: every kind of food
  alternatives:
  - all sorts of foods
  - foods of every kind
  lexicon: LSJ
  rationale: The phrase is comprehensive. 'Every kind of food' is idiomatic and keeps
    the breadth of the Greek.
- source_word: τῶν ἀπηγορευμένων ἡμῖν κατὰ τὸν νόμον
  chosen: forbidden to us by the law
  alternatives:
  - prohibited to us according to the law
  - banned for us under the law
  lexicon: LSJ
  rationale: The participle with κατὰ τὸν νόμον indicates foods prohibited in accordance
    with the Mosaic law. 'By the law' is concise and accurate.
- source_word: ἀπέχομεθα
  chosen: we abstain
  alternatives:
  - we keep away
  - we refrain
  lexicon: BDAG
  rationale: This verb regularly means to abstain from something. It fits the ethical
    and dietary context well.
- source_word: διὰ τὴν τοῦ λογισμοῦ ἐπικράτειαν
  chosen: because of the mastery of reason
  alternatives:
  - because of reason's supremacy
  - because of the dominance of reason
  - through the self-mastery of reason
  lexicon: LSJ
  rationale: The phrase expresses the controlling power exercised by rational judgment.
    'Mastery of reason' preserves the author's theme that reason rules the passions,
    without importing later technical philosophical jargon.
