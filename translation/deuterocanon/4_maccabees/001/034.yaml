  text: τοιγαροῦν ἐνύδρων ἐπιθυμοῦντες καὶ ὀρνέων καὶ τετραπόδων, παντοίων βρωμάτων
    τῶν ἀπηγορευμένων ἡμῖν κατὰ τὸν νόμον ἀπέχομεθα διὰ τὴν τοῦ λογισμοῦ ἐπικράτειαν.
  language: Greek
