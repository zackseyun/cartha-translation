id: 4MA.1.33
reference: 4 Maccabees 1:33
source:
  edition: lxx-swete-1909
  text: ἐπεὶ πόθεν κινούμενοι πρὸς τὰς ἀπειρημένας τροφάς, ἀποτρεπόμεθα τὰς ἐξ αὐτῶν
    ἡδονάς; οὐχ ὅτι δύναται τῶν ὀρέξεων ἐπικρατεῖν ὁ λογισμός; ἐγὼ μὲν οἶμαι.
  language: Greek
