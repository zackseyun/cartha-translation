translation:
  text: Therefore, it is incumbent on me to praise the men who, at this time, died
    with their mother for the sake of nobility and goodness; and, as for honors, to
    pronounce them blessed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the sake of virtue.' The Greek καλοκἀγαθία combines the ideas of
      nobility and goodness/moral excellence.
    reason: lexical_alternative
  - marker: b
    text: The closing Greek phrase is compressed; the sense is that, beyond praising
      their virtues, the speaker also accords them the honor of calling them blessed.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπεστί μοι
  chosen: it is incumbent on me
  alternatives:
  - it falls to me
  - it is for me
  - it is my duty
  lexicon: LSJ
  rationale: The impersonal expression conveys obligation or assigned responsibility,
    not mere possibility. 'It is incumbent on me' preserves the formal rhetorical
    tone of the prologue.
- source_word: ἐπαινεῖν
  chosen: to praise
  alternatives:
  - to commend
  - to extol
  lexicon: LSJ
  rationale: A straightforward rendering that fits the author's stated purpose and
    keeps the rhetorical register without overstating the term.
- source_word: τοὺς ... ἀποθανόντας ... ἄνδρας
  chosen: the men who ... died
  alternatives:
  - the men having died
  - those men who died
  lexicon: LSJ
  rationale: The participial construction is naturally rendered in English as a relative
    clause. 'Men' preserves the masculine reference in keeping with the gender-accurate
    policy.
- source_word: κατὰ τοῦτον τὸν καιρόν
  chosen: at this time
  alternatives:
  - during this time
  - in this season
  lexicon: LSJ
  rationale: This idiom points to the time under discussion. 'At this time' is idiomatic
    and sufficiently close to the Greek.
- source_word: ὑπὲρ τῆς καλοκἀγαθίας
  chosen: for the sake of noble goodness
  alternatives:
  - for the sake of virtue
  - for nobility and goodness
  - for moral excellence
  lexicon: LSJ
  rationale: καλοκἀγαθία denotes the ideal of nobility joined with goodness/virtue.
    'Noble goodness' preserves both components more transparently than the flatter
    'virtue,' while remaining readable.
- source_word: μετὰ τῆς μητρός
  chosen: with their mother
  alternatives:
  - along with their mother
  lexicon: LSJ
  rationale: The phrase indicates that the men died in company with their mother in
    the same martyrdom context. English idiom prefers 'with their mother.'
- source_word: τῶν δὲ τιμῶν μακαρισμῷ ὤν
  chosen: and, as for honors, to pronounce them blessed
  alternatives:
  - and to honor them with a blessing
  - and in respect to honors, to bless them
  - and to count them blessed as an honor
  lexicon: LSJ
  rationale: The Greek is compressed and somewhat awkward in Swete's text, but the
    sense is that beyond praise for virtues, they are to receive the honor of beatitude/congratulation.
    'To pronounce them blessed' captures μακαρισμός better than the vaguer 'honor
    them.'
