  text: τῶν μὲν οὖν ἀρετῶν ἐπεστί μοι ἐπαινεῖν τοὺς κατὰ τοῦτον τὸν καιρὸν ὑπὲρ τῆς
    καλοκἀγαθίας ἀποθανόντας μετὰ τῆς μητρὸς ἄνδρας· τῶν δὲ τιμῶν μακαρισμῷ ὤν.
