theological_decisions:
- issue: Rendering καλοκἀγαθία in a martyrdom context
  chosen_reading: noble goodness
  alternative_readings:
  - virtue
  - moral excellence
  rationale: The term carries ethical and honor-laden force in Hellenistic moral discourse.
    'Noble goodness' preserves that dual sense without importing later technical theological
    vocabulary.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gendered reference to ἄνδρας
  chosen_reading: men
  alternative_readings:
  - people
  - brothers
  rationale: The Greek specifically uses a masculine term for the sons. Per gender-accurate
    policy, the translation keeps the masculine reference rather than neutralizing
    it.
  doctrine_reference: Translation philosophy §4
