theological_decisions:
- issue: Rendering εὐσεβὴς λογισμός in a way that preserves both religious and philosophical
    dimensions
  chosen_reading: devout reason
  alternative_readings:
  - pious reason
  - godly reasoning
  rationale: The book's thesis concerns reason shaped by reverence toward God, not
    secular rationality alone. 'Devout reason' preserves the theological dimension
    of εὐσεβής while keeping λογισμός as reason rather than reducing it to mere thought
    process.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
