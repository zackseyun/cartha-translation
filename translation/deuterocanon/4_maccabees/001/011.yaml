theological_decisions:
- issue: Meaning of the land's purification through the martyrs
  chosen_reading: The text is rendered to preserve the author's claim that through
    the sufferers' endurance the homeland was purified, without specifying a later
    doctrinal mechanism beyond the verse itself.
  alternative_readings:
  - The homeland was politically liberated
  - The homeland was ritually or morally cleansed
  - The martyrs' suffering had expiatory significance
  rationale: The Greek καθαρσθῆναι allows moral/ritual purification language, and
    the surrounding context in 4 Maccabees often attributes broader benefit to the
    martyrs' suffering. The translation keeps 'purified' rather than reducing it to
    merely political liberation, while avoiding importing a fully systematized atonement
    doctrine not explicit in this verse alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
