id: 4MA.1.11
reference: 4 Maccabees 1:11
source:
  edition: lxx-swete-1909
  text: θαυμαστότεροι γὰρ ἐκεῖνοι οὐ μόνον ὑπὸ πάντων ἀνθρώπων ἐπὶ τῇ ἀνδρίᾳ καὶ τῇ
    ὑπομονῇ, ἀλλὰ καὶ ὑπὸ τῶν αἰκισαμένων, αἴτιοι κατέστησαν τοῦ καταλυθῆναι τὴν κατὰ
