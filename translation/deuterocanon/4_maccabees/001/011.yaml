translation:
  text: For those men became even more admirable, not only to all people for their
    courage and endurance, but also to those who tortured them; they became the cause
    of the overthrow of the tyranny against the nation, having conquered the tyrant
    by endurance, so that through them the fatherland was purified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the homeland.' The Greek πατρίς denotes one's native land; 'fatherland'
      was chosen to preserve the elevated rhetorical tone.
    reason: lexical_alternative
  - marker: b
    text: '''Was purified'' may also be understood as ''was cleansed,'' carrying possible
      moral, ritual, or national-restorative overtones.'
    reason: alternative_reading
lexical_decisions:
- source_word: θαυμαστότεροι
  chosen: even more admirable
  alternatives:
  - more wonderful
  - more remarkable
  lexicon: LSJ
  rationale: Comparative adjective from θαυμαστός; 'admirable' fits the context of
    moral esteem better than the broader 'wonderful.' 'Even more' preserves the comparative
    force.
- source_word: ἀνδρίᾳ
  chosen: courage
  alternatives:
  - manliness
  - bravery
  lexicon: LSJ
  rationale: Though etymologically linked to manliness, in context it denotes valor
    or courage. 'Courage' communicates the virtue in clear modern English without
    importing unnecessary gendered wording.
- source_word: ὑπομονῇ
  chosen: endurance
  alternatives:
  - steadfastness
  - patient endurance
  lexicon: LSJ
  rationale: The term appears twice in the verse and denotes persevering constancy
    under suffering. 'Endurance' is concise, natural, and consistent across both occurrences.
- source_word: αἰκισαμένων
  chosen: those who tortured them
  alternatives:
  - their tormentors
  - those who mistreated them
  lexicon: LSJ
  rationale: The participle refers to the agents inflicting brutal abuse. 'Those who
    tortured them' makes the violence explicit and preserves the verbal force better
    than the more nominal 'tormentors.'
- source_word: αἴτιοι κατέστησαν
  chosen: they became the cause
  alternatives:
  - they proved responsible
  - they became responsible
  lexicon: LSJ
  rationale: This construction indicates causal agency in the resulting overthrow.
    'Became the cause' is a transparent rendering of the idiom.
- source_word: καταλυθῆναι
  chosen: the overthrow
  alternatives:
  - the destruction
  - the ending
  - the dismantling
  lexicon: LSJ
  rationale: In context of tyranny, the passive infinitive conveys being brought down
    or abolished. 'Overthrow' best matches political tyranny in idiomatic English.
- source_word: τὴν κατὰ τοῦ ἔθνους τυραννίδα
  chosen: the tyranny against the nation
  alternatives:
  - the tyranny directed against the people
  - the oppression against the nation
  lexicon: LSJ
  rationale: The phrase specifies tyranny exercised against the Jewish nation. 'Nation'
    preserves ἔθνος straightforwardly here, and 'tyranny' keeps the political-moral
    force of τυραννίς.
- source_word: νικήσαντες τὸν τύραννον
  chosen: having conquered the tyrant
  alternatives:
  - having defeated the tyrant
  - by overcoming the tyrant
  lexicon: LSJ
  rationale: The aorist participle is best represented as prior means attendant to
    the result clause. 'Conquered' preserves the victory motif strongly.
- source_word: ὥστε καθαρσθῆναι
  chosen: so that ... was purified
  alternatives:
  - with the result that ... was cleansed
  - so that ... was made clean
  lexicon: LSJ
  rationale: ὥστε with infinitive expresses result. καθαρσθῆναι can be rendered 'purified'
    or 'cleansed'; 'purified' better preserves the moral-religious resonance likely
    intended in this martyrdom context.
- source_word: πατρίδα
  chosen: the fatherland
  alternatives:
  - the homeland
  - the ancestral land
  lexicon: LSJ
  rationale: πατρίς denotes one's native land or fatherland. 'Fatherland' preserves
    the elevated rhetorical tone of 4 Maccabees better than the flatter 'homeland,'
    though the sense is territorial rather than merely sentimental.
