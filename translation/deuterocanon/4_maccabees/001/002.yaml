theological_decisions:
- issue: Rendering philosophical virtue terminology without importing later doctrinal
    categories
  chosen_reading: Use 'virtue' and 'prudence' in their moral-philosophical sense
  alternative_readings:
  - Use broader terms such as 'excellence' and 'wisdom'
  rationale: 4 Maccabees opens in a philosophical register. Rendering ἀρετή and φρόνησις
    with established virtue-language preserves the author's conceptual world without
    adding specifically Christian doctrinal freight.
