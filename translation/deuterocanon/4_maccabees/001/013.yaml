translation:
  text: So then, let us examine whether reason is master over the passions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whether rational judgment is sovereign over the passions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ζητοῦμεν
  chosen: let us examine
  alternatives:
  - let us inquire
  - let us investigate
  - we seek
  lexicon: LSJ
  rationale: First person plural present can be rendered literally as 'we seek/inquire,'
    but in this argumentative context it functions as an invitation to consider the
    question under discussion. 'Let us examine' gives natural English while preserving
    the deliberative force.
- source_word: δὴ τοίνυν
  chosen: So then
  alternatives:
  - therefore then
  - well then
  - accordingly
  lexicon: LSJ
  rationale: The paired particles mark a transition and inference. 'So then' captures
    both the resumptive and inferential force in readable English without overloading
    the line with wooden particles.
- source_word: αὐτοκράτωρ
  chosen: master
  alternatives:
  - self-ruling
  - sovereign
  - having full power
  lexicon: LSJ
  rationale: The adjective denotes possessing independent authority or full mastery.
    In this philosophical-ethical context, 'master over' idiomatically conveys dominion
    over something. 'Sovereign' would sound too political in English here.
- source_word: τῶν παθῶν
  chosen: the passions
  alternatives:
  - the emotions
  - the sufferings
  - the impulses
  lexicon: LSJ
  rationale: In Hellenistic moral discourse, πάθη refers to passions or disordered
    emotional drives rather than mere neutral feelings. 'The passions' preserves the
    philosophical and ethical nuance better than 'emotions.'
- source_word: ὁ λογισμός
  chosen: reason
  alternatives:
  - rational judgment
  - the mind
  - reasoning
  lexicon: LSJ
  rationale: Here λογισμός is the faculty or exercise of rational thought central
    to the book's thesis. 'Reason' is concise and idiomatic, while 'rational judgment'
    is possible but heavier than the context requires.
