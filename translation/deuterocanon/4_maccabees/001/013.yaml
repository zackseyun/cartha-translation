  chosen_reading: reason is master over the passions
  alternative_readings:
  - rational judgment is sovereign over the passions
  - the mind has authority over the emotions
  rationale: The verse states the book's governing thesis in terms of reason's rule
    over passions. The chosen wording preserves the ethical-philosophical tension
    without importing later theological categories or reducing πάθη to neutral emotions.
