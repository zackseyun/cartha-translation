id: 4MA.11.25
reference: 4 Maccabees 11:25
source:
  edition: lxx-swete-1909
  text: τὸ γὰρ μὴ δυνηθῆναί σε μεταπεῖσαι τὸν λογισμὸν ἡμῶν, μήτε βιάσασθαι πρὸς τὴν
    μεμοφαγίαν, οὐ κατάλυσίς ἐστιν σου;
  language: Greek
  pages:
  - 752
  - 770
  - 771
  - 772
  - 773
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: For your not being able to persuade our reason, nor to compel us to eat defiled
    food—is that not your defeat?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more contextually, 'to eating forbidden meat' or 'to eating defiled
      food.' The Greek term itself is literally 'meat-eating,' but in this episode
      it refers to meat prohibited under the Jewish law.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ δυνηθῆναί
  chosen: not being able
  alternatives:
  - being unable
  - failing
  lexicon: BDAG
  rationale: 'The aorist passive infinitive of δύναμαι here functions idiomatically
    with the article as a substantival clause: ''the not being able.'' ''Not being
    able'' preserves the Greek structure and the emphasis on incapacity rather than
    merely unsuccessful attempt.'
- source_word: μεταπεῖσαι
  chosen: to persuade
  alternatives:
  - to win over
  - to change the mind of
  lexicon: BDAG
  rationale: The verb means to persuade or induce a change of mind. 'Persuade' is
    the most direct English equivalent; the object 'our reason' makes clear that the
    issue is moral-rational conviction.
- source_word: τὸν λογισμὸν ἡμῶν
  chosen: our reason
  alternatives:
  - our rational judgment
  - our way of thinking
  - our resolve
  lexicon: BDAG
  rationale: In 4 Maccabees λογισμός is a key term for reasoned moral judgment, often
    contrasted with passions. 'Our reason' preserves that thematic importance better
    than the more generic 'mind' or the more interpretive 'resolve.'
- source_word: βιάσασθαι
  chosen: to compel
  alternatives:
  - to force
  - to coerce
  lexicon: BDAG
  rationale: The middle infinitive here denotes using force against the speakers.
    'Compel' fits the rhetorical register and pairs well with 'persuade' as a contrast
    between argument and coercion.
- source_word: πρὸς τὴν μεμοφαγίαν
  chosen: to meat-eating
  alternatives:
  - to eating defiled food
  - to eating forbidden meat
  - to meat consumption
  lexicon: LSJ
  rationale: The rare noun μεμοφαγία refers literally to meat-eating. In context it
    concerns eating prohibited meat under coercion, but the Greek term itself is more
    specific than a broad 'defiled food.' 'Meat-eating' keeps close to the source
    while allowing the context to supply why it is objectionable.
- source_word: οὐ κατάλυσίς ἐστιν σου;
  chosen: is that not your defeat?
  alternatives:
  - is that not your overthrow?
  - is that not your undoing?
  - is that not your collapse?
  lexicon: BDAG
  rationale: κατάλυσις can denote dissolution, overthrow, or undoing. In this taunting
    rhetorical question, 'your defeat' communicates the sense clearly in modern English
    without sounding overly abstract.
