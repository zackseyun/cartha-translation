theological_decisions:
- issue: Rendering λογισμός in a philosophically and theologically charged context
  chosen_reading: our reason
  alternative_readings:
  - our rational judgment
  - our resolve
  rationale: 4 Maccabees emphasizes the supremacy of devout reason over passion. Translating
    λογισμός as 'reason' preserves the book's central conceptual vocabulary without
    over-expanding it into a paraphrase.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: How explicitly to interpret μεμοφαγία
  chosen_reading: meat-eating
  alternative_readings:
  - eating defiled food
  - eating forbidden meat
  rationale: The immediate narrative context makes clear that the meat is religiously
    prohibited, but the Greek noun itself names meat-eating. The main text stays close
    to the source, while a footnote preserves the contextualized alternative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
