translation:
  text: Your fire is cold to us, your catapults are painless, and your violence is
    powerless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your engines of torture are painless.' The Greek καταπέλται literally
      means 'catapults,' but in this context it may refer more broadly to instruments
      of torment.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πῦρ σου
  chosen: your fire
  alternatives:
  - the fire you use
  - your flames
  lexicon: LSJ
  rationale: A direct rendering preserves the concrete image of the torture instrument
    without unnecessary expansion.
- source_word: ψυχρὸν
  chosen: is cold
  alternatives:
  - is cool
  - feels cold
  lexicon: LSJ
  rationale: 'The adjective literally means ''cold.'' In context it is paradoxical
    rhetoric: the martyrs regard the persecutor''s fire as ineffective. ''Cold'' preserves
    the sharp contrast better than the softer ''cool.'''
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - for us
  lexicon: LSJ
  rationale: The dative marks reference; 'to us' is natural English and keeps the
    personal force of the claim.
- source_word: ἄπονοι
  chosen: cause no pain
  alternatives:
  - painless
  - without pain
  lexicon: LSJ
  rationale: Predicative 'painless' would sound awkward in English with 'catapults.'
    Rendering the sense verbally communicates that these engines of torture do not
    inflict pain on the speakers.
- source_word: οἱ καταπέλται
  chosen: your catapults
  alternatives:
  - the catapults
  - your engines of torture
  lexicon: LSJ
  rationale: καταπέλτης normally denotes a catapult or missile-engine. In this martyrdom
    context it likely refers to mechanical torture devices or instruments associated
    with assault. 'Catapults' keeps the Greek term's literal value; adding 'your'
    in English matches the possessive pattern of the surrounding clauses and clarifies
    address to the tyrant.
- source_word: ἀδύνατος
  chosen: is powerless
  alternatives:
  - is weak
  - has no power
  - is ineffective
  lexicon: LSJ
  rationale: The adjective means 'powerless' or 'unable.' 'Powerless' best matches
    the taunting declaration that the tyrant's force cannot prevail.
- source_word: ἡ βία σου
  chosen: your violence
  alternatives:
  - your force
  - your brutality
  lexicon: LSJ
  rationale: βία can mean force or violence. 'Violence' better fits the persecutory
    context and preserves the moral weight of the tyrant's coercion.
