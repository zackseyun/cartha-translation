id: 4MA.11.26
reference: 4 Maccabees 11:26
source:
  edition: lxx-swete-1909
  text: τὸ πῦρ σου ψυχρὸν ἡμῖν, καὶ ἄπονοι οἱ καταπέλται, καὶ ἀδύνατος ἡ βία σου.
  language: Greek
