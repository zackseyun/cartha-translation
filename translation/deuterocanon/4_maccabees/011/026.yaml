theological_decisions:
- issue: Rhetorical paradox in the martyrs' speech
  chosen_reading: Translate the imagery straightforwardly as a defiant claim that
    the tyrant's tortures are ineffective.
  alternative_readings:
  - Soften the paradox into 'your fire feels cool to us' or similar idiomatic language.
  rationale: The verse is not making a metaphysical statement about literal temperature
    but expressing steadfast endurance. A direct rendering preserves the rhetoric
    without over-interpreting it.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening weight.'
