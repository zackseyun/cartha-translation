theological_decisions:
- issue: How to render the programmatic phrase εὐσεβὴς ἐπιστήμη in 4 Maccabees
  chosen_reading: godly understanding
  alternative_readings:
  - pious reason
  - devout knowledge
  rationale: The book argues for the mastery of reason informed by reverence for God.
    Rendering the phrase as 'godly understanding' preserves that theological-ethical
    synthesis without importing later technical philosophical jargon. The alternatives
    are preserved because 'pious reason' is a recognized interpretive rendering in
    this work and may better foreground the book's theme for some readers.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it; readable modern English, not archaic or academic.'
