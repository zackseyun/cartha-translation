translation:
  text: For godly understanding is unconquerable, O tyrant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pious reason' or 'devout knowledge.' The Greek phrase combines reverence
      toward God with rational understanding.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνίκητος
  chosen: unconquerable
  alternatives:
  - invincible
  - not to be conquered
  lexicon: LSJ
  rationale: The adjective means incapable of being conquered or overcome. 'Unconquerable'
    preserves the predicate force in natural English while staying close to the Greek.
    'Invincible' is possible, but 'unconquerable' more transparently reflects the
    verbal root νικάω ('to conquer').
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: LSJ
  rationale: The conjunction gives explanatory support to the surrounding argument.
    'For' is the most direct and idiomatic rendering in elevated English.
- source_word: ὦ τύραννε
  chosen: O tyrant
  alternatives:
  - tyrant
  - O despot
  lexicon: LSJ
  rationale: The vocative particle ὦ marks direct address. 'Tyrant' is the standard
    rendering of τύραννος here and fits the polemical address to the ruler.
- source_word: ἡ εὐσεβὴς ἐπιστήμη
  chosen: godly understanding
  alternatives:
  - pious reason
  - devout knowledge
  - godly knowledge
  lexicon: LSJ
  rationale: In 4 Maccabees, ἐπιστήμη denotes rational understanding/knowledge, and
    εὐσεβής qualifies it as shaped by reverence toward God. 'Godly understanding'
    communicates both the intellectual and religious dimensions in readable modern
    English. 'Pious reason' is a traditional option in this book, but 'reason' can
    sound narrower or more philosophical than the immediate Greek here; 'knowledge'
    is possible, but 'understanding' better captures practical rational discernment
    in context.
