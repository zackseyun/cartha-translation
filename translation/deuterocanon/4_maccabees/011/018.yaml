translation:
  text: On it, while being stretched out with measured care and disjointed, he was
    being burned underneath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carefully' or 'methodically'; the Greek adverb emphasizes deliberate,
      regulated action in the torture.
    reason: lexical_alternative
  - marker: b
    text: Or 'having his joints dislocated' or 'with his limbs wrenched apart'; the
      Greek verb refers to violent dislocation of the body's joints or vertebrae.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφ' οὗ
  chosen: On it
  alternatives:
  - upon which
  - on which
  lexicon: LSJ
  rationale: Refers back to the torture device or surface mentioned in the prior context.
    'On it' is natural English while preserving the anaphoric force of the Greek.
- source_word: κατατεινόμενος
  chosen: being stretched out
  alternatives:
  - being stretched tight
  - being extended
  lexicon: LSJ
  rationale: The participle conveys being drawn taut or stretched on an instrument
    of torture. 'Being stretched out' is idiomatic and preserves the physical sense.
- source_word: εὐμελῶς
  chosen: with measured care
  alternatives:
  - carefully
  - methodically
  - skillfully
  lexicon: LSJ
  rationale: The adverb literally suggests in a well-ordered or carefully regulated
    manner. Because the context is torture, 'with measured care' preserves the chilling
    deliberateness better than the flatter 'carefully.'
- source_word: ἐκσφονδυλιζόμενος
  chosen: disjointed
  alternatives:
  - having his joints wrenched apart
  - being dislocated
  - being torn limb from limb
  lexicon: LSJ
  rationale: The verb denotes dislocating or wrenching the vertebrae/joints. 'Disjointed'
    is concise and keeps the passive bodily violence without over-specifying beyond
    the Greek.
- source_word: ὑπεκαίετο
  chosen: he was being burned underneath
  alternatives:
  - he was being scorched from below
  - he was being burned beneath
  lexicon: LSJ
  rationale: The imperfect passive indicates ongoing burning, and the prefix ὑπο-
    suggests from underneath/below. 'He was being burned underneath' preserves both
    the progressive aspect and the spatial nuance.
