id: 4MA.11.3
reference: 4 Maccabees 11:3
source:
  edition: lxx-swete-1909
  text: αὐτὸς δʼ ἀπʼ ἐμαυτοῦ παρῆλθον, ὅπως κἀμὲ κατακτείνας, περὶ πλειόνων ἀδικημάτων
    ὀφλήσῃς τῇ οὐρανίᾳ δίκῃ τιμωρίαν.
  language: Greek
  pages:
  - 752
  - 770
  - 771
  - 772
  - 773
  - 786
  - 787
  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: But I came forward of my own accord, so that, after killing me also, you might
    incur punishment from heavenly justice for still more acts of wrongdoing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I myself came on my own initiative' or 'I stepped forward of my own
      accord.'
    reason: lexical_alternative
  - marker: b
    text: '''Heavenly justice'' may also be rendered ''the justice of heaven'' or
      ''heavenly judgment.'''
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτὸς
  chosen: I
  alternatives:
  - I myself
  lexicon: LSJ
  rationale: Used with ἀπʼ ἐμαυτοῦ to emphasize the speaker's personal initiative.
    English can carry this without an explicit 'myself,' though the emphasis is reflected
    by 'of my own accord.'
- source_word: ἀπʼ ἐμαυτοῦ
  chosen: of my own accord
  alternatives:
  - from myself
  - on my own initiative
  lexicon: LSJ
  rationale: Idiomatic expression indicating voluntary action or personal initiative,
    not spatial movement. 'Of my own accord' is natural modern English and preserves
    the sense.
- source_word: παρῆλθον
  chosen: came forward
  alternatives:
  - came
  - approached
  - stepped forward
  lexicon: LSJ
  rationale: In context the speaker presents himself voluntarily before the tyrant.
    'Came forward' captures both movement and self-presentation better than the bare
    'came.'
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: LSJ
  rationale: Introduces purpose. 'So that' is clear and idiomatic.
- source_word: κἀμέ
  chosen: me also
  alternatives:
  - even me
  - me too
  lexicon: LSJ
  rationale: The crasis adds 'also'; the speaker includes himself among those to be
    killed. 'Me also' preserves the additive force.
- source_word: κατακτείνας
  chosen: after killing
  alternatives:
  - by killing
  - having killed
  lexicon: LSJ
  rationale: Aorist participle prior to the main verb ὀφλήσῃς. 'After killing' makes
    the temporal relation explicit and natural in English.
- source_word: περὶ πλειόνων ἀδικημάτων
  chosen: for still more acts of wrongdoing
  alternatives:
  - for greater crimes
  - concerning more injustices
  lexicon: LSJ
  rationale: περὶ with ὀφλήσῃς expresses liability with respect to additional offenses.
    'Still more acts of wrongdoing' preserves the comparative sense without overlegalizing
    the phrase.
- source_word: ὀφλήσῃς
  chosen: you might incur
  alternatives:
  - you might owe
  - you might become liable for
  lexicon: LSJ
  rationale: The verb denotes incurring a debt or liability. 'Incur' works well with
    punishment and keeps the juridical nuance.
- source_word: τῇ οὐρανίᾳ δίκῃ
  chosen: from heavenly justice
  alternatives:
  - to heavenly justice
  - by heavenly justice
  - from the heavenly judgment
  lexicon: LSJ
  rationale: δίκη here denotes justice personified or divine justice/judgment. In
    English, 'incur ... from heavenly justice' communicates the source of punishment
    more naturally than a wooden dative rendering.
- source_word: τιμωρίαν
  chosen: punishment
  alternatives:
  - penalty
  - vengeance
  lexicon: LSJ
  rationale: The noun denotes punitive retribution. 'Punishment' is the clearest general
    rendering in context.
