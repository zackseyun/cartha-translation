- issue: Rendering τῇ οὐρανίᾳ δίκῃ
  chosen_reading: heavenly justice
  alternative_readings:
  - the justice of heaven
  - heavenly judgment
  rationale: The phrase points to divine retributive justice without requiring a fully
    personified English expression. 'Heavenly justice' preserves the theological claim
    that punishment comes from a transcendent moral order, while avoiding overinterpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
