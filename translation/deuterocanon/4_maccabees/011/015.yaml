theological_decisions:
- issue: Whether to make the implied object more explicit as 'principles' or 'laws'
    rather than the literal repeated neuter plural 'the same things'
  chosen_reading: Retain the broader phrase 'the same things' in both clauses
  alternative_readings:
  - the same principles
  - the same causes
  - the same laws
  rationale: The Greek repeats τὰ αὐτά / τῶν αὐτῶν without specifying the object.
    In the larger context the referent involves shared commitments under the law,
    but this verse itself states the principle more generally. Preserving the broader
    wording avoids importing a narrower doctrinal or ideological object than the text
    explicitly names.
  doctrine_reference: Translation philosophy §§1, 3, 5
