theological_decisions:
- issue: Rendering νόμος in a Jewish martyrdom context
  chosen_reading: law
  alternative_readings:
  - Law
  rationale: The referent is the ancestral/divine law observed by the martyrs. Lowercase
    “law” is retained in the main text for natural English, while the possessive “our
    law” and context make the specific covenantal referent clear.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
