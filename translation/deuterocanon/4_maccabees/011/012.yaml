id: 4MA.11.12
reference: 4 Maccabees 11:12
source:
  edition: lxx-swete-1909
  text: Καλῶς, ἔλεγεν, ἄκων, ὁ τύραννος, χάριτας ἡμῖν χαρίζῃ, καλῶς, διὰ γενναιοτέρων
    πόνων ἐπιδείξασθαι παρέχων τὴν εἰς τὸν νόμον ἡμῶν καρτερίαν.
  language: Greek
  pages:
  - 752
  - 770
  - 771
  - 772
  - 773
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: “Good,” said the tyrant, though unwillingly, “he grants us favors—good indeed—by
    giving us the opportunity, through nobler sufferings, to display our endurance
    for our law.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “against his will.” The Greek ἄκων marks that the speaker’s acknowledgment
      is reluctant.
    reason: lexical_alternative
  - marker: b
    text: 'The phrase “grants us favors” is ironic: the persecutor’s tortures become
      an occasion for the martyrs to show their steadfastness.'
    reason: cultural_note
lexical_decisions:
- source_word: Καλῶς
  chosen: Good
  alternatives:
  - Well
  - It is good
  lexicon: LSJ
  rationale: Used as an approving exclamation. Repeating “Good” preserves the emphatic
    repetition in Greek better than smoothing it away.
- source_word: ἔλεγεν
  chosen: he said
  alternatives:
  - he was saying
  lexicon: LSJ
  rationale: Imperfect can be rendered simply in English narrative as “he said” without
    losing sense; the focus here is the content of the speech rather than iterative
    aspect.
- source_word: ἄκων
  chosen: though unwillingly
  alternatives:
  - unwillingly
  - against his will
  lexicon: LSJ
  rationale: Adverbial participial sense modifying the speech-act or concession. “Though
    unwillingly” captures the concessive nuance naturally in English.
- source_word: ὁ τύραννος
  chosen: the tyrant
  alternatives:
  - the king
  - the ruler
  lexicon: LSJ
  rationale: τύραννος is a morally charged designation in this book; “the tyrant”
    preserves the evaluative force and literary consistency.
- source_word: χάριτας ἡμῖν χαρίζῃ
  chosen: grants us favors
  alternatives:
  - shows us kindnesses
  - bestows graces on us
  lexicon: LSJ
  rationale: 'The cognate construction intensifies the irony: the persecutor is said
    to be doing them a favor. “Grants us favors” is idiomatic and preserves that irony.'
- source_word: διὰ γενναιοτέρων πόνων
  chosen: through nobler sufferings
  alternatives:
  - through more noble pains
  - by means of more courageous toils
  lexicon: LSJ
  rationale: πόνοι here refers to painful ordeals/sufferings, not ordinary labor.
    γενναιοτέρων carries the sense of noble or worthy rather than merely intense.
- source_word: ἐπιδείξασθαι
  chosen: to display
  alternatives:
  - to demonstrate
  - to show forth
  lexicon: LSJ
  rationale: 'Infinitive of purpose/result after παρέχων: the tyrant provides the
    opportunity for them to make something evident. “Display” is concise and natural.'
- source_word: παρέχων
  chosen: by giving us the chance
  alternatives:
  - providing
  - affording
  lexicon: LSJ
  rationale: Participial means/instrument. Expanded slightly for readable English
    while staying close to the sense of affording an opportunity.
- source_word: τὴν εἰς τὸν νόμον ἡμῶν καρτερίαν
  chosen: our endurance for our law
  alternatives:
  - our steadfastness toward our law
  - our perseverance in relation to our law
  lexicon: LSJ
  rationale: καρτερία denotes endurance/steadfastness under suffering. The phrase
    εἰς τὸν νόμον expresses orientation or commitment toward the law; “for our law”
    communicates loyalty in context more naturally than a wooden “toward.”
