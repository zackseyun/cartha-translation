theological_decisions:
- issue: Anthropological distinction between πνεῦμα and σῶμα
  chosen_reading: Render the pair distinctly as 'spirit' and 'body'
  alternative_readings:
  - render πνεῦμα more psychologically as 'mind'
  - render πνεῦμα physically as 'breath'
  rationale: The Greek juxtaposes inner and outer dimensions of suffering. Preserving
    'spirit' and 'body' maintains the text's dual description without importing a
    more developed doctrinal anthropology.
  doctrine_reference: Preserve theological tension rather than resolve it.
