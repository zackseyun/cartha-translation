theological_decisions:
- issue: Rendering σωτήριον-related language in a deuterocanonical martyrdom context
  chosen_reading: deliverance
  alternative_readings:
  - salvation
  rationale: The verse speaks of hope from God in the face of suffering. 'Deliverance'
    fits the immediate context of hoped-for rescue while still allowing broader theological
    resonance. 'Salvation' remains a viable alternative but could sound more systematized
    than the immediate Greek demands.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than over-resolve'
