  - 788
  confidence: high
  validation: agree
translation:
  text: if indeed you had human feelings of desire, and had hope from God for deliverance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'salvation' for 'deliverance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴπερ
  chosen: if indeed
  alternatives:
  - if really
  - since indeed
  lexicon: LSJ
  rationale: Introduces a pointed conditional with rhetorical force. 'If indeed' preserves
    both the conditional sense and the speaker's sharp challenge better than a flat
    'if'.
- source_word: ἠσθάνου
  chosen: you had ... awareness
  alternatives:
  - you perceived
  - you felt
  - you understood
  lexicon: LSJ
  rationale: From αἰσθάνομαι, denoting perception or awareness. Because it governs
    ἀνθρώπους πόθων in an idiomatic way, 'had awareness' communicates experiential
    perception without overcommitting to either emotional 'felt' or purely intellectual
    'understood'.
- source_word: ἀνθρώπους
  chosen: human
  alternatives:
  - of men
  - manly
  - humanly
  lexicon: LSJ
  rationale: 'Used adjectivally with πόθων rather than as a standalone noun. ''Human''
    best captures the contrast implied: ordinary human longings, as opposed to the
    steadfastness expected in the context.'
- source_word: πόθων
  chosen: desires
  alternatives:
  - longings
  - yearnings
  - affections
  lexicon: LSJ
  rationale: πόθος denotes longing or desire. 'Desires' is concise and natural in
    English; 'longings' is possible but slightly more emotive than necessary.
- source_word: ἐλπίδα
  chosen: hope
  alternatives:
  - expectation
  - confidence
  lexicon: LSJ
  rationale: The standard sense is 'hope.' 'Confidence' would interpret the term more
    strongly than the Greek requires.
- source_word: παρὰ θεῷ
  chosen: from God
  alternatives:
  - with God
  - before God
  - in God's presence
  lexicon: LSJ
  rationale: With ἔχω and ἐλπίδα, παρά with the dative naturally conveys source or
    basis located with God. 'From God' is the clearest idiomatic English rendering
    here.
- source_word: σωτηρίου
  chosen: for deliverance
  alternatives:
  - for salvation
  - of rescue
  lexicon: LSJ
  rationale: The genitive depends on ἐλπίδα and denotes the hoped-for outcome. In
    4 Maccabees, the term can carry both rescue and salvation overtones; 'deliverance'
    preserves the immediate sense without importing later doctrinal freight too strongly.
