id: 4MA.11.7
reference: 4 Maccabees 11:7
source:
  edition: lxx-swete-1909
  text: εἴπερ ἠσθάνου ἀνθρώπους πόθων, καὶ ἐλπίδα εἶχες παρὰ θεῷ σωτηρίου.
  language: Greek
  pages:
  - 752
  - 770
  - 771
  - 772
  - 773
