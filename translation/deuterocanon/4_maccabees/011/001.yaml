id: 4MA.11.1
reference: 4 Maccabees 11:1
source:
  edition: lxx-swete-1909
  text: Ὡς δὲ καὶ οὗτος ταῖς βασάνοις καταικισθεὶς ἐναπέθανεν, ὁ πέμπτος παρεσήμαινεν,
    λέγων
