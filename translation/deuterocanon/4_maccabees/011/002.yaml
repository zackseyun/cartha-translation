translation:
  text: I am not about to shrink back, tyrant, from the torture endured for the sake
    of virtue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not refuse the torture for the sake of virtue.' The Greek verb
      can denote declining or refusing, but in context it carries the sense of not
      recoiling from suffering.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ μέλλω
  chosen: I am not about to
  alternatives:
  - I will not
  - I do not intend to
  lexicon: BDAG
  rationale: μέλλω with infinitive can express imminent intention or resolve. 'I am
    not about to' preserves the speaker's emphatic refusal and vivid immediacy better
    than a flat future.
- source_word: τύραννε
  chosen: tyrant
  alternatives:
  - despot
  - O tyrant
  lexicon: LSJ
  rationale: The vocative directly addresses the ruler with a morally charged term.
    'Tyrant' is the natural English equivalent and preserves the confrontational force.
- source_word: πρὸς τὸν ... βασανισμόν
  chosen: from the torture
  alternatives:
  - from the torment
  - from the ordeal of torture
  lexicon: LSJ
  rationale: With παραιτεῖσθαι, the phrase conveys declining or shrinking from the
    torture. 'Torture' best reflects βασανισμός in this martyrdom context.
- source_word: ὑπὲρ τῆς ἀρετῆς
  chosen: for the sake of virtue
  alternatives:
  - for virtue
  - on behalf of virtue
  - for excellence
  lexicon: LSJ
  rationale: ἀρετή here denotes moral excellence/courageous virtue, a key theme in
    4 Maccabees. 'For the sake of virtue' is idiomatic and preserves the causal-ethical
    sense of ὑπέρ.
- source_word: παραιτεῖσθαι
  chosen: shrink back
  alternatives:
  - refuse
  - beg off
  - decline
  lexicon: BDAG
  rationale: In context the sense is not merely verbal refusal but recoiling from
    undergoing torture. 'Shrink back' captures the volitional and cowardice-tinged
    nuance in this speech.
