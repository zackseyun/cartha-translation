id: 4MA.11.2
reference: 4 Maccabees 11:2
source:
  edition: lxx-swete-1909
  text: Οὐ μέλλω, τύραννε, πρὸς τὸν ὑπὲρ τῆς ἀρετῆς βασανισμὸν παραιτεῖσθαι.
  language: Greek
