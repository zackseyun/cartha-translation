id: 4MA.11.23
reference: 4 Maccabees 11:23
source:
  edition: lxx-swete-1909
  text: μέγαν σοι προσβαλλὼν καὶ αὐτὸς ἀλάστορα, καινοτόμε τῶν βασάνων, καὶ πολέμιε
    τῶν ἀληθῶς εὐσεβούντων.
  language: Greek
  pages:
  - 752
  - 770
  - 771
  - 772
  - 773
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: By bringing upon yourself a great avenger as well, you innovator of tortures
    and enemy of those who are truly reverent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great avenging spirit'; the Greek ἀλάστωρ can carry the sense of a
      personal avenger or a force of retribution.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέγαν
  chosen: great
  alternatives:
  - mighty
  lexicon: LSJ
  rationale: The adjective intensifies the force of ἀλάστορα. 'Great' is the most
    direct and idiomatic rendering in English here.
- source_word: σοι
  chosen: against yourself
  alternatives:
  - for yourself
  - to yourself
  lexicon: LSJ
  rationale: 'With προσβαλλὼν in this context, the dative is best taken as disadvantageous/reflexive
    in sense: the tyrant is bringing something upon himself. ''Against yourself''
    makes the hostile result clear in English.'
- source_word: προσβαλλὼν
  chosen: bringing against
  alternatives:
  - bringing upon
  - incurring
  - hurling against
  lexicon: LSJ
  rationale: The participle literally involves throwing or bringing toward/against.
    In context it describes causing hostile consequence to come upon oneself. 'Bringing
    against' preserves the verbal force while fitting the syntax with σοι.
- source_word: καὶ αὐτὸς
  chosen: as well
  alternatives:
  - also
  - you too
  lexicon: LSJ
  rationale: The phrase adds another consequence to the tyrant's actions. 'As well'
    captures the additive emphasis without overloading the English line.
- source_word: ἀλάστορα
  chosen: avenger
  alternatives:
  - avenging spirit
  - destroyer
  - curse
  lexicon: LSJ
  rationale: ἀλάστωρ can denote an avenger or avenging spirit, often with a sense
    of divine or fateful retribution. 'Avenger' is concise and natural in English;
    the more mythic nuance is preserved in a footnote.
- source_word: καινοτόμε
  chosen: innovator
  alternatives:
  - inventor
  - deviser
  lexicon: LSJ
  rationale: The vocative addresses the tyrant as one who introduces novelties. In
    context of βασάνων, 'innovator' conveys the idea of devising unprecedented tortures.
- source_word: βασάνων
  chosen: of tortures
  alternatives:
  - of torments
  - of ordeals
  lexicon: LSJ
  rationale: In this martyrdom context, βασάνων refers to instruments or acts of torture
    rather than generic suffering. 'Tortures' is the clearest modern rendering.
- source_word: πολέμιε
  chosen: enemy
  alternatives:
  - foe
  - hostile one
  lexicon: LSJ
  rationale: The vocative is a direct denunciation. 'Enemy' is straightforward and
    preserves the personal hostility.
- source_word: τῶν ἀληθῶς εὐσεβούντων
  chosen: of those who are truly reverent
  alternatives:
  - of those who are truly godly
  - of those who truly worship rightly
  lexicon: LSJ
  rationale: εὐσεβέω denotes reverence/piety toward God. 'Those who are truly reverent'
    preserves the religious sense without importing later technical jargon. 'Truly'
    renders ἀληθῶς emphatically.
