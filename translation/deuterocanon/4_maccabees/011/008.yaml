theological_decisions:
- issue: Relational force of ἀλλότριος θεοῦ
  chosen_reading: The phrase is rendered as alienation/estrangement from God, not
    merely ethnic or social foreignness.
  alternative_readings:
  - foreign to God
  - belonging to another rather than to God
  rationale: In context the mother rebukes impiety and opposition to the faithful;
    the phrase describes the tyrant's stance relative to God. The translation preserves
    the relational and moral force without importing later doctrinal terminology.
  doctrine_reference: Translation philosophy §§1, 3, 6
