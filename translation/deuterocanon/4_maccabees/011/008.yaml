translation:
  text: Now look, being alien to God, you are making war against those who are devout
    toward God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being estranged from God' or 'being foreign to God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you fight against' or 'you wage war against.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν
  chosen: Now
  alternatives:
  - as it is
  - at this point
  lexicon: BDAG
  rationale: Temporal/discourse marker introducing the speaker's present accusation;
    'Now' is natural and preserves the rhetorical force.
- source_word: ἰδὲ
  chosen: look
  alternatives:
  - see
  - behold
  lexicon: BDAG
  rationale: Imperative of attention. 'Look' conveys the direct, confrontational summons
    in readable modern English; 'behold' would sound archaic.
- source_word: ἀλλότριος ὢν θεοῦ
  chosen: as one alien to God
  alternatives:
  - being estranged from God
  - being foreign to God
  - being outside God
  lexicon: BDAG
  rationale: ἀλλότριος with the genitive conveys belonging to another / being alien
    or estranged with respect to God. 'Alien to God' preserves the sharp relational
    separation without overinterpreting it as a fully developed theological category.
- source_word: πολεμεῖς
  chosen: you are making war against
  alternatives:
  - you fight against
  - you wage war against
  lexicon: BDAG
  rationale: The verb denotes active hostility in conflict. 'Making war against' keeps
    the martial intensity better than the flatter 'fight against,' while remaining
    idiomatic.
- source_word: τοὺς εὐσεβοῦντας
  chosen: those who are devout
  alternatives:
  - the godly
  - those who practice piety
  - those who worship faithfully
  lexicon: BDAG
  rationale: Present participle from εὐσεβέω, referring to people showing reverence/piety.
    'Those who are devout' is clear modern English and preserves the ongoing character
    of their piety.
- source_word: εἰς τὸν θεόν
  chosen: toward God
  alternatives:
  - to God
  - with respect to God
  lexicon: BDAG
  rationale: The preposition εἰς after εὐσεβέω marks the direction/object of devotion.
    'Toward God' sounds natural in English and reflects the directional nuance better
    than a bare 'to God' in this construction.
