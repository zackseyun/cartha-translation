  text: ἐφʼ ὃν δήσαντες αὐτὸν ἐπὶ τὰ γόνατα, καὶ ταῦτα ποδάγραις σιδηραῖς ἐφαρμόσαντες
    τὴν ὀσφὺν αὐτοῦ ἐπὶ τὸν τροχιαῖον σφῆνα κατέκαμψαν· περὶ ὃν ὅλος ἐπὶ τὸν τροχὸν
    σκορπίου τρόπον ἀνακλώμενος ἐξεμελίζετο.
  language: Greek
