translation:
  text: Binding him to it on his knees, and fastening these with iron shackles, they
    bent his waist down over the wheel's wedge; around which, entirely bent back upon
    the wheel like a scorpion, he was being dismembered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with iron fetters' or 'with iron leg-irons'; the Greek term refers specifically
      to restraints placed on the feet or legs.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the wheel’s wedge' reflects specialized torture-device language;
      the exact mechanical feature is difficult to specify more narrowly from the
      Greek alone.
    reason: cultural_note
  - marker: c
    text: Or 'bent back like a scorpion'; the comparison likely evokes the body being
      arched or curled backward under torture.
    reason: lexical_alternative
lexical_decisions:
- source_word: δήσαντες
  chosen: binding
  alternatives:
  - tying
  - having bound
  lexicon: LSJ
  rationale: Aorist participle from δέω, indicating the torturers first secured him
    physically. 'Binding' is natural modern English and preserves the sequence.
- source_word: ἐπὶ τὰ γόνατα
  chosen: onto his knees
  alternatives:
  - upon his knees
  - to his knees
  lexicon: LSJ
  rationale: The phrase indicates forced positioning rather than voluntary kneeling.
    'Onto his knees' conveys imposed posture more clearly than the more neutral 'upon
    his knees.'
- source_word: ποδάγραις σιδηραῖς
  chosen: with iron shackles
  alternatives:
  - with iron fetters
  - with iron leg-irons
  lexicon: LSJ
  rationale: ποδάγραι are restraints for the feet or legs. 'Iron shackles' is clear,
    idiomatic, and preserves the instrumentality of the dative phrase.
- source_word: ἐφαρμόσαντες
  chosen: fastening
  alternatives:
  - fitting
  - clamping on
  - applying
  lexicon: LSJ
  rationale: The participle describes attaching the restraints securely. 'Fastening'
    is both accurate and readable in context.
- source_word: τὴν ὀσφὺν αὐτοῦ
  chosen: his waist
  alternatives:
  - his loins
  - his lower back
  lexicon: LSJ
  rationale: ὀσφύς can denote the loins/waist region. 'Waist' avoids archaic diction
    ('loins') while still indicating the body area being bent.
- source_word: τροχιαῖον σφῆνα
  chosen: the wheel’s wedge
  alternatives:
  - the wedge of the wheel
  - the wheel-frame wedge
  lexicon: LSJ
  rationale: σφήν is a wedge; τροχιαῖον is adjectival, relating to the wheel. The
    exact torture-device terminology is specialized, but 'the wheel’s wedge' best
    preserves the concrete image without over-interpreting the apparatus.
- source_word: κατέκαμψαν
  chosen: they bent
  alternatives:
  - they forced down
  - they doubled over
  lexicon: LSJ
  rationale: The verb means to bend down or force into a bent position. 'They bent'
    is direct and leaves the object and mechanism explicit in the surrounding phrase.
- source_word: σκορπίου τρόπον
  chosen: like a scorpion
  alternatives:
  - in the manner of a scorpion
  - scorpion-like
  lexicon: LSJ
  rationale: τρόπον marks manner or comparison. 'Like a scorpion' is the most natural
    English simile and preserves the vivid image.
- source_word: ἀνακλώμενος
  chosen: twisted back
  alternatives:
  - bent back
  - curved back upon himself
  lexicon: LSJ
  rationale: The participle suggests being bent or twisted backward. 'Twisted back'
    fits the torture context and the comparison to a scorpion's curved form.
- source_word: ἐξεμελίζετο
  chosen: he was being dismembered
  alternatives:
  - he was being torn limb from limb
  - his limbs were being pulled apart
  lexicon: LSJ
  rationale: The imperfect passive conveys an ongoing process of dismemberment. 'He
    was being dismembered' is precise and grave without adding imagery beyond the
    Greek.
