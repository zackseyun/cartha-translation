translation:
  text: After he said these things, they led him to the wheel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the torture wheel used in the martyrdom account.
    reason: cultural_note
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: LSJ
  rationale: Neuter plural demonstrative referring back to the preceding words; 'these
    things' preserves the plural form and standard idiom better than collapsing to
    singular 'this.'
- source_word: εἰπόντα
  chosen: said
  alternatives:
  - spoken
  - having said
  lexicon: BDAG
  rationale: Aorist participle of λέγω modifying αὐτόν. In English, 'after he said'
    naturally conveys the participial action prior to the main verb without sounding
    wooden.
- source_word: παρῆγον
  chosen: they led
  alternatives:
  - they brought
  - they were leading
  lexicon: LSJ
  rationale: Imperfect of παράγω here denotes conducting or leading someone onward.
    'Led' fits the torture-scene context and reads naturally; 'brought' is possible
    but less vivid about forced movement.
- source_word: ἐπὶ
  chosen: to
  alternatives:
  - onto
  - up to
  lexicon: BDAG
  rationale: With motion toward an object, ἐπί can mean 'to' or 'onto.' Because the
    phrase likely means being taken to the instrument for torture rather than yet
    placed on it, 'to' is the most restrained rendering.
- source_word: τὸν τροχόν
  chosen: the wheel
  alternatives:
  - the rack-wheel
  - the torture wheel
  lexicon: LSJ
  rationale: τροχός literally means 'wheel.' In this martyrdom context it refers to
    the torture device, but the simple 'the wheel' preserves the Greek term while
    allowing the context to supply its function without over-interpretation.
