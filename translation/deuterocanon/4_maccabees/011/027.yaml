  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: For our guards stand over us not for a tyrant, but for divine law; for this
    reason we have reason undefeated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our reasoning is invincible' or 'we possess unconquerable reason.' The
      Greek λογισμός is a key term in 4 Maccabees for the rational faculty.
    reason: lexical_alternative
lexical_decisions:
- source_word: τυράννου
  chosen: tyrant
  alternatives:
  - king
  - ruler
  lexicon: LSJ
  rationale: τύραννος in Greek commonly denotes a ruler with oppressive or absolute
    power; 'tyrant' preserves the negative moral force better than the more neutral
    'king' or 'ruler'.
- source_word: θείου νόμου
  chosen: divine law
  alternatives:
  - God's law
  - the law of God
  lexicon: LSJ
  rationale: The adjective-noun phrase literally means 'divine law.' This keeps the
    Greek wording close while clearly indicating law belonging to or characterized
    by God.
- source_word: προεστήκασιν
  chosen: stand over
  alternatives:
  - are set over
  - preside over
  - have charge over
  lexicon: LSJ
  rationale: The perfect form of προΐστημι here conveys being placed in a position
    of authority or oversight. 'Stand over' is idiomatic and preserves the image of
    guardians exercising oversight.
- source_word: οἱ δορυφόροι
  chosen: guards
  alternatives:
  - bodyguards
  - spearmen
  - soldiers
  lexicon: LSJ
  rationale: Though literally 'spear-bearers,' in context it refers to the tyrant's
    armed attendants/executioners. 'Guards' communicates the role in natural English
    without over-specifying weaponry.
- source_word: ἀνίκητον
  chosen: undefeated
  alternatives:
  - invincible
  - unconquerable
  lexicon: LSJ
  rationale: ἀνίκητος means not conquered or not overcome. 'Undefeated' is clear modern
    English and avoids sounding overly elevated, while preserving the sense of not
    being overcome.
- source_word: λογισμόν
  chosen: reason
  alternatives:
  - reasoning
  - rational judgment
  - mind
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for rational faculty or reasoned
    judgment governing the passions. 'Reason' is the most concise and contextually
    appropriate rendering, preserving the book's philosophical emphasis.
- source_word: διὰ τοῦτο
  chosen: for this reason
  alternatives:
  - therefore
  - because of this
  lexicon: LSJ
  rationale: This phrase marks an inference from the preceding claim. 'For this reason'
    preserves the explanatory force more explicitly than a bare 'therefore'.
