theological_decisions:
- issue: Rendering the contrast between service to a human ruler and allegiance to
    God's law
  chosen_reading: not for a tyrant, but for divine law
  alternative_readings:
  - not under a tyrant, but under divine law
  - not on behalf of a tyrant, but of divine law
  rationale: The Greek contrasts the authority under which the guards operate. The
    chosen wording preserves the antithesis without importing a broader doctrinal
    claim beyond the verse's immediate argument about loyalty and moral authority.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Original-language primacy over translation tradition.'
