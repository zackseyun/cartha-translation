id: 4MA.11.27
reference: 4 Maccabees 11:27
source:
  edition: lxx-swete-1909
  text: οὐ γὰρ τυράννου ἀλλὰ θείου νόμου προεστήκασιν ἡμῶν οἱ δορυφόροι· διὰ τοῦτο
    ἀνίκητον ἔχομεν τὸν λογισμόν.
  language: Greek
  pages:
  - 752
  - 770
  - 771
  - 772
  - 773
