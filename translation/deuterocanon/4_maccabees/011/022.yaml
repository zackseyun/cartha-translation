reference: 4 Maccabees 11:22
source:
  edition: lxx-swete-1909
  text: καλοκαγαθίᾳ καθωπλισμένος τεθήσομαι κἀγὼ μετὰ τῶν ἀδελφῶν μου,
  language: Greek
