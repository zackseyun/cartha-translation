theological_decisions:
- issue: Meaning of the passive τεθήσομαι in a martyrdom setting
  chosen_reading: 'A death/burial-oriented sense: ''will be laid down with my brothers'''
  alternative_readings:
  - will be placed with my brothers
  - will be appointed with my brothers
  rationale: The immediate context is the speaker's willingness to join his martyred
    brothers. A funerary or death-oriented nuance best fits the scene while remaining
    close to the Greek passive of τίθημι.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    contextual variance.
