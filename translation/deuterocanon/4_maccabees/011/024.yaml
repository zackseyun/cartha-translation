translation:
  text: Six young men have overthrown your tyranny.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἓξ
  chosen: Six
  lexicon: LSJ
  rationale: Straightforward cardinal numeral introducing the subject.
- source_word: μειράκια
  chosen: young men
  alternatives:
  - boys
  - youths
  - young lads
  lexicon: LSJ
  rationale: Diminutive/plural form referring to the speaker and his brothers as youthful
    males. 'Young men' preserves their youth without sounding childish; 'boys' could
    understate their moral agency, while 'youths' is possible but slightly less natural
    in modern English.
- source_word: κατελύσαμέν
  chosen: have overthrown
  alternatives:
  - have destroyed
  - have brought down
  - have undone
  lexicon: LSJ
  rationale: Aorist verb from καταλύω, here used in the sense of bringing down or
    nullifying power. 'Have overthrown' best fits the object 'your tyranny,' conveying
    decisive defeat rather than mere interruption.
- source_word: σου
  chosen: your
  lexicon: LSJ
  rationale: Second-person singular genitive possessive modifying 'tyranny.'
- source_word: τὴν τυραννίδα
  chosen: tyranny
  alternatives:
  - tyrannical rule
  - despotism
  lexicon: LSJ
  rationale: τυραννίς denotes tyrannical power or oppressive rule. 'Tyranny' is the
    most direct and idiomatic English equivalent.
