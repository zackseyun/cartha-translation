theological_decisions:
- issue: Force of the aorist verb in a taunt against the persecutor
  chosen_reading: 'Rendered as present-result English perfect: ''have overthrown'''
  alternative_readings:
  - 'simple past: ''overthrew'''
  - 'weakened idiom: ''have put an end to'''
  rationale: The Greek aorist states a completed act; in this rhetorical context,
    English perfect naturally conveys that the six martyrs' steadfastness has already
    brought the tyrant's power to ruin in a moral sense. This preserves the text's
    triumphal claim without importing a literal political overthrow beyond the verse's
    rhetoric.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
