id: 4MA.11.9
reference: 4 Maccabees 11:9
source:
  edition: lxx-swete-1909
  text: τοιαῦτα λέγοντα οἱ δορυφόροι δήσαντες αὐτὸν εἵλκον ἐπὶ τὸν καταπέλτην.
  language: Greek
  pages:
  - 752
  - 770
  - 771
  - 772
  - 773
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: As he was saying such things, the bodyguards bound him and dragged him to
    the wheel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the torture engine'; the Greek word can literally denote a 'catapult,'
      but here it refers to an instrument used for torture.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιαῦτα
  chosen: such things
  alternatives:
  - things like this
  - such words
  lexicon: LSJ
  rationale: Demonstrative plural referring generally to the content of his speech;
    'such things' is natural English and keeps the broad reference.
- source_word: λέγοντα
  chosen: as he was saying
  alternatives:
  - while he was saying
  - saying
  lexicon: LSJ
  rationale: Present participle modifying αὐτόν and indicating contemporaneous action;
    'as he was saying' conveys ongoing speech during the seizure.
- source_word: δορυφόροι
  chosen: bodyguards
  alternatives:
  - guards
  - spearmen
  lexicon: LSJ
  rationale: Literally 'spear-bearers,' but in Hellenistic usage commonly denotes
    royal guards or bodyguards. 'Bodyguards' best communicates the official enforcers
    in idiomatic English without over-literalizing the weapon imagery.
- source_word: δήσαντες
  chosen: bound
  alternatives:
  - having tied up
  - having fastened
  lexicon: LSJ
  rationale: Aorist participle from δέω, indicating they restrained him before dragging
    him away. 'Bound' is concise and forceful.
- source_word: εἵλκον
  chosen: dragged
  alternatives:
  - hauled
  - pulled
  lexicon: LSJ
  rationale: Imperfect verb expressing forceful movement; 'dragged' captures the violence
    of the action better than the more neutral 'pulled.'
- source_word: καταπέλτην
  chosen: wheel
  alternatives:
  - catapult
  - rack-like torture engine
  lexicon: LSJ
  rationale: Although καταπέλτης commonly means 'catapult,' in this martyrdom-torture
    context it refers to an instrument of torture, traditionally understood as the
    wheel. Rendering it 'wheel' communicates the likely referent in context; the more
    literal 'catapult' would mislead modern readers into imagining a battlefield machine
    rather than an execution device.
