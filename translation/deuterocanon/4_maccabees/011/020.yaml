id: 4MA.11.20
reference: 4 Maccabees 11:20
source:
  edition: lxx-swete-1909
  text: ὁ δὲ βασανιζόμενος ὢν ἱεροπρεποῦς αἰῶνος, ἔλεγεν, ἐφ' ὃν διὰ τὴν εὐσέβειαν
    εἰς γυμνασίαν πόνων ἀδελφοὶ τοσοῦτοι κληθέντες οὐκ ἐνικήθημεν.
  language: Greek
  pages:
