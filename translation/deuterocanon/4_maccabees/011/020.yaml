translation:
  text: But while he was being tortured, as one of a holy age, he said, “For the sake
    of godliness, when so many brothers were called to a contest of sufferings, we
    were not conquered.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as one of a sacred way of life' or 'as one belonging to a holy life.'
      The Greek phrase is unusual and may describe a consecrated manner of life rather
      than an 'age' in a temporal sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασανιζόμενος
  chosen: while he was being tortured
  alternatives:
  - being tormented
  - being put to the test
  lexicon: BDAG
  rationale: In martyrdom context βασανίζω refers to physical torture, not merely
    inner torment or generic testing. 'While he was being tortured' captures the durative
    participle and the concrete violence.
- source_word: ἱεροπρεποῦς αἰῶνος
  chosen: as one belonging to a holy age
  alternatives:
  - of a sacred way of life
  - of a priestly age
  - of a reverent life
  lexicon: LSJ
  rationale: The phrase is unusual. αἰών can denote age, lifetime, or mode of life;
    with ἱεροπρεπής ('befitting the sacred, holy, reverent') it likely characterizes
    the martyr's manner of life/existence as consecrated. 'As one belonging to a holy
    age' preserves the wording closely while remaining intelligible, avoiding overinterpretation
    toward 'priestly' or a fully paraphrastic 'holy life'.
- source_word: εὐσέβειαν
  chosen: godliness
  alternatives:
  - piety
  - reverence
  lexicon: BDAG
  rationale: In 4 Maccabees εὐσέβεια is a key theme denoting faithful devotion to
    God expressed in Torah loyalty. 'Godliness' is accessible modern English and preserves
    the God-directed sense better than the somewhat narrower 'piety'.
- source_word: γυμνασίαν πόνων
  chosen: training in sufferings
  alternatives:
  - exercise in pains
  - contest of sufferings
  - discipline of hardships
  lexicon: LSJ
  rationale: γυμνασία evokes training/exercise, and πόνων denotes pains, hardships,
    or sufferings. The athletic-training metaphor is important in 4 Maccabees, so
    'training in sufferings' keeps the metaphor without becoming wooden.
- source_word: ἀδελφοὶ
  chosen: brothers
  alternatives:
  - siblings
  - brothers and sisters
  lexicon: BDAG
  rationale: The referent is literally the martyr's brothers in the narrative, not
    a mixed-gender generic group. This follows the project's gender-accurate policy.
- source_word: κληθέντες
  chosen: were called
  alternatives:
  - were summoned
  - were appointed
  lexicon: BDAG
  rationale: The passive keeps the sense of being called/summoned into the ordeal.
    'Were called' is broad enough to preserve both summons and vocation-like nuance.
- source_word: οὐκ ἐνικήθημεν
  chosen: we were not conquered
  alternatives:
  - we were not defeated
  - we did not yield
  lexicon: BDAG
  rationale: The passive of νικάω emphasizes that the torturers did not overcome them.
    'Were not conquered' preserves the victory/defeat imagery central to the book's
    rhetoric.
