theological_decisions:
- issue: Interpretation of ἱεροπρεποῦς αἰῶνος
  chosen_reading: 'Rendered as a characterization of the speaker''s consecrated mode
    of existence: ''as one belonging to a holy age.'''
  alternative_readings:
  - '''of a sacred way of life'''
  - '''of a holy life'''
  rationale: The Greek is compressed and somewhat ambiguous. The translation preserves
    the unusual expression rather than resolving it fully into a smoother but more
    interpretive phrase. A footnote preserves the likely idiomatic alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
