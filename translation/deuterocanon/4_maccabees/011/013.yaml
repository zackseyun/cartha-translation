id: 4MA.11.13
reference: 4 Maccabees 11:13
source:
  edition: lxx-swete-1909
  text: Τελευτήσαντος δὲ καὶ τούτου, ὁ ἕκτος ἤγετο μειρακίσκος· ὃς πυνθανομένου τοῦ
    τυράννου εἰ βούλοιτο φαγὼν ἀπολύεσθαι, ὁ δὲ ἔφη
  language: Greek
  pages:
  - 752
  - 770
  - 771
