theological_decisions:
- issue: Moral characterization of the ruler via τύραννος
  chosen_reading: the tyrant
  alternative_readings:
  - the king
  - the ruler
  rationale: The author intentionally characterizes Antiochus with a condemnatory
    political term. Preserving 'tyrant' maintains the narrative's moral framing without
    adding theology beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Whether to make explicit that the food is forbidden/unlawful
  chosen_reading: if he ate
  alternative_readings:
  - if he ate the forbidden food
  - if he ate the sacrificial meat
  rationale: The immediate Greek does not specify the object of eating in this verse.
    The broader context supplies it, but adding it here would import information not
    stated in the clause itself.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
