translation:
  text: I am younger than my brothers in age, but in understanding I am their equal.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡλικίᾳ
  chosen: in age
  alternatives:
  - in years
  - in stature
  lexicon: LSJ
  rationale: ἡλικία can denote age or stature; in this sibling comparison, chronological
    age is the natural sense.
- source_word: νεώτερος
  chosen: younger
  alternatives:
  - younger one
  - junior
  lexicon: LSJ
  rationale: Comparative adjective indicating lesser age relative to the brothers.
- source_word: διανοίᾳ
  chosen: in understanding
  alternatives:
  - in mind
  - in intelligence
  - in thought
  lexicon: LSJ
  rationale: διανοία here refers to mental capacity or understanding; 'understanding'
    is natural English and fits the contrast with physical age.
- source_word: ἡλικιώτης
  chosen: their equal
  alternatives:
  - of equal age
  - a peer
  lexicon: LSJ
  rationale: Though etymologically related to age, in this rhetorical contrast it
    denotes one on a level with others; rendering it woodenly as 'same age' would
    contradict the first clause. 'Their equal' captures equality in the sphere of
    understanding.
- source_word: ἀδελφῶν
  chosen: brothers
  alternatives:
  - siblings
  lexicon: LSJ
  rationale: The masculine plural refers specifically to his brothers in the narrative
    context, so gender-accurate 'brothers' is preferred.
