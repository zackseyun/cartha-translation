id: 4MA.11.19
reference: 4 Maccabees 11:19
source:
  edition: lxx-swete-1909
  text: καὶ ὀβελίσκους ὀξεῖς πυρώσαντες, τοῖς νώτοις προσέφερον· καὶ τὰ πλευρὰ διαπείραντες,
    ἀπʼ αὐτοῦ τὰ σπλάγχνα διέκαιον.
  language: Greek
  pages:
  - 752
  - 770
  - 771
  - 772
  - 773
  - 786
  - 787
  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: And after heating sharp spits, they applied them to his back; and after piercing
    his sides, they burned his entrails from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from him.' The phrase likely describes the burning as reaching
      into his inner parts after his sides were pierced; hence 'from within.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀβελίσκους
  chosen: spits
  alternatives:
  - skewers
  - roasting spits
  - spikes
  lexicon: LSJ
  rationale: ὀβελίσκος denotes a small spit or pointed metal skewer. 'Spits' preserves
    the likely instrument more precisely than the generic 'spikes,' while still sounding
    natural in English.
- source_word: ὀξεῖς
  chosen: sharp
  alternatives:
  - pointed
  lexicon: LSJ
  rationale: The adjective emphasizes the pointed, piercing quality of the instruments.
    'Sharp' is the most direct and idiomatic rendering.
- source_word: πυρώσαντες
  chosen: after heating
  alternatives:
  - having heated
  - after setting on fire
  lexicon: LSJ
  rationale: 'The participle indicates prior action: the spits were made hot before
    being applied. ''After heating'' captures the sequence clearly in modern English.'
- source_word: τοῖς νώτοις προσέφερον
  chosen: they applied them to his back
  alternatives:
  - they brought them to his back
  - they pressed them against his back
  lexicon: LSJ
  rationale: προσφέρω here means to bring to or apply against. Given the torture context,
    'applied them to his back' best conveys the action without over-interpreting the
    force as 'pressed'.
- source_word: τὰ πλευρά
  chosen: his sides
  alternatives:
  - his ribs
  - his flanks
  lexicon: LSJ
  rationale: πλευρά commonly means side or flank. 'Sides' is anatomically broad and
    fits the context better than the more specific 'ribs'.
- source_word: διαπείραντες
  chosen: after piercing
  alternatives:
  - after running through
  - after stabbing through
  lexicon: LSJ
  rationale: The participle denotes penetrating through. 'After piercing' is accurate
    and restrained, matching the gruesome but formal tone of the passage.
- source_word: τὰ σπλάγχνα
  chosen: his entrails
  alternatives:
  - his inward parts
  - his internal organs
  lexicon: LSJ
  rationale: σπλάγχνα in this physical context refers to the inner organs/entrails,
    not metaphorical affections. 'Entrails' preserves the visceral force of the torture
    scene.
- source_word: διέκαιον
  chosen: they burned
  alternatives:
  - they scorched
  - they consumed with fire
  lexicon: LSJ
  rationale: The imperfect verb describes ongoing action in the torture sequence.
    'They burned' is the clearest idiomatic rendering.
- source_word: ἀπʼ αὐτοῦ
  chosen: from within
  alternatives:
  - from him
  - from his body
  lexicon: LSJ
  rationale: Literally the phrase is 'from him,' but in context with the piercing
    of his sides and burning of his entrails, the sense is that the burning reached
    inward from his body. 'From within' makes the implied spatial sense explicit in
    idiomatic English without changing the substance.
