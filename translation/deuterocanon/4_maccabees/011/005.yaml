theological_decisions:
- issue: Rendering εὐσεβοῦμεν in relation to God
  chosen_reading: we worship
  alternative_readings:
  - we revere
  - we practice piety toward
  rationale: Because the object is 'the Creator of all things,' the verb refers to
    explicitly religious devotion. 'Worship' makes that theological orientation plain
    without adding content beyond the Greek.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Force of the rhetorical question introduced by ἢ
  chosen_reading: Or does it not seem evil to you... ?
  alternative_readings:
  - Or does it not seem wrong... ?
  - Or is it not thought evil... ?
  rationale: The verse continues a rhetorical defense. Retaining 'Or' preserves the
    argumentative flow from the prior context rather than flattening the sentence
    into a standalone assertion.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
