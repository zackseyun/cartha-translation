translation:
  text: Or does it not seem evil to you that we worship the Creator of all things
    and live according to his virtuous law?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wrong' instead of 'evil.' The Greek κακόν can denote what is morally
      bad, blameworthy, or wrong.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'his virtuous law' could also be rendered 'his noble law' or
      'his excellent law.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κακὸν
  chosen: evil
  alternatives:
  - wrong
  - bad
  lexicon: LSJ
  rationale: The adjective denotes what is morally bad or blameworthy. 'Evil' best
    preserves the moral charge in the rhetorical question, stronger than the flatter
    'bad' and more direct than 'wrong.'
- source_word: οὐ δοκεῖ
  chosen: does it not seem
  alternatives:
  - does it not appear
  - is it not considered
  lexicon: LSJ
  rationale: δοκέω here expresses seeming or appearing in the interlocutor's judgment.
    'Does it not seem' keeps the rhetorical force and natural English idiom.
- source_word: τὸν πάντων κτίστην
  chosen: the Creator of all things
  alternatives:
  - the maker of all
  - the creator of everything
  lexicon: LSJ
  rationale: κτίστης is 'creator/founder.' With πάντων, the sense is universal. 'Creator
    of all things' is idiomatic and preserves the elevated theological register.
- source_word: εὐσεβοῦμεν
  chosen: we worship
  alternatives:
  - we are devout toward
  - we practice piety toward
  - we revere
  lexicon: LSJ
  rationale: The verb means to show reverence or piety, especially toward deity. In
    this context of devotion to God, 'worship' communicates the religious act clearly
    in modern English.
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in accordance with
  - by
  lexicon: LSJ
  rationale: κατά with the accusative here marks conformity or standard. 'According
    to' is both accurate and concise.
- source_word: τὸν ἔναρετον αὐτοῦ νόμον
  chosen: his virtuous law
  alternatives:
  - his noble law
  - his excellent law
  lexicon: LSJ
  rationale: ἔναρετος means virtuous, excellent, morally noble. Because it modifies
    νόμος, 'virtuous law' preserves the ethical quality attributed to the law without
    overexpanding the phrase.
- source_word: ζῶμεν
  chosen: live
  alternatives:
  - conduct our lives
  - go on living
  lexicon: LSJ
  rationale: The present verb denotes manner of life here. 'Live' is sufficiently
    broad and natural, with the following phrase supplying the ethical standard.
