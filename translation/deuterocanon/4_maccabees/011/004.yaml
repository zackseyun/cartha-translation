reference: 4 Maccabees 11:4
source:
  edition: lxx-swete-1909
  text: ὦ μισάρετε καὶ μισάνθρωπε, τί δράσαντες ἡμᾶς τοῦτον πορθεῖς τὸν τρόπον;
  language: Greek
  pages:
  - 752
  - 770
  - 771
  - 772
  - 773
  - 786
  - 787
  - 788
  confidence: high
  validation: minor_mismatch
translation:
  text: O hateful and misanthropic man, what have we done that you are ravaging us
    in this way?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'man-hating one' / 'hater of mankind' for μισάνθρωπε.
    reason: lexical_alternative
  - marker: b
    text: The verb translated 'are ravaging' can also mean 'are destroying' or 'are
      laying waste to,' a term often used for violent devastation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ
  chosen: O
  alternatives:
  - Oh
  lexicon: LSJ
  rationale: Retained as a direct vocative exclamation to preserve the sharp, confrontational
    tone of the address.
- source_word: μισάρετε
  chosen: hateful
  alternatives:
  - hater of virtue
  - detestable one
  - abominable man
  lexicon: LSJ
  rationale: The adjective is a strong term of reproach. 'Hateful' is concise, idiomatic
    English that preserves the insult without overinterpreting a more specific object
    of hatred not explicit in this form.
- source_word: μισάνθρωπε
  chosen: misanthropic man
  alternatives:
  - man-hater
  - hater of mankind
  - inhuman man
  lexicon: LSJ
  rationale: The compound literally denotes one who hates people. 'Misanthropic man'
    preserves the lexical force and rhetorical parallelism with the preceding insult,
    while remaining readable. 'Man-hater' is possible but less natural in this vocative
    sequence.
- source_word: τί δράσαντες
  chosen: what have we done
  alternatives:
  - after doing what
  - what deed have we committed
  lexicon: LSJ
  rationale: This participial construction asks what action on their part could justify
    the treatment. Idiomatic English renders the sense best as 'what have we done'.
- source_word: πορθεῖς
  chosen: are ravaging
  alternatives:
  - are destroying
  - are laying waste to
  - are plundering
  lexicon: LSJ
  rationale: The verb commonly conveys violent devastation or sacking. In this torture
    context, 'are ravaging' communicates brutal destructive treatment without narrowing
    it to military plunder.
- source_word: τὸν τρόπον
  chosen: in this way
  alternatives:
  - thus
  - in this manner
  lexicon: LSJ
  rationale: An idiomatic adverbial expression referring to the manner of abuse. 'In
    this way' is natural modern English and preserves the demonstrative force.
