theological_decisions:
- issue: Whether to leave the object of eating implicit in μὴ μεμοφαγοῦντας
  chosen_reading: made explicit as 'those who have not eaten defiling food'
  alternative_readings:
  - those who have not eaten
  - those who have not partaken of pollution
  rationale: The Greek participle is elliptical in English if rendered woodenly. In
    context, the issue is refusal to eat ritually defiling food; making 'food' explicit
    clarifies the sense without adding a new claim beyond the contextually required
    object.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether to leave the final imperative without an explicit object
  chosen_reading: rendered as 'torture us'
  alternative_readings:
  - torture
  rationale: English normally requires the implied object here for naturalness and
    rhetorical clarity. The object is contextually obvious from the speaker's challenge.
  doctrine_reference: Translation philosophy §6
