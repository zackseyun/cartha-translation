translation:
  text: And why is it necessary to point out, by means of the irrational animals,
    the affection for their children?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through unreasoning animals' or 'by the brute beasts.' The Greek emphasizes
      animals as lacking reason, in contrast to human rationality.
    reason: lexical_alternative
  - marker: b
    text: Or 'natural affection for their offspring.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί δεῖ
  chosen: why is it necessary
  alternatives:
  - what need is there
  - why must one
  lexicon: LSJ
  rationale: Idiomatic expression introducing a rhetorical question about necessity.
    Rendering it as 'why is it necessary' preserves both the interrogative force and
    the sense of needless elaboration.
- source_word: διὰ τῶν ἀλόγων ζῴων
  chosen: by means of the irrational animals
  alternatives:
  - through unreasoning animals
  - by the brute beasts
  lexicon: LSJ
  rationale: ἀλόγων literally means 'without reason' or 'irrational.' 'Irrational
    animals' keeps the philosophical contrast with rational humans clearer than the
    more colloquial 'brute beasts,' while remaining understandable.
- source_word: ἐπιδεικνύναι
  chosen: to point out
  alternatives:
  - to demonstrate
  - to display
  lexicon: LSJ
  rationale: The verb here means to show or demonstrate by example. 'Point out' fits
    the rhetorical context, where the speaker asks why one must even appeal to animal
    examples to make the point.
- source_word: συμπάθειαν
  chosen: affection
  alternatives:
  - sympathy
  - fellow-feeling
  - natural affection
  lexicon: LSJ
  rationale: In context the word refers to tender feeling or attachment, specifically
    parental feeling. 'Affection' is natural English and avoids the modern narrowing
    of 'sympathy.'
- source_word: πρὸς τὰ τέκνα
  chosen: for their children
  alternatives:
  - toward their offspring
  - for their young
  lexicon: LSJ
  rationale: τέκνα here refers to offspring/children. 'For their children' is idiomatic
    and communicates the parental relationship clearly; 'their' is supplied from the
    context of the animals as possessors of the offspring.
