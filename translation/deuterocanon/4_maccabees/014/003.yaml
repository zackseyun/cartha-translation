translation:
  text: the sacred and harmonious agreement of the seven brothers concerning godliness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacred and harmonious concord of the seven brothers concerning piety.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερὰς
  chosen: sacred
  alternatives:
  - holy
  - consecrated
  lexicon: LSJ
  rationale: ἱερός commonly denotes what is sacred or holy in relation to the divine.
    'Sacred' fits idiomatic English here and preserves the elevated register without
    sounding overly liturgical.
- source_word: ἐναρμόστους
  chosen: harmonious
  alternatives:
  - well-fitted
  - in harmony
  - concordant
  lexicon: LSJ
  rationale: The adjective conveys being fitted together or in harmony. 'Harmonious'
    captures both the musical/concordant nuance and the rhetorical sense of internal
    agreement.
- source_word: περὶ τῆς εὐσεβείας
  chosen: concerning godliness
  alternatives:
  - about piety
  - with respect to reverence
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees is a key virtue denoting reverent devotion toward
    God. 'Godliness' is more transparent in English than 'piety' while retaining theological
    weight. The preposition περὶ is naturally rendered 'concerning' here.
- source_word: τῶν ἑπτὰ ἀδελφῶν
  chosen: of the seven brothers
  alternatives:
  - of the seven brethren
  lexicon: LSJ
  rationale: ἀδελφῶν refers specifically to the seven male siblings in this narrative.
    'Brothers' is gender-accurate and natural modern English.
- source_word: συμφωνίας
  chosen: agreement
  alternatives:
  - accord
  - concord
  - harmony
  lexicon: LSJ
  rationale: συμφωνία can mean agreement, concord, or harmony. Because ἐναρμόστους
    already carries the harmony nuance, 'agreement' avoids redundancy while preserving
    the sense of united testimony or resolve.
