translation:
  text: For the mother of the seven young men endured the tortures inflicted on each
    one of her children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, more specifically, “the rackings inflicted on each one of her
      children,” since the Greek term can denote torture by the rack.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτηρ
  chosen: mother
  alternatives:
  - mom
  lexicon: LSJ
  rationale: Standard literal rendering; the formal familial role is important in
    the verse's pathos and argument.
- source_word: τῶν ἐπτὰ νεανίσκων
  chosen: of the seven young men
  alternatives:
  - of the seven youths
  - of the seven sons
  lexicon: LSJ
  rationale: νεανίσκοι denotes young men/youths. 'Young men' preserves age and masculine
    reference more precisely than the broader 'youths.' 'Sons' would over-interpret,
    since the filial relation is expressed later by τέκνων.
- source_word: ὑπήνεγκεν
  chosen: endured
  alternatives:
  - bore
  - underwent
  lexicon: LSJ
  rationale: The verb conveys patient bearing under suffering. 'Endured' is natural
    modern English and preserves the sense of steadfast suffering.
- source_word: στρέβλας
  chosen: tortures
  alternatives:
  - rackings
  - torments
  lexicon: LSJ
  rationale: στρέβλα can refer specifically to torture by the rack or more generally
    torture. Because the phrase is distributed 'on each one' and English 'rackings'
    is awkward and overly specific here, 'tortures' best captures the sense while
    remaining readable.
- source_word: τὰς ἐφʼ ἑνὶ ἑκάστῳ τῶν τέκνων
  chosen: inflicted on each one of her children
  alternatives:
  - for each one of her children
  - applied to each one of her children
  lexicon: LSJ
  rationale: The prepositional phrase marks the tortures as falling upon each child
    individually. 'Inflicted on each one of her children' makes that distributive
    force explicit in idiomatic English. τέκνα is best rendered 'children' here, preserving
    the maternal relationship without repeating 'sons' or 'young men.'
