id: 4MA.14.5
reference: 4 Maccabees 14:5
source:
  edition: lxx-swete-1909
  text: ἀλλὰ πάντες, ὥσπερ ἐπʼ ἀθανασίας ὁδὸν τρέχοντες, ἐπὶ τὸν διὰ τῶν βασάνων θάνατον
    ἔσπευδον,
