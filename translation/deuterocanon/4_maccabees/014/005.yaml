translation:
  text: But all of them, as though running on a road to immortality, were hurrying
    toward death through tortures,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the path to immortality.'
    reason: lexical_alternative
  - marker: b
    text: '''Through tortures'' may also be rendered ''through torments.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - rather
  - yet
  lexicon: BDAG
  rationale: Marks strong contrast with the preceding context; 'But' is natural modern
    English and preserves the adversative force.
- source_word: πάντες
  chosen: all of them
  alternatives:
  - all
  - everyone
  lexicon: BDAG
  rationale: The pronoun is explicit and refers to the whole group already in view;
    'all of them' makes the collective reference clear in English.
- source_word: ὥσπερ
  chosen: as though
  alternatives:
  - just as
  - as if
  lexicon: BDAG
  rationale: Introduces a comparison rather than a literal statement; 'as though'
    captures the simile idiomatically.
- source_word: ἐπʼ ἀθανασίας ὁδόν
  chosen: on a road to immortality
  alternatives:
  - toward the road of immortality
  - on the path to immortality
  lexicon: BDAG
  rationale: The phrase is metaphorical. 'Road to immortality' preserves the image
    of a journey toward imperishable life without over-literal awkwardness.
- source_word: τρέχοντες
  chosen: running
  alternatives:
  - racing
  lexicon: BDAG
  rationale: A participle depicting eager movement; 'running' is the straightforward
    equivalent and fits the athletic/travel metaphor.
- source_word: ἐπὶ τὸν ... θάνατον
  chosen: toward death
  alternatives:
  - to death
  lexicon: BDAG
  rationale: ἐπί with accusative here indicates direction toward an end; 'toward death'
    preserves the motion imagery already established in the verse.
- source_word: διὰ τῶν βασάνων
  chosen: through tortures
  alternatives:
  - through torments
  - by means of tortures
  lexicon: BDAG
  rationale: βάσανοι refers to severe tortures/torments. 'Through tortures' keeps
    both the instrumentality and the experiential path by which death comes.
- source_word: ἔσπευδον
  chosen: were hurrying
  alternatives:
  - were hastening
  - were eager to go
  lexicon: BDAG
  rationale: Imperfect verb conveys ongoing eager haste. 'Were hurrying' is readable
    modern English and preserves the durative sense.
