theological_decisions:
- issue: Meaning of ἀθανασία in martyrdom context
  chosen_reading: immortality
  alternative_readings:
  - eternal life
  rationale: The Greek noun directly denotes deathlessness/immortality. In this martyrdom
    context it carries theological weight, but the translation should preserve the
    source term rather than interpretively expand it to 'eternal life.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
