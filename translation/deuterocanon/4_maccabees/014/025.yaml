id: 4MA.14.25
reference: 4 Maccabees 14:25
source:
  edition: lxx-swete-1909
  text: ὅσῳ γὰρ καὶ ἀσθενέψυχοι καὶ πολυγονώτεραι ὑπάρχουσιν αἱ μητέρες, τοσούτῳ μᾶλλον
    εἰσὶν φιλοτεκνότεραι.
  language: Greek
  pages:
  - 752
  - 774
  - 775
  - 776
  - 777
  - 778
  - 779
  - 786
  - 787
  - 788
  validation: no_reference
translation:
  text: For the more mothers are weak in spirit and more prolific, the more they love
    their children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the more affectionate toward their children.' The Greek literally says
      'more child-loving.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσῳ ... τοσούτῳ
  chosen: the more ... the more
  alternatives:
  - in proportion as ... so much the more
  - to the degree that ... to that degree
  lexicon: LSJ
  rationale: This correlative comparative construction is best rendered idiomatically
    in English as 'the more ... the more,' preserving the logical comparison without
    wooden phrasing.
- source_word: ἀσθενέψυχοι
  chosen: weak in spirit
  alternatives:
  - fainthearted
  - weak-souled
  - emotionally weaker
  lexicon: LSJ
  rationale: The compound literally denotes weakness of soul/spirit. 'Weak in spirit'
    preserves the metaphor and avoids overinterpreting it as cowardice or mere emotional
    fragility. In context it refers to mothers as more vulnerable or tender in inner
    disposition.
- source_word: πολυγονώτεραι
  chosen: more prolific
  alternatives:
  - more fertile
  - having more children
  - more fruitful in childbearing
  lexicon: LSJ
  rationale: The comparative describes mothers as bearing many children. 'More prolific'
    is concise and natural English, while still reflecting the comparative force better
    than a flat paraphrase.
- source_word: ὑπάρχουσιν
  chosen: are
  alternatives:
  - exist as
  - happen to be
  - prove to be
  lexicon: LSJ
  rationale: Here the verb functions copulatively. Simple 'are' gives the sense without
    unnecessary stiffness.
- source_word: μητέρες
  chosen: mothers
  lexicon: LSJ
  rationale: Direct and unambiguous rendering of the plural noun.
- source_word: μᾶλλον
  chosen: the more
  alternatives:
  - more
  - all the more
  lexicon: LSJ
  rationale: Within the correlative comparison, 'the more' fits the English idiom
    and preserves the intensifying comparative sense.
- source_word: φιλοτεκνότεραι
  chosen: lovers of their children
  alternatives:
  - more affectionate toward their children
  - more devoted to their children
  - more loving toward their children
  lexicon: LSJ
  rationale: The comparative adjective literally means 'more child-loving.' 'Lovers
    of their children' keeps the lexical imagery of love while remaining understandable.
    It also avoids reducing the term merely to sentimentality.
