id: 4MA.14.26
reference: 4 Maccabees 14:26
source:
  edition: lxx-swete-1909
  text: πασῶν δὲ τῶν μητέρων ἐγένετο ἡ τῶν ἑπτὰ μήτηρ φιλοτεκνοτέρα, ἥτις ἑπτὰ κυοφορίας
    τὴν πρὸς αὐτοὺς ἐπιφυτευομένην φιλοστοργίαν·
  language: Greek
  pages:
