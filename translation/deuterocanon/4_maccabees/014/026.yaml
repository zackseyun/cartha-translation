translation:
  text: But of all mothers, the mother of the seven became the most devoted to her
    children, she who, through seven pregnancies, had her motherly affection for them
    deeply planted within her;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more loving toward her children.' The Greek comparative φιλοτεκνοτέρα,
      in context with 'of all mothers,' carries the sense that she stood out above
      all others in maternal devotion.
    reason: lexical_alternative
lexical_decisions:
- source_word: πασῶν δὲ τῶν μητέρων
  chosen: But of all mothers
  alternatives:
  - And of all mothers
  - Now of all mothers
  lexicon: LSJ
  rationale: πασῶν with the partitive genitive τῶν μητέρων yields 'of all mothers.'
    δέ is lightly adversative/transitional; 'But' preserves the discourse turn without
    overstating contrast.
- source_word: ἐγένετο
  chosen: became
  alternatives:
  - was
  - proved to be
  lexicon: LSJ
  rationale: ἐγένετο commonly marks becoming or coming to be. 'Became' preserves the
    verbal force better than a simple copula.
- source_word: ἡ τῶν ἑπτὰ μήτηρ
  chosen: the mother of the seven
  alternatives:
  - the mother of the seven sons
  - their mother
  lexicon: LSJ
  rationale: The Greek literally says 'the mother of the seven.' Adding 'sons' would
    be contextually natural but is not explicit in this clause, so the more literal
    rendering is retained.
- source_word: φιλοτεκνοτέρα
  chosen: the most devoted to her children
  alternatives:
  - more loving toward her children
  - more fond of her children
  - most loving to her children
  lexicon: LSJ
  rationale: 'Comparative form from φιλοτέκνος expresses exceptional affection for
    one''s children. In English, with the implied comparison to all mothers, a superlative
    sense is natural: ''the most devoted to her children.'' ''Devoted'' conveys strong
    maternal attachment in readable modern English.'
- source_word: ἥτις
  chosen: she who
  alternatives:
  - who
  - for she
  lexicon: LSJ
  rationale: ἥτις is qualitative/explanatory rather than merely restrictive. 'She
    who' preserves the explanatory force introducing the reason for her exceptional
    devotion.
- source_word: ἑπτὰ κυοφορίας
  chosen: through seven pregnancies
  alternatives:
  - after bearing seven times
  - through seven gestations
  lexicon: LSJ
  rationale: κυοφορία refers to pregnancy/gestation. 'Through seven pregnancies' is
    idiomatic and keeps the embodied maternal emphasis of the Greek.
- source_word: τὴν πρὸς αὐτοὺς ... φιλοστοργίαν
  chosen: her motherly affection for them
  alternatives:
  - her tender affection toward them
  - her natural affection for them
  lexicon: LSJ
  rationale: φιλοστοργία denotes tender familial affection, especially natural family
    love. 'Motherly affection' makes explicit the maternal context already present
    in the sentence without importing new content.
- source_word: ἐπιφυτευομένην
  chosen: deeply planted within her
  alternatives:
  - implanted
  - rooted in her
  - grown in her
  lexicon: LSJ
  rationale: The participle evokes something planted in addition or firmly implanted.
    'Deeply planted within her' preserves the metaphor and reads naturally in English.
