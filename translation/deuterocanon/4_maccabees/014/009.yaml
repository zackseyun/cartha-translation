translation:
  text: Now we, when we hear of the suffering of those young men, shudder; but they,
    not only seeing it, and not merely hearing the immediate word of threat, but also
    suffering it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the threatening word delivered on the spot'; the Greek phrase emphasizes
      the immediacy of the threat.
    reason: lexical_alternative
lexical_decisions:
- source_word: θλῖψιν
  chosen: suffering
  alternatives:
  - affliction
  - distress
  - tribulation
  lexicon: BDAG
  rationale: In this context the term refers to the severe ordeal endured by the youths.
    'Suffering' is natural modern English and broad enough to cover both physical
    and emotional anguish without importing later technical theological overtones
    that 'tribulation' may carry.
- source_word: νεανιῶν
  chosen: young men
  alternatives:
  - youths
  - young men
  lexicon: LSJ
  rationale: The referent is specifically the brothers being tortured; masculine and
    age-specific language should be preserved. 'Young men' is clearer in contemporary
    English than 'youths,' while remaining faithful to the source.
- source_word: φρίττομεν
  chosen: shudder
  alternatives:
  - shrink back in horror
  - tremble
  - are horrified
  lexicon: LSJ
  rationale: The verb conveys a visceral reaction of horror. 'Shudder' captures the
    bodily force concisely and idiomatically.
- source_word: ὁρῶντες
  chosen: seeing it
  alternatives:
  - watching
  - beholding
  lexicon: BDAG
  rationale: A straightforward participial rendering fits the contrast with 'hearing'
    and keeps the sequence of perception before endurance.
- source_word: παραχρῆμα
  chosen: immediate
  alternatives:
  - instant
  - on-the-spot
  - at once
  lexicon: LSJ
  rationale: Here it modifies the threatening speech as something delivered on the
    spot, in the moment. 'Immediate' preserves that temporal force without sounding
    awkward.
- source_word: ἀπειλῆς λόγον
  chosen: word of threat
  alternatives:
  - threatening word
  - threat
  - speech of threat
  lexicon: BDAG
  rationale: The Greek is literally 'word/speech of threat.' 'Word of threat' preserves
    the singular and rhetorical feel of the expression while remaining intelligible.
    A smoother English alternative would be simply 'threat,' but the chosen rendering
    stays closer to the Greek texture.
- source_word: πάσχοντες
  chosen: suffering it
  alternatives:
  - enduring it
  - undergoing it
  lexicon: BDAG
  rationale: 'The participle marks the climax of the contrast: they did not merely
    perceive the ordeal but experienced it. ''Suffering it'' keeps the verbal link
    with earlier ''suffering'' and highlights direct experience.'
