translation:
  text: For even bees, around the time of making honeycomb, defend themselves against
    those who approach, and, as with iron, strike with their stinger those who come
    near their brood, and defend them to the death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the season of wax-production' or 'at the time of comb-making'; the
      Greek refers specifically to the making of wax/comb, not merely honey in general.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with the κέντρον'; in this context, 'stinger' is the natural
      sense.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'their brood,' using imagery of protecting offspring; the
      comparison is rhetorical rather than zoologically technical.
    reason: cultural_note
lexical_decisions:
- source_word: ὅπου γε καὶ
  chosen: For even
  alternatives:
  - Indeed even
  - Why, even
  lexicon: LSJ
  rationale: Introduces an illustrative comparison with emphatic force. 'For even'
    fits the argumentative flow in clear modern English without sounding archaic.
- source_word: μέλισσαι
  chosen: bees
  lexicon: LSJ
  rationale: Straightforward zoological term.
- source_word: περὶ τὸν τῆς κηρογονίας καιρὸν
  chosen: around the time of making honeycomb
  alternatives:
  - at the season of wax-production
  - at the time of comb-making
  lexicon: LSJ
  rationale: κηρογονία is literally the production of wax/comb. 'Making honeycomb'
    is more natural English than 'wax-production' while remaining anchored in the
    image of nest-building rather than honey in general.
- source_word: ἐπαμύνονται
  chosen: defend themselves
  alternatives:
  - ward off
  - fight in defense
  lexicon: LSJ
  rationale: The verb denotes defensive resistance. Here the first occurrence lacks
    an explicit object, so 'defend themselves' best captures the intransitive sense
    in context.
- source_word: τοὺς προσιόντας
  chosen: those who approach
  alternatives:
  - those coming near
  - the attackers who come near
  lexicon: LSJ
  rationale: Present participle describing persons drawing near; neutral wording avoids
    importing hostility beyond the text.
- source_word: καθάπερ σιδήρῳ
  chosen: as with iron
  alternatives:
  - as if with iron
  - like iron
  lexicon: LSJ
  rationale: The comparison modifies the force or hardness of the sting. 'As with
    iron' preserves the simile without overexplaining.
- source_word: τῷ κέντρῳ
  chosen: their stinger
  alternatives:
  - the sting
  - the goad
  lexicon: LSJ
  rationale: In this context of bees, κέντρον refers concretely to the stinging organ.
    'Stinger' is idiomatic and specific.
- source_word: πλήσσουσι
  chosen: strike
  alternatives:
  - smite
  - wound
  lexicon: LSJ
  rationale: A basic verb of striking. 'Strike' is natural and sufficiently vivid.
- source_word: τῇ νοσσίᾳ αὐτῶν
  chosen: their brood
  alternatives:
  - their nestlings
  - their young
  lexicon: LSJ
  rationale: νοσσιά refers to a brood/nest of young. Since bees do not have 'nestlings'
    in English idiom, 'their brood' preserves the maternal-protective image in understandable
    language.
- source_word: ἐπαμύνονται ἕως θανάτου
  chosen: defend them to the death
  alternatives:
  - fight in defense until death
  - defend themselves unto death
  lexicon: LSJ
  rationale: The repeated verb now clearly carries the sense of persistent defense
    in an extreme degree. 'To the death' is idiomatic and preserves the force of ἕως
    θανάτου.
