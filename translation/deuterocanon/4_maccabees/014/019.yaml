id: 4MA.14.19
reference: 4 Maccabees 14:19
source:
  edition: lxx-swete-1909
  text: ὅπου γε καὶ μέλισσαι περὶ τὸν τῆς κηρογονίας καιρὸν ἐπαμύνονται τοὺς προσιόντας,
    καὶ καθάπερ σιδήρῳ τῷ κέντρῳ πλήσσουσι τοὺς προσιόντας τῇ νοσσίᾳ αὐτῶν, καὶ ἐπαμύνονται
    ἕως θανάτου.
