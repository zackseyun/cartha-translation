theological_decisions:
- issue: Reference of 'the law'
  chosen_reading: the Jewish law/Torah is intended
  alternative_readings:
  - law in a generic moral sense
  rationale: In 4 Maccabees the martyrs' steadfastness is consistently defined by
    fidelity to the ancestral law. The phrase here therefore refers specifically to
    that covenantal law, not merely to lawfulness in general.
- issue: Gendered familial term
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The Greek uses the specifically masculine υἱῶν, and the context concerns
    the mother and her seven sons. Per translation philosophy, gender-accurate wording
    is preferred over neutralization.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
