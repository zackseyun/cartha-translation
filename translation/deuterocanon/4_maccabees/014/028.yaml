translation:
  text: But not only that; rather, because of the noble goodness of her sons and their
    obedience to the law, her motherly affection for them was even greater.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'virtue' for 'noble goodness' (καλοκἀγαθία), emphasizing moral excellence
      and nobility together.
    reason: lexical_alternative
  - marker: b
    text: That is, obedience to the ancestral Jewish law.
    reason: cultural_note
lexical_decisions:
- source_word: οὐ μὴν δέ, ἀλλὰ καὶ
  chosen: But not only that; rather, because
  alternatives:
  - And yet also
  - But indeed also
  - Nevertheless, also because
  lexicon: LSJ
  rationale: 'This combination marks a strong transition and addition: not merely
    the previous point, but also another reason. The English aims to preserve the
    rhetorical turn without sounding wooden.'
- source_word: καλοκἀγαθίαν
  chosen: noble goodness
  alternatives:
  - nobility
  - virtue
  - moral excellence
  lexicon: LSJ
  rationale: The compound idea combines moral goodness with nobility of character.
    'Noble goodness' preserves both elements better than the flatter 'virtue' or the
    narrower 'nobility'.
- source_word: τῶν υἱῶν
  chosen: her sons
  alternatives:
  - the sons
  - her children
  lexicon: LSJ
  rationale: In context the referent is the mother's sons, so English naturally supplies
    'her.' 'Sons' is retained rather than 'children' because the Greek is specifically
    masculine and refers to male offspring.
- source_word: εὐπείθειαν
  chosen: obedience
  alternatives:
  - docility
  - compliance
  - readiness to obey
  lexicon: LSJ
  rationale: The term denotes willing compliance or obedience. 'Obedience' is the
    clearest modern rendering in this context, especially with the following phrase
    'to the law.'
- source_word: νόμον
  chosen: the law
  alternatives:
  - the Law
  lexicon: LSJ
  rationale: The phrase refers to the Jewish law/Torah. Lowercase 'law' is used in
    the main text for readable modern English, while the context still clearly indicates
    the Mosaic law.
- source_word: μείζω
  chosen: even greater
  alternatives:
  - greater
  - more abundant
  lexicon: LSJ
  rationale: The comparative is explicit. 'Even greater' captures the intensifying
    force in relation to the preceding discussion.
- source_word: φιλοστοργίαν
  chosen: motherly affection
  alternatives:
  - natural affection
  - familial love
  - tender affection
  lexicon: LSJ
  rationale: The noun denotes deep natural family affection. Because the subject in
    context is the mother, 'motherly affection' makes explicit in idiomatic English
    what is contextually present, while preserving the emotional force.
- source_word: ἐν αὐτοῖς ἔσχεν
  chosen: for them was
  alternatives:
  - she had toward them
  - she held in them
  lexicon: LSJ
  rationale: The idiom expresses that she possessed or had this affection toward them.
    The English is smoothed to natural syntax while retaining the relational sense.
