id: 4MA.14.28
reference: 4 Maccabees 14:28
source:
  edition: lxx-swete-1909
  text: οὐ μὴν δέ, ἀλλὰ καὶ διὰ τὴν καλοκἀγαθίαν τῶν υἱῶν καὶ τὴν πρὸς τὸν νόμον αὐτῶν
    εὐπείθειαν, μείζω τὴν ἐν αὐτοῖς ἔσχεν φιλοστοργίαν.
