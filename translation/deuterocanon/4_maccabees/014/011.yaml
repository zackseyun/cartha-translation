theological_decisions:
- issue: Rendering the philosophical term λογισμός in a martyrdom context
  chosen_reading: reason
  alternative_readings:
  - rationality
  - rational judgment
  rationale: The book repeatedly argues that reason, especially devout reason, rules
    the passions. 'Reason' preserves that thematic and anthropological claim without
    importing later technical theological language not explicit in the verse.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5'
- issue: Gender-specific wording for γυναικός
  chosen_reading: a woman's mind
  alternative_readings:
  - the mind of a woman
  rationale: The Greek explicitly uses the singular 'woman.' Following the project's
    gender-accurate policy, the translation preserves the marked contrast between
    'those men' and 'a woman's mind' rather than neutralizing it.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4'
