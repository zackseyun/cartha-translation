translation:
  text: And do not consider it remarkable if reason gained the mastery over those
    men in their torments, since even a woman's mind looked down on more varied pains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prevailed over those men in their tortures.'
    reason: lexical_alternative
  - marker: b
    text: Or 'despised more manifold pains' or 'rose above more varied sufferings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θαυμαστόν
  chosen: remarkable
  alternatives:
  - amazing
  - surprising
  - marvelous
  lexicon: LSJ
  rationale: The adjective denotes something to be wondered at. 'Remarkable' fits
    natural modern English after μὴ ... ἡγεῖσθε while preserving the sense of something
    not to be regarded as astonishing.
- source_word: ἡγεῖσθε
  chosen: consider
  alternatives:
  - think
  - regard
  lexicon: LSJ
  rationale: With the predicate adjective θαυμαστόν, the verb means 'consider/regard
    as.' 'Consider' is idiomatic and clear.
- source_word: λογισμός
  chosen: reason
  alternatives:
  - rational judgment
  - reasoned conviction
  - rationality
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for reason, especially pious reason
    mastering the passions. 'Reason' is concise and preserves the book's philosophical
    vocabulary without overexpansion.
- source_word: περιεκράτησεν
  chosen: gained the mastery over
  alternatives:
  - prevailed over
  - overpowered
  - mastered
  lexicon: LSJ
  rationale: The compound verb conveys prevailing completely or mastering. 'Gained
    the mastery over' preserves the sense of decisive dominance and fits the philosophical
    theme of reason ruling suffering.
- source_word: βασάνοις
  chosen: torments
  alternatives:
  - tortures
  - ordeals
  lexicon: LSJ
  rationale: The term can mean torture or severe testing. Here it refers to inflicted
    sufferings in martyrdom. 'Torments' is vivid without narrowing too specifically
    to the mechanics of torture.
- source_word: ὅπου γε καί
  chosen: since even
  alternatives:
  - for indeed even
  - seeing that even
  - where indeed even
  lexicon: LSJ
  rationale: The phrase introduces a strengthening explanation. 'Since even' captures
    the inferential force and emphasis in smooth English.
- source_word: νοῦς
  chosen: mind
  alternatives:
  - understanding
  - intellect
  lexicon: LSJ
  rationale: νοῦς here denotes the faculty of thought or resolve. 'Mind' is the most
    natural English equivalent and pairs well with the contrast to bodily pains.
- source_word: πολυτροπωτέρων
  chosen: more varied
  alternatives:
  - more manifold
  - more complex
  - more many-sided
  lexicon: LSJ
  rationale: The comparative suggests pains of more kinds or more intricate forms.
    'More varied' is idiomatic and preserves the comparative force.
- source_word: ὑπερεφρόνησεν
  chosen: looked down on
  alternatives:
  - despised
  - rose above
  - thought lightly of
  lexicon: LSJ
  rationale: The verb means to think over or beyond, hence to disdain or treat as
    beneath oneself. 'Looked down on' conveys contemptuous transcendence in context,
    showing the woman's mind rising above pain.
- source_word: ἀλγηδόνων
  chosen: pains
  alternatives:
  - sufferings
  - agonies
  lexicon: LSJ
  rationale: The noun denotes pains or sufferings. 'Pains' keeps the direct lexical
    sense and works well with the comparative modifier.
