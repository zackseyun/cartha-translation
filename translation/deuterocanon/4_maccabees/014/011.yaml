id: 4MA.14.11
reference: 4 Maccabees 14:11
source:
  edition: lxx-swete-1909
  text: καὶ μὴ θαυμαστὸν ἡγεῖσθε εἰ ὁ λογισμὸς περιεκράτησεν τῶν ἀνδρῶν ἐκείνων ἐν
    ταῖς βασάνοις, ὅπου γε καὶ γυναικὸς νοῦς πολυτροπωτέρων ὑπερεφρόνησεν ἀλγηδόνων.
  language: Greek
