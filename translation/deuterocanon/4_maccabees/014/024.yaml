id: 4MA.14.24
reference: 4 Maccabees 14:24
source:
  edition: lxx-swete-1909
  text: τίνα τρόπον ἠθολογήσῃμι φιλοτέκνα γονέων αἴθη, ψυχῆς τε καὶ μορφῆς ὁμοιότητα
    εἰς μικρὸν παιδοχαρακτῆρα θαυμάσιον ἐναποσφραγίζο[ντα], μάλιστα διὰ τὸ τῶν πατέρων
    τοῖς γεννηθεῖσιν τὰς μητέρας καθιστᾶναι συμπαθεστέρας.
  language: Greek
  pages:
  - 752
  - 774
  - 775
