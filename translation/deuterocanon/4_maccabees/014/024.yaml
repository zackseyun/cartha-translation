  - 788
  validation: no_reference
translation:
  text: How can I describe the affection of parents for their children—the fervor
    that stamps into the small form of a child the marvelous likeness of soul and
    appearance? This is especially so because fathers make mothers more sympathetic
    toward those who have been born.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'parents’ love for their children—the ardor that impresses in a child
      the wonderful likeness of soul and form.' The Greek is rhetorically dense and
      includes rare imagery built on sealing or stamping.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνα τρόπον
  chosen: How can I
  alternatives:
  - In what way shall I
  - How shall I
  lexicon: LSJ
  rationale: Idiomatic interrogative introducing a rhetorical question about manner;
    'How can I' gives natural English while preserving the speaker's sense of difficulty
    in expression.
- source_word: ἠθολογήσῃμι
  chosen: describe
  alternatives:
  - depict characterfully
  - set forth
  - portray
  lexicon: LSJ
  rationale: The rare verb appears to mean to describe or portray in a morally/character-focused
    way. In context the speaker asks how to articulate parental affection; 'describe'
    is the clearest idiomatic rendering without overloading the English.
- source_word: φιλοτέκνα γονέων αἴθη
  chosen: the affection of parents for their children
  alternatives:
  - parents' love for their children
  - the child-loving ardor of parents
  lexicon: LSJ
  rationale: φιλοτέκνα is adjectival ('loving one's children'), γονέων is genitive
    ('of parents'), and αἴθη denotes heat, ardor, or fervor. 'Affection ... for their
    children' communicates the sense naturally; 'fervor' is then retained appositionally
    to preserve αἴθη's intensity.
- source_word: αἴθη
  chosen: the fervor
  alternatives:
  - ardor
  - heat
  - flame
  lexicon: LSJ
  rationale: The noun evokes emotional heat or ardor. 'Fervor' preserves the metaphorical
    intensity in readable modern English.
- source_word: ψυχῆς τε καὶ μορφῆς ὁμοιότητα
  chosen: the marvelous likeness of soul and appearance
  alternatives:
  - likeness in soul and form
  - resemblance of character and form
  lexicon: LSJ
  rationale: ψυχή here likely points to inner life/disposition, while μορφή refers
    to outward form. 'Soul and appearance' preserves both inward and outward resemblance
    without flattening either.
- source_word: εἰς μικρὸν παιδοχαρακτῆρα
  chosen: into the small form of a child
  alternatives:
  - upon the little stamp of a child
  - into a child's small impression
  lexicon: LSJ
  rationale: The compound παιδοχαρακτήρ is unusual and image-rich, suggesting the
    marked form or impress of a child. 'Small form of a child' is smoother English
    while still fitting the sealing/imprinting metaphor carried by the verb.
- source_word: θαυμάσιον
  chosen: marvelous
  alternatives:
  - wonderful
  - remarkable
  lexicon: LSJ
  rationale: Simple adjectival intensifier of the likeness/impression; 'marvelous'
    preserves elevated tone appropriate to the rhetorical style.
- source_word: ἐναποσφραγίζοντα
  chosen: stamps into
  alternatives:
  - imprints in
  - seals into
  - embosses upon
  lexicon: LSJ
  rationale: The verb is built on sealing/impressing imagery. 'Stamps into' keeps
    the metaphor vivid and works with the idea of parental traits impressed in the
    child.
- source_word: μάλιστα
  chosen: This is especially so
  alternatives:
  - especially
  - most of all
  lexicon: LSJ
  rationale: Connects the general statement to the following explanatory clause. Expanded
    slightly for English coherence.
- source_word: διὰ τὸ ... καθιστᾶναι
  chosen: because ... make
  alternatives:
  - because ... cause
  - on account of ... making
  lexicon: LSJ
  rationale: Straightforward causal construction with infinitive; 'because ... make'
    is the most natural English equivalent.
- source_word: τῶν πατέρων
  chosen: fathers
  alternatives:
  - the fathers
  lexicon: LSJ
  rationale: Generic plural referring to fathers in relation to newborn children;
    no article needed in English.
- source_word: τοῖς γεννηθεῖσιν
  chosen: toward those who have been born
  alternatives:
  - toward the children who have been born
  - toward their offspring
  lexicon: LSJ
  rationale: Perfect participle 'those who have been born' likely refers to the children/newborns.
    The more explicit sense is preserved without adding too much beyond the Greek.
- source_word: τὰς μητέρας καθιστᾶναι συμπαθεστέρας
  chosen: make mothers more sympathetic
  alternatives:
  - make mothers more affectionate
  - render mothers more tenderly disposed
  lexicon: LSJ
  rationale: συμπαθεστέρας is comparative, indicating increased fellow-feeling or
    tender sympathy. 'More sympathetic' is lexically close, though in context it carries
    affectionate tenderness rather than mere emotional agreement.
