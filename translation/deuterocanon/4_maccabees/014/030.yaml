theological_decisions:
- issue: Rendering λογισμός in a philosophically charged context
  chosen_reading: her reason
  alternative_readings:
  - her resolve
  - her rational judgment
  rationale: 4 Maccabees emphasizes the supremacy of reason over passions. Translating
    λογισμός as 'reason' preserves that thematic and conceptual thread without importing
    later technical philosophy beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
