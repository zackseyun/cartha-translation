id: 4MA.14.30
reference: 4 Maccabees 14:30
source:
  edition: lxx-swete-1909
  text: ἀλλʼ ὅμως, καίπερ τοσούτων ὄντων τῶν περὶ φιλοτεκνίαν εἰς συμπάθειαν ἑλκόντων
    τὴν μητέρα, ἐπʼ οὐδενὸς αὐτῶν τὸν λογισμὸν αὐτῆς αἱ παντοίκιλοι βάσανοι ἴσχυσαν
    μετατρέψαι.
  language: Greek
