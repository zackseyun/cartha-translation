theological_decisions:
- issue: Metaphorical maternal-bird imagery applied to human mothers
  chosen_reading: Retain the imagery explicitly rather than flattening it into abstract
    maternal concern.
  alternative_readings:
  - Render more generally as 'surrounding them' without avian imagery
  rationale: The Greek participle 'flying around' strongly signals the comparison
    to birds protecting young. Preserving the image respects the rhetoric of the passage
    and avoids paraphrasing away the embodied force of maternal affection.
  doctrine_reference: Translation philosophy §§1, 6
