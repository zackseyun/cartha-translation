translation:
  text: But even if they could not prevent it, flying around them on every side, grieving
    in their motherly affection, and calling to them in their own voice, they would
    help their children in whatever way they could.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek imagery is avian: a mother creature ''flying around'' her young
      and calling out to them.'
    reason: cultural_note
lexical_decisions:
- source_word: κωλύειν
  chosen: prevent
  alternatives:
  - hinder
  - stop
  lexicon: LSJ
  rationale: The infinitive denotes stopping or preventing the impending harm. 'Prevent'
    is natural English and fits the conditional clause without over-specifying the
    means.
- source_word: περιιπτάμενα κυκλόθεν αὐτῶν
  chosen: flying around them on every side
  alternatives:
  - fluttering around them all around
  - circling around them
  lexicon: LSJ
  rationale: The participle with κυκλόθεν evokes birds moving around their young from
    all sides. 'Flying around them on every side' preserves the avian imagery and
    the intensifying sense of encirclement.
- source_word: ἀλγοῦντα τῇ στοργῇ
  chosen: grieving in their motherly affection
  alternatives:
  - pained by natural affection
  - suffering in their familial love
  lexicon: LSJ
  rationale: στοργή refers to natural familial affection, especially parental attachment.
    Because the surrounding context compares mothers/birds protecting offspring, 'motherly
    affection' makes the force clear in idiomatic English while retaining the emotional
    pain of ἀλγοῦντα.
- source_word: ἀνακαλούμενα τῇ ἰδίᾳ φωνῇ
  chosen: calling to them in their own voice
  alternatives:
  - calling them back with their own cry
  - summoning them with their own voice
  lexicon: LSJ
  rationale: ἀνακαλούμενα suggests calling out or calling back. 'Calling to them in
    their own voice' keeps the image of parent birds vocalizing to their young without
    adding interpretive detail beyond the Greek.
- source_word: καθʼ ὃν δύναται τρόπον
  chosen: in whatever way they could
  alternatives:
  - by whatever means they were able
  - in whatever manner they were able
  lexicon: LSJ
  rationale: This idiom expresses doing what one can by any available means. The English
    rendering is idiomatic and preserves the sense of limited but earnest ability.
- source_word: βοηθεῖ τοῖς τέκνοις
  chosen: help their children
  alternatives:
  - come to the aid of their offspring
  - assist their young
  lexicon: LSJ
  rationale: βοηθεῖ means to help or come to aid; τέκνοις refers to children/offspring.
    'Help their children' is clear, direct, and fits the maternal comparison in context.
