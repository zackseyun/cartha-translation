id: 4MA.14.14
reference: 4 Maccabees 14:14
source:
  edition: lxx-swete-1909
  text: ὅπου γε καὶ τὰ ἄλογα ζῷα ὁμοίαν τὴν πρὸς τὰ ἐξ αὐτῶν γεννώμενα συνπίθειαν
    καὶ στοργὴν ἔχει τοῖς ἀνθρώποις.
  language: Greek
  pages:
  - 752
  - 774
  - 775
  - 776
  - 777
  - 778
  - 779
  - 786
  - 787
  - 788
  confidence: high
  validation: agree
translation:
  text: For even the irrational animals have toward the offspring born from them a
    sympathy and affection like that of human beings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the unreasoning animals.' The Greek highlights the contrast between
      creatures lacking rational capacity and human beings.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'toward the things born from them,' that is, their own offspring.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου γε καὶ
  chosen: For even
  alternatives:
  - since even
  - indeed even
  - where even
  lexicon: LSJ
  rationale: In context this clause gives supporting grounds rather than a strictly
    locative sense. 'For even' captures the inferential/emphatic force naturally in
    English.
- source_word: τὰ ἄλογα ζῷα
  chosen: the irrational animals
  alternatives:
  - the unreasoning animals
  - the brute animals
  - animals without reason
  lexicon: LSJ
  rationale: ἄλογα contrasts creatures lacking rational faculty with humans. 'Irrational
    animals' is precise and readable, preserving the philosophical nuance present
    in the Greek.
- source_word: ὁμοίαν
  chosen: like that of
  alternatives:
  - similar
  - the same kind of
  lexicon: LSJ
  rationale: ὁμοίαν modifies the quality of sympathy and affection, comparing animal
    parental attachment to human attachment. 'Like that of' expresses the comparison
    idiomatically in English.
- source_word: συνπίθειαν
  chosen: sympathy
  alternatives:
  - fellow-feeling
  - shared affection
  - natural attachment
  lexicon: LSJ
  rationale: The noun denotes fellow-feeling or sympathetic attachment. 'Sympathy'
    is the most direct English equivalent, while the paired noun στοργή supplies the
    warmer familial nuance.
- source_word: στοργὴν
  chosen: affection
  alternatives:
  - familial love
  - natural affection
  - tenderness
  lexicon: LSJ
  rationale: στοργή commonly denotes natural familial affection, especially between
    parents and children. 'Affection' is concise and natural; the familial aspect
    is reinforced by the context of offspring.
- source_word: τὴν πρὸς τὰ ἐξ αὐτῶν γεννώμενα
  chosen: toward the offspring born from them
  alternatives:
  - for what is born from them
  - toward their young
  - toward those begotten from them
  lexicon: LSJ
  rationale: The phrase refers to animals' relation to their own young. 'Offspring
    born from them' stays close to the Greek while remaining intelligible; 'their
    young' is smoother but slightly less explicit.
- source_word: τοῖς ἀνθρώποις
  chosen: human beings
  alternatives:
  - men
  - humans
  lexicon: LSJ
  rationale: 'The dative completes the comparison: animals have a sympathy and affection
    similar to that found in humans. ''Human beings'' avoids misleading male-specific
    force while accurately conveying the generic sense.'
