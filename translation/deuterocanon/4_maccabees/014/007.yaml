translation:
  text: O most holy seven of harmonious brothers, for just as in the creation of the
    world the days concern godliness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'piety' for 'godliness' (εὐσέβεια).
    reason: lexical_alternative
  - marker: b
    text: The sentence continues in the following verse; the Greek here is an incomplete
      comparison introduced by 'for just as.'
    reason: cross_reference
lexical_decisions:
- source_word: πανάγιε
  chosen: most holy
  alternatives:
  - all-holy
  - utterly holy
  lexicon: LSJ
  rationale: Vocative singular adjective used as an exalted address. 'Most holy' is
    idiomatic English that preserves the superlative force without sounding overly
    technical.
- source_word: συμφώνων
  chosen: harmonious
  alternatives:
  - of one accord
  - agreeing
  lexicon: LSJ
  rationale: The participial/adjectival sense conveys concord among the brothers.
    'Harmonious' preserves the imagery of being in agreement while reading naturally
    in English.
- source_word: ἀδελφῶν
  chosen: brothers
  alternatives:
  - siblings
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural and refers to the seven brothers
    in the narrative. Per translation philosophy, gender-accurate rendering is preferred.
- source_word: ἑβδομάς
  chosen: seven
  alternatives:
  - heptad
  - group of seven
  lexicon: LSJ
  rationale: The noun denotes a group of seven. 'Seven' in apposition is the most
    natural English vocative here; 'heptad' would be too technical.
- source_word: κοσμοποιία
  chosen: creation of the world
  alternatives:
  - world-making
  - creation
  lexicon: LSJ
  rationale: The compound refers to the making of the cosmos. 'Creation of the world'
    is clear, natural, and preserves the cosmological reference.
- source_word: ἡμέραι
  chosen: days
  lexicon: LSJ
  rationale: Straightforward lexical rendering.
- source_word: περὶ τὴν εὐσέβειαν
  chosen: concern godliness
  alternatives:
  - have to do with piety
  - relate to reverence
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees is a key virtue often rendered 'piety' or 'godliness.'
    'Godliness' is accessible modern English and retains the religious-ethical force.
    The prepositional phrase is somewhat compressed; 'concern godliness' reflects
    the sense without over-paraphrasing.
