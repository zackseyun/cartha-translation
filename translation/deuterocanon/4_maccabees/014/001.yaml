  text: προσέτι καὶ ἐπὶ τὸν αἰκισμὸν ἐποτρύνοντες, ὡς μὴ μόνον τῶν ἀλγηδόνων περιφρονῆσαι
    αὐτούς, ἀλλὰ καὶ τῆς τῶν ἀδελφῶν φιλαδελφίας παθῶν κρατῆσαι.
