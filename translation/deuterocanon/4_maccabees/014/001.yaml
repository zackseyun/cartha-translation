translation:
  text: Moreover, by urging them on to torture, they sought that they should not only
    despise the pains, but also master the emotions of brotherly affection for their
    brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the passions of brotherly love for their brothers.' The Greek πάθη can
      mean 'passions' or 'emotions'; the phrase highlights their need to master even
      intense familial affection under torture.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέτι
  chosen: Moreover
  alternatives:
  - furthermore
  - besides
  lexicon: LSJ
  rationale: Introduces an additional point in the argument; 'Moreover' preserves
    the rhetorical progression naturally in English.
- source_word: ἐπὶ τὸν αἰκισμόν
  chosen: to torture
  alternatives:
  - to maltreatment
  - to abuse
  lexicon: LSJ
  rationale: The phrase indicates movement or incitement toward acts of cruel physical
    abuse. 'Torture' best captures the severity in this martyrdom context.
- source_word: ἐποτρύνοντες
  chosen: by urging them on
  alternatives:
  - inciting them
  - spurring them on
  lexicon: LSJ
  rationale: A participle describing active encouragement or incitement. 'By urging
    them on' is idiomatic and preserves the causal/instrumental force.
- source_word: ὡς μὴ μόνον ... ἀλλὰ καί
  chosen: that ... not only ... but also
  alternatives:
  - so that ... not only ... but also
  lexicon: Greek grammar
  rationale: Captures the intended result or aim structure of the clause in clear
    English.
- source_word: τῶν ἀλγηδόνων
  chosen: the pains
  alternatives:
  - the sufferings
  - the agonies
  lexicon: LSJ
  rationale: Refers to experiences of pain under torture. 'Pains' is direct and sufficiently
    weighty without overinterpreting.
- source_word: περιφρονῆσαι
  chosen: despise
  alternatives:
  - scorn
  - treat with contempt
  - disregard
  lexicon: BDAG
  rationale: The verb denotes regarding something as negligible or contemptible. 'Despise'
    preserves the strong sense of contempt toward suffering.
- source_word: τῆς τῶν ἀδελφῶν φιλαδελφίας
  chosen: brotherly love for their brothers
  alternatives:
  - affection for their brothers
  - familial love toward their brothers
  lexicon: LSJ
  rationale: φιλαδελφία is literally brother-love, and the genitive construction ties
    it specifically to their brothers. The somewhat repetitive English preserves the
    source's explicit familial emphasis.
- source_word: παθῶν
  chosen: the emotions
  alternatives:
  - the passions
  - the feelings
  lexicon: LSJ
  rationale: In 4 Maccabees, πάθη often refers to passions or emotional impulses subject
    to reason. 'Emotions' is accessible modern English while retaining the anthropological
    sense.
- source_word: κρατῆσαι
  chosen: master
  alternatives:
  - control
  - overcome
  - gain mastery over
  lexicon: BDAG
  rationale: The verb means to gain control over or prevail against. 'Master' fits
    the book's theme of reason ruling the passions.
