theological_decisions:
- issue: Rendering εὐσέβεια in a martyrdom context
  chosen_reading: reverence for God
  alternative_readings:
  - piety
  - godliness
  rationale: The term is ethically and theologically loaded in 4 Maccabees, referring
    to fidelity to God and his law. 'Reverence for God' avoids archaic church language
    while keeping the Godward orientation clear.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; readable modern English;
    preserve theological weight without jargon'
- issue: Rendering σωτηρία in context
  chosen_reading: temporary safety
  alternative_readings:
  - temporary salvation
  - temporary deliverance
  rationale: Although σωτηρία can be rendered 'salvation,' here the immediate contrast
    is between faithfulness and short-term physical preservation under the tyrant's
    offer. Using 'safety' avoids importing soteriological overtones the text does
    not require.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; never import doctrinal
    claims the text does not make'
