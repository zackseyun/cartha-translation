id: 4MA.14.22
reference: 4 Maccabees 14:22
source:
  edition: lxx-swete-1909
  text: μήτηρ δυεῖν προκειμένων, εὐσεβείας, καὶ τῆς ἑπτὰ υἱῶν σωτηρίας προσκαίρου
    κατὰ τὴν τοῦ τυράννου ὑπόσχεσιν·
  language: Greek
  pages:
  - 752
  - 774
  - 775
  - 776
  - 777
  - 778
  - 779
  - 786
  - 787
  - 788
  validation: no_reference
translation:
  text: a mother, with two things set before her—reverence for God, and the temporary
    safety of her seven sons according to the tyrant’s promise;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'piety' or 'godliness' for 'reverence for God' (Greek εὐσέβεια).
    reason: lexical_alternative
  - marker: b
    text: Or 'temporary deliverance'; the Greek refers to short-term preservation
      of life under the tyrant's promise, not necessarily salvation in a fuller theological
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτηρ
  chosen: a mother
  alternatives:
  - the mother
  - mother
  lexicon: LSJ
  rationale: Anarthrous noun used appositionally/resumptively in the sentence flow;
    English idiom can supply the indefinite sense naturally. Capitalization or definiteness
    is not required by the Greek alone.
- source_word: δυεῖν προκειμένων
  chosen: with two things set before her
  alternatives:
  - when two things were laid before her
  - with two options before her
  lexicon: LSJ
  rationale: 'The genitive absolute-like construction conveys circumstances: two matters
    lay before the mother as alternatives. ''Set before her'' preserves the metaphor
    of πρόκειμαι while remaining natural English.'
- source_word: εὐσεβείας
  chosen: reverence for God
  alternatives:
  - piety
  - godliness
  - devoutness
  lexicon: LSJ
  rationale: In 4 Maccabees, εὐσέβεια is a central virtue denoting faithful devotion
    toward God, not mere generic religiosity. 'Reverence for God' makes the object
    implicit in the book's usage explicit for modern readers while preserving theological
    weight better than the potentially opaque 'piety'.
- source_word: σωτηρίας προσκαίρου
  chosen: the temporary safety
  alternatives:
  - temporary deliverance
  - brief preservation
  - transient salvation
  lexicon: LSJ
  rationale: σωτηρία here refers to being spared from immediate death, not eschatological
    salvation. προσκαίρου marks it as short-lived or temporary. 'Temporary safety'
    communicates the concrete, this-worldly sense in context.
- source_word: τῆς ἑπτὰ υἱῶν
  chosen: of her seven sons
  alternatives:
  - of the seven sons
  lexicon: LSJ
  rationale: 'The relation is possessive in context: the mother is weighing the fate
    of her own sons. English naturally supplies ''her'' though the Greek article alone
    does not state the pronoun explicitly.'
- source_word: κατὰ τὴν τοῦ τυράννου ὑπόσχεσιν
  chosen: according to the tyrant’s promise
  alternatives:
  - in keeping with the tyrant's offer
  - on the basis of the tyrant's promise
  lexicon: LSJ
  rationale: κατά with the accusative here means 'in accordance with' or 'according
    to.' ὑπόσχεσις is a promise/offer made by the tyrant that the sons would be spared
    if they complied.
