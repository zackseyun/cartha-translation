translation:
  text: But motherly affection for her children did not move the mother of the young
    men, who was of one spirit with Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Abraham-like mother of the young men'; the Greek literally says
      'the mother of the young men, of one spirit with Abraham.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετεκίνησεν
  chosen: did not move
  alternatives:
  - did not shake
  - did not unsettle
  - did not change
  lexicon: LSJ
  rationale: The verb literally conveys moving from a position or state. In context
    it refers to emotional persuasion or displacement from steadfast resolve, so 'did
    not move' preserves both the metaphor and readable English.
- source_word: συμπάθεια
  chosen: motherly affection
  alternatives:
  - sympathy
  - compassion
  - natural affection
  lexicon: LSJ
  rationale: The noun denotes fellow-feeling or tender affection. Because the object
    is 'children' and the subject is a mother, 'motherly affection' makes explicit
    the relational force without overparaphrasing.
- source_word: τέκνων
  chosen: her children
  alternatives:
  - children
  - offspring
  lexicon: LSJ
  rationale: Although the Greek lacks an explicit possessive pronoun, the genitive
    is naturally understood with the mother in view. 'Her children' is idiomatic English
    and reflects the maternal relationship already present in the sentence.
- source_word: ὁμόψυχον
  chosen: of one spirit with
  alternatives:
  - like-minded with
  - sharing the same soul as
  - of one mind with
  lexicon: LSJ
  rationale: The adjective means united in soul, like-minded, or sharing the same
    inner disposition. 'Of one spirit with' preserves the strong personal solidarity
    while sounding natural in English.
- source_word: τῶν νεανιῶν μητέρα
  chosen: the mother of the young men
  alternatives:
  - the mother of the youths
  - the mother of the young men
  lexicon: LSJ
  rationale: νεανίαι refers to young men/youths. 'Young men' is slightly clearer in
    modern English than 'youths' and fits the martyrological context.
