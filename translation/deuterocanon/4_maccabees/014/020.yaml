theological_decisions:
- issue: Force of the comparison with Abraham
  chosen_reading: The mother is described as sharing Abraham's steadfast inner disposition,
    not merely being ethnically descended from him.
  alternative_readings:
  - the mother was Abraham-like
  - the mother belonged to Abraham's line
  rationale: ὁμόψυχον with a genitive points to shared spirit or like-mindedness.
    The verse praises moral and spiritual solidarity with Abraham's faithfulness rather
    than making a genealogical point.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
