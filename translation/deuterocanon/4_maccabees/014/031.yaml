translation:
  text: But the mother urged each son individually, and all of them together, toward
    death for the sake of godliness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one by one ... and all together.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for piety.' The Greek term denotes devout reverence and faithful devotion
      toward God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ
  chosen: But
  alternatives:
  - But also
  - Yet also
  lexicon: LSJ
  rationale: Marks continuation with mild contrast/emphasis from the preceding context.
    English 'But' carries the discourse turn naturally without overloading the line.
- source_word: καθʼ ἕνα
  chosen: each ... individually
  alternatives:
  - one by one
  - each one
  lexicon: LSJ
  rationale: The idiom means 'one by one' or 'individually.' Rendering it with 'each
    son individually' makes explicit the distributive force in idiomatic English.
- source_word: παῖδα
  chosen: son
  alternatives:
  - child
  - boy
  lexicon: LSJ
  rationale: Although παῖς can mean 'child' or 'boy,' in this context of the mother
    and her seven male children undergoing martyrdom, 'son' best captures the familial
    relationship intended by the narrative.
- source_word: ὁμοῦ πάντας
  chosen: all of them together
  alternatives:
  - all together
  - all at once
  lexicon: LSJ
  rationale: Conveys the collective sense alongside the prior distributive phrase.
    'All of them together' preserves the contrast between individual and collective
    exhortation.
- source_word: ἡ μήτηρ
  chosen: the mother
  alternatives:
  - their mother
  lexicon: LSJ
  rationale: The Greek has the article with 'mother.' English can retain 'the mother'
    naturally here; 'their mother' is interpretive though contextually true.
- source_word: ἐπὶ ... προέτρεπεν
  chosen: urged ... on toward
  alternatives:
  - encouraged ... toward
  - exhorted ... to
  lexicon: LSJ
  rationale: προτρέπω means to urge on, encourage, or exhort. 'Urged ... on toward'
    preserves the directional force of ἐπί with the accusative and the intensity of
    the verb.
- source_word: τὸν ... θάνατον
  chosen: death
  alternatives:
  - their death
  - a death
  lexicon: LSJ
  rationale: The article is generic/specific in context; English simply 'death' is
    most natural while preserving the starkness of the Greek.
- source_word: τῆς εὐσεβείας
  chosen: for the sake of godliness
  alternatives:
  - of piety
  - for piety
  - for reverence toward God
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees denotes devout fidelity to God and the law. 'Godliness'
    is accessible modern English and keeps the explicitly religious dimension better
    than the potentially thinner 'piety,' while 'for the sake of' expresses the genitival
    relation idiomatically.
