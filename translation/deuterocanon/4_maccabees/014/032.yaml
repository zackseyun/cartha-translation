id: 4MA.14.32
reference: 4 Maccabees 14:32
source:
  edition: lxx-swete-1909
  text: Ὦ φύσις ἱερά, καὶ φίλτρα γονέων καὶ γονεύσιν φιλοστόργε, καὶ τροφεῖα, καὶ
    μητέρων ἀδάμαστα πάθη.
  language: Greek
