translation:
  text: O sacred nature, and parents’ affections, and filial love toward parents,
    and nurture, and mothers’ unconquerable passions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the endearments of parents'; the Greek φίλτρα can literally denote love-charms,
      but here refers more naturally to affectionate bonds.
    reason: lexical_alternative
  - marker: b
    text: Or 'mothers’ indomitable emotions' or, less likely in context, 'mothers’
      unconquerable sufferings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φύσις ἱερά
  chosen: sacred nature
  alternatives:
  - holy nature
  - sacred natural bond
  lexicon: LSJ
  rationale: φύσις can denote nature or the natural order; here in an exclamatory
    lament over family bonds, 'nature' best preserves the broad appeal to the sacredness
    of natural kinship without over-specifying 'bond.' ἱερά is rendered 'sacred' for
    elevated but readable English.
- source_word: φίλτρα γονέων
  chosen: parents’ affections
  alternatives:
  - parents' love-charms
  - parents' tender affections
  - the endearments of parents
  lexicon: LSJ
  rationale: φίλτρα literally can refer to charms or love-potions, but in literary
    usage also to affections/endearments. In this context of maternal and familial
    attachment, a literal 'charms' would mislead; 'parents’ affections' conveys the
    emotional force.
- source_word: γονεύσιν φιλοστόργε
  chosen: filial love toward parents
  alternatives:
  - child-loving toward parents
  - natural affection for parents
  lexicon: LSJ
  rationale: The adjective/adverbial expression built on φιλοστόργος evokes tender
    family affection. Because γονεύσιν is dative ('toward parents'), the phrase is
    rendered as the child's affectionate devotion directed to parents. 'Filial love'
    is concise and idiomatic.
- source_word: τροφεῖα
  chosen: nurture
  alternatives:
  - rearing
  - nourishment
  - upbringing
  lexicon: LSJ
  rationale: τροφεῖα refers to the act or means of rearing/nourishing. 'Nurture' captures
    both feeding and upbringing in a compact English term suitable to the rhetorical
    list.
- source_word: μητέρων ἀδάμαστα πάθη
  chosen: mothers’ unconquerable passions
  alternatives:
  - mothers' indomitable emotions
  - mothers' irresistible affections
  - mothers' untamable sufferings
  lexicon: LSJ
  rationale: πάθη can mean passions, emotions, or sufferings depending on context.
    Here the speaker invokes the overpowering emotional force of maternal attachment,
    so 'passions' is retained in a non-pejorative classical sense. ἀδάμαστα is 'unconquerable/untamable';
    'unconquerable' fits the rhetorical tone.
