theological_decisions:
- issue: Rendering emotionally charged familial terms without importing later doctrinal
    language
  chosen_reading: Translate the verse as a rhetorical invocation of natural family
    bonds and maternal affection
  alternative_readings:
  - Interpret πάθη as 'sufferings' rather than 'passions/emotions'
  rationale: The verse is not making a doctrinal claim but lamenting the power and
    sanctity of family affection. The chosen rendering preserves that tension and
    emotional weight without flattening the rhetoric or moralizing the term πάθη.
  doctrine_reference: Translation philosophy §§1, 3, 6
