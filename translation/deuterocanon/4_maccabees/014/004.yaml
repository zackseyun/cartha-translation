translation:
  text: None of the seven young men became cowardly, nor did they shrink back from
    death;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has a singular verb in the second clause, literally, 'nor did he shrink
      back from death,' expressing the idea that not one of them recoiled.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  chosen: none
  alternatives:
  - not one
  - no one
  lexicon: LSJ
  rationale: Indefinite negative pronoun; 'none' fits the partitive construction with
    ἐκ and keeps the emphatic negation concise.
- source_word: ἐκ τῶν ἑπτὰ μειρακίων
  chosen: of the seven young men
  alternatives:
  - from among the seven youths
  - of the seven boys
  lexicon: LSJ
  rationale: μειράκιον denotes a young male, youth, or young man. 'Young men' preserves
    masculine reference and avoids the childish tone of 'boys' while remaining natural
    English.
- source_word: ἐδειλίασεν
  chosen: became cowardly
  alternatives:
  - acted cowardly
  - lost courage
  - was afraid
  lexicon: LSJ
  rationale: From δειλιάω, to be cowardly or lose heart. 'Became cowardly' preserves
    the moral nuance of cowardice better than the softer 'was afraid.'
- source_word: οὐδὲ
  chosen: nor
  alternatives:
  - and not
  - neither
  lexicon: LSJ
  rationale: Links the second negated clause smoothly in English.
- source_word: πρὸς τὸν θάνατον
  chosen: from death
  alternatives:
  - at death
  - in the face of death
  - toward death
  lexicon: LSJ
  rationale: With ὀκνέω the phrase conveys recoiling in relation to death. English
    idiom prefers 'shrink back from death' rather than a more literal but awkward
    prepositional rendering.
- source_word: ὤκνησεν
  chosen: shrink back
  alternatives:
  - hesitated
  - drew back
  - flinched
  lexicon: LSJ
  rationale: ὀκνέω can mean hesitate, shrink, or draw back. 'Shrink back' best conveys
    refusal to recoil before death, matching the martyrdom context.
