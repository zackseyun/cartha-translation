theological_decisions:
- issue: Collective singular after a plural group reference
  chosen_reading: Rendered the second clause with singular 'he' to reflect the Greek
    verb form while preserving the distributive sense over the seven.
  alternative_readings:
  - 'Rendered idiomatically as plural: ''nor did they shrink back from death'''
  rationale: The Greek shifts from the collective 'none of the seven' to a singular
    verb, likely distributive ('not one ... nor did he...'). Keeping singular makes
    the syntax more transparent to the source, though the sense still applies to each
    of the seven.
  doctrine_reference: Translation philosophy §§1, 5
