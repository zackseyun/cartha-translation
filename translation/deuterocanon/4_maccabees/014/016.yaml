  text: τὰ δὲ κατὰ τὰς κορυφὰς ὀρέων καὶ φαράγγων ἀπορρῶγας καὶ δένδρων ὀπὰς καὶ τὰς
    τούτων ἄκρας νοσσοποιούμενα ἀποτίκτει, καὶ τὸν προσιόντα κωλύει.
