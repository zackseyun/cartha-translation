translation:
  text: What could be more painful than these things? For the power of fire, being
    sharp and swift, quickly consumed the bodies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'quickly destroyed the bodies.' The Greek verb can mean 'dissolved,'
      'broke up,' or 'destroyed'; 'consumed' is chosen here because the subject is
      fire.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν τί γένοιτο ἐπαλγέστερον;
  chosen: What could be more painful than these things?
  alternatives:
  - What could be more grievous than these things?
  - What could be more distressing than these things?
  lexicon: LSJ
  rationale: The comparative ἐπαλγέστερον denotes greater pain or distress. 'More
    painful' is the most direct and natural English rendering in context, preserving
    the rhetorical question introduced by τί γένοιτο.
- source_word: ὀξεῖα
  chosen: sharp
  alternatives:
  - keen
  - intense
  lexicon: LSJ
  rationale: ὀξεῖα literally means 'sharp' or 'keen.' In describing the force of fire,
    'sharp' preserves the vivid metaphor without over-paraphrasing.
- source_word: σύντομος
  chosen: swift
  alternatives:
  - brief
  - quick
  lexicon: LSJ
  rationale: Although σύντομος can mean 'brief' or 'short,' with δύναμις and in parallel
    with ταχέως it describes rapid action. 'Swift' communicates this naturally in
    English.
- source_word: ἡ τοῦ πυρὸς οὖσα δύναμις
  chosen: the power of fire
  alternatives:
  - the force of the fire
  - fire's power
  lexicon: LSJ
  rationale: This phrase identifies the operative destructive agency. 'The power of
    fire' is clear, close to the Greek, and suitably elevated in tone.
- source_word: ταχέως διέλυσε τὰ σώματα
  chosen: quickly consumed the bodies
  alternatives:
  - quickly destroyed the bodies
  - quickly dissolved the bodies
  lexicon: LSJ
  rationale: διέλυσε literally suggests loosening, breaking up, or destroying. In
    the context of bodies under burning torture, 'consumed' conveys the effect of
    fire idiomatically while remaining faithful to the sense.
