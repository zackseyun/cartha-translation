reference: 4 Maccabees 14:10
source:
  edition: lxx-swete-1909
  text: ὧν τί γένοιτο ἐπαλγέστερον; ὀξεῖα γὰρ καὶ σύντομος ἡ τοῦ πυρὸς οὖσα δύναμις
    ταχέως διέλυσε τὰ σώματα.
