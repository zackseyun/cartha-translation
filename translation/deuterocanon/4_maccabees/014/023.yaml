theological_decisions:
- issue: Sense of κατὰ θεόν in relation to eternal life and piety
  chosen_reading: Render literally as 'according to God' rather than interpretively
    expanding it.
  alternative_readings:
  - as God wills
  - in accordance with God's will
  - in God's judgment
  rationale: The phrase could be taken adverbially to qualify the saving effect or
    the nature of the piety. A literal rendering preserves the theological nuance
    and avoids importing a more specific doctrinal claim than the Greek states.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
