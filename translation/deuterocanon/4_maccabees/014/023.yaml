translation:
  text: He loved piety more, the piety that saves unto eternal life according to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'godliness' for 'piety' (εὐσέβεια).
    reason: lexical_alternative
  - marker: b
    text: The phrase 'according to God' may also mean 'in accordance with God's will'
      or 'in God's judgment.'
    reason: alternative_reading
lexical_decisions:
- source_word: εὐσέβειαν
  chosen: piety
  alternatives:
  - godliness
  - reverence
  lexicon: LSJ
  rationale: εὐσέβεια in Hellenistic Jewish usage denotes reverent devotion toward
    God expressed in faithful conduct. 'Piety' preserves the religious and ethical
    force better than the broader 'reverence'; 'godliness' is possible but can sound
    more idiomatic than the Greek's abstract noun.
- source_word: μᾶλλον
  chosen: more
  alternatives:
  - rather
  - more than
  lexicon: LSJ
  rationale: The adverb marks comparative preference. 'More' keeps the comparison
    concise and natural in English while preserving the sense of stronger love or
    preference.
- source_word: ἠγάπησεν
  chosen: loved
  alternatives:
  - cherished
  - preferred
  lexicon: LSJ
  rationale: The verb is the aorist of ἀγαπάω, whose basic sense is 'love.' Although
    the context implies preference, that comparative force is already carried by μᾶλλον,
    so 'loved' is the most transparent rendering.
- source_word: τὴν σώζουσαν
  chosen: the piety that saves
  alternatives:
  - which saves
  - the saving piety
  lexicon: LSJ
  rationale: The article plus participle modifies εὐσέβειαν. Repeating 'the piety
    that saves' makes the syntax clear in English and preserves the attributive force
    of the participle without over-compressing it into an adjective.
- source_word: εἰς αἰώνιον ζωὴν
  chosen: for eternal life
  alternatives:
  - unto eternal life
  - into eternal life
  lexicon: LSJ
  rationale: εἰς here expresses goal or result. 'For eternal life' is idiomatic modern
    English and preserves the teleological sense without sounding archaic.
- source_word: κατὰ θεόν
  chosen: according to God
  alternatives:
  - in accordance with God
  - as God wills
  - in God's sight
  lexicon: LSJ
  rationale: The phrase is somewhat compressed and can denote conformity to God's
    standard or will. 'According to God' stays close to the Greek and preserves the
    interpretive openness better than a more explicit paraphrase.
