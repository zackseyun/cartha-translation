id: 4MA.14.23
reference: 4 Maccabees 14:23
source:
  edition: lxx-swete-1909
  text: τὴν εὐσέβειαν μᾶλλον ἠγάπησεν τὴν σώζουσαν εἰς αἰώνιον ζωὴν κατὰ θεόν.
  language: Greek
