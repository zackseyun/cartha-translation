theological_decisions:
- issue: Rendering of τὰ νόμιμα in a Jewish martyrdom context
  chosen_reading: the law
  alternative_readings:
  - the ancestral laws
  - the ordinances
  rationale: The phrase refers to fidelity to Jewish legal obligations under persecution.
    'The law' is idiomatic and preserves the religious-ethical force without over-specifying
    'ancestral' in the main text, though that nuance is possible.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gender-accurate rendering of φιλάδελφοι
  chosen_reading: loving toward their brothers
  alternative_readings:
  - loving toward their siblings
  rationale: The narrative concerns male siblings, and the Greek term is explicitly
    brother-oriented. Following the project's gender-accurate policy, the masculine
    familial reference is retained rather than neutralized.
  doctrine_reference: Translation philosophy §4
