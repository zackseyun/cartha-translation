translation:
  text: For they were righteous and self-controlled, brave and noble-minded and loving
    toward their brothers, and so devoted to their mother that, even to the point
    of death, they obeyed her by keeping the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ancestral laws' or 'the ordinances'; the Greek is plural, referring
      to the lawful requirements they were determined to observe.
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιοί
  chosen: righteous
  alternatives:
  - just
  lexicon: LSJ
  rationale: δίκαιος commonly denotes moral uprightness or justice. 'Righteous' best
    fits the virtue list and preserves the ethical-religious sense without flattening
    it to merely civic fairness.
- source_word: σώφρονες
  chosen: self-controlled
  alternatives:
  - temperate
  - sensible
  lexicon: LSJ
  rationale: In a catalog of virtues, σώφρων points to disciplined moderation and
    mastery of oneself. 'Self-controlled' is clear modern English and matches the
    context of reason-governed endurance in 4 Maccabees.
- source_word: ἀνδρεῖοι
  chosen: brave
  alternatives:
  - courageous
  - manly
  lexicon: LSJ
  rationale: The term denotes courage. 'Brave' is idiomatic and avoids importing gendered
    nuance from 'manly' that is not required in English here.
- source_word: μεγαλόψυχοι
  chosen: noble-minded
  alternatives:
  - magnanimous
  - great-souled
  lexicon: LSJ
  rationale: The compound literally suggests greatness of soul. 'Noble-minded' preserves
    the elevated moral sense in readable English; 'magnanimous' is possible but less
    accessible.
- source_word: φιλάδελφοι
  chosen: loving toward their brothers
  alternatives:
  - brother-loving
  - affectionate toward their siblings
  lexicon: LSJ
  rationale: The adjective denotes familial affection for brothers. Because the source
    is explicitly masculine/plural and refers to the brothers in this narrative, 'loving
    toward their brothers' is gender-accurate and contextually specific.
- source_word: φιλόμητρος
  chosen: devoted to their mother
  alternatives:
  - loving their mother
  - mother-loving
  lexicon: LSJ
  rationale: The adjective means loving or devoted to one's mother. 'Devoted to their
    mother' captures both affection and loyal attachment, which the following clause
    intensifies.
- source_word: οὕτως, ὥστε
  chosen: so ... that
  alternatives:
  - to such a degree that
  lexicon: LSJ
  rationale: This correlative construction marks degree and result. 'So ... that'
    is the most natural English equivalent.
- source_word: μέχρι θανάτου
  chosen: even to the point of death
  alternatives:
  - until death
  - as far as death
  lexicon: LSJ
  rationale: The phrase expresses extremity of endurance rather than mere temporal
    duration. 'Even to the point of death' brings out the climactic force in context.
- source_word: τὰ νόμιμα
  chosen: the law
  alternatives:
  - the lawful commands
  - the ancestral laws
  - the ordinances
  lexicon: LSJ
  rationale: In Maccabean literature τὰ νόμιμα often refers to the Jewish ancestral
    law/customs. Here singular 'the law' is idiomatic English for covenantal legal
    observance, while still covering the plural Greek idea of lawful requirements.
- source_word: φυλάσσοντας
  chosen: keeping
  alternatives:
  - observing
  - guarding
  lexicon: LSJ
  rationale: φυλάσσω in legal-religious contexts commonly means keep/observe. 'Keeping'
    is concise and natural with 'the law.'
- source_word: πείθεσθαι αὐτῇ
  chosen: they obeyed her
  alternatives:
  - they were persuaded by her
  - they submitted to her
  lexicon: LSJ
  rationale: πείθομαι can mean obey when used with a personal dative. In this context
    of filial loyalty under martyrdom, 'obeyed her' is the clearest sense.
