  text: ἔστι δὲ κομιδῇ γελοῖος ὁ λογισμός· οὐ γὰρ τῶν ἑαυτοῦ παθῶν ὁ λογισμὸς ἐπικρατεῖν
    φαίνεται, ἀλλὰ τῶν σωματικῶν.
