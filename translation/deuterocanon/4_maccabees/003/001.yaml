theological_decisions:
- issue: Anthropological/philosophical contrast between reason and passions
  chosen_reading: Render λογισμός in the first clause as an argument under critique
    and in the second as reason as a faculty, preserving the rhetorical shift.
  alternative_readings:
  - Translate λογισμός uniformly as 'reasoning' throughout
  - Translate λογισμός uniformly as 'reason' throughout
  rationale: The verse critiques a claim about reason's power. English benefits from
    distinguishing the opening reference to the claim itself from the subsequent statement
    about reason's actual scope of mastery. This is a lexical-philosophical decision
    rather than a doctrinal one, but it affects interpretation.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
