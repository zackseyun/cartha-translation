translation:
  text: But this argument is utterly ridiculous, for reason evidently does not prevail
    over its own passions, but over bodily ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''argument'': the Greek λογισμός can denote a process of reasoning,
      a rational faculty, or the argument being advanced.'
    reason: lexical_alternative
  - marker: b
    text: That is, over bodily passions or appetites; the Greek uses the adjective
      'bodily' substantivally.
    reason: lexical_alternative
lexical_decisions:
- source_word: κομιδῇ
  chosen: utterly
  alternatives:
  - completely
  - altogether
  - quite
  lexicon: LSJ
  rationale: The adverb intensifies γελοῖος. 'Utterly' conveys strong emphasis in
    natural modern English without sounding archaic.
- source_word: γελοῖος
  chosen: ridiculous
  alternatives:
  - laughable
  - absurd
  lexicon: LSJ
  rationale: The sense is that the argument is worthy of ridicule. 'Ridiculous' is
    idiomatic and suitably strong; 'laughable' is possible but slightly lighter in
    tone.
- source_word: λογισμός
  chosen: line of reasoning
  alternatives:
  - argument
  - reasoning
  - rational principle
  lexicon: LSJ
  rationale: Here the noun refers to the claim or argument under discussion, not merely
    the faculty of reason in the abstract. 'Line of reasoning' preserves the argumentative
    sense while distinguishing it from the later occurrences where λογισμός functions
    more as 'reason.'
- source_word: τῶν ἑαυτοῦ παθῶν
  chosen: its own passions
  alternatives:
  - its own sufferings
  - its own emotions
  - its own desires
  lexicon: LSJ
  rationale: In 4 Maccabees πάθη commonly denotes passions or impulses rather than
    sufferings. The reflexive ἑαυτοῦ is retained with 'its own.'
- source_word: ἐπικρατεῖν
  chosen: to prevail over
  alternatives:
  - to master
  - to control
  - to dominate
  lexicon: LSJ
  rationale: The verb denotes gaining mastery over. 'Prevail over' is close to the
    Greek and fits the philosophical register of the passage.
- source_word: φαίνεται
  chosen: is evidently
  alternatives:
  - appears
  - seems
  lexicon: LSJ
  rationale: The verb marks what is apparent from observation or argument. 'Is evidently'
    reads more naturally in English here than 'appears' while preserving the inferential
    nuance.
- source_word: τῶν σωματικῶν
  chosen: bodily ones
  alternatives:
  - bodily passions
  - physical passions
  - things of the body
  lexicon: LSJ
  rationale: The adjective stands substantivally and contrasts with 'its own passions.'
    'Bodily ones' keeps the Greek brevity while indicating bodily passions or appetites
    are meant by context.
