id: 4MA.3.11
reference: 4 Maccabees 3:11
source:
  edition: lxx-swete-1909
  text: ἀλλὰ τις αὐτὸν ἀλόγιστος ἐπιθυμία τοῦ παρὰ τοῖς πολεμίοις ὕδατος ἐπιτείνουσα
    συνέφρυγε, καὶ λύουσα κατέφλεγεν.
