theological_decisions:
- issue: Reason-versus-passion terminology in 4 Maccabees
  chosen_reading: Rendered ἀλόγιστος as 'irrational' rather than a more generic 'senseless'
    or 'unreasoning.'
  alternative_readings:
  - unreasoning
  - senseless
  rationale: This book explicitly frames its argument around reason governing the
    passions. 'Irrational' preserves that conceptual contrast and avoids muting the
    philosophical vocabulary.
  doctrine_reference: DOCTRINE.md §Translation philosophy, items 1 and 5
