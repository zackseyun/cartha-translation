translation:
  text: But an irrational desire for the water among the enemies, tightening its grip
    on him, shriveled him, and while relaxing him, burned him up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the water in the enemies’ camp.' The Greek phrase literally refers
      to the water 'among/with the enemies.'
    reason: lexical_alternative
  - marker: b
    text: 'The imagery is compressed: desire is personified as both tightening and
      loosening him, then burning him up—depicting the contradictory bodily effects
      of intense thirst.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: LSJ
  rationale: Marks a contrast with the preceding description; simple adversative 'But'
    is natural and sufficiently formal.
- source_word: τις
  chosen: some
  alternatives:
  - a certain
  - one
  lexicon: LSJ
  rationale: Indefinite pronoun modifying ἀλόγιστος ἐπιθυμία; 'some' preserves the
    indefiniteness without sounding wooden.
- source_word: ἀλόγιστος
  chosen: irrational
  alternatives:
  - unreasoning
  - senseless
  lexicon: LSJ
  rationale: In 4 Maccabees the contrast between reason and passion is central; 'irrational'
    best preserves that philosophical-theological contrast.
- source_word: ἐπιθυμία
  chosen: desire
  alternatives:
  - craving
  - lust
  lexicon: LSJ
  rationale: The term denotes strong desire; 'desire' is broad enough for thirst-context
    while avoiding the overly sexual sense of 'lust.' 'Craving' is possible but slightly
    more interpretive.
- source_word: τοῦ παρὰ τοῖς πολεμίοις ὕδατος
  chosen: for the water among the enemy
  alternatives:
  - for the water in the enemies' camp
  - for the water with the enemy
  lexicon: LSJ
  rationale: Genitive dependent on ἐπιθυμία, with παρὰ τοῖς πολεμίοις indicating location/possession.
    'Among the enemy' stays close to the Greek while conveying that the desired water
    was in enemy-held territory.
- source_word: ἐπιτείνουσα
  chosen: tightening itself upon him
  alternatives:
  - pressing hard on him
  - straining him
  - intensifying against him
  lexicon: LSJ
  rationale: The participle literally conveys stretching/straining/tightening. Because
    the object αὐτόν is explicit, the image is of desire exerting pressure on him.
    This preserves the vivid metaphor rather than flattening it to mere 'intensifying.'
- source_word: συνέφρυγε
  chosen: shriveled him
  alternatives:
  - withered him
  - parched him
  lexicon: LSJ
  rationale: The verb suggests drying up or shriveling. 'Shriveled' captures the bodily
    effect of thirst and the figurative violence of desire.
- source_word: λύουσα
  chosen: while loosening him
  alternatives:
  - while unstringing him
  - while weakening him
  lexicon: LSJ
  rationale: The participle literally means loosening/releasing. In context it likely
    refers to the desire's effect of unstringing or weakening his bodily strength.
    The more literal 'loosening him' keeps the metaphor visible.
- source_word: κατέφλεγεν
  chosen: burned him up
  alternatives:
  - consumed him with burning
  - set him ablaze
  lexicon: LSJ
  rationale: The compound verb intensifies the image of burning. 'Burned him up' is
    idiomatic, forceful, and preserves the metaphor of consuming inner heat from thirst/desire.
