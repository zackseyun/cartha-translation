translation:
  text: and to wrestle down the pains of the body, though they are extreme, and by
    the nobility and goodness of reason to spurn all the dominion of the passions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to reject with contempt all the mastery of the passions.' The Greek
      verb is literally vivid ('to spit away') and may be taken figuratively as disdainful
      rejection.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλγηδόνας
  chosen: pains
  alternatives:
  - sufferings
  - agonies
  lexicon: LSJ
  rationale: The noun denotes bodily pain or distress. 'Pains' is natural English
    and fits the bodily context without overstating beyond the Greek.
- source_word: καθʼ ὑπερβολὴν οὔσας
  chosen: though they are extreme
  alternatives:
  - being excessive
  - extraordinarily great
  lexicon: LSJ
  rationale: The phrase intensifies the bodily pains. Rendering concessively with
    'though they are extreme' preserves the force in readable English.
- source_word: καταπαλαῖσαι
  chosen: to wrestle down
  alternatives:
  - to overcome
  - to subdue
  lexicon: LSJ
  rationale: The verb evokes grappling or defeating in contest. 'Wrestle down' preserves
    the athletic metaphor better than a flatter 'overcome.'
- source_word: καλοκἀγαθίας
  chosen: nobility and goodness
  alternatives:
  - moral excellence
  - virtue
  lexicon: LSJ
  rationale: The compressed ideal of καλὸς κἀγαθός carries both nobility and moral
    goodness. Expanding it avoids importing a single abstract term that may flatten
    the Greek nuance.
- source_word: λογισμοῦ
  chosen: reason
  alternatives:
  - rational judgment
  - mind
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for rational faculty or reasoned
    judgment governing passions. 'Reason' is concise and contextually central.
- source_word: ἀποπτύσαι
  chosen: to spit away
  alternatives:
  - to reject with contempt
  - to spurn
  lexicon: LSJ
  rationale: The verb literally means to spit out or away, used figuratively for contemptuous
    rejection. 'Spit away' keeps the vivid metaphor, though somewhat idiomatic in
    English.
- source_word: πάσας τὰς τῶν παθῶν ἐπικρατείας
  chosen: all the dominion of the passions
  alternatives:
  - all the mastery of the passions
  - every controlling power of the passions
  lexicon: LSJ
  rationale: ἐπικρατεία denotes dominance or mastery. The genitive construction points
    to the ruling power exercised by passions. 'Dominion of the passions' preserves
    that sense of controlling force.
