id: 4MA.3.18
reference: 4 Maccabees 3:18
source:
  edition: lxx-swete-1909
  text: καὶ τὰς τῶν σωμάτων ἀλγηδόνας καθʼ ὑπερβολὴν οὔσας καταπαλαῖσαι, καὶ τῆς καλοκἀγαθίας
    τοῦ λογισμοῦ ἀποπτύσαι πάσας τὰς τῶν παθῶν ἐπικρατείας.
