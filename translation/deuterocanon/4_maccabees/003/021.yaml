id: 4MA.3.21
reference: 4 Maccabees 3:21
source:
  edition: lxx-swete-1909
  text: τότε δὴ τινες πρὸς τὴν κοινὴν νεωτερίσαντες ὁμόνοιαν πολυτρόπως ἐχρήσαντο
    συμφοραῖς.
  language: Greek
  pages:
  - 757
  confidence: high
  validation: agree
translation:
  text: Then indeed some, having stirred up revolt against the common harmony, made
    use of calamities in many ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having stirred up revolution against the common concord.' The participle
      νεωτερίσαντες can carry a stronger political sense than 'rebelled.'
    reason: lexical_alternative
  - marker: b
    text: Or 'exploited misfortunes in many ways.' The Greek literally says 'made
      use of disasters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε δὴ
  chosen: Then indeed
  alternatives:
  - Then
  - At that time indeed
  lexicon: LSJ
  rationale: The combination marks a transition with emphasis. 'Then indeed' preserves
    both the temporal and emphatic force without sounding overly wooden.
- source_word: τινες
  chosen: some
  alternatives:
  - certain people
  - some persons
  lexicon: LSJ
  rationale: An indefinite plural is best rendered simply as 'some,' which is natural
    English and preserves the nonspecific reference.
- source_word: πρὸς τὴν κοινὴν ... ὁμόνοιαν
  chosen: against the common harmony
  alternatives:
  - toward the common concord
  - against the common unity
  lexicon: LSJ
  rationale: 'With νεωτερίσαντες, πρός here is adversative in sense: they acted in
    a revolutionary way against shared civic/social concord. ''Common harmony'' keeps
    the sense of communal concord without importing later technical political language.'
- source_word: νεωτερίσαντες
  chosen: having rebelled
  alternatives:
  - having stirred up revolution
  - having acted rashly
  - having innovated
  lexicon: LSJ
  rationale: The verb commonly carries the sense of political revolt or revolutionary
    disturbance, not mere novelty. 'Having rebelled' is concise and fits the context
    of acting against communal concord.
- source_word: πολυτρόπως
  chosen: in many ways
  alternatives:
  - variously
  - by many devices
  lexicon: LSJ
  rationale: The adverb indicates multiplicity of manner. 'In many ways' is clear
    modern English and preserves the breadth of action.
- source_word: ἐχρήσαντο συμφοραῖς
  chosen: made use of disasters
  alternatives:
  - exploited misfortunes
  - used calamities
  - availed themselves of troubles
  lexicon: LSJ
  rationale: χράομαι with the dative means 'make use of' or 'employ.' συμφοραί can
    mean disasters, misfortunes, or calamities. 'Made use of disasters' stays close
    to the Greek while allowing the reader to infer opportunistic exploitation.
