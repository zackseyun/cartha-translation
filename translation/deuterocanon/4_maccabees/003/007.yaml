translation:
  text: For when David, attacking the foreigners throughout the whole day, killed
    many of them with the soldiers of the nation,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Philistines.' The Greek reads 'the foreigners' (ἀλλόφυλοι), a term
      often used in biblical Greek for Philistines, but the wording here is not the
      proper ethnic name itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'with the soldiers of his people.' The Greek literally says 'with the
      soldiers of the nation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ γὰρ
  chosen: For when
  alternatives:
  - since indeed
  - for because
  lexicon: LSJ
  rationale: Introduces an explanatory ground with narrative force. 'For when' preserves
    both the explanatory γάρ and the temporal sense of ἐπεί in readable English.
- source_word: διʼ ὅλης ἡμέρας
  chosen: throughout the whole day
  alternatives:
  - all day long
  - during the entire day
  lexicon: LSJ
  rationale: The phrase emphasizes duration across the full day. 'Throughout the whole
    day' is slightly more formal and keeps the distributive force of διὰ with the
    genitive.
- source_word: προσβάλλων
  chosen: attacking
  alternatives:
  - assailing
  - engaging in battle against
  lexicon: LSJ
  rationale: The participle denotes hostile action/assault. 'Attacking' is clear modern
    English and fits the military context without overexpanding the sense.
- source_word: τοῖς ἀλλοφύλοις
  chosen: the foreigners
  alternatives:
  - the Philistines
  - those of another race/people
  lexicon: LSJ
  rationale: Literally 'those of another tribe/people.' In biblical narrative it can
    refer specifically to Philistines, but this verse uses the common Greek term rather
    than a proper ethnonym. 'The foreigners' preserves the lexical form without importing
    a more specific identification than the wording itself states.
- source_word: ὁ Δαυείδ
  chosen: David
  rationale: Standard transliteration of the personal name.
- source_word: πολλοὺς αὐτῶν ἀπέκτεινεν
  chosen: killed many of them
  alternatives:
  - slew many of them
  - put many of them to death
  lexicon: LSJ
  rationale: ἀποκτείνω straightforwardly means 'kill.' 'Killed many of them' is accurate
    and natural.
- source_word: μετὰ τῶν τοῦ ἔθνους στρατιωτῶν
  chosen: along with the soldiers of the nation
  alternatives:
  - with the soldiers of his people
  - together with the national troops
  lexicon: LSJ
  rationale: μετά with the genitive indicates accompaniment. τοῦ ἔθνους is literally
    'of the nation/people.' 'The nation' keeps the Greek noun visible, though in context
    it refers to David's own people. 'Along with the soldiers of the nation' preserves
    the syntax without adding 'his' where the Greek does not explicitly state it.
