translation:
  text: Then, when evening had come, sweating and very exhausted, he came to the royal
    tent, around which the whole army of his forefathers had encamped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the king's tent.' The Greek adjective means 'royal' and may refer
      specifically to the ruler's tent in the camp.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the whole army of his ancestors' is compressed in Greek and
      may also be understood as 'all the army of his forefathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γενομένης ἑσπέρας
  chosen: when evening had come
  alternatives:
  - when evening came
  - at evening
  lexicon: LSJ
  rationale: Genitive absolute marking temporal circumstance; 'when evening had come'
    preserves the completed arrival of evening in natural English.
- source_word: ἱδρῶν
  chosen: sweating
  alternatives:
  - in a sweat
  - perspiring
  lexicon: LSJ
  rationale: Present participle describing his physical condition on arrival; 'sweating'
    is vivid and idiomatic without over-paraphrase.
- source_word: σφόδρα κεκμηκώς
  chosen: very exhausted
  alternatives:
  - utterly weary
  - greatly fatigued
  lexicon: LSJ
  rationale: σφόδρα intensifies the perfect participle κεκμηκώς; 'very exhausted'
    communicates both intensity and the resulting state.
- source_word: ἐπὶ τὴν βασίλειον σκηνήν
  chosen: to the royal tent
  alternatives:
  - to the king's tent
  - to the palace tent
  lexicon: LSJ
  rationale: βασίλειος is adjectival, 'royal'; σκηνή is 'tent.' 'Royal tent' is the
    most direct rendering and fits the military-camp setting better than 'palace.'
- source_word: περὶ ἣν
  chosen: around which
  alternatives:
  - about which
  - near which
  lexicon: LSJ
  rationale: περί with the relative pronoun here indicates spatial surrounding; 'around
    which' best matches the encampment image.
- source_word: ὁ πᾶς τῶν προγόνων στρατός
  chosen: the whole army of his ancestors
  alternatives:
  - all the army of his forefathers
  - the entire ancestral army
  lexicon: LSJ
  rationale: The phrase is somewhat compressed in Greek. Given the singular subject
    implied by the surrounding narrative, English requires an explicit possessive
    for clarity. 'Ancestors' is more natural modern English than 'forefathers' while
    preserving the genealogical sense of προγόνων.
- source_word: ἐστρατοπέδευκεν
  chosen: had encamped
  alternatives:
  - was encamped
  - camped
  lexicon: LSJ
  rationale: Pluperfect sense is not explicit morphologically, but in context the
    action is prior to his arrival; 'had encamped' makes the sequence clear in English.
