translation:
  text: And now the time also calls us to the demonstration of the account of rational
    self-control.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the proof of the account of temperate reason' or 'the demonstration
      of the narrative of self-controlled reason.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤδη
  chosen: now
  alternatives:
  - already
  lexicon: LSJ
  rationale: Ἤδη commonly means 'already' or 'now.' In this discourse-transition context,
    'now' better conveys the author's move to the next stage of argument in natural
    English.
- source_word: καιρός
  chosen: time
  alternatives:
  - occasion
  - season
  - critical moment
  lexicon: LSJ
  rationale: καιρός here denotes the fitting or appointed moment in the argument.
    'Time' is the most natural concise rendering, while the sense of aptness is carried
    by the clause as a whole.
- source_word: καλεῖ
  chosen: calls
  alternatives:
  - summons
  - invites
  lexicon: LSJ
  rationale: The verb is metaphorical, personifying the moment as urging the speaker
    onward. 'Calls' preserves that personification without over-intensifying it.
- source_word: ἐπὶ τὴν ἀπόδειξιν
  chosen: to the demonstration
  alternatives:
  - to the proof
  - to the presentation of proof
  lexicon: LSJ
  rationale: ἀπόδειξις can mean demonstration or proof. 'Demonstration' fits the rhetorical
    setting and avoids sounding overly technical or juridical, while still conveying
    evidential argument.
- source_word: ἱστορίας
  chosen: history
  alternatives:
  - account
  - narrative
  lexicon: LSJ
  rationale: ἱστορία can denote an account or narrative, but 'history' is a defensible
    direct rendering here and reflects the author's presentation of an illustrative
    historical episode. The phrase remains somewhat formal, matching the elevated
    style of 4 Maccabees.
- source_word: σώφρονος λογισμοῦ
  chosen: rational self-control
  alternatives:
  - sound reasoning
  - temperate reason
  - self-controlled reason
  lexicon: LSJ
  rationale: This phrase is central to 4 Maccabees. λόγισμος is not mere abstract
    'reason' but reason in active deliberative function; σώφρων adds the sense of
    disciplined moderation/self-mastery. 'Rational self-control' captures the composite
    ethical-rational idea in readable English, though alternatives remain possible.
