id: 4MA.3.19
reference: 4 Maccabees 3:19
source:
  edition: lxx-swete-1909
  text: Ἤδη δὲ καὶ ὁ καιρὸς ἡμᾶς καλεῖ ἐπὶ τὴν ἀπόδειξιν τῆς ἱστορίας τοῦ σώφρονος
    λογισμοῦ.
  language: Greek
  pages:
  - 752
  - 754
  - 755
  - 756
  - 757
  - 758
  - 759
  - 786
  - 787
