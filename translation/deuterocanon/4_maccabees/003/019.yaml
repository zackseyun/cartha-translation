- issue: Rendering the programmatic phrase σώφρων λογισμός in 4 Maccabees
  chosen_reading: rational self-control
  alternative_readings:
  - temperate reason
  - self-controlled reason
  - sound reasoning
  rationale: This is more philosophical-anthropological than narrowly theological,
    but it is a key conceptual term in the book. The chosen rendering preserves both
    the rational and moral-discipline dimensions without reducing the phrase to bare
    intellect ('reason') or bare virtue ('self-control').
  doctrine_reference: 'Translation philosophy §5: consistency of key terms, or documented
    exception'
