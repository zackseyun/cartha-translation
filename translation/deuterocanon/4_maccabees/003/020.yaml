theological_decisions:
- issue: Meaning of εὐνομία in relation to Jewish identity
  chosen_reading: Rendered broadly as 'lawfulness' rather than explicitly 'keeping
    the Mosaic law.'
  alternative_readings:
  - good order
  - observance of the law
  rationale: The context concerns the fathers' ordered life under law, likely with
    Jewish legal observance in view, but the Greek noun itself is broader than an
    explicit reference to Torah-keeping. The translation preserves that breadth rather
    than narrowing the claim.
