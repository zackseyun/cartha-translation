id: 4MA.3.20
reference: 4 Maccabees 3:20
source:
  edition: lxx-swete-1909
  text: ἐπειδὴ γὰρ βαθεῖαν εἰρήνην διὰ τὴν εὐνομίαν οἱ πατέρες ἡμῶν εἶχον, καὶ ἔπραττον
    καλῶς, ὥστε καὶ τὸν τῆς Ἀσίας βασιλέα Σέλευκον τὸν Νικάνορα καὶ χρήματα εἰς τὴν
    ἱερουργίαν αὐτοῖς ἀφορίσαι, καὶ τὴν πολιτίαν αὐτῶν ἀποδέχεσθαι·
  language: Greek
  pages:
  - 757
  confidence: high
  validation: agree
translation:
  text: For since our fathers had deep peace because of their law-abidingness, and
    prospered, so that even Seleucus Nicanor, the king of Asia, set apart money for
    them for the sacred service and approved their polity,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of good order' or 'because of observance of the law.' The Greek
      term can denote orderly life under law and may implicitly include fidelity to
      the Jewish law.
    reason: lexical_alternative
  - marker: b
    text: Or 'their constitution' or 'their civic order.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βαθεῖαν εἰρήνην
  chosen: deep peace
  alternatives:
  - profound peace
  - great peace
  lexicon: LSJ
  rationale: βαθεῖαν literally means 'deep'; retaining the metaphor gives the sentence
    rhetorical weight better than flattening to merely 'great' or 'lasting' peace.
- source_word: διὰ τὴν εὐνομίαν
  chosen: because of their lawfulness
  alternatives:
  - because of good order
  - because of good government
  - because of observance of the law
  lexicon: LSJ
  rationale: εὐνομία denotes good order under law / law-abiding order. 'Lawfulness'
    preserves the connection to ordered life under law without over-specifying Mosaic
    law observance alone.
- source_word: ἔπραττον καλῶς
  chosen: prospered
  alternatives:
  - did well
  - fared well
  lexicon: LSJ
  rationale: The idiom means they were doing well or faring well. 'Prospered' is natural
    English here and fits the causal flow from peace to flourishing.
- source_word: ἀφορίσαι
  chosen: set apart
  alternatives:
  - assign
  - allocate
  - designate
  lexicon: LSJ
  rationale: ἀφορίζω here conveys earmarking funds for a purpose. 'Set apart' preserves
    the sense of designation while sounding natural in context.
- source_word: χρήματα εἰς τὴν ἱερουργίαν
  chosen: money for the sacred service
  alternatives:
  - funds for temple service
  - money for priestly service
  lexicon: LSJ
  rationale: ἱερουργία refers to sacred/temple service. 'Sacred service' is broad
    enough to avoid importing a narrower institutional picture than the Greek itself
    states.
- source_word: τὴν πολιτίαν αὐτῶν
  chosen: their commonwealth
  alternatives:
  - their constitution
  - their civic order
  - their way of life
  lexicon: LSJ
  rationale: πολιτεία can denote civic constitution or commonwealth. 'Commonwealth'
    captures the public-political sense without sounding overly technical.
- source_word: ἀποδέχεσθαι
  chosen: approved
  alternatives:
  - accepted
  - recognized
  - welcomed
  lexicon: LSJ
  rationale: The verb indicates favorable acceptance. 'Approved' fits the royal acknowledgment
    of the Jews' πολιτεία in this context.
- source_word: βασιλέα Σέλευκον τὸν Νικάνορα
  chosen: Seleucus Nicanor, the king of Asia
  alternatives:
  - King Seleucus Nicanor of Asia
  - Seleucus, called Nicanor, king of Asia
  lexicon: LSJ
  rationale: Names are transliterated. The appositional structure in Greek is represented
    in clear English while preserving the royal title.
