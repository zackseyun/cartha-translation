translation:
  text: Therefore, setting reason against desire, he poured out the drink as a libation
    to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he poured out the drink to God.' The Greek verb implies
      a libation or drink offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - therefore
  - for this reason
  - from which
  lexicon: LSJ
  rationale: Introduces an inference from the preceding argument. 'Therefore' gives
    clear logical continuity in natural English.
- source_word: ἀντιθεὶς
  chosen: setting ... against
  alternatives:
  - placing against
  - opposing
  - having set against
  lexicon: LSJ
  rationale: Aorist participle from ἀντίθημι, here expressing deliberate opposition.
    'Setting ... against' preserves the concrete sense while reading smoothly in English.
- source_word: τῇ ἐπιθυμίᾳ
  chosen: desire
  alternatives:
  - passion
  - craving
  - appetite
  lexicon: LSJ
  rationale: ἐπιθυμία can denote desire broadly, often with strong appetitive force.
    'Desire' is the most natural and sufficiently broad rendering here; 'passion'
    would risk over-psychologizing, and 'appetite' may sound too narrowly physical.
- source_word: τὸν λογισμόν
  chosen: reason
  alternatives:
  - reasoning
  - rational judgment
  - the rational mind
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for rational faculty or reasoned
    judgment governing the passions. 'Reason' best captures the philosophical contrast
    with ἐπιθυμία in concise English.
- source_word: ἔσπεισεν
  chosen: poured out ... as a libation
  alternatives:
  - made a libation of
  - poured out
  - offered as a drink offering
  lexicon: LSJ
  rationale: The verb σπένδω refers specifically to pouring a drink offering/libation.
    Because English 'poured out the drink' could miss the sacrificial nuance, 'poured
    out the drink as a libation' makes the cultic sense explicit without overparaphrasing.
- source_word: τὸ πόμα
  chosen: the drink
  alternatives:
  - the beverage
  - the drink offering
  lexicon: LSJ
  rationale: Literally 'the drink.' The sacrificial sense comes primarily from ἔσπεισεν,
    so retaining 'the drink' avoids importing too much into the noun itself while
    the full clause still communicates libation.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - for God
  lexicon: LSJ
  rationale: Dative of recipient/beneficiary in a cultic act; 'to God' is the most
    direct and idiomatic rendering.
