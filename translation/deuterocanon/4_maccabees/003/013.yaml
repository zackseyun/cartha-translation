translation:
  text: And after escaping the notice of the gate guards, they kept going through,
    having made their way through the whole camp of the enemy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek wording is somewhat compressed at the end; the sense is that they
      proceeded through the enemy camp after finding a way or passage through it.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαθόντες
  chosen: after escaping the notice of
  alternatives:
  - having escaped
  - without being noticed by
  - secretly passing
  lexicon: LSJ
  rationale: Aorist participle from λανθάνω with an accusative object conveys going
    unnoticed by someone. 'After escaping the notice of' preserves the participial
    relation and the sense of evading detection.
- source_word: τοὺς τῶν πυλῶν ἀκροφύλακας
  chosen: the gate guards
  alternatives:
  - the guards of the gates
  - the sentries at the gates
  - the watchmen of the gates
  lexicon: LSJ
  rationale: ἀκροφύλακες are guards/watchers, and the genitive phrase specifies their
    post at the gates. 'Gate guards' is concise modern English while retaining the
    military/security sense.
- source_word: διεξῄεσαν
  chosen: they kept going through
  alternatives:
  - they passed through
  - they made their way through
  - they went out through
  lexicon: LSJ
  rationale: Imperfect tense suggests ongoing or progressive movement. The compound
    verb indicates movement through or out through a space. 'They kept going through'
    preserves the imperfective force better than a simple past.
- source_word: εὑράμενοι
  chosen: having found a way through
  alternatives:
  - having found
  - after finding
  - having discovered a passage through
  lexicon: LSJ
  rationale: The participle likely explains how they were able to proceed through
    the camp. Because English 'having found' can sound incomplete here, 'having found
    a way through' makes explicit the implied object of successful passage without
    over-paraphrasing.
- source_word: κατὰ πᾶν τὸ τῶν πολεμίων στρατόπεδον
  chosen: through the whole camp of the enemy
  alternatives:
  - through the entire camp of the enemies
  - through all the enemy camp
  - through the whole camp of the foes
  lexicon: LSJ
  rationale: στρατόπεδον is 'camp'; τῶν πολεμίων is a substantive genitive, 'of the
    enemy/enemies.' Singular collective 'the enemy' is idiomatic in English. κατὰ
    with the accusative here is taken distributively/spatially in context as movement
    through the full extent of the camp.
