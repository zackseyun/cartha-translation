translation:
  text: For reason is not the uprooter of the passions, but their adversary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the destroyer of the passions' or 'the one who roots out the passions.'
      The Greek keeps the image of uprooting.
    reason: lexical_alternative
  - marker: b
    text: That is, reason does not eliminate the passions entirely, but contends against
      them.
    reason: cross_reference
lexical_decisions:
- source_word: λογισμός
  chosen: reason
  alternatives:
  - rational judgment
  - reasoning
  - the mind
  lexicon: LSJ
  rationale: In 4 Maccabees, λογισμός is a key term for the faculty of rational deliberation
    central to the book's thesis. 'Reason' is concise, idiomatic, and preserves the
    philosophical force better than the more process-oriented 'reasoning.'
- source_word: ἐκριζωτής
  chosen: uprooter
  alternatives:
  - eradicator
  - destroyer
  - one who roots out
  lexicon: LSJ
  rationale: The noun is built on the image of rooting out from the ground. 'Uprooter'
    preserves the metaphor directly and fits the contrast with ἀνταγωνιστής. 'Eradicator'
    is possible but loses the concrete imagery.
- source_word: τῶν παθῶν
  chosen: of the passions
  alternatives:
  - of the emotions
  - of the sufferings
  - of the impulses
  lexicon: LSJ
  rationale: In this philosophical-moral context, πάθη refers to passions or disordered
    emotions rather than mere feelings or sufferings. 'Passions' best matches the
    technical ethical sense used throughout 4 Maccabees.
- source_word: ἀνταγωνιστής
  chosen: opponent
  alternatives:
  - adversary
  - combatant against them
  - antagonist
  lexicon: LSJ
  rationale: The word denotes one who contends against another. 'Opponent' is natural
    modern English and preserves the adversarial contrast without sounding overly
    technical. The supplied pronoun 'their' clarifies the object from context.
