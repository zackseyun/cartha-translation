theological_decisions:
- issue: Relation of reason to the passions
  chosen_reading: Reason does not completely eradicate the passions but stands in
    opposition to them.
  alternative_readings:
  - Reason is not the destroyer of passions, but their rival.
  - Reason is not the one who roots out the passions, but one who struggles against
    them.
  rationale: 'The verse makes a philosophical claim about the scope of λογισμός in
    moral life: reason contests passions rather than annihilating them. The translation
    preserves that tension without overstating Stoic impassibility or importing later
    theological categories.'
