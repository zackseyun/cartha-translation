id: 4MA.3.2
reference: 4 Maccabees 3:2
source:
  edition: lxx-swete-1909
  text: οἷον ἐπιθυμίαν τις ὑμῶν οὐ δύναται ἐκκόψαι, ἀλλὰ μὴ δουλωθῆναι τῇ ἐπιθυμίᾳ
    δύναται ὁ λογισμὸς παρασχέσθαι.
  language: Greek
