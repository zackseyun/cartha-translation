translation:
  text: For example, reason cannot cut off any one of your desires, but reason can
    make it possible not to be enslaved to desire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'reason can provide that one not be enslaved to desire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷον
  chosen: For example
  alternatives:
  - for instance
  - such as
  lexicon: LSJ
  rationale: Introduces an illustrative case flowing from the argument; 'for example'
    is natural modern English and preserves the exemplifying force.
- source_word: ἐπιθυμίαν
  chosen: desires
  alternatives:
  - desire
  - craving
  - passion
  lexicon: BDAG/LSJ
  rationale: The singular in Greek is used generically, but English reads more naturally
    with 'any one of your desires' in this construction. 'Desire' is the core sense;
    'craving' or 'passion' would over-intensify beyond what the context requires.
- source_word: ἐκκόψαι
  chosen: cut off
  alternatives:
  - remove
  - eliminate
  lexicon: BDAG/LSJ
  rationale: The verb is vivid and metaphorical; 'cut off' preserves the imagery better
    than the smoother 'remove' or 'eliminate'.
- source_word: δουλωθῆναι
  chosen: be enslaved
  alternatives:
  - be mastered
  - be made a slave
  lexicon: BDAG/LSJ
  rationale: The slavery metaphor is explicit in the passive verb. In line with project
    philosophy on bonded-language terms, 'be enslaved' preserves the force better
    than the softened 'be mastered'.
- source_word: τῇ ἐπιθυμίᾳ
  chosen: to desire
  alternatives:
  - to the desire
  - to passion
  lexicon: BDAG/LSJ
  rationale: The article with the abstract noun functions naturally in English without
    an article here. 'Desire' keeps the lexical connection with the earlier ἐπιθυμίαν.
- source_word: ὁ λογισμός
  chosen: reason
  alternatives:
  - rational thought
  - the rational mind
  lexicon: BDAG/LSJ
  rationale: In 4 Maccabees, λογισμός is a key term for rational faculty or reasoned
    judgment. 'Reason' is concise, idiomatic, and preserves the philosophical register.
- source_word: παρασχέσθαι
  chosen: can enable
  alternatives:
  - can provide
  - can make it possible
  lexicon: BDAG/LSJ
  rationale: The infinitive construction means reason can furnish or supply the capacity
    for not being enslaved. 'Can enable' expresses that function clearly in English.
