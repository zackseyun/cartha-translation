theological_decisions:
- issue: Anthropological claim about reason and desire
  chosen_reading: Reason does not eradicate desire itself but can prevent a person
    from becoming enslaved to it.
  alternative_readings:
  - Reason can cut off no desire of yours, but it can secure freedom from subjection
    to desire.
  rationale: The verse makes a moral-philosophical distinction between eliminating
    appetites and governing them. The translation preserves that tension without overstating
    reason's power as suppression of desire itself.
