translation:
  text: Reason cannot cut off any of your evil tendencies, but reason is able to help
    you not bend to evil tendency.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'malice,' 'wickedness,' or 'ill-nature.' The Greek term denotes a bad
      moral disposition rather than merely a single evil act.
    reason: lexical_alternative
  - marker: b
    text: Literally 'cannot cut off.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'not to be bent to that evil tendency,' that is, not to yield
      to it.
    reason: lexical_alternative
lexical_decisions:
- source_word: κακοήθειάν
  chosen: evil tendency
  alternatives:
  - malice
  - wickedness
  - ill-nature
  - vice
  lexicon: LSJ
  rationale: κακοήθεια can denote bad character, malice, or a vicious disposition.
    In this context, paired with 'not to bend to' and with reason's moral assistance,
    the sense is not a single evil act but a corrupt inclination or disposition. 'Evil
    tendency' communicates an inward bent without over-specifying a technical vice
    list.
- source_word: τις ὑμῶν
  chosen: any one of your
  alternatives:
  - some of your
  - any of your
  lexicon: LSJ
  rationale: 'The phrase most naturally modifies the singular abstract noun in a partitive
    or individuating sense: any one among your evil tendencies/dispositions. Rendering
    it this way preserves the distributive force better than a flat ''your evil tendency''.'
- source_word: οὐ δύναται ἐκκόψαι
  chosen: cannot cut off
  alternatives:
  - cannot eradicate
  - cannot remove
  - cannot cut out
  lexicon: LSJ
  rationale: ἐκκόπτω is literally 'cut out/off.' The metaphor is vivid and should
    be preserved where possible. 'Cut off' keeps the imagery while remaining idiomatic
    enough in English.
- source_word: τὸ μὴ καμφθῆναι
  chosen: not to bend
  alternatives:
  - not to yield
  - not to be bent
  - not to give way
  lexicon: LSJ
  rationale: The aorist passive infinitive of κάμπτω literally means 'to be bent.'
    In moral context it implies yielding or being overcome. 'Not to bend' preserves
    the metaphor; the object 'to that evil tendency' clarifies the sense.
- source_word: τῇ κακοηθείᾳ
  chosen: to that evil tendency
  alternatives:
  - to evil
  - to malice
  - to vice
  lexicon: LSJ
  rationale: Dative after καμφθῆναι indicates the force to which one might bend. Repeating
    the same English gloss as earlier preserves lexical consistency, with 'that' marking
    the anaphoric article.
- source_word: δυνατὸν
  chosen: is able
  alternatives:
  - is possible
  - can
  lexicon: LSJ
  rationale: Predicative δυνατός with infinitive expresses capability. 'Is able' fits
    the elevated but readable style and avoids flattening the contrast with the earlier
    οὐ δύναται.
- source_word: ὁ λογισμὸς
  chosen: Reason
  alternatives:
  - rational thought
  - the mind
  - reasoning
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key thematic term for rational moral judgment.
    Capitalizing 'Reason' signals its programmatic role in the argument without turning
    it into a proper name.
- source_word: συμμαχῆσαι
  chosen: to join in helping
  alternatives:
  - to come to the aid of
  - to assist
  - to fight alongside
  lexicon: LSJ
  rationale: συμμαχέω/συμμαχῆσαι carries the sense of allied assistance, literally
    fighting alongside. Here the infinitive complements δυνατὸν and describes reason's
    supportive role. 'Join in helping' preserves the allied-assistance nuance without
    sounding militarized beyond the text's immediate need.
