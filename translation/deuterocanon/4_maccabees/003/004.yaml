reference: 4 Maccabees 3:4
source:
  edition: lxx-swete-1909
  text: κακοήθειάν τις ὑμῶν οὐ δύναται ἐκκόψαι, ἀλλὰ τὸ μὴ καμφθῆναι τῇ κακοηθείᾳ
    δυνατὸν ὁ λογισμὸς συμμαχῆσαι.
  language: Greek
