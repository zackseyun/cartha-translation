theological_decisions:
- issue: Anthropological claim about reason and vice
  chosen_reading: The verse says reason cannot eradicate evil disposition itself,
    but can assist a person in resisting or not yielding to it.
  alternative_readings:
  - The verse could be read more strongly as reason being unable to remove any evil
    at all.
  - The final clause could be rendered more dynamically as 'reason can help one resist
    evil.'
  rationale: 'The Greek contrast is between ἐκκόψαι (''cut off'') and μὴ καμφθῆναι
    (''not be bent/yield''). This preserves the text''s tension: reason has real moral
    power, but not absolute power to extirpate vice. The translation avoids importing
    later doctrinal claims about total depravity or autonomous moral perfection.'
  doctrine_reference: Preserve theological tension rather than resolve it.
