translation:
  text: And after courageously finding the spring, they filled the king’s drink from
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they filled a drink for the king from it.' The Greek dative τῷ βασιλεῖ
      may be taken more literally as 'for the king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνευράμενοι
  chosen: after finding
  alternatives:
  - having found
  - discovering
  lexicon: LSJ
  rationale: Aorist middle participle from ἀνευρίσκω, indicating prior action relative
    to the main verb. 'After finding' gives clear English sequence while preserving
    the participial force.
- source_word: θαρραλέως
  chosen: courageously
  alternatives:
  - boldly
  - with courage
  lexicon: LSJ
  rationale: The adverb denotes boldness or courage. 'Courageously' preserves the
    moral quality emphasized in the context of reason mastering fear.
- source_word: τὴν πηγὴν
  chosen: the spring
  alternatives:
  - the fountain
  - the source
  lexicon: LSJ
  rationale: πηγή commonly refers to a spring or fountain of water. 'Spring' is the
    most natural modern English rendering in this narrative setting.
- source_word: ἐξ αὐτῆς
  chosen: from it
  alternatives:
  - from there
  - out of it
  lexicon: LSJ
  rationale: The pronoun refers back to the spring. 'From it' is concise and clear
    in English.
- source_word: ἐγέμισαν
  chosen: they filled
  alternatives:
  - they filled up
  lexicon: LSJ
  rationale: Simple past rendering of the aorist verb; no need to expand beyond the
    basic sense 'filled'.
- source_word: τῷ βασιλεῖ
  chosen: the king’s
  alternatives:
  - for the king
  lexicon: LSJ
  rationale: The dative can be rendered literally as 'for the king,' but in idiomatic
    English with ποτόν the possessive construction 'the king’s drink' better conveys
    that the drink was intended for him.
- source_word: τὸ ποτόν
  chosen: drink
  alternatives:
  - beverage
  - water for drinking
  lexicon: LSJ
  rationale: ποτόν means drink or that which is drunk. 'Drink' is the most direct
    and natural rendering; the context already implies water drawn from the spring.
