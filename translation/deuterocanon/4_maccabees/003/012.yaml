reference: 4 Maccabees 3:12
source:
  edition: lxx-swete-1909
  text: ὅθεν τῶν ὑπερασπιστῶν ἐπὶ τῇ τοῦ βασιλέως ἐπιθυμίᾳ σχετλιάζόντων, δύο νεανίσκοι
    στρατιῶται καρτεροί, καταιδεσθέντες τὴν τοῦ βασιλέως ἐπιθυμίαν, τὰς πανοπλίας
    καθωπλίσαντο, καὶ κάλπιν λαβόντες ὑπερέβησαν τοὺς τῶν πολεμίων χάρακας·
  language: Greek
