translation:
  text: Therefore, while the defenders were indignant at the king’s desire, two young
    soldiers, steadfast men, ashamed of the king’s desire, armed themselves with full
    armor, and, taking a water jar, went over the enemy stockades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two young men, soldiers of endurance' or 'two young, steadfast soldiers';
      the Greek groups νεανίσκοι and στρατιῶται καρτεροί closely, allowing slightly
      different English structuring.
    reason: lexical_alternative
  - marker: b
    text: The Greek κάλπιν denotes a jar or pitcher, likely for water.
    reason: cultural_note
  - marker: c
    text: The source text is syntactically compressed in this clause sequence; 'ashamed
      by the king’s desire' reflects the Greek closely, though the precise nuance
      may also be 'moved by shame at the king’s desire.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - From there
  - For this reason
  - So then
  lexicon: LSJ
  rationale: Marks an inferential or consequential transition from the preceding narrative;
    'Therefore' preserves the logical connection in natural English.
- source_word: ὑπερασπιστῶν
  chosen: defenders
  alternatives:
  - champions
  - bodyguards
  - protectors
  lexicon: LSJ
  rationale: The term denotes those defending or standing up for someone/something.
    'Defenders' is broad and fits the military context without over-specifying a technical
    role such as 'bodyguards'.
- source_word: ἐπὶ τῇ τοῦ βασιλέως ἐπιθυμίᾳ
  chosen: at the king’s desire
  alternatives:
  - because of the king’s desire
  - over the king’s craving
  - at the king’s wish
  lexicon: LSJ
  rationale: ἐπιθυμία can mean desire, longing, or craving. 'Desire' is the most neutral
    and contextually suitable rendering here, leaving the nature of the king's impulse
    to the surrounding narrative.
- source_word: σχετλιάζόντων
  chosen: were indignant
  alternatives:
  - were outraged
  - were vexed
  - were resentful
  lexicon: LSJ
  rationale: The participle conveys strong displeasure or indignation. 'Were indignant'
    captures the moral offense implied without becoming too colloquial.
- source_word: δύο νεανίσκοι
  chosen: two young soldiers
  alternatives:
  - two young men
  lexicon: LSJ
  rationale: Although νεανίσκοι literally means 'young men,' the appositional στρατιῶται
    immediately identifies them as soldiers. Rendering the phrase together as 'two
    young soldiers' is concise and faithful.
- source_word: στρατιῶται καρτεροί
  chosen: steadfast men
  alternatives:
  - brave soldiers
  - resolute soldiers
  - enduring soldiers
  lexicon: LSJ
  rationale: καρτεροί emphasizes firmness, endurance, and courage. Because 'soldiers'
    is already expressed in the previous phrase, 'steadfast men' avoids awkward repetition
    while preserving the commendatory force.
- source_word: καταιδεσθέντες
  chosen: ashamed by
  alternatives:
  - disgraced by
  - moved by shame at
  - unable to endure the shame of
  lexicon: LSJ
  rationale: The aorist participle suggests being shamed or feeling shame in response
    to something. 'Ashamed by the king’s desire' preserves the emotional-moral reaction
    without over-interpreting motive.
- source_word: τὰς πανοπλίας καθωπλίσαντο
  chosen: armed themselves with full armor
  alternatives:
  - put on their armor
  - equipped themselves with full armor
  lexicon: LSJ
  rationale: πανοπλία denotes full armor or complete military equipment; the middle
    verb indicates they equipped themselves. 'Armed themselves with full armor' preserves
    both ideas.
- source_word: κάλπιν
  chosen: a water jar
  alternatives:
  - a pitcher
  - an urn
  - a vessel
  lexicon: LSJ
  rationale: κάλπις commonly refers to a water jar or pitcher. 'Water jar' is concrete
    and fits the likely practical object carried in the scene.
- source_word: ὑπερέβησαν
  chosen: went over
  alternatives:
  - crossed over
  - passed beyond
  lexicon: LSJ
  rationale: The verb means to go beyond or cross over. 'Went over' is idiomatic and
    works well with 'the enemy stockades.'
- source_word: χάρακας
  chosen: stockades
  alternatives:
  - palisades
  - entrenchments
  - ramparts
  lexicon: LSJ
  rationale: χάραξ in the plural can denote palisades, stakes, or field fortifications.
    'Stockades' best conveys a military barrier made of stakes in accessible English.
