theological_decisions:
- issue: Interpretation of the final clause τῷ θυμῷ δυνατὸν βοηθῆσαι
  chosen_reading: Retain the literal sense 'it is possible to help anger' rather than
    resolving it into a paraphrase such as 'to make use of anger' or 'to moderate
    anger.'
  alternative_readings:
  - it is possible to make use of anger
  - it is possible to direct anger to good ends
  - it is possible to moderate anger
  rationale: The Greek wording is terse and somewhat surprising. A smoother English
    paraphrase would import an interpretive conclusion from the broader argument of
    the chapter rather than translate the clause itself. Preserving the literal expression
    keeps the author's rhetorical tension visible and auditable.
  doctrine_reference: Preserve theological tension rather than resolve it.
