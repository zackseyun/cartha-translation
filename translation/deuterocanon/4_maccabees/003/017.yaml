translation:
  text: For the self-controlled mind is able to conquer the compulsions of the passions,
    and to extinguish the burnings of desires.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''reason'': the Greek νοῦς can denote the rational faculty or understanding.'
    reason: lexical_alternative
  - marker: b
    text: The Greek term rendered 'lusts' can also suggest frenzied impulses or stinging
      desires more broadly, not only sexual lust.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνατὸς
  chosen: is able
  alternatives:
  - is powerful
  - is capable
  lexicon: LSJ
  rationale: Predicative adjective expressing capability; 'is able' is natural modern
    English and preserves the sense of capacity rather than abstract power.
- source_word: σώφρων
  chosen: self-controlled
  alternatives:
  - temperate
  - sound-minded
  - prudent
  lexicon: LSJ
  rationale: In this context of reason mastering passions, σώφρων emphasizes disciplined
    self-mastery. 'Self-controlled' is clear and fits the ethical argument better
    than the more archaic 'temperate' or narrower 'prudent'.
- source_word: νοῦς
  chosen: mind
  alternatives:
  - reason
  - understanding
  lexicon: LSJ
  rationale: νοῦς can mean mind or reason. Here the broader argument in 4 Maccabees
    concerns rational faculty governing passions; 'mind' keeps the wording accessible
    while still allowing the rational sense. 'Reason' was considered, but 'self-controlled
    mind' reads more naturally in English.
- source_word: νικῆσαι
  chosen: to conquer
  alternatives:
  - to overcome
  - to defeat
  lexicon: LSJ
  rationale: The infinitive denotes victorious mastery. 'Conquer' preserves the strong
    conflict imagery better than the milder 'overcome'.
- source_word: ἀνάγκας
  chosen: compulsions
  alternatives:
  - necessities
  - constraints
  - forces
  lexicon: LSJ
  rationale: Although ἀνάγκη often means necessity or constraint, in this moral-psychological
    context it refers to the coercive pressure exerted by passions. 'Compulsions'
    best captures that inward force in idiomatic English.
- source_word: πάθη
  chosen: passions
  alternatives:
  - sufferings
  - emotions
  - desires
  lexicon: LSJ
  rationale: In Hellenistic ethical discourse πάθη refers to disordered passions or
    affections. 'Passions' is the standard and most precise rendering here.
- source_word: σβέσαι
  chosen: to extinguish
  alternatives:
  - to quench
  - to put out
  lexicon: LSJ
  rationale: The verb is used for putting out fire; because the object is metaphorically
    fiery, 'extinguish' preserves the image clearly.
- source_word: οἴστρων
  chosen: lusts
  alternatives:
  - frenzies
  - goadings
  - sexual desires
  lexicon: LSJ
  rationale: οἶστρος can denote a gadfly-like sting, frenzy, or passionate impulse.
    In this context of inflamed inner drives, 'lusts' best conveys intense desire,
    though the Greek may be somewhat broader than purely sexual lust.
- source_word: φλεγμονάς
  chosen: inflamed outbreaks
  alternatives:
  - burnings
  - flames
  - inflammations
  lexicon: LSJ
  rationale: The noun denotes inflammation or burning heat. 'Inflamed outbreaks' preserves
    both the fire metaphor and the sense of surging intensity; 'flames' would be smoother
    but less literal.
