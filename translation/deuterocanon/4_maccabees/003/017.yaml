theological_decisions:
- issue: Anthropological emphasis of νοῦς in 4 Maccabees
  chosen_reading: Rendered νοῦς as 'mind' while preserving its rational-governing
    force through context.
  alternative_readings:
  - reason
  - understanding
  rationale: The verse argues that the rational faculty can master passions. 'Mind'
    is readable modern English and does not over-philosophize the term, while the
    surrounding predicates ('conquer,' 'extinguish') make its governing role clear.
  doctrine_reference: Translation philosophy §6; preserve source sense without importing
    extra doctrinal claims.
