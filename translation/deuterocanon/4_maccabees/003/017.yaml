id: 4MA.3.17
reference: 4 Maccabees 3:17
source:
  edition: lxx-swete-1909
  text: δυνατὸς γὰρ ὁ σώφρων νοῦς νικῆσαι τὰς τῶν παθῶν ἀνάγκας, καὶ σβέσαι τὰς τῶν
    οἴστρων φλεγμονάς,
  language: Greek
