id: 4MA.3.15
reference: 4 Maccabees 3:15
source:
  edition: lxx-swete-1909
  text: ὁ δὲ καὶ περὶ τὴν δίψαν διαπυρούμενος, ἐλογίσατο πάνδεινον εἶναι κίνδυνον
    τῇ ψυχῇ λογισθὲν ἰσοδύναμον τὸ ποτὸν αἵματι.
  language: Greek
