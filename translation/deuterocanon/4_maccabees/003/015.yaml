translation:
  text: And even while burning with thirst, he reasoned that it would be an utterly
    dreadful danger to the soul if the drink were regarded as equivalent to blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'an utterly dreadful danger to the soul.' The Greek intensifier πάνδεινον
      strongly heightens 'danger.'
    reason: lexical_alternative
  - marker: b
    text: That is, he judged that taking the drink would amount to treating it as
      blood.
    reason: cultural_note
lexical_decisions:
- source_word: διαπυρούμενος
  chosen: burning
  alternatives:
  - inflamed
  - parched
  - consumed
  lexicon: LSJ
  rationale: The participle literally evokes being set ablaze or intensely heated.
    In context of thirst, 'burning with thirst' preserves the vivid bodily metaphor
    in natural English better than the flatter 'very thirsty'.
- source_word: δίψαν
  chosen: thirst
  alternatives:
  - thirstiness
  lexicon: LSJ
  rationale: Standard rendering for the noun; paired with 'burning' it communicates
    severe thirst without paraphrase.
- source_word: ἐλογίσατο
  chosen: he reasoned
  alternatives:
  - he considered
  - he reckoned
  - he concluded
  lexicon: LSJ
  rationale: In 4 Maccabees, λογίζομαι is thematically important for rational moral
    deliberation. 'He reasoned' preserves that emphasis better than the more generic
    'considered'.
- source_word: πάνδεινον
  chosen: all-terrible
  alternatives:
  - utterly dreadful
  - most terrible
  - wholly dreadful
  lexicon: LSJ
  rationale: The compound intensifies δεινός. 'All-terrible' is somewhat marked in
    English, but it preserves the rhetorical force without overexpanding into paraphrase.
    Because it may sound unusual, a smoother alternative could be adopted later if
    consistency review prefers 'utterly dreadful.'
- source_word: κίνδυνον
  chosen: danger
  alternatives:
  - peril
  - risk
  lexicon: LSJ
  rationale: '''Danger'' is the most direct and idiomatic equivalent here; ''peril''
    is possible but slightly more literary.'
- source_word: τῇ ψυχῇ
  chosen: to the soul
  alternatives:
  - for the soul
  - to his life
  lexicon: LSJ
  rationale: ψυχή can mean life or soul, but in this moral-philosophical context the
    concern is not merely physical life but the inner moral self. 'To the soul' best
    fits the argument of 4 Maccabees.
- source_word: λογισθὲν
  chosen: were regarded
  alternatives:
  - were considered
  - being reckoned
  lexicon: LSJ
  rationale: The passive participle links back to rational evaluation. 'Were regarded'
    gives clear English syntax while preserving the conceptual connection to reckoning/judging.
- source_word: ἰσοδύναμον
  chosen: equivalent
  alternatives:
  - equal
  - of equal force
  - on a par
  lexicon: LSJ
  rationale: The adjective denotes equal value or force. 'Equivalent' is precise and
    idiomatic in this ethical comparison.
- source_word: τὸ ποτόν
  chosen: the drink
  alternatives:
  - the draught
  - the beverage
  lexicon: LSJ
  rationale: The articular neuter refers to the drink in question. 'The drink' is
    straightforward and avoids archaic tone.
- source_word: αἵματι
  chosen: blood
  lexicon: LSJ
  rationale: Literal rendering is required. The point is that drinking in violation
    of the blood prohibition would treat the drink as tantamount to blood.
