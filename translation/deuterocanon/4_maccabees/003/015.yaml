theological_decisions:
- issue: Meaning of ψυχή in a moral exhortation context
  chosen_reading: soul
  alternative_readings:
  - life
  rationale: Although ψυχή can denote physical life, the verse frames a rational and
    ethical judgment about defilement and inner harm. 'Soul' better preserves the
    moral-theological register of the passage without importing later doctrinal precision.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Force of the final clause about drink and blood
  chosen_reading: the drink being regarded as equivalent to blood
  alternative_readings:
  - drinking being considered the same as blood
  - the draught being reckoned equal to blood
  rationale: The Greek syntax is compressed, but the sense is that to take the drink
    under these conditions would amount to treating it as blood, likely in relation
    to Jewish blood prohibition. The translation keeps the comparison explicit without
    overexplaining the law in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
