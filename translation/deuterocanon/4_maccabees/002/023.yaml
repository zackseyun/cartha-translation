id: 4MA.2.23
reference: 4 Maccabees 2:23
source:
  edition: lxx-swete-1909
  text: καὶ τούτῳ νόμον ἔδωκεν, καθʼ ὃν πολιτευόμενος βασιλεύσειε βασιλείαν σώφρονά
    τε καὶ δικαίαν καὶ ἀγαθὴν καὶ ἀνδρείαν.
  language: Greek
  pages:
  - 756
  confidence: high
  validation: agree
translation:
  text: And to him he gave a law, according to which, by conducting himself as a citizen,
    he would rule a kingdom that was self-controlled and just and good and courageous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by which, living his civic life,' preserving the political sense of
      the Greek participle.
    reason: lexical_alternative
  - marker: b
    text: '''A kingdom'' could also be rendered ''a kingship'' or ''realm''; the Greek
      term can denote either the domain ruled or royal rule itself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτῳ
  chosen: to him
  alternatives:
  - for him
  lexicon: LSJ
  rationale: Dative pronoun referring to the previously mentioned person; 'to him'
    fits the idiom with ἔδωκεν ('gave').
- source_word: νόμον
  chosen: a law
  alternatives:
  - law
  lexicon: LSJ
  rationale: Anarthrous νόμον is naturally rendered 'a law' in English. The sense
    is a governing rule or legal code given to the ruler.
- source_word: καθʼ ὃν
  chosen: according to which
  alternatives:
  - by which
  - in accordance with which
  lexicon: LSJ
  rationale: This relative construction links the law to the manner of ruling; 'according
    to which' preserves the formal connection clearly.
- source_word: πολιτευόμενος
  chosen: by conducting himself as a citizen
  alternatives:
  - living by the laws of the state
  - governing his civic life
  - conducting his public life
  lexicon: LSJ
  rationale: The participle from πολιτεύομαι carries the sense of living/ordering
    one's life as a member of a polis. Because the subject is a ruler, the term has
    civic-political force. 'By conducting himself as a citizen' preserves that force
    without collapsing it into merely 'ruling' or 'living.'
- source_word: βασιλεύσειε
  chosen: he would rule
  alternatives:
  - he might rule
  - he should reign
  lexicon: LSJ
  rationale: The optative here expresses potential or intended result in past narration
    after ἔδωκεν. 'He would rule' communicates that prospective sense in natural English.
- source_word: βασιλείαν
  chosen: a kingdom
  alternatives:
  - a kingship
  - a realm
  lexicon: LSJ
  rationale: βασιλεία can denote kingship or kingdom. Here the following adjectives
    describe the character of what is ruled, so 'kingdom' is the more straightforward
    English object of 'rule.'
- source_word: σώφρονά
  chosen: self-controlled
  alternatives:
  - temperate
  - prudent
  - sensible
  lexicon: LSJ
  rationale: σώφρων denotes sound-mindedness and moderation. 'Self-controlled' fits
    the ethical emphasis of 4 Maccabees, where mastery of passions is central.
- source_word: δικαίαν
  chosen: just
  alternatives:
  - righteous
  lexicon: LSJ
  rationale: In this civic-political context, 'just' better conveys the public and
    ethical sense than 'righteous,' though both are possible.
- source_word: ἀγαθήν
  chosen: good
  alternatives:
  - beneficent
  - noble
  lexicon: LSJ
  rationale: The adjective is broad and positive; 'good' is the most direct rendering
    and avoids over-specification.
- source_word: ἀνδρείαν
  chosen: courageous
  alternatives:
  - brave
  - manly
  lexicon: LSJ
  rationale: ἀνδρεῖος/ἀνδρεία can carry the classical nuance of manly courage, but
    in contemporary English 'courageous' best preserves the virtue term without importing
    unnecessary gendered overtones not required by the immediate context.
