theological_decisions:
- issue: Rendering the civic participle πολιτευόμενος in relation to kingship
  chosen_reading: Retain the civic nuance ('conducting himself as a citizen') rather
    than flattening it to simple royal rule.
  alternative_readings:
  - governing himself
  - living by the law
  - administering the state
  rationale: The verse emphasizes that even a king rules rightly under law; preserving
    the citizen/civic nuance supports the author's moral-political argument without
    adding doctrine beyond the text.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering δικαίαν in a political virtue list
  chosen_reading: just
  alternative_readings:
  - righteous
  rationale: The context is the character of a kingdom and its rule, so 'just' better
    reflects public justice while remaining faithful to the Greek. This is a contextual
    variance from the default theological weight of δικαιοσύνη-related terms and is
    documented here.
  doctrine_reference: Translation philosophy §5; Contested terms table (δικαιοσύνη)
