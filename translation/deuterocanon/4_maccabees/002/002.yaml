translation:
  text: Accordingly, the self-controlled Joseph is praised, because by reason he mastered
    the desire for pleasure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek phrase behind 'by reason' is somewhat awkward in this witness
      (literally, 'by reason, mind/thought'). The translation renders the combined
      sense idiomatically as the exercise of rational control.
    reason: lexical_alternative
  - marker: b
    text: Or 'love of pleasure' for 'the desire for pleasure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταύτῃ γοῦν
  chosen: Accordingly
  alternatives:
  - Therefore
  - For this reason then
  lexicon: LSJ
  rationale: The combination draws an inference from the preceding argument. 'Accordingly'
    captures the resumptive/inferential force in natural English without overloading
    the sentence.
- source_word: ὁ σώφρων
  chosen: the self-controlled
  alternatives:
  - the prudent
  - the temperate
  - the sensible
  lexicon: LSJ
  rationale: σώφρων in this context concerns mastery of passions, so 'self-controlled'
    best fits the ethical emphasis of 4 Maccabees better than the broader 'prudent'
    or the somewhat narrower 'temperate'.
- source_word: Ἰωσὴφ
  chosen: Joseph
  rationale: Standard English transliteration of the personal name.
- source_word: ἐπαινεῖται
  chosen: is praised
  alternatives:
  - is commended
  - receives praise
  lexicon: LSJ
  rationale: A straightforward passive present; 'is praised' is the most direct and
    idiomatic rendering.
- source_word: τῷ λογισμῷ
  chosen: by reason
  alternatives:
  - by rational thought
  - by reasoning
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for reason's rule over the passions.
    'By reason' preserves that thematic term compactly and naturally.
- source_word: διανοίᾳ
  chosen: reason
  alternatives:
  - mind
  - understanding
  - thought
  lexicon: LSJ
  rationale: The phrase τῷ λογισμῷ διανοίᾳ is textually awkward in Swete's witness,
    but taken together it intensifies the notion of rational faculty. Rendering the
    phrase idiomatically as 'by reason' avoids wooden duplication while preserving
    the sense. The source-level awkwardness is noted in the rationale rather than
    forced into clumsy English.
- source_word: περιεκράτησεν
  chosen: he mastered
  alternatives:
  - he prevailed over
  - he gained control over
  lexicon: LSJ
  rationale: The verb denotes gaining mastery over something. 'Mastered' is concise
    and fits the moral-philosophical context.
- source_word: τῆς ἡδυπαθείας
  chosen: the desire for pleasure
  alternatives:
  - love of pleasure
  - sensual indulgence
  - pleasure-seeking
  lexicon: LSJ
  rationale: ἡδυπάθεια denotes devotion to or indulgence in pleasure. 'Desire for
    pleasure' is readable modern English and suits the Joseph narrative context of
    resisting sexual temptation; 'love of pleasure' is possible but slightly less
    concrete in English.
