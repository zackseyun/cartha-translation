theological_decisions:
- issue: Ethical-philosophical terminology in 4 Maccabees
  chosen_reading: 'Render σώφρων and λογισμός in a way that foregrounds rational self-mastery:
    ''self-controlled'' and ''by reason.'''
  alternative_readings:
  - '''prudent'' / ''by rational thought'''
  - '''temperate'' / ''by reasoning'''
  rationale: The verse participates in 4 Maccabees' larger thesis that reason governs
    the passions. The chosen wording preserves that conceptual framework without importing
    later doctrinal categories.
