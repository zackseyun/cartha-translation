id: 4MA.2.6
reference: 4 Maccabees 2:6
source:
  edition: lxx-swete-1909
  text: καίτοι ὅτε μὴ ἐπιθυμεῖν εἴρηκεν ἡμᾶς ὁ νόμος, πολὺ πλέον πείσαιμ᾽ ἂν ὑμᾶς
    ὅτι τῶν ἐπιθυμιῶν κρατεῖν δύναται ὁ λογισμός, ὥσπερ καὶ τῶν κωλυτικῶν τῆς δικαιοσύνης
    παθῶν.
  language: Greek
  pages:
  - 752
  - 753
  - 754
  - 755
  - 756
  - 757
  - 786
  - 787
  - 788
  - 789
  confidence: high
  validation: major_mismatch
translation:
  text: And yet, when the law has told us not to desire, I could much more persuade
    you that reason is able to master desires, just as it also masters the passions
    that hinder righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not to covet.' The wording likely echoes the commandment against coveting,
      but the author's argument here applies more broadly to desires.
    reason: lexical_alternative
  - marker: b
    text: Or 'the passions that hinder justice.' The Greek word can denote either
      'righteousness' or 'justice' depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: καίτοι
  chosen: And yet
  alternatives:
  - nevertheless
  - and indeed
  lexicon: LSJ
  rationale: Marks a concessive or adversative transition. 'And yet' preserves the
    rhetorical turn into a stronger argument.
- source_word: ὅτε
  chosen: when
  alternatives:
  - since
  - while
  lexicon: LSJ
  rationale: Here it introduces the circumstance under which the law speaks. 'When'
    is the most straightforward temporal/concessive connector in context.
- source_word: μὴ ἐπιθυμεῖν
  chosen: not to desire
  alternatives:
  - not to covet
  - not to lust
  lexicon: BDAG
  rationale: The infinitive with μή echoes the prohibition of desire/coveting. 'Desire'
    is broad enough for the argument about passions; 'covet' would narrow the sense
    too much to Decalogue phrasing, though that background is likely present.
- source_word: εἴρηκεν
  chosen: tells
  alternatives:
  - has said
  - has commanded
  lexicon: BDAG
  rationale: Perfect of λέγω refers to what the law has stated. 'Tells' gives natural
    English while retaining the law's authoritative speech; 'has commanded' would
    over-specify the verb.
- source_word: ὁ νόμος
  chosen: the law
  lexicon: BDAG
  rationale: Standard rendering for νόμος; in this context it refers to the Mosaic
    law as moral instruction.
- source_word: πολὺ πλέον
  chosen: much more
  alternatives:
  - far more
  - all the more
  lexicon: LSJ
  rationale: Comparative intensifier introducing a fortiori reasoning. 'Much more'
    is idiomatic and preserves the argumentative force.
- source_word: πείσαιμ᾽ ἂν ὑμᾶς
  chosen: I could ... persuade you
  alternatives:
  - I would persuade you
  - I could convince you
  lexicon: BDAG
  rationale: Potential optative with ἄν expresses possibility or capability in rhetoric.
    'I could persuade you' captures that nuance better than a simple future-like statement.
- source_word: τῶν ἐπιθυμιῶν κρατεῖν
  chosen: to master desires
  alternatives:
  - to control desires
  - to prevail over desires
  lexicon: BDAG
  rationale: κρατέω here means exercising mastery or control. 'Master' fits the philosophical
    argument about reason ruling passions.
- source_word: ὁ λογισμός
  chosen: reason
  alternatives:
  - rational judgment
  - the rational mind
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key anthropological term for rational faculty
    or reasoned judgment. 'Reason' is concise and readable while preserving the philosophical
    sense.
- source_word: ὥσπερ καὶ
  chosen: just as it also
  alternatives:
  - as also
  - just as
  lexicon: LSJ
  rationale: Signals comparison with an additional parallel case. The English keeps
    both the comparative and additive force.
- source_word: τῶν κωλυτικῶν τῆς δικαιοσύνης παθῶν
  chosen: the passions that hinder righteousness
  alternatives:
  - the passions that obstruct justice
  - the passions opposed to righteousness
  lexicon: BDAG; LSJ
  rationale: κωλυτικός means hindering or obstructive; πάθη are passions/emotions;
    δικαιοσύνη can mean righteousness or justice. Given the moral-philosophical and
    Jewish ethical context, 'righteousness' is preferred, while 'justice' remains
    a viable alternative.
