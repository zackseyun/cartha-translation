lexical_decisions:
- source_word: νόμος
  chosen: the law
  alternatives:
  - law
  lexicon: LSJ
  rationale: Rendered with the article to match ὁ ... νόμος and the discourse context
    in 4 Maccabees, where 'the law' refers to the governing Jewish law/Torah as a
    moral authority.
- source_word: εὐνοίας
  chosen: affection
  alternatives:
  - goodwill
  - devotion
  - kindly feeling
  lexicon: LSJ
  rationale: εὔνοια commonly denotes goodwill or kindly disposition. In the phrase
    πρὸς γονεῖς εὐνοίας, 'affection toward parents' is natural English and preserves
    the emotional/familial sense without overstating it as obedience.
- source_word: κρατεῖ
  chosen: prevails over
  alternatives:
  - has mastery over
  - is stronger than
  - rules over
  lexicon: LSJ
  rationale: κρατέω here expresses superiority or mastery. 'Prevails over' communicates
    that the law proves stronger than filial affection in the ethical hierarchy under
    discussion.
- source_word: μὴ καταπροδιδοὺς
  chosen: not betraying
  alternatives:
  - not utterly giving up
  - not surrendering
  - not handing over
  lexicon: LSJ
  rationale: The participle intensifies προδίδωμι with κατά, conveying betrayal or
    complete surrender. 'Not betraying' is concise and idiomatic in relation to ἀρετήν.
- source_word: ἀρετήν
  chosen: virtue
  alternatives:
  - excellence
  - moral excellence
  lexicon: LSJ
  rationale: ἀρετή is a key term in 4 Maccabees for moral excellence/virtue. 'Virtue'
    preserves the book's philosophical-ethical register and is likely a consistency
    term across the work.
- source_word: δι᾽ αὐτούς
  chosen: because of them
  alternatives:
  - for their sake
  - on account of them
  lexicon: LSJ
  rationale: διά with accusative indicates cause or motive. 'Because of them' clearly
    expresses that one must not betray virtue on account of one's parents.
