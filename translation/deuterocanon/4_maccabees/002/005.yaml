theological_decisions:
- issue: Rendering of the commandment verb ἐπιθυμέω in a Decalogue citation
  chosen_reading: You shall not desire
  alternative_readings:
  - You shall not covet
  rationale: The source Greek uses ἐπιθυμήσεις, whose plain sense is desire/set one's
    desire upon. Because the immediate literary context in 4 Maccabees discusses reason
    governing passions, “desire” better exposes the lexical connection for English
    readers. The traditional Decalogue rendering “covet” remains a valid alternative
    and is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 6
