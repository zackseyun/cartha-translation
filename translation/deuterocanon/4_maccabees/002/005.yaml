translation:
  text: For the law says, then, “You shall not desire your neighbor’s wife, nor anything
    that belongs to your neighbor.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You shall not covet your neighbor’s wife, nor anything that is your
      neighbor’s.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: says
  alternatives:
  - speaks
  - declares
  lexicon: BDAG
  rationale: Present tense is naturally rendered as English present, introducing the
    scriptural citation.
- source_word: γοῦν
  chosen: then
  alternatives:
  - therefore
  - at any rate
  - indeed
  lexicon: LSJ
  rationale: γοῦν is inferential/confirmatory here, linking the citation to the preceding
    argument. “Then” preserves the connective force in readable English without overstating
    the logic.
- source_word: ὁ νόμος
  chosen: the law
  alternatives:
  - the Law
  lexicon: BDAG
  rationale: Refers to the Mosaic law/scriptural command. Lowercase “law” is chosen
    because this deuterocanonical context cites a commandment rather than using the
    term as a fixed title requiring capitalization, though “the Law” is possible.
- source_word: Οὐκ ἐπιθυμήσεις
  chosen: You shall not desire
  alternatives:
  - You shall not covet
  lexicon: BDAG
  rationale: The verb denotes strong desire for what belongs to another. “Covet” is
    traditional and possible, but “desire” is more transparent modern English while
    still fitting the ethical prohibition. Because the context in 4 Maccabees concerns
    passions and desire, this rendering also aligns well with the author's argument.
- source_word: τὴν γυναῖκα
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: 'In the phrase with τοῦ πλησίον σου, the relational sense is clearly
    marital: “your neighbor’s wife,” echoing the commandment tradition.'
- source_word: τοῦ πλησίον σου
  chosen: your neighbor’s
  alternatives:
  - of your neighbor
  lexicon: BDAG
  rationale: Standard possessive rendering in English; πλησίον here means a fellow
    member of the community, conventionally “neighbor.”
- source_word: οὐδὲ ὅσα
  chosen: nor anything
  alternatives:
  - nor whatever things
  - nor all that
  lexicon: LSJ
  rationale: 'The neuter plural relative expression is idiomatically rendered as a
    comprehensive singular in English: “anything.”'
- source_word: τῷ πλησίον σού ἐστιν
  chosen: that belongs to your neighbor
  alternatives:
  - that is your neighbor’s
  - that is to your neighbor
  lexicon: BDAG
  rationale: This expresses possession. “Belongs to” is idiomatic and clear in modern
    English.
