theological_decisions:
- issue: Anthropological term ψυχή in a philosophical-Jewish context
  chosen_reading: soul
  alternative_readings:
  - inner self
  - life
  rationale: The verse participates in the book's discourse about reason and the passions;
    'soul' best preserves that conceptual world without flattening it into modern
    psychological categories.
  doctrine_reference: Translation philosophy §1, §6
- issue: Abstract moral-aesthetic term κάλλος
  chosen_reading: beauty
  alternative_readings:
  - the beautiful
  - nobility
  rationale: The Greek directly says 'beauty.' Although the context may imply moral
    beauty or nobility, the translation should not import that interpretive conclusion
    into the main text beyond what the source explicitly states.
  doctrine_reference: Translation philosophy §1, §3
