id: 4MA.2.1
reference: 4 Maccabees 2:1
source:
  edition: lxx-swete-1909
  text: Καὶ τί θαυμαστόν, εἰ αἱ τῆς ψυχῆς ἐπιθυμίαι πρὸς τὴν τοῦ κάλλους μετουσίαν
    ἀκυροῦνται;
  language: Greek
