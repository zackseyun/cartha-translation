  text: Καὶ διὰ τῶν βιαιοτέρων δὲ παθῶν κρατεῖν ὁ λογισμὸς φαίνεται, φιλαρχίας καὶ
    κενοδοξίας καὶ ἀλαζονίας καὶ μεγαλαυχίας καὶ βασκανίας.
