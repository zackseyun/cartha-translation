theological_decisions:
- issue: Rendering the philosophical key term ὁ λογισμός in 4 Maccabees
  chosen_reading: reason
  alternative_readings:
  - rational judgment
  - reasoned judgment
  rationale: The book argues for the supremacy of disciplined reason over passions.
    'Reason' best preserves that philosophical register in concise English without
    importing later technical terminology.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Differentiating overlapping vice terms in the list
  chosen_reading: κενοδοξίας = 'empty glory'; ἀλαζονίας = 'boastfulness'; μεγαλαυχίας
    = 'arrogance'
  alternative_readings:
  - vainglory / pretension / haughtiness
  rationale: The Greek lists several closely related vices. The translation intentionally
    differentiates them in English rather than collapsing them into repeated 'pride'
    language, preserving the rhetorical accumulation of distinct but related passions.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
