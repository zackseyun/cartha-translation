translation:
  text: 'And reason is seen to prevail even over the more violent passions: love of
    power, empty glory, boastfulness, arrogance, and envy.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vainglory' for 'empty glory.' The Greek literally means 'empty glory.'
    reason: lexical_alternative
  - marker: b
    text: '''Envy'' may also carry the sense of malicious ill-will or ''the evil eye.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τῶν βιαιοτέρων ... παθῶν
  chosen: over the more violent passions
  alternatives:
  - through the more violent passions
  - against the more violent sufferings/emotions
  lexicon: LSJ
  rationale: With κρατεῖν ('to prevail, master, control'), διά with the genitive here
    is best taken in the sense of extending over or in relation to these passions,
    not instrumentally. πάθη in this context refers to passions/emotions rather than
    sufferings, and βιαιοτέρων marks them as more forceful or violent.
- source_word: κρατεῖν
  chosen: to prevail
  alternatives:
  - to master
  - to control
  - to overpower
  lexicon: LSJ
  rationale: The infinitive expresses reason's dominance over passions. 'Prevail'
    preserves the sense of superiority without over-specifying mechanism; the controlling
    sense remains clear from context.
- source_word: ὁ λογισμός
  chosen: reason
  alternatives:
  - rational judgment
  - the mind
  - reasoning
  lexicon: LSJ
  rationale: In 4 Maccabees, λογισμός is a key term for rational faculty or reasoned
    judgment. 'Reason' is concise, idiomatic, and fits the book's philosophical argument.
- source_word: φαίνεται
  chosen: is seen
  alternatives:
  - appears
  - is shown
  lexicon: LSJ
  rationale: The verb indicates that this is evident or demonstrable. 'Is seen' keeps
    the observational force and remains natural English.
- source_word: φιλαρχίας
  chosen: love of power
  alternatives:
  - ambition for rule
  - love of authority
  lexicon: LSJ
  rationale: The compound denotes desire for rule or preeminence. 'Love of power'
    is clear modern English and captures the vice broadly.
- source_word: κενοδοξίας
  chosen: empty glory
  alternatives:
  - vain glory
  - conceit
  - vanity
  lexicon: LSJ
  rationale: Literally 'empty glory.' While 'vainglory' is traditional, 'empty glory'
    is more transparent to modern readers and preserves the imagery.
- source_word: ἀλαζονίας
  chosen: boastfulness
  alternatives:
  - pretension
  - braggadocio
  - boasting
  lexicon: LSJ
  rationale: The term denotes swaggering self-assertion or boastful pretension. 'Boastfulness'
    is readable and morally pointed.
- source_word: μεγαλαυχίας
  chosen: arrogance
  alternatives:
  - haughtiness
  - high-minded boasting
  - pride
  lexicon: LSJ
  rationale: This word overlaps with proud self-exaltation. 'Arrogance' distinguishes
    it from the more verbal ἀλαζονία while remaining idiomatic.
- source_word: βασκανίας
  chosen: envy
  alternatives:
  - malice
  - the evil eye
  - jealous ill-will
  lexicon: LSJ
  rationale: The term can include envy and malignant ill-will, sometimes associated
    with the evil eye. In this vice list, 'envy' is the clearest central sense; the
    broader nuance is worth preserving in a footnote.
