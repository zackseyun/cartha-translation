translation:
  text: and it masters the love of children, punishing them for their wickedness;
    and it rules over attachment to friends, exposing them for their evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the love of children' and 'the familiarity/association of friends';
      the sense is affection or attachment toward one's children and friends.
    reason: lexical_alternative
lexical_decisions:
- source_word: κυριεύει
  chosen: masters
  alternatives:
  - has dominion over
  - rules over
  lexicon: BDAG
  rationale: The verb denotes exercising lordship or mastery. 'Masters' preserves
    the strong sense of control in concise English and pairs well with the following
    parallel verb δεσπόζει.
- source_word: τῆς τέκνων φιλίας
  chosen: the love of children
  alternatives:
  - affection for children
  - love for one's children
  lexicon: LSJ
  rationale: The genitive construction naturally refers to affection directed toward
    children. 'Love of children' is formally close to the Greek, though the sense
    is parental affection for one's children.
- source_word: διὰ κακίαν αὐτῶν
  chosen: for their wickedness
  alternatives:
  - because of their wickedness
  - on account of their badness
  lexicon: LSJ
  rationale: In context διὰ with the accusative gives the reason or basis for punishment.
    'Wickedness' fits the moral register better than the flatter 'badness.'
- source_word: κολάζων
  chosen: punishing
  alternatives:
  - correcting
  - chastising
  lexicon: LSJ
  rationale: The participle here describes disciplinary action taken against children.
    'Punishing' best matches the immediate judicial-moral force without softening
    it.
- source_word: τῆς φίλων συνηθείας
  chosen: attachment to friends
  alternatives:
  - familiarity with friends
  - association with friends
  - affection for friends
  lexicon: LSJ
  rationale: συνήθεια can denote habitual association, intimacy, or attachment formed
    by familiarity. 'Attachment to friends' communicates the relational bond in idiomatic
    English better than the more wooden 'familiarity with friends.'
- source_word: δεσπόζει
  chosen: rules over
  alternatives:
  - is master over
  - dominates
  lexicon: BDAG
  rationale: The verb is parallel to κυριεύει and denotes exercising authority or
    mastery. 'Rules over' is clear modern English and preserves the dominance motif.
- source_word: διὰ πονηρίας
  chosen: for their evil
  alternatives:
  - because of their wickedness
  - for their depravity
  lexicon: LSJ
  rationale: πονρία/πονηρία carries a sense of evil or moral baseness. 'Evil' is concise
    and natural here, while still morally weighty.
- source_word: ἐξελέγχων
  chosen: exposing
  alternatives:
  - rebuking
  - convicting
  - proving wrong
  lexicon: BDAG
  rationale: The participle can mean exposing wrongdoing, reproving, or convicting.
    Since the object is persons ('them'), 'exposing them for their evil' captures
    the sense of bringing their wrongdoing to light without over-specifying a courtroom
    setting.
