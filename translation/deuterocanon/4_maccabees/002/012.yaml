id: 4MA.2.12
reference: 4 Maccabees 2:12
source:
  edition: lxx-swete-1909
  text: καὶ τῆς τέκνων φιλίας κυριεύει, διὰ κακίαν αὐτῶν κολάζων· καὶ τῆς φίλων συνηθείας
    δεσπόζει, διὰ πονηρίας αὐτοὺς ἐξελέγχων.
  language: Greek
