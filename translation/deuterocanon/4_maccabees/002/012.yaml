theological_decisions:
- issue: Subject implied by the verbs
  chosen_reading: The subject is reasoned self-control, continuing the argument of
    the surrounding context, and the verse describes its mastery over natural affections.
  alternative_readings:
  - A more generic 'it' without specifying reason in the verse itself
  rationale: The Greek text of this verse supplies only the verbs and objects, not
    an explicit noun subject. The English keeps 'it' rather than importing 'reason'
    into the verse, but the translation is framed to fit the contextual subject from
    the surrounding discourse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
