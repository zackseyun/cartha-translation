theological_decisions:
- issue: Interpretation of the sabbatical-law allusion in τῶν ἑβδομάδων ἐνστασῶν χρεοκοπούμενος
  chosen_reading: The verse refers to remission of debts at the arrival of the seventh
    year, so the main text renders the legal sense explicitly.
  alternative_readings:
  - A more literal but obscure rendering would be 'when the weeks arrive, becoming
    bankrupt concerning the loan'
  - The phrase could be taken as emphasizing personal financial loss rather than formal
    debt cancellation
  rationale: 'The Greek wording is compressed and somewhat awkward in Swete''s witness,
    but the surrounding sense is clear: reason trained by the law overcomes greed
    by lending without interest and relinquishing repayment at the sabbatical release.
    Making the allusion explicit serves optimal equivalence without importing doctrine
    beyond the legal background already signaled by the text.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without paraphrase beyond warrant.'
