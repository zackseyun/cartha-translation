translation:
  text: Therefore, if someone is even money-loving, by living under the law he compels
    his own way of life, lending to those in need without interest, and when the seventh
    year arrives, canceling the debt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'when the sevens/weeks arrive,' an allusion to the law's cycle
      of debt release in the seventh year.
    reason: cross_reference
  - marker: b
    text: Or 'suffering loss on the loan'; the Greek participle can emphasize bearing
      the financial loss involved in remitting the debt.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτίκα γοῦν
  chosen: Therefore
  alternatives:
  - At once then
  - Accordingly indeed
  - So then
  lexicon: LSJ
  rationale: The pair functions inferentially, drawing an immediate conclusion from
    the preceding argument. 'Therefore' captures the logical force in natural English
    better than a more wooden 'at once then.'
- source_word: τῷ νόμῳ πολιτευόμενος
  chosen: by living under the law
  alternatives:
  - conducting himself by the law
  - ordering his life by the law
  - living according to the law
  lexicon: LSJ
  rationale: πολιτεύομαι concerns one's manner of life or civic conduct. 'By living
    under the law' expresses practical life-governance by the law in readable English,
    while preserving the instrumental sense of τῷ νόμῳ.
- source_word: φιλάργυρός
  chosen: money-loving
  alternatives:
  - greedy
  - avaricious
  - a lover of money
  lexicon: LSJ
  rationale: The adjective literally denotes love of money. 'Money-loving' preserves
    the lexical imagery more transparently than the more interpretive 'greedy.'
- source_word: βιάζεται τὸν ἑαυτοῦ τρόπον
  chosen: he compels his own way of life
  alternatives:
  - he forces his own disposition
  - he restrains his own manner
  - he overrules his own habit
  lexicon: LSJ
  rationale: The sense is that the person constrains or masters his natural inclination/way
    of life. 'Compels his own way of life' keeps the reflexive force and the idea
    of self-constraint, though idiomatically it means he forces his conduct into conformity
    with the law.
- source_word: τοῖς δεομένοις
  chosen: to those in need
  alternatives:
  - to the needy
  - to those who ask
  lexicon: LSJ
  rationale: δεόμενοι can mean those lacking or needing help. In this legal-charitable
    context, 'those in need' best fits the sense of lending to the needy rather than
    merely to petitioners.
- source_word: δανείζων χωρὶς τόκων
  chosen: lending ... without interest
  alternatives:
  - making loans ... without usury
  - lending ... free of interest
  lexicon: LSJ
  rationale: τόκος is interest on a loan. 'Without interest' is clear modern English;
    'usury' would sound archaic and potentially narrower.
- source_word: τὸ δάνειον
  chosen: the debt
  alternatives:
  - the loan
  - what was lent
  lexicon: LSJ
  rationale: Although the noun can denote the loan itself, in the context of remission
    at the sabbatical year the English idiom 'canceling the debt' communicates the
    legal effect more naturally than 'canceling the loan.'
- source_word: τῶν ἑβδομάδων ἐνστασῶν
  chosen: when the seventh year arrives
  alternatives:
  - when the weeks arrive
  - when the appointed sevens come due
  lexicon: LSJ
  rationale: The phrase is difficult if taken woodenly as 'weeks,' but in this legal
    context it refers to the sabbatical cycle of sevens, i.e., the seventh year of
    debt release. The rendering makes explicit the referent implied by the allusion
    to Deuteronomic law.
- source_word: χρεοκοπούμενος
  chosen: canceling the debt
  alternatives:
  - remitting the debt
  - forgoing repayment
  - suffering loss on the loan
  lexicon: LSJ
  rationale: In context the participle refers to accepting the loss or writing off
    the debt in obedience to the law. 'Canceling the debt' gives the practical sense
    clearly; 'suffering loss' is possible but less directly tied to the sabbatical-remission
    background.
