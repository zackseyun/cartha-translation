id: 4MA.2.8
reference: 4 Maccabees 2:8
source:
  edition: lxx-swete-1909
  text: αὐτίκα γοῦν τῷ νόμῳ πολιτευόμενος, κἂν φιλάργυρός τις εἴη, βιάζεται τὸν ἑαυτοῦ
    τρόπον, τοῖς δεομένοις δανείζων χωρὶς τόκων, καὶ τὸ δάνειον τῶν ἑβδομάδων ἐνστασῶν
    χρεοκοπούμενος.
