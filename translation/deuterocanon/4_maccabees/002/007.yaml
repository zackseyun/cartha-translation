theological_decisions:
- issue: Rendering of κύριος in a non-divine philosophical context
  chosen_reading: master
  alternative_readings:
  - lord
  - ruler
  rationale: Although κύριος defaults to 'Lord' when used as a title, here it predicates
    control of reason over passions. The contextual sense is mastery, not a divine
    or honorific title.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; translate by
    context while preserving meaning.'
- issue: Generic masculine τις ὢν
  chosen_reading: a man who is by habit...
  alternative_readings:
  - someone who is by habit...
  - a person who is by habit...
  rationale: The Greek uses a masculine singular form in a generic example. Per gender-accurate
    policy, 'a man' preserves the source form and representative force better than
    a neutral recast.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral.
