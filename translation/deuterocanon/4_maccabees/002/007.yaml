id: 4MA.2.7
reference: 4 Maccabees 2:7
source:
  edition: lxx-swete-1909
  text: ἐπεὶ τίνα τρόπον μονοφάγος τις ὢν τὸ ἦθος καὶ γαστρίμαργος καὶ μέθυσος μεταπαιδεύεται,
    εἰ μὴ δῆλον ὅτι κύριός ἐστιν τῶν παθῶν ὁ λογισμός;
  language: Greek
  pages:
  - 752
  - 753
  - 754
  - 755
  - 756
  - 757
  - 786
  - 787
