translation:
  text: For how is a man who is by habit eating only one kind of food, and is a glutton
    and a drunkard, retrained, if it is not clear that reason is master of the passions?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fastidious about food' or 'one who craves special dishes' for the rare
      Greek word translated 'greedy for delicacies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  chosen: For
  alternatives:
  - since
  - indeed
  lexicon: LSJ
  rationale: Introduces an explanatory rhetorical question supporting the preceding
    argument; 'For' fits natural English while preserving the logical connection.
- source_word: τίνα τρόπον
  chosen: how
  alternatives:
  - in what way
  - by what means
  lexicon: LSJ
  rationale: Idiomatic English compresses the phrase to 'how' without loss of sense
    in a rhetorical question.
- source_word: μονοφάγος
  chosen: greedy for delicacies
  alternatives:
  - dainty-eater
  - fastidious eater
  - one who eats only relishes
  lexicon: LSJ
  rationale: The term is rare and refers not merely to eating alone but to being choosy
    or fixated on special foods. 'Greedy for delicacies' communicates the vice in
    readable modern English better than a wooden or obscure gloss.
- source_word: τὸ ἦθος
  chosen: by habit
  alternatives:
  - in character
  - in disposition
  - in his way of life
  lexicon: LSJ
  rationale: With ὢν, the phrase describes settled character or customary disposition.
    'By habit' captures the adverbial force naturally in English.
- source_word: γαστρίμαργος
  chosen: a glutton
  alternatives:
  - greedy-bellied
  - voracious
  lexicon: LSJ
  rationale: Standard vice-term for excessive appetite; 'glutton' is concise and idiomatic.
- source_word: μέθυσος
  chosen: a drunkard
  alternatives:
  - drunken
  - winebibber
  lexicon: LSJ
  rationale: Denotes a person characterized by drunkenness, not merely someone presently
    drunk.
- source_word: μεταπαιδεύεται
  chosen: is retrained
  alternatives:
  - is reformed
  - is educated anew
  - is disciplined into change
  lexicon: LSJ
  rationale: The verb implies being educated or trained into a changed pattern. 'Retrained'
    preserves the pedagogical nuance better than the more moralistic 'reformed'.
- source_word: δῆλον
  chosen: clear
  alternatives:
  - evident
  - manifest
  lexicon: LSJ
  rationale: Simple modern equivalent in the clause 'if it is not clear that...'.
- source_word: κύριός
  chosen: master
  alternatives:
  - lord
  - ruler
  lexicon: LSJ
  rationale: Here the sense is dominion or control over passions, not a divine title.
    'Master' best expresses practical sovereignty in context.
- source_word: παθῶν
  chosen: the passions
  alternatives:
  - the emotions
  - the sufferings
  - the impulses
  lexicon: LSJ
  rationale: In this philosophical context πάθη refers to disordered passions or appetites.
    'Passions' preserves the technical moral sense better than 'emotions'.
- source_word: ὁ λογισμός
  chosen: reason
  alternatives:
  - rational thought
  - the rational mind
  - reasoning
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key philosophical term for reason as the
    governing faculty. 'Reason' is the most direct and idiomatic rendering.
