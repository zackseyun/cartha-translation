id: 4MA.2.16
reference: 4 Maccabees 2:16
source:
  edition: lxx-swete-1909
  text: πάντα γὰρ ταῦτα τὰ κακόηθη πάθη ὁ σώφρων νοῦς ἀπωθεῖται, ὥσπερ καὶ τὸν θυμόν·
    καὶ γὰρ τούτου δεσπόζει.
  language: Greek
  pages:
  - 752
  - 753
  - 754
  - 755
  - 756
  - 757
  - 786
  - 787
  - 788
  - 789
  confidence: high
  validation: major_mismatch
translation:
  text: For prudent reason drives away all these vicious passions, just as it also
    drives away anger; for it is master even over this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the self-controlled mind' for 'prudent reason.' The Greek phrase ὁ σώφρων
      νοῦς combines the ideas of rational faculty and disciplined self-mastery.
    reason: lexical_alternative
lexical_decisions:
- source_word: κακόηθη
  chosen: vicious
  alternatives:
  - evil
  - malignant
  - bad
  lexicon: LSJ
  rationale: The adjective describes morally harmful or corrupt qualities of the passions.
    'Vicious' captures both ethical negativity and destructive tendency in natural
    English better than the more generic 'evil' or 'bad'.
- source_word: πάθη
  chosen: passions
  alternatives:
  - sufferings
  - emotions
  - affections
  lexicon: LSJ
  rationale: In 4 Maccabees the term refers to disordered emotional impulses or appetites
    rather than mere experiences of suffering. 'Passions' fits the philosophical-ethical
    context and preserves the technical flavor of the argument.
- source_word: ὁ σώφρων νοῦς
  chosen: prudent reason
  alternatives:
  - the self-controlled mind
  - the sober mind
  - sound reason
  lexicon: LSJ
  rationale: The phrase is central to the book's thesis about reason governed by prudence/self-mastery.
    'Prudent reason' preserves both νοῦς as rational faculty and σώφρων as disciplined,
    temperate prudence, while remaining readable.
- source_word: ἀπωθεῖται
  chosen: drives away
  alternatives:
  - repels
  - pushes away
  - rejects
  lexicon: LSJ
  rationale: The middle verb here conveys active repulsion or thrusting aside. 'Drives
    away' is idiomatic English and communicates effective mastery over the passions.
- source_word: θυμός
  chosen: anger
  alternatives:
  - wrath
  - temper
  - spiritedness
  lexicon: LSJ
  rationale: In this context the word names an affect to be mastered, not a positive
    spirited quality. 'Anger' is the clearest contextual rendering.
- source_word: δεσπόζει
  chosen: is master even over this
  alternatives:
  - rules over this also
  - has dominion over this too
  lexicon: LSJ
  rationale: The verb denotes exercising mastery or lordship. 'Is master even over
    this' preserves the strong control language and reflects the emphatic καὶ γὰρ
    τούτου.
