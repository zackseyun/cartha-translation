theological_decisions:
- issue: Anthropological-philosophical rendering of ὁ σώφρων νοῦς
  chosen_reading: prudent reason
  alternative_readings:
  - the self-controlled mind
  - sound reason
  rationale: The verse belongs to 4 Maccabees' sustained claim that reason, when marked
    by σωφροσύνη, governs the passions. Rendering νοῦς as 'reason' better reflects
    the philosophical argument than the more psychological 'mind,' while 'prudent'
    preserves the ethical quality of σώφρων without overexpanding it.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning over translation tradition.'
