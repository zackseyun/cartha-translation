translation:
  text: And reason is seen to prevail not only over the goading of pleasure-seeking,
    but also over every desire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the goading of self-indulgence' or 'the maddening impulse of pleasure-seeking.'
      The Greek expression is unusually compressed and metaphorical.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λογισμός
  chosen: reason
  alternatives:
  - rational judgment
  - reasoning
  lexicon: LSJ
  rationale: In 4 Maccabees, λογισμός is a key theme referring to the faculty of rational
    thought, especially morally disciplined reason. 'Reason' is concise and idiomatic
    while preserving the philosophical force better than the more process-oriented
    'reasoning'.
- source_word: φαίνεται
  chosen: is seen
  alternatives:
  - appears
  - is shown
  lexicon: LSJ
  rationale: The verb naturally conveys what is evident or manifest. 'Is seen' preserves
    the passive/impersonal feel of the Greek and avoids overstating the claim as a
    formal proof ('is shown').
- source_word: ἐπικρατεῖν
  chosen: to prevail
  alternatives:
  - to master
  - to overcome
  - to have power over
  lexicon: LSJ
  rationale: The infinitive denotes exercising superiority or mastery. 'To prevail'
    fits the philosophical register and works smoothly with 'reason is seen,' while
    still conveying effective dominance.
- source_word: τὴν τῆς ἡδυπαθείας οἰστρηλασίαν
  chosen: the frenzy that drives pleasure
  alternatives:
  - the goading of pleasure-seeking
  - the maddening impulse of sensual indulgence
  - the sting of hedonism
  lexicon: LSJ
  rationale: This compressed phrase is difficult. ἡδυπάθεια denotes love of pleasure
    / self-indulgence, and οἰστρηλασία evokes being driven or goaded as by a gadfly
    into frenzy. The chosen rendering unpacks the metaphor into natural English while
    retaining the sense of pleasure as an agitating, driving force.
- source_word: ἡδυπαθεία
  chosen: pleasure
  alternatives:
  - self-indulgence
  - love of pleasure
  - sensual indulgence
  lexicon: LSJ
  rationale: Although the noun can imply self-indulgent pleasure-seeking, in this
    construction the broader and more readable 'pleasure' works best, with the negative
    force carried by the surrounding phrase 'the frenzy that drives pleasure.'
- source_word: οἰστρηλασία
  chosen: frenzy that drives
  alternatives:
  - goading
  - driving madness
  - agitation
  lexicon: LSJ
  rationale: The rare term combines the notion of being stung/goaded into a frenzied
    state. A literal single-word rendering would be obscure in English, so the phrase
    'frenzy that drives' preserves both agitation and propulsion.
- source_word: πάσης ἐπιθυμίας
  chosen: every desire
  alternatives:
  - all desire
  - every craving
  lexicon: LSJ
  rationale: ἐπιθυμία is a broad term for desire, longing, or craving. 'Every desire'
    is the most natural equivalent here and preserves the universal scope marked by
    πάσης.
