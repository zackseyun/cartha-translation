theological_decisions:
- issue: Anthropological-philosophical claim about reason's mastery over passions
  chosen_reading: reason is portrayed as prevailing over pleasure-driven impulse and
    over every desire
  alternative_readings:
  - reason merely appears to prevail
  - reason controls only certain desires
  rationale: The verse presents a central thesis of 4 Maccabees concerning disciplined
    reason's superiority over passions. The wording should preserve that claim without
    importing later doctrinal categories or reducing it to a weaker observation. 'Is
    seen to prevail' keeps the Greek φαίνεται while maintaining the book's argumentative
    force.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence'
