  text: οὐ μόνον δὲ τὴν τῆς ἡδυπαθείας οἰστρηλασίαν ἐπικρατεῖν ὁ λογισμὸς φαίνεται,
    ἀλλὰ καὶ πάσης ἐπιθυμίας.
