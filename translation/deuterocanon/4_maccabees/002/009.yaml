theological_decisions:
- issue: Philosophical-anthropological force of λογισμός in 4 Maccabees
  chosen_reading: reason
  alternative_readings:
  - rational judgment
  - the rational mind
  rationale: The book argues that devout reason governs the passions. Rendering λογισμός
    consistently as 'reason' preserves this thematic thread without importing later
    technical philosophical categories too heavily into the English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Ethical force of πάθη
  chosen_reading: passions
  alternative_readings:
  - emotions
  - desires
  rationale: The text is not making a neutral statement about feelings in general
    but about impulses to be governed. 'Passions' best preserves the moral-philosophical
    tension central to the argument.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
