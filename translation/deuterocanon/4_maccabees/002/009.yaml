translation:
  text: 'And even if someone is stingy, he is restrained by the law through reason,
    neither gleaning the unharvested crops nor going over the vineyards again. And
    in other matters as well it is possible to recognize this: that reason is the
    master over the passions.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'picking over the vineyards'—that is, gathering what
      remains after the first harvest pass.
    reason: lexical_alternative
lexical_decisions:
- source_word: φειδωλός
  chosen: stingy
  alternatives:
  - frugal
  - sparing
  - miserly
  lexicon: LSJ
  rationale: In this context the word describes a person inclined to withhold or grasp,
    fitting the argument about law restraining acquisitive impulses. 'Frugal' can
    sound morally positive in English, while 'miserly' may overstate the vice. 'Stingy'
    best captures the negative ethical sense.
- source_word: κρατεῖται
  chosen: is restrained
  alternatives:
  - is controlled
  - is held in check
  lexicon: LSJ
  rationale: The passive indicates being mastered or held under control by the law.
    'Is restrained' fits the legal-ethical context and reads naturally in English.
- source_word: διὰ τὸν λογισμόν
  chosen: through reason
  alternatives:
  - by rational judgment
  - through rational thought
  lexicon: LSJ
  rationale: λογισμός is a key term in 4 Maccabees for reasoned judgment governing
    passions. 'Through reason' is concise and preserves the philosophical force without
    overtechnical wording.
- source_word: ἐπικαρπούμενος τοὺς ἀμήτους
  chosen: gleaning the unharvested crops
  alternatives:
  - taking advantage of the unreaped fields
  - reaping what was left unharvested
  lexicon: LSJ
  rationale: The participle refers to taking produce from what remains unreaped. 'Gleaning'
    captures agricultural taking from leftover produce, and 'unharvested crops' renders
    ἀμήτους in accessible English. The exact agricultural nuance is somewhat compressed
    in the Greek, so this is an optimal-equivalence rendering.
- source_word: ἐπιρρωγολογούμενος τοὺς ἀμπελῶνας
  chosen: going over the vineyards again
  alternatives:
  - gleaning the vineyards
  - picking over the vineyards a second time
  lexicon: LSJ
  rationale: The rare verb points to gathering what remains in the vineyard after
    the first pass, echoing pentateuchal harvest laws. 'Going over the vineyards again'
    communicates the repeated action clearly; a more literal but less transparent
    option is preserved in a footnote.
- source_word: ἐπὶ τῶν ἑτέρων
  chosen: in other matters as well
  alternatives:
  - from other cases also
  - with respect to other things too
  lexicon: LSJ
  rationale: This broadens the example beyond harvest laws. The chosen phrase is idiomatic
    and preserves the comparative extension of the argument.
- source_word: ἐπιγνῶναι
  chosen: to recognize
  alternatives:
  - to perceive clearly
  - to know fully
  lexicon: LSJ
  rationale: The infinitive here means to discern or recognize from examples. 'Recognize'
    is natural and sufficient.
- source_word: παθῶν
  chosen: the passions
  alternatives:
  - the emotions
  - the sufferings
  - the desires
  lexicon: LSJ
  rationale: In this philosophical context πάθη refers to passions or disordered impulses,
    a central theme in 4 Maccabees. 'Passions' preserves the technical moral sense
    better than 'emotions'.
- source_word: ὁ λογισμὸς κρατῶν
  chosen: reason is the master over
  alternatives:
  - reason rules over
  - reason has control over
  lexicon: LSJ
  rationale: The construction emphasizes reason as exercising dominion over the passions.
    'Is the master over' brings out the governing force more strongly than the flatter
    'rules over,' while remaining faithful to the sense.
