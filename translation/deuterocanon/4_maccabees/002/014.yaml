translation:
  text: nor cutting down the cultivated plants of enemies, but preserving those of
    foes whose owners have been destroyed, and raising up what has fallen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for those who have perished,' taking the dative participle more directly
      and leaving the possessive relation implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲ
  chosen: nor
  alternatives:
  - and not
  - not even
  lexicon: LSJ
  rationale: Continues the preceding negated description with a coordinating negative,
    best rendered succinctly as 'nor.'
- source_word: δενδροτομῶν
  chosen: cutting down
  alternatives:
  - felling
  - lopping trees
  lexicon: LSJ
  rationale: The verb denotes cutting trees/wood. 'Cutting down' is natural English
    and broad enough to fit the following φυτά without over-specifying timber felling.
- source_word: τὰ ἥμερα ... φυτά
  chosen: the cultivated plants
  alternatives:
  - the domesticated growths
  - the orchard trees/crops
  lexicon: LSJ
  rationale: ἥμερα contrasts with wild growth and means cultivated/domesticated. φυτά
    can refer to planted things generally, not only trees. 'Cultivated plants' preserves
    the agricultural sense without narrowing the referent too much.
- source_word: τῶν πολεμίων
  chosen: of enemies
  alternatives:
  - belonging to enemies
  - of adversaries
  lexicon: LSJ
  rationale: A straightforward possessive genitive. 'Enemies' is the most direct rendering.
- source_word: τὰ δὲ τῶν ἐχθρῶν
  chosen: but those of foes
  alternatives:
  - but the things of enemies
  - but the property of foes
  lexicon: LSJ
  rationale: The contrastive δέ marks a balancing clause. Using 'foes' avoids awkward
    repetition while preserving the hostile sense of ἐχθρῶν.
- source_word: τοῖς ἀπολέσασιν
  chosen: whose owners have been destroyed
  alternatives:
  - for those who have perished
  - for the destroyed
  - for those who lost them
  lexicon: LSJ
  rationale: The dative participle is compressed and contextually refers to the enemy
    persons connected with the possessions just mentioned. In idiomatic English, making
    the relation explicit as 'whose owners have been destroyed' clarifies the sense
    that the property is preserved even after their defeat/death.
- source_word: διασώζων
  chosen: preserving
  alternatives:
  - saving intact
  - keeping safe
  lexicon: LSJ
  rationale: The verb means to preserve or save through danger. 'Preserving' fits
    the ethical point about sparing enemy property.
- source_word: τὰ πεπτωκότα
  chosen: what has fallen
  alternatives:
  - the fallen things
  - what has collapsed
  lexicon: LSJ
  rationale: Perfect participle used substantivally. The phrase is somewhat general;
    'what has fallen' preserves that breadth.
- source_word: συνεγείρων
  chosen: raising up
  alternatives:
  - restoring
  - setting upright again
  lexicon: LSJ
  rationale: Literally 'raising up together/again.' 'Raising up' keeps the concrete
    imagery and can imply restoration.
