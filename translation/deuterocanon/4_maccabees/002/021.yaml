translation:
  text: For when God constructed man, he implanted both his passions and his dispositions.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁπηνίκα
  chosen: when
  alternatives:
  - at the time when
  - whenever
  lexicon: LSJ
  rationale: Temporal conjunction introducing the circumstance; simple 'when' is natural
    English and fits the aorist narrative context better than the more iterative 'whenever'.
- source_word: κατεσκεύασεν
  chosen: constructed
  alternatives:
  - made
  - formed
  - created
  lexicon: LSJ
  rationale: The verb denotes making or constructing. 'Constructed' preserves the
    deliberate, fashioned sense of the Greek and avoids flattening it to the more
    generic 'made.' 'Created' would import a stronger theological term not explicitly
    used here.
- source_word: τὸν ἄνθρωπον
  chosen: man
  alternatives:
  - humankind
  - the human being
  lexicon: LSJ
  rationale: The singular with article here is generic, referring to humanity in representative
    form. Per doctrine, gender-accurate rendering is preferred where the Greek uses
    masculine generic force; 'man' best matches that usage.
- source_word: τὰ πάθη
  chosen: passions
  alternatives:
  - sufferings
  - emotions
  - affections
  lexicon: LSJ
  rationale: In this philosophical context πάθη refers to the affective impulses or
    passions, not external sufferings. 'Passions' preserves the moral-psychological
    sense central to 4 Maccabees' argument about reason governing the passions.
- source_word: τὰ ἤθη
  chosen: dispositions
  alternatives:
  - character traits
  - habits
  - manners
  lexicon: LSJ
  rationale: ἤθη here denotes settled traits or dispositions of character. 'Dispositions'
    is broad enough to preserve the anthropological sense without narrowing it merely
    to social 'manners' or repetitive 'habits.'
- source_word: περιεφύτευσεν
  chosen: implanted
  alternatives:
  - planted in
  - instilled
  lexicon: LSJ
  rationale: The compound verb literally suggests planting around/in. 'Implanted'
    gives clear English while preserving the metaphor of God placing these capacities
    within man.
