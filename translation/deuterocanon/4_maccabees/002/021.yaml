id: 4MA.2.21
reference: 4 Maccabees 2:21
source:
  edition: lxx-swete-1909
  text: ὁπηνίκα γὰρ ὁ θεὸς τὸν ἄνθρωπον κατεσκεύασεν, τὰ πάθη αὐτοῦ καὶ τὰ ἤθη περιεφύτευσεν·
  language: Greek
