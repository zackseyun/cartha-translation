translation:
  text: For although Moses was angered against Dathan and Abiron, he did nothing against
    them in anger, but with reason he restrained anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Ἀβειρών; traditionally 'Abiram.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by rational judgment he governed his anger.' The Greek highlights reason's
      mastery over passion, a central theme in 4 Maccabees.
    reason: lexical_alternative
lexical_decisions:
- source_word: θυμούμενος
  chosen: was angered
  alternatives:
  - being angry
  - becoming angry
  lexicon: LSJ
  rationale: The participle from θυμόω/θυμός denotes being in a state of anger. 'Was
    angered' reads naturally in English while preserving that Moses genuinely experienced
    anger.
- source_word: γέ τοι
  chosen: although
  alternatives:
  - indeed
  - to be sure
  lexicon: LSJ
  rationale: The particle combination adds concessive-emphatic force in context. Since
    the sentence contrasts Moses' anger with his rational restraint, 'although' best
    captures the discourse function in idiomatic English.
- source_word: κατὰ Δαθὰν καὶ Ἀβειρών
  chosen: against Dathan and Abiron
  alternatives:
  - with respect to Dathan and Abiron
  lexicon: LSJ
  rationale: κατά with persons here marks hostile direction. The names are transliterated;
    'Abiron' follows the Greek form Ἀβειρών rather than the more familiar Hebrew-based
    'Abiram,' in keeping with source-language primacy.
- source_word: οὐ θυμῷ τι κατ᾽ αὐτῶν ἐποίησεν
  chosen: he did nothing against them in anger
  alternatives:
  - he did nothing against them by anger
  - he acted in no way against them in anger
  lexicon: LSJ
  rationale: 'The dative θυμῷ is instrumental or modal: Moses did not act out of anger.
    ''Did nothing against them in anger'' is clear modern English and preserves the
    ethical contrast.'
- source_word: λογισμῷ
  chosen: with reason
  alternatives:
  - by reason
  - by rational judgment
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for rational judgment governing
    the passions. 'With reason' is concise and readable, while still signaling the
    book's central theme of reason's mastery.
- source_word: τὸν θυμὸν διήτησεν
  chosen: he restrained anger
  alternatives:
  - he governed anger
  - he directed anger
  - he sifted through anger
  lexicon: LSJ
  rationale: Given the argument of 4 Maccabees, the verb here is best taken in the
    sense of managing or controlling anger rather than venting it. 'Restrained anger'
    communicates the practical result of rational mastery in idiomatic English.
