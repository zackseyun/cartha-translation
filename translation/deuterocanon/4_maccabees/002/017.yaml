theological_decisions:
- issue: Rendering the philosophical term λογισμός/λογισμῷ in a way that preserves
    the book's theme without becoming wooden
  chosen_reading: with reason
  alternative_readings:
  - by rational judgment
  - with rational calculation
  rationale: 4 Maccabees emphasizes reason's rule over passions. 'With reason' preserves
    that theme in accessible English, while the alternatives are more technical but
    less natural in the sentence.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Form of the rebel's name Ἀβειρών
  chosen_reading: Abiron
  alternative_readings:
  - Abiram
  rationale: The project's policy is to transliterate names from the source text rather
    than normalize them to more familiar traditional English forms. Because the Greek
    reads Ἀβειρών, 'Abiron' is used in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
