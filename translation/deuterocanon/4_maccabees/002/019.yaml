translation:
  text: For why does our all-wise father Jacob blame those around Simeon and Levi
    for slaughtering the Shechemites en masse, not with reason, saying, “Cursed be
    their anger”?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'without reason,' if the phrase μὴ λογισμῷ is taken more idiomatically;
      the sense in context is that Jacob's condemnation was justified, not irrational.
    reason: lexical_alternative
  - marker: b
    text: The quotation echoes Genesis 49:7.
    reason: cross_reference
lexical_decisions:
- source_word: ἐπεὶ διὰ τί
  chosen: For why
  alternatives:
  - For what reason
  - Why then
  lexicon: LSJ
  rationale: Introduces an explanatory rhetorical question tied to the preceding argument.
    'For why' preserves both the inferential and interrogative force more closely
    than a simple 'why.'
- source_word: ὁ πάνσοφος ἡμῶν πατὴρ Ἰακώβ
  chosen: our all-wise father Jacob
  alternatives:
  - our very wise father Jacob
  - Jacob our all-wise father
  lexicon: LSJ
  rationale: πάνσοφος is an elevated epithet meaning 'all-wise' or 'very wise.' Retaining
    the superlative flavor suits the rhetorical style of 4 Maccabees.
- source_word: τοὺς περὶ Συμεὼν καὶ Λευεὶν
  chosen: those with Simeon and Levi
  alternatives:
  - the men around Simeon and Levi
  - the party of Simeon and Levi
  - Simeon and Levi and their companions
  lexicon: LSJ
  rationale: The idiom οἱ/τοὺς περὶ + name can denote a person together with associates
    or a party grouped around them. 'Those with Simeon and Levi' preserves that grouping
    without over-specifying the exact membership.
- source_word: αἰτιᾶται
  chosen: blame
  alternatives:
  - accuse
  - find fault with
  - censure
  lexicon: LSJ
  rationale: The verb here conveys reproach or censure. 'Blame' is natural modern
    English and fits Jacob's negative judgment in the cited scriptural allusion.
- source_word: μὴ λογισμῷ
  chosen: not with reason
  alternatives:
  - without reason
  - not rationally
  - not by reason
  lexicon: LSJ
  rationale: The dative λογισμῷ refers to reasoned judgment. Because the Greek places
    μή directly with the phrase, 'not with reason' closely mirrors the wording while
    still communicating that Jacob's blame was not irrational, i.e., he did not blame
    them apart from reason. The phrase is somewhat compressed in Greek, and the English
    preserves that compactness.
- source_word: τοὺς Σικιμίτας
  chosen: the Shechemites
  alternatives:
  - the people of Shechem
  lexicon: LSJ
  rationale: Standard ethnic rendering from Σικιμίται, referring to the inhabitants
    of Shechem in the Genesis narrative.
- source_word: ἐθνηδόν
  chosen: as a nation
  alternatives:
  - en masse
  - collectively
  - all together as a people
  lexicon: LSJ
  rationale: The adverb indicates action against the group in its collective national
    or ethnic identity. 'As a nation' preserves that collective sense better than
    the vaguer 'en masse.'
- source_word: ἀποσφάξαντας
  chosen: slaughtering
  alternatives:
  - butchering
  - killing
  - slaying
  lexicon: LSJ
  rationale: The compound verb is strong and violent. 'Slaughtering' conveys the brutality
    without becoming colloquial.
- source_word: Ἐπικατάρατος ὁ θυμὸς αὐτῶν
  chosen: Cursed be their anger
  alternatives:
  - Accursed is their wrath
  - Their anger is cursed
  lexicon: LSJ
  rationale: This echoes Gen 49:7 LXX. 'Cursed be their anger' is idiomatic English
    and preserves the imprecatory force of ἐπικατάρατος and the emotional term θυμός
    as 'anger.'
