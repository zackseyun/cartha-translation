theological_decisions:
- issue: Relation of Jacob's judgment to reason in μὴ λογισμῷ
  chosen_reading: Jacob blames them with good reason; the phrase is rendered literally
    as 'not with reason' in close connection to the participial clause, preserving
    the compressed Greek rather than smoothing into an interpretive paraphrase.
  alternative_readings:
  - Jacob blames them not for acting rationally but for the massacre itself
  - Jacob does not blame them irrationally / without reason
  rationale: The syntax is compressed and somewhat awkward in the transmitted Greek.
    The broader context in 4 Maccabees argues that reason condemns passion-driven
    violence, so the sense is that Jacob's censure is justified. Rather than over-resolve
    the syntax, the main text stays close to the Greek while the rationale records
    the likely sense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
