theological_decisions:
- issue: Philosophical-anthropological sense of λογισμός versus a more generic mental
    faculty
  chosen_reading: reason
  alternative_readings:
  - rational thought
  - reasoning faculty
  rationale: The verse participates in 4 Maccabees' sustained claim that reason can
    govern the passions. Rendering λογισμός as 'reason' preserves that conceptual
    framework without overtechnical wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Scope of θυμοί
  chosen_reading: passions
  alternative_readings:
  - angers
  - impulses
  rationale: Although θυμός often relates to anger, the plural here in this philosophical
    context is broader, referring to affective drives subject to rational control.
    'Passions' best preserves the argument's scope.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
