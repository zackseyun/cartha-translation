translation:
  text: For if reason were not able to master the passions, he would not have spoken
    in this way.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰ μὴ γὰρ
  chosen: For if ... not
  alternatives:
  - For unless
  - For if not
  lexicon: LSJ
  rationale: Retains the explanatory force of γάρ and the conditional structure introduced
    by εἰ μή in natural English.
- source_word: ἐδύνατο
  chosen: were able
  alternatives:
  - could
  - had power
  lexicon: LSJ
  rationale: Imperfect middle/passive of δύναμαι expresses capability; 'were able'
    fits the counterfactual condition smoothly in English.
- source_word: τῶν θυμῶν
  chosen: the passions
  alternatives:
  - the impulses
  - the angers
  - the emotions
  lexicon: LSJ
  rationale: θυμός can denote anger, spirited impulse, or passionate drive. In the
    philosophical argument of 4 Maccabees about rational mastery over affective drives,
    'passions' best captures the broader category rather than only 'angers'.
- source_word: ὁ λογισμός
  chosen: reason
  alternatives:
  - rational thought
  - the mind
  - reasoning
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key philosophical term for rational faculty
    or reasoned judgment. 'Reason' is concise and idiomatic while preserving the conceptual
    weight.
- source_word: κρατεῖν
  chosen: to master
  alternatives:
  - to control
  - to prevail over
  - to rule
  lexicon: LSJ
  rationale: κρατέω here denotes exercising dominance over something. 'Master' conveys
    strong control and suits the book's theme of reason governing the passions.
- source_word: οὐκ ἂν εἶπεν
  chosen: he would not have spoken
  alternatives:
  - he would not have said
  - he would not say
  lexicon: LSJ
  rationale: The particle ἄν with the aorist indicates a contrary-to-fact result.
    'Would not have spoken' preserves that force and keeps οὕτως linked to manner.
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: LSJ
  rationale: Refers back to the manner/content of the prior statement. 'In this way'
    is clear modern English and slightly more explicit than 'thus'.
