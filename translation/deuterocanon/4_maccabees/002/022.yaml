theological_decisions:
- issue: Anthropological terminology in 4 Maccabees (νοῦς as moral-rational faculty)
  chosen_reading: mind
  alternative_readings:
  - reason
  rationale: The book emphasizes rational mastery over passions. 'Mind' is readable
    modern English and can still bear the moral-rational sense in context; 'reason'
    remains a viable alternative but can sound more abstract or philosophical than
    the immediate imagery requires.
