translation:
  text: And at that time he also enthroned the holy ruling mind over all things through
    the senses;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy governing reason.' The Greek νοῦς can denote the rational faculty,
      not merely intellect in a narrow modern sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: τηνικαῦτα
  chosen: at that time
  alternatives:
  - then
  - thereupon
  lexicon: LSJ
  rationale: Temporal adverb marking sequence in the argument; 'at that time' preserves
    the formal sense while remaining natural English.
- source_word: περὶ πάντων
  chosen: over all things
  alternatives:
  - concerning all things
  - in every respect
  lexicon: LSJ
  rationale: With ἐνεθρόνισεν and the accusative phrase following, the sense is dominion/superintendence
    rather than merely 'concerning.' 'Over all things' best fits the enthronement
    imagery.
- source_word: τὸν ἱερὸν ἡγεμόνα νοῦν
  chosen: the holy ruling mind
  alternatives:
  - the sacred governing reason
  - the holy leader mind
  - the holy sovereign reason
  lexicon: LSJ
  rationale: νοῦς in 4 Maccabees is a key anthropological term for rational faculty;
    'mind' is more accessible than 'reason' while still accurate. ἡγεμών is adjectival/appositional,
    indicating governing or ruling status. ἱερόν is retained as 'holy' to preserve
    the cultic/moral register rather than flattening it to merely 'noble'.
- source_word: διὰ τῶν αἰσθητηρίων
  chosen: through the senses
  alternatives:
  - by means of the sense organs
  - through the faculties of perception
  lexicon: LSJ
  rationale: αἰσθητήρια denotes organs or faculties of perception. 'Through the senses'
    is concise, idiomatic, and captures the instrumental force of διά.
- source_word: ἐνεθρόνισεν
  chosen: enthroned
  alternatives:
  - seated on a throne
  - established as ruler
  - set in authority
  lexicon: LSJ
  rationale: The verb is vivid and metaphorical; 'enthroned' preserves the royal imagery
    and the force of installing mind in governing authority.
