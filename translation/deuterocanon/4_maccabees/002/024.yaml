theological_decisions:
- issue: Anthropological-philosophical sense of πάθη and λογισμός in 4 Maccabees
  chosen_reading: Render πάθη as 'passions' and λογισμός as 'reason'
  alternative_readings:
  - Render πάθη as 'emotions'
  - Render λογισμός as 'rational judgment'
  rationale: The verse belongs to 4 Maccabees' sustained argument that devout reason
    masters the passions. 'Passions' and 'reason' preserve that conceptual framework
    without importing later technical jargon beyond the text.
