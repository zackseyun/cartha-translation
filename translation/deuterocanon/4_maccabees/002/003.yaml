theological_decisions:
- issue: Rendering the ethical-philosophical term λόγισμος in a way that preserves
    4 Maccabees' theme
  chosen_reading: reason
  alternative_readings:
  - rational judgment
  - reasoning faculty
  rationale: The book argues for the supremacy of devout reason over the passions.
    'Reason' is the clearest main-text rendering in English and preserves that thematic
    emphasis without importing later technical philosophical distinctions.
