theological_decisions:
- issue: Ethical framing of reason's rule over family affection
  chosen_reading: The verse states that one can exercise mastery even over affection
    for a wife when moral law requires reproof.
  alternative_readings:
  - The verse could be read more weakly as merely 'restraining' affection rather than
    mastering it.
  rationale: The broader context in 4 Maccabees argues for reason's sovereignty over
    passions and attachments. The translation keeps that strong claim without importing
    later doctrinal categories.
