translation:
  text: and he masters affection for his wife, reproving her because of lawlessness;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prevails over love for his wife.' The Greek phrase refers to affectionate
      attachment within marriage, and the verb can mean 'prevails over' or 'has mastery
      over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικρατεῖ
  chosen: masters
  alternatives:
  - prevails over
  - controls
  - has mastery over
  lexicon: LSJ
  rationale: The verb denotes gaining the upper hand or exercising mastery. 'Masters'
    is concise and preserves the sense of rational control over passion in the argument
    of the passage.
- source_word: τῆς πρὸς γαμετὴν φιλίας
  chosen: affection for his wife
  alternatives:
  - love for his wife
  - attachment to his wife
  - marital affection
  lexicon: LSJ
  rationale: γαμετή means 'wife,' and φιλία here is affectionate attachment rather
    than erotic desire. 'Affection for his wife' fits the ethical context and avoids
    overstating the term as romantic love in a modern sense.
- source_word: διὰ παρανομίαν
  chosen: because of lawlessness
  alternatives:
  - on account of transgression
  - because of wrongdoing
  - for illegality
  lexicon: LSJ
  rationale: παρανομία is literally conduct contrary to law. 'Lawlessness' preserves
    the moral-legal force and matches the text's concern with reason judging behavior
    by moral norm.
- source_word: ἀπελέγχων
  chosen: reproving
  alternatives:
  - rebuking
  - exposing
  - correcting
  lexicon: LSJ
  rationale: The participle conveys censuring or exposing fault. 'Reproving' preserves
    the moral tone without implying only public exposure.
- source_word: αὐτήν
  chosen: her
  alternatives:
  - his wife
  lexicon: Greek grammar
  rationale: The pronoun refers back to γαμετήν. English can either retain 'her' or
    repeat 'his wife'; 'her' is more natural while remaining clear in context.
