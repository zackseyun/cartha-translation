id: 4MA.2.18
reference: 4 Maccabees 2:18
source:
  edition: lxx-swete-1909
  text: δυνατὸς γὰρ ὁ σώφρων νοῦς, ὡς ἔφην, κατὰ τῶν παθῶν ἀριστεῦσαι, καὶ τὰ μὲν
    αὐτῶν μεταθεῖναι, τὰ δὲ καὶ ἀκυρῶσαι.
  language: Greek
