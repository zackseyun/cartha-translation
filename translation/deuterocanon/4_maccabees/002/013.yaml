theological_decisions:
- issue: Philosophical-theological sense of λογισμός in 4 Maccabees
  chosen_reading: reason
  alternative_readings:
  - reasoning
  - rational judgment
  rationale: The book argues for the supremacy of devout reason over passions. Rendering
    λογισμός as 'reason' preserves that thematic claim without importing later technical
    philosophical jargon.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Force of διὰ τὸν νόμον
  chosen_reading: for the sake of the law
  alternative_readings:
  - because of the law
  rationale: This wording preserves the text's connection between rational mastery
    and commitment to the Mosaic law, without overstating a mechanistic causation.
    It reflects motive and allegiance rather than abstract instrumentality.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
