translation:
  text: And do not think it strange that reason can prevail even over hostility for
    the sake of the law,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not consider it paradoxical'—the Greek adjective can mean 'contrary
      to expectation' or 'surprising.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'where also reason is able to prevail over hostility because of
      the law.' The Greek construction is somewhat compressed; the translation renders
      the sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ νομίσητε
  chosen: do not think
  alternatives:
  - do not suppose
  - do not consider
  lexicon: BDAG
  rationale: νομίζω here introduces an evaluative judgment. 'Do not think' is natural
    modern English and preserves the prohibition without overformal wording.
- source_word: παράδοξον
  chosen: strange
  alternatives:
  - remarkable
  - unexpected
  - paradoxical
  lexicon: LSJ
  rationale: παράδοξος can mean contrary to expectation or surprising. 'Strange' best
    fits idiomatic English in the construction 'do not think it strange,' while 'paradoxical'
    would sound too technical.
- source_word: ὅπου
  chosen: that
  alternatives:
  - where
  - since
  lexicon: LSJ
  rationale: Although literally 'where,' in this context it introduces the content
    or circumstance explaining why the hearers should not be surprised. English idiom
    is better served by 'that' rather than a wooden 'where'.
- source_word: ἔχθραν
  chosen: hostility
  alternatives:
  - enmity
  - hatred
  lexicon: BDAG
  rationale: ἔχθρα denotes enmity or hostility. 'Hostility' is broad and readable,
    avoiding the narrower emotional sense of 'hatred' while remaining stronger than
    mere 'opposition.'
- source_word: ὁ λογισμός
  chosen: reason
  alternatives:
  - reasoning
  - rational judgment
  - the mind
  lexicon: LSJ
  rationale: In 4 Maccabees λογισμός is a key term for rational faculty or reasoned
    judgment. 'Reason' is the most concise and conceptually fitting rendering in this
    philosophical context.
- source_word: ἐπικρατεῖν δύναται
  chosen: can prevail even over
  alternatives:
  - is able to master
  - can overcome
  - can dominate
  lexicon: BDAG
  rationale: The infinitive with δύναται expresses ability; ἐπικρατέω conveys prevailing
    over or mastering. 'Can prevail even over' captures both the sense of superiority
    and the emphatic force in context.
- source_word: διὰ τὸν νόμον
  chosen: for the sake of the law
  alternatives:
  - because of the law
  - through the law
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses reason or purpose-like motivation.
    Here the sense is that reason gains mastery on account of devotion to the law.
    'For the sake of the law' communicates motive more clearly than the more ambiguous
    'because of the law.'
- source_word: νόμον
  chosen: the law
  alternatives:
  - Law
  lexicon: BDAG
  rationale: The reference is to the Jewish law/Torah, but this verse alone does not
    require capitalization to signal a title. 'The law' preserves the Greek form while
    remaining readable.
