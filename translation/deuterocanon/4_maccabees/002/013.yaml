id: 4MA.2.13
reference: 4 Maccabees 2:13
source:
  edition: lxx-swete-1909
  text: καὶ μὴ νομίσητε παράδοξον εἶναι, ὅπου καὶ ἔχθραν ὁ λογισμὸς ἐπικρατεῖν δύναται
    διὰ τὸν νόμον,
  language: Greek
