id: PS151.1.4
reference: Psalm 151 1:4
source:
  edition: lxx-swete-1909
  text: αὐτὸς ἐξαπέστειλεν τὸν ἄγγελον αὐτοῦ, καὶ ἦρέν με ἐκ τῶν προβάτων τοῦ πατρός
    μου, καὶ ἔχρισέν με ἐν τῷ ἐλαίῳ τῆς χρίσεως αὐτοῦ.
  language: Greek
  pages:
  - 432
  confidence: high
translation:
  text: He himself sent out his angel, and took me from my father's sheep, and anointed
    me with the oil of his anointing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his messenger.' The Greek word can mean either a human messenger or
      an angelic being.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  chosen: He himself
  alternatives:
  - He
  - He alone
  lexicon: LSJ
  rationale: The pronoun is emphatic in position and form, so the English preserves
    emphasis with 'himself' rather than a bare 'He'.
- source_word: ἐξαπέστειλεν
  chosen: sent out
  alternatives:
  - sent
  - dispatched
  lexicon: LSJ
  rationale: The compound verb adds force beyond simple 'sent'; 'sent out' preserves
    that nuance in natural English.
- source_word: τὸν ἄγγελον αὐτοῦ
  chosen: his angel
  alternatives:
  - his messenger
  lexicon: LSJ
  rationale: ἄγγελος can mean either 'messenger' or 'angel.' In this psalm's elevated,
    divine-deliverance context, 'angel' is the more likely sense and the traditional
    religious meaning of the term in such contexts.
- source_word: ἦρέν με
  chosen: took me
  alternatives:
  - lifted me
  - raised me
  lexicon: LSJ
  rationale: The verb literally means 'took up/lifted,' but here idiomatic English
    prefers 'took me' for God's selecting David from among the sheep. The alternatives
    are possible but sound less natural in context.
- source_word: ἐκ τῶν προβάτων τοῦ πατρός μου
  chosen: from my father's sheep
  alternatives:
  - from my father's flock
  - from among my father's sheep
  lexicon: LSJ
  rationale: πρόβατα are literally 'sheep.' 'From my father's sheep' stays close to
    the Greek while remaining clear; 'flock' is possible but less concrete.
- source_word: ἔχρισέν με
  chosen: anointed me
  lexicon: LSJ
  rationale: Standard rendering of χρίω; it is the natural English equivalent and
    preserves the royal/consecratory sense.
- source_word: ἐν τῷ ἐλαίῳ τῆς χρίσεως αὐτοῦ
  chosen: with the oil of his anointing
  alternatives:
  - with his anointing oil
  - in the oil of his anointing
  lexicon: LSJ
  rationale: The phrase is formally 'in/with the oil of his anointing.' English idiom
    favors 'with' here. 'Oil of his anointing' preserves the genitival structure and
    the explicit link to consecration.
