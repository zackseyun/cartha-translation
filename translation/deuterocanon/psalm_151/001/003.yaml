id: PS151.1.3
reference: Psalm 151 1:3
source:
  edition: lxx-swete-1909
  text: καὶ τίς ἀναγγελεῖ τῷ κυρίῳ μου; αὐτὸς Κύριος, αὐτὸς εἰσακούει.
  language: Greek
  pages:
  - 432
  confidence: high
translation:
  text: And who will report[a] to my Lord? The Lord himself[b], he himself hears.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And who will announce it to my Lord?' The verb can mean 'report,' 'announce,' or 'declare.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek repeats the pronoun for emphasis: ''The Lord himself, he himself hears.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'report to my Lord? The Lord himself[b][a]'.
    reason: previous_rendering
lexical_decisions:
- source_word: τίς
  chosen: who
  alternatives:
  - what person
  lexicon: BDAG
  rationale: Interrogative pronoun introducing a rhetorical question; simple 'who' is the natural English equivalent.
- source_word: ἀναγγελεῖ
  chosen: will report
  alternatives:
  - will announce
  - will declare
  - will tell
  lexicon: BDAG
  rationale: Future of ἀναγγέλλω, conveying making something known or reporting it. 'Report' fits the context of informing a superior and preserves the future rhetorical force.
- source_word: τῷ κυρίῳ μου
  chosen: to my Lord
  alternatives:
  - to my master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' Although 'master' is lexically possible, the doctrinal standard prefers 'Lord,' and the repeated use in the verse supports title-language.
- source_word: αὐτός
  chosen: himself
  alternatives:
  - he himself
  - he
  lexicon: BDAG
  rationale: The pronoun is emphatic. Rendering it with 'himself' preserves the emphasis; in English the second clause naturally expands this as 'The Lord himself, he himself hears.'
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Anarthrous in Greek here as a predicate/appositional title, but in English 'the Lord' reads naturally and aligns with the project's default rendering of κύριος.
- source_word: εἰσακούει
  chosen: hears
  alternatives:
  - listens to
  - heeds
  lexicon: BDAG
  rationale: εἰσακούω can mean hear/listen favorably. 'Hears' is the broadest and least interpretively loaded choice here, preserving the statement without over-specifying response.
