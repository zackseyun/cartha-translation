  confidence: high
translation:
  text: My brothers were handsome and tall, but the Lord did not take pleasure in them[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'was not pleased with them' or 'did not delight in them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'tall[a], but the Lord did not take pleasure in them.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - siblings
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural, and in context refers to David's male brothers. Per doctrine, gender-accurate rendering is preferred over neutralizing language.
- source_word: καλοί
  chosen: handsome
  alternatives:
  - good-looking
  - fine
  lexicon: LSJ
  rationale: In a description paired with physical stature (μεγάλοι), καλοί most naturally refers to attractive appearance rather than moral goodness.
- source_word: μεγάλοι
  chosen: tall
  alternatives:
  - great
  - big
  lexicon: LSJ
  rationale: Though literally 'great/big,' in this bodily-description context it points to impressive physical size or stature; 'tall' communicates the likely sense in natural English.
- source_word: οὐκ εὐδόκησεν
  chosen: did not take pleasure in
  alternatives:
  - was not pleased with
  - did not delight in
  lexicon: BDAG
  rationale: The verb εὐδοκέω commonly means to take pleasure in or be pleased with. This rendering preserves the evaluative sense without overinterpreting the reason for the Lord's rejection.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: The Greek source reads Κύριος. Following project doctrine for κύριος, it is translated 'Lord.' The article is natural in English here because the referent is the God of Israel.
