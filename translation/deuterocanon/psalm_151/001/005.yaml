theological_decisions:
- issue: Nature of the Lord's evaluation of David's brothers
  chosen_reading: The verse states that the Lord did not take pleasure in them, without specifying further grounds.
  alternative_readings:
  - The Lord did not choose them
  - The Lord was not favorable toward them
  rationale: εὐδόκησεν conveys divine approval or pleasure, but the text does not explicitly use a verb of choosing. The translation preserves the wording's theological restraint rather than importing the fuller wording of related passages such as 1 Samuel 16.
  doctrine_reference: Preserve theological tension rather than resolve it.
