theological_decisions:
- issue: Whether the verse implies genuine repentance or only forced acknowledgment
    under judgment
  chosen_reading: The wording is kept at the level of recognition/acknowledgment rather
    than repentance.
  alternative_readings:
  - to come to repentance
  - to come to full spiritual knowledge
  rationale: The Greek says εἰς ἐπίγνωσιν ἔρχεσθαι, which indicates coming to recognition
    or knowledge. The verse does not explicitly state repentance, so the translation
    preserves the narrower claim and avoids importing a stronger theological conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
