id: 2MA.9.25
reference: 2 Maccabees 9:25
source:
  edition: lxx-swete-1909
  text: πρὸς δὲ τούτοις κατανοῶν τοὺς παρακειμένους δυνάστας καὶ γειτνιῶντας τῆς βασιλείας
    τοῖς καιροῖς ἐπέχοντας καὶ προσδοκῶντας τὸ ἀποβησόμενον, ἀναδέδειχα τὸν υἱὸν Ἀντίοχον
    βασιλέα, ὃν πολλάκις ἀνατρέχων εἰς τὰς ἄνω σατραπίας τοῖς πλείστοις ὑμῶν παρεκατετίθεμην
    καὶ συνίστων· ἔγραψα δὲ πρὸς αὐτὸν τὰ ὑπογεγραμμένα.
