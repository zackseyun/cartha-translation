translation:
  text: Moreover, considering the rulers nearby and those bordering the kingdom, who
    are watching for opportunities and awaiting what will happen, I have appointed
    my son Antiochus as king, whom, when I repeatedly went up to the upper satrapies,
    I often entrusted and commended to most of you. And I have written to him the
    things written below.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the neighboring rulers and those adjacent to the kingdom.' The Greek
      piles up overlapping geopolitical descriptions to stress surrounding powers.
    reason: lexical_alternative
  - marker: b
    text: '''Upper satrapies'' uses the Persian administrative term found in the Greek;
      it may refer broadly to the inland/eastern provinces rather than merely ''provinces''
      in general.'
    reason: cultural_note
lexical_decisions:
- source_word: κατανοῶν
  chosen: considering
  alternatives:
  - observing
  - taking note of
  lexicon: LSJ
  rationale: The participle introduces Antiochus's rationale for his action. 'Considering'
    captures reflective assessment better than the more merely visual 'observing.'
- source_word: τοὺς παρακειμένους δυνάστας
  chosen: the rulers nearby
  alternatives:
  - the neighboring rulers
  - the adjacent powers
  lexicon: LSJ
  rationale: δυνάστας refers to political rulers/potentates rather than abstract 'powers.'
    παρακειμένους is spatial, so 'nearby' preserves the geopolitical sense.
- source_word: γειτνιῶντας τῆς βασιλείας
  chosen: those bordering the kingdom
  alternatives:
  - those neighboring the kingdom
  - those near the kingdom
  lexicon: LSJ
  rationale: The participle is best taken substantivally alongside τοὺς παρακειμένους
    δυνάστας, describing neighboring parties contiguous with the realm.
- source_word: τοῖς καιροῖς ἐπέχοντας
  chosen: who are watching for opportunities
  alternatives:
  - who are waiting for the right moment
  - who are intent on the times
  lexicon: LSJ
  rationale: καιρός often denotes an opportune moment, and ἐπέχω here conveys being
    attentive or poised toward such moments. The phrase suggests political opportunism,
    not mere chronology.
- source_word: προσδοκῶντας τὸ ἀποβησόμενον
  chosen: awaiting what will happen
  alternatives:
  - expecting the outcome
  - waiting to see what will result
  lexicon: LSJ
  rationale: This idiom points to expectation of the eventual outcome. 'Awaiting what
    will happen' is natural English and preserves the open-ended sense.
- source_word: ἀναδέδειχα
  chosen: I have appointed
  alternatives:
  - I have designated
  - I have proclaimed
  lexicon: LSJ
  rationale: In context of royal succession, the verb indicates formal designation
    to office. 'Appointed' communicates that more clearly than the more generic 'shown
    forth.'
- source_word: τὸν υἱὸν Ἀντίοχον βασιλέα
  chosen: my son Antiochus as king
  alternatives:
  - my son Antiochus king
  - Antiochus my son to be king
  lexicon: LSJ
  rationale: The accusative plus predicate accusative construction indicates appointment
    to kingship. 'As king' makes the syntax explicit in English.
- source_word: ἀνατρέχων εἰς τὰς ἄνω σατραπίας
  chosen: when I repeatedly went up to the upper satrapies
  alternatives:
  - when I repeatedly traveled to the upper provinces
  - when I kept going up to the inland satrapies
  lexicon: LSJ
  rationale: ἀνατρέχων has iterative force here ('repeatedly went up'). σατραπίας
    is specifically 'satrapies,' a Persian administrative term worth preserving rather
    than flattening to 'provinces.' 'Upper' reflects ἄνω literally.
- source_word: παρεκατετίθεμην
  chosen: I often entrusted
  alternatives:
  - I used to commend
  - I would place in the care of
  lexicon: LSJ
  rationale: The middle voice suggests committing someone to another's care. Because
    συνίστων follows, 'entrusted' differentiates this verb from the subsequent commendation.
- source_word: συνίστων
  chosen: commended
  alternatives:
  - recommended
  - presented
  lexicon: LSJ
  rationale: The verb here means to commend or recommend a person to others. 'Commended'
    fits the courtly-political context.
- source_word: τὰ ὑπογεγραμμένα
  chosen: the things written below
  alternatives:
  - the following things
  - what is written below
  lexicon: LSJ
  rationale: The phrase refers to the contents that follow in the letter. 'The things
    written below' preserves the documentary flavor of the Greek.
