theological_decisions:
- issue: Rendering δεσπότης in reference to God
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: The source uses δεσπότης rather than κύριος. To preserve lexical transparency
    and the specific nuance of absolute authority, 'Master' is preferred here, even
    though 'Lord' is common in English Bible tradition.
