translation:
  text: 'But the polluted man kept praying to the Master who would no longer have
    mercy on him, saying this:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the defiled man.' The Greek adjective carries a strong sense of moral
      or cultic pollution.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Master' (despotēs), not the more common 'Lord' (kyrios).
    reason: lexical_alternative
lexical_decisions:
- source_word: ηὔχετο
  chosen: kept praying
  alternatives:
  - prayed
  - was praying
  - begged
  lexicon: LSJ
  rationale: Imperfect middle indicates ongoing or repeated action; 'kept praying'
    captures the durative sense better than simple past.
- source_word: μιερὸς
  chosen: polluted man
  alternatives:
  - defiled man
  - accursed man
  - wretched man
  lexicon: LSJ
  rationale: The adjective denotes ritual/moral pollution or abomination. 'Polluted'
    preserves the strong negative and cultic-moral sense better than the more generic
    'wretched.' 'Man' is supplied naturally for English from the substantival use
    with the article.
- source_word: δεσπότην
  chosen: Master
  alternatives:
  - Lord
  - sovereign
  lexicon: LSJ
  rationale: Although κύριος defaults to 'Lord,' this verse uses δεσπότης, which emphasizes
    absolute ownership/authority. 'Master' best reflects that nuance without importing
    the covenantal associations of 'Lord'.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not anymore
  - never again
  lexicon: LSJ
  rationale: Standard temporal negation indicating that mercy is no longer forthcoming.
- source_word: ἐλεήσοντα
  chosen: would ... have mercy
  alternatives:
  - would pity
  - was going to show mercy to
  lexicon: LSJ
  rationale: Future active participle with object αὐτόν points to expected future
    action from the speaker's perspective; 'would no longer have mercy on him' is
    idiomatic and preserves the sense.
- source_word: οὕτως λέγων
  chosen: saying this
  alternatives:
  - speaking thus
  - saying as follows
  lexicon: LSJ
  rationale: A natural English introduction to the direct speech that follows in the
    next verse.
