translation:
  text: 'King Antiochus and general, to the good Jewish citizens: many greetings,
    and health, and prosperity.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek order places the sender''s name and titles after the greeting formula:
      ''to the good Jewish citizens ... King Antiochus and general.'' English fronting
      of the sender clarifies the letter style.'
    reason: cultural_note
  - marker: b
    text: Or 'well-being' for 'prosperity' (Greek εὖ πράττειν, 'to fare well').
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῖς χρηστοῖς
  chosen: to the good
  alternatives:
  - to the kind
  - to the worthy
  lexicon: LSJ
  rationale: χρηστός commonly denotes goodness, kindness, or worthiness. In this epistolary
    address modifying 'Jewish citizens,' 'good' is the most natural concise English
    equivalent and preserves the commendatory tone without overinterpreting.
- source_word: Ἰουδαίοις
  chosen: Jewish
  alternatives:
  - Judean
  lexicon: LSJ
  rationale: In 2 Maccabees this term ordinarily refers to the Jewish people rather
    than merely inhabitants of Judea. 'Jewish' best fits the ethnic-religious sense
    in this salutation.
- source_word: τοῖς πολίταις
  chosen: citizens
  alternatives:
  - fellow citizens
  - members of the state
  lexicon: LSJ
  rationale: πολίτης means citizen. Here it is part of the formal address to the recipients
    and is best rendered straightforwardly as 'citizens.'
- source_word: πολλὰ χαίρειν
  chosen: many greetings
  alternatives:
  - much greeting
  - greetings
  lexicon: LSJ
  rationale: This is a conventional epistolary formula. A wooden rendering like 'much
    greeting' is awkward in English; 'many greetings' preserves the plural intensification
    signaled by πολλά while remaining readable.
- source_word: ὑγιαίνειν
  chosen: health
  alternatives:
  - to be healthy
  - good health
  lexicon: LSJ
  rationale: In sequence with the infinitival greeting formula, the sense is a wish
    for health. Rendering as the noun 'health' fits idiomatic English letter style
    alongside 'greetings' and 'prosperity.'
- source_word: εὖ πράττειν
  chosen: prosperity
  alternatives:
  - well-being
  - to fare well
  lexicon: LSJ
  rationale: The phrase means to do or fare well. In an epistolary blessing, 'prosperity'
    is a compact idiomatic rendering, though 'well-being' is also possible.
- source_word: βασιλεὺς Ἀντίοχος καὶ στρατηγὸς
  chosen: King Antiochus and general
  alternatives:
  - King Antiochus, also general
  - Antiochus the king and general
  lexicon: LSJ
  rationale: The Greek places the sender's designation after the greeting formula.
    The phrase appears appositional and titular. 'King Antiochus and general' preserves
    both titles as given in the source without smoothing away the unusual construction.
