theological_decisions:
- issue: Political/cultural force of 'equal to the Athenians'
  chosen_reading: Retain the literal comparison without specifying citizenship or
    legal status in the main text.
  alternative_readings:
  - make them citizens equal to the Athenians
  - grant them rights equal to Athenians
  rationale: The Greek says 'make them equal to the Athenians' but does not explicitly
    spell out the exact civic mechanism. A more specific rendering would import historical
    interpretation into the text. The likely sense can be preserved in a footnote.
