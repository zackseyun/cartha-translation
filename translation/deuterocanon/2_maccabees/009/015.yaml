translation:
  text: But the Jews, whom he had determined not even to count worthy of burial, but
    to cast out with their infants for the birds to devour and for the wild beasts—he
    would make them all equal to the Athenians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'he would grant them status equal to the Athenians,'
      likely referring to civic privilege or legal standing rather than simple social
      esteem.
    reason: alternative_reading
lexical_decisions:
- source_word: διέγνωκε
  chosen: had determined
  alternatives:
  - had resolved
  - had decided
  lexicon: LSJ
  rationale: The pluperfect-like force in context points to a prior settled decision
    of Antiochus. 'Had determined' is natural English and preserves the sense of a
    fixed resolve.
- source_word: μηδὲ ταφῆς ἀξιῶσαι
  chosen: not even to count worthy of burial
  alternatives:
  - not even to deem worthy of burial
  - not even to grant burial
  lexicon: LSJ
  rationale: ἀξιόω here means to consider or treat as worthy. The infinitive phrase
    expresses denial of burial honors. 'Count worthy of burial' keeps the evaluative
    nuance better than the flatter 'grant burial.'
- source_word: οἰωνοβρώτους
  chosen: for the birds to devour
  alternatives:
  - bird-devoured
  - to be eaten by birds of prey
  lexicon: LSJ
  rationale: The adjective literally means 'eaten by birds/omens-birds,' idiomatically
    exposed for birds to consume. English requires expansion for clarity.
- source_word: σὺν τοῖς νηπίοις
  chosen: with their infants
  alternatives:
  - together with the children
  - with their little ones
  lexicon: LSJ
  rationale: νήπιοι are very young children; 'infants' best conveys the brutality
    of the statement and the age implied by the Greek.
- source_word: ἐκρίψαι
  chosen: to cast out
  alternatives:
  - to throw out
  - to expose
  lexicon: LSJ
  rationale: The verb conveys throwing out or casting away. 'Cast out' is idiomatic
    and fits the image of bodies denied burial and left exposed.
- source_word: θηρίοις
  chosen: for the wild beasts
  alternatives:
  - to wild animals
  - for beasts
  lexicon: LSJ
  rationale: 'Dative of advantage/purpose after the exposure image: the bodies are
    cast out for wild beasts to consume. ''Wild beasts'' preserves the harshness and
    literary tone.'
- source_word: πάντας αὐτοὺς ἴσους Ἀθηναίοις ποιήσειν
  chosen: he would make them all equal to the Athenians
  alternatives:
  - he would treat them all as equal to the Athenians
  - he would make all of them peers of the Athenians
  lexicon: LSJ
  rationale: The phrase states a promised elevation in civic status or treatment.
    'Make them all equal to the Athenians' is the most direct rendering, while leaving
    the precise political implications to context.
