theological_decisions:
- issue: Meaning of Antiochus's vow to be Ἰουδαῖος
  chosen_reading: He promises to adopt Jewish identity/allegiance ('become a Jew')
  alternative_readings:
  - He would merely show favor toward the Jews
  - He would live like a Jew without formal identity change
  rationale: The wording is stronger than simple friendliness; the text presents an
    extreme vow of self-humbling and alignment with the God he had opposed. The translation
    preserves that force without importing later technical notions of conversion.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source''s plain sense.'
