translation:
  text: For he had entered the so-called Persepolis and attempted to plunder the temple
    and take control of the city; therefore, when the crowds rushed forth, they turned
    to the defense of arms, and it happened that Antiochus, put to flight by the local
    inhabitants, made a shameful retreat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'attempted sacrilegious plunder of the temple.' The Greek verb ἱεροσυλεῖν
      specifically refers to robbing a sacred place.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to the help of weapons,' that is, they resorted to armed defense.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσεληλύθει
  chosen: had entered
  alternatives:
  - had gone into
  - had come into
  lexicon: LSJ
  rationale: Pluperfect of εἰσέρχομαι; 'had entered' fits the prior-action sense before
    the ensuing attempted plunder.
- source_word: τὴν λεγομένην Περσέπολιν
  chosen: the so-called Persepolis
  alternatives:
  - what is called Persepolis
  - the city called Persepolis
  lexicon: LSJ
  rationale: λεγομένην is explicitly present and should be represented; 'so-called'
    is concise and transparent, without implying doubt beyond the Greek wording.
- source_word: ἐπεχείρησεν
  chosen: attempted
  alternatives:
  - tried
  - undertook
  lexicon: LSJ
  rationale: The verb marks an attempted action rather than a completed one; 'attempted'
    preserves that nuance clearly.
- source_word: ἱεροσυλεῖν
  chosen: to rob the temple
  alternatives:
  - to plunder the temple
  - to commit sacrilege by despoiling the temple
  lexicon: LSJ
  rationale: The verb specifically denotes temple-robbery/sacrilegious plundering.
    'Rob the temple' is readable modern English and keeps the cultic object explicit.
- source_word: συνέχειν
  chosen: seize control of
  alternatives:
  - hold fast
  - occupy
  - take possession of
  lexicon: LSJ
  rationale: In this military-political context with τὴν πόλιν, the sense is to gain
    and hold control of the city, not merely 'contain' it.
- source_word: τῶν πληθῶν ὁρμησάντων
  chosen: when the crowds rushed
  alternatives:
  - when the masses charged
  - when the people surged
  lexicon: LSJ
  rationale: Genitive absolute describing the populace's sudden hostile movement.
    'Crowds rushed' is natural and preserves the force of ὁρμάω.
- source_word: ἐπὶ τὴν τῶν ὅπλων βοήθειαν
  chosen: to arms
  alternatives:
  - for the help of weapons
  - for armed defense
  lexicon: LSJ
  rationale: An idiomatic rendering is needed in English. The phrase denotes recourse
    to armed resistance; 'to arms' captures the sense compactly.
- source_word: ἐτράπησαν
  chosen: they turned him back
  alternatives:
  - they were turned back
  - they resorted
  lexicon: LSJ
  rationale: Given the flow into the next clause where Antiochus is routed, the sense
    is that the defenders turned the attackers back. This avoids an awkward passive
    in English while reflecting the military reversal.
- source_word: τροπωθέντα
  chosen: put to flight
  alternatives:
  - routed
  - turned back
  lexicon: LSJ
  rationale: A military participle indicating defeat/reversal. 'Put to flight' is
    vivid and fits the subsequent retreat.
- source_word: τῶν ἐγχωρίων
  chosen: by the local inhabitants
  alternatives:
  - by the natives
  - by the locals
  lexicon: LSJ
  rationale: Refers to the people of the place. 'Local inhabitants' is accurate and
    avoids potentially misleading modern connotations of 'natives.'
- source_word: αἰσχύμονα τὴν ἀναζυγὴν ποιήσασθαι
  chosen: made a shameful retreat
  alternatives:
  - made a disgraceful withdrawal
  - retreated in disgrace
  lexicon: LSJ
  rationale: The phrase denotes withdrawing/striking camp in a dishonorable way. 'Made
    a shameful retreat' is concise and preserves both the movement and the disgrace.
