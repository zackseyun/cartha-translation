translation:
  text: Now about that time Antiochus happened to be returning in disgrace from the
    regions around Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'returning disgracefully' or 'returning in an unseemly manner'; the Greek
      adverb can suggest either disorder or ignominy.
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ τὸν καιρὸν ἐκεῖνον
  chosen: Now about that time
  alternatives:
  - About that time
  - At that time
  lexicon: LSJ
  rationale: Περὶ with the accusative of time gives an approximate temporal sense,
    not a strict point in time. 'Now about that time' preserves the narrative transition
    marked by δέ while remaining natural English.
- source_word: ἐτύγχανεν
  chosen: happened to be
  alternatives:
  - was
  - chanced to be
  lexicon: LSJ
  rationale: The verb adds an incidental or circumstantial nuance rather than merely
    stating the fact. 'Happened to be' preserves that nuance better than a bare 'was.'
- source_word: ἀναλελυκὼς
  chosen: returning
  alternatives:
  - having withdrawn
  - having come back
  lexicon: LSJ
  rationale: In context the participle describes Antiochus coming back from the Persian
    region. 'Returning' gives the likely narrative sense in idiomatic English without
    over-literal awkwardness.
- source_word: ἀκόσμως
  chosen: in disorder
  alternatives:
  - disgracefully
  - without order
  - in an unseemly way
  lexicon: LSJ
  rationale: The adverb can denote conduct that is disorderly, improper, or unseemly.
    Here it likely characterizes the chaotic or ignominious nature of Antiochus's
    return. 'In disorder' preserves the ambiguity between military disarray and shameful
    conduct better than a more interpretive gloss like 'disgracefully.'
- source_word: ἐκ τῶν περὶ τὴν Περσίδα τόπων
  chosen: from the regions around Persia
  alternatives:
  - from the places around Persia
  - from the territory of Persia
  lexicon: LSJ
  rationale: 'The phrase is geographically broad: literally ''from the places around
    Persia.'' ''Regions around Persia'' is natural English and keeps the imprecise
    territorial sense of τόποι with περὶ.'
- source_word: Ἀντίοχος
  chosen: Antiochus
  rationale: Personal names are transliterated by project policy.
