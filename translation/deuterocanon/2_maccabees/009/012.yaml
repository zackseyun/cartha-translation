translation:
  text: 'As his pains intensified from moment to moment, and he was not even able
    to endure his own stench, he said this: “It is right to submit to God, and for
    one who is mortal not to think proudly.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “moment by moment” or “continually.”
    reason: lexical_alternative
  - marker: b
    text: Or “It is just” or “It is fitting” to submit to God.
    reason: lexical_alternative
  - marker: c
    text: Literally, “not, being mortal, to think proudly”; the sense is a general
      principle about human beings in their mortality.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ στιγμὴν
  chosen: from moment to moment
  alternatives:
  - moment by moment
  - continually
  lexicon: LSJ
  rationale: The phrase marks repeated progression over successive moments. 'From
    moment to moment' is idiomatic modern English that preserves the temporal force
    without sounding wooden.
- source_word: ἐπιτεινόμενος
  chosen: intensified
  alternatives:
  - increased
  - grew worse
  - was being aggravated
  lexicon: LSJ
  rationale: In context with ταῖς ἀλγηδόσιν, the participle describes the pains becoming
    more severe. Rendering the sense with 'intensified' communicates the ongoing worsening
    succinctly.
- source_word: ταῖς ἀλγηδόσιν
  chosen: his pains
  alternatives:
  - torments
  - sufferings
  - agonies
  lexicon: LSJ
  rationale: ἀλγηδών denotes pain or suffering. 'Pains' fits the bodily affliction
    context and avoids overstating the term beyond the immediate physical misery.
- source_word: μηδὲ τῆς ὀσμῆς αὐτοῦ ἀνέχεσθαι δυνάμενος
  chosen: he was not even able to endure his own stench
  alternatives:
  - he could not bear even his own smell
  - he was unable to tolerate even his own odor
  lexicon: LSJ
  rationale: ὀσμή is smell/odor; in this diseased context 'stench' best conveys the
    negative sense implied by the narrative. ἀνέχεσθαι δυνάμενος is naturally rendered
    as inability to endure or bear.
- source_word: ταῦτʼ ἔφη
  chosen: he said this
  alternatives:
  - he said these things
  - he declared this
  lexicon: LSJ
  rationale: A simple speech introduction is sufficient. 'He said this' is natural
    English and reflects the singular sense of the following quotation.
- source_word: Δίκαιον
  chosen: It is right
  alternatives:
  - It is just
  - It is fitting
  lexicon: LSJ
  rationale: The adjective is used impersonally here. 'It is right' preserves both
    moral and fittingness nuance in accessible English.
- source_word: ὑποτάσσεσθαι τῷ θεῷ
  chosen: to submit to God
  alternatives:
  - to subject oneself to God
  - to be subordinate to God
  lexicon: LSJ
  rationale: The middle/passive infinitive here expresses yielding oneself under God's
    authority. 'Submit to God' is idiomatic and preserves the theological force of
    humble subordination.
- source_word: μὴ θνητὸν ὄντα
  chosen: for one who is mortal not to
  alternatives:
  - being mortal, not to
  - since one is mortal, not to
  lexicon: LSJ
  rationale: The participial phrase gives the reason or condition tied to human mortality.
    'For one who is mortal not to' makes the generic force clear in natural English.
- source_word: ὑπερήφανα φρονεῖν
  chosen: to think proudly
  alternatives:
  - to be arrogant
  - to think haughtily
  - to have proud thoughts
  lexicon: LSJ
  rationale: The expression literally concerns proud-mindedness. 'Think proudly' keeps
    the cognitive wording of φρονεῖν while remaining readable; 'be arrogant' would
    be slightly more interpretive.
