theological_decisions:
- issue: Generic expression of human mortality in μὴ θνητὸν ὄντα
  chosen_reading: for one who is mortal not to think proudly
  alternative_readings:
  - and, being mortal, not to think proudly
  - and that a mortal should not think proudly
  rationale: The Greek uses a generic participial expression rather than a male-specific
    statement about a particular man. The rendering preserves the general moral principle
    while avoiding unnecessary narrowing. This aligns with the project's gender-accurate
    principle by reflecting the source's generic force.
