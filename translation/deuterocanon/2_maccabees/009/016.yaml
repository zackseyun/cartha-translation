theological_decisions:
- issue: Cultic terminology for temple gifts and vessels
  chosen_reading: Render with explicit temple/cult language ('holy temple,' 'offerings,'
    'sacred vessels,' 'sacrifices')
  alternative_readings:
  - Use more generalized language such as 'shrine,' 'gifts,' or 'religious items'
  rationale: The verse concerns Antiochus's vow regarding the Jerusalem temple and
    its sacrificial system. Explicit cultic language preserves the religious and historical
    specificity without importing later doctrinal claims.
