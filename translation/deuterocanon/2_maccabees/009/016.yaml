translation:
  text: And the holy temple, which he had formerly plundered, he would adorn with
    the finest offerings, and he would restore all the sacred vessels many times over,
    and from his own revenues he would provide the expenses required for the sacrifices;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the most splendid votive gifts.' The Greek term can refer specifically
      to dedicated offerings placed in a sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Literally 'he would give back all the sacred vessels many times over,' expressing
      repayment in multiplied measure, not mere replacement.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσκύλευεν
  chosen: had formerly plundered
  alternatives:
  - was plundering
  - despoiled
  - was robbing
  lexicon: LSJ
  rationale: The imperfect refers to his prior ongoing/characteristic action toward
    the temple; in English, 'had formerly plundered' captures the retrospective contrast
    with his present promise better than a simple progressive.
- source_word: ἅγιον ναὸν
  chosen: the holy temple
  alternatives:
  - the sacred temple
  - the sanctuary
  lexicon: LSJ
  rationale: ναός here refers to the temple sanctuary/temple as holy space in Jerusalem.
    'Holy temple' is natural English and preserves the cultic force of ἅγιον.
- source_word: καλλίστοις ἀναθήμασιν
  chosen: with the finest offerings
  alternatives:
  - with very beautiful votive gifts
  - with the most splendid dedicated offerings
  lexicon: LSJ
  rationale: ἀναθήματα are dedicated gifts placed in a sanctuary. 'Offerings' is concise
    and readable; 'finest' reflects the superlative καλλίστοις without overloading
    the line.
- source_word: κοσμήσειν
  chosen: he would adorn
  alternatives:
  - he would decorate
  - he would beautify
  lexicon: LSJ
  rationale: The infinitive expresses his promise to embellish the temple. 'Adorn'
    preserves the sense of ornamenting with dedicated gifts.
- source_word: τὰ ἱερὰ σκεύη
  chosen: the sacred vessels
  alternatives:
  - the holy vessels
  - the temple utensils
  lexicon: LSJ
  rationale: A standard cultic phrase for temple implements. 'Sacred vessels' is clear,
    dignified, and sufficiently specific.
- source_word: πολυπλάσια πάντα ἀποδώσειν
  chosen: he would restore all ... many times over
  alternatives:
  - he would repay all in multiple measure
  - he would return everything manyfold
  lexicon: LSJ
  rationale: πολυπλάσια conveys multiplication beyond simple replacement. Rendering
    it as 'many times over' preserves the emphatic promise of overcompensation.
- source_word: τὰς ... συντάξεις
  chosen: the expenses
  alternatives:
  - the payments
  - the provisions
  - the allocations
  lexicon: LSJ
  rationale: In this context συντάξεις refers to financial provisions or expenditures
    connected with sacrificial worship. 'Expenses' communicates the practical funding
    sense in idiomatic English.
- source_word: ἐπιβαλλούσας πρὸς τὰς θυσίας
  chosen: required for the sacrifices
  alternatives:
  - incurred for the sacrifices
  - pertaining to the sacrifices
  - falling due for the sacrifices
  lexicon: LSJ
  rationale: ἐπιβάλλω with financial language can denote what falls due or is imposed.
    'Required for' gives the sense of necessary sacrificial costs in smooth English.
- source_word: ἐκ τῶν ἰδίων προσόδων
  chosen: from his own revenues
  alternatives:
  - from his own income
  - from his own resources
  lexicon: LSJ
  rationale: πρόσοδοι are revenues/income, likely royal receipts. 'From his own revenues'
    preserves the fiscal nuance and the emphasis on personal/royal funding.
- source_word: χορηγήσειν
  chosen: he would provide
  alternatives:
  - he would supply
  - he would fund
  lexicon: LSJ
  rationale: χορηγέω often means to furnish at one's expense. 'Provide' is broad enough
    to fit the syntax while still implying financial support in context.
