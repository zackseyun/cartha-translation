translation:
  text: But while he was at Ecbatana, news came to him of what had happened to Nicanor
    and those with Timothy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at Ecbatana.' The Greek phrase κατʼ Ἐκβάτανα may denote location at
      or in the region of Ecbatana.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the things concerning Nicanor and those around Timothy that
      had happened.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄντι ... αὐτῷ
  chosen: while he was
  alternatives:
  - when he was
  - as he was
  lexicon: LSJ
  rationale: The genitive absolute with ὄντι is best rendered temporally in smooth
    English. 'While he was' preserves the circumstantial sense without over-literal
    awkwardness.
- source_word: κατʼ Ἐκβάτανα
  chosen: near Ecbatana
  alternatives:
  - at Ecbatana
  - toward Ecbatana
  - in the region of Ecbatana
  lexicon: LSJ
  rationale: κατά with a place name can indicate location in the vicinity or region.
    'Near Ecbatana' reflects the idiom better than a rigid 'at Ecbatana' while remaining
    concise.
- source_word: προσεπέσε
  chosen: news came to him
  alternatives:
  - it was reported to him
  - there came upon him
  - there befell him
  lexicon: LSJ
  rationale: Literally 'fell upon' or 'came upon,' but here the subject is the report
    of events. 'News came to him' captures the idiomatic force in natural English
    without losing the sudden arrival of information.
- source_word: τὰ ... γεγονότα
  chosen: what had happened
  alternatives:
  - the things that had happened
  - the events that had occurred
  lexicon: LSJ
  rationale: The articular neuter plural with γεγονότα refers to events that had taken
    place. 'What had happened' is idiomatic and faithful.
- source_word: τὰ κατὰ Νικάνορα
  chosen: to Nicanor
  alternatives:
  - concerning Nicanor
  - the events regarding Nicanor
  lexicon: LSJ
  rationale: The idiom τὰ κατά + accusative commonly means 'the matters concerning'
    someone. In context, English is clearer with 'what had happened to Nicanor,' making
    explicit that events involving him are in view.
- source_word: τοὺς περὶ Τιμόθεον
  chosen: those with Timothy
  alternatives:
  - Timothy and his men
  - the men around Timothy
  - Timothy's party
  lexicon: LSJ
  rationale: οἱ περὶ + personal name denotes the person and his associates or party.
    Because the Greek does not explicitly repeat Timothy as a separate object, 'those
    with Timothy' preserves the collective sense without over-specifying military
    structure.
