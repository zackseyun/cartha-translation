translation:
  text: so that, if anything unexpected should happen and some difficulty should arise,
    those in the country, knowing to whom the affairs have been entrusted, may not
    be thrown into confusion;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to whom matters have been left.' The Greek perfect passive can emphasize
      either simple leaving or formal entrusting of responsibility.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - so that this may happen
  lexicon: LSJ
  rationale: Introduces purpose. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: ἐάν τι παράδοξον ἀποβῇ
  chosen: if anything unexpected should happen
  alternatives:
  - if anything strange should occur
  - if any extraordinary thing should turn out
  lexicon: LSJ
  rationale: παράδοξον can mean strange, unexpected, extraordinary. In context of
    political instability and the king's possible death or worsening condition, 'unexpected'
    best conveys an unforeseen development without sounding sensational. ἀποβῇ is
    rendered idiomatically as 'should happen'.
- source_word: προσπέλθῃ τι δυσχερές
  chosen: some difficulty should arise
  alternatives:
  - something troublesome should come upon us
  - some hard thing should occur
  lexicon: LSJ
  rationale: δυσχερές denotes something difficult, troublesome, or distressing. 'Some
    difficulty should arise' is idiomatic and fits the parallel with the preceding
    contingency clause. προσπέλθῃ is rendered by the natural English event-verb 'arise'
    rather than a wooden 'come near'.
- source_word: εἰδότες
  chosen: knowing
  alternatives:
  - being aware
  - since they know
  lexicon: LSJ
  rationale: A circumstantial participle modifying 'those in the country.' 'Knowing'
    preserves the participial linkage and keeps the sentence compact.
- source_word: οἱ κατὰ τὴν χώραν
  chosen: those in the country
  alternatives:
  - those throughout the land
  - the people in the realm
  - those in the province
  lexicon: LSJ
  rationale: χώρα can mean land, country, or region. Here it refers broadly to the
    inhabitants within the territory, not merely one province. 'Those in the country'
    is straightforward and sufficiently broad.
- source_word: ᾧ καταλέλειπται τὰ πράγματα
  chosen: to whom the affairs have been entrusted
  alternatives:
  - to whom matters have been left
  - under whose charge the affairs have been left
  lexicon: LSJ
  rationale: The perfect passive καταλέλειπται indicates that responsibility has been
    left/entrusted to someone. τὰ πράγματα here means affairs, matters of state, or
    business. 'Have been entrusted' makes the implied delegation of authority explicit
    in good English while remaining faithful to the passive construction.
- source_word: μὴ ἐπιταράσσωνται
  chosen: may not be thrown into confusion
  alternatives:
  - may not be disturbed
  - may not be greatly troubled
  - may not be agitated
  lexicon: LSJ
  rationale: ἐπιταράσσω intensifies disturbance or agitation. In this political context,
    'thrown into confusion' captures both emotional disturbance and public disorder
    better than the weaker 'disturbed'.
