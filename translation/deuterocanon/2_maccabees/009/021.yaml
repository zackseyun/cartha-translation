id: 2MA.9.21
reference: 2 Maccabees 9:21
source:
  edition: lxx-swete-1909
  text: ὑμῶν τὴν τιμὴν καὶ τὴν εὔνοιαν ἐμνημόνευον φιλοστόργως· ἐπαναγαγὼν ἐκ τῶν
    κατὰ τὴν Περσίδα τόπων, καὶ περιπεσὼν ἀσθενείᾳ δυσχερίαν ἔχουσῃ, ἀναγκαῖον ἡγησάμην
    φροντίσαι τῆς κοινῆς πάντων ὑμῶν ἀσφαλείας·
