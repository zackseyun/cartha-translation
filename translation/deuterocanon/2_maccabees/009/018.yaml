theological_decisions:
- issue: Interpretation of Antiochus's suffering as divine action
  chosen_reading: Rendered ἐπεληλύθει γὰρ ἐπʼ αὐτὸν δικαία ἡ τοῦ θεοῦ κρίσις as an
    explicit statement that God's just judgment had come upon him.
  alternative_readings:
  - A more neutral rendering that leaves the causal force less explicit
  rationale: The Greek plainly attributes his condition to divine judgment. The translation
    preserves that theological assertion without softening it into mere circumstance.
