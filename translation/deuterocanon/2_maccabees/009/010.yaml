translation:
  text: And no one was able to carry the man who a little earlier had seemed to touch
    the stars of heaven, because of the unbearable burden of the stench.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'had thought he could touch the stars of heaven.' The Greek can suggest
      either apparent exaltation or presumptuous self-estimation.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν ... δοκοῦντα
  chosen: the man who ... had seemed
  alternatives:
  - him who ... seemed
  - the one who ... seemed
  lexicon: LSJ
  rationale: The articular participle functions substantivally, referring to Antiochus.
    Supplying 'the man' makes the English natural while preserving the personal reference.
- source_word: μικρῷ πρότερον
  chosen: a little earlier
  alternatives:
  - shortly before
  - just before
  lexicon: LSJ
  rationale: This idiom marks recent past time. 'A little earlier' is idiomatic and
    preserves the comparative nuance without sounding wooden.
- source_word: τῶν οὐρανίων ἄστρων
  chosen: the stars of heaven
  alternatives:
  - the heavenly stars
  - the stars in heaven
  lexicon: LSJ
  rationale: A straightforward genitival phrase. 'Stars of heaven' preserves the elevated
    tone and the cosmic imagery of the Greek.
- source_word: ἅπτεσθαι
  chosen: to touch
  alternatives:
  - to reach
  - to lay hold of
  lexicon: LSJ
  rationale: The verb literally means 'to touch' or 'take hold of.' In this hyperbolic
    context, 'touch' best preserves the image of arrogant exaltation.
- source_word: παρακομίζειν
  chosen: to carry
  alternatives:
  - to convey
  - to transport
  - to bear along
  lexicon: LSJ
  rationale: The verb denotes carrying or conveying from one place to another. 'Carry'
    is the clearest modern English choice in context.
- source_word: διὰ τὸ τῆς ὀσμῆς ἀφόρητον βάρος
  chosen: because of the unbearable burden of the stench
  alternatives:
  - because the stench was unbearable
  - because of the unbearable offensiveness of the smell
  lexicon: LSJ
  rationale: βάρος is literally 'weight' or 'burden,' used metaphorically here for
    the oppressive force of the odor. Retaining 'burden' preserves the vividness of
    the Greek better than flattening it to a simple adjective clause.
