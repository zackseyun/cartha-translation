theological_decisions:
- issue: Hyperbolic description of Antiochus's former arrogance
  chosen_reading: had seemed to touch the stars of heaven
  alternative_readings:
  - had thought he could touch the stars of heaven
  - had seemed able to reach the stars of heaven
  rationale: The Greek uses δοκοῦντα with infinitive, describing apparent or presumed
    exaltation. The chosen rendering preserves the hyperbolic irony without over-interpreting
    it as either mere self-opinion or actual ability.
  doctrine_reference: Preserve theological tension rather than resolve it.
