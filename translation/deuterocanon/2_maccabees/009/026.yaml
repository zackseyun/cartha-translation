  text: παρακαλῶ οὖν ὑμᾶς καὶ ἀξιῶ, μεμνημένους τῶν εὐεργεσιῶν κοινῇ καὶ κατʼ ἰδίαν,
    ἕκαστον συντηρεῖν τὴν οὖσαν εὔνοιαν εἰς ἐμὲ καὶ τὸν υἱόν.
