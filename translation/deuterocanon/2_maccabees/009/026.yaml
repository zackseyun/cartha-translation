translation:
  text: Therefore I urge you and ask you, remembering the benefits shown both publicly
    and privately, each of you to maintain the goodwill that now exists toward me
    and my son.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρακαλῶ
  chosen: I urge
  alternatives:
  - I exhort
  - I appeal
  - I entreat
  lexicon: BDAG
  rationale: παρακαλέω here introduces an earnest appeal in a royal letter. 'I urge'
    preserves the force without sounding overly archaic or overly weak.
- source_word: ἀξιῶ
  chosen: ask
  alternatives:
  - request
  - beg
  - demand
  lexicon: BDAG
  rationale: In combination with παρακαλῶ, ἀξιόω adds a second appeal verb. 'Ask'
    gives natural English alongside 'urge'; 'demand' would overstate the tone, while
    'request' is possible but slightly stiffer.
- source_word: μεμνημένους
  chosen: remembering
  alternatives:
  - being mindful of
  - having remembered
  lexicon: BDAG
  rationale: The participle gives the basis for the appeal. 'Remembering' is concise
    and natural, preserving the sense of keeping prior acts in mind.
- source_word: τῶν εὐεργεσιῶν
  chosen: the benefits shown
  alternatives:
  - the benefactions
  - the good deeds
  - the kindnesses
  lexicon: BDAG
  rationale: εὐεργεσία often refers to benefactions or acts of kindness, especially
    from a ruler. 'Benefits shown' communicates the concrete favors granted without
    overly technical political language.
- source_word: κοινῇ καὶ κατʼ ἰδίαν
  chosen: both publicly and privately
  alternatives:
  - in common and individually
  - collectively and personally
  lexicon: LSJ
  rationale: The pair contrasts public/common and private/individual spheres. 'Both
    publicly and privately' is idiomatic English and fits the context of benefits
    extended at both state and personal levels.
- source_word: ἕκαστον
  chosen: each of you
  alternatives:
  - each one
  - every one of you
  lexicon: BDAG
  rationale: The singular distributive sense is directed to the recipients collectively.
    'Each of you' makes that explicit in natural English.
- source_word: συντηρεῖν
  chosen: to maintain
  alternatives:
  - to preserve
  - to keep
  lexicon: BDAG
  rationale: συντηρέω here means to keep something in force or preserve it. 'Maintain'
    fits the object 'goodwill' well in contemporary English.
- source_word: τὴν οὖσαν εὔνοιαν
  chosen: the goodwill that now exists
  alternatives:
  - the present goodwill
  - the favor that exists
  lexicon: BDAG
  rationale: εὔνοια denotes goodwill or favor. The participial idea in οὖσαν is represented
    by 'that now exists,' making explicit the current state being urged to continue.
- source_word: εἰς ἐμὲ καὶ τὸν υἱόν
  chosen: toward me and my son
  alternatives:
  - for me and my son
  - toward me and toward my son
  lexicon: BDAG
  rationale: εἰς with εὔνοια expresses direction of attitude. 'Toward me and my son'
    is the most natural rendering of the relational sense.
