id: 2MA.9.29
reference: 2 Maccabees 9:29
source:
  edition: lxx-swete-1909
  text: παρεκομίζετο δὲ τὸ σῶμα Φιλίππος ὁ σύντροφος αὐτοῦ· ὡς καὶ εὐλαβηθεὶς τὸν
    υἱὸν Ἀντιόχου πρὸς Πτολεμαῖον τὸν Φιλομήτορα εἰς Αἴγυπτον διεκομίσθη. Χ
  language: Greek
  pages:
  - 712
  confidence: high
  validation: agree
translation:
  text: But Philip, his companion, was carrying the body; and, because he feared Antiochus’s
    son, he went over to Ptolemy Philometor in Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'was conveyed to Ptolemy Philometor in Egypt.' The Greek
      verb διεκομίσθη is passive in form and can be rendered more literally as a transfer
      or conveyance.
    reason: lexical_alternative
  - marker: b
    text: '''Companion'' may also suggest one reared with him, that is, a close court
      associate or foster-companion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκομίζετο
  chosen: was carrying
  alternatives:
  - was conveying
  - was transporting
  - was bringing along
  lexicon: LSJ
  rationale: Imperfect middle/passive of παρακομίζω indicates ongoing conveyance of
    the body. 'Was carrying' is natural English and preserves the durative sense without
    overformal stiffness.
- source_word: τὸ σῶμα
  chosen: the body
  alternatives:
  - his body
  - the corpse
  lexicon: LSJ
  rationale: The Greek has the definite noun 'the body' without an explicit possessive;
    context makes clear it is the dead king's body. 'The body' stays closest to the
    source, while 'corpse' would add a harsher nuance not required by the Greek.
- source_word: σύντροφος
  chosen: companion
  alternatives:
  - foster-brother
  - close associate
  - court companion
  lexicon: LSJ
  rationale: σύντροφος can denote one brought up with another, hence a close court
    associate or foster-companion. 'Companion' is broad enough to preserve the relationship
    without overstating a technical status the verse itself does not explain.
- source_word: εὐλαβηθεὶς
  chosen: because he feared
  alternatives:
  - being afraid of
  - out of caution toward
  - having become apprehensive of
  lexicon: LSJ
  rationale: The participle conveys fear/caution as the motive for Philip's action.
    'Because he feared' makes the causal force clear in idiomatic English.
- source_word: τὸν υἱὸν Ἀντιόχου
  chosen: Antiochus’s son
  alternatives:
  - the son of Antiochus
  - Antiochus' heir
  lexicon: LSJ
  rationale: The Greek phrase is literally 'the son of Antiochus.' In English, 'Antiochus’s
    son' is smoother while preserving the familial reference. 'Heir' would interpret
    beyond the wording.
- source_word: πρὸς Πτολεμαῖον τὸν Φιλομήτορα
  chosen: to Ptolemy Philometor
  alternatives:
  - toward Ptolemy Philometor
  - with Ptolemy Philometor
  lexicon: LSJ
  rationale: πρός with motion here indicates movement toward/into the sphere of Ptolemy
    Philometor. 'To Ptolemy Philometor' is the most natural rendering in context.
- source_word: διεκομίσθη
  chosen: he went over
  alternatives:
  - he was conveyed
  - he departed
  - he transferred himself
  lexicon: LSJ
  rationale: Although the verb is formally passive, in this context it denotes Philip's
    relocation/transfer to Egypt. 'He went over' captures the political movement implied
    by the context better than a wooden passive.
