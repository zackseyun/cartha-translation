theological_decisions:
- issue: Moral-retributive framing of Antiochus's death
  chosen_reading: 'The verse is rendered to preserve the explicit retribution: he
    suffered as he had treated others.'
  alternative_readings:
  - A looser rendering that merely reports his death without highlighting reciprocal
    justice
  rationale: The clause ὡς ἑτέρους διέθηκεν is central to the verse's theology of
    fitting judgment and should remain explicit in English.
