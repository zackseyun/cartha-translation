translation:
  text: So then the murderer and blasphemer, after suffering the worst things, just
    as he had treated others, came to an utterly miserable end in a foreign land among
    the mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek line in the provided witness ends with a line-break at κατέ-,
      but the sense clearly continues with his coming to an end or dying; the translation
      reflects that continuation.
    reason: textual_variant
lexical_decisions:
- source_word: ἀνδροφόνος
  chosen: murderer
  alternatives:
  - manslayer
  - killer of men
  lexicon: LSJ
  rationale: The compound denotes one who kills human beings. 'Murderer' is the most
    natural modern English rendering and fits the moral condemnation of the context
    better than the more wooden 'manslayer.'
- source_word: βλάσφημος
  chosen: blasphemer
  alternatives:
  - slanderer
  - profane man
  lexicon: LSJ
  rationale: In this context Antiochus is portrayed as speaking impiously against
    God, so 'blasphemer' best captures the religious force rather than the broader
    'slanderer.'
- source_word: τὰ χείριστα παθών
  chosen: after suffering the worst things
  alternatives:
  - having suffered the worst things
  - after suffering terrible things
  lexicon: LSJ
  rationale: The participial phrase is retained with a natural English temporal sense.
    'The worst things' reflects the superlative χείριστα without over-specifying the
    exact sufferings.
- source_word: ὡς ἑτέρους διέθηκεν
  chosen: just as he had treated others
  alternatives:
  - as he had dealt with others
  - as he had disposed of others
  lexicon: LSJ
  rationale: The verb here conveys how he handled or treated others, especially in
    causing them suffering. 'Treated' is idiomatic and preserves the retributive comparison
    without forcing an overly technical gloss.
- source_word: ἐπὶ ξένης
  chosen: in a foreign land
  alternatives:
  - on foreign soil
  - in a strange land
  lexicon: LSJ
  rationale: The phrase indicates death away from home. 'In a foreign land' is clear
    modern English and preserves the pathos of dying abroad.
- source_word: ἐν τοῖς ὄρεσιν
  chosen: among the mountains
  alternatives:
  - in the mountains
  - on the mountains
  lexicon: LSJ
  rationale: The dative plural with ἐν locates the event in mountainous terrain. 'Among
    the mountains' sounds natural and keeps the geographic sense.
- source_word: οἰκτίστῳ μόρῳ
  chosen: an utterly miserable end
  alternatives:
  - a most pitiable fate
  - a wretched death
  lexicon: LSJ
  rationale: μόρος can mean fate or doom, often with the sense of death; οἰκτίστῳ
    intensifies the pitiable character. 'Utterly miserable end' communicates both
    the extremity and the outcome in readable English.
- source_word: κατέ-
  chosen: came to an ... end
  alternatives:
  - died
  - met his end
  lexicon: LSJ
  rationale: The Swete line is broken at κατέ-, but the context and standard completion
    indicate the sense of coming to an end/dying. 'Came to an ... end' honestly reflects
    the visible text plus the clear contextual continuation without pretending the
    line break is not present.
