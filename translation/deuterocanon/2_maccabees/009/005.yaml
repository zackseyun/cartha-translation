theological_decisions:
- issue: Divine agency in Antiochus's affliction
  chosen_reading: The verse is rendered with God as the direct subject who struck
    him.
  alternative_readings:
  - A more softened English could say God 'allowed' him to be afflicted.
  rationale: The Greek explicitly names 'the all-seeing Lord, the God of Israel' as
    the one who struck him. The translation preserves that direct attribution and
    does not dilute the text's theology of divine judgment.
  doctrine_reference: Translation philosophy §§1, 3
