translation:
  text: But the all-seeing Lord, the God of Israel, struck him with an incurable and
    unseen blow; and just as he finished speaking, an incurable pain in his bowels
    seized him, and bitter torments in his inner parts,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with an incurable and invisible plague/stroke.' Greek πληγή can denote
      a blow, stroke, or plague-like affliction.
    reason: lexical_alternative
  - marker: b
    text: Literally 'an unhealable pain of the entrails, and bitter torments of the
      inner parts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παντεπόπτης
  chosen: all-seeing
  alternatives:
  - all-observing
  - who sees all
  lexicon: LSJ
  rationale: The compound denotes one who sees everything. 'All-seeing' is concise,
    natural English and preserves the force of divine omniscience better than a flatter
    paraphrase.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is rendered 'Lord.' Here it functions as
    a divine title in apposition with 'the God of Israel.'
- source_word: ἐπάταξεν
  chosen: struck
  alternatives:
  - smote
  - afflicted
  - struck down
  lexicon: LSJ
  rationale: Aorist of πατάσσω commonly means 'strike.' 'Struck' is direct and idiomatic
    modern English without archaic coloring.
- source_word: ἀνιάτῳ
  chosen: incurable
  alternatives:
  - beyond healing
  - unhealable
  lexicon: LSJ
  rationale: The adjective means not curable or not to be healed. 'Incurable' is the
    most natural concise equivalent.
- source_word: ἀοράτῳ
  chosen: unseen
  alternatives:
  - invisible
  lexicon: LSJ
  rationale: The sense is that the plague/blow was not visible to the eye. 'Unseen'
    reads more naturally with 'blow' than 'invisible,' while preserving the idea.
- source_word: πληγῇ
  chosen: blow
  alternatives:
  - plague
  - stroke
  - affliction
  lexicon: LSJ
  rationale: πληγή can mean a blow or a plague. In this immediate collocation with
    'struck him' and followed by specific bodily agony, 'blow' preserves the metaphor
    of divine striking while allowing the resulting illness to unfold in the next
    clause.
- source_word: ἄρτι
  chosen: just as
  alternatives:
  - immediately
  - at that moment
  lexicon: LSJ
  rationale: In context it marks the immediate timing of the judgment as his speech
    ended. 'Just as' captures the temporal connection smoothly in English.
- source_word: καταλήξαντος τὸν λόγον
  chosen: he finished speaking
  alternatives:
  - he ended his speech
  - he concluded his words
  lexicon: LSJ
  rationale: The genitive absolute indicates that he had just brought his speech to
    an end. 'Finished speaking' is idiomatic and faithful.
- source_word: ἔλαβεν αὐτὸν
  chosen: seized him
  alternatives:
  - took hold of him
  - came upon him
  lexicon: LSJ
  rationale: The idiom here describes pain suddenly overtaking him. 'Seized him' conveys
    abrupt onset vividly and naturally.
- source_word: ἀνήκεστος
  chosen: unrelenting
  alternatives:
  - incurable
  - unhealable
  - past remedy
  lexicon: LSJ
  rationale: Though cognate in sense with 'incurable,' repeating 'incurable' in English
    would sound wooden. Here the adjective modifies pain, so 'unrelenting' best conveys
    severe pain that admits no relief, while documenting the contextual variation.
- source_word: τῶν σπλάγχνων ἀλγηδών
  chosen: pain in his bowels
  alternatives:
  - pain in his entrails
  - visceral pain
  lexicon: LSJ
  rationale: σπλάγχνα refers to inward organs/entrails; ἀλγηδών is pain. 'Pain in
    his bowels' is concrete and reflects the bodily focus of the Greek better than
    an abstract rendering.
- source_word: πικραὶ τῶν ἔνδον βάσανοι
  chosen: bitter torments in his inner parts
  alternatives:
  - bitter inward torments
  - cruel torments within
  lexicon: LSJ
  rationale: πικραί is literally 'bitter'; βάσανοι are torments; τῶν ἔνδον points
    to what is inside. The chosen rendering preserves the visceral, internal emphasis
    and the harshness of the suffering.
