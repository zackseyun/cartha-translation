theological_decisions:
- issue: Rendering ἀνθρώπων in a generic sense
  chosen_reading: men
  alternative_readings:
  - people
  - humanity
  rationale: The Greek is grammatically masculine plural with representative force.
    In line with the project's gender-accurate policy, 'men' is retained rather than
    flattened to a neutral collective, since the phrase emphasizes Antiochus's arrogant
    self-exaltation above human beings generally.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Handling the anomalous repeated πίστιν in the source text
  chosen_reading: Translate the evident sense as 'the power of God' in the main text
    and preserve the irregularity as a textual footnote
  alternative_readings:
  - include 'faith' in the main text despite the awkward Greek
  - translate 'faithfulness' as part of the clause
  rationale: The source text as given reads τὴν πίστιν τὴν πίστιν τὴν δύναμιν, which
    is likely corrupt or affected by repetition. Since the sentence's clear rhetorical
    point is the public display of divine power in Antiochus's humiliation, the main
    text renders that sense while documenting the textual problem in a footnote. This
    also avoids importing a theological claim about 'faith' or 'faithfulness' where
    the Greek form is unstable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
