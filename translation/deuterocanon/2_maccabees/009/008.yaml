translation:
  text: But the one who had thought, in his arrogance over men, to command even the
    waves of the sea, and imagined that he could weigh out the heights of the mountains
    on a scale, was now brought down to the ground and carried in a litter, showing
    plainly to all the power of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek text here has an irregular repetition: ''the faith, the faith,
      the power.'' This is likely a textual corruption or scribal repetition; the
      translation follows the clause''s clear sense, ''the power of God.'''
    reason: textual_variant
  - marker: b
    text: Or 'because of his pride over humanity.' The Greek literally says 'over
      men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντιδοκῶν
  chosen: had thought
  alternatives:
  - supposed
  - imagined
  - presumed
  lexicon: LSJ
  rationale: The participle introduces Antiochus's prior self-estimation. 'Had thought'
    is idiomatic in English and fits the ironic contrast with his present humiliation.
    More literal options like 'supposed' or 'presumed' are possible, but 'had thought'
    reads naturally while preserving the sense of arrogant assumption.
- source_word: τοῖς τῆς θαλάσσης κύμασιν
  chosen: the waves of the sea
  alternatives:
  - the sea's waves
  lexicon: LSJ
  rationale: A straightforward genitival phrase. 'The waves of the sea' preserves
    the elevated style without becoming unnatural.
- source_word: διὰ τὴν ὑπὲρ ἀνθρώπων ὑπερηφανίαν
  chosen: in his arrogance over men
  alternatives:
  - because of his pride over men
  - through his arrogance toward men
  lexicon: LSJ
  rationale: 'The phrase explains the basis of his delusion. ''Over men'' preserves
    the comparative/superior sense of ὑπὲρ here: he exalted himself above human beings.
    ''Men'' is retained as gender-accurate and representative for humanity in keeping
    with project philosophy.'
- source_word: πλάστιγγι
  chosen: on a scale
  alternatives:
  - with a balance
  - in a balance
  lexicon: LSJ
  rationale: πλάστιγξ refers to the pan or scale of a balance. 'On a scale' is clear
    modern English and preserves the image of measuring or weighing mountains.
- source_word: τῶν ὀρέων ... ὕψη
  chosen: the heights of the mountains
  alternatives:
  - mountain heights
  - the mountain peaks
  lexicon: LSJ
  rationale: This keeps both nouns represented and preserves the hyperbolic image
    of measuring mountainous heights.
- source_word: στήσειν
  chosen: weigh out
  alternatives:
  - set up
  - measure
  - determine
  lexicon: LSJ
  rationale: In context with πλάστιγγι and ὕψη, the sense is not simply 'set' but
    to fix or determine by weighing/measuring. 'Weigh out' best captures the absurd
    boast in idiomatic English.
- source_word: κατὰ γῆν γενόμενος
  chosen: was now brought down to the ground
  alternatives:
  - having become earthbound
  - being on the ground
  - having been brought low to the ground
  lexicon: LSJ
  rationale: The phrase marks his reversal from lofty pretension to abject lowliness.
    A too-literal rendering ('having become on the ground') is awkward; 'brought down
    to the ground' communicates both physical and rhetorical descent.
- source_word: ἐν φορίᾳ παρεκομίζετο
  chosen: carried in a litter
  alternatives:
  - carried on a stretcher
  - transported in a sedan
  lexicon: LSJ
  rationale: φορία denotes a conveyance for carrying an infirm person. 'Litter' is
    concise and suitably dignified for the historical setting; 'stretcher' sounds
    too clinical and 'sedan' too specific.
- source_word: φανερὰν ... πᾶσιν
  chosen: showing plainly to all
  alternatives:
  - making clear to everyone
  - displaying openly to all
  lexicon: LSJ
  rationale: This participial clause states the public effect of his condition. 'Showing
    plainly to all' is natural and preserves the adverbial force of φανεράν with πᾶσιν.
- source_word: τοῦ θεοῦ ... δύναμιν
  chosen: the power of God
  alternatives:
  - God's power
  lexicon: LSJ
  rationale: A simple genitive construction. 'The power of God' keeps the formal tone
    of the narrative.
- source_word: τὴν πίστιν τὴν πίστιν τὴν δύναμιν
  chosen: the power
  alternatives:
  - the faithfulness and the power
  - the sure power
  lexicon: LSJ
  rationale: Swete's text appears to contain a dittography of τὴν πίστιν, yielding
    an awkward sequence before δύναμιν. The clause is best rendered by the clear sense
    of the sentence, focusing on God's manifested power. Because πίστις is repeated
    anomalously and does not fit smoothly, the probable textual irregularity is preserved
    in a footnote rather than forced into the main text.
