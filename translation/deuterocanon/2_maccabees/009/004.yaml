translation:
  text: But in his rage he thought to vent on the Jews the malice of those who had
    put him to flight. Therefore he ordered the charioteer, driving without stopping,
    to press on with the journey, while the judgment from heaven was accompanying
    him. For in his arrogance he had said, “When I arrive there, I will make Jerusalem
    a burial place of Jews.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a mass grave of Jews.” The Greek Πολυάνδριον denotes a burial place
      for many dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαρθεὶς ... τῷ θυμῷ
  chosen: in his rage
  alternatives:
  - being lifted up in anger
  - inflamed with wrath
  lexicon: LSJ
  rationale: The participle with θυμός conveys being carried away or swollen with
    anger. 'In his rage' is idiomatic modern English that preserves the emotional
    force without awkward literalism.
- source_word: ᾤετο
  chosen: he thought
  alternatives:
  - he supposed
  - he imagined
  lexicon: LSJ
  rationale: A straightforward rendering that fits the syntax and keeps the statement
    tied to Antiochus's intention rather than certainty.
- source_word: τῶν πεφυγαδευκότων αὐτὸν κακίαν
  chosen: the malice of those who had put him to flight
  alternatives:
  - the spite of those who had driven him away
  - the wickedness of those who had routed him
  lexicon: LSJ
  rationale: πεφυγαδευκότων means causing someone to flee or driving into exile/flight.
    κακία here is best taken as hostile malice or spite. The phrase refers to the
    injury done to him by others, which he intends to redirect toward the Jews.
- source_word: ἐναπερείσασθαι
  chosen: to vent on
  alternatives:
  - to inflict on
  - to thrust upon
  lexicon: LSJ
  rationale: The verb suggests laying or pressing something upon someone. In context,
    'to vent on' captures the transfer of resentment onto the Jews in natural English.
- source_word: συνέταξεν τὸν ἁρματηλάτην
  chosen: he ordered the charioteer
  alternatives:
  - he commanded the driver
  lexicon: LSJ
  rationale: ἁρματηλάτης is specifically a chariot-driver. 'Charioteer' is precise
    and readable.
- source_word: ἀδιαλείπτως ἐλαύνοντα
  chosen: driving without stopping
  alternatives:
  - driving continually
  - urging on incessantly
  lexicon: LSJ
  rationale: ἀδιαλείπτως means unceasingly; with ἐλαύνω it describes continuous driving.
    'Without stopping' gives the sense clearly in contemporary English.
- source_word: καταλύειν τὴν πορείαν
  chosen: to press on with the journey
  alternatives:
  - to complete the journey
  - to bring the march to its stopping place
  lexicon: LSJ
  rationale: Literally the phrase can suggest bringing the journey to its end or stopping-place.
    In context Antiochus orders rapid travel toward his destination, so 'to press
    on with the journey' communicates the practical force without implying a leisurely
    halt.
- source_word: τῆς ἐξ οὐρανοῦ τῆς κρίσεως συνοδούσης αὐτῷ
  chosen: while the judgment from heaven was accompanying him
  alternatives:
  - as the sentence from heaven went with him
  - with the heavenly judgment attending him
  lexicon: LSJ
  rationale: The genitive absolute marks simultaneous action. κρίσις here is judicial
    judgment, and ἐξ οὐρανοῦ identifies its divine source. 'Accompanying him' preserves
    συνοδούσης.
- source_word: ὑπερηφάνως
  chosen: in his arrogance
  alternatives:
  - proudly
  - insolently
  lexicon: LSJ
  rationale: The adverb denotes haughty pride. 'In his arrogance' reads naturally
    and matches the moral tone of the narrative.
- source_word: Πολυάνδριον
  chosen: a burial place
  alternatives:
  - a mass grave
  - a cemetery
  lexicon: LSJ
  rationale: The noun denotes a place for many dead bodies, often a common tomb or
    burial place. 'Burial place' is broad enough to preserve the threat without over-specifying;
    'mass grave' is possible but somewhat interpretive.
