theological_decisions:
- issue: Divine agency in Antiochus's punishment
  chosen_reading: the judgment from heaven was accompanying him
  alternative_readings:
  - the punishment from heaven was following him
  rationale: κρίσις is rendered 'judgment' to preserve the judicial and theological
    sense of divine retribution without narrowing it to mere suffering. The text explicitly
    attributes the event to heaven, and the translation keeps that claim intact.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
