translation:
  text: And seeing that my father, whenever he campaigned in the upper regions, appointed
    the one who would succeed him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went on campaign in the upper regions'; the Greek verb can more literally
      mean 'encamped,' but the broader military sense best fits the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρῶν
  chosen: seeing
  alternatives:
  - considering
  - observing
  lexicon: LSJ
  rationale: A participle introducing Antiochus's rationale. 'Seeing' fits idiomatic
    English while preserving the causal sense ('in view of the fact that').
- source_word: πατήρ
  chosen: father
  alternatives:
  - ancestor
  lexicon: LSJ
  rationale: The immediate referent is the speaker's literal father, so the ordinary
    familial term is best.
- source_word: καθʼ οὓς καιρούς
  chosen: whenever
  alternatives:
  - at the times when
  - during the times when
  lexicon: LSJ
  rationale: The phrase is distributive/iterative, referring to occasions on which
    the father went on campaign. 'Whenever' is concise and natural.
- source_word: εἰς τοὺς ἄνω τόπους
  chosen: in the upper regions
  alternatives:
  - to the upper regions
  - to the inland regions
  - to the upland places
  lexicon: LSJ
  rationale: ἄνω literally means 'upper/upward.' In this historical context it likely
    refers to higher or inland territories away from the coast. 'Upper regions' preserves
    the spatial wording without over-specifying geography.
- source_word: ἐστρατοπέδευσεν
  chosen: campaigned
  alternatives:
  - encamped
  - went on campaign
  lexicon: LSJ
  rationale: Though the verb can mean 'encamp,' in context of royal military movement
    it carries the broader sense of conducting a campaign. 'Campaigned' gives the
    likely force in readable English.
- source_word: ἀνέδειξεν
  chosen: appointed
  alternatives:
  - designated
  - showed forth
  - proclaimed
  lexicon: LSJ
  rationale: In context the father formally named a successor. 'Appointed' communicates
    that official designation clearly.
- source_word: τὸν διαδεξάμενον
  chosen: the one who would succeed him
  alternatives:
  - his successor
  - the one who took over after him
  lexicon: LSJ
  rationale: The participle denotes the person who would receive succession. The fuller
    phrase preserves the verbal idea of succession and avoids ambiguity about the
    object of succession.
