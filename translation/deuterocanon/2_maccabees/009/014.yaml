translation:
  text: As for the holy city, which he had been hurrying to level to the ground and
    to make a mass grave, he will declare it free.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a common grave' or 'a burial place for many.' The Greek term denotes
      a grave for many dead; 'mass grave' is chosen for clarity and force.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁγίαν πόλιν
  chosen: the holy city
  alternatives:
  - the sacred city
  lexicon: LSJ
  rationale: ἅγιος commonly means 'holy' or 'sacred'; 'holy city' is the more natural
    and biblically resonant English expression here for Jerusalem.
- source_word: σπεύδων
  chosen: had been hurrying
  alternatives:
  - was hastening
  - was eager
  lexicon: LSJ
  rationale: The participle conveys active haste or urgency. 'Had been hurrying' fits
    the retrospective sense in context, referring to his earlier intent.
- source_word: παρεγίνετο
  chosen: he had been ... to
  alternatives:
  - he was coming
  - he arrived intending to
  lexicon: LSJ
  rationale: In this construction the verb contributes the idea of his coming/approaching
    with purpose. English idiom is smoother if the motion is absorbed into the larger
    clause rather than rendered woodenly.
- source_word: ἰσόπεδον ποιῆσαι
  chosen: to make level with the ground
  alternatives:
  - to raze flat
  - to make a level plain
  lexicon: LSJ
  rationale: The phrase means to flatten or level completely. 'Make level with the
    ground' preserves the destructive force without sounding colloquial.
- source_word: πολυάνδριον
  chosen: a mass grave
  alternatives:
  - a common grave
  - a burial mound for many
  lexicon: LSJ
  rationale: πολυάνδριον denotes a grave or tomb for many dead, often after slaughter.
    'Mass grave' best communicates the grim sense in clear modern English.
- source_word: οἰκοδομῆσαι
  chosen: to build into
  alternatives:
  - to make into by building
  - to construct as
  lexicon: LSJ
  rationale: Literally 'to build'; in context it expresses turning the city into something
    by construction or conversion. 'Build into' keeps the verbal force while fitting
    English usage.
- source_word: ἐλευθέραν ἀναδείξει
  chosen: he will declare it free
  alternatives:
  - he will proclaim it free
  - he will establish it as free
  lexicon: LSJ
  rationale: ἀναδείκνυμι can mean to show, appoint, or declare. Here the sense is
    a public designation of status. 'Declare it free' is concise and natural, while
    preserving the future promise.
