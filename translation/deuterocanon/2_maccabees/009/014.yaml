theological_decisions:
- issue: Nature of Antiochus's promise regarding Jerusalem's status
  chosen_reading: he will declare it free
  alternative_readings:
  - he will make it free
  - he will proclaim it autonomous
  rationale: The Greek emphasizes a future public act concerning the city's status,
    not necessarily a detailed constitutional term. 'Declare it free' preserves the
    wording without importing later political precision.
