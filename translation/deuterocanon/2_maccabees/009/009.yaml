  text: ὥστε καὶ ἐκ τοῦ σώματος τοῦ δυσσεβοῦς σκώληκας ἀναζεῖν, καὶ ζῶντος ἐν ὀδύναις
    καὶ ἀλγηδόσιν τὰς σάρκας αὐτοῦ διαπίπτειν, ὑπὸ δὲ τῆς ὀσμῆς αὐτοῦ πᾶν τὸ στρατόπεδον
    βαρύνεσθαι τὴν σαπρίαν.
