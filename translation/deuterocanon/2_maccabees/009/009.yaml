translation:
  text: so that worms even swarmed from the body of the ungodly man, and while he
    was still alive, in pains and agonies, his flesh fell away, and because of his
    stench the whole camp was burdened by the rottenness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worms boiled up from the body of the impious man.' The Greek verb is
      more literally 'seethed up' or 'boiled up.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'his flesh was falling away' while he was still alive.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυσσεβοῦς
  chosen: ungodly man
  alternatives:
  - impious man
  - wicked man
  lexicon: LSJ
  rationale: δυσσεβής denotes irreverence/impiety toward God rather than mere general
    evil. 'Ungodly man' preserves the religious-moral force in accessible English.
- source_word: σκώληκας ἀναζεῖν
  chosen: worms swarmed
  alternatives:
  - worms boiled up
  - worms teemed forth
  lexicon: LSJ
  rationale: ἀναζέω literally suggests boiling up or seething up. In context of worms
    emerging from the body, 'swarmed' conveys the vivid sense naturally in English
    without losing the grotesque force.
- source_word: ζῶντος
  chosen: while he was still alive
  alternatives:
  - living
  - while alive
  lexicon: LSJ
  rationale: The genitive absolute-like construction emphasizes that this decay happened
    before death. 'While he was still alive' makes that temporal force explicit.
- source_word: ἐν ὀδύναις καὶ ἀλγηδόσιν
  chosen: in pains and agonies
  alternatives:
  - in pains and sufferings
  - in torments and agonies
  lexicon: LSJ
  rationale: Both nouns denote severe physical suffering. 'Pains and agonies' preserves
    the pairing with strong but readable English.
- source_word: τὰς σάρκας αὐτοῦ διαπίπτειν
  chosen: his flesh fell away
  alternatives:
  - his flesh dropped off
  - his flesh decayed away
  lexicon: LSJ
  rationale: σάρξ is literal here, so 'flesh' is required. διαπίπτω in context conveys
    falling apart/off; 'fell away' is idiomatic and graphic without overinterpreting.
- source_word: ὑπὸ δὲ τῆς ὀσμῆς αὐτοῦ
  chosen: because of his stench
  alternatives:
  - from his smell
  - because of his odor
  lexicon: LSJ
  rationale: Though ὀσμή can be neutral ('smell'), the context of bodily corruption
    clearly makes it offensive. 'Stench' captures the contextual sense.
- source_word: πᾶν τὸ στρατόπεδον
  chosen: the whole camp
  alternatives:
  - the entire army camp
  - the whole encampment
  lexicon: LSJ
  rationale: στρατόπεδον refers to the military camp. 'The whole camp' is concise
    and natural.
- source_word: βαρύνεσθαι τὴν σαπρίαν
  chosen: was weighed down by the rottenness
  alternatives:
  - was burdened by the decay
  - was oppressed by the putrefaction
  lexicon: LSJ
  rationale: The construction is difficult but conveys the camp being oppressed or
    burdened by the corruption/putrid condition. 'Weighed down by the rottenness'
    preserves the metaphor and the noun σαπρία's sense of decay/putrefaction.
