translation:
  text: Plant your people in your holy place, just as Moses said.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Establish your people in your holy place.' The Greek verb is literally
      'plant,' using an image of secure settlement.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταφύτευσον
  chosen: Plant
  alternatives:
  - Establish
  - Settle
  lexicon: LSJ
  rationale: Aorist imperative of καταφυτεύω, literally 'plant' or 'plant down.' The
    agricultural metaphor is vivid and should be preserved rather than flattened to
    a more abstract 'establish,' though that sense is contextually related.
- source_word: τὸν λαόν σου
  chosen: your people
  alternatives:
  - your nation
  lexicon: LSJ
  rationale: λαός commonly denotes a people as a collective body, especially in covenantal
    or communal prayer. 'Your people' is the most natural and contextually fitting
    English rendering.
- source_word: εἰς τὸν τόπον τὸν ἅγιόν σου
  chosen: in your holy place
  alternatives:
  - into your holy place
  - in your holy land
  - in the place holy to you
  lexicon: LSJ
  rationale: τόπος is 'place,' modified by ἅγιος. The phrase most naturally refers
    to the sacred place belonging to God. 'In your holy place' is idiomatic English
    and preserves the locative sense without over-specifying temple or land.
- source_word: καθὼς εἶπεν Μωσῆς
  chosen: just as Moses said
  alternatives:
  - as Moses said
  - just as Moses spoke
  lexicon: LSJ
  rationale: καθώς introduces comparison or accordance; εἶπεν is simple past 'said.'
    'Just as Moses said' is clear, natural, and preserves the appeal to Mosaic precedent.
