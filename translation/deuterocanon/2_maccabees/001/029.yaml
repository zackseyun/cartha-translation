theological_decisions:
- issue: Referent of 'your holy place'
  chosen_reading: Kept as the broader 'holy place' without specifying temple, sanctuary,
    or land.
  alternative_readings:
  - your holy land
  - your sanctuary
  - the holy place appointed by you
  rationale: The Greek says τόπον, 'place,' and does not explicitly identify the referent
    more narrowly in this verse. Preserving the broader wording avoids importing a
    more specific theological or geographical claim than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
