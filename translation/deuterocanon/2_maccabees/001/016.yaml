theological_decisions:
- issue: Whether συνεκεραύνωσαν should be rendered as a literal divine thunderbolt
    or as vivid violent imagery
  chosen_reading: Rendered metaphorically as 'struck down ... with a thunderbolt-like
    blow'
  alternative_readings:
  - '''struck with lightning'''
  - '''crushed/struck down'''
  rationale: The Greek verb evokes thunderbolt imagery, but the immediate agents are
    the attackers throwing stones. A metaphorical rendering preserves the lexical
    force without asserting a miraculous event the verse itself does not explicitly
    narrate.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
