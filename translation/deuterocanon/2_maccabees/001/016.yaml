id: 2MA.1.16
reference: 2 Maccabees 1:16
source:
  edition: lxx-swete-1909
  text: ἀνοίξαντες τὴν τοῦ φατινώματος κρυπτὴν θύραν, βάλλοντες πέτρους συνεκεραύνωσαν
    τὸν ἡγεμόνα, καὶ μέλη ποιήσαντες καὶ τὰς κεφαλὰς τοῖς ἔξω παρρίψαντες.
  language: Greek
