  confidence: high
  validation: agree
translation:
  text: After opening the hidden door of the smoke chamber, they threw stones and
    struck down the leader with a thunderbolt-like blow, and after cutting him into
    pieces, they threw the heads out to those outside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the furnace room' or 'the place of smoke/incense'; the Greek term is
      rare and its precise referent is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The verb evokes a thunderbolt or lightning strike; it may mean they struck
      him down violently, not necessarily that a literal bolt fell from heaven.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνοίξαντες
  chosen: After opening
  alternatives:
  - having opened
  - when they opened
  lexicon: LSJ
  rationale: Aorist participle best rendered as antecedent action relative to the
    main verbs; 'After opening' is natural English while preserving sequence.
- source_word: τὴν ... κρυπτὴν θύραν
  chosen: the hidden door
  alternatives:
  - the secret door
  - the concealed door
  lexicon: LSJ
  rationale: κρυπτήν denotes something hidden or concealed. 'Hidden door' is straightforward
    modern English.
- source_word: τοῦ φατινώματος
  chosen: of the smoke chamber
  alternatives:
  - of the furnace room
  - of the place of smoke/incense
  lexicon: LSJ
  rationale: The noun is rare and contextually difficult. In this narrative setting
    it appears to denote the chamber associated with the smoky/fire-filled place into
    which Nicanor entered. 'Smoke chamber' preserves the uncertainty without over-specifying
    a technical cultic term.
- source_word: βάλλοντες πέτρους
  chosen: they threw stones
  alternatives:
  - hurling stones
  - casting stones
  lexicon: LSJ
  rationale: Straightforward participial phrase; 'threw stones' is idiomatic and keeps
    the violent action clear.
- source_word: συνεκεραύνωσαν
  chosen: struck down ... with a thunderbolt-like blow
  alternatives:
  - crushed
  - smote
  - struck as by lightning
  lexicon: LSJ
  rationale: The verb is built on κεραυνός ('thunderbolt') and is vivid rather than
    ordinary. The chosen rendering preserves the metaphorical force without implying
    a literal heavenly bolt necessarily fell.
- source_word: τὸν ἡγεμόνα
  chosen: the leader
  alternatives:
  - the governor
  - the commander
  - the ruler
  lexicon: LSJ
  rationale: ἡγεμών can denote a leader, governor, or commander depending on context.
    Here 'leader' is broad and avoids importing a more specific office than the Greek
    requires.
- source_word: μέλη ποιήσαντες
  chosen: after cutting him into pieces
  alternatives:
  - having dismembered him
  - making him into limbs/pieces
  lexicon: LSJ
  rationale: Idiomatic expression meaning to divide into body parts. 'Cutting him
    into pieces' is clear modern English and reflects the gruesome sense.
- source_word: καὶ τὰς κεφαλὰς
  chosen: the heads
  alternatives:
  - his head
  - the head-parts
  lexicon: LSJ
  rationale: Plural in the Greek should be preserved. It likely reflects the dismemberment
    just mentioned rather than being smoothed to singular.
- source_word: τοῖς ἔξω παρρίψαντες
  chosen: they threw ... out to those outside
  alternatives:
  - flung ... outside
  - cast ... to the people outside
  lexicon: LSJ
  rationale: παρρίψαντες conveys throwing or casting; τοῖς ἔξω is best taken as 'those
    outside,' not merely a location, since the dative personal reading is natural
    here.
