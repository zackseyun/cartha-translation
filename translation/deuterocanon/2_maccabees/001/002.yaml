  text: καὶ ἀγαθοποιῆσαι ὑμῖν ὁ θεός, καὶ μνησθῆναι τῆς διαθήκης αὐτοῦ τῆς πρὸς Ἀβραὰμ
    καὶ Ἰσαὰκ καὶ Ἰακὼβ τῶν δούλων αὐτοῦ τῶν πιστῶν.
