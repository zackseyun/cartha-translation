id: 2MA.1.24
reference: 2 Maccabees 1:24
source:
  edition: lxx-swete-1909
  text: ἦν δὲ ἡ προσευχὴ τὸν τρόπον ἔχουσα τοῦτον Κύριε ὁ θεός, ὁ πάντων κτίστης,
    ὁ φοβερὸς καὶ ὁ ἰσχυρὸς καὶ δίκαιος καὶ ἐλεήμων, ὁ μόνος βασιλεὺς καὶ χρηστός,
  language: Greek
  pages:
