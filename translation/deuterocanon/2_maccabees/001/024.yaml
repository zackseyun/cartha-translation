theological_decisions:
- issue: Rendering of κύριος in a Jewish prayer address
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrine default renders κύριος as 'Lord.' In this deuterocanonical
    Jewish prayer context, 'Lord God' is the most natural and theologically appropriate
    English equivalent.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Exclusivity claim in μόνος βασιλεὺς
  chosen_reading: the only king
  alternative_readings:
  - the sole king
  rationale: The phrase expresses exclusive kingship of God. The translation preserves
    that theological force without expanding it beyond the text.
