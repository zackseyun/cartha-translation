  - 732
  - 733
  confidence: high
  validation: agree
translation:
  text: 'And the prayer was in this form: “Lord God, creator of all things, the fearful
    and mighty and righteous and merciful one, the only king and good one,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the awesome one” / “the fearsome one” for “the fearful”; the Greek adjective
      denotes one who inspires fear or awe.
    reason: lexical_alternative
  - marker: b
    text: Or simply “good” or “kind” for “good one”; the Greek χρηστός can carry the
      sense of goodness, kindness, or benevolence.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ ἡ προσευχὴ τὸν τρόπον ἔχουσα τοῦτον
  chosen: And the prayer was in this form
  alternatives:
  - And the prayer was as follows
  - And the prayer took this form
  lexicon: LSJ
  rationale: The idiom literally means 'the prayer having this manner/form.' 'Was
    in this form' preserves the formal introduction to the quoted prayer while remaining
    natural English.
- source_word: Κύριε ὁ θεός
  chosen: Lord God
  alternatives:
  - O Lord God
  - Lord, God
  lexicon: LSJ
  rationale: Vocative address in prayer is best rendered directly as 'Lord God.' An
    added 'O' is possible in English prayer style but is not required by the Greek
    and would sound more archaic than the project's style prefers. 'Lord' follows
    the doctrine default for κύριος.
- source_word: ὁ πάντων κτίστης
  chosen: creator of all things
  alternatives:
  - creator of all
  - maker of all things
  lexicon: LSJ
  rationale: κτίστης is 'creator/founder.' 'Creator of all things' is idiomatic and
    clearly conveys universal scope from πάντων.
- source_word: ὁ φοβερὸς
  chosen: the fearful
  alternatives:
  - the awesome one
  - the terrible one
  - the fearsome one
  lexicon: LSJ
  rationale: φοβερός denotes one who inspires fear/awe. 'Fearful' is a more literal
    predicate-style rendering here, though in contemporary English it can sound ambiguous;
    the alternatives were considered. I retained the more source-near sense in the
    string of divine attributes.
- source_word: ὁ ἰσχυρὸς
  chosen: mighty
  alternatives:
  - strong
  - powerful
  lexicon: LSJ
  rationale: A standard rendering for divine strength language; concise and natural
    in a liturgical list of attributes.
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: LSJ
  rationale: For divine moral character, 'righteous' fits well. 'Just' is possible,
    but 'righteous' better matches the adjectival praise context here.
- source_word: ἐλεήμων
  chosen: merciful
  alternatives:
  - compassionate
  lexicon: LSJ
  rationale: The standard and clearest rendering for divine mercy language.
- source_word: ὁ μόνος βασιλεὺς
  chosen: the only king
  alternatives:
  - the sole king
  - the one king
  lexicon: LSJ
  rationale: μόνος emphasizes exclusivity. 'The only king' preserves the monarchical
    confession straightforwardly.
- source_word: χρηστός
  chosen: good one
  alternatives:
  - kind
  - benevolent
  - good
  lexicon: LSJ
  rationale: χρηστός can mean good, kind, benevolent. Because the Greek continues
    the repeated article + adjective pattern ('the ... one'), 'good one' preserves
    the cadence of the prayer. 'Kind' is possible but slightly narrows the sense.
