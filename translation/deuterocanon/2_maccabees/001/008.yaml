theological_decisions:
- issue: κύριος rendering
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  - Master
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this deuterocanonical Greek
    context it refers to Israel's God, and 'the Lord' is the project's standard rendering
    unless the tetragrammaton is directly in view from Hebrew.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Cultic sequence in the latter half of the verse
  chosen_reading: rendered as restored temple worship actions ('offered sacrifice
    and fine flour, lit the lamps, and set out the loaves')
  alternative_readings:
  - more literal 'brought out the lamps'
  rationale: The verse lists temple-service acts after prayer was heard. Rendering
    ἐξηγάγομεν idiomatically as 'lit' preserves the likely ritual sense in context
    while avoiding a misleadingly wooden phrase that obscures the worship action.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5, §6
