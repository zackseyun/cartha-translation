translation:
  text: And they set the gateway on fire and poured out innocent blood; but we prayed
    to the Lord and were heard. We offered sacrifice and fine flour, lit the lamps,
    and set out the loaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'brought out the lamps.' The Greek verb can mean 'led
      out' or 'brought out'; here it likely refers to preparing the lamps for temple
      service.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέπυραν
  chosen: set ... on fire
  alternatives:
  - burned
  - kindled
  lexicon: LSJ
  rationale: The verb denotes setting something ablaze. 'Set the gateway on fire'
    is idiomatic modern English and preserves the causative sense better than the
    flatter 'burned.'
- source_word: τὸν πυλῶνα
  chosen: the gateway
  alternatives:
  - the gatehouse
  - the gate-tower
  - the porch
  lexicon: LSJ
  rationale: πυλών commonly refers to a gate or gateway structure. 'Gateway' is broad
    enough to fit the architectural term without over-specifying a tower or porch.
- source_word: ἐξέχεαν αἷμα ἀθῷον
  chosen: poured out innocent blood
  alternatives:
  - shed innocent blood
  lexicon: LSJ
  rationale: Literally the Greek says 'poured out innocent blood.' English often says
    'shed innocent blood,' but retaining 'poured out' keeps the vividness of the source
    while remaining natural enough.
- source_word: ἐδεήθημεν τοῦ κυρίου
  chosen: we prayed to the Lord
  alternatives:
  - we implored the Lord
  - we entreated the Lord
  lexicon: LSJ
  rationale: The verb expresses earnest petition. 'Prayed to the Lord' is clear, natural,
    and sufficiently weighty in context.
- source_word: εἰσηκούσθημεν
  chosen: were heard
  alternatives:
  - were listened to
  - received an answer
  lexicon: LSJ
  rationale: The passive conveys that God heard their prayer. 'Were heard' is the
    standard concise English equivalent and preserves the theological emphasis on
    divine response.
- source_word: προσηνέγκαμεν θυσίαν
  chosen: we offered sacrifice
  alternatives:
  - we presented a sacrifice
  - we offered a sacrifice
  lexicon: LSJ
  rationale: The anarthrous singular can be rendered generically. 'Offered sacrifice'
    sounds cultic and concise in English, matching the ritual context.
- source_word: σεμίδαλιν
  chosen: fine flour
  alternatives:
  - fine meal
  - choice flour
  lexicon: LSJ
  rationale: The term denotes fine wheat flour used in offerings. 'Fine flour' is
    the clearest standard rendering in sacrificial contexts.
- source_word: ἐξηγάγομεν τοὺς λύχνους
  chosen: lit the lamps
  alternatives:
  - brought out the lamps
  lexicon: LSJ
  rationale: Although the verb literally means 'brought out,' in this temple-restoration
    context the sense is likely functional preparation of the lamps for worship. 'Lit
    the lamps' best fits the sequence of cultic actions alongside offering sacrifice
    and setting out bread.
- source_word: προεθήκαμεν τοὺς ἄρτους
  chosen: set out the loaves
  alternatives:
  - placed the bread before him
  - set forth the bread
  lexicon: LSJ
  rationale: The verb means to place before or set out, and with 'the loaves' naturally
    evokes the bread arranged in the sanctuary. This preserves the ritual action without
    importing extra words not in the Greek.
