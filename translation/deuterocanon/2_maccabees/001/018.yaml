theological_decisions:
- issue: Rendering σκηνοπηγίας
  chosen_reading: the festival of booths
  alternative_readings:
  - Tabernacles
  - the feast of booths
  rationale: This keeps the Jewish festal imagery explicit in accessible English without
    importing later ecclesiastical convention. It is a lexical-cultural choice rather
    than a doctrinally disputed one, but it bears on how readers perceive the feast
    named in the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Rendering καὶ τοῦ πυρός
  chosen_reading: and of the fire
  alternative_readings:
  - and the fire festival
  rationale: The Greek is compressed and allusive. The main text preserves the wording
    without resolving exactly how 'fire' functions; a footnote preserves the more
    interpretive alternative. This follows the principle of preserving tension rather
    than overresolving ambiguity.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
