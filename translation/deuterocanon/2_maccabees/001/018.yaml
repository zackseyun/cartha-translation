translation:
  text: Since we are about to celebrate the purification of the temple on the twenty-fifth
    of Chasleu, we thought it necessary to make this clear to you also, so that you
    too may celebrate the festival of booths and of the fire, when Nehemiah, after
    building both the temple and the altar, offered sacrifices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'and the fire festival.' The Greek simply reads
      'and of the fire,' likely alluding to the commemorative account that follows.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μέλλοντες ἄγειν
  chosen: Since we are about to celebrate
  alternatives:
  - As we are going to observe
  - Being about to hold
  lexicon: LSJ
  rationale: The participle with μέλλω plus infinitive indicates imminent intention.
    ἄγειν in festival contexts means to celebrate or observe a feast, not merely 'lead'
    or 'bring'.
- source_word: ἐν τῷ Χασελεὺ πέμπτῃ καὶ εἰκάδι
  chosen: on the twenty-fifth of Chasleu
  alternatives:
  - on Chasleu twenty-fifth
  - on the twenty-fifth day of Chislev
  lexicon: LSJ
  rationale: This dates the event by month and day. 'Chasleu' is a direct transliteration
    of the Greek month name in keeping with the policy to transliterate names; 'twenty-fifth'
    naturally expresses πέμπτῃ καὶ εἰκάδι.
- source_word: τὸν καθαρισμὸν τοῦ ἱεροῦ
  chosen: the purification of the temple
  alternatives:
  - the cleansing of the sanctuary
  - the dedication-purification of the temple
  lexicon: LSJ
  rationale: καθαρισμός denotes purification/cleansing. ἱερόν here refers to the temple
    precinct/holy place generally. 'Purification of the temple' is clear and fits
    the Hanukkah context without overinterpreting as 'dedication,' which is not the
    word used here.
- source_word: δέον ἡγησάμεθα διασαφῆσαι ὑμῖν
  chosen: we thought it necessary to make this clear to you
  alternatives:
  - we considered it necessary to explain this to you
  - we deemed it needful to clarify for you
  lexicon: LSJ
  rationale: The idiom combines a sense of obligation/appropriateness (δέον) with
    deliberate judgment (ἡγησάμεθα). διασαφῆσαι means to explain clearly or make plain.
- source_word: ἵνα καὶ αὐτοὶ ἄγητε
  chosen: so that you too may celebrate
  alternatives:
  - so that you also may observe
  - so that you yourselves may keep
  lexicon: LSJ
  rationale: Again ἄγω in cultic/festal context means celebrate/keep a feast. καὶ
    αὐτοί adds 'you too' rather than emphatic reflexive force alone.
- source_word: σκηνοπηγίας
  chosen: the festival of booths
  alternatives:
  - Tabernacles
  - the feast of booths
  lexicon: LSJ
  rationale: σκηνοπηγία is the feast associated with booths/tabernacles. 'Festival
    of booths' is transparent modern English while preserving the imagery better than
    the traditional but less transparent 'Tabernacles'.
- source_word: καὶ τοῦ πυρός
  chosen: and of the fire
  alternatives:
  - and the fire festival
  - and of fire
  lexicon: LSJ
  rationale: The genitive is terse and likely names an associated commemorative observance
    tied to the narrative that follows. A more interpretive expansion such as 'fire
    festival' goes beyond the wording, so the literal 'of the fire' is retained.
- source_word: ὅτε Νεεμίας
  chosen: when Nehemiah
  alternatives:
  - at the time when Nehemiah
  lexicon: LSJ
  rationale: ὅτε introduces the historical occasion being recalled.
- source_word: ὁ οἰκοδομήσας τό τε ἱερὸν καὶ τὸ θυσιαστήριον
  chosen: after building both the temple and the altar
  alternatives:
  - the one who built both the temple and the altar
  - having built both the sanctuary and the altar
  lexicon: LSJ
  rationale: The aorist participle is most naturally rendered as prior action relative
    to the main verb. ἱερόν is rendered 'temple' for readability; θυσιαστήριον is
    specifically 'altar'.
- source_word: ἀνήνεγκεν θυσίας
  chosen: offered sacrifices
  alternatives:
  - brought up sacrifices
  - presented sacrifices
  lexicon: LSJ
  rationale: ἀναφέρω in sacrificial contexts means offer up. 'Offered sacrifices'
    is idiomatic and cultically precise.
