theological_decisions:
- issue: Historical-exilic wording
  chosen_reading: being led away into Persia
  alternative_readings:
  - being deported to Persia
  - being taken into the Persian land
  rationale: The verse refers to the ancestors' removal into exile. The chosen wording
    preserves the historical gravity without importing technical terminology not explicit
    in the Greek.
