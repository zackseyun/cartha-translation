translation:
  text: For when our fathers were being led away into Persia, the devout priests took
    some of the fire from the altar and secretly hid it in the hollow of a dry well,
    where they secured it so that the place would be unknown to everyone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'were deported into Persia.' The Greek verb can denote being led away
      or carried off into exile.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγοντο
  chosen: were being led away
  alternatives:
  - were taken
  - were carried off
  - were deported
  lexicon: LSJ
  rationale: Imperfect passive of ἄγω in this context describes the fathers being
    taken into exile. 'Were being led away' preserves both the passive sense and the
    movement into captivity without over-specifying the mechanism.
- source_word: Περσικὴν
  chosen: Persia
  alternatives:
  - the Persian land
  - the Persian country
  lexicon: LSJ
  rationale: The adjective used substantivally refers to the land of Persia. 'Persia'
    is natural modern English and adequately reflects the geographical reference.
- source_word: εὐσεβεῖς
  chosen: devout
  alternatives:
  - pious
  - godly
  lexicon: LSJ
  rationale: '''Devout'' communicates religious faithfulness in accessible modern
    English. ''Pious'' is possible but can sound archaic or carry unintended connotations.'
- source_word: λαβόντες ἀπὸ τοῦ πυρὸς τοῦ θυσιαστηρίου
  chosen: took some of the fire from the altar
  alternatives:
  - took from the altar fire
  - took some fire from the altar
  lexicon: LSJ
  rationale: 'The genitive construction indicates source: they took from the altar''s
    fire. ''Some of the fire'' makes clear they did not remove the altar itself or
    all fire, and reads naturally in English.'
- source_word: λαθραίως
  chosen: secretly
  alternatives:
  - stealthily
  - in secret
  lexicon: LSJ
  rationale: The adverb denotes concealment of action. 'Secretly' is the clearest
    idiomatic rendering.
- source_word: κοιλώματι φρέατος
  chosen: the hollow of a dry well
  alternatives:
  - a cavity of a well
  - the pit of a well
  lexicon: LSJ
  rationale: κοιλώματι denotes a hollow or cavity, and φρέατος a well or cistern-like
    shaft. Rendering the phrase as 'the hollow of a dry well' preserves the image
    while remaining readable.
- source_word: τάξιν ἔχοντος ἀνύδρου
  chosen: of a dry well
  alternatives:
  - which was dry
  - having the condition of being waterless
  - waterless
  lexicon: LSJ
  rationale: The participial phrase modifies the well and describes its state as waterless/dry.
    English idiom is best served by folding this into 'a dry well' rather than reproducing
    the more wooden Greek structure.
- source_word: κατησφαλίσαντο
  chosen: secured it
  alternatives:
  - made it secure
  - ensured it was safe
  lexicon: LSJ
  rationale: The verb conveys making something secure or safe. 'Secured it' is concise
    and fits the context of hiding the fire in a protected place.
- source_word: ὥστε πᾶσιν ἄγνωστον εἶναι τὸν τόπον
  chosen: so that the place would be unknown to everyone
  alternatives:
  - so that no one would know the place
  - with the result that the place was unknown to all
  lexicon: LSJ
  rationale: The ὥστε clause expresses intended/resulting concealment. 'Unknown to
    everyone' closely follows the Greek while remaining natural English.
