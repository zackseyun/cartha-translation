translation:
  text: But after many years had passed, when it pleased God, Nehemiah, having been
    sent by the king of Persia, sent for the descendants of the priests who had hidden
    it, to get the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'sent ... upon/for the fire.' The Greek is concise; the translation
      makes explicit that Nehemiah sent the descendants of the priests to recover
      the hidden fire mentioned in the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: διελθόντων ... ἐτῶν ἱκανῶν
  chosen: after many years had passed
  alternatives:
  - when many years had gone by
  - after a considerable number of years had passed
  lexicon: LSJ
  rationale: The genitive absolute marks a temporal setting. ἱκανῶν here means 'many'
    or 'considerable,' not merely 'sufficient,' so an idiomatic temporal clause in
    English best reflects the sense.
- source_word: ὅτε ἔδοξεν τῷ θεῷ
  chosen: when it seemed good to God
  alternatives:
  - when God saw fit
  - when it pleased God
  lexicon: LSJ
  rationale: ἔδοξεν with dative commonly means 'it seemed good to.' 'Seemed good to
    God' preserves the Greek idiom while remaining understandable. 'Pleased God' is
    possible but slightly more interpretive.
- source_word: ἀποσταλεὶς Νεεμίας ἀπὸ τοῦ βασιλέως τῆς Περσίδος
  chosen: Nehemiah, having been sent by the king of Persia
  alternatives:
  - Nehemiah, sent from the king of Persia
  - Nehemiah, when he had been sent by the king of Persia
  lexicon: LSJ
  rationale: The aorist passive participle modifies Nehemiah and indicates prior action.
    ἀπό with a personal agent here is naturally rendered 'by' in English rather than
    the more wooden 'from.'
- source_word: τοὺς ἐκγόνους τῶν ἱερέων
  chosen: the descendants of the priests
  alternatives:
  - the offspring of the priests
  - the sons of the priests
  lexicon: LSJ
  rationale: ἐκγόνοι denotes descendants or offspring. 'Descendants' is the broadest
    and most natural rendering, avoiding an overly narrow male-only sense that 'sons'
    might suggest.
- source_word: τῶν ἀποκρυψάντων
  chosen: who had hidden it
  alternatives:
  - who had concealed it
  - who had hidden
  lexicon: LSJ
  rationale: The participle refers back to the priests mentioned earlier in the narrative
    who hid the sacred fire. English requires an object for clarity; 'it' is supplied
    from the immediate context rather than left implicit.
- source_word: ἔπεμψεν ἐπὶ τὸ πῦρ
  chosen: sent for the descendants of the priests who had hidden it, to get the fire
  alternatives:
  - sent them to fetch the fire
  - sent to the fire
  - sent concerning the fire
  lexicon: LSJ
  rationale: The Greek is compressed and somewhat awkward in English if rendered literally.
    ἐπὶ with accusative here is best understood in context as motion/purpose toward
    the fire's location or retrieval. Because the object of ἔπεμψεν is τοὺς ἐκγόνους,
    the sense is that Nehemiah dispatched these descendants in connection with recovering
    the hidden fire. 'To get the fire' makes the narrative logic explicit without
    departing materially from the Greek.
