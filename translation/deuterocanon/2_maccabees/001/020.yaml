- issue: Divine volition in ὅτε ἔδοξεν τῷ θεῷ
  chosen_reading: when it seemed good to God
  alternative_readings:
  - when God saw fit
  - when it pleased God
  rationale: This is not a major doctrinally contested phrase, but the wording touches
    divine agency. The chosen rendering preserves the Greek idiom and avoids overstating
    emotional pleasure where the phrase can simply indicate divine determination or
    approval.
