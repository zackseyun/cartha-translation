translation:
  text: Accept the sacrifice for all your people Israel, and guard your portion and
    make it holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'preserve your portion and sanctify it.' The phrase 'your portion' likely
      refers to Israel as God's own share, though some may hear a broader reference
      such as the land or sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόσδεξαι
  chosen: Accept
  alternatives:
  - Receive
  - Take favorably
  lexicon: LSJ
  rationale: Aorist middle imperative of προσδέχομαι in prayer language asks God to
    receive favorably what is offered. 'Accept' is natural modern English and preserves
    the petitionary force without sounding archaic.
- source_word: τὴν θυσίαν
  chosen: the sacrifice
  alternatives:
  - the offering
  lexicon: LSJ
  rationale: θυσία ordinarily denotes a sacrifice rather than the broader 'offering.'
    Since the context is cultic prayer, 'sacrifice' best preserves the concrete sacrificial
    sense.
- source_word: ὑπὲρ παντὸς τοῦ λαοῦ σου Ἰσραήλ
  chosen: for all your people Israel
  alternatives:
  - on behalf of all your people Israel
  - for your whole people Israel
  lexicon: LSJ
  rationale: ὑπέρ here expresses representation/benefit. 'For all your people Israel'
    is concise and idiomatic while retaining the sense that the sacrifice is offered
    on behalf of the entire people.
- source_word: διαφύλαξον
  chosen: guard
  alternatives:
  - preserve
  - protect
  lexicon: LSJ
  rationale: The imperative asks God to keep safe or preserve. 'Guard' is vivid and
    direct, fitting prayer language and pairing well with the following object.
- source_word: τὴν μερίδα σου
  chosen: your portion
  alternatives:
  - your inheritance
  - your allotted share
  lexicon: LSJ
  rationale: μερίς/μερίδα literally means a portion or share. In biblical usage it
    can refer to a people as God's allotted possession. 'Your portion' keeps the metaphor
    close to the Greek; 'inheritance' is possible but more interpretive.
- source_word: καθαγίασον
  chosen: make it holy
  alternatives:
  - sanctify it
  - consecrate it
  lexicon: LSJ
  rationale: The verb means to make holy/consecrate. 'Make it holy' is clear modern
    English and avoids ecclesiastical jargon while preserving the holiness concept.
    The object is naturally understood from the preceding singular object, 'your portion'.
