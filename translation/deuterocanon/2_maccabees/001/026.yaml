theological_decisions:
- issue: Referent of 'your portion'
  chosen_reading: Israel, God's people, is described metaphorically as God's portion.
  alternative_readings:
  - the land or temple as God's portion
  rationale: The immediate context names 'your people Israel,' and the singular object
    following naturally continues that referent. The phrase also fits established
    biblical covenant language for the people as God's allotted possession. The translation
    keeps the metaphor without over-specifying beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
