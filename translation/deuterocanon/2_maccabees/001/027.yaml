theological_decisions:
- issue: Referent of 'our dispersion'
  chosen_reading: Rendered as the dispersed people themselves ('our scattered people')
    rather than the abstract condition of dispersion.
  alternative_readings:
  - our dispersion
  - our diaspora
  rationale: The prayer asks God to gather persons, not merely reverse a condition.
    The Greek noun can denote the dispersed community by metonymy, and English benefits
    from making that implicit referent explicit.
  doctrine_reference: Translation philosophy §1, §6
- issue: δουλεύοντας language
  chosen_reading: Rendered with slavery/bondage force ('those enslaved') rather than
    softened service language.
  alternative_readings:
  - those serving among the nations
  - those in servitude among the nations
  rationale: The context is national oppression and captivity. Following the project's
    guidance on doulos-family terms, the bonded nature is salient here and should
    not be muted.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
