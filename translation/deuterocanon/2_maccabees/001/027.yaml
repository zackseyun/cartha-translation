translation:
  text: Gather our scattered people together, free those enslaved among the nations,
    look upon those who are despised and abhorred; and let the nations know that you
    are our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'our dispersion.' The translation makes explicit that the
      prayer concerns the scattered community.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνάγαγε
  chosen: Gather ... together
  alternatives:
  - bring together
  - assemble
  lexicon: LSJ
  rationale: Imperative of ἐπισυνάγω, calling for God to collect and reunite those
    dispersed. 'Gather ... together' preserves the verbal force and the prefixed intensification
    without sounding wooden.
- source_word: τὴν διασπορὰν ἡμῶν
  chosen: our scattered people
  alternatives:
  - our dispersion
  - our diaspora
  lexicon: LSJ
  rationale: Literally 'our dispersion.' In context this refers to the dispersed community,
    not the abstract state alone. 'Our scattered people' makes the referent clear
    in natural English while remaining anchored to the Greek.
- source_word: ἐλευθέρωσον
  chosen: free
  alternatives:
  - set free
  - deliver
  lexicon: LSJ
  rationale: The imperative means to liberate or set at liberty. 'Free' is concise
    and strong; 'deliver' would be broader and less specifically tied to liberation.
- source_word: τοὺς δουλεύοντας
  chosen: those enslaved
  alternatives:
  - those serving
  - those in bondage
  - those who are slaves
  lexicon: LSJ
  rationale: From δουλεύω, 'to be enslaved/serve as a slave.' Given the context of
    subjection among the nations, the bonded sense is salient, in line with project
    guidance on doulos-language. 'Those enslaved' is idiomatic and preserves that
    force.
- source_word: ἐν τοῖς ἔθνεσιν
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: LSJ
  rationale: ἔθνη here denotes the surrounding peoples/nations. 'Among the nations'
    is the most natural rendering in this deuterocanonical Jewish context; 'Gentiles'
    is possible but more interpretive and tradition-laden.
- source_word: τοὺς ἐξουθενημένους
  chosen: those who are despised
  alternatives:
  - those treated with contempt
  - the humiliated
  lexicon: LSJ
  rationale: Perfect/passive participle from ἐξουθενέω, indicating those reduced to
    contempt or treated as nothing. 'Despised' captures both the social shame and
    passive sense cleanly.
- source_word: καὶ βδελυκτοὺς
  chosen: and abhorred
  alternatives:
  - and detested
  - and made abominable
  lexicon: LSJ
  rationale: βδελυκτός denotes something loathed or abominable. 'Abhorred' preserves
    the strong revulsion without implying a technical cultic category that the context
    does not require.
- source_word: ἔφιδε
  chosen: look upon
  alternatives:
  - have regard for
  - take notice of
  - show favor to
  lexicon: LSJ
  rationale: Imperative of ἐφοράω/ἐφοράω in the sense 'look upon, regard.' In prayer
    language, 'look upon' is both natural and faithful; 'show favor' would add a benevolent
    nuance not explicit in the verb itself.
- source_word: γνώτωσαν
  chosen: let ... know
  alternatives:
  - may ... know
  - let ... recognize
  lexicon: LSJ
  rationale: 'Aorist imperative/jussive force: a petition that the nations come to
    know. ''Let the nations know'' is idiomatic English for the prayerful imperative.'
- source_word: ὅτι σὺ ὁ θεὸς ἡμῶν
  chosen: that you are our God
  alternatives:
  - that you are God for us
  - that you are our God indeed
  lexicon: LSJ
  rationale: Straightforward predication with emphatic σύ. English naturally expresses
    this as 'that you are our God'; the emphasis is sufficiently conveyed by context
    without overtranslating.
