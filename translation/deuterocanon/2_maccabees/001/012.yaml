translation:
  text: For he himself drove those arrayed for battle in the holy city out into Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast out' or 'expelled'; the Greek verb is forceful and depicts decisive
      removal.
    reason: lexical_alternative
  - marker: b
    text: Or 'those drawn up in battle order'; the Greek participle is a military
      term for persons arranged for combat.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - he personally
  lexicon: LSJ
  rationale: The intensive pronoun adds emphasis; 'he himself' preserves that stress
    better than a simple 'he'.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: LSJ
  rationale: This gives the explanatory force linking the statement to the preceding
    context.
- source_word: ἐξέβρασεν
  chosen: drove ... out
  alternatives:
  - cast out
  - expelled
  - thrust out
  lexicon: LSJ
  rationale: The verb conveys forceful expulsion. 'Drove ... out' is idiomatic English
    and preserves the violent, decisive sense without overparaphrase.
- source_word: τοὺς παρατασσομένους
  chosen: those arrayed for battle
  alternatives:
  - those drawn up in battle order
  - those deploying themselves
  - the combatants
  lexicon: LSJ
  rationale: The participle from παρατάσσω denotes being drawn up in military formation.
    'Arrayed for battle' communicates the military posture more precisely than a generic
    'enemies' or 'soldiers'.
- source_word: ἐν τῇ ἁγίᾳ πόλει
  chosen: in the holy city
  alternatives:
  - within the holy city
  - at the holy city
  lexicon: LSJ
  rationale: A straightforward locative rendering best matches the Greek. 'The holy
    city' is the natural English equivalent and preserves the sacral designation.
- source_word: εἰς τὴν Περσίδα
  chosen: out into Persia
  alternatives:
  - into Persia
  - to Persia
  - as far as Persia
  lexicon: LSJ
  rationale: εἰς marks movement toward/into Persia. Because the English verb 'drove
    out' naturally invites an expressed destination, 'out into Persia' captures both
    expulsion and destination without adding a new claim.
