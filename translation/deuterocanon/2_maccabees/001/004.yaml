id: 2MA.1.4
reference: 2 Maccabees 1:4
source:
  edition: lxx-swete-1909
  text: καὶ διανοίξαι τὴν καρδίαν ὑμῶν ἐν τῷ νόμῳ αὐτοῦ καὶ ἐν τοῖς προστάγμασιν,
    καὶ εἰρήνην ποιῆσαι·
  language: Greek
