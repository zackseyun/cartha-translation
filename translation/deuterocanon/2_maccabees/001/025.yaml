translation:
  text: the only provider, the only righteous one and almighty and eternal, the one
    who rescues Israel from every evil, who made the fathers chosen and sanctified
    them;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'benefactor' or 'supplier' for 'provider' (χορηγός). The Greek emphasizes
      God as the one who supplies what is needed.
    reason: lexical_alternative
  - marker: b
    text: Or 'made the fathers elect' for 'made the fathers chosen.'
    reason: lexical_alternative
  - marker: c
    text: Or 'made them holy' / 'consecrated them' for 'sanctified them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνος
  chosen: only
  alternatives:
  - alone
  - sole
  lexicon: BDAG
  rationale: Repeated attributively with each title; 'only' preserves the exclusivity
    emphasized in the prayer without sounding overly abstract.
- source_word: χορηγός
  chosen: provider
  alternatives:
  - benefactor
  - supplier
  - giver
  lexicon: LSJ
  rationale: The term denotes one who supplies or furnishes what is needed. 'Provider'
    is natural modern English and fits the prayer's praise of God as the source of
    provision better than the more patronage-colored 'benefactor'.
- source_word: δίκαιος
  chosen: righteous one
  alternatives:
  - just one
  - righteous
  lexicon: BDAG
  rationale: Used substantivally as a divine title. 'Righteous one' preserves the
    personal force and moral character better than a bare adjective in English.
- source_word: παντοκράτωρ
  chosen: almighty
  alternatives:
  - all-powerful
  - sovereign over all
  lexicon: BDAG
  rationale: Standard rendering for the divine title in biblical English; concise
    and recognizable while preserving the sense of universal power.
- source_word: αἰώνιος
  chosen: eternal
  alternatives:
  - everlasting
  - age-enduring
  lexicon: BDAG
  rationale: In this doxological string of divine attributes, 'eternal' is the clearest
    idiomatic English equivalent.
- source_word: διασώζων
  chosen: rescues
  alternatives:
  - saves
  - delivers
  - preserves
  lexicon: BDAG
  rationale: The participle describes active deliverance from danger. 'Rescues' conveys
    concrete saving action from peril and fits the phrase 'from every evil' well.
- source_word: ἐκ παντὸς κακοῦ
  chosen: from every evil
  alternatives:
  - from every harm
  - from all evil
  lexicon: BDAG
  rationale: κακόν here is broad enough to include evil, trouble, and harm. 'Every
    evil' keeps the moral and calamity-related breadth without narrowing the sense.
- source_word: ποιήσας
  chosen: made
  alternatives:
  - appointed
  - caused to be
  lexicon: BDAG
  rationale: Aorist participle with object-complement construction. 'Made the fathers
    chosen' is slightly formal but transparent to the Greek and preserves the causative
    force.
- source_word: ἐκλεκτούς
  chosen: chosen
  alternatives:
  - elect
  - selected
  lexicon: BDAG
  rationale: '''Chosen'' is clear modern English and avoids importing later theological
    freight that ''elect'' may carry, while still matching the source sense.'
- source_word: ἡγίασας
  chosen: sanctified
  alternatives:
  - made holy
  - consecrated
  lexicon: BDAG
  rationale: The verb means to make holy or set apart. 'Sanctified' preserves the
    cultic/theological register of the prayer; 'made holy' is possible but less compact
    alongside the elevated style.
- source_word: τοὺς πατέρας
  chosen: the fathers
  alternatives:
  - our fathers
  - the ancestors
  lexicon: BDAG
  rationale: The Greek lacks an explicit possessive. 'The fathers' preserves the traditional
    covenantal reference to Israel's forefathers without adding 'our'; 'ancestors'
    is possible but loses some biblical resonance.
