theological_decisions:
- issue: Rendering covenantal forebears in τοὺς πατέρας
  chosen_reading: the fathers
  alternative_readings:
  - the ancestors
  - our fathers
  rationale: The phrase refers to Israel's forefathers in covenant history. The Greek
    does not include 'our,' so it is not supplied. 'The fathers' keeps the biblical-historical
    register and avoids over-interpreting the relationship marker.
  doctrine_reference: Translation philosophy §§4–6
- issue: Rendering ἡγίασας in elevated prayer language
  chosen_reading: sanctified
  alternative_readings:
  - made holy
  - consecrated
  rationale: Because the verse is part of a formal prayer invoking God's acts toward
    Israel, the more theologically weighted 'sanctified' best preserves the register
    without becoming archaic.
  doctrine_reference: Translation philosophy §6
