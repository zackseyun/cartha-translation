  text: προσηγόρευσαν δὲ οἱ περὶ τὸν Νεεμίαν τοῦτο Νεφθάρ, ὃ διερμηνεύεται Καθαρισμός·
    καλεῖται δὲ παρὰ τοῖς πολλοῖς Νεφθί.
