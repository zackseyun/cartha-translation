translation:
  text: And the men around Nehemiah called this Nephthar, which is translated “Purification”;
    but by most people it is called Nephi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: “Nephi” (Νεφθί); a more letter-for-letter transliteration would
      be “Nephthi.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσηγόρευσαν
  chosen: called
  alternatives:
  - named
  - addressed as
  lexicon: LSJ
  rationale: The verb means to call or name. In this context it introduces the designation
    given to the substance/place, so 'called' is the most natural English.
- source_word: οἱ περὶ τὸν Νεεμίαν
  chosen: the men around Nehemiah
  alternatives:
  - those with Nehemiah
  - Nehemiah and his companions
  lexicon: LSJ
  rationale: The idiom refers to Nehemiah's associates or companions. 'The men around
    Nehemiah' preserves the Greek construction without overparaphrasing into a more
    interpretive phrase.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this thing
  - it
  lexicon: LSJ
  rationale: The demonstrative points to the substance just mentioned in context.
    'This' keeps the deixis of the Greek concise.
- source_word: Νεφθάρ
  chosen: Nephthar
  alternatives:
  - Nephthar/Nephthar as a transliteration variant
  rationale: As a proper name or designation, it is transliterated in keeping with
    the project's policy to transliterate names.
- source_word: διερμηνεύεται
  chosen: is translated
  alternatives:
  - is interpreted
  - means
  lexicon: LSJ
  rationale: The verb indicates explanation of the term's meaning. 'Is translated'
    fits the explicit movement from the foreign term to its Greek explanation.
- source_word: Καθαρισμός
  chosen: Purification
  alternatives:
  - Cleansing
  - Purity
  lexicon: LSJ
  rationale: Καθαρισμός denotes cleansing or purification. 'Purification' best matches
    the nominal form and the likely cultic/ritual nuance in context.
- source_word: καλεῖται
  chosen: it is called
  alternatives:
  - it is named
  lexicon: LSJ
  rationale: A straightforward passive naming formula; 'it is called' is idiomatic
    and close to the Greek.
- source_word: παρὰ τοῖς πολλοῖς
  chosen: by most people
  alternatives:
  - among the many
  - by the majority
  lexicon: LSJ
  rationale: The phrase means in common usage among the many. 'By most people' communicates
    ordinary widespread usage in natural English.
- source_word: Νεφθί
  chosen: Nephi
  alternatives:
  - Nephthi
  rationale: The Greek form Νεφθί is best represented by a simple transliteration.
    'Nephi' reflects the ending naturally in English letters, though a more letter-for-letter
    'Nephthi' is possible.
