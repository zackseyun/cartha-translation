translation:
  text: And when this happened, a flame was kindled; and when the light from the altar
    shone forth, it was consumed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the light from the altar shone forth.' The Greek verb can denote
      shining or flashing responsively.
    reason: lexical_alternative
  - marker: b
    text: The Greek says simply 'it was consumed' without naming the subject. The
      translation takes this to refer to the flame; alternatively, some understand
      the thing consumed to be the fuel or, in light of the wider context, the poured
      liquid.
    reason: alternative_reading
lexical_decisions:
- source_word: ὡς δὲ τοῦτο ἐγενήθη
  chosen: And when this happened
  alternatives:
  - And as soon as this took place
  - Now when this happened
  lexicon: LSJ
  rationale: ὡς with the aorist here introduces a temporal clause. 'When this happened'
    is natural English and preserves the sequence without over-specifying immediacy.
- source_word: φλὸξ
  chosen: a flame
  alternatives:
  - flame
  - fire
  lexicon: LSJ
  rationale: φλόξ denotes a flame or blaze. 'A flame' best matches the singular noun
    and the immediate ignition described.
- source_word: ἀνήφθη
  chosen: was kindled
  alternatives:
  - was lit
  - was ignited
  - blazed up
  lexicon: LSJ
  rationale: Passive aorist of ἀνάπτω/ἀνάφω in context means to be kindled or ignited.
    'Was kindled' is slightly more formal but remains readable and fits sacrificial/fire
    context.
- source_word: τοῦ δὲ ἀπὸ τοῦ θυσιαστηρίου
  chosen: from the altar
  alternatives:
  - out of the altar
  - from the sacrificial altar
  lexicon: LSJ
  rationale: θυσιαστήριον is 'altar.' The prepositional phrase modifies the light;
    'from the altar' is the clearest concise rendering.
- source_word: ἀντιλάμψαντος φωτός
  chosen: when the light from the altar flashed back
  alternatives:
  - when the light from the altar shone forth
  - when the light from the altar blazed in response
  lexicon: LSJ
  rationale: The genitive absolute marks attendant circumstance. ἀντιλάμπω can mean
    shine back, flash in return, or gleam responsively. 'Flashed back' preserves the
    anti- prefix better than a flat 'shone' while remaining intelligible.
- source_word: ἐδαπανήθη
  chosen: it was consumed
  alternatives:
  - it was used up
  - it was burned up
  - it was spent
  lexicon: LSJ
  rationale: δαπανάω in the passive means to be consumed or spent. In this fire context,
    'it was consumed' naturally refers to the flame and avoids adding an object not
    explicit in Greek.
