theological_decisions:
- issue: Referent of 'it was consumed' in the final clause
  chosen_reading: The implied referent is the previously mentioned flame.
  alternative_readings:
  - The fuel or offering was consumed
  - The water was consumed/evaporated
  rationale: The Greek passive ἐδαπανήθη has no explicit subject in the clause, so
    English must supply an implied referent. The nearest and most natural antecedent
    in the immediate syntax is φλόξ ('flame'). Because other contextual possibilities
    have been proposed from the broader narrative, the ambiguity is preserved in a
    footnote rather than resolved dogmatically in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
