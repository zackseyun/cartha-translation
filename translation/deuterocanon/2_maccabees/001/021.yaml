translation:
  text: When they reported to us that they had found no fire, but thick water, he
    ordered them to draw some out and bring it. Then, when the things for the sacrifices
    had been brought forward, Nehemiah ordered the priests to sprinkle the water on
    both the wood and what was laid on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dense water' or 'thick liquid.' The Greek expression is unusual and
      is kept fairly literal because the narrative turns on the substance's unexpected
      character.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'the things of the sacrifices,' an elliptical expression
      for the materials or items connected with the sacrificial offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεσάφησαν
  chosen: reported clearly
  alternatives:
  - explained
  - made clear
  - reported
  lexicon: LSJ
  rationale: The verb conveys making something clear or reporting distinctly. In smooth
    English narrative, 'reported' captures the sense; the adverbial force of clarity
    is implicit in the content clause.
- source_word: μὴ εὑρηκέναι πῦρ ἀλλὰ ὕδωρ παχύ
  chosen: had found no fire, but thick water
  alternatives:
  - did not find fire, but thick liquid
  - found not fire but dense water
  lexicon: LSJ
  rationale: This infinitival clause is the content of the report. 'Thick water' is
    a fairly literal rendering of ὕδωρ παχύ and preserves the unusual description
    important to the narrative.
- source_word: ἀποβλίψαντας
  chosen: draw some out
  alternatives:
  - scoop out
  - dip out
  - draw out
  lexicon: LSJ
  rationale: The participle likely refers to taking some of the liquid from the pit/reservoir.
    'Draw some out' is idiomatic and fits the context better than a more opaque literalism.
- source_word: ἀνηνέχθη τὰ τῶν θυσιῶν
  chosen: the things for the sacrifices had been brought forward
  alternatives:
  - the sacrificial materials had been brought up
  - the offerings had been set out
  lexicon: LSJ
  rationale: The phrase is somewhat elliptical. It refers not to the act of sacrifice
    already completed but to the items pertaining to the sacrifices being brought
    into place. 'Things for the sacrifices' preserves the breadth of the Greek without
    over-specifying.
- source_word: ἐπιρᾶναι
  chosen: to sprinkle
  alternatives:
  - to pour upon
  - to cast upon
  lexicon: LSJ
  rationale: In this ritual context the verb denotes applying liquid onto something.
    'Sprinkle' fits the cultic action and the likely quantity implied.
- source_word: τά τε ξύλα καὶ τὰ ἐπικείμενα
  chosen: both the wood and what was laid on it
  alternatives:
  - both the wood and the things lying on it
  - the wood and the pieces placed on top
  lexicon: LSJ
  rationale: ξύλα are the pieces of wood for the altar fire. τὰ ἐπικείμενα is intentionally
    broad, referring to what had been placed upon the wood, likely the sacrificial
    portions. 'What was laid on it' keeps the Greek's generality and avoids importing
    details not explicit in the text.
