theological_decisions:
- issue: Rendering of ἀδελφοῖς/ἀδελφοὶ in an epistolary address
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - brethren
  rationale: The Greek uses the masculine familial term repeatedly. Per doctrine,
    gender-accurate rendering is preferred over gender-neutral smoothing unless context
    clearly demands otherwise. Here the communal/familial address is best preserved
    as 'brothers.'
