translation:
  text: 'To the Jewish brothers in Egypt: the Jewish brothers in Jerusalem and those
    in the land of Judea send greetings, and good peace.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'greetings and good peace.' The Greek uses the conventional letter-greeting
      word χαίρειν ('greetings') followed by 'good peace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῖς ... Ἰουδαίοις
  chosen: To the Jewish brothers
  alternatives:
  - To the Jews
  - To the Jewish brethren
  lexicon: BDAG
  rationale: The dative phrase functions as the addressee line of a letter. ἀδελφοῖς
    is explicitly present and should be represented; 'brothers' preserves the masculine
    familial term per gender-accurate policy. 'Jewish' renders Ἰουδαίοις adjectivally
    in context.
- source_word: τοῖς κατʼ Αἴγυπτον
  chosen: in Egypt
  alternatives:
  - throughout Egypt
  - who are in Egypt
  lexicon: BDAG
  rationale: The phrase identifies location of the recipients. 'In Egypt' is natural
    English and sufficiently reflects κατʼ with a regional sense here without overtranslating.
- source_word: χαίρειν
  chosen: send greetings
  alternatives:
  - greetings
  - rejoice
  lexicon: BDAG
  rationale: In epistolary usage χαίρειν is a standard greeting formula. Because English
    lacks an exact infinitival letter formula, 'send greetings' makes the syntax clear
    and idiomatic while staying close to the source.
- source_word: οἱ ἀδελφοὶ οἱ ἐν Ἱεροσολύμοις Ἰουδαῖοι
  chosen: the Jewish brothers in Jerusalem
  alternatives:
  - the Jews in Jerusalem, your brothers
  - the brothers, the Jews in Jerusalem
  lexicon: BDAG
  rationale: The phrase names the senders. Keeping 'brothers' mirrors the source and
    preserves the familial solidarity emphasized by repetition of ἀδελφοί.
- source_word: καὶ οἱ ἐν τῇ χώρᾳ τῆς Ἰουδαίας
  chosen: and those in the land of Judea
  alternatives:
  - and those in the country of Judea
  - and those in Judea
  lexicon: BDAG
  rationale: χώρα commonly denotes land/country/region. 'Land of Judea' is slightly
    more formal and reflects the genitival construction without sounding archaic.
- source_word: εἰρήνην ἀγαθήν
  chosen: good peace
  alternatives:
  - peace and prosperity
  - abundant peace
  - peace that is good
  lexicon: BDAG
  rationale: The Greek gives a direct object after the greeting formula. 'Good peace'
    is somewhat marked in English, but it preserves both εἰρήνην and ἀγαθήν without
    importing broader ideas like prosperity. The unusual collocation may reflect Semitic-influenced
    epistolary style, so it is worth retaining rather than smoothing away entirely.
