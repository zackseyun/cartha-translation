translation:
  text: And the priests were singing the hymns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the priests sang the hymns.' The Greek imperfect verb can be rendered
      either as ongoing ('were singing') or as a simple past in English narrative
      style.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: LSJ
  rationale: δέ here functions as a mild connective advancing the narrative rather
    than marking a strong contrast, so simple 'And' gives natural English flow without
    overstating opposition.
- source_word: ἱερεῖς
  chosen: the priests
  alternatives:
  - priests
  lexicon: LSJ
  rationale: The article is present in Greek, and 'the priests' fits the specific
    group participating in the ritual scene.
- source_word: ἐπέψαλλον
  chosen: were singing
  alternatives:
  - sang
  - were chanting
  - kept singing
  lexicon: LSJ
  rationale: The imperfect verb depicts ongoing action. 'Were singing' preserves the
    progressive sense in idiomatic English. 'Were chanting' is possible given liturgical
    context, but 'singing' is the broader and less interpretively loaded choice.
- source_word: τοὺς ὕμνους
  chosen: the hymns
  alternatives:
  - hymns
  - songs of praise
  lexicon: LSJ
  rationale: ὕμνοι are hymns or songs of praise. 'The hymns' preserves both the article
    and the likely liturgical specificity of known praise songs in this context.
