theological_decisions:
- issue: Sense of ἱερὸν in relation to the site
  chosen_reading: 'predicative adjective: the king made the place sacred'
  alternative_readings:
  - 'substantive noun: the king made it a sanctuary/temple'
  rationale: The Greek lacks an article with ἱερὸν and reads naturally as a predicate
    complement after ἐποίησεν. This avoids implying construction of a full temple
    building when the text more simply states consecration of the enclosed site.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English'
