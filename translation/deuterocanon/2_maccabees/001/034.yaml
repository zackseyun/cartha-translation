translation:
  text: Then the king enclosed it and made it sacred, after testing the matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'made it a sanctuary.' The Greek can be taken either as predicative
      ('made it sacred') or substantivally ('made it a sanctuary').
    reason: lexical_alternative
lexical_decisions:
- source_word: περιφράξας
  chosen: enclosed
  alternatives:
  - fenced around
  - walled off
  - surrounded
  lexicon: LSJ
  rationale: Aorist participle from περιφράσσω, literally to fence in or enclose.
    'Enclosed' is natural English and preserves the concrete action without over-specifying
    the exact structure.
- source_word: ἱερὸν
  chosen: the place ... sacred
  alternatives:
  - a sanctuary
  - holy
  - sacred
  lexicon: LSJ
  rationale: Here ἱερόν functions predicatively with ἐποίησεν ('made [it] sacred/holy'),
    not necessarily as a noun meaning 'temple.' Rendering it as 'made it sacred' best
    fits the syntax and context of consecrating the site.
- source_word: ἐποίησεν
  chosen: made
  alternatives:
  - rendered
  - established
  lexicon: LSJ
  rationale: Standard sense 'made.' Combined with predicative ἱερόν, it yields the
    idiomatic English 'made it sacred.'
- source_word: δοκιμάσας
  chosen: after testing
  alternatives:
  - having tested
  - after proving
  - after examining
  lexicon: LSJ
  rationale: The participle indicates prior action relative to the main verb. 'After
    testing' communicates temporal sequence and the sense of verification.
- source_word: τὸ πρᾶγμα
  chosen: the matter
  alternatives:
  - the thing
  - the affair
  - the event
  lexicon: LSJ
  rationale: A broad term for the matter or affair under consideration. 'The matter'
    is idiomatic and suitably general in context, referring to the reported phenomenon
    that was verified.
