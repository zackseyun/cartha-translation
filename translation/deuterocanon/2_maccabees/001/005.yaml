theological_decisions:
- issue: Whether καταλλαγείη should be rendered in a way that implies emotional appeasement
    or restored relationship with God
  chosen_reading: be reconciled to you
  alternative_readings:
  - be appeased toward you
  - be favorable to you again
  rationale: The Greek supports restoration of favor after estrangement. 'Be reconciled'
    preserves that theological tension without specifying mechanism or reducing it
    merely to emotion.
  doctrine_reference: Preserve theological tension rather than resolve it.
