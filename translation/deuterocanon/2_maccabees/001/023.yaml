theological_decisions:
- issue: Liturgical comparison introduced by ὡς Νεεμίου
  chosen_reading: Render as an allusion to the manner/time of Nehemiah rather than
    a bare name
  alternative_readings:
  - as Nehemiah did
  - according to Nehemiah
  rationale: This is not a major doctrinal issue, but it affects how the historical-liturgical
    reference is understood. The Greek is compressed; the chosen rendering preserves
    the comparison without claiming more precision than the text gives.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity.
