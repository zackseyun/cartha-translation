id: 2MA.1.23
reference: 2 Maccabees 1:23
source:
  edition: lxx-swete-1909
  text: προσευχὴν δὲ ἐποιήσαντο οἱ ἱερεῖς δαπανωμένης τῆς θυσίας, οἵ τε ἱερεῖς καὶ
    πάντες, καταρχομένου Ἰωνάθον τῶν τε λοιπῶν ἐπιφωνούντων, ὡς Νεεμίου.
  language: Greek
  pages:
  - 685
  - 686
  - 687
  - 688
  - 689
  - 692
  - 732
  - 733
  confidence: high
  validation: agree
translation:
  text: And when the sacrifice had been consumed, the priests and all the others offered
    prayer, with Jonathan leading and the rest responding, as in Nehemiah's time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with Jonathan beginning and the rest calling out in response, as Nehemiah
      did.' The Greek is compressed at the end of the verse, and the exact force of
      the comparison to Nehemiah can be taken in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: προσευχὴν
  chosen: prayer
  alternatives:
  - a prayer
  - prayers
  lexicon: LSJ
  rationale: The singular noun naturally denotes the act/content of prayer here. English
    idiom prefers 'offered prayer' or 'made prayer'; 'prayer' keeps the formal sense
    without awkwardness.
- source_word: ἐποιήσαντο
  chosen: offered
  alternatives:
  - made
  - said
  lexicon: LSJ
  rationale: Literally 'they made' a prayer, but idiomatic English for performing
    prayer in a liturgical setting is 'offered.' This preserves the solemn register
    without paraphrasing beyond the Greek.
- source_word: δαπανωμένης
  chosen: had been consumed
  alternatives:
  - had been spent
  - had been used up
  - was finished
  lexicon: LSJ
  rationale: From δαπανάω, 'to spend/use up/consume.' In context of a sacrifice, 'consumed'
    best conveys that the sacrificial material had been used up/burned through, more
    specifically than the vague 'finished.'
- source_word: τῆς θυσίας
  chosen: the sacrifice
  alternatives:
  - the offering
  lexicon: LSJ
  rationale: θυσία commonly means 'sacrifice' or sacrificial offering. 'Sacrifice'
    is the more direct and standard rendering in this cultic context.
- source_word: οἱ ἱερεῖς
  chosen: the priests
  lexicon: LSJ
  rationale: Straightforward rendering of the priestly group.
- source_word: πάντες
  chosen: all the others
  alternatives:
  - everyone
  - all
  lexicon: LSJ
  rationale: Because the Greek first names 'the priests' and then adds 'and all,'
    English benefits from making explicit that the second phrase extends beyond the
    priests. 'All the others' reflects the distributive sense in context without over-specifying
    the group.
- source_word: καταρχομένου
  chosen: leading
  alternatives:
  - beginning
  - starting the chant
  - taking the lead
  lexicon: LSJ
  rationale: The participle suggests initiating or leading the liturgical action.
    Since the rest are said to be responding, 'leading' best captures the antiphonal
    setting.
- source_word: Ἰωνάθον
  chosen: Jonathan
  alternatives:
  - Jonathas
  lexicon: LSJ
  rationale: Standard English transliteration of the personal name.
- source_word: ἐπιφωνούντων
  chosen: responding
  alternatives:
  - calling out
  - joining in acclamation
  - chanting in reply
  lexicon: LSJ
  rationale: The compound verb implies calling out after or in response. Given the
    liturgical scene, 'responding' is concise and fits antiphonal prayer.
- source_word: ὡς Νεεμίου
  chosen: as in Nehemiah's time
  alternatives:
  - as Nehemiah did
  - as of Nehemiah
  lexicon: LSJ
  rationale: The compressed Greek likely alludes to the pattern associated with Nehemiah
    rather than merely naming him without relation. 'As in Nehemiah's time' makes
    the comparison intelligible in English while staying close to the apparent sense.
