translation:
  text: And when the priests of Nanea had set these things out, and he had come with
    a few men into the enclosure of the temple precinct, they shut the temple as soon
    as Antiochus entered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Ναναίου may be represented in English as 'Nanea' or 'Nanaia.' The
      main text keeps the form closest to the Greek witness used here.
    reason: lexical_alternative
lexical_decisions:
- source_word: προθεμένων
  chosen: had set ... out
  alternatives:
  - had displayed
  - had placed before
  lexicon: LSJ
  rationale: Aorist participle of προτίθημι here refers to putting items forward/presenting
    them, likely the offerings or treasures mentioned in context. 'Set ... out' is
    natural English that preserves the concrete action without overinterpreting.
- source_word: αὐτά
  chosen: these things
  alternatives:
  - them
  lexicon: LSJ
  rationale: The pronoun lacks an explicit noun in this verse; 'these things' preserves
    the referential openness better than a bare 'them' in English and avoids importing
    a specific object.
- source_word: τῶν ἱερέων τοῦ Ναναίου
  chosen: the priests of Nanea
  alternatives:
  - Nanean priests
  - the priests of Nanaia
  lexicon: LSJ
  rationale: The genitive construction is most straightforwardly rendered 'the priests
    of Nanea.' The divine name appears in varying English forms; 'Nanea' stays close
    to the Greek form Ναναίου in Swete.
- source_word: προσελθόντος
  chosen: had come
  alternatives:
  - approached
  - came near
  lexicon: LSJ
  rationale: The participle indicates Antiochus' movement into the precinct. 'Had
    come' fits the temporal sequence smoothly in English; 'approached' could suggest
    he had not yet entered.
- source_word: μετʼ ὀλίγων
  chosen: with a few men
  alternatives:
  - with a few
  - with only a few
  lexicon: LSJ
  rationale: English normally supplies 'men' from context, since Antiochus is entering
    with a small party. This is a modest contextual completion rather than a paraphrase.
- source_word: περίβολον
  chosen: enclosure
  alternatives:
  - court
  - precinct
  lexicon: LSJ
  rationale: περίβολος denotes the enclosed area around a sacred structure. 'Enclosure'
    is precise and avoids prematurely identifying the exact architectural feature
    as a 'court' if the Greek is broader.
- source_word: τέμενος
  chosen: sanctuary
  alternatives:
  - sacred precinct
  - temple precinct
  lexicon: LSJ
  rationale: τέμενος is a sacred precinct or sanctuary. In the phrase 'the enclosure
    of the sanctuary,' this preserves the layered spatial language of the Greek.
- source_word: συγκλείσαντες τὸ ἱερόν
  chosen: they shut the temple
  alternatives:
  - they closed the sanctuary
  - they shut the shrine
  lexicon: LSJ
  rationale: ἱερόν commonly denotes the temple/shrine complex. 'Shut the temple' is
    idiomatic and matches the narrative action of trapping Antiochus inside.
- source_word: ὡς εἰσῆλθεν
  chosen: as soon as ... entered
  alternatives:
  - when ... entered
  - after ... entered
  lexicon: LSJ
  rationale: ὡς with the aorist here is temporal, marking the immediate moment of
    action. 'As soon as' best captures the suddenness of the priests' response.
- source_word: Ἀντίοχος
  chosen: Antiochus
  rationale: Standard English transliteration of the proper name.
