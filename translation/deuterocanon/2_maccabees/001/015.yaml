  text: καὶ προθεμένων αὐτὰ τῶν ἱερέων τοῦ Ναναίου, κἀκεῖνον προσελθόντος μετʼ ὀλίγων
    εἰς τὸν περίβολον τοῦ τεμένους, συγκλείσαντες τὸ ἱερόν, ὡς εἰσῆλθεν Ἀντίοχος,
  language: Greek
