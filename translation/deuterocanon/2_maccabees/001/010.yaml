translation:
  text: in the eighty-eighth year, in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek here is a brief dating/location line: literally, ''of the eighty-eighth
      year, in Jerusalem.'' The English supplies ''in the'' to make the date formula
      idiomatic.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτους
  chosen: in the ... year
  alternatives:
  - year
  - of the year
  lexicon: LSJ
  rationale: Genitive of time/date formula; in English this is most naturally rendered
    adverbially as a dating phrase, 'in the ... year,' rather than a bare genitive.
- source_word: ὀγδοηκοστοῦ καὶ ὀγδόου
  chosen: eighty-eighth
  alternatives:
  - eighty and eighth
  - the eighty-eighth
  lexicon: LSJ
  rationale: The Greek expresses the ordinal analytically ('eightieth and eighth'),
    a standard way to mean 'eighty-eighth.' English idiom prefers the compounded ordinal.
- source_word: ἐν Ἱεροσολύμοις
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  - among those in Jerusalem
  lexicon: LSJ
  rationale: Ἱεροσόλυμα is a plural-form place name in Greek, but standard English
    renders the toponym in the singular as 'Jerusalem.' The preposition ἐν is straightforwardly
    locative here.
