theological_decisions:
- issue: Sense of divine action in ἔδωκεν with hostile object
  chosen_reading: God is praised for handing over the wicked to judgment/defeat.
  alternative_readings:
  - God gave us the wicked
  - God gave the wicked over in a more general sense
  rationale: The bare Greek object leaves the recipient implicit, but in context the
    thanksgiving concerns deliverance from enemies. Rendering 'gave over' preserves
    the likely sense without over-specifying the recipient in the main text.
  doctrine_reference: Translation philosophy §1, §3
