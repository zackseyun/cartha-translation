theological_decisions:
- issue: Implied object of ἐξυβρίζοντας
  chosen_reading: Make the object explicit as 'us' in English
  alternative_readings:
  - 'leave the object implicit: ''those who oppress and insolently abuse in their
    pride'''
  - 'supply a generic object: ''those who oppress and abuse others in their pride'''
  rationale: The verse is part of a communal prayer, and the participles describe
    hostile actions against the praying community. English normally requires or strongly
    expects an object with 'abuse'; supplying 'us' makes the sense clear without adding
    a new theological claim.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English'
