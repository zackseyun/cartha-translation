theological_decisions:
- issue: Agency of deliverance
  chosen_reading: God is explicitly the agent who saved the writers from dangers.
  rationale: The Greek states ὑπὸ τοῦ θεοῦ σεσωσμένοι; the translation preserves direct
    divine agency without softening it into a vague providential statement.
  doctrine_reference: Translation philosophy §1 original-language primacy
