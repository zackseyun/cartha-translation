translation:
  text: And from those men the king received many different gifts, and distributed
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many various things.' The Greek does not state the object explicitly;
      'gifts' is supplied from the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷς
  chosen: from those men
  alternatives:
  - from whom
  - to whom
  - those
  lexicon: LSJ
  rationale: The relative pronoun in context refers back to the persons just mentioned,
    and with ἐλάμβανεν naturally yields the sense 'from whom' or 'from those men.'
    English makes the implied preposition explicit for clarity.
- source_word: πολλὰ διάφορα
  chosen: many different gifts
  alternatives:
  - many various things
  - many diverse offerings
  - many different presents
  lexicon: LSJ
  rationale: διάφορα means 'different, various, diverse.' Because ἐλάμβανεν here takes
    an unstated object from the context of royal benefaction, 'gifts' is supplied
    in English to avoid an awkward bare 'things' and to fit the narrative sense.
- source_word: ἐλάμβανεν
  chosen: received
  alternatives:
  - took
  - was receiving
  lexicon: LSJ
  rationale: λαμβάνω commonly means 'receive' or 'take.' In this context of the king
    accepting items from others, 'received' is more idiomatic and less forceful than
    'took.' The imperfect is rendered as simple past in English narrative style.
- source_word: μετεδίδου
  chosen: distributed
  alternatives:
  - shared out
  - gave portions
  - passed on
  lexicon: LSJ
  rationale: μεταδίδωμι conveys giving a share or distributing. 'Distributed' best
    captures the idea of the king passing on what he had received.
