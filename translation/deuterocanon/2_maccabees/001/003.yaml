id: 2MA.1.3
reference: 2 Maccabees 1:3
source:
  edition: lxx-swete-1909
  text: καὶ δοίη ὑμῖν καρδίαν πίστιν εἰς τὸ σέβεσθαι αὐτὸν καὶ ποιεῖν αὐτοῦ τὰ θελήματα
    καρδίᾳ μεγάλῃ καὶ ψυχῇ βουλομένῃ·
  language: Greek
