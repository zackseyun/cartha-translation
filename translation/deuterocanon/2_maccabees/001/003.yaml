translation:
  text: and may he give you a faithful heart to worship him and to do his will with
    a great heart and a willing soul;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a heart of faith' or 'a believing heart.' The Greek phrase καρδίαν πίστιν
      can be understood as emphasizing faith or faithfulness; the main text chooses
      'faithful heart' because the context stresses worship and obedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοίη
  chosen: may he give
  alternatives:
  - let him give
  - may God give
  lexicon: LSJ
  rationale: Optative of wish/prayer; rendered with English 'may' to preserve the
    benedictory force without over-specifying the subject beyond the context.
- source_word: καρδίαν πίστιν
  chosen: a faithful heart
  alternatives:
  - a believing heart
  - a heart of faith
  lexicon: LSJ
  rationale: πίστιν here modifies καρδίαν and most naturally conveys fidelity/steadfastness
    in a context of worship and obedience ('to worship him and to do his will'). 'Faithful
    heart' preserves the moral-religious sense better than the more abstract 'heart
    of faith.'
- source_word: σέβεσθαι
  chosen: to worship
  alternatives:
  - to revere
  - to honor religiously
  lexicon: LSJ
  rationale: The verb denotes reverent religious devotion. 'Worship' is the clearest
    modern English equivalent in this prayer context.
- source_word: τὰ θελήματα
  chosen: his will
  alternatives:
  - his wishes
  - the things he wills
  lexicon: LSJ
  rationale: Plural in Greek, but idiomatic English commonly uses the singular collective
    'his will' for divine volition. This preserves meaning while reading naturally.
- source_word: καρδίᾳ μεγάλῃ
  chosen: with a great heart
  alternatives:
  - with a whole heart
  - with a noble heart
  - with a magnanimous heart
  lexicon: LSJ
  rationale: A relatively literal rendering preserves the imagery of the Greek. 'Whole
    heart' would be smoother but imports a different idiom; 'great heart' conveys
    largeness of devotion or nobility without over-interpreting.
- source_word: ψυχῇ βουλομένῃ
  chosen: a willing soul
  alternatives:
  - a willing life
  - an eager soul
  - a soul that is willing
  lexicon: LSJ
  rationale: βουλομένῃ expresses willing intention or readiness. 'Soul' keeps the
    anthropological language of ψυχή, and 'willing' captures the participial sense
    succinctly.
