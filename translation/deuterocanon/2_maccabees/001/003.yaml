theological_decisions:
- issue: Rendering of πίστις-family language in a non-Pauline devotional context
  chosen_reading: faithful heart
  alternative_readings:
  - heart of faith
  - believing heart
  rationale: DOCTRINE.md gives 'faith' as the default for πίστις, with alternatives
