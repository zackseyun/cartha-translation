id: 2MA.1.31
reference: 2 Maccabees 1:31
source:
  edition: lxx-swete-1909
  text: καθὼς δὲ ἀνηλώθη τὰ τῆς θυσίας, καὶ τὸ περιλειπόμενον ὕδωρ ὁ Νεεμίας ἐκέλευσεν
    λίθους μείζονας καταχεῖν.
  language: Greek
  pages:
  - 685
  - 686
  - 687
  - 688
  - 689
  - 692
  - 732
  - 733
  confidence: high
  validation: agree
translation:
  text: And when the things of the sacrifice had been consumed, Nehemiah ordered the
    remaining water to be poured on larger stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'the sacrificial materials.' The Greek phrase is broader
      than a simple singular 'the sacrifice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνηλώθη
  chosen: had been consumed
  alternatives:
  - was used up
  - was spent
  - was burned up
  lexicon: LSJ
  rationale: Aorist passive of ἀναλίσκω/ἀναλόω in context refers to the sacrificial
    materials being used up by the fire. 'Had been consumed' is natural English and
    preserves the result without over-specifying the mechanism beyond the sacrificial
    context.
- source_word: τὰ τῆς θυσίας
  chosen: the things of the sacrifice
  alternatives:
  - the sacrificial materials
  - the sacrifice
  - the offerings
  lexicon: LSJ
  rationale: The neuter plural with genitive is broader than simply 'the sacrifice'
    as an event; it refers to the items belonging to the sacrifice. The English keeps
    that breadth while remaining readable.
- source_word: τὸ περιλειπόμενον ὕδωρ
  chosen: the remaining water
  alternatives:
  - the water that was left over
  - the leftover water
  lexicon: LSJ
  rationale: Straightforward participial phrase indicating water left after the preceding
    action. 'Remaining water' is concise and idiomatic.
- source_word: ἐκέλευσεν
  chosen: ordered
  alternatives:
  - commanded
  - directed
  lexicon: LSJ
  rationale: The verb denotes giving an authoritative instruction. 'Ordered' fits
    the narrative tone and Nehemiah's leadership role.
- source_word: λίθους μείζονας
  chosen: larger stones
  alternatives:
  - great stones
  - big stones
  lexicon: LSJ
  rationale: Comparative adjective μείζονας is best represented as 'larger.' 'Great
    stones' could suggest importance rather than size.
- source_word: καταχεῖν
  chosen: to be poured on
  alternatives:
  - to pour over
  - to pour upon
  lexicon: LSJ
  rationale: 'The infinitive means ''to pour down/upon.'' English passive infinitive
    after ''ordered'' conveys the sense smoothly: he ordered the water to be poured
    on the stones.'
