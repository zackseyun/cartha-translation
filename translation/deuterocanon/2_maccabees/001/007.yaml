theological_decisions:
- issue: Sense of ἀπέστη in relation to Jason
  chosen_reading: Rendered as 'revolted' to preserve both political defection and
    covenantal betrayal without narrowing to purely religious apostasy.
  alternative_readings:
  - apostatized
  - defected
  - departed
  rationale: The verse recounts a crisis tied to Jason's break with the holy land
    and the kingdom. A purely religious term like 'apostatized' may over-specify,
    while 'departed' is too weak. 'Revolted' keeps the gravity and public dimension
    of the act.
  doctrine_reference: Preserve theological tension rather than resolve it.
