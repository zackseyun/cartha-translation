  text: βασιλεύοντος Δημητρίου, ἔτους ἑκατοστοῦ ἑξηκοστοῦ ἐνάτου, ἡμεῖς οἱ Ἰουδαῖοι
    γεγράφαμεν ὑμῖν ἐν τῇ θλίψει καὶ ἐν τῇ ἀκμῇ τῇ ἐπελθούσῃ ἡμῖν ἐν τοῖς ἔτεσιν τούτοις,
    ἀφʼ οὗ ἀπέστη Ἰάσων καὶ οἱ μετʼ αὐτοῦ ἀπὸ τῆς ἁγίας γῆς καὶ τῆς βασιλείας.
  language: Greek
