id: 2MA.1.14
reference: 2 Maccabees 1:14
source:
  edition: lxx-swete-1909
  text: ὡς γὰρ συνοικῶν αὐτῇ παρεγένετο εἰς τὸν τόπον ὅ τε Ἀντίοχος καὶ οἱ σὺν αὐτῷ
    φίλοι, χάριν τοῦ λαβεῖν τὰ χρήματα πλείονα εἰς φερνῆς λόγον·
  language: Greek
  pages:
  - 685
  - 686
  - 687
  - 688
  - 689
  - 692
  - 732
  - 733
  confidence: high
  validation: minor_mismatch
translation:
  text: For when Antiochus and his friends who were with him arrived at the place
    as though to marry her, in order to get the money in large amount as a dowry payment,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to live with her' / 'to wed her.' The Greek participle συνοικῶν can
      refer to living together or entering marriage; here it likely reflects the pretense
      of marrying the goddess in order to seize temple funds.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνοικῶν
  chosen: as though to marry her
  alternatives:
  - to live with her
  - cohabiting with her
  - to wed her
  lexicon: LSJ
  rationale: The participle from συνοικέω can denote living together or entering marriage.
    In this narrative context, Antiochus is approaching the temple under the pretense
    of marrying the goddess, so an idiomatic English rendering that signals intended
    marriage best fits the sense. 'As though' is supplied because the action is pretense
    within the story, not a literal marriage report.
- source_word: παρεγένετο
  chosen: arrived
  alternatives:
  - came
  - presented himself
  lexicon: BDAG
  rationale: A straightforward narrative verb of coming/arrival. 'Arrived' reads naturally
    in English and fits movement to a place.
- source_word: ὅ τε Ἀντίοχος καὶ οἱ σὺν αὐτῷ φίλοι
  chosen: Antiochus and his friends who were with him
  alternatives:
  - Antiochus and the friends with him
  - Antiochus and his companions
  lexicon: LSJ
  rationale: Retains the explicit coordination and the phrase σὺν αὐτῷ. 'Friends'
    is literal for φίλοι, though in Hellenistic court usage it can imply royal companions
    or officials; the simpler rendering is sufficient here.
- source_word: χάριν τοῦ λαβεῖν
  chosen: in order to get
  alternatives:
  - for the sake of receiving
  - to obtain
  lexicon: BDAG
  rationale: This construction expresses purpose. 'In order to get' is clear modern
    English without losing the purposive force.
- source_word: τὰ χρήματα πλείονα
  chosen: the money in large amount
  alternatives:
  - a great sum of money
  - more money
  - the larger amount of money
  lexicon: LSJ
  rationale: πλείονα literally means 'more' or 'greater,' but in context it refers
    to a substantial sum expected from the temple treasury. 'In large amount' preserves
    the comparative/quantitative force without over-specifying beyond the Greek.
- source_word: εἰς φερνῆς λόγον
  chosen: as a dowry payment
  alternatives:
  - for a dowry
  - under the pretext of a dowry
  - by way of dowry
  lexicon: LSJ
  rationale: φερνή is 'dowry'; λόγος in this idiom conveys reckoning/account/category.
    The phrase means money taken in the capacity or on the account of a dowry. 'As
    a dowry payment' is concise and idiomatic.
