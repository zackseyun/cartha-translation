translation:
  text: And now, celebrate the days of the Festival of Booths in the month of Chislev.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the Feast of Tabernacles.'
    reason: lexical_alternative
  - marker: b
    text: Chislev corresponds roughly to November–December in the Jewish calendar.
    reason: cultural_note
lexical_decisions:
- source_word: ἄγητε
  chosen: celebrate
  alternatives:
  - keep
  - observe
  - lead/pass
  lexicon: LSJ
  rationale: From ἄγω in an idiom with ἡμέρας, the sense is to keep or celebrate festival
    days, not literally 'lead' them. 'Celebrate' is natural modern English and fits
    the festive context.
- source_word: τὰς ἡμέρας
  chosen: the days
  alternatives:
  - the festival days
  lexicon: LSJ
  rationale: A direct rendering preserves the Greek expression. In English, the phrase
    works idiomatically with 'celebrate' and retains the temporal focus of the command.
- source_word: τῆς σκηνοπηγίας
  chosen: of the Festival of Booths
  alternatives:
  - of Tabernacles
  - of Booths
  lexicon: LSJ
  rationale: The noun denotes the Jewish feast of booths/tabernacles. 'Festival of
    Booths' translates the meaning rather than preserving the traditional but less
    transparent 'Tabernacles.'
- source_word: τοῦ Χασελεὺ μηνός
  chosen: in the month of Chislev
  alternatives:
  - of the month Chislev
  - in the month Kislev
  lexicon: LSJ
  rationale: The Greek places the month name in genitive relation to the feast phrase;
    idiomatic English expresses this as 'in the month of Chislev.' 'Chislev' closely
    reflects the Greek transliteration Χασελεύ in the source witness.
