translation:
  text: But he quickly selected Nicanor son of Patroclus, one of his chief Friends,
    and sent him, having assigned to him no fewer than twenty thousand from nations
    of every kind to wipe out the whole Jewish race. They also appointed with him
    Gorgias, a man who was a general and experienced in matters of war,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of the first Friends,' likely a court title for a high-ranking royal
      associate rather than merely a personal friend.
    reason: lexical_alternative
  - marker: b
    text: The Greek phrase rendered 'from the nations of every tribe' is unusual and
      may mean ethnically mixed forces or peoples of every sort.
    reason: lexical_alternative
  - marker: c
    text: Or 'to root out the whole nation of Judea.'
    reason: alternative_reading
lexical_decisions:
- source_word: προχειρισάμενος
  chosen: selected
  alternatives:
  - appointed
  - chose beforehand
  - designated
  lexicon: LSJ
  rationale: The participle indicates choosing or appointing someone for a task. 'Selected'
    is natural English and preserves the sense without overformal wording.
- source_word: τῶν πρώτων φίλων
  chosen: one of his chief Friends
  alternatives:
  - one of the first Friends
  - one of his leading companions
  lexicon: LSJ
  rationale: In Hellenistic court language φίλοι can function as a quasi-technical
    title for royal associates. Capitalizing 'Friends' helps signal this is more than
    ordinary friendship, while 'chief' conveys πρῶτοι idiomatically.
- source_word: ὑποτάξας
  chosen: assigning to him
  alternatives:
  - placing under him
  - subordinating to him
  lexicon: LSJ
  rationale: The sense here is placing troops/peoples under Nicanor's command. 'Assigning
    to him' communicates military delegation clearly in modern English.
- source_word: παμφύλων ἔθνη
  chosen: from the nations of every tribe
  alternatives:
  - all-tribed nations
  - peoples of every kind
  - mixed nations
  lexicon: LSJ
  rationale: παμφύλων is unusual and suggests many tribal stocks or all sorts of peoples.
    The phrase likely describes ethnically varied forces. 'From the nations of every
    tribe' preserves the breadth without paraphrasing into a modern idiom.
- source_word: οὐκ ἐλάττους τῶν δισμυρίων
  chosen: no fewer than twenty thousand
  alternatives:
  - not less than twenty thousand
  lexicon: LSJ
  rationale: A straightforward quantitative idiom; 'no fewer than' is idiomatic modern
    English and accurately reflects the Greek comparative construction.
- source_word: τὸ πᾶν τῆς Ἰουδαίας ἐξᾶραι γένος
  chosen: to wipe out the whole Jewish people
  alternatives:
  - to root out the entire race of Judea
  - to destroy the whole nation of Judea
  lexicon: LSJ
  rationale: ἐξᾶραι here carries the force of removing utterly or exterminating. γένος
    refers to the people/group rather than merely a biological 'race.' 'Jewish people'
    is clear and faithful to the referent.
- source_word: συνέστησαν δὲ αὐτῷ καὶ Γοργίαν
  chosen: They also appointed with him Gorgias
  alternatives:
  - They also associated Gorgias with him
  - They also assigned Gorgias to him
  lexicon: LSJ
  rationale: The verb here means to place or appoint someone alongside another. 'Appointed
    with him' preserves the collaborative military arrangement.
- source_word: ἄνδρα στρατηγόν
  chosen: a military man
  alternatives:
  - a general
  - a commander
  lexicon: LSJ
  rationale: The Greek apposition identifies Gorgias as a man of military rank or
    character. Because στρατηγός can be title-like but the phrase is somewhat descriptive
    here, 'a military man' keeps the wording broad while the next clause clarifies
    his competence.
- source_word: εὖ πολεμικαῖς χρείαις ἔχοντα πεῖραν
  chosen: experienced in matters of war
  alternatives:
  - well experienced in military affairs
  - having skill in the needs of war
  lexicon: LSJ
  rationale: The phrase emphasizes practical military experience. 'Experienced in
    matters of war' is readable and preserves the concrete sense of tested competence.
