theological_decisions:
- issue: Rendering γένος in an ethnic-national context
  chosen_reading: Jewish people
  alternative_readings:
  - race
  - nation
  - stock
  rationale: The verse concerns an intended extermination of the Jews as a people.
    'Jewish people' avoids misleading modern biological connotations of 'race' while
    preserving the collective ethnic sense.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
