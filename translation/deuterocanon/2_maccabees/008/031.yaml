translation:
  text: After carefully stripping them of their arms, they stored everything in the
    proper places, but they carried the rest of the spoils to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'collecting their weapons from them.' The Greek participle can emphasize
      either disarming the fallen or gathering up their arms.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁπλολογήσαντες
  chosen: stripping them of their arms
  alternatives:
  - collecting their weapons
  - disarming them
  lexicon: LSJ
  rationale: The participle is built on ὅπλον and denotes taking or gathering arms
    from the defeated. 'Stripping them of their arms' preserves the concrete sense
    and fits the object αὐτούς better than a looser 'collecting weapons.'
- source_word: ἐπιμελῶς
  chosen: carefully
  alternatives:
  - diligently
  - with care
  lexicon: LSJ
  rationale: Adverb indicating careful, attentive action. 'Carefully' is natural modern
    English and preserves the manner of the action.
- source_word: πάντα συνέθηκαν
  chosen: they stored everything
  alternatives:
  - they put everything together
  - they deposited everything
  lexicon: LSJ
  rationale: In context with εἰς τοὺς ἐπικαίρους τόπους, the sense is not merely assembling
    but placing in storage or deposit. 'Stored everything' conveys the practical action
    clearly.
- source_word: εἰς τοὺς ἐπικαίρους τόπους
  chosen: in the proper places
  alternatives:
  - in suitable places
  - in strategic places
  - in convenient places
  lexicon: LSJ
  rationale: ἐπίκαιρος can mean suitable, fitting, or opportune. Here the phrase most
    naturally refers to appropriate locations for keeping the seized arms and goods.
    'Proper places' is concise and contextually apt.
- source_word: τὰ δὲ λοιπὰ τῶν σκύλων
  chosen: the rest of the spoils
  alternatives:
  - the remaining plunder
  - the rest of the booty
  lexicon: LSJ
  rationale: σκῦλα refers to spoils taken in war. 'Spoils' is a standard, readable
    rendering. λοιπά marks the remainder after what had been stored.
- source_word: ἤνεγκαν εἰς Ἰεροσόλυμα
  chosen: they carried ... to Jerusalem
  alternatives:
  - they brought ... to Jerusalem
  lexicon: LSJ
  rationale: φέρω in aorist here denotes physical transport. 'Carried' keeps the concrete
    sense, though 'brought' would also be possible.
