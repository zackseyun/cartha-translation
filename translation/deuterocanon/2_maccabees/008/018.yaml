theological_decisions:
- issue: Rendering the divine title παντοκράτωρ
  chosen_reading: God Almighty
  alternative_readings:
  - the Almighty God
  - the all-powerful God
  rationale: The title identifies God's supreme power as the basis for Israel's confidence.
    'God Almighty' is idiomatic English and preserves the theological force of the
    title without flattening it into a mere adjective.
  doctrine_reference: 'DOCTRINE.md: Translate titles; readable modern English.'
- issue: Scope of κόσμος in the statement of divine power
  chosen_reading: the whole world
  alternative_readings:
  - the whole universe
  rationale: The verse uses expansive rhetoric to emphasize God's absolute power.
    'World' preserves the common sense of κόσμος here while leaving the statement's
    cosmic breadth intact.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English.'
