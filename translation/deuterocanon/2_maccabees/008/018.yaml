id: 2MA.8.18
reference: 2 Maccabees 8:18
source:
  edition: lxx-swete-1909
  text: οἱ μὲν γὰρ ὅπλοις πεποίθασιν ἅμα καὶ τόλμαις, ἔφησεν, ἡμεῖς δὲ ἐπὶ τῷ παντοκράτορι
    θεῷ, δυναμένῳ καὶ τοὺς ἐρχομένους ἐφʼ ἡμᾶς καὶ τὸν ὅλον κόσμον ἑνὶ νεύματι καταβαλεῖν,
    πεποίθαμεν.
