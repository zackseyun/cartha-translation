translation:
  text: For they, he said, have put their confidence in weapons and boldness, but
    we have put our confidence in Almighty God, who is able with a single nod to bring
    down both those coming against us and the whole world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with one gesture' or 'with a single sign.' The Greek literally refers
      to a nod or signal, emphasizing how effortlessly God can overthrow enemies.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπλοις
  chosen: weapons
  alternatives:
  - arms
  lexicon: LSJ
  rationale: ὅπλα denotes implements of war here; 'weapons' is clear modern English
    and fits the military context better than the slightly archaic 'arms'.
- source_word: τόλμαις
  chosen: boldness
  alternatives:
  - daring
  - audacity
  lexicon: LSJ
  rationale: The term conveys courage or daring in battle. 'Boldness' preserves the
    positive force in context without overstating it as reckless 'audacity'.
- source_word: ἐπὶ τῷ παντοκράτορι θεῷ
  chosen: in God Almighty
  alternatives:
  - on the Almighty God
  - in the Almighty God
  lexicon: LSJ
  rationale: With πεποίθαμεν, ἐπί plus dative expresses the basis of confidence. 'In
    God Almighty' is idiomatic English while preserving παντοκράτωρ as the divine
    title 'Almighty'.
- source_word: παντοκράτορι
  chosen: Almighty
  alternatives:
  - all-powerful
  - all-ruling
  lexicon: LSJ
  rationale: As a divine title, 'Almighty' is the established and natural English
    equivalent, preserving theological weight without awkward literalism.
- source_word: δυναμένῳ
  chosen: who is able
  alternatives:
  - being able
  - who can
  lexicon: LSJ
  rationale: The participle modifies God and explains the ground of confidence. 'Who
    is able' is smooth and faithful.
- source_word: τοὺς ἐρχομένους ἐφʼ ἡμᾶς
  chosen: those coming against us
  alternatives:
  - those advancing on us
  - those attacking us
  lexicon: LSJ
  rationale: The phrase literally describes those coming upon/against them. 'Coming
    against us' preserves the motion and hostile sense without overinterpreting the
    exact stage of attack.
- source_word: τὸν ὅλον κόσμον
  chosen: the whole world
  alternatives:
  - the entire universe
  - all the world
  lexicon: LSJ
  rationale: κόσμος can mean world or ordered universe. In this rhetorical statement
    of divine power, 'the whole world' is the most natural English rendering and preserves
    the scope.
- source_word: ἑνὶ νεύματι
  chosen: with a single nod
  alternatives:
  - with one gesture
  - with a single sign
  lexicon: LSJ
  rationale: νεῦμα denotes a nod or sign. 'With a single nod' vividly preserves the
    idiom of effortless divine action better than the more generic 'gesture' or 'sign'.
- source_word: καταβαλεῖν
  chosen: to bring down
  alternatives:
  - to cast down
  - to overthrow
  lexicon: LSJ
  rationale: The verb means to throw down or bring low. 'Bring down' is natural English
    and fits both the immediate enemies and the hyperbolic reference to the whole
    world.
- source_word: πεποίθασιν / πεποίθαμεν
  chosen: have put their confidence / have put our confidence
  alternatives:
  - trust
  - rely
  lexicon: LSJ
  rationale: The perfect forms express settled confidence. Rendering both clauses
    with 'have put ... confidence' preserves the parallelism and completed-yet-enduring
    sense better than a simple present 'trust'.
