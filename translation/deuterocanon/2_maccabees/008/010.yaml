theological_decisions:
- issue: Interpretation of the dative phrase τοῖς ις Ῥωμαίοις
  chosen_reading: the tribute is understood as owed by the king to the Romans
  alternative_readings:
  - the tribute to the king, for the Romans
  rationale: The Greek is compressed, but in context Nikanor is promising to raise
    funds to cover the king's Roman tribute by selling Jewish captives. Rendering
    the relation explicitly in English avoids obscurity while reflecting the likely
    sense of the clause.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense over wooden tradition.'
