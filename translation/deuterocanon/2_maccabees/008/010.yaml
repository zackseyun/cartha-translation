translation:
  text: But Nikanor undertook to pay the tribute to the king, owed to the Romans,
    amounting to two thousand talents, from the captivity of the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the tribute to the king, for the Romans.' The Greek
      is compact; the sense is that Nikanor proposed to meet the king's obligation
      to Rome from the Jews' capture.
    reason: alternative_reading
  - marker: b
    text: That is, by taking Jews captive and profiting from their sale or ransom.
    reason: cultural_note
lexical_decisions:
- source_word: ἰδιωτεύσατο
  chosen: undertook
  alternatives:
  - made it his private undertaking
  - took it upon himself
  - contracted
  lexicon: LSJ
  rationale: The verb here conveys that Nikanor personally took on or assumed the
    obligation. 'Undertook' is idiomatic modern English and preserves the sense of
    assuming responsibility without overinterpreting the precise administrative nuance.
- source_word: φόρον
  chosen: tribute
  alternatives:
  - tax
  - levy
  lexicon: LSJ
  rationale: φόρος commonly denotes tribute or tax paid to a superior power. 'Tribute'
    fits the political-imperial context better than the more generic 'tax'.
- source_word: τῷ βασιλεῖ
  chosen: to the king
  lexicon: LSJ
  rationale: A straightforward dative of recipient; no reason to expand beyond the
    Greek.
- source_word: τοῖς ις Ῥωμαίοις
  chosen: owed to the Romans
  alternatives:
  - for the Romans
  - to the Romans
  lexicon: LSJ
  rationale: The phrase identifies the tribute as connected with the Romans; in context
    it is the payment the king owes to Rome. Rendering it 'owed to the Romans' makes
    the relationship clear in English while staying close to the sense.
- source_word: ὄντα
  chosen: amounting to
  alternatives:
  - being
  - which was
  lexicon: LSJ
  rationale: The participle links the tribute with its quantified value. 'Amounting
    to' is natural English for a monetary sum.
- source_word: τάλαντων δισχιλίων
  chosen: two thousand talents
  lexicon: LSJ
  rationale: A direct rendering of the monetary amount; 'talents' is retained rather
    than converted into modern currency.
- source_word: ἐκ τῆς τῶν Ἰουδαίων αἰχμαλωσίας
  chosen: from the captivity of the Jews
  alternatives:
  - from the enslavement of the Jews
  - from taking the Jews captive
  - from Jewish captives
  lexicon: LSJ
  rationale: 'The phrase indicates the source from which Nikanor planned to raise
    the money: by the Jews'' capture/captivity. ''From the captivity of the Jews''
    stays close to the Greek while preserving the grim sense of profit from their
    seizure.'
- source_word: ἐκπληρώσειν
  chosen: to pay
  alternatives:
  - to fulfill
  - to discharge
  - to make good
  lexicon: LSJ
  rationale: In financial context the infinitive means to fulfill or discharge an
    obligation. 'To pay' is the clearest idiomatic English expression here.
