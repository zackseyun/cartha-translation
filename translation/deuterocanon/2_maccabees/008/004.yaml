theological_decisions:
- issue: Rendering ἀναμαρτήτων with respect to the murdered children
  chosen_reading: innocent infants
  alternative_readings:
  - sinless infants
  - guiltless infants
  rationale: The Greek literally means 'without sin,' but in English 'sinless' could
    suggest a doctrinal assertion beyond the narrative's rhetorical point. 'Innocent'
    preserves the moral force in context without importing later theological debates.
  doctrine_reference: 'Translation philosophy: preserve source sense without importing
    doctrinal claims the text does not make.'
