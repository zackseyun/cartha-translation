theological_decisions:
- issue: Social-ethical emphasis in the distribution of spoils
  chosen_reading: The verse is rendered to show that the fighters first set aside
    a portion for the afflicted, widows, and orphans, then divided the remainder among
    themselves and their children.
  alternative_readings:
  - The verse could be rendered more formally as 'having divided from the spoils'
    without making explicit that only a portion was given first.
  rationale: The Greek sequence and ἀπό with τῶν σκύλων indicate distribution from
    the spoils to vulnerable groups before the remainder was divided. This is a contextual
    and lexical decision, not an imported moral gloss.
  doctrine_reference: Translation philosophy §§1, 5, 6
