translation:
  text: But after the Sabbath, having distributed some of the spoils to those who
    had been oppressed, and to the widows and the orphans, they divided the rest among
    themselves and their children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the oppressed,' 'to those who had been mistreated.' The Greek participle
      refers broadly to people who had suffered hardship or abuse.
    reason: lexical_alternative
  - marker: b
    text: '''Spoils'' may also be rendered ''plunder'' or ''booty.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ δὲ τὸ σάββατον
  chosen: But after the Sabbath
  alternatives:
  - And after the Sabbath
  - Now after the Sabbath
  lexicon: LSJ
  rationale: μετά with the accusative marks time after an event. δέ is lightly adversative
    or continuative; 'But' preserves the discourse shift from the prior verse without
    overstating contrast.
- source_word: τοῖς ἠκισμένοις
  chosen: to those who had been afflicted
  alternatives:
  - to the oppressed
  - to the wronged
  - to those who had been mistreated
  lexicon: LSJ
  rationale: The perfect/passive participial form denotes people who have suffered
    harsh treatment or injury. 'Those who had been afflicted' is broad enough to cover
    the social suffering in context and avoids over-specifying a technical class.
- source_word: ταῖς χήραις
  chosen: the widows
  alternatives:
  - widowed women
  lexicon: LSJ
  rationale: Standard rendering of χήραις; the social category is explicit and should
    be preserved.
- source_word: τοῖς ὀρφανοῖς
  chosen: the orphans
  alternatives:
  - fatherless children
  lexicon: LSJ
  rationale: ὀρφανοῖς straightforwardly denotes orphans; this keeps the familiar biblical
    social category.
- source_word: μερίσαντες ἀπὸ τῶν σκύλων
  chosen: having distributed some of the spoils
  alternatives:
  - having apportioned from the plunder
  - having divided from the booty
  lexicon: LSJ
  rationale: μερίσαντες means 'having divided/distributed.' σκῦλα in military context
    means spoils/plunder/booty. The preposition ἀπό indicates a portion taken from
    the spoils for these vulnerable groups, so 'distributed some of the spoils' makes
    that relation clear in natural English.
- source_word: τὰ λοιπὰ
  chosen: the rest
  alternatives:
  - the remainder
  lexicon: LSJ
  rationale: Refers to what remained of the spoils after the prior distribution.
- source_word: αὐτοὶ καὶ τὰ παιδία
  chosen: among themselves and their children
  alternatives:
  - they and their children
  - among themselves and the children
  lexicon: LSJ
  rationale: The phrase identifies the recipients of the remaining spoils. Rendering
    with 'their children' is the most natural reading in context, since αὐτοί refers
    to the fighters themselves and τὰ παιδία to their dependent children.
- source_word: διεμερίσαντο
  chosen: they divided
  alternatives:
  - they apportioned
  - they distributed
  lexicon: LSJ
  rationale: Middle voice of διαμερίζω here conveys dividing up among recipients.
    'They divided' is concise and idiomatic, with the beneficiaries supplied by the
    phrase that follows.
