  text: τὸν δὲ φυλάρχην τῶν περὶ Τιμόθεον ἀνεῖλον, ἀνυπόστατον ἄνδρα καὶ πολλὰ τοὺς
    Ἰουδαίους ἐπιλελυπηκότα.
