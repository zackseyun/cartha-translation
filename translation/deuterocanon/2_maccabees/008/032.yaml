translation:
  text: But they killed the commander of those with Timothy, an utterly vile man who
    had caused the Jews much distress.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φυλάρχην
  chosen: commander
  alternatives:
  - tribal leader
  - captain
  - chief
  lexicon: LSJ
  rationale: φυλάρχης literally denotes a leader of a tribe or division; in this military
    context 'commander' best conveys a subordinate military leader without implying
    ethnic tribal structure in English.
- source_word: τῶν περὶ Τιμόθεον
  chosen: among those with Timothy
  alternatives:
  - of Timothy's men
  - belonging to Timothy's force
  - around Timothy
  lexicon: LSJ
  rationale: The idiom οἱ περὶ + accusative commonly refers to the party or group
    associated with a person. 'Among those with Timothy' preserves the association
    while remaining natural English.
- source_word: ἀνεῖλον
  chosen: killed
  alternatives:
  - slew
  - did away with
  lexicon: LSJ
  rationale: Aorist of ἀναιρέω here refers to violent killing. 'Killed' is clear modern
    English and suitably direct.
- source_word: ἀνυπόστατον
  chosen: thoroughly worthless
  alternatives:
  - base
  - contemptible
  - unprincipled
  lexicon: LSJ
  rationale: The adjective conveys moral worthlessness or baseness rather than mere
    weakness. 'Thoroughly worthless' captures the strongly negative moral evaluation
    in accessible English.
- source_word: πολλὰ
  chosen: much
  alternatives:
  - greatly
  - in many ways
  lexicon: LSJ
  rationale: With ἐπιλελυπηκότα it functions adverbially/intensively. 'Much' is concise
    and natural in English.
- source_word: ἐπιλελυπηκότα
  chosen: had caused ... distress
  alternatives:
  - had greatly troubled
  - had grieved
  - had afflicted
  lexicon: LSJ
  rationale: 'Perfect participle of ἐπιλυπέω indicates prior action with continuing
    effect: he had caused sorrow/trouble to the Jews. ''Had caused the Jews much distress''
    communicates both the emotional and oppressive sense in context.'
