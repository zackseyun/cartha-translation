translation:
  text: So he immediately sent to the cities along the coast, inviting them to buy
    Jewish bodies, promising to hand over ninety bodies for a talent; but he did not
    expect the punishment from the Almighty that was about to come upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'bodies' here refers to Jews treated as saleable captives; some translations
      smooth this to 'persons' or make the implication explicit as 'slaves.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the justice from the Almighty that was about to overtake him.' The Greek
      word can denote either justice in action or the resulting punishment.
    reason: alternative_reading
lexical_decisions:
- source_word: παραθαλασσίους πόλεις
  chosen: the cities along the coast
  alternatives:
  - the coastal cities
  - the seaside cities
  lexicon: LSJ
  rationale: The adjective means 'by the sea' or 'coastal.' 'Along the coast' is natural
    modern English while remaining close to the Greek.
- source_word: προκαλούμενος
  chosen: inviting
  alternatives:
  - calling upon
  - soliciting
  - summoning
  lexicon: LSJ
  rationale: In context Nicanor is sending word to potential buyers; 'inviting' captures
    the commercial solicitation sense without overtranslating.
- source_word: ἐπʼ ἀγορασμὸν
  chosen: to buy
  alternatives:
  - for purchase
  - for buying
  lexicon: LSJ
  rationale: The phrase denotes purpose related to purchase. Rendering it verbally
    in English produces a clear and idiomatic sentence.
- source_word: Ἰουδαίων σωμάτων
  chosen: Jewish bodies
  alternatives:
  - Jewish persons
  - Jewish slaves
  - Jews
  lexicon: LSJ
  rationale: The Greek literally says 'bodies,' likely referring to persons to be
    sold into slavery. 'Jewish bodies' preserves the shocking commodifying language
    of the source; smoother alternatives risk muting that effect.
- source_word: ὑπισχνούμενος
  chosen: promising
  alternatives:
  - undertaking
  - offering
  lexicon: LSJ
  rationale: The participle introduces the terms of his offer; 'promising' is the
    most straightforward English equivalent.
- source_word: ἐνενήκοντα σώματα ταλάντου παραχωρήσειν
  chosen: to hand over ninety bodies for a talent
  alternatives:
  - to deliver ninety bodies for one talent
  - to allot ninety persons per talent
  lexicon: LSJ
  rationale: 'The Greek is compressed and commercial. ''Hand over'' fits παραχωρήσειν
    in a transactional setting. Retaining ''bodies'' again preserves the source wording.
    The phrase is understood as a rate: ninety captives for one talent.'
- source_word: οὐ προσδεχόμενος
  chosen: he did not expect
  alternatives:
  - not anticipating
  - not awaiting
  lexicon: LSJ
  rationale: The participle expresses his failure to reckon with what was coming.
    'Did not expect' is idiomatic and accurate.
- source_word: τὴν ... μέλλουσαν παρακολουθήσειν αὐτῷ δίκην
  chosen: the punishment ... that was about to come upon him
  alternatives:
  - the justice ... that was about to overtake him
  - the penalty ... that was about to follow him
  lexicon: LSJ
  rationale: δίκη can mean justice, penalty, or punishment. In this context of impending
    divine retribution, 'punishment' best communicates the sense. παρακολουθήσειν
    literally 'follow closely' is rendered idiomatically as 'come upon' to express
    impending overtaking.
- source_word: τοῦ παντοκράτορος
  chosen: the Almighty
  alternatives:
  - the All-ruler
  - the Omnipotent One
  lexicon: LSJ
  rationale: παντοκράτωρ is a divine title conventionally rendered 'the Almighty.'
    This is both accurate and readable.
