theological_decisions:
- issue: Divine title παντοκράτωρ
  chosen_reading: the Almighty
  alternative_readings:
  - the All-ruler
  rationale: The title refers to God in a way emphasizing sovereign power. 'The Almighty'
    is the established and natural English equivalent without importing extra doctrinal
    claims.
  doctrine_reference: Translation philosophy §6; Contested terms table analogous title-handling
    principle
- issue: Whether to soften σώματα into 'persons' or make slavery explicit
  chosen_reading: Jewish bodies
  alternative_readings:
  - Jewish persons
  - Jewish slaves
  rationale: The text's rhetoric intentionally objectifies the Jews as saleable bodies.
    Making slavery explicit would be interpretive, while 'persons' would soften the
    brutality. The literal wording best preserves the narrative's moral force.
  doctrine_reference: Translation philosophy §1 and §5
