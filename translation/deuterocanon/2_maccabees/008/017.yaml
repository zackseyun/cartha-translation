theological_decisions:
- issue: Scope of προγονικῆς πολιτείας
  chosen_reading: the ancestral way of life
  alternative_readings:
  - the ancestral constitution
  - the ancestral commonwealth
  rationale: The phrase in 2 Maccabees carries both civic and religious weight in
    describing the inherited Jewish order under attack. Rendering it as 'way of life'
    preserves that integrated sense without importing a narrowly modern political
    concept like 'constitution' into the main text.
  doctrine_reference: Translation philosophy §§1, 6
