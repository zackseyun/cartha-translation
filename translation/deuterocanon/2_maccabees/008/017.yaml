translation:
  text: having set before their eyes the lawless outrage committed by them against
    the holy place, and the abuse of the city that had been mocked, and also the overthrow
    of the ancestral way of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ancestral constitution' or 'the ancestral commonwealth'; the Greek
      can denote the inherited civic-religious order of the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ ὀφθαλμῶν λαβόντας
  chosen: having set before their eyes
  alternatives:
  - having taken before their eyes
  - keeping before their eyes
  - bearing in mind
  lexicon: LSJ
  rationale: Idiomatic participial expression meaning to place something before one's
    eyes mentally, i.e., to keep vividly in view. 'Having set before their eyes' preserves
    the visual metaphor while remaining natural English.
- source_word: ἀνόμως
  chosen: lawless
  alternatives:
  - wickedly
  - illegally
  - impiously
  lexicon: LSJ
  rationale: The adverb denotes action contrary to law. 'Lawless' preserves the legal-moral
    force without narrowing it merely to civil illegality or broadening it to generic
    wickedness.
- source_word: ὕβριν
  chosen: outrage
  alternatives:
  - insolence
  - violence
  - arrogant abuse
  lexicon: LSJ
  rationale: ὕβρις carries the sense of wanton, insulting mistreatment. 'Outrage'
    captures both the violent and dishonoring dimensions in a concise modern English
    term.
- source_word: ἅγιον τόπον
  chosen: the holy place
  alternatives:
  - the holy sanctuary
  - the sacred place
  lexicon: LSJ
  rationale: A standard expression for the temple precinct/sanctuary. 'Holy place'
    is sufficiently literal and recognizable, while avoiding over-specification beyond
    the Greek.
- source_word: συντελεσμένην ὑπʼ αὐτῶν
  chosen: committed by them
  alternatives:
  - carried out by them
  - brought to completion by them
  lexicon: LSJ
  rationale: The perfect participle indicates an act effected by them. 'Committed
    by them' is idiomatic with 'outrage' and preserves their agency.
- source_word: αἰκισμόν
  chosen: abuse
  alternatives:
  - mistreatment
  - outrage
  - humiliation
  lexicon: LSJ
  rationale: The noun denotes maltreatment or ill-usage. 'Abuse' is broad enough to
    include the city's violent and degrading treatment, while distinguishing it from
    the earlier ὕβρις.
- source_word: ἐμπεπαιγμένης
  chosen: that had been mocked
  alternatives:
  - that had been ridiculed
  - that had been insulted
  - that had been made a laughingstock
  lexicon: LSJ
  rationale: Perfect participle from ἐμπαίζω, 'to mock, deride.' 'That had been mocked'
    is direct and preserves the completed state resulting from the enemies' contempt.
- source_word: προγονικῆς πολιτείας
  chosen: the ancestral way of life
  alternatives:
  - the ancestral constitution
  - the customs of the ancestors
  - the ancestral order
  lexicon: LSJ
  rationale: πολιτεία can mean constitution, commonwealth, or way of life/order. In
    this Maccabean context it refers to the inherited Jewish civic-religious order
    and customs. 'Ancestral way of life' communicates that broader lived order in
    accessible English.
- source_word: κατάλυσιν
  chosen: overthrow
  alternatives:
  - destruction
  - abolition
  - dissolution
  lexicon: LSJ
  rationale: The noun denotes dismantling or bringing to an end. 'Overthrow' fits
    the hostile suppression of the ancestral order and reads naturally in context.
