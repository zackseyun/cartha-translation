translation:
  text: having appointed his brothers to lead each division, Simon and Joseph and
    Jonathan, assigning to each one a thousand men in addition to five hundred,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'a thousand in addition to five hundred,' that is, 1,500
      under each leader.
    reason: lexical_alternative
lexical_decisions:
- source_word: τάξας
  chosen: having appointed
  alternatives:
  - having arranged
  - having assigned
  lexicon: LSJ
  rationale: Aorist participle of τάσσω here introduces Judas's preparatory action
    before the main verb in the following context. 'Having appointed' fits the military-administrative
    sense better than the broader 'having arranged.'
- source_word: ἀδελφοὺς αὐτοῦ
  chosen: his brothers
  alternatives:
  - his kinsmen
  lexicon: LSJ
  rationale: The plain sense is familial 'brothers,' and there is no contextual reason
    to weaken it to 'kinsmen.' This also aligns with the named individuals who follow.
- source_word: προηγουμένους
  chosen: to lead
  alternatives:
  - going before
  - taking command of
  - being leaders of
  lexicon: LSJ
  rationale: Literally 'going before,' but in this military context it denotes leadership.
    'To lead' gives the functional sense in natural English without over-paraphrase.
- source_word: ἑκάτερας τάξεως
  chosen: each division
  alternatives:
  - each rank
  - each formation
  - each unit
  lexicon: LSJ
  rationale: τάξις in military context refers to an ordered body or formation. Because
    ἑκάτερας indicates distribution over the forces, 'each division' is the clearest
    idiomatic rendering.
- source_word: ὑποτάξας
  chosen: assigning
  alternatives:
  - placing under
  - subordinating
  - appointing under
  lexicon: LSJ
  rationale: Here the participle describes placing a specified number under each leader's
    command. 'Assigning' communicates the military allocation of troops more clearly
    than the more literal but potentially misleading 'subordinating.'
- source_word: ἑκάστῳ
  chosen: to each one
  alternatives:
  - to each
  lexicon: LSJ
  rationale: Refers distributively to the three named brothers. 'To each one' makes
    the distribution explicit in English.
- source_word: χιλίους πρὸς τοῖς πεντακοσίοις
  chosen: a thousand men in addition to five hundred
  alternatives:
  - one thousand five hundred
  - a thousand besides five hundred
  lexicon: LSJ
  rationale: The Greek is literally 'a thousand in addition to five hundred,' i.e.,
    1,500. Retaining the additive expression preserves the source's wording and avoids
    smoothing away the construction, while 'men' is supplied because the count is
    of troops.
