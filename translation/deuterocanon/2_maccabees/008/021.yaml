theological_decisions:
- issue: Rendering πατρίς in a context of covenantal and national loyalty
  chosen_reading: fatherland
  alternative_readings:
  - homeland
  - native land
  rationale: The verse joins devotion to the laws with devotion to the ancestral land.
    'Fatherland' preserves the rhetorical and patriotic weight of πατρίς without importing
    later nationalism beyond the text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English with preserved theological weight.'
