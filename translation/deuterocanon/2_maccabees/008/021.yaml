translation:
  text: With these words he encouraged them and made them ready to die for the laws
    and the fatherland, and he formed the army into four parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he made the army into four divisions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφʼ οἷς
  chosen: With these words
  alternatives:
  - By these things
  - On this basis
  lexicon: LSJ
  rationale: The phrase refers back to the preceding exhortation and introduces the
    effect of Judas's speech. 'With these words' gives natural English while preserving
    the instrumental sense.
- source_word: εὐθαρσεῖς
  chosen: made them confident
  alternatives:
  - encouraged them
  - made them bold
  lexicon: LSJ
  rationale: 'The adjective denotes being of good courage or confident. Because it
    is linked with παραστήσας and takes αὐτούς as object, English idiom is better
    served by a causative rendering: he made them confident.'
- source_word: παραστήσας
  chosen: made
  alternatives:
  - presented
  - caused to be
  - set forth as
  lexicon: LSJ
  rationale: Literally 'having presented/set' them as confident and ready, but in
    context it describes Judas's action of bringing the men into that state. The participle
    is absorbed into smooth English as part of the main verbal idea.
- source_word: ἑτοίμους
  chosen: ready
  alternatives:
  - prepared
  lexicon: LSJ
  rationale: Straightforward adjective meaning prepared or ready; 'ready' is concise
    and natural.
- source_word: ὑπὲρ τῶν νόμων καὶ τῆς πατρίδος
  chosen: for the laws and the fatherland
  alternatives:
  - for the law and the homeland
  - on behalf of the laws and the ancestral land
  lexicon: LSJ
  rationale: ὑπέρ here expresses cause or defense. 'The laws' preserves the plural
    of νόμων in this Jewish context, likely referring to the ancestral laws. πατρίς
    is more than territory; 'fatherland' preserves the patriotic force better than
    the flatter 'homeland.'
- source_word: ἀποθνήσκειν
  chosen: to die
  alternatives:
  - to face death
  lexicon: LSJ
  rationale: Infinitive of ἀποθνῄσκω, plainly 'to die.' No need to soften it.
- source_word: τετραμερές τι ἐποίησεν τὸ στράτευμα
  chosen: he formed the army into four parts
  alternatives:
  - he made the army into four divisions
  - he divided the force into four
  lexicon: LSJ
  rationale: τετραμερές means four-part/fourfold. The idiomatic English rendering
    is that he divided or formed the army into four parts. 'Army' is a natural rendering
    of στράτευμα here.
