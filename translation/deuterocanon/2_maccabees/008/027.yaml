translation:
  text: After they had collected their weapons and stripped the spoils from the enemies,
    they devoted themselves to the Sabbath, abundantly blessing and giving thanks
    to the Lord who had preserved them to this day, having appointed for them the
    beginning of mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they were engaged with Sabbath observance.' The Greek expression περὶ
      τὸ σάββατον ἐγίνοντο is somewhat idiomatic and may refer to turning their attention
      to keeping the Sabbath as it arrived.
    reason: lexical_alternative
  - marker: b
    text: Or, 'having granted them a beginning of mercy' or 'the first sign of mercy.'
      The Greek can denote that this deliverance marked the start of renewed divine
      favor.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁπλολογήσαντες
  chosen: had collected their weapons
  alternatives:
  - had gathered arms
  - had picked up the weapons
  lexicon: LSJ
  rationale: The participle likely refers to gathering up arms after battle. 'Collected
    their weapons' is natural English and fits the military context without over-specifying
    whose weapons beyond what the Greek implies.
- source_word: τὰ σκῦλα ἐκδύσαντες
  chosen: stripped the spoils
  alternatives:
  - despoiled
  - took the plunder
  lexicon: LSJ
  rationale: The phrase combines the idea of stripping off and taking spoil from defeated
    enemies. 'Stripped the spoils' preserves the vividness of ἐκδύσαντες while remaining
    readable.
- source_word: τῶν πολεμίων
  chosen: from the enemies
  alternatives:
  - from their enemies
  - of the enemies
  lexicon: LSJ
  rationale: The genitive depends on the spoils phrase; 'from the enemies' makes the
    relation clear in English.
- source_word: περὶ τὸ σάββατον ἐγίνοντο
  chosen: they occupied themselves with the Sabbath
  alternatives:
  - they were engaged around the Sabbath
  - they spent the time concerning the Sabbath
  lexicon: LSJ
  rationale: The idiom is somewhat awkward literally. In context it means they turned
    to Sabbath observance as the time approached or arrived. 'Occupied themselves
    with the Sabbath' captures the sense without paraphrasing into a specific ritual
    not named in the Greek.
- source_word: περισσῶς
  chosen: abundantly
  alternatives:
  - greatly
  - exceedingly
  lexicon: LSJ
  rationale: This adverb intensifies their blessing and thanksgiving. 'Abundantly'
    preserves the sense of overflowing praise.
- source_word: εὐλογοῦντες
  chosen: blessing
  alternatives:
  - praising
  - speaking well of
  lexicon: LSJ
  rationale: '''Blessing'' is the direct lexical equivalent and works naturally with
    God as the object in biblical English.'
- source_word: ἐξομολογούμενοι
  chosen: giving thanks
  alternatives:
  - confessing
  - praising openly
  lexicon: LSJ
  rationale: Though the verb can mean confess, in this context of worship directed
    to the Lord after deliverance it carries the sense of thankful praise. 'Giving
    thanks' best fits the immediate context.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - to the master
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is rendered 'Lord' in biblical-theological
    contexts. Here it refers to Israel's God.
- source_word: τῷ διασώζοντι εἰς τὴν ἡμέραν ταύτην
  chosen: who had preserved them to this day
  alternatives:
  - who had brought them safely to this day
  - who had saved them until this day
  lexicon: LSJ
  rationale: The participle expresses God's preserving action up to the present point.
    'Preserved them to this day' is idiomatic and faithful.
- source_word: ἀρχὴν ἐλέους τάξαντος αὐτοῖς
  chosen: having appointed for them the beginning of mercy
  alternatives:
  - having granted them the first sign of mercy
  - having ordained for them a beginning of compassion
  lexicon: LSJ
  rationale: The genitive absolute points to God as the one who set or appointed a
    beginning of mercy for them. 'Beginning of mercy' is somewhat literal but preserves
    the theological nuance that this deliverance marks the start of renewed divine
    favor.
