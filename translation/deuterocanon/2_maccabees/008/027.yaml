theological_decisions:
- issue: Meaning of ἀρχὴν ἐλέους τάξαντος αὐτοῖς
  chosen_reading: This victory is described as the beginning of God's mercy toward
    the people, not the full restoration itself.
  alternative_readings:
  - the first installment of mercy
  - a sign that mercy had begun
  rationale: The phrase is theologically significant because it frames the military
    deliverance as an initial act of divine compassion. The translation keeps the
    phrase open and does not over-interpret it as complete restoration or covenant
    renewal beyond what the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
