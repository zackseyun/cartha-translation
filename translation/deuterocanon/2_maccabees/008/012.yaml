translation:
  text: But news of Nicanor’s advance came to Judas; and when he had shared with those
    with him the presence of the army camp,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'news about Nicanor’s attack came to Judas.' The Greek ἐφόδου can mean
      'attack,' 'assault,' or 'advance.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when he had informed those with him of the army’s presence.' The Greek
      phrase τὴν παρουσίαν τοῦ στρατοπέδου is somewhat compressed and may refer either
      to the army camp being present nearby or to the army’s arrival.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέπεσεν
  chosen: came
  alternatives:
  - fell upon
  - reached
  - came to
  lexicon: LSJ
  rationale: In the idiom προσπίπτω περί + genitive here, the sense is that information
    or news 'came to' Judas, not a literal falling. 'Came' is natural English while
    preserving the report's arrival.
- source_word: περὶ τῆς τοῦ Νικάνορος ἐφόδου
  chosen: news of Nicanor’s advance
  alternatives:
  - about Nicanor’s attack
  - concerning Nicanor’s expedition
  - of Nicanor’s assault
  lexicon: LSJ
  rationale: ἐφόδος can denote an attack, onset, or advance. In this context, before
    the battle action is narrated, 'advance' best captures the hostile movement without
    overstating that the attack itself has already begun. 'News of' makes explicit
    the informational force implied by προσέπεσεν περὶ.
- source_word: μεταδόντος
  chosen: he had shared
  alternatives:
  - having communicated
  - having informed
  - having imparted
  lexicon: LSJ
  rationale: The genitive absolute indicates Judas' action of passing on the information.
    'Had shared' is readable modern English; 'informed' is possible but slightly more
    interpretive than the underlying verb 'give a share of / impart'.
- source_word: τοῖς σὺν αὐτῷ
  chosen: those with him
  alternatives:
  - his companions
  - those who were with him
  lexicon: LSJ
  rationale: A straightforward rendering of the phrase, avoiding over-specification
    while preserving the reference to Judas' associates.
- source_word: τὴν παρουσίαν τοῦ στρατοπέδου
  chosen: the presence of the army camp
  alternatives:
  - the arrival of the camp
  - the presence of the army
  - the approach of the encampment
  lexicon: LSJ
  rationale: παρουσία is literally 'presence' or 'arrival.' στρατόπεδον can mean camp
    or army. Because the Greek says 'presence of the camp/army,' the translation keeps
    'presence' and 'army camp' to stay close to the wording, though the phrase is
    somewhat awkward in English. This likely refers to the enemy force being nearby
    or present.
