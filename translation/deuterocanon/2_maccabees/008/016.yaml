theological_decisions:
- issue: Rendering ἐθνῶν in a deuterocanonical Jewish military context
  chosen_reading: nations
  alternative_readings:
  - Gentiles
  - peoples
  rationale: The term likely refers to foreign ethnic groups hostile to Judas. 'Nations'
    preserves the political-ethnic sense without importing later Christian technical
    usage that 'Gentiles' can carry.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Handling the difficult term δεσμίοις in context
  chosen_reading: enemy
  alternative_readings:
  - prisoners
  - captives
  rationale: The lexical default of δεσμίοις would be 'prisoners/captives,' but that
    reading is difficult in this exhortation, where the following clause clearly concerns
    hostile forces arrayed against Judas. To avoid a misleadingly literal rendering
    that obscures the sense, the main text uses 'enemy,' while preserving the lexical
    alternative in a footnote for transparency.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
