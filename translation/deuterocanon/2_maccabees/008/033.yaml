theological_decisions:
- issue: Cultic force of ἱεροὺς πυλῶνας
  chosen_reading: sacred gates
  alternative_readings:
  - holy gates
  - temple gates
  rationale: The adjective ἱερούς marks these gates as belonging to the sacred precincts.
    'Sacred gates' preserves the religious significance without importing a more specific
    architectural identification than the Greek itself states.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English.'
- issue: Moral-religious sense of δυσσεβείας
  chosen_reading: ungodliness
  alternative_readings:
  - impiety
  rationale: The term carries a religious-ethical judgment. 'Ungodliness' communicates
    this clearly in contemporary English while preserving the text's condemnation.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
