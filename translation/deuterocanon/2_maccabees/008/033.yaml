translation:
  text: And while they were celebrating the victory in their homeland, they burned
    those who had set fire to the sacred gates, including Kallisthenes, who had fled
    into a certain house for shelter; and he received the reward worthy of his ungodliness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who had fled into a dwelling for refuge.' The Greek phrase εἰς ἐνοίκιον
      is unusual, and the exact nuance of the place is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπινίκια ... ἄγοντες
  chosen: while they were celebrating the victory
  alternatives:
  - holding victory celebrations
  - keeping a triumph festival
  lexicon: LSJ
  rationale: The idiom denotes conducting victory celebrations after battle. 'Celebrating
    the victory' is natural English and preserves the festive sense without over-literal
    awkwardness.
- source_word: ἐν τῇ πατρίδι
  chosen: in their homeland
  alternatives:
  - in the fatherland
  - in their own country
  lexicon: LSJ
  rationale: πατρίς refers to one's native land or homeland. 'Their homeland' is idiomatic
    and fits the collective subject.
- source_word: τοὺς ἐμπρήσαντας τοὺς ἱεροὺς πυλῶνας
  chosen: those who had set fire to the sacred gates
  alternatives:
  - those who had burned the holy gates
  - the men who had fired the temple gates
  lexicon: LSJ
  rationale: ἐμπρήσαντας means 'having set on fire/burned.' ἱεροὺς πυλῶνας most naturally
    refers to sacred or temple gate-structures. 'Sacred gates' keeps the cultic force
    of ἱερούς without over-specifying beyond the Greek.
- source_word: Καλλισθένην
  chosen: Kallisthenes
  alternatives:
  - Callisthenes
  rationale: Personal names are transliterated by standard conventions. 'Kallisthenes'
    reflects the Greek form directly.
- source_word: ὑφήψαν
  chosen: they burned up
  alternatives:
  - they set on fire
  - they burned
  lexicon: LSJ
  rationale: The verb means to kindle from beneath or set ablaze. In context, after
    mention of his refuge, it likely implies burning him out/in the place where he
    hid. 'Burned up' conveys the lethal result succinctly.
- source_word: εἰς ἐνοίκιον πεφευγότα
  chosen: who had fled into a certain house for shelter
  alternatives:
  - who had fled into a cottage
  - who had taken refuge in a dwelling
  lexicon: LSJ
  rationale: The phrase is difficult, but πεφευγότα clearly means 'having fled for
    refuge.' ἐνοίκιον in this context appears to denote a place of lodging/dwelling
    rather than the later common sense 'rent.' 'A certain house for shelter' preserves
    the refuge idea while acknowledging the unusual noun.
- source_word: τὸν ἄξιον ... μισθόν
  chosen: the reward worthy of
  alternatives:
  - the due recompense for
  - the fitting wages of
  lexicon: LSJ
  rationale: μισθός can mean wages, reward, or recompense. In judgment context, 'reward'
    works idiomatically in English while retaining the irony of deserved recompense.
- source_word: δυσσεβείας
  chosen: ungodliness
  alternatives:
  - impiety
  - wicked irreverence
  lexicon: LSJ
  rationale: δυσσέβεια denotes impiety or ungodliness, especially irreverence toward
    the sacred. 'Ungodliness' is accessible modern English; 'impiety' is a viable
    but less common alternative.
