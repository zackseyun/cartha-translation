translation:
  text: 'And the engagement in Babylonia against the Galatians had gone this way:
    when all who came to the need were eight thousand, together with four thousand
    Macedonians, and the Macedonians were at a loss, the six thousand destroyed the
    one hundred twenty thousand because of the help coming to them from heaven, and
    they received great advantage.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Gauls.' The Greek ethnic term can be rendered either way depending on
      whether the emphasis is on the Anatolian Galatians or their broader Celtic identity.
    reason: alternative_reading
lexical_decisions:
- source_word: παράταξιν
  chosen: engagement
  alternatives:
  - battle
  - array
  - campaign
  lexicon: LSJ
  rationale: The noun denotes a drawn-up battle line or battle engagement. 'Engagement'
    preserves the military sense without overcommitting to a prolonged campaign.
- source_word: γενομένην
  chosen: had gone this way
  alternatives:
  - had happened
  - had taken place
  lexicon: LSJ
  rationale: With the following ὡς-clause, the participle introduces how the battle
    turned out. 'Had gone this way' captures the explanatory force more naturally
    than a bare 'had happened.'
- source_word: Γαλάτας
  chosen: Galatians
  alternatives:
  - Gauls
  lexicon: LSJ
  rationale: The Greek term can refer to the Galatians/Gauls. 'Galatians' is the direct
    transliteration of the ethnic term in the Greek text; the alternative is preserved
    in a footnote because historical referent may be understood as Gauls.
- source_word: ἐπὶ τὴν χρείαν ἦλθον
  chosen: came to the need
  alternatives:
  - came to the crisis
  - came to the aid
  - came for the necessity
  lexicon: LSJ
  rationale: The phrase literally refers to coming to the need or emergency. 'Came
    to the need' stays close to the Greek while remaining intelligible; the sense
    is that they came when the crisis arose.
- source_word: ἀπορουμένων
  chosen: were at a loss
  alternatives:
  - were in difficulty
  - were perplexed
  - were hard pressed
  lexicon: LSJ
  rationale: The participle conveys being without resources or at an impasse. 'Were
    at a loss' reflects both practical and psychological strain.
- source_word: ἀπώλεσαν
  chosen: destroyed
  alternatives:
  - killed
  - wiped out
  - caused to perish
  lexicon: LSJ
  rationale: The verb broadly means destroy or cause to perish. 'Destroyed' is suitably
    forceful and leaves the exact mode within the military context.
- source_word: δώδεκα μυριάδας
  chosen: one hundred twenty thousand
  alternatives:
  - twelve myriads
  lexicon: LSJ
  rationale: Rendering the numeral idiomatically in English aids readability while
    preserving the scale stated in the Greek.
- source_word: διὰ τὴν γινομένην αὐτοῖς ἀπʼ οὐρανοῦ βοήθειαν
  chosen: because of the help coming to them from heaven
  alternatives:
  - through the help that came to them from heaven
  - because of heavenly help given to them
  lexicon: LSJ
  rationale: This phrase explicitly attributes the victory to divine aid. 'From heaven'
    preserves the reverential circumlocution and avoids over-specifying beyond the
    text.
- source_word: ὠφέλειαν πολλὴν ἔλαβον
  chosen: they received great advantage
  alternatives:
  - they gained much benefit
  - they received great profit
  lexicon: LSJ
  rationale: ὠφέλεια can denote benefit, advantage, or profit. In military context,
    'great advantage' is broad enough to include spoils or strategic gain without
    narrowing the sense.
