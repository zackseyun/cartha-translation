  text: καὶ τὴν ἐν τῇ Βαβυλωνίᾳ τὴν πρὸς τοὺς Γαλάτας παράταξιν γενομένην, ὡς οἱ πάντες
    ἐπὶ τὴν χρείαν ἦλθον ὀκτακισχίλιοι σὺν Μακεδόσιν τετρακισχιλίοις, τῶν Μακεδόνων
