theological_decisions:
- issue: Reference of 'help from heaven'
  chosen_reading: A reverential way of describing divine aid without naming God directly.
  alternative_readings:
  - A more general statement of providential fortune
  rationale: In Jewish Greek, 'from heaven' commonly functions as a circumlocution
    for God's intervention. The translation preserves the phrase itself rather than
    replacing it with 'God,' maintaining the text's theological register and restraint.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
