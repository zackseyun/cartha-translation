translation:
  text: But those who had become cowardly and distrusted the judgment of God kept
    slipping away and going into exile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the justice of God'; possibly, in context, 'God's vengeance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δειλανδροῦντες
  chosen: had become cowardly
  alternatives:
  - were acting cowardly
  - were fainthearted
  - were behaving like cowards
  lexicon: LSJ
  rationale: The participle denotes cowardice or loss of courage. 'Had become cowardly'
    captures the inceptive/resultative sense in context without sounding overly wooden.
    'Fainthearted' is possible but slightly softer than the Greek's reproachful force.
- source_word: ἀπιστοῦντες
  chosen: distrusted
  alternatives:
  - disbelieved
  - were faithless
  - lacked confidence in
  lexicon: BDAG/LSJ
  rationale: Here the object is 'the judgment of God,' so the sense is not generic
    unbelief but failure to trust that God's justice/judgment would act. 'Distrusted'
    fits the construction and context better than the more abstract 'disbelieved.'
- source_word: δίκην
  chosen: judgment
  alternatives:
  - justice
  - vengeance
  - punishment
  lexicon: LSJ
  rationale: In this military-deliverance context, the phrase likely refers to God's
    judicial action against enemies and on behalf of his people. 'Judgment' preserves
    that breadth better than 'justice' alone, while 'vengeance' or 'punishment' would
    narrow the sense too much.
- source_word: διεδίδρασκον ἑαυτούς
  chosen: kept slipping away
  alternatives:
  - were escaping
  - were running away
  - were making their escape
  lexicon: LSJ
  rationale: The imperfect suggests repeated or ongoing action. The reflexive expression
    intensifies the idea of getting oneself away. 'Kept slipping away' conveys the
    iterative/imperfective force and the furtive sense.
- source_word: ἐξετόπιζον
  chosen: going into exile
  alternatives:
  - removing themselves
  - departing the region
  - becoming fugitives
  lexicon: LSJ
  rationale: The verb literally involves being out of place or displaced from one's
    locality. In context it describes leaving their homes/region as refugees. 'Going
    into exile' is idiomatic and preserves the displacement idea, though not necessarily
    formal deportation.
