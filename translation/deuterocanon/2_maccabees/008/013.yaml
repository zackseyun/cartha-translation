theological_decisions:
- issue: Meaning of τὴν τοῦ θεοῦ δίκην
  chosen_reading: the judgment of God
  alternative_readings:
  - the justice of God
  - God's vengeance
  rationale: The phrase can denote divine justice in principle or God's judicial action
    in concrete historical events. 'Judgment' best preserves the theological tension
    without over-specifying whether the emphasis is retributive vengeance or righteous
    justice.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; δικαιοσύνη/justice-related terms may require contextual nuance.'
