  text: Συνιδὼν δὲ ὁ Φίλιππος κατὰ μικρὸν εἰς προκοπὴν ἐρχόμενον τὸν ἄνδρα, πυκνότερον
    δὲ ἐν ταῖς εὐημερίαις προβαίνοντα, πρὸς Πτολεμαῖον τὸν Κοίλης Συρίας καὶ Φοινίκης
    στρατηγὸν ἔγραφεν ἐπιβοηθεῖν τοῖς τοῦ βασιλέως πράγματι.
