translation:
  text: But when Philip saw that the man was gradually making progress and advancing
    even more in successes, he wrote to Ptolemy, the governor of Coele-Syria and Phoenicia,
    to come to the aid of the king’s cause.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, Judas Maccabeus, the figure under discussion in the surrounding
      context.
    reason: cross_reference
  - marker: b
    text: Or 'the king’s interests' or 'the king’s affairs.' The Greek phrase can
      denote the royal cause more broadly than a single military action.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνιδὼν
  chosen: when ... saw
  alternatives:
  - perceiving
  - realizing
  lexicon: LSJ
  rationale: The participle introduces Philip's reason for acting. 'Saw' is natural
    English while still covering the sense of noticing/perceiving.
- source_word: κατὰ μικρόν
  chosen: gradually
  alternatives:
  - little by little
  - by degrees
  lexicon: LSJ
  rationale: The idiom means incremental development. 'Gradually' is concise modern
    English and preserves the sense.
- source_word: εἰς προκοπὴν ἐρχόμενον
  chosen: making progress
  alternatives:
  - coming into advancement
  - prospering
  lexicon: LSJ
  rationale: The phrase denotes moving into a state of progress or advancement. 'Making
    progress' is idiomatic and fits the military-political context without overstating
    material prosperity.
- source_word: τὸν ἄνδρα
  chosen: the man
  alternatives:
  - that man
  - him
  lexicon: LSJ
  rationale: The Greek explicitly says 'the man,' referring to Judas already in context.
    Retaining 'the man' preserves the wording and avoids over-specifying the referent
    in the verse itself.
- source_word: πυκνότερον
  chosen: all the more often
  alternatives:
  - more frequently
  - more densely/closely
  lexicon: LSJ
  rationale: In context the comparative adverb modifies his advancing in favorable
    outcomes, indicating increasing frequency or regularity of success. 'All the more
    often' captures the comparative force in readable English.
- source_word: ἐν ταῖς εὐημερίαις
  chosen: in successes
  alternatives:
  - in prosperities
  - in favorable circumstances
  - in good fortune
  lexicon: LSJ
  rationale: The plural refers to favorable outcomes or successes rather than abstract
    prosperity. 'Successes' fits the military narrative better than the more economic-sounding
    'prosperities.'
- source_word: προβαίνοντα
  chosen: advancing
  alternatives:
  - going forward
  - progressing
  lexicon: LSJ
  rationale: This continues the picture of onward movement and increasing momentum.
    'Advancing' works well in a conflict setting.
- source_word: στρατηγὸν
  chosen: governor
  alternatives:
  - general
  - commander
  lexicon: LSJ
  rationale: Although στρατηγός can mean military commander, here it denotes Ptolemy's
    official administrative authority over Coele-Syria and Phoenicia. 'Governor' best
    communicates the office in context.
- source_word: ἐπιβοηθεῖν
  chosen: to come to the aid of
  alternatives:
  - to help
  - to support
  lexicon: LSJ
  rationale: The compound verb has the sense of coming in support or assistance. 'Come
    to the aid of' preserves the directional and urgent nuance better than the flatter
    'help.'
- source_word: τοῖς τοῦ βασιλέως πράγματι
  chosen: the king’s cause
  alternatives:
  - the king's affairs
  - the king's interests
  - the king's cause/party
  lexicon: LSJ
  rationale: πρᾶγμα here refers to the king's interests or cause in the conflict,
    not merely administrative business. 'The king's cause' best fits the political-military
    setting.
