theological_decisions:
- issue: Rendering of κύριος in a prayer to Israel's God
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project default renders κύριος as 'Lord.' In this deuterocanonical
    Jewish prayer context, 'Lord' best conveys reverent address to God without importing
    the tetragrammaton explicitly.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Gendered rendering of ἀνθρώπων
  chosen_reading: men
  alternative_readings:
  - people
  rationale: Although ἄνθρωποι can sometimes be generic, here the phrase refers to
    the impious human agents who defiled the temple. The masculine form is retained
    in line with the project's gender-accurate policy rather than neutralizing it.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
