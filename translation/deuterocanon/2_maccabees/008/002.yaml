translation:
  text: And they were calling on the Lord to look upon the people trampled down by
    all, and also to have mercy on the temple that had been defiled by ungodly men;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had been profaned' or 'had been desecrated.' The Greek emphasizes that
      the holy temple had been treated as common by impious human agents.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεκαλοῦντο
  chosen: were calling on
  alternatives:
  - were invoking
  - were appealing to
  - called upon
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing/repeated action in prayerful appeal.
    'Calling on' is idiomatic modern English and preserves the religious sense without
    overformalizing.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows project default for κύριος as a divine title. In this prayer
    context 'Lord' is the natural rendering.
- source_word: ἐφιδεῖν
  chosen: to look upon
  alternatives:
  - to see
  - to take notice of
  - to regard
  lexicon: LSJ
  rationale: The infinitive asks for more than mere visual perception; it is a plea
    for attentive regard. 'Look upon' preserves the prayer language and the compassionate
    nuance.
- source_word: λαόν
  chosen: people
  alternatives:
  - nation
  lexicon: BDAG
  rationale: Refers to the covenant people collectively. 'People' is the most natural
    and sufficiently weighty rendering here.
- source_word: καταπατούμενον
  chosen: trampled down
  alternatives:
  - trodden underfoot
  - oppressed
  lexicon: LSJ
  rationale: The participle is vivid and physical in imagery. 'Trampled down' keeps
    the metaphor of violent humiliation better than the more abstract 'oppressed'.
- source_word: ὑπὸ πάντων
  chosen: by all
  alternatives:
  - by everyone
  - by all people
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the breadth of the statement
    without adding an explicit object not present in Greek.
- source_word: οἰκτεῖραι
  chosen: to have mercy on
  alternatives:
  - to pity
  - to show compassion to
  lexicon: BDAG
  rationale: In prayer addressed to God, 'have mercy on' is idiomatic and carries
    the needed solemnity better than 'pity'.
- source_word: ναὸν
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: The Jerusalem temple is in view. 'Temple' is the clearest standard rendering
    in this historical context.
- source_word: βεβηλωθέντα
  chosen: had been defiled
  alternatives:
  - had been profaned
  - had been desecrated
  lexicon: BDAG
  rationale: The verb denotes making something holy into something common/profane.
    'Defiled' is accessible and serious; 'profaned' is a close alternative preserved
    as a lexical option.
- source_word: ἀσεβῶν ἀνθρώπων
  chosen: ungodly men
  alternatives:
  - impious men
  - godless men
  lexicon: BDAG
  rationale: ἀσεβής denotes impiety toward God, not merely general wickedness. 'Ungodly
    men' preserves that religious dimension and matches the masculine plural reference.
