theological_decisions:
- issue: Rendering the divine title παντοκράτωρ in a military-deliverance context
  chosen_reading: the Almighty
  alternative_readings:
  - the All-powerful One
  - the Ruler of all
  rationale: This title emphasizes God's supreme power and active support in battle.
    'The Almighty' is both faithful to the Greek and natural in English, without importing
    later doctrinal nuance beyond the text.
