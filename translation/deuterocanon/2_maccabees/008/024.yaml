translation:
  text: But with the Almighty as their ally, they slaughtered more than nine thousand
    of the enemy, and they wounded and maimed most of Nicanor’s army, and forced them
    all to flee.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῦ παντοκράτορος
  chosen: the Almighty
  alternatives:
  - the All-powerful One
  - the Ruler of all
  lexicon: LSJ
  rationale: παντοκράτωρ is a divine title meaning the one who holds all power or
    rules all. 'The Almighty' is the most natural established English equivalent and
    fits the reverential tone without unnecessary paraphrase.
- source_word: συμμάχου
  chosen: ally
  alternatives:
  - helper
  - supporter
  - champion
  lexicon: LSJ
  rationale: The noun denotes one who fights alongside another. 'Ally' preserves the
    military sense better than the more general 'helper' or 'supporter'.
- source_word: κατέσφαξαν
  chosen: they slaughtered
  alternatives:
  - they cut down
  - they killed
  lexicon: LSJ
  rationale: The verb is strong and violent, not merely 'killed.' 'Slaughtered' best
    reflects the intensity of the action in battle.
- source_word: ὑπὲρ τοὺς ἐννακισχιλίους
  chosen: more than nine thousand
  alternatives:
  - over nine thousand
  lexicon: LSJ
  rationale: ὑπέρ with the accusative here indicates excess over a number. 'More than
    nine thousand' is clear modern English.
- source_word: τραυματίας
  chosen: wounded
  alternatives:
  - injured
  lexicon: LSJ
  rationale: The adjective/substantival usage refers to those made wounded. 'Wounded'
    is the standard military term and pairs naturally with the following phrase.
- source_word: τοῖς μέλεσιν ἀπηρεῖς
  chosen: maimed
  alternatives:
  - disabled in their limbs
  - crippled
  lexicon: LSJ
  rationale: The phrase literally describes those rendered impaired in their limbs.
    'Maimed' concisely captures serious bodily disablement without using archaic or
    potentially distracting wording.
- source_word: τὸ πλεῖον μέρος τῆς τοῦ Νικάνορος στρατειᾶς
  chosen: most of Nicanor’s army
  alternatives:
  - the greater part of Nicanor's force
  - the larger part of Nicanor's expeditionary army
  lexicon: LSJ
  rationale: The phrase means the majority of the army under Nicanor. 'Most of Nicanor’s
    army' is accurate and readable.
- source_word: πάντας δὲ φεύγειν ἠνάγκασαν
  chosen: and forced them all to flee
  alternatives:
  - and compelled them all to run away
  - and made them all flee
  lexicon: LSJ
  rationale: The construction expresses compulsion resulting in flight. 'Forced them
    all to flee' is idiomatic and preserves the causative force.
