translation:
  text: For it was the day before the Sabbath, and for that reason they did not continue
    pursuing them for long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek phrase rendered ''the day before the Sabbath'' is textually and
      lexically awkward in Swete''s wording (''ἡ πρὸ τοῦ σαββάτου δίκη''). The translation
      follows the clear contextual sense: the approaching Sabbath limited how long
      they continued the pursuit.'
    reason: textual_variant
lexical_decisions:
- source_word: ἦν γὰρ
  chosen: For it was
  alternatives:
  - For there was
  - because it was
  lexicon: LSJ
  rationale: Uses γάρ to give the reason for the preceding action; idiomatic English
    prefers 'For it was' here.
- source_word: ἡ πρὸ τοῦ σαββάτου δίκη
  chosen: the day before the Sabbath
  alternatives:
  - the preparation before the Sabbath
  - the eve of the Sabbath
  lexicon: LSJ
  rationale: 'The phrase literally includes δίκη, which in this context is difficult
    if taken in its common sense (''justice, penalty, lawsuit''). In context and with
    πρὸ τοῦ σαββάτου, the sense is temporal: the day preceding the Sabbath. This yields
    coherent sense with the following clause about not prolonging pursuit. The rendering
    avoids over-literal nonsense while staying anchored to the temporal force of the
    phrase.'
- source_word: διʼ ἣν αἰτίαν
  chosen: and for that reason
  alternatives:
  - for which reason
  - because of which
  lexicon: LSJ
  rationale: A causal connective phrase; 'and for that reason' is natural modern English
    and preserves the explanatory link.
- source_word: οὐκ ἐμακροτόνησαν
  chosen: they did not continue ... for long
  alternatives:
  - they did not delay long
  - they did not spend much time
  lexicon: LSJ
  rationale: The verb conveys not extending or prolonging an action. Since it governs
    the participle κατατρέχοντες, the sense is that they did not keep up the pursuit
    for a long time.
- source_word: κατατρέχοντες αὐτούς
  chosen: pursuing them
  alternatives:
  - running them down
  - pressing after them
  lexicon: LSJ
  rationale: The participle denotes pursuing closely or running down opponents. 'Pursuing
    them' is clear, natural, and fits the military context.
