theological_decisions:
- issue: Implied divine agency in the ancestral 'help' and the destruction of Sennacherib's
    forces
  chosen_reading: Retain the historical reference without explicitly adding 'by God'
    in the main text.
  alternative_readings:
  - Translate more explicitly as 'the help God gave their forefathers' and 'how God
    destroyed 185,000'
  rationale: The verse alludes to well-known divine deliverance traditions, especially
    the destruction of Sennacherib's army, but the Greek wording here does not explicitly
    name God in this clause. To avoid importing unstated wording, the translation
    preserves the allusion and lets the context carry the theological force.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Original-language primacy over translation tradition.'
