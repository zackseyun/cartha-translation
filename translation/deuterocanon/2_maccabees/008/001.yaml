translation:
  text: But Judas, who was also called Maccabeus, and those with him, slipping in
    secretly into the villages, were calling together their relatives; and taking
    in those who had remained in Judaism, they gathered about six thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who had remained loyal to the Jewish way of life.' The Greek term
      'Judaism' here refers to Jewish religious identity and practice in contrast
      to Hellenizing pressure.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεισπορευόμενοι
  chosen: slipping in secretly
  alternatives:
  - going about secretly
  - entering stealthily
  - making their way in unnoticed
  lexicon: LSJ
  rationale: The participle conveys movement with an element of stealth or surreptitious
    entry. 'Slipping in secretly' preserves both the motion and the clandestine sense
    without sounding overly technical.
- source_word: λεληθότως
  chosen: secretly
  alternatives:
  - unnoticed
  - without being detected
  - in concealment
  lexicon: LSJ
  rationale: This adverb reinforces the hidden nature of their movements. Rendering
    it as 'secretly' keeps the emphasis clear in natural English; the nuance 'unnoticed'
    is preserved by the broader phrase 'slipping in secretly'.
- source_word: προσεκαλοῦντο
  chosen: were calling together
  alternatives:
  - were summoning
  - were inviting
  - were calling to themselves
  lexicon: LSJ
  rationale: The middle voice suggests drawing people to their side or assembling
    them. 'Were calling together' fits the context of mustering supporters and avoids
    implying formal military conscription too strongly.
- source_word: τοὺς συγγενεῖς
  chosen: their relatives
  alternatives:
  - their kinsmen
  - their kin
  lexicon: LSJ
  rationale: The term denotes family or kin relations. 'Relatives' is clear modern
    English; 'kinsmen' is possible but more archaic and more gender-specific than
    the Greek requires here.
- source_word: τοὺς μεμενηκότας ἐν τῷ Ἰουδαϊσμῷ
  chosen: those who had remained in Judaism
  alternatives:
  - those who had remained loyal to Judaism
  - those who had stayed in the Jewish way of life
  lexicon: LSJ
  rationale: Ἰουδαϊσμός in 2 Maccabees refers to the Jewish religion/way of life in
    contrast to Hellenizing pressure. 'Remained in Judaism' is close to the Greek
    and preserves the identity marker without over-expanding the phrase. 'Loyal to
    Judaism' is interpretive and therefore left as an alternative.
- source_word: προσλαμβανόμενοι
  chosen: taking in
  alternatives:
  - receiving
  - enlisting
  - adding to their number
  lexicon: LSJ
  rationale: The participle indicates accepting or adding these people to their group.
    'Taking in' is concise and natural, while the following clause clarifies the result
    numerically.
- source_word: συνῆγον
  chosen: they gathered
  alternatives:
  - they assembled
  - they brought together
  lexicon: LSJ
  rationale: The verb denotes assembling a group. 'They gathered' is idiomatic and
    works well with the numerical complement that follows.
- source_word: εἰς ἑξακισχιλίους
  chosen: about six thousand
  alternatives:
  - to six thousand
  - into a body of six thousand
  lexicon: LSJ
  rationale: The phrase marks the resulting total. English idiom commonly uses 'about
    six thousand' or 'to six thousand.' Because the verse describes a gathered force
    rather than a mathematically precise census, 'about six thousand' reads naturally
    while preserving the approximate sense often conveyed in narrative totals.
- source_word: ὁ καὶ Μακκαβαῖος
  chosen: who was also called Maccabeus
  alternatives:
  - also called Maccabeus
  - also known as Maccabeus
  lexicon: LSJ
  rationale: This construction identifies Judas by an additional name or epithet.
    'Who was also called Maccabeus' is explicit and natural in English narrative style.
