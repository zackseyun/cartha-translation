- issue: Rendering Ἰουδαϊσμός
  chosen_reading: Judaism
  alternative_readings:
  - the Jewish religion
  - the Jewish way of life
  rationale: The term in 2 Maccabees carries religious and communal identity over
    against apostasy and Hellenization. 'Judaism' is the most direct lexical equivalent
    and avoids importing a narrower or broader interpretation than the Greek itself
    states.
