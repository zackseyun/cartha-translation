translation:
  text: But the thrice-accursed Nicanor, who had brought three thousand merchants
    for the sale of the Jews,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that thrice-accursed man' or 'that thrice-wretched man.' The Greek adjective
      is rare and strongly pejorative, with an intensifying 'thrice-' element.
    reason: lexical_alternative
lexical_decisions:
- source_word: τρισαλιτήριος
  chosen: utterly defiled
  alternatives:
  - thrice-wretched
  - thrice-accursed
  - most-polluted
  - utterly vile
  lexicon: LSJ
  rationale: The rare compound is strongly pejorative and likely intensifying through
    the prefix τρις-. A literal 'thrice-accursed/wretched' is possible, but in idiomatic
    English it sounds opaque or archaic. 'Utterly defiled' preserves the moral-religious
    force of ἀλιτήριος ('sinful, accursed, polluted') while conveying the intensification
    naturally.
- source_word: Νικάνωρ
  chosen: Nikanor
  alternatives:
  - Nicanor
  rationale: Personal names are transliterated by standard conventions. 'Nikanor'
    reflects the Greek form directly.
- source_word: τρισχιλίους
  chosen: three thousand
  rationale: Straightforward cardinal numeral.
- source_word: ἐμπόρους
  chosen: merchants
  alternatives:
  - traders
  - dealers
  lexicon: LSJ
  rationale: Refers to commercial traders. 'Merchants' best fits the context of people
    brought to purchase captives.
- source_word: ἐπὶ τὴν πρᾶσιν
  chosen: for the sale
  alternatives:
  - for selling
  - for the auction
  - for the disposal
  lexicon: LSJ
  rationale: 'The phrase indicates purpose: the merchants were brought in connection
    with the intended selling of Jewish captives. ''For the sale'' is concise and
    natural.'
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Judeans
  rationale: In 2 Maccabees this ethnoreligious designation commonly refers to the
    Jewish people. 'Jews' is the most natural English rendering here, though 'Judeans'
    is a possible more geographic alternative in some contexts.
- source_word: ἀγαγών
  chosen: had brought
  alternatives:
  - having brought
  - brought
  lexicon: LSJ
  rationale: Aorist participle modifying Nikanor. English past perfect fits the narrative
    background sense before the main action of the larger sentence.
