translation:
  text: He also brought Eleazar, and after bringing forward the holy book and giving
    the watchword, “God’s Help,” he himself led the first company and engaged Nicanor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the password, ‘Help of God’” or “the signal, ‘God is help.’” The Greek
      expression is compressed and may be understood in more than one way.
    reason: lexical_alternative
  - marker: b
    text: “First company” translates a military term that could also be rendered “first
      cohort” or “first band.”
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγαγὼν
  chosen: after bringing forward
  alternatives:
  - having brought forward
  - bringing along
  lexicon: LSJ
  rationale: Aorist participle of παράγω here introduces an action preceding the main
    verb. 'Bringing forward' fits the military-preparatory scene better than a flatter
    'bringing along' and preserves the participial sequence.
- source_word: τὴν ἱερὰν βίβλον
  chosen: the holy book
  alternatives:
  - the sacred book
  - the holy scroll
  lexicon: LSJ
  rationale: βίβλος is most naturally 'book' in English, though materially it could
    be a scroll. 'Holy book' is clear, natural English and preserves the religious
    force of ἱεράν without over-specifying the physical format.
- source_word: σύνθημα
  chosen: watchword
  alternatives:
  - password
  - signal
  lexicon: LSJ
  rationale: In military context σύνθημα denotes a prearranged sign or password. 'Watchword'
    preserves both the military setting and the elevated tone better than the more
    colloquial 'password.'
- source_word: θεοῦ Βοηθείας
  chosen: God’s Help
  alternatives:
  - Help of God
  - God is help
  lexicon: LSJ
  rationale: The phrase functions as the content of the watchword. Rendering it as
    'God’s Help' keeps the genitival relation concise and idiomatic in English while
    preserving the likely slogan-like force. Alternatives are possible because the
    Greek is compressed.
- source_word: τῆς πρώτης σπείρης
  chosen: the first company
  alternatives:
  - the first cohort
  - the first band
  lexicon: LSJ
  rationale: σπεῖρα can denote a military unit. 'Cohort' is formally close but may
    suggest specifically Roman organization too strongly here; 'company' communicates
    a military subdivision in readable modern English.
- source_word: προηγούμενος
  chosen: led
  alternatives:
  - going before
  - taking the lead of
  lexicon: LSJ
  rationale: The participle indicates Judas' personal leadership from the front. 'Led'
    expresses the sense naturally in English without losing the active, front-line
    nuance.
- source_word: συνέβαλε τῷ Νικάνορι
  chosen: engaged Nicanor
  alternatives:
  - joined battle with Nicanor
  - attacked Nicanor
  lexicon: LSJ
  rationale: The idiom συμβάλλω with a dative in military narrative means to come
    to grips with or engage in battle with someone. 'Engaged Nicanor' is concise and
    idiomatic; 'attacked' is too one-sided, while 'joined battle with' is slightly
    heavier.
