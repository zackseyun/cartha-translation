translation:
  text: But when Maccabaeus had formed a band, he became by then impossible for the
    nations to withstand, because the wrath of the Lord had turned to mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the Gentiles,' since the Greek term can denote the non-Jewish nations
      surrounding Judea.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενόμενος ... ἐν συστήματι
  chosen: had formed a band
  alternatives:
  - had come to be in a group
  - had organized a company
  - had gathered a force
  lexicon: LSJ
  rationale: The participle with ἐν συστήματι indicates Maccabaeus' coming to operate
    as part of an organized body or band. 'Had formed a band' gives clear English
    while preserving the sense of an assembled fighting group without over-specifying
    military size.
- source_word: ἀνυπόστατος
  chosen: impossible ... to withstand
  alternatives:
  - unassailable
  - irresistible
  - not to be opposed
  lexicon: LSJ
  rationale: The adjective conveys something that cannot be stood against or resisted.
    In idiomatic English, 'impossible ... to withstand' best captures the force in
    this context of military opposition.
- source_word: τοῖς ἔθνεσιν
  chosen: for the nations
  alternatives:
  - for the Gentiles
  - for the peoples
  lexicon: LSJ
  rationale: In 2 Maccabees this commonly refers to the surrounding non-Jewish peoples/powers.
    'Nations' is the most direct rendering and avoids importing NT-era technical overtones
    of 'Gentiles,' though that nuance is nearby.
- source_word: τῆς ὀργῆς
  chosen: the wrath
  alternatives:
  - the anger
  lexicon: LSJ
  rationale: '''Wrath'' preserves the gravity of divine displeasure better than the
    flatter ''anger'' and fits the theological tone of the clause.'
- source_word: τοῦ κυρίου
  chosen: the Lord
  alternatives:
  - the lord
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is rendered 'Lord.' Here it refers to Israel's
    God, and the capitalization signals title usage in English.
- source_word: εἰς ἔλεον τραπείσης
  chosen: had turned to mercy
  alternatives:
  - had been turned to mercy
  - had changed into mercy
  - had turned toward mercy
  lexicon: LSJ
  rationale: 'The genitive absolute explains why Maccabaeus became unstoppable: the
    Lord''s wrath had changed into mercy. ''Had turned to mercy'' is concise and preserves
    the metaphor of change without awkward literalism.'
