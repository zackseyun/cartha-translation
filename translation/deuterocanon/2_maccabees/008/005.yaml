theological_decisions:
- issue: Divine agency and the causal relation of the final genitive absolute
  chosen_reading: because the wrath of the Lord had turned to mercy
  alternative_readings:
  - since the Lord's anger had been changed into compassion
  - with the Lord's wrath having turned to mercy
  rationale: The Greek genitive absolute is causal/explanatory in context, grounding
    Maccabaeus' success in a change in God's disposition toward his people. The translation
    preserves that theological claim without expanding beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
