theological_decisions:
- issue: Rendering δοῦλοις in relation to God
  chosen_reading: his slaves
  alternative_readings:
  - his servants
  rationale: The Greek uses the standard bonded-status term. In this context of divine
    ownership and appeal for restored favor, the stronger term remains appropriate,
    even though 'servants' is a possible smoother English alternative.
  doctrine_reference: 'DOCTRINE.md: δοῦλος default ''servant / slave (context-dependent)'';
    use ''slave'' where bonded nature is salient.'
- issue: Force of εἰς τέλος καταλλαγῆναι
  chosen_reading: to be fully reconciled
  alternative_readings:
  - to be reconciled at last
  - to be completely appeased
  rationale: The phrase most naturally intensifies the reconciliation rather than
    merely marking time. 'Fully reconciled' preserves the relational dimension and
    avoids reducing the clause to emotional appeasement alone.
