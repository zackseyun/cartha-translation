theological_decisions:
- issue: Referent of αὐτούς in ἰσομοίρους αὐτοὺς ... ποιήσαντες
  chosen_reading: the fighters made themselves equal sharers with the oppressed, orphans,
    widows, and the elderly
  alternative_readings:
  - they made those vulnerable groups equal sharers with themselves
  rationale: The reflexive-like use of αὐτούς after the finite verbs most naturally
    points back to the acting group. This yields the sense that they did not reserve
    a larger portion for themselves but shared equally with vulnerable members of
    the community. The alternative is syntactically possible and worth preserving.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity and preserve alternative in footnote.
