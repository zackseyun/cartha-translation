translation:
  text: And after crushing the forces of Timothy and Bacchides, they killed more than
    twenty thousand of them, gained firm control of very high strongholds, and divided
    the abundant plunder, making them equal sharers with the oppressed and orphans
    and widows, and even with the elderly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'giving equal shares to the oppressed, the orphans, the widows, and
      even the elderly.' The Greek pronoun can be taken differently, though the main
      text understands the soldiers as making themselves equal sharers with these
      vulnerable groups.
    reason: alternative_reading
lexical_decisions:
- source_word: συνερείσαντες
  chosen: after crushing the forces around
  alternatives:
  - after overpowering
  - after defeating
  - after shattering
  lexicon: LSJ
  rationale: The participle conveys forceful overthrow or crushing. Because it governs
    τοὺς περὶ Τιμόθεον καὶ Βακχίδην, the sense is not merely meeting Timothy and Bacchides
    personally but defeating their party/forces.
- source_word: τοὺς περὶ Τιμόθεον καὶ Βακχίδην
  chosen: the forces around Timothy and Bacchides
  alternatives:
  - those with Timothy and Bacchides
  - Timothy and Bacchides and their men
  lexicon: LSJ
  rationale: The idiom οἱ περὶ + name commonly means the group associated with or
    led by the named persons. 'Forces around' makes the military context explicit
    without overparaphrasing.
- source_word: ὑπὲρ τοὺς δισμυρίους
  chosen: more than twenty thousand
  alternatives:
  - over twenty thousand
  lexicon: LSJ
  rationale: δισμύριοι means twenty thousand; ὑπέρ with the accusative gives 'more
    than/over.' 'More than twenty thousand' is clear modern English.
- source_word: ἀνεῖλον
  chosen: killed
  alternatives:
  - slew
  - destroyed
  lexicon: BDAG
  rationale: In battle narrative ἀναιρέω commonly means kill. 'Killed' is direct and
    natural.
- source_word: ὀχυρωμάτων ὑψηλῶν εὖ μάλα ἐγκρατεῖς ἐγένοντο
  chosen: gained firm control of very high strongholds
  alternatives:
  - became masters of very lofty fortresses
  - took possession of very high fortifications
  lexicon: LSJ
  rationale: ἐγκρατής here denotes being in control or possession of something. ὀχυρώματα
    are fortified places/strongholds. 'Very high' reflects ὑψηλῶν with εὖ μάλα intensifying.
- source_word: λάφυρα πλείονος
  chosen: the plentiful plunder
  alternatives:
  - a greater amount of spoil
  - abundant spoils
  lexicon: LSJ
  rationale: The phrase indicates a large quantity of booty. 'Plentiful plunder' preserves
    the sense idiomatically; singular collective 'plunder' reads smoothly in English.
- source_word: ἐμερίσαντο
  chosen: divided
  alternatives:
  - distributed
  - portioned out
  lexicon: BDAG
  rationale: The verb means to divide or apportion. 'Divided' fits the direct object
    and the following participial explanation.
- source_word: ἰσομοίρους ... ποιήσαντες
  chosen: making themselves equal sharers with
  alternatives:
  - making them equal participants with
  - giving equal shares to
  lexicon: LSJ
  rationale: The Greek literally says 'having made them equal-sharers.' The pronoun
    αὐτούς most naturally refers back to the subject group themselves, i.e., they
    made themselves equal in share with the vulnerable groups rather than keeping
    more for themselves.
- source_word: τοῖς ἠκισμένοις
  chosen: the oppressed
  alternatives:
  - the wronged
  - the abused
  - the afflicted
  lexicon: LSJ
  rationale: From ἀδικέω/related formation, the term denotes those who have been mistreated
    or oppressed. 'Oppressed' best fits the social-justice context alongside orphans
    and widows.
- source_word: πρεσβυτέροις
  chosen: the elderly
  alternatives:
  - older men
  - elders
  lexicon: BDAG
  rationale: Here the context is social distribution to vulnerable persons, not an
    office. 'The elderly' avoids implying formal leadership.
