theological_decisions:
- issue: κύριος reference
  chosen_reading: the Lord
  alternative_readings:
  - the lord
  rationale: Following project policy, κύριος is rendered 'Lord.' In this narrative
    context the reference is to Israel's God, and capitalization reflects title usage
    in English without expanding the claim beyond the Greek.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Irony of εὐημερηκὼς ἐπὶ τῇ τοῦ στρατοῦ διαφθορᾷ
  chosen_reading: having prospered beyond all expectation in the destruction of his
    army
  alternative_readings:
  - having had remarkable success in ruining his army
  - having fared very well at the army's destruction
  rationale: 'The Greek appears intentionally ironic: Nicanor ''prospered'' only in
    the sense that his campaign ended in the destruction of his own forces. The translation
    preserves the irony rather than smoothing it away.'
