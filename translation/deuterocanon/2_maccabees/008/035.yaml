translation:
  text: Having been humbled by those whom he had considered the least, and by the
    Lord’s help having laid aside his splendid robe, he made himself a solitary fugitive
    through the inland country and came to Antioch, having fared exceedingly well
    in the destruction of his army.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'through the interior.' The Greek term refers to inland
      territory, not the Mediterranean Sea.
    reason: lexical_alternative
  - marker: b
    text: '''Like a fugitive'' translates an expression that can more literally mean
      ''in the manner of a runaway.'''
    reason: lexical_alternative
  - marker: c
    text: 'The wording is ironic: he ''prospered'' only in relation to the destruction
      of his own army.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταπεινωθεὶς
  chosen: having been humbled
  alternatives:
  - having been brought low
  - having been humiliated
  lexicon: LSJ
  rationale: Aorist passive participle from ταπεινόω. 'Having been humbled' preserves
    both the passive force and the shame/reversal implied by the context without over-intensifying
    to 'humiliated.'
- source_word: ὑπὸ τῶν καθʼ αὑτὸν νομιζομένων ἐλαχίστων εἶναι
  chosen: by those who were thought to be the least among his own
  alternatives:
  - by those around him who were considered least
  - by men of his own party thought to be insignificant
  lexicon: LSJ
  rationale: The phrase is syntactically compressed. καθʼ αὑτόν points to those on
    his own side/around him; νομιζομένων ἐλαχίστων εἶναι means 'considered to be least.'
    The rendering keeps the irony that he is brought low by people deemed insignificant.
- source_word: τῇ τοῦ κυρίου βοηθείᾳ
  chosen: with the Lord’s help
  alternatives:
  - by the Lord’s help
  - through the Lord’s assistance
  lexicon: LSJ
  rationale: Dative of means/instrument. 'With the Lord’s help' is idiomatic modern
    English and preserves the explicit attribution to the Lord.
- source_word: τὴν δοξικὴν ἀποθέμενος ἐσθῆτα
  chosen: having laid aside his splendid robe
  alternatives:
  - having put off his glorious garment
  - having removed his magnificent clothing
  lexicon: LSJ
  rationale: ἀποθέμενος means 'having put off/laid aside.' δοξικήν denotes splendor
    or display; 'splendid robe' conveys conspicuous rank-clothing in readable English.
- source_word: διὰ τῆς μεσογείου
  chosen: through the inland country
  alternatives:
  - through the interior
  - through the Mediterranean region
  lexicon: LSJ
  rationale: μεσόγειος commonly means inland/interior land, not the sea here. 'Through
    the inland country' best fits the flight narrative.
- source_word: δραπέτου τρόπον
  chosen: like a fugitive
  alternatives:
  - in the manner of a runaway
  - like an escaped slave
  lexicon: LSJ
  rationale: δραπέτης can denote a runaway, often a runaway slave. Here the comparison
    is adverbial and focuses on shameful flight; 'like a fugitive' communicates this
    without importing a slavery nuance not required by the immediate context.
- source_word: ἔρημον ἑαυτὸν ποιήσας
  chosen: in isolation
  alternatives:
  - making himself deserted
  - making himself solitary
  - all alone
  lexicon: LSJ
  rationale: Literally 'making himself deserted/solitary.' In context it describes
    his stripped-down, lonely flight. 'In isolation' captures the sense idiomatically
    in connection with his travel.
- source_word: ἧκεν εἰς Ἀντιόχειαν
  chosen: came to Antioch
  alternatives:
  - arrived at Antioch
  lexicon: LSJ
  rationale: Simple motion verb; 'came to Antioch' is straightforward and natural.
- source_word: ὑπὲρ ἅπαν εὐημερηκὼς
  chosen: having prospered beyond all expectation
  alternatives:
  - having fared exceedingly well
  - having succeeded beyond all
  lexicon: LSJ
  rationale: The idiom is somewhat ironic in context. εὐημερέω means to prosper or
    fare well; ὑπὲρ ἅπαν intensifies it. 'Beyond all expectation' conveys the hyperbolic
    force in natural English.
- source_word: ἐπὶ τῇ τοῦ στρατοῦ διαφθορᾷ
  chosen: in the destruction of his army
  alternatives:
  - at the ruin of the army
  - with respect to the army’s destruction
  lexicon: LSJ
  rationale: 'διαφθορά is ruin/destruction. The phrase is ironic: he ''prospered''
    only in seeing his army destroyed. Supplying ''his'' clarifies the referent from
    context.'
