translation:
  text: But they were selling all that remained, and at the same time were imploring
    the Lord to rescue those who had been sold by the ungodly Nikanor before he encountered
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'those who had been sold into slavery.'
      The Greek says simply 'those who had been sold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ περιλελειμμένα πάντα
  chosen: all that remained
  alternatives:
  - all the remaining things
  - everything left over
  lexicon: LSJ
  rationale: The perfect participle with πάντα refers to all remaining possessions
    or goods. 'All that remained' is natural English and preserves the comprehensive
    sense without over-specifying the object.
- source_word: ἐπώλουν
  chosen: were selling
  alternatives:
  - sold
  - kept selling
  lexicon: LSJ
  rationale: The imperfect indicates ongoing or repeated action. 'Were selling' preserves
    the durative sense better than a simple past.
- source_word: ὁμοῦ δὲ
  chosen: and at the same time
  alternatives:
  - and together
  - meanwhile
  lexicon: LSJ
  rationale: Here ὁμοῦ marks simultaneity with the selling. 'At the same time' communicates
    that they were doing both actions concurrently.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: LSJ
  rationale: Following the project's default for κύριος, this refers to God and is
    best rendered 'the Lord.'
- source_word: ἠξίουν
  chosen: were imploring
  alternatives:
  - were asking
  - were beseeching
  lexicon: LSJ
  rationale: The verb can mean ask, request, or entreat. In prayer to God in a crisis
    context, 'were imploring' best conveys the earnestness.
- source_word: ῥύσασθαι
  chosen: to rescue
  alternatives:
  - to deliver
  - to save
  lexicon: LSJ
  rationale: The aorist infinitive expresses the content of their plea. 'Rescue' fits
    the immediate danger and avoids importing broader soteriological overtones.
- source_word: τοὺς ... πεπραμένους
  chosen: those who had been sold
  alternatives:
  - those sold
  - the ones who had been sold into slavery
  lexicon: LSJ
  rationale: The perfect participle indicates a completed prior action with continuing
    result. 'Those who had been sold' is clear and faithful. 'Into slavery' is possible
    contextually but not explicit in the Greek, so it is left implicit in the main
    text.
- source_word: ὑπὸ τοῦ δυσσεβοῦς Νικάνορος
  chosen: by the ungodly Nikanor
  alternatives:
  - by impious Nikanor
  - by godless Nikanor
  lexicon: LSJ
  rationale: δυσσεβής is a strong moral-religious term. 'Ungodly' is idiomatic modern
    English and preserves the evaluative force. The name is transliterated as Nikanor.
- source_word: πρὶν συντυχεῖν
  chosen: before he encountered them
  alternatives:
  - before meeting them
  - before coming upon them
  lexicon: LSJ
  rationale: The infinitive after πρίν marks an event anticipated but not yet realized.
    The implied subject is Nikanor from the immediately preceding phrase; 'encountered
    them' captures the military context without over-interpreting.
