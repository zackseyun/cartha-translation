theological_decisions:
- issue: Rendering κύριος in a prayer addressed to God
  chosen_reading: the Lord
  alternative_readings:
  - the master
  rationale: The context is an appeal to God, and the project's default rendering
    for κύριος is 'Lord.' No special ambiguity here warrants an alternative in the
    main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to make explicit that those sold were sold into slavery
  chosen_reading: those who had been sold
  alternative_readings:
  - those who had been sold into slavery
  rationale: The context strongly suggests sale into slavery, but the Greek participle
    πεπραμένους does not itself specify the destination. The main text preserves the
    wording of the source without adding an explicit object; the contextual implication
    can remain implicit.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
