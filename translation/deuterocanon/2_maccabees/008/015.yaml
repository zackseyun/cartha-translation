translation:
  text: and not because of them, but because of the covenants with their fathers,
    and because of the invocation of his majestic and magnificent name over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not for their sake.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the invocation of his majestic and magnificent name over them,'
      an idiom for God's name being called over his people.
    reason: cultural_note
lexical_decisions:
- source_word: εἰ μὴ διʼ αὐτούς
  chosen: not because of them
  alternatives:
  - not for their sake
  - not on account of them
  lexicon: LSJ
  rationale: The phrase gives a negated ground or basis. 'Because of them' is natural
    English and preserves the causal force without over-paraphrasing.
- source_word: διὰ τὰς πρὸς τοὺς πατέρας αὐτῶν διαθήκας
  chosen: because of the covenants made with their fathers
  alternatives:
  - because of the covenants with their fathers
  - for the sake of the covenants toward their fathers
  lexicon: LSJ
  rationale: διαθήκας is best rendered 'covenants' in this Jewish scriptural context.
    The prepositional phrase πρὸς τοὺς πατέρας is somewhat wooden if translated literally
    as 'toward'; 'made with their fathers' conveys the relational sense idiomatically.
- source_word: ἕνεκα
  chosen: because
  alternatives:
  - for the sake of
  - on account of
  lexicon: LSJ
  rationale: ἕνεκα introduces an additional reason. 'Because' keeps the parallelism
    with the preceding causal phrase and reads smoothly in English.
- source_word: τῆς ἐπʼ αὐτοὺς ἐπικλήσεως
  chosen: that had been invoked over them
  alternatives:
  - called upon them
  - named over them
  - invocation over them
  lexicon: LSJ
  rationale: ἐπίκλησις here refers to the divine name being invoked or called over
    the people, echoing biblical covenantal language. 'Invoked over them' preserves
    both the verbal idea and the preposition ἐπί better than a flatter 'called upon
    them.'
- source_word: τοῦ σεμνοῦ καὶ μεγαλοπρεποῦς ὀνόματος αὐτοῦ
  chosen: the majestic and magnificent name of him
  alternatives:
  - his venerable and majestic name
  - his august and glorious name
  lexicon: LSJ
  rationale: σεμνός and μεγαλοπρεπής are both honorific adjectives. 'Majestic and
    magnificent' preserves the elevated tone in readable modern English. The genitive
    αὐτοῦ is rendered as 'of him' here to fit the Greek sequence before the relative
    clause, though in English this could also be simplified to 'his.'
