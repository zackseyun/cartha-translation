theological_decisions:
- issue: Covenantal motivation for divine mercy
  chosen_reading: The text grounds God's favorable action not in the people's own
    merit but in his covenants with their fathers and in his name invoked over them.
  alternative_readings:
  - The phrase could be smoothed to emphasize only God's reputation or only ancestral
    promises.
  rationale: The Greek explicitly gives two grounds and contrasts them with 'not because
    of them.' The translation preserves that theological tension without importing
    a fuller doctrine of merit or election than the verse itself states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
