translation:
  text: And he released Menelaus, the cause of all the evil, from among those under
    accusation; but for those wretched men—who, even if they had pleaded their case
    before Scythians, would have been released as innocent—for these he decreed death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literally, ''who, even if they had spoken before Scythians, would have
      been released uncondemned.'' The reference to Scythians heightens the irony:
      even a people stereotyped as harsh would have judged them innocent.'
    reason: cultural_note
  - marker: b
    text: Or 'would have been acquitted' for 'would have been released as innocent.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he sentenced them to death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν ... αἴτιον
  chosen: the cause
  alternatives:
  - the one responsible
  - the author
  lexicon: LSJ
  rationale: αἴτιος in this construction denotes responsibility/causation. 'The cause'
    preserves the judicial and moral force without overparaphrasing.
- source_word: τῆς ὅλης κακίας
  chosen: of all the evil
  alternatives:
  - of the whole wickedness
  - of all this trouble
  lexicon: LSJ
  rationale: ὅλης intensifies comprehensiveness; κακία can mean evil/wickedness/mischief.
    'All the evil' is natural English and preserves the broad moral charge.
- source_word: ἀπέλυσεν τῶν κατηγορημένων
  chosen: released ... from among those under accusation
  alternatives:
  - acquitted ... of the charges
  - set free from the accused
  lexicon: BDAG
  rationale: ἀπολύω commonly means release/set free; τῶν κατηγορημένων refers to the
    accused persons. 'Released ... from among those under accusation' keeps the Greek
    image and avoids overstating a formal acquittal.
- source_word: ταλαιπώροις
  chosen: wretched men
  alternatives:
  - miserable men
  - unfortunate men
  - poor men
  lexicon: LSJ
  rationale: The term conveys pitiable misery. 'Wretched men' preserves the pathos
    and suits the injustice being described.
- source_word: οἵτινες εἰ καὶ ἐπὶ Σκυθῶν ἔλεγον
  chosen: who, even if they had pleaded their case before Scythians
  alternatives:
  - who, even before Scythians, if they had spoken
  - who, had they argued even before Scythians
  lexicon: LSJ
  rationale: The idiom ἐπὶ + genitive here is judicial, 'before' or 'in the presence
    of'; ἔλεγον is elliptical for making their defense/statement. 'Pleaded their case'
    makes the forensic sense explicit in idiomatic English.
- source_word: ἀπελύθησαν ἀκατάγνωστοι
  chosen: would have been released as innocent
  alternatives:
  - would have been acquitted without condemnation
  - would have been let go uncondemned
  lexicon: LSJ
  rationale: ἀκατάγνωστος means not condemned/blameless. 'Released as innocent' communicates
    the judicial result clearly in modern English.
- source_word: θάνατον ἀπέκρινεν
  chosen: he decreed death
  alternatives:
  - he sentenced them to death
  - he pronounced death
  lexicon: LSJ
  rationale: ἀποκρίνω in this context means to give judgment/decision. 'Decreed death'
    is concise and close to the Greek, while still idiomatic.
