translation:
  text: But Menelaus held on to the office, yet he made no provision at all for the
    money he had promised to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'he paid nothing toward the money he had promised to
      the king.' The Greek says literally that he 'set in order/arranged nothing'
      concerning the promised money.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχῆς
  chosen: office
  alternatives:
  - rule
  - authority
  - position
  lexicon: LSJ
  rationale: In this context Menelaus is retaining the high-priestly post or governing
    position already under discussion, so 'office' best captures an official post
    rather than abstract 'rule' or mere 'authority'.
- source_word: ἐκράτει
  chosen: held on to
  alternatives:
  - held
  - kept control of
  - retained
  lexicon: LSJ
  rationale: The imperfect indicates continued possession or control. 'Held on to'
    conveys his continued retention of the office with a slightly adversative nuance
    fitting the contrast that follows.
- source_word: ἐπηγγελμένων
  chosen: had promised
  alternatives:
  - had undertaken
  - had pledged
  lexicon: LSJ
  rationale: The participle refers to the sums Menelaus had previously promised to
    the king. 'Had promised' is the most natural modern English rendering.
- source_word: χρημάτων
  chosen: money
  alternatives:
  - funds
  - sums of money
  lexicon: LSJ
  rationale: The term here refers concretely to monetary payment owed to the king,
    so 'money' is clear and sufficiently precise.
- source_word: οὐδὲν εὐτάκτει
  chosen: made no arrangement at all
  alternatives:
  - paid nothing
  - set nothing in order
  - took no steps
  lexicon: LSJ
  rationale: The verb literally concerns putting matters in order or arranging them.
    Since the object is the promised money, the sense is that he made no provision
    for payment. 'Made no arrangement at all' preserves the verbal idea without over-interpreting
    it as direct payment, though payment is implied.
