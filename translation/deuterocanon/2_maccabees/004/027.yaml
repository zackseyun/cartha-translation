id: 2MA.4.27
reference: 2 Maccabees 4:27
source:
  edition: lxx-swete-1909
  text: ὁ δὲ Μενέλαος τῆς μὲν ἀρχῆς ἐκράτει, τῶν δὲ ἐπηγγελμένων τῷ βασιλεῖ χρημάτων
    οὐδὲν εὐτάκτει.
