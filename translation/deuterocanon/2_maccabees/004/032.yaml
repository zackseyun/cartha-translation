theological_decisions:
- issue: Nature of Menelaus's offense against temple property
  chosen_reading: Rendered νοσφισάμενος as 'embezzled' to emphasize fraudulent misappropriation
    of sacred goods.
  alternative_readings:
  - misappropriated
  - stole
  rationale: The verse condemns sacrilegious misuse of temple property, but it does
    not require importing later doctrinal categories. 'Embezzled' is morally weighty
    while staying lexical.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
