theological_decisions:
- issue: Sense of πολιτεία in a Jewish legal-political context
  chosen_reading: Rendered as 'forms of government' rather than 'citizenship' or 'constitution.'
  alternative_readings:
  - lawful institutions
  - lawful constitution
  - lawful civic order
  rationale: The context concerns Jason's suppression of established Jewish public
    order and replacement with Hellenizing practices. 'Forms of government' best conveys
    the institutional-political sense in accessible English, while avoiding anachronistic
    precision.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of φιλάνθρωπα βασιλικά
  chosen_reading: Rendered as 'royal concessions.'
  alternative_readings:
  - benevolent royal measures
  - humane royal decrees
  rationale: The phrase points to favorable royal grants previously secured for the
    Jews. 'Concessions' communicates practical privileges or allowances from the crown
    more clearly than a literal but awkward rendering.
  doctrine_reference: Translation philosophy §1, §6
