translation:
  text: And he set aside the royal concessions laid down for the Jews through John,
    the father of Eupolemus—the one who had carried out the embassy to the Romans
    concerning friendship and alliance—and, while abolishing the lawful forms of government,
    he introduced unlawful customs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the benevolent royal measures' or 'the humane royal decrees' for the
      Jews.
    reason: lexical_alternative
  - marker: b
    text: Or 'lawful institutions' or 'lawful civic order.' The Greek term can refer
      broadly to a community's established civic constitution or public order.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ κείμενα
  chosen: the ... laid down
  alternatives:
  - the decrees established
  - the provisions in force
  - the arrangements set forth
  lexicon: LSJ
  rationale: The participle from κεῖμαι here refers to measures or provisions that
    had been established or were in force. 'Laid down' preserves the formal sense
    without sounding overly technical.
- source_word: φιλάνθρωπα βασιλικὰ
  chosen: royal concessions
  alternatives:
  - benevolent royal measures
  - humane royal decrees
  - kindly royal provisions
  lexicon: LSJ
  rationale: The phrase denotes favorable royal measures toward the Jews. 'Concessions'
    captures the sense of privileges or favorable grants from the king better than
    a wooden 'philanthropic royal things.' 'Royal' keeps βασιλικά explicit, and the
    benevolent force of φιλάνθρωπα is carried by 'concessions' in context.
- source_word: παρώσας
  chosen: set aside
  alternatives:
  - nullified
  - rejected
  - pushed aside
  lexicon: LSJ
  rationale: The participle indicates disregarding or overriding the previously established
    royal provisions. 'Set aside' is idiomatic and fits the legal-political context
    without overstating formal annulment.
- source_word: πρεσβείαν
  chosen: the embassy
  alternatives:
  - the mission
  - the delegation
  lexicon: LSJ
  rationale: The noun refers to an official diplomatic mission. 'Embassy' preserves
    the political register of the passage.
- source_word: φιλίας καὶ συμμαχίας
  chosen: friendship and alliance
  alternatives:
  - friendship and treaty
  - amity and alliance
  lexicon: LSJ
  rationale: These are standard diplomatic terms. 'Friendship and alliance' is clear
    modern English and preserves the formal bilateral sense.
- source_word: νομίμους ... πολιτίας
  chosen: lawful forms of government
  alternatives:
  - lawful institutions
  - legal civic arrangements
  - lawful constitution
  lexicon: LSJ
  rationale: The phrase refers to established lawful civic/political order among the
    Jews. 'Forms of government' communicates πολιτεία in a public-constitutional sense
    better than the narrower 'citizenship' here.
- source_word: καταλύων
  chosen: abolishing
  alternatives:
  - dismantling
  - overthrowing
  - doing away with
  lexicon: LSJ
  rationale: The participle conveys active dismantling of existing institutions. 'Abolishing'
    fits the legal-political context and pairs well with the contrast to introducing
    new customs.
- source_word: παρανόμους ἔθισμους
  chosen: unlawful customs
  alternatives:
  - lawless practices
  - customs contrary to the law
  - illegal usages
  lexicon: LSJ
  rationale: The phrase contrasts with the lawful order just mentioned and likely
    alludes to customs contrary to Jewish law. 'Unlawful customs' preserves both the
    legal and customary dimensions.
- source_word: ἐκαίνιζεν
  chosen: introduced
  alternatives:
  - instituted anew
  - established
  - brought in
  lexicon: LSJ
  rationale: The imperfect indicates he was bringing in or instituting new practices.
    'Introduced' is natural English and retains the innovation implied by the verb.
