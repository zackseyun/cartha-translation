translation:
  text: Jason, the brother of Onias, undermined the high priesthood, promising the
    king through a petition sixty talents of silver in addition to three hundred,
    and eighty talents from some other revenue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through an audience' or 'by petition'; the Greek term can refer either
      to a formal petition or to personal access to the king.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'sixty talents in addition to the three hundred,' that is, a
      total of three hundred sixty talents of silver.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπενόθευσεν
  chosen: undermined
  alternatives:
  - corrupted
  - obtained by underhanded means
  - adulterated
  lexicon: LSJ
  rationale: The verb literally carries the sense of falsifying, debasing, or dealing
    fraudulently. In this context, with the object 'the high priesthood,' it refers
    to Jason's corrupt subversion of the office rather than a simple legal acquisition.
    'Undermined' communicates the moral and institutional damage in readable English
    without overparaphrasing.
- source_word: ἀρχιερωσύνην
  chosen: the high priesthood
  alternatives:
  - the office of high priest
  lexicon: LSJ
  rationale: This denotes the office or dignity of the high priest, not merely priestly
    activity. 'The high priesthood' is the most direct and idiomatic rendering.
- source_word: ἐπαγγειλάμενος
  chosen: promising
  alternatives:
  - offering
  - undertaking to pay
  lexicon: LSJ
  rationale: 'The participle introduces the means by which Jason acted: he promised
    payment to the king. ''Promising'' preserves the verbal force without importing
    a more technical financial term than the Greek requires.'
- source_word: διʼ ἐντεύξεως
  chosen: through a petition
  alternatives:
  - by petition
  - through an audience
  - by approach
  lexicon: LSJ
  rationale: ἔντευξις commonly refers to an interview, petition, or formal approach
    to a ruler. 'Through a petition' fits the political context and explains how the
    promise was made. Because the term can also imply a personal audience, that alternative
    is preserved in a footnote.
- source_word: ἀργυρίου
  chosen: of silver
  alternatives:
  - in silver
  lexicon: LSJ
  rationale: The genitive specifies the substance of the payment. 'Talents of silver'
    is standard and clear.
- source_word: τάλαντα ἑξήκοντα πρὸς τοῖς τριακοσίοις
  chosen: sixty talents of silver in addition to three hundred
  alternatives:
  - three hundred sixty talents of silver
  lexicon: LSJ
  rationale: The Greek phrase literally means 'sixty talents in addition to the three
    hundred.' Rendering it this way preserves the structure of the source and avoids
    silently collapsing the expression into a single summed figure, though the total
    implied is 360 talents.
- source_word: προσόδου τινὸς ἄλλης
  chosen: from some other revenue
  alternatives:
  - from another source of income
  - from some additional revenue
  lexicon: LSJ
  rationale: πρόσοδος denotes revenue or income. The phrase indicates an additional
    financial stream beyond the silver already mentioned. 'From some other revenue'
    stays close to the Greek while remaining intelligible.
- source_word: τάλαντα ὀγδοήκοντα
  chosen: eighty talents
  lexicon: LSJ
  rationale: A straightforward monetary amount; no special interpretive issue beyond
    preserving the unit 'talents'.
