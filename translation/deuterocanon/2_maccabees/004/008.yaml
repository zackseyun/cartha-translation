theological_decisions:
- issue: Moral force of Jason's action toward the high priesthood
  chosen_reading: Rendered ὑπενόθευσεν as 'undermined' to reflect corrupt subversion
    of the sacred office.
  alternative_readings:
  - corrupted the high priesthood
  - secured the high priesthood by underhanded means
  rationale: The verse presents not a neutral succession but a morally compromised
    seizure or debasement of the office. The chosen rendering preserves that negative
    evaluation without overstating details not explicit in the Greek.
  doctrine_reference: Translation philosophy §§1, 5
