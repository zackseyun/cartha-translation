theological_decisions:
- issue: Rendering culturally loaded phrase Ἑλληνικὸν χαρακτῆρα
  chosen_reading: the Greek way of life
  alternative_readings:
  - the Greek character
  - Greek customs
  rationale: The verse describes Jason's program of Hellenization. A too-literal 'character'
    is opaque in modern English and may sound psychological rather than cultural.
    The chosen rendering preserves the historical-cultural force without adding doctrinal
    interpretation.
  doctrine_reference: Translation philosophy §1, §6
