translation:
  text: And when the king had given his approval, and he had gained control of the
    office, he immediately shifted his countrymen over to the Greek way of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the Greek character' or 'Greek stamp'; the phrase refers to
      adopting Greek cultural patterns and customs.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπινεύσαντος
  chosen: had given his approval
  alternatives:
  - had assented
  - had nodded consent
  - had consented
  lexicon: LSJ
  rationale: The genitive absolute indicates prior action by the king. The verb can
    denote assent or approval; 'had given his approval' is idiomatic English that
    preserves the sense of official consent better than a literal 'nodded.'
- source_word: ἀρχῆς
  chosen: the office
  alternatives:
  - the rule
  - the authority
  - the government
  lexicon: LSJ
  rationale: In context with κρατήσας ('having gained control'), the term refers to
    the governing position or civic office Jason secured, not abstract authority in
    general. 'Office' best fits the political setting.
- source_word: κρατήσας
  chosen: had gained control
  alternatives:
  - had taken possession
  - had become master
  - had secured power
  lexicon: LSJ
  rationale: The participle conveys obtaining effective control. 'Had gained control'
    is natural English and keeps the force of acquiring operative power connected
    with the office.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: LSJ
  rationale: Marks prompt action following his accession; 'immediately' is clear modern
    English.
- source_word: ὁμοφύλους
  chosen: his countrymen
  alternatives:
  - his own people
  - his fellow Jews
  - those of his own race
  lexicon: LSJ
  rationale: The word denotes those of the same stock or people. 'His countrymen'
    preserves the ethnic-national sense without over-specifying beyond the immediate
    Greek wording, though the referent is the Jewish people.
- source_word: μετέστησε
  chosen: shifted ... over
  alternatives:
  - transferred
  - turned
  - moved
  lexicon: LSJ
  rationale: The verb indicates causing a change from one state or orientation to
    another. 'Shifted ... over' captures the active redirection while remaining readable.
- source_word: Ἑλληνικὸν χαρακτῆρα
  chosen: the Greek way of life
  alternatives:
  - the Greek character
  - the Greek mode
  - Greek customs
  lexicon: LSJ
  rationale: Literally 'Greek character/stamp,' but in this context it refers to Hellenistic
    cultural patterning rather than inner moral character alone. 'The Greek way of
    life' communicates the cultural assimilation in view.
