theological_decisions:
- issue: Value-laden contrast between Jewish ancestral heritage and adopted Greek
    cultural prestige
  chosen_reading: Render the contrast descriptively without importing later polemical
    language.
  alternative_readings:
  - and despising the honors of their ancestors, while esteeming Greek glories as
    best
  rationale: The Greek itself presents a sharp evaluative contrast, but it does not
    use an explicit verb 'despise.' The translation preserves the negative valuation
    ('placing no value at all on') and the positive valuation of Greek prestige without
    intensifying beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
