translation:
  text: For he gladly established a gymnasium under the very citadel, and by bringing
    the noblest of our young men under the Greek cap, he was leading them on.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the petasos,' a broad-brimmed Greek hat that functioned here as
      a visible marker of Hellenistic identity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡδέως
  chosen: gladly
  alternatives:
  - with pleasure
  - eagerly
  lexicon: LSJ
  rationale: Conveys willing enthusiasm without overstating emotion. The adverb modifies
    the whole action of establishing the gymnasium.
- source_word: ὑπʼ αὐτὴν ἀκρόπολιν
  chosen: under the very citadel
  alternatives:
  - beneath the citadel
  - at the foot of the citadel
  lexicon: LSJ
  rationale: ὑπό with accusative here is spatial, and αὐτήν adds emphasis ('very'
    / 'itself'). 'Under the very citadel' preserves the vivid placement near Jerusalem's
    stronghold.
- source_word: γυμνάσιον
  chosen: gymnasium
  alternatives:
  - training ground
  lexicon: LSJ
  rationale: The Greek term refers specifically to the Hellenistic institution, not
    merely a place for exercise. Retaining 'gymnasium' preserves the cultural and
    historical force.
- source_word: καθίδρυσεν
  chosen: established
  alternatives:
  - founded
  - set up
  lexicon: LSJ
  rationale: '''Established'' fits the institutional sense of founding or setting
    in place a gymnasium.'
- source_word: τοὺς κρατίστους τῶν ἐφʼ ἡμῶν
  chosen: the noblest of our young men
  alternatives:
  - the best of our men
  - the leading men among us
  lexicon: LSJ
  rationale: κρατίστους means 'best' or 'most distinguished.' In this context, with
    the gymnasium and the following cultural assimilation, the reference is most naturally
    to elite youths rather than older civic leaders. 'Our young men' also reflects
    the social setting of gymnasium participation.
- source_word: ὑποτάσσων
  chosen: by bringing ... under
  alternatives:
  - subjecting
  - placing
  lexicon: LSJ
  rationale: The participle indicates subjection or placement under a new regime or
    marker of identity. 'By bringing ... under' is idiomatic in English while preserving
    the sense of imposed conformity.
- source_word: ὑπὸ πέτασον
  chosen: under the Greek cap
  alternatives:
  - under the petasos
  - under the broad-brimmed hat
  lexicon: LSJ
  rationale: πέτασος is the Greek broad-brimmed cap/hat associated with Greek custom.
    Adding 'Greek' makes the cultural signal explicit for modern readers while staying
    anchored in the term's meaning.
- source_word: ἦγεν
  chosen: he was leading them on
  alternatives:
  - he was leading them
  - he was bringing them
  lexicon: LSJ
  rationale: The imperfect suggests ongoing action. 'Leading them on' captures the
    progressive movement into Hellenizing practice, not merely a single act of escorting.
