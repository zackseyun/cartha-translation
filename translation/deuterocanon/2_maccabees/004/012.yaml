theological_decisions:
- issue: Cultural assimilation implied by ὑπὸ πέτασον
  chosen_reading: Render the phrase concretely as 'under the Greek cap' rather than
    abstractly as 'into Greek customs.'
  alternative_readings:
  - into the Greek way of life
  - into Greek customs
  rationale: The text uses a concrete cultural marker, and the translation should
    preserve that image rather than paraphrase it into a generalized interpretation.
    The assimilation theme remains clear from context.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source warrants.'
