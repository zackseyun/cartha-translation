translation:
  text: For this reason they wounded many of them, struck down some, and drove them
    all into flight; and they seized the temple-robber himself beside the treasury.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacrilegious man.' The Greek term can denote one who commits sacrilege,
      especially by robbing a temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ ἣν αἰτίαν
  chosen: For this reason
  alternatives:
  - because of which
  - for which reason
  lexicon: LSJ
  rationale: Idiomatic causal connector introducing the result of the preceding situation;
    'For this reason' is natural English while preserving the causal force.
- source_word: τραυματίας ἐποίησαν
  chosen: wounded
  alternatives:
  - made wounded
  - injured
  lexicon: LSJ
  rationale: The idiom literally means 'made [them] wounded,' but standard English
    requires a verbal rendering. 'Wounded' preserves the physical-violence sense more
    specifically than the broader 'injured'.
- source_word: κατέβαλον
  chosen: struck down
  alternatives:
  - knocked down
  - killed
  lexicon: LSJ
  rationale: The verb can mean cast down or bring down. In this violent context it
    could imply killing, but the Greek does not explicitly say 'killed.' 'Struck down'
    preserves the force without over-specifying the outcome.
- source_word: εἰς φυγὴν συνήλασαν
  chosen: drove them all into flight
  alternatives:
  - put them all to flight
  - routed them all
  lexicon: LSJ
  rationale: This phrase denotes forcing people to flee. 'Drove them all into flight'
    is vivid and close to the Greek; 'routed' is possible but slightly more interpretive.
- source_word: τὸν ἱερόσυλον
  chosen: the temple-robber
  alternatives:
  - the sacrilegious man
  - the temple-plunderer
  lexicon: LSJ
  rationale: ἱερόσυλος denotes one who robs temples or commits sacrilege against sacred
    property. Since the context concerns the treasury, 'temple-robber' captures the
    concrete offense better than the more abstract 'sacrilegious man.'
- source_word: ἐχειρώσαντο
  chosen: they seized
  alternatives:
  - they took in hand
  - they captured
  - they arrested
  lexicon: LSJ
  rationale: The middle verb here means to get someone into one's hands, i.e., seize
    or capture. 'Seized' is concise and contextually apt; 'arrested' would sound too
    formally legal.
- source_word: παρὰ τὸ γαζοφυλάκιον
  chosen: beside the treasury
  alternatives:
  - near the treasury
  - by the treasury chamber
  lexicon: LSJ
  rationale: γαζοφυλάκιον refers to the treasury or treasury chamber. 'Beside the
    treasury' preserves the spatial sense of παρά without adding architectural detail
    not explicit in the text.
