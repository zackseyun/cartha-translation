translation:
  text: and he dared to call the benefactor of the city, the guardian of his fellow
    countrymen, and the zealot for the laws, a conspirator against the state.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'one plotting against public affairs' or 'a conspirator against the
      commonwealth.' The Greek phrase is political in force, not merely personal hostility.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐεργέτην
  chosen: benefactor
  alternatives:
  - doer of good
  - public benefactor
  lexicon: LSJ
  rationale: The accusative noun denotes one who does good or confers benefits. In
    this civic context, 'benefactor' best captures the public, honorific sense without
    unnecessary expansion.
- source_word: κηδεμόνα
  chosen: guardian
  alternatives:
  - protector
  - champion
  lexicon: LSJ
  rationale: The term refers to one who cares for or protects others. 'Guardian' preserves
    the protective nuance and fits the parallel commendatory titles applied to Onias.
- source_word: τῶν ὁμοεθνῶν
  chosen: of his fellow countrymen
  alternatives:
  - of his own nation
  - of his compatriots
  lexicon: LSJ
  rationale: The genitive describes those of the same people or nation. 'Fellow countrymen'
    is natural English and keeps the ethnic/national solidarity in view. 'His' is
    supplied idiomatically to link the title to the person being described.
- source_word: ζηλωτήν
  chosen: zealot
  alternatives:
  - zealous defender
  - one devoted
  lexicon: LSJ
  rationale: The noun denotes one marked by zeal. 'Zealot' is concise and preserves
    the force of the Greek; here it is not a technical party label but a descriptor
    of ardent commitment.
- source_word: τῶν νόμων
  chosen: for the laws
  alternatives:
  - for the law
  - for the ancestral laws
  lexicon: LSJ
  rationale: The plural is explicit in Greek. 'The laws' preserves the form of the
    source and suits the broader Jewish legal tradition in this Hellenistic context.
- source_word: ἐπίβουλον
  chosen: a conspirator against the state
  alternatives:
  - one plotting against the affairs of state
  - an enemy of public order
  lexicon: LSJ
  rationale: The adjective/noun denotes someone plotting against or treacherous toward
    public affairs. Because it is modified by τῶν πραγμάτων, a simple 'conspirator'
    is too vague; 'against the state' brings out the political accusation in idiomatic
    English.
- source_word: τῶν πραγμάτων
  chosen: the state
  alternatives:
  - public affairs
  - the government
  - the commonwealth
  lexicon: LSJ
  rationale: In this context πράγματα refers to civic or political affairs, not merely
    'things.' 'The state' is a compact modern rendering that communicates the public-political
    sphere targeted by the accusation.
- source_word: ἐτόλμα λέγειν
  chosen: he dared to call
  alternatives:
  - he dared to say
  - he ventured to describe
  lexicon: LSJ
  rationale: The construction expresses audacious speech. Since the following accusative
    phrase gives the content of the label applied to Onias, 'dared to call' is more
    idiomatic than a wooden 'dared to say.'
