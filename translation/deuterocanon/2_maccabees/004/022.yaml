translation:
  text: And he was received with great splendor by Jason and the city, and was welcomed
    with a torchlight procession and shouts; then in this way he encamped in Phoenicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with torch-bearing and acclamations.' The Greek describes a ceremonial
      public welcome marked by torches and loud cries.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγαλομερῶς
  chosen: with great splendor
  alternatives:
  - magnificently
  - in grand style
  - sumptuously
  lexicon: LSJ
  rationale: The adverb denotes a grand or lavish manner. 'With great splendor' preserves
    the public, ceremonial sense in natural English without overstating luxury.
- source_word: ἀποδεχθεὶς
  chosen: was received
  alternatives:
  - was welcomed
  - was accepted
  lexicon: LSJ
  rationale: Passive participle from ἀποδέχομαι here refers to the formal reception
    of the visiting ruler. 'Was received' fits the ceremonial context and pairs well
    with the following more specific welcome expression.
- source_word: δᾳδουχίας
  chosen: torchlight procession
  alternatives:
  - torch-bearing
  - torch parade
  lexicon: LSJ
  rationale: The noun refers to carrying torches in procession, especially in a ceremonial
    welcome. 'Torchlight procession' makes the event clear in idiomatic English and
    captures more than the mere presence of torches.
- source_word: βοῶν
  chosen: shouts
  alternatives:
  - cries
  - acclamations
  lexicon: LSJ
  rationale: The genitive plural denotes loud vocal outcries accompanying the reception.
    'Shouts' is vivid and accessible; 'acclamations' is possible but more formal and
    interpretive.
- source_word: εἰσεδέχθη
  chosen: was welcomed
  alternatives:
  - was received in
  - was escorted in
  lexicon: LSJ
  rationale: This verb overlaps semantically with ἀποδεχθεὶς but adds the sense of
    being brought in or welcomed into the city. Rendering it 'was welcomed' avoids
    awkward repetition while preserving the ceremonial reception.
- source_word: εἶθʼ οὕτως
  chosen: then in this way
  alternatives:
  - after that
  - thus then
  lexicon: LSJ
  rationale: The phrase marks sequence and links the subsequent action to the manner
    just described. 'Then in this way' preserves that connective force better than
    a bare temporal transition.
- source_word: κατεστρατοπέδευσεν
  chosen: he encamped
  alternatives:
  - he made camp
  - he quartered his forces
  lexicon: LSJ
  rationale: The verb literally refers to establishing camp. 'He encamped' is concise
    and sufficiently formal; 'quartered his forces' would import military detail not
    explicit in the Greek.
- source_word: Φοινίκην
  chosen: Phoenicia
  lexicon: LSJ
  rationale: Standard English geographical rendering of the Greek place name.
