  text: καὶ ὁ μὲν Ἰάσων ὁ τὸν ἴδιον ἀδελφὸν ὑπονοθεύσας, ὑπονοθευθεὶς ὑφʼ ἑτέρου φυγὰς
    εἰς τὴν Ἀμμανῖτιν χώραν ὑπῆλθεν.
