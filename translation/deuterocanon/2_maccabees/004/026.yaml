translation:
  text: And Jason, who had supplanted his own brother, having himself been supplanted
    by another, fled and went into the land of the Ammonites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'had undermined his own brother ... having himself been undermined by
      another.' The Greek uses the same verb in active and passive forms to emphasize
      ironic reversal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπονοθεύσας
  chosen: had supplanted
  alternatives:
  - had undermined
  - had cheated
  - had displaced by intrigue
  lexicon: LSJ
  rationale: The participle describes Jason's prior act against his brother Onias
    in obtaining the high priesthood through underhanded means. 'Supplanted' captures
    both displacement and the treacherous nuance without over-specifying the mechanism.
- source_word: ὑπονοθευθεὶς
  chosen: having himself been supplanted
  alternatives:
  - having been undermined
  - having been cheated
  - having been displaced by intrigue
  lexicon: LSJ
  rationale: 'Using the cognate passive preserves the rhetorical symmetry of the Greek:
    the one who supplanted another is in turn supplanted. ''Himself'' brings out the
    reversal.'
- source_word: φυγάς
  chosen: fled
  alternatives:
  - as a fugitive
  - became a fugitive
  lexicon: LSJ
  rationale: The noun/adverbial idea is compressed naturally in English by the verb
    'fled.' This avoids awkwardness while preserving the sense that he went in exile
    or as a fugitive.
- source_word: ὑπῆλθεν
  chosen: went into
  alternatives:
  - departed to
  - made his way into
  - withdrew into
  lexicon: LSJ
  rationale: A straightforward motion verb fits the context after 'fled.' 'Went into'
    is idiomatic and keeps the destination phrase clear.
- source_word: τὴν Ἀμμανῖτιν χώραν
  chosen: the land of the Ammonites
  alternatives:
  - the Ammonite country
  - the territory of Ammon
  lexicon: LSJ
  rationale: This renders the ethnic adjective plus χώρα in natural English. 'Land
    of the Ammonites' is clear to modern readers and preserves the people-group reference.
- source_word: ὁ τὸν ἴδιον ἀδελφὸν
  chosen: his own brother
  alternatives:
  - his brother
  lexicon: LSJ
  rationale: Including 'own' reflects ἴδιον and sharpens the moral force of the betrayal
    within the family.
