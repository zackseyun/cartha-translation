translation:
  text: And there was such a height of Hellenism and an advance of foreign ways because
    of the surpassing shamelessness of Jason, who was ungodly and not a high priest,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an inroad of foreign customs.' The Greek rare term points to the spread
      of non-native, non-Jewish practices.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκμή
  chosen: height
  alternatives:
  - peak
  - full bloom
  - high point
  lexicon: LSJ
  rationale: ἀκμή denotes a point of highest development or culmination. 'Height'
    is idiomatic in English and preserves the metaphor without overinterpreting.
- source_word: Ἑλληνισμός
  chosen: Hellenism
  alternatives:
  - Greek culture
  - Greek way of life
  lexicon: LSJ
  rationale: The term refers not merely to ethnicity but to adoption of Greek customs
    and culture. 'Hellenism' preserves the historical specificity of the program being
    criticized.
- source_word: πρόσβασις
  chosen: advance
  alternatives:
  - progress
  - inroad
  - access
  lexicon: LSJ
  rationale: In context the noun conveys encroachment or forward movement. 'Advance'
    captures the sense of increasing spread without the awkwardness of 'access.'
- source_word: ἀλλοφυλισμός
  chosen: foreign ways
  alternatives:
  - foreign customs
  - alien mode of life
  - foreignism
  lexicon: LSJ
  rationale: The rare term points to adoption of non-native, specifically non-Jewish,
    customs. 'Foreign ways' is readable modern English and conveys cultural-religious
    alienation better than the opaque 'foreignism.'
- source_word: διὰ
  chosen: because of
  alternatives:
  - through
  - on account of
  lexicon: BDAG
  rationale: With the accusative here, διὰ expresses cause. 'Because of' is the clearest
    causal rendering.
- source_word: ἀσεβοῦς
  chosen: ungodly
  alternatives:
  - impious
  - godless
  lexicon: LSJ
  rationale: The adjective marks Jason as irreverent toward God and covenantal obligations.
    'Ungodly' is accessible and weighty without sounding overly technical.
- source_word: οὐκ ἀρχιερέως
  chosen: not a high priest
  alternatives:
  - no high priest
  - not truly high priest
  lexicon: LSJ
  rationale: The Greek is blunt and polemical, denying Jason the legitimacy of the
    office. 'Not a high priest' preserves that direct repudiation.
- source_word: ὑπερβάλλουσαν
  chosen: surpassing
  alternatives:
  - excessive
  - extraordinary
  - overwhelming
  lexicon: LSJ
  rationale: The participle intensifies the following noun. 'Surpassing' keeps the
    comparative force and fits the elevated tone.
- source_word: ἀναιδείαν
  chosen: shamelessness
  alternatives:
  - audacity
  - insolence
  - impudence
  lexicon: LSJ
  rationale: The word denotes brazen disregard for propriety. 'Shamelessness' best
    captures the moral condemnation in context.
