theological_decisions:
- issue: Force of οὐκ ἀρχιερέως in reference to Jason
  chosen_reading: Jason is described as 'not a high priest,' expressing the author's
    judgment that he lacked legitimate priestly standing.
  alternative_readings:
  - Jason, who was no true high priest
  - Jason, not being high priest
  rationale: The phrase is not a neutral description but a denunciation of Jason's
    illegitimacy. The translation preserves the polemical force without adding explanatory
    words like 'true' in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
