translation:
  text: But Menelaus, already having been won over, promised Ptolemy son of Dorymenes
    a considerable amount of money to persuade the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'already having been ingratiated' or 'already having been won over favorably.'
      The Greek participle λελιμμένος is somewhat difficult and may suggest that Menelaus
      had already secured Ptolemy's favorable disposition before making this monetary
      promise.
    reason: lexical_alternative
lexical_decisions:
- source_word: λελιμμένος
  chosen: having been won over
  alternatives:
  - having been ingratiated
  - having been softened up
  - having been bribed
  lexicon: LSJ
  rationale: The perfect passive participle indicates Menelaus was already in a state
    of being influenced or brought around. In context, it suggests Ptolemy had been
    favorably disposed toward him, likely through prior maneuvering. 'Won over' preserves
    the passive sense without over-specifying the means. 'Bribed' is possible contextually
    but goes beyond the word itself in this clause.
- source_word: ἐπηγγείλατο
  chosen: promised
  alternatives:
  - offered
  - undertook to give
  lexicon: BDAG
  rationale: The middle form commonly means 'promised' or 'professed.' Here it governs
    χρήματα ἱκανά and naturally means Menelaus pledged money. 'Promised' is straightforward
    and idiomatic.
- source_word: χρήματα ἱκανά
  chosen: a considerable amount of money
  alternatives:
  - enough money
  - substantial funds
  - a large sum of money
  lexicon: LSJ
  rationale: χρήματα here means money or funds, and ἱκανά denotes sufficiency/considerable
    quantity. 'A considerable amount of money' conveys the sense of a substantial
    promised payment without sounding wooden.
- source_word: τῷ Πτολεμαίῳ Δορυμένους
  chosen: Ptolemy son of Dorymenes
  alternatives:
  - Ptolemy, of Dorymenes
  - Ptolemy Dorymenes' son
  lexicon: LSJ
  rationale: The genitive Δορυμένους is best taken as patronymic, identifying which
    Ptolemy is meant. Rendering it 'son of Dorymenes' makes the relationship explicit
    in natural English.
- source_word: πρὸς τὸ πεῖσαι τὸν βασιλέα
  chosen: to persuade the king
  alternatives:
  - for persuading the king
  - so as to convince the king
  lexicon: BDAG
  rationale: The preposition with the articular infinitive expresses purpose. 'To
    persuade the king' is concise and accurate.
