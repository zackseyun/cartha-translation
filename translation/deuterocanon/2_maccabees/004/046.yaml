  text: ἤδη δὲ λελιμμένος ὁ Μενέλαος ἐπηγγείλατο χρήματα ἱκανὰ τῷ Πτολεμαίῳ Δορυμένους,
    πρὸς τὸ πεῖσαι τὸν βασιλέα.
