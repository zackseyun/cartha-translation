id: 2MA.4.34
reference: 2 Maccabees 4:34
source:
  edition: lxx-swete-1909
  text: ὅθεν ὁ Μενέλαος λαβὼν ἰδίᾳ τὸν Ἀνδρόνικον, παρεκάλει χειρόγραφον τὸν Ὀνίαν·
    ὁ δὲ παραγόμενος ἐπὶ τὸν Ὀνίαν καὶ πεισθεὶς ἐπὶ δόλῳ καὶ δεξιωθεὶς μεθʼ ὅρκων,
    δοὺς δεξιάν, καίπερ ἐν ὑποψίᾳ κείμενος, ἔπεισεν ἐκ τοῦ ἀσύλου προελθεῖν· ὃν καὶ
    παραχρῆμα παρέκλεισεν, οὐκ αἰδεσθεὶς τὸ δίκαιον.
