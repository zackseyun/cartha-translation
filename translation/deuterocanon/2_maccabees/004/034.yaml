translation:
  text: Therefore Menelaus took Andronicus aside privately and urged him to strike
    down Onias by treachery. Andronicus went to Onias, and after winning his confidence
    by deceit and greeting him with oaths, giving him his right hand, though he was
    under suspicion, he persuaded him to come out from the place of asylum. Then he
    immediately shut him away, showing no regard for justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek word rendered 'to strike down ... by treachery' is textually and
      lexically difficult; the sense in context is that Menelaus privately urged Andronicus
      to arrange Onias's death.
    reason: textual_variant
  - marker: b
    text: Or 'to come out of the sanctuary' or 'to leave the refuge.' The Greek ἄσυλον
      refers to a protected place of asylum.
    reason: lexical_alternative
  - marker: c
    text: Context may imply more strongly, 'he murdered him' or 'had him put to death,'
      though the Greek verb here is less explicit.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: LSJ
  rationale: Marks inference from the preceding situation; 'Therefore' preserves the
    causal transition in natural English.
- source_word: λαβὼν ἰδίᾳ
  chosen: took ... aside privately
  alternatives:
  - took privately
  - met with in private
  lexicon: LSJ
  rationale: The participle with ἰδίᾳ indicates a private setting or aside conversation.
    'Took Andronicus aside privately' conveys the discreet, conspiratorial action.
- source_word: παρεκάλει
  chosen: urged
  alternatives:
  - encouraged
  - appealed to
  - exhorted
  lexicon: LSJ
  rationale: In context Menelaus is pressing Andronicus toward a criminal act; 'urged'
    fits the force better than the softer 'appealed to'.
- source_word: χειρόγραφον
  chosen: to strike down ... by treachery
  alternatives:
  - to murder
  - to dispatch
  - to kill by his own hand
  lexicon: LSJ
  rationale: The transmitted word is difficult, but in context it points to arranging
    Onias's killing. Because the following clauses stress deceit, the rendering makes
    explicit the murderous intent while keeping the clandestine sense. The exact lexical
    form is obscure enough to preserve a note.
- source_word: παραγόμενος ἐπὶ τὸν Ὀνίαν
  chosen: went to Onias
  alternatives:
  - came to Onias
  - approached Onias
  lexicon: LSJ
  rationale: A straightforward movement expression; 'went to' is idiomatic and clear.
- source_word: πεισθεὶς ἐπὶ δόλῳ
  chosen: winning his confidence by deceit
  alternatives:
  - being persuasive through deceit
  - deceiving him
  - having prevailed by trickery
  lexicon: LSJ
  rationale: The phrase describes deceptive persuasion. Since Onias is the one persuaded
    in the larger clause, English is clearer if the effect is expressed as winning
    his confidence deceitfully.
- source_word: δεξιωθεὶς μεθʼ ὅρκων
  chosen: greeting him with oaths
  alternatives:
  - assuring him with oaths
  - receiving him with oaths
  - pledging with oaths
  lexicon: LSJ
  rationale: The verb relates to giving a friendly welcome or pledge, here reinforced
    by oaths. 'Greeting him with oaths' preserves the outward show of friendship,
    though the context makes it duplicitous.
- source_word: δοὺς δεξιάν
  chosen: giving him his right hand
  alternatives:
  - giving a handshake
  - pledging friendship
  lexicon: LSJ
  rationale: A literal rendering best preserves the ancient gesture of pledged trust;
    its cultural force can be inferred from context.
- source_word: καίπερ ἐν ὑποψίᾳ κείμενος
  chosen: though he was under suspicion
  alternatives:
  - although he was suspected
  - though he lay under suspicion
  lexicon: LSJ
  rationale: This concessive phrase indicates that suspicion already surrounded Andronicus
    or the situation. 'Under suspicion' is idiomatic and preserves the uncertainty
    without overexplaining whose suspicion is in view.
- source_word: ἔπεισεν ἐκ τοῦ ἀσύλου προελθεῖν
  chosen: he persuaded him to come out from the place of asylum
  alternatives:
  - to come out of the sanctuary
  - to leave the refuge
  lexicon: LSJ
  rationale: ἄσυλον denotes a place of refuge or inviolable sanctuary. 'Place of asylum'
    preserves the legal-protective sense better than the more specifically cultic
    'sanctuary,' though that remains a viable alternative.
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: LSJ
  rationale: Temporal adverb indicating prompt action; 'immediately' is natural modern
    English.
- source_word: παρέκλεισεν
  chosen: shut him away
  alternatives:
  - seized him
  - confined him
  - killed him
  lexicon: LSJ
  rationale: The verb literally suggests shutting in or shutting off, but in this
    narrative context it functions as the act leading to Onias's death. Because the
    Greek form itself does not explicitly say 'killed,' the main text keeps the more
    literal 'shut him away,' while a footnote preserves the likely sense 'murdered'
    from context.
- source_word: οὐκ αἰδεσθεὶς τὸ δίκαιον
  chosen: showing no regard for justice
  alternatives:
  - having no respect for what was right
  - not reverencing justice
  lexicon: LSJ
  rationale: The phrase condemns Andronicus's disregard for justice or right. 'Showing
    no regard for justice' is clear and weighty without sounding archaic.
