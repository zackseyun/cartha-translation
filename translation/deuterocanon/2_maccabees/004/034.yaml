theological_decisions:
- issue: Nature of ἄσυλον
  chosen_reading: place of asylum
  alternative_readings:
  - sanctuary
  - refuge
  rationale: The term denotes protected refuge, likely with cultic associations in
    context. The chosen rendering preserves the legal-protective force without narrowing
    it too quickly to a temple term.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of παρέκλεισεν in context
  chosen_reading: shut him away
  alternative_readings:
  - murdered him
  - seized him and put him to death
  rationale: The immediate context and broader narrative imply Onias's death, but
    the Greek verb itself is less explicit. To avoid importing more than the wording
    warrants, the main text stays closer to the verb while preserving the contextual
    alternative in a footnote.
  doctrine_reference: Translation philosophy §1, §3
