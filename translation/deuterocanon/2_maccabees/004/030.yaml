translation:
  text: While these things were underway, it happened that the people of Tarsus and
    Mallus revolted, because they were being given as a gift to Antiochis, the king’s
    concubine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the Tarsians and Mallotes were in revolt.' The translation
      uses city names for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεστηκότων
  chosen: while these things were underway
  alternatives:
  - while matters stood thus
  - while this was going on
  - while they were assembled
  lexicon: LSJ
  rationale: The genitive absolute with δέ links this event to the preceding narrative.
    The participial form from συνίστημι here functions idiomatically as a temporal
    setting rather than emphasizing literal standing or assembling. 'While these things
    were underway' gives natural English while preserving the transitional force.
- source_word: συνέβη
  chosen: it happened
  alternatives:
  - it came about
  - it occurred
  lexicon: LSJ
  rationale: A standard narrative verb introducing the ensuing event. 'It happened'
    is simple and idiomatic without adding interpretive weight.
- source_word: Ταρσεῖς καὶ Μαλλῶτας
  chosen: the people of Tarsus and Mallus
  alternatives:
  - Tarsians and Mallotes
  - the Tarsians and the Mallians
  lexicon: LSJ
  rationale: These are ethnic/plural designations for inhabitants of the cities Tarsus
    and Mallus. Rendering them as 'the people of...' is clearer for modern readers
    than less familiar gentilics.
- source_word: στασιάζειν
  chosen: revolted
  alternatives:
  - were in rebellion
  - caused an uprising
  - were in civil strife
  lexicon: LSJ
  rationale: The verb denotes factional unrest or rebellion. 'Revolted' captures political
    uprising succinctly in this context.
- source_word: διὰ τὸ
  chosen: because
  alternatives:
  - on account of the fact that
  - because of
  lexicon: LSJ
  rationale: This construction introduces the reason for the revolt. 'Because' is
    the most natural English equivalent.
- source_word: Ἀντιοχίδι
  chosen: Antiochis
  alternatives:
  - Antiochis (dative retained in sense)
  lexicon: LSJ
  rationale: Proper name transliterated according to project policy.
- source_word: παλλακῇ
  chosen: concubine
  alternatives:
  - mistress
  lexicon: LSJ
  rationale: The term denotes a secondary wife/concubine. 'Concubine' is the most
    direct and historically accurate rendering; 'mistress' would risk modern connotations
    not intended by the text.
- source_word: ἐν δωρεᾷ δίδοσθαι
  chosen: were being given as a gift
  alternatives:
  - were being granted as a present
  - were being bestowed as a gift
  lexicon: LSJ
  rationale: The passive infinitive with ἐν δωρεᾷ expresses that the cities/territories
    were being assigned as a royal gift. 'Were being given as a gift' preserves both
    the passive and the donative sense.
