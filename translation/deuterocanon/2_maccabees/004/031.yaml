translation:
  text: So the king came quickly to settle the affairs, leaving Andronicus, one of
    those holding high office, as his successor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θᾶττον
  chosen: quickly
  alternatives:
  - at once
  - more quickly
  - swiftly
  lexicon: LSJ
  rationale: Adverb indicating haste. 'Quickly' is natural modern English and preserves
    the sense of urgency without overstating it.
- source_word: ἧκεν
  chosen: came
  alternatives:
  - arrived
  - went
  lexicon: LSJ
  rationale: The verb commonly means 'came/arrived.' In context it introduces the
    king's prompt arrival for intervention. 'Came' is the most straightforward rendering.
- source_word: καταστεῖλαι
  chosen: to settle
  alternatives:
  - to put down
  - to calm
  - to regulate
  - to set in order
  lexicon: LSJ
  rationale: With τὰ πράγματα, the sense is to bring matters under control or into
    order. 'Settle' captures this administrative-political nuance better than the
    more violent 'put down' or the overly formal 'regulate.'
- source_word: τὰ πράγματα
  chosen: the affairs
  alternatives:
  - the matters
  - the situation
  - the business
  lexicon: LSJ
  rationale: A broad term for the circumstances or state of affairs at hand. 'The
    affairs' preserves the generality while fitting the political context.
- source_word: καταλείπων
  chosen: leaving
  alternatives:
  - appointing and leaving behind
  - entrusting to
  lexicon: LSJ
  rationale: The participle denotes leaving someone behind in a place or role. 'Leaving'
    is literal and works smoothly with the following appositional description.
- source_word: τὸν διαδεχόμενον
  chosen: as his successor
  alternatives:
  - the one succeeding him
  - his deputy
  - the one taking his place
  lexicon: LSJ
  rationale: The participle means the one succeeding or taking another's place. In
    idiomatic English here, 'as his successor' best conveys that Andronicus was left
    to act in the king's stead.
- source_word: Ἀνδρόνικον
  chosen: Andronicus
  rationale: Standard English transliteration of the personal name Ἀνδρόνικος.
- source_word: τῶν ἐν ἀξιώματι κειμένων
  chosen: one of those holding high office
  alternatives:
  - one of the dignitaries
  - one of those in office
  - one of the officials of rank
  lexicon: LSJ
  rationale: The phrase refers to persons occupying rank or dignity. 'Holding high
    office' communicates status clearly in modern English while preserving the official
    sense.
