  text: θᾶττον οὖν ὁ βασιλεὺς ἧκεν καταστεῖλαι τὰ πράγματα, καταλείπων τὸν διαδεχόμενον
    Ἀνδρόνικον, τῶν ἐν ἀξιώματι κειμένων.
