translation:
  text: Now concerning these matters, a judicial hearing was brought against Menelaus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a legal case arose against Menelaus.' The Greek wording is concise and
      can be rendered more formally as the initiation of legal proceedings.
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ τούτων
  chosen: Now concerning these matters
  alternatives:
  - But concerning these things
  - Now about these matters
  lexicon: LSJ
  rationale: Περὶ with the genitive introduces the subject under discussion, and δέ
    marks transition. 'These matters' is natural modern English while staying close
    to the Greek.
- source_word: ἐνέστη
  chosen: was brought
  alternatives:
  - arose
  - came on
  - was instituted
  lexicon: LSJ
  rationale: In context with κρίσις and ἐπὶ τὸν Μενέλαον, the verb indicates that
    legal proceedings were initiated or set in motion. 'Was brought' conveys the onset
    of a case in idiomatic English better than the more wooden 'arose.'
- source_word: κρίσις
  chosen: a judicial hearing
  alternatives:
  - a trial
  - judgment
  - legal case
  lexicon: LSJ
  rationale: κρίσις can mean judgment or legal process. Here the context is formal
    proceedings against Menelaus, so 'judicial hearing' preserves the legal sense
    without overstating procedural specificity.
- source_word: ἐπὶ τὸν Μενέλαον
  chosen: against Menelaus
  alternatives:
  - upon Menelaus
  - concerning Menelaus
  lexicon: LSJ
  rationale: With legal language, ἐπί plus accusative can indicate direction against
    a person. 'Against Menelaus' is the clearest idiomatic rendering in English.
