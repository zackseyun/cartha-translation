translation:
  text: But when Sostratus, the commander of the citadel, pressed the claim—for the
    handling of the revenues belonged to him—for this reason the two men were summoned
    by the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the administration of the revenues was under his authority.' The Greek
      phrase can be understood more generally as jurisdiction over financial matters.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιουμένου ... τὴν ἀπαίτησιν
  chosen: pressed the claim
  alternatives:
  - made the demand
  - pursued the claim
  - enforced the demand
  lexicon: LSJ
  rationale: The genitive absolute with ποιέω plus ἀπαίτησις conveys active pursuit
    or making of a demand/claim. 'Pressed the claim' captures the ongoing administrative
    action in idiomatic English without over-paraphrasing.
- source_word: Σωστράτου
  chosen: Sostratus
  rationale: Personal name transliterated by standard convention per project philosophy.
- source_word: τοῦ τῆς ἀκροπόλεως ἐπάρχου
  chosen: the commander of the citadel
  alternatives:
  - the governor of the citadel
  - the prefect of the citadel
  lexicon: LSJ
  rationale: ἔπαρχος is an official title that can be rendered 'governor,' 'prefect,'
    or 'commander' depending on context. Since the office is tied specifically to
    the acropolis/citadel and the context is custody and administration, 'commander'
    best conveys a military-administrative overseer in readable English. ἀκρόπολις
    here is the fortified upper city, hence 'citadel.'
- source_word: πρὸς τοῦτον γὰρ ἦν
  chosen: belonged to him
  alternatives:
  - was under his authority
  - was referred to him
  - was his responsibility
  lexicon: LSJ
  rationale: The phrase indicates that the matter fell within Sostratus's jurisdiction.
    'Belonged to him' is concise and natural when expanded by the following noun phrase.
- source_word: ἡ τῶν διαφόρων πρᾶξις
  chosen: the handling of the revenues
  alternatives:
  - the administration of the revenues
  - the collection of the monies
  - the management of the disputed funds
  lexicon: LSJ
  rationale: διάφορα in administrative context commonly refers to revenues, dues,
    or funds; πρᾶξις here is practical management/collection. 'Handling of the revenues'
    preserves the fiscal sense without overcommitting to a narrower technical term.
    'Disputed funds' is possible from context but less certain lexically, so it is
    not chosen for the main text.
- source_word: διʼ ἣν αἰτίαν
  chosen: for this reason
  alternatives:
  - therefore
  - because of this
  lexicon: LSJ
  rationale: A straightforward causal connector; 'for this reason' preserves the explicitness
    of the Greek.
- source_word: οἱ δύο
  chosen: the two men
  alternatives:
  - the two
  - both men
  lexicon: LSJ
  rationale: The article with numeral refers back to the two previously mentioned
    persons. English idiom benefits from supplying 'men' for clarity.
- source_word: ὑπὸ τοῦ βασιλέως προσεκλήθησαν
  chosen: were summoned by the king
  alternatives:
  - were called before the king
  - were summoned to the king
  lexicon: LSJ
  rationale: The passive of προσκαλέω indicates being called/summoned. 'Were summoned
    by the king' is formal enough for the setting and reflects the passive construction
    clearly.
