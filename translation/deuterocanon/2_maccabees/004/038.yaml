theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek narrative of divine judgment
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  - God
  rationale: The source has τοῦ κυρίου, and project doctrine defaults κύριος to 'Lord.'
    In this context it refers to God as the one who repays just punishment; 'the Lord'
    preserves the Greek wording without importing a different title.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to make explicit that the punishment is divine retribution rather
    than merely human justice
  chosen_reading: the Lord repaying to him the punishment he deserved
  alternative_readings:
  - with the Lord giving him his deserved punishment
  - as divine justice repaid him
  rationale: The genitive absolute explicitly attributes the outcome to the Lord's
    action. The translation keeps that theological claim overt, while avoiding interpretive
    expansion beyond the text.
  doctrine_reference: DOCTRINE.md §1, §3
