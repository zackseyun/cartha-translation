translation:
  text: And, inflamed with anger, he immediately stripped off Andronikos's purple
    robe and tore his garments, and after leading him around through the whole city
    to the very place where he had committed his impiety against Onias, there he cut
    down the murderer, the Lord repaying to him the punishment he deserved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek μιαφόνον carries a stronger sense than simply ''murderer'': one defiled
      by bloodshed, a blood-guilty killer.'
    reason: lexical_alternative
  - marker: b
    text: The verb translated 'cut down' is vivid and may imply killing with a spear
      or similar weapon; the broader sense is that he was executed there.
    reason: lexical_alternative
lexical_decisions:
- source_word: πυρωθεὶς τοῖς θυμοῖς
  chosen: inflamed with anger
  alternatives:
  - set ablaze with rage
  - burning with wrath
  lexicon: LSJ
  rationale: The participle πυρωθεὶς is metaphorical ('kindled, inflamed'), and τοῖς
    θυμοῖς expresses intense anger. 'Inflamed with anger' preserves the fire imagery
    while remaining natural English.
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: LSJ
  rationale: This adverb marks prompt action. 'Immediately' is clear modern English
    and fits the narrative pace.
- source_word: τὴν τοῦ Ἀνδρονίκου πορφύραν
  chosen: Andronikos's purple robe
  alternatives:
  - the purple of Andronikos
  - Andronikos's purple garment
  lexicon: LSJ
  rationale: πορφύρα can denote purple cloth or a purple robe as a status garment.
    'Purple robe' best conveys the likely symbolic garment of rank being stripped
    away.
- source_word: τοὺς χιτῶνας περιρρήξας
  chosen: tore his garments
  alternatives:
  - ripped his tunics
  - tore the garments
  lexicon: LSJ
  rationale: χιτών is a tunic/garment, but in idiomatic English 'tore his garments'
    communicates the public humiliation more naturally than the more literal 'tunics.'
    The possessive refers to Andronikos in context.
- source_word: περιαγαγὼν καθʼ ὅλην τὴν πόλιν
  chosen: after leading him around through the whole city
  alternatives:
  - having paraded him through the entire city
  - leading him about all the city
  lexicon: LSJ
  rationale: The participle indicates public procession. 'Leading him around through
    the whole city' preserves the action without overinterpreting it as a formal parade,
    though that nuance is present.
- source_word: ἐπʼ αὐτὸν τὸν τόπον
  chosen: to the very place
  alternatives:
  - to that very spot
  - to the place itself
  lexicon: LSJ
  rationale: The emphatic αὐτόν heightens precision. 'The very place' captures that
    emphasis idiomatically.
- source_word: οὗπερ τὸν Ὀνίαν ἠσέβησεν
  chosen: where he had committed his impiety against Onias
  alternatives:
  - where he had acted impiously against Onias
  - where he had profaned himself against Onias
  lexicon: LSJ
  rationale: ἀσεβέω/ἠσέβησεν denotes impious or godless wrongdoing, here specifically
    in his outrage against Onias. 'Committed his impiety against Onias' keeps the
    religious-moral force stronger than a generic 'wronged.'
- source_word: τὸν μιαφόνον
  chosen: the murderer
  alternatives:
  - the polluted murderer
  - the blood-guilty killer
  lexicon: LSJ
  rationale: μιαφόνος is a strong term for one stained by murder or bloodguilt. 'Murderer'
    gives the core sense clearly; the pollution nuance is significant but would sound
    cumbersome in the main text, so it is noted here.
- source_word: ἀπεκόντισεν
  chosen: cut down
  alternatives:
  - executed
  - struck down
  lexicon: LSJ
  rationale: The verb literally relates to dispatching with a spear/javelin, but in
    context it denotes killing/executing. 'Cut down' preserves vividness without claiming
    a specific weapon beyond the text's narrative force.
- source_word: τοῦ κυρίου τὴν ἄξιαν αὐτῷ κόλασιν ἀποδόντος
  chosen: the Lord repaying to him the punishment he deserved
  alternatives:
  - the Lord rendering to him the fitting penalty
  - the Lord giving him the punishment worthy of him
  lexicon: LSJ
  rationale: 'The genitive absolute explains the theological meaning of the event:
    divine retribution. κύριος is rendered ''Lord'' per project policy. ἄξιαν ...
    κόλασιν is a deserved/fitting punishment, so ''the punishment he deserved'' is
    both natural and faithful.'
