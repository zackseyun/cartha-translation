translation:
  text: For he saw that without royal intervention it was impossible for affairs to
    attain peace, and that Simon would not stop his folly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'without royal πρόνοια.' The term can mean foresight, care,
      or provision; here it likely refers to the king's active support or intervention.
    reason: lexical_alternative
  - marker: b
    text: Greek literally, 'Simon would not receive a pause from his folly,' that
      is, he would not desist from it.
    reason: lexical_alternative
  - marker: c
    text: The verse opens with a participle ('considering' / 'observing'), which in
      Greek links tightly with the previous sentence; the English smooths this connection
      for readability.
    reason: textual_variant
lexical_decisions:
- source_word: βασιλικῆς προνοίας
  chosen: royal intervention
  alternatives:
  - royal foresight
  - royal care
  - royal provision
  lexicon: LSJ
  rationale: πρόνοια can denote forethought, care, or provision. In this political
    context, with peace in public affairs in view, the sense is the king's active
    involvement or support rather than merely his mental foresight. 'Royal intervention'
    communicates that practical political sense in natural English.
- source_word: τυχεῖν εἰρήνης
  chosen: attain peace
  alternatives:
  - obtain peace
  - find peace
  lexicon: LSJ
  rationale: τυγχάνω with a genitive commonly means 'obtain' or 'attain.' 'Attain
    peace' preserves the result-oriented sense without sounding overly wooden.
- source_word: ἐπὶ τὰ πράγματα
  chosen: for affairs
  alternatives:
  - in matters
  - for the situation
  - in public affairs
  lexicon: LSJ
  rationale: τὰ πράγματα here refers broadly to the state of affairs or practical
    situation. 'Affairs' is concise and fits the political-administrative context.
- source_word: παῦλαν οὐ λημψόμενον
  chosen: would not stop
  alternatives:
  - would not cease
  - would get no respite from
  - would not receive a pause from
  lexicon: LSJ
  rationale: Literally the phrase is 'would not receive a pause.' In idiomatic English,
    with Simon as subject and his behavior in view, 'would not stop' best conveys
    the sense that he would not desist.
- source_word: ἀνοίας
  chosen: folly
  alternatives:
  - madness
  - senselessness
  - foolishness
  lexicon: LSJ
  rationale: ἄνοια denotes lack of sense, folly, or irrationality. 'Folly' is strong
    but not clinical, and suits the narrator's moral evaluation.
- source_word: σκοπῶν
  chosen: For he saw
  alternatives:
  - considering this, he saw
  - taking thought, he saw
  lexicon: LSJ
  rationale: The transmitted text begins with the participle σκοπῶν, likely linking
    to the previous verse. Since this verse continues the thought and immediately
    explains with γάρ, the English is smoothed to 'For he saw' rather than preserving
    an awkward dangling participle in isolation.
