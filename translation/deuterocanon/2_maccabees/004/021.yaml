translation:
  text: When Apollonius son of Menestheus had been sent to Egypt for the accession
    festivities of King Philometor, Antiochus, perceiving that this was foreign to
    his own interests, took thought for his own security. Therefore, after arriving
    at Joppa, he went on to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'learning that he was alienated from matters concerning himself.' The
      Greek phrase is compressed and may refer more broadly to Antiochus' political
      disadvantage in his own affairs.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποσταλέντος
  chosen: had been sent
  alternatives:
  - was sent
  - having been sent
  lexicon: LSJ
  rationale: Aorist passive participle introducing the circumstance; English pluperfect-like
    'had been sent' fits the narrative sequence smoothly.
- source_word: διὰ τὰ προτοκλήρια
  chosen: for the accession festivities
  alternatives:
  - for the inaugural celebrations
  - for the first-invitation festivities
  lexicon: LSJ
  rationale: The rare plural noun refers to festivities connected with a ruler's accession
    or formal assumption of office. 'Accession festivities' is concise and contextually
    appropriate, avoiding an overly literal but opaque rendering.
- source_word: τοῦ φιλομήτορος βασιλέως
  chosen: of the king Philometor
  alternatives:
  - of King Philometor
  - of the mother-loving king
  lexicon: LSJ
  rationale: Φιλομήτωρ functions here as the royal epithet/name of the Egyptian king,
    not as an adjective to be translated literally. Standard transliteration preserves
    the historical referent.
- source_word: μεταλαβὼν
  chosen: learning
  alternatives:
  - perceiving
  - finding out
  - having understood
  lexicon: LSJ
  rationale: In context the participle conveys Antiochus' coming to realize or receive
    information. 'Learning' is idiomatic and captures the inferential sense without
    overtranslation.
- source_word: ἀλλότριον αὐτὸν τῶν αὐτοῦ γεγονότων πραγμάτων
  chosen: that he had become estranged from his own affairs
  alternatives:
  - that he was alienated from his own situation
  - that he was out of touch with his own interests
  - that matters concerning him were foreign to him
  lexicon: LSJ
  rationale: The phrase is compressed and somewhat awkward in Greek. The sense is
    that Antiochus recognized he was disconnected from or disadvantaged in regard
    to his own political situation. 'Estranged from his own affairs' preserves the
    alienation nuance of ἀλλότριον while remaining readable.
- source_word: τῆς καθʼ αὑτὸν ἀσφαλίας ἐφρόντιζεν
  chosen: took thought for his own security
  alternatives:
  - was concerned for his own safety
  - looked after his own security
  lexicon: LSJ
  rationale: ἐφρόντιζεν denotes active concern or care; ἀσφάλεια here is security/safety
    in a political sense. 'Took thought for' preserves deliberative force.
- source_word: παραγενόμενος
  chosen: after arriving
  alternatives:
  - having come
  - when he arrived
  lexicon: LSJ
  rationale: Aorist participle marking prior action before the main verb; 'after arriving'
    gives clear temporal sequence.
- source_word: κατήντησεν
  chosen: he went on to
  alternatives:
  - he came to
  - he arrived at
  lexicon: LSJ
  rationale: Since the participle already states arrival at Joppa, rendering the main
    verb as 'went on to' avoids awkward repetition and reflects movement onward to
    Jerusalem.
