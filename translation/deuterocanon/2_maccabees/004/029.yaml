translation:
  text: And Menelaus left Lysimachus, his own brother, as successor to the high priesthood,
    while Sostratus left Crates, the one over the Cyprians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the official in charge of the Cyprians' or 'the governor over the Cyprians.'
      The Greek does not make the precise administrative title explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέλιπεν
  chosen: left
  alternatives:
  - appointed
  - set in place
  lexicon: LSJ
  rationale: The verb literally means 'left behind' or 'left.' In context it implies
    leaving someone in charge as a successor, but 'left' preserves the Greek wording
    while the following phrase clarifies the function.
- source_word: τῆς ἀρχιερωσύνης διάδοχον
  chosen: as successor to the high priesthood
  alternatives:
  - successor in the high priesthood
  - to succeed in the high priesthood
  lexicon: LSJ
  rationale: διάδοχον means 'successor,' and τῆς ἀρχιερωσύνης specifies the office.
    'As successor to the high priesthood' is natural English and keeps the office
    explicit.
- source_word: τὸν ἑαυτοῦ ἀδελφόν
  chosen: his own brother
  alternatives:
  - his brother
  lexicon: LSJ
  rationale: ἑαυτοῦ adds emphasis or reflexive force. 'His own brother' preserves
    that emphasis better than the flatter 'his brother.'
- source_word: τὸν ἐπὶ τῶν Κυπρίων
  chosen: the one over the Cyprians
  alternatives:
  - the governor over the Cyprians
  - the official in charge of the Cyprians
  - the one in charge of Cyprus
  lexicon: LSJ
  rationale: The phrase literally identifies Crates as the one 'over the Cyprians.'
    The exact office is not fully specified in the Greek, so a relatively literal
    rendering avoids over-interpreting it as a formal governorship of the island itself.
