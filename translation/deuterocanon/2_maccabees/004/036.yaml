translation:
  text: They were indignant and deeply grieved over the man's unjust murder. But when
    the king returned from the regions of Cilicia, the Jews in the city appealed to
    him, and the Greeks as well, sharing in their hatred of the wicked deed,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Greeks too, joining in hatred of the wicked deed.' The rare Greek
      participle συμμισοπονηρούντων is compressed and may be rendered in several closely
      related ways.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδείναζον
  chosen: were indignant
  alternatives:
  - were distressed
  - were outraged
  lexicon: LSJ
  rationale: The verb conveys strong emotional pain or vexation. In context, paired
    with ἐδυσφόρουν, it suggests moral outrage rather than mere sadness, so 'were
    indignant' captures the force without overparaphrase.
- source_word: ἐδυσφόρουν
  chosen: were deeply grieved
  alternatives:
  - were troubled
  - were upset
  - were resentful
  lexicon: LSJ
  rationale: The verb denotes bearing something badly, being troubled or offended.
    Combined with ἐδείναζον, it adds a second shade of reaction; 'deeply grieved'
    preserves the emotional weight while avoiding redundancy with 'indignant'.
- source_word: ἐπὶ τῷ ... ἀδίκῳ φόνῳ
  chosen: over ... unjust murder
  alternatives:
  - at ... unjust killing
  - because of ... wrongful murder
  lexicon: LSJ
  rationale: φόνος is specifically 'murder' rather than a neutral 'killing,' and ἄδικος
    marks it as wrongful/unjust. 'Unjust murder' is slightly emphatic in English but
    reflects the Greek's moral condemnation.
- source_word: τοῦ ἀνδρός
  chosen: the man's
  alternatives:
  - that man's
  - the gentleman's
  lexicon: LSJ
  rationale: ἀνήρ here refers to the slain man already in view from context. 'The
    man's' is the most natural English rendering and preserves the anaphoric article.
- source_word: ἐπανελθόντος
  chosen: returned
  alternatives:
  - came back
  - came again
  lexicon: LSJ
  rationale: A straightforward participial sense; 'returned' is idiomatic and fits
    the temporal construction with the genitive absolute.
- source_word: τῶν κατὰ Κιλικίαν τόπων
  chosen: the regions of Cilicia
  alternatives:
  - the places in Cilicia
  - the parts around Cilicia
  lexicon: LSJ
  rationale: The phrase refers broadly to localities/territories in Cilicia. 'Regions
    of Cilicia' is natural English and preserves the geographic breadth.
- source_word: ἐνετύγχανον
  chosen: appealed to him
  alternatives:
  - petitioned him
  - approached him with a complaint
  lexicon: LSJ
  rationale: The verb often means to approach or petition a ruler. Since the object
    is implied by the king's return, 'appealed to him' makes the sense explicit in
    idiomatic English.
- source_word: οἱ κατὰ πόλιν Ἰουδαῖοι
  chosen: the Jews in the city
  alternatives:
  - the city Jews
  - the Jews of the city
  lexicon: LSJ
  rationale: The phrase denotes the Jews resident in the city. 'The Jews in the city'
    is clear modern English.
- source_word: συμμισοπονηρούντων
  chosen: sharing in their hatred of the crime
  alternatives:
  - joining in detesting the wicked deed
  - hating the villainy along with them
  lexicon: LSJ
  rationale: This rare compound expresses joining in hatred toward wrongdoing or villainy.
    Because the direct object is implicit and the context is the murder, 'sharing
    in their hatred of the crime' makes the sense clear without importing new content.
- source_word: καὶ τῶν Ἑλλήνων
  chosen: and the Greeks as well
  alternatives:
  - and the Greeks too
  lexicon: LSJ
  rationale: The genitive absolute/participle construction links the Greeks with the
    Jews' reaction. 'And the Greeks as well' preserves their inclusion in the appeal
    and moral revulsion.
