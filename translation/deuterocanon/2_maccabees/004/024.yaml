theological_decisions:
- issue: Moral coloring of Menelaus's praise of the king
  chosen_reading: Render δοξάσας neutrally as 'magnifying him' rather than explicitly
    'flattering him.'
  alternative_readings:
  - flattering him
  - honoring him
  rationale: The verse depicts political maneuvering, but the Greek verb itself does
    not require the more pejorative English 'flatter.' A neutral rendering preserves
    the narrative's wording while allowing the broader context to supply the negative
    evaluation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Idiomatic phrase τῷ προσώπῳ τῆς ἐξουσίας
  chosen_reading: Interpret as an outward display or bearing of authority.
  alternative_readings:
  - with the face of authority
  - with an authoritative countenance
  rationale: The phrase is not a doctrinal crux but is semantically compressed. The
    chosen rendering preserves the sense in readable modern English without forcing
    a wooden literalism that would obscure meaning.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
