translation:
  text: But after being presented to the king and magnifying him by the display of
    his authority, he secured the high priesthood for himself, outbidding Jason by
    three hundred talents of silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after being introduced to the king.' The Greek may imply formal presentation
      or recommendation at court.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'with the face/presence of authority,' an idiom for an impressive
      or authoritative bearing.
    reason: lexical_alternative
lexical_decisions:
- source_word: συσταθεὶς τῷ βασιλεῖ
  chosen: after being presented to the king
  alternatives:
  - after being introduced to the king
  - having been recommended to the king
  lexicon: LSJ
  rationale: The passive participle suggests being brought into the king's presence
    or formally introduced/recommended. 'Presented to the king' is natural English
    and preserves the courtly setting without over-specifying the mechanism.
- source_word: δοξάσας αὐτὸν
  chosen: magnifying him
  alternatives:
  - glorifying him
  - honoring him
  - flattering him
  lexicon: LSJ
  rationale: δοξάζω can mean glorify/honor; in this political context it likely carries
    the sense of extolling the king. 'Magnifying him' preserves the verbal force and
    leaves open whether the action is sincere honor or self-serving praise. 'Flattering'
    is interpretive and too strong for the main text.
- source_word: τῷ προσώπῳ τῆς ἐξουσίας
  chosen: with the display of his authority
  alternatives:
  - by his bearing of authority
  - with an authoritative appearance
  - through the face/presence of authority
  lexicon: LSJ
  rationale: The phrase is idiomatic and difficult literally ('with the face of authority').
    'Display of his authority' captures the sense of an impressive or imposing official
    bearing before the king. This avoids an opaque literalism while staying close
    to the Greek imagery.
- source_word: εἰς ἑαυτὸν κατήντησεν ἀρχιερωσύνην
  chosen: he secured the high priesthood for himself
  alternatives:
  - he obtained the high priesthood for himself
  - he brought the high priesthood to himself
  lexicon: LSJ
  rationale: The construction indicates that Menelaus caused the office to come to
    himself, i.e., obtained it personally. 'Secured ... for himself' communicates
    successful acquisition with the self-serving nuance of εἰς ἑαυτόν.
- source_word: ὑπερβάλλων τὸν Ἰάσονα
  chosen: outbidding Jason
  alternatives:
  - surpassing Jason
  - exceeding Jason
  lexicon: LSJ
  rationale: In context of a monetary amount immediately following, the participle
    refers to offering more money than Jason. 'Outbidding Jason' makes the transactional
    sense explicit and idiomatic in English.
- source_word: τάλαντα ἀργυρίου τριακόσια
  chosen: three hundred talents of silver
  alternatives:
  - three hundred silver talents
  lexicon: LSJ
  rationale: This is the straightforward monetary expression. 'Talents' is retained
    rather than converted into modern currency, preserving the ancient unit and avoiding
    speculative equivalence.
