translation:
  text: And Onias, when he clearly recognized this, withdrew to a place of asylum,
    at Daphne, which lies near Antioch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a place of refuge.' The Greek specifies an inviolable asylum location,
      likely with legal-sacral overtones rather than only general safety.
    reason: lexical_alternative
lexical_decisions:
- source_word: σαφῶς
  chosen: clearly
  alternatives:
  - plainly
  - distinctly
  lexicon: LSJ
  rationale: Adverb modifying ἐπεγνωκώς; it indicates clear perception or recognition
    rather than mere suspicion.
- source_word: ἐπεγνωκὼς
  chosen: recognized
  alternatives:
  - understood
  - perceived fully
  - came to know
  lexicon: LSJ
  rationale: The participle of ἐπιγινώσκω conveys full or definite recognition. 'Recognized'
    fits idiomatic English and preserves the sense of clear awareness.
- source_word: ἀπήνεγκεν
  chosen: withdrew
  alternatives:
  - departed
  - went away
  - removed himself
  lexicon: LSJ
  rationale: Although the verb literally can mean 'carried away' or 'took away,' in
    this context with the participial phrase ἀποκεχωρηκώς and destination εἰς ἄσυλον
    τόπον, the sense is that Onias removed himself from danger. 'Withdrew' captures
    the contextual force in natural English.
- source_word: ἀποκεχωρηκὼς
  chosen: withdrew
  alternatives:
  - having retired
  - having gone away
  - having departed
  lexicon: LSJ
  rationale: This perfect participle reinforces the idea of retreat or withdrawal.
    In English it is best absorbed into the main verb rather than rendered woodenly
    as a second separate motion.
- source_word: εἰς ἄσυλον τόπον
  chosen: to a place of asylum
  alternatives:
  - to a sanctuary place
  - to a place of refuge
  lexicon: LSJ
  rationale: ἄσυλος denotes inviolability or asylum. 'Place of asylum' preserves the
    legal-sacral nuance better than the more generic 'place of refuge.'
- source_word: ἐπὶ Δάφνης
  chosen: at Daphne
  alternatives:
  - to Daphne
  - in Daphne
  lexicon: LSJ
  rationale: With a place name, ἐπί here is locative in effect. 'At Daphne' is concise
    and natural.
- source_word: τῆς πρὸς Ἀντιοχίας κειμένης
  chosen: which lies near Antioch
  alternatives:
  - situated by Antioch
  - located near Antioch
  lexicon: LSJ
  rationale: The participial phrase identifies the well-known Daphne adjacent to Antioch.
    'Which lies near Antioch' is clear modern English and preserves the geographic
    specification.
