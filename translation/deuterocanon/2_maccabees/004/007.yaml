translation:
  text: But when Seleucus passed from life, and Antiochus, the one called Epiphanes,
    took over the kingdom,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'having exchanged life,' a euphemistic way of saying that
      Seleucus died.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μεταλλάξαντος
  chosen: passed from life
  alternatives:
  - died
  - departed this life
  - changed life
  lexicon: LSJ
  rationale: The genitive absolute with μεταλλάσσω here is a euphemistic expression
    for death. 'Passed from life' preserves the source's indirect phrasing better
    than the flatter 'died,' while remaining natural English.
- source_word: τὸν βίον
  chosen: life
  alternatives:
  - way of life
  - lifetime
  lexicon: LSJ
  rationale: In combination with μεταλλάξαντος, βίος refers to one's life in the sense
    of earthly existence. 'Life' is the most natural rendering in this idiom.
- source_word: παραλαβόντος
  chosen: took over
  alternatives:
  - received
  - succeeded to
  - took
  lexicon: LSJ
  rationale: In context of royal succession, the participle means assuming rule. 'Took
    over' communicates accession to power in readable modern English without over-paraphrasing.
- source_word: τὴν βασιλείαν
  chosen: the kingdom
  alternatives:
  - the kingship
  - the rule
  - the throne
  lexicon: LSJ
  rationale: βασιλεία can denote royal rule or kingdom. Here, with παραλαβόντος, it
    refers to the royal dominion inherited by Antiochus. 'The kingdom' is idiomatic
    and sufficiently broad.
- source_word: Ἀντιόχου
  chosen: Antiochus
  rationale: Standard English transliteration of the proper name.
- source_word: τοῦ προσαγορευθέντος
  chosen: the one called
  alternatives:
  - who was called
  - surnamed
  lexicon: LSJ
  rationale: The participle identifies Antiochus by his epithet. 'The one called'
    is transparent and natural in apposition.
- source_word: Ἐπιφανοῦς
  chosen: Epiphanes
  alternatives:
  - Illustrious
  - Manifest
  lexicon: LSJ
  rationale: As a royal epithet attached to a personal name, it is best transliterated
    rather than translated, in keeping with the project's practice of transliterating
    names while translating titles.
