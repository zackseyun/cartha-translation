theological_decisions:
- issue: Moral-theological force of Israel/Judea adopting foreign practices
  chosen_reading: 'The verse is rendered as a statement of ironic retribution: the
    very people whose ways they envied became their enemies and punishers.'
  alternative_readings:
  - A more neutral statement that those they admired later opposed them
  rationale: The Greek wording, especially ἐζήλουν and τιμωρητάς, supports a negative
    moral evaluation and a consequence fitting the broader argument of the chapter.
    The translation preserves that evaluative force without adding explicit doctrinal
    commentary beyond the text.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
