translation:
  text: he presented himself to the king, not becoming an accuser of his fellow citizens,
    but seeking what was advantageous both publicly and privately for the whole multitude.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but seeking what was beneficial both for the community and for each
      individual among the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διεκοσμήθη
  chosen: presented himself
  alternatives:
  - was commended
  - was represented
  - was set forth
  lexicon: LSJ
  rationale: The passive of διακοσμέω here idiomatically conveys how Onias conducted
    or presented himself before the king. 'Presented himself' fits the court setting
    and avoids an overly decorative literalism such as 'was adorned.'
- source_word: οὐ γινόμενος
  chosen: not becoming
  alternatives:
  - not acting as
  - not being made
  lexicon: LSJ
  rationale: 'The participle expresses manner: in his approach to the king he was
    not turning into or acting as an accuser. ''Not becoming'' preserves the participial
    nuance, though the English sentence smooths it idiomatically.'
- source_word: τῶν πολιτῶν
  chosen: his fellow citizens
  alternatives:
  - the citizens
  - his countrymen
  lexicon: LSJ
  rationale: πολῖται are fellow members of the civic body. 'His fellow citizens' makes
    the relational force clear in English.
- source_word: κατήγορος
  chosen: accuser
  alternatives:
  - prosecutor
  - informer
  lexicon: LSJ
  rationale: The basic forensic sense is 'accuser.' 'Prosecutor' would sound too formal
    and institutional here; 'informer' is too narrow.
- source_word: τὸ δὲ σύμφορον
  chosen: what was advantageous
  alternatives:
  - what was beneficial
  - the common interest
  lexicon: LSJ
  rationale: The phrase points to what is expedient or beneficial. 'What was advantageous'
    preserves the abstract substantive force without overinterpreting.
- source_word: κοινῇ καὶ κατʼ ἰδίαν
  chosen: for the common good and privately
  alternatives:
  - publicly and individually
  - in common and in particular
  lexicon: LSJ
  rationale: The pair contrasts communal and individual benefit. Because κοινῇ modifies
    the beneficial aim, 'for the common good' brings out the sense naturally; κατʼ
    ἰδίαν is then rendered 'privately' or 'individually,' here smoothed as 'privately'
    in the sentence.
- source_word: παντὶ τῷ πλήθει
  chosen: the whole multitude
  alternatives:
  - all the people
  - the entire populace
  lexicon: LSJ
  rationale: πλῆθος denotes the mass of people. 'The whole multitude' is slightly
    formal but preserves the breadth of reference better than the flatter 'everyone.'
