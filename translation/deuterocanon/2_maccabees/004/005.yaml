theological_decisions:
- issue: Ethical characterization of Onias's appeal to the king
  chosen_reading: The verse portrays him as appealing to the king without denouncing
    his fellow citizens, aiming at benefit for the people as a whole and individually.
  alternative_readings:
  - The final phrase could be taken more tightly as 'for the common interest and for
    each individual in the multitude.'
  rationale: This is not a major doctrinal crux, but the syntax of the closing phrase
    is somewhat compressed. The chosen rendering preserves the contrast between communal
    and individual welfare without importing motives beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence'
