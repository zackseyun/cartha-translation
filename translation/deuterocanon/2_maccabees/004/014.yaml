id: 2MA.4.14
reference: 2 Maccabees 4:14
source:
  edition: lxx-swete-1909
  text: ὥστε μηκέτι περὶ τὰς τοῦ θυσιαστηρίου λειτουργίας προθύμους εἶναι τοὺς ἱερεῖς,
    ἀλλὰ τοῦ μὲν νεὼ καταφρονοῦντες καὶ τῶν θυσιῶν ἀμελοῦντες ἔσπευδον μετέχειν τῆς
    ἐν παλαίστρῃ παρανόμου χορηγίας, μετὰ τὴν τοῦ δίσκου πρόσκλησιν·
