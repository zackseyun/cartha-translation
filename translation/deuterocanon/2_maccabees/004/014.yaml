theological_decisions:
- issue: Sense of παρανόμου in relation to Jewish law and the Hellenizing athletic
    context
  chosen_reading: Rendered as 'unlawful' without specifying whether the unlawfulness
    is civil, moral, or specifically Torah-based in the English text.
  alternative_readings:
  - lawless
  - forbidden under the law
  - impious
  rationale: In context the narrative condemns participation as contrary to the ancestral
    Jewish law and priestly obligations, but the Greek adjective itself is broader.
    'Unlawful' preserves the author's negative judgment without over-explicating the
    legal framework in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
