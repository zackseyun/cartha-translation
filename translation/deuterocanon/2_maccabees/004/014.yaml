translation:
  text: so that the priests were no longer eager about the services of the altar,
    but, despising the temple and neglecting the sacrifices, they hurried to take
    part in the unlawful provision in the wrestling school after the summons to the
    discus throw;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lawless sponsorship,' 'illegal allowance,' or 'forbidden provision.'
      The Greek expression is difficult and may refer to support or provision connected
      with the athletic activities.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'after the summons of the discus.' This refers to the call to
      participate in the athletic event.
    reason: cultural_note
lexical_decisions:
- source_word: λειτουργίας
  chosen: services
  alternatives:
  - ministries
  - duties
  - liturgies
  lexicon: LSJ
  rationale: In this cultic context the word refers to priestly service performed
    at the altar. 'Services' is natural modern English and preserves the ritual sense
    without importing later ecclesiastical jargon as strongly as 'liturgies'.
- source_word: προθύμους
  chosen: eager
  alternatives:
  - zealous
  - ready
  - willing
  lexicon: LSJ
  rationale: The adjective conveys readiness and enthusiasm. 'Eager' fits the contrast
    with their later neglect and reads idiomatically in English.
- source_word: νεὼ
  chosen: temple
  alternatives:
  - sanctuary
  - shrine
  lexicon: LSJ
  rationale: Here the term denotes the temple building in Jerusalem. 'Temple' is the
    clearest standard rendering in English.
- source_word: καταφρονοῦντες
  chosen: despising
  alternatives:
  - disdaining
  - treating with contempt
  lexicon: LSJ
  rationale: The participle expresses active contempt, not mere indifference. 'Despising'
    preserves the moral force of the Greek.
- source_word: ἀμελοῦντες
  chosen: neglecting
  alternatives:
  - disregarding
  - being careless about
  lexicon: LSJ
  rationale: The word indicates failure to attend properly to the sacrifices. 'Neglecting'
    is concise and accurate.
- source_word: παλαίστρῃ
  chosen: wrestling school
  alternatives:
  - palaestra
  - gymnasium
  lexicon: LSJ
  rationale: A παλαίστρα is specifically the wrestling ground or training school.
    'Wrestling school' is more precise than 'gymnasium,' which would overgeneralize
    the term here, while remaining understandable to modern readers.
- source_word: παρανόμου χορηγίας
  chosen: unlawful provision
  alternatives:
  - illegal allowance
  - lawless sponsorship
  - forbidden contribution
  lexicon: LSJ
  rationale: χορηγία can denote a supplied expense, provision, or sponsored support;
    paired with παρανόμου it refers to a provision connected with activities contrary
    to the law. 'Unlawful provision' preserves the ambiguity better than a more specific
    but less certain gloss.
- source_word: ἔσπευδον μετέχειν
  chosen: they hurried to take part
  alternatives:
  - they hastened to participate
  - they were eager to share in
  lexicon: LSJ
  rationale: The phrase conveys active haste toward participation. 'Hurried to take
    part' is idiomatic and keeps the narrative energy.
- source_word: μετὰ τὴν τοῦ δίσκου πρόσκλησιν
  chosen: after the summons to the discus throw
  alternatives:
  - when the call for the discus came
  - after the invitation to the discus event
  lexicon: LSJ
  rationale: πρόσκλησις is a summons or invitation, and δίσκος refers to the discus
    athletic event. 'After the summons to the discus throw' best captures the temporal
    force of μετά with the athletic setting.
