translation:
  text: But after a period of three years, Jason sent Menelaus, the brother of the
    aforementioned Simon, to carry the money to the king and to complete memoranda
    concerning necessary matters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to finalize written reports concerning necessary matters.' The Greek
      ὑπομνηματισμοὺς can refer to memoranda or written reports, and the exact administrative
      nuance is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τριετῆ χρόνον
  chosen: But after a period of three years
  alternatives:
  - After three years
  - But after three years
  lexicon: LSJ
  rationale: μετά with accusative marks time after; τριετῆ χρόνον is literally 'a
    three-year time/period.' 'After a period of three years' preserves the temporal
    sense while reading naturally. 'But' reflects δέ as a mild transition.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard aorist of ἀποστέλλω, best rendered simply as 'sent' in narrative
    context.
- source_word: Μενέλαον
  chosen: Menelaus
  rationale: Personal name transliterated according to project policy.
- source_word: τὸν τοῦ προσηνομένου Σίμωνος ἀδελφόν
  chosen: the brother of the aforementioned Simon
  alternatives:
  - the brother of the said Simon
  - the brother of Simon who has been mentioned
  lexicon: LSJ
  rationale: προσηνομένου here points back to a previously named Simon. 'Aforementioned'
    captures the anaphoric force in clear modern English.
- source_word: παρακομίζοντα τὰ χρήματα τῷ βασιλεῖ
  chosen: to carry the money to the king
  alternatives:
  - bringing the money to the king
  - conveying the money to the king
  lexicon: LSJ
  rationale: The participle expresses Menelaus's purpose/task in being sent. 'Carry'
    is straightforward and idiomatic; τὰ χρήματα here refers to money/funds rather
    than generic 'things'.
- source_word: περὶ πραγμάτων ἀναγκαίων
  chosen: concerning necessary matters
  alternatives:
  - about necessary affairs
  - regarding urgent matters
  lexicon: LSJ
  rationale: πράγματα can mean matters/affairs/business; ἀναγκαίων denotes necessity
    or urgency. 'Necessary matters' stays close to the Greek without overinterpreting
    the exact content.
- source_word: ὑπομνηματισμοὺς τελέσοντα
  chosen: to complete memoranda
  alternatives:
  - to carry out memoranda
  - to finalize written reports
  - to execute instructions
  lexicon: LSJ
  rationale: ὑπομνηματισμός can denote a memorandum, reminder, or written note/report.
    τελέσοντα conveys carrying through to completion. 'Complete memoranda' preserves
    the documentary/administrative flavor without forcing a narrower sense.
