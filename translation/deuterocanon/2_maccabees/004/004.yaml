translation:
  text: When Onias saw how severe the rivalry was, and that Apollonius son of Menestheus,
    the governor of Coele-Syria and Phoenicia, was increasing Simon’s wickedness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the strife' or 'the contentiousness' for 'the rivalry' (φιλονεικίας).
    reason: lexical_alternative
  - marker: b
    text: Greek στρατηγόν can mean 'general' or 'commander'; here it is rendered 'governor'
      because the phrase refers to Apollonius's administrative authority over Coele-Syria
      and Phoenicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνορῶν
  chosen: When ... saw
  alternatives:
  - perceiving
  - observing
  lexicon: LSJ
  rationale: The participle introduces the circumstance for Onias's subsequent action
    in the next verse. 'When ... saw' gives natural English while preserving the sense
    of direct perception.
- source_word: τὸ χαλεπὸν
  chosen: how severe
  alternatives:
  - the harshness of
  - how difficult
  lexicon: LSJ
  rationale: The neuter adjective with article functions substantivally, describing
    the grave character of the conflict. 'How severe' is idiomatic and conveys seriousness
    better than the more wooden 'the harshness of'.
- source_word: φιλονεικίας
  chosen: the rivalry
  alternatives:
  - the strife
  - the contentiousness
  - the quarrel
  lexicon: LSJ
  rationale: The term denotes contentious rivalry or dispute. 'Rivalry' fits the political/personal
    conflict in context without over-specifying a single quarrel.
- source_word: Ἀπολλώνιον Μενεσθέως
  chosen: Apollonius son of Menestheus
  alternatives:
  - Apollonius, of Menestheus
  lexicon: LSJ
  rationale: The patronymic genitive is most clearly represented in English as 'son
    of Menestheus,' identifying the official by lineage.
- source_word: στρατηγόν
  chosen: the governor
  alternatives:
  - the general
  - the commander
  lexicon: LSJ
  rationale: Although στρατηγός can mean 'general,' in this administrative setting
    over Coele-Syria and Phoenicia it refers to a provincial ruler/official. 'Governor'
    best communicates the office in context.
- source_word: συναύξοντα
  chosen: was increasing
  alternatives:
  - was furthering
  - was helping to increase
  - was aggravating
  lexicon: LSJ
  rationale: The participle describes Apollonius as contributing to the growth of
    Simon's evil activity. 'Was increasing' is straightforward and preserves the causative
    sense.
- source_word: κακίαν
  chosen: wickedness
  alternatives:
  - malice
  - evil
  - villainy
  lexicon: LSJ
  rationale: The word can denote moral badness or malicious conduct. 'Wickedness'
    captures the ethical weight without narrowing it merely to attitude.
