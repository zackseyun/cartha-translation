translation:
  text: So Antiochus, deeply grieved in soul and moved to pity, and having wept because
    of the self-control and great good order of the one who had died,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'moved to compassion'; literally 'turned to mercy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the deceased' for 'the one who had died.'
    reason: lexical_alternative
  - marker: c
    text: '''Good order'' may also be understood as ''discipline'' or ''proper conduct.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ψυχικῶς
  chosen: deeply grieved in soul
  alternatives:
  - inwardly
  - from the soul
  - deeply
  lexicon: LSJ
  rationale: The adverb modifies Antiochus's emotional state. A simple 'deeply' captures
    intensity, but pairing it with 'in soul' preserves the explicit ψυχ- element and
    the verse's affective emphasis.
- source_word: ὑπολυπηθείς
  chosen: grieved
  alternatives:
  - distressed
  - saddened
  - deeply pained
  lexicon: LSJ
  rationale: The participle denotes being affected with sorrow. 'Grieved' is natural
    English and fits the solemn context without over-paraphrasing.
- source_word: τραπεὶς ἐπὶ ἔλεος
  chosen: moved to pity
  alternatives:
  - turned to mercy
  - moved to compassion
  lexicon: LSJ
  rationale: Literally 'turned toward mercy/pity.' In idiomatic English, 'moved to
    pity' best conveys the shift in disposition while preserving the emotional sense
    of ἔλεος.
- source_word: δακρύσας
  chosen: having wept
  alternatives:
  - weeping
  - having shed tears
  lexicon: LSJ
  rationale: An aorist participle preceding the causal phrase. 'Having wept' preserves
    the participial sequence and formal flow.
- source_word: διὰ
  chosen: because of
  alternatives:
  - on account of
  - for
  lexicon: LSJ
  rationale: Here διὰ with the accusative gives cause. 'Because of' is the clearest
    modern rendering.
- source_word: τοῦ μετηλλαχότος
  chosen: the one who had died
  alternatives:
  - the deceased
  - the departed one
  lexicon: LSJ
  rationale: The perfect participle refers to the dead person just mentioned. 'The
    one who had died' is transparent and avoids euphemistic over-interpretation while
    remaining readable.
- source_word: σωφροσύνην
  chosen: self-control
  alternatives:
  - prudence
  - sobriety
  - sound-mindedness
  lexicon: LSJ
  rationale: σωφροσύνη commonly denotes moderation, self-mastery, or soundness of
    mind. 'Self-control' is clear modern English and suits the moral commendation
    in context.
- source_word: πολλὴν εὐταξίαν
  chosen: great good order
  alternatives:
  - great discipline
  - excellent conduct
  - great propriety
  lexicon: LSJ
  rationale: εὐταξία denotes orderliness, discipline, or proper conduct. 'Good order'
    stays close to the Greek, and 'great' reflects πολλήν. This preserves the commendatory
    tone without narrowing the sense too much.
