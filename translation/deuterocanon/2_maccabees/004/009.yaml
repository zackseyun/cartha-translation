theological_decisions:
- issue: Cultural-political meaning of Ἀντιοχεῖς
  chosen_reading: Render as 'Antiochenes' in the main text without specifying full
    citizenship
  alternative_readings:
  - citizens of Antioch
  - members of the Antiochene polity
  rationale: The verse concerns Hellenizing reforms and civic reclassification, but
    the Greek term itself is simply 'Antiochenes.' To avoid overstating the exact
    legal status, the main text keeps the designation and a footnote preserves the
    likely civic implication.
  doctrine_reference: Preserve theological/historical tension rather than resolve
    it; original-language primacy over translation tradition.
