translation:
  text: In addition to these things, he promised to register another fifty talents
    beyond the one hundred, if he were granted authority to establish for himself
    a gymnasium and an enrollment of young men, and to enroll those in Jerusalem as
    Antiochenes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to register the people in Jerusalem as citizens of Antioch.' The Greek
      says 'Antiochenes,' which may imply civic enrollment or legal status connected
      with Antioch.
    reason: alternative_reading
  - marker: b
    text: The 'gymnasium' and the enrollment of young men refer to Greek civic and
      athletic institutions associated here with Jerusalem's Hellenization.
    reason: cultural_note
lexical_decisions:
- source_word: πρὸς δὲ τούτοις
  chosen: In addition to these things
  alternatives:
  - besides this
  - moreover
  lexicon: LSJ
  rationale: The phrase adds a further item to the preceding offer. 'In addition to
    these things' preserves the additive force without sounding overly wooden.
- source_word: ὑποσχεῖτο
  chosen: he promised
  alternatives:
  - he undertook
  - he offered
  lexicon: LSJ
  rationale: The imperfect/middle here conveys a pledged offer in context. 'Promised'
    is the clearest idiomatic English rendering for the financial commitment being
    made.
- source_word: ἕτερα διαγράψειν πεντήκοντα πρὸς τοῖς ἑκατόν
  chosen: to register another fifty talents beyond the one hundred
  alternatives:
  - to pay an additional fifty beyond the hundred
  - to enter another fifty besides the hundred
  lexicon: LSJ
  rationale: διαγράφειν can mean to enter in writing or register; in this administrative-financial
    context it refers to having an additional sum entered/assessed. 'Register' keeps
    the bureaucratic nuance better than simply 'pay,' while 'talents' is supplied
    from the immediate monetary context of the surrounding passage.
- source_word: ἐὰν ἐπιχορηγηθῇ
  chosen: if he were granted
  alternatives:
  - if it were supplied
  - if he were furnished with
  lexicon: LSJ
  rationale: The passive indicates provision or grant from a superior authority. 'If
    he were granted' fits the political setting in which royal authorization is being
    sought.
- source_word: διὰ τῆς ἐξουσίας αὐτοῦ
  chosen: authority
  alternatives:
  - license
  - official permission
  - jurisdiction
  lexicon: LSJ
  rationale: The phrase denotes authorization exercised through his official power.
    'Authority' is broad enough to cover both permission and delegated power without
    over-specifying.
- source_word: γυμνάσιον
  chosen: gymnasium
  alternatives:
  - training school
  lexicon: LSJ
  rationale: The Greek institution is culturally specific and important to the Hellenizing
    program in context. 'Gymnasium' is the standard transliterated rendering and preserves
    that historical specificity.
- source_word: ἐφηβίαν
  chosen: an enrollment of young men
  alternatives:
  - an ephebate
  - a corps of youths
  - a youth training program
  lexicon: LSJ
  rationale: ἐφηβία refers to the institution/body of ephebes, young men enrolled
    for civic and physical training. 'Enrollment of young men' communicates the institutional
    sense in accessible English while avoiding unexplained jargon.
- source_word: αὐτῷ συστήσασθαι
  chosen: to establish for himself
  alternatives:
  - to set up
  - to found
  lexicon: LSJ
  rationale: The infinitive expresses Jason's aim to organize these institutions under
    his own initiative/administration. 'Establish for himself' preserves the reflexive
    nuance.
- source_word: τοὺς ἐν Ἱεροσολύμοις Ἀντιοχεῖς ἀναγράψαι
  chosen: to enroll those in Jerusalem as Antiochenes
  alternatives:
  - to register the men in Jerusalem as citizens of Antioch
  - to list the Jerusalemites as Antiochenes
  lexicon: LSJ
  rationale: ἀναγράφειν is administrative 'enroll/register.' Ἀντιοχεῖς most naturally
    refers to Antiochenes, likely civic status or designation connected with Antioch.
    'As Antiochenes' preserves the wording without importing more precision than the
    Greek states.
