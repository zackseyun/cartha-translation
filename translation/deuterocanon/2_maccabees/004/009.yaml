  text: πρὸς δὲ τούτοις ὑποσχεῖτο ἕτερα διαγράψειν πεντήκοντα πρὸς τοῖς ἑκατόν, ἐὰν
    ἐπιχορηγηθῇ διὰ τῆς ἐξουσίας αὐτοῦ γυμνάσιον καὶ ἐφηβίαν αὐτῷ συστήσασθαι, καὶ
    τοὺς ἐν Ἱεροσολύμοις Ἀντιοχεῖς ἀναγράψαι.
