theological_decisions:
- issue: Force of the statement about impiety toward God's law
  chosen_reading: 'A general moral-theological principle: violating God''s laws is
    not a trivial or consequence-free matter, and subsequent events will expose that
    reality.'
  alternative_readings:
  - A narrower statement that such impiety is simply difficult to carry out
  - An implicit warning of divine judgment that later events will reveal
  rationale: The Greek wording can sound either like 'it is difficult' in a practical
    sense or, idiomatically, 'it is no easy matter' in a morally weighty sense. The
    immediate contrast with later disclosure favors a warning that the seriousness
    of impiety will become evident in what follows, without importing a more explicit
    doctrine of judgment than the text states.
  doctrine_reference: Translation philosophy §§1, 3, 6
