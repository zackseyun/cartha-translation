translation:
  text: For it is not easy to act wickedly against the divine laws; but the time that
    follows will make these things clear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be impious against the divine laws.' The Greek verb carries the sense
      of irreverent or ungodly action.
    reason: lexical_alternative
  - marker: b
    text: Or 'the ensuing time will reveal this.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσεβεῖν
  chosen: to act wickedly
  alternatives:
  - to be impious
  - to act irreverently
  - to commit ungodliness
  lexicon: BDAG
  rationale: The infinitive denotes impious or ungodly conduct, not merely an internal
    attitude. 'Act wickedly' communicates concrete wrongdoing in accessible English
    while preserving the religious dimension through the object 'against the divine
    laws.'
- source_word: θείους
  chosen: divine
  alternatives:
  - holy
  - godly
  - sacred
  lexicon: LSJ
  rationale: The adjective means 'divine' or 'pertaining to the gods/God.' In this
    Jewish context, 'divine laws' naturally refers to laws belonging to God. 'Divine'
    is the most direct lexical equivalent.
- source_word: νόμους
  chosen: laws
  alternatives:
  - law
  - commandments
  lexicon: LSJ
  rationale: The plural is explicit in Greek and should be retained. 'Laws' is more
    straightforward than 'commandments' and matches the legal sense of νόμος.
- source_word: οὐ ῥᾴδιον
  chosen: is not easy
  alternatives:
  - is difficult
  - is no light thing
  lexicon: LSJ
  rationale: This idiom straightforwardly means 'is not easy.' Retaining the simple
    expression preserves the sentence's measured tone.
- source_word: ὁ ἀκόλουθος καιρός
  chosen: the time that follows
  alternatives:
  - the coming time
  - the ensuing time
  - what follows in due time
  lexicon: LSJ
  rationale: ἀκόλουθος means following or ensuing. 'The time that follows' is a natural
    English rendering that preserves the temporal sequence without overinterpreting
    it as specifically eschatological.
- source_word: δηλώσει
  chosen: will make these things clear
  alternatives:
  - will show
  - will reveal
  - will make evident
  lexicon: BDAG
  rationale: The verb means to make clear, show, or reveal. 'Will make these things
    clear' captures both the future disclosure and the explanatory force of the verb.
