translation:
  text: But the hostility advanced so far that even murders were being carried out
    through one of Simon’s approved agents,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'through a certain one of those approved by Simon.' The Greek leaves
      the person indefinite and emphasizes that he belonged to Simon’s vetted circle.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχθρας
  chosen: hostility
  alternatives:
  - enmity
  - hatred
  lexicon: LSJ
  rationale: ἔχθρα denotes hostile opposition or enmity. 'Hostility' fits the escalating
    conflict in context and reads naturally in modern English without overstating
    emotion as mere 'hatred' might.
- source_word: ἐπὶ τοσοῦτον προβαινούσης
  chosen: advanced so far
  alternatives:
  - progressed to such a point
  - went so far
  lexicon: LSJ
  rationale: The genitive absolute marks the hostility as reaching an extreme stage.
    'Advanced so far' preserves the metaphor of progression while remaining idiomatic.
- source_word: διὰ τινος
  chosen: through one
  alternatives:
  - by means of a certain one
  - through a certain man
  lexicon: LSJ
  rationale: τινος is indefinite. 'Through one' keeps the indefiniteness of the Greek;
    adding 'man' is possible but not required in English here.
- source_word: τῶν ὑπὸ τοῦ Σίμωνος δεδοκιμασμένων
  chosen: Simon’s approved agents
  alternatives:
  - those approved by Simon
  - Simon’s trusted men
  - those tested by Simon
  lexicon: LSJ
  rationale: δεδοκιμασμένων conveys persons approved after testing/proving. Because
    the phrase is partitive after τινος, the sense is 'one of those approved by Simon.'
    'Approved agents' captures both approval and their function in carrying out Simon's
    designs.
- source_word: φόνους
  chosen: murders
  alternatives:
  - killings
  - acts of murder
  lexicon: LSJ
  rationale: φόνος normally denotes murder rather than generic killing. The plural
    is retained as 'murders' to reflect repeated acts.
- source_word: συντελεῖσθαι
  chosen: were being carried out
  alternatives:
  - were being accomplished
  - were being committed
  lexicon: LSJ
  rationale: The passive infinitive here expresses the completion or execution of
    the murders. 'Were being carried out' is idiomatic and preserves the sense of
    orchestrated action.
