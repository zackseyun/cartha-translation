translation:
  text: For this reason, not only Jews, but also many of the other nations,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judeans' for 'Jews'; the context here favors the broader people-group
      sense because it is contrasted with 'the other nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ ἣν αἰτίαν
  chosen: For this reason
  alternatives:
  - because of which cause
  - for which reason
  lexicon: LSJ
  rationale: Idiomatic causal connector introducing the consequence of the preceding
    event. 'For this reason' is natural modern English while remaining close to the
    Greek.
- source_word: οὐ μόνον ... δὲ καὶ
  chosen: not only ... but also
  alternatives:
  - not only ... but even
  - not only ... but
  lexicon: LSJ
  rationale: This correlative construction is standardly rendered 'not only ... but
    also,' preserving the emphatic expansion in the Greek.
- source_word: Ἰουδαῖοι
  chosen: Jews
  alternatives:
  - Judeans
  lexicon: LSJ
  rationale: In 2 Maccabees this term commonly denotes the Jewish people rather than
    merely inhabitants of Judea. 'Jews' is the clearer people-group rendering in this
    context.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a great many
  lexicon: LSJ
  rationale: Straightforward quantitative adjective; 'many' is sufficient and natural.
- source_word: τῶν ἄλλων ἐθνῶν
  chosen: of the other nations
  alternatives:
  - of the other Gentiles
  - from the other peoples
  lexicon: LSJ
  rationale: ἔθνη here refers to non-Jewish peoples/nations. 'Nations' keeps the broader
    ethnic-political sense and avoids importing later NT-specific 'Gentiles' language,
    though that sense is related.
