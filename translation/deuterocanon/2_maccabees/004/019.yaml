translation:
  text: Jason the vile man sent Antiochians from Jerusalem as envoys, carrying three
    hundred silver drachmas for the sacrifice to Heracles; but those who carried them
    requested that they not be used for sacrifice,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as from Jerusalem,' possibly emphasizing that they were sent in a representative
      capacity from Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: μιερὸς
  chosen: the vile man
  alternatives:
  - the polluted man
  - the accursed man
  - the abominable man
  lexicon: LSJ
  rationale: The adjective is strongly pejorative, marking moral/religious defilement
    rather than serving as a neutral descriptor. 'Vile' is forceful, natural English
    and preserves the narrator's condemnation without becoming overly archaic.
- source_word: θεωρούς
  chosen: envoys
  alternatives:
  - delegates
  - sacred envoys
  lexicon: LSJ
  rationale: The term can denote official delegates, often sent to a festival or sacred
    observance. Here they are sent in connection with a pagan sacrifice, so 'envoys'
    captures the official representative sense without overloading the English with
    technical cultic nuance.
- source_word: ὡς ἀπʼ Ἱεροσολύμων
  chosen: from Jerusalem
  alternatives:
  - as from Jerusalem
  - on behalf of Jerusalem
  lexicon: LSJ
  rationale: The phrase indicates representation or claimed origin. In idiomatic English,
    'from Jerusalem' best conveys that they were dispatched as representatives of
    Jerusalem; the nuance of 'as if from' is possible but too interpretively strong
    for the main text here.
- source_word: Ἀντιοχέας
  chosen: Antiochians
  alternatives:
  - men of Antioch
  - Antiochenes
  lexicon: LSJ
  rationale: The accusative plural denotes people associated with Antioch. 'Antiochians'
    is concise and preserves the ethnicon directly.
- source_word: παρακομίζοντας
  chosen: carrying
  alternatives:
  - bringing
  - conveying
  lexicon: LSJ
  rationale: The participle describes transporting the money. 'Carrying' is straightforward
    modern English and fits the syntax naturally.
- source_word: ἀργυρίου δραχμὰς τριακοσίους
  chosen: three hundred silver drachmas
  alternatives:
  - three hundred drachmas of silver
  lexicon: LSJ
  rationale: This preserves both the amount and the material with minimal expansion.
    'Silver drachmas' is clear and idiomatic enough in English.
- source_word: εἰς τὴν τοῦ Ἡρακλέους θυσίαν
  chosen: for the sacrifice to Heracles
  alternatives:
  - for Heracles' sacrifice
  - for sacrifice to Heracles
  lexicon: LSJ
  rationale: The phrase indicates intended use of the money for a sacrificial offering
    connected with Heracles. 'For the sacrifice to Heracles' is clear and preserves
    the pagan cultic reference.
- source_word: ἠξίωσαν
  chosen: requested
  alternatives:
  - insisted
  - urged
  - asked
  lexicon: LSJ
  rationale: The verb conveys making a claim or request. In context the carriers object
    to the sacrificial use of the money; 'requested' preserves that without overstating
    the force.
- source_word: μὴ χρησθαι εἰς θυσίαν
  chosen: that they not be used for sacrifice
  alternatives:
  - that it not be spent on sacrifice
  - that they not be applied to sacrifice
  lexicon: LSJ
  rationale: The infinitive phrase concerns the use of the funds. Because the nearest
    English antecedent is the drachmas, 'they not be used for sacrifice' is grammatically
    clear and close to the Greek sense.
