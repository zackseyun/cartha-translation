theological_decisions:
- issue: Narratorial moral judgment in μιερὸς
  chosen_reading: Retain explicit condemnation with 'the vile man'
  alternative_readings:
  - the impious man
  - the polluted man
  rationale: The Greek itself contains a hostile moral evaluation of Jason, so the
    translation should preserve rather than soften that judgment. This is not imported
    theology but part of the source text's rhetoric.
  doctrine_reference: Translation philosophy §1, §6
