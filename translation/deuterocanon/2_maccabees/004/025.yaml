theological_decisions:
- issue: Moral characterization of Menelaus in relation to the high priesthood
  chosen_reading: 'The verse is rendered as a sharp ethical contrast: he possessed
    nothing fitting for the high priesthood, only tyrannical and beastlike violent
    dispositions.'
  alternative_readings:
  - A softer reading that treats the language as merely political criticism rather
    than moral disqualification
  rationale: The Greek explicitly contrasts 'nothing worthy of the high priesthood'
    with violent passions and rage. The translation preserves the text's condemnation
    without softening it or expanding it beyond the verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
