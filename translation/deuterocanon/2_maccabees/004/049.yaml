translation:
  text: Therefore those who had spoken beforehand about the city, the peoples, and
    the sacred vessels quickly suffered the unjust penalty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who had previously made accusation concerning the city, the people(s),
      and the sacred vessels.' The Greek participle can imply denunciation in context,
      though more literally it means 'having spoken beforehand.'
    reason: lexical_alternative
  - marker: b
    text: '''Peoples'' renders Greek dēmōn, which may refer to civic groups, districts,
      or populations; the exact nuance is not fully certain from this verse alone.'
    reason: lexical_alternative
  - marker: c
    text: '''Penalty'' could also be rendered ''punishment'' or ''loss''; the Greek
      term can cover both punitive and damaging senses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταχέως
  chosen: quickly
  alternatives:
  - swiftly
  - at once
  lexicon: LSJ
  rationale: Adverb indicating promptness of the consequence; 'quickly' is natural
    modern English and preserves the temporal force.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - so
  - then
  lexicon: LSJ
  rationale: Marks an inferential/resultative connection to the preceding context;
    'therefore' preserves that logical link more clearly than a bare 'then'.
- source_word: ἄδικον ζημίαν
  chosen: the unjust penalty
  alternatives:
  - an unjust punishment
  - an unjust loss
  lexicon: LSJ
  rationale: ζημία can denote loss, damage, or penalty. In this judicial/persecutory
    context, 'penalty' best captures punitive suffering, while ἄδικον marks it as
    wrongful or undeserved. The article in English helps the phrase read idiomatically
    as a known consequence in context.
- source_word: ὑπέσχον
  chosen: suffered
  alternatives:
  - underwent
  - endured
  lexicon: LSJ
  rationale: The verb here conveys experiencing or undergoing the penalty. 'Suffered'
    is concise, idiomatic, and fits the negative object.
- source_word: οἱ ... προηγορήσαντες
  chosen: those who had spoken beforehand
  alternatives:
  - those who had previously spoken
  - those who had made prior accusation
  - those who had denounced earlier
  lexicon: LSJ
  rationale: The participle from προαγορεύω literally suggests speaking beforehand
    or publicly declaring in advance. Because the object is introduced with περὶ and
    concerns matters 'about the city, the peoples, and the sacred vessels,' a broader
    rendering is safer than the more specific 'accused,' though the context likely
    involves denunciation.
- source_word: περὶ πόλεως καὶ δήμων καὶ τῶν ἱερῶν σκευῶν
  chosen: about the city, the peoples, and the sacred vessels
  alternatives:
  - concerning the city, the populace, and the holy vessels
  - about the city, the communities, and the temple vessels
  lexicon: LSJ
  rationale: περὶ introduces the matters under discussion. πόλις is 'city'; δῆμοι
    can mean peoples, districts, or civic bodies, but 'peoples' best preserves the
    plural social reference without over-interpreting; ἱερὰ σκεύη are cultic/sacred
    vessels, likely temple vessels, but 'sacred vessels' stays closest to the Greek.
