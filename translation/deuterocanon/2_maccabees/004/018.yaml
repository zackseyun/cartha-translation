translation:
  text: Now when the quadrennial games were being held in Tyre, and the king was present,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek πενταετηρικοῦ is literally 'five-year,' but in festival usage it commonly
      refers to games celebrated every four years by inclusive counting.
    reason: cultural_note
lexical_decisions:
- source_word: Ἀγομένου
  chosen: were being held
  alternatives:
  - were being conducted
  - were taking place
  - were being celebrated
  lexicon: LSJ
  rationale: Genitive absolute from ἄγω used of conducting or holding a festival/contest.
    'Were being held' is idiomatic English that preserves the event's ongoing occurrence
    without over-paraphrase.
- source_word: πενταετηρικοῦ
  chosen: quadrennial
  alternatives:
  - five-year
  - held every fifth year
  lexicon: LSJ
  rationale: Though literally related to 'five-year,' in Greek calendrical usage πενταετηρικός
    commonly denotes a festival recurring every four years when counted inclusively.
    'Quadrennial' best conveys the actual interval in natural English.
- source_word: ἀγῶνος
  chosen: games
  alternatives:
  - contest
  - festival contest
  - athletic games
  lexicon: LSJ
  rationale: ἀγών can mean contest broadly, but in this civic-festival setting at
    Tyre it refers to public games. 'Games' is concise and contextually appropriate;
    'athletic games' would add specificity not explicit in the verse alone.
- source_word: ἐν Τύρῳ
  chosen: in Tyre
  lexicon: LSJ
  rationale: Straightforward locative rendering of the city name.
- source_word: τοῦ βασιλέως παρόντος
  chosen: and the king was present
  alternatives:
  - with the king present
  - and with the king in attendance
  lexicon: LSJ
  rationale: Second genitive absolute. Rendering it as a coordinate clause keeps the
    sentence readable in modern English while preserving the circumstantial force.
