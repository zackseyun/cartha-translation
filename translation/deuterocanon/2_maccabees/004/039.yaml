translation:
  text: But when many acts of temple robbery had been committed in the city by Lysimachus,
    with the consent of Menelaus, and the report had spread outside, the crowd gathered
    against Lysimachus, since much gold had already been plundered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many sacrileges'; the Greek term more specifically denotes robbery of
      sacred or temple property.
    reason: lexical_alternative
  - marker: b
    text: Or 'the rumor had spread outside.' The Greek φήμη can mean 'report,' 'news,'
      or 'rumor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱεροσυλημάτων
  chosen: acts of temple robbery
  alternatives:
  - sacrileges
  - robberies of sacred things
  - temple plunder
  lexicon: LSJ
  rationale: The noun denotes sacrilegious theft from sacred property. 'Acts of temple
    robbery' preserves both the repeated/plural sense and the specific offense against
    the temple, more clearly than the broader 'sacrileges'.
- source_word: μετὰ τῆς τοῦ Μενελάου γνώμης
  chosen: with the consent of Menelaus
  alternatives:
  - with the approval of Menelaus
  - with Menelaus's knowledge
  - by the counsel of Menelaus
  lexicon: LSJ
  rationale: γνώμη can mean opinion, purpose, resolve, or approval. In context it
    indicates Menelaus's concurrence in Lysimachus's actions; 'with the consent of
    Menelaus' captures complicity without overstating direct authorship.
- source_word: διαδοθείσης ... τῆς φήμης
  chosen: the report had spread
  alternatives:
  - the rumor had spread
  - the news had spread
  lexicon: LSJ
  rationale: φήμη can be 'report,' 'rumor,' or 'fame.' Here it refers to circulating
    public information about the thefts. 'Report' is suitably neutral, avoiding the
    potentially dismissive nuance of 'rumor'.
- source_word: ἐπισυνήχθη τὸ πλῆθος
  chosen: the crowd gathered
  alternatives:
  - the multitude assembled
  - the people came together
  lexicon: LSJ
  rationale: The phrase describes a public massing of people. 'The crowd gathered'
    is natural modern English while retaining the collective force of τὸ πλῆθος.
- source_word: ἐπὶ τὸν Λυσίμαχον
  chosen: against Lysimachus
  alternatives:
  - to confront Lysimachus
  - toward Lysimachus
  lexicon: LSJ
  rationale: With verbs of gathering, ἐπί plus accusative can indicate movement directed
    toward someone, often with hostile intent in context. Because the context is public
    outrage over plunder, 'against Lysimachus' best reflects the likely force.
- source_word: χρυσωμάτων
  chosen: gold
  alternatives:
  - gold objects
  - gold treasures
  - golden vessels
  lexicon: LSJ
  rationale: The term refers to gold valuables or gold items. 'Gold' is concise and
    idiomatic in English, while the following participle 'had been plundered' supplies
    the sense of valuables taken. More specific options like 'vessels' would add detail
    not explicit in the Greek.
- source_word: διηρπαγμένων
  chosen: had already been plundered
  alternatives:
  - had already been seized
  - had already been carried off
  lexicon: LSJ
  rationale: The perfect passive participle indicates completed looting with present
    relevance. 'Had already been plundered' conveys both the violent theft and the
    prior completion marked by ἤδη.
