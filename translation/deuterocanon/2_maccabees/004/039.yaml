theological_decisions:
- issue: Nature of the offense described by ἱεροσυλημάτων
  chosen_reading: The verse refers specifically to theft of sacred/temple property,
    not merely general impiety.
  alternative_readings:
  - general sacrileges committed in the city
  rationale: The lexical force of ἱεροσυλία is specifically sacrilegious robbery.
    Rendering it with explicit temple language preserves the historical and religious
    gravity of the act without importing later doctrinal claims.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
