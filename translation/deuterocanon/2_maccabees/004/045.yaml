translation:
  text: And when the king arrived at Tyre, the three men sent by the council made
    their defense before him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καταντήσαντος
  chosen: arrived
  alternatives:
  - came
  - reached
  lexicon: LSJ
  rationale: The genitive absolute marks the king's coming to Tyre; 'arrived' is natural
    modern English and preserves the sense of reaching a destination.
- source_word: δικαιολογίαν
  chosen: presented their case
  alternatives:
  - made their defense
  - offered their justification
  lexicon: LSJ
  rationale: The noun denotes a defense or plea in a legal setting. Because English
    idiom prefers a verbal expression here, 'presented their case' captures the forensic
    sense without sounding overly technical. 'Made their defense' is possible, but
    the Greek object with ἐποιήσαντο is well represented by this idiomatic rendering.
- source_word: γερουσίας
  chosen: council
  alternatives:
  - senate
  - eldership
  lexicon: LSJ
  rationale: The term refers to the governing body of elders. 'Council' is clear and
    accessible in modern English; 'senate' may sound too Roman-specific, and 'eldership'
    is less natural here.
- source_word: πεμφθέντες τρεῖς ἄνδρες
  chosen: the three men sent
  alternatives:
  - the three men who had been sent
  - the three envoys sent
  lexicon: LSJ
  rationale: This keeps the participial force and the straightforward reference to
    the delegation. 'Envoys' is interpretive; 'men sent' stays closer to the Greek
    while remaining readable.
- source_word: ἐπʼ αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  - before the king
  lexicon: LSJ
  rationale: In context the phrase indicates action in the king's presence. 'Before
    him' is concise and idiomatic, with the antecedent clear from context.
