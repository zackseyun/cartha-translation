  text: καταντήσαντος δὲ τοῦ βασιλέως εἰς Τύρον, ἐπʼ αὐτοῦ τὴν δικαιολογίαν ἐποιήσαντο
    οἱ πεμφθέντες τρεῖς ἄνδρες ὑπὸ τῆς γερουσίας.
