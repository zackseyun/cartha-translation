  text: Ὁ δὲ προειρημένος Σίμων, ὁ τῶν χρημάτων καὶ τῆς πατρίδος ἐνδείκτης γεγονώς,
    ἐκακολόγει τὸν Ὀνίαν ὡς οὗτός τε εἴη τὸν Ἡλιόδωρον ἐπισεσυκὼς καὶ τῶν κακῶν δημιουργὸς
    καθεστηκώς·
