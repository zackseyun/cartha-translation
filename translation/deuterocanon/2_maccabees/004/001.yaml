translation:
  text: But the previously mentioned Simon, who had become the informer against the
    money and the homeland, kept slandering Onias, as though he were the one who had
    provoked Heliodorus and had become the author of the troubles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cause of the evils.' The Greek phrase can refer broadly to harmful
      events or troubles, not necessarily moral evil alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: προειρημένος
  chosen: previously mentioned
  alternatives:
  - aforementioned
  - already mentioned
  lexicon: LSJ
  rationale: A straightforward contextual rendering that preserves the backward reference
    without archaic tone.
- source_word: ἐνδείκτης
  chosen: informer against
  alternatives:
  - betrayer of
  - accuser concerning
  - denouncer of
  lexicon: LSJ
  rationale: The noun denotes one who gives information against someone or something.
    'Informer against' best captures the hostile, denunciatory sense here while remaining
    readable. Because the genitives that follow are unusual in English, 'against'
    helps make the relation explicit.
- source_word: τῶν χρημάτων
  chosen: the money
  alternatives:
  - the funds
  - the treasury money
  lexicon: LSJ
  rationale: The plural refers to money/funds. 'The money' is natural English and
    leaves the reference broad enough to cover the temple funds in context without
    over-specifying beyond the verse itself.
- source_word: τῆς πατρίδος
  chosen: the homeland
  alternatives:
  - the fatherland
  - his country
  - the native land
  lexicon: LSJ
  rationale: '''Homeland'' conveys πατρίς idiomatically in modern English while preserving
    the patriotic sense. ''Fatherland'' is too marked in contemporary English.'
- source_word: ἐκακολόγει
  chosen: kept slandering
  alternatives:
  - was speaking evil of
  - kept maligning
  - reviled
  lexicon: LSJ
  rationale: The imperfect suggests ongoing or repeated action. 'Kept slandering'
    captures both the durative force and the defamatory character of the speech.
- source_word: ἐπισεσυκώς
  chosen: had provoked
  alternatives:
  - had incited
  - had egged on
  - had urged on
  lexicon: LSJ
  rationale: The participle presents Onias as allegedly having stirred Heliodorus
    up. 'Provoked' is concise and idiomatic, though 'incited' is a viable alternative.
- source_word: τῶν κακῶν δημιουργός
  chosen: the author of the troubles
  alternatives:
  - the cause of the evils
  - the maker of the misfortunes
  - the source of the troubles
  lexicon: LSJ
  rationale: The phrase attributes responsibility for ensuing harms. 'Author of the
    troubles' preserves agency without sounding overly wooden; 'evils' in English
    could suggest moral evil rather than calamities or harmful events.
- source_word: καθεστηκώς
  chosen: had become
  alternatives:
  - was established as
  - stood as
  lexicon: LSJ
  rationale: Used with δημιουργός, it indicates having come to be or having been constituted
    as such. 'Had become' is natural English and fits the accusation.
