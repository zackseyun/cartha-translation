translation:
  text: But when the matter became known, and it was reported to the king of the Persians
    that in the place where the priests who had been taken away had hidden the fire,
    water appeared, from which also those with Nehemiah purified the sacrifices,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the exiled priests' for 'the priests who had been taken away.' The Greek
      participle indicates priests removed from their place, likely in exile.
    reason: lexical_alternative
  - marker: b
    text: Literally 'those around Nehemiah,' that is, Nehemiah and his associates.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'from which also those around Nehemiah purified the sacrifices';
      the phrase may indicate either source ('from which') or instrument more idiomatically
      ('with which').
    reason: lexical_alternative
lexical_decisions:
- source_word: φανερὸν ἐγενήθη
  chosen: became known
  alternatives:
  - became evident
  - became manifest
  lexicon: LSJ
  rationale: The phrase idiomatically indicates that the matter came to light. 'Became
    known' is natural English and preserves the passive/resultative sense without
    sounding overly formal.
- source_word: τὸ πρᾶγμα
  chosen: the matter
  alternatives:
  - the affair
  - the thing
  lexicon: LSJ
  rationale: A broad term referring to the event or situation under discussion. 'The
    matter' fits the narrative register better than the more colloquial 'thing' or
    the more loaded 'affair'.
- source_word: διηγήθη
  chosen: it was reported
  alternatives:
  - it was related
  - it was told in detail
  lexicon: LSJ
  rationale: The passive sense in context is that news was conveyed to the Persian
    king. 'Reported' captures the formal narrative communication better than the more
    expansive 'told in detail'.
- source_word: τῷ βασιλεῖ τῶν Περσῶν
  chosen: to the king of the Persians
  alternatives:
  - to the Persian king
  lexicon: LSJ
  rationale: A relatively formal rendering that stays close to the Greek genitival
    construction while remaining clear in English.
- source_word: εἰς τὸν τόπον
  chosen: in the place
  alternatives:
  - to the place
  - at the place
  lexicon: LSJ
  rationale: 'Although εἰς often means ''into/to,'' here with the following relative
    clause and ἐφάνη the sense is locative in English: the appearance occurred in
    that place. ''In the place'' best conveys the narrative sense.'
- source_word: οὗ
  chosen: where
  alternatives:
  - in which
  lexicon: LSJ
  rationale: The relative adverb naturally refers to location. 'Where' is idiomatic
    and accurate.
- source_word: τὸ πῦρ ἔκρυψαν
  chosen: had hidden the fire
  alternatives:
  - hid the fire
  lexicon: LSJ
  rationale: The aorist is rendered with English past perfect because the hiding precedes
    the later appearance of the water and the report to the king.
- source_word: οἱ μεταχθέντες ἱερεῖς
  chosen: the priests who had been taken away
  alternatives:
  - the exiled priests
  - the priests who had been deported
  lexicon: LSJ
  rationale: The participle denotes removal/transfer, likely in exile context. 'Taken
    away' is transparent and avoids over-specifying beyond the Greek, while preserving
    the forced-removal sense.
- source_word: τὸ ὕδωρ ἐφάνη
  chosen: water appeared
  alternatives:
  - the water appeared
  - water was found
  lexicon: LSJ
  rationale: The Greek straightforwardly says that water appeared. Omitting the article
    in English sounds more natural while preserving the sense.
- source_word: ἀφʼ οὗ
  chosen: from which
  alternatives:
  - from it
  - with which
  lexicon: LSJ
  rationale: The phrase refers back to the water as the source/instrument connected
    with the subsequent purification. 'From which' is the most literal and leaves
    the exact nuance open.
- source_word: οἱ περὶ τὸν Νεεμίαν
  chosen: those around Nehemiah
  alternatives:
  - Nehemiah and his companions
  - the men with Nehemiah
  lexicon: LSJ
  rationale: The idiom means the group associated with a leader. 'Those around Nehemiah'
    preserves the Greek construction transparently without importing gender or narrowing
    the group unnecessarily.
- source_word: ἥγνισαν
  chosen: purified
  alternatives:
  - consecrated
  - made clean
  lexicon: LSJ
  rationale: The verb denotes ritual purification. 'Purified' best matches sacrificial
    context and preserves cultic force.
- source_word: τὰς θυσίας
  chosen: the sacrifices
  alternatives:
  - the sacrificial offerings
  - the offerings
  lexicon: LSJ
  rationale: A standard cultic term. 'The sacrifices' is direct, clear, and sufficiently
    formal for the context.
