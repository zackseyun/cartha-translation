theological_decisions:
- issue: Cultic sense of purification in relation to sacrifices
  chosen_reading: Rendered ἥγνισαν τὰς θυσίας as 'purified the sacrifices'
  alternative_readings:
  - consecrated the sacrifices
  - purified the sacrificial offerings
  rationale: The text describes a ritual action connected with the recovered liquid
    and sacrificial worship. 'Purified' preserves the cultic ambiguity without over-interpreting
    whether the action is purification of the offerings themselves or of the sacrificial
    rite more broadly.
  doctrine_reference: Translation philosophy §3, §6
