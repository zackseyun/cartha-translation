theological_decisions:
- issue: Possessive reference in 'his inheritance'
  chosen_reading: The pronoun refers to God, yielding 'his inheritance.'
  alternative_readings:
  - The pronoun refers contextually to the people, yielding 'their inheritance'.
  rationale: The Greek most directly reads αὐτοῦ as referring back to θεός. Retaining
    'his inheritance' preserves the covenantal idea that the inheritance belongs to
    God and is bestowed by him, without resolving it into a more interpretive paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of ἁγιασμός
  chosen_reading: Rendered as 'sanctification' in the main text.
  alternative_readings:
  - consecration
  - holiness
  rationale: The term carries cultic and theological weight. 'Sanctification' best
    preserves that weight in a formal list alongside kingship and priesthood, while
    alternatives remain viable depending on whether one emphasizes state or process.
  doctrine_reference: Translation philosophy §§1, 6
