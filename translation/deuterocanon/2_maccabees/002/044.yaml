id: 2MA.2.44
reference: 2 Maccabees 2:44
source:
  edition: lxx-swete-1909
  text: ὁ δὲ θεὸς ὁ σώσας τὸν πάντα λαὸν αὐτοῦ, καὶ ἀποδοὺς τὴν κληρονομίαν αὐτοῦ
    πᾶσιν καὶ τὸ βασίλειον, καὶ τὸ ἱεράτευμα καὶ τὸν ἁγιασμόν,
  language: Greek
