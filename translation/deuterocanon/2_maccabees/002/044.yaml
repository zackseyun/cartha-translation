translation:
  text: But God, who saved all his people and gave his inheritance to all, and the
    kingdom, and the priesthood, and the holiness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'restored his inheritance to all.' The verb can carry the sense of giving
      back or restoring, not only giving.
    reason: lexical_alternative
  - marker: b
    text: Or 'the kingdom.' The Greek term may denote royal rule, royal dignity, or
      a kingdom/realm.
    reason: lexical_alternative
  - marker: c
    text: Or 'consecration' or 'holiness' for 'sanctification.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ θεός
  chosen: But God
  alternatives:
  - And God
  - Now God
  lexicon: LSJ
  rationale: δέ here marks continuation/contrast with what precedes; 'But God' preserves
    the connective force naturally in English without overstating contrast.
- source_word: ὁ σώσας
  chosen: who saved
  alternatives:
  - who has saved
  - the one who saved
  lexicon: BDAG
  rationale: Aorist participle referring to God's completed saving action; 'who saved'
    is idiomatic and keeps the relative-participial sense.
- source_word: τὸν πάντα λαὸν αὐτοῦ
  chosen: all his people
  alternatives:
  - his whole people
  - the whole of his people
  lexicon: LSJ
  rationale: The article + πᾶς + noun construction is best rendered collectively.
    'All his people' is natural English and preserves the totality.
- source_word: ἀποδοὺς
  chosen: gave
  alternatives:
  - restored
  - granted
  - rendered back
  lexicon: BDAG
  rationale: ἀποδίδωμι can mean 'give back, restore, grant.' In this context of divine
    bestowal/restoration of covenant privileges, 'gave' is the broadest natural rendering
    in English. 'Restored' is possible, but the immediate syntax lists gifts/privileges
    without explicit prior-loss language in this verse alone.
- source_word: τὴν κληρονομίαν αὐτοῦ
  chosen: his inheritance
  alternatives:
  - their inheritance
  - the inheritance that was his
  lexicon: LSJ
  rationale: 'The Greek pronoun is singular and most naturally refers to God: the
    inheritance belonging to him, which he gives to his people. ''Their inheritance''
    would interpret the sense rather than mirror the possessive form.'
- source_word: πᾶσιν
  chosen: to all
  alternatives:
  - to all of them
  - to everyone
  lexicon: BDAG
  rationale: Dative plural without explicit object; 'to all' preserves the concise
    distributive force and likely refers to all his people.
- source_word: τὸ βασίλειον
  chosen: the kingship
  alternatives:
  - the kingdom
  - royal dignity
  - the royal office
  lexicon: LSJ
  rationale: βασίλειον can denote royal power/realm. In a list with priesthood and
    sanctification, an abstract/institutional sense fits well; 'kingship' avoids narrowing
    it merely to territory ('kingdom').
- source_word: τὸ ἱεράτευμα
  chosen: the priesthood
  alternatives:
  - the priestly office
  lexicon: LSJ
  rationale: Standard rendering for the institutional priestly role/body; clear and
    natural in English.
- source_word: τὸν ἁγιασμόν
  chosen: the sanctification
  alternatives:
  - holiness
  - consecration
  lexicon: BDAG
  rationale: ἁγιασμός can denote sanctification, holiness, or consecration. In this
    list of covenant privileges, 'sanctification' preserves the formal theological
    sense; 'consecration' is also plausible and worth preserving in a footnote.
