id: 2MA.2.57
reference: 2 Maccabees 2:57
source:
  edition: lxx-swete-1909
  text: τὸ μὲν ἐμβατείνειν καὶ περίπατον ποιεῖσθαι λόγῳ καὶ πολυπραγμονεῖν ἐν τοῖς
    κατὰ μέρος, τῷ τῆς ἱστορίας ἀρχηγενέτῃ καθῆκε·
  language: Greek
