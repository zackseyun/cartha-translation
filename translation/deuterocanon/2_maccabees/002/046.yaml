translation:
  text: Now the matters concerning Judas Maccabeus and his brothers, and the purification
    of the greatest sanctuary, and the dedication of the altar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rededication of the altar.' The Greek says 'dedication,' but the
      historical context is the altar's restoration after defilement.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὰ ... κατὰ τὸν Ἰούδαν
  chosen: the matters concerning Judas
  alternatives:
  - the deeds of Judas
  - the history about Judas
  - what concerns Judas
  lexicon: LSJ
  rationale: The neuter plural with κατά plus accusative introduces the subject matter
    or matters relating to Judas. 'The matters concerning' preserves the broad scope
    without over-specifying as only 'deeds' or 'history.'
- source_word: Ἰούδαν τὸν Μακκαβαῖον
  chosen: Judas Maccabeus
  alternatives:
  - Judas the Maccabee
  lexicon: LSJ
  rationale: Standard English transliteration for the personal name and epithet. 'Maccabeus'
    is conventional and recognizable in this book.
- source_word: τοὺς τούτου ἀδελφούς
  chosen: his brothers
  alternatives:
  - his brethren
  lexicon: LSJ
  rationale: ἀδελφοί here refers to Judas's literal brothers, not a generic mixed
    group, so 'brothers' is both accurate and natural.
- source_word: τὸ ἱεροῦ τοῦ μεγίστου
  chosen: the greatest temple
  alternatives:
  - the most great sanctuary
  - the very great temple
  lexicon: LSJ
  rationale: ἱερόν denotes the temple/sanctuary complex. The genitive phrase with
    μεγίστου literally means 'of the greatest.' The phrase is somewhat unusual in
    English, but 'the greatest temple' best reflects the Greek wording without importing
    interpretation such as 'most holy temple,' which the text does not say.
- source_word: καθαρισμόν
  chosen: purification
  alternatives:
  - cleansing
  lexicon: LSJ
  rationale: Refers to the ritual cleansing/purification of the temple. 'Purification'
    preserves the cultic sense slightly better than the more general 'cleansing.'
- source_word: βωμοῦ
  chosen: altar
  lexicon: LSJ
  rationale: Standard rendering of βωμός in sacrificial context.
- source_word: ἐγκαινισμόν
  chosen: dedication
  alternatives:
  - rededication
  - consecration
  lexicon: LSJ
  rationale: The noun denotes dedication/inauguration. Because the Greek itself does
    not explicitly include a prefix meaning 'again,' 'dedication' is preferred in
    the main text; 'rededication' is a contextually plausible alternative worth preserving
    in a footnote because the historical setting involves restoration after defilement.
