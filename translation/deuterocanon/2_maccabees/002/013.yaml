theological_decisions:
- issue: Nature of πυρά in context
  chosen_reading: Translate generically as 'fire' rather than specifying 'sacrificial
    fire' in the main text
  alternative_readings:
  - a great sacrificial fire was kindled
  rationale: Although the broader context concerns sacrificial matters, the Greek
    here says simply πυρὰ μεγάλη. To avoid importing contextual interpretation into
    the wording, the main text keeps the more direct 'fire,' while the rationale notes
    the contextual association.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
