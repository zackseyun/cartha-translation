theological_decisions:
- issue: Elliptical closing phrase ὡς Νεεμίου
  chosen_reading: as in the prayer of Nehemiah
  alternative_readings:
  - as Nehemiah did
  - according to Nehemiah
  - as in Nehemiah
  rationale: This is not a major doctrinal crux but an interpretive ambiguity. The
    context is prayer during sacrifice, so the translation supplies 'the prayer of'
    to make the comparison intelligible while preserving the allusion to Nehemiah.
    The alternative is preserved in a footnote because the Greek itself is terse.
  doctrine_reference: Preserve theological/interpretive tension rather than resolve
    it without note.
