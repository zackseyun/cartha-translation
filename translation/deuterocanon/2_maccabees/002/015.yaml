theological_decisions:
- issue: Rendering κύριος in divine address
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's default rendering for κύριος is 'Lord.' In this prayer
    context it functions as a divine title and should not be weakened to 'Master.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering δίκαιος in a divine attribute list
  chosen_reading: righteous
  alternative_readings:
  - just
  rationale: Both are possible, but 'righteous' better preserves the moral and covenantal
    dimension of the Greek in a theological description of God. The alternative is
    preserved as a lexical possibility.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη default rationale applied
    analogically to δίκαιος'
