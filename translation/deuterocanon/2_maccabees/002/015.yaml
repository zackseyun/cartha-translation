translation:
  text: 'And the prayer had this form: “Lord God, creator of all things, fearful and
    mighty and righteous and merciful, the only king and good one,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “fearsome” or “awesome” for “fearful,” since the Greek means one who
      inspires fear or awe.
    reason: lexical_alternative
  - marker: b
    text: Or “just” for “righteous.”
    reason: lexical_alternative
  - marker: c
    text: Or “kind” / “benevolent” for “good one.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ ἡ προσευχὴ τὸν τρόπον ἔχουσα τοῦτον
  chosen: And the prayer had this form
  alternatives:
  - And the prayer was in this manner
  - And the prayer was as follows
  lexicon: LSJ
  rationale: The idiom literally means 'the prayer, having this manner,' introducing
    the wording of the prayer. 'Had this form' is natural English while staying close
    to the Greek structure.
- source_word: Κύριε ὁ θεός
  chosen: Lord God
  alternatives:
  - O Lord God
  - Lord, God
  lexicon: LSJ
  rationale: A direct vocative address. 'Lord' follows the project's default for κύριος.
    English can omit the interjection 'O' without loss, though it remains an alternative.
- source_word: ὁ πάντων κτίστης
  chosen: creator of all things
  alternatives:
  - maker of all things
  - creator of all
  lexicon: LSJ
  rationale: κτίστης denotes creator/founder. 'Creator of all things' clearly expresses
    πάντων and is idiomatic in English.
- source_word: ὁ φοβερὸς
  chosen: fearful
  alternatives:
  - awesome
  - fearsome
  - terrible
  lexicon: LSJ
  rationale: The adjective denotes one who inspires fear or awe. 'Fearful' here is
    used in the older sense 'fear-inspiring'; it is closer formally than 'awesome,'
    though the latter is a possible modern alternative.
- source_word: ὁ ἰσχυρὸς
  chosen: mighty
  alternatives:
  - strong
  - powerful
  lexicon: LSJ
  rationale: A standard rendering for divine strength that is both accurate and natural
    in a liturgical string of attributes.
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: LSJ
  rationale: In a description of God's character, 'righteous' preserves the moral-theological
    sense, while 'just' remains a viable alternative.
- source_word: ἐλεήμων
  chosen: merciful
  alternatives:
  - compassionate
  lexicon: LSJ
  rationale: The term regularly denotes mercy shown to others; 'merciful' is the most
    direct and conventional rendering.
- source_word: ὁ μόνος βασιλεὺς
  chosen: the only king
  alternatives:
  - the sole king
  - the only ruler
  lexicon: LSJ
  rationale: μόνος emphasizes exclusivity. 'The only king' preserves the force of
    μοναδικότητα and the royal title without interpretive expansion.
- source_word: χρηστός
  chosen: good one
  alternatives:
  - kind
  - benevolent
  - good
  lexicon: LSJ
  rationale: χρηστός can mean good, kind, or benevolent. Because it stands in a coordinated
    series with repeated articles, 'good one' preserves the adjectival-title feel
    of the Greek more transparently than a bare adjective.
