translation:
  text: After opening the secret door of the roof chamber, they threw stones and struck
    down the leader, and after cutting him into pieces, they threw the heads out to
    those outside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek word rendered 'roof chamber' (τοῦ φατινώματος) is rare and uncertain;
      it likely refers to an upper or roof-level space.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'struck down' is unusually forceful, with imagery of smashing
      or striking as with a thunderbolt.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'the heads' in the plural. The wording is awkward in context
      and may reflect a textual or narrative irregularity, but the translation preserves
      the plural of the source.
    reason: textual_variant
lexical_decisions:
- source_word: ἀνοίξαντες
  chosen: after opening
  alternatives:
  - opening
  - having opened
  lexicon: BDAG
  rationale: Aorist participle preceding the main actions; 'after opening' conveys
    sequence naturally in English without losing the participial force.
- source_word: κρυπτὴν θύραν
  chosen: the secret door
  alternatives:
  - the hidden door
  - the concealed door
  lexicon: LSJ
  rationale: κρυπτήν denotes something hidden or concealed. 'Secret door' is idiomatic
    modern English and fits the narrative setting.
- source_word: τοῦ φατινώματος
  chosen: of the roof chamber
  alternatives:
  - of the upper room
  - of the ceiling space
  - of the loft
  lexicon: LSJ
  rationale: The noun is rare and contextually difficult; in this narrative setting
    it most plausibly refers to an upper or roof-space from which stones could be
    thrown. 'Roof chamber' preserves the architectural sense while acknowledging uncertainty.
- source_word: βάλλοντες πέτρους
  chosen: they threw stones
  alternatives:
  - throwing stones
  - casting stones
  lexicon: BDAG
  rationale: Straightforward participial phrase indicating the means of attack. Finite
    English is smoother here under optimal equivalence.
- source_word: συνεκεραύνωσαν
  chosen: struck down
  alternatives:
  - crushed
  - felled
  - smote
  lexicon: LSJ
  rationale: The verb is unusual and vivid, literally suggesting a violent striking
    as if with a thunderbolt. 'Struck down' captures the force without becoming overly
    interpretive; stronger literal imagery is preserved in a footnote.
- source_word: τὸν ἡγεμόνα
  chosen: the leader
  alternatives:
  - the governor
  - the commander
  - the ruler
  lexicon: BDAG
  rationale: ἡγεμών can denote a leader, governor, or commander depending on context.
    With no clearer office specified in the immediate Greek, 'leader' is the broadest
    defensible rendering.
- source_word: μέλη ποιήσαντες
  chosen: after cutting him into pieces
  alternatives:
  - dismembering him
  - making him into limbs/pieces
  lexicon: LSJ
  rationale: Idiomatic Greek for dismemberment. 'After cutting him into pieces' is
    explicit and readable while reflecting the gruesome force of the phrase.
- source_word: τὰς κεφαλάς
  chosen: the heads
  alternatives:
  - his head
  - the head parts
  lexicon: BDAG
  rationale: The Greek is plural, so the translation preserves the plural even though
    the narrative is awkward. This may reflect multiple severed head-parts or a textual/narrative
    irregularity; the oddity should not be silently smoothed away.
- source_word: τοῖς ἔξω
  chosen: to those outside
  alternatives:
  - outside
  - to the people outside
  lexicon: BDAG
  rationale: The dative with article points to persons outside rather than merely
    a location. 'To those outside' preserves that sense.
