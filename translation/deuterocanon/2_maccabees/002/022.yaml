translation:
  text: And when the materials for the sacrifice had been used up, Nehemiah ordered
    them to pour the remaining water on larger stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the things of the sacrifice.' The phrase is elliptical;
      'materials for the sacrifice' brings out the likely sense in context.
    reason: lexical_alternative
  - marker: b
    text: The Greek text here is somewhat awkward in sequence and may reflect a compressed
      narrative style; the translation follows the extant wording without attempting
      to smooth it beyond the apparent sense.
    reason: textual_variant
lexical_decisions:
- source_word: ἀνηλώθη
  chosen: had been used up
  alternatives:
  - was consumed
  - was spent
  lexicon: LSJ
  rationale: From ἀναλίσκω/ἀναλόω in passive sense, indicating that the sacrificial
    materials were exhausted or consumed. 'Had been used up' is natural English and
    preserves the sense without over-specifying whether by fire or expenditure.
- source_word: τὰ τῆς θυσίας
  chosen: the materials for the sacrifice
  alternatives:
  - the things of the sacrifice
  - the sacrificial materials
  lexicon: LSJ
  rationale: The neuter plural with genitive is somewhat elliptical. A wooden rendering
    ('the things of the sacrifice') is unclear in English. 'Materials for the sacrifice'
    captures the referent broadly and fits the narrative context.
- source_word: τὸ περιλειπόμενον ὕδωρ
  chosen: the remaining water
  alternatives:
  - the water that was left over
  - the leftover water
  lexicon: LSJ
  rationale: Straightforward participial phrase; 'remaining water' is concise and
    natural.
- source_word: ὁ Νεεμίας
  chosen: Nehemiah
  alternatives:
  - Neemias
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: ἐκέλευσεν
  chosen: ordered them
  alternatives:
  - commanded
  - gave orders
  lexicon: LSJ
  rationale: The verb denotes giving an authoritative command. 'Ordered them' reads
    naturally in context and anticipates the infinitive clause.
- source_word: λίθους μείζονας
  chosen: larger stones
  alternatives:
  - great stones
  - bigger stones
  lexicon: LSJ
  rationale: Comparative adjective μείζονας is best rendered comparatively as 'larger'
    rather than the less precise 'great.'
- source_word: καταχεῖν
  chosen: to pour ... on
  alternatives:
  - to pour over
  - to pour down upon
  lexicon: LSJ
  rationale: The compound verb indicates pouring down/upon. In idiomatic English with
    stones as object, 'pour ... on' is the clearest rendering.
