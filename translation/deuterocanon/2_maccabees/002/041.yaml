id: 2MA.2.41
reference: 2 Maccabees 2:41
source:
  edition: lxx-swete-1909
  text: ὡσαύτως δὲ καὶ Ἰούδας τὰ διεσπεπτωκότα διὰ τὸν γεγονότα πόλεμον ἡμῖν ἐπισυνήγαγεν
    πάντα, καὶ ἔστιν παρʼ ἡμῖν.
