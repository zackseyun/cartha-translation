translation:
  text: Likewise also Judas gathered together for us all the things that had been
    scattered because of the war that had occurred, and they are with us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what had been dispersed.' The Greek does not specify the items more
      narrowly in this verse, though the context suggests collected records or writings.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and it is with us,' with a singular verb used for a neuter plural
      subject in Greek.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡσαύτως
  chosen: Likewise
  alternatives:
  - In the same way
  - Similarly
  lexicon: LSJ
  rationale: Introduces a comparison with the preceding statement; 'Likewise' is concise
    and natural while preserving the connective force.
- source_word: δὲ καὶ
  chosen: also
  alternatives:
  - and also
  - indeed also
  lexicon: LSJ
  rationale: The combination adds continuation and emphasis. In English, 'also' adequately
    carries the additive sense without overloading the sentence.
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  lexicon: LSJ
  rationale: As a personal name in this Greek context, the standard transliteration
    is 'Judas,' referring to Judas Maccabeus.
- source_word: τὰ διεσπεπτωκότα
  chosen: all the things that had been scattered
  alternatives:
  - the scattered things
  - what had been dispersed
  lexicon: LSJ
  rationale: The perfect participle denotes items now in a state of having been scattered.
    The neuter plural is best represented broadly as 'things,' likely referring to
    records or materials from context, but the text itself does not specify more narrowly
    here.
- source_word: διὰ τὸν γεγονότα πόλεμον
  chosen: because of the war that had happened
  alternatives:
  - because of the war
  - on account of the war that occurred
  lexicon: LSJ
  rationale: The article with participle γεγονότα modifies πόλεμον and points to the
    war as an event that had taken place. 'Because of the war that had happened' preserves
    both causation and completed occurrence.
- source_word: ἡμῖν
  chosen: for us
  alternatives:
  - for our benefit
  - to us
  lexicon: LSJ
  rationale: 'The dative here is naturally taken as advantage/reference: Judas gathered
    these materials on behalf of the community represented by the speaker.'
- source_word: ἐπισυνήγαγεν
  chosen: gathered together
  alternatives:
  - collected
  - assembled
  lexicon: LSJ
  rationale: The compound verb suggests collecting into one place. 'Gathered together'
    preserves that sense clearly.
- source_word: πάντα
  chosen: all
  alternatives:
  - all things
  - everything
  lexicon: LSJ
  rationale: Placed with τὰ διεσπεπτωκότα, it emphasizes completeness. 'All' is idiomatic
    in English in this construction.
- source_word: καὶ ἔστιν παρʼ ἡμῖν
  chosen: and they are with us
  alternatives:
  - and it is in our possession
  - and these are among us
  lexicon: LSJ
  rationale: The singular verb with neuter plural subject is normal Greek usage. 'They
    are with us' preserves the plural sense of the referents and the idea of present
    possession/availability without overinterpreting.
