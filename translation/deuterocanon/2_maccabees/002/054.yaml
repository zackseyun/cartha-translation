theological_decisions:
- issue: Meaning of εὐχαριστία
  chosen_reading: ordinary gratitude/thanks, not a sacramental reference
  alternative_readings:
  - thanksgiving in a general sense
  rationale: In this literary preface the author speaks of readers' appreciation for
    his labor. Nothing in the context suggests a technical liturgical meaning.
  doctrine_reference: 'Translation philosophy: original-language primacy; avoid importing
    doctrinal claims the text does not make.'
