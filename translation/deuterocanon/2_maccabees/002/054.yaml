id: 2MA.2.54
reference: 2 Maccabees 2:54
source:
  edition: lxx-swete-1909
  text: καθάπερ τῷ παρασκευάζοντι συμπόσιον, ἢ καὶ ζητοῦντι τὴν ἑτέρων ὠφέλειαν, οὐκ
    εὐχερές· ὅμως διὰ τὴν τῶν πολλῶν εὐχαριστίαν ἡδέως τὴν κακοπάθειαν ὑποίσομεν·
  language: Greek
  pages:
  - 685
  - 686
  - 687
  - 688
  - 689
  - 690
  - 691
  - 692
  - 693
  - 732
  - 733
  validation: no_reference
translation:
  text: For just as it is not easy for one who prepares a banquet, or even seeks the
    benefit of others, yet for the gratitude of the many we will gladly endure the
    hardship;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a feast'; the Greek term can refer to a banquet or symposium.
    reason: lexical_alternative
  - marker: b
    text: '''The gratitude of the many'' means the thanks or appreciation of many
      readers, not a technical sacramental term.'
    reason: cultural_note
lexical_decisions:
- source_word: καθάπερ
  chosen: For just as
  alternatives:
  - just as
  - for as
  lexicon: LSJ
  rationale: Introduces a comparison/explanation linking this sentence to the author's
    concluding remarks. 'For just as' preserves the connective force and the comparative
    setup.
- source_word: τῷ παρασκευάζοντι
  chosen: for one who prepares
  alternatives:
  - for the one preparing
  - for him who makes ready
  lexicon: LSJ
  rationale: Dative participle functioning with οὐκ εὐχερές to express what is difficult.
    'Prepares' is natural English and fits the banquet metaphor.
- source_word: συμπόσιον
  chosen: a banquet
  alternatives:
  - a feast
  - a drinking party
  lexicon: LSJ
  rationale: The term can denote a banquet or symposium. 'Banquet' best fits the literary
    metaphor of providing a work for others' enjoyment without overemphasizing drinking.
- source_word: ζητοῦντι τὴν ἑτέρων ὠφέλειαν
  chosen: seeks the benefit of others
  alternatives:
  - aims at others' advantage
  - pursues the profit of others
  lexicon: LSJ
  rationale: ὠφέλεια denotes benefit/advantage. 'Benefit of others' is clear modern
    English and preserves the altruistic sense.
- source_word: οὐκ εὐχερές
  chosen: it is not easy
  alternatives:
  - it is not a simple matter
  - it is difficult
  lexicon: LSJ
  rationale: Idiomatic expression for difficulty. 'It is not easy' is concise and
    natural.
- source_word: ὅμως
  chosen: yet
  alternatives:
  - nevertheless
  - however
  lexicon: LSJ
  rationale: Marks concessive contrast between the difficulty and the author's willingness
    to proceed.
- source_word: διὰ τὴν τῶν πολλῶν εὐχαριστίαν
  chosen: for the gratitude of the many
  alternatives:
  - because of the thanks of the many
  - for the thankfulness of the multitude
  lexicon: LSJ
  rationale: εὐχαριστία here means gratitude/thanks, not the later technical Eucharistic
    sense. 'The many' preserves the Greek expression without flattening it to a vague
    collective.
- source_word: ἡδέως
  chosen: gladly
  alternatives:
  - with pleasure
  - willingly
  lexicon: LSJ
  rationale: Conveys cheerful willingness in enduring the labor.
- source_word: τὴν κακοπάθειαν
  chosen: the hardship
  alternatives:
  - the suffering
  - the toil
  - the affliction
  lexicon: LSJ
  rationale: In context the author refers to the painful labor of composing the epitome.
    'Hardship' captures the burden without overstating it as persecution.
- source_word: ὑποίσομεν
  chosen: we will endure
  alternatives:
  - we will bear
  - we will undergo
  lexicon: LSJ
  rationale: Future verb expressing resolve. 'Endure' fits naturally with hardship
    and preserves the sense of bearing up under difficulty.
