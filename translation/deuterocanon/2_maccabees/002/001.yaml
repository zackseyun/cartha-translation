translation:
  text: 'And those in Judea, and the council of elders, and Judas, to Aristobulus,
    teacher of King Ptolemy, who is also of the family of the anointed priests, and
    to the Jews in Egypt: greetings and good health.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the lineage of the consecrated priests.' The Greek says 'from the
      family of the anointed priests,' using χριστῶν in its ordinary sense of 'anointed,'
      not as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἐν τῇ Ἰουδαίᾳ
  chosen: those in Judea
  alternatives:
  - the Jews in Judea
  - those who are in Judea
  lexicon: LSJ
  rationale: The Greek has an articular plural participial expression functioning
    substantivally, literally 'those in Judea.' Since Ἰουδαίοις appears later explicitly
    for the Egyptian recipients, the first phrase is left broader rather than supplied
    as 'the Jews in Judea,' though that is likely implied by context.
- source_word: γερουσία
  chosen: the council of elders
  alternatives:
  - the senate
  - the gerousia
  - the eldership
  lexicon: LSJ
  rationale: γερουσία denotes a body of elders. 'Council of elders' communicates the
    institutional sense in accessible English better than the more opaque transliteration
    or the potentially misleading 'senate.'
- source_word: διδασκάλῳ
  chosen: teacher
  alternatives:
  - tutor
  - instructor
  lexicon: LSJ
  rationale: The dative identifies Aristobulus as a teacher associated with King Ptolemy.
    'Teacher' is the most direct and natural rendering.
- source_word: ὄντι δὲ ἀπὸ τοῦ τῶν χριστῶν ἱερέων γένους
  chosen: who is also of the family of the anointed priests
  alternatives:
  - being also from the race of the anointed priests
  - who also belonged to the lineage of the consecrated priests
  lexicon: LSJ
  rationale: χριστῶν here is not the messianic title but the plural adjective/substantive
    'anointed,' modifying priests. Rendering it as 'anointed priests' preserves the
    lexical sense without importing christological meaning. γένους is rendered 'family'
    as a natural expression for lineage.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - hail
  lexicon: LSJ
  rationale: In epistolary formulae χαίρειν conventionally means 'greetings,' not
    an imperative to rejoice.
- source_word: ὑγιαίνειν
  chosen: good health
  alternatives:
  - be well
  - health
  lexicon: LSJ
  rationale: In letter openings this infinitive complements χαίρειν as a wish for
    well-being. 'Good health' is idiomatic English in this setting.
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  lexicon: LSJ
  rationale: As a personal name in Hellenistic Jewish literature, Ἰούδας is regularly
    transliterated 'Judas.' 'Judah' would suggest the patriarch/tribe rather than
    the named sender, likely Judas Maccabeus.
