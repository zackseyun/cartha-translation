reference: 2 Maccabees 2:1
source:
  edition: lxx-swete-1909
  text: Καὶ οἱ ἐν τῇ Ἰουδαίᾳ καὶ ἡ γερουσία καὶ Ἰούδας Ἀριστοβούλῳ διδασκάλῳ Πτολεμαίου
    τοῦ βασιλέως, ὄντι δὲ ἀπὸ τοῦ τῶν χριστῶν ἱερέων γένους, καὶ τοῖς ἐν Αἰγύπτῳ Ἰουδαίοις,
    χαίρειν καὶ ὑγιαίνειν.
