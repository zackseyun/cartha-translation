theological_decisions:
- issue: Military comparison in the closing clause
  chosen_reading: The clause is rendered as a simile of people arrayed against a king,
    preserving the Greek martial imagery without softening it.
  alternative_readings:
  - as if we were fighting for the king
  - as those stationed before a king
  rationale: The Greek wording most naturally suggests battle-array language with
    an adversative sense to πρός. Because the source note flags a major mismatch and
    the clause is somewhat compressed, alternatives are preserved in a footnote rather
    than imported into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language
    primacy over translation tradition.
