id: 2MA.2.50
reference: 2 Maccabees 2:50
source:
  edition: lxx-swete-1909
  text: ὑπὸ Ἰάσονος τοῦ Κυρηναίου δηλωθέντα διὰ πέντε βιβλίων, πειρασόμεθα διʼ ἑνὸς
    συντάγματος ἐπιτεμεῖν.
  language: Greek
  pages:
  - 685
  - 686
  - 687
  - 688
  - 689
  - 690
  - 691
  - 692
  - 693
  - 732
  - 733
  validation: no_reference
translation:
  text: what has been set forth by Jason of Cyrene in five books, we will attempt
    to abridge in one volume.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to epitomize' or 'to condense.' The Greek verb refers to producing a
      shorter version of a larger written work.
    reason: lexical_alternative
lexical_decisions:
- source_word: δηλωθέντα
  chosen: has been set forth
  alternatives:
  - has been made clear
  - has been related
  - has been presented
  lexicon: LSJ
  rationale: The participle denotes material that has been disclosed or presented
    by Jason. 'Set forth' fits literary presentation in context better than the more
    wooden 'made clear' and avoids overstating interpretation.
- source_word: διὰ πέντε βιβλίων
  chosen: in five books
  alternatives:
  - through five books
  - by means of five books
  lexicon: LSJ
  rationale: Here διά with the genitive marks the literary medium or extent of Jason's
    work. Idiomatic English is 'in five books.'
- source_word: πειρασόμεθα
  chosen: we will attempt
  alternatives:
  - we will try
  - we shall undertake
  lexicon: LSJ
  rationale: The future middle conveys an undertaking with modesty. 'Will attempt'
    preserves the author's self-effacing tone better than the flatter 'will try.'
- source_word: διʼ ἑνὸς συντάγματος
  chosen: in one volume
  alternatives:
  - in one composition
  - in a single treatise
  - by one compilation
  lexicon: LSJ
  rationale: σύνταγμα here refers to an arranged written work or compilation. 'One
    volume' is natural modern English and matches the contrast with 'five books' without
    becoming overly technical.
- source_word: ἐπιτεμεῖν
  chosen: to abridge
  alternatives:
  - to epitomize
  - to condense
  - to shorten
  lexicon: LSJ
  rationale: The verb means to cut down or abridge a larger work. 'Abridge' is precise
    and suits the literary context; 'epitomize' is possible but less transparent for
    modern readers.
- source_word: ὑπὸ Ἰάσονος τοῦ Κυρηναίου
  chosen: by Jason of Cyrene
  alternatives:
  - by Jason the Cyrenian
  lexicon: LSJ
  rationale: Standard transliteration of the personal name and place-based identifier.
    'Of Cyrene' is the clearest idiomatic English rendering of the ethnic/geographic
    designation.
