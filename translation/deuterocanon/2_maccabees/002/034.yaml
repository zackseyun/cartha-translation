theological_decisions:
- issue: Divine agency in the final clause
  chosen_reading: 'Render the clause personally as God''s action: ''and shows mercy.'''
  alternative_readings:
  - and mercy comes to pass
  - and mercy is shown
  rationale: Although ἔλεος is the grammatical subject of γένηται, the surrounding
    context names God as the actor, so English naturally expresses the implied divine
    agency. This does not add doctrine beyond the syntax and context; it clarifies
    the sense for modern readers.
  doctrine_reference: Translation philosophy §1, §6
- issue: Reference of 'the people'
  chosen_reading: '''his people'''
  alternative_readings:
  - the people
  rationale: The Greek has 'the people,' but with God as subject and in this Jewish
    scriptural context, the referent is God's people. Supplying 'his' makes the relationship
    explicit in idiomatic English while preserving the intended sense.
  doctrine_reference: Translation philosophy §6
