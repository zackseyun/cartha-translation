id: 2MA.2.34
reference: 2 Maccabees 2:34
source:
  edition: lxx-swete-1909
  text: ὡς δὲ ὁ Ἰερεμίας ἔγνων, μεμψάμενος αὐτοῖς εἶπεν ὅτι Καὶ ἄγνωστος ὁ τόπος ἔσται,
    ἕως ἂν συνάγῃ ὁ θεὸς ἐπισυναγωγὴν τοῦ λαοῦ, καὶ ἔλεος γένηται.
  language: Greek
  pages:
  - 685
  - 686
  - 687
  - 688
  - 689
  - 690
  - 691
  - 692
  - 693
  - 732
  - 733
  validation: no_reference
translation:
  text: But when Jeremiah learned of it, he reproved them and said, “The place will
    remain unknown until God gathers his people together and shows mercy.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'until God gathers a gathering of the people, and mercy
      comes to be.' The English smooths this idiom to express the likely sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  chosen: But when
  alternatives:
  - and when
  - now when
  lexicon: LSJ
  rationale: Marks a transition with temporal force; 'But when' preserves both the
    connective and the narrative shift naturally in English.
- source_word: ἔγνων
  chosen: learned of it
  alternatives:
  - knew
  - came to know
  - found out
  lexicon: BDAG
  rationale: Aorist of γιγνώσκω here refers to Jeremiah becoming aware of the action
    just mentioned. 'Learned of it' communicates acquisition of knowledge better than
    the stative 'knew'.
- source_word: μεμψάμενος
  chosen: he rebuked
  alternatives:
  - blaming them, he said
  - having reproached them, he said
  - finding fault with them, he said
  lexicon: LSJ
  rationale: The participle conveys censure directed at them before or as he speaks.
    'He rebuked' is concise, idiomatic, and preserves the negative evaluative force
    better than a weaker 'blamed'.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: Object of the rebuke; English idiom prefers direct object with 'rebuked
    them' rather than 'rebuked to them.'
- source_word: ἄγνωστος
  chosen: unknown
  alternatives:
  - hidden
  - unrecognized
  lexicon: LSJ
  rationale: The adjective means not known. 'Unknown' is the most direct rendering;
    'hidden' would add an idea not explicit in the word itself.
- source_word: ὁ τόπος
  chosen: the place
  alternatives:
  - that place
  - the location
  lexicon: BDAG
  rationale: Straightforward reference to the location previously discussed; 'the
    place' is sufficiently definite and natural.
- source_word: ἔσται
  chosen: will remain
  alternatives:
  - will be
  lexicon: BDAG
  rationale: Future of 'to be' with predicate adjective can be rendered simply 'will
    be,' but 'will remain unknown' better reflects the continuing state implied in
    context.
- source_word: ἕως ἂν συνάγῃ
  chosen: until God gathers
  alternatives:
  - until God may gather
  - until God should gather
  lexicon: BDAG
  rationale: ἕως ἄν with subjunctive marks a future contingency, naturally rendered
    'until ... gathers' in English.
- source_word: ἐπισυναγωγὴν τοῦ λαοῦ
  chosen: his people together
  alternatives:
  - the gathering of the people
  - the assembled company of the people
  lexicon: LSJ
  rationale: The noun ἐπισυναγωγή denotes a gathering/assembling. The Greek construction
    is somewhat awkward in Swete's text; rendering it verbally as 'gathers his people
    together' produces clear English while preserving the sense. 'His' is supplied
    from context because 'God gathers the people' in biblical idiom refers to his
    own people.
- source_word: ἔλεος γένηται
  chosen: shows mercy
  alternatives:
  - mercy comes to pass
  - he becomes merciful
  - mercy is shown
  lexicon: BDAG
  rationale: The clause is idiomatic rather than literal in English. 'Shows mercy'
    captures the sense of divine merciful action without wooden phrasing.
