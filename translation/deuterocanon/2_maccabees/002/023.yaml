theological_decisions:
- issue: Referent of the final passive verb
  chosen_reading: The flame is the implied subject of 'it was consumed.'
  alternative_readings:
  - The offering or material on the altar was consumed
  - The liquid involved in the preceding context was consumed
  rationale: The Greek leaves the subject of ἐδαπανήθη implicit. Given the immediately
    preceding singular φλόξ, taking the flame as the nearest implied referent is the
    most textually economical rendering from this verse alone. Because the source
    note flags a major mismatch and the syntax is compressed, alternatives are preserved
    in a footnote rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it; source-level
    uncertainty should be acknowledged honestly.
