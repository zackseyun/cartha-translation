translation:
  text: And when this happened, a flame was kindled; but when the light from the altar
    shone forth, it was consumed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when the light from the altar shone forth, it was consumed.' The Greek
      verb can suggest shining back or in response, and the implied subject of 'was
      consumed' is not explicitly stated; it may refer to the flame, or possibly to
      the material being burned.
    reason: alternative_reading
lexical_decisions:
- source_word: ὡς δὲ τοῦτο ἐγενήθη
  chosen: And when this happened
  alternatives:
  - Now when this took place
  - And when this came to pass
  lexicon: LSJ
  rationale: A natural temporal transition. ἐγενήθη here marks an event coming about,
    and 'happened' gives clear modern English without archaic tone.
- source_word: φλὸξ
  chosen: a flame
  alternatives:
  - flame
  - fire
  lexicon: LSJ
  rationale: φλόξ denotes a flame or blaze. 'A flame' preserves the singular image
    more precisely than the broader 'fire'.
- source_word: ἀνήφθη
  chosen: was kindled
  alternatives:
  - was lit
  - was ignited
  - sprang up
  lexicon: LSJ
  rationale: The passive verb indicates that the flame came to be lit. 'Was kindled'
    is slightly formal but still readable and fits sacrificial/fire context well.
- source_word: τοῦ δὲ ἀπὸ τοῦ θυσιαστηρίου
  chosen: from the altar
  alternatives:
  - out of the altar
  - from the sacrificial altar
  lexicon: LSJ
  rationale: θυσιαστήριον is 'altar.' The prepositional phrase modifies the following
    light; 'from the altar' is the most straightforward rendering.
- source_word: ἀντιλάμψαντος φωτός
  chosen: when the light ... flashed back
  alternatives:
  - when the light ... shone in response
  - when the light ... blazed forth
  - when the brightness ... reflected
  lexicon: LSJ
  rationale: The genitive absolute is temporal/circumstantial. ἀντιλάμπω suggests
    shining back or in return. 'Flashed back' preserves the responsive or reflected
    nuance better than a simple 'shone'.
- source_word: ἐδαπανήθη
  chosen: it was consumed
  alternatives:
  - it was used up
  - it was spent
  - it disappeared
  lexicon: LSJ
  rationale: δαπανάω in passive commonly means 'be consumed' or 'be spent.' Here the
    most likely referent is the flame, which was consumed when the altar-light flashed
    back.
