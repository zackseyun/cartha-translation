theological_decisions:
- issue: Rendering σκηνοπηγίας
  chosen_reading: the festival of booths
  alternative_readings:
  - the Feast of Booths
  - Tabernacles
  rationale: Following the project's philosophy to translate titles/feast names for
    meaning where possible, 'festival of booths' preserves the literal sense without
    importing later traditional terminology as the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 2
- issue: Handling the compressed phrase καὶ τοῦ πυρός
  chosen_reading: and of the fire
  alternative_readings:
  - and the festival of the fire
  rationale: The phrase is somewhat elliptical in Greek and tied to the narrative
    that follows. The translation preserves the ambiguity rather than resolving it
    into a fuller paraphrase not explicit in the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
