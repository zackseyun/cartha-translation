translation:
  text: Since we are about to celebrate the purification of the temple on the twenty-fifth
    of Chislev, we thought it necessary to make this clear to you, so that you also
    may celebrate the festival of booths and of the fire, when Nehemiah, who built
    the temple and the altar, offered sacrifices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Feast of Booths'; traditionally, 'Tabernacles.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'and of the fire' is terse in Greek and likely refers to the
      commemorative observance connected with Nehemiah's offering and the fire story
      recounted in the following context.
    reason: cultural_note
  - marker: c
    text: Greek 'built'; some readers may understand 'rebuilt' from the historical
      setting, but the source text itself does not state the prefix explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μέλλοντες ἄγειν
  chosen: we are about to celebrate
  alternatives:
  - we intend to observe
  - we are going to keep
  lexicon: LSJ
  rationale: ἄγω with a festival object commonly means to celebrate or keep a feast;
    μέλλοντες adds imminence, hence 'are about to celebrate.'
- source_word: ἐν τῷ Χασελεὺ πέμπτῃ καὶ εἰκάδι
  chosen: on the twenty-fifth of Chislev
  alternatives:
  - in Chislev on the twenty-fifth day
  - on Chislev twenty-five
  lexicon: LSJ
  rationale: The phrase gives the date in the month Chislev; idiomatic English places
    the day with 'of Chislev.'
- source_word: τὸν καθαρισμὸν τοῦ ἱεροῦ
  chosen: the purification of the temple
  alternatives:
  - the cleansing of the sanctuary
  - the dedication-purification of the temple
  lexicon: LSJ
  rationale: καθαρισμός is 'purification/cleansing'; ἱερόν here refers to the temple
    precinct/shrine. 'Purification of the temple' is clear and closely follows the
    Greek.
- source_word: δέον ἡγησάμεθα διασαφῆσαι ὑμῖν
  chosen: we thought it necessary to make this clear to you
  alternatives:
  - we considered it necessary to explain this to you
  - we deemed it fitting to inform you clearly
  lexicon: LSJ
  rationale: The construction conveys a judgment of necessity. διασαφῆσαι means to
    make clear or explain plainly; 'make this clear to you' preserves that force in
    natural English.
- source_word: ἵνα καὶ αὐτοὶ ἄγητε
  chosen: so that you also may celebrate
  alternatives:
  - so that you too may keep
  - in order that you yourselves may observe
  lexicon: LSJ
  rationale: Again ἄγω with a festival sense means celebrate/keep. καὶ αὐτοί adds
    'you also.'
- source_word: σκηνοπηγίας
  chosen: the festival of booths
  alternatives:
  - the Feast of Booths
  - Tabernacles
  lexicon: LSJ
  rationale: σκηνοπηγία denotes the feast known from Jewish usage as Booths/Tabernacles.
    'Festival of booths' translates the term rather than relying on traditional ecclesiastical
    wording.
- source_word: καὶ τοῦ πυρός
  chosen: and of the fire
  alternatives:
  - and the festival of the fire
  - and of fire
  lexicon: LSJ
  rationale: The genitive is coordinated with σκηνοπηγίας and likely abbreviates a
    second festival designation. Retaining 'of the fire' stays close to the Greek
    while leaving the historical reference transparent rather than overexplained in
    the main text.
- source_word: ὅτε Νεεμίας
  chosen: when Nehemiah
  alternatives:
  - at the time when Nehemiah
  lexicon: LSJ
  rationale: ὅτε introduces the historical occasion associated with the preceding
    celebration.
- source_word: ὁ οἰκοδομήσας τό τε ἱερὸν καὶ τὸ θυσιαστήριον
  chosen: who built the temple and the altar
  alternatives:
  - who rebuilt the temple and the altar
  - who constructed both the temple and the altar
  lexicon: LSJ
  rationale: οἰκοδομέω is 'build.' Although historically 'rebuilt' may be inferred,
    the Greek says simply 'built,' so the translation preserves the wording.
- source_word: ἀνήνεγκεν θυσίας
  chosen: offered sacrifices
  alternatives:
  - brought up sacrifices
  - presented sacrifices
  lexicon: LSJ
  rationale: ἀναφέρω in sacrificial contexts means offer up; 'offered sacrifices'
    is the natural English equivalent.
