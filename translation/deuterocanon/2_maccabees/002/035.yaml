id: 2MA.2.35
reference: 2 Maccabees 2:35
source:
  edition: lxx-swete-1909
  text: καὶ τότε ὁ κύριος ἀναδείξει ταῦτα, καὶ ὀφθήσεται ἡ δόξα τοῦ κυρίου καὶ ἡ νεφέλη,
    ὡς ἐπὶ Μωσῇ ἐδηλοῦτο, ὡς καὶ ὁ Σαλωμὼν ἠξίωσεν, ἵνα ὁ τόπος καταγιασθῇ μεγάλως.
  language: Greek
  pages:
  - 685
  - 686
  - 687
  - 688
  - 689
  - 690
  - 691
  - 692
  - 693
  - 732
  - 733
  validation: no_reference
translation:
  text: And then the Lord will reveal these things, and the glory of the Lord and
    the cloud will appear, as it was shown in the case of Moses, and as Solomon also
    asked, that the place might be greatly sanctified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will reveal these things.' The Greek verb can mean to disclose, reveal,
      or bring to light.
    reason: lexical_alternative
  - marker: b
    text: '''The cloud'' likely refers to the familiar cloud of divine presence associated
      with Moses and the sanctuary traditions.'
    reason: cross_reference
  - marker: c
    text: Or 'as it was made manifest with Moses.' The Greek phrase compares this
      future manifestation with the Mosaic precedent.
    reason: lexical_alternative
  - marker: d
    text: Or 'as Solomon also prayed, that the place might be consecrated greatly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναδείξει
  chosen: will disclose
  alternatives:
  - will reveal
  - will make known
  - will bring to light
  lexicon: LSJ
  rationale: The verb can mean to bring to light, display, or reveal. In this context,
    with ταῦτα ('these things') as object and followed by visible divine manifestations,
    'will disclose' captures the sense of making previously hidden matters known without
    over-specifying how.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these
  - them
  lexicon: LSJ
  rationale: The demonstrative is explicit in Greek and likely refers back to the
    hidden sacred items/traditions in the surrounding context. 'These things' preserves
    the referential openness better than a more interpretive gloss.
- source_word: ὀφθήσεται
  chosen: will appear
  alternatives:
  - will be seen
  - will become visible
  lexicon: LSJ
  rationale: Passive form of 'to see' commonly functions as 'appear' in English. This
    is natural modern English while preserving the manifestation sense.
- source_word: δόξα
  chosen: glory
  alternatives:
  - splendor
  - majesty
  lexicon: LSJ
  rationale: '''Glory'' is the standard biblical rendering and fits theophanic context.
    Alternatives like ''splendor'' are possible but lose intertextual resonance with
    divine manifestation language.'
- source_word: νεφέλη
  chosen: the cloud
  alternatives:
  - cloud
  lexicon: LSJ
  rationale: The article suggests a recognizable theophanic cloud known from Israel's
    traditions. 'The cloud' preserves that specificity.
- source_word: ἐπὶ Μωσῇ
  chosen: in the case of Moses
  alternatives:
  - with Moses
  - for Moses
  - upon Moses
  lexicon: LSJ
  rationale: The preposition ἐπί with dative here is idiomatic and refers to the Mosaic
    precedent rather than physical location. 'In the case of Moses' communicates comparison
    to the earlier manifestation account.
- source_word: ἐδηλοῦτο
  chosen: it was shown
  alternatives:
  - it was made manifest
  - it was revealed
  lexicon: LSJ
  rationale: The imperfect/passive sense points to a prior manifestation. 'It was
    shown' is clear and sufficiently formal without becoming wooden.
- source_word: ἠξίωσεν
  chosen: asked
  alternatives:
  - requested
  - deemed worthy
  - prayed
  lexicon: LSJ
  rationale: In context Solomon is making a petition concerning the temple's sanctification.
    'Asked' is the most straightforward rendering; 'prayed' is interpretive, though
    contextually plausible.
- source_word: ὁ τόπος
  chosen: the place
  alternatives:
  - the site
  - the sanctuary place
  lexicon: LSJ
  rationale: The Greek says 'the place,' likely referring to the temple site. The
    plain rendering preserves the wording and lets the context identify the referent.
- source_word: καταγιασθῇ
  chosen: might be sanctified
  alternatives:
  - might be consecrated
  - might be made holy
  lexicon: LSJ
  rationale: The verb denotes being made holy or consecrated. 'Sanctified' preserves
    biblical register and theological nuance; 'consecrated' is possible but slightly
    narrower.
- source_word: μεγάλως
  chosen: greatly
  alternatives:
  - magnificently
  - in a great way
  - exceedingly
  lexicon: LSJ
  rationale: The adverb intensifies the sanctification. 'Greatly' is simple and close
    to the Greek, avoiding the more interpretive 'magnificently'.
