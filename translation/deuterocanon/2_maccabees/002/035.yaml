theological_decisions:
- issue: Rendering κύριος in a deuterocanonical LXX theophanic context
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: Per project doctrine, κύριος defaults to 'Lord.' Although the context
    evokes Israel's God and could invite 'LORD' by analogy to YHWH renderings, the
    Greek source here reads κύριος and the project's contested-terms policy specifies
    'Lord' as the default for Greek κύριος.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Temple/theophany language in relation to Moses and Solomon
  chosen_reading: Retain the text's historical-theophanic claim without expanding
    it doctrinally
  rationale: The verse links future disclosure with manifestations associated with
    Moses and Solomon. The translation preserves this comparison without importing
    later doctrinal interpretations about divine presence beyond what the Greek states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
