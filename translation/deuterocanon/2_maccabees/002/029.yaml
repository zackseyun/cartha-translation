translation:
  text: For just as the architect of a new house must take thought for the whole structure,
    but the one undertaking to decorate it with painted ornament must consider the
    things suitable for adornment, so also, I think, it is with us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'the one undertaking to finish and paint it,' if ἐγκαινίζειν
      is taken more broadly as fitting out or completing the house rather than specifically
      decorating it.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  chosen: just as
  alternatives:
  - even as
  - for as
  lexicon: LSJ
  rationale: Introduces the comparison with a slightly emphatic simile; 'just as'
    fits natural English while preserving the argumentative structure.
- source_word: ἀρχιτέκτονι
  chosen: architect
  alternatives:
  - master builder
  - builder
  lexicon: LSJ
  rationale: The Greek specifically denotes the chief designer/builder, not merely
    a laborer. 'Architect' best preserves the role in the analogy.
- source_word: καταβολῆς
  chosen: foundation
  alternatives:
  - laying of the foundation
  - substructure
  lexicon: LSJ
  rationale: In context of a house, the term refers to foundational construction.
    'Foundation' is concise and idiomatic, though the sense includes the act of laying
    it.
- source_word: φροντιστέον
  chosen: must take thought for
  alternatives:
  - must be concerned about
  - must give attention to
  lexicon: LSJ
  rationale: The verbal adjective expresses necessity or obligation. 'Must take thought
    for' preserves both the impersonal force and the sense of careful concern.
- source_word: ἐγκαινίζειν
  chosen: decorate it
  alternatives:
  - finish it
  - furnish it
  - dedicate it
  lexicon: LSJ
  rationale: Given its pairing with ζωγραφεῖν and διακόσμησιν, the sense here is not
    ceremonial dedication but fitting out/ornamenting a building. 'Decorate it' captures
    the practical force in context.
- source_word: ζωγραφεῖν
  chosen: with encaustic painting
  alternatives:
  - paint
  - adorn with painting
  lexicon: LSJ
  rationale: The verb can refer specifically to painting from life or decorative painting.
    Because the context is architectural embellishment, 'with encaustic painting'
    preserves the more concrete ancient artistic nuance without over-paraphrasing.
- source_word: τὰ ἐπιτήδεια πρὸς διακόσμησιν
  chosen: the things suitable for adornment
  alternatives:
  - what is appropriate for decoration
  - the materials fit for ornament
  lexicon: LSJ
  rationale: The phrase refers broadly to what is fitting or useful for ornamentation.
    'The things suitable for adornment' keeps the generality of the Greek.
- source_word: οὕτως δοκῶ καὶ ἐπὶ ἡμῶν
  chosen: so also, I think, it is with us
  alternatives:
  - so also, in my opinion, this applies to us
  - thus, I think, the same is true in our case
  lexicon: LSJ
  rationale: This closes the analogy with a modest authorial aside. The chosen rendering
    preserves both the comparison and the first-person qualification δοκῶ.
