  text: ὡς γὰρ συνοικῶν αὐτῇ παρῆγεν εἰς τὸν τόπον ὅ τε Ἀντίοχος καὶ οἱ σὺν αὐτῷ φίλοι,
    κύριον τὸ λαβεῖν τὰ χρήματα πλείονα εἰς ἐφορῆς λόγον·
