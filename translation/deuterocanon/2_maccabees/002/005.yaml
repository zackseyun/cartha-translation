translation:
  text: For as Antiochus and his friends were accompanying her to the place, they
    were leading him there to get control of the money, under the pretext of inspection.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek of this verse is syntactically difficult in the transmitted text,
      and some details of subject, object, and pronoun reference are uncertain.
    reason: textual_variant
  - marker: b
    text: Or 'to take possession of the larger sum of money, on the grounds of inspection.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνοικῶν
  chosen: were accompanying
  alternatives:
  - were dwelling with
  - were traveling with
  lexicon: LSJ
  rationale: The participle is difficult in this context and the source text is marked
    with major mismatch; a sense of being together/going along fits the narrative
    movement better than a literal 'dwelling with.'
- source_word: αὐτῇ
  chosen: her
  alternatives:
  - him
  - it
  lexicon: Greek grammar
  rationale: The dative feminine pronoun is present in the source as transmitted.
    Because the immediate context is unstable and the verse is syntactically difficult,
    the translation preserves the feminine form rather than silently normalizing it.
- source_word: παρῆγεν εἰς τὸν τόπον
  chosen: were leading him there to the place
  alternatives:
  - was bringing to the place
  - was conducting to the place
  lexicon: LSJ
  rationale: παράγω can mean lead or bring along. The plural subject created by Ἀντίοχος
    καὶ οἱ σὺν αὐτῷ φίλοι suggests an English plural verbal sense, while the object
    is left implicit in Greek and supplied minimally from context.
- source_word: οἱ σὺν αὐτῷ φίλοι
  chosen: his friends
  alternatives:
  - the friends with him
  - his companions
  lexicon: LSJ
  rationale: A natural rendering of the phrase indicating Antiochus' associates.
- source_word: κύριον τὸ λαβεῖν
  chosen: to get control
  alternatives:
  - to gain mastery
  - to take possession
  lexicon: LSJ
  rationale: κύριον with the infinitive conveys obtaining power or control over something,
    not merely physically taking it.
- source_word: τὰ χρήματα πλείονα
  chosen: the money
  alternatives:
  - the larger sum of money
  - more money
  lexicon: LSJ
  rationale: πλείονα likely qualifies the money as a larger amount, but the syntax
    is rough; 'the money' keeps the core sense in readable English, with the fuller
    nuance preserved in a footnote.
- source_word: εἰς ἐφορῆς λόγον
  chosen: under the pretext of inspection
  alternatives:
  - for an inspection account
  - on the grounds of oversight
  lexicon: LSJ
  rationale: The phrase indicates a stated reason or pretext connected with inspection/oversight.
    'Under the pretext of inspection' best captures the idiomatic force in context.
