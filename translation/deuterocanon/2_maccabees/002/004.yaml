translation:
  text: For when the leader and the force around him, which seemed invincible, had
    arrived, they were cut down in the temple of Nanaia, because the priests attending
    Nanaia had used deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which seemed irresistible' for the difficult phrase describing the force
      around him.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενόμενος
  chosen: had arrived
  alternatives:
  - having come
  - having become
  lexicon: LSJ
  rationale: In context with ὁ ἡγεμὼν καὶ ... δύναμις as the subject and the subsequent
    action in the temple, the participle is best taken in the sense of 'having come/arrived'
    rather than 'having become.' This yields natural English while staying anchored
    to the narrative sequence.
- source_word: ἡγεμών
  chosen: leader
  alternatives:
  - governor
  - ruler
  - commander
  lexicon: LSJ
  rationale: A general term for one in command. 'Leader' preserves the broad sense
    without over-specifying a civil office such as 'governor.'
- source_word: ἡ περὶ αὐτὸν ... δύναμις
  chosen: the force around him
  alternatives:
  - his accompanying force
  - the army with him
  - the power around him
  lexicon: LSJ
  rationale: δύναμις in military narrative commonly denotes a force or body of troops.
    'Around him' reflects περὶ αὐτόν idiomatically as those accompanying him.
- source_word: ἀνυπόστατος δοκοῦσα εἶναι
  chosen: which seemed invincible
  alternatives:
  - which seemed irresistible
  - which seemed impossible to withstand
  - which seemed unsubstantial
  lexicon: LSJ
  rationale: Although ἀνυπόστατος can be difficult, in this military context the phrase
    most plausibly describes a force appearing impossible to stand against. A literal
    'unsubstantial' would not fit the narrative. Because the source is somewhat unusual,
    the rendering is interpretive but contextually grounded.
- source_word: κατεκόπησαν
  chosen: they were cut down
  alternatives:
  - they were struck down
  - they were killed
  - they were hewn down
  lexicon: LSJ
  rationale: The passive conveys violent slaughter. 'Cut down' preserves the vividness
    without becoming archaic.
- source_word: ἐν τῷ τῆς Ναναίας ἱερῷ
  chosen: in the temple of Nanaia
  alternatives:
  - in Nanaia's temple
  - in the shrine of Nanaia
  lexicon: LSJ
  rationale: ἱερόν is naturally 'temple' or 'shrine'; 'temple of Nanaia' is clear
    modern English. The divine name is transliterated per project policy.
- source_word: παραλογισμῷ χρησαμένων
  chosen: because ... had used deceit
  alternatives:
  - by trickery having been employed
  - through a stratagem
  - by means of deception
  lexicon: LSJ
  rationale: The genitive absolute explains the means/circumstance of the killing.
    'Used deceit' captures παραλογισμός as trickery/deception in readable English.
- source_word: τῶν περὶ τὴν Ναναίαν ἱερέων
  chosen: the priests attending Nanaia
  alternatives:
  - the priests of Nanaia
  - the priests around Nanaia
  - Nanaia's priests
  lexicon: LSJ
  rationale: The περὶ + accusative construction here refers to those associated with
    or attached to Nanaia. 'Attending Nanaia' avoids possessive ambiguity while preserving
    the association.
