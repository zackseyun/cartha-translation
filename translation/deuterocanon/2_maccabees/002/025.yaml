translation:
  text: And after enclosing it, the king made it a sanctuary, having tested the matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after fencing it around' or 'after fortifying it'; the Greek participle
      can suggest enclosing for protection.
    reason: lexical_alternative
  - marker: b
    text: Or 'made it a temple' or 'made it a holy place'; Greek ἱερόν can refer broadly
      to a sacred precinct.
    reason: lexical_alternative
