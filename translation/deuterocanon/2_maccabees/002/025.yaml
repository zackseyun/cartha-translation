lexical_decisions:
- source_word: περιφράξας
  chosen: after enclosing it
  alternatives:
  - after fencing it around
  - after fortifying it
  - after surrounding it with a wall
  lexicon: LSJ
  rationale: Aorist participle from περιφράσσω, literally to fence in or enclose.
    'After enclosing it' preserves the participial sequence and avoids over-specifying
    the exact structure while still conveying a physical act of surrounding/protecting.
- source_word: ἱερὸν
  chosen: a sanctuary
  alternatives:
  - a temple
  - a holy place
  lexicon: LSJ
  rationale: ἱερόν can denote a sacred precinct or temple area. 'Sanctuary' fits the
    indefinite anarthrous usage here and avoids implying the Jerusalem temple specifically
    if the referent is a consecrated sacred site more generally.
- source_word: ἐποίησεν
  chosen: made
  alternatives:
  - established
  - constructed
  lexicon: LSJ
  rationale: ποιέω is broad; 'made' is the most direct rendering and leaves open whether
    the sense is construction, designation, or establishment.
- source_word: δοκιμάσας
  chosen: having tested
  alternatives:
  - having examined
  - having approved after testing
  - having verified
  lexicon: LSJ
  rationale: δοκιμάζω commonly means to test, examine, or approve after testing. 'Having
    tested' keeps the verbal idea explicit and lets the context carry whether approval
    resulted.
- source_word: τὸ πρᾶγμα
  chosen: the matter
  alternatives:
  - the affair
  - the thing
  - the situation
  lexicon: LSJ
  rationale: πρᾶγμα is contextually broad. 'The matter' is idiomatic English and preserves
    the generality of the Greek without forcing a narrower interpretation.
