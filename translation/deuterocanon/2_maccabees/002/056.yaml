  - 733
  validation: no_reference
translation:
  text: For just as, in the case of a new house, the architect must take thought for
    the whole foundation, but the one undertaking to decorate and paint it must examine
    the things suitable for adornment, so also, I think, it is with us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to furnish and paint it'; the Greek verb rendered 'decorate' can denote
      fitting out or preparing a house, not only ornamenting it.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  chosen: just as
  alternatives:
  - even as
  - for just as
  lexicon: LSJ
  rationale: Introduces a comparison; 'just as' gives the simile naturally in English
    while preserving the formal structure.
- source_word: οἰκίας
  chosen: house
  alternatives:
  - building
  - home
  lexicon: LSJ
  rationale: In context of architecture and decoration, 'house' is the straightforward
    sense; 'building' is possible but less concrete.
- source_word: ἀρχιτέκτονι
  chosen: architect
  alternatives:
  - master builder
  - builder
  lexicon: LSJ
  rationale: The Greek specifically denotes the chief designer/builder. 'Architect'
    preserves the technical role better than the broader 'builder.'
- source_word: τῆς ὅλης καταβολῆς
  chosen: the whole foundation
  alternatives:
  - the entire laying of the foundation
  - the whole substructure
  lexicon: LSJ
  rationale: καταβολή here refers to foundational laying or groundwork. 'The whole
    foundation' is concise and idiomatic, while still reflecting the totality marked
    by ὅλης.
- source_word: φροντιστέον
  chosen: must take thought for
  alternatives:
  - must give attention to
  - one must be concerned about
  lexicon: LSJ
  rationale: The verbal adjective expresses necessity or obligation. 'Must take thought
    for' preserves both the impersonal force and the sense of careful concern.
- source_word: ἐγκαινίζειν
  chosen: to decorate
  alternatives:
  - to furnish
  - to fit out
  - to dedicate
  lexicon: LSJ
  rationale: In this paired context with ζωγραφεῖν and διακόσμησιν, the sense is not
    ceremonial 'dedicate' but preparing/ornamenting the house. 'Decorate' best fits
    the immediate imagery.
- source_word: ζωγραφεῖν
  chosen: to paint
  alternatives:
  - to depict in color
  - to adorn with paintings
  lexicon: LSJ
  rationale: The verb literally refers to painting from life or in color; in a house-decoration
    context, 'to paint' is the natural English equivalent.
- source_word: τὰ ἐπιτήδεια
  chosen: the things suitable
  alternatives:
  - what is fitting
  - the appropriate materials
  lexicon: LSJ
  rationale: The phrase denotes what is suitable or serviceable for a purpose. 'The
    things suitable' keeps the object open-ended, not restricting it only to materials.
- source_word: πρὸς διακόσμησιν
  chosen: for adornment
  alternatives:
  - for decoration
  - for arrangement
  lexicon: LSJ
  rationale: διακόσμησις concerns ornamentation or orderly decoration. 'For adornment'
    matches the elevated but still readable tone of the comparison.
- source_word: ἐξεταστέον
  chosen: must examine
  alternatives:
  - must consider carefully
  - must inspect
  lexicon: LSJ
  rationale: Like φροντιστέον, this verbal adjective conveys necessity. 'Must examine'
    captures the deliberative scrutiny implied.
- source_word: οὕτως δοκῶ καὶ ἐπὶ ἡμῶν
  chosen: so also, I think, it is with us
  alternatives:
  - so too, in my opinion, it is in our case
  - thus also, I suppose, it applies to us
  lexicon: LSJ
  rationale: δοκῶ is parenthetical ('I think' / 'I suppose'). ἐπὶ ἡμῶν means 'in our
    case' or 'with us.' The chosen rendering preserves the author's modest self-reference
    and application of the analogy.
