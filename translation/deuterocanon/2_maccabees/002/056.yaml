id: 2MA.2.56
reference: 2 Maccabees 2:56
source:
  edition: lxx-swete-1909
  text: καθάπερ γὰρ τῆς καινῆς οἰκίας ἀρχιτέκτονι τῆς ὅλης καταβολῆς φροντιστέον,
    τῷ δὲ ἐγκαινίζειν καὶ ζωγραφεῖν ἐπιχειροῦντι τὰ ἐπιτήδεια πρὸς διακόσμησιν ἐξεταστέον,
    οὕτως δοκῶ καὶ ἐπὶ ἡμῶν.
  language: Greek
  pages:
  - 685
  - 686
  - 687
  - 688
  - 689
  - 690
