id: 2MA.2.53
reference: 2 Maccabees 2:53
source:
  edition: lxx-swete-1909
  text: καὶ ἡμῖν μὲν τοῖς τὴν κακοπάθειαν ἐπιδεδειγμένοις τῆς ἐπιτομῆς οὐ ῥᾴδιον,
    ἱδρῶτος δὲ καὶ ἀγρυπνίας τὸ πρᾶγμα·
  language: Greek
