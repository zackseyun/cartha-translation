translation:
  text: And for us, who have undertaken the hardship of making the abridgment, the
    task is not easy, but one of sweat and sleeplessness;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'who have shown the hardship of the abridgment.' The
      Greek expression is somewhat idiomatic; the translation brings out the sense
      of taking on and enduring the labor involved in producing the abridgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμῖν ... τοῖς
  chosen: for us, who
  alternatives:
  - to us, who
  - for us who
  lexicon: LSJ
  rationale: The dative with the article-participle construction identifies the speakers
    as those characterized by the following action. 'For us, who' gives natural English
    while preserving the self-reference and explanatory force.
- source_word: τὴν κακοπάθειαν
  chosen: the hardship
  alternatives:
  - the suffering
  - the affliction
  - the toil
  lexicon: LSJ
  rationale: κακοπάθεια denotes enduring hardship or suffering. In this literary-preface
    context about editorial labor, 'hardship' best captures the burden without implying
    persecution specifically.
- source_word: ἐπιδεδειγμένοις
  chosen: have undertaken
  alternatives:
  - have shown
  - have displayed
  - have applied ourselves to
  lexicon: LSJ
  rationale: Perfect middle/passive participle of ἐπιδείκνυμι literally suggests 'having
    shown' or 'having exhibited,' but with an abstract object like κακοπάθεια it idiomatically
    conveys taking on or demonstrating endurance of hardship. 'Have undertaken' expresses
    the sense in idiomatic English tied to the labor described.
- source_word: τῆς ἐπιτομῆς
  chosen: of making the abridgment
  alternatives:
  - of the abridgment
  - of the epitome
  - of compiling the abridgment
  lexicon: LSJ
  rationale: ἐπιτομή refers to an abridgment/epitome. Because the participial phrase
    concerns the labor involved, 'of making the abridgment' makes explicit the genitive's
    relation to the work being undertaken, while remaining faithful to the sense.
- source_word: οὐ ῥᾴδιον
  chosen: is not easy
  alternatives:
  - is not a light thing
  - is not simple
  lexicon: LSJ
  rationale: A straightforward rendering of the predicate adjective in context. 'Is
    not easy' is natural modern English and preserves the author's claim about difficulty.
- source_word: ἱδρῶτος ... καὶ ἀγρυπνίας
  chosen: of sweat and sleeplessness
  alternatives:
  - with sweat and wakefulness
  - of toil and sleeplessness
  lexicon: LSJ
  rationale: The genitives characterize the nature of the task. 'Sweat and sleeplessness'
    preserves the vivid bodily imagery of labor and lost sleep better than a flattened
    abstraction.
- source_word: τὸ πρᾶγμα
  chosen: the task
  alternatives:
  - the matter
  - the work
  - the undertaking
  lexicon: LSJ
  rationale: πρᾶγμα here refers to the work at hand, namely producing the abridgment.
    'The task' is concise and idiomatic in English.
