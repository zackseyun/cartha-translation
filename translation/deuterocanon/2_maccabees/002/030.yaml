  text: τὸ μὲν ἐμβατεύειν καὶ περίπατον ποιεῖσθαι λόγῳ καὶ πολυπραγμονεῖν ἐν τοῖς
    κατὰ μέρος, τῷ τῆς ἱστορίας ἀρχηγενέτῃ καθήκει·
  language: Greek
