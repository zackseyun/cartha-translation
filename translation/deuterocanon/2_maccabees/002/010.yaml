theological_decisions:
- issue: Nature of the priests' action with the altar fire
  chosen_reading: The text describes devout priests secretly preserving altar fire
    during deportation, without specifying a ritual theory beyond concealment and
    preservation.
  alternative_readings:
  - The action may imply concern for continuity of worship after exile.
  - The action may be read more simply as reverent preservation of a sacred element.
  rationale: The verse narrates an act of piety but does not itself explain its theological
    significance in detail. The translation avoids importing later doctrinal or liturgical
    conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it.
