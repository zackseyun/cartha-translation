id: 2MA.2.10
reference: 2 Maccabees 2:10
source:
  edition: lxx-swete-1909
  text: καὶ γὰρ ὅτε εἰς τὴν Περσικὴν ἤγοντο ἡμῶν οἱ πατέρες, οἵ τε εὐσεβεῖς ἱερεῖς
    λαβόντες ἀπὸ τοῦ πυρὸς τοῦ θυσιαστηρίου λαθραίως, κατέκρυφαν ἐν κοιλώματι φρέατος
    τάξιν ἔχοντος ἀνύδρου, ἐν ᾧ κατησφαλίσαντο, ὥστε πᾶσιν ἄγνωστον εἶναι τὸν τόπον.
  language: Greek
  pages:
