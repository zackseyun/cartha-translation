translation:
  text: For when our fathers were being led away into Persia, the devout priests secretly
    took some of the fire from the altar and hid it in the hollow of a dry well, where
    they secured it so that the place would be unknown to everyone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the cavity of a dry well.' The Greek description of the place is
      compressed and somewhat awkward, combining terms for a hollow/cavity and a waterless
      well or pit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγοντο
  chosen: were being led away
  alternatives:
  - were taken
  - were carried off
  - went away
  lexicon: LSJ
  rationale: Imperfect/passive sense of ἄγω in this context suggests deportation or
    forced removal rather than voluntary travel. 'Were being led away' preserves that
    nuance without over-specifying.
- source_word: εἰς τὴν Περσικὴν
  chosen: into Persia
  alternatives:
  - to the Persian land
  - to Persia
  lexicon: LSJ
  rationale: The phrase denotes the land of Persia. 'Into Persia' fits the motion
    implied by the verb and keeps the geographic reference natural in English.
- source_word: εὐσεβεῖς
  chosen: devout
  alternatives:
  - pious
  - godly
  lexicon: LSJ
  rationale: '''Devout'' is readable modern English and preserves the religious character
    of the priests without sounding archaic.'
- source_word: λαβόντες ἀπὸ τοῦ πυρὸς τοῦ θυσιαστηρίου
  chosen: took some of the fire from the altar
  alternatives:
  - took fire from the altar
  - took from the altar fire
  lexicon: LSJ
  rationale: The genitive construction naturally means fire belonging to or on the
    altar. 'Some of the fire' reflects that they took a portion, not necessarily the
    whole.
- source_word: λαθραίως
  chosen: secretly
  alternatives:
  - stealthily
  - in secret
  lexicon: LSJ
  rationale: Adverb indicating concealment. 'Secretly' is the clearest idiomatic rendering.
- source_word: κατέκρυφαν
  chosen: hid
  alternatives:
  - concealed
  - buried
  lexicon: LSJ
  rationale: The verb means to hide or conceal. 'Hid' is simple and direct; 'buried'
    would add specificity not required by the Greek.
- source_word: ἐν κοιλώματι φρέατος
  chosen: in the hollow of a ... well-like pit
  alternatives:
  - in the cavity of a well
  - in a hollow of a cistern
  lexicon: LSJ
  rationale: 'κοιλώματι indicates a hollow or cavity; φρέατος usually denotes a well
    or pit. The phrase is somewhat awkward in Greek, so the English keeps both ideas:
    a hollow associated with a well/pit.'
- source_word: τάξιν ἔχοντος ἀνύδρου
  chosen: dry well-like pit
  alternatives:
  - waterless in condition
  - having the character of being dry
  - a dry shaft
  lexicon: LSJ
  rationale: The participial phrase literally means 'having the condition/order of
    being without water.' Because the Greek is compressed and somewhat unusual, 'dry
    well-like pit' conveys a shaft or well cavity lacking water. This also honestly
    reflects source awkwardness noted by the major mismatch flag.
- source_word: κατησφαλίσαντο
  chosen: secured it
  alternatives:
  - made it safe
  - sealed it up
  - made it secure
  lexicon: LSJ
  rationale: The middle verb conveys making something secure or safe. 'Secured it'
    leaves open whether they covered, sealed, or otherwise protected the deposit.
- source_word: ὥστε πᾶσιν ἄγνωστον εἶναι τὸν τόπον
  chosen: so that the place would be unknown to everyone
  alternatives:
  - so that no one would know the place
  - with the result that the location was unknown to all
  lexicon: LSJ
  rationale: This clause expresses intended result. 'The place would be unknown to
    everyone' is close to the Greek while remaining natural English.
