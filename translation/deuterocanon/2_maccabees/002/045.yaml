id: 2MA.2.45
reference: 2 Maccabees 2:45
source:
  edition: lxx-swete-1909
  text: καθὼς ἐπηγγείλατο διὰ τοῦ νόμου· ἐλπίζομεν γὰρ ἐπὶ τῷ θεῷ, ὅτι ταχέως ἡμᾶς
    ἐλεήσει, καὶ ἐπισυνάξει ἐκ τῆς ὑπὸ τὸν οὐρανὸν εἰς τὸν ἅγιον τόπον· ἐξείλατο γὰρ
    ἡμᾶς ἐκ μεγάλων κακῶν, καὶ τὸν τόπον ἐκαθάρισεν.
  language: Greek
