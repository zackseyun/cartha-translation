translation:
  text: just as he promised through the law. For we hope in God that he will soon
    have mercy on us and gather us from under heaven into the holy place; for he rescued
    us from great evils and cleansed the place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from everywhere under heaven,' that is, from the places of dispersion.
    reason: lexical_alternative
  - marker: b
    text: That is, the sacred site in Jerusalem; contextually this refers to the temple
      area.
    reason: cultural_note
  - marker: c
    text: Or 'from great calamities' or 'from great troubles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς ἐπηγγείλατο
  chosen: just as he promised
  alternatives:
  - as he promised
  - according as he promised
  lexicon: BDAG
  rationale: καθώς introduces comparison/conformity; ἐπαγγέλλομαι here is straightforwardly
    'promise.' 'Just as' gives natural English while preserving the comparative force.
- source_word: διὰ τοῦ νόμου
  chosen: through the law
  alternatives:
  - by the law
  - in the law
  lexicon: BDAG
  rationale: διά with genitive commonly marks means or instrumentality. 'Through the
    law' best reflects the idea that the promise was conveyed by means of the law.
- source_word: ἐλπίζομεν ... ἐπὶ τῷ θεῷ
  chosen: we hope in God
  alternatives:
  - we place our hope in God
  - we hope on God
  lexicon: BDAG
  rationale: The idiom ἐλπίζειν ἐπί with dative expresses placing hope in someone.
    'Hope in God' is idiomatic and sufficiently close to the Greek.
- source_word: ταχέως
  chosen: soon
  alternatives:
  - quickly
  - speedily
  lexicon: BDAG
  rationale: The adverb denotes promptness. 'Soon' fits natural English in a future-oriented
    clause and avoids archaic tone.
- source_word: ἐλεήσει
  chosen: will ... have mercy on
  alternatives:
  - will show mercy to
  - will pity
  lexicon: BDAG
  rationale: ἐλεέω regularly means to show mercy. 'Have mercy on us' is idiomatic
    and preserves the theological tone of divine compassion.
- source_word: ἐπισυνάξει
  chosen: gather
  alternatives:
  - assemble
  - bring together
  lexicon: BDAG
  rationale: The verb means gather together, often with restoration overtones. 'Gather'
    is concise and preserves the likely regathering sense.
- source_word: ἐκ τῆς ὑπὸ τὸν οὐρανόν
  chosen: from under heaven
  alternatives:
  - from beneath heaven
  - from all under heaven
  lexicon: BDAG
  rationale: The phrase is somewhat elliptical in English but reflects the Greek expression
    for the world under heaven, i.e., the dispersed places of exile. 'From under heaven'
    keeps the source imagery without over-expanding.
- source_word: εἰς τὸν ἅγιον τόπον
  chosen: into the holy place
  alternatives:
  - to the holy place
  - into the holy sanctuary
  lexicon: BDAG
  rationale: τόπος is 'place'; ἅγιος marks it as sacred. 'Holy place' is the most
    direct rendering. 'Into' reflects εἰς, though the phrase may imply restoration
    to the sacred site more broadly.
- source_word: ἐξείλατο
  chosen: rescued
  alternatives:
  - delivered
  - saved
  lexicon: BDAG
  rationale: ἐξαιρέω in the middle commonly means rescue/deliver from danger. 'Rescued'
    is vivid, natural, and faithful.
- source_word: ἐκ μεγάλων κακῶν
  chosen: from great evils
  alternatives:
  - from great troubles
  - from great calamities
  - from great misfortunes
  lexicon: BDAG
  rationale: κακά can denote evils, troubles, or calamities. Because the context concerns
    severe afflictions rather than abstract moral evil alone, 'great evils' preserves
    the broadness of the Greek while remaining literal.
- source_word: τὸν τόπον ἐκαθάρισεν
  chosen: cleansed the place
  alternatives:
  - purified the place
  - cleansed the sanctuary
  lexicon: BDAG
  rationale: καθαρίζω means cleanse/purify. Since the Greek says τόπον ('place') rather
    than an explicit sanctuary term, 'the place' is retained for transparency, though
    the referent is the sacred site/temple contextually.
