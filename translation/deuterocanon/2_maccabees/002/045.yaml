theological_decisions:
- issue: Referent of 'the holy place' / 'the place'
  chosen_reading: Render both τόπος phrases as 'place' rather than interpretively
    expanding to 'temple' or 'sanctuary' in the main text.
  alternative_readings:
  - the holy sanctuary
  - the temple
  - the sanctuary
  rationale: The context clearly concerns the Jerusalem temple and its purification,
    but the Greek wording itself uses τόπος. To avoid importing a more specific noun
    than the source uses, the main text keeps 'place' while allowing the sacred-temple
    sense to be inferred from context.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source warrants.'
