id: 2MA.2.12
reference: 2 Maccabees 2:12
source:
  edition: lxx-swete-1909
  text: ὡς διεσάφησαν ἡμῖν μὴ εὑρηκέναι πῦρ ἀλλὰ ὕδωρ παχύ, ἐκέλευσεν αὐτοὺς ἀποβλίψαντας
    φέρειν· ὡς δὲ ἀνηνέχθη τὰ τῶν θυσιῶν, ἐκέλευσεν τοὺς ἱερεῖς Νεεμίας ἐπιρᾶναι τῷ
