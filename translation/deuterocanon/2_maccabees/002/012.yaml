theological_decisions:
- issue: Ritual description of applying the liquid to the altar materials
  chosen_reading: sprinkle the water on both the wood and what was laid upon it
  alternative_readings:
  - pour the water over both the wood and what was laid upon it
  rationale: The Greek verb can be rendered more generally as applying or casting
    liquid upon something, but in this sacrificial context 'sprinkle' best reflects
    the likely ritual action without adding doctrinal interpretation.
  doctrine_reference: Translation philosophy §1, §6
- issue: Retention of the unusual phrase 'thick water'
  chosen_reading: thick water
  alternative_readings:
  - thick liquid
  - dense water
  rationale: The narrative emphasizes the surprising substance found in place of fire.
    Preserving the unusual wording maintains the text's tension and avoids interpretive
    smoothing.
  doctrine_reference: Translation philosophy §1, §3
