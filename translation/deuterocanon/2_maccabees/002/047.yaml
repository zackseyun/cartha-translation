id: 2MA.2.47
reference: 2 Maccabees 2:47
source:
  edition: lxx-swete-1909
  text: ἔτι τε τοὺς πρὸς Ἀντίοχον τὸν Ἐπιφανῆ καὶ τὸν τούτου υἱὸν Εὐπάτορα πολέμους,
  language: Greek
