translation:
  text: and also the wars against Antiochus Epiphanes and his son Eupator,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔτι τε
  chosen: and also
  alternatives:
  - further
  - moreover
  - and further
  lexicon: LSJ
  rationale: The combination adds another item in a running list. 'And also' preserves
    the additive force without sounding overly formal.
- source_word: τοὺς ... πολέμους
  chosen: the wars
  alternatives:
  - the campaigns
  - the battles
  lexicon: LSJ
  rationale: πολέμους is the direct object and broadly denotes wars or military conflicts.
    'Wars' is the most straightforward rendering and fits the summary style of the
    sentence.
- source_word: πρὸς
  chosen: against
  alternatives:
  - with
  - in relation to
  lexicon: LSJ
  rationale: With πολέμους, πρὸς commonly marks opposition or conflict directed toward
    an enemy. 'Against' makes that adversarial sense explicit in natural English.
- source_word: Ἀντίοχον τὸν Ἐπιφανῆ
  chosen: Antiochus Epiphanes
  alternatives:
  - Antiochus the Illustrious
  lexicon: LSJ
  rationale: This is a proper royal epithet. The standard transliterated historical
    form 'Epiphanes' is preferable to translating the epithet, since names are transliterated
    by project policy.
- source_word: τὸν τούτου υἱὸν Εὐπάτορα
  chosen: his son Eupator
  alternatives:
  - the son of this man, Eupator
  - his son, Eupator
  lexicon: LSJ
  rationale: τούτου refers back to Antiochus; the phrase identifies Eupator as his
    son. 'His son Eupator' is concise and natural, while preserving the filial relation.
