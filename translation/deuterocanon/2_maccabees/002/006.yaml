translation:
  text: And when the priests of Nanea had set them out, and he had come with a few
    men into the enclosure of the sanctuary, they shut the temple as soon as Antiochus
    entered,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Ναναίου may also be transliterated 'Nanaia.'
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'them' is unspecified in Greek and likely refers to items previously
      mentioned in the narrative context.
    reason: cross_reference
  - marker: c
    text: This verse appears to belong to the narrative of Antiochus and the temple
      of Nanea (elsewhere associated with 2 Maccabees 1:13–15), not the surrounding
      context of chapter 2; the source witness is translated as given despite the
      apparent contextual mismatch.
    reason: textual_variant
lexical_decisions:
- source_word: προθεμένων
  chosen: had set ... out
  alternatives:
  - had displayed
  - had placed before
  lexicon: LSJ
  rationale: Aorist participle of προτίθημι here refers to placing objects before
    someone, likely the treasures or offerings mentioned in context. 'Set ... out'
    is natural English and preserves the concrete action without over-interpreting.
- source_word: αὐτά
  chosen: them
  alternatives:
  - these things
  - the items
  lexicon: LSJ
  rationale: The pronoun lacks an explicit noun in this verse and refers back contextually
    to objects previously in view. 'Them' preserves the Greek's anaphoric vagueness
    better than specifying the referent.
- source_word: τῶν ἱερέων τοῦ Ναναίου
  chosen: the priests of Nanea
  alternatives:
  - Nanean priests
  - the priests of Nanaia
  lexicon: LSJ
  rationale: The genitive construction is most straightforwardly rendered 'the priests
    of Nanea.' The divine name appears in Greek form; 'Nanea' follows the source witness
    closely, while 'Nanaia' is a plausible alternative transliteration worth preserving.
- source_word: προσελθόντος
  chosen: had come
  alternatives:
  - approached
  - entered
  lexicon: LSJ
  rationale: The participle denotes coming near/approaching. Because the following
    phrase already specifies movement into the enclosure, 'had come' avoids redundancy
    while fitting the sequence.
- source_word: μετʼ ὀλίγων
  chosen: with a few men
  alternatives:
  - with a few
  - with only a few
  lexicon: LSJ
  rationale: Although ἀνδρῶν is not expressed, English normally supplies the implied
    companions. 'With a few men' makes the sense clear without materially expanding
    the text.
- source_word: περίβολον
  chosen: enclosure
  alternatives:
  - court
  - precinct
  lexicon: LSJ
  rationale: περίβολος denotes an enclosed area around a sacred site. 'Enclosure'
    is broad and accurate; 'court' may sound too architecturally specific, and 'precinct'
    is possible but less immediately clear.
- source_word: τέμενος
  chosen: sanctuary
  alternatives:
  - sacred precinct
  - shrine
  lexicon: LSJ
  rationale: τέμενος is a sacred precinct or sanctuary. Here 'enclosure of the sanctuary'
    distinguishes it from the later ἱερόν while keeping the cultic sense.
- source_word: συγκλείσαντες
  chosen: they shut
  alternatives:
  - they closed up
  - they locked
  lexicon: LSJ
  rationale: The participle indicates closing something up. 'Shut' is idiomatic and
    does not overstate the mechanism as 'locked' would.
- source_word: ἱερόν
  chosen: the temple
  alternatives:
  - the sanctuary
  - the shrine
  lexicon: LSJ
  rationale: ἱερόν commonly refers to the temple complex or sacred building. Since
    τέμενος has already been rendered 'sanctuary,' 'temple' provides a clear distinction
    in English.
- source_word: ὡς εἰσῆλθεν Ἀντίοχος
  chosen: as soon as Antiochus entered
  alternatives:
  - when Antiochus entered
  - once Antiochus had entered
  lexicon: LSJ
  rationale: ὡς with the aorist here is temporal, marking the moment of action. 'As
    soon as' captures the immediacy of the trap being sprung.
