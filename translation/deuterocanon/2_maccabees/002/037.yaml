id: 2MA.2.37
reference: 2 Maccabees 2:37
source:
  edition: lxx-swete-1909
  text: καθὼς καὶ Μωυσῆς προσηύξατο πρὸς Κύριον, καὶ κατέβη πῦρ ἐκ τοῦ οὐρανοῦ καὶ
    τὰ τῆς θυσίας ἐδαπάνησεν, οὕτως Σαλωμὼν προσηύξατο πρὸς Κύριον, καὶ καταβῆναι
