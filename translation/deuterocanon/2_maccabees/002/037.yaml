translation:
  text: Just as Moses prayed to the Lord, and fire came down from heaven and consumed
    the things of the sacrifice, so also Solomon prayed to the Lord, and the fire
    that came down consumed the whole burnt offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally has a broader expression, 'the things of the sacrifice,'
      which may refer to the sacrificial materials or offerings associated with the
      sacrifice.
    reason: lexical_alternative
  - marker: b
    text: Or 'burnt offerings.' The Greek term specifically denotes offerings wholly
      burned up.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσηύξατο
  chosen: prayed
  alternatives:
  - offered prayer
  - prayed earnestly
  lexicon: LSJ
  rationale: The aorist middle of προσεύχομαι straightforwardly means 'prayed.' 'Offered
    prayer' is more wooden and less natural in modern English; nothing in the form
    here requires an intensified sense such as 'prayed earnestly.'
- source_word: Κύριον
  chosen: Lord
  alternatives:
  - the LORD
  - Master
  lexicon: LSJ
  rationale: Following project doctrine for κύριος, 'Lord' is the default rendering.
    In this Greek deuterocanonical context the referent is Israel's God, but the source
    text has Κύριον, not the Tetragrammaton itself, so 'Lord' best matches the Greek
    witness.
- source_word: κατέβη πῦρ ἐκ τοῦ οὐρανοῦ
  chosen: fire came down from heaven
  alternatives:
  - fire descended from heaven
  lexicon: LSJ
  rationale: This preserves the vivid narrative sequence while using natural modern
    English. 'Descended' is possible but slightly stiffer.
- source_word: τὰ τῆς θυσίας
  chosen: the things of the sacrifice
  alternatives:
  - the sacrifice
  - the sacrificial offerings
  - what belonged to the sacrifice
  lexicon: LSJ
  rationale: The Greek expression is somewhat broader than a simple singular 'the
    sacrifice.' Rendering it as 'the things of the sacrifice' preserves the plural/neuter
    sense without over-specifying. It likely refers to the sacrificial materials or
    offerings associated with the sacrifice.
- source_word: ἐδαπάνησεν
  chosen: consumed
  alternatives:
  - used up
  - devoured
  - spent
  lexicon: LSJ
  rationale: In context of heavenly fire acting on sacrificial matter, 'consumed'
    is the idiomatic English equivalent. More literal options like 'used up' are awkward
    here.
- source_word: οὕτως ... καὶ
  chosen: so also
  alternatives:
  - so
  - in the same way
  lexicon: LSJ
  rationale: This marks the explicit comparison between Moses and Solomon and keeps
    the parallelism clear in English.
- source_word: καταβῆναι τὸ πῦρ
  chosen: the fire that came down
  alternatives:
  - the descending fire
  - fire descended
  lexicon: LSJ
  rationale: The transmitted wording is syntactically compressed; rendering it as
    'the fire that came down' gives coherent English while preserving the relation
    to the earlier clause about fire from heaven.
- source_word: ἀνήλωσεν
  chosen: consumed
  alternatives:
  - destroyed
  - used up
  - devoured
  lexicon: LSJ
  rationale: Like ἐδαπάνησεν earlier in the verse, this verb in sacrificial-fire context
    is best rendered 'consumed.' Using the same English gloss also preserves the deliberate
    parallelism of the verse.
- source_word: ὁλοκαυτώματα
  chosen: whole burnt offerings
  alternatives:
  - burnt offerings
  - holocausts
  lexicon: LSJ
  rationale: ὁλοκαυτώματα refers specifically to offerings wholly burned. 'Whole burnt
    offerings' preserves that specificity better than simply 'burnt offerings,' while
    'holocausts' would be misleading in modern English.
