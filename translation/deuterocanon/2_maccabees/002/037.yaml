theological_decisions:
- issue: Rendering κύριος in a prayer context addressed to Israel's God
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  rationale: The Greek source reads Κύριον. Per doctrine, κύριος defaults to 'Lord';
    using 'the LORD' would import the Hebrew divine name convention beyond what this
    Greek witness explicitly gives.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
- issue: Specificity of ὁλοκαυτώματα
  chosen_reading: whole burnt offerings
  alternative_readings:
  - burnt offerings
  rationale: The verse alludes to cultic acts where the offerings are wholly consumed
    by fire. Preserving that cultic specificity is preferable to flattening the term.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
