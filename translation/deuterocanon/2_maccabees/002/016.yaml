id: 2MA.2.16
reference: 2 Maccabees 2:16
source:
  edition: lxx-swete-1909
  text: ὁ μόνος χορηγός, ὁ μόνος δίκαιος καὶ παντοκράτωρ καὶ αἰώνιος, ὁ διασώζων τὸν
    Ἰσραὴλ ἐκ παντὸς κακοῦ, ὁ ποιήσας τοὺς πατέρας ἐκλεκτούς, καὶ ἡγίασας αὐτούς·
  language: Greek
  pages:
