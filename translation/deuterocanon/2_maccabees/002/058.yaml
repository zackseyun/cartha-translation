translation:
  text: But the pursuit of brevity in expression, and the refusal of an elaborate
    treatment of the subject, should be allowed to one who is making an abridgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to one who is making a translation,' if μετάφρασις is taken in its more
      common sense; here the context favors 'abridgment' or 'epitome.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σύντομον
  chosen: brevity
  alternatives:
  - conciseness
  - shortness
  lexicon: LSJ
  rationale: The adjective with article functions substantivally, referring to concise
    style. 'Brevity' is natural English and preserves the literary concern of the
    Greek.
- source_word: λέξεως
  chosen: expression
  alternatives:
  - wording
  - style
  - diction
  lexicon: LSJ
  rationale: λέξις here concerns manner of wording or expression rather than a single
    'word.' 'Expression' fits the literary context and pairs well with 'brevity.'
- source_word: μεταδιώκειν
  chosen: pursuit of
  alternatives:
  - to pursue
  - to aim at
  - to seek after
  lexicon: LSJ
  rationale: The infinitive depends on συγχωρητέον and denotes what the epitomizer
    may properly aim at. Rendering it as the noun phrase 'the pursuit of' gives idiomatic
    English while preserving the infinitival sense.
- source_word: ἐξεργαστικὸν
  chosen: elaborate treatment
  alternatives:
  - thorough working out
  - full elaboration
  - detailed treatment
  lexicon: LSJ
  rationale: The adjective denotes something worked out in detail. In context it modifies
    the handling of the subject matter, so 'elaborate treatment' best captures the
    contrast with brevity.
- source_word: πραγματίας
  chosen: the subject
  alternatives:
  - the matter
  - the narrative
  - the affair
  lexicon: LSJ
  rationale: πραγματεία can denote a subject matter or treatise. Here it refers broadly
    to the material being handled, so 'the subject' is concise and clear.
- source_word: παραιτεῖσθαι
  chosen: the refusal of
  alternatives:
  - to decline
  - to forgo
  - to dispense with
  lexicon: LSJ
  rationale: The middle infinitive here means declining or avoiding something. 'Refusal
    of' preserves the deliberate renunciation of a more exhaustive treatment.
- source_word: τῷ τὴν μετάφρασιν ποιουμένῳ
  chosen: to one who is making an abridgment
  alternatives:
  - to the one making the epitome
  - to one preparing a summary
  lexicon: LSJ
  rationale: Although μετάφρασις often suggests translation in later usage, in this
    context of 2 Maccabees' preface it refers to producing a condensed version or
    epitome of a larger work. 'Making an abridgment' best fits the immediate literary
    setting and avoids misleading readers into thinking linguistic translation is
    meant.
- source_word: συγχωρητέον
  chosen: should be allowed
  alternatives:
  - must be conceded
  - ought to be granted
  - should be permitted
  lexicon: LSJ
  rationale: The verbal adjective expresses what ought to be conceded. 'Should be
    allowed' is clear modern English and preserves the impersonal exhortative force.
