id: 2MA.2.58
reference: 2 Maccabees 2:58
source:
  edition: lxx-swete-1909
  text: τὸ δὲ σύντομον τῆς λέξεως μεταδιώκειν, καὶ τὸ ἐξεργαστικὸν τῆς πραγματίας
    παραιτεῖσθαι, τῷ τὴν μετάφρασιν ποιουμένῳ συγχωρητέον.
