theological_decisions:
- issue: Meaning of μετάφρασις in context
  chosen_reading: abridgment/epitome rather than linguistic translation
  alternative_readings:
  - translation
  rationale: The broader prologue of 2 Maccabees discusses condensing Jason of Cyrene's
    larger work. Therefore the term here is best understood in the sense of recasting
    material into shorter form, not translating from one language to another.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve plain sense of the source text.'
