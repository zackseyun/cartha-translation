id: 2MA.2.52
reference: 2 Maccabees 2:52
source:
  edition: lxx-swete-1909
  text: ἐφροντίσαμεν τοῖς μὲν βουλομένοις ἀναγινώσκειν εὐχαγωγίαν, τοῖς δὲ φιλοφρονοῦσιν
    εἰς τὸ διαμνήμης ἀναλαβεῖν εὐκοπίαν, πᾶσιν δὲ τοῖς ἐντυγχάνουσιν ὠφέλειαν.
  language: Greek
  pages:
  - 685
  - 686
  - 687
  - 688
  - 689
  - 690
  - 691
  - 692
  - 693
  - 732
  - 733
  validation: no_reference
translation:
  text: we have taken care that for those who wish to read there may be enjoyment,
    for those who are favorably disposed to commit it to memory ease, and for all
    who read it benefit.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐφροντίσαμεν
  chosen: we have taken care
  alternatives:
  - we have taken pains
  - we have been concerned
  - we have provided
  lexicon: LSJ
  rationale: The aorist of φροντίζω conveys deliberate concern or care. 'We have taken
    care' preserves the author's purposeful effort in preparing the work without over-paraphrasing.
- source_word: βουλομένοις
  chosen: those who wish
  alternatives:
  - those who desire
  - those willing
  lexicon: LSJ
  rationale: The participle denotes volition or desire. 'Those who wish' is natural
    modern English and keeps the sense of readers who choose to engage the book.
- source_word: ἀναγινώσκειν
  chosen: to read
  alternatives:
  - to read aloud
  lexicon: LSJ
  rationale: The verb can mean read or read aloud, but in this literary preface context
    the broader 'to read' best fits without excluding oral reading.
- source_word: εὐχαγωγίαν
  chosen: enjoyment
  alternatives:
  - delight
  - pleasant entertainment
  - ease of reading
  lexicon: LSJ
  rationale: The noun suggests pleasantness or agreeableness in being led along. 'Enjoyment'
    captures the idea that the epitome is made readable and engaging, without implying
    mere amusement.
- source_word: φιλοφρονοῦσιν
  chosen: those who are inclined
  alternatives:
  - those who are devoted
  - those who take pleasure
  - those who are favorably disposed
  lexicon: LSJ
  rationale: The verb here describes a favorable disposition toward the task that
    follows. 'Those who are inclined' fits the construction with the infinitive and
    avoids overstating emotional warmth.
- source_word: εἰς τὸ διαμνήμης ἀναλαβεῖν
  chosen: to commit it to memory
  alternatives:
  - to take it up for remembrance
  - to retain it in memory
  lexicon: LSJ
  rationale: The phrase idiomatically points to taking something up so as to remember
    it. 'Commit it to memory' is the clearest English equivalent.
- source_word: εὐκοπίαν
  chosen: ease
  alternatives:
  - facility
  - convenience
  lexicon: LSJ
  rationale: The noun denotes ease or lack of difficulty. 'Ease' is concise and pairs
    well with memorization in English.
- source_word: ἐντυγχάνουσιν
  chosen: encounter it
  alternatives:
  - read it
  - consult it
  - come upon it
  lexicon: LSJ
  rationale: The participle literally refers to those who meet with or engage the
    work. 'Encounter it' preserves the broader sense, including readers and hearers,
    without narrowing it to formal reading alone.
- source_word: ὠφέλειαν
  chosen: benefit
  alternatives:
  - profit
  - advantage
  lexicon: LSJ
  rationale: The noun means usefulness or benefit. 'Benefit' is idiomatic modern English
    and suits the author's stated purpose.
