translation:
  text: And after many years had passed, when it seemed good to God, Nehemiah, having
    been sent by the king of Persia, sent to get the fire the descendants of the priests
    who had hidden it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when God saw fit' or 'when it pleased God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διελθόντων ... ἐτῶν ἱκανῶν
  chosen: after many years had passed
  alternatives:
  - when many years had gone by
  - after a considerable number of years had passed
  lexicon: LSJ
  rationale: The genitive absolute marks elapsed time. ἱκανῶν here means 'many' or
    'considerable,' not merely 'sufficient,' so an idiomatic English temporal clause
    best reflects the sense.
- source_word: ὅτε ἔδοξεν τῷ θεῷ
  chosen: when it seemed good to God
  alternatives:
  - when God saw fit
  - when it pleased God
  lexicon: LSJ
  rationale: ἔδοξεν with dative commonly means 'it seemed good to.' 'It pleased God'
    is possible, but 'seemed good to God' stays closer to the Greek idiom while remaining
    natural English.
- source_word: ἀποσταλεὶς Νεεμίας ἀπὸ τοῦ βασιλέως τῆς Περσίδος
  chosen: Nehemiah, having been sent by the king of Persia
  alternatives:
  - Nehemiah, sent from the king of Persia
  - Nehemiah, when he had been sent by the king of Persia
  lexicon: LSJ
  rationale: The aorist passive participle modifies Nehemiah and indicates prior action.
    ἀπό with a personal agent here is naturally rendered 'by' in English, expressing
    commission from the Persian king.
- source_word: τοὺς ἐκγόνους τῶν ἱερέων
  chosen: the descendants of the priests
  alternatives:
  - the offspring of the priests
  - the sons of the priests
  lexicon: LSJ
  rationale: ἐκγόνοι denotes descendants or offspring. 'Descendants' is broad and
    accurate, avoiding the narrower 'sons' unless the context requires direct filial
    relation.
- source_word: τῶν ἀποκρυψάντων
  chosen: who had hidden it
  alternatives:
  - who had concealed it
  - who had stored it away
  lexicon: LSJ
  rationale: The participle refers back to the priests of the earlier narrative who
    hid the sacred fire. English requires an object; 'it' is supplied from context
    and points to the fire mentioned at the end of the sentence.
- source_word: ἔπεμψεν ἐπὶ τὸ πῦρ
  chosen: sent to get the fire
  alternatives:
  - sent for the fire
  - sent after the fire
  lexicon: LSJ
  rationale: πέμπω with ἐπί plus accusative can indicate sending for or in search
    of something. 'Sent to get the fire' makes the purpose explicit in idiomatic English
    and fits the narrative context of retrieval.
