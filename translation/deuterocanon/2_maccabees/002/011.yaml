theological_decisions:
- issue: Divine volition in ὅτε ἔδοξεν τῷ θεῷ
  chosen_reading: when it seemed good to God
  alternative_readings:
  - when God saw fit
  - when it pleased God
  rationale: This is not a major doctrinally contested term, but the phrase expresses
    divine timing without importing stronger theological claims than the Greek states.
    The chosen wording preserves the idiom and the text's restraint.
