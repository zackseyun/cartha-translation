translation:
  text: And for us, who have undertaken the hardship of making the abridgment, the
    task is not easy, but a matter of sweat and sleeplessness;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἐπιτομή can also be rendered 'epitome,' but 'abridgment' is used here
      because modern English 'epitome' usually no longer means a condensed written
      work.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμῖν ... τοῖς
  chosen: for us, who
  alternatives:
  - to us, who
  - for us who
  lexicon: LSJ
  rationale: The dative with the article-participle construction identifies the speakers
    as the ones engaged in the action. 'For us, who' gives natural English while preserving
    the self-reference and relation to the infinitive-like task description.
- source_word: τὴν κακοπάθειαν
  chosen: the hardship
  alternatives:
  - the suffering
  - the toil
  - the affliction
  lexicon: LSJ
  rationale: κακοπάθεια denotes enduring trouble, hardship, or suffering. In this
    literary-preface context about editorial labor, 'hardship' best captures strenuous
    difficulty without implying persecution specifically.
- source_word: ἐπιδεδιγμένοις
  chosen: have undertaken
  alternatives:
  - have taken upon ourselves
  - have set ourselves to
  - have ventured upon
  lexicon: LSJ
  rationale: The perfect middle participle conveys having committed oneself to or
    taken in hand a task. 'Have undertaken' is idiomatic and fits the completed commitment
    with ongoing relevance.
- source_word: τῆς ἐπιτομῆς
  chosen: of making the abridgment
  alternatives:
  - of the abridgment
  - of the epitome
  - of abridging
  lexicon: LSJ
  rationale: ἐπιτομή refers to an abridgment/epitome. Because English 'epitome' is
    misleading in modern usage, 'abridgment' is preferable. Adding 'making' clarifies
    that the hardship concerns producing the abridgment, not merely possessing it.
- source_word: οὐ ῥᾴδιον
  chosen: is not easy
  alternatives:
  - is not a simple thing
  - is no easy task
  lexicon: LSJ
  rationale: A straightforward rendering preserves the plain statement of difficulty.
    The predicate is supplied naturally in English from the clause structure.
- source_word: ἱδρῶτος ... καὶ ἀγρυπνίας
  chosen: a matter of sweat and sleeplessness
  alternatives:
  - of sweat and wakefulness
  - of toil and sleeplessness
  - with sweat and sleeplessness
  lexicon: LSJ
  rationale: The genitives characterize what the task consists in or costs. 'Sweat
    and sleeplessness' preserves the vivid bodily imagery of labor and lost sleep.
    'A matter of' smoothly represents the compressed Greek nominal expression.
- source_word: τὸ πρᾶγμα
  chosen: the task
  alternatives:
  - the matter
  - the undertaking
  - the work
  lexicon: LSJ
  rationale: πρᾶγμα here refers to the undertaking under discussion, namely the production
    of the abridgment. 'Task' is concise and contextually precise.
