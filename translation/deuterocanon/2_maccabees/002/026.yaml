id: 2MA.2.26
reference: 2 Maccabees 2:26
source:
  edition: lxx-swete-1909
  text: καὶ ἡμῖν μὲν τοῖς τὴν κακοπάθειαν ἐπιδεδιγμένοις τῆς ἐπιτομῆς οὐ ῥᾴδιον, ἱδρῶτος
    δὲ καὶ ἀγρυπνίας τὸ πρᾶγμα·
  language: Greek
