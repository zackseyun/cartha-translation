translation:
  text: And the priests were singing the hymns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has an imperfect verb, indicating continuing action: ''were chanting''
      rather than simply ''chanted.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: LSJ
  rationale: δέ here functions as a mild connective advancing the narrative rather
    than marking a strong contrast; 'And' is natural English while preserving the
    flow.
- source_word: ἱερεῖς
  chosen: the priests
  alternatives:
  - priests
  lexicon: LSJ
  rationale: The article is present in Greek, and 'the priests' best reflects the
    identifiable priestly group in the scene.
- source_word: ἐπέαλλον
  chosen: were chanting
  alternatives:
  - were singing
  - were intoning
  lexicon: LSJ
  rationale: The imperfect indicates ongoing action. The verb refers to vocal performance
    of hymns; 'were chanting' preserves the liturgical flavor better than the more
    generic 'were singing.'
- source_word: τοὺς ὕμνους
  chosen: the hymns
  alternatives:
  - hymns
  - songs of praise
  lexicon: LSJ
  rationale: ὕμνοι are hymns or songs of praise. 'The hymns' keeps the article and
    suits the likely cultic setting.
