theological_decisions:
- issue: Cultic nuance of τελειώσεως in relation to the temple
  chosen_reading: completion
  alternative_readings:
  - consecration
  rationale: The noun can carry a cultic sense of bringing something to its intended
    sacred completion, which could be rendered 'consecration.' The main text keeps
    the broader lexical sense 'completion' to remain transparent to the Greek while
    preserving the cultic alternative in a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: Historical implication of ἐγκαινισμοῦ
  chosen_reading: dedication
  alternative_readings:
  - rededication
  rationale: Although the Maccabean context concerns restoration of the temple, the
    Greek noun itself here is 'dedication.' To avoid importing historical interpretation
    into the main text, 'rededication' is preserved only as an alternative note.
  doctrine_reference: Translation philosophy §1, §3
