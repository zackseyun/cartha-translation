id: 2MA.2.36
reference: 2 Maccabees 2:36
source:
  edition: lxx-swete-1909
  text: διεσαφείτο δὲ καὶ ὡς σοφίαν ἔχων ἀνήνεγκεν θυσίαν ἐγκαινισμοῦ καὶ τῆς τελειώσεως
    τοῦ ἱεροῦ.
  language: Greek
