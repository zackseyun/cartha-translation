theological_decisions:
- issue: Rendering of ἀναθεμάτων
  chosen_reading: votive offerings
  alternative_readings:
  - dedicated gifts
  - things devoted
  rationale: The term can denote dedicated objects or offerings in temple context.
    Rendering it as 'votive offerings' avoids the misleading later theological sense
    of 'anathemas' and fits the historical setting of collected royal letters about
    dedicated gifts.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
