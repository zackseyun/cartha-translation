id: 2MA.2.40
reference: 2 Maccabees 2:40
source:
  edition: lxx-swete-1909
  text: Ἐξηγοῦντο δὲ καὶ ἐν ταῖς ἀναγραφαῖς καὶ ἐν τοῖς ὑπομνηματισμοῖς τοῖς κατὰ
    τὸν Νεεμίαν τὰ αὐτά, καὶ ὡς καταβαλλόμενος βιβλιοθήκην ἐπισυνήγαγεν τὰ περὶ τῶν
    βασιλέων καὶ προφητῶν βιβλία, καὶ τὰ τοῦ Δαυείδ, καὶ ἐπιστολὰς βασιλέων περὶ ἀναθεμάτων.
  language: Greek
  pages:
