translation:
  text: The same things were also related in the records and in the memoirs concerning
    Nehemiah, and how, in founding a library, he gathered together the books about
    the kings and prophets, and the writings of David, and letters of kings concerning
    votive offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while establishing a library.' The Greek participle can express the
      act of founding or setting up the library.
    reason: lexical_alternative
  - marker: b
    text: '''Votive offerings'' refers to gifts dedicated to God; the Greek term can
      also be rendered ''dedicated gifts'' or ''things devoted.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐξηγοῦντο
  chosen: were related
  alternatives:
  - were recounted
  - were explained
  - were narrated
  lexicon: LSJ
  rationale: Imperfect/passive sense here introduces what the records and memoirs
    reported. 'Were related' fits the documentary context without overinterpreting
    as exposition ('explained').
- source_word: ἀναγραφαῖς
  chosen: records
  alternatives:
  - public records
  - registers
  - written accounts
  lexicon: LSJ
  rationale: A general term for written records or archival entries. 'Records' is
    clear modern English and suits the paired documentary sources.
- source_word: ὑπομνηματισμοῖς
  chosen: memoirs
  alternatives:
  - memoranda
  - notes
  - commentaries
  lexicon: LSJ
  rationale: In context with Nehemiah, the term points to memorial or recollective
    writings rather than formal commentary. 'Memoirs' best captures that likely sense.
- source_word: τοῖς κατὰ τὸν Νεεμίαν
  chosen: concerning Nehemiah
  alternatives:
  - about Nehemiah
  - under Nehemiah
  lexicon: LSJ
  rationale: The phrase most naturally means writings pertaining to Nehemiah. 'Concerning
    Nehemiah' is idiomatic and avoids implying authorship too strongly.
- source_word: καταβαλλόμενος
  chosen: in founding
  alternatives:
  - while establishing
  - laying the foundation of
  - setting up
  lexicon: LSJ
  rationale: From the sense of laying a foundation or establishing. With βιβλιοθήκην,
    the idea is that Nehemiah was establishing/founding a library, not physically
    throwing one down. 'In founding' is concise and natural.
- source_word: βιβλιοθήκην
  chosen: a library
  alternatives:
  - a collection of books
  - an archive
  lexicon: LSJ
  rationale: The direct and standard sense is 'library' or book collection. 'Library'
    is transparent and accurate in context.
- source_word: ἐπισυνήγαγεν
  chosen: he gathered together
  alternatives:
  - he collected
  - he assembled
  lexicon: LSJ
  rationale: The verb emphasizes collecting into one place. 'Gathered together' preserves
    that force.
- source_word: τὰ περὶ τῶν βασιλέων καὶ προφητῶν βιβλία
  chosen: the books about the kings and prophets
  alternatives:
  - the books concerning kings and prophets
  - the books of the kings and prophets
  lexicon: LSJ
  rationale: The preposition περὶ most straightforwardly means 'about/concerning.'
    This likely refers to books dealing with kings and prophets, not necessarily authored
    by them.
- source_word: τὰ τοῦ Δαυείδ
  chosen: the writings of David
  alternatives:
  - the things of David
  - the books of David
  - David's works
  lexicon: LSJ
  rationale: The elliptical phrase refers to Davidic writings, likely psalms or compositions
    associated with David. 'The writings of David' makes the ellipsis intelligible
    in English without over-specifying.
- source_word: ἐπιστολὰς βασιλέων
  chosen: letters of kings
  alternatives:
  - royal letters
  - letters from kings
  lexicon: LSJ
  rationale: A straightforward genitive. 'Letters of kings' is slightly more formal
    and keeps close to the Greek.
- source_word: περὶ ἀναθεμάτων
  chosen: concerning votive offerings
  alternatives:
  - concerning dedicated gifts
  - concerning offerings set apart
  - concerning anathemas
  lexicon: LSJ
  rationale: In this historical-temple context, ἀναθέματα refers to things dedicated
    to God, especially votive gifts, not later ecclesiastical 'anathemas.' 'Votive
    offerings' communicates the cultic sense clearly.
