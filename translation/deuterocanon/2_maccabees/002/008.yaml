lexical_decisions:
- source_word: κατὰ πάντα
  chosen: in every way
  alternatives:
  - altogether
  - in all things
  - completely
  lexicon: LSJ
  rationale: The phrase intensifies the blessing formula. 'In every way' preserves
    the comprehensive sense in idiomatic modern English without overcommitting to
    a more adverbial 'completely.'
- source_word: εὐλογητὸς
  chosen: Blessed
  alternatives:
  - praised
  - worthy of blessing
  lexicon: LSJ
  rationale: A standard predicate adjective in doxological language. 'Blessed' preserves
    the liturgical and theological register better than 'praised,' which shifts from
    state to action.
- source_word: ὁ θεός
  chosen: God
  lexicon: LSJ
  rationale: Straightforward rendering of the nominative subject with article; English
    idiom omits the article in this construction.
- source_word: ἔδωκεν
  chosen: gave over
  alternatives:
  - gave
  - handed over
  - delivered
  lexicon: LSJ
  rationale: The direct object is personal ('those who acted wickedly'), so bare 'gave'
    is too abrupt in English. 'Gave over' captures the sense of handing persons over,
    while remaining close to the Greek.
- source_word: τοὺς ἀσεβήσαντας
  chosen: those who acted wickedly
  alternatives:
  - the ungodly ones
  - those who were impious
  - those who committed sacrilege
  lexicon: LSJ
  rationale: The aorist participle from ἀσεβέω denotes impious or wicked conduct.
    'Those who acted wickedly' is readable and preserves the verbal force better than
    the more static 'the ungodly.'
