translation:
  text: Plant your people in your holy place, just as Moses said.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The supplied Greek source for this verse appears to mismatch the expected
      context of 2 Maccabees 2:20; the translation therefore follows the extant Zone
      1 wording directly rather than a reconstructed reading.
    reason: textual_variant
  - marker: b
    text: Or 'Establish your people in your holy place.' The Greek verb carries a
      planting metaphor that can also imply firm establishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταφύτευσον
  chosen: Plant
  alternatives:
  - Establish
  - Settle
  lexicon: LSJ
  rationale: Aorist imperative of καταφυτεύω, literally 'plant in' or 'plant firmly.'
    'Plant' preserves the metaphor and imperative force better than a flattened 'establish'
    or 'settle.'
- source_word: τὸν λαόν σου
  chosen: your people
  alternatives:
  - your nation
  lexicon: LSJ
  rationale: λαός commonly denotes a people, often in covenantal or collective sense.
    'Your people' is the most natural and contextually fitting rendering.
- source_word: εἰς τὸν τόπον τὸν ἅγιόν σου
  chosen: in your holy place
  alternatives:
  - into your holy place
  - in the place holy to you
  - in your holy land
  lexicon: LSJ
  rationale: τόπος is 'place,' and ἅγιος modifies it as 'holy.' 'In your holy place'
    is straightforward and preserves the sanctified-location sense. 'Land' would overinterpret
    τόπος.
- source_word: καθὼς εἶπεν
  chosen: just as ... said
  alternatives:
  - as ... spoke
  - as ... declared
  lexicon: LSJ
  rationale: Simple comparative conjunction plus aorist of λέγω. 'Just as ... said'
    is idiomatic modern English and adequately formal.
- source_word: Μωσῆς
  chosen: Moses
  lexicon: LSJ
  rationale: Standard English transliteration of the proper name.
