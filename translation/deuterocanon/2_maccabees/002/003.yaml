translation:
  text: For he himself drove out those arrayed in battle in the holy city into Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek παρατασσομένους is a military term, literally referring to those arranged
      or drawn up for battle; 'those arrayed for battle' is another possible rendering.
    reason: lexical_alternative
  - marker: b
    text: The source text here is difficult in context and may reflect a textual or
      transmission problem; this translation stays close to the extant Greek wording.
    reason: textual_variant
lexical_decisions:
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  lexicon: LSJ
  rationale: The pronoun is emphatic in position and form; 'he himself' preserves
    the emphasis rather than leaving it implicit.
- source_word: γὰρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: LSJ
  rationale: This straightforwardly introduces an explanation or supporting statement;
    'for' best preserves the connective force.
- source_word: ἐξέβρασεν
  chosen: drove out
  alternatives:
  - expelled
  - cast out
  lexicon: LSJ
  rationale: The verb conveys forceful expulsion. 'Drove out' is vivid and natural
    English without overinterpreting the exact manner.
- source_word: τοὺς παρατασσομένους
  chosen: those who were drawn up in battle
  alternatives:
  - those arrayed for battle
  - those being deployed
  - the combatants
  lexicon: LSJ
  rationale: The participle from παρατάσσω commonly refers to arranging troops in
    battle order. 'Drawn up in battle' preserves the military sense more clearly than
    a generic 'opponents.'
- source_word: ἐν τῇ ἁγίᾳ πόλει
  chosen: in the holy city
  alternatives:
  - within the holy city
  lexicon: LSJ
  rationale: A direct rendering is best. The phrase likely refers to Jerusalem, but
    the text itself uses the descriptive title rather than the proper name.
- source_word: εἰς τὴν Περσίδα
  chosen: into Persia
  alternatives:
  - to Persia
  - into the Persian land
  lexicon: LSJ
  rationale: The preposition εἰς naturally points to movement into a region. 'Into
    Persia' is slightly more literal than 'to Persia' while remaining idiomatic.
