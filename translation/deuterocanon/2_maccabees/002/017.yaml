translation:
  text: Accept the sacrifice for all your people Israel, and preserve your portion
    and sanctify it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Receive the offering on behalf of all your people Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Your portion'' likely refers to Israel as the people belonging to God;
      alternatively, ''your inheritance.'''
    reason: alternative_reading
lexical_decisions:
- source_word: πρόσδεξαι
  chosen: Accept
  alternatives:
  - Receive
  - Welcome
  lexicon: LSJ
  rationale: Aorist middle imperative of προσδέχομαι, here in prayer language asking
    God to receive favorably an offering. 'Accept' is natural modern English and preserves
    the cultic sense better than the more generic 'receive'.
- source_word: θυσίαν
  chosen: the sacrifice
  alternatives:
  - the offering
  lexicon: LSJ
  rationale: θυσία commonly denotes a sacrificial offering. 'Sacrifice' keeps the
    cultic specificity of the Greek.
- source_word: ὑπὲρ παντὸς τοῦ λαοῦ σου Ἰσραήλ
  chosen: for all your people Israel
  alternatives:
  - on behalf of all your people Israel
  - for your whole people Israel
  lexicon: LSJ
  rationale: ὑπέρ with the genitive here expresses representation/benefit. 'For all
    your people Israel' is concise and faithful; 'all' reflects παντός in the collective
    sense.
- source_word: διαφύλαξον
  chosen: preserve
  alternatives:
  - guard
  - keep safe
  lexicon: LSJ
  rationale: The verb means to preserve or keep safe. 'Preserve' fits a prayer addressed
    to God and pairs well with the following object.
- source_word: τὴν μερίδα σου
  chosen: your portion
  alternatives:
  - your inheritance
  - your allotted share
  lexicon: LSJ
  rationale: μερίς/μερίδα literally means a portion or share. In biblical usage it
    can carry covenantal overtones for Israel as God's allotted people, but 'portion'
    best preserves the metaphor without over-interpreting.
- source_word: καθαγίασον
  chosen: sanctify it
  alternatives:
  - make it holy
  - consecrate it
  lexicon: LSJ
  rationale: The verb means to make holy or consecrate. 'Sanctify it' is concise and
    retains the sacred register. The object 'it' is supplied in English from the preceding
    singular object 'your portion'.
