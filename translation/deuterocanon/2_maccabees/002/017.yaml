reference: 2 Maccabees 2:17
source:
  edition: lxx-swete-1909
  text: πρόσδεξαι τὴν θυσίαν ὑπὲρ παντὸς τοῦ λαοῦ σου Ἰσραήλ, καὶ διαφύλαξον τὴν μερίδα
    σου καὶ καθαγίασον.
  language: Greek
