theological_decisions:
- issue: Referent of 'your portion'
  chosen_reading: Retain the metaphor 'your portion' for Israel rather than interpret
    it explicitly as 'your inheritance' or 'your people.'
  alternative_readings:
  - your inheritance
  - your allotted people
  rationale: The Greek leaves the metaphor intact. Because the preceding phrase already
    names Israel as God's people, preserving 'portion' avoids importing a fuller theological
    interpretation into the main text while still allowing readers to hear covenantal
    resonance.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
