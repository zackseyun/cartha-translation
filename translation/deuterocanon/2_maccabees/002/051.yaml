  - 733
  validation: no_reference
translation:
  text: For, seeing the flood of numbers and the difficulty for those who wish to
    enter into the narratives of the history because of the abundance of material,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mass of numbers'; the Greek uses a vivid metaphor for overwhelming
      quantity.
    reason: lexical_alternative
  - marker: b
    text: The rare verb rendered 'enter into' can also suggest becoming involved in
      or working one's way through the historical narratives.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνορῶντες
  chosen: seeing
  alternatives:
  - considering
  - observing
  - taking into view
  lexicon: LSJ
  rationale: The participle introduces the reason for the author's abridging work.
    'Seeing' is concise and natural in English while preserving the causal sense ('for,
    seeing...').
- source_word: χῦμα
  chosen: flood
  alternatives:
  - mass
  - heap
  - torrent
  lexicon: LSJ
  rationale: The noun is metaphorical, conveying an overwhelming quantity. 'Flood'
    preserves the vivid image better than the flatter 'mass' or 'heap'.
- source_word: ἀριθμῶν
  chosen: numbers
  alternatives:
  - figures
  - details
  lexicon: LSJ
  rationale: The plain sense is 'numbers.' In context it likely refers to the sheer
    quantity or multiplicity of items/details, but the Greek word itself is best kept
    as 'numbers' rather than interpreted more freely.
- source_word: οὖσαν δυσχέρειαν
  chosen: the difficulty that faces
  alternatives:
  - the existing difficulty
  - the hardship
  - the trouble
  lexicon: LSJ
  rationale: This phrase denotes a real present difficulty. 'That faces' makes the
    idiom natural in English while preserving the sense of an existing obstacle.
- source_word: τοῖς θέλουσιν εἰσκυκλεῖσθαι
  chosen: those who wish to enter into
  alternatives:
  - those wanting to involve themselves in
  - those wishing to be drawn into
  - those desiring to go through
  lexicon: LSJ
  rationale: The rare verb suggests entering into or becoming involved in something.
    'Enter into' fits the metaphor of engaging the historical narratives without over-paraphrasing.
- source_word: τοῖς τῆς ἱστορίας διηγήμασιν
  chosen: the narratives of the history
  alternatives:
  - the accounts of the history
  - the historical narratives
  - the story's accounts
  lexicon: LSJ
  rationale: The genitive and dative together point to the narrated accounts that
    make up the history. 'Narratives of the history' stays close to the Greek structure,
    though somewhat idiomatic English could also be 'historical narratives.'
- source_word: διὰ τὸ πλῆθος τῆς ὕλης
  chosen: because of the abundance of material
  alternatives:
  - because of the great amount of subject matter
  - because of the mass of material
  lexicon: LSJ
  rationale: ὕλη here refers to subject matter or material, not literal timber. 'Abundance
    of material' is clear modern English and matches the explanatory force of the
    phrase.
