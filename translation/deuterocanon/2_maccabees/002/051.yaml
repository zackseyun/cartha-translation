id: 2MA.2.51
reference: 2 Maccabees 2:51
source:
  edition: lxx-swete-1909
  text: συνορῶντες γὰρ τὸ χῦμα τῶν ἀριθμῶν, καὶ τὴν οὖσαν δυσχέρειαν τοῖς θέλουσιν
    εἰσκυκλεῖσθαι τοῖς τῆς ἱστορίας διηγήμασιν διὰ τὸ πλῆθος τῆς ὕλης,
  language: Greek
  pages:
