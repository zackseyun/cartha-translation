id: 2MA.2.43
reference: 2 Maccabees 2:43
source:
  edition: lxx-swete-1909
  text: Μέλλοντες οὖν ἄγειν τὸν καθαρισμὸν ἐγράψαμεν ὑμῖν. καλῶς οὖν ποιήσετε ἄγειν
    τὰς ἡμέρας.
  language: Greek
  pages:
  - 685
  - 686
  - 687
  - 688
  - 689
  - 690
  - 691
  - 692
  - 693
  - 732
  - 733
  validation: no_reference
translation:
  text: Since we are about to celebrate the purification, we have written to you.
    Therefore you will do well to observe the days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'keep the days' or 'celebrate the days.' The same Greek verb is used
      earlier in the verse for celebrating 'the purification.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μέλλοντες
  chosen: Since we are about to
  alternatives:
  - being about to
  - intending to
  lexicon: LSJ
  rationale: The participle with οὖν introduces the occasion for the letter. 'Since
    we are about to' gives natural English while preserving the prospective sense
    better than a bare 'intending.'
- source_word: ἄγειν
  chosen: celebrate / observe
  alternatives:
  - keep
  - hold
  lexicon: LSJ
  rationale: 'The verb appears twice in the verse, first with τὸν καθαρισμόν and then
    with τὰς ἡμέρας. In festival context it means to keep or celebrate a feast/day.
    English varies slightly by object for readability: one ''celebrates'' a purification
    festival and ''observes'' days, while preserving the same underlying idea.'
- source_word: τὸν καθαρισμόν
  chosen: the purification
  alternatives:
  - the cleansing
  - the festival of purification
  lexicon: LSJ
  rationale: The noun literally means 'purification/cleansing.' With the article and
    festival context in 2 Maccabees, it refers to the commemorative observance of
    the temple's purification. 'The purification' keeps the source wording while allowing
    readers to infer the feast context from the surrounding clause.
- source_word: ἐγράψαμεν
  chosen: we have written
  alternatives:
  - we wrote
  lexicon: LSJ
  rationale: Aorist epistolary usage can be rendered as simple past, but 'we have
    written' works idiomatically in English for a present letter and preserves the
    immediacy of the communication.
- source_word: καλῶς ... ποιήσετε
  chosen: you will do well
  alternatives:
  - you will do rightly
  - it will be good if you do
  lexicon: LSJ
  rationale: This is a common idiom of commendation or exhortation. 'You will do well'
    is concise, natural, and faithful.
- source_word: τὰς ἡμέρας
  chosen: the days
  alternatives:
  - these days
  - the festival days
  lexicon: LSJ
  rationale: The Greek has simply 'the days.' In context these are the commemorative
    festival days just mentioned. The main text preserves the literal phrase without
    adding 'festival,' which would be interpretive.
