id: 2MA.2.59
reference: 2 Maccabees 2:59
source:
  edition: lxx-swete-1909
  text: Ἐντεῦθεν οὖν ἀρξώμεθα τῆς διηγήσεως, τοῖς προειρημένοις τοσοῦτον ἐπιζεύξαντες·
    εὔηθες γὰρ τὸ μὲν πρὸ τῆς ἱστορίας πλεονάζειν, τὴν δὲ ἱστορίαν ἐπιτέμνειν.
  language: Greek
  pages:
