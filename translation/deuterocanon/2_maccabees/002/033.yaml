id: 2MA.2.33
reference: 2 Maccabees 2:33
source:
  edition: lxx-swete-1909
  text: καὶ προσελθόντες τινὲς τῶν συνακολουθούντων ὥστε ἐπισημήνασθαι τὴν ὁδόν, καὶ
    οὐκ ἠδυνήθησαν εὑρεῖν.
  language: Greek
  pages:
  - 685
  - 686
  - 687
  - 688
  - 689
  - 690
