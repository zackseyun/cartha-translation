translation:
  text: But one should allow the one producing the epitome to aim at brevity of expression
    and to forgo the elaborate treatment of the subject matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one making the abridgment'; the Greek term here can elsewhere mean
      'translation,' but in this context it refers to the compiler's epitome of a
      larger work.
    reason: lexical_alternative
lexical_decisions:
- source_word: σύντομον
  chosen: brevity
  alternatives:
  - conciseness
  - a concise style
  lexicon: LSJ
  rationale: The adjective used substantivally denotes shortness or conciseness. 'Brevity'
    is natural English and fits the contrast with elaborate treatment.
- source_word: τῆς λέξεως
  chosen: of expression
  alternatives:
  - of style
  - of wording
  - of diction
  lexicon: LSJ
  rationale: λέξις here concerns manner of verbal expression rather than a single
    'word.' 'Expression' best captures literary style in accessible English.
- source_word: μεταδιώκειν
  chosen: to aim at
  alternatives:
  - to pursue
  - to seek after
  lexicon: LSJ
  rationale: The infinitive conveys pursuing or striving for brevity. 'Aim at' is
    idiomatic in English while preserving the purposive sense.
- source_word: ἐξεργαστικόν
  chosen: elaborate treatment
  alternatives:
  - thorough working out
  - detailed elaboration
  lexicon: LSJ
  rationale: The term denotes careful, worked-out elaboration. 'Elaborate treatment'
    communicates the literary sense without sounding overly technical.
- source_word: τῆς πραγματίας
  chosen: of the subject matter
  alternatives:
  - of the narrative
  - of the undertaking
  - of the matter at hand
  lexicon: LSJ
  rationale: πραγματεία refers to the matter being treated, here the work/content
    under discussion. 'Subject matter' is broad enough to fit the context of literary
    abridgment.
- source_word: παραιτεῖσθαι
  chosen: to forgo
  alternatives:
  - to decline
  - to omit
  - to dispense with
  lexicon: LSJ
  rationale: The verb means to refuse or waive. In context the epitomizer is excused
    from full elaboration, so 'forgo' captures voluntary abstention well.
- source_word: τῷ τὴν μετάφρασιν ποιουμένῳ
  chosen: the one producing the epitome
  alternatives:
  - the one making the abridgment
  - the one preparing the summary
  lexicon: LSJ
  rationale: Although μετάφρασις often means translation in later usage, in this context
    of 2 Maccabees' preface it refers to the author's abridgment/epitome of a larger
    work. 'Producing the epitome' fits the immediate literary context and avoids the
    misleading sense 'translation.'
- source_word: συγχωρητέον
  chosen: one should allow
  alternatives:
  - it must be conceded
  - it should be granted
  - allowance should be made
  lexicon: LSJ
  rationale: This verbal adjective expresses what ought to be conceded or permitted.
    'One should allow' is clear modern English and preserves the impersonal exhortative
    force.
