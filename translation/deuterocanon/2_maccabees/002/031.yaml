theological_decisions:
- issue: Meaning of μετάφρασις in context
  chosen_reading: epitome/abridgment rather than translation
  alternative_readings:
  - translation
  rationale: The broader prologue of 2 Maccabees describes an abridgment of Jason
    of Cyrene's five-volume work. Rendering μετάφρασις here as 'translation' would
    misrepresent the literary situation in this verse. The choice is contextual and
    literary rather than doctrinal.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
