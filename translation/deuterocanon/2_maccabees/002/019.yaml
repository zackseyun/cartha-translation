lexical_decisions:
- source_word: βάσανισον
  chosen: Punish
  alternatives:
  - torment
  - afflict
  - test
  lexicon: LSJ
  rationale: The aorist imperative calls for an appeal that God inflict punitive suffering/judgment.
    In this prayer context, 'punish' best conveys judicial force in natural English
    without over-specifying the manner as 'torment.'
- source_word: τοὺς καταδυναστεύοντας
  chosen: those who oppress
  alternatives:
  - those who tyrannize
  - those who dominate harshly
  lexicon: LSJ
  rationale: The participle denotes exercising oppressive power over others. 'Those
    who oppress' is idiomatic and preserves the ongoing abusive action.
- source_word: καὶ ἐξυβρίζοντας
  chosen: and insult
  alternatives:
  - and outrage
  - and treat with insolence
  - and abuse
  lexicon: LSJ
  rationale: The verb carries the sense of acting with insolence or abusive insult.
    'Insult' is concise and fits the paired participles, though the semantic range
    includes more violent outrage; that broader nuance is preserved in a footnote.
- source_word: ἐν ὑπερηφανίᾳ
  chosen: in arrogance
  alternatives:
  - in pride
  - with haughtiness
  lexicon: LSJ
  rationale: The phrase expresses the manner or attitude in which the oppression and
    insolence are carried out. 'In arrogance' is clear modern English and retains
    the moral weight of ὑπερηφανία.
