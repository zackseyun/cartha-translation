translation:
  text: Punish those who oppress and insult in arrogance;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and act outrageously' / 'and abuse with insolence'; the Greek can suggest
      more than verbal insult alone.
    reason: lexical_alternative
  - marker: b
