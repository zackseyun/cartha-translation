theological_decisions:
- issue: Cultic rendering of τὸ περὶ τῆς ἁμαρτίας
  chosen_reading: the sin offering
  alternative_readings:
  - the thing concerning sin
  - that which was for sin
  rationale: The phrase is a recognized sacrificial idiom in Greek biblical usage,
    so translating it as 'sin offering' communicates the intended cultic referent
    rather than leaving an opaque literalism. This is a lexical-theological decision
    because it concerns sacrificial terminology, but it is not a doctrinally contested
    term in the project table.
  doctrine_reference: Translation philosophy §§1, 5
