translation:
  text: And Moses said, “Because it was not eaten, the sin offering was consumed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the thing concerning sin.” The Greek expression is
      a standard biblical idiom for a sin offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τὸ μὴ βεβρῶσθαι
  chosen: Because it was not eaten
  alternatives:
  - Since it was not eaten
  - On account of its not being eaten
  lexicon: LSJ
  rationale: The articular infinitive with διά expresses cause. βεβρῶσθαι, perfect
    passive infinitive of βιβρώσκω, is naturally rendered 'to be eaten.' 'Because
    it was not eaten' is clear modern English while preserving the causal force.
- source_word: τὸ περὶ τῆς ἁμαρτίας
  chosen: the sin offering
  alternatives:
  - the thing concerning sin
  - that which was for sin
  lexicon: LSJ
  rationale: This sacrificial expression corresponds to the LXX idiom for a sin offering.
    A hyper-literal rendering would obscure the cultic sense in English. 'Sin offering'
    best captures the established sacrificial meaning without unnecessary paraphrase.
- source_word: ἀνηλώθη
  chosen: was consumed
  alternatives:
  - was used up
  - was spent
  - was destroyed
  lexicon: LSJ
  rationale: ἀναλίσκω in the passive commonly means 'to be consumed' or 'used up.'
    In this sacrificial context, 'was consumed' fits naturally and leaves open whether
    the consumption is by burning, matching the Greek's concise statement.
- source_word: καὶ εἶπεν Μωυσῆς
  chosen: And Moses said
  alternatives:
  - Then Moses said
  lexicon: LSJ
  rationale: A straightforward narrative introduction. 'And' preserves the simple
    connective καί without adding interpretive sequencing beyond the Greek.
