id: 2MA.2.49
reference: 2 Maccabees 2:49
source:
  edition: lxx-swete-1909
  text: καὶ τὸ περιβόητον καθʼ ὅλην τὴν οἰκουμένην ἱερὸν ἀνακομίσασθαι, καὶ τὴν πόλιν
    ἐλευθερῶσαι, καὶ τοὺς μέλλοντας καταλύεσθαι νόμους ἐπανορθῶσαι, τοῦ κυρίου μετὰ
    πάσης ἐπιεικείας ἐλεημονοῦντος αὐτοῖς,
  language: Greek
  pages:
  - 685
  - 686
  - 687
  - 688
  - 689
  - 690
  - 691
  - 692
  - 693
  - 732
  - 733
  validation: no_reference
translation:
  text: and to recover the sanctuary renowned throughout the whole inhabited world,
    and to free the city, and to restore the laws that were about to be abolished,
    since the Lord was showing them mercy with all forbearance,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole world'; Greek literally 'the whole inhabited world.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with all clemency' or 'with every kindness' for 'with all gentleness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβόητον
  chosen: renowned
  alternatives:
  - famous
  - celebrated
  - widely spoken of
  lexicon: LSJ
  rationale: The adjective denotes something much spoken of or famous. 'Renowned'
    fits natural English while preserving the elevated tone attached to the sanctuary.
- source_word: οἰκουμένην
  chosen: the whole inhabited world
  alternatives:
  - the whole world
  - the whole earth
  lexicon: LSJ
  rationale: Literally 'inhabited world.' In Hellenistic usage it can mean the known
    world. Retaining 'inhabited world' preserves the Greek expression without overstating
    a modern global sense.
- source_word: ἱερὸν
  chosen: sanctuary
  alternatives:
  - temple
  - holy place
  lexicon: LSJ
  rationale: Here the reference is to the Jerusalem temple complex in its sacred character.
    'Sanctuary' foregrounds the holy site itself and avoids over-specifying beyond
    the Greek noun.
- source_word: ἀνακομίσασθαι
  chosen: bring back
  alternatives:
  - recover
  - restore
  - bring up again
  lexicon: LSJ
  rationale: The middle infinitive conveys recovering or bringing back. 'Bring back'
    is idiomatic and suits the context of regaining the sanctuary.
- source_word: ἐλευθερῶσαι
  chosen: set ... free
  alternatives:
  - liberate
  - free
  lexicon: LSJ
  rationale: The verb means to free or liberate. 'Set the city free' is clear modern
    English and preserves the political sense.
- source_word: τοὺς μέλλοντας καταλύεσθαι νόμους
  chosen: the laws that were about to be abolished
  alternatives:
  - the laws that were about to be overthrown
  - the laws destined to be annulled
  lexicon: LSJ
  rationale: μέλλοντας with the passive infinitive indicates impending action; καταλύω
    here carries the sense of abolishing or dismantling. This rendering preserves
    both the imminence and the threat to the laws.
- source_word: ἐπανορθῶσαι
  chosen: restore
  alternatives:
  - set right
  - re-establish
  lexicon: LSJ
  rationale: The verb means to set upright again or restore. 'Restore' is concise
    and fits legal/institutional context.
- source_word: τοῦ κυρίου
  chosen: the Lord
  alternatives:
  - the master
  lexicon: LSJ
  rationale: Per project doctrine, κύριος defaults to 'Lord.' In this context it refers
    to God acting mercifully toward the people.
- source_word: μετὰ πάσης ἐπιεικείας
  chosen: with all gentleness
  alternatives:
  - with all fairness
  - with every kindness
  - with all clemency
  lexicon: LSJ
  rationale: ἐπιείκεια can denote gentleness, clemency, or forbearance. 'With all
    gentleness' best matches the merciful divine action in accessible English, though
    'clemency' is a viable nuance.
- source_word: ἐλεημονοῦντος αὐτοῖς
  chosen: was showing them mercy
  alternatives:
  - was having mercy on them
  - was acting mercifully toward them
  lexicon: LSJ
  rationale: The participle expresses ongoing merciful action by the Lord toward them.
    'Was showing them mercy' is natural English and preserves the durative sense.
