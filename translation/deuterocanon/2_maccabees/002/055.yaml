translation:
  text: while leaving the detailed treatment of each matter to the author, and taking
    pains to follow the outlines of the epitome.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to investigate each point accurately ... to proceed along the sketch
      of the epitome.' The Greek uses literary terms that describe the difference
      between a full work and its abridgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: διακριβοῦν
  chosen: the detailed treatment
  alternatives:
  - to investigate accurately
  - to set forth precisely
  - to examine in detail
  lexicon: LSJ
  rationale: The infinitive with article, τὸ ... διακριβοῦν, functions substantivally.
    In context it refers not merely to investigating but to handling each item with
    precision in a full-scale work. 'Detailed treatment' captures both the precision
    and the literary task better than a narrower 'investigation.'
- source_word: περὶ ἑκάστων
  chosen: of each matter
  alternatives:
  - concerning each thing
  - about each point
  - regarding each item
  lexicon: LSJ
  rationale: ἑκάστων is broad and contextually refers to the individual matters in
    the larger history. 'Each matter' is natural English and preserves the distributive
    sense.
- source_word: τῷ συγγραφεῖ
  chosen: to the author
  alternatives:
  - to the writer
  - to the historian
  lexicon: LSJ
  rationale: συγγραφεύς denotes the composer of the larger source work. 'Author' is
    the most natural modern equivalent and fits the literary contrast with the epitomizer.
- source_word: παραχωρήσαντες
  chosen: leaving
  alternatives:
  - yielding
  - conceding
  - entrusting
  lexicon: LSJ
  rationale: The participle indicates ceding that fuller task to another party. 'Leaving'
    is idiomatic in English and fits the construction 'leaving ... to the author.'
- source_word: ἐπιπορεύεσθαι
  chosen: to follow
  alternatives:
  - to proceed along
  - to go over
  - to pursue
  lexicon: LSJ
  rationale: With τοῖς ὑπογραμμοῖς, the verb conveys moving along or following a set
    of outlines. 'Follow' is the clearest idiomatic rendering in English.
- source_word: ὑπογραμμοῖς
  chosen: the outlines
  alternatives:
  - the sketch
  - the summary lines
  - the model
  lexicon: LSJ
  rationale: In this literary context, ὑπογραμμοί are guiding lines or an outline/sketch.
    Because ἐπιτομή already means 'epitome,' rendering this as 'outlines' avoids awkward
    repetition while preserving the metaphor of a condensed framework.
- source_word: ἐπιτομῆς
  chosen: of the epitome
  alternatives:
  - of the abridgment
  - of the summary
  lexicon: LSJ
  rationale: ἐπιτομή is a technical term for an abridgment or epitome. 'Epitome' preserves
    the literary self-description of the work and matches the surrounding context
    of summarizing a larger history.
- source_word: σπουδάζοντες
  chosen: taking pains
  alternatives:
  - being eager
  - making it our aim
  - striving
  lexicon: LSJ
  rationale: The participle expresses earnest effort rather than mere desire. 'Taking
    pains' conveys careful diligence in producing the abridged work.
