id: 2MA.2.55
reference: 2 Maccabees 2:55
source:
  edition: lxx-swete-1909
  text: τὸ μὲν διακριβοῦν περὶ ἑκάστων τῷ συγγραφεῖ παραχωρήσαντες, τὸ δὲ ἐπιπορεύεσθαι
    τοῖς ὑπογραμμοῖς τῆς ἐπιτομῆς σπουδάζοντες.
  language: Greek
