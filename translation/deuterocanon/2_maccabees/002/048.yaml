id: 2MA.2.48
reference: 2 Maccabees 2:48
source:
  edition: lxx-swete-1909
  text: καὶ τὰς ἐξ οὐρανοῦ γενομένας ἐπιφανείας τοῖς ὑπὲρ τοῦ Ἰουδαισμοῦ φιλοτίμως
    ἀνδραγαθήσασιν, ὡς τὴν ὅλην χώραν ὀλίγους ὄντας λεηλατεῖν, καὶ τὰ βάρβαρα πλήθη
    διώκειν,
  language: Greek
  pages:
  - 685
  - 686
  - 687
  - 688
  - 689
  - 690
  - 691
  - 692
  - 693
  - 732
  - 733
  validation: no_reference
translation:
  text: and the appearances from heaven that came to those who fought nobly for Judaism,
    so that, though they were few, they plundered the whole country and drove off
    the barbarian hordes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'manifestations from heaven' or 'heavenly epiphanies.'
    reason: lexical_alternative
  - marker: b
    text: '''Judaism'' here refers to the Jewish religion and way of life defended
      against foreign pressure.'
    reason: cultural_note
  - marker: c
    text: Greek 'the barbarian hordes' reflects the source text's own ethnocultural
      labeling; alternatively, 'the foreign multitudes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιφανείας
  chosen: appearances
  alternatives:
  - manifestations
  - epiphanies
  lexicon: LSJ
  rationale: The noun denotes visible manifestations or appearances. 'Appearances'
    is the most transparent English here and avoids importing later technical or theological
    overtones that 'epiphanies' may carry, while still preserving the sense of heavenly
    intervention.
- source_word: τὰς ἐξ οὐρανοῦ γενομένας
  chosen: from heaven that came
  alternatives:
  - that occurred from heaven
  - heaven-sent
  lexicon: LSJ
  rationale: The participial phrase modifies ἐπιφανείας and indicates origin and occurrence.
    'From heaven that came' keeps both the heavenly source and the eventive force
    of γενομένας without overcompressing the phrase.
- source_word: τοῖς ... ἀνδραγαθήσασιν
  chosen: to those who fought bravely
  alternatives:
  - to those who acted courageously
  - to those who showed valor
  lexicon: LSJ
  rationale: ἀνδραγαθέω refers to acting with courage or valor, especially in battle.
    Because the surrounding context is military, 'fought bravely' makes the implied
    martial setting explicit in natural English.
- source_word: φιλοτίμως
  chosen: with zeal
  alternatives:
  - eagerly
  - ambitiously
  - with devotion
  lexicon: LSJ
  rationale: The adverb conveys earnest zeal or honorable eagerness. 'With zeal' best
    fits the context of committed struggle for a cause and reads naturally with 'fought
    bravely.'
- source_word: ὑπὲρ τοῦ Ἰουδαισμοῦ
  chosen: for Judaism
  alternatives:
  - for the Jewish way of life
  - for the Judean religion
  lexicon: LSJ
  rationale: Ἰουδαϊσμός in 2 Maccabees refers to the Jewish religion and way of life
    over against Hellenizing pressure. 'Judaism' is the most direct and established
    rendering, while the alternatives are interpretive expansions.
- source_word: ὡς
  chosen: so that
  alternatives:
  - with the result that
  - how
  lexicon: LSJ
  rationale: Here ὡς introduces the result or effect of the heavenly appearances.
    'So that' captures the consequential sense in idiomatic English.
- source_word: τὴν ὅλην χώραν
  chosen: the whole country
  alternatives:
  - the entire land
  - the whole region
  lexicon: LSJ
  rationale: χώρα can mean land, country, or region. 'The whole country' best conveys
    territorial scope in a military-political context.
- source_word: ὀλίγους ὄντας
  chosen: though they were few
  alternatives:
  - being few
  - although they were few in number
  lexicon: LSJ
  rationale: The participial phrase marks concession relative to the surprising military
    success. 'Though they were few' expresses that concessive force clearly.
- source_word: λεηλατεῖν
  chosen: they plundered
  alternatives:
  - they ravaged
  - they despoiled
  lexicon: LSJ
  rationale: The verb denotes taking spoil or plundering. 'Plundered' is direct and
    preserves the military sense without softening it.
- source_word: τὰ βάρβαρα πλήθη
  chosen: the barbarian hordes
  alternatives:
  - the foreign multitudes
  - the barbarian masses
  lexicon: LSJ
  rationale: βάρβαρα is an ethnocultural label from the Greek text, and πλήθη denotes
    large crowds or masses. 'Barbarian hordes' preserves the source's polemical force
    and military tone better than a neutralized rendering.
- source_word: διώκειν
  chosen: drove off
  alternatives:
  - pursued
  - routed
  lexicon: LSJ
  rationale: While the verb often means 'pursue,' in this result clause the sense
    is that the enemy was chased away. 'Drove off' communicates the practical military
    outcome in clear English.
