translation:
  text: Therefore, if you have need, send those who will carry them to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text reads with a duplicated 'if' (ἐὰν ... ἐὰν), likely a textual
      irregularity or dittography; the translation renders the intended sense.
    reason: textual_variant
lexical_decisions:
- source_word: ἐὰν ... χρείαν ἔχητε
  chosen: if you have need
  alternatives:
  - if you need them
  - if there is need
  lexicon: LSJ
  rationale: χρείαν ἔχειν is an idiom meaning 'to have need' or 'to need.' The more
    literal 'have need' preserves the Greek construction while remaining natural English.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: LSJ
  rationale: οὖν marks an inferential or transitional conclusion from the preceding
    statement. 'Therefore' best preserves that connective force in a formal letter
    context.
- source_word: τοὺς ἀποκομιούντας
  chosen: those who will carry them
  alternatives:
  - those bringing them
  - the ones conveying them
  lexicon: LSJ
  rationale: The participle from ἀποκομίζω denotes carrying or conveying something
    from one place to another. Because the object is implicit in Greek but required
    in English, 'them' is supplied from context, referring to the writings just mentioned
    in the surrounding verses.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: LSJ
  rationale: The dative here is naturally rendered 'to you' with a verb of carrying/conveying.
- source_word: ἀποστείλατε
  chosen: send
  alternatives:
  - dispatch
  lexicon: LSJ
  rationale: Aorist imperative calling for a straightforward action. 'Send' is clear
    modern English and fits the epistolary request.
- source_word: ἐὰν οὖν ἐὰν
  chosen: therefore, if
  alternatives:
  - if, then
  - so if
  lexicon: LSJ
  rationale: The transmitted text contains a duplicated ἐὰν. Since the sense is still
    clear, the translation reflects a single conditional 'if' in idiomatic English
    while preserving the connective force of οὖν. The duplication is best treated
    as a textual irregularity rather than reproduced woodenly.
