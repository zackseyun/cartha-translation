theological_decisions:
- issue: Meaning of εὐχαριστία
  chosen_reading: gratitude/thanks
  alternative_readings:
  - Eucharist
  rationale: In this Hellenistic Jewish context the noun carries its ordinary sense
    of gratitude or thanksgiving from many readers, not a later sacramental meaning.
    Rendering it as 'Eucharist' would import anachronistic Christian theology not
    present in the text.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
