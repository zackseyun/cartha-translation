id: 2MA.2.28
reference: 2 Maccabees 2:28
source:
  edition: lxx-swete-1909
  text: τὸ μὲν διακριβοῦν περὶ ἑκάστων τῷ συγγραφεῖ παραχωρήσαντες, τὸ δὲ ἐπιπορεύεσθαι
    τοῖς ὑπογραμμοῖς τῆς ἐπιτομῆς ἀτονοῦντες.
