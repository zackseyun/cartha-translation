translation:
  text: while leaving the exact treatment of each matter to the author, and taking
    care to follow the outlines of the epitome.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while exerting ourselves to proceed by the sketch-lines of the epitome.'
      The Greek is compressed, and ἀτονοῦντες emphasizes effort or strain in carrying
      out the work of abridgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: διακριβοῦν
  chosen: the exact treatment
  alternatives:
  - to investigate accurately
  - to set out in detail
  - to determine precisely
  lexicon: LSJ
  rationale: 'The infinitive with τὸ άρθρον functions substantivally: ''the exact
    handling/exposition.'' In context the writer contrasts the fuller author''s detailed
    work with the epitomizer''s more limited task. ''Exact treatment'' captures both
    precision and literary handling better than a narrowly investigative gloss.'
- source_word: περὶ ἑκάστων
  chosen: of each matter
  alternatives:
  - concerning each thing
  - about every point
  lexicon: LSJ
  rationale: The phrase is distributive and refers to the individual items/details
    in the history. 'Each matter' is idiomatic English and preserves the scope without
    sounding wooden.
- source_word: τῷ συγγραφεῖ παραχωρήσαντες
  chosen: leaving ... to the author
  alternatives:
  - yielding ... to the writer
  - granting ... to the historian
  lexicon: LSJ
  rationale: παραχωρέω here means to concede or leave something to another's province.
    'Author' is the most natural rendering for συγγραφεύς in this literary context.
- source_word: ἐπιπορεύεσθαι
  chosen: to follow
  alternatives:
  - to proceed along
  - to go after
  - to pursue
  lexicon: LSJ
  rationale: With τοῖς ὑπογραμμοῖς, the sense is metaphorical movement along a guide
    or outline. 'Follow' communicates the idiom clearly in English.
- source_word: ὑπογραμμοῖς
  chosen: the outlines
  alternatives:
  - the sketch-lines
  - the model
  - the pattern
  lexicon: LSJ
  rationale: ὑπογραμμός can denote an outline, sketch, or pattern to be traced. In
    an epitomizing context, 'outlines' best fits the idea of following the main lines
    rather than reproducing every detail.
- source_word: ἐπιτομῆς
  chosen: of the epitome
  alternatives:
  - of the abridgment
  - of the summary
  lexicon: LSJ
  rationale: The book's prologue explicitly presents itself as an epitome of a larger
    work. 'Epitome' preserves the technical literary term and matches the self-description
    of the work.
- source_word: ἀτονοῦντες
  chosen: taking pains
  alternatives:
  - laboring
  - striving diligently
  - exerting ourselves
  lexicon: LSJ
  rationale: Literally the participle can suggest exertion or strain. In context it
    describes the effort involved in keeping to the concise form of an epitome. 'Taking
    pains' is idiomatic and conveys deliberate effort without awkward literalism.
