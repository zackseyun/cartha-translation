theological_decisions:
- issue: Rendering of δουλεύοντας in a context of subjugation among foreign nations
  chosen_reading: those who are enslaved
  alternative_readings:
  - those serving
  - those in bondage
  rationale: The context is diaspora oppression, not voluntary service. Following
    DOCTRINE.md, doul- language should be rendered with 'slave/enslaved' where bonded
    status is salient.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος *doulos*; Translation
    philosophy §1'
- issue: Whether to render διασπορά idiomatically or formally
  chosen_reading: our dispersion
  alternative_readings:
  - our scattered people
  - our exiles
  rationale: The Greek names the dispersed community by the abstract noun. The formal
    rendering keeps the source texture and allows readers to see the diaspora motif
    without importing a narrower political sense like 'exiles.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §5'
