translation:
  text: Gather our dispersion, free those who are enslaved among the nations, look
    upon those who are despised and abhorred; and let the nations know that you are
    our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our scattered people.' The Greek literally says 'our dispersion,' using
      the abstract noun for the dispersed community.
    reason: lexical_alternative
  - marker: b
    text: Or 'have regard for' or 'show pity to.' The Greek asks God to turn his attention
      toward those who are despised and abhorred.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνάγαγε
  chosen: Gather
  alternatives:
  - Bring together
  - Assemble
  lexicon: LSJ
  rationale: Aorist imperative of ἐπισυνάγω, calling on God to collect scattered people.
    'Gather' is concise, natural English and preserves the prayerful imperative force.
- source_word: τὴν διασπορὰν ἡμῶν
  chosen: our dispersion
  alternatives:
  - our scattered people
  - our exiles
  lexicon: LSJ
  rationale: Formally the noun is 'dispersion/scattering.' Rendering it as 'our dispersion'
    preserves the concrete collective sense while staying close to the Greek. 'Our
    scattered people' is interpretive and smoother, but less transparent to the source
    wording.
- source_word: ἐλευθέρωσον
  chosen: free
  alternatives:
  - deliver
  - set free
  lexicon: LSJ
  rationale: The verb means to make free or release. 'Free' is direct and idiomatic;
    'deliver' is broader and could weaken the liberation sense.
- source_word: τοὺς δουλεύοντας
  chosen: those who are enslaved
  alternatives:
  - those serving
  - the slaves
  - those in bondage
  lexicon: LSJ
  rationale: From δουλεύω, 'to be a slave/serve as a slave.' In keeping with the project's
    guidance on doul- terms, the bonded condition is salient here, so 'those who are
    enslaved' best reflects the sense without awkwardness.
- source_word: ἐν τοῖς ἔθνεσιν
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: LSJ
  rationale: ἔθνη here refers to the surrounding peoples among whom Israel is scattered.
    'Among the nations' is the most natural and least theologically loaded rendering
    in this deuterocanonical context.
- source_word: τοὺς ἐξουθενημένους
  chosen: those who are despised
  alternatives:
  - those treated with contempt
  - the humiliated
  lexicon: LSJ
  rationale: Perfect/passive participial sense from ἐξουθενέω, denoting people regarded
    as nothing. 'Despised' captures the social contempt succinctly.
- source_word: καὶ βδελυκτοὺς
  chosen: and abhorred
  alternatives:
  - and detestable
  - and loathed
  lexicon: LSJ
  rationale: 'βδελυκτός denotes something or someone regarded with revulsion. ''Abhorred''
    fits the passive sense in context: people treated as objects of disgust.'
- source_word: ἔφιδε
  chosen: look upon
  alternatives:
  - have regard for
  - take notice of
  - show pity to
  lexicon: LSJ
  rationale: Imperative of ἐφοράω/ἐφοράω in this form, asking God to direct his attention
    toward them. 'Look upon' preserves the biblical-prayer register without over-interpreting
    it as explicit pity, though compassion is implied.
- source_word: γνώτωσαν
  chosen: let ... know
  alternatives:
  - may ... know
  - make ... know
  lexicon: LSJ
  rationale: 'Aorist imperative/third person jussive force: ''let them know.'' This
    preserves the petitionary tone.'
- source_word: ὅτι σὺ ὁ θεὸς ἡμῶν
  chosen: that you are our God
  alternatives:
  - that you are God for us
  - that you are the God of us
  lexicon: LSJ
  rationale: Straightforward covenantal confession. 'Our God' is the natural English
    equivalent and preserves the relational force.
