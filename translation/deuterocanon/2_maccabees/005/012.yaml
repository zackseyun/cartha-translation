translation:
  text: And he ordered the soldiers to cut down without mercy those they encountered,
    and to slaughter those who went up into the houses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who fell in their way.' The Greek participle can denote people
      encountered in the soldiers' path; the rendering avoids suggesting the victims
      initiated the attack.
    reason: lexical_alternative
  - marker: b
    text: Literally 'those going up into the houses,' likely reflecting ascent into
      houses or upper rooms by stairs.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκέλευσεν
  chosen: he ordered
  alternatives:
  - he commanded
  lexicon: BDAG
  rationale: The aorist of κελεύω denotes giving an order or command. 'Ordered' is
    natural modern English and preserves the force without sounding overly formal.
- source_word: κόπτειν
  chosen: to cut down
  alternatives:
  - to strike down
  - to kill
  lexicon: LSJ
  rationale: κόπτω literally means 'strike, cut.' In this violent military context
    it refers to lethal attack. 'Cut down' preserves the graphic force better than
    the flatter 'kill' while remaining idiomatic.
- source_word: ἀφειδῶς
  chosen: without mercy
  alternatives:
  - unsparingly
  - without sparing
  lexicon: LSJ
  rationale: The adverb conveys acting without sparing or pity. 'Without mercy' communicates
    the brutality clearly in contemporary English.
- source_word: τοὺς ἐμπίπτοντας
  chosen: those they encountered
  alternatives:
  - those who fell in their way
  - those who fell upon them
  lexicon: BDAG
  rationale: ἐμπίπτω can mean 'fall upon' or 'encounter.' Here, with soldiers ordered
    to kill indiscriminately in a city, the sense is those who came in their path
    or whom they met. 'Those they encountered' best fits the scene and avoids implying
    the victims were the aggressors.
- source_word: ἀναβαίνοντας
  chosen: who went up into
  alternatives:
  - who climbed into
  - who went up to
  lexicon: BDAG
  rationale: ἀναβαίνω is literally 'go up.' In relation to houses, it likely reflects
    ascending into upper parts or entering by going up steps. 'Went up into' keeps
    the spatial nuance better than simply 'entered'.
- source_word: κατασφάζειν
  chosen: to slaughter
  alternatives:
  - to butcher
  - to slay
  lexicon: LSJ
  rationale: The compound intensifies σφάζω and denotes brutal killing. 'Slaughter'
    conveys the severity and mass-violence sense without becoming colloquial.
- source_word: οἰκίαις
  chosen: the houses
  alternatives:
  - the homes
  lexicon: BDAG
  rationale: οἰκία means house or household. The physical setting is in view here,
    so 'houses' is preferable.
