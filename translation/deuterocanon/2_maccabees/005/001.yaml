translation:
  text: About that time Antiochus launched his second expedition into Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sent out his second campaign into Egypt.' The Greek verb can be rendered
      more literally as 'sent' or 'dispatched,' and ἔφοδος may mean 'attack,' 'campaign,'
      or 'expedition.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ τὸν καιρὸν τοῦτον
  chosen: About that time
  alternatives:
  - Around this time
  - Concerning this time
  lexicon: LSJ
  rationale: The idiom with περί + accusative of time is naturally temporal here,
    introducing the narrative setting. 'About that time' is idiomatic modern English
    and preserves the approximate temporal sense better than a more wooden 'concerning
    this time.'
- source_word: τὴν δευτέραν ἔφοδον
  chosen: his second expedition
  alternatives:
  - the second attack
  - the second campaign
  - the second invasion
  lexicon: LSJ
  rationale: ἔφοδος can denote an attack, onset, or expedition/campaign. In this historical
    context of Antiochus going into Egypt, 'expedition' best captures a military advance
    without overstating the single-moment sense of 'attack.' 'Second' is retained
    explicitly. The possessive 'his' is supplied in English because the expedition
    is Antiochus's action and English reads more naturally with it.
- source_word: ὁ Ἀντίοχος
  chosen: Antiochus
  rationale: 'Personal name transliterated according to project policy: titles are
    translated, names are transliterated.'
- source_word: εἰς Αἴγυπτον
  chosen: into Egypt
  alternatives:
  - to Egypt
  lexicon: LSJ
  rationale: εἰς commonly marks movement into a place. 'Into Egypt' preserves the
    directional force slightly better than 'to Egypt,' especially in a military narrative.
- source_word: ἐστέλατο
  chosen: launched
  alternatives:
  - sent
  - dispatched
  - set out on
  lexicon: LSJ
  rationale: From στέλλω in the middle, the verb can mean to dispatch oneself or undertake/send
    forth. Given the object 'second expedition,' English 'launched' conveys initiating
    the campaign naturally. 'Sent' would be too literal and awkward in English with
    'expedition,' while 'set out on' is possible but less direct.
