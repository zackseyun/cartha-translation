translation:
  text: and with his polluted hands taking the sacred vessels, and dragging away with
    profane hands the things that had been dedicated by many kings for the increase
    and glory and honor of the place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the things that many kings had set up'—the Greek participle can more
      literally mean 'set up,' here likely referring to royal votive gifts dedicated
      in the temple.
    reason: lexical_alternative
  - marker: b
    text: '''The place'' is a reverential way of referring to the temple.'
    reason: cultural_note
lexical_decisions:
- source_word: μιαραῖς
  chosen: polluted
  alternatives:
  - defiled
  - unclean
  - foul
  lexicon: LSJ
  rationale: μιαρός denotes ritual/moral defilement. 'Polluted' preserves the cultic
    offense in context better than the more general 'unclean' or the harsher but less
    specifically ritual 'foul'.
- source_word: ἱερὰ σκεύη
  chosen: sacred vessels
  alternatives:
  - holy vessels
  - sacred implements
  lexicon: LSJ
  rationale: The phrase refers to temple articles. 'Sacred vessels' is natural English
    and preserves the cultic sense without sounding overly technical.
- source_word: ἀνασταθέντα
  chosen: had been dedicated
  alternatives:
  - had been set up
  - had been presented
  - had been established
  lexicon: LSJ
  rationale: In this context of royal gifts to the temple, the participle most naturally
    refers to items set up/dedicated as offerings. 'Dedicated' communicates the votive
    sense more clearly in English than the more literal but ambiguous 'set up'.
- source_word: πρὸς αὔξησιν καὶ δόξαν τοῦ τόπου καὶ τιμήν
  chosen: for the increase and glory and honor of the place
  alternatives:
  - for the enhancement and glory and honor of the place
  - to increase the glory and honor of the place
  lexicon: LSJ
  rationale: The prepositional phrase expresses purpose. 'Increase' keeps the noun
    αὔξησις visible, while 'the place' reflects τόπος as a reverential circumlocution
    for the temple.
- source_word: βεβήλοις
  chosen: profane
  alternatives:
  - unholy
  - impious
  lexicon: LSJ
  rationale: βέβηλος contrasts with what is sacred. 'Profane' is the most precise
    cultic antonym in English.
- source_word: συνσύρων
  chosen: dragging away
  alternatives:
  - sweeping away
  - carrying off
  lexicon: LSJ
  rationale: The participle suggests forceful removal by dragging together/off. 'Dragging
    away' preserves the violence and indignity of the action better than the smoother
    'carrying off'.
- source_word: τοῦ τόπου
  chosen: the place
  alternatives:
  - the temple
  - this place
  lexicon: LSJ
  rationale: The Greek says 'the place,' a reverential way of referring to the sanctuary.
    Retaining 'the place' preserves the source wording and tone, while the temple
    reference remains clear from context.
