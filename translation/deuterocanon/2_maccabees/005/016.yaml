theological_decisions:
- issue: Cultic language for desecration of temple objects and sanctuary
  chosen_reading: Preserve explicitly sacred/profane contrast ('polluted hands,' 'sacred
    vessels,' 'profane hands,' 'the place')
  alternative_readings:
  - Use more generic language such as 'unclean' or 'impious' and 'temple'
  rationale: The verse emphasizes sacrilege through paired contrasts between sacred
    objects and defiling hands. The translation keeps this ritual polarity visible
    rather than flattening it into generic wrongdoing.
