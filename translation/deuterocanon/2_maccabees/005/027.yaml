- issue: Nature of μολυσμός in context
  chosen_reading: defilement with likely cultic and moral force
  alternative_readings:
  - ritual impurity only
  - general pollution/corruption
  rationale: In the Antiochene persecution context, the concern is avoiding contamination
    through forbidden practices/foods and apostasy. 'Defilement' preserves the text's
    religious seriousness without narrowing it to a purely ritual category.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
