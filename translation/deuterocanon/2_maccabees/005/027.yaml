translation:
  text: But Judas, who was also called Maccabeus, having become about the tenth and
    having withdrawn, lived in the mountains like a wild animal with those who were
    with him, and they continued feeding on vegetation so as not to share in the defilement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'having become one of about ten,' that is, reduced
      to a band of roughly ten men. The Greek phrase is compressed and approximate.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰούδας ... ὁ καὶ Μακκαβαῖος
  chosen: Judas, who was also called Maccabeus
  alternatives:
  - Judas, also called Maccabee
  - Judas, surnamed Maccabeus
  lexicon: LSJ
  rationale: ὁ καὶ introduces an alternate name/title. 'Maccabeus' is a standard transliteration
    of the Greek form Μακκαβαῖος and stays closer to the source than the anglicized
    'Maccabee.'
- source_word: δέκατός που γενηθεὶς
  chosen: having become about the tenth
  alternatives:
  - being about the tenth
  - having become one of about ten
  - having become the tenth man
  lexicon: LSJ
  rationale: που adds approximation ('about, roughly'). The phrase is compressed Greek
    and most naturally indicates that Judas was reduced to a group numbering about
    ten. I preserved the literal structure in English while keeping it intelligible.
    The exact nuance is somewhat elliptical, so a footnote preserves the more explicit
    alternative sense.
- source_word: ἀναχωρήσας
  chosen: having withdrawn
  alternatives:
  - having retreated
  - having departed
  lexicon: LSJ
  rationale: The participle denotes withdrawal from danger or public presence. 'Having
    withdrawn' is broad enough to include tactical retreat without over-specifying
    military nuance.
- source_word: ἐν τοῖς ὄρεσι
  chosen: in the mountains
  alternatives:
  - in the hill country
  lexicon: LSJ
  rationale: A straightforward locative phrase; 'mountains' best matches ὄρεσι.
- source_word: θηρίων τρόπον διέζη
  chosen: lived ... like a wild animal
  alternatives:
  - lived ... in the manner of wild beasts
  - survived like the wild animals
  lexicon: LSJ
  rationale: θηρίων τρόπον is an idiom meaning 'in the manner of wild animals/beasts.'
    Singular 'a wild animal' reads naturally in English while preserving the simile.
- source_word: σὺν τοῖς μετʼ αὐτοῦ
  chosen: with those who were with him
  alternatives:
  - with his companions
  - with the men with him
  lexicon: LSJ
  rationale: The Greek is generic and does not explicitly identify them beyond association
    with Judas. The chosen rendering preserves that openness.
- source_word: τὴν χορτώδη τροφὴν
  chosen: vegetation
  alternatives:
  - grassy food
  - herbage
  - plant food
  lexicon: LSJ
  rationale: The phrase refers to green/herbaceous food, i.e., what grows from the
    ground. 'Vegetation' is concise modern English that conveys subsistence on wild
    plant matter without sounding overly technical or archaic.
- source_word: σιτούμενοι διετέλουν
  chosen: they continued feeding on
  alternatives:
  - they kept eating
  - they persisted in taking as food
  lexicon: LSJ
  rationale: 'The periphrastic sense is durative: they went on sustaining themselves
    by this food. ''Continued feeding on'' captures the ongoing action.'
- source_word: πρὸς τῷ μὴ μετασχεῖν τοῦ μολυσμοῦ
  chosen: so as not to share in the defilement
  alternatives:
  - in order not to partake of the pollution
  - so that they might not participate in the uncleanness
  lexicon: LSJ
  rationale: μετασχεῖν means to share/partake in; μολυσμός denotes defilement or pollution,
    likely cultic/moral contamination in context. 'Defilement' preserves the religious
    force without archaic diction.
