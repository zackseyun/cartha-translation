translation:
  text: 'And in the three whole days, eighty thousand were destroyed: forty thousand
    by violent hands, and no fewer than those who were slaughtered were sold.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'in the laws of hands,' an obscure expression understood
      here to mean death inflicted by violence or by human hands.
    reason: lexical_alternative
  - marker: b
    text: Or, 'were sold into slavery'; the Greek says simply 'were sold,' with enslavement
      implied by the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀκτὼ ... μυριάδες
  chosen: eighty thousand
  alternatives:
  - eight myriads
  lexicon: LSJ
  rationale: μυριάς denotes a group of ten thousand; the idiomatic English equivalent
    is 'ten thousand,' so ὀκτὼ μυριάδες is rendered 'eighty thousand' rather than
    the less natural 'eight myriads.'
- source_word: ἐν ταῖς πάσαις ἡμέραις τρισίν
  chosen: in the three whole days
  alternatives:
  - throughout the three days
  - in all three days
  lexicon: LSJ
  rationale: The phrase emphasizes the full span of the three days. 'In the three
    whole days' preserves both the temporal setting and the force of πάσαις.
- source_word: κατεφθάρησαν
  chosen: were destroyed
  alternatives:
  - perished
  - were ruined
  lexicon: LSJ
  rationale: The verb can mean 'to destroy' or 'to perish.' In this massacre context,
    a passive rendering 'were destroyed' best reflects the violent loss of life without
    over-specifying beyond the Greek.
- source_word: τέσσαρες μὲν
  chosen: forty thousand
  alternatives:
  - four myriads
  lexicon: LSJ
  rationale: As with μυριάδες above, the numeral plus implied myriads yields 'forty
    thousand.' The ellipsis is naturally supplied from the previous clause.
- source_word: ἐν χειρῶν νόμοις
  chosen: by violence
  alternatives:
  - by the law of the hands
  - in hand-to-hand violence
  - by force of arms
  lexicon: LSJ
  rationale: The transmitted phrase is idiomatically difficult, but in context it
    refers to death inflicted by human hands. 'By violence' gives clear English sense
    anchored in the massacre setting without pretending greater precision than the
    Greek permits.
- source_word: τῶν ἐσφαγμένων
  chosen: those who were slaughtered
  alternatives:
  - the slain
  - those butchered
  lexicon: LSJ
  rationale: σφάζω is a strong verb for slaughtering or butchering. 'Those who were
    slaughtered' preserves the brutality while remaining readable modern English.
- source_word: ἐπράθησαν
  chosen: were sold
  alternatives:
  - were sold into slavery
  lexicon: LSJ
  rationale: The verb means 'were sold.' In this context enslavement is likely the
    implication, but the Greek does not explicitly add 'into slavery,' so the main
    text stays with the simpler wording.
