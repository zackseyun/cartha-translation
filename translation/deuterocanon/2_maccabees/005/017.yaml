translation:
  text: And Antiochus became arrogant in mind, not perceiving that the Master had
    been angered for a little while because of the sins of those dwelling in the city;
    therefore there came to be disregard for the place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was lifted up in mind' or 'was puffed up in mind.' The Greek idiom expresses
      Antiochus's haughty self-exaltation.
    reason: lexical_alternative
  - marker: b
    text: '''The Master'' renders Greek despotes, a different title from kyrios (''Lord'').'
    reason: lexical_alternative
  - marker: c
    text: Or 'there was neglect/overlooking of the place,' likely referring to the
      sanctuary's temporary exposure to desecration.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμετεωρίζετο
  chosen: became arrogant in mind
  alternatives:
  - was lifted up in mind
  - was puffed up in mind
  - was carried away in his thinking
  lexicon: LSJ
  rationale: The verb literally evokes being raised aloft or suspended, but in context
    it describes Antiochus's haughty mental state. 'Became arrogant in mind' communicates
    the idiomatic sense in readable English while preserving the internal reference
    to his mindset via διάνοιαν.
- source_word: διάνοιαν
  chosen: mind
  alternatives:
  - understanding
  - thinking
  lexicon: BDAG
  rationale: A straightforward rendering that fits the idiom with ἐμετεωρίζετο and
    keeps the focus on Antiochus's inner disposition rather than mere intellect.
- source_word: οὐ συνορῶν
  chosen: not perceiving
  alternatives:
  - not understanding
  - not seeing
  lexicon: LSJ
  rationale: The participle indicates failure to grasp what was really happening.
    'Perceiving' preserves both cognitive and perceptive force better than the more
    physical 'seeing.'
- source_word: ἀπώργισται
  chosen: had been angered
  alternatives:
  - had become angry
  - was provoked to anger
  lexicon: LSJ
  rationale: The perfect form suggests a state resulting from prior provocation. Rendering
    it as 'had been angered' preserves the passive/resultative nuance without overstating
    anthropopathic detail.
- source_word: βραχέως
  chosen: for a little while
  alternatives:
  - briefly
  - for a short time
  lexicon: LSJ
  rationale: This adverb qualifies the duration of the Master's anger. 'For a little
    while' is natural English and preserves the temporal limitation important to the
    verse's theology.
- source_word: ὁ δεσπότης
  chosen: the Master
  alternatives:
  - the Lord
  - the Sovereign
  lexicon: BDAG
  rationale: δεσπότης is not the same term as κύριος and carries the sense of an owner
    or absolute master. 'The Master' preserves the lexical distinction and avoids
    importing the covenantal overtones of 'Lord' where the Greek uses a different
    title.
- source_word: πάρορασις
  chosen: disregard
  alternatives:
  - neglect
  - overlooking
  lexicon: LSJ
  rationale: The noun denotes overlooking or neglect. In context it explains why the
    holy place was not protected from desecration for a time. 'Disregard' captures
    that the place was temporarily passed over, not abandoned permanently.
- source_word: περὶ τὸν τόπον
  chosen: for the place
  alternatives:
  - concerning the place
  - with regard to the place
  lexicon: LSJ
  rationale: τόπος here refers to the sacred place, i.e., the temple precinct. 'For
    the place' works idiomatically with 'there came to be disregard' while leaving
    the referent broad enough to match the Greek wording.
- source_word: τῶν τὴν πόλιν οἰκούντων
  chosen: those dwelling in the city
  alternatives:
  - the inhabitants of the city
  - those living in the city
  lexicon: BDAG
  rationale: This participial phrase is rendered transparently and keeps the connection
    between the people's sins and the temporary divine anger.
