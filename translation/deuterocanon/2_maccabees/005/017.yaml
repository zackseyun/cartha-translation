theological_decisions:
- issue: Rendering δεσπότης as a divine title
  chosen_reading: the Master
  alternative_readings:
  - the Lord
  - the Sovereign
  rationale: The Greek uses δεσπότης rather than κύριος. Following the project's principle
    of original-language primacy and consistency of key terms, the translation preserves
    this distinction with 'the Master' rather than flattening both titles into 'Lord.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Contested terms table notes κύριος as ''Lord,'' implying distinct handling for
    other titles.'
- issue: Meaning of the temple's temporary exposure
  chosen_reading: there came to be disregard for the place
  alternative_readings:
  - the place was neglected
  - the place was overlooked
  rationale: The verse explains Antiochus's success not as divine impotence but as
    a temporary divine overlooking tied to the city's sins and limited in duration.
    The rendering preserves that theological tension without overinterpreting the
    exact mechanism.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
