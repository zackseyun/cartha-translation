theological_decisions:
- issue: Whether πολίταις / πολίτας should be generalized to 'people' or retained
    as 'citizens'
  chosen_reading: Retain 'citizens' in both occurrences.
  alternative_readings:
  - people
  - countrymen
  rationale: The Greek repeats the civic term πολίτης, emphasizing not only ethnic
    hostility but hostility toward members of the civic body. Preserving 'citizens'
    keeps the political/social nuance of the accusation.
  doctrine_reference: Translation philosophy §1, §5
- issue: How strongly to render χείριστα τῶν ἄλλων ὑπερήρτετο
  chosen_reading: '''surpassed the others in doing evil'''
  alternative_readings:
  - was worse than the others
  - outdid all the others in wickedness
  rationale: The phrase is comparative and condemnatory, but not so idiomatic that
    it requires a highly interpretive paraphrase. The chosen rendering balances formal
    correspondence with readable English.
  doctrine_reference: Translation philosophy §6
