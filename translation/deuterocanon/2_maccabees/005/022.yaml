translation:
  text: 'He also left overseers to mistreat the nation: in Jerusalem, Philip, a Phrygian
    by birth, but in character more barbarous than the one who appointed him;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to oppress the people.' The Greek infinitive τοῦ κακοῦν can denote harming,
      mistreating, or oppressing.
    reason: lexical_alternative
  - marker: b
    text: '''More barbarous than the one who appointed him'' intensifies the author''s
      moral judgment: Philip is portrayed as even harsher than the ruler who installed
      him.'
    reason: cultural_note
lexical_decisions:
- source_word: κατέλειπεν
  chosen: left
  alternatives:
  - appointed
  - stationed
  lexicon: LSJ
  rationale: The verb means 'leave behind' or 'leave in place.' In context it implies
    appointment by leaving officials behind, but 'left' preserves the Greek wording
    while allowing the administrative sense to be inferred.
- source_word: ἐπιστάτας
  chosen: overseers
  alternatives:
  - governors
  - supervisors
  - officials
  lexicon: LSJ
  rationale: The term denotes those set over others. 'Overseers' is a close, readable
    rendering that preserves the sense of delegated authority without over-specifying
    a formal office.
- source_word: τοῦ κακοῦν
  chosen: to mistreat
  alternatives:
  - to oppress
  - to harm
  - to afflict
  lexicon: LSJ
  rationale: 'The articular infinitive expresses purpose or function: these overseers
    were left for the purpose of harming the people. ''Mistreat'' captures sustained
    abusive treatment in idiomatic English without narrowing it to only political
    oppression.'
- source_word: τὸ γένος
  chosen: the nation
  alternatives:
  - the people
  - the race
  lexicon: LSJ
  rationale: Here the reference is to the Jewish people as an ethnic-national group.
    'Nation' best conveys collective identity in context; 'race' is misleading in
    modern English, and 'people' is possible but slightly less pointed.
- source_word: τὸ μὲν γένος Φρύγα
  chosen: a Phrygian by birth
  alternatives:
  - a Phrygian by race
  - Phrygian in origin
  lexicon: LSJ
  rationale: The phrase identifies Philip's ethnic/geographic origin. 'By birth' is
    natural English and reflects the force of γένος here.
- source_word: τὸν δὲ τρόπον
  chosen: in character
  alternatives:
  - in manner
  - in conduct
  - in disposition
  lexicon: LSJ
  rationale: τρόπος here refers to manner or character. 'In character' fits the contrast
    with ethnic origin and leads naturally into the comparative description.
- source_word: βαρβαρώτερον ἔχοντα
  chosen: more barbarous
  alternatives:
  - more savage
  - more brutal
  lexicon: LSJ
  rationale: The comparative adjective is explicit. 'More barbarous' preserves the
    historical rhetoric of the Greek; 'more brutal' is interpretive and somewhat narrower.
- source_word: τοῦ καταστήσαντος
  chosen: than the one who appointed him
  alternatives:
  - than his appointer
  - than the one who set him in place
  lexicon: LSJ
  rationale: The participle refers back to the ruler who installed Philip. 'The one
    who appointed him' is clear modern English and preserves the personal comparison.
