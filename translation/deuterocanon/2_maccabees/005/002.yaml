translation:
  text: And throughout nearly the whole city, for forty days, it happened that horsemen
    were seen running through the air, wearing golden garments and armed with lances
    in formation,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appearing through the air' for 'were seen running through the air';
      the Greek φαίνεσθαι can emphasize appearance/visibility as well as the fact
      of being seen.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'drawn up in squadrons' translates σπειρηδόν, an adverb
      suggesting organized military formation; 'in ranks' or 'in companies' are also
      possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέβη
  chosen: it happened
  alternatives:
  - it came to pass
  - there occurred
  lexicon: BDAG
  rationale: Common narrative formula introducing an event; 'it happened' is natural
    modern English while preserving the impersonal construction.
- source_word: καθʼ ὅλην τὴν πόλιν σχεδὸν
  chosen: throughout nearly the whole city
  alternatives:
  - almost throughout the entire city
  - in nearly all the city
  lexicon: LSJ
  rationale: κατά with the accusative here conveys distribution through the city;
    σχεδόν modifies the extent, so 'throughout nearly the whole city' preserves both
    scope and slight qualification.
- source_word: ἐφʼ ἡμέρας τεσσεράκοντα
  chosen: for forty days
  alternatives:
  - during forty days
  lexicon: LSJ
  rationale: Idiomatic temporal expression best rendered 'for forty days' in English.
- source_word: φαίνεσθαι
  chosen: were seen
  alternatives:
  - appeared
  - became visible
  lexicon: BDAG
  rationale: In context the infinitive depends on συνέβη and introduces what was visible
    to observers; passive English 'were seen' makes the sense explicit without overstating
    whether the phenomenon was merely appearance or actual presence.
- source_word: διὰ τῶν ἀέρων
  chosen: through the air
  alternatives:
  - through the skies
  - through the atmosphere
  lexicon: LSJ
  rationale: Plural Greek is idiomatic; singular 'the air' is the most natural English
    rendering and fits the visionary aerial setting.
- source_word: τρέχοντας ἱππεῖς
  chosen: horsemen were seen running
  alternatives:
  - riders rushing
  - cavalrymen charging
  lexicon: LSJ
  rationale: ἱππεῖς are mounted riders/horsemen. 'Running' follows the participle
    τρέχοντας closely; although English might expect horses rather than riders to
    run, the phrase communicates rapid mounted movement without adding military nuance
    not explicit in the word itself.
- source_word: διαχρύσους στολὰς ἔχοντας
  chosen: wearing garments of gold
  alternatives:
  - wearing golden robes
  - having gold-adorned clothing
  lexicon: LSJ
  rationale: στολάς are garments/robes; διαχρύσους suggests richly golden or overlaid
    with gold. 'Garments of gold' preserves the striking visual effect without overdefining
    the exact textile detail.
- source_word: λόγχας
  chosen: lances
  alternatives:
  - spears
  lexicon: LSJ
  rationale: λόγχη denotes a spear or lance; 'lances' fits the mounted military imagery
    especially well.
- source_word: σπειρηδὸν
  chosen: drawn up in squadrons
  alternatives:
  - in ranks
  - in companies
  - in circular formation
  lexicon: LSJ
  rationale: The adverb derives from σπεῖρα and indicates arrangement in military
    units or formations. 'Drawn up in squadrons' conveys organized martial array and
    suits the cavalry context better than a more literal but less clear rendering.
- source_word: ἐξωπλισμένους
  chosen: armed
  alternatives:
  - equipped for battle
  - arrayed with weapons
  lexicon: BDAG
  rationale: The participle indicates being equipped with weapons; 'armed' is concise
    and natural in English.
