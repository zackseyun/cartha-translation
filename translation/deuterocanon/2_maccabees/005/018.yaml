translation:
  text: But if we had not happened to be entangled in many sins, then, just as Heliodorus,
    who was sent by King Seleucus to inspect the treasury, was immediately scourged
    and turned back from his boldness when he came forward, so also would we have
    been beaten down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek literally, ''if we had not happened to be entangled in many sins
      ... this man, having come forward, was immediately scourged and turned back
      from his boldness.'' The main text makes explicit in English the implied comparison:
      what happened to Heliodorus would likewise have happened to us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέβην
  chosen: had happened
  alternatives:
  - had come about
  - had occurred
  lexicon: LSJ
  rationale: The aorist of συμβαίνω here introduces a contrary-to-fact condition ('if
    it had not happened'). 'Had happened' preserves the idiomatic force without overformal
    awkwardness.
- source_word: προενέχεσθαι
  chosen: to be entangled
  alternatives:
  - to be involved
  - to be given over
  - to be outstanding in
  lexicon: LSJ
  rationale: In context with πολλοῖς ἁμαρτήμασιν, the sense is not positive prominence
    but being caught up in or implicated in many sins. 'Entangled' conveys moral involvement
    and the middle/passive nuance better than a flatter 'involved'.
- source_word: πολλοῖς ἁμαρτήμασιν
  chosen: in many sins
  alternatives:
  - with many sins
  - by many sins
  lexicon: LSJ
  rationale: The dative complements προενέχεσθαι; English idiom is best served by
    'in many sins,' preserving the moral sphere rather than instrumental force.
- source_word: ἐπὶ τὴν ἐπίσκεψιν
  chosen: to inspect
  alternatives:
  - for the inspection of
  - to make an inspection of
  lexicon: LSJ
  rationale: The phrase denotes purpose or mission. 'To inspect' is concise modern
    English that preserves the official investigative sense.
- source_word: γαζοφυλακίου
  chosen: the treasury
  alternatives:
  - the temple treasury
  - the treasure chamber
  lexicon: LSJ
  rationale: The word denotes a treasury or treasure chamber. Since the immediate
    narrative context is the Jerusalem temple treasury, 'the treasury' is sufficient
    in the verse, while the fuller specification is not strictly required here.
- source_word: προαχθεὶς
  chosen: when he came forward
  alternatives:
  - when he advanced
  - having been brought forward
  lexicon: LSJ
  rationale: The participle likely describes Heliodorus's advance into action rather
    than a passive legal presentation. 'When he came forward' reads naturally and
    fits the narrative sequence before punishment.
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - on the spot
  lexicon: LSJ
  rationale: The adverb marks instant consequence. 'Immediately' is clear and natural.
- source_word: μαστιγωθεὶς
  chosen: was scourged
  alternatives:
  - was flogged
  - was whipped
  lexicon: LSJ
  rationale: The verb refers to severe beating with lashes. 'Scourged' preserves the
    gravity and literary register; 'flogged' is possible but slightly more colloquial.
- source_word: ἀνετράπη τοῦ θράσους
  chosen: was turned back from his boldness
  alternatives:
  - was overthrown in his insolence
  - was checked in his audacity
  lexicon: LSJ
  rationale: The idiom expresses the collapse or reversal of arrogant daring. 'Turned
    back from his boldness' preserves both the motion metaphor and the moral sense
    without overstating with 'insolence' unless context demands it.
