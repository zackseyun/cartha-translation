translation:
  text: There was a killing of young and old, an annihilation of men and women and
    children, and slaughters of virgins and infants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'young men and elders' if the age terms are taken more specifically;
      the context, however, favors a general contrast between the young and the old.
    reason: lexical_alternative
  - marker: b
    text: '''Virgins'' renders a term that more specifically marks unmarried young
      women of virgin status; ''young women'' is a possible but less precise alternative.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγίνετο
  chosen: There was
  alternatives:
  - it happened
  - there came to be
  lexicon: LSJ
  rationale: Impersonal imperfect introducing the ongoing state of events; 'There
    was' is natural English and preserves the report-like force without overemphasizing
    process.
- source_word: νέων
  chosen: young
  alternatives:
  - young men
  - youths
  lexicon: LSJ
  rationale: Paired with πρεσβυτέρων as an age contrast rather than a specifically
    male social category. 'Young' keeps the broad age-based sense.
- source_word: πρεσβυτέρων
  chosen: old
  alternatives:
  - elders
  - older people
  lexicon: LSJ
  rationale: In this context the contrast is age-based, not office-based; 'old' best
    matches the stark pairing with 'young'.
- source_word: ἀναίρεσις
  chosen: killing
  alternatives:
  - slaughter
  - murder
  - removal
  lexicon: LSJ
  rationale: Denotes violent taking away of life. 'Killing' is broad and fits the
    first item in the escalating list without importing a more specific nuance than
    the Greek requires.
- source_word: ἀφανισμός
  chosen: destruction
  alternatives:
  - annihilation
  - wiping out
  lexicon: LSJ
  rationale: Conveys ruin or obliteration. 'Destruction' is strong but idiomatic in
    English for the grouped victims 'men and women and children.'
- source_word: παρθένων
  chosen: virgins
  alternatives:
  - young women
  - maidens
  lexicon: LSJ
  rationale: The Greek specifically denotes virgins/maidens. Following the project's
    gender-accurate philosophy, 'virgins' preserves the marked social and sexual-status
    term rather than flattening it to age alone.
- source_word: νηπίων
  chosen: infants
  alternatives:
  - babies
  - little children
  lexicon: LSJ
  rationale: Refers to very young children, especially those not yet speaking. 'Infants'
    is precise and suitably grave in tone.
- source_word: σφαγαί
  chosen: slaughters
  alternatives:
  - massacres
  - slayings
  lexicon: LSJ
  rationale: A stronger term for butchery or slaughter, distinct from the earlier
    ἀναίρεσις. 'Slaughters' preserves the rhetorical intensification in the final
    clause.
