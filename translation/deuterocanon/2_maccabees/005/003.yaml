translation:
  text: and the flashing of swords, and squadrons of cavalry drawn up, and attacks
    and counterattacks by both sides, and the movement of shields, and masses of spears,
    and the shooting of missiles, and the gleaming of golden ornaments, and all kinds
    of armor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek phrase translated 'masses of spears' contains a difficult term
      (καμάτων) in this context; it may refer more generally to masses of pole-weapons
      or similar battle gear.
    reason: textual_variant
  - marker: b
    text: Or 'raids by both sides' for 'counterattacks by both sides'; the Greek καταδρομάς
      can denote rushing attacks or raids.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαχαιρῶν σπασμούς
  chosen: the flashing of swords
  alternatives:
  - the brandishing of swords
  - the drawing of swords
  lexicon: LSJ
  rationale: σπασμός literally denotes a drawing or pulling motion; in a battle-vision
    list, English 'flashing of swords' captures the visible, sudden motion implied
    by swords being drawn/brandished without over-literal awkwardness.
- source_word: ἴλας ἵππων διατεταγμένας
  chosen: squadrons of cavalry drawn up
  alternatives:
  - troops of horse arranged in line
  - companies of horsemen deployed
  lexicon: LSJ
  rationale: ἴλη is a cavalry troop/squadron; ἵππων literally 'of horses' functions
    metonymically for mounted forces. διατεταγμένας indicates ordered deployment or
    battle formation, hence 'drawn up'.
- source_word: προσβολὰς γινομένας
  chosen: attacks
  alternatives:
  - assaults
  - charges
  lexicon: LSJ
  rationale: προσβολή in military context denotes an attack or assault. 'Attacks'
    is broad and natural in English.
- source_word: καταδρομὰς ἑκατέρων
  chosen: counterattacks by both sides
  alternatives:
  - raids by both sides
  - charges by each side
  lexicon: LSJ
  rationale: καταδρομή can denote a rush, charge, or raid. In paired contrast with
    προσβολάς and modified by ἑκατέρων, 'counterattacks by both sides' best conveys
    reciprocal military action in context.
- source_word: ἀσπίδων κινήσεις
  chosen: the movement of shields
  alternatives:
  - the shaking of shields
  - the brandishing of shields
  lexicon: LSJ
  rationale: κίνησις is movement or motion. The phrase likely depicts shields in active
    combat maneuver; 'movement' preserves the broad sense without over-specifying.
- source_word: καμάτων πλήθη
  chosen: masses of spears
  alternatives:
  - multitudes of javelins
  - crowds of lances
  lexicon: LSJ
  rationale: The transmitted reading καμάτων is unusual in this context; in the battle
    inventory it is commonly understood as referring to spear-shafts/poles or a similar
    weapon term. 'Masses of spears' gives coherent military sense while acknowledging
    the difficult wording.
- source_word: βελῶν βολάς
  chosen: the shooting of missiles
  alternatives:
  - volleys of darts
  - the casting of weapons
  lexicon: LSJ
  rationale: βέλος is a missile, dart, or arrow; βολή is a throw/shot. 'Shooting of
    missiles' preserves the generality of the Greek rather than narrowing to arrows
    alone.
- source_word: χρυσέων κόσμων ἐκλάμψεις
  chosen: the gleaming of golden ornaments
  alternatives:
  - the flashes of golden adornments
  - the glitter of golden equipment
  lexicon: LSJ
  rationale: κόσμος can mean ornament, adornment, or ordered equipment. With χρυσέων
    and ἐκλάμψεις, the phrase points to brilliant golden military adornment; 'ornaments'
    is the most direct lexical match.
- source_word: παντοίους θωρακισμούς
  chosen: all kinds of armor
  alternatives:
  - various suits of armor
  - every sort of armoring
  lexicon: LSJ
  rationale: θωρακισμός denotes armor or equipment for defense. παντοίους emphasizes
    variety, hence 'all kinds of armor'.
