translation:
  text: But he sent the chief polluter, Apollonius, with an army of twenty-two thousand,
    commanding him to slaughter all those in their prime and to sell the women and
    the younger ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'to sell into slavery.' The Greek says simply
      'to sell,' though enslavement is likely implied.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεμψεν
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: LSJ
  rationale: Standard aorist of πέμπω meaning 'send' or 'dispatch.' 'Sent' is the
    most natural and sufficiently formal English rendering.
- source_word: μυσάρχην
  chosen: chief polluter
  alternatives:
  - leader of pollution
  - ringleader of sacrilege
  - governor of abominations
  lexicon: LSJ
  rationale: The rare term is pejorative, built on the idea of defilement/pollution
    rather than a neutral office title. 'Chief polluter' preserves the insult and
    avoids inventing a technical title not warranted by the Greek.
- source_word: μετὰ στρατεύματος
  chosen: with an army
  alternatives:
  - with a force
  - with troops
  lexicon: LSJ
  rationale: στράτευμα denotes a military force. 'Army' is idiomatic and fits the
    large number that follows.
- source_word: δισμυρίους δὲ τοῖς δισχιλίοις
  chosen: twenty-two thousand
  alternatives:
  - twenty thousand and two thousand
  - twenty-two thousand men
  lexicon: LSJ
  rationale: The phrase literally expresses twenty thousand plus two thousand. Rendering
    it as 'twenty-two thousand' gives the plain numerical sense in natural English.
    'Men' is not explicit in the Greek and is therefore omitted.
- source_word: προστάξας
  chosen: commanding him
  alternatives:
  - having ordered him
  - giving orders
  lexicon: LSJ
  rationale: The participle introduces the content of the order given to Apollonius.
    'Commanding him' connects clearly to the main verb in English.
- source_word: τοὺς ἐν ἡλικίᾳ πάντας
  chosen: all those in their prime
  alternatives:
  - all those of age
  - all those in the prime of life
  - all adults
  lexicon: LSJ
  rationale: The phrase refers to those of full age or physical prime, especially
    those fit to be targeted for killing. 'All those in their prime' preserves the
    sense without over-specifying legal adulthood.
- source_word: κατασφάξαι
  chosen: to slaughter
  alternatives:
  - to kill
  - to butcher
  - to massacre
  lexicon: LSJ
  rationale: The compound verb is stronger than a generic 'kill' and conveys violent
    mass killing. 'Slaughter' best reflects the brutality.
- source_word: τὰς δὲ γυναῖκας
  chosen: the women
  alternatives:
  - the wives
  - womenfolk
  lexicon: LSJ
  rationale: γυναῖκες can mean 'women' or 'wives'; here the broader class is intended
    in contrast with those killed and the younger ones sold.
- source_word: τοὺς νεωτέρους
  chosen: the younger ones
  alternatives:
  - the children
  - the youths
  - the young people
  lexicon: LSJ
  rationale: Comparative of νέος, here referring broadly to younger persons. 'The
    younger ones' preserves the comparative sense without forcing a narrower age category
    than the Greek states.
- source_word: πωλεῖν
  chosen: to sell
  alternatives:
  - to sell into slavery
  lexicon: LSJ
  rationale: The verb means 'to sell.' In this wartime context enslavement is strongly
    implied, but the Greek does not explicitly add 'into slavery,' so the main text
    keeps the simpler wording.
