theological_decisions:
- issue: Whether to make the implied result of πωλεῖν explicit as slavery
  chosen_reading: to sell
  alternative_readings:
  - to sell into slavery
  rationale: The historical context strongly suggests enslavement, but the Greek verb
    itself is simply 'to sell.' Following optimal equivalence and transparency, the
    main text stays close to the wording while preserving the fuller implication in
    a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
