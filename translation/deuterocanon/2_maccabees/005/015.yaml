theological_decisions:
- issue: Temple terminology and holiness claim
  chosen_reading: the most holy temple in all the earth
  alternative_readings:
  - the holiest sanctuary in the whole land
  rationale: The Greek uses a superlative expression about the temple's holiness.
    The translation preserves the text's exalted claim without softening it or narrowing
    γῆ to Judea unless context requires it.
  doctrine_reference: Translation philosophy §§1, 6
