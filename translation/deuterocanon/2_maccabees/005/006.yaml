theological_decisions:
- issue: Moral evaluation embedded in the contrast between apparent success and true
    calamity
  chosen_reading: Render the sentence as a narrator's judgment that victory over one's
    own kin is actually disaster
  alternative_readings:
  - A more literal but less idiomatic rendering of 'good fortune ... bad fortune'
  rationale: The Greek itself makes the evaluative claim; translating εὐημερία/δυσημερία
    as 'success/disaster' preserves the moral reversal without adding theology beyond
    the text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
