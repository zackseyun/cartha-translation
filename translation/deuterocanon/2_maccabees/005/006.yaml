id: 2MA.5.6
reference: 2 Maccabees 5:6
source:
  edition: lxx-swete-1909
  text: ὁ δὲ Ἰάσων ἐποίει σφαγὰς τῆς πόλεως τῶν ἰδίων ἀφειδῶς, οὐ συννοῶν τὴν εἰς
    τοὺς συγγενεῖς εὐημερίαν δυσημερίαν εἶναι τὴν μεγίστην, δοκῶν δὲ πολεμίων καὶ
    οὐχ ὁμοεθνῶν τρόπαια καταβάλλεσθαι.
  language: Greek
  pages:
