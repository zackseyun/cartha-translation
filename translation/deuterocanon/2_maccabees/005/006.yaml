translation:
  text: But Jason kept carrying out merciless slaughter of his own fellow citizens,
    not understanding that prosperity against kinsmen is the greatest calamity, and
    thinking that he was winning trophies over enemies and not over his own countrymen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unsparingly' for 'merciless.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'not understanding that prosperity toward kinsmen is the greatest
      misfortune,' meaning that apparent success won against one's own kin is actually
      ruinous.
    reason: lexical_alternative
lexical_decisions:
- source_word: σφαγὰς
  chosen: slaughter
  alternatives:
  - massacres
  - killings
  lexicon: LSJ
  rationale: σφαγή denotes slaughter or butchery, stronger than a neutral 'killing.'
    'Slaughter' preserves the brutality without overinterpreting as a technical 'massacre.'
- source_word: τῆς πόλεως τῶν ἰδίων
  chosen: his own fellow citizens
  alternatives:
  - his own people of the city
  - his own citizens
  lexicon: LSJ
  rationale: The phrase identifies those in the city who were his own; 'fellow citizens'
    captures both civic belonging and the reflexive ἰδίων.
- source_word: ἀφειδῶς
  chosen: merciless
  alternatives:
  - unsparingly
  - without pity
  lexicon: LSJ
  rationale: '''Merciless'' gives the adverb''s sense of acting without sparing, in
    idiomatic modern English.'
- source_word: οὐ συννοῶν
  chosen: not understanding
  alternatives:
  - not realizing
  - failing to perceive
  lexicon: LSJ
  rationale: The participle indicates lack of comprehension or recognition; 'not understanding'
    is straightforward and sufficiently weighty.
- source_word: εὐημερίαν
  chosen: success
  alternatives:
  - prosperity
  - good fortune
  lexicon: LSJ
  rationale: In this military-political context, 'success' best fits the sense of
    apparent advantage or favorable outcome.
- source_word: δυσημερίαν
  chosen: disaster
  alternatives:
  - misfortune
  - calamity
  lexicon: LSJ
  rationale: The contrast with εὐημερίαν is sharpened by 'disaster,' conveying that
    what seemed favorable was actually ruinous.
- source_word: συγγενεῖς
  chosen: kinsmen
  alternatives:
  - relatives
  - kindred
  lexicon: LSJ
  rationale: The term denotes those of shared kinship; 'kinsmen' preserves the familial-ethnic
    force better than the narrower 'relatives.'
- source_word: τὴν μεγίστην
  chosen: the greatest
  alternatives:
  - the worst
  - the gravest
  lexicon: LSJ
  rationale: The superlative is explicit; 'the greatest' keeps the formal contrast
    with the preceding nouns.
- source_word: τρόπαια καταβάλλεσθαι
  chosen: setting up trophies
  alternatives:
  - erecting trophies
  - winning triumphs
  lexicon: LSJ
  rationale: Although καταβάλλω often means 'throw down,' with τρόπαια the idiom refers
    to the establishment of victory monuments. 'Setting up trophies' communicates
    the idiomatic military image in natural English.
- source_word: πολεμίων
  chosen: enemies
  alternatives:
  - foes
  lexicon: LSJ
  rationale: Standard military term; 'enemies' is the plain and accurate rendering.
- source_word: ὁμοεθνῶν
  chosen: his own countrymen
  alternatives:
  - those of his own nation
  - his own people
  lexicon: LSJ
  rationale: ὁμοεθνής stresses shared nation or ethnicity, not merely kinship. 'His
    own countrymen' distinguishes it from συγγενεῖς earlier while remaining readable.
