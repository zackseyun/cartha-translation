translation:
  text: But when a false rumor arose that Antiochus had passed from life, Jason, taking
    no fewer than a thousand men, launched a sudden attack against the city. When
    those on the wall had been driven back, and at last the city was already being
    taken, Menelaus fled into the citadel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'had changed life,' an idiomatic way of saying that Antiochus
      had died.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλιάς ψευδοῦς
  chosen: a false rumor
  alternatives:
  - a false report
  - false talk
  lexicon: LSJ
  rationale: λαλιά can denote talk, speech, or report; in context it refers to circulating
    news. 'False rumor' is idiomatic English and fits the political context better
    than the more wooden 'false talk.'
- source_word: μετηλλαχότος ... τὸν βίον
  chosen: had passed from life
  alternatives:
  - had died
  - had departed this life
  lexicon: LSJ
  rationale: This idiom literally means 'had changed life' and is a euphemistic expression
    for death. 'Had passed from life' preserves some of the idiomatic softness of
    the Greek better than the blunt 'had died,' while remaining understandable.
- source_word: παραλαβὼν
  chosen: taking
  alternatives:
  - having taken with him
  - gathering
  lexicon: LSJ
  rationale: The participle indicates Jason took or gathered a force with him. 'Taking'
    is concise and natural in English while preserving the participial relation.
- source_word: οὐκ ἐλάττους τῶν χιλίων
  chosen: no fewer than a thousand men
  alternatives:
  - not less than a thousand
  - at least a thousand
  lexicon: LSJ
  rationale: The phrase is a numerical minimum. 'No fewer than a thousand men' is
    idiomatic and preserves the emphatic lower bound.
- source_word: ἐφνιδίως
  chosen: sudden
  alternatives:
  - unexpected
  - by surprise
  lexicon: LSJ
  rationale: The adverb conveys suddenness and surprise. Rendered with 'launched a
    sudden attack' to express the adverb naturally in English military style.
- source_word: συνετελέσατο ἐπίθεσιν
  chosen: launched ... attack
  alternatives:
  - made an assault
  - carried out an attack
  lexicon: LSJ
  rationale: The expression means to carry through or execute an attack. 'Launched
    an attack' is natural modern English and preserves the military force.
- source_word: τῶν ... ἐπὶ τῷ τείχει
  chosen: those on the wall
  alternatives:
  - those stationed on the wall
  - the defenders on the wall
  lexicon: LSJ
  rationale: The phrase identifies persons positioned on the wall. 'Those on the wall'
    is sufficiently clear without adding interpretive detail beyond the text.
- source_word: συνελασθέντων
  chosen: had been driven back
  alternatives:
  - had been pressed together
  - had been forced back
  lexicon: LSJ
  rationale: In siege context the passive suggests being pushed back or routed from
    position. 'Driven back' best fits the military action and resulting loss of defensive
    ground.
- source_word: καταλαμβανομένης τῆς πόλεως
  chosen: the city was already being taken
  alternatives:
  - the city was being captured
  - the city was falling
  lexicon: LSJ
  rationale: The genitive absolute marks the city's capture as underway. 'Being taken'
    is close to the Greek and avoids overinterpreting whether the capture was complete.
- source_word: ἐφυγάδευεν
  chosen: fled for refuge
  alternatives:
  - fled
  - escaped
  lexicon: LSJ
  rationale: The verb can carry the sense of fleeing as an exile or seeking safety
    by flight. 'Fled for refuge' captures both motion and purpose in context.
- source_word: ἀκρόπολιν
  chosen: citadel
  alternatives:
  - fortress
  - acropolis
  lexicon: LSJ
  rationale: In this historical setting the fortified upper city is best rendered
    'citadel.' 'Acropolis' would be more transliterative but less accessible for many
    readers.
