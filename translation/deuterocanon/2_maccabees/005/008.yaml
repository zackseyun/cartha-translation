translation:
  text: 'So he met the end of a miserable ruin: shut up with Aretas, the ruler of
    the Arabs, fleeing from city to city, pursued by all, hated as an apostate from
    the laws and abhorred as the executioner of his homeland and fellow citizens,
    he was driven out into Egypt.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tyrant of the Arabs.' The Greek τύραννον can mean 'tyrant,' but here
      it may function more neutrally as 'ruler.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he was cast out into Egypt'; literally, the verb is very forceful, suggesting
      being thrown out.
    reason: lexical_alternative
lexical_decisions:
- source_word: πέρας ... ἔτυχεν
  chosen: he met the end
  alternatives:
  - he came to the end
  - he suffered the outcome
  lexicon: LSJ
  rationale: The idiom literally means 'obtained/reached an end.' 'Met the end' preserves
    the idiomatic force in natural English without over-paraphrasing.
- source_word: κακῆς καταστροφῆς
  chosen: of a miserable ruin
  alternatives:
  - of a bad catastrophe
  - of a wretched destruction
  lexicon: LSJ
  rationale: κακή intensifies the negative quality, and καταστροφή denotes overthrow/ruin/catastrophe.
    'Miserable ruin' captures both the disastrous and pitiable sense in readable English.
- source_word: ἐγκλεισθεὶς
  chosen: shut up
  alternatives:
  - confined
  - imprisoned
  - hemmed in
  lexicon: LSJ
  rationale: The participle indicates being enclosed or confined. 'Shut up' is vivid
    and concise, fitting the narrative tone; 'imprisoned' would be too specific.
- source_word: πρὸς Ἀρέταν
  chosen: with Aretas
  alternatives:
  - by Aretas
  - under Aretas
  lexicon: LSJ
  rationale: πρός with a person here most naturally indicates location or relation
    ('with/in the hands of Aretas') rather than strict agency. 'With Aretas' keeps
    the Greek's relative openness.
- source_word: τύραννον
  chosen: ruler
  alternatives:
  - tyrant
  lexicon: LSJ
  rationale: Although τύραννος can mean 'tyrant,' in Hellenistic usage it can also
    denote a ruler/monarch without necessarily foregrounding moral judgment. Since
    the verse's condemnatory force falls on Antiochus, 'ruler' avoids importing an
    extra evaluation onto Aretas.
- source_word: πόλιν ἐκ πόλεως φεύγων
  chosen: fleeing from city to city
  alternatives:
  - fleeing city after city
  - running from one city to another
  lexicon: LSJ
  rationale: This is a straightforward distributive expression. 'From city to city'
    is idiomatic and preserves the repeated flight.
- source_word: διωκόμενος ὑπὸ πάντων
  chosen: pursued by all
  alternatives:
  - hunted by everyone
  - persecuted by all
  lexicon: LSJ
  rationale: διώκω here is literal pursuit rather than specifically religious persecution.
    'Pursued by all' is the most neutral and contextually fitting rendering.
- source_word: στυγούμενος
  chosen: hated
  alternatives:
  - detested
  - loathed
  lexicon: LSJ
  rationale: The participle denotes being hated or abominated. 'Hated' is strong but
    still natural in modern English.
- source_word: τῶν νόμων ἀποστάτης
  chosen: an apostate from the laws
  alternatives:
  - a deserter from the laws
  - one who had revolted from the laws
  lexicon: LSJ
  rationale: ἀποστάτης is a strong term for one who abandons allegiance. 'Apostate'
    preserves that force and suits the covenantal/legal context of 2 Maccabees.
- source_word: βδελυσσόμενος
  chosen: abhorred
  alternatives:
  - detested
  - regarded as disgusting
  lexicon: LSJ
  rationale: The verb conveys revulsion beyond ordinary dislike. 'Abhorred' matches
    the intensity and pairs well with 'hated' without simple repetition.
- source_word: πατρίδος καὶ πολιτῶν δήμιος
  chosen: the executioner of his homeland and fellow citizens
  alternatives:
  - the destroyer of his homeland and fellow citizens
  - the public executioner of his country and citizens
  lexicon: LSJ
  rationale: δήμιος can denote a public executioner and, by extension, a destroyer
    or deadly enemy. Given the context of Antiochus' violence against his own people,
    'executioner' preserves the concrete brutality while remaining intelligible.
- source_word: εἰς Αἴγυπτον ἐξεβράσθη
  chosen: he was driven out into Egypt
  alternatives:
  - he was cast out into Egypt
  - he was vomited out into Egypt
  lexicon: LSJ
  rationale: ἐκβράζω literally suggests being thrown or cast out, even 'vomited out,'
    but that would sound overly graphic in English unless the context clearly demanded
    it. 'Driven out into Egypt' preserves the force of expulsion in natural style.
