theological_decisions:
- issue: Moral characterization of Aretas via τύραννον
  chosen_reading: rendered as 'ruler' rather than 'tyrant'
  alternative_readings:
  - tyrant
  rationale: The Greek term can function as a political title without necessarily
    assigning the narrator's moral condemnation to Aretas. The verse's theological-moral
    emphasis is on Antiochus' downfall, so 'ruler' avoids adding a judgment the text
    may not intend.
  doctrine_reference: Translation philosophy §1, §6
- issue: Strength of ἀποστάτης in relation to the law
  chosen_reading: an apostate from the laws
  alternative_readings:
  - a deserter from the laws
  rationale: The term marks repudiation of covenantal/legal allegiance. 'Apostate'
    preserves the severe moral-religious charge without expanding it beyond the text.
  doctrine_reference: Translation philosophy §1, §5
