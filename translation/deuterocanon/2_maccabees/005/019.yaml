translation:
  text: But the Lord did not choose the nation for the sake of the place, but the
    place for the sake of the nation.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀλλʼ
  chosen: But
  alternatives:
  - Rather
  - Yet
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding statement; 'But' is natural
    English and preserves the adversative force.
- source_word: διὰ
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: BDAG
  rationale: 'With the accusative here, the phrase expresses reason or purpose-like
    motivation. ''For the sake of'' best captures the rhetorical contrast: God''s
    choice of place is subordinate to his regard for the nation.'
- source_word: τόπον
  chosen: the place
  alternatives:
  - the holy place
  - the sanctuary
  - the location
  lexicon: BDAG
  rationale: The Greek says simply 'the place.' In context it refers to Jerusalem/the
    temple locale, but the text itself uses the broader term, so the translation preserves
    that wording without over-specifying.
- source_word: ἔθνος
  chosen: the nation
  alternatives:
  - the people
  lexicon: BDAG
  rationale: ἔθνος here refers to the Jewish nation as a corporate people. 'Nation'
    preserves the collective and political-ethnic sense better than the more generic
    'people' in this antithetical formulation.
- source_word: κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος. The article is represented
    naturally in English as 'the Lord.'
- source_word: ἐξελέξατο
  chosen: did not choose / choose
  alternatives:
  - selected
  - chose out
  lexicon: BDAG
  rationale: The aorist middle of ἐκλέγομαι is well rendered by 'choose.' The first
    clause requires negation from οὐ; English repeats 'choose' in the second clause
    to preserve the balanced antithesis.
