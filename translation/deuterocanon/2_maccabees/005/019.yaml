theological_decisions:
- issue: Relation between sacred place and chosen people
  chosen_reading: The verse teaches that the Lord's election of the place is derivative
    of, and ordered toward, his election of the nation.
  alternative_readings:
  - The place was chosen independently and then conferred holiness on the nation
  rationale: 'The Greek antithesis is explicit: ''not because of the place [did he
    choose] the nation, but because of the nation [did he choose] the place.'' The
    translation preserves this theological priority without expanding beyond the wording.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
