theological_decisions:
- issue: Rendering divine titles παντοκράτωρ and δεσπότης distinctly
  chosen_reading: the Almighty ... the great Master
  alternative_readings:
  - the Almighty ... the great Lord
  - the Omnipotent One ... the great Sovereign
  rationale: The Greek uses two different titles for God in deliberate contrast between
    wrath and reconciliation. Rendering them distinctly preserves the source texture
    and avoids flattening both into 'Lord.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; consistency of key terms, or
    documented exception.'
