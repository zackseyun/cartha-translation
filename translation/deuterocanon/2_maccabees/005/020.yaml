id: 2MA.5.20
reference: 2 Maccabees 5:20
source:
  edition: lxx-swete-1909
  text: διόπερ καὶ αὐτὸς ὁ τόπος συμμετασχὼν τοῦ ἔθνους δυσπετημάτων γενομένων, ὕστερον
    εὐεργετημάτων ἐκοινώνησεν· καὶ ὁ καταληφθεὶς ἐν τῇ τοῦ παντοκράτορος ὀργῇ, πάλιν
    ἐν τῇ τοῦ μεγάλου δεσπότου καταλλαγῇ μετὰ πάσης δόξης ἐπανωρθώθη.
  language: Greek
