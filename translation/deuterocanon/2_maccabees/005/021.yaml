theological_decisions:
- issue: Anthropological idiom τῆς καρδίας
  chosen_reading: his heart
  alternative_readings:
  - his mind
  - his inner self
  rationale: The Greek uses the biblical anthropological term 'heart' for the seat
    of pride and intention. Retaining 'heart' preserves the scriptural idiom rather
    than flattening it into a purely psychological term.
  doctrine_reference: Translation philosophy §1, §6
