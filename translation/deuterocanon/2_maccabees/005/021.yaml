translation:
  text: So Antiochus, after carrying off from the temple eighteen hundred talents,
    quickly departed for Antioch, thinking in his arrogance to make the land navigable
    and the sea passable on foot, because of the exaltation of his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the arrogance of his heart.' The Greek expression literally
      speaks of the 'upliftedness' or 'exaltation' of the heart, describing haughty
      overconfidence.
    reason: lexical_alternative
  - marker: b
    text: 'The imagery is deliberately hyperbolic: Antiochus imagined himself capable
      of reversing the natural order, making land fit for sailing and sea fit for
      travel.'
    reason: cultural_note
lexical_decisions:
- source_word: ὀκτακόσια πρὸς τοῖς χιλίοις
  chosen: eighteen hundred
  alternatives:
  - one thousand eight hundred
  - eight hundred in addition to a thousand
  lexicon: LSJ
  rationale: The idiom literally means 'eight hundred in addition to the thousand,'
    yielding 1,800. 'Eighteen hundred' is natural modern English while preserving
    the exact amount.
- source_word: ἀπενεγκάμενος
  chosen: after carrying off
  alternatives:
  - having taken away
  - having carried away
  lexicon: LSJ
  rationale: The participle denotes removal/carrying away. 'Carrying off' fits the
    context of plundering the temple and preserves the participial sense with smooth
    English.
- source_word: ἐκ τοῦ ἱεροῦ
  chosen: from the temple
  alternatives:
  - from the sanctuary
  - from the holy place
  lexicon: LSJ
  rationale: ἱερόν commonly denotes the temple precinct/temple as a whole. 'Temple'
    is the clearest rendering here; 'sanctuary' could suggest the inner shrine more
    narrowly than the Greek requires.
- source_word: θᾶττον
  chosen: quickly
  alternatives:
  - swiftly
  - at once
  lexicon: LSJ
  rationale: The adverb emphasizes haste. 'Quickly' is idiomatic and sufficiently
    forceful.
- source_word: ἐχωρίσθη
  chosen: departed
  alternatives:
  - withdrew
  - left
  lexicon: LSJ
  rationale: In context the verb indicates his departure for Antioch. 'Departed' is
    slightly more formal and suits the narrative tone.
- source_word: οἰόμενος
  chosen: thinking
  alternatives:
  - supposing
  - imagining
  lexicon: LSJ
  rationale: The participle introduces Antiochus's arrogant self-estimation. 'Thinking'
    is straightforward; the arrogance is then made explicit by the surrounding phrases.
- source_word: ἀπὸ τῆς ὑπερηφανίας
  chosen: in his arrogance
  alternatives:
  - from arrogance
  - because of his pride
  lexicon: LSJ
  rationale: The phrase gives the source or basis of his delusion. 'In his arrogance'
    reads naturally in English while preserving the causal sense.
- source_word: τὴν μὲν γῆν πλωτὴν
  chosen: to make the land navigable
  alternatives:
  - to make the land sail-able
  - to make the land traversable by ship
  lexicon: LSJ
  rationale: πλωτός means navigable or fit for sailing. The hyperbole is that he imagined
    impossible feats. 'Navigable' preserves the maritime image without awkwardness.
- source_word: καὶ τὸ πέλαγος πορευτὸν
  chosen: and the sea passable on foot
  alternatives:
  - and the sea traversable
  - and the open sea fit for travel
  lexicon: LSJ
  rationale: πορευτός means passable/traversable. Because the contrast is with making
    land navigable, 'passable on foot' brings out the implied reversal more clearly
    for English readers without adding a new idea foreign to the context.
- source_word: θέσθαι
  chosen: to make
  alternatives:
  - to render
  - to establish as
  lexicon: LSJ
  rationale: The infinitive means to make or render something to be in a certain state.
    'To make' is concise and idiomatic.
- source_word: διὰ τὸν μετεωρισμὸν τῆς καρδίας
  chosen: because of the exaltation of his heart
  alternatives:
  - because of the arrogance of his heart
  - because of his haughty heart
  lexicon: LSJ
  rationale: μετεωρισμός conveys upliftedness, overconfidence, or haughty elation.
    'Exaltation of his heart' stays close to the Greek imagery, while the preceding
    'in his arrogance' already clarifies the negative sense.
