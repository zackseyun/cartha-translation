translation:
  text: When the king was informed about what had happened, he concluded that Judea
    was in revolt; so, after setting out from Egypt, savage in spirit, he took the
    city by force of arms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'captured by the spear,' a Greek military idiom for taking a
      city through armed assault.
    reason: lexical_alternative
lexical_decisions:
- source_word: Προεστώτων
  chosen: was informed
  alternatives:
  - when reports were brought
  - when matters were laid before
  lexicon: LSJ
  rationale: The genitive absolute with περὶ τῶν γεγονότων indicates information being
    presented to the king. 'Was informed' gives clear modern English without over-specifying
    the agents.
- source_word: διέλαβεν
  chosen: he concluded
  alternatives:
  - he understood
  - he supposed
  - he inferred
  lexicon: LSJ
  rationale: The verb here conveys forming a judgment from the report received. 'Concluded'
    best captures an inferential decision rather than mere perception.
- source_word: ἀποστατεῖν
  chosen: was in revolt
  alternatives:
  - was rebelling
  - had apostatized
  - was revolting
  lexicon: LSJ
  rationale: In this political context the sense is rebellion or revolt against royal
    authority, not primarily religious apostasy. 'Was in revolt' reads naturally in
    English and reflects the infinitive dependent on διέλαβεν.
- source_word: ἀναζεύξας
  chosen: after setting out
  alternatives:
  - after marching up
  - after departing
  lexicon: LSJ
  rationale: The participle denotes breaking camp or setting out on a journey. 'After
    setting out from Egypt' preserves the sequence without forcing a military nuance
    beyond the word itself.
- source_word: θηριωμένος τῇ ψυχῇ
  chosen: savage in spirit
  alternatives:
  - brutal in soul
  - like a wild beast in his mind
  - enraged in spirit
  lexicon: LSJ
  rationale: The perfect/passive participial form from θηριόω depicts a beast-like
    inner disposition. 'Savage in spirit' preserves the metaphor and remains readable.
- source_word: δοριαλώτον
  chosen: by force of arms
  alternatives:
  - as spear-won spoil
  - by the spear
  - as captured by the spear
  lexicon: LSJ
  rationale: The adjective literally evokes capture by the spear, a military idiom
    for violent conquest. 'By force of arms' communicates the idiom naturally while
    retaining the martial sense.
- source_word: ἔλαβεν τὴν μὲν πόλιν
  chosen: he took the city
  alternatives:
  - he captured the city
  - he seized the city
  lexicon: LSJ
  rationale: A standard military use of λαμβάνω. 'Took the city' is concise and idiomatic
    in English, especially with the following martial qualifier.
