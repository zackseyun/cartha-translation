translation:
  text: He who had made many exiles from their homeland perished in a foreign land,
    having gone up to the Lacedaemonians as though he would obtain protection because
    of the kinship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the Spartans.' 'Lacedaemonians' is the more literal rendering of
      the Greek ethnic name.
    reason: lexical_alternative
  - marker: b
    text: The 'kinship' likely refers to the traditional claimed relationship between
      the Jews and the Spartans mentioned elsewhere (compare 1 Maccabees 12:6-23).
    reason: cross_reference
lexical_decisions:
- source_word: συχνούς
  chosen: many men
  alternatives:
  - many
  - a great number
  lexicon: LSJ
  rationale: The adjective means 'many' or 'numerous.' Because it stands substantivally
    with the article-governed participial clause and refers to persons driven out,
    'many men' makes the object explicit in natural English without overtranslating.
- source_word: τῆς πατρίδος
  chosen: from their homeland
  alternatives:
  - from the fatherland
  - from their native land
  lexicon: LSJ
  rationale: πατρίς denotes one's native country or homeland. 'Homeland' is natural
    modern English and preserves the pathos of forced removal.
- source_word: ἀποξενώσας
  chosen: had made ... exiles
  alternatives:
  - had estranged
  - had banished
  - had alienated from their homeland
  lexicon: LSJ
  rationale: The verb literally conveys making someone foreign/estranged. In this
    context, with τῆς πατρίδος, it refers to driving people from their native land.
    'Had made ... exiles' captures the causative force and the political sense better
    than the more abstract 'estranged.'
- source_word: ἐπὶ ξένης
  chosen: in a foreign land
  alternatives:
  - on foreign soil
  - abroad
  lexicon: LSJ
  rationale: The phrase contrasts with πατρίς and indicates dying away from one's
    own country. 'In a foreign land' preserves the irony and the homeland/foreign-land
    contrast.
- source_word: ἀπώλετο
  chosen: perished
  alternatives:
  - died
  - was destroyed
  lexicon: LSJ
  rationale: Middle aorist of ἀπόλλυμι can mean 'perished' or 'was ruined.' 'Perished'
    fits the narrative judgment and is slightly weightier than simple 'died' without
    importing extra theology.
- source_word: πρὸς Λακεδαιμονίους
  chosen: to the Lacedaemonians
  alternatives:
  - to the Spartans
  lexicon: LSJ
  rationale: Λακεδαιμόνιοι are the Lacedaemonians/Spartans. The transliterated ethnic
    term stays closer to the Greek source; the more familiar 'Spartans' is preserved
    as an alternative.
- source_word: ἀναχθείς
  chosen: having been carried off
  alternatives:
  - having gone up
  - having been brought
  - having set sail
  lexicon: LSJ
  rationale: The participle can denote being brought up, led away, or in some contexts
    setting sail. Here the passive sense of being taken/brought to them best fits
    the narrative. 'Carried off' conveys movement under compulsion or dependence,
    though not necessarily violent seizure.
- source_word: διὰ τὴν συγγένειαν
  chosen: because of the kinship
  alternatives:
  - because of their kinship
  - because of the relationship
  lexicon: LSJ
  rationale: συγγένεια means kinship or relationship by common ancestry. The article
    suggests a known claimed relationship, likely the traditional Jewish-Spartan kinship
    claim in 1 Maccabees. 'Because of the kinship' preserves that historical allusion
    without expanding the text.
- source_word: τευξόμενος σκέπης
  chosen: he would obtain protection
  alternatives:
  - he would find shelter
  - he would receive refuge
  lexicon: LSJ
  rationale: τυγχάνω with a genitive means obtain/attain, and σκέπη means protection,
    shelter, or cover. 'Obtain protection' is idiomatic and preserves the expectation
    of political asylum or safety.
