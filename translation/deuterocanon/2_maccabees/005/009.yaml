theological_decisions:
- issue: Historical allusion in συγγένεια
  chosen_reading: Render the phrase neutrally as 'because of the kinship' without
    explaining the Jewish-Spartan tradition in the main text.
  alternative_readings:
  - because of their kinship
  - because of the claimed kinship
  rationale: The verse alludes to a known diplomatic tradition, but the Greek itself
    does not explicitly mark the kinship as merely alleged. The main text should preserve
    the wording without interpretive expansion; explanatory context belongs in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source meaning without paraphrastic expansion.'
