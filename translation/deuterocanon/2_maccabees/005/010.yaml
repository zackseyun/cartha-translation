theological_decisions:
- issue: Contextual rendering of πατρῴου νόμου in a burial context
  chosen_reading: his ancestral tomb
  alternative_readings:
  - the law of his fathers
  - ancestral custom
  rationale: This verse is not a doctrinal crux, but the transmitted wording is difficult.
    A literal 'ancestral law' is possible, yet in immediate context the concern is
    denial of burial and mourning. The chosen rendering aims to communicate the practical
    sense of exclusion from ancestral burial honors, while preserving the more literal
    alternative in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning over inherited English tradition.'
