translation:
  text: And after casting out a multitude unburied, he himself became unwept, and
    shared in no burial at all, nor in his ancestral tomb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''nor did he share in burial, nor in the law of his fathers.'' The
      final clause is difficult; it may refer more literally to ancestral custom or
      law rather than specifically to an ancestral tomb.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ πλῆθος
  chosen: a multitude
  alternatives:
  - the multitude
  - a great number
  lexicon: LSJ
  rationale: 'Although the article is present, in English an indefinite expression
    fits the idiom better here: the sense is that he had cast out many people without
    burial.'
- source_word: ἀτάφων
  chosen: unburied
  alternatives:
  - without burial
  - left without burial
  lexicon: LSJ
  rationale: The adjective directly denotes lack of burial; 'unburied' is concise
    and preserves the starkness of the Greek.
- source_word: ἐκρίψας
  chosen: after casting out
  alternatives:
  - having thrown out
  - after exposing
  lexicon: LSJ
  rationale: The participle indicates prior action. 'Casting out' reflects the force
    of throwing out bodies rather than giving them honorable burial.
- source_word: ἀπένθητος ἐγενήθη
  chosen: became unwept
  alternatives:
  - became unmourned
  - ended up without mourning
  lexicon: LSJ
  rationale: The phrase means that no one mourned him. 'Unwept' is idiomatic, compact,
    and preserves the rhetorical reversal.
- source_word: κηδείας
  chosen: burial
  alternatives:
  - funeral rites
  - interment
  lexicon: LSJ
  rationale: The noun can refer to funeral observances broadly. 'Burial' keeps the
    line tight in English while still covering the denial of proper funerary treatment.
- source_word: οὐδ᾽ ἥτινος
  chosen: at all
  alternatives:
  - of any kind
  - of anyone
  lexicon: LSJ
  rationale: 'The transmitted phrase is awkward, but in context it intensifies the
    negation: he shared in no burial whatsoever. Rendering it adverbially gives coherent
    English without over-specifying a difficult construction.'
- source_word: πατρῴου νόμου
  chosen: his ancestral tomb
  alternatives:
  - the law of his fathers
  - ancestral custom
  lexicon: LSJ
  rationale: The Greek as transmitted reads 'ancestral law,' but in this context concerning
    burial and mourning, the sense in English is best represented by reference to
    ancestral burial place/custom. This reflects the likely contextual force of the
    clause rather than a woodenly misleading 'law.'
