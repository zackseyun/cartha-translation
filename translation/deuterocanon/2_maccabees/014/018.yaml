id: 2MA.14.18
reference: 2 Maccabees 14:18
source:
  edition: lxx-swete-1909
  text: ὅμως δὲ ἀκούων ὁ Νικάνωρ ἣν εἶχον οἱ περὶ τὸν Ἰούδαν ἀνδραγαθίαν καὶ ἐν τοῖς
    περὶ τῆς πατρίδος ἀγῶσιν εὐψυχίαν, ὑπευλαβεῖτο τὴν κρίσιν διʼ αἵματος ποιήσασθαι.
