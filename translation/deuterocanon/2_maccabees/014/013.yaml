translation:
  text: 'to Judah with letters: that he should capture Judas himself, scatter those
    with him, and appoint Alcimus as high priest of the greatest temple.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the great temple' or 'of the supreme sanctuary.' The Greek reads
      a superlative expression, literally 'of the greatest temple/sanctuary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστολάς
  chosen: with letters
  alternatives:
  - letters
  - written orders
  lexicon: LSJ
  rationale: The accusative is governed by the implied sending context from the preceding
    verse; 'with letters' preserves the instrumental sense without over-specifying
    'written orders,' though that is the practical force.
- source_word: ἐπανελέσθαι
  chosen: capture
  alternatives:
  - take back
  - seize
  - arrest
  lexicon: LSJ
  rationale: In this hostile military-political context, the verb means to take into
    custody or seize. 'Capture' is natural English and fits the context better than
    the more wooden 'take back.'
- source_word: σκορπίσαι
  chosen: scatter
  alternatives:
  - disperse
  - drive apart
  lexicon: LSJ
  rationale: The verb straightforwardly means to scatter or disperse. 'Scatter' is
    concise and preserves the force of breaking up Judas's supporters.
- source_word: καταστῆσαι
  chosen: appoint
  alternatives:
  - install
  - set up
  lexicon: LSJ
  rationale: In administrative context the verb means to appoint or install to office.
    'Appoint' is idiomatic and clear.
- source_word: ἀρχιερέα
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: LSJ
  rationale: Standard rendering for the Jewish office; 'high priest' is the clearest
    established English equivalent.
- source_word: τοῦ μεγίστου ἱεροῦ
  chosen: of the greatest temple
  alternatives:
  - of the great temple
  - of the supreme sanctuary
  lexicon: LSJ
  rationale: The Greek is literally 'of the greatest temple/sanctuary.' Retaining
    'greatest' reflects the superlative μεγίστου rather than flattening it to 'great.'
    'Temple' is more accessible than 'sanctuary' here, though the latter is possible.
