theological_decisions:
- issue: Gendered adverb ἀνδρωδῶς
  chosen_reading: manfully
  alternative_readings:
  - courageously
  - bravely
  rationale: The Greek uses a specifically masculine-coded adverb. Following the project's
    gender-accurate principle, the translation preserves that nuance rather than neutralizing
    it. Because the term describes valor rather than making a doctrinal claim, no
    footnote was judged necessary, but the decision is documented here.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
