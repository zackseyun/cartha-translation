id: 2MA.14.43
reference: 2 Maccabees 14:43
source:
  edition: lxx-swete-1909
  text: τῇ δὲ πληγῇ μὴ κατευκτήσας διὰ τὴν τοῦ ἀγῶνος σπουδὴν, καὶ τῶν ὄχλων ἔσω τῶν
    θυρωμάτων εἰσβαλλόντων, ἀναδραμὼν γενναίως ἐπὶ τὸ τεῖχος, ἀπεκρήμνισεν ἑαυτὸν
    ἀνδρωδῶς εἰς τοὺς ὄχλους.
