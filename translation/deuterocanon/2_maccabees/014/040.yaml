translation:
  text: For he thought that by arresting him he would bring disaster on these people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'For it seemed that by arresting that one he would cause
      calamity for these men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδοξεν
  chosen: he thought
  alternatives:
  - it seemed
  - he decided
  lexicon: LSJ
  rationale: In context the verb introduces the subject's judgment or conclusion.
    'He thought' is natural English and fits the infinitive construction that follows
    better than the more wooden 'it seemed.'
- source_word: συλλαβών
  chosen: by arresting
  alternatives:
  - having seized
  - by capturing
  lexicon: BDAG
  rationale: The participle denotes taking someone into custody. 'By arresting' conveys
    the practical sense in this narrative context more clearly than the more general
    'having seized.'
- source_word: ἐκεῖνον
  chosen: that man
  alternatives:
  - him
  - that one
  lexicon: LSJ
  rationale: The demonstrative points to a specific previously mentioned individual.
    'That man' preserves the demonstrative force more clearly than a bare pronoun
    in English.
- source_word: τούτοις
  chosen: these people
  alternatives:
  - to these men
  - for these people
  lexicon: LSJ
  rationale: The dative refers to the group presently in view. 'These people' is idiomatic
    and broad enough if the group is not restricted to adult males in the immediate
    English rendering, though the Greek form is masculine.
- source_word: ἐνεργάσασθαι
  chosen: he would bring about
  alternatives:
  - to work
  - to cause
  - to accomplish
  lexicon: BDAG
  rationale: The middle infinitive here means to effect or cause something. In the
    final English sentence it is smoothed to 'would bring' for readability while preserving
    causative force.
- source_word: συμφοράν
  chosen: disaster
  alternatives:
  - calamity
  - misfortune
  lexicon: LSJ
  rationale: The noun denotes serious harm or calamity. 'Disaster' is clear modern
    English and matches the severity of the context.
