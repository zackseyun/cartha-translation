translation:
  text: And now, O Lord, holy in all holiness, keep this house, recently purified,
    undefiled forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this temple.' Greek 'this house' is a common biblical way of referring
      to the sanctuary.
    reason: lexical_alternative
  - marker: b
    text: The address 'holy in every holiness' is a close rendering of an unusual
      Greek expression; it may also be understood as 'holy above every consecration'
      or similarly intensive language.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγιε
  chosen: holy
  alternatives:
  - sacred
  - most holy
  lexicon: LSJ
  rationale: Direct vocative adjective addressing God; 'holy' is the standard and
    most transparent rendering.
- source_word: παντὸς ἁγιασμοῦ
  chosen: in every holiness
  alternatives:
  - of all sanctification
  - of every consecration
  lexicon: LSJ
  rationale: The genitive phrase intensifies God's holiness. 'In every holiness' preserves
    the unusual wording without over-paraphrasing; alternatives are possible but less
    natural or more abstract in English.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Follows the project's default rendering for κύριος as a divine title.
- source_word: διατήρησον
  chosen: keep
  alternatives:
  - preserve
  - maintain
  lexicon: LSJ
  rationale: Imperative prayer asking God to preserve the temple's state. 'Keep' is
    concise, natural, and adequately carries the sense of continued preservation.
- source_word: εἰς αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for ever
  lexicon: LSJ
  rationale: Idiomatic English for enduring duration; suitable in a prayer context.
- source_word: ἀμίαντον
  chosen: undefiled
  alternatives:
  - unstained
  - unpolluted
  lexicon: LSJ
  rationale: Cultic purity is in view, so 'undefiled' best preserves the ritual and
    moral resonance.
- source_word: τόνδε τὸν ... οἶκον
  chosen: this house
  alternatives:
  - this temple
  lexicon: LSJ
  rationale: οἶκος here refers to the temple building. 'House' preserves the biblical
    idiom 'house' for God's sanctuary, while remaining understandable in context.
- source_word: προσφάτως κεκαθερισμένον
  chosen: recently purified
  alternatives:
  - newly cleansed
  - just now purified
  lexicon: LSJ
  rationale: προσφάτως means recently/newly, and κεκαθερισμένον denotes having been
    cleansed or purified. 'Recently purified' is clear and preserves the temporal
    emphasis.
