theological_decisions:
- issue: Rendering the temple term οἶκος in a prayer to God
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The Greek literally says 'house,' a common biblical designation for the
    sanctuary. Retaining 'house' preserves the source wording and cultic register
    without obscuring meaning.
  doctrine_reference: Translation philosophy §1, §5
- issue: How to render the unusual address ἄγιε παντὸς ἁγιασμοῦ κύριε
  chosen_reading: O Lord, holy in every holiness
  alternative_readings:
  - O Lord, holy of all holiness
  - O Lord, source of all holiness
  rationale: The phrase is rhetorically elevated and somewhat compressed in Greek.
    The chosen rendering stays close to the wording while avoiding an interpretive
    expansion such as 'source of all holiness,' which the text does not explicitly
    state.
  doctrine_reference: Translation philosophy §1, §6
