theological_decisions:
- issue: Rendering τῶν ἐθνῶν in a Jewish covenantal context
  chosen_reading: the Gentiles
  alternative_readings:
  - the nations
  - the foreigners
  rationale: The contrast is not merely geopolitical but between Israel and non-Israelite
    peoples. 'Gentiles' better preserves the covenantal and religious distinction
    implied in this context.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English'
- issue: Rendering μετʼ ἐπιφανείας
  chosen_reading: with manifestation
  alternative_readings:
  - openly
  - with visible intervention
  - with epiphany
  rationale: The text attributes God's aid to a manifest, evident mode of intervention
    without requiring a more developed technical theological term. The rendering preserves
    the tension between visible help and divine appearance rather than over-interpreting
    it.
  doctrine_reference: Preserve theological tension rather than resolve it
