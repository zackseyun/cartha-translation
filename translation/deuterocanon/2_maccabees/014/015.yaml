translation:
  text: But when they heard of Nikanor’s advance and the attack of the Gentiles, they
    sprinkled themselves with dust and implored the one who had established his people
    forever, and who always, with manifestation, comes to the aid of his own portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nations.' The Greek term can mean 'nations' generally, but in this
      setting it refers to non-Jewish peoples opposed to the Jews.
    reason: lexical_alternative
  - marker: b
    text: Or 'with visible intervention' or 'openly.' The Greek phrase suggests aid
      accompanied by manifest divine action.
    reason: alternative_reading
  - marker: c
    text: '''His own portion'' may also be rendered ''his own inheritance,'' preserving
      the covenantal sense of God''s people as his allotted possession.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσαντες
  chosen: when they heard
  alternatives:
  - having heard
  - after hearing
  lexicon: LSJ
  rationale: Aorist participle introducing the circumstance for the main action. 'When
    they heard' is natural English and preserves the temporal force without awkwardness.
- source_word: ἔφοδον
  chosen: advance
  alternatives:
  - assault
  - onset
  - attack
  lexicon: LSJ
  rationale: The noun denotes a hostile movement or rush. 'Advance' fits the military
    context and avoids redundancy with the following ἐπίθεσιν, which more directly
    means 'attack'.
- source_word: ἐπίθεσιν
  chosen: attack
  alternatives:
  - assault
  - onslaught
  lexicon: LSJ
  rationale: A straightforward military term for an attack. Rendering it distinctly
    from ἔφοδον helps preserve the paired expressions in the Greek.
- source_word: τῶν ἐθνῶν
  chosen: the Gentiles
  alternatives:
  - the nations
  - the foreigners
  lexicon: LSJ
  rationale: In this Jewish historical context, ἔθνη commonly refers to non-Jewish
    peoples hostile to Israel. 'Gentiles' best conveys that covenantal contrast in
    idiomatic English.
- source_word: καταπασάμενοι γῆν
  chosen: they sprinkled themselves with dust
  alternatives:
  - they cast earth upon themselves
  - they threw dust on themselves
  lexicon: LSJ
  rationale: This idiom expresses mourning, distress, and supplication. 'Dust' is
    more idiomatic in English than 'earth' here, while 'sprinkled themselves' reflects
    the middle voice and ritual gesture.
- source_word: ἐλιτάνευσαν
  chosen: implored
  alternatives:
  - entreated
  - made supplication to
  - besought
  lexicon: LSJ
  rationale: The verb denotes earnest petition or supplication. 'Implored' is concise,
    natural, and preserves the intensity.
- source_word: τὸν ἄχρι αἰῶνος συστήσαντα τὸν αὐτοῦ λαόν
  chosen: the one who had established his people forever
  alternatives:
  - the one who had preserved his people forever
  - the one who had constituted his people for all time
  lexicon: LSJ
  rationale: συνίστημι here is best taken as 'establish' or 'set in place.' 'Established
    his people forever' preserves the participial description and the enduring covenantal
    sense of ἄχρι αἰῶνος.
- source_word: ἀεὶ δὲ ... ἀντιλαμβανόμενον
  chosen: and who always ... comes to the aid
  alternatives:
  - and who always supports
  - and who always takes hold to help
  lexicon: LSJ
  rationale: ἀντιλαμβάνομαι can mean to help, support, or come to the aid of. The
    present participle indicates characteristic ongoing action, which 'always ...
    comes to the aid' conveys well.
- source_word: μετʼ ἐπιφανείας
  chosen: with manifestation
  alternatives:
  - openly
  - with visible intervention
  - with epiphany
  lexicon: LSJ
  rationale: The phrase suggests help accompanied by manifest divine appearance or
    evident intervention. 'With manifestation' stays close to the Greek while remaining
    understandable; 'epiphany' would be too specialized here.
- source_word: τῆς ἑαυτοῦ μερίδος
  chosen: his own portion
  alternatives:
  - his own inheritance
  - his own share
  lexicon: LSJ
  rationale: μερίς can denote a portion or allotted share, often with covenantal overtones
    for God's people as his possession. 'His own portion' is literal and preserves
    that theological nuance.
