translation:
  text: But when they swore that they did not know where the man being sought was,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'where the one being sought is.' The Greek uses a substantival participle
      and a present tense within reported speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν ... φασκόντων
  chosen: when they swore
  alternatives:
  - while they were asserting
  - as they were claiming
  lexicon: LSJ
  rationale: 'The genitive absolute with φασκόντων introduces a circumstantial clause.
    Because μεθʼ ὅρκων modifies the asserting, English idiom is best captured by making
    the oath-taking explicit: ''when they swore.'' This preserves both the verbal
    claim and the solemnity of the oath without awkward literalism.'
- source_word: μεθʼ ὅρκων
  chosen: swore
  alternatives:
  - with oaths
  - under oath
  lexicon: LSJ
  rationale: Literally 'with oaths.' In natural English, 'swore' conveys the same
    sense compactly. 'Under oath' could imply a formal judicial setting more specifically
    than the Greek requires.
- source_word: μὴ γινώσκειν
  chosen: did not know
  alternatives:
  - not to know
  - were not knowing
  lexicon: LSJ
  rationale: 'The infinitive depends on φασκόντων and expresses the content of their
    claim. Standard English indirect discourse requires a finite clause: ''that they
    did not know.'''
- source_word: ποῦ ποτʼ ἐστίν
  chosen: where ... was
  alternatives:
  - where ... is
  - where exactly ... is
  lexicon: LSJ
  rationale: Greek has present tense 'is,' but in English sequence after a past reporting
    frame naturally shifts to 'was.' ποτʼ adds an indefinite/emphatic nuance ('where
    on earth/where possibly'), but this is not strong enough to require an expanded
    rendering in the main text.
- source_word: ὁ ζητούμενος
  chosen: the man being sought
  alternatives:
  - the one being sought
  - the wanted man
  - the man sought
  lexicon: LSJ
  rationale: 'The participle is substantival: ''the one being sought.'' In context
    it refers to a person being searched for. ''The man being sought'' is clear and
    idiomatic while preserving the passive sense. ''Wanted man'' sounds too modern
    and juridically loaded.'
