translation:
  text: So they set a day on which they would come together privately; and from each
    side a sedan chair was brought forward, and seats were set out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek δίφραξ is rare here and may denote a litter, sedan chair, or similar
      portable seat; the exact form of the conveyance is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτάξαντο
  chosen: they set
  alternatives:
  - they appointed
  - they arranged
  lexicon: LSJ
  rationale: Middle of τάσσω here denotes arranging or appointing a time. 'Set' is
    concise modern English and fits the object 'a day' naturally.
- source_word: ἡμέραν
  chosen: a day
  alternatives:
  - the day
  - an appointed day
  lexicon: LSJ
  rationale: 'The anarthrous noun is indefinite in English context: they fixed a particular
    meeting day. ''A day'' preserves the Greek without over-specifying.'
- source_word: κατʼ ἰδίαν
  chosen: privately
  alternatives:
  - in private
  - by themselves
  lexicon: LSJ
  rationale: The phrase means privately or apart from others. 'Privately' gives smooth
    English while preserving the sense of a non-public meeting.
- source_word: ἥξουσιν εἰς τὸ αὐτό
  chosen: they would come together
  alternatives:
  - they would come to the same place
  - they would meet
  lexicon: LSJ
  rationale: Literally 'they will come into the same [place/state].' In idiomatic
    English the sense is that they meet or come together. 'Come together' preserves
    more of the Greek wording than simply 'meet'.
- source_word: προῆλθε
  chosen: was brought forward
  alternatives:
  - came forward
  - was produced
  lexicon: LSJ
  rationale: Although singular in form, the verb introduces the ceremonial preparation
    that follows. In context with the furnishing language, a passive-like English
    rendering best conveys that the conveyance was made ready or brought out.
- source_word: παρʼ ἑκάστου
  chosen: from each side
  alternatives:
  - from each one
  - by each party
  lexicon: LSJ
  rationale: The phrase likely refers to each of the two parties involved in the meeting
    rather than to every individual present. 'From each side' makes the narrative
    sense clear in English.
- source_word: δίφραξ
  chosen: sedan chair
  alternatives:
  - litter
  - carriage
  lexicon: LSJ
  rationale: The term denotes a portable seat or litter-like conveyance rather than
    a wheeled war chariot. 'Sedan chair' best captures a carried ceremonial seat in
    accessible English; 'litter' is possible but less immediately clear to modern
    readers.
- source_word: ἔθεσαν δίφρους
  chosen: seats were set out
  alternatives:
  - they set chairs
  - they placed seats
  lexicon: LSJ
  rationale: δίφρος can mean seat, stool, or chair. Because the Greek shifts to plural
    and the exact furniture type is not the point, 'seats' is a natural, sufficiently
    formal rendering.
