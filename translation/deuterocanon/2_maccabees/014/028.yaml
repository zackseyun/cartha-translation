translation:
  text: But when these men fell before Nikanor, he was thrown into confusion and took
    it badly that he should set aside the agreed terms, though the man had done no
    wrong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fell at Nikanor's feet,' expressing supplication.
    reason: lexical_alternative
  - marker: b
    text: Or 'the arrangements already made' or 'the agreement.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσπεσόντων
  chosen: fell before
  alternatives:
  - fell at the feet of
  - appealed to
  lexicon: LSJ
  rationale: Aorist participle of προσπίπτω can denote physically falling before someone
    in supplication. In context of petitioners approaching Nikanor, 'fell before'
    preserves the bodily image while allowing the implied appeal.
- source_word: συνεκέχυτο
  chosen: was thrown into confusion
  alternatives:
  - was disturbed
  - was upset
  - was confounded
  lexicon: LSJ
  rationale: The verb suggests being inwardly agitated or confounded. 'Was thrown
    into confusion' captures the passive-like emotional disarray more fully than a
    flatter 'was upset.'
- source_word: δυσφόρως ἔφερεν
  chosen: took it badly
  alternatives:
  - was deeply displeased
  - bore it with resentment
  lexicon: LSJ
  rationale: This idiom conveys bearing something with difficulty or displeasure.
    'Took it badly' is idiomatic modern English that preserves the sense of resentful
    distress without over-paraphrasing.
- source_word: τὰ διεσταλμένα
  chosen: the agreed terms
  alternatives:
  - the arrangements made
  - the terms laid down
  - the agreement
  lexicon: LSJ
  rationale: The perfect middle/passive participial form used substantivally points
    to matters that had been arranged or agreed upon beforehand. 'The agreed terms'
    fits the diplomatic context of an established arrangement between parties.
- source_word: ἀθετήσει
  chosen: set aside
  alternatives:
  - nullify
  - break
  - invalidate
  lexicon: LSJ
  rationale: The verb means to reject, annul, or set aside. 'Set aside' is natural
    English and leaves open whether the action is formal annulment or practical repudiation.
- source_word: μηδὲν τἀνδρὸς ἠδικηκότος
  chosen: though the man had done no wrong
  alternatives:
  - since the man had done no injustice
  - when the man had wronged no one
  lexicon: LSJ
  rationale: The genitive absolute states that the man in question had committed no
    injustice. 'Though the man had done no wrong' is clear, idiomatic, and preserves
    the moral-legal force of ἀδικέω.
- source_word: Νικάνορι
  chosen: Nikanor
  alternatives:
  - Nicanor
  rationale: Per project philosophy, personal names are transliterated rather than
    anglicized through later tradition. 'Nikanor' reflects the Greek form directly.
