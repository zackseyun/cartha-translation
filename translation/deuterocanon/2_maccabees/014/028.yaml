theological_decisions:
- issue: Moral characterization in μηδὲν τἀνδρὸς ἠδικηκότος
  chosen_reading: The clause is rendered as an assertion that the man had done no
    wrong, without expanding it into a broader claim of innocence beyond the verse.
  alternative_readings:
  - the man had wronged no one
  - the man had committed no injustice
  rationale: The text makes a limited moral-legal claim tied to the immediate situation.
    The translation preserves that claim without importing larger doctrinal or historical
    judgments.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
