  text: Ῥαζεὶς δὲ τις τῶν ἀπὸ Ἱεροσολύμων πρεσβυτέρων ἐμηνύθη τῷ Νικάνορι ἀνὴρ φιλοπολίτης
    καὶ σφόδρα καλῶς ἀκούων, καὶ κατὰ τὴν εὔνοιαν πατὴρ τῶν Ἰουδαίων προσαγορευόμενος.
