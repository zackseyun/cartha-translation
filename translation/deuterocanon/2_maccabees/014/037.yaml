translation:
  text: Now a certain Razis, one of the elders from Jerusalem, was reported to Nicanor—a
    man devoted to his city and very well spoken of, and because of his goodwill called
    the father of the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was denounced to Nicanor.' The Greek verb can carry the sense of being
      informed against in a hostile setting.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a lover of his city'; that is, one devoted to the welfare of
      his people and civic community.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ῥαζεὶς
  chosen: Razis
  alternatives:
  - Rhazis
  lexicon: LSJ
  rationale: Personal name is transliterated rather than translated, following project
    policy. 'Razis' reflects a standard English transliteration from the Greek form.
- source_word: πρεσβυτέρων
  chosen: elders
  alternatives:
  - older men
  - senators
  lexicon: LSJ
  rationale: In this context the term most naturally denotes recognized senior/community
    leaders from Jerusalem, not merely men advanced in age. 'Elders' preserves that
    social-political nuance.
- source_word: ἐμηνύθη
  chosen: was reported
  alternatives:
  - was denounced
  - was informed against
  - was disclosed
  lexicon: LSJ
  rationale: The passive indicates that information about Razis was conveyed to Nicanor.
    Because the context is hostile and leads to action against him, 'was reported'
    captures the sense without overcommitting to the more loaded 'denounced,' which
    remains possible.
- source_word: φιλοπολίτης
  chosen: devoted to his city
  alternatives:
  - patriotic
  - lover of his city
  - public-spirited
  lexicon: LSJ
  rationale: The compound literally conveys love for one's city/polis. 'Devoted to
    his city' preserves the civic loyalty sense in natural English better than the
    potentially anachronistic 'patriotic.'
- source_word: σφόδρα καλῶς ἀκούων
  chosen: very well spoken of
  alternatives:
  - held in very high repute
  - having a very good reputation
  - highly regarded
  lexicon: LSJ
  rationale: The idiom refers to reputation or public esteem. 'Very well spoken of'
    closely reflects the Greek wording while remaining idiomatic English.
- source_word: εὔνοιαν
  chosen: goodwill
  alternatives:
  - benevolence
  - loyal affection
  - kindness
  lexicon: LSJ
  rationale: The noun denotes favorable disposition or benevolence. 'Goodwill' is
    concise and fits the explanatory phrase about why he was called 'father of the
    Jews.'
- source_word: πατὴρ τῶν Ἰουδαίων
  chosen: the father of the Jews
  alternatives:
  - a father of the Jews
  - father to the Jews
  lexicon: LSJ
  rationale: The anarthrous Greek predicate with participle can be rendered idiomatically
    in English with 'the father of the Jews,' expressing an honorific title rather
    than biological paternity. This best matches the commendatory tone.
- source_word: προσαγορευόμενος
  chosen: called
  alternatives:
  - addressed as
  - named
  - designated
  lexicon: LSJ
  rationale: The participle indicates customary appellation. 'Called' is simple, accurate,
    and natural in English.
