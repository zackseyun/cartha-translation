theological_decisions:
- issue: Honorific description of Razis
  chosen_reading: Render the commendatory civic and communal titles straightforwardly
    without either amplifying or diminishing them.
  alternative_readings:
  - Use more interpretive language such as 'patriot' or 'benefactor of the nation'
  rationale: The verse presents Razis in strongly favorable terms. The translation
    preserves that positive portrayal from the Greek itself while avoiding added ideological
    freight not explicit in the wording.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Original-language primacy over translation tradition.'
