translation:
  text: Already becoming completely drained of blood, he pulled out his entrails and,
    taking them in both hands, hurled them at the crowds; and calling on the Master
    of life and spirit to give these back to him again, in this way he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brandished them before the crowds'; the Greek verb can denote a forceful
      shaking/displaying gesture, not only throwing.
    reason: lexical_alternative
  - marker: b
    text: '''Spirit'' may also be understood as ''breath''; the phrase could be rendered
      ''Master of life and breath.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: παντελῶς ἔξαιμος
  chosen: completely drained of blood
  alternatives:
  - utterly bloodless
  - completely exsanguinated
  lexicon: LSJ
  rationale: παντελῶς intensifies ἔξαιμος. A medically precise term like 'exsanguinated'
    is too technical for the project's style, while 'bloodless' can sound figurative
    in English. 'Completely drained of blood' preserves the graphic literal sense
    in readable modern English.
- source_word: ἤδη γινόμενος
  chosen: already becoming
  alternatives:
  - already being
  - now becoming
  lexicon: LSJ
  rationale: The participle with ἤδη marks an ongoing state already underway. 'Already
    becoming' keeps the processive force rather than flattening it to a static description.
- source_word: προβαλὼν
  chosen: pulled out
  alternatives:
  - thrust out
  - cast forth
  - brought out
  lexicon: LSJ
  rationale: In context with τὰ ἔντερα, the verb describes physically bringing his
    entrails out from his body. 'Pulled out' is vivid and idiomatic without adding
    detail beyond the Greek.
- source_word: τὰ ἔντερα
  chosen: his entrails
  alternatives:
  - his intestines
  - his inner organs
  lexicon: LSJ
  rationale: The term refers to the internal organs/entrails. 'Entrails' best matches
    the gruesome narrative register and common English usage in such contexts.
- source_word: λαβὼν ἑκατέραις ταῖς χερσίν
  chosen: taking them in both hands
  alternatives:
  - having taken them with both hands
  lexicon: LSJ
  rationale: ἑκατέραις ταῖς χερσίν means 'with both hands.' 'Taking them in both hands'
    is natural English and preserves the participial sequence.
- source_word: ἐνέσεισε
  chosen: hurled
  alternatives:
  - shook at
  - brandished before
  - threw toward
  lexicon: LSJ
  rationale: The verb can mean to shake or brandish, but with the direct object being
    entrails and the dative τοῖς ὄχλοις, the action is forceful and demonstrative.
    'Hurled' best captures the violent gesture in context, though a less ballistic
    nuance is possible.
- source_word: τοῖς ὄχλοις
  chosen: at the crowds
  alternatives:
  - to the crowds
  - before the crowds
  lexicon: LSJ
  rationale: The dative here marks the people toward whom the action is directed.
    'At the crowds' fits the violent demonstrative action better than the more neutral
    'to the crowds.'
- source_word: τὸν δεσπόζοντα
  chosen: the Master
  alternatives:
  - the Lord
  - the Sovereign
  lexicon: LSJ
  rationale: δεσπόζω/δεσπότης language emphasizes sovereign mastery rather than the
    covenantal/title nuance of κύριος. 'Master' preserves that distinction and avoids
    importing a different title.
- source_word: τῆς ζωῆς καὶ τοῦ πνεύματος
  chosen: of life and spirit
  alternatives:
  - of life and breath
  - of life and the spirit
  lexicon: LSJ
  rationale: πνεῦμα can mean spirit or breath. Here, paired with ζωή and in a prayer
    about restoration after death, 'spirit' better preserves the broader anthropological
    and theological sense, while still allowing the life-breath nuance.
- source_word: τὰ αὐτὰ αὐτῷ πάλιν ἀποδοῦναι
  chosen: to give these back to him again
  alternatives:
  - to restore the same things to him again
  - to return them to him
  lexicon: LSJ
  rationale: τὰ αὐτά most naturally refers back to the life/spirit just mentioned.
    'Give these back to him again' is idiomatic and preserves the concrete expectation
    of restoration.
- source_word: μετήλλαξεν
  chosen: he died
  alternatives:
  - he departed this life
  - he passed away
  lexicon: LSJ
  rationale: The verb literally means to change/exchange, here a euphemism for death.
    'He died' communicates the sense plainly in modern English without archaic circumlocution.
