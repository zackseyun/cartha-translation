id: 2MA.14.26
reference: 2 Maccabees 14:26
source:
  edition: lxx-swete-1909
  text: Ὁ δὲ Ἄλκιμος συνιδὼν τὴν πρὸς ἀλλήλους εὔνοιαν καὶ τὰς γενομένας συνθήκας
    λαβὼν ἧκεν πρὸς τὸν Δημήτριον, καὶ ἔλεγεν τὸν Νικάνορα ἀλλότρια φρονεῖν τῶν πραγμάτων·
    τὸν γὰρ ἐπίβουλον τῆς βασιλείας αὐτοῦ Ἰούδαν διάδοχον ἀπέδειξεν.
