theological_decisions:
- issue: Political sense of the accusation against Nicanor
  chosen_reading: Rendered the idiom as a charge that Nicanor was acting contrary
    to the interests of the state/realm.
  alternative_readings:
  - Rendered more literally as 'was thinking alien things concerning affairs'
  rationale: This is not a doctrinally contested phrase but an interpretive one. The
    Greek idiom is awkward if translated woodenly; the chosen rendering preserves
    the political accusation without importing extra theology.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of διάδοχον in relation to Judas
  chosen_reading: Nicanor is accused of appointing Judas as successor.
  alternative_readings:
  - Nicanor is accused of presenting Judas as heir
  - Nicanor is accused of designating Judas as replacement
  rationale: The Greek naturally suggests designation to succession. 'Successor' is
    the most direct rendering and avoids over-specifying hereditary implications that
    'heir' might suggest.
  doctrine_reference: Translation philosophy §1, §5
