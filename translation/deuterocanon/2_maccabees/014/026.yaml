translation:
  text: But Alcimus, perceiving the goodwill they had toward one another and learning
    of the agreements that had been made, came to Demetrius and said that Nicanor
    was acting contrary to the interests of the state; for he had appointed Judas,
    the plotter against his kingdom, as successor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'was thinking things alien to public affairs.' The Greek
      idiom conveys political disloyalty or conduct contrary to the interests of the
      realm.
    reason: lexical_alternative
  - marker: b
    text: '''Agreements'' may also be rendered ''treaties'' or ''terms,'' referring
      to the arrangements made between the parties.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνιδὼν
  chosen: perceiving
  alternatives:
  - seeing
  - realizing
  - understanding
  lexicon: LSJ
  rationale: The participle denotes more than mere visual sight; it conveys recognizing
    or becoming aware of the situation. 'Perceiving' fits the political context and
    natural English.
- source_word: εὔνοιαν
  chosen: goodwill
  alternatives:
  - favor
  - friendship
  - kindly feeling
  lexicon: LSJ
  rationale: In context this refers to amicable disposition between parties. 'Goodwill'
    preserves the relational and political nuance without overstating intimacy.
- source_word: συνθήκας
  chosen: agreements
  alternatives:
  - treaties
  - terms
  - covenants
  lexicon: LSJ
  rationale: The word refers to arrangements or compacts made between parties. 'Agreements'
    is broad and clear; 'treaties' may sound too formal for the immediate context,
    though it remains possible.
- source_word: λαβὼν
  chosen: learning of
  alternatives:
  - receiving
  - having learned
  - taking note of
  lexicon: LSJ
  rationale: Although literally 'having received,' with τὰς γενομένας συνθήκας it
    idiomatically points to receiving news or report of the agreements. 'Learning
    of' communicates the sense in idiomatic English.
- source_word: ἀλλότρια φρονεῖν τῶν πραγμάτων
  chosen: was acting contrary to the interests of the state
  alternatives:
  - was thinking alien things about affairs
  - was taking a line foreign to the situation
  - was acting against public interests
  lexicon: LSJ
  rationale: The idiom is political and somewhat compressed. A too-literal rendering
    ('thinking alien things') is obscure in English. 'Contrary to the interests of
    the state' captures the sense of disloyal or politically harmful conduct in relation
    to public affairs.
- source_word: τῶν πραγμάτων
  chosen: the state
  alternatives:
  - affairs
  - matters
  - public affairs
  lexicon: LSJ
  rationale: In this political accusation, πράγματα likely refers to affairs of government
    or the realm rather than generic 'things.' 'The state' makes the accusation intelligible
    in English while preserving the political force.
- source_word: ἐπίβουλον
  chosen: the plotter against
  alternatives:
  - the conspirator against
  - the one plotting against
  - the enemy of
  lexicon: LSJ
  rationale: The adjective denotes one who schemes against another. 'Plotter against'
    preserves the hostile and conspiratorial nuance directed toward the kingdom.
- source_word: διάδοχον
  chosen: as successor
  alternatives:
  - successor
  - heir
  - next in line
  lexicon: LSJ
  rationale: The term means successor or one designated to follow. Because it is the
    predicate of ἀπέδειξεν, 'appointed ... as successor' is the clearest English expression.
- source_word: ἀπέδειξεν
  chosen: had appointed
  alternatives:
  - had designated
  - had shown to be
  - had declared
  lexicon: LSJ
  rationale: In this context the verb carries the sense of appointing or designating
    someone to office or succession. 'Had appointed' best fits the accusation made
    to Demetrius.
