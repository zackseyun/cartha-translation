id: 2MA.14.30
reference: 2 Maccabees 14:30
source:
  edition: lxx-swete-1909
  text: ὁ δὲ Μακκαβαῖος αἰσθητήριον διεξαγαγόντος συνιδὼν τὸν Νικάνορα τὰ πρὸς αὐτόν,
    καὶ τὴν ἠθισμένην ἀπάντησιν ἀγριωτέρως ἐσχηκότα, νοήσας οὐκ ἀπὸ τοῦ βελτίστου
    τὴν αὐστηρίαν εἶναι, συστρέψας οὐκ ὀλίγους τῶν περὶ αὐτὸν, συνεκρύπτετο τὸν Νικάνορα.
  language: Greek
