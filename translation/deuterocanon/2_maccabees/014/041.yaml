translation:
  text: But when the crowds were about to seize the tower, and were forcing the courtyard
    gate, and were ordering that fire be brought and the doors set on fire, he, completely
    surrounded, put the sword to himself;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fell upon his sword' or 'thrust the sword into himself.' The Greek more
      literally says 'put the sword to himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν ... πληθῶν
  chosen: the crowds
  alternatives:
  - the masses
  - the mob
  - the multitude
  lexicon: LSJ
  rationale: πλῆθος commonly denotes a crowd or multitude. In this violent siege context,
    'the crowds' is natural modern English without over-interpreting as 'mob,' which
    would add a pejorative nuance not explicit in the noun itself.
- source_word: μελλόντων
  chosen: were about to
  alternatives:
  - intending to
  - being on the point of
  lexicon: LSJ
  rationale: The participle with infinitive indicates imminence. 'Were about to' preserves
    the sense that the action was impending rather than already completed.
- source_word: τὸν πύργον καταλαβέσθαι
  chosen: to seize the tower
  alternatives:
  - to take the tower
  - to capture the tower
  lexicon: LSJ
  rationale: καταλαμβάνω here carries the sense of taking possession of or capturing.
    'Seize' fits the immediate assault context and reads idiomatically.
- source_word: τὴν αὐλαίαν θύραν
  chosen: the courtyard gate
  alternatives:
  - the outer gate
  - the court gate
  lexicon: LSJ
  rationale: αὐλαία relates to a court or courtyard area; θύρα can be door or gate
    depending on scale. In a fortified setting, 'courtyard gate' best conveys the
    architectural sense.
- source_word: βιαζομένων
  chosen: were forcing
  alternatives:
  - were breaking through
  - were pressing hard against
  - were using violence against
  lexicon: LSJ
  rationale: The middle/passive participle from βιάζω conveys violent force. 'Were
    forcing' is concise and suits an attempt to break in through a gate.
- source_word: κελευόντων πῦρ προσάγειν
  chosen: were ordering that fire be brought
  alternatives:
  - were commanding that fire be applied
  - were giving orders to bring fire
  lexicon: LSJ
  rationale: κελεύω is 'order/command'; προσάγειν with πῦρ means to bring fire up
    to something, i.e., for burning. The rendering keeps the sequence of commands
    explicit.
- source_word: τὰς θύρας ὑφάπτειν
  chosen: the doors set on fire
  alternatives:
  - the doors ignited
  - the doors kindled underneath
  lexicon: LSJ
  rationale: ὑφάπτω means kindle, set alight. Because the object is doors/gates under
    assault, 'set on fire' is the clearest idiomatic English.
- source_word: τὰς θύρας φλέγειν
  chosen: and burned
  alternatives:
  - and consumed with fire
  - and blaze against
  lexicon: LSJ
  rationale: 'The text uses two near-synonymous burning verbs in succession. Rather
    than collapse them, the translation preserves the rhetorical piling up: first
    ''set on fire,'' then ''burned.'''
- source_word: περικάλυπτος γενόμενος
  chosen: completely surrounded
  alternatives:
  - hemmed in on every side
  - covered over
  - enclosed
  lexicon: LSJ
  rationale: The participial phrase indicates being enclosed or surrounded. In context
    of enemies breaching the place, 'completely surrounded' best captures the situational
    force.
- source_word: ὑπέθηκεν ἑαυτῷ τὸ ξίφος
  chosen: put the sword to himself
  alternatives:
  - thrust the sword into himself
  - applied the sword to himself
  - fell upon his sword
  lexicon: LSJ
  rationale: The Greek states literally that he placed/applied the sword to himself.
    'Put the sword to himself' stays close to the wording without importing the more
    interpretive idiom 'fell upon his sword,' which may suggest a different motion
    than the Greek verb itself.
