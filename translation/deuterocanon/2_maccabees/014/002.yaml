translation:
  text: having gained control of the country, after removing Antiochus and his guardian
    Lysias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after removing Antiochus and his regent Lysias.' The Greek ἐπίτροπον
      can mean 'guardian,' 'steward,' or in context 'regent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κεκρατηκέναι
  chosen: having gained control
  alternatives:
  - to have seized
  - to have held power over
  - to have become master of
  lexicon: LSJ
  rationale: Perfect infinitive of κρατέω, expressing completed possession or mastery.
    'Having gained control' fits the infinitival construction in context and communicates
    political/military dominance without overstating permanence.
- source_word: τῆς χώρας
  chosen: of the country
  alternatives:
  - of the land
  - of the region
  lexicon: LSJ
  rationale: χώρα commonly denotes land, country, or territory. 'Country' best suits
    the political sense here, referring to the realm under contention rather than
    soil or countryside in a narrow sense.
- source_word: ἐπανελόμενον
  chosen: after overthrowing
  alternatives:
  - after removing
  - after taking up against
  - after destroying
  lexicon: LSJ
  rationale: The participle from ἐπαναιρέω here most naturally carries the sense of
    removing or doing away with political rivals. 'After overthrowing' captures the
    dynastic-political force in idiomatic English without requiring a narrower sense
    such as killing in the translation itself.
- source_word: Ἀντίοχον
  chosen: Antiochus
  rationale: Personal name transliterated according to project policy.
- source_word: ἐπίτροπον
  chosen: guardian
  alternatives:
  - regent
  - guardian-tutor
  - administrator
  lexicon: LSJ
  rationale: ἐπίτροπος can denote a guardian, steward, or regent. In this historical
    setting Lysias functioned as the king's appointed overseer/regent, but 'guardian'
    is the most direct lexical equivalent to the Greek; the more political nuance
    is preserved as an alternative.
- source_word: Λυσίαν
  chosen: Lysias
  rationale: Personal name transliterated according to project policy.
