translation:
  text: But those who had driven Judas out of Judea kept flocking in droves to Nicanor
    from among the nations, thinking that the misfortunes and disasters of the Jews
    would become their own prosperity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kept joining Nicanor with the nations'; the Greek uses ἔθνη ('nations,'
      often 'Gentiles') with a compressed construction that can be understood in more
      than one way.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ... πεφυγαδευκότες
  chosen: those who had driven ... out
  alternatives:
  - those who had put ... to flight
  - those who had banished ...
  lexicon: LSJ
  rationale: The perfect participle of φυγαδεύω denotes causing someone to flee or
    driving into exile. In context, the sense is not merely that they themselves had
    fled, but that they had been instrumental in forcing Judas out of Judea. 'Driven
    ... out' is natural English and preserves the causative force.
- source_word: ἐπὶ τῆς Ἰουδαίας
  chosen: out of Judea
  alternatives:
  - from Judea
  - from the land of Judea
  lexicon: LSJ
  rationale: With πεφυγαδευκότες, the phrase marks the place from which Judas was
    expelled. 'Out of Judea' best fits the English idiom with 'driven out.'
- source_word: ἔθνη
  chosen: from among the nations
  alternatives:
  - Gentiles
  - the nations
  lexicon: LSJ
  rationale: ἔθνη can mean 'nations' or, in Jewish contexts, 'Gentiles.' Here the
    syntax is compressed and likely indicates that these Judean opponents were mixing
    with or joining Nicanor in company with the nations. To avoid overinterpreting
    ethnic identity while preserving the Jewish-context nuance, 'from among the nations'
    is used in the sentence. 'Gentiles' is a plausible alternative but slightly more
    interpretive.
- source_word: συνέμιγνυν
  chosen: kept flocking in
  alternatives:
  - were joining
  - were mixing with
  - were associating with
  lexicon: LSJ
  rationale: The verb literally means 'were mixing with' or 'joining.' Because it
    is modified by ἀγεληδόν ('in herds, in droves'), an English expression that conveys
    repeated mass joining is preferable. 'Kept flocking in' captures both the social
    alignment and the crowding movement.
- source_word: ἀγεληδόν
  chosen: in droves
  alternatives:
  - in herds
  - in crowds
  - in packs
  lexicon: LSJ
  rationale: The adverb has the vivid sense 'in herds' or 'in droves.' 'In droves'
    is idiomatic modern English and preserves the pejorative massing effect without
    sounding overly wooden.
- source_word: τῷ Νικάνορι
  chosen: to Nicanor
  alternatives:
  - with Nicanor
  lexicon: LSJ
  rationale: The dative with συνέμιγνυν can be rendered 'with Nicanor,' but because
    the broader image is of people streaming to join his side, 'to Nicanor' reads
    more naturally in English while preserving the directional sense created by the
    whole clause.
- source_word: ἀτυχίας
  chosen: misfortunes
  alternatives:
  - ill luck
  - adversities
  - calamities
  lexicon: LSJ
  rationale: ἀτυχία denotes bad fortune or misfortune. 'Misfortunes' is straightforward
    and pairs well with συμφοραί without collapsing the two terms into one.
- source_word: συμφοράς
  chosen: disasters
  alternatives:
  - calamities
  - ruinous troubles
  lexicon: LSJ
  rationale: συμφορά often denotes a serious calamity or disaster. 'Disasters' gives
    stronger force than 'troubles' and preserves the rhetorical piling up with ἀτυχίας.
- source_word: ἰδίας εὐημερίας
  chosen: their own prosperity
  alternatives:
  - their own success
  - their own well-being
  lexicon: LSJ
  rationale: εὐημερία refers to prosperity or well-being. 'Their own prosperity' best
    matches the contrast with the Jews' misfortunes and keeps the selfish opportunism
    explicit.
- source_word: δοκοῦντες ἔσεσθαι
  chosen: thinking that ... would become
  alternatives:
  - supposing that ... would be
  - imagining that ... would turn into
  lexicon: LSJ
  rationale: The participle plus future infinitive expresses their expectation or
    assumption about the outcome. 'Thinking that ... would become' is clear, idiomatic,
    and preserves the prospective sense.
