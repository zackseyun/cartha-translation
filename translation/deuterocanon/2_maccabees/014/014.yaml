theological_decisions:
- issue: Rendering ἔθνη in a Jewish historical context
  chosen_reading: from among the nations
  alternative_readings:
  - Gentiles
  - the nations
  rationale: The term often carries the sense 'Gentiles' in Jewish literature, but
    the immediate syntax is compressed and the verse's main point is political opportunism
    rather than a theological contrast between Jew and Gentile. The chosen rendering
    preserves the ethnic-political setting without forcing a narrower interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
