translation:
  text: Nicanor stayed on in Jerusalem and did nothing out of place; and he dismissed
    the gathered crowds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the assembled rabble' or more literally 'the herd-like crowds.' The
      Greek adjective carries a pejorative sense for people acting as an unruly mass.
    reason: lexical_alternative
lexical_decisions:
- source_word: διέτριβεν
  chosen: stayed on
  alternatives:
  - spent time
  - remained
  lexicon: LSJ
  rationale: The imperfect indicates continued presence or residence for a period.
    'Stayed on' is natural English that preserves the durative sense better than a
    simple 'stayed' while avoiding over-interpretation.
- source_word: ἔπραττεν οὐδὲν ἄτοπον
  chosen: did nothing out of place
  alternatives:
  - did nothing improper
  - did nothing amiss
  - did nothing unreasonable
  lexicon: LSJ
  rationale: ἄτοπος can mean improper, strange, or out of place. In this political
    narrative context, the phrase indicates that Nicanor behaved without misconduct
    or disturbance. 'Did nothing out of place' keeps the idiomatic breadth without
    sounding overly formal.
- source_word: συναχθέντας
  chosen: gathered
  alternatives:
  - assembled
  - collected together
  lexicon: LSJ
  rationale: A straightforward participial sense; 'gathered' is concise and idiomatic
    in English.
- source_word: ἀγελαίους
  chosen: mob-like
  alternatives:
  - herd-like
  - rabble-like
  - in bands
  lexicon: LSJ
  rationale: The adjective literally evokes a herd or pack and is pejorative when
    applied to people. 'Mob-like' communicates the contemptuous sense in readable
    modern English better than the wooden 'herd-like.'
- source_word: ὄχλους
  chosen: crowds
  alternatives:
  - mobs
  - multitudes
  lexicon: LSJ
  rationale: ὄχλοι commonly means crowds or masses. Because the pejorative force is
    already carried by ἀγελαίους, 'crowds' avoids doubling the negativity too heavily,
    while 'mob-like crowds' together conveys the full sense.
- source_word: ἀπέλυσεν
  chosen: dismissed
  alternatives:
  - sent away
  - released
  lexicon: LSJ
  rationale: In context this refers to dispersing the assembled groups rather than
    freeing prisoners. 'Dismissed' fits the social-political setting well.
