theological_decisions:
- issue: Rendering of divine description τὸν διὰ παντὸς ὑπέρμαχον τοῦ ἔθνους ἡμῶν
  chosen_reading: the one who is always the defender of our nation
  alternative_readings:
  - the one who always fights for our nation
  - the perpetual champion of our nation
  rationale: The phrase describes God functionally as the continual protector of Israel.
    'Defender' preserves the martial-protective nuance of ὑπέρμαχος without sounding
    archaic or overstating beyond the text.
  doctrine_reference: Translation philosophy §§1, 6; preserve source meaning in readable
    modern English.
