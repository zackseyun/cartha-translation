translation:
  text: 'After saying these things, he went away. But the priests, stretching out
    their hands toward heaven, were calling on the one who is always the defender
    of our nation, saying these things:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who always fights for our nation'; the Greek term carries the
      sense of a champion or defender in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοσαῦτα
  chosen: these things
  alternatives:
  - so much
  - such things
  lexicon: LSJ
  rationale: Idiomatic accusative object with εἰπών; 'these things' is natural English
    and preserves the reference to the preceding speech without over-paraphrasing.
- source_word: εἰπὼν
  chosen: saying
  alternatives:
  - having said
  - after saying
  lexicon: LSJ
  rationale: Rendered in the temporal participial sense with 'after saying' in the
    full clause for readable English while preserving the sequence of action.
- source_word: ἀπῆλθεν
  chosen: he went away
  alternatives:
  - he departed
  - he left
  lexicon: LSJ
  rationale: A straightforward narrative verb of departure; 'went away' is clear modern
    English and slightly less formal than 'departed'.
- source_word: προτείναντες τὰς χεῖρας
  chosen: stretching out their hands
  alternatives:
  - extending their hands
  - holding out their hands
  lexicon: LSJ
  rationale: Captures the physical prayer gesture explicitly described in the Greek;
    participial form is preserved in relation to the main verb.
- source_word: εἰς τὸν οὐρανόν
  chosen: toward heaven
  alternatives:
  - to heaven
  - into heaven
  lexicon: LSJ
  rationale: With the gesture of raised hands, 'toward heaven' best conveys direction
    without implying entry into heaven.
- source_word: ἐπεκαλοῦντο
  chosen: were calling on
  alternatives:
  - were invoking
  - called upon
  lexicon: LSJ
  rationale: Imperfect tense suggests ongoing or earnest action; 'were calling on'
    preserves that aspect and is accessible English.
- source_word: τὸν διὰ παντὸς ὑπέρμαχον
  chosen: the one who is always the defender
  alternatives:
  - the perpetual champion
  - the one who continually fights for
  lexicon: LSJ
  rationale: ὑπέρμαχος denotes one who fights in defense of another; 'defender' communicates
    the protective sense clearly, while διὰ παντός is expressed as 'always.'
- source_word: τοῦ ἔθνους ἡμῶν
  chosen: of our nation
  alternatives:
  - of our people
  - of our race
  lexicon: LSJ
  rationale: ἔθνος here refers to the Jewish national community. 'Nation' preserves
    the corporate-political sense better than the broader 'people.'
- source_word: ταῦτα λέγοντες
  chosen: saying these things
  alternatives:
  - saying as follows
  - speaking these words
  lexicon: LSJ
  rationale: This introduces the content of the priests' prayer in the next verse;
    'saying these things' stays close to the Greek and avoids adding wording not present.
