theological_decisions:
- issue: Rendering of ἱερόν in reference to the Jerusalem sanctuary
  chosen_reading: temple
  alternative_readings:
  - sanctuary
  - temple precinct
  rationale: ἱερόν can denote the sanctuary complex broadly. 'Temple' is the most
    natural English rendering here and fits the narrative setting; no doctrinal issue
    is resolved by choosing it, but the broader sense is preserved in the rationale.
  doctrine_reference: 'Translation philosophy: readable modern English; consistency
    of key terms, or documented exception.'
