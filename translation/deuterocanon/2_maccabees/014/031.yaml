translation:
  text: But when the other man realized that he had been skillfully outmaneuvered
    by the man, he came to the greatest and holy temple, while the priests were offering
    the customary sacrifices, and ordered them to hand over the man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the great and holy temple.' The Greek uses a superlative ('greatest'),
      which may function idiomatically as an exalted description of the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συγνοὺς
  chosen: when ... realized
  alternatives:
  - having perceived
  - when he understood
  lexicon: LSJ
  rationale: Aorist participle from γιγνώσκω/sygignōskō sense 'perceive, realize,
    understand.' In English, 'when ... realized' best carries the participial force
    naturally in narrative sequence.
- source_word: ὁ ἕτερος
  chosen: the other man
  alternatives:
  - the other one
  - the other
  lexicon: LSJ
  rationale: Refers back to the opposing figure in the narrative; adding 'man' makes
    the English clear and matches the later τὸν ἄνδρα.
- source_word: γενναίως
  chosen: by the man’s boldness
  alternatives:
  - nobly
  - bravely
  - gallantly
  lexicon: LSJ
  rationale: γενναίως can mean nobly or bravely. In this context of strategic frustration,
    'boldness' captures the quality that explains the successful resistance without
    sounding overly moralizing.
- source_word: ἐστρατήγηται
  chosen: had been outmaneuvered
  alternatives:
  - had been outgeneraled
  - had been strategically defeated
  - had been handled with skill
  lexicon: LSJ
  rationale: Perfect passive of στρατηγέω/στρατηγέω-related usage conveys being dealt
    with by strategy. 'Outmaneuvered' is idiomatic modern English and preserves the
    military-strategic nuance better than a flat 'deceived.'
- source_word: παραγενόμενος
  chosen: he came
  alternatives:
  - having come
  - appearing
  lexicon: LSJ
  rationale: Narrative participle indicating arrival at the temple. 'He came' is the
    clearest natural rendering in English.
- source_word: ἐπὶ τὸ μέγιστον καὶ ἅγιον ἱερόν
  chosen: to the greatest and holy temple
  alternatives:
  - to the great and holy temple
  - to the most great and holy sanctuary
  lexicon: LSJ
  rationale: μέγιστον is superlative, so 'greatest' is formally closest. Though 'great
    and holy temple' is smoother English, the superlative is retained because it appears
    deliberate in the Greek. ἱερόν here is the temple precinct/temple.
- source_word: τῶν ἱερέων
  chosen: while the priests
  alternatives:
  - as the priests
  - the priests
  lexicon: LSJ
  rationale: Genitive absolute with the following participle; rendered temporally
    as 'while the priests' for natural English flow.
- source_word: τὰς καθηκούσας θυσίας
  chosen: the customary sacrifices
  alternatives:
  - the appointed sacrifices
  - the regular sacrifices
  - the fitting sacrifices
  lexicon: LSJ
  rationale: καθηκούσας means what is proper, due, or prescribed. 'Customary' communicates
    the routine prescribed offerings in accessible English.
- source_word: προσαγόντων
  chosen: were offering
  alternatives:
  - were presenting
  - were bringing forward
  lexicon: LSJ
  rationale: In sacrificial context, 'offer' is the standard and clearest English
    equivalent.
- source_word: ἐκέλευσεν παραδοῦναι
  chosen: ordered them to hand over
  alternatives:
  - commanded them to surrender
  - ordered them to deliver up
  lexicon: LSJ
  rationale: This combination expresses an authoritative demand for transfer of custody.
    'Hand over' is idiomatic and preserves the coercive force.
- source_word: τὸν ἄνδρα
  chosen: the man
  alternatives:
  - him
  lexicon: LSJ
  rationale: Retaining 'the man' mirrors the Greek repetition and keeps the focus
    on the specific individual sought.
