  text: πλείονος δὲ γενομένης περὶ τούτων ἐπισκέψεως, καὶ τοῦ ἡγουμένου τοῖς πλήθεσιν
    ἀνακοινωσαμένου, καὶ φανείσης ὁμοψήφου συγγνώμης, ἔνευσαν ταῖς συνθήκαις.
