translation:
  text: But since it was not possible to oppose the king, he kept watching for an
    opportunity to accomplish it by a stratagem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'he kept watching for a favorable moment to accomplish
      it by a stratagem.' The Greek leaves the object of 'accomplish' implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ δὲ
  chosen: But since
  alternatives:
  - And since
  - Now since
  lexicon: LSJ
  rationale: Marks a transition with causal force; 'But since' preserves both the
    connective and the adversative nuance in context.
- source_word: τῷ βασιλεῖ
  chosen: the king
  alternatives:
  - to the king
  - against the king
  lexicon: LSJ
  rationale: Dative governed by ἀντιπρᾶξαι; in idiomatic English the sense is opposition
    directed toward the king, so 'the king' is retained within the verbal phrase rather
    than translated woodenly.
- source_word: ἀντιπρᾶξαι
  chosen: to oppose ... openly
  alternatives:
  - to act against
  - to resist
  - to proceed against
  lexicon: LSJ
  rationale: 'The verb means to act against or oppose. ''Oppose'' is the clearest
    modern English equivalent. ''Openly'' is supplied from the situational sense:
    the statement contrasts inability to act directly with resort to stratagem; this
    is an implicational nuance rather than a separate Greek word.'
- source_word: οὐκ ἦν
  chosen: it was not possible
  alternatives:
  - he could not
  - there was no possibility
  lexicon: LSJ
  rationale: Impersonal construction best rendered as inability or impossibility.
    'It was not possible' preserves the Greek structure more closely than a simple
    personal paraphrase.
- source_word: εὔκαιρον
  chosen: an opportunity
  alternatives:
  - a favorable moment
  - the right time
  lexicon: LSJ
  rationale: The adjective is used substantivally for a suitable or opportune time.
    'An opportunity' is natural English and captures the sense of a favorable occasion.
- source_word: ἐτήρει
  chosen: he kept watching for
  alternatives:
  - he was watching for
  - he sought
  - he waited for
  lexicon: LSJ
  rationale: Imperfect tense suggests ongoing or repeated action. 'Kept watching for'
    conveys durative force better than the simple past.
- source_word: στρατηγήματι
  chosen: by a stratagem
  alternatives:
  - by trickery
  - by a scheme
  - through a military device
  lexicon: LSJ
  rationale: The noun denotes a stratagem or crafty plan. 'By a stratagem' preserves
    the calculated, tactical sense without overinterpreting it as purely military
    or morally loaded trickery.
- source_word: τοῦ ἐπιτελέσαι
  chosen: to carry out his plan
  alternatives:
  - to accomplish it
  - to complete it
  - to execute it
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose/result tied to the stratagem.
    Because the object is implicit in Greek, 'his plan' makes the English intelligible
    while staying within the context of the plotted action.
