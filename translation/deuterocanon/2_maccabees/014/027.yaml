translation:
  text: But the king became enraged, and, provoked by the slanders of that utterly
    wicked man, wrote to Nikanor, saying that he took the treaty very badly and ordering
    him to send Maccabeus to Antioch as a prisoner at once.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'agreements' or 'terms of peace' for 'treaty' (συνθηκῶν).
    reason: lexical_alternative
  - marker: b
    text: Literally 'to send Maccabeus bound' or 'as a prisoner.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθυμος γενόμενος
  chosen: became enraged
  alternatives:
  - became angry
  - became furious
  lexicon: LSJ
  rationale: The expression denotes becoming heated in spirit or angry. 'Became enraged'
    captures the intensified emotional turn better than the flatter 'became angry'
    while remaining natural English.
- source_word: πανπονήρου
  chosen: utterly wicked
  alternatives:
  - altogether evil
  - thoroughly villainous
  lexicon: LSJ
  rationale: The compound intensifies πονηρός. 'Utterly wicked' preserves the strong
    moral condemnation without sounding overly archaic.
- source_word: διαβολαῖς
  chosen: slanders
  alternatives:
  - calumnies
  - accusations
  lexicon: LSJ
  rationale: The noun here refers to malicious charges or defamatory reports. 'Slanders'
    best conveys hostile false or damaging speech in readable English.
- source_word: ἐρεθισθεὶς
  chosen: provoked
  alternatives:
  - stirred up
  - irritated
  lexicon: LSJ
  rationale: The participle indicates being incited by those slanders. 'Provoked'
    fits the causal relation and the king's escalated reaction.
- source_word: συνθηκῶν
  chosen: treaty
  alternatives:
  - agreements
  - terms of peace
  - covenant
  lexicon: LSJ
  rationale: In this political-military context the word refers to formal terms or
    an agreement between parties. 'Treaty' is concise and suitably official.
- source_word: φάσκων βαρέως φέρειν
  chosen: saying that he took the treaty very badly
  alternatives:
  - claiming to be deeply offended by the treaty
  - saying that he was greatly displeased about the agreement
  lexicon: LSJ
  rationale: The idiom βαρέως φέρειν means to take something hard, to be offended
    or displeased. The translation keeps the reported-speech structure and the emotional
    force.
- source_word: δέσμιον
  chosen: in chains
  alternatives:
  - as a prisoner
  - bound
  lexicon: LSJ
  rationale: The adjective means bound or captive. 'In chains' makes the mode of custody
    vivid and reflects the force of the term more concretely than the generic 'as
    a prisoner.'
- source_word: ἐξαποστέλλειν
  chosen: to send
  alternatives:
  - to dispatch
  - to send off
  lexicon: LSJ
  rationale: The verb can mean send out or dispatch. In English, 'send' is sufficient
    here; the urgency is already conveyed by 'at once' and the command context.
- source_word: ταχέως
  chosen: at once
  alternatives:
  - quickly
  - without delay
  lexicon: LSJ
  rationale: The adverb marks urgency. 'At once' sounds idiomatic in a royal order
    and conveys immediate compliance.
