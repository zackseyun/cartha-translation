theological_decisions:
- issue: Faction name Ἀσιδαῖοι
  chosen_reading: Hasideans
  alternative_readings:
  - the pious
  - Assideans
  rationale: Because the word functions as the name of a historical group, transliteration
    is preferable to an interpretive gloss like 'the pious.' This avoids importing
    a positive evaluation into the translation while preserving historical specificity.
  doctrine_reference: Translate titles; transliterate names.
- issue: Nuance of Οἱ λεγόμενοι
  chosen_reading: Those ... who are called
  alternative_readings:
  - the so-called
  rationale: The phrase may carry a distancing or dismissive nuance in context, but
    that nuance is not certain enough to force 'so-called' into the main text. The
    alternative is preserved in a footnote for transparency.
  doctrine_reference: Preserve theological tension rather than resolve it.
