translation:
  text: In reply he said, “Those among the Jews who are called Hasideans, whose leader
    is Judas Maccabaeus, keep feeding war and stirring up rebellion, not allowing
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the so-called Hasideans,” if λεγόμενοι is taken with a more dismissive
      nuance.
    reason: lexical_alternative
  - marker: b
    text: The Greek sentence continues into the next verse; this verse ends with “not
      allowing” and leaves the object unstated until the continuation.
    reason: textual_variant
lexical_decisions:
- source_word: πρὸς ταῦτα
  chosen: In reply
  alternatives:
  - to this
  - in response to these things
  lexicon: LSJ
  rationale: Idiomatic introductory phrase marking response to what precedes; 'In
    reply' gives natural English while preserving the discourse function.
- source_word: ἔφη
  chosen: he said
  alternatives:
  - he said in reply
  - he declared
  lexicon: LSJ
  rationale: Standard narrative speech verb; simple 'he said' is sufficient and avoids
    over-translating tone.
- source_word: Οἱ λεγόμενοι
  chosen: Those ... who are called
  alternatives:
  - the so-called
  - those called
  lexicon: LSJ
  rationale: The participle λεγόμενοι can be neutral ('called') or slightly distancing
    ('so-called'). Here a neutral rendering is retained in the main text, with the
    more skeptical nuance preserved as an alternative.
- source_word: Ἀσιδαῖοι
  chosen: Hasideans
  alternatives:
  - Hasidaeans
  - Assideans
  lexicon: LSJ
  rationale: A transliterated group name is preferable because the term refers to
    a specific Jewish faction rather than a common adjective. 'Hasideans' reflects
    the conventional scholarly identification with the pious group behind the name.
- source_word: ὧν ἀφηγεῖται
  chosen: whose leader is
  alternatives:
  - of whom ... leads
  - at whose head is
  - whom ... leads
  lexicon: LSJ
  rationale: ἀφηγέομαι denotes leading or heading a group. The relative construction
    is best rendered idiomatically in English as 'whose leader is'.
- source_word: Ἰούδας ὁ Μακκαβαῖος
  chosen: Judas Maccabaeus
  alternatives:
  - Judas the Maccabee
  lexicon: LSJ
  rationale: Standard English transliteration of the personal name and epithet; preserves
    the historical name form used in 2 Maccabees.
- source_word: πολεμοτροφοῦσιν
  chosen: keep feeding war
  alternatives:
  - foment war
  - nourish war
  - promote warfare
  lexicon: LSJ
  rationale: The compound verb literally suggests nourishing or feeding war. 'Keep
    feeding war' preserves the vivid metaphor, though 'foment war' is a viable smoother
    alternative.
- source_word: στασιάζουσιν
  chosen: stirring up rebellion
  alternatives:
  - cause sedition
  - are in revolt
  - create faction
  lexicon: LSJ
  rationale: The verb concerns civil unrest, sedition, or factional rebellion. 'Stirring
    up rebellion' communicates active instigation in accessible English.
- source_word: οὐκ ἐῶντες
  chosen: not allowing
  alternatives:
  - not permitting
  - preventing
  lexicon: LSJ
  rationale: A straightforward rendering of the participle. The Greek sentence is
    incomplete at this verse boundary, so the English intentionally remains open-ended
    rather than supplying an object not present here.
