translation:
  text: to obtain stability for the kingdom. Therefore, having taken away the ancestral
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Zone 1 Greek for this verse is fragmentary and appears to break
      off mid-sentence after 'the ancestral…'. The English therefore translates only
      the wording actually present in the supplied witness and does not reconstruct
      the missing object.
    reason: textual_variant
lexical_decisions:
- source_word: βασιλείαν
  chosen: the kingdom
  alternatives:
  - royal rule
  - kingship
  lexicon: LSJ
  rationale: The accusative object with τυχεῖν points to what is to be secured. 'Kingdom'
    is the most natural English rendering here, broad enough to include the realm
    and its governance without over-specifying 'kingship.'
- source_word: εὐσταθείας
  chosen: stability
  alternatives:
  - steadfastness
  - firmness
  - security
  lexicon: LSJ
  rationale: The noun denotes firmness or stable condition. In political context,
    'stability' best conveys the sense of a secure, settled state for the kingdom.
- source_word: τυχεῖν
  chosen: to obtain
  alternatives:
  - to attain
  - to secure
  lexicon: LSJ
  rationale: The infinitive commonly means 'to obtain' or 'to attain.' 'Obtain' fits
    the construction smoothly in English and preserves the sense of coming into possession
    of a desired condition.
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - wherefore
  - for which reason
  - from which
  lexicon: LSJ
  rationale: Here it introduces an inference from the preceding statement. 'Therefore'
    gives the causal-consecutive force in clear modern English.
- source_word: ἀφελόμενος
  chosen: having taken away
  alternatives:
  - having removed
  - having deprived of
  lexicon: LSJ
  rationale: The participle of ἀφαιρέω means to take away or remove. 'Having taken
    away' is a transparent rendering that preserves the participial form and leaves
    the object open, since the verse as transmitted here is incomplete.
- source_word: προγονικήν
  chosen: ancestral
  alternatives:
  - inherited
  - of the forefathers
  - traditional
  lexicon: LSJ
  rationale: The adjective refers to what belongs to the forefathers or ancestors.
    'Ancestral' is concise and idiomatic, especially in Maccabean contexts where ancestral
    customs/laws are a recurring theme.
