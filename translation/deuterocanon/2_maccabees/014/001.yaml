translation:
  text: But after three years, word came to those around Judas that Demetrius son
    of Seleucus had sailed into the harbor at Tripolis with a strong force and a fleet,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'it fell upon those around Judas'—an idiom meaning that
      news or a report reached them.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τριετῆ χρόνον
  chosen: But after three years
  alternatives:
  - Now after a period of three years
  - And after three years
  lexicon: LSJ
  rationale: μετά with accusative marks time after; τριετῆ χρόνον is idiomatic for
    a three-year period. 'But' preserves δέ's mild transition in context.
- source_word: προσέπεσεν τοῖς περὶ τὸν Ἰούδαν
  chosen: word came to those around Judas
  alternatives:
  - it became known to Judas and his men
  - news reached Judas's party
  lexicon: LSJ
  rationale: The literal sense of προσπίπτω is 'fall upon,' but with persons and information
    it can idiomatically convey that news/report came to them. A wooden 'fell upon'
    would mislead in English. τοῖς περὶ τὸν Ἰούδαν means Judas and those with him
    / around him.
- source_word: Δημήτριον τὸν τοῦ Σελεύκου
  chosen: Demetrius son of Seleucus
  alternatives:
  - Demetrius, the son of Seleucus
  lexicon: LSJ
  rationale: The article + genitive filial construction is naturally rendered 'son
    of.' Personal names are transliterated per project philosophy.
- source_word: διὰ τοῦ κατὰ Τρίπολιν λιμένος εἰσπλεύσαντα
  chosen: had sailed into the harbor at Tripolis
  alternatives:
  - had entered by way of the harbor near Tripolis
  - had sailed in through the harbor at Tripolis
  lexicon: LSJ
  rationale: εἰσπλεύσαντα is 'having sailed in/into.' κατὰ Τρίπολιν with λιμήν indicates
    the harbor at or by Tripolis. 'Had sailed into' fits the participial relation
    to the reported content.
- source_word: μετὰ πλήθους ἰσχυροῦ καὶ στόλου
  chosen: with a strong force and a fleet
  alternatives:
  - with a powerful multitude and a fleet
  - with a large strong army and a fleet
  lexicon: LSJ
  rationale: πλῆθος can denote a large body of men; in military context 'force' is
    clearer than 'multitude.' ἰσχυροῦ conveys strength/power. στόλος is specifically
    a fleet, so both land and naval strength are retained.
