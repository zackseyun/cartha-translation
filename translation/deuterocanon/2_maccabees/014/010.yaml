translation:
  text: For as long as Judas remains, it is impossible for affairs to attain peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening words in the surviving Greek witness are textually difficult;
      the sense of the clause is that Judas' continued presence makes peace impossible.
    reason: textual_variant
lexical_decisions:
- source_word: ἰσχρὰ
  chosen: for as long as
  alternatives:
  - while
  - since
  lexicon: LSJ
  rationale: The transmitted form is difficult in isolation and likely reflects a
    compressed or corrupt connective/adverbial expression in this diplomatic witness.
    In context with περιὼν, the clause clearly means that Judas' continued survival/presence
    prevents peace. 'For as long as' best captures the temporal force required by
    the sentence.
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  rationale: Personal name; standard transliteration is appropriate.
- source_word: περιὼν
  chosen: remains
  alternatives:
  - survives
  - is still around
  - continues to live
  lexicon: LSJ
  rationale: From περίειμι in the sense 'to survive' or 'remain alive/present.' 'Remains'
    is idiomatic and broad enough to include both continued existence and continued
    presence as a political threat.
- source_word: ἀδύνατον
  chosen: it is impossible
  alternatives:
  - impossible
  - there is no possibility
  lexicon: LSJ
  rationale: Impersonal predicate; English requires an explicit construction.
- source_word: εἰρήνης
  chosen: peace
  alternatives:
  - a peace settlement
  - peacefulness
  lexicon: LSJ
  rationale: Standard sense 'peace'; no need to over-specify treaty language, though
    the political context is clear.
- source_word: τυχεῖν
  chosen: to attain
  alternatives:
  - to obtain
  - to achieve
  lexicon: LSJ
  rationale: The infinitive with εἰρήνης conveys coming into possession of or reaching
    peace. 'Attain' reads naturally with 'peace' and 'affairs.'
- source_word: τὰ πράγματα
  chosen: affairs
  alternatives:
  - matters
  - the situation
  - the state of affairs
  lexicon: LSJ
  rationale: Refers to the political situation or public affairs generally. 'Affairs'
    preserves the breadth of the Greek without over-paraphrasing.
