translation:
  text: But Nikanor, wanting to make plain the hostility he had toward the Jews, sent
    more than five hundred soldiers to arrest him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, more than five hundred soldiers; the Greek literally says 'beyond
      the five hundred.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βουλόμενος
  chosen: wanting
  alternatives:
  - wishing
  - intending
  - desiring
  lexicon: BDAG
  rationale: Participial form expressing Nikanor's intention or purpose leading into
    the main action. 'Wanting' is natural modern English and preserves the volitional
    sense without overstating deliberation.
- source_word: πρόδηλον ποιῆσαι
  chosen: to make plain
  alternatives:
  - to make evident
  - to show openly
  - to make manifest
  lexicon: LSJ
  rationale: The infinitive phrase means to render something obvious or publicly evident.
    'Make plain' is idiomatic and clear, preserving the causative force of ποιῆσαι
    with the adjective πρόδηλον.
- source_word: δυσμένειαν
  chosen: hostility
  alternatives:
  - enmity
  - ill will
  - hatred
  lexicon: LSJ
  rationale: The noun denotes hostile disposition or ill will. 'Hostility' best fits
    the political and military context and avoids the narrower emotional sense of
    'hatred' while remaining strong.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Standard narrative verb for sending. 'Sent' is sufficiently direct and
    readable.
- source_word: στρατιώτας
  chosen: soldiers
  alternatives:
  - troops
  lexicon: BDAG
  rationale: The accusative plural refers to individual military personnel. 'Soldiers'
    is the most straightforward rendering.
- source_word: ὑπὲρ τοὺς πεντακοσίους
  chosen: more than five hundred
  alternatives:
  - over five hundred
  lexicon: LSJ
  rationale: ὑπέρ with the accusative here indicates excess over a number. 'More than
    five hundred' is clear contemporary English.
- source_word: συλλαβεῖν
  chosen: to arrest
  alternatives:
  - to seize
  - to capture
  lexicon: BDAG
  rationale: In this context of sending soldiers after a person, the verb means to
    seize into custody. 'Arrest' communicates the intended apprehension more precisely
    than the broader 'seize'.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers back to the previously mentioned individual in context,
    namely Razis. 'Him' is the natural English rendering.
