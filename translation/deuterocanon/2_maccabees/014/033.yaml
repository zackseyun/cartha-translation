theological_decisions:
- issue: Rendering of Jewish sacred-space terms in a threat against the Jerusalem
    temple
  chosen_reading: Different Greek terms are distinguished as 'sanctuary' (νεώς), 'house
    of God' (σηκός), and 'altar' (θυσιαστήριον), while ἱερόν for Dionysus is rendered
    'temple.'
  alternative_readings:
  - Render all temple terms uniformly as 'temple'
  rationale: The Greek uses multiple cultic terms. Preserving some distinction reflects
    the source text's rhetoric and avoids flattening the contrast between the Jewish
    sanctuary and the proposed pagan temple.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
