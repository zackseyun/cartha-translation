translation:
  text: 'Stretching out his right hand toward the temple, he swore this: “If you do
    not hand Judas over to me as a prisoner, I will make this sanctuary of God a plain,
    tear down the altar, and raise up here a splendid temple to Dionysus.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I will make this house of God into a field/open plain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προτείνας
  chosen: Stretching out
  alternatives:
  - holding out
  - extending
  lexicon: LSJ
  rationale: Aorist participle of προτείνω, describing the physical gesture accompanying
    the oath. 'Stretching out' is natural modern English and preserves the concrete
    action.
- source_word: τὴν δεξιὰν
  chosen: his right hand
  alternatives:
  - the right hand
  lexicon: LSJ
  rationale: The idiom refers to the right hand as the gesture of swearing. English
    normally supplies the possessive here.
- source_word: ἐπὶ τὸν νεών
  chosen: toward the sanctuary
  alternatives:
  - against the sanctuary
  - upon the temple
  lexicon: LSJ
  rationale: 'With the gesture verb, ἐπί here is best taken directionally: he stretches
    his hand toward the temple building. ''Sanctuary'' fits νεώς as the sacred shrine/temple
    structure, distinguishing it from the broader precinct.'
- source_word: ὤμοσεν
  chosen: he swore
  alternatives:
  - he took an oath
  lexicon: LSJ
  rationale: Standard rendering of the oath verb; concise and idiomatic.
- source_word: δέσμιον
  chosen: as a prisoner
  alternatives:
  - bound
  - in chains
  lexicon: LSJ
  rationale: The adjective means captive or prisoner. In English, 'hand Judas over
    to me as a prisoner' clearly conveys the predicative force without over-specifying
    literal chains.
- source_word: παραδῶτε
  chosen: hand ... over
  alternatives:
  - deliver
  - surrender
  lexicon: LSJ
  rationale: '''Hand over'' is a clear modern equivalent for παραδίδωμι in a hostile
    transfer context.'
- source_word: σηκόν
  chosen: house
  alternatives:
  - temple
  - shrine
  lexicon: LSJ
  rationale: Since νεώς has already been rendered 'sanctuary,' varying σηκός as 'house'
    avoids awkward repetition while preserving the sense of the sacred structure.
    The phrase 'house of God' is a natural equivalent for τοῦ θεοῦ σηκόν.
- source_word: εἰς πεδίον ποιήσω
  chosen: I will level ... to the ground
  alternatives:
  - I will make ... into an open field
  - I will turn ... into a plain
  lexicon: LSJ
  rationale: The idiom means to reduce a building site to open ground. 'Level to the
    ground' communicates the threat idiomatically in English.
- source_word: θυσιαστήριον
  chosen: altar
  lexicon: LSJ
  rationale: Standard equivalent for the sacrificial altar.
- source_word: κατασκάψω
  chosen: tear down
  alternatives:
  - demolish
  - dig up
  lexicon: LSJ
  rationale: The verb can mean raze or tear down. 'Tear down' is idiomatic and fits
    the threatened destruction of the altar.
- source_word: ἱερὸν
  chosen: temple
  alternatives:
  - sanctuary
  - shrine
  lexicon: LSJ
  rationale: Here ἱερόν refers to a temple complex or sacred building for Dionysus.
    'Temple' is the most straightforward English equivalent.
- source_word: ἐπιφανές
  chosen: splendid
  alternatives:
  - conspicuous
  - illustrious
  - magnificent
  lexicon: LSJ
  rationale: The adjective denotes something notable or impressive. 'Splendid' captures
    the boastful sense in natural English.
- source_word: ἀναστήσω
  chosen: raise up
  alternatives:
  - build
  - erect
  lexicon: LSJ
  rationale: Literally 'raise up'; in context of construction, 'raise up' preserves
    the vividness while remaining idiomatic.
