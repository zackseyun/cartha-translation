  text: ἦν γὰρ ἐν τοῖς ἔμπροσθεν χρόνοις τῆς ἀμιξίας κρίσις εἰσενηνεγμένος Ἰουδαισμοῦ,
    καὶ σῶμα καὶ ψυχὴν ὑπὲρ τοῦ Ἰουδαισμοῦ παραβεβλημένος μετὰ πάσης ἐκτενίας.
