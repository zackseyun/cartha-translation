translation:
  text: For in earlier times, when separation was being judged, he had come under
    accusation for Judaism, and had risked both body and soul for Judaism with all
    earnestness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when a case concerning separation/non-association was being tried.'
      The Greek phrase is compressed and likely reflects a judicial setting.
    reason: lexical_alternative
  - marker: b
    text: '''Judaism'' here refers not merely to abstract religion but to Jewish ancestral
      identity and practice under pressure.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐν τοῖς ἔμπροσθεν χρόνοις
  chosen: in earlier times
  alternatives:
  - in former times
  - previously
  lexicon: LSJ
  rationale: A natural rendering of the temporal phrase that preserves the retrospective
    sense without sounding archaic.
- source_word: τῆς ἀμιξίας
  chosen: separation
  alternatives:
  - non-association
  - aloofness
  lexicon: LSJ
  rationale: The noun denotes a state of not mixing or keeping apart. 'Separation'
    is concise and readable, while preserving the social/political sense of distinctness
    from Gentile practices in context.
- source_word: κρίσις
  chosen: being judged
  alternatives:
  - trial
  - judgment
  lexicon: LSJ
  rationale: 'In context with εἰσενηνεγμένος, the sense is judicial: a case or accusation
    had been brought. Rendering the phrase as ''when separation was being judged''
    captures the legal setting in idiomatic English.'
- source_word: εἰσενηνεγμένος
  chosen: had been brought in
  alternatives:
  - had been indicted
  - had been brought before the court
  lexicon: LSJ
  rationale: Perfect participle of εἰσφέρω, here likely in a legal sense of bringing
    in a charge/case. 'Had been brought in' stays close to the Greek while allowing
    the judicial nuance to be supplied by the surrounding phrase.
- source_word: Ἰουδαισμοῦ
  chosen: Judaism
  alternatives:
  - the Jewish way of life
  - Jewish religion
  lexicon: LSJ
  rationale: The Greek term directly names Jewish identity/practice. 'Judaism' is
    the most transparent cognate and avoids over-expansion, though it includes the
    broader sense of Jewish ancestral way of life in this historical context.
- source_word: σῶμα καὶ ψυχὴν
  chosen: both body and soul
  alternatives:
  - body and life
  - his whole self
  lexicon: LSJ
  rationale: A literal rendering preserves the emphatic totality of his self-endangerment.
    'Soul' should not be flattened here, since the Greek uses the standard anthropological
    pair.
- source_word: ὑπὲρ τοῦ Ἰουδαισμοῦ
  chosen: for Judaism
  alternatives:
  - on behalf of Judaism
  - for the Jewish way of life
  lexicon: LSJ
  rationale: ὑπέρ here expresses commitment in defense of a cause. 'For Judaism' is
    concise and faithful.
- source_word: παραβεβλημένος
  chosen: had risked
  alternatives:
  - had exposed
  - had ventured
  lexicon: LSJ
  rationale: The participle conveys exposing oneself to danger. 'Had risked' is idiomatic
    English and fits the collocation with body and soul.
- source_word: μετὰ πάσης ἐκτενίας
  chosen: with all earnestness
  alternatives:
  - with all zeal
  - with complete devotion
  lexicon: LSJ
  rationale: The phrase denotes full intensity or utmost exertion. 'With all earnestness'
    communicates wholeheartedness without overstating beyond the Greek.
