translation:
  text: Therefore he sent Posidonius and Theodotus and Mattathias to give and receive
    pledges.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, to exchange right hands as a pledge of good faith or agreement.
    reason: cultural_note
lexical_decisions:
- source_word: διόπερ
  chosen: Therefore
  alternatives:
  - For this reason
  - Wherefore
  lexicon: LSJ
  rationale: Inferential conjunction drawing a conclusion from the preceding situation;
    'Therefore' is natural modern English and preserves the causal force.
- source_word: ἔπεμψεν
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: LSJ
  rationale: Standard aorist of πέμπω meaning 'send.' 'He sent' is straightforward
    and sufficiently formal.
- source_word: Ποσίδωνιον καὶ Θεόδοτον καὶ Ματταθίαν
  chosen: Posidonius and Theodotus and Mattathias
  rationale: Personal names are transliterated per project philosophy. Repeating 'and'
    reflects the Greek coordination without awkwardness.
- source_word: δοῦναι καὶ λαβεῖν
  chosen: to give and receive
  alternatives:
  - to exchange
  - to offer and accept
  lexicon: LSJ
  rationale: The infinitives are literal and paired. Although the idiom means to make
    a pledge/agreement, retaining 'give and receive' preserves the concrete imagery
    of the Greek while remaining intelligible with the following object.
- source_word: δεξιάς
  chosen: right hands
  alternatives:
  - right hands in pledge
  - hands
  lexicon: LSJ
  rationale: Plural of δεξιά, literally 'right hand.' In context it refers to the
    customary gesture of pledging good faith or making an agreement. The literal rendering
    is kept in the main text for transparency; the idiomatic sense is preserved in
    a footnote.
