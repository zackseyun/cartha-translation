translation:
  text: But when they quickly drew back, and a space opened up, he came into the middle
    of the courtyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'open court.' The Greek term denotes an open court or courtyard space.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναποδισάντων
  chosen: drew back
  alternatives:
  - retreated
  - fell back
  - recoiled
  lexicon: LSJ
  rationale: The participle describes those around him moving backward or withdrawing.
    'Drew back' is natural English and fits the immediate physical action in the scene
    better than the more military-sounding 'retreated.'
- source_word: ταχέως
  chosen: quickly
  alternatives:
  - swiftly
  - at once
  lexicon: LSJ
  rationale: A straightforward adverb of speed; 'quickly' is idiomatic modern English
    and preserves the suddenness of the movement.
- source_word: γενομένου διαστήματος
  chosen: a space opened up
  alternatives:
  - a gap having formed
  - an interval having arisen
  - room having been made
  lexicon: LSJ
  rationale: The genitive absolute indicates that separation or open room resulted
    from the crowd's drawing back. 'A space opened up' renders the sense clearly in
    readable English while remaining close to the Greek image.
- source_word: κατὰ μέσον
  chosen: into the middle
  alternatives:
  - to the midst
  - into the center
  lexicon: LSJ
  rationale: This phrase indicates movement toward the center point. 'Into the middle'
    is clear and idiomatic.
- source_word: κενεῶνα
  chosen: courtyard
  alternatives:
  - open court
  - court
  lexicon: LSJ
  rationale: The noun refers to an open court or courtyard area. 'Courtyard' best
    conveys a central open space in a building complex for modern readers.
