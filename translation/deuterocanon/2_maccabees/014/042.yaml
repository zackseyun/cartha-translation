id: 2MA.14.42
reference: 2 Maccabees 14:42
source:
  edition: lxx-swete-1909
  text: εὐγενῶς θέλων ἀποθανεῖν ἤπερ τοῖς ἀλιτηρίοις ὑποχείριος γενέσθαι, καὶ τῆς
    ἰδίας εὐγενείας ἀναξίως ὑβρισθῆναι.
