translation:
  text: wanting to die nobly rather than to become subject to those criminals and
    to be mistreated in a way unworthy of his own nobility.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be abused' or 'be insulted'; the Greek verb can cover humiliating mistreatment
      broadly, not only verbal insult.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐγενῶς
  chosen: nobly
  alternatives:
  - honorably
  - in a noble manner
  lexicon: LSJ
  rationale: The adverb denotes conduct befitting noble character or birth. 'Nobly'
    preserves the lexical link with the later noun εὐγενείας and keeps the sentence's
    emphasis on honorable death.
- source_word: θέλων
  chosen: wanting
  alternatives:
  - wishing
  - desiring
  lexicon: BDAG
  rationale: A participle expressing intention or resolve. 'Wanting' is straightforward
    modern English and fits the participial flow without overstating emotional desire.
- source_word: ἀποθανεῖν
  chosen: to die
  alternatives:
  - to meet death
  lexicon: BDAG
  rationale: Basic infinitive of dying; 'to die' is the plain and sufficient rendering.
- source_word: ἤπερ
  chosen: rather than
  alternatives:
  - instead of
  lexicon: LSJ
  rationale: This comparative conjunction contrasts the preferred course with the
    rejected one. 'Rather than' captures the force naturally in English.
- source_word: ἀλιτηρίοις
  chosen: those criminals
  alternatives:
  - those villains
  - those wretches
  - those accursed men
  lexicon: LSJ
  rationale: A strongly pejorative term for wicked or criminal persons. 'Criminals'
    communicates moral and legal hostility without sounding archaic; 'those' reflects
    the article and the contemptuous reference.
- source_word: ὑποχείριος γενέσθαι
  chosen: to fall into the hands of
  alternatives:
  - to become subject to
  - to become captive to
  - to come under the power of
  lexicon: LSJ
  rationale: The idiom means to become subject to another's power. 'Fall into the
    hands of' is idiomatic English that conveys hostile capture or control.
- source_word: τῆς ἰδίας εὐγενείας
  chosen: his own nobility
  alternatives:
  - his own noble character
  - his own honor
  lexicon: LSJ
  rationale: The phrase points to the dignity or noble status/character that belongs
    to him. 'His own nobility' preserves the lexical tie to εὐγενῶς and leaves open
    both social and moral nuance.
- source_word: ἀναξίως
  chosen: in a way unworthy of
  alternatives:
  - unworthily
  - beneath the dignity of
  lexicon: LSJ
  rationale: The adverb modifies the manner of the abuse relative to his nobility.
    The expanded English phrase is more natural than 'unworthily' and preserves the
    evaluative force.
- source_word: ὑβρισθῆναι
  chosen: be outrageously treated
  alternatives:
  - be abused
  - be insulted
  - be mistreated with violence
  lexicon: BDAG
  rationale: The passive of ὑβρίζω can include insolent abuse, humiliation, and violent
    mistreatment. 'Be outrageously treated' preserves the sense of abusive outrage
    without narrowing it to verbal insult alone.
