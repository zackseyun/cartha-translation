translation:
  text: When this man had said such things, the rest of the Friends, quickly becoming
    hostile toward Judas, further inflamed Demetrius.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the other royal courtiers'; Greek 'the rest of the Friends,' likely
      using 'Friends' as a court title rather than in the ordinary social sense.
    reason: cultural_note
  - marker: b
    text: The Greek verb is rare and may mean that they further stirred up, prejudiced,
      or embittered Demetrius against Judas.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιούτων ... ῥηθέντων
  chosen: when ... had said such things
  alternatives:
  - after ... said such things
  - when such things had been said
  lexicon: LSJ
  rationale: Genitive absolute introducing the circumstance; English temporal clause
    is natural and preserves the sense.
- source_word: ὑπὸ τούτου
  chosen: this man
  alternatives:
  - by him
  - by this one
  lexicon: LSJ
  rationale: Refers back to the immediately preceding speaker. 'This man' is idiomatic
    and keeps the slightly distancing force of the Greek better than a bare pronoun.
- source_word: θᾶττον
  chosen: quickly
  alternatives:
  - at once
  - more quickly
  lexicon: LSJ
  rationale: Adverb marking promptness of reaction. 'Quickly' is clear modern English
    without overstating the comparative nuance.
- source_word: οἱ λοιποὶ φίλοι
  chosen: the rest of the Friends
  alternatives:
  - the other Friends
  - the remaining friends
  lexicon: LSJ
  rationale: In Seleucid court context, φίλοι is a quasi-technical title for royal
    courtiers or 'Friends.' Capitalizing preserves that likely official sense better
    than the generic 'friends'.
- source_word: δυσμενῶς ἔχοντες
  chosen: becoming hostile
  alternatives:
  - being ill-disposed
  - being hostile
  - bearing malice
  lexicon: LSJ
  rationale: Idiomatic expression for hostile disposition. 'Becoming hostile' fits
    the participial flow with θᾶττον and reads naturally in English.
- source_word: τι πρὸς τὸν Ἰούδαν
  chosen: toward Judas
  alternatives:
  - against Judas
  - with some hostility toward Judas
  lexicon: LSJ
  rationale: The phrase indicates adverse feeling directed at Judas. 'Toward Judas'
    keeps the directional sense while avoiding overloading the line.
- source_word: προετετύρωμαν
  chosen: further inflamed
  alternatives:
  - prejudiced
  - incited
  - embittered further
  - made more hostile
  lexicon: LSJ
  rationale: The rare verb in context conveys stirring Demetrius up further against
    Judas rather than merely informing him. 'Further inflamed' captures the causative
    and hostile force in readable English.
- source_word: τὸν Δημήτριον
  chosen: Demetrius
  lexicon: LSJ
  rationale: Standard transliteration of the royal name.
