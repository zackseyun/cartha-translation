id: 2MA.12.3
reference: 2 Maccabees 12:3
source:
  edition: lxx-swete-1909
  text: Ἰοππῖται δὲ τηλικοῦτο συνετελέσαντο δυσσέβημα, παρακαλέσαντες τοὺς ἐν ἑαυτοῖς
    οἰκοῦντας Ἰουδαίους ἐμβῆναι εἰς τὰ παρακατασταθέντα ὑπʼ αὐτῶν σκάφη σὺν γυναιξὶ
    καὶ τέκνοις, ὡς μηδεμίας ἐνεστώσης πρὸς αὐτοὺς δυσμενείας·
  language: Greek
  pages:
  - 718
  confidence: high
  validation: agree
translation:
  text: 'But the people of Joppa committed such a great act of impiety: they invited
    the Jews living among them to embark, with their wives and children, in the boats
    provided by them, as though there were no hostility toward them at all;'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἰοππῖται
  chosen: the people of Joppa
  alternatives:
  - the Joppians
  - the men of Joppa
  lexicon: LSJ
  rationale: The ethnic/civic designation refers to the inhabitants of Joppa. 'The
    people of Joppa' is natural modern English while preserving the collective sense.
- source_word: τηλικοῦτο
  chosen: such a great
  alternatives:
  - so great a
  - so enormous a
  lexicon: LSJ
  rationale: The adjective intensifies the magnitude of the deed. 'Such a great' preserves
    the emphatic force in readable English.
- source_word: συνετελέσαντο
  chosen: committed
  alternatives:
  - carried out
  - accomplished
  lexicon: LSJ
  rationale: With δυσσέβημα as its object, the verb denotes bringing about or perpetrating
    an act. 'Committed' fits idiomatic English for an evil deed.
- source_word: δυσσέβημα
  chosen: act of impiety
  alternatives:
  - wicked deed
  - ungodly act
  lexicon: LSJ
  rationale: The term denotes an impious or profane act, not merely generic wrongdoing.
    'Act of impiety' preserves the religious-moral weight better than a flatter 'crime'
    or 'wickedness'.
- source_word: παρακαλέσαντες
  chosen: they invited
  alternatives:
  - they urged
  - they called on
  lexicon: LSJ
  rationale: In context the Joppa inhabitants induced the Jews to board the boats
    under false pretenses. 'Invited' matches the social setting and the deceptive
    courtesy implied.
- source_word: τοὺς ἐν ἑαυτοῖς οἰκοῦντας Ἰουδαίους
  chosen: the Jews living among them
  alternatives:
  - the Jews dwelling with them
  - the Jews residing in their midst
  lexicon: LSJ
  rationale: The phrase indicates Jews residing within the Joppian community. 'Living
    among them' is clear and faithful to the relational sense of ἐν ἑαυτοῖς.
- source_word: ἐμβῆναι
  chosen: to embark
  alternatives:
  - to board
  - to go aboard
  lexicon: LSJ
  rationale: The infinitive refers specifically to boarding watercraft. 'Embark' is
    slightly more formal but precise in this maritime context.
- source_word: τὰ παρακατασταθέντα ὑπʼ αὐτῶν σκάφη
  chosen: the boats provided by them
  alternatives:
  - the vessels furnished by them
  - the boats made ready by them
  lexicon: LSJ
  rationale: σκάφη are boats/vessels; παρακατασταθέντα indicates having been set at
    hand, furnished, or made available by the Joppians. 'Provided by them' captures
    the preparatory action without over-specifying.
- source_word: σὺν γυναιξὶ καὶ τέκνοις
  chosen: with their wives and children
  alternatives:
  - with wives and children
  lexicon: LSJ
  rationale: English idiom naturally supplies 'their,' making explicit that the families
    of the Jews were included.
- source_word: ὡς μηδεμίας ἐνεστώσης πρὸς αὐτοὺς δυσμενείας
  chosen: as though there were no hostility toward them at all
  alternatives:
  - as if no ill will existed toward them
  - as though no enmity were present against them
  lexicon: LSJ
  rationale: The construction presents the false pretense under which the invitation
    was made. δυσμένεια is hostility/ill will; ἐνεστώσης conveys existing or present.
    'At all' reflects the emphatic μηδεμίας.
