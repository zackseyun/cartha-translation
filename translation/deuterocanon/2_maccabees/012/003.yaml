theological_decisions:
- issue: Moral-religious force of δυσσέβημα
  chosen_reading: act of impiety
  alternative_readings:
  - wicked deed
  - ungodly act
  rationale: The verse morally characterizes the Joppians' action in explicitly religious
    terms. Rendering the noun with 'impiety' preserves that evaluative force without
    importing later doctrinal categories.
  doctrine_reference: Translation philosophy §1, §6
