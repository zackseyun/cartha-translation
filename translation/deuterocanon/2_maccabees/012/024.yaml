id: 2MA.12.24
reference: 2 Maccabees 12:24
source:
  edition: lxx-swete-1909
  text: αὐτὸς δὲ ὁ Τιμόθεος ἐμπεσὼν τοῖς περὶ τὸν Δωσίθεον καὶ Σωσίπατρον ἠξίου μετὰ
    πολλῆς γοητίας ἐξαφεῖναι ὡς σῷον αὐτόν, διὰ τὸ πλειόνων μὲν γονεῖς, ὧν δὲ ἀδελφοὺς
    ἔχειν, καὶ τούτους ἀλογηθῆναι συμβήσεται.
  language: Greek
  pages:
  - 720
  confidence: high
  validation: minor_mismatch
translation:
  text: But Timothy himself, having fallen into the hands of those with Dositheus
    and Sosipater, begged with much cunning to be let go unharmed, because he had
    the parents of many of them, and of others their brothers, and it would happen
    that these would be disregarded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with much guile' or 'with much trickery'; the Greek γοητία here likely
      refers to crafty or deceptive pleading rather than literal sorcery.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek is compressed: Timothy argues that he has many of their parents
      and others'' brothers in his power, so if they kill him those relatives would
      be treated as of no account.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐμπεσὼν
  chosen: having fallen into the hands of
  alternatives:
  - having fallen among
  - having fallen into
  lexicon: LSJ
  rationale: The participle literally means 'having fallen into/upon,' but in context
    it denotes coming under the power of Dositheus and Sosipater's men. 'Into the
    hands of' makes the implied capture explicit in natural English without overparaphrasing.
- source_word: τοῖς περὶ τὸν Δωσίθεον καὶ Σωσίπατρον
  chosen: those with Dositheus and Sosipater
  alternatives:
  - the men around Dositheus and Sosipater
  - Dositheus and Sosipater and their men
  lexicon: LSJ
  rationale: The idiom οἱ περὶ + accusative refers to a leader together with his associates.
    'Those with Dositheus and Sosipater' preserves the group sense while staying close
    to the Greek.
- source_word: ἠξίου
  chosen: begged
  alternatives:
  - requested
  - implored
  - asked
  lexicon: LSJ
  rationale: In this context of a captured enemy pleading for release, 'begged' better
    conveys the urgency than the flatter 'requested,' while remaining within the semantic
    range.
- source_word: μετὰ πολλῆς γοητίας
  chosen: with much cunning
  alternatives:
  - with much guile
  - with much trickery
  - with much enchantment
  lexicon: LSJ
  rationale: γοητία can denote trickery, quackery, or deceptive arts. Here the sense
    is not literal magic but crafty persuasion. 'With much cunning' communicates manipulative
    pleading in idiomatic English.
- source_word: ἐξαφεῖναι
  chosen: to be let go
  alternatives:
  - to be released
  - to be set free
  lexicon: LSJ
  rationale: The infinitive expresses Timothy's request that they release him. 'Be
    let go' is natural and fits the immediate plea.
- source_word: ὡς σῷον αὐτόν
  chosen: unharmed
  alternatives:
  - safe
  - with his life spared
  - him safe
  lexicon: LSJ
  rationale: The phrase means 'with him safe/sound.' In context of release from capture,
    'unharmed' concisely conveys release without injury or death.
- source_word: διὰ τὸ πλειόνων μὲν γονεῖς, ὧν δὲ ἀδελφοὺς ἔχειν
  chosen: because he had the parents of many of them, and of others their brothers
  alternatives:
  - because he held the parents of many, and the brothers of others
  - because many had parents, and others brothers, in his power
  lexicon: LSJ
  rationale: ἔχειν here implies possession or control, not mere relationship. The
    object is elliptical but naturally understood as hostages/captives connected to
    the men confronting him. The translation keeps the Greek structure while making
    the possessive force clear.
- source_word: ἀλογηθῆναι
  chosen: be disregarded
  alternatives:
  - be treated as nothing
  - be neglected
  - be reckoned of no account
  lexicon: LSJ
  rationale: The passive infinitive suggests being counted as nothing or ignored.
    'Be disregarded' captures the idea that these relatives would be treated without
    regard if Timothy were killed.
- source_word: συμβήσεται
  chosen: it would happen
  alternatives:
  - it would come about
  - it would result
  lexicon: LSJ
  rationale: The future middle here introduces the consequence Timothy claims will
    follow. 'It would happen' is a straightforward rendering.
