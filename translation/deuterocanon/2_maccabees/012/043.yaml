id: 2MA.12.43
reference: 2 Maccabees 12:43
source:
  edition: lxx-swete-1909
  text: ποιησάμενός τε κατʼ ἀνδρολόγιον εἰς ἀργυρίου δραχμὰς δισχιλίας ἀπέστειλεν
    εἰς Ἰερουσαλὴμ προσαγαγεῖν περὶ ἁμαρτίας θυσίαν, πάνυ καλῶς καὶ ἀστείως πράττων,
    ὑπὲρ ἀναστάσεως διαλογιζόμενος.
  language: Greek
  pages:
  - 721
  confidence: high
  validation: agree
translation:
  text: And after taking up a collection man by man, he sent two thousand silver drachmas
    to Jerusalem to provide a sin offering, acting very well and nobly, because he
    was reasoning about the resurrection.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by a man-by-man levy' or 'according to the roll of men'; the Greek κατʼ
      ἀνδρολόγιον is somewhat technical and may refer to an assessment collected individually.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατʼ ἀνδρολόγιον
  chosen: man by man
  alternatives:
  - by a man-by-man collection
  - according to the roll of men
  - per head
  lexicon: LSJ
  rationale: The phrase is idiomatic and tied to ἀνδρολόγιον, a counting/listing of
    men or a levy assessed by men. 'Man by man' preserves the distributive sense and
    the masculine reference in the Greek without over-specifying the exact administrative
    mechanism.
- source_word: ποιησάμενος
  chosen: after taking up
  alternatives:
  - having made
  - after making
  lexicon: BDAG
  rationale: The participle introduces the prior action of gathering the money. 'After
    taking up' fits the context of a collection better than the more wooden 'having
    made'.
- source_word: ἀργυρίου δραχμὰς δισχιλίας
  chosen: two thousand silver drachmas
  alternatives:
  - two thousand drachmas of silver
  lexicon: LSJ
  rationale: This straightforwardly denotes the amount sent. 'Silver drachmas' is
    natural English and keeps both the denomination and the metal explicit.
- source_word: προσαγαγεῖν
  chosen: to provide
  alternatives:
  - to offer
  - to bring forward
  lexicon: BDAG
  rationale: 'In context with θυσίαν and the sending of money to Jerusalem, the infinitive
    expresses the purpose that a sacrifice be presented. ''Provide'' captures the
    indirectness: he sent funds so that the offering could be made.'
- source_word: περὶ ἁμαρτίας θυσίαν
  chosen: a sin offering
  alternatives:
  - a sacrifice for sin
  - an offering concerning sin
  lexicon: LSJ
  rationale: This sacrificial phrase is a standard expression for a sin offering.
    The compact rendering is both accurate and idiomatic.
- source_word: πάνυ καλῶς καὶ ἀστείως πράττων
  chosen: acting very well and nobly
  alternatives:
  - doing very well and fittingly
  - acting very well and honorably
  lexicon: LSJ
  rationale: καλῶς conveys moral commendation; ἀστείως here carries the sense of appropriately,
    finely, or nobly rather than urbanely in the modern sense. 'Nobly' communicates
    the approving tone in readable English.
- source_word: ὑπὲρ ἀναστάσεως διαλογιζόμενος
  chosen: because he was reasoning about the resurrection
  alternatives:
  - thinking of the resurrection
  - considering the resurrection
  - on the basis of the resurrection
  lexicon: BDAG
  rationale: διαλογίζομαι denotes reflective consideration or reasoning. 'Because
    he was reasoning about' preserves the causal connection and the deliberative nuance
    behind his action.
