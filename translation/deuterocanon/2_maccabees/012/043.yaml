theological_decisions:
- issue: Authorial commendation of Judas's action in sending money for a sin offering
    on behalf of the dead
  chosen_reading: 'The verse is translated straightforwardly as explicit approval:
    ''acting very well and nobly,'' without softening the commendation.'
  alternative_readings:
  - A more neutral rendering that minimizes moral approval
  rationale: The Greek plainly includes strong commendatory language (πάνυ καλῶς καὶ
    ἀστείως πράττων). The translation should not mute this theological and ethical
    evaluation, even though the practice described is debated across traditions.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: ἀνάστασις
  chosen_reading: the resurrection
  alternative_readings:
  - resurrection of the dead
  rationale: The noun appears without an explicit genitive. 'The resurrection' is
    the most direct rendering; the broader context supplies that it concerns the dead,
    but the translation should not add words absent from the Greek.
  doctrine_reference: Never import doctrinal claims the text does not make.
