id: 2MA.12.16
reference: 2 Maccabees 12:16
source:
  edition: lxx-swete-1909
  text: καταλαβόμενοι τε τὴν πόλιν τῇ τοῦ θεοῦ θελήσει ἀμυθήτους ἐποιήσαντο σφαγάς,
    ὥστε τὴν παρακειμένην λίμνην τὸ πλάτος ἔχουσαν σταδίους δύο καταρρεῖν τὸ αἷμα
    πεπληρωμένην φαίνεσθαι.
  language: Greek
  pages:
  - 719
  confidence: high
  validation: agree
translation:
  text: And when they had taken the city by the will of God, they made an immeasurable
    slaughter, so that the nearby lake, having a width of two stadia, appeared to
    be overflowing, filled with blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A stadion was an ancient unit of length; two stadia are roughly 370 meters
      or about 400 yards.
    reason: cultural_note
  - marker: b
    text: Or 'appeared to be filled with blood.' The Greek imagery is vivid and may
      suggest the lake looked as though blood were flowing into or through it until
      it seemed full.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταλαβόμενοι
  chosen: had taken
  alternatives:
  - had seized
  - had captured
  lexicon: LSJ
  rationale: Aorist middle participle from καταλαμβάνω in military context naturally
    means taking or capturing a city. 'Had taken' fits the participial sequence smoothly
    in English without over-specifying violence beyond the context.
- source_word: τῇ τοῦ θεοῦ θελήσει
  chosen: by the will of God
  alternatives:
  - according to the will of God
  - through God's will
  lexicon: LSJ
  rationale: The dative phrase expresses means or accordance. 'By the will of God'
    is concise, natural, and preserves the theological claim that the city's fall
    occurred under divine willing.
- source_word: ἀμυθήτους
  chosen: immeasurable
  alternatives:
  - countless
  - unspeakable
  - beyond telling
  lexicon: LSJ
  rationale: The adjective conveys something impossible to number or recount. 'Immeasurable'
    preserves the hyperbolic force while fitting the noun 'slaughter' in modern English.
- source_word: σφαγάς
  chosen: slaughter
  alternatives:
  - slaughters
  - massacre
  lexicon: LSJ
  rationale: Plural noun referring to acts of killing in battle or massacre. English
    idiom prefers the mass noun 'slaughter' here. 'Massacre' is possible but slightly
    more interpretive; 'slaughter' stays closer to the lexical field.
- source_word: παρακειμένην
  chosen: nearby
  alternatives:
  - adjacent
  - lying beside
  lexicon: LSJ
  rationale: The participle describes the lake as situated next to the city or scene.
    'Nearby' is readable modern English and captures the spatial sense.
- source_word: λίμνην
  chosen: lake
  alternatives:
  - pool
  - marsh
  lexicon: LSJ
  rationale: The ordinary sense is 'lake' or standing body of water. Nothing in the
    verse requires a smaller or marshy rendering.
- source_word: τὸ πλάτος ἔχουσαν σταδίους δύο
  chosen: which had a width of two stadia
  alternatives:
  - two stadia wide
  - measuring two stadia across
  lexicon: LSJ
  rationale: This phrase specifies breadth. Retaining 'stadia' preserves the ancient
    measure transparently; 'which had a width of two stadia' closely follows the Greek
    structure.
- source_word: καταρρεῖν
  chosen: overflowing
  alternatives:
  - pouring down
  - running down
  - streaming
  lexicon: LSJ
  rationale: The infinitive literally suggests flowing down or rushing down. In context
    with a lake appearing blood-filled, 'overflowing' best conveys the visual effect
    in idiomatic English without forcing a topographical detail the English reader
    may miss.
- source_word: τὸ αἷμα πεπληρωμένην φαίνεσθαι
  chosen: appeared to be overflowing with blood, filled with it
  alternatives:
  - appeared full of blood
  - appeared to be filled with blood
  lexicon: LSJ
  rationale: The Greek combines the infinitive with a perfect passive participle and
    φαίνεσθαι, producing a vivid visual description. The translation preserves both
    the appearance language and the fullness of blood, even if somewhat emphatic in
    English, because both elements are present in the source.
