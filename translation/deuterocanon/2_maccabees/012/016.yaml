theological_decisions:
- issue: Divine agency in the capture of the city
  chosen_reading: by the will of God
  alternative_readings:
  - according to God's will
  - through God's will
  rationale: The text explicitly attributes the city's capture to God's will. The
    translation preserves this claim without expanding it into a broader doctrine
    of endorsement beyond the verse's wording.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Original-language primacy over translation tradition.'
