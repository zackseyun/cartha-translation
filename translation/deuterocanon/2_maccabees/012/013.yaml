id: 2MA.12.13
reference: 2 Maccabees 12:13
source:
  edition: lxx-swete-1909
  text: Ἐπέβαλεν δὲ καὶ ἐπί τινα πόλιν γεφυρῶν, ὀχυρὰν καὶ τείχεσιν περιτεφραγμένην
    καὶ παμμιγέσιν ἔθνεσιν κατοικουμένην, ὄνομα δὲ Κασπείν.
  language: Greek
  pages:
  - 719
  confidence: high
  validation: minor_mismatch
translation:
  text: He also advanced against a certain city of bridges, strongly fortified and
    enclosed with walls, inhabited by all sorts of nations; its name was Caspin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a city with bridges.' The Greek phrase is compressed and may describe
      the city's notable bridgeworks rather than function as a formal title.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπέβαλεν
  chosen: advanced against
  alternatives:
  - attacked
  - fell upon
  - made an assault on
  lexicon: LSJ
  rationale: The verb can denote setting upon or attacking. 'Advanced against' preserves
    the military movement implied by the aorist without overstating the exact mode
    of assault before the narrative develops it.
- source_word: ἐπί τινα πόλιν
  chosen: against a certain city
  alternatives:
  - upon a certain city
  - against one city
  lexicon: LSJ
  rationale: The indefinite τινα is retained with 'a certain,' which reflects the
    Greek's nonspecific introduction of the city.
- source_word: γεφυρῶν
  chosen: of bridges
  alternatives:
  - with bridges
  - bridge-city
  lexicon: LSJ
  rationale: The genitive is somewhat compressed in Greek. 'City of bridges' is the
    most natural way to preserve the descriptive force, likely indicating a place
    characterized by bridges or causeways.
- source_word: ὀχυρὰν
  chosen: strongly fortified
  alternatives:
  - fortified
  - strong
  lexicon: LSJ
  rationale: The adjective denotes strength in fortification. 'Strongly fortified'
    makes explicit that the strength is military/defensive, not merely general.
- source_word: τείχεσιν περιτεφραγμένην
  chosen: enclosed with walls
  alternatives:
  - surrounded by walls
  - fenced around with walls
  lexicon: LSJ
  rationale: The participle with instrumental dative emphasizes being encircled by
    defensive walls. 'Enclosed with walls' is idiomatic and close to the Greek image.
- source_word: παμμιγέσιν ἔθνεσιν
  chosen: all sorts of nations
  alternatives:
  - mixed peoples
  - people of every kind
  - a very mixed population of nations
  lexicon: LSJ
  rationale: παμμιγής conveys thorough mixture. Because ἔθνεσιν is plural, 'all sorts
    of nations' preserves the ethnic plurality better than a singular collective like
    'population,' while remaining readable.
- source_word: κατοικουμένην
  chosen: inhabited
  alternatives:
  - dwelt in
  - settled by
  lexicon: LSJ
  rationale: A straightforward passive-participial sense fits the city's description.
- source_word: ὄνομα δὲ Κασπείν
  chosen: its name was Caspin
  alternatives:
  - named Caspin
  - called Caspin
  lexicon: LSJ
  rationale: This reproduces the explicit naming formula of the Greek in natural English
    while preserving the transliterated place name.
