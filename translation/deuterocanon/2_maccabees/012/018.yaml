id: 2MA.12.18
reference: 2 Maccabees 12:18
source:
  edition: lxx-swete-1909
  text: καὶ Τιμόθεον μὲν ἐπὶ τῶν τόπων οὐ κατέλαβον, ἄπρακτον τότε ἐκ τῶν τόπων ἐκλελυκότα,
    καταλελοιπότα δὲ φρουρὰν ἐν τινι τόπῳ καὶ μάλιστα ὀχυράν.
  language: Greek
  pages:
  - 719
  confidence: high
  validation: agree
translation:
  text: But they did not catch Timotheus in those places, since he had then withdrawn
    from the places without accomplishing anything, though he had left a garrison
    in a certain place, and a very strong one at that.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they did not seize Timotheus at those places.' The Greek verb can carry
      the sense of catching, overtaking, or seizing.
    reason: lexical_alternative
  - marker: b
    text: The clause 'a very strong one' most directly describes the garrison, though
      the sense may overlap with the strength or fortification of the place where
      it was left.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέλαβον
  chosen: did not catch
  alternatives:
  - did not seize
  - did not overtake
  - did not find
  lexicon: LSJ
  rationale: καταλαμβάνω here most naturally means to catch or seize in a military
    pursuit context. 'Catch' is idiomatic modern English and fits the narrative that
    Timotheus escaped before they arrived.
- source_word: ἐπὶ τῶν τόπων
  chosen: in those places
  alternatives:
  - at the places
  - in the region
  lexicon: LSJ
  rationale: The phrase is somewhat awkward in Greek but refers to the locations just
    mentioned in context. 'In those places' preserves the plural local sense without
    over-specifying.
- source_word: ἄπρακτον
  chosen: without accomplishing anything
  alternatives:
  - unsuccessfully
  - having achieved nothing
  - idle
  lexicon: LSJ
  rationale: ἄπρακτος denotes being ineffective or having accomplished nothing. The
    adverbial force in context is best brought out by 'without accomplishing anything'
    rather than the less transparent 'unsuccessfully.'
- source_word: ἐκλελυκότα
  chosen: had withdrawn
  alternatives:
  - had departed
  - had slipped away
  - had gone out
  lexicon: LSJ
  rationale: From ἐκλύω/ἐκλύομαι in this context, the sense is that Timotheus had
    left or withdrawn from the area. 'Had withdrawn' fits the military setting and
    explains why he was not caught.
- source_word: καταλελοιπότα
  chosen: had left
  alternatives:
  - had abandoned behind
  - had stationed
  lexicon: LSJ
  rationale: The participle indicates that although Timotheus himself had withdrawn,
    he left something behind. 'Had left' is the basic sense; the object and context
    clarify that it was a military force.
- source_word: φρουράν
  chosen: a garrison
  alternatives:
  - a guard
  - a military post
  lexicon: LSJ
  rationale: φρουρά in military narrative commonly denotes a guard force or garrison.
    'Garrison' best conveys an armed detachment left to hold a position.
- source_word: ἐν τινι τόπῳ
  chosen: in a certain place
  alternatives:
  - at one place
  - in some place
  lexicon: LSJ
  rationale: The indefinite expression should remain indefinite. 'In a certain place'
    is natural English and preserves the lack of specificity.
- source_word: μάλιστα ὀχυράν
  chosen: a very strong one
  alternatives:
  - especially strong
  - most strongly fortified
  lexicon: LSJ
  rationale: μάλιστα intensifies ὀχυράν. Since φρουράν is feminine singular, 'a very
    strong one' naturally refers back to the garrison; the phrase could also imply
    a strongly fortified post, but the Greek directly modifies the garrison.
