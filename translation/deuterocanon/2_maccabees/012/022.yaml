id: 2MA.12.22
reference: 2 Maccabees 12:22
source:
  edition: lxx-swete-1909
  text: ἐπιφανείσης δὲ τῆς Ἰούδου σπείρης πρῶτον, καὶ γενομένου δέους ἐπὶ τοὺς πολεμίους,
    φόβου τε ἐκ τῆς τοῦ τὰ πάντα ἐφορῶντος ἐπιφανίας γενομένης ἐπʼ αὐτούς, εἰς φυγὴν
    ὥρμησαν ἄλλος ἀλλαχῇ φερόμενος, ὥστε πολλάκις ὑπὸ τῶν ἰδίων βλάπτεσθαι καὶ ταῖς
    τῶν ξιφῶν ἀκμαῖς ἀναπείρεσθαι.
  language: Greek
  pages:
  - 720
  confidence: high
  validation: agree
translation:
  text: But when Judas’s company first appeared, and dread came upon the enemies—fear
    also coming upon them from the appearing of the One who watches over all things—they
    rushed into flight, each man being driven a different way, so that they were often
    injured by their own men and run through by the points of their swords.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the manifestation of the One who sees all things.” The Greek repeats
      the same appearance-language used earlier in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιφανείσης
  chosen: appeared / appearing
  alternatives:
  - was revealed
  - became visible
  - manifestation
  lexicon: LSJ
  rationale: The aorist participle from ἐπιφαίνω/ἐπιφαίνομαι denotes becoming visible
    or appearing. I render the first instance with the verbal 'appeared' for Judas’s
    company and the second substantivally as 'the appearing' to preserve the repeated
    Greek root and the sense of a sudden manifestation.
- source_word: σπείρης
  chosen: company
  alternatives:
  - band
  - cohort
  - troop
  lexicon: LSJ
  rationale: σπεῖρα can denote a military unit, but here a precise Roman technical
    term like 'cohort' would over-specify in English. 'Company' preserves the military
    sense without implying exact unit size.
- source_word: δέους
  chosen: dread
  alternatives:
  - terror
  - fear
  lexicon: LSJ
  rationale: δέος conveys strong fear or awe. 'Dread' distinguishes it from the following
    φόβος while keeping the elevated tone.
- source_word: πολεμίους
  chosen: enemies
  alternatives:
  - foes
  - opponents
  lexicon: LSJ
  rationale: A straightforward military term; 'enemies' is the clearest natural English
    equivalent.
- source_word: φόβου
  chosen: fear
  alternatives:
  - terror
  - panic
  lexicon: LSJ
  rationale: φόβος is the common term for fear. Using 'fear' alongside 'dread' for
    δέος preserves the Greek's two near-synonyms without flattening them into one
    English word.
- source_word: τοῦ τὰ πάντα ἐφορῶντος
  chosen: the One who watches over all things
  alternatives:
  - the One who sees all things
  - the all-seeing One
  - the One who oversees all things
  lexicon: LSJ
  rationale: ἐφοράω means to look upon, observe, or oversee. 'Watches over all things'
    preserves both comprehensive sight and providential oversight, fitting the theological
    context without over-interpreting.
- source_word: εἰς φυγὴν ὥρμησαν
  chosen: they rushed into flight
  alternatives:
  - they fled in haste
  - they charged into retreat
  - they rushed to flee
  lexicon: LSJ
  rationale: ὁρμάω conveys a sudden rush or impulse; combined with εἰς φυγήν it pictures
    a panicked headlong retreat. 'Rushed into flight' keeps the vividness.
- source_word: ἄλλος ἀλλαχῇ φερόμενος
  chosen: each man being driven a different way
  alternatives:
  - one here, another there
  - each carried off elsewhere
  - scattered in different directions
  lexicon: LSJ
  rationale: The phrase emphasizes chaotic dispersal, literally each one borne in
    a different direction. 'Each man being driven a different way' preserves the distributive
    force and the passive sense of being swept along.
- source_word: βλάπτεσθαι
  chosen: were injured
  alternatives:
  - were harmed
  - were wounded
  lexicon: LSJ
  rationale: βλάπτω is broad for causing harm or damage. 'Were injured' fits the military
    context without claiming a more specific wound term than the Greek itself uses
    here.
- source_word: ἀναπείρεσθαι
  chosen: run through
  alternatives:
  - impaled
  - pierced through
  - skewered
  lexicon: LSJ
  rationale: The verb denotes being transfixed or pierced. 'Run through' is idiomatic,
    vivid, and appropriately martial.
- source_word: ταῖς τῶν ξιφῶν ἀκμαῖς
  chosen: by the points of their swords
  alternatives:
  - with the sword-points
  - by the edges of their swords
  lexicon: LSJ
  rationale: ἀκμή here refers to the point or sharp extremity. 'Points of their swords'
    best matches the image of being pierced.
