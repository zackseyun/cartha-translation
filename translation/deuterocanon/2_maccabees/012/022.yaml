theological_decisions:
- issue: Rendering the divine description τοῦ τὰ πάντα ἐφορῶντος
  chosen_reading: the One who watches over all things
  alternative_readings:
  - the One who sees all things
  - the all-seeing One
  rationale: The phrase identifies God by his universal observation/oversight. The
    chosen rendering preserves the theological claim of comprehensive divine awareness
    and providence without importing later technical terminology.
  doctrine_reference: Translation philosophy §§1, 3, 6
