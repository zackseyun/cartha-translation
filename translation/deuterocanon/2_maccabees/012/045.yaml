theological_decisions:
- issue: Nature of postmortem benefit implied by prayer/atonement for the dead
  chosen_reading: The verse is translated straightforwardly as affirming that atonement
    was made for the dead so that they might be released from sin, without importing
    later doctrinal systems.
  alternative_readings:
  - A narrower memorial sense with no implication of postmortem purification
  - A fuller doctrinal reading aligned with later teachings on purgatorial purification
  rationale: The Greek explicitly states that atonement was made for the dead with
    a view to release from sin. The translation preserves that claim but does not
    encode later theological elaborations not stated in the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
