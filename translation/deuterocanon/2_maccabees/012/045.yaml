id: 2MA.12.45
reference: 2 Maccabees 12:45
source:
  edition: lxx-swete-1909
  text: εἶτε ἐμβλέπων τοῖς μετʼ εὐσεβίας κοιμωμένοις κάλλιστον ἀποκείμενον εὐχαριστήριον,
    ὁσία καὶ εὐσεβὴς ἡ ἐπίνοια. ὅθεν περὶ τῶν τεθνηκότων τὸν ἐξιλασμὸν ἐποιήσατο,
    τῆς ἁμαρτίας ἀπολυθῆναι. XIII
  language: Greek
  pages:
  - 721
  confidence: high
  validation: agree
translation:
  text: for if he was looking to the most excellent reward laid up for those who have
    fallen asleep with godliness, the thought was holy and devout. Therefore he made
    atonement for the dead, so that they might be released from sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'the finest gift laid up'; the Greek term εὐχαριστήριον is
      unusual here and may carry the sense of a reserved benefit or recompense.
    reason: lexical_alternative
  - marker: b
    text: Or 'he made expiation' or 'he made propitiation' for the dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτε
  chosen: for if
  alternatives:
  - if indeed
  - since
  lexicon: LSJ
  rationale: In context this introduces the ground for Judas's action and connects
    with the preceding verse. 'For if' preserves the conditional-causal force without
    overcommitting to a purely causal 'since'.
- source_word: ἐμβλέπων
  chosen: he was looking to
  alternatives:
  - considering
  - having regard for
  lexicon: LSJ
  rationale: The participle conveys directed regard or contemplation. 'Looking to'
    keeps the metaphorical sense of fixing attention on the future reward.
- source_word: τοῖς μετʼ εὐσεβίας κοιμωμένοις
  chosen: those who have fallen asleep in godliness
  alternatives:
  - those who have died with godliness
  - those who sleep in piety
  lexicon: LSJ
  rationale: κοιμάω in the passive/middle is a conventional euphemism for death; 'fallen
    asleep' preserves the source idiom. μετʼ εὐσεβίας is rendered 'in godliness' to
    express manner/quality of their death and life.
- source_word: κάλλιστον ἀποκείμενον εὐχαριστήριον
  chosen: the splendid reward laid up
  alternatives:
  - the most beautiful gift reserved
  - the finest recompense stored up
  lexicon: LSJ
  rationale: The transmitted text reads εὐχαριστήριον, which literally can denote
    a thank offering or thanksgiving gift, but in this context with ἀποκείμενον ('laid
    up, reserved') and the broader sense required by the sentence, it is best understood
    as a reward/benefit laid up for the godly dead. 'Splendid reward laid up' gives
    coherent sense in English while reflecting the commendatory force of κάλλιστον
    and the future-oriented ἀποκείμενον.
- source_word: ὁσία καὶ εὐσεβὴς ἡ ἐπίνοια
  chosen: the thought was holy and devout
  alternatives:
  - the intention was holy and pious
  - the consideration was holy and godly
  lexicon: LSJ
  rationale: ἐπίνοια can mean thought, notion, or intention. 'Thought' is broad and
    natural; 'holy and devout' preserves the paired moral-religious evaluation.
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - for this reason
  - hence
  lexicon: LSJ
  rationale: Marks inference from the preceding evaluation of the thought/intention.
- source_word: περὶ τῶν τεθνηκότων
  chosen: for the dead
  alternatives:
  - concerning the dead
  - on behalf of the dead
  lexicon: LSJ
  rationale: περί with the genitive here concerns the object of the atoning act. 'For
    the dead' is idiomatic and captures the practical sense without over-specifying
    substitution.
- source_word: τὸν ἐξιλασμόν
  chosen: atonement
  alternatives:
  - expiation
  - propitiation
  lexicon: LSJ
  rationale: The noun denotes a means of dealing with sin. 'Atonement' is accessible
    modern English and avoids importing a narrower theory. 'Propitiation' is more
    technical and is better preserved as an alternative rather than main text.
- source_word: ἐποιήσατο
  chosen: he made
  alternatives:
  - he performed
  - he offered
  lexicon: LSJ
  rationale: A common verb used with cultic nouns. 'Made' is idiomatic with 'atonement'
    in biblical English and remains understandable.
- source_word: τῆς ἁμαρτίας ἀπολυθῆναι
  chosen: so that they might be released from sin
  alternatives:
  - so that they might be freed from their sin
  - for release from sin
  lexicon: LSJ
  rationale: ἀπολυθῆναι conveys release or liberation. 'Released from sin' preserves
    the passive infinitive's result/purpose sense and avoids over-interpretive expansion.
