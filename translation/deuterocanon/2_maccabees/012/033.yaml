id: 2MA.12.33
reference: 2 Maccabees 12:33
source:
  edition: lxx-swete-1909
  text: ἐξῆλθεν δὲ μετὰ πεζῶν τρισχιλίων, ἱππέων δὲ τετρακοσίων.
  language: Greek
  pages:
  - 721
  confidence: high
  validation: agree
translation:
  text: Then he went out with three thousand foot soldiers and four hundred horsemen.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - marched out
  - set out
  lexicon: LSJ
  rationale: Aorist of ἐξέρχομαι, literally 'went out.' 'Went out' preserves the straightforward
    narrative movement without adding military nuance beyond what the context already
    supplies.
- source_word: μετὰ
  chosen: with
  alternatives:
  - accompanied by
  lexicon: LSJ
  rationale: The preposition here marks accompaniment. 'With' is the most natural
    and sufficiently literal rendering.
- source_word: πεζῶν
  chosen: foot soldiers
  alternatives:
  - infantry
  - men on foot
  lexicon: LSJ
  rationale: πεζός refers to one on foot, especially in military contrast with cavalry.
    'Foot soldiers' is clear modern English and preserves the military sense better
    than the broader 'men on foot.'
- source_word: τρισχιλίων
  chosen: three thousand
  lexicon: LSJ
  rationale: Cardinal number rendered directly.
- source_word: ἱππέων
  chosen: horsemen
  alternatives:
  - cavalry
  - mounted troops
  lexicon: LSJ
  rationale: ἱππεύς denotes a horseman/cavalryman. 'Horsemen' closely matches the
    Greek form, while still reading naturally in English. 'Cavalry' would shift from
    persons to a collective force.
- source_word: τετρακοσίων
  chosen: four hundred
  lexicon: LSJ
  rationale: Cardinal number rendered directly.
