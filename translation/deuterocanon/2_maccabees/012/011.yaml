id: 2MA.12.11
reference: 2 Maccabees 12:11
source:
  edition: lxx-swete-1909
  text: γενομένης δὲ καρτερᾶς μάχης καὶ τῶν περὶ τὸν Ἰούδαν διὰ τὴν παρὰ τοῦ θεοῦ
    βοήθειαν εὐημερησάντων, ἐλαττωθέντες οἱ νομάδες ἠξίουν δοῦναι τὸν Ἰούδαν δεξιὰν
    αὐτοῖς, ὑπισχνούμενοι καὶ βοσκήματα δώσειν καὶ ἐν τοῖς λοιποῖς Α ὠφέλησεν αὐτούς.
  language: Greek
  pages:
  - 718
  confidence: high
  validation: agree
translation:
  text: And when a fierce battle had taken place, and those with Judas had succeeded
    because of the help from God, the nomads, having been weakened, asked Judas to
    give them his right hand, promising both to provide pasture and to be of use to
    them in the future.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to give them the right hand,' an idiom for making peace or pledging
      alliance.
    reason: cultural_note
  - marker: b
    text: The Greek wording at the end is somewhat compressed; the sense is that they
      promised grazing support and future assistance.
    reason: textual_variant
lexical_decisions:
- source_word: καρτερᾶς μάχης
  chosen: a fierce battle
  alternatives:
  - a hard battle
  - a stubborn battle
  lexicon: LSJ
  rationale: καρτερός commonly conveys strength, severity, or steadfast intensity.
    In context of combat, 'fierce' gives natural English while preserving the battle's
    severity.
- source_word: τῶν περὶ τὸν Ἰούδαν
  chosen: those with Judas
  alternatives:
  - Judas and his men
  - those around Judas
  lexicon: LSJ
  rationale: The idiom refers to Judas's party or forces. 'Those with Judas' stays
    close to the Greek without over-specifying military structure.
- source_word: διὰ τὴν παρὰ τοῦ θεοῦ βοήθειαν
  chosen: because of the help from God
  alternatives:
  - through the help from God
  - because of God's help
  lexicon: LSJ
  rationale: The phrase explicitly attributes success to aid coming from God. 'Because
    of the help from God' preserves both causation and the source marked by παρά.
- source_word: εὐημερησάντων
  chosen: had succeeded
  alternatives:
  - had prospered
  - had fared well
  lexicon: LSJ
  rationale: In battle context the sense is successful outcome rather than general
    prosperity. 'Had succeeded' fits the military narrative in idiomatic English.
- source_word: ἐλαττωθέντες
  chosen: having been weakened
  alternatives:
  - having been reduced
  - having been defeated
  lexicon: LSJ
  rationale: The participle indicates being diminished or weakened. 'Defeated' would
    overstate the lexical force; 'weakened' leaves the degree of loss appropriately
    broad.
- source_word: οἱ νομάδες
  chosen: the nomads
  alternatives:
  - the Nomads
  - the wandering tribesmen
  lexicon: LSJ
  rationale: The noun denotes nomadic peoples. Lowercase 'nomads' treats it as a descriptive
    ethnic/social designation rather than a fixed proper name.
- source_word: ἠξίουν δοῦναι τὸν Ἰούδαν δεξιὰν αὐτοῖς
  chosen: asked Judas to give them his right hand
  alternatives:
  - begged Judas to give them the right hand
  - requested a pledge of friendship from Judas
  lexicon: LSJ
  rationale: Giving the right hand is an idiom for making peace or pledging alliance.
    The main text preserves the idiom transparently; its meaning is clarified in a
    footnote.
- source_word: ὑπισχνούμενοι
  chosen: promising
  alternatives:
  - undertaking
  - pledging
  lexicon: LSJ
  rationale: The participle introduces the terms they offered. 'Promising' is straightforward
    modern English.
- source_word: βοσκήματα δώσειν
  chosen: to provide pasture
  alternatives:
  - to give grazing land
  - to supply fodder
  lexicon: LSJ
  rationale: βοσκήματα concerns grazing or fodder for animals. 'Provide pasture' captures
    the likely practical support without narrowing too much to either land or feed.
- source_word: ἐν τοῖς λοιποῖς
  chosen: in the future
  alternatives:
  - for the rest
  - in other matters thereafter
  lexicon: LSJ
  rationale: The phrase here points to subsequent dealings, not merely 'the rest'
    in abstraction. 'In the future' gives the temporal sense naturally.
- source_word: ὠφέλησεν αὐτούς
  chosen: to be of use to them
  alternatives:
  - to benefit them
  - to help them
  lexicon: LSJ
  rationale: Despite the awkward transmitted wording, the sense is that the nomads
    promised future benefit to Judas's side. 'To be of use to them' preserves the
    broad utility sense without over-interpretation.
