theological_decisions:
- issue: Attribution of military success to divine agency
  chosen_reading: the victory/success is rendered as occurring because of help from
    God
  alternative_readings:
  - a more neutral rendering that foregrounds only military success
  rationale: The Greek explicitly states διὰ τὴν παρὰ τοῦ θεοῦ βοήθειαν. The translation
    preserves the text's theological claim without softening it into mere circumstance.
  doctrine_reference: Translation philosophy §1, §3
