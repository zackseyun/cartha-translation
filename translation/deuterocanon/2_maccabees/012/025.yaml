theological_decisions:
- issue: Rendering σωτηρία in a military-narrative context
  chosen_reading: safety
  alternative_readings:
  - salvation
  - deliverance
  rationale: The verse concerns the release of a person in order to secure the well-being
    of captured kin, not an explicitly theological statement about eternal salvation.
    'Safety' best matches the immediate context while preserving the seriousness of
    the term.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
- issue: Rendering ἀδελφῶν
  chosen_reading: their brothers
  alternative_readings:
  - the brothers
  - their kindred
  rationale: The Greek is masculine plural and contextually refers to fellow Jews/kinsmen
    held in danger. Per gender-accurate policy, 'brothers' is retained rather than
    neutralized.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral.'
