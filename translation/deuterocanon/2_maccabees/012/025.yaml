id: 2MA.12.25
reference: 2 Maccabees 12:25
source:
  edition: lxx-swete-1909
  text: πιστώσαντος δὲ αὐτοῦ διὰ πλειόνων τὸν ὁρισμὸν ἀποκαταστῆσαι τούτους ἀπημάντους,
    ἀπέλυσαν αὐτὸν ἕνεκα τῆς τῶν ἀδελφῶν σωτηρίας.
  language: Greek
  pages:
  - 720
  confidence: high
  validation: minor_mismatch
translation:
  text: But when he had assured them at length that he would restore these men unharmed,
    they released him for the safety of their brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with many words' for 'at length.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the deliverance of their brothers'; the Greek term can also be rendered
      'salvation,' but here likely refers to physical safety.
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστώσαντος
  chosen: had assured
  alternatives:
  - had convinced
  - had pledged
  - had given assurance
  lexicon: LSJ
  rationale: Aorist participle from πιστόω here carries the sense of giving assurance
    or making credible. In context, Judas secures the release by persuading/assuring
    the captors. 'Had assured' fits the causative force and reads naturally in English.
- source_word: διὰ πλειόνων
  chosen: at length
  alternatives:
  - with many words
  - further
  - more fully
  lexicon: LSJ
  rationale: The idiom means by many words or at greater length. 'At length' preserves
    the sense of extended explanation without sounding wooden.
- source_word: τὸν ὁρισμὸν ἀποκαταστῆσαι
  chosen: that he would restore
  alternatives:
  - the agreement to restore
  - the fixed arrangement to return
  - the determination to restore
  lexicon: LSJ
  rationale: 'ὁρισμός can denote a fixed arrangement, determination, or agreement.
    With the infinitive ἀποκαταστῆσαι, the phrase is best represented as the content
    of his assurance: that he would restore them. This avoids an awkwardly literal
    ''the arrangement to restore'' while preserving the sense.'
- source_word: τούτους ἀπημάντους
  chosen: these men unharmed
  alternatives:
  - these persons safe
  - them uninjured
  lexicon: LSJ
  rationale: ἀπήμαντος means unharmed, unhurt, safe from injury. 'These men' makes
    explicit the likely human referent in context and keeps the phrase idiomatic.
- source_word: ἀπέλυσαν αὐτόν
  chosen: they released him
  alternatives:
  - they let him go
  - they dismissed him
  lexicon: LSJ
  rationale: ἀπολύω commonly means release or let go. 'Released' is the most straightforward
    narrative rendering.
- source_word: ἕνεκα τῆς τῶν ἀδελφῶν σωτηρίας
  chosen: for the safety of their brothers
  alternatives:
  - for the salvation of the brothers
  - because of the deliverance of their brothers
  lexicon: LSJ
  rationale: σωτηρία can mean safety, deliverance, or salvation. In this military-hostage
    context, physical safety is primary, so 'safety' is preferable. τῶν ἀδελφῶν is
    rendered 'their brothers' to reflect the relational sense in context.
