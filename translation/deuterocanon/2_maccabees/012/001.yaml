id: 2MA.12.1
reference: 2 Maccabees 12:1
source:
  edition: lxx-swete-1909
  text: ἹΓενομένων δὲ τῶν συνθηκῶν τούτων, ὁ μὲν Λυσίας ἀπῆε πρὸς τὸν βασιλέα, οἱ
    δὲ Ἰουδαῖοι περὶ τὴν γεωργίαν ἐγίνοντο.
  language: Greek
  pages:
  - 718
  confidence: high
  validation: agree
translation:
  text: After these agreements had been made, Lysias went away to the king, but the
    Jews occupied themselves with farming.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had been concluded' for 'had been made'; the Greek participle can emphasize
      the completion of the agreements.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'were occupied around farming,' an idiom meaning they were engaged
      in agricultural work.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γενομένων
  chosen: had been made
  alternatives:
  - had come about
  - having been concluded
  lexicon: LSJ
  rationale: Aorist participle of γίνομαι used with συνθηκῶν refers to the agreements
    coming into effect or being concluded. 'Had been made' is idiomatic English that
    preserves the completed prior action before the main verbs.
- source_word: συνθηκῶν
  chosen: agreements
  alternatives:
  - treaties
  - terms of peace
  - covenants
  lexicon: LSJ
  rationale: συνθήκη commonly denotes an agreement or compact. 'Agreements' is broad
    and natural; 'treaties' may sound overly formal or interstate, while 'covenants'
    would import stronger biblical-theological resonance not required here.
- source_word: ἀπῆε
  chosen: went away
  alternatives:
  - departed
  - went off
  lexicon: LSJ
  rationale: Imperfect of ἄπειμι/ἄπειμι in narrative context indicates departure.
    'Went away' is clear modern English and fits the movement back to the king.
- source_word: πρὸς τὸν βασιλέα
  chosen: to the king
  alternatives:
  - back to the king
  - toward the king
  lexicon: LSJ
  rationale: πρός with accusative here marks direction toward a person. 'To the king'
    is the straightforward rendering; 'back' is plausible from context but not explicit
    in the Greek.
- source_word: περὶ τὴν γεωργίαν
  chosen: with farming
  alternatives:
  - with agriculture
  - about cultivation
  - in agricultural work
  lexicon: LSJ
  rationale: The idiom with περὶ plus accusative conveys being occupied with or engaged
    in something. γεωργία refers to farming/agriculture. 'With farming' is concise
    and idiomatic.
- source_word: ἐγίνοντο
  chosen: occupied themselves
  alternatives:
  - were engaged
  - busied themselves
  - turned themselves
  lexicon: LSJ
  rationale: In combination with περὶ τὴν γεωργίαν, ἐγίνοντο expresses entering into
    or being engaged in an activity. 'Occupied themselves' captures the sense without
    woodenly repeating 'were becoming'.
