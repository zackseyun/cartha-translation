id: 2MA.12.4
reference: 2 Maccabees 12:4
source:
  edition: lxx-swete-1909
  text: μετὰ δὲ τὸ κοινὸν τῆς πόλεως ψήφισμα καὶ τούτων ἐπιδεξαμένων, ὡς ἂν εἰρηνεύειν
    θέλοντων καὶ μηδὲν ὑπόπτον ἐχόντων, ἀχθέντας αὐτοὺς ἐβύθισαν ὄντας οὐκ ἔλαττον
    τῶν διακοσίων.
  language: Greek
  pages:
  - 718
  confidence: high
  validation: agree
translation:
  text: But after the common resolution of the city, and when these men had accepted
    it as though they wanted peace and had nothing suspicious in mind, they took them
    out and drowned them, no fewer than two hundred of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had nothing suspect about them'; the Greek phrase may describe either
      their apparent innocence or the absence of suspicious intent.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ κοινὸν τῆς πόλεως ψήφισμα
  chosen: the common resolution of the city
  alternatives:
  - the public decree of the city
  - the city's common vote
  - the general decision of the city
  lexicon: LSJ
  rationale: ψήφισμα denotes a formal decision, vote, or decree. 'Resolution' preserves
    the civic and collective sense of τὸ κοινόν without overstating it as a royal
    edict.
- source_word: τούτων ἐπιδεξαμένων
  chosen: these men had accepted it
  alternatives:
  - they had agreed to it
  - they had received it
  lexicon: LSJ
  rationale: ἐπιδέχομαι here carries the sense of accepting or assenting to the city's
    proposal. 'Accepted it' is idiomatic and fits the participial construction.
- source_word: ὡς ἂν εἰρηνεύειν θέλοντων
  chosen: as though they wanted peace
  alternatives:
  - as if they wished to live in peace
  - on the pretense of desiring peace
  lexicon: LSJ
  rationale: The construction presents the men as appearing or being regarded as peace-seeking.
    'As though they wanted peace' keeps the comparative force without overinterpreting
    motive.
- source_word: μηδὲν ὑπόπτον ἐχόντων
  chosen: had nothing suspicious in mind
  alternatives:
  - harbored no suspicion
  - had nothing suspect about them
  lexicon: LSJ
  rationale: ὑπόπτον can mean suspicious or suspect. In context the phrase indicates
    that they were regarded as posing no suspicious threat. 'Had nothing suspicious
    in mind' conveys the sense naturally in English, though the Greek could also be
    read more passively.
- source_word: ἀχθέντας
  chosen: they took them out
  alternatives:
  - having led them away
  - after bringing them out
  lexicon: LSJ
  rationale: The aorist passive participle from ἄγω means 'having been led/brought.'
    In English, 'they took them out' makes the action clear and connects smoothly
    to the main verb.
- source_word: ἐβύθισαν
  chosen: drowned them
  alternatives:
  - sank them
  - cast them into the depths
  lexicon: LSJ
  rationale: βυθίζω means to sink or plunge into the depths. Given the human object,
    'drowned them' best expresses the result in clear English.
- source_word: ὄντας οὐκ ἔλαττον τῶν διακοσίων
  chosen: no fewer than two hundred of them
  alternatives:
  - being not less than two hundred
  - at least two hundred
  lexicon: LSJ
  rationale: The phrase gives the number of victims. 'No fewer than two hundred of
    them' is a natural rendering that preserves the lower-bound force of οὐκ ἔλαττον.
