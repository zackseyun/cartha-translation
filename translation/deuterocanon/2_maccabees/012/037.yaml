theological_decisions:
- issue: Religious element of the cry
  chosen_reading: The cry is rendered as a battle cry accompanied by hymns, preserving
    both military action and worship.
  alternative_readings:
  - a shout of praise
  - a cry in hymn-singing
  rationale: The Greek joins κραυγή with μεθʼ ὕμνων, so the translation should not
    flatten either side. The verse depicts combat undertaken with explicit religious
    expression, but it does not require expanding this into a doctrinal statement
    beyond the wording.
  doctrine_reference: Translation philosophy §§1, 6
