id: 2MA.12.37
reference: 2 Maccabees 12:37
source:
  edition: lxx-swete-1909
  text: καταρξάμενος τῇ πατρίῳ φωνῇ τὴν μεθʼ ὕμνων κραυγήν, ἐνσείσας ἀπροσδοκήτως
    τοῖς περὶ τὸν Γοργίαν τροπὴν ἐποιήσατο αὐτῶν.
  language: Greek
  pages:
  - 721
  confidence: high
  validation: minor_mismatch
translation:
  text: Beginning the battle cry in the language of his fathers, with hymns, he shook
    those around Gorgias by surprise and put them to flight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the ancestral language.' The Greek phrase may emphasize either the
      language used or the ancestral character of the cry.
    reason: lexical_alternative
  - marker: b
    text: Literally 'made a rout of them' or 'caused their turning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταρξάμενος
  chosen: Beginning
  alternatives:
  - having begun
  - starting
  lexicon: LSJ
  rationale: Aorist middle participle introducing Judas's initiating action. 'Beginning'
    keeps the participial linkage natural in English without overformal stiffness.
- source_word: τῇ πατρίῳ φωνῇ
  chosen: in the language of his fathers
  alternatives:
  - in the ancestral language
  - with the native cry
  lexicon: LSJ
  rationale: πατρίῳ means ancestral/paternal; φωνή can mean voice, speech, or language.
    In this context it most naturally refers to the ancestral tongue used for the
    cry, not merely volume or tone. 'His fathers' preserves the masculine ancestral
    idiom more closely than a neutralized form.
- source_word: τὴν μεθʼ ὕμνων κραυγήν
  chosen: the battle cry ... with hymns
  alternatives:
  - the shout with hymns
  - the cry accompanied by hymns
  lexicon: LSJ
  rationale: κραυγή is a loud cry or shout; in a military context 'battle cry' fits
    the scene. μεθʼ ὕμνων indicates accompaniment by hymns, so the English preserves
    both the martial and worshipful elements.
- source_word: ἐνσείσας
  chosen: he shook
  alternatives:
  - having thrown into confusion
  - having startled
  lexicon: LSJ
  rationale: Literally 'having shaken.' In context it denotes sudden disturbance or
    discomfiture of the enemy. 'He shook' preserves the vivid metaphor while remaining
    intelligible.
- source_word: ἀπροσδοκήτως
  chosen: by surprise
  alternatives:
  - unexpectedly
  - suddenly
  lexicon: LSJ
  rationale: The adverb marks the unexpected nature of the attack. 'By surprise' expresses
    the tactical sense idiomatically in English.
- source_word: τοῖς περὶ τὸν Γοργίαν
  chosen: those around Gorgias
  alternatives:
  - Gorgias and his men
  - the men with Gorgias
  lexicon: LSJ
  rationale: The phrase refers to Gorgias's party or forces. 'Those around Gorgias'
    stays close to the Greek while remaining clear.
- source_word: τροπὴν ἐποιήσατο αὐτῶν
  chosen: put them to flight
  alternatives:
  - routed them
  - caused their retreat
  lexicon: LSJ
  rationale: τροπή in military usage denotes rout or turning in flight. The idiom
    'put them to flight' is a natural English equivalent that preserves the military
    force.
