id: 2MA.12.36
reference: 2 Maccabees 12:36
source:
  edition: lxx-swete-1909
  text: τῶν δὲ περὶ τὸν Ἔσδριν ἐπὶ πλεῖον μαχομένων καὶ κατακόπων ὄντων,,, ἐπικαλεσάμενος
    Ἰούδας τὸν κύριον σύμμαχον φανῆναι καὶ προοδηγὸν φανῆναι τοῦ πολέμου.
  language: Greek
  pages:
  - 721
  confidence: high
  validation: agree
translation:
  text: But those with Esdrin were fighting for a longer time and were exhausted,
    so Judas called on the Lord to appear as an ally and as the leader of the battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to show himself as an ally and as a guide in battle.' The Greek προοδηγός
      can emphasize one who goes before as a guide.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν δὲ περὶ τὸν Ἔσδριν
  chosen: those with Esdrin
  alternatives:
  - the men around Esdrin
  - Esdrin's forces
  lexicon: LSJ
  rationale: The idiom περὶ + accusative with a personal name denotes the group associated
    with or under that person. 'Those with Esdrin' is concise and preserves the Greek
    construction without over-specifying military rank.
- source_word: ἐπὶ πλεῖον
  chosen: for a longer time
  alternatives:
  - more intensely
  - to a greater extent
  lexicon: LSJ
  rationale: In context with μαχομένων, the phrase most naturally indicates duration
    or continuance of the fighting rather than intensity alone. 'For a longer time'
    communicates prolonged engagement.
- source_word: μαχομένων
  chosen: were fighting
  alternatives:
  - were battling
  - were engaged in combat
  lexicon: LSJ
  rationale: A straightforward rendering of the participle from μάχομαι in military
    context. 'Were fighting' is natural modern English and keeps the ongoing aspect.
- source_word: κατακόπων ὄντων
  chosen: were exhausted
  alternatives:
  - were worn out
  - were utterly spent
  lexicon: LSJ
  rationale: κατάκοπος denotes wearied or exhausted from toil. 'Were exhausted' is
    clear and suitably strong without exaggeration.
- source_word: ἐπικαλεσάμενος
  chosen: called on
  alternatives:
  - invoked
  - appealed to
  lexicon: LSJ
  rationale: In prayer context with τὸν κύριον, the verb means to call upon or invoke.
    'Called on' is idiomatic and accessible.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: LSJ
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this Jewish-Greek context
    it refers reverently to God.
- source_word: σύμμαχον
  chosen: an ally
  alternatives:
  - a helper
  - an ally in battle
  lexicon: LSJ
  rationale: σύμμαχος is a military ally or one fighting alongside another. 'Ally'
    preserves the martial nuance better than the more general 'helper.'
- source_word: προοδηγὸν
  chosen: the leader
  alternatives:
  - guide
  - one who goes before them
  lexicon: LSJ
  rationale: The noun denotes one who leads the way or goes before. In battle context,
    'leader' reads naturally in English while preserving the image of divine advance.
- source_word: φανῆναι
  chosen: to appear
  alternatives:
  - to show himself
  - to become manifest
  lexicon: LSJ
  rationale: The infinitive from φαίνω here expresses manifestation. 'To appear' is
    the most direct and idiomatic rendering, and it fits both predicates ('ally' and
    'leader').
- source_word: τοῦ πολέμου
  chosen: of the battle
  alternatives:
  - in the war
  - for the battle
  lexicon: LSJ
  rationale: 'The genitive is best taken with προοδηγόν: ''leader of the battle,''
    i.e., the one who goes before in battle. ''Battle'' suits the immediate combat
    scene better than broader ''war.'''
