theological_decisions:
- issue: Rendering κύριος in a prayer context
  chosen_reading: the Lord
  alternative_readings:
  - the Master
  rationale: The verse depicts Judas invoking God for aid in battle. Following the
    project's contested-terms guidance, κύριος is rendered 'Lord' rather than a less
    covenantally resonant alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Divine manifestation language in φανῆναι
  chosen_reading: to appear as an ally and as the leader of the battle
  alternative_readings:
  - to show himself an ally and guide in battle
  rationale: The Greek asks for God's manifest intervention without specifying a visible
    theophany. 'Appear' preserves that tension rather than resolving it into either
    purely visible manifestation or merely metaphorical help.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
