id: 2MA.12.14
reference: 2 Maccabees 12:14
source:
  edition: lxx-swete-1909
  text: οἱ δὲ ἔνδον πεποιθότες τῇ τῶν τειχέων ἐρυμνότητι τῇ τε τῶν βρωμάτων παραθέσει,
    ἀναυθαγέστερον ἐχρῶντο τοῖς περὶ τὸν Ἰούδαν, λοιδοροῦντες, καὶ προσέτι βλασφημοῦντες
    καὶ λαλούντες ἃ μὴ θέ- μις.
  language: Greek
  pages:
  - 719
  confidence: high
  validation: agree
translation:
  text: But those inside, trusting in the strength of the walls and in the supply
    of provisions, treated Judas and his men more arrogantly, reviling them, and even
    blaspheming and speaking what is not lawful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those around Judas.' The Greek idiom refers to Judas's company or forces.
    reason: lexical_alternative
  - marker: b
    text: '''Speaking what is not lawful'' may also be rendered ''saying what ought
      not be said,'' with moral or religious force.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἔνδον
  chosen: those inside
  alternatives:
  - those within
  - the men inside
  lexicon: LSJ
  rationale: A straightforward spatial expression referring to the defenders within
    the city/fortification. 'Those inside' is natural modern English and preserves
    the referent without over-specifying gender beyond the Greek participial construction.
- source_word: πεποιθότες
  chosen: trusting
  alternatives:
  - having confidence
  - relying
  lexicon: BDAG
  rationale: The perfect participle conveys settled confidence. 'Trusting' captures
    their ongoing reliance in context without sounding overly wooden.
- source_word: τῇ τῶν τειχέων ἐρυμνότητι
  chosen: in the strength of the walls
  alternatives:
  - in the security of the walls
  - in the fortification of the walls
  lexicon: LSJ
  rationale: ἐρυμνότης denotes strength/defensibility/fortified character. 'Strength
    of the walls' is idiomatic and communicates the military sense clearly.
- source_word: τῇ τε τῶν βρωμάτων παραθέσει
  chosen: in the supply of provisions
  alternatives:
  - in the abundance of food
  - in the store of food
  lexicon: LSJ
  rationale: βρώματα are foods/provisions, and παράθεσις here refers to a setting
    forth or supply/stock. 'Supply of provisions' fits siege context better than the
    more domestic-sounding 'setting out of foods.'
- source_word: ἀναυθαγέστερον ἐχρῶντο
  chosen: treated ... more arrogantly
  alternatives:
  - behaved more insolently toward
  - dealt more presumptuously with
  lexicon: LSJ
  rationale: The comparative adverb modifies their manner toward Judas's forces. 'Treated
    ... more arrogantly' communicates heightened insolence in readable English.
- source_word: τοῖς περὶ τὸν Ἰούδαν
  chosen: Judas and his men
  alternatives:
  - those around Judas
  - Judas's party
  lexicon: LSJ
  rationale: The idiom means the group associated with or surrounding Judas. 'Judas
    and his men' is a natural contextual rendering that makes the military reference
    clear.
- source_word: λοιδοροῦντες
  chosen: reviling
  alternatives:
  - insulting
  - abusing verbally
  lexicon: BDAG
  rationale: The participle denotes verbal abuse or taunting. 'Reviling' preserves
    the severity and rhetorical force.
- source_word: βλασφημοῦντες
  chosen: blaspheming
  alternatives:
  - speaking abusively
  - uttering impious words
  lexicon: BDAG
  rationale: Because the next phrase specifies unlawful speech, and because βλασφημέω
    can include impious speech against God, 'blaspheming' best preserves the likely
    religious weight here.
- source_word: λαλοῦντες ἃ μὴ θέμις
  chosen: speaking what is not lawful
  alternatives:
  - saying what is forbidden
  - uttering what ought not be said
  lexicon: LSJ
  rationale: θέμις denotes what is right, permitted, or sanctioned, often with religious/moral
    force. 'What is not lawful' preserves that gravity while remaining concise.
