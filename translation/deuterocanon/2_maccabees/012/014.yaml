theological_decisions:
- issue: Force of βλασφημοῦντες in relation to λοιδοροῦντες
  chosen_reading: Retain distinct religious force with 'blaspheming' rather than collapsing
    it into mere insult.
  alternative_readings:
  - translate both terms as general verbal abuse
  - render βλασφημοῦντες as 'speaking abusively'
  rationale: 'The verse stacks terms intensively: reviling, then additionally blaspheming,
    then speaking what is not lawful. Preserving ''blaspheming'' keeps the escalation
    and avoids flattening possible impiety into ordinary mockery.'
  doctrine_reference: Preserve theological tension rather than resolve it.
