id: 2MA.12.31
reference: 2 Maccabees 12:31
source:
  edition: lxx-swete-1909
  text: εὐχαριστήσαντες καὶ προπαρακαλέσαντες καὶ εἰς τὰ λοιπὰ πρὸς τὸ γένος εὐμενεῖς
    εἶναι, παρεγενήθησαν εἰς Ἱεροσόλυμα, τῆς τῶν ἑβδομάδων ἑορτῆς οὔσης ὑπογύου.
  language: Greek
  pages:
  - 720
  confidence: high
  validation: minor_mismatch
translation:
  text: After giving thanks and urging them beforehand also in the future to be well-disposed
    toward the nation, they came to Jerusalem, as the feast of weeks was approaching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Festival of Weeks'; traditionally, 'Pentecost.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐχαριστήσαντες
  chosen: after giving thanks
  alternatives:
  - after expressing gratitude
  - after thanking them
  lexicon: LSJ
  rationale: Aorist participle indicating prior action. The object is unstated; 'giving
    thanks' preserves the Greek's brevity without supplying an explicit recipient
    beyond the context.
- source_word: προπαρακαλέσαντες
  chosen: urging them beforehand
  alternatives:
  - encouraging them in advance
  - exhorting them beforehand
  lexicon: LSJ
  rationale: The compound verb suggests urging or exhorting in advance/before departure.
    'Urging them beforehand' keeps both the paraenetic sense and the prefixed temporal
    nuance.
- source_word: εἰς τὰ λοιπά
  chosen: to continue
  alternatives:
  - for the future
  - from then on
  - for the rest
  lexicon: LSJ
  rationale: Idiomatic phrase meaning 'for the future' or 'henceforth.' In English,
    'to continue' naturally conveys the forward-looking force in connection with the
    infinitive εἶναι.
- source_word: πρὸς τὸ γένος
  chosen: toward the nation
  alternatives:
  - toward their people
  - toward the race/kin
  lexicon: LSJ
  rationale: γένος here refers to the Jewish people as a national/ethnic body. 'Nation'
    is concise and fits the historical setting better than the more biologically tinged
    'race' or the narrower 'kin'.
- source_word: εὐμενεῖς εἶναι
  chosen: to be well-disposed
  alternatives:
  - to be favorable
  - to remain kindly disposed
  lexicon: LSJ
  rationale: εὐμενής denotes favorable or kindly disposition. 'Well-disposed' is natural
    modern English and preserves the attitudinal sense.
- source_word: παρεγενήθησαν
  chosen: they came
  alternatives:
  - they arrived
  - they presented themselves
  lexicon: LSJ
  rationale: Common narrative verb for arriving or coming to a place. 'They came'
    is straightforward and idiomatic.
- source_word: τῆς τῶν ἑβδομάδων ἑορτῆς
  chosen: the feast of weeks
  alternatives:
  - the Festival of Weeks
  - the feast of Pentecost
  lexicon: LSJ
  rationale: A formal rendering of the Jewish festival name in Greek. 'Feast of Weeks'
    preserves the source expression directly; 'Pentecost' would interpret via later
    Greek/Jewish-Christian usage rather than translate the phrase itself.
- source_word: οὔσης ὑπογύου
  chosen: was near
  alternatives:
  - was approaching
  - was imminent
  lexicon: LSJ
  rationale: The genitive absolute marks contemporaneous circumstance. ὑπόγυος conveys
    nearness or being close at hand; 'was near' is clear and restrained.
