theological_decisions:
- issue: Rendering τῆς τῶν ἑβδομάδων ἑορτῆς
  chosen_reading: the feast of weeks
  alternative_readings:
  - the Festival of Weeks
  - Pentecost
  rationale: The Greek explicitly names the Jewish feast by its descriptive title.
    Following original-language primacy, the translation renders the phrase rather
    than substituting the later conventional name 'Pentecost,' which can be preserved
    as an explanatory alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    readable modern English'
