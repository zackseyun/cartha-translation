id: 2MA.12.17
reference: 2 Maccabees 12:17
source:
  edition: lxx-swete-1909
  text: Ἐκεῖθεν δὲ ἀποσπάσαντες σταδίους ἑπτακοσίους πεντήκοντα διήνυσαν εἰς τὸν Χάρακα
    καὶ πρὸς τοὺς λεγομένους Τουβιηνοὺς Ἰουδαίους.
  language: Greek
  pages:
  - 719
  confidence: high
  validation: agree
translation:
  text: From there they marched seven hundred fifty stadia and came to Charax, and
    to the Jews called Toubianoi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the so-called Toubian Jews'; the group name Τουβιηνοί may also be rendered
      interpretively as 'Tobiads.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποσπάσαντες
  chosen: marched
  alternatives:
  - set out
  - departed
  - moved on
  lexicon: LSJ
  rationale: The participle literally suggests drawing off or breaking away from a
    place. In travel narrative English, 'marched' captures a military departure in
    context better than the more wooden 'having drawn away' or the overly neutral
    'departed'.
- source_word: σταδίους ἑπτακοσίους πεντήκοντα
  chosen: seven hundred fifty stadia
  alternatives:
  - 750 stadia
  - about 86 miles
  lexicon: LSJ
  rationale: The source gives the ancient distance measure explicitly. Retaining 'stadia'
    preserves the historical texture and avoids importing a modern conversion into
    the main text.
- source_word: διήνυσαν
  chosen: came
  alternatives:
  - traveled
  - completed the journey
  - went through
  lexicon: LSJ
  rationale: The verb denotes accomplishing or traversing a distance. With the destination
    phrase following, 'came' gives natural English while still reflecting successful
    arrival after the stated march.
- source_word: εἰς τὸν Χάρακα
  chosen: to Charax
  alternatives:
  - into Charax
  lexicon: LSJ
  rationale: This is a place name in transliteration. 'To Charax' is idiomatic for
    movement toward/arrival at a town.
- source_word: τοὺς λεγομένους Τουβιηνοὺς Ἰουδαίους
  chosen: the Jews called Toubianoi
  alternatives:
  - the so-called Toubian Jews
  - the Jews known as Tobiads
  lexicon: LSJ
  rationale: λεγομένους means 'called' or 'known as.' Τουβιηνούς is best transliterated
    directly from the Greek witness as 'Toubianoi' rather than normalized to the interpretive
    'Tobiads' in the main text. 'The Jews called Toubianoi' preserves the wording
    while remaining readable.
