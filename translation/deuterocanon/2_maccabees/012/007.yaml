id: 2MA.12.7
reference: 2 Maccabees 12:7
source:
  edition: lxx-swete-1909
  text: τοῦ δὲ χωρίου συγκλεισθέντος, ἀνέλυσεν, πάλιν ἥξων καὶ τὸ σύμπαν τῶν Ἰοππιτῶν
    ἐκριζῶσαι πολίτευμα.
  language: Greek
  pages:
  - 718
  confidence: high
  validation: agree
translation:
  text: But when the place had been shut up, he withdrew, intending to come again
    and root out the entire body politic of the people of Joppa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole civic community of the people of Joppa.' The Greek term can
      denote the commonwealth, citizen body, or political community.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ ... χωρίου
  chosen: the place
  alternatives:
  - the district
  - the area
  - the stronghold
  lexicon: LSJ
  rationale: χωρίον commonly denotes a place, tract, or locality. In this context
    a neutral 'place' best fits the narrative without over-specifying whether it is
    a district or fortified site.
- source_word: συγκλεισθέντος
  chosen: had been shut up
  alternatives:
  - had been closed off
  - had been hemmed in
  - had been blockaded
  lexicon: LSJ
  rationale: The aorist passive participle from συγκλείω indicates being enclosed
    or shut in/shut up. 'Had been shut up' preserves the passive sense and leaves
    the exact military mechanism unstated.
- source_word: ἀνέλυσεν
  chosen: he withdrew
  alternatives:
  - he departed
  - he broke camp
  - he went away
  lexicon: LSJ
  rationale: ἀναλύω in narrative can mean depart or break up camp. 'He withdrew' fits
    a military setting and the immediate sense of leaving with intent to return.
- source_word: πάλιν ἥξων
  chosen: intending to come again
  alternatives:
  - to return again
  - planning to come back
  lexicon: LSJ
  rationale: The future participle expresses purpose or intention. 'Intending to come
    again' makes that purposive nuance explicit in natural English.
- source_word: τὸ σύμπαν ... πολίτευμα
  chosen: the entire body politic
  alternatives:
  - the whole commonwealth
  - the entire citizen body
  - the whole civic community
  lexicon: LSJ
  rationale: πολίτευμα refers to a civic body, commonwealth, or organized citizenry
    rather than merely individuals. 'Body politic' best preserves the corporate-political
    force, while σύμπαν adds the sense of totality.
- source_word: τῶν Ἰοππιτῶν
  chosen: of the people of Joppa
  alternatives:
  - of the Joppites
  - of Joppa
  lexicon: LSJ
  rationale: Ἰοππῖται denotes the inhabitants/citizens of Joppa. 'People of Joppa'
    is clearer for modern readers than the less familiar ethnicon 'Joppites'.
- source_word: ἐκριζῶσαι
  chosen: to root out
  alternatives:
  - to uproot
  - to destroy utterly
  - to eradicate
  lexicon: LSJ
  rationale: ἐκριζόω literally means uproot; figuratively it conveys complete removal.
    'Root out' preserves the metaphor and the severity of the intended action.
