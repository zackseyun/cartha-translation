theological_decisions:
- issue: Severity and scope of Judas's intended action toward Joppa
  chosen_reading: Render the phrase corporately as 'root out the entire body politic
    of the people of Joppa'
  alternative_readings:
  - destroy all the inhabitants of Joppa
  - uproot the whole government of Joppa
  rationale: The Greek centers on πολίτευμα, a civic-political collective, modified
    by τὸ σύμπαν. The wording should preserve the corporate scope without narrowing
    it either to only governmental structures or flattening it into a simple reference
    to every individual inhabitant. The verse reports intent in severe military-political
    terms without requiring interpretive softening or expansion.
  doctrine_reference: Translation philosophy §§1, 3, 5
