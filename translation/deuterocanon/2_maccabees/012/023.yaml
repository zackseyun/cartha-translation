id: 2MA.12.23
reference: 2 Maccabees 12:23
source:
  edition: lxx-swete-1909
  text: ἐποίει δὲ τὸν διωγμὸν εὐτονώτερον Ἰούδας, συνετίνων τοὺς ἀλιτηρίους, διέφθειρεν
    δὲ εἰς μυριάδας τρεῖς ἀνδρῶν.
  language: Greek
  pages:
  - 720
  confidence: high
  validation: agree
translation:
  text: But Judas pressed the pursuit more vigorously, and, striking down the wretches,
    he destroyed as many as three thousand men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''three myriads of men'' (literally, thirty thousand). The transmitted
      wording is difficult in context; many understand it as meaning three thousand
      here.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐποίει ... τὸν διωγμόν
  chosen: pressed the pursuit
  alternatives:
  - carried on the pursuit
  - made the pursuit
  lexicon: LSJ
  rationale: The idiom ἐποιεῖν τὸν διωγμόν is not naturally rendered woodenly as 'made
    the pursuit' in English. 'Pressed the pursuit' preserves the action of continuing
    and intensifying the chase in readable English.
- source_word: εὐτονώτερον
  chosen: more vigorously
  alternatives:
  - more intensely
  - with greater force
  lexicon: LSJ
  rationale: Comparative adverb from εὔτονος conveys increased intensity or energy.
    'More vigorously' is idiomatic and fits the military context.
- source_word: συνετίνων
  chosen: striking down
  alternatives:
  - beating together
  - smashing
  - cutting down
  lexicon: LSJ
  rationale: In context of battle, the participle denotes violent attacking rather
    than a literal 'bringing together.' 'Striking down' captures the ongoing martial
    action without over-specifying weaponry.
- source_word: τοὺς ἀλιτηρίους
  chosen: the wretches
  alternatives:
  - the villains
  - the accursed men
  - the criminals
  lexicon: LSJ
  rationale: ἀλιτήριος is a strongly pejorative term for vile or accursed persons.
    'Wretches' preserves the narrator's moral condemnation in accessible English;
    'criminals' would sound too juridical.
- source_word: διέφθειρεν
  chosen: he destroyed
  alternatives:
  - he killed
  - he wiped out
  lexicon: LSJ
  rationale: In military narrative διαφθείρω can mean destroy or kill. 'Destroyed'
    reflects the Greek verb's breadth and suits the object 'three thousand men' in
    battle context.
- source_word: εἰς μυριάδας τρεῖς ἀνδρῶν
  chosen: as many as three thousand men
  alternatives:
  - about three thousand men
  - to the number of three thousand men
  lexicon: LSJ
  rationale: The transmitted text literally reads 'into three myriads of men,' which
    would normally suggest thirty thousand, but in this narrative context and common
    translation judgment the phrase is taken idiomatically/text-critically as three
    thousand. Because the Greek form is difficult, the main text adopts the likely
    sense while preserving the more literal numerical alternative in a footnote.
