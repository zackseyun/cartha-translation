id: 2MA.12.30
reference: 2 Maccabees 12:30
source:
  edition: lxx-swete-1909
  text: ἀπομαρτυρησάντων δὲ τῶν ἐκεῖ καθεστώτων Ἰουδαίων ἣν οἱ Σκυθοπολεῖται ἔχον
    πρὸς αὐτοὺς εὔνοιαν, καὶ ἐν τοῖς τῆς ἀτυχίας καιροῖς ἥμερον ἀπάντησιν,
  language: Greek
  pages:
  - 720
  confidence: high
  validation: agree
translation:
  text: And when the Jews who were settled there testified to the goodwill that the
    people of Scythopolis had toward them, and to their gentle treatment in times
    of misfortune,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kind reception' for 'gentle treatment'; the Greek phrase literally speaks
      of a 'gentle encounter/meeting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπομαρτυρησάντων
  chosen: testified
  alternatives:
  - bore witness
  - reported
  lexicon: LSJ
  rationale: Aorist participle of ἀπομαρτυρέω, introducing the content of what the
    local Jews affirmed. 'Testified' preserves the witness/report sense without sounding
    overly formal.
- source_word: τῶν ἐκεῖ καθεστώτων Ἰουδαίων
  chosen: the Jews who were settled there
  alternatives:
  - the Jews established there
  - the resident Jews there
  lexicon: LSJ
  rationale: καθεστώτων literally means those 'set' or 'established' there; in context
    it refers to local resident Jews. 'Settled there' is natural English and preserves
    the idea of established residence.
- source_word: οἱ Σκυθοπολεῖται
  chosen: the people of Scythopolis
  alternatives:
  - the Scythopolitans
  lexicon: LSJ
  rationale: The ethnicon refers to the inhabitants of Scythopolis. 'People of Scythopolis'
    is more readable modern English than the less familiar demonym, while keeping
    the place reference explicit.
- source_word: εὔνοιαν
  chosen: goodwill
  alternatives:
  - kindness
  - favor
  - benevolence
  lexicon: LSJ
  rationale: εὔνοια denotes favorable disposition or goodwill. 'Goodwill' best matches
    the noun's sense of benevolent attitude in this civic context.
- source_word: ἐν τοῖς τῆς ἀτυχίας καιροῖς
  chosen: in times of misfortune
  alternatives:
  - in times of adversity
  - in times of calamity
  lexicon: LSJ
  rationale: ἀτυχία denotes bad fortune or adversity. 'Misfortune' is a straightforward
    rendering that avoids overstating the severity while fitting the narrative context.
- source_word: ἥμερον ἀπάντησιν
  chosen: gentle treatment
  alternatives:
  - kind reception
  - mild response
  - gracious conduct
  lexicon: LSJ
  rationale: 'The phrase is somewhat idiomatic: ἥμερος conveys gentleness/mildness,
    and ἀπάντησις literally ''meeting'' or ''encounter.'' In context it describes
    how the Scythopolitans dealt with them. ''Gentle treatment'' communicates the
    practical sense more clearly than a wooden ''gentle meeting.'''
