theological_decisions:
- issue: Moral status language in ἀναμαρτήτους
  chosen_reading: Rendered as 'free from sin' rather than 'sinless.'
  alternative_readings:
  - without sin
  - sinless
  rationale: The verse exhorts the living to avoid the kind of transgression that
    brought judgment on the dead. 'Free from sin' communicates ethical avoidance without
    importing a doctrine of absolute sinless perfection.
  doctrine_reference: Translation philosophy §6; preserve source sense without overstating
    theological implications.
