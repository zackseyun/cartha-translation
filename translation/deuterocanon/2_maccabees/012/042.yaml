id: 2MA.12.42
reference: 2 Maccabees 12:42
source:
  edition: lxx-swete-1909
  text: εἰς ἱκεσίαν ἐτράπησαν, ἀξιώσαντες τὸ γεγονὸς ἁμάρτημα τελείως ἐξαλειφθῆναι·
    ὁ δὲ γενναῖος Ἰούδας παρεκάλεσε τὸ πλῆθος συντηρεῖν αὐτοὺς ἀναμαρτήτους εἶναι,
    ὑπʼ ὄψιν ἑωρακότας τὰ γεγονότα διὰ τὴν τῶν προπεπτωκότων ἁμαρτίαν.
  language: Greek
  pages:
  - 721
  confidence: high
  validation: agree
translation:
  text: they turned to supplication, asking that the sin that had been committed might
    be completely blotted out. But the noble Judas urged the multitude to keep themselves
    free from sin, since they had seen before their eyes the things that had happened
    because of the sin of those who had fallen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to keep themselves sinless' / 'to keep themselves without sin.' The
      Greek adjective can be rendered more literally, but the main text uses a more
      idiomatic English expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἱκεσίαν ἐτράπησαν
  chosen: they turned to supplication
  alternatives:
  - they turned to prayer
  - they resorted to entreaty
  lexicon: LSJ
  rationale: The idiom literally means 'they turned into/unto supplication.' 'Supplication'
    preserves the solemn, petitionary force of ἱκεσία better than the broader 'prayer,'
    while remaining natural English.
- source_word: ἀξιώσαντες
  chosen: asking
  alternatives:
  - beseeching
  - requesting
  lexicon: LSJ
  rationale: In context the participle introduces the content of their petition. 'Asking'
    is idiomatic and clear; 'beseeching' would heighten the tone beyond what the Greek
    itself requires.
- source_word: τὸ γεγονὸς ἁμάρτημα
  chosen: the sin that had been committed
  alternatives:
  - the sin that had occurred
  - the deed of sin that had happened
  lexicon: LSJ
  rationale: The perfect participle γεγονός marks the sin as an accomplished event.
    English requires expansion for clarity; 'that had been committed' captures the
    completed act naturally.
- source_word: τελείως ἐξαλειφθῆναι
  chosen: might be completely blotted out
  alternatives:
  - might be utterly wiped away
  - might be completely erased
  lexicon: LSJ
  rationale: ἐξαλείφω commonly carries the sense of wiping out or blotting out, including
    moral guilt. 'Blotted out' preserves biblical resonance without over-paraphrase;
    τελείως is represented by 'completely.'
- source_word: ὁ δὲ γενναῖος Ἰούδας
  chosen: But the noble Judas
  alternatives:
  - But Judas, being noble
  - But the brave Judas
  lexicon: LSJ
  rationale: γενναῖος can mean noble or brave. Here it functions as an honorific characterization
    of Judas. 'Noble' preserves both moral and heroic connotations better than the
    narrower 'brave.'
- source_word: παρεκάλεσε τὸ πλῆθος
  chosen: urged the multitude
  alternatives:
  - exhorted the crowd
  - encouraged the people
  lexicon: LSJ
  rationale: παρακαλέω here is exhortative rather than consolatory. 'Urged' is concise
    and natural; τὸ πλῆθος is rendered 'the multitude' to reflect the collective body
    present.
- source_word: συντηρεῖν αὐτοὺς ἀναμαρτήτους εἶναι
  chosen: to keep themselves free from sin
  alternatives:
  - to preserve themselves sinless
  - to keep themselves without sin
  lexicon: LSJ
  rationale: The construction is somewhat compressed in Greek. The sense is that Judas
    urged them to maintain themselves in a state of being ἀναμάρτητοι. 'Free from
    sin' is idiomatic modern English and avoids implying absolute perfection more
    strongly than the context warrants.
- source_word: ὑπʼ ὄψιν ἑωρακότας
  chosen: since they had seen before their eyes
  alternatives:
  - having seen with their own eyes
  - because they had seen plainly
  lexicon: LSJ
  rationale: The phrase emphasizes direct, visible experience. 'Before their eyes'
    preserves the vividness of the idiom.
- source_word: τὰ γεγονότα
  chosen: the things that had happened
  alternatives:
  - what had happened
  - the events that had occurred
  lexicon: LSJ
  rationale: A straightforward rendering of the perfect participle used substantivally.
    'The things that had happened' keeps the connection with the visible consequences
    they witnessed.
- source_word: διὰ τὴν τῶν προπεπτωκότων ἁμαρτίαν
  chosen: because of the sin of those who had fallen
  alternatives:
  - because of the sin of the fallen
  - because of the sin of those who had perished
  lexicon: LSJ
  rationale: προπίπτω here refers to those who had fallen in battle, not merely moral
    lapse. 'Those who had fallen' preserves the military/death context while allowing
    the causal link to their sin to remain explicit.
