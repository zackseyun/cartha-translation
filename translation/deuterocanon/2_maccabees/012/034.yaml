id: 2MA.12.34
reference: 2 Maccabees 12:34
source:
  edition: lxx-swete-1909
  text: παραταξαμένους δὲ συνέβη πεσεῖν ὀλίγους τῶν Ἰουδαίων.
  language: Greek
  pages:
  - 721
  confidence: high
  validation: agree
translation:
  text: And when they had joined battle, it happened that a few of the Jews fell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'when they had drawn up in battle line.' The Greek participle
      is military and may emphasize battle formation as well as engagement.
    reason: lexical_alternative
  - marker: b
    text: '''Fell'' in a battle context likely implies death, but the Greek does not
      explicitly say ''were killed.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: παραταξαμένους
  chosen: when they had joined battle
  alternatives:
  - when they had drawn up in battle line
  - when they had engaged in battle
  lexicon: LSJ
  rationale: Aorist middle participle from παρατάσσω, used in military contexts for
    drawing up for battle or engaging in combat. In English, 'joined battle' preserves
    the military sense naturally without over-literal awkwardness. The participle
    is rendered temporally with 'when' to fit idiomatic English narrative flow.
- source_word: συνέβη
  chosen: it happened
  alternatives:
  - it came to pass
  - it occurred
  lexicon: LSJ
  rationale: Common narrative verb indicating an event came about. 'It happened' is
    straightforward modern English and preserves the impersonal construction.
- source_word: πεσεῖν
  chosen: fell
  alternatives:
  - to fall
  - were killed
  lexicon: LSJ
  rationale: Infinitive of πίπτω, literally 'to fall.' In battle narrative it can
    imply death, but the Greek here does not explicitly say 'were killed.' 'Fell'
    preserves the idiom and leaves the degree of implication at the same level as
    the source.
- source_word: ὀλίγους
  chosen: a few
  alternatives:
  - few
  - a small number
  lexicon: LSJ
  rationale: Accusative plural adjective functioning substantivally with the genitive
    phrase. 'A few' is the most natural English equivalent in this construction.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - among the Jews
  - of the Judeans
  lexicon: LSJ
  rationale: The genitive after ὀλίγους yields 'a few of the Jews.' 'Jews' is the
    standard rendering in 2 Maccabees; 'Judeans' is possible ethnogeographically,
    but here the conventional ethnic-religious sense is adequately represented by
    'Jews.'
