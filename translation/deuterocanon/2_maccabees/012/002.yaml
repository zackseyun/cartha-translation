id: 2MA.12.2
reference: 2 Maccabees 12:2
source:
  edition: lxx-swete-1909
  text: τῶν δὲ κατὰ τόπον στρατηγῶν Τιμόθεος καὶ Ἀπολλώνιος ὁ τοῦ Γενναίου,,, ἔτι
    δὲ Ἱερώνυμος καὶ Δημοφῶν, πρὸς δὲ τούτοις Νικάνωρ ὁ Κυπριάρχης, οὐκ εἴων αὐτοὺς
    ἡσυχίαν ἄγειν.
  language: Greek
  pages:
  - 718
  confidence: high
  validation: agree
translation:
  text: But of the local commanders, Timotheus and Apollonius son of Gennaeus, and
    further Hieronymus and Demophon, and besides these Nicanor the Cypriarch, would
    not let them live in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the Cypriarch,'' a title for Nicanor; rendered ''the governor
      of Cyprus'' for clarity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν ... κατὰ τόπον στρατηγῶν
  chosen: of the local commanders
  alternatives:
  - of the commanders in the region
  - of the provincial generals
  lexicon: LSJ
  rationale: κατὰ τόπον modifies στρατηγῶν to indicate commanders assigned by locality/region.
    'Local commanders' is natural English and preserves the administrative sense without
    over-specifying a formal rank.
- source_word: ὁ τοῦ Γενναίου
  chosen: son of Gennaeus
  alternatives:
  - the son of Gennaeus
  - of Gennaeus
  lexicon: LSJ
  rationale: The article + genitive patronymic construction identifies Apollonius
    by his father. 'Son of Gennaeus' is the clearest idiomatic rendering in English.
- source_word: ἔτι δὲ
  chosen: and further
  alternatives:
  - and also
  - moreover
  lexicon: LSJ
  rationale: This connective adds more names to the list. 'And further' keeps the
    additive force while fitting the catalog style.
- source_word: πρὸς δὲ τούτοις
  chosen: and besides these
  alternatives:
  - and in addition to these
  - and along with these
  lexicon: LSJ
  rationale: The phrase marks Nicanor as an additional figure beyond those already
    named. 'Besides these' is concise and accurate.
- source_word: ὁ Κυπριάρχης
  chosen: the governor of Cyprus
  alternatives:
  - the Cypriarch
  - the ruler of Cyprus
  lexicon: LSJ
  rationale: The title literally points to a ruler/official connected with Cyprus.
    Because 'Cypriarch' is opaque in English, 'governor of Cyprus' communicates the
    office's sense accessibly while preserving its political character; the more literal
    title is worth preserving in a footnote.
- source_word: οὐκ εἴων
  chosen: would not let
  alternatives:
  - did not allow
  - were not permitting
  lexicon: LSJ
  rationale: Imperfect of ἐάω conveys ongoing refusal or prevention. 'Would not let'
    captures both the idiomatic force and the durative sense in readable English.
- source_word: ἡσυχίαν ἄγειν
  chosen: live in peace
  alternatives:
  - be at rest
  - lead a quiet life
  lexicon: LSJ
  rationale: The idiom means to pass one's life in quietness or peace. 'Live in peace'
    is idiomatic modern English and fits the context of harassment by hostile officials.
