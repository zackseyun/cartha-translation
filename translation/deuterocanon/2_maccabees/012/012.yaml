id: 2MA.12.12
reference: 2 Maccabees 12:12
source:
  edition: lxx-swete-1909
  text: Ἰούδας δὲ ὑπολαβὼν ὡς ἀληθῶς ἐν πολλοῖς αὐτοὺς χρησίμους, ὑπεχώρησεν εἰρήνην
    ἄξειν πρὸς αὐτούς· καὶ λαβόντες δεξιὰς εἰς τὰς σκηνὰς ἐχωρίσθησαν.
  language: Greek
  pages:
  - 719
  confidence: high
  validation: agree
translation:
  text: But Judas, recognizing that they were truly useful to them in many ways, agreed
    to keep peace with them; and after giving right hands, they parted to their tents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'after giving right hands'—a customary gesture of pledge or agreement.
    reason: cultural_note
lexical_decisions:
- source_word: ὑπολαβών
  chosen: recognizing
  alternatives:
  - supposing
  - taking into account
  - understanding
  lexicon: LSJ
  rationale: In context the participle introduces Judas's assessment of the situation
    rather than a mere interruption or verbal reply. 'Recognizing' conveys a considered
    judgment based on what follows.
- source_word: ὡς ἀληθῶς
  chosen: truly
  alternatives:
  - really
  - indeed
  lexicon: LSJ
  rationale: The phrase intensifies the sincerity or factuality of Judas's judgment.
    'Truly' is concise and preserves the adverbial force.
- source_word: ἐν πολλοῖς
  chosen: in many ways
  alternatives:
  - in many matters
  - for many purposes
  lexicon: LSJ
  rationale: The dative phrase is idiomatic and broad, indicating usefulness across
    multiple respects rather than a single domain.
- source_word: χρησίμους
  chosen: useful
  alternatives:
  - helpful
  - serviceable
  - advantageous
  lexicon: LSJ
  rationale: The adjective denotes practical benefit. 'Useful' is the most direct
    rendering and fits the political-military context without overinterpreting motive.
- source_word: ὑπεχώρησεν εἰρήνην ἄξειν πρὸς αὐτούς
  chosen: agreed to keep peace with them
  alternatives:
  - consented to maintain peace with them
  - yielded to make peace with them
  lexicon: LSJ
  rationale: ὑπεχώρησεν here conveys concession or agreement, and εἰρήνην ἄξειν is
    an idiom for conducting oneself in peace or maintaining peaceful relations. 'Agreed
    to keep peace with them' is natural English while staying close to the Greek sense.
- source_word: λαβόντες δεξιάς
  chosen: after giving right hands
  alternatives:
  - having clasped right hands
  - after exchanging pledges
  lexicon: LSJ
  rationale: The expression literally refers to giving right hands as a gesture of
    agreement or pledge. The main text keeps the concrete image; its covenantal/diplomatic
    significance can be inferred.
- source_word: εἰς τὰς σκηνὰς ἐχωρίσθησαν
  chosen: they parted to their tents
  alternatives:
  - they separated to their tents
  - they departed to the camp
  lexicon: LSJ
  rationale: The phrase indicates dispersal back to encampments. 'Tents' preserves
    the literal military setting better than the more generalized 'camp'.
