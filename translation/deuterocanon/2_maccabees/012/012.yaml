theological_decisions:
- issue: Diplomatic gesture in λαβόντες δεξιάς
  chosen_reading: Retain the literal image 'giving right hands' in the main text
  alternative_readings:
  - render idiomatically as 'making a pact' or 'pledging friendship'
  rationale: This is not a major doctrinal crux, but the literal gesture is historically
    and textually important. Preserving it maintains transparency and avoids importing
    a more specific legal nuance than the Greek requires.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    significant lexical decisions'
