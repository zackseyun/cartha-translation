id: 2MA.12.27
reference: 2 Maccabees 12:27
source:
  edition: lxx-swete-1909
  text: μετὰ δὲ τὴν τούτων τροπὴν καὶ ἀπώλειαν ἐπεστράτευσεν καὶ ἐπὶ Ἔφρων πόλιν ὀχυράν,
    ἐν ᾗ πάμφυλα ἐν αὐτῇ πλήθη νεανίαι δὲ ῥωμαλέοι πρὸ τῶν τειχῶν καθεστῶτες εὐρώστως
    ἀπεμάχοντο· ἔνθα ὀργάνων καὶ βελῶν πολλαὶ παραθέσεις ὑπῆρχον.
  language: Greek
  pages:
  - 720
  confidence: high
  validation: agree
translation:
  text: But after the rout and destruction of these men, he marched also against Ephron,
    a fortified city, in which there were mixed multitudes; and strong young men,
    stationed before the walls, were fighting vigorously, while there were many stores
    of engines and missiles there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'people of every kind/tribe were in it.' The Greek πάμφυλα πλήθη suggests
      a mixed population rather than a single ethnic group.
    reason: lexical_alternative
  - marker: b
    text: Or 'many stockpiles of engines and missiles were there.' The noun rendered
      'stores' may denote accumulated military supplies.
    reason: lexical_alternative
lexical_decisions:
- source_word: τροπή
  chosen: rout
  alternatives:
  - turning
  - defeat
  lexicon: LSJ
  rationale: In military context with ἀπώλεια, τροπή denotes a turning to flight/defeat.
    'Rout' captures the decisive collapse of the enemy line better than the more generic
    'defeat'.
- source_word: ἀπώλεια
  chosen: destruction
  alternatives:
  - ruin
  - loss
  lexicon: LSJ
  rationale: Paired with τροπή, it intensifies the military outcome. 'Destruction'
    best reflects the severe loss inflicted.
- source_word: ἐπεστράτευσεν
  chosen: marched ... against
  alternatives:
  - made a campaign against
  - advanced against
  lexicon: LSJ
  rationale: The verb denotes undertaking a military expedition. 'Marched against'
    is natural English and preserves the military movement.
- source_word: πόλιν ὀχυράν
  chosen: a fortified city
  alternatives:
  - a strong city
  - a stronghold city
  lexicon: LSJ
  rationale: ὀχυράν describes defensive strength. 'Fortified city' is idiomatic and
    precise.
- source_word: πάμφυλα πλήθη
  chosen: mixed multitudes
  alternatives:
  - people of every tribe
  - all sorts of crowds
  lexicon: LSJ
  rationale: πάμφυλα literally suggests people of many kinds/tribes. 'Mixed multitudes'
    preserves the ethnic/composite sense without over-specifying tribal categories.
- source_word: νεανίαι ... ῥωμαλέοι
  chosen: strong young men
  alternatives:
  - vigorous youths
  - stout young warriors
  lexicon: LSJ
  rationale: νεανίαι refers to young men; ῥωμαλέοι adds physical strength. 'Strong
    young men' is straightforward and accurate.
- source_word: πρὸ τῶν τειχῶν καθεστῶτες
  chosen: stationed before the walls
  alternatives:
  - standing in front of the walls
  - posted before the walls
  lexicon: LSJ
  rationale: The participle indicates being set/posted in position. 'Stationed' conveys
    military placement better than simple 'standing'.
- source_word: εὐρώστως ἀπεμάχοντο
  chosen: were fighting vigorously
  alternatives:
  - were resisting stoutly
  - were defending themselves strongly
  lexicon: LSJ
  rationale: The imperfect middle conveys sustained resistance in battle; εὐρώστως
    adds forcefulness. 'Were fighting vigorously' captures the ongoing action and
    intensity.
- source_word: ὀργάνων
  chosen: engines
  alternatives:
  - machines
  - siege engines
  lexicon: LSJ
  rationale: In military context with βελῶν, the term likely refers to war machines.
    'Engines' is concise; 'siege engines' is possible but slightly more interpretive.
- source_word: βελῶν
  chosen: missiles
  alternatives:
  - projectiles
  - darts
  lexicon: LSJ
  rationale: A broad military term for thrown or shot weapons. 'Missiles' preserves
    breadth better than the narrower 'darts'.
- source_word: παραθέσεις
  chosen: stores
  alternatives:
  - supplies
  - stockpiles
  - placements
  lexicon: LSJ
  rationale: Given the clause 'there were many ... of engines and missiles,' the sense
    is accumulated supplies/stockpiles rather than mere arrangement. 'Stores' is natural
    and suitably broad.
