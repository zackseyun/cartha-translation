theological_decisions:
- issue: Characterization of God as judge in a military-vindication context
  chosen_reading: God, the righteous judge
  alternative_readings:
  - God, the just judge
  rationale: The text presents Judas's appeal to divine justice before retaliatory
    action. The translation preserves the judicial title without expanding it into
    a theological endorsement beyond the wording of the verse.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English.'
