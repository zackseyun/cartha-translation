id: 2MA.12.6
reference: 2 Maccabees 12:6
source:
  edition: lxx-swete-1909
  text: καὶ ἐπικαλεσάμενος τὸν δίκαιον κριτὴν θεόν, παραγενόμενος ἐπὶ τοὺς μιαιφόνους
    τῶν ἀδελφῶν, τὸν μὲν λιμένα νύκτωρ ἐνέπρησεν καὶ τὰ σκάφη κατέφλεξεν, τοὺς δὲ
    ἐκεῖ συμφυγόντας ἐξεκέντησεν.
  language: Greek
  pages:
  - 718
  confidence: high
  validation: minor_mismatch
translation:
  text: 'And calling on God, the righteous judge, he came against the murderers of
    his brothers: by night he set the harbor on fire and burned the ships, and he
    stabbed those who had fled there.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who had taken refuge there.' The Greek participle can emphasize
      flight to a place of refuge.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικαλεσάμενος
  chosen: calling on
  alternatives:
  - invoking
  - appealing to
  lexicon: BDAG
  rationale: The participle denotes an appeal or invocation directed to God before
    action. 'Calling on' is idiomatic modern English and preserves the religious sense
    without overformalizing.
- source_word: τὸν δίκαιον κριτὴν θεόν
  chosen: God, the righteous judge
  alternatives:
  - the righteous judge God
  - God the just judge
  lexicon: BDAG
  rationale: Apposition is best represented naturally in English as 'God, the righteous
    judge.' 'Righteous' matches δίκαιον well and preserves moral/judicial force.
- source_word: παραγενόμενος ἐπὶ
  chosen: he came against
  alternatives:
  - he came upon
  - he advanced against
  lexicon: BDAG
  rationale: In this military context, the participle plus ἐπί with accusative indicates
    movement against hostile targets. 'Came against' is clear and suitably forceful.
- source_word: τοὺς μιαιφόνους τῶν ἀδελφῶν
  chosen: the murderers of his brothers
  alternatives:
  - the blood-guilty killers of his brothers
  - the murderers of the brothers
  lexicon: LSJ
  rationale: μιαιφόνος is a strong term for blood-polluting murder. 'Murderers' communicates
    unlawful killing clearly in modern English. The possessive 'his' is supplied from
    context and standard English sense, since the brothers are his slain compatriots/kinsmen
    in the narrative.
- source_word: τὸν μὲν λιμένα
  chosen: the harbor
  alternatives:
  - the port
  lexicon: LSJ
  rationale: λιμήν refers to a harbor or port. 'Harbor' is slightly more concrete
    in this narrative scene.
- source_word: νύκτωρ
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: LSJ
  rationale: The adverb marks the time of the attack. 'By night' is concise and preserves
    the narrative tone.
- source_word: ἐνέπρησεν
  chosen: he set ... on fire
  alternatives:
  - he burned
  - he kindled
  lexicon: LSJ
  rationale: The verb means to set ablaze. Rendering with an object-complement construction
    in English avoids awkward repetition while preserving the causative sense.
- source_word: τὰ σκάφη κατέφλεξεν
  chosen: and burned the ships
  alternatives:
  - and consumed the vessels with fire
  - and burned up the boats
  lexicon: LSJ
  rationale: σκάφη can denote boats or vessels; in a harbor attack, 'ships' best fits
    the military setting. κατέφλεξεν intensifies the burning, but simple 'burned'
    is sufficient in idiomatic English given the prior fire imagery.
- source_word: τοὺς δὲ ἐκεῖ συμφυγόντας
  chosen: those who had fled there
  alternatives:
  - those who had taken refuge there
  - those gathered there for refuge
  lexicon: LSJ
  rationale: The participle indicates people who fled together to that place for safety.
    'Had fled there' is straightforward; 'taken refuge there' is possible but slightly
    more interpretive.
- source_word: ἐξεκέντησεν
  chosen: he stabbed
  alternatives:
  - he pierced
  - he ran through
  lexicon: LSJ
  rationale: The verb denotes piercing with a pointed weapon. 'Stabbed' is vivid,
    natural English and fits the violent military action described.
