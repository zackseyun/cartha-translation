theological_decisions:
- issue: Causal connection between idolatrous objects and the soldiers' death
  chosen_reading: The verse states that it became clear to all that the men had fallen
    for this reason.
  alternative_readings:
  - The phrase could be read more weakly as the community's conclusion rather than
    an explicit narrator-endorsed theological judgment.
  rationale: The Greek says 'it became clear to all' followed by the causal phrase,
    so the translation preserves the text's stated causal inference without adding
    explanatory theology beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
