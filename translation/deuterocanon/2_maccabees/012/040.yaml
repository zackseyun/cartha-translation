id: 2MA.12.40
reference: 2 Maccabees 12:40
source:
  edition: lxx-swete-1909
  text: εὗρον δὲ ἑκάστου τῶν τεθνηκότων ὑπὸ τοὺς χιτῶνας ἱερώματα τῶν ἀπὸ Ἰαμνίας
    εἰδώλων, ἀφʼ ὧν ὁ νόμος ἀπήργει τοὺς Ἰουδαίους· τοῖς δὲ πᾶσι σαφὲς ἐγένετο διὰ
    τήνδε τὴν αἰτίαν τούσδε πεπτωκέναι.
  language: Greek
  pages:
  - 721
  confidence: high
  validation: agree
translation:
  text: But under the tunic of each of the dead they found sacred tokens of the idols
    of Jamnia, which the law forbids the Jews to have; and it became clear to all
    that for this reason these men had fallen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sacred objects,' 'votive offerings,' or possibly 'amulets' of the idols
      from Jamnia.
    reason: lexical_alternative
  - marker: b
    text: '''Had fallen'' is a battle idiom meaning they had been killed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερώματα
  chosen: sacred tokens
  alternatives:
  - consecrated objects
  - votive offerings
  - amulets
  - sacred things
  lexicon: LSJ
  rationale: The term denotes objects connected with cultic devotion. 'Sacred tokens'
    communicates small religious items associated with idol worship without over-specifying
    their exact form. 'Amulets' is possible in context but is more interpretive than
    the Greek itself requires.
- source_word: χιτῶνας
  chosen: tunics
  alternatives:
  - garments
  - shirts
  - coats
  lexicon: LSJ
  rationale: χιτών refers to an inner garment or tunic. 'Tunics' is a standard, sufficiently
    precise rendering and fits the ancient setting better than the broader 'garments'.
- source_word: τῶν ἀπὸ Ἰαμνίας εἰδώλων
  chosen: of the idols from Jamnia
  alternatives:
  - belonging to the idols of Jamnia
  - from the Jamnian idols
  lexicon: LSJ
  rationale: The genitive phrase most naturally identifies the objects as associated
    with idols originating from or connected with Jamnia. 'Of the idols from Jamnia'
    preserves the geographic link without over-interpreting the syntax.
- source_word: ἀπήργει
  chosen: forbids
  alternatives:
  - prohibits
  - bars
  - keeps away from
  lexicon: LSJ
  rationale: The verb indicates prohibition or exclusion. 'Forbids' is clear modern
    English and adequately reflects the legal force of the statement.
- source_word: πεπτωκέναι
  chosen: had fallen
  alternatives:
  - had died
  - had been struck down
  lexicon: LSJ
  rationale: The perfect infinitive of πίπτω literally means 'to have fallen.' In
    battle context it implies death, but 'had fallen' preserves the source wording
    and its martial idiom without flattening it to a mere explanatory gloss.
- source_word: τούσδε
  chosen: these men
  alternatives:
  - these
  - these ones
  lexicon: LSJ
  rationale: The demonstrative refers to the dead soldiers just mentioned. 'These
    men' makes the referent explicit in natural English.
- source_word: διὰ τήνδε τὴν αἰτίαν
  chosen: for this reason
  alternatives:
  - because of this cause
  - on account of this
  lexicon: LSJ
  rationale: This idiom states the perceived cause of their death. 'For this reason'
    is idiomatic and direct.
