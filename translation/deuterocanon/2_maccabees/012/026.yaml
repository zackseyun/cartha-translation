id: 2MA.12.26
reference: 2 Maccabees 12:26
source:
  edition: lxx-swete-1909
  text: Ἐξελθὼν δὲ ἐπὶ τὸ Κάρνιον καὶ τὸ Ἀτεργάτιον, κατέσφαξεν μυριάδας σωμάτων δύο
    πεντακισχιλίους.
  language: Greek
  pages:
  - 720
  confidence: high
  validation: minor_mismatch
translation:
  text: Then he advanced against Carnion and Atargation, and slaughtered twenty-five
    thousand men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'Atargation' refers to a sanctuary of Atargatis rather than
      a second town name.
    reason: lexical_alternative
  - marker: b
    text: Greek literally, 'two myriads of bodies and five thousand,' that is, twenty-five
      thousand slain.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐξελθὼν
  chosen: he advanced
  alternatives:
  - he went out
  - he marched out
  lexicon: LSJ
  rationale: The participle of ἐξέρχομαι literally means 'having gone out,' but in
    military narrative English 'advanced' conveys movement into action more naturally
    while remaining close to the sense.
- source_word: ἐπὶ
  chosen: against
  alternatives:
  - to
  - upon
  lexicon: LSJ
  rationale: With a place/object in a military context, ἐπί can indicate movement
    directed against a target. 'Against' best fits the hostile action that follows.
- source_word: τὸ Κάρνιον
  chosen: Carnion
  alternatives:
  - Karnion
  lexicon: LSJ
  rationale: This is a place name and is therefore transliterated rather than translated,
    following project policy for names.
- source_word: τὸ Ἀτεργάτιον
  chosen: Atargation
  alternatives:
  - Atergation
  - the shrine of Atargatis
  lexicon: LSJ
  rationale: The Greek form is treated here as a proper name and transliterated. Because
    the term may refer to a sanctuary associated with Atargatis rather than simply
    another town, that interpretive alternative is preserved in a footnote rather
    than imported into the main text.
- source_word: κατέσφαξεν
  chosen: slaughtered
  alternatives:
  - killed
  - butchered
  lexicon: LSJ
  rationale: The verb is stronger than a neutral 'killed' and denotes violent mass
    killing. 'Slaughtered' preserves the severity without becoming overly colloquial.
- source_word: μυριάδας σωμάτων δύο πεντακισχιλίους
  chosen: twenty-five thousand men
  alternatives:
  - two myriads and five thousand bodies
  - twenty-five thousand persons
  lexicon: LSJ
  rationale: The numeral expression totals 25,000. Although σωμάτων literally means
    'bodies,' in this context it functions as a count of slain persons. 'Men' is idiomatic
    for an ancient battle tally, while the more literal wording is preserved as an
    alternative because the Greek expression is somewhat unusual.
