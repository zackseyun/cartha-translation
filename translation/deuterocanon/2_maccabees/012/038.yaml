id: 2MA.12.38
reference: 2 Maccabees 12:38
source:
  edition: lxx-swete-1909
  text: Ἰούδας δὲ ἀναλαβὼν τὸ στράτευμα ἧκεν εἰς Ὀδολλὰμ πόλιν· τῆς δὲ ἑβδομάδος ἐπιβαλλούσης,
    κατὰ τὸν ἐθισμὸν ἁγνισθέντες αὐτόθι τὸ σάββατον διῆγεν.
  language: Greek
  pages:
  - 721
  confidence: high
  validation: agree
translation:
  text: Then Judas, taking the army, came to the city of Odollam. And as the week
    was ending, they purified themselves there according to the custom and spent the
    Sabbath there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'as the week was coming on'; the context and following
      mention of the Sabbath indicate the approach of the seventh day.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναλαβών
  chosen: taking up
  alternatives:
  - having gathered
  - taking along
  - taking back
  lexicon: BDAG
  rationale: The participle from ἀναλαμβάνω here introduces Judas's resumption of
    command/movement with the force of taking the force with him. 'Taking up' stays
    close to the Greek while remaining natural in English; 'having gathered' is possible
    interpretively but goes beyond the basic verbal idea.
- source_word: στράτευμα
  chosen: army
  alternatives:
  - force
  - troops
  lexicon: LSJ
  rationale: στράτευμα denotes a military body. 'Army' is the most straightforward
    modern equivalent here; 'force' or 'troops' are possible but less direct.
- source_word: ἧκεν
  chosen: came
  alternatives:
  - arrived
  - went
  lexicon: BDAG
  rationale: The verb indicates arrival at a place. 'Came' is idiomatic with 'to the
    city of Odollam' and preserves the narrative movement.
- source_word: Ὀδολλὰμ πόλιν
  chosen: the city of Odollam
  alternatives:
  - Odollam city
  - the town of Odollam
  lexicon: LSJ
  rationale: πόλιν is explicit in the Greek, so it is retained as 'the city of Odollam.'
    The place name is transliterated rather than translated, following project policy
    for names.
- source_word: τῆς ... ἑβδομάδος ἐπιβαλλούσης
  chosen: as the seventh day was approaching
  alternatives:
  - when the week was coming on
  - as the week was advancing
  lexicon: LSJ
  rationale: Literally the phrase refers to the week 'coming on,' but the immediate
    mention of the Sabbath clarifies that the point is the approach of the seventh
    day/Sabbath. Rendering it this way makes the temporal sense clear in English without
    obscuring the Greek connection.
- source_word: κατὰ τὸν ἐθισμόν
  chosen: according to the custom
  alternatives:
  - according to custom
  - as was customary
  lexicon: LSJ
  rationale: ἐθισμός refers to customary practice or habit. 'According to the custom'
    is a clear, fairly formal rendering.
- source_word: ἁγνισθέντες
  chosen: they purified themselves
  alternatives:
  - having purified themselves
  - they cleansed themselves
  lexicon: BDAG
  rationale: The passive participle is naturally rendered in English with reflexive
    force in this context of ritual preparation. 'Purified themselves' preserves the
    cultic/ritual nuance better than the broader 'cleansed themselves.'
- source_word: αὐτόθι
  chosen: there
  alternatives:
  - in that place
  - on the spot
  lexicon: LSJ
  rationale: A simple locative adverb; 'there' is sufficient and natural.
- source_word: τὸ σάββατον διῆγεν
  chosen: spent the Sabbath there
  alternatives:
  - passed the Sabbath there
  - observed the Sabbath there
  lexicon: BDAG
  rationale: διῆγεν means to spend or pass time. 'Spent the Sabbath there' is idiomatic
    and avoids importing a stronger liturgical claim than the verb itself states,
    though Sabbath observance is clearly implied by context.
