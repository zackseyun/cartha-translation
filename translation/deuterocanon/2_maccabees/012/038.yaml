theological_decisions:
- issue: Ritual language before the Sabbath
  chosen_reading: they purified themselves there according to the custom
  alternative_readings:
  - they cleansed themselves there according to custom
  rationale: The Greek uses cultically marked language (ἁγνισθέντες), so the translation
    preserves ritual purification terminology rather than flattening it to a merely
    hygienic sense. This reflects the text's Jewish practice context without adding
    details not stated.
  doctrine_reference: Translation philosophy §§1, 6
