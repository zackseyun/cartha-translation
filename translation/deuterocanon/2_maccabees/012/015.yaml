theological_decisions:
- issue: Identification of Ἰησοῦ in the Jericho allusion
  chosen_reading: Joshua
  alternative_readings:
  - Jesus (formal transliteration of the Greek form)
  rationale: The narrative allusion is unmistakably to the fall of Jericho in Joshua's
    day. Following original-language primacy and readability, the historical referent
    should be made explicit in English rather than preserving the Greek form 'Jesus,'
    which would mislead modern readers.
  doctrine_reference: 'Translation philosophy: translate for plain sense; transliterate
    names by standard conventions.'
