id: 2MA.12.15
reference: 2 Maccabees 12:15
source:
  edition: lxx-swete-1909
  text: οἱ δὲ περὶ τὸν Ἰούδαν ἐπικαλεσάμενοι τὸν μέγαν τοῦ κόσμου δυνάστην, τὸν ἄτερ
    κριῶν καὶ μηχανῶν ὀργανικῶν κατακρημνίσαντα τὴν Ἰερειχὼ κατὰ τοὺς Ἰησοῦ χρόνους,
    ἐνέσεισαν θηριωδῶς τῷ τείχει·
  language: Greek
  pages:
  - 719
  confidence: high
  validation: agree
translation:
  text: But those around Judas, having called on the great Sovereign of the world—the
    one who, in the time of Joshua, brought down Jericho without rams or siege engines—assaulted
    the wall fiercely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'in the time of Iēsous'; here it refers to Joshua, the leader associated
      with Jericho's fall.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ περὶ τὸν Ἰούδαν
  chosen: those with Judas
  alternatives:
  - those around Judas
  - Judas and his men
  lexicon: LSJ
  rationale: The idiom περὶ + accusative with a leader refers to the party associated
    with him. 'Those with Judas' is natural English and avoids over-specifying military
    membership beyond the Greek.
- source_word: ἐπικαλεσάμενοι
  chosen: having called on
  alternatives:
  - having invoked
  - calling upon
  lexicon: LSJ
  rationale: The middle participle commonly means to call upon or invoke, especially
    in appeal to deity. 'Having called on' is clear modern English and preserves the
    sense of prayerful appeal.
- source_word: τὸν μέγαν τοῦ κόσμου δυνάστην
  chosen: the great Sovereign of the world
  alternatives:
  - the great ruler of the world
  - the great potentate of the world
  lexicon: LSJ
  rationale: δυνάστης denotes a ruler or sovereign with power. 'Sovereign' best conveys
    majesty and authority in elevated but readable English. κόσμος here is the world/order
    of the inhabited world, not merely 'universe' in a modern scientific sense.
- source_word: τὸν ἄτερ κριῶν καὶ μηχανῶν ὀργανικῶν
  chosen: without rams or siege engines
  alternatives:
  - without battering rams and mechanical devices
  - without rams and war machines
  lexicon: LSJ
  rationale: κριοί in siege contexts are battering rams. μηχαναί ὀργανικαί refers
    to engineered siege devices; 'siege engines' is concise and idiomatic. The phrase
    modifies the one invoked, describing how he overthrew Jericho without human siege
    equipment.
- source_word: κατακρημνίσαντα
  chosen: brought down
  alternatives:
  - cast down
  - threw down
  - caused to collapse
  lexicon: LSJ
  rationale: The participle means to hurl down or bring crashing down. 'Brought down'
    is natural and fits the allusion to Jericho's walls falling.
- source_word: τὴν Ἰερειχὼ
  chosen: Jericho
  lexicon: LSJ
  rationale: Standard English transliteration of the place name.
- source_word: κατὰ τοὺς Ἰησοῦ χρόνους
  chosen: in the time of Joshua
  alternatives:
  - during the days of Joshua
  - in Jesus' time
  lexicon: LSJ
  rationale: In LXX usage Ἰησοῦς can refer to Joshua son of Nun. The reference to
    Jericho makes Joshua certain, so 'Joshua' avoids misleading readers into hearing
    Jesus of Nazareth.
- source_word: ἐνέσεισαν
  chosen: shook
  alternatives:
  - battered
  - assailed
  - set quaking
  lexicon: LSJ
  rationale: The verb literally means to shake in or against; in context of assault
    on a wall, 'shook' preserves the vivid image without over-interpreting the exact
    military action.
- source_word: θηριωδῶς
  chosen: fiercely
  alternatives:
  - savagely
  - like wild beasts
  - ferociously
  lexicon: LSJ
  rationale: The adverb conveys beast-like ferocity. 'Fiercely' communicates the force
    in idiomatic English; the more literal 'like wild beasts' is possible but sounds
    awkward here.
- source_word: τῷ τείχει
  chosen: the wall
  alternatives:
  - against the wall
  lexicon: LSJ
  rationale: Dative after ἐνέσεισαν marks the object affected/assailed. English requires
    a direct object or prepositional phrase; 'shook the wall' is the most straightforward
    rendering.
