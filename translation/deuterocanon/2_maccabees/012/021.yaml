id: 2MA.12.21
reference: 2 Maccabees 12:21
source:
  edition: lxx-swete-1909
  text: τὴν δὲ ἔφοδον μεταλαβὼν Ἰούδου, προεξαπέστειλεν ὁ Τιμόθεος τὰς γυναῖκας καὶ
    τὴν ἄλλην ἀποσκευήν εἰς τὸ λεγόμενον Κάρνιον· ἦν γὰρ δυσπολιόρκητον καὶ δυσπρόσιτον
    τὸ χωρίον διὰ τὴν πάντων τῶν τόπων στενότητα.
  language: Greek
  pages:
  - 719
  confidence: high
  validation: agree
translation:
  text: But when Timothy learned of Judas’s advance, he sent the women and the rest
    of the baggage ahead to the place called Carnion, for the place was hard to besiege
    and difficult to approach because of the narrowness of all the surrounding terrain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'because of the narrowness of all the places,' referring
      to the constricted approaches around the site.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφοδον
  chosen: advance
  alternatives:
  - attack
  - assault
  - expedition
  lexicon: LSJ
  rationale: In context with μεταλαβών and Judas as the genitive reference, the noun
    denotes the oncoming movement or attack of Judas's forces. 'Advance' preserves
    the military sense without overcommitting to a full assault already underway.
- source_word: μεταλαβὼν
  chosen: learned of
  alternatives:
  - received word of
  - got news of
  - became aware of
  lexicon: LSJ
  rationale: Literally 'having received' or 'having gotten information about.' In
    idiomatic English, 'learned of' conveys Timothy's reception of news about Judas's
    movement.
- source_word: προεξαπέστειλεν
  chosen: sent ... ahead
  alternatives:
  - sent away in advance
  - dispatched beforehand
  lexicon: LSJ
  rationale: The compound verb has a clear sense of sending forward or beforehand.
    'Sent ... ahead' is natural English and preserves the directional/proleptic force.
- source_word: ἀποσκευήν
  chosen: baggage
  alternatives:
  - supplies
  - equipment
  - property
  lexicon: LSJ
  rationale: The term refers to baggage or movable gear accompanying a group. 'Baggage'
    best fits the immediate context of women and belongings being moved to safety.
- source_word: τὸ λεγόμενον Κάρνιον
  chosen: the place called Carnion
  alternatives:
  - the so-called Carnion
  lexicon: LSJ
  rationale: λεγόμενον introduces the place-name designation. 'The place called Carnion'
    is straightforward and idiomatic.
- source_word: δυσπολιόρκητον
  chosen: hard to besiege
  alternatives:
  - difficult to besiege
  - hard to blockade
  lexicon: LSJ
  rationale: A military adjective meaning not easy to besiege. 'Hard to besiege' is
    concise and preserves the tactical sense.
- source_word: δυσπρόσιτον
  chosen: difficult to approach
  alternatives:
  - hard to access
  - inaccessible
  lexicon: LSJ
  rationale: The word denotes difficulty of access. 'Difficult to approach' keeps
    the concrete spatial force and avoids overstating absolute inaccessibility.
- source_word: χωρίον
  chosen: the place
  alternatives:
  - the site
  - the region
  - the stronghold
  lexicon: LSJ
  rationale: A general term for place/locality. Since the sentence explains the defensibility
    of the location, 'the place' is sufficiently broad without importing 'stronghold'
    from context.
- source_word: διὰ τὴν πάντων τῶν τόπων στενότητα
  chosen: because of the narrowness of all the surrounding terrain
  alternatives:
  - because all the approaches were narrow
  - because of the constriction of the whole area
  lexicon: LSJ
  rationale: The Greek literally speaks of the narrowness of all the places/areas.
    In context this refers to constricted approaches around the site. 'Surrounding
    terrain' makes the military-geographical sense clear in natural English.
