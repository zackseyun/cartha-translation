theological_decisions:
- issue: Burial-location phrase and family lineage emphasis
  chosen_reading: to restore them with their relatives to the tombs of their fathers
  alternative_readings:
  - to return them to their ancestral tombs
  - to bury them with their kinsmen in the family tombs
  rationale: The Greek combines kinship language and ancestral burial language. The
    chosen rendering preserves both elements without collapsing them into a single
    idiom like 'ancestral tombs' alone.
