id: 2MA.12.39
reference: 2 Maccabees 12:39
source:
  edition: lxx-swete-1909
  text: τῇ δὲ ἐχομένῃ ἦλθον οἱ περὶ τὸν Ἰούδαν, καθʼ ὃν χρόνον τὸ τῆς χρείας ἐγέγονει,
    τὰ σώματα τῶν προπεπτωκότων ἀνακομίσασθαι καὶ μετὰ τῶν συγγενῶν ἀποκαταστῆσαι
    εἰς τοὺς πατρῴους τάφους.
  language: Greek
  pages:
  - 721
  confidence: high
  validation: agree
translation:
  text: On the following day, the men with Judas came, when the need had arisen, to
    gather up the bodies of those who had fallen and to lay them with their relatives
    in their ancestral tombs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to return them to their ancestral tombs.' The Greek explicitly mentions
      both 'relatives' and 'the tombs of their fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ δὲ ἐχομένῃ
  chosen: On the following day
  alternatives:
  - On the next day
  - On the day after
  lexicon: LSJ
  rationale: Idiomatic temporal expression; 'following day' is natural modern English
    while remaining close to the Greek.
- source_word: οἱ περὶ τὸν Ἰούδαν
  chosen: the men with Judas
  alternatives:
  - those around Judas
  - Judas and his men
  lexicon: LSJ
  rationale: The phrase denotes Judas's party or companions. 'The men with Judas'
    preserves the group sense without over-paraphrasing to a military label not explicit
    in the Greek.
- source_word: καθʼ ὃν χρόνον τὸ τῆς χρείας ἐγέγονει
  chosen: when the need had arisen
  alternatives:
  - when it had become necessary
  - at the time required by the situation
  lexicon: LSJ
  rationale: The clause indicates that circumstances now called for this action. 'When
    the need had arisen' captures the idiom succinctly and fits the narrative flow.
- source_word: τὰ σώματα τῶν προπεπτωκότων
  chosen: the bodies of those who had fallen
  alternatives:
  - the bodies of the fallen
  - the corpses of those who had fallen
  lexicon: LSJ
  rationale: προπεπτωκότων literally refers to those who had fallen, here in battle.
    'Those who had fallen' preserves the verbal imagery and avoids importing a more
    interpretive military term than necessary.
- source_word: ἀνακομίσασθαι
  chosen: to gather up
  alternatives:
  - to carry away
  - to bring back
  lexicon: LSJ
  rationale: In context the verb refers to recovering and removing the bodies from
    the battlefield. 'Gather up' communicates the retrieval action clearly in English.
- source_word: ἀποκαταστῆσαι
  chosen: to restore them
  alternatives:
  - to return them
  - to lay them to rest
  lexicon: LSJ
  rationale: The verb means to restore or return to a prior/place-appropriate state.
    Here it refers to returning the bodies for burial with family. 'Restore them'
    keeps the formal sense and links naturally with the following destination phrase.
- source_word: μετὰ τῶν συγγενῶν
  chosen: with their relatives
  alternatives:
  - among their kinsmen
  - beside their relatives
  lexicon: LSJ
  rationale: The phrase indicates burial in association with family members. 'With
    their relatives' is clear and sufficiently broad, avoiding over-specification
    of spatial nuance.
- source_word: εἰς τοὺς πατρῴους τάφους
  chosen: to the tombs of their fathers
  alternatives:
  - to their ancestral tombs
  - to the family tombs of their fathers
  lexicon: LSJ
  rationale: πατρῷος denotes ancestral or paternal inheritance. 'The tombs of their
    fathers' is a transparent rendering of the Greek and preserves the familial lineage
    emphasis.
