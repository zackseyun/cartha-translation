id: 2MA.12.5
reference: 2 Maccabees 12:5
source:
  edition: lxx-swete-1909
  text: μεταλαβὼν δὲ ὁ Ἰούδας τὴν γεγονυῖαν εἰς τοὺς ὁμοεθνεῖς ὠμότητα, παραγγείλας
    τοῖς περὶ αὐτὸν ἀνδράσιν
  language: Greek
  pages:
  - 718
  confidence: high
  validation: agree
translation:
  text: But when Judas learned of the cruelty that had occurred against his own people,
    after giving orders to the men around him,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μεταλαβὼν
  chosen: when ... learned
  alternatives:
  - having learned
  - having received word of
  lexicon: LSJ
  rationale: The aorist participle of μεταλαμβάνω here idiomatically means receiving
    information or learning of an event, not physical sharing. 'When ... learned'
    gives natural English while preserving the temporal participial force.
- source_word: τὴν γεγονυῖαν
  chosen: that had been committed
  alternatives:
  - that had happened
  - that had taken place
  lexicon: LSJ
  rationale: The perfect participle of γίνομαι modifies ὠμότητα and points to an act
    that has occurred. In English, with 'cruelty,' 'had been committed' better conveys
    a concrete atrocity than the flatter 'had happened.'
- source_word: εἰς τοὺς ὁμοεθνεῖς
  chosen: against his own people
  alternatives:
  - toward his fellow countrymen
  - against his compatriots
  - toward those of his own nation
  lexicon: LSJ
  rationale: ὁμοεθνεῖς denotes those of the same nation or race. 'His own people'
    is idiomatic and clear; 'against' reflects εἰς with hostile sense in context.
- source_word: ὠμότητα
  chosen: cruelty
  alternatives:
  - brutality
  - savagery
  lexicon: LSJ
  rationale: ὠμότης denotes harsh, savage cruelty. 'Cruelty' is the broadest natural
    rendering; 'brutality' and 'savagery' are possible but slightly more interpretive
    in tone.
- source_word: παραγγείλας
  chosen: after giving orders
  alternatives:
  - having commanded
  - after instructing
  lexicon: LSJ
  rationale: The participle indicates a prior action relative to the implied main
    verb in the next verse. 'After giving orders' preserves sequence and military
    nuance.
- source_word: τοῖς περὶ αὐτὸν ἀνδράσιν
  chosen: to the men around him
  alternatives:
  - to the men with him
  - to his men
  lexicon: LSJ
  rationale: The phrase literally means the men around him, i.e., his accompanying
    force. 'To the men around him' stays close to the Greek while remaining readable.
    'His men' is possible but slightly more compressed than the source.
