id: 2MA.12.9
reference: 2 Maccabees 12:9
source:
  edition: lxx-swete-1909
  text: καὶ τοῖς Ἰαμνίταις νυκτὸς ἐπιβαλὼν ἐνέπρησεν τὸν λιμένα σὺν τῷ στόλῳ, ὥστε
    ἐπιφαίνεσθαι τὰς αὐγὰς τοῦ φέγγους εἰς τὰ Ἱεροσό- λυμα, σταδίων ὄντων διακοσίων
    τεσσεράκοντα.
  language: Greek
  pages:
  - 718
  confidence: high
  validation: agree
translation:
  text: And making a night attack on the people of Jamnia, he set the harbor and the
    fleet on fire, so that the rays of the light were visible as far as Jerusalem,
    it being two hundred forty stadia away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A stadion was an ancient unit of length; two hundred forty stadia is roughly
      27–28 miles (43–45 km).
    reason: cultural_note
  - marker: b
    text: Literally, 'the gleams/rays of the light.' The translation 'the glow of
      the blaze' makes explicit that the visible light comes from the burning harbor
      and fleet.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς Ἰαμνίταις
  chosen: the people of Jamnia
  alternatives:
  - the Jamnites
  - those of Jamnia
  lexicon: LSJ
  rationale: The dative with ἐπιβαλών indicates the target of the attack. 'People
    of Jamnia' is clear modern English while preserving the ethnic/geographic reference;
    'Jamnites' is possible but less natural for contemporary readers.
- source_word: νυκτός ἐπιβαλών
  chosen: making a night attack
  alternatives:
  - attacking by night
  - falling upon them at night
  lexicon: LSJ
  rationale: The participle ἐπιβαλών with νυκτός conveys a sudden assault undertaken
    at night. 'Making a night attack' captures both the military sense and the temporal
    nuance in readable English.
- source_word: ἐνέπρησεν
  chosen: set ... on fire
  alternatives:
  - burned
  - kindled
  lexicon: LSJ
  rationale: The verb means to set ablaze or burn. 'Set ... on fire' fits the direct
    objects and sounds natural in English.
- source_word: τὸν λιμένα
  chosen: the harbor
  alternatives:
  - the port
  lexicon: LSJ
  rationale: λιμήν denotes a harbor/port. 'Harbor' is chosen as the more concrete
    and idiomatic term in this narrative setting.
- source_word: σὺν τῷ στόλῳ
  chosen: and the fleet
  alternatives:
  - together with the fleet
  - along with the naval force
  lexicon: LSJ
  rationale: στόλος here refers to the assembled ships rather than an abstract expedition.
    'And the fleet' smoothly conveys that both harbor and ships were burned.
- source_word: ὥστε ἐπιφαίνεσθαι
  chosen: so that ... was visible
  alternatives:
  - with the result that ... appeared
  - so that ... shone forth
  lexicon: LSJ
  rationale: The construction expresses result. Rendering it with 'was visible' communicates
    the effect in idiomatic English.
- source_word: τὰς αὐγὰς τοῦ φέγγους
  chosen: the glow of the blaze
  alternatives:
  - the rays of the light
  - the brightness of the light
  lexicon: LSJ
  rationale: Literally the phrase speaks of the beams/gleams of the light. In context
    of a harbor and fleet being burned, this refers to the visible glow from the fire;
    'blaze' makes the implied source explicit without overparaphrasing.
- source_word: εἰς τὰ Ἱεροσόλυμα
  chosen: as far as Jerusalem
  alternatives:
  - in Jerusalem
  - toward Jerusalem
  lexicon: LSJ
  rationale: 'With motion/extent language after ἐπιφαίνεσθαι, εἰς here is best taken
    as marking the reach of visibility: the glow could be seen as far as Jerusalem.'
- source_word: σταδίων ὄντων διακοσίων τεσσεράκοντα
  chosen: though it was two hundred forty stadia away
  alternatives:
  - the distance being two hundred forty stadia
  - there being two hundred forty stadia
  lexicon: LSJ
  rationale: The genitive absolute gives the distance between Jamnia and Jerusalem.
    'Though it was ... away' makes the explanatory note natural in English while preserving
    the sense.
