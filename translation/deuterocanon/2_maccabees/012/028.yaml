theological_decisions:
- issue: Divine title τὸν δυνάστην
  chosen_reading: the Sovereign
  alternative_readings:
  - the Mighty One
  - the Ruler
  rationale: This is a title for God emphasizing dominion and power. 'Sovereign' preserves
    the theological force of divine rule without importing a more specific covenantal
    title not present in the Greek.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
