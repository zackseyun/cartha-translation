id: 2MA.12.28
reference: 2 Maccabees 12:28
source:
  edition: lxx-swete-1909
  text: ἐπικαλεσάμενοι δὲ τὸν δυνάστην τὸν μετὰ κρίτους συντρίβοντα τὰς τῶν πολεμίων
    ὀλκάς, ἔλαβον τὴν πόλιν ὑποχείριον, κατέστρωσαν δὲ τῶν ἔνδον εἰς μυριάδας δύο
    πεντακισχιλίους.
  language: Greek
  pages:
  - 720
  confidence: high
  validation: agree
translation:
  text: But after calling on the Sovereign, who with judgments shatters the strength
    of the enemies, they took the city under their control, and struck down twenty-five
    thousand of those inside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Mighty One' or 'the Ruler' for the divine title.
    reason: lexical_alternative
  - marker: b
    text: The Greek phrase rendered 'with judgments' contains an unusual form in the
      transmitted text; the sense is that God shatters the enemies through acts of
      judgment.
    reason: textual_variant
  - marker: c
    text: Or 'captured the city'; literally, 'took the city under hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικαλεσάμενοι
  chosen: after calling on
  alternatives:
  - having invoked
  - calling upon
  lexicon: BDAG
  rationale: Aorist middle participle indicating appeal/invocation directed toward
    God before the action of taking the city. 'After calling on' is natural English
    while preserving the sequence.
- source_word: τὸν δυνάστην
  chosen: the Sovereign
  alternatives:
  - the Mighty One
  - the Ruler
  - the Potentate
  lexicon: LSJ
  rationale: The term denotes one possessing power or dominion. In this context it
    functions as a divine title. 'Sovereign' conveys authority and power in readable
    modern English without sounding archaic or overly political.
- source_word: μετὰ κρίτους
  chosen: with judgments
  alternatives:
  - by judgments
  - with acts of judgment
  lexicon: LSJ
  rationale: The phrase modifies the divine action of shattering the enemy. The transmitted
    form κρίτους is unusual, but its sense is best taken from κρίσις/κρίμα language
    of judgment. 'With judgments' stays close to the Greek while remaining intelligible.
- source_word: συντρίβοντα
  chosen: shatters
  alternatives:
  - crushes
  - breaks in pieces
  lexicon: BDAG
  rationale: Present participle describing the Sovereign's characteristic action.
    'Shatters' captures violent defeat and works well with the object translated as
    'strength.'
- source_word: ὀλκάς
  chosen: the strength
  alternatives:
  - forces
  - power
  - might
  lexicon: LSJ
  rationale: Although the noun can have other senses in Greek usage, in this military
    context with 'of the enemies' it is best understood as their force or strength
    rather than a literal nautical sense. 'Strength' preserves the metaphorical breadth
    and fits the participial clause.
- source_word: ἔλαβον τὴν πόλιν ὑποχείριον
  chosen: they took the city under their control
  alternatives:
  - they captured the city
  - they took the city subject to themselves
  lexicon: LSJ
  rationale: ὑποχείριος means subject to one's hand/power. The fuller English phrase
    expresses both capture and subjugation more clearly than a bare 'captured.'
- source_word: κατέστρωσαν
  chosen: struck down
  alternatives:
  - laid low
  - cut down
  - slew
  lexicon: LSJ
  rationale: In military narrative the verb conveys felling or killing in large numbers.
    'Struck down' is idiomatic, grave, and not archaic.
- source_word: τῶν ἔνδον
  chosen: of those inside
  alternatives:
  - of the men within
  - of those in the city
  lexicon: LSJ
  rationale: The phrase refers to the inhabitants/defenders within the city. 'Those
    inside' is concise and faithful without adding 'men,' which is not explicit here.
- source_word: εἰς μυριάδας δύο πεντακισχιλίους
  chosen: twenty-five thousand
  alternatives:
  - as many as twenty-five thousand
  lexicon: LSJ
  rationale: The numeral expression totals 25,000. Rendering the figure directly is
    clearest in English.
