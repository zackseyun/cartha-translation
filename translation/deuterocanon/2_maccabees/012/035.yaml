id: 2MA.12.35
reference: 2 Maccabees 12:35
source:
  edition: lxx-swete-1909
  text: Δωσίθεος δέ τις τῶν τοῦ Βακινόρος, ἔφιππος ἀνὴρ καὶ καρτερός, εἶχεν τοῦ Γοργίου,
    καὶ λαβόμενος τῆς χλαμύδος, ἦγεν αὐτὸν εὐρώστως, καὶ βουλόμενον τὸν κατάρατον
    λαβεῖν ζωγρείαν, τῶν ἱππέων τινὸς Θρακῶν ἐπενεχθέντος αὐτῷ καὶ τὸν ὦμον καθελόντος,
    διέφυγεν Γοργίας εἰς Μαρισά.
  language: Greek
  pages:
  - 721
  confidence: high
  validation: agree
translation:
  text: But a certain Dositheus, one of Bacenor’s men, a horseman and a strong man,
    had hold of Gorgias; and seizing his cloak, he was dragging him along forcefully,
    intending to take the accursed man alive, when one of the Thracian horsemen rushed
    upon him and cut off his shoulder, and Gorgias escaped to Marisa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cut down his shoulder' / 'disabled his shoulder'; the Greek describes
      a severe blow to the shoulder area, and the exact anatomical result may be understood
      somewhat differently.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δωσίθεος
  chosen: Dositheus
  rationale: Standard transliteration of the personal name; names are transliterated
    rather than translated.
- source_word: τῶν τοῦ Βακινόρος
  chosen: one of Bacenor’s men
  alternatives:
  - one of the men of Bacenor
  - one of Bacenor’s soldiers
  lexicon: LSJ
  rationale: The genitive phrase identifies Dositheus as belonging to Bacenor’s group.
    'One of Bacenor’s men' is natural English while preserving the relational sense
    without over-specifying rank.
- source_word: ἔφιππος ἀνήρ
  chosen: a horseman
  alternatives:
  - a mounted man
  - a man on horseback
  lexicon: LSJ
  rationale: The phrase literally means 'a mounted man.' 'Horseman' is concise, idiomatic,
    and preserves the military sense.
- source_word: καρτερός
  chosen: strong
  alternatives:
  - stout
  - valiant
  - resolute
  lexicon: LSJ
  rationale: In this context the adjective highlights physical toughness in combat.
    'Strong' fits the immediate action better than the more interpretive 'valiant'
    or 'resolute.'
- source_word: εἶχεν τοῦ Γοργίου
  chosen: had hold of Gorgias
  alternatives:
  - had Gorgias
  - was holding Gorgias
  lexicon: LSJ
  rationale: The idiom indicates that Dositheus had physically seized Gorgias. 'Had
    hold of' makes the sense explicit in natural English.
- source_word: λαβόμενος τῆς χλαμύδος
  chosen: seizing his cloak
  alternatives:
  - grabbing his mantle
  - taking hold of his military cloak
  lexicon: LSJ
  rationale: χλαμύς is a cloak, often military. 'Cloak' is the clearest accessible
    rendering; the military nuance is possible but not necessary to state explicitly
    here.
- source_word: ἦγεν αὐτὸν εὐρώστως
  chosen: he was dragging him along forcefully
  alternatives:
  - he was leading him away vigorously
  - he was pulling him along strongly
  lexicon: LSJ
  rationale: Given the combat setting and the prior seizure of the cloak, the sense
    is forceful physical hauling rather than gentle leading. 'Forcefully' reflects
    εὐρώστως ('with strength, vigorously').
- source_word: βουλόμενον ... λαβεῖν ζωγρείαν
  chosen: intending to take the accursed man alive
  alternatives:
  - wanting to capture the accursed man alive
  - wishing to take the accursed one prisoner alive
  lexicon: LSJ
  rationale: ζωγρείαν conveys capture alive rather than killing. 'Take ... alive'
    is direct and idiomatic. The participle is best represented as Dositheus's intention
    in context.
- source_word: τὸν κατάρατον
  chosen: the accursed man
  alternatives:
  - the cursed man
  - the accursed one
  lexicon: LSJ
  rationale: The term is a hostile epithet for Gorgias. 'Accursed man' preserves the
    invective without sounding archaic beyond the tone of the narrative.
- source_word: τῶν ἱππέων τινὸς Θρακῶν
  chosen: one of the Thracian horsemen
  alternatives:
  - a certain Thracian cavalryman
  - one of the Thracian riders
  lexicon: LSJ
  rationale: The phrase refers to a member of the Thracian cavalry. 'Horsemen' is
    a natural military rendering matching the earlier mounted context.
- source_word: ἐπενεχθέντος αὐτῷ
  chosen: rushed upon him
  alternatives:
  - charged at him
  - fell upon him
  lexicon: LSJ
  rationale: The aorist participle indicates a sudden hostile movement against Dositheus.
    'Rushed upon him' is vivid and natural.
- source_word: τὸν ὦμον καθελόντος
  chosen: cut off his shoulder
  alternatives:
  - struck down his shoulder
  - disabled his shoulder
  - cut down his arm at the shoulder
  lexicon: LSJ
  rationale: The Greek is graphic and suggests a severe disabling blow. 'Cut off his
    shoulder' follows the literal force, though the exact anatomical extent may be
    difficult; a footnote preserves a less specific alternative.
- source_word: διέφυγεν Γοργίας εἰς Μαρισά
  chosen: Gorgias escaped to Marisa
  alternatives:
  - Gorgias got away to Marisa
  lexicon: LSJ
  rationale: Straightforward rendering of the escape verb and destination. 'Marisa'
    is a standard transliteration of the place name Μαρισά.
