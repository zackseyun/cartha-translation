id: 2MA.12.41
reference: 2 Maccabees 12:41
source:
  edition: lxx-swete-1909
  text: πάντες οὖν εὐλογήσαντες τὰ τοῦ δικαιοκρίτου κυρίου τοῦ τὰ κεκρυμμένα φανερὰ
    ποιοῦντος,
  language: Greek
  pages:
  - 721
  confidence: high
  validation: agree
translation:
  text: So they all blessed the righteous Judge, the Lord, who makes the hidden things
    manifest,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the deeds of the Lord, the righteous judge.'' The Greek expression
      is elliptical: literally, ''the things of the Lord, the righteous judge.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογήσαντες
  chosen: blessed
  alternatives:
  - praised
  - spoke well of
  lexicon: BDAG
  rationale: Aorist participle from εὐλογέω; 'blessed' preserves the formal religious
    sense directed toward God better than the flatter 'praised,' while remaining natural
    in English.
- source_word: τὰ τοῦ δικαιοκρίτου κυρίου
  chosen: the ways of the Lord, the righteous judge
  alternatives:
  - the deeds of the Lord, the righteous judge
  - the matters of the Lord, the righteous judge
  lexicon: LSJ
  rationale: The neuter plural with article plus genitive is elliptical. In context
    it refers to what belongs to or characterizes the Lord—his acts/ways. 'Ways' is
    idiomatic English for God's just dealings and fits the following participial description.
    'Deeds' is possible, but 'ways' better captures a broader sense than isolated
    acts.
- source_word: δικαιοκρίτου
  chosen: righteous judge
  alternatives:
  - just judge
  lexicon: LSJ
  rationale: Compound adjective/noun meaning one who judges justly. 'Righteous judge'
    preserves the δικαιο- element consistently with biblical diction; 'just judge'
    is possible but slightly less connected to the broader righteousness vocabulary.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered 'Lord' as the default title.
    Here it refers to God in a reverential title sense, not to a human master.
- source_word: τὰ κεκρυμμένα
  chosen: the hidden things
  alternatives:
  - what has been hidden
  - the concealed things
  lexicon: LSJ
  rationale: Perfect passive participle used substantivally. 'The hidden things' is
    concise and preserves the plural substantive force.
- source_word: φανερὰ ποιοῦντος
  chosen: makes ... plain
  alternatives:
  - makes ... manifest
  - reveals
  lexicon: BDAG
  rationale: The participial phrase means 'making [them] visible/open.' 'Makes plain'
    is readable modern English and preserves the causative force better than the more
    interpretive single verb 'reveals.'
