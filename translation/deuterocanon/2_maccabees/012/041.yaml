theological_decisions:
- issue: Rendering of κύριος in reference to God
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The verse uses κύριος as a divine title. Following DOCTRINE.md, 'Lord'
    is the default rendering and best matches biblical usage without importing a different
    nuance.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Elliptical expression τὰ τοῦ δικαιοκρίτου κυρίου
  chosen_reading: the ways of the Lord, the righteous judge
  alternative_readings:
  - the deeds of the Lord, the righteous judge
  rationale: The Greek leaves the neuter plural object somewhat implicit. Rendering
    it as 'ways' preserves theological breadth in describing God's just governance,
    while avoiding over-precision not explicit in the text. An alternative is preserved
    in a footnote because the phrase is genuinely somewhat open-ended.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
