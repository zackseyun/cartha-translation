id: 2MA.12.10
reference: 2 Maccabees 12:10
source:
  edition: lxx-swete-1909
  text: Ἐκεῖθεν δὲ ἀποστάντες σταδίους ἐννέα, ποιουμένων τὴν πορίαν ἐπὶ τὸν Τιμόθεον,
    ἐπέβαλον Ἄραβες αὐτῷ οὐκ ἐλάττους τῶν πεντακισχιλίων, ἱππεῖς δὲ πεντακόσιοι.
  language: Greek
  pages:
  - 718
  confidence: high
  validation: agree
translation:
  text: From there, after they had gone nine stadia, while making their march against
    Timotheus, Arabs fell upon him, no fewer than five thousand, and five hundred
    horsemen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has the singular 'him' (αὐτῷ). Some translators may understand the
      reference collectively as Judas's force and render 'them,' but the source witness
      here is singular, so the main text preserves it.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποστάντες
  chosen: after they had gone on
  alternatives:
  - having departed
  - after setting out
  - after moving away
  lexicon: LSJ
  rationale: Aorist participle from ἀφίστημι/ἀποστάντες here marks movement away from
    the previous location. 'After they had gone on' fits the travel narrative naturally
    in English without overstating separation.
- source_word: σταδίους ἐννέα
  chosen: nine stadia
  alternatives:
  - nine furlongs
  - about one mile
  lexicon: LSJ
  rationale: The text gives the ancient distance unit directly. Retaining 'stadia'
    is more formally transparent; converting to a modern approximation would add interpretation.
- source_word: ποιουμένων τὴν πορίαν
  chosen: while making their march
  alternatives:
  - while proceeding on the journey
  - while on the march
  - while making their way
  lexicon: LSJ
  rationale: The genitive absolute describes ongoing travel. 'March' suits the military
    context better than a neutral 'journey,' while still reflecting πορία as movement/progress.
- source_word: ἐπὶ τὸν Τιμόθεον
  chosen: against Timotheus
  alternatives:
  - toward Timotheus
  - to Timotheus
  lexicon: LSJ
  rationale: In this military setting, ἐπί with accusative indicates hostile direction
    or advance against an opponent, not merely movement toward him.
- source_word: ἐπέβαλον
  chosen: fell upon
  alternatives:
  - attacked
  - set upon
  - charged
  lexicon: LSJ
  rationale: The verb conveys a sudden hostile onset. 'Fell upon' preserves that force
    more vividly than the flatter 'attacked'.
- source_word: Ἄραβες
  chosen: Arabs
  alternatives:
  - Arabians
  lexicon: LSJ
  rationale: '''Arabs'' is the straightforward modern ethnonym for Ἄραβες. ''Arabians''
    is possible but more archaic in English.'
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - them
  lexicon: Greek grammar / context
  rationale: The singular dative is the reading of the provided source text and is
    rendered transparently as 'him.' Although the broader context may suggest reference
    to Judas or the force collectively, the source witness here is singular and should
    not be silently harmonized.
- source_word: οὐκ ἐλάττους τῶν πεντακισχιλίων
  chosen: no fewer than five thousand
  alternatives:
  - not less than five thousand
  - at least five thousand
  lexicon: LSJ
  rationale: This idiom expresses a minimum number. 'No fewer than' is idiomatic modern
    English and preserves the lower-bound sense.
- source_word: ἱππεῖς δὲ πεντακόσιοι
  chosen: and five hundred horsemen
  alternatives:
  - and five hundred cavalry
  - with five hundred horsemen
  lexicon: LSJ
  rationale: ἱππεῖς refers to mounted troops. 'Horsemen' is clear and concrete; 'cavalry'
    is also possible but slightly more collective and modernized.
