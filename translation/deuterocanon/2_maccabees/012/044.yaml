id: 2MA.12.44
reference: 2 Maccabees 12:44
source:
  edition: lxx-swete-1909
  text: εἰ μὴ γὰρ τοὺς προπεπτωκότας ἀναστῆναι προσεδόκα, περισσὸν καὶ ληρῶδες ὑπὲρ
    νεκρῶν εὔχεσθαι.
  language: Greek
  pages:
  - 721
  confidence: high
  validation: minor_mismatch
translation:
  text: For if he were not expecting those who had fallen to rise again, it would
    be excessive and foolish to pray for the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who had died'; literally 'those who had fallen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προπεπτωκότας
  chosen: those who had fallen
  alternatives:
  - those who had died
  - the fallen
  lexicon: LSJ
  rationale: The perfect participle of προπίπτω literally means 'those who have fallen
    beforehand/down.' In this military context it refers to the dead in battle, but
    'those who had fallen' preserves the Greek image while remaining natural English.
    'Those who had died' is interpretive and less vivid.
- source_word: ἀναστῆναι
  chosen: to rise again
  alternatives:
  - to rise
  - to be raised
  lexicon: LSJ
  rationale: The aorist infinitive of ἀνίστημι here refers to resurrection. 'To rise
    again' communicates resurrection clearly in idiomatic English without forcing
    a passive ('be raised') not present in the Greek form.
- source_word: προσεδόκα
  chosen: were not expecting
  alternatives:
  - did not hope
  - did not look for
  lexicon: LSJ
  rationale: The verb means to expect or await. 'Expecting' best fits the conditional
    argument and avoids overstating emotional nuance that 'hope' might suggest.
- source_word: περισσὸν
  chosen: excessive
  alternatives:
  - superfluous
  - pointless
  - unnecessary
  lexicon: LSJ
  rationale: περισσός here carries the sense of being beyond what is needed. 'Excessive'
    preserves that sense while pairing naturally with ληρῶδες. 'Pointless' would move
    too far into inferred meaning.
- source_word: ληρῶδες
  chosen: foolish
  alternatives:
  - senseless
  - absurd
  - idle
  lexicon: LSJ
  rationale: The adjective denotes folly or nonsense. 'Foolish' is clear modern English
    and suits the rhetorical force of the sentence. 'Absurd' is possible but somewhat
    stronger and more interpretive.
- source_word: ὑπὲρ νεκρῶν
  chosen: for the dead
  alternatives:
  - on behalf of the dead
  - concerning the dead
  lexicon: LSJ
  rationale: ὑπέρ with the genitive commonly means 'for' or 'on behalf of.' 'For the
    dead' is the most natural English rendering and adequately conveys intercessory
    prayer on their behalf.
- source_word: εὔχεσθαι
  chosen: to pray
  alternatives:
  - to offer prayers
  - to make supplication
  lexicon: LSJ
  rationale: The middle infinitive here refers to prayer/vow language; in this context
    'to pray' is the clearest and most idiomatic rendering.
