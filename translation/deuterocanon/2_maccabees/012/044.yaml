theological_decisions:
- issue: Resurrection expectation as the rationale for prayer for the dead
  chosen_reading: Rendered the clause straightforwardly as a conditional statement
    grounding prayer for the dead in expectation that the fallen will rise again.
  alternative_readings:
  - A more interpretive rendering could make explicit that this refers to bodily resurrection.
  - A more formal rendering could retain 'superfluous and silly' or similar phrasing.
  rationale: 'The Greek itself states the logic without elaboration: if he did not
    expect the fallen to rise, prayer for the dead would be pointless/foolish. The
    translation preserves that theological connection without importing later doctrinal
    formulations about the intermediate state or purgation.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
