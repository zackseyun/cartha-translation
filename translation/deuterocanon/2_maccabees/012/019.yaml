id: 2MA.12.19
reference: 2 Maccabees 12:19
source:
  edition: lxx-swete-1909
  text: Δωσίθεος δὲ καὶ Σωσίπατρος, τῶν περὶ τὸν Μακκαβαῖον ἡγουμένων, ἐξοδεύσαντες
    τοὺς ὑπὸ Τιμοθέου ἀπώλεσαν καταλειφθέντας ἐν τῷ ὀχυρώματι, πλείους τῶν μυρίων
    ἀνδρῶν.
  language: Greek
  pages:
  - 719
  confidence: high
  validation: agree
translation:
  text: But Dositheus and Sosipater, leaders under Maccabaeus, marched out and destroyed
    those left behind by Timothy in the stronghold, more than ten thousand men.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τῶν περὶ τὸν Μακκαβαῖον ἡγουμένων
  chosen: commanders under Maccabaeus
  alternatives:
  - leaders around Maccabaeus
  - those commanding with Maccabaeus
  - officers of Maccabaeus
  lexicon: LSJ
  rationale: The phrase literally means 'of those leading around/with Maccabaeus.'
    In context it identifies Dositheus and Sosipater as military leaders associated
    with Judas Maccabaeus. 'Commanders under Maccabaeus' gives the military sense
    and the subordinate association without woodenly reproducing περὶ.
- source_word: ἐξοδεύσαντες
  chosen: went out
  alternatives:
  - marched out
  - set out
  lexicon: LSJ
  rationale: The participle denotes going out or marching out. 'Went out' is straightforward
    and fits the narrative sequence without overstating the military nuance.
- source_word: τοὺς ὑπὸ Τιμοθέου
  chosen: those left behind by Timothy
  alternatives:
  - those under Timothy
  - Timothy's men
  lexicon: LSJ
  rationale: 'Although ὑπό can mean ''under'' in a subordinate sense, with the following
    participle καταλειφθέντας the construction is best taken together: ''those left
    behind by Timothy.'' This avoids an awkward split and reflects the syntax more
    naturally.'
- source_word: ἀπώλεσαν
  chosen: destroyed
  alternatives:
  - killed
  - wiped out
  lexicon: LSJ
  rationale: The verb can mean destroy or kill. Because the object is a body of men
    in battle, 'destroyed' preserves the broader military sense while implying lethal
    defeat.
- source_word: καταλειφθέντας
  chosen: left behind
  alternatives:
  - abandoned
  - remaining
  lexicon: LSJ
  rationale: The passive participle indicates that Timothy had left these men in place.
    'Left behind' is the clearest idiomatic rendering.
- source_word: ἐν τῷ ὀχυρώματι
  chosen: in the stronghold
  alternatives:
  - in the fortress
  - in the fortified place
  lexicon: LSJ
  rationale: ὀχύρωμα denotes a fortified place or stronghold. 'Stronghold' is natural
    English and preserves the military setting.
- source_word: πλείους τῶν μυρίων ἀνδρῶν
  chosen: more than ten thousand men
  alternatives:
  - over ten thousand men
  lexicon: LSJ
  rationale: μύριοι commonly denotes ten thousand. The comparative phrase straightforwardly
    means 'more than ten thousand men.' 'Men' is retained for gender accuracy and
    because the referent is a fighting force.
