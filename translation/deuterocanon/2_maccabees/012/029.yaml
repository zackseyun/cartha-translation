id: 2MA.12.29
reference: 2 Maccabees 12:29
source:
  edition: lxx-swete-1909
  text: ἀναζεύξαντές τε ἐκεῖθεν, ὥρμησαν ἐπὶ Σκυθῶν πόλιν, ἀπέχουσαν ἀπὸ Ἱεροσολύμων
    σταδίους ἑξακοσίους.
  language: Greek
  pages:
  - 720
  confidence: high
  validation: agree
translation:
  text: Then they broke camp from there and set out for the city of the Scythians,
    six hundred stadia from Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'to Scythopolis,' the city likely meant by the Greek expression
      'the city of the Scythians.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναζεύξαντές
  chosen: broke camp
  alternatives:
  - set out
  - marched away
  lexicon: LSJ
  rationale: The participle from ἀναζεύγνυμι commonly refers to striking camp or breaking
    up camp before departure. 'Broke camp' captures the military/travel sense more
    precisely than the more generic 'set out' alone.
- source_word: ὥρμησαν
  chosen: set out
  alternatives:
  - rushed
  - advanced
  - went
  lexicon: LSJ
  rationale: Although the verb can mean 'rushed' or 'charged,' in this travel narrative
    it marks movement toward a destination rather than an attack. 'Set out' gives
    natural English while preserving purposeful motion.
- source_word: ἐπὶ Σκυθῶν πόλιν
  chosen: for the city of the Scythians
  alternatives:
  - against Scythian city
  - to Scythopolis
  lexicon: LSJ
  rationale: The Greek reads literally 'upon/to a city of the Scythians.' In context
    this refers to the known city Scythopolis, but the source text itself uses a descriptive
    expression rather than the proper name. The translation stays close to the Greek
    wording while preserving destination sense with 'for.'
- source_word: ἀπέχουσαν
  chosen: which is ... from
  alternatives:
  - being distant from
  - lying ... away from
  lexicon: LSJ
  rationale: 'The participle indicates distance from Jerusalem. English idiom prefers
    a relative clause: ''which is six hundred stadia from Jerusalem.'''
- source_word: σταδίους ἑξακοσίους
  chosen: six hundred stadia
  alternatives:
  - about 69 miles
  - about 111 kilometers
  lexicon: LSJ
  rationale: The ancient unit is retained for transparency and formal accuracy. Modern
    equivalents are interpretive and better suited to a note if needed.
