theological_decisions:
- issue: Cultic description of the altar's fire and ashes
  chosen_reading: whose fire and ashes were holy
  alternative_readings:
  - whose fire was pure and whose ashes were holy
  - whose fire and ashes were pure
  rationale: The Greek has a single predicate adjective ἁγνόν with coordinated subjects
    'fire' and 'ashes.' In context of temple sanctity, rendering the whole phrase
    as 'holy' best communicates consecration rather than mere physical purity. This
    avoids flattening the sacrificial setting while staying close to the Greek.
  doctrine_reference: Translation philosophy §§1, 6
