theological_decisions:
- issue: Supplying the implied main verb and subject from the participial/infinitival
    construction
  chosen_reading: 'Render the clause as dependent speech/urging: ''[they were] about
    to be deprived ... and [he urged them] not to allow ...'''
  alternative_readings:
  - Translate more woodenly without supplied brackets
  - Restructure as indirect discourse after the previous verse's governing verb
  rationale: The Greek here is syntactically dependent on the surrounding context
    and lacks a fully explicit English-ready finite verb in isolation. Minimal supplied
    words in brackets make the verse intelligible while signaling that they are contextually
    supplied rather than directly present in this verse alone.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning without paraphrase.'
