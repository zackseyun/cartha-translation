translation:
  text: '[they were] about to be deprived of the law and fatherland and holy temple,
    and [he urged them] not to allow the people, who had just now recovered a little,
    to become subject to the slanderous nations.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'homeland' for 'fatherland.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the reviling/blaspheming nations.' The Greek term can denote abusive
      or profane speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: στερεῖσθαι
  chosen: to be deprived of
  alternatives:
  - to be robbed of
  - to lose
  lexicon: LSJ
  rationale: The infinitive conveys being stripped or deprived of something. 'Deprived
    of' is natural English and preserves the force of loss without over-paraphrase.
- source_word: νόμου
  chosen: the law
  alternatives:
  - law
  lexicon: LSJ
  rationale: With the article and Jewish context, this refers to the ancestral law/Torah.
    'The law' preserves the source wording and its covenantal weight.
- source_word: πατρίδος
  chosen: fatherland
  alternatives:
  - homeland
  - native land
  lexicon: LSJ
  rationale: The term denotes one's ancestral country. 'Fatherland' keeps the familial-national
    sense present in the Greek better than the flatter 'homeland,' though both are
    possible.
- source_word: ἱεροῦ ἁγίου
  chosen: holy temple
  alternatives:
  - holy sanctuary
  - sacred temple
  lexicon: LSJ
  rationale: ἱερόν denotes the temple precinct/temple, and ἅγιος qualifies it as holy.
    'Holy temple' is concise and idiomatic.
- source_word: ἄρτι βραχέως ἀνεψυγμένα
  chosen: who had just now recovered a little
  alternatives:
  - who had only recently been somewhat revived
  - who had just been briefly refreshed
  lexicon: LSJ
  rationale: The phrase indicates recent and partial relief or recovery. 'Recovered
    a little' communicates the limited, recent respite in readable English.
- source_word: λαὸν
  chosen: the people
  alternatives:
  - the nation
  lexicon: LSJ
  rationale: In this context it refers to the Jewish people collectively. 'The people'
    is the most direct rendering.
- source_word: δυσφήμοις ἔθνεσιν
  chosen: the slanderous nations
  alternatives:
  - the blaspheming Gentiles
  - the hostile nations
  - the reviling nations
  lexicon: LSJ
  rationale: δυσφήμος can denote speaking ill, reviling, or using ill-omened/profane
    speech. 'Slanderous' preserves the verbal-abusive sense without importing a specifically
    later theological term unless context requires it. 'Nations' reflects ἔθνεσιν
    straightforwardly.
- source_word: ὑποχειρίους γενέσθαι
  chosen: to become subject to
  alternatives:
  - to fall under the power of
  - to become subjugated to
  - to become subject under the hand of
  lexicon: LSJ
  rationale: The expression means to come under another's control or power. 'Become
    subject to' is idiomatic and sufficiently strong.
