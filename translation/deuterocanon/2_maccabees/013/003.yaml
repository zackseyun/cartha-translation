theological_decisions:
- issue: Moral characterization of Menelaus's motive in εἰρωνία
  chosen_reading: Render as 'insincerity' rather than literal 'irony'
  alternative_readings:
  - with much irony
  - with much dissembling
  rationale: The context contrasts Menelaus's apparent appeal with his self-serving
    ambition. A literal 'irony' in English would likely mislead modern readers into
    hearing rhetorical wit rather than feigned concern. The rendering preserves the
    ethical force without importing extra detail.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
