translation:
  text: Menelaus also joined them and, with great insincerity, kept urging Antiochus
    on—not for the safety of the fatherland, but because he thought he would be appointed
    to office.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with much dissembling'; the Greek term can denote feigned speech or
      concealment of true motives.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the welfare of the homeland.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέμιξεν
  chosen: joined
  alternatives:
  - mixed with
  - associated with
  lexicon: LSJ
  rationale: The verb indicates joining or mixing oneself with a group. 'Joined' is
    natural English and fits the narrative context of Menelaus attaching himself to
    the others.
- source_word: παρεκάλει
  chosen: kept urging ... on
  alternatives:
  - encouraged
  - appealed to
  - exhorted
  lexicon: LSJ
  rationale: Imperfect aspect suggests ongoing or repeated action. 'Kept urging ...
    on' captures both the durative force and the persuasive sense directed toward
    Antiochus.
- source_word: μετὰ πολλῆς εἰρωνίας
  chosen: with great insincerity
  alternatives:
  - with much irony
  - with much dissembling
  - with much flattery
  lexicon: LSJ
  rationale: Although εἰρωνία can denote irony or dissimulation, in this context Menelaus
    is acting with feigned motives rather than speaking ironically in the modern sense.
    'With great insincerity' communicates the moral nuance clearly in modern English.
- source_word: σωτηρίᾳ
  chosen: safety
  alternatives:
  - salvation
  - deliverance
  - welfare
  lexicon: LSJ
  rationale: Here the referent is the political well-being of the homeland, not theological
    salvation. 'Safety' preserves the concrete national sense.
- source_word: πατρίδος
  chosen: the fatherland
  alternatives:
  - his country
  - the homeland
  - the native land
  lexicon: LSJ
  rationale: πατρίς denotes one's ancestral land or country. 'Fatherland' preserves
    the patriotic and ancestral nuance present in the Greek, though somewhat elevated
    in tone.
- source_word: ἐπὶ τῆς ἀρχῆς κατασταθήσεται
  chosen: he would be appointed to office
  alternatives:
  - he would be established in power
  - he would be appointed to the rule
  - he would be set over the government
  lexicon: LSJ
  rationale: The phrase points to being installed in a position of authority. 'Appointed
    to office' is idiomatic and avoids overstating the scope of ἀρχή as if it necessarily
    meant kingship.
