translation:
  text: And when all had done the same together and had implored the merciful Lord
    with weeping and fastings and prostration for three days without ceasing, Judas
    encouraged them and ordered them to be ready.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ordered them to assemble' or 'ordered them to come/present themselves.'
      The Greek verb can denote arriving or being present; the rendering 'be ready'
      reflects the likely military sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντων ... τὸ αὐτὸ ποιησάντων ὁμοῦ
  chosen: when all had done the same together
  alternatives:
  - after all had done the same together
  - since all had done the same together
  lexicon: LSJ
  rationale: Genitive absolute introducing the circumstance prior to Judas's action.
    τὸ αὐτὸ ποιεῖν here refers back to the same act of prayer/appeal; 'done the same
    together' preserves the collective force of πάντων and ὁμοῦ.
- source_word: καταξιωσάντων τὸν ἐλεήμονα κύριον
  chosen: had implored the merciful Lord
  alternatives:
  - had entreated the merciful Lord
  - had deemed the merciful Lord worthy
  lexicon: LSJ
  rationale: Although καταξιόω often means 'consider worthy' or 'count worthy,' with
    an object and in this prayer context it carries the sense of making earnest appeal
    to or beseeching. 'Implored' fits the surrounding expressions of lament, fasting,
    and prostration better than a wooden rendering.
- source_word: τὸν ἐλεήμονα κύριον
  chosen: the merciful Lord
  alternatives:
  - the compassionate Lord
  lexicon: LSJ
  rationale: ἐλεήμων denotes mercy/compassion. 'Merciful' is the most direct and idiomatic
    rendering. κύριος follows the project's default as 'Lord'.
- source_word: μετὰ κλαυθμοῦ καὶ νηστειῶν καὶ προπτώσεως
  chosen: with weeping and fastings and prostration
  alternatives:
  - with weeping and fasting and falling down
  - with tears and fasts and prostration
  lexicon: LSJ
  rationale: The preposition μετὰ marks accompanying acts of supplication. Plural
    νηστειῶν is retained as 'fastings' to reflect repeated/continued fasting over
    the period. προπτώσις is a physical act of falling/prostrating oneself in prayer;
    'prostration' is concise and accurate.
- source_word: ἐπὶ ἡμέρας τρεῖς ἀδιαλείπτως
  chosen: for three days without ceasing
  alternatives:
  - throughout three days continually
  - for three uninterrupted days
  lexicon: LSJ
  rationale: ἐπὶ with accusative of time gives duration, and ἀδιαλείπτως adds the
    idea of unbroken persistence. 'Without ceasing' preserves the adverb's force in
    natural English.
- source_word: παρακαλέσας αὐτοὺς
  chosen: Judas encouraged them
  alternatives:
  - Judas exhorted them
  - Judas urged them
  lexicon: LSJ
  rationale: παρακαλέω can mean encourage, exhort, or urge. In the immediate context
    after communal prayer and before military action, 'encouraged' captures both comfort
    and exhortation without overstating.
- source_word: ἐκέλευσεν παραγίνεσθαι
  chosen: ordered them to be ready
  alternatives:
  - ordered them to assemble
  - ordered them to come
  - commanded them to present themselves
  lexicon: LSJ
  rationale: παραγίνομαι commonly means 'arrive, be present, come.' In this military
    setting, after encouragement, the command likely concerns presenting themselves
    prepared for action. 'Be ready' conveys the practical force in idiomatic English
    while remaining anchored to the summons implied by the Greek.
