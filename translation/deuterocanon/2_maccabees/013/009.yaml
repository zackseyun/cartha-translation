translation:
  text: But the king, weighed down in his mind, advanced, intending to inflict on
    the Jews the worst things that had happened under his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'planning to bring upon the Jews the worst things that had happened
      in his father's time.' The Greek participle can be rendered with a nuance of
      expectation or intention.
    reason: lexical_alternative
lexical_decisions:
- source_word: φρονήμασιν
  chosen: in his mind
  alternatives:
  - in his thoughts
  - in his attitude
  - in his purpose
  lexicon: LSJ
  rationale: The dative plural with βεβαρημένος expresses the sphere in which the
    king is burdened. 'Mind' gives natural English while preserving the inward, dispositional
    sense better than a more psychological paraphrase.
- source_word: βεβαρημένος
  chosen: weighed down
  alternatives:
  - burdened
  - oppressed
  lexicon: LSJ
  rationale: The perfect participle conveys a settled state of being heavily burdened.
    'Weighed down' preserves the metaphor and reads naturally in English.
- source_word: ἦρχετο
  chosen: advanced
  alternatives:
  - came on
  - approached
  - began
  lexicon: LSJ
  rationale: In context of military movement, the imperfect indicates he was proceeding
    or coming forward. 'Advanced' fits the campaign setting better than the more generic
    'came' and avoids the unrelated sense 'began.'
- source_word: τὰ χείριστα
  chosen: the worst things
  alternatives:
  - the worst
  - the most terrible things
  lexicon: LSJ
  rationale: The neuter plural superlative is substantival. 'The worst things' makes
    explicit the implied object in idiomatic English without overinterpreting the
    exact nature of the acts.
- source_word: τῶν ἐπὶ τοῦ πατρὸς αὐτοῦ γεγονότων
  chosen: that had happened under his father
  alternatives:
  - that had taken place in his father's time
  - that had occurred during his father's reign
  lexicon: LSJ
  rationale: ἐπὶ with the genitive here denotes time or regime, and γεγονότων refers
    to events that occurred. 'Under his father' is concise and preserves the political
    sense of the father's period of rule.
- source_word: ἐνδεξόμενος
  chosen: intending to inflict
  alternatives:
  - expecting to bring upon
  - planning to impose
  - accepting for
  lexicon: LSJ
  rationale: In this hostile context with dative τοῖς Ἰουδαίοις, the participle is
    best understood as taking upon himself the course of bringing these evils on the
    Jews. 'Intending to inflict' captures the volitional and adversative force in
    clear English.
