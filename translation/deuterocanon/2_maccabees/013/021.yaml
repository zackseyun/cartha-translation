translation:
  text: But Rhodocus, from the Jewish ranks, disclosed the secrets to the enemies;
    he was sought out and seized and imprisoned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mysteries'; here the Greek most likely refers to confidential plans
      or secrets rather than religious mysteries.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the Jewish contingent.' The Greek phrase indicates that Rhodocus
      belonged to the Jewish side/group.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσήγγειλεν
  chosen: disclosed
  alternatives:
  - reported
  - revealed
  - betrayed
  lexicon: LSJ
  rationale: The verb means to report or announce to someone. In context, with 'the
    secrets' given to enemies, 'disclosed' captures the act of making confidential
    information known without adding more interpretation than the Greek itself states.
    'Betrayed' is contextually inferential and stronger than the verb alone.
- source_word: τὰ μυστήρια
  chosen: the secrets
  alternatives:
  - the mysteries
  - the confidential matters
  lexicon: LSJ
  rationale: In this military-political context, the word refers to secret matters
    rather than religious 'mysteries.' 'Secrets' is the clearest modern English equivalent
    and fits the context of treachery.
- source_word: τοῖς πολεμίοις
  chosen: to the enemies
  alternatives:
  - to the hostile forces
  - to the adversaries
  lexicon: LSJ
  rationale: A straightforward rendering of the dative plural. 'Enemies' is natural
    and sufficiently formal.
- source_word: Ῥόδοκος
  chosen: Rhodocus
  alternatives:
  - Rodocus
  rationale: Personal names are transliterated by standard conventions. 'Rhodocus'
    reflects the Greek form reasonably in English.
- source_word: ἐκ τῆς Ἰουδαϊκῆς τάξεως
  chosen: from the Jewish ranks
  alternatives:
  - from the Jewish contingent
  - from the Jewish order
  lexicon: LSJ
  rationale: τάξις here denotes a body, rank, or organized group. 'From the Jewish
    ranks' communicates that Rhodocus belonged to the Jewish side/group without implying
    a formal religious 'order.'
- source_word: ἀνεζητήθη
  chosen: was sought out
  alternatives:
  - was searched for
  - was hunted down
  lexicon: LSJ
  rationale: The passive indicates that others looked for him. 'Was sought out' is
    idiomatic and preserves the passive sense.
- source_word: κατελήμφθη
  chosen: caught
  alternatives:
  - seized
  - captured
  lexicon: LSJ
  rationale: The verb means to seize or apprehend. 'Caught' is concise and natural
    in sequence with the surrounding verbs; 'captured' would also work, but 'caught'
    better matches the rapid narrative cadence.
- source_word: κατεκλείσθη
  chosen: imprisoned
  alternatives:
  - shut up
  - confined
  - locked up
  lexicon: LSJ
  rationale: The verb literally means to shut in. In this context of apprehension
    after treachery, 'imprisoned' expresses the likely force in clear modern English.
