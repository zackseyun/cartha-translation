lexical_decisions:
- source_word: ἐδυσφόρουν
  chosen: were displeased
  alternatives:
  - were indignant
  - were upset
  - were dissatisfied
  lexicon: LSJ
  rationale: The verb denotes being troubled or taking something badly. 'Were displeased'
    fits the political context of reaction to treaty terms without overstating the
    emotion as outright rage.
- source_word: συνθηκῶν
  chosen: terms
  alternatives:
  - agreements
  - treaty terms
  - covenants
  lexicon: LSJ
  rationale: In context this refers to negotiated conditions or treaty provisions.
    'Terms' is concise and natural English; 'agreements' is possible, but the plural
    better suggests specific conditions.
- source_word: ἐδειλίαζον
  chosen: were exceedingly fearful
  alternatives:
  - were very timid
  - were greatly alarmed
  - were cowardly to an extreme
  lexicon: LSJ
  rationale: The verb is related to fear or timidity. Because the clause explains
    their displeasure, 'were exceedingly fearful' preserves the causal sense without
    importing a moral judgment as strongly as 'cowardly'.
- source_word: ὑπεράγαν
  chosen: exceedingly
  alternatives:
  - greatly
  - beyond measure
  - to an extreme
  lexicon: LSJ
  rationale: This adverb intensifies the preceding verb. 'Exceedingly' is a clear
    modern equivalent that preserves the strong degree.
- source_word: ἀθετεῖν
  chosen: set aside
  alternatives:
  - reject
  - nullify
  - break
  lexicon: LSJ
  rationale: The verb can mean invalidate or disregard. 'Set aside' captures the intention
    to cancel or repudiate the agreed provisions in readable English.
- source_word: διαστάλσεις
  chosen: arrangements
  alternatives:
  - stipulations
  - terms
  - settlements
  lexicon: LSJ
  rationale: The noun is uncommon and contextually refers to the detailed provisions
    or settlement arrangements. 'Arrangements' avoids awkwardness while still conveying
    negotiated dispositions. Because the source text is marked with major mismatch
    validation and the noun is unusual, a footnote preserves a more formal alternative.
