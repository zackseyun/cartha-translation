translation:
  text: He came to Ptolemais. The people of Ptolemais were displeased about the terms,
    for they were exceedingly fearful, and they wanted to set aside the arrangements.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stipulations' for 'arrangements'; the Greek noun is uncommon and likely
      refers to the specific provisions of the settlement.
    reason: lexical_alternative
  - marker: b
