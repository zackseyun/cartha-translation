translation:
  text: And after giving those around him the battle cry, “God’s Victory,” he attacked
    the royal court by night with the finest armed young men, struck down about two
    thousand men in the camp, and cut down the leading elephant together with its
    rider.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “watchword” or “signal” for “battle cry.” The Greek term is a military
      password or signal; here it is expressed aloud as “God’s Victory.”
    reason: lexical_alternative
  - marker: b
    text: Literally “the one being in the house(-structure),” likely referring to
      the man riding in the elephant’s mounted tower or seat.
    reason: cultural_note
lexical_decisions:
- source_word: ἀναδοὺς
  chosen: after giving
  alternatives:
  - having given
  - entrusting
  lexicon: LSJ
  rationale: Aorist participle from ἀναδίδωμι here introduces the action preceding
    the assault. 'After giving' is natural English and preserves the temporal sequence.
- source_word: τοῖς περὶ αὐτὸν
  chosen: those around him
  alternatives:
  - his men
  - those with him
  lexicon: LSJ
  rationale: Literally 'those around him,' an idiom for his companions or followers.
    The chosen rendering stays close to the Greek while remaining readable.
- source_word: σύνθημα
  chosen: battle cry
  alternatives:
  - watchword
  - password
  - signal
  lexicon: LSJ
  rationale: In military context σύνθημα is a signal or watchword. Because it is publicly
    voiced as 'God's Victory,' 'battle cry' best fits the narrative action in English,
    while 'watchword' is preserved as an alternative.
- source_word: Θεοῦ Νίκην
  chosen: God’s Victory
  alternatives:
  - Victory of God
  - God is victorious
  lexicon: LSJ
  rationale: The phrase functions as the content of the σύνθημα. The genitive is best
    rendered possessively in concise English. Capitalizing 'Victory' reflects its
    slogan-like force, not a separate title.
- source_word: νεανίσκων ἀρίστων κεκοσμημένων
  chosen: the finest armed young men
  alternatives:
  - the best-equipped young men
  - excellent young men in full array
  lexicon: LSJ
  rationale: κεκοσμημένων literally means 'adorned/arrayed/equipped.' In military
    context it refers to being properly outfitted. 'Armed' conveys the practical sense
    without over-literal awkwardness.
- source_word: ἐπιβαλὼν
  chosen: he attacked
  alternatives:
  - having fallen upon
  - having launched an assault on
  lexicon: LSJ
  rationale: The participle with ἐπὶ + accusative in military narrative denotes making
    an attack. 'He attacked' gives the sense directly in idiomatic English.
- source_word: νύκτωρ
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: LSJ
  rationale: The adverb means 'by night' or 'at night.' 'By night' preserves the elevated
    narrative tone and concise force.
- source_word: τὴν βασιλικὴν αὐλήν
  chosen: the royal court
  alternatives:
  - the royal camp enclosure
  - the king's court
  lexicon: LSJ
  rationale: αὐλή can mean court, courtyard, or enclosed area. In this military setting
    it likely refers to the royal quarters/enclosure. 'Royal court' is the most straightforward
    rendering, with the spatial nuance noted by alternatives.
- source_word: τὴν παρεμβολὴν
  chosen: the camp
  alternatives:
  - the encampment
  lexicon: LSJ
  rationale: Standard military term for camp or encampment. 'Camp' is concise and
    natural.
- source_word: ἀνεῖλεν εἰς ἄνδρας δυσχιλίους
  chosen: struck down about two thousand men
  alternatives:
  - killed two thousand men
  - did away with two thousand men
  lexicon: LSJ
  rationale: ἀναιρέω commonly means kill or do away with. The idiom εἰς ἄνδρας δυσχιλίους
    is approximate/counting language; 'about two thousand men' reflects that idiomatic
    force better than an overly rigid numeral.
- source_word: τὸν πρωτεύοντα τῶν ἐλεφάντων
  chosen: the leading elephant
  alternatives:
  - the foremost of the elephants
  - the chief elephant
  lexicon: LSJ
  rationale: The phrase denotes the elephant in the foremost or principal position,
    likely the most prominent war elephant. 'Leading elephant' is clear and idiomatic.
- source_word: σὺν τῷ κατʼ οἰκίαν ὄντι
  chosen: together with its rider
  alternatives:
  - together with the one in the howdah
  - together with the one in its house-like tower
  lexicon: LSJ
  rationale: Literally 'with the one being in the house-structure,' referring to the
    rider/occupant in the elephant's mounted structure. 'Its rider' is the clearest
    main-text rendering; the more specific image is preserved in a footnote.
- source_word: συνέθηκεν
  chosen: cut down
  alternatives:
  - brought down
  - killed
  lexicon: LSJ
  rationale: In context the verb conveys bringing down or dispatching the elephant
    and its occupant. 'Cut down' fits the violent military scene and avoids wooden
    repetition with 'struck down' only partially, while still conveying lethal force.
