translation:
  text: But the king, having learned by experience the Jews’ boldness, tried to take
    the strongholds by stratagems,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'having taken experience of the Jews’ boldness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the positions' or 'the places'; the Greek is more literal than 'strongholds,'
      but the military context suggests defended locations.
    reason: lexical_alternative
  - marker: c
    text: The verb rendered 'tried to take' is contextually difficult; it may also
      be understood more generally as 'attacked' or 'pressed against.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰληφὼς πεῖραν
  chosen: having learned by experience
  alternatives:
  - having had experience
  - having taken note by trial
  - having found out by experience
  lexicon: LSJ
  rationale: The idiom literally means 'having taken experience/test.' In English,
    'having learned by experience' best conveys the experiential knowledge implied
    without sounding wooden.
- source_word: εὐτολμίας
  chosen: boldness
  alternatives:
  - audacity
  - daring
  - courage
  lexicon: LSJ
  rationale: The term denotes readiness to dare, often with a sense of bold or venturesome
    action. 'Boldness' fits the military context and avoids overcommitting to either
    positive 'courage' or negative 'audacity.'
- source_word: κατεῖρασεν
  chosen: tried to take
  alternatives:
  - attacked
  - pressed against
  - attempted to reduce
  lexicon: LSJ
  rationale: In context with διὰ μεθόδων τοὺς τόπους, the verb points to hostile action
    against positions/places. Because the exact nuance is somewhat difficult in this
    form and context, 'tried to take' captures the likely military sense without overstating
    certainty.
- source_word: διὰ μεθόδων
  chosen: by stratagems
  alternatives:
  - by methods
  - by schemes
  - by tactical devices
  lexicon: LSJ
  rationale: μεθόδων here refers not to generic 'methods' but to calculated military
    devices or maneuvers. 'By stratagems' preserves the tactical sense in natural
    English.
- source_word: τοὺς τόπους
  chosen: the strongholds
  alternatives:
  - the places
  - the positions
  - the sites
  lexicon: LSJ
  rationale: Although literally 'the places,' in this military narrative the reference
    is to defended positions or fortified locations. 'Strongholds' makes the contextual
    force explicit in idiomatic English.
