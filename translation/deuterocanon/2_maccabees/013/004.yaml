theological_decisions:
- issue: Reference of 'the King of kings'
  chosen_reading: A divine title referring to God, who providentially moves events
    against the wicked man.
  alternative_readings:
  - A merely hyperbolic royal title
  rationale: Within the narrative of 2 Maccabees, such exalted sovereignty language
    functions as a reference to God overruling human kings. Capitalization in English
    signals this interpretive judgment while remaining faithful to the text's reverential
    force.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological weight
    without importing extra claims.'
