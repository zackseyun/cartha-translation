translation:
  text: But the King of kings stirred up Antiochus’s anger against the wretch, and
    when Lysias pointed him out as being responsible for the evils and for everything,
    he ordered them to put him to death, taking him to Beroea, as is the custom in
    that place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against the criminal' or 'against the villain' for 'the wretch' (Greek
      ἀλιτήριον), a strong term of moral condemnation.
    reason: lexical_alternative
  - marker: b
    text: Beroea here refers to the place of execution according to local custom.
    reason: cultural_note
lexical_decisions:
- source_word: ὁ δὲ βασιλεὺς τῶν βασιλέων
  chosen: the King of kings
  alternatives:
  - the king of kings
  lexicon: LSJ
  rationale: A clear titular expression. Capitalized in English because in context
    it refers reverentially to God, who is presented as sovereign over earthly rulers.
- source_word: ἐξήγειρεν
  chosen: stirred up
  alternatives:
  - aroused
  - provoked
  lexicon: LSJ
  rationale: The verb indicates causing an emotion to rise. 'Stirred up' is natural
    English and preserves the causative force without overinterpreting.
- source_word: τὸν θυμὸν
  chosen: anger
  alternatives:
  - wrath
  - rage
  lexicon: LSJ
  rationale: θυμός here denotes hostile anger. 'Anger' is readable modern English;
    'wrath' would sound elevated beyond the immediate narrative context.
- source_word: ἐπὶ τὸν ἀλιτήριον
  chosen: against the wretch
  alternatives:
  - against the criminal
  - against the accursed man
  - against the villain
  lexicon: LSJ
  rationale: ἀλιτήριος is a strong term of moral reproach for a guilty or vile person.
    'Wretch' preserves the denunciatory tone without becoming too interpretive. The
    article is rendered idiomatically rather than woodenly.
- source_word: ὑποδείξαντος
  chosen: pointed him out
  alternatives:
  - indicated him
  - showed him to be
  lexicon: LSJ
  rationale: The genitive absolute introduces Lysias's action of identifying the man
    in question. 'Pointed him out' is idiomatic and fits the judicial setting.
- source_word: αἴτιον τῶν κακῶν εἶναι καὶ πάντων
  chosen: as being responsible for the evils and for everything
  alternatives:
  - to be the cause of the troubles and of everything
  - to be responsible for these evils and for all of it
  lexicon: LSJ
  rationale: αἴτιος means responsible/cause. τὰ κακά likely refers to the disasters
    or wrongs at issue. καὶ πάντων is somewhat compressed Greek; rendering it 'and
    for everything' preserves the breadth of blame without forcing a narrower interpretation.
- source_word: προσέταξεν
  chosen: he ordered
  alternatives:
  - he commanded
  lexicon: LSJ
  rationale: A standard verb of command. 'Ordered' is straightforward modern English.
- source_word: προσαπολέσαι
  chosen: to put him to death
  alternatives:
  - to destroy him utterly
  - to execute him
  lexicon: LSJ
  rationale: The compound verb intensifies destruction and in context refers to execution.
    'Put him to death' is clear and idiomatic; 'execute' is possible but slightly
    more formal/legal than the Greek requires.
- source_word: ἀγαγόντας εἰς Βέροιαν
  chosen: taking him to Beroea
  alternatives:
  - after leading him to Beroea
  - bringing him to Beroea
  lexicon: LSJ
  rationale: The participle expresses the manner or attendant circumstance of carrying
    out the order. 'Taking him to Beroea' preserves the sequence naturally.
- source_word: ὡς ἔθος ἐστὶν ἐν τῷ τόπῳ
  chosen: as is the custom in that place
  alternatives:
  - as is the local custom
  - according to the custom there
  lexicon: LSJ
  rationale: This clause explains that the mode of execution followed local practice.
    'In that place' stays close to the Greek while remaining readable.
