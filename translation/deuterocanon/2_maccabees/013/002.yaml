translation:
  text: 'and with him Lysias, the guardian and overseer of affairs, each having a
    Greek force: eleven myriads of infantry, five thousand three hundred cavalry,
    twenty-two elephants, and three hundred scythed chariots.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'eleven myriads of infantry' = 110,000 foot soldiers. The translation
      retains the Greek numerical expression for transparency.
    reason: lexical_alternative
  - marker: b
    text: Or 'the regent and the one in charge of affairs.' The Greek titles for Lysias
      indicate entrusted guardianship and administrative authority.
    reason: alternative_reading
lexical_decisions:
- source_word: σὺν αὐτῷ
  chosen: with him
  alternatives:
  - along with him
  lexicon: LSJ
  rationale: Straightforward accompaniment; 'with him' is natural and sufficiently
    formal.
- source_word: Λυσίαν
  chosen: Lysias
  rationale: Personal name is transliterated per project philosophy.
- source_word: τὸν ἐπίτροπον
  chosen: the guardian
  alternatives:
  - the regent
  - the overseer
  - the governor
  lexicon: LSJ
  rationale: ἐπίτροπος can denote one entrusted with guardianship or stewardship.
    In this court context Lysias functions as the king's guardian/regent. 'Guardian'
    stays close to the lexical sense without over-specifying beyond the Greek.
- source_word: καὶ ἐπὶ τῶν πραγμάτων
  chosen: and administrator of affairs
  alternatives:
  - and in charge of affairs
  - and governor of state matters
  lexicon: LSJ
  rationale: The idiom ἐπὶ τῶν πραγμάτων denotes authority over administrative/business
    matters. 'Administrator of affairs' preserves the official sense in readable English.
- source_word: ἕκαστον ἔχοντα δύναμιν Ἑλληνικὴν
  chosen: each having a Greek force
  alternatives:
  - each having a Hellenic army
  - each commanding a Greek force
  lexicon: LSJ
  rationale: 'The accusative participial phrase modifies Antiochus and Lysias together:
    each had such a force. ''Greek force'' renders Ἑλληνικήν plainly; here it refers
    to the Hellenistic/Greek army rather than ethnic Greeks in a narrow sense.'
- source_word: πεζῶν μυριάδας ἕνδεκα
  chosen: eleven myriads of infantry
  alternatives:
  - one hundred ten thousand foot soldiers
  - eleven ten-thousands of infantry
  lexicon: LSJ
  rationale: μυριάς is literally a unit of ten thousand. Retaining 'myriads' keeps
    the source's numerical form transparent; 'infantry' renders πεζῶν idiomatically.
- source_word: ἱππέων πεντακισχιλίους τριακοσίους
  chosen: five thousand three hundred cavalry
  alternatives:
  - five thousand three hundred horsemen
  lexicon: LSJ
  rationale: ἱππεῖς are mounted troops. 'Cavalry' is concise and military in register.
- source_word: ἐλέφαντας εἴκοσι δύο
  chosen: twenty-two elephants
  lexicon: LSJ
  rationale: Direct rendering of the war elephants count.
- source_word: ἅρματα δὲ δρεπανηφόρα τριακόσια
  chosen: three hundred scythed chariots
  alternatives:
  - three hundred chariots fitted with scythes
  lexicon: LSJ
  rationale: δρεπανηφόρα means bearing scythes. 'Scythed chariots' is the standard
    concise English military term and accurately conveys the sense.
