translation:
  text: And after entrusting the oversight to the Lord of the world, and urging those
    with him to fight bravely to the death for the laws, the temple, the city, the
    homeland, and the commonwealth, he set his army in order near Modein.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the Lord of the universe.' The Greek κόσμος can denote the world
      or the ordered universe.
    reason: lexical_alternative
  - marker: b
    text: '''Commonwealth'' translates πολιτεία, which can also mean ''constitution,''
      ''civic order,'' or ''way of life.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: δοὺς
  chosen: after entrusting
  alternatives:
  - having given
  - committing
  lexicon: LSJ
  rationale: Aorist participle of δίδωμι used idiomatically with ἐπιτροπήν; 'after
    entrusting' gives the participial sequence naturally in English while preserving
    the sense of committing something to another's care.
- source_word: ἐπιτροπὴν
  chosen: the oversight
  alternatives:
  - the charge
  - the responsibility
  - the guardianship
  lexicon: LSJ
  rationale: The noun denotes charge, commission, or oversight entrusted to someone.
    'Oversight' fits the context of committing the outcome/care of the campaign to
    God without over-specifying a technical office.
- source_word: τῷ κυρίῳ τοῦ κόσμου
  chosen: to the Lord of the world
  alternatives:
  - to the Lord of the universe
  lexicon: LSJ
  rationale: κύριος is rendered by the project's default 'Lord.' κόσμος can mean world
    or universe; 'world' is the more direct gloss and suits the idiom here.
- source_word: παρακαλέσας
  chosen: urging
  alternatives:
  - encouraging
  - exhorting
  lexicon: LSJ
  rationale: The participle introduces Judas's appeal to his men. 'Urging' is forceful
    and natural, preserving the hortatory sense without sounding overly formal.
- source_word: τοὺς σὺν αὐτῷ
  chosen: those with him
  alternatives:
  - his companions
  - those who were with him
  lexicon: LSJ
  rationale: A straightforward rendering of the article plus prepositional phrase;
    it refers to his forces/companions without adding interpretive specificity.
- source_word: γενναίως ἀγωνίσασθαι
  chosen: to fight bravely
  alternatives:
  - to contend nobly
  - to struggle courageously
  lexicon: LSJ
  rationale: ἀγωνίζομαι can mean struggle or contend, often in combat contexts. Given
    the military setting, 'fight' is the clearest contextual rendering; γενναίως adds
    the manner, 'bravely.'
- source_word: μέχρι θανάτου
  chosen: to the death
  alternatives:
  - until death
  lexicon: LSJ
  rationale: This idiom in English naturally conveys willingness to fight even unto
    death, matching the Greek phrase in a martial context.
- source_word: περὶ νόμων, ἱεροῦ, πόλεως, πατρίδος, πολιτείας
  chosen: for the laws, the temple, the city, the homeland, and the commonwealth
  alternatives:
  - for the law, the sanctuary, the city, the fatherland, and the way of life
  - for the laws, the holy place, the city, the ancestral land, and the constitution
  lexicon: LSJ
  rationale: περὶ here means 'for/on behalf of' in the sense of what they are fighting
    to defend. νόμων is plural in Greek, so 'laws' is retained. ἱεροῦ is best rendered
    'temple' in this context. πατρίς is 'homeland/fatherland'; 'homeland' is readable
    modern English. πολιτεία can mean commonwealth, constitution, or civic order;
    'commonwealth' preserves the public-political sense without narrowing it only
    to legal code or only to lifestyle.
- source_word: περὶ δὲ Μωδεεὶμ
  chosen: near Modein
  alternatives:
  - around Modein
  - at Modein
  lexicon: LSJ
  rationale: With place names, περὶ commonly indicates the vicinity. 'Near Modein'
    best captures the spatial sense without implying exact location.
- source_word: ἐποιήσατο τὴν στρατιάν
  chosen: he set his army in order
  alternatives:
  - he drew up the army
  - he arranged his forces
  lexicon: LSJ
  rationale: ποιέω with στρατιά in military narrative can mean to form or marshal
    the army. 'Set his army in order' is idiomatic English that preserves the sense
    of arranging troops for action.
