theological_decisions:
- issue: Rendering κύριος in a deuterocanonical military prayer context
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's default for κύριος is 'Lord.' Here the phrase identifies
    God as sovereign over the world; 'Lord' preserves both theological weight and
    continuity with biblical usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering πολιτεία in a context of covenantal-national defense
  chosen_reading: commonwealth
  alternative_readings:
  - constitution
  - way of life
  - state
  rationale: The term can denote civic order, constitution, or body politic. 'Commonwealth'
    preserves the political-corporate dimension without reducing the object of defense
    merely to abstract laws or to modern statehood.
