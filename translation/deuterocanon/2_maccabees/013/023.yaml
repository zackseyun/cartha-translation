translation:
  text: He attacked those around Judas, but was defeated. Having become desperate,
    he took action against Philip in Antioch, the one left in charge of affairs; he
    was thrown into confusion, appealed to the Jews, submitted, and swore to all the
    just terms. He was reconciled and offered sacrifice, honored the sanctuary and
    the place, and showed kindness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek sequence around 'he took action against Philip in Antioch ...
      he was thrown into confusion' is compressed and difficult; the exact nuance
      of the action toward Philip is uncertain.
    reason: textual_variant
  - marker: b
    text: Or 'to everything that was just.' The phrase may refer generally to fair
      conditions or specifically to the terms of settlement.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέβαλεν
  chosen: attacked
  alternatives:
  - advanced against
  - assailed
  lexicon: LSJ
  rationale: The verb commonly means to attack or make an assault on. 'Attacked' is
    clear modern English and fits the military context.
- source_word: τοῖς περὶ τὸν Ἰούδαν
  chosen: those around Judas
  alternatives:
  - Judas and his men
  - the party around Judas
  lexicon: LSJ
  rationale: The idiom literally refers to those around Judas, i.e., his group or
    forces. The more literal rendering preserves the Greek expression without over-specifying
    beyond the text.
- source_word: ἥττων ἐγένετο
  chosen: was defeated
  alternatives:
  - became inferior
  - was worsted
  lexicon: LSJ
  rationale: In context this idiom indicates military defeat. 'Was defeated' communicates
    the sense naturally.
- source_word: μετέλαβεν
  chosen: took action against
  alternatives:
  - resorted to
  - turned to
  - had dealings with
  lexicon: LSJ
  rationale: The verb is difficult in this compressed sequence and the source has
    some syntactic roughness. Given the following object phrase about Philip in Antioch,
    'took action against' best captures a decisive move without claiming more precision
    than the Greek securely allows.
- source_word: ἀπονοηθεὶς
  chosen: having become desperate
  alternatives:
  - having lost heart
  - being at a loss
  - being driven to despair
  lexicon: LSJ
  rationale: The participle conveys being in a state of perplexity or desperation.
    'Having become desperate' fits the narrative turn after defeat.
- source_word: τὸν Φίλιππον ἐν Ἀντιοχίᾳ τὸν ἀπολελειμμένον ἐπὶ τῶν πραγμάτων
  chosen: Philip in Antioch, the one left in charge of affairs
  alternatives:
  - Philip at Antioch, who had been left over the government
  - Philip in Antioch, left in charge of state matters
  lexicon: LSJ
  rationale: ἀπολελειμμένον ἐπὶ τῶν πραγμάτων indicates someone left with administrative
    responsibility. 'In charge of affairs' is a natural rendering that preserves the
    governmental sense.
- source_word: συνεχύθη
  chosen: was thrown into confusion
  alternatives:
  - was confounded
  - was disturbed
  lexicon: LSJ
  rationale: The passive indicates being thrown into turmoil or confusion. This keeps
    the emotional and political instability in view.
- source_word: παρεκάλεσεν
  chosen: appealed to
  alternatives:
  - entreated
  - urged
  - begged
  lexicon: LSJ
  rationale: The verb can mean urge, exhort, or entreat. Here, in diplomatic context
    with the Jews, 'appealed to' is broad and suitable.
- source_word: ὑπετάγη
  chosen: submitted
  alternatives:
  - yielded
  - placed himself under
  lexicon: LSJ
  rationale: The passive/middle sense here is that he yielded or submitted. 'Submitted'
    is concise and accurate.
- source_word: ἐπὶ πᾶσι τοῖς δικαίοις
  chosen: to all the just terms
  alternatives:
  - concerning all the rightful things
  - to everything that was just
  lexicon: LSJ
  rationale: The phrase likely refers to terms judged right or fair in the settlement.
    'Just terms' makes the diplomatic sense explicit in idiomatic English.
- source_word: συνελύθη
  chosen: was reconciled
  alternatives:
  - came to terms
  - was released from hostility
  lexicon: LSJ
  rationale: In context after submission and oath-taking, the verb points to a loosening
    of hostilities or reconciliation rather than mere physical release.
- source_word: θυσίαν προσήγαγεν
  chosen: offered sacrifice
  alternatives:
  - presented a sacrifice
  - made an offering
  lexicon: LSJ
  rationale: A standard cultic phrase. 'Offered sacrifice' is natural and preserves
    the sacrificial act.
- source_word: τὸν νεὼ
  chosen: the sanctuary
  alternatives:
  - the temple shrine
  - the temple
  lexicon: LSJ
  rationale: ναός refers specifically to the sanctuary/temple structure rather than
    the broader precincts. 'Sanctuary' preserves that distinction.
- source_word: τὸν τόπον
  chosen: the place
  alternatives:
  - the holy place
  - the site
  lexicon: LSJ
  rationale: The Greek simply says 'the place.' Retaining the phrase avoids importing
    'holy' where the text does not explicitly say it, while still reflecting reverence
    in context.
- source_word: ἐφιλανθρώπησεν
  chosen: showed kindness
  alternatives:
  - acted benevolently
  - treated them humanely
  lexicon: LSJ
  rationale: The verb denotes benevolence or humane treatment. 'Showed kindness' is
    readable and broad enough for the unspecified object in this compressed ending.
