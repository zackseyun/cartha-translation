theological_decisions:
- issue: Cultic terminology for ναός and sacrifice in a deuterocanonical historical
    narrative
  chosen_reading: Rendered ναός as 'sanctuary' and θυσίαν προσήγαγεν as 'offered sacrifice'
    without importing later doctrinal language.
  alternative_readings:
  - Rendered ναός more broadly as 'temple'
  rationale: The verse narrates concrete actions toward the Jerusalem cult site. The
    translation preserves the historical-cultic sense and avoids theological over-interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
- issue: Compressed and somewhat difficult sequence around μετέλαβεν ... Φίλιππον
    ... συνεχύθη
  chosen_reading: Used cautious English that reflects decisive action and subsequent
    confusion without over-resolving the syntax.
  alternative_readings:
  - Interpreting the clause more specifically as seizure, consultation, or alliance
    regarding Philip
  rationale: The source note flags major mismatch, and the Greek sequence is terse.
    The translation therefore preserves the narrative movement while avoiding unwarranted
    precision.
  doctrine_reference: Preserve source uncertainty honestly if it materially affects
    translation.
