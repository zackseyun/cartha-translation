translation:
  text: But he himself, after meeting with the elders, decided, before the king’s
    army could invade Judea and gain control of the city, to go out and decide the
    matter with the help of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'settle affairs' or 'judge the situation' for 'decide the matter.' The
      Greek phrase is broad and can refer to resolving the crisis at hand.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθʼ ἑαυτόν
  chosen: privately
  alternatives:
  - by himself
  - on his own
  lexicon: LSJ
  rationale: The idiom can mean 'by himself' or 'privately/apart.' In context, followed
    by 'with the elders,' it cannot mean solitary action; it indicates a private consultation
    apart from the larger group.
- source_word: σὺν τοῖς πρεσβυτέροις γενόμενος
  chosen: after conferring ... with the elders
  alternatives:
  - being with the elders
  - having met with the elders
  lexicon: LSJ
  rationale: The participial phrase marks his coming together with the elders for
    deliberation. 'After conferring' brings out the contextual force in natural English
    without overparaphrasing.
- source_word: ἐβουλεύσατο
  chosen: decided
  alternatives:
  - took counsel
  - resolved
  - deliberated
  lexicon: BDAG
  rationale: The verb denotes deliberation leading to a plan. 'Decided' is concise
    modern English; the preceding participial phrase already conveys the consultative
    aspect.
- source_word: πρὶν εἰσβαλεῖν
  chosen: before ... could invade
  alternatives:
  - before entering
  - before attacking
  lexicon: LSJ
  rationale: With military subject 'the king's army' and object 'Judea,' the sense
    is hostile incursion. 'Invade' best fits the military context.
- source_word: τὸ στράτευμα τοῦ βασιλέως
  chosen: the king’s army
  alternatives:
  - the royal army
  - the king’s force
  lexicon: LSJ
  rationale: Straightforward military term; 'army' is the most natural equivalent.
- source_word: γενέσθαι τῆς πόλεως ἐγκρατεῖς
  chosen: gain control of the city
  alternatives:
  - become masters of the city
  - get possession of the city
  lexicon: LSJ
  rationale: ἐγκρατής here conveys mastery or control. 'Gain control' is idiomatic
    and clear in contemporary English.
- source_word: ἐξελόντας
  chosen: they should go out
  alternatives:
  - having gone out
  - going out
  lexicon: LSJ
  rationale: The accusative participle depends on the infinitive construction and
    refers to the subject implied in the plan. Rendering it with 'they should go out'
    makes the intended action explicit in English.
- source_word: κρῖναι τὰ πράγματα
  chosen: decide the matter
  alternatives:
  - judge the situation
  - settle affairs
  - bring matters to decision
  lexicon: BDAG
  rationale: The phrase is somewhat broad, referring to resolving the crisis at hand.
    'Decide the matter' preserves the judicial/deliberative sense without narrowing
    it too much.
- source_word: τῇ τοῦ θεοῦ βοηθείᾳ
  chosen: with the help of God
  alternatives:
  - by God's help
  - through the help of God
  lexicon: BDAG
  rationale: A dative of means/instrument. 'With the help of God' is natural and preserves
    explicit divine dependence.
