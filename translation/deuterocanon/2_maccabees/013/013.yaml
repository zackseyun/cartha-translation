theological_decisions:
- issue: Reference of the implied subject in ἐξελόντας κρῖναι
  chosen_reading: The subject is Judas and his associates/elders, rendered as 'they
    should go out and decide the matter.'
  alternative_readings:
  - Judas alone should go out and decide the matter
  - they should go out and judge the issues
  rationale: The Greek construction is compressed, but the plural participle ἐξελόντας
    points to a plural subject associated with the deliberating group rather than
    Judas alone. The translation keeps the action collective without overdefining
    the exact membership.
