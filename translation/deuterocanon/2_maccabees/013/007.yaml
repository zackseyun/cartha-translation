translation:
  text: By such a fate it happened that the lawless Menelaus died, not even obtaining
    burial in the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'not even obtaining the earth'; the sense is that Menelaus did
      not even receive burial.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιούτῳ μόρῳ
  chosen: by such a fate
  alternatives:
  - with such a doom
  - in such a manner
  lexicon: LSJ
  rationale: μόρος denotes fate, doom, or destiny; with the demonstrative τοιούτῳ
    it points back to the manner of death just described. 'By such a fate' preserves
    both the instrumental sense and the solemn tone.
- source_word: τὸν παράνομον
  chosen: the lawless
  alternatives:
  - the wicked
  - the transgressor
  lexicon: LSJ
  rationale: παράνομος literally means 'lawless' or 'acting against law.' Here it
    functions substantivally of Menelaus. 'Lawless' keeps the legal-moral force without
    overinterpreting.
- source_word: συνέβη θανεῖν
  chosen: it happened that ... died
  alternatives:
  - came to die
  - met his death
  lexicon: LSJ
  rationale: συμβαίνω with infinitive expresses what befell or happened. The idiom
    is slightly formal; 'it happened that ... died' preserves the Greek structure
    while remaining intelligible.
- source_word: μηδὲ τῆς γῆς τυγχάνοντα
  chosen: not even obtaining burial in the earth
  alternatives:
  - not even receiving a place in the earth
  - not even attaining the earth
  lexicon: LSJ
  rationale: τυγχάνω with a genitive can mean 'obtain' or 'receive.' In context, with
    γῆ and the preceding death notice, the sense is that he did not even receive burial.
    Making 'burial' explicit in English brings out the idiomatic meaning latent in
    the Greek.
- source_word: Μενέλαον
  chosen: Menelaus
  rationale: Standard English transliteration of the proper name Μενέλαος in the accusative
    form.
