theological_decisions:
- issue: Moral characterization of Menelaus by παράνομος
  chosen_reading: the lawless Menelaus
  alternative_readings:
  - the wicked Menelaus
  rationale: The verse condemns Menelaus morally and legally, but does not require
    a more expansive theological label. 'Lawless' is the closest transparent rendering
    of παράνομος.
