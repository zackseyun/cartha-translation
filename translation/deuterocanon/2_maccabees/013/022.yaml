translation:
  text: The king negotiated further with those in Bethsura, gave and received pledges
    of good faith, and went away,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'gave and received the right hand,' an idiom for exchanging pledges
      or assurances of agreement.
    reason: lexical_alternative
  - marker: b
    text: Bethsura may also be rendered 'Beth-zur,' reflecting the Hebrew place-name
      behind the Greek form.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐδευτερολόγησεν
  chosen: negotiated further
  alternatives:
  - spoke a second time
  - reopened negotiations
  - made a further agreement
  lexicon: LSJ
  rationale: The verb literally suggests speaking or dealing 'a second time,' but
    in this military-political context with the following exchange of δεξιά, it most
    naturally refers to renewed negotiation rather than merely speaking again.
- source_word: τοῖς ἐν Βαθσούροις
  chosen: with those in Bethsura
  alternatives:
  - with the men in Bethsura
  - with those at Beth-zur
  lexicon: LSJ
  rationale: The phrase refers to the people or defenders located in Bethsura. 'Those
    in Bethsura' is natural English and avoids over-specifying gender or military
    status beyond the Greek.
- source_word: Βαθσούροις
  chosen: Bethsura
  alternatives:
  - Beth-zur
  rationale: A standard transliteration from the Greek form is preferred, while the
    more Hebraized place-name 'Beth-zur' is preserved as an alternative.
- source_word: δεξιὰν ἔδωκεν, ἔλαβεν
  chosen: gave and received pledges of good faith
  alternatives:
  - gave and received the right hand
  - exchanged right hands
  - gave and received assurances
  lexicon: LSJ
  rationale: Literally 'gave and received a right hand,' an idiom for giving a pledge,
    assurance, or token of agreement. In English, 'pledges of good faith' communicates
    the covenantal-political force better than a wooden literalism, while the literal
    idiom is worth preserving in a footnote.
- source_word: ἀπῇει
  chosen: went away
  alternatives:
  - departed
  - went off
  lexicon: LSJ
  rationale: A straightforward past narrative verb of departure; 'went away' is clear
    modern English.
