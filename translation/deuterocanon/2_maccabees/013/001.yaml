translation:
  text: In the one hundred forty-ninth year, it happened to those around Judas that
    Antiochus Eupator had arrived with forces against Judea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it came to the attention of those around Judas that Antiochus Eupator
      had come.' The Greek verb can introduce an event/report reaching Judas's group.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτῳ ... ἐνάτῳ καὶ τεσσερακοστῷ καὶ ἑκατοστῷ ἔτει
  chosen: In the one hundred forty-ninth year
  alternatives:
  - In the year one hundred forty-nine
  - In year one hundred and forty-nine
  lexicon: LSJ
  rationale: 'The dative χρονικός construction marks time: ''in the ... year.'' The
    Greek enumerates 149th year in Seleucid-style dating. English idiom is best served
    by ''In the one hundred forty-ninth year,'' preserving the formal dating without
    over-literal repetition of ἔτει.'
- source_word: προσέπεσεν
  chosen: it happened
  alternatives:
  - word came
  - news came
  - it befell
  lexicon: LSJ
  rationale: With dative τοῖς περὶ τὸν Ἰούδαν and following infinitive-like report
    content, the verb here introduces an occurrence coming to the attention of Judas's
    party. 'It happened' preserves the eventive sense without importing the more interpretive
    'news came.'
- source_word: τοῖς περὶ τὸν Ἰούδαν
  chosen: to those around Judas
  alternatives:
  - to Judas and his men
  - to Judas's party
  - to those with Judas
  lexicon: LSJ
  rationale: The idiom literally means 'those around Judas,' i.e., his associates.
    I retained a relatively transparent rendering rather than specifying 'men,' which
    the Greek does not explicitly state.
- source_word: Ἀντίοχον τὸν Εὐπάτορα
  chosen: Antiochus Eupator
  alternatives:
  - Antiochus, called Eupator
  lexicon: LSJ
  rationale: Personal name plus epithet/title is naturally rendered as the standard
    regnal designation 'Antiochus Eupator.'
- source_word: παραγεγόνα
  chosen: had arrived
  alternatives:
  - had come
  - was present
  lexicon: LSJ
  rationale: The perfect infinitive/complement sense indicates completed arrival with
    present relevance. 'Had arrived' captures that aspect better than simple 'came.'
- source_word: σὺν πλήθεσιν
  chosen: with forces
  alternatives:
  - with multitudes
  - with a large army
  - with troops
  lexicon: LSJ
  rationale: πλήθη literally means 'multitudes,' but in military context it refers
    to bodies of troops/forces. 'With forces' is concise and contextually appropriate
    without overstating a singular 'army' not explicit in the Greek.
- source_word: ἐπὶ τὴν Ἰουδαίαν
  chosen: against Judea
  alternatives:
  - into Judea
  - toward Judea
  lexicon: LSJ
  rationale: In military movement context, ἐπί with accusative commonly conveys hostile
    advance against a region. 'Against Judea' makes the adversarial sense explicit
    and fits the narrative context.
