- issue: Rendering κύριος in a prayer context
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The verse depicts communal prayer to God. Following the doctrinal default
    for κύριος, 'Lord' preserves biblical-theological resonance without importing
    a more secular master-servant nuance.
