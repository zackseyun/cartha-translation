translation:
  text: And when Judas learned these things, he ordered the multitude to call upon
    the Lord day and night, that, as at other times, so now also he might come to
    their aid,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μεταλαβὼν
  chosen: when Judas learned
  alternatives:
  - having received
  - having understood
  - having been informed of
  lexicon: LSJ
  rationale: The participle from μεταλαμβάνω here idiomatically means receiving or
    taking in information. In context, Judas is reacting to reported developments,
    so 'learned' gives the sense in natural English without over-literal awkwardness.
- source_word: παρήγγειλεν
  chosen: he ordered
  alternatives:
  - he commanded
  - he instructed
  - he gave orders to
  lexicon: LSJ
  rationale: '''Ordered'' preserves the authoritative force of the verb while remaining
    readable modern English. ''Commanded'' is possible but slightly stiffer in this
    narrative context.'
- source_word: τῷ πλήθει
  chosen: the multitude
  alternatives:
  - the crowd
  - the mass of people
  - the people
  lexicon: LSJ
  rationale: The phrase refers to the assembled body under Judas rather than merely
    a random crowd. 'The multitude' preserves the collective sense and the elevated
    narrative register of the Greek.
- source_word: διʼ ἡμέρας καὶ νυκτός
  chosen: day and night
  alternatives:
  - through day and night
  - by day and by night
  lexicon: LSJ
  rationale: This is a standard idiom for continual action. 'Day and night' is the
    most natural and faithful English equivalent.
- source_word: ἐπικαλεῖσθαι τὸν κύριον
  chosen: to call upon the Lord
  alternatives:
  - to invoke the Lord
  - to appeal to the Lord
  lexicon: LSJ
  rationale: '''Call upon'' is the standard biblical idiom for prayerful appeal and
    fits the religious context better than the more technical ''invoke.'' ''Lord''
    follows the project''s default rendering for κύριος.'
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Per doctrine, κύριος is rendered 'Lord.' In this Jewish-Greek context
    it refers to God in a prayer setting, and 'Lord' best preserves that theological
    and scriptural resonance.
- source_word: εἴ ποτε καὶ ἄλλοτε, καὶ νῦν
  chosen: that, as at other times, so now also
  alternatives:
  - if ever before, now too
  - if at any time also formerly, now also
  - as he had before, now too
  lexicon: LSJ
  rationale: The construction recalls prior divine help and petitions for present
    help in continuity with it. Rendering it comparatively ('as at other times, so
    now also') communicates the sense more clearly than a wooden 'if ever before.'
- source_word: ἐπιβοηθεῖν
  chosen: he might come to their aid
  alternatives:
  - he might help
  - he might give assistance
  - he might come to help
  lexicon: LSJ
  rationale: The infinitive expresses the requested divine intervention. 'Come to
    their aid' captures both the help and the urgent rescue nuance in idiomatic English.
