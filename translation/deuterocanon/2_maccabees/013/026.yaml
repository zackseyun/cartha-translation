theological_decisions:
- issue: No major doctrinally contested term occurs in this verse; the main interpretive
    issue is lexical, especially the military/judicial nuance of several terms.
  chosen_reading: Render the verse as a narrative summary of Lysias's successful defense
    and the king's subsequent withdrawal.
  alternative_readings:
  - Render βῆμα more literally as 'platform'
  - Render ἀναζυγή as 'retreat'
  rationale: The verse is historical/narrative rather than doctrinal. Choices were
    made for contextual clarity while avoiding embellishment beyond the Greek.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve ambiguity where
    genuine'
