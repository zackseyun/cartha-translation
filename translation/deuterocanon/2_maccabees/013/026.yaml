id: 2MA.13.26
reference: 2 Maccabees 13:26
source:
  edition: lxx-swete-1909
  text: προσῆλθεν ἐπὶ τὸ βῆμα Λυσίας, ἀπελογήσατο ἐνδεχομένως, συνέπεισεν καὶ κατεπράϋνεν,
    εὐμενεῖς ἐποίησεν, ἀνέζευξεν εἰς Ἀντιοχίαν. οὕτω τὰ τῆς ἐφόδου τοῦ βασιλέως καὶ
    τῆς ἀναζυγῆς ἐχώρησεν.
  language: Greek
  pages:
  - 724
  confidence: high
  validation: minor_mismatch
translation:
  text: Lysias came forward to the tribunal, made as good a defense as he could, persuaded
    them, calmed them, made them well-disposed, and returned to Antioch. Thus the
    king’s attack and withdrawal proceeded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judgment seat' or 'platform' for 'tribunal' (βῆμα).
    reason: lexical_alternative
  - marker: b
    text: The adverb behind 'as good a defense as he could' is difficult and may also
      mean 'adequately' or 'as circumstances allowed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the king’s assault and retreat' for 'the king’s attack and withdrawal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσῆλθεν
  chosen: came forward
  alternatives:
  - approached
  - came up
  lexicon: LSJ
  rationale: The verb means to come or approach. 'Came forward' fits the public setting
    before the tribunal and reads naturally in English without over-literal stiffness.
- source_word: βῆμα
  chosen: tribunal
  alternatives:
  - judgment seat
  - platform
  lexicon: LSJ
  rationale: βῆμα can denote a step/platform or, in judicial/public contexts, a tribunal/judgment
    seat. Here Lysias appears before an official assembly to present a defense, so
    'tribunal' best captures the functional sense.
- source_word: ἀπελογήσατο
  chosen: made ... a defense
  alternatives:
  - defended himself
  - spoke in his defense
  lexicon: LSJ
  rationale: The middle form commonly means to make a defense. English idiom prefers
    'made a defense' here, especially with the following adverb qualifying the manner.
- source_word: ἐνδεχομένως
  chosen: as good a defense as he could
  alternatives:
  - adequately
  - plausibly
  - as circumstances allowed
  lexicon: LSJ
  rationale: The adverb is somewhat difficult and can mean suitably, reasonably, or
    as possible under the circumstances. Rendering it idiomatically as 'as good a
    defense as he could' conveys constrained adequacy without overstating precision;
    the source wording is slightly compressed.
- source_word: συνέπεισεν
  chosen: persuaded them
  alternatives:
  - won them over
  - convinced them
  lexicon: LSJ
  rationale: The compound verb intensifies the idea of persuasion. 'Persuaded them'
    is straightforward and preserves the core sense.
- source_word: κατεπράϋνεν
  chosen: calmed them
  alternatives:
  - appeased them
  - soothed them
  lexicon: LSJ
  rationale: The verb means to calm down or appease. 'Calmed them' is clear modern
    English and avoids implying a merely political payoff.
- source_word: εὐμενεῖς ἐποίησεν
  chosen: made them well-disposed
  alternatives:
  - made them favorable
  - won their goodwill
  lexicon: LSJ
  rationale: Literally 'made [them] favorable/well-disposed.' The chosen rendering
    preserves the causative force and the attitudinal result.
- source_word: ἀνέζευξεν
  chosen: marched back
  alternatives:
  - withdrew
  - departed
  - broke camp and returned
  lexicon: LSJ
  rationale: The verb can refer to breaking up camp or marching back/up. Given the
    military context, 'marched back' preserves the campaign setting better than the
    more generic 'departed.'
- source_word: ἐφόδου
  chosen: attack
  alternatives:
  - assault
  - advance
  - expedition
  lexicon: LSJ
  rationale: The noun can denote an attack or hostile advance. In this summary of
    the king's campaign movement, 'attack' is the most direct and natural rendering.
- source_word: ἀναζυγῆς
  chosen: withdrawal
  alternatives:
  - retreat
  - breaking camp
  - march back
  lexicon: LSJ
  rationale: This noun refers to a moving back/up, especially a military withdrawal
    or breaking camp. 'Withdrawal' pairs well with 'attack' and avoids over-interpreting
    it as a rout.
- source_word: ἐχώρησεν
  chosen: proceeded
  alternatives:
  - turned out
  - came to pass
  - advanced
  lexicon: LSJ
  rationale: The verb here summarizes how matters went or progressed. 'Proceeded'
    captures the narrative wrap-up idiom in concise English.
