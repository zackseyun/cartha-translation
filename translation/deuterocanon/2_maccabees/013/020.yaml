translation:
  text: But Judas kept sending in what was needed to those inside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was sending in what was necessary.' The Greek imperfect may indicate
      continued or repeated action.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς δὲ ἔνδον
  chosen: to those inside
  alternatives:
  - to the men inside
  - to those within
  lexicon: LSJ
  rationale: ἔνδον functions adverbially/substantivally for people located within
    the besieged place. 'Those inside' is natural English and preserves the spatial
    sense without adding 'men,' which the Greek does not state.
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  lexicon: LSJ
  rationale: As a personal name in 2 Maccabees, Ἰούδας is regularly transliterated
    'Judas.' This follows the project principle of transliterating names rather than
    translating them.
- source_word: τὰ δέοντα
  chosen: what was needed
  alternatives:
  - the necessary things
  - the provisions needed
  lexicon: LSJ
  rationale: The neuter plural participial expression denotes the things that were
    necessary. 'What was needed' is idiomatic English and broad enough to avoid over-specifying
    supplies or provisions, which the Greek leaves implicit.
- source_word: εἰσεπέμπεν
  chosen: kept sending in
  alternatives:
  - sent in
  - was sending in
  lexicon: LSJ
  rationale: The imperfect indicates ongoing or repeated action in past time. 'Kept
    sending in' captures that iterative/imperfective force better than a simple past
    'sent in.'
