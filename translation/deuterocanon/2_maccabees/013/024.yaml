translation:
  text: And he received Maccabaeus favorably, and left Hegemonides as commander from
    Ptolemais as far as the Gerrenians,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''from Ptolemais as far as the Gerrenians.'' The final place-name/people-name
      is textually and geographically uncertain in this witness; the translation preserves
      the Greek form rather than forcing a more specific identification.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐπεδέξατο
  chosen: received ... favorably
  alternatives:
  - received
  - welcomed
  - accepted
  lexicon: LSJ
  rationale: The middle form can imply a favorable or hospitable reception, not mere
    bare acceptance. 'Received ... favorably' preserves that nuance without overparaphrasing.
- source_word: κατέλειπεν
  chosen: left
  alternatives:
  - appointed
  - set in place
  lexicon: LSJ
  rationale: The basic sense is 'left behind.' In context it implies appointment to
    a post, but 'left' stays closer to the Greek while allowing the office to be expressed
    by the predicate noun.
- source_word: στρατηγόν
  chosen: commander
  alternatives:
  - general
  - governor
  lexicon: LSJ
  rationale: The term commonly denotes a military commander or general. 'Commander'
    is clear modern English and avoids implying a precise rank beyond the Greek.
- source_word: ἀπὸ Πτολεμαΐδος ἕως τῶν Γεννήρων
  chosen: from Ptolemais as far as the Gerrenians
  alternatives:
  - from Ptolemais to the district of the Gennereans
  - from Ptolemais as far as Genner
  lexicon: LSJ
  rationale: The phrase marks territorial extent. The toponym/ethnic form τῶν Γεννήρων
    is difficult and the source witness is flagged with major mismatch; a conservative
    transliteration-based rendering best preserves the Greek without false precision.
- source_word: Ἡγεμονίδην
  chosen: Hegemonides
  lexicon: LSJ
  rationale: Proper names are transliterated by standard convention per project philosophy.
- source_word: Μακκαβαῖον
  chosen: Maccabaeus
  alternatives:
  - the Maccabee
  lexicon: LSJ
  rationale: As a personal designation, transliteration is preferred. 'Maccabaeus'
    reflects the Greek accusative proper name in standard English form.
