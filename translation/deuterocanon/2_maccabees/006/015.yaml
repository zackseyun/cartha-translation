theological_decisions:
- issue: Divine subject implied from context rather than stated explicitly in this
    clause
  chosen_reading: he may not afterward take vengeance on us
  alternative_readings:
  - the Lord may not afterward take vengeance on us
  rationale: The Greek clause lacks an explicit subject, but the preceding verse supplies
    God/the Lord as the actor. English requires a subject; 'he' preserves the Greek
    economy while remaining clear in context.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import more than the text states.
