id: 2MA.6.15
reference: 2 Maccabees 6:15
source:
  edition: lxx-swete-1909
  text: ἵνα μὴ πρὸς τέλος ἀφικομένων ἡμῶν τῶν ἁμαρτιῶν ὕστερον ἡμᾶς ἐκδικά.
  language: Greek
  pages:
  - 701
  confidence: high
  validation: agree
translation:
  text: so that, when our sins have reached their full measure, he may not afterward
    take vengeance on us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'when our sins have come to the end.' The phrase likely
      means that the sins have reached their full limit or full measure.
    reason: lexical_alternative
  - marker: b
    text: The subject 'he' is implicit in Greek and is supplied from the immediate
      context, referring to the Lord.
    reason: cross_reference
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - lest
  lexicon: BDAG
  rationale: Introduces the purpose clause explaining why the Lord does not punish
    immediately in the preceding context. 'So that' is natural English and preserves
    the telic force.
- source_word: μὴ
  chosen: not
  alternatives:
  - lest
  lexicon: BDAG
  rationale: Negates the verb within the purpose clause. In English, 'not' works smoothly
    with 'so that' and avoids an overly archaic 'lest'.
- source_word: πρὸς τέλος
  chosen: to their full measure
  alternatives:
  - to the end
  - completely
  - to the limit
  lexicon: LSJ
  rationale: The idiom with ἀφικομένων conveys reaching an endpoint or limit. In context
    of sins, 'to their full measure' expresses the sense of sins coming to completion
    without woodenly preserving 'end,' which could sound temporally rather than quantitatively
    final.
- source_word: ἀφικομένων
  chosen: have reached
  alternatives:
  - having come
  - arrive at
  lexicon: BDAG
  rationale: Genitive absolute with ἡμῶν τῶν ἁμαρτιῶν; the sense is attainment of
    a limit. 'Have reached' is idiomatic and fits the completed sense in English.
- source_word: ἡμῶν τῶν ἁμαρτιῶν
  chosen: our sins
  alternatives:
  - the sins of us
  lexicon: BDAG
  rationale: Straightforward possessive construction. The genitive absolute is best
    rendered naturally in English as 'our sins.'
- source_word: ὕστερον
  chosen: afterward
  alternatives:
  - later
  - subsequently
  lexicon: BDAG
  rationale: Marks delayed action in contrast to immediate punishment. 'Afterward'
    preserves the temporal contrast clearly.
- source_word: ἐκδικά
  chosen: take vengeance on
  alternatives:
  - punish
  - exact justice from
  - avenge against
  lexicon: LSJ
  rationale: The verb carries the sense of exacting justice or avenging. 'Take vengeance
    on' best preserves the judicial-retributive force without flattening it to the
    broader 'punish.'
