id: 2MA.6.20
reference: 2 Maccabees 6:20
source:
  edition: lxx-swete-1909
  text: προπτύσας δέ, καθʼ ὃν ἔδει τρόπον προσέρχεσθαι τοὺς ὑπομένοντας ἀμύνασθαι
    ὧν οὐ θέμις γεύσασθαι διὰ τὴν πρὸς ζῆν φιλοστοργίαν.
  language: Greek
  pages:
  - 701
  confidence: high
  validation: agree
translation:
  text: But after spitting it out, he came forward in the manner required for those
    who choose to resist things that it is not lawful to taste, even for the sake
    of one’s attachment to life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who endure in resisting things it is not lawful to taste.' The
      Greek compresses endurance and resistance into a difficult phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: προπτύσας
  chosen: after spitting it out
  alternatives:
  - spitting it out
  - having spat it out
  lexicon: LSJ
  rationale: Aorist participle from προπτύω, indicating expelling from the mouth what
    had been taken in. The context in 2 Maccabees 6 concerns Eleazar refusing unlawful
    meat, so 'spitting it out' makes the action explicit in natural English.
- source_word: καθʼ ὃν ἔδει τρόπον
  chosen: in the manner required
  alternatives:
  - as it was necessary
  - in the way he ought
  lexicon: LSJ
  rationale: The phrase expresses what was fitting or necessary under the circumstances.
    'In the manner required' preserves both the ethical necessity and the idiomatic
    force.
- source_word: προσέρχεσθαι
  chosen: he came forward
  alternatives:
  - to approach
  - to present himself
  lexicon: LSJ
  rationale: Although formally infinitival, in context it describes his movement toward
    the ordeal or place of punishment. 'Came forward' is idiomatic and fits the narrative
    action better than a wooden infinitive.
- source_word: τοὺς ὑπομένοντας
  chosen: those who choose to resist
  alternatives:
  - those who endure
  - those who stand firm
  - those who submit themselves
  lexicon: LSJ
  rationale: ὑπομένω often means endure or remain steadfast under trial. Here the
    following infinitive ἀμύνασθαι clarifies that the endurance is active resistance
    against unlawful compliance. 'Choose to resist' brings out the volitional steadfastness
    without over-paraphrasing.
- source_word: ἀμύνασθαι
  chosen: to resist
  alternatives:
  - to defend themselves against
  - to ward off
  - to refuse
  lexicon: LSJ
  rationale: The verb can mean defend oneself or ward off. In this context the object
    is 'things it is not lawful to taste,' so the sense is resisting or fending off
    participation in the forbidden act.
- source_word: ὧν οὐ θέμις γεύσασθαι
  chosen: things that it is not lawful to taste
  alternatives:
  - things one must not eat
  - things forbidden to taste
  lexicon: LSJ
  rationale: θέμις denotes what is permitted by divine/customary law. 'Not lawful
    to taste' preserves the moral-religious force and the specific verb γεύσασθαι
    rather than flattening it to 'eat.'
- source_word: διὰ τὴν πρὸς ζῆν φιλοστοργίαν
  chosen: even for the sake of one’s attachment to life
  alternatives:
  - because of love of life
  - for the sake of preserving life
  - out of affection for living
  lexicon: LSJ
  rationale: φιλοστοργία is strong affection or natural attachment; with πρὸς ζῆν
    it refers to attachment to continued life. The phrase means that even the natural
    desire to stay alive does not justify tasting what is forbidden. 'Attachment to
    life' preserves the emotional nuance better than the flatter 'love of life.'
