id: 2MA.6.8
reference: 2 Maccabees 6:8
source:
  edition: lxx-swete-1909
  text: ψήφισμα δὲ ἐξῆλθεν εἰς τὰς ἀστυγείτονας Ἑλληνίδας πόλεις, Πτολεμαίου ὑποθεμένου,
    τὴν αὐτὴν ἀγωγὴν κατὰ τῶν Ἰουδαίων ἄγειν, καὶ σπλαγχνί- ζειν,
  language: Greek
  pages:
  - 700
  confidence: high
  validation: agree
translation:
  text: And a decree went out to the neighboring Greek cities, at the suggestion of
    Ptolemy, to follow the same policy against the Jews, and to kill them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has a more graphic verb, literally suggesting tearing out the entrails;
      here it denotes brutal killing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ψήφισμα
  chosen: decree
  alternatives:
  - resolution
  - edict
  lexicon: LSJ
  rationale: The term denotes an official decision or enactment. 'Decree' best conveys
    a formal public order in this context.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - was issued
  - came forth
  lexicon: LSJ
  rationale: A common idiom for an order being promulgated. 'Went out' preserves the
    Greek image while remaining natural English.
- source_word: ἀστυγείτονας
  chosen: neighboring
  alternatives:
  - adjacent to the city
  - nearby
  lexicon: LSJ
  rationale: The compound adjective indicates cities in the surrounding region; 'neighboring'
    is the clearest concise rendering.
- source_word: Ἑλληνίδας πόλεις
  chosen: Greek cities
  alternatives:
  - Hellenic cities
  - Greek-speaking cities
  lexicon: LSJ
  rationale: Refers to Greek cities culturally/politically identified as Greek. 'Greek
    cities' is standard and readable.
- source_word: Πτολεμαίου ὑποθεμένου
  chosen: at the suggestion of Ptolemy
  alternatives:
  - on Ptolemy's proposal
  - with Ptolemy having proposed it
  lexicon: LSJ
  rationale: The genitive absolute indicates Ptolemy as the one putting the measure
    forward. 'At the suggestion of Ptolemy' is idiomatic and captures the causal nuance.
- source_word: τὴν αὐτὴν ἀγωγήν
  chosen: the same policy
  alternatives:
  - the same course of action
  - the same treatment
  lexicon: LSJ
  rationale: ἀγωγή here refers to a prescribed course or manner of treatment. 'Policy'
    fits the administrative context better than the more literal but less idiomatic
    'conduct'.
- source_word: ἄγειν
  chosen: to follow
  alternatives:
  - to carry out
  - to apply
  lexicon: LSJ
  rationale: With ἀγωγή, the infinitive expresses implementing or conducting that
    policy. 'To follow' is natural English for conforming to an imposed policy.
- source_word: σπλαγχνίζειν
  chosen: to slaughter them
  alternatives:
  - to butcher them
  - to disembowel them
  lexicon: LSJ
  rationale: The verb is graphically violent, related to entrails, and in context
    denotes brutal killing. 'To slaughter them' communicates the severity without
    becoming needlessly grotesque; the more literal imagery is preserved in a footnote.
