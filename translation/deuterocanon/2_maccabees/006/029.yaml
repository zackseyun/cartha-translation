id: 2MA.6.29
reference: 2 Maccabees 6:29
source:
  edition: lxx-swete-1909
  text: τῶνδε ἀγόντων πρὸς αὐτὸν τὴν μικρῷ πρότερον εὐμένειαν δυσμένειαν διὰ τὴν τῶν
    προειρημένων λόγων, ὡς αὐτοὶ ὑπελάμβανον, ἀπόνοιαν.
  language: Greek
  pages:
  - 702
  confidence: high
  validation: minor_mismatch
translation:
  text: Those who were leading him, because of the words just spoken, changed the
    goodwill they had shown him a little earlier into hostility, since they regarded
    those words as madness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'folly,' 'senselessness,' or 'desperation' for 'madness.' The Greek term
      expresses what his escorts thought of his words, not necessarily the narrator's
      own judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶνδε ἀγόντων πρὸς αὐτόν
  chosen: those who were leading him
  alternatives:
  - those who were taking him along
  - his escorts
  lexicon: LSJ
  rationale: The genitive absolute describes the action/state of the men accompanying
    Eleazar. 'Leading him' is natural English and preserves the sense of escorting
    him onward.
- source_word: τὴν μικρῷ πρότερον εὐμένειαν
  chosen: the goodwill they had shown him a little earlier
  alternatives:
  - their earlier kindness
  - the favor from a short time before
  lexicon: LSJ
  rationale: εὐμένεια denotes favor, goodwill, or kindness. The phrase μικρῷ πρότερον
    indicates a short time before. Expanding slightly with 'they had shown him' makes
    the relation clear in English.
- source_word: δυσμένειαν
  chosen: hostility
  alternatives:
  - ill will
  - enmity
  lexicon: LSJ
  rationale: As the antonymic counterpart to εὐμένεια, δυσμένεια is best rendered
    'hostility' here, expressing the reversal from favor to antagonism.
- source_word: διὰ τὴν τῶν προειρημένων λόγων
  chosen: because of the words just spoken
  alternatives:
  - because of the previously mentioned words
  - on account of what had been said before
  lexicon: LSJ
  rationale: προειρημένων refers to words already spoken in the immediate context.
    'Just spoken' is idiomatic and contextually precise.
- source_word: ὡς αὐτοὶ ὑπελάμβανον
  chosen: since they regarded
  alternatives:
  - as they supposed
  - in their judgment
  lexicon: LSJ
  rationale: The parenthetical phrase marks this as their own assessment, not the
    narrator's endorsement. 'Since they regarded' preserves that subjective nuance.
- source_word: ἀπόνοιαν
  chosen: madness
  alternatives:
  - folly
  - senselessness
  - desperation
  lexicon: LSJ
  rationale: ἀπόνοια can denote irrationality or derangement. In this context the
    escorts interpret Eleazar's words as insane or reckless. 'Madness' best captures
    the force without overinterpreting it as mere moral 'folly' or emotional 'desperation'.
