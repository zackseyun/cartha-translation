theological_decisions:
- issue: Narratorial distance from the escorts' judgment
  chosen_reading: The final assessment is rendered as the escorts' opinion ('since
    they regarded those words as madness'), not as the narrator's own verdict.
  alternative_readings:
  - '...into hostility because of the madness of the words previously spoken'
  rationale: The clause ὡς αὐτοὶ ὑπελάμβανον explicitly attributes the judgment to
    'them.' The translation preserves this perspective rather than stating flatly
    that Eleazar's words were madness.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (preserve ambiguity/tension
    rather than resolve it)
