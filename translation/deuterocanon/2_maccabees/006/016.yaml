theological_decisions:
- issue: How to render παιδεύων in relation to divine action
  chosen_reading: while disciplining
  alternative_readings:
  - while chastening
  - while training
  rationale: The verse presents suffering as corrective discipline rather than divine
    abandonment. 'Disciplining' preserves this theological tension without softening
    the reality of suffering or overstating punitive judgment.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Whether to make explicit the subject's identity in τὸν ἔλεον
  chosen_reading: his mercy
  alternative_readings:
  - the mercy
  rationale: The Greek article alone can be rendered literally as 'the mercy,' but
    the context clearly refers to God's mercy. Making the possessive explicit in English
    improves clarity without adding a new theological claim.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
