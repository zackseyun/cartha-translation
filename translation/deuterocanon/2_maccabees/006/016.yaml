id: 2MA.6.16
reference: 2 Maccabees 6:16
source:
  edition: lxx-swete-1909
  text: διόπερ οὐδέποτε μὲν τὸν ἔλεον ἀφʼ ἡμῶν ἀφίστησιν· παιδεύων δὲ μετὰ συμφορᾶς
    οὐκ ἐγκαταλείπει τὸν ἑαυτοῦ λαόν.
  language: Greek
  pages:
  - 701
  confidence: high
  validation: agree
translation:
  text: Therefore he never withdraws his mercy from us; but while disciplining with
    calamity, he does not abandon his own people.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διόπερ
  chosen: Therefore
  alternatives:
  - For this reason
  - Wherefore
  lexicon: LSJ
  rationale: Inferential conjunction drawing a conclusion from the preceding context;
    'Therefore' is natural modern English and preserves the logical force.
- source_word: οὐδέποτε
  chosen: never
  alternatives:
  - not ever
  - at no time
  lexicon: LSJ
  rationale: Straightforward adverb of negated time; 'never' is the idiomatic English
    equivalent.
- source_word: τὸν ἔλεον
  chosen: his mercy
  alternatives:
  - the mercy
  - compassion
  lexicon: LSJ
  rationale: 'ἔλεος commonly denotes mercy/compassion. Adding ''his'' in English clarifies
    the implied possessor from the verb and context: it is God''s mercy that is not
    withdrawn.'
- source_word: ἀφʼ ἡμῶν ἀφίστησιν
  chosen: withdraws ... from us
  alternatives:
  - removes ... from us
  - turns ... away from us
  lexicon: LSJ
  rationale: ἀφίστημι with ἀπό conveys causing something to depart or withdrawing
    it. 'Withdraws his mercy from us' is both faithful and idiomatic.
- source_word: παιδεύων
  chosen: while disciplining
  alternatives:
  - while educating
  - while chastening
  - as he trains
  lexicon: LSJ
  rationale: παιδεύω can mean educate, train, or discipline; in this context of divine
    corrective suffering, 'disciplining' best captures the sense without overreading
    punitive wrath.
- source_word: μετὰ συμφορᾶς
  chosen: with calamity
  alternatives:
  - through misfortune
  - with affliction
  - by means of disaster
  lexicon: LSJ
  rationale: συμφορά denotes misfortune, calamity, or disaster. 'With calamity' preserves
    the instrumental/accompanying force of μετά and the severity of the term.
- source_word: οὐκ ἐγκαταλείπει
  chosen: he does not abandon
  alternatives:
  - he does not forsake
  - he does not leave behind
  lexicon: LSJ
  rationale: '''Abandon'' is a clear modern equivalent for ἐγκαταλείπω and fits the
    covenantal sense of not deserting his people.'
- source_word: τὸν ἑαυτοῦ λαόν
  chosen: his own people
  alternatives:
  - his people
  - the people belonging to him
  lexicon: LSJ
  rationale: The reflexive ἑαυτοῦ adds possessive emphasis. 'His own people' preserves
    that emphasis better than the flatter 'his people.'
