id: 2MA.6.7
reference: 2 Maccabees 6:7
source:
  edition: lxx-swete-1909
  text: ἤγον δὲ μετὰ πικρᾶς ἀνάγκης εἰς τὴν κατὰ μῆνα τοῦ βασιλέως γενέθλιον ἡμέραν
    ἐπὶ σπλαγχνισμόν· γενομένης δὲ Διονυσίων ἑορτῆς ἠναγκάζοντο κισσοὺς ἔχοντες πομπεύειν
    τῷ Διονύσῳ.
  language: Greek
  pages:
  - 700
  confidence: high
  validation: agree
translation:
  text: And they were being led, under bitter compulsion, to the king’s monthly birthday
    observance for the sacrificial meal; and when a festival of Dionysus came, they
    were being forced, wearing ivy wreaths, to join the procession in honor of Dionysus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for the eating of sacrificial entrails/portions.' The
      Greek term refers to participation in the sacrificial rite by eating the offered
      portions.
    reason: lexical_alternative
  - marker: b
    text: Ivy was associated with Dionysian worship; the phrase likely refers to wearing
      ivy garlands or wreaths in the procession.
    reason: cultural_note
lexical_decisions:
- source_word: ἤγον
  chosen: they were being led
  alternatives:
  - they were brought
  - they were taken
  lexicon: LSJ
  rationale: Imperfect passive-like sense in context conveys repeated or customary
    coercive action. 'Led' preserves the sense of being taken along under control
    without over-specifying the agents.
- source_word: μετὰ πικρᾶς ἀνάγκης
  chosen: under bitter compulsion
  alternatives:
  - with bitter necessity
  - under harsh constraint
  lexicon: LSJ
  rationale: The phrase expresses coercion experienced as grievous. 'Compulsion' is
    clearer modern English than 'necessity' here, and 'bitter' preserves the emotional
    severity of πικρᾶς.
- source_word: εἰς τὴν κατὰ μῆνα ... ἡμέραν
  chosen: to the king’s monthly birthday observance
  alternatives:
  - to the monthly day of the king’s birthday
  - to the king’s monthly birthday celebration
  lexicon: LSJ
  rationale: κατὰ μῆνα indicates a monthly recurrence; γενέθλιον ἡμέραν is literally
    a birthday day/observance. 'Observance' fits the cultic-political setting better
    than a casual 'celebration.'
- source_word: ἐπὶ σπλαγχνισμόν
  chosen: for the sacrificial meal
  alternatives:
  - for the eating of entrails
  - for participation in the sacrificial feast
  lexicon: LSJ
  rationale: In sacrificial context, the term refers to eating the sacrificial viscera/portions.
    A wooden 'entrails' would sound obscure or grotesquely specific in English; 'sacrificial
    meal' communicates the ritual act, while the lexical background is preserved here.
- source_word: Διονυσίων ἑορτῆς
  chosen: a festival of Dionysus
  alternatives:
  - the festival of Dionysus
  - the Dionysia festival
  lexicon: LSJ
  rationale: The genitive plural adjective with ἑορτή denotes a Dionysian festival.
    'A festival of Dionysus' is transparent English and avoids importing a more technical
    festival title than the Greek requires.
- source_word: κισσοὺς ἔχοντες
  chosen: wearing ivy wreaths
  alternatives:
  - carrying ivy
  - having ivy on them
  lexicon: LSJ
  rationale: In Dionysian procession context, ivy is worn as festive garland/wreath
    rather than merely carried. 'Wearing ivy wreaths' makes the implied cultural practice
    explicit enough for English readers.
- source_word: πομπεύειν
  chosen: to join the procession
  alternatives:
  - to march in procession
  - to parade
  lexicon: LSJ
  rationale: The verb denotes taking part in a ritual procession. 'Join the procession'
    is natural English and preserves the ceremonial sense better than the more colloquial
    'parade'.
- source_word: τῷ Διονύσῳ
  chosen: in honor of Dionysus
  alternatives:
  - for Dionysus
  - to Dionysus
  lexicon: LSJ
  rationale: The dative marks relation/dedication in cultic context. 'In honor of
    Dionysus' communicates the religious orientation clearly in idiomatic English.
