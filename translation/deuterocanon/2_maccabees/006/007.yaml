theological_decisions:
- issue: How explicitly to render the cultic coercion in ἐπὶ σπλαγχνισμόν
  chosen_reading: Rendered as 'for the sacrificial meal' in the main text
  alternative_readings:
  - for the eating of sacrificial entrails
  - for participation in the sacrificial feast
  rationale: The verse describes forced participation in pagan rites. The main text
    should be readable while still showing the religious offense involved. 'Sacrificial
    meal' preserves the cultic force without reducing the phrase to an opaque literalism.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without unnecessary obscurity.'
