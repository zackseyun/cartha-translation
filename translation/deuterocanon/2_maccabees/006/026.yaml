theological_decisions:
- issue: Rendering παντοκράτωρ
  chosen_reading: the Almighty
  alternative_readings:
  - the All-powerful One
  rationale: This title is not a contested doctrinal term in the provided table, but
    it carries theological weight. 'The Almighty' is the most idiomatic and recognizable
    equivalent and preserves the force of divine sovereignty without adding 'God,'
    which the Greek does not explicitly state here.
  doctrine_reference: 'Translation philosophy: readable modern English; original-language
    primacy over translation tradition where needed.'
- issue: Implication of postmortem accountability in οὔτε ζῶν οὔτε ἀποθανών
  chosen_reading: neither alive nor dead
  alternative_readings:
  - whether living or dead
  rationale: The text states that death does not place the speaker beyond God's reach.
    The translation preserves that tension directly without expanding it into a fuller
    doctrinal statement about the afterlife beyond what the verse itself says.
  doctrine_reference: Preserve theological tension rather than resolve it.
