id: 2MA.6.26
reference: 2 Maccabees 6:26
source:
  edition: lxx-swete-1909
  text: εἰ γὰρ καὶ ἐπὶ τοῦ παρόντος ἐξελοῦμαι τὴν ἐξ ἀνθρώπων τιμωρίαν, ἀλλὰ τὰς τοῦ
    παντοκράτορος χεῖρας οὔτε ζῶν οὔτε ἀποθανὼν ἐκφεύξομαι.
  language: Greek
  pages:
  - 702
  confidence: high
  validation: agree
translation:
  text: For even if for the present I escape the punishment from men, yet I will escape
    neither alive nor dead from the hands of the Almighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'the punishment inflicted by men.'
    reason: lexical_alternative
  - marker: b
    text: That is, he cannot escape divine judgment either in life or by means of
      death.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ γὰρ καὶ
  chosen: For even if
  alternatives:
  - For if indeed even
  - Even if
  lexicon: LSJ
  rationale: Keeps the explanatory force of γάρ and the concessive sense of καί with
    εἰ in natural English.
- source_word: ἐπὶ τοῦ παρόντος
  chosen: for the present
  alternatives:
  - for now
  - at the present time
  lexicon: LSJ
  rationale: A natural idiom that preserves the temporal limitation of the phrase
    without sounding overly colloquial.
- source_word: ἐξελοῦμαι
  chosen: I escape
  alternatives:
  - I deliver myself
  - I am rescued
  lexicon: LSJ
  rationale: In context the middle conveys coming out from or escaping a penalty.
    'I escape' is the clearest idiomatic rendering in English.
- source_word: τὴν ἐξ ἀνθρώπων τιμωρίαν
  chosen: the punishment from men
  alternatives:
  - the punishment inflicted by men
  - human punishment
  lexicon: LSJ
  rationale: The phrase contrasts human punishment with divine judgment. 'From men'
    stays close to the Greek while remaining understandable; the contrast is preserved
    by the following clause.
- source_word: ἀλλὰ
  chosen: yet
  alternatives:
  - but
  lexicon: LSJ
  rationale: Marks the strong adversative contrast smoothly in English.
- source_word: τὰς τοῦ παντοκράτορος χεῖρας
  chosen: the hands of the Almighty
  alternatives:
  - the hands of the All-powerful One
  - the hands of the Almighty God
  lexicon: LSJ
  rationale: παντοκράτωρ is conventionally and accurately rendered 'the Almighty.'
    'Hands' is retained literally as a vivid biblical image of inescapable divine
    power.
- source_word: οὔτε ζῶν οὔτε ἀποθανών
  chosen: neither alive nor dead
  alternatives:
  - whether living or dead
  - neither while living nor after dying
  lexicon: LSJ
  rationale: This preserves the stark polarity of the Greek and the rhetorical force
    that death does not remove one from divine judgment.
- source_word: ἐκφεύξομαι
  chosen: I will escape neither alive nor dead from
  alternatives:
  - I will by no means flee from
  - I will not escape from
  lexicon: LSJ
  rationale: Future middle/passive sense is best represented by 'I will escape...from'
    in English. The negation is carried by 'neither...nor' from the Greek structure.
