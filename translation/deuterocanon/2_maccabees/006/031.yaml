id: 2MA.6.31
reference: 2 Maccabees 6:31
source:
  edition: lxx-swete-1909
  text: καὶ οὗτος οὖν τοῦτον τὸν τρόπον μετήλλαξεν, οὐ μόνον τοῖς νέοις, ἀλλὰ καὶ
    τοῖς πλείστοις τοῦ ἔθνους τὸν ἑαυτοῦ θάνατον ὑπόδειγμα γενναιότητος καὶ μνημόσυνον
    ἀρετῆς καταλιπών. VII
  language: Greek
  pages:
  - 702
  confidence: high
  validation: agree
translation:
  text: So then, in this way he passed away, leaving behind his own death as an example
    of nobility and a memorial of virtue, not only for the young but also for most
    of the nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'died.' The Greek uses a more elevated expression than the ordinary verb
      for dying.
    reason: lexical_alternative
  - marker: b
    text: '''Nobility'' may also be rendered ''courage'' or ''bravery.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'a memorial of moral excellence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετήλλαξεν
  chosen: passed away
  alternatives:
  - died
  - departed this life
  - came to his end
  lexicon: LSJ
  rationale: The verb here is a euphemistic expression for death ('to exchange' life),
    and in context refers to Eleazar's death. 'Passed away' preserves the dignified
    tone of the narrative better than the blunter 'died,' while remaining clear in
    modern English.
- source_word: τὸν τρόπον
  chosen: in this way
  alternatives:
  - thus
  - in this manner
  lexicon: LSJ
  rationale: A straightforward adverbial phrase indicating manner. 'In this way' is
    natural modern English and closely reflects the Greek.
- source_word: ὑπόδειγμα
  chosen: example
  alternatives:
  - model
  - pattern
  lexicon: LSJ
  rationale: The noun denotes something shown as a pattern for imitation. 'Example'
    is the most idiomatic and accessible rendering here.
- source_word: γενναιότητος
  chosen: nobility
  alternatives:
  - courage
  - bravery
  - noble character
  lexicon: LSJ
  rationale: The term can denote courage or nobility of spirit. Because the verse
    pairs it with 'virtue' and presents Eleazar's death as morally exemplary, 'nobility'
    better captures the ethical grandeur of the term than a merely martial 'bravery,'
    though courage is included in the sense.
- source_word: μνημόσυνον
  chosen: memorial
  alternatives:
  - remembrance
  - lasting memory
  lexicon: LSJ
  rationale: The word denotes something that preserves memory. 'Memorial' fits the
    solemn commemorative sense and works well with 'of virtue.'
- source_word: ἀρετῆς
  chosen: virtue
  alternatives:
  - excellence
  - moral excellence
  lexicon: LSJ
  rationale: In this Hellenistic Jewish context, ἀρετή carries the sense of moral
    excellence. 'Virtue' is concise and idiomatic, while 'excellence' would sound
    broader and less ethically focused.
- source_word: τοῖς νέοις
  chosen: the young
  alternatives:
  - young people
  - the youth
  lexicon: LSJ
  rationale: The dative marks beneficiaries or audience. 'The young' is concise, natural
    English and preserves the representative sense without over-specifying gender.
- source_word: τοῖς πλείστοις τοῦ ἔθνους
  chosen: most of the nation
  alternatives:
  - the greater part of the nation
  - most of the people
  lexicon: LSJ
  rationale: ἔθνος here refers to the Jewish people/nation. 'Most of the nation' preserves
    the collective national sense better than the more generic 'people.'
- source_word: καταλιπών
  chosen: leaving behind
  alternatives:
  - leaving
  - bequeathing
  lexicon: LSJ
  rationale: The participle expresses what his death accomplished for those who followed.
    'Leaving behind' captures both the literal and legacy-oriented sense.
