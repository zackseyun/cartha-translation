theological_decisions:
- issue: Moral terminology in a deuterocanonical martyrdom context
  chosen_reading: Render ἀρετή as 'virtue' and γενναιότης as 'nobility' without importing
    later doctrinal categories.
  alternative_readings:
  - Render γενναιότης as 'courage' and ἀρετή as 'excellence'
  rationale: The verse commends Eleazar's death as morally exemplary. The translation
    should preserve that ethical force while avoiding anachronistic doctrinal loading.
    The chosen pair reflects the Greek's elevated moral register and the commemorative
    tone of the sentence.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Euphemistic expression for death
  chosen_reading: Use 'passed away' for μετήλλαξεν.
  alternative_readings:
  - Use 'died' for maximal explicitness
  rationale: The Greek uses elevated diction rather than the common verb for dying.
    Preserving that tone is appropriate in this martyrdom narrative, provided the
    English remains clear.
  doctrine_reference: Translation philosophy §§1, 6
