id: 2MA.6.2
reference: 2 Maccabees 6:2
source:
  edition: lxx-swete-1909
  text: μολῦναι δὲ καὶ τὸν ἐν Ἰεροσολύμοις νεὼ καὶ προσονομάσαι Διὸς Ὀλυμπίου, καὶ
    τὸν ἐν Γαριζείν, καθὼς ἐτύγχανον οἱ τὸν τόπον οἰκοῦντες, Διὸς ξενίου.
  language: Greek
  pages:
  - 700
  confidence: high
  validation: agree
translation:
  text: and also to defile the temple in Jerusalem and to name it for Olympian Zeus,
    and the one on Gerizim, as those who inhabited the place happened to do, for Zeus
    the protector of strangers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to rename it as Olympian Zeus.' The Greek verb can mean to assign an
      additional or new designation.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Zeus Xenios,' that is, Zeus as patron of hospitality and protector
      of strangers/guests.
    reason: lexical_alternative
lexical_decisions:
- source_word: μολῦναι
  chosen: to defile
  alternatives:
  - to profane
  - to pollute
  lexicon: LSJ
  rationale: The infinitive denotes making something ritually or morally unclean.
    'Defile' preserves the cultic force better than the more general 'pollute,' while
    remaining accessible.
- source_word: νεὼ
  chosen: temple
  alternatives:
  - sanctuary
  - shrine
  lexicon: LSJ
  rationale: ναός/νεώς refers to the temple structure; 'temple' is the natural English
    rendering here, especially in reference to Jerusalem.
- source_word: προσονομάσαι
  chosen: to name it for
  alternatives:
  - to rename
  - to give the name of
  lexicon: LSJ
  rationale: The verb means to give an additional name or designation. 'Name it for'
    captures the sense of dedicatory renaming without over-specifying the mechanics.
- source_word: Διὸς Ὀλυμπίου
  chosen: Olympian Zeus
  alternatives:
  - Zeus Olympios
  - Zeus of Olympus
  lexicon: LSJ
  rationale: A standard Greek divine title. Translating the epithet yields idiomatic
    English while preserving the pagan identification imposed on the Jerusalem temple.
- source_word: Γαριζείν
  chosen: Gerizim
  alternatives:
  - Mount Gerizim
  lexicon: LSJ
  rationale: The place name is transliterated per project policy for names. 'Gerizim'
    is sufficient in context, though the referent is the sanctuary there.
- source_word: καθὼς ἐτύγχανον οἱ τὸν τόπον οἰκοῦντες
  chosen: as those who inhabited the place happened to do
  alternatives:
  - as the inhabitants of the place were
  - according to the custom/condition of those dwelling in the place
  lexicon: LSJ
  rationale: ἐτύγχανον with a participial idea can indicate the existing circumstance
    or condition. This clause is somewhat compressed; the chosen rendering preserves
    the Greek's sense that the naming corresponded to the local inhabitants' situation/custom
    without over-interpreting.
- source_word: Διὸς ξενίου
  chosen: Zeus the protector of strangers
  alternatives:
  - Zeus Xenios
  - Zeus of hospitality
  lexicon: LSJ
  rationale: ξένιος is an epithet of Zeus associated with hospitality and protection
    of guests/strangers. The translated phrase communicates the meaning better than
    a bare transliteration, while a transliterated alternative is worth preserving
    in a footnote.
