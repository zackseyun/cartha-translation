theological_decisions:
- issue: Rendering pagan divine titles in a Jewish cultic desecration context
  chosen_reading: Translate the epithets as 'Olympian Zeus' and 'Zeus the protector
    of strangers'
  alternative_readings:
  - Transliterate as 'Zeus Olympios' and 'Zeus Xenios'
  rationale: The text reports the forced rededication of Jewish sanctuaries to Greek
    cults. Translating the epithets makes the nature of the desecration clear to modern
    readers while preserving the historical referent.
  doctrine_reference: 'Translation philosophy: translate titles; transliterate names.'
- issue: Force of the clause καθὼς ἐτύγχανον οἱ τὸν τόπον οἰκοῦντες
  chosen_reading: Render it as a circumstantial note tied to the local inhabitants'
    situation/custom
  alternative_readings:
  - 'Render more statively: ''as the inhabitants of the place were'''
  - 'Render more interpretively: ''in keeping with the character/custom of the inhabitants'''
  rationale: The Greek is concise and somewhat idiomatic. The chosen rendering preserves
    the circumstantial nuance without importing a stronger judgment than the text
    states.
  doctrine_reference: Preserve theological tension rather than resolve it.
