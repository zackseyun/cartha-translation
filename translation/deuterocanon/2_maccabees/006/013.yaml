id: 2MA.6.13
reference: 2 Maccabees 6:13
source:
  edition: lxx-swete-1909
  text: καὶ γὰρ τὸ μὴ πολὺν χρόνον ἐᾶσθαι τοὺς δυσσεβοῦντας, ἀλλʼ εὐθέως περιπίπτειν
    τοῖς ἐπιτιμίοις, μεγάλης εὐεργεσίας σημεῖόν ἐστιν.
  language: Greek
  pages:
  - 701
  confidence: high
  validation: agree
translation:
  text: For indeed, not allowing those who act impiously to go on for a long time,
    but immediately bringing punishments upon them, is a sign of great kindness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not allowing the impious to continue for long, but making them at once
      incur penalties.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ μὴ πολὺν χρόνον ἐᾶσθαι
  chosen: not letting ... go on for a long time
  alternatives:
  - not leaving ... alone for long
  - not allowing ... to continue for long
  lexicon: LSJ
  rationale: The articular infinitive with μή expresses the circumstance treated as
    the subject of the sentence. ἐᾶσθαι can mean 'allow, permit, leave alone'; here
    the sense is that God does not permit the impious to continue unchecked for long.
- source_word: τοὺς δυσσεβοῦντας
  chosen: those who act impiously
  alternatives:
  - the ungodly
  - those who are irreverent
  - those who do wickedly
  lexicon: LSJ
  rationale: The participle denotes people behaving in an impious or irreverent way.
    'Those who act impiously' preserves the verbal force better than the more static
    label 'the ungodly.'
- source_word: ἀλλʼ εὐθέως
  chosen: but immediately
  alternatives:
  - rather at once
  - instead, straightway
  lexicon: LSJ
  rationale: Marks the contrast with prolonged delay and emphasizes promptness of
    judgment.
- source_word: περιπίπτειν τοῖς ἐπιτιμίοις
  chosen: having them immediately fall under punishments
  alternatives:
  - having them incur penalties at once
  - having them fall into chastisements immediately
  lexicon: LSJ
  rationale: περιπίπτειν literally means 'fall into/upon'; with τοῖς ἐπιτιμίοις it
    conveys coming under penalties or punitive measures. 'Punishments' is clearer
    in modern English than 'chastisements' while preserving judicial force.
- source_word: μεγάλης εὐεργεσίας
  chosen: great kindness
  alternatives:
  - great beneficence
  - great goodwill
  - great mercy
  lexicon: LSJ
  rationale: εὐεργεσία is 'benefaction, kindness, good deed.' Here the point is that
    prompt discipline is itself a benevolent act. 'Kindness' is accessible and fits
    the argument without importing the more specifically theological term 'mercy.'
- source_word: σημεῖόν ἐστιν
  chosen: is a sign
  alternatives:
  - is evidence
  - is an indication
  lexicon: LSJ
  rationale: A straightforward rendering preserving the metaphorical evidentiary sense.
