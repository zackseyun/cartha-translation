id: 2MA.6.17
reference: 2 Maccabees 6:17
source:
  edition: lxx-swete-1909
  text: πλὴν ἕως ὑπομνήσεως ταῦθʼ ἡμῖν εἰρήσθω· διʼ ὀλίγων δὲ ἐλευστέον ἐπὶ τὴν διήγησιν.
  language: Greek
  pages:
  - 701
  confidence: high
  validation: minor_mismatch
translation:
  text: But let this be said by way of reminder for us; now we must proceed with the
    narrative in a few words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these things ... to us'; the Greek can be rendered more literally, but
      the translation treats the preceding remarks as a single summary statement for
      smoother English.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  chosen: But
  alternatives:
  - Nevertheless
  - Only
  lexicon: LSJ
  rationale: Introduces a transition or limitation from the preceding discussion.
    'But' gives natural English discourse flow without overstating contrast.
- source_word: ἕως ὑπομνήσεως
  chosen: by way of reminder
  alternatives:
  - for a reminder
  - as a reminder
  lexicon: LSJ
  rationale: The phrase is idiomatic and signals that the preceding remarks are sufficient
    as a memorial or reminder. 'By way of reminder' captures the adverbial force more
    naturally than a wooden literalism.
- source_word: ταῦθʼ
  chosen: this
  alternatives:
  - these things
  lexicon: LSJ
  rationale: Although formally plural in Greek elision, English idiom often uses singular
    'this' to summarize the preceding matter as a unit. This better fits the author's
    transitional style.
- source_word: ἡμῖν
  chosen: for us
  alternatives:
  - to us
  lexicon: LSJ
  rationale: 'The dative here is best taken with the sense of reference or advantage:
    the statement serves as a reminder for the writer and readers. ''For us'' reads
    more idiomatically in English than ''to us.'''
- source_word: εἰρήσθω
  chosen: let this be said
  alternatives:
  - let it suffice to say
  - let it be spoken
  lexicon: LSJ
  rationale: Perfect imperative/passive form used idiomatically to close a digression.
    'Let this be said' preserves the formal rhetorical tone without adding interpretive
    content such as 'suffice,' which would be slightly more paraphrastic.
- source_word: διʼ ὀλίγων
  chosen: in a few words
  alternatives:
  - briefly
  - with few words
  lexicon: LSJ
  rationale: The phrase denotes brevity. 'In a few words' preserves the metaphor and
    rhetorical register; 'briefly' is possible but slightly flatter.
- source_word: ἐλευστέον
  chosen: we must proceed
  alternatives:
  - one must go
  - it is necessary to proceed
  lexicon: LSJ
  rationale: This verbal adjective expresses necessity. Because the narrator is speaking
    in the first-person plural frame, 'we must proceed' conveys both the impersonal
    necessity and the author's self-inclusion.
- source_word: ἐπὶ τὴν διήγησιν
  chosen: with the narrative
  alternatives:
  - to the narrative
  - to the account
  lexicon: LSJ
  rationale: The phrase marks a return to the main account after a prefatory aside.
    'With the narrative' is idiomatic after 'proceed'; 'account' is possible but 'narrative'
    better reflects διήγησις.
