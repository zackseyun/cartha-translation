id: 2MA.6.28
reference: 2 Maccabees 6:28
source:
  edition: lxx-swete-1909
  text: τοῖς δὲ νέοις ὑπόδειγμα γενναῖον καταλελοιπὼς εἰς τὸ προθύμως καὶ γενναίως
    ὑπὲρ τῶν σεμνῶν καὶ ἁγίων νόμων ἀπευθανατίζειν. τοσαῦτα δὲ εἰπὼν ἐπὶ τὸ τύμπανον
    εὐθέως ἦλθεν,
  language: Greek
  pages:
  - 702
  confidence: high
  validation: agree
translation:
  text: thus leaving to the young a noble example of dying willingly and bravely for
    the revered and holy laws. And after saying these things, he immediately went
    to the rack,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek τύμπανον, literally 'drum,' here referring to an instrument of torture;
      hence 'rack.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς δὲ νέοις
  chosen: to the young
  alternatives:
  - for the young
  - to the younger men
  lexicon: LSJ
  rationale: Dative of advantage/reference with νέοις, referring broadly to younger
    people rather than specifically males in this context. 'To the young' is concise
    and natural while preserving the exemplar function.
- source_word: ὑπόδειγμα γενναῖον
  chosen: a noble example
  alternatives:
  - a brave example
  - an example of nobility
  lexicon: BDAG/LSJ
  rationale: ὑπόδειγμα is 'example, pattern, model'; γενναῖον can denote nobility
    or bravery. 'Noble example' preserves both moral dignity and courage better than
    the flatter 'brave example'.
- source_word: καταλελοιπὼς
  chosen: leaving
  alternatives:
  - having left
  - bequeathing
  lexicon: BDAG/LSJ
  rationale: Perfect participle conveys resultant state; in idiomatic English, 'leaving'
    adequately carries the sense that his action remains as an enduring example.
- source_word: εἰς τὸ ... ἀπευθανατίζειν
  chosen: of how to die
  alternatives:
  - for dying
  - to die out to the end
  lexicon: LSJ
  rationale: The articular infinitive with εἰς τό expresses purpose/result. ἀπευθανατίζειν
    is an intensive form meaning to meet death, die outright, or go through with death.
    'Of how to die' is idiomatic and preserves the exemplary force without over-paraphrase.
- source_word: προθύμως
  chosen: willingly
  alternatives:
  - eagerly
  - readily
  lexicon: BDAG/LSJ
  rationale: The adverb denotes readiness or willingness. 'Willingly' best fits martyrdom
    context without suggesting inappropriate enthusiasm.
- source_word: γενναίως
  chosen: bravely
  alternatives:
  - nobly
  - courageously
  lexicon: BDAG/LSJ
  rationale: Here the adverb modifies manner of dying. 'Bravely' is the clearest modern
    English equivalent and complements 'willingly' well.
- source_word: ὑπὲρ τῶν σεμνῶν καὶ ἁγίων νόμων
  chosen: for the revered and holy laws
  alternatives:
  - on behalf of the august and holy laws
  - for the honorable and holy laws
  lexicon: LSJ
  rationale: ὑπέρ here means 'for/on behalf of.' σεμνός carries dignity, reverence,
    or augustness; 'revered' communicates that these laws are worthy of honor. 'Holy
    laws' preserves ἁγίων straightforwardly.
- source_word: τοσαῦτα δὲ εἰπών
  chosen: after saying these things
  alternatives:
  - having said so much
  - when he had said these things
  lexicon: BDAG/LSJ
  rationale: Standard participial transition. 'After saying these things' is natural
    and sufficiently formal.
- source_word: ἐπὶ τὸ τύμπανον
  chosen: to the rack
  alternatives:
  - to the drum
  - to the wheel/torture-drum
  lexicon: LSJ
  rationale: In this martyrdom context τύμπανον refers not to a musical instrument
    but to an instrument of torture/stretching. 'Rack' gives the functional sense
    in clear English. The more literal 'drum' would mislead modern readers, so the
    literal image is preserved in a footnote.
- source_word: εὐθέως ἦλθεν
  chosen: he immediately went
  alternatives:
  - he came at once
  - he went straightway
  lexicon: BDAG/LSJ
  rationale: εὐθέως marks immediacy; ἦλθεν here is movement toward the place/instrument.
    'He immediately went' is idiomatic in context.
