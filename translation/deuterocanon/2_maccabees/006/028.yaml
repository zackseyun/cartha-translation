theological_decisions:
- issue: Martyrdom language and the value-laden description of the law
  chosen_reading: Retain 'revered and holy laws' and 'willingly and bravely' without
    softening the text's commendation of Eleazar's death.
  alternative_readings:
  - Use less evaluative wording such as 'honored laws' or 'die resolutely'
  rationale: The Greek itself presents Eleazar's death as exemplary and the laws as
    σεμνῶν καὶ ἁγίων. The translation should preserve that theological and moral valuation
    rather than neutralize it.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
