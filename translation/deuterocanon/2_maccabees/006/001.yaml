theological_decisions:
- issue: Rendering πατρίων with gendered familial language
  chosen_reading: the laws of their fathers
  alternative_readings:
  - the ancestral laws
  - the laws of their ancestors
  rationale: The Greek explicitly uses paternal/ancestral language. Per doctrine,
    gender-accurate rendering is preferred over flattening to a neutral term unless
    context demands otherwise. Here the phrase refers to inherited Jewish tradition
    and the paternal wording is part of the source texture.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Rendering πολιτεύεσθαι in relation to divine law
  chosen_reading: not to live by the laws of God
  alternative_readings:
  - not to conduct themselves according to the laws of God
  - not to order their common life by the laws of God
  rationale: The verb can carry civic or communal overtones, but the immediate sense
    is broader life-conduct under law. 'Live by' preserves the practical force without
    narrowing the statement to formal politics alone.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy over translation tradition;
    §6 Readable modern English
