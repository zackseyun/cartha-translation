id: 2MA.6.1
reference: 2 Maccabees 6:1
source:
  edition: lxx-swete-1909
  text: Μετʼ οὐ πολὺν δὲ χρόνον ἐξαπέστειλεν ὁ βασιλεὺς γέροντι Ἀθηναῖον, ἀναγκάζειν
    τοὺς Ἰουδαίους μεταβαίνειν ἀπὸ τῶν πατρίων νόμων, καὶ τοῖς τοῦ θεοῦ νόμοις μὴ
    πολιτεύεσθαι·
  language: Greek
  pages:
  - 700
  confidence: high
  validation: agree
translation:
  text: But after not much time, the king sent an elderly Athenian to compel the Jews
    to depart from the laws of their fathers and not to live by the laws of God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'not long afterward.' The Greek literally says 'after
      not much time.'
    reason: lexical_alternative
  - marker: b
    text: '''The laws of their fathers'' means their ancestral laws; the Greek keeps
      paternal language.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετʼ οὐ πολὺν ... χρόνον
  chosen: after not much time
  alternatives:
  - after a short time
  - not long afterward
  lexicon: LSJ
  rationale: The idiom literally means 'after not much time.' 'After not much time'
    preserves the Greek force closely while remaining understandable; smoother English
    alternatives are possible, but this keeps the temporal brevity explicit.
- source_word: ἐξαπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  - sent out
  lexicon: LSJ
  rationale: The verb means to send out or dispatch. 'Sent' is natural English and
    sufficient in context; 'dispatched' is possible but slightly more formal than
    needed.
- source_word: γέροντι Ἀθηναῖον
  chosen: an elderly Athenian
  alternatives:
  - an old Athenian
  - a geron, an Athenian elder
  lexicon: LSJ
  rationale: γέροντι here most naturally describes the man as aged rather than functioning
    as an official title. 'Elderly Athenian' avoids implying a Jewish office such
    as 'elder' and preserves the descriptive sense.
- source_word: ἀναγκάζειν
  chosen: to compel
  alternatives:
  - to force
  - to constrain
  lexicon: LSJ
  rationale: The infinitive expresses the purpose of the sending. 'To compel' captures
    coercion clearly without overstatement.
- source_word: μεταβαίνειν ἀπὸ τῶν πατρίων νόμων
  chosen: to depart from the laws of their fathers
  alternatives:
  - to abandon the ancestral laws
  - to turn away from the laws of their ancestors
  lexicon: LSJ
  rationale: μεταβαίνειν ἀπό conveys moving away from or departing from. 'The laws
    of their fathers' is a fairly formal but transparent rendering of πατρίων νόμων
    and preserves the familial/ancestral wording of the Greek.
- source_word: πατρίων
  chosen: of their fathers
  alternatives:
  - ancestral
  - of their ancestors
  lexicon: LSJ
  rationale: The adjective means ancestral or inherited from the fathers. 'Of their
    fathers' keeps the source's gendered familial expression, in line with the project's
    gender-accurate policy.
- source_word: τοῖς τοῦ θεοῦ νόμοις
  chosen: the laws of God
  alternatives:
  - God's laws
  - the divine laws
  lexicon: LSJ
  rationale: A straightforward genitival construction. 'The laws of God' preserves
    the formal tone and parallelism with 'the laws of their fathers.'
- source_word: μὴ πολιτεύεσθαι
  chosen: not to live by
  alternatives:
  - not to conduct themselves by
  - not to order their civic life by
  lexicon: LSJ
  rationale: πολιτεύομαι can mean to live as a citizen or conduct one's life. In this
    context, with laws as the standard, 'not to live by' communicates the practical
    sense clearly in modern English without importing specifically political nuance
    too heavily.
