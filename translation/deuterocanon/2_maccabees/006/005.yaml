id: 2MA.6.5
reference: 2 Maccabees 6:5
source:
  edition: lxx-swete-1909
  text: τὸ δὲ θυσιαστήριον τοῖς ἀποδιεσταλμένοις ἀπὸ τῶν νόμων ἀθεμίτοις ἐπεπλήρωτο.
  language: Greek
  pages:
  - 700
  confidence: high
  validation: agree
translation:
  text: But the altar was filled with unlawful things by those who had departed from
    the laws.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abominations' or 'forbidden things.' The Greek describes what is illicit
      or not permitted, in a context of cultic defilement.
    reason: lexical_alternative
lexical_decisions:
- source_word: θυσιαστήριον
  chosen: altar
  alternatives:
  - sacrificial altar
  lexicon: LSJ
  rationale: The standard sense is 'altar.' 'Sacrificial altar' is more explicit but
    unnecessarily expands the Greek in context.
- source_word: ἀποδιεσταλμένοις
  chosen: those who had departed from
  alternatives:
  - those who had separated themselves from
  - apostates from
  lexicon: LSJ
  rationale: The participle indicates separation or estrangement from the laws. 'Departed
    from' is natural English and preserves the idea without importing the more interpretive
    label 'apostates' into the main text.
- source_word: νόμων
  chosen: the laws
  alternatives:
  - the law
  - the ancestral laws
  lexicon: LSJ
  rationale: The plural is explicit in Greek, so 'the laws' best matches the source.
    In context these are the Jewish laws, but 'ancestral' is not stated here and should
    not be added.
- source_word: ἀθεμίτοις
  chosen: unlawful things
  alternatives:
  - abominations
  - forbidden things
  - impure things
  lexicon: LSJ
  rationale: The adjective denotes what is not permitted, lawless, or taboo. Because
    the Greek leaves the object implicit, 'things' is supplied in English. 'Abominations'
    is possible in context but is more theologically loaded than the word itself requires.
- source_word: ἐπεπλήρωτο
  chosen: was filled
  alternatives:
  - had been filled
  - was full
  lexicon: LSJ
  rationale: 'The pluperfect/passive form conveys a completed state: the altar stood
    filled. ''Was filled'' is idiomatic and sufficiently reflects the resulting condition.'
