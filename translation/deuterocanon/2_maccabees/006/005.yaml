theological_decisions:
- issue: Whether to render ἀθεμίτοις with a stronger cultic term
  chosen_reading: unlawful things
  alternative_readings:
  - abominations
  - forbidden things
  rationale: The context is temple desecration, so a stronger cultic rendering is
    understandable. However, the Greek term itself primarily marks what is illicit
    or not sanctioned. 'Unlawful things' preserves the legal-religious force without
    overstating the lexical content.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
