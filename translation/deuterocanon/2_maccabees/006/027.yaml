theological_decisions:
- issue: Idiomatic expression for death in a martyrdom context
  chosen_reading: giving up my life
  alternative_readings:
  - departing this life
  - changing my life
  rationale: The Greek idiom ἀλλάξας τὸν βίον refers to dying/leaving one's present
    life. Rendering it explicitly avoids obscurity while not importing extra doctrinal
    claims about martyrdom beyond the text's immediate sense.
  doctrine_reference: Translation philosophy §§1, 6
