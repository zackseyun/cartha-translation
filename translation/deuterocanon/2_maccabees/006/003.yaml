theological_decisions:
- issue: Referent of κακία in context
  chosen_reading: A concrete reference to the wicked oppression/policy already being
    described
  alternative_readings:
  - evil in a more abstract sense
  - malice as a personal quality
  rationale: The narrative context concerns imposed profanation and persecution. Rendering
    κακία concretely avoids making the statement sound like a general proverb while
    not over-specifying beyond the Greek.
