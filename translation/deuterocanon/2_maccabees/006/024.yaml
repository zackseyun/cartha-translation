theological_decisions:
- issue: Rendering of ἀλλοφυλισμός in a Jewish martyrdom context
  chosen_reading: foreign ways
  alternative_readings:
  - foreign customs
  - alien way of life
  - heathenism
  rationale: The term concerns apparent abandonment of ancestral Jewish identity for
    Gentile practices. 'Foreign ways' communicates the covenantal-social breach without
    adding doctrinal freight beyond the Greek.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
