id: 2MA.6.24
reference: 2 Maccabees 6:24
source:
  edition: lxx-swete-1909
  text: Οὐ γὰρ τῆς ἡμετέρας ἡλικίας ἄξιόν ἐστιν ὑποκριθῆναι, ἵνα πολλοὶ τῶν νέων ὑπολαβόντες
    Ἐλεάζαρον τὸν ἐνενηκονταετῆ μεταβεβληκέναι εἰς ἀλλοφυλισμόν,
  language: Greek
  pages:
  - 702
  confidence: high
  validation: agree
translation:
  text: For it is not worthy of our age to pretend, so that many of the young, supposing
    that Eleazar at ninety years of age has changed over to foreign ways,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to foreign customs"; the Greek refers to adopting non-Jewish ways.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ γὰρ
  chosen: For ... not
  alternatives:
  - Indeed ... not
  - Because ... not
  lexicon: LSJ
  rationale: Uses γάρ to connect Eleazar's reasoning to the prior context; 'For' preserves
    the explanatory force without overinterpreting.
- source_word: τῆς ἡμετέρας ἡλικίας
  chosen: of our age
  alternatives:
  - for one of our age
  - of my time of life
  lexicon: LSJ
  rationale: ἡλικία here refers to stage of life/advanced age rather than a numerical
    age alone. 'Our age' keeps the Greek genitive construction while sounding natural
    in English; the plural-like possessive reflects dignified self-reference rather
    than strict plurality.
- source_word: ἄξιόν ἐστιν
  chosen: it is ... worthy
  alternatives:
  - it is fitting
  - it is proper
  lexicon: LSJ
  rationale: ἄξιος denotes worthiness or what befits someone. 'Worthy' preserves the
    moral weight better than the flatter 'proper'.
- source_word: ὑποκριθῆναι
  chosen: to pretend
  alternatives:
  - to dissemble
  - to play the hypocrite
  - to feign
  lexicon: LSJ
  rationale: The aorist passive infinitive of ὑποκρίνομαι in this context means to
    act a part or feign. 'Pretend' is clear modern English and fits the context of
    deceptive outward compliance.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - lest
  - with the result that
  lexicon: LSJ
  rationale: Introduces the contemplated consequence of such pretending. 'So that'
    best captures the forward-looking clause here.
- source_word: πολλοὶ τῶν νέων
  chosen: many of the young
  alternatives:
  - many of the young men
  - many young people
  lexicon: LSJ
  rationale: νέοι can mean young men or the young generally. Since the Greek is masculine
    plural but representative, 'the young' preserves the social group without over-specifying
    sex where the context does not require it.
- source_word: ὑπολαβόντες
  chosen: supposing
  alternatives:
  - assuming
  - thinking
  lexicon: LSJ
  rationale: 'Conveys the inferential sense: the young would draw a mistaken conclusion
    from Eleazar''s behavior.'
- source_word: Ἐλεάζαρον τὸν ἐνενηκονταετῆ
  chosen: Eleazar at ninety years of age
  alternatives:
  - Eleazar, the ninety-year-old
  - Eleazar, being ninety years old
  lexicon: LSJ
  rationale: Keeps the appositional age description while producing idiomatic English.
    The phrase underscores the scandal of an elder's apparent apostasy.
- source_word: μεταβεβληκέναι
  chosen: has changed over
  alternatives:
  - has turned
  - has changed
  lexicon: LSJ
  rationale: Perfect infinitive indicates a perceived completed change of allegiance
    or conduct. 'Changed over' captures transition more clearly than the bare 'changed'.
- source_word: εἰς ἀλλοφυλισμόν
  chosen: to foreign ways
  alternatives:
  - to foreign customs
  - to alien living
  - to heathenism
  lexicon: LSJ
  rationale: The noun denotes adoption of foreign, non-Jewish identity or customs.
    'Foreign ways' is natural English and preserves the idea of crossing into alien
    practices without importing later polemical terminology like 'heathenism'.
