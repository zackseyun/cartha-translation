id: 2MA.6.10
reference: 2 Maccabees 6:10
source:
  edition: lxx-swete-1909
  text: δύο Α γὰρ γυναῖκες ἀνήχθησαν περιτετμηκυῖα τὰ τέκνα· τούτων δὲ ἐκ τῶν μαστῶν
    κρεμάσαντες τὰ βρέφη, καὶ δημοσίᾳ περιαγαγόντες ἀντὰς τὴν πόλιν, κατὰ τοῦ τείχους
    ἐκρήμνισαν.
  language: Greek
  pages:
  - 700
  confidence: high
  validation: agree
translation:
  text: For two women were brought up for having circumcised their children. After
    hanging the infants from their breasts and leading them publicly around the city,
    they threw them down from the wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the city.' The Greek phrase in this witness is somewhat awkward,
      and the sense is public procession through or around the city.
    reason: alternative_reading
  - marker: b
    text: The implied object of 'they threw them down from the wall' is most likely
      the women, though some may understand the infants, or both women and infants,
      as included in the final act.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνήχθησαν
  chosen: were brought up
  alternatives:
  - were led up
  - were brought in
  lexicon: LSJ
  rationale: Passive of ἀνάγω, here in a judicial/executive context. 'Were brought
    up' preserves the sense of being taken before authorities or to the place of punishment
    without over-specifying.
- source_word: περιτετμηκυῖα
  chosen: having circumcised
  alternatives:
  - because they had circumcised
  lexicon: LSJ
  rationale: Perfect active participle modifying γυναῖκες, giving the reason for their
    arrest/punishment. 'Having circumcised' is concise and preserves the participial
    force.
- source_word: τὰ τέκνα
  chosen: their children
  alternatives:
  - their sons
  - their infants
  lexicon: LSJ
  rationale: τέκνα is broader than 'sons' and need not itself specify age. The following
    βρέφη supplies the infant sense later in the verse, so 'children' here avoids
    importing more than the Greek states at this point.
- source_word: ἐκ τῶν μαστῶν
  chosen: from their breasts
  alternatives:
  - at their breasts
  - from their bosoms
  lexicon: LSJ
  rationale: 'A literal rendering best preserves the graphic image: the infants were
    hung from the women''s breasts. ''Breasts'' is the plain sense of μαστοί.'
- source_word: τὰ βρέφη
  chosen: the infants
  alternatives:
  - the babies
  lexicon: LSJ
  rationale: βρέφη denotes very young children/infants. 'Infants' is slightly more
    formal and suits the grave tone of the passage.
- source_word: δημοσίᾳ
  chosen: publicly
  alternatives:
  - in public
  - before the public
  lexicon: LSJ
  rationale: Adverb indicating the public nature of the humiliation and punishment.
- source_word: περιαγαγόντες
  chosen: leading them around
  alternatives:
  - parading them around
  - taking them around
  lexicon: LSJ
  rationale: The verb means to lead around. 'Leading them around' is straightforward;
    'parading' is possible but slightly more interpretive.
- source_word: ἀντὰς τὴν πόλιν
  chosen: around the city
  alternatives:
  - through the city
  lexicon: LSJ
  rationale: The transmitted text appears to mean movement about the city; 'around
    the city' follows the wording as given. Because the phrase is somewhat awkward
    in this witness, an alternative is preserved in a footnote.
- source_word: κατὰ τοῦ τείχους
  chosen: from the wall
  alternatives:
  - down from the wall
  - off the wall
  lexicon: LSJ
  rationale: In context with ἐκρήμνισαν ('threw down, hurled down'), the sense is
    clearly execution by casting down from the city wall. English idiom requires 'from
    the wall'/'down from the wall' rather than a more wooden 'against the wall'.
- source_word: ἐκρήμνισαν
  chosen: they threw them down
  alternatives:
  - they hurled them down
  - they cast them down
  lexicon: LSJ
  rationale: A violent verb of throwing down from a height. 'Threw them down' is natural
    English and preserves the brutality.
