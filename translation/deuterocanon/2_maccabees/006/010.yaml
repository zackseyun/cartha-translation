theological_decisions:
- issue: Referent of the final plural object in ἐκρήμνισαν
  chosen_reading: the women were thrown down from the wall after their infants had
    been hung from their breasts
  alternative_readings:
  - the infants were thrown down
  - both women and infants were thrown down
  rationale: 'The most natural narrative flow is that the women are the primary victims
    throughout: two women were arrested, their infants were hung from their breasts,
    the women were led publicly around the city, and then the women were thrown down
    from the wall. English ''them'' after ''leading them publicly around the city''
    keeps the antecedent as the women. The Greek object is implicit, so the translation
    avoids over-specifying beyond the likely referent while preserving the sequence
    of atrocities.'
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity rather than flatten it.
