id: 2MA.6.30
reference: 2 Maccabees 6:30
source:
  edition: lxx-swete-1909
  text: μέλλων δὲ ταῖς πληγαῖς τελευτᾷν, ἀναστενάξας εἶπεν Τῷ κυρίῳ τῷ τὴν ἁγίαν γνῶσιν
    ἔχοντι φανερὸν ἐστὶν ὅτι δυνάμενος ἀπολυθῆναι τοῦ θανάτου, σκληρὰς ὑποφέρω κατὰ
    σῶμα ἀλγηδόνας μαστιγούμενος, κατὰ ψυχὴν δὲ ἡδέως διὰ τὸν αὐτοῦ φόβον ταῦτα πάσχω.
  language: Greek
  pages:
  - 702
  confidence: high
  validation: agree
translation:
  text: But as he was about to die under the blows, he groaned and said, “To the Lord,
    who has the holy knowledge, it is clear that, though I could have been released
    from death, I am enduring cruel pains in my body while being scourged; but in
    my soul I gladly suffer these things because of fear of him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “because of reverence for him.” The Greek says “fear,” which can include
      reverent fear toward God.
    reason: lexical_alternative
  - marker: b
    text: “Released from death” means spared from execution or allowed to escape death
      by compliance.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέλλων ... τελευτᾷν
  chosen: as he was about to die
  alternatives:
  - being about to die
  - being on the point of death
  lexicon: LSJ
  rationale: The periphrastic construction with μέλλων and infinitive expresses imminence.
    'As he was about to die' is natural English and preserves the sense of impending
    death.
- source_word: ταῖς πληγαῖς
  chosen: under the blows
  alternatives:
  - from the blows
  - by the beatings
  lexicon: LSJ
  rationale: Dative plural with τελευτᾷν indicates the means/circumstance of dying.
    'Under the blows' captures death occurring amid the beating without over-specifying
    instrumentality.
- source_word: ἀναστενάξας
  chosen: he groaned
  alternatives:
  - having sighed deeply
  - with a groan
  lexicon: LSJ
  rationale: The participle denotes an audible sigh/groan. 'He groaned' is concise
    and idiomatic in narrative English.
- source_word: Τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - to Lord
  - before the Lord
  lexicon: LSJ
  rationale: κύριος is rendered by the project's default as 'Lord.' The dative here
    is retained with 'to,' introducing his address or declaration in the Lord's presence.
- source_word: τῷ τὴν ἁγίαν γνῶσιν ἔχοντι
  chosen: who has the holy knowledge
  alternatives:
  - who possesses holy knowledge
  - who knows the holy truth
  lexicon: LSJ
  rationale: The participial phrase modifies 'Lord.' γνῶσις is best kept as 'knowledge'
    rather than expanded to 'truth.' The article suggests a definite quality; 'the
    holy knowledge' preserves the Greek more closely, even if slightly marked in English.
- source_word: φανερὸν ἐστὶν
  chosen: it is clear
  alternatives:
  - it is evident
  - it is manifest
  lexicon: LSJ
  rationale: A straightforward impersonal expression. 'It is clear' is readable modern
    English without loss of force.
- source_word: δυνάμενος ἀπολυθῆναι τοῦ θανάτου
  chosen: though I could have been released from death
  alternatives:
  - although I was able to escape death
  - being able to be freed from death
  lexicon: LSJ
  rationale: ἀπολυθῆναι can mean be released, set free, or escape. 'Released from
    death' stays close to the Greek metaphor while indicating that he had the possibility
    of avoiding execution by compliance.
- source_word: σκληρὰς ... ἀλγηδόνας
  chosen: cruel pains
  alternatives:
  - severe pains
  - harsh sufferings
  lexicon: LSJ
  rationale: ἀλγηδών denotes pain, and σκληρός intensifies it. 'Cruel pains' preserves
    the harshness of the expression better than the flatter 'severe pains.'
- source_word: κατὰ σῶμα
  chosen: in my body
  alternatives:
  - bodily
  - according to the body
  lexicon: LSJ
  rationale: The phrase contrasts bodily suffering with inward disposition. 'In my
    body' is idiomatic and preserves the body/soul contrast.
- source_word: μαστιγούμενος
  chosen: while being scourged
  alternatives:
  - while being whipped
  - under the lash
  lexicon: LSJ
  rationale: The participle specifies the manner of his bodily suffering. 'Scourged'
    is slightly more formal than 'whipped' and fits the gravity of the scene.
- source_word: κατὰ ψυχὴν
  chosen: in my soul
  alternatives:
  - inwardly
  - in spirit
  lexicon: LSJ
  rationale: This balances κατὰ σῶμα. 'In my soul' preserves the anthropological contrast
    in the Greek without reducing ψυχή to mere emotion.
- source_word: ἡδέως
  chosen: gladly
  alternatives:
  - with pleasure
  - willingly
  lexicon: LSJ
  rationale: The adverb expresses willing, even joyful acceptance. 'Gladly' is natural
    and strong without sounding flippant.
- source_word: διὰ τὸν αὐτοῦ φόβον
  chosen: because of fear of him
  alternatives:
  - because of reverence for him
  - for fear of him
  lexicon: LSJ
  rationale: φόβος can denote fear or reverent fear. Here the context is pious endurance
    before God; 'fear of him' preserves the theological tension and avoids prematurely
    resolving it into mere 'reverence.'
