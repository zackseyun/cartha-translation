theological_decisions:
- issue: Meaning of φόβος in relation to the Lord
  chosen_reading: fear of him
  alternative_readings:
  - reverence for him
  rationale: The phrase likely carries the biblical sense of reverent fear toward
    God, but the Greek term itself retains the stronger word 'fear.' Following the
    project's principle of preserving theological tension rather than resolving it,
    the main text keeps 'fear,' while the alternative nuance is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Force of ψυχή in contrast with σῶμα
  chosen_reading: soul
  alternative_readings:
  - inner self
  - spirit
  rationale: The verse explicitly contrasts bodily pain with inward gladness. 'Soul'
    best preserves the lexical and anthropological distinction in the Greek without
    collapsing it into a purely psychological paraphrase.
