id: 2MA.6.6
reference: 2 Maccabees 6:6
source:
  edition: lxx-swete-1909
  text: ἦν δʼ οὔτε σαββατίζειν, οὔτε πατρίους ἑορτὰς διαφυλάττειν, οὔτε ἁπλῶς Ἰουδαῖον
    ὁμολογεῖν εἶναι.
  language: Greek
  pages:
  - 700
  confidence: high
  validation: agree
translation:
  text: And it was permitted neither to keep the Sabbath, nor to observe the ancestral
    festivals, nor even simply to acknowledge being a Jew.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a Judean,' if taken in a more geographic-ethnic sense; here the context
      of banned Sabbath observance and festivals favors 'a Jew.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν
  chosen: it was
  alternatives:
  - there was
  lexicon: LSJ
  rationale: Impersonal ἦν with infinitives expresses a state or circumstance; English
    'it was' naturally introduces the prohibition construction.
- source_word: οὔτε ... οὔτε ... οὔτε
  chosen: either ... or ... or
  alternatives:
  - neither ... nor ... nor
  - not ... nor ... nor
  lexicon: LSJ
  rationale: The repeated correlative negatives structure a three-part list of prohibited
    actions. 'Either ... or ... or' after 'not permitted' preserves the coordination
    idiomatically in English.
- source_word: σαββατίζειν
  chosen: to keep the Sabbath
  alternatives:
  - to observe the Sabbath
  - to sabbatize
  lexicon: LSJ
  rationale: The verb means to observe or keep the Sabbath. 'Keep the Sabbath' is
    clear modern English and preserves the specifically Jewish religious practice.
- source_word: πατρίους
  chosen: ancestral
  alternatives:
  - traditional
  - of the fathers
  - native
  lexicon: LSJ
  rationale: πατρίους denotes what belongs to the ancestors/fathers. 'Ancestral' preserves
    the historical and inherited character of the festivals without archaic phrasing.
- source_word: ἑορτὰς
  chosen: festivals
  alternatives:
  - feasts
  - festal days
  lexicon: LSJ
  rationale: ἑορταί are religious feast days or festivals. 'Festivals' is accessible
    modern English; 'feasts' could sound narrower or overly traditional.
- source_word: διαφυλάττειν
  chosen: to observe
  alternatives:
  - to keep
  - to maintain
  - to preserve
  lexicon: LSJ
  rationale: In context of festivals, the sense is to keep or observe them. 'Observe'
    fits English collocation with religious festivals and distinguishes it from 'keep
    the Sabbath' only stylistically, not semantically.
- source_word: ἁπλῶς
  chosen: simply
  alternatives:
  - plainly
  - outright
  - at all
  lexicon: LSJ
  rationale: 'ἁπλῶς here intensifies the final clause: not even in the simple/basic
    sense of openly saying one is a Jew. ''Simply'' captures that force well.'
- source_word: Ἰουδαῖον
  chosen: a Jew
  alternatives:
  - Judean
  lexicon: LSJ
  rationale: In 2 Maccabees this term commonly marks Jewish identity in religious-ethnic
    terms under persecution. 'Jew' best fits the context; 'Judean' would over-localize
    it geographically.
- source_word: ὁμολογεῖν
  chosen: to acknowledge
  alternatives:
  - to confess
  - to declare
  - to admit
  lexicon: LSJ
  rationale: The verb means to acknowledge or confess openly. 'Acknowledge' avoids
    importing later confessional overtones while retaining the sense of public identification.
- source_word: εἶναι
  chosen: being
  alternatives:
  - to be
  lexicon: LSJ
  rationale: With ὁμολογεῖν, the infinitive complements the content of acknowledgment.
    'Acknowledge being a Jew' is smoother English than 'acknowledge to be a Jew.'
