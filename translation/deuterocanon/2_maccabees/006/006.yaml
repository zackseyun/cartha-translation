  rationale: The verse concerns suppression of Jewish religious identity and practice,
    not merely regional origin. Rendering as 'a Jew' preserves the ethnic-religious
    force most naturally in English.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English.'
