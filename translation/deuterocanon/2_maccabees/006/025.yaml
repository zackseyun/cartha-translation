theological_decisions:
- issue: Moral force of ὑπόκρισις in martyrdom context
  chosen_reading: Rendered as 'hypocrisy' rather than a softer term like 'pretense.'
  alternative_readings:
  - pretense
  - dissimulation
  rationale: The verse condemns not merely a tactical appearance but a morally compromising
    false witness that could mislead others. The stronger rendering preserves the
    ethical seriousness of Eleazar's reasoning.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Force of the final clause
  chosen_reading: 'Rendered as self-incurred disgrace: ''I would acquire hatred and
    a stain upon my old age.'''
  alternative_readings:
  - I would win abhorrence and a blot on my old age
  - I would bring hatred and disgrace on my old age
  rationale: The Greek middle verb points to disgrace brought upon oneself. The translation
    preserves that Eleazar sees dishonor as the result of his own compromise, without
    importing later doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 3
