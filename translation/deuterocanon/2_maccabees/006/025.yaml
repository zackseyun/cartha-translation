id: 2MA.6.25
reference: 2 Maccabees 6:25
source:
  edition: lxx-swete-1909
  text: καὶ αὐτοὶ διὰ τὴν ἐμὴν ὑπόκρισιν καὶ διὰ τὸ μικρὸν καὶ ἀκαριαῖον ζῆν πλανηθῶσιν
    διʼ ἐμέ, καὶ μύσος καὶ κηλῖδα τοῦ γήρως κατακτήσωμαι.
  language: Greek
  pages:
  - 702
  confidence: high
  validation: minor_mismatch
translation:
  text: and they too, because of my hypocrisy and because of this brief and momentary
    living, might be led astray because of me, and I would acquire hatred and a stain
    upon my old age.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pretense' or 'dissimulation' for 'hypocrisy.' The Greek refers to feigned
      behavior that would mislead observers.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'because of the brief and momentary living'—that is, for the
      sake of a short remaining span of life.
    reason: lexical_alternative
  - marker: c
    text: '''Hatred'' may also be understood as ''abhorrence'' or ''loathing,'' emphasizing
      public revulsion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπόκρισιν
  chosen: hypocrisy
  alternatives:
  - pretense
  - dissimulation
  lexicon: LSJ
  rationale: The noun denotes play-acting or feigned behavior. In this context Eleazar
    speaks of deceptive outward compliance, so 'hypocrisy' best captures the moral
    and religious falseness without softening it to mere 'pretense.'
- source_word: μικρὸν καὶ ἀκαριαῖον ζῆν
  chosen: this brief and momentary living
  alternatives:
  - a short and fleeting life
  - brief and instant life
  lexicon: LSJ
  rationale: The phrase refers to the smallness and transience of the remaining span
    of life. 'Brief and momentary living' stays close to the Greek structure and preserves
    the contrast between temporary survival and lasting dishonor.
- source_word: πλανηθῶσιν
  chosen: might be led astray
  alternatives:
  - might be deceived
  - might go astray
  lexicon: LSJ
  rationale: The passive/subjunctive sense fits the idea that younger observers would
    be misdirected by Eleazar's example. 'Led astray' captures both deception and
    moral misguidance.
- source_word: μύσος
  chosen: hatred
  alternatives:
  - abhorrence
  - loathing
  lexicon: LSJ
  rationale: The word conveys being an object of revulsion or hatred. 'Hatred' is
    idiomatic and strong, though the nuance of public abhorrence is also present.
- source_word: κηλῖδα
  chosen: a stain
  alternatives:
  - a blemish
  - a disgrace
  lexicon: LSJ
  rationale: 'The image is metaphorical: a blot on reputation. ''Stain'' preserves
    the concrete metaphor and pairs naturally with ''upon my old age.'''
- source_word: γήρως
  chosen: my old age
  alternatives:
  - my old age reputation
  - my aged years
  lexicon: LSJ
  rationale: The genitive depends on 'stain' and likely also on the acquired disgrace
    generally. 'My old age' is the natural English equivalent and preserves the pathos
    of dishonor attached to a venerable life.
- source_word: κατακτήσωμαι
  chosen: I would acquire
  alternatives:
  - I would gain
  - I would bring upon myself
  lexicon: LSJ
  rationale: The middle voice here conveys obtaining for oneself. 'Acquire' is slightly
    formal but accurately reflects the self-incurred nature of the disgrace.
