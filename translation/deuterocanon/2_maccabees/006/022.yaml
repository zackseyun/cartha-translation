id: 2MA.6.22
reference: 2 Maccabees 6:22
source:
  edition: lxx-swete-1909
  text: ἵνα τοῦτο πράξας ἀπολυθῇ τοῦ θανάτου, καὶ διὰ τὴν ἀρχαίαν πρὸς αὐτοὺς φιλίαν
    τύχοι φιλανθρωπίας.
  language: Greek
  pages:
  - 702
  confidence: high
  validation: agree
translation:
  text: so that, after doing this, he might be released from death, and because of
    their long-standing friendship with him might receive kindness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he might be freed from death,' that is, spared execution.
    reason: lexical_alternative
  - marker: b
    text: Or 'might obtain goodwill' or 'humane treatment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English while
    preserving the clause's purposive force.
- source_word: τοῦτο πράξας
  chosen: after doing this
  alternatives:
  - having done this
  - by doing this
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb. 'After doing this' conveys
    antecedent action clearly in English without overformal stiffness.
- source_word: ἀπολυθῇ τοῦ θανάτου
  chosen: he might be released from death
  alternatives:
  - he might be freed from death
  - he might be delivered from death
  - he might be acquitted of death
  lexicon: BDAG
  rationale: ἀπολύω commonly means release/free. With τοῦ θανάτου here, the sense
    is being spared execution or set free from the sentence of death. 'Released from
    death' stays close to the Greek while allowing the context to imply escape from
    execution.
- source_word: διὰ τὴν ἀρχαίαν πρὸς αὐτοὺς φιλίαν
  chosen: because of their long-standing friendship with him
  alternatives:
  - because of the old friendship toward them
  - because of his long-standing friendship with them
  - on account of their former friendship
  lexicon: LSJ
  rationale: ἀρχαίαν φιλίαν denotes an old/long-standing friendship. The phrase πρὸς
    αὐτούς is awkwardly literal if rendered 'toward them'; in context the speakers
    are appealing to an established relationship between Eleazar and them. English
    idiom is best served by 'their long-standing friendship with him,' which captures
    the relational sense without woodenness.
- source_word: τύχοι φιλανθρωπίας
  chosen: might receive kindness
  alternatives:
  - might obtain goodwill
  - might receive humane treatment
  - might meet with benevolence
  lexicon: BDAG
  rationale: τυγχάνω with a genitive means obtain/receive. φιλανθρωπία here is humaneness,
    kindness, benevolence. 'Receive kindness' is concise and natural; 'humane treatment'
    is possible but slightly more interpretive.
