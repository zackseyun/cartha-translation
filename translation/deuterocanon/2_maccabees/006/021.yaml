id: 2MA.6.21
reference: 2 Maccabees 6:21
source:
  edition: lxx-swete-1909
  text: οἱ δὲ πρὸς τὰ παράνομα σπλαγχνισμοῦ τεταγμένοι διὰ τὴν ἐκ τῶν παλαιῶν χρόνων
    πρὸς τὸν ἄνδρα γνῶσιν ἀπολαμβάνοντες αὐτὸν κατʼ ἰδίαν ἐκάλουν, ἐνέγκοντα κρέα,
    οἷς καθῆκον αὐτῷ χρᾶσθαι, διʼ αὐτοῦ παρασκευασθέντα, ὑποκρῖναι δὲ ὡς ἐσθίοντα
    τὰ ὑπὸ τοῦ βασιλέως τεταγμένα τῶν ἀπὸ τῆς θυσίας κρεῶν,
  language: Greek
  pages:
  - 701
  confidence: high
  validation: agree
translation:
  text: But those who had been appointed over the unlawful meal, because of their
    long-standing acquaintance with the man, took him aside privately and urged him
    to bring meat that was proper for him to use, prepared by himself, and to pretend
    that he was eating the meats from the sacrifice that had been ordered by the king,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'out of compassion, because of their acquaintance with him from long
      ago.' The Greek explicitly includes the idea of pity/compassion (σπλαγχνισμοῦ).
    reason: lexical_alternative
  - marker: b
    text: Literally 'the meats from the sacrifice'; that is, meat from pagan sacrificial
      offerings that the king had ordered him to eat.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ ... τεταγμένοι
  chosen: those who had been appointed
  alternatives:
  - those assigned
  - those put in charge
  lexicon: LSJ
  rationale: τεταγμένοι (perfect passive participle of τάσσω) indicates persons designated
    or assigned to a role. 'Had been appointed' preserves the formal sense and the
    prior state resulting from the appointment.
- source_word: πρὸς τὰ παράνομα
  chosen: over the unlawful meal
  alternatives:
  - for the unlawful things
  - in charge of the unlawful rites
  - for the illegal matter
  lexicon: LSJ
  rationale: The phrase is elliptical in context; the surrounding clauses concern
    compelled eating of forbidden sacrificial meat. Rendering it as 'over the unlawful
    meal' makes explicit the concrete referent implied by the narrative without over-paraphrasing.
- source_word: σπλαγχνισμοῦ
  chosen: because of their ... acquaintance
  alternatives:
  - out of compassion
  - with pity
  lexicon: LSJ
  rationale: The genitive σπλαγχνισμοῦ literally denotes compassion/pity, but in this
    syntax it modifies their handling of him in light of personal knowledge. The compassion
    is expressed in the whole clause; the English sentence conveys that motive through
    'because of their long-standing acquaintance.'
- source_word: διὰ τὴν ἐκ τῶν παλαιῶν χρόνων πρὸς τὸν ἄνδρα γνῶσιν
  chosen: because of their long-standing acquaintance with the man
  alternatives:
  - because of the knowledge of the man from former times
  - because they had known the man for a long time
  lexicon: LSJ
  rationale: γνῶσις here is relational knowledge/acquaintance, not abstract knowledge.
    'Long-standing acquaintance' captures ἐκ τῶν παλαιῶν χρόνων naturally in English.
- source_word: ἀπολαμβάνοντες αὐτὸν κατʼ ἰδίαν ἐκάλουν
  chosen: took him aside privately and urged him
  alternatives:
  - called him aside privately
  - summoned him in private
  lexicon: LSJ
  rationale: ἀπολαμβάνοντες ... κατʼ ἰδίαν suggests separating him from others, and
    ἐκάλουν in context introduces their proposal. 'Took him aside privately and urged
    him' reflects both actions idiomatically.
- source_word: ἐνέγκοντα κρέα
  chosen: to bring meat
  alternatives:
  - to provide meat
  - to carry in meat
  lexicon: LSJ
  rationale: Aorist participial infinitival sense in indirect discourse after ἐκάλουν;
    'bring meat' is the most straightforward rendering.
- source_word: οἷς καθῆκον αὐτῷ χρᾶσθαι
  chosen: that was proper for him to use
  alternatives:
  - that it was fitting for him to eat
  - that was lawful for him to partake of
  lexicon: LSJ
  rationale: καθῆκον means fitting/proper; χρᾶσθαι is broader than 'eat' but in this
    food context implies making use of as food. 'Proper for him to use' stays close
    while allowing the next clause to explain the deception.
- source_word: διʼ αὐτοῦ παρασκευασθέντα
  chosen: prepared by himself
  alternatives:
  - prepared by him
  - made ready through him
  lexicon: LSJ
  rationale: The phrase indicates meat prepared under his own control rather than
    pagan sacrificial meat. 'Prepared by himself' makes the contrast clear.
- source_word: ὑποκρῖναι
  chosen: to pretend
  alternatives:
  - to feign
  - to act as if
  lexicon: LSJ
  rationale: ὑποκρίνομαι here clearly means to feign or pretend, not merely to answer.
- source_word: τὰ ὑπὸ τοῦ βασιλέως τεταγμένα
  chosen: that had been ordered by the king
  alternatives:
  - appointed by the king
  - prescribed by the king
  lexicon: LSJ
  rationale: τεταγμένα again carries the sense of what has been ordered or prescribed.
    'Ordered by the king' is clear and contextually apt.
- source_word: τῶν ἀπὸ τῆς θυσίας κρεῶν
  chosen: the meats from the sacrifice
  alternatives:
  - the sacrificial meats
  - the meat from the sacrifice
  lexicon: LSJ
  rationale: The genitive phrase specifies the source of the meat. 'The meats from
    the sacrifice' preserves the plural κρεῶν and the sacrificial context.
