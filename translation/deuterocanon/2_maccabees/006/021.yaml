theological_decisions:
- issue: Nature of τὰ παράνομα in context
  chosen_reading: Rendered concretely as 'the unlawful meal' rather than abstract
    'unlawful things.'
  alternative_readings:
  - the unlawful things
  - the illegal rites
  rationale: The immediate context is the coercion to eat forbidden sacrificial meat.
    The concrete rendering helps modern readers follow the narrative while remaining
    anchored in the Greek context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Expression of σπλαγχνισμοῦ
  chosen_reading: Compassion is conveyed through the whole clause rather than by a
    separate explicit noun gloss.
  alternative_readings:
  - explicitly 'out of compassion'
  rationale: The Greek motivation includes both pity and long acquaintance. English
    style is clearer when the motive is expressed holistically in the causal clause,
    without forcing a wooden noun-for-noun rendering.
  doctrine_reference: Translation philosophy §6
