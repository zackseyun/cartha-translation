theological_decisions:
- issue: Sense of μύσος in the martyrdom context
  chosen_reading: defilement
  alternative_readings:
  - disgrace
  - pollution
  rationale: The verse contrasts honorable death with a compromised life under unlawful
    eating and apostasy pressure. Rendering μύσος as 'defilement' preserves the moral-ritual
    dimension without over-specifying ceremonial categories.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than flattening lexical force.'
- issue: Rendering τύμπανον
  chosen_reading: rack
  alternative_readings:
  - drum
  - torture wheel
  rationale: The narrative context is judicial torture. A literal 'drum' would mislead
    modern readers; 'rack' communicates the function of the device while a footnote
    preserves the more literal term and uncertainty about the exact apparatus.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
