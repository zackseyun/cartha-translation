theological_decisions:
- issue: Rendering ἐθνῶν in a Jewish cultic profanation context
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  - pagans
  rationale: The verse contrasts the holy sanctuary with non-Jewish intruders. 'Gentiles'
    preserves the ethnic-religious contrast without adding polemical force beyond
    the Greek.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether to make the sexual misconduct explicit in πλησιαζόντων
  chosen_reading: approaching women
  alternative_readings:
  - having sexual relations with women
  - consorting with women
  rationale: The context strongly suggests sexual misconduct, but the Greek expression
    itself is less explicit than a direct sexual verb. The main text preserves the
    source's level of explicitness rather than resolving it more strongly than warranted.
  doctrine_reference: Translation philosophy §3
