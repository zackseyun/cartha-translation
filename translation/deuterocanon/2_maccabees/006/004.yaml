id: 2MA.6.4
reference: 2 Maccabees 6:4
source:
  edition: lxx-swete-1909
  text: τὸ μὲν γὰρ ἱερὸν ἀσωτίας καὶ κώμων ὑπὸ τῶν ἐθνῶν ἐπεπλήρου θρασυνόντων μεθʼ
    ἑταίρων, καὶ ἐν τοῖς ἱεροῖς τερβόλων γυναιξὶ πλησιαζόντων, ἔτι δὲ τὰ μὴ καθήκοντα
    ἔνδον εἰσφερόντων.
  language: Greek
  pages:
  - 700
  confidence: high
  validation: agree
translation:
  text: For the sanctuary was filled by the Gentiles with debauchery and revelry,
    boldly sporting with prostitutes, approaching women in the sacred precincts, and
    even bringing inside things that were not proper.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'courtesans' for 'prostitutes'; the Greek ἑταίρων can denote women kept
      for sexual companionship.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'approaching women' likely implies sexually improper conduct
      in the sacred precincts, though the Greek wording is less explicit than 'having
      relations with women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερὸν
  chosen: sanctuary
  alternatives:
  - temple
  - holy place
  lexicon: LSJ
  rationale: In this context the term refers to the Jerusalem temple as a sacred space
    being profaned. 'Sanctuary' preserves the cultic sense and fits the immediate
    references to sacred precincts and interior profanation.
- source_word: ἀσωτίας
  chosen: debauchery
  alternatives:
  - dissipation
  - licentiousness
  - profligacy
  lexicon: LSJ
  rationale: The word denotes reckless moral excess. 'Debauchery' is natural modern
    English and conveys sexual and moral corruption without being overly technical.
- source_word: κώμων
  chosen: revelry
  alternatives:
  - carousing
  - wild partying
  lexicon: LSJ
  rationale: The plural refers to riotous festal behavior. 'Revelry' pairs well with
    'debauchery' and preserves the sense of noisy immoral celebration.
- source_word: ἐθνῶν
  chosen: Gentiles
  alternatives:
  - nations
  - pagans
  lexicon: LSJ
  rationale: In this Jewish context the term contrasts non-Jews with the holy sanctuary.
    'Gentiles' is the most contextually precise rendering; 'pagans' would add a religious
    judgment beyond the lexical value.
- source_word: θρασυνόντων
  chosen: boldly carousing
  alternatives:
  - behaving shamelessly
  - acting insolently
  lexicon: LSJ
  rationale: The participle conveys brazen, audacious conduct. Because it is followed
    by μεθʼ ἑταίρων, the rendering combines the insolent manner with the immediate
    action in idiomatic English.
- source_word: ἑταίρων
  chosen: prostitutes
  alternatives:
  - courtesans
  - companions
  lexicon: LSJ
  rationale: In Hellenistic usage ἑταίρα commonly means a courtesan/prostitute rather
    than a neutral female companion. The profanation context strongly supports the
    sexual sense.
- source_word: ἐν τοῖς ἱεροῖς
  chosen: in the sacred precincts
  alternatives:
  - in the holy places
  - in the temple courts
  lexicon: LSJ
  rationale: The plural likely refers to the temple's sacred areas more broadly rather
    than a single inner chamber. 'Sacred precincts' communicates plural sacred spaces
    without over-specifying architecture.
- source_word: τερβόλων γυναιξὶ πλησιαζόντων
  chosen: approaching women
  alternatives:
  - having relations with women
  - consorting with women
  lexicon: LSJ
  rationale: The phrase implies sexually improper contact in context, but the verb
    itself is 'approaching' or 'coming near.' The chosen rendering keeps the Greek
    wording while allowing the profaning implication to remain contextually clear.
- source_word: τὰ μὴ καθήκοντα
  chosen: things that were not proper
  alternatives:
  - improper things
  - unlawful things
  - things not fitting
  lexicon: LSJ
  rationale: The phrase is deliberately broad, referring to items or practices unfitting
    for the sanctuary. 'Not proper' preserves that breadth without narrowing it to
    a specific legal category not stated in the Greek.
- source_word: ἔνδον εἰσφερόντων
  chosen: bringing inside
  alternatives:
  - bringing into the interior
  - carrying in
  lexicon: LSJ
  rationale: The phrase emphasizes importation into the inner sacred area. 'Bringing
    inside' is clear, natural, and preserves the spatial profanation.
