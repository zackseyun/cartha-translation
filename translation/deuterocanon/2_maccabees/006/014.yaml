id: 2MA.6.14
reference: 2 Maccabees 6:14
source:
  edition: lxx-swete-1909
  text: οὐ γὰρ καθάπερ καὶ ἐπὶ τῶν ἄλλων ἐθνῶν ἀναμένει μακροθυμῶν ὁ δεσπό- της μέχρι
    τοῦ καταντήσαντας αὐτοὺς πρὸς ἐκπλήρωσιν ἁμαρτιῶν κολάσῃ, οὕτως καὶ ἐφʼ ἡμῶν ἔκρινεν
    εἶναι·
  language: Greek
  pages:
  - 701
  confidence: high
  validation: agree
translation:
  text: 'For he did not decide to deal with us as he does with the other nations:
    he waits patiently with them until they have reached the full measure of their
    sins, and then punishes them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the master'' or ''the sovereign'' (ὁ δεσπότης), referring to God;
      the main text uses ''he'' for natural English style.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναμένει
  chosen: he waits
  alternatives:
  - he delays
  - he endures
  lexicon: LSJ
  rationale: The verb denotes waiting or holding back for a point in time. In context
    it describes God's postponement of judgment on other nations until their sins
    are complete, so 'he waits' is the clearest natural English rendering.
- source_word: μακροθυμῶν
  chosen: patiently
  alternatives:
  - being patient
  - forbearing
  - long-suffering
  lexicon: LSJ
  rationale: This participle modifies the waiting and expresses divine patience or
    forbearance. Rendering it adverbially as 'patiently' gives smooth English while
    preserving the sense.
- source_word: ὁ δεσπότης
  chosen: he
  alternatives:
  - the Master
  - the Sovereign
  - the Lord
  lexicon: LSJ
  rationale: The Greek explicitly says 'the master/sovereign,' referring to God. Because
    English style is smoother with the pronoun after the initial clause, the subject
    is carried by 'he.' 'Lord' was avoided because the source is δεσπότης, not κύριος;
    the distinction is preserved here in the rationale.
- source_word: μέχρι τοῦ ... κολάσῃ
  chosen: until they have reached ... and then punishes them
  alternatives:
  - until he punishes them when they come to...
  - until they arrive at ... for punishment
  lexicon: LSJ
  rationale: 'The construction expresses the limit of divine patience: punishment
    comes only once they have arrived at the specified condition. English idiom is
    best served by making the sequence explicit.'
- source_word: καταντήσαντας αὐτοὺς πρὸς ἐκπλήρωσιν ἁμαρτιῶν
  chosen: they have reached the full measure of their sins
  alternatives:
  - they have come to the completion of sins
  - they have reached the fullness of sins
  - their sins are filled up
  lexicon: LSJ
  rationale: The phrase means arriving at the completion or full extent of sins. 'Full
    measure of their sins' is idiomatic English that preserves the idea of sins reaching
    a divinely tolerated limit.
- source_word: κολάσῃ
  chosen: punishes
  alternatives:
  - chastises
  - brings punishment on
  lexicon: LSJ
  rationale: The verb denotes punitive action. 'Punishes' is the most direct and accessible
    rendering in modern English.
- source_word: οὕτως καὶ ἐφʼ ἡμῶν ἔκρινεν εἶναι
  chosen: he did not decide to deal with us as he does with the other nations
  alternatives:
  - he did not judge it right to act thus with us
  - he did not determine that it should be so in our case
  lexicon: LSJ
  rationale: The Greek states that God judged or decided that this pattern would not
    apply in Israel's case. Because English requires the contrast to be made explicit,
    'to deal with us as he does with the other nations' brings out the implied comparison
    from οὐ ... οὕτως.
