theological_decisions:
- issue: Divine patience toward the nations versus Israel
  chosen_reading: The verse contrasts God's delayed punishment of other nations until
    their sins are full with his different, earlier disciplinary dealing with Israel.
  alternative_readings:
  - The verse could be rendered more literally without making the implied contrast
    explicit.
  rationale: The Greek comparison is somewhat compressed, but the sense is clear from
    οὐ ... καθάπερ ... οὕτως ... ἐφʼ ἡμῶν. The translation makes the contrast explicit
    without importing extra doctrine beyond the verse's own logic.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
