id: 2MA.6.18
reference: 2 Maccabees 6:18
source:
  edition: lxx-swete-1909
  text: Ἐλεάζαρός τις τῶν πρωτευόντων γραμματέων, ἀνὴρ ἤδη προβεβηκὼς τὴν ἡλικίαν
    καὶ τὴν πρόσοψιν τοῦ προσώπου κάλλιστος, ἀναχαινόμενον ἠναγκάζετο φαγεῖν ὕειον
    κρέας.
  language: Greek
  pages:
  - 701
  confidence: high
  validation: agree
translation:
  text: A certain Eleazar, one of the leading scribes, a man already advanced in age
    and most handsome in appearance, was being forced, with his mouth pried open,
    to eat pork.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'swine's flesh.' The Greek literally refers to pig flesh; 'pork' is the
      natural modern English equivalent.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλεάζαρός
  chosen: Eleazar
  lexicon: LSJ
  rationale: Proper name transliterated by standard English convention, following
    project policy to transliterate names rather than translate them.
- source_word: τις
  chosen: a certain
  alternatives:
  - one
  - someone
  lexicon: LSJ
  rationale: Indefinite τις introduces the figure narratively; 'a certain' preserves
    the Greek's idiomatic introduction better than the flatter 'one'.
- source_word: τῶν πρωτευόντων γραμματέων
  chosen: one of the leading scribes
  alternatives:
  - one of the principal scribes
  - one of the foremost scribes
  lexicon: LSJ
  rationale: πρωτευόντων conveys prominence or leadership; 'leading' is natural modern
    English while retaining status. γραμματέων is rendered 'scribes' rather than a
    more interpretive term like 'lawyers' or 'teachers'.
- source_word: ἀνὴρ
  chosen: a man
  alternatives:
  - a person
  lexicon: LSJ
  rationale: Gender-accurate rendering is appropriate here because the referent is
    specifically male and individualized.
- source_word: ἤδη προβεβηκὼς τὴν ἡλικίαν
  chosen: already advanced in age
  alternatives:
  - already far advanced in years
  - already old
  lexicon: LSJ
  rationale: The participial phrase indicates that he had progressed well into old
    age. 'Advanced in age' is idiomatic and dignified without over-paraphrasing.
- source_word: τὴν πρόσοψιν τοῦ προσώπου κάλλιστος
  chosen: most handsome in appearance
  alternatives:
  - very noble in countenance
  - most beautiful of face
  - fine-looking in appearance
  lexicon: LSJ
  rationale: The Greek explicitly refers to outward appearance/face and uses a superlative.
    'Most handsome in appearance' preserves the focus on visible bearing. More interpretive
    renderings like 'noble in countenance' import moral connotations not stated by
    the Greek.
- source_word: ἀναχαινόμενον
  chosen: with his mouth pried open
  alternatives:
  - being forced open at the mouth
  - gagging open
  lexicon: LSJ
  rationale: The participle describes his mouth being opened by force. Rendering it
    adverbially in English clarifies the physical coercion while staying close to
    the sense.
- source_word: ἠναγκάζετο
  chosen: was being forced
  alternatives:
  - was compelled
  - was constrained
  lexicon: LSJ
  rationale: The imperfect passive highlights ongoing coercion. 'Was being forced'
    captures both the passive and the durative aspect naturally.
- source_word: φαγεῖν
  chosen: to eat
  alternatives:
  - to consume
  lexicon: LSJ
  rationale: Simple infinitive of eating; no reason to elevate diction.
- source_word: ὕειον κρέας
  chosen: pork
  alternatives:
  - swine's flesh
  - pig meat
  lexicon: LSJ
  rationale: The phrase means pig flesh. 'Pork' is concise, natural modern English,
    and preserves the dietary offense in context. 'Swine's flesh' is more traditional
    but unnecessarily archaic.
