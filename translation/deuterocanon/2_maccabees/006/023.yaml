theological_decisions:
- issue: Rendering of ᾅδης
  chosen_reading: Hades
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The Greek names the underworld/realm of the dead. 'Hades' is the most
    transparent rendering and avoids conflating the term with final judgment or hell.
    A footnote preserves the explanatory alternative.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering of θεοκτίστου νομοθεσίας
  chosen_reading: the holy and God-given law
  alternative_readings:
  - the holy and divinely established law
  rationale: The phrase emphasizes divine origin and sanctity of the law without requiring
    a wooden rendering of νομοθεσία as 'legislation.' 'God-given law' is faithful
    and readable.
  doctrine_reference: Readable modern English, not archaic or academic; optimal equivalence.
