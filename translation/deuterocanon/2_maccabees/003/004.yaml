theological_decisions:
- issue: Nature of Simon's office in relation to the temple
  chosen_reading: Simon is presented as an officially appointed temple overseer, not
    as a priestly title.
  alternative_readings:
  - Simon as 'protector' of the temple in a broader patronal sense
  rationale: The Greek emphasizes an appointed supervisory role (προστάτης ... καθεσταμένος).
    The verse does not itself assign him priestly status, so the translation avoids
    importing that claim.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; do not import doctrinal claims the text does not make.'
