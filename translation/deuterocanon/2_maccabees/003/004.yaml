id: 2MA.3.4
reference: 2 Maccabees 3:4
source:
  edition: lxx-swete-1909
  text: Σίμων δέ τις ἐκ τῆς Βενιαμεὶν φυλῆς προστάτης τοῦ ἱεροῦ καθεσταμένος, διηχθῆναι
    τῷ ἀρχιερεῖ περὶ τῆς κατὰ τὴν πόλιν ἀγορανομίας.
  language: Greek
  pages:
  - 690
  confidence: high
  validation: agree
translation:
  text: But a certain Simon, of the tribe of Benjamin, having been appointed overseer
    of the temple, was at odds with the high priest about the administration of the
    market in the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'market oversight' or 'market regulation.' The Greek term refers to civic
      supervision connected with the marketplace.
    reason: lexical_alternative
lexical_decisions:
- source_word: προστάτης
  chosen: overseer
  alternatives:
  - guardian
  - protector
  - superintendent
  lexicon: LSJ
  rationale: The term denotes one set over something in a supervisory/protective role.
    'Overseer' fits the administrative context of the temple better than the more
    martial 'protector' or the vaguer 'guardian'.
- source_word: τοῦ ἱεροῦ
  chosen: of the temple
  alternatives:
  - of the sanctuary
  - of the holy place
  lexicon: LSJ
  rationale: ἱερόν commonly refers to the temple complex rather than only the inner
    sanctuary. 'Temple' is the clearest natural English rendering here.
- source_word: καθεσταμένος
  chosen: having been appointed
  alternatives:
  - having been established
  - being placed
  - having been put in charge
  lexicon: LSJ
  rationale: The participle indicates an installed or appointed status. 'Having been
    appointed' makes the official nature of Simon's role explicit in idiomatic English.
- source_word: διηχθῆναι
  chosen: was at odds
  alternatives:
  - had a quarrel
  - was in conflict
  - was hostile
  lexicon: LSJ
  rationale: The infinitive in context conveys being in dispute or conflict with the
    high priest. 'Was at odds' preserves the sense without overstating it as open
    hostility.
- source_word: ἀρχιερεῖ
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: LSJ
  rationale: Standard and contextually precise rendering for the Jewish office.
- source_word: ἀγορανομίας
  chosen: the administration of the market
  alternatives:
  - market regulation
  - market oversight
  - agoranomy
  lexicon: LSJ
  rationale: The noun refers to oversight/regulation connected with the marketplace.
    Because the phrase concerns civic administration in the city, 'the administration
    of the market' is more intelligible than a transliteration and more specific than
    simply 'oversight'.
- source_word: κατὰ τὴν πόλιν
  chosen: in the city
  alternatives:
  - throughout the city
  - of the city
  lexicon: LSJ
  rationale: In this construction the phrase locates the sphere of the ἀγορανομία.
    'In the city' is the most natural concise rendering.
