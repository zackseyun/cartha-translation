id: 2MA.3.3
reference: 2 Maccabees 3:3
source:
  edition: lxx-swete-1909
  text: ὥστε καὶ Σέλευκον τὸν τῆς Ἀσίας βασιλέα χορηγεῖν ἐκ τῶν ἰδίων προσόδων πάντα
    τὰ πρὸς τὰς λειτουργίας τῶν θυσιῶν ἐπιβάλλοντα δαπανήματα.
  language: Greek
  pages:
  - 690
  confidence: high
  validation: agree
translation:
  text: so that even Seleucus, the king of Asia, used to provide from his own revenues
    all the expenses that fell due for the services of the sacrifices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the expenses required for the sacrificial services.'
    reason: lexical_alternative
  - marker: b
    text: '''Asia'' here refers to the Seleucid king''s Asian realm in Hellenistic
      usage, not the modern continent in its full sense.'
    reason: cultural_note
lexical_decisions:
- source_word: χορηγεῖν
  chosen: used to provide
  alternatives:
  - provide
  - supply
  - defray
  lexicon: LSJ
  rationale: The infinitive denotes furnishing or supplying at one's own expense.
    'Used to provide' captures the imperfective/background sense in context after
    ὥστε and reads naturally in English without losing the idea of financial support.
- source_word: ἐκ τῶν ἰδίων προσόδων
  chosen: from his own revenues
  alternatives:
  - from his own income
  - from his own resources
  lexicon: LSJ
  rationale: πρόσοδοι refers to revenues/income, especially royal receipts. 'His own
    revenues' preserves the fiscal nuance better than the broader 'resources.'
- source_word: λειτουργίας
  chosen: services
  alternatives:
  - ministries
  - public services
  - ritual services
  lexicon: LSJ
  rationale: In this temple context λειτουργίαι refers to the cultic services connected
    with sacrifice. 'Services' is clear modern English and avoids importing later
    ecclesiastical jargon; the sacrificial context is specified by the following genitive.
- source_word: τῶν θυσιῶν
  chosen: of the sacrifices
  alternatives:
  - for the sacrifices
  - sacrificial
  lexicon: LSJ
  rationale: The genitive is retained straightforwardly. 'Of the sacrifices' keeps
    the close connection to the temple rites without overinterpreting the syntactic
    relation.
- source_word: ἐπιβάλλοντα δαπανήματα
  chosen: the expenses that fell due
  alternatives:
  - the necessary expenses
  - the expenses incumbent
  - the expenses involved
  lexicon: LSJ
  rationale: ἐπιβάλλοντα conveys what is incumbent, imposed, or falling to one's charge.
    'That fell due' expresses obligation and financial liability in idiomatic English
    better than a wooden 'incumbent expenses.'
- source_word: ὥστε καὶ
  chosen: so that even
  alternatives:
  - with the result that even
  - so that
  lexicon: LSJ
  rationale: This marks the consequence of the prior description of the temple's good
    order and reputation. 'So that even' preserves both result and the emphatic καί.
- source_word: τὸν τῆς Ἀσίας βασιλέα
  chosen: the king of Asia
  alternatives:
  - Asia's king
  - the king over Asia
  lexicon: LSJ
  rationale: A literal rendering is best here. In Hellenistic usage this refers to
    the Seleucid ruler's Asian realm, not the modern continent in a strict geographic
    sense, but the standard historical title is adequately conveyed by 'the king of
    Asia.'
