id: 2MA.3.18
reference: 2 Maccabees 3:18
source:
  edition: lxx-swete-1909
  text: οἱ δὲ ἐκ τῶν οἰκιῶν ἀγεληδὸν ἐξεπήδων ἐπὶ πανδήμῳ ἱκετείᾳ, διὰ τὸ μὴ μέλλειν
    εἰς καταφρόνησιν ἔρχεσθαι τὸν τόπον.
  language: Greek
  pages:
  - 691
  confidence: high
  validation: agree
translation:
  text: And those from the houses were rushing out in groups for a public supplication,
    because the place was about to come into contempt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the temple precinct; the Greek says simply 'the place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἐκ τῶν οἰκιῶν
  chosen: those from the houses
  alternatives:
  - those from their houses
  - the people from the houses
  - those in the houses
  lexicon: LSJ
  rationale: The phrase refers collectively to inhabitants emerging from their homes.
    'Those from the houses' stays close to the Greek while remaining intelligible;
    'their' is not explicit in the Greek.
- source_word: ἀγεληδὸν
  chosen: in groups
  alternatives:
  - in droves
  - in herds
  - in crowds
  lexicon: LSJ
  rationale: The adverb literally suggests movement in herds/flocks, but in English
    that would sound overly animalizing here. 'In groups' preserves the collective
    sense without importing an inappropriate tone; 'in droves' is possible but slightly
    more idiomatic than needed.
- source_word: ἐξεπήδων
  chosen: were rushing out
  alternatives:
  - were leaping out
  - were pouring out
  - were running out
  lexicon: LSJ
  rationale: The imperfect conveys ongoing action, and the verb has a vivid sense
    of springing or darting out. 'Were rushing out' captures the urgency in natural
    English better than the more wooden 'were leaping out.'
- source_word: ἐπὶ πανδήμῳ ἱκετείᾳ
  chosen: for a public supplication
  alternatives:
  - for a common entreaty
  - for a citywide plea
  - for public petition
  lexicon: LSJ
  rationale: ἱκετεία denotes supplication/entreaty, often in a solemn or desperate
    sense. πανδήμῳ indicates something done by all the people or publicly. 'Public
    supplication' preserves both the communal and solemn dimensions.
- source_word: διὰ τὸ μὴ μέλλειν
  chosen: because ... was about to
  alternatives:
  - because ... was not going to delay in
  - because ... was on the point of
  lexicon: LSJ
  rationale: The construction expresses imminent prospect. Rendering it as 'was about
    to' is idiomatic and fits the infinitive phrase that follows.
- source_word: εἰς καταφρόνησιν ἔρχεσθαι
  chosen: to come into contempt
  alternatives:
  - to be treated with contempt
  - to fall into disgrace
  - to be despised
  lexicon: LSJ
  rationale: The idiom literally means 'to come into contempt.' In context it refers
    to the temple/place facing dishonor. The chosen rendering stays close to the Greek
    while remaining clear.
- source_word: τὸν τόπον
  chosen: the place
  alternatives:
  - the sanctuary
  - the temple place
  - the holy place
  lexicon: LSJ
  rationale: Literally the Greek says 'the place.' In this context it refers to the
    temple precinct, but the source uses the more general term τόπος. 'The place'
    preserves the wording and lets the context identify it.
