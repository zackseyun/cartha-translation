id: 2MA.3.20
reference: 2 Maccabees 3:20
source:
  edition: lxx-swete-1909
  text: πᾶσαι δὲ προτείνουσαι τὰς χεῖρας εἰς τὸν οὐρανὸν ἐποιοῦντο τὴν λιτανείαν.
  language: Greek
  pages:
  - 691
  confidence: high
  validation: agree
translation:
  text: And all of them, stretching out their hands toward heaven, were making supplication.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the women,' since the Greek adjective is feminine plural and likely
      refers to the women in the preceding context.
    reason: lexical_alternative
  - marker: b
    text: The Greek term here means earnest petition or supplication, not necessarily
      a formal 'litany' in the later ecclesiastical sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσαι
  chosen: all of them
  alternatives:
  - all
  - all the women
  lexicon: LSJ
  rationale: The feminine plural form likely refers back to the women mentioned in
    the immediate context, but English can render the sense naturally as 'all of them'
    without over-specifying when the antecedent is supplied by context. 'All the women'
    is possible, but the pronoun-like rendering keeps the flow while preserving the
    collective scope.
- source_word: προτείνουσαι
  chosen: stretching out
  alternatives:
  - extending
  - holding out
  lexicon: LSJ
  rationale: The participle denotes extending forward; 'stretching out' is idiomatic
    in English for hands raised in prayer and fits the physical gesture described.
- source_word: τὰς χεῖρας
  chosen: their hands
  alternatives:
  - the hands
  lexicon: LSJ
  rationale: Greek uses the article, but idiomatic English supplies the possessive
    with body parts in this construction.
- source_word: εἰς τὸν οὐρανόν
  chosen: toward heaven
  alternatives:
  - to heaven
  - toward the sky
  lexicon: LSJ
  rationale: In a prayer context, οὐρανός here is best rendered 'heaven' rather than
    merely 'sky.' 'Toward' reflects the directional force of εἰς with the gesture
    of uplifted hands.
- source_word: ἐποιοῦντο
  chosen: were making
  alternatives:
  - made
  - were offering
  lexicon: LSJ
  rationale: The imperfect middle indicates ongoing action in past time. 'Were making'
    preserves the progressive sense better than a simple past.
- source_word: τὴν λιτανείαν
  chosen: supplication
  alternatives:
  - entreaty
  - litany
  - prayer
  lexicon: LSJ
  rationale: The noun denotes earnest petition or supplication. Although 'litany'
    is etymologically related, in modern English it suggests a fixed responsive form
    and would mislead here. 'Supplication' best conveys urgent prayer.
