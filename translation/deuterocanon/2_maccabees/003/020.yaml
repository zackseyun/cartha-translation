theological_decisions:
- issue: Rendering οὐρανός in a prayer gesture
  chosen_reading: heaven
  alternative_readings:
  - sky
  rationale: Because the verse depicts prayerful appeal with hands raised, the referent
    is not merely the physical sky but heaven as the divine sphere toward which prayer
    is directed. This reflects context rather than importing extra doctrine.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English'
