id: 2MA.3.1
reference: 2 Maccabees 3:1
source:
  edition: lxx-swete-1909
  text: Τῆς ἁγίας πόλεως κατοικουμένης μετὰ πάσης εἰρήνης, καὶ τῶν νόμων ὅτι κάλλιστα
    συντηρουμένων διὰ τὴν Ὀνίου τοῦ ἀρχιερέως
  language: Greek
  pages:
  - 690
  confidence: high
  validation: minor_mismatch
translation:
  text: While the holy city was inhabited in complete peace, and the laws were being
    kept in the best way because of Onias the high priest,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the laws were being observed very well.' The Greek adverb κάλλιστα can
      be rendered 'very well' or 'in the best way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῆς ἁγίας πόλεως
  chosen: the holy city
  alternatives:
  - the sacred city
  lexicon: LSJ
  rationale: ἁγίας modifies πόλεως straightforwardly; 'holy city' is the natural English
    equivalent and preserves the religious character without sounding overly formal.
- source_word: κατοικουμένης
  chosen: was inhabited
  alternatives:
  - was settled
  - was populated
  - was being inhabited
  lexicon: LSJ
  rationale: The genitive absolute participle indicates the city's inhabited condition/state.
    'Was inhabited' is idiomatic English and preserves the stative sense better than
    a more active paraphrase.
- source_word: μετὰ πάσης εἰρήνης
  chosen: in complete peace
  alternatives:
  - with all peace
  - in all peace
  - in full peace
  lexicon: LSJ
  rationale: The phrase is idiomatic, expressing comprehensive peace. 'In complete
    peace' communicates the force of πάσης naturally in modern English.
- source_word: τῶν νόμων
  chosen: the laws
  alternatives:
  - the law
  lexicon: LSJ
  rationale: The plural νόμων should be retained as 'the laws,' referring to the Jewish
    legal ordinances collectively rather than abstract 'law'.
- source_word: ὅτι κάλλιστα
  chosen: in the best way
  alternatives:
  - very well
  - excellently
  - most nobly
  lexicon: LSJ
  rationale: κάλλιστα is the superlative adverb ('best, very well'). 'In the best
    way' keeps the superlative force and fits the passive participle that follows.
- source_word: συντηρουμένων
  chosen: were being kept
  alternatives:
  - were being maintained
  - were being observed
  - were being preserved
  lexicon: LSJ
  rationale: In context of laws, 'kept' or 'observed' are both possible. 'Were being
    kept' is slightly more formal and aligns well with legal observance while preserving
    the passive participial construction.
- source_word: διὰ τὴν Ὀνίου τοῦ ἀρχιερέως
  chosen: because of Onias the high priest
  alternatives:
  - through Onias the high priest
  - on account of Onias the high priest
  lexicon: LSJ
  rationale: διά with the accusative commonly expresses cause. The phrase attributes
    the peaceful and law-keeping condition causally to Onias. 'Because of' is the
    clearest modern rendering. Ὀνίου is transliterated as 'Onias' per project policy
    on names.
