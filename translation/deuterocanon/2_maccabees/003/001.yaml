theological_decisions:
- issue: Causal force of διά with Onias
  chosen_reading: The city's peace and the observance of the laws are presented as
    occurring because of Onias the high priest.
  alternative_readings:
  - through Onias the high priest
  rationale: The Greek most naturally expresses cause rather than agency alone. This
    does not import a theological claim beyond the text; it simply reflects the narrative
    commendation of Onias' leadership.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source meaning without importing doctrinal claims.'
