theological_decisions:
- issue: Moral characterization of Simon in δυσσεβής
  chosen_reading: the ungodly Simon
  alternative_readings:
  - the impious Simon
  - wicked Simon
  rationale: This is not a major doctrinal crux, but it is a value-laden descriptor.
    'Ungodly' preserves the religious-moral force without importing extra theological
    claims.
