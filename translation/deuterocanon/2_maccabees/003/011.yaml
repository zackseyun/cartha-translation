id: 2MA.3.11
reference: 2 Maccabees 3:11
source:
  edition: lxx-swete-1909
  text: τινὰ δὲ καὶ Ὑρκανοῦ τοῦ Τωβίου σφόδρα ἀνδρὸς ἐν ὑπεροχῇ κειμένου· οὐχ οὕτως
    διαβάλλων ὁ δυσσεβὴς Σίμων· τὰ δὲ πάντα ἀργυρίου τετρακόσια τάλαντα, χρυσίου δὲ
    διακόσια·
  language: Greek
  pages:
  - 691
  confidence: high
  validation: agree
translation:
  text: and some also belonging to Hyrcanus son of Tobias, a man holding a very high
    position. The ungodly Simon was not slandering to that extent. Altogether there
    were four hundred talents of silver and two hundred of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'two hundred of gold'; 'talents' is understood from the
      preceding phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὰ
  chosen: some
  alternatives:
  - certain amounts
  - some funds
  lexicon: LSJ
  rationale: Indefinite pronoun referring to an unspecified portion of the deposited
    money; 'some' is the most natural concise rendering in context.
- source_word: Ὑρκανοῦ τοῦ Τωβίου
  chosen: Hyrcanus son of Tobias
  alternatives:
  - Hyrcanus of Tobias
  - Hyrcanus, the son of Tobit/Tobias
  lexicon: LSJ
  rationale: A personal name plus patronymic genitive. 'Son of Tobias' makes the relationship
    explicit in idiomatic English without overtranslating.
- source_word: σφόδρα
  chosen: very
  alternatives:
  - exceedingly
  - greatly
  lexicon: LSJ
  rationale: Intensifies the following description; 'very' is clear modern English.
- source_word: ἀνδρὸς ἐν ὑπεροχῇ κειμένου
  chosen: a man holding a very high position
  alternatives:
  - a man lying in eminence
  - a man placed in prominence
  - a man of very high rank
  lexicon: LSJ
  rationale: The phrase describes social standing/status. 'Holding a very high position'
    captures ἐν ὑπεροχῇ idiomatically while preserving the sense of rank rather than
    physical posture implied by the literal 'lying/being situated' of κειμένου.
- source_word: οὐχ οὕτως διαβάλλων
  chosen: was not slandering to that extent
  alternatives:
  - was not misrepresenting things so much
  - was not making such false accusations
  lexicon: LSJ
  rationale: διαβάλλω commonly means to slander, accuse falsely, or misrepresent.
    Here Simon's report was maliciously exaggerated, but not to the point of denying
    the existence of any private deposits. 'Slandering to that extent' preserves both
    the hostile character and the comparative force of οὐχ οὕτως.
- source_word: ὁ δυσσεβὴς Σίμων
  chosen: the ungodly Simon
  alternatives:
  - the impious Simon
  - wicked Simon
  lexicon: LSJ
  rationale: δυσσεβής denotes impiety/lack of reverence. 'Ungodly' is natural English
    and preserves the moral-religious judgment.
- source_word: τὰ δὲ πάντα
  chosen: Altogether
  alternatives:
  - and the whole amount
  - in all
  lexicon: LSJ
  rationale: Summative phrase introducing the total quantity. 'Altogether' reads smoothly
    in English while preserving the accounting sense.
- source_word: ἀργυρίου τετρακόσια τάλαντα
  chosen: four hundred talents of silver
  alternatives:
  - four hundred silver talents
  lexicon: LSJ
  rationale: Standard monetary/weight expression; English normally places the material
    after the number and unit.
- source_word: χρυσίου δὲ διακόσια
  chosen: two hundred of gold
  alternatives:
  - two hundred talents of gold
  lexicon: LSJ
  rationale: The noun 'talents' is omitted in Greek but naturally carried over from
    the previous phrase. In English the ellipsis can be preserved awkwardly ('two
    hundred of gold') or supplied for clarity; the main translation supplies 'talents'
    implicitly by parallel structure in context, but the lexical note records the
    ellipsis.
