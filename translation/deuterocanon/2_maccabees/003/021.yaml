id: 2MA.3.21
reference: 2 Maccabees 3:21
source:
  edition: lxx-swete-1909
  text: ἐλεεινὴ δὲ τὴν τοῦ πλήθους παμμιγῆ πρόπτωσιν, τήν τε τοῦ μεγάλως ἀγωνιῶντος
    ἀρχιερέως προσδο-
  language: Greek
  pages:
  - 691
  confidence: high
  validation: minor_mismatch
translation:
  text: Pitiful indeed was the complete collapse of the crowd, and the expectation
    of the high priest, who was in great agony—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek source line is truncated after προσδο-. The translation 'expectation'
      reflects the visible beginning of the word and the immediate syntax, but the
      exact form is not fully preserved in the provided line.
    reason: textual_variant
  - marker: b
    text: '''Collapse'' translates a term that can more literally suggest falling
      forward or prostration; the wording may include both physical falling and emotional
      breakdown.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεεινή
  chosen: Pitiful indeed
  alternatives:
  - Pitiable indeed
  - A pitiable sight was
  lexicon: LSJ
  rationale: Adjective meaning pitiable, miserable, lamentable. Rendered idiomatically
    as an exclamatory predicate to match the verbless Greek and retain the emotional
    force.
- source_word: τοῦ πλήθους
  chosen: of the crowd
  alternatives:
  - of the multitude
  - of the people
  lexicon: LSJ
  rationale: πλῆθος commonly denotes a crowd or multitude. 'Crowd' is natural modern
    English and fits the public scene.
- source_word: παμμιγῆ
  chosen: complete
  alternatives:
  - universal
  - altogether mixed
  - wholly shared
  lexicon: LSJ
  rationale: The adjective intensifies the noun, conveying totality or all-inclusiveness.
    In context with πρόπτωσις it describes the crowd's collapse as widespread/complete.
    'Complete' is clear English without overinterpreting the exact nuance.
- source_word: πρόπτωσιν
  chosen: collapse
  alternatives:
  - falling down
  - prostration
  - consternation
  lexicon: LSJ
  rationale: Literally a falling forward or prostration. Because the phrase describes
    the crowd's collective reaction, 'collapse' captures both the physical and emotional
    breakdown while remaining anchored to the image of falling.
- source_word: τοῦ μεγάλως ἀγωνιῶντος ἀρχιερέως
  chosen: of the high priest, who was in great agony
  alternatives:
  - of the high priest, who was greatly distressed
  - of the high priest in severe anguish
  lexicon: LSJ
  rationale: ἀγωνιάω denotes intense anxiety or anguish. 'In great agony' preserves
    the severity of μεγάλως and the participial force without flattening it to mild
    concern.
- source_word: προσδο-
  chosen: expectation
  alternatives:
  - anxious waiting
  - apprehension
  lexicon: LSJ
  rationale: The source line is cut off at προσδο-, almost certainly the beginning
    of a noun such as προσδοκία/προσδοκίαν ('expectation, anxious expectation'). Because
    the verse is incomplete in the provided witness, 'expectation' is the most conservative
    rendering, and the uncertainty is noted in a footnote.
