id: 2MA.3.7
reference: 2 Maccabees 3:7
source:
  edition: lxx-swete-1909
  text: συμμίξας δὲ Ἀπολλώνιος τῷ βασιλεῖ, περὶ τῶν μηνυθέντων αὐτῷ χρημάτων ἐνεφάνισεν·
    ὁ δὲ προχειρισάμενος Ἡλιό- δωρον τὸν ἐπὶ τῶν πραγμάτων ἀπέστειλεν, δοὺς ἐντολὰς
    τὴν τῶν προειρημένων χρημάτων ἐκκομιδὴν ποιήσασθαι.
  language: Greek
  pages:
  - 690
  confidence: high
  validation: agree
translation:
  text: After conferring with the king, Apollonius informed him about the money that
    had been reported to him. Then the king appointed Heliodorus, who was over the
    affairs of state, and sent him with orders to carry out the removal of the aforementioned
    money.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after meeting with the king' or 'after consulting the king.' The Greek
      participle suggests a formal audience or consultation.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the one over the affairs,' an administrative title for a high
      official overseeing state business.
    reason: cultural_note
  - marker: c
    text: Or 'to effect the carrying off of the aforementioned money.' The Greek emphasizes
      executing its removal from the place where it was kept.
    reason: lexical_alternative
lexical_decisions:
- source_word: συμμίξας
  chosen: After conferring with
  alternatives:
  - after meeting with
  - after consulting with
  - having spoken with
  lexicon: LSJ
  rationale: The participle indicates coming together and speaking with the king,
    not merely physical contact. 'After conferring with' captures the deliberative
    sense in natural English while preserving the temporal participial force.
- source_word: ἐνεφάνισεν
  chosen: informed
  alternatives:
  - reported
  - made known
  - disclosed
  lexicon: LSJ
  rationale: In context Apollonius presents information to the king about the funds.
    'Informed' is clear modern English and fits the administrative setting.
- source_word: μηνυθέντων
  chosen: had been reported
  alternatives:
  - had been disclosed
  - had been denounced
  - had been made known
  lexicon: LSJ
  rationale: The passive participle refers to money previously brought to Apollonius's
    attention. 'Reported' best fits the official tone without importing the stronger
    negative nuance of 'denounced.'
- source_word: χρημάτων
  chosen: money
  alternatives:
  - funds
  - wealth
  lexicon: LSJ
  rationale: The term refers here to specific temple funds or sums of money. 'Money'
    is straightforward and sufficiently precise in context.
- source_word: προχειρισάμενος
  chosen: appointed
  alternatives:
  - selected
  - designated
  - put in charge
  lexicon: LSJ
  rationale: The king formally chooses Heliodorus for a task. 'Appointed' conveys
    official designation better than the more generic 'selected.'
- source_word: τὸν ἐπὶ τῶν πραγμάτων
  chosen: who was over the affairs of state
  alternatives:
  - the one in charge of affairs
  - the administrator
  - the official over state business
  lexicon: LSJ
  rationale: This phrase is an administrative title indicating oversight of governmental
    matters. 'Who was over the affairs of state' preserves the literal structure while
    making the role intelligible.
- source_word: ἐκκομιδὴν
  chosen: the removal
  alternatives:
  - the carrying off
  - the extraction
  - the transport away
  lexicon: LSJ
  rationale: The noun denotes taking the money out from its present location. 'Removal'
    is idiomatic and leaves open whether the emphasis is seizure or transport, which
    the Greek itself does not fully specify.
- source_word: ποιήσασθαι
  chosen: to carry out
  alternatives:
  - to make
  - to effect
  - to accomplish
  lexicon: LSJ
  rationale: With ἐκκομιδήν, the infinitive forms an idiom meaning to effect or execute
    the removal. 'To carry out' renders the verbal force naturally in English.
- source_word: προειρημένων
  chosen: aforementioned
  alternatives:
  - previously mentioned
  - said before
  lexicon: LSJ
  rationale: The participle points back to the money already referred to. 'Aforementioned'
    preserves the formal administrative tone of the sentence.
