id: 2MA.3.31
reference: 2 Maccabees 3:31
source:
  edition: lxx-swete-1909
  text: Ταχὺ δέ τινες τῶν τῷ Ἡλιοδώρῳ συνηθῶν ἠξίουν τὸν Ὀνίαν ἐπικαλέσασθαι τὸν ὕψιστον,
    καὶ τὸ ζῆν χαρίσασθαι τῷ παντελῶς ἐν ἐσχάτῃ πνοῇ κειμένῳ.
  language: Greek
  pages:
  - 692
  confidence: high
  validation: agree
translation:
  text: But quickly some of Heliodorus's companions were urging Onias to call upon
    the Most High and grant life to the one who was lying at his very last breath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to invoke the Most High.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to the one lying at the last breath,' that is, at the point
      of death.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταχὺ
  chosen: quickly
  alternatives:
  - at once
  - immediately
  lexicon: LSJ
  rationale: Adverb marking prompt action; 'quickly' is natural modern English and
    preserves the urgency without overstating beyond the Greek.
- source_word: τινες τῶν τῷ Ἡλιοδώρῳ συνηθῶν
  chosen: some of Heliodorus's companions
  alternatives:
  - some of those accustomed to Heliodorus
  - some of Heliodorus's associates
  lexicon: LSJ
  rationale: The phrase denotes persons closely associated with Heliodorus. 'Companions'
    is idiomatic and fits the narrative context better than the more wooden 'those
    accustomed to.'
- source_word: ἠξίουν
  chosen: were urging
  alternatives:
  - were asking
  - were begging
  - were requesting
  lexicon: LSJ
  rationale: Imperfect tense suggests continued or repeated appeal. 'Were urging'
    captures both the ongoing aspect and the intensity of the request better than
    the flatter 'were asking.'
- source_word: ἐπικαλέσασθαι τὸν ὕψιστον
  chosen: to call upon the Most High
  alternatives:
  - to invoke the Most High
  - to appeal to the Most High
  lexicon: LSJ
  rationale: ἐπικαλέομαι in religious context commonly means invoke or call upon.
    'Call upon' is clear, idiomatic, and preserves the prayerful sense. 'The Most
    High' is a standard rendering of τὸν ὕψιστον as a divine title.
- source_word: τὸ ζῆν χαρίσασθαι
  chosen: and grant life
  alternatives:
  - and graciously give life
  - and grant him to live
  lexicon: LSJ
  rationale: χαρίζομαι conveys gracious bestowal; with τὸ ζῆν it means to grant life
    or spare. 'Grant life' is concise and natural, while retaining the sense of life
    as a gift.
- source_word: τῷ παντελῶς ἐν ἐσχάτῃ πνοῇ κειμένῳ
  chosen: to the one who was lying at his very last breath
  alternatives:
  - to the man lying completely at his last breath
  - to the one lying at the point of death
  - to the one lying in his final breath
  lexicon: LSJ
  rationale: The participial phrase depicts someone stretched out in an extreme death-state.
    παντελῶς intensifies the condition; ἐν ἐσχάτῃ πνοῇ is literally 'at the last breath.'
    The chosen rendering preserves the vividness while remaining readable English.
