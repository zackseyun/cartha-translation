id: 2MA.3.2
reference: 2 Maccabees 3:2
source:
  edition: lxx-swete-1909
  text: εὐσέβειάν τε καὶ μισοπονηρίαν, συνέβαινεν καὶ αὐτοὺς τοὺς βασιλεῖς τιμᾶν τὸν
    τόπον, καὶ τὸ ἱερὸν ἀποστολαῖς ταῖς κρατίσταις δοξάζειν·
  language: Greek
  pages:
  - 690
  confidence: high
  validation: minor_mismatch
translation:
  text: Because of the piety and hatred of wickedness there, it came about that even
    the kings themselves honored the place and glorified the sanctuary with the finest
    gifts sent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the most splendid offerings sent.' The Greek ἀποστολαῖς can denote
      things sent as benefactions; the exact nuance is context-dependent.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσέβειαν
  chosen: piety
  alternatives:
  - reverence
  - godliness
  lexicon: LSJ
  rationale: εὐσέβεια denotes reverence toward God expressed in devout conduct. 'Piety'
    is concise and fits the temple context better than the more abstract 'godliness.'
- source_word: μισοπονηρίαν
  chosen: hatred of wickedness
  alternatives:
  - hatred of evil
  - abhorrence of wrongdoing
  lexicon: LSJ
  rationale: The compound literally expresses hatred of badness/wickedness. 'Hatred
    of wickedness' preserves the moral force and the noun form better than a looser
    paraphrase.
- source_word: συνέβαινεν
  chosen: it came about
  alternatives:
  - it happened
  - it resulted
  lexicon: LSJ
  rationale: The imperfect indicates a resulting state of affairs or customary consequence.
    'It came about' captures the idiomatic sense without over-literal awkwardness.
- source_word: τιμᾶν
  chosen: honored
  alternatives:
  - esteemed
  - paid honor to
  lexicon: LSJ
  rationale: The verb means to honor or value highly. 'Honored' is natural English
    and preserves the public respect shown by kings toward the temple site.
- source_word: τὸν τόπον
  chosen: the place
  alternatives:
  - the site
  - this place
  lexicon: LSJ
  rationale: The Greek says simply 'the place,' a reverential way of referring to
    the temple location. Retaining 'place' preserves the source wording and tone.
- source_word: τὸ ἱερὸν
  chosen: the sanctuary
  alternatives:
  - the temple
  - the holy place
  lexicon: LSJ
  rationale: ἱερόν can mean the temple complex or sacred precinct. 'Sanctuary' preserves
    the sacred sense while distinguishing it from the prior 'place'; 'temple' would
    also be possible but is slightly less precise in this paired construction.
- source_word: ἀποστολαῖς
  chosen: gifts sent
  alternatives:
  - offerings sent
  - dispatches
  - contributions
  lexicon: LSJ
  rationale: In context, the word refers to things sent as benefactions to the sanctuary,
    not merely 'missions' or 'embassies.' 'Gifts sent' makes explicit the sense required
    by the context while staying close to the underlying idea of sent offerings.
- source_word: ταῖς κρατίσταις
  chosen: the finest
  alternatives:
  - the greatest
  - the most splendid
  - the noblest
  lexicon: LSJ
  rationale: κρατίσταις is a superlative meaning strongest/best/most excellent. With
    benefactions, 'the finest' communicates quality naturally in English.
- source_word: δοξάζειν
  chosen: glorified
  alternatives:
  - honored
  - magnified
  lexicon: LSJ
  rationale: δοξάζω carries the sense of giving honor or splendor. Since τιμᾶν already
    covers 'honor,' 'glorified' preserves the distinction between the two verbs.
