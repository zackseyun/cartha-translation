theological_decisions:
- issue: Moral qualities as cause of royal favor
  chosen_reading: The verse states that because of the piety and hatred of wickedness
    associated with the temple, even kings honored it and adorned it with benefactions.
  alternative_readings:
  - The qualities may refer more specifically to the high priest or the city's administration
    rather than the temple generally.
  rationale: The immediate Greek construction presents εὐσέβειαν and μισοπονηρίαν
    as the causal basis for the following result. The verse itself does not explicitly
    identify a personal subject for these qualities, so the translation avoids importing
    one and leaves the reference broad, consistent with the temple-centered context.
  doctrine_reference: Preserve theological tension rather than resolve it.
