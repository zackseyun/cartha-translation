id: 2MA.3.34
reference: 2 Maccabees 3:34
source:
  edition: lxx-swete-1909
  text: σὺ δὲ ἐξ οὐρανοῦ μεμαστιγωμένος διάγγελλε πᾶσι τὸ μεγαλεῖον τοῦ θεοῦ κράτος.
    ταῦτα δὲ εἰπόντες ἀφανεῖς ἐγένοντο.
  language: Greek
  pages:
  - 693
  confidence: high
  validation: agree
translation:
  text: But you, having been flogged from heaven, proclaim to all the majestic power
    of God. And when they had said these things, they became invisible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the greatness of God's power.' The Greek expression combines terms for
      majesty/greatness and power/might.
    reason: lexical_alternative
  - marker: b
    text: Or 'they disappeared' / 'they vanished from sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεμαστιγωμένος
  chosen: having been flogged
  alternatives:
  - having been scourged
  - having been whipped
  - having been chastised
  lexicon: BDAG
  rationale: Perfect passive participle from μαστιγόω/μαστιγόω-related form, indicating
    Heliodorus as one who has undergone a severe beating. 'Flogged' is clear modern
    English and preserves the physical force better than the softer 'chastised.'
- source_word: ἐξ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - by heaven
  - from the sky
  lexicon: BDAG
  rationale: The phrase naturally denotes heavenly origin/source rather than mere
    location. 'From heaven' preserves the theological sense of divine agency without
    over-interpreting.
- source_word: διάγγελλε
  chosen: proclaim
  alternatives:
  - report
  - announce
  - declare abroad
  lexicon: BDAG
  rationale: Imperative calling for public dissemination. 'Proclaim' captures the
    formal, public force better than the flatter 'report.'
- source_word: πᾶσι
  chosen: to all
  alternatives:
  - to everyone
  - among all
  lexicon: BDAG
  rationale: Dative plural with διάγγελλε indicates the audience of the proclamation.
    'To all' is concise and sufficiently broad.
- source_word: τὸ μεγαλεῖον
  chosen: the majestic
  alternatives:
  - the greatness
  - the majesty
  - the magnificence
  lexicon: LSJ
  rationale: The noun denotes greatness/majesty. Because it modifies κράτος in apposition-like
    relation, 'the majestic power' gives natural English while preserving the elevated
    tone.
- source_word: κράτος
  chosen: power
  alternatives:
  - might
  - dominion
  - strength
  lexicon: BDAG
  rationale: In this context the word refers to God's manifested might. 'Power' is
    the most natural English equivalent; 'dominion' would shift toward rule rather
    than displayed force.
- source_word: ἀφανεῖς ἐγένοντο
  chosen: they became invisible
  alternatives:
  - they disappeared
  - they vanished from sight
  lexicon: LSJ
  rationale: Literally 'they became unseen/invisible.' The more literal rendering
    preserves the supernatural tone; 'disappeared' is possible but slightly less transparent
    to the Greek.
