theological_decisions:
- issue: Agency implied by 'from heaven' in the punishment of Heliodorus
  chosen_reading: Retain 'from heaven' without expanding to 'by God from heaven'
  alternative_readings:
  - having been punished by God from heaven
  - having been scourged by heaven
  rationale: The Greek explicitly says 'from heaven' and the context makes divine
    agency clear. The translation preserves the text's wording without importing an
    explanatory gloss.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the supernatural departure of the heavenly figures
  chosen_reading: they became invisible
  alternative_readings:
  - they disappeared
  - they vanished
  rationale: The Greek wording is more literally about becoming unseen than merely
    leaving. Preserving that wording maintains the narrative's supernatural texture
    without embellishment.
  doctrine_reference: Translation philosophy §1, §6
