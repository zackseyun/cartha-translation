id: 2MA.3.15
reference: 2 Maccabees 3:15
source:
  edition: lxx-swete-1909
  text: οἱ δὲ ἱερεῖς πρὸ τοῦ θυσιαστηρίου ἐν ταῖς ἱερατικαῖς στολαῖς ῥίψαντες ἑαυτοὺς
    ἐπεκαλοῦντο εἰς οὐρανὸν τὸν περὶ παρακαταθήκης νομοθετήσαντα τοῖς παρακαταθεμένοις
    ταῦτα σῶα διαφυλάξαι.
  language: Greek
  pages:
  - 691
  confidence: high
  validation: agree
translation:
  text: But the priests, having thrown themselves down before the altar in their priestly
    robes, were calling out to heaven to the one who had given the law concerning
    deposits, that he should keep these things safe for those who had deposited them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were calling upon heaven'—a reverential way of referring to God.
    reason: lexical_alternative
  - marker: b
    text: That is, property entrusted for safekeeping in the temple.
    reason: cultural_note
lexical_decisions:
- source_word: ῥίψαντες ἑαυτούς
  chosen: having thrown themselves down
  alternatives:
  - having cast themselves down
  - having flung themselves down
  - having prostrated themselves
  lexicon: LSJ
  rationale: The participial phrase is vivid and physical. 'Thrown themselves down'
    preserves the force of ῥίπτω without becoming unnatural English. 'Prostrated themselves'
    is smoother but loses the concrete imagery of the Greek.
- source_word: ἐπεκαλοῦντο εἰς οὐρανόν
  chosen: were calling out to heaven
  alternatives:
  - were calling upon heaven
  - were appealing to heaven
  lexicon: LSJ
  rationale: The imperfect indicates ongoing action, and 'calling out' captures the
    urgent prayerful appeal. 'To heaven' reflects the reverential circumlocution in
    the Greek rather than flattening it to simply 'to God.'
- source_word: τὸν περὶ παρακαταθήκης νομοθετήσαντα
  chosen: the one who had given the law concerning deposits
  alternatives:
  - the one who had legislated concerning trusts
  - the one who had ordained concerning entrusted property
  lexicon: LSJ
  rationale: νομοθετέω is best rendered with explicit legal force ('given the law').
    παρακαταθήκη refers to property entrusted for safekeeping; 'deposits' is concise
    and fits the legal context, though somewhat formal.
- source_word: παρακαταθήκης
  chosen: deposits
  alternatives:
  - entrusted property
  - trusts
  - things placed in safekeeping
  lexicon: LSJ
  rationale: The context is money or valuables placed in the temple for safekeeping.
    'Deposits' preserves the legal/economic sense and matches the repeated cognate
    wording in the verse.
- source_word: τοῖς παρακαταθεμένοις
  chosen: for those who had deposited them
  alternatives:
  - for those who had entrusted them
  - for the depositors
  lexicon: LSJ
  rationale: The dative refers to the persons who placed the goods in trust. 'Those
    who had deposited them' preserves the cognate link with παρακαταθήκη and keeps
    the sentence intelligible in modern English.
- source_word: ταῦτα σῶα διαφυλάξαι
  chosen: that he should keep these things safe
  alternatives:
  - to preserve these things unharmed
  - to guard these things intact
  lexicon: LSJ
  rationale: σῶα plus διαφυλάσσω emphasizes preservation from harm or loss. 'Keep
    these things safe' is natural English that retains the protective sense without
    paraphrasing.
- source_word: ἐν ταῖς ἱερατικαῖς στολαῖς
  chosen: in their priestly robes
  alternatives:
  - in priestly garments
  - wearing their sacerdotal vestments
  lexicon: LSJ
  rationale: A straightforward rendering that preserves the ceremonial setting. 'Priestly
    robes' is readable modern English and avoids archaic ecclesiastical diction.
