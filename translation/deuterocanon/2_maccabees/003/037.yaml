id: 2MA.3.37
reference: 2 Maccabees 3:37
source:
  edition: lxx-swete-1909
  text: Τοῦ δὲ βασιλέως ἐπερωτή-σαντος τὸν Ἡλιόδωρον ποῖός τις εἴη ἐπιτήδειος ἔτι
    ἅπαξ διαπεμφθῆναι εἰς Ἱεροσόλυμα, ἔφησεν,
  language: Greek
  pages:
  - 693
  confidence: high
  validation: minor_mismatch
translation:
  text: When the king asked Heliodorus who might be fit to be sent once more to Jerusalem,
    he said,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'who might be suitable still once to be sent to Jerusalem.'
      The rendering 'once more' expresses ἔτι ἅπαξ idiomatically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπερωτήσαντος
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: LSJ
  rationale: The genitive absolute introduces the circumstance of the king's action.
    'Asked' is natural modern English and adequately reflects the sense of putting
    a question to someone without overformalizing it.
- source_word: ποῖός τις εἴη
  chosen: who might be
  alternatives:
  - what sort of person might be
  - who could be
  lexicon: LSJ
  rationale: This phrase asks about the identity/quality of a suitable person. 'Who
    might be' keeps the indirect-question force and the potential nuance of εἴη in
    readable English.
- source_word: ἐπιτήδειος
  chosen: fit
  alternatives:
  - suitable
  - qualified
  - appropriate
  lexicon: LSJ
  rationale: The adjective denotes someone suitable or well fitted for a task. 'Fit'
    is concise and idiomatic here, while preserving the sense of suitability.
- source_word: ἔτι ἅπαξ
  chosen: once more
  alternatives:
  - yet once
  - one more time
  - again
  lexicon: LSJ
  rationale: The phrase means 'again' with emphasis on a further single occasion.
    'Once more' captures both the repetition and the singularity better than the flatter
    'again.'
- source_word: διαπεμφθῆναι
  chosen: to be sent
  alternatives:
  - to be dispatched
  - to be sent off
  lexicon: LSJ
  rationale: The passive infinitive refers to sending someone on a mission. 'To be
    sent' is straightforward and avoids unnecessary stiffness.
- source_word: εἰς Ἱεροσόλυμα
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: LSJ
  rationale: With a verb of sending, English idiom prefers 'to Jerusalem.'
- source_word: ἔφησεν
  chosen: he said
  alternatives:
  - he replied
  - he answered
  lexicon: LSJ
  rationale: The verb simply reports Heliodorus's response. 'He said' is the least
    interpretive choice; the next verse supplies the content.
