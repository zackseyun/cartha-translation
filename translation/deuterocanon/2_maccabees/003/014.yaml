id: 2MA.3.14
reference: 2 Maccabees 3:14
source:
  edition: lxx-swete-1909
  text: Ταξά- μενος δὲ ἡμέραν εἰσῄει τὴν περὶ τούτων ἐπίσκεψιν οἰκονομήσων· ἦν δὲ
    οὐ μικρὰ καθʼ ὅλην τὴν πόλιν ἀγωνία.
  language: Greek
  pages:
  - 691
  confidence: high
  validation: agree
translation:
  text: After setting a day, he went in to arrange the inspection concerning these
    matters; and there was no small anxiety throughout the whole city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'there was not small anxiety,' a litotes meaning considerable
      public distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταξάμενος
  chosen: After setting
  alternatives:
  - Having appointed
  - After appointing
  lexicon: LSJ
  rationale: Aorist middle participle of τάσσω here denotes fixing or appointing a
    time. 'After setting' is concise and natural in English while preserving the temporal
    force of the participle.
- source_word: ἡμέραν
  chosen: a day
  alternatives:
  - the day
  - a date
  lexicon: LSJ
  rationale: The anarthrous noun naturally reads as an indefinite 'a day,' i.e., a
    specified day/time, rather than a previously identified 'the day.'
- source_word: εἰσῄει
  chosen: he went in
  alternatives:
  - he entered
  - he was going in
  lexicon: LSJ
  rationale: The imperfect can be rendered simply in narrative English as 'went in.'
    'Entered' is possible, but 'went in' better preserves the motion nuance without
    overformalizing.
- source_word: τὴν περὶ τούτων ἐπίσκεψιν
  chosen: the inspection concerning these matters
  alternatives:
  - the inquiry about these things
  - the examination regarding these matters
  lexicon: LSJ
  rationale: ἐπίσκεψις here refers to an official inspection or investigation. 'Inspection'
    fits the temple-treasury context and keeps the administrative sense. περὶ τούτων
    is retained as 'concerning these matters' rather than generalized away.
- source_word: οἰκονομήσων
  chosen: to arrange
  alternatives:
  - to manage
  - to administer
  - to carry out
  lexicon: LSJ
  rationale: 'Future participle of οἰκονομέω conveys purpose: he went in with the
    intention of managing/arranging the inspection. ''Arrange'' is idiomatic in English
    for organizing an official proceeding.'
- source_word: οὐ μικρὰ
  chosen: no small
  alternatives:
  - great
  - considerable
  lexicon: LSJ
  rationale: The Greek litotes is worth preserving. 'No small' keeps the rhetorical
    force better than flattening it to 'great,' while remaining understandable in
    modern English.
- source_word: καθʼ ὅλην τὴν πόλιν
  chosen: throughout the whole city
  alternatives:
  - throughout the city
  - in the whole city
  lexicon: LSJ
  rationale: κατά with the accusative here distributes the anxiety across the city.
    'Throughout the whole city' preserves both the distributive sense and the emphasis
    of ὅλην.
- source_word: ἀγωνία
  chosen: anxiety
  alternatives:
  - distress
  - anguish
  - agitation
  lexicon: LSJ
  rationale: In context this denotes intense public apprehension over the impending
    inspection. 'Anxiety' best captures the communal state without overstating it
    to physical torment.
