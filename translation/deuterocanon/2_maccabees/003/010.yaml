id: 2MA.3.10
reference: 2 Maccabees 3:10
source:
  edition: lxx-swete-1909
  text: τοῦ δὲ ἀρχιερέως ὑποδείξαντος παρακαταθήκας εἶναι χρηῶν τε καὶ ὀρφανῶν,
  language: Greek
  pages:
  - 691
  confidence: high
  validation: agree
translation:
  text: But when the high priest pointed out that these were deposits belonging to
    widows and orphans,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deposits of widows and orphans.' The Greek genitives can be rendered
      more literally, but the sense is that the funds belonged to them.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ δὲ ἀρχιερέως
  chosen: But when the high priest
  alternatives:
  - and the high priest
  - then the high priest
  lexicon: LSJ
  rationale: Genitive absolute with δέ marking a transition in the narrative. Rendering
    with 'But when' captures both the circumstantial force and the mild contrast.
- source_word: ὑποδείξαντος
  chosen: pointed out
  alternatives:
  - explained
  - showed
  - indicated
  lexicon: LSJ
  rationale: Aorist participle of ὑποδείκνυμι, here meaning to indicate or make clear.
    'Pointed out' is natural English and preserves the sense of formally identifying
    the nature of the funds.
- source_word: παρακαταθήκας
  chosen: deposits
  alternatives:
  - trust funds
  - property held in trust
  - entrusted sums
  lexicon: LSJ
  rationale: The term denotes money or property placed with someone for safekeeping.
    'Deposits' is concise and accurate; more interpretive options like 'trust funds'
    risk importing modern legal categories.
- source_word: εἶναι
  chosen: were
  alternatives:
  - to be
  lexicon: LSJ
  rationale: Infinitive dependent on the participle in indirect discourse; idiomatic
    English uses finite 'were' after 'pointed out that'.
- source_word: χηρῶν τε καὶ ὀρφανῶν
  chosen: belonging to widows and orphans
  alternatives:
  - of widows and orphans
  - for widows and orphans
  lexicon: LSJ
  rationale: The genitives most naturally indicate whose deposits these were, not
    merely deposits intended for their benefit. 'Belonging to' makes the possessive
    force explicit in clear English.
