id: 2MA.3.13
reference: 2 Maccabees 3:13
source:
  edition: lxx-swete-1909
  text: ὁ δ᾽ ἕτερος, δι᾽ ἃς εἶχεν βασιλικὰς ἐντολάς, πάντως ἔλεγεν εἰς τὸ βασιλικὸν
    ἀναλημπτέα ταῦτα εἶναι.
  language: Greek
  pages:
  - 691
  confidence: high
  validation: minor_mismatch
translation:
  text: But the other, because he had royal orders, kept insisting that these things
    were to be taken into the royal treasury.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'into the king's treasury.' The Greek εἰς τὸ βασιλικὸν likely refers
      to the royal fisc or treasury in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δ᾽ ἕτερος
  chosen: But the other
  alternatives:
  - But the other man
  - But he on the other side
  lexicon: LSJ
  rationale: ἕτερος contrasts this speaker with the previous party in context. 'The
    other' preserves the adversative contrast without adding a noun not present in
    Greek.
- source_word: δι᾽ ἃς εἶχεν βασιλικὰς ἐντολάς
  chosen: because he had royal orders
  alternatives:
  - since he had royal commands
  - on account of the royal instructions he had
  lexicon: LSJ
  rationale: The phrase gives the grounds for his insistence. βασιλικάς modifies ἐντολάς
    as orders/commands from the king. 'Because he had royal orders' is natural English
    and keeps the causal force of διά with the relative pronoun.
- source_word: πάντως ἔλεγεν
  chosen: kept insisting
  alternatives:
  - was absolutely saying
  - insisted in every case
  - kept saying emphatically
  lexicon: LSJ
  rationale: πάντως adds force ('certainly,' 'by all means,' 'in any case') to the
    imperfect ἔλεγεν. 'Kept insisting' captures both the emphatic and iterative/imperfective
    sense better than a flat 'said'.
- source_word: εἰς τὸ βασιλικὸν
  chosen: into the royal treasury
  alternatives:
  - into the royal place
  - for the royal interest
  - into the king's treasury
  lexicon: LSJ
  rationale: In this financial-confiscation context, the neuter substantive βασιλικόν
    refers to the royal fisc/treasury rather than a generic 'royal place.' 'Royal
    treasury' makes the implied institutional sense explicit in idiomatic English.
- source_word: ἀναλημπτέα
  chosen: were to be taken
  alternatives:
  - must be taken up
  - were to be removed
  - had to be taken away
  lexicon: LSJ
  rationale: The verbal adjective expresses necessity or obligation. 'Were to be taken'
    preserves that sense without overtranslating into a stronger modal than the context
    requires.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these
  - this property
  lexicon: LSJ
  rationale: The demonstrative is plural and refers to the valuables under discussion.
    'These things' is formally accurate; in the running English sentence it remains
    clear from context what is meant.
