id: 2MA.3.36
reference: 2 Maccabees 3:36
source:
  edition: lxx-swete-1909
  text: ἐξεμαρτύρει δὲ πᾶσιν ἅπερ ἦν ὑπʼ ὄψιν τεθεαμένος ἔργα τοῦ μεγίστου θεοῦ.
  language: Greek
  pages:
  - 693
  confidence: high
  validation: minor_mismatch
translation:
  text: And he testified to everyone about the works of the greatest God that he had
    seen with his own eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the Most High God.' The Greek here uses 'greatest'
      (μεγίστου), not the usual word for 'highest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεμαρτύρει
  chosen: he testified
  alternatives:
  - he bore witness
  - he reported
  lexicon: BDAG
  rationale: The imperfect verb denotes ongoing or repeated witness/reporting. 'Testified'
    preserves the sense of bearing witness publicly, fitting the narrative context
    better than the flatter 'reported.'
- source_word: πᾶσιν
  chosen: to everyone
  alternatives:
  - to all
  - before all
  lexicon: BDAG
  rationale: Dative plural here indicates the audience of his testimony. 'To everyone'
    is natural modern English and preserves the universal scope.
- source_word: ἅπερ
  chosen: about the works ... that
  alternatives:
  - the things which
  - what
  lexicon: LSJ
  rationale: The relative pronoun links his testimony to the content seen. In English,
    the sense is best carried by restructuring the clause rather than preserving a
    wooden 'the things which.'
- source_word: ὑπʼ ὄψιν
  chosen: with his own eyes
  alternatives:
  - before his eyes
  - visibly
  lexicon: LSJ
  rationale: The idiom emphasizes direct personal sight. 'With his own eyes' conveys
    eyewitness force idiomatically in English.
- source_word: τεθεαμένος
  chosen: had seen
  alternatives:
  - had beheld
  - had observed
  lexicon: BDAG
  rationale: The perfect middle participle indicates completed personal seeing with
    continuing relevance. 'Had seen' is clear and natural; 'beheld' is too elevated
    for the project's style.
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  - acts
  lexicon: BDAG
  rationale: '''Works'' is a straightforward rendering for divine actions here. ''Acts''
    is possible, but ''works'' better reflects the lexical form without sounding archaic.'
- source_word: τοῦ μεγίστου θεοῦ
  chosen: of the greatest God
  alternatives:
  - of God Most High
  - of the Most High God
  lexicon: LSJ
  rationale: The Greek is literally 'of the greatest God.' While 'Most High God' is
    a familiar title in English, the superlative adjective here is μεγίστου, not ὑψίστου.
    The chosen rendering stays closer to the source wording.
