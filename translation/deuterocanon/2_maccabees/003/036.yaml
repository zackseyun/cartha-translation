theological_decisions:
- issue: Rendering the divine epithet μεγίστου θεοῦ
  chosen_reading: the greatest God
  alternative_readings:
  - the Most High God
  - God Most High
  rationale: The phrase is a superlative description of God, but the Greek adjective
    is 'greatest,' not the more conventional title 'Most High.' To avoid importing
    a traditional title not present in the text, the translation keeps the source's
    wording while preserving the familiar alternative in a footnote.
