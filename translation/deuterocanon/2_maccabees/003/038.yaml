theological_decisions:
- issue: Rendering θεοῦ δύναμιν in a temple-context statement about divine presence
  chosen_reading: some power of God
  alternative_readings:
  - a certain divine power
  - God's power
  rationale: The Greek says literally 'some power of God,' with τινα signaling an
    indefinite but real manifestation. The translation preserves the text's restraint
    rather than making it a fully defined doctrinal statement about God's presence.
  doctrine_reference: Preserve theological tension rather than resolve it.
