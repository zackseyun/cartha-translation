id: 2MA.3.38
reference: 2 Maccabees 3:38
source:
  edition: lxx-swete-1909
  text: Εἴ τινα ἔχεις πολέμιον ἢ πραγμάτων ἐπίβουλον, πέμψον αὐτὸν ἐκεῖ, καὶ μεμαστιγωμένον
    αὐτὸν προσδέξῃ, ἐάνπερ καὶ διασωθῇ, διὰ τὸ περὶ τὸν τόπον ἀληθῶς εἶναί τινα θεοῦ
    δύναμιν.
  language: Greek
  pages:
  - 693
  confidence: high
  validation: agree
translation:
  text: If you have any enemy or one plotting against your affairs, send him there,
    and you will receive him back flogged—if indeed he even survives—because there
    truly is some power of God about the place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'one scheming against your interests' for 'one plotting against your
      affairs.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'if indeed he even survives.' The line underscores the danger
      of encountering the divine power associated with that place.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολέμιον
  chosen: enemy
  alternatives:
  - foe
  - hostile person
  lexicon: LSJ
  rationale: The noun denotes an adversary or enemy. 'Enemy' is the most natural modern
    English equivalent and fits the personal sense in context.
- source_word: πραγμάτων ἐπίβουλον
  chosen: one plotting against your affairs
  alternatives:
  - one scheming against your interests
  - one treacherous in matters concerning you
  lexicon: LSJ
  rationale: ἐπίβουλος means plotting against, treacherous, or scheming; πραγμάτων
    broadens the object to one's matters, business, or affairs. 'Plotting against
    your affairs' preserves the concrete but somewhat broad Greek expression without
    over-specifying.
- source_word: πέμψον αὐτὸν ἐκεῖ
  chosen: send him there
  alternatives:
  - dispatch him there
  lexicon: LSJ
  rationale: A straightforward imperative; 'send him there' is idiomatic and sufficiently
    formal.
- source_word: μεμαστιγωμένον
  chosen: flogged
  alternatives:
  - whipped
  - scourged
  lexicon: LSJ
  rationale: Perfect passive participle from μαστιγόω, indicating a completed beating.
    'Flogged' is clear modern English and preserves the severity better than the milder
    'whipped.'
- source_word: προσδέξῃ
  chosen: you will receive him back
  alternatives:
  - you will receive him
  - you will welcome him back
  lexicon: LSJ
  rationale: In context, the sense is that the person sent away returns and is then
    received. 'Receive him back' makes the implied return explicit in natural English.
- source_word: ἐάνπερ καὶ διασωθῇ
  chosen: if indeed he even survives
  alternatives:
  - if indeed he is even preserved
  - provided he even gets through alive
  lexicon: LSJ
  rationale: διασῴζω here carries the sense of coming through safely or surviving.
    The particles intensify the condition; 'if indeed he even survives' captures the
    grim irony.
- source_word: διὰ τὸ ... εἶναί τινα θεοῦ δύναμιν
  chosen: because there truly is some power of God
  alternatives:
  - because there really is a certain divine power
  - because some power from God truly exists
  lexicon: LSJ
  rationale: 'The construction gives the reason: the place is attended by genuine
    divine power. Retaining ''some power of God'' reflects τινα without over-defining
    the expression.'
- source_word: περὶ τὸν τόπον
  chosen: about the place
  alternatives:
  - around the place
  - concerning that place
  - at that place
  lexicon: LSJ
  rationale: περί with the accusative here is spatial, indicating divine power in
    relation to the location. 'About the place' preserves the Greek's somewhat unusual
    spatial phrasing while remaining intelligible.
- source_word: ἀληθῶς
  chosen: truly
  alternatives:
  - really
  - in truth
  lexicon: LSJ
  rationale: The adverb emphasizes the reality of the divine power associated with
    the place. 'Truly' is concise and suitably weighty.
