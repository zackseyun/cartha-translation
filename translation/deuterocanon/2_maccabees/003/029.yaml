theological_decisions:
- issue: Rendering σωτηρία in a narrative judgment/healing context
  chosen_reading: rescue
  alternative_readings:
  - salvation
  - deliverance
  rationale: Although σωτηρία can carry theological weight, here the context is Heliodorus's
    immediate physical state after divine intervention. 'Rescue' best matches the
    situational sense while avoiding unnecessary doctrinal loading. 'Salvation' remains
    a viable lexical alternative and is preserved in the decision record.
  doctrine_reference: Translation philosophy §§1, 6
