id: 2MA.3.17
reference: 2 Maccabees 3:17
source:
  edition: lxx-swete-1909
  text: περικεχύτο γὰρ ἐπὶ τὸν ἄνδρα δέος τι καὶ φρικασμὸς σώματος, διʼ ὧν πρόδηλον
    ἐγίνετο τοῖς θεωροῦσιν τὸ κατὰ καρδίαν ἐνεστὸς ἄλγος.
  language: Greek
  pages:
  - 691
  confidence: high
  validation: agree
translation:
  text: For a certain dread and bodily trembling had come over the man, by which the
    pain present in his heart was becoming evident to those who were watching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the anguish in his heart' for τὸ κατὰ καρδίαν ἐνεστὸς ἄλγος; the Greek
      can denote inward emotional distress as well as pain more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: περικεχύτο
  chosen: had come over
  alternatives:
  - was poured over
  - had spread over
  - had overwhelmed
  lexicon: LSJ
  rationale: Perfect/passive-like form of περιχέω used idiomatically for an emotion
    enveloping someone. 'Had come over' gives natural English while preserving the
    sense that dread overtook him.
- source_word: δέος
  chosen: dread
  alternatives:
  - fear
  - terror
  lexicon: LSJ
  rationale: Conveys intense fear without overstating to full 'terror.' Paired with
    φρικασμός, it suggests a grave, ominous fear.
- source_word: τι
  chosen: a certain
  alternatives:
  - some
  - a kind of
  lexicon: LSJ
  rationale: The enclitic τις softens/specifies the noun phrase. 'A certain' preserves
    the Greek nuance better than omitting it entirely.
- source_word: φρικασμὸς σώματος
  chosen: bodily trembling
  alternatives:
  - shuddering of the body
  - physical trembling
  lexicon: LSJ
  rationale: The phrase denotes a bodily shudder or tremor. 'Bodily trembling' is
    concise, natural, and keeps the physical dimension explicit.
- source_word: διʼ ὧν
  chosen: by which
  alternatives:
  - through which
  - from which
  lexicon: LSJ
  rationale: Refers back to the visible dread and trembling as the means by which
    his inner anguish became apparent.
- source_word: πρόδηλον ἐγίνετο
  chosen: was becoming evident
  alternatives:
  - became clear
  - was plainly visible
  lexicon: LSJ
  rationale: Imperfective sense suggests an ongoing manifestation rather than a punctiliar
    event. 'Was becoming evident' reflects that progressive disclosure.
- source_word: τοῖς θεωροῦσιν
  chosen: to those who were watching
  alternatives:
  - to the onlookers
  - to those observing
  lexicon: LSJ
  rationale: A participial expression for observers/spectators. This rendering is
    readable and preserves the verbal force.
- source_word: τὸ κατὰ καρδίαν ἐνεστὸς ἄλγος
  chosen: the pain present in his heart
  alternatives:
  - the anguish pressing on his heart
  - the grief within his heart
  - the pain in his heart
  lexicon: LSJ
  rationale: κατὰ καρδίαν points to the inward seat of emotion; ἐνεστὸς means present/pressing
    upon; ἄλγος is pain or anguish. 'The pain present in his heart' stays close to
    the Greek while remaining idiomatic.
