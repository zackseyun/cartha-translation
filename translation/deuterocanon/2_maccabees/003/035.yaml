theological_decisions:
- issue: Reference of 'the one who had preserved his life'
  chosen_reading: The phrase refers to God as the one who preserved Heliodorus's life.
  alternative_readings:
  - The phrase could be rendered more generally as 'the one who had granted life.'
  rationale: The immediate context is Heliodorus's deliverance from near death, so
    the phrase is best understood specifically as preservation of his life rather
    than a general statement about God as giver of life.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    context sufficiently resolves the referent without importing extra doctrine.
