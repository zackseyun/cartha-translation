id: 2MA.3.35
reference: 2 Maccabees 3:35
source:
  edition: lxx-swete-1909
  text: ὁ δὲ Ἡλιόδωρος θυσίαν ἀνενέγκων τῷ θεῷ, καὶ εὐχὰς μεγίστας εὐξάμενος τῷ τὸ
    ζῆν περιποιήσαντι, καὶ τὸν Ὀνίαν ἀποδεξάμενος, ἀνεστρατοπέδευσεν πρὸς τὸν βασιλέα.
  language: Greek
  pages:
  - 693
  confidence: high
  validation: agree
translation:
  text: But Heliodorus, after offering a sacrifice to God and making very great vows
    to the one who had preserved his life, and after taking leave of Onias, returned
    to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'making the greatest prayers'; the Greek word can mean 'prayers' or 'vows,'
      but 'vows' fits the sacrificial setting better.
    reason: lexical_alternative
  - marker: b
    text: Or 'after bidding Onias farewell.' The Greek verb can also mean 'receive'
      or 'welcome,' but the departure context favors a leave-taking sense.
    reason: lexical_alternative
  - marker: c
    text: The Greek verb is military in flavor, literally suggesting a return march
      or breaking camp.
    reason: cultural_note
lexical_decisions:
- source_word: θυσίαν ἀνενέγκων
  chosen: after offering a sacrifice
  alternatives:
  - having offered a sacrifice
  - when he had offered a sacrifice
  lexicon: LSJ
  rationale: The aorist participle ἀνενέγκων from ἀναφέρω with θυσίαν means to offer
    up a sacrifice. 'After offering' gives natural English while preserving the participial
    sequence.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - for God
  lexicon: LSJ
  rationale: The dative marks the recipient of the sacrificial act. 'To God' is the
    most straightforward rendering.
- source_word: εὐχὰς μεγίστας εὐξάμενος
  chosen: making very great vows
  alternatives:
  - praying very great prayers
  - making the greatest vows
  lexicon: LSJ
  rationale: εὐχή can mean prayer or vow, but in sacrificial context and with εὔχομαι
    it commonly denotes vows. 'Very great vows' reflects μεγίστας without sounding
    overly wooden.
- source_word: τῷ τὸ ζῆν περιποιήσαντι
  chosen: to the one who had preserved his life
  alternatives:
  - to the one who had granted him life
  - to the one who had saved his life
  lexicon: LSJ
  rationale: The articular participle identifies God as the one who secured Heliodorus's
    continued living. 'Preserved his life' captures τὸ ζῆν περιποιήσαντι idiomatically
    and fits the immediate context of his near death.
- source_word: τὸ ζῆν
  chosen: his life
  alternatives:
  - life
  - the ability to live
  - continued life
  lexicon: LSJ
  rationale: 'Although literally ''the living/to live,'' English idiom prefers ''his
    life'' here. The possessive is implied by the context: God preserved Heliodorus''s
    own life.'
- source_word: τὸν Ὀνίαν ἀποδεξάμενος
  chosen: after taking leave of Onias
  alternatives:
  - after receiving Onias
  - after bidding Onias farewell
  - after greeting Onias
  lexicon: LSJ
  rationale: ἀποδέχομαι can mean receive, welcome, or take leave depending on context.
    Here, since Heliodorus is departing for the king, 'taking leave of Onias' best
    fits the narrative movement.
- source_word: ἀνεστρατοπέδευσεν
  chosen: returned to the king
  alternatives:
  - marched back to the king
  - broke camp and went to the king
  lexicon: LSJ
  rationale: The verb literally has a military sense of moving camp or marching back.
    In context, 'returned to the king' communicates the sense clearly in modern English
    without losing the directional force supplied by πρὸς τὸν βασιλέα.
- source_word: πρὸς τὸν βασιλέα
  chosen: to the king
  alternatives:
  - toward the king
  - back to the king
  lexicon: LSJ
  rationale: πρός with the accusative indicates movement toward a person. 'To the
    king' is the natural English equivalent; 'back' is supplied in the main clause
    by 'returned'.
