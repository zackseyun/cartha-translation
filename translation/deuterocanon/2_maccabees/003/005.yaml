id: 2MA.3.5
reference: 2 Maccabees 3:5
source:
  edition: lxx-swete-1909
  text: καὶ νικήσαι τὸν Ὀνίαν μὴ δυνάμενος, ἦλθεν πρὸς Ἀπολλώνιον Θρασαίου, τὸν κατʼ
    ἐκεῖνον τὸν καιρὸν Κοίλης Συρίας καὶ Φοινίκης στρατηγόν.
  language: Greek
  pages:
  - 690
  confidence: high
  validation: agree
translation:
  text: And since he was unable to overcome Onias, he went to Apollonius son of Thrasaeas,
    who at that time was governor of Coele-Syria and Phoenicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Apollonius Thrasaeas'; the Greek genitive may be read as a patronymic,
      here rendered 'son of Thrasaeas.'
    reason: lexical_alternative
  - marker: b
    text: The Greek title στρατηγός can mean 'general' or 'governor'; here it is rendered
      'governor' because the context emphasizes regional administration over Coele-Syria
      and Phoenicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: νικήσαι
  chosen: to overcome
  alternatives:
  - to defeat
  - to prevail against
  lexicon: LSJ
  rationale: The aorist infinitive of νικάω here refers to gaining the upper hand
    over Onias in conflict or opposition. 'Overcome' fits idiomatic English and preserves
    the sense without implying only military combat as strongly as 'defeat' might.
- source_word: μὴ δυνάμενος
  chosen: since he was unable
  alternatives:
  - being unable
  - not being able
  lexicon: LSJ
  rationale: The participial construction gives the circumstance or cause for the
    main action. 'Since he was unable' brings out the causal nuance naturally in English
    while remaining close to the Greek.
- source_word: ἦλθεν πρὸς
  chosen: he went to
  alternatives:
  - he came to
  - he approached
  lexicon: LSJ
  rationale: Although ἔρχομαι can be 'come' or 'go' depending on viewpoint, English
    narrative style here is clearer with 'went to,' indicating Heliodorus's movement
    toward Apollonius.
- source_word: Ἀπολλώνιον Θρασαίου
  chosen: Apollonius son of Thrasaeas
  alternatives:
  - Apollonius Thrasaeas
  - Apollonius, of Thrasaeas
  lexicon: LSJ
  rationale: The genitive Θρασαίου is most naturally patronymic in this context. Rendering
    it as 'son of Thrasaeas' makes the relationship explicit for English readers and
    avoids treating the genitive as an unexplained second name.
- source_word: τὸν ... στρατηγόν
  chosen: who ... was governor
  alternatives:
  - general
  - military commander
  - strategos
  lexicon: LSJ
  rationale: στρατηγός can denote a military commander, but in Hellenistic administrative
    contexts it often refers to an official governing a region. Because the phrase
    specifies territorial jurisdiction over Coele-Syria and Phoenicia, 'governor'
    best communicates the office's function in context.
- source_word: κατʼ ἐκεῖνον τὸν καιρόν
  chosen: at that time
  alternatives:
  - in those days
  - during that time
  lexicon: LSJ
  rationale: This temporal phrase situates Apollonius's office in the narrative. 'At
    that time' is straightforward and natural.
- source_word: Κοίλης Συρίας καὶ Φοινίκης
  chosen: Coele-Syria and Phoenicia
  alternatives:
  - Hollow Syria and Phoenicia
  lexicon: LSJ
  rationale: These are established regional names. 'Coele-Syria' is the standard English
    transliteration for the historical province and is preferable to a literal rendering
    that would obscure the reference.
