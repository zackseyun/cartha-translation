id: 2MA.3.40
reference: 2 Maccabees 3:40
source:
  edition: lxx-swete-1909
  text: καὶ τὰ μὲν καθʼ Ἡλιόδωρον καὶ τὴν τοῦ γαζοφυλακίου τήρησιν οὕτως ἐχώρησεν.
  language: Greek
  pages:
  - 693
  confidence: high
  validation: agree
translation:
  text: And the matter concerning Heliodorus and the safeguarding of the treasury
    proceeded in this way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And the events concerning Heliodorus and the protection of the treasury
      turned out this way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ... καθʼ Ἡλιόδωρον
  chosen: the matter concerning Heliodorus
  alternatives:
  - the things concerning Heliodorus
  - what happened to Heliodorus
  - the affair of Heliodorus
  lexicon: LSJ
  rationale: The neuter plural with κατά idiomatically refers to the events or matter
    relating to Heliodorus. 'The matter concerning Heliodorus' preserves the summary,
    concluding tone without over-paraphrasing into a full narrative gloss.
- source_word: γαζοφυλακίου
  chosen: treasury
  alternatives:
  - storehouse
  - treasure chamber
  lexicon: LSJ
  rationale: The term denotes the treasury or treasury chamber. 'Treasury' is the
    most natural concise English rendering here and fits the temple-finance context
    of the chapter.
- source_word: τήρησιν
  chosen: safeguarding
  alternatives:
  - protection
  - keeping
  - guarding
  lexicon: LSJ
  rationale: τήρησις is the keeping, guarding, or preservation of something. 'Safeguarding'
    communicates active protection of the treasury and reads naturally in modern English.
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: LSJ
  rationale: This adverb closes the episode by indicating that events unfolded in
    the manner just narrated. 'In this way' is clearer in contemporary English than
    the more formal 'thus.'
- source_word: ἐχώρησεν
  chosen: proceeded
  alternatives:
  - turned out
  - came about
  - advanced
  lexicon: LSJ
  rationale: The verb can mean to go forward, proceed, or turn out. In this narrative
    summary, 'proceeded' best captures the sense that the affair unfolded or came
    to pass as described, without sounding colloquial.
