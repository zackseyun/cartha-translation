theological_decisions:
- issue: Divine action toward the temple in παραδοξάζοντα τὸν ἑαυτοῦ τόπον
  chosen_reading: The Lord is described as glorifying his own place, that is, vindicating
    and honoring the temple by his intervention.
  alternative_readings:
  - the Lord was making his place marvelous
  - the Lord was showing his place to be glorious
  rationale: The verb is unusual and contextually tied to the temple's restoration
    from fear to joy after divine intervention. 'Glorifying his own place' preserves
    the theological claim without over-interpreting the mechanism.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Force of ἐπιφανέντος κυρίου
  chosen_reading: when the Almighty Lord appeared
  alternative_readings:
  - when the Almighty Lord manifested himself
  rationale: The text presents a real divine epiphany in narrative terms. 'Appeared'
    preserves that claim directly and avoids either weakening it into mere providence
    or expanding it into a more technical theological formulation.
  doctrine_reference: Translation philosophy §§1, 3, 6
