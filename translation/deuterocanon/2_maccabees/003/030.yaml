id: 2MA.3.30
reference: 2 Maccabees 3:30
source:
  edition: lxx-swete-1909
  text: οἱ δὲ τὸν κύριον εὐλό- γουν τὸν παραδοξάζοντα τὸν ἑαυτοῦ τόπον· καὶ τὸ μικρῷ
    πρότερον δέους καὶ ταραχῆς γέμον ἱερόν, τοῦ παντοκράτορος ἐπιφανέντος κυρίου,
    χαρᾶς καὶ εὐφροσύνης ἐπληροῦτο.
  language: Greek
  pages:
  - 692
  confidence: high
  validation: agree
translation:
  text: And they were blessing the Lord, who was glorifying his own place; and the
    temple, which a little earlier had been full of fear and turmoil, was filled with
    joy and gladness when the Almighty Lord appeared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'manifested himself' for 'appeared.' The Greek uses a term associated
      with divine appearing.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλόγουν
  chosen: were blessing
  alternatives:
  - blessed
  - were praising
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated action in response to the
    event, so 'were blessing' preserves the durative sense better than simple past.
    'Blessing' also reflects the direct object 'the Lord' more closely than the broader
    'praising'.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος. Here it functions
    as a divine title, and 'Lord' is the natural English equivalent.
- source_word: παραδοξάζοντα
  chosen: was glorifying
  alternatives:
  - was magnifying
  - was making glorious
  - was honoring
  lexicon: LSJ
  rationale: The participle describes the Lord as displaying glory in relation to
    the temple. 'Was glorifying' best preserves the verbal connection to glory without
    over-paraphrasing.
- source_word: τὸν ἑαυτοῦ τόπον
  chosen: his own place
  alternatives:
  - his own sanctuary
  - his own dwelling place
  lexicon: LSJ
  rationale: τόπος is literally 'place.' In context it refers to the temple precinct
    as God's place, but 'his own place' keeps the source wording while allowing the
    following explicit 'temple' to identify it.
- source_word: τὸ μικρῷ πρότερον
  chosen: a little earlier
  alternatives:
  - shortly before
  - just before
  lexicon: LSJ
  rationale: This idiom marks a recent prior state. 'A little earlier' is natural
    English and preserves the temporal contrast.
- source_word: δέους καὶ ταραχῆς γέμον
  chosen: had been full of fear and turmoil
  alternatives:
  - was full of dread and disturbance
  - was filled with fear and confusion
  lexicon: BDAG
  rationale: γέμον means 'being full of.' Because English idiom works better with
    the prior temporal phrase, 'had been full' conveys the earlier condition. δέος
    is 'fear/dread' and ταραχή is 'turmoil/disturbance'; 'fear and turmoil' is clear
    and weighty.
- source_word: ἱερόν
  chosen: temple
  alternatives:
  - sanctuary
  - holy place
  lexicon: BDAG
  rationale: ἱερόν ordinarily denotes the temple complex rather than only the inner
    shrine. 'Temple' is the standard and clearest rendering in context.
- source_word: τοῦ παντοκράτορος ... κυρίου
  chosen: the Almighty Lord
  alternatives:
  - the Lord Almighty
  - the all-powerful Lord
  lexicon: BDAG
  rationale: παντοκράτωρ is well rendered by 'Almighty.' Keeping both title elements
    together as 'the Almighty Lord' reflects the Greek genitive phrase and remains
    natural English.
- source_word: ἐπιφανέντος
  chosen: appeared
  alternatives:
  - manifested himself
  - became visible
  lexicon: BDAG
  rationale: The genitive absolute marks the occasion for the change in the temple's
    condition. 'Appeared' is concise and fits the narrative of divine intervention
    without adding speculative detail.
- source_word: χαρᾶς καὶ εὐφροσύνης ἐπληροῦτο
  chosen: was filled with joy and gladness
  alternatives:
  - was filled with rejoicing and delight
  - became full of joy and celebration
  lexicon: BDAG
  rationale: ἐπληροῦτο is imperfect/passive, indicating the temple came to be characterized
    by these emotions. 'Joy and gladness' preserves the paired nouns χαρά and εὐφροσύνη
    with readable English distinction.
