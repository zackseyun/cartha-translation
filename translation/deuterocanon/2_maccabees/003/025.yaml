theological_decisions:
- issue: Nature of the apparition in the temple judgment scene
  chosen_reading: Render the description straightforwardly as a visible horse and
    rider without softening it into metaphor or vision-language beyond what the Greek
    states.
  alternative_readings:
  - a visionary appearance
  - symbolic description
  rationale: The text narrates the event as an appearance and assault using concrete
    terms. The translation should preserve that narrative force without importing
    an interpretive judgment about whether the event was visionary or physical.
  doctrine_reference: Preserve theological tension rather than resolve it.
