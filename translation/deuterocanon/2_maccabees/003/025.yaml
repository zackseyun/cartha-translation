id: 2MA.3.25
reference: 2 Maccabees 3:25
source:
  edition: lxx-swete-1909
  text: ὤφθη γάρ τις ἵππος αὐτοῖς φοβερὸν ἔχων τὸν ἐπιβάτην, καὶ καλλίστῃ σαγῇ διακεκοσμημένος,
    φερόμενος δὲ ῥύδην ἔσεισεν τῷ Ἡλιοδώρῳ τὰς ἐμπροσθίους ὁπλάς· ὁ δὲ ἐπικαθήμενος
    ἐφαίνετο χρυσῆν πανοπλίαν ἔχων.
  language: Greek
  pages:
  - 692
  confidence: high
  validation: agree
translation:
  text: For a horse appeared to them with a fearsome rider, adorned with a most beautiful
    harness; and rushing headlong, it struck Heliodorus with its front hoofs, while
    the one seated on it appeared to be wearing golden armor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'decked out with splendid trappings'; the Greek term refers to the horse's
      ornamental gear.
    reason: lexical_alternative
  - marker: b
    text: Literally 'shook' or 'struck' Heliodorus with its front hoofs.' The verb
      can suggest a violent battering.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤφθη
  chosen: appeared
  alternatives:
  - was seen
  - became visible
  lexicon: LSJ
  rationale: 'Aorist passive of ὁράω used in an intransitive/passive sense: something
    became visible to them. ''Appeared'' is natural English and preserves the sudden
    manifestation.'
- source_word: τις ἵππος
  chosen: a horse
  alternatives:
  - a certain horse
  lexicon: LSJ
  rationale: τις here is indefinite rather than emphasizing specificity. English normally
    omits 'certain' unless the nuance matters; 'a horse' best fits the narrative.
- source_word: φοβερὸν ἔχων τὸν ἐπιβάτην
  chosen: with a fearsome rider
  alternatives:
  - having a terrifying rider
  - with a dreadful rider
  lexicon: LSJ
  rationale: The participial phrase describes the horse by the character of its rider.
    'Fearsome' captures φοβερός as inspiring fear without over-translating.
- source_word: καλλίστῃ σαγῇ διακεκοσμημένος
  chosen: adorned with a most beautiful harness
  alternatives:
  - decked out with a very beautiful caparison
  - adorned with splendid trappings
  lexicon: LSJ
  rationale: σαγή refers to horse gear/trappings rather than generic clothing. 'Harness'
    is accessible modern English; 'most beautiful' reflects the superlative καλλίστῃ,
    and 'adorned' preserves the perfect participle's descriptive force.
- source_word: φερόμενος δὲ ῥύδην
  chosen: rushing headlong
  alternatives:
  - charging violently
  - being borne along at full speed
  lexicon: LSJ
  rationale: The phrase conveys rapid, forceful movement. 'Rushing headlong' preserves
    both speed and impetuosity in idiomatic English.
- source_word: ἔσεισεν
  chosen: struck
  alternatives:
  - shook
  - smote
  lexicon: LSJ
  rationale: Although σείω literally means 'shake,' in this context with the horse's
    front hoofs as instrument it denotes a violent blow or battering. 'Struck' communicates
    the action clearly in English.
- source_word: τὰς ἐμπροσθίους ὁπλάς
  chosen: its front hoofs
  alternatives:
  - its forehoofs
  - its front feet
  lexicon: LSJ
  rationale: ὁπλή is specifically a hoof. 'Front hoofs' is straightforward and preserves
    the concrete image.
- source_word: ὁ δὲ ἐπικαθήμενος
  chosen: the one seated on it
  alternatives:
  - the rider
  - the one mounted on it
  lexicon: LSJ
  rationale: The articular participle refers back to the rider. 'The one seated on
    it' keeps the Greek's descriptive repetition rather than replacing it with a simpler
    noun.
- source_word: χρυσῆν πανοπλίαν
  chosen: golden armor
  alternatives:
  - a golden panoply
  - armor of gold
  lexicon: LSJ
  rationale: πανοπλία denotes full armor. 'Golden armor' is idiomatic and sufficiently
    precise in context.
