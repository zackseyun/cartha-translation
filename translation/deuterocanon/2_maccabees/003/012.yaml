id: 2MA.3.12
reference: 2 Maccabees 3:12
source:
  edition: lxx-swete-1909
  text: ἀδίκησαί τε τοὺς πεπιστευκότας τῇ τοῦ τόπου ἁγιωσύνῃ καὶ τῇ τοῦ τετιμημένου
    κατὰ τὸν σύμπαντα κόσμον ἱεροῦ σεμνότητι καὶ ἀσυλίᾳ, παντελῶς ἀμήχανον εἶναι·
  language: Greek
  pages:
  - 691
  confidence: high
  validation: agree
translation:
  text: and that to wrong those who had trusted in the holiness of the place, and
    in the majesty and inviolability of the temple honored throughout the whole world,
    was utterly impossible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the right of asylum' / 'asylum-status' for the temple's protected sacred
      immunity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδικήσαί
  chosen: to wrong
  alternatives:
  - to injure
  - to treat unjustly
  lexicon: BDAG
  rationale: The aorist infinitive means to act unjustly against or wrong someone.
    'To wrong' is concise, natural English and preserves the moral/legal force better
    than the more physical 'injure'.
- source_word: τοὺς πεπιστευκότας
  chosen: those who had trusted
  alternatives:
  - those who had put confidence
  - those who had believed
  lexicon: BDAG
  rationale: The perfect participle indicates a settled prior trust. 'Trusted' fits
    the dative objects that follow and avoids importing specifically doctrinal 'believed'
    language into a context of confidence in the sanctuary's sanctity and protection.
- source_word: ἁγιωσύνῃ
  chosen: holiness
  alternatives:
  - sanctity
  - consecration
  lexicon: BDAG
  rationale: The noun denotes holiness or sacred character. 'Holiness' is the most
    direct rendering; the sacred status of the place is then complemented by the following
    terms for the temple's dignity and asylum-status.
- source_word: σεμνότητι
  chosen: majesty
  alternatives:
  - dignity
  - solemnity
  - venerableness
  lexicon: BDAG
  rationale: In this temple context the word points to august dignity worthy of reverence.
    'Majesty' communicates that elevated honor more idiomatically than the more abstract
    'solemnity'.
- source_word: ἀσυλίᾳ
  chosen: inviolability
  alternatives:
  - right of asylum
  - immunity from violation
  lexicon: LSJ
  rationale: The term denotes immunity from seizure or violation, often associated
    with asylum. 'Inviolability' fits the paired abstract nouns with 'majesty' and
    keeps the statement broad; the asylum nuance is preserved in a footnote.
- source_word: τετιμημένου
  chosen: honored
  alternatives:
  - esteemed
  - held in honor
  lexicon: BDAG
  rationale: The perfect passive participle describes the temple as having recognized
    honor. 'Honored' is simple and natural in English.
- source_word: κατὰ τὸν σύμπαντα κόσμον
  chosen: throughout the whole world
  alternatives:
  - in all the world
  - throughout the entire world
  lexicon: BDAG
  rationale: The phrase is expansive and rhetorical. 'Throughout the whole world'
    preserves the universal scope without sounding wooden.
- source_word: παντελῶς ἀμήχανον εἶναι
  chosen: was utterly impossible
  alternatives:
  - was completely impossible
  - could not possibly be done
  lexicon: LSJ
  rationale: The expression intensifies impossibility. 'Utterly impossible' captures
    both παντελῶς and ἀμήχανον in readable English.
