theological_decisions:
- issue: Whether ἀσυλίᾳ should be rendered with explicit asylum language
  chosen_reading: inviolability
  alternative_readings:
  - right of asylum
  - asylum-status
  rationale: The Greek term can specifically evoke asylum privilege, but in this sentence
    it is coordinated with abstract qualities of the temple ('holiness,' 'majesty').
    'Inviolability' preserves the legal-sacral protection without narrowing the sense
    too quickly; the asylum nuance is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
