id: 2MA.3.9
reference: 2 Maccabees 3:9
source:
  edition: lxx-swete-1909
  text: παραγενηθεὶς δὲ εἰς Ἱεροσόλυμα, καὶ φιλοφρόνως ὑπὸ τοῦ ἀρχιερέως τῆς πόλεως
    ἀποδεχθεὶς, ἀνέθετο περὶ τοῦ γεγονότος ἐμφανισμοῦ, καί τινος ἕνεκεν πάρεστι, διεσάφησεν
    ἐπυνθάνετό δε εἰ ταῖς ἀληθείαις ταῦτα οὕτως ἔχοντα τυγχάνει.
  language: Greek
  pages:
  - 691
  confidence: high
  validation: agree
translation:
  text: And when he arrived in Jerusalem and was courteously received by the high
    priest of the city, he reported the disclosure that had taken place, explained
    for what reason he was present, and inquired whether these things were truly so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the information that had come to light'; the Greek term can denote a
      making-known or disclosure.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενηθεὶς
  chosen: when he arrived
  alternatives:
  - having come
  - after he came
  lexicon: LSJ
  rationale: Aorist participle of παραγίνομαι indicating arrival/presence. 'When he
    arrived' gives natural English while preserving the temporal force.
- source_word: φιλοφρόνως
  chosen: courteously
  alternatives:
  - kindly
  - graciously
  - with friendly regard
  lexicon: LSJ
  rationale: Adverb conveys cordial or friendly reception. 'Courteously' fits the
    formal narrative tone and avoids overstating warmth.
- source_word: ἀποδεχθεὶς
  chosen: was received
  alternatives:
  - was welcomed
  - was accepted
  lexicon: LSJ
  rationale: Passive participle meaning to receive or welcome. 'Was received' is slightly
    more formal and pairs well with 'courteously.'
- source_word: ἀνέθετο
  chosen: he reported
  alternatives:
  - he set forth
  - he related
  - he laid out
  lexicon: LSJ
  rationale: In context the verb introduces Heliodorus's account to the high priest.
    'Reported' communicates formal presentation of information without wooden literalism.
- source_word: περὶ τοῦ γεγονότος ἐμφανισμοῦ
  chosen: the disclosure that had taken place
  alternatives:
  - the information that had come to light
  - the report that had occurred
  - the manifestation that had happened
  lexicon: LSJ
  rationale: ἐμφανισμός here is best taken as a making-known or disclosure rather
    than a supernatural 'manifestation.' γεγονότος marks it as an event already having
    occurred. The phrase refers to the prior informing about the treasury.
- source_word: καί τινος ἕνεκεν πάρεστι
  chosen: for what reason he was present
  alternatives:
  - why he was there
  - for what purpose he had come
  lexicon: LSJ
  rationale: The clause explains his purpose in coming. 'Was present' stays close
    to πάρεστι while remaining idiomatic in English.
- source_word: διεσάφησεν
  chosen: explained
  alternatives:
  - made clear
  - clarified
  - set forth plainly
  lexicon: LSJ
  rationale: The verb means to make something clear or explicit. 'Explained' is concise
    and natural in sequence with 'reported.'
- source_word: ἐπυνθάνετο
  chosen: inquired
  alternatives:
  - asked
  - sought to learn
  lexicon: LSJ
  rationale: Imperfect/middle nuance suggests inquiry. 'Inquired' preserves the formal
    register better than simple 'asked.'
- source_word: ταῖς ἀληθείαις
  chosen: truly
  alternatives:
  - in truth
  - according to the facts
  - really
  lexicon: LSJ
  rationale: The dative idiom functions adverbially, asking whether the matter is
    actually true. 'Truly' captures the sense cleanly in English.
- source_word: ταῦτα οὕτως ἔχοντα τυγχάνει
  chosen: these things were truly so
  alternatives:
  - these matters were actually as stated
  - things stood this way in fact
  lexicon: LSJ
  rationale: The expression asks whether the reported matters happen to be in this
    condition, i.e., whether they are indeed as described. The chosen rendering is
    idiomatic and faithful.
