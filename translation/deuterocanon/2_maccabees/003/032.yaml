id: 2MA.3.32
reference: 2 Maccabees 3:32
source:
  edition: lxx-swete-1909
  text: ὕποπτος δὲ γενόμενος ὁ ἀρχιερεὺς μή ποτε διάλημψιν ὁ βασιλεὺς οἷ κακουργίαν
    τινὰ περὶ τὸν Ἡλιόδωρον ὑπὸ τῶν Ἰουδαίων συντετελέσθαι, προσήγαγε θυσίαν ὑπὲρ
    τῆς τοῦ ἀνδρὸς Α σωτηρίας.
  language: Greek
  pages:
  - 692
  confidence: high
  validation: agree
translation:
  text: But the high priest, becoming suspicious that the king might perhaps suppose
    that some wrongdoing against Heliodorus had been carried out by the Jews, offered
    a sacrifice for the man's recovery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the man's deliverance' or 'for the man's salvation'; the Greek σωτηρία
      can cover rescue, preservation, or salvation, but here likely refers to Heliodorus's
      physical recovery.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕποπτος ... γενόμενος
  chosen: becoming suspicious
  alternatives:
  - becoming apprehensive
  - becoming concerned
  - falling under suspicion
  lexicon: LSJ
  rationale: In context the high priest is not himself suspected, but comes to suspect
    or fear what the king may infer. 'Becoming suspicious' best captures the participial
    construction with natural English while preserving the sense of wary concern.
- source_word: μή ποτε
  chosen: might perhaps
  alternatives:
  - lest perhaps
  - that perhaps
  lexicon: LSJ
  rationale: The phrase introduces a feared possibility. 'Might perhaps' communicates
    the potential and apprehensive nuance in idiomatic English.
- source_word: διάλημψιν
  chosen: suppose
  alternatives:
  - suspect
  - take it
  - form the impression
  lexicon: LSJ
  rationale: The noun here refers to an assumption or impression the king might form.
    'Suppose' is concise and readable; 'suspect' would overstate the certainty of
    hostile inference, though it remains a viable alternative.
- source_word: κακουργίαν τινά
  chosen: some wrongdoing
  alternatives:
  - some crime
  - some evil deed
  - some misdeed
  lexicon: LSJ
  rationale: κακουργία denotes wrongdoing or criminal action. 'Some wrongdoing' preserves
    the indefinite τινά and avoids sounding overly technical while still conveying
    moral and legal fault.
- source_word: περὶ τὸν Ἡλιόδωρον
  chosen: against Heliodorus
  alternatives:
  - concerning Heliodorus
  - in the matter of Heliodorus
  lexicon: LSJ
  rationale: Given the collocation with συντετελέσθαι and κακουργίαν, the sense is
    hostile action directed toward Heliodorus. 'Against Heliodorus' makes that relation
    explicit in natural English.
- source_word: συντετελέσθαι
  chosen: had been carried out
  alternatives:
  - had been accomplished
  - had been committed
  - had been perpetrated
  lexicon: LSJ
  rationale: The perfect infinitive indicates completed action. 'Had been carried
    out' is idiomatic and works well with 'wrongdoing'; 'perpetrated' is possible
    but somewhat more loaded.
- source_word: προσήγαγε θυσίαν
  chosen: offered a sacrifice
  alternatives:
  - brought a sacrifice
  - presented a sacrifice
  lexicon: LSJ
  rationale: This is standard sacrificial language. 'Offered a sacrifice' is the clearest
    English equivalent.
- source_word: ὑπὲρ τῆς ... σωτηρίας
  chosen: for ... recovery
  alternatives:
  - for ... deliverance
  - for ... salvation
  - for ... safety
  lexicon: LSJ
  rationale: σωτηρία can mean salvation, deliverance, preservation, or recovery. In
    this narrative context, after Heliodorus has been struck down and then restored,
    'recovery' best fits the immediate physical sense without importing broader theological
    meaning.
- source_word: τοῦ ἀνδρός
  chosen: the man's
  alternatives:
  - that man's
  - his
  lexicon: LSJ
  rationale: The genitive refers back to Heliodorus. 'The man's' preserves the explicit
    noun rather than reducing it to a pronoun, matching the Greek's wording more closely.
