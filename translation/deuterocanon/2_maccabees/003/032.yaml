theological_decisions:
- issue: Meaning of σωτηρία in a narrative healing/restoration context
  chosen_reading: physical recovery/preservation rather than spiritual salvation
  alternative_readings:
  - salvation
  - deliverance
  rationale: The immediate context concerns Heliodorus's bodily collapse and restoration
    after divine judgment. Rendering σωτηρία as 'recovery' preserves the narrative
    sense and avoids importing soteriological overtones not demanded by the text.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
