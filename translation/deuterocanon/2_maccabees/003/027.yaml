id: 2MA.3.27
reference: 2 Maccabees 3:27
source:
  edition: lxx-swete-1909
  text: αἴφνω δὲ πεσόντα πρὸς τὴν γῆν γῆν γῆν καὶ πολλῷ σκότει περιχυθέντα συναρπάσαντες
    καὶ εἰς φορεῖον ἐνθέντες,
  language: Greek
  pages:
  - 692
  confidence: high
  validation: agree
translation:
  text: But he suddenly fell to the ground, enveloped in deep darkness; and they picked
    him up and put him on a stretcher,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text in Swete reads γῆν three times in succession ('to the ground
      ground ground'), which is almost certainly a scribal or transcriptional repetition
      rather than intended sense. The translation follows the clear meaning of the
      phrase as 'to the ground.'
    reason: textual_variant
lexical_decisions:
- source_word: αἴφνω
  chosen: suddenly
  alternatives:
  - all at once
  - abruptly
  lexicon: LSJ
  rationale: Adverb marking the unexpected immediacy of Heliodorus's collapse; 'suddenly'
    is natural modern English and preserves the force.
- source_word: πεσόντα
  chosen: fell
  alternatives:
  - having fallen
  - collapsed
  lexicon: LSJ
  rationale: Aorist participle from πίπτω. In context it describes the action that
    befell him; 'fell' is idiomatic in English. 'Collapsed' is possible but slightly
    more interpretive.
- source_word: πρὸς τὴν γῆν
  chosen: to the ground
  alternatives:
  - upon the ground
  lexicon: LSJ
  rationale: Standard idiomatic rendering of the prepositional phrase indicating motion
    downward.
- source_word: πολλῷ σκότει
  chosen: deep darkness
  alternatives:
  - great darkness
  - much darkness
  lexicon: LSJ
  rationale: The dative with περιχυθέντα conveys being covered or overwhelmed by abundant
    darkness. 'Deep darkness' is idiomatic and weighty without sounding wooden; 'great
    darkness' is also possible.
- source_word: περιχυθέντα
  chosen: enveloped
  alternatives:
  - covered
  - surrounded
  - overwhelmed
  lexicon: LSJ
  rationale: Passive participle from περιχέω/περιχύνω, literally 'poured around' or
    'spread over.' 'Enveloped' captures the image of darkness coming over him in readable
    English.
- source_word: συναρπάσαντες
  chosen: picked him up
  alternatives:
  - seized him
  - carried him off
  lexicon: LSJ
  rationale: The participle indicates attendants taking hold of him quickly after
    the fall. 'Picked him up' fits the immediate physical action before placing him
    on the stretcher; 'seized' is too harsh in English here.
- source_word: φορεῖον
  chosen: stretcher
  alternatives:
  - litter
  - bier
  lexicon: LSJ
  rationale: Refers to something used for carrying an incapacitated person. 'Stretcher'
    is the clearest modern equivalent; 'litter' is accurate but less immediately clear
    to contemporary readers, and 'bier' suggests funerary use too strongly.
- source_word: ἐνθέντες
  chosen: put him on
  alternatives:
  - placing him on
  - laying him on
  lexicon: LSJ
  rationale: Aorist participle from ἐντίθημι, here meaning to place onto/in the carrying
    device. 'Put him on' is concise and natural in sequence with 'picked him up'.
