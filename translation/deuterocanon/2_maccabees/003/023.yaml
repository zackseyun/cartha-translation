translation:
  text: But Heliodorus was carrying out what had been decided.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'was executing what had been determined.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: LSJ
  rationale: δέ marks a mild contrast or narrative transition from the preceding context;
    'But' best reflects the adversative turn here.
- source_word: Ἡλιόδωρος
  chosen: Heliodorus
  rationale: Personal name is transliterated according to project policy.
- source_word: τὸ διεγνωσμένον
  chosen: what had been decided
  alternatives:
  - the thing determined
  - the resolved plan
  - what had been decreed
  lexicon: LSJ
  rationale: The perfect passive participle used substantivally denotes something
    already determined or resolved. 'What had been decided' is natural modern English
    and preserves the prior determination implied by the perfect.
- source_word: ἐπετέλει
  chosen: was carrying out
  alternatives:
  - was accomplishing
  - was executing
  - was completing
  lexicon: LSJ
  rationale: The imperfect indicates ongoing action in past time. 'Was carrying out'
    captures both the progressive aspect and the sense of putting a decision into
    effect better than the more ambiguous 'was completing.'
