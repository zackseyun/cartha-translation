id: 2MA.3.24
reference: 2 Maccabees 3:24
source:
  edition: lxx-swete-1909
  text: αὐτόθι δὲ αὐτοῦ σὺν τοῖς δορυφόροις κατὰ τὸ γαζοφυλάκιον ἤδη παρόντος, ὁ τῶν
    πνευμάτων καὶ πάσης ἐξουσίας δυνάστης ἐπιφάνειαν μεγάλην ἐποίησεν, ὥστε πάντας
    τοὺς κατατολμήσαντας συνελθεῖν, καταπλαγέ- ντας τὴν τοῦ θεοῦ δύναμιν, εἰς ἔκλυσιν
    καὶ δειλίαν τραπῆναι.
  language: Greek
  pages:
  - 692
  confidence: high
  validation: agree
translation:
  text: But when he had already arrived there with the guards at the treasury, the
    Sovereign of spirits and of all authority made a great manifestation, so that
    all who had dared to come in, struck with awe at the power of God, were turned
    to weakness and fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bodyguards' for 'guards'; the Greek literally refers to spear-bearers.
    reason: lexical_alternative
  - marker: b
    text: Or 'made a great appearing'; the Greek emphasizes a striking divine manifestation.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'had dared to come in' may also be understood more generally
      as 'had dared to come together,' but the immediate context favors entry into
      the treasury area.
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτόθι
  chosen: there
  alternatives:
  - on the spot
  - in that place
  lexicon: LSJ
  rationale: Adverb of place referring to the location just mentioned; 'there' is
    natural English and keeps the narrative flow.
- source_word: δορυφόροις
  chosen: guards
  alternatives:
  - bodyguards
  - spearmen
  lexicon: LSJ
  rationale: Literally 'spear-bearers,' but in context it denotes an armed escort.
    'Guards' communicates the function in readable modern English without over-specifying
    weaponry.
- source_word: γαζοφυλάκιον
  chosen: treasury
  alternatives:
  - treasure chamber
  - storehouse
  lexicon: LSJ
  rationale: Standard term for a treasury or place where valuables are kept. 'Treasury'
    is concise and idiomatic here.
- source_word: ὁ τῶν πνευμάτων καὶ πάσης ἐξουσίας δυνάστης
  chosen: the Sovereign of spirits and of every authority
  alternatives:
  - the Lord of spirits and of all power
  - the ruler of spirits and of every dominion
  lexicon: LSJ
  rationale: δυνάστης denotes a ruler or sovereign. ἐξουσία here is best taken broadly
    as 'authority' rather than merely 'power,' preserving the sense of all ruling
    capacity being under God. πνευμάτων is rendered 'spirits' straightforwardly.
- source_word: ἐπιφάνειαν μεγάλην ἐποίησεν
  chosen: made a great manifestation
  alternatives:
  - brought about a great appearing
  - caused a great display
  lexicon: LSJ
  rationale: A literal yet intelligible rendering that preserves the epiphanic sense
    of divine self-disclosure. 'Manifestation' avoids importing later technical theological
    language while retaining solemnity.
- source_word: κατατολμήσαντας συνελθεῖν
  chosen: had dared to come in
  alternatives:
  - had ventured to enter
  - had boldly come together
  lexicon: LSJ
  rationale: The infinitive likely carries the sense of entering/coming in to the
    place in context, not merely assembling. 'Had dared to come in' captures the audacity
    implied by κατατολμάω.
- source_word: καταπλαγέντας
  chosen: struck with awe
  alternatives:
  - terrified
  - astonished
  - overwhelmed
  lexicon: LSJ
  rationale: The participle indicates being smitten with shock or alarm. 'Struck with
    awe' preserves both fear and overwhelming impact in a context of divine intervention.
- source_word: τὴν τοῦ θεοῦ δύναμιν
  chosen: the power of God
  alternatives:
  - God's power
  lexicon: LSJ
  rationale: Direct and transparent rendering of the genitive construction.
- source_word: εἰς ἔκλυσιν καὶ δειλίαν τραπῆναι
  chosen: were turned to weakness and fear
  alternatives:
  - collapsed into helplessness and cowardice
  - were reduced to faintness and terror
  lexicon: LSJ
  rationale: τραπῆναι with εἰς marks a resulting state. ἔκλυσις suggests enfeeblement
    or collapse; δειλία denotes fearfulness/cowardice. 'Weakness and fear' is natural
    English and fits the immediate context.
