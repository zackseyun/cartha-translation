theological_decisions:
- issue: Rendering the divine title ὁ τῶν πνευμάτων καὶ πάσης ἐξουσίας δυνάστης
  chosen_reading: the Sovereign of spirits and of every authority
  alternative_readings:
  - the Lord of spirits and of all power
  - the ruler of spirits and of every dominion
  rationale: The phrase emphasizes God's supremacy over spiritual beings and all delegated
    authority. 'Sovereign' best conveys δυνάστης without collapsing it into the more
    common title κύριος, which is not the word used here.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Translate titles'
