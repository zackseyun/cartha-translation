translation:
  text: And when a cry and turmoil arose, they blessed the Sovereign in their ancestral
    language.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Mighty One' or 'the Ruler' for the Greek title 'the one who has
      power/authority.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'with the ancestral voice'; the phrase likely means they cried
      out in their traditional/native language.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενομένης
  chosen: when ... arose
  alternatives:
  - after ... had arisen
  - as ... came about
  lexicon: BDAG
  rationale: Aorist participle of γίνομαι used in a genitive absolute. Rendering it
    temporally with 'when ... arose' gives natural English while preserving the circumstantial
    sense.
- source_word: κραυγῆς
  chosen: a cry
  alternatives:
  - shouting
  - an outcry
  lexicon: BDAG
  rationale: κραυγή denotes a loud cry or shout. 'A cry' keeps the singular and the
    vividness of the scene without over-specifying whether it is battle-shouting or
    lament.
- source_word: ταραχῆς
  chosen: turmoil
  alternatives:
  - confusion
  - disturbance
  lexicon: BDAG
  rationale: ταραχή here refers to agitation or disorder in the battle context. 'Turmoil'
    is idiomatic and suitably forceful.
- source_word: εὐλόγουν
  chosen: they blessed
  alternatives:
  - they praised
  - they spoke well of
  lexicon: BDAG
  rationale: Imperfect of εὐλογέω. 'Blessed' preserves the verbal link to blessing
    language rather than flattening it to general praise; the imperfect is naturally
    conveyed in English narrative without forcing a progressive form.
- source_word: τὸν δυνάστην
  chosen: the Sovereign
  alternatives:
  - the Mighty One
  - the Ruler
  - the Potentate
  lexicon: BDAG
  rationale: δυνάστης denotes a ruler or one possessing power. In this context it
    functions as a reverent divine title. 'Sovereign' communicates both authority
    and dignity in modern English better than the archaic or politically narrower
    alternatives.
- source_word: τῇ πατρίῳ φωνῇ
  chosen: in their ancestral language
  alternatives:
  - with their native voice
  - in the language of their fathers
  - in their ancestral tongue
  lexicon: BDAG
  rationale: The dative phrase indicates manner or means. πατρίος means ancestral/paternal,
    and φωνή can denote speech/language here. 'In their ancestral language' is clear
    modern English and preserves the ethnic-traditional nuance.
