translation:
  text: And he ordered that the head of Nikanor, and the hand with the shoulder, be
    cut off and carried to Jerusalem—he who with his whole body and soul had fought
    in the forefront for the citizens, and who had preserved from youth his goodwill
    toward his fellow countrymen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the arm with the shoulder'; the Greek reads literally 'the hand with
      the shoulder,' likely referring to the severed upper limb.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέταξεν
  chosen: he ordered
  alternatives:
  - he commanded
  - he gave orders
  lexicon: LSJ
  rationale: Aorist of προστάσσω denotes issuing an order or command. 'Ordered' is
    natural modern English and preserves the authoritative force without sounding
    overly formal.
- source_word: πρωταγωνιστὴς
  chosen: championing the cause
  alternatives:
  - leader
  - chief fighter
  - protagonist
  - champion
  lexicon: LSJ
  rationale: The noun literally denotes one taking the leading role or fighting in
    the front rank. In context it describes Judas as the foremost defender of the
    citizens. Rendering the participial/appositional sense as 'championing the cause'
    communicates both leadership and advocacy in idiomatic English.
- source_word: καθʼ ὅλον σώματι καὶ ψυχῇ
  chosen: with his whole body and soul
  alternatives:
  - with his whole body and life
  - with all his body and soul
  - with his whole being
  lexicon: LSJ
  rationale: The phrase intensifies total personal commitment. 'Body and soul' preserves
    the Greek imagery and rhetorical force better than flattening it to 'whole being.'
- source_word: πολιτῶν
  chosen: citizens
  alternatives:
  - countrymen
  - people of the city
  lexicon: LSJ
  rationale: πολίτης language is civic. 'Citizens' best reflects the political/civic
    nuance, likely referring to the people of Jerusalem/Judea as a body.
- source_word: εὔνοιαν
  chosen: goodwill
  alternatives:
  - kindness
  - benevolence
  - loyal affection
  lexicon: LSJ
  rationale: εὔνοια commonly means goodwill or favorable disposition. 'Goodwill' preserves
    the sense of enduring benevolent loyalty toward his own people.
- source_word: ὁμοεθνεῖς
  chosen: fellow countrymen
  alternatives:
  - kinsmen
  - those of the same nation
  - compatriots
  lexicon: LSJ
  rationale: The term means those of the same people or nation. 'Fellow countrymen'
    is clear and preserves the ethnic-national solidarity in view.
- source_word: διαφυλάξας
  chosen: had preserved
  alternatives:
  - had kept
  - had maintained
  - had guarded
  lexicon: LSJ
  rationale: The participle indicates continued maintenance or preservation. 'Had
    preserved' fits the retrospective appositional description of Judas.
- source_word: ἀποτεμόντας
  chosen: be cut off
  alternatives:
  - having cut off
  - to cut off
  lexicon: LSJ
  rationale: 'As an accusative participle dependent on προσέταξεν, it expresses the
    content of the order. English idiom requires a passive infinitival sense: ''ordered
    that ... be cut off.'''
- source_word: χεῖρα σὺν τῷ ὤμῳ
  chosen: the hand with the shoulder
  alternatives:
  - the arm with the shoulder
  - the hand together with the arm/shoulder
  lexicon: LSJ
  rationale: The Greek says 'hand with the shoulder,' likely meaning the severed upper
    limb including the shoulder. The translation stays close to the wording while
    remaining intelligible. Because English readers may expect 'arm,' the literal
    phrasing is retained and the broader sense can be noted in a footnote.
- source_word: περιφέρειν εἰς Ἰερουσαλήμ
  chosen: be carried around to Jerusalem
  alternatives:
  - be brought around to Jerusalem
  - be carried to Jerusalem
  - be paraded in Jerusalem
  lexicon: LSJ
  rationale: περιφέρειν can mean carry about or around. With εἰς Ἰερουσαλήμ, the sense
    is movement toward Jerusalem, likely for public display there. 'Carried around
    to Jerusalem' preserves the verbal nuance without over-interpreting it as a formal
    parade.
