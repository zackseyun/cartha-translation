theological_decisions:
- issue: Identification of the appositional descriptors
  chosen_reading: The descriptive phrases refer to Judas Maccabeus, the implied subject
    of 'he ordered.'
  alternative_readings:
  - The descriptors could be read more loosely as explanatory praise inserted by the
    narrator without explicit naming.
  rationale: The Greek appositions introduced by ὁ ... ὁ naturally describe the subject
    who gave the order. This is a syntactic rather than doctrinal issue, but it affects
    how the sentence is rendered in English.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering σώματι καὶ ψυχῇ
  chosen_reading: '''body and soul'' is retained as anthropological language without
    importing later doctrinal precision.'
  alternative_readings:
  - '''whole being'''
  rationale: The phrase expresses total devotion. Retaining 'body and soul' preserves
    the source's rhetoric and theological texture while avoiding paraphrase.
  doctrine_reference: Translation philosophy §1, §3
