translation:
  text: And he hung Nikanor’s severed head from the citadel, visible to all and a
    clear sign of the Lord’s help.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Nikanor’s head.' The Greek προτομή can denote the front part or head;
      in this context, with Nikanor already beheaded in the preceding narrative, 'severed
      head' makes the sense explicit.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the citadel/fortress height.' The Greek ἄκρας refers to a fortified
      high place.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέδησεν
  chosen: hung
  alternatives:
  - displayed
  - suspended
  lexicon: LSJ
  rationale: The verb denotes hanging out or suspending something publicly. 'Hung'
    is the most natural English rendering here and fits the context of public display.
- source_word: προτομήν
  chosen: severed head
  alternatives:
  - head
  - front part
  - bust
  lexicon: LSJ
  rationale: In this context, referring to Nikanor after his death and subsequent
    mutilation in the surrounding verses, the word points to the head as cut off and
    displayed, not an artistic 'bust.' 'Severed head' makes the sense explicit in
    idiomatic English.
- source_word: ἄκρας
  chosen: citadel
  alternatives:
  - fortress
  - acropolis
  lexicon: LSJ
  rationale: ἄκρα commonly refers to a fortified high place or citadel. 'Citadel'
    preserves the military-urban sense better than the more generic 'fortress,' while
    avoiding the overly transliterated 'Acra' in the main text.
- source_word: ἐπίδηλον
  chosen: visible
  alternatives:
  - conspicuous
  - plain to see
  - manifest
  lexicon: LSJ
  rationale: The adjective conveys something evident or plainly seen. 'Visible' works
    smoothly with 'to all' and captures the public nature of the display.
- source_word: φανερὸν
  chosen: clear
  alternatives:
  - manifest
  - plain
  - evident
  lexicon: LSJ
  rationale: Used predicatively with σημεῖον, it describes the sign as obvious or
    unmistakable. 'Clear sign' is idiomatic modern English.
- source_word: τοῦ κυρίου
  chosen: the Lord’s
  alternatives:
  - of the Lord
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is rendered 'Lord.' The genitive is naturally
    expressed in English as 'the Lord’s' before 'help.'
- source_word: βοηθείας
  chosen: help
  alternatives:
  - aid
  - assistance
  lexicon: LSJ
  rationale: The noun denotes help or aid. 'Help' is simple, direct, and preserves
    the theological point that the victory is attributed to divine assistance.
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - token
  - proof
  lexicon: LSJ
  rationale: σημεῖον regularly means 'sign.' 'Proof' would overstate the epistemic
    force; 'sign' preserves the source wording and theological resonance.
