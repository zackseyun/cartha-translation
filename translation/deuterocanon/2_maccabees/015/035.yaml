theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek narrative
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  - Lord
  rationale: The Greek has τοῦ κυρίου. Following the project's contested-terms guidance,
    κύριος is rendered 'Lord.' Small-caps 'LORD' is not required here because the
    Greek text itself reads κύριος, and the verse emphasizes divine aid without requiring
    an explicit tetragrammaton signal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
