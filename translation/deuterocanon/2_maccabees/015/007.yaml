  text: ὁ δὲ Μακκαβαῖος ἦν ἀδιαλείπτως πεποιθὼς μετὰ πάσης ἐλπίδος ἀντιλήμψεως τεύξεσθαι
    παρὰ τοῦ κυρίου.
