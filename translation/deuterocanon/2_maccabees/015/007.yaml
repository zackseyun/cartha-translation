lexical_decisions:
- source_word: ὁ δὲ Μακκαβαῖος
  chosen: But Maccabeus
  alternatives:
  - And Maccabeus
  - Now Maccabeus
  lexicon: LSJ
  rationale: δέ is lightly adversative or transitional here; 'But' preserves the contrast
    with the preceding fear of others. Μακκαβαῖος is a personal name and is therefore
    transliterated rather than translated.
- source_word: ἦν ἀδιαλείπτως πεποιθώς
  chosen: was continually confident
  alternatives:
  - was unceasingly trusting
  - kept being steadfastly confident
  lexicon: BDAG/LSJ
  rationale: ἀδιαλείπτως conveys continuity ('continually, unceasingly'). πεποιθώς,
    perfect participle of πείθω in the intransitive sense, denotes settled confidence
    or trust. 'Was continually confident' gives natural English while preserving the
    durative force.
- source_word: μετὰ πάσης ἐλπίδος
  chosen: with every hope
  alternatives:
  - with full hope
  - in complete hope
  lexicon: LSJ
  rationale: The phrase intensifies the confidence. Literally 'with all hope'; 'with
    every hope' preserves the comprehensive force without sounding wooden. It indicates
    fullness of expectation, not merely a single wish.
- source_word: ἀντιλήμψεως
  chosen: help
  alternatives:
  - support
  - deliverance
  - assistance
  lexicon: BDAG/LSJ
  rationale: ἀντίλημψις denotes aid, support, or assistance. 'Help' is the broadest
    and most idiomatic choice here, fitting the military-crisis context without overstating
    the term as a full 'deliverance'.
- source_word: τεύξεσθαι
  chosen: he would obtain
  alternatives:
  - he would receive
  - he would attain
  lexicon: BDAG/LSJ
  rationale: τεύγχανω with a genitive commonly means 'obtain' or 'receive.' 'Obtain'
    fits the construction with ἀντιλήμψεως and keeps the sense of coming into the
    possession of divine aid.
- source_word: παρὰ τοῦ κυρίου
  chosen: from the Lord
  alternatives:
  - from the master
  lexicon: BDAG/LSJ
  rationale: κύριος is rendered by the project's default as 'Lord.' In this Jewish-Greek
    context it refers to God as the source of aid, and 'from the Lord' is the natural
    English equivalent of παρά with the genitive.
