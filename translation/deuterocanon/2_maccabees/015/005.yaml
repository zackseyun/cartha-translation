id: 2MA.15.5
reference: 2 Maccabees 15:5
source:
  edition: lxx-swete-1909
  text: ὁ δὲ ἕτερος Κἀγώ, φησίν, δυνάστης ἐπὶ τῆς γῆς, ὁ προστατάσσων αἴρειν τὰ ὅπλα
    καὶ τὰς βασιλικὰς χρείας ἐπιτελεῖν. ὅμως οὐ κατέσχεν ἐπιτελέσαι τὸ σχέτλιον αὐτοῦ
    βούλημα.
