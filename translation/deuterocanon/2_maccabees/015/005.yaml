translation:
  text: But the other said, “I also am a ruler upon the earth, the one who commands
    men to take up arms and to carry out the king’s business.” Yet he did not prevail
    to accomplish his savage purpose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to bear arms.” The Greek literally says “to take/lift the weapons,”
      an idiom for military action.
    reason: lexical_alternative
  - marker: b
    text: Or “his cruel plan” or “his monstrous resolve.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνάστης
  chosen: ruler
  alternatives:
  - potentate
  - mighty one
  - sovereign
  lexicon: LSJ
  rationale: The term denotes one who holds power or lordship. 'Ruler' is natural
    modern English and fits the self-description in the vision without sounding overly
    archaic ('potentate') or overstating formal kingship ('sovereign').
- source_word: προστατάσσων
  chosen: the one who commands
  alternatives:
  - ordering
  - directing
  lexicon: LSJ
  rationale: The participle describes authoritative issuing of orders. 'The one who
    commands' preserves the ongoing, defining force of the participle in readable
    English.
- source_word: αἴρειν τὰ ὅπλα
  chosen: to take up arms
  alternatives:
  - to lift weapons
  - to bear arms
  lexicon: LSJ
  rationale: This is an idiomatic military expression. 'Take up arms' best captures
    the sense in idiomatic English while remaining close to the Greek.
- source_word: τὰς βασιλικὰς χρείας ἐπιτελεῖν
  chosen: to carry out the king’s business
  alternatives:
  - to perform the royal duties
  - to execute the king’s affairs
  - to fulfill the royal needs
  lexicon: LSJ
  rationale: χρείας can mean needs, affairs, or business; with βασιλικάς it refers
    to matters pertaining to the king. 'Carry out the king’s business' is clear and
    broad enough to include official royal service.
- source_word: ὅμως
  chosen: Yet
  alternatives:
  - Nevertheless
  - However
  lexicon: LSJ
  rationale: Marks a strong contrast with what precedes. 'Yet' is concise and suitably
    forceful in narrative English.
- source_word: οὐ κατέσχεν
  chosen: he did not prevail
  alternatives:
  - he did not succeed
  - he was not able
  - he did not gain control
  lexicon: LSJ
  rationale: In context the verb conveys failure to carry through the intended action.
    'Did not prevail' preserves the sense of not gaining the upper hand to accomplish
    his aim, fitting the martial setting.
- source_word: σχέτλιον
  chosen: savage
  alternatives:
  - cruel
  - wicked
  - monstrous
  lexicon: LSJ
  rationale: The adjective is strongly pejorative, denoting something fierce, cruel,
    or outrageous. 'Savage' communicates the brutality of the intended act in contemporary
    English.
- source_word: βούλημα
  chosen: purpose
  alternatives:
  - plan
  - will
  - resolve
  lexicon: LSJ
  rationale: The noun refers to a deliberate intention or resolve. 'Purpose' fits
    the context of a hostile intention without over-specifying the mechanics of the
    plan.
