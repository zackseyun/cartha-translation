theological_decisions:
- issue: Identification of the speaker as an earthly authority in the visionary context
  chosen_reading: Render the self-description straightforwardly as 'I also am a ruler
    upon the earth' without importing further theological interpretation.
  alternative_readings:
  - I too am a king on earth
  - I also am one having dominion on earth
  rationale: The Greek states the claim plainly and does not require the translator
    to identify the figure beyond his own words. A restrained rendering preserves
    the narrative tension and avoids interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
