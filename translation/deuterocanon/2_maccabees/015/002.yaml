translation:
  text: But when the Jews who were being compelled to accompany him said, “Do not
    destroy them in so savage and barbarous a way; rather, assign honor to the day
    that has been specially honored in holiness by the One who watches over all,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Do not kill them so savagely and barbarously.” The Greek verb can denote
      killing or destroying.
    reason: lexical_alternative
  - marker: b
    text: Literally, “assign honor/glory to the day that has been preferred in holiness
      by the One who watches over all.” The expression refers to showing due respect
      to the sacred day.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν ... Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: LSJ
  rationale: Ἰουδαῖοι can denote either ethnic/religious Jews or Judeans. In 2 Maccabees,
    the term commonly refers to the Jewish people as a religious-ethnic group rather
    than merely inhabitants of Judea, so 'the Jews' best fits the context.
- source_word: κατὰ ἀνάγκην συνεπομένων αὐτῷ
  chosen: who were being compelled to accompany him
  alternatives:
  - who were following him under compulsion
  - who were forced to go along with him
  lexicon: LSJ
  rationale: κατὰ ἀνάγκην conveys compulsion/necessity, and συνεπομένων means accompanying
    or going along with. The participial phrase describes Jews constrained to be with
    Nicanor, not willing supporters.
- source_word: Μηδαμῶς
  chosen: Do not ... in any way
  alternatives:
  - By no means
  - Not at all
  lexicon: LSJ
  rationale: Μηδαμῶς is a strong prohibition adverb. In idiomatic English within direct
    speech, 'Do not ... in so...' captures the force without sounding wooden.
- source_word: ἀγρίως καὶ βαρβάρως
  chosen: in so savage and barbarous a way
  alternatives:
  - so cruelly and barbarously
  - so wildly and brutally
  lexicon: LSJ
  rationale: The paired adverbs intensify the brutality of the proposed action. 'Savage
    and barbarous' preserves the rhetorical force and the double expression.
- source_word: ἀπολέσῃς
  chosen: destroy
  alternatives:
  - kill
  - wipe out
  lexicon: LSJ
  rationale: ἀπόλλυμι can mean destroy, ruin, or kill. Here the object is implied
    from context and concerns lethal destruction; 'destroy' preserves the broader
    force and matches the Greek verb directly.
- source_word: δόξαν δὲ ἀπομέρισον
  chosen: rather, assign honor
  alternatives:
  - but apportion glory
  - but give due regard
  lexicon: LSJ
  rationale: δόξα here is not abstract 'glory' in a theological sense but honor/respect
    shown to the sacred day. ἀπομερίζω means assign, allot, or apportion. 'Assign
    honor' is natural English and fits the appeal to respect the day.
- source_word: τῇ προτετιμημένῃ ... ἡμέρᾳ
  chosen: to the day that has been preferred
  alternatives:
  - to the day that has been specially honored
  - to the day that has been set above others
  lexicon: LSJ
  rationale: The perfect participle προτετιμημένῃ indicates a day already given special
    preference or honor. 'Preferred' is a close rendering; the sense is that this
    day has a distinguished status.
- source_word: ὑπὸ τοῦ πάντα ἐφορῶντος
  chosen: by the One who watches over all
  alternatives:
  - by him who sees all things
  - by the One who oversees all
  lexicon: LSJ
  rationale: The articular participle refers reverently to God without naming him
    directly. ἐφοράω conveys looking upon, overseeing, or watching over. 'The One
    who watches over all' preserves both reverence and providential nuance.
- source_word: μεθʼ ἁγιότητος
  chosen: in holiness
  alternatives:
  - with holiness
  - as holy
  lexicon: LSJ
  rationale: The phrase modifies the manner in which the day has been preferred/set
    apart. 'In holiness' is concise and preserves the cultic-sacral sense without
    overinterpreting.
