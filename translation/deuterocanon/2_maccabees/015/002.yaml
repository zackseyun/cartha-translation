theological_decisions:
- issue: Implicit reference to God in the articular participle τοῦ πάντα ἐφορῶντος
  chosen_reading: the One who watches over all
  alternative_readings:
  - him who sees all things
  - the all-seeing One
  rationale: The Greek uses a reverential circumlocution for God. The chosen rendering
    keeps the personal reference and divine oversight without importing later theological
    terminology.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Status of the sacred day
  chosen_reading: the day that has been preferred in holiness
  alternative_readings:
  - the holy day specially honored by God
  - the day sanctified above others by God
  rationale: The Greek emphasizes the day's distinguished status under divine regard,
    but does not explicitly use a finite verb meaning 'sanctified.' The translation
    preserves the sacral force without overstating the wording.
  doctrine_reference: Translation philosophy §§1, 3, 6
