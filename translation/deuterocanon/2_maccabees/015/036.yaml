translation:
  text: And they all decreed by common vote that this day should by no means be left
    unmarked,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that this day should in no way be left unobserved' or 'without commemoration.'
      The Greek ἀπαρασήμαντον literally means 'without a distinguishing mark/sign,'
      here referring to public remembrance or observance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδογμάτισαν
  chosen: they decreed
  alternatives:
  - they resolved
  - they enacted
  lexicon: LSJ
  rationale: Aorist verb from δογματίζω/related formation indicating an official decision
    or decree. 'Decreed' best preserves the formal, public character of the action.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all of them
  - everyone
  lexicon: LSJ
  rationale: Emphasizes unanimity of the group; 'they all' reads naturally in English
    while preserving the collective force.
- source_word: μετὰ κοινοῦ ψηφίσματος
  chosen: by common vote
  alternatives:
  - by a common resolution
  - by joint decree
  lexicon: LSJ
  rationale: The phrase combines the idea of shared/common action (κοινοῦ) with a
    formal vote or resolution (ψήφισμα). 'By common vote' is concise and preserves
    the civic-deliberative sense.
- source_word: μηδαμῶς
  chosen: by no means
  alternatives:
  - in no way
  - not at all
  lexicon: LSJ
  rationale: Strong adverb of negation. 'By no means' preserves the emphatic force
    without sounding unnatural.
- source_word: ἐᾶσαι
  chosen: should be left
  alternatives:
  - to allow to remain
  - to let be
  lexicon: LSJ
  rationale: Infinitive of permitting/leaving. In idiomatic English with the following
    adjective, passive wording ('should be left') best conveys the sense.
- source_word: ἀπαρασήμαντον
  chosen: unmarked
  alternatives:
  - without commemoration
  - without distinction
  - unobserved
  lexicon: LSJ
  rationale: Literally 'without mark/sign/distinguishing notice.' In context of commemorating
    a day, 'unmarked' preserves the metaphor and leaves open both memorial and festal
    observance. 'Unobserved' is possible but slightly more interpretive.
- source_word: τήνδε τὴν ἡμέραν
  chosen: this day
  alternatives:
  - this particular day
  lexicon: LSJ
  rationale: Demonstrative plus noun gives emphasis to the specific day in view. 'This
    day' is natural and sufficient in English.
