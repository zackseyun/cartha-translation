id: 2MA.15.40
reference: 2 Maccabees 15:40
source:
  edition: lxx-swete-1909
  text: καθάπερ οἶνον κατὰ μόνας πίνειν, ὡσαύτως δὲ καὶ ὕδωρ πάλιν πολέμιον· ὁ δὲ
    τρόπον οἶνος ὕδατι συγκερασθεὶς ἤδη καὶ ἐπιτερπῇ τὴν χάριν ἀποτελεῖ, οὕτως καὶ
    τὸ τῆς κατασκευῆς τοῦ λόγου τέρπει τὰς ἀκοὰς τῶν ἐντυγχανόντων τῇ συντάξει· Ἐνταῦθα
    δὲ ἔσται ἡ τελευτή.
