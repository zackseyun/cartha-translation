theological_decisions:
- issue: Rendering δέσποτα distinctly from κύριος
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: The verse addresses God with δέσποτα, not κύριος. To preserve lexical
    transparency and avoid importing the standard rendering of κύριος, 'Master' was
    chosen. 'Sovereign' is possible but slightly more interpretive; 'Lord' would obscure
    the distinction between the Greek terms.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception;
    Contested terms table for κύριος'
