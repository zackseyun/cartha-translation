translation:
  text: 'And he spoke, calling upon him in this way: “You, Master, sent your angel
    against Hezekiah king of Judea, and he struck down a hundred eighty-five thousand
    from the camp of Sennacherib.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'king of Judah.' The Greek reads 'of Judea' (Ἰουδαίας), but the historical
      reference is to Hezekiah of Judah.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: he spoke
  alternatives:
  - he said
  - he was saying
  lexicon: BDAG
  rationale: Imperfect of λέγω in narrative can be rendered simply in English as a
    past progressive or simple past. 'He spoke' fits the solemn prayer introduction
    and reads naturally without overemphasizing aspect.
- source_word: ἐπικαλούμενος
  chosen: calling upon him
  alternatives:
  - invoking him
  - appealing to him
  - praying to him
  lexicon: BDAG
  rationale: The participle indicates an act of invocation directed to God. 'Calling
    upon him' preserves the prayerful sense without paraphrasing beyond the Greek.
- source_word: τόνδε τὸν τρόπον
  chosen: in this way
  alternatives:
  - in this manner
  - thus
  lexicon: BDAG
  rationale: A straightforward idiomatic rendering of the phrase introducing the content
    of the prayer.
- source_word: Σύ
  chosen: You
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek. English can preserve this
    naturally by beginning the prayer with 'You,' followed by the vocative title.
- source_word: δέσποτα
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: BDAG
  rationale: δέσποτα is not κύριος here. 'Master' better reflects the distinct lexical
    choice and direct address of absolute authority, while avoiding conflation with
    the contested/default rendering of κύριος as 'Lord'.
- source_word: ἀπέστειλας
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Standard rendering of ἀποστέλλω in a historical recollection.
- source_word: τὸν ἄγγελόν σου
  chosen: your angel
  alternatives:
  - your messenger
  lexicon: BDAG
  rationale: In this biblical context recalling divine intervention against Sennacherib,
    'angel' is the most natural and contextually appropriate rendering.
- source_word: ἐπὶ Ἐζεκίου
  chosen: in the time of Hezekiah
  alternatives:
  - to Hezekiah
  - against Hezekiah
  - upon Hezekiah
  lexicon: BDAG
  rationale: With ἐπί plus genitive after 'sent your angel,' a strictly literal 'upon
    Hezekiah' is awkward and misleading in English. The sense in context is the historical
    occasion of God's intervention during Hezekiah's reign, not that the angel was
    sent against Hezekiah. 'In the time of Hezekiah' best captures the contextual
    force.
- source_word: τοῦ βασιλέως τῆς Ἰουδαίας
  chosen: king of Judea
  alternatives:
  - king of Judah
  lexicon: BDAG
  rationale: The Greek reads Ἰουδαίας, which in Hellenistic Greek commonly corresponds
    to 'Judea.' Because this verse is in a Greek deuterocanonical work rather than
    a direct Hebrew Vorlage, 'Judea' reflects the Greek form more directly. The historical
    allusion is to the Judean king Hezekiah.
- source_word: ἀνεῖλεν
  chosen: struck down
  alternatives:
  - killed
  - destroyed
  - slew
  lexicon: BDAG
  rationale: The verb denotes killing/removing. 'Struck down' is vivid, natural modern
    English, and suitable for divine judgment in narrative recollection.
- source_word: ἐκ τῆς παρεμβολῆς Σενναχηρείμ
  chosen: in the camp of Sennacherib
  alternatives:
  - from the camp of Sennacherib
  lexicon: BDAG
  rationale: Although ἐκ is present, English idiom in this context is better served
    by 'in the camp of Sennacherib,' referring to those struck down within that camp.
    A more literal 'from the camp' is possible but less natural here.
- source_word: εἰς ἑκατὸν ὀγδοήκοντα πέντε χιλιάδας
  chosen: a hundred eighty-five thousand
  alternatives:
  - one hundred eighty-five thousand
  lexicon: BDAG
  rationale: This idiom expresses the total number killed. The chosen rendering is
    clear, direct, and faithful to the Greek numeral expression.
