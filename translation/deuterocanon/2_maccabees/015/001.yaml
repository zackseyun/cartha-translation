translation:
  text: But Nicanor, having learned that those with Judas were in the regions of Samaria,
    resolved to attack them on the day of rest with complete security.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'on the Sabbath day'; the Greek here says literally
      'on the day of rest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταλαβών
  chosen: learned
  alternatives:
  - received word
  - found out
  - took note
  lexicon: LSJ
  rationale: In this construction with an accusative-plus-participle clause ('τοὺς
    ... ὄντας'), the verb conveys receiving information or becoming aware, not 'taking
    along.' 'Learned' is natural English and fits the narrative context.
- source_word: τοὺς περὶ τὸν Ἰούδαν ὄντας
  chosen: those with Judas
  alternatives:
  - the men around Judas
  - those who were with Judas
  lexicon: LSJ
  rationale: The idiom οἱ περὶ + personal name refers to the group associated with
    or accompanying that person. 'Those with Judas' is concise and accurate.
- source_word: ἐν τοῖς κατὰ Σαμάρειαν τόποις
  chosen: in the regions of Samaria
  alternatives:
  - in the places around Samaria
  - in the Samaritan districts
  lexicon: LSJ
  rationale: κατὰ with a place name here indicates the area or district associated
    with Samaria. 'Regions of Samaria' gives clear modern English without over-specifying
    administrative geography.
- source_word: ἐβουλεύσατο
  chosen: he resolved
  alternatives:
  - he planned
  - he decided
  - he took counsel
  lexicon: LSJ
  rationale: The middle form can suggest deliberation leading to a settled plan. 'Resolved'
    preserves both the deliberative and decisive force.
- source_word: τῇ τῆς καταπαύσεως ἡμέρᾳ
  chosen: on the day of rest
  alternatives:
  - on the Sabbath day
  - on the day of cessation
  lexicon: LSJ
  rationale: The Greek literally refers to 'the day of rest/cessation.' Because the
    text does not use the usual loanword 'Sabbath' here, the main text keeps the literal
    sense. The likely identification with the Sabbath is preserved in a footnote.
- source_word: μετὰ πάσης ἀσφαλείας
  chosen: with complete security
  alternatives:
  - with all safety
  - without risk
  - with full confidence
  lexicon: LSJ
  rationale: The phrase expresses Nicanor's expectation of acting safely or without
    danger to himself. 'With complete security' preserves that sense more closely
    than the more interpretive 'without risk.'
- source_word: ἐπιβαλεῖν
  chosen: to attack
  alternatives:
  - to fall upon
  - to set upon
  - to make an assault on
  lexicon: LSJ
  rationale: In military context the verb means to set upon or attack. 'Attack' is
    idiomatic and appropriately direct.
