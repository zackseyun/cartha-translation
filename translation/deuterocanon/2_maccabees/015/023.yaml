translation:
  text: And now, O Sovereign of the heavens, send a good angel before us for fear
    and trembling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'send a good angel before us for fear and trembling.'
      The Greek does not explicitly state whose fear is meant, though the context
      suggests the enemy.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνάστα
  chosen: Sovereign
  alternatives:
  - Mighty One
  - Ruler
  - Lord
  lexicon: LSJ
  rationale: Vocative of δυνάστης denotes one who holds power or rule. 'Sovereign'
    best conveys authoritative rulership in prayerful address without flattening it
    to a generic 'mighty one.'
- source_word: τῶν οὐρανῶν
  chosen: of the heavens
  alternatives:
  - of heaven
  - of the skies
  lexicon: LSJ
  rationale: The Greek is plural, literally 'of the heavens.' Retaining the plural
    preserves the source form and its elevated register; singular 'heaven' is possible
    in idiomatic English but less formally transparent.
- source_word: ἀπόστειλον
  chosen: send
  alternatives:
  - dispatch
  lexicon: LSJ
  rationale: Aorist imperative of ἀποστέλλω, a straightforward petition to send. 'Send'
    is natural modern English and preserves the imperative force.
- source_word: ἄγγελον ἀγαθὸν
  chosen: a good angel
  alternatives:
  - a benevolent angel
  - a favorable messenger
  lexicon: LSJ
  rationale: ἄγγελος in this context clearly refers to an angelic being, not merely
    a human messenger. ἀγαθός is rendered 'good' in its plain sense; 'benevolent'
    is interpretive and less direct.
- source_word: ἔμπροσθεν ἡμῶν
  chosen: before us
  alternatives:
  - ahead of us
  - in front of us
  lexicon: LSJ
  rationale: The phrase indicates going in advance of the army. 'Before us' preserves
    both spatial and leadership nuance and echoes biblical idiom naturally.
- source_word: εἰς δέος καὶ τρόμον
  chosen: to bring fear and trembling
  alternatives:
  - for fear and trembling
  - into fear and terror
  lexicon: LSJ
  rationale: The preposition εἰς here expresses intended result or effect. The phrase
    likely describes the angel's effect on the enemy, not the petitioners' emotional
    state. 'To bring fear and trembling' makes the result sense explicit in idiomatic
    English while staying close to the Greek pair δέος/τρόμος.
