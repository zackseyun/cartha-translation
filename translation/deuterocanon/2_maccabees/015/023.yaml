theological_decisions:
- issue: Referent of 'fear and trembling'
  chosen_reading: The requested angel is sent ahead so as to produce fear and trembling,
    presumably in the opposing forces.
  alternative_readings:
  - The phrase could be left more formally as 'for fear and trembling' without specifying
    whose fear is in view.
  rationale: The immediate military-prayer context favors a result clause describing
    the angel's effect on enemies. English benefits from making the purposive/result
    nuance of εἰς explicit, while not adding an explicit object absent from the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
