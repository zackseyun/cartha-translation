translation:
  text: Take the holy sword, a gift from God, by which you will shatter the adversaries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Receive the holy sword, a gift from God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the enemies' for 'the adversaries.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λάβε
  chosen: Take
  alternatives:
  - Receive
  lexicon: LSJ
  rationale: Aorist imperative of λαμβάνω. 'Take' is direct and idiomatic in English
    for an urgent command in a vision or exhortation context; 'receive' is possible
    but less forceful.
- source_word: τὴν ἁγίαν ῥομφαίαν
  chosen: the holy sword
  alternatives:
  - the sacred sword
  - the holy long sword
  lexicon: LSJ
  rationale: ῥομφαία denotes a large sword/blade; 'sword' is the natural English equivalent,
    while 'holy' straightforwardly renders ἁγίαν. 'Sacred' is possible, but 'holy'
    better preserves the religious register of the Greek.
- source_word: δῶρον
  chosen: as a gift
  alternatives:
  - a gift
  lexicon: LSJ
  rationale: Predicate/appositional use after the imperative is best conveyed idiomatically
    in English as 'as a gift,' clarifying that the sword is being received in the
    capacity of a gift from God.
- source_word: παρὰ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - from the side of God
  - from God himself
  lexicon: LSJ
  rationale: παρά with genitive commonly indicates source/origin, so 'from God' is
    the plain sense.
- source_word: δι' ἧς
  chosen: by which
  alternatives:
  - with which
  - through which
  lexicon: LSJ
  rationale: The relative pronoun refers to the sword as the means by which the action
    is accomplished. 'By which' preserves the instrumental sense cleanly.
- source_word: θραύσεις
  chosen: you will shatter
  alternatives:
  - you will break
  - you will crush
  lexicon: LSJ
  rationale: Future of θραύω, conveying forceful breaking. 'Shatter' best captures
    the vivid, martial force without overinterpreting.
- source_word: τοὺς ὑπεναντίους
  chosen: the adversaries
  alternatives:
  - the enemies
  - those who oppose you
  lexicon: LSJ
  rationale: ὑπεναντίος means opposed or hostile. 'Adversaries' preserves the formal
    tone and opposition sense; 'enemies' is possible but slightly less precise.
