theological_decisions:
- issue: Whether to render ἁγίαν with a more cultic English term
  chosen_reading: holy
  alternative_readings:
  - sacred
  rationale: The verse presents the weapon as divinely given and set apart. 'Holy'
    is the most transparent rendering of ἁγίαν and avoids importing a narrower cultic
    nuance not explicit in the text.
  doctrine_reference: 'DOCTRINE.md: Readable modern English; original-language primacy
    over translation tradition.'
