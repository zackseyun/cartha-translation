translation:
  text: And after cutting out the tongue of the ungodly Nikanor, he said he would
    throw it piece by piece to the birds, and hang up the reward of his folly opposite
    the temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the due penalty for his folly.' The Greek expression τὰ ἐπίχειρα can
      denote recompense or what one receives in return for one's deeds.
    reason: lexical_alternative
lexical_decisions:
- source_word: γλῶσσαν
  chosen: tongue
  alternatives:
  - language
  - speech
  lexicon: LSJ
  rationale: The physical act of cutting it out requires the bodily sense 'tongue,'
    not the figurative sense 'speech' or 'language'.
- source_word: δυσσεβοῦς
  chosen: ungodly
  alternatives:
  - impious
  - profane
  lexicon: LSJ
  rationale: The adjective denotes irreverence toward God. 'Ungodly' is clear modern
    English and preserves the religious force better than the more formal 'impious'.
- source_word: ἐκτεμών
  chosen: after cutting out
  alternatives:
  - having cut out
  - cutting off
  lexicon: LSJ
  rationale: The participle is antecedent to the main verb and describes removal of
    the tongue. 'After cutting out' gives natural English sequence while staying close
    to the Greek.
- source_word: ἔφη
  chosen: he said he would
  alternatives:
  - he said
  - he declared that he would
  lexicon: LSJ
  rationale: The infinitives that follow express what he said he intended to do. English
    idiom is best represented by 'he said he would'.
- source_word: μετὰ μέρος
  chosen: piece by piece
  alternatives:
  - in part
  - bit by bit
  lexicon: LSJ
  rationale: The phrase indicates distribution in portions. In context of feeding
    birds, 'piece by piece' is vivid and natural.
- source_word: τοῖς ὄρνεσιν
  chosen: to the birds
  alternatives:
  - for the birds
  lexicon: LSJ
  rationale: A straightforward dative of recipient/advantage. 'To the birds' is literal
    and clear.
- source_word: τὰ δʼ ἐπίχειρα
  chosen: the wages
  alternatives:
  - the due penalty
  - the recompense
  - the just deserts
  lexicon: LSJ
  rationale: The phrase means what is laid on someone as a return for deeds, here
    punitive recompense. 'Wages' preserves the concrete metaphor and works idiomatically
    with the genitive that follows.
- source_word: τῆς ἀνοίας
  chosen: of his folly
  alternatives:
  - of his madness
  - of his senselessness
  lexicon: LSJ
  rationale: ἀνοία denotes foolishness or senselessness. 'Folly' fits the moral tone
    and pairs well with 'wages' in English.
- source_word: κατέναντι τοῦ ναοῦ
  chosen: opposite the temple
  alternatives:
  - before the temple
  - in front of the sanctuary
  lexicon: LSJ
  rationale: κατέναντι commonly means 'opposite' or 'in front of.' 'Temple' is the
    normal rendering of ναός here and avoids over-specifying the exact spatial nuance.
- source_word: κρεμιάσαι
  chosen: hang up
  alternatives:
  - hang
  - suspend
  lexicon: LSJ
  rationale: The aorist infinitive expresses the intended public display. 'Hang up'
    captures both suspension and display in idiomatic English.
