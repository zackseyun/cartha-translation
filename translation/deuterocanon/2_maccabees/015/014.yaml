translation:
  text: Then Onias answered and said, “This is Jeremiah, the prophet of God, who loves
    his brothers and prays much for the people and the holy city.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the one who loves his brothers.” The Greek φιλάδελφος is literally
      'brother-loving' and denotes familial affection toward his fellow people.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθέντα
  chosen: answered
  alternatives:
  - replied
  - responded
  lexicon: LSJ
  rationale: Aorist participle of ἀποκρίνομαι introducing Onias's speech. 'Answered'
    is the standard and natural English narrative equivalent.
- source_word: φιλάδελφος
  chosen: the one who loves the brothers
  alternatives:
  - brother-loving
  - lover of his brothers
  - friendly to his brothers
  lexicon: LSJ
  rationale: The adjective literally means 'loving one's brothers/brethren.' Because
    the following article and predicate structure identify Jeremiah, an appositional
    phrase in English is clearer than a bare adjective. 'Brothers' preserves the masculine
    familial term rather than flattening it to 'people' or 'fellow Jews.'
- source_word: πολλὰ προσευχόμενος
  chosen: prays much
  alternatives:
  - praying much
  - who prays often
  - who offers many prayers
  lexicon: LSJ
  rationale: The participial phrase describes Jeremiah's ongoing intercession. 'Prays
    much' is concise, idiomatic, and preserves the adverbial force of πολλὰ without
    overinterpreting it.
- source_word: λαοῦ
  chosen: the people
  alternatives:
  - his people
  - the nation
  lexicon: LSJ
  rationale: λαός here refers to the covenant people in context. 'The people' is the
    most direct rendering and avoids adding 'his' where the Greek does not explicitly
    do so.
- source_word: ἁγίας πόλεως
  chosen: the holy city
  alternatives:
  - the sacred city
  lexicon: LSJ
  rationale: A straightforward rendering of the phrase, preserving the sanctity language
    attached to Jerusalem.
- source_word: ὁ τοῦ θεοῦ προφήτης
  chosen: the prophet of God
  alternatives:
  - God's prophet
  lexicon: LSJ
  rationale: Both are possible; 'the prophet of God' follows the Greek structure closely
    while remaining natural English.
