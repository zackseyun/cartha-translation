theological_decisions:
- issue: Rendering φόβος in a military-religious context
  chosen_reading: fear was for the consecrated temple
  alternative_readings:
  - concern was for the consecrated temple
  - anxiety was for the consecrated temple
  rationale: The term can denote fear, dread, or anxious concern. Because the sentence
    contrasts levels of concern and climaxes in the temple's danger, 'fear' best preserves
    the Greek while allowing the context to convey anxious concern rather than mere
    emotionless priority.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
- issue: Rendering καθηγιασμένου ναοῦ
  chosen_reading: the consecrated temple
  alternative_readings:
  - the holy temple
  - the sanctified temple
  rationale: The participle specifically denotes a temple that has been consecrated.
    'Holy temple' is idiomatic but less explicit about the verbal idea in the Greek.
    'Consecrated temple' better reflects the source wording and cultic status.
  doctrine_reference: Original-language primacy over translation tradition.
