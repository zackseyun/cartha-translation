translation:
  text: For the concern about wives and children, and further about brothers and relatives,
    weighed less with them, but the greatest and first fear was for the consecrated
    temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was of less importance to them.' The Greek idiom literally says it 'lay
      in a lesser part' for them, expressing lower priority.
    reason: lexical_alternative
  - marker: b
    text: Or 'concern' or 'anxiety' instead of 'fear' for the final clause; the Greek
      φόβος can cover both dread and anxious concern in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ περὶ γυναικῶν καὶ τέκνων
  chosen: the concern about wives and children
  alternatives:
  - the matter concerning wives and children
  - the anxiety for wives and children
  lexicon: LSJ
  rationale: The article with περὶ + genitive functions substantivally, referring
    to the matter/concern regarding family members. 'Concern about' is natural English
    and preserves the emotional sense in context.
- source_word: ἔτι δὲ ἀδελφῶν καὶ συγγενῶν
  chosen: and further about brothers and relatives
  alternatives:
  - and also about brothers and kinsmen
  - and still more about brothers and kindred
  lexicon: LSJ
  rationale: ἔτι δέ adds another category of concern. συγγενῶν denotes relatives/kinsmen.
    'Brothers and relatives' keeps the familial grouping clear and readable.
- source_word: ἐν ἥττονι μέρει κείμενος αὐτοῖς
  chosen: weighed less with them
  alternatives:
  - occupied a lesser place for them
  - was of less importance to them
  lexicon: LSJ
  rationale: The idiom literally indicates lying in a lesser part/degree for them,
    meaning it ranked lower in their concern. 'Weighed less with them' captures comparative
    priority without over-paraphrasing.
- source_word: μέγιστος δὲ καὶ πρῶτος
  chosen: the greatest and first
  alternatives:
  - greatest and foremost
  - supreme and first
  lexicon: LSJ
  rationale: The paired superlative and ordinal stress highest priority. 'Greatest
    and first' is slightly formal but transparent and close to the Greek emphasis.
- source_word: ὁ περὶ τοῦ καθηγιασμένου ναοῦ φόβος
  chosen: fear was for the consecrated temple
  alternatives:
  - concern was for the holy temple
  - anxiety was for the sanctified temple
  lexicon: LSJ
  rationale: φόβος here denotes anxious fear/concern rather than reverential fear.
    καθηγιασμένου is a perfect participle meaning consecrated/sanctified. 'Consecrated
    temple' preserves the cultic force without archaic diction.
