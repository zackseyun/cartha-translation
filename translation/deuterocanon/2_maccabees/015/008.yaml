translation:
  text: And he urged those with him not to fear the attack of the nations, but to
    keep in mind the help that had previously come to them from heaven, and now to
    expect the victory that would come to them from the Almighty.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρεκάλει
  chosen: urged
  alternatives:
  - encouraged
  - exhorted
  - appealed to
  lexicon: BDAG
  rationale: The imperfect verb indicates ongoing exhortation. 'Urged' captures strong
    encouragement without sounding overly formal or archaic.
- source_word: τοὺς σὺν αὐτῷ
  chosen: those with him
  alternatives:
  - his companions
  - those who were with him
  lexicon: BDAG
  rationale: This phrase refers to Judas's men in a natural way. 'Those with him'
    is clear and closely follows the Greek without unnecessary expansion.
- source_word: μὴ δειλιᾷν
  chosen: not to fear
  alternatives:
  - not to lose heart
  - not to be cowardly
  lexicon: BDAG
  rationale: The verb can denote cowardice or shrinking back in fear. In this military
    context, 'not to fear' communicates the sense idiomatically in modern English
    while preserving the exhortational force.
- source_word: τὴν τῶν ἐθνῶν ἔφοδον
  chosen: the attack of the nations
  alternatives:
  - the assault of the Gentiles
  - the onslaught of the nations
  lexicon: BDAG
  rationale: ἔφοδος is a hostile advance or attack. ἐθνῶν in this deuterocanonical
    Jewish context refers to the surrounding foreign peoples; 'nations' is the default,
    while 'Gentiles' is possible but can sound more theologically loaded in English
    than the context requires.
- source_word: ἔχοντας δὲ κατὰ νοῦν
  chosen: but to keep in mind
  alternatives:
  - but having in mind
  - but bearing in mind
  - but remembering
  lexicon: BDAG
  rationale: This participial construction expresses the manner accompanying the exhortation.
    'Keep in mind' is natural English and preserves the cognitive emphasis of κατὰ
    νοῦν.
- source_word: τὰ προγεγονότα αὐτοῖς ἀπʼ οὐρανοῦ βοηθήματα
  chosen: the help that had previously come to them from heaven
  alternatives:
  - the former helps from heaven given to them
  - the aid that had happened to them from heaven
  lexicon: BDAG
  rationale: βοηθήματα means acts of help or aids. The perfect participle προγεγονότα
    points to prior occurrences. This rendering makes explicit in idiomatic English
    that these were past instances of divine help.
- source_word: τὰ νῦν προσδοκᾷν
  chosen: and now to expect
  alternatives:
  - and now to await
  - and now to look for
  lexicon: BDAG
  rationale: The infinitive continues the content of the exhortation. 'Expect' conveys
    confident anticipation better than the slightly flatter 'await' in this context.
- source_word: τὴν παρὰ τοῦ παντοκράτορος ἐσομένην αὐτοῖς νίκην
  chosen: the victory that would come to them from the Almighty
  alternatives:
  - the victory that would be theirs from the Almighty
  - the victory coming to them from the Almighty
  lexicon: BDAG
  rationale: 'παντοκράτωρ is best rendered ''the Almighty'' here as a divine title.
    ἐσομένην marks the future character of the victory, and παρὰ indicates its source:
    it comes from God.'
