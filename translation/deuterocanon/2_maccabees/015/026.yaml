theological_decisions:
- issue: Religious force of ἐπίκλησις in battle context
  chosen_reading: Retain explicit religious language as 'invocation' rather than reducing
    it to a generic appeal.
  alternative_readings:
  - with appeal
  - calling on God
  rationale: The verse emphasizes that Judas's side entered combat in conscious dependence
    on divine help. The Greek does not name God explicitly in this clause, so the
    translation preserves the religious act without inserting the object.
  doctrine_reference: Translation philosophy §1, §3
