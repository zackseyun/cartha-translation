translation:
  text: But those around Judas joined battle with the enemies with invocation and
    prayers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with calling upon God and prayers.' The Greek says 'with invocation
      and prayers,' leaving the object of the invocation unstated in this clause.
    reason: lexical_alternative
  - marker: b
    text: '''Prayers'' could also be rendered ''vows,'' since the Greek word can bear
      either sense depending on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ περὶ τὸν Ἰούδαν
  chosen: those around Judas
  alternatives:
  - Judas and his men
  - those with Judas
  lexicon: LSJ
  rationale: The idiom περὶ + accusative can denote those associated with or surrounding
    a leader. 'Those around Judas' preserves the Greek construction without over-specifying
    military identity beyond the context.
- source_word: μετὰ ἐπικλήσεως
  chosen: with invocation
  alternatives:
  - with calling upon God
  - with appeal
  lexicon: LSJ
  rationale: ἐπίκλησις denotes an invocation or calling upon a deity/help. 'Invocation'
    keeps the religious sense and pairs naturally with 'prayers,' while avoiding adding
    an explicit object not stated in the Greek.
- source_word: καὶ εὐχῶν
  chosen: and prayers
  alternatives:
  - and vows
  - and supplications
  lexicon: LSJ
  rationale: εὐχή can mean prayer or vow depending on context. Here, alongside ἐπίκλησις
    and in a battle setting, 'prayers' best fits the immediate sense of petition to
    God; 'vows' is possible but less likely in this collocation.
- source_word: συνῆψαν
  chosen: joined battle
  alternatives:
  - engaged
  - closed with
  lexicon: LSJ
  rationale: In military context συνάπτω can mean to engage or join battle. 'Joined
    battle' is idiomatic modern English that preserves the martial force better than
    the more generic 'engaged'.
- source_word: τοῖς πολεμίοις
  chosen: with the enemies
  alternatives:
  - against the enemies
  - with their enemies
  lexicon: LSJ
  rationale: The dative after συνῆψαν marks the party engaged in combat. English idiom
    prefers 'with the enemies' in 'joined battle with,' though the adversative sense
    is clear from context.
