theological_decisions:
- issue: Nature of the observance described by ἐπίσημον
  chosen_reading: A marked/notable commemorative day
  alternative_readings:
  - a celebrated festival day
  - an official holiday
  rationale: The verse concerns calendrical commemoration, but the Greek adjective
    itself only marks the day as distinguished. The translation avoids overstating
    liturgical or legal force beyond the wording.
  doctrine_reference: Translation philosophy §1, §6
- issue: Meaning of τῇ κυριακῇ φωνῇ
  chosen_reading: '''in the Syrian language'''
  alternative_readings:
  - '''in the common language'''
  - '''in the vernacular'''
  rationale: The phrase is somewhat unusual, and the source validation notes a mismatch,
    so some uncertainty should be preserved. Given the appositional explanation of
    the month name Adar, the rendering points to the local linguistic designation
    rather than a theological title.
  doctrine_reference: Translation philosophy §3
