translation:
  text: and to keep the thirteenth day of the twelfth month—called Adar in the Syrian
    language—as a notable day, one day before Mordecai's day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the common language' or 'in the vernacular'; the Greek phrase is
      unusual here, and the source witness may reflect a difficult expression for
      the local Syrian/Aramaic designation.
    reason: lexical_alternative
  - marker: b
    text: That is, the day before the observance associated with Mordecai, likely
      alluding to the Purim celebration.
    reason: cross_reference
lexical_decisions:
- source_word: ἔχειν
  chosen: to keep
  alternatives:
  - to observe
  - to hold
  lexicon: LSJ
  rationale: In this calendrical/festal context, ἔχειν with ἐπίσημον conveys maintaining
    or observing a day as marked/special, not merely possessing it.
- source_word: ἐπίσημον
  chosen: notable
  alternatives:
  - distinguished
  - marked
  - celebrated
  lexicon: LSJ
  rationale: The adjective denotes something marked out or notable. 'Notable' preserves
    the sense of official distinction without overtranslating to a full festive term
    not explicit in the Greek.
- source_word: προκαδεκάτην
  chosen: thirteenth day
  alternatives:
  - the day before the fourteenth
  lexicon: LSJ
  rationale: The compound ordinal refers to the thirteenth day of the month. Rendering
    it directly is clearer in English than reproducing the compound form.
- source_word: δωδεκάτου μηνός
  chosen: of the twelfth month
  lexicon: LSJ
  rationale: Straightforward genitival expression specifying the month.
- source_word: Ἀδὰρ
  chosen: Adar
  lexicon: LSJ
  rationale: Month name is best transliterated per project policy to transliterate
    names.
- source_word: τῇ κυριακῇ φωνῇ
  chosen: in the Syrian language
  alternatives:
  - in the common language
  - in the vernacular
  lexicon: LSJ
  rationale: In this context κυριακή refers to the local/common Syrian (i.e., Aramaic/Syriac)
    designation of the month name, not 'lordly' or 'official.' 'Syrian language' is
    the most defensible idiomatic rendering from the Greek witness.
- source_word: πρὸ μιᾶς ἡμέρας
  chosen: one day before
  alternatives:
  - on the day before
  lexicon: LSJ
  rationale: Temporal phrase indicating the relative position of this observance before
    the following named day.
- source_word: τῆς Μαρδοχαϊκῆς ἡμέρας
  chosen: Mordecai's day
  alternatives:
  - the day of Mordecai
  - the Mordecai festival
  lexicon: LSJ
  rationale: The adjective Μαρδοχαϊκή means 'pertaining to Mordecai.' 'Mordecai's
    day' is concise and preserves the allusion to the Purim-related observance without
    importing explanatory material into the main text.
