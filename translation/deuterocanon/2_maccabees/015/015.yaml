theological_decisions:
- issue: Visionary presentation of Jeremiah bestowing a weapon
  chosen_reading: Render the action straightforwardly as part of the narrative vision
    without adding interpretive qualifiers in the verse itself.
  alternative_readings:
  - Explicitly mark it as occurring in a vision within the verse
  rationale: The immediate Greek simply narrates Jeremiah's action. The visionary
    context is established in the surrounding verses, so importing an explanatory
    qualifier here would add information not present in this line.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
