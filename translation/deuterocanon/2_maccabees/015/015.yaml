translation:
  text: 'Then Jeremiah stretched out his right hand and handed Judas a golden sword,
    and as he gave it he addressed him with these words:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προτείναντα
  chosen: stretched out
  alternatives:
  - extended
  - held out
  lexicon: LSJ
  rationale: The participle from προτείνω describes extending the hand forward. 'Stretched
    out' is natural modern English and preserves the physical gesture better than
    the slightly stiffer 'extended.'
- source_word: τὴν δεξιὰν
  chosen: his right hand
  alternatives:
  - the right hand
  lexicon: LSJ
  rationale: Although the Greek literally has 'the right,' English normally supplies
    'hand.' Adding 'his' clarifies that Jeremiah is the subject performing the action.
- source_word: παραδοῦναι
  chosen: gave
  alternatives:
  - hand over
  - deliver
  lexicon: LSJ
  rationale: In this context the infinitive expresses the act of placing the sword
    into Judas's possession. 'Gave' is the most idiomatic rendering in English; 'hand
    over' is possible but less smooth here.
- source_word: ῥομφαίαν χρυσῆν
  chosen: a golden sword
  alternatives:
  - a gold sword
  - a golden saber
  lexicon: LSJ
  rationale: ῥομφαία denotes a large sword or blade. 'Sword' is the clearest general
    rendering. χρυσῆν is adjectival, naturally rendered 'golden' in English.
- source_word: διδόντα
  chosen: as he gave it
  alternatives:
  - while giving it
  - giving it
  lexicon: LSJ
  rationale: The participle is contemporaneous with the speech act. Rendering it with
    'as he gave it' makes the sequence clear in idiomatic English and links the speech
    to the act of presentation.
- source_word: προσφωνῆσαι
  chosen: addressed him with these words
  alternatives:
  - spoke
  - said
  - saluted
  lexicon: LSJ
  rationale: The verb can mean to address or speak to someone. 'Addressed him with
    these words' preserves the formal tone and prepares for the quotation in the next
    verse.
- source_word: τάδε
  chosen: with these words
  alternatives:
  - this
  - these things
  lexicon: LSJ
  rationale: τάδε introduces the content of the following speech. 'With these words'
    is idiomatic and signals that a quotation follows.
- source_word: Ἰούδα
  chosen: Judas
  alternatives:
  - Judah
  lexicon: standard Greek onomastics
  rationale: As a personal name in 2 Maccabees referring to Judas Maccabeus, 'Judas'
    is the standard transliteration in English for this figure.
- source_word: Ἰερεμίαν
  chosen: Jeremiah
  alternatives:
  - Jeremias
  lexicon: standard Greek onomastics
  rationale: The conventional English transliteration of the prophet's name is 'Jeremiah,'
    which is more familiar to modern readers than 'Jeremias.'
