translation:
  text: And after stirring up their spirits, he urged them on, at the same time pointing
    out the godlessness of the nations and the violation of oaths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breaking of oaths.'
    reason: lexical_alternative
  - marker: b
    text: '''Nations'' could also be rendered ''Gentiles.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς θυμοῖς διεγείρας
  chosen: after stirring them up in spirit
  alternatives:
  - after arousing their courage
  - after stirring up their anger
  - after rousing their hearts
  lexicon: LSJ
  rationale: θυμός can denote spiritedness, passion, anger, or courage depending on
    context. In this military exhortation, the phrase refers to rousing inner resolve
    rather than merely provoking anger. 'In spirit' preserves the plural dative construction
    idiomatically without over-literal awkwardness.
- source_word: παρήγγειλεν
  chosen: he urged them on
  alternatives:
  - he commanded them
  - he charged them
  - he gave orders
  lexicon: LSJ
  rationale: The verb can mean command or give instructions, but in this context of
    exhorting troops, 'urged them on' captures both directive force and motivational
    tone better than a bare 'commanded.'
- source_word: ἅμα παρειδείκνυς
  chosen: at the same time pointing out
  alternatives:
  - while also showing
  - simultaneously demonstrating
  lexicon: LSJ
  rationale: This participial phrase indicates concurrent action accompanying the
    urging. 'At the same time pointing out' is natural English and preserves the explanatory
    force.
- source_word: τὴν τῶν ἐθνῶν ἀθεσίαν
  chosen: the godlessness of the nations
  alternatives:
  - the impiety of the Gentiles
  - the irreligion of the nations
  lexicon: LSJ
  rationale: ἀθεσία denotes impiety or godlessness. 'Godlessness' is accessible modern
    English and preserves the religious-moral charge. 'Nations' is preferred over
    'Gentiles' here because the contrast is political-ethnic rather than specifically
    later Jewish-Christian usage.
- source_word: τὴν τῶν ὅρκων παράβασιν
  chosen: the violation of their oaths
  alternatives:
  - the breaking of oaths
  - the transgression of the oaths
  lexicon: LSJ
  rationale: παράβασις is a violation or transgression. 'Violation of their oaths'
    is clear and weighty. The genitive likely refers to oaths associated with the
    nations just mentioned, so 'their oaths' makes the relation explicit in English.
