theological_decisions:
- issue: Depiction of Onias in a visionary intercessory role
  chosen_reading: Render the scene straightforwardly as Onias stretching out his hands
    and praying for the Jewish people.
  alternative_readings:
  - Translate more weakly as merely 'wishing well' for the Jews
  rationale: The Greek κατεύχεσθαι clearly denotes prayer, and the verse presents
    Onias as an intercessor within the vision. The translation should preserve that
    theological-literary portrayal without expanding its implications beyond the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
