  edition: lxx-swete-1909
  text: ἦν δὲ ἡ τούτου θεωρία τοιάδε· Ὀνίαν τὸν γενόμενον ἀρχιερέα, ἄνδρα καλὸν καὶ
    ἀγαθόν, αἰδήμονα μὲν τὴν ἀπάντησιν, πρᾶον δὲ τὸν τρόπον, καὶ λαλιάν προειμένον
