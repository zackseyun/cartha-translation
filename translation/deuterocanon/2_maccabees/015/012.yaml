translation:
  text: 'Now his vision was like this: Onias, who had become high priest, a noble
    and good man, modest in bearing, gentle in manner, and one who spoke fittingly,
    and who from childhood had cultivated all the proper qualities of virtue—this
    man was stretching out his hands and praying for the whole body of the Jews.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the entire community of the Jews.' The Greek speaks of the Jews
      as a single corporate body.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρία
  chosen: vision
  alternatives:
  - appearance
  - spectacle
  lexicon: LSJ
  rationale: In context this introduces the content of a dream/seen scene, so 'vision'
    best conveys the experienced sight rather than a mere abstract 'contemplation'
    or external 'appearance'.
- source_word: γενόμενον ἀρχιερέα
  chosen: who had become high priest
  alternatives:
  - the former high priest
  - who became high priest
  lexicon: LSJ
  rationale: The participle γενόμενον is literally 'having become'; English past perfect
    fits the retrospective description of Onias. 'Former high priest' is interpretive
    and less directly tied to the Greek wording.
- source_word: καλὸν καὶ ἀγαθόν
  chosen: noble and good
  alternatives:
  - beautiful and good
  - honorable and good
  lexicon: LSJ
  rationale: For a man's character description, καλός commonly carries the sense of
    noble/honorable rather than physical beauty. Pairing it with ἀγαθός yields a moral
    commendation.
- source_word: αἰδήμονα μὲν τὴν ἀπάντησιν
  chosen: modest in bearing
  alternatives:
  - modest in demeanor
  - reverent in his manner of meeting others
  lexicon: LSJ
  rationale: αἰδήμων denotes modest/respectful reserve. The phrase with τὴν ἀπάντησιν
    is somewhat idiomatic; 'in bearing' captures outward deportment without over-specifying
    a greeting scene.
- source_word: πρᾶον δὲ τὸν τρόπον
  chosen: gentle in manner
  alternatives:
  - mild in character
  - meek in conduct
  lexicon: LSJ
  rationale: πρᾶος regularly means gentle/mild. 'Gentle in manner' is natural English
    and matches the ethical portrait.
- source_word: λαλιάν προειμένον πρεπόντως
  chosen: one who spoke fittingly
  alternatives:
  - free in speech in a proper way
  - refined in speech
  - given to appropriate speech
  lexicon: LSJ
  rationale: The phrase is difficult, but the sense is that his speech was well-formed/appropriate.
    'Spoke fittingly' preserves the adverb πρεπόντως and avoids awkward literalism.
- source_word: ἐκ παιδὸς ἐκμεμελετηκότα
  chosen: from childhood had practiced
  alternatives:
  - from childhood had carefully cultivated
  - from childhood had studied diligently
  lexicon: LSJ
  rationale: The perfect participle suggests long-standing cultivation by practice/care,
    not merely academic study. 'From childhood had practiced' communicates habitual
    formation.
- source_word: πάντα τὰ τῆς ἀρετῆς ἴδια
  chosen: all the proper qualities of virtue
  alternatives:
  - all that belongs to virtue
  - all virtue's distinctive traits
  lexicon: LSJ
  rationale: The phrase denotes the things characteristic of virtue. 'Proper qualities
    of virtue' is slightly interpretive but clear and faithful.
- source_word: κατεύχεσθαι
  chosen: praying
  alternatives:
  - offering prayer
  - making supplication
  lexicon: LSJ
  rationale: The verb here denotes earnest prayer on behalf of others. 'Praying' is
    the clearest main-text rendering; intercessory force is supplied by context.
- source_word: τῷ παντὶ τῶν Ἰουδαίων συστήματι
  chosen: for the whole body of the Jews
  alternatives:
  - for the entire community of the Jews
  - for the whole commonwealth of the Jews
  lexicon: LSJ
  rationale: σύστημα can denote a body, organized whole, or corporate community. 'Whole
    body of the Jews' preserves the collective sense without importing later institutional
    language.
