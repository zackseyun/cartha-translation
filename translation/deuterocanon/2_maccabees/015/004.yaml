- issue: Rendering of the Sabbath-related phrase τὴν ἑβδόμαδα
  chosen_reading: the seventh day
  alternative_readings:
  - the Sabbath
  rationale: The Greek uses a more literal expression rather than the standard loanword
    for Sabbath. To remain anchored to the source, the main text keeps 'the seventh
    day,' while the alternative interpretive gloss 'the Sabbath' is preserved in a
    footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    significant alternatives in footnotes'
