translation:
  text: But they declared, “The Lord lives; he himself is the ruler in heaven, the
    one who commanded the observance of the seventh day.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Sabbath.” The Greek says “the seventh day,” referring to Sabbath
      observance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποφηναμένων
  chosen: they declared
  alternatives:
  - they answered
  - they stated
  - they made known
  lexicon: LSJ
  rationale: The participle introduces the Jews' spoken reply. 'Declared' preserves
    the formal, public force of the verb better than the flatter 'said' while remaining
    natural English.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Follows project default for κύριος. In this Jewish context it refers
    to God, and 'Lord' preserves both reverence and continuity with Septuagint usage.
- source_word: ζῶν
  chosen: lives
  alternatives:
  - is living
  - is alive
  lexicon: LSJ
  rationale: In the expression Ἔστιν ὁ κύριος ζῶν, idiomatic English is 'The Lord
    lives.' This preserves the oath-like, confessional force of the Greek.
- source_word: δυνάστης
  chosen: ruler
  alternatives:
  - sovereign
  - mighty one
  - potentate
  lexicon: LSJ
  rationale: The noun denotes one who holds power or dominion. 'Ruler' is clear modern
    English and fits the immediate sense of God's authority from heaven without sounding
    archaic like 'potentate.'
- source_word: κελεύσας
  chosen: commanded
  alternatives:
  - ordered
  - directed
  lexicon: LSJ
  rationale: The aorist participle points to God's authoritative institution of the
    Sabbath. 'Commanded' best conveys binding divine authority.
- source_word: ἀσκεῖν
  chosen: the keeping of
  alternatives:
  - to observe
  - to practice
  lexicon: LSJ
  rationale: The verb can mean to practice or exercise. Here, with τὴν ἑβδόμαδα, it
    refers to observance. 'The keeping of' makes explicit the idiomatic sense in English
    while staying close to the Greek action.
- source_word: τὴν ἑβδόμαδα
  chosen: the seventh day
  alternatives:
  - the Sabbath
  - the seventh
  lexicon: LSJ
  rationale: Literally the phrase refers to 'the seventh [day/period].' In context
    it clearly denotes Sabbath observance. 'The seventh day' preserves the source
    wording more directly, while the Sabbath sense remains evident from context.
