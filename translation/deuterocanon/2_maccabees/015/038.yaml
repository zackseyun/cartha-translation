translation:
  text: So, since the events concerning Nicanor had turned out in this way, and from
    those times the city had remained in the possession of the Hebrews, I too will
    bring my account to a close here.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the city had been held by the Hebrews.'
    reason: lexical_alternative
  - marker: b
    text: That is, the narrator explicitly ends his written account at this point.
    reason: cross_reference
lexical_decisions:
- source_word: Τῶν ... κατὰ Νικάνορα
  chosen: the events concerning Nicanor
  alternatives:
  - the matters regarding Nicanor
  - what happened with Nicanor
  - the affairs against Nicanor
  lexicon: LSJ
  rationale: The idiom κατὰ + accusative with a personal name here refers broadly
    to the matter or events connected with Nicanor, not spatial movement 'against'
    him in a narrow sense. 'Concerning Nicanor' is natural English and fits the summarizing
    close of the book.
- source_word: χωρησάντων
  chosen: had turned out
  alternatives:
  - had happened
  - had proceeded
  - had come to pass
  lexicon: LSJ
  rationale: As an aorist participle from χωρέω, in this context it conveys how matters
    'went' or 'turned out.' 'Had turned out' captures the resultative sense in idiomatic
    English better than a wooden 'having proceeded.'
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: LSJ
  rationale: This adverb points back to the narrated outcome. 'In this way' preserves
    the backward-looking summary force in readable English.
- source_word: κρατηθείσης τῆς πόλεως ὑπὸ τῶν Ἐβραίων
  chosen: the city had remained in the possession of the Hebrews
  alternatives:
  - the city had been held by the Hebrews
  - the city had been controlled by the Hebrews
  lexicon: LSJ
  rationale: κρατέω in the passive here denotes being held or kept under control.
    'Remained in the possession of' reflects both the passive construction and the
    continuing state from 'those times' onward, while avoiding overly militarized
    wording beyond the text.
- source_word: τῆς πόλεως
  chosen: the city
  alternatives:
  - the city of Jerusalem
  lexicon: LSJ
  rationale: The Greek says simply 'the city.' The referent is Jerusalem from context,
    but the text itself does not name it here, so the translation preserves the anaphoric
    expression.
- source_word: ἀπ᾿ ἐκείνων τῶν καιρῶν
  chosen: from those times
  alternatives:
  - from that time onward
  - since those days
  lexicon: LSJ
  rationale: The plural καιρῶν is retained with 'times,' though idiomatic English
    could singularize. This keeps closer to the Greek while remaining readable.
- source_word: καὶ αὐτὸς
  chosen: I too
  alternatives:
  - and I myself
  - and I also
  lexicon: LSJ
  rationale: The authorial self-reference marks the narrator's own action in concluding.
    'I too' is concise and preserves the emphatic αὐτός with the connective force
    of καί.
- source_word: αὐτόθι
  chosen: here
  alternatives:
  - at this point
  - in this very place
  lexicon: LSJ
  rationale: In context this adverb signals the point at which the writer stops his
    narrative. 'Here' is the most natural concise equivalent.
- source_word: τὸν λόγον καταπαύσω
  chosen: will bring my account to a close
  alternatives:
  - will stop the narrative
  - will end my discourse
  - will cease my account
  lexicon: LSJ
  rationale: λόγος here refers to the written account or narrative, and καταπαύω means
    to stop or bring to an end. 'Bring my account to a close' is idiomatic and suitably
    literary for a formal conclusion.
