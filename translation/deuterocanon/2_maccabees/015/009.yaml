id: 2MA.15.9
reference: 2 Maccabees 15:9
source:
  edition: lxx-swete-1909
  text: καὶ παραμυθούμενος αὐτοὺς ἐκ τοῦ νόμου καὶ τῶν προφητῶν, προσαμνήσας δὲ αὐτοὺς
    καὶ τοὺς ἀγῶνας οὓς ἦσαν ἐκτετελεκότες, προθυμοτέρους αὐτοὺς κατέστησεν.
  language: Greek
