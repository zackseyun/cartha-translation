translation:
  text: And by encouraging them from the Law and the Prophets, and also by reminding
    them of the struggles they had already endured, he made them more eager.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παραμυθούμενος
  chosen: encouraging
  alternatives:
  - comforting
  - exhorting
  lexicon: BDAG
  rationale: The participle denotes speaking in a way that heartens or consoles. In
    this military context, 'encouraging' best captures strengthening their resolve
    without overstating emotional consolation.
- source_word: ἐκ τοῦ νόμου καὶ τῶν προφητῶν
  chosen: from the Law and the Prophets
  alternatives:
  - out of the Law and the Prophets
  - by means of the Law and the Prophets
  lexicon: LSJ
  rationale: 'ἐκ here indicates source or basis: his encouragement drew on scriptural
    material. ''The Law and the Prophets'' preserves the recognizable Jewish scriptural
    pairing and the article structure.'
- source_word: προσαμνήσας
  chosen: reminding
  alternatives:
  - calling to mind for them
  - bringing to their remembrance
  lexicon: LSJ
  rationale: The aorist participle means to remind or recall to memory. 'Reminding'
    is idiomatic modern English and fits the sequence of actions.
- source_word: ἀγῶνας
  chosen: struggles
  alternatives:
  - contests
  - battles
  - conflicts
  lexicon: LSJ
  rationale: ἀγών can denote contest, struggle, or fight. 'Struggles' preserves the
    broader sense of hard-fought conflicts without narrowing it only to formal battles,
    and it suits the retrospective reference to what they had endured.
- source_word: οὓς ἦσαν ἐκτετελεκότες
  chosen: they had already completed
  alternatives:
  - they had accomplished
  - they had finished
  lexicon: BDAG
  rationale: The periphrastic pluperfect indicates prior completed action. 'Had already
    completed' brings out the completed aspect and the retrospective force in context.
- source_word: προθυμοτέρους
  chosen: more eager
  alternatives:
  - more ready
  - more willing
  - more zealous
  lexicon: BDAG
  rationale: The comparative adjective conveys increased readiness and zeal. 'More
    eager' is natural English and communicates heightened resolve.
- source_word: κατέστησεν
  chosen: he made
  alternatives:
  - he rendered
  - he caused to become
  lexicon: BDAG
  rationale: 'The verb here is causative: he caused them to become more eager. ''He
    made them more eager'' is concise and accurate.'
