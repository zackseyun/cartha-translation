  text: καὶ ἐπιδειξάμενος τὴν τοῦ μιεροῦ Νικάνορος κεφαλὴν καὶ τὴν χεῖρα τοῦ δυσφήμου,
    ἣν ἐκτείνας ἐπὶ τὸν ἅγιον τοῦ παντοκράτορος οἶκον ἐμεγαλαύχησεν,
