translation:
  text: And after displaying the head of the accursed Nikanor and the hand of that
    blasphemer, which he had stretched out against the holy house of the Almighty
    and boasted greatly,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the defiled Nikanor.' The Greek adjective is a strong term of religious/moral
      reproach, and 'accursed' is used here to convey that force idiomatically.
    reason: lexical_alternative
  - marker: b
    text: Or 'the hand of that reviler.' The Greek term can denote abusive or slanderous
      speech generally; 'blasphemer' is chosen because the context concerns impiety
      against the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιδειξάμενος
  chosen: after displaying
  alternatives:
  - having displayed
  - showing publicly
  lexicon: BDAG
  rationale: Aorist middle participle with sequential force in narrative; 'after displaying'
    gives natural English while preserving the participial action preceding the main
    verb in the next verse.
- source_word: μιεροῦ
  chosen: accursed
  alternatives:
  - polluted
  - defiled
  - foul
  lexicon: LSJ
  rationale: The adjective is pejorative and denotes something polluted or abominable.
    In this context, applied to Nikanor after his sacrilege, 'accursed' communicates
    the moral-religious denunciation more clearly in idiomatic English than the awkward
    'polluted Nikanor.'
- source_word: δυσφήμου
  chosen: blasphemer
  alternatives:
  - slanderer
  - evil-speaking man
  - reviler
  lexicon: LSJ
  rationale: Because the following clause specifies arrogant action against the holy
    house, the offense is impious speech/action against sacred things. 'Blasphemer'
    best captures the religious force.
- source_word: ἐκτείνας
  chosen: had stretched out
  alternatives:
  - stretched out
  - extended
  lexicon: BDAG
  rationale: Refers to Nikanor's hostile gesture against the temple. The pluperfect-like
    English 'had stretched out' clarifies that this action preceded the public display.
- source_word: ἐπὶ τὸν ἅγιον ... οἶκον
  chosen: against the holy house
  alternatives:
  - toward the holy house
  - against the sacred house
  lexicon: LSJ
  rationale: Given the hostile context and prior threat against the temple, ἐπί with
    accusative is best rendered adversatively as 'against,' not merely directional
    'toward.' 'Holy house' preserves the temple idiom.
- source_word: παντοκράτορος
  chosen: the Almighty
  alternatives:
  - the All-Ruler
  - the Omnipotent
  lexicon: BDAG
  rationale: Standard reverential rendering for the divine title; readable modern
    English that preserves theological weight.
- source_word: ἐμεγαλαύχησεν
  chosen: boasted greatly
  alternatives:
  - boasted arrogantly
  - spoke proudly
  - vaunted himself
  lexicon: LSJ
  rationale: The verb denotes arrogant boasting. 'Boasted greatly' stays close to
    the Greek form while remaining natural; the arrogance is already reinforced by
    context.
