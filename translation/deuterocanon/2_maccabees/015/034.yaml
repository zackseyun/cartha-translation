theological_decisions:
- issue: Whether τὸν ἑαυτοῦ τόπον should be interpreted explicitly as God's sanctuary/temple
    in the main text
  chosen_reading: Retain the broader 'his own place' in the main text
  alternative_readings:
  - his own sanctuary
  - his own temple
  rationale: The immediate context points strongly to the temple as the place kept
    from defilement, but τόπος itself is not the more specific ναός or ἱερόν. To avoid
    importing specificity beyond the wording, the main text keeps 'place' and the
    contextual temple sense is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
