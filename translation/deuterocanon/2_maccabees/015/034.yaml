translation:
  text: And they all blessed the manifest Lord toward heaven, saying, “Blessed is
    the one who has kept his own place undefiled.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his own sanctuary' or 'his own temple'; the Greek says 'place,' but
      the context likely refers to the holy place preserved from defilement.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τὸν οὐρανόν
  chosen: toward heaven
  alternatives:
  - to heaven
  - unto heaven
  - heavenward
  lexicon: LSJ
  rationale: The idiom with εἰς plus accusative here expresses direction of praise
    rather than location. 'Toward heaven' preserves the upward orientation without
    overinterpreting it as address formula alone.
- source_word: εὐλόγησαν
  chosen: blessed
  alternatives:
  - praised
  lexicon: LSJ
  rationale: εὐλογέω commonly means 'bless' in religious contexts. 'Blessed' keeps
    the lexical link with the following Εὐλογητός ('Blessed is...'), which would be
    obscured by 'praised'.
- source_word: τὸν ἐπιφανῆ κύριον
  chosen: the manifest Lord
  alternatives:
  - the glorious Lord
  - the Lord who has appeared
  - the illustrious Lord
  lexicon: LSJ
  rationale: ἐπιφανής denotes being conspicuous, manifest, or illustrious. 'Manifest'
    best preserves the likely sense of the Lord shown openly in decisive action, while
    avoiding a merely aesthetic sense like 'glorious.' κύριος follows the doctrinal
    default 'Lord'.
- source_word: διατηρήσας
  chosen: has kept
  alternatives:
  - has preserved
  - has maintained
  lexicon: LSJ
  rationale: The participle refers to preserving something in its proper state. 'Has
    kept' is idiomatic and concise, while still allowing the following predicate 'undefiled'
    to carry the purity nuance.
- source_word: τὸν ἑαυτοῦ τόπον
  chosen: his own place
  alternatives:
  - his own sanctuary
  - his own dwelling-place
  lexicon: LSJ
  rationale: τόπος is broadly 'place.' In context it likely refers to God's holy place/temple,
    but the Greek itself says 'place.' The translation keeps the broader term in the
    main text and preserves the more specific contextual sense in a footnote.
- source_word: ἀμίαντον
  chosen: undefiled
  alternatives:
  - unstained
  - unpolluted
  lexicon: LSJ
  rationale: ἀμίαντος carries cultic and moral purity. 'Undefiled' is the most natural
    English equivalent and fits the likely temple context.
