theological_decisions:
- issue: Divine agency in victory
  chosen_reading: Victory is presented as granted by the Lord according to his judgment,
    not as achieved by military power alone.
  alternative_readings:
  - Victory comes not by weapons but solely by miraculous intervention.
  - Victory comes by merit in a mechanistic sense because the worthy earn it.
  rationale: The Greek contrasts weapons with the Lord's sovereign granting of victory.
    The text does not deny all human means absolutely, but subordinates them to divine
    judgment. Likewise, 'worthy' should be preserved without importing a full doctrine
    of merit beyond the verse's wording.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; κύριος → Lord'
