id: 2MA.15.21
reference: 2 Maccabees 15:21
source:
  edition: lxx-swete-1909
  text: συνιδὼν ὁ Μακκαβαῖος τὴν τῶν πλήθων παρουσίαν καὶ τῶν ὅπλων τὴν ποικίλην παρασκευήν,
    τήν τε τῶν θηρίων ἐπὶ μέρος εὔκαιρον ἀγριότητα, ἀνατείνας χεῖρας εἰς τὸν οὐρανόν,
    ἐπεκαλέσατο τὸν τερατοποιὸν κύριον, γινώσκων ὅτι οὐκ ἐν ὅπλοις, καθὼς δὲ ἐὰν αὐτῷ
    κριθῇ, τοῖς ἀξίοις περιποιεῖται τὴν νίκην.
