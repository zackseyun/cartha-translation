translation:
  text: When Maccabeus saw the presence of the crowds, the varied array of weapons,
    and the savagery of the beasts positioned advantageously, he stretched out his
    hands to heaven and called on the wonder-working Lord, knowing that victory is
    not secured by weapons, but that, whenever it is judged right by him, he grants
    it to those who are worthy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"The beasts" likely refers to war elephants in context, though the Greek
      here says only "beasts."'
    reason: cultural_note
  - marker: b
    text: Or "miracle-working Lord" for "wonder-working Lord."
    reason: lexical_alternative
lexical_decisions:
- source_word: συνιδών
  chosen: saw
  alternatives:
  - perceived
  - observed
  - took note of
  lexicon: BDAG
  rationale: The participle introduces Judas's assessment of the battlefield situation.
    'Saw' is simple and natural English, while still allowing the broader sense of
    perceptive awareness carried by the verb.
- source_word: παρουσίαν
  chosen: presence
  alternatives:
  - arrival
  - coming
  - numbers
  lexicon: BDAG
  rationale: Here it refers to the enemy forces being present in large number. 'Presence'
    stays close to the Greek and avoids over-interpreting it as merely 'numbers,'
    though the context clearly implies a massed force.
- source_word: πλήθων
  chosen: the crowds
  alternatives:
  - the multitudes
  - the masses
  - the forces
  lexicon: BDAG
  rationale: The plural denotes the assembled masses. 'Crowds' is idiomatic and vivid
    in context, though military 'forces' is possible. The phrase as a whole communicates
    the intimidating size of the opposing host.
- source_word: ποικίλην παρασκευήν
  chosen: the varied array
  alternatives:
  - the diverse equipment
  - the elaborate preparation
  - the varied preparation
  lexicon: BDAG
  rationale: παρασκευή can denote preparation or equipment; with 'of weapons' it points
    to the enemy's assorted military outfitting. 'Varied array' captures both diversity
    and visible martial display in readable English.
- source_word: θηρίων
  chosen: the beasts
  alternatives:
  - the animals
  - the war animals
  lexicon: BDAG
  rationale: The term literally means 'beasts' and likely refers to war elephants
    in context, but the Greek itself does not specify elephants here. 'Beasts' preserves
    the source wording without importing the identification into the main text.
- source_word: ἐπὶ μέρος εὔκαιρον
  chosen: positioned advantageously
  alternatives:
  - placed in a favorable position
  - set at a strategic point
  - deployed opportunely
  lexicon: BDAG
  rationale: The phrase indicates tactical placement at a suitable or advantageous
    point. 'Positioned advantageously' conveys the military sense smoothly in English.
- source_word: ἀγριότητα
  chosen: savagery
  alternatives:
  - fierceness
  - wildness
  lexicon: BDAG
  rationale: The noun emphasizes the dangerous ferocity of the animals. 'Savagery'
    communicates the threatening force more strongly than the flatter 'wildness.'
- source_word: ἀνατείνας χεῖρας εἰς τὸν οὐρανόν
  chosen: he stretched out his hands to heaven
  alternatives:
  - lifting up his hands to heaven
  - raising his hands toward heaven
  lexicon: BDAG
  rationale: This is a conventional gesture of prayer. 'Stretched out his hands to
    heaven' is faithful to the image and reads naturally in modern English.
- source_word: τερατοποιὸν
  chosen: wonder-working
  alternatives:
  - miracle-working
  - worker of wonders
  lexicon: LSJ
  rationale: The adjective describes the Lord as one who performs extraordinary deeds.
    'Wonder-working' preserves the elevated tone without sounding overly technical;
    'miracle-working' is possible but slightly more interpretive.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered 'Lord.' In this prayer context
    it functions as a divine title.
- source_word: περιποιεῖται τὴν νίκην
  chosen: he grants it
  alternatives:
  - he secures the victory
  - he preserves the victory
  - he procures victory
  lexicon: BDAG
  rationale: The verb here means to bring about or bestow for someone. Because 'victory'
    is already the object in the clause, 'he grants it' is concise and natural English,
    avoiding awkward repetition while preserving the sense of divine bestowal.
- source_word: τοῖς ἀξίοις
  chosen: to those who are worthy
  alternatives:
  - to the worthy
  - to those deserving of it
  lexicon: BDAG
  rationale: The dative plural refers to persons deemed worthy. 'To those who are
    worthy' is clear and preserves the evaluative force without over-specifying the
    grounds of worthiness.
- source_word: καθὼς δὲ ἐὰν αὐτῷ κριθῇ
  chosen: whenever it is judged right by him
  alternatives:
  - as it may seem good to him
  - if it is decided by him
  - as he judges
  lexicon: BDAG
  rationale: The clause expresses divine discretion in granting victory. 'Whenever
    it is judged right by him' preserves the passive form and the sense that the outcome
    depends on God's judgment rather than military strength.
