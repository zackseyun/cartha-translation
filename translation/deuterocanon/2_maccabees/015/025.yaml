translation:
  text: But those around Nikanor advanced with trumpets and battle songs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'paeans,' that is, triumphal or martial songs.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ δὲ περὶ τὸν Νικάνορα
  chosen: But those around Nikanor
  alternatives:
  - But Nikanor and his men
  - But those with Nikanor
  lexicon: LSJ
  rationale: The idiom περὶ + accusative can denote those around or accompanying a
    leader. Rendering it as 'those around Nikanor' stays close to the Greek while
    naturally indicating his surrounding force without over-specifying military rank
    structure.
- source_word: σαλπίγγων
  chosen: trumpets
  alternatives:
  - bugles
  - war trumpets
  lexicon: LSJ
  rationale: 'The plural genitive after μετά indicates accompaniment: they advanced
    ''with trumpets.'' ''Trumpets'' is the straightforward lexical equivalent and
    avoids importing a more specific modern military instrument.'
- source_word: παιάνων
  chosen: battle songs
  alternatives:
  - paeans
  - songs of triumph
  - war cries
  lexicon: LSJ
  rationale: παιάν can refer to a song, especially a hymn of triumph or martial chant.
    'Battle songs' communicates the military setting and vocal accompaniment in accessible
    English. 'Paeans' is too opaque for most readers; 'war cries' risks reducing sung
    praise to mere shouting.
- source_word: προσῆγον
  chosen: advanced
  alternatives:
  - came on
  - approached
  - moved forward
  lexicon: LSJ
  rationale: In this battle context, προσάγω here describes movement toward engagement.
    'Advanced' fits the military scene better than the more neutral 'approached' while
    remaining faithful to the verb's directional sense.
