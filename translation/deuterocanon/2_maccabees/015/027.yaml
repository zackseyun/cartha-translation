- issue: Whether to render τοῦ θεοῦ ἐπιμελείᾳ as 'care' or the more interpretive 'providence'
  chosen_reading: the care of God
  alternative_readings:
  - God's providence
  - God's providential care
  rationale: The Greek noun ἐπιμέλεια primarily denotes care or attention. 'Providence'
    is a possible theological inference in context, but the text itself states divine
    care more directly. The chosen rendering preserves the theological claim without
    expanding it.
