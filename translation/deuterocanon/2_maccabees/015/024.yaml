theological_decisions:
- issue: Metaphorical force of 'your arm' in prayer to God
  chosen_reading: Retain the concrete metaphor 'your arm' rather than interpret it
    as 'power' in the main text.
  alternative_readings:
  - your power
  - your mighty arm
  rationale: The biblical idiom of God's arm conveys divine power through a familiar
    scriptural metaphor. Preserving the image maintains intertextual resonance without
    obscuring meaning.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; readable modern English
    without flattening theological weight.'
