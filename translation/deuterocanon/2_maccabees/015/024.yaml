translation:
  text: Let those who come against your holy people with blasphemy be struck with
    terror by the greatness of your arm. And thus he ended in these words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be terrified' or 'be confounded'; the Greek verb expresses being struck
      with fear or consternation.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'by the greatness of your arm,' a biblical image for God's power
      in action.
    reason: cultural_note
  - marker: c
    text: Or 'And so he concluded in this way'; the Greek refers back to the words
      just spoken.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγέθει
  chosen: by the greatness
  alternatives:
  - with the greatness
  - at the greatness
  lexicon: LSJ
  rationale: Dative of means/instrument or reference with καταπλαγήτωσαν; 'by the
    greatness' gives natural English while preserving the causal force of the Greek.
- source_word: βραχίονός
  chosen: of your arm
  alternatives:
  - of your mighty arm
  lexicon: LSJ
  rationale: βραχίων is literally 'arm.' Although 'arm' can metaphorically denote
    power, the Greek image is explicit and should be preserved rather than expanded
    interpretively to 'might' in the main text.
- source_word: καταπλαγήτωσαν
  chosen: be struck with terror
  alternatives:
  - be terrified
  - be confounded
  - be overwhelmed with fear
  lexicon: LSJ
  rationale: The passive imperative asks that the enemies be smitten with fear or
    consternation. 'Be struck with terror' preserves both the passive force and the
    vividness of the verb.
- source_word: οἱ μετὰ βλασφημίας παραγινόμενοι
  chosen: those who come against ... with blasphemy
  alternatives:
  - those who come with blasphemy
  - those who advance in blasphemy
  lexicon: LSJ
  rationale: παραγίνομαι here means 'come/arrive/appear,' and with ἐπὶ plus accusative
    in context indicates hostile approach against the people. μετὰ βλασφημίας is best
    taken adverbially, describing the manner of their coming.
- source_word: ἐπὶ τὸν ἅγιον σου λαόν
  chosen: against your holy people
  alternatives:
  - upon your holy people
  - to your holy people
  lexicon: LSJ
  rationale: With hostile motion, ἐπί + accusative is naturally rendered 'against.'
    'Holy people' preserves ἅγιον ... λαόν without importing covenantal terminology
    not explicit in the Greek.
- source_word: καὶ οὕτως μὲν ἐν τούτοις ἔληξεν
  chosen: And thus he ended with these words
  alternatives:
  - And so he concluded in this way
  - And thus he finished with these matters
  lexicon: LSJ
  rationale: ἔληξεν means 'ended/concluded.' ἐν τούτοις idiomatically refers to what
    has just been said; 'with these words' makes the discourse-setting clear in natural
    English.
