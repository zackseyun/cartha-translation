translation:
  text: And when he arrived there, he called together his fellow countrymen and the
    priests, stood them before the altar, and sent for those from the citadel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'those from the Acra,' the fortified stronghold in
      Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενόμενος
  chosen: when he arrived
  alternatives:
  - having come
  - after he came
  lexicon: BDAG
  rationale: Aorist participle of παραγίνομαι marking prior action relative to the
    main verbs. 'When he arrived' gives natural English sequence without losing the
    temporal force.
- source_word: συγκαλεσάμενος
  chosen: he called together
  alternatives:
  - having summoned together
  - he assembled
  lexicon: BDAG
  rationale: The middle participle conveys summoning people into an assembly. 'Called
    together' is idiomatic and preserves the convocational sense better than the flatter
    'assembled'.
- source_word: τοὺς ὁμοεθνεῖς
  chosen: his fellow countrymen
  alternatives:
  - those of his own nation
  - his compatriots
  - his fellow Jews
  lexicon: LSJ
  rationale: ὁμοεθνής denotes those of the same people or nation. 'Fellow countrymen'
    preserves the ethnic/national solidarity without over-specifying beyond the word
    itself. 'His fellow Jews' is contextually plausible but more interpretive than
    the lexical form requires.
- source_word: τοὺς ἱερεῖς
  chosen: the priests
  alternatives:
  - the priesthood
  lexicon: BDAG
  rationale: Straightforward plural noun; 'the priests' is the direct and natural
    rendering.
- source_word: πρὸ τοῦ θυσιαστηρίου στῆσας
  chosen: stood before the altar
  alternatives:
  - having stood before the altar
  - set them before the altar
  lexicon: BDAG
  rationale: 'The participle στῆσας is best taken intransitively with the subject:
    he stood before the altar. Although the syntax could be read more woodenly, the
    absence of an explicit object with στῆσας favors this reading in context.'
- source_word: μετεπέμψατο
  chosen: sent for
  alternatives:
  - summoned
  - sent word to bring
  lexicon: BDAG
  rationale: The verb means to send for or summon someone to come. 'Sent for' is concise
    and preserves the initiative of calling them into his presence.
- source_word: τοὺς ἐκ τῆς ἄκρας
  chosen: those from the citadel
  alternatives:
  - those from the Acra
  - the men from the fortress
  lexicon: LSJ
  rationale: ἄκρα can denote a citadel or fortress; in Maccabean context it often
    refers specifically to the Acra in Jerusalem. To keep the translation readable
    while remaining accurate, the main text uses 'the citadel,' with the more specific
    proper-name-like alternative preserved in a footnote.
