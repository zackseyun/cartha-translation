translation:
  text: And there, when they were near Jerusalem, a horseman appeared going before
    them, clothed in white and brandishing golden armor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'preceding them' for 'going before them.' The Greek participle can denote
      simply being ahead of them, without explicitly stating command.
    reason: lexical_alternative
  - marker: b
    text: The text does not explicitly identify the horseman; the description allows
      readers to infer a heavenly protector without the translation stating more than
      the Greek says.
    reason: cultural_note
lexical_decisions:
- source_word: αὐτόθι
  chosen: there
  alternatives:
  - at that place
  - then
  lexicon: LSJ
  rationale: Adverb of place; here it points to the location just mentioned rather
    than functioning mainly as a temporal marker.
- source_word: πρὸς τοῖς Ἱεροσολύμοις
  chosen: near Jerusalem
  alternatives:
  - by Jerusalem
  - at Jerusalem
  lexicon: LSJ
  rationale: With the dative, πρός can indicate proximity. 'Near Jerusalem' gives
    the natural English sense of being in the vicinity of the city.
- source_word: ὄντων
  chosen: when they were
  alternatives:
  - while they were
  - being
  lexicon: LSJ
  rationale: Genitive absolute with the implied subject 'them'; rendered idiomatically
    as a temporal clause in English.
- source_word: ἐφάνη
  chosen: appeared
  alternatives:
  - was seen
  - became visible
  lexicon: LSJ
  rationale: Standard rendering for a visible manifestation; 'appeared' is natural
    and preserves the suddenness of the event.
- source_word: προηγούμενος αὐτῶν
  chosen: going before them
  alternatives:
  - leading them
  - preceding them
  lexicon: LSJ
  rationale: The participle indicates movement in front of them. 'Going before them'
    preserves the imagery without over-interpreting it as formal military leadership.
- source_word: ἔφιππος
  chosen: a horseman
  alternatives:
  - mounted
  - on horseback
  lexicon: LSJ
  rationale: Used substantivally here after ἐφάνη; 'a horseman' is the clearest English
    equivalent.
- source_word: ἐν λευκῇ ἐσθῆτι
  chosen: clothed in white
  alternatives:
  - in a white garment
  - wearing white clothing
  lexicon: LSJ
  rationale: This phrase describes conspicuous white attire. 'Clothed in white' is
    concise and suitably elevated.
- source_word: πανοπλίαν χρυσῆν
  chosen: golden armor
  alternatives:
  - a golden panoply
  - full armor of gold
  lexicon: LSJ
  rationale: πανοπλία denotes full armor. 'Golden armor' is idiomatic and preserves
    the martial image.
- source_word: κραδαίνων
  chosen: brandishing
  alternatives:
  - wielding
  - shaking
  lexicon: LSJ
  rationale: The verb suggests vigorous motion, especially of a weapon or martial
    object. 'Brandishing' best fits the visionary military context.
