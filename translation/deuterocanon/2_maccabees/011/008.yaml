theological_decisions:
- issue: Identity of the mounted figure
  chosen_reading: Rendered descriptively as an appearing horseman without specifying
    whether he is an angelic being or a divine manifestation.
  alternative_readings:
  - an angelic rider
  - a heavenly warrior sent by God
  rationale: The Greek describes what was seen but does not explicitly identify the
    figure. The translation preserves that narrative restraint rather than importing
    an interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
