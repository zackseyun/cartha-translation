- issue: Text-critical sense of ὁ γραμματεύς at the end of the verse
  chosen_reading: Render the clause with 'the king granted' in the main text
  alternative_readings:
  - '''the secretary granted'''
  - '''the scribe granted'''
  rationale: There is no doctrinal issue, but there is a significant textual/interpretive
    one. The literal reading 'the secretary/scribe' is awkward in context, since the
    surrounding narrative concerns royal concessions mediated through Lysias. Rendering
    'the king' best reflects the apparent sense of the passage while documenting the
    transmitted wording in a footnote for transparency.
  doctrine_reference: 'PHILOSOPHY.md: transparency and auditable decisions'
