translation:
  text: 'And the king’s letter contained this: “King Antiochus to his brother Lysias,
    greetings.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'contained thus'; idiomatically, this introduces the wording
      of the letter.
    reason: lexical_alternative
  - marker: b
    text: '''Brother'' may be a court title of political closeness rather than a statement
      of literal family relationship.'
    reason: cultural_note
lexical_decisions:
- source_word: Ἡ ... ἐπιστολή
  chosen: the ... letter
  alternatives:
  - the epistle
  - the document
  lexicon: LSJ
  rationale: ἐπιστολή is the standard term for a letter or written message. 'Letter'
    is clear modern English and fits the epistolary formula.
- source_word: περιεῖχεν
  chosen: contained
  alternatives:
  - read as follows
  - had the following contents
  lexicon: LSJ
  rationale: The verb literally means 'contained' or 'included.' English often idiomatically
    says a letter 'read as follows,' but 'contained this' stays closer to the Greek
    while remaining natural.
- source_word: οὕτως
  chosen: this
  alternatives:
  - thus
  - as follows
  lexicon: LSJ
  rationale: With περιεῖχεν introducing quoted contents, οὕτως functions idiomatically
    to introduce what follows. Rendering it with 'this' in 'contained this' gives
    natural English without over-translating.
- source_word: Βασιλεὺς Ἀντίοχος
  chosen: King Antiochus
  alternatives:
  - Antiochus the king
  lexicon: LSJ
  rationale: The nominative title-name sequence is a standard letter heading. 'King
    Antiochus' is the natural English equivalent.
- source_word: τῷ ἀδελφῷ
  chosen: to his brother
  alternatives:
  - to the brother
  - to his kinsman
  lexicon: LSJ
  rationale: In royal and diplomatic correspondence, ἀδελφός can function as a courtly
    or political designation, but the possessive sense is naturally implied in English
    by the relationship to the sender. 'His brother' best reflects the idiomatic force
    here.
- source_word: Λυσίᾳ
  chosen: Lysias
  rationale: Proper name transliterated according to project policy.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - sends greetings
  lexicon: LSJ
  rationale: This is the conventional Greek epistolary salutation. 'Greetings' is
    the standard concise English equivalent.
