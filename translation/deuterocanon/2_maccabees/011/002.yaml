theological_decisions:
- issue: Ethnic designation Ἰουδαίους
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  rationale: In 2 Maccabees this term can carry both ethnic-religious and geographic
    force. Here, in a conflict involving the people as a group rather than merely
    residents of a region, 'the Jews' is the more natural English rendering, while
    'Judeans' remains a viable alternative.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    significant alternatives in documentation'
