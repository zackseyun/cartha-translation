translation:
  text: After gathering about eighty thousand men and all the cavalry, he advanced
    against the Jews, intending to make the city a dwelling place for Greeks,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans.' The Greek Ἰουδαίους may denote the Jewish people or the
      people of Judea, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: συναθροίσας
  chosen: After gathering
  alternatives:
  - having assembled
  - after mustering
  lexicon: LSJ
  rationale: Aorist participle indicating prior action before the main verb. 'After
    gathering' is natural English and preserves the sequence without overformal stiffness.
- source_word: περὶ τὰς ὀκτὼ μυριάδας
  chosen: about eighty thousand men
  alternatives:
  - around eighty thousand
  - about eight myriads
  lexicon: LSJ
  rationale: μυριάς means a group of ten thousand; eight myriads = eighty thousand.
    περὶ with numerals conveys approximation, hence 'about.' 'Men' is supplied idiomatically
    because the count refers to troops in a military context.
- source_word: τὴν ἵππον ἅπασαν
  chosen: all the cavalry
  alternatives:
  - the whole cavalry force
  - all the horsemen
  lexicon: LSJ
  rationale: ἵππος can denote cavalry collectively in military contexts, not merely
    horses. 'All the cavalry' best reflects the collective military sense.
- source_word: παρεγένετο ἐπὶ τοὺς Ἰουδαίους
  chosen: he advanced against the Jews
  alternatives:
  - he came against the Jews
  - he arrived to attack the Jews
  lexicon: LSJ
  rationale: The idiom with ἐπί plus accusative in this context is hostile movement
    against an opponent. 'Advanced against' captures military approach more clearly
    than the more neutral 'came to.'
- source_word: λογιζόμενος
  chosen: intending
  alternatives:
  - thinking
  - planning
  - calculating
  lexicon: LSJ
  rationale: The participle expresses his purpose or design in context, not merely
    internal reflection. 'Intending' communicates that purposive force in smooth English.
- source_word: τὴν μὲν πόλιν
  chosen: the city
  alternatives:
  - the city itself
  lexicon: LSJ
  rationale: Straightforward rendering; the μέν anticipates a further element in the
    next verse, so the clause is left open with a comma.
- source_word: Ἕλλησιν
  chosen: for Greeks
  alternatives:
  - for the Greeks
  - by Greeks
  lexicon: LSJ
  rationale: 'Dative here is best taken as advantage/possession with οἰκητήριον ποιήσειν:
    he planned to turn the city into a habitation for Greeks. Anarthrous ''Greeks''
    is preferable to ''the Greeks.'''
- source_word: οἰκητήριον ποιήσειν
  chosen: to make a dwelling place
  alternatives:
  - to turn into a habitation
  - to make into a settlement
  lexicon: LSJ
  rationale: The construction means 'to make into a dwelling place/habitation.' 'Dwelling
    place' is clear modern English and preserves the sense without overinterpreting
    colonization language.
