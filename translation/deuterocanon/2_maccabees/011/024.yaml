translation:
  text: Having heard that the Jews did not approve of my father's change to Greek
    ways, but were choosing their own way of life and asking that their lawful customs
    be permitted to them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my father's change to Greek customs.' The Greek phrase refers to a move
      toward Hellenizing practices, not necessarily to language alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκηκοότες
  chosen: Having heard
  alternatives:
  - Since we have heard
  - After hearing
  lexicon: LSJ
  rationale: Perfect participle of ἀκούω introducing the grounds for the royal response;
    'Having heard' preserves the participial connection and formal tone without overcomplicating
    the English.
- source_word: μὴ συνεὐδοκοῦντας
  chosen: did not approve
  alternatives:
  - were not in agreement
  - did not consent
  lexicon: LSJ
  rationale: συνευδοκέω conveys approving or agreeing with something. 'Did not approve'
    is idiomatic and fits the object clause about the policy change.
- source_word: τῇ τοῦ πατρὸς εἰς τὰ Ἑλληνικὰ μεταθέσει
  chosen: my father's change to Greek ways
  alternatives:
  - my father's transfer to Greek customs
  - the change instituted by my father toward Greek practices
  lexicon: LSJ
  rationale: μετάθεσις is a change/transfer; εἰς τὰ Ἑλληνικά refers to Hellenizing
    practices rather than merely the Greek language. 'Greek ways' communicates the
    cultural shift in context.
- source_word: τὴν ἑαυτῶν ἀγωγήν
  chosen: their own way of life
  alternatives:
  - their own conduct
  - their own manner of living
  lexicon: LSJ
  rationale: ἀγωγή denotes mode of life, upbringing, or conduct. 'Way of life' best
    captures the communal-cultural sense here.
- source_word: αἱρετίζοντας
  chosen: were choosing
  alternatives:
  - preferring
  - adopting by choice
  lexicon: LSJ
  rationale: The participle indicates deliberate preference or choice. 'Were choosing'
    keeps the active volitional nuance.
- source_word: ἀξιοῦν
  chosen: asking that
  alternatives:
  - requesting that
  - claiming that they deserve
  lexicon: LSJ
  rationale: In this context ἀξιόω means to request or deem worthy. 'Asking that'
    fits the following infinitive and avoids overstating entitlement.
- source_word: συγχωρηθῆναι αὐτοῖς τὰ νόμιμα
  chosen: their lawful customs be allowed to them
  alternatives:
  - their ancestral laws be granted to them
  - they be permitted their legal customs
  lexicon: LSJ
  rationale: τὰ νόμιμα refers to established lawful/customary observances. 'Lawful
    customs' preserves both legal and customary force; the passive infinitive is represented
    by 'be allowed to them.'
