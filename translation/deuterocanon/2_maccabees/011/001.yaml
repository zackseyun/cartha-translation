translation:
  text: But after a very short time, Lysias, the king’s guardian and kinsman and administrator
    of affairs, taking the events very hard,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'after a little while, indeed a very brief interval.' The Greek expression
      is emphatically compressed.
    reason: lexical_alternative
  - marker: b
    text: '''Guardian'' may also be rendered ''regent'' or ''steward,'' depending
      on how formally Lysias’s office is understood.'
    reason: alternative_reading
  - marker: c
    text: The sentence continues in the next verse; this verse ends with the participial
      clause unfinished in English as in Greek.
    reason: cross_reference
lexical_decisions:
- source_word: Μετʼ ὀλίγον ... χρονίσκον
  chosen: after a very short time
  alternatives:
  - after a little while
  - after a very brief interval
  lexicon: LSJ
  rationale: The phrase combines Μετʼ ὀλίγον ('after a little') with the diminutive
    χρονίσκον, intensified by παντελῶς, yielding the sense of a very brief lapse of
    time. 'After a very short time' is natural English and preserves the emphatic
    brevity.
- source_word: παντελῶς
  chosen: very
  alternatives:
  - altogether
  - entirely
  - quite
  lexicon: LSJ
  rationale: Here παντελῶς intensifies χρονίσκον rather than standing independently.
    Rendering it as 'very' communicates the adverbial force idiomatically in English.
- source_word: ἐπίτροπος
  chosen: guardian
  alternatives:
  - regent
  - steward
  - overseer
  lexicon: LSJ
  rationale: In royal context ἐπίτροπος can denote one entrusted with guardianship
    or regency. Since the Greek separately lists his relation to the king and his
    office, 'guardian' preserves the literal sense without over-specifying a constitutional
    title like 'regent'.
- source_word: συγγενής
  chosen: kinsman
  alternatives:
  - relative
  lexicon: LSJ
  rationale: The term denotes familial relation. 'Kinsman' is slightly more formal
    and suits the courtly register of the verse.
- source_word: ἐπὶ τῶν πραγμάτων
  chosen: administrator of affairs
  alternatives:
  - in charge of affairs
  - chief minister
  lexicon: LSJ
  rationale: This idiom refers to official responsibility over state matters. 'Administrator
    of affairs' is transparent and avoids importing a more technical title than the
    Greek itself states.
- source_word: λίαν βαρέως φέρων
  chosen: taking ... very hard
  alternatives:
  - being greatly distressed
  - taking ... very grievously
  lexicon: LSJ
  rationale: The idiom φέρειν βαρέως means to take something badly or be deeply troubled
    by it. 'Taking the events very hard' is idiomatic modern English while preserving
    the emotional weight.
- source_word: ἐπὶ τοῖς γεγονόσι
  chosen: the events
  alternatives:
  - what had happened
  - the things that had taken place
  lexicon: LSJ
  rationale: The perfect participle substantivized refers to the recent happenings.
    'The events' is concise and fits the narrative flow, though 'what had happened'
    is also possible.
