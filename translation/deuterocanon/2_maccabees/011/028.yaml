translation:
  text: Farewell. May it be as we desire; and we ourselves are also in good health.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'and we too are well.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρρωσθε
  chosen: Farewell
  alternatives:
  - Be strong
  - Be well
  - Goodbye
  lexicon: LSJ
  rationale: Imperative/plural from ῥώννυμι used idiomatically in letter closings
    as a valediction. In this epistolary context, 'Farewell' best captures the conventional
    closing sense without woodenly rendering physical strength.
- source_word: εἰη ἂν
  chosen: May it be
  alternatives:
  - Would that it might be
  - Let it be
  lexicon: LSJ
  rationale: Optative with ἄν expresses a wish or polite desiderative nuance. 'May
    it be' preserves the volitional tone in natural English.
- source_word: ὡς βούλομεθα
  chosen: as we desire
  alternatives:
  - as we wish
  - as we want
  lexicon: LSJ
  rationale: βούλομαι denotes willing/wishing/desiring. 'Desire' is slightly more
    formal and suits the royal letter style better than 'want,' while remaining readable.
- source_word: ὑγιαίνομεν
  chosen: are in good health
  alternatives:
  - are well
  - are healthy
  lexicon: LSJ
  rationale: The verb means to be healthy/sound. In a letter closing, 'are in good
    health' is idiomatic and matches the epistolary register.
- source_word: καὶ αὐτοὶ δὲ
  chosen: and we ourselves are also
  alternatives:
  - and we too
  - and we ourselves too
  lexicon: LSJ
  rationale: The combination adds mild emphasis and correspondence with the recipients'
    welfare. 'We ourselves are also' preserves both αὐτοί and δέ, though in smooth
    English the emphasis remains modest.
