theological_decisions:
- issue: Scope of πολιτεύεσθαι in relation to Jewish law and custom
  chosen_reading: Render broadly as communal life ordered by ancestral customs, not
    narrowly as political self-rule.
  alternative_readings:
  - govern themselves according to the customs of their ancestors
  rationale: The context is a royal concession concerning Jewish practice and temple
    restoration. The Greek verb can carry civic overtones, but the immediate modifier
    'according to the customs' points to permitted customary/religious way of life
    rather than an explicit grant of political independence.
  doctrine_reference: Translation philosophy §1, §5
