translation:
  text: Therefore, since we also choose that this nation should be free from disturbance,
    we decide that the temple should be restored to them, and that they should live
    according to the customs of their ancestors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'conduct their common life according to the customs in the time of their
      ancestors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱρούμενοι
  chosen: since we also choose
  alternatives:
  - since we also desire
  - therefore choosing also
  lexicon: LSJ
  rationale: Middle participle of αἱρέω here carries the sense of choosing or preferring
    a policy. Rendered with a causal nuance ('since') to fit the participial construction
    in smooth English while preserving the volitional force.
- source_word: ἐκτὸς ταραχῆς
  chosen: free from disturbance
  alternatives:
  - without turmoil
  - outside unrest
  - free from trouble
  lexicon: LSJ
  rationale: The phrase denotes being apart from civil disorder or agitation. 'Free
    from disturbance' preserves the political-administrative sense without overinterpreting
    it as purely internal peace.
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - people
  - ethnic group
  lexicon: LSJ
  rationale: In this royal-administrative context, ἔθνος refers to the Jewish people
    as a distinct national body. 'Nation' best reflects that collective-political
    sense.
- source_word: κρίνομεν
  chosen: we decide
  alternatives:
  - we judge
  - we decree
  lexicon: LSJ
  rationale: The verb can mean judge, decide, or determine. 'We decide' fits the epistolary
    governmental context and avoids overstating the formality as a technical decree
    where the Greek itself uses the common verb.
- source_word: τὸ ἱερὸν
  chosen: the temple
  alternatives:
  - the sanctuary
  - the holy place
  lexicon: LSJ
  rationale: Though literally 'the sacred place,' in 2 Maccabees this naturally refers
    to the Jerusalem temple complex. 'Temple' is the clearest idiomatic rendering.
- source_word: ἀποκατασταθῆναι
  chosen: should be restored
  alternatives:
  - be reestablished
  - be reinstated
  lexicon: LSJ
  rationale: The passive infinitive indicates restoration to a prior proper condition
    or status. 'Should be restored' captures both the passive form and the policy
    decision being announced.
- source_word: πολιτεύεσθαι
  chosen: they should live
  alternatives:
  - they should conduct their civic life
  - they should order their common life
  - they should govern themselves
  lexicon: LSJ
  rationale: The verb concerns living as a body politic or ordering communal life.
    In English, 'live according to' communicates the practical force naturally, while
    the following reference to ancestral customs supplies the communal-legal content.
- source_word: κατὰ τὰ ἐπὶ τῶν προγόνων αὐτῶν ἔθη
  chosen: according to the customs of their ancestors
  alternatives:
  - according to the customs in the time of their ancestors
  - according to their ancestral customs
  lexicon: LSJ
  rationale: The phrase points to inherited ancestral practices, likely with temporal
    nuance ('in the days of their ancestors'). 'According to the customs of their
    ancestors' is concise and faithful; the fuller temporal nuance is preserved as
    an alternative.
