translation:
  text: Therefore, for those who come down until the thirtieth of Xanthicus, there
    will be a pledge of good faith together with permission,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'there will be a right hand with permission'; the phrase
      'right hand' here is an idiom for a pledge or assurance of good faith.
    reason: lexical_alternative
  - marker: b
    text: Xanthicus is a Macedonian month name used in Hellenistic dating.
    reason: cultural_note
lexical_decisions:
- source_word: τοῖς ... καταπορευομένοις
  chosen: for those who come down
  alternatives:
  - for those who go down
  - for those who proceed down
  lexicon: LSJ
  rationale: The present middle/passive participle of καταπορεύομαι literally suggests
    movement downward or away. In this epistolary-administrative context, it likely
    refers to those going down/returning, but 'come down' preserves the directional
    sense without over-specifying destination.
- source_word: μέχρι τριακάδος Ξανθικοῦ
  chosen: until the thirtieth of Xanthicus
  alternatives:
  - up to the thirtieth day of Xanthicus
  lexicon: LSJ
  rationale: A straightforward temporal limit. Xanthicus is a Macedonian month name
    and is best transliterated rather than converted into a modern or Jewish calendar
    equivalent.
- source_word: ὑπάρξει
  chosen: there will be
  alternatives:
  - it will be granted
  - there shall be
  lexicon: LSJ
  rationale: 'The future of ὑπάρχω here functions existentially: ''there will be.''
    This avoids importing an explicit subject not present in the Greek.'
- source_word: δεξιὰ
  chosen: a pledge of good faith
  alternatives:
  - right hand
  - assurance
  - guarantee
  lexicon: LSJ
  rationale: Although literally 'right hand,' in diplomatic and legal contexts δεξιά
    commonly denotes a pledge, especially a right-hand pledge of fidelity or security.
    'Pledge of good faith' communicates the idiomatic force in natural English while
    preserving the covenantal/diplomatic nuance.
- source_word: μετὰ τῆς ἀδείας
  chosen: together with permission
  alternatives:
  - with leave
  - with liberty
  - with authorization
  lexicon: LSJ
  rationale: ἄδεια denotes permission, freedom, or authorization. 'Permission' is
    the broadest and most accessible rendering here, fitting an official grant in
    a royal letter.
