translation:
  text: Farewell. In the one hundred forty-eighth year, on the fifteenth day of Xanthicus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'Be well.' As a letter closing, this functions idiomatically
      as 'Farewell.'
    reason: lexical_alternative
  - marker: b
    text: Xanthicus is a Macedonian month name used in Seleucid dating.
    reason: cultural_note
lexical_decisions:
- source_word: ὑγιαίνετε
  chosen: Farewell
  alternatives:
  - Be well
  - Keep well
  - Greetings
  lexicon: LSJ
  rationale: In epistolary closings, ὑγιαίνω commonly functions as a conventional
    valediction meaning 'farewell' or 'be well.' 'Farewell' is idiomatic modern English
    for a letter closing and fits the context better than the more literal 'be healthy.'
- source_word: ἔτους
  chosen: year
  lexicon: LSJ
  rationale: Genitive of dating formula; rendered straightforwardly as 'year' in English.
- source_word: ἑκατοστοῦ τεσσερακοστοῦ ὀγδόου
  chosen: one hundred forty-eighth
  alternatives:
  - hundred and forty-eighth
  lexicon: LSJ
  rationale: This ordinal sequence gives the Seleucid-era year number. 'One hundred
    forty-eighth' is clear modern English while preserving the formal dating formula.
- source_word: Ξανθικοῦ
  chosen: Xanthicus
  alternatives:
  - Xanthikos
  lexicon: LSJ
  rationale: This is a Macedonian month name. Per project philosophy, names are transliterated
    rather than translated. 'Xanthicus' is a standard English transliteration in historical
    contexts.
- source_word: πεντεκαιδεκάτῃ
  chosen: fifteenth day
  alternatives:
  - fifteenth
  lexicon: LSJ
  rationale: 'Dative feminine singular agreeing with an implied ''day'' in the dating
    formula. English normally makes the ellipsis explicit: ''on the fifteenth day.'''
