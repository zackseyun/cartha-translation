  text: ἐὰν μὲν οὖν συντηρήσητε τὴν εἰς τὰ πράγματα εὔνοιαν, καὶ εἰς τὸ λοιπόν πειράσομαι
    αἰτιαῖος ἀγαθῶν γίνεσθαι.
