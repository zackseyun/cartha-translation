theological_decisions:
- issue: Rendering of τοῖς δικαίοις in a political-legal context
  chosen_reading: just demands
  alternative_readings:
  - righteous matters
  - rightful claims
  rationale: The term here is not a doctrinal use of 'righteousness' but refers to
    what is just or due in negotiations. 'Just demands' best fits the context and
    avoids importing theological overtones not demanded by the text.
