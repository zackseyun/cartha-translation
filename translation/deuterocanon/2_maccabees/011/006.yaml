translation:
  text: But when those around Maccabeus learned that he was besieging the strongholds,
    they, together with the crowds, pleaded with the Lord with lamentations and tears
    to send a good angel for the salvation of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for Israel's deliverance.' The Greek σωτηρία can denote rescue or deliverance
      in a concrete crisis as well as salvation more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετέλαβον
  chosen: learned
  alternatives:
  - heard
  - found out
  - became aware
  lexicon: LSJ
  rationale: In context the verb introduces the moment when Maccabeus's supporters
    came to know that the strongholds were under siege. 'Learned' is idiomatic English
    for receiving such information. A more wooden 'partook' would be incorrect here;
    the verb can mean 'have a share in' or 'perceive/learn' depending on context.
- source_word: οἱ περὶ τὸν Μακκαβαῖον
  chosen: those around Maccabeus
  alternatives:
  - Maccabeus and his men
  - the men with Maccabeus
  - Maccabeus's party
  lexicon: LSJ
  rationale: The idiom refers to the group associated with or surrounding Maccabeus,
    not necessarily excluding him but focusing on his party. 'Those around Maccabeus'
    preserves the Greek construction transparently without over-specifying.
- source_word: πολιορκοῦντα
  chosen: was besieging
  alternatives:
  - was attacking
  - was blockading
  lexicon: LSJ
  rationale: The participle from πολιορκέω normally denotes besieging a fortified
    place. 'Was besieging' best matches the military sense and the imperfective aspect
    implied by the participle.
- source_word: τὰ ὀχυρώματα
  chosen: the strongholds
  alternatives:
  - the fortresses
  - the fortified places
  lexicon: LSJ
  rationale: ὀχύρωμα denotes a fortified place or stronghold. 'Strongholds' is concise
    and natural while preserving the military sense.
- source_word: μετὰ ὀδυρμῶν καὶ δακρύων
  chosen: with lamentations and tears
  alternatives:
  - with wailings and tears
  - with mourning and tears
  lexicon: LSJ
  rationale: This phrase expresses intense grief in prayer. 'Lamentations and tears'
    is faithful and readable, preserving the emotional force.
- source_word: ἱκέτευον
  chosen: pleaded
  alternatives:
  - implored
  - begged
  - entreated
  lexicon: LSJ
  rationale: The verb denotes earnest supplication. 'Pleaded' communicates urgency
    in contemporary English without sounding archaic.
- source_word: σὺν τοῖς ὄχλοις
  chosen: together with the crowds
  alternatives:
  - with the multitudes
  - along with the people
  lexicon: LSJ
  rationale: ὄχλοι here refers to gathered masses of people. 'Together with the crowds'
    preserves the collective public nature of the appeal.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: LSJ
  rationale: Per doctrine, κύριος is rendered 'Lord.' In this Jewish prayer context
    it refers to God.
- source_word: ἀγαθὸν ἄγγελον
  chosen: a good angel
  alternatives:
  - a benevolent angel
  - a favorable angel
  lexicon: LSJ
  rationale: The adjective ἀγαθός straightforwardly means 'good.' The phrase does
    not require expansion to 'helpful angel,' though that is interpretively possible.
    The translation preserves the text's wording and leaves the exact nuance of beneficence
    intact.
- source_word: ἀποστεῖλαι
  chosen: to send
  alternatives:
  - to dispatch
  lexicon: LSJ
  rationale: Standard rendering of the infinitive; simple and direct.
- source_word: πρὸς σωτηρίαν τῷ Ἰσραήλ
  chosen: for the salvation of Israel
  alternatives:
  - for Israel's deliverance
  - to save Israel
  lexicon: LSJ
  rationale: σωτηρία can mean salvation or deliverance. In this military-national
    context 'deliverance' is possible, but 'salvation' preserves the broader theological
    resonance while remaining natural English.
