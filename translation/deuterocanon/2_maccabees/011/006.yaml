theological_decisions:
- issue: Rendering κύριος in a Jewish prayer context
  chosen_reading: the Lord
  alternative_readings:
  - God
  - the master
  rationale: The source has τὸν κύριον, and project doctrine specifies 'Lord' as the
    default rendering for κύριος. This preserves both the lexical form and its reverential
    force in scriptural usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering σωτηρία in a military-deliverance context
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  rationale: The immediate context is military crisis, so 'deliverance' is contextually
    plausible. However, 'salvation' is the broader lexical value and preserves the
    theological register of appeal to divine rescue. The alternative is preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension where
    meaningful
