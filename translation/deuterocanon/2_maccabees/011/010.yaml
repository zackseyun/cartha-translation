translation:
  text: They advanced in battle formation, having the ally from heaven before them,
    because the Lord had shown them mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They advanced, equipped for battle, with the heavenly ally going before
      them.' The Greek opening is compressed and may be construed slightly differently.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πρόηγον
  chosen: they went forward ... before them
  alternatives:
  - they advanced
  - the one going before
  - their leader went before
  lexicon: LSJ
  rationale: The neuter singular participial expression is compressed and somewhat
    awkward in Greek. In context it describes their advance, while also linking naturally
    with the following phrase about the heavenly ally being 'before' them. Rendering
    it verbally as 'they went forward' gives clear English sense without over-paraphrasing.
- source_word: ἐν διασκευῇ
  chosen: in battle formation
  alternatives:
  - prepared for battle
  - in full equipment
  - armed
  lexicon: LSJ
  rationale: The phrase denotes being equipped or arrayed for combat. 'In battle formation'
    captures both readiness and military arrangement in idiomatic English.
- source_word: σύμμαχον
  chosen: ally
  alternatives:
  - helper
  - champion
  - supporter
  lexicon: LSJ
  rationale: The noun is a military/political term for one who fights alongside another.
    'Ally' preserves that force better than the more generic 'helper'.
- source_word: ἀπʼ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - from the sky
  lexicon: LSJ
  rationale: In this religious-military context, οὐρανός refers to heaven, not merely
    the physical sky.
- source_word: ἐλεήσαντος
  chosen: had shown ... mercy
  alternatives:
  - having pitied
  - having had mercy on
  lexicon: BDAG
  rationale: The aorist participle explains the basis of their confidence/advance.
    'Had shown mercy' is natural English and preserves the mercy motif.
- source_word: τοῦ κυρίου
  chosen: the Lord
  alternatives:
  - the master
  lexicon: LSJ
  rationale: Per doctrine, κύριος is rendered 'Lord.' In this Jewish scriptural context
    it refers reverently to God.
