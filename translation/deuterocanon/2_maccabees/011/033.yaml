lexical_decisions:
- source_word: ἔρρωσθε
  chosen: Farewell
  alternatives:
  - Be strong
  - Be well
  - Good health to you
  lexicon: LSJ
  rationale: Epistolary closing formula from ῥώννυμι/ῥώομαι, commonly used as a conventional
    valediction rather than a literal exhortation to strength; 'Farewell' best captures
    the letter-closing sense in natural English.
- source_word: ἔτους
  chosen: year
  lexicon: LSJ
  rationale: Genitive of dating formula; rendered straightforwardly as 'year' in English.
- source_word: ἑκατοστοῦ τεσσερακοστοῦ ὀγδόου
  chosen: one hundred forty-eighth
  alternatives:
  - hundred and forty-eighth
  lexicon: LSJ
  rationale: Ordinal dating expression; smoothed into standard modern English numbering
    while preserving the Seleucid-era style of the source.
- source_word: Ξανθικοῦ
  chosen: Xanthicus
  alternatives:
  - Xanthikos
  lexicon: LSJ
  rationale: Month name is transliterated rather than translated, following the project's
    policy to transliterate names and preserve the historical calendrical reference.
- source_word: πεντεκαιδεκάτῃ
  chosen: fifteenth day
  alternatives:
  - fifteenth
  lexicon: LSJ
  rationale: Dative feminine in a dating formula, understood as the day of the month;
    English idiom supplies 'day' for clarity.
