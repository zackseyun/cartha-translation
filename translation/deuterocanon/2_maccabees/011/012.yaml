translation:
  text: But most of them escaped wounded and naked, and Lysias himself also escaped
    by fleeing shamefully.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'escaped stripped,' if γυμνοὶ is understood as referring to being despoiled
      in flight rather than fully unclothed.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πλείονες
  chosen: most of them
  alternatives:
  - the majority of them
  - many of them
  lexicon: LSJ
  rationale: πλείονες is the comparative used substantivally, here meaning the greater
    part or majority. 'Most of them' is idiomatic modern English and preserves the
    quantitative sense.
- source_word: τραυματίαι
  chosen: wounded
  alternatives:
  - injured
  - wounded men
  lexicon: LSJ
  rationale: The adjective/noun denotes those who are wounded. English 'wounded' naturally
    conveys their condition without adding an unnecessary noun.
- source_word: γυμνοὶ
  chosen: naked
  alternatives:
  - stripped
  - bare
  lexicon: LSJ
  rationale: The plain sense is 'naked.' In military flight this may imply being stripped
    of armor or clothing, but the Greek does not specify that nuance, so the more
    literal term is retained.
- source_word: διεσώθησαν
  chosen: escaped
  alternatives:
  - were saved
  - got away safely
  lexicon: BDAG/LSJ
  rationale: διασῴζω can mean to bring safely through or preserve alive. In this battle
    context, 'escaped' best fits the narrative sense of surviving and getting away.
- source_word: αἰσχρῶς
  chosen: shamefully
  alternatives:
  - disgracefully
  - in disgrace
  lexicon: LSJ
  rationale: The adverb marks the manner of flight as dishonorable. 'Shamefully' is
    direct and preserves the moral evaluation in the Greek.
- source_word: φεύγων
  chosen: by fleeing
  alternatives:
  - while fleeing
  - as he fled
  lexicon: LSJ
  rationale: The present participle expresses attendant manner/circumstance. 'By fleeing'
    makes the relation to 'escaped' clear in concise English.
