translation:
  text: 'And to the nation the king’s letter was as follows: “King Antiochus to the
    council of elders of the Jews and to the other Jews, greetings.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the rest of the Jews.”
    reason: lexical_alternative
  - marker: b
    text: The Greek γερουσία refers to an official body of elders; “council of elders”
      is chosen for clarity, with “senate” as a possible alternative.
    reason: cultural_note
lexical_decisions:
- source_word: Πρὸς δὲ τὸ ἔθνος
  chosen: And to the nation
  alternatives:
  - Now to the nation
  - And for the nation
  - And to the people
  lexicon: LSJ
  rationale: πρός with accusative here introduces the addressee/direction of the letter.
    ἔθνος can mean 'nation' or 'people'; 'nation' preserves the collective-political
    sense without overinterpreting ethnicity.
- source_word: ἡ τοῦ βασιλέως ἐπιστολή
  chosen: the king’s letter
  alternatives:
  - the letter of the king
  - the royal letter
  lexicon: LSJ
  rationale: A straightforward genitive construction. 'The king’s letter' is natural
    modern English and preserves the possessive sense.
- source_word: τοιαύδε ἦν
  chosen: was as follows
  alternatives:
  - was such as this
  - was this
  lexicon: LSJ
  rationale: Idiomatic formula introducing the contents of a document. 'Was as follows'
    best reflects standard English usage for quoted correspondence.
- source_word: Βασιλεὺς Ἀντίοχος
  chosen: King Antiochus
  alternatives:
  - Antiochus the king
  lexicon: LSJ
  rationale: The Greek epistolary heading places the royal title first. 'King Antiochus'
    preserves the title while reading naturally in English.
- source_word: τῇ γερουσίᾳ τῶν Ἰουδαίων
  chosen: to the council of elders of the Jews
  alternatives:
  - to the senate of the Jews
  - to the eldership of the Jews
  - to the Jewish council of elders
  lexicon: LSJ
  rationale: γερουσία denotes a body of elders or senate. 'Council of elders' is accessible
    modern English and avoids anachronistic political overtones that 'senate' may
    carry, while retaining the institutional sense.
- source_word: τοῖς ἄλλοις Ἰουδαίοις
  chosen: to the other Jews
  alternatives:
  - and the rest of the Jews
  - and to the remaining Jews
  lexicon: LSJ
  rationale: ἄλλοις distinguishes this broader group from the council just named.
    'The other Jews' is a direct rendering and keeps the contrast clear.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - greeting
  lexicon: LSJ
  rationale: Standard epistolary infinitive used in salutations. 'Greetings' is the
    conventional and accurate English equivalent in letter openings.
