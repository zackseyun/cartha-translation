translation:
  text: 'The Romans also sent them a letter, worded as follows: “Quintus Memmius and
    Titus Manius, elders of the Romans, to the people of the Jews, greetings.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Roman elders” or, contextually, “ambassadors of the Romans.” The Greek
      term is literally “elders.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπέμψαν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Aorist of πέμπω, straightforwardly indicating sending. 'Sent' is natural
    modern English and sufficiently formal.
- source_word: οἱ Ῥωμαῖοι
  chosen: the Romans
  alternatives:
  - the Roman authorities
  lexicon: LSJ
  rationale: The phrase is ethnically/politically collective. 'The Romans' best matches
    the Greek without adding interpretive specificity such as 'authorities.'
- source_word: πρὸς αὐτούς
  chosen: them
  alternatives:
  - to them
  lexicon: LSJ
  rationale: English idiom with 'sent' naturally absorbs the prepositional phrase
    as indirect object. The referent remains unchanged.
- source_word: ἐπιστολήν
  chosen: a letter
  alternatives:
  - an epistle
  - a written message
  lexicon: LSJ
  rationale: '''Letter'' is the ordinary sense and fits readable modern English better
    than the more ecclesiastical ''epistle.'''
- source_word: ἔχουσαν οὕτως
  chosen: worded as follows
  alternatives:
  - having thus
  - reading thus
  lexicon: LSJ
  rationale: This participial formula introduces the contents of the letter. 'Worded
    as follows' communicates the idiom naturally in English while preserving the documentary
    feel.
- source_word: Κόιντος Μέμμιος, Τίτος Μάνιος
  chosen: Quintus Memmius and Titus Manius
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. The asyndetic listing in Greek is rendered with English 'and' for
    clarity.
- source_word: πρεσβυταὶ Ῥωμαίων
  chosen: elders of the Romans
  alternatives:
  - Roman elders
  - ambassadors of the Romans
  lexicon: LSJ
  rationale: πρεσβυταί literally means 'elders.' In context it may denote senior envoys,
    but the Greek term itself is not the usual explicit word for ambassadors here.
    To avoid over-interpreting the office, the main text keeps 'elders of the Romans,'
    with a footnote preserving the contextual alternative.
- source_word: τῷ δήμῳ τῶν Ἰουδαίων
  chosen: to the people of the Jews
  alternatives:
  - to the Jewish people
  - to the nation of the Jews
  lexicon: LSJ
  rationale: δήμος is 'people' in a civic/corporate sense. 'To the people of the Jews'
    stays close to the Greek structure; although 'to the Jewish people' is smoother,
    the chosen wording preserves the formal epistolary tone.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - greeting
  lexicon: LSJ
  rationale: Standard epistolary infinitive meaning 'greetings.' This is the conventional
    and accurate English equivalent in letter openings.
