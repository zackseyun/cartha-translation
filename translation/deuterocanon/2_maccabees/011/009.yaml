theological_decisions:
- issue: Rendering ψυχαῖς in a non-anthropological context
  chosen_reading: were strengthened in spirit
  alternative_readings:
  - were strengthened in their souls
  rationale: The phrase here describes courage and inward resolve before battle, not
    a technical statement about the soul. 'In spirit' communicates the idiomatic sense
    without importing a detailed anthropology.
  doctrine_reference: Translation philosophy §6; preserve readability without flattening
    meaning.
