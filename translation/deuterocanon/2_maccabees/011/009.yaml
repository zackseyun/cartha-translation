translation:
  text: And all together they blessed the merciful God and were strengthened in spirit,
    being ready to wound not only men but even the fiercest wild beasts and iron walls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were strengthened in their souls.' The Greek speaks of inward strengthening
      or courage.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοῦ
  chosen: all together
  alternatives:
  - together
  - at the same time
  lexicon: LSJ
  rationale: Conveys the collective, simultaneous action of the group; paired with
    πάντες it emphasizes unanimity.
- source_word: εὐλόγησαν
  chosen: blessed
  alternatives:
  - praised
  lexicon: LSJ
  rationale: A direct rendering of the verb that preserves the religious sense of
    speaking well of God; 'praised' is possible but 'blessed' stays closer to the
    Greek.
- source_word: τὸν ἐλεήμονα θεόν
  chosen: the merciful God
  alternatives:
  - God who is merciful
  - the compassionate God
  lexicon: LSJ
  rationale: The attributive adjective ἐλεήμονα naturally yields 'merciful.' This
    preserves the explicit divine quality highlighted in the text.
- source_word: ἐπερρώσθησαν ταῖς ψυχαῖς
  chosen: were strengthened in spirit
  alternatives:
  - were strengthened in their souls
  - were encouraged inwardly
  lexicon: LSJ
  rationale: The idiom refers to inward courage or resolve. 'In spirit' is idiomatic
    modern English while still reflecting the internal sense of ψυχαῖς.
- source_word: τιτρώσκειν
  chosen: to wound
  alternatives:
  - to strike
  - to pierce
  lexicon: LSJ
  rationale: The infinitive denotes inflicting injury. 'Wound' fits both animate objects
    and the hyperbolic extension to iron walls better than 'kill' or 'pierce'.
- source_word: ἀνθρώπους
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: LSJ
  rationale: The Greek uses the masculine plural in contrast with wild beasts; 'men'
    preserves the source form and martial context more naturally than the broader
    'people'.
- source_word: θῆρας τοὺς ἀγριωτάτους
  chosen: the fiercest wild beasts
  alternatives:
  - the most savage beasts
  - the wildest animals
  lexicon: LSJ
  rationale: θῆρες are wild beasts, and ἀγριωτάτους is a superlative. 'Fiercest wild
    beasts' preserves both force and vividness.
- source_word: σιδηρᾶ τείχη
  chosen: iron walls
  alternatives:
  - walls of iron
  lexicon: LSJ
  rationale: A straightforward rendering that preserves the image of extreme military
    confidence or courage.
- source_word: ὄντες ἕτοιμοι
  chosen: being ready
  alternatives:
  - ready
  - prepared
  lexicon: LSJ
  rationale: This participial phrase explains their strengthened state and leads naturally
    into the infinitive phrase in English.
