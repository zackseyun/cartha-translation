translation:
  text: John and Absalom, who were sent by you, delivered the written memorandum and
    made request concerning the matters indicated in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the appended written communication' or 'the decree written below.' The
      Greek phrase τὸν ὑπογεγραμμένον χρηματισμόν is documentary and somewhat technical.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰωάνης
  chosen: John
  alternatives:
  - Joannes
  lexicon: Greek proper-name tradition
  rationale: Standard English transliteration of the personal name; names are transliterated
    rather than translated.
- source_word: Ἀβεσσαλώμ
  chosen: Absalom
  alternatives:
  - Abessalom
  lexicon: Greek proper-name tradition
  rationale: Standard English form of the personal name, preserving recognizability.
- source_word: οἱ πεμφθέντες
  chosen: who were sent
  alternatives:
  - the ones sent
  - having been sent
  lexicon: BDAG
  rationale: A natural rendering of the aorist passive participle modifying the two
    named men; 'who were sent' is clear modern English and preserves the passive sense.
- source_word: παρʼ ὑμῶν
  chosen: by you
  alternatives:
  - from you
  lexicon: BDAG
  rationale: In this envoy context, παρά with genitive indicates source/agency. 'By
    you' fits the sense that they were commissioned by the recipients.
- source_word: ἐπιδόντες
  chosen: delivered
  alternatives:
  - handed over
  - presented
  lexicon: BDAG
  rationale: The participle denotes giving over a document. 'Delivered' is idiomatic
    for transmitting an official written item.
- source_word: τὸν ὑπογεγραμμένον χρηματισμόν
  chosen: the written memorandum
  alternatives:
  - the appended document
  - the written communication
  - the decree set down below
  lexicon: BDAG
  rationale: ὑπογεγραμμένον means 'written below/underwritten,' and χρηματισμός in
    documentary context refers to an official communication or memorandum. 'Written
    memorandum' preserves the documentary tone without overcommitting to a technical
    term like 'decree.'
- source_word: ἠξίουν
  chosen: made request
  alternatives:
  - asked
  - petitioned
  - requested
  lexicon: BDAG
  rationale: The verb can mean ask, request, or claim. In diplomatic correspondence,
    'made request' captures the formal tone better than the simpler 'asked.'
- source_word: περὶ τῶν διʼ αὐτοῦ σημαινομένων
  chosen: concerning the matters indicated in it
  alternatives:
  - about the things signified by it
  - concerning what was communicated through it
  lexicon: BDAG
  rationale: σημαινομένων refers to matters being indicated or communicated; αὐτοῦ
    most naturally refers to the written memorandum. 'The matters indicated in it'
    is clear and keeps the document as the referent.
