translation:
  text: 'For letters had been written to the Jews from Lysias, containing this form:
    “Lysias to the multitude of the Jews, greetings.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this wording.” The Greek phrase introducing the letter can refer to
      its form or exact wording.
    reason: lexical_alternative
  - marker: b
    text: Or “to the assembly/body of the Jews.” The term translated “multitude” denotes
      a large collective group.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν γὰρ γεγραμμέναι
  chosen: For letters had been written
  alternatives:
  - For letters were written
  - For there had been letters written
  lexicon: LSJ
  rationale: The periphrastic pluperfect/passive sense is best conveyed in English
    as 'had been written,' with γάρ rendered as 'for' to connect this verse to the
    preceding narrative explanation.
- source_word: τοῖς Ἰουδαίοις
  chosen: to the Jews
  alternatives:
  - to the Judeans
  lexicon: LSJ
  rationale: In 2 Maccabees this term commonly denotes the Jewish people as an ethnic-religious
    group rather than merely inhabitants of Judea. 'Jews' is the most natural and
    contextually fitting rendering here.
- source_word: ἐπιστολαὶ
  chosen: letters
  alternatives:
  - epistles
  - written communications
  lexicon: LSJ
  rationale: A straightforward administrative correspondence is in view; 'letters'
    is idiomatic modern English without unnecessary formality.
- source_word: παρὰ μὲν Λυσίου
  chosen: from Lysias
  alternatives:
  - on the part of Lysias
  - by Lysias
  lexicon: LSJ
  rationale: παρά with the genitive here marks source/origin. 'From Lysias' is the
    clearest English expression.
- source_word: περιέχουσαι
  chosen: containing
  alternatives:
  - having the contents
  - reading
  lexicon: LSJ
  rationale: The participle introduces the wording of the letter. 'Containing' preserves
    the literal sense while remaining natural.
- source_word: τὸν τρόπον τοῦτον
  chosen: this form
  alternatives:
  - this wording
  - this content
  - in this manner
  lexicon: LSJ
  rationale: In epistolary context the phrase points to the form or wording that follows.
    'This form' is slightly formal but fits the introduction to a quoted letter.
- source_word: τῷ πλήθει τῶν Ἰουδαίων
  chosen: to the multitude of the Jews
  alternatives:
  - to the assembly of the Jews
  - to the body of the Jews
  - to the mass of the Jews
  lexicon: LSJ
  rationale: πλῆθος denotes a large body or multitude. Retaining 'multitude' reflects
    the collective addressee without over-interpreting it as a formal assembly.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - sends greetings
  - rejoice
  lexicon: LSJ
  rationale: In letter openings χαίρειν is the standard epistolary salutation. 'Greetings'
    is the conventional and accurate English equivalent.
