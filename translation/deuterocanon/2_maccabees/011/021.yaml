lexical_decisions:
- source_word: ἔρρωσθε
  chosen: Farewell
  alternatives:
  - Be strong
  - Stay well
  - Good health to you
  lexicon: LSJ
  rationale: Common epistolary closing formula meaning 'farewell' or 'be well'; 'Farewell'
    fits natural English letter style without over-literalizing the imperative force.
- source_word: ἔτους ἑκατοστοῦ τεσσερακοστοῦ ὀγδόου
  chosen: In the one hundred forty-eighth year
  alternatives:
  - Year one hundred forty-eight
  - In year 148
  lexicon: LSJ
  rationale: Genitive absolute/date formula is best rendered idiomatically in English
    as a dating clause. Spelling out the number preserves the formal tone of the document.
- source_word: Διὸς Κορινθίου
  chosen: Dios Corinthios
  alternatives:
  - the month Dios Corinthios
  - Dios-Corinthios
  lexicon: LSJ
  rationale: This is a Macedonian month name in the dating formula. Transliteration
    preserves the historical calendar term more accurately than forcing an uncertain
    equivalent month name into English.
- source_word: τετράδι καὶ εἰκάδι
  chosen: on the twenty-fourth day
  alternatives:
  - on the fourth and twentieth
  - the twenty-fourth
  lexicon: LSJ
  rationale: The Greek idiom literally means 'the fourth and twentieth,' i.e., the
    twenty-fourth day of the month. Rendering the idiom as standard English date style
    is clear and faithful.
