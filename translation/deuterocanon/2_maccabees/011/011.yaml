translation:
  text: But springing at the enemies like lions, they struck down eleven thousand
    of them, and sixteen hundred cavalry; and they forced them all to flee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'a thousand in addition to ten thousand' and 'six hundred
      in addition to a thousand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λεόντινων
  chosen: like lions
  alternatives:
  - lion-like
  - as lions
  lexicon: LSJ
  rationale: The adverbial expression modifies the manner of attack. Rendering it
    with an English comparison ('like lions') preserves the vivid simile naturally.
- source_word: ἐντινάξαντες
  chosen: springing
  alternatives:
  - rushing
  - leaping
  lexicon: LSJ
  rationale: The participle conveys a sudden forceful movement into the enemy. 'Springing'
    fits the leonine simile and keeps the participial vividness without over-paraphrase.
- source_word: κατέστρωσαν
  chosen: struck down
  alternatives:
  - laid low
  - killed
  lexicon: LSJ
  rationale: In military context the verb means to bring down or kill in battle. 'Struck
    down' is idiomatic, suitably martial, and avoids sounding either too wooden or
    too clinical.
- source_word: χιλίους πρὸς τοῖς μυρίοις
  chosen: eleven thousand
  alternatives:
  - a thousand in addition to ten thousand
  - ten thousand plus a thousand
  lexicon: LSJ
  rationale: The Greek literally expresses 'a thousand in addition to ten thousand.'
    English normally compresses this to 'eleven thousand' without loss of meaning.
- source_word: ἱππεῖς
  chosen: cavalry
  alternatives:
  - horsemen
  - mounted troops
  lexicon: LSJ
  rationale: The term refers to mounted soldiers as a military class. 'Cavalry' is
    concise and natural in English military narration.
- source_word: ἑξακοσίους πρὸς χιλίοις
  chosen: sixteen hundred
  alternatives:
  - six hundred in addition to a thousand
  - one thousand six hundred
  lexicon: LSJ
  rationale: As with the previous number phrase, the Greek is additive. 'Sixteen hundred'
    communicates the total clearly in idiomatic English.
- source_word: ἠνάγκασαν φεύγειν
  chosen: forced them all to flee
  alternatives:
  - compelled them all to flee
  - drove them all into flight
  lexicon: LSJ
  rationale: The construction expresses causing the enemy to flee. 'Forced them all
    to flee' is direct and preserves the causative force.
