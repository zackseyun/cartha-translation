theological_decisions:
- issue: Scope of the amnesty-like clause περὶ τῶν ἠγνοημένων
  chosen_reading: A general protection from harassment regarding actions committed
    in ignorance
  alternative_readings:
  - Protection regarding previously overlooked matters
  - Protection regarding unintentional violations of Jewish law or royal policy
  rationale: The Greek does not specify exactly whose ignorance is in view or whether
    the phrase refers narrowly to legal infractions. The translation preserves the
    broader wording rather than resolving the ambiguity into a specific legal theory.
  doctrine_reference: Preserve theological tension rather than resolve it.
