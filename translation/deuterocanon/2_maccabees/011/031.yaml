id: 2MA.11.31
reference: 2 Maccabees 11:31
source:
  edition: lxx-swete-1909
  text: χρῆσθαι τοὺς Ἰουδαίους τοῖς ἑαυτῶν δαπανήμασιν καὶ νόμοις καθὰ καὶ τὸ πρότερον·
    καὶ οὐδεὶς αὐτῶν κατʼ οὐδένα τρόπον παρενοχληθήσεται περὶ τῶν ἠγνοημένων.
  language: Greek
