  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡμεῖς
  chosen: we
  lexicon: LSJ
  rationale: Explicit first-person plural pronoun retained for emphasis in English
    as the subject of the clause.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: LSJ
  rationale: Rendered 'for' to preserve the explanatory force linking this statement
    to the preceding context.
- source_word: διὰ
  chosen: because of
  alternatives:
  - on account of
  - for
  lexicon: LSJ
  rationale: With the accusative, διά expresses cause or reason; 'because of' is clear
    modern English and preserves causal force.
- source_word: τὰς ἑαυτῶν ἁμαρτίας
  chosen: our own sins
  alternatives:
  - our sins
  - the sins of ourselves
  lexicon: LSJ
  rationale: ἑαυτῶν adds reflexive emphasis, so 'our own sins' best captures the self-implicating
    force rather than the flatter 'our sins'.
- source_word: πάσχομεν
  chosen: are suffering
  alternatives:
  - suffer
  - undergo
  lexicon: LSJ
  rationale: Present tense rendered progressively to reflect ongoing experience in
    context; 'are suffering' is natural English and preserves the durative sense.
