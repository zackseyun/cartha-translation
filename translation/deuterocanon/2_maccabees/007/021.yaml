theological_decisions:
- issue: Gendered rhetorical contrast in the mother's characterization
  chosen_reading: Preserve the explicit contrast as 'womanly reasoning' and 'manly
    courage' in the main text.
  alternative_readings:
  - neutralize to 'natural weakness' and 'brave courage'
  - soften to 'motherly feelings' and 'strong resolve'
  rationale: The Greek intentionally uses gendered terms (θῆλυς, ἄρσην) to portray
    the mother as transcending expected social weakness in ancient rhetoric. Per doctrine,
    gender-accurate rendering is preferred over neutralization, even when the rhetoric
    is culturally distant from modern English.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
