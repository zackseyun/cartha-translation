translation:
  text: And she encouraged each one of them in the language of their fathers, filled
    with a noble spirit, and, stirring her womanly reasoning with manly courage, she
    said to them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the ancestral tongue' or 'in their native language.' The Greek literally
      refers to the paternal or ancestral speech.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek uses a deliberate gendered contrast: literally, ''having stirred
      the female reasoning with a male courage/spirit.'''
