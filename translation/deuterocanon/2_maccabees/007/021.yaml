lexical_decisions:
- source_word: ἕκαστον
  chosen: each one
  alternatives:
  - each
  - every one
  lexicon: LSJ
  rationale: Accusative singular used distributively with παρεκάλει; 'each one' makes
    clear she addressed them individually.
- source_word: παρεκάλει
  chosen: encouraged
  alternatives:
  - urged
  - exhorted
  - comforted
  lexicon: BDAG
  rationale: In this martyrdom context the verb carries strengthening/exhorting force
    more than consolation alone; 'encouraged' fits the mother's active support of
    steadfastness.
- source_word: τῇ πατρίῳ φωνῇ
  chosen: in the language of their fathers
  alternatives:
  - in the ancestral tongue
  - in their native language
  - in the language of her fathers
  lexicon: LSJ
  rationale: πατρίῳ means ancestral/paternal; with φωνῇ it refers to speech or language.
    Because she is speaking to her sons, 'the language of their fathers' preserves
    the familial and ancestral sense better than the flatter 'native language.'
- source_word: γενναίῳ ... φρονήματι
  chosen: filled with a noble spirit
  alternatives:
  - filled with noble resolve
  - filled with a brave mind
  - filled with noble courage
  lexicon: LSJ
  rationale: φρόνημα denotes mindset, spirit, resolve. 'Noble spirit' is idiomatic
    English and preserves the moral elevation conveyed by γενναίῳ.
- source_word: τὸν θῆλυν λογισμόν
  chosen: her womanly reasoning
  alternatives:
  - the female mind
  - her feminine disposition
  - her woman's thinking
  lexicon: LSJ
  rationale: λογισμός is reasoning/thought process, and θῆλυς marks it as female/womanly
    in the author's gendered rhetoric. 'Womanly reasoning' preserves the source's
    gendered expression without flattening it.
- source_word: ἄρσενι θυμῷ
  chosen: with manly courage
  alternatives:
  - with a male spirit
  - with masculine boldness
  - with manly passion
  lexicon: LSJ
  rationale: θυμός here is spiritedness/courage rather than anger. 'Manly courage'
    reflects the ancient contrast intended by the Greek while remaining readable.
- source_word: διεγείρασα
  chosen: stirring
  alternatives:
  - rousing
  - awakening
  - arousing
  lexicon: LSJ
  rationale: Aorist participle describing how she acted before speaking; 'stirring'
    is natural in English and works well with the metaphorical object.
- source_word: λέγουσα πρὸς αὐτούς
  chosen: she said to them
  alternatives:
  - saying to them
  - speaking to them
  lexicon: BDAG
  rationale: Standard narrative participle introducing direct speech; rendered idiomatically
    as a finite verb in English.
