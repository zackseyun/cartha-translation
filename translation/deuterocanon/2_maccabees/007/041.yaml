translation:
  text: And last of the sons, the mother died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Finally, after the sons, the mother died.' The Greek phrase can be
      understood as a brief sequencing notice, though 'last of the sons' more closely
      follows the wording of the source.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσχάτῃ
  chosen: last
  alternatives:
  - finally
  - at the end
  lexicon: BDAG
  rationale: 'The dative feminine singular of ἔσχατος here functions adverbially with
    δέ, marking sequence: ''last'' or ''finally.'' ''Last'' preserves the concise
    narrative ordering more directly than the more interpretive ''finally.'''
- source_word: τῶν υἱῶν
  chosen: of the sons
  alternatives:
  - of the children
  - of her sons
  lexicon: BDAG
  rationale: υἱῶν is specifically 'sons,' not the broader 'children.' The genitive
    with ἐσχάτῃ yields the sense 'last of the sons.' Although 'her' is contextually
    implied, it is not explicit in the Greek and is therefore left unstated in the
    main text.
- source_word: ἡ μήτηρ
  chosen: the mother
  alternatives:
  - their mother
  - his mother
  lexicon: BDAG
  rationale: The article plus noun identifies her as 'the mother.' 'Their mother'
    would make the relationship explicit for English readers, but the possessive is
    not present in the Greek text, so the more formally anchored rendering is preferred.
- source_word: ἐτελεύτησεν
  chosen: died
  alternatives:
  - came to her end
  - passed away
  lexicon: BDAG
  rationale: τελευτάω commonly means 'to die' or 'come to an end.' 'Died' is the plain,
    natural English equivalent and fits the solemn brevity of the Greek. 'Passed away'
    is too euphemistic.
