translation:
  text: 'But bending down to him, and mocking the cruel tyrant, she spoke in her native
    tongue as follows: “My son, have mercy on me, who carried you in the womb for
    nine months, nursed you for three years, raised you, brought you to this age,
    and provided for you.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in her ancestral language” / “in the language of her fathers.” The Greek
      literally refers to the family’s native or inherited speech.
    reason: lexical_alternative
  - marker: b
    text: Or “breastfed you for three years.”
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκύψασα
  chosen: bending down
  alternatives:
  - leaning toward
  - stooping down
  lexicon: LSJ
  rationale: The participle describes a physical motion toward the son, likely to
    speak closely or intimately. 'Bending down' is natural English and preserves the
    concrete action without overinterpreting motive.
- source_word: χλενάσασα
  chosen: mocking
  alternatives:
  - scoffing at
  - deriding
  lexicon: LSJ
  rationale: The participle indicates contemptuous ridicule directed at the tyrant.
    'Mocking' is clear modern English and fits the mother's bold defiance.
- source_word: τὸν ὠμὸν τύραννον
  chosen: the cruel tyrant
  alternatives:
  - the savage tyrant
  - the harsh tyrant
  lexicon: LSJ
  rationale: ὠμός commonly conveys cruelty or savagery. 'Cruel' is idiomatic and forceful;
    'tyrant' straightforwardly renders τύραννος.
- source_word: τῇ πατρίᾳ φωνῇ
  chosen: in her native tongue
  alternatives:
  - in the language of her fathers
  - in her ancestral language
  lexicon: LSJ
  rationale: The phrase refers to the family's own ethnic/native language. 'Native
    tongue' is readable modern English and preserves the cultural sense without unnecessary
    archaism.
- source_word: ἐλέησόν με
  chosen: have mercy on me
  alternatives:
  - take pity on me
  - show compassion to me
  lexicon: BDAG
  rationale: Although addressed from mother to son in an emotional appeal, the Greek
    imperative of ἐλεέω is well represented by 'have mercy on me.' This preserves
    the pathos and the verbal force of the appeal.
- source_word: τὴν ἐν γαστρὶ περιενέγκασάν σε
  chosen: who carried you in the womb
  alternatives:
  - who bore you in my womb
  - who carried you in my belly
  lexicon: LSJ
  rationale: The construction identifies the mother as the one who carried him during
    pregnancy. 'In the womb' is more natural and dignified in English than a literal
    'in the belly,' while remaining faithful to the sense.
- source_word: θηλάσασάν σε ἔτη τρία
  chosen: nursed you for three years
  alternatives:
  - breastfed you for three years
  lexicon: LSJ
  rationale: θηλάζω refers specifically to suckling at the breast. 'Nursed' is idiomatic
    and sufficiently specific in context; 'breastfed' is possible but slightly more
    clinical.
- source_word: ἐκθρέψασάν σε
  chosen: raised you
  alternatives:
  - reared you
  - brought you up
  lexicon: LSJ
  rationale: The verb denotes nourishing and bringing up a child. 'Raised you' is
    concise, natural, and captures the broader parental care implied.
- source_word: ἀγαγοῦσαν εἰς τὴν ἡλικίαν ταύτην
  chosen: brought you to this age
  alternatives:
  - brought you to this stage of life
  - led you to this age
  lexicon: LSJ
  rationale: The phrase refers to guiding and sustaining him up to his present maturity.
    'Brought you to this age' is close to the Greek and idiomatic in English.
- source_word: τροφοφορήσασαν
  chosen: provided for you
  alternatives:
  - cared for you
  - supported you
  lexicon: LSJ
  rationale: The verb conveys sustaining or caring for someone with provision. 'Provided
    for you' captures the material and ongoing sense of maternal support without redundancy
    with 'raised you.'
