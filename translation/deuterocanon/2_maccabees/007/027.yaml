theological_decisions:
- issue: Rendering the mother's appeal ἐλέησόν με
  chosen_reading: have mercy on me
  alternative_readings:
  - take pity on me
  - show compassion to me
  rationale: This is not a doctrinally contested formula here but an emotionally charged
    maternal plea. The chosen rendering preserves the intensity and directness of
    the Greek without softening it.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering τῇ πατρίᾳ φωνῇ
  chosen_reading: in her native tongue
  alternative_readings:
  - in the language of her fathers
  - in her ancestral language
  rationale: The phrase signals ethnic/familial identity and likely strategic speech
    not understood by the tyrant. 'Native tongue' preserves that sense in accessible
    English while avoiding unnecessary literalism.
  doctrine_reference: Translation philosophy §6
