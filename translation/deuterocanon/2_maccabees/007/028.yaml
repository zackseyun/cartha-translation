  text: ἀξιῶ σε, τέκνον, ἀναβλέψαντα εἰς τὸν οὐρανὸν καὶ τὴν γῆν καὶ τὰ ἐν αὐτοῖς
    πάντα ἰδόντα γνῶναι, ὅτι οὐκ ἐξ ὄντων ἐποίησεν αὐτὰ ὁ θεός, καὶ τὸ τῶν ἀνθρώπων
    γένος οὕτω γίγνεται.
