theological_decisions:
- issue: Whether to render οὐκ ἐξ ὄντων with the doctrinally loaded phrase 'out of
    nothing'
  chosen_reading: not out of existing things
  alternative_readings:
  - out of nothing
  rationale: The Greek says 'not from existing things.' This strongly supports creation
    without preexistent matter, but the translation should preserve the source wording
    rather than replace it with later theological shorthand. The doctrinal implication
    can be preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
