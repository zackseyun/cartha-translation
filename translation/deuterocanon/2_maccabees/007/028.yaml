translation:
  text: I beg you, child, look at the heaven and the earth and see everything in them,
    and know that God made them not out of existing things, and that the human race
    comes to be in the same way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'out of nothing.' The Greek literally says 'not
      out of existing things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀξιῶ σε
  chosen: I beg you
  alternatives:
  - I urge you
  - I ask you
  lexicon: LSJ
  rationale: In this context of a mother exhorting her son before martyrdom, the verb
    carries earnest entreaty rather than a formal claim of worth. 'I beg you' best
    conveys the emotional force in natural English.
- source_word: τέκνον
  chosen: child
  alternatives:
  - son
  lexicon: LSJ
  rationale: The Greek addresses her offspring generically as 'child.' Since the immediate
    addressee is in fact her son, 'son' is possible, but 'child' more closely reflects
    the source wording while remaining natural.
- source_word: ἀναβλέψαντα
  chosen: look at
  alternatives:
  - look up at
  - raise your eyes to
  lexicon: LSJ
  rationale: The participle literally suggests looking up, but with the paired objects
    'the heaven and the earth' the idiomatic English command is 'look at.' The upward
    nuance is less important than the act of attentive observation.
- source_word: οὐρανὸν
  chosen: the heaven
  alternatives:
  - heaven
  - sky
  lexicon: LSJ
  rationale: The singular with article is retained as 'the heaven' to mirror the Greek
    cosmological pair 'the heaven and the earth.' 'Sky' would narrow the sense too
    much.
- source_word: τὰ ἐν αὐτοῖς πάντα
  chosen: everything in them
  alternatives:
  - all that is in them
  - all things in them
  lexicon: LSJ
  rationale: This renders the comprehensive scope of creation in clear modern English
    without losing the totalizing force of πάντα.
- source_word: γνῶναι
  chosen: know
  alternatives:
  - understand
  - recognize
  lexicon: LSJ
  rationale: 'The infinitive expresses the intended result of looking and seeing:
    coming to know. ''Know'' is the most direct and least interpretive rendering.'
- source_word: οὐκ ἐξ ὄντων
  chosen: not out of existing things
  alternatives:
  - not from things that existed
  - not out of what existed
  lexicon: LSJ
  rationale: The phrase literally means 'not from beings/existing things.' This wording
    preserves the Greek expression without importing later doctrinal shorthand directly
    into the text.
- source_word: ἐποίησεν
  chosen: made
  alternatives:
  - created
  lexicon: LSJ
  rationale: Although the context is creation, the Greek verb is the common 'made/did.'
    'Made' stays closer to the source while still fitting the context.
- source_word: τὸ τῶν ἀνθρώπων γένος
  chosen: the human race
  alternatives:
  - the race of men
  - the human family
  - humankind
  lexicon: LSJ
  rationale: This phrase denotes humanity as a whole. 'The human race' is natural
    modern English and preserves the collective sense.
- source_word: οὕτω γίγνεται
  chosen: comes to be in the same way
  alternatives:
  - comes into being thus
  - is made in this way
  lexicon: LSJ
  rationale: γίγνεται is broader than 'is born' and points to coming into existence.
    'In the same way' makes explicit the backward reference of οὕτω to God's manner
    of making.
