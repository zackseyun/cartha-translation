- issue: Rendering of τῇ πατρίῳ φωνῇ
  chosen_reading: in the language of his fathers
  alternative_readings:
  - in his ancestral language
  - in his native tongue
  rationale: The phrase carries ethnic/familial identity and resistance under persecution.
