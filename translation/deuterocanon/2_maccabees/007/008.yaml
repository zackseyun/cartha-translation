translation:
  text: But he answered in the language of his fathers and said, “No.” Therefore this
    one also received the next torture, like the first.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in his ancestral language” or “in his native tongue.” The Greek literally
      refers to the paternal/ancestral speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replied
  - responded
  lexicon: BDAG
  rationale: Aorist passive participle of ἀποκρίνομαι commonly functions deponently
    as 'answer/reply.' 'Answered' is the most natural concise English equivalent here.
- source_word: τῇ πατρίῳ φωνῇ
  chosen: in the language of his fathers
  alternatives:
  - in his ancestral language
  - with his native voice/tongue
  lexicon: LSJ
  rationale: πατρίος means ancestral/paternal, and φωνή can mean voice, speech, or
    language. In context it refers to the mother tongue or ancestral speech rather
    than mere vocal tone. 'Language of his fathers' preserves the familial/ancestral
    nuance more clearly than simply 'native language.'
- source_word: προσεῖπεν
  chosen: said
  alternatives:
  - spoke
  - addressed
  lexicon: BDAG
  rationale: The verb introduces direct speech. 'Said' is idiomatic and sufficiently
    formal without overtranslating.
- source_word: Οὐχί
  chosen: 'No'
  alternatives:
  - Certainly not
  - Not so
  lexicon: BDAG
  rationale: A strong negative reply. 'No' fits the immediate dialogue and preserves
    the force without adding emphasis not explicit in English.
- source_word: διόπερ
  chosen: Therefore
  alternatives:
  - for this reason
  - wherefore
  lexicon: LSJ
  rationale: Marks consequence from his refusal. 'Therefore' is clear modern English
    and preserves the inferential force.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - this man
  lexicon: BDAG
  rationale: The demonstrative points to the brother just mentioned. 'This one' preserves
    the Greek demonstrative emphasis better than a bare pronoun.
- source_word: τὴν ἑξῆς βάσανον
  chosen: the next torture
  alternatives:
  - the next torment
  - the next ordeal
  lexicon: BDAG
  rationale: ἑξῆς means next/in sequence, and βάσανος here denotes torture under interrogation
    or punishment. 'Torture' best matches the brutal context of martyrdom.
- source_word: ὡς ὁ πρῶτος
  chosen: like the first
  alternatives:
  - as the first had
  - just as the first
  lexicon: BDAG
  rationale: A concise comparison to the first brother's suffering. 'Like the first'
    is natural and faithful.
