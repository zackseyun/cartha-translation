translation:
  text: Then the king became furious and ordered frying pans and cauldrons to be heated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be made red-hot'; the Greek verb implies heating by fire, possibly
      intensely.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐκθύμως
  chosen: furious
  alternatives:
  - in a rage
  - angrily
  - with fierce anger
  lexicon: LSJ
  rationale: The adverb conveys vehement anger or wrathful intensity. 'Furious' gives
    natural modern English and preserves the emotional force better than the flatter
    'angrily.'
- source_word: γενόμενος
  chosen: became
  alternatives:
  - being
  - having become
  lexicon: BDAG
  rationale: 'With the adverb and subject, the participle is ingressive in sense:
    the king entered a state of anger. ''Became'' captures this transition idiomatically
    in English.'
- source_word: ὁ βασιλεὺς
  chosen: the king
  lexicon: BDAG
  rationale: Straightforward title/noun; no reason to substitute a more specific political
    label not present in the Greek.
- source_word: προσέταξεν
  chosen: ordered
  alternatives:
  - commanded
  - gave orders
  lexicon: BDAG
  rationale: The verb denotes issuing a command. 'Ordered' is concise, natural, and
    preserves the authoritative force.
- source_word: τήγανα
  chosen: frying pans
  alternatives:
  - pans
  - griddles
  lexicon: LSJ
  rationale: The noun refers to cooking pans used for frying or baking. 'Frying pans'
    is the clearest modern equivalent and fits the torture context without unnecessary
    archaism.
- source_word: λέβητας
  chosen: cauldrons
  alternatives:
  - kettles
  - boilers
  - pots
  lexicon: LSJ
  rationale: The term denotes large metal vessels. 'Cauldrons' best conveys substantial
    heated containers in a dramatic judicial-torture setting; 'kettles' sounds too
    domestic.
- source_word: ἐκπυροῦν
  chosen: to be heated
  alternatives:
  - to be made red-hot
  - to be heated intensely
  - to be set over the fire
  lexicon: LSJ
  rationale: The infinitive means to heat thoroughly or by fire. 'To be heated' is
    accurate and readable; the context already implies intense heating, while 'red-hot'
    would be a possible interpretive expansion beyond the explicit wording.
