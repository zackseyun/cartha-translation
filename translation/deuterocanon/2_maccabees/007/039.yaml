  text: ἐκθύμως δὲ γενόμενος ὁ βασιλεὺς τούτῳ παρὰ τοὺς ἄλλους χειρίστως ἀπήντησεν,
    πικρῶς φέρων ἐπὶ τῷ μυκτηρισμῷ.
