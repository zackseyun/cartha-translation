translation:
  text: But the king became furious and treated this one more cruelly than the others,
    taking the mockery bitterly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'resenting the insult bitterly.' The Greek phrase πικρῶς φέρων ἐπὶ τῷ
      μυκτηρισμῷ can be rendered with emphasis on the king's bitter reaction to being
      mocked.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκθύμως
  chosen: became furious
  alternatives:
  - became enraged
  - became exceedingly angry
  lexicon: LSJ
  rationale: The adverb intensifies the king's emotional state. Rendering with 'became
    furious' captures both the suddenness and intensity in natural English.
- source_word: γενόμενος
  chosen: became
  alternatives:
  - being
  - having become
  lexicon: LSJ
  rationale: 'Combined with ἐκθύμως, this participle is best brought into idiomatic
    English as a finite verbal idea: ''became furious.'''
- source_word: χειρίστως
  chosen: more cruelly
  alternatives:
  - most harshly
  - worse
  lexicon: LSJ
  rationale: The comparative sense is made explicit by the phrase παρὰ τοὺς ἄλλους.
    'More cruelly' communicates severity of treatment clearly in modern English.
- source_word: ἀπήντησεν
  chosen: treated
  alternatives:
  - dealt with
  - responded to
  lexicon: LSJ
  rationale: In context the verb refers not merely to verbal response but to the king's
    manner of dealing with the young man. 'Treated' best fits the narrative context
    of abuse and execution.
- source_word: παρὰ τοὺς ἄλλους
  chosen: than the others
  alternatives:
  - beyond the others
  - more than the rest
  lexicon: LSJ
  rationale: This comparative phrase marks that this brother received harsher treatment
    relative to the others. 'Than the others' is the clearest idiomatic English equivalent.
- source_word: πικρῶς φέρων
  chosen: taking ... bitterly
  alternatives:
  - bearing ... bitterly
  - resenting
  lexicon: LSJ
  rationale: φέρω with an emotional complement here conveys inward reaction. 'Taking
    the mockery bitterly' preserves the metaphor while sounding natural in English.
- source_word: μυκτηρισμός
  chosen: mockery
  alternatives:
  - derision
  - scorn
  lexicon: LSJ
  rationale: The noun denotes contemptuous ridicule. 'Mockery' is accessible modern
    English and fits the immediate context of the brother's taunting defiance.
