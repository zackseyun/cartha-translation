translation:
  text: For our brothers, having now endured a brief pain, have fallen under God's
    covenant into everlasting life; but you, by the judgment of God, will justly bear
    the penalties of your arrogance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have died under God's covenant for everlasting life.' The Greek is compact,
      and 'have fallen' is a literal rendering of the verb.
    reason: alternative_reading
lexical_decisions:
- source_word: βραχὺν
  chosen: brief
  alternatives:
  - short
  - momentary
  lexicon: LSJ
  rationale: Conveys the small duration of the suffering in natural English while
    preserving the contrast with everlasting life.
- source_word: ἐπενέγκαντες πόνον
  chosen: having endured a brief pain
  alternatives:
  - having borne a short suffering
  - having undergone a brief torment
  lexicon: LSJ
  rationale: The participle with πόνον denotes undergoing or bearing suffering. 'Endured'
    is idiomatic and keeps the martyrdom context without over-specifying beyond the
    Greek.
- source_word: ἀενάου ζωῆς
  chosen: everlasting life
  alternatives:
  - eternal life
  - unceasing life
  lexicon: LSJ
  rationale: ἀενάος means perpetual or unceasing. 'Everlasting life' is clear modern
    English and preserves the durative force.
- source_word: ὑπὸ διαθήκην θεοῦ
  chosen: under God's covenant
  alternatives:
  - under the covenant of God
  - according to God's covenant
  lexicon: LSJ
  rationale: The phrase is somewhat unusual, but 'under God's covenant' best preserves
    the preposition and covenantal framework rather than flattening it into a vague
    promise.
- source_word: πεπτώκασιν
  chosen: have fallen
  alternatives:
  - have died
  - have passed
  lexicon: LSJ
  rationale: The Greek verb is literally 'have fallen.' In this martyrdom context
    it refers to death, but retaining 'have fallen' preserves the source imagery and
    allows the following phrase 'into everlasting life' to carry the theological sense.
- source_word: κρίσει
  chosen: judgment
  alternatives:
  - sentence
  - justice
  lexicon: LSJ
  rationale: '''Judgment'' is the most direct rendering and fits the divine judicial
    context.'
- source_word: πρόστιμα
  chosen: penalties
  alternatives:
  - punishments
  - fines
  lexicon: LSJ
  rationale: Although the term can denote fines, in this context of divine retribution
    'penalties' best captures imposed punishment without sounding narrowly monetary.
- source_word: ὑπερηφανίας
  chosen: arrogance
  alternatives:
  - pride
  - haughtiness
  lexicon: LSJ
  rationale: Refers to the king's overbearing pride. 'Arrogance' is accessible modern
    English and morally pointed.
