theological_decisions:
- issue: How to express the relation between martyrdom, covenant, and life in ὑπὸ
    διαθήκην θεοῦ ... ἀενάου ζωῆς
  chosen_reading: The brothers, after brief suffering, have died within the sphere
    of God's covenant and so entered everlasting life.
  alternative_readings:
  - The brothers have fallen in accordance with God's covenant for everlasting life.
  - The brothers have fallen under God's covenant of everlasting life.
  rationale: The Greek syntax is compressed and somewhat awkward in English. The translation
    preserves covenant language explicitly and keeps the connection between faithful
    death and life without adding doctrinal detail beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
