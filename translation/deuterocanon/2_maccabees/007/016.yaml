theological_decisions:
- issue: Anthropological nuance of φθαρτὸς ὤν in rebuke to earthly ruler
  chosen_reading: being mortal
  alternative_readings:
  - being perishable
  - being corruptible
  rationale: The verse contrasts human political authority with human frailty. 'Mortal'
    best captures the theological and rhetorical point without importing later doctrinal
    terminology about corruption.
