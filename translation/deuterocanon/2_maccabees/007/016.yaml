translation:
  text: But looking at him, he said, “Though you have authority among men, being mortal,
    you do what you want;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among human beings.' The Greek says 'among men,' using a masculine plural
      with generic force.
    reason: lexical_alternative
  - marker: b
    text: Or 'being perishable' or 'being corruptible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ πρὸς αὐτὸν ἰδὼν
  chosen: But looking at him
  alternatives:
  - But he, looking at him
  - But when he looked at him
  lexicon: LSJ
  rationale: The participial construction is rendered with natural English while preserving
    the visual, confrontational sense of ἰδών. 'But' reflects δέ as a narrative transition.
- source_word: Ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG/LSJ
  rationale: ἐξουσία commonly denotes authority or delegated power. 'Authority' fits
    the political sense here better than the broader 'power'.
- source_word: ἐν ἀνθρώποις
  chosen: among men
  alternatives:
  - over men
  - among human beings
  lexicon: LSJ
  rationale: The preposition ἐν with the dative is most naturally 'among' here, indicating
    the sphere in which the king exercises authority. 'Men' preserves the masculine/generic
    form in line with the project's gender-accurate policy; the sense is humanity
    in society, not males only.
- source_word: ἔχων
  chosen: you have
  alternatives:
  - holding
  - possessing
  lexicon: LSJ
  rationale: 'The participle is brought into idiomatic English with a finite verb
    linked to the direct address: ''Though you have authority...'' This preserves
    the concessive force implied by context.'
- source_word: ὃ θέλεις ποιεῖς
  chosen: you do what you want
  alternatives:
  - you do what you will
  - you do whatever you wish
  lexicon: BDAG/LSJ
  rationale: This is a straightforward rendering of the relative clause. 'Want' is
    modern and readable; 'will' could sound archaic or introduce philosophical overtones
    not required by the Greek.
- source_word: φθαρτὸς ὤν
  chosen: being mortal
  alternatives:
  - being corruptible
  - being perishable
  lexicon: LSJ
  rationale: φθαρτός can mean perishable/corruptible, but in this rebuke to a human
    ruler the point is his mortality and transience. 'Being mortal' communicates the
    force clearly in contemporary English.
