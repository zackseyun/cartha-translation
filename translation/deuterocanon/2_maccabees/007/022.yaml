theological_decisions:
- issue: Meaning of πνεῦμα in maternal speech about human origin
  chosen_reading: spirit
  alternative_readings:
  - breath
  rationale: The verse distinguishes πνεῦμα and ζωή, suggesting two related but not
    identical aspects of life. 'Spirit' preserves that distinction and leaves the
    theological breadth of the Greek intact; 'breath' is possible but narrows the
    term more than the context requires.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
- issue: Force of the mother's denial of causation
  chosen_reading: The mother denies ultimate authorship of her sons' life and bodily
    formation, not her real maternal role.
  alternative_readings:
  - A stronger reading that she denies any causal role at all
  rationale: The wording emphasizes that she did not originate spirit, life, or bodily
    formation in the ultimate sense. The translation preserves that theological tension
    without overstating into a denial of ordinary human motherhood.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
