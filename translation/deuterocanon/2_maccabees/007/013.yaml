translation:
  text: And when this one also had died, they were torturing the fourth in the same
    way, abusing him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when this one also had passed away.' The Greek verb can function as
      a respectful idiom for death.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταλλάξαντος
  chosen: had died
  alternatives:
  - had departed this life
  - had passed away
  - had been removed
  lexicon: LSJ
  rationale: The genitive absolute with μεταλλάσσω in this context idiomatically refers
    to death or passing from life. 'Had died' is the clearest modern English rendering
    and fits the martyrdom sequence.
- source_word: τοῦτον δὲ
  chosen: this one also
  alternatives:
  - this one too
  - him also
  lexicon: LSJ
  rationale: τοῦτον points to the previously mentioned brother, and δέ with καί gives
    an additive sense. 'This one also' preserves the demonstrative force and sequence.
- source_word: τὸν τέταρτον
  chosen: the fourth
  alternatives:
  - the fourth brother
  lexicon: LSJ
  rationale: The Greek explicitly says only 'the fourth.' English can supply the implied
    referent from context, but the shorter rendering stays closer to the source while
    remaining clear enough in context.
- source_word: ὡσαύτως
  chosen: in the same way
  alternatives:
  - likewise
  - similarly
  lexicon: LSJ
  rationale: This adverb marks that the same treatment was repeated. 'In the same
    way' is natural modern English and preserves the comparative force.
- source_word: ἐβασάνιζον
  chosen: they were torturing
  alternatives:
  - they were tormenting
  - they were putting to the test by torture
  lexicon: LSJ
  rationale: βασανίζω here refers to physical torture, not mere distress. The imperfect
    conveys ongoing action, so 'they were torturing' best reflects both sense and
    aspect.
- source_word: αἰκιζόμενοι
  chosen: mistreating him
  alternatives:
  - abusing him
  - maltreating him
  - outraging him
  lexicon: LSJ
  rationale: The participle adds the idea of violent abuse or maltreatment accompanying
    the torture. 'Mistreating him' is readable and captures the abusive force without
    overstating beyond the Greek. The object 'him' is supplied naturally in English
    from context.
