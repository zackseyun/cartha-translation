theological_decisions:
- issue: Whether to make the resurrection hope explicit in the main text
  chosen_reading: Keep the wording 'I hope to receive them back again' without adding
    'in the resurrection.'
  alternative_readings:
  - I hope to receive them back again in the resurrection
  rationale: The verse clearly implies bodily restoration by God, but the Greek itself
    states the hope without the explicit noun 'resurrection.' The translation preserves
    the theological force without importing explanatory wording into the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
