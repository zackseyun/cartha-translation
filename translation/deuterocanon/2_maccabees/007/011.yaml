translation:
  text: And he said courageously, “From heaven I received these, and for his laws
    I disregard them, and from him I hope to receive them back again.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the bodily members taken from him; the context suggests a hope
      of bodily restoration from God.
    reason: cross_reference
  - marker: b
    text: Or 'I have acquired these from heaven' / 'I possess these from heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γενναίως
  chosen: bravely
  alternatives:
  - nobly
  - courageously
  lexicon: LSJ
  rationale: Adverb describing the manner of speaking under torture; 'bravely' is
    natural modern English and preserves the courage emphasized by the Greek.
- source_word: Ἐξ οὐρανοῦ
  chosen: From heaven
  alternatives:
  - From God
  - Out of heaven
  lexicon: LSJ
  rationale: The Greek says 'from heaven,' not explicitly 'from God.' Retaining 'heaven'
    preserves the text's wording and its reverent circumlocution.
- source_word: ταῦτα
  chosen: these
  alternatives:
  - these parts
  - these members
  lexicon: LSJ
  rationale: The pronoun refers contextually to the body parts being cut off, especially
    the hands and tongue in the surrounding narrative. The Greek leaves it implicit,
    so 'these' preserves the terseness without over-specifying in the main text.
- source_word: κέκτημαι
  chosen: I received
  alternatives:
  - I have acquired
  - I possess
  lexicon: LSJ
  rationale: Although the perfect of κτάομαι can mean 'I have acquired/possess,' in
    context the sense is that these bodily members were obtained from heaven. 'I received'
    communicates source and gift more idiomatically in English.
- source_word: διὰ τοὺς αὐτοῦ νόμους
  chosen: for his laws
  alternatives:
  - because of his laws
  - for the sake of his laws
  lexicon: LSJ
  rationale: διά with the accusative here expresses reason or cause tied to loyalty.
    'For his laws' is concise and idiomatic, fitting martyrdom for obedience to God's
    law.
- source_word: ὑπερορῶ
  chosen: I disregard
  alternatives:
  - I despise
  - I think little of
  - I care nothing for
  lexicon: LSJ
  rationale: The verb conveys treating something as of little account. 'I disregard'
    fits the context of willingly surrendering bodily members without implying hatred
    of the body itself.
- source_word: παρʼ αὐτοῦ
  chosen: from him
  alternatives:
  - from God
  - at his hand
  lexicon: LSJ
  rationale: The antecedent is implicit from context, but the Greek says 'from him.'
    This preserves the wording while still being clear enough in English.
- source_word: πάλιν ἐλπίζω κομίσεσθαι
  chosen: I hope to receive them back again
  alternatives:
  - I expect to recover them again
  - I hope to get them back again
  lexicon: LSJ
  rationale: κομίζομαι here means to receive back or recover. The phrase expresses
    hope of bodily restoration from God, likely resurrection. 'Receive them back again'
    is clear and faithful.
