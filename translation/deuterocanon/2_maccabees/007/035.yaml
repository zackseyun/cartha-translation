theological_decisions:
- issue: Rendering the divine titles παντοκράτορος ἐπόπτου θεοῦ
  chosen_reading: God, the all-powerful overseer
  alternative_readings:
  - the judgment of the all-powerful, all-seeing God
  - the judgment of God the Almighty who watches over all
  rationale: The Greek stacks titles in apposition/genitival modification. The chosen
    rendering keeps both attributes explicit without importing later doctrinal phrasing.
    'Overseer' reflects ἐπόπτης/ἐπόπτης-related sense of watching over, preserving
    the text's emphasis that divine judgment cannot be hidden from.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Handling the transmitted verb form without explicit negation
  chosen_reading: you have not escaped
  alternative_readings:
  - you have escaped
  rationale: As transmitted in Swete, ἐκπέφευγας is formally affirmative ('you have
    escaped'), but in the immediate context the speaker is warning the persecutor
    that he will not evade God's judgment. The negative sense is therefore required
    by context and likely reflects either an omitted negation in transmission or idiomatic
    contextual force. Because the source validation flags a major mismatch, this decision
    is documented and the affirmative form is preserved in a footnote as a textual
    note.
  doctrine_reference: Translation philosophy §§1, 3
