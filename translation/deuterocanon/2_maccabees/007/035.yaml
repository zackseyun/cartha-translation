translation:
  text: For in this way you have not escaped the judgment of God, the all-powerful
    overseer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek as transmitted in Swete reads literally, 'for in this way you have
      escaped the judgment of God, the all-powerful overseer.' The context strongly
      favors the negative sense, 'have not escaped.'
    reason: textual_variant
lexical_decisions:
- source_word: οὕτω
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: LSJ
  rationale: Adverb pointing back to the manner just described; 'in this way' is natural
    modern English and preserves the inferential force better than a bare 'thus'.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: LSJ
  rationale: Retains the explanatory connection to the preceding statement.
- source_word: κρίσιν
  chosen: judgment
  alternatives:
  - sentence
  - justice
  lexicon: LSJ
  rationale: '''Judgment'' best fits divine judicial evaluation/punishment in context
    without over-specifying a formal legal sentence.'
- source_word: ἐκπέφευγας
  chosen: you have not escaped
  alternatives:
  - you have not fled from
  - you have not evaded
  lexicon: LSJ
  rationale: Perfect tense indicates a present state resulting from attempted avoidance;
    English idiom requires negation because the Greek clause as transmitted appears
    contextually to mean the tyrant has failed to escape divine judgment.
- source_word: παντοκράτορος
  chosen: all-powerful
  alternatives:
  - almighty
  - all-ruling
  lexicon: LSJ
  rationale: The adjective denotes God's unrestricted power. 'All-powerful' is clear
    modern English; 'almighty' is possible but more traditionalized.
- source_word: ἐπόπτου
  chosen: overseer
  alternatives:
  - watcher
  - one who sees all
  - guardian
  lexicon: LSJ
  rationale: The word conveys one who watches over or observes. 'Overseer' preserves
    both surveillance and superintendence without excessive paraphrase.
- source_word: θεοῦ
  chosen: God
  lexicon: LSJ
  rationale: Straightforward genitive dependent on 'judgment' and modified by the
    titles 'all-powerful' and 'overseer'.
