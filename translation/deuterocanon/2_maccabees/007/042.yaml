lexical_decisions:
- source_word: τὰ ... περὶ τοὺς σπλαγχνισμούς
  chosen: about the mother’s compassion
  alternatives:
  - about the affections
  - about the inward feelings
  - about the tender love
  lexicon: LSJ
  rationale: σπλαγχνισμοί literally refers to inward parts and, by extension, deep
    feelings or compassion. In this narrative summary, it points to the mother’s maternal
    pity/affection displayed in the episode. 'Compassion' is natural English and preserves
    the emotional force better than a more anatomical or wooden rendering.
- source_word: αἱ ὑπερβαλλούσαι αἰκίαι
  chosen: the extraordinary tortures
  alternatives:
  - the excessive cruelties
  - the surpassing abuses
  - the extreme maltreatments
  lexicon: LSJ
  rationale: αἰκία denotes ill-treatment, outrage, or torture; in context of the martyrdom
    account, 'tortures' best captures the concrete violence. ὑπερβαλλούσας intensifies
    the noun as exceeding the ordinary measure, hence 'extraordinary' or 'extreme.'
- source_word: ἐπὶ τοσούτου
  chosen: let this be enough
  alternatives:
  - to this point
  - so far
  - up to this extent
  lexicon: LSJ
  rationale: 'The idiom marks a closing limit to the narration: ''let it be stated
    to this extent'' or ''let this suffice.'' Rendering it idiomatically as ''let
    this be enough'' communicates the author''s rhetorical conclusion in readable
    English.'
- source_word: δεδηλώσθω
  chosen: let this be enough
  alternatives:
  - let it be made clear
  - let it be stated
  - let it be declared
  lexicon: LSJ
  rationale: 'Perfect imperative/passive of δηλόω, functioning here as a formal concluding
    formula: ''let it stand declared.'' In combination with ἐπὶ τοσούτου, idiomatic
    English is better served by ''let this be enough,'' while the declarative nuance
    is retained in the sense of drawing the account to a close.'
