theological_decisions:
- issue: Sense of παρακαλεῖται / παρακληθήσεται in relation to the Mosaic citation
  chosen_reading: The verbs are rendered with the sense of divine compassion or relenting
    toward God's people.
  alternative_readings:
  - is comforted / will be comforted
  - is exhorted / will be exhorted
  rationale: Although παρακαλέω often involves comfort or exhortation, the immediate
    quotation alludes to Deuteronomy's language about the Lord's pity for his servants.
    Rendering the verb as compassion/relenting best fits the intertext and avoids
    implying that God receives comfort from humans.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition
- issue: Rendering of δούλοις in the citation
  chosen_reading: his slaves
  alternative_readings:
  - his servants
  rationale: The project’s contested-terms guidance allows “servant / slave” contextually.
    Here the possessive and covenantal dependence make the bonded relation visible,
    and “slaves” is the more transparent rendering of the Greek term.
  doctrine_reference: 'Contested terms table: δοῦλος = servant / slave (context-dependent)'
