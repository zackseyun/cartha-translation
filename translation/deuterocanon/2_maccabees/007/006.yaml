translation:
  text: The Lord God is watching, and in truth he is being moved to compassion for
    us, just as Moses made clear in the song that testifies openly, saying, “And he
    will be moved to compassion for his servants.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he is comforted … he will be comforted.” The Greek verb can carry senses
      such as comfort, exhortation, or being moved with pity; here the context and
      the quotation from the Song of Moses favor the sense of compassion or relenting.
    reason: lexical_alternative
  - marker: b
    text: The quotation echoes Deuteronomy 32:36, where the Lord is said to be moved
      concerning his servants.
    reason: cross_reference
  - marker: c
    text: 'Or “his servants.” Greek: “his slaves.”'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐφορᾷ
  chosen: is watching
  alternatives:
  - looks on
  - sees
  - keeps watch over
  lexicon: LSJ
  rationale: The present tense suggests active, ongoing observation. “Is watching”
    preserves the vividness better than the flatter “sees,” while avoiding overinterpretation
    such as protective oversight.
- source_word: ταῖς ἀληθείαις
  chosen: in truth
  alternatives:
  - truly
  - by the truths
  - with true things
  lexicon: LSJ
  rationale: The dative plural is somewhat idiomatic here. “In truth” communicates
    the adverbial force naturally in English without forcing an awkward literal plural
    such as “by the truths.”
- source_word: παρακαλεῖται
  chosen: is being moved to compassion
  alternatives:
  - is comforted
  - is exhorted
  - is appeased
  - takes pity
  lexicon: LSJ
  rationale: In this context, confirmed by the quotation that follows (παρακληθήσεται),
    the verb carries the sense of relenting or being moved with pity toward his people,
    not receiving comfort. “Is being moved to compassion” preserves the passive form
    and the emotional nuance.
- source_word: καθάπερ
  chosen: just as
  alternatives:
  - even as
  - as
  lexicon: LSJ
  rationale: “Just as” gives a clear comparative link between the present claim and
    the scriptural citation.
- source_word: διεσάφησεν
  chosen: made clear
  alternatives:
  - explained clearly
  - declared plainly
  - set forth
  lexicon: LSJ
  rationale: The verb denotes clarifying or making something explicit. “Made clear”
    is concise and natural.
- source_word: κατὰ πρόσωπον
  chosen: openly
  alternatives:
  - to the face
  - face to face
  - plainly
  lexicon: LSJ
  rationale: In the phrase describing the song’s testimony, the idiom conveys directness
    or openness. “Openly” fits the rhetorical force in English better than a wooden
    “face to face.”
- source_word: ἀντιμαρτυρούσης
  chosen: that testifies
  alternatives:
  - bearing witness against
  - witnessing in opposition
  - giving counter-testimony
  lexicon: LSJ
  rationale: The participle likely echoes the biblical description of the song as
    a witness, with adversative force in the background. “That testifies” keeps the
    witness motif without overloading the English line; the stronger adversative nuance
    is preserved in the rationale.
- source_word: ᾠδῆς
  chosen: song
  alternatives:
  - ode
  lexicon: LSJ
  rationale: “Song” is the natural English equivalent and evokes the Mosaic song in
    Deuteronomy.
- source_word: δούλοις
  chosen: slaves
  alternatives:
  - servants
  lexicon: LSJ
  rationale: Per project guidance, δοῦλος-family terms should be rendered “slave/slaves”
    where bonded status is salient. In the scriptural quotation, “his slaves” preserves
    the literal social relation better than the softened “servants.”
- source_word: παρακληθήσεται
  chosen: will be moved to compassion
  alternatives:
  - will be comforted
  - will relent
  - will have compassion
  lexicon: LSJ
  rationale: The future passive in the citation is best understood in the Deuteronomic
    sense of God being moved with pity toward his people. “Will be moved to compassion”
    preserves both the passive form and the semantic link with the earlier παρακαλεῖται.
