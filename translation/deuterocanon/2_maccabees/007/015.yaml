translation:
  text: Next they brought forward the fifth and tortured him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the fifth.' The word 'brother' is implied by the context of
      the seven brothers.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐχομένως
  chosen: Next
  alternatives:
  - After that
  - Subsequently
  - In sequence
  lexicon: LSJ
  rationale: Adverb marking what follows in sequence. 'Next' is concise, natural English
    and preserves the narrative progression.
- source_word: δὲ
  chosen: they
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: The particle itself is not separately represented, but the clause is
    carried forward idiomatically in English with an explicit subject from the finite
    plural verb. A wooden 'and/but' is unnecessary here.
- source_word: τὸν πέμπτον
  chosen: the fifth
  alternatives:
  - the fifth one
  - the fifth brother
  lexicon: LSJ
  rationale: Literally 'the fifth.' In context this refers to the fifth brother, but
    the Greek leaves 'brother' implicit. 'The fifth' preserves the source wording
    while remaining clear in context.
- source_word: προσάγοντες
  chosen: brought forward
  alternatives:
  - led up
  - brought near
  - presented
  lexicon: BDAG
  rationale: The participle indicates bringing the fifth into position before the
    torturers/king. 'Brought forward' fits the judicial-execution context better than
    the more neutral 'presented.'
- source_word: ᾐκίζοντο
  chosen: were torturing him
  alternatives:
  - were mistreating him
  - were abusing him
  - were tormenting him
  lexicon: LSJ
  rationale: The verb denotes violent maltreatment/torture. Given the immediate context
    of the brothers' martyrdom under brutal physical abuse, 'were torturing him' best
    conveys the severity. English requires an object, supplied from context as the
    fifth brother.
