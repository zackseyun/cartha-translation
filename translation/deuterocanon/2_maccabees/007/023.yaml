theological_decisions:
- issue: Anthropological sense of πνεῦμα in resurrection context
  chosen_reading: Rendered as 'breath' in the main text
  alternative_readings:
  - spirit
  rationale: The immediate pairing with 'life' and the creation/restoration setting
    favor the sense of animating breath/life-force rather than a more developed dualistic
    anthropology. This preserves the text's emphasis on God restoring embodied life
    without foreclosing that 'spirit' is a possible lexical alternative.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering ἀνθρώπου as representative singular
  chosen_reading: '''man'''
  alternative_readings:
  - humanity
  - humankind
  rationale: The Greek singular is generic/representative rather than referring to
    a male individual. Per project policy, the representative singular may be rendered
    with 'man' when that best matches the source's intent; the broader sense is preserved
    in the rationale rather than flattening the singular in the main text.
  doctrine_reference: Translation philosophy §4
