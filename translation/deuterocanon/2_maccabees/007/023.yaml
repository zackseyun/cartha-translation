translation:
  text: Therefore the Creator of the world, who formed the origin of man and devised
    the origin of all things, will in mercy give back to you both spirit and life,
    since you now disregard yourselves for the sake of his laws.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spirit and life.' The Greek πνεῦμα can mean 'breath' or 'spirit'; here
      'breath' was chosen because the context stresses God restoring life to the martyrs.
    reason: lexical_alternative
  - marker: b
    text: '''The origin of man'' uses the Greek singular ἀνθρώπου in a representative
      sense; the phrase refers broadly to human coming-into-being.'
    reason: cultural_note
lexical_decisions:
- source_word: τοιγαροῦν
  chosen: Therefore
  alternatives:
  - So then
  - Accordingly
  lexicon: LSJ
  rationale: Inferential particle drawing a conclusion from the preceding argument;
    'Therefore' is natural modern English and preserves the logical force.
- source_word: ὁ τοῦ κόσμου κτίστης
  chosen: the Creator of the world
  alternatives:
  - the founder of the world
  - the maker of the world
  lexicon: LSJ
  rationale: κτίστης denotes creator/founder. 'Creator' best fits the theological
    and cosmological context and is idiomatic in English.
- source_word: ὁ πλάσας
  chosen: who formed
  alternatives:
  - who fashioned
  - who molded
  lexicon: LSJ
  rationale: πλάσσω commonly means to form or fashion. 'Formed' is clear, dignified,
    and works well with anthropological language.
- source_word: ἀνθρώπου γένεσιν
  chosen: the origin of man
  alternatives:
  - the creation of man
  - human generation
  - the beginning of humanity
  lexicon: LSJ
  rationale: γένεσις can mean origin, birth, or coming-into-being. Here it refers
    broadly to human coming-to-be. 'Origin of man' preserves the singular representative
    sense of ἀνθρώπου and follows the project's gender-accurate policy.
- source_word: πάντων ἐξευρὼν γένεσιν
  chosen: devised the origin of all things
  alternatives:
  - discovered the origin of all things
  - brought about the origin of all things
  - determined the origin of all things
  lexicon: LSJ
  rationale: ἐξευρίσκω literally can mean find out/invent/devise. In context of God
    as creator, 'discovered' would mislead; 'devised' conveys purposeful origination
    without overparaphrasing. πάντων is naturally 'all things' in this cosmological
    statement.
- source_word: τὸ πνεῦμα
  chosen: breath
  alternatives:
  - spirit
  lexicon: LSJ
  rationale: In the pair 'breath and life,' πνεῦμα likely refers to animating breath
    rather than the Holy Spirit or an abstract immaterial spirit. 'Breath' also echoes
    creation/re-creation language and avoids importing a more technical anthropology
    than the text requires.
- source_word: τὴν ζωὴν
  chosen: life
  lexicon: LSJ
  rationale: Standard rendering; paired with πνεῦμα as two aspects of restored life.
- source_word: πάλιν ἀποδώσει
  chosen: will ... give back
  alternatives:
  - will restore
  - will return
  lexicon: LSJ
  rationale: ἀποδίδωμι with πάλιν conveys restoration/return. 'Give back' is vivid
    and straightforward in English, fitting the mother's resurrection hope.
- source_word: μετʼ ἐλέους
  chosen: in mercy
  alternatives:
  - mercifully
  - with mercy
  lexicon: LSJ
  rationale: The phrase marks the manner of God's action. 'In mercy' is concise and
    preserves the noun-based expression.
- source_word: ὡς νῦν
  chosen: since you now
  alternatives:
  - because now
  - as now
  lexicon: LSJ
  rationale: 'Here ὡς is best taken causally/explanatorily in context: God will restore
    them because at present they are surrendering themselves for his laws.'
- source_word: ὑπερορᾶτε ἑαυτούς
  chosen: disregard yourselves
  alternatives:
  - despise yourselves
  - make light of yourselves
  - care nothing for yourselves
  lexicon: LSJ
  rationale: ὑπεροράω means overlook, disregard, treat with contempt. In martyrdom
    context it means not clinging to one's own life. 'Disregard yourselves' preserves
    the reflexive force without overstating self-hatred.
- source_word: διὰ τοὺς αὐτοῦ νόμους
  chosen: for the sake of his laws
  alternatives:
  - because of his laws
  - on account of his laws
  lexicon: LSJ
  rationale: διά with accusative often expresses purpose or reason. 'For the sake
    of' best captures their willing self-sacrifice in loyalty to God's laws.
