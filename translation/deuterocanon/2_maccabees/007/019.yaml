translation:
  text: But as for you, do not suppose that you will be innocent, having attempted
    to fight against God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having attempted to oppose God.' The Greek verb is literally 'to fight
      against God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ δὲ
  chosen: But as for you
  alternatives:
  - But you
  - But for your part
  lexicon: LSJ
  rationale: Retains the adversative δέ and the emphatic second-person pronoun σὺ.
    'As for you' brings out the direct contrast and pointed address without sounding
    overly stiff.
- source_word: μὴ νομίσῃς
  chosen: do not suppose
  alternatives:
  - do not think
  - do not imagine
  lexicon: LSJ
  rationale: νομίζω here introduces a mistaken assumption. 'Suppose' is natural modern
    English and preserves the warning against self-deception.
- source_word: ἀθῷος
  chosen: innocent
  alternatives:
  - guiltless
  - unpunished
  lexicon: LSJ
  rationale: The adjective primarily denotes freedom from guilt or liability. 'Innocent'
    best matches the lexical sense in context. 'Unpunished' reflects an inferred consequence
    rather than the word's core meaning.
- source_word: ἔσεσθαι
  chosen: you will be
  alternatives:
  - you would be
  lexicon: LSJ
  rationale: Future infinitive dependent on νομίσῃς; English idiom naturally renders
    it as future in indirect discourse.
- source_word: θεομαχεῖν
  chosen: to fight against God
  alternatives:
  - to war against God
  - to oppose God
  lexicon: LSJ
  rationale: The compound literally means to fight against God. This explicit rendering
    preserves the force of the term better than the more general 'oppose God'.
- source_word: ἐπιχειρήσας
  chosen: since you have attempted
  alternatives:
  - having attempted
  - because you undertook
  - after attempting
  lexicon: LSJ
  rationale: Aorist participle giving the basis for the warning. 'Since you have attempted'
    communicates the causal nuance smoothly in English while preserving the idea of
    undertaking an action.
