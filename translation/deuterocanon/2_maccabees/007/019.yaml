theological_decisions:
- issue: Rendering θεομαχεῖν
  chosen_reading: fight against God
  alternative_readings:
  - oppose God
  - war against God
  rationale: The verse's theological force lies in identifying the king's persecution
    as active resistance to God himself, not merely to the Jewish people. A literal
    rendering preserves that accusation without embellishment.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
