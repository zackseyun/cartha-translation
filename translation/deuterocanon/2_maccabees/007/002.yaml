theological_decisions:
- issue: Rendering of Jewish covenantal identity in πατρῷα νόμους
  chosen_reading: the laws of our fathers
  alternative_readings:
  - the ancestral laws
  rationale: The phrase refers to inherited Jewish law and identity under persecution.
    The chosen rendering preserves the familial, tradition-bearing force of πατρῷα
    without flattening it into an abstract adjective. This keeps the text's covenantal
    and communal weight while remaining readable.
  doctrine_reference: Translation philosophy §§1, 5, 6
