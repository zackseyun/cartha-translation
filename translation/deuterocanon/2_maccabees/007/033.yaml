theological_decisions:
- issue: Rendering δοῦλοι in relation to κύριος
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: Following the doctrine's guidance, 'slave' is preferred where bonded
    status is theologically or relationally salient. Here the contrast between the
    Lord and those who belong to him supports 'slaves,' though 'servants' remains
    a viable softer alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms table on δοῦλος; Translation philosophy
    §1'
- issue: Sense of καταλλαγήσεται in divine-human relation
  chosen_reading: he will again be reconciled with his own slaves
  alternative_readings:
  - he will again be appeased toward his own servants
  - he will again be at peace with his own servants
  rationale: The verse presents divine anger as temporary and restoration as relational.
    'Be reconciled with' preserves that tension without overstating mechanism or denying
    divine initiative.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3'
