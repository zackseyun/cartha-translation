id: 2MA.7.33
reference: 2 Maccabees 7:33
source:
  edition: lxx-swete-1909
  text: εἰ δὲ χάριν ἐπιπλήξεως καὶ παιδίας ὁ ζῶν κύριος ἡμῶν βραχέως ἐπωργίσται, καὶ
    πάλιν καταλλαγήσεται τοῖς ἑαυτοῦ δούλοις.
