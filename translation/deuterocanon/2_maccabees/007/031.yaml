- issue: Anthropomorphic expression for divine judgment
  chosen_reading: the hands of God
  alternative_readings:
  - God's power
  - God's judgment
  rationale: The Greek uses a concrete anthropomorphic phrase. Preserving 'hands'
    maintains the biblical idiom and theological force without flattening it into
    abstraction.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Ethnic designation Ἑβραίους
  chosen_reading: the Hebrews
  alternative_readings:
  - the Jews
  rationale: The source text specifically says 'Hebrews,' and original-language primacy
    favors retaining that designation rather than substituting the more familiar but
    different 'Jews.'
  doctrine_reference: Translation philosophy §1
