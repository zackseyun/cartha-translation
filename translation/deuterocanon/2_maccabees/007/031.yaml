translation:
  text: But you, having become the inventor of every evil against the Hebrews, will
    certainly not escape the hands of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the deviser' or 'the author' of every evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ δὲ
  chosen: But you
  alternatives:
  - And you
  - But as for you
  lexicon: LSJ
  rationale: δέ marks contrast with the preceding statement; 'But you' preserves the
    direct, confrontational turn of address.
- source_word: πάσης κακίας
  chosen: of every evil
  alternatives:
  - of all wickedness
  - of every crime
  lexicon: LSJ
  rationale: κακία broadly denotes evil, wickedness, or malice. 'Every evil' keeps
    the sweeping moral charge without narrowing it to specific crimes.
- source_word: εὑρετὴς γενόμενος
  chosen: having become the inventor
  alternatives:
  - having become the deviser
  - having become the author
  lexicon: LSJ
  rationale: εὑρετής is one who finds out, devises, or invents. In this accusatory
    context, 'inventor' conveys active origination of wicked schemes; 'having become'
    reflects γενόμενος.
- source_word: εἰς τοὺς Ἑβραίους
  chosen: against the Hebrews
  alternatives:
  - toward the Hebrews
  - with respect to the Hebrews
  lexicon: LSJ
  rationale: With a hostile context, εἰς is best represented idiomatically as 'against'
    rather than the more wooden 'toward.' 'Hebrews' directly reflects Ἑβραίους.
- source_word: οὐ μὴ διαφύγῃς
  chosen: will certainly not escape
  alternatives:
  - shall by no means escape
  - will never escape
  lexicon: LSJ
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation. 'Will certainly
    not escape' preserves the force in natural modern English.
- source_word: τὰς χεῖρας τοῦ θεοῦ
  chosen: the hands of God
  alternatives:
  - God's hands
  lexicon: LSJ
  rationale: The plural 'hands' is literal and idiomatic in biblical judgment language,
    preserving the concrete imagery of divine power and retribution.
