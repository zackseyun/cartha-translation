translation:
  text: When the first had died in this way, they brought the second to the mockery;
    and after tearing off the skin of his head with the hair, they were asking, “Will
    you eat before your body is punished limb by limb?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the skin of the head'; English 'scalp' is a possible
      rendering.
    reason: lexical_alternative
  - marker: b
    text: The question implies eating what had been forbidden under the ancestral
      law, as the surrounding context makes clear.
    reason: cross_reference
lexical_decisions:
- source_word: Μεταλλάξαντος
  chosen: had died
  alternatives:
  - had departed
  - had changed
  - had come to his end
  lexicon: LSJ
  rationale: In context, the genitive absolute refers to the first brother's death
    after torture, not a neutral 'change.' 'Had died' conveys the idiomatic sense
    required by the narrative.
- source_word: τοῦ πρώτου
  chosen: the first
  alternatives:
  - the first brother
  lexicon: LSJ
  rationale: The Greek says simply 'the first'; English can preserve this ellipsis
    naturally in context.
- source_word: τὸν τρόπον τοῦτον
  chosen: in this way
  alternatives:
  - in this manner
  - thus
  lexicon: LSJ
  rationale: A straightforward adverbial rendering that preserves the reference to
    the manner of the first brother's death.
- source_word: ἦγον ἐπὶ τὸν ἐμπαιγμόν
  chosen: they brought the second to the mockery
  alternatives:
  - they led the second for abuse
  - they brought the second for ridicule
  lexicon: LSJ
  rationale: ἐμπαιγμός denotes mocking, derision, or abusive sport. 'To the mockery'
    keeps the concrete force of being subjected to public humiliation and torture.
- source_word: τὸ τῆς κεφαλῆς δέρμα
  chosen: the skin of his head
  alternatives:
  - his scalp
  lexicon: LSJ
  rationale: Literally 'the skin of the head.' 'Scalp' is idiomatic English, but the
    more literal phrase avoids possible over-interpretation while still being clear.
- source_word: σὺν ταῖς θριξὶν
  chosen: with the hair
  alternatives:
  - together with the hair
  lexicon: LSJ
  rationale: This specifies that the skin was torn off along with the hair. 'With
    the hair' is concise and accurate.
- source_word: περισύραντες
  chosen: after tearing off
  alternatives:
  - after stripping away
  - after dragging off
  lexicon: LSJ
  rationale: The verb conveys violent removal by pulling/stripping. 'After tearing
    off' best fits the gruesome physical action in idiomatic English.
- source_word: ἐπηρώτων
  chosen: they were asking
  alternatives:
  - they asked
  - they kept asking
  lexicon: LSJ
  rationale: The imperfect suggests repeated or ongoing questioning. 'They were asking'
    preserves that aspect without overloading the sentence.
- source_word: Εἰ φάγεσαι
  chosen: Will you eat
  alternatives:
  - Are you going to eat
  - Will you consent to eat
  lexicon: LSJ
  rationale: The question concerns whether he will comply by eating the forbidden
    meat. 'Will you eat' is direct and sufficient in context.
- source_word: πρὸ τοῦ τιμωρηθῆναι
  chosen: before ... is punished
  alternatives:
  - before ... is tortured
  - before ... is chastised
  lexicon: LSJ
  rationale: τιμωρέω can denote punishment broadly; here the punishment is physical
    torture. 'Is punished' preserves the lexical sense while allowing the following
    phrase 'limb by limb' to specify the bodily form.
- source_word: κατὰ μέλος
  chosen: limb by limb
  alternatives:
  - member by member
  - part by part
  lexicon: LSJ
  rationale: An idiomatic rendering that preserves the distributive force and the
    bodily reference.
- source_word: τὸ σῶμα
  chosen: your body
  alternatives:
  - your flesh
  - your person
  lexicon: LSJ
  rationale: σῶμα here refers concretely to the physical body under torture; 'body'
    is the natural equivalent.
