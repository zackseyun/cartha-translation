theological_decisions:
- issue: Resurrection language in a martyrdom context
  chosen_reading: The verse speaks of God raising the martyrs into everlasting life
    after death for his laws.
  alternative_readings:
  - The phrase could be rendered more explicitly as 'resurrection to eternal life.'
  rationale: The Greek combines ἀναστήσει with the rare phrase εἰς αἰώνιον ἀναβίωσιν
    ζωῆς, clearly expressing postmortem vindication and restored life. The main text
    preserves both the raising language and the renewed-life expression without collapsing
    them into a single doctrinal formula.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
