translation:
  text: And as he was at his last breath, he said, “You, accursed wretch, release
    us from this present life, but the King of the world will raise us up, who have
    died for his laws, into an everlasting renewal of life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wretch' or 'accursed one' for the insult ἀλάστωρ.
    reason: lexical_alternative
  - marker: b
    text: The Greek phrase literally combines 'everlasting' with a rare noun meaning
      'living again' or 'revival'; alternatively, 'to an eternal resurrection to life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐσχάτῃ ... πνοῇ
  chosen: at his last breath
  alternatives:
  - with his final breath
  - when he was at the point of death
  lexicon: LSJ
  rationale: The phrase literally refers to the final breath. 'At his last breath'
    is idiomatic English that preserves the vividness and immediacy of dying speech
    better than a more paraphrastic rendering.
- source_word: γενόμενος
  chosen: as he was
  alternatives:
  - being
  - when he came to be
  lexicon: BDAG
  rationale: Here the participle functions adverbially with the preceding phrase.
    'As he was' gives natural English while retaining the temporal sense tied to his
    final breath.
- source_word: ἀλάστωρ
  chosen: accursed man
  alternatives:
  - wretch
  - accursed one
  - avenger
  lexicon: LSJ
  rationale: The term is a strong insult with connotations of a cursed or wicked person.
    'Accursed man' preserves the severity without importing the more specialized mythic
    sense 'avenger.' 'Man' is supplied for natural English direct address.
- source_word: ἐκ τοῦ παρόντος
  chosen: from this present life
  alternatives:
  - from the present state
  - from this present world
  - from this life
  lexicon: LSJ
  rationale: In context with ζῆν ('to live'), the phrase contrasts present mortal
    existence with the life to come. 'This present life' makes that contrast explicit
    in idiomatic English without overinterpreting.
- source_word: ζῆν ἀπολύεις
  chosen: release us from this present life
  alternatives:
  - dismiss us from living
  - set us free from this life
  - deprive us of life
  lexicon: BDAG
  rationale: 'Literally, ''you release us from living.'' ''Release us from this present
    life'' preserves the irony: the tyrant can only end earthly life, not ultimate
    life from God.'
- source_word: ὁ ... τοῦ κόσμου βασιλεὺς
  chosen: the King of the world
  alternatives:
  - the world's King
  - the King of the universe
  lexicon: LSJ
  rationale: κόσμος here denotes the world as the ordered whole. 'King of the world'
    is a straightforward rendering and preserves the contrast with the earthly ruler
    being addressed.
- source_word: ἀποθανόντας ἡμᾶς
  chosen: us, who have died
  alternatives:
  - us after we die
  - we who die
  - us who died
  lexicon: BDAG
  rationale: The aorist participle is best represented as those who have died. The
    appositional phrasing in English keeps the relation to 'will raise us up' clear.
- source_word: ὑπὲρ τῶν αὐτοῦ νόμων
  chosen: for his laws
  alternatives:
  - on behalf of his laws
  - because of his laws
  - for the sake of his laws
  lexicon: BDAG
  rationale: ὑπέρ here expresses cause or behalf in martyrdom context. 'For his laws'
    is concise and natural, while preserving the sense that their death is on account
    of fidelity to God's laws.
- source_word: εἰς αἰώνιον ἀναβίωσιν ζωῆς
  chosen: into an everlasting renewal of life
  alternatives:
  - to everlasting life again
  - to an eternal resurrection to life
  - into eternal reviving of life
  lexicon: LSJ
  rationale: ἀναβίωσις is a rare term denoting return to life or revival. 'Renewal
    of life' preserves the lexical force of living again without flattening it into
    the more common resurrection vocabulary, while 'everlasting' renders αἰώνιον naturally.
- source_word: ἀναστήσει
  chosen: will raise us up
  alternatives:
  - will resurrect us
  - will raise us
  lexicon: BDAG
  rationale: The verb is standard resurrection language. 'Will raise us up' is both
    idiomatic and theologically transparent, and it pairs well with the preceding
    phrase about dying for God's laws.
