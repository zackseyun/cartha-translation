translation:
  text: Do not fear this executioner, but, becoming worthy of your brothers, accept
    death, so that in mercy I may receive you back together with your brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this torturer.' The Greek δήμιος more precisely denotes an executioner,
      though the broader context includes torture.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in mercy' likely refers to divine mercy, but God is not explicitly
      named in the Greek of this clause.
    reason: alternative_reading
  - marker: c
    text: Or 'I may recover you' or 'I may receive you.' The wording expresses the
      mother's hope of being reunited with her son together with his brothers.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ φοβηθῇς
  chosen: Do not fear
  alternatives:
  - Do not be afraid of
  - Do not dread
  lexicon: BDAG
  rationale: A straightforward imperative with μή + aorist passive/subjunctive form
    used prohibitively. 'Do not fear' is concise and natural, preserving the direct
    maternal exhortation.
- source_word: τὸν δήμιον τοῦτον
  chosen: this executioner
  alternatives:
  - this torturer
  - this public executioner
  lexicon: LSJ
  rationale: δήμιος commonly denotes a public executioner; in this martyrdom context
    'executioner' best fits the immediate command not to fear the one inflicting death.
    'Torturer' is possible from context but is less lexically precise.
- source_word: τῶν ἀδελφῶν σου ἄξιος γενόμενος
  chosen: proving yourself worthy of your brothers
  alternatives:
  - becoming worthy of your brothers
  - having become worthy of your brothers
  lexicon: BDAG
  rationale: γενόμενος is participial and can be rendered idiomatically in English
    as 'proving yourself' in the course of action. 'Brothers' is retained per gender-accurate
    policy because the referent is his literal male siblings in context.
- source_word: ἐπίδεξαι τὸν θάνατον
  chosen: accept death
  alternatives:
  - receive death
  - submit to death
  lexicon: LSJ
  rationale: ἐπιδέχομαι can mean receive or accept. Here the sense is volitional acceptance
    of martyrdom, so 'accept death' communicates the exhortation clearly without over-paraphrase.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is idiomatic modern English and
    preserves the clause relation.
- source_word: ἐν τῷ ἐλέει
  chosen: in mercy
  alternatives:
  - by mercy
  - through mercy
  - in the mercy of God
  lexicon: BDAG
  rationale: The Greek has the article with ἔλεος but no explicit subject such as
    God. 'In mercy' preserves the compact Greek expression and avoids importing an
    explicit divine referent not stated in the text, though divine mercy is clearly
    implied by context.
- source_word: σὺν τοῖς ἀδελφοῖς σου
  chosen: together with your brothers
  alternatives:
  - with your brothers
  lexicon: BDAG
  rationale: σύν marks accompaniment. 'Together with' slightly strengthens the reunion
    sense in natural English.
- source_word: κομίσωμαί σε
  chosen: I may receive you back
  alternatives:
  - I may recover you
  - I may get you back
  - I may receive you
  lexicon: BDAG
  rationale: κομίζω can mean receive back/recover. In this resurrection-hope context,
    'receive you back' best conveys restoration to the mother without making the resurrection
    concept more explicit than the Greek does.
