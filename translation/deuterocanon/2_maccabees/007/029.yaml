theological_decisions:
- issue: Whether to make God's mercy explicit in ἐν τῷ ἐλέει
  chosen_reading: Leave the phrase as 'in mercy' without adding 'of God.'
  alternative_readings:
  - in God's mercy
  - through the mercy of God
  rationale: The context of 2 Maccabees 7 strongly implies divine mercy and resurrection
    hope, but the Greek phrase itself does not explicitly name God here. Per translation
    philosophy, the draft preserves the theological implication without resolving
    it into an explicit addition.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Resurrection/restoration nuance in κομίσωμαί σε
  chosen_reading: Render as 'I may receive you back' to preserve implied restoration.
  alternative_readings:
  - I may receive you
  - I may recover you
  rationale: The mother's statement expresses hope of reunion beyond death. 'Receive
    you back' communicates that hope while remaining anchored to the lexical range
    of κομίζω and not over-specifying the mechanics of resurrection.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
