translation:
  text: And while she was still finishing, the young man said, “Why are you waiting?
    I do not obey the king’s command, but I obey the command of the law that was given
    to our fathers through Moses.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What are you waiting for?” The Greek question is elliptical and can
      be rendered either way in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι δὲ ταύτης καταληγούσης
  chosen: And while she was still finishing
  alternatives:
  - And as she was still speaking
  - And while she was still coming to an end
  lexicon: LSJ
  rationale: The genitive absolute marks contemporaneous action by the mother. καταληγούσης
    literally suggests 'ending/finishing,' here naturally referring to her speech.
    'While she was still finishing' preserves the temporal overlap without over-paraphrasing.
- source_word: ὁ νεανίας
  chosen: the young man
  alternatives:
  - the youth
  - the young one
  lexicon: LSJ
  rationale: νεανίας denotes a young male. 'Young man' is natural modern English and
    fits the narrative context of one of the brothers.
- source_word: Τίνα μένετε;
  chosen: Why are you waiting?
  alternatives:
  - What are you waiting for?
  - Why do you delay?
  lexicon: LSJ
  rationale: The idiom is elliptical. Literally 'Why/for what are you waiting?' In
    English, 'Why are you waiting?' is concise and idiomatic while preserving the
    challenge directed at the executioners/king's agents.
- source_word: οὐχ ὑπακούω
  chosen: I do not obey
  alternatives:
  - I will not obey
  - I am not obeying
  lexicon: LSJ
  rationale: Present tense can be rendered as a present of resolve in context. 'I
    do not obey' keeps closer to the Greek form while still conveying principled refusal.
- source_word: τοῦ προστάγματος τοῦ βασιλέως
  chosen: the king’s command
  alternatives:
  - the command of the king
  - the king's decree
  lexicon: LSJ
  rationale: πρόσταγμα is an order/command/decree. 'Command' matches the repeated
    contrast with the command of the law and keeps the parallelism clear.
- source_word: τοῦ δὲ προστάγματος ἀκούω τοῦ νόμου
  chosen: but I obey the command of the law
  alternatives:
  - but I listen to the command of the law
  - but I heed the law's command
  lexicon: LSJ
  rationale: ἀκούω with genitive can mean 'hear' or 'heed/obey.' Since it is contrasted
    with ὑπακούω and governs a command, 'obey' best conveys the practical sense. Retaining
    'command' for πρόσταγμα preserves the rhetorical contrast.
- source_word: τοῦ δοθέντος τοῖς πατράσιν ἡμῶν
  chosen: that was given to our fathers
  alternatives:
  - given to our ancestors
  - that was given to our forefathers
  lexicon: LSJ
  rationale: πατράσιν is literally 'fathers.' Per gender-accurate philosophy, 'our
    fathers' is retained because it reflects the ancestral covenant language of the
    source.
- source_word: διὰ Μωσῆ
  chosen: through Moses
  alternatives:
  - by Moses
  - through Moses
  lexicon: LSJ
  rationale: διά with genitive indicates agency/mediation. 'Through Moses' is the
    standard and precise rendering.
