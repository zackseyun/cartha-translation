id: 2MA.7.24
reference: 2 Maccabees 7:24
source:
  edition: lxx-swete-1909
  text: Ὁ δὲ Ἀντίοχος οἰόμενος καταφρονεῖσθαι καὶ τὴν ὀνειδίζουσαν ὑφορώμενος φωνήν,
    ἔτι τοῦ νεωτέρου περιόντος, οὐ μόνον διὰ λόγων ἐποιεῖτο τὴν παράκλησιν, ἀλλὰ καὶ
    διʼ ὅρκων ἐπίστου ἅμα πλουτιεῖν καὶ μακαριστὸν ποιήσειν καὶ μεταθέμενον ἀπὸ τῶν
    πατρίων, καὶ φίλον ἕξειν καὶ χρείας ἐμπιστεύσειν.
