theological_decisions:
- issue: Rendering of πατρίων in an apostasy context
  chosen_reading: the traditions of his fathers
  alternative_readings:
  - ancestral customs
  - the ways of his ancestors
  rationale: The verse concerns pressure to abandon inherited Jewish religious practice.
    'Traditions of his fathers' preserves the familial and covenantal inheritance
    without over-specifying beyond the Greek.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering of μακαριστὸν in a secular royal promise
  chosen_reading: make him enviable
  alternative_readings:
  - make him blessed
  - make him fortunate
  rationale: To avoid importing religious overtones not demanded by the context, the
    term is rendered in a worldly sense appropriate to Antiochus's promises of status
    and wealth.
  doctrine_reference: Translation philosophy §§1, 6
