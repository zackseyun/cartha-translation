translation:
  text: But Antiochus, thinking that he was being despised and taking note of the
    reproachful tone, while the youngest was still alive, not only urged him with
    words, but also assured him with oaths that he would both make him rich and make
    him blessed, if he turned away from the traditions of his fathers, and that he
    would have him as a friend and entrust him with offices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the insulting voice' or 'the reproaching speech'; the Greek is literally
      'the reproaching voice.'
    reason: lexical_alternative
  - marker: b
    text: '''Friend'' may also carry a court title sense: a royal associate or favored
      official.'
    reason: cultural_note
  - marker: c
    text: Or 'entrust him with responsibilities' or 'appoint him to offices'; the
      Greek refers to duties or positions entrusted by the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰόμενος
  chosen: thinking
  alternatives:
  - supposing
  - imagining
  lexicon: LSJ
  rationale: Carries Antiochus's subjective assumption; 'thinking' is natural modern
    English and preserves the internal viewpoint.
- source_word: καταφρονεῖσθαι
  chosen: being despised
  alternatives:
  - being treated with contempt
  - being looked down on
  lexicon: LSJ
  rationale: The passive infinitive expresses Antiochus's sense that the young man
    was treating him contemptuously. 'Being despised' is concise and fits the royal
    honor-shame context.
- source_word: τὴν ὀνειδίζουσαν ... φωνήν
  chosen: the reproachful tone
  alternatives:
  - the insulting voice
  - the taunting speech
  lexicon: LSJ
  rationale: Literally 'the reproaching voice.' In idiomatic English, 'tone' better
    conveys the manner of speech without over-literal awkwardness, while preserving
    the sense of insult/reproach.
- source_word: ὑφορώμενος
  chosen: taking note of
  alternatives:
  - perceiving
  - being suspicious of
  - noticing
  lexicon: LSJ
  rationale: In context Antiochus is reacting to the insulting manner of speech. 'Taking
    note of' captures his attentive awareness without importing excessive suspicion.
- source_word: ἔτι τοῦ νεωτέρου περιόντος
  chosen: while the youngest was still alive
  alternatives:
  - while the youngest still survived
  - since the youngest was still remaining
  lexicon: LSJ
  rationale: The genitive absolute marks contemporaneous circumstance. Given the martyrdom
    setting, περιόντος naturally means 'still alive' rather than merely 'present'.
- source_word: τὴν παράκλησιν
  chosen: urged him
  alternatives:
  - made the appeal
  - encouraged him
  - exhorted him
  lexicon: LSJ
  rationale: The phrase ἐποιεῖτο τὴν παράκλησιν is idiomatically an appeal or exhortation.
    'Urged him' is clear and suitably forceful in context.
- source_word: διʼ ὅρκων ἐπίστου
  chosen: assured him with oaths
  alternatives:
  - tried to persuade him by oaths
  - gave him his pledge with oaths
  lexicon: LSJ
  rationale: The text indicates solemn sworn assurances beyond mere speech. 'Assured
    him with oaths' preserves both the persuasive and promissory force.
- source_word: πλουτιεῖν
  chosen: make him rich
  alternatives:
  - enrich him
  lexicon: LSJ
  rationale: Future promise of material reward; 'make him rich' is straightforward
    and idiomatic.
- source_word: μακαριστὸν ποιήσειν
  chosen: make him enviable
  alternatives:
  - make him blessed
  - make him fortunate
  - make him highly favored
  lexicon: LSJ
  rationale: In this royal patronage context the sense is public felicity or privileged
    status, not necessarily religious blessedness. 'Enviable' best fits the worldly
    promise Antiochus is making.
- source_word: μεταθέμενον ἀπὸ τῶν πατρίων
  chosen: if he turned away from the traditions of his fathers
  alternatives:
  - if he changed from his ancestral customs
  - if he abandoned the things of his fathers
  lexicon: LSJ
  rationale: The participle is conditional in sense, referring to apostasy from ancestral
    Jewish customs. 'Traditions of his fathers' is clear and preserves the ancestral-religious
    force.
- source_word: φίλον ἕξειν
  chosen: have him as a friend
  alternatives:
  - count him as a friend
  - make him his friend
  lexicon: LSJ
  rationale: In Hellenistic court language 'friend' can denote an official royal associate.
    The literal rendering is retained, with the political nuance preserved by context
    and footnote.
- source_word: χρείας ἐμπιστεύσειν
  chosen: entrust him with offices
  alternatives:
  - entrust him with responsibilities
  - appoint him to positions of service
  - commit affairs to him
  lexicon: LSJ
  rationale: The phrase suggests entrusting duties or administrative responsibilities.
    'Offices' captures the courtly-political sense better than the vaguer 'responsibilities.'
