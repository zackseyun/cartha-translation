  rationale: The Greek says ἀθέμιτος ('unlawful/forbidden'), not specifically 'unclean.'
    'Unlawful' preserves the legal-religious force without importing later interpretive
    terminology.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English.'
