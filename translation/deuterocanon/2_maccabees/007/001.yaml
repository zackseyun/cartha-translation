translation:
  text: It also happened that seven brothers, along with their mother, having been
    arrested, were being forced by the king to partake of the unlawful flesh of swine,
    while being tortured with whips and cords.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to partake of'; literally the verb can mean 'to touch,' but here in
      context it refers to taking the swine's flesh as food.
    reason: lexical_alternative
  - marker: b
    text: '''Cords'' may also be rendered ''thongs'' or, more literally, ''sinews,''
      referring to instruments used for torture.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνέβη δὲ καὶ
  chosen: It also happened that
  alternatives:
  - Now it happened that
  - It happened also that
  lexicon: LSJ
  rationale: Conveys the narrative transition and additive force of καὶ without sounding
    overly wooden. 'It also happened that' preserves the sense that this is another
    episode.
- source_word: ἑπτὰ ἀδελφοὺς
  chosen: seven brothers
  alternatives:
  - seven siblings
  lexicon: LSJ
  rationale: ἀδελφοί here refers to male siblings in the narrative, not a mixed-gender
    group. 'Brothers' is gender-accurate and contextually precise.
- source_word: μετὰ τῆς μητρὸς
  chosen: along with their mother
  alternatives:
  - with their mother
  lexicon: LSJ
  rationale: Makes explicit in natural English that the mother accompanies the seven
    brothers.
- source_word: συλλημφθέντας
  chosen: having been arrested
  alternatives:
  - having been seized
  - having been captured
  lexicon: LSJ
  rationale: '''Arrested'' fits the legal-coercive setting under the king; ''seized''
    is possible but less specific in English.'
- source_word: ἀναγκάζεσθαι
  chosen: were being forced
  alternatives:
  - were compelled
  - were being compelled
  lexicon: LSJ
  rationale: The infinitive depends on συνέβη and describes coercion. 'Were being
    forced' is idiomatic and preserves the passive sense of compulsion.
- source_word: ὑπὸ τοῦ βασιλέως
  chosen: by the king
  alternatives:
  - under the king
  lexicon: LSJ
  rationale: Straightforward agentive use of ὑπό with passive force.
- source_word: ἀπὸ τῶν ἀθεμίτων υἱείων κρεῶν
  chosen: the unlawful flesh of swine
  alternatives:
  - the forbidden pork
  - the unlawful pork
  lexicon: LSJ
  rationale: ἀθέμιτος denotes what is unlawful or forbidden; υἵειος means 'of swine.'
    'Flesh of swine' stays closer to the Greek than 'pork' while remaining understandable.
- source_word: ἐφάπτεσθαι
  chosen: to taste
  alternatives:
  - to partake of
  - to touch
  - to eat
  lexicon: LSJ
  rationale: In this food context, ἐφάπτομαι carries the sense of taking hold of so
    as to partake/taste. 'Taste' captures the coercive demand without overstating
    the amount consumed; 'touch' would be too literal and misleading in context.
- source_word: μάστιξιν καὶ νευραῖς
  chosen: with whips and cords
  alternatives:
  - with scourges and thongs
  - with whips and sinews
  lexicon: LSJ
  rationale: μάστιξες are whips/scourges. νευραῖς can denote cords or thongs, often
    made from sinew; 'cords' is clear modern English while preserving the instrument
    of torture.
- source_word: αἰκιζομένους
  chosen: while being tortured
  alternatives:
  - while being abused
  - while being maltreated
  lexicon: LSJ
  rationale: The verb denotes violent mistreatment or torture. Given the instruments
    named, 'tortured' best reflects the severity.
