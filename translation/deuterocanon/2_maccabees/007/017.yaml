theological_decisions:
- issue: Referent of the future verb βασανιεῖ
  chosen_reading: The subject is the immediately preceding expression of God's power
    ('his majestic power'), rendered as 'it will torture you and your offspring.'
  alternative_readings:
  - 'The implied subject is God himself: ''how he will torture/torment you and your
    offspring.'''
  rationale: Greek permits the neuter singular phrase τὸ μεγαλεῖον αὐτοῦ κράτος to
    function as the antecedent for the singular future verb. Rendering the subject
    as 'it' follows the surface syntax most closely while still conveying divine judgment.
    The alternative personal rendering is worth preserving because English readers
    may naturally understand God as the acting subject behind his power.
  doctrine_reference: Preserve theological tension rather than resolve it.
