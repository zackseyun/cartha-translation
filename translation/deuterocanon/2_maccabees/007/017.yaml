translation:
  text: But do not think that our nation has been abandoned by God. As for you, keep
    waiting and see his majestic power, how it will torture you and your offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'how he will torture you and your offspring,' taking God rather than
      'his majestic power' as the implied subject.
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ δόκει
  chosen: do not think
  alternatives:
  - do not suppose
  - do not imagine
  lexicon: LSJ
  rationale: The present imperative with μή naturally gives a prohibition. 'Do not
    think' is straightforward modern English and preserves the direct rebuke.
- source_word: τὸ γένος ἡμῶν
  chosen: our nation
  alternatives:
  - our race
  - our people
  - our family line
  lexicon: LSJ
  rationale: γένος can denote stock, family, race, or people-group. In this martyrdom
    context, the speaker refers to the Jewish people collectively rather than merely
    his household, so 'our nation' best conveys the communal sense in idiomatic English.
- source_word: ὑπὸ τοῦ θεοῦ καταλελεῖφθαι
  chosen: has been abandoned by God
  alternatives:
  - has been left behind by God
  - has been forsaken by God
  lexicon: LSJ
  rationale: The perfect infinitive of καταλείπω here expresses a state of being left/abandoned.
    'Abandoned by God' is natural English and captures the theological force of divine
    non-desertion.
- source_word: σὺ δὲ καρτέρει
  chosen: As for you, keep waiting
  alternatives:
  - endure
  - hold out
  - persist
  lexicon: LSJ
  rationale: 'καρτερέω can mean to be steadfast, endure, or hold out; in imperative
    form addressed to the tyrant, it can carry the sense ''wait and see'' or ''hold
    on.'' Because it is followed by καὶ θεώρει, the phrase functions rhetorically
    as a taunt: ''just wait and see.'' ''Keep waiting'' preserves that force better
    than a bare ''endure.'''
- source_word: θεώρει
  chosen: see
  alternatives:
  - behold
  - observe
  - watch
  lexicon: LSJ
  rationale: θεωρέω means to look at, observe, behold. 'See' is concise and idiomatic
    when paired with the preceding imperative.
- source_word: τὸ μεγαλεῖον αὐτοῦ κράτος
  chosen: his majestic power
  alternatives:
  - his great might
  - his grandeur and power
  - the majesty of his strength
  lexicon: LSJ
  rationale: The phrase intensifies divine might. μεγαλεῖον carries a sense of greatness/majesty,
    and κράτος denotes strength or might. 'His majestic power' preserves both elements
    without sounding wooden.
- source_word: ὡς σὲ καὶ τὸ σπέρμα σου βασανιεῖ
  chosen: how it will torture you and your offspring
  alternatives:
  - how he will torment you and your descendants
  - that he will afflict you and your seed
  lexicon: LSJ
  rationale: βασανίζω commonly means to torture or torment, fitting the judicial-punitive
    context. τὸ σπέρμα σου is literally 'your seed,' but 'your offspring' is the natural
    English equivalent here. The subject of βασανιεῖ is most naturally the divine
    power just mentioned, hence 'it will torture' referring back to 'power.'
