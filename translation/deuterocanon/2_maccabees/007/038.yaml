theological_decisions:
- issue: Divine wrath and martyrdom as the point at which judgment ceases
  chosen_reading: The verse is rendered as a plea that the Almighty's just wrath against
    the nation would stop with the speaker and his brothers.
  alternative_readings:
  - The wrath would 'stand' in them, i.e., rest upon them
  - The phrase could be taken more loosely as 'be satisfied' by them
  rationale: The causative sense of στῆσαι with ὀργήν in context most naturally means
    to halt or terminate the wrath in/with their suffering. This preserves the text's
    theological tension without importing a later technical doctrine of atonement
    beyond what the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
