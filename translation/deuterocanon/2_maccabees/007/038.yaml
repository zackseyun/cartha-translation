translation:
  text: and in me and my brothers bring to an end the wrath of the Almighty that has
    justly been kindled against our whole nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stop ... with me and my brothers.' The Greek literally says 'in me and
      my brothers,' expressing that the wrath would come to its stopping-point in
      them.
    reason: lexical_alternative
lexical_decisions:
- source_word: στῆσαι
  chosen: bring to a stop
  alternatives:
  - stop
  - halt
  - cause to cease
  - make stand
  lexicon: LSJ
  rationale: Aorist infinitive of ἵστημι used causatively here. In context the speaker
    asks that God's wrath terminate with him and his brothers. 'Bring to a stop' preserves
    the causative force more clearly than a bare 'stop,' while avoiding an overly
    wooden 'make stand.'
- source_word: παντοκράτορος
  chosen: the Almighty
  alternatives:
  - the All-ruler
  - the Omnipotent One
  lexicon: LSJ
  rationale: A standard and natural English rendering for παντοκράτωρ that preserves
    the divine title's force without awkward literalism.
- source_word: ὀργήν
  chosen: wrath
  alternatives:
  - anger
  - indignation
  lexicon: LSJ
  rationale: '''Wrath'' better conveys the judicial and covenantal seriousness of
    divine ὀργή in this context than the milder ''anger.'''
- source_word: σύμπαν
  chosen: whole
  alternatives:
  - entire
  - all
  lexicon: LSJ
  rationale: Used attributively with ἡμῶν γένος to indicate totality. 'Whole nation'
    is idiomatic English.
- source_word: γένος
  chosen: nation
  alternatives:
  - race
  - people
  - family line
  lexicon: LSJ
  rationale: In this context of collective suffering under divine wrath, γένος refers
    to the Jewish people as a national/ethnic whole. 'Nation' is the clearest idiomatic
    rendering here.
- source_word: δικαίως
  chosen: justly
  alternatives:
  - rightly
  - deservedly
  lexicon: LSJ
  rationale: The adverb qualifies the kindling of wrath as morally warranted. 'Justly'
    preserves the judicial sense.
- source_word: ἐπημμένην
  chosen: has been kindled
  alternatives:
  - has been inflamed
  - has been aroused
  - has been set ablaze
  lexicon: LSJ
  rationale: Perfect participle describing wrath already ignited and still active.
    'Has been kindled' is natural English and fits the metaphor of wrath as burning.
- source_word: ἐν ἐμοὶ δὲ καὶ τοῖς ἀδελφοῖς μου
  chosen: in me and my brothers
  alternatives:
  - with me and my brothers
  - upon me and my brothers
  lexicon: LSJ
  rationale: The preposition ἐν is retained as 'in' because the sense is that the
    wrath should come to its stopping-point in them. More idiomatic alternatives are
    possible, but 'in me and my brothers' best reflects the Greek image.
