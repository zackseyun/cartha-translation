theological_decisions:
- issue: Moral/religious nuance of καθαρῶς in describing the martyr's death
  chosen_reading: The phrase indicates that he died in a state or manner of purity/integrity.
  alternative_readings:
  - He died simply 'nobly' or 'blamelessly' without explicit ritual/moral overtones.
  rationale: The immediate context is martyrdom under fidelity to God's law, so a
    morally charged rendering is preferable. 'In purity' preserves the theological
    resonance without overstating ritual categories.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
