theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The verse speaks of the mother's trust directed toward God. The project's
    default rendering for κύριος is 'Lord'; adding the English article yields idiomatic
    phrasing after the preposition without changing the referent.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Interpretation of the mother's endurance
  chosen_reading: because of her hopes in the Lord
  alternative_readings:
  - because of her hope in the Lord
  rationale: The Greek uses the plural ἐλπίδας. Retaining the plural preserves the
    text's wording and avoids reducing the expression to a generalized abstraction.
    Theologically, this leaves open the range of hopes grounded in God without specifying
    more than the text states.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
