translation:
  text: But the mother was especially admirable and worthy of honorable memory; though
    she saw her seven sons being destroyed in a single day, she bore it courageously
    because of her hopes in the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worthy of good remembrance.'
    reason: lexical_alternative
  - marker: b
    text: Or 'being killed'; the Greek says 'being destroyed/perishing,' a broader
      term used here in the context of their execution.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑπεραγόντως
  chosen: especially
  alternatives:
  - beyond measure
  - exceedingly
  - supremely
  lexicon: LSJ
  rationale: Adverb intensifies the commendation that follows. 'Especially' captures
    the comparative force in natural English without sounding inflated; 'exceedingly'
    is possible but less idiomatic here.
- source_word: ἀγαθὴ
  chosen: admirable
  alternatives:
  - good
  - noble
  lexicon: LSJ
  rationale: Although literally 'good,' in this commendatory context of moral excellence
    and courage, 'admirable' better conveys the evaluative sense in English. A second
    literal 'good' would sound flat and repetitive.
- source_word: μνήμης ἀγαθῆς ἀξία
  chosen: worthy of honorable memory
  alternatives:
  - worthy of good remembrance
  - worthy of blessed memory
  lexicon: LSJ
  rationale: The phrase means deserving favorable remembrance. 'Honorable memory'
    is clear modern English and preserves the memorial sense. 'Blessed memory' could
    suggest a later formulaic expression not required by the Greek.
- source_word: ἥτις
  chosen: though she
  alternatives:
  - who
  - she who
  lexicon: LSJ
  rationale: The relative pronoun introduces a clause highlighting the basis for the
    mother's commendation. Rendering it with concessive force in English ('though
    she') brings out the sense naturally in context.
- source_word: ἀπολλυμένους
  chosen: being destroyed
  alternatives:
  - perishing
  - being killed
  - being lost
  lexicon: LSJ
  rationale: Present participle depicts the sons in the process of violent ruin/death.
    'Being destroyed' stays close to the Greek's broad verb while fitting the martyrdom
    context. 'Being killed' is more explicit but slightly narrower than the source
    wording.
- source_word: συνορῶσα
  chosen: saw
  alternatives:
  - watching
  - looking on at
  lexicon: LSJ
  rationale: The participle indicates observing the whole scene. 'Saw' is concise
    and idiomatic; the fuller sense of witnessing the event is retained by the surrounding
    clause.
- source_word: μιᾷ τοῦ καιροῦ ἡμέρᾳ
  chosen: in a single day
  alternatives:
  - in one day at that time
  - within one day
  lexicon: LSJ
  rationale: The phrase emphasizes the concentration of the tragedy into one occasion/day.
    'In a single day' is natural English and preserves the force.
- source_word: εὐψύχως
  chosen: courageously
  alternatives:
  - with good courage
  - bravely
  - with a stout heart
  lexicon: LSJ
  rationale: The adverb denotes high spirit or courage under trial. 'Courageously'
    is clear, contemporary, and suitably dignified.
- source_word: ἔφερεν
  chosen: bore it
  alternatives:
  - endured
  - carried on
  lexicon: LSJ
  rationale: The verb here means to bear or endure the ordeal. 'Bore it' supplies
    the implied object in idiomatic English while remaining close to the Greek sense.
- source_word: διὰ τὰς ἐπὶ Κύριον ἐλπίδας
  chosen: because of her hopes in the Lord
  alternatives:
  - because of the hopes she had in the Lord
  - on account of her hopes toward the Lord
  lexicon: LSJ
  rationale: Plural ἐλπίδας is retained as 'hopes' rather than flattened to singular.
    ἐπὶ with accusative after ἐλπίς conveys hope directed toward or resting on the
    Lord. 'Lord' follows the project's default for κύριος.
- source_word: Κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: With the preposition and article implied in English idiom, 'the Lord'
    is the most natural rendering and aligns with project policy for κύριος.
