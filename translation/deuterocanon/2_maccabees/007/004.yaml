translation:
  text: Then, as soon as they had heated the pans, he ordered the one who had become
    their spokesman to have his tongue cut out, and, after scalping him, to mutilate
    him while the rest of his brothers and his mother looked on.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'of those having been heated red-hot'; the object is supplied
      from the previous verse, referring to the pans or cauldrons prepared for torture.
    reason: cross_reference
  - marker: b
    text: The Greek term rendered 'spokesman' can also mean 'leader' or 'the one who
      went before them.' Here it likely refers to the brother who had spoken on behalf
      of the others.
    reason: lexical_alternative
  - marker: c
    text: The participle rendered 'after scalping him' is rare and difficult; it may
      more generally mean stripping off skin around him or around his head.
    reason: lexical_alternative
  - marker: d
    text: Or more specifically, 'to cut off his extremities.' The Greek verb denotes
      severe mutilation, but the exact form is not fully specified in this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραχρῆμα
  chosen: as soon as
  alternatives:
  - immediately
  - at once
  lexicon: LSJ
  rationale: Conveys the temporal force naturally in English in connection with the
    participle phrase, indicating prompt action once the implements were heated.
- source_word: ἐκπυρωθέντων
  chosen: they had heated the pans
  alternatives:
  - they had made them red-hot
  - they had heated them thoroughly
  lexicon: LSJ
  rationale: The passive participle from ἐκπυρόω means 'to heat thoroughly' or 'make
    red-hot.' The object is implied from the previous verse's frying pans/cauldrons,
    so 'the pans' is supplied for intelligible English continuity without adding new
    content.
- source_word: προήγορον
  chosen: spokesman
  alternatives:
  - leader
  - the one who spoke first
  - forerunner
  lexicon: LSJ
  rationale: In this context of the brothers' exchange with the king, the term most
    plausibly denotes the one acting ahead of the others in speech, not a military
    or processional 'leader.' 'Spokesman' captures that discourse role clearly.
- source_word: γλωσσοτομεῖν
  chosen: to have his tongue cut out
  alternatives:
  - to cut out his tongue
  - to cut off his tongue
  lexicon: LSJ
  rationale: The verb specifically denotes cutting the tongue. English idiom with
    προσέταξεν favors 'ordered ... to have his tongue cut out,' preserving the brutality
    and causative sense.
- source_word: περικυλίσαντας
  chosen: after scalping him
  alternatives:
  - after flaying the skin around his head
  - after stripping off the scalp
  - after skinning him around
  lexicon: LSJ
  rationale: The participle is difficult but in this torture context is traditionally
    understood as removing the scalp/skin from around the head. 'After scalping him'
    is concise, vivid, and fits the sequence of mutilation. The lexical uncertainty
    is preserved in a footnote.
- source_word: ἀκρωτηριάζειν
  chosen: to mutilate him
  alternatives:
  - to cut off his extremities
  - to maim him
  lexicon: LSJ
  rationale: The verb denotes mutilation, often by cutting off extremities. 'Mutilate
    him' is the clearest main-text rendering; the more specific possibility is preserved
    in a footnote because the exact body parts are not named here.
- source_word: συνορώντων
  chosen: looked on
  alternatives:
  - were watching
  - were witnessing
  lexicon: LSJ
  rationale: This participle indicates visual witnessing by the remaining brothers
    and the mother. 'Looked on' is natural and retains the grim immediacy of the scene.
