theological_decisions:
- issue: Rendering σωτηρία in a martyrdom context
  chosen_reading: for his preservation
  alternative_readings:
  - for his safety
  - for his deliverance
  - for his salvation
  rationale: The verse concerns the king's attempt to save the youth's life through
    persuasion by his mother. The immediate sense is temporal rescue rather than explicit
    spiritual salvation, so a non-theological English rendering is preferred while
    preserving alternatives in documentation.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than import doctrinal claims the text does not make.'
