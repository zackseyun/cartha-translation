translation:
  text: But I, like my brothers, give up both body and life for the laws of our fathers,
    calling on God quickly to become merciful to the nation, and for you, through
    torments and whippings, to confess that he alone is God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'life' could be rendered 'fate' or 'lot'; the Greek term τύχην can denote
      one's lot or destiny, but here it refers concretely to the life being surrendered
      in martyrdom.
    reason: lexical_alternative
  - marker: b
    text: Or 'to acknowledge openly'; the verb translated 'to confess' can also mean
      public acknowledgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  chosen: like
  alternatives:
  - just as
  - even as
  lexicon: LSJ
  rationale: Introduces comparison with the brothers' example. 'Like' is natural modern
    English and preserves the comparative force without stiffness.
- source_word: σῶμα
  chosen: body
  alternatives:
  - my body
  lexicon: LSJ
  rationale: Literal reference to the physical body being surrendered in martyrdom.
    English supplies no article naturally here.
- source_word: τύχην
  chosen: life
  alternatives:
  - fate
  - lot
  - fortune
  lexicon: LSJ
  rationale: In this context of martyrdom, the sense is the life or destiny one gives
    up. 'Fate/fortune' would sound misleading in English, while 'life' captures the
    practical meaning of surrendering one's mortal lot.
- source_word: προδίδωμι
  chosen: give up
  alternatives:
  - hand over
  - surrender
  - betray
  lexicon: LSJ
  rationale: Here the speaker voluntarily yields body and life to death. 'Give up'
    communicates self-surrender clearly; 'betray' would be incorrect in context.
- source_word: περὶ τῶν πατρίων νόμων
  chosen: for the laws of our fathers
  alternatives:
  - for our ancestral laws
  - on behalf of the laws of our ancestors
  lexicon: LSJ
  rationale: περί with this context expresses acting for the sake of the ancestral
    laws. 'Our fathers' preserves the familial and traditional force of πατρίων in
    a gender-accurate way consistent with the source.
- source_word: ἐπικαλούμενοι τὸν θεόν
  chosen: calling on God
  alternatives:
  - appealing to God
  - invoking God
  lexicon: LSJ
  rationale: The participle describes prayerful appeal accompanying the martyrdom.
    'Calling on God' is idiomatic and faithful.
- source_word: ἵλεων ... γενέσθαι
  chosen: to become merciful
  alternatives:
  - to be gracious
  - to become favorable
  lexicon: LSJ
  rationale: ἵλεως carries the sense of being favorably disposed or merciful. 'Merciful'
    is accessible and fits the prayer for national restoration.
- source_word: τῷ ἔθνει
  chosen: to the nation
  alternatives:
  - to the people
  lexicon: LSJ
  rationale: Refers to the Jewish nation as a collective people. 'Nation' best matches
    ἔθνος here without importing modern political categories too strongly.
- source_word: μετὰ ἐτασμῶν καὶ μαστίγων
  chosen: through torments and whippings
  alternatives:
  - with tortures and scourges
  - by means of torments and lashes
  lexicon: LSJ
  rationale: The phrase indicates the means by which the king will be brought to acknowledgment.
    'Torments and whippings' is vivid, readable English anchored in the Greek.
- source_word: ἐξομολογήσασθαι
  chosen: to confess
  alternatives:
  - to acknowledge
  - to admit openly
  lexicon: LSJ
  rationale: The verb can mean confess or acknowledge openly. 'Confess' preserves
    the solemn force of compelled recognition, while the object clause clarifies what
    is confessed.
- source_word: διότι μόνος αὐτὸς θεὸς ἐστίν
  chosen: that he alone is God
  alternatives:
  - that God alone is God
  - that he is the only God
  lexicon: LSJ
  rationale: The pronoun αὐτός points back to God already mentioned. 'He alone is
    God' preserves the emphatic monotheistic claim in natural English.
