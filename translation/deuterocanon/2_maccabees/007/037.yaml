theological_decisions:
- issue: Monotheistic confession in the final clause
  chosen_reading: that he alone is God
  alternative_readings:
  - that he is the only God
  rationale: The Greek emphasizes exclusivity with μόνος αὐτός. The chosen rendering
    preserves the personal reference to the previously mentioned God and the force
    of exclusive deity without overexpansion.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering πατρίων as familial rather than abstractly cultural
  chosen_reading: the laws of our fathers
  alternative_readings:
  - our ancestral laws
  rationale: The Greek literally evokes the fathers/ancestors. Retaining 'our fathers'
    preserves the source's covenantal and familial texture, in line with the project's
    gender-accurate principle.
  doctrine_reference: Gender-accurate over gender-neutral.
