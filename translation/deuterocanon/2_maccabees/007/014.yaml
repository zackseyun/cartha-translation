theological_decisions:
- issue: Resurrection hope for the martyr versus denial of life-giving resurrection
    for the persecutor
  chosen_reading: The verse affirms that God will raise the martyr again, while declaring
    that the addressee will have no resurrection to life.
  alternative_readings:
  - The addressee will have no resurrection at all
  - The addressee will not share in the resurrection that leads to life
  rationale: The phrase εἰς ζωὴν qualifies ἀνάστασις and should be preserved rather
    than flattened. This leaves open that the denial may be specifically of a blessed
    resurrection, not necessarily of any resurrection whatsoever.
  doctrine_reference: Preserve theological tension rather than resolve it.
