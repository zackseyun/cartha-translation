translation:
  text: 'And when he was about to die, he said this: “It is preferable, when dying
    at the hands of men, to await the hopes given by God—that one will be raised again
    by him. But for you there will be no resurrection to life.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'It is better, when being put to death by men, to hope for resurrection
      again from God.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'no resurrection to life' may imply exclusion from a blessed
      resurrection, rather than explicitly denying every kind of resurrection.
    reason: alternative_reading
lexical_decisions:
- source_word: γενόμενος πρὸς τῷ τελευτᾷν
  chosen: when he was about to die
  alternatives:
  - as he came to his end
  - when he was at the point of death
  lexicon: LSJ
  rationale: The idiom with πρὸς τῷ + infinitive indicates imminence. 'About to die'
    is natural modern English and preserves the temporal force without sounding wooden.
- source_word: οὕτως ἔφη
  chosen: he said this
  alternatives:
  - he spoke thus
  - he said
  lexicon: LSJ
  rationale: A simple speech introduction. 'He said this' keeps the deictic force
    of οὕτως while remaining readable.
- source_word: Αἱρετὸν
  chosen: It is preferable
  alternatives:
  - It is choice-worthy
  - It is better
  lexicon: LSJ
  rationale: The adjective means 'to be chosen, preferable.' 'It is preferable' preserves
    the evaluative sense in idiomatic English. 'Better' is possible but slightly flatter.
- source_word: μεταλλάσσοντας ἀπὸ ἀνθρώπων
  chosen: when dying at the hands of men
  alternatives:
  - when departing from life by men
  - when being put to death by men
  lexicon: LSJ
  rationale: μεταλλάσσω here refers to departing this life, and ἀπὸ ἀνθρώπων marks
    human agency/source in the martyrdom context. 'Dying at the hands of men' is idiomatic
    and faithful to the sense.
- source_word: τὰς ὑπὸ τοῦ θεοῦ προσδοκᾷν ἐλπίδας
  chosen: to await the hopes given by God
  alternatives:
  - to expect the hopes from God
  - to look for the hopes promised by God
  lexicon: LSJ
  rationale: The construction joins προσδοκᾷν with ἐλπίδας qualified by ὑπὸ τοῦ θεοῦ.
    'Given by God' captures the source relation naturally. 'Promised by God' is interpretive
    and not explicit in the Greek.
- source_word: πάλιν ἀναστήσεσθαι ὑπʼ αὐτοῦ
  chosen: that one will be raised again by him
  alternatives:
  - to rise again by him
  - to be resurrected again by him
  lexicon: LSJ
  rationale: The passive/future infinitival sense points to being raised by God. 'Raised
    again by him' preserves divine agency and the resurrection hope. 'Resurrected'
    is possible but less natural in running English.
- source_word: ἀνάστασις εἰς ζωὴν
  chosen: resurrection to life
  alternatives:
  - resurrection unto life
  - rising to life
  lexicon: LSJ
  rationale: A compact phrase best rendered formally here because of its theological
    weight. 'To life' is clear modern English and preserves the contrast with the
    tyrant's fate.
