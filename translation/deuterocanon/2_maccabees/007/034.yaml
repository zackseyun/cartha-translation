theological_decisions:
- issue: Meaning of οὐρανίους in the phrase οὐρανίους παῖδας
  chosen_reading: the children of heaven
  alternative_readings:
  - the heavenly children
  - the sons of the heavenly God
  rationale: The adjective could be taken as 'heavenly' or as denoting belonging to
    heaven. The chosen rendering preserves the theological claim that these sufferers
    belong to heaven/God without importing an explicit divine title absent from the
    Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
