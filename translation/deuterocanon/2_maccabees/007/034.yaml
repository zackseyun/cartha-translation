translation:
  text: But you, O unholy one, most defiled of all men, do not be vainly puffed up,
    inflamed with uncertain hopes, when you have raised your hands against the children
    of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heavenly children.' The Greek can be read either as describing the
      children themselves as 'heavenly' or as 'children of heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνόσιε
  chosen: unholy one
  alternatives:
  - godless one
  - profane one
  - impious one
  lexicon: LSJ
  rationale: The vocative singular is a direct denunciation of impiety. 'Unholy one'
    is forceful and readable in modern English while preserving the religious dimension
    better than the more abstract 'profane one.'
- source_word: μιαρώτατε
  chosen: most defiled
  alternatives:
  - most polluted
  - most vile
  - most abominable
  lexicon: LSJ
  rationale: As a superlative from μιαρός, the term carries the sense of ritual/moral
    filth or pollution. 'Most defiled' preserves that impurity language more closely
    than the more generalized 'most vile.'
- source_word: μὴ μάτην μετεωρίζου
  chosen: do not be vainly puffed up
  alternatives:
  - do not be lifted up in vain
  - do not be arrogantly elated for nothing
  - do not be carried away to no purpose
  lexicon: LSJ
  rationale: μετεωρίζου can denote being raised up, exalted, or unsettled; in this
    rebuke context it points to arrogant self-exaltation. 'Vainly puffed up' captures
    both the elevated imagery and the futility marked by μάτην.
- source_word: φρυττόμενος
  chosen: inflamed
  alternatives:
  - excited
  - kindled
  - burning
  lexicon: LSJ
  rationale: The participle evokes being heated or kindled. 'Inflamed' works idiomatically
    with 'uncertain hopes' and preserves the metaphorical heat of emotional agitation.
- source_word: ἀδήλοις ἐλπίσιν
  chosen: with uncertain hopes
  alternatives:
  - with unclear hopes
  - with delusive hopes
  - with doubtful expectations
  lexicon: LSJ
  rationale: ἀδήλοις means not evident, uncertain, obscure. 'Uncertain hopes' is a
    natural English rendering that preserves the instability and unreliability of
    the tyrant's expectations without overinterpreting them as necessarily deceptive.
- source_word: οὐρανίους παῖδας
  chosen: the children of heaven
  alternatives:
  - the heavenly children
  - the sons of heaven
  lexicon: LSJ
  rationale: παῖδας can mean children or sons; 'children' is broader and fits the
    likely sense of those belonging to heaven/God. Retaining 'of heaven' rather than
    flattening to 'godly youths' preserves the elevated, theological phrasing of the
    Greek.
- source_word: ἐπαράμενος χεῖρας
  chosen: when you have raised your hands against
  alternatives:
  - by lifting your hands against
  - having stretched out your hands against
  lexicon: LSJ
  rationale: The aorist participle with ἐπί + accusative indicates hostile action
    directed against someone. 'Raised your hands against' is idiomatic English for
    violent opposition and keeps the bodily imagery.
