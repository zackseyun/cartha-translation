translation:
  text: After him, the third was mocked, and when his tongue was demanded, he quickly
    held it out and courageously stretched out his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when they demanded his tongue.' The Greek uses a passive participle
      ('having been asked/demanded'), which may be rendered more explicitly in English
      with an implied agent from the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τοῦτον
  chosen: After him
  alternatives:
  - After this one
  - Next after him
  lexicon: LSJ
  rationale: Temporal/sequential phrase referring to the next brother in order; 'After
    him' is natural English and preserves the personal reference.
- source_word: ὁ τρίτος
  chosen: the third
  alternatives:
  - the third brother
  lexicon: LSJ
  rationale: Ordinal used substantivally. 'The third' is sufficient in context, with
    'brother' implied from the narrative.
- source_word: ἐνεπαίζετο
  chosen: was mocked
  alternatives:
  - was made sport of
  - was abused
  - was tortured with mockery
  lexicon: LSJ
  rationale: The verb denotes being mocked or ridiculed. 'Was mocked' preserves the
    humiliation aspect without over-expanding beyond the Greek. The broader torture
    context is already supplied by the narrative, so it need not be imported into
    this verb.
- source_word: τὴν γλῶσσαν
  chosen: his tongue
  alternatives:
  - the tongue
  lexicon: LSJ
  rationale: Although the Greek has the article, English idiom prefers the possessive
    because the tongue is clearly his own body part in context.
- source_word: αἰτηθεὶς
  chosen: when his tongue was demanded
  alternatives:
  - when he was asked for his tongue
  - when they demanded his tongue
  lexicon: LSJ
  rationale: Aorist passive participle from 'ask/demand.' The sense in context is
    coercive demand by the torturers. The passive participle is best represented by
    a temporal clause in English.
- source_word: ταχέως
  chosen: quickly
  alternatives:
  - at once
  - swiftly
  lexicon: LSJ
  rationale: Simple adverb of speed; 'quickly' is clear modern English.
- source_word: προέβαλλεν
  chosen: held it out
  alternatives:
  - stuck it out
  - thrust it out
  - put it forward
  lexicon: LSJ
  rationale: The verb means to project or put forward. With 'tongue' as object, 'held
    it out' is idiomatic and dignified; 'stuck it out' is too colloquial, while 'thrust
    it out' may overstate force.
- source_word: τὰς χεῖρας
  chosen: his hands
  alternatives:
  - the hands
  lexicon: LSJ
  rationale: As with 'tongue,' English idiom naturally uses the possessive for body
    parts in this context.
- source_word: εὐθαρσῶς
  chosen: courageously
  alternatives:
  - boldly
  - with good courage
  lexicon: LSJ
  rationale: The adverb conveys boldness and confidence. 'Courageously' fits the martyrdom
    context and reads naturally in modern English.
- source_word: προέτεινεν
  chosen: stretched out
  alternatives:
  - extended
  - held out
  lexicon: LSJ
  rationale: The verb means to extend forward. 'Stretched out' is vivid and idiomatic
    for hands offered for mutilation.
