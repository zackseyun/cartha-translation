  text: Μετὰ δὲ τοῦτον ὁ τρίτος ἐνεπαίζετο, καὶ τὴν γλῶσσαν αἰτηθεὶς ταχέως προέβαλλεν
    καὶ τὰς χεῖρας εὐθαρσῶς προέτεινεν·
