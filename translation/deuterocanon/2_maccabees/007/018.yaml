theological_decisions:
- issue: Cause of the brothers' suffering
  chosen_reading: The speaker attributes their suffering to their own sin against
    God.
  alternative_readings:
  - The statement could be read more generally as suffering 'on our own account' without
    explicit emphasis on culpability beyond the participle.
  rationale: The Greek explicitly links πάσχομεν with ἁμαρτόντες, so the translation
    should preserve the theological claim of divine judgment rather than soften it
    into mere circumstance.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
