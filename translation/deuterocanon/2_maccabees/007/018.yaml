translation:
  text: After him they brought the sixth, and as he was about to die he said, “Do
    not be deceived; for we are suffering these things because of ourselves, having
    sinned against our own God. Astonishing things have happened.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Do not go further astray,” or “Do not be deluded.” The Greek expression
      is compressed, and πλανῶ may carry the sense of being misled or mistaken.
    reason: lexical_alternative
  - marker: b
    text: Literally, “things worthy of astonishment have happened.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τοῦτον ἤγον τὸν ἕκτον
  chosen: After him they brought the sixth
  alternatives:
  - After this one they led in the sixth
  - After him they were bringing the sixth brother
  lexicon: LSJ
  rationale: Μετὰ τοῦτον marks sequence ('after him/after this one'). ἤγον is imperfect,
    but in narrative English a simple past is natural. τὸν ἕκτον refers to the sixth
    brother; 'the sixth' is sufficiently clear in context without adding words not
    explicit in the Greek.
- source_word: μέλλον ἀποθνήσκειν
  chosen: as he was about to die
  alternatives:
  - when he was about to die
  - being on the point of dying
  lexicon: BDAG
  rationale: μέλλω with infinitive expresses imminence. 'As he was about to die' preserves
    the temporal sense in readable English.
- source_word: ἔφη
  chosen: he said
  alternatives:
  - he was saying
  - he declared
  lexicon: LSJ
  rationale: Standard narrative speech introducer; simple past fits English style.
- source_word: Μὴ πλανῶ μάλλον
  chosen: Do not be greatly mistaken
  alternatives:
  - Do not be more deceived
  - Do not go further astray
  - Do not be deluded
  lexicon: LSJ
  rationale: πλανάω can mean to mislead, deceive, or cause to wander. Here the imperative
    addresses the persecutor's false assessment. μάλλον intensifies or adds 'rather/further';
    'greatly' captures the force without awkward literalism. Because the Greek is
    somewhat compressed, alternatives remain viable.
- source_word: ἡμεῖς γὰρ διʼ ἑαυτοὺς ταῦτα πάσχομεν
  chosen: for we are suffering these things because of ourselves
  alternatives:
  - for we suffer these things on account of ourselves
  - for we are undergoing these things for our own sake
  lexicon: BDAG
  rationale: διʼ ἑαυτούς here indicates cause grounded in themselves, not benefit.
    'Because of ourselves' best conveys that their suffering is due to their own culpability.
- source_word: ἁμαρτόντες εἰς τὸν ἑαυτῶν θεόν
  chosen: having sinned against our own God
  alternatives:
  - because we sinned against our God
  - having sinned with respect to our own God
  lexicon: BDAG
  rationale: The participle gives the reason for their suffering. Although εἰς after
    ἁμαρτάνω is less common than a dative or εἰς with object in some Greek usage,
    the sense is clearly offense directed toward God. 'Against our own God' is idiomatic
    and preserves ἑαυτῶν.
- source_word: ἄξια θαυμασμοῦ γέγονε
  chosen: Therefore astonishing things have happened
  alternatives:
  - things worthy of astonishment have occurred
  - marvelous things have come to pass
  lexicon: LSJ
  rationale: The phrase literally means 'things worthy of astonishment have happened.'
    In context it refers to extraordinary judgments/events resulting from their sin.
    'Astonishing things have happened' is natural English while preserving the evaluative
    force. 'Therefore' makes explicit the inferential connection implied by the preceding
    clause.
