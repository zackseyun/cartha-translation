translation:
  text: that the Jews should make use of their own resources and laws as before, and
    that none of them should in any way be harassed concerning the things done in
    ignorance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their own expenses' or 'their own resources' for 'their own provisions'
      (τοῖς ἑαυτῶν δαπανήμασιν); the Greek term can refer to expenditures or material
      means of support.
    reason: lexical_alternative
lexical_decisions:
- source_word: χρῆσθαι
  chosen: should make use of
  alternatives:
  - should use
  - should enjoy the use of
  lexicon: LSJ
  rationale: The infinitive depends on an implied decree content and means 'to use'
    or 'make use of.' 'Make use of' is slightly more natural in English while preserving
    the formal sense.
- source_word: τοῖς ἑαυτῶν δαπανήμασιν
  chosen: their own provisions
  alternatives:
  - their own expenses
  - their own resources
  lexicon: LSJ
  rationale: δαπάνη can denote expenditure, cost, or that which is spent for maintenance.
    In this context, paired with 'laws' and describing permitted Jewish self-ordering,
    'provisions' best captures practical material arrangements without the awkwardness
    of 'expenses.' Because the phrase is somewhat unusual, alternatives are preserved.
- source_word: νόμοις
  chosen: laws
  alternatives:
  - customs
  lexicon: LSJ
  rationale: νόμος ordinarily means 'law.' Although in some contexts it can shade
    toward customary practice, 'laws' is the more direct and auditable rendering here.
- source_word: καθὰ καὶ τὸ πρότερον
  chosen: as before
  alternatives:
  - just as formerly
  - as previously
  lexicon: LSJ
  rationale: This idiom refers to prior practice. 'As before' is concise, natural,
    and faithful.
- source_word: παρενοχληθήσεται
  chosen: should ... be harassed
  alternatives:
  - should ... be troubled
  - should ... be molested
  lexicon: LSJ
  rationale: The future passive conveys being subjected to annoyance or interference.
    'Be harassed' communicates official or social interference clearly in modern English
    without becoming too colloquial.
- source_word: περὶ τῶν ἠγνοημένων
  chosen: concerning the things done in ignorance
  alternatives:
  - for the things done in ignorance
  - about the acts committed unknowingly
  lexicon: LSJ
  rationale: The perfect/passive-participial form from ἀγνοέω points to matters done
    unknowingly or in ignorance. 'Concerning the things done in ignorance' preserves
    both the preposition περὶ and the impersonal breadth of the Greek.
