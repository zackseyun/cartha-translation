translation:
  text: Therefore, for those going down until the thirtieth of Xanthicus, there will
    be a right hand given with safe-conduct,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'there will be a right hand with permission.' The expression
      likely refers to a pledge or guarantee of safe passage.
    reason: lexical_alternative
  - marker: b
    text: Xanthicus is a Macedonian month name used in Hellenistic dating.
    reason: cultural_note
  - marker: c
    text: The Greek wording of this verse is terse and appears to be part of a larger
      sentence; the exact force of 'going down' may be 'departing' or 'setting out.'
    reason: alternative_reading
lexical_decisions:
- source_word: καταπορευομένοις
  chosen: going down
  alternatives:
  - departing
  - traveling onward
  - going away
  lexicon: LSJ
  rationale: The participle literally denotes movement downward or away. In context
    it likely refers to those setting out or returning, but the Greek image is directional.
    'Going down' preserves the wording while remaining intelligible.
- source_word: μέχρι τριακάδος Ξανθικοῦ
  chosen: until the thirtieth of Xanthicus
  alternatives:
  - up to the thirtieth day of Xanthicus
  lexicon: LSJ
  rationale: The phrase gives a time limit. 'Xanthicus' is transliterated as a month
    name rather than replaced with a modern equivalent, preserving the historical
    setting.
- source_word: ὑπάρξει
  chosen: there will be
  alternatives:
  - it will be
  - there shall be
  lexicon: LSJ
  rationale: A straightforward future existential verb. 'There will be' is natural
    modern English.
- source_word: δεξιὰ
  chosen: a right hand given
  alternatives:
  - a right hand
  - a pledge
  - an agreement
  lexicon: LSJ
  rationale: Literally 'right hand,' but in diplomatic contexts it can signify a pledge
    of friendship or covenant. Because the phrase is elliptical here, the translation
    keeps the literal expression while signaling its granted nature in English.
- source_word: μετὰ τῆς ἀδείας
  chosen: with safe-conduct
  alternatives:
  - with permission
  - with leave
  - with security
  lexicon: LSJ
  rationale: ἀδεία commonly means permission, liberty, or immunity. In this military-diplomatic
    context, 'safe-conduct' best captures permission to travel without interference.
