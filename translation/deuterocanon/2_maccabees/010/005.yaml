translation:
  text: But when he entered Judea and came near Bethsura, a fortified place about
    five schoeni from Jerusalem, he was pressing it hard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A schoenus was an ancient unit of distance; the exact modern equivalent
      varied, so the Greek measure is retained rather than converted with false precision.
    reason: cultural_note
  - marker: b
    text: Or, 'he was besieging it.' The Greek says literally 'he was pressing it,'
      which can describe military pressure on a fortified place.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθὼν ... εἰς τὴν Ἰουδαίαν
  chosen: when he entered Judea
  alternatives:
  - after he entered Judea
  - having entered Judea
  lexicon: LSJ
  rationale: The aorist participle is best rendered temporally in smooth English narrative.
    'Judea' preserves the geographic name directly.
- source_word: συνεγγίσας Βεθσουρῶν
  chosen: came near Bethsura
  alternatives:
  - approached Bethsura
  - drew near to Bethsura
  lexicon: LSJ
  rationale: συνεγγίζω denotes coming near or approaching. 'Bethsura' is a standard
    transliteration of Βεθσουρά/Βεθσουρῶν in this form.
- source_word: ὄντι μὲν ἐρυμνῷ χωρίῳ
  chosen: a fortified place
  alternatives:
  - a strong place
  - a stronghold
  - a defensible site
  lexicon: LSJ
  rationale: ἐρυμνός conveys strength/fortification/defensibility, and χωρίον here
    refers to a place or site rather than merely a field. 'Fortified place' is clear
    modern English and stays close to the Greek description.
- source_word: Ἱεροσολύμων δὲ ἀπέχοντι ὡσεὶ σχοίνους πέντε
  chosen: about five schoeni from Jerusalem
  alternatives:
  - about five schoenoi from Jerusalem
  - about thirty miles from Jerusalem
  lexicon: LSJ
  rationale: σχοῖνος is an ancient distance measure whose exact modern equivalent
    varies by context. To avoid false precision, the transliterated unit is retained
    in the main text with a footnote explaining approximate sense.
- source_word: τοῦτο ἔθλιβε
  chosen: he was pressing it hard
  alternatives:
  - he was besieging it
  - he was hard-pressing it
  - he was afflicting it
  lexicon: LSJ
  rationale: θλίβω literally means press, squeeze, oppress. In this military context,
    'pressing it hard' preserves the imagery without over-specifying a formal siege
    if the Greek itself does not use a technical siege term.
