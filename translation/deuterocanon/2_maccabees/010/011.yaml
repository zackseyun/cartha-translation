translation:
  text: But springing at the enemies like lions, they laid low eleven thousand of
    them, and one thousand six hundred cavalry; and they forced them all to flee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'a thousand in addition to ten thousand ... six hundred
      in addition to a thousand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λεόντινων
  chosen: like lions
  alternatives:
  - lion-like
  - as lions
  lexicon: LSJ
  rationale: The rare adverbial/comparative form evokes leonine ferocity. In idiomatic
    English, 'like lions' best conveys the simile without awkwardness.
- source_word: ἐντινάξαντες
  chosen: springing at
  alternatives:
  - rushing upon
  - leaping upon
  - hurling themselves at
  lexicon: LSJ
  rationale: The participle suggests a sudden violent movement against the enemy.
    'Springing at' fits the lion simile and preserves the vivid attack imagery.
- source_word: κατέστρωσαν
  chosen: laid low
  alternatives:
  - struck down
  - cut down
  - overthrew
  lexicon: LSJ
  rationale: In this battle context the verb denotes felling or killing enemies. 'Laid
    low' is natural English and leaves room for the following numerical tally without
    sounding overly wooden.
- source_word: χιλίους πρὸς τοῖς μυρίοις
  chosen: eleven thousand
  alternatives:
  - a thousand in addition to ten thousand
  - ten thousand plus a thousand
  lexicon: LSJ
  rationale: The Greek idiom literally means 'a thousand in addition to ten thousand.'
    Rendering the summed total is clear and faithful in English.
- source_word: ἱππεῖς
  chosen: cavalry
  alternatives:
  - horsemen
  - mounted troops
  lexicon: LSJ
  rationale: The term refers to mounted soldiers as a military arm. 'Cavalry' is concise
    and idiomatic in English military narrative.
- source_word: ἑξακοσίους πρὸς χιλίοις
  chosen: sixteen hundred
  alternatives:
  - six hundred in addition to a thousand
  - one thousand six hundred
  lexicon: LSJ
  rationale: As with the previous number phrase, the Greek expresses an additive total.
    'Sixteen hundred' is a straightforward English rendering.
- source_word: ἠνάγκασαν φεύγειν
  chosen: forced them all to flee
  alternatives:
  - compelled them all to flee
  - drove them all into flight
  lexicon: LSJ
  rationale: The construction indicates causing the enemy to take flight. 'Forced
    them all to flee' is direct, readable, and preserves the causative force.
