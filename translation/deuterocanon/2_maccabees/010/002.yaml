translation:
  text: After gathering about eighty thousand men and all the cavalry, he came against
    the Jews, thinking to make the city a dwelling place for Greeks,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'about eight myriads'; that is, about eighty thousand.
    reason: lexical_alternative
  - marker: b
    text: The sentence continues into the next verse, where the contrasting plan introduced
      by 'the city' is completed.
    reason: cross_reference
lexical_decisions:
- source_word: συναθροίσας
  chosen: After gathering
  alternatives:
  - having assembled
  - after mustering
  lexicon: LSJ
  rationale: Aorist participle indicating prior action before the main verb. 'After
    gathering' is natural English and preserves the sequence without overformal stiffness.
- source_word: περὶ τὰς ὀκτὼ μυριάδας
  chosen: about eighty thousand men
  alternatives:
  - around eighty thousand
  - about eight myriads
  lexicon: LSJ
  rationale: μυριάς denotes a group of ten thousand; eight myriads = eighty thousand.
    περὶ with numerals conveys approximation, so 'about' is appropriate. 'Men' is
    supplied in English because the count refers to troops in military context.
- source_word: τὴν ἵππον ἅπασαν
  chosen: all the cavalry
  alternatives:
  - the whole cavalry force
  - all the horsemen
  lexicon: LSJ
  rationale: ἵππος can mean horses or cavalry depending on context; in military narrative
    'cavalry' best captures the collective force. ἅπασαν intensifies totality, hence
    'all the cavalry'.
- source_word: παρεγένετο ἐπὶ τοὺς Ἰουδαίους
  chosen: he came against the Jews
  alternatives:
  - he advanced on the Jews
  - he arrived against the Jews
  lexicon: LSJ
  rationale: παραγίνομαι with ἐπί plus accusative in military context conveys movement
    against an opponent, not mere arrival. 'Came against' is idiomatic and suitably
    forceful.
- source_word: λογιζόμενος
  chosen: thinking
  alternatives:
  - planning
  - supposing
  lexicon: LSJ
  rationale: The participle expresses his intention/calculation. 'Thinking' preserves
    the mental aspect without overstating it as a fixed decree.
- source_word: τὴν μὲν πόλιν
  chosen: the city
  alternatives:
  - that city
  lexicon: LSJ
  rationale: Definite reference to Jerusalem in context. English does not need to
    reproduce μέν explicitly here because the balancing δέ clause continues in the
    next verse.
- source_word: Ἕλλησιν
  chosen: for Greeks
  alternatives:
  - for the Greeks
  - for Hellenes
  lexicon: LSJ
  rationale: Dative of advantage/purpose with ποιήσειν. 'Greeks' is the clearest English
    rendering; 'Hellenes' would be less accessible.
- source_word: οἰκητήριον ποιήσειν
  chosen: to make a dwelling place
  alternatives:
  - to turn into a habitation
  - to make into a residence
  lexicon: LSJ
  rationale: The infinitive phrase expresses intended transformation of the city into
    a place for Greek habitation. 'Dwelling place' is clear and close to the Greek.
