translation:
  text: Therefore hurry, and send some men, so that we too may learn what your intention
    is.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'what sort you are of mind/opinion.' The Greek idiom refers to
      their disposition, resolve, or intention.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: LSJ
  rationale: Inferential conjunction linking this request to the preceding situation;
    'Therefore' preserves the formal connection clearly in natural English.
- source_word: σπεύσατε
  chosen: hurry
  alternatives:
  - make haste
  - be quick
  lexicon: LSJ
  rationale: Aorist imperative calling for prompt action. 'Hurry' is idiomatic modern
    English and retains the urgency without archaism.
- source_word: πέμψατέ τινας
  chosen: send some men
  alternatives:
  - send some people
  - dispatch certain ones
  lexicon: LSJ
  rationale: τινας is an indefinite plural, literally 'some [persons].' In this military-political
    context, 'some men' best fits the likely referent of messengers or representatives,
    while remaining concise and natural.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: LSJ
  rationale: Introduces purpose. 'So that' is the clearest modern equivalent.
- source_word: καὶ ἡμεῖς
  chosen: we too
  alternatives:
  - we also
  lexicon: LSJ
  rationale: καί with the pronoun adds inclusion/emphasis. 'We too' preserves that
    nuance smoothly.
- source_word: ἐπιγνῶμεν
  chosen: may learn
  alternatives:
  - may know fully
  - may ascertain
  lexicon: LSJ
  rationale: Aorist subjunctive of ἐπιγινώσκω can suggest coming to know or learning/ascertaining.
    'May learn' fits the context of receiving information from envoys and avoids overtranslating
    the compound verb.
- source_word: ὁποῖοί ἐστε γνώμης
  chosen: what your intention is
  alternatives:
  - what sort of opinion you are of
  - what your mind is
  - what your purpose is
  lexicon: LSJ
  rationale: The idiom asks what disposition, resolve, or intention they hold. A highly
    literal rendering would be awkward in English; 'what your intention is' captures
    the practical sense in context.
