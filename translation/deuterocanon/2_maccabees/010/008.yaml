theological_decisions:
- issue: Nature of the apparition
  chosen_reading: Render the figure descriptively without identifying him beyond the
    Greek wording.
  alternative_readings:
  - an angelic horseman
  - a heavenly rider
  rationale: The verse reports an appearance of a mounted figure in white with golden
    armor but does not explicitly name the being. The translation preserves the narrative's
    supernatural suggestiveness without importing a more specific theological identification.
  doctrine_reference: Preserve theological tension rather than resolve it.
