translation:
  text: And while they were there near Jerusalem, a horseman appeared, going before
    them, clothed in white and brandishing golden armor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'preceding them' for 'going before them.' The Greek participle can denote
      simply being ahead of them, though in context it may also imply guidance.
    reason: lexical_alternative
  - marker: b
    text: The text does not explicitly identify the horseman; the description may
      suggest a heavenly or angelic figure, but the Greek leaves this unstated.
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτόθι
  chosen: while they were there
  alternatives:
  - there
  - in that place
  lexicon: LSJ
  rationale: The adverb marks location/situation already established in context. Rendering
    it with the temporal-locative phrase 'while they were there' fits the participial
    construction that follows and reads naturally in English without losing the sense
    of presence at that place.
- source_word: πρὸς τοῖς Ἱεροσολύμοις
  chosen: near Jerusalem
  alternatives:
  - at Jerusalem
  - by Jerusalem
  lexicon: LSJ
  rationale: With the dative plural place-name, πρός here is best taken in a local
    sense of proximity rather than direct motion. 'Near Jerusalem' preserves the spatial
    nuance more clearly than the less idiomatic 'by Jerusalem.'
- source_word: ὄντων
  chosen: while they were
  alternatives:
  - being
  - when they were
  lexicon: BDAG
  rationale: The genitive absolute-like construction is rendered idiomatically in
    English as a temporal clause. 'While they were' keeps the participial backgrounding
    function.
- source_word: ἐφάνη
  chosen: appeared
  alternatives:
  - was seen
  - became visible
  lexicon: BDAG
  rationale: The passive/deponent form here introduces a visionary or sudden manifestation.
    'Appeared' is concise and natural, preserving the sense of an unexpected visible
    presence.
- source_word: προηγούμενος αὐτῶν
  chosen: going before them
  alternatives:
  - leading them
  - preceding them
  lexicon: LSJ
  rationale: The participle indicates movement in front of the group. 'Going before
    them' is slightly more formal than 'leading them' and avoids overstating explicit
    command while still conveying guidance.
- source_word: ἔφιππος
  chosen: a horseman
  alternatives:
  - mounted
  - on horseback
  lexicon: LSJ
  rationale: Although literally adjectival ('mounted'), English requires a smoother
    nominal expression with the implied figure. 'A horseman' captures the visible
    apparition succinctly.
- source_word: ἐν λευκῇ ἐσθῆτι
  chosen: clothed in white
  alternatives:
  - in a white garment
  - wearing white clothing
  lexicon: BDAG
  rationale: The phrase describes attire. 'Clothed in white' is natural English and
    preserves the visual emphasis without over-specifying the type of garment.
- source_word: πανοπλίαν χρυσῆν
  chosen: golden armor
  alternatives:
  - a golden panoply
  - full armor of gold
  lexicon: LSJ
  rationale: πανοπλία denotes full armor/equipment. 'Golden armor' is the clearest
    idiomatic rendering in modern English. The article is absent in Greek, so English
    need not force one beyond normal syntax.
- source_word: κραδαίνων
  chosen: brandishing
  alternatives:
  - wielding
  - shaking
  lexicon: BDAG
  rationale: The participle conveys active, vivid motion. 'Brandishing' best matches
    the dramatic martial imagery of waving or flourishing the armor.
