translation:
  text: 'And the king’s letter contained this: “King Antiochus to his brother Lysias,
    greetings.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'And the king’s letter contained thus.' English commonly
      smooths this epistolary introduction as 'contained this' or 'was as follows.'
    reason: lexical_alternative
  - marker: b
    text: '''Brother'' may reflect either a literal familial relationship or a conventional
      royal/courtly form of address; the Greek itself does not specify beyond ''brother.'''
    reason: cultural_note
lexical_decisions:
- source_word: Ἡ ... ἐπιστολή
  chosen: the ... letter
  alternatives:
  - the epistle
  - the written message
  lexicon: LSJ
  rationale: ἐπιστολή commonly denotes a letter or written communication. 'Letter'
    is the natural modern English equivalent and fits the formal royal correspondence
    context.
- source_word: περιεῖχεν
  chosen: contained
  alternatives:
  - read
  - was as follows
  lexicon: LSJ
  rationale: The verb literally means 'contained' or 'included.' English idiom could
    use 'read as follows,' but 'contained this' stays closer to the Greek while remaining
    natural.
- source_word: οὕτως
  chosen: this
  alternatives:
  - thus
  - as follows
  lexicon: LSJ
  rationale: οὕτως introduces the contents of the letter. In English, 'this' after
    'contained' conveys the sense smoothly; 'as follows' is possible but slightly
    more expansive than the Greek requires here.
- source_word: Βασιλεὺς
  chosen: King
  alternatives:
  - The king
  lexicon: LSJ
  rationale: Here Βασιλεὺς functions as the sender's royal title in the letter heading.
    'King' preserves the titulary force without adding an article absent from the
    epistolary formula.
- source_word: Ἀντίοχος
  chosen: Antiochus
  rationale: Personal name transliterated according to project policy.
- source_word: τῷ ἀδελφῷ
  chosen: to his brother
  alternatives:
  - to the brother
  - to his kinsman
  lexicon: LSJ
  rationale: The dative marks the recipient. In Hellenistic royal correspondence,
    'brother' can be literal or an honorific/relational court term; the Greek text
    simply says 'brother,' and the possessive is naturally supplied in English from
    the epistolary formula.
- source_word: Λυσίᾳ
  chosen: Lysias
  rationale: Personal name transliterated by standard convention.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - greeting
  - rejoice
  lexicon: LSJ
  rationale: In letter openings χαίρειν is the standard epistolary salutation, best
    rendered 'greetings' rather than the more literal but misleading 'rejoice.'
