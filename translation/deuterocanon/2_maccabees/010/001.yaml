id: 2MA.10.1
reference: 2 Maccabees 10:1
source:
  edition: lxx-swete-1909
  text: Μετʼ ὀλίγον δὲ παντελῶς χρονίσκον Λυσίας ἐπίτροπος τοῦ βασιλέως καὶ συγγενὴς
    καὶ ἐπὶ τῶν πραγμάτων, λίαν βαρέως φέρων ἐπὶ τοῖς γεγονόσι,
  language: Greek
