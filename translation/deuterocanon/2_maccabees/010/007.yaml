theological_decisions:
- issue: Rendering of ἀδελφοῖς in a collective military-national context
  chosen_reading: their brothers
  alternative_readings:
  - their fellow countrymen
  - their brothers and sisters
  rationale: The Greek uses the masculine plural ἀδελφοῖς. In context it denotes fellow
    Jews/allies, but the project's gender-accurate policy prefers retaining 'brothers'
    where that matches the source form and social sense, rather than neutralizing
    the term in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
