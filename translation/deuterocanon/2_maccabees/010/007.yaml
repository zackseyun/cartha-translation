translation:
  text: But Maccabeus himself was the first to take up arms, and he urged the others,
    by risking danger together with him, to come to the aid of their brothers; and
    together they also charged out eagerly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'sharing the danger with him.' The Greek participle emphasizes that
      they were being urged to join him in risking themselves.
    reason: lexical_alternative
  - marker: b
    text: '''Their brothers'' can also mean their fellow Jews or compatriots in this
      context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρῶτος
  chosen: was the first
  alternatives:
  - first
  lexicon: LSJ
  rationale: Predicative use with αὐτός and ὁ Μακκαβαῖος emphasizes that Maccabeus
    took the lead before the others.
- source_word: ἀναλαβὼν τὰ ὅπλα
  chosen: to take up the weapons
  alternatives:
  - having taken up arms
  - to take up arms
  lexicon: LSJ
  rationale: The participle ἀναλαβών with τὰ ὅπλα is an idiom for arming oneself.
    'Take up the weapons' stays close to the Greek while remaining natural English.
- source_word: προετρέψατο
  chosen: he urged
  alternatives:
  - he encouraged
  - he exhorted
  lexicon: LSJ
  rationale: The verb conveys exhortation or encouragement to action. 'Urged' fits
    the military context and is concise.
- source_word: ἅμα αὐτῷ διακινδυνεύοντας
  chosen: by risking danger together with him
  alternatives:
  - sharing the danger with him
  - venturing with him
  lexicon: LSJ
  rationale: διακινδυνεύω means to risk danger or hazard oneself. The participial
    phrase describes the manner or condition of the others' response to his urging.
- source_word: ἐπιβοηθεῖν
  chosen: to come to the aid of
  alternatives:
  - to help
  - to bring assistance to
  lexicon: LSJ
  rationale: The compound verb has the sense of coming in support or aid, especially
    in urgent circumstances. 'Come to the aid of' captures that force better than
    the flatter 'help.'
- source_word: τοῖς ἀδελφοῖς αὐτῶν
  chosen: their brothers
  alternatives:
  - their fellow countrymen
  - their brothers and sisters
  lexicon: LSJ
  rationale: ἀδελφοί here most naturally refers to fellow Jews/brothers in arms. Per
    project philosophy, the masculine form is retained as 'brothers' rather than neutralized.
- source_word: ὁμοῦ
  chosen: together
  alternatives:
  - all together
  - as one
  lexicon: LSJ
  rationale: ὁμοῦ marks collective action. 'Together' is the most direct rendering.
- source_word: προθύμως
  chosen: eagerly
  alternatives:
  - readily
  - with zeal
  lexicon: LSJ
  rationale: The adverb denotes willingness and zeal. 'Eagerly' communicates both
    readiness and enthusiasm in idiomatic English.
- source_word: ἐξώρμησαν
  chosen: charged out
  alternatives:
  - rushed out
  - set out
  lexicon: LSJ
  rationale: The verb suggests a forceful movement outward. In this martial setting,
    'charged out' preserves the energetic military sense better than the more neutral
    'set out.'
