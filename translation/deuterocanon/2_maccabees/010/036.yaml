translation:
  text: But if there are matters that should be brought before the king, send someone
    at once to look into these things, so that we may act as is fitting for us; for
    we are going on to Antioch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'if anything has been judged to be brought before the
      king.' The Greek expression is somewhat compressed, and the English has been
      smoothed to convey the likely sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἃ
  chosen: matters
  alternatives:
  - things
  - what
  lexicon: LSJ
  rationale: The neuter plural relative pronoun is indefinite in sense here, referring
    to issues under discussion rather than concrete objects. 'Matters' gives natural
    English while preserving that referential breadth.
- source_word: ἔκρινεν
  chosen: there are ... should be
  alternatives:
  - you have judged
  - it seemed good
  - it was decided
  lexicon: LSJ
  rationale: Although the form is singular ('it judged' / 'it was decided'), in context
    it functions idiomatically with the relative pronoun to mean 'if there are matters
    judged/considered to be...' English restructures this for clarity rather than
    preserving an awkward impersonal literalism.
- source_word: προσανενεχθῆναι τῷ Βασιλεῖ
  chosen: be brought before the king
  alternatives:
  - be reported to the king
  - be presented to the king
  lexicon: LSJ
  rationale: The infinitive conveys bringing a matter forward to a superior authority.
    'Brought before the king' preserves the formal sense without over-specifying whether
    the action is oral report or written presentation.
- source_word: πέμψατέ τινα παραχρῆμα
  chosen: send someone at once
  alternatives:
  - send a certain person immediately
  - dispatch someone right away
  lexicon: LSJ
  rationale: The imperative plus indefinite pronoun calls for prompt dispatch. 'At
    once' captures παραχρῆμα naturally and forcefully in modern English.
- source_word: ἐπισκεψόμενον περὶ τούτων
  chosen: to look into these things
  alternatives:
  - to investigate these matters
  - to examine concerning these things
  lexicon: LSJ
  rationale: The participle denotes someone who will inspect or investigate the issues.
    'Look into' is readable modern English; 'these things' keeps close to περὶ τούτων
    while still idiomatic.
- source_word: ἵνʼ ἔχωμεν
  chosen: so that we may act
  alternatives:
  - so that we may have
  - so that we may know how to proceed
  lexicon: LSJ
  rationale: A literal 'so that we may have' is incomplete in English because the
    idiom depends on the following ὡς καθήκει ἡμῖν. The sense is practical ability
    or course of action, so 'may act' expresses the implied verbal idea.
- source_word: ὡς καθήκει ἡμῖν
  chosen: as is fitting for us
  alternatives:
  - as is proper for us
  - as befits us
  lexicon: LSJ
  rationale: καθήκει carries the sense of what is proper, fitting, or appropriate.
    'As is fitting for us' is both accurate and natural.
- source_word: ἡμεῖς γὰρ προσάγομεν πρὸς Ἀντιοχίαν
  chosen: for we are going on to Antioch
  alternatives:
  - for we are proceeding to Antioch
  - for we are setting out for Antioch
  lexicon: LSJ
  rationale: The present tense indicates current movement or imminent travel. 'Going
    on to Antioch' captures the travel sense in straightforward English.
