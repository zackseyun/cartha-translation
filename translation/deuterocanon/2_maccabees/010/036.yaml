id: 2MA.10.36
reference: 2 Maccabees 10:36
source:
  edition: lxx-swete-1909
  text: ἃ δὲ ἔκρινεν προσανενεχθῆναι τῷ Βασιλεῖ, πέμψατέ τινα παραχρῆμα ἐπισκεψόμενον
    περὶ τούτων, ἵνʼ ἔχωμεν ὡς καθήκει ἡμῖν· ἡμεῖς γὰρ προσάγομεν πρὸς Ἀντιοχίαν.
