translation:
  text: Farewell. In the one hundred forty-eighth year, on the twenty-fourth day of
    Dioscorinthius.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'on the fourth and twentieth,' a standard way of expressing
      the twenty-fourth day.
    reason: lexical_alternative
  - marker: b
    text: Dioscorinthius is a Macedonian month name preserved by transliteration.
    reason: cultural_note
lexical_decisions:
- source_word: ἔρρωσθε
  chosen: Farewell
  alternatives:
  - Be strong
  - Be well
  - Good health to you
  lexicon: LSJ
  rationale: Epistolary closing formula from ῥώννυμι/ῥώομαι; in this context it functions
    idiomatically as a leave-taking rather than an exhortation to strength, so 'Farewell'
    best captures the conventional sense in natural English.
- source_word: ἔτους ἑκατοστοῦ τεσσερακοστοῦ ὀγδόου
  chosen: In the one hundred forty-eighth year
  alternatives:
  - Year one hundred forty-eight
  - In year 148
  lexicon: LSJ
  rationale: Genitive absolute/date formula marking the Seleucid year. Expanded with
    'In the' for readable English while preserving the dating function.
- source_word: Διὸς Κορινθίου
  chosen: Dioscorinthius
  alternatives:
  - the month Dioscorinthius
  - Dios Corinthius
  lexicon: LSJ
  rationale: This is a Macedonian month name in the date formula. Because it is a
    proper calendrical term rather than a common noun, transliteration is preferable
    to a forced translation. The article 'the month' is omitted in the main text because
    the Greek itself gives the bare month name, though the calendrical sense is clear.
- source_word: τετράδι καὶ εἰκάδι
  chosen: on the twenty-fourth day
  alternatives:
  - on the fourth and twentieth
  - on the twenty-fourth
  lexicon: LSJ
  rationale: Greek date expression literally 'on the fourth and twentieth,' an idiomatic
    way to say the twenty-fourth day. English should render the idiom rather than
    preserve the awkward literal sequence.
