translation:
  text: and to make the sanctuary taxable, like the other shrines of the nations,
    and to make the high priesthood sold each year;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'subject to tribute.' The Greek adjective ἀργυρολόγητον suggests being
      assessed for money or taxation.
    reason: lexical_alternative
  - marker: b
    text: Or 'to put the high priesthood up for sale each year.' The Greek πρατὴν
      emphasizes that the office was to be sold.
    reason: lexical_alternative
  - marker: c
    text: The surviving Greek here is syntactically compressed; this translation reflects
      the sense of the policy being described rather than a smoother full sentence
      in Greek.
    reason: textual_variant
lexical_decisions:
- source_word: ἱερὸν
  chosen: the sanctuary
  alternatives:
  - the temple
  - the holy place
  lexicon: LSJ
  rationale: In 2 Maccabees this commonly refers to the Jerusalem temple complex.
    'Sanctuary' preserves the sacred sense without implying only the building as 'temple'
    sometimes does.
- source_word: ἀργυρολόγητον
  chosen: taxable
  alternatives:
  - subject to tribute
  - money-assessed
  - liable to taxation
  lexicon: LSJ
  rationale: The adjective denotes being assessed for money or tribute. 'Taxable'
    is concise modern English and fits the policy being described.
- source_word: τεμένη
  chosen: shrines
  alternatives:
  - sanctuaries
  - temples
  lexicon: LSJ
  rationale: The word refers to sacred precincts or temples. 'Shrines' distinguishes
    the pagan sacred sites from the Jerusalem sanctuary while preserving the cultic
    sense.
- source_word: ἐθνῶν
  chosen: of the nations
  alternatives:
  - of the Gentiles
  - of the pagans
  lexicon: LSJ
  rationale: Literally 'nations.' In this context it refers to non-Jewish peoples,
    but 'of the nations' stays closer to the Greek while allowing readers to infer
    the contrast.
- source_word: πρατὴν
  chosen: a thing sold
  alternatives:
  - for sale
  - saleable
  - venal
  lexicon: LSJ
  rationale: The adjective indicates something sold or up for sale. Because it modifies
    the high priesthood, the English must make explicit the shocking commercialization;
    'a thing sold each year' captures that force.
- source_word: ἀρχιερωσύνην
  chosen: the high priesthood
  alternatives:
  - the office of high priest
  lexicon: LSJ
  rationale: This denotes the office or dignity of the high priest. 'High priesthood'
    is the most natural and compact rendering.
- source_word: ποιήσειν
  chosen: to make
  alternatives:
  - to render
  - to turn into
  lexicon: LSJ
  rationale: Infinitive of purpose/content after the implied policy statement. Repeating
    'to make' mirrors the Greek structure and keeps the parallelism with the sanctuary
    and the high priesthood.
