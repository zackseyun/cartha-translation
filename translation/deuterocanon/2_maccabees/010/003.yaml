theological_decisions:
- issue: Cultic terminology for Jerusalem's holy site versus pagan sacred places
  chosen_reading: Render ἱερὸν as 'sanctuary' and τεμένη as 'shrines'
  alternative_readings:
  - Render both with 'temple(s)'
  - Render both with 'sanctuary/sanctuaries'
  rationale: 'The Greek uses different terms, and the English preserves that distinction
    without overstating a theological contrast beyond the text. This also helps readers
    hear the desecrating policy: the Jerusalem sanctuary is being treated like ordinary
    pagan shrines.'
  doctrine_reference: Translation philosophy §§1, 5
