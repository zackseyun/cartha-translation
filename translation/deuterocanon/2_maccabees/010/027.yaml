  text: Πρὸς δὲ τὸ ἔθνος ἡ τοῦ βασιλέως ἐπιστολὴ τοιαύδε ἦν Βασιλεὺς Ἀντίοχος τῇ γερουσίᾳ
    τῶν Ἰουδαίων καὶ τοῖς ἄλλοις Ἰουδαίοις χαίρειν.
