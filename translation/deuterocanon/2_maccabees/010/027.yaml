translation:
  text: 'And to the nation the king’s letter was as follows: “King Antiochus to the
    council of elders of the Jews and to the other Jews, greetings.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rest of the Jews' for 'the other Jews.'
    reason: lexical_alternative
  - marker: b
    text: Greek γερουσία refers to an official body of elders; 'council of elders'
      is used here rather than simply transliterating the term.
    reason: cultural_note
lexical_decisions:
- source_word: Πρὸς
  chosen: to
  alternatives:
  - for
  - concerning
  lexicon: BDAG
  rationale: 'With the accusative in epistolary context, Πρὸς marks direction/addressee:
    the letter is addressed ''to'' the nation.'
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - people
  - ethnic group
  lexicon: BDAG
  rationale: In this context it refers corporately to the Jewish people as a national
    body. 'Nation' preserves the political-collective sense better than the flatter
    'people'.
- source_word: ἐπιστολή
  chosen: letter
  alternatives:
  - epistle
  - written message
  lexicon: BDAG
  rationale: Standard term for a letter. 'Letter' is natural modern English and fits
    the formal royal correspondence context.
- source_word: τοιαύδε
  chosen: as follows
  alternatives:
  - such as this
  - of this kind
  lexicon: BDAG
  rationale: Idiomatic English introduction to quoted correspondence; it conveys the
    deictic force without awkward literalism.
- source_word: Βασιλεὺς Ἀντίοχος
  chosen: King Antiochus
  alternatives:
  - Antiochus the king
  lexicon: BDAG
  rationale: The Greek heading places the royal title prominently. 'King Antiochus'
    is the most natural English equivalent while preserving the titulary force.
- source_word: γερουσίᾳ
  chosen: council of elders
  alternatives:
  - senate
  - gerousia
  - eldership
  lexicon: BDAG
  rationale: γερουσία denotes a body of elders. 'Council of elders' communicates the
    institutional sense clearly without importing Roman connotations of 'senate' or
    leaving the Greek untranslated.
- source_word: τοῖς ἄλλοις Ἰουδαίοις
  chosen: the other Jews
  alternatives:
  - the rest of the Jews
  - the remaining Jews
  lexicon: BDAG
  rationale: ἄλλοις distinguishes the broader Jewish populace from the gerousia already
    named. 'The other Jews' is a straightforward rendering.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - hail
  lexicon: BDAG
  rationale: In letter openings χαίρειν functions as a conventional salutation. 'Greetings'
    reflects the epistolary idiom better than the overly literal 'rejoice'.
