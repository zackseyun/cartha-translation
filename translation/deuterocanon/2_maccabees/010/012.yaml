translation:
  text: But most of them escaped wounded and naked; and Lysias himself also escaped
    by fleeing shamefully.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stripped,' possibly indicating that they fled after losing their equipment
      or outer garments in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πλείονες
  chosen: most of them
  alternatives:
  - the greater number of them
  - the majority of them
  lexicon: LSJ
  rationale: πλείονες is the comparative used substantivally for the larger part or
    majority. 'Most of them' is natural modern English and preserves the quantitative
    sense.
- source_word: τραυματίαι
  chosen: wounded
  alternatives:
  - wounded men
  - injured
  lexicon: LSJ
  rationale: The adjective/noun denotes those who are wounded. English 'wounded' works
    idiomatically after 'escaped' without adding an unnecessary noun.
- source_word: γυμνοὶ
  chosen: naked
  alternatives:
  - stripped
  - bare
  lexicon: LSJ
  rationale: γυμνοί plainly means 'naked' or 'stripped.' Here it likely reflects loss
    of armor/clothing in defeat, but the text itself says 'naked,' so that direct
    rendering is retained rather than interpreting it as merely 'lightly clad.'
- source_word: διεσώθησαν
  chosen: escaped
  alternatives:
  - were saved
  - got away safely
  lexicon: LSJ
  rationale: The verb means to come through safely or be preserved. In this military
    narrative context, 'escaped' best fits the sense of surviving and getting away.
- source_word: αἰσχρῶς
  chosen: shamefully
  alternatives:
  - disgracefully
  - in disgrace
  lexicon: LSJ
  rationale: The adverb conveys disgrace or shame. 'Shamefully' is concise and preserves
    the moral-evaluative force of the Greek.
- source_word: φεύγων
  chosen: by fleeing
  alternatives:
  - while fleeing
  - as he fled
  lexicon: LSJ
  rationale: The present participle is contemporaneous with the main verb. 'By fleeing'
    expresses the means/circumstance of his escape in smooth English.
- source_word: διεσώθη
  chosen: escaped
  alternatives:
  - was saved
  - got away safely
  lexicon: LSJ
  rationale: As above, the verb in context refers to surviving and getting away from
    defeat; 'escaped' is the clearest narrative rendering.
