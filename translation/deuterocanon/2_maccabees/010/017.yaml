translation:
  text: John and Absalom, who were sent from you, after delivering the written document,
    asked about the matters indicated by it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the written communication' or 'the written decree'; the Greek term can
      denote an official message or directive.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰωάνης
  chosen: John
  alternatives:
  - Joannes
  rationale: Personal name transliterated by standard English convention rather than
    preserving a more Greek-looking form.
- source_word: Ἀβεσσαλώμ
  chosen: Absalom
  alternatives:
  - Abessalom
  rationale: Personal name transliterated by standard English convention.
- source_word: οἱ πεμφθέντες
  chosen: who were sent
  alternatives:
  - the ones sent
  - having been sent
  lexicon: BDAG
  rationale: Aorist passive participle of πέμπω is naturally rendered in English as
    a relative clause modifying the two named men.
- source_word: παρʼ ὑμῶν
  chosen: from you
  alternatives:
  - by you
  - on your part
  lexicon: BDAG
  rationale: παρά with genitive here indicates source/origin of the sending; 'from
    you' is the clearest idiomatic rendering.
- source_word: ἐπιδόντες
  chosen: after delivering
  alternatives:
  - having delivered
  - presenting
  lexicon: BDAG
  rationale: Aorist participle prior to the main verb; 'after delivering' conveys
    the sequence smoothly in modern English.
- source_word: τὸν ὑπογεγραμμένον χρηματισμόν
  chosen: the written document
  alternatives:
  - the written decree
  - the written communication
  - the undersigned message
  lexicon: BDAG
  rationale: ὑπογεγραμμένον literally suggests something written down; χρηματισμός
    can denote an official communication or document. 'Written document' preserves
    the documentary sense without over-specifying 'decree,' which the context does
    not require with certainty.
- source_word: ἠξίουν
  chosen: asked about
  alternatives:
  - requested concerning
  - inquired about
  - urged concerning
  lexicon: BDAG
  rationale: The imperfect of ἀξιόω here introduces their request/inquiry. 'Asked
    about' is idiomatic and fits the following περὶ phrase.
- source_word: περὶ τῶν διʼ αὐτοῦ σημαινομένων
  chosen: about the matters indicated by it
  alternatives:
  - concerning the things signified by it
  - about what was made known through it
  lexicon: BDAG
  rationale: σημαινομένων denotes things being indicated or made known; διʼ αὐτοῦ
    most naturally refers back to the document. 'Matters indicated by it' is clear
    and sufficiently formal.
