translation:
  text: Farewell. May it be as we would wish; and we ourselves are also well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek literally uses health-language in the closing: ''Be strong/well ...
      and we ourselves are also healthy.'' The rendering ''Farewell'' reflects the
      idiomatic force of the epistolary valediction.'
    reason: lexical_alternative
  - marker: b
    text: This verse appears to be an epistolary closing formula and is not narratively
      continuous with the surrounding context in many modern verse divisions; the
      source wording itself is translated as given.
    reason: cultural_note
lexical_decisions:
- source_word: ἔρρωσθε
  chosen: Farewell
  alternatives:
  - Be strong
  - Be well
  - Good health to you
  lexicon: LSJ
  rationale: Imperative/plural from ῥώννυμι used idiomatically in letter closings
    as a valediction. In this epistolary context, 'Farewell' best captures the conventional
    force in natural English without over-literalizing the health idiom.
- source_word: εἰη ἂν
  chosen: May it be
  alternatives:
  - Would that it be
  - Let it be
  lexicon: LSJ
  rationale: Optative with ἄν expresses a wish or potential desire. 'May it be' conveys
    the volitional nuance clearly in English.
- source_word: ὡς βούλομεθα
  chosen: as we would wish
  alternatives:
  - as we desire
  - as we want
  lexicon: LSJ
  rationale: βούλομαι denotes willing/wishing/desiring. 'Would wish' fits the optative
    wish construction and preserves the courteous tone of the closing.
- source_word: ὑγιαίνομεν
  chosen: are also well
  alternatives:
  - are in good health
  - are healthy
  lexicon: LSJ
  rationale: The verb literally refers to being healthy/sound. 'Are also well' is
    concise, idiomatic, and matches the closing's reciprocal health-wish tone.
- source_word: καὶ αὐτοὶ δὲ
  chosen: and we ourselves are also
  alternatives:
  - and we too
  - and we ourselves too
  lexicon: LSJ
  rationale: The combination adds mild emphasis and reciprocity. The English keeps
    both the connective and the emphatic pronoun, though smoothed for readability.
