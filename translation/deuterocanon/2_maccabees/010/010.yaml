theological_decisions:
- issue: Referent and force of the heavenly assistance
  chosen_reading: Retain the military metaphor 'the ally from heaven' without specifying
    more than the Greek states.
  alternative_readings:
  - the heavenly helper
  - God as their ally from heaven
  rationale: The text clearly attributes victory-assistance to divine mercy, but the
    noun σύμμαχος is metaphorical and martial. The translation preserves that theological
    imagery without expanding it into a more explicit doctrinal statement than the
    Greek provides.
