translation:
  text: 'The Romans also sent them a letter, worded as follows: “Quintus Memmius and
    Titus Manius, elders of the Romans, to the people of the Jews, greetings.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “to the Jewish people.” The Greek literally reads “to the people of
      the Jews.”
    reason: lexical_alternative
  - marker: b
    text: The phrase “elders of the Romans” could refer more specifically to Roman
      envoys or senators, but the Greek term itself is simply “elders.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπέμψαν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Aorist of πέμπω, straightforwardly indicating sending. 'Sent' is natural
    modern English and sufficiently formal.
- source_word: οἱ Ῥωμαῖοι
  chosen: the Romans
  alternatives:
  - the Roman authorities
  lexicon: LSJ
  rationale: The phrase is ethnically/politically collective. 'The Romans' best matches
    the Greek without adding institutional specificity not explicit in the text.
- source_word: πρὸς αὐτοὺς
  chosen: them
  alternatives:
  - to them
  lexicon: LSJ
  rationale: English idiom allows the indirect object to be incorporated after 'sent.'
    The referent is carried over from context; no need to overtranslate.
- source_word: ἐπιστολήν
  chosen: a letter
  alternatives:
  - an official letter
  - a written message
  lexicon: LSJ
  rationale: ἐπιστολή is the ordinary term for a letter. 'Official letter' may be
    implied by context but is not lexically required.
- source_word: ἔχουσαν οὕτως
  chosen: worded as follows
  alternatives:
  - having thus
  - reading as follows
  lexicon: LSJ
  rationale: This participial formula introduces the contents of the letter. 'Worded
    as follows' is idiomatic English that preserves the function of the Greek.
- source_word: Κόιντος Μέμμιος, Τίτος Μάνιος
  chosen: Quintus Memmius and Titus Manius
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. The asyndetic listing in Greek is rendered with English 'and' for
    readability.
- source_word: πρεσβυταὶ Ῥωμαίων
  chosen: elders of the Romans
  alternatives:
  - Roman elders
  - senators of the Romans
  lexicon: LSJ
  rationale: πρεσβυταί literally means 'elders.' While a Roman political nuance such
    as 'senators' may be inferred, the Greek itself uses the broader term, so the
    more transparent rendering is preferred.
- source_word: τῷ δήμῳ τῶν Ἰουδαίων
  chosen: to the people of the Jews
  alternatives:
  - to the Jewish people
  - to the nation of the Jews
  lexicon: LSJ
  rationale: δῆμος denotes the people/body politic. 'The people of the Jews' stays
    close to the Greek structure, though somewhat formal; it preserves the public/corporate
    sense.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - greeting
  lexicon: LSJ
  rationale: Standard epistolary infinitive used in salutations. 'Greetings' is the
    conventional and accurate English equivalent.
