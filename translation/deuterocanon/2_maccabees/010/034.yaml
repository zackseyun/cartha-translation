id: 2MA.10.34
reference: 2 Maccabees 10:34
source:
  edition: lxx-swete-1909
  text: Ἐπέμψαν δὲ καὶ οἱ Ῥωμαῖοι πρὸς αὐτοὺς ἐπιστολήν, ἔχουσαν οὕτως Κόιντος Μέμμιος,
    Τίτος Μάνιος, πρεσβυταὶ Ῥωμαίων, τῷ δήμῳ τῶν Ἰουδαίων χαίρειν.
  language: Greek
