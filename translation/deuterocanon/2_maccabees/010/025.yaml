translation:
  text: Therefore, since we choose that this nation also should be free from disturbance,
    we judge that the sanctuary should be restored to them, and that they should live
    according to the customs of their ancestors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we decide' / 'we decree'; the Greek κρίνομεν is formal administrative
      language for an official determination.
    reason: lexical_alternative
  - marker: b
    text: The verb translated 'live' (πολιτεύεσθαι) can also suggest ordering communal
      or civic life, not merely private conduct.
    reason: lexical_alternative
  - marker: c
    text: '''The sanctuary'' may also be rendered ''the temple,'' since τὸ ἱερὸν can
      refer to the sacred temple complex.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱρούμενοι
  chosen: since we choose
  alternatives:
  - having chosen
  - because we have decided
  lexicon: LSJ
  rationale: The participle introduces the grounds for the decree. 'Since we choose'
    preserves the deliberative sense of αἱρέομαι in official language while reading
    naturally in English.
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - people
  - ethnic group
  lexicon: LSJ
  rationale: In this royal-administrative context, ἔθνος refers to the Jewish people
    as a distinct national body. 'Nation' best preserves that collective-political
    sense without over-specifying ethnicity.
- source_word: ἐκτὸς ταραχῆς εἶναι
  chosen: should be free from disturbance
  alternatives:
  - be outside turmoil
  - be free from unrest
  - be undisturbed
  lexicon: LSJ
  rationale: The phrase denotes being exempt from civil disorder or agitation. 'Free
    from disturbance' is idiomatic and keeps the public-order nuance of ταραχή.
- source_word: κρίνομεν
  chosen: we judge
  alternatives:
  - we decide
  - we decree
  lexicon: LSJ
  rationale: The verb expresses an official determination. 'We judge' stays close
    to the Greek while still fitting formal administrative style; 'decree' would be
    slightly more interpretive.
- source_word: τὸ ἱερὸν
  chosen: the sanctuary
  alternatives:
  - the temple
  - the holy place
  lexicon: LSJ
  rationale: ἱερόν can mean the temple precinct or sacred sanctuary. 'Sanctuary' preserves
    the sacred-cultic reference without importing a narrower or broader architectural
    sense than the Greek itself specifies.
- source_word: ἀποκατασταθῆναι
  chosen: should be restored
  alternatives:
  - be reinstated
  - be reestablished
  lexicon: LSJ
  rationale: The passive infinitive indicates restoration to a former proper condition
    or status. 'Should be restored' is the most straightforward rendering in context.
- source_word: πολιτεύεσθαι
  chosen: they should live
  alternatives:
  - conduct their civic life
  - order their commonwealth
  - govern themselves
  lexicon: LSJ
  rationale: The verb can carry civic or constitutional overtones, but here with κατὰ
    τὰ ... ἔθη it refers to ordering communal life according to ancestral customs.
    'They should live' is readable English that still covers communal conduct; the
    stronger civic nuance is noted by alternatives.
- source_word: κατὰ τὰ ἐπὶ τῶν προγόνων αὐτῶν ἔθη
  chosen: according to the customs of their ancestors
  alternatives:
  - according to the customs in the time of their forefathers
  - according to their ancestral customs
  lexicon: LSJ
  rationale: The phrase points to traditional ancestral practices, likely with reference
    to former accepted arrangements. 'According to the customs of their ancestors'
    is clear and faithful.
