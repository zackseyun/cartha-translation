id: 2MA.10.25
reference: 2 Maccabees 10:25
source:
  edition: lxx-swete-1909
  text: αἱρούμενοι οὖν καὶ τοῦτο τὸ ἔθνος ἐκτὸς ταραχῆς εἶναι, κρίνομεν τὸ ἱερὸν ἀποκατασταθῆναι
    αὐτοῖς, καὶ πολιτεύεσθαι κατὰ τὰ ἐπὶ τῶν προγόνων αὐτῶν ἔθη.
  language: Greek
