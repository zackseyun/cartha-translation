translation:
  text: since our father has departed to the gods, and since we desire that those
    in the kingdom, being free from disturbance, should give attention to the affairs
    of the Jews,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''departed to the gods,'' a Hellenistic royal euphemism for death
      from the speaker''s court perspective.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐπὶ
  chosen: since
  alternatives:
  - after
  - upon
  lexicon: LSJ
  rationale: With the genitive absolute-like construction introducing the grounds
    for the royal statement, 'since' best conveys causal-temporal force in natural
    English.
- source_word: τοῦ πατρὸς ἡμῶν
  chosen: our father
  alternatives:
  - our ancestor
  lexicon: LSJ
  rationale: In royal correspondence this refers to the speaker's deceased father;
    'our father' is the plain and direct rendering.
- source_word: εἰς θεοὺς μεταστάντος
  chosen: has departed to the gods
  alternatives:
  - has passed over to the gods
  - has died
  lexicon: LSJ
  rationale: μεθίστημι/μεταστάντος here is a euphemistic expression for death, and
    εἰς θεούς is part of the Hellenistic royal idiom of posthumous divine association.
    Rendering the phrase explicitly preserves the Greek wording better than flattening
    it to merely 'has died'.
- source_word: βουλόμενοι
  chosen: we desire
  alternatives:
  - wishing
  - wanting
  lexicon: LSJ
  rationale: A participle explaining royal intent; 'we desire' fits the formal register
    of the decree and reads smoothly in English.
- source_word: τοὺς ἐκ τῆς βασιλείας
  chosen: those in the kingdom
  alternatives:
  - those of the kingdom
  - the people of the kingdom
  lexicon: LSJ
  rationale: The phrase refers broadly to subjects within the realm. 'Those in the
    kingdom' is concise and sufficiently inclusive of the populace.
- source_word: ἀπερισπάστως
  chosen: free from disturbance
  alternatives:
  - undistractedly
  - without distraction
  - untroubled
  lexicon: LSJ
  rationale: The adverb denotes being unencumbered or not pulled in conflicting directions.
    In this administrative context, 'free from disturbance' captures the political-social
    sense better than the more internal 'undistractedly'.
- source_word: ὄντας γενέσθαι
  chosen: being free from disturbance, should give
  alternatives:
  - might become ... and give
  - may be ... and give
  lexicon: LSJ
  rationale: The construction is somewhat compressed in Greek. The English smooths
    it minimally to express the intended result for the kingdom's inhabitants while
    preserving the decree-like syntax.
- source_word: πρὸς τὴν τῶν Ἰουδαίων ἐπιμέλειαν
  chosen: give attention to the affairs of the Jews
  alternatives:
  - turn to the care of the Jews
  - attend to the concerns of the Jews
  lexicon: LSJ
  rationale: ἐπιμέλεια can mean care, attention, or administration. Here it concerns
    governmental handling of Jewish matters; 'give attention to the affairs of the
    Jews' preserves that administrative nuance without overinterpreting it as benevolence
    alone.
