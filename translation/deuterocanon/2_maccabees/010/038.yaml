translation:
  text: Farewell. In the one hundred forty-eighth year, on the fifteenth day of Xanthicus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek literally, ''Be healthy'' or ''Be well,'' used here as a conventional
      closing: ''Farewell.'''
    reason: lexical_alternative
  - marker: b
    text: Xanthicus was a Macedonian month name used in Hellenistic dating formulas.
    reason: cultural_note
lexical_decisions:
- source_word: ὑγιαίνετε
  chosen: Farewell
  alternatives:
  - Be well
  - Stay healthy
  lexicon: LSJ
  rationale: In epistolary closing formulae, ὑγιαίνω commonly functions idiomatically
    as a valediction rather than a wish about physical health. 'Farewell' gives natural
    English while preserving the letter-closing sense.
- source_word: ἔτους
  chosen: year
  lexicon: LSJ
  rationale: Genitive of dating formula; rendered straightforwardly as 'year' in English.
- source_word: ἑκατοστοῦ τεσσερακοστοῦ ὀγδόου
  chosen: one hundred forty-eighth
  alternatives:
  - hundred and forty-eighth
  lexicon: LSJ
  rationale: This is the ordinal dating expression modifying 'year.' Modern English
    style favors 'one hundred forty-eighth' without changing sense.
- source_word: Ξανθικοῦ
  chosen: Xanthicus
  alternatives:
  - Xanthikos
  lexicon: LSJ
  rationale: This is a Macedonian month name; as a proper calendrical name it is best
    transliterated rather than translated.
- source_word: πεντεκαιδεκάτῃ
  chosen: fifteenth day
  alternatives:
  - the fifteenth
  lexicon: LSJ
  rationale: Dative feminine in a dating formula, naturally expressed in English as
    'on the fifteenth day.' This makes the elliptical Greek date explicit enough for
    readable English.
