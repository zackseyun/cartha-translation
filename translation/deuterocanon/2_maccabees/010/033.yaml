translation:
  text: Farewell. In the one hundred forty-eighth year, on the fifteenth day of Xanthicus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἔρρωσθε is literally an imperative such as 'be strong' or 'be well,'
      but in closing formulas it functions as a conventional farewell.
    reason: lexical_alternative
  - marker: b
    text: Xanthicus was a Macedonian month name used in Hellenistic dating.
    reason: cultural_note
lexical_decisions:
- source_word: ἔρρωσθε
  chosen: Farewell
  alternatives:
  - Be strong
  - Be well
  - Good health to you
  lexicon: LSJ
  rationale: The plural imperative of ῥώννυμι functions idiomatically in letter closings
    as a valediction rather than a literal exhortation to strength. 'Farewell' best
    captures the epistolary sense in natural English.
- source_word: ἔτους
  chosen: year
  alternatives:
  - of the year
  lexicon: LSJ
  rationale: Genitive used in dating formula; English idiom renders it simply as 'year'
    within the chronological notice.
- source_word: ἑκατοστοῦ τεσσερακοστοῦ ὀγδόου
  chosen: one hundred forty-eighth
  alternatives:
  - hundred and forty-eighth
  lexicon: LSJ
  rationale: This is the ordinal dating expression. Modern English style favors 'one
    hundred forty-eighth' without adding interpretive material about the era.
- source_word: Ξανθικοῦ
  chosen: Xanthicus
  alternatives:
  - Xanthikos
  lexicon: LSJ
  rationale: This is a Macedonian month name; per project philosophy, names are transliterated
    rather than translated. 'Xanthicus' is a standard English transliteration for
    the month in historical contexts.
- source_word: πεντεκαιδεκάτῃ
  chosen: fifteenth day
  alternatives:
  - the fifteenth
  - on the fifteenth
  lexicon: LSJ
  rationale: The dative in a dating formula indicates the day of the month. English
    expresses this most clearly as 'on the fifteenth day,' though the preposition
    is supplied idiomatically.
