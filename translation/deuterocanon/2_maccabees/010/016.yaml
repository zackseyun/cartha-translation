translation:
  text: 'For letters had been written to the Jews from Lysias, containing this form:
    “Lysias to the multitude of the Jews, greetings.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “containing these terms” / “containing this wording.” The Greek citation
      formula τὸν τρόπον τοῦτον can refer to the form or wording of the letter.
    reason: lexical_alternative
  - marker: b
    text: “To the multitude of the Jews” could also be rendered “to the body of the
      Jews” or “to the assembly of the Jews.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν γὰρ γεγραμμέναι
  chosen: For letters had been written
  alternatives:
  - For letters were written
  - For there had been letters written
  lexicon: LSJ
  rationale: Renders the periphrastic pluperfect/passive sense naturally in English
    while preserving the explanatory γάρ with 'For.'
- source_word: ἐπιστολαὶ
  chosen: letters
  alternatives:
  - epistles
  - written communications
  lexicon: LSJ
  rationale: Standard and natural rendering for official written correspondence.
- source_word: τοῖς Ἰουδαίοις
  chosen: to the Jews
  alternatives:
  - for the Jews
  lexicon: LSJ
  rationale: The dative is best taken as the recipients of the letters in this context.
- source_word: παρὰ μὲν Λυσίου
  chosen: from Lysias
  alternatives:
  - on the part of Lysias
  lexicon: LSJ
  rationale: παρά with genitive commonly marks source/origin; 'from Lysias' is idiomatic
    and fits epistolary context.
- source_word: περιέχουσαι
  chosen: containing
  alternatives:
  - including
  - setting forth
  lexicon: LSJ
  rationale: Introduces the wording/formula of the letter that follows.
- source_word: τὸν τρόπον τοῦτον
  chosen: this form
  alternatives:
  - this manner
  - these terms
  - this wording
  lexicon: LSJ
  rationale: In epistolary context τρόπος refers to the form or wording of the document.
    'This form' is concise and fits the citation formula.
- source_word: τῷ πλήθει τῶν Ἰουδαίων
  chosen: to the multitude of the Jews
  alternatives:
  - to the assembly of the Jews
  - to the body of the Jews
  - to the Jewish multitude
  lexicon: LSJ
  rationale: πλῆθος denotes a large body or multitude. Retaining 'multitude' preserves
    the collective nuance without over-interpreting it as a formal civic assembly.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - sends greetings
  lexicon: LSJ
  rationale: Standard epistolary infinitive conventionally rendered 'greetings' in
    English letter openings.
