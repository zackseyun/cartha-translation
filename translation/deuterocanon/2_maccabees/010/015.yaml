  text: ἐπένευσε δὲ ὁ Μακκαβαῖος ἐπὶ πᾶσιν οἷς ὁ Λυσίας παρεκάλει, τοῦ συμφέροντος
    φροντίζων· ὅσα γὰρ ὁ Μακκαβαῖος ἔδωκεν τῷ Λυσίᾳ διὰ γραπτῶν περὶ τῶν Ἰουδαίων,
    συνεχώρησεν ὁ γραμματεύς.
