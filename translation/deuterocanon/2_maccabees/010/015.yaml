theological_decisions:
- issue: Referent and force of τοῦ συμφέροντος
  chosen_reading: rendered as 'the common good'
  alternative_readings:
  - '''what was advantageous'''
  - '''what was beneficial'''
  rationale: This is not a major doctrinal issue, but it affects whether the phrase
    sounds merely pragmatic or publicly beneficial. The context is political negotiation
    affecting the Jews collectively, so 'the common good' best reflects the likely
    communal scope while remaining faithful to the Greek.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
