id: 3MA.5.35
reference: 3 Maccabees 5:35
source:
  edition: lxx-swete-1909
  text: οἱ τε Ἰουδαῖοι τὰ παρὰ τοῦ βασιλέως ἀκούσαντες, τὸν ἐπιφανῆ θεὸν Κύριον, Βασιλέα
    τῶν βασιλευόντων, ᾔνουν, καὶ τῆσδε τῆς βοηθείας αὐτοῦ τετευχότες.
  language: Greek
  pages:
  - 744
  confidence: high
  validation: agree
translation:
  text: And the Jews, when they heard what came from the king, were praising the manifest
    God, the Lord, the King of kings, since they had obtained this help from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the King of kings.' The Greek reads literally 'the
      King of those who rule.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ παρὰ τοῦ βασιλέως
  chosen: what came from the king
  alternatives:
  - the things from the king
  - the king's words
  - the king's decree
  lexicon: LSJ
  rationale: The neuter plural with παρά can mean the message or matter coming from
    the king. 'What came from the king' preserves the breadth of the Greek without
    over-specifying it as a formal decree.
- source_word: ἀκούσαντες
  chosen: when they heard
  alternatives:
  - having heard
  - after hearing
  lexicon: LSJ
  rationale: A participle of attendant circumstance/temporal sequence. 'When they
    heard' is natural English and preserves the temporal sense.
- source_word: ἐπιφανῆ
  chosen: manifest
  alternatives:
  - appearing
  - glorious
  - illustrious
  lexicon: LSJ
  rationale: The adjective highlights God as openly revealed or made evident in action.
    'Manifest' best preserves that sense in this context of visible deliverance.
- source_word: θεὸν Κύριον
  chosen: God, the Lord
  alternatives:
  - the Lord God
  - God the Lord
  lexicon: LSJ
  rationale: Both nouns/titles are present and should be represented. 'God, the Lord'
    keeps the appositional force and preserves κύριος as 'Lord' per doctrine.
- source_word: Βασιλέα τῶν βασιλευόντων
  chosen: the King of those who rule
  alternatives:
  - the King of kings
  - the King of rulers
  lexicon: LSJ
  rationale: The participle βασιλευόντων is literally 'those who rule/reign,' not
    the noun 'kings,' though the sense overlaps. This rendering stays closer to the
    Greek while remaining intelligible.
- source_word: ᾔνουν
  chosen: were praising
  alternatives:
  - praised
  - were giving praise to
  lexicon: LSJ
  rationale: The imperfect suggests ongoing or repeated praise; 'were praising' reflects
    that aspect better than a simple past.
- source_word: τῆσδε τῆς βοηθείας
  chosen: this help
  alternatives:
  - this aid
  - this deliverance
  lexicon: LSJ
  rationale: βοήθεια is help or aid. 'Help' is the most direct rendering; 'deliverance'
    would add interpretive weight not required by the word itself.
- source_word: τετευχότες
  chosen: they had obtained
  alternatives:
  - having received
  - having attained
  lexicon: LSJ
  rationale: The perfect participle indicates a completed attainment with present
    result. 'They had obtained' fits the syntax and the completed benefit received
    from God.
