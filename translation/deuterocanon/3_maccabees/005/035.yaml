theological_decisions:
- issue: Rendering of κύριος in a divine title sequence
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The verse applies κύριος to God in a reverential title chain. Per doctrine,
    κύριος defaults to 'Lord.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to normalize Βασιλέα τῶν βασιλευόντων to the idiomatic title 'King
    of kings'
  chosen_reading: the King of those who rule
  alternative_readings:
  - the King of kings
  rationale: Although 'King of kings' is idiomatic and theologically familiar, the
    Greek here uses a participle ('those ruling') rather than the noun 'kings.' To
    avoid importing a more traditional formula than the text states, the main text
    keeps the participial sense, while the idiomatic alternative is preserved in a
    footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
