id: 3MA.5.41
reference: 3 Maccabees 5:41
source:
  edition: lxx-swete-1909
  text: ὧν χάριν ἡ πόλις διὰ τὴν προσδοκίαν ὀχλεῖ· καὶ πληθύνουσα συστροφαῖς ἤδη καὶ
    κινδυνεύει πολλακὶς διαρπασθῆναι.
  language: Greek
  pages:
  - 745
  confidence: high
  validation: agree
translation:
  text: For this reason the city is in turmoil because of the expectation, and as
    it grows with crowds, it is already in danger of being plundered many times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the anticipation' or 'because of the suspense'; the Greek
      term denotes a state of expectation.
    reason: lexical_alternative
  - marker: b
    text: Or 'with crowds' or 'with massed gatherings'; the Greek can suggest the
      city swelling with assembled groups.
    reason: lexical_alternative
  - marker: c
    text: Or 'often' instead of 'many times.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν χάριν
  chosen: For this reason
  alternatives:
  - because of which
  - therefore
  lexicon: LSJ
  rationale: Idiomatic causal expression introducing the result of the preceding circumstances.
    'For this reason' gives clear modern English without over-paraphrasing.
- source_word: ἡ πόλις
  chosen: the city
  alternatives:
  - the populace
  - the town
  lexicon: LSJ
  rationale: The noun normally denotes the city itself, though by implication its
    inhabitants are involved. Retaining 'the city' preserves the Greek image and avoids
    importing an interpretive shift to 'people' alone.
- source_word: διὰ τὴν προσδοκίαν
  chosen: because of the expectation
  alternatives:
  - because of the suspense
  - because of the anticipation
  lexicon: LSJ
  rationale: προσδοκία denotes expectation or anticipation. The phrase likely refers
    to the tense public expectation surrounding the events. 'Expectation' is the most
    direct rendering, even if somewhat broad.
- source_word: ὀχλεῖ
  chosen: is in turmoil
  alternatives:
  - is disturbed
  - is agitated
  - is in an uproar
  lexicon: LSJ
  rationale: From ὀχλέω, here likely meaning to be troubled or thrown into commotion.
    'Is in turmoil' captures civic unrest in readable English better than the more
    wooden 'is troubled.'
- source_word: πληθύνουσα
  chosen: as it grows
  alternatives:
  - increasing
  - multiplying
  lexicon: LSJ
  rationale: The participle conveys increase in scale. 'As it grows' fits the ongoing
    sense and connects naturally with the following dative phrase.
- source_word: συστροφαῖς
  chosen: with gatherings
  alternatives:
  - with crowds
  - with mobs
  - with assemblies
  lexicon: LSJ
  rationale: The term can denote gatherings, crowds, or massing together. 'Gatherings'
    is broad enough to preserve the lexical sense without prematurely specifying whether
    the crowds are orderly or riotous.
- source_word: ἤδη
  chosen: already
  alternatives:
  - by now
  - even now
  lexicon: LSJ
  rationale: Marks the danger as present and developing. 'Already' is the most straightforward
    equivalent.
- source_word: κινδυνεύει
  chosen: is ... in danger
  alternatives:
  - runs the risk
  - is at risk
  lexicon: LSJ
  rationale: Standard rendering of the verb for being in danger. The periphrastic
    English expression is natural and accurate.
- source_word: πολλακὶς
  chosen: many times
  alternatives:
  - repeatedly
  - often
  lexicon: LSJ
  rationale: The adverb literally means 'many times' or 'often.' Here it intensifies
    the repeated threat. Retaining 'many times' stays close to the Greek, though the
    sense overlaps with 'repeatedly.'
- source_word: διαρπασθῆναι
  chosen: to be plundered
  alternatives:
  - to be sacked
  - to be pillaged
  - to be torn apart by looting
  lexicon: LSJ
  rationale: The verb denotes being plundered or pillaged. 'Plundered' preserves the
    concrete threat to the city without adding imagery not explicit in the Greek.
