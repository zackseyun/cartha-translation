id: 3MA.5.33
reference: 3 Maccabees 5:33
source:
  edition: lxx-swete-1909
  text: οὕτως ὁ Ἕρμων ἀπροσδόκητον ἐπικίνδυνον ὑπήνεγκεν ἀπειλήν· καὶ τῇ ὁράσει καὶ
    τῷ προσώπῳ συνεστάλη.
  language: Greek
  pages:
  - 744
  confidence: high
  validation: agree
translation:
  text: Thus Hermon endured an unexpected and dangerous threat, and he was shaken
    in appearance and countenance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he was distressed in look and face' or 'he shrank back in appearance
      and expression.' The Greek verb can convey visible contraction, intimidation,
      or emotional disturbance.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: Thus
  alternatives:
  - So
  - In this way
  lexicon: LSJ
  rationale: Introduces the result or manner of the preceding situation. 'Thus' preserves
    the concise inferential force in readable English.
- source_word: ὁ Ἕρμων
  chosen: Hermon
  rationale: Personal name is transliterated per project philosophy.
- source_word: ἀπροσδόκητον
  chosen: unexpected
  alternatives:
  - unforeseen
  - unlooked-for
  lexicon: LSJ
  rationale: The adjective denotes something not anticipated. 'Unexpected' is natural
    modern English and fits the suddenness of the threat.
- source_word: ἐπικίνδυνον
  chosen: dangerous
  alternatives:
  - perilous
  - threatening
  lexicon: LSJ
  rationale: Carries the sense of danger or peril. 'Dangerous' is the most straightforward
    contemporary rendering.
- source_word: ὑπήνεγκεν
  chosen: endured
  alternatives:
  - underwent
  - bore
  lexicon: LSJ
  rationale: From ὑποφέρω/ὑποφέρω-like usage, the sense is that he underwent or bore
    the threat. 'Endured' communicates experiencing and bearing up under it without
    overinterpreting.
- source_word: ἀπειλήν
  chosen: threat
  alternatives:
  - menace
  lexicon: LSJ
  rationale: Directly denotes a threat. 'Threat' is clear and sufficiently weighty.
- source_word: τῇ ὁράσει
  chosen: in appearance
  alternatives:
  - in look
  - to behold
  lexicon: LSJ
  rationale: Refers to outward appearance or visible aspect. 'In appearance' preserves
    the external, observable sense.
- source_word: τῷ προσώπῳ
  chosen: countenance
  alternatives:
  - face
  - expression
  lexicon: LSJ
  rationale: Literally 'face,' but paired with ὁράσει it likely intensifies his visible
    demeanor. 'Countenance' preserves the facial aspect without collapsing the two
    terms into one.
- source_word: συνεστάλη
  chosen: he was shaken
  alternatives:
  - he was distressed
  - he shrank back
  - he was drawn together
  lexicon: LSJ
  rationale: The verb can suggest being contracted, cowed, or emotionally affected.
    In context, after receiving a dangerous threat and with explicit reference to
    visible appearance, 'he was shaken' best captures the observable disturbance without
    forcing a purely physical or purely psychological reading.
