id: 3MA.5.16
reference: 3 Maccabees 5:16
source:
  edition: lxx-swete-1909
  text: ὃν ὁ βασιλεὺς λογισάμενος, καὶ τραπεὶς εἰς τὸν πότον, ἐκέλευσεν τοὺς παραγεγονότας
    ἐπὶ τὴν συμποσίαν ὑπὲρ ἀνακλίνα αὐτοῦ.
  language: Greek
  pages:
  - 743
  confidence: high
  validation: agree
translation:
  text: When the king considered this, and turned to drinking, he ordered those who
    had come to the banquet to recline around him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final phrase is textually and syntactically difficult in the Greek.
      It refers to the guests taking their places in reclining posture in relation
      to the king; 'around him' is a contextual rendering. Possible alternatives include
      'near him' or 'at his table position.'
    reason: textual_variant
lexical_decisions:
- source_word: λογισάμενος
  chosen: considered this
  alternatives:
  - having reflected on this
  - having taken this into account
  lexicon: LSJ
  rationale: Aorist middle participle of λογίζομαι, here indicating the king's mental
    consideration of the preceding matter before acting. 'Considered this' is natural
    English and preserves the causal/sequential sense.
- source_word: τραπεὶς εἰς τὸν πότον
  chosen: turned to drinking
  alternatives:
  - gave himself to drinking
  - turned to the wine
  lexicon: LSJ
  rationale: τραπείς ('having turned') with εἰς τὸν πότον idiomatically signals a
    shift into drinking. 'Turned to drinking' preserves the movement into revelry
    without over-paraphrasing. 'Wine' is possible by implication, but πότος is more
    broadly 'drinking' or 'carousal.'
- source_word: παραγεγονότας
  chosen: those who had come
  alternatives:
  - those present
  - those who had arrived
  lexicon: LSJ
  rationale: Perfect participle of πάρειμι/παραγίγνομαι referring to attendees who
    had come and were now present. 'Those who had come' keeps the verbal force and
    avoids flattening to a mere adjective.
- source_word: ἐπὶ τὴν συμποσίαν
  chosen: to the banquet
  alternatives:
  - for the drinking party
  - for the feast
  lexicon: LSJ
  rationale: συμποσία can denote a banquet or drinking party. Given the immediate
    mention of drinking, the convivial setting is clear; 'banquet' is readable modern
    English while still fitting the scene.
- source_word: ὑπὲρ ἀνακλίνα αὐτοῦ
  chosen: to recline around him
  alternatives:
  - to recline near him
  - to take places above him at table
  lexicon: LSJ
  rationale: The transmitted phrase is somewhat awkward, but ἀνακλίνω/ἀνακλίνομαι
    language belongs to table-reclining. ὑπέρ here likely conveys position in relation
    to the king's couch/place. 'Around him' gives the likely social-table sense without
    forcing an overly technical reconstruction.
