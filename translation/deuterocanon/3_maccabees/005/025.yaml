id: 3MA.5.25
reference: 3 Maccabees 5:25
source:
  edition: lxx-swete-1909
  text: οἱ δὲ Ἰουδαῖοι κατὰ τὸν ἀμερῆ ψυχοκοινού- μενοι χρόνον, πολυδάκρυν ἱκετίαν
    ἐν μέλεσιν γοεροῖς τείνοντες τὰς χεῖρας εἰς τὸν οὐρανὸν ἐδέοντο τοῦ μεγίστου θεοῦ
    πάλιν αὐτοῖς βοηθῆσαι συντόμως.
  language: Greek
  pages:
  - 743
  confidence: high
  validation: agree
translation:
  text: But the Jews, as the indivisible time drew them together in soul, stretched
    out their hands to heaven and, with mournful songs, offered a tearful plea, begging
    the greatest God to help them again without delay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being united in soul during that unbroken time.' The Greek expression
      is unusual and compact, combining the ideas of continuous time and inward communal
      unity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμερῆ
  chosen: indivisible
  alternatives:
  - undivided
  - unbroken
  lexicon: LSJ
  rationale: The adjective literally denotes something not divided. In the phrase
    κατὰ τὸν ἀμερῆ ... χρόνον it modifies χρόνον and conveys a continuous or undivided
    span of time. 'Indivisible' is slightly formal but preserves the unusual wording;
    the smoother sense is reflected in the clause structure.
- source_word: ψυχοκοινούμενοι
  chosen: drew them together in soul
  alternatives:
  - being united in spirit
  - sharing one soul
  lexicon: LSJ
  rationale: This rare compound suggests becoming common or united at the level of
    the soul/life. Rather than a wooden 'being soul-shared,' the rendering expresses
    communal inward unity while staying close to the imagery.
- source_word: πολυδάκρυν ἱκετίαν
  chosen: a tearful plea
  alternatives:
  - much-weeping supplication
  - a supplication with many tears
  lexicon: LSJ
  rationale: The phrase denotes supplication characterized by abundant tears. 'Tearful
    plea' is idiomatic modern English while preserving the emotional force.
- source_word: ἐν μέλεσιν γοεροῖς
  chosen: with mournful songs
  alternatives:
  - in lamenting melodies
  - with wailing strains
  lexicon: LSJ
  rationale: μέλεσιν refers to songs, strains, or musical members; γοεροῖς adds lamenting,
    mournful quality. 'With mournful songs' captures the likely sense of sung lament
    accompanying prayer.
- source_word: τείνοντες τὰς χεῖρας εἰς τὸν οὐρανόν
  chosen: stretched out their hands to heaven
  alternatives:
  - extended their hands toward heaven
  lexicon: LSJ
  rationale: A conventional prayer gesture. 'To heaven' is natural English and preserves
    the upward direction of prayer.
- source_word: ἐδέοντο
  chosen: begging
  alternatives:
  - imploring
  - beseeching
  lexicon: LSJ
  rationale: The verb expresses earnest petition. 'Begging' fits the desperate tone
    of the scene, though the full sentence also includes 'offered a tearful plea'
    to reflect the broader supplicatory language.
- source_word: τοῦ μεγίστου θεοῦ
  chosen: the greatest God
  alternatives:
  - the Most High God
  - the supreme God
  lexicon: LSJ
  rationale: The Greek is literally 'the greatest God.' While 'Most High God' is a
    familiar biblical title, it would import wording not present here. The literal
    superlative is retained.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: LSJ
  rationale: The adverb indicates renewed divine intervention, implying prior help.
    'Again' is the most direct rendering.
- source_word: συντόμως
  chosen: without delay
  alternatives:
  - quickly
  - soon
  lexicon: LSJ
  rationale: The adverb can mean briefly or promptly; in this prayer context it asks
    for swift action. 'Without delay' conveys urgency clearly.
