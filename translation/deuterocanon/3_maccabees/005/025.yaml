theological_decisions:
- issue: Rendering τοῦ μεγίστου θεοῦ
  chosen_reading: the greatest God
  alternative_readings:
  - the Most High God
  - the supreme God
  rationale: The phrase is a superlative description of God, not one of the specifically
    listed contested doctrinal terms. A more traditional title like 'Most High' is
    possible, but the Greek wording is more directly preserved by 'the greatest God.'
