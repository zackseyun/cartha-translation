id: 3MA.5.24
reference: 3 Maccabees 5:24
source:
  edition: lxx-swete-1909
  text: τὰ δὲ κατὰ τὴν πόλιν πλήθη συνῄθροιστο πρὸς τὴν οἰκτρότατην θεωρίαν, προσδοκῶντα
    τὴν πρωίαν μετὰ σπουδῆς.
  language: Greek
  pages:
  - 743
  confidence: high
  validation: agree
translation:
  text: And the crowds throughout the city were gathering for the most pitiful spectacle,
    eagerly awaiting the morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to witness the most pitiable sight.' The Greek θεωρία can refer either
      to the act of viewing or to the spectacle viewed.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ... πλήθη
  chosen: the crowds
  alternatives:
  - the multitudes
  - the masses
  lexicon: LSJ
  rationale: πλήθη is a plural noun for large groups of people. 'Crowds' is natural
    modern English and preserves the sense of numerous assembled people without sounding
    archaic.
- source_word: κατὰ τὴν πόλιν
  chosen: throughout the city
  alternatives:
  - in the city
  - around the city
  lexicon: LSJ
  rationale: The phrase indicates distribution within the city rather than motion
    around it. 'Throughout the city' captures the sense that the city's populace broadly
    participated.
- source_word: συνῄθροιστο
  chosen: were gathering
  alternatives:
  - had gathered
  - were assembling
  lexicon: LSJ
  rationale: The imperfect/middle form conveys an ongoing or inceptive assembling.
    'Were gathering' reflects the durative aspect better than the simple past 'gathered.'
- source_word: πρὸς τὴν οἰκτρότατην θεωρίαν
  chosen: for the most pitiful spectacle
  alternatives:
  - to witness the most pitiable sight
  - for the most wretched spectacle
  lexicon: LSJ
  rationale: θεωρία can denote a viewing or spectacle; οἰκτρότατην is the superlative
    of 'pitiful/pitiable/wretched.' 'For the most pitiful spectacle' preserves both
    the public-viewing nuance and the pathos of the scene. 'Spectacle' also fits the
    grim public character of the event.
- source_word: προσδοκῶντα
  chosen: awaiting
  alternatives:
  - expecting
  - looking for
  lexicon: LSJ
  rationale: The participle expresses expectation directed toward what is coming next.
    'Awaiting' is idiomatic with a temporal object and fits the solemn tone.
- source_word: τὴν πρωίαν
  chosen: the morning
  alternatives:
  - daybreak
  - the dawn
  lexicon: LSJ
  rationale: The noun refers to morning time. 'The morning' is the most straightforward
    rendering; 'dawn/daybreak' would be slightly more specific than the Greek requires.
- source_word: μετὰ σπουδῆς
  chosen: eagerly
  alternatives:
  - with eagerness
  - with urgency
  lexicon: LSJ
  rationale: The phrase denotes earnestness, zeal, or haste. 'Eagerly' communicates
    the adverbial force smoothly in English, though the context is grim rather than
    positive.
