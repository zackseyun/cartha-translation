id: 3MA.5.40
reference: 3 Maccabees 5:40
source:
  edition: lxx-swete-1909
  text: Βασιλεῦ, μέχρι τίνος ὡς ἡμᾶς διαπειράζεις, προστάσσων ἤδη τρίτον αὐτοὺς ἀφανίσαι,
    καὶ πάλιν ἐπὶ τῶν πραγμάτων ἐκ μεταβολῆς ἀναλύων τὰ Α σοὶ δεδογμένα;
  language: Greek
  pages:
  - 744
  confidence: high
  validation: agree
translation:
  text: O king, how long will you keep testing us, by now commanding for the third
    time that they be destroyed, and then again, in the matter at hand, reversing
    by a change of mind the decisions you have made?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'undoing your decrees.' The Greek τὰ σοὶ δεδογμένα can refer specifically
      to what has been officially decreed by the king, not merely private decisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαπειράζεις
  chosen: keep testing
  alternatives:
  - test
  - try
  - put to the test
  lexicon: LSJ
  rationale: The verb conveys repeated or thorough testing/probing. The present tense
    with μέχρι τίνος supports an ongoing sense, so 'keep testing' captures both aspect
    and rhetorical force.
- source_word: προστάσσων
  chosen: commanding
  alternatives:
  - ordering
  - directing
  lexicon: LSJ
  rationale: A participle explaining how the king is 'testing' them. 'Commanding'
    is direct and preserves the official force of the verb.
- source_word: ἤδη τρίτον
  chosen: by now ... for the third time
  alternatives:
  - already a third time
  - now for the third time
  lexicon: LSJ
  rationale: ἤδη marks the action as having reached this point already; τρίτον indicates
    repetition. The English phrasing preserves both ideas naturally.
- source_word: αὐτοὺς ἀφανίσαι
  chosen: that they be destroyed
  alternatives:
  - to destroy them
  - that they be annihilated
  - that they perish
  lexicon: LSJ
  rationale: ἀφανίζω here refers to causing persons to be wiped out/destroyed. Passive
    English ('that they be destroyed') fits the infinitival construction after προστάσσων
    and keeps the focus on the victims.
- source_word: ἐπὶ τῶν πραγμάτων
  chosen: in the matter at hand
  alternatives:
  - in these affairs
  - in the circumstances
  - in the business itself
  lexicon: LSJ
  rationale: The phrase points to the present case/situation under discussion. 'In
    the matter at hand' is idiomatic modern English without over-paraphrasing.
- source_word: ἐκ μεταβολῆς
  chosen: by a change of mind
  alternatives:
  - by a reversal
  - through change
  - after changing
  lexicon: LSJ
  rationale: Literally 'from a change' or 'out of a change,' referring to reversal
    of intention/decision. 'By a change of mind' makes the sense explicit in readable
    English.
- source_word: ἀναλύων
  chosen: reversing
  alternatives:
  - undoing
  - setting aside
  - rescinding
  lexicon: LSJ
  rationale: In context the participle describes undoing prior decrees. 'Reversing'
    is clear and fits the complaint that the king keeps changing course.
- source_word: τὰ ... σοὶ δεδογμένα
  chosen: the decisions you have made
  alternatives:
  - your decrees
  - what has been decreed by you
  - your settled decisions
  lexicon: LSJ
  rationale: δεδογμένα denotes what has seemed good/been resolved or decreed. 'The
    decisions you have made' is understandable and preserves the sense of royal determinations
    without sounding overly technical.
