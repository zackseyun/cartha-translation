id: 3MA.5.10
reference: 3 Maccabees 5:10
source:
  edition: lxx-swete-1909
  text: ὁ δὲ Ἕρμων τοὺς ἀνηλεῖς ἐλέφαντας ποτίσας πεπληρωμένους τῆς τοῦ οἴνου πολλῆς
    χορηγίας καὶ τοῦ λιβάνου μεμεστωμένους, ὄρθριος ἐπὶ τὴν αὐλὴν παρῆν περὶ τούτων
    προσαγγεῖλαι τῷ βασιλεῖ.
  language: Greek
  pages:
  - 742
  confidence: high
  validation: agree
translation:
  text: But Hermon, after giving the savage elephants drink, filled with an abundant
    supply of wine and saturated with frankincense, came early in the morning to the
    court to report these things to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'merciless elephants.' The Greek adjective can emphasize pitiless ferocity.
    reason: lexical_alternative
  - marker: b
    text: '''Frankincense'' translates λίβανος specifically, not incense in general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνηλεῖς
  chosen: savage
  alternatives:
  - merciless
  - pitiless
  - cruel
  lexicon: LSJ
  rationale: The adjective describes the elephants as fierce and without pity. 'Savage'
    is natural English for dangerous animals and preserves the sense without sounding
    overly abstract.
- source_word: ποτίσας
  chosen: after giving ... drink
  alternatives:
  - having watered
  - having made ... drink
  lexicon: LSJ
  rationale: 'The participle indicates prior action: Hermon caused the elephants to
    drink. ''After giving ... drink'' is idiomatic and keeps the causal sense better
    than the more agricultural ''watered''.'
- source_word: πεπληρωμένους τῆς τοῦ οἴνου πολλῆς χορηγίας
  chosen: filled with an abundant supply of wine
  alternatives:
  - filled from the plentiful provision of wine
  - made full with much wine
  lexicon: LSJ
  rationale: The perfect participle plus genitive phrase conveys that the elephants
    had been filled by a large provision of wine. 'Abundant supply of wine' captures
    both quantity and the provisioning nuance of χορηγία.
- source_word: τοῦ λιβάνου μεμεστωμένους
  chosen: saturated with frankincense
  alternatives:
  - filled with incense
  - laden with frankincense
  lexicon: LSJ
  rationale: λίβανος specifically denotes frankincense, not incense in general. μεμεστωμένους
    suggests being full or replete; 'saturated' conveys the heavy, overpowering sense
    in context.
- source_word: ὄρθριος
  chosen: early in the morning
  alternatives:
  - at daybreak
  - early
  lexicon: LSJ
  rationale: The adverbial adjective marks an early-morning arrival. 'Early in the
    morning' is clear modern English and avoids over-specifying the exact hour.
- source_word: αὐλήν
  chosen: court
  alternatives:
  - palace court
  - courtyard
  lexicon: LSJ
  rationale: In royal context αὐλή commonly refers to the court or palace precincts.
    'Court' is concise and fits the setting of appearing before the king; 'courtyard'
    would narrow the sense too much to architecture alone.
- source_word: προσαγγεῖλαι
  chosen: to report
  alternatives:
  - to announce
  - to inform
  lexicon: LSJ
  rationale: 'The infinitive expresses purpose: Hermon came in order to bring a report
    to the king. ''Report'' fits the official setting and the administrative tone.'
