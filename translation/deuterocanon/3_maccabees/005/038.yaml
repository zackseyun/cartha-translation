- issue: Rendering Ἰουδαῖοι in a diaspora Hellenistic context
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  rationale: The context concerns the people identified by Jewish ethnicity/religion
    under Ptolemaic rule, not a narrowly geographic designation. This is a historical-lexical
    rather than doctrinal choice, but it affects interpretation and is therefore documented.
