id: 3MA.5.38
reference: 3 Maccabees 5:38
source:
  edition: lxx-swete-1909
  text: τοὺς ἐλέφαντας ἔτι καὶ νῦν καθόπλισον εἰς τὴν αὔριον ἐπὶ τὸν τῶν Ἰουδαίων
    ἀφανισμόν.
  language: Greek
  pages:
  - 744
  confidence: high
  validation: agree
translation:
  text: Arm the elephants even now for tomorrow, for the destruction of the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the annihilation of the Jews.' The Greek noun can denote utter destruction
      or obliteration.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Judeans,' though in this context the broader ethnic-religious sense
      'the Jews' is more likely.
    reason: alternative_reading
lexical_decisions:
- source_word: καθόπλισον
  chosen: arm
  alternatives:
  - equip
  - fully arm
  - prepare for battle
  lexicon: LSJ
  rationale: The imperative calls for military outfitting/preparation. 'Arm' is concise
    and natural in English, while still conveying battle-readiness better than the
    broader 'equip.'
- source_word: ἔτι καὶ νῦν
  chosen: even now
  alternatives:
  - still now
  - at once
  - already now
  lexicon: LSJ
  rationale: The phrase intensifies urgency. 'Even now' preserves the emphatic sense
    without overparaphrasing; 'at once' is possible but slightly more interpretive.
- source_word: εἰς τὴν αὔριον
  chosen: for tomorrow
  alternatives:
  - for the morrow
  - for the next day
  - against tomorrow
  lexicon: LSJ
  rationale: This idiom points to preparation with tomorrow in view. 'For tomorrow'
    is idiomatic modern English and keeps the temporal force.
- source_word: ἐπὶ τὸν ... ἀφανισμόν
  chosen: for the destruction of
  alternatives:
  - for the annihilation of
  - for the extermination of
  - toward the destruction of
  lexicon: LSJ
  rationale: ἀφανισμός denotes destruction/obliteration. 'Destruction' is strong and
    direct while avoiding a potentially over-specified modern term like 'extermination'
    unless context requires it.
- source_word: τῶν Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: LSJ
  rationale: In 3 Maccabees this term refers to the Jewish people as an ethnic-religious
    group in diaspora context, not merely inhabitants of Judea. 'The Jews' best fits
    the narrative setting.
