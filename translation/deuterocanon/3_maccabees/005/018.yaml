id: 3MA.5.18
reference: 3 Maccabees 5:18
source:
  edition: lxx-swete-1909
  text: ἐπὶ πλεῖον δὲ προσκοπτούσης τῆς ὁμιλίας, τὸν Ἕρμωνα προσκαλεσάμενος ὁ βασιλεύς,
    μετὰ πικρίας ἀπειλῆς ἐπυνθάνετο τίνος ἕνεκεν αἰτίας ἰάθησαν οἱ Ἰουδαῖοι τὴν περιοῦσαν
    ἡμέραν περιβεβιωκότες.
  language: Greek
  pages:
  - 743
  confidence: high
  validation: agree
translation:
  text: But as the conversation kept dragging on, the king summoned Hermon and, with
    a bitter threat, asked for what reason the Jews had been spared, having survived
    beyond the appointed day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'why the Jews had been preserved/healed, having lived
      through the remaining day.' The Greek wording is compressed and somewhat difficult;
      the translation takes it to mean that they remained alive past the day set for
      them.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκοπτούσης
  chosen: kept dragging on
  alternatives:
  - continued
  - was delayed
  - stumbled onward
  lexicon: LSJ
  rationale: The participle with ἐπὶ πλεῖον indicates prolongation or continued hindrance
    in the discussion. 'Kept dragging on' captures the sense that the exchange was
    extending unpleasantly, not merely neutrally continuing.
- source_word: ὁμιλίας
  chosen: conversation
  alternatives:
  - discussion
  - speech
  - interview
  lexicon: LSJ
  rationale: In context this refers to the ongoing exchange before the king. 'Conversation'
    is natural English and fits the narrative setting better than the more formal
    'speech.'
- source_word: προσκαλεσάμενος
  chosen: summoned
  alternatives:
  - called for
  - called to himself
  lexicon: LSJ
  rationale: The middle participle indicates the king had Hermon brought before him.
    'Summoned' conveys royal authority and urgency.
- source_word: μετὰ πικρίας ἀπειλῆς
  chosen: with bitter threat
  alternatives:
  - with a bitter threat
  - with harsh menace
  - in angry threatening
  lexicon: LSJ
  rationale: The phrase expresses the hostile manner of the king's inquiry. Singular
    'threat' follows the Greek closely; 'bitter' preserves πικρίας rather than softening
    it to merely 'harsh.'
- source_word: ἐπυνθάνετο
  chosen: asked
  alternatives:
  - inquired
  - questioned
  lexicon: LSJ
  rationale: A straightforward narrative verb of inquiry. 'Asked' is idiomatic modern
    English; the threatening manner is already conveyed by the preceding phrase.
- source_word: τίνος ἕνεκεν αἰτίας
  chosen: why
  alternatives:
  - for what reason
  - on account of what cause
  lexicon: LSJ
  rationale: The Greek is emphatic ('for what reason/cause'), but idiomatic English
    compresses this naturally to 'why' without loss of meaning.
- source_word: ἰάθησαν
  chosen: had been spared
  alternatives:
  - had been healed
  - had been preserved
  - had been saved
  lexicon: LSJ
  rationale: Although the verb commonly means 'were healed,' in this context the Jews
    are not being cured of illness but preserved from destruction. 'Had been spared'
    best fits the narrative sense of escaping the king's intended action.
- source_word: περιοῦσαν ἡμέραν
  chosen: the appointed day
  alternatives:
  - the extra day
  - the remaining day
  - the following day
  lexicon: LSJ
  rationale: The phrase is difficult, but in context it refers to the critical day
    fixed for their destruction, now passed or exceeded. 'Appointed day' communicates
    the narrative force better than a wooden rendering like 'remaining day.'
- source_word: περιβεβιωκότες
  chosen: having survived beyond
  alternatives:
  - having lived through
  - having remained alive past
  - having outlived
  lexicon: LSJ
  rationale: The perfect participle emphasizes continued survival past an expected
    limit. 'Having survived beyond' preserves both the completed survival and the
    sense of going past the designated time.
