id: 3MA.5.1
reference: 3 Maccabees 5:1
source:
  edition: lxx-swete-1909
  text: Τότε προσκαλεσάμενος Ἕρμωνα τὸν πρὸς τῇ τῶν ἐλεφάντων ἐπιμελείᾳ, βαρείᾳ μεμεστωμένος
    ὀργῇ καὶ χόλῳ κατὰ πᾶν ἀμετά-
  language: Greek
  pages:
  - 742
  confidence: high
  validation: agree
translation:
  text: Then, summoning Hermon, who was in charge of the elephants, filled with heavy
    anger and wrath in every way unchangeable,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek line in the source page breaks off at ''ἀμετά-''. The translation
      reflects the most likely sense from the visible text and immediate context:
      his anger was unyielding or not to be changed.'
    reason: textual_variant
  - marker: b
    text: Or 'implacable' for the final adjective, if the broken word is understood
      more idiomatically in context rather than more literally as 'unchangeable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: LSJ
  rationale: Standard temporal/sequential adverb introducing the next action in the
    narrative.
- source_word: προσκαλεσάμενος
  chosen: summoning
  alternatives:
  - calling to himself
  - having summoned
  lexicon: LSJ
  rationale: Aorist middle participle indicating the king's initiating action before
    the main description. 'Summoning' is natural English and preserves the participial
    linkage.
- source_word: Ἕρμωνα
  chosen: Hermon
  rationale: Personal name is transliterated per project philosophy.
- source_word: τὸν πρὸς τῇ τῶν ἐλεφάντων ἐπιμελείᾳ
  chosen: who was in charge of the elephants
  alternatives:
  - the one assigned to the care of the elephants
  - the official over the elephants
  lexicon: LSJ
  rationale: The phrase identifies Hermon by his administrative responsibility. 'In
    charge of the elephants' is idiomatic and accurately reflects ἐπιμέλεια as oversight/care.
- source_word: βαρείᾳ
  chosen: heavy
  alternatives:
  - grievous
  - weighty
  lexicon: LSJ
  rationale: Used adverbially with the emotional state; 'heavy' preserves the metaphor
    of oppressive intensity.
- source_word: μεμεστωμένος
  chosen: filled with
  alternatives:
  - full of
  - saturated with
  lexicon: LSJ
  rationale: Perfect participle conveying a state of being thoroughly filled. 'Filled
    with' is the clearest modern equivalent.
- source_word: ὀργῇ
  chosen: anger
  alternatives:
  - rage
  lexicon: LSJ
  rationale: A common term for anger/indignation. 'Anger' is broad enough to pair
    naturally with χόλος without over-intensifying one term at the expense of the
    other.
- source_word: καὶ χόλῳ
  chosen: and wrath
  alternatives:
  - and fury
  - and bitterness
  lexicon: LSJ
  rationale: χόλος can denote wrath or fierce anger. Rendering it as 'wrath' preserves
    the rhetorical doubling with ὀργή while distinguishing the terms.
- source_word: κατὰ πᾶν
  chosen: in every way
  alternatives:
  - altogether
  - completely
  lexicon: LSJ
  rationale: Idiomatic expression intensifying the description. 'In every way' keeps
    the distributive force without collapsing it into a mere adverb.
- source_word: ἀμετά-
  chosen: unchangeable
  alternatives:
  - implacable
  - unyielding
  lexicon: LSJ
  rationale: The surviving line ends with a hyphenated break, but the visible form
    clearly begins a word built on μετα- with privative alpha. In context of anger,
    the sense is that his wrath was not to be turned or altered. 'Unchangeable' stays
    close to the visible morphology while acknowledging the line-break truncation.
