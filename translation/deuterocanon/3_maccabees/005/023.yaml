id: 3MA.5.23
reference: 3 Maccabees 5:23
source:
  edition: lxx-swete-1909
  text: Ἄρτι δὲ ἀλεκτρυὼν ἐκέκραγεν ὄρθρος, καὶ τὰ θηρία καθωπλικὼς ὁ Ἕρμων ἐν τῷ
    μεγάλῳ περιστυλίῳ διεκίνει.
  language: Greek
  pages:
  - 743
  confidence: high
  validation: agree
translation:
  text: But just then, when the rooster had crowed at dawn, Hermon, having armed the
    beasts, was driving them on in the great colonnade.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the large peristyle' or 'in the large colonnaded court.' The Greek
      περιστύλιον names a colonnaded architectural space.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄρτι δὲ
  chosen: But just then
  alternatives:
  - And now
  - But now
  - At that moment
  lexicon: LSJ
  rationale: ἄρτι commonly marks immediacy ('just now/just then'). δέ is lightly adversative
    or transitional; 'But just then' preserves the narrative turn and urgency.
- source_word: ἀλεκτρυὼν ἐκέκραγεν
  chosen: the rooster had crowed
  alternatives:
  - a cock crowed
  - the cock crowed
  lexicon: LSJ
  rationale: ἀλέκτρυων is 'rooster/cock.' Modern English prefers 'rooster.' The pluperfect-like
    sense in context is well conveyed by 'had crowed' as part of the temporal scene-setting.
- source_word: ὄρθρος
  chosen: dawn was breaking
  alternatives:
  - it was dawn
  - daybreak
  lexicon: LSJ
  rationale: ὄρθρος denotes early dawn/daybreak. Because it stands appositionally
    with the preceding clause, 'dawn was breaking' gives natural English while preserving
    the temporal setting.
- source_word: τὰ θηρία
  chosen: the beasts
  alternatives:
  - the animals
  - the wild beasts
  lexicon: LSJ
  rationale: In this execution-arena context, θηρία refers to dangerous animals rather
    than animals generally. 'Beasts' preserves the menace without over-specifying
    beyond the Greek.
- source_word: καθωπλικὼς
  chosen: having armed
  alternatives:
  - having equipped
  - having prepared
  lexicon: LSJ
  rationale: The participle from καθοπλίζω means to arm or fully equip. Here it likely
    means outfitting/preparing the beasts for attack; 'having armed' is the most direct
    rendering, even though metaphorical in English.
- source_word: διεκίνει
  chosen: was driving them on
  alternatives:
  - was setting them in motion
  - was leading them through
  - was moving them about
  lexicon: LSJ
  rationale: διακινέω can mean move about, stir up, set in motion. In context with
    armed beasts in a large court, 'was driving them on' best captures active handling
    toward the intended spectacle or assault.
- source_word: ἐν τῷ μεγάλῳ περιστυλίῳ
  chosen: in the great colonnade
  alternatives:
  - in the great peristyle
  - in the large colonnaded court
  lexicon: LSJ
  rationale: περιστύλιον is a peristyle, a colonnaded court or surrounding colonnade.
    'Great colonnade' is readable modern English while retaining the architectural
    sense; 'peristyle' is more technical.
- source_word: ὁ Ἕρμων
  chosen: Hermon
  rationale: Proper name transliterated per project philosophy.
