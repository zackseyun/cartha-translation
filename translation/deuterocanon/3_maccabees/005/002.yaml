id: 3MA.5.2
reference: 3 Maccabees 5:2
source:
  edition: lxx-swete-1909
  text: ἐκέλευσεν ὑπὸ τὴν ἐρχομένην ἡμέραν δαψιλέσι δράκεσι λιβανωτοῦ καὶ οἴνῳ πλείονι
    ἀκράτῳ ἅπαντας τοὺς ἐλέφαντας ποτίσαι, ὄντας τὸν ἀριθμὸν πεντακοσίους· καὶ ἀγριωθέντας
    τῇ τοῦ πόματος ἀφθόνῳ χορηγίᾳ εἰσαγαγεῖν πρὸς συνάντησιν τοῦ μόρου τῶν Ἰουδαίων.
  language: Greek
  pages:
  - 742
  confidence: high
  validation: minor_mismatch
translation:
  text: He ordered that, by the coming day, all the elephants—five hundred in number—be
    given drink with generous draughts of frankincense and with much unmixed wine,
    and that, once made savage by the abundant supply of drink, they be brought in
    for the destruction of the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the doom/death of the Jews.' The Greek phrase is literally 'for
      a meeting with the doom of the Jews,' an idiom expressing their intended destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκέλευσεν
  chosen: He ordered
  alternatives:
  - he commanded
  lexicon: LSJ
  rationale: Aorist of κελεύω denotes issuing an order/command. 'Ordered' is natural
    modern English and preserves the authoritative force without sounding overly stiff.
- source_word: ὑπὸ τὴν ἐρχομένην ἡμέραν
  chosen: by the coming day
  alternatives:
  - for the next day
  - under the approaching day
  lexicon: LSJ
  rationale: Idiomatic temporal expression indicating the time by which the order
    was to be carried out. 'By the coming day' keeps the forward-looking temporal
    sense while remaining readable.
- source_word: δαψιλέσι
  chosen: generous
  alternatives:
  - lavish
  - abundant
  lexicon: LSJ
  rationale: The adjective conveys abundance or lavishness. 'Generous' fits the collocation
    with 'draughts' in English and reflects the plentiful quantity.
- source_word: δράκεσι
  chosen: draughts
  alternatives:
  - cups
  - swallows
  - portions
  lexicon: LSJ
  rationale: Here the dative plural refers to quantities administered in drinking.
    'Draughts' best captures measured drinkings given to the elephants.
- source_word: λιβανωτοῦ
  chosen: frankincense
  alternatives:
  - incense
  lexicon: LSJ
  rationale: The noun specifically denotes frankincense rather than incense in general.
    The more precise term should be retained.
- source_word: οἴνῳ πλείονι ἀκράτῳ
  chosen: with much unmixed wine
  alternatives:
  - with a larger amount of undiluted wine
  - with plenty of neat wine
  lexicon: LSJ
  rationale: ἀκράτῳ means undiluted/unmixed, an important ancient detail because wine
    was commonly diluted. 'Much unmixed wine' is concise and accurate.
- source_word: ἅπαντας τοὺς ἐλέφαντας
  chosen: all the elephants
  alternatives:
  - every one of the elephants
  lexicon: LSJ
  rationale: Straightforward totalizing phrase; 'all the elephants' is the natural
    English equivalent.
- source_word: ὄντας τὸν ἀριθμὸν πεντακοσίους
  chosen: five hundred in number
  alternatives:
  - numbering five hundred
  - being five hundred
  lexicon: LSJ
  rationale: Participial phrase specifying the total. 'Five hundred in number' preserves
    the formal explanatory tone.
- source_word: ἀγριωθέντας
  chosen: made savage
  alternatives:
  - enraged
  - made wild
  lexicon: LSJ
  rationale: The passive participle indicates causing the elephants to become fierce/wild.
    'Made savage' conveys induced ferocity suitable to the context.
- source_word: τῇ τοῦ πόματος ἀφθόνῳ χορηγίᾳ
  chosen: by the abundant supply of drink
  alternatives:
  - by the lavish provision of the potion
  - by plentiful drink
  lexicon: LSJ
  rationale: χορηγία is provision/supply; πόμα is drink. The phrase explains the means
    by which the elephants were made savage. 'Abundant supply of drink' is clear and
    sufficiently literal.
- source_word: εἰσαγαγεῖν
  chosen: be brought in
  alternatives:
  - be led in
  - be introduced
  lexicon: LSJ
  rationale: Infinitive of purpose following the command. 'Be brought in' works idiomatically
    for animals being driven into a place.
- source_word: πρὸς συνάντησιν τοῦ μόρου τῶν Ἰουδαίων
  chosen: for the destruction of the Jews
  alternatives:
  - to meet the doom of the Jews
  - for an encounter ending in the Jews' death
  lexicon: LSJ
  rationale: μόρος denotes doom/death/destruction. In context the elephants are being
    prepared as instruments to kill the Jews, so 'for the destruction of the Jews'
    makes the sense explicit without adding beyond the context.
