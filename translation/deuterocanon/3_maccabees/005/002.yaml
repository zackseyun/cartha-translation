theological_decisions:
- issue: Rendering of τοῦ μόρου in a violent judicial context
  chosen_reading: for the destruction of the Jews
  alternative_readings:
  - to meet the doom of the Jews
  - for the death of the Jews
  rationale: This is not a doctrinally contested term in the DOCTRINE table, but it
    is interpretively weighty. The Greek genitive phrase is somewhat compressed; in
    context it refers to the intended lethal outcome for the Jews. 'Destruction' communicates
    the corporate and violent sense better than the more abstract 'doom.'
  doctrine_reference: Preserve theological tension rather than resolve it; here context
    sufficiently resolves the sense.
