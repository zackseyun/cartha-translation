id: 3MA.5.45
reference: 3 Maccabees 5:45
source:
  edition: lxx-swete-1909
  text: ὁ δὲ ἐλεφαντάρχης τὰ θηρία σχεδόν, ὡς εἶπεν, εἰς κατάστεμα μανιῶδες ἀγιοχὼς
    εὐωδεστάτοις πόμασιν οἴνῳ λελιβανωμένῳ, φοβερῶς κεκοσμημένα κατασκευαῖς,
  language: Greek
  pages:
  - 745
  confidence: high
  validation: minor_mismatch
translation:
  text: But the elephant-master, having brought the beasts almost, as he had said,
    into a frenzied condition with very fragrant drinks, with wine mixed with frankincense,
    and having fearfully adorned them with equipment,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek participle ἀγιοχὼς is textually and lexically difficult in this
      witness; the translation 'after bringing' reflects the probable contextual sense
      of the elephant-master's preparatory action toward the beasts.
    reason: textual_variant
  - marker: b
    text: Or 'with wine scented/perfumed with frankincense.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with trappings' instead of 'with equipment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεφαντάρχης
  chosen: elephant-master
  alternatives:
  - keeper of the elephants
  - elephant commander
  lexicon: LSJ
  rationale: A compound meaning the one in charge of elephants. 'Elephant-master'
    is concise and preserves the official/functional sense better than the vaguer
    'keeper.'
- source_word: τὰ θηρία
  chosen: the beasts
  alternatives:
  - the animals
  lexicon: LSJ
  rationale: In context these are the elephants prepared for execution. 'Beasts' preserves
    the elevated and ominous tone of θηρία better than the flatter 'animals.'
- source_word: σχεδόν
  chosen: almost
  alternatives:
  - nearly
  lexicon: LSJ
  rationale: Standard adverbial sense; 'almost' is the most natural modern English
    equivalent.
- source_word: εἰς κατάστεμα μανιῶδες
  chosen: into a frenzied state
  alternatives:
  - into a mad condition
  - into violent frenzy
  lexicon: LSJ
  rationale: The phrase denotes a condition or posture of madness/frenzy. 'Frenzied
    state' is readable modern English and preserves the sense without over-paraphrase.
- source_word: ἀγιοχὼς
  chosen: after bringing
  alternatives:
  - having led
  - having driven
  lexicon: LSJ
  rationale: The transmitted form is difficult, but in context it functions like a
    participle describing the handler's action toward the elephants before the main
    finite verb phrase continues. 'After bringing' captures the preparatory action
    and fits the syntax of the sentence.
- source_word: εὐωδεστάτοις πόμασιν
  chosen: by very fragrant drinks
  alternatives:
  - with most aromatic potions
  - with very sweet-smelling draughts
  lexicon: LSJ
  rationale: πόμασιν refers to things drunk; εὐωδεστάτοις intensifies their fragrance.
    'Very fragrant drinks' is idiomatic and keeps the sensory emphasis.
- source_word: οἴνῳ λελιβανωμένῳ
  chosen: with wine mixed with frankincense
  alternatives:
  - with wine perfumed with incense
  - with wine scented with frankincense
  lexicon: LSJ
  rationale: The perfect participle indicates wine treated with frankincense/libanos.
    'Mixed with frankincense' is concrete and accessible while preserving the likely
    preparation.
- source_word: φοβερῶς κεκοσμημένα
  chosen: making them terrifyingly adorned
  alternatives:
  - having adorned them fearsomely
  - making them dreadfully equipped
  lexicon: LSJ
  rationale: κεκοσμημένα means adorned/arranged; φοβερῶς gives the fearsome effect.
    The English keeps both the decorative and intimidating dimensions.
- source_word: κατασκευαῖς
  chosen: with equipment
  alternatives:
  - with trappings
  - with gear
  - with fittings
  lexicon: LSJ
  rationale: The term refers to the apparatus or trappings placed on the elephants.
    'Equipment' is broad enough to avoid over-specifying while still conveying external
    outfitting.
