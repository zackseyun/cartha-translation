theological_decisions:
- issue: Rendering the divine title sequence without collapsing its cumulative force
  chosen_reading: the almighty Lord, the ruler who rules over every power, their merciful
    God and Father
  alternative_readings:
  - the almighty Lord and sovereign over every ruler, their merciful God and Father
  - the almighty Lord, master of every dominion, their merciful God and Father
  rationale: The Greek stacks titles and descriptors in prayer. The translation preserves
    that accumulation rather than reducing it to a smoother but less forceful English
    phrase. 'Father' is retained because it is explicit in the source and should not
    be neutralized.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension;
    gender-accurate over gender-neutral'
