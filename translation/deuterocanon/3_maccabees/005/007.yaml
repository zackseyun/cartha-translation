id: 3MA.5.7
reference: 3 Maccabees 5:7
source:
  edition: lxx-swete-1909
  text: τὸν παντοκράτορα κύριον καὶ πάσης δυνάστην δυναστεύοντα,,, ἐλεήμονα θεὸν αὐτῶν
    καὶ πατέρα, δυσκαταπαύστῳ βοῇ πάντες μετὰ δακρύων ἐπεκαλέσαντο, δεόμενοι
  language: Greek
  pages:
  - 742
  confidence: high
  validation: agree
translation:
  text: They all called upon the almighty Lord, the sovereign over every dominion,
    their merciful God and Father, with tears and with an unceasing cry, begging him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the sovereign over every ruler/authority.' The Greek uses cognate terms
      for rulership, emphasizing God's supremacy over all dominion.
    reason: lexical_alternative
lexical_decisions:
- source_word: παντοκράτορα
  chosen: almighty
  alternatives:
  - all-powerful
  - sovereign over all
  lexicon: LSJ
  rationale: Standard rendering for παντοκράτωρ in biblical Greek; concise and natural
    in English while preserving the divine title's force.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Follows project default for κύριος as a divine title. 'Lord' fits both
    biblical convention and the reverential address here.
- source_word: πάσης δυνάστην δυναστεύοντα
  chosen: the ruler who rules over every power
  alternatives:
  - the sovereign who dominates every ruler
  - the one exercising lordship over every authority
  lexicon: LSJ
  rationale: The phrase is rhetorically emphatic, pairing cognate terms. I preserved
    the repetition with 'ruler who rules' rather than flattening it to a single abstract
    title. πάσης is taken comprehensively, and the sense is dominion over all powers/authorities.
- source_word: ἐλεήμονα
  chosen: merciful
  alternatives:
  - compassionate
  - full of mercy
  lexicon: LSJ
  rationale: '''Merciful'' is the most direct and idiomatic equivalent, preserving
    the covenantal/theological tone.'
- source_word: θεὸν αὐτῶν καὶ πατέρα
  chosen: their God and Father
  alternatives:
  - their God, their Father
  lexicon: LSJ
  rationale: The possessive naturally governs both nouns in English. This preserves
    both relational and theological force without over-expansion.
- source_word: δυσκαταπαύστῳ βοῇ
  chosen: with an unceasing cry
  alternatives:
  - with a cry hard to stop
  - with an incessant outcry
  lexicon: LSJ
  rationale: The adjective denotes something difficult to quiet or stop. 'Unceasing
    cry' captures the sustained, urgent sense in idiomatic English.
- source_word: πάντες
  chosen: They all
  alternatives:
  - all of them
  lexicon: LSJ
  rationale: Placed at the front in English to reflect the collective emphasis of
    the Greek.
- source_word: μετὰ δακρύων
  chosen: with tears
  alternatives:
  - amid tears
  - weeping
  lexicon: LSJ
  rationale: A direct and vivid rendering that preserves the emotional posture of
    the petitioners.
- source_word: ἐπεκαλέσαντο
  chosen: called upon
  alternatives:
  - invoked
  - appealed to
  lexicon: LSJ
  rationale: A standard rendering for prayerful invocation, fitting the religious
    context better than the more formal 'invoked' for general readers.
- source_word: δεόμενοι
  chosen: begging him
  alternatives:
  - imploring
  - making supplication
  lexicon: LSJ
  rationale: This participle expresses earnest entreaty. 'Begging him' is strong,
    natural English and matches the desperate tone.
