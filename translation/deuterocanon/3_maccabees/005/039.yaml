id: 3MA.5.39
reference: 3 Maccabees 5:39
source:
  edition: lxx-swete-1909
  text: οἱ δὲ συνανακείμενοι συγγενεῖς τὴν ἄσταθη διάνοιαν αὐτοῦ θαυμάζοντες, προεφέροντο
    τάδε
  language: Greek
  pages:
  - 744
  confidence: high
  validation: agree
translation:
  text: 'But the relatives who were reclining with him, marveling at his unstable
    state of mind, kept saying these things:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who were dining with him' or 'who sat at table with him'; the Greek
      specifically evokes the ancient custom of reclining at meals.
    reason: cultural_note
  - marker: b
    text: Literally, 'his unstable mind'; the phrase refers to his unsettled mental
      disposition.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνανακείμενοι
  chosen: who were reclining with him
  alternatives:
  - who were dining with him
  - who sat at table with him
  lexicon: LSJ
  rationale: The participle literally refers to sharing a meal while reclining at
    table. 'Reclining with him' preserves the ancient dining posture and remains natural
    enough in English; alternatives are possible but slightly less direct.
- source_word: συγγενεῖς
  chosen: relatives
  alternatives:
  - kinsmen
  - kinsfolk
  lexicon: LSJ
  rationale: The term denotes family relations or kin. 'Relatives' is clear modern
    English and avoids archaic tone.
- source_word: ἄσταθη
  chosen: unstable
  alternatives:
  - unsteady
  - fickle
  - inconstant
  lexicon: LSJ
  rationale: Here it modifies διάνοιαν and describes a wavering or unsettled mental
    disposition. 'Unstable' best captures the sense in readable modern English.
- source_word: διάνοιαν
  chosen: state of mind
  alternatives:
  - mind
  - thought
  - disposition
  lexicon: LSJ
  rationale: While literally 'mind' or 'understanding,' in this context the phrase
    refers to his mental disposition. 'State of mind' communicates the idiomatic sense
    more naturally in English.
- source_word: θαυμάζοντες
  chosen: marveling
  alternatives:
  - being astonished
  - wondering
  lexicon: LSJ
  rationale: The participle conveys astonishment or wonder. 'Marveling' preserves
    that sense without overinterpreting whether the reaction is positive or negative.
- source_word: προεφέροντο
  chosen: kept saying
  alternatives:
  - were putting forward
  - were saying
  - uttered
  lexicon: LSJ
  rationale: In context this introduces the speech that follows. The imperfect suggests
    continued or repeated action, which 'kept saying' reflects better than a simple
    past.
- source_word: τάδε
  chosen: these things
  alternatives:
  - the following
  - this
  lexicon: LSJ
  rationale: A standard speech-introduction formula pointing forward to the content
    of the next words. 'These things' is slightly formal but faithful; 'the following'
    would also work.
