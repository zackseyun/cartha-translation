id: 3MA.5.19
reference: 3 Maccabees 5:19
source:
  edition: lxx-swete-1909
  text: τοῦ δὲ ὑποδείξαντος ὅτι νυκτὸς τὸ προσταγὲν ἐπὶ τέλος ἠγοχέναι, καὶ τῶν φίλων
    αὐτῶν προσμαρτυρησάντων,
  language: Greek
  pages:
  - 743
  confidence: high
  validation: agree
translation:
  text: But when the one who had pointed out that during the night the order had been
    carried through to completion, and their friends had borne witness to it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek verb rendered 'had been carried through' is textually and morphologically
      difficult in Swete's witness, but the clause as a whole clearly indicates that
      the commanded action was reported as having been completed during the night.
    reason: textual_variant
lexical_decisions:
- source_word: ὑποδείξαντος
  chosen: had pointed out
  alternatives:
  - had shown
  - had reported
  - had indicated
  lexicon: LSJ
  rationale: The participle denotes making something known or indicating it. 'Pointed
    out' preserves the reporting/indicating sense without overstating it as a formal
    proclamation.
- source_word: νυκτός
  chosen: during the night
  alternatives:
  - by night
  - at night
  lexicon: LSJ
  rationale: The genitive of time is naturally rendered 'during the night' in contemporary
    English; this is slightly more explicit and readable than the more literal 'by
    night.'
- source_word: τὸ προσταγέν
  chosen: the order
  alternatives:
  - the command
  - what had been ordered
  lexicon: LSJ
  rationale: The articular participle from προστάσσω refers to what was commanded.
    'The order' is concise and idiomatic, while still reflecting an official command.
- source_word: ἐπὶ τέλος
  chosen: to completion
  alternatives:
  - fully
  - to the end
  - successfully
  lexicon: LSJ
  rationale: The phrase indicates completion or fulfillment. 'To completion' preserves
    the formal sense without importing the evaluative nuance of 'successfully.'
- source_word: ἠγοχέναι
  chosen: had been carried through
  alternatives:
  - had been accomplished
  - had been brought to pass
  lexicon: LSJ
  rationale: The form is difficult, but in context it conveys that the commanded action
    had been effected/completed. 'Had been carried through' fits the administrative-execution
    context and pairs naturally with 'to completion.'
- source_word: προσμαρτυρησάντων
  chosen: had borne witness to it
  alternatives:
  - had testified to it
  - had confirmed it
  lexicon: LSJ
  rationale: The compound verb means to add testimony or confirm by witness. 'Had
    borne witness to it' keeps the testimonial force; 'confirmed it' is possible but
    slightly flattens the legal/witness nuance.
- source_word: φίλων
  chosen: friends
  alternatives:
  - companions
  - associates
  lexicon: LSJ
  rationale: The ordinary sense is 'friends.' In court or royal settings it can shade
    toward 'associates,' but nothing in this clause requires weakening the plain relational
    term.
