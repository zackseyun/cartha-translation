theological_decisions:
- issue: Whether to make the heavenly help explicitly God's intervention
  chosen_reading: from heaven
  alternative_readings:
  - from God
  - from the Lord in heaven
  rationale: The Greek says only 'from heaven.' The text clearly implies divine aid,
    but the translation should preserve the source idiom and not insert an explicit
    divine name or title absent from the verse.
