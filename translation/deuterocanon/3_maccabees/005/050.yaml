id: 3MA.5.50
reference: 3 Maccabees 5:50
source:
  edition: lxx-swete-1909
  text: οὐ μὴν δὲ ἀλλὰ καὶ τὰς ἔμπροσθεν αὐτῶν γεγενημένας ἀντιλήψεις ἐξ οὐρανοῦ συνιδόντες,
    πρηνεῖς ὁμοθυμαδὸν ῥίψαντες ἑαυτούς, καὶ τὰ νήπια χωρίσαντες τῶν μαστῶν,
  language: Greek
  pages:
  - 745
  confidence: high
  validation: agree
translation:
  text: Yet nevertheless, when they also saw the help from heaven that had happened
    for them before, they all together threw themselves down face-first, and pulled
    the infants away from their mothers’ breasts,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the previous acts of help on their behalf'; the Greek refers to earlier
      assistance or deliverances experienced by them.
    reason: lexical_alternative
  - marker: b
    text: Literally 'separated the infants from the breasts,' that is, from nursing
      at their mothers’ breasts.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μὴν δὲ ἀλλὰ καὶ
  chosen: Yet nevertheless, when they also
  alternatives:
  - But indeed also
  - And yet nevertheless also
  lexicon: LSJ
  rationale: This clustered connective is emphatic and transitional. English needs
    smoothing, but the force of a strong turn in the narrative should be preserved.
    'Yet nevertheless' keeps the heightened rhetorical pivot, while 'also' reflects
    καί.
- source_word: τὰς ἔμπροσθεν αὐτῶν γεγενημένας ἀντιλήψεις
  chosen: the help ... that had happened for them before
  alternatives:
  - the former deliverances granted them
  - the previous acts of help on their behalf
  lexicon: LSJ
  rationale: ἀντιλήψεις denotes helps, supports, or acts of assistance/deliverance.
    Because γεγενημένας and ἔμπροσθεν αὐτῶν point to prior experienced interventions,
    'the help ... that had happened for them before' preserves both the eventive sense
    and the retrospective reference without over-interpreting as a technical 'deliverance'
    term.
- source_word: ἐξ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - from God in heaven
  - from the sky
  lexicon: LSJ
  rationale: Literally 'from heaven.' In this Jewish-Greek context it reverently denotes
    divine aid. 'From heaven' preserves the idiom without importing an explicit divine
    subject not stated in the Greek.
- source_word: συνιδόντες
  chosen: when they also saw
  alternatives:
  - having perceived
  - recognizing together
  lexicon: LSJ
  rationale: A participle of perception/realization. 'When they ... saw' gives natural
    English in sequence with the main verb while retaining the causal-temporal sense.
- source_word: πρηνεῖς
  chosen: face-first
  alternatives:
  - prone
  - face down
  lexicon: LSJ
  rationale: The word describes falling prone. 'Face-first' is vivid and idiomatic,
    though 'face down' is possible. Chosen to match the physicality of ῥίψαντες ἑαυτούς.
- source_word: ὁμοθυμαδόν
  chosen: all together
  alternatives:
  - with one accord
  - unanimously
  lexicon: LSJ
  rationale: The adverb conveys united action. 'All together' is modern and clear;
    'with one accord' is accurate but more traditional/archaic.
- source_word: ῥίψαντες ἑαυτούς
  chosen: threw themselves down
  alternatives:
  - cast themselves down
  - flung themselves down
  lexicon: LSJ
  rationale: The reflexive construction is forceful. 'Threw themselves down' preserves
    the intensity without sounding overly archaic.
- source_word: τὰ νήπια
  chosen: the infants
  alternatives:
  - the babies
  - the little children
  lexicon: LSJ
  rationale: νήπια here most naturally refers to very young children, especially given
    the nursing context. 'Infants' best fits the immediate mention of breasts.
- source_word: χωρίσαντες τῶν μαστῶν
  chosen: pulled ... away from their mothers’ breasts
  alternatives:
  - separated ... from the breasts
  - took ... from nursing
  lexicon: LSJ
  rationale: The Greek literally says 'having separated [them] from the breasts.'
    In English, the implied maternal reference should be made explicit for clarity.
    'Pulled ... away' reflects the urgency of the scene; 'their mothers’' is supplied
    from context.
