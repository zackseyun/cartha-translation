id: 3MA.5.21
reference: 3 Maccabees 5:21
source:
  edition: lxx-swete-1909
  text: εἰπόντος δὲ τοῦ βασιλέως, ἀσμένως πάντες μετὰ χαρᾶς οἱ παρόντες ὁμοῦ συναινέσαντες,
    εἰς τὸν ἴδιον οἶκον ἕκαστος ἀνέλυσε.
  language: Greek
  pages:
  - 743
  confidence: high
  validation: minor_mismatch
translation:
  text: And when the king had spoken, all who were present gladly consented together
    with joy, and each departed to his own house.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰπόντος
  chosen: when ... had spoken
  alternatives:
  - after ... spoke
  - upon ... speaking
  lexicon: LSJ
  rationale: Genitive absolute with δέ is best rendered idiomatically in English as
    a temporal clause. 'When the king had spoken' preserves the completed action prior
    to the response.
- source_word: ἀσμένως
  chosen: gladly
  alternatives:
  - willingly
  - with pleasure
  lexicon: LSJ
  rationale: The adverb conveys eager or pleased assent. 'Gladly' fits natural English
    and pairs well with the following explicit joy language without becoming too stiff.
- source_word: συναινέσαντες
  chosen: agreed
  alternatives:
  - consented
  - assented
  lexicon: LSJ
  rationale: The participle denotes giving approval or concurrence. 'Agreed' is clear
    modern English; 'consented' is possible but slightly narrower and more formal.
- source_word: ὁμοῦ
  chosen: together
  alternatives:
  - as one
  - jointly
  lexicon: LSJ
  rationale: The word emphasizes collective action. 'Together' is the most straightforward
    rendering and works naturally with 'all who were present.'
- source_word: μετὰ χαρᾶς
  chosen: with joy
  alternatives:
  - joyfully
  - rejoicing
  lexicon: LSJ
  rationale: The prepositional phrase is retained rather than absorbed entirely into
    an adverb so that both ἀσμένως and χαρά receive representation in English. This
    preserves the emphatic piling up of positive response terms.
- source_word: οἱ παρόντες
  chosen: those who were present
  alternatives:
  - the bystanders
  - the attendants
  - the ones present
  lexicon: LSJ
  rationale: A broad expression for those in attendance. 'Those who were present'
    is transparent and avoids over-specifying their role.
- source_word: ἀνέλυσε
  chosen: departed
  alternatives:
  - returned
  - went away
  lexicon: LSJ
  rationale: In context the verb means to leave or depart. 'Departed' preserves the
    movement away without implying more than the Greek states; 'returned' would overread
    the destination as a homecoming, though 'to his own house' suggests it.
- source_word: εἰς τὸν ἴδιον οἶκον
  chosen: to his own house
  alternatives:
  - to his own home
  lexicon: LSJ
  rationale: A literal but natural rendering. 'House' closely follows οἶκος; 'home'
    is possible, but 'house' keeps the concrete wording of the source.
