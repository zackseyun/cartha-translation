id: 3MA.5.36
reference: 3 Maccabees 5:36
source:
  edition: lxx-swete-1909
  text: Κατὰ δὲ τοὺς αὐτοὺς νόμους ὁ βασιλεὺς συστησάμενος πᾶν τὸ συμπόσιον, εἰς εὐφροσύνην
    τραπῆναι παρεκάλει.
  language: Greek
  pages:
  - 744
  confidence: high
  validation: agree
translation:
  text: Then the king, having arranged the whole banquet according to the same rules,
    urged them to turn to rejoicing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the same laws.' The Greek νόμοι can denote laws, rules, or customary
      regulations; here the banquet setting favors a procedural sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κατὰ
  chosen: according to
  alternatives:
  - in keeping with
  - under
  lexicon: LSJ
  rationale: With the accusative τοὺς αὐτοὺς νόμους, κατά expresses conformity or
    accordance, best rendered 'according to' in natural English.
- source_word: τοὺς αὐτοὺς νόμους
  chosen: the same rules
  alternatives:
  - the same laws
  - the same customs
  lexicon: LSJ
  rationale: νόμοι can mean laws, norms, or prescribed rules. In the setting of arranging
    a banquet, 'rules' best conveys practical regulations or procedures without overlegalizing
    the scene. 'Same' preserves αὐτούς.
- source_word: συστησάμενος
  chosen: having arranged
  alternatives:
  - having organized
  - having set in order
  lexicon: LSJ
  rationale: The participle indicates prior action by the king in putting the banquet
    together or setting it in order. 'Having arranged' is idiomatic and fits the banquet
    context.
- source_word: πᾶν τὸ συμπόσιον
  chosen: the whole banquet
  alternatives:
  - the entire feast
  - all the banquet
  lexicon: LSJ
  rationale: συμπόσιον denotes a banquet or drinking-feast. 'Banquet' is broad and
    readable; 'whole' reflects πᾶν naturally in English.
- source_word: εἰς εὐφροσύνην
  chosen: to rejoicing
  alternatives:
  - into gladness
  - to merriment
  - to cheerfulness
  lexicon: LSJ
  rationale: The phrase marks the goal or resulting state. 'To rejoicing' preserves
    the directional nuance of εἰς while remaining intelligible. 'Merriment' is possible
    but slightly more stylized.
- source_word: τραπῆναι
  chosen: to turn
  alternatives:
  - to be turned
  - to give themselves over
  lexicon: LSJ
  rationale: The aorist passive infinitive of τρέπω here functions idiomatically for
    changing one's state or disposition. 'To turn' keeps the metaphor and works smoothly
    with 'to rejoicing.'
- source_word: παρεκάλει
  chosen: urged them
  alternatives:
  - encouraged them
  - exhorted them
  - invited them
  lexicon: LSJ
  rationale: παρακαλέω can range from request to exhortation. In this festive context,
    the king is pressing or encouraging the guests toward cheer, so 'urged them' best
    captures the force. The object 'them' is implicit from context and required in
    English.
