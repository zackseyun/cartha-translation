id: 3MA.5.51
reference: 3 Maccabees 5:51
source:
  edition: lxx-swete-1909
  text: ἀνεβόησαν φωνῇ μεγάλῃ σφόδρα, τὸν τῆς ἁπάσης δυνάστην ἱκετεύοντες, οἰκτείραι
    μετὰ ἐπιφανείας αὐτοὺς ἤδη πρὸς πύλας ᾅδου καθεστῶτας. VI
  language: Greek
  pages:
  - 746
  confidence: high
  validation: agree
translation:
  text: They cried out very loudly, imploring the Sovereign of all to have mercy and
    visibly come to their aid, since they already stood at the gates of Hades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'show pity to them with a visible manifestation.' The Greek phrase 'with
      manifestation/appearing' may emphasize that the mercy sought was openly displayed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεβόησαν
  chosen: they cried out
  alternatives:
  - they shouted
  - they cried aloud
  lexicon: LSJ
  rationale: The verb denotes a loud outcry. 'Cried out' is natural English and preserves
    the urgent, collective appeal without over-specifying tone.
- source_word: φωνῇ μεγάλῃ σφόδρα
  chosen: very loudly
  alternatives:
  - with a very loud voice
  - with exceedingly great voice
  lexicon: LSJ
  rationale: The phrase intensifies the manner of crying out. 'Very loudly' captures
    both μεγάλη and σφόδρα in idiomatic modern English; a more formal rendering is
    possible but less readable.
- source_word: τὸν τῆς ἁπάσης δυνάστην
  chosen: the Sovereign of all
  alternatives:
  - the ruler of all
  - the master of all
  lexicon: LSJ
  rationale: 'δυνάστης denotes one who holds power or dominion. ''Sovereign'' best
    conveys supreme authority in elevated but accessible English. The genitive phrase
    ἁπάσης is taken comprehensively: ''of all.'''
- source_word: ἱκετεύοντες
  chosen: imploring
  alternatives:
  - beseeching
  - supplicating
  lexicon: LSJ
  rationale: The participle expresses earnest supplication. 'Imploring' is strong,
    readable English that preserves the desperate appeal.
- source_word: οἰκτείραι
  chosen: to have mercy
  alternatives:
  - to pity
  - to show compassion
  lexicon: LSJ
  rationale: The infinitive asks for compassionate intervention. 'Have mercy' fits
    the prayer context better than the more emotional but less idiomatic 'pity.'
- source_word: μετὰ ἐπιφανείας
  chosen: visibly come to their aid
  alternatives:
  - with manifestation
  - with appearing
  - openly
  lexicon: LSJ
  rationale: Literally 'with manifestation/appearing.' In context of a plea for divine
    intervention, the phrase likely means a manifest, evident act of rescue rather
    than merely inward compassion. The rendering makes explicit the implied intervention
    while preserving the sense of visible divine appearance.
- source_word: αὐτούς
  chosen: their aid
  alternatives:
  - them
  lexicon: LSJ
  rationale: The pronoun is the object of the mercy/intervention request. English
    idiom prefers expressing the implied goal of mercy here as aid to them; this is
    a modest dynamic adjustment for clarity.
- source_word: ἤδη
  chosen: already
  alternatives:
  - now already
  - by now
  lexicon: LSJ
  rationale: Marks the immediacy of their peril; 'already' is the most direct equivalent.
- source_word: πρὸς πύλας ᾅδου
  chosen: at the gates of Hades
  alternatives:
  - near the gates of Hades
  - at death's door
  lexicon: LSJ
  rationale: A spatial metaphor for extreme nearness to death. 'Hades' preserves the
    Greek term rather than flattening it to an English idiom like 'death's door.'
    'At' communicates imminent proximity naturally.
- source_word: καθεστῶτας
  chosen: stood
  alternatives:
  - having been placed
  - being situated
  lexicon: LSJ
  rationale: The participle describes their present state or position. 'Stood' is
    concise and idiomatic in English with the preceding spatial phrase.
