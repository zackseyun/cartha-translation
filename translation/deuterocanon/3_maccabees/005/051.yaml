theological_decisions:
- issue: Rendering ᾅδου in a Jewish-Greek deuterocanonical context
  chosen_reading: Hades
  alternative_readings:
  - the grave
  - the realm of the dead
  - death
  rationale: The Greek text explicitly uses ᾅδης. Following original-language primacy,
    'Hades' is retained rather than replaced with a more interpretive equivalent.
    This preserves the text's imagery and avoids importing later doctrinal specificity.
  doctrine_reference: Translation philosophy §1; Contested terms table does not override
    this term.
