id: 3MA.5.43
reference: 3 Maccabees 5:43
source:
  edition: lxx-swete-1909
  text: ἐπιστρατεύσαντα δὲ ἐπὶ τὴν Ἰουδαίαν, ἰσόπεδον πυρὶ καὶ δόρατι στήσεσθαι διὰ
    τάχους, καὶ τὸν ἄβατον ἡμῖν αὐτῶν ναὸν πυρὶ πρή[σα]ν[τα] ἐν τάχει τῶν συντελούντων
    ἐκεῖ θυσίαν εἰς τὸν ἅπαντα χρόνον καταστήσειν.
  language: Greek
  pages:
  - 745
  confidence: high
  validation: minor_mismatch
translation:
  text: But if he should campaign against Judea, he would quickly make it level with
    fire and spear, and after burning their sanctuary—untrodden by us—with fire, he
    would put a stop forever to those who perform sacrifice there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἄβατον literally means 'not to be trodden' or 'not to be entered';
      alternatively, 'their temple, forbidden to us.'
    reason: lexical_alternative
  - marker: b
    text: The Greek for 'after burning' is slightly uncertain in Swete's transcription,
      but the sense of setting the sanctuary on fire is clear.
    reason: textual_variant
lexical_decisions:
- source_word: ἐπιστρατεύσαντα
  chosen: should campaign against
  alternatives:
  - having campaigned against
  - march against
  - make war against
  lexicon: LSJ
  rationale: The participial form is governed by the surrounding reported speech and
    expresses the contemplated act of military action against Judea. 'Campaign against'
    preserves the military sense without over-specifying a single battle.
- source_word: ἰσόπεδον
  chosen: level
  alternatives:
  - razed flat
  - made even with the ground
  lexicon: LSJ
  rationale: The adjective/adverbial expression with στήσεσθαι conveys reducing something
    to a flat, level state. 'Level' is concise modern English and fits the idiom 'make
    it level with fire and spear.'
- source_word: πυρὶ καὶ δόρατι
  chosen: with fire and spear
  alternatives:
  - by fire and spear
  - with fire and the spear
  lexicon: LSJ
  rationale: An instrumental dative expressing means of devastation. 'Fire and spear'
    preserves the vivid paired instruments of destruction.
- source_word: στήσεσθαι
  chosen: make it
  alternatives:
  - set it
  - render it
  - cause it to become
  lexicon: LSJ
  rationale: 'In context with ἰσόπεδον, the verb means to cause Judea to stand as
    level/flat. English idiom requires an explicit object sense: ''make it level.'''
- source_word: διὰ τάχους / ἐν τάχει
  chosen: quickly
  alternatives:
  - with haste
  - at once
  - in short order
  lexicon: LSJ
  rationale: Both phrases emphasize speed. 'Quickly' and 'after burning...with fire'
    keep the sentence readable while preserving the urgency of the Greek.
- source_word: ἄβατον
  chosen: untrodden by us
  alternatives:
  - inaccessible to us
  - forbidden to us
  - not to be entered by us
  lexicon: LSJ
  rationale: Literally 'not to be trodden/entered.' The phrase refers to the temple
    as a place barred to Gentile access. 'Untrodden by us' keeps the concrete imagery
    and the first-person perspective of the speaker.
- source_word: ναόν
  chosen: sanctuary
  alternatives:
  - temple
  - shrine
  lexicon: LSJ
  rationale: ναός often denotes the temple sanctuary proper rather than the broader
    temple complex. 'Sanctuary' better reflects that narrower sense here, especially
    with ἄβατον.
- source_word: πρήσαντα
  chosen: after burning
  alternatives:
  - having set ablaze
  - after setting on fire
  lexicon: LSJ
  rationale: The transmitted text shows minor uncertainty in the letters, but the
    sense is clearly that of burning/setting fire. 'After burning' fits the participial
    sequence naturally in English while honestly reflecting the destructive action.
- source_word: τῶν συντελούντων ἐκεῖ θυσίαν
  chosen: those who perform sacrifice there
  alternatives:
  - those who offer sacrifice there
  - those ministering there in sacrifice
  lexicon: LSJ
  rationale: The phrase refers to those carrying out sacrificial service at the temple.
    'Perform sacrifice' is slightly wooden but stays close to the Greek verbal idea
    without importing later technical priestly terminology not explicit in the text.
- source_word: εἰς τὸν ἅπαντα χρόνον καταστήσειν
  chosen: put a stop forever
  alternatives:
  - abolish for all time
  - bring to an end permanently
  - cause to cease for all time
  lexicon: LSJ
  rationale: The idiom expresses permanent cessation. 'Put a stop forever' is readable
    modern English and preserves the durative finality of the phrase.
