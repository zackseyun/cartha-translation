theological_decisions:
- issue: Reference of the first-person plural in 'their sanctuary—untrodden by us'
  chosen_reading: The speaker refers to the Jewish sanctuary as inaccessible to non-Jews
    like himself and his audience.
  alternative_readings:
  - The phrase could be rendered more abstractly as 'their sanctuary, forbidden to
    us' without stressing physical entry imagery.
  rationale: This is not a doctrinally contested term, but it affects how the temple's
    sanctity and separation are conveyed. The concrete 'untrodden by us' best reflects
    ἄβατον while preserving the outsider perspective embedded in ἡμῖν.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering ναός
  chosen_reading: sanctuary
  alternative_readings:
  - temple
  rationale: Using 'sanctuary' avoids flattening the distinction between ναός and
    the broader temple precincts, and it suits the immediately preceding ἄβατον. No
    doctrinal claim is added; it is a lexical-theological precision choice.
  doctrine_reference: Translation philosophy §1, §5
