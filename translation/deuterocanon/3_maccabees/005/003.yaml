id: 3MA.5.3
reference: 3 Maccabees 5:3
source:
  edition: lxx-swete-1909
  text: ὁ μὲν τάδε προσταχθεὶς ἐτρέπετο πρὸς τὴν εὐωχίαν, συναγαγὼν τοὺς μάλιστα τῶν
    φίλων καὶ τῆς στρατιᾶς ἀπεχθῶς ἔχοντας πρὸς τοὺς Ἰουδαίους.
  language: Greek
  pages:
  - 742
  confidence: high
  validation: agree
translation:
  text: So the one who had been given these orders turned to feasting, gathering those
    of his friends and of the army who were most hostile toward the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'he who had been commanded these things turned to the
      banquet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ... προσταχθεὶς
  chosen: the one who had been given these orders
  alternatives:
  - the one who had been commanded these things
  - he who had been ordered thus
  lexicon: BDAG
  rationale: The articular participle with τάδε refers back to the person just commanded.
    'Had been given these orders' is natural English and preserves the passive sense
    without over-literal awkwardness.
- source_word: ἐτρέπετο
  chosen: turned to
  alternatives:
  - gave himself to
  - set himself toward
  lexicon: LSJ
  rationale: The imperfect middle here indicates directing oneself toward an activity.
    'Turned to' captures the movement into the next action in readable English.
- source_word: τὴν εὐωχίαν
  chosen: feasting
  alternatives:
  - banqueting
  - the banquet
  lexicon: LSJ
  rationale: The noun denotes festive eating/drinking. 'Feasting' is idiomatic and
    broad enough to include the convivial setting implied by the context.
- source_word: συναγαγὼν
  chosen: gathering
  alternatives:
  - having assembled
  - bringing together
  lexicon: BDAG
  rationale: This participle is contemporaneous or attendant to the main action. 'Gathering'
    keeps the flow smooth in English while preserving the sense.
- source_word: τοὺς μάλιστα τῶν φίλων καὶ τῆς στρατιᾶς
  chosen: those of his friends and of the army who were most
  alternatives:
  - the foremost among his friends and the army
  - those especially from his friends and the troops
  lexicon: LSJ
  rationale: The phrase identifies a subset drawn from both his friends and the military.
    Rendering it as 'those of his friends and of the army who were most...' best fits
    the following participle ἀπεχθῶς ἔχοντας.
- source_word: ἀπεχθῶς ἔχοντας πρὸς τοὺς Ἰουδαίους
  chosen: hostile toward the Jews
  alternatives:
  - ill-disposed toward the Jews
  - bearing hatred toward the Jews
  lexicon: LSJ
  rationale: The idiom conveys enmity or hostile disposition. 'Hostile toward' is
    clear modern English and preserves the negative force without exaggeration.
