id: 3MA.5.42
reference: 3 Maccabees 5:42
source:
  edition: lxx-swete-1909
  text: Ὅθεν ὁ κατὰ πάντα Φάλαρις βασιλεὺς ἐνπληθυνθεὶς ἀλογιστίας, καὶ τὰς γινομένας
    πρὸς ἐπισκοπὴν τῶν Ἰουδαίων ἐν αὐτῷ μεταβολὰς τῆς ψυχῆς παρ' οὐδὲν ἡγούμενος,
    ἀτελέστατον βεβαίως ὅρκον ὁρισάμενος τούτους μὲν ἀνυπερθέτως πέμψειν εἰς ἅιδην
    ἐν γόνασιν καὶ ποσὶν θηρίων ἠκισμένους,
  language: Greek
  pages:
  - 745
  confidence: high
  validation: agree
translation:
  text: Therefore the king, a Phalaris in every way, filled with irrationality and
    counting as nothing the changes of mind occurring within him regarding the oversight
    of the Jews, firmly making a most complete oath that he would without delay send
    these men to Hades, mangled in knees and feet by beasts,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Phalaris was a proverbial tyrant noted for extreme cruelty; the text compares
      the king to him rather than merely calling him cruel.
    reason: cultural_note
  - marker: b
    text: Or 'the realm of the dead' for 'Hades.'
    reason: lexical_alternative
  - marker: c
    text: The Greek says literally 'changes of soul,' an idiom for inner changes or
      shifts of heart.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅθεν
  chosen: Therefore
  alternatives:
  - For this reason
  - Hence
  lexicon: LSJ
  rationale: Marks an inferential conclusion from the preceding narrative; 'Therefore'
    is natural modern English and preserves the logical connection.
- source_word: ὁ κατὰ πάντα Φάλαρις βασιλεὺς
  chosen: the king, a Phalaris in every way
  alternatives:
  - the king, altogether like Phalaris
  - the king, utterly a Phalaris
  lexicon: LSJ
  rationale: The phrase compares the king to Phalaris, proverbial for cruelty. Retaining
    the proper name preserves the historical-literary allusion better than paraphrasing
    it as merely 'cruel.' Apposition in English communicates the comparison.
- source_word: ἐνπληθυνθεὶς ἀλογιστίας
  chosen: filled with irrationality
  alternatives:
  - made full of senselessness
  - filled with folly
  lexicon: LSJ
  rationale: ἀλογιστία denotes unreasoning folly or irrationality. 'Filled with irrationality'
    preserves both the passive/resultative sense and the moral-mental force.
- source_word: τὰς ... μεταβολὰς τῆς ψυχῆς
  chosen: the changes of soul
  alternatives:
  - the changes of heart
  - the changes in his inner disposition
  lexicon: LSJ
  rationale: Literally 'changes of the soul.' Although 'changes of heart' is idiomatic
    English, 'soul' is retained here to stay closer to the Greek and preserve the
    interior, psychological sense without over-idiomatizing.
- source_word: πρὸς ἐπισκοπὴν τῶν Ἰουδαίων
  chosen: for oversight of the Jews
  alternatives:
  - regarding the inspection of the Jews
  - with respect to the Jews' examination
  lexicon: LSJ
  rationale: ἐπισκοπή can denote inspection, visitation, or oversight. In this context
    of administrative attention to the Jews, 'oversight' is broad enough to preserve
    the Greek without forcing a narrower procedural nuance.
- source_word: παρ' οὐδὲν ἡγούμενος
  chosen: counting as nothing
  alternatives:
  - regarding as worthless
  - treating as of no account
  lexicon: LSJ
  rationale: This idiom means to consider something of no value or significance. 'Counting
    as nothing' is concise and close to the Greek.
- source_word: ἀτελέστατον ... ὅρκον
  chosen: an utterly unfulfillable oath
  alternatives:
  - a most impossible oath
  - a wholly ineffective oath
  lexicon: LSJ
  rationale: ἀτελέστατος literally suggests something not brought to completion, impossible
    to fulfill, or futile. Given the narrative irony that the oath will not be carried
    out, 'utterly unfulfillable' best captures the force.
- source_word: βεβαίως ὅρκον ὁρισάμενος
  chosen: firmly setting ... an oath
  alternatives:
  - solemnly determining an oath
  - resolutely making an oath
  lexicon: LSJ
  rationale: ὁρίζομαι here conveys fixing or determining; βεβαίως adds firmness/certainty.
    'Firmly setting an oath' preserves the deliberate, resolute tone.
- source_word: ἀνυπερθέτως
  chosen: without delay
  alternatives:
  - without postponement
  - immediately
  lexicon: LSJ
  rationale: The adverb means without putting off or deferring. 'Without delay' is
    idiomatic and accurate.
- source_word: πέμψειν εἰς ἅιδην
  chosen: send ... to Hades
  alternatives:
  - send ... to the grave
  - send ... to the realm of the dead
  lexicon: LSJ
  rationale: Ἅιδης is the Greek underworld/the realm of the dead. Because this is
    a Greek deuterocanonical text, retaining 'Hades' preserves the source-world imagery
    better than flattening it to 'grave.'
- source_word: ἐν γόνασιν καὶ ποσὶν
  chosen: in the knees and feet
  alternatives:
  - at the knees and feet
  - in their legs and feet
  lexicon: LSJ
  rationale: The prepositional phrase specifies the body parts affected by the beasts.
    'In the knees and feet' is literal, though somewhat stark, matching the violent
    imagery.
- source_word: θηρίων ἠκισμένους
  chosen: cruelly mangled by beasts
  alternatives:
  - tormented by beasts
  - savagely injured by wild animals
  lexicon: LSJ
  rationale: θηρία are beasts/wild animals; αἰκίζω denotes maltreating, torturing,
    or mangling. 'Cruelly mangled by beasts' conveys the brutality and physical violence.
