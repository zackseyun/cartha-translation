theological_decisions:
- issue: Rendering of ἅιδης in a Greek deuterocanonical narrative
  chosen_reading: Hades
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: No doctrinally contested term from DOCTRINE.md is involved, but the term
    carries cosmological weight. Retaining 'Hades' preserves the Greek conceptual
    world and avoids importing later theological assumptions tied to 'hell.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve source meaning without importing doctrinal claims.'
