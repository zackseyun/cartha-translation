id: 3MA.5.9
reference: 3 Maccabees 5:9
source:
  edition: lxx-swete-1909
  text: τούτων μὲν οὖν ἡ λιτανία ἐκτενῶς ἀνέβαινεν εἰς τὸν οὐρανόν.
  language: Greek
  pages:
  - 742
  confidence: high
  validation: minor_mismatch
translation:
  text: So then their earnest supplication was ascending to heaven continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their supplication was going up fervently to heaven.' The adverb ἐκτενῶς
      may emphasize intensity ('fervently') or extent/duration ('at length').
    reason: lexical_alternative
lexical_decisions:
- source_word: λιτανία
  chosen: supplication
  alternatives:
  - entreaty
  - prayer
  - petition
  lexicon: LSJ
  rationale: λιτανία denotes a petitionary appeal or supplication. 'Supplication'
    preserves the earnest, pleading sense better than the broader 'prayer.'
- source_word: ἐκτενῶς
  chosen: earnest
  alternatives:
  - fervently
  - intently
  - at length
  lexicon: LSJ
  rationale: The adverb can indicate intensity or extension. Because ἀνέβαινεν already
    carries the verbal motion and the clause is concise, rendering the force as 'earnest'
    captures the quality of the supplication. The temporal/extent nuance is preserved
    separately by 'at length.'
- source_word: ἀνέβαινεν
  chosen: was rising up
  alternatives:
  - went up
  - ascended
  lexicon: LSJ
  rationale: Imperfect aspect suggests ongoing action. 'Was rising up' reflects the
    continuous sense more naturally than the simple past 'went up.'
- source_word: εἰς τὸν οὐρανόν
  chosen: to heaven
  alternatives:
  - into heaven
  - to the sky
  lexicon: LSJ
  rationale: In this prayer context, οὐρανός is best rendered 'heaven,' not merely
    'sky.' 'To heaven' is idiomatic English for prayer ascending to God.
- source_word: τούτων
  chosen: their
  alternatives:
  - of these people
  - of them
  lexicon: LSJ
  rationale: The genitive demonstrative refers back to the people just mentioned.
    'Their' is the most natural English possessive rendering in context.
- source_word: μὲν οὖν
  chosen: So then
  alternatives:
  - therefore
  - now then
  - indeed then
  lexicon: LSJ
  rationale: The particle combination marks continuation and transition. 'So then'
    preserves the connective flow without sounding overly formal.
