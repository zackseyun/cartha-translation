id: 3MA.5.46
reference: 3 Maccabees 5:46
source:
  edition: lxx-swete-1909
  text: περὶ τὴν ἕω, τῆς πόλεως ἤδη πλήθεσιν ἀναριθμήτοις κατὰ τοῦ ἱπποδρόμου καταμεστωμένης,
    εἰσελθὼν εἰς τὴν αὐλὴν ἐπὶ τὸ προκείμενον ὤτρυνε τὸν βασιλέα.
  language: Greek
  pages:
  - 745
  confidence: high
  validation: agree
translation:
  text: Around dawn, when the city was already filled with innumerable crowds at the
    hippodrome, he entered the court and urged the king on concerning the matter at
    hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the palace court' or 'the courtyard'; the Greek αὐλή can denote the
      court area of a royal residence.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ τὴν ἕω
  chosen: Around dawn
  alternatives:
  - Toward dawn
  - About daybreak
  lexicon: LSJ
  rationale: The phrase is a temporal expression indicating the time near daybreak.
    'Around dawn' is natural modern English and preserves the approximate sense of
    περὶ.
- source_word: πλήθεσιν ἀναριθμήτοις
  chosen: with innumerable crowds
  alternatives:
  - with countless multitudes
  - with unnumbered masses
  lexicon: LSJ
  rationale: πλήθεσιν denotes large numbers/crowds, and ἀναριθμήτοις intensifies this
    as beyond counting. 'Innumerable crowds' is idiomatic and retains the hyperbolic
    force.
- source_word: κατὰ τοῦ ἱπποδρόμου καταμεστωμένης
  chosen: filled ... throughout the hippodrome
  alternatives:
  - packed all through the hippodrome
  - filled in the area of the hippodrome
  lexicon: LSJ
  rationale: καταμεστωμένης means 'filled full, crammed.' κατὰ with the genitive here
    is distributive/spatial, indicating spread through the hippodrome area. 'Throughout
    the hippodrome' best captures the sense of the crowds filling that venue.
- source_word: εἰς τὴν αὐλήν
  chosen: the court
  alternatives:
  - the palace court
  - the courtyard
  lexicon: LSJ
  rationale: αὐλή can mean courtyard or palace court. In context of approaching the
    king, 'the court' is concise and can naturally denote the royal court precinct;
    'palace court' is possible but slightly more interpretive.
- source_word: ἐπὶ τὸ προκείμενον
  chosen: in regard to the matter at hand
  alternatives:
  - concerning the business before him
  - about what was set before him
  lexicon: LSJ
  rationale: The idiom refers to the matter lying before someone, i.e., the present
    business or issue. 'In regard to the matter at hand' communicates the idiomatic
    sense clearly in modern English.
- source_word: ὤτρυνε
  chosen: urged ... on
  alternatives:
  - stirred up
  - pressed
  - incited
  lexicon: LSJ
  rationale: ὀτρύνω can mean urge, spur on, or incite. Given the hostile narrative
    context, the verb carries pressure toward action. 'Urged ... on' preserves that
    force without overtranslating to a more specific motive.
