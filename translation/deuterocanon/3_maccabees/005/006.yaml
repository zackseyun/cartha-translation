id: 3MA.5.6
reference: 3 Maccabees 5:6
source:
  edition: lxx-swete-1909
  text: οἱ δὲ πά- σης σκέπης ἔρημοι δοκοῦντες εἶναι τοῖς ἔθνεσιν Ἰουδαῖοι, διὰ τὴν
    πάντοθεν περιέχουσαν αὐτοὺς μετὰ δεσμῶν ἀνάγκην,
  language: Greek
  pages:
  - 742
  confidence: high
  validation: agree
translation:
  text: But the Jews, seeming to the nations to be deprived of every protection because
    of the necessity that surrounded them on every side with chains,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appearing to the Gentiles to be without any shelter/protection.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκέπης
  chosen: protection
  alternatives:
  - shelter
  - covering
  - defense
  lexicon: LSJ
  rationale: σκέπη can denote covering, shelter, or protection. In this context of
    vulnerability before hostile nations, 'protection' best conveys the figurative
    sense without sounding overly literal.
- source_word: ἔρημοι
  chosen: deprived of
  alternatives:
  - bereft of
  - destitute of
  - without
  lexicon: LSJ
  rationale: With the genitive πάσης σκέπης, ἔρημοι expresses being lacking or bereft
    of something. 'Deprived of' captures the state of lacking protection in idiomatic
    English.
- source_word: δοκοῦντες εἶναι
  chosen: seeming to be
  alternatives:
  - appearing to be
  - being thought to be
  lexicon: LSJ
  rationale: The participial phrase marks appearance from an observer's perspective
    rather than asserting the condition absolutely. 'Seeming to be' preserves that
    nuance.
- source_word: τοῖς ἔθνεσιν
  chosen: to the nations
  alternatives:
  - to the Gentiles
  - in the eyes of the nations
  lexicon: LSJ
  rationale: ἔθνη here refers broadly to the surrounding peoples rather than carrying
    a specifically later theological 'Gentiles' contrast. 'To the nations' is both
    literal and clear; the dative sense of viewpoint is retained.
- source_word: ἀνάγκην
  chosen: necessity
  alternatives:
  - compulsion
  - constraint
  - distress
  lexicon: LSJ
  rationale: ἀνάγκη often denotes compulsion or necessity. Because the phrase is modified
    by 'surrounded them on every side with chains,' 'necessity' preserves the Greek
    term while allowing the coercive force to emerge from the fuller clause.
- source_word: πάντοθεν περιέχουσαν αὐτοὺς μετὰ δεσμῶν
  chosen: that surrounded them on every side with chains
  alternatives:
  - that hemmed them in from every side in bonds
  - that enclosed them everywhere with fetters
  lexicon: LSJ
  rationale: The participial phrase vividly depicts constraining encirclement. 'Surrounded
    them on every side with chains' is natural English and preserves both the spatial
    and custodial imagery.
- source_word: δεσμῶν
  chosen: chains
  alternatives:
  - bonds
  - fetters
  lexicon: LSJ
  rationale: δεσμοί can mean bonds or chains. 'Chains' makes the physical imprisonment
    imagery explicit and readable in modern English.
