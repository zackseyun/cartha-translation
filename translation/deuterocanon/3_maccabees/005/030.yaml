id: 3MA.5.30
reference: 3 Maccabees 5:30
source:
  edition: lxx-swete-1909
  text: ὁ δὲ ἐπὶ τοῖς ῥηθείσιν πλησθεὶς βαρεῖ χόλῳ, διὰ τὸ περὶ τούτων προνοίᾳ θεοῦ
    διεσκεδάσθαι πᾶν αὐτοῦ νόημα, ἐντείνων μετὰ ἀπειλῆς εἶπεν
  language: Greek
  pages:
  - 744
  confidence: high
  validation: agree
translation:
  text: 'But he, filled with fierce anger at what had been said, because all his plan
    concerning these things had been frustrated by the providence of God, spoke with
    threats, pressing the matter hard:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πλησθεὶς βαρεῖ χόλῳ
  chosen: filled with heavy anger
  alternatives:
  - filled with bitter wrath
  - filled with fierce rage
  lexicon: LSJ
  rationale: χόλος denotes anger/wrath; βαρεῖ intensifies it as weighty or severe.
    'Heavy anger' preserves the metaphor of weight without becoming unnatural English.
- source_word: ἐπὶ τοῖς ῥηθείσιν
  chosen: at what had been said
  alternatives:
  - because of the things spoken
  - over these words
  lexicon: LSJ
  rationale: A natural rendering of the dative phrase referring back to the preceding
    speech; 'what had been said' is idiomatic and sufficiently formal.
- source_word: προνοίᾳ θεοῦ
  chosen: by the providence of God
  alternatives:
  - through God's providence
  - by God's forethought
  lexicon: LSJ
  rationale: πρόνοια here carries the sense of providential ordering rather than mere
    planning. 'Providence of God' preserves the theological force and the explicit
    genitive.
- source_word: διεσκεδάσθαι
  chosen: had been frustrated
  alternatives:
  - had been scattered
  - had been thwarted
  - had been undone
  lexicon: LSJ
  rationale: The verb literally suggests being scattered or dispersed; in context,
    his plan or intention is being broken up and thus frustrated. 'Frustrated' best
    conveys the idiomatic sense in English while remaining anchored to the image.
- source_word: πᾶν αὐτοῦ νόημα
  chosen: all his purpose
  alternatives:
  - his whole intention
  - all his design
  - his entire plan
  lexicon: LSJ
  rationale: νόημα can mean thought, purpose, or intention. In this narrative context
    it refers to his intended scheme, so 'purpose' is concise and natural.
- source_word: ἐντείνων
  chosen: pressing the matter hard
  alternatives:
  - insisting strongly
  - intensifying his demand
  - bearing down
  lexicon: LSJ
  rationale: The participle literally means stretching tight or straining; in context
    it describes forceful intensification of his speech. 'Pressing the matter hard'
    captures the force without over-paraphrasing.
- source_word: μετὰ ἀπειλῆς
  chosen: with threats
  alternatives:
  - threateningly
  - with a threat
  lexicon: LSJ
  rationale: Straightforward instrumental sense; plural English is idiomatic for hostile
    speech.
- source_word: εἶπεν
  chosen: spoke
  alternatives:
  - said
  lexicon: LSJ
  rationale: Either is possible; 'spoke' fits smoothly with the participial buildup
    and the following threatening manner.
