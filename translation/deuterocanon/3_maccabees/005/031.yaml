theological_decisions:
- issue: Rendering of πίστις in a non-doctrinal, political context
  chosen_reading: faithfulness
  alternative_readings:
  - faith
  - loyalty
  rationale: The doctrinal default is 'faith,' with alternatives footnoted where contested.
    Here the context is the Jews' demonstrated reliability toward the king and his
    ancestors. 'Faithfulness' best preserves the semantic range of πίστις without
    importing later doctrinal overtones; 'loyalty' is possible but slightly narrower
    and more interpretive.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; preserve theological
    tension rather than resolve it without documentation.'
