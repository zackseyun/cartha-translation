id: 3MA.5.31
reference: 3 Maccabees 5:31
source:
  edition: lxx-swete-1909
  text: Ὅσοι γονεῖς παρῆσαν ἢ παίδων γόνοι, τήνδε θηρσὶν ἀγρίοις ἐσκεύασαν δαψιλῆ
    θοῖναν ἀντὶ τῶν ἀνεγκλήτων ἐμοὶ καὶ προγόνοις ἐμοῖς ἀποδεδειγμένων ὁλοσχερῆ βεβαίαν
    πίστιν ἔχων Ἰουδαίων.
  language: Greek
  pages:
  - 744
  confidence: high
  validation: agree
translation:
  text: All the parents who were present, and the children with them, have prepared
    this lavish feast for the wild beasts, instead of the Jews, who have been shown
    to me and to my forefathers to possess complete and steadfast faithfulness beyond
    reproach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their children' for 'the offspring of children'; the Greek expression
      is awkward in this witness and may broadly denote the children/descendants present
      with the parents.
    reason: lexical_alternative
  - marker: b
    text: Or 'full and firm faith' or 'complete and steadfast loyalty.' The Greek
      πίστις here likely refers to proven fidelity or loyalty rather than specifically
      religious faith.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὅσοι
  chosen: All ... who
  alternatives:
  - As many as
  - Whoever
  lexicon: LSJ
  rationale: Introduces the whole class in view; idiomatic English is best conveyed
    by 'All ... who' rather than the more wooden 'as many as.'
- source_word: γονεῖς
  chosen: parents
  alternatives:
  - fathers
  - parents
  lexicon: LSJ
  rationale: The plural naturally denotes parents/progenitors; 'parents' is the clearest
    modern English rendering in context.
- source_word: παρῆσαν
  chosen: were present
  alternatives:
  - were there
  - stood by
  lexicon: LSJ
  rationale: A straightforward rendering of presence at the scene; 'were present'
    is natural and sufficiently formal.
- source_word: παίδων γόνοι
  chosen: the offspring of children
  alternatives:
  - their children
  - descendants of the young
  lexicon: LSJ
  rationale: The Greek is awkward and somewhat pleonastic in this witness. A more
    literal rendering preserves the source texture without over-resolving the relationship.
    It likely refers broadly to children/descendants accompanying the parents.
- source_word: τήνδε
  chosen: this
  alternatives:
  - this here
  lexicon: LSJ
  rationale: Demonstrative referring to the feast just described; simple 'this' is
    sufficient in English.
- source_word: θηρσὶν ἀγρίοις
  chosen: for the wild beasts
  alternatives:
  - for savage beasts
  - for wild animals
  lexicon: LSJ
  rationale: Dative of advantage/purpose; 'wild beasts' fits the elevated and grim
    tone of the passage.
- source_word: ἐσκεύασαν
  chosen: have prepared
  alternatives:
  - made ready
  - arranged
  lexicon: LSJ
  rationale: Conveys preparation or furnishing of the feast. Present perfect works
    well in English for the completed action with present relevance.
- source_word: δαψιλῆ θοῖναν
  chosen: this lavish feast
  alternatives:
  - a rich banquet
  - an abundant meal
  lexicon: LSJ
  rationale: The phrase denotes a plentiful banquet/feast. 'Lavish feast' preserves
    the irony of humans being treated as fodder for beasts.
- source_word: ἀντὶ τῶν ... Ἰουδαίων
  chosen: instead of the Jews
  alternatives:
  - in place of the Jews
  - rather than the Jews
  lexicon: LSJ
  rationale: 'ἀντί marks substitution: the feast is prepared for beasts in place of
    the Jews themselves as victims.'
- source_word: ἀνεγκλήτων
  chosen: beyond reproach
  alternatives:
  - blameless
  - irreproachable
  lexicon: LSJ
  rationale: Describes the Jews as not liable to accusation. 'Beyond reproach' is
    idiomatic and preserves the forensic nuance.
- source_word: ἀποδεδειγμένων
  chosen: have been shown
  alternatives:
  - have been proved
  - have been demonstrated
  lexicon: LSJ
  rationale: Perfect participle indicating an established demonstration to the speaker
    and his ancestors.
- source_word: ὁλοσχερῆ βεβαίαν πίστιν ἔχων
  chosen: to possess complete and steadfast faithfulness
  alternatives:
  - to have full and firm faith
  - to possess complete and secure loyalty
  lexicon: LSJ; BDAG
  rationale: πίστις can denote faith, trustworthiness, or fidelity. In this political-historical
    context, the sense is their proven loyalty/faithfulness to the king and his forefathers,
    not primarily inward religious faith. 'Steadfast faithfulness' captures that nuance,
    while 'complete' and 'steadfast' render ὁλοσχερῆ and βεβαίαν.
