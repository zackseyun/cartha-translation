id: 3MA.5.20
reference: 3 Maccabees 5:20
source:
  edition: lxx-swete-1909
  text: τὴν ὠμότητα χείρονα Φαλάριδος ἐσχηκὼς ἔφη τὸ τῆς σήμερον ὕπνῳ χάριν ἔχειν
    αὐτούς· συντηρηθέντας δὲ εἰς τὴν ὑποτέλλουσαν ἡμέραν κατὰ τὸ ὅμοιον ἑτοίμασον
    τοὺς ἐλέφαντας ἐπὶ τὸν τῶν ἀθεμίτων Ἰουδαίων ἀφανισμόν.
  language: Greek
  pages:
  - 743
  confidence: high
  validation: agree
translation:
  text: Having a savagery worse than Phalaris, he said that they should be thankful
    to sleep today; but, once they had been kept alive until the coming day, prepare
    the elephants in the same way for the destruction of the lawless Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Phalaris was remembered in Greek tradition as a notoriously cruel ruler;
      the comparison intensifies the king's brutality.
    reason: cultural_note
  - marker: b
    text: Or 'that they should count today's sleep as a favor.' The Greek idiom means
      they were to regard being allowed to sleep today as something for which they
      owed thanks.
    reason: lexical_alternative
  - marker: c
    text: '''Lawless'' renders a hostile epithet in the speaker''s words; alternatively,
      ''unlawful'' or ''impious.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ὠμότητα
  chosen: savagery
  alternatives:
  - cruelty
  - brutality
  - ferocity
  lexicon: LSJ
  rationale: ὠμότης denotes harsh, savage cruelty. 'Savagery' preserves the vivid,
    morally charged sense better than the flatter 'cruelty.'
- source_word: χείρονα Φαλάριδος
  chosen: worse than Phalaris
  alternatives:
  - more cruel than Phalaris
  lexicon: LSJ
  rationale: Comparative construction with the notorious tyrant Phalaris functions
    as a cultural benchmark for extreme cruelty. Keeping the name transliterated preserves
    the historical allusion.
- source_word: ἐσχηκὼς
  chosen: having
  alternatives:
  - possessing
  - being characterized by
  lexicon: LSJ
  rationale: Perfect participle of ἔχω here describes his present state or character.
    In English this is best absorbed into 'Having a savagery...' rather than rendered
    woodenly.
- source_word: τὸ τῆς σήμερον ὕπνῳ χάριν ἔχειν αὐτούς
  chosen: that they should be thankful to sleep today
  alternatives:
  - that they owed thanks for today's sleep
  - that they should count today's sleep a favor
  lexicon: LSJ
  rationale: The idiom χάριν ἔχειν conveys gratitude or obligation for a favor received.
    The phrase means they should regard being allowed to sleep today as a favor, not
    merely that they were sleeping.
- source_word: συντηρηθέντας
  chosen: once they had been kept alive
  alternatives:
  - having been preserved
  - having been kept
  lexicon: LSJ
  rationale: Passive participle from συντηρέω here indicates being preserved alive
    until the next day. 'Kept alive' makes the implied sense explicit in context of
    intended execution.
- source_word: ὑποτέλλουσαν ἡμέραν
  chosen: the coming day
  alternatives:
  - the following day
  - the approaching day
  lexicon: LSJ
  rationale: The participle indicates the day drawing on or coming up. 'The coming
    day' is natural English and fits the temporal contrast with 'today.'
- source_word: κατὰ τὸ ὅμοιον
  chosen: in the same way
  alternatives:
  - likewise
  - similarly
  lexicon: LSJ
  rationale: This adverbial phrase points back to prior preparation already described.
    'In the same way' is clear and sufficiently formal.
- source_word: ἑτοίμασον
  chosen: prepare
  alternatives:
  - make ready
  - get ready
  lexicon: LSJ
  rationale: Imperative of command. 'Prepare' fits the elevated narrative tone better
    than the more colloquial 'get ready.'
- source_word: ἐπὶ τὸν ... ἀφανισμόν
  chosen: for the destruction of
  alternatives:
  - for the annihilation of
  - for wiping out
  lexicon: LSJ
  rationale: ἀφανισμός denotes destruction or obliteration. 'Destruction' is strong
    without sounding overly interpretive; 'annihilation' is possible but slightly
    more loaded in modern English.
- source_word: ἀθεμίτων Ἰουδαίων
  chosen: the lawless Jews
  alternatives:
  - the unlawful Jews
  - the accursed Jews
  lexicon: LSJ
  rationale: ἀθέμιτος means contrary to law/custom, unlawful, or impious. Here it
    is a hostile characterization placed in the speaker's mouth. 'Lawless' preserves
    the insult without softening it or importing a stronger curse term not present
    in the Greek.
