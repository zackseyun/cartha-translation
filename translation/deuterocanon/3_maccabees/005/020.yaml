theological_decisions:
- issue: Hostile epithet for the Jewish people
  chosen_reading: the lawless Jews
  alternative_readings:
  - the unlawful Jews
  - the impious Jews
  rationale: The Greek insult ἀθεμίτων should be translated rather than softened,
    since the narrative is reporting the persecutor's speech. This preserves the text's
    rhetoric without endorsing it.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not paraphrase
    beyond the source text.'
