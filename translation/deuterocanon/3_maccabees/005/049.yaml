id: 3MA.5.49
reference: 3 Maccabees 5:49
source:
  edition: lxx-swete-1909
  text: ὑστάτην βίου ῥοπὴν αὐτοῖς ἐκείνην δόξαντες εἶναι τὸ τέλος τῆς ἀθλιωτάτης προσδοκίας,
    εἰς οἶκτον καὶ γόους τραπέντες, κατεφίλουν ἀλλήλους, περιπλεκό- μενοι τοῖς συγγενέσιν,
    ἐπὶ τοὺς τραχήλους ἐπιπίπτοντες, γονεῖς παισὶν καὶ μητέρες νεάνισιν· ἕτεραι δὲ
    νεογνὰ πρὸς μαστοὺς ἔχουσαι βρέφη τελευταῖον ἕλκοντα γάλα.
  language: Greek
  pages:
  - 745
  confidence: high
  validation: agree
translation:
  text: Considering that moment to be for them the final turn of life, the end of
    their most miserable expectation, they turned to pity and lamentation and kept
    kissing one another, embracing their relatives, falling upon their necks—parents
    upon children and mothers upon young daughters; and others, holding infant babies
    to their breasts, were drawing out their last milk.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the end of their most miserable waiting'; the Greek προσδοκία can denote
      expectation, suspense, or waiting for what is about to happen.
    reason: lexical_alternative
  - marker: b
    text: Literally 'falling upon the necks,' a Greek idiom for throwing oneself into
      another's embrace in grief or affection.
    reason: cultural_note
  - marker: c
    text: Or 'young women'; the context of family pairings favors 'young daughters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑστάτην
  chosen: final
  alternatives:
  - last
  - uttermost
  lexicon: LSJ
  rationale: In context with ῥοπὴν and τὸ τέλος, the adjective marks the decisive
    last moment rather than spatial extremity.
- source_word: βίου ῥοπὴν
  chosen: turn of life
  alternatives:
  - moment of life
  - inclination of life
  - critical point of life
  lexicon: LSJ
  rationale: ῥοπή literally suggests a turn, inclination, or tipping point. 'Turn
    of life' preserves the metaphor of life reaching its decisive tipping point better
    than a flatter 'moment,' while remaining intelligible in English.
- source_word: δόξαντες
  chosen: considering
  alternatives:
  - thinking
  - supposing
  lexicon: LSJ
  rationale: The participle introduces their perception of the situation; 'considering'
    is natural and slightly more deliberate than 'thinking.'
- source_word: τὸ τέλος τῆς ἀθλιωτάτης προσδοκίας
  chosen: the end of their most miserable expectation
  alternatives:
  - the end of their most wretched waiting
  - the outcome of their most miserable suspense
  lexicon: LSJ
  rationale: προσδοκία can denote expectation or waiting. 'Expectation' stays closer
    to the Greek while allowing the phrase to convey the dreadful anticipation they
    believed was ending in death.
- source_word: εἰς οἶκτον καὶ γόους τραπέντες
  chosen: they turned to pity and lamentation
  alternatives:
  - they gave themselves to compassion and wailing
  - they turned to mourning and cries
  lexicon: LSJ
  rationale: τραπέντες indicates a turn into an emotional state. οἶκτος can mean pity
    or compassion, here likely self-pitying grief in the face of death; γόοι are laments.
    'Pity and lamentation' preserves both nouns distinctly.
- source_word: κατεφίλουν
  chosen: kept kissing
  alternatives:
  - kissed fervently
  - kissed repeatedly
  lexicon: LSJ
  rationale: The imperfect with κατα- intensifies and suggests repeated action. 'Kept
    kissing' captures the ongoing, repeated farewell embraces.
- source_word: περιπλεκόμενοι
  chosen: embracing
  alternatives:
  - clinging to
  - entwining themselves with
  lexicon: LSJ
  rationale: The participle depicts physical enfolding. 'Embracing' is idiomatic and
    fits the farewell scene.
- source_word: τοῖς συγγενέσιν
  chosen: their relatives
  alternatives:
  - their kin
  - their family members
  lexicon: LSJ
  rationale: συγγενεῖς are kinfolk or relatives broadly, not only immediate family.
- source_word: ἐπὶ τοὺς τραχήλους ἐπιπίπτοντες
  chosen: falling upon their necks
  alternatives:
  - throwing themselves on their necks
  - falling on one another's necks
  lexicon: LSJ
  rationale: This is a conventional idiom for emotional embrace. A relatively literal
    rendering preserves the vividness of the Greek.
- source_word: νεάνισιν
  chosen: young daughters
  alternatives:
  - young women
  - maidens
  lexicon: LSJ
  rationale: In this family-pairing sequence ('parents upon children and mothers upon
    young daughters'), the sense is female children/young daughters rather than unrelated
    young women. 'Young daughters' makes the relational sense explicit in English.
- source_word: νεογνὰ ... βρέφη
  chosen: infant babies
  alternatives:
  - newborn infants
  - babies
  lexicon: LSJ
  rationale: The paired terms intensify the tenderness and vulnerability of the children.
    'Infant babies' preserves the emphasis without overtechnical wording.
- source_word: τελευταῖον ἕλκοντα γάλα
  chosen: were drawing their last milk
  alternatives:
  - were sucking a final milk
  - were drawing a last draught of milk
  lexicon: LSJ
  rationale: ἕλκω with γάλα evokes drawing/sucking milk from the breast. τελευταῖον
    modifies the feeding as the infants' final nursing before expected death. 'Their
    last milk' is concise and emotionally forceful.
