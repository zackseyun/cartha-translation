id: 3MA.5.13
reference: 3 Maccabees 5:13
source:
  edition: lxx-swete-1909
  text: οἵ τε Ἰουδαῖοι τὴν προσημανθεῖσαν ὥραν Α διαφυγόντες, τὸν ἅγιον ἤγουν θεὸν
    αὐτῶν καὶ πάλιν ἤξιουν τὸν εὐκατάλλακτον δεῖξαι μεγαλοφθενῶς ἑαυτοῦ χειρὸς κράτος
    ἔθνεσιν ὑπερηφάνοις.
  language: Greek
  pages:
  - 742
  confidence: high
  validation: agree
translation:
  text: And the Jews, having escaped the appointed hour, again were imploring their
    holy God to show, in magnificent generosity, the might of his hand to the proud
    nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their God, that is, the Holy One.' The Greek includes an explanatory
      particle.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the arrogant Gentiles.' The Greek word can mean either 'nations'
      or, in Jewish usage, 'Gentiles.'
    reason: lexical_alternative
  - marker: c
    text: The phrase rendered 'in magnificent generosity' reflects two Greek terms
      expressing both gracious readiness and grandeur; more literal alternatives include
      'graciously' or 'with noble greatness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διαφυγόντες
  chosen: having escaped
  alternatives:
  - having avoided
  - having gotten through
  - having survived
  lexicon: LSJ
  rationale: The participle indicates successful passing beyond a danger or deadline.
    'Having escaped' fits the immediate context of deliverance from the previously
    designated time and preserves the sense of danger more clearly than the flatter
    'avoided'.
- source_word: τὴν προσημανθεῖσαν ὥραν
  chosen: the appointed hour
  alternatives:
  - the previously indicated hour
  - the designated time
  lexicon: LSJ
  rationale: προσημαίνω here points to a time marked out beforehand. 'Appointed hour'
    is idiomatic English and preserves the formal sense of a set time without over-literal
    awkwardness.
- source_word: τὸν ἅγιον ἤγουν θεὸν αὐτῶν
  chosen: their holy God
  alternatives:
  - their God, that is, the Holy One
  - their sacred God
  lexicon: LSJ
  rationale: ἤγουν is explanatory ('that is' / 'namely'), but in English the phrase
    is best rendered smoothly as 'their holy God.' This preserves both possession
    and holiness without cumbersome interruption.
- source_word: ἤξιουν
  chosen: were imploring
  alternatives:
  - were asking
  - were beseeching
  - were entreating
  lexicon: LSJ
  rationale: The imperfect conveys continued or repeated action. 'Were imploring'
    captures both the ongoing aspect and the urgency of petition better than the more
    neutral 'were asking.'
- source_word: εὐκατάλλακτον
  chosen: in magnificent generosity
  alternatives:
  - being easily reconciled
  - gracious
  - readily merciful
  lexicon: LSJ
  rationale: The adjective literally suggests being readily appeased or graciously
    disposed. In this context it modifies the manner in which God is asked to display
    power. Because the adverb μεγαλοφθενῶς is also present, the English phrase 'in
    magnificent generosity' conveys a noble, gracious readiness without implying fickleness
    in God.
- source_word: μεγαλοφθενῶς
  chosen: in magnificent generosity
  alternatives:
  - magnificently
  - with great-heartedness
  - nobly
  lexicon: LSJ
  rationale: This rare adverb conveys grandeur or nobility of spirit. Rather than
    leave it as a bare adverb detached from εὐκατάλλακτον, the translation combines
    the two into a natural English expression that preserves both grandeur and graciousness.
- source_word: χειρὸς κράτος
  chosen: the might of his hand
  alternatives:
  - the power of his hand
  - his mighty hand
  lexicon: LSJ
  rationale: This is a conventional biblical expression for manifest divine power.
    'The might of his hand' keeps the concrete imagery of hand plus strength, rather
    than flattening it to simply 'power.'
- source_word: ἔθνεσιν ὑπερηφάνοις
  chosen: to the proud nations
  alternatives:
  - against the arrogant Gentiles
  - to arrogant peoples
  lexicon: LSJ
  rationale: ἔθνη can mean nations or Gentiles. In this deuterocanonical Jewish context
    either is possible, but 'nations' is the broader and less interpretively loaded
    choice, while 'proud' accurately renders ὑπερήφανος.
