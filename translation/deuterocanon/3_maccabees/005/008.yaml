id: 3MA.5.8
reference: 3 Maccabees 5:8
source:
  edition: lxx-swete-1909
  text: τὴν κατʼ αὐτῶν μεταστρέψαι βουλὴν ἀνοσίαν, καὶ ῥύσασθαι αὐτοὺς μετὰ μεγαλομεροῦς
    ἐπιφανείας ἐκ τοῦ παρὰ πόδας ἐν ἑτοίμῳ μόρου.
  language: Greek
  pages:
  - 742
  confidence: high
  validation: agree
translation:
  text: to turn back the unholy plan against them, and to rescue them with a magnificent
    manifestation from the death ready at their feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a glorious appearing' or 'with majestic intervention.' The Greek
      ἐπιφάνεια can denote a striking appearance, often of divine help.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταστρέψαι
  chosen: to turn back
  alternatives:
  - to reverse
  - to overturn
  lexicon: LSJ
  rationale: The infinitive denotes causing a plan to be changed or reversed. 'Turn
    back' is idiomatic in English and preserves the sense of redirecting the hostile
    scheme away from its intended effect.
- source_word: βουλήν
  chosen: plan
  alternatives:
  - counsel
  - purpose
  - scheme
  lexicon: LSJ
  rationale: In context this is the hostile intention formed against the Jews. 'Plan'
    is clear modern English; 'scheme' was possible but slightly over-interprets the
    malicious nuance already conveyed by 'unholy' and the context.
- source_word: ἀνοσίαν
  chosen: unholy
  alternatives:
  - impious
  - godless
  - profane
  lexicon: LSJ
  rationale: The adjective marks the plan as irreverent and morally wicked before
    God. 'Unholy' is accessible and preserves the religious dimension better than
    a merely ethical term like 'wicked'.
- source_word: ῥύσασθαι
  chosen: to rescue
  alternatives:
  - to deliver
  - to save
  lexicon: LSJ
  rationale: '''Rescue'' fits the immediate danger of impending death. ''Deliver''
    is also viable, but ''rescue'' is more natural contemporary English while retaining
    the sense of intervention.'
- source_word: μεγαλομεροῦς ἐπιφανείας
  chosen: with a magnificent manifestation
  alternatives:
  - by a great appearing
  - with majestic intervention
  - with glorious epiphany
  lexicon: LSJ
  rationale: ἐπιφάνεια here refers to a striking divine appearing or manifestation.
    'Manifestation' preserves the appearance-language without importing later technical
    theological usage. μεγαλομεροῦς adds grandeur, rendered 'magnificent.'
- source_word: μόρου
  chosen: death
  alternatives:
  - doom
  - fate of death
  lexicon: LSJ
  rationale: μόρος can denote doom or death; here, with ἐκ and the phrase 'lying ready
    at their feet,' the concrete threat of death is foremost. 'Death' is the clearest
    rendering.
- source_word: παρὰ πόδας ἐν ἑτοίμῳ
  chosen: lying ready at their feet
  alternatives:
  - close at hand
  - standing ready before them
  - immediately before them
  lexicon: LSJ
  rationale: The phrase is idiomatic for something imminent and very near. 'Lying
    ready at their feet' keeps the vivid spatial imagery while remaining readable.
