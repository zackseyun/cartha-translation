theological_decisions:
- issue: Nature of ἐπιφάνεια in context
  chosen_reading: Rendered as a divine 'manifestation' rather than a generic event
  alternative_readings:
  - majestic intervention
  - glorious appearing
  rationale: In 3 Maccabees the rescue is attributed to God's dramatic intervention.
    Translating ἐπιφάνεια as 'manifestation' preserves the sense of a notable appearing
    without over-specifying the mechanics or importing later doctrinal terminology.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve
    it
