id: 3MA.3.5
reference: 3 Maccabees 3:5
source:
  edition: lxx-swete-1909
  text: τῇ δὲ τῶν δικαίων εὐπραξίᾳ κοσμοῦντες τὴν συναναστροφήν, ἅπασιν ἀνθρώποις
    εὐδόκιμοι καθειστήκεισαν.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 740
  - 741
  - 752
  confidence: high
  validation: minor_mismatch
translation:
  text: And by adorning their way of life with the good conduct of the righteous,
    they had become well regarded by all people.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τῇ ... εὐπραξίᾳ
  chosen: with the good conduct
  alternatives:
  - by good practice
  - with upright behavior
  - with beneficence
  lexicon: LSJ
  rationale: εὐπραξία denotes good conduct or right action. 'Good conduct' fits the
    ethical sense in context better than the more abstract 'good practice' or the
    narrower 'beneficence'.
- source_word: τῶν δικαίων
  chosen: of the righteous
  alternatives:
  - of righteous people
  - of the just
  lexicon: LSJ
  rationale: δικαίων is substantival plural, referring to righteous/just persons.
    'Of the righteous' preserves the compact Greek expression and its moral-religious
    force.
- source_word: κοσμοῦντες
  chosen: adorning
  alternatives:
  - ordering
  - embellishing
  - conducting
  lexicon: LSJ
  rationale: κοσμέω literally means to adorn or arrange. Here it is metaphorical with
    τὴν συναναστροφήν, expressing that their common life was made honorable by righteous
    conduct. 'Adorning' preserves the metaphor without becoming unnatural.
- source_word: τὴν συναναστροφήν
  chosen: their way of life
  alternatives:
  - their conduct
  - their manner of life
  - their association
  lexicon: LSJ
  rationale: συναναστροφή can denote manner of life or conduct. 'Way of life' captures
    the broader social-ethical sense better than the narrower 'association'.
- source_word: ἅπασιν ἀνθρώποις
  chosen: by all people
  alternatives:
  - with all people
  - to all people
  - among all people
  lexicon: LSJ
  rationale: With εὐδόκιμοι the dative expresses the persons in whose estimation they
    were approved. 'By all people' communicates universal favorable regard in idiomatic
    English.
- source_word: εὐδόκιμοι
  chosen: well regarded
  alternatives:
  - approved
  - esteemed
  - acceptable
  lexicon: LSJ
  rationale: εὐδόκιμος means approved or held in good repute. 'Well regarded' is natural
    modern English and preserves the social sense of favorable standing.
- source_word: καθειστήκεισαν
  chosen: they had become
  alternatives:
  - they were established
  - they stood
  - they had been made
  lexicon: LSJ
  rationale: 'The pluperfect of καθίστημι indicates a resulting state already in place:
    they had come to be in this condition. ''They had become'' conveys that resultant
    status clearly.'
