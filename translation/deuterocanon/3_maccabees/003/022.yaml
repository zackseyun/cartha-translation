id: 3MA.3.22
reference: 3 Maccabees 3:22
source:
  edition: lxx-swete-1909
  text: οἱ δὲ τούναντίον ἐκδεχόμενοι καὶ τῇ συμφύτῳ κακοηθείᾳ τὸ καλὸν ἀπωσάμενοι,
    διηνεκῶς δὲ εἰς τὸ φαῦλον ἐκνεύοντες,
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 740
  - 741
  - 752
  confidence: high
  validation: agree
translation:
  text: But those who expected the opposite, and in their inborn malice pushed away
    what is good, continually turning aside to what is base,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τούναντίον
  chosen: the opposite
  alternatives:
  - the contrary
  - the reverse
  lexicon: LSJ
  rationale: Idiomatic adverb meaning 'on the contrary' or 'the opposite.' In this
    participial construction with ἐκδεχόμενοι, 'expected the opposite' best conveys
    that they were anticipating an adverse outcome contrary to the good.
- source_word: ἐκδεχόμενοι
  chosen: expected
  alternatives:
  - awaited
  - looked for
  lexicon: LSJ
  rationale: The participle denotes waiting for or expecting something. 'Expected'
    is concise and natural in English here, fitting the mental posture described.
- source_word: συμφύτῳ
  chosen: inborn
  alternatives:
  - innate
  - native
  lexicon: LSJ
  rationale: Literally 'grown together with' and thus 'innate' or 'inborn.' 'Inborn'
    communicates the idea of a vice bound up with their nature without sounding overly
    technical.
- source_word: κακοηθείᾳ
  chosen: malice
  alternatives:
  - wickedness
  - ill-nature
  - depravity
  lexicon: LSJ
  rationale: The noun can denote bad character, malignity, or malicious disposition.
    'Malice' captures the hostile moral bent in a readable way; 'ill-nature' is too
    weak, while 'depravity' overstates.
- source_word: τὸ καλόν
  chosen: what is good
  alternatives:
  - the good
  - what is right
  lexicon: LSJ
  rationale: The articular neuter points to 'the good' in a moral sense. 'What is
    good' is smoother in English while preserving the ethical category.
- source_word: ἀπωσάμενοι
  chosen: pushed away
  alternatives:
  - rejected
  - thrust aside
  lexicon: LSJ
  rationale: The middle participle conveys forceful repulsion. 'Pushed away' preserves
    the vividness better than the more abstract 'rejected.'
- source_word: διηνεκῶς
  chosen: continually
  alternatives:
  - constantly
  - unceasingly
  lexicon: LSJ
  rationale: This adverb marks ongoing, habitual action. 'Continually' is natural
    and sufficiently strong.
- source_word: φαῦλον
  chosen: what is base
  alternatives:
  - what is evil
  - what is worthless
  - what is vile
  lexicon: LSJ
  rationale: φαῦλος often denotes what is morally bad, paltry, or base. 'What is base'
    preserves the moral and qualitative sense without narrowing it only to overt evil.
- source_word: ἐκνεύοντες
  chosen: turning aside
  alternatives:
  - inclining
  - deviating
  - bending toward
  lexicon: LSJ
  rationale: The participle suggests a turning away or swerving toward something.
    'Turning aside to' captures the image of moral deviation in idiomatic English.
