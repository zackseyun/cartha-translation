id: 3MA.3.10
reference: 3 Maccabees 3:10
source:
  edition: lxx-swete-1909
  text: ἤδη δὲ καί τινες γείτονές τε καὶ φίλοι καὶ συνπραγματευόμενοι, μυστικῶς τινας
    ἐπισπώμενοι, πίστεις ἐδίδουν συνασπίζειν, καὶ πᾶν ἐκτενὲς προσιοίσεσθαι πρὸς ἀντίλημψιν.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 740
  - 741
  - 752
  confidence: high
  validation: agree
translation:
  text: And already some neighbors and friends and business associates, secretly drawing
    certain people aside, were giving assurances that they would join in shielding
    them and would offer every earnest effort toward their support.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were giving pledges that they would join in defending them and would
      contribute their utmost for their help.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γείτονές
  chosen: neighbors
  alternatives:
  - nearby people
  lexicon: LSJ
  rationale: The noun denotes those living nearby; 'neighbors' is the natural modern
    English equivalent and fits the social grouping listed with friends and associates.
- source_word: φίλοι
  chosen: friends
  alternatives:
  - allies
  lexicon: LSJ
  rationale: The ordinary relational sense is most likely here in a list of sympathetic
    persons.
- source_word: συνπραγματευόμενοι
  chosen: business associates
  alternatives:
  - partners in dealings
  - fellow traders
  lexicon: LSJ
  rationale: The participle refers to people engaged together in affairs or transactions.
    'Business associates' captures cooperative commercial or practical dealings without
    over-specifying a formal partnership.
- source_word: μυστικῶς
  chosen: secretly
  alternatives:
  - privately
  - in secret
  lexicon: LSJ
  rationale: The adverb indicates covert action because open support would be dangerous;
    'secretly' is concise and clear.
- source_word: τινας ἐπισπώμενοι
  chosen: drawing certain people aside
  alternatives:
  - winning over some people
  - bringing some aside to themselves
  lexicon: LSJ
  rationale: ἐπισπάω can suggest drawing toward oneself or pulling aside. In context
    of clandestine reassurance, 'drawing certain people aside' preserves the physical-social
    nuance without overstating persuasion.
- source_word: πίστεις ἐδίδουν
  chosen: were giving assurances
  alternatives:
  - were giving pledges
  - were offering guarantees
  lexicon: LSJ
  rationale: Although literally 'were giving faiths/pledges,' the idiom in context
    means offering assurances or promises of support. 'Assurances' is idiomatic English
    while retaining the force of pledged reliability.
- source_word: συνασπίζειν
  chosen: join in shielding them
  alternatives:
  - join in defending them
  - rally to protect them
  lexicon: LSJ
  rationale: Built on ἀσπίς ('shield'), the verb conveys protective action in concert.
    'Join in shielding them' preserves both the collective and protective imagery.
- source_word: πᾶν ἐκτενὲς
  chosen: every earnest effort
  alternatives:
  - their utmost
  - every full exertion
  lexicon: LSJ
  rationale: The phrase conveys complete intensity or full stretch of effort. 'Every
    earnest effort' is readable modern English and fits the promise of practical aid.
- source_word: προσιοίσεσθαι
  chosen: would offer
  alternatives:
  - would bring
  - would contribute
  lexicon: LSJ
  rationale: The future middle infinitive here expresses what they pledged to render
    or bring forward. 'Would offer' works naturally with 'effort' in English.
- source_word: πρὸς ἀντίλημψιν
  chosen: toward their support
  alternatives:
  - for assistance
  - for help
  - for their aid
  lexicon: LSJ
  rationale: ἀντίλημψις denotes help, support, or assistance. 'Toward their support'
    fits the preposition and the context of protective solidarity.
