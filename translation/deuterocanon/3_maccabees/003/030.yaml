translation:
  text: And the text of the letter had been written as follows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the copy/text of the letter was written thus.” The Greek τύπος can denote
      the form, wording, or copy of a document.
    reason: lexical_alternative
lexical_decisions:
- source_word: τύπος
  chosen: form
  alternatives:
  - copy
  - text
  - content
  lexicon: LSJ
  rationale: τύπος here refers to the set form or wording of the letter being introduced.
    “Form” preserves the sense of the written model or formulation without over-specifying
    whether it is a verbatim copy or merely a summary.
- source_word: ἐπιστολή
  chosen: letter
  alternatives:
  - epistle
  - written message
  lexicon: LSJ
  rationale: A straightforward rendering for a written communication. “Letter” is
    natural modern English and fits the narrative context.
- source_word: ἐγέγραπτο
  chosen: had been written
  alternatives:
  - was written
  - stood written
  lexicon: LSJ
  rationale: The pluperfect/passive sense is best reflected by “had been written,”
    indicating the letter’s wording was already set down before the quotation that
    follows.
- source_word: οὕτως
  chosen: as follows
  alternatives:
  - thus
  - in this way
  lexicon: LSJ
  rationale: Idiomatic English introducing the contents of a document. This is a standard
    contextual rendering of οὕτως before a citation.
