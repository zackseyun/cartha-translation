id: 3MA.3.30
reference: 3 Maccabees 3:30
source:
  edition: lxx-swete-1909
  text: καὶ ὁ μὲν τῆς ἐπιστολῆς τύπος οὕτως ἐγέγραπτο.
  language: Greek
  pages:
