translation:
  text: 'King Ptolemy Philopator to the generals and soldiers in Egypt and in every
    place: greetings and good health.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and in each district' / 'and place by place'; the Greek κατὰ τόπον is
      somewhat idiomatic and may refer to local postings or districts.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βασιλεὺς
  chosen: King
  alternatives:
  - The king
  lexicon: LSJ
  rationale: Used as the royal title introducing the sender of the letter. English
    epistolary style naturally renders it as 'King' before the name.
- source_word: Πτολεμαῖος Φιλοπάτωρ
  chosen: Ptolemy Philopator
  rationale: Personal name and epithet are transliterated per project policy to transliterate
    names rather than translate them.
- source_word: τοῖς ... στρατηγοῖς
  chosen: to the generals
  alternatives:
  - to the commanders
  lexicon: LSJ
  rationale: στρατηγοῖς denotes military leaders; 'generals' is the most direct and
    idiomatic rendering in this formal address.
- source_word: καὶ στρατιώταις
  chosen: and soldiers
  alternatives:
  - and troops
  lexicon: LSJ
  rationale: Straightforward military term; 'soldiers' preserves the personal addressees
    rather than abstracting to 'troops'.
- source_word: τοῖς κατʼ Αἴγυπτον
  chosen: in Egypt
  alternatives:
  - throughout Egypt
  - those in Egypt
  lexicon: LSJ
  rationale: The phrase identifies those located in Egypt. 'In Egypt' is concise and
    natural in English while preserving the geographic scope.
- source_word: καὶ κατὰ τόπον
  chosen: and in every place
  alternatives:
  - and in each district
  - and place by place
  - and locally
  lexicon: LSJ
  rationale: κατὰ τόπον literally means 'according to place' or 'by locality.' In
    this address it broadens the addressees beyond Egypt proper or specifies local
    postings. 'In every place' preserves the distributive sense without over-interpreting
    the administrative nuance.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - hail
  lexicon: LSJ
  rationale: Standard epistolary infinitive meaning 'greetings' in letter openings;
    this is the conventional and contextually correct English equivalent.
- source_word: καὶ ἐρρῶσθαι
  chosen: and good health
  alternatives:
  - and farewell
  - and be strong
  - and wellness
  lexicon: LSJ
  rationale: Common epistolary wish for well-being/health. 'And good health' fits
    the formulaic closing of the salutation in natural English better than a more
    literal infinitive construction.
