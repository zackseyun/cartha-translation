id: 3MA.3.12
reference: 3 Maccabees 3:12
source:
  edition: lxx-swete-1909
  text: Βασιλεὺς Πτολεμαῖος Φιλοπάτωρ τοῖς κατʼ Αἴγυπτον καὶ κατὰ τόπον στρατηγοῖς
    καὶ στρατιώταις χαίρειν καὶ ἐρρῶσθαι.
  language: Greek
