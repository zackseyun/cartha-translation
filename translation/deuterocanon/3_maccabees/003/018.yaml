id: 3MA.3.18
reference: 3 Maccabees 3:18
source:
  edition: lxx-swete-1909
  text: τύφοις φερόμενοι παλαιοτέροις, εἶρξαν ἡμᾶς τῆς εἰσόδου, λειπόμενοι τῆς ἡμετέρας
    ἀλκῆς, διʼ ἣν ἔχομεν πρὸς ἅπαντας ἀνθρώπους φιλανθρωπίαν.
  language: Greek
  pages:
