  - 752
  confidence: high
  validation: agree
translation:
  text: Carried away by ancient conceit, they barred us from entry, falling short
    of our strength, by which we have goodwill toward all people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Carried away by long-standing pride' or 'driven by ancient conceit.'
      The Greek τύφοις φερόμενοι παλαιοτέροις is compact and can be rendered with
      slightly different shades of inherited arrogance.
    reason: lexical_alternative
lexical_decisions:
- source_word: τύφοις
  chosen: arrogance
  alternatives:
  - pride
  - conceit
  - delusions
  lexicon: LSJ
  rationale: The dative plural with φερόμενοι expresses being driven by states of
    mind. In this context 'arrogance' best captures the moral sense of overbearing
    pride without the more psychological nuance of 'delusions.'
- source_word: φερόμενοι
  chosen: carried away
  alternatives:
  - being driven
  - being borne along
  lexicon: BDAG
  rationale: A participial expression of being swept along by an impulse or disposition.
    'Carried away' is idiomatic modern English and preserves the passive nuance.
- source_word: παλαιοτέροις
  chosen: ancient
  alternatives:
  - older
  - long-standing
  - of old
  lexicon: LSJ
  rationale: Comparative form used idiomatically for what is from earlier times. 'Ancient'
    communicates inherited or long-standing attitudes more naturally than a literal
    'older' in English.
- source_word: εἶρξαν
  chosen: barred
  alternatives:
  - shut out
  - excluded
  - restrained
  lexicon: LSJ
  rationale: The verb with the genitive and τῆς εἰσόδου means to keep someone from
    entering. 'Barred' is concise and fits the construction well.
- source_word: τῆς εἰσόδου
  chosen: from entry
  alternatives:
  - from entering
  - from access
  lexicon: BDAG
  rationale: The genitive after εἴργω marks what they were prevented from doing. 'From
    entry' keeps the nominal force of the Greek while remaining natural enough in
    English.
- source_word: λειπόμενοι
  chosen: lacking
  alternatives:
  - falling short of
  - being deficient in
  - inferior in
  lexicon: BDAG
  rationale: The participle indicates deficiency relative to 'our strength.' 'Lacking'
    is the clearest compact rendering.
- source_word: τῆς ἡμετέρας ἀλκῆς
  chosen: our strength
  alternatives:
  - our might
  - our valor
  - our power
  lexicon: LSJ
  rationale: ἀλκή can denote strength, prowess, or valor. Here it is linked causally
    to benevolence toward all people, so 'strength' best conveys moral and civic capacity
    without sounding militaristic.
- source_word: διʼ ἣν
  chosen: by which
  alternatives:
  - through which
  - because of which
  lexicon: BDAG
  rationale: The relative pronoun refers back to ἀλκή and introduces the means or
    basis for the following disposition. 'By which' preserves that connection.
- source_word: ἔχομεν
  chosen: we have
  alternatives:
  - we show
  - we maintain
  lexicon: BDAG
  rationale: The simple verb 'have' should be retained unless context requires expansion.
    The object φιλανθρωπίαν can be 'have' in the sense of possessing or displaying
    a disposition.
- source_word: πρὸς ἅπαντας ἀνθρώπους
  chosen: toward all people
  alternatives:
  - toward all men
  - for all human beings
  lexicon: BDAG
  rationale: ἀνθρώπους is generic for humanity here. 'All people' is gender-accurate
    to the referent and natural in modern English.
- source_word: φιλανθρωπίαν
  chosen: goodwill
  alternatives:
  - kindness
  - benevolence
  - humanity
  lexicon: BDAG
  rationale: The term denotes benevolent regard for human beings. 'Goodwill' is concise
    and readable, while 'humanity' could be misunderstood and 'benevolence' is slightly
    stiffer.
