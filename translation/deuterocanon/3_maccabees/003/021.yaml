id: 3MA.3.21
reference: 3 Maccabees 3:21
source:
  edition: lxx-swete-1909
  text: ἐν δὲ τούτοις πρὸς τοὺς ὁμοφύλους αὐτῶν ἀμνησικακίαν ἅπασιν γνωρίσαντες, διά
    τε τὴν συμμαχίαν καὶ τὰ πεπιστευμένα μετὰ ἁπλότητος αὐτοῖς ἀρχῆθεν μύρια πράγματα,
    ἐξαλλοιῶσαι ἐβουλήθημεν, καὶ πολιτίας αὐτοὺς Ἀλεξανδρέων καταξιῶσαι, καὶ μετόχους
    τῶν εἰς ἱερὸν καταστῆσαι.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 740
  - 741
  - 752
  confidence: high
  validation: agree
translation:
  text: And in these matters, after making known to all their own countrymen our lack
    of resentment, and because of the alliance and the countless affairs entrusted
    to them from the beginning with sincerity, we decided to transform their status
    and deem them worthy of Alexandrian citizenship, and to appoint them as sharers
    in the things of the sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our forbearance' or 'our freedom from grudges'; the Greek term denotes
      not holding wrongs against someone.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the things of the sanctuary'; this may refer broadly to sacred
      privileges or responsibilities connected with the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμνησικακίαν
  chosen: lack of resentment
  alternatives:
  - forgetfulness of wrongs
  - forbearance
  - freedom from grudges
  lexicon: LSJ
  rationale: The noun denotes not remembering or holding onto wrongs. 'Lack of resentment'
    preserves the sense of not bearing a grudge without sounding archaic. It is framed
    as what was made known to their compatriots.
- source_word: ὁμοφύλους
  chosen: their own countrymen
  alternatives:
  - kinsmen
  - people of the same race
  - fellow nationals
  lexicon: LSJ
  rationale: The term refers to those of the same stock or people. 'Countrymen' fits
    the political-social setting better than the more biological 'same race,' while
    'their own' reflects αὐτῶν.
- source_word: συμμαχίαν
  chosen: alliance
  alternatives:
  - friendship
  - treaty
  - partnership
  lexicon: LSJ
  rationale: In a royal-political context the word naturally carries the sense of
    alliance or formal association, not merely personal friendship.
- source_word: τὰ πεπιστευμένα
  chosen: the countless affairs entrusted to them
  alternatives:
  - the many things committed to them
  - the trusts placed in them
  - the matters confided to them
  lexicon: LSJ
  rationale: The perfect participle used substantivally points to responsibilities
    or matters committed in trust. Expanding with 'affairs' makes the English idiomatic
    while preserving the entrusted nature.
- source_word: μετὰ ἁπλότητος
  chosen: with sincerity
  alternatives:
  - with simplicity
  - with singleness
  - in good faith
  lexicon: LSJ
  rationale: Here ἁπλότης conveys straightforwardness or good faith rather than mere
    simplicity. 'With sincerity' communicates the moral quality of the entrusting.
- source_word: ἐξαλλοιῶσαι
  chosen: transform their status
  alternatives:
  - change them
  - alter them
  - make them different
  lexicon: LSJ
  rationale: The infinitive means to alter or change thoroughly. Because the following
    clauses specify civic elevation, 'transform their status' makes explicit the kind
    of change implied by context without overparaphrasing.
- source_word: πολιτίας ... Ἀλεξανδρέων
  chosen: Alexandrian citizenship
  alternatives:
  - citizenship of the Alexandrians
  - civic status among the Alexandrians
  lexicon: LSJ
  rationale: πολιτεία here refers to civic standing/citizenship. 'Alexandrian citizenship'
    is concise and natural English.
- source_word: καταξιῶσαι
  chosen: deem them worthy of
  alternatives:
  - count them worthy of
  - grant them
  - consider them deserving of
  lexicon: LSJ
  rationale: The verb means to consider or declare worthy. 'Deem them worthy of' preserves
    the evaluative force better than a bare 'grant them.'
- source_word: μετόχους
  chosen: sharers
  alternatives:
  - participants
  - partners
  - partakers
  lexicon: LSJ
  rationale: The word denotes those who share in something. 'Sharers' is plain modern
    English and avoids overly ecclesiastical diction.
- source_word: τῶν εἰς ἱερὸν
  chosen: the things of the sanctuary
  alternatives:
  - the temple privileges
  - the sacred matters
  - what pertains to the temple
  lexicon: LSJ
  rationale: The phrase is somewhat compressed, literally 'the things into/for the
    sanctuary.' 'The things of the sanctuary' preserves the breadth of reference without
    narrowing it prematurely to one specific privilege.
- source_word: καταστῆσαι
  chosen: appoint them as
  alternatives:
  - establish them as
  - constitute them
  - set them as
  lexicon: LSJ
  rationale: The verb here introduces a new status or role. 'Appoint them as' is idiomatic
    and fits the administrative context.
