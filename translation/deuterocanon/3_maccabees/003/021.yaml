theological_decisions:
- issue: Meaning of civic and cultic privileges granted to the Jews in the king's
    reported policy
  chosen_reading: The verse describes proposed elevation in civic status and participation
    in sanctuary-related privileges without specifying full ethnic assimilation or
    later theological categories.
  alternative_readings:
  - The verse implies complete incorporation into the Alexandrian body politic.
  - The verse refers narrowly to temple service privileges.
  rationale: The Greek speaks of Alexandrian citizenship and sharing in 'the things
    of the sanctuary,' but does not define the exact legal or cultic scope. The translation
    preserves that breadth rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
