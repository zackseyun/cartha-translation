id: 3MA.3.25
reference: 3 Maccabees 3:25
source:
  edition: lxx-swete-1909
  text: προστετάχαμεν ἅμα τῷ προσπεσεῖν τὴν ἐπιστολὴν τήνδε, αἰθωρεὶ τοὺς ἐννεμομένους
    σὺν ταῖς γυναιξὶ καὶ τέκνοις μετὰ ὕβρεως καὶ σκυλμῶν ἀποστεῖλαι πρὸς ἡμᾶς ἐν δεσμοῖς
    σιδηροῖς πάντοθεν κατακεκλεισμένους, εἰς ἀνήκεστον καὶ δυσκλεῆ πρέποντα δυσμενέσιν
    βόθρον.
  language: Greek
  pages:
