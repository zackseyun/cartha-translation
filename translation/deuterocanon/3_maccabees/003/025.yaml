translation:
  text: We have ordered that, as soon as this letter arrives, those registered, together
    with their wives and children, be sent to us at once in iron bonds, shut in on
    every side, with abuse and mistreatment, for an irreparable and disgraceful pit
    fit for enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those registered' or 'those listed by name'; the Greek participle refers
      to people officially entered in a register.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'with abuse and plundering' conveys both humiliating mistreatment
      (ὕβρις) and stripping/spoliation (σκυλμοί).
    reason: lexical_alternative
  - marker: c
    text: '''Pit'' may be literal or may function as a vivid image for a place of
      destruction and disgrace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προστετάχαμεν
  chosen: We have ordered
  alternatives:
  - we have commanded
  - we have given orders
  lexicon: LSJ
  rationale: Perfect form of προστάσσω conveys an issued order with present force.
    'We have ordered' is natural English and preserves the authoritative decree sense.
- source_word: ἅμα τῷ προσπεσεῖν τὴν ἐπιστολὴν τήνδε
  chosen: as soon as this letter arrives
  alternatives:
  - when this letter falls in
  - immediately upon the arrival of this letter
  lexicon: LSJ
  rationale: The idiom ἅμα τῷ + infinitive expresses temporal immediacy. προσπίπτω
    with a document here refers to its arrival or delivery, not literal falling.
- source_word: αἰθωρεὶ
  chosen: at once
  alternatives:
  - immediately
  - forthwith
  lexicon: LSJ
  rationale: Adverb of immediacy. 'At once' is clear modern English without archaic
    tone.
- source_word: τοὺς ἐννεμομένους
  chosen: those enrolled
  alternatives:
  - those registered
  - those listed by name
  lexicon: LSJ
  rationale: The participle refers to persons being entered or assigned in an official
    register/list in the context of the census-like roundup. 'Those enrolled' preserves
    the bureaucratic sense while remaining concise.
- source_word: σὺν ταῖς γυναιξὶ καὶ τέκνοις
  chosen: together with their wives and children
  alternatives:
  - with their women and children
  - along with wives and children
  lexicon: LSJ
  rationale: γυναιξί here most naturally means wives in relation to the enrolled men.
    This is gender-accurate and contextually specific.
- source_word: μετὰ ὕβρεως καὶ σκυλμῶν
  chosen: with abuse and plundering
  alternatives:
  - with outrage and pillage
  - with insolence and maltreatment
  lexicon: LSJ
  rationale: ὕβρις denotes abusive outrage or insolent mistreatment; σκυλμός denotes
    stripping/spoliation/plundering. The pair describes humiliating violent treatment
    accompanying the transport.
- source_word: ἀποστεῖλαι πρὸς ἡμᾶς
  chosen: be sent to us
  alternatives:
  - send to us
  - dispatch to us
  lexicon: LSJ
  rationale: Infinitive dependent on the order. Passive English idiom fits the decree
    style after 'We have ordered that...'.
- source_word: ἐν δεσμοῖς σιδηροῖς
  chosen: in iron bonds
  alternatives:
  - in iron chains
  - in iron fetters
  lexicon: LSJ
  rationale: δεσμοί are bonds or restraints; 'iron bonds' is slightly more formal
    and broad enough to include chains/fetters without over-specifying.
- source_word: πάντοθεν κατακεκλεισμένους
  chosen: shut in on every side
  alternatives:
  - confined on all sides
  - completely enclosed
  lexicon: LSJ
  rationale: Perfect participle intensifies the state of being enclosed or shut up
    from every direction. The chosen rendering preserves the totality of confinement.
- source_word: εἰς ἀνήκεστον καὶ δυσκλεῆ πρέποντα δυσμενέσιν βόθρον
  chosen: for an incurable and disgraceful pit fit for enemies
  alternatives:
  - into an irreparable and infamous pit suitable for foes
  - for a hopeless and shameful pit befitting enemies
  lexicon: LSJ
  rationale: βόθρος is literally a pit, here likely a figurative or literal place
    of destruction. ἀνήκεστος means incurable/irremediable; δυσκλεής means ill-famed/disgraceful.
    πρέποντα δυσμενέσιν modifies the pit as something suitable for enemies. 'For'
    rather than 'into' reflects εἰς with destination/purpose nuance in the decree's
    rhetoric.
