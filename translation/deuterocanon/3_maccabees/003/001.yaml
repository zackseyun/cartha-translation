id: 3MA.3.1
reference: 3 Maccabees 3:1
source:
  edition: lxx-swete-1909
  text: Α καὶ μεταλαβὼν ὁ δυσσεβὴς ἐπὶ τοσούτον ἐξεχόλησεν ὥστε οὐ μόνον τοῖς κατὰ
    Ἀλεξάνδρειαν ὀργίζεσθαι ἀλλὰ καὶ τοῖς ἐν τῇ χώρᾳ βαρυτέρως ἐναντιοῦσθαι, καὶ προστάξας
    σπεύδοντας συναγαγεῖν πάντας ἐπὶ τὸ αὐτό, καὶ χειρίστῳ μόρῳ τοῦ ζῇν μεταστῆσαι.
  language: Greek
  pages:
