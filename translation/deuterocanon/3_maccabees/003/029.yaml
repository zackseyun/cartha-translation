id: 3MA.3.29
reference: 3 Maccabees 3:29
source:
  edition: lxx-swete-1909
  text: πᾶς δὲ τόπος, οὗ ἐὰν φωραθῇ τὸ σύνολον σκεπαζόμενος Ἰουδαῖος, ἄβατος καὶ πυριφλεγὴς
    γινέσθω, καὶ πάσῃ θνητῇ φύσει καθʼ ἅπαν ἄχρηστος φανήσεται εἰς τὸν ἀεὶ χρόνον.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 740
  - 741
  - 752
  confidence: high
  validation: minor_mismatch
translation:
  text: But every place where a Jew is discovered in hiding shall become inaccessible
    and set on fire, and it shall be shown to be altogether useless to every mortal
    creature for all time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where a Jew is detected while hidden'; the Greek around τὸ σύνολον σκεπαζόμενος
      is difficult, and the sense is that any place harboring a concealed Jew is to
      be treated as cursed and destroyed.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ... τόπος
  chosen: every place
  alternatives:
  - every location
  - any place
  lexicon: LSJ
  rationale: A straightforward distributive expression; 'every place' preserves the
    decree's sweeping scope.
- source_word: οὗ ἐὰν φωραθῇ
  chosen: where ... is discovered
  alternatives:
  - wherever ... is detected
  - where ... is found out
  lexicon: LSJ
  rationale: φωράω commonly means to detect or discover, often with the sense of exposing
    what is hidden. 'Is discovered' is natural English and fits the legal/decretal
    tone.
- source_word: τὸ σύνολον
  chosen: while being concealed
  alternatives:
  - altogether
  - entirely
  - in sum
  lexicon: LSJ
  rationale: The transmitted wording is awkward in context. Taken with σκεπαζόμενος,
    it most plausibly intensifies the state of concealment rather than introducing
    a separate object. Rendering the phrase adverbially as 'while being concealed'
    captures the sense without overtranslating a difficult construction.
- source_word: σκεπαζόμενος
  chosen: being concealed
  alternatives:
  - being sheltered
  - being hidden
  - being covered
  lexicon: LSJ
  rationale: The participle from σκεπάζω denotes being covered or hidden. In this
    context of harboring a prohibited person, 'being concealed' best conveys the intended
    sense.
- source_word: Ἰουδαῖος
  chosen: a Jew
  alternatives:
  - a Judean
  lexicon: LSJ
  rationale: In 3 Maccabees this term refers to the Jewish people as an ethnic-religious
    group under persecution, not merely geographic origin. 'Jew' is the clearest contextual
    rendering.
- source_word: ἄβατος
  chosen: inaccessible
  alternatives:
  - impassable
  - not to be entered
  lexicon: LSJ
  rationale: ἄβατος literally means not to be walked on or entered. 'Inaccessible'
    gives clear modern English while preserving the decree's sense of prohibition/desolation.
- source_word: πυριφλεγής
  chosen: burned with fire
  alternatives:
  - set ablaze
  - fire-scorched
  - burning with fire
  lexicon: LSJ
  rationale: The adjective denotes being inflamed or blazing with fire. Because the
    clause states what the place is to become under judgment, 'burned with fire' communicates
    the result in idiomatic English.
- source_word: πάσῃ θνητῇ φύσει
  chosen: to every mortal creature
  alternatives:
  - to every mortal nature
  - to all mortal beings
  - to every human being
  lexicon: LSJ
  rationale: 'The phrase is broad: literally ''to every mortal nature.'' ''Every mortal
    creature'' preserves the universal scope better than restricting it to humans
    alone.'
- source_word: καθʼ ἅπαν ἄχρηστος
  chosen: altogether useless
  alternatives:
  - completely unusable
  - entirely worthless
  lexicon: LSJ
  rationale: The phrase intensifies total uselessness. 'Altogether useless' is both
    accurate and readable.
- source_word: φανήσεται
  chosen: it shall appear
  alternatives:
  - it shall be shown
  - it shall prove
  lexicon: LSJ
  rationale: Future middle/passive of φαίνω can mean 'will appear' or 'will be shown.'
    'It shall appear' keeps the formal tone and follows the Greek closely.
- source_word: εἰς τὸν ἀεὶ χρόνον
  chosen: for all time
  alternatives:
  - forever
  - for the age to come
  lexicon: LSJ
  rationale: An idiomatic expression for enduring perpetuity. 'For all time' is natural
    and preserves the decree's permanent force.
