theological_decisions:
- issue: Referent and force of the pejorative genitive phrase τῶν ἀλητρίων καὶ μηδέποτε
    ληγόντων τῆς ἀνοίας
  chosen_reading: The phrase is taken as describing the people associated with the
    Jerusalem temple ('those never-winnowed and never-ceasing in their folly'), not
    the temple itself.
  alternative_readings:
  - '''the temple of the pure and those who never cease from devotion'''
  - '''the temple of those unshaken and unceasing in zeal'''
  rationale: The transmitted Greek is rhetorically hostile in context and naturally
    reads as a genitive dependent on ἱερόν, identifying the temple by reference to
    its adherents. Because ἀλητρίων is rare and difficult, softer renderings are possible,
    but the immediate narrative voice is antagonistic and supports preserving the
    insult rather than normalizing it.
  doctrine_reference: Preserve source ambiguity/tension rather than smoothing; original-language
    primacy over translation tradition.
