id: 3MA.3.16
reference: 3 Maccabees 3:16
source:
  edition: lxx-swete-1909
  text: καὶ τοῖς κατὰ πόλεσιν ἱεροῖς ἀπονείμαντες προσόδους πλείστας, προηχθημεν καὶ
    εἰς τὰ Ἱεροσόλυμα ἀναβάντες τιμῆσαι τὸ ἱερὸν τῶν ἀλητρίων καὶ μηδέποτε ληγόντων
    τῆς ἀνοίας.
