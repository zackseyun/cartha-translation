translation:
  text: And after assigning very great revenues to the temples in the cities, we also
    went on and, going up to Jerusalem, to honor the temple of those never-winnowed
    and never-ceasing in their folly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek expression rendered 'those never-winnowed' is rare and difficult.
      It may be a hostile metaphor for people viewed as unrefined or uncleansed; some
      interpreters take it more positively and render the phrase in a less pejorative
      way.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπονείμαντες
  chosen: after assigning
  alternatives:
  - having distributed
  - having apportioned
  lexicon: LSJ
  rationale: Aorist participle indicating prior action relative to the main verb;
    'assigning' fits the administrative sense of apportioning revenues.
- source_word: προσόδους πλείστας
  chosen: very great revenues
  alternatives:
  - very large revenues
  - abundant income
  lexicon: LSJ
  rationale: πρόσοδοι refers to revenues/income rather than generic gifts; πλείστας
    intensifies quantity, so 'very great revenues' preserves the fiscal nuance.
- source_word: προηχθημεν
  chosen: we also went on
  alternatives:
  - we proceeded
  - we advanced
  lexicon: LSJ
  rationale: The passive/middle form here functions idiomatically for moving forward/proceeding.
    'Went on' is readable modern English while preserving sequence.
- source_word: ἀναβάντες
  chosen: going up
  alternatives:
  - having gone up
  - ascending
  lexicon: LSJ
  rationale: Standard idiom for travel up to Jerusalem; retained in a natural English
    participial form.
- source_word: τιμῆσαι
  chosen: to honor
  alternatives:
  - to pay honor to
  - to revere
  lexicon: LSJ
  rationale: Infinitive of purpose after the movement verbs; 'honor' is concise and
    fits cultic respect without overinterpreting.
- source_word: τὸ ἱερὸν
  chosen: the temple
  alternatives:
  - the sanctuary
  - the holy place
  lexicon: LSJ
  rationale: In this context ἱερόν denotes the temple complex/shrine. 'Temple' is
    the clearest natural rendering.
- source_word: ἀλητρίων
  chosen: never-winnowed
  alternatives:
  - unthreshed
  - unwinnowed
  lexicon: LSJ
  rationale: The adjective is unusual and metaphorical. Its basic agricultural image
    is of grain not separated/cleansed by winnowing. 'Never-winnowed' preserves the
    vivid insult and avoids flattening it into a generic moral term.
- source_word: μηδέποτε ληγόντων
  chosen: never-ceasing
  alternatives:
  - never stopping
  - never ending
  lexicon: LSJ
  rationale: Genitive plural participial phrase modifying the same group; 'never-ceasing'
    keeps the elevated rhetorical tone.
- source_word: ἀνοίας
  chosen: folly
  alternatives:
  - madness
  - senselessness
  lexicon: LSJ
  rationale: ἀνοία can denote folly or senselessness; 'folly' fits the polemical royal
    voice without importing clinical overtones.
