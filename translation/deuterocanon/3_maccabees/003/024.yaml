theological_decisions:
- issue: Rendering of polemical descriptors in a royal accusation
  chosen_reading: Retain the charged terms 'ungodly,' 'traitors,' and 'barbarous enemies'
    as part of the speaker's rhetoric rather than softening them.
  alternative_readings:
  - Use milder civic language such as 'disloyal' or 'hostile'
  rationale: The verse reports hostile characterization by the speaker; softening
    the terms would mute the text's rhetorical and ideological force. This is not
    an endorsement by the translation but a faithful rendering of the accusation.
  doctrine_reference: Translation philosophy §§1, 6
