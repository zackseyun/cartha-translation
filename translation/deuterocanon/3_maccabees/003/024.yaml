id: 3MA.3.24
reference: 3 Maccabees 3:24
source:
  edition: lxx-swete-1909
  text: διὸ καὶ τεκμηρίοις καλῶς πεπεισμένοι τούτους κατὰ πάντα δυσνοεῖν ἡμῖν τρόπον,
    καὶ προνοούμενοι μή ποτε ἐφνιδίου μετέπειτα ταραχῆς ἐνστάσης ἡμῖν τοὺς δυσσεβεῖς
    τούτους κατὰ νώτου προδότας καὶ βαρβάρους ἔχωμεν πολεμίους,
  language: Greek
