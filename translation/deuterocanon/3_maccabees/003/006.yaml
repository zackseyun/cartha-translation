id: 3MA.3.6
reference: 3 Maccabees 3:6
source:
  edition: lxx-swete-1909
  text: τὴν μὲν οὖν περὶ τὸ γένος ἐν πᾶσιν θρυλουμένην εὐπραξίαν οἱ ἀλλόφυλοι οὐδαμῶς
    διηριθμήσαντο·
  language: Greek
