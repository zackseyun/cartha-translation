id: 3MA.3.3
reference: 3 Maccabees 3:3
source:
  edition: lxx-swete-1909
  text: οἱ δὲ Ἰουδαῖοι τὴν μὲν πρὸς τοὺς βασιλεῖς εὔνοιαν καὶ πίστιν ἀδιάστροφον ἦσαν
    φυλάσσοντες·
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
