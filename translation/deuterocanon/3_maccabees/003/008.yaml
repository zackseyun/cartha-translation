id: 3MA.3.8
reference: 3 Maccabees 3:8
source:
  edition: lxx-swete-1909
  text: Οἱ δὲ κατὰ τὴν πόλιν Ἕλληνες οὐδὲν ἠδικημένοι, ταραχὴν ἀπροσδόκητον περὶ τοὺς
    ἄνδρας θεωροῦντες καὶ συνδρομὰς ἀπροκόπους γινομένας, βοηθεῖν μὲν οὐκ ἔσθενον·
    παρακλῆσιν γὰρ ἡ διάθεσις παρεκάλουν· οἱ δὲ καὶ συνδρόμως εἶχον, καὶ μεταπεσεῖσθαι
    ταῦτα ὑπελάμβανον.
