translation:
  text: But though they accepted our presence in word, in deed they were insincere,
    when we were eager to enter their temple and honor it with the most splendid and
    finest offerings,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'verbally they welcomed our presence, but in practice acted insincerely.'
    reason: lexical_alternative
  - marker: b
    text: The Greek term for 'offerings' can also mean dedicated gifts or votive offerings
      placed in a temple.
    reason: cultural_note
lexical_decisions:
- source_word: λόγῳ μὲν ... τῷ δὲ πράγματι
  chosen: in word ... in deed
  alternatives:
  - verbally ... in practice
  - in speech ... in reality
  lexicon: LSJ
  rationale: Preserves the rhetorical contrast between what was said and what was
    actually done. 'In word ... in deed' is concise and natural in English while staying
    close to the Greek antithesis.
- source_word: ἀποδεξάμενοι
  chosen: accepted
  alternatives:
  - received
  - welcomed
  lexicon: LSJ
  rationale: The participle indicates receiving or accepting the king's presence.
    'Accepted' fits the construction with παρουσίαν and avoids overstating warmth
    implied by 'welcomed.'
- source_word: παρουσίαν
  chosen: presence
  alternatives:
  - visit
  - coming
  lexicon: LSJ
  rationale: The noun here refers to the ruler's personal presence/arrival. 'Presence'
    is the most direct rendering and matches the object of their verbal acceptance.
- source_word: νόθως
  chosen: were false
  alternatives:
  - acted deceitfully
  - insincerely
  - illegitimately
  lexicon: LSJ
  rationale: The adverb conveys spuriousness or falseness. Because English adverbs
    like 'spuriously' sound unnatural here, 'were false' idiomatically expresses that
    their actual conduct did not match their words.
- source_word: προθυμηθέντων ἡμῶν
  chosen: we eagerly desired
  alternatives:
  - we were eager
  - we were willing
  lexicon: LSJ
  rationale: The genitive absolute expresses the speaker's eager intention. 'We eagerly
    desired' preserves the volitional force of προθυμέομαι without flattening it to
    mere willingness.
- source_word: εἰσελθεῖν εἰς τὸν ναὸν αὐτῶν
  chosen: to enter into their temple
  alternatives:
  - to go into their sanctuary
  - to enter their shrine
  lexicon: LSJ
  rationale: ναός is best rendered 'temple' in this historical setting. 'Their temple'
    reflects αὐτῶν and the outsider perspective of the speaker.
- source_word: τοῖς ἐκπρεπέσιν καὶ καλλίστοις ἀναθήμασιν
  chosen: with the most splendid and finest offerings
  alternatives:
  - with magnificent and very beautiful votive gifts
  - with distinguished and beautiful dedications
  lexicon: LSJ
  rationale: ἀναθήματα are dedicated gifts or offerings. 'Offerings' is more readable
    than 'votive gifts' while still fitting the temple context; the paired superlative
    adjectives are represented by 'most splendid and finest.'
- source_word: τιμῆσαι
  chosen: honor it
  alternatives:
  - pay honor to it
  - show it honor
  lexicon: LSJ
  rationale: The infinitive expresses the purpose of entering the temple. 'Honor it'
    is concise and natural, with 'it' referring to the temple as the object of honor
    in context.
