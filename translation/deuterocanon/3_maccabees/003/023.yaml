id: 3MA.3.23
reference: 3 Maccabees 3:23
source:
  edition: lxx-swete-1909
  text: οὐ μόνον ἀπεστρέψαντο τὴν ἄτιμητον πολιτίαν, ἀλλὰ καὶ βδελύσσονται λόγῳ τε
    καὶ σιγῇ τοὺς ἐν αὐτοῖς ὀλίγους πρὸς ἡμᾶς γνησίως διακειμένους, παρʼ ἕκαστα ἐφορμώμενοι
    μετὰ τῆς δυσσεβεστάτης ἐμφάσεως διὰ τάχους ἡμᾶς καταστρέψαι τὰ πράγματα.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 740
  - 741
  - 752
  confidence: high
  validation: agree
translation:
  text: Not only have they rejected the honorable civic order, but they also detest,
    both in speech and in silence, the few among them who are genuinely well-disposed
    toward us, and at every opportunity, driven by the most impious pretext, they
    rush to bring our affairs to ruin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'by word and by silence,' implying both open and tacit
      hostility.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the honorable civic order' renders πολιτεία broadly as the valued
      civic arrangement or constitution, not merely individual citizenship.
    reason: lexical_alternative
  - marker: c
    text: Or 'under the most impious pretext' for 'driven by the most impious pretext.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεστρέψαντο
  chosen: have rejected
  alternatives:
  - have turned away from
  - have repudiated
  lexicon: LSJ
  rationale: Middle voice of ἀποστρέφω here conveys turning away from or rejecting
    a state/order. 'Have rejected' is idiomatic and preserves the force of deliberate
    repudiation.
- source_word: τὴν ἄτιμητον πολιτίαν
  chosen: the honorable civic order
  alternatives:
  - the esteemed constitution
  - the prized citizenship
  - the honored way of life
  lexicon: LSJ
  rationale: πολιτεία can denote civic order, constitution, commonwealth, or citizenship.
    In this royal-political context it refers to the valued civic arrangement/order
    rather than individual citizenship status. ἄτιμητον here is taken in the positive
    sense attested by context as 'honored/valuable' rather than 'dishonored'; the
    accusation is that they have rejected a prized civic arrangement.
- source_word: βδελύσσονται
  chosen: they detest
  alternatives:
  - they abhor
  - they loathe
  lexicon: LSJ
  rationale: Strong verb of abhorrence. 'Detest' is forceful but readable modern English.
- source_word: λόγῳ τε καὶ σιγῇ
  chosen: both in speech and in silence
  alternatives:
  - by word and by silence
  - openly and tacitly
  lexicon: LSJ
  rationale: The paired dative expression is best preserved fairly literally; it suggests
    both explicit and tacit hostility.
- source_word: τοὺς ἐν αὐτοῖς ὀλίγους
  chosen: the few among them
  alternatives:
  - the few within their number
  - the small number among them
  lexicon: LSJ
  rationale: Straightforward rendering of the phrase identifying a minority within
    the group.
- source_word: πρὸς ἡμᾶς γνησίως διακειμένους
  chosen: who are genuinely well-disposed toward us
  alternatives:
  - who are sincerely loyal to us
  - who are truly inclined toward us
  lexicon: LSJ
  rationale: διακεῖμαι with πρός expresses disposition toward someone; γνησίως adds
    sincerity/genuineness. 'Well-disposed' avoids overstating as formal political
    loyalty while preserving favorable orientation.
- source_word: παρʼ ἕκαστα
  chosen: at every opportunity
  alternatives:
  - on every occasion
  - in every matter
  lexicon: LSJ
  rationale: 'Idiomatic adverbial sense in context: whenever occasion arises. This
    fits the flow better than a wooden ''in each matter.'''
- source_word: ἐφορμώμενοι
  chosen: driven
  alternatives:
  - rushing upon
  - setting themselves against
  - making assaults
  lexicon: LSJ
  rationale: The participle literally suggests making an attack or rushing upon. In
    English, linked with the following infinitive and pretext phrase, 'driven' captures
    hostile impetus without awkwardness.
- source_word: μετὰ τῆς δυσσεβεστάτης ἐμφάσεως
  chosen: by the most impious pretext
  alternatives:
  - with the most godless show
  - under the most impious pretence
  - with the most irreverent allegation
  lexicon: LSJ
  rationale: ἔμφασις can denote appearance, insinuation, or pretext. In this accusatory
    political context 'pretext' best fits. δυσσεβεστάτης is a superlative of impiety/godlessness.
- source_word: διὰ τάχους
  chosen: they rush
  alternatives:
  - with haste
  - quickly
  lexicon: LSJ
  rationale: The phrase denotes haste/speed. Rendering it verbally as 'they rush'
    keeps the sentence natural in English while preserving urgency.
- source_word: ἡμᾶς καταστρέψαι τὰ πράγματα
  chosen: to bring our affairs to ruin
  alternatives:
  - to overthrow our state
  - to ruin our interests
  - to destroy our situation
  lexicon: LSJ
  rationale: καταστρέψαι with τὰ πράγματα points to overturning or ruining one's affairs/state
    of things. 'Bring our affairs to ruin' preserves the broad political sense without
    over-narrowing to physical destruction alone.
