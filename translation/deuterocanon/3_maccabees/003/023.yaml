theological_decisions:
- issue: Value sense of ἄτιμητον in πολιτίαν
  chosen_reading: honorable/esteemed civic order
  alternative_readings:
  - dishonored civic order
  rationale: Although the form can suggest 'dishonored,' the immediate rhetoric of
    accusation favors the sense of a valued or honored civic arrangement that the
    subjects have rejected. Translating it negatively would make the charge less coherent
    in context.
