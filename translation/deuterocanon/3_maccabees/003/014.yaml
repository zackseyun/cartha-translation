theological_decisions:
- issue: Reference to pagan deities in royal speech
  chosen_reading: of the gods
  alternative_readings:
  - of God
  - by divine help
  rationale: The Greek explicitly has the plural τῶν θεῶν. Since the text is reporting
    a pagan ruler's perspective, the translation should preserve the historical-religious
    voice rather than harmonize it to biblical monotheistic diction.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never import doctrinal claims the text does not make.'
