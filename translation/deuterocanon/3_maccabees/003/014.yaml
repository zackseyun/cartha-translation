  text: τῆς εἰς τὴν Ἀσίαν γενομένης ἡμῖν ἐπιστρατείας, ἧς ἴστε καὶ αὐτοί, τῇ τῶν θεῶν
    ἀρρωστῷ συμμαχίᾳ κατὰ λόγον ἐπὶ τέλος ἀχθείσης,
  language: Greek
