translation:
  text: concerning our campaign into Asia, which you yourselves also know, which by
    the unfailing alliance of the gods was brought, as was fitting, to its conclusion,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the invincible alliance of the gods.' The adjective ἀρρωστῷ literally
      suggests something not weak or infirm, hence firm, unshaken, or unfailing.
    reason: lexical_alternative
  - marker: b
    text: Or 'was carried through to the end.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστρατείας
  chosen: campaign
  alternatives:
  - expedition
  - military campaign
  lexicon: LSJ
  rationale: The noun denotes a military expedition or campaign. 'Campaign' is concise,
    natural English and preserves the martial sense without overexpansion.
- source_word: εἰς τὴν Ἀσίαν
  chosen: into Asia
  alternatives:
  - against Asia
  - to Asia
  lexicon: LSJ
  rationale: εἰς with a place name most naturally indicates movement into/toward a
    region. 'Into Asia' preserves the directional force better than the more neutral
    'to Asia.'
- source_word: γενομένης ἡμῖν
  chosen: our
  alternatives:
  - undertaken by us
  - made by us
  lexicon: LSJ
  rationale: The genitive absolute with dative ἡμῖν idiomatically refers to the campaign
    that happened/was undertaken by us. In English, 'our campaign' is the most natural
    equivalent while retaining the possessive involvement.
- source_word: ἧς ἴστε καὶ αὐτοί
  chosen: which you yourselves also know
  alternatives:
  - which you too know
  - of which you yourselves are aware
  lexicon: LSJ
  rationale: The phrase appeals to the audience's own knowledge. 'Yourselves' reflects
    αὐτοί for emphasis; 'also' reflects καί.
- source_word: ἀρρωστῷ
  chosen: unfailing
  alternatives:
  - invincible
  - unshaken
  - strong
  lexicon: LSJ
  rationale: Literally 'not weak/sick,' here modifying συμμαχίᾳ. In context it describes
    a firm, dependable alliance. 'Unfailing' communicates that sense idiomatically
    in English better than the more physical 'strong' or the overstated 'invincible.'
- source_word: συμμαχίᾳ
  chosen: alliance
  alternatives:
  - aid
  - support
  lexicon: LSJ
  rationale: The noun denotes alliance or assistance in war. 'Alliance' fits the military
    context and the genitive 'of the gods' well.
- source_word: τῶν θεῶν
  chosen: of the gods
  alternatives:
  - from the gods
  lexicon: LSJ
  rationale: The genitive most directly qualifies 'alliance.' Because 3 Maccabees
    here places pagan royal speech on the lips of the speaker, the translation should
    preserve the polytheistic wording rather than normalize it.
- source_word: κατὰ λόγον
  chosen: as was fitting
  alternatives:
  - reasonably
  - according to plan
  - as expected
  lexicon: LSJ
  rationale: The idiom can mean 'according to reason' or 'as is proper/fitting.' In
    this royal retrospective, it signals that the outcome accorded with expectation
    or propriety. 'As was fitting' preserves that evaluative nuance better than the
    adverb 'reasonably.'
- source_word: ἐπὶ τέλος ἀχθείσης
  chosen: was brought ... to its conclusion
  alternatives:
  - was carried through to the end
  - was brought to completion
  lexicon: LSJ
  rationale: The participial phrase means being brought to an end/completion. 'Brought
    to its conclusion' is idiomatic and preserves the passive sense.
