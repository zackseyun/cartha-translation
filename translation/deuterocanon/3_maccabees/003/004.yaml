theological_decisions:
- issue: Referent of τούτων in τῷ τούτων νόμῳ
  chosen_reading: Rendered as 'his law,' referring the law ultimately to God.
  alternative_readings:
  - '''their law,'' referring to the Jews'
  - '''the law of these people'''
  rationale: The Greek expression is compressed and could be taken more literally
    as 'the law of these people.' Because the clause begins with worship of God and
    then speaks of living by the associated law, English 'his law' best preserves
    the theological linkage without awkwardness. The alternative is preserved in a
    footnote because the pronoun could also point to the people.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    ambiguity in footnotes where genuine.'
