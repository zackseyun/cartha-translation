translation:
  text: But because they worshiped God and lived according to his law, they kept themselves
    separate in matters of food; for this reason some regarded them as hateful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'lived according to their law' / 'the law of these people.' The Greek
      expression is compressed.
    reason: alternative_reading
lexical_decisions:
- source_word: σεβόμενοι
  chosen: worshiped
  alternatives:
  - revered
  - feared
  lexicon: BDAG
  rationale: The participle denotes devout reverence expressed toward God. 'Worshiped'
    is natural English and captures religious devotion more clearly than the broader
    'revered'.
- source_word: πολιτευόμενοι
  chosen: lived according to
  alternatives:
  - conducted themselves by
  - ordered their common life by
  lexicon: LSJ
  rationale: The verb can denote conducting one's life or living as a citizen under
    a rule. Here it refers to ordering life by the law, not merely holding a civic
    status. 'Lived according to' is idiomatic and faithful.
- source_word: τῷ τούτων νόμῳ
  chosen: his law
  alternatives:
  - their law
  - the law belonging to these people
  lexicon: LSJ
  rationale: τούτων is somewhat compressed in context. Since the immediately preceding
    object is God and the sense is that the Jews lived by the law associated with
    him, 'his law' best conveys the intended relation in English. 'Their law' is possible
    but can obscure that the law is grounded in God.
- source_word: χωρισμὸν ἐποίουν
  chosen: they kept themselves separate
  alternatives:
  - they made a separation
  - they maintained separation
  lexicon: LSJ
  rationale: The idiom means to practice separation. Reflexive English brings out
    the social sense without over-paraphrasing.
- source_word: ἐπὶ τῷ κατὰ τὰς τροφάς
  chosen: in matters of food
  alternatives:
  - with respect to foods
  - regarding diet
  lexicon: LSJ
  rationale: The phrase specifies the sphere in which separation was practiced, namely
    dietary matters. 'In matters of food' is clear modern English and avoids sounding
    technical.
- source_word: ἀπεχθεῖς
  chosen: hateful
  alternatives:
  - detestable
  - odious
  - hated
  lexicon: LSJ
  rationale: The adjective describes how they appeared to others because of this separation.
    'Hateful' preserves the evaluative force. 'Hated' would shift from perceived offensiveness
    to others' emotional response.
- source_word: ἐφαίνοντο
  chosen: regarded
  alternatives:
  - appeared
  - seemed
  lexicon: BDAG
  rationale: In context the sense is not merely visual appearance but social perception
    by others. 'Regarded' makes explicit the implied viewpoint.
