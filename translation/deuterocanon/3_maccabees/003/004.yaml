  text: σεβόμενοι δὲ τὸν θεόν, καὶ τῷ τούτων νόμῳ πολιτευόμενοι, χωρισμὸν ἐποίουν
    ἐπὶ τῷ κατὰ τὰς τροφάς. διʼ ἣν αἰτίαν ἔνιοι ἀπεχθεῖς ἐφαίνοντο.
