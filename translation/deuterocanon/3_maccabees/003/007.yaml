id: 3MA.3.7
reference: 3 Maccabees 3:7
source:
  edition: lxx-swete-1909
  text: τὴν δὲ περὶ τῶν προσκυνήσεων καὶ τροφῶν διάστασιν ἐθρύλουν, φάσκοντες μήτε
    τῷ βασιλεῖ μήτε ταῖς δυνάμεσιν ὁμοτρόπως τοὺς ἀνθρώπους γίνεσθαι, δυσμενεῖς δὲ
    εἶναι καὶ μέγα τι τοῖς πράγμασιν ἐναντιουμένους· καὶ οὐ τῷ τυχόντι περιήψαντο
    φόβῳ.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 740
  - 741
  - 752
  confidence: high
  validation: agree
translation:
  text: But they kept spreading talk about the disagreement over acts of homage and
    foods, saying that these people would not become of one way with either the king
    or his forces, but were hostile and strongly opposed to the affairs of state;
    and so they attached to them no ordinary fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worship and foods.' The Greek for 'acts of homage' can also be rendered
      'worship' or 'obeisances,' preserving ambiguity between religious and courtly
      acts of reverence.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they attached to them no ordinary fear,' meaning they burdened
      them with a serious public fear or suspicion.
    reason: lexical_alternative
lexical_decisions:
- source_word: διάστασιν
  chosen: disagreement
  alternatives:
  - division
  - difference
  - dissension
  lexicon: LSJ
  rationale: The term denotes a state of separation or conflict. 'Disagreement' fits
    the immediate context of reported social-religious nonconformity without overstating
    it as open revolt.
- source_word: προσκυνήσεων
  chosen: acts of homage
  alternatives:
  - worship
  - prostrations
  - obeisances
  lexicon: LSJ
  rationale: The plural likely refers to outward gestures of reverence or obeisance
    expected in the royal setting. 'Acts of homage' preserves the political-religious
    ambiguity better than the more narrowly cultic 'worship'.
- source_word: τροφῶν
  chosen: foods
  alternatives:
  - dietary practices
  - food laws
  lexicon: LSJ
  rationale: A straightforward rendering of the noun. The broader issue is dietary
    distinctiveness, but the Greek itself simply says 'foods,' so the more interpretive
    'food laws' is avoided in the main text.
- source_word: ἐθρύλουν
  chosen: kept spreading talk
  alternatives:
  - kept gossiping
  - circulated rumors
  - repeated publicly
  lexicon: LSJ
  rationale: The imperfect suggests ongoing action, and the verb carries the sense
    of spreading talk or rumor. 'Kept spreading talk' captures both the iterative
    force and the pejorative nuance.
- source_word: φάσκοντες
  chosen: saying
  alternatives:
  - claiming
  - asserting
  lexicon: LSJ
  rationale: This participle introduces the content of the slander. 'Saying' is idiomatic
    and neutral enough, while the surrounding context already conveys the hostile
    nature of the report.
- source_word: ὁμοτρόπως ... γίνεσθαι
  chosen: become of one way
  alternatives:
  - be of the same mind
  - conform alike
  - adopt the same manner
  lexicon: LSJ
  rationale: The expression concerns sharing the same manner or way of life. 'Become
    of one way' preserves the idea of conformity without reducing it merely to opinion.
- source_word: ταῖς δυνάμεσιν
  chosen: his forces
  alternatives:
  - the authorities
  - the powers
  - the army
  lexicon: LSJ
  rationale: In this context the word most naturally refers to the king's power structures
    or armed forces. 'His forces' is broad enough to preserve the ambiguity while
    remaining natural English.
- source_word: δυσμενεῖς
  chosen: hostile
  alternatives:
  - ill-disposed
  - unfriendly
  - malicious
  lexicon: LSJ
  rationale: The adjective indicates active ill will, not mere distance. 'Hostile'
    communicates the severity of the accusation.
- source_word: μέγα τι τοῖς πράγμασιν ἐναντιουμένους
  chosen: strongly opposed to the affairs of state
  alternatives:
  - opposing public matters in a serious way
  - greatly resisting the regime
  - setting themselves against the government's interests
  lexicon: LSJ
  rationale: τοῖς πράγμασιν here refers broadly to public affairs or the established
    order. 'Affairs of state' best fits the political accusation being made, and 'strongly
    opposed' reflects μέγα τι without wooden literalism.
- source_word: οὐ τῷ τυχόντι ... φόβῳ
  chosen: no ordinary fear
  alternatives:
  - no slight fear
  - not a random fear
  - a considerable fear
  lexicon: LSJ
  rationale: This idiom means 'not a trivial/slight' fear. 'No ordinary fear' is idiomatic
    English and preserves the emphatic force.
- source_word: περιήψαντο
  chosen: attached to them
  alternatives:
  - fastened on them
  - imputed to them
  - stirred up against them
  lexicon: LSJ
  rationale: The verb literally suggests fastening or hanging something upon someone.
    In context it means they saddled the Jews with a serious fear or suspicion in
    the public mind. 'Attached to them' keeps the metaphor visible while remaining
    understandable.
