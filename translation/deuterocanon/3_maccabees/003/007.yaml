theological_decisions:
- issue: Whether προσκυνήσεων should be rendered in a narrowly cultic sense ('worship')
    or more broadly as courtly/ritual homage
  chosen_reading: acts of homage
  alternative_readings:
  - worship
  - obeisances
  rationale: The verse concerns accusations against Jewish distinctiveness before
    royal power. The Greek term can include worship, but in this political setting
    it likely includes expected gestures of reverence toward authority. The broader
    rendering preserves the ambiguity rather than forcing a strictly cultic reading.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3
- issue: How explicitly to render τοῖς πράγμασιν as political/state affairs
  chosen_reading: the affairs of state
  alternative_readings:
  - public affairs
  - the established order
  rationale: 'The accusation is political: the Jews are portrayed as dangerous to
    the king and his realm. Rendering the phrase as ''the affairs of state'' makes
    the public-political reference clear without adding claims beyond the Greek.'
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
