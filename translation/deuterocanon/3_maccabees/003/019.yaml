theological_decisions:
- issue: Nature of the accusation in a hostile royal decree
  chosen_reading: Render the statement as a political slander without softening its
    rhetoric.
  alternative_readings:
  - Translate more neutrally to reduce the anti-Jewish polemic
  rationale: The verse is part of an accusatory speech against the Jews. The translation
    should preserve the hostile rhetoric of the speaker rather than mute it, while
    not endorsing it.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
