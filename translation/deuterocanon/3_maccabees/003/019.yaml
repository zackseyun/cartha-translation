id: 3MA.3.19
reference: 3 Maccabees 3:19
source:
  edition: lxx-swete-1909
  text: τὴν δὲ αὐτῶν εἰς ἡμᾶς δυσμένειαν ἔκδηλον καθιστάντες, ὡς μονώτατοι τῶν ἐθνῶν
    βασιλεῦσιν καὶ τοῖς ἑαυτῶν εὐεργέταις ὑψαυχνοῦντες οὐδὲν γνήσιον βούλονται φέρειν.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 740
  - 741
  - 752
  confidence: high
  validation: agree
translation:
  text: And by making their hostility toward us plain, they, alone among the nations,
    act arrogantly toward kings and toward their own benefactors, and are willing
    to offer nothing sincere.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are willing to show nothing genuine.' The Greek phrase οὐδὲν γνήσιον
      βούλονται φέρειν is somewhat idiomatic; the sense is that they offer no sincere
      or genuine disposition toward those in authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυσμένειαν
  chosen: hostility
  alternatives:
  - ill will
  - enmity
  lexicon: LSJ
  rationale: The noun denotes active ill will or hostility. 'Hostility' fits the political
    accusation in context better than the somewhat softer 'ill will' and is more natural
    than 'enmity' here.
- source_word: ἔκδηλον καθιστάντες
  chosen: making ... plain
  alternatives:
  - making ... evident
  - displaying openly
  lexicon: LSJ
  rationale: The participial phrase literally conveys causing something to be manifest
    or evident. 'Making ... plain' preserves the causative sense in readable English.
- source_word: μονώτατοι τῶν ἐθνῶν
  chosen: alone among the nations
  alternatives:
  - the only ones among the nations
  - uniquely among the peoples
  lexicon: LSJ
  rationale: The superlative stresses singularity. 'Alone among the nations' is idiomatic
    and preserves the polemical force of the claim.
- source_word: βασιλεῦσιν
  chosen: kings
  alternatives:
  - the kings
  - rulers
  lexicon: LSJ
  rationale: Dative plural without article is best rendered generically as 'kings.'
    'Rulers' would broaden beyond the Greek term.
- source_word: τοῖς ἑαυτῶν εὐεργέταις
  chosen: their own benefactors
  alternatives:
  - those who do them good
  - their beneficent patrons
  lexicon: LSJ
  rationale: εὐεργέτης is a standard term for a benefactor or patron. 'Their own benefactors'
    preserves both the social-political nuance and the reflexive ἑαυτῶν.
- source_word: ὑψαυχνοῦντες
  chosen: act arrogantly toward
  alternatives:
  - are haughty toward
  - hold their necks high against
  lexicon: LSJ
  rationale: The verb is rare and vivid, literally suggesting high-necked pride. 'Act
    arrogantly toward' communicates the idiomatic sense in current English without
    over-literal awkwardness.
- source_word: γνήσιον
  chosen: sincere
  alternatives:
  - genuine
  - loyal
  lexicon: LSJ
  rationale: γνήσιος can mean genuine or true-born; in this context of political reliability,
    'sincere' best captures the accusation that they offer no genuine goodwill. 'Loyal'
    is interpretive and too specific.
- source_word: βούλονται φέρειν
  chosen: are willing to offer
  alternatives:
  - wish to bring
  - intend to render
  lexicon: LSJ
  rationale: The idiom combines volition with bringing/bearing. In context, 'offer'
    naturally conveys extending or showing something such as sincere goodwill.
