translation:
  text: And they approached the king, asking for their release to their own homes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their own places.' The Greek idiom εἰς τὰ ἴδια can refer more broadly
      to what belongs to someone, but here likely means returning home.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέτυχον
  chosen: approached
  alternatives:
  - appealed to
  - petitioned
  - met with
  lexicon: LSJ
  rationale: The verb can mean to meet with, approach, or make petition to someone.
    In this context, followed by a participial clause expressing the request, 'approached'
    preserves both the physical/direct audience and the implied appeal without over-specifying
    a formal legal petition.
- source_word: τῷ βασιλεῖ
  chosen: the king
  lexicon: LSJ
  rationale: Standard rendering of the dative object with the article; no title nuance
    beyond 'king' is indicated here.
- source_word: τὴν ἀπόλυσιν
  chosen: release
  alternatives:
  - dismissal
  - freedom
  - sending away
  lexicon: LSJ
  rationale: ἀπόλυσις denotes release or dismissal. 'Release' fits the immediate context
    of people being allowed to depart, without implying a broader juridical emancipation
    beyond the verse.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - of them
  lexicon: Greek grammar
  rationale: The genitive pronoun naturally modifies 'release' in English as 'their
    release.'
- source_word: εἰς τὰ ἴδια
  chosen: to their own homes
  alternatives:
  - to their own places
  - to their own property
  - to what was their own
  lexicon: LSJ
  rationale: The idiom εἰς τὰ ἴδια commonly means returning to one's own place/home.
    'Their own homes' communicates the idiomatic sense clearly in modern English.
- source_word: αἰτούμενοι
  chosen: asking for
  alternatives:
  - requesting
  - seeking
  lexicon: LSJ
  rationale: The participle explains the manner/content of their approach to the king.
    'Asking for' is natural modern English and accurately reflects the requestive
    force.
