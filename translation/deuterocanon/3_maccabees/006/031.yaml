theological_decisions:
- issue: Rendering ᾅδης
  chosen_reading: Hades
  alternative_readings:
  - death
  - the grave
  rationale: The source text explicitly uses ᾅδης, and the translation philosophy
    favors original-language primacy over inherited smoothing. Here the term functions
    idiomatically for the realm of the dead, but retaining 'Hades' preserves the Greek
    imagery and avoids importing a narrower doctrinal reading.
  doctrine_reference: Translation philosophy §1, §6
