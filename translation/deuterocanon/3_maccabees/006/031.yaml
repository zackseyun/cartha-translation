id: 3MA.6.31
reference: 3 Maccabees 6:31
source:
  edition: lxx-swete-1909
  text: τότε οἱ πρὶν ἐπονείδιστοι καὶ πλησίον τοῦ ᾅδου, μᾶλλον δὲ ἐπʼ αὐτῷ βεβηκότες,
    ἀντὶ πικροῦ καὶ δυσαπότικου μόρου κῶθωνα σωτήριον συστησάμενοι, τὸν εἰς πτῶσιν
    αὐτοῖς καὶ τάφον ἡτοιμασμένον τόπον κλισίας κατεμέρισαν πλήρεις χαρμονῆς.
  language: Greek
  pages:
