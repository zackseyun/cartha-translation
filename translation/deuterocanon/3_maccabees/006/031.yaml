translation:
  text: Then those who had formerly been disgraced and were near Hades—or rather,
    had already stepped onto it—in place of a bitter and hard-to-drink fate prepared
    a saving drinking-bout, and they divided up as dining-couches, full of joy, the
    place prepared for them for downfall and a grave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'near death' / 'near the grave'; Greek 'near Hades.'
    reason: lexical_alternative
  - marker: b
    text: The Greek expression literally says they had 'stepped onto' Hades, a vivid
      way of saying they were as good as dead.
    reason: cultural_note
  - marker: c
    text: The term rendered 'drinking-bout' may also be understood more broadly as
      a festive banquet or drinking feast.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπονείδιστοι
  chosen: disgraced
  alternatives:
  - reproached
  - reviled
  - subject to insult
  lexicon: LSJ
  rationale: Conveys a state of public shame or reproach in natural English without
    overformal wording.
- source_word: πλησίον τοῦ ᾅδου
  chosen: near Hades
  alternatives:
  - near death
  - near the grave
  lexicon: LSJ
  rationale: The Greek names ᾅδης explicitly. 'Hades' preserves the source term rather
    than flattening it to 'death,' while still fitting the Jewish-Greek idiom for
    the realm of the dead.
- source_word: ἐπʼ αὐτῷ βεβηκότες
  chosen: had already stepped onto it
  alternatives:
  - had already set foot on it
  - had already reached it
  lexicon: LSJ
  rationale: Perfect participle of βαίνω with ἐπί gives the vivid image of having
    set foot upon Hades itself. The idiom is metaphorical for being at death's threshold.
- source_word: μόρου
  chosen: fate
  alternatives:
  - doom
  - death-lot
  - destiny
  lexicon: LSJ
  rationale: μόρος can denote fate or doom; 'fate' works well with the paired adjectives
    and the contrast with the joyful reversal in context.
- source_word: πικροῦ καὶ δυσαπότικου
  chosen: bitter and hard-to-drink
  alternatives:
  - bitter and undrinkable
  - bitter and difficult to swallow
  lexicon: LSJ
  rationale: Preserves the drinking metaphor that prepares for κῶθωνα. 'Hard-to-drink'
    is slightly more literal than 'difficult to swallow' and avoids overinterpreting
    as impossible.
- source_word: κῶθωνα
  chosen: drinking-bout
  alternatives:
  - carousal
  - banquet-cup
  - feast
  lexicon: LSJ
  rationale: The term can refer to a drinking vessel or a drinking occasion. In this
    context, with συστησάμενοι and the following mention of couches, it points to
    a festive drinking/banqueting event rather than a single cup.
- source_word: σωτήριον
  chosen: saving
  alternatives:
  - salvific
  - bringing deliverance
  - for deliverance
  lexicon: LSJ
  rationale: 'Adjectival use modifying κῶθωνα: the event is characterized by deliverance.
    ''Saving'' is concise and readable.'
- source_word: συστησάμενοι
  chosen: prepared
  alternatives:
  - arranged
  - set up
  - organized
  lexicon: LSJ
  rationale: Captures the middle voice sense of arranging for themselves a celebratory
    occasion.
- source_word: τόπον
  chosen: place
  alternatives:
  - site
  - spot
  lexicon: LSJ
  rationale: Simple and direct; the context then specifies what kind of place it became.
- source_word: εἰς πτῶσιν αὐτοῖς καὶ τάφον ἡτοιμασμένον
  chosen: prepared for them for downfall and a grave
  alternatives:
  - made ready for their ruin and burial
  - prepared for their destruction and tomb
  lexicon: LSJ
  rationale: Retains the grim double expression of intended ruin and burial without
    smoothing away the hostile purpose behind the place.
- source_word: κλισίας κατεμέρισαν
  chosen: they divided up as dining-couches
  alternatives:
  - they apportioned into reclining places
  - they distributed as banquet-couches
  lexicon: LSJ
  rationale: κλισία can denote a couching/reclining arrangement for a meal. The phrase
    depicts the condemned place being repurposed into banquet seating. 'Dining-couches'
    makes the banquet image explicit for modern readers.
- source_word: πλήρεις χαρμονῆς
  chosen: full of joy
  alternatives:
  - filled with gladness
  - full of delight
  lexicon: LSJ
  rationale: Straightforward rendering of the emotional reversal in the verse.
