id: 3MA.6.39
reference: 3 Maccabees 6:39
source:
  edition: lxx-swete-1909
  text: ἐν αἷς καὶ μεγαλοδόξως ἐπιφάνας τὸ ἔλεος αὐτοῦ ὁ τῶν πάντων δυνάστης ἀπταίστους
    αὐτοὺς ἐρρύσατο ὁμοθυμαδόν.
  language: Greek
