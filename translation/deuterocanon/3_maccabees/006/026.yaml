translation:
  text: Who has so lawlessly surrounded with cruelties those who from the beginning
    have surpassed all nations in goodwill toward us in every respect, and who have
    repeatedly shown themselves in the gravest dangers among men?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have excelled all nations in every way'; the Greek verb can mean either
      'differ from' or, in context, 'surpass/excel.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the worst dangers among men' is idiomatic and difficult; it
      likely refers to the gravest dangers encountered in human affairs, or dangers
      such as men suffer.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς
  chosen: Who has
  alternatives:
  - What person has
  - Who is it that has
  lexicon: LSJ
  rationale: Interrogative pronoun introducing a rhetorical question; 'Who has' is
    the most natural English opening and preserves the force of the Greek.
- source_word: τοὺς ἐξ ἀρχῆς
  chosen: those who from the beginning
  alternatives:
  - those from the first
  - those who from the outset
  lexicon: LSJ
  rationale: The article with phrase functions substantivally, referring to a group
    characterized by longstanding conduct. 'From the beginning' preserves the temporal
    sense without overinterpreting.
- source_word: εὐνοίᾳ πρὸς ἡμᾶς
  chosen: in goodwill toward us
  alternatives:
  - with goodwill toward us
  - by benevolence toward us
  lexicon: LSJ
  rationale: εὔνοια denotes goodwill, favor, or benevolence. 'Goodwill toward us'
    is clear modern English and fits the dative/instrumental nuance.
- source_word: κατὰ πάντα διαφέροντας πάντων ἐθνῶν
  chosen: have surpassed all nations in every respect
  alternatives:
  - excel all nations in all things
  - differ from all nations in every way
  lexicon: LSJ
  rationale: διαφέρω here carries the sense of excelling or being superior rather
    than merely being different. 'Have surpassed all nations in every respect' captures
    both κατὰ πάντα and the comparative force with πάντων ἐθνῶν.
- source_word: τοὺς ... ἐπιδειγμένους
  chosen: who have repeatedly shown themselves
  alternatives:
  - who have repeatedly displayed themselves
  - who have often proved themselves
  lexicon: LSJ
  rationale: Aorist middle participle of ἐπιδείκνυμι can mean to show or demonstrate
    oneself. 'Shown themselves' is idiomatic and keeps the reflexive/middle sense.
- source_word: χειρίστους ... κινδύνους
  chosen: the worst dangers
  alternatives:
  - the gravest dangers
  - the most terrible perils
  lexicon: LSJ
  rationale: χειρίστους is the superlative of bad/worse; with κινδύνους it denotes
    extreme dangers. 'Worst dangers' is direct and readable.
- source_word: πλεονάκις
  chosen: repeatedly
  alternatives:
  - often
  - many times
  lexicon: LSJ
  rationale: The adverb indicates repeated occurrence. 'Repeatedly' conveys frequency
    with slightly more rhetorical weight than 'often.'
- source_word: ἀνθρώπων
  chosen: among men
  alternatives:
  - among people
  - of men
  lexicon: LSJ
  rationale: The genitive with κινδύνους is difficult, but in context it likely means
    dangers encountered in human affairs / among men. 'Among men' preserves the masculine/generic
    form in line with the project's gender-accurate policy and avoids flattening the
    phrase.
- source_word: οὕτως ἀθέσμως
  chosen: so lawlessly
  alternatives:
  - so unlawfully
  - so outrageously
  lexicon: LSJ
  rationale: ἀθέσμως denotes acting contrary to law/custom/right. 'Lawlessly' preserves
    the moral-legal force; 'so' reflects οὕτως.
- source_word: περιέβαλεν αἰκίαις
  chosen: has surrounded with cruelties
  alternatives:
  - has encompassed with outrages
  - has afflicted with brutalities
  lexicon: LSJ
  rationale: περιβάλλω literally 'throw around, surround'; with αἰκίαις it is metaphorical
    for hemming in with abuse or outrage. 'Surrounded with cruelties' preserves the
    vivid image and the plural noun's force.
