theological_decisions:
- issue: Rendering anthropomorphic language for God in τὸ ἅγιον αὐτοῦ πρόσωπον
  chosen_reading: his holy face
  alternative_readings:
  - his holy presence
  - his holy countenance
  rationale: The Greek uses concrete anthropomorphic language. Per translation philosophy,
    theological tension should be preserved rather than softened; therefore the literal
    image remains in the main text, with more interpretive alternatives noted lexically.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Visibility clause excluding the Jews
  chosen_reading: visible to everyone except the Jews
  alternative_readings:
  - manifest to all but the Jews
  rationale: The text explicitly states that the angels were apparent to all except
    the Jews. The translation preserves this narrative claim without attempting to
    explain why or soften the exclusion.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
