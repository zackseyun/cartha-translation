translation:
  text: Then the greatly glorious, almighty, and true God, revealing his holy face,
    opened the heavenly gates, from which two glorified angels of fearful appearance
    came down, visible to everyone except the Jews,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his holy presence' or 'his holy countenance' for 'his holy face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγαλοδόξος
  chosen: greatly glorious
  alternatives:
  - most glorious
  - of great glory
  lexicon: LSJ
  rationale: A compound adjective intensifying divine glory. 'Greatly glorious' preserves
    the emphatic force without collapsing it into a conventional title.
- source_word: παντοκράτωρ
  chosen: almighty
  alternatives:
  - all-powerful
  - ruler of all
  lexicon: LSJ
  rationale: In reference to God, 'almighty' is the most natural and established English
    equivalent and fits the elevated style of the passage.
- source_word: ἀληθινὸς θεός
  chosen: true God
  alternatives:
  - real God
  - genuine God
  lexicon: LSJ
  rationale: '''True God'' is the standard idiomatic rendering and preserves the contrastive
    theological force of ἀληθινός.'
- source_word: ἐπιφάνας
  chosen: revealing
  alternatives:
  - appearing with
  - manifesting
  lexicon: LSJ
  rationale: The participle denotes making himself manifest. Because the direct object
    is 'his holy face,' 'revealing' best captures the sense that God disclosed his
    presence.
- source_word: τὸ ἅγιον αὐτοῦ πρόσωπον
  chosen: his holy face
  alternatives:
  - his holy presence
  - his holy countenance
  lexicon: LSJ
  rationale: πρόσωπον literally means 'face.' While it can imply presence, the concrete
    imagery is strong here and should be preserved in the main text.
- source_word: ἠνέῳξε τὰς οὐρανίους πύλας
  chosen: opened the gates of heaven
  alternatives:
  - opened the heavenly gates
  lexicon: LSJ
  rationale: Both are possible; 'gates of heaven' is slightly more idiomatic in English
    while preserving the genitival sense conveyed by the adjective οὐρανίους.
- source_word: δεδοξασμένοι
  chosen: glorious
  alternatives:
  - glorified
  - honored
  lexicon: LSJ
  rationale: For angels descending from heaven, 'glorious' communicates their exalted
    splendor more naturally than the more technical 'glorified.'
- source_word: φοβεροειδεῖς
  chosen: of fearful appearance
  alternatives:
  - terrifying in appearance
  - fearsome-looking
  lexicon: LSJ
  rationale: The compound points to an appearance that inspires fear. 'Of fearful
    appearance' preserves the descriptive form and elevated register.
- source_word: φανεροὶ πᾶσιν πλὴν τοῖς Ἰουδαίοις
  chosen: visible to everyone except the Jews
  alternatives:
  - plain to all except the Jews
  - manifest to all except the Jews
  lexicon: LSJ
  rationale: 'φανεροί here concerns perceptibility. ''Visible'' makes the narrative
    sense explicit: all saw them except the Jewish people.'
