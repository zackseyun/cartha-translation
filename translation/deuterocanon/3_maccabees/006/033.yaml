theological_decisions:
- issue: Rendering σωτηρία in a narrative rescue context
  chosen_reading: deliverance
  alternative_readings:
  - salvation
  rationale: The verse celebrates a concrete historical rescue of the people. 'Deliverance'
    best matches the immediate narrative sense while leaving room for theological
    resonance without overstating it.
  doctrine_reference: 'Translation philosophy: original-language primacy; avoid importing
    doctrinal claims the text does not make.'
- issue: Interpretation of εἰς οὐρανόν
  chosen_reading: to heaven
  alternative_readings:
  - to God
  - toward heaven
  rationale: The Greek names 'heaven,' likely as reverential metonymy, but does not
    explicitly say 'God.' The translation preserves the source wording and its theological
    restraint.
  doctrine_reference: 'Translation philosophy: preserve the source''s plain sense;
    do not import doctrinal claims the text does not make.'
