translation:
  text: But let the nations cower today before your invincible power, O honored one,
    having power for the salvation of the race of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of Jacob' for 'the race of Jacob'; the Greek γένος can denote
      lineage, family line, or people descended from a common ancestor.
    reason: lexical_alternative
lexical_decisions:
- source_word: πτηξάτω
  chosen: let ... cower
  alternatives:
  - let ... shrink back
  - let ... be terrified
  - let ... tremble
  lexicon: LSJ
  rationale: Aorist imperative of πτήσσω/πτήσσω-related form conveys recoiling in
    fear or cringing back. 'Cower' captures both fear and retreating submission in
    natural English.
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: LSJ
  rationale: In this prayer context the reference is to the surrounding peoples collectively,
    not specifically to a Jew/Gentile theological contrast. 'Nations' is the most
    natural and broadly accurate rendering.
- source_word: σὴν δύναμιν ἀνίκητον
  chosen: your invincible power
  alternatives:
  - your unconquerable might
  - your undefeated strength
  lexicon: LSJ
  rationale: δύναμις here denotes might/power, and ἀνίκητος means unconquerable or
    invincible. 'Invincible power' is concise and idiomatic while preserving the force
    of the Greek.
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: LSJ
  rationale: Straightforward temporal adverb; 'today' is clear modern English.
- source_word: ἔντιμε
  chosen: O honored one
  alternatives:
  - O noble one
  - O revered one
  lexicon: LSJ
  rationale: Vocative of ἔντιμος, literally 'honored' or 'esteemed.' Since it directly
    addresses God in elevated prayer, 'O honored one' preserves the vocative force
    without importing a more specific title not present in the Greek.
- source_word: δυνάμεις ἔχων
  chosen: since you have power
  alternatives:
  - having power
  - possessing might
  lexicon: LSJ
  rationale: The participial phrase explains the basis for the petition. A slightly
    smoother English causal rendering ('since you have power') fits optimal equivalence
    while retaining the sense of possessed capability.
- source_word: ἐπὶ σωτηρίαν
  chosen: for the salvation of
  alternatives:
  - to save
  - for deliverance of
  lexicon: LSJ
  rationale: The preposition with accusative here expresses purpose or direction toward
    rescue. 'For the salvation of' preserves the noun σωτηρία and the elevated register
    of the prayer.
- source_word: Ἰακὼβ γένους
  chosen: the race of Jacob
  alternatives:
  - the family of Jacob
  - the people of Jacob
  - the stock of Jacob
  lexicon: LSJ
  rationale: γένος denotes race, stock, family line, or people descended from an ancestor.
    'Race of Jacob' is formally close and fits the collective-descendant sense in
    context, though 'people of Jacob' is possible.
