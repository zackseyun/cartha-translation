translation:
  text: And when they had ended their all-lamenting song of mourning, they took up
    the song of their fathers, praising God, the savior of Israel and worker of wonders;
    and having cast off every cry of grief and wailing, they formed dances as a sign
    of peaceful rejoicing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ancestral song.' The adjective πάτριον denotes what belongs to
      the fathers or ancestral tradition.
    reason: lexical_alternative
  - marker: b
    text: Or 'they organized choruses.' The Greek χοροὺς can refer to dancing groups
      or choruses; the context favors festive dancing.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταλήξαντες
  chosen: when they had ended
  alternatives:
  - having ceased
  - after ending
  lexicon: LSJ
  rationale: Aorist participle marking prior action before the main verb ἀνέλαβον.
    'When they had ended' is natural English and preserves the temporal sequence.
- source_word: θρήνων πανόδυρτον μέλος
  chosen: their all-lamenting song of mourning
  alternatives:
  - their utterly mournful lament
  - their full-wailing dirge
  lexicon: LSJ
  rationale: μέλος is literally 'song' or 'melody'; θρήνων gives the mourning context;
    πανόδυρτον intensifies the lamentation. The chosen rendering keeps the musical
    image rather than flattening it to mere 'lament'.
- source_word: ἀνέλαβον
  chosen: they took up
  alternatives:
  - they began
  - they raised
  lexicon: LSJ
  rationale: In context of song, 'took up' idiomatically conveys beginning or resuming
    a song while staying close to the Greek.
- source_word: ᾠδὴν πάτριον
  chosen: the song of their fathers
  alternatives:
  - their ancestral song
  - their native song
  lexicon: LSJ
  rationale: πάτριος commonly means ancestral or traditional. 'Song of their fathers'
    preserves the familial-historical sense and fits the Israelite context.
- source_word: σωτῆρα
  chosen: savior
  alternatives:
  - deliverer
  lexicon: BDAG
  rationale: σωτήρ denotes one who saves or delivers. 'Savior' is the most direct
    rendering and suits the doxological tone.
- source_word: τερατοποιὸν
  chosen: worker of wonders
  alternatives:
  - wonder-worker
  - maker of marvels
  lexicon: LSJ
  rationale: A compound meaning one who performs portents or wonders. 'Worker of wonders'
    is clear modern English without sounding colloquial.
- source_word: αἰνοῦντες
  chosen: praising
  alternatives:
  - extolling
  lexicon: BDAG
  rationale: Standard doxological verb; 'praising' is simple and accurate.
- source_word: οἰμωγὴν ... καὶ κωκυτὸν
  chosen: every cry of grief and wailing
  alternatives:
  - all lamentation and shrieking
  - every groan and lament
  lexicon: LSJ
  rationale: The pair denotes audible expressions of distress. 'Cry of grief and wailing'
    preserves the emotional force without overtranslating.
- source_word: ἀπωσάμενοι
  chosen: having cast off
  alternatives:
  - having put away
  - having driven away
  lexicon: LSJ
  rationale: Middle participle conveys rejecting or thrusting away. 'Cast off' captures
    decisive abandonment of mourning.
- source_word: χοροὺς συνίσταντο
  chosen: they formed dances
  alternatives:
  - they organized choruses
  - they assembled dancing groups
  lexicon: LSJ
  rationale: χορός can mean dance or chorus; in festive context with rejoicing, 'dances'
    best conveys embodied celebration in English. συνίσταντο suggests setting them
    in order or forming them.
- source_word: εὐφροσύνης εἰρηνικῆς σημεῖον
  chosen: as a sign of peaceful rejoicing
  alternatives:
  - as a token of tranquil gladness
  - as a sign of peace-filled joy
  lexicon: LSJ
  rationale: σημεῖον is 'sign' or 'token'; εὐφροσύνη is gladness/rejoicing; εἰρηνικός
    qualifies it as peaceable or peaceful. The chosen phrase is idiomatic and preserves
    all three elements.
