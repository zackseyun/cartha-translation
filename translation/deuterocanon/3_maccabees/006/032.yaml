theological_decisions:
- issue: Reference of 'the savior of Israel and worker of wonders'
  chosen_reading: These titles refer to God and are rendered directly as praise addressed
    about him.
  rationale: The Greek apposition τὸν Ἰσραὴλ σωτῆρα καὶ τερατοποιὸν ... θεόν clearly
    identifies God as Israel's savior and wonder-worker. No further doctrinal expansion
    is imported.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
