id: 3MA.6.36
reference: 3 Maccabees 6:36
source:
  edition: lxx-swete-1909
  text: καὶ κοινὸν ὁρισάμενοι περὶ τούτων θεσμὸν, ἐπὶ πᾶσαν τὴν παροικίαν αὐτῶν εἰς
    γενεάς, τὰς προειρημένας ἡμέρας ἄγειν ἐστήσαν εὐφροσύνους, οὐ πότου χάριν καὶ
    λιχνείας, σωτηρίας δὲ τῆς διὰ θεῶν γενομένης αὐτοῖς.
  language: Greek
