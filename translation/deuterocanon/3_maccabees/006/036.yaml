theological_decisions:
- issue: Rendering the phrase διὰ θεῶν in a Jewish narrative context
  chosen_reading: through God
  alternative_readings:
  - through the gods
  rationale: The immediate literary and religious context is Jewish and speaks of
    divine deliverance. While the transmitted Greek form θεῶν is plural in Swete's
    text, rendering it woodenly as 'through the gods' would likely misrepresent the
    narrative's theological intent. The alternative is preserved in a footnote as
    a textual/lexical note for transparency.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition
