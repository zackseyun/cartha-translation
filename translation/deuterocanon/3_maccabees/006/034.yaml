id: 3MA.6.34
reference: 3 Maccabees 6:34
source:
  edition: lxx-swete-1909
  text: οἵ τε πρὶν εἰς ὄλεθρον καὶ οἰωνόβρωτους αὐτοὺς ἐξεσθιέμενοι καὶ μετὰ χαρᾶς
    ἀπογραφάμενοι, κατεστέναξαν αἰσχύνην ἐφʼ ἑαυτοῖς περιβαλόμενοι, καὶ πυρόπνουν
    τόλμαν ἀκμαίως ἐσβεσμένοι.
