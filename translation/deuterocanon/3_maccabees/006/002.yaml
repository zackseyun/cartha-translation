theological_decisions:
- issue: Stacked divine titles in direct address
  chosen_reading: 'Render all titles explicitly: ''O King, mighty in power, Most High,
    almighty God'''
  alternative_readings:
  - Compress titles into fewer English expressions
  - Translate παντοκράτωρ as 'Ruler of all'
  rationale: The Greek piles up honorifics in prayer. Preserving the sequence maintains
    the rhetoric and theology of divine sovereignty without collapsing distinct epithets.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering of παντοκράτωρ
  chosen_reading: almighty
  alternative_readings:
  - all-powerful
  - ruler of all
  rationale: Though 'ruler of all' is etymologically possible, 'almighty' is the established
    biblical title in English and accurately conveys the divine epithet here without
    obscuring meaning.
  doctrine_reference: Translation philosophy §6
