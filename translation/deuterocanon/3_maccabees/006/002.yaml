translation:
  text: O King, mighty in power, Most High, almighty God, governing all creation with
    mercies,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole creation.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'with mercies' could also be rendered 'with compassion' or 'mercifully';
      the Greek uses a plural noun, emphasizing God's merciful acts or abundant mercy.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεῦ
  chosen: O King
  alternatives:
  - King
  lexicon: LSJ
  rationale: Vocative address opening a prayer; 'O King' preserves the direct invocation
    and elevated tone.
- source_word: μεγαλοκράτωρ
  chosen: mighty in power
  alternatives:
  - great ruler
  - all-powerful
  - mighty sovereign
  lexicon: LSJ
  rationale: Compound emphasizing greatness and strength/dominion. 'Mighty in power'
    preserves the force without sounding overly wooden.
- source_word: ὕψιστε
  chosen: Most High
  alternatives:
  - highest one
  - Most Exalted
  lexicon: LSJ
  rationale: Standard rendering for the divine epithet in vocative form; preserves
    biblical resonance and the superlative sense.
- source_word: παντοκράτωρ
  chosen: almighty
  alternatives:
  - all-powerful
  - ruler of all
  lexicon: LSJ
  rationale: Common biblical rendering for the divine title; concise and natural in
    English while retaining theological weight.
- source_word: δέε
  chosen: God
  alternatives:
  - O God
  - deity
  lexicon: LSJ
  rationale: 'The vocative form addresses God directly. Because the line already begins
    with vocative force, ''God'' after ''almighty'' yields smooth English: ''almighty
    God.'''
- source_word: τὴν πᾶσαν ... κτίσιν
  chosen: all creation
  alternatives:
  - the whole creation
  - the entire created order
  lexicon: LSJ
  rationale: κτίσις here denotes the created order as a whole. 'All creation' is idiomatic
    and faithful.
- source_word: διακυβερνῶν
  chosen: governing
  alternatives:
  - steering
  - directing
  - ruling
  lexicon: LSJ
  rationale: The participle literally evokes steering or directing; 'governing' best
    fits the prayer's royal and cosmic register in English.
- source_word: ἐν οἰκτιρμοῖς
  chosen: with mercies
  alternatives:
  - in mercies
  - with compassion
  - mercifully
  lexicon: LSJ
  rationale: Plural noun stresses acts or abundance of mercy. 'With mercies' keeps
    the plural nuance better than the adverb 'mercifully,' though it remains natural
    enough in elevated prayer language.
