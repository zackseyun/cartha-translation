theological_decisions:
- issue: Rendering of divine vocatives ἀπάναυε and αἰώνιε
  chosen_reading: 'Both are translated as direct divine epithets: ''unceasing One,
    eternal One.'''
  alternative_readings:
  - taking ἀπάναυε adverbially with ἐπίδε ('look now without ceasing, eternal One')
  - rendering both more loosely as adjectives ('O tireless, eternal God')
  rationale: The Greek presents two vocative forms in sequence before the imperative
    ἐπίδε. Preserving them as epithets keeps the prayer's solemn address and avoids
    importing 'God' where the text does not explicitly repeat it.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Force of ἐκ τοῦ ζῆν μεθισταμένους
  chosen_reading: A plea about being taken out of life, i.e., facing death.
  alternative_readings:
  - being displaced from our way of life
  - being removed from among the living
  rationale: The phrase literally speaks of removal 'from living/from life.' In context
    of threatened execution, the death sense is primary, but the English keeps the
    source image rather than paraphrasing fully as 'killed.'
  doctrine_reference: Translation philosophy §§1, 3
