translation:
  text: But you, who possess all might and dominion, unceasing, eternal One, look
    now; have mercy on us, who through the insolent violence of lawless men are being
    senselessly deprived of life in the manner of conspirators.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'untiring One' for ἀπάναυε.
    reason: lexical_alternative
  - marker: b
    text: Literally 'being removed from life'; the sense in context is being put to
      death.
    reason: lexical_alternative
  - marker: c
    text: Or 'like conspirators' for 'in the manner of plotters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλκήν
  chosen: might
  alternatives:
  - strength
  - power
  lexicon: LSJ
  rationale: ἀλκή denotes strength or prowess. 'Might' fits the elevated prayer style
    and pairs naturally with δυναστείαν without flattening both into the same English
    word.
- source_word: δυναστείαν
  chosen: dominion
  alternatives:
  - power
  - sovereignty
  - rule
  lexicon: LSJ
  rationale: The term points to ruling power or lordship, not merely raw force. 'Dominion'
    preserves the distinction from ἀλκήν and suits a divine address.
- source_word: ἀπάναυε
  chosen: unceasing One
  alternatives:
  - untiring One
  - ceaseless One
  lexicon: LSJ
  rationale: 'Used vocatively here as a divine epithet. Rather than forcing an adverbial
    sense, the translation preserves the address: God as the one who does not cease
    or grow weary.'
- source_word: αἰώνιε
  chosen: eternal One
  alternatives:
  - everlasting One
  - eternal
  lexicon: LSJ
  rationale: Also vocative and parallel to ἀπάναυε. 'Eternal One' makes the address
    explicit in natural English while preserving the solemn tone.
- source_word: ἐπίδε
  chosen: look now
  alternatives:
  - look upon us now
  - see now
  - take notice now
  lexicon: LSJ
  rationale: Imperative of ἐφοράω/ἐπιδέχομαι contextually meaning 'look upon' or 'behold.'
    'Look now' is concise and urgent; the following plea for mercy makes the object
    clear.
- source_word: καθʼ ὕβριν
  chosen: through the insolent violence
  alternatives:
  - with outrage
  - by arrogant abuse
  - through insolence
  lexicon: LSJ
  rationale: ὕβρις carries the sense of arrogant, abusive violence, not mere pride.
    'Through the insolent violence' captures both the moral and physical dimensions
    in context.
- source_word: ἀνόμων
  chosen: lawless men
  alternatives:
  - the lawless
  - wicked men
  lexicon: LSJ
  rationale: The genitive modifies the agents responsible for the abuse. 'Lawless
    men' is gender-accurate and reflects the concrete persecutors in the narrative.
- source_word: ἀλόγιστον
  chosen: irrationally
  alternatives:
  - senselessly
  - without reason
  - unreasonably
  lexicon: LSJ
  rationale: The adverb stresses the senseless, unreasonable nature of the action.
    'Irrationally' preserves that force, though in idiomatic English it modifies the
    passive verbal idea.
- source_word: ἐκ τοῦ ζῆν μεθισταμένους
  chosen: being removed from life
  alternatives:
  - being taken away from living
  - being transferred out of life
  - being driven from life
  lexicon: LSJ
  rationale: μεθίστημι here conveys removal or transfer from a state; with ἐκ τοῦ
    ζῆν it refers to being taken out of life, i.e., put to death. 'Being removed from
    life' is direct without over-paraphrasing.
- source_word: ἐν ἐπιβούλων τρόπῳ
  chosen: in the manner of plotters
  alternatives:
  - like conspirators
  - as though we were conspirators
  - in a conspiratorial way
  lexicon: LSJ
  rationale: ἐπίβουλος denotes one who plots or schemes. The phrase likely describes
    the mode or pretext of their treatment. 'In the manner of plotters' preserves
    the ambiguity without adding 'as though' beyond the Greek.
