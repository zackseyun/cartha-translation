id: 3MA.6.12
reference: 3 Maccabees 6:12
source:
  edition: lxx-swete-1909
  text: σὺ δὲ ὁ πᾶσαν ἀλκὴν καὶ δυναστείαν ἔχων ἀπάναυε, αἰώνιε, νῦν ἐπίδε· ἐλέησον
    ἡμᾶς τοὺς καθʼ ὕβριν ἀνόμων ἀλόγιστον ἐκ τοῦ ζῆν μεθισταμένους ἐν ἐπιβούλων τρόπῳ.
  language: Greek
