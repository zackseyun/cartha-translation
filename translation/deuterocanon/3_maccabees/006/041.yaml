id: 3MA.6.41
reference: 3 Maccabees 6:41
source:
  edition: lxx-swete-1909
  text: συναινέσας δὲ αὐτοῖς ὁ βασιλεὺς ἔγραψεν αὐτοῖς τὴν ὑπογεγραμμένην ἐπιστολὴν
    πρὸς τοὺς κατὰ πόλιν στρατηγοὺς μεγαλοψύχως τὴν ἐκτενῆ ἔχουσαν·
  language: Greek
  pages:
  - 734
  - 742
