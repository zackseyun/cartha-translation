  - 752
  confidence: high
  validation: agree
translation:
  text: 'And when the king agreed with them, he wrote them the following letter to
    the generals in each city, magnanimously setting out the full account:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the letter written below' or 'the subjoined letter.'
    reason: lexical_alternative
  - marker: b
    text: The Greek στρατηγοί can also be rendered 'commanders' or, in some administrative
      contexts, 'governors,' but here 'generals' best matches the military-administrative
      setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: συναινέσας
  chosen: agreed with
  alternatives:
  - consented to
  - concurred with
  lexicon: LSJ
  rationale: Aorist participle of συναινέω indicates giving assent or agreement. 'Agreed
    with' is natural modern English and preserves the sense of consent to the proposal
    just mentioned.
- source_word: ὁ βασιλεύς
  chosen: the king
  lexicon: LSJ
  rationale: Standard rendering of the title, with no need for expansion.
- source_word: ἔγραψεν αὐτοῖς
  chosen: he wrote them
  alternatives:
  - he wrote to them
  lexicon: LSJ
  rationale: The dative αὐτοῖς can be rendered either way in English. 'He wrote them'
    is concise and idiomatic here, especially since the content of the letter follows.
- source_word: τὴν ὑπογεγραμμένην ἐπιστολήν
  chosen: the following letter
  alternatives:
  - the letter written below
  - the subjoined letter
  lexicon: LSJ
  rationale: ὑπογεγραμμένην literally means 'written below' or 'subjoined.' In running
    English introducing quoted correspondence, 'the following letter' best conveys
    the function without awkwardness.
- source_word: πρὸς τοὺς κατὰ πόλιν στρατηγούς
  chosen: to the generals in each city
  alternatives:
  - to the generals city by city
  - to the commanders in every city
  lexicon: LSJ
  rationale: στρατηγοί are military/civic officials; 'generals' is the most direct
    gloss. κατὰ πόλιν distributively means 'in each city' or 'city by city.'
- source_word: μεγαλοψύχως
  chosen: magnanimously
  alternatives:
  - generously
  - with noble spirit
  lexicon: LSJ
  rationale: The adverb conveys largeness of soul, nobility, or generosity. 'Magnanimously'
    preserves the elevated tone of the royal decree.
- source_word: τὴν ἐκτενῆ ἔχουσαν
  chosen: setting out the full account
  alternatives:
  - containing the detailed statement
  - having the extended contents
  lexicon: LSJ
  rationale: The phrase is somewhat compressed Greek describing the letter as having
    extended or detailed contents. 'Setting out the full account' gives clear English
    while preserving the idea of fullness/detail rather than merely length.
