translation:
  text: Let it be shown to all the nations that you are with us, Lord, and that you
    have not turned your face away from us; but just as you said, ‘Not even when they
    were in the land of their enemies did I disregard them,’ so fulfill this, Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The quoted line echoes covenant language about God not rejecting his people
      even in the land of their enemies; the Greek verb could also be rendered 'overlooked'
      or 'neglected.'
    reason: cross_reference
  - marker: b
    text: Or 'bring it to completion' for 'fulfill this.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δειχθήτω
  chosen: Let it be shown
  alternatives:
  - May it be shown
  - Let it be made known
  lexicon: LSJ
  rationale: Aorist passive imperative; 'Let it be shown' preserves the petitionary
    force and passive form without over-paraphrasing.
- source_word: πᾶσιν ἔθνεσιν
  chosen: to all the nations
  alternatives:
  - to all peoples
  - to all Gentiles
  lexicon: LSJ
  rationale: ἔθνεσιν in this context refers broadly to the nations/peoples observing
    God's action. 'Nations' is the most direct and biblically resonant rendering;
    'Gentiles' would import a sharper Jew/Gentile contrast than the immediate wording
    requires.
- source_word: μεθʼ ἡμῶν εἶ
  chosen: you are with us
  alternatives:
  - you are among us
  lexicon: LSJ
  rationale: Straightforward rendering of divine presence language; 'with us' is idiomatic
    and preserves the covenantal sense.
- source_word: οὐκ ἀπέστρεψας τὸ πρόσωπόν σου ἀφʼ ἡμῶν
  chosen: you have not turned your face away from us
  alternatives:
  - you have not turned away from us
  - you have not hidden your face from us
  lexicon: LSJ
  rationale: The Greek explicitly mentions 'your face,' echoing biblical idiom of
    favor/disfavor. Retaining 'face' preserves the metaphor and intertextual resonance.
- source_word: ὑπεριδον
  chosen: did I disregard
  alternatives:
  - did I overlook
  - did I despise
  - did I neglect
  lexicon: LSJ
  rationale: In the cited divine saying, the verb conveys not ignoring or casting
    off the people even in exile. 'Disregard' best fits the context and avoids the
    stronger emotional coloring of 'despise.'
- source_word: ἐπίτελεσον
  chosen: fulfill this
  alternatives:
  - bring this to completion
  - carry this out
  - accomplish it
  lexicon: LSJ
  rationale: The imperative asks God to bring his stated promise to realization. 'Fulfill
    this' is concise, natural English and fits the appeal to a prior divine word.
- source_word: καθὼς εἶπας
  chosen: just as you said
  alternatives:
  - as you said
  - just as you have said
  lexicon: LSJ
  rationale: Introduces a quotation of prior divine speech. 'Just as you said' preserves
    the comparative force of καθώς and reads naturally.
