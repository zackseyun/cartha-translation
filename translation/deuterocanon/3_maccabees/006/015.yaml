theological_decisions:
- issue: Rendering κύριε
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this prayer context it functions
    as a divine title and should be translated rather than transliterated or weakened.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Handling the embedded scriptural-style quotation about exile
  chosen_reading: 'Quoted as direct speech: ''Not even when they were in the land
    of their enemies did I disregard them,'''
  alternative_readings:
  - Paraphrastic indirect speech without quotation marks
  rationale: The Greek εἶπας naturally introduces direct speech, and preserving the
    quotation highlights the appeal to God's prior covenantal promise without specifying
    more than the text itself states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
