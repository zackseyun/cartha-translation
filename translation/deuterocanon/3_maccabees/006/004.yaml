theological_decisions:
- issue: Divine action toward Pharaoh and Israel is expressed in a single extended
    vocative-relative clause with vivid imagery.
  chosen_reading: Preserve both judgment and mercy imagery in one flowing sentence.
  alternative_readings:
  - Break into shorter clauses for readability
  - Flatten the light metaphor into 'showed mercy'
  rationale: The verse contrasts God's destruction of the arrogant oppressor with
    his merciful illumination toward Israel. Keeping both images preserves the prayer's
    theological rhetoric.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening theological weight.'
