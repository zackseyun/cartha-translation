translation:
  text: Father, you who destroyed Pharaoh—the former ruler of this Egypt—when he was
    exalted with lawless arrogance and boastful speech, increasing in reckless acts,
    together with his proud army, drowning them in the sea, and who shone forth the
    light of mercy upon the people of Israel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'multiplying acts of insolence' for the difficult phrase 'increasing
      in reckless acts' (πληθύνoντα θράμασιν).
    reason: lexical_alternative
  - marker: b
    text: Literally 'you destroyed [them] sea-swallowed,' an image of Pharaoh and
      his army being engulfed by the sea.
    reason: lexical_alternative
  - marker: c
    text: Literally 'you shone forth the light of mercy' upon Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάτερ
  chosen: Father
  alternatives:
  - O Father
  lexicon: LSJ
  rationale: Direct vocative address in prayer; 'Father' is natural modern English
    while preserving the solemn invocation.
- source_word: Φαραώ
  chosen: Pharaoh
  lexicon: LSJ
  rationale: Standard transliteration of the royal title/name in biblical English.
- source_word: τὸν πρὶν ... δυνάστην
  chosen: the former ruler
  alternatives:
  - the one-time ruler
  - the former tyrant
  - the previous potentate
  lexicon: LSJ
  rationale: πρὶν here functions adverbially/adjectivally as 'formerly, before now';
    δυνάστης denotes a ruler or potentate. 'Former ruler' is clear and avoids overloading
    the term with a stronger negative sense than the Greek itself requires.
- source_word: Αἰγύπτου ταύτης
  chosen: of this Egypt
  alternatives:
  - of Egypt here
  - of this land of Egypt
  lexicon: LSJ
  rationale: The demonstrative ταύτης is retained rather than flattened away. 'This
    Egypt' sounds slightly marked in English, but it reflects the Greek emphasis in
    the prayer's present setting.
- source_word: πληθύνoντα θράμασιν
  chosen: increasing in reckless acts
  alternatives:
  - multiplying acts of insolence
  - abounding in rash deeds
  lexicon: LSJ
  rationale: The phrase is difficult, but the sense is of Pharaoh becoming more excessive
    in audacious behavior. 'Reckless acts' captures θράσος-related daring/insolence
    without becoming too paraphrastic.
- source_word: ἐπαρθέντα
  chosen: was exalted
  alternatives:
  - was lifted up
  - became arrogant
  lexicon: LSJ
  rationale: The participle literally means 'having been lifted up' and in context
    conveys haughty self-exaltation. 'Was exalted' preserves the metaphor while the
    following phrase supplies the arrogant sense.
- source_word: ἀνόμῳ θράσει
  chosen: with lawless arrogance
  alternatives:
  - with unlawful insolence
  - with lawless audacity
  lexicon: LSJ
  rationale: θράσος/θράσει denotes boldness shading into insolence; ἀνόμῳ intensifies
    it morally. 'Lawless arrogance' is idiomatic and weighty.
- source_word: γλώσσῃ μεγαληγόμονι
  chosen: boastful speech
  alternatives:
  - a great-speaking tongue
  - haughty speech
  lexicon: LSJ
  rationale: The phrase describes proud, overblown speech. 'Boastful speech' is concise
    and natural.
- source_word: σὺν τῇ ὑπερηφάνῳ στρατιᾷ
  chosen: together with his proud army
  alternatives:
  - with his arrogant host
  - along with the haughty army
  lexicon: LSJ
  rationale: στρατιά is army/host; ὑπερήφανος is proud/arrogant. 'His' is supplied
    from context for English clarity.
- source_word: ποντοβρόχους ἀπώλεσας
  chosen: drowning them in the sea
  alternatives:
  - you destroyed them in the sea's engulfing flood
  - you made them swallowed by the sea
  lexicon: LSJ
  rationale: The compound adjective conveys being swallowed/engulfed by the sea. Rendering
    the participial/resultative sense dynamically as 'drowning them in the sea' communicates
    the image clearly.
- source_word: φέγγος ἐπιφάνας ἐλέους
  chosen: shone forth the light of mercy
  alternatives:
  - revealed the radiance of mercy
  - caused mercy's light to shine
  lexicon: LSJ
  rationale: 'The imagery is explicitly luminous: φέγγος is light/radiance and ἐπιφαίνω
    is to shine upon/appear. The chosen rendering preserves the metaphor.'
- source_word: Ἰσραὴλ γένει
  chosen: upon the people of Israel
  alternatives:
  - upon the race of Israel
  - for the family of Israel
  lexicon: LSJ
  rationale: γένος can mean race, stock, family, people. 'People of Israel' is natural
    English and fits biblical style without importing modern racial connotations.
