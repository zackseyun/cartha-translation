translation:
  text: You rescued the three companions in Babylonia, who had willingly given up
    their lives into the fire so as not to worship empty things; after cooling the
    blazing furnace, you delivered them all unharmed, and sent a flame upon all their
    adversaries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'you delivered them all to a hair,' that is, without even the
      loss of a hair.
    reason: lexical_alternative
  - marker: b
    text: '''Empty things'' refers to false objects of worship; alternatively, ''vain
      things'' or more interpretively ''idols.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἑταίρους
  chosen: companions
  alternatives:
  - friends
  - comrades
  lexicon: LSJ
  rationale: ἑταῖρος denotes an associate or companion. 'Companions' fits the narrative
    allusion to the three Jewish youths without importing a more interpretive label
    than the Greek itself uses.
- source_word: πυρὶ τὴν ψυχὴν αὐθαιρέτως δεδωκότας
  chosen: had willingly given up their lives into the fire
  alternatives:
  - had voluntarily surrendered themselves to the fire
  - had freely given their souls to the fire
  lexicon: LSJ
  rationale: The phrase combines voluntary action (αὐθαιρέτως) with giving over one's
    life/self (τὴν ψυχήν) to the fire. 'Lives' is more idiomatic than 'souls' here
    and best reflects the sense of self-sacrificial exposure to death.
- source_word: τοῖς κενοῖς
  chosen: empty things
  alternatives:
  - vain things
  - idols
  lexicon: LSJ
  rationale: The adjective/substantive literally means 'empty things' or 'vain things.'
    Although the referent is idols, the Greek does not use the standard noun for idols
    here. Rendering it literally preserves the polemical force without over-specifying.
- source_word: διάπυρον ... κάμινον
  chosen: the blazing furnace
  alternatives:
  - the intensely burning furnace
  - the superheated furnace
  lexicon: LSJ
  rationale: διάπυρος intensifies the furnace's heat. 'Blazing furnace' is natural
    English and preserves the image of extreme burning.
- source_word: δροσίσας
  chosen: after cooling
  alternatives:
  - having made cool
  - refreshing
  lexicon: LSJ
  rationale: The participle denotes causing coolness or dew-like relief. 'After cooling'
    captures the prior divine action in relation to the main verb ἐρρύσω.
- source_word: ἐρρύσω μέχρι τριχὸς ἁπάντων
  chosen: you delivered them all unharmed
  alternatives:
  - you rescued them all to the last hair
  - you saved every one of them without the loss of a hair
  lexicon: LSJ
  rationale: The idiom μέχρι τριχός means complete preservation, literally 'to a hair.'
    'Unharmed' conveys the idiomatic sense in readable English; the more literal alternative
    is preserved in rationale.
- source_word: φλόγα πᾶσιν ἐπιπέμψας τοῖς ὑπεναντίοις
  chosen: and sent a flame upon all their adversaries
  alternatives:
  - and sent fire against all their opponents
  - dispatching a flame to all those who stood against them
  lexicon: LSJ
  rationale: φλόξ is 'flame,' and ὑπεναντίοι are hostile opponents/adversaries. The
    participle is coordinated with the preceding divine acts, so 'and sent' gives
    smooth English while preserving the sequence.
- source_word: κατὰ τὴν Βαβυλωνίαν
  chosen: in Babylonia
  alternatives:
  - throughout Babylonia
  - in the region of Babylonia
  lexicon: LSJ
  rationale: The phrase locates the event geographically. 'In Babylonia' is the most
    straightforward rendering in context.
