id: 3MA.6.6
reference: 3 Maccabees 6:6
source:
  edition: lxx-swete-1909
  text: σὺ τοὺς κατὰ τὴν Βαβυλωνίαν τρεῖς ἑταίρους πυρὶ τὴν ψυχὴν αὐθαιρέτως δεδωκότας
    εἰς τὸ μὴ λατρεῦσαι τοῖς κενοῖς, διάπυρον δροσίσας κάμινον, ἐρρύσω μέχρι τριχὸς
