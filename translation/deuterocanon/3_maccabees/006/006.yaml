theological_decisions:
- issue: Allusion to the story of the three youths in the furnace
  chosen_reading: Retain the allusion without importing their names or expanding the
    narrative.
  alternative_readings:
  - Explicitly identify them as Hananiah, Azariah, and Mishael
  - Use 'three young men' to echo Daniel tradition more directly
  rationale: The Greek text itself says 'three companions' and assumes the reader
    knows the scriptural story. The translation preserves that allusive quality rather
    than harmonizing with fuller traditional retellings.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering τοῖς κενοῖς
  chosen_reading: Translate literally as 'empty things' rather than interpretively
    as 'idols.'
  alternative_readings:
  - idols
  - vain idols
  rationale: The text's theological polemic is sharpened by the literal wording, which
    characterizes false objects of worship as empty. Using 'idols' would be accurate
    by implication but less transparent to the Greek expression.
  doctrine_reference: Translation philosophy §1, §5
