translation:
  text: Who was it that removed each one from the secure strongholds of our homeland
    and household, where they had held us in faith, and gathered them here without
    reason?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfully,' 'in trust,' or possibly 'securely' for 'in faith' (ἐν πίστει);
      the Greek phrase is difficult in this context.
    reason: lexical_alternative
  - marker: b
    text: The Greek syntax in this clause is difficult; the sense is that the people
      were taken away from the secure places of their land and homes and assembled
      here without cause.
    reason: textual_variant
lexical_decisions:
- source_word: τίς
  chosen: Who was it
  alternatives:
  - Who
  lexicon: LSJ
  rationale: Interrogative pronoun introducing a rhetorical question. Expanded slightly
    in English for natural emphasis without changing sense.
- source_word: τοὺς κρατήσαντας ἡμῶν
  chosen: where they had held us
  alternatives:
  - those who held us
  - those who had control of us
  lexicon: LSJ
  rationale: The participle κρατήσαντας literally means 'having held/controlled.'
    In context with ἀποστήσας and ἤθροισεν, it refers to the prior state of the people
    in their places of security. The phrase is syntactically difficult in Swete's
    text; this rendering preserves the idea of being kept/held there without over-resolving
    the construction.
- source_word: ἐν πίστει
  chosen: in faith
  alternatives:
  - faithfully
  - in trust
  - securely
  lexicon: BDAG
  rationale: πίστις normally means 'faith' or 'trust.' Here the phrase is unusual
    in context; 'in faith' is retained in the main text to stay close to the Greek
    and to preserve ambiguity, rather than forcing an adverbial sense like 'securely.'
- source_word: τὰ τῆς χώρας ὀχυρώματα
  chosen: the secure strongholds of our homeland
  alternatives:
  - the fortresses of the land
  - the strong places of the country
  lexicon: LSJ
  rationale: ὀχυρώματα are fortified or secure places. χώρα is 'land/country.' 'Homeland'
    gives the relational force in context, while 'strongholds' preserves the concrete
    image.
- source_word: τῆς οἰκίας
  chosen: and household
  alternatives:
  - of the house
  - of home
  lexicon: LSJ
  rationale: οἰκία can mean house or household. Because the phrase appears alongside
    χώρα, the sense likely broadens from public homeland to private household/home.
    'Household' preserves that domestic dimension.
- source_word: ἀποστήσας
  chosen: removed each one from
  alternatives:
  - caused to depart from
  - drove away from
  lexicon: LSJ
  rationale: Aorist participle from ἀφίστημι/ἀποσπάω semantic field of causing separation
    or removal. 'Removed ... from' fits the syntax and avoids overstating coercion
    beyond the text.
- source_word: ἕκαστον
  chosen: each one
  alternatives:
  - every one
  - each person
  lexicon: LSJ
  rationale: Distributive singular; 'each one' preserves the individualizing force.
- source_word: ἀλόγως
  chosen: without reason
  alternatives:
  - irrationally
  - senselessly
  - without cause
  lexicon: LSJ
  rationale: The adverb denotes acting unreasonably or without justification. 'Without
    reason' is idiomatic and preserves the moral protest.
- source_word: ἤθροισεν ἐνθάδε
  chosen: gathered them here
  alternatives:
  - assembled them here
  - collected them here
  lexicon: LSJ
  rationale: ἀθροίζω means gather or assemble. 'Gathered them here' is natural English
    and matches the deictic ἐνθάδε.
