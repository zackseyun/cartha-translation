theological_decisions:
- issue: Rendering of πίστις in an unusual non-doctrinal context
  chosen_reading: in faith
  alternative_readings:
  - faithfully
  - in trust
  - securely
  rationale: Per doctrine, πίστις defaults to 'faith' unless context clearly demands
    otherwise. Here the syntax is difficult and the verse is not making a doctrinal
    claim about faith; retaining 'in faith' in the main text preserves lexical transparency
    while allowing alternatives in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; preserve alternatives
    where contested'
- issue: Handling a syntactically difficult Greek clause in Swete's witness
  chosen_reading: Translate conservatively without reconstructing beyond the attested
    text
  alternative_readings:
  - A smoother reconstruction that more explicitly states the Jews were living securely
    in their homeland and homes
  rationale: The source text presents a hard construction, and the prompt notes minor
    mismatch. The translation therefore stays close to the extant wording and signals
    the main ambiguity through lexical notes rather than silently emending.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    ambiguity rather than resolve it'
