theological_decisions:
- issue: Rendering ὁ θεός with modifier ἅγιος
  chosen_reading: the holy God
  alternative_readings:
  - God, the Holy One
  rationale: The Greek has the common noun θεόν modified by ἅγιον, not a fixed title
    requiring expansion. 'The holy God' preserves the wording without importing additional
    theological nuance.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English.'
