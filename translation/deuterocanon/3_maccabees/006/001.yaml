translation:
  text: 'Now a certain Eleazar, a distinguished man among the Jews of the country,
    already advanced in age and adorned with every virtue in life, quieted the elders
    around him to call upon the holy God, and prayed as follows:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐλεάζαρος
  chosen: Eleazar
  rationale: Personal name transliterated by standard convention per project philosophy.
- source_word: τις
  chosen: a certain
  alternatives:
  - one
  - someone
  lexicon: LSJ
  rationale: Indefinite τις introduces a particular individual not yet foregrounded;
    'a certain' preserves the narrative force better than the flatter 'someone.'
- source_word: ἀνὴρ ἐπίσημος
  chosen: a distinguished man
  alternatives:
  - a notable man
  - an eminent man
  lexicon: LSJ
  rationale: ἐπίσημος denotes someone marked out or notable. 'Distinguished' is natural
    modern English and preserves honorific weight.
- source_word: τῶν ἀπὸ τῆς χώρας Ἰουδαίων
  chosen: among the Jews of the country
  alternatives:
  - from the Jews of the country
  - among the Jews from the land
  - of the local Jews
  lexicon: LSJ
  rationale: The phrase identifies the group to which Eleazar belongs. 'Among the
    Jews of the country' communicates membership within the Jews resident in that
    land/region without over-specifying geography.
- source_word: ἐν πρεσβείῳ τὴν ἡλικίαν ἤδη λελογχώς
  chosen: already advanced in age
  alternatives:
  - having already attained old age
  - already being of advanced years
  lexicon: LSJ
  rationale: The idiom means that he had already reached old age. 'Advanced in age'
    is idiomatic English that preserves the sense without awkward literalism.
- source_word: πάσῃ τῇ κατὰ τὸν βίον ἀρετῇ κεκοσμημένος
  chosen: adorned with every virtue in life
  alternatives:
  - ornamented with every virtue of conduct
  - distinguished by every virtue in his way of life
  lexicon: LSJ
  rationale: κεκοσμημένος literally suggests being adorned or furnished; ἀρετή here
    refers to moral excellence. 'Adorned with every virtue in life' keeps the metaphor
    while remaining readable.
- source_word: τοὺς περὶ αὐτὸν ... πρεσβυτέρους
  chosen: the elders around him
  alternatives:
  - the elders with him
  - those elders around him
  lexicon: LSJ
  rationale: The phrase refers to the elders in his immediate company. 'Around him'
    preserves the spatial/social sense of περὶ αὐτόν.
- source_word: καταστείλας
  chosen: quieted
  alternatives:
  - calmed
  - restrained
  - stilled
  lexicon: LSJ
  rationale: The participle indicates bringing others to calm or order before prayer.
    'Quieted' fits the immediate context of preparing for invocation.
- source_word: ἐπικαλεῖσθαι τὸν ἅγιον θεόν
  chosen: to call upon the holy God
  alternatives:
  - to invoke the holy God
  - to appeal to the holy God
  lexicon: LSJ
  rationale: ἐπικαλεῖσθαι in prayer contexts commonly means 'call upon' or 'invoke.'
    'Call upon' is more transparent modern English and preserves the religious sense.
- source_word: προσηύξατο τάδε
  chosen: prayed as follows
  alternatives:
  - prayed these things
  - offered this prayer
  lexicon: LSJ
  rationale: τάδε introduces the content of the prayer. 'Prayed as follows' is idiomatic
    and accurately signals a quotation to come.
