translation:
  text: Let not the empty-headed bless the empty things over the destruction of those
    beloved by you, saying, “Not even their God rescued them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “vain things” or “idols.” The Greek says “the empty things,” likely with
      polemical force.
    reason: lexical_alternative
  - marker: b
    text: Or “the vain-minded.” The Greek deliberately pairs this with “empty things”
      as a wordplay.
    reason: lexical_alternative
  - marker: c
    text: Or “delivered them.”
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ... εὐλογησάτωσαν
  chosen: Let not ... bless
  alternatives:
  - May ... not bless
  - Do not let ... praise themselves
  lexicon: LSJ
  rationale: 'The third-person imperative with μή is naturally rendered as a prohibition:
    ''let not ... bless.'' This preserves the prayer-like appeal to God without flattening
    it into a direct command to the opponents.'
- source_word: τοῖς ματαίοις
  chosen: the empty things
  alternatives:
  - vain things
  - idols
  - worthless things
  lexicon: LSJ
  rationale: The dative plural of μάταιος likely refers to vain or worthless objects/things.
    'Empty things' preserves the lexical repetition with ματαιόφρονες and avoids over-specifying
    as 'idols,' which the verse itself does not explicitly state.
- source_word: οἱ ματαιόφρονες
  chosen: the empty-headed
  alternatives:
  - the vain-minded
  - the foolish
  - the arrogant
  lexicon: LSJ
  rationale: The compound conveys people whose thinking is vain or empty. 'Empty-headed'
    keeps the rhetorical wordplay with ματαίοις/'empty things' and communicates contempt
    without becoming too colloquial.
- source_word: ἐπὶ τῇ ... ἀπωλείᾳ
  chosen: over the destruction
  alternatives:
  - at the ruin
  - because of the destruction
  lexicon: LSJ
  rationale: 'ἐπί with the dative here expresses occasion or basis: blessing/exulting
    over someone''s destruction. ''Over the destruction'' is concise and idiomatic.'
- source_word: τῶν ἠγαπημένων σου
  chosen: those beloved by you
  alternatives:
  - your beloved ones
  - those you love
  lexicon: LSJ
  rationale: The perfect passive participle of ἀγαπάω identifies the people as loved
    by God. 'Those beloved by you' preserves the passive nuance and the direct address
    to God.
- source_word: Οὐδὲ ὁ θεὸς αὐτῶν ἐρύσατο αὐτούς
  chosen: Not even their God rescued them
  alternatives:
  - Not even their God delivered them
  - Their God did not even save them
  lexicon: LSJ
  rationale: ἐρύσατο commonly means 'rescued' or 'delivered.' 'Rescued' is clear modern
    English and fits the immediate context of threatened destruction.
