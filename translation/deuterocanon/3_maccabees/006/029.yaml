theological_decisions:
- issue: Rendering σωτῆρα of God in a deuterocanonical narrative context
  chosen_reading: savior
  alternative_readings:
  - deliverer
  rationale: The noun straightforwardly means 'savior' or 'deliverer.' 'Savior' preserves
    the theological weight of divine rescue while remaining faithful to the Greek;
    'deliverer' is a viable lexical alternative but is not required by the context.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological weight without importing extra claims.'
