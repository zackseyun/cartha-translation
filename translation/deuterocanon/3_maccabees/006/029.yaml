  text: ὁ μὲν οὖν ταῦτα ἐξέλεξεν· οἱ δὲ ἐν ἀμερεῖ χρόνῳ λυθέντες, τὸν ἅγιον σωτῆρα
    θεὸν αὐτῶν ηὐλόγουν, ἄρτι τὸν θάνατον ἐκπεφυγότες.
