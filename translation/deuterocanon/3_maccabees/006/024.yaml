translation:
  text: You have exceeded kings and surpassed tyrants in cruelty; and you are now
    even attempting to remove me myself, your benefactor, from power and from life,
    secretly plotting what is not advantageous to the kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from power and from spirit/breath.' The Greek πνεῦμα can mean 'spirit,'
      'breath,' or by extension 'life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Παραβεβασιλεύετε
  chosen: You have overstepped kingship
  alternatives:
  - You have acted beyond the bounds of kingship
  - You have exceeded what befits kings
  lexicon: LSJ
  rationale: The perfect form with παρα- and βασιλεύω conveys going beyond proper
    kingly rule, not merely 'you have reigned.' 'Overstepped kingship' preserves the
    sharp accusation that they have exceeded legitimate royal conduct.
- source_word: τυράννους
  chosen: tyrants
  alternatives:
  - despots
  lexicon: LSJ
  rationale: The noun directly denotes tyrants; 'tyrants' is the natural English equivalent
    and preserves the political-moral contrast with proper kingship.
- source_word: ὑπερβεβήκατε ὠμότητι
  chosen: surpassed ... in cruelty
  alternatives:
  - gone beyond ... in savagery
  - outdone ... in brutality
  lexicon: LSJ
  rationale: The idiom means to exceed or surpass someone in a quality. ὠμότης denotes
    harshness/cruelty; 'cruelty' is clear modern English.
- source_word: ἐμὲ αὐτὸν
  chosen: me myself
  alternatives:
  - even me
  - me personally
  lexicon: LSJ
  rationale: The emphatic pronoun heightens the outrage. 'Me myself' preserves the
    emphasis without adding interpretation.
- source_word: τὸν ὑμῶν εὐεργέτην
  chosen: your benefactor
  alternatives:
  - the one who has done you good
  - your beneficent ruler
  lexicon: LSJ
  rationale: εὐεργέτης is a standard Hellenistic title for a benefactor. 'Your benefactor'
    is concise and preserves both the personal and political sense.
- source_word: ἐπιχειρεῖτε
  chosen: you are ... attempting
  alternatives:
  - you are undertaking
  - you are trying
  lexicon: LSJ
  rationale: The present tense indicates an active attempt in progress. 'Attempting'
    fits the formal accusation.
- source_word: τῆς ἀρχῆς
  chosen: from power
  alternatives:
  - from rule
  - from office
  - from authority
  lexicon: LSJ
  rationale: In this context ἀρχή refers to ruling authority or office. 'From power'
    is idiomatic and suits the paired phrase with 'from life/spirit.'
- source_word: τοῦ πνεύματος
  chosen: from life
  alternatives:
  - from spirit
  - from breath
  lexicon: LSJ
  rationale: In this context, paired with removal from power and followed by secret
    plotting, πνεῦμα most naturally refers to life/breath rather than disposition.
    'From life' communicates the implied attempt on his life in natural English.
- source_word: μεθιστᾶν
  chosen: to remove
  alternatives:
  - to depose
  - to displace
  - to transfer
  lexicon: LSJ
  rationale: The verb means to remove or transfer from one position/state to another.
    'Remove' works for both power and life in the same clause.
- source_word: λάθρα μηχανώμενοι
  chosen: secretly plotting
  alternatives:
  - scheming in secret
  - devising secretly
  lexicon: LSJ
  rationale: The participle plus adverb conveys covert scheming. 'Secretly plotting'
    is natural and preserves the hostile intent.
- source_word: τὰ μὴ συμφέροντα τῇ βασιλείᾳ
  chosen: what is not advantageous to the kingdom
  alternatives:
  - what does not benefit the kingdom
  - things harmful to the kingdom
  lexicon: LSJ
  rationale: The phrase denotes matters contrary to the kingdom's interest. 'Not advantageous
    to the kingdom' stays close to the Greek while remaining readable.
