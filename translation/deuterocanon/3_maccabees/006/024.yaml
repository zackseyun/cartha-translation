theological_decisions:
- issue: Sense of πνεῦμα in the accusation
  chosen_reading: Rendered as 'life' rather than 'spirit'
  alternative_readings:
  - spirit
  - breath
  rationale: The immediate context is political overthrow and covert harmful plotting.
    In Greek, πνεῦμα can denote breath/life-force; here 'remove ... from life' best
    captures an attempted killing rather than an abstract change of disposition. This
    is a lexical-contextual decision, not a doctrinal claim about anthropology.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
