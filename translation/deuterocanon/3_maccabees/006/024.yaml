id: 3MA.6.24
reference: 3 Maccabees 6:24
source:
  edition: lxx-swete-1909
  text: Παραβεβασιλεύετε, καὶ τυράννους ὑπερβεβήκατε ὠμότητι· καὶ ἐμὲ αὐτὸν τὸν ὑμῶν
    εὐεργέτην ἐπιχειρεῖτε τῆς ἀρχῆς ἤδη καὶ τοῦ πνεύματος μεθιστᾶν, λάθρα μηχανώμενοι
    τὰ μὴ συμφέροντα τῇ βασιλείᾳ.
