- issue: Implicit religious force of 'to heaven'
  chosen_reading: Retained as 'to heaven' without making God explicit
  alternative_readings:
  - to God
  - up to heaven
  rationale: The Greek names heaven, not God directly. The context suggests appeal
    to God, but the translation should preserve the text's wording rather than interpretively
    expand it.
  doctrine_reference: Translation philosophy §1, §3
