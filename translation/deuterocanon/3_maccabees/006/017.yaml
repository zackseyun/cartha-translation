translation:
  text: And when the Jews saw it, they cried out loudly to heaven, so that even the
    neighboring courtyards, echoing with them, produced uncontrollable terror throughout
    the whole camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the adjacent courts resounded together,' emphasizing that the surrounding
      enclosed spaces reverberated with the Jews' cry.
    reason: lexical_alternative
  - marker: b
    text: Or 'caused uncontrollable panic throughout the whole camp.' The Greek πτοή
      can denote fright, terror, or panic.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρήσαντες
  chosen: when they saw it
  alternatives:
  - having seen
  - when they observed
  lexicon: LSJ
  rationale: Aorist participle introducing the circumstance for the main verb. 'Saw
    it' is natural English and preserves the visual perception sense without overformal
    stiffness.
- source_word: μέγα
  chosen: loudly
  alternatives:
  - greatly
  - with a great cry
  lexicon: LSJ
  rationale: Used adverbially with ἀνέκραξαν. Rather than a wooden 'cried greatly,'
    'cried out loudly' conveys the force idiomatically in English.
- source_word: εἰς οὐρανόν
  chosen: to heaven
  alternatives:
  - toward heaven
  - into heaven
  lexicon: LSJ
  rationale: The phrase indicates the direction of the cry, likely in appeal to God.
    'To heaven' is concise and natural while preserving the upward/directional sense.
- source_word: ἀνέκραξαν
  chosen: they cried out
  alternatives:
  - they shouted
  - they raised a cry
  lexicon: LSJ
  rationale: A strong verb for vocal outcry. 'Cried out' preserves intensity without
    implying mere anger or disorder.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - thereby
  lexicon: LSJ
  rationale: Introduces the result clause. 'So that' is the most straightforward English
    equivalent.
- source_word: τοὺς παρακειμένους αὐλῶνας
  chosen: the neighboring courtyards
  alternatives:
  - the adjacent courts
  - the nearby enclosures
  lexicon: LSJ
  rationale: παρακειμένους means lying nearby/adjacent; αὐλῶνας denotes courts, yards,
    or enclosed spaces. 'Neighboring courtyards' fits the camp/palace setting and
    remains readable.
- source_word: συνηχήσαντας
  chosen: echoed with them
  alternatives:
  - resounded together
  - rang in response
  lexicon: LSJ
  rationale: From συνηχέω, to sound together or resound in concert. 'Echoed with them'
    captures the idea that the nearby courtyards joined in the sound or reverberated
    from it.
- source_word: ἀκατάσχετον πτοήν
  chosen: uncontrollable terror
  alternatives:
  - irresistible panic
  - unrestrainable fright
  lexicon: LSJ
  rationale: πτοή is fright/panic/terror; ἀκατάσχετος means not able to be checked
    or restrained. 'Uncontrollable terror' preserves both intensity and lack of restraint.
- source_word: ποιῆσαι
  chosen: produced
  alternatives:
  - caused
  - brought about
  lexicon: LSJ
  rationale: Infinitive of result after ὥστε. 'Produced' gives a clear causal sense
    in smooth English.
- source_word: παντὶ τῷ στρατοπέδῳ
  chosen: throughout the whole camp
  alternatives:
  - in the entire camp
  - for the whole encampment
  lexicon: LSJ
  rationale: στρατόπεδον is camp/encampment. 'Throughout the whole camp' best reflects
    the spread of the panic among all present.
