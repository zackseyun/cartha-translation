translation:
  text: Look upon the offspring of Abraham, the children of Jacob who has been sanctified,
    your sanctified allotted people, perishing unjustly as strangers in a foreign
    land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the sanctified children of Jacob.' The Greek phrase is compressed,
      and the participle 'sanctified' may be taken with 'children' rather than with
      'Jacob.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔπιδε
  chosen: Look upon
  alternatives:
  - Look at
  - Take notice of
  - See
  lexicon: LSJ
  rationale: Imperative of ἐφοράω/ἐπιδέ? in prayer context functions as an appeal
    for God to regard or take notice. 'Look upon' preserves the elevated petitionary
    tone without becoming archaic.
- source_word: σπέρμα
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: LSJ
  rationale: '''Offspring'' is natural modern English and preserves the collective
    singular sense better than the more wooden ''seed.'''
- source_word: ἡγιασμένου
  chosen: who has been sanctified
  alternatives:
  - holy
  - consecrated
  lexicon: LSJ
  rationale: The perfect/passive participial idea is best represented verbally. The
    syntax is compressed, but the phrase most naturally qualifies Jacob rather than
    directly modifying 'children.'
- source_word: τέκνα Ἰακώβ
  chosen: the children of Jacob
  alternatives:
  - Jacob's children
  - sons of Jacob
  lexicon: LSJ
  rationale: τέκνα is broader than 'sons' and need not be gender-restricted in English;
    'children of Jacob' is both accurate and idiomatic.
- source_word: μερίδος
  chosen: allotted
  alternatives:
  - portion
  - inheritance-share
  lexicon: LSJ
  rationale: In apposition to λαόν, the term conveys a people belonging as God's portion/share.
    'Allotted' brings that covenantal nuance into readable English.
- source_word: ἡγιασμένης σου
  chosen: your sanctified
  alternatives:
  - your holy
  - consecrated to you
  lexicon: LSJ
  rationale: Retains the repeated sanctification language in the verse and keeps the
    possessive relation explicit.
- source_word: λαὸν
  chosen: people
  alternatives:
  - nation
  - folk
  lexicon: LSJ
  rationale: Standard rendering for λαός in covenantal contexts.
- source_word: ἐν ξένῃ γῇ
  chosen: in a foreign land
  alternatives:
  - in a strange land
  lexicon: LSJ
  rationale: '''Foreign land'' is clear modern English and preserves the exile/alien
    setting.'
- source_word: ξένως
  chosen: as strangers
  alternatives:
  - strangely
  - in alien fashion
  lexicon: LSJ
  rationale: Although adverbial, in context it describes their condition as living
    alienated/like foreigners. 'As strangers' communicates the sense more idiomatically
    than the opaque 'strangely.'
- source_word: ἀδίκως
  chosen: unjustly
  alternatives:
  - wrongfully
  - without justice
  lexicon: LSJ
  rationale: Marks the moral wrong done to the people without overexpansion.
- source_word: ἀπολλύμενον
  chosen: perishing
  alternatives:
  - being destroyed
  - ruined
  lexicon: LSJ
  rationale: Present middle/passive participle depicts ongoing destruction/perishing.
    'Perishing' preserves the durative sense and fits the prayer's pathos.
