theological_decisions:
- issue: Referent and force of ἡγιασμένου in the compressed phrase ἐφ’ ἡγιασμένου
    τέκνα Ἰακώβ
  chosen_reading: 'Treat ἡγιασμένου as qualifying Jacob: ''the children of Jacob who
    has been sanctified.'''
  alternative_readings:
  - 'Treat it collectively with the children: ''the sanctified children of Jacob'''
  - 'Render more loosely: ''Jacob''s consecrated children'''
  rationale: The Greek is syntactically compressed and somewhat awkward in Swete's
    text. Attaching the participle to Jacob best preserves the word order and avoids
    flattening the repeated sanctification language later in the verse. Because the
    alternative is plausible and affects English flow, it is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity and preserve alternatives in footnotes.
