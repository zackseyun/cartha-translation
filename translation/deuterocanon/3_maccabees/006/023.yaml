translation:
  text: For when he heard the outcry, and saw that all of them were lying face down
    for destruction, he wept in anger and threatened his friends, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek φίλοι may refer not only to personal friends but also to royal associates
      or courtiers in a court setting.
    reason: cultural_note
lexical_decisions:
- source_word: ἀκούσας
  chosen: when he heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance for the main action; 'when
    he heard' is natural English and preserves the temporal force without over-literal
    awkwardness.
- source_word: κραυγῆς
  chosen: the outcry
  alternatives:
  - the cry
  - the shouting
  lexicon: BDAG
  rationale: κραυγή commonly denotes a loud cry or outcry. 'Outcry' fits the public,
    desperate sense in context better than the flatter 'cry.'
- source_word: συνιδὼν
  chosen: saw
  alternatives:
  - observed
  - perceived
  lexicon: BDAG
  rationale: The compound verb can imply noticing or realizing on seeing. In English,
    'saw' is sufficient here, with the following clause carrying the content of what
    he perceived.
- source_word: πρηνεῖς
  chosen: lying face down
  alternatives:
  - prostrate
  - fallen on their faces
  lexicon: LSJ
  rationale: πρηνής means prone or face downward. 'Lying face down' is clear modern
    English; 'prostrate' is possible but slightly more formal and less immediately
    vivid.
- source_word: ἅπαντας
  chosen: all of them
  alternatives:
  - everyone
  - all
  lexicon: BDAG
  rationale: The accusative plural refers to the whole group already in view. 'All
    of them' makes the object explicit in idiomatic English.
- source_word: εἰς τὴν ἀπώλειαν
  chosen: for destruction
  alternatives:
  - toward destruction
  - for ruin
  - for their destruction
  lexicon: BDAG
  rationale: The phrase expresses movement or orientation toward impending destruction.
    'For destruction' is concise and preserves the grave sense without over-interpreting.
- source_word: δακρύσας
  chosen: he wept
  alternatives:
  - burst into tears
  - shed tears
  lexicon: BDAG
  rationale: The participle denotes shedding tears. 'He wept' is dignified and direct,
    fitting the narrative tone.
- source_word: μετʼ ὀργῆς
  chosen: in anger
  alternatives:
  - with anger
  - angrily
  lexicon: BDAG
  rationale: The phrase modifies the emotional manner accompanying his weeping and
    threat. 'In anger' preserves both the noun's force and readable English style.
- source_word: τοῖς φίλοις
  chosen: his friends
  alternatives:
  - the friends
  - his companions
  - his courtiers
  lexicon: BDAG
  rationale: In Hellenistic court language φίλοι can denote royal 'friends' or courtiers.
    The basic rendering 'his friends' stays close to the Greek; the courtly nuance
    is worth preserving in a footnote rather than importing into the main text.
- source_word: διηπείλει
  chosen: threatened
  alternatives:
  - kept threatening
  - uttered threats against
  lexicon: LSJ
  rationale: The imperfect suggests ongoing or repeated threatening, but English narrative
    often compresses this naturally. 'Threatened' conveys the sense without overloading
    the line; the iterative nuance is not central enough to force a cumbersome rendering.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Standard participial speech introducer; 'saying' keeps close to the Greek
    and prepares for the direct discourse in the next verse.
