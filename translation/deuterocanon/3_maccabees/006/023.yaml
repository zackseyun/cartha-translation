id: 3MA.6.23
reference: 3 Maccabees 6:23
source:
  edition: lxx-swete-1909
  text: ἀκούσας γὰρ τῆς κραυγῆς, καὶ συνιδὼν πρηνεῖς ἅπαντας εἰς τὴν ἀπώλειαν, δακρύσας
    μετʼ ὀργῆς τοῖς φίλοις διηπείλει, λέγων
  language: Greek
