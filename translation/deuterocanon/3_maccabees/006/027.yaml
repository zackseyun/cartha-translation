translation:
  text: Release, release the unjust bonds; send them away to their own homes in peace,
    renouncing what has been ordered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to their own places.' The Greek εἰς τὰ ἴδια can refer more broadly to
      what belongs to them or to their own households/places.
    reason: lexical_alternative
  - marker: b
    text: Or 'setting aside what had been ordered.' The participle indicates abandoning
      the previously issued command.
    reason: lexical_alternative
lexical_decisions:
- source_word: λύσατε
  chosen: Release
  alternatives:
  - Loose
  - Untie
  - Set free
  lexicon: LSJ
  rationale: Imperative plural from λύω. In context of freeing people from restraints,
    'Release' is natural modern English and preserves the command force.
- source_word: ἐκλύσατε
  chosen: release
  alternatives:
  - completely loose
  - undo fully
  - set entirely free
  lexicon: LSJ
  rationale: A second imperative intensifies the first. Rendering it again as 'release'
    preserves the emphatic repetition without awkwardness; the doubled English mirrors
    the doubled Greek.
- source_word: ἄδικα
  chosen: unjust
  alternatives:
  - wrongful
  - unrighteous
  lexicon: LSJ
  rationale: Modifies δεσμά and describes the bonds as morally wrongful. 'Unjust'
    is clear and idiomatic for an oppressive legal or political restraint.
- source_word: δεσμά
  chosen: bonds
  alternatives:
  - chains
  - fetters
  lexicon: LSJ
  rationale: A broad term for restraints. 'Bonds' preserves the metaphorical and literal
    range better than the more concrete 'chains'.
- source_word: εἰς τὰ ἴδια
  chosen: to their own homes
  alternatives:
  - to their own places
  - to what is their own
  lexicon: LSJ
  rationale: Idiomatic expression for returning people to their own place or household.
    Since persons are being released, 'to their own homes' communicates the sense
    naturally in English.
- source_word: μετʼ εἰρήνης
  chosen: in peace
  alternatives:
  - peacefully
  - with peace
  lexicon: LSJ
  rationale: Standard idiom. 'In peace' is concise and preserves the formal tone.
- source_word: ἐξαποστείλατε
  chosen: send them away
  alternatives:
  - dismiss
  - send out
  - let them go
  lexicon: LSJ
  rationale: Imperative plural meaning to send off or dispatch. 'Send them away' fits
    the context of releasing detainees and makes the implied object clear in English.
- source_word: τὰ προστεταγμένα
  chosen: what has been ordered
  alternatives:
  - the orders given
  - what was commanded
  lexicon: LSJ
  rationale: Neuter plural perfect passive participle used substantivally, referring
    to prior commands or decrees. 'What has been ordered' is transparent and avoids
    over-specifying the issuer.
- source_word: παραιτησάμενοι
  chosen: renouncing
  alternatives:
  - setting aside
  - waiving
  - refusing
  lexicon: LSJ
  rationale: Aorist middle participle indicating relinquishing or declining something
    previously in force. 'Renouncing' conveys a formal abandonment of the prior order;
    'setting aside' is possible but slightly weaker.
