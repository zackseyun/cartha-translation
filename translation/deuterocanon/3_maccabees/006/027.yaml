id: 3MA.6.27
reference: 3 Maccabees 6:27
source:
  edition: lxx-swete-1909
  text: λύσατε, ἐκλύσατε ἄδικα δεσμά· εἰς τὰ ἴδια μετʼ εἰρήνης ἐξαποστείλατε, τὰ προστεταγμένα
    παραιτησάμενοι.
