id: 3MA.6.30
reference: 3 Maccabees 6:30
source:
  edition: lxx-swete-1909
  text: Εἶτα ὁ βασιλεὺς εἰς τὴν πόλιν τὸν ἐπὶ τῶν προσόδων προσκαλεσάμενος, ἐκέλευσεν
    οἴνους τε καὶ τὰ λοιπὰ πρὸς εὐωχίαν ἐπιτήδεια τοῖς Ἰουδαίοις χορηγεῖν ἐπὶ ἡμέρας
    ἑπτά, κρίνας αὐτούς, ἐν ᾧ τόπῳ ἔδοξαν τὸν ὄλεθρον ἀναλαμβάνειν, ἐν τούτῳ ἐν εὐφροσύνῃ
    πάσῃ σωτήρια ἀγαγεῖν.
  language: Greek
