theological_decisions:
- issue: Rendering σωτήρια in a deuterocanonical narrative context
  chosen_reading: deliverance
  alternative_readings:
  - salvation
  rationale: The immediate context is rescue from threatened death and a commemorative
    celebration. 'Deliverance' best fits the narrative event without flattening the
    term's saving force; 'salvation' remains a viable alternative but in English can
    sound more systematically theological than the context requires.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
