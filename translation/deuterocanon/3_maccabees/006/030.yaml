translation:
  text: Then the king, after summoning to the city the one in charge of the revenues,
    ordered that wine and the other provisions suitable for feasting be supplied to
    the Jews for seven days, deciding that in the very place where they had expected
    to meet destruction, in that place they should celebrate their deliverance with
    all rejoicing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'celebrate salvation.' The Greek term can denote deliverance or salvation;
      here it refers to rejoicing over their rescue from destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἐπὶ τῶν προσόδων
  chosen: the one in charge of the revenues
  alternatives:
  - the official over the revenues
  - the revenue officer
  - the treasurer
  lexicon: LSJ
  rationale: The phrase denotes an official responsible for income/revenue. 'The one
    in charge of the revenues' is clear modern English and preserves the administrative
    sense without over-specifying a technical office title not explicit in the Greek.
- source_word: προσκαλεσάμενος
  chosen: after summoning
  alternatives:
  - having called
  - calling for
  lexicon: BDAG
  rationale: The participle is antecedent to the main verb ἐκέλευσεν, so 'after summoning'
    naturally conveys the sequence in readable English.
- source_word: οἴνους
  chosen: wine
  alternatives:
  - wines
  lexicon: LSJ
  rationale: Although plural in Greek, English idiom normally uses the mass noun 'wine'
    in this context. The plural does not need to be mechanically reproduced.
- source_word: τὰ λοιπὰ πρὸς εὐωχίαν ἐπιτήδεια
  chosen: the other provisions suitable for feasting
  alternatives:
  - the rest of the things fit for celebration
  - the other necessities for banqueting
  lexicon: LSJ
  rationale: ἐπιτήδεια refers to supplies/provisions, and πρὸς εὐωχίαν specifies their
    use for festive eating/drinking. 'Provisions suitable for feasting' captures both
    sense and tone.
- source_word: χορηγεῖν
  chosen: be supplied
  alternatives:
  - provide
  - furnish
  lexicon: LSJ
  rationale: The infinitive depends on ἐκέλευσεν and indicates official provision
    at the king's command. Passive English after 'ordered that' is idiomatic and preserves
    the sense.
- source_word: κρίνας
  chosen: deciding
  alternatives:
  - judging
  - decreeing
  - determining
  lexicon: LSJ
  rationale: The participle introduces the king's considered determination. 'Deciding'
    is natural English and avoids sounding overly judicial where the context is royal
    resolution.
- source_word: ἔδοξαν
  chosen: had expected
  alternatives:
  - had seemed
  - had thought
  lexicon: LSJ
  rationale: In context the Jews are those who had regarded themselves as about to
    suffer destruction. 'Had expected' expresses the practical force better than the
    more wooden 'had seemed.'
- source_word: τὸν ὄλεθρον ἀναλαμβάνειν
  chosen: to meet destruction
  alternatives:
  - to undergo destruction
  - to receive destruction
  lexicon: LSJ
  rationale: The idiom is awkward if rendered literally. 'To meet destruction' communicates
    the impending fatal outcome in natural English while staying close to the Greek
    sense.
- source_word: σωτήρια ἀγαγεῖν
  chosen: celebrate their deliverance
  alternatives:
  - keep a festival of salvation
  - observe saving rites
  lexicon: LSJ
  rationale: The phrase refers to holding a celebration of rescue/deliverance. 'Celebrate
    their deliverance' is idiomatic, contextually clear, and avoids importing later
    technical religious terminology.
- source_word: ἐν εὐφροσύνῃ πάσῃ
  chosen: with all rejoicing
  alternatives:
  - in all gladness
  - with every joy
  lexicon: LSJ
  rationale: This phrase intensifies the celebratory manner. 'With all rejoicing'
    is natural and preserves the fullness expressed by πάσῃ.
