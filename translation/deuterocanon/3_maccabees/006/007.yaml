theological_decisions:
- issue: Allusion to Daniel's deliverance from the lions' den
  chosen_reading: Render the verse as a direct address to God recalling Daniel's rescue
    without importing details beyond the Greek wording.
  alternative_readings:
  - Expand to 'lions' den' from the Daniel narrative
  rationale: The Greek explicitly names Daniel, lions, and God's act of bringing him
    into the light unharmed. It does not explicitly mention the den, so the translation
    preserves the allusion without adding narrative detail from Daniel 6.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
- issue: Handling the awkward phrase κατὰ γῆς in a difficult transmitted text
  chosen_reading: Translate conservatively as 'on the ground' and preserve the source
    awkwardness rather than emending silently.
  alternative_readings:
  - omit the phrase as corrupt
  - smooth to 'into the pit' or similar from the Daniel story
  rationale: The source witness is marked high confidence and no integrity warning
    is given. Since the phrase is present in Swete's text, the draft keeps it in a
    restrained way rather than harmonizing to the better-known Daniel account.
  doctrine_reference: 'What we are translating: Swete LXX is the Greek source for
    deuterocanonical books; preserve source uncertainty honestly.'
