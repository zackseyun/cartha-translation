translation:
  text: You brought Daniel up into the light unharmed, when he had been thrown to
    the lions on the ground as food for the beasts through the slanders of envy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through accusations born of envy.' The Greek phrase combines 'slanders/accusations'
      with 'envy.'
    reason: lexical_alternative
  - marker: b
    text: The Greek includes a difficult phrase, literally 'on the ground.' The wording
      is retained rather than harmonized to the Daniel narrative.
    reason: textual_variant
lexical_decisions:
- source_word: διαβολαῖς
  chosen: through the slanders
  alternatives:
  - through accusations
  - through calumnies
  lexicon: LSJ
  rationale: The dative plural of διαβολή denotes malicious accusations or slanders.
    'Slanders' best captures the hostile, false-accusation sense in natural English
    while preserving the instrumental force of the dative.
- source_word: φθόνου
  chosen: of envy
  alternatives:
  - of jealousy
  - of malice
  lexicon: LSJ
  rationale: 'The genitive most naturally describes the character/source of the slanders:
    they arise from envy. ''Envy'' is the most direct rendering of φθόνος.'
- source_word: λέουσι
  chosen: to the lions
  alternatives:
  - among lions
  lexicon: LSJ
  rationale: The dative plural indicates the animals to which Daniel was delivered.
    'To the lions' is the most straightforward English rendering in this construction.
- source_word: κατὰ γῆς
  chosen: on the ground
  alternatives:
  - down to the ground
  - to the earth
  lexicon: LSJ
  rationale: The phrase is somewhat awkward in the transmitted text, but taken straightforwardly
    it locates Daniel as cast down on/onto the ground. 'On the ground' preserves the
    spatial sense without overinterpreting.
- source_word: ῥιφέντα
  chosen: had been thrown
  alternatives:
  - cast
  - hurled
  lexicon: LSJ
  rationale: The participle from ῥίπτω means to throw or cast. 'Had been thrown' fits
    idiomatic English narrative style and conveys the violent passive action.
- source_word: θηρσὶ βορὰν
  chosen: as food for the beasts
  alternatives:
  - for prey to the beasts
  - as fodder for wild animals
  lexicon: LSJ
  rationale: βορά means food/prey, and θηρσί refers to beasts/wild animals. The phrase
    expresses intended destruction. 'As food for the beasts' is clear and forceful.
- source_word: εἰς φῶς
  chosen: into the light
  alternatives:
  - to light
  - out into the light
  lexicon: LSJ
  rationale: The idiom can mean bringing someone out alive from a place of death or
    darkness. 'Into the light' preserves the imagery and the rescue motif.
- source_word: ἀνήγαγες
  chosen: you brought ... up
  alternatives:
  - you led ... up
  - you brought forth
  lexicon: LSJ
  rationale: The verb ἀνάγω literally means bring up/lead up. Because the verse addresses
    God directly and pairs with εἰς φῶς, 'you brought ... up' preserves both the literal
    and deliverance sense.
- source_word: ἀσινῆ
  chosen: unharmed
  alternatives:
  - safe
  - without injury
  lexicon: LSJ
  rationale: ἀσινής means unharmed or uninjured. 'Unharmed' is concise and idiomatic.
