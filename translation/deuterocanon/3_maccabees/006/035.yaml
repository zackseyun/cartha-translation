translation:
  text: And the Jews, as we said before, having formed the previously mentioned chorus,
    spent their time with feasting, in joyful thanksgivings and psalms,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having organized the previously mentioned choir.' The Greek χορὸς can
      refer to a chorus or choir-like company.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'joyful thanksgivings' renders ἐξομολογήσεσιν ἱλαραῖς, where
      ἐξομολόγησις in this context likely means thanksgiving or praise rather than
      confession of sins.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵ τε Ἰουδαῖοι
  chosen: And the Jews
  alternatives:
  - And the Judeans
  lexicon: LSJ
  rationale: Ἰουδαῖοι can denote either ethnic-religious 'Jews' or geographic 'Judeans.'
    In 3 Maccabees, the reference is to the Jewish people in Egypt as a religious-ethnic
    community, so 'Jews' is the clearer English rendering.
- source_word: καθὼς προειρήκαμεν
  chosen: as we said before
  alternatives:
  - as we have said before
  - as previously stated
  lexicon: LSJ
  rationale: The phrase points back to an earlier statement by the narrator. 'As we
    said before' is natural modern English and preserves the retrospective narrative
    function.
- source_word: συστησάμενοι
  chosen: having formed
  alternatives:
  - having organized
  - having assembled
  lexicon: LSJ
  rationale: The participle indicates the act of bringing together or organizing.
    'Having formed' fits the object χορὸν ('chorus') and keeps the participial structure
    without overinterpreting.
- source_word: τὸν προειρημένον χορὸν
  chosen: the previously mentioned chorus
  alternatives:
  - the aforesaid choir
  - the previously mentioned company
  lexicon: LSJ
  rationale: χορὸς can mean a chorus, choir, or dancing/singing company. In this celebratory
    liturgical context with psalms, 'chorus' best preserves the Greek while remaining
    understandable. 'Previously mentioned' renders προειρημένον straightforwardly.
- source_word: μετʼ εὐωχίας
  chosen: with feasting
  alternatives:
  - with rejoicing at a banquet
  - with festal celebration
  lexicon: LSJ
  rationale: εὐωχία denotes festal enjoyment, often involving a banquet or feast.
    'With feasting' is concise and captures the celebratory meal context without unnecessary
    expansion.
- source_word: ἐν ἐξομολογήσεσιν ἱλαραῖς
  chosen: in joyful thanksgivings
  alternatives:
  - with cheerful praises
  - in glad confessions of praise
  lexicon: LSJ
  rationale: ἐξομολόγησις in Jewish-Greek worship contexts commonly refers to thanksgiving
    or praise rather than confession of sin. ἱλαραῖς adds the sense of gladness or
    cheerfulness. 'Joyful thanksgivings' communicates the worshipful sense clearly.
- source_word: καὶ ψαλμοῖς
  chosen: and psalms
  alternatives:
  - and songs of praise
  lexicon: LSJ
  rationale: ψαλμοί is most directly rendered 'psalms.' Since the context is liturgical
    celebration, the traditional term is both accurate and readable.
- source_word: διῆγον
  chosen: spent their time
  alternatives:
  - passed their days
  - continued on
  lexicon: LSJ
  rationale: The imperfect verb conveys ongoing activity over a period. 'Spent their
    time' idiomatically expresses this durative sense in English.
