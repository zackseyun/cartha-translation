translation:
  text: And they all feasted, being supplied by the king, until the fourteenth day,
    on which they also made their petition concerning their release.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'presented their request for their release.' The Greek expression can
      denote making a formal petition or appeal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐωχοῦντο
  chosen: feasted
  alternatives:
  - celebrated
  - were entertained
  - made merry
  lexicon: LSJ
  rationale: The verb denotes enjoying a banquet or festive meal. 'Feasted' preserves
    the concrete sense of celebratory eating better than the broader 'celebrated'
    or the more passive 'were entertained'.
- source_word: πάνθʼ
  chosen: they all
  alternatives:
  - all of them
  - everyone
  lexicon: LSJ
  rationale: The elided form of πάντα/πάντες here functions collectively of the people
    in view. 'They all' is natural English and keeps the distributive force.
- source_word: ὑπὸ τοῦ βασιλέως χορηγούμενοι
  chosen: being supplied by the king
  alternatives:
  - being provided for by the king
  - at the king's expense
  - being furnished by the king
  lexicon: LSJ
  rationale: χορηγέω here conveys provision of resources or expenses. 'Being supplied
    by the king' keeps the participial relation and indicates royal provision without
    over-specifying the mechanism.
- source_word: μέχρι τῆς τεσσαρεσκαιδεκάτης
  chosen: until the fourteenth day
  alternatives:
  - until the fourteenth
  - up to the fourteenth day
  lexicon: LSJ
  rationale: The feminine ordinal likely implies 'day' from context. Supplying 'day'
    makes the temporal reference clear in English.
- source_word: ἐν ᾗ
  chosen: on which
  alternatives:
  - when
  - on that day
  lexicon: LSJ
  rationale: The relative phrase refers back to the fourteenth day. 'On which' preserves
    the formal linkage while remaining readable.
- source_word: τὴν ἐντυχίαν ἐποιήσαντο
  chosen: made their petition
  alternatives:
  - presented their request
  - made their appeal
  - had an audience
  lexicon: LSJ
  rationale: ἐντυχία can denote an approach, interview, or petition to a superior.
    In this context concerning release, 'made their petition' best captures a formal
    request without implying more access than the Greek states.
- source_word: περὶ τῆς ἀπολύσεως αὐτῶν
  chosen: concerning their release
  alternatives:
  - for their release
  - about their dismissal
  lexicon: LSJ
  rationale: ἀπόλυσις denotes release or dismissal. 'Concerning their release' follows
    the preposition περί closely while fitting the formal tone of the petition.
