  text: καὶ ἀντέστησαν, καὶ τὴν δύναμιν τῶν ὑπεναντίων ἐπλήρωσαν ταραχῆς καὶ δειλίας
    καὶ ἀκινήτοις ἔδησαν πέδαις.
