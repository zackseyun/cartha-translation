id: 3MA.1.16
reference: 3 Maccabees 1:16
source:
  edition: lxx-swete-1909
  text: ἀλλ᾽ ἐπεὶ εὐδόκησας τὴν δόξαν σου ἐν τῷ λαῷ σου Ἰσραήλ, ἡγίασας τὸν τόπον
    τοῦτον.
  language: Greek
  pages: []
  confidence: high
translation:
  text: But since you were pleased to set your glory among your people Israel, you
    sanctified this place.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀλλ᾽
  chosen: But
  alternatives:
  - yet
  - however
  lexicon: LSJ
  rationale: Adversative conjunction introducing a contrast with the preceding context;
    'But' is natural and sufficiently direct in English.
- source_word: ἐπεὶ
  chosen: since
  alternatives:
  - because
  - when
  lexicon: LSJ
  rationale: Here it introduces a causal ground rather than a merely temporal sense;
    'since' captures the explanatory force in smooth English.
- source_word: εὐδόκησας
  chosen: you were pleased
  alternatives:
  - you took pleasure
  - you chose favorably
  lexicon: LSJ
  rationale: Aorist of εὐδοκέω conveys favorable pleasure or approval. 'You were pleased'
    is idiomatic and preserves the volitional nuance without over-paraphrase.
- source_word: τὴν δόξαν σου
  chosen: your glory
  alternatives:
  - your splendor
  - your honor
  lexicon: LSJ
  rationale: δόξα in this sacred context refers to divine glory rather than mere reputation;
    'glory' is the standard and theologically appropriate rendering.
- source_word: ἐν τῷ λαῷ σου Ἰσραήλ
  chosen: among your people Israel
  alternatives:
  - in your people Israel
  lexicon: LSJ
  rationale: Although ἐν is formally 'in,' English idiom with persons favors 'among'
    to express God's glory being manifested in the covenant people.
- source_word: ἡγίασας
  chosen: you sanctified
  alternatives:
  - you made holy
  - you consecrated
  lexicon: LSJ
  rationale: From ἁγιάζω, denoting setting apart as holy. 'Sanctified' preserves the
    cultic and theological register; 'made holy' is possible but less precise, and
    'consecrated' is slightly narrower.
- source_word: τὸν τόπον τοῦτον
  chosen: this place
  alternatives:
  - this site
  - this sanctuary
  lexicon: LSJ
  rationale: τόπος is literally 'place.' 'Sanctuary' would import a more specific
    referent than the Greek states, so 'this place' is preferred.
