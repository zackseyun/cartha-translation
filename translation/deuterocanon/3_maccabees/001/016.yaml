theological_decisions:
- issue: Rendering cultic holiness language in relation to the temple/place
  chosen_reading: you sanctified this place
  alternative_readings:
  - you made this place holy
  - you consecrated this place
  rationale: The Greek uses explicit holiness language (ἁγιάζω). The translation preserves
    that theological category directly rather than softening it. 'Sanctified' best
    maintains the connection to sacred setting-apart while remaining understandable
    in context.
  doctrine_reference: Translation philosophy §§1, 5, 6
