id: 3MA.1.28
reference: 3 Maccabees 1:28
source:
  edition: lxx-swete-1909
  text: ἐκ δὲ τῆς πυκνοτάτης τε καὶ ἐμπόνου τῶν ὄχλων συναγομένης κραυγῆς ἀνείκαστός
    τις ἦν βοή·
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 752
  confidence: high
  validation: agree
translation:
  text: And from the very dense and laborious cry being raised by the crowds, there
    was some indescribable outcry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the cry of the crowds, thick and strained as it rose, there was
      an indescribable uproar.' The Greek piles up near-synonyms for loud public shouting.
    reason: lexical_alternative
lexical_decisions:
- source_word: πυκνοτάτης
  chosen: very dense
  alternatives:
  - most dense
  - thickest
  - closely packed
  lexicon: LSJ
  rationale: Superlative of πυκνός, here modifying the cry as arising from a tightly
    packed mass of people; 'very dense' preserves the image without over-idiomatizing.
- source_word: ἐμπόνου
  chosen: laborious
  alternatives:
  - toilsome
  - painful
  - strenuous
  lexicon: LSJ
  rationale: The adjective conveys effort and strain. Applied to the cry of the crowds,
    it suggests a cry produced with exertion; 'laborious' keeps that sense of strenuous
    effort, though the English is somewhat marked.
- source_word: τῶν ὄχλων
  chosen: the crowds
  alternatives:
  - the multitudes
  - the throngs
  lexicon: LSJ
  rationale: ὄχλος commonly denotes a crowd or multitude. 'Crowds' is natural modern
    English and fits the plural genitive.
- source_word: συναγομένης
  chosen: being raised
  alternatives:
  - being gathered
  - coming together
  - being collected
  lexicon: LSJ
  rationale: Literally 'being gathered together,' but with κραυγῆς the sense is of
    a cry swelling or being raised from many voices. 'Being raised' communicates the
    idiomatic force in English while remaining anchored to the participle.
- source_word: κραυγῆς
  chosen: cry
  alternatives:
  - shout
  - clamor
  lexicon: LSJ
  rationale: κραυγή is a loud cry or shout. 'Cry' works well here and avoids flattening
    the emotional intensity.
- source_word: ἀνείκαστός
  chosen: indescribable
  alternatives:
  - incomparable
  - unimaginable
  - beyond likeness
  lexicon: LSJ
  rationale: The adjective denotes something not to be represented or matched. 'Indescribable'
    best fits the context of an overwhelming public outcry.
- source_word: βοή
  chosen: outcry
  alternatives:
  - uproar
  - shout
  - cry
  lexicon: LSJ
  rationale: βοή overlaps with κραυγή but often suggests a louder uproar or tumult.
    'Outcry' preserves the distinction from the earlier 'cry' while keeping the auditory
    focus.
- source_word: τις
  chosen: some
  alternatives:
  - a certain
  - an
  lexicon: LSJ
  rationale: The enclitic τις adds an indefinite nuance. 'Some indescribable outcry'
    preserves that nuance, though English idiom is slightly unusual.
