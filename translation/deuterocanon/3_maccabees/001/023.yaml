id: 3MA.1.23
reference: 3 Maccabees 1:23
source:
  edition: lxx-swete-1909
  text: φωνήσαντες δὲ τὴν ὁρμὴν ἐπὶ τὰ ὅπλα ποιήσασθαι, καὶ θαρραλέως ὑπὸ τοῦ πατρῴου
    νόμου τελευτᾷν, ἱκανὴν ἐποίησαν ἐν τῷ τόπῳ τραχύτητα, μόλις δὲ ὑπό τε τῶν γεραιῶν
    καὶ τῶν πρεσβυτέρων
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 752
  confidence: high
  validation: minor_mismatch
translation:
  text: But when they cried out to make a rush for the weapons, and to die courageously
    under the ancestral law, they caused considerable turmoil in the place, and only
    with difficulty by the old men and the elders
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness provided for this verse appears to break off mid-sentence
      after 'by the old men and the elders.' The translation therefore preserves the
      incomplete sense rather than supplying words not present in the source excerpt.
    reason: textual_variant
  - marker: b
    text: Or 'to the weapons,' implying a rush to seize arms.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the ancestral law' / 'because of the ancestral law.' The Greek expression
      can be understood as dying in loyalty to the inherited law.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνήσαντες
  chosen: when they cried out
  alternatives:
  - having shouted
  - calling out
  lexicon: LSJ
  rationale: Aorist participle introducing the action that precipitates the scene;
    'cried out' is natural English and preserves the vocal, urgent force better than
    the flatter 'having shouted.'
- source_word: τὴν ὁρμὴν ... ποιήσασθαι
  chosen: to make a rush
  alternatives:
  - to make an assault
  - to launch an attack
  - to make a charge
  lexicon: LSJ
  rationale: ὁρμή denotes an impulsive rush or onset. 'Make a rush' keeps the idiom
    close to the Greek while remaining intelligible; 'attack' would over-specify military
    intent beyond the wording.
- source_word: ἐπὶ τὰ ὅπλα
  chosen: for the weapons
  alternatives:
  - against the weapons
  - to the weapons
  - for arms
  lexicon: LSJ
  rationale: With ὁρμή, ἐπί can indicate movement toward an object. In context the
    sense is a rush toward the weapons to seize them, not merely 'against weapons.'
    'Weapons' is clearer than the somewhat archaic 'arms.'
- source_word: θαρραλέως
  chosen: courageously
  alternatives:
  - boldly
  - bravely
  lexicon: LSJ
  rationale: The adverb marks resolute courage in the face of death. 'Courageously'
    fits the solemn register of the passage.
- source_word: ὑπὸ τοῦ πατρῴου νόμου
  chosen: under the ancestral law
  alternatives:
  - for the ancestral law
  - because of the ancestral law
  - under their fathers' law
  lexicon: LSJ
  rationale: The preposition ὑπό here is somewhat compressed idiomatically; the sense
    is dying in submission to, or under the claims of, the inherited Jewish law. 'Ancestral
    law' is a standard rendering of πατρῷος νόμος and avoids importing later technical
    terminology.
- source_word: τελευτᾷν
  chosen: to die
  alternatives:
  - to meet their end
  - to perish
  lexicon: LSJ
  rationale: The infinitive plainly means 'to end one's life / die.' 'Die' is the
    most direct and least interpretively loaded rendering.
- source_word: ἱκανὴν ... τραχύτητα
  chosen: considerable turmoil
  alternatives:
  - great roughness
  - serious disturbance
  - much disorder
  lexicon: LSJ
  rationale: τραχύτης literally suggests roughness/harshness, but in this narrative
    setting it refers to a violent disturbance or commotion. 'Considerable turmoil'
    captures the event-level sense in idiomatic English.
- source_word: μόλις
  chosen: only with difficulty
  alternatives:
  - barely
  - hardly
  lexicon: LSJ
  rationale: μόλις indicates that what follows was achieved with difficulty. Because
    the sentence in the provided witness appears to continue beyond this verse, 'only
    with difficulty' preserves the sense without forcing a completion.
- source_word: γεραιῶν
  chosen: old men
  alternatives:
  - aged men
  - elderly men
  lexicon: LSJ
  rationale: Distinct from πρεσβύτεροι in the same clause; rendering it as 'old men'
    preserves the lexical distinction rather than collapsing both into 'elders.'
- source_word: πρεσβυτέρων
  chosen: elders
  alternatives:
  - senior men
  - older men
  lexicon: LSJ
  rationale: In this context πρεσβύτεροι likely denotes recognized senior/community
    leaders, not merely people advanced in age. 'Elders' preserves that nuance and
    the distinction from γέροντες/γεραιοί.
