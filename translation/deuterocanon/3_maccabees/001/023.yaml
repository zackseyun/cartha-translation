theological_decisions:
- issue: Rendering πατρῷος νόμος
  chosen_reading: the ancestral law
  alternative_readings:
  - the law of their fathers
  - the fathers' law
  rationale: The phrase refers to inherited Jewish law and identity. 'Ancestral law'
    is accurate and readable, preserving the covenantal-ethnic force without adding
    doctrinal explanation not explicit in the text.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; readable modern English'
- issue: Handling the verse's apparent incompleteness in the provided Greek witness
  chosen_reading: Translate the extant clause without supplying an unstated completion
  alternative_readings:
  - Complete the sentence by conjecture from other editions or translations
  rationale: The Zone 1 text ends with μόλις δὲ ὑπό τε τῶν γεραιῶν καὶ τῶν πρεσβυτέρων,
    which is syntactically incomplete in English if over-smoothed. To remain anchored
    to the witness and honest about source-level uncertainty, the translation preserves
    the unfinished sense rather than inventing the continuation.
  doctrine_reference: 'PHILOSOPHY.md: transparency; derivative-work guardrails'
