id: 3MA.1.17
reference: 3 Maccabees 1:17
source:
  edition: lxx-swete-1909
  text: οἱ κατὰ τὴν πόλιν ἀπολειπόμενοι ταραχθέντες ἐξεπήδησαν, ἄδηλον τιθέμενοι τὸ
    γινόμενον.
  language: Greek
  pages: []
  confidence: high
translation:
  text: Those left behind in the city were thrown into confusion and rushed out, being
    uncertain about what was happening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'considering what was happening unclear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ κατὰ τὴν πόλιν ἀπολειπόμενοι
  chosen: Those left behind in the city
  alternatives:
  - those remaining in the city
  - those who had been left in the city
  lexicon: LSJ
  rationale: The participial phrase refers to the people who stayed behind within
    the city. 'Left behind' preserves the passive sense of ἀπολειπόμενοι while remaining
    natural English.
- source_word: ταραχθέντες
  chosen: were thrown into confusion
  alternatives:
  - were troubled
  - were alarmed
  - were disturbed
  lexicon: LSJ
  rationale: The aorist passive participle conveys being upset or agitated by events.
    'Thrown into confusion' captures both the passive force and the public commotion
    implied by the context.
- source_word: ἐξεπήδησαν
  chosen: rushed out
  alternatives:
  - sprang out
  - burst out
  - ran out
  lexicon: LSJ
  rationale: The verb suggests a sudden movement outward. 'Rushed out' is idiomatic
    modern English and preserves the abruptness without sounding overly literal.
- source_word: ἄδηλον τιθέμενοι τὸ γινόμενον
  chosen: not knowing what was happening
  alternatives:
  - regarding what was happening as unclear
  - being uncertain about what was taking place
  lexicon: LSJ
  rationale: 'Literally the phrase means ''considering what was happening unclear/unknown.''
    The chosen rendering expresses the same sense in clear English: they did not understand
    the event unfolding.'
