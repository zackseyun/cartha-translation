theological_decisions:
- issue: Communal identity expressed by ἔθνος
  chosen_reading: nation
  alternative_readings:
  - people
  rationale: The verse concerns social and political solidarity within the Jewish
    community. 'Nation' preserves the collective identity without adding later nationalist
    connotations beyond the text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Social exclusion language in κοινῆς συναναστροφῆς καὶ εὐχρηστίας
  chosen_reading: common association and usefulness
  alternative_readings:
  - shared fellowship and practical benefit
  - ordinary social intercourse and serviceability
  rationale: The Greek points to exclusion from normal communal relations and beneficial
    participation. The chosen wording stays close to the source while remaining intelligible,
    even though εὐχρηστία is contextually somewhat compressed.
  doctrine_reference: Translation philosophy §5, §6
