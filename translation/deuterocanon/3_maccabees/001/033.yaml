id: 3MA.1.33
reference: 3 Maccabees 1:33
source:
  edition: lxx-swete-1909
  text: ἐνπαιδεῖς τε καθηστήκεισαν ἀντιλήψεως τεύξεσθαι, καὶ τοὺς ἀποχωροῦντας ἐξ
    αὐτῶν ἐβδελύσσοντο, καὶ ὡς πολεμίους τοῦ ἔθνους ἔκρινον, καὶ τῆς κοινῆς συναναστροφῆς
    καὶ εὐχρηστίας ἐστέροῦν.
  language: Greek
  pages:
  - 737
  validation: no_reference
translation:
  text: They had been trained to obtain support, and they loathed those who withdrew
    from them, judging them as enemies of the nation, and depriving them of common
    association and usefulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'help' or 'assistance' for 'support' (ἀντιλήψεως).
    reason: lexical_alternative
  - marker: b
    text: The phrase 'common association and usefulness' refers to exclusion from
      ordinary social relations and beneficial participation in communal life.
    reason: cultural_note
lexical_decisions:
- source_word: ἐνπαιδεῖς
  chosen: had been trained
  alternatives:
  - were instructed
  - were disciplined
  lexicon: LSJ
  rationale: The adjective conveys being educated or trained. In context with καθηστήκεισαν,
    it describes an established condition resulting from prior formation, so 'had
    been trained' captures both sense and aspect in natural English.
- source_word: καθηστήκεισαν
  chosen: had been
  alternatives:
  - were established
  - stood
  lexicon: LSJ
  rationale: The pluperfect of καθίστημι indicates a settled prior state. In English,
    this is best absorbed into 'had been trained' rather than rendered woodenly as
    'had stood established.'
- source_word: ἀντιλήψεως
  chosen: support
  alternatives:
  - help
  - assistance
  - relief
  lexicon: LSJ
  rationale: ἀντίληψις commonly denotes aid or support. 'Support' is broad enough
    to fit the social and communal context without over-specifying material relief.
- source_word: τεύξεσθαι
  chosen: to obtain
  alternatives:
  - to attain
  - to receive
  lexicon: LSJ
  rationale: τεύγχανω with a genitive often means to obtain or receive something.
    'Obtain support' is idiomatic and fits the infinitival construction after the
    training language.
- source_word: ἀποχωροῦντας
  chosen: withdrew
  alternatives:
  - departed
  - separated themselves
  lexicon: LSJ
  rationale: The participle denotes those pulling away or departing from the group.
    'Withdrew' preserves the relational and social nuance better than the more merely
    spatial 'departed.'
- source_word: ἐβδελύσσοντο
  chosen: loathed
  alternatives:
  - detested
  - abhorred
  lexicon: LSJ
  rationale: The verb expresses strong revulsion. 'Loathed' is forceful but readable
    modern English, matching the severity of the Greek.
- source_word: πολεμίους
  chosen: enemies
  alternatives:
  - hostile ones
  - foes
  lexicon: LSJ
  rationale: The noun/adjective plainly means enemies. 'Enemies of the nation' preserves
    the political and communal charge of the accusation.
- source_word: ἔθνους
  chosen: nation
  alternatives:
  - people
  - race
  lexicon: LSJ
  rationale: In this context the term refers to the Jewish people as a collective
    body. 'Nation' best reflects the communal-political sense here, while 'race' would
    sound misleading in modern English.
- source_word: κοινῆς συναναστροφῆς
  chosen: common association
  alternatives:
  - shared fellowship
  - ordinary social intercourse
  lexicon: LSJ
  rationale: The phrase refers to normal shared social relations. 'Common association'
    keeps the communal sense without importing overtly ecclesial language like 'fellowship.'
- source_word: εὐχρηστίας
  chosen: usefulness
  alternatives:
  - serviceability
  - practical benefit
  lexicon: LSJ
  rationale: The noun denotes usefulness or beneficial interaction. Because the phrase
    speaks of what they were deprived of in communal life, 'usefulness' preserves
    the broad social utility sense, though the exact nuance is somewhat difficult
    in this context.
- source_word: ἐστέροῦν
  chosen: depriving
  alternatives:
  - excluding from
  - denying
  lexicon: LSJ
  rationale: The verb means to deprive or rob of. 'Depriving them of' fits the double
    object structure and clearly expresses social exclusion.
