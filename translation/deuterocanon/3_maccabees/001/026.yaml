id: 3MA.1.26
reference: 3 Maccabees 1:26
source:
  edition: lxx-swete-1909
  text: θρασυνθεὶς δὲ καὶ πάντας παραπέμψας ἤδη, καὶ πρόσβασιν ἤδη ἐποιεῖτο, τέλος
    ἐπιθήσειν δοκῶν τῷ προειρημένῳ.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 752
  confidence: high
  validation: agree
translation:
  text: But having become emboldened and having by now sent everyone away, he was
    already making his approach, thinking to bring the aforementioned matter to completion.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θρασυνθεὶς
  chosen: after becoming emboldened
  alternatives:
  - having become bold
  - growing insolent
  - taking courage
  lexicon: LSJ
  rationale: Aorist passive participle from θαρσύνω/θρασύνω in context denotes being
    made bold or daring. 'Emboldened' preserves the participial force and the negative-leaning
    audacity of the scene without overinterpreting as outright 'insolent'.
- source_word: παραπέμψας
  chosen: having sent everyone away
  alternatives:
  - having dismissed everyone
  - having sent all on ahead
  lexicon: LSJ
  rationale: With πάντας as object, the sense is dismissing or sending away all attendants.
    'Sent everyone away' is idiomatic and fits the narrative context better than the
    more ambiguous 'sent all on ahead.'
- source_word: πρόσβασιν
  chosen: his approach
  alternatives:
  - access
  - advance
  - entry
  lexicon: LSJ
  rationale: πρόσβασις can mean approach or access. Here with ἐποιεῖτο, it describes
    his movement toward the forbidden place, so 'making his approach' best captures
    the concrete action.
- source_word: ἐποιεῖτο
  chosen: was already making
  alternatives:
  - was undertaking
  - was effecting
  lexicon: LSJ
  rationale: Imperfect middle indicates an action in progress. 'Was already making'
    preserves the ongoing sense and works naturally with 'his approach.'
- source_word: τέλος ἐπιθήσειν
  chosen: to bring ... to completion
  alternatives:
  - to put an end to
  - to accomplish fully
  - to carry through to the end
  lexicon: LSJ
  rationale: The idiom τέλος ἐπιτιθέναι/ἐπιθήσειν here means to complete or carry
    through a plan, not 'put an end to' in the sense of stopping it. 'Bring to completion'
    is clear and suitably formal.
- source_word: τῷ προειρημένῳ
  chosen: the matter spoken of before
  alternatives:
  - what had been mentioned before
  - the previously stated plan
  lexicon: LSJ
  rationale: Perfect passive participle used substantivally refers back to the previously
    mentioned intention. 'The matter spoken of before' is transparent and avoids importing
    a more specific noun than the Greek supplies.
