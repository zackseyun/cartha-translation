theological_decisions:
- issue: Rendering πιστῷ in reference to God
  chosen_reading: the faithful God
  alternative_readings:
  - the trustworthy God
  - the true God
  rationale: The adjective is rendered directly rather than interpreted doctrinally.
    This preserves the source wording and avoids importing a broader theological claim
    not explicit in the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Reference of 'the place'
  chosen_reading: the place
  alternative_readings:
  - the temple
  - the sanctuary
  rationale: Although context points to the Jerusalem sanctuary, the Greek uses τόπος
    rather than a more explicit temple term. The translation preserves that lexical
    choice rather than resolving it in the main text.
  doctrine_reference: Translation philosophy §1, §5
