id: 3MA.1.9
reference: 3 Maccabees 1:9
source:
  edition: lxx-swete-1909
  text: διακομισθεὶς δὲ εἰς Ἰεροσόλυμα, καὶ θύσας τῷ πιστῷ θεῷ καὶ χάριτας ἀποδιδοὺς
    καὶ τῶν ἑξῆς τι τῷ τόπῳ ποιήσας, καὶ δὴ παραγενόμενος εἰς τὸν τόπον καὶ τῇ σπουδαιότητι
    καὶ εὐσεβείᾳ καταπληγείς,
  language: Greek
  pages: []
  confidence: high
translation:
  text: Then, after being conveyed to Jerusalem, and after sacrificing to the faithful
    God and offering thanks, and after doing something further for the place, indeed,
    when he came to the place and was struck with awe by its dignity and piety,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the trustworthy God.' The Greek adjective can denote faithfulness or
      trustworthiness; 'faithful' is the more direct rendering here.
    reason: lexical_alternative
  - marker: b
    text: That is, the sacred site in Jerusalem, likely the temple precinct. The Greek
      says simply 'the place.'
    reason: cultural_note
  - marker: c
    text: The phrase 'doing something further for the place' is indefinite in Greek
      and does not specify the exact action.
    reason: lexical_alternative
lexical_decisions:
- source_word: διακομισθεὶς
  chosen: after being conveyed
  alternatives:
  - after being brought over
  - after being transported
  - after arriving
  lexicon: LSJ
  rationale: The participle indicates being carried or conveyed from one place to
    another, not merely simple arrival. 'Conveyed' preserves the passive movement
    without over-specifying the means of travel.
- source_word: θύσας
  chosen: after sacrificing
  alternatives:
  - after offering sacrifice
  - after making sacrifice
  lexicon: LSJ
  rationale: The aorist participle refers to sacrificial action. 'After sacrificing'
    is concise and natural while preserving the cultic sense.
- source_word: τῷ πιστῷ θεῷ
  chosen: to the faithful God
  alternatives:
  - to the trustworthy God
  - to the true God
  lexicon: LSJ
  rationale: πιστός most naturally means 'faithful' or 'trustworthy.' 'Faithful God'
    is retained as the most direct rendering, even if slightly unusual in English,
    because it reflects the Greek adjective rather than smoothing to a more interpretive
    phrase like 'true God.'
- source_word: χάριτας ἀποδιδοὺς
  chosen: offering thanks
  alternatives:
  - giving thanks
  - rendering thanks
  lexicon: LSJ
  rationale: The idiom means to return or render thanks. 'Offering thanks' fits the
    sequence of participles and the religious setting.
- source_word: τῶν ἑξῆς τι
  chosen: something further
  alternatives:
  - something additional
  - one of the subsequent things
  - something of what followed
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic and compressed. It appears to indicate
    some further act beyond sacrifice and thanksgiving. 'Something further' preserves
    the indefiniteness of τι and the forward-looking sense of ἑξῆς without forcing
    a more precise meaning than the Greek supplies.
- source_word: τῷ τόπῳ ποιήσας
  chosen: doing ... for the place
  alternatives:
  - making ... for the place
  - doing ... to honor the place
  lexicon: LSJ
  rationale: The expression is broad and does not specify the exact deed. 'For the
    place' keeps the dative relation and likely sense of acting in benefit or honor
    of the sanctuary site.
- source_word: τὸν τόπον
  chosen: the place
  alternatives:
  - the site
  - the sanctuary place
  lexicon: LSJ
  rationale: The repeated τόπος likely refers specifically to the temple precinct
    or sacred site, but the Greek itself says 'the place.' The translation preserves
    that wording and lets context carry the sacred reference.
- source_word: τῇ σπουδαιότητι
  chosen: its dignity
  alternatives:
  - its seriousness
  - its grandeur
  - its majesty
  lexicon: LSJ
  rationale: σπουδαιότης can denote seriousness, worth, or dignity. In this temple
    context, 'dignity' best captures the impressive solemn worth of the place without
    overstating physical splendor.
- source_word: εὐσεβείᾳ
  chosen: piety
  alternatives:
  - reverence
  - devoutness
  - godliness
  lexicon: LSJ
  rationale: εὐσέβεια denotes reverence or piety in religious conduct. 'Piety' is
    concise and fits the sacred atmosphere described.
- source_word: καταπληγείς
  chosen: was struck with awe
  alternatives:
  - was astonished
  - was overwhelmed
  - was deeply impressed
  lexicon: LSJ
  rationale: The verb conveys being strongly affected or overwhelmed. 'Struck with
    awe' fits the religious context better than a flatter 'astonished.'
