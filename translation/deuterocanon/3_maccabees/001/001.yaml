id: 3MA.1.1
reference: 3 Maccabees 1:1
source:
  edition: lxx-swete-1909
  text: Ο ΔΕ Φιλοπάτωρ παρὰ τῶν ἀνακομισθέντων μαθὼν τὴν γινομένην τῶν ἐπ᾽ αὐτοῦ κρατουμένων
    τόπων ἀφαίρεσιν ὑπὸ Ἀντιόχου, παραγγείλας ταῖς πάσαις δυνάμεσιν πεζικαῖς καὶ ἱππικαῖς,
    καὶ τὴν ἀδελφὴν Ἀρσινόην συνπαραλαβών, ἐξώρμησεν μέχρι τῶν κατὰ Ῥαφίαν τόπων,
    ὅπου παρεμβεβλήκεισαν οἱ περὶ Ἀντίοχον.
  language: Greek
  pages: []
  confidence: high
translation:
  text: Now when Philopator learned from those who had returned that Antiochus was
    taking away the regions under his rule, he gave orders to all his infantry and
    cavalry forces, took along his sister Arsinoe, and set out as far as the region
    of Raphia, where those with Antiochus had encamped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'those around Antiochus,' an idiom for Antiochus' party or forces;
      it may include Antiochus himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ο ΔΕ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: LSJ
  rationale: δέ here marks narrative progression rather than strong contrast; 'Now'
    gives natural English scene advancement without overtranslating.
- source_word: Φιλοπάτωρ
  chosen: Philopator
  rationale: Personal name/title is transliterated per project philosophy rather than
    translated.
- source_word: παρὰ τῶν ἀνακομισθέντων
  chosen: from those who had returned
  alternatives:
  - from those who had brought back word
  - from the messengers who had come back
  lexicon: LSJ
  rationale: The participle denotes persons who have come back/returned. The context
    implies they are reporting news, but the Greek does not explicitly name them as
    messengers, so 'those who had returned' stays closer to the wording.
- source_word: μαθὼν
  chosen: learned
  alternatives:
  - found out
  - came to know
  lexicon: LSJ
  rationale: Aorist participle of μανθάνω naturally means 'having learned' or 'when
    he learned' in narrative sequence.
- source_word: τὴν γινομένην ... ἀφαίρεσιν
  chosen: was taking away
  alternatives:
  - the removal that was taking place of
  - was seizing
  lexicon: LSJ
  rationale: The phrase literally refers to 'the taking away/removal that was happening.'
    In idiomatic English, rendering the event verbally as 'was taking away' preserves
    the ongoing aspect signaled by γινομένην.
- source_word: τῶν ἐπ᾽ αὐτοῦ κρατουμένων τόπων
  chosen: the regions under his rule
  alternatives:
  - the places held by him
  - the territories under his control
  lexicon: LSJ
  rationale: κρατουμένων indicates territories being held/controlled by Philopator.
    'Regions under his rule' is clear modern English and preserves the political sense.
- source_word: ὑπὸ Ἀντιόχου
  chosen: Antiochus
  rationale: Agent of the action; standard transliteration of the personal name.
- source_word: παραγγείλας
  chosen: he gave orders to
  alternatives:
  - having commanded
  - after issuing orders to
  lexicon: LSJ
  rationale: The participle introduces the next action in sequence. 'He gave orders
    to' is natural English and preserves the military-command sense.
- source_word: ταῖς πάσαις δυνάμεσιν πεζικαῖς καὶ ἱππικαῖς
  chosen: all his infantry and cavalry forces
  alternatives:
  - all the foot and horse forces
  - all the infantry and mounted troops
  lexicon: LSJ
  rationale: πεζικαῖς and ἱππικαῖς are standard military terms for foot and horse
    troops. 'Infantry and cavalry forces' is idiomatic and precise.
- source_word: καὶ τὴν ἀδελφὴν Ἀρσινόην συνπαραλαβών
  chosen: took along his sister Arsinoe
  alternatives:
  - taking his sister Arsinoe with him
  - and bringing along his sister Arsinoe
  lexicon: LSJ
  rationale: συνπαραλαβών means taking along with oneself. The possessive 'his' is
    required by ἀδελφήν in context.
- source_word: ἐξώρμησεν
  chosen: set out
  alternatives:
  - marched out
  - advanced
  lexicon: LSJ
  rationale: The verb denotes setting out or making an expedition. 'Set out' is broad
    enough to fit the movement without overstating military nuance.
- source_word: μέχρι τῶν κατὰ Ῥαφίαν τόπων
  chosen: as far as the region of Raphia
  alternatives:
  - as far as the places around Raphia
  - to the districts near Raphia
  lexicon: LSJ
  rationale: The phrase refers to the area in the vicinity of Raphia. Singular 'region'
    gives smoother English while preserving the geographic sense.
- source_word: ὅπου παρεμβεβλήκεισαν
  chosen: where ... had encamped
  alternatives:
  - where ... were encamped
  - where ... had pitched camp
  lexicon: LSJ
  rationale: Pluperfect of παρεμβάλλω indicates prior encampment relative to Philopator's
    arrival; 'had encamped' preserves that temporal relation.
- source_word: οἱ περὶ Ἀντίοχον
  chosen: those with Antiochus
  alternatives:
  - Antiochus and his men
  - the forces around Antiochus
  lexicon: LSJ
  rationale: The idiom οἱ περὶ + accusative can mean a leader and his party/associates.
    'Those with Antiochus' preserves the idiom without over-specifying whether Antiochus
    himself is included.
