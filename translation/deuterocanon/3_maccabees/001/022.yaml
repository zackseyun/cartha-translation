id: 3MA.1.22
reference: 3 Maccabees 1:22
source:
  edition: lxx-swete-1909
  text: σύν τε τούτοις οἱ περὶ τῶν πολιτῶν θρασυνθέντες οὐκ ἠνείχοντο τέλεον αὐτοῦ
    ἐπικειμένου καὶ τὸ τῆς προθέσεως ἐκπληροῦν διανοουμένου·
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 752
  confidence: high
  validation: minor_mismatch
translation:
  text: Along with these, those who had become emboldened concerning the citizens
    could no longer endure it when he pressed the matter completely and intended to
    carry out his purpose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who had grown bold on behalf of the citizens.' The Greek phrase
      concerning the citizens may indicate either the subject matter of their boldness
      or advocacy for the citizens.
    reason: lexical_alternative
lexical_decisions:
- source_word: σύν τε τούτοις
  chosen: Along with these
  alternatives:
  - besides these things
  - together with this
  lexicon: LSJ
  rationale: Idiomatic connective introducing an additional group or factor; 'Along
    with these' preserves the additive force without sounding wooden.
- source_word: οἱ περὶ τῶν πολιτῶν θρασυνθέντες
  chosen: those who had become emboldened concerning the citizens
  alternatives:
  - those who had grown bold on behalf of the citizens
  - those who had taken courage regarding the citizens
  lexicon: LSJ
  rationale: The participle θρασυνθέντες denotes becoming bold or daring. The phrase
    περὶ τῶν πολιτῶν most naturally indicates the sphere or concern of their boldness,
    likely in relation to the citizens' cause. 'Concerning the citizens' stays close
    to the Greek while remaining intelligible.
- source_word: οὐκ ἠνείχοντο
  chosen: could no longer endure it
  alternatives:
  - did not tolerate
  - could not bear it
  lexicon: LSJ
  rationale: Imperfect middle conveys ongoing inability or refusal to put up with
    the situation. 'Could no longer endure it' captures the durative sense in natural
    English.
- source_word: τέλεον
  chosen: completely
  alternatives:
  - altogether
  - fully
  lexicon: LSJ
  rationale: Adverbial use modifying ἐπικειμένου; it intensifies the pressure being
    applied. 'Completely' is straightforward and preserves the force.
- source_word: αὐτοῦ ἐπικειμένου
  chosen: when he pressed the matter
  alternatives:
  - as he persisted
  - while he was pressing upon them
  lexicon: LSJ
  rationale: ἐπίκειμαι here has the sense of pressing hard, insisting, or being urgent.
    The genitive absolute is rendered temporally in English. 'Pressed the matter'
    communicates sustained pressure without over-specifying the object omitted in
    Greek.
- source_word: τὸ τῆς προθέσεως ἐκπληροῦν
  chosen: to carry out his purpose
  alternatives:
  - to fulfill his plan
  - to accomplish his intention
  lexicon: LSJ
  rationale: πρόθεσις here refers to a set intention or plan, not a theological 'purpose'
    in a Pauline sense. 'Carry out his purpose' is idiomatic and fits the hostile
    royal resolve in context.
- source_word: διανοουμένου
  chosen: intended
  alternatives:
  - was planning
  - had in mind
  lexicon: LSJ
  rationale: The participle indicates deliberate intention. 'Intended' is concise
    and works smoothly with the infinitive ἐκπληροῦν.
