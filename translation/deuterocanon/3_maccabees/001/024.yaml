id: 3MA.1.24
reference: 3 Maccabees 1:24
source:
  edition: lxx-swete-1909
  text: ἀποτραπέντες, ἐπὶ τὴν αὐτὴν τῆς δεήσεως παρῆσαν στάσιν.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: having turned back, they returned to the same posture of supplication.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having turned away, they came again to the same state of supplication.'
      The Greek wording can be taken either more physically ('posture/stance') or
      more generally ('state/condition').
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποτραπέντες
  chosen: having turned back
  alternatives:
  - having turned away
  - having been turned back
  - after turning back
  lexicon: LSJ
  rationale: Aorist passive participle of ἀποτρέπω/ἀποτρέπομαι in context functions
    idiomatically of reversing course or turning back. 'Having turned back' is natural
    English and preserves the participial linkage to the main verb without over-specifying
    agency.
- source_word: παρῆσαν
  chosen: they returned
  alternatives:
  - they came
  - they were present
  - they approached
  lexicon: LSJ
  rationale: From πάρειμι. In this context with ἐπὶ + accusative and after the participle
    'having turned back,' the sense is movement/arrival at a prior condition rather
    than mere presence. 'They returned' best captures the resumptive force in English.
- source_word: στάσιν
  chosen: posture
  alternatives:
  - stance
  - position
  - state
  lexicon: LSJ
  rationale: στάσις can denote standing, position, or state. Here, modified by τῆς
    δεήσεως, it refers to the condition or attitude of prayer/supplication. 'Posture'
    preserves the embodied and situational nuance better than the more abstract 'state'.
- source_word: δεήσεως
  chosen: supplication
  alternatives:
  - prayer
  - entreaty
  - petition
  lexicon: LSJ
  rationale: δέησις often denotes urgent petition or supplication rather than prayer
    in the broadest sense. 'Supplication' keeps the intensity of appeal present in
    the Greek.
- source_word: ἐπὶ τὴν αὐτὴν ... στάσιν
  chosen: to the same posture
  alternatives:
  - to the same stance
  - to the same state
  - into the same position
  lexicon: LSJ
  rationale: The phrase indicates resumption of an earlier condition or attitude.
    'The same posture' communicates that they resumed the same supplicatory position
    previously described.
