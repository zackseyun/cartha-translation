id: 3MA.1.4
reference: 3 Maccabees 1:4
source:
  edition: lxx-swete-1909
  text: γενομένης δὲ καρτερᾶς μάχης καὶ τῶν πραγμάτων μᾶλλον ἐρρωμένων τῷ Ἀντιόχῳ,
    ἱκανῶς ἡ Ἀρσινόη ἐπιπορευσαμένη τὰς δυνάμεις παρεκάλει μετὰ οἴκτου καὶ δακρύων,
    τοὺς πλοκάμους λελυμένη, βοηθεῖν ἑαυτοῖς τε καὶ τοῖς τέκνοις καὶ ταῖς γυναιξὶν
    θαρραλέως, ἐπαγγελλομένη δώσειν νικήσασιν ἑκάστῳ δύο μνᾶς χρυσίου·
  language: Greek
  pages: []
  confidence: high
translation:
  text: And when the battle had become fierce and affairs were turning more strongly
    in Antiochus’s favor, Arsinoe went repeatedly among the troops and earnestly urged
    them, with pity and tears, her hair let down, to help themselves and their children
    and wives courageously, promising to give two minas of gold to each man if they
    won.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A mina was an ancient unit of weight and money; the text promises each soldier
      two minas of gold upon victory.
    reason: cultural_note
lexical_decisions:
- source_word: γενομένης ... καρτερᾶς μάχης
  chosen: when the battle had become fierce
  alternatives:
  - when a hard battle arose
  - when the fighting grew intense
  lexicon: LSJ
  rationale: The genitive absolute marks background circumstance. καρτερός here conveys
    severity/strength, and 'fierce' gives natural modern English while preserving
    the intensity of the conflict.
- source_word: τῶν πραγμάτων μᾶλλον ἐρρωμένων τῷ Ἀντιόχῳ
  chosen: affairs were turning more strongly in Antiochus’s favor
  alternatives:
  - the situation was growing stronger for Antiochus
  - matters were becoming more favorable to Antiochus
  lexicon: LSJ
  rationale: πράγματα is broad ('affairs, situation, matters'). ἐρρωμένων literally
    suggests becoming strong/firm; in context of battle it idiomatically means the
    course of events was favoring Antiochus. 'Turning more strongly in ... favor'
    preserves both the comparative μᾶλλον and the strength nuance.
- source_word: ἱκανῶς
  chosen: earnestly
  alternatives:
  - sufficiently
  - greatly
  - intensely
  lexicon: LSJ
  rationale: Adverbially it intensifies Arsinoe's action rather than indicating mere
    adequacy. 'Earnestly' fits the emotional appeal that follows.
- source_word: ἐπιπορευσαμένη τὰς δυνάμεις
  chosen: went repeatedly among the troops
  alternatives:
  - went through the forces
  - moved among the army
  lexicon: LSJ
  rationale: The participle with τὰς δυνάμεις indicates movement through or among
    the military forces. 'Troops' is idiomatic for military units, and 'repeatedly'
    reflects the force of the compound verb as active movement among them.
- source_word: παρεκάλει
  chosen: urged
  alternatives:
  - exhorted
  - encouraged
  - appealed to
  lexicon: BDAG
  rationale: The verb denotes exhortation/appeal. 'Urged' is concise and fits the
    direct infinitive clause that follows.
- source_word: μετὰ οἴκτου καὶ δακρύων
  chosen: with pity and tears
  alternatives:
  - with compassion and tears
  - with lamentation and tears
  lexicon: LSJ
  rationale: οἶκτος can denote pity/compassion or a pitiable appeal. 'With pity and
    tears' preserves the emotional register without overinterpreting whether the pity
    is hers or evoked in the hearers.
- source_word: τοὺς πλοκάμους λελυμένη
  chosen: her hair let down
  alternatives:
  - with her locks loosened
  - having loosed her tresses
  lexicon: LSJ
  rationale: πλόκαμοι are locks/tresses; λελυμένη indicates they were loosened. 'Her
    hair let down' is natural English and preserves the culturally significant gesture
    of distress/supplication.
- source_word: βοηθεῖν ἑαυτοῖς τε καὶ τοῖς τέκνοις καὶ ταῖς γυναιξὶν
  chosen: to help themselves and their children and wives
  alternatives:
  - to come to the aid of themselves and their children and wives
  - to defend themselves and their children and wives
  lexicon: BDAG
  rationale: βοηθεῖν is 'help/come to aid.' In battle context 'defend' is possible,
    but 'help themselves...' stays closer to the Greek while still making sense as
    a martial appeal.
- source_word: θαρραλέως
  chosen: courageously
  alternatives:
  - bravely
  - boldly
  lexicon: LSJ
  rationale: The adverb calls for bold action in battle. 'Courageously' preserves
    the moral tone of bravery.
- source_word: ἐπαγγελλομένη δώσειν
  chosen: promising to give
  alternatives:
  - pledging to give
  - undertaking to give
  lexicon: BDAG
  rationale: The participle introduces the content of her promise. 'Promising to give'
    is straightforward and idiomatic.
- source_word: νικήσασιν
  chosen: if they won
  alternatives:
  - to those who were victorious
  - to the victors
  lexicon: LSJ
  rationale: 'The dative aorist participle is conditional in sense in this context:
    the payment is promised upon victory. ''If they won'' makes the condition explicit
    in natural English.'
- source_word: ἑκάστῳ δύο μνᾶς χρυσίου
  chosen: two minas of gold to each man
  alternatives:
  - to each, two gold minas
  - two minas in gold to each
  lexicon: LSJ
  rationale: μνᾶ is a monetary/weight unit. 'Minas' is transliterated rather than
    converted into speculative modern value. 'Each man' makes explicit the distributive
    singular in a military context.
