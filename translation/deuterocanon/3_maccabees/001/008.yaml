id: 3MA.1.8
reference: 3 Maccabees 1:8
source:
  edition: lxx-swete-1909
  text: Τῶν δὲ Ἰουδαίων διαπεμψαμένων πρὸς αὐτὸν ἀπὸ τῆς γερουσίας καὶ τῶν πρεσβυτέρων
    τοὺς ἀσπασομένους αὐτὸν καὶ ξένια κομιοῦντας καὶ ἐπὶ τοῖς συμβεβηκόσιν χαρησομένους,
    συνέβη μᾶλλον αὐτὸν προθυμηθῆναι, ὡς τάχιστα πρὸς αὐτοὺς παραγενέσθαι.
  language: Greek
  pages: []
  confidence: high
translation:
  text: But when the Jews had sent to him, from the council of elders and the elders,
    men who would greet him, bring gifts of hospitality, and rejoice over what had
    happened, it turned out that he became all the more eager to come to them as quickly
    as possible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'senate' for 'council of elders'; the Greek term is γερουσία, an institutional
      body of elders.
    reason: lexical_alternative
  - marker: b
    text: '''Gifts of hospitality'' renders ξένια, gifts associated with receiving
      or honoring a guest.'
    reason: cultural_note
lexical_decisions:
- source_word: διαπεμψαμένων
  chosen: had sent
  alternatives:
  - had dispatched
  - had sent representatives
  lexicon: LSJ
  rationale: The genitive absolute indicates prior action by the Jews. 'Had sent'
    is natural English and sufficiently reflects the act of dispatching envoys without
    over-specifying beyond the Greek.
- source_word: γερουσίας
  chosen: council of elders
  alternatives:
  - senate
  - gerousia
  lexicon: LSJ
  rationale: The term denotes the Jewish governing body of elders. 'Council of elders'
    communicates the institutional sense in accessible English better than the more
    Roman 'senate' or untranslated 'gerousia'.
- source_word: πρεσβυτέρων
  chosen: elders
  alternatives:
  - older men
  lexicon: LSJ
  rationale: Distinct from γερουσία in the phrase, so both terms are preserved rather
    than collapsed. 'Elders' is the standard rendering for the social/governing group.
- source_word: τοὺς ἀσπασομένους αὐτὸν
  chosen: men who would greet him
  alternatives:
  - those who would welcome him
  - those who would pay their respects to him
  lexicon: LSJ
  rationale: The participle describes the purpose or role of the envoys. 'Greet him'
    is the core sense of ἀσπάζομαι here; 'men' is supplied because the Greek article
    refers to persons sent.
- source_word: ξένια
  chosen: gifts of hospitality
  alternatives:
  - hospitality gifts
  - guest-gifts
  - presents
  lexicon: LSJ
  rationale: ξένια refers to gifts associated with hospitality or guest-friendship.
    'Gifts of hospitality' preserves the cultural nuance better than the generic 'presents'.
- source_word: κομιοῦντας
  chosen: bring
  alternatives:
  - carry
  - convey
  - present
  lexicon: LSJ
  rationale: In context the envoys are bringing ξένια to the king. 'Bring' is idiomatic
    and fits the participial sequence.
- source_word: ἐπὶ τοῖς συμβεβηκόσιν
  chosen: over what had happened
  alternatives:
  - because of what had happened
  - at the events that had occurred
  lexicon: LSJ
  rationale: The phrase refers generally to the recent events. 'Over what had happened'
    works naturally with 'rejoice' and avoids importing a more specific interpretation
    than the Greek states.
- source_word: χαρησομένους
  chosen: rejoice
  alternatives:
  - be glad
  - express joy
  lexicon: LSJ
  rationale: Future middle participle expressing intended response. 'Rejoice' preserves
    the elevated but still readable tone.
- source_word: συνέβη
  chosen: it turned out
  alternatives:
  - it happened
  - the result was
  lexicon: LSJ
  rationale: This impersonal verb introduces the outcome. 'It turned out' is idiomatic
    modern English while retaining the narrative sense of event/result.
- source_word: μᾶλλον ... προθυμηθῆναι
  chosen: he became all the more eager
  alternatives:
  - he was even more inclined
  - he was more zealous
  lexicon: LSJ
  rationale: The comparative μᾶλλον intensifies his willingness. 'All the more eager'
    captures both the comparative force and the volitional nuance of προθυμέομαι.
- source_word: ὡς τάχιστα
  chosen: as quickly as possible
  alternatives:
  - as soon as possible
  - with all speed
  lexicon: LSJ
  rationale: This common idiom expresses urgency. 'As quickly as possible' is clear
    modern English.
- source_word: πρὸς αὐτοὺς παραγενέσθαι
  chosen: to come to them
  alternatives:
  - to arrive among them
  - to present himself to them
  lexicon: LSJ
  rationale: παραγίνομαι here means to come/arrive in their presence. 'Come to them'
    is straightforward and idiomatic.
