theological_decisions:
- issue: Rendering the Semitic superlative οὐρανὸς τοῦ οὐρανοῦ
  chosen_reading: the highest heaven
  alternative_readings:
  - the heaven of heavens
  - heaven of heaven
  rationale: The phrase evokes God's transcendent dwelling beyond ordinary heaven.
    The main text uses a clear English equivalent rather than a wooden calque, while
    preserving the more literal form in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
- issue: Generic ἀνθρώποις
  chosen_reading: men
  alternative_readings:
  - human beings
  - people
  rationale: The Greek refers generically to humans, not specifically males. The project
    prefers gender-accurate renderings matching source intent; 'men' can still function
    generically in elevated style, but the inclusive sense should be documented as
    an alternative.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4'
