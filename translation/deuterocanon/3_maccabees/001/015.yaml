id: 3MA.1.15
reference: 3 Maccabees 1:15
source:
  edition: lxx-swete-1909
  text: τὸ μὲν γὰρ κατοικητήριόν σου οὐρανὸς τοῦ οὐρανοῦ ἀνέφικτος ἀνθρώποις ἐστίν.
  language: Greek
  pages: []
  confidence: high
translation:
  text: For your dwelling place is the heaven of heaven, unreachable by men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the heaven of heavens,' a Hebrew-style expression for the highest
      heaven.
    reason: lexical_alternative
  - marker: b
    text: Or 'unreachable by human beings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατοικητήριόν
  chosen: dwelling place
  alternatives:
  - habitation
  - dwelling
  lexicon: LSJ
  rationale: The noun denotes a place of dwelling or habitation. 'Dwelling place'
    is natural modern English while preserving the concrete locative sense better
    than a more abstract paraphrase.
- source_word: οὐρανὸς τοῦ οὐρανοῦ
  chosen: the highest heaven
  alternatives:
  - heaven of heaven
  - the heaven of heavens
  lexicon: LSJ
  rationale: This Semitic-style superlative literally reads 'heaven of heaven.' In
    English, 'the highest heaven' communicates the idiom's sense clearly without unnecessary
    obscurity. The more literal alternatives are preserved as footnotes.
- source_word: ἀνέφικτος
  chosen: unreachable
  alternatives:
  - inaccessible
  - beyond reach
  lexicon: LSJ
  rationale: The adjective means not attainable or inaccessible. 'Unreachable' is
    concise and idiomatic, preserving the sense that humans cannot attain or access
    this heavenly dwelling.
- source_word: ἀνθρώποις
  chosen: men
  alternatives:
  - human beings
  - people
  lexicon: LSJ
  rationale: The dative plural means 'to/by humans.' Following the project's gender-accurate
    policy, 'men' is acceptable where the Greek uses the generic masculine for humanity;
    here it preserves the elevated register of the prayer. Inclusive alternatives
    are possible but were not chosen for the main text.
