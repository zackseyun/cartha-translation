theological_decisions:
- issue: Description of Dositheus' apostasy from Jewish ancestral practice
  chosen_reading: rendered as 'later having changed his customs and become estranged
    from the ancestral beliefs'
  alternative_readings:
  - later having changed the laws and become alienated from the doctrines of his fathers
  rationale: The verse morally characterizes Dositheus as having abandoned inherited
    Jewish practice and conviction. The translation preserves that evaluative force
    without importing later doctrinal categories beyond the Greek text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
