id: 3MA.1.3
reference: 3 Maccabees 1:3
source:
  edition: lxx-swete-1909
  text: τοῦτον δὲ διάγων Δωσίθεος ὁ Δριμύλου λεγόμενος, τὸ γένος Ἰουδαῖος, ὕστερον
    δὲ μεταβαλὼν τὰ νόμιμα καὶ τῶν πατρίων δογμάτων ἀπηλλοτριωμένος, ἄσημόν τινα κατέκλινεν
    ἐν τῇ σκηνῇ, ὃν συνέβη κομίσασθαι τὴν ἐκείνου κόλασιν.
  language: Greek
  pages: []
  confidence: high
translation:
  text: Now Dositheus, the one called son of Drimylus, a Jew by birth, but later having
    changed his customs and become estranged from the ancestral beliefs, lodged some
    obscure man in the tent in his place; and it happened that this man received that
    one's punishment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Dositheus, called the son of Drimylus.' The Greek wording likely gives
      a patronymic identification.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'having changed the customs/laws and become estranged from the
      ancestral dogmas.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'some insignificant man' or 'some unknown man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διάγων
  chosen: lodged
  alternatives:
  - brought in
  - kept
  - conducted
  lexicon: LSJ
  rationale: In context with κατέκλινεν ἐν τῇ σκηνῇ, the participle introduces Dositheus'
    action in arranging another man in the tent. The main finite verb κατέκλινεν carries
    the sense of laying or placing to rest; English 'lodged' captures the practical
    act without over-literal awkwardness.
- source_word: Δωσίθεος ὁ Δριμύλου λεγόμενος
  chosen: Dositheus, the one called son of Drimylus
  alternatives:
  - Dositheus, called the son of Drimylus
  - Dositheus, known as Drimylus' son
  lexicon: LSJ
  rationale: The genitive after λεγόμενος most naturally identifies him by patronymic
    or family designation. 'The one called son of Drimylus' stays close to the Greek
    while remaining intelligible.
- source_word: τὸ γένος Ἰουδαῖος
  chosen: a Jew by birth
  alternatives:
  - Jew by race
  - Jew by origin
  lexicon: LSJ
  rationale: τὸ γένος marks lineage or ethnic origin rather than present religious
    loyalty. 'By birth' communicates inherited identity in natural English.
- source_word: μεταβαλὼν τὰ νόμιμα
  chosen: having changed his customs
  alternatives:
  - having changed the laws
  - having altered his observances
  lexicon: LSJ
  rationale: τὰ νόμιμα here refers to customary legal-religious practices, not abstract
    legislation. 'Customs' best conveys lived observance.
- source_word: τῶν πατρίων δογμάτων ἀπηλλοτριωμένος
  chosen: having become estranged from the ancestral beliefs
  alternatives:
  - alienated from the traditions of his fathers
  - cut off from the ancestral doctrines
  lexicon: LSJ
  rationale: ἀπηλλοτριωμένος indicates alienation or estrangement; πατρίων δογμάτων
    refers to inherited convictions/traditions. 'Ancestral beliefs' is readable and
    preserves the religious force.
- source_word: ἄσημόν τινα
  chosen: some obscure man
  alternatives:
  - an insignificant man
  - an unknown man
  lexicon: LSJ
  rationale: ἄσημος denotes one without mark, distinction, or reputation. 'Obscure'
    preserves the sense of social insignificance more precisely than merely 'unknown.'
- source_word: κατέκλινεν ἐν τῇ σκηνῇ
  chosen: lodged ... in the tent in his place
  alternatives:
  - laid ... in the tent
  - put ... to bed in the tent
  lexicon: LSJ
  rationale: κατακλίνω literally means lay down or recline, often for a meal or rest.
    In this narrative setting, 'lodged ... in the tent' communicates that he placed
    the substitute there to occupy the vulnerable position. 'In his place' is supplied
    from context to make the substitution explicit in English.
- source_word: ὃν συνέβη κομίσασθαι τὴν ἐκείνου κόλασιν
  chosen: and it happened that this man received that one's punishment
  alternatives:
  - who came to suffer his punishment
  - who ended up receiving the punishment meant for him
  lexicon: LSJ
  rationale: συνέβη introduces the outcome ('it happened'), κομίσασθαι here means
    to receive or incur, and τὴν ἐκείνου κόλασιν refers to the punishment belonging
    to or intended for the other man. The chosen rendering preserves the grim irony
    without over-paraphrase.
