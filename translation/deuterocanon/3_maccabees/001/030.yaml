theological_decisions:
- issue: Reference of cultic initiation language
  chosen_reading: Rendered as pagan/civic ritual language without importing later
    technical religious terminology
  alternative_readings:
  - among those initiated in the mysteries
  rationale: The Greek uses τελεταί and μεμυημένοις, which can evoke mystery-cult
    initiation. Because the verse concerns assimilation through participation in rites,
    the translation keeps the cultic sense but avoids overloading the text with a
    more technical term than necessary in the main line.
