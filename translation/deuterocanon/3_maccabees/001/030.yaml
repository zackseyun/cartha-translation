id: 3MA.1.30
reference: 3 Maccabees 1:30
source:
  edition: lxx-swete-1909
  text: ἵνα δὲ μὴ τοῖς πᾶσιν ἐχθόμενος ἐχθαίνηται, ὑπέγραψεν Ἐὰν δέ τινες ἐξ αὐτῶν
    προαιρῶνται ἐν τοῖς κατὰ τελετὰς μεμυημένοις ἀναστρέφεσθαι, τούτους ἰσοπολίτας
    Ἀλεξανδρεῦσι ποιεῖ.
  language: Greek
  pages:
  - 736
  validation: no_reference
translation:
  text: 'But so that he might not become hated by everyone because of his hostility,
    he issued a written decree: “But if any of them choose to conduct themselves among
    those initiated in the rites, he makes these equal citizens with the Alexandrians.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “among those initiated in the mysteries.” The Greek phrase uses cultic
      initiation language.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα δὲ μὴ
  chosen: But so that ... not
  alternatives:
  - and so that ... not
  - in order that ... not
  lexicon: LSJ
  rationale: Preserves the purposive force of ἵνα while using natural English discourse
    flow with δέ as 'But.'
- source_word: τοῖς πᾶσιν
  chosen: to everyone
  alternatives:
  - to all
  - among all people
  lexicon: LSJ
  rationale: Dative with ἐχθόμενος/ἐχθαίνηται expresses relation; 'to everyone' is
    idiomatic and captures universal scope.
- source_word: ἐχθόμενος ... ἐχθαίνηται
  chosen: by being hostile ... become hateful
  alternatives:
  - being hated ... be hated
  - being at enmity ... become detestable
  lexicon: LSJ
  rationale: The participle and finite verb are cognate and rhetorically paired. The
    middle/passive forms can suggest both hostility and being hated; in context the
    sense is that by acting with hostility he would incur universal hatred. The English
    preserves the wordplay approximately with 'hostile'/'hateful'.
- source_word: ὑπέγραψεν
  chosen: he issued a written order
  alternatives:
  - he wrote
  - he subscribed
  - he set down in writing
  lexicon: LSJ
  rationale: The verb here introduces the content of an official written decree. 'Issued
    a written order' conveys the administrative sense better than the bare 'wrote.'
- source_word: Ἐὰν δέ τινες ἐξ αὐτῶν προαιρῶνται
  chosen: If any of them choose
  alternatives:
  - if some of them prefer
  - if any from among them decide
  lexicon: LSJ
  rationale: προαιρέομαι denotes deliberate choice or preference. 'Choose' is concise
    and clear.
- source_word: ἐν τοῖς κατὰ τελετὰς μεμυημένοις
  chosen: among those initiated in the rites
  alternatives:
  - among those initiated according to the rites
  - among the initiates in the ceremonies
  lexicon: LSJ
  rationale: τελεταί commonly refers to ritual rites or mysteries; μεμυημένοις means
    those initiated. The phrase likely refers to participation in pagan cultic initiation.
    'Rites' is accessible and sufficiently specific without overinterpreting as 'mysteries'
    in the main text.
- source_word: ἀναστρέφεσθαι
  chosen: to conduct themselves
  alternatives:
  - to live
  - to associate
  - to have their way of life
  lexicon: LSJ
  rationale: The verb can mean to live or conduct oneself. In this social-religious
    setting it implies adopting a manner of life/association among the initiated;
    'conduct themselves' keeps that breadth.
- source_word: τούτους ἰσοπολίτας Ἀλεξανδρεῦσι ποιεῖ
  chosen: he makes these equal citizens with the Alexandrians
  alternatives:
  - he grants these equal citizenship with the Alexandrians
  - he makes these fellow citizens equal to the Alexandrians
  lexicon: LSJ
  rationale: ἰσοπολίτας denotes equal in civic status/citizenship. The present tense
    within the decree is naturally rendered as decree-style present, 'he makes.' 'Equal
    citizens with the Alexandrians' preserves the legal nuance.
