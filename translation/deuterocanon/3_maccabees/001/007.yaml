id: 3MA.1.7
reference: 3 Maccabees 1:7
source:
  edition: lxx-swete-1909
  text: ποιήσας δὲ τοῦτο, καὶ τοῖς τεμένεσι δωρεὰς ἀπονείμας, εὐθαρσεῖς τοὺς ὑποτεταγμένους
    κατέστησεν.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And after doing this, and distributing gifts to the sanctuaries, he made those
    under his rule confident.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ποιήσας
  chosen: after doing
  alternatives:
  - having done
  - when he had done
  lexicon: LSJ
  rationale: Aorist participle indicating prior action relative to the main verb;
    'after doing this' gives clear English sequence without over-literal stiffness.
- source_word: τοῦτο
  chosen: this
  lexicon: LSJ
  rationale: Straightforward demonstrative referring back to the preceding action.
- source_word: τεμένεσι
  chosen: sanctuaries
  alternatives:
  - temples
  - sacred precincts
  - shrines
  lexicon: LSJ
  rationale: τέμενος denotes a consecrated sacred place or precinct. 'Sanctuaries'
    is natural English and broad enough to cover sacred sites without implying a specific
    architectural form more narrowly than the Greek requires.
- source_word: δωρεὰς
  chosen: gifts
  alternatives:
  - offerings
  - donations
  lexicon: LSJ
  rationale: The word denotes gifts or benefactions. 'Gifts' fits the royal-donation
    context and avoids importing a specifically cultic nuance stronger than the text
    states.
- source_word: ἀπονείμας
  chosen: distributing
  alternatives:
  - apportioning
  - granting
  - bestowing
  lexicon: LSJ
  rationale: The participle describes the act of assigning or giving out gifts. 'Distributing'
    matches the plural object and reads smoothly in sequence with the first participle.
- source_word: εὐθαρσεῖς
  chosen: confident
  alternatives:
  - of good courage
  - encouraged
  - bold
  lexicon: LSJ
  rationale: The adjective means being in good heart or encouraged. 'Confident' communicates
    the resulting state in idiomatic modern English without sounding archaic.
- source_word: τοὺς ὑποτεταγμένους
  chosen: those under his rule
  alternatives:
  - his subjects
  - those subjected to him
  - those subordinate to him
  lexicon: LSJ
  rationale: The perfect/passive participial form denotes people placed in subjection
    or under authority. 'Those under his rule' is clear, accurate, and avoids the
    slightly more interpretive political label 'subjects' while still conveying governance.
- source_word: κατέστησεν
  chosen: he made
  alternatives:
  - he rendered
  - he caused to be
  - he established as
  lexicon: LSJ
  rationale: In this construction the verb means to cause someone to be in a certain
    state. 'He made ... confident' is the most natural English equivalent.
