id: 3MA.1.29
reference: 3 Maccabees 1:29
source:
  edition: lxx-swete-1909
  text: δοκεῖν γὰρ ἦν μὴ μόνον τοὺς ἀνθρώπους, ἀλλὰ καὶ τὰ τείχη καὶ τὸ πᾶν ἔδαφος
    ἠχεῖν, ἅτε δὴ τῶν πάντων τότε θάνατον ἀλλασσομένων ἀντὶ τῆς τοῦ τόπου βεβηλώσεως.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 752
  confidence: high
  validation: agree
translation:
  text: For it seemed that not only the people, but even the walls and the whole ground,
    were echoing, since at that moment all things were being exchanged for death instead
    of the profanation of the place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were resounding.' The Greek verb conveys reverberating sound.
    reason: lexical_alternative
  - marker: b
    text: Or 'were being given over to death' or 'were being turned over to death.'
      The Greek expression is unusual and metaphorical.
    reason: lexical_alternative
  - marker: c
    text: '''The place'' refers contextually to the sacred precinct, likely the temple
      area; the Greek itself does not use the more specific word ''temple'' here.'
    reason: cross_reference
lexical_decisions:
- source_word: δοκεῖν γὰρ ἦν
  chosen: For it seemed
  alternatives:
  - For it appeared
  - For there seemed to be
  lexicon: LSJ
  rationale: Idiomatic impersonal expression introducing the narrator's perception.
    'For it seemed' preserves the Greek sense without overcomplicating the English.
- source_word: τοὺς ἀνθρώπους
  chosen: the people
  alternatives:
  - the men
  - the humans
  lexicon: LSJ
  rationale: Although literally 'the humans/people,' the context is a crowd's outcry,
    so 'the people' is the most natural collective rendering in English.
- source_word: τὰ τείχη
  chosen: the walls
  alternatives:
  - the ramparts
  lexicon: LSJ
  rationale: Straightforward literal rendering; the image is that even the built surroundings
    seemed to resound.
- source_word: τὸ πᾶν ἔδαφος
  chosen: the whole ground
  alternatives:
  - the whole land
  - all the ground
  lexicon: LSJ
  rationale: ἔδαφος commonly denotes ground or floor/soil. In this immediate scene,
    'the whole ground' best fits the physical setting and the hyperbolic sound imagery.
- source_word: ἠχεῖν
  chosen: were echoing
  alternatives:
  - were resounding
  - were ringing out
  lexicon: LSJ
  rationale: The verb conveys resonant sound. 'Were echoing' captures the sense that
    the cries seemed to reverberate from people, walls, and ground alike.
- source_word: ἅτε δὴ
  chosen: since
  alternatives:
  - inasmuch as
  - because indeed
  lexicon: LSJ
  rationale: This particle combination gives an explanatory-causal force. 'Since'
    communicates that relation in readable modern English.
- source_word: τῶν πάντων
  chosen: all things
  alternatives:
  - everyone and everything
  - the whole situation
  lexicon: LSJ
  rationale: The phrase is broad and somewhat sweeping. 'All things' preserves the
    comprehensive, rhetorical character of the Greek.
- source_word: τότε θάνατον ἀλλασσομένων
  chosen: were being exchanged for death
  alternatives:
  - were being turned over to death
  - were changing into death
  - were being given over to death
  lexicon: LSJ
  rationale: The middle/passive participle of ἀλλάσσω with θάνατον is unusual and
    vivid. 'Exchanged for death' keeps the metaphor of substitution/exchange rather
    than flattening it into a generic 'dying,' while still being intelligible.
- source_word: ἀντὶ τῆς τοῦ τόπου βεβηλώσεως
  chosen: instead of the profanation of the place
  alternatives:
  - rather than the desecration of the place
  - in place of the defilement of the place
  lexicon: LSJ
  rationale: βεβήλωσις denotes profanation/desecration. 'The place' is retained rather
    than specifying 'temple,' because the Greek itself uses the broader expression
    τοῦ τόπου, though the referent is the holy place in context.
