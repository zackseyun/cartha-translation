- issue: Reference of τοῦ τόπου
  chosen_reading: the place
  alternative_readings:
  - the temple
  - the holy place
  rationale: The Greek says 'the place,' and the translation preserves that wording
    while allowing the contextual referent to remain implicit. This avoids importing
    a more specific noun than the source text uses.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
