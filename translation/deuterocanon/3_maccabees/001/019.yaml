id: 3MA.1.19
reference: 3 Maccabees 1:19
source:
  edition: lxx-swete-1909
  text: Ἡμεῖς κατεπατήσαμεν τὸν οἶκον τοῦ ἁγιασμοῦ, ὡς καταπατοῦνται οἱ οἶκοι τῶν
    προσολοθρευμάτων.
  language: Greek
  pages: []
  confidence: high
translation:
  text: We trampled the house of holiness, as the houses of abominations are trampled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the house of holiness' or 'the sanctuary.' The Greek literally says
      'the house of sanctification.'
    reason: lexical_alternative
  - marker: b
    text: The rare Greek term rendered 'abominations' may also mean 'things devoted
      to destruction' or, more broadly, detestable or accursed things.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεπατήσαμεν
  chosen: we trampled
  alternatives:
  - we trod down
  - we profaned
  lexicon: BDAG
  rationale: The verb καταπατέω literally denotes trampling or treading down. 'We
    trampled' preserves the concrete, forceful image in the Greek better than the
    more interpretive 'we profaned,' though profanation is an implied result.
- source_word: οἶκον
  chosen: house
  alternatives:
  - temple
  lexicon: BDAG
  rationale: οἶκος is literally 'house.' In context it refers to the sanctuary/temple,
    but 'house' preserves the source wording while remaining intelligible. The genitive
    phrase clarifies its sacred character.
- source_word: τοῦ ἁγιασμοῦ
  chosen: of sanctification
  alternatives:
  - of holiness
  - of the sanctuary
  - the holy house
  lexicon: BDAG
  rationale: ἁγιασμός commonly denotes sanctification, consecration, or holiness.
    Here the phrase identifies the house by its sacred consecration. 'Of sanctification'
    is somewhat formal but closely reflects the Greek; alternatives like 'sanctuary'
    are smoother but less transparent to the underlying expression.
- source_word: ὡς
  chosen: as
  alternatives:
  - just as
  - like
  lexicon: BDAG
  rationale: ὡς introduces comparison. 'As' is the most direct and natural rendering
    here.
- source_word: καταπατοῦνται
  chosen: are trampled
  alternatives:
  - are trodden down
  lexicon: BDAG
  rationale: 'The present passive keeps the comparison general: this sacred house
    was treated in the same way such impure houses are ordinarily treated. ''Are trampled''
    is clear modern English.'
- source_word: προσολοθρευμάτων
  chosen: abominations
  alternatives:
  - things devoted to destruction
  - pollutions
  - detestable things
  lexicon: LSJ
  rationale: The rare noun προσολόθρευμα appears to denote something accursed, abominable,
    or devoted to destruction. 'Abominations' best captures the cultic and moral revulsion
    in context without overcommitting to a technical sense. Because the term is rare
    and difficult, an alternative is preserved in a footnote.
