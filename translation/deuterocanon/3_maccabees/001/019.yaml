theological_decisions:
- issue: How explicitly to identify the sacred building
  chosen_reading: house of sanctification
  alternative_readings:
  - temple
  - holy house
  - sanctuary
  rationale: The Greek says 'the house of sanctification,' a reverential description
    of the temple. Retaining the phrase preserves the rhetoric of desecration without
    collapsing it into a simpler institutional label.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering the rare and pejorative προσολοθρευμάτων
  chosen_reading: abominations
  alternative_readings:
  - things devoted to destruction
  - detestable things
  rationale: The context contrasts the holy house with impure or accursed houses.
    'Abominations' communicates the cultic offense clearly in English while acknowledging
    lexical uncertainty in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
