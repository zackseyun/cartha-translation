id: 3MA.1.20
reference: 3 Maccabees 1:20
source:
  edition: lxx-swete-1909
  text: τὰ δὲ νεογνὰ τῶν τέκνων αἱ πρὸς τούτοις μητέρες καὶ τιθηνοὶ παραλείπουσαι
    ἄλλως καὶ ἄλλως, αἱ μὲν κατʼ οἴκους, αἱ δὲ κατὰ τὰς ἀγυιὰς ἀνεπιστρέπτως εἰς τὸ
    πανυπέρτατον ἱερὸν ἠθροίζοντο.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And the mothers and nurses besides these, leaving behind the newborn children,
    some in their houses and others in the streets, kept gathering without turning
    back to the all-supreme sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wet nurses' for 'nurses'; the Greek term can refer specifically to women
      nursing infants.
    reason: lexical_alternative
  - marker: b
    text: Or 'the most high temple' / 'the supremely exalted sanctuary' for 'the all-supreme
      sanctuary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νεογνά
  chosen: newborn children
  alternatives:
  - newborns
  - infants
  lexicon: LSJ
  rationale: The term denotes very young children/newborns. 'Newborn children' is
    natural English and preserves the pathos of mothers abandoning babies in haste.
- source_word: τιθηνοί
  chosen: nurses
  alternatives:
  - wet nurses
  - nursemaids
  lexicon: LSJ
  rationale: The word refers to women caring for infants, often specifically wet nurses.
    'Nurses' is concise in the main text; the more specific nuance is preserved as
    an alternative.
- source_word: παραλείπουσαι
  chosen: leaving behind
  alternatives:
  - abandoning
  - neglecting
  lexicon: LSJ
  rationale: The participle indicates leaving something behind rather than a moral
    judgment of abandonment. 'Leaving behind' fits the urgent movement described.
- source_word: ἄλλως καὶ ἄλλως
  chosen: some ... and others ...
  alternatives:
  - in one way and another
  - here and there
  - variously
  lexicon: LSJ
  rationale: In context the phrase is immediately specified by the following distributive
    clauses ('some in houses, others in streets'). Rendering it distributively in
    idiomatic English best reflects the sense.
- source_word: ἀγυιαί
  chosen: streets
  alternatives:
  - lanes
  - roads
  lexicon: LSJ
  rationale: Refers to public streets or lanes within the city. 'Streets' is the clearest
    modern equivalent.
- source_word: ἀνεπιστρέπτως
  chosen: without turning aside
  alternatives:
  - without looking back
  - without turning back
  - unhesitatingly
  lexicon: LSJ
  rationale: Literally conveys not turning back/aside. 'Without turning aside' preserves
    the image of single-minded movement toward the temple.
- source_word: πανυπέρτατον
  chosen: all-supreme
  alternatives:
  - most high
  - supremely exalted
  lexicon: LSJ
  rationale: The compound is an intensive superlative. 'All-supreme' preserves the
    heightened rhetoric better than the more conventional but potentially title-like
    'Most High' in this context.
- source_word: ἱερόν
  chosen: sanctuary
  alternatives:
  - temple
  - holy place
  lexicon: LSJ
  rationale: The term can mean temple precinct or sanctuary. 'Sanctuary' fits the
    immediate sense of the sacred destination while avoiding overprecision about the
    exact architectural scope.
- source_word: ἠθροίζοντο
  chosen: kept gathering
  alternatives:
  - were gathering
  - assembled
  lexicon: LSJ
  rationale: The imperfect middle/passive suggests ongoing collective movement. 'Kept
    gathering' captures the durative force.
