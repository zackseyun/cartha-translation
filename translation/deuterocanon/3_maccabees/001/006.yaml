id: 3MA.1.6
reference: 3 Maccabees 1:6
source:
  edition: lxx-swete-1909
  text: κατακρατήσας δὲ τῆς ἐπιβουλῆς ἔκρινεν τὰς πλησίον πόλεις ἐπελθὼν παρακαλέσαι.
  language: Greek
  pages: []
  confidence: high
translation:
  text: But after gaining control of the plot, he decided to visit the neighboring
    cities and encourage them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after mastering the scheme' or 'after suppressing the plot.' The Greek
      participle κατακρατήσας can suggest getting the upper hand over a hostile plan.
    reason: lexical_alternative
  - marker: b
    text: Or 'he resolved to go to the nearby cities and exhort them.' The verb παρακαλέσαι
      can mean 'encourage,' 'exhort,' or 'appeal to.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακρατήσας
  chosen: after gaining control of
  alternatives:
  - after mastering
  - after suppressing
  - after prevailing over
  lexicon: LSJ
  rationale: Aorist participle from κατακρατέω, here governing τῆς ἐπιβουλῆς. The
    sense is taking hold of or getting the upper hand over the scheme/plot. 'After
    gaining control of' preserves the participial sequence and the idea of overcoming
    the plot without overinterpreting the exact means.
- source_word: ἐπιβουλῆς
  chosen: the plot
  alternatives:
  - the scheme
  - the conspiracy
  lexicon: LSJ
  rationale: ἐπιβουλή commonly denotes a plot or hostile design. 'Plot' is concise
    and natural English; 'conspiracy' would be slightly stronger than the Greek requires
    in this context.
- source_word: ἔκρινεν
  chosen: he decided
  alternatives:
  - he judged
  - he resolved
  lexicon: LSJ
  rationale: κρίνω can mean judge, decide, determine. In this construction with infinitive,
    the sense is deliberative resolution rather than judicial judgment, so 'he decided'
    best fits readable modern English.
- source_word: τὰς πλησίον πόλεις
  chosen: the neighboring cities
  alternatives:
  - the nearby cities
  - the cities close by
  lexicon: LSJ
  rationale: πλησίον used adjectivally with πόλεις indicates spatial proximity. 'Neighboring
    cities' is idiomatic and sufficiently formal.
- source_word: ἐπελθὼν
  chosen: to go to
  alternatives:
  - to visit
  - after going to
  - by going to
  lexicon: LSJ
  rationale: The participle literally means 'having gone upon/to' and likely expresses
    attendant action with the infinitive παρακαλέσαι. In English, 'to go to' communicates
    the movement plainly without adding interpretive nuance such as an official 'visit'.
- source_word: παρακαλέσαι
  chosen: encourage them
  alternatives:
  - exhort them
  - appeal to them
  - summon them
  lexicon: LSJ
  rationale: παρακαλέω has a broad range including exhort, encourage, appeal to, invite.
    Given the political-military context and the object implied by the cities, 'encourage
    them' captures supportive exhortation without becoming too technical. The implied
    object is supplied in English for clarity.
