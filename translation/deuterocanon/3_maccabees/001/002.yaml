id: 3MA.1.2
reference: 3 Maccabees 1:2
source:
  edition: lxx-swete-1909
  text: Θεόδοτος δέ τις ἐκπληρῶσαι τὴν ἐπιβουλὴν διανοηθείς, παραλαβὼν τῶν προυποτεταγμένων
    αὐτῷ ὅπλων Πτολεμαικῶν τὰ κράτιστα, διεκομίσθη νύκτωρ ἐπὶ τὴν τοῦ Πτολεμαίου σκηνήν,
    ὡς μόνος κτεῖναι αὐτόν, καὶ ἐν τούτῳ διαλῦσαι τὸν πόλεμον.
  language: Greek
  pages: []
  confidence: high
translation:
  text: But a certain Theodotus, having planned to carry out the plot, took the best
    of the Ptolemaic weapons that had been assigned to him and was conveyed by night
    to Ptolemy’s tent, to kill him himself and in this way bring the war to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to kill him alone' or 'to kill him single-handedly'; the Greek μόνος
      may emphasize that Theodotus intended to do the killing himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκπληρῶσαι
  chosen: to carry out
  alternatives:
  - to fulfill
  - to accomplish
  lexicon: BDAG
  rationale: In context of an assassination scheme, the infinitive means to execute
    or accomplish the plan, not 'fulfill' in a prophetic or positive sense. 'Carry
    out' is idiomatic modern English and preserves the force.
- source_word: ἐπιβουλήν
  chosen: the plot
  alternatives:
  - the scheme
  - the conspiracy
  lexicon: LSJ
  rationale: The word denotes a hostile design or ambush. 'Plot' is concise and natural
    in English, fitting the assassination context. 'Conspiracy' is possible but slightly
    more interpretive.
- source_word: διανοηθείς
  chosen: having planned
  alternatives:
  - having resolved
  - having conceived
  lexicon: BDAG
  rationale: The participle indicates deliberate intention formed in the mind. 'Having
    planned' communicates purposeful premeditation in clear English.
- source_word: παραλαβών
  chosen: took
  alternatives:
  - having taken
  - received
  lexicon: BDAG
  rationale: The participle here introduces the means by which he proceeded. 'Took'
    is smoother in English narrative than a more wooden participial rendering, while
    preserving the action.
- source_word: τῶν προυποτεταγμένων αὐτῷ ὅπλων Πτολεμαικῶν
  chosen: the Ptolemaic weapons that had been assigned to him
  alternatives:
  - the weapons of Ptolemy previously placed at his disposal
  - the arms previously appointed to him from the Ptolemaic stock
  lexicon: LSJ
  rationale: The phrase indicates weapons already designated or assigned to Theodotus,
    and Πτολεμαικῶν most naturally identifies them as Ptolemaic. The rendering keeps
    both ideas without overcomplicating the syntax.
- source_word: τὰ κράτιστα
  chosen: the best
  alternatives:
  - the finest
  - the strongest
  lexicon: BDAG
  rationale: Superlative adjective indicating the choicest or best-quality weapons.
    'The best' is straightforward and sufficiently broad.
- source_word: διεκομίσθη
  chosen: was conveyed
  alternatives:
  - was brought
  - made his way
  lexicon: LSJ
  rationale: The passive form suggests he was transported or conducted rather than
    simply going on his own. 'Was conveyed' preserves that passive nuance better than
    'made his way.'
- source_word: νύκτωρ
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: BDAG
  rationale: An adverb meaning 'by night' or 'at night.' 'By night' fits the elevated
    narrative tone while remaining readable.
- source_word: σκηνήν
  chosen: tent
  alternatives:
  - pavilion
  lexicon: LSJ
  rationale: In military-camp context, 'tent' is the plain and accurate rendering.
- source_word: ὡς μόνος κτεῖναι αὐτόν
  chosen: intending to kill him by himself
  alternatives:
  - so as to kill him alone
  - to kill him single-handedly
  lexicon: BDAG
  rationale: ὡς with infinitive expresses purpose/intention. μόνος most naturally
    modifies the subject, indicating Theodotus would do it himself. 'By himself' preserves
    that sense without overstating heroics.
- source_word: ἐν τούτῳ διαλῦσαι τὸν πόλεμον
  chosen: in this way bring the war to an end
  alternatives:
  - thereby end the war
  - and by this dissolve the war
  lexicon: BDAG
  rationale: 'The phrase expresses means/result: by killing Ptolemy, he hoped to terminate
    the conflict. ''Bring the war to an end'' is idiomatic and faithful.'
