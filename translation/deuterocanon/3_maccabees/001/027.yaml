id: 3MA.1.27
reference: 3 Maccabees 1:27
source:
  edition: lxx-swete-1909
  text: ταῦτα οὖν καὶ οἱ περὶ αὐτὸν ὄντες θεωροῦντες ἐτράπησαν εἰς τὸ σὺν τοῖς ἡμετέροις
    ἐπικελεῦσθαι τὸν πὰν κράτος ἔχοντα τοῖς παροῦσιν ἐπαμῦναι, μὴ περιιδεῖν τὴν ἄνομον
    καὶ ὑπερήφανον πρᾶξιν.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 752
  confidence: high
  validation: agree
translation:
  text: Therefore, when those around him saw these things, they turned to join our
    people in calling on the one who has all power to help in the present circumstances
    and not overlook the lawless and arrogant deed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'along with ours'; the Greek leaves the referent implicit.
    reason: lexical_alternative
  - marker: b
    text: Or 'to come to the aid of the present situation'; the phrase can refer to
      the circumstances at hand rather than to persons present.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - such things
  lexicon: LSJ
  rationale: Plural demonstrative referring back to the events just witnessed; 'these
    things' preserves the plural and narrative linkage.
- source_word: οἱ περὶ αὐτὸν ὄντες
  chosen: those around him
  alternatives:
  - his attendants
  - those with him
  lexicon: LSJ
  rationale: Literally 'those being around him'; this likely refers to the king's
    entourage or companions. 'Those around him' is transparent and avoids over-specifying
    rank.
- source_word: θεωροῦντες
  chosen: saw
  alternatives:
  - observing
  - watching closely
  lexicon: LSJ
  rationale: The participle denotes beholding/observing. 'Saw' gives natural English
    while retaining the causal sense in context.
- source_word: ἐτράπησαν εἰς τὸ ... ἐπικελεῦσθαι
  chosen: they turned to ... calling on
  alternatives:
  - they were moved to urge
  - they turned to invoke
  lexicon: LSJ
  rationale: The idiom indicates being turned or moved toward an action. Because ἐπικελεῦσθαι
    here governs an appeal to God, 'turned to ... calling on' captures both the shift
    and the prayerful appeal without forcing a more technical gloss.
- source_word: σὺν τοῖς ἡμετέροις
  chosen: to join with our people
  alternatives:
  - with our own people
  - along with ours
  lexicon: LSJ
  rationale: Literally 'with ours.' In context this refers to the Jewish community
    speaking in the first-person plural of the narrative perspective. 'Our people'
    makes the referent explicit in idiomatic English.
- source_word: τὸν πὰν κράτος ἔχοντα
  chosen: the one who has all power
  alternatives:
  - the almighty one
  - the one possessing all dominion
  lexicon: LSJ
  rationale: Literally 'the one having all power/might.' 'The one who has all power'
    is close to the Greek and avoids importing a fixed title not explicitly used here.
- source_word: τοῖς παροῦσιν
  chosen: in the present circumstances
  alternatives:
  - in the present matters
  - for those present
  lexicon: LSJ
  rationale: The dative plural can mean 'the present circumstances/things at hand.'
    In this prayer context that sense fits better than 'those present.'
- source_word: ἐπαμῦναι
  chosen: to help
  alternatives:
  - to come to the aid of
  - to defend
  lexicon: LSJ
  rationale: The verb means to aid or defend. 'Help' is concise and natural; the object
    is the current crisis.
- source_word: μὴ περιιδεῖν
  chosen: not overlook
  alternatives:
  - not ignore
  - not look on and permit
  lexicon: LSJ
  rationale: The infinitive means to look past, disregard, or overlook. 'Not overlook'
    preserves the idiom and moral force.
- source_word: τὴν ἄνομον καὶ ὑπερήφανον πρᾶξιν
  chosen: the lawless and arrogant deed
  alternatives:
  - the unlawful and insolent act
  - the impious and proud action
  lexicon: LSJ
  rationale: πρᾶξις is a deed/action; ἄνομος is lawless/unlawful, and ὑπερήφανος is
    arrogant/proud. 'Lawless and arrogant deed' is direct and readable.
