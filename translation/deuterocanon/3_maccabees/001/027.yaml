theological_decisions:
- issue: Rendering the divine description τὸν πὰν κράτος ἔχοντα
  chosen_reading: the one who has all power
  alternative_readings:
  - the Almighty
  - the one possessing all dominion
  rationale: The Greek describes God by attribute rather than using a standard covenant
    name or fixed title. The translation preserves that descriptive force without
    importing later theological terminology more strongly than the text itself states.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Referent of σὺν τοῖς ἡμετέροις
  chosen_reading: join with our people
  alternative_readings:
  - with ours
  - with our own men
  rationale: The first-person plural likely reflects identification with the Jewish
    community in the narrative. Making the referent explicit aids readability while
    staying within the source's sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5, 6
