id: 3MA.1.32
reference: 3 Maccabees 1:32
source:
  edition: lxx-swete-1909
  text: οἱ δὲ πλεῖστοι γενναίᾳ ψυχῇ ἐνίσχυσαν, καὶ οὐ διέστησαν τῆς εὐσεβείας τὰ τε
    χρήματα περὶ τοῦ ζῇν ἀντικαταλλασσόμενοι ἀδέως ἐτιμῶντο ἑαυτοὺς ῥύσασθαι ἐκ τῶν
    ἀπογραφῶν.
  language: Greek
  pages:
  - 737
  validation: no_reference
translation:
  text: But most of them took courage with a noble spirit, and did not depart from
    piety, exchanging even their possessions for life, and boldly sought to rescue
    themselves from the registrations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not abandon godliness.' The Greek εὐσέβεια can denote reverence,
      devotion, or piety toward God.
    reason: lexical_alternative
  - marker: b
    text: The Greek clause rendered 'boldly sought to rescue themselves from the registrations'
      is difficult in the transmitted text, especially the verb ἐτιμῶντο. The translation
      reflects the probable sense of active effort to secure release from the official
      enrollment.
    reason: textual_variant
  - marker: c
    text: '''Registrations'' refers to the official enrollment/listing process imposed
      on them, not necessarily a population census in the modern sense.'
    reason: cultural_note
lexical_decisions:
- source_word: οἱ δὲ πλεῖστοι
  chosen: But most of them
  alternatives:
  - And most of them
  - Now the majority
  lexicon: LSJ
  rationale: οἱ...πλεῖστοι is a straightforward partitive/superlative expression meaning
    'most' or 'the majority.' δέ is rendered 'But' to mark contrast with the preceding
    group or response.
- source_word: γενναίᾳ ψυχῇ
  chosen: with a noble spirit
  alternatives:
  - with noble courage
  - with a brave soul
  lexicon: LSJ
  rationale: The dative expresses manner. γενναῖος carries the sense of noble/brave,
    and ψυχή here refers to inner disposition/courage rather than the metaphysical
    'soul' in a technical sense. 'With a noble spirit' preserves the idiom while remaining
    readable.
- source_word: ἐνίσχυσαν
  chosen: took courage
  alternatives:
  - were strengthened
  - grew strong
  lexicon: LSJ
  rationale: The verb can mean 'became strong' or 'were strengthened.' In context
    of resolve under pressure, 'took courage' captures the idiomatic force in English
    better than a wooden 'were strengthened.'
- source_word: οὐ διέστησαν τῆς εὐσεβείας
  chosen: did not depart from piety
  alternatives:
  - did not abandon godliness
  - did not separate themselves from reverence
  lexicon: LSJ
  rationale: διίστημι with a genitive can mean 'stand apart from' or 'depart from.'
    εὐσέβεια in this Jewish context denotes reverence toward God expressed in faithful
    observance; 'piety' is concise and suitably weighty.
- source_word: τὰ τε χρήματα περὶ τοῦ ζῇν ἀντικαταλλασσόμενοι
  chosen: exchanging even their possessions for life
  alternatives:
  - trading their property for survival
  - bartering their goods for their lives
  lexicon: LSJ
  rationale: χρήματα means possessions/property/money. περὶ τοῦ ζῇν is idiomatic for
    'for the sake of living' or 'for life/survival.' τε adds the sense 'even/also.'
    The participle is rendered adverbially to show means or attendant action.
- source_word: ἀδέως
  chosen: boldly
  alternatives:
  - fearlessly
  - confidently
  lexicon: LSJ
  rationale: ἀδέως denotes fearlessness or boldness. 'Boldly' fits the tone and modifies
    their attempt to secure release.
- source_word: ἐτιμῶντο
  chosen: sought
  alternatives:
  - considered
  - deemed it right
  - made it their aim
  lexicon: LSJ
  rationale: The transmitted form is difficult in context. From τιμάω/τιμῶμαι it can
    mean 'value/esteem,' but with the infinitive ῥύσασθαι the sense is effectively
    that they regarded it as worth pursuing or made it their aim. 'Sought' gives clear
    English while reflecting the practical force of the clause without overcommitting
    to a more speculative reconstruction.
- source_word: ἑαυτοὺς ῥύσασθαι
  chosen: to rescue themselves
  alternatives:
  - to deliver themselves
  - to free themselves
  lexicon: LSJ
  rationale: ῥύομαι means rescue/deliver. The reflexive pronoun makes explicit that
    they were seeking their own release from the threatened process.
- source_word: ἐκ τῶν ἀπογραφῶν
  chosen: from the registrations
  alternatives:
  - from the enrollment lists
  - from the census records
  lexicon: LSJ
  rationale: ἀπογραφή refers to registration, enrollment, or official listing. In
    this narrative it points to the official registration process targeting the Jews.
    'Registrations' stays close to the Greek while avoiding an overly modern bureaucratic
    term.
