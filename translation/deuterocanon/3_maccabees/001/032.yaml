theological_decisions:
- issue: Rendering εὐσέβεια in a Jewish martyrdom/persecution context
  chosen_reading: piety
  alternative_readings:
  - godliness
  - devotion
  rationale: The term denotes reverent fidelity to God and ancestral religion. 'Piety'
    preserves the religious and ethical dimension without importing later doctrinal
    terminology.
  doctrine_reference: Translation philosophy §1, §6
- issue: How to represent the difficult clause with ἐτιμῶντο
  chosen_reading: rendered idiomatically as 'boldly sought to rescue themselves'
  alternative_readings:
  - '''boldly considered rescuing themselves'''
  - '''boldly deemed themselves worthy to be rescued from the registrations'''
  rationale: The source wording is syntactically awkward in Swete's witness. The chosen
    rendering aims to preserve the apparent sense of active effort to escape the registration
    process while honestly avoiding a falsely precise interpretation of a difficult
    form.
  doctrine_reference: Translation philosophy §1, §5
