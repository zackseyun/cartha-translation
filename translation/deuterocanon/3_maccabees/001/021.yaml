id: 3MA.1.21
reference: 3 Maccabees 1:21
source:
  edition: lxx-swete-1909
  text: ποικίλη δὲ ἦν τῶν εἰς τοῦτο συλλεγέντων ἡ δέησις ἐπὶ τοῖς ἀνοσίως ὑπʼ ἐκείνου
    κατεγχειρουμένοις.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And varied was the petition of those who had gathered for this, concerning
    those who were being lawlessly handed over by him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'supplication' or 'plea' for δέησις.
    reason: lexical_alternative
  - marker: b
    text: The adverb ἀνοσίως can also be rendered 'impiously' or 'wickedly,' highlighting
      the moral and possibly religious outrage of the action.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποικίλη
  chosen: varied
  alternatives:
  - diverse
  - manifold
  lexicon: LSJ
  rationale: Predicative adjective describing the character of the petition; 'varied'
    preserves the sense that the appeals were of many kinds without sounding archaic.
- source_word: δέησις
  chosen: petition
  alternatives:
  - supplication
  - plea
  - prayer
  lexicon: LSJ
  rationale: The term denotes earnest entreaty. 'Petition' fits the public, collective
    appeal in context, while 'prayer' could imply direct address to God, which the
    wording here does not require.
- source_word: συλλεγέντων
  chosen: had gathered
  alternatives:
  - had been assembled
  - had been brought together
  lexicon: LSJ
  rationale: Aorist passive participle of gathering. 'Had gathered' gives natural
    English while allowing either reflexive or passive nuance; the exact agent of
    gathering is not explicit.
- source_word: εἰς τοῦτο
  chosen: for this
  alternatives:
  - for this purpose
  - to this end
  lexicon: LSJ
  rationale: Keeps the Greek's concise telic expression without over-specifying the
    purpose beyond what the context supplies.
- source_word: ἐπὶ τοῖς ... κατεγχειρουμένοις
  chosen: concerning those who were being ... handed over
  alternatives:
  - over those being ... delivered up
  - for those being ... surrendered
  lexicon: LSJ
  rationale: ἐπί with the dative here is taken as indicating the matter or occasion
    of the petition. 'Concerning' is idiomatic and preserves that the plea was on
    behalf of or about these people.
- source_word: ἀνοσίως
  chosen: lawlessly
  alternatives:
  - impiously
  - wickedly
  - unholy
  lexicon: LSJ
  rationale: The adverb conveys conduct violating what is right or sacred. 'Lawlessly'
    communicates wrongful action in accessible English; 'impiously' is possible but
    sounds more narrowly religious and less natural here.
- source_word: κατεγχειρουμένοις
  chosen: handed over
  alternatives:
  - delivered over
  - given into custody
  - betrayed
  lexicon: LSJ
  rationale: The verb suggests being put into another's hands or delivered up. 'Handed
    over' is clear modern English and preserves the coercive transfer implied by the
    compound verb.
- source_word: ὑπʼ ἐκείνου
  chosen: by him
  alternatives:
  - by that man
  - by that one
  lexicon: LSJ
  rationale: The demonstrative points back to a previously mentioned male figure.
    'By him' is the most natural anaphoric rendering in English.
