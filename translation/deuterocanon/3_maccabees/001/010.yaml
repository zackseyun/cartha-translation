theological_decisions:
- issue: Distinguishing ἱερόν and ναός in the same verse
  chosen_reading: Render ἱερόν as 'sanctuary' and ναός as 'temple'
  alternative_readings:
  - Render both as 'temple'
  rationale: 'The Greek uses two different sacred-space terms in close proximity.
    Preserving a distinction in English makes the narrative movement clearer: admiration
    of the sacred complex/order leads to a plan to enter the temple proper.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
