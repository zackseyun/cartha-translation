id: 3MA.1.10
reference: 3 Maccabees 1:10
source:
  edition: lxx-swete-1909
  text: θαυμάσας δὲ καὶ τὴν τοῦ ἱεροῦ εὐταξίαν, ἐνεθυμήθη βουλεύσασθαι εἰς τὸν ναὸν
    εἰσελθεῖν.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And having marveled also at the good order of the sanctuary, he considered
    entering the temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek uses two different terms here: ἱερόν for the sacred precinct or sanctuary,
      and ναός for the temple proper.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θαυμάσας
  chosen: when he had marveled
  alternatives:
  - having marveled
  - being amazed
  lexicon: LSJ
  rationale: Aorist participle indicating prior action relative to the main verb.
    'Marveled' preserves the sense of wonder without overstating emotional shock.
- source_word: εὐταξίαν
  chosen: good order
  alternatives:
  - orderliness
  - arrangement
  - discipline
  lexicon: LSJ
  rationale: The noun denotes orderly arrangement or proper order. 'Good order' is
    natural English and preserves the positive evaluative force of the Greek better
    than the flatter 'orderliness.'
- source_word: ἱεροῦ
  chosen: sanctuary
  alternatives:
  - holy place
  - temple precinct
  lexicon: LSJ
  rationale: Here ἱερόν refers to the sacred complex in a broad sense, distinct from
    ναός later in the verse. Rendering it 'sanctuary' helps preserve the lexical distinction
    between the two Greek terms within the same sentence.
- source_word: ἐνεθυμήθη
  chosen: he considered
  alternatives:
  - he thought
  - he resolved
  - he pondered
  lexicon: LSJ
  rationale: The verb conveys inward deliberation. 'Considered' fits the middle sense
    of reflective thought and avoids prematurely hardening the action into a firm
    resolve.
- source_word: βουλεύσασθαι
  chosen: making plans
  alternatives:
  - to deliberate
  - to decide
  - to take counsel
  lexicon: LSJ
  rationale: The infinitive adds the nuance of deliberative planning. 'Making plans'
    communicates purposeful intention in idiomatic English while retaining the sense
    of counsel/deliberation.
- source_word: ναὸν
  chosen: temple
  alternatives:
  - inner sanctuary
  - shrine
  lexicon: LSJ
  rationale: ναός commonly denotes the temple proper or inner sacred structure. 'Temple'
    is the clearest English equivalent here, especially in contrast with earlier ἱερόν
    rendered 'sanctuary.'
- source_word: εἰσελθεῖν
  chosen: to enter
  alternatives:
  - to go into
  lexicon: LSJ
  rationale: Standard rendering of the infinitive of motion; concise and natural in
    English.
