theological_decisions:
- issue: Rendering εὐσέβεια in a deuterocanonical Hellenistic Jewish civic-religious
    context
  chosen_reading: piety
  alternative_readings:
  - godliness
  - religion
  - reverence
  rationale: The verse speaks of the city's established reverent devotion and the
    structures supporting it. 'Piety' best preserves both religious seriousness and
    civic embeddedness without narrowing the term to later Christian usage.
