id: 3MA.1.31
reference: 3 Maccabees 1:31
source:
  edition: lxx-swete-1909
  text: Ἐνιοι δὲ ἐπιπολαίως τὰς τῆς πόλεως εὐσεβείας ἐπιβάθρας στυγοῦντες, εὐχερῶς
    ἑαυτοὺς ἐδίδοσαν, ὡς μεγάλης τινὸς κοινωνήσοντες εὐκλείας ἀπὸ τῆς ἐσομένης τῷ
    βασιλεῖ συναναστροφῆς.
  language: Greek
  pages:
  - 736
  validation: no_reference
translation:
  text: But some, lightly despising the supports of the city's piety, readily gave
    themselves over, as though they would share in some great renown from the association
    with the king that was to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the foundations of the city's piety.' The Greek uses a metaphor for
      supporting structures.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the future association/companionship with the king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐνιοι
  chosen: some
  alternatives:
  - certain ones
  - some people
  lexicon: LSJ
  rationale: An indefinite plural referring to a subset within the population. 'Some'
    is natural modern English and preserves the contrast with the broader group.
- source_word: ἐπιπολαίως
  chosen: lightly
  alternatives:
  - superficially
  - rashly
  - thoughtlessly
  lexicon: LSJ
  rationale: The adverb suggests a shallow or careless attitude. 'Lightly' fits the
    idiom with 'despising' and conveys casual disregard without overinterpreting motive.
- source_word: στυγοῦντες
  chosen: despising
  alternatives:
  - hating
  - detesting
  - abhorring
  lexicon: LSJ
  rationale: The verb can be strong ('hate, abhor'), but here with ἐπιπολαίως the
    sense is better captured as contemptuous rejection rather than intense emotional
    hatred. 'Despising' preserves the negative force while fitting the context.
- source_word: τὰς τῆς πόλεως εὐσεβείας ἐπιβάθρας
  chosen: the supports of the city's piety
  alternatives:
  - the foundations of the city's piety
  - the buttresses of the city's religion
  lexicon: LSJ
  rationale: ἐπιβάθραι literally denotes supports, bases, or props. In context it
    is metaphorical for the civic structures or commitments that uphold reverence.
    'Supports' is clear and avoids overcommitting to architectural imagery, while
    εὐσέβεια is rendered 'piety' as reverence/devotion.
- source_word: εὐσεβείας
  chosen: piety
  alternatives:
  - godliness
  - reverence
  - religion
  lexicon: LSJ
  rationale: In this Hellenistic Jewish context εὐσέβεια denotes reverent religious
    devotion. 'Piety' is concise and suitably weighty; 'religion' would be broader
    and less personal, while 'godliness' can sound more specifically Christianized.
- source_word: εὐχερῶς
  chosen: readily
  alternatives:
  - easily
  - willingly
  lexicon: LSJ
  rationale: The adverb indicates ease or willingness in their self-surrender. 'Readily'
    captures both the lack of resistance and the voluntary aspect.
- source_word: ἑαυτοὺς ἐδίδοσαν
  chosen: gave themselves over
  alternatives:
  - surrendered themselves
  - handed themselves over
  lexicon: LSJ
  rationale: 'The middle-reflexive sense is important: they voluntarily yielded themselves.
    ''Gave themselves over'' preserves that reflexive nuance and fits the moral tone
    of the sentence.'
- source_word: ὡς
  chosen: as though
  alternatives:
  - as if
  - thinking that
  lexicon: LSJ
  rationale: Introduces their perceived motive or expectation rather than an objective
    statement. 'As though' preserves that subjective coloring.
- source_word: μεγάλης τινὸς ... εὐκλείας
  chosen: some great renown
  alternatives:
  - some great glory
  - some great distinction
  lexicon: LSJ
  rationale: εὐκλεία is good repute, fame, or renown. 'Renown' avoids importing overt
    theological 'glory' language and suits the social-honor context.
- source_word: κοινωνήσοντες
  chosen: would share in
  alternatives:
  - would partake of
  - would have a share in
  lexicon: LSJ
  rationale: The future participle expresses anticipated participation in honor. 'Would
    share in' is idiomatic and accurate.
- source_word: ἀπὸ τῆς ἐσομένης τῷ βασιλεῖ συναναστροφῆς
  chosen: from the association with the king that was to come
  alternatives:
  - from the coming intimacy with the king
  - from their future companionship with the king
  lexicon: LSJ
  rationale: συναναστροφή denotes association or social intercourse. The phrase points
    to an expected future relationship with the king. 'Association' is broad enough
    to preserve the social-political sense without overstating closeness; 'that was
    to come' reflects ἐσομένης.
