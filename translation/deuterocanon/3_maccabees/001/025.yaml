id: 3MA.1.25
reference: 3 Maccabees 1:25
source:
  edition: lxx-swete-1909
  text: καὶ τὸ μὲν πλῆθος ὡς ἔμπροσθεν τούτοις ἀνεστρέφετο δεόμενον, οἱ δὲ περὶ τὸν
    βασιλέα πρεσβύτεροι πολλαχῶς ἐπειρῶντο τὸν ἀγέρωχον αὐτοῦ νοῦν ἐξιστάνειν τῆς
    ἐντεθυμημένης ἐπιβουλῆς.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 752
  confidence: high
  validation: minor_mismatch
translation:
  text: And the multitude, as before, kept on with these men, pleading; but the elders
    around the king were trying in many ways to turn his arrogant mind away from the
    plot he had conceived.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the multitude, as before, continued among them in supplication.' The
      Greek ἀνεστρέφετο with δεόμενον is somewhat idiomatic and can be rendered in
      several close ways.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλῆθος
  chosen: the multitude
  alternatives:
  - the crowd
  - the mass of people
  lexicon: LSJ
  rationale: Refers collectively to the assembled people. 'Multitude' preserves the
    formal, collective sense better than the more casual 'crowd'.
- source_word: ὡς ἔμπροσθεν
  chosen: as before
  alternatives:
  - as previously
  - as formerly
  lexicon: LSJ
  rationale: Idiomatic temporal expression meaning in the same manner as earlier.
    'As before' is natural English and sufficiently close to the Greek.
- source_word: ἀνεστρέφετο
  chosen: kept on
  alternatives:
  - conducted themselves
  - continued
  - busied themselves
  lexicon: LSJ
  rationale: The verb can mean to conduct oneself or spend one's time. In this context,
    with the participle δεόμενον, it conveys continued activity. 'Kept on' captures
    the imperfective sense in readable English.
- source_word: δεόμενον
  chosen: pleading
  alternatives:
  - begging
  - entreating
  - making supplication
  lexicon: LSJ
  rationale: The participle denotes earnest petition. 'Pleading' is strong but natural,
    avoiding archaic 'making supplication' while preserving urgency.
- source_word: οἱ περὶ τὸν βασιλέα πρεσβύτεροι
  chosen: the elders around the king
  alternatives:
  - the king's elders
  - the senior men around the king
  - the king's counselors
  lexicon: LSJ
  rationale: Literally 'the elders around the king.' While these are likely court
    officials or senior advisers, 'elders' stays closer to the Greek and avoids over-specifying
    an official title not explicit in the text.
- source_word: πολλαχῶς ἐπειρῶντο
  chosen: were trying in many ways
  alternatives:
  - were attempting by every means
  - kept trying in various ways
  lexicon: LSJ
  rationale: The phrase emphasizes repeated and varied attempts. 'Were trying in many
    ways' preserves both the imperfect and the adverbial nuance.
- source_word: ἀγέρωχον ... νοῦν
  chosen: his arrogant mind
  alternatives:
  - his haughty mind
  - his proud disposition
  - his overbearing attitude
  lexicon: LSJ
  rationale: ἀγέρωχος conveys haughtiness or arrogance; νοῦς here is the king's mindset
    or intention. 'Arrogant mind' is slightly literal but clear and preserves the
    moral evaluation in the Greek.
- source_word: ἐξιστάνειν
  chosen: to turn ... away
  alternatives:
  - to dissuade
  - to remove
  - to divert
  lexicon: LSJ
  rationale: Here the sense is to move or displace the king's mind from its present
    course. 'Turn away' is idiomatic and keeps the image of redirecting his thinking.
- source_word: ἐντεθυμημένης ἐπιβουλῆς
  chosen: the plot he had conceived
  alternatives:
  - the scheme he had planned
  - the design he had in mind
  - the conspiracy he had devised
  lexicon: LSJ
  rationale: ἐπιβουλή is a hostile plan or plot; ἐντεθυμημένης indicates something
    thought out or conceived. 'The plot he had conceived' preserves both deliberation
    and malice.
