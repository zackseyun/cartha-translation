theological_decisions:
- issue: Temple-access restriction language
  chosen_reading: Render the argument as an appeal to cultic propriety and restricted
    entry, culminating in the high priest's annual access.
  alternative_readings:
  - A looser rendering emphasizing general lawfulness without explicit cultic hierarchy
  rationale: 'The verse grounds the objection in sanctuary-access restrictions: even
    Gentiles do not enter, not even all priests, but only the high priest once yearly.
    The translation preserves this layered argument without importing later doctrinal
    elaboration.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
