id: 3MA.1.11
reference: 3 Maccabees 1:11
source:
  edition: lxx-swete-1909
  text: τῶν δὲ εἰπόντων μὴ καθήκειν γίνεσθαι τοῦτο, διὰ τὸ μηδὲ τοῖς ἔθνεσιν εἰσιέναι,
    μηδὲ πᾶσιν τοῖς ἱερεῦσιν, ἀλλ᾽ ἢ μόνῳ τῷ προηγουμένῳ πάντων ἀρχιερεῖ, καὶ τούτῳ
    κατ᾽ ἐνιαυτὸν ἅπαξ, ὁ δὲ οὐδαμῶς ἐπείθετο.
  language: Greek
  pages: []
  confidence: high
translation:
  text: But when some said that this ought not to be done, because not even the Gentiles
    enter, nor all the priests, but only the high priest who is over all—and he only
    once a year—he would not be persuaded at all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'this is not fitting to be done.' The Greek emphasizes propriety or
      appropriateness.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ καθήκειν γίνεσθαι τοῦτο
  chosen: this ought not to happen
  alternatives:
  - this is not fitting to be done
  - it is not proper for this to take place
  lexicon: BDAG
  rationale: καθήκειν conveys what is proper or fitting; with γίνεσθαι τοῦτο the sense
    is that the proposed action is not appropriate or permissible. 'Ought not to happen'
    gives natural English while preserving the moral/propriety force.
- source_word: τοῖς ἔθνεσιν
  chosen: the Gentiles
  alternatives:
  - the nations
  - the foreigners
  lexicon: BDAG
  rationale: In this temple-access context, ἔθνη refers to non-Jews/Gentiles rather
    than nations in the abstract. 'Gentiles' is the clearest contextual rendering.
- source_word: εἰσιέναι
  chosen: enter
  alternatives:
  - go in
  - come in
  lexicon: BDAG
  rationale: The verb denotes entering a place; 'enter' is idiomatic and suits the
    cultic setting.
- source_word: πᾶσιν τοῖς ἱερεῦσιν
  chosen: all the priests
  alternatives:
  - every priest
  lexicon: BDAG
  rationale: The contrast is between unrestricted priestly access and the sole exception
    of the high priest. 'All the priests' preserves the collective contrast.
- source_word: μόνῳ τῷ προηγουμένῳ πάντων ἀρχιερεῖ
  chosen: only the high priest who stands over all
  alternatives:
  - only the high priest who is over all
  - only the chief priest over all
  lexicon: BDAG
  rationale: προηγουμένῳ πάντων literally indicates the one set over all. Rendering
    it as a relative clause keeps the force without awkward English. ἀρχιερεύς is
    standardly 'high priest.'
- source_word: κατ᾽ ἐνιαυτὸν ἅπαξ
  chosen: once a year
  alternatives:
  - once yearly
  - one time each year
  lexicon: BDAG
  rationale: This is the standard temporal sense and echoes the cultic restriction
    clearly.
- source_word: οὐδαμῶς ἐπείθετο
  chosen: he would not be persuaded at all
  alternatives:
  - he was in no way persuaded
  - he refused to listen
  lexicon: BDAG
  rationale: The middle/passive of πείθω here means to be persuaded. 'Would not be
    persuaded at all' preserves the emphatic οὐδαμῶς without overinterpreting it as
    active refusal beyond the text.
