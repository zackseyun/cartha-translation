id: 3MA.1.5
reference: 3 Maccabees 1:5
source:
  edition: lxx-swete-1909
  text: καὶ οὕτως συνέβη τοὺς ἀντιπάλους ἐν χειρονομίαις διαφθαρῆναι, πολλοὺς δὲ καὶ
    δοριαλώτους συλλημφθῆναι.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And so it happened that the opponents were destroyed in hand-to-hand combat,
    and many were also captured as prisoners of war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'captured by the spear,' a military expression for being taken
      as prisoners of war.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέβη
  chosen: it happened
  alternatives:
  - it came about
  - it turned out
  lexicon: BDAG
  rationale: Common narrative formula indicating the outcome; 'it happened' is natural
    modern English and preserves the impersonal construction.
- source_word: ἀντιπάλους
  chosen: the opponents
  alternatives:
  - the adversaries
  - the enemy
  lexicon: LSJ
  rationale: The term denotes those set against the other side in conflict. 'Opponents'
    is sufficiently broad and avoids over-specifying a collective singular such as
    'the enemy.'
- source_word: ἐν χειρονομίαις
  chosen: in the hand-to-hand fighting
  alternatives:
  - in close combat
  - by hand-strokes
  - in hand-to-hand combat
  lexicon: LSJ
  rationale: The phrase refers to fighting carried out by the use of the hands, i.e.,
    close-quarters combat. A too-literal rendering like 'in hand-movements' would
    be misleading in English; 'hand-to-hand fighting' best conveys the military sense.
- source_word: διαφθαρῆναι
  chosen: were destroyed
  alternatives:
  - were ruined
  - were killed
  - perished
  lexicon: LSJ
  rationale: In battle context the verb indicates being brought to destruction. 'Were
    destroyed' preserves the broad result without narrowing it too specifically to
    death, though death is likely implied.
- source_word: πολλούς
  chosen: many
  alternatives:
  - a great many
  lexicon: LSJ
  rationale: Straightforward quantitative adjective; 'many' is sufficient and idiomatic.
- source_word: δοριαλώτους
  chosen: prisoners of war
  alternatives:
  - captives taken by the spear
  - war captives
  lexicon: LSJ
  rationale: This military term literally evokes capture by the spear, but idiomatic
    English is 'prisoners of war.' The martial nuance is preserved in the rationale
    and could be noted as an alternative.
- source_word: συλλημφθῆναι
  chosen: were captured
  alternatives:
  - were seized
  - were taken
  lexicon: BDAG
  rationale: Passive infinitive in parallel with 'were destroyed'; 'were captured'
    fits the military context and pairs naturally with 'prisoners of war'.
