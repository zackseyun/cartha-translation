id: 3MA.4.20
reference: 3 Maccabees 4:20
source:
  edition: lxx-swete-1909
  text: λεγόντων μετὰ ἀποδείξεως καὶ τὴν χαρτηρίαν ἤδη καὶ τοὺς γραφικοὺς καλάμους,
    ἐν οἷς ἐχρῶντο, ἐκλελοιπέναι.
  language: Greek
  pages:
  - 734
  - 738
  - 739
  - 740
  - 741
  - 742
  - 743
  - 744
  - 745
  - 752
  confidence: high
  validation: agree
translation:
  text: asserting with proof that even the papyrus and the writing reeds they had
    been using had already run out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the reed pens.' The Greek literally says 'the writing reeds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λεγόντων
  chosen: asserting
  alternatives:
  - saying
  - declaring
  lexicon: LSJ
  rationale: Genitive plural participle continuing the narrative report; 'asserting'
    fits the formal claim being made in context better than the more neutral 'saying'.
- source_word: μετὰ ἀποδείξεως
  chosen: with proof
  alternatives:
  - with demonstration
  - with evidence
  lexicon: LSJ
  rationale: ἀπόδειξις denotes demonstration or proof. 'With proof' is concise, natural
    English and preserves the sense that the claim was substantiated.
- source_word: τὴν χαρτηρίαν
  chosen: the papyrus
  alternatives:
  - the paper
  - the writing material
  lexicon: LSJ
  rationale: Refers to papyrus writing material. 'Papyrus' is more historically precise
    than 'paper' and avoids flattening the ancient setting.
- source_word: τοὺς γραφικοὺς καλάμους
  chosen: the writing reeds
  alternatives:
  - the reed pens
  - the pens
  lexicon: LSJ
  rationale: Literally 'writing reeds.' Although 'reed pens' is idiomatic, 'writing
    reeds' stays closer to the Greek while remaining understandable.
- source_word: ἐν οἷς ἐχρῶντο
  chosen: they had been using
  alternatives:
  - they were using
  - they used
  lexicon: LSJ
  rationale: Imperfect middle indicates ongoing customary use in past time. 'Had been
    using' conveys prior ongoing use relative to the claim.
- source_word: ἐκλελοιπέναι
  chosen: had already run out
  alternatives:
  - had failed
  - were exhausted
  - had been used up
  lexicon: LSJ
  rationale: Perfect infinitive of ἐκλείπω here conveys depletion/lack. 'Had already
    run out' is idiomatic and captures completed exhaustion by that point.
