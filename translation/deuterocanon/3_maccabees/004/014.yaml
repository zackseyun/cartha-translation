translation:
  text: and that the whole people should be registered by name, not for the previously
    declared brief service according to their function, but, by being tortured with
    the ordered cruelties, to be utterly destroyed within the space of a single day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'name by name,' making the individualizing force explicit.
    reason: lexical_alternative
  - marker: b
    text: The Greek phrase about the earlier purpose is difficult; it likely refers
      to a previously announced short-term labor service used as a pretext, in contrast
      to the actual plan of extermination.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπογραφῆναι
  chosen: should be registered
  alternatives:
  - should be enrolled
  - should be recorded
  lexicon: LSJ
  rationale: The infinitive denotes official registration or enrollment. 'Registered'
    fits the administrative context and natural English.
- source_word: πᾶν τὸ φῦλον
  chosen: the whole nation
  alternatives:
  - the whole race
  - the whole people
  - the whole tribe
  lexicon: LSJ
  rationale: In context this refers collectively to the Jewish people, not a single
    tribe. 'Nation' best conveys a people-group as a whole without implying modern
    statehood too strongly.
- source_word: ἐξ ὀνόματος
  chosen: by name
  alternatives:
  - name by name
  - individually by name
  lexicon: LSJ
  rationale: The phrase indicates individual registration. 'By name' is concise and
    idiomatic; the distributive force is implicit.
- source_word: οὐκ εἰς τὴν ἔμπροσθεν βραχεῖ προδεδηλωμένην
  chosen: not for the previously indicated brief
  alternatives:
  - not for the short term previously announced
  - not for the brief period stated beforehand
  lexicon: LSJ
  rationale: This phrase contrasts the real purpose with an earlier pretext. 'Previously
    indicated brief' keeps the temporal and prior-announcement elements while remaining
    readable when joined to the following noun.
- source_word: τῶν ἔργων κατὰ τρόπον λατρείαν
  chosen: service according to their work
  alternatives:
  - service in keeping with their tasks
  - labor according to assignment
  - employment at work
  lexicon: LSJ
  rationale: λατρεία can mean service, and with τῶν ἔργων κατὰ τρόπον it points to
    a mode of labor/service corresponding to assigned work. The phrase likely refers
    to the ostensible purpose of registration for labor rather than immediate execution.
- source_word: στρεβλούμεντας
  chosen: by being tortured
  alternatives:
  - while being racked
  - while being tormented
  lexicon: LSJ
  rationale: The participle comes from a verb used for torture, originally by the
    rack. 'Being tortured' communicates the sense clearly in modern English without
    over-specifying the instrument.
- source_word: παρηγγελμέναις αἰκίαις
  chosen: with the ordered cruelties
  alternatives:
  - with the commanded outrages
  - with the prescribed brutalities
  lexicon: LSJ
  rationale: The dative phrase describes cruelties that had been commanded. 'Ordered
    cruelties' preserves both the official nature and the brutality.
- source_word: τὸ τέλος ἀφανίσαι
  chosen: to be utterly destroyed
  alternatives:
  - to destroy completely
  - to wipe out utterly
  lexicon: LSJ
  rationale: The infinitive ἀφανίσαι means to make disappear/destroy; τὸ τέλος intensifies
    toward complete destruction. Rendering the whole phrase as 'to be utterly destroyed'
    fits the syntax with the accusative participial construction in English.
- source_word: μιᾶς ὑπὸ καιρὸν ἡμέρας
  chosen: in the course of a single day
  alternatives:
  - at the appointed time of one day
  - within a single day
  lexicon: LSJ
  rationale: The phrase indicates destruction within the span or appointed occasion
    of one day. 'In the course of a single day' is idiomatic and preserves the temporal
    compression.
