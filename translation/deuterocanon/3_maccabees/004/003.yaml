translation:
  text: What district, or city, or indeed what inhabited place at all, or what streets,
    were not filled with mourning and lamentation over them?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek phrase rendered 'inhabited place' contains an unusual adjective
      in this witness; the sense appears to be any settled location where people lived.
    reason: textual_variant
  - marker: b
    text: '''Mourning'' translates a term that can more specifically evoke ritual
      grieving, including beating the breast.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νομός
  chosen: district
  alternatives:
  - province
  - region
  lexicon: LSJ
  rationale: In Hellenistic usage νομός commonly denotes an administrative district.
    'District' is natural English and fits the sequence from larger to smaller civic
    units.
- source_word: πόλις
  chosen: city
  alternatives:
  - town
  lexicon: LSJ
  rationale: Standard civic term; 'city' preserves the ordinary sense in the rhetorical
    list.
- source_word: τὸ σύνολον
  chosen: indeed ... altogether
  alternatives:
  - in sum
  - as a whole
  - generally
  lexicon: LSJ
  rationale: Used adverbially/intensively with τόπος to broaden the scope of the question.
    Rendered idiomatically rather than woodenly to preserve the rhetorical force.
- source_word: οἰκτιστὸς τόπος
  chosen: inhabited place
  alternatives:
  - settled place
  - dwelling place
  lexicon: LSJ
  rationale: The transmitted adjective is unusual and the sense in context points
    to a place where people live. 'Inhabited place' best fits the contrast with district,
    city, and streets while remaining anchored to the likely sense of the Greek.
- source_word: ἀγυιαί
  chosen: streets
  alternatives:
  - lanes
  - roads
  lexicon: LSJ
  rationale: Refers to public streets within inhabited areas; 'streets' is the most
    idiomatic rendering in this urban lament context.
- source_word: κοπετοῦ
  chosen: mourning
  alternatives:
  - beating of the breast
  - lament
  lexicon: LSJ
  rationale: κόπετος can denote ritual mourning with breast-beating, but in English
    'mourning' communicates the broader public grief naturally. The more specific
    nuance is preserved in alternatives.
- source_word: γόων
  chosen: lamentation
  alternatives:
  - wailing
  - cries of grief
  lexicon: LSJ
  rationale: Paired with κόπετος, this term emphasizes audible grief. 'Lamentation'
    preserves the elevated tone and avoids redundancy with 'mourning'.
- source_word: ἐπʼ αὐτοῖς
  chosen: over them
  alternatives:
  - because of them
  - for them
  lexicon: LSJ
  rationale: The preposition with dative here marks occasion or object of grief. 'Over
    them' is idiomatic English for mourning on account of those suffering.
- source_word: οὐκ ἐνεπιπλῶντο
  chosen: was not filled
  alternatives:
  - did not become full
  - was not overflowing
  lexicon: LSJ
  rationale: Imperfect passive conveys being filled up. Singular English agrees smoothly
    with the distributive rhetorical question across the listed places.
