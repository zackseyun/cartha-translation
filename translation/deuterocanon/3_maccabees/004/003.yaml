id: 3MA.4.3
reference: 3 Maccabees 4:3
source:
  edition: lxx-swete-1909
  text: τίς νομός, ἢ πόλις, ἢ τίς τὸ σύνολον οἰκτιστὸς τόπος, ἢ τίνες ἀγυιαὶ κοπετοῦ
    καὶ γόων ἐπʼ αὐτοῖς οὐκ ἐνεπιπλῶντο;
