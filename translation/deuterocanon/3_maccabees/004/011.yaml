translation:
  text: When they had been brought down to the place called Schedia, and the voyage
    had been completed, as had been decreed by the king, he ordered them to encamp
    in the hippodrome before the city, an open area very well suited for making an
    example of them, lying in full view of all who were traveling into the city and
    of those being sent out from there into the country on a journey, so that they
    might neither associate with his forces nor at all be considered worthy of an
    enclosure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'racecourse' for 'hippodrome.' The Greek term refers specifically to
      a horse-racing venue before the city.
    reason: lexical_alternative
  - marker: b
    text: The final clause likely means they were to be kept from contact with the
      king's troops and denied even a proper enclosed lodging or protective compound.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πότιον
  chosen: When
  alternatives:
  - Then
  - At that point
  lexicon: LSJ
  rationale: The opening particle/adverb is difficult and likely functions as a connective
    in context. Rendering it idiomatically as a temporal transition ('When') fits
    the participial construction that follows without overcommitting to a more specific
    nuance not clearly recoverable from the form as transmitted in Swete.
- source_word: Σχεδίαν
  chosen: Schedia
  alternatives:
  - the place called Schedia
  lexicon: LSJ
  rationale: This is a place name, so it is transliterated rather than translated,
    in keeping with project policy for names. The appositional phrase 'the place called'
    is retained from λεγομένην.
- source_word: ἀχθέντων
  chosen: had been brought down
  alternatives:
  - had been led
  - had been taken
  lexicon: BDAG
  rationale: The aorist passive participle indicates being brought or led to a location.
    'Brought down' reflects the directional nuance naturally paired with movement
    toward Alexandria/Schedia and fits the narrative setting.
- source_word: τὸ παράπλου περαθέντος
  chosen: the voyage had been completed
  alternatives:
  - the sailing had been finished
  - the passage had been made
  lexicon: LSJ
  rationale: παράπλους refers to a voyage or sailing along/by sea or river; περαθέντος
    marks completion. 'Voyage had been completed' is natural English and preserves
    the sense.
- source_word: δεδογματισμένον
  chosen: had been decreed
  alternatives:
  - had been decided
  - had been ordered
  lexicon: LSJ
  rationale: The perfect passive conveys an official determination already made. 'Decreed'
    best captures the formal royal decision.
- source_word: ἱπποδρόμῳ
  chosen: hippodrome
  alternatives:
  - racecourse
  lexicon: LSJ
  rationale: The Greek term specifically denotes a horse-racing course. 'Hippodrome'
    preserves the historical setting more precisely than the more generic 'racecourse.'
- source_word: παρεμβαλεῖν
  chosen: to encamp
  alternatives:
  - to quarter
  - to station
  lexicon: LSJ
  rationale: The verb commonly means to set up camp or place in encampment. 'Encamp'
    fits the forced holding of a large group in an open public space.
- source_word: ἁπλατῷ καθεστῶτι περιμέτρῳ
  chosen: an open area
  alternatives:
  - an unfortified perimeter
  - an exposed enclosure
  - a simple open circuit
  lexicon: LSJ
  rationale: The phrase is awkward, but it describes the hippodrome as standing in
    an open, exposed perimeter rather than a protected enclosure. 'An open area' communicates
    the practical sense in readable English; the later phrase about not being deemed
    worthy of an enclosure preserves the contrast.
- source_word: πρὸς παραδειγματισμὸν
  chosen: for making an example of them
  alternatives:
  - for public disgrace
  - for exemplary punishment
  lexicon: LSJ
  rationale: The noun denotes making someone a public example, often with shame or
    deterrent force. The chosen rendering captures both publicity and punitive intent.
- source_word: ἄγαν εὐκαιροτάτῳ
  chosen: excellently suited
  alternatives:
  - very opportune
  - most convenient
  lexicon: LSJ
  rationale: The phrase intensifies the suitability of the location for the stated
    purpose. 'Excellently suited' is idiomatic and preserves the superlative force.
- source_word: καταπορευομένοις
  chosen: traveling down into
  alternatives:
  - going down into
  - entering
  lexicon: LSJ
  rationale: The compound verb includes the directional sense 'down,' which is worth
    preserving where natural. It refers to those coming into the city.
- source_word: στελλομένοις πρὸς ἐκδημίαν
  chosen: being sent out ... on a journey
  alternatives:
  - being dispatched ... abroad
  - setting out into the country
  lexicon: LSJ
  rationale: στέλλω in the passive can mean being sent or dispatched; ἐκδημία denotes
    travel away from home. The chosen rendering keeps both ideas without sounding
    archaic.
- source_word: μηδὲ ταῖς δυνάμεσιν αὐτοῦ κοινωνεῖν
  chosen: might neither associate with his forces
  alternatives:
  - might have no dealings with his troops
  - might not share company with his army
  lexicon: LSJ
  rationale: κοινωνεῖν means to share with, participate with, or associate with. δυνάμεις
    here likely refers to the king's forces/troops. 'Associate with his forces' preserves
    the broad prohibition.
- source_word: μηδὲ τὸ σύνολον καταξιῶσαι περιβόλῳ
  chosen: nor, in general, be deemed worthy of an enclosure
  alternatives:
  - nor at all be granted a walled enclosure
  - nor altogether be considered worthy of protection by a fence
  lexicon: LSJ
  rationale: τὸ σύνολον is adverbial, 'altogether/in general'; καταξιόω means deem
    worthy; περίβολος is an enclosure or surrounding fence/wall. The sense is that
    they were denied even the dignity of a proper enclosed lodging. 'Be deemed worthy
    of an enclosure' preserves the irony and indignity.
