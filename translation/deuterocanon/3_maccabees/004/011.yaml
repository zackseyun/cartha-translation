id: 3MA.4.11
reference: 3 Maccabees 4:11
source:
  edition: lxx-swete-1909
  text: Πότιον δὲ ἐπὶ τὴν λεγομένην Σχεδίαν ἀχθέντων, καὶ τὸ παράπλου περαθέντος,
    καθὼς ἦν δεδογματισμένον τῷ βασιλεῖ, προσέταξεν αὐτοὺς ἐν τῷ πρὸ τῆς πόλεως ἱπποδρόμῳ
    παρεμβαλεῖν ἁπλατῷ καθεστῶτι περιμέτρῳ, καὶ πρὸς παραδειγματισμὸν ἄγαν εὐκαιροτάτῳ,
    καθεστῶτι πᾶσι τοῖς καταπορευομένοις εἰς τὴν πόλιν, καὶ τοῖς ἐκ τούτων εἰς τὴν
    χώραν στελλομένοις πρὸς ἐκδημίαν· πρὸς τὸ μηδὲ ταῖς δυνάμεσιν αὐτοῦ κοινωνεῖν
    μηδὲ τὸ σύνολον καταξιῶσαι περιβόλῳ.
