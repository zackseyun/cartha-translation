translation:
  text: But they were persuaded against them all the more harshly, on the ground that
    they had been bribed as part of a scheme for escape, and it clearly happened that
    he was convinced of this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek syntax is compressed and somewhat awkward here; the final clause may
      also be rendered, 'and it became clear that he was persuaded of this.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπείσθησαν
  chosen: they were persuaded
  alternatives:
  - they were convinced
  - they were won over
  lexicon: LSJ
  rationale: Aorist passive of πείθω. 'Were persuaded' preserves the passive sense
    and leaves implicit who did the persuading, matching the Greek.
- source_word: αὐτοῖς
  chosen: against them
  alternatives:
  - by them
  - with them
  lexicon: LSJ
  rationale: The dative with πείθομαι can indicate the party whose case is accepted;
    in context the sense is adverse to the Jews, so 'against them' best captures the
    judicial/political force.
- source_word: σκληρότερον
  chosen: all the more harshly
  alternatives:
  - more severely
  - more cruelly
  lexicon: LSJ
  rationale: Comparative adverb from σκληρός. 'Harshly' is broad enough for severe
    treatment or judgment; 'all the more' reflects the comparative force.
- source_word: δεδωροκημένοις
  chosen: they had been bribed
  alternatives:
  - they had taken bribes
  - they had been corrupted by gifts
  lexicon: LSJ
  rationale: Perfect passive participle from δωροδοκέω/related bribery language. Passive
    English naturally conveys the accusation that they were bought off.
- source_word: εἰς μηχανὴν τῆς ἐκφυγῆς
  chosen: as part of a scheme for escape
  alternatives:
  - for a contrivance of escape
  - for a plot to escape
  lexicon: LSJ
  rationale: μηχανή here is a device, contrivance, or scheme; ἐκφυγή is escape. 'Scheme
    for escape' is idiomatic and preserves the accusatory tone.
- source_word: συνεβῆ
  chosen: it clearly happened
  alternatives:
  - it turned out
  - it came about
  lexicon: LSJ
  rationale: From συμβαίνω, often 'it happened' or 'it turned out.' The impersonal
    English keeps the somewhat awkward Greek construction visible without over-smoothing.
- source_word: σαφῶς
  chosen: clearly
  alternatives:
  - plainly
  - evidently
  lexicon: LSJ
  rationale: Adverb meaning clearly/plainly. 'Clearly' is concise and natural.
- source_word: πιστωθῆναι
  chosen: he was convinced
  alternatives:
  - he was assured
  - he came to believe
  lexicon: LSJ
  rationale: Aorist passive infinitive from πιστόω, here in the sense of being made
    certain or convinced. 'He was convinced' fits the context of accepting an accusation.
