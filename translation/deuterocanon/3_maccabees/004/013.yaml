id: 3MA.4.13
reference: 3 Maccabees 4:13
source:
  edition: lxx-swete-1909
  text: διοργισθεὶς προσέταξεν καὶ τούτοις ὁμοῦ τὸν αὐτὸν τρόπων ἐπιμελῶς ὡς ἐκείνοις
    ποιῆσαι, μὴ λειπομένους κατὰ μηδένα τρόπον τῆς ἐκείνων τιμωρίας.
