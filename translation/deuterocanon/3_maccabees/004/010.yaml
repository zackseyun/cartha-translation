id: 3MA.4.10
reference: 3 Maccabees 4:10
source:
  edition: lxx-swete-1909
  text: ἔτι καὶ τῷ καθύπερθε πυκνῷ σανιδώματι διακειμένῳ, ὅπως πάντοθεν ἐσκοτισμένοι
    τοὺς ὀφθαλμοὺς, ἀγωγὴν ἐπιβόλων ἐν παντὶ τῷ κατάπλῳ λαμβάνωσιν.
  language: Greek
