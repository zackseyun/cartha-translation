translation:
  text: 'And they were brought down, driven like beasts by the compulsion of iron
    chains: some with their necks fastened to the yokes of the ships, and others with
    their feet secured in unbreakable fetters,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being led'; the Greek participle can be rendered more neutrally, but
      the context favors the stronger sense 'driven.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the yokes of the ships' may refer to ship timbers or bars to
      which prisoners were fastened; the Greek retains the imagery of an animal yoke.
    reason: cultural_note
  - marker: c
    text: '''Fastened'' could also be rendered ''nailed'' if the verb is taken in
      its strongest sense, but the immediate context does not require that narrower
      meaning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατήχθησαν
  chosen: were brought down
  alternatives:
  - were led down
  - were taken down
  lexicon: LSJ
  rationale: Aorist passive of κατάγω, here likely referring to being brought down/transported,
    probably toward the place of confinement or embarkation. 'Brought down' preserves
    the directional force without over-specifying destination.
- source_word: θηρίων τρόπον
  chosen: like beasts
  alternatives:
  - in the manner of beasts
  - as wild animals
  lexicon: LSJ
  rationale: The phrase is comparative and idiomatic. 'Like beasts' is concise, natural
    English and preserves the dehumanizing comparison.
- source_word: ἀγόμενοι
  chosen: driven
  alternatives:
  - being led
  - being brought
  lexicon: LSJ
  rationale: Although the participle can mean 'led,' the context of brutal treatment
    and comparison to beasts supports the stronger English 'driven,' which better
    reflects coercion without adding content absent from the Greek.
- source_word: σιδηροδέσμοις ἀνάγκαις
  chosen: by the compulsion of iron chains
  alternatives:
  - by iron-bound constraints
  - under iron bonds by force
  - by iron fetters under compulsion
  lexicon: LSJ
  rationale: The dative phrase combines imagery of iron bonds with coercive necessity/constraint.
    'By the compulsion of iron chains' preserves both the physical and coercive elements.
    The exact construction is compressed in Greek, so this rendering aims for transparent
    English while retaining the harshness.
- source_word: τοῖς ζυγοῖς τῶν πλοίων
  chosen: the yokes of the ships
  alternatives:
  - the ship-yokes
  - the crossbeams of the ships
  lexicon: LSJ
  rationale: ζυγός literally means 'yoke,' but can extend to a beam or bar. Because
    the image is of necks fastened as draft animals, 'yokes of the ships' preserves
    the metaphor and the lexical link to animal harnessing.
- source_word: προσηλωμένοι
  chosen: fastened
  alternatives:
  - fixed
  - nailed
  - bound fast
  lexicon: LSJ
  rationale: The verb can mean to fasten firmly, even nail to. In this context, 'fastened'
    is broad enough to avoid overcommitting to literal nailing while preserving the
    sense of being firmly attached.
- source_word: τοὺς τραχήλους
  chosen: their necks
  alternatives:
  - the neck
  lexicon: LSJ
  rationale: Accusative object with the participle; English idiom prefers explicit
    possessive here.
- source_word: ἀρρήκτοις
  chosen: unbreakable
  alternatives:
  - unbreakably strong
  - indissoluble
  lexicon: LSJ
  rationale: The adjective denotes something not to be broken. 'Unbreakable' is direct
    and idiomatic.
- source_word: κατησφαλισμένοι
  chosen: secured
  alternatives:
  - made fast
  - locked fast
  lexicon: LSJ
  rationale: The participle conveys being firmly fastened or secured. 'Secured' is
    natural English and fits the restraint imagery.
- source_word: πέδαις
  chosen: fetters
  alternatives:
  - shackles
  - chains
  lexicon: LSJ
  rationale: πέδαι are specifically foot-bonds/fetters. 'Fetters' is the most precise
    English term, more exact than the broader 'chains.'
