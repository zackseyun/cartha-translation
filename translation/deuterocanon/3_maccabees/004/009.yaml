reference: 3 Maccabees 4:9
source:
  edition: lxx-swete-1909
  text: κατήχθησαν δὲ θηρίων τρόπον ἀγόμενοι σιδηροδέσμοις ἀνάγκαις· οἱ μὲν τοῖς ζυγοῖς
    τῶν πλοίων προσηλωμένοι τοὺς τραχήλους, οἱ δὲ τοὺς πόδας ἀρρήκτοις κατησφαλισμένοι
    πέδαις,
  language: Greek
