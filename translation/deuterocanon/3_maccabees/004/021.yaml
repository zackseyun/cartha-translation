theological_decisions:
- issue: Referent of 'the one helping the Jews from heaven'
  chosen_reading: An implicit reference to God, rendered without making the subject
    more explicit than the Greek does.
  alternative_readings:
  - a descriptive circumlocution for God
  - a more explicit rendering such as 'God, who helps the Jews from heaven'
  rationale: The Greek uses an articular participle rather than naming God directly.
    The translation preserves that indirect style while allowing the divine referent
    to remain clear from context.
  doctrine_reference: Preserve theological tension rather than resolve it.
