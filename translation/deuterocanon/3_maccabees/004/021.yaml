id: 3MA.4.21
reference: 3 Maccabees 4:21
source:
  edition: lxx-swete-1909
  text: τοῦτο δὲ ἦν ἐνέργεια τῆς τοῦ βοηθοῦντος τοῖς Ἰουδαίοις ἐξ οὐρανοῦ προνοίας
    ἀνίκητον.
  language: Greek
  pages:
  - 734
  - 738
  - 739
  - 740
  - 741
  - 742
  - 743
  - 744
