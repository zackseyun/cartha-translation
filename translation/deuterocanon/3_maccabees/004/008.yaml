theological_decisions:
- issue: Rendering of ἅδην
  chosen_reading: Hades
  alternative_readings:
  - death
  - the grave
  rationale: This is not a doctrinally loaded NT usage but a Greek deuterocanonical
    text using the conventional term Ἅιδης. Preserving 'Hades' respects the source
    wording and avoids importing a more specific theology of hell. Alternatives are
    possible as interpretive glosses but are not adopted in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
