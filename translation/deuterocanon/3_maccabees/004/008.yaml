translation:
  text: And their relatives, with nooses wrapped around their necks as though instead
    of garlands, though in the full bloom of youth, spent the remaining days of their
    weddings in mourning instead of feasting and youthful ease, already seeing Hades
    lying at their feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'death' or 'the grave' for 'Hades'; the Greek uses Ἅιδης, retaining the
      imagery of the underworld or realm of the dead rather than specifying final
      punishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: συγγενεῖς
  chosen: relatives
  alternatives:
  - kinsmen
  - family members
  lexicon: LSJ
  rationale: The term denotes those related by kinship. 'Relatives' is natural modern
    English and broad enough to include the family circle without implying only male
    kin, unlike 'kinsmen'.
- source_word: βρόχους
  chosen: nooses
  alternatives:
  - ropes
  - cords
  lexicon: LSJ
  rationale: The image is not merely of cords but of loops associated with binding
    or strangling. 'Nooses' preserves the grim contrast with wedding garlands.
- source_word: ὡς ἀντὶ στεφέων
  chosen: as though instead of garlands
  alternatives:
  - as if in place of wreaths
  - as though for crowns
  lexicon: LSJ
  rationale: The phrase sets up an ironic reversal of festive wedding adornment. 'Garlands'
    best fits wedding/festal context in idiomatic English.
- source_word: τοὺς αὐχένας περιπεπλεγμένοι
  chosen: wrapped around their necks
  alternatives:
  - twined about their necks
  - entwined around their necks
  lexicon: LSJ
  rationale: This participial phrase describes the nooses encircling the necks. 'Wrapped
    around' is clear modern English while retaining the physical image.
- source_word: μετὰ ἀκμαίας νεανικῆς ἡλικίας
  chosen: though in the full bloom of youth
  alternatives:
  - being in vigorous young age
  - at the peak of youthful age
  lexicon: LSJ
  rationale: The phrase emphasizes youthful prime. 'In the full bloom of youth' communicates
    both age and vitality in readable English.
- source_word: εὐωχίας
  chosen: feasting
  alternatives:
  - banqueting
  - celebration
  lexicon: LSJ
  rationale: In a wedding setting the word points to festive eating and celebration.
    'Feasting' is vivid and natural.
- source_word: νεωτερικῆς ῥᾳθυμίας
  chosen: youthful ease
  alternatives:
  - youthful carefree pleasure
  - young merriment
  - youthful relaxation
  lexicon: LSJ
  rationale: ῥᾳθυμία can suggest ease, idleness, or carefree leisure. Here it contrasts
    with mourning during wedding days. 'Youthful ease' preserves the contrast without
    overstating moral laxity.
- source_word: τὰς ἐπιλοίπους τῶν γάμων ἡμέρας
  chosen: the remaining days of their weddings
  alternatives:
  - the rest of the wedding days
  - the remaining days of the marriage festivities
  lexicon: LSJ
  rationale: The plural γάμων likely refers to wedding festivities rather than marriage
    in the abstract. 'The remaining days of their weddings' keeps close to the Greek
    while remaining intelligible.
- source_word: ἐν θρήνοις διῆγον
  chosen: spent ... in mourning
  alternatives:
  - passed ... in lamentation
  - continued ... in grief
  lexicon: LSJ
  rationale: The idiom means to pass or spend time, and θρῆνοι are laments. 'Spent
    ... in mourning' is concise and idiomatic.
- source_word: παρὰ πόδας ἤδη τὸν ἅδην ὁρῶντες κείμενον
  chosen: already seeing Hades lying at their feet
  alternatives:
  - already seeing death lying at their feet
  - already seeing the grave before their feet
  lexicon: LSJ
  rationale: Ἅιδης here is personified or used as the realm/power of death. Because
    the Greek explicitly says Hades, the translation preserves it rather than flattening
    to 'death,' while the image 'lying at their feet' conveys imminent doom.
