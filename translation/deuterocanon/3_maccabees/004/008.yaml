id: 3MA.4.8
reference: 3 Maccabees 4:8
source:
  edition: lxx-swete-1909
  text: οἱ δὲ τούτων συγγενεῖς βρόχους ὡς ἀντὶ στεφέων τοὺς αὐχένας περιπεπλεγμένοι
    μετὰ ἀκμαίας νεανικῆς ἡλικίας, ἀντὶ εὐωχίας καὶ νεωτερικῆς ῥᾳθυμίας τὰς ἐπιλοίπους
    τῶν γάμων ἡμέρας ἐν θρήνοις διῆγον, παρὰ πόδας ἤδη τὸν ἅδην ὁρῶντες κείμενον.
  language: Greek
