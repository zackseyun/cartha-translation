translation:
  text: For with the bitter cruelty of a merciless spirit they were being sent out
    together by the generals in each city, so that, beyond the outrageous punishments,
    even some of their enemies, seeing the common pity before their eyes and considering
    the uncertain ruin of their life, were weeping over their wretched deportation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were being driven out' / 'were being deported' for 'were being sent
      out'; the Greek verb itself is literally 'sent out,' but the context is clearly
      forced removal.
    reason: lexical_alternative
  - marker: b
    text: '''The common pity'' means the ordinary compassion shared by human beings
      generally; even some enemies were moved by it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ πικρίας ἀνοίκτου ψυχῆς
  chosen: with the bitter cruelty of a merciless spirit
  alternatives:
  - with bitter mercilessness of soul
  - with the bitterness of an unpitying heart
  lexicon: LSJ
  rationale: The phrase is idiomatic and intensifies the inhuman disposition behind
    the action. 'Spirit' renders ψυχῆς in a natural English way for inner disposition;
    'merciless' captures ἀνοίκτου; 'bitter cruelty' conveys πικρίας with the harsh
    affect implied by the whole phrase.
- source_word: στρατηγῶν
  chosen: generals
  alternatives:
  - commanders
  - governors
  lexicon: LSJ
  rationale: στρατηγός can denote military or civic officials. In this context of
    coordinated state action 'generals' is the most direct gloss from the Greek source,
    while 'in each city' signals their local jurisdiction.
- source_word: ὁμοθυμαδόν
  chosen: together
  alternatives:
  - with one accord
  - collectively
  lexicon: BDAG
  rationale: The adverb emphasizes unified action. 'Together' is concise and natural
    English; the sense of coordinated unanimity is preserved by the surrounding syntax.
- source_word: ἐξαπεστέλλοντο
  chosen: were being sent out
  alternatives:
  - were being driven out
  - were being deported
  lexicon: LSJ
  rationale: The verb literally means 'were being sent away/out.' Because the context
    is forced removal, the main text keeps the more transparent verbal image while
    the foot of the sentence clarifies the coercive nature with 'deportation.'
- source_word: ἐπὶ ταῖς ἐξάλλοις τιμωρίαις
  chosen: beyond the outrageous punishments
  alternatives:
  - in addition to the excessive punishments
  - because of the extraordinary punishments
  lexicon: LSJ
  rationale: 'ἐπί here is best taken in an additive/resultative sense in context:
    besides the punishments already described. ἐξάλλοις carries the sense of extreme,
    strange, or outrageous; ''outrageous'' fits readable modern English.'
- source_word: τὸν κοινὸν ἔλεον
  chosen: the common pity
  alternatives:
  - common compassion
  - shared pity
  lexicon: LSJ
  rationale: The phrase points to pity that is universally felt or ordinarily shared
    by humans. 'Common pity' preserves the compactness of the Greek and the appeal
    to basic human compassion.
- source_word: τὴν ἄδηλον τοῦ βίου καταστροφήν
  chosen: the uncertain ruin of their life
  alternatives:
  - the unclear end of their life
  - the uncertain destruction awaiting their lives
  lexicon: LSJ
  rationale: ἄδηλον means unseen, uncertain, or unclear; καταστροφή can mean overturning,
    ruin, or end. The phrase refers to the unknown but ominous outcome facing the
    deportees. 'Their life' is used idiomatically in English for the collective object
    implied by αὐτῶν in context.
- source_word: δακρύειν
  chosen: were weeping over
  alternatives:
  - were shedding tears for
  - were lamenting
  lexicon: BDAG
  rationale: The infinitive expresses the result that even enemies came to tears.
    'Were weeping over' is vivid and natural.
- source_word: τὴν δυσάθλιον ἐξαποστολήν
  chosen: their wretched deportation
  alternatives:
  - their miserable sending away
  - their pitiable expulsion
  lexicon: LSJ
  rationale: ἐξαποστολή is cognate with the earlier verb and denotes the act of being
    sent away. Given the coercive civic context, 'deportation' best communicates the
    forced removal. δυσάθλιον intensifies misery, hence 'wretched'.
