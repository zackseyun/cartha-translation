reference: 3 Maccabees 4:4
source:
  edition: lxx-swete-1909
  text: οὕτως γὰρ μετὰ πικρίας ἀνοίκτου ψυχῆς ὑπὸ τῶν κατὰ πόλιν στρατηγῶν ὁμοθυμαδὸν
    ἐξαπεστέλλοντο, ὥστε ἐπὶ ταῖς ἐξάλλοις τιμωρίαις καί τινας τῶν ἐχθρῶν λαμβάντας
    πρὸ τῶν ὀφθαλμῶν τὸν κοινὸν ἔλεον, καὶ λογιζομένους τὴν ἄδηλον τοῦ βίου καταστροφήν,
    δακρύειν αὐτῶν τὴν δυσάθλιον ἐξαποστολήν.
  language: Greek
