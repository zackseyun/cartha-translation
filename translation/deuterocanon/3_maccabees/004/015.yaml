id: 3MA.4.15
reference: 3 Maccabees 4:15
source:
  edition: lxx-swete-1909
  text: ἐγίνετο μὲν οὖν ἡ τούτων ἀπογραφὴ μετὰ πικρᾶς σπουδῆς καὶ φιλοτίμου προσθεσίας
    ἀπὸ ἀνατολῶν ἡλίου μέχρι δυσμῶν, ἀνήνυτον λαμβάνουσα τὸ τέλος ἐπὶ ἡμέρας τεσσεράκοντα.
