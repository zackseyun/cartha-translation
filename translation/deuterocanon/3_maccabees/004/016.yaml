translation:
  text: And the king, greatly and continually filled with joy, was arranging banquets
    before all the idols, with a mind far removed from the truth and with a profane
    mouth, praising deaf things that were unable to speak or help them, but speaking
    improper things against God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has a bracketed reading, '[the God],' in the source edition; the sense
      is that the king was speaking improperly against God.
    reason: textual_variant
  - marker: b
    text: Or 'in honor of all the idols' for 'before all the idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μεγάλως
  chosen: greatly
  alternatives:
  - exceedingly
  - very much
  lexicon: LSJ
  rationale: Adverb intensifying the king's state; 'greatly' preserves the elevated
    tone without sounding archaic.
- source_word: διηνεκῶς
  chosen: continually
  alternatives:
  - constantly
  - unceasingly
  lexicon: LSJ
  rationale: Conveys ongoing duration; 'continually' fits natural English and pairs
    well with 'greatly.'
- source_word: συμπόσια
  chosen: banquets
  alternatives:
  - feasts
  - drinking parties
  lexicon: LSJ
  rationale: The term denotes festive meals/drinking gatherings. 'Banquets' captures
    the royal and cultic setting better than the more colloquial 'drinking parties.'
- source_word: ἐπὶ πάντων τῶν εἰδώλων
  chosen: before all the idols
  alternatives:
  - for all the idols
  - in honor of all the idols
  lexicon: LSJ
  rationale: ἐπί with the genitive here is contextually tied to the cultic setting.
    'Before all the idols' stays close to the Greek while still implying the setting
    of idol-veneration. The more interpretive 'in honor of' is possible but goes beyond
    the preposition's basic force.
- source_word: πεπληρωμένῃ πόρρω τῆς ἀληθείας φρενί
  chosen: with a mind far removed from the truth
  alternatives:
  - with a mind filled far away from the truth
  - with understanding far from the truth
  lexicon: LSJ
  rationale: The dative phrase describes the king's inner disposition. 'Mind' is a
    natural rendering of φρήν here, and 'far removed from the truth' captures πόρρω
    τῆς ἀληθείας idiomatically.
- source_word: βεβήλῳ στόματι
  chosen: with a profane mouth
  alternatives:
  - with an impious mouth
  - with a godless mouth
  lexicon: LSJ
  rationale: βεβήλος denotes what is profane or irreverent. 'Profane' preserves the
    religious offense without overinterpreting.
- source_word: κωφὰ
  chosen: deaf things
  alternatives:
  - deaf idols
  - mute things
  lexicon: LSJ
  rationale: The adjective literally means 'deaf'; although idols are in view, the
    Greek leaves the noun implicit. 'Deaf things' preserves the rhetorical contempt
    and the neuter expression.
- source_word: μὴ δυνάμενα αὐτοῖς λαλεῖν ἢ ἀρήγειν
  chosen: unable to speak or help them
  alternatives:
  - not able to speak to them or aid them
  - powerless to talk or assist them
  lexicon: LSJ
  rationale: This clause explains the impotence of the idols. 'Help' is a clear modern
    equivalent of ἀρήγειν, and 'them' naturally refers to the worshipers.
- source_word: ἐπαινῶν
  chosen: praising
  alternatives:
  - commending
  - extolling
  lexicon: LSJ
  rationale: A straightforward participial rendering that matches the king's idolatrous
    speech.
- source_word: εἰς δὲ [τὸν θεὸν]
  chosen: against God
  alternatives:
  - toward God
  - concerning God
  lexicon: LSJ
  rationale: In this hostile context, εἰς with verbs of speaking carries an adversative
    sense. The bracketed article+noun in Swete indicates textual uncertainty in the
    printed witness, but the sense is clearly directed at God; 'against God' best
    reflects the polemical force.
- source_word: τὶ μὴ καθήκοντα
  chosen: improper things
  alternatives:
  - things not fitting
  - unseemly things
  lexicon: LSJ
  rationale: The phrase denotes speech that is unfitting or inappropriate. 'Improper
    things' is idiomatic and preserves the moral-religious impropriety.
