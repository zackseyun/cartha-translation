id: 3MA.4.16
reference: 3 Maccabees 4:16
source:
  edition: lxx-swete-1909
  text: Μεγάλως δὲ καὶ διηνεκῶς ὁ βασιλεὺς χαρᾷ πεπληρωμένος, συμπόσια ἐπὶ πάντων
    τῶν εἰδώλων συνιστάμενος, πεπληρωμένῃ πόρρω τῆς ἀληθείας φρενὶ καὶ βεβήλῳ στόματι,
    κωφὰ καὶ μὴ δυνάμενα αὐτοῖς λαλεῖν ἢ ἀρήγειν ἐπαινῶν, εἰς δὲ [τὸν θεὸν] τὶ μὴ
    καθήκοντα λαλῶν.
  language: Greek
  pages:
