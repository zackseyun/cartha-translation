theological_decisions:
- issue: Rendering the king's speech toward God in contrast to his praise of idols
  chosen_reading: but speaking improper things against God
  alternative_readings:
  - but saying unfitting things to God
  - but speaking what is not fitting concerning God
  rationale: The verse contrasts idolatrous praise with irreverent speech directed
    toward the true God. Given the hostile context and the use of εἰς with λαλῶν,
    an adversative sense ('against God') best preserves the theological contrast without
    adding content beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
