translation:
  text: And as prisoners they were dragged by force publicly until they were put on
    the ship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until they were put onto the ship.' The Greek phrase literally refers
      to their being brought or thrust into the vessel.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέσμιοι
  chosen: as prisoners
  alternatives:
  - bound
  - in bonds
  - prisoners
  lexicon: LSJ
  rationale: δέσμιος denotes one who is bound or imprisoned. 'Prisoners' gives the
    social/legal sense clearly in modern English; 'as prisoners' reflects its predicate/adverbial
    force at the head of the clause.
- source_word: δημοσίᾳ
  chosen: in public
  alternatives:
  - publicly
  - at public expense
  lexicon: LSJ
  rationale: In this context with εἵλκοντο and μετὰ βίας, the adverb most naturally
    means 'publicly/in public,' describing the open, public nature of the abuse. The
    sense 'at public expense' does not fit the immediate context.
- source_word: μέχρι τῆς εἰς τὸ πλοῖον ἐμβολῆς
  chosen: until their embarkation onto the ship
  alternatives:
  - until they were put onto the ship
  - up to the loading into the ship
  - until the boarding of the ship
  lexicon: LSJ
  rationale: ἐμβολή literally suggests a putting/throwing in, here idiomatically the
    act of getting them onto the vessel. 'Embarkation onto the ship' preserves the
    movement into the vessel without over-paraphrasing; the possessive 'their' is
    supplied naturally from context.
- source_word: εἵλκοντο
  chosen: they were dragged
  alternatives:
  - they were hauled
  - they were pulled
  lexicon: LSJ
  rationale: The imperfect/passive form conveys ongoing forcible movement. 'Dragged'
    best matches the violence implied by the verb and the accompanying phrase μετὰ
    βίας.
- source_word: μετὰ βίας
  chosen: by force
  alternatives:
  - violently
  - with violence
  - forcibly
  lexicon: LSJ
  rationale: This phrase marks coercive violence. 'By force' is concise, idiomatic,
    and preserves the brutality without exaggeration.
