id: 3MA.4.7
reference: 3 Maccabees 4:7
source:
  edition: lxx-swete-1909
  text: δέσμιοι δὲ δημοσίᾳ μέχρι τῆς εἰς τὸ πλοῖον ἐμβολῆς εἵλκοντο μετὰ βίας.
  language: Greek
