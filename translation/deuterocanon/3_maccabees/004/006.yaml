translation:
  text: And the young women who had just entered the bridal chamber for the sharing
    of life in marriage, taking up lamentation instead of joy, and with their perfume-drenched
    hair smeared with dust, were being led away unveiled, and with one accord raised
    a dirge instead of wedding songs, as though torn apart by abuse from foreigners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the marriage-bed' for 'the bridal chamber' (γαμικὸν ... παστόν).
    reason: lexical_alternative
  - marker: b
    text: Literally 'unveiled' or 'with heads uncovered,' a sign of public humiliation
      in this context.
    reason: cultural_note
  - marker: c
    text: Or 'by foreigners' instead of 'from foreigners'; the Greek highlights abuse
      associated with people of another nation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρτι
  chosen: had just
  alternatives:
  - now
  - recently
  lexicon: LSJ
  rationale: Conveys immediate recentness in relation to entering marriage; 'had just'
    fits the participial construction naturally in English.
- source_word: πρὸς βίου κοινωνίαν
  chosen: for the sharing of life
  alternatives:
  - for partnership in life
  - for communion of life
  lexicon: LSJ
  rationale: Keeps the concrete sense of κοινωνία as shared participation while sounding
    natural in English; paired with 'in marriage' to clarify the marital context without
    overparaphrase.
- source_word: γαμικὸν ... παστὸν
  chosen: the bridal chamber
  alternatives:
  - the marriage-bed
  - the wedding chamber
  lexicon: LSJ
  rationale: παστός commonly denotes the bridal chamber or marriage-bed; 'bridal chamber'
    best fits the scene of newly married women and avoids overly sexual narrowing.
- source_word: νεάνιδες
  chosen: the young women
  alternatives:
  - maidens
  - young brides
  lexicon: LSJ
  rationale: A straightforward age-and-gender rendering. 'Young brides' is contextually
    tempting but slightly interpretive; the bridal context is already supplied by
    the surrounding phrase.
- source_word: ἀντὶ τέρψεως μεταλαβοῦσαι γόους
  chosen: taking up lamentation instead of joy
  alternatives:
  - having received mourning instead of delight
  - taking on cries of grief instead of pleasure
  lexicon: LSJ
  rationale: Captures the exchange implied by ἀντί and the aorist participle naturally.
    'Lamentation' suits γόοι in a solemn register.
- source_word: μυροβρεχῆ ... κόμην
  chosen: their perfume-drenched hair
  alternatives:
  - their hair wet with ointment
  - their myrrh-soaked hair
  lexicon: LSJ
  rationale: The compound indicates hair moistened with perfumed oil. 'Perfume-drenched'
    is vivid and accessible without forcing a specific substance such as myrrh.
- source_word: πεφυρμέναι
  chosen: smeared
  alternatives:
  - befouled
  - mixed over
  - daubed
  lexicon: LSJ
  rationale: Expresses the defiling action of dust on carefully prepared hair in idiomatic
    English.
- source_word: ἀκαλύπτως
  chosen: unveiled
  alternatives:
  - with heads uncovered
  - bareheaded
  lexicon: LSJ
  rationale: Preserves the cultural marker succinctly. The adverb modifies the manner
    in which they were led away.
- source_word: ἀγόμεναι
  chosen: were being led away
  alternatives:
  - were being driven
  - were being taken
  lexicon: LSJ
  rationale: The passive sense indicates coercive movement. 'Led away' is faithful
    without overstating physical violence at this point.
- source_word: θρῆνον
  chosen: a dirge
  alternatives:
  - lament
  - mourning song
  lexicon: LSJ
  rationale: A formal mourning-song contrasts sharply with wedding celebration and
    fits the literary tone.
- source_word: ὑμεναίων
  chosen: wedding songs
  alternatives:
  - marriage hymns
  - bridal songs
  lexicon: LSJ
  rationale: Refers to nuptial songs/hymns; 'wedding songs' is clear modern English.
- source_word: ὁμοθυμαδόν
  chosen: with one accord
  alternatives:
  - together
  - unanimously
  lexicon: LSJ
  rationale: Retains the collective emotional unity of the women in a familiar biblical-English
    phrase that remains understandable.
- source_word: ὡς ἐσπαραγμέναι
  chosen: as though torn apart
  alternatives:
  - as if mangled
  - as though rent
  lexicon: LSJ
  rationale: σπαράσσω is strong, evoking violent tearing. The comparative particle
    ὡς calls for 'as though' rather than a literal statement that this had physically
    occurred.
- source_word: αἰκίαις
  chosen: by abuse
  alternatives:
  - by outrages
  - by mistreatment
  - by violence
  lexicon: LSJ
  rationale: Denotes maltreatment or outrage. 'Abuse' is broad enough to preserve
    the horror without specifying a form not explicit in the word itself.
- source_word: ἀλλοεθνεῖσιν
  chosen: from foreigners
  alternatives:
  - by foreigners
  - from alien peoples
  - by those of another nation
  lexicon: LSJ
  rationale: The dative is instrumental/associative in sense; 'from foreigners' works
    idiomatically with 'abuse' in English while preserving the ethnic-othering force
    of the Greek.
