id: 3MA.4.6
reference: 3 Maccabees 4:6
source:
  edition: lxx-swete-1909
  text: αἱ δὲ ἄρτι πρὸς βίου κοινωνίαν γαμικὸν ὑπεληλυθυῖαι παστὸν νεάνιδες ἀντὶ τέρψεως
    μεταλαβοῦσαι γόους, καὶ κόνει τὴν μυροβρεχῆ πεφυρμέναι κόμην, ἀκαλύπτως δὲ ἀγόμεναι,
    θρῆνον ἀνθ᾽ ὑμεναίων ὁμοθυμαδὸν ἐξῆρχον, ὡς ἐσπαραγμέναι αἰκίαις ἀλλοεθνεῖσιν.
  language: Greek
  pages:
