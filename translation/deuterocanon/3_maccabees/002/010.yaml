translation:
  text: and indeed faithful and true.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek witness here is a very short clause rather than a full sentence.
      The English preserves that brevity: literally, ''and indeed faithful and true.'''
    reason: textual_variant
lexical_decisions:
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - even
  lexicon: LSJ
  rationale: Standard connective; retained to reflect the Greek coordination and the
    fragmentary clause structure.
- source_word: δὴ
  chosen: indeed
  alternatives:
  - surely
  - certainly
  - now
  lexicon: LSJ
  rationale: Particle adding emphasis. 'Indeed' preserves the affirming force without
    overtranslating.
- source_word: πιστός
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: LSJ
  rationale: In predicative use with ἀληθινός, 'faithful' best preserves the moral
    and relational sense of dependability. 'Trustworthy' is possible but slightly
    more interpretive.
- source_word: ἀληθινός
  chosen: 'true'
  alternatives:
  - genuine
  - real
  lexicon: LSJ
  rationale: '''True'' is the most direct rendering in this paired predicate. ''Genuine''
    or ''real'' are possible in some contexts, but here the traditional semantic contrast
    of truthfulness/authenticity is best kept.'
