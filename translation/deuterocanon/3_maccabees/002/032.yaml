id: 3MA.2.32
reference: 3 Maccabees 2:32
source:
  edition: lxx-swete-1909
  text: οἱ δὲ πλεῖστοι γενναίᾳ ψυχῇ ἐνίσχυσαν, καὶ οὐ διέστησαν τῆς εὐσεβείας τὰ τε
    χρήματα περὶ τοῦ ζῇν ἀντικαταλλασσόμενοι ἀδέως ἐτιμῶντο ἑαυτοὺς ῥύσασθαι ἐκ τῶν
    ἀπογραφῶν.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 752
  confidence: high
  validation: agree
translation:
  text: But most of them, strengthening themselves with noble courage, did not depart
    from piety by exchanging their possessions for life, but boldly considered themselves
    able to save themselves from the registration lists.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not depart from their godliness by trading their property to preserve
      their lives.'
    reason: lexical_alternative
  - marker: b
    text: The 'registration lists' are the official enrollment records mentioned in
      the surrounding context, apparently used to identify Jews for the king's oppressive
      measures.
    reason: cultural_note
lexical_decisions:
- source_word: πλεῖστοι
  chosen: most of them
  alternatives:
  - the majority
  - very many
  lexicon: LSJ
  rationale: The comparative/superlative form here functions idiomatically for the
    larger part of the group. 'Most of them' is natural English and preserves the
    contrast with any minority who may have acted otherwise.
- source_word: γενναίᾳ ψυχῇ
  chosen: with a noble spirit
  alternatives:
  - with noble courage
  - with a brave soul
  lexicon: LSJ
  rationale: The dative expresses manner. ψυχή here refers to inner disposition/courage
    rather than the metaphysical 'soul' as such. 'With a noble spirit' keeps the moral
    quality of γενναίᾳ while remaining readable.
- source_word: ἐνίσχυσαν
  chosen: took courage
  alternatives:
  - were strengthened
  - grew strong
  lexicon: LSJ
  rationale: In context the verb describes moral strengthening in the face of pressure.
    'Took courage' communicates the idiomatic force better than the more wooden 'were
    strengthened.'
- source_word: οὐ διέστησαν τῆς εὐσεβείας
  chosen: did not abandon their piety
  alternatives:
  - did not depart from piety
  - did not separate themselves from godliness
  lexicon: LSJ
  rationale: The construction means to stand apart from or withdraw from. 'Did not
    abandon their piety' gives the sense clearly in English. εὐσέβεια in this Jewish-Greek
    context denotes reverent devotion to God; 'piety' is concise and fitting.
- source_word: τὰ τε χρήματα περὶ τοῦ ζῇν ἀντικαταλλασσόμενοι
  chosen: by exchanging their possessions for life
  alternatives:
  - trading their property for survival
  - bartering their wealth to stay alive
  lexicon: LSJ
  rationale: 'The participle explains the means by which they would have abandoned
    piety: by giving up money/property in order to preserve life. χρήματα is best
    rendered ''possessions'' here, broader than cash alone. περὶ τοῦ ζῇν is purposive,
    ''for life''/''to stay alive.'''
- source_word: ἀδέως
  chosen: boldly
  alternatives:
  - fearlessly
  - without hesitation
  lexicon: LSJ
  rationale: The adverb conveys fearless confidence. 'Boldly' is compact and suits
    the tone.
- source_word: ἐτιμῶντο
  chosen: counted themselves worthy
  alternatives:
  - considered themselves
  - deemed themselves
  lexicon: LSJ
  rationale: The middle voice here indicates their own estimation of themselves. 'Counted
    themselves worthy' preserves the evaluative nuance and fits the infinitive that
    follows.
- source_word: ἑαυτοὺς ῥύσασθαι ἐκ τῶν ἀπογραφῶν
  chosen: to escape the registration lists
  alternatives:
  - to be delivered from the registrations
  - to save themselves from the census records
  lexicon: LSJ
  rationale: ῥύσασθαι means rescue/deliver/escape. ἀπογραφαί are official registrations/enrollments;
    in this context they are the lists compiled for persecution. 'Escape the registration
    lists' is idiomatic and contextually precise.
