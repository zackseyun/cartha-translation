id: 3MA.2.14
reference: 3 Maccabees 2:14
source:
  edition: lxx-swete-1909
  text: τὸ μὲν γὰρ κατοικητήριόν σου οὐρανὸς τοῦ οὐρανοῦ ἀνέφικτος ἀνθρώποις ἐστίν.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: For your dwelling place is the heaven of heaven, unreachable by men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “heaven of heavens” or “highest heaven.” The Greek preserves a Semitic
      expression for the loftiest heaven, God's transcendent dwelling.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατοικητήριόν
  chosen: dwelling place
  alternatives:
  - habitation
  - dwelling
  lexicon: LSJ
  rationale: The noun denotes a place of dwelling or habitation. 'Dwelling place'
    is natural modern English while preserving the concrete locative sense better
    than a more abstract paraphrase.
- source_word: οὐρανὸς τοῦ οὐρανοῦ
  chosen: the heaven of heaven
  alternatives:
  - heaven of heavens
  - highest heaven
  lexicon: LSJ
  rationale: The Greek reproduces a Semitic superlative expression. 'The heaven of
    heaven' stays close to the source wording; 'highest heaven' captures the sense
    but smooths away the idiom. Because the phrase is theologically resonant, the
    more literal rendering is preferred, with an alternative noted in a footnote.
- source_word: ἀνέφικτος
  chosen: unreachable
  alternatives:
  - inaccessible
  - beyond reach
  lexicon: LSJ
  rationale: The adjective means not attainable or inaccessible. 'Unreachable' is
    clear, direct, and idiomatic in modern English while preserving the sense that
    humans cannot attain or access God's dwelling.
- source_word: ἀνθρώποις
  chosen: men
  alternatives:
  - human beings
  - people
  lexicon: LSJ
  rationale: The dative plural refers to human beings generally. Per the project's
    gender-accurate policy, 'men' is acceptable where the source uses the masculine
    form with representative force. A more inclusive alternative could be used in
    other contexts, but here 'men' preserves the elevated register and generic sense.
