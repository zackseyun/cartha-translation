theological_decisions:
- issue: Rendering the Semitic superlative οὐρανὸς τοῦ οὐρανοῦ
  chosen_reading: the heaven of heaven
  alternative_readings:
  - heaven of heavens
  - highest heaven
  rationale: The phrase evokes biblical language about God's transcendent dwelling.
    Preserving the idiom maintains intertextual and theological resonance without
    over-interpreting it into a purely explanatory gloss.
  doctrine_reference: DOCTRINE.md §§1, 3, 6
- issue: Generic force of ἀνθρώποις
  chosen_reading: men
  alternative_readings:
  - human beings
  - people
  rationale: The Greek masculine plural is generic rather than male-exclusive. Following
    the project's gender-accurate policy, the translation keeps the source-shaped
    form rather than neutralizing it, while recognizing the representative sense.
  doctrine_reference: DOCTRINE.md §4
