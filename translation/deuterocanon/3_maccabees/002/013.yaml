theological_decisions:
- issue: Reference of the sacred site
  chosen_reading: the phrase refers to the Jerusalem temple as the holy place on earth
    associated with God's glorious name
  alternative_readings:
  - a more specific inner sanctuary reference
  rationale: The Greek says 'the holy place on earth' rather than using a more technical
    temple term. The translation keeps the broader phrase 'holy place' and does not
    narrow it to a specific temple chamber, while the context still clearly points
    to the temple.
