id: 3MA.2.13
reference: 3 Maccabees 2:13
source:
  edition: lxx-swete-1909
  text: ἐν δὲ τῇ ἡμετέρᾳ καταπτώσει ὁ θρασὺς καὶ βέβηλος οὗτος ἐπιτηδεύει καθυβρίσαι
    τὸν ἐπὶ τῆς γῆς ἀναδεδειγμένον τῷ ὀνόματι τῆς δόξης σου ἅγιον τόπον.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: But in our downfall this bold and profane man is attempting to insult the
    holy place on earth appointed by the name of your glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy sanctuary on earth that has been designated by the name of
      your glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταπτώσει
  chosen: downfall
  alternatives:
  - collapse
  - ruin
  - humiliation
  lexicon: LSJ
  rationale: The noun denotes a falling down or collapse. In context it refers to
    the people's distressed condition, not merely a physical fall. 'Downfall' preserves
    the gravity without overinterpreting it as total destruction.
- source_word: θρασὺς
  chosen: bold
  alternatives:
  - insolent
  - audacious
  - reckless
  lexicon: LSJ
  rationale: The adjective carries the sense of shameless daring. 'Bold' is concise
    and natural in English, while the pairing with 'profane' and the verb 'insult'
    conveys the negative force. 'Insolent' was possible but slightly duplicates the
    sense already carried by the verb.
- source_word: βέβηλος
  chosen: profane
  alternatives:
  - godless
  - impious
  - unholy
  lexicon: LSJ
  rationale: The term marks someone as irreverent toward what is sacred. 'Profane'
    best matches the contrast with the 'holy place' later in the sentence.
- source_word: ἐπιτηδεύει
  chosen: is attempting
  alternatives:
  - is bent on
  - is making it his practice to
  - is contriving to
  lexicon: LSJ
  rationale: The verb can mean to pursue, practice, or set oneself to something. Here
    with the infinitive it indicates active intent. 'Is attempting' communicates present
    purposeful action without sounding overly idiomatic.
- source_word: καθυβρίσαι
  chosen: to insult
  alternatives:
  - to outrage
  - to treat with contempt
  - to abuse
  lexicon: LSJ
  rationale: The verb intensifies the idea of hubristic mistreatment. 'To insult'
    is readable modern English and fits the object, the holy place. 'Outrage' was
    possible, but 'insult' better preserves the verbal sense of contemptuous affront.
- source_word: ἀναδεδειγμένον
  chosen: has been made manifest
  alternatives:
  - has been appointed
  - has been designated
  - has been shown forth
  lexicon: LSJ
  rationale: The perfect participle of ἀναδείκνυμι can denote being appointed or publicly
    shown. In this cultic context with 'by the name of your glory,' the sense is that
    the place has been openly marked out or manifested as holy. 'Made manifest' preserves
    that public-revelatory nuance better than the more administrative 'appointed'.
- source_word: τῷ ὀνόματι τῆς δόξης σου
  chosen: by the name of your glory
  alternatives:
  - with the name of your glory
  - for the name of your glory
  - by your glorious name
  lexicon: LSJ
  rationale: The dative phrase is somewhat compressed. A fairly literal rendering
    preserves the solemnity and avoids collapsing 'name' and 'glory' into a single
    adjective. 'By your glorious name' is smoother but less transparent to the Greek
    structure.
- source_word: ἅγιον τόπον
  chosen: the holy place
  alternatives:
  - the holy sanctuary
  - the sacred place
  lexicon: LSJ
  rationale: The phrase refers to the temple as sacred locale. 'Holy place' is a direct
    and recognizable rendering; 'sanctuary' is possible but slightly more interpretive.
