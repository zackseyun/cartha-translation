  text: καὶ ἀγαπῶν τὸν οἶκον τοῦ Ἰσραήλ, ἐπηγγείλω διότι ἐὰν γένηται ἡμῶν ἀποστροφή
    καὶ καταλάβῃ ἡμᾶς στενοχωρία, καὶ ἐλθόντες εἰς τὸν τόπον ἡμῶν δεηθῶμεν, εἰσακούσῃ
