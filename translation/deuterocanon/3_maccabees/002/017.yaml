theological_decisions:
- issue: Whether to render οἶκος as 'house' or interpretively as 'temple' for the
    sacred building in Jerusalem
  chosen_reading: the house of sanctification
  alternative_readings:
  - the temple of holiness
  - the sanctuary
  rationale: The Greek says 'house' with a qualifying genitive. Because the verse
    itself emphasizes desecration by trampling, preserving the concrete 'house' keeps
    the imagery and avoids over-interpreting beyond the source. The sacred referent
    remains clear from 'of sanctification.'
  doctrine_reference: Translation philosophy §1, §5
- issue: How to represent the unusual noun ἁγιασμός in a temple context
  chosen_reading: sanctification
  alternative_readings:
  - holiness
  - consecration
  rationale: The noun is not the most idiomatic English temple descriptor, but preserving
    its nominal force makes the translation more auditable and avoids silently replacing
    the source's wording with a smoother ecclesiastical term. The alternatives are
    preserved because English readers may find them more natural.
  doctrine_reference: Translation philosophy §1, §5
