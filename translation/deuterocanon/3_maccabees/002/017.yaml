translation:
  text: We trampled the house of sanctification, just as the houses of the people
    of Jerusalem are trampled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of holiness' or 'the house of consecration.' The Greek reads
      literally 'the house of sanctification.'
    reason: lexical_alternative
  - marker: b
    text: That is, the houses of the inhabitants of Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεπατήσαμεν
  chosen: we trampled
  alternatives:
  - we trod down
  - we profaned by trampling
  lexicon: LSJ
  rationale: The verb καταπατέω literally denotes trampling underfoot. 'We trampled'
    preserves the concrete force and the speaker's self-accusation better than a more
    interpretive gloss like 'profaned,' though profanation is implied by context.
- source_word: τὸν οἶκον
  chosen: the house
  alternatives:
  - the temple
  - the sanctuary
  lexicon: LSJ
  rationale: οἶκος is literally 'house.' In context it refers to the temple, but retaining
    'house' keeps the wording closer to the Greek while allowing the following genitive
    to specify its sacred character.
- source_word: τοῦ ἁγιασμοῦ
  chosen: of sanctification
  alternatives:
  - of holiness
  - of consecration
  - holy
  lexicon: LSJ
  rationale: ἁγιασμός denotes sanctification, consecration, or holiness. 'Of sanctification'
    is somewhat formal but transparently reflects the noun form in Greek and preserves
    the cultic sense. 'Holy house' would be smoother but would compress the genitive
    construction and lose the abstract noun.
- source_word: ὡς
  chosen: just as
  alternatives:
  - as
  lexicon: LSJ
  rationale: Introduces a comparison. 'Just as' makes the comparative force explicit
    in natural English.
- source_word: οἱ οἶκοι
  chosen: the houses
  alternatives:
  - the homes
  lexicon: LSJ
  rationale: Plural of οἶκος. 'Houses' is the straightforward rendering and keeps
    the lexical link with the earlier 'house.'
- source_word: τῶν προσολυμίων
  chosen: of the people of Jerusalem
  alternatives:
  - of the Jerusalemites
  - of those in Jerusalem
  lexicon: LSJ
  rationale: The ethnicon refers to inhabitants of Jerusalem. 'People of Jerusalem'
    is more readable than 'Jerusalemites' while preserving the reference to the city's
    residents rather than to Jerusalem abstractly.
- source_word: καταπατοῦνται
  chosen: are trampled
  alternatives:
  - are trodden down
  - are treated with contempt
  lexicon: LSJ
  rationale: Passive of the same verb as earlier in the verse. 'Are trampled' preserves
    the verbal repetition, which is rhetorically important.
