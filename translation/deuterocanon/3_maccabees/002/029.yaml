theological_decisions:
- issue: Cultic branding associated with Dionysus
  chosen_reading: Retain explicit reference to Dionysus and his ivy-leaf emblem without
    euphemism.
  alternative_readings:
  - Render more generically as a pagan mark or badge
  rationale: The text specifically names Dionysus and his symbol; the translation
    should preserve the historical and religious offense described rather than flatten
    it into a generic mark.
  doctrine_reference: Translation philosophy §1, §6
- issue: Ambiguous administrative phrase προσυνεσταλμένην αὐθεντίαν
  chosen_reading: Translate conservatively as 'reduced status of authority' and preserve
    a more interpretive alternative in a footnote.
  alternative_readings:
  - restricted civic status
  - curtailed legal standing
  rationale: The Greek is compressed and somewhat opaque. A conservative rendering
    in the main text preserves ambiguity, while a footnote records the likely social-legal
    sense without overstating certainty.
  doctrine_reference: Translation philosophy §3
