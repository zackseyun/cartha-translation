id: 3MA.2.29
reference: 3 Maccabees 2:29
source:
  edition: lxx-swete-1909
  text: τοὺς τε ἀπογραφομένους χαράσσεσθαι καὶ διὰ πυρὸς εἰς τὸ σῶμα παρασήμῳ Διονύσου
    κισσοφύλλῳ· οὓς καὶ προκαταχωρίσαι εἰς τὴν προσυνεσταλμένην αὐθεντίαν.
  language: Greek
  pages:
  - 734
