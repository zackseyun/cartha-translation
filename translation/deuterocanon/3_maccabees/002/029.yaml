  confidence: high
  validation: minor_mismatch
translation:
  text: and that those who registered should also be branded on their bodies, by fire,
    with the ivy-leaf emblem of Dionysus, and should also be enrolled in his reduced
    status of authority.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those being registered' or 'those enrolled.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'with the ivy-leaf emblem of Dionysus,' referring to a bodily
      brand identifying them with the cult of Dionysus.
    reason: cultural_note
  - marker: c
    text: The Greek phrase may mean 'into a restricted civic status' or 'into a curtailed
      legal standing.' The wording is compressed and somewhat uncertain.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπογραφομένους
  chosen: those who registered
  alternatives:
  - those being registered
  - those enrolled
  lexicon: LSJ
  rationale: The middle/passive participle from ἀπογράφω can mean to register oneself
    or to be registered/enrolled. In this administrative context, 'those who registered'
    is concise and natural English while preserving the census/enrollment sense.
- source_word: χαράσσεσθαι
  chosen: be branded
  alternatives:
  - be marked
  - be engraved
  lexicon: LSJ
  rationale: With διὰ πυρὸς ('by fire'), the verb clearly refers to branding rather
    than a generic marking. 'Branded' best conveys the coercive bodily marking implied
    by the decree.
- source_word: διὰ πυρός
  chosen: by fire
  alternatives:
  - with a hot iron
  - through fire
  lexicon: LSJ
  rationale: The phrase specifies the means of branding. 'By fire' is close to the
    Greek and sufficiently clear in English without over-interpreting the instrument.
- source_word: παρασήμῳ Διονύσου κισσοφύλλῳ
  chosen: with the ivy-leaf emblem of Dionysus
  alternatives:
  - with Dionysus' ivy-leaf mark
  - with the ivy leaf, the badge of Dionysus
  lexicon: LSJ
  rationale: παράσημον denotes a distinguishing mark, badge, or emblem; κισσόφυλλον
    is an ivy leaf, a known symbol associated with Dionysus. 'Emblem' communicates
    the symbolic badge-like force better than a bare 'mark' in this cultic context.
- source_word: προκαταχωρίσαι
  chosen: be enrolled
  alternatives:
  - be registered beforehand
  - be entered
  lexicon: LSJ
  rationale: The infinitive denotes official entry into a category or register. 'Be
    enrolled' fits the bureaucratic sense and reads naturally in English.
- source_word: προσυνεσταλμένην αὐθεντίαν
  chosen: his reduced status of authority
  alternatives:
  - a curtailed authority
  - a restricted civic status
  - a diminished rank
  lexicon: LSJ
  rationale: The phrase is difficult. συνεσταλμένην suggests something contracted,
    reduced, or curtailed; αὐθεντία can denote authority, standing, or status. In
    context, the decree appears to demote those marked into an inferior legal/social
    standing. 'Reduced status of authority' preserves the compression and ambiguity
    better than a more specific but less certain civic paraphrase.
