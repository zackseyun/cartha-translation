theological_decisions:
- issue: Cultic language in a Hellenistic-Jewish narrative
  chosen_reading: rites / initiated
  alternative_readings:
  - ceremonies / instructed
  - mysteries / initiated
  rationale: The Greek clearly uses initiation language tied to τελεταί and μεμυημένοι.
    'Rites' and 'initiated' preserve the cultic force without overloading the phrase
    with the more technical English 'mysteries,' which may suggest a specific later
    category not required by the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not academic jargon.'
