id: 3MA.2.30
reference: 3 Maccabees 2:30
source:
  edition: lxx-swete-1909
  text: ἵνα δὲ μὴ τοῖς πᾶσιν ἀπεχθόμενος φαίνηται, ὑπέγραψεν Ἐὰν δέ τινες ἐξ αὐτῶν
    προαιρῶνται ἐν τοῖς κατὰ τελετὰς μεμυημένοις ἀναστρέφεσθαι, τούτους ἰσοπολίτας
    Ἀλεξανδρεῦσι ποιεῖ.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 752
  confidence: high
  validation: minor_mismatch
translation:
  text: 'But so that he might not appear hateful to everyone, he added in writing:
    “But if some of them choose to live among those initiated in the rites, he makes
    these equal citizens with the Alexandrians.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “among those initiated in the mysteries.” The Greek uses cultic initiation
      language.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεχθόμενος
  chosen: hateful
  alternatives:
  - hostile
  - odious
  - detested
  lexicon: LSJ
  rationale: Middle/passive participial sense here is best represented as 'appear
    hateful' or 'appear odious,' describing how he would be perceived by others. 'Hateful'
    is concise and natural in English with φαίνηται.
- source_word: ὑπέγραψεν
  chosen: he added in writing
  alternatives:
  - he wrote underneath
  - he appended
  - he subscribed
  lexicon: LSJ
  rationale: In context of an edict or written decree, the verb indicates adding a
    written clause or proviso. 'Added in writing' captures the documentary sense without
    overcommitting to a technical bureaucratic term.
- source_word: προαιρῶνται
  chosen: choose
  alternatives:
  - prefer
  - deliberately decide
  lexicon: LSJ
  rationale: The verb denotes deliberate choice or preference. 'Choose' is the clearest
    modern English rendering and preserves volition.
- source_word: ἐν τοῖς κατὰ τελετὰς μεμυημένοις
  chosen: among those initiated in the rites
  alternatives:
  - among those initiated according to the rites
  - in the company of the initiates of the ceremonies
  - among the ritual initiates
  lexicon: LSJ
  rationale: The phrase refers to persons initiated into cultic ceremonies or mysteries.
    'Initiated in the rites' preserves the religious-cultic sense of τελεταί and μεμυημένοι
    without importing later technical jargon beyond the Greek.
- source_word: ἀναστρέφεσθαι
  chosen: to conduct themselves
  alternatives:
  - to live
  - to associate
  - to have their manner of life
  lexicon: LSJ
  rationale: The verb can mean live, conduct oneself, or associate. Here, with ἐν
    plus a group description, it likely includes social-religious association and
    manner of life. 'Conduct themselves' preserves breadth without narrowing it merely
    to social mixing.
- source_word: ἰσοπολίτας
  chosen: equal citizens
  alternatives:
  - citizens with equal rights
  - full fellow citizens
  lexicon: LSJ
  rationale: The term denotes civic equality or equal citizenship status. 'Equal citizens'
    is a close rendering and keeps the legal-political force.
- source_word: Ἀλεξανδρεῦσι
  chosen: the Alexandrians
  alternatives:
  - Alexandrian citizens
  - the people of Alexandria
  lexicon: LSJ
  rationale: 'Dative of comparison after ποιεῖ with ἰσοπολίτας: those granted status
    equal to the Alexandrians. ''The Alexandrians'' is idiomatic and sufficiently
    precise.'
- source_word: ποιεῖ
  chosen: he makes
  alternatives:
  - he appoints
  - he grants as
  - he renders
  lexicon: LSJ
  rationale: Present tense retained in the quoted decree. 'He makes' reflects the
    direct legal effect stated in the proclamation.
