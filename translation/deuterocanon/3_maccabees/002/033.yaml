id: 3MA.2.33
reference: 3 Maccabees 2:33
source:
  edition: lxx-swete-1909
  text: εὐέλπιδές τε καθιστήκεισαν ἀντιλήμψεως τεύξασθαι, καὶ τοὺς ἀποχωροῦντας ἐξ
    αὐτῶν ἐβδελύσσοντο, καὶ ὡς πολεμίους τοῦ ἔθνους ἔκρινον, καὶ τῆς κοινῆς συναναστροφῆς
    καὶ εὐχρηστίας ἐστέρουν.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 752
  confidence: high
  validation: minor_mismatch
translation:
  text: And they remained hopeful of obtaining help, and they loathed those who were
    withdrawing from among them, and judged them as enemies of the nation, and deprived
    them of common association and fellowship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common association and practical aid.' The Greek εὐχρηστία can denote
      usefulness, service, or beneficial assistance; 'support' is chosen as the clearest
      contextual sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐέλπιδές
  chosen: hopeful
  alternatives:
  - of good hope
  - confident
  lexicon: LSJ
  rationale: The adjective denotes being in good hope or optimistic. 'Hopeful' is
    natural modern English and preserves the forward-looking sense without overstating
    certainty.
- source_word: καθιστήκεισαν
  chosen: they remained
  alternatives:
  - they stood
  - they were established
  lexicon: LSJ
  rationale: The pluperfect-like form of καθίστημι here functions idiomatically for
    a settled continuing state. 'They remained' conveys durative posture in readable
    English better than a wooden 'stood established.'
- source_word: ἀντιλήμψεως
  chosen: help
  alternatives:
  - assistance
  - support
  lexicon: LSJ
  rationale: The noun refers to aid or assistance. 'Help' is concise and idiomatic;
    'support' is possible, but later εὐχρηστίας is better rendered with 'support,'
    so varying here avoids confusion while preserving sense.
- source_word: τεύξασθαι
  chosen: obtaining
  alternatives:
  - attaining
  - receiving
  lexicon: LSJ
  rationale: The middle infinitive means to obtain or attain. 'Obtaining' fits naturally
    with 'help' and keeps the sense of securing aid.
- source_word: ἀποχωροῦντας
  chosen: withdrawing
  alternatives:
  - departing
  - deserting
  - seceding
  lexicon: LSJ
  rationale: The participle denotes those pulling away from the group. 'Withdrawing'
    preserves the motion away without importing the stronger moral judgment of 'deserting,'
    which is already supplied by the surrounding clauses.
- source_word: ἐβδελύσσοντο
  chosen: loathed
  alternatives:
  - detested
  - abhorred
  lexicon: LSJ
  rationale: The verb expresses strong revulsion. 'Loathed' is forceful but still
    readable modern English.
- source_word: πολεμίους
  chosen: enemies
  alternatives:
  - hostile persons
  - foes
  lexicon: LSJ
  rationale: The straightforward sense is 'enemies.' No softer rendering is warranted
    in context.
- source_word: τοῦ ἔθνους
  chosen: of the nation
  alternatives:
  - of the people
  - of the race
  lexicon: LSJ
  rationale: In this Jewish communal context, ἔθνος refers to the people as a national/ethnic
    body. 'Nation' preserves the collective identity better than the flatter 'people.'
- source_word: τῆς κοινῆς συναναστροφῆς
  chosen: common association
  alternatives:
  - shared fellowship
  - ordinary social intercourse
  lexicon: LSJ
  rationale: The phrase refers to normal communal interaction or social relations.
    'Common association' preserves the public/shared dimension without sounding overly
    ecclesiastical.
- source_word: εὐχρηστίας
  chosen: support
  alternatives:
  - usefulness
  - service
  - practical aid
  lexicon: LSJ
  rationale: Although the noun can denote usefulness or serviceability, in this social-sanction
    context it likely refers to beneficial practical dealings or assistance within
    the community. 'Support' captures the deprivation of communal benefit in idiomatic
    English.
- source_word: ἐστέρουν
  chosen: deprived
  alternatives:
  - excluded from
  - withheld from
  lexicon: LSJ
  rationale: The verb means to deprive or rob of. 'Deprived' fits both following objects
    and preserves the punitive force.
