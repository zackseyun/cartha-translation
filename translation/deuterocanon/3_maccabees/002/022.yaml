id: 3MA.2.22
reference: 3 Maccabees 2:22
source:
  edition: lxx-swete-1909
  text: ὅθεν οἵ τε φίλοι καὶ σωματοφύλακες ὀξεῖαν ἰδόντες τὴν καταλαβοῦσαν αὐτὸν εὔθυναν,
    φοβούμενοι μὴ καὶ τὸ ζῆν ἐκλείπῃ,
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
