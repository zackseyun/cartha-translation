theological_decisions:
- issue: Identification of the judged figures as the primeval flood generation including
    'giants'
  chosen_reading: Retain the explicit term 'giants' and the flood imagery without
    harmonizing further to Genesis wording.
  alternative_readings:
  - Render γίγαντες more generally as 'mighty men' to avoid mythic overtones
  - Render ἀμέτρητον ὕδωρ as 'the flood' explicitly
  rationale: The verse clearly evokes God's judgment in the flood narrative, but the
    Greek wording itself uses γίγαντες and 'immeasurable water.' The translation preserves
    the text's own diction rather than smoothing it into a paraphrase of Genesis.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
