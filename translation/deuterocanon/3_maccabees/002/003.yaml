reference: 3 Maccabees 2:3
source:
  edition: lxx-swete-1909
  text: σὺ τοὺς ἔμπροσθεν ἀδικίαν ποιήσαντας, ἐν οἷς γίγαντες ἦσαν ῥώμῃ καὶ θράσει
    πεποιθότες, διέφθειρας, ἐπαγαγὼν αὐτοῖς ἀμέτρητον ὕδωρ.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
