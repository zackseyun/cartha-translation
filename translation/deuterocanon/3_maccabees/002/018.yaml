  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: wipe away our sins, and scatter our errors, and let your mercy shine forth
    at this hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blot out our sins.'
    reason: lexical_alternative
  - marker: b
    text: The Greek term rendered 'failings' can also mean 'errors' or 'follies.'
    reason: lexical_alternative
  - marker: c
    text: Or 'show your mercy' or 'make your mercy appear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπάλειψον
  chosen: wipe away
  alternatives:
  - blot out
  - erase
  lexicon: LSJ
  rationale: Imperative of ἀπαλείφω, commonly used for wiping off or blotting out.
    'Wipe away' is natural modern English while preserving the image of removal; 'blot
    out' is possible but more traditional/idiomatic than necessary here.
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - offenses
  lexicon: LSJ
  rationale: Standard rendering for ἁμαρτία. The prayer is confessional, and 'sins'
    best preserves the moral-religious force.
- source_word: διασκέδασον
  chosen: scatter
  alternatives:
  - disperse
  - drive away
  lexicon: LSJ
  rationale: The verb literally conveys scattering or dispersing. 'Scatter' keeps
    the metaphor vivid and pairs well with the following object.
- source_word: ἀμβλακίας
  chosen: failings
  alternatives:
  - errors
  - follies
  - stupidities
  lexicon: LSJ
  rationale: ἀμβλακία denotes folly, error, or culpable blundering. 'Failings' fits
    the penitential context without sounding flippant ('follies') or overly harsh/awkward
    ('stupidities'). 'Errors' is possible but can sound too merely intellectual.
- source_word: ἐπίφανον
  chosen: let ... shine forth
  alternatives:
  - appear
  - manifest
  lexicon: LSJ
  rationale: Imperative of ἐπιφαίνω, 'show forth' or 'shine upon/appear.' Because
    the object is mercy, 'let your mercy shine forth' preserves the epiphanic imagery
    better than the flatter 'show your mercy'.
- source_word: ἔλεός
  chosen: mercy
  alternatives:
  - compassion
  lexicon: LSJ
  rationale: ἔλεος is regularly 'mercy.' 'Compassion' is possible, but 'mercy' better
    suits a plea for divine pardon.
- source_word: κατὰ τὴν ὥραν ταύτην
  chosen: at this hour
  alternatives:
  - at this time
  - in this moment
  lexicon: LSJ
  rationale: A fairly direct temporal expression. 'At this hour' is slightly more
    formal and urgent, fitting the prayer context while remaining clear.
