theological_decisions:
- issue: Relationship between 'sins' and 'ἀμβλακίας' in the prayer
  chosen_reading: Render the second term distinctly as 'failings' rather than repeating
    'sins.'
  alternative_readings:
  - Render both broadly as 'sins'/'transgressions'
  - Render ἀμβλακίας more sharply as 'follies' or 'errors'
  rationale: The Greek uses two different terms, suggesting a rhetorical accumulation
    rather than exact synonymy. Distinguishing them in English preserves the texture
    of the confession without overstating a technical theological distinction.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
