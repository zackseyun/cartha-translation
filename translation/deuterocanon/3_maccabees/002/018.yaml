id: 3MA.2.18
reference: 3 Maccabees 2:18
source:
  edition: lxx-swete-1909
  text: ἀπάλειψον τὰς ἁμαρτίας ἡμῶν, καὶ διασκέδασον τὰς ἀμβλακίας ἡμῶν, καὶ ἐπίφανον
    τὸ ἔλεός σου κατὰ τὴν ὥραν ταύτην.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
