translation:
  text: You burned up the Sodomites, who practiced arrogance and had become notorious
    for their evils, with fire and sulfur, setting them forth as an example for those
    who would come afterward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'had become manifest/conspicuous by their evils.' The
      Greek wording here is compressed and somewhat difficult, and 'notorious for
      their evils' expresses the likely sense in natural English.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'fire and brimstone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπερηφανίαν ἐργαζομένους
  chosen: who practiced arrogance
  alternatives:
  - who worked pride
  - who committed insolence
  - who acted arrogantly
  lexicon: LSJ
  rationale: The participial phrase literally means 'working/practicing arrogance.'
    'Practiced arrogance' preserves the durative moral sense in idiomatic English
    better than a wooden 'worked pride.'
- source_word: Σοδομίτας
  chosen: the Sodomites
  alternatives:
  - the people of Sodom
  - those of Sodom
  lexicon: LSJ
  rationale: The ethnicon directly identifies the inhabitants of Sodom. 'Sodomites'
    is the most direct formal equivalent here, referring to the people of Sodom in
    context, not importing later specialized English connotations.
- source_word: ἀδήλους ταῖς κακίαις γενομένους
  chosen: had become notorious for their evils
  alternatives:
  - had become manifest in their wickedness
  - had become evident by their evils
  - had become conspicuous in wicked deeds
  lexicon: LSJ
  rationale: The Greek is somewhat compressed. ἀδήλους in context is difficult if
    taken in its common sense 'unseen/unclear'; the phrase as transmitted is commonly
    understood in the sense of becoming conspicuous or publicly known by their evils.
    'Had become notorious for their evils' captures that resultant public moral exposure
    in natural English while acknowledging the awkward source wording.
- source_word: πυρὶ καὶ θείῳ
  chosen: with fire and sulfur
  alternatives:
  - with fire and brimstone
  lexicon: LSJ
  rationale: θείον is sulfur. 'Fire and sulfur' is more transparent modern English
    than the traditional 'fire and brimstone,' while preserving the allusion to the
    judgment on Sodom.
- source_word: κατέφλεξας
  chosen: You burned up
  alternatives:
  - You consumed by fire
  - You utterly burned
  lexicon: LSJ
  rationale: The verb intensifies burning/destruction. 'Burned up' communicates complete
    fiery destruction in readable English.
- source_word: παράδειγμα
  chosen: an example
  alternatives:
  - a warning example
  - a pattern
  lexicon: LSJ
  rationale: The noun denotes an example set before others, often exemplary in a warning
    sense. 'Example' is the core meaning; the punitive force is already clear from
    context.
- source_word: τοῖς ἐπιγινομένοις
  chosen: for those who would come afterward
  alternatives:
  - for later generations
  - for those coming after
  lexicon: LSJ
  rationale: The participle refers to subsequent people/generations. 'Those who would
    come afterward' preserves the forward-looking force without over-specifying 'generations.'
