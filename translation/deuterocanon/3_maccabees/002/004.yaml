theological_decisions:
- issue: Rendering the destruction of Sodom without importing later doctrinal interpretation
  chosen_reading: the verse is translated as a historical example of divine judgment
    on arrogant wickedness
  alternative_readings:
  - reading 'Sodomites' through later sexualized English connotations
  - expanding the sin beyond what this verse explicitly states
  rationale: The Greek here emphasizes arrogance and evils generally. The translation
    avoids importing later doctrinal or cultural associations not stated in this verse
    itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Modernizing the judgment formula πυρὶ καὶ θείῳ
  chosen_reading: fire and sulfur
  alternative_readings:
  - fire and brimstone
  rationale: The traditional phrase is recognizable, but 'sulfur' is the plain lexical
    sense and better fits readable modern English without loss of theological weight.
  doctrine_reference: Translation philosophy §6
