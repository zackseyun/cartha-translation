theological_decisions:
- issue: Whether the petition asks God not to punish the speakers because of the impurity/profanation
    of others
  chosen_reading: The pronoun τούτων is taken as 'their,' referring to hostile outsiders
    whose uncleanness should not be charged to the Jewish petitioners.
  alternative_readings:
  - '''these things'' if τούτων is taken more abstractly'
  rationale: 'The immediate contrast between ''us'' and ''the lawless'' supports a
    personal referent: the speakers ask not to suffer for the contamination or sacrilege
    associated with others. This preserves the prayer''s plea for covenantal distinction
    without adding details not in the text.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
