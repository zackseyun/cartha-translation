id: 3MA.2.16
reference: 3 Maccabees 2:16
source:
  edition: lxx-swete-1909
  text: μὴ ἐκδίκησῃς ἡμᾶς ἐν τῇ τούτων ἀκαθαρσίᾳ, μηδὲ εὐθύνῃς ἡμᾶς ἐν βεβηλώσει,
    ἵνα μὴ καυχήσωνται οἱ παράνομοι ἐν θυμῷ αὐτῶν, μηδὲ ἀγαλλιάσωνται ἐν ὑπερηφανίᾳ
    γλώσσης αὐτῶν, λέγοντες
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: Do not punish us for their uncleanness, nor call us to account for profanation,
    lest the lawless boast in their wrath and exult in the pride of their tongue,
    saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not take vengeance on us in their impurity.' The Greek verb can carry
      the sense of exacting justice or vengeance.
    reason: lexical_alternative
  - marker: b
    text: Or 'desecration' for 'profanation.' The noun refers to treating what is
      holy as common.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκδίκησῃς
  chosen: punish
  alternatives:
  - take vengeance on
  - avenge against
  lexicon: BDAG
  rationale: The verb can denote exacting justice or vengeance. In prayer addressed
    to God with ἡμᾶς as object, 'punish us' communicates the sense of retributive
    action in clear modern English without implying personal vindictiveness.
- source_word: ἀκαθαρσίᾳ
  chosen: uncleanness
  alternatives:
  - impurity
  - defilement
  lexicon: BDAG
  rationale: The term denotes ritual or moral impurity. 'Uncleanness' preserves the
    cultic-religious register and matches the prayer's concern about contamination
    from others.
- source_word: εὐθύνῃς
  chosen: call us to account
  alternatives:
  - hold us responsible
  - judge us
  lexicon: LSJ
  rationale: The verb here means to demand an accounting or set matters straight.
    'Call us to account' preserves the judicial nuance better than the broader 'judge
    us.'
- source_word: βεβηλώσει
  chosen: profanation
  alternatives:
  - desecration
  - defilement
  lexicon: BDAG
  rationale: This noun refers to treating what is holy as common. 'Profanation' keeps
    that sacrilege-oriented sense distinct from the earlier ἀκαθαρσία.
- source_word: παράνομοι
  chosen: the lawless
  alternatives:
  - the wicked
  - outlaws
  lexicon: BDAG
  rationale: The adjective literally marks those acting against law. 'The lawless'
    preserves the term's moral-legal force and avoids flattening it into a generic
    label.
- source_word: καυχήσωνται
  chosen: boast
  alternatives:
  - glory
  - exult
  lexicon: BDAG
  rationale: The verb commonly means to boast or take pride. Since ἀγαλλιάσωνται follows,
    'boast' helps keep the two verbs distinct.
- source_word: ἀγαλλιάσωνται
  chosen: exult
  alternatives:
  - rejoice greatly
  - triumph
  lexicon: BDAG
  rationale: The verb conveys exuberant rejoicing. 'Exult' fits the elevated tone
    and distinguishes it from the preceding 'boast.'
- source_word: ὑπερηφανίᾳ γλώσσης αὐτῶν
  chosen: the pride of their tongue
  alternatives:
  - their arrogant speech
  - the arrogance of their tongue
  lexicon: LSJ
  rationale: The genitive construction is vivid and somewhat idiomatic. 'The pride
    of their tongue' stays close to the Greek imagery while remaining intelligible
    in English.
- source_word: θυμῷ αὐτῶν
  chosen: their anger
  alternatives:
  - their wrath
  - their passion
  lexicon: BDAG
  rationale: θυμός can denote anger, rage, or passionate impulse. 'Their anger' is
    the most natural fit in this hostile context.
