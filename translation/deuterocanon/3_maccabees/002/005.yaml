id: 3MA.2.5
reference: 3 Maccabees 2:5
source:
  edition: lxx-swete-1909
  text: σὺ τὸν θρασὺν Φαραώ, καταδουλωσάμενον τὸν λαόν σου τὸν ἅγιον Ἰσραήλ, ποικίλαις
