translation:
  text: You made known your power against the bold Pharaoh, when he had enslaved your
    holy people Israel, testing him with varied and many punishments; by these you
    made known your great might.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'arrogant Pharaoh.' The Greek adjective can carry the sense of audacious
      or insolent boldness.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'testing with varied and many punishments,' a phrasing that
      may allude to God proving Pharaoh through successive acts of judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: θρασὺν
  chosen: bold
  alternatives:
  - arrogant
  - insolent
  - presumptuous
  lexicon: LSJ
  rationale: θρασύς can denote boldness with a negative sense of audacity or insolence.
    'Bold' is concise and natural in English, while the surrounding context of divine
    punishment supplies the negative force without over-interpreting.
- source_word: καταδουλωσάμενον
  chosen: had enslaved
  alternatives:
  - having enslaved
  - had brought into bondage
  lexicon: LSJ
  rationale: The participle describes Pharaoh's prior action toward Israel. 'Had enslaved'
    clearly conveys the bonded nature of the act and fits the project's preference
    to preserve slavery language where salient.
- source_word: λαόν σου τὸν ἅγιον Ἰσραήλ
  chosen: your holy people Israel
  alternatives:
  - your holy people, Israel
  - your consecrated people Israel
  lexicon: LSJ
  rationale: This keeps both λαός ('people') and ἅγιος ('holy') explicit, with Israel
    appositional. The phrase reflects covenant identity without adding interpretation.
- source_word: ποικίλαις καὶ πολλαῖς
  chosen: varied and many
  alternatives:
  - various and many
  - manifold and numerous
  lexicon: LSJ
  rationale: Both adjectives are retained rather than collapsed, preserving the emphatic
    piling up of descriptors in readable English.
- source_word: δοκιμάσας
  chosen: testing him
  alternatives:
  - trying him
  - proving him
  - putting him to the test
  lexicon: LSJ
  rationale: The participle literally suggests testing/proving. In context of punitive
    plagues, 'testing him' preserves the Greek wording without flattening it into
    mere punishment, though the object is implicit from the syntax and context as
    Pharaoh.
- source_word: τιμωρίαις
  chosen: punishments
  alternatives:
  - penalties
  - torments
  - acts of vengeance
  lexicon: LSJ
  rationale: τιμωρία here refers to punitive acts inflicted by God. 'Punishments'
    is the most straightforward modern rendering and fits the Exodus-plague context.
- source_word: ἐγνώρισας
  chosen: made known
  alternatives:
  - showed
  - revealed
  - demonstrated
  lexicon: LSJ
  rationale: The verb occurs twice and is rendered consistently. 'Made known' preserves
    the causative sense better than the flatter 'showed.'
- source_word: δύναμιν
  chosen: power
  alternatives:
  - strength
  lexicon: LSJ
  rationale: δύναμις in this context refers to effective divine power displayed in
    judgment. 'Power' is the standard and natural rendering.
- source_word: κράτος
  chosen: might
  alternatives:
  - dominion
  - strength
  - power
  lexicon: LSJ
  rationale: To preserve the rhetorical distinction from δύναμις in the same verse,
    κράτος is rendered 'might.' This avoids unnecessary repetition while keeping the
    semantic overlap.
- source_word: ἐφʼ αἷς
  chosen: by these
  alternatives:
  - through which
  - upon which
  lexicon: LSJ
  rationale: The phrase most naturally refers back to the punishments as the means
    by which God's great might was made known. 'By these' is idiomatic and concise.
