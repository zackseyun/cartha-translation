theological_decisions:
- issue: Referent and force of the repeated ἐγνώρισας clauses
  chosen_reading: 'Both clauses are addressed to God: first, God made known his power
    against Pharaoh through punishments; second, by those punishments God made known
    his great might.'
  alternative_readings:
  - The first clause could be taken more loosely as 'you recognized/shown' rather
    than 'made known'.
  rationale: In prayer language, the speaker recounts God's public display of power
    in the Exodus. Rendering both occurrences as 'made known' preserves the repetition
    and avoids introducing a shift in meaning not required by the Greek.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
- issue: Negative nuance of θρασὺν
  chosen_reading: Rendered as 'bold' rather than a stronger interpretive term like
    'arrogant.'
  alternative_readings:
  - arrogant
  - insolent
  rationale: The context clearly condemns Pharaoh, but the adjective itself need not
    be intensified beyond the Greek. This preserves the text's wording while allowing
    the narrative context to communicate the moral judgment.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
