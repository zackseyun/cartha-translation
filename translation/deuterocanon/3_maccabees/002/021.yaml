id: 3MA.2.21
reference: 3 Maccabees 2:21
source:
  edition: lxx-swete-1909
  text: Ἐνταῦθα ὁ πάντων ἐπόπτης θεὸς καὶ προπάτωρ ἅγιος ἐν ἁγίοις εἰσακούσας τῆς
    ἐνθέσμου λιτανείας, τὸν ὕβρει καὶ θράσει μεγάλως ἐπηρμένον ἐμάστιξεν αὐτόν,
  language: Greek
