theological_decisions:
- issue: Rendering the divine epithet προπάτωρ
  chosen_reading: sovereign ancestor
  alternative_readings:
  - forefather
  - ancestor
  - progenitor
  rationale: The Greek applies an unusual ancestral title to God. A flat 'forefather'
    in English can sound biologically or mythologically awkward when predicated of
    God, while 'ancestor' alone may sound too bare. The chosen rendering preserves
    the familial-covenantal dimension while signaling divine dignity. Because the
    phrase is unusual and potentially debated, the alternatives are preserved in documentation.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Interpreting ἅγιος ἐν ἁγίοις
  chosen_reading: holy ... among the holy ones
  alternative_readings:
  - holy in the holy places
  - the Holy One in the sanctuary
  rationale: The phrase is syntactically compressed and could be read personally or
    locatively. The personal reading better fits the chain of divine titles in this
    sentence and avoids importing sanctuary language not explicit in the immediate
    wording. The alternative is preserved in a footnote due to genuine ambiguity.
  doctrine_reference: Translation philosophy §3
