translation:
  text: They quickly dragged him out, overwhelmed with extreme fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''with surpassing fear,'' an idiom meaning fear beyond ordinary
      measure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταχέως
  chosen: quickly
  alternatives:
  - swiftly
  - at once
  lexicon: LSJ
  rationale: Adverb indicating rapid action. 'Quickly' is natural modern English and
    preserves the temporal force without sounding archaic.
- source_word: αὐτὸν
  chosen: him
  lexicon: LSJ
  rationale: Straightforward masculine singular object pronoun referring to the previously
    mentioned individual.
- source_word: ἐξείλκυαν
  chosen: dragged ... out
  alternatives:
  - pulled out
  - drew out
  lexicon: LSJ
  rationale: The compound verb conveys pulling or drawing someone out from a place.
    'Dragged ... out' best captures the forceful extraction implied by the context;
    'drew out' is too mild in contemporary English.
- source_word: ὑπερβάλλοντι
  chosen: extreme
  alternatives:
  - excessive
  - extraordinary
  - surpassing
  lexicon: LSJ
  rationale: Used attributively with φόβῳ to intensify the fear as beyond ordinary
    measure. 'Extreme' is concise and idiomatic.
- source_word: καταπεπληγμένοι
  chosen: overwhelmed
  alternatives:
  - stricken
  - terrified
  - astonished
  lexicon: LSJ
  rationale: Perfect participle indicating a state of being deeply affected or struck.
    In combination with φόβῳ, the sense is being overcome by fear. 'Overwhelmed' preserves
    the resultant state without redundancy beside 'fear.'
- source_word: φόβῳ
  chosen: fear
  alternatives:
  - terror
  - fright
  lexicon: LSJ
  rationale: Basic term for fear. 'Fear' is broad enough to fit the phrase, while
    the modifier ὑπερβάλλοντι already supplies the intensity.
