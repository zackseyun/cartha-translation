id: 3MA.2.25
reference: 3 Maccabees 2:25
source:
  edition: lxx-swete-1909
  text: Διακομισθεὶς δὲ εἰς τὴν Αἴγυπτον, καὶ τὰ τῆς κακίας ἐπαύξων, διὰ τε τῶν προαποδεδειγμένων
    συνποτῶν καὶ ἑταίρων τοῦ παντὸς δικαίου κεχωρισμένων,
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 752
  confidence: high
  validation: agree
translation:
  text: But after he had been conveyed to Egypt, and was increasing his wickedness
    through the previously mentioned drinking companions and associates, who had been
    estranged from all justice,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'transported to Egypt.' The Greek participle emphasizes his transfer
      there, not the specific means.
    reason: lexical_alternative
  - marker: b
    text: Literally 'drinking companions'; the phrase suggests corrupt convivial associates
      rather than neutral friends.
    reason: cultural_note
  - marker: c
    text: Or 'separated from all that is right.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διακομισθεὶς
  chosen: after he had been conveyed
  alternatives:
  - after he had been brought over
  - after he had been transported
  lexicon: LSJ
  rationale: Aorist passive participle of διακομίζω, indicating transfer/conveyance
    from one place to another. 'Conveyed' is natural English and preserves the passive
    sense without over-specifying the mode of travel.
- source_word: ἐπαύξων
  chosen: was increasing
  alternatives:
  - was augmenting
  - was intensifying
  lexicon: LSJ
  rationale: Present participle conveying ongoing increase. 'Was increasing' fits
    the participial flow and keeps the sense that his evil conduct was being further
    amplified.
- source_word: κακίας
  chosen: wickedness
  alternatives:
  - evil
  - malice
  lexicon: LSJ
  rationale: κακία can denote badness, vice, or malice. In this courtly-moral context,
    'wickedness' best captures a broad moral corruption rather than a single hostile
    act.
- source_word: προαποδεδειγμένων
  chosen: previously mentioned
  alternatives:
  - previously designated
  - previously identified
  lexicon: LSJ
  rationale: The compound participle points back to persons already indicated in the
    narrative. 'Previously mentioned' is idiomatic and reflects the backward reference
    without forcing a technical nuance.
- source_word: συνποτῶν
  chosen: drinking companions
  alternatives:
  - fellow drinkers
  - table companions
  lexicon: LSJ
  rationale: Literally those who drink together. 'Drinking companions' preserves the
    social and morally negative setting better than the more neutral 'companions at
    table.'
- source_word: ἑταίρων
  chosen: associates
  alternatives:
  - companions
  - friends
  lexicon: LSJ
  rationale: A broad term for companions/comrades. 'Associates' avoids implying genuine
    friendship and suits the political-court context.
- source_word: τοῦ παντὸς δικαίου κεχωρισμένων
  chosen: who had been estranged from all justice
  alternatives:
  - who had been separated from every righteous thing
  - who had been alienated from all that is right
  lexicon: LSJ
  rationale: 'Perfect passive participle κεχωρισμένων describes a settled state of
    separation. παντὸς δικαίου is best taken comprehensively: ''all justice'' or ''all
    that is right.'' ''Estranged from all justice'' is concise and preserves the moral
    force.'
