theological_decisions:
- issue: Anthropological term ψυχή
  chosen_reading: souls
  alternative_readings:
  - lives
  - inner selves
  rationale: The Greek explicitly uses ψυχαί. Rendering it 'souls' preserves the text's
    wording and emotional weight without importing a more technical anthropology.
    Alternatives are possible in context but less transparent to the source.
  doctrine_reference: Translation philosophy §1, §5
- issue: Prayer idiom with plural αἰνέσεις
  chosen_reading: put praise in the mouth
  alternative_readings:
  - give praises in the mouth
  - put songs of praise in the mouth
  rationale: The idiom is rendered in natural modern English while preserving the
    image of God enabling praise from the afflicted. This avoids wooden English without
    paraphrasing beyond the source.
  doctrine_reference: Translation philosophy §6
