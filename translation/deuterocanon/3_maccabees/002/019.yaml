translation:
  text: Let your mercies quickly come before us; and put praise in the mouth of those
    who have fallen and whose souls are crushed, having made peace for us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let your mercies quickly go before us.' The Greek verb can mean 'come
      before' or 'go before' in the sense of anticipating need.
    reason: lexical_alternative
  - marker: b
    text: Literally 'those who have fallen and been crushed in their souls.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προκαταλαβέτωσαν
  chosen: come before us
  alternatives:
  - go before us
  - overtake us
  lexicon: LSJ
  rationale: The verb literally means to come before or anticipate. In prayer context
    with οἰκτιρμοί σου, 'come before us' communicates the plea that God's mercies
    reach them promptly. 'Overtake us' is possible but sounds less natural and more
    forceful than the context requires.
- source_word: οἰκτιρμοί
  chosen: mercies
  alternatives:
  - compassions
  - pities
  lexicon: LSJ
  rationale: Plural 'mercies' preserves the Greek plural and the idiom of appeals
    to God's compassionate acts. 'Compassions' is also possible, but 'mercies' is
    more natural in English prayer language without becoming archaic.
- source_word: αἰνέσεις
  chosen: praise
  alternatives:
  - praises
  - songs of praise
  lexicon: LSJ
  rationale: Although plural in Greek, English commonly uses the mass noun 'praise'
    idiomatically in 'put praise in the mouth.' This preserves the sense without awkwardness.
    The plural nuance is not significant enough to force 'praises' in the main text.
- source_word: καταπεπτωκότων
  chosen: those who have fallen
  alternatives:
  - the fallen
  - those cast down
  lexicon: LSJ
  rationale: The perfect participle denotes a state resulting from collapse or downfall.
    'Those who have fallen' preserves both the verbal force and the present condition.
    In context it likely refers to those brought low rather than physically fallen
    only.
- source_word: συντετριμμένων τὰς ψυχάς
  chosen: whose souls are crushed
  alternatives:
  - broken in soul
  - crushed in spirit
  lexicon: LSJ
  rationale: The phrase literally describes persons 'crushed as to their souls.' 'Whose
    souls are crushed' is clear and fairly literal. 'Crushed in spirit' is smoother
    but introduces 'spirit' where the Greek has 'souls'.
- source_word: ποιήσας ἡμῖν εἰρήνην
  chosen: making peace for us
  alternatives:
  - granting us peace
  - having made peace for us
  lexicon: LSJ
  rationale: The aorist participle is attendant to the petition and can be rendered
    in English as a participial request. 'Making peace for us' stays close to the
    Greek while fitting the prayer. 'Granting us peace' is interpretive but possible.
