  text: ταχὺ προκαταλαβέτωσαν οἱ οἰκτιρμοί σου· καὶ δὸς αἰνέσεις ἐν τῷ στόματι τῶν
    καταπεπτωκότων καὶ συντετριμμένων τὰς ψυχάς, ποιήσας ἡμῖν εἰρήνην.
  language: Greek
