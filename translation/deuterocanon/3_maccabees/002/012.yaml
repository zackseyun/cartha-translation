id: 3MA.2.12
reference: 3 Maccabees 2:12
source:
  edition: lxx-swete-1909
  text: ἰδοὺ δὲ νῦν, ἅγιε Βασιλεῦ, διὰ τὰς πολλὰς καὶ μεγάλας ἡμῶν ἁμαρτίας καταπονούμεθα,
    καὶ ὑπετάγημεν τοῖς ἐχθροῖς ἡμῶν, καὶ παρείμεθα ἐν ἀδυναμίαις.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: 'But look now, holy King: because of our many and great sins we are being
    oppressed, and we have been subjected to our enemies, and we are left in weakness.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Behold now, holy King.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'in weaknesses,' a plural expression for a state of weakness or helplessness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: LSJ
  rationale: Introduces an urgent appeal. 'Look' preserves the deictic force in readable
    modern English better than the more archaic 'behold.'
- source_word: ἅγιε Βασιλεῦ
  chosen: holy King
  alternatives:
  - O holy King
  - sacred King
  lexicon: LSJ
  rationale: A direct vocative address to God. 'Holy King' is the plain sense; the
    interjection 'O' is not required in modern English, though the vocative force
    is retained by punctuation.
- source_word: διὰ τὰς πολλὰς καὶ μεγάλας ἡμῶν ἁμαρτίας
  chosen: because of our many and great sins
  alternatives:
  - on account of our many and great sins
  - because of our many and serious sins
  lexicon: LSJ
  rationale: διὰ with the accusative gives causal force, and the paired adjectives
    πολλὰς καὶ μεγάλας are both retained rather than collapsed. 'Great sins' preserves
    the weight of μεγάλας without interpretive expansion.
- source_word: καταπονούμεθα
  chosen: we are being oppressed
  alternatives:
  - we are worn down
  - we are afflicted
  - we are hard pressed
  lexicon: LSJ
  rationale: The verb conveys being overborne or harshly treated. 'Are being oppressed'
    best fits the context of national subjugation and keeps the passive sense clear.
- source_word: ὑπετάγημεν
  chosen: we have been subjected
  alternatives:
  - we were subjected
  - we have been put under
  - we have been subordinated
  lexicon: LSJ
  rationale: The passive indicates being brought under another's power. 'Have been
    subjected' communicates the resulting state in natural English while preserving
    the passive.
- source_word: τοῖς ἐχθροῖς ἡμῶν
  chosen: to our enemies
  alternatives:
  - under our enemies
  - to the power of our enemies
  lexicon: LSJ
  rationale: Dative after ὑποτάσσω marks those to whom they are subjected. 'To our
    enemies' is the most direct rendering.
- source_word: παρείμεθα
  chosen: we are left
  alternatives:
  - we have been abandoned
  - we are given over
  - we are reduced
  lexicon: LSJ
  rationale: The form here conveys a state of being let go, neglected, or left in
    a condition. 'We are left' is intentionally restrained and allows the following
    phrase to define the condition.
- source_word: ἐν ἀδυναμίαις
  chosen: in weakness
  alternatives:
  - in weaknesses
  - in helplessness
  - in infirmities
  lexicon: LSJ
  rationale: ἀδυναμία denotes weakness or inability. Although plural in Greek, English
    idiom more naturally uses the collective singular 'in weakness' here; this preserves
    the sense without awkwardness.
