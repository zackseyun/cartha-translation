- issue: Divine address in prayer
  chosen_reading: The vocative 'holy King' is rendered as a direct address to God
    without adding interpretive titles beyond the Greek.
  alternative_readings:
  - O holy King
  rationale: 'The verse is a prayerful appeal, but the translation avoids liturgical
    archaism while preserving reverence and the theological claim actually present
    in the text: God''s holiness and kingship.'
