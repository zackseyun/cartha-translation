translation:
  text: They too, seeing the works of your hand, praised you, the Almighty.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ καὶ
  chosen: They too
  alternatives:
  - who also
  - and they
  lexicon: LSJ
  rationale: The article with καί functions resumptively, referring to an already-mentioned
    group and adding them to the action. 'They too' is natural English and preserves
    the additive force.
- source_word: συνιδόντες
  chosen: when they saw
  alternatives:
  - having perceived together
  - seeing clearly
  - taking note of
  lexicon: LSJ
  rationale: 'Aorist participle from συνοράω/συνιδεῖν conveys perceiving or recognizing.
    In context, a temporal sense fits smooth English: after/when they saw the evidence
    of God''s deeds. ''When they saw'' preserves the participial relation without
    awkwardness.'
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  - acts
  lexicon: LSJ
  rationale: ἔργα commonly means works/deeds. 'Works' fits the biblical register and
    pairs naturally with 'of your hand' as a reference to divine acts.
- source_word: σῆς χειρός
  chosen: your hand
  alternatives:
  - your power
  - your handiwork
  lexicon: LSJ
  rationale: The genitive phrase is a common biblical anthropomorphism for divine
    agency. 'Your hand' keeps the metaphor explicit rather than interpreting it away
    as 'power' or recasting it as 'handiwork.'
- source_word: ἤνεσάν
  chosen: praised
  alternatives:
  - gave praise to
  - extolled
  lexicon: LSJ
  rationale: From αἰνέω, the standard sense is 'praise.' 'Praised' is concise, idiomatic,
    and preserves the worshipful tone.
- source_word: τὸν παντοκράτορα
  chosen: the Almighty
  alternatives:
  - the All-powerful One
  - the Ruler of all
  lexicon: LSJ
  rationale: παντοκράτωρ is conventionally and accurately rendered 'the Almighty'
    in biblical English. This preserves the title's force without cumbersome literalism.
