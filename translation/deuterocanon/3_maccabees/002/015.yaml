theological_decisions:
- issue: Rendering of divine glory language in relation to Israel
  chosen_reading: to glorify yourself among your people Israel
  alternative_readings:
  - your glory in your people Israel
  - your glory among your people Israel
  rationale: The Greek is compact and could be rendered more literally with 'your
    glory.' However, in English that risks sounding like a static object rather than
    God's manifested honor. The chosen rendering preserves the theological sense that
    God has displayed his glory in relation to Israel without adding claims beyond
    the text.
