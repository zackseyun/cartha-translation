translation:
  text: But since you were pleased to display your glory among your people Israel,
    you have sanctified this place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'you were pleased with your glory among your people
      Israel.' The Greek can be rendered more formally, but the main text expresses
      the likely sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - rather
  - yet
  lexicon: BDAG
  rationale: Marks a contrast with the preceding petition or statement; 'But' is the
    most natural English adversative here.
- source_word: ἐπεὶ
  chosen: since
  alternatives:
  - because
  - when
  lexicon: BDAG
  rationale: Introduces the ground for the appeal. 'Since' captures the causal force
    in a prayerful argument better than the more temporally colored 'when'.
- source_word: εὐδόκησας
  chosen: you were pleased
  alternatives:
  - you delighted
  - you chose favorably
  lexicon: BDAG
  rationale: Aorist of εὐδοκέω conveys favorable will or pleasure. 'You were pleased'
    is idiomatic and preserves divine volition without over-paraphrase.
- source_word: τὴν δόξαν σου
  chosen: to glorify yourself
  alternatives:
  - your glory
  - your honor
  lexicon: BDAG
  rationale: Although literally 'your glory,' the construction with εὐδόκησας and
    ἐν plus the people points to God's manifesting his glory in relation to Israel.
    Rendering it verbally in English avoids stiffness while preserving the sense of
    divine self-glorification.
- source_word: ἐν τῷ λαῷ σου Ἰσραήλ
  chosen: among your people Israel
  alternatives:
  - in your people Israel
  - with your people Israel
  lexicon: BDAG
  rationale: ἐν here is best rendered relationally as 'among' in English, indicating
    the sphere in which God's glory is displayed.
- source_word: ἡγίασας
  chosen: you have made holy
  alternatives:
  - you sanctified
  - you consecrated
  lexicon: BDAG
  rationale: From ἁγιάζω. 'Made holy' is clear modern English and preserves the result
    of setting the place apart for sacred use.
- source_word: τὸν τόπον τοῦτον
  chosen: this place
  alternatives:
  - this המקום
  - this site
  lexicon: BDAG
  rationale: Straightforward demonstrative phrase referring to the sanctuary/location
    in context; 'this place' is the natural formal equivalent.
