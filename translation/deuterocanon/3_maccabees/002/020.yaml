theological_decisions:
- issue: Divine title and descriptive predicates in a Jewish prayer context
  chosen_reading: Render θεὸς as 'God' and retain the unusual ancestral epithet 'forefather'
    rather than smoothing to a traditional formula like 'God of our fathers.'
  alternative_readings:
  - the God of our fathers
  - ancestor
  rationale: The Greek text as given says θεὸς καὶ προπάτωρ, not an expanded traditional
    phrase. To avoid importing a more familiar doctrinal formula not present in the
    text, the translation keeps the unusual wording while remaining intelligible.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Interpretation of ἅγιος ἐν ἁγίοις
  chosen_reading: 'Take the phrase personally/descriptively: ''holy ... among the
    holy ones.'''
  alternative_readings:
  - holy in holy places
  - holy in the holy things
  rationale: The immediate syntax attaches the phrase to God as predicate description.
    Because the Greek can also be heard in a cultic sense, the alternative is preserved
    in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §3
