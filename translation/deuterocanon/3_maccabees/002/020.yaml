id: 3MA.2.20
reference: 3 Maccabees 2:20
source:
  edition: lxx-swete-1909
  text: Ἐνταῦθα ὁ πάντων ἐπόπτης θεὸς καὶ προπάτωρ ἅγιος ἐν ἁγίοις εἰσακούσας τῆς
    εὐθέσμου λιτανείας, τὸν ὕβρει καὶ θράσει μεγάλως ἐπηρμένον ἐμάστιξεν αὐτόν,
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: There the God who watches over all, the holy forefather among the holy ones,
    heard the lawful supplication and scourged him who had been greatly puffed up
    with insolence and boldness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy forefather in the holy places/things'; the Greek phrase 'holy
      in holy things/places' is ambiguous and may carry a cultic nuance.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐνταῦθα
  chosen: There
  alternatives:
  - Then
  - At that point
  lexicon: LSJ
  rationale: 'Locative-adverbial sense is primary: it points to the scene just described
    rather than merely marking sequence. ''There'' preserves the spatial/narrative
    force.'
- source_word: ἐπόπτης
  chosen: who watches over
  alternatives:
  - overseer
  - guardian
  - observer
  lexicon: LSJ
  rationale: The noun denotes one who looks upon or oversees. Rendering it verbally
    in English produces natural style while preserving divine vigilance. 'Overseer'
    is possible but sounds institutional; 'who watches over' better conveys providential
    oversight.
- source_word: προπάτωρ
  chosen: forefather
  alternatives:
  - ancestor
  - father of our fathers
  lexicon: LSJ
  rationale: The term literally denotes an ancestor or forefather. In this Jewish
    prayer context it likely evokes God as the God of the fathers/ancestral patron.
    'Forefather' keeps the familial-ancestral resonance without overexpanding the
    text.
- source_word: ἅγιος ἐν ἁγίοις
  chosen: holy ... among the holy ones
  alternatives:
  - holy in holy things
  - Holy One among holy ones
  - holy in the holy places
  lexicon: LSJ
  rationale: The phrase is somewhat compressed and can be understood in more than
    one way. Given the personal predicate with θεὸς καὶ προπάτωρ, the rendering 'holy
    ... among the holy ones' best preserves the Greek wording without forcing a cultic-local
    sense. The alternative cultic reading is preserved in a footnote because ἐν ἁγίοις
    can also suggest 'in holy places/things.'
- source_word: εἰσακούσας
  chosen: heard
  alternatives:
  - listened to
  - gave ear to
  lexicon: LSJ
  rationale: Aorist participle meaning to hear favorably or heed. 'Heard' is concise
    and idiomatic in prayer contexts, with the favorable-response nuance supplied
    by context.
- source_word: εὐθέσμου
  chosen: lawful
  alternatives:
  - orderly
  - rightful
  - well-ordered
  lexicon: LSJ
  rationale: The adjective conveys conformity to law/custom/order. 'Lawful' best captures
    the moral-legal nuance of a petition made in proper order, more strongly than
    merely 'orderly.'
- source_word: λιτανείας
  chosen: supplication
  alternatives:
  - entreaty
  - petition
  - litany
  lexicon: LSJ
  rationale: Although cognate with English 'litany,' in context it denotes earnest
    petition or prayer. 'Supplication' communicates the prayerful plea without importing
    later liturgical associations.
- source_word: ἐμάστιξεν
  chosen: scourged
  alternatives:
  - struck
  - punished
  - lashed
  lexicon: LSJ
  rationale: The verb is literally 'to whip/scourge' and can be used metaphorically
    for severe divine punishment. 'Scourged' preserves the vivid punitive imagery
    better than the flatter 'punished.'
- source_word: ὕβρει
  chosen: insolence
  alternatives:
  - arrogance
  - outrage
  - hubris
  lexicon: LSJ
  rationale: ὕβρις includes violent arrogance and insulting overreach. 'Insolence'
    captures the contemptuous pride directed against others and against God; 'hubris'
    is possible but less transparent for general readers.
- source_word: θράσει
  chosen: boldness
  alternatives:
  - audacity
  - recklessness
  lexicon: LSJ
  rationale: The term here is negative in context, denoting daring presumption. 'Boldness'
    is the most direct gloss, with the negative force supplied by its pairing with
    'insolence'; 'audacity' is also possible but slightly more interpretive.
- source_word: ἐπηρμένον
  chosen: had been greatly puffed up
  alternatives:
  - had become highly exalted
  - was swollen with pride
  - had been lifted up
  lexicon: LSJ
  rationale: Perfect/passive participial idea of being raised up, here metaphorically
    inflated with pride. 'Puffed up' is idiomatic and preserves the pride imagery;
    'greatly' reflects μεγάλως.
