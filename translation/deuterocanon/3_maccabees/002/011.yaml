translation:
  text: For even when our fathers were often afflicted, you helped them in their humiliation
    and rescued them from great evils.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestors.' The Greek reads 'our fathers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from great troubles' or 'from great calamities.' The Greek 'evils' here
      likely refers to severe harmful circumstances rather than moral evil alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ δὲ
  chosen: For even
  alternatives:
  - since indeed
  - because also
  - and since
  lexicon: LSJ
  rationale: Introduces a supporting ground in prayer discourse. 'For even' preserves
    both the explanatory force and the emphatic addition without sounding overly wooden.
- source_word: πλεονάκις
  chosen: often
  alternatives:
  - many times
  - repeatedly
  lexicon: LSJ
  rationale: The adverb indicates repeated occurrence. 'Often' is natural modern English
    and adequately conveys recurrence.
- source_word: θλιβέντων
  chosen: were afflicted
  alternatives:
  - were oppressed
  - were distressed
  - were hard-pressed
  lexicon: BDAG
  rationale: Aorist passive participle from θλίβω denotes being subjected to trouble
    or pressure. 'Were afflicted' fits the prayer's elevated tone and leaves the suffering
    general, as in the Greek.
- source_word: τῶν πατέρων ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: LSJ
  rationale: The Greek is explicitly masculine/plural and refers to forefathers/ancestral
    predecessors. Per doctrine, gender-accurate rendering is preferred; 'our fathers'
    preserves the source wording better than the more neutral 'our ancestors'.
- source_word: ἐβοήθησας αὐτοῖς
  chosen: you helped them
  alternatives:
  - you came to their aid
  - you gave them help
  lexicon: BDAG
  rationale: The verb βοηθέω means to help or come to aid. 'You helped them' is direct
    and clear, matching the simple verbal force.
- source_word: ἐν τῇ ταπεινώσει
  chosen: in their humiliation
  alternatives:
  - in their lowliness
  - in their affliction
  - in their humiliation/distress
  lexicon: BDAG
  rationale: ταπείνωσις can denote humiliation, low estate, or abasement. 'Humiliation'
    best preserves the sense of being brought low, while still fitting the context
    of suffering. 'Affliction' was possible but would blur the distinction from θλιβέντων.
- source_word: ἐρρύσω
  chosen: rescued
  alternatives:
  - delivered
  - saved
  lexicon: BDAG
  rationale: ῥύομαι commonly means to rescue or deliver from danger. 'Rescued' is
    vivid, natural English and avoids importing broader soteriological overtones that
    'saved' might suggest.
- source_word: ἐκ μεγάλων κακῶν
  chosen: from great evils
  alternatives:
  - from great troubles
  - from great calamities
  - from great harms
  lexicon: LSJ
  rationale: κακά can mean evils, troubles, or calamities depending on context. Here
    the phrase refers to severe harmful circumstances. 'Great evils' stays close to
    the Greek while remaining intelligible; alternatives are possible but less formally
    anchored.
