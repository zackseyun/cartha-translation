theological_decisions:
- issue: Gendered ancestral language
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The source uses πατέρων, not a gender-neutral term. Following the project's
    gender-accurate policy, the masculine ancestral expression is retained in the
    main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering κακῶν in a prayer about historical deliverance
  chosen_reading: great evils
  alternative_readings:
  - great troubles
  - great calamities
  rationale: The term need not imply moral evil alone; it can denote severe harms
    or disasters. The chosen rendering preserves the lexical form 'evils' while allowing
    contextual understanding as grievous afflictions. Alternatives are preserved because
    English readers may hear 'evil' primarily in a moral sense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
