id: 3MA.2.11
reference: 3 Maccabees 2:11
source:
  edition: lxx-swete-1909
  text: ἐπεὶ δὲ πλεονάκις καὶ θλιβέντων τῶν πατέρων ἡμῶν ἐβοήθησας αὐτοῖς ἐν τῇ ταπεινώσει,
    καὶ ἐρρύσω αὐτοὺς ἐκ μεγάλων κακῶν.
  language: Greek
