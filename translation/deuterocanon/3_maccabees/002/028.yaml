theological_decisions:
- issue: Rendering of coercive social status in οἰκετικὴν διάθεσιν
  chosen_reading: a servile condition
  alternative_readings:
  - household slavery
  - domestic servitude
  - slave status
  rationale: This is not a doctrinally contested term in the DOCTRINE table, but it
    bears ethical and social weight. The chosen rendering preserves the text's oppressive
    force while avoiding a falsely narrow institutional claim. Because the phrase
    points toward slave-like subjection, the translation avoids the softer 'service.'
  doctrine_reference: 'DOCTRINE.md: original-language primacy; consistency of key
    terms'
