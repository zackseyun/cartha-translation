id: 3MA.2.28
reference: 3 Maccabees 2:28
source:
  edition: lxx-swete-1909
  text: Μηδένα τῶν μὴ θυόντων ἐπὶ τὰ ἱερὰ αὐτῶν εἰσιέναι, πάντας δὲ τοὺς Ἰουδαίους
    εἰς λαογραφίαν καὶ οἰκετικὴν διάθεσιν ἀχθῆναι, τοὺς δὲ ἀντιλέγοντας βίᾳ φερομένους
    τοῦ ζῇν μεταστῆσαι.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
