  confidence: high
  validation: minor_mismatch
translation:
  text: Let none of those who do not sacrifice to their sacred rites enter them, but
    let all the Jews be brought into registration and a servile condition, and let
    those who object be violently carried off and deprived of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sanctuaries' or 'their holy things'; the Greek τὰ ἱερά can refer
      to sacred places as well as sacred rites/things.
    reason: lexical_alternative
  - marker: b
    text: '''Registration'' may refer more specifically to enrollment for state control
      or taxation.'
    reason: cultural_note
  - marker: c
    text: Literally, 'remove from living'—that is, put to death.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδένα
  chosen: Let none
  alternatives:
  - No one
  lexicon: LSJ
  rationale: 'Imperatival infinitive construction in the decree context is naturally
    rendered as a prohibitive command: ''Let none...'' preserves the formal force
    in idiomatic English.'
- source_word: τῶν μὴ θυόντων
  chosen: of those who do not sacrifice
  alternatives:
  - of those not offering sacrifice
  - of the non-sacrificers
  lexicon: LSJ
  rationale: The present participle with μή identifies a class by cultic non-participation.
    'Do not sacrifice' is the clearest modern rendering.
- source_word: ἐπὶ τὰ ἱερὰ αὐτῶν
  chosen: to their sacred rites
  alternatives:
  - into their sanctuaries
  - to their holy things
  lexicon: LSJ
  rationale: τὰ ἱερά can denote sacred places, sacred precincts, or sacred rites/things.
    Here, because the preceding phrase concerns sacrificing and the decree excludes
    non-participants from cultic access, 'their sacred rites' best captures the religious
    sphere without overcommitting to a building-specific sense. The alternative 'their
    sanctuaries' is preserved in a footnote because the phrase can also be spatial.
- source_word: εἰσιέναι
  chosen: enter them
  alternatives:
  - go in
  - have access
  lexicon: LSJ
  rationale: The infinitive depends on the decree's command. 'Enter them' matches
    the likely spatial/cultic access sense tied to τὰ ἱερά.
- source_word: λαογραφίαν
  chosen: registration
  alternatives:
  - census enrollment
  - poll-tax registration
  lexicon: LSJ
  rationale: The noun refers to enrollment of the populace, often for taxation or
    state control. 'Registration' is broad enough to fit the decree while avoiding
    overprecision not explicit in the verse.
- source_word: οἰκετικὴν διάθεσιν
  chosen: a servile condition
  alternatives:
  - household slavery
  - domestic servitude
  - slave status
  lexicon: LSJ
  rationale: The phrase denotes being assigned to the status/disposition of household
    slaves or servitude. 'A servile condition' preserves the degrading legal-social
    force without forcing a narrower institutional picture than the Greek states.
- source_word: ἀχθῆναι
  chosen: be brought into
  alternatives:
  - be led into
  - be reduced to
  lexicon: LSJ
  rationale: Passive infinitive from ἄγω. 'Be brought into' works with both 'registration'
    and 'a servile condition' as imposed states.
- source_word: ἀντιλέγοντας
  chosen: object
  alternatives:
  - oppose
  - speak against
  - refuse
  lexicon: LSJ
  rationale: The participle denotes contradiction or resistance. 'Object' is concise
    and fits a decree context; 'refuse' would be too specific.
- source_word: βίᾳ φερομένους
  chosen: be violently carried off
  alternatives:
  - be dragged away by force
  - be taken by violence
  lexicon: LSJ
  rationale: The phrase expresses forcible seizure/removal. 'Violently carried off'
    preserves both the violence and the passive sense.
- source_word: τοῦ ζῇν μεταστῆσαι
  chosen: deprived of life
  alternatives:
  - put to death
  - removed from living
  - made to cease from living
  lexicon: LSJ
  rationale: The idiom means to remove from life, i.e., execute/kill. 'Deprived of
    life' is a dignified but clear rendering that reflects the infinitival idiom without
    paraphrasing.
