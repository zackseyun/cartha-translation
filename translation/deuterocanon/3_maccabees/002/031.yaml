theological_decisions:
- issue: Rendering εὐσεβείας in a deuterocanonical civic-religious context
  chosen_reading: the city's piety
  alternative_readings:
  - the city's religion
  - the city's devotions
  rationale: The term refers to established religious devotion/practice within the
    city. 'Piety' preserves the moral-religious nuance without flattening it into
    a merely institutional 'religion.' No doctrinally contested term from DOCTRINE.md
    is directly implicated, but the rendering avoids importing later technical meanings.
  doctrine_reference: Translation philosophy §§1, 6
