  confidence: high
  validation: agree
translation:
  text: But some, lightly despising the supports of the city's piety, readily gave
    themselves up, as though they would share in some great renown from the association
    with the king that was to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the supports of the city's devotions' or 'the foundations of the city's
      piety.' The Greek uses a metaphorical term for bases or supports.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐνιοι
  chosen: some
  alternatives:
  - certain ones
  - some people
  lexicon: LSJ
  rationale: Indefinite plural referring to a subset within the population; 'some'
    is natural modern English and sufficiently precise.
- source_word: ἐπιπολαίως
  chosen: lightly
  alternatives:
  - superficially
  - rashly
  - frivolously
  lexicon: LSJ
  rationale: Conveys a shallow, careless attitude. 'Lightly' fits the adverbial force
    and pairs well with 'despising' without overinterpreting motive.
- source_word: στυγοῦντες
  chosen: despising
  alternatives:
  - hating
  - detesting
  - abhorring
  lexicon: LSJ
  rationale: The verb can be quite strong ('hate, abhor'), but in this context with
    ἐπιπολαίως the sense is contemptuous rejection rather than intense emotional hatred.
    'Despising' preserves the negative force in idiomatic English.
- source_word: ἐπιβάθρας
  chosen: supports
  alternatives:
  - foundations
  - steps
  - buttresses
  - bases
  lexicon: LSJ
  rationale: Literally the term can denote a base, step, or support. Here it is metaphorical
    with 'the city's pieties/devotions,' referring to the social-religious structures
    or props sustaining civic religion. 'Supports' preserves the metaphor without
    forcing an architectural image that may mislead.
- source_word: τὰς τῆς πόλεως εὐσεβείας
  chosen: the city's piety
  alternatives:
  - the city's devotions
  - the city's religion
  - the pious practices of the city
  lexicon: LSJ
  rationale: εὐσέβεια denotes piety/devoutness. The genitive construction points to
    the city's established religious devotion or observances. 'The city's piety' is
    concise and preserves the civic-religious sense.
- source_word: εὐχερῶς
  chosen: readily
  alternatives:
  - easily
  - willingly
  lexicon: LSJ
  rationale: Marks ease or readiness in their self-surrender. 'Readily' captures both
    willingness and lack of hesitation.
- source_word: ἑαυτοὺς ἐδίδοσαν
  chosen: gave themselves up
  alternatives:
  - surrendered themselves
  - handed themselves over
  lexicon: LSJ
  rationale: 'A middle/reflexive sense is clear: they voluntarily yielded themselves.
    ''Gave themselves up'' is idiomatic and keeps the self-involving force.'
- source_word: κοινωνήσοντες
  chosen: would share in
  alternatives:
  - would partake of
  - would have a share in
  lexicon: LSJ
  rationale: Future participle expressing expected participation. 'Would share in'
    is natural English and preserves the idea of obtaining a portion in something.
- source_word: εὐκλείας
  chosen: renown
  alternatives:
  - glory
  - good repute
  - honor
  lexicon: LSJ
  rationale: The noun denotes good fame or renown. 'Renown' fits the public-honor
    context better than the more theologically loaded 'glory.'
- source_word: ἀπὸ τῆς ἐσομένης τῷ βασιλεῖ συναναστροφῆς
  chosen: from the association with the king that was to come
  alternatives:
  - from the coming companionship with the king
  - from their future intercourse with the king
  - from the association they would have with the king
  lexicon: LSJ
  rationale: συναναστροφή here denotes association or social intercourse. ἐσομένης
    marks it as future/anticipated. The phrase means they expected honor from their
    forthcoming association with the king, not necessarily intimate friendship.
