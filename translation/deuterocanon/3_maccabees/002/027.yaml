id: 3MA.2.27
reference: 3 Maccabees 2:27
source:
  edition: lxx-swete-1909
  text: προέθετο δημοσίᾳ κατὰ τοῦ ἔθνους διαδοῦναι ψόγον· ἐπὶ τοῦ κατὰ τὴν αὐλὴν πύργου
    στήλην ἀναστήσας, ἐκόλαψεν γραφὴν
  language: Greek
  pages:
  - 734
  - 735
