  - 739
  - 752
  confidence: high
  validation: agree
translation:
  text: He publicly proposed to spread reproach against the nation; having set up
    a stele on the tower by the court, he engraved an inscription
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a pillar' or 'a monument' for 'stele' (στήλην). The Greek refers to
      an erected stone monument suitable for an inscription.
    reason: lexical_alternative
  - marker: b
    text: '''Court'' (αὐλή) may also mean a palace court or enclosed courtyard; the
      exact architectural reference is not fully specified by the Greek alone.'
    reason: cultural_note
lexical_decisions:
- source_word: προέθετο
  chosen: publicly proposed
  alternatives:
  - purposed
  - resolved
  - set forth publicly
  lexicon: LSJ
  rationale: Middle voice of προτίθημι here conveys setting forth or proposing a plan.
    'Proposed' preserves the deliberative sense without overstating it as a completed
    decree.
- source_word: δημοσίᾳ
  chosen: publicly
  alternatives:
  - in public
  - openly
  lexicon: LSJ
  rationale: Adverb indicating public/open action; 'publicly' is concise and natural.
- source_word: διαδοῦναι
  chosen: to spread
  alternatives:
  - to publish
  - to disseminate
  - to circulate
  lexicon: LSJ
  rationale: The infinitive suggests causing something to be spread abroad. 'Spread'
    fits the hostile publicizing of the reproach.
- source_word: ψόγον
  chosen: reproach
  alternatives:
  - disgrace
  - blame
  - censure
  lexicon: LSJ
  rationale: ψόγος denotes blame or reproach. 'Reproach' best captures public dishonor
    directed against the Jewish people.
- source_word: ἔθνους
  chosen: the nation
  alternatives:
  - the people
  - the ethnic group
  lexicon: LSJ
  rationale: In context this refers to the Jewish people as a collective body. 'Nation'
    preserves the corporate sense better than the more generic 'people'.
- source_word: πύργου
  chosen: tower
  alternatives:
  - fortress-tower
  lexicon: LSJ
  rationale: The basic sense is 'tower'; no need to expand beyond the source.
- source_word: στήλην
  chosen: a stele
  alternatives:
  - a pillar
  - a monument
  - a stone slab
  lexicon: LSJ
  rationale: στήλη is an inscribed standing stone/monument. 'Stele' is the most precise
    term, though somewhat technical; it suits the epigraphic context.
- source_word: ἀναστήσας
  chosen: having set up
  alternatives:
  - having erected
  - after raising
  lexicon: LSJ
  rationale: Aorist participle indicating prior action before engraving. 'Having set
    up' is clear modern English.
- source_word: ἐκόλαψεν
  chosen: he engraved
  alternatives:
  - he carved
  - he inscribed
  lexicon: LSJ
  rationale: The verb denotes cutting/engraving. 'Engraved' matches the action done
    on a stele.
- source_word: γραφὴν
  chosen: an inscription
  alternatives:
  - a writing
  - a record
  lexicon: LSJ
  rationale: Given the monument context, γραφή refers to the written text engraved
    on it; 'inscription' is the idiomatic rendering.
- source_word: ἐπὶ τοῦ κατὰ τὴν αὐλὴν πύργου
  chosen: on the tower by the court
  alternatives:
  - on the tower near the court
  - on the tower at the palace court
  lexicon: LSJ
  rationale: The phrase locates the stele in relation to the court/precinct. 'By the
    court' preserves the spatial relation without overinterpreting αὐλή as specifically
    'palace' unless context demands it.
