translation:
  text: each one to his former place, having obtained authority among their enemies
    with glory and fear, their whole body of possessions having been shaken by none.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek is compressed and somewhat difficult here. 'To his former place' renders
      an elliptical expression that could also mean 'to what was formerly theirs'
      or 'to the previous position.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their entire property having been disturbed by no one' / 'none of their
      possessions having been shaken.' The clause likely means that nothing belonging
      to them was harmed or unsettled.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each
  - every one
  lexicon: LSJ
  rationale: Distributive singular; 'each one' preserves the individual-by-individual
    sense.
- source_word: εἰς τὴν ἔμπροσθεν
  chosen: to his former place
  alternatives:
  - to the place before
  - to what was formerly theirs
  - to the previous place
  lexicon: LSJ
  rationale: The phrase is elliptical; with article + adverbial adjective it most
    naturally means 'to the former/previous [state or place].' In context of restoration
    after danger, 'former place' gives the likely sense in readable English.
- source_word: ἐν τοῖς ἐχθροῖς
  chosen: among their enemies
  alternatives:
  - over their enemies
  - in the case of their enemies
  lexicon: LSJ
  rationale: ἐν with the dative here is best taken in a relational/social sense, not
    strictly locative. 'Among their enemies' fits the following phrase about authority/status
    in relation to those enemies.
- source_word: ἐξουσίαν ἐσχηκότες
  chosen: having obtained authority
  alternatives:
  - having had power
  - having gained mastery
  - having secured standing
  lexicon: BDAG
  rationale: Perfect participle of ἔχω with ἐξουσία conveys a state now possessed.
    'Authority' is the most direct rendering of ἐξουσία; 'obtained' reflects the resultant
    possession in context.
- source_word: μετὰ δόξης καὶ φόβου
  chosen: with glory and fear
  alternatives:
  - with honor and fear
  - with splendor and awe
  lexicon: LSJ
  rationale: Both nouns are retained rather than interpreted. 'Glory' preserves δόξα's
    weight; 'fear' leaves open whether the fear is that inspired in others or accompanying
    their restored status.
- source_word: τὸ σύνολον
  chosen: their whole body of possessions
  alternatives:
  - the whole of them
  - their entire property
  - the whole amount
  lexicon: LSJ
  rationale: The neuter singular collective likely summarizes the totality of what
    belonged to them, clarified by the following genitive τῶν ὑπαρχόντων. Because
    the Greek is compressed, the English expands slightly for intelligibility.
- source_word: ὑπὸ μηδενὸς διασεισθέντες
  chosen: having been shaken by none
  alternatives:
  - having been disturbed by no one
  - having suffered no loss from anyone
  lexicon: LSJ
  rationale: The participle literally means 'shaken, agitated, disturbed.' In context
    of preserved goods/status, it likely implies remaining untouched or undisturbed.
    The more literal 'shaken by none' is kept, though somewhat idiomatic in English.
- source_word: τῶν ὑπαρχόντων
  chosen: of possessions
  alternatives:
  - of belongings
  - of property
  - of what they had
  lexicon: LSJ
  rationale: ὑπάρχοντα commonly denotes possessions/property. 'Possessions' is concise
    and natural.
