  text: ἕκαστος εἰς τὴν ἔμπροσθεν, ἐν τοῖς ἐχθροῖς ἐξουσίαν ἐσχηκότες μετὰ δόξης καὶ
    φόβου, τὸ σύνολον ὑπὸ μηδενὸς διασεισθέντες τῶν ὑπαρχόντων.
