id: 3MA.7.19
reference: 3 Maccabees 7:19
source:
  edition: lxx-swete-1909
  text: καταχθέντες δὲ μετʼ εἰρήνης ἐν ταῖς πρεπούσαις ἐξομολογήσεσιν, ὡσαύτως κἀκεῖ
    ἔστησαν καὶ ταύτας ἄγειν τὰς ἡμέρας ἐπὶ τὸν τῆς παροικίας αὐτῶν χρόνον εὐφροσύνους.
  language: Greek
  pages:
