id: 3MA.7.22
reference: 3 Maccabees 7:22
source:
  edition: lxx-swete-1909
  text: καὶ πάντα τὰ ἑαυτῶν πάντες ἐκομίσαντο ἐξ ἀπογραφῆς, ὥστε τοὺς ἔχοντάς τι μετὰ
    φόβου μεγίστου ἀποδοῦναι αὐτοῖς, τὰ μεγαλεῖα τοῦ μεγάλου θεοῦ ποιήσαντος τελέως
    ἐπὶ σωτηρίᾳ αὐτῶν.
  language: Greek
  pages:
  - 734
  - 746
  - 747
  - 748
  - 749
  - 750
  - 751
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: And all of them recovered all their own property from the registration, so
    that those who had anything gave it back to them with the greatest fear, because
    the great God had fully performed mighty deeds for their deliverance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the inventory' or 'from the official record'; the Greek ἀπογραφή
      can refer to an administrative registration of persons or property.
    reason: lexical_alternative
  - marker: b
    text: Or 'for their salvation.' The Greek σωτηρία can denote both rescue in a
      concrete situation and salvation more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκομίσαντο
  chosen: recovered
  alternatives:
  - received back
  - retrieved
  - carried off
  lexicon: LSJ
  rationale: Middle voice here indicates obtaining back what belonged to them. 'Recovered'
    fits the context of restoration of confiscated or registered property better than
    the more literal but less idiomatic 'received back.'
- source_word: ἐξ ἀπογραφῆς
  chosen: from the registration
  alternatives:
  - from the inventory
  - from the record
  - from the census list
  lexicon: LSJ
  rationale: ἀπογραφή can denote an official registration or inventory. In this context
    of property being restored through official records, 'registration' preserves
    the administrative sense without over-specifying a census.
- source_word: τοὺς ἔχοντάς τι
  chosen: those who had anything
  alternatives:
  - those possessing anything
  - those who held any of it
  lexicon: LSJ
  rationale: The participial phrase refers generally to persons in possession of any
    of the property. 'Those who had anything' is natural English and keeps the breadth
    of τι.
- source_word: μετὰ φόβου μεγίστου
  chosen: with the greatest fear
  alternatives:
  - with very great fear
  - in extreme fear
  lexicon: LSJ
  rationale: A straightforward rendering of the superlative phrase. 'Fear' is preferable
    to softer terms like 'awe' because the context suggests dread in response to divine
    intervention.
- source_word: ἀποδοῦναι αὐτοῖς
  chosen: gave it back to them
  alternatives:
  - returned it to them
  - restored it to them
  lexicon: LSJ
  rationale: The infinitive expresses restitution to the Jews. 'Gave it back' is idiomatic
    and clearly conveys return of what was theirs.
- source_word: τὰ μεγαλεῖα
  chosen: mighty deeds
  alternatives:
  - great acts
  - wonders
  - marvels
  lexicon: LSJ
  rationale: The noun denotes great or mighty acts, especially of God. 'Mighty deeds'
    preserves the elevated tone and divine-action context without sounding archaic.
- source_word: ποιήσαντος τελέως
  chosen: had fully accomplished
  alternatives:
  - had completely done
  - had brought to completion
  lexicon: LSJ
  rationale: The genitive absolute describes God's action as complete and effective.
    'Had fully accomplished' captures both the verbal action and the adverbial force
    of τελέως.
- source_word: ἐπὶ σωτηρίᾳ αὐτῶν
  chosen: for their deliverance
  alternatives:
  - for their salvation
  - toward their rescue
  lexicon: LSJ
  rationale: σωτηρία can mean salvation or deliverance. In this narrative setting
    of rescue from danger and restoration, 'deliverance' best reflects the immediate
    sense while retaining theological weight.
