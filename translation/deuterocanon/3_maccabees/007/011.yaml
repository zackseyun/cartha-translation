theological_decisions:
- issue: Referent and force of the final phrase μηδὲ τοῖς τοῦ βασιλέως προστάγμασιν
  chosen_reading: 'The line is rendered as a second object of ''show favor'': they
    were to show favor neither to apostates nor to the king''s decrees.'
  alternative_readings:
  - they were to show favor neither to apostates nor to those who followed the king's
    decrees
  - they were never to comply either with apostates or with the king's decrees
  rationale: The Greek as transmitted is compressed and somewhat awkward, especially
    given the source validation note of major mismatch. The most defensible rendering
    from the extant wording keeps the parallel structure with two datives governed
    by εὐνοήσειν. Because 'show favor to decrees' is not natural English, the translation
    preserves the sense without adding an explicit object not present in the text.
  doctrine_reference: Preserve source uncertainty honestly; do not import claims the
    text does not make.
