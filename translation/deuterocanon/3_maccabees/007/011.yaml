  confidence: high
  validation: major_mismatch
translation:
  text: declaring that they should never show favor either to those who, for the sake
    of their belly, had transgressed the divine commandments, or to the king’s decrees.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for appetite’s sake' or 'for food.' The Greek literally says 'for the
      sake of the belly,' an idiom for yielding to bodily appetite.
    reason: lexical_alternative
  - marker: b
    text: The Greek wording of the final clause is compressed and may also be understood
      as referring to those aligned with the king’s decrees rather than the decrees
      themselves.
    reason: alternative_reading
lexical_decisions:
- source_word: προφερόμενοι
  chosen: declaring
  alternatives:
  - asserting
  - stating publicly
  - bringing forward
  lexicon: LSJ
  rationale: The participle introduces the content of what was being said or put forward.
    'Declaring' fits the public, formal sense without overtranslating.
- source_word: τοὺς γαστρὸς ἕνεκεν
  chosen: for the sake of their belly
  alternatives:
  - for appetite's sake
  - because of gluttony
  - for food
  lexicon: LSJ
  rationale: The idiom is vivid and morally charged; retaining 'belly' preserves the
    concrete metaphor rather than flattening it to mere 'food.'
- source_word: τὰ θεῖα παραβεβηκότας προστάγματα
  chosen: those who ... had transgressed the divine commandments
  alternatives:
  - those who had violated God's commands
  - those who had overstepped the divine ordinances
  lexicon: LSJ
  rationale: παραβεβηκότας denotes transgression/violation, and θεῖα προστάγματα refers
    to commands understood as divine. 'Divine commandments' is clear and suitably
    weighty.
- source_word: μηδέποτε εὐνοήσειν
  chosen: should never show favor
  alternatives:
  - should never be well-disposed toward
  - should never grant goodwill to
  lexicon: LSJ
  rationale: εὐνοέω here conveys favorable disposition or support. 'Show favor' is
    idiomatic modern English and preserves the ethical force.
- source_word: μηδὲ τοῖς τοῦ βασιλέως προστάγμασιν
  chosen: or to the king’s decrees
  alternatives:
  - nor to the king's commands
  - nor to the ordinances of the king
  lexicon: LSJ
  rationale: The dative after εὐνοήσειν is awkward in English; the sense is extending
    favor or compliance toward the king's edicts. 'Decrees' suits royal legislation
    better than the more general 'commands.'
