id: 3MA.7.9
reference: 3 Maccabees 7:9
source:
  edition: lxx-swete-1909
  text: γινώσκετε γὰρ ὅτι κατὰ τούτων ἐάν τι κακοτεχνήσωμεν πονηρόν, ἢ ἐπιλυπήσωμεν
    αὐτοὺς τὸ σύνολον, οὐκ ἄνθρωπον, ἀλλὰ τὸν πάσης δεσπόζοντα δυνάμεως θεὸν ὕψιστον
    ἀντικείμενον ἡμῖν ἐπʼ ἐκδίκησιν τῶν πραγμάτων κατὰ πᾶν ἀφεύκτως διὰ παντὸς ἕξομεν.
    ἐρρῶσθε.
  language: Greek
  pages:
  - 734
  - 746
  - 747
  - 748
  - 749
  - 750
  - 751
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: For know that if we devise any evil against these people, or cause them grief
    in any way at all, we will have against us for vengeance in these matters, utterly
    without escape and forever, not a man but God Most High, the one who rules over
    all power. Farewell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'distress them altogether' / 'cause them grief in the least'; the Greek
      phrase after 'grieve them' is idiomatic and intensifies the extent of harm.
    reason: lexical_alternative
  - marker: b
    text: The closing 'Farewell' translates a conventional Greek epistolary ending
      that can also mean 'Be strong' or 'Be well.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκετε
  chosen: know
  alternatives:
  - understand
  - be aware
  lexicon: BDAG
  rationale: Present imperative/plural introducing a solemn warning; 'know' is direct
    and natural in English.
- source_word: κακοτεχνήσωμεν
  chosen: devise any evil
  alternatives:
  - plot wickedness
  - contrive harm
  lexicon: LSJ
  rationale: The verb conveys scheming or crafting evil, not merely doing generic
    harm. 'Devise any evil' preserves the deliberative sense.
- source_word: πονηρόν
  chosen: evil
  alternatives:
  - wicked thing
  - harm
  lexicon: LSJ
  rationale: Used adverbially/objectively with κακοτεχνήσωμεν to intensify the moral
    quality of the act; 'evil' keeps that force better than the flatter 'harm'.
- source_word: ἐπιλυπήσωμεν
  chosen: grieve
  alternatives:
  - distress
  - cause pain to
  lexicon: BDAG
  rationale: The verb denotes causing sorrow or distress. 'Grieve' is concise and
    preserves emotional injury, though broader than bereavement in English.
- source_word: τὸ σύνολον
  chosen: in any way at all
  alternatives:
  - altogether
  - as a whole
  - in the least
  lexicon: LSJ
  rationale: Idiomatic intensifier here after ἐπιλυπήσωμεν. The sense is comprehensive
    extent rather than a literal noun phrase, so an English adverbial rendering is
    preferable.
- source_word: οὐκ ἄνθρωπον, ἀλλὰ ... θεὸν ὕψιστον
  chosen: not a man but God Most High
  alternatives:
  - not man but the Most High God
  - not a human being but the Most High God
  lexicon: LSJ
  rationale: Preserves the emphatic contrast between merely human opposition and divine
    opposition. 'God Most High' follows the Greek word order closely enough while
    remaining idiomatic.
- source_word: τὸν πάσης δεσπόζοντα δυνάμεως
  chosen: the one who rules over all power
  alternatives:
  - the master of every power
  - the sovereign over all might
  lexicon: LSJ
  rationale: δεσπόζοντα is participial and denotes exercising lordship/mastery. 'Rules
    over all power' is readable and preserves universal sovereignty without over-technical
    phrasing.
- source_word: ἀντικείμενον ἡμῖν
  chosen: we will have against us
  alternatives:
  - standing opposed to us
  - as our adversary
  lexicon: BDAG
  rationale: The participle describes God as set in opposition to the speakers. English
    restructures the clause naturally as 'we will have against us'.
- source_word: ἐπʼ ἐκδίκησιν τῶν πραγμάτων
  chosen: for vengeance in these matters
  alternatives:
  - for avenging these deeds
  - for punishment concerning these acts
  lexicon: BDAG
  rationale: ἐκδίκησις is vengeance/vindication in response to wrongdoing. 'In these
    matters' reflects the broad πραγμάτων without narrowing it too much to 'deeds'.
- source_word: κατὰ πᾶν ἀφεύκτως
  chosen: utterly without escape
  alternatives:
  - in every respect unavoidably
  - altogether inevitably
  lexicon: LSJ
  rationale: The phrase intensifies the certainty of divine retribution. 'Utterly
    without escape' captures both totality and impossibility of evasion.
- source_word: διὰ παντός
  chosen: forever
  alternatives:
  - continually
  - at all times
  lexicon: BDAG
  rationale: In this warning context the phrase stresses enduring, ongoing reality.
    'Forever' is slightly interpretive but communicates the force succinctly; 'continually'
    was possible but less idiomatic here.
- source_word: ἐρρῶσθε
  chosen: Farewell
  alternatives:
  - Be strong
  - Be well
  lexicon: LSJ
  rationale: Standard epistolary closing. 'Farewell' best fits the letter-like conclusion
    in English.
