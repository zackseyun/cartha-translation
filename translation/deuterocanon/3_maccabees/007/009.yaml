theological_decisions:
- issue: Divine title and sovereignty language
  chosen_reading: God Most High, the one who rules over all power
  alternative_readings:
  - the Most High God, master of every power
  - God the Highest, sovereign over all might
  rationale: The Greek emphasizes God's supremacy and active dominion. The rendering
    preserves monotheistic and sovereign force without importing later doctrinal formulations
    beyond the text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension
    rather than resolve it.'
