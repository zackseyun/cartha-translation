theological_decisions:
- issue: Rendering of τὰ ἔθνη
  chosen_reading: the nations
  alternative_readings:
  - the Gentiles
  - the peoples
  rationale: This verse is not making a theological Jew/Gentile contrast in a Pauline
    sense, but reporting a political accusation in a Hellenistic setting. 'The nations'
    stays close to the Greek while leaving the ethnic scope broad. Because 'Gentiles'
    is also plausible in Jewish discourse, it is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    ambiguity where genuine.'
