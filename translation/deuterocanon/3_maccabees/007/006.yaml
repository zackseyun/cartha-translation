id: 3MA.7.6
reference: 3 Maccabees 7:6
source:
  edition: lxx-swete-1909
  text: ἡμεῖς δὲ ἐπὶ τούτοις σκληρότερον διαπειλησάμενοι, καθʼ ἣν ἔχομεν πρὸς ἅπαντας
    ἀνθρώπους ἐπιείκειαν, μόγις τὸ ζῆν αὐτοῖς χαρισάμενοι, καὶ τὸν ἐπουράνιον θεὸν
    ἐγνωκότες ἀσφαλῶς ὑπερησπικότα τῶν Ἰουδαίων,
  language: Greek
