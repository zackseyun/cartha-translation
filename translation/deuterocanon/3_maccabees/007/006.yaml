theological_decisions:
- issue: Rendering of θεός in a royal letter context
  chosen_reading: the heavenly God
  alternative_readings:
  - the God of heaven
  rationale: The phrase is not a contested doctrinal term in the project table, but
    it carries theological weight. The chosen rendering preserves the Greek adjective
    ἐπουράνιον while still sounding natural enough in English. The alternative is
    preserved because it is a common idiomatic equivalent.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Degree of interpretive smoothing in τὸ ζῆν αὐτοῖς χαρισάμενοι
  chosen_reading: granted them their lives
  alternative_readings:
  - spared their lives
  rationale: The main text keeps closer to the Greek idiom while remaining readable.
    A more idiomatic English alternative is worth preserving, but the text should
    not paraphrase beyond the source.
  doctrine_reference: Translation philosophy §§1, 6
