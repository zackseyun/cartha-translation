id: 3MA.7.5
reference: 3 Maccabees 7:5
source:
  edition: lxx-swete-1909
  text: οἳ καὶ δεσμίους καταγαγόντες αὐτοὺς μετὰ σκυλμῶν ὡς ἀνδράποδα, μᾶλλον δὲ ὡς
    ἐπιβούλους, ἄνευ πάσης ἀνακρίσεως καὶ ἐξετάσεως ἐπεχείρησαν ἀνελεῖν, νόμου Σκυθῶν
    ἀγριοτέραν ἐνπεπηρμένοι ὠμότητα.
  language: Greek
  pages:
  - 734
  - 746
  - 747
  - 748
  - 749
  - 750
  - 751
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: These men, after bringing them down in chains with abuse, as slaves—or rather,
    as conspirators—attempted to destroy them without any hearing or examination,
    having clothed themselves in a savagery more brutal than the law of the Scythians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with mistreatment' or 'with outrage'; the Greek phrase denotes abusive,
      degrading treatment.
    reason: lexical_alternative
  - marker: b
    text: Literally 'as slaves—or rather, as conspirators,' intensifying the accusation
      from mere subjugation to hostile plotting.
    reason: lexical_alternative
  - marker: c
    text: The Greek expression 'having clothed themselves in a savagery more brutal
      than the law of the Scythians' is rhetorically vivid; 'law of the Scythians'
      likely refers to Scythian custom as a proverb for extreme cruelty.
    reason: cultural_note
lexical_decisions:
- source_word: δεσμίους
  chosen: in chains
  alternatives:
  - as prisoners
  - bound
  lexicon: LSJ
  rationale: The adjective denotes being bound or in bonds. 'In chains' is idiomatic
    English that preserves the concrete sense better than the more generic 'as prisoners.'
- source_word: καταγαγόντες
  chosen: after bringing them down
  alternatives:
  - having brought them down
  - having led them away
  lexicon: LSJ
  rationale: The participle of κατάγω literally means 'bring down' or 'lead down.'
    The context likely involves transporting the Jews under custody; 'after bringing
    them down' keeps the participial sequence and the directional force without over-interpreting
    destination.
- source_word: μετὰ σκυλμῶν
  chosen: with abuse
  alternatives:
  - with mistreatment
  - with outrage
  - with plundering
  lexicon: LSJ
  rationale: The phrase conveys harsh maltreatment or indignities inflicted on them.
    'With abuse' is concise and natural in English. 'Plundering' is less suitable
    here because the immediate context concerns degrading treatment of persons.
- source_word: ὡς ἀνδράποδα
  chosen: as slaves
  alternatives:
  - as captives
  - as human chattel
  lexicon: LSJ
  rationale: ἀνδράποδον refers to a slave, often one reduced to slavery as booty.
    In keeping with project guidance on bonded-status language, 'slaves' best preserves
    the dehumanizing force.
- source_word: μᾶλλον δὲ ὡς ἐπιβούλους
  chosen: or rather, as conspirators
  alternatives:
  - rather, as plotters
  - rather, as enemies lying in wait
  lexicon: LSJ
  rationale: 'The corrective μᾶλλον δέ sharpens the comparison: they were treated
    not merely as slaves but as dangerous schemers. ''Conspirators'' captures hostile
    plotting in clear modern English.'
- source_word: ἄνευ πάσης ἀνακρίσεως καὶ ἐξετάσεως
  chosen: without any hearing or examination
  alternatives:
  - without any inquiry or investigation
  - without any trial or examination
  lexicon: LSJ
  rationale: The paired legal terms indicate absence of due process. 'Hearing' for
    ἀνάκρισις and 'examination' for ἐξέτασις preserve the juridical sense without
    becoming overly technical.
- source_word: ἐπεχείρησαν ἀνελεῖν
  chosen: attempted to destroy them
  alternatives:
  - tried to kill them
  - undertook to do away with them
  lexicon: LSJ
  rationale: ἀναιρέω here means to kill or remove violently. 'Destroy them' preserves
    the severity while fitting the elevated rhetoric of the passage; the object 'them'
    is supplied from context.
- source_word: νόμου Σκυθῶν ἀγριοτέραν
  chosen: more brutal than the law of the Scythians
  alternatives:
  - more savage than Scythian custom
  - more cruel than the Scythians' law
  lexicon: LSJ
  rationale: The phrase invokes the Scythians as a byword for barbarity. 'Law' translates
    νόμος directly, though the sense may shade toward customary practice; the comparison
    is retained rather than domesticated.
- source_word: ἐνπεπηρμένοι ὠμότητα
  chosen: having clothed themselves in a savagery
  alternatives:
  - having been filled with cruelty
  - having assumed cruelty
  lexicon: LSJ
  rationale: The participle is textually and semantically difficult, but in context
    it conveys being invested with or imbued with cruelty. 'Having clothed themselves
    in a savagery' reflects the metaphorical force and avoids flattening the vivid
    rhetoric.
