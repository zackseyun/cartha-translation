theological_decisions:
- issue: Rendering dehumanizing status language in ὡς ἀνδράποδα
  chosen_reading: as slaves
  alternative_readings:
  - as captives
  - as human chattel
  rationale: Following the project's doctrine on δοῦλος/slave language by analogy,
    the bonded and dehumanizing sense should be preserved rather than softened. Although
    ἀνδράποδα is not the same lexeme, the same principle applies in this context of
    violent reduction of persons.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; contested terms table
    on δοῦλος'
