id: 3MA.7.3
reference: 3 Maccabees 7:3
source:
  edition: lxx-swete-1909
  text: τῶν φίλων τινὲς κατὰ κακοήθειαν πυκνότερον ἡμῖν παρακείμενοι, συνέπεισαν ἡμᾶς
    εἰς τὸ τοὺς ὑπὸ τὴν βασιλείαν Ἰουδαίους συναθροίσαντας τὰ συστήματα κολάζεσθαι
    ξενιζούσαις ἀποστάντων τιμωρίαις.
  language: Greek
  pages:
