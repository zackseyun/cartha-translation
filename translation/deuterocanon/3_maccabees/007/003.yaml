  confidence: high
  validation: major_mismatch
translation:
  text: Some of our friends, being more constantly at our side out of malice, persuaded
    us that the Jews under our rule, after being gathered together in groups, should
    be punished with unusual penalties as rebels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in groups' or 'in organized bodies'; the Greek term can denote an organized
      body or association, and its precise force here is somewhat uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'with extraordinary punishments.' The Greek describes penalties as strange,
      foreign, or unusual.
    reason: lexical_alternative
lexical_decisions:
- source_word: φίλων
  chosen: friends
  alternatives:
  - companions
  - courtiers
  lexicon: LSJ
  rationale: The genitive plural of φίλος normally means 'friends.' In royal context
    it can denote court associates, but the plain sense 'friends' is retained in English
    without over-specifying office.
- source_word: κατὰ κακοήθειαν
  chosen: out of malice
  alternatives:
  - maliciously
  - through ill will
  lexicon: LSJ
  rationale: The phrase indicates motive or manner rooted in bad character/ill will.
    'Out of malice' captures the causal nuance naturally in English.
- source_word: πυκνότερον ἡμῖν παρακείμενοι
  chosen: being more constantly at our side
  alternatives:
  - being more closely attached to us
  - being more frequently near us
  lexicon: LSJ
  rationale: παράκειμαι here has the sense of being near or attached; πυκνότερον adds
    comparative frequency/closeness. The rendering preserves both proximity and repeated
    access in idiomatic English.
- source_word: συνέπεισαν ἡμᾶς
  chosen: persuaded us
  alternatives:
  - prevailed upon us
  - induced us
  lexicon: LSJ
  rationale: The compound verb means to persuade or win over. 'Persuaded us' is the
    clearest modern equivalent.
- source_word: τοὺς ὑπὸ τὴν βασιλείαν Ἰουδαίους
  chosen: the Jews under our rule
  alternatives:
  - the Jews under the kingdom
  - the Jews subject to our reign
  lexicon: LSJ
  rationale: The phrase denotes those under the king's dominion. Since the speaker
    is royal and uses first person elsewhere, 'under our rule' communicates the political
    sense naturally.
- source_word: συναθροίσαντας
  chosen: after being gathered together
  alternatives:
  - having assembled
  - once gathered together
  lexicon: LSJ
  rationale: 'The participle is aorist and likely antecedent to the punishment: first
    gathered, then punished. Passive sense is supplied in English from the context
    of state action.'
- source_word: τὰ συστήματα
  chosen: as associations
  alternatives:
  - in groups
  - in organized bodies
  lexicon: LSJ
  rationale: σύστημα can denote a body, corporation, or organized group. Because the
    object is people being rounded up in collective units, 'as associations' preserves
    the organizational nuance, though the exact force is somewhat uncertain.
- source_word: κολάζεσθαι
  chosen: should be punished
  alternatives:
  - should be chastised
  - should be penalized
  lexicon: LSJ
  rationale: The infinitive expresses the proposed action against the Jews. 'Punished'
    is the standard and contextually appropriate rendering.
- source_word: ξενιζούσαις ... τιμωρίαις
  chosen: with unusual penalties
  alternatives:
  - with strange punishments
  - with extraordinary penalties
  lexicon: LSJ
  rationale: ξενίζω/ξενίζουσαις here carries the sense of foreign, strange, or extraordinary.
    'Unusual penalties' is readable modern English while preserving the sense of exceptional
    punishment.
- source_word: ἀποστάντων
  chosen: because they had revolted
  alternatives:
  - for having defected
  - for having apostatized
  lexicon: LSJ
  rationale: ἀφίστημι in the aorist participle commonly means to revolt, withdraw,
    or defect. In this political context 'revolted' best fits; 'apostatized' would
    import specifically religious overtones not required by the verse.
