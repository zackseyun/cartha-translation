theological_decisions:
- issue: Force of ἀποστάντων
  chosen_reading: political revolt/defection
  alternative_readings:
  - religious apostasy
  rationale: In context the king is describing alleged grounds for state punishment
    of Jews under his rule. The political-administrative setting favors 'revolted/defected'
    rather than a specifically theological 'apostatized.'
- issue: Sense of τὰ συστήματα
  chosen_reading: organized associations/groups
  alternative_readings:
  - their bodies collectively
  - their communities
  rationale: The noun is somewhat unusual in this context and may refer to organized
    groupings in which the Jews were assembled. The translation keeps the organizational
    nuance while acknowledging uncertainty in a footnote.
