  text: ἐρρώμεθα δὲ καὶ αὐτοὶ καὶ τὰ τέκνα ἡμῶν, κατευθύνοντος ἡμῖν τοῦ μεγάλου θεοῦ
    τὰ προστάγματα, καθὼς προαιρούμεθα.
