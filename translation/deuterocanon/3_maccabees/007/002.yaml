theological_decisions:
- issue: Relation between divine direction and human willing in καθὼς προαιρούμεθα
  chosen_reading: The text is rendered to preserve both divine agency ('the great
    God directs his commands for us') and human volition ('just as we choose') without
    harmonizing the tension.
  alternative_readings:
  - as we intend
  - according to our purpose
  rationale: The Greek juxtaposes God's directing activity with the speakers' own
    προαίρεσις. The translation keeps both elements visible rather than resolving
    the relationship into stronger determinism or autonomy.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
