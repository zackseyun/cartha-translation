id: 3MA.7.7
reference: 3 Maccabees 7:7
source:
  edition: lxx-swete-1909
  text: ὡς πατέρα ὑπὲρ υἱῶν διὰ παντὸς συμμαχοῦντα, τήν τε τοῦ φίλου ἣν ἔχουσιν βεβαίαν
    πρὸς ἡμᾶς καὶ τοὺς προγόνους ἡμῶν εὔνοιαν ἀναλογιζόμενοι, δικαίως ἀπολελύκαμεν
    πάσης καθʼ ὁντινοῦν αἰτίας τρόπον.
  language: Greek
  pages:
  - 734
  - 746
  - 747
  - 748
  - 749
  - 750
  - 751
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: Considering that he has always fought alongside us like a father for his sons,
    and reckoning the firm goodwill they have toward us and our forefathers as that
    of a friend, we have rightly released them in every way from any charge whatever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'has always been our ally like a father for his sons.' The Greek participle
      can emphasize either active military support ('fought alongside') or the broader
      idea of allied assistance.
    reason: lexical_alternative
  - marker: b
    text: 'The closing Greek expression is highly emphatic, literally something like
      ''from every cause in whatever way.'' The translation renders the overall legal
      sense: complete release from any possible charge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς πατέρα
  chosen: like a father
  alternatives:
  - as a father
  lexicon: LSJ
  rationale: ὡς with the accusative here introduces comparison. 'Like a father' preserves
    the simile naturally in English.
- source_word: ὑπὲρ υἱῶν
  chosen: for his sons
  alternatives:
  - on behalf of sons
  - for children
  lexicon: LSJ
  rationale: ὑπέρ conveys advocacy/benefit, and υἱῶν is specifically 'sons.' The possessive
    sense is implied by the paternal comparison and is idiomatic in English.
- source_word: διὰ παντὸς
  chosen: always
  alternatives:
  - continually
  - through all time
  lexicon: LSJ
  rationale: The phrase denotes continual action. 'Always' is concise and natural
    while preserving the durative sense.
- source_word: συμμαχοῦντα
  chosen: has always fought alongside us
  alternatives:
  - has always been our ally
  - has always come to our aid
  lexicon: LSJ
  rationale: The participle literally means 'fighting together with' or 'acting as
    an ally.' 'Fought alongside us' preserves the martial/alliance nuance better than
    the flatter 'been our ally.'
- source_word: τήν τε ... βεβαίαν ... εὔνοιαν
  chosen: the firm goodwill
  alternatives:
  - the steadfast favor
  - the sure benevolence
  lexicon: LSJ
  rationale: εὔνοια is favorable disposition or goodwill; βεβαίαν adds firmness/steadfastness.
    'Firm goodwill' is clear modern English and keeps both elements.
- source_word: τοῦ φίλου
  chosen: as a friend
  alternatives:
  - of a friend
  - friendly
  lexicon: LSJ
  rationale: The genitive is somewhat compressed, characterizing the goodwill as that
    of a friend. 'As a friend' expresses the relational force idiomatically.
- source_word: ἣν ἔχουσιν ... πρὸς ἡμᾶς καὶ τοὺς προγόνους ἡμῶν
  chosen: they have ... toward us and our forefathers
  alternatives:
  - they maintain toward us and our ancestors
  lexicon: LSJ
  rationale: ἔχουσιν with εὔνοιαν means 'have/hold goodwill toward.' 'Forefathers'
    fits the elevated register and matches προγόνους.
- source_word: ἀναλογιζόμενοι
  chosen: Considering
  alternatives:
  - taking into account
  - reckoning
  lexicon: LSJ
  rationale: The participle gives the basis for the decision. 'Considering' is natural
    and preserves the deliberative sense.
- source_word: δικαίως
  chosen: rightly
  alternatives:
  - justly
  - with justice
  lexicon: LSJ
  rationale: δικαίως indicates that the action is just or proper. 'Rightly' is idiomatic
    and avoids over-formality.
- source_word: ἀπολελύκαμεν
  chosen: we have released
  alternatives:
  - we have set free
  - we have acquitted
  lexicon: LSJ
  rationale: The perfect indicates a completed act with present effect. In this legal
    context the verb can suggest release or discharge; 'released' is broad enough
    to fit the following legal phrase.
- source_word: πάσης καθʼ ὁντινοῦν αἰτίας τρόπον
  chosen: in every way from any charge whatever
  alternatives:
  - from every kind of accusation whatsoever
  - in every respect from any cause whatever
  lexicon: LSJ
  rationale: 'The phrase is emphatic and somewhat idiomatically piled up: πάσης +
    καθ᾽ ὁντινοῦν + αἰτίας + τρόπον. The sense is comprehensive release from any possible
    ground of accusation. ''From any charge whatever'' captures the legal force, while
    ''in every way'' reflects τρόπον.'
