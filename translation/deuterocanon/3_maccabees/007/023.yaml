id: 3MA.7.23
reference: 3 Maccabees 7:23
source:
  edition: lxx-swete-1909
  text: Εὐλογητὸς ὁ ῥύστης Ἰσραὴλ εἰς τοὺς ἀεὶ χρόνους. ἀμήν.
  language: Greek
  pages: []
  confidence: high
translation:
  text: Blessed is the deliverer of Israel for all time. Amen.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Εὐλογητὸς
  chosen: Blessed
  alternatives:
  - Praised
  - Blessing be to
  lexicon: BDAG
  rationale: Predicate adjective used in doxological blessing formulae; 'Blessed'
    preserves the liturgical and declarative force better than a more interpretive
    paraphrase.
- source_word: ὁ ῥύστης
  chosen: the deliverer
  alternatives:
  - the rescuer
  - the one who saves
  lexicon: BDAG
  rationale: The articular noun denotes one who rescues or delivers from danger. 'Deliverer'
    is concise, natural in English, and preserves the formal doxological tone.
- source_word: Ἰσραὴλ
  chosen: Israel
  rationale: Proper name transliterated according to project policy.
- source_word: εἰς τοὺς ἀεὶ χρόνους
  chosen: forever
  alternatives:
  - for all time
  - through all ages
  lexicon: BDAG
  rationale: The phrase literally means 'into the ever/always times,' an idiomatic
    expression for enduring perpetuity. 'Forever' captures the sense in readable modern
    English without unnecessary stiffness.
- source_word: ἀμήν
  chosen: Amen
  alternatives:
  - Truly
  lexicon: BDAG
  rationale: In this closing liturgical position it functions as the conventional
    affirmation 'Amen,' which should be preserved rather than translated more loosely.
