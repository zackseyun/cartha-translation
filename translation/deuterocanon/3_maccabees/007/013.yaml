translation:
  text: Then the priests of these people and the whole multitude, having praised him
    as was fitting, cried out, “Hallelujah!” and departed with joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The pronoun 'him' most likely refers to God; the Greek does not repeat the
      noun explicitly.
    reason: alternative_reading
  - marker: b
    text: Or “Alleluia”; the Greek preserves a Hebrew liturgical acclamation.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατευφημήσαντες
  chosen: having praised
  alternatives:
  - having acclaimed
  - having blessed
  - having extolled
  lexicon: LSJ
  rationale: The participle denotes strong public praise or acclamation. 'Having praised'
    is clear modern English and fits the object αὐτόν without overtranslating into
    a more specific liturgical act.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - God
  lexicon: Greek lexicon
  rationale: The pronoun is masculine singular accusative, 'him.' In context it most
    naturally refers to God, but the Greek uses the pronoun rather than the noun,
    so the main text preserves that form without interpretive expansion.
- source_word: ὡς πρέπει ἦν
  chosen: as was fitting
  alternatives:
  - as was proper
  - as was appropriate
  lexicon: LSJ
  rationale: This idiom expresses what was proper or suitable. 'As was fitting' preserves
    the dignified tone and the retrospective imperfect ἦν.
- source_word: οἱ τούτων ἱερεῖς
  chosen: the priests of these people
  alternatives:
  - their priests
  - the priests belonging to them
  lexicon: LSJ
  rationale: τούτων is a genitive plural demonstrative, literally 'of these.' Because
    a bare 'their priests' could obscure the demonstrative force, 'the priests of
    these people' makes the relation explicit while remaining natural.
- source_word: πᾶν τὸ πλῆθος
  chosen: the whole multitude
  alternatives:
  - all the crowd
  - the entire assembly
  lexicon: LSJ
  rationale: πλῆθος commonly means a multitude or large assembled group. 'The whole
    multitude' preserves both πᾶν and the collective sense.
- source_word: ἐπιφωνήσαντες
  chosen: cried out
  alternatives:
  - shouted
  - called out in response
  lexicon: LSJ
  rationale: The participle indicates raising a cry aloud. 'Cried out' is suitably
    elevated and works well with the direct quotation 'Hallelujah.'
- source_word: ἀλληλουιά
  chosen: Hallelujah
  alternatives:
  - Praise Yah
  - Alleluia
  lexicon: LSJ
  rationale: This is a transliterated liturgical exclamation. 'Hallelujah' is the
    standard English form and preserves the worship setting. 'Alleluia' is a viable
    alternative but less transparent for many readers.
- source_word: μετὰ χαρᾶς
  chosen: with joy
  alternatives:
  - rejoicing
  - joyfully
  lexicon: LSJ
  rationale: The prepositional phrase is straightforwardly rendered 'with joy,' preserving
    the noun rather than converting it to an adverb.
- source_word: ἀνέλυσαν
  chosen: departed
  alternatives:
  - dispersed
  - went away
  - broke up
  lexicon: LSJ
  rationale: In this context of a gathered crowd concluding its action, the verb most
    naturally means to depart or disperse. 'Departed' is broad enough to fit both
    the priests and the multitude.
