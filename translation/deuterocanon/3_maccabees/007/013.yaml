id: 3MA.7.13
reference: 3 Maccabees 7:13
source:
  edition: lxx-swete-1909
  text: τότε κατευφημήσαντες αὐτόν, ὡς πρέπει ἦν, οἱ τούτων ἱερεῖς καὶ πᾶν τὸ πλῆθος,
    ἐπιφωνήσαντες ἀλληλουιά, μετὰ χαρᾶς ἀνέλυσαν.
