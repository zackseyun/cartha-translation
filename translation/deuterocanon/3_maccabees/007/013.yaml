theological_decisions:
- issue: Referent of αὐτόν
  chosen_reading: The pronoun is left as 'him' rather than expanded to 'God.'
  alternative_readings:
  - God
  rationale: The context strongly suggests God as the referent, but the Greek text
    itself uses a pronoun. To avoid importing an explicit noun not present in the
    source, the main text keeps 'him.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of ἀλληλουιά
  chosen_reading: Hallelujah
  alternative_readings:
  - Alleluia
  - Praise Yah
  rationale: The term is a liturgical acclamation already naturalized in English.
    Transliteration preserves the worship character better than a fully translated
    gloss in the main text.
  doctrine_reference: Translation philosophy §6
