translation:
  text: When they arrived at Ptolemais, which is called Rose-bearing because of the
    nature of the place, where the fleet waited for them for seven days by their common
    decision,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bearing roses.' The Greek epithet ῥοδοφόρον is a descriptive title for
      Ptolemais, linked to the place's distinctive character.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παραγενηθέντες
  chosen: When they arrived
  alternatives:
  - After they came
  - Having arrived
  lexicon: BDAG
  rationale: Aorist passive participle of παραγίνομαι used in an intransitive sense,
    introducing the next event temporally. 'When they arrived' gives natural English
    while preserving the participial force.
- source_word: Πτολεμαΐδα
  chosen: Ptolemais
  alternatives:
  - Ptolemaïs
  lexicon: LSJ
  rationale: Standard English transliteration of the place name; names are transliterated
    rather than translated.
- source_word: τὴν ὀνομαζομένην
  chosen: which is called
  alternatives:
  - the one called
  - which is named
  lexicon: BDAG
  rationale: Straightforward relative description of the city; 'which is called' is
    idiomatic and close to the Greek.
- source_word: διὰ τὴν τοῦ τόπου ἰδιότητα
  chosen: because of the character of the place
  alternatives:
  - because of the peculiar quality of the region
  - on account of the special nature of the place
  lexicon: LSJ
  rationale: ἰδιότης denotes a distinctive property or characteristic. 'Character
    of the place' is readable modern English without overinterpreting the exact feature.
- source_word: ῥοδοφόρον
  chosen: Rose-bearing
  alternatives:
  - rose-producing
  - bearing roses
  lexicon: LSJ
  rationale: The adjective literally means 'rose-bearing.' Retaining the compound
    sense explains the epithet while staying close to the Greek.
- source_word: ἐν ᾗ
  chosen: where
  alternatives:
  - in which
  lexicon: BDAG
  rationale: Refers back to the city. 'Where' is the natural English equivalent for
    location.
- source_word: προσέμεινεν
  chosen: waited for
  alternatives:
  - remained for
  - stayed for
  lexicon: LSJ
  rationale: With accusative αὐτούς, the verb conveys remaining in expectation of
    or waiting for them, not merely staying somewhere. 'Waited for' best fits the
    syntax.
- source_word: ὁ στόλος
  chosen: the fleet
  alternatives:
  - the naval force
  lexicon: LSJ
  rationale: στόλος here refers to the assembled ships. 'Fleet' is the concise and
    standard rendering.
- source_word: κατὰ κοινὴν αὐτῶν βουλήν
  chosen: by their common decision
  alternatives:
  - by common agreement among them
  - according to their shared plan
  lexicon: BDAG
  rationale: The phrase indicates a jointly made resolve or plan. 'By their common
    decision' preserves both the collective and deliberative sense.
- source_word: ἡμέρας ἑπτά
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: BDAG
  rationale: Accusative of duration; 'for seven days' makes the temporal force explicit
    in English.
