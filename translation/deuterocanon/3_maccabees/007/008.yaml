translation:
  text: And we have ordered that everyone return to his own home, with no one in any
    way harming them at all, nor insulting them over the things that happened contrary
    to reason.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'return to their own places.' The Greek εἰς τὰ ἴδια can denote one's
      own home, property, or place.
    reason: lexical_alternative
  - marker: b
    text: Or 'over what happened irrationally' / 'over the unreasonable things that
      happened.' The phrase 'contrary to reason' renders Greek παρὰ λόγον closely.
    reason: lexical_alternative
lexical_decisions:
- source_word: προστετάχαμεν
  chosen: we have ordered
  alternatives:
  - we have commanded
  - we have given orders
  lexicon: LSJ
  rationale: Perfect form conveys a standing directive already issued; 'ordered' is
    clear modern English and preserves official force without sounding overly stiff.
- source_word: ἑκάστῳ πάντας
  chosen: that everyone
  alternatives:
  - all of them, each one
  - every one of them
  lexicon: LSJ
  rationale: The construction compresses the sense that all are to return, each to
    his own place. 'Everyone' gives natural English while preserving distributive
    force.
- source_word: εἰς τὰ ἴδια ἐπιστρέφειν
  chosen: return to his own home
  alternatives:
  - return to their own places
  - go back to what is theirs
  lexicon: LSJ
  rationale: τὰ ἴδια commonly means one's own place/home or property. In this context
    of release and resettlement, 'his own home' best captures the idiom in readable
    English.
- source_word: ἐν παντὶ τρόπῳ
  chosen: in any way
  alternatives:
  - by every means
  - in every respect
  lexicon: LSJ
  rationale: Idiomatic adverbial phrase emphasizing total prohibition. 'In any way'
    is natural and sufficiently comprehensive.
- source_word: μηθενὸς αὐτοὺς τὸ σύνολον καταβλάπτοντος
  chosen: with no one ... harming them at all
  alternatives:
  - let no one injure them in the least
  - with no one damaging them in any respect
  lexicon: LSJ
  rationale: The genitive absolute prohibits any person from harming them; τὸ σύνολον
    intensifies the negation ('altogether,' 'at all'). The chosen rendering preserves
    both the prohibition and the emphatic totality.
- source_word: μήτε ὀνειδίζοντος
  chosen: nor insulting them
  alternatives:
  - nor reproaching them
  - nor taunting them
  lexicon: LSJ
  rationale: ὀνειδίζω includes reproach or insult. 'Insulting' is concise, contemporary,
    and fits the social abuse in view.
- source_word: περὶ τῶν γεγενημένων
  chosen: over the things that happened
  alternatives:
  - about what had happened
  - concerning the events that occurred
  lexicon: LSJ
  rationale: Perfect participle points to completed events now in view. 'The things
    that happened' is straightforward and preserves reference to the prior ordeal.
- source_word: παρὰ λόγον
  chosen: contrary to reason
  alternatives:
  - irrationally
  - beyond all reason
  - contrary to expectation
  lexicon: LSJ
  rationale: The phrase literally means 'against reason' or 'contrary to reason.'
    It likely characterizes the events as unreasonable/absurd. Retaining the phrase
    rather than smoothing it away preserves the Greek's evaluative nuance.
