id: 3MA.7.8
reference: 3 Maccabees 7:8
source:
  edition: lxx-swete-1909
  text: καὶ προστετάχαμεν ἑκάστῳ πάντας εἰς τὰ ἴδια ἐπιστρέφειν, ἐν παντὶ τρόπῳ μηθενὸς
    αὐτοὺς τὸ σύνολον καταβλάπτοντος, μήτε ὀνειδίζοντος περὶ τῶν γεγενημένων παρὰ
    λόγον.
  language: Greek
