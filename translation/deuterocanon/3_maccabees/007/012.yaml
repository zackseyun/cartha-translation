theological_decisions:
- issue: Moral/theological framing of violence against lawbreakers
  chosen_reading: Retain the text's direct statement that permission was given to
    destroy those who had transgressed the law of God, without softening the violence
    or adding justification beyond the Greek.
  alternative_readings:
  - Render more euphemistically as 'punish' or 'remove'
  rationale: The Greek uses the strong verb ἐξολεθρεύσωσιν. The translation should
    not mute the severity of the action or import explanatory theology not present
    in the verse.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
