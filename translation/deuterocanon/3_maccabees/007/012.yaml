id: 3MA.7.12
reference: 3 Maccabees 7:12
source:
  edition: lxx-swete-1909
  text: ὁ δὲ τἀληθὲς αὐτοὺς λέγειν παραδεξάμενος καὶ παραινέσας, ἔδωκεν αὐτοῖς ἄδειαν
    πάντων, ὅπως τοὺς παραβεβηκότας τοῦ θεοῦ τὸν νόμον ἐξολεθρεύσωσιν κατὰ πάντα τὸν
    ὑπὸ τῆς βασιλείας αὐτοῦ τόπον μετὰ παρρησίας, ἄνευ πάσης βασιλικῆς ἐξουσίας καὶ
    ἐπισκέψεως.
  language: Greek
  pages:
  - 734
  - 746
  - 747
  - 748
  - 749
  - 750
  - 751
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: And when he accepted that they were speaking the truth and encouraged them,
    he gave them full permission, so that they might destroy those who had transgressed
    the law of God throughout every place under his kingdom, with boldness, without
    any royal authority or oversight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with confidence' or 'openly' for 'with boldness' (μετὰ παρρησίας).
    reason: lexical_alternative
  - marker: b
    text: The final phrase may also be understood as 'without any royal authorization
      or inspection,' emphasizing the absence of direct royal involvement in the action.
    reason: lexical_alternative
lexical_decisions:
- source_word: τἀληθές
  chosen: the truth
  alternatives:
  - what was true
  - truly
  lexicon: LSJ
  rationale: Articular neuter adjective used substantivally; in context with λέγειν
    it means 'to speak the truth,' not merely 'to speak truly.'
- source_word: παραδεξάμενος
  chosen: accepted
  alternatives:
  - received
  - admitted
  - acknowledged
  lexicon: LSJ
  rationale: The participle indicates receiving/accepting their statement as valid.
    'Accepted' is idiomatic English and preserves the sense of recognizing their report
    as true.
- source_word: παραινέσας
  chosen: urged them on
  alternatives:
  - encouraged them
  - exhorted them
  - advised them
  lexicon: LSJ
  rationale: The verb can mean exhort or encourage. In this context, following his
    acceptance of their report and preceding the grant of permission, it conveys active
    encouragement toward the proposed action.
- source_word: ἄδειαν πάντων
  chosen: full permission
  alternatives:
  - complete liberty
  - leave in all respects
  - permission for everything
  lexicon: LSJ
  rationale: ἄδεια is permission/liberty; πάντων intensifies the scope. 'Full permission'
    is natural English and captures the comprehensive grant.
- source_word: τοὺς παραβεβηκότας
  chosen: those who had transgressed
  alternatives:
  - those who had violated
  - the transgressors
  lexicon: LSJ
  rationale: Perfect participle of παραβαίνω denotes those who have crossed over/violated.
    'Had transgressed' preserves the completed violation with continuing status.
- source_word: τοῦ θεοῦ τὸν νόμον
  chosen: the law of God
  alternatives:
  - God's law
  lexicon: LSJ
  rationale: Straightforward genitival construction. 'The law of God' keeps the formal
    weight of the phrase.
- source_word: ἐξολεθρεύσωσιν
  chosen: destroy
  alternatives:
  - wipe out
  - exterminate
  - cut off
  lexicon: LSJ
  rationale: The verb is strong and denotes utter destruction. 'Destroy' preserves
    the severity without importing a more specific modern term not demanded by the
    Greek.
- source_word: κατὰ πάντα τὸν ὑπὸ τῆς βασιλείας αὐτοῦ τόπον
  chosen: throughout every place under his kingdom
  alternatives:
  - in every place under his rule
  - throughout all the territory subject to his kingdom
  lexicon: LSJ
  rationale: The phrase expresses distributive scope across the realm. 'Throughout
    every place under his kingdom' stays close to the Greek while remaining readable.
- source_word: μετὰ παρρησίας
  chosen: with boldness
  alternatives:
  - openly
  - with confidence
  - freely
  lexicon: LSJ
  rationale: παρρησία often carries the sense of bold, open freedom of action or speech.
    'With boldness' preserves the lexical force and avoids over-specifying publicity.
- source_word: ἄνευ πάσης βασιλικῆς ἐξουσίας καὶ ἐπισκέψεως
  chosen: without any royal authority or oversight
  alternatives:
  - without any royal authorization or inspection
  - without any intervention or supervision from the king
  lexicon: LSJ
  rationale: ἄνευ with the paired nouns indicates absence of royal involvement. ἐξουσία
    here is best taken as official authority/authorization, and ἐπισκέψις as oversight/inspection.
    'Royal authority or oversight' is concise and faithful.
