theological_decisions:
- issue: Rendering σωτηρία / σωτήρ in a narrative deliverance context
  chosen_reading: Translate σωτηρία as 'deliverance' and σωτήρ as 'Savior'
  alternative_readings:
  - Translate both with rescue/deliverer language for tighter narrative consistency
  - Translate both with salvation/savior language for stronger theological continuity
  rationale: The verse combines immediate historical rescue with elevated doxological
    language. Using 'deliverance' for σωτηρία fits the narrative event, while 'Savior'
    for the divine title σωτήρ preserves the solemn theological register of the praise
    formula.
  doctrine_reference: Translation philosophy §1, §5
