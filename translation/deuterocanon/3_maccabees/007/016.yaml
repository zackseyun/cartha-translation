id: 3MA.7.16
reference: 3 Maccabees 7:16
source:
  edition: lxx-swete-1909
  text: αὐτοὶ δὲ οἱ μέχρι θανάτου τὸν θεὸν ἐσχηκότες, παντελῆ σωτηρίαν ἀπόλαυσιν ἐσχηκότες,
    ἀνέζευξαν ἐκ τῆς πόλεως παντοίοις εὐωδεστάτοις ἄνθεσι κατεστρωμένοι μετʼ εὐφροσύνης
    καὶ βοῆς, ἐν αἴνοις καὶ παμμελέτοις ὕμνοις εὐχαριστοῦντες τῷ θεῷ τῶν πατέρων αὐτῶν
    ἁγίῳ σωτῆρι τοῦ Ἰσραήλ.
  language: Greek
  pages:
