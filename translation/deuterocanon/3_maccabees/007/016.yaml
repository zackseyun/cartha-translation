translation:
  text: But those who had held fast to God even to death, having obtained complete
    deliverance, departed from the city, strewn with all kinds of very fragrant flowers,
    with rejoicing and shouting, giving thanks with praises and full songs of hymns
    to God, the holy Savior of Israel, the God of their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having enjoyed full salvation.' The Greek σωτηρία can denote rescue/deliverance
      in context, while also carrying broader salvation language.
    reason: lexical_alternative
  - marker: b
    text: Or 'the holy deliverer of Israel.' The Greek σωτήρ may be rendered either
      'Savior' or 'deliverer' depending on whether the emphasis is on title or immediate
      rescue.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέχρι θανάτου
  chosen: even to death
  alternatives:
  - until death
  - to the point of death
  lexicon: LSJ
  rationale: The phrase marks steadfastness carried to the extremity of possible martyrdom.
    'Even to death' is idiomatic English and preserves the force without implying
    they actually died here.
- source_word: τὸν θεὸν ἐσχηκότες
  chosen: had held fast to God
  alternatives:
  - had clung to God
  - had kept God
  - had possessed God
  lexicon: LSJ
  rationale: ἐσχηκότες from ἔχω is idiomatic here for maintaining allegiance or attachment,
    not literal possession. 'Held fast to God' best conveys loyal adherence in context.
- source_word: παντελῆ σωτηρίαν ἀπόλαυσιν ἐσχηκότες
  chosen: having obtained complete deliverance
  alternatives:
  - having enjoyed full salvation
  - having received total rescue
  lexicon: LSJ
  rationale: σωτηρία can mean rescue/deliverance or salvation. In this narrative setting
    of threatened destruction and subsequent preservation, 'deliverance' best fits
    while retaining theological resonance. παντελής intensifies to 'complete.'
- source_word: ἀνέζευξαν
  chosen: departed
  alternatives:
  - set out
  - marched out
  - went forth
  lexicon: LSJ
  rationale: The verb can denote breaking camp or setting out. Since the movement
    is away from the city after deliverance, 'departed' is natural and sufficiently
    broad.
- source_word: παντοίοις εὐωδεστάτοις ἄνθεσι κατεστρωμένοι
  chosen: strewn with all kinds of very fragrant flowers
  alternatives:
  - garlanded with every sort of sweetest-smelling flowers
  - covered with all manner of fragrant blossoms
  lexicon: LSJ
  rationale: κατεστρωμένοι suggests being spread over or decked with; in procession
    context, 'strewn with' captures the visual effect. εὐωδεστάτοις is superlative,
    hence 'very fragrant.'
- source_word: μετʼ εὐφροσύνης καὶ βοῆς
  chosen: with rejoicing and shouting
  alternatives:
  - with gladness and outcry
  - with merriment and acclamation
  lexicon: LSJ
  rationale: εὐφροσύνη is festive joy; βοή is loud cry/shout. 'Rejoicing and shouting'
    preserves both celebration and volume.
- source_word: ἐν αἴνοις καὶ παμμελέτοις ὕμνοις
  chosen: in praises and full-voiced hymns
  alternatives:
  - with praises and all-melodious hymns
  - in songs of praise and richly sung hymns
  lexicon: LSJ
  rationale: αἶνοι are praises. παμμελέτοις is rare and likely denotes fully musical
    or full-voiced song; 'full-voiced hymns' is a defensible idiomatic rendering that
    preserves the heightened musical sense without over-specifying.
- source_word: τῷ θεῷ τῶν πατέρων αὐτῶν
  chosen: the God of their fathers
  alternatives:
  - their fathers' God
  lexicon: LSJ
  rationale: A standard covenantal expression; the chosen rendering is clear and preserves
    the ancestral-theological framing.
- source_word: ἁγίῳ σωτῆρι τοῦ Ἰσραήλ
  chosen: the holy Savior of Israel
  alternatives:
  - the holy deliverer of Israel
  - Israel's holy savior
  lexicon: LSJ
  rationale: σωτήρ can be 'savior' or 'deliverer.' Because the phrase functions as
    a divine title and the context celebrates God's rescue, 'Savior' preserves both
    title-like dignity and theological resonance. The adjective ἁγίῳ is retained as
    'holy.'
