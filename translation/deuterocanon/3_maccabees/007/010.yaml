theological_decisions:
- issue: Reference of 'the holy God' and relation to 'the law of God'
  chosen_reading: The phrase refers straightforwardly to Israel's God, whose law certain
    Jews had willfully transgressed.
  rationale: The verse condemns apostasy within the Jewish people without adding broader
    theological claims. The translation preserves the text's own framing and does
    not soften or intensify it.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological
    tension rather than resolve it'
