id: 3MA.7.10
reference: 3 Maccabees 7:10
source:
  edition: lxx-swete-1909
  text: Λαβόντες δὲ τὴν ἐπιστολὴν ταύτην, οὐκ ἐσπούδασαν εὐθέως περὶ τὴν ἄφοδον, ἀλλὰ
    τὸν βασιλέα προσηξίωσαν τοὺς ἐκ τοῦ γένους τῶν Ἰουδαίων τὸν ἅγιον θεὸν αὐθαιρέτως
    παραβεβηκότας τοῦ θεοῦ τὸν νόμον, τυχεῖν διʼ αὐτῶν τῆς ὀφειλομένης κολάσεως.
  language: Greek
  pages:
  - 734
  - 746
  - 747
  - 748
  - 749
  - 750
  - 751
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: But when they received this letter, they did not immediately hasten for the
    departure; instead, they urged the king that those of the Jewish race who had
    willfully transgressed the law of the holy God might, through them, receive the
    punishment that was due.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the return' instead of 'the departure'; the Greek term can be understood
      from either the perspective of leaving the present place or going back to a
      prior one.
    reason: lexical_alternative
  - marker: b
    text: Literally 'those from the race of the Jews.'
    reason: lexical_alternative
  - marker: c
    text: Or 'might suffer at their hands the punishment that was due.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λαβόντες
  chosen: when they received
  alternatives:
  - having received
  - after receiving
  lexicon: LSJ
  rationale: Aorist participle introducing the circumstance prior to the main action.
    'When they received' is natural English and preserves the temporal force without
    woodenness.
- source_word: ἐπιστολήν
  chosen: letter
  alternatives:
  - written order
  - epistle
  lexicon: LSJ
  rationale: Standard sense in narrative context; 'letter' is clear modern English.
- source_word: οὐκ ἐσπούδασαν εὐθέως περὶ τὴν ἄφοδον
  chosen: they did not immediately hasten about the departure
  alternatives:
  - they did not at once make haste concerning the return
  - they did not immediately concern themselves with the departure
  lexicon: LSJ
  rationale: ἐσπούδασαν conveys eagerness or haste; εὐθέως adds immediacy. ἄφοδος
    can denote return/departure depending on perspective. In context, after receiving
    the letter they delay setting out, so 'departure' best fits the immediate narrative
    action while preserving some ambiguity in English.
- source_word: προσηξίωσαν
  chosen: urged
  alternatives:
  - requested
  - deemed worthy to ask
  - petitioned
  lexicon: LSJ
  rationale: The verb here expresses an earnest request made to the king. 'Urged'
    captures the force better than the more formal and less idiomatic 'deemed worthy
    to ask.'
- source_word: τοὺς ἐκ τοῦ γένους τῶν Ἰουδαίων
  chosen: those from the Jewish race
  alternatives:
  - those of the Jewish people
  - those from the stock of the Jews
  lexicon: LSJ
  rationale: γένος denotes kin-group, people, or race. 'Jewish race' is a close rendering
    of the Greek wording in this historical text, though 'people' would be smoother.
    The more literal choice preserves the ethnic sense.
- source_word: τὸν ἅγιον θεὸν
  chosen: the holy God
  alternatives:
  - the Holy God
  lexicon: LSJ
  rationale: The phrase is descriptive rather than a fixed title in this context;
    lower-case 'holy' keeps the sense without over-formalizing.
- source_word: αὐθαιρέτως
  chosen: willfully
  alternatives:
  - deliberately
  - of their own accord
  lexicon: LSJ
  rationale: The adverb emphasizes voluntary, self-chosen action. 'Willfully' communicates
    culpable intentionality well.
- source_word: παραβεβηκότας
  chosen: had transgressed
  alternatives:
  - had violated
  - had overstepped
  lexicon: LSJ
  rationale: Perfect participle indicating completed violation with present relevance.
    'Had transgressed' fits legal-religious context and pairs naturally with 'law.'
- source_word: τοῦ θεοῦ τὸν νόμον
  chosen: the law of ... God
  alternatives:
  - God's law
  lexicon: LSJ
  rationale: Rendered as 'the law of the holy God' in idiomatic English order while
    preserving possession and theological weight.
- source_word: τυχεῖν διʼ αὐτῶν τῆς ὀφειλομένης κολάσεως
  chosen: might, through them, receive the punishment that was due
  alternatives:
  - might obtain through them the punishment owed
  - might suffer at their hands the deserved penalty
  lexicon: LSJ
  rationale: τυχεῖν with a genitive can mean 'obtain/meet with.' διʼ αὐτῶν most naturally
    means 'through them' or instrumentally 'at their hands.' ὀφειλομένης means owed/due.
    'Receive the punishment that was due' is clear and preserves the judicial sense.
