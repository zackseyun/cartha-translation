id: 3MA.7.20
reference: 3 Maccabees 7:20
source:
  edition: lxx-swete-1909
  text: ἃς καὶ ἀνιερώσαντες ἐν στήλῃ, κατὰ τὸν τῆς συμποσίας τόπον προσευχῆς καθιδρύσαντες,
    ἀνέλυσαν ἀσινεῖς, ἐλεύθεροι, ὑπέρχαρεις, διὰ τε γῆς καὶ θαλάσσης καὶ ποταμῶν ἀνασωζόμενοι
    τῇ τοῦ βασιλέως ἐπιταγῇ,
  language: Greek
  pages:
  - 734
  - 746
  - 747
  - 748
  - 749
  - 750
  - 751
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: After also inscribing these things on a pillar, and establishing a place of
    prayer at the site of the banquet, they departed unharmed, free, and overflowing
    with joy, being brought safely back by land and sea and river, by the king’s command,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dedicating them on a pillar'; the Greek participle can carry the sense
      of publicly setting up or consecrating an inscription.
    reason: lexical_alternative
  - marker: b
    text: Or 'being preserved safely through land and sea and rivers.' The Greek participle
      emphasizes safe preservation during the journey.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνιερώσαντες
  chosen: inscribing
  alternatives:
  - dedicating
  - consecrating
  - recording publicly
  lexicon: LSJ
  rationale: In context with ἐν στήλῃ ('on a pillar/stele'), the participle most naturally
    refers to setting the matter up in inscribed public form rather than a merely
    abstract dedication. 'Inscribing' makes the physical action explicit in idiomatic
    English while staying anchored to the Greek construction.
- source_word: στήλῃ
  chosen: pillar
  alternatives:
  - stele
  - monument
  lexicon: LSJ
  rationale: The word denotes an erected stone marker or monument. 'Pillar' is natural
    English and preserves the public commemorative sense. 'Stele' is more technical
    and less readable.
- source_word: κατὰ τὸν τῆς συμποσίας τόπον
  chosen: at the site of the banquet
  alternatives:
  - in the place of the banquet
  - according to the place of the feast
  lexicon: LSJ
  rationale: This phrase identifies the location connected with the banquet episode.
    'At the site of the banquet' is clear modern English and reflects the local sense
    of the phrase.
- source_word: προσευχῆς
  chosen: of prayer
  alternatives:
  - for prayer
  lexicon: LSJ
  rationale: The genitive with τόπον and καθιδρύσαντες indicates a place characterized
    by prayer. 'A place of prayer' is the most idiomatic rendering.
- source_word: καθιδρύσαντες
  chosen: establishing
  alternatives:
  - founding
  - setting up
  lexicon: LSJ
  rationale: The verb conveys setting something in place on a lasting basis. 'Establishing'
    fits the commemorative and institutional tone better than the more temporary 'setting
    up.'
- source_word: ἀνέλυσαν
  chosen: departed
  alternatives:
  - set out
  - returned
  lexicon: LSJ
  rationale: The verb commonly means to depart or break up from a place. Given the
    following travel phrases, 'departed' is the safest broad rendering. 'Returned'
    may fit the wider context but is more interpretive than the verb itself requires.
- source_word: ἀσινεῖς
  chosen: unharmed
  alternatives:
  - safe
  - uninjured
  lexicon: LSJ
  rationale: The adjective emphasizes freedom from injury or damage. 'Unharmed' is
    concise and natural.
- source_word: ἐλεύθεροι
  chosen: free
  alternatives:
  - at liberty
  lexicon: LSJ
  rationale: The term straightforwardly denotes freedom/liberty, likely highlighting
    their release from prior danger or restraint.
- source_word: ὑπέρχαρεις
  chosen: overflowing with joy
  alternatives:
  - exceedingly joyful
  - overjoyed
  lexicon: LSJ
  rationale: The compound intensifies joy beyond a simple 'glad.' 'Overflowing with
    joy' preserves the heightened emotional force in readable English.
- source_word: ἀνασωζόμενοι
  chosen: being brought safely back
  alternatives:
  - being preserved
  - being saved through
  - being brought safely
  lexicon: LSJ
  rationale: The participle conveys safe preservation through the journey, with the
    travel routes immediately following. 'Being brought safely back' captures both
    preservation and successful conveyance, though 'back' is mildly contextual.
- source_word: διὰ τε γῆς καὶ θαλάσσης καὶ ποταμῶν
  chosen: by land and sea and river
  alternatives:
  - through land and sea and rivers
  - by land and sea and rivers
  lexicon: LSJ
  rationale: The phrase lists the routes of safe transit. English idiom favors 'by
    land and sea'; retaining singular 'river' would be overly wooden, so the translation
    smooths the sequence while preserving the threefold travel imagery.
- source_word: τῇ τοῦ βασιλέως ἐπιταγῇ
  chosen: by the king’s command
  alternatives:
  - at the king's order
  - under the king's decree
  lexicon: LSJ
  rationale: ἐπιταγή denotes an authoritative command or order. 'By the king’s command'
    is direct and idiomatic.
