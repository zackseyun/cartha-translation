theological_decisions:
- issue: Commemorative religious action at the banquet site
  chosen_reading: They established a place of prayer at that location as a memorial
    response to deliverance.
  alternative_readings:
  - They merely designated a prayer site temporarily.
  rationale: The combination of inscribing a pillar and καθιδρύσαντες suggests a durable
    commemorative act rather than a momentary gathering. This is a contextual decision,
    not a doctrinal expansion.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of ἀνασωζόμενοι
  chosen_reading: The text emphasizes providential safe return/travel without explicitly
    naming God in this clause.
  alternative_readings:
  - The clause could be rendered more neutrally as 'being preserved safely' without
    directional nuance.
  rationale: The wider context is one of divine deliverance, but this clause itself
    attributes the practical means to the king's command. The translation preserves
    that tension and does not import an explicit divine subject here.
  doctrine_reference: Translation philosophy §3
