theological_decisions:
- issue: Moral/religious characterization of βεβήλους
  chosen_reading: the profane
  alternative_readings:
  - the impious
  - godless men
  rationale: The term marks these men as religiously defiled or irreverent from the
    narrator's perspective. 'The profane' preserves that evaluative force without
    importing a more developed theological category than the Greek itself states.
  doctrine_reference: Translation philosophy §1, §6
- issue: Interpretation of the difficult clause ἣν καὶ ἤγαγον εὐφροσύνην μετὰ χαρᾶς
    βεβήλους χειρωσάμενοι
  chosen_reading: they observed it as a celebration with joy, having laid hands on
    the profane
  alternative_readings:
  - they celebrated joyfully because they had overpowered the profane
  - they made that day a festal occasion after seizing the impious
  rationale: The transmitted Greek is syntactically awkward, and the source metadata
    flags a major mismatch. The translation stays close to the extant wording while
    producing coherent English, rather than resolving the clause into a smoother paraphrase
    not directly warranted by the witness.
  doctrine_reference: Translation philosophy §1, §3
