translation:
  text: On that day they killed more than three hundred men, and they observed it
    as a celebration with joy, having laid hands on the profane.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'they brought/led gladness'; the sense is that they kept
      or observed the day as a celebration.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult in the Greek witness used here. 'Having laid
      hands on the profane' could also be understood as 'having overpowered the impious.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνεῖλον
  chosen: they killed
  alternatives:
  - they slew
  - they did away with
  lexicon: LSJ
  rationale: Aorist of ἀναιρέω in narrative context commonly means 'kill' or 'slay.'
    'Killed' is clear modern English and preserves the violent sense without archaism.
- source_word: ὑπὲρ τοὺς τριακοσίους ἄνδρας
  chosen: more than three hundred men
  alternatives:
  - over three hundred men
  lexicon: LSJ
  rationale: ὑπέρ with the accusative here indicates excess in number, 'more than/over.'
    'Men' matches ἄνδρας specifically rather than a generic 'people.'
- source_word: ἤγαγον εὐφροσύνην
  chosen: they observed it as a celebration
  alternatives:
  - they made merry
  - they kept rejoicing
  - they held festivity
  lexicon: LSJ
  rationale: Literally 'they led/brought gladness,' an idiom for celebrating or keeping
    festivity. 'Observed it as a celebration' captures the eventive sense in readable
    English.
- source_word: μετὰ χαρᾶς
  chosen: with joy
  alternatives:
  - with gladness
  lexicon: LSJ
  rationale: Straightforward accompaniment phrase; 'joy' is the most natural concise
    rendering.
- source_word: βεβήλους
  chosen: the profane
  alternatives:
  - the impious
  - the unholy
  - godless men
  lexicon: LSJ
  rationale: βέβηλος denotes what is profane or irreverent. Substantival use allows
    'the profane.' 'Impious' is possible, but 'profane' stays closer lexically.
- source_word: χειρωσάμενοι
  chosen: having laid hands on
  alternatives:
  - having overpowered
  - having seized
  - having taken in hand
  lexicon: LSJ
  rationale: The participle from χειρόω can mean to get into one's hand, overpower,
    or seize. Given the immediate context of killing, 'having laid hands on' preserves
    the physical action while leaving the exact nuance open. The Greek of this clause
    is somewhat difficult, so a less over-interpreted rendering is preferable.
