  - 746
  - 747
  - 748
  - 749
  - 750
  - 751
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: They themselves also killed along the road any compatriot of the defiled people
    who had fallen in with them, and they did away with them as examples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with exemplary punishments' or 'making a public example of them.' The
      Greek μετὰ παραδειγματισμῶν can emphasize public warning or disgrace in the
      manner of their killing.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ τε
  chosen: They themselves also
  alternatives:
  - They also themselves
  - And they themselves too
  lexicon: LSJ
  rationale: The combination is emphatic, highlighting that these people personally
    carried out the action. 'They themselves also' preserves both emphasis and connective
    force in natural English.
- source_word: τὸν ἐμπεσόντα
  chosen: who had fallen in with them
  alternatives:
  - who had fallen among them
  - who had encountered them
  - who had fallen into their hands
  lexicon: LSJ
  rationale: From ἐμπίπτω, here in context of meeting someone on the way. 'Fallen
    in with them' captures an incidental encounter on the road better than the more
    wooden 'fallen among them.'
- source_word: τῶν μεμιαμμένων
  chosen: of the defiled people
  alternatives:
  - of the polluted people
  - of the contaminated ones
  - of the profaned people
  lexicon: LSJ
  rationale: 'The perfect participle of μιαίνω denotes those regarded as ritually
    or morally defiled. ''Defiled'' is the most direct and readable rendering; the
    genitive is taken partitively with the singular object: any one of the defiled
    group.'
- source_word: ὁμοεθνῆ
  chosen: compatriot
  alternatives:
  - one of the same nation
  - fellow countryman
  - kinsman
  lexicon: LSJ
  rationale: The word denotes someone of the same people or nation. 'Compatriot' is
    concise and natural, though the singular English here is generic.
- source_word: κατὰ τὴν ὁδὸν
  chosen: along the road
  alternatives:
  - on the road
  - by the way
  lexicon: LSJ
  rationale: This phrase marks the circumstance/location of the encounter. 'Along
    the road' reads naturally and preserves the travel setting.
- source_word: ἀπέκτεννον
  chosen: killed
  alternatives:
  - were killing
  - put to death
  - slew
  lexicon: LSJ
  rationale: The imperfect may suggest repeated action, but English can convey this
    sufficiently through the broader sentence context. 'Killed' is straightforward
    and avoids archaic diction.
- source_word: μετὰ παραδειγματισμῶν
  chosen: as examples
  alternatives:
  - with public exposure
  - with exemplary punishments
  - as a warning
  lexicon: LSJ
  rationale: The phrase indicates making them a public example or warning. 'As examples'
    is concise and preserves the exemplary force without over-specifying the exact
    mode of humiliation or punishment.
- source_word: ἀνήρουν
  chosen: did away with them
  alternatives:
  - destroyed them
  - killed them
  - removed them
  lexicon: LSJ
  rationale: ἀναιρέω can mean kill or do away with. Since ἀπέκτεννον already expressed
    killing, varying the English avoids awkward repetition while still conveying lethal
    action.
