id: 3MA.7.14
reference: 3 Maccabees 7:14
source:
  edition: lxx-swete-1909
  text: αὐτοὶ τε τὸν ἐμπεσόντα τῶν μεμιαμμένων ὁμοεθνῆ κατὰ τὴν ὁδὸν ἀπέκτεννον, καὶ
    μετὰ παραδειγματισμῶν ἀνήρουν.
  language: Greek
  pages:
