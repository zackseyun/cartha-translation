id: 3MA.7.18
reference: 3 Maccabees 7:18
source:
  edition: lxx-swete-1909
  text: ἐκεῖ ἐποίησαν πότον σωτήριον, τοῦ βασιλέως χορηγήσαντος αὐτοῖς εὐψύχως τὰ
    πρὸς τὴν ἄφιξιν πάντα ἑκάστῳ ἕως ἐπὶ τὴν ἰδίαν οἰκίαν.
  language: Greek
