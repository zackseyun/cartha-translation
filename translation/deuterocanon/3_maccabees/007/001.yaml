translation:
  text: 'King Ptolemy Philopator to the generals in Egypt and to all who are appointed
    over affairs: greetings and good health.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the generals throughout Egypt,' reflecting the distributive nuance
      of κατʼ Αἴγυπτον.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'greetings and to be strong/well'; this is a standard Greek letter
      formula expressing greeting and a wish for well-being.
    reason: cultural_note
lexical_decisions:
- source_word: Βασιλεὺς
  chosen: King
  alternatives:
  - The king
  lexicon: LSJ
  rationale: The noun is anarthrous and functions as the royal title heading the letter.
    'King' is the natural English equivalent in epistolary style.
- source_word: Πτολεμαῖος Φιλοπάτωρ
  chosen: Ptolemy Philopator
  rationale: Personal name and epithet are transliterated per project policy to transliterate
    names rather than translate them.
- source_word: τοῖς κατʼ Αἴγυπτον στρατηγοῖς
  chosen: to the generals in Egypt
  alternatives:
  - to the generals throughout Egypt
  - to the commanders in Egypt
  lexicon: LSJ
  rationale: στρατηγοῖς can mean 'generals' or 'commanders'; 'generals' preserves
    the military-administrative title. κατʼ Αἴγυπτον idiomatically means those situated
    through/in Egypt; 'in Egypt' is concise and natural, while 'throughout Egypt'
    remains a viable nuance.
- source_word: πᾶσιν τοῖς τεταγμένοις ἐπὶ πραγμάτων
  chosen: to all who are appointed over affairs
  alternatives:
  - to all who are set over matters
  - to all officials in charge of business
  lexicon: LSJ
  rationale: τεταγμένοις (from τάσσω) denotes those appointed or assigned; ἐπὶ πραγμάτων
    indicates responsibility over administrative matters/affairs. 'Appointed over
    affairs' keeps the formal administrative sense without over-paraphrasing.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - greeting
  lexicon: LSJ
  rationale: In Greek letter openings, χαίρειν is the conventional epistolary salutation.
    'Greetings' best reflects its idiomatic function in English rather than the literal
    verbal sense 'rejoice'.
- source_word: ἐρρῶσθαι
  chosen: good health
  alternatives:
  - farewell
  - be strong
  - be well
  lexicon: LSJ
  rationale: The infinitive is used in letter formulae as a wish for well-being/health.
    'Good health' communicates the epistolary closing wish naturally in English when
    paired with 'greetings'.
