  text: Βασιλεὺς Πτολεμαῖος Φιλοπάτωρ τοῖς κατʼ Αἴγυπτον στρατηγοῖς καὶ πᾶσιν τοῖς
    τεταγμένοις ἐπὶ πραγμάτων χαίρειν καὶ ἐρρῶσθαι.
