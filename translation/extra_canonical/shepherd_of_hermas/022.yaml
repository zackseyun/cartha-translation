id: HERM.V.4.i
reference: Shepherd of Hermas — Vision 4, section i
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: ἣν εἶδον, ἀδελφοί, μετὰ ἡμέρας εἴκοσι τῆς προτέρας ὁράσεως τῆς γενομένης,
    εἰς τύπον τῆς θλίψεως τῆς ἐπερχομένης. 2. ὑπῆγον εἰς ἀγρὸν τῇ ὁδῷ τῇ Καμπανῇ.
    ἀπὸ τῆς ὁδοῦ τῆς δημοσίας ἐστὶν ὡσεὶ στάδια δέκα· ῥᾳδίως δὲ ὁδεύεται ὁ τόπος.
    3. μόνος οὖν περιπατῶν ἀξιῶ τὸν Κύριον ἵνα τὰς ἀποκαλύψεις καὶ τὰ ὁράματα ἅ μοι
    ἔδειξεν διὰ τῆς ἁγίας Ἐκκλησίας αὐτοῦ τελειώσῃ, ἵνα με ἰσχυροποιήσῃ καὶ δῷ τὴν
    μετάνοιαν τοῖς δούλοις αὐτοῦ τοῖς ἐσκανδαλισμένοις, ἵνα δοξασθῇ τὸ ὄνομα αὐτοῦ
    τὸ μέγα καὶ ἔνδοξον, ὅτι με ἄξιον ἡγήσατο τοῦ δεῖξαί μοι τὰ θαυμάσια αὐτοῦ. 4.
    καὶ δοξάζοντός μου καὶ εὐχαριστοῦντος αὐτῷ, ὡς ἦχος φωνῆς μοι ἀπεκρίθη· Μὴ διψυχήσεις,
    Ἑρμᾶ. ἐν ἐμαυτῷ ἠρξάμην διαλογίζεσθαι καὶ λέγειν· Ἐγὼ τί ἔχω διψυχῆσαι, οὕτω τεθεμελιωμένος
    ὑπὸ τοῦ Κυρίου καὶ ἰδὼν ἔνδοξα πράγματα; 5. καὶ προσέβην μικρόν, ἀδελφοί, καὶ
    ἰδοὺ βλέπω κονιορτὸν ὡς εἰς τὸν οὐρανόν, καὶ ἠρξάμην λέγειν ἐν ἑαυτῷ· Μήποτε κτήνη
    ἔρχονται καὶ κονιορτὸν ἐγείρουσιν; οὕτω γὰρ ἦν ἀπ᾽ ἐμοῦ ὡς ἀπὸ σταδίου. 6. γινομένου
    μείζονος καὶ μείζονος κονιορτοῦ ὑπενόησα εἶναί τι θεῖον· μικρὸν ἐξέλαμψεν ὁ ἥλιος,
    καὶ ἰδοὺ βλέπω θηρίον μέγιστον ὡσεὶ κῆτός τι, καὶ ἐκ τοῦ στόματος αὐτοῦ ἀκρίδες
    πύριναι ἐξεπορεύοντο. ἦν δὲ τὸ θηρίον τῷ μήκει ὡσεὶ ποδῶν ἑκατόν, τὴν δὲ κεφαλὴν
    εἶχεν ὡς κεράμου. 7. καὶ ἠρξάμην κλαίειν καὶ ἐρωτᾶν τὸν Κύριον ἵνα με λυτρώσηται
    ἐξ αὐτοῦ. καὶ ἐπανεμνήσθην τοῦ ῥήματος οὗ ἀκηκόειν· Μὴ διψυχήσεις, Ἑρμᾶ. 8. ἐνδυσάμενος
    οὖν, ἀδελφοί, τὴν πίστιν τοῦ Κυρίου καὶ μνησθεὶς ὧν ἐδίδαξέν με μεγαλείων, θαρσήσας
    εἰς τὸ θηρίον ἐμαυτὸν ἔδωκα. οὕτω δὲ ἤρχετο τὸ θηρίον ῥοίζῳ, ὥστε δύνασθαι αὐτὸ
    πόλιν λυμᾶναι. 9. ἔρχομαι ἐγγὺς αὐτοῦ, καὶ τὸ τηλικοῦτο κῆτος ἐκτείνει ἑαυτὸ χαμαὶ
    καὶ οὐδὲν εἰ μὴ τὴν γλῶσσαν προέβαλλεν, καὶ ὅλως οὐκ ἐκινήθη μέχρις ὅτου παρῆλθον
    αὐτό· 10. εἶχεν δὲ τὸ θηρίον ἐπὶ τῆς κεφαλῆς χρώματα τέσσαρα· μέλαν, εἶτα πυροειδὲς
    καὶ αἱματῶδες, εἶτα χρυσοῦν, εἶτα λευκόν.
