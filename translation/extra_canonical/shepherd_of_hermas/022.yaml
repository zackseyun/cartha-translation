theological_decisions:
- issue: 'Typological framing: εἰς τύπον τῆς θλίψεως'
  chosen_reading: Render as 'as a pattern of the tribulation'
  alternative_readings:
  - as a type of the tribulation
  - as a symbol of the tribulation
  rationale: Hermas announces the vision as a prefigurative sketch. 'Pattern' communicates
    typology without requiring the reader to know the technical term; 'type' is preserved
    in a footnote.
- issue: δοῦλοι τοῦ Θεοῦ—'servants' or 'slaves'
  chosen_reading: '''servants'''
  alternative_readings:
  - slaves
  - bondservants
  rationale: The context is pastoral intercession, not ownership. Following project
    guidance, we reserve 'slave' where bonded status is theologically active; here
    the honorific sense fits 'servants'.
  doctrine_reference: 'Translation philosophy §Contested terms: δοῦλος'
- issue: μετάνοια as moral gift
  chosen_reading: '''repentance'''
  alternative_readings:
  - change of mind
  rationale: Hermas prays that God 'grant' it to those who have stumbled—an established
    penitential gift/grace motif, not merely cognitive rethinking.
  doctrine_reference: 'Translation philosophy §Contested terms: μετανοέω/μετάνοια'
- issue: Genitive in τὴν πίστιν τοῦ Κυρίου
  chosen_reading: 'Objective genitive: ''faith in the Lord'''
  alternative_readings:
  - 'Subjective genitive: ''the Lord’s faith'''
  rationale: Consistent with exhortational idiom (to have or put on faith directed
    to the Lord). Rendering avoids implying that the Lord exercises faith.
  doctrine_reference: Translation philosophy §Preserve theological tension (genitives)
- issue: Ἐκκλησία as visionary mediator
  chosen_reading: Capitalize 'Church' and retain 'holy'
  alternative_readings:
  - assembly
  - congregation
  rationale: In Hermas the Church appears as a personified figure who mediates revelation;
    'Church' preserves this identity and ecclesial texture.
  doctrine_reference: 'What matters most #3, #4'
- issue: διψυχέω as spiritual vice
  chosen_reading: '''be double‑minded'''
  alternative_readings:
  - doubt
  - waver
  rationale: Hermas develops a vocabulary of interior duplicity vs. simplicity. 'Double‑minded'
    keeps this ethical category clear.
  doctrine_reference: 'What matters most #2'
