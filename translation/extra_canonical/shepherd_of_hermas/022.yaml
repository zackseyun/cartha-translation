translation:
  text: 'The vision that I saw, brothers, came twenty days after the former vision;
    it was as a pattern of the tribulation that is coming.


    I was going out into the countryside by the Campanian road. It is about ten stadia
    from the public highway, and the place is easy to walk.


    So, walking alone, I was beseeching the Lord to bring to completion the revelations
    and the visions which he had shown me through his holy Church, so that he would
    strengthen me and give repentance to his servants who have stumbled, in order
    that his great and glorious name might be glorified—because he judged me worthy
    to show me his wonders.


    And while I was glorifying and giving thanks to him, a sound like a voice answered
    me: “Do not be double‑minded, Hermas.” I began to reason within myself and say,
    “What reason have I to be double‑minded, being so grounded by the Lord and having
    seen glorious things?”


    I went on a little, brothers, and see! I notice dust as if up to the sky, and
    I began to say within myself, “Perhaps herds are coming and raising dust?” For
    it was from me about a stadion away.


    As the dust grew greater and greater, I supposed it was something divine. The
    sun flashed out a little, and look! I see a very great beast—something like a
    sea‑monster—and from its mouth fiery locusts were coming out. The beast was about
    a hundred feet in length, and its head was like earthenware.


    I began to weep and to ask the Lord to deliver me from it. Then I remembered the
    word I had heard: “Do not be double‑minded, Hermas.”


    So then, brothers, putting on faith in the Lord and remembering the great things
    he had taught me, taking courage I gave myself toward the beast. Now the beast
    was approaching with a rushing roar, so that it could ravage a city.


    I came near it, and that sea‑monster of such size stretched itself out upon the
    ground and did nothing except stick out its tongue; it did not move at all until
    I had passed by it.


    Now the beast had four colors upon its head: black; then fiery and blood‑red;
    then golden; then white.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “As a pattern” translates εἰς τύπον—literally, “as a type.” Early Christians
      used τύπος for prefigurative images.
    reason: lexical_alternative
  - marker: b
    text: The Campanian road likely refers to a Roman route leading toward Campania
      from Rome.
    reason: cultural_note
  - marker: c
    text: Ten stadia ≈ 1.8 km / 1.1 miles.
    reason: cultural_note
  - marker: d
    text: '“Through his holy Church”: In earlier visions Hermas receives revelations
      mediated by a woman who personifies the Church.'
    reason: cross_reference
  - marker: e
    text: “Do not be double‑minded” echoes the ethical vice of divided loyalty; compare
      James 1:6–8.
    reason: cross_reference
  - marker: f
    text: '“Herds”: κτήνη can mean domestic animals in general; alternatives include
      “beasts” or “cattle.”'
    reason: lexical_alternative
  - marker: g
    text: κῆτος denotes a large sea creature or sea‑monster; “whale” is another possible
      rendering.
    reason: lexical_alternative
  - marker: h
    text: Fiery locusts evoke apocalyptic imagery; compare Joel 2 and Revelation 9.
    reason: cross_reference
  - marker: i
    text: '“Its head was like earthenware”: κεραμος can mean tile, pottery, or clay
      vessel—the simile is obscure.'
    reason: lexical_alternative
  - marker: j
    text: “Deliver” renders a verb from the ransom/deliverance word‑group (λυτρ‑);
      alternatives include “rescue” or “ransom.”
    reason: lexical_alternative
  - marker: k
    text: “Putting on faith” uses clothing imagery for virtue; compare 1 Thessalonians
      5:8.
    reason: cross_reference
lexical_decisions:
- source_word: εἰς τύπον
  chosen: as a pattern
  alternatives:
  - as a type
  - as a symbol
  lexicon: BDAG; LSJ
  rationale: τύπος in early Christian usage often denotes a foreshadowing or exemplar;
    “pattern” keeps the typological sense while remaining readable. Footnote preserves
    the technical term 'type'.
- source_word: τῆς θλίψεως
  chosen: the tribulation
  alternatives:
  - the affliction
  - the distress
  lexicon: BDAG
  rationale: θλῖψις commonly denotes eschatological or communal pressure; 'tribulation'
    retains that weight and apocalyptic register.
- source_word: εἰς ἀγρὸν
  chosen: into the countryside
  alternatives:
  - into a field
  lexicon: LSJ
  rationale: While ἀγρός can be a specific field, the Roman-road setting suggests
    the rural outskirts; 'countryside' fits the scene.
- source_word: τῇ ὁδῷ τῇ Καμπανῇ
  chosen: the Campanian road
  alternatives:
  - the Campanian Way
  lexicon: LSJ
  rationale: A Roman context likely referring to a road toward Campania; 'road' is
    plain and accurate; capitalization signals a proper route name.
- source_word: στάδια δέκα
  chosen: ten stadia
  alternatives:
  - about a mile and a quarter
  - ten furlongs
  lexicon: LSJ
  rationale: Retaining the ancient unit preserves texture; a footnote supplies the
    modern estimate.
- source_word: τῆς ὁδοῦ τῆς δημοσίας
  chosen: the public highway
  alternatives:
  - the public road
  lexicon: LSJ
  rationale: δημόσιος modifies ὁδός as the main, public thoroughfare; 'highway' conveys
    that nuance.
- source_word: ῥᾳδίως ὁδεύεται
  chosen: is easy to walk
  alternatives:
  - is easily traveled
  lexicon: LSJ
  rationale: Idiomatic English equivalent of 'easy to travel' with walking imagery
    retained.
- source_word: ἀξιῶ
  chosen: I was beseeching
  alternatives:
  - I implore
  - I beg
  - I ask
  lexicon: BDAG; LSJ
  rationale: In prayerful context, 'beseech' captures earnest petition better than
    neutral 'ask'.
- source_word: ἀποκαλύψεις καὶ ὁράματα
  chosen: revelations and visions
  alternatives:
  - disclosures and visions
  - revelations and sights
  lexicon: BDAG
  rationale: Established pair; 'revelations' and 'visions' are distinct yet complementary;
    avoid flattening.
- source_word: τελειώσῃ
  chosen: bring to completion
  alternatives:
  - perfect
  - fulfill
  lexicon: BDAG
  rationale: Conveys the idea of completing what has been begun without the misleading
    connotations of 'perfect' in modern English.
- source_word: διὰ τῆς ἁγίας Ἐκκλησίας
  chosen: through his holy Church
  alternatives:
  - by means of his holy assembly
  - through the holy congregation
  lexicon: BDAG
  rationale: Hermas personifies the Church as a visionary mediator; 'Church' with
    capitalization preserves that identity.
- source_word: ἰσχυροποιήσῃ
  chosen: strengthen me
  alternatives:
  - make me strong
  - empower me
  lexicon: LSJ
  rationale: '''Strengthen'' is the conventional and clear rendering in prayer contexts.'
- source_word: μετάνοιαν
  chosen: repentance
  alternatives:
  - change of mind
  lexicon: BDAG
  rationale: Here it is a moral gift from God to those who have stumbled; 'repentance'
    fits the soteriological context better than purely cognitive 'change of mind'.
- source_word: δοῦλοι
  chosen: servants
  alternatives:
  - slaves
  - bondservants
  lexicon: BDAG
  rationale: While 'slave' can be theologically salient, here it functions as a respectful
    designation for God's people; 'servants' avoids importing chattel-slavery connotations.
- source_word: οἱ ἐσκανδαλισμένοι
  chosen: those who have stumbled
  alternatives:
  - those who have been scandalized
  - those who have been caused to fall
  lexicon: BDAG
  rationale: σκανδαλίζω in moral context denotes stumbling/falling; 'stumbled' is
    vivid and idiomatic.
- source_word: ὡς ἦχος φωνῆς
  chosen: a sound like a voice
  alternatives:
  - as the sound of a voice
  - something like the noise of a voice
  lexicon: LSJ
  rationale: Preserves simile and auditory ambiguity of the experience.
- source_word: Μὴ διψυχήσεις
  chosen: Do not be double‑minded
  alternatives:
  - Do not doubt
  - Do not waver
  lexicon: BDAG; LSJ
  rationale: Hermas uses a distinct term for divided interiority; 'double‑minded'
    keeps that nuance rather than general 'doubt'.
- source_word: κονιορτόν
  chosen: dust
  alternatives:
  - cloud of dust
  lexicon: LSJ
  rationale: Plain 'dust' fits the immediate description; the sense of a cloud is
    conveyed by the clause 'as if up to the sky'.
- source_word: κτήνη
  chosen: herds
  alternatives:
  - beasts
  - cattle
  lexicon: LSJ
  rationale: κτῆνος often denotes domestic animals; 'herds' matches the dust-raising
    context.
- source_word: κῆτος
  chosen: sea‑monster
  alternatives:
  - whale
  - sea creature
  lexicon: LSJ
  rationale: κῆτος evokes something monstrous; 'sea‑monster' preserves the ominous,
    apocalyptic register better than zoological 'whale'.
- source_word: ἀκρίδες πύριναι
  chosen: fiery locusts
  alternatives:
  - locusts of fire
  - locusts like fire
  lexicon: BDAG
  rationale: Compact, vivid phrase that matches the visionary image and echoes biblical
    apocalyptic diction without importing NT wording.
- source_word: κεραμος
  chosen: earthenware
  alternatives:
  - tile
  - pottery
  - clay vessel
  lexicon: LSJ
  rationale: The simile is obscure; 'earthenware' names the material without over‑specifying
    shape; a footnote explains alternatives.
- source_word: λύτρωσαι/λυτρώσηται
  chosen: deliver
  alternatives:
  - rescue
  - ransom
  lexicon: BDAG
  rationale: Though from the 'ransom' family, here the sense is simple deliverance
    from danger.
- source_word: ἐνδυσάμενος … τὴν πίστιν τοῦ Κυρίου
  chosen: putting on faith in the Lord
  alternatives:
  - putting on the faith of the Lord
  lexicon: BDAG
  rationale: Genitive best read objectively (faith directed to the Lord); 'putting
    on' preserves the metaphorical clothing imagery.
- source_word: μεγαλείων
  chosen: great things
  alternatives:
  - majestic deeds
  - mighty things
  lexicon: LSJ
  rationale: Captures the superlative sense without overstating content not specified.
- source_word: θαρσήσας
  chosen: taking courage
  alternatives:
  - being emboldened
  - having courage
  lexicon: BDAG
  rationale: Standard idiom for θαρσέω in narrative context.
- source_word: ἐμαυτὸν ἔδωκα εἰς τὸ θηρίον
  chosen: I gave myself toward the beast
  alternatives:
  - I committed myself against the beast
  - I advanced toward the beast
  lexicon: LSJ
  rationale: Unusual phrasing retained to mirror the Greek reflexive 'gave myself';
    'toward' clarifies direction.
- source_word: ῥοίζῳ
  chosen: with a rushing roar
  alternatives:
  - with a rushing sound
  - with a whirring noise
  lexicon: LSJ
  rationale: Adds the sense of a threatening roar present in context while keeping
    the auditory rush.
- source_word: λυμαίνεσθαι
  chosen: ravage
  alternatives:
  - lay waste
  - ruin
  lexicon: BDAG; LSJ
  rationale: In military/violent contexts, 'ravage' captures the destructive capacity
    envisaged.
- source_word: γλῶσσαν προέβαλλεν
  chosen: stick out its tongue
  alternatives:
  - thrust forth its tongue
  - protrude its tongue
  lexicon: LSJ
  rationale: Plain idiomatic English for a concrete gesture.
- source_word: χρώματα … μέλαν … πυροειδὲς καὶ αἱματῶδες … χρυσοῦν … λευκόν
  chosen: colors … black; then fiery and blood‑red; then golden; then white
  alternatives:
  - hues … black; then fire‑colored and blood‑hued; then golden; then white
  lexicon: LSJ
  rationale: Simple, vivid color terms maintain the sequence and mounting intensity.
