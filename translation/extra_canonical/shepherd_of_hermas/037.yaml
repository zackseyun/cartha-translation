theological_decisions:
- issue: Rendering of δοῦλοι τοῦ θεοῦ
  chosen_reading: slaves of God
  alternative_readings:
  - servants of God
  rationale: Hermas emphasizes allegiance and belonging; ‘slaves’ maintains the strong
    bond and authority relationship per Cartha policy.
- issue: Reference and capitalization of τὸ πνεῦμα τὸ ἅγιον
  chosen_reading: the Holy Spirit (capitalized)
  alternative_readings:
  - the holy spirit (as indwelling gift)
  rationale: 'We keep traditional capitalization while recognizing Hermas’s anthropological
    framing: the Spirit indwells and can be ‘worn down’ in its operative presence
    within a person; this does not imply ontological impairment of God.'
- issue: Rendering of θεότης
  chosen_reading: the divine
  alternative_readings:
  - the Deity
  - Godhead
  - God’s nature
  rationale: ‘The divine’ preserves the abstract quality of θεότης and avoids later
    technical terms (‘Godhead’). It allows phrases like ‘parables of the divine’ without
    importing post‑Nicene precision.
- issue: ‘Parables’ in Hermas
  chosen_reading: Keep ‘parables’ for παραβολαί
  alternative_readings:
  - figures
  - allegories
  rationale: Hermas self‑describes his visionary/allegorical instruction as παραβολαί;
    retaining ‘parables’ preserves his register while context clarifies he means figurative
    instruction, not necessarily Gospel‑style short stories.
- issue: 'Paradox: ‘sorrow … wears down the Holy Spirit—and again saves’'
  chosen_reading: Preserve the paradox verbatim
  rationale: Hermas develops this tension in the following material (two kinds of
    sorrow). We do not pre‑resolve it in this unit, to maintain his rhetorical structure.
