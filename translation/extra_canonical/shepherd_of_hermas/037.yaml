translation:
  text: '“Take away from yourself,” he says, “sorrow; for she is a sister of double‑mindedness
    and irascibility.”


    “How, lord,” I said, “is she a sister of these? For irascibility seems to me one
    thing, double‑mindedness another, and sorrow another.”


    “You are senseless, man,” he says, “and do you not perceive that sorrow is more
    wicked than all the spirits and most dreadful for the slaves of God, and that
    beyond all the spirits it ruins a person and wears down the Holy Spirit—and again
    saves?”


    “I, lord,” I said, “am senseless and I do not understand these parables. For how
    can it wear down and again save? I do not understand.”


    “Listen,” he says. “Those who have never examined concerning the truth nor sought
    about the divine, but have only believed, and are entangled in business affairs
    and wealth and pagan friendships and many other affairs of this age—those who
    attach themselves to these do not understand the parables of the divine; for they
    are darkened by these practices and are ruined and become laid waste. Just as
    good vineyards, when they fall into neglect, are laid waste by thorns and all
    sorts of weeds, so people who have believed and who fall into these many practices
    just mentioned are led astray from their understanding, and they understand nothing
    at all about righteousness. Even when they hear about the divine and truth, their
    mind is taken up with their business, and they understand nothing at all.


    “But those who have the fear of God and who inquire about the divine and truth
    and have their heart toward the Lord, understand and comprehend more quickly all
    the things spoken to them, because they have the fear of the Lord within themselves;
    for where the Lord dwells, there also is much understanding. Join yourself, therefore,
    to the Lord, and you will understand and perceive all things.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek λύπη can also be rendered ‘grief’ or ‘sadness.’ The vice here
      is personified as a ‘sister’ to other vices.
    reason: lexical_alternative
  - marker: b
    text: Ὀξυχολία denotes a choleric, hot‑tempered disposition; alternatives include
      ‘quick temper’ or ‘irritability.’
    reason: lexical_alternative
  - marker: c
    text: ‘Slaves of God’ translates δοῦλοι τοῦ θεοῦ; some render ‘servants of God,’
      but the stronger term highlights allegiance and ownership.
    reason: lexical_alternative
  - marker: d
    text: ‘Wears down’ (ἐκτρίβει) pictures attrition by friction; alternatives include
      ‘rub out’ or ‘grind away.’
    reason: lexical_alternative
  - marker: e
    text: '‘Parables of the divine’ reflects θεότης, an abstract for God’s divine
      nature or reality; alternatives: ‘of God,’ ‘of the Deity,’ or ‘of the Godhead.’'
    reason: lexical_alternative
  - marker: f
    text: ‘Pagan friendships’ (φιλίαι ἐθνικαί) points to entangling social ties with
      non‑Christian pagan society, not a prohibition on neighbor‑love.
    reason: cultural_note
  - marker: g
    text: The paradox ‘and again saves’ is intentional; Hermas will distinguish sorrow
      that destroys from sorrow that leads to salvation in the next section of Mandate
      10.
    reason: cross_reference
lexical_decisions:
- source_word: λύπη
  chosen: sorrow
  alternatives:
  - grief
  - sadness
  lexicon: LSJ
  rationale: Preserves the moral‑spiritual affect named, allowing personification
    (“she”) as in Greek; broader than “grief” and fits Hermas’s moral discourse.
- source_word: διψυχία
  chosen: double‑mindedness
  alternatives:
  - doubtfulness
  - two‑souledness
  lexicon: LSJ
  rationale: Standard rendering captures vacillation of mind central to Hermas; “two‑souledness”
    is transparent etymology but awkward.
- source_word: ὀξυχολία
  chosen: irascibility
  alternatives:
  - quick temper
  - irritability
  lexicon: LSJ
  rationale: Denotes a choleric, hot‑tempered disposition; “irascibility” names the
    vice rather than an episode of anger.
- source_word: πνεύματα (τὰ)
  chosen: spirits
  alternatives:
  - influences
  - dispositions
  lexicon: LSJ
  rationale: Hermas treats moral forces as ‘spirits’; retain literal term to preserve
    his moral psychology.
- source_word: δοῦλοι (τοῦ θεοῦ)
  chosen: slaves (of God)
  alternatives:
  - servants (of God)
  lexicon: LSJ
  rationale: Cartha policy prefers ‘slaves’ where bonded status before God is salient;
    Hermas’s paraenesis addresses identity and allegiance.
- source_word: καταφθείρειν
  chosen: ruin
  alternatives:
  - destroy
  - corrupt
  lexicon: LSJ
  rationale: “Ruin” links conceptually with the later vineyard image of becoming waste;
    slightly less absolute than ‘destroy,’ matching moral ruin.
- source_word: ἐκτρίβειν
  chosen: wear down
  alternatives:
  - rub out
  - grind away
  - extinguish
  lexicon: LSJ
  rationale: Primary sense is to rub/wear away by friction; “wear down” conveys attrition
    of the Spirit’s operative presence in a person.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the holy spirit
  lexicon: LSJ
  rationale: Retain traditional capitalization while recognizing Hermas’s focus on
    the Spirit dwelling in a person; see theological note.
- source_word: παραβολάς
  chosen: parables
  alternatives:
  - figures
  - comparisons
  lexicon: LSJ
  rationale: Hermas uses ‘parables’ for his figurative, allegorical teaching; retain
    established term with broader sense than Gospel parables.
- source_word: ἐπισκοτοῦνται
  chosen: are darkened
  alternatives:
  - are overshadowed
  - are benighted
  lexicon: LSJ
  rationale: Conveys loss of inner light/clarity due to worldly entanglements.
- source_word: κεχερσωμένοι
  chosen: laid waste
  alternatives:
  - made fallow
  - desolated
  lexicon: LSJ
  rationale: Echoes agricultural imagery; ‘laid waste’ fits the vineyard metaphor
    and moral desolation.
- source_word: πραγματείαις
  chosen: business affairs
  alternatives:
  - dealings
  - occupations
  lexicon: LSJ
  rationale: Context highlights worldly transactions and preoccupations; “business
    affairs” is concrete and contemporary.
- source_word: φιλίαις ἐθνικαῖς
  chosen: pagan friendships
  alternatives:
  - friendships with those of the nations
  - Gentile friendships
  lexicon: LSJ
  rationale: In a Roman Christian context, ‘ethnic’ friends are non‑Christians/pagans;
    ‘pagan’ communicates that cultural‑religious entanglement.
- source_word: αἰῶνος τούτου
  chosen: this age
  alternatives:
  - this world
  lexicon: LSJ
  rationale: Retains apocalyptic/temporal nuance of ‘age’ rather than spatial ‘world.’
- source_word: βοτανῶν
  chosen: weeds
  alternatives:
  - plants
  - herbs
  lexicon: LSJ
  rationale: In context, contrasts cultivated vines with encroaching unwanted growth;
    ‘weeds’ communicates the image.
- source_word: διάνοια
  chosen: understanding
  alternatives:
  - mind
  lexicon: LSJ
  rationale: Maintains cognitive nuance repeated with νοεῖν/συνιέναι; ‘understanding’
    fits Hermas’s epistemic emphasis.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: Moral righteousness suits Hermas’s exhortation; ‘justice’ is more juridical
    and Pauline‑leaning.
- source_word: πρᾶξις
  chosen: business
  alternatives:
  - practice
  - activity
  - undertaking
  lexicon: LSJ
  rationale: Here refers to worldly dealings preoccupying the mind; ‘business’ captures
    the practical focus.
- source_word: κολλήθητι
  chosen: Join yourself
  alternatives:
  - cling
  - be joined
  lexicon: LSJ
  rationale: Imperative with covenantal overtones (LXX); ‘Join yourself’ is transparent
    and solemn.
