  text: 1 Ἆρον ἀπὸ σεαυτοῦ, φησί, τὴν λύπην· καὶ γὰρ αὕτη ἀδελφή ἐστι τῆς διψυχίας
    καὶ τῆς ὀξυχολίας. 2 Πῶς, φημί, κύριε, ἀδελφή ἐστι τούτων; ἄλλο γάρ μοι δοκεῖ
    εἶναι ὀξυχολία καὶ ἄλλο διψυχία καὶ ἄλλο λύπη. Ἀσύνετος εἶ ἄνθρωπε, φησί, καὶ
    οὐ νοεῖς, ὅτι ἡ λύπη πάντων τῶν πνευμάτων πονηροτέρα ἐστὶ καὶ δεινοτάτη τοῖς δούλοις
    τοῦ θεοῦ καὶ παρὰ πάντα τὰ πνεύματα καταφθείρει τὸν ἄνθρωπον καὶ ἐκτρίβει τὸ πνεῦμα
    τὸ ἅγιον καὶ πάλιν σώζει; 3 ἐγώ, φημί, κύριε, ἀσύνετός εἰμι καὶ οὐ συνίω τὰς παραβολὰς
    ταύτας. πῶς γὰρ δύναται ἐκτρίβειν καὶ πάλιν σῴζειν, οὐ νοῶ. 4 Ἄκουε, φησίν· οἱ
    μηδέποτε ἐρευνήσαντες περὶ τῆς ἀληθείας μηδὲ ἐπιζητήσαντες περὶ τῆς θεότητος,
    πιστεύσαντες δὲ μόνον, ἐμπεφυρμένοι δὲ πραγματείαις καὶ πλούτῳ καὶ φιλίαις ἐθνικαῖς
    καὶ ἄλλαις πολλαῖς πραγματείαις τοῦ αἰῶνος τούτου· ὅσοι οὖν τούτοις προσκεινται,
    οὐ νοοῦσι τὰς παραβολὰς τῆς θεότητος· ἐπισκοτοῦνται γὰρ ὑπὸ τούτων τῶν πράξεων
    καὶ καταφθείρονται καὶ γίνονται κεχερσωμένοι. 5 καθὼς οἱ ἀμπελῶνες οἱ καλοί, ὅταν
    ἀμελείας τύχωσι, χερσοῦνται ἀπὸ τῶν ἀκανθῶν καὶ βοτανῶν ποικίλων, οὕτως οἱ ἄνθρωποι
    οἱ πιστεύσαντες καὶ εἰς ταύτας τὰς πράξεις τὰς πολλὰς ἐμπίπτοντες τὰς προειρημένας,
    ἀποπλανῶνται ἀπὸ τῆς διανοίας αὐτῶν, καὶ οὐδὲν ὅλως νοοῦσι περὶ δικαιοσύνης, ἀλλὰ
    καὶ ὅταν ἀκούσωσι περὶ θεότητος καὶ ἀληθείας, ὁ νοῦς αὐτῶν περὶ τὴν πρᾶξιν αὐτῶν
    καταγίνεται, καὶ οὐδὲν ὅλως νοοῦσιν. 6 οἱ δὲ φόβον ἔχοντες θεοῦ καὶ ἐρευνῶντες
    περὶ θεότητος καὶ ἀληθείας καὶ τὴν καρδίαν ἔχοντες πρὸς τὸν κύριον, πάντα τὰ λεγόμενα
    αὐτοῖς τάχιον νοοῦσι καὶ συνίουσιν, ὅτι ἔχουσι τὸν φόβον τοῦ κυρίου ἐν ἑαυτοῖς·
    ὅπου γὰρ ὁ κύριος κατοικεῖ, ἐκεῖ καὶ σύνεσις πολλή. κολλήθητι οὖν τῷ κυρίῳ, καὶ
    πάντα συνήσεις καὶ νοήσεις.
