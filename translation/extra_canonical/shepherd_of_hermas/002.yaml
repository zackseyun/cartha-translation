theological_decisions:
- issue: Rendering δοῦλος (slave/servant) for identity before God
  chosen_reading: Translate δοῦλος as “slave (of God).”
  alternative_readings:
  - servant
  - bondservant
  rationale: Project policy prioritizes ‘slave’ where total belonging and obligation
    are in view. The context contrasts what befits one fully belonging to God versus
    sinful inner counsel.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1–2; Contested terms table
    (δοῦλος).'
- issue: Referent of πνεῦμα in ‘πάνσεμνον πνεῦμα καὶ ἤδη δεδοκιμασμένον’
  chosen_reading: Human spirit/disposition, not the Holy Spirit.
  alternative_readings:
  - Holy Spirit
  rationale: The phrase modifies an individual’s tested moral character (already proven)
    and is applied to Hermas. It concerns the person’s inner state desiring evil,
    which does not fit the Holy Spirit.
- issue: 'Atonement language: ἐξιλάσομαι / ἱλατεύθῃ'
  chosen_reading: Use accessible renderings ‘appease God’ and ‘be gracious to me,’
    noting ‘propitiate’ as an alternative.
  alternative_readings:
  - propitiate
  - make atonement
  rationale: We preserve the relational sense of making God favorable without forcing
    later technical atonement vocabulary; alternatives are documented for audit.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #5; Contested terms guidance
    re: technical terms.'
- issue: Force of τελείων modifying ἁμαρτιῶν
  chosen_reading: Render as ‘in full’ to convey completeness/intensification of the
    sins’ account.
  alternative_readings:
  - complete/perfected sins
  - grievous sins
  rationale: ‘Perfect’ in English misleads; context concerns the full tally of sins
    being recorded. ‘In full’ communicates completion without implying moral quality.
review_passes:
- reviewer_model: gemini-3.1-pro-preview
  timestamp: '2026-04-22T17:15:09Z'
  prompt_sha256: 86d5e6e17e33a0f8332540269df4a382176b0b92cf95e18c7c46d85a5da986e9
  agreement_score: 0.88
  verdict: minor-issues
  summary: The draft is generally accurate but misses several grammatical nuances
    and rhetorical devices. "Sins in full" sounds like a financial payment rather
    than the completeness of the sins. The draft misses the agency indicated by Ὑπὸ
    + genitive ("By a most excellent woman saying..."). It misses the emphatic ἔστιν
    μὲν construction ("Such an intention does indeed..."). It splits the adjectives
    modifying "intention" ("evil and shocking intention"). Finally, it flattens the
    rhetorical shift to the third person at the end ("especially Hermas, the self-controlled
    one...").
  issues_found:
  - '"sins in full" (τῶν ἁμαρτιῶν μου τῶν τελείων): "In full" sounds like a financial
    payment. "Complete sins" better captures the adjective τέλειος modifying sins.'
  - '"Because a most excellent woman says" (Ὑπὸ γυναικὸς ἀγαθωτάτης λεγούσης): The
    Greek uses Ὑπὸ + genitive participle to indicate agency ("By a most excellent
    woman saying..."), answering the implicit passive "Why are you made gloomy?".'
  - '"belong to" (ἐπὶ τὸν δοῦλον): The preposition ἐπὶ with the accusative here means
    "fall upon" or "apply to", not "belong to".'
  - '"For such an intention" (ἔστιν μὲν...): The draft misses the emphatic ἔστιν μὲν
    construction ("Such an intention does indeed...").'
  - '"For an evil intention is a shocking thing in" (πονηρὰ γὰρ βουλὴ καὶ ἔκπληκτος,
    εἰς...): The Greek has both "evil" and "shocking" modifying "intention" (βουλή).'
  - '"especially for you, Hermas, who are self-controlled, who hold yourself back"
    (καὶ μάλιστα Ἑρμᾶς ὁ ἐγκρατής, ὁ ἀπεχόμενος...): The Greek shifts to the third
    person ("especially Hermas, the self-controlled one, who holds himself back..."),
    which is a deliberate rhetorical device.'
