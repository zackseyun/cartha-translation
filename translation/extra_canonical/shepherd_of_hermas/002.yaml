    that are fully carried out in deed. ''Complete sins'' is overly literal and awkward
    in English, obscuring this contrast. ''Fully committed sins'' accurately conveys
    the lexical sense of τέλειος as applied to actions brought to their full realization,
    making the author''s logical contrast clear t'
