id: HERM.V.1.ii
reference: Shepherd of Hermas — Vision 1, section ii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Μετὰ τὸ λαλῆσαι αὐτὴν τὰ ῥήματα ταῦτα ἐκλείσθησαν οἱ οὐρανοί· κἀγὼ ὅλος ἤμην
    πεφρικὼς καὶ λυπούμενος. ἔλεγον δὲ ἐν ἐμαυτῷ· Εἰ αὕτη μοι ἡ ἁμαρτία ἀναγράφεται,
    πῶς δυνήσομαι σωθῆναι; ἢ πῶς ἐξιλάσομαι τὸν Θεὸν περὶ τῶν ἁμαρτιῶν μου τῶν τελείων;
    ἢ ποίοις ῥήμασιν ἐρωτήσω τὸν Κύριον ἵνα ἱλατευθῇ μοι; 2. ταῦτά μου συμβουλευομένου
    καὶ διακρίνοντος ἐν τῇ καρδίᾳ μου, βλέπω κατεναντί μου καθέδραν λευκὴν ἐξ ἐρίων
    χιονίνων γεγονυῖαν μεγάλην· καὶ ἦλθεν γυνὴ πρεσβῦτις ἐν ἱματισμῷ λαμπροτάτῳ, ἔχουσα
    βιβλίον εἰς τὰς χεῖρας, καὶ ἐκάθισεν μόνη, καὶ ἀσπάζεταί με· Ἑρμᾶ, χαῖρε. κἀγὼ
    λυπούμενος καὶ κλαίων εἶπον· Κυρία, χαῖρε. 3. καὶ εἶπέν μοι· Τί στυγνός, Ἑρμᾶ,
    ὁ μακρόθυμος καὶ ἀστομάχητος, ὁ πάντοτε γελῶν, τί οὕτω κατηφὴς τῇ ἰδέᾳ καὶ οὐχ
    ἱλαρός; κἀγὼ εἶπον αὐτῇ· Ὑπὸ γυναικὸς ἀγαθωτάτης λεγούσης ὅτι ἥμαρτον εἰς αὐτήν.
    4. ἡ δὲ ἔφη· Μηδαμῶς ἐπὶ τὸν δοῦλον τοῦ Θεοῦ τὸ πρᾶγμα τοῦτο. ἀλλὰ πάντως ἐπὶ
    τὴν καρδίαν σου ἀνέβη περὶ αὐτῆς. ἔστιν μὲν τοῖς δούλοις τοῦ Θεοῦ ἡ τοιαύτη βουλὴ
    ἁμαρτίαν ἐπιφέρουσα· πονηρὰ γὰρ βουλὴ καὶ ἔκπληκτος, εἰς πάνσεμνον πνεῦμα καὶ
    ἤδη δεδοκιμασμένον, ἐὰν ἐπιθυμήσῃ πονηρὸν ἔργον, καὶ μάλιστα Ἑρμᾶς ὁ ἐγκρατής,
    ὁ ἀπεχόμενος πάσης ἐπιθυμίας πονηρᾶς καὶ πλήρης πάσης ἁπλότητος καὶ ἀκακίας μεγάλης.
  language: Greek
  pages:
  - 314
  - 315
  unit_id: V.1.ii
  label: Vision 1, section ii
  sequence: 2
translation:
  text: 'After she had spoken these words, the heavens were shut, and I was wholly
    trembling and grieving. And I said within myself, “If this sin is charged against
    me, how will I be able to be saved? Or how shall I make atonement to God for my
    completed sins? Or with what words shall I ask the Lord, that he may be propitious
    to me?”


    While I was considering these things and pondering them in my heart, I see before
    me a great white chair made of snowy wool. And an elderly woman came in most radiant
    clothing, holding a book in her hands, and sat down alone and greeted me, “Hermas,
    greetings.” And I, grieving and weeping, said, “Lady, greetings.”


    And she said to me, “Why are you gloomy, Hermas—you who are patient and not given
    to contention, always laughing? Why are you so downcast in appearance and not
    cheerful?” And I said to her, “Because of a most excellent woman, who said that
    I sinned against her.”


    But she said, “By no means does this matter apply to the servant of God. Yet surely
    a thought concerning her rose up in your heart. For such an intention brings sin
    upon the servants of God. For it is an evil and startling intention for a most
    reverent spirit, and one already proven, if it should desire an evil deed—especially
    Hermas, the self-controlled one, who abstains from every evil desire and is full
    of all simplicity and great innocence.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: “Greetings” translates chaire; literally, “rejoice.”
    reason: lexical_alternative
  - marker: '2'
    text: “Seat” (kathédra) could also be taken as “chair”; some renderings choose
      “throne,” but the Greek term is neutral.
    reason: lexical_alternative
  - marker: '3'
    text: “Be gracious to me” (hilateuthē) can be translated “be propitiated toward
      me.” Likewise, “appease God” (exilasomai) could be “propitiate” or “make atonement
      to God.”
    reason: lexical_alternative
  - marker: '4'
    text: “Complete sins” renders teleios, which denotes completeness or perfection;
      here it intensifies the totality or gravity of the sins.
    reason: lexical_alternative
  - marker: '5'
    text: The “elderly woman” addressed as “Lady” will later be identified symbolically
      with the Church; see subsequent visions.
    reason: cross_reference
  - marker: '6'
    text: The material and color—“snow‑white wool”—echo apocalyptic purity imagery
      (cf. Dan 7:9), though here it is the seat that is woolen and white.
    reason: cross_reference
  - marker: '7'
    text: The rare adjective astomachētos is the opposite of being irritable or quick‑tempered
      (cf. stomachomai, “to be angry”).
    reason: cultural_note
  - marker: '8'
    text: “Spirit” here refers to a person’s inner disposition, not the Holy Spirit,
      as indicated by the context of a tested, proven character.
    reason: cultural_note
  - marker: a
    text: Or 'concerning my complete sins'.
    reason: previous_rendering
lexical_decisions:
- source_word: οὐρανοί
  chosen: heavens
  alternatives:
  - sky
  lexicon: LSJ / BDAG
  rationale: Plural “heavens” preserves apocalyptic register and cosmic scope over
    the more ordinary “sky.”
- source_word: πεφρικώς
  chosen: shuddering all over
  alternatives:
  - trembling
  - terrified
  lexicon: LSJ
  rationale: Phrissō denotes shuddering; “all over” renders ὅλος for total bodily
    reaction.
- source_word: λυπούμενος
  chosen: grieving
  alternatives:
  - sorrowing
  - distressed
  lexicon: BDAG
  rationale: Maintains affective weight without flattening to generic ‘upset’.
- source_word: ἀναγράφεται
  chosen: is recorded
  alternatives:
  - is written against
  - is registered
  lexicon: BDAG
  rationale: Judicial/ledger imagery fits Hermas’s concern about a sin being entered
    against him.
- source_word: σωθῆναι
  chosen: be saved
  alternatives:
  - be delivered
  - be rescued
  lexicon: BDAG
  rationale: Standard soteriological sense; simplest accurate rendering.
- source_word: ἐξιλάσομαι (τὸν Θεόν)
  chosen: appease (God)
  alternatives:
  - propitiate
  - make atonement to
  lexicon: BDAG / LSJ
  rationale: Verb of making favorably disposed; ‘appease’ is clear in contemporary
    English without importing later technical atonement formulations.
- source_word: ἱλατευθῇ μοι
  chosen: be gracious to me
  alternatives:
  - be propitiated toward me
  - be appeased toward me
  lexicon: BDAG
  rationale: Focuses on the resultant favorable disposition; preserves relational
    nuance; technical ‘propitiated’ noted in footnote.
- source_word: τελείων (τῶν ἁμαρτιῶν μου τῶν τελείων)
  chosen: in full
  alternatives:
  - complete
  - fully committed
  - grievous
  lexicon: BDAG / LSJ
  rationale: Here intensifies the seriousness/totality of the sins; ‘in full’ conveys
    completeness without implying moral perfection.
- source_word: ἐρωτήσω
  chosen: ask
  alternatives:
  - entreat
  - request
  - beseech
  lexicon: BDAG
  rationale: Neutral verb of asking; tone sustained by surrounding context.
- source_word: συμβουλευομένου / διακρίνοντος
  chosen: deliberating and weighing
  alternatives:
  - considering and debating
  - taking counsel and discerning
  lexicon: BDAG / LSJ
  rationale: Captures reflective, evaluative inner process indicated by both verbs.
- source_word: καθέδρα
  chosen: seat
  alternatives:
  - chair
  - throne
  lexicon: LSJ
  rationale: ‘Seat’ is the most neutral; avoids over-interpretation to ‘throne’ while
    allowing symbolic resonance.
- source_word: ἐξ ἐρίων χιονίνων
  chosen: of snow‑white wool
  alternatives:
  - of wools as white as snow
  lexicon: LSJ
  rationale: Idiomatic rendering that keeps the striking material and color imagery.
- source_word: γυνὴ πρεσβῦτις
  chosen: elderly woman
  alternatives:
  - aged woman
  - old woman
  lexicon: BDAG
  rationale: Conveys age with respect; matches the honorific address ‘Lady’ (Κυρία).
- source_word: ἱματισμῷ λαμπροτάτῳ
  chosen: exceedingly radiant clothing
  alternatives:
  - most splendid attire
  - very bright clothing
  lexicon: LSJ
  rationale: Superlative force preserved with ‘exceedingly’; ‘radiant’ suits visionary
    register.
- source_word: βιβλίον
  chosen: book
  alternatives:
  - little book
  - scroll
  lexicon: BDAG
  rationale: Generic ‘book’ avoids implying a scroll vs. codex; diminutive often functions
    neutrally in Koine.
- source_word: ἀσπάζεταί ... χαῖρε
  chosen: greeted … greetings
  alternatives:
  - hail
  - rejoice
  lexicon: BDAG
  rationale: ‘Greetings’ reflects idiomatic salutation; ‘rejoice’ noted as literal
    in footnote.
- source_word: στυγνός
  chosen: gloomy
  alternatives:
  - grim
  - sullen
  lexicon: LSJ
  rationale: Conveys downcast/severe demeanor without moral judgment.
- source_word: μακρόθυμος
  chosen: patient
  alternatives:
  - long‑suffering
  lexicon: BDAG
  rationale: Accessible modern term; alternative preserved as traditional rendering.
- source_word: ἀστομάχητος
  chosen: not quick‑tempered
  alternatives:
  - not irritable
  - unresentful
  lexicon: LSJ
  rationale: Negative of ‘to be angry/irascible’ (στομάχομαι); conveys temperament
    restraint.
- source_word: κατηφὴς τῇ ἰδέᾳ
  chosen: downcast in appearance
  alternatives:
  - gloomy in look
  - dejected in countenance
  lexicon: LSJ
  rationale: Keeps the external, visible aspect (ἰδέα) of his dejection.
- source_word: ἱλαρός
  chosen: cheerful
  alternatives:
  - glad
  lexicon: BDAG
  rationale: Standard sense; fits rhetorical contrast.
- source_word: γυναικὸς ἀγαθωτάτης
  chosen: a most excellent woman
  alternatives:
  - a very good woman
  lexicon: LSJ
  rationale: Superlative nuance retained with ‘most excellent’ while sounding natural.
- source_word: δοῦλος (τοῦ Θεοῦ)
  chosen: slave (of God)
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Project policy favors ‘slave’ where total belonging is salient; here
    it underscores identity and obligation to God.
- source_word: Μηδαμῶς ἐπὶ τὸν δοῦλον ... τὸ πρᾶγμα
  chosen: By no means does this matter belong to a slave
  alternatives:
  - Not at all is this matter laid upon a slave
  - This is not fitting for a slave
  lexicon: LSJ
  rationale: Idiomatic capture of ἐπὶ + accusative with sense of ‘falling upon/applying
    to’ someone.
- source_word: ἀνέβη ἐπὶ τὴν καρδίαν
  chosen: has risen into your heart
  alternatives:
  - has come up into your heart
  - has entered your mind
  lexicon: BDAG
  rationale: Preserves vivid metaphor of ascent into the inner life; ‘heart’ retained
    per early Christian anthropology.
- source_word: βουλή
  chosen: intention
  alternatives:
  - counsel
  - plan
  - purpose
  lexicon: BDAG
  rationale: Here denotes inner resolve/desire rather than advice; ‘intention’ fits
    moral frame.
- source_word: ἁμαρτίαν ἐπιφέρουσα
  chosen: brings sin
  alternatives:
  - brings about sin
  - leads to sin
  lexicon: BDAG
  rationale: Active causative nuance retained without over‑interpreting mechanism.
- source_word: ἔκπληκτος
  chosen: shocking
  alternatives:
  - astonishing
  - dreadful
  lexicon: LSJ
  rationale: Conveys alarming, startling quality the term has in moral contexts.
- source_word: πάνσεμνος
  chosen: most holy
  alternatives:
  - all‑holy
  - most venerable
  lexicon: LSJ
  rationale: Moral/religious register; ‘most holy’ communicates reverence of the spirit
    described.
- source_word: πνεῦμα
  chosen: spirit
  alternatives:
  - disposition
  - (Holy) Spirit
  lexicon: BDAG
  rationale: Context concerns the person’s own inner moral state, not the Holy Spirit;
    ‘spirit’ keeps anthropological term.
- source_word: δεδοκιμασμένον
  chosen: proven
  alternatives:
  - tested and approved
  - approved
  lexicon: BDAG
  rationale: Captures both testing and approval inherent in the perfect participle.
- source_word: ἐγκρατής
  chosen: self‑controlled
  alternatives:
  - continent
  - self‑restrained
  lexicon: BDAG
  rationale: Standard moral term; ‘self‑controlled’ is clear and common.
- source_word: ἀπεχόμενος
  chosen: hold yourself back
  alternatives:
  - abstaining
  - refraining
  lexicon: BDAG
  rationale: Dynamic rendering addressing Hermas directly; keeps concrete abstention
    idea.
- source_word: ἐπιθυμία
  chosen: desire
  alternatives:
  - lust
  lexicon: BDAG
  rationale: General term suited to Hermas’s moral exhortation; avoids over‑sexualizing
    unless context demands.
- source_word: ἁπλότης
  chosen: simplicity
  alternatives:
  - sincerity
  lexicon: BDAG
  rationale: Hermas values ‘simplicity’ as a virtue; we retain the traditional moral
    term.
- source_word: ἀκακία
  chosen: guilelessness
  alternatives:
  - innocence
  - harmlessness
  lexicon: BDAG / LSJ
  rationale: ‘Guilelessness’ preserves the moral nuance of being without craft or
    malice.
