translation:
  text: "1. He showed me men sitting on a bench, and another man sitting on a chair.\
    \ And he says to me, “Do you see the ones sitting on the bench?” “I see, sir,”\
    \ I say. “These,” he says, “are faithful; and the one sitting on the chair is\
    \ a false prophet who ruins the understanding of the slaves of God—he ruins those\
    \ who are double‑minded, not the faithful.\n\n2. These, then, the double‑minded,\
    \ come to him as to a magician and consult him about what will happen to them;\
    \ and that false prophet, having in himself no power of a divine spirit, speaks\
    \ with them according to their questions [and according to the desires of their\
    \ wickedness], and he fills their souls as they desire.\n\n3. For he, being empty,\
    \ answers empty men with empty things; for whatever he is asked, he answers to\
    \ the emptiness of the person. And he even says some true words; for the devil\
    \ fills him with his own spirit, if he can tear away any of the righteous.\n\n\
    4. Therefore, as many as are strong in the faith of the Lord, having put on the\
    \ truth, do not cling to such spirits, but keep away from them. But those who\
    \ are double‑minded and often repent practice divination like the nations and\
    \ bring a greater sin upon themselves by idol‑worship; for the one who consults\
    \ a false prophet about any action is an idolater, empty of the truth and senseless.\n\
    \n5. For every spirit given from God is not to be questioned, but, having the\
    \ power of the Deity, it speaks all things from itself, because it is from above,\
    \ from the power of the divine Spirit.\n\n6. But the spirit that is questioned\
    \ and that speaks according to human desires is earthly and light, having no power;\
    \ and in general it does not speak unless it is questioned.\n\n7. “How then,”\
    \ I say, “sir, will a person know which of them is a prophet and which is a false\
    \ prophet?” “Listen,” he says, “about both kinds of prophets; and in the way I\
    \ am about to tell you, so you shall test the prophet and the false prophet. Test\
    \ the man who has the divine spirit by his life.\n\n8. First of all, the one who\
    \ has the [divine] spirit from above is gentle and quiet and humble‑minded, and\
    \ refrains from every evil and from the vain desire of this age, and he makes\
    \ himself less than all people; and when asked he gives no answer to anyone, nor\
    \ does he speak in private—nor does the holy Spirit speak whenever a person wishes\
    \ to speak—but it speaks when God wishes him to speak.\n\n9. Therefore, when the\
    \ man who has the divine spirit comes into a gathering of righteous men who have\
    \ faith in the divine Spirit, and a petition is made to God by the gathering of\
    \ those men, then the angel of the prophetic spirit who is set over him fills\
    \ the man; and being filled with the holy Spirit he speaks to the multitude as\
    \ the Lord wills.\n\n10. Thus the spirit of the Deity will be made manifest. As\
    \ for the spirit of the Lord’s Deity—this is its power.\n\n11. “Hear now,” he\
    \ says, “about the spirit that is earthly and empty and has no power, but is foolish.\n\
    \n12. First, that man who thinks he has a spirit exalts himself and wants to have\
    \ the first seat; and straightway he is presumptuous and shameless and talkative,\
    \ and he conducts himself in many luxuries and in many other deceits, and he takes\
    \ payment for his prophecy; and if he does not receive it, he does not prophesy.\
    \ Can a divine spirit take payment and prophesy? A prophet of God cannot do this;\
    \ rather, the spirit of such prophets is earthly.\n\n13. Then, in general, he\
    \ does not come near a gathering of righteous men, but avoids them. He clings\
    \ to the double‑minded and the empty, and he prophesies to them in a corner, and\
    \ he deceives them by speaking everything according to their desires—emptily;\
    \ for he also answers the empty. For an empty vessel, placed together with empty\
    \ ones, is not broken, but they agree with one another.\n\n14. [Heaven.] \n\n\
    19. “How,” I say, “sir, can these things be? For you have said both these things\
    \ are impossible.” “As these, then, are impossible, so also the spirits that are\
    \ earthly are impossible and inert.\n\n20. Take now the power that comes from\
    \ above. Hail is a very small pellet, and when it falls on a man’s head—how much\
    \ pain it causes! Or again, take a drop that falls from the roof tile to the ground,\
    \ and it bores through the stone.\n\n21. You see, then, that things from above,\
    \ though very small when they fall upon the earth, have great power; so also the\
    \ divine spirit that comes from above is powerful. Trust in this spirit, but keep\
    \ away from the other.”"
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[2]'
    text: The bracketed clause “and according to the desires of their wickedness”
      is marked as secondary by some editors; the Greek source layer flags it as editorially
      uncertain.
    reason: textual_variant
  - marker: '[4]'
    text: “Like the nations” refers to pagan peoples (Gentiles) and their divinatory
      practices.
    reason: cultural_note
  - marker: '[8]'
    text: “Nor does he speak in private” renders κατὰ μόνας (“when alone/privately”).
      The point is that true prophecy is not dispensed on demand in private consultation.
    reason: cultural_note
  - marker: '[9]'
    text: “Angel of the prophetic spirit” reflects Hermas’s angelology, in which angelic
      beings oversee aspects of divine revelation and community life.
    reason: cross_reference
  - marker: '[10]'
    text: “The Deity” translates θεότης, a rare term also found in Col 2:9. It denotes
      divine nature/essence, not merely ‘divineness.’
    reason: cross_reference
  - marker: '[14]'
    text: The source layer preserves only the single word “heaven.” Most editions
      supply several lines here with two illustrative impossibilities; the omission
      likely reflects a lacuna in this OCR layer.
    reason: textual_variant
  - marker: '[21]'
    text: The contrast between things “from above” and “earthly” runs through this
      Mandate, culminating in the hail and drip images to illustrate true (from above)
      versus false (earthly) spirits.
    reason: cross_reference
lexical_decisions:
- source_word: συμψελλίον
  chosen: bench
  alternatives:
  - bench‑seat
  - settle
  lexicon: LSJ
  rationale: A low shared seat; “bench” captures a communal sitting surface distinguished
    from a single chair (καθέδρα).
- source_word: καθέδρα
  chosen: chair
  alternatives:
  - seat
  lexicon: LSJ
  rationale: Concrete furniture term; “chair” contrasts with the bench and underscores
    the false prophet’s singled‑out position.
- source_word: ψευδοπροφήτης
  chosen: false prophet
  lexicon: BDAG
  rationale: Standard, transparent rendering for a claimant to prophecy who is false.
- source_word: διάνοια
  chosen: understanding
  alternatives:
  - mind
  - discernment
  lexicon: BDAG
  rationale: In context, what is being ruined is the capacity to judge rightly; “understanding”
    fits well.
- source_word: δοῦλοι (τοῦ Θεοῦ)
  chosen: slaves (of God)
  alternatives:
  - servants of God
  lexicon: BDAG
  rationale: Project default prefers “slaves” where belonging to God is salient; Hermas
    emphasizes divine ownership.
- source_word: δίψυχος
  chosen: double‑minded
  alternatives:
  - two‑souled
  - vacillating
  lexicon: BDAG
  rationale: Established moral term in Hermas; “double‑minded” preserves idiom and
    his recurring vice list.
- source_word: μάγος
  chosen: magician
  alternatives:
  - sorcerer
  lexicon: BDAG
  rationale: Hermas contrasts prophecy with divinatory magic; “magician” is the clearest
    modern equivalent.
- source_word: ἐπερωτάω
  chosen: consult
  alternatives:
  - question
  - inquire of
  lexicon: BDAG
  rationale: In context of seeking future knowledge from a seer; “consult” communicates
    the divinatory act.
- source_word: πνεῦμα θεῖον / τὸ τῆς θεότητος
  chosen: divine spirit / the spirit of the Deity
  alternatives:
  - God’s Spirit
  - divine Spirit
  lexicon: BDAG
  rationale: Hermas distinguishes adjectives (theios vs. hagios). Rendering preserves
    the nuance of divinity/Deity.
- source_word: πνεῦμα ἅγιον
  chosen: holy Spirit
  alternatives:
  - Holy Spirit
  lexicon: BDAG
  rationale: Retains adjective “holy” explicitly; capitalization lightly varied to
    reflect Greek adjective, not a proper name.
- source_word: κενός
  chosen: empty
  alternatives:
  - vain
  - hollow
  lexicon: BDAG
  rationale: Key motif (emptiness) contrasted with fullness of the divine spirit;
    keep consistent literal term.
- source_word: ῥῆξαι (from ῥήγνυμι)
  chosen: tear away
  alternatives:
  - rend
  - snatch away
  lexicon: LSJ
  rationale: Violent metaphor for pulling some of the righteous away; “tear away”
    is vivid yet accurate.
- source_word: ἐνδύω (ἐνδεδυμένοι τὴν ἀλήθειαν)
  chosen: having put on the truth
  alternatives:
  - clothed with the truth
  lexicon: BDAG
  rationale: Clothing metaphor is important in Hermas; “put on” preserves the verb.
- source_word: μετανοέω
  chosen: repent
  alternatives:
  - change their mind
  lexicon: BDAG
  rationale: Context is repeated moral turning from sin; per project rule, use “repent”
    in specific-sin contexts.
- source_word: μαντεύομαι
  chosen: practice divination
  alternatives:
  - consult oracles
  - divine
  lexicon: LSJ
  rationale: Pagan divinatory practice; “practice divination” is precise.
- source_word: εἰδωλολατρεῖν
  chosen: worship idols
  alternatives:
  - be idolaters
  - practice idolatry
  lexicon: BDAG
  rationale: Verbal form; “worship idols” keeps active sense that incurs guilt.
- source_word: θεότης
  chosen: Deity
  alternatives:
  - divine nature
  - Godhead
  lexicon: BDAG
  rationale: “Deity” is transparent and contemporary while retaining metaphysical
    weight; avoids archaic “Godhead.”
- source_word: ἔντευξις
  chosen: petition
  alternatives:
  - entreaty
  - prayer
  lexicon: BDAG
  rationale: Formal communal prayer; “petition” fits the setting of a gathering appealing
    to God.
- source_word: ἄγγελος τοῦ προφητικοῦ πνεύματος
  chosen: angel of the prophetic spirit
  alternatives:
  - angel assigned to the prophetic spirit
  lexicon: BDAG
  rationale: Literal rendering preserves Hermas’s angelology linking prophetic inspiration
    with angelic oversight.
- source_word: ὑψοῦν ἑαυτόν
  chosen: exalts himself
  alternatives:
  - puffs himself up
  lexicon: BDAG
  rationale: Moral self‑promotion opposed to humility; “exalts himself” echoes biblical
    idiom without importing NT phrasing unduly.
- source_word: ἰταμός
  chosen: presumptuous
  alternatives:
  - impetuous
  - insolent
  lexicon: LSJ
  rationale: Conveys forward, rash boldness fitting the false prophet’s demeanor.
- source_word: ἀναιδής
  chosen: shameless
  alternatives:
  - impudent
  lexicon: LSJ
  rationale: Moral lack of shame is in view; “shameless” is clear.
- source_word: πολύλαλος
  chosen: talkative
  alternatives:
  - a babbler
  - wordy
  lexicon: LSJ
  rationale: Describes verbosity; “talkative” is simple and accurate.
- source_word: τρυφή
  chosen: luxury
  alternatives:
  - self‑indulgence
  lexicon: LSJ
  rationale: Lifestyle of ease and indulgence; “luxury” fits plural “many luxuries.”
- source_word: ἀπάτη
  chosen: deceit
  alternatives:
  - trickery
  lexicon: BDAG
  rationale: General term for deceptive practices.
- source_word: μισθός
  chosen: payment
  alternatives:
  - wages
  - fee
  lexicon: BDAG
  rationale: Remuneration received for prophecy; “payment” covers the sense without
    implying employment (wages).
- source_word: συναγωγή
  chosen: gathering
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: General assembly; avoids anachronistic association with the Jewish synagogue
    while keeping literal sense.
- source_word: κατὰ γωνίαν
  chosen: in a corner
  alternatives:
  - privately
  - in secret
  lexicon: LSJ
  rationale: Concrete image of skulking prophecy away from the gathered righteous;
    literal but intelligible.
- source_word: συμφωνεῖν
  chosen: agree
  alternatives:
  - harmonize
  lexicon: BDAG
  rationale: “Agree with one another” fits the vessel metaphor plainly.
- source_word: ἀδρανής
  chosen: inert
  alternatives:
  - inactive
  - powerless
  lexicon: LSJ
  rationale: Captures lack of effective power; pairs well with “earthly” and “light.”
- source_word: χάλαζα
  chosen: hail
  alternatives:
  - hailstone
  lexicon: LSJ
  rationale: Collective used as countable in context; “hail” as a small pellet is
    familiar.
- source_word: κεράμος
  chosen: roof tile
  alternatives:
  - tile
  lexicon: LSJ
  rationale: Ceramic roofing tile in Greco‑Roman context; “roof tile” specifies origin
    of the drop.
- source_word: σταγών
  chosen: drop
  lexicon: LSJ
  rationale: Simple, literal rendering.
- source_word: τρυπᾷ
  chosen: bores through
  alternatives:
  - pierces
  - drills through
  lexicon: LSJ
  rationale: Describes the erosive effect of repeated drops; “bores through” is vivid
    and idiomatic.
- source_word: πλῆθος
  chosen: multitude
  alternatives:
  - crowd
  - assembly
  lexicon: BDAG
  rationale: Retains the sense of a gathered many to whom the inspired person speaks.
- source_word: ἐλαφρός
  chosen: light
  alternatives:
  - frivolous
  - trifling
  lexicon: BDAG
  rationale: Primary meaning is light (in weight); connotes triviality; kept literal
    with context clarifying weakness.
- source_word: πίστις (θείου πνεύματος)
  chosen: faith in the divine Spirit
  alternatives:
  - faith from the divine Spirit
  - spirit‑given faith
  lexicon: BDAG
  rationale: Genitive likely objective (“in”); chosen for clarity, with alternatives
    noted in theological decisions.
