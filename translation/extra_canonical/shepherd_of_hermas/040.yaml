id: HERM.M.11
reference: Shepherd of Hermas — Mandate 11
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ἔδειξέ μοι ἐπὶ συμψελλίου καθημένους ἀνθρώπους, καὶ ἕτερον ἄνθρωπον καθήμενον
    ἐπὶ καθέδραν. καὶ λέγει μοι· Βλέπεις τοὺς ἐπὶ τοῦ συμψελλίου καθημένους; Βλέπω,
    φημί, κύριε. Οὗτοι, φησί, πιστοί εἰσι, καὶ ὁ καθήμενος ἐπὶ τὴν καθέδραν ψευδοπροφήτης
    ἐστὶν [ὃς] ἀπόλλυσι τὴν διάνοιαν τῶν δούλων τοῦ Θεοῦ· τῶν διψύχων δὲ ἀπόλλυσιν,
    οὐ τῶν πιστῶν. 2. οὗτοι οὖν οἱ δίψυχοι ὡς ἐπὶ μάγον ἔρχονται, καὶ ἐπερωτῶσιν αὐτὸν
    τί ἄρα ἔσται αὐτοῖς· κἀκεῖνος ὁ ψευδοπροφήτης, μηδεμίαν ἔχων ἐν ἑαυτῷ δύναμιν
    πνεύματος θείου, λαλεῖ μετ’ αὐτῶν κατὰ τὰ ἐπερωτήματα αὐτῶν [καὶ κατὰ τὰς ἐπιθυμίας
    τῆς πονηρίας αὐτῶν], καὶ πληροῖ τὰς ψυχὰς αὐτῶν , καθὼς αὐτοὶ βούλονται. 3. αὐτὸς
    γὰρ κενὸς ὢν κενὰ καὶ ἀποκρίνεται κενοῖς· ὃ γὰρ ἐὰν ἐπερωτηθῇ, πρὸς τὸ κένωμα
    τοῦ ἀνθρώπου ἀποκρίνεται. τινὰ δὲ καὶ ῥήματα ἀληθῆ λαλεῖ· ὁ γὰρ διάβολος πληροῖ
    αὐτὸν τῷ αὐτοῦ πνεύματι, εἴ τινα δυνήσεται ῥῆξαι τῶν δικαίων. 4. ὅσοι οὖν ἰσχυροί
    εἰσιν ἐν τῇ πίστει τοῦ Κυρίου ἐνδεδυμένοι τὴν ἀλήθειαν, τοῖς τοιούτοις πνεύμασιν
    οὐ κολλῶνται, ἀλλ’ ἀπέχονται ἀπ’ αὐτῶν. ὅσοι δὲ δίψυχοί εἰσι καὶ πυκνῶς μετανοοῦσι,
    μαντεύονται ὡς καὶ τὰ ἔθνη, καὶ ἑαυτοῖς μείζονα ἁμαρτίαν ἐπιφέρουσιν εἰδωλολατροῦντες·
    ὁ γὰρ ἐπερωτῶν ψευδοπροφήτην περὶ πράξεώς τινος εἰδωλολάτρης ἐστὶ καὶ κενὸς ἀπὸ
    τῆς ἀληθείας καὶ ἄφρων. 5. πᾶν γὰρ πνεῦμα ἀπὸ Θεοῦ δοθὲν οὐκ ἐπερωτᾶται, ἀλλὰ
    ἔχον τὴν δύναμιν τῆς θεότητος ἀφ' ἑαυτοῦ λαλεῖ πάντα, ὅτι ἄνωθέν ἐστιν ἀπὸ τῆς
    δυνάμεως τοῦ θείου πνεύματος. 6. τὸ δὲ πνεῦμα τὸ ἐπερωτώμενον καὶ λαλοῦν κατὰ
    τὰς ἐπιθυμίας τῶν ἀνθρώπων ἐπίγειόν ἐστι καὶ ἐλαφρόν, δύναμιν μὴ ἔχον· καὶ ὅλως
    οὐ λαλεῖ ἐὰν μὴ ἐπερωτηθῇ. 7. Πῶς οὖν, φημί, κύριε, ἄνθρωπος γνώσεται τίς αὐτῶν
    προφήτης καὶ τίς ψευδοπροφήτης ἐστίν; Ἄκουε, φησί, περὶ ἀμφοτέρων τῶν προφητῶν·
    καὶ ὥς σοι μέλλω λέγειν, οὕτω δοκιμάσεις τὸν προφήτην καὶ τὸν ψευδοπροφήτην. ἀπὸ
    τῆς ζωῆς δοκίμαζε τὸν ἄνθρωπον τὸν ἔχοντα τὸ πνεῦμα τὸ θεῖον. 8. πρῶτον μὲν ὁ
    ἔχων τὸ πνεῦμα [τὸ θεῖον] τὸ ἄνωθεν πραΰς ἐστι καὶ ἡσύχιος καὶ ταπεινόφρων καὶ
    ἀπεχόμενος ἀπὸ πάσης πονηρίας καὶ ἐπιθυμίας ματαίας τοῦ αἰῶνος τούτου, καὶ ἑαυτὸν
    ἐνδεέστερον ποιεῖ πάντων τῶν ἀνθρώπων, καὶ οὐδενὶ οὐδὲν ἀποκρίνεται ἐπερωτώμενος,
    οὐδὲ κατὰ μόνας λαλεῖ—οὐδὲ ὅταν θέλῃ ἄνθρωπος λαλεῖν, λαλεῖ τὸ πνεῦμα τὸ ἅγιον—ἀλλὰ
    τότε λαλεῖ, ὅταν θελήσῃ αὐτὸν ὁ Θεὸς λαλῆσαι. 9. ὅταν οὖν ἔλθῃ ὁ ἄνθρωπος ὁ ἔχων
    τὸ πνεῦμα τὸ θεῖον εἰς συναγωγὴν ἀνδρῶν δικαίων τῶν ἐχόντων πίστιν θείου πνεύματος,
    καὶ ἔντευξις γένηται πρὸς τὸν Θεὸν τῆς συναγωγῆς τῶν ἀνδρῶν ἐκείνων, τότε ὁ ἄγγελος
    τοῦ προφητικοῦ πνεύματος ὁ κείμενος πρὸς αὐτὸν πληροῖ τὸν ἄνθρωπον, καὶ πληρωθεὶς
    ὁ ἄνθρωπος τῷ πνεύματι τῷ ἁγίῳ λαλεῖ εἰς τὸ πλῆθος, καθὼς ὁ Κύριος βούλεται. 10.
    οὕτως οὖν φανερὸν ἔσται τὸ πνεῦμα τῆς θεότητος. ὅση οὖν περὶ τοῦ πνεύματος τῆς
    θεότητος τοῦ Κυρίου, ἡ δύναμις αὕτη. 11. ἄκουε νῦν, φησί, περὶ τοῦ πνεύματος τοῦ
    ἐπιγείου καὶ κενοῦ καὶ δύναμιν μὴ ἔχοντος, ἀλλὰ ὄντος μωροῦ. 12. πρῶτον μὲν ὁ
    ἄνθρωπος ἐκεῖνος ὁ δοκῶν πνεῦμα ἔχειν ὑψοῖ ἑαυτὸν καὶ θέλει πρωτοκαθεδρίαν ἔχειν,
    καὶ εὐθὺς ἰταμός ἐστι καὶ ἀναιδὴς καὶ πολύλαλος καὶ ἐν τρυφαῖς πολλαῖς ἀναστρεφόμενος
    καὶ ἐν ἑτέραις πολλαῖς ἀπάταις, καὶ μισθὸν λαμβάνει τῆς προφητείας αὐτοῦ· ἐὰν
    δὲ μὴ λάβῃ, οὐ προφητεύει. δύναται οὖν πνεῦμα θεῖον μισθὸν λαμβάνειν καὶ προφητεύειν;
    οὐκ ἐνδέχεται τοῦτο ποιεῖν Θεοῦ προφήτην, ἀλλὰ τῶν τοιούτων προφητῶν ἐπίγειόν
    ἐστι τὸ πνεῦμα. 13. εἶτα ὅλως εἰς συναγωγὴν ἀνδρῶν δικαίων οὐκ ἐγγίζει, ἀλλ' ἀποφεύγει
    αὐτούς. κολλᾶται δὲ τοῖς διψύχοις καὶ κενοῖς, καὶ κατὰ γωνίαν αὐτοῖς προφητεύει,
    καὶ ἀπατᾷ αὐτοὺς λαλῶν κατὰ τὰς ἐπιθυμίας αὐτῶν πάντα κενῶς· κενοῖς γὰρ καὶ ἀποκρίνεται.
    τὸ γὰρ κενὸν σκεῦος μετὰ τῶν κενῶν συντιθέμενον οὐ θραύεται, ἀλλὰ συμφωνοῦσιν
    ἀλλήλοις. 14 οὐρανόν. 19. Πῶς, φημί, κύριε, δύναται ταῦτα γενέσθαι; ἀδύνατα γὰρ
    ἀμφότερα ταῦτα εἴρηκας. Ὡς ταῦτα οὖν, φησίν, ἀδύνατά ἐστιν, οὕτω καὶ τὰ πνεύματα
    τὰ ἐπίγεια ἀδύνατά ἐστι καὶ ἀδρανῆ. 20. λάβε νῦν τὴν δύναμιν τὴν ἄνωθεν ἐρχομένην.
    ἡ χάλαζα ἐλάχιστόν ἐστι κοκκάριον, καὶ ὅταν ἐπιπέσῃ ἐπὶ κεφαλὴν ἀνθρώπου, πῶς
    πόνον παρέχει; ἢ πάλιν λάβε σταγόνα ἣ ἀπὸ τοῦ κεράμου πίπτει χαμαί, καὶ τρυπᾷ
    τὸν λίθον. 21. βλέπεις οὖν ὅτι τὰ ἄνωθεν ἐλάχιστα πίπτοντα ἐπὶ τὴν γῆν μεγάλην
    δύναμιν ἔχει· οὕτω καὶ τὸ πνεῦμα τὸ θεῖον ἄνωθεν ἐρχόμενον δυνατόν ἐστι. τούτῳ
    οὖν τῷ πνεύματι πίστευε, ἀπὸ δὲ τοῦ ἑτέρου ἀπέχου.
