theological_decisions:
- issue: Rendering δοῦλοι τοῦ Θεοῦ
  chosen_reading: slaves of God
  alternative_readings:
  - servants of God
  rationale: Hermas emphasizes belonging and obedience to God. Project default prefers
    “slaves” where bondedness is salient.
  doctrine_reference: 'Translation philosophy: contested terms (δοῦλος).'
- issue: Distinguishing πνεῦμα θεῖον and πνεῦμα ἅγιον
  chosen_reading: Render theios as “divine spirit” and hagios as “holy Spirit,” preserving
    Hermas’s adjectival nuance.
  alternative_readings:
  - Uniformly ‘Holy Spirit’ for both
  - ‘God’s Spirit’ for both
  rationale: Hermas uses both adjectives; preserving them keeps his diction and allows
    readers to see how he speaks of inspiration.
- issue: Genitive in τῶν ἐχόντων πίστιν θείου πνεύματος
  chosen_reading: faith in the divine Spirit (objective genitive)
  alternative_readings:
  - faith from the divine Spirit (source)
  - spirit‑given faith (attributive)
  rationale: Context describes the righteous as believers gathered in prayer, not
    the origin of their faith; ‘in’ reads most naturally while alternatives are plausible.
- issue: Identity of the ‘angel of the prophetic spirit’
  chosen_reading: Translate literally as an angel set over the prophet who mediates
    prophetic filling.
  alternative_readings:
  - Paraphrase as ‘the prophetic Spirit’ without angel
  - Interpret as metaphor for inspiration
  rationale: Hermas’s angelology features angelic overseers; the literal reading best
    respects his framework.
- issue: Equating consultation of false prophets with idolatry
  chosen_reading: Maintain the strong claim that consulting a false prophet about
    actions constitutes idol‑worship.
  rationale: Hermas draws a moral equivalence to pagan divination; softening would
    undercut his exhortation.
- issue: Translation of θεότης
  chosen_reading: Deity
  alternative_readings:
  - Godhead
  - divine nature
  rationale: ‘Deity’ communicates divine essence without archaic overtones; retains
    metaphysical sense suitable to Hermas’s contrast with earthly spirits.
- issue: Concluding exhortation πιστεύειν τῷ πνεύματι
  chosen_reading: Trust in this spirit
  alternative_readings:
  - Believe this spirit
  - Believe in this spirit
  rationale: ‘Trust in’ conveys reliance and obedience without narrowing to propositional
    belief; keeps imperative force.
