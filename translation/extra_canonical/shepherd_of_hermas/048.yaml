source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: τοῦ Θεοῦ. 9. εἰς τοῦτο γὰρ ἐπλούτισεν ὑμᾶς ὁ δεσπότης, ἵνα ταύτας τὰς διακονίας
    τελέσητε αὐτῷ· πολὺ βέλτιόν ἐστι τοιούτους ἀγροὺς ἀγοράζειν [καὶ κτήματα] καὶ
    οἴκους, οὓς εὑρήσεις ἐν τῇ πόλει σου, ὅταν ἐπιδημήσῃς εἰς αὐτήν. 10. αὕτη ἡ πολυτέλεια
    καλὴ καὶ ἱλαρά, λύπην μὴ ἔχουσα μηδὲ φόβον, ἔχουσα δὲ χαράν. τὴν οὖν πολυτέλειαν
    τῶν ἐθνῶν μὴ πράσσετε· ἀσύμφορον γάρ ἐστιν ὑμῖν τοῖς δούλοις τοῦ Θεοῦ· 11. τὴν
    δὲ ἰδίαν πολυτέλειαν πράσσετε, ἐν ᾗ δύνασ δίδωσιν, ἐρριμμένη δὲ χαμαὶ σαπρὸν καὶ
    ὀλίγον φέρει. αὕτη οὖν ἡ παραβολὴ εἰς τοὺς δούλους τοῦ Θεοῦ κεῖται, εἰς πτωχὸν
    καὶ πλούσιον. 5. Πῶς, φημί, κύριε; γνώρισόν μοι. Ἄκουε, φησίν· ὁ μὲν πλούσιος
    ἔχει χρήματα πολλά, τὰ δὲ πρὸς τὸν Κύριον πτωχεύει περισπώμενος περὶ τὸν πλοῦτον
    αὐτοῦ, καὶ λίαν μικρὰν ἔχει τὴν ἐξομολόγησιν καὶ τὴν ἔντευξιν πρὸς τὸν Κύριον,
    καὶ ἣν ἔχει, μικρὰν καὶ βληχρὰν καὶ ἄνω μὴ ἔχουσαν δύναμιν. ὅταν οὖν ἀναβῇ ὁ πλούσιος
    ἐπὶ τὸν πένητα καὶ χορηγήσῃ αὐτῷ τὰ δέοντα, πιστεύων ὅτι ὃ ἐργάσεται εἰς τὸν πένητα
    δυνήσεται τὸν μισθὸν εὑρεῖν παρὰ τῷ Θεῷ—ὅτι ὁ πένης πλούσιός ἐστιν ἐν τῇ ἐντεύξει
    [καὶ τῇ ἐξομολογήσει,] καὶ δύναμιν μεγάλην ἔχει ἡ ἔντευξις αὐτοῦ παρὰ τῷ Θεῷ—
    ἐπιχορηγεῖ οὖν ὁ πλούσιος τῷ πένητι πάντα ἀδιστάκτως· 6. ὁ πένης δὲ ἐπιχορηγούμενος
    ὑπὸ τοῦ πλουσίου ἐντυγχάνει αὐτῷ, τῷ Θεῷ εὐχαριστῶν περὶ τοῦ διδόντος αὐτῷ. κἀκεῖνος
    ἔτι ἐπισπουδάζει περὶ τοῦ πένητος, ἵνα ἀδιάλειπτος γένηται ἐν τῇ ζωῇ αὐτοῦ· οἶδε
    γὰρ ὅτι ἡ ἔντευξις τοῦ πένητος προσδεκτή ἐστι καὶ πλουσία πρὸς τὸν Θεόν. 7. ἀμφότεροι
    οὖν τὸ ἔργον τελοῦσιν· ὁ μὲν πένης ἐργάζεται τὴν ἔντευξιν ἐν ᾗ πλουτεῖ, [ἣν ἔλαβεν
    ἀπὸ τοῦ Κυρίου·] ταύτην ἀποδίδωσι τῷ Κυρίῳ τῷ ἐπιχορηγοῦντι αὐτῷ. καὶ ὁ πλούσιος
    ὡσαύτως τὸν πλοῦτον ὃν ἔλαβεν ἀπὸ τοῦ Κυρίου ἀδιστάκτως παρέχει τῷ πένητι. καὶ
    τοῦτο ἔργον μέγα ἐστὶ καὶ δεκτὸν παρὰ τῷ Θεῷ, ὅτι συνῆκεν ἐπὶ τῷ πλούτῳ αὐτοῦ
    καὶ εἰργάσατο εἰς τὸν πένητα ἐκ τῶν δωρημάτων τοῦ Κυρίου καὶ ἐτέλεσε τὴν διακονίαν
    τοῦ Κυρίου ὀρθῶς. 8. παρὰ τοῖς ἀνθρώποις οὖν ἡ πτελέα δοκεῖ καρπὸν μὴ φέρειν,
    καὶ οὐκ οἴδασιν οὐδὲ νοοῦσιν ὅτι, ἐὰν ἀβροχία γένηται, ἡ πτελέα ὕδωρ ἔχουσα τρέφει
    τὴν ἄμπελον, καὶ ἡ ἄμπελος ἀδιάλειπτον ἔχουσα ὕδωρ διπλοῦν τὸν καρπὸν δίδωσι,
    καὶ ὑπὲρ ἑαυτῆς καὶ ὑπὲρ τῆς πτελέας. οὕτω καὶ οἱ πένητες ἐντυγχάνοντες πρὸς τὸν
    Κύριον ὑπὲρ τῶν πλουσίων
