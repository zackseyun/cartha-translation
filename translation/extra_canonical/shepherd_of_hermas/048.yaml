translation:
  text: 'For to this end the Master has made you rich, that you might carry out these
    ministries for him; it is far better to buy such fields [and estates] and houses,
    which you will find in your city when you arrive in it. This luxury is good and
    cheerful, having no grief nor fear, but having joy. So do not practice the luxury
    of the nations; for it is unprofitable for you, the slaves of God. Rather practice
    your own luxury, in which you are able to rejoice. For all luxury of this kind
    is profitable. But the luxury of the nations is bitter and harsh. This parable,
    then, is set before the slaves of God, for the poor and the rich.


    ‘How so, sir?’ I say. ‘Make it known to me.’ ‘Listen,’ he says: ‘The rich man
    has much money, but toward the Lord he is poor, being distracted about his wealth,
    and he has very little confession and intercession toward the Lord; and what he
    has is small and feeble, and has no power to go up above. When, therefore, the
    rich man goes to the needy and supplies him with what is necessary, believing
    that what he does for the needy he will be able to find as his reward from God—for
    the needy is rich in intercession [and in confession], and his intercession has
    great power with God—the rich man supplies the needy with everything without hesitation.
    And the needy, being supplied by the rich, intercedes for him, giving thanks to
    God on behalf of the one who gives to him. And that one is still more eager concerning
    the needy, so that he may be unceasing in his life; for he knows that the intercession
    of the needy is acceptable and rich before God. Therefore both complete the work:
    the needy performs the intercession in which he is rich, [which he received from
    the Lord;] this he renders to the Lord for the one who supplies him. And likewise
    the rich man without hesitation provides to the needy the wealth which he received
    from the Lord. And this is a great work and acceptable with God, because he understood
    concerning his wealth and worked for the needy out of the gifts of the Lord and
    fulfilled the Lord’s ministry rightly. Therefore, among people the elm seems not
    to bear fruit; and they do not know nor understand that, if there should be a
    drought, the elm, having water, nourishes the vine, and the vine, having unceasing
    water, gives double fruit, both for itself and for the elm. In the same way also
    the needy, interceding with the Lord on behalf of the rich...'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: '"and estates" (καὶ κτήματα) appears bracketed in the Greek; some witnesses
      include it, others omit it.'
    reason: textual_variant
  - marker: '[2]'
    text: ἐπιδημήσῃς can mean "be present as a resident/visitor"; here, the thought
      is of arriving again at one’s own city, an eschatological image in Hermas.
    reason: lexical_alternative
  - marker: '[3]'
    text: Hermas pointedly redefines "luxury" as joyful, fear-free generosity that
      stores up for life in the coming city.
    reason: cultural_note
  - marker: '[4]'
    text: The Greek δοῦλοι τοῦ Θεοῦ is rendered "slaves of God" to preserve the ownership-and-obedience
      nuance; "servants" is a smoother but less exact alternative.
    reason: lexical_alternative
  - marker: '[5]'
    text: '"and in confession" (καὶ τῇ ἐξομολογήσει) is bracketed; the phrase may
      be a scribal addition or gloss.'
    reason: textual_variant
  - marker: '[6]'
    text: ἔντευξις is a specific term for petitionary approach/intercession; alternatives
      are "petition" or general "prayer."
    reason: lexical_alternative
  - marker: '[7]'
    text: The clause likely means the needy person is sustained continually by the
      rich man’s care. Some take it of the rich man’s own constancy in doing good.
    reason: alternative_reading
  - marker: '[8]'
    text: '"Abundant with God" could also be translated "rich toward God," preserving
      the idiom πλουσία πρὸς τὸν Θεόν.'
    reason: lexical_alternative
  - marker: '[9]'
    text: '"Ministry" (διακονία) here is not a formal office but the service assigned
      by the Master, fulfilled in almsgiving.'
    reason: cultural_note
  - marker: '[10]'
    text: 'The elm-and-vine image explains the mutual benefit: the elm stores/nourishes
      with water; the vine yields fruit for both itself and the elm.'
    reason: cultural_note
  - marker: '[11]'
    text: The Greek here is difficult; the subject of "thrown to the ground it is
      rotten and bears little" is not explicit in the preserved text, but likely contrasts
      transient worldly luxury with enduring Christian "luxury."
    reason: alternative_reading
  - marker: '[12]'
    text: '"which he received from the Lord" is bracketed in the Greek and may reflect
      a textual variant.'
    reason: textual_variant
  - marker: '[13]'
    text: μισθός is rendered "wage" to retain the remuneration metaphor; "reward"
      is an alternative.
    reason: lexical_alternative
  - marker: '[14]'
    text: '"the nations" translates ἔθνη; "Gentiles" is an alternative. Hermas contrasts
      pagan luxury with Christian use of wealth.'
    reason: lexical_alternative
  - marker: a
    text: Or 'in which you are able to give; but when it is thrown to the ground it
      bears rotten and little fruit.'.
    reason: previous_rendering
  - marker: b
    text: Or 'unhesitatingly provides to the needy'.
    reason: previous_rendering
lexical_decisions:
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Lord
  - Owner
  lexicon: LSJ / Lampe
  rationale: Maintains the nuance of authority/ownership distinct from κύριος; God
    portrayed as the Master who entrusted resources.
- source_word: διακονία
  chosen: ministries
  alternatives:
  - service
  - ministry
  lexicon: BDAG / Lampe
  rationale: In Hermas, διακονία bears ecclesial-service overtones. "Ministries" preserves
    that while remaining concrete.
- source_word: πολυτέλεια
  chosen: luxury
  alternatives:
  - splendor
  - extravagance
  - opulence
  lexicon: LSJ / Lampe
  rationale: The term denotes costly living. Hermas redeploys it ironically for almsgiving;
    "luxury" keeps the rhetorical edge.
- source_word: ἀγοράζειν
  chosen: buy
  alternatives:
  - purchase
  - acquire
  lexicon: LSJ
  rationale: Common sense fits the metaphor of laying up acquisitions for the future
    city.
- source_word: κτήματα
  chosen: estates
  alternatives:
  - properties
  - possessions
  lexicon: LSJ
  rationale: In context of fields and houses, "estates" captures landed property;
    bracketed as a textual variant.
- source_word: ἐπιδημέω (ἐπιδημήσῃς)
  chosen: arrive (in it)
  alternatives:
  - sojourn
  - visit
  - come to reside
  lexicon: LSJ
  rationale: The verb means to be present in/return to a place as a visitor or resident;
    "arrive" is idiomatic and neutral.
- source_word: ἱλαρά
  chosen: cheerful
  alternatives:
  - glad
  - joyous
  lexicon: LSJ
  rationale: Paired with "good" to describe a joy-filled kind of luxury; "cheerful"
    fits the tone.
- source_word: ἔθνη
  chosen: the nations
  alternatives:
  - Gentiles
  - pagans
  lexicon: BDAG
  rationale: Hermas contrasts believers with the nations; "the nations" keeps the
    Jewish-Christian idiom without over-reading ethnicity.
- source_word: ἀσύμφορον
  chosen: unprofitable
  alternatives:
  - not beneficial
  - harmful
  - inexpedient
  lexicon: LSJ
  rationale: Economic metaphor aligns with discourse on wealth; "unprofitable" matches
    the warning to God’s slaves.
- source_word: δοῦλοι (τοῦ Θεοῦ)
  chosen: slaves (of God)
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: 'Project default: retain "slaves" where the ownership/service relation
    to God is salient.'
- source_word: πτωχός
  chosen: poor
  alternatives:
  - destitute
  lexicon: BDAG / LSJ
  rationale: General term for poor; contrasted with πλούσιος. Kept as "poor" for clarity.
- source_word: πένης
  chosen: needy (person)
  alternatives:
  - poor man
  - pauper
  lexicon: LSJ / Lampe
  rationale: πένης often denotes one who works yet is needy. Rendering as "needy"
    distinguishes it from πτωχός.
- source_word: ἔντευξις
  chosen: intercession
  alternatives:
  - petition
  - prayer
  lexicon: BDAG / Lampe
  rationale: Technical term for a petitionary approach on behalf of another; "intercession"
    captures the mediated aspect.
- source_word: ἐξομολόγησις
  chosen: confession
  alternatives:
  - thanksgiving
  - praise
  lexicon: BDAG / Lampe
  rationale: In early Christian usage often confession of sins and praise. In Hermas'
    penitential setting, "confession" is apt.
- source_word: μισθός
  chosen: wage
  alternatives:
  - reward
  - pay
  lexicon: BDAG / LSJ
  rationale: Preserves retributive imagery of remuneration from God for works done
    for the needy.
- source_word: ἀδιστάκτως
  chosen: without doubting
  alternatives:
  - without hesitation
  - unwaveringly
  lexicon: LSJ / Lampe
  rationale: Carries both cognitive and volitional firmness; "without doubting" fits
    Hermas’ emphasis on single-mindedness.
- source_word: ἐπισπουδάζω
  chosen: is eager
  alternatives:
  - makes haste
  - takes pains
  lexicon: LSJ / Lampe
  rationale: Denotes earnest concern; "is eager" renders the ongoing care of the rich
    for the needy.
- source_word: ἀδιάλειπτος
  chosen: without cease
  alternatives:
  - unceasing
  - continual
  lexicon: BDAG
  rationale: Adverbial nuance in phrase about sustaining life; "without cease" mirrors
    the Greek lexical form.
- source_word: προσδεκτός
  chosen: acceptable
  alternatives:
  - welcome
  - well-pleasing
  lexicon: BDAG / LSJ
  rationale: Conventional cultic-prayer term; "acceptable" aligns with the idiom "acceptable
    to God."
- source_word: πλουσία πρὸς τὸν Θεόν
  chosen: abundant with God
  alternatives:
  - rich toward God
  - plentiful before God
  lexicon: Lampe
  rationale: Genitive/prepositional phrase indicates abundance in God’s presence;
    "abundant with God" keeps idiomatic freshness.
- source_word: συνίημι ἐπὶ τῷ πλούτῳ
  chosen: came to understand about his wealth
  alternatives:
  - took thought for his wealth
  - came to his senses regarding wealth
  lexicon: LSJ
  rationale: Here implies recognition of proper use under God; chosen rendering is
    idiomatic yet close.
- source_word: τελέω (διακονίαν)
  chosen: fulfilled (the Lord’s ministry)
  alternatives:
  - completed the service
  - carried out the ministry
  lexicon: BDAG / LSJ
  rationale: '"Fulfilled" conveys completing an assigned service; aligns with Hermas’
    duty language.'
- source_word: πτελέα
  chosen: elm
  alternatives:
  - elm-tree
  - plane tree
  lexicon: LSJ
  rationale: Standard identification for πτελέα is elm; "plane tree" (πλάτανος) is
    a different term.
- source_word: ἀβροχία
  chosen: drought
  alternatives:
  - dry spell
  - lack of rain
  lexicon: LSJ
  rationale: Literal meteorological term; "drought" is concise and vivid.
- source_word: τρέφω
  chosen: nourish
  alternatives:
  - sustain
  - feed
  lexicon: LSJ
  rationale: Agricultural metaphor of the elm sustaining the vine’s water supply.
- source_word: διπλοῦν τὸν καρπὸν δίδωμι
  chosen: gives double the fruit
  alternatives:
  - produces double fruit
  - yields twice the fruit
  lexicon: LSJ
  rationale: Keeps numerical emphasis and active voice of the vine giving fruit for
    itself and for the elm.
