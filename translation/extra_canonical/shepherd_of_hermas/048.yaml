theological_decisions:
- issue: Rendering δοῦλοι τοῦ Θεοῦ
  chosen_reading: Translate as "slaves of God" rather than "servants of God."
  alternative_readings:
  - servants of God
  - bondservants of God
  rationale: Hermas emphasizes belonging and obligation under God’s ownership. The
    project’s policy favors "slave" where bonded nature is salient.
  doctrine_reference: 'Cartha Translation Philosophy: Contested terms — δοῦλος'
- issue: δεσπότης as a divine title
  chosen_reading: Render as "Master" to preserve household-lord nuance distinct from
    "Lord" (κύριος).
  alternative_readings:
  - Lord
  - Owner
  rationale: The passage frames God as the one who enriched believers and assigns
    ministries. "Master" sustains the parable’s service language.
- issue: πολυτέλεια as moral category
  chosen_reading: Keep "luxury" and let Hermas redefine it as generous use of wealth
    for almsgiving and eschatological investment.
  alternative_readings:
  - splendor
  - generosity (interpretive)
  rationale: Avoids flattening Hermas’ ironic rhetoric; he contrasts pagan luxury
    with a Christian "luxury" that is joyful and fear-free.
- issue: ἔντευξις and ἐξομολόγησις
  chosen_reading: Render ἔντευξις as "intercession" and ἐξομολόγησις as "confession."
  alternative_readings:
  - prayer and thanksgiving/praise
  rationale: Hermas links the poor person’s spiritual wealth to mediated prayer and
    penitence; "intercession" + "confession" preserves this texture.
- issue: μισθός imagery
  chosen_reading: Translate μισθός as "wage."
  alternative_readings:
  - reward
  rationale: 'Hermas uses a remuneration metaphor: what is done for the needy will
    be paid back by God. "Wage" keeps the earthy economic feel.'
- issue: “City” as destination
  chosen_reading: Keep "city" without specifying "heaven."
  alternative_readings:
  - heaven
  - heavenly city (interpretive)
  rationale: Hermas often speaks of the eschatological city metaphorically. Retaining
    "city" preserves the allegory and avoids over-interpretation.
- issue: Subject of ἵνα ἀδιάλειπτος γένηται ἐν τῇ ζωῇ αὐτοῦ
  chosen_reading: Refer the pronoun to the needy person, i.e., the rich continues
    caring so that the needy may be sustained continually in life.
  alternative_readings:
  - Refer to the rich man’s constancy in generous living
  rationale: Nearest antecedent is the needy person; the care’s aim is his ongoing
    sustenance. This fits the reciprocal logic of the parable.
- issue: Elm–vine allegory application
  chosen_reading: Interpret elm (apparently fruitless) as the rich, and vine as the
    needy; the needy’s intercessions nourish the rich to produce double fruit.
  alternative_readings:
  - Elm as the needy; vine as the rich (reversed)
  rationale: Immediate context explicitly frames the parable as for rich and poor;
    the vine’s double fruit for itself and the elm maps to the poor’s prayer benefiting
    both.
- issue: Translation of ἀδιστάκτως
  chosen_reading: '"Without doubting" to foreground Hermas’ concern with double-mindedness.'
  alternative_readings:
  - without hesitation
  rationale: The moral discourse in Hermas frequently targets doubt/double-mindedness;
    this choice brings that lexical thread into view.
- issue: Textual bracketed additions
  chosen_reading: Bracketed phrases retained in square brackets in English where indicated
    in the Greek source.
  rationale: Signals to readers where the Greek witness is uncertain or has variants
    without adjudicating them at this stage.
