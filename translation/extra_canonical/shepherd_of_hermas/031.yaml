translation:
  text: '“Still,” I say[1], “sir, I will add another question.”


    “Speak,” he says.


    “I heard,” I say, “sir, from certain teachers, that there is no other repentance except that one when we went down into the water and received forgiveness of our former sins.”[1][2]


    He says to me, “You heard well; for so it is. For the one who has received forgiveness—”[3]


    “Bear with me,” I say, “and make this clear to me also.”


    “Speak,” he says.


    “If a woman,” I say, “sir, or again some man, should fall asleep, and one of them marries[2], does the one who marries sin?”[4]


    “He does not sin,” he says; “but if someone remains by himself,[5] he obtains for himself greater honor and great glory with the Lord; but if he also marries, he does not sin. Therefore keep purity and dignity, and you will live to God. These things that I speak to you and am about to speak, keep from now on, from the day you were entrusted to me, and I will dwell in your house. And for your former trespasses there will be forgiveness, if you keep my commandments; and there will also be forgiveness for all[8][6][5][4][3], if they keep these commandments of mine and walk in this purity.”[6][8]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: “Repentance” here refers to the decisive turning associated with baptism, the release of former sins.
    reason: cultural_note
  - marker: '2'
    text: “We went down into the water” is early Christian language for baptism without naming it explicitly (cf. Didache 7).
    reason: cultural_note
  - marker: '3'
    text: The Greek is abrupt here (“For the one who has received forgiveness—”); many editors assume an interruption at this point.
    reason: textual_variant
  - marker: '4'
    text: “Fall asleep” is a common early Christian euphemism for dying.
    reason: cultural_note
  - marker: '5'
    text: Or, more literally, “remains by himself/alone.”
    reason: lexical_alternative
  - marker: '6'
    text: “Chastity” could also be rendered “purity,” but the context favors sexual continence; “modesty” translates σεμνότης, moral gravity of comportment.
    reason: lexical_alternative
  - marker: '8'
    text: “Forgiveness” translates ἄφεσις; “remission” is a traditional alternative emphasizing release.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετάνοια
  chosen: repentance
  alternatives:
  - change of mind
  lexicon: BDAG; LSJ
  rationale: In Hermas this is a technical moral-religious term bound to forgiveness of sins and baptismal practice; rendering as “repentance” preserves the ecclesial register. The more cognitive nuance (“change of mind”) would under-translate the institutional sense here.
- source_word: εἰς ὕδωρ κατέβημεν
  chosen: we went down into the water
  alternatives:
  - we descended into the water
  - we entered the water
  lexicon: BDAG; LSJ
  rationale: Literal rendering maintains early baptismal imagery without inserting the word “baptize.”
- source_word: ἄφεσις (ἁμαρτιῶν)
  chosen: forgiveness (of sins)
  alternatives:
  - remission (of sins)
  - release
  lexicon: BDAG; LSJ
  rationale: “Forgiveness” is clear, idiomatic English for the soteriological ‘release’ of sins; “remission” is a viable traditional alternative noted in footnotes.
- source_word: κύριε (voc.)
  chosen: sir
  alternatives:
  - lord
  lexicon: BDAG; LSJ
  rationale: Here it is a respectful address to the angelic shepherd, not a divine title; “sir” avoids confusion with “the Lord” used for God later in the unit.
- source_word: πρὸς τὸν Κύριον
  chosen: with the Lord
  alternatives:
  - before the Lord
  - in the Lord’s sight
  lexicon: BDAG
  rationale: Capitalized “Lord” signals the divine referent; “with the Lord” fits the dative-like relation conveyed by πρὸς here (cf. idiomatic ‘in relation to the Lord’).
- source_word: κοιμηθῇ
  chosen: fall asleep (die)
  alternatives:
  - die
  lexicon: BDAG; LSJ
  rationale: Preserves early Christian euphemism for death, with explanatory footnote for clarity.
- source_word: ἐφ' ἑαυτῷ μείνῃ
  chosen: remains unmarried
  alternatives:
  - remains by himself/alone
  - remains as he is
  lexicon: BDAG; LSJ
  rationale: Context is marital status after a spouse’s death; “remains unmarried” communicates the sense without loss of the reflexive nuance.
- source_word: περισσοτέραν … τιμὴν … καὶ μεγάλην δόξαν περιποιεῖται
  chosen: he obtains for himself greater honor and great glory
  alternatives:
  - he procures for himself greater honor and great glory
  - he gains for himself greater honor and great glory
  lexicon: BDAG; LSJ
  rationale: “Obtains for himself” matches περιποιεῖται; key terms τιμή/δόξα kept as “honor” and “glory” to preserve moral-religious weight.
- source_word: ἁγνεία
  chosen: chastity
  alternatives:
  - purity
  lexicon: BDAG; LSJ
  rationale: Given the immediate context of marriage/remarriage and Hermas’s recurrent sexual-ethical emphasis, “chastity” is more precise than the broader “purity.”
- source_word: σεμνότης
  chosen: modesty
  alternatives:
  - gravity
  - dignity
  - sobriety
  lexicon: BDAG; LSJ
  rationale: “Modesty” fits the moral comportment sense paired with chastity in early Christian paraenesis.
- source_word: φυλάσσω (imper.)
  chosen: guard
  alternatives:
  - keep
  - observe
  lexicon: BDAG; LSJ
  rationale: “Guard” retains the vigilant, protective sense of the imperative rather than mere observance.
- source_word: παρεδόθης (μοι)
  chosen: were entrusted (to me)
  alternatives:
  - were handed over (to me)
  - were delivered (to me)
  lexicon: BDAG; LSJ
  rationale: “Entrusted” captures the sense of being committed to the shepherd’s care, fitting the narrative frame.
- source_word: κατοικήσω
  chosen: I will dwell
  alternatives:
  - I will take up residence
  lexicon: BDAG; LSJ
  rationale: “Dwell” preserves biblical-ecclesial register and allows the metaphorical sense of indwelling presence.
- source_word: παραπτώματα
  chosen: trespasses
  alternatives:
  - transgressions
  - offenses
  lexicon: BDAG; LSJ
  rationale: “Trespasses” is a well-established moral term for violations; it retains the weight of paraenetic discourse.
- source_word: ἐντολαί
  chosen: commandments
  alternatives:
  - commands
  lexicon: BDAG; LSJ
  rationale: “Commandments” preserves the formal moral authority of the mandates in context.
- source_word: πορεύομαι ἐν
  chosen: walk in
  alternatives:
  - live in
  - conduct oneself in
  lexicon: BDAG; LSJ
  rationale: “Walk in” keeps the traditional ethical metaphor for conduct, aligning with Hermas’s paraenetic style.
