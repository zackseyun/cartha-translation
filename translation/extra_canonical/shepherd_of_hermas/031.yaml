id: HERM.M.4.iii
reference: Shepherd of Hermas — Mandate 4, section iii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ἔτι, φημί, κύριε, προσθήσω τοῦ ἐπερωτῆσαι. Λέγε, φησίν· Ἤκουσα, φημί, κύριε, παρά τινων διδασκάλων, ὅτι ἑτέρα μετάνοια οὐκ ἔστιν εἰ μὴ ἐκείνη, ὅτε εἰς ὕδωρ κατέβημεν καὶ ἐλάβομεν ἄφεσιν ἁμαρτιῶν ἡμῶν τῶν προτέρων. 2. λέγει μοι· Καλῶς ἤκουσας· οὕτω γὰρ ἔχει. ἔδει γὰρ τὸν εἰληφότα ἄφεσ ἀνέχῃ μου, ἔτι μοι καὶ τοῦτο δήλωσον. Λέγε, φησίν. Ἐὰν γυνή, φημί, κύριε, ἢ πάλιν ἀνήρ τις κοιμηθῇ, καὶ γαμήσῃ τις ἐξ αὐτῶν, μήτι ἁμαρτάνει ὁ γαμῶν; 2. Οὐχ ἁμαρτάνει, φησίν· ἐὰν δὲ ἐφ' ἑαυτῷ μείνῃ τις, περισσοτέραν ἑαυτῷ τιμὴν καὶ μεγάλην δόξαν περιποιεῖται πρὸς τὸν Κύριον· ἐὰν δὲ καὶ γαμήσῃ, οὐχ ἁμαρτάνει. 3. τήρει οὖν τὴν ἁγνείαν καὶ τὴν σεμνότητα, καὶ ζήσῃ τῷ Θεῷ. ταῦτά σοι ὅσα λαλῶ καὶ μέλλω λαλεῖν, φύλασσε ἀπὸ τοῦ νῦν, ἀφ' ἧς μοι παρεδόθης ἡμέρας, καὶ εἰς τὸν οἶκόν σου κατοικήσω. 4. τοῖς δὲ προτέροις σου παραπτώμασιν ἄφεσις ἔσται, ἐὰν τὰς ἐντολάς μου φυλάξῃς· καὶ πᾶσι δὲ ἄφεσις ἔσται, ἐὰν τὰς ἐντολάς μου ταύτας φυλάξωσι καὶ πορευθῶσιν ἐν τῇ ἁγνότητι ταύτῃ.
