theological_decisions:
- issue: “No other repentance” (ἑτέρα μετάνοια οὐκ ἔστιν) and baptism
  chosen_reading: Render the claim straightforwardly as affirming the uniqueness of the baptismal repentance for the remission of former sins, without importing later qualifying theology into this unit.
  alternative_readings:
  - Interpret as denying any post-baptism repentance whatsoever
  - Interpret as hyperbolic, anticipating allowance of a later ‘second repentance’
  rationale: The immediate response is, “You have heard well; for so it is,” which directly affirms the statement. This unit itself then grounds future forgiveness in keeping the commandments and walking in chastity, which we render transparently without harmonizing with later sections.
- issue: Remarriage after a spouse’s death
  chosen_reading: Remarriage is not sin; remaining unmarried gains greater honor and glory with the Lord.
  rationale: The dialogue states twice, “he does not sin,” while commending continence as more honorable; the translation preserves both the permission and the commendation without softening either.
- issue: Use of “Lord” for God vs. “sir” for the shepherd
  chosen_reading: Translate vocative κύριε addressed to the shepherd as “sir,” but retain “the Lord” for πρὸς τὸν Κύριον referring to God.
  alternative_readings:
  - Translate both as “Lord”
  - Translate both as “sir/master”
  rationale: Context distinguishes a respectful address to a messenger from the divine title; this maintains theological clarity and matches Cartha’s guidance on titles.
  doctrine_reference: 'Cartha Translation Philosophy — Contested terms: Kyrios'
