  text: 1 Λέγει μοι· Ἆρον ἀπὸ σεαυτοῦ τὴν διψυχίαν καὶ μηδὲν ὅλως διψυχήσῃς αἰτήσασθαί
    τι παρὰ τοῦ θεοῦ, λέγων ἐν σεαυτῷ ὅτι πῶς δύναμαι αἰτήσασθαι παρὰ τοῦ κυρίου καὶ
    λαβεῖν, ἡμαρτηκὼς τοσαῦτα εἰς αὐτόν; 2 μὴ διαλογίζου ταῦτα, ἀλλ᾿ ἐξ ὅλης τῆς καρδίας
    σου ἐπίστρεψον ἐπὶ τὸν κύριον καὶ αἰτοῦ παρ᾿ αὐτοῦ ἀδιστάκτως, καὶ γνώσῃ τὴν πολλὴν
    εὐσπλαγχνίαν αὐτοῦ, ὅτι οὐ μή σὲ ἐγκαταλίπῃ, ἀλλὰ τὸ αἴτημα τῆς ψυχῆς σου πληροφορήσει.
    3 οὐκ ἔστι γὰρ ὁ θεὸς ὡς οἱ ἄνθρωποι μνησικακοῦντες, ἀλλ᾿ αὐτὸς ἀμνησίκακός ἐστι
    καὶ σπλαγχνίζεται ἐπὶ τὴν ποίησιν αὐτοῦ. 4 σὺ οὖν καθάρισόν σου τὴν καρδίαν ἀπὸ
    πάντων τῶν ματαιωμάτων τοῦ αἰῶνος τούτου καὶ τῶν προειρημένων σοί ῥημάτων καὶ
    αἰτοῦ παρὰ τοῦ κυρίου, καὶ ἀπολήψῃ πάντα καὶ ἀπὸ πάντων τῶν αἰτημάτων σου ἀνυστέρητος
    ἔσῃ, ἐὰν ἀδιστάκτως αἰτήσῃς παρὰ τοῦ κυρίου. 5 ἐὰν δὲ διστάσῃς ἐν τῇ καρδίᾳ σου,
    οὐδὲν οὐ μὴ λήψῃ τῶν αἰτημάτων σου. οἱ γὰρ διστάζοντες εἰς τὸν θεόν, οὗτοί εἰσιν
    οἱ δίψυχοι καὶ οὐδὲν ὅλως ἐπιτυγχάνουσι τῶν αἰτημάτων αὐτῶν. 6 οἱ δὲ ὁλοτελεῖς
    ὄντες ἐν τῇ πίστει πάντα αἰτοῦνται πεποιθότες ἐπὶ τὸν κύριον καὶ λαμβάνουσιν,
    ὅτι ἀδιστάκτως αἰτοῦνται, μηδὲν διψυχοῦντες. πᾶς γὰρ δίψυχος ἀνήρ, ἐὰν μὴ μετανοήσῃ,
    δυσκόλως σωθήσεται. 7 καθάρισον οὖν τὴν καρδίαν σου ἀπὸ τῆς διψυχίας, ἔνδυσαι
    δὲ τὴν πίστιν, ὅτι ἰσχυρά ἐστι, καὶ πίστευε τῷ θεῷ, ὅτι πάντα τὰ αἰτήματά σου
    ἃ αἰτεῖς λήψῃ, καὶ ἐὰν αἰτησάμενός ποτε παρὰ τοῦ κυρίου αἴτημά τι βραδύτερον λαμβάνῃς,
    μὴ διψυχήσῃς, ὅτι ταχὺ οὐκ ἔλαβες τὸ αἴτημα τῆς ψυχῆς σου· πάντως γὰρ διὰ πειρασμόν
    τινα ἢ παράπτωμά τι, ὃ σὺ ἀγνοεῖς, βραδύτερον λαμβάνεις τὸ αἴτημά σου. 8 σὺ οὖν
    μὴ διαλίπῃς αἰτούμενος τὸ αἴτημα τῆς ψυχῆς σου, καὶ λήψῃ αὐτό. ἐὰν δὲ ἐκκακήσῃς
    καὶ διψυχήσῃς αἰτούμενος, σεαυτὸν αἰτιῶ καὶ μὴ τὸν διδόντα σοι. 9 βλέπε τὴν διψυχίαν
    ταύτην· πονηρὰ γάρ ἐστι καὶ ἀσύνετος καὶ πολλοὺς ἐκριζοῖ ἀπὸ τῆς πίστεως καί γε
    λίαν πιστοὺς καὶ ἰσχυρούς. καὶ γὰρ αὕτη ἡ διψυχία θυγάτηρ ἐστὶ τοῦ διαβόλου καὶ
    λίαν πονηρεύεται εἰς τοὺς δούλους τοῦ θεοῦ. 10 καταφρόνησον οὖν τῆς διψυχίας καὶ
    κατακυρίευσον αὐτῆς ἐν παντὶ πράγματι, ἐνδυσάμενος τὴν πίστιν τὴν ἰσχυρὰν καὶ
    δυνατήν· ἡ γὰρ πίστις πάντα ἐπαγγέλλεται, πάντα τελειοῖ, ἡ δὲ διψυχία μὴ καταπιστεύουσα
    ἑαυτῇ πάντων ἀποτυγχάνει τῶν ἔργων αὐτῇς ὧν πράσσει. 11 βλέπεις οὖν, φησίν, ὅτι
    ἡ πίστις ἄνωθέν ἐστι παρὰ τοῦ κυρίου καὶ ἔχει δύναμιν μεγάλην· ἡ δὲ διψυχία ἐπίγειον
    πνεῦμά ἐστι παρὰ τοῦ διαβόλου, δύναμιν μὴ ἔχουσα. 12 σὺ οὖν δούλευε τῇ ἐχούσῃ
    δύναμιν τῇ πίστει καὶ ἀπὸ τῆς διψυχίας ἀπόσχου τῆς μὴ ἐχούσης δύναμιν, καὶ ζήσῃ
    τῷ θεῷ, καὶ πάντες ζήσονται τῷ θεῷ οἱ ταῦτα φρονοῦντες.
