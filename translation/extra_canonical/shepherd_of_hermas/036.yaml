translation:
  text: 'He says to me: Remove double-mindedness from yourself, and do not at all
    be double-minded when asking anything from God, saying within yourself, “How am
    I able to ask from the Lord and receive, I who have sinned so much against him?”


    Do not reason these things, but turn back to the Lord with your whole heart, and
    ask from him without doubting; and you will come to know his great tender mercy—for
    he will certainly not abandon you, but will bring the request of your soul to
    completion.


    For God is not like human beings who remember wrongs; rather, he is one who does
    not remember wrongs, and he has compassion upon what he has made.


    Therefore cleanse your heart from all the vanities of this age and from the things
    previously spoken to you, and ask from the Lord; and you will receive everything,
    and you will not be left short in any of your petitions, if you ask from the Lord
    without doubting.


    But if you waver in your heart, you will by no means receive anything of your
    petitions. For those who doubt with respect to God—these are the double‑minded—and
    they do not at all attain their petitions.


    But those who are whole in faith ask for all things, having put their trust in
    the Lord, and they receive, because they ask without doubting, not being double‑minded.
    For every double‑minded man, unless he repents, will be saved with difficulty.


    Cleanse, then, your heart from double‑mindedness, and put on faith—for it is strong—and
    believe God, that all your requests which you ask you will receive. And if ever,
    after asking some request from the Lord, you receive it more slowly, do not be
    double‑minded because you did not quickly receive the request of your soul; for
    by all means it is on account of some testing or some transgression—which you
    do not know—that you receive your request more slowly.


    So do not cease asking for the request of your soul, and you will receive it.
    But if you grow weary and become double‑minded while asking, blame yourself and
    not the One who gives to you.


    Look at this double‑mindedness: for it is evil and senseless, and it uproots many
    from the faith—even those who are very faithful and strong. For this double‑mindedness
    is a daughter of the devil, and it acts very wickedly against the slaves of God.


    Therefore despise double‑mindedness and master it in every matter, having put
    on faith—strong and powerful. For faith promises all things and brings all things
    to completion; but double‑mindedness, not trusting itself, fails in all the works
    it does.


    “You see then,” he says, “that faith is from above, from the Lord, and it has
    great power; but double‑mindedness is an earthly spirit from the devil, having
    no power.


    Therefore serve the faith that has power, and keep yourself away from double‑mindedness
    that has no power, and you will live to God—and all who think this way will live
    to God.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Double‑mindedness” (διψυχία) is a stock vice in Hermas, distinct from the
      act of doubting (διστάζειν).
    reason: lexical_alternative
  - marker: b
    text: “Bring the request of your soul to completion” renders πληροφορήσει; alternatives
      include “fully grant” or “fully assure.” Context favors fulfillment of the petition.
    reason: lexical_alternative
  - marker: c
    text: “Vanities of this age” echoes LXX usage of ματαιότης; the phrase contrasts
      transient worldly emptiness with God’s permanence.
    reason: cultural_note
  - marker: d
    text: The phrase “the things previously spoken to you” (τῶν προειρημένων σοι ῥημάτων)
      is idiomatic; it likely points back to earlier admonitions or matters already
      mentioned.
    reason: alternative_reading
  - marker: e
    text: '“Not be left short” translates the rare ἀνυστέρητος; alternatives: “not
      deprived,” “not disappointed.”'
    reason: lexical_alternative
  - marker: f
    text: “Testing” (πειρασμός) here emphasizes proving or refining rather than enticement
      to sin.
    reason: cross_reference
  - marker: g
    text: “Slaves of God” reflects δοῦλοι; while “servants” is common, the stronger
      term emphasizes belonging and allegiance.
    reason: lexical_alternative
  - marker: h
    text: “Earthly spirit” (ἐπίγειον πνεῦμα) contrasts with “from above” (ἄνωθεν);
      the imagery is vertical, not merely “worldly attitude.”
    reason: cultural_note
  - marker: i
    text: “Live to God” preserves the dative construction (τῷ θεῷ) common in early
      Christian texts; “live for God” is a possible paraphrase.
    reason: lexical_alternative
  - marker: j
    text: “God … does not remember wrongs” renders μνησικακέω/ἀμνησίκακος; it stresses
      God’s refusal to bear a grudge, not amnesia.
    reason: cultural_note
lexical_decisions:
- source_word: δίψυχος / διψυχία
  chosen: double‑minded / double‑mindedness
  alternatives:
  - doubtful
  - wavering
  - in two minds
  lexicon: BDAG
  rationale: Hermas treats διψυχία as a named vice and personifies it; “double‑mindedness”
    preserves the moral category and imagery rather than reducing it to mere doubt.
- source_word: διστάζω / ἀδιστάκτως
  chosen: waver / without doubting
  alternatives:
  - hesitate / unhesitatingly
  - doubt / without hesitation
  lexicon: BDAG
  rationale: Distinct from διψυχία, διστάζω denotes the act of wavering in a given
    moment of asking; rendered as “waver/without doubting” to keep the contrast clear.
- source_word: αἴτημα
  chosen: request / petition
  alternatives:
  - asking
  - prayer
  lexicon: BDAG
  rationale: Concrete term for a specific ask; “petition” or “request” keeps the transactional
    nuance and avoids generalizing to ‘prayer’ language.
- source_word: πληροφορήσει (πληροφορέω)
  chosen: bring … to completion
  alternatives:
  - fully grant
  - fully assure
  lexicon: BDAG
  rationale: In context of petitions, the verb’s sense of bringing to full measure/completion
    best fits; we avoid “assure” (internal certainty) in favor of God’s fulfilling
    action.
- source_word: εὐσπλαγχνία
  chosen: tender mercy / great compassion
  alternatives:
  - pity
  - kindness
  lexicon: BDAG
  rationale: Term emphasizes visceral compassion; “tender mercy” preserves the affective
    force and is paired with “great” (πολλή).
- source_word: μνησικακέω / ἀμνησίκακος
  chosen: remember wrongs / one who does not remember wrongs
  alternatives:
  - bear a grudge / free from resentment
  - keep a record of wrongs / not keeping a record
  lexicon: BDAG
  rationale: Idiomatic rendering “remember wrongs” keeps the forensic/moral dimension
    without importing later doctrinal phrasing.
- source_word: ποίησις (αὐτοῦ)
  chosen: what he has made / his workmanship
  alternatives:
  - his creation
  - his handiwork
  lexicon: LSJ
  rationale: Here refers broadly to creatures; “what he has made” foregrounds God
    as maker, with “workmanship” as a stylistic equivalent.
- source_word: ματαιώματα τοῦ αἰῶνος τούτου
  chosen: vanities of this age
  alternatives:
  - empty things of this age
  - worthless things of this world
  lexicon: LSJ
  rationale: Echoes LXX vanity language (ματαιότης) and preserves the temporal contrast
    (‘this age’).
- source_word: τῶν προειρημένων σοι ῥημάτων
  chosen: the things previously spoken to you
  alternatives:
  - the words previously spoken to you
  - the matters mentioned before
  lexicon: LSJ
  rationale: Near‑literal; acknowledges that ῥήματα can mean ‘things/matters.’ The
    phrase likely points back to previously mentioned matters to purge from the heart.
- source_word: ὁλοτελής
  chosen: whole (in faith)
  alternatives:
  - entire
  - perfect
  lexicon: BDAG
  rationale: Describes undivided integrity of faith rather than sinless perfection;
    “whole in faith” captures the internal unity.
- source_word: μετανοέω
  chosen: repent
  alternatives:
  - change one’s mind
  lexicon: BDAG
  rationale: Here the call addresses a moral state (double‑mindedness) and its remedy;
    ‘repent’ carries the ecclesial/ethical turn appropriate to Hermas.
- source_word: ἔνδυσαι / ἐνδυσάμενος
  chosen: put on
  alternatives:
  - clothe yourself with
  lexicon: BDAG
  rationale: Keeps the clothing metaphor intact, a common early‑Christian idiom for
    adopting a virtue.
- source_word: καταφρόνησον / κατακυρίευσον
  chosen: despise / master
  alternatives:
  - treat with contempt / subdue
  - disregard / gain dominion over
  lexicon: BDAG
  rationale: Strong imperatives match Hermas’s forceful paraenesis; ‘master’ reflects
    the dominion nuance of κατακυριεύω.
- source_word: ἐπίγειον πνεῦμα
  chosen: earthly spirit
  alternatives:
  - worldly spirit
  - spirit from the earth
  lexicon: BDAG
  rationale: Contrasts with ‘from above’ (ἄνωθεν); ‘earthly spirit’ preserves the
    vertical imagery.
- source_word: δοῦλος (τοῦ θεοῦ)
  chosen: slave (of God)
  alternatives:
  - servant
  lexicon: BDAG
  rationale: Cartha policy prefers ‘slave’ where belonging/ownership is salient; Hermas’s
    imagery stresses God’s mastery and the devil’s hostility toward His people.
- source_word: δούλευε
  chosen: serve
  alternatives:
  - be a slave to
  lexicon: BDAG
  rationale: In English, ‘serve the faith’ reads more naturally while preserving the
    verb’s force; the dative object is maintained.
- source_word: ἀπόσχου
  chosen: keep away from / abstain from
  alternatives:
  - refrain from
  - hold yourself back from
  lexicon: BDAG
  rationale: Middle voice reflexive sense (‘keep yourself away’) is preserved in phrasing.
- source_word: ζήσῃ τῷ θεῷ
  chosen: live to God
  alternatives:
  - live for God
  - live unto God
  lexicon: BDAG
  rationale: Dative ‘to God’ maintained to match early Christian idiom; “to” over
    “for” keeps the directional nuance.
- source_word: πειρασμός
  chosen: testing
  alternatives:
  - temptation
  - trial
  lexicon: BDAG
  rationale: Context concerns God’s timing and proving rather than enticement to sin;
    ‘testing’ fits the moral formation theme.
- source_word: παράπτωμα
  chosen: transgression
  alternatives:
  - offense
  - misstep
  lexicon: BDAG
  rationale: Moral lapse sense preserved; ‘misstep’ would understate the ethical weight.
- source_word: ἀνυστέρητος
  chosen: not be left short
  alternatives:
  - not deprived
  - not disappointed
  lexicon: LSJ
  rationale: Rare adjective; chosen rendering captures the idea of lacking nothing
    in the outcome of petitions.
- source_word: ἐκκακέω
  chosen: grow weary / lose heart
  alternatives:
  - give up
  - become discouraged
  lexicon: BDAG
  rationale: Common paraenetic verb; both glosses fit and are reflected in the translation.
- source_word: ἄνωθεν
  chosen: from above
  alternatives:
  - from on high
  lexicon: BDAG
  rationale: Maintains vertical provenance imagery in contrast to ‘earthly spirit.’
- source_word: ἐπαγγέλλεται / τελειοῖ
  chosen: promises / brings to completion
  alternatives:
  - professes / perfects
  - pledges / accomplishes
  lexicon: BDAG
  rationale: Personification of faith’s efficacy is preserved; ‘brings to completion’
    mirrors τελειόω’s teleological force.
- source_word: ἀποτυγχάνει
  chosen: fails
  alternatives:
  - falls short
  - misses the mark
  lexicon: BDAG
  rationale: Plain, forceful rendering that matches the paraenetic tone.
