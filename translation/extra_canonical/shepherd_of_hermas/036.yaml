theological_decisions:
- issue: Rendering διψυχία as a vice rather than generic doubt
  chosen_reading: Translate as “double‑mindedness,” retain personification (“daughter
    of the devil”) and vice language.
  alternative_readings:
  - Render as ‘doubt’ or ‘uncertainty’
  rationale: Hermas distinguishes the act of doubting (διστάζειν) from the entrenched
    disposition (διψυχία); preserving the vice term maintains the moral instruction’s
    texture.
- issue: Translation of δοῦλοι τοῦ θεοῦ
  chosen_reading: “slaves of God”
  alternative_readings:
  - servants of God
  rationale: Cartha policy prefers ‘slave’ where belonging to God is salient. Hermas’s
    contrast with the devil’s hostility heightens the ownership and allegiance motif.
  doctrine_reference: 'Translation Philosophy §Contested terms: δοῦλος'
- issue: μετανοέω in moral exhortation
  chosen_reading: “repent”
  alternative_readings:
  - change your mind
  rationale: Here the required response to double‑mindedness is a moral/ecclesial
    turning, not merely cognitive reconsideration.
  doctrine_reference: 'DOCTRINE.md §Contested terms: μετανοέω'
- issue: ζήσῃ τῷ θεῷ dative nuance
  chosen_reading: “live to God”
  alternative_readings:
  - live for God
  rationale: Retains early‑Christian idiom and directional dative, avoiding modern
    smoothing.
- issue: πληροφορέω in petition context
  chosen_reading: “bring the request of your soul to completion/fulfill”
  alternative_readings:
  - assure the request of your soul
  rationale: Context addresses God’s action in granting petitions, not interior assurance
    alone.
- issue: πειρασμός rendered as ‘testing’ not ‘temptation’
  chosen_reading: “testing”
  alternative_readings:
  - temptation
  - trial
  rationale: The delay in receiving is pedagogical/probative, not an incitement to
    sin; ‘testing’ best fits the moral logic of Hermas.
