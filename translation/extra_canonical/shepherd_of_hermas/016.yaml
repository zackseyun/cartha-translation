source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ὅτε οὖν ἐπαυσάμην ἐρωτῶν αὐτὴν περὶ πάντων τούτων, λέγει μοι· Θέλεις ἄλλο ἰδεῖν; κατεπίθυμος ὢν τοῦ θεάσασθαι περιχαρὴς ἐγενόμην τοῦ ἰδεῖν. 2. ἐμβλέψασά μοι ὑπεμειδίασεν καὶ λέγει μοι· Βλέπεις ἑπτὰ γυναῖκας κύκλῳ τοῦ πύργου; Βλέπω, φημί, κυρία. Ὁ πύργος οὗτος ὑπὸ τούτων βαστάζεται κατ’ ἐπιταγὴν τοῦ Κυρίου. 3. ἄκουε νῦν τὰς ἐνεργείας αὐτῶν. ἡ μὲν πρώτη αὐτῶν, ἡ κρατοῦσα τὰς χεῖρας, Πίστις καλεῖται· διὰ ταύτης σώζονται οἱ ἐκλεκτοὶ τοῦ Θεοῦ. 4. ἡ δὲ ἑτέρα, ἡ περιεζωσμένη καὶ ἀνδριζομένη, Ἐγκράτεια καλεῖται· αὕτη θυγάτηρ ἐστὶν τῆς Πίστεως. ὃς ἂν οὖν ἀκολουθήσῃ αὐτῇ, μακάριος γίνεται ἐν τῇ ζωῇ αὐτοῦ, ὅτι πάντων τῶν πονηρῶν ἔργων ἀφέξεται, πιστεύων ὅτι, ἐὰν ἀφέξηται πάσης ἐπιθυμίας πονηρᾶς, κληρονομήσει ζωὴν αἰώνιον. 5. Αἱ δὲ ἕτεραι, κυρία, τίνες εἰσίν; Θυγατέρες ἀλλήλων εἰσίν. καλοῦνται δὲ ἡ μὲν Ἁπλότης, ἡ δὲ Ἐπιστήμη, ἡ δὲ Ἀκακία, ἡ δὲ Σεμνότης, ἡ δὲ Ἀγάπη. ὅταν οὖν τὰ ἔργα τῆς μητρὸς αὐτῶν πάντα ποιήσῃς, δύνασαι ζῆσαι. 6. Ἤθελον, φημί, γνῶναι, κυρία, τίς τίνα δύναμιν ἔχει αὐτῶν. Ἄκουε,
    φησίν, τὰς δυνάμεις ἃς ἔχουσιν. 7. κρατοῦνται δὲ ὑπ᾽ ἀλλήλων αἱ δυνάμεις αὐτῶν καὶ ἀκολουθοῦσιν ἀλλήλαις, καθὼς καὶ γεγεννημέναι εἰσίν. ἐκ τῆς Πίστεως γεννᾶται Ἐγκράτεια, ἐκ τῆς Ἐγκρατείας Ἁπλότης, ἐκ τῆς Ἁπλότητος Ἀκακία, ἐκ τῆς Ἀκακίας Σεμνότης, ἐκ τῆς Σεμνότητος Ἐπιστήμη, ἐκ τῆς Ἐπιστήμης Ἀγάπη. τούτων οὖν τὰ ἔργα ἁγνὰ καὶ σεμνὰ καὶ θεῖά ἐστιν. 8. ὃς ἂν οὖν δουλεύσῃ ταύταις καὶ ἰσχύσῃ κρατῆσαι τῶν ἔργων αὐτῶν, ἐν τῷ πύργῳ ἕξει τὴν κατοίκησιν μετὰ τῶν ἁγίων τοῦ Θεοῦ. 9. ἐπηρώτων δὲ αὐτὴν περὶ τῶν καιρῶν, εἰ ἤδη συντέλειά ἐστιν. ἡ δὲ ἀνέκραγε φωνῇ μεγάλῃ λέγουσα· Ἀσύνετε ἄνθρωπε, οὐχ ὁρᾷς τὸν πύργον ἔτι οἰκοδομούμενον; ὡς ἐὰν οὖν συντελεσθῇ ὁ πύργος οἰκοδομούμενος, ἔχει τέλος. ἀλλὰ ταχὺ ἐποικοδομηθήσεται. μηκέτι με ἐπερώτα μηδέν· ἀρκετή σοι ἡ ὑπόμνησις αὕτη καὶ τοῖς ἁγίοις, καὶ ἡ ἀνακαίνωσις τῶν πνευμάτων ὑμῶν. 10. ἀλλ᾽ οὐ σοὶ μόνῳ ἀπεκαλύφθη, ἀλλ᾽ ἵνα πᾶσιν δηλώσῃς αὐτά. 11. μετὰ τρεῖς ἡμέρας—νοῆσαί σε γὰρ δεῖ πρῶτον, ἐντέλλομαι δέ σοι πρῶτον, Ἑρμᾶ, τὰ ῥήματα ταῦτα ἃ σοι μέλλω λέγειν—
    †λαλῆσαι† αὐτὰ [πάντα] εἰς τὰ ὦτα τῶν ἁγίων, ἵνα ἀκούσαντες αὐτὰ καὶ ποιήσαντες καθαρισθῶσιν ἀπὸ τῶν πονηριῶν αὐτῶν, καὶ σὺ δὲ μετ᾽ αὐτῶν.
