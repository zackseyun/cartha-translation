theological_decisions:
- issue: Personified virtues as supporting agents of the tower
  chosen_reading: Retain them as real personified virtues rather than reducing them to abstractions only.
  alternative_readings:
  - Flatten into abstract qualities without personification
  rationale: Hermas presents the women both symbolically and dramatically. Preserving the personification keeps the visionary force of the passage.
- issue: διὰ ταύτης σώζονται
  chosen_reading: Render Faith as the means 'through' which God’s chosen are saved.
  alternative_readings:
  - Render more weakly as mere association with faith
  rationale: The preposition διά marks instrumentality/means; the line presents Faith as the God-appointed channel in the allegory.
- issue: The end and the tower’s completion
  chosen_reading: Preserve the tower-completion image as the sign of the end.
  alternative_readings:
  - Over-interpret the tower immediately as a later ecclesial system
  rationale: Hermas itself ties the end to the completion of the tower image; the translation should preserve the symbolism before later interpretation.
