translation:
  text: 'When, then, I had stopped questioning her about all these things, she says to me, “Do you want to see something else?” And because I was eager to behold it, I became very glad to see.


    Looking at me, she smiled and says to me, “Do you see seven women around the tower?” “I do, lady,” I said. “This tower is supported by these women at the Lord’s command.


    Now hear their functions.[1] The first of them, the one clasping her hands,[2] is called Faith; through her the chosen of God are saved. And the second, the one girded about and acting bravely,[3] is called Self-control; she is the daughter of Faith. Whoever, then, follows her becomes blessed in his life, because he will refrain from all evil works, believing that if he refrains from every evil desire he will inherit eternal life.”


    “But the others, lady, who are they?” “They are daughters of one another. And they are called Simplicity, Knowledge, Innocence, Dignity, and Love. Whenever, then, you do all the works of their mother, you are able to live.”


    “I wanted,” I said, “to know, lady, what power each of them has.” “Hear,” she says, “the powers they have. Their powers are held together by one another, and they follow one another, just as they were born: from Faith is born Self-control, from Self-control Simplicity, from Simplicity Innocence, from Innocence Dignity, from Dignity Knowledge, and from Knowledge Love. So, then, the works of these are pure and dignified and divine. Whoever, then, serves these and proves able to hold fast to their works will have his dwelling in the tower with the holy ones of God.”


    And I kept asking her about the times—whether it is already the end. But she cried out with a loud voice, saying, “Senseless man, do you not see that the tower is still being built? Whenever, then, the tower is completed in its building, it comes to an end. But it will be built up quickly. Do not question me any further; this reminder and the renewal of your spirits are enough for you and for the holy ones.


    But it was not revealed to you alone, but so that you may make them known to all. After three days—for first you must understand, and I first command you, Hermas, the words I am about to say to you—speak them all into the ears of the holy ones, so that, after hearing them and doing them, they may be cleansed from their evils, and you also with them.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: Greek energeiai can mean 'activities,' 'operations,' or 'functions.'
    reason: lexical_alternative
  - marker: '[2]'
    text: Greek literally 'holding the hands'.
    reason: lexical_alternative
  - marker: '[3]'
    text: Greek andrizomenē means 'acting bravely' or 'showing courage'; literally it carries a 'be manly/courageous' nuance.
    reason: lexical_alternative
  - marker: a
    text: Or 'master their works'.
    reason: previous_rendering
  - marker: b
    text: Or 'this reminder is enough for you and for the holy ones, and for the renewal of your spirits.'.
    reason: previous_rendering
lexical_decisions:
- source_word: βαστάζεται
  chosen: is supported
  alternatives:
  - is carried
  - is borne
  lexicon: BDAG
  rationale: In the tower image the sense is structural support. 'Supported' keeps the picture clear without weakening the metaphor.
- source_word: ἐνεργείας
  chosen: functions
  alternatives:
  - activities
  - operations
  - powers at work
  lexicon: LSJ
  rationale: The term describes what each personified virtue does. 'Functions' is clear and concrete in English.
- source_word: Πίστις
  chosen: Faith
  alternatives:
  - Faithfulness
  lexicon: BDAG
  rationale: As a personified virtue in Hermas, 'Faith' is the most natural rendering and matches the genealogical sequence that follows.
- source_word: Ἐγκράτεια
  chosen: Self-control
  alternatives:
  - Temperance
  - Continence
  lexicon: BDAG
  rationale: Self-restraint is the moral force of the virtue here, and 'Self-control' is the clearest modern English equivalent.
- source_word: Ἁπλότης
  chosen: Simplicity
  alternatives:
  - Single-heartedness
  - Sincerity
  lexicon: BDAG
  rationale: Hermas uses the term in an ethical sense close to singleness and straightforwardness; 'Simplicity' preserves the traditional moral register.
- source_word: Ἀκακία
  chosen: Innocence
  alternatives:
  - Guilelessness
  - Harmlessness
  lexicon: LSJ
  rationale: The virtue names build a chain of moral character; 'Innocence' is readable and keeps the ethical sense.
- source_word: Σεμνότης
  chosen: Dignity
  alternatives:
  - Gravity
  - Reverent seriousness
  lexicon: BDAG
  rationale: The term denotes honorable seriousness; 'Dignity' works naturally in the virtue list while preserving the elevated tone.
- source_word: Ἀγάπη
  chosen: Love
  alternatives:
  - Charity
  lexicon: BDAG
  rationale: Standard rendering and the right one for the closing virtue in the sequence.
- source_word: κατοίκησιν
  chosen: dwelling
  alternatives:
  - residence
  - habitation
  lexicon: LSJ
  rationale: The point is having one’s settled place in the tower. 'Dwelling' keeps the symbolic and eschatological force.
- source_word: συντέλεια
  chosen: the end
  alternatives:
  - consummation
  - completion
  lexicon: BDAG
  rationale: The question is eschatological. 'The end' is plain English and fits the tower-completion image.
- source_word: ἀνακαίνωσις
  chosen: renewal
  alternatives:
  - renewing
  - restoration
  lexicon: BDAG
  rationale: The noun marks inward renewal of life/spirit; 'renewal' is the best idiomatic rendering.
- source_word: καθαρισθῶσιν
  chosen: may be cleansed
  alternatives:
  - may be purified
  lexicon: BDAG
  rationale: Hermas uses cleansing language for moral purification; 'cleansed' preserves that imagery.
