id: HERM.M.4.i
reference: Shepherd of Hermas — Mandate 4, section i
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ἐντέλλομαί σοι, φησίν, φυλάσσειν τὴν ἁγνείαν καὶ μὴ ἀναβαινέτω σου ἐπὶ τὴν
    καρδίαν περὶ γυναικὸς ἀλλοτρίας ἢ περὶ πορνείας τινὸς ἢ περὶ τοιούτων τινῶν ὁμοιωμάτων
    πονηρῶν. τοῦτο γὰρ ποιῶν μεγάλην ἁμαρτίαν ἐργάζῃ. τῆς δὲ σῆς μνημονεύων πάντοτε
    γυναικὸς οὐδέποτε διαμαρτήσεις. 2. ἐὰν γὰρ αὕτη ἡ ἐνθύμησις ἐπὶ [τὴν] καρδίαν
    σου ἀναβῇ, διαμαρτήσεις, καὶ ἐὰν ἕτερα οὕτως πονηρά, ἁμαρτίαν ἐργάζῃ· ἡ γὰρ ἐνθύμησις
    αὕτη Θεοῦ δούλῳ ἁμαρτία μεγάλη ἐστίν· ἐὰν δέ τις ἐργάσηται τὸ ἔργον τὸ πονηρὸν
    τοῦτο, θάνατον ἑαυτῷ κατεργάζεται. 3. βλέπε οὖν σύ· ἀπέχου ἀπὸ τῆς ἐνθυμήσεως
    ταύτης· ὅπου γὰρ σεμνότης κατοικεῖ, ἐκεῖ ἀνομία οὐκ ὀφείλει ἀναβαίνειν ἐπὶ καρδίαν
    ἀνδρὸς δικαίου. 4. λέγω αὐτῷ· Κύριε, ἐπίτρεψόν μοι ὀλίγα ἐπερωτῆσαί σε. Λέγε,
    φησίν. Κύριε, φημί, εἰ γυναῖκα ἔχων τις πιστὴν ἐν Κυρίῳ [καὶ] ταύτην εὕρῃ ἐν μοιχείᾳ
    τινί, ἆρα ἁμαρτάνει ὁ ἀνὴρ συνζῶν μετ᾿ αὐτῆς; 5. Ἄχρι τῆς ἀγνοίας, φησίν, οὐχ
    ἁμαρτάνει· ἐὰν δὲ γνῷ ὁ ἀνὴρ τὴν ἁμαρτίαν αὐτῆς, καὶ μὴ μετανοήσῃ ἡ γυνή, ἀλλ᾿
    ἐπιμένῃ τῇ πορνείᾳ αὐτῆς, καὶ συνζῇ ὁ ἀνὴρ μετ᾿ αὐτῆς, ἔνοχος γίνεται τῆς ἁ δεχθῆναι
    τὸν ἡμαρτηκότα καὶ μετανοοῦντα· μὴ ἐπὶ πολὺ δέ· τοῖς γὰρ δούλοις τοῦ Θεοῦ μετάνοιά
    ἐστιν μία. διὰ τὴν μετάνοιαν οὖν οὐκ ὀφείλει γαμεῖν ὁ ἀνήρ. αὕτη ἡ πρᾶξις ἐπὶ
    γυναικὶ καὶ ἀνδρὶ κεῖται. 9. οὐ μόνον, φησί, μοιχεία ἐστίν, ἐάν τις τὴν σάρκα
    αὐτοῦ μιάνῃ, ἀλλὰ καὶ ὃς ἂν τὰ ὁμοιώματα ποιῇ τοῖς ἔθνεσιν, μοιχᾶται. ὥστε καὶ
    ἐν τοῖς τοιούτοις ἔργοις ἐὰν ἐμμένῃ τις καὶ μὴ μετανοῇ, ἀπέχου ἀπ᾽ αὐτοῦ καὶ μὴ
    συνζῆθι αὐτῷ· εἰ δὲ μή, καὶ σὺ μέτοχος εἶ τῆς ἁμαρτίας αὐτοῦ. 10. διὰ τοῦτο προσετάγη
    ὑμῖν ἐφ᾽ ἑαυτοῖς μένειν, εἴτε ἀνὴρ εἴτε γυνή· δύναται γὰρ ἐν τοῖς τοιούτοις μετάνοια
    εἶναι. 11. ἐγὼ οὖν, φησίν, οὐ δίδωμι ἀφορμὴν ἵνα αὕτη ἡ πρᾶξις οὕτως συντελῆται,
    ἀλλὰ εἰς τὸ μηκέτι ἁμαρτάνειν τὸν ἡμαρτηκότα. περὶ δὲ τῆς προτέρας ἁμαρτίας αὐτοῦ
    ἔστιν ὁ δυνάμενος ἴασιν δοῦναι· αὐτὸς γάρ ἐστιν ὁ ἔχων πάντων τὴν ἐξουσίαν.
