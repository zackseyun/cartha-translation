translation:
  text: '“I am commanding you,” he says, “to guard chastity, and do not let a thought
    about another man’s wife, or about any fornication, or about such evil likenesses,
    rise up upon your heart. For in doing this you commit a great sin. But if you
    remember your own wife always, you will never transgress.


    “For if this thought climbs up upon your heart, you will transgress—and if other
    evil things like it [do], you are doing sin. For this thought is a great sin for
    a slave of God; and if anyone carries out this evil deed, he brings death upon
    himself. Look to yourself, then: keep away from this thought; for where modesty
    dwells, there lawlessness ought not to arise upon the heart of a righteous man.”


    I say to him, “Sir, allow me to ask you a few things.” “Speak,” he says. “Sir,”
    I say, “if someone has a wife who is faithful in the Lord, and he finds her in
    some adultery, does the husband sin by living together with her?”


    “Up to the point of ignorance,” he says, “he does not sin; but if the husband
    comes to know her sin, and the wife does not repent but persists in her fornication,
    and the husband lives together with her, he becomes guilty of her sin. Let the
    one who has sinned and is repenting be received—but not repeatedly—for for the
    slaves of God repentance is one. Because of repentance, then, the man ought not
    to marry. This rule is laid upon both woman and man.


    “Not only,” he says, “is it adultery if someone defiles his flesh, but whoever
    makes images as the nations do is committing adultery. Therefore, even in such
    works, if someone persists and does not repent, keep away from him and do not
    live together with him; otherwise you too are a sharer in his sin. For this reason
    it was commanded you to remain by yourselves, whether man or woman, for in cases
    like these there can be repentance.


    “I therefore,” he says, “do not give an occasion for this practice to be carried
    through in this way, but [I speak] so that the one who has sinned may no longer
    sin. But with regard to his former sin, there is One who is able to give healing—for
    he is the One who has authority over all.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: “Another man’s wife” (γυναικὸς ἀλλοτρίας) is a common idiom for a woman
      belonging to another, i.e., a married woman not one’s own.
    reason: cultural_note
  - marker: '2'
    text: The phrase “rise up upon the heart” reflects the Greek idiom ἀναβαίνειν
      ἐπὶ τὴν καρδίαν, a vivid picture of a thought’s ascent into the inner life.
    reason: cultural_note
  - marker: '3'
    text: “Brings death upon himself” translates κατεργάζομαι + θάνατος; alternatively,
      “works out death for himself.”
    reason: lexical_alternative
  - marker: '4'
    text: Rendered “Sir” (Κύριε) to reflect respectful address to the shepherd; alternatively
      “Lord.”
    reason: lexical_alternative
  - marker: '5'
    text: “Not repeatedly” (μὴ ἐπὶ πολὺ) could also be read “not for long,” but the
      context (μετάνοιά ἐστιν μία, “repentance is one”) suggests limitation of frequency
      rather than duration.
    reason: lexical_alternative
  - marker: '6'
    text: “Repentance is one” echoes Hermas’s distinctive teaching about a single
      decisive repentance after grave sin; cf. its reception in later penitential
      discipline.
    reason: cross_reference
  - marker: '7'
    text: “To remain by yourselves” (ἐφ᾽ ἑαυτοῖς μένειν) idiomatically means to remain
      unmarried/single in this context, preserving space for the other’s repentance.
    reason: cultural_note
  - marker: '8'
    text: “Makes images as the nations do” (τὰ ὁμοιώματα ποιῇ τοῖς ἔθνεσιν) points
      to idol-making; Hermas labels such idolatry as ‘adultery’ in a covenantal sense
      (cf. Rom 1:23 for ὁμοίωμα with images).
    reason: cross_reference
lexical_decisions:
- source_word: Ἐντέλλομαί
  chosen: I am commanding
  alternatives:
  - I command
  - I charge
  lexicon: BDAG
  rationale: Present-tense imperative nuance in direct speech; “command” preserves
    force of entellomai.
- source_word: φυλάσσειν
  chosen: to guard
  alternatives:
  - to keep
  - to observe
  lexicon: BDAG
  rationale: Active, vigilant sense fits moral exhortation; “guard chastity” keeps
    concrete ethical imagery.
- source_word: ἁγνεία
  chosen: chastity
  alternatives:
  - purity
  lexicon: BDAG
  rationale: In sexual-ethics context, “chastity” is more specific than generic “purity”
    and matches early Christian paraenesis.
- source_word: ἀναβαίνειν ἐπὶ τὴν καρδίαν
  chosen: rise up upon the heart
  alternatives:
  - enter the heart
  - come into the heart
  lexicon: BDAG
  rationale: Preserves the spatial metaphor of rising up onto the heart, retaining
    Hermas’s vivid idiom.
- source_word: γυναικὸς ἀλλοτρίας
  chosen: another man’s wife
  alternatives:
  - another’s wife
  - a woman belonging to another
  lexicon: BDAG
  rationale: Idiom commonly denotes a married woman belonging to someone else; “another
    man’s wife” is clear.
- source_word: πορνεία
  chosen: fornication
  alternatives:
  - sexual immorality
  - unchastity
  lexicon: BDAG
  rationale: Hermas’s concrete moral register favors the specific traditional term
    over the broader modern “sexual immorality.”
- source_word: ὁμοιώματα (πην.)
  chosen: likenesses / images
  alternatives:
  - forms
  - representations
  lexicon: BDAG
  rationale: In v.1 the general sense “likenesses” (evil models/images) fits; in v.9
    with ποιέω and ἔθνη, “images” (idols) is appropriate. We render contextually but
    note the lexical unity.
- source_word: ἁμαρτία ἐργάζῃ
  chosen: commit a great sin
  alternatives:
  - work a great sin
  - do a great sin
  lexicon: BDAG
  rationale: English idiom prefers “commit” for sin while retaining the gravity of
    the act.
- source_word: διαμαρτάνω
  chosen: transgress
  alternatives:
  - go astray
  - err completely
  lexicon: BDAG
  rationale: Legal-moral nuance suits Hermas’s paraenetic tone better than the vaguer
    “go astray.”
- source_word: ἐνθύμησις
  chosen: thought
  alternatives:
  - inward thought
  - consideration
  lexicon: BDAG
  rationale: Plain “thought” is accurate and readable; context supplies the inwardness.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Following project policy where the bonded status is theologically salient;
    highlights belonging to God.
- source_word: θάνατον ἑαυτῷ κατεργάζεται
  chosen: brings death upon himself
  alternatives:
  - works out death for himself
  - produces death for himself
  lexicon: BDAG
  rationale: Idiomatic English while preserving causal force; footnoted alternative
    reflects the “work out” nuance.
- source_word: σεμνότης
  chosen: modesty
  alternatives:
  - dignity
  - gravity
  lexicon: BDAG
  rationale: In a sexual-ethics context “modesty” communicates both moral seriousness
    and restraint.
- source_word: ἀνομία
  chosen: lawlessness
  alternatives:
  - iniquity
  - wickedness
  lexicon: BDAG
  rationale: Maintains standard moral-legal category without theological overtones
    beyond the Greek.
- source_word: Κύριε (voc.)
  chosen: Sir
  alternatives:
  - Lord
  - Master
  lexicon: BDAG
  rationale: Here a respectful address to the angelic shepherd rather than a theophoric
    title; “Sir” preserves register.
- source_word: πιστὴν ἐν Κυρίῳ
  chosen: faithful in the Lord
  alternatives:
  - a believer in the Lord
  - faithful to the Lord
  lexicon: BDAG
  rationale: Echoes early-Christian idiom identifying believers; keeps compactness
    and intertextual flavor.
- source_word: συνζῇ
  chosen: live together with
  alternatives:
  - cohabit with
  - continue living with
  lexicon: BDAG
  rationale: Literal yet clear for the marital cohabitation context.
- source_word: ἔνοχος γίνεται τῆς ἁμαρτίας αὐτῆς
  chosen: he becomes guilty of her sin
  alternatives:
  - he is liable for her sin
  - he shares in her sin
  lexicon: BDAG
  rationale: “Becomes guilty of” closely matches ἔνοχος + genitive; later clause covers
    “share” language.
- source_word: δεχθῆναι τὸν ἡμαρτηκότα καὶ μετανοοῦντα
  chosen: to receive the one who has sinned and is repenting
  alternatives:
  - to accept the sinner who repents
  - to take back the one who sinned and repents
  lexicon: BDAG
  rationale: Keeps participial aspect (“is repenting”) and ecclesial nuance of reception.
- source_word: μὴ ἐπὶ πολὺ
  chosen: not repeatedly
  alternatives:
  - not for long
  - not to excess
  lexicon: BDAG
  rationale: In context of repentance frequency, “not repeatedly” best conveys restriction
    on multiple repentances.
- source_word: μετάνοιά ἐστιν μία
  chosen: repentance is one
  alternatives:
  - there is one repentance
  - only one repentance
  lexicon: BDAG
  rationale: Literal rendering preserves Hermas’s stark formulation for later theological
    discussion.
- source_word: οὐκ ὀφείλει γαμεῖν
  chosen: ought not to marry
  alternatives:
  - is not to marry
  - should not marry
  lexicon: BDAG
  rationale: Captures moral obligation without legalism; context implies marrying
    another.
- source_word: πρᾶξις… κεῖται
  chosen: this rule is laid upon
  alternatives:
  - this practice lies upon
  - this regulation is set upon
  lexicon: BDAG
  rationale: “Rule” communicates normative force of πρᾶξις here; κεῖται expresses
    being set/laid upon both sexes.
- source_word: μιάνῃ τὴν σάρκα
  chosen: defiles his flesh
  alternatives:
  - pollutes his body
  - stains his flesh
  lexicon: BDAG
  rationale: Retains ritual-moral coloration of μιάνω in sexual sin contexts.
- source_word: τὰ ὁμοιώματα ποιῇ τοῖς ἔθνεσιν
  chosen: makes images as the nations do
  alternatives:
  - makes likenesses like the Gentiles
  - fashions idols like the nations
  lexicon: BDAG
  rationale: Explicitly names image-making; “nations” preserves ethnic contrast; idolatry
    sense noted in footnote.
- source_word: ἐμμένῃ
  chosen: persists
  alternatives:
  - continues
  - remains (in)
  lexicon: BDAG
  rationale: Moral perseverance in wrongdoing is in view.
- source_word: ἀπέχου
  chosen: keep away
  alternatives:
  - abstain
  - avoid
  lexicon: BDAG
  rationale: Direct imperative with personal object; “keep away” is clear and forceful.
- source_word: μὴ συνζῆθι
  chosen: do not live together with
  alternatives:
  - do not cohabit with
  - do not share life with
  lexicon: BDAG
  rationale: Parallels earlier συνζῇ; maintains consistency.
- source_word: μέτοχος
  chosen: sharer
  alternatives:
  - participant
  - partner
  lexicon: BDAG
  rationale: “Sharer” mirrors the genitive relation to sin and keeps the communal
    warning sharp.
- source_word: ἐφ᾽ ἑαυτοῖς μένειν
  chosen: to remain by yourselves
  alternatives:
  - to remain unmarried
  - to stay alone
  lexicon: BDAG
  rationale: Literal phrase retained; footnote clarifies marital sense as “unmarried/single.”
- source_word: ἴασιν δοῦναι
  chosen: to give healing
  alternatives:
  - to grant healing
  - to provide cure
  lexicon: BDAG
  rationale: Hermas’s pastoral-soteriological imagery is medical; “healing” preserves
    metaphor.
- source_word: ὁ ἔχων πάντων τὴν ἐξουσίαν
  chosen: the One who has authority over all
  alternatives:
  - the One holding authority over all
  - the One who rules all
  lexicon: BDAG
  rationale: Keeps titular cadence and agency without prematurely naming God in the
    text.
