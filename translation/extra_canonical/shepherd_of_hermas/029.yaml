theological_decisions:
- issue: Addressing the shepherd as Κύριε
  chosen_reading: Render as “Sir” rather than “Lord.”
  alternative_readings:
  - Translate as “Lord.”
  rationale: In Hermas the interlocutor is an angelic or visionary figure, and the
    vocative Kύριε functions as respectful address rather than a divine title. “Sir”
    preserves the relational register without conferring divine status.
- issue: μετάνοια translation in specific-sin context
  chosen_reading: Translate μετανοέω/μετάνοια as “repent/repentance.”
  alternative_readings:
  - Change of mind/turning
  rationale: Per project policy, in concrete sin–exhortation contexts the traditional
    “repent/repentance” best communicates the moral action demanded.
  doctrine_reference: 'DOCTRINE.md: Contested terms – μετανοέω policy'
- issue: Scope of “repentance is one” (μετάνοιά ἐστιν μία)
  chosen_reading: Hermas asserts a single, definitive repentance for God’s slaves
    with respect to grave sins; hence “not repeatedly.”
  alternative_readings:
  - Not for long (temporal limit)
  - Restrict frequency but allow multiple repentances
  rationale: The coupling of μὴ ἐπὶ πολὺ with ‘repentance is one’ and the ensuing
    marital instruction indicates a limit on repeated canonical repentance rather
    than a temporal window.
- issue: Adultery extended to idolatry
  chosen_reading: Render ὁμοιώματα + ποιέω τοῖς ἔθνεσιν as “makes images as the nations
    do,” keeping ‘adultery’ metaphor for idolatry.
  alternative_readings:
  - Imitates the customs of the nations
  - Makes likenesses like the Gentiles (without idol nuance)
  rationale: The term ὁμοιώματα commonly denotes carved images; Hermas’s moral logic
    treats idolatry as covenant adultery. Maintaining ‘adultery’ preserves the theological
    metaphor.
- issue: δοῦλος τοῦ Θεοῦ
  chosen_reading: Translate as “slave of God.”
  alternative_readings:
  - servant of God
  - bondservant of God
  rationale: Project default favors “slave” where belonging and obligation to God
    are salient; here it heightens the gravity of divided allegiance.
  doctrine_reference: 'DOCTRINE.md: Contested terms – δοῦλος'
