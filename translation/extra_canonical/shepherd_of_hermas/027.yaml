theological_decisions:
- issue: Personified evil in speech ethics (δαιμόνιον for slander)
  chosen_reading: Render δαιμόνιον as “demon,” preserving Hermas’s demonological framing.
  alternative_readings:
  - Euphemize as “evil spirit” or metaphorical “evil power”
  rationale: Hermas explicitly characterizes slander as a restless δαιμόνιον; retaining
    “demon” fits early Christian worldview and the text’s personification.
- issue: Scope of almsgiving (“Give to all”) and moral responsibility
  chosen_reading: Imperative “Give to all” kept unsoftened; the recipient’s accountability
    to God balances the exhortation.
  alternative_readings:
  - Qualify with prudential limits in the translation
  rationale: The Greek repeats πᾶσιν δίδου without qualification and immediately assigns
    judgment to recipients, absolving the giver; the translation should reflect that
    structure.
- issue: Rendering ζήσεται (“will live”)
  chosen_reading: Leave the promise unqualified as “will live.”
  alternative_readings:
  - Specify “will live before God” or “will have eternal life”
  rationale: Hermas often blends present and eschatological life; specifying one would
    over‑interpret.
- issue: μετάνοια as “repentance” rather than “change of mind”
  chosen_reading: Use “repentance” in this moral-state context.
  alternative_readings:
  - “Change of mind” (cognitive)
  rationale: Here μετάνοια refers to the standing of the household before God in simplicity;
    moral repentance is in view.
  doctrine_reference: 'Cartha Translation Philosophy: μετανοέω/μετάνοια policy'
- issue: διακονία for almsgiving
  chosen_reading: Translate as “ministry” to God, not merely “service.”
  alternative_readings:
  - Render as generic “service”
  rationale: Hermas frames almsgiving as a God‑given ministry received from the Lord;
    preserving “ministry” keeps ecclesial resonance.
