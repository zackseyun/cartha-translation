source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Λέγει μοι· Ἁπλότητα ἔχε καὶ ἄκακος γίνου καὶ ἔσῃ ὡς τὰ νήπια τὰ μὴ γινώσκοντα
    τὴν πονηρίαν τὴν ἀπολλύουσαν τὴν ζωὴν τῶν ἀνθρώπων. 2. πρῶτον μὲν μηδενὸς καταλάλει,
    μηδὲ ἡδέως ἄκουε καταλαλοῦντος· εἰ δὲ μή, καὶ σὺ ὁ ἀκούων ἔνοχος ἔσῃ τῆς ἁμαρτίας
    τοῦ καταλαλοῦντος, ἐὰν πιστεύσῃς τῇ καταλαλίᾳ ᾗ ἂν ἀκούσῃς· πιστεύσας γὰρ καὶ
    σὺ αὐτὸς ἕξεις κατὰ τοῦ ἀδελφοῦ σου. οὕτως οὖν ἔνοχος ἔσῃ τῆς ἁμαρτίας τοῦ καταλαλοῦντος.
    3. πονηρὰ ἡ καταλαλία, ἀκατάστατον δαιμόνιόν ἐστιν, μηδέποτε εἰρηνεῦον, ἀλλὰ πάντοτε
    ἐν διχοστασίαις κατοικοῦν. ἀπέχου οὖν ἀπ’ αὐτοῦ, καὶ εὐθηνίαν πάντοτε ἕξεις μετὰ
    πάντων. 4. ἔνδυσαι δὲ τὴν σεμνότητα, ἐν ᾗ οὐδὲν πρόσκομμά ἐστιν πονηρόν, ἀλλὰ
    πάντα ὁμαλὰ καὶ ἱλαρά. ἐργάζου τὸ ἀγαθόν, καὶ ἐκ τῶν κόπων σου, ὧν ὁ Θεὸς δίδωσίν
    σοι, πᾶσιν ὑστερουμένοις δίδου ἁπλῶς, μὴ διστάζων τίνι δῷς ἢ τίνι μὴ δῷς. πᾶσιν
    δίδου· πᾶσιν γὰρ ὁ Θεὸς δίδοσθαι θέλει ἐκ τῶν ἰδίων δωρημάτων. 5. οἱ οὖν λαμβάνοντες
    ἀποδώσουσιν λόγον τῷ Θεῷ, διατί ἔλαβον καὶ εἰς τί· οἱ μὲν γὰρ λαμβάνοντες θλιβόμενοι
    οὐ δικασθήσονται, οἱ δὲ ἐν ὑποκρίσει λαμβάνοντες τίσουσιν δίκην. 6. ὁ οὖν διδοὺς
    ἀθῷός ἐστιν· ὡς γὰρ ἔλαβεν παρὰ τοῦ Κυρίου τὴν διακονίαν τελέσαι, ἁπλῶς αὐτὴν
    ἐτέλεσεν, μηθὲν διακρίνων τίνι δῷ ἢ μὴ δῷ. ἐγένετο οὖν ἡ διακονία αὕτη ἁπλῶς τελεσθεῖσα
    ἔνδοξος παρὰ τῷ Θεῷ. ὁ οὖν οὕτως ἁπλῶς διακονῶν τῷ Θεῷ ζήσεται. 7. φύλασσε οὖν
    τὴν ἐντολὴν ταύτην, ὥς σοι λελάληκα, ἵνα ἡ μετάνοιά σου καὶ τοῦ οἴκου σου ἐν ἁπλότητι
    εὑρεθῇ, καὶ ἡ καρδία [σου] καθαρὰ καὶ ἀμίαντος.
