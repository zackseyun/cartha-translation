translation:
  text: 'He says to me: Have simplicity, and become guileless, and you will be like
    the little ones who do not know the wickedness that destroys the life of human
    beings.


    First of all, slander no one, and do not listen with pleasure to someone who slanders;
    otherwise you too, the hearer, will be guilty of the slanderer’s sin if you believe
    the slander you hear. For by believing it, you yourself also will have something
    against your brother. Thus you will be guilty of the slanderer’s sin.


    Slander is evil; it is an unsettled demon, never at peace, but always dwelling
    amid divisions. So keep away from it, and you will always have prosperity with
    all.


    But clothe yourself with dignity, in which there is no evil stumbling block, but
    all things are smooth and cheerful. Do what is good, and from your labors, which
    God gives you, give simply to all who are in need, not hesitating as to whom you
    should give or to whom you should not give. Give to all, for God wants all to
    be given from his own gifts.


    Therefore those who receive will render an account to God why they received and
    for what; for those who receive while afflicted will not be judged, but those
    who receive in hypocrisy will pay the penalty.


    Therefore the one who gives is innocent; for just as he received from the Lord
    the ministry to carry out, he carried it out simply, making no distinction as
    to whom he should give or not give. Thus this ministry, having been carried out
    simply, became glorious before God. Therefore the one who thus ministers simply
    to God will live.


    So keep this commandment, as I have spoken to you, so that your repentance and
    that of your household may be found in simplicity, and your heart clean and unstained.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: “Well‑being” renders εὐθηνία, which can also mean “prosperity.” The context
      (“with all”) suggests good standing and flourishing in relationships rather
      than material plenty.
    reason: lexical_alternative
  - marker: '[2]'
    text: “Demon” translates δαιμόνιον; some would paraphrase “evil spirit,” but Hermas’s
      personification is intentional.
    reason: lexical_alternative
  - marker: '[3]'
    text: “Dignity” renders σεμνότης; alternatives include “gravity” or “reverent
      seriousness.”
    reason: lexical_alternative
  - marker: '[4]'
    text: “Give simply” (ἁπλῶς) can also mean “give generously,” but Hermas emphasizes
      single‑heartedness as well as liberality.
    reason: lexical_alternative
  - marker: '[5]'
    text: “Slander” translates καταλαλέω/καταλαλία; “backbiting” is another English
      option.
    reason: lexical_alternative
  - marker: '[6]'
    text: “Have something against your brother” reflects a Greek idiom for holding
      a grievance.
    reason: cultural_note
  - marker: '[7]'
    text: “Ministry” renders διακονία; “service” is possible but less clearly ecclesial.
    reason: lexical_alternative
  - marker: a
    text: Or 'Thus this ministry, carried out in simplicity, became glorious with
      God.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἁπλότης / ἁπλῶς
  chosen: simplicity / simply
  alternatives:
  - singleness
  - sincerity
  - generously
  lexicon: BDAG
  rationale: Hermas uses ἁπλότης as a moral quality of single-heartedness; retaining
    “simplicity/simply” preserves the thematic thread and avoids narrowing it to mere
    generosity.
- source_word: ἄκακος
  chosen: guileless
  alternatives:
  - innocent
  - harmless
  lexicon: BDAG
  rationale: Guileless captures absence of craftiness without implying naïveté; pairs
    well with ἁπλότης.
- source_word: νήπια
  chosen: little ones
  alternatives:
  - infants
  - children
  lexicon: BDAG
  rationale: “Little ones” conveys tender age and moral exemplar imagery without technicality.
- source_word: πονηρία
  chosen: wickedness
  alternatives:
  - evil
  - malice
  lexicon: BDAG
  rationale: Wickedness signals the moral quality that destroys life in this context.
- source_word: καταλαλέω / καταλαλία
  chosen: slander / slander
  alternatives:
  - speak evil of
  - backbite/backbiting
  lexicon: BDAG
  rationale: In moral paraenesis, καταλαλέω commonly denotes slanderous speech against
    someone; “slander” is clear and specific.
- source_word: ἡδέως
  chosen: with pleasure
  alternatives:
  - gladly
  - with delight
  lexicon: BDAG
  rationale: Conveys the culpable attitude in listening to slander.
- source_word: ἔνοχος
  chosen: guilty
  alternatives:
  - liable
  lexicon: BDAG
  rationale: Legal-moral liability is intended.
- source_word: ἕξεις κατὰ τοῦ ἀδελφοῦ σου
  chosen: you will have something against your brother
  alternatives:
  - you will hold a grudge against your brother
  - you will have a case against your brother
  lexicon: BDAG
  rationale: Keeps the Greek idiom transparent while remaining understandable; Hermas’
    communal ethic favors the relational nuance.
- source_word: ἀκατάστατον
  chosen: restless
  alternatives:
  - unstable
  - disorderly
  lexicon: BDAG
  rationale: Restlessness fits the demon metaphor and contrasts with peace.
- source_word: δαιμόνιον
  chosen: demon
  alternatives:
  - evil spirit
  lexicon: BDAG
  rationale: Early Christian diction; avoids demythologizing the personified force
    behind slander.
- source_word: διχοστασίαι
  chosen: divisions
  alternatives:
  - factions
  - dissensions
  lexicon: BDAG
  rationale: “Divisions” is broad and matches the social fracture slander causes.
- source_word: εὐθηνία
  chosen: well‑being
  alternatives:
  - prosperity
  - good relations
  lexicon: LSJ
  rationale: LSJ notes prosperity/comfort; here relational context (“with all”) suggests
    holistic well‑being rather than material prosperity.
- source_word: σεμνότης
  chosen: dignity
  alternatives:
  - gravity
  - reverent seriousness
  lexicon: BDAG
  rationale: Matches NT moral virtue lists (cf. 1 Tim 2:2); denotes a noble, orderly
    bearing suited to Hermas’ exhortation.
- source_word: πρόσκομμα
  chosen: stumbling block
  alternatives:
  - cause of stumbling
  - obstacle
  lexicon: BDAG
  rationale: Established moral metaphor; preserves offense-causing sense.
- source_word: ὁμαλός
  chosen: level
  alternatives:
  - smooth
  - even
  lexicon: LSJ
  rationale: “Level” retains the path imagery and complements “stumbling block.”
- source_word: ἱλαρά
  chosen: cheerful
  alternatives:
  - pleasant
  - gracious
  lexicon: BDAG
  rationale: Cheerfulness fits the ethical tone and contrasts slander’s turbulence.
- source_word: ὑστερουμένοις
  chosen: those who are in need
  alternatives:
  - the needy
  - those lacking
  lexicon: BDAG
  rationale: Clarifies the participle’s sense without jargon.
- source_word: διστάζων
  chosen: hesitating
  alternatives:
  - doubting
  - wavering
  lexicon: BDAG
  rationale: “Hesitating” fits the practical decision about recipients.
- source_word: διακρίνων
  chosen: making distinctions
  alternatives:
  - discriminating
  - deciding between
  lexicon: BDAG
  rationale: Captures the evaluative sorting Hermas forbids in this context.
- source_word: δωρήματα
  chosen: gifts
  alternatives:
  - donations
  - benefits
  lexicon: BDAG
  rationale: Divine “gifts” preserves theological source of provision.
- source_word: ἀποδώσουσιν λόγον
  chosen: will render an account
  alternatives:
  - will give an account
  lexicon: BDAG
  rationale: Standard judicial idiom; keeps gravity.
- source_word: θλιβόμενοι
  chosen: afflicted
  alternatives:
  - hard‑pressed
  - in distress
  lexicon: BDAG
  rationale: Common Koine sense for material or circumstantial hardship.
- source_word: ὑπόκρισις
  chosen: hypocrisy
  alternatives:
  - pretense
  lexicon: BDAG
  rationale: Moral vice term in early Christian vocabulary; transparent here.
- source_word: τίσουσιν δίκην
  chosen: will pay the penalty
  alternatives:
  - will receive punishment
  - will suffer justice
  lexicon: BDAG
  rationale: Idiomatic rendering retaining judicial metaphor.
- source_word: ἀθῷος
  chosen: innocent
  alternatives:
  - blameless
  lexicon: BDAG
  rationale: Signals freedom from guilt in God’s sight.
- source_word: διακονία / διακονεῖν
  chosen: ministry / minister
  alternatives:
  - service / serve
  lexicon: BDAG
  rationale: Preserves ecclesial texture of almsgiving as a God‑given ministry.
- source_word: τελέσαι / ἐτέλεσεν
  chosen: to carry out / he carried it out
  alternatives:
  - to complete / he completed it
  lexicon: BDAG
  rationale: “Carry out” communicates performing an assigned task; fits διακονία.
- source_word: ἔνδοξος
  chosen: glorious
  alternatives:
  - honorable
  - esteemed
  lexicon: BDAG
  rationale: Theocentric approval; retains exalted tone.
- source_word: ζήσεται
  chosen: will live
  alternatives:
  - will have life
  lexicon: BDAG
  rationale: Leaves open both present vitality and eschatological life, matching Hermas’
    parenetic promise.
- source_word: ἐντολή
  chosen: commandment
  alternatives:
  - command
  lexicon: BDAG
  rationale: Maintains the formal register of moral instruction.
- source_word: μετάνοια
  chosen: repentance
  alternatives:
  - change of mind
  lexicon: BDAG
  rationale: Here a moral state/result, not merely cognitive shift; “repentance” is
    appropriate.
- source_word: οἶκος
  chosen: household
  alternatives:
  - house
  - family
  lexicon: BDAG
  rationale: Ecclesial and social unit; common early Christian usage.
- source_word: ἀμίαντος
  chosen: unstained
  alternatives:
  - undefiled
  - unblemished
  lexicon: BDAG
  rationale: Moral purity image; “unstained” keeps the metaphor vivid.
