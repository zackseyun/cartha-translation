source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: ἁγιασθῆτε ἀπὸ πάσης πονηρίας καὶ ἀπὸ πάσης σκολιότητος. ὑμεῖς δὲ οὐ θέλετε
    παῆναι ἀπὸ τῆς πονηρίας ὑμῶν. 2. νῦν οὖν ἀκούσατέ μου καὶ εἰρηνεύετε ἐν ἑαυτοῖς
    καὶ ἐπισκέπτεσθε ἀλλήλους καὶ ἀντιλαμβάνεσθε ἀλλήλων, καὶ μὴ μόνοι τὰ κτίσματα
    τοῦ Θεοῦ μεταλαμβάνετε ἐκ καταχύματος, ἀλλὰ μεταδίδοτε καὶ τοῖς ὑστερουμένοις·
    3. οἱ μὲν γὰρ ἀπὸ τῶν πολλῶν ἐδεσμάτων ἀσθένειαν τῇ σαρκὶ ἐπισπῶνται καὶ λυμαίνονται
    τὴν σάρκα αὐτῶν· τῶν δὲ μὴ ἐχόντων ἐδέσματα λυμαίνεται ἡ σάρξ αὐτῶν διὰ τὸ μὴ
    ἔχειν τὸ ἀρκετὸν τῆς τροφῆς, καὶ διαφθείρεται τὸ σῶμα αὐτῶν. 4. αὕτη οὖν ἡ ἀσυνκρασία
    βλαβερὰ ὑμῖν τοῖς ἔχουσιν καὶ μὴ μεταδιδοῦσιν τοῖς ὑστερουμένοις. 5. βλέπετε τὴν
    κρίσιν τὴν ἐπερχομένην. οἱ ὑπερέχοντες οὖν ἐκζητεῖτε τοὺς πεινώντας ἕως οὔπω ὁ
    πύργος ἐτελέσθη· μετὰ γὰρ τὸ τελεσθῆναι τὸν πύργον θελήσετε ἀγαθοποιεῖν, καὶ οὐχ
    ἔξετε τόπον. 6. βλέπετε οὖν ὑμεῖς οἱ γαυρούμενοι ἐν τῷ πλούτῳ ὑμῶν, μήποτε στενάξουσιν
    οἱ ὑστερούμενοι, καὶ ὁ στεναγμὸς αὐτῶν ἀναβήσεται πρὸς τὸν Κύριον, καὶ ἐκκλεισθήσεσθε
    μετὰ τῶν [ἀσχέτων] ἀγαθῶν ὑμῶν ἔξω τῆς θύρας τοῦ πύργου. 7. νῦν οὖν ὑμῖν λεγω
    τοῖς προηγουμένοις τῆς ἐκκλησίας καὶ τοῖς πρωτοκαθεδρίταις· μὴ γίνεσθε ὅμοιοι
    τοῖς φαρμακοῖς. οἱ φαρμακοὶ μὲν οὖν τὰ φάρμακα ἑαυτῶν εἰς τὰς πυξίδας βαστάζουσιν,
    ὑμεῖς δὲ τὸ φάρμακον ὑμῶν καὶ τὸν ἰὸν εἰς τὴν καρδίαν. 8. ἐνεσκιρωμένοι ἐστὲ καὶ
    οὐ θέλετε καθαρίσαι τὰς καρδίας ὑμῶν καὶ συνκεράσαι ὑμῶν τὴν φρόνησιν ἐπὶ τὸ αὐτὸ
    ἐν καθαρᾷ καρδίᾳ, ἵνα σχῆτε ἔλεος παρὰ τοῦ βασιλέως τοῦ μεγάλου. 9. βλέπετε οὖν,
    τέκνα, μήποτε αὐται αἱ διχοστασίαι ὑμῶν ἀποστερήσουσιν τὴν ζωὴν ὑμῶν. 10. πῶς
    ὑμεῖς παιδεύειν θέλετε τοὺς ἐκλεκτοὺς Κυρίου, αὐτοὶ μὴ ἔχοντες παιδείαν; παιδεύετε
    οὖν ἀλλήλους καὶ εἰρηνεύετε ἐν αὐτοῖς, ἵνα κἀγὼ κατέναντι τοῦ πατρὸς ἱλαρὰ σταθεῖσα
    λόγον ἀποδῶ ὑπὲρ ὑμῶν πάντων τῷ Κυρίῳ ὑμῶν. Χ. Ὅτε οὖν ἐπαύσατο μετ᾿ ἐμοῦ λαλοῦσα,
    ἦλθον οἱ ἓξ νεανίσκοι οἱ οἰκοδομοῦντες, καὶ ἀπήνεγκαν αὐτὴν πρὸς τὸν πύργου, καὶ
    ἄλλοι τέσσαρες ἦραν τὸ συμψέλιον καὶ ἀπήνεγκαν καὶ αὐτὸ πρὸς τὸν πύργον. τούτων
    τὸ πρόσωπον οὐκ εἶδον, ὅτι ἀπεστραμμένοι ἦσαν. 2. ὑπάγουσαν δὲ αὐτὴν ἠρώτων ἵνα
    μοι ἀποκαλύψῃ περὶ τῶν τριῶν μορφῶν ἐν αἷς μοι ἐνεφανίσθη. ἀποκριθεῖσά μοι λέγει·
    Περὶ τούτων ἕτερον δεῖ σε ἐπερωτῆσαι ἵνα σοι ἀποκαλυφθῇ. 3. ὤφθη δέ μοι, ἀδελφοί,
    τῇ μὲν πρώτῃ ὁράσει τῇ περυσινῇ λίαν πρεσβυτέρα καὶ ἐν καθέδρᾳ καθημένη. 4. τῇ
    δὲ ἑτέρᾳ ὁράσει τὴν μὲν ὄψιν νεωτέραν εἶχεν, τὴν δὲ σάρκα καὶ τὰς τρίχας πρεσβυτέρας,
    καὶ ἑστηκυῖά μοι ἐλάλει. ἱλαρωτέρα δὲ ἦν ἢ τὸ πρότερον. 5. τῇ δὲ τρίτῃ ὁράσει
    ὅλη νεωτέρα καὶ κάλλει ἐκπρεπεστάτη, μόνας δὲ τὰς τρίχας πρεσβυτέρας εἶχεν· ἱλαρὰ
    δὲ εἰς τέλος ἦν καὶ ἐπὶ συμψελίου καθημένη. 6. περὶ τούτων περίλυπος ἤμην λίαν
    τοῦ γνῶναί με τὴν ἀποκάλυψιν ταύτην. καὶ βλέπω τὴν πρεσβυτέραν ἐν ὁράματι τῆς
    νυκτὸς λέγουσάν μοι· Πᾶσα ἐρώτησις ταπεινοφροσύνης χρήζει· νήστευσον οὖν, καὶ
    λήμψῃ ὃ αἰτεῖς παρὰ τοῦ Κυρίου. 7. ἐνήστευσα οὖν μίαν ἡμέραν, καὶ αὐτῇ τῇ νυκτί
    μοι ὤφθη νεανίσκος καὶ λέγει μοι· Ὅτι σὺ ὑπὸ χεῖρα αἰτεῖς ἀποκαλύψεις ἐν δεήσει,
    βλέπε μήποτε πολλὰ αἰτούμενος βλάψῃς σου τὴν σάρκα. 8. ἀρκοῦσίν σοι αἱ ἀποκαλύψεις
    αὗται. μήτι δύνη ἰσχυροτέρας ἀποκαλύψεις ὧν ἑώρακας ἰδεῖν; 9. ἀποκριθεὶς αὐτῷ
    λέγω· Κύριε, τοῦτο μόνον αἰτοῦμαι, περὶ τῶν τριῶν μορφῶν τῆς πρεσβυτέρας ἵνα ἀποκάλυψις
    ὁλοτελὴς γένηται. ἀποκριθείς μοι λέγει· Μέχρι τίνος ἀσύνετοί ἐστε; ἀλλʼ αἱ διψυχίαι
    ὑμῶν ἀσυνέτους ὑμᾶς ποιοῦσιν καὶ τὸ μὴ ἔχειν τὴν καρδίαν ὑμῶν πρὸς τὸν Κύριον.
    10. ἀποκριθεὶς αὐτῷ πάλιν εἶπον· Ἀλλʼ ἀπὸ σοῦ, κύριε, ἀκριβέστερον αὐτὰ γνωσόμεθα.
