theological_decisions:
- issue: Rendering of κύριος in addresses and references
  chosen_reading: Translate κύριος as 'Lord' in references to God and as respectful
    address to the visionary figure; keep capitalization 'Lord' consistently.
  alternative_readings:
  - Render address to the young man as 'Sir'
  rationale: Project default prioritizes 'Lord'; Hermas’s usage blurs 'sir/Lord'.
    We keep 'Lord' in main text and note polite‑address possibility in footnote.
  doctrine_reference: 'DOCTRINE.md → Contested terms: κύριος → Lord'
- issue: φαρμακοί sense
  chosen_reading: Render φαρμακοί as 'poisoners' rather than 'sorcerers'
  alternative_readings:
  - sorcerers
  rationale: Immediate metaphor is about carrying drugs/poison in boxes vs in hearts;
    'poisoners' is the concrete target of the simile.
- issue: Tower imagery and eschatology
  chosen_reading: Preserve 'tower' and 'door' literally, without interpretive gloss
  rationale: Hermas’s allegory is central; avoid flattening to 'church' or 'salvation'
    in the line about being shut out.
- issue: Ethical term διψυχία
  chosen_reading: Translate as 'double‑mindedness'
  alternative_readings:
  - doubt
  - vacillation
  rationale: Hermas develops 'double‑mindedness' as a vice; keeping literal term preserves
    his moral psychology.
- issue: '''Life'' (ζωή) in warning'
  chosen_reading: Render as 'life' without specifying 'eternal'
  alternative_readings:
  - eternal life
  rationale: Context is general loss of divine life; Hermas often uses 'life' broadly;
    avoid over‑specification.
- issue: Fasting and humility as means to revelation
  chosen_reading: Translate straightforwardly as spiritual disciplines leading to
    reception from the Lord
  rationale: Maintains Hermas’s paraenetic linkage of humility/fasting with revelation
    without importing later ascetical frames.
