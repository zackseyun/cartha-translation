translation:
  text: 'Be made holy from all wickedness and from all crookedness. But you do not
    want to turn away from your wickedness. Now then, listen to me and be at peace
    among yourselves, and look after one another and support one another; and do not
    by yourselves alone partake of God’s creatures in a flood of abundance,[1] but
    share also with those who are in want. For some, from their many dishes, draw
    weakness into the flesh and ruin their flesh; but of those who do not have food,
    their flesh is ruined because they do not have enough nourishment, and their body
    is destroyed. This imbalance[2] then is harmful to you who have and do not share
    with those who lack. Look to the judgment that is coming. Therefore, you who are
    well‑off,[3] seek out the hungry while the tower is not yet finished; for after
    the tower has been finished you will want to do good, and you will not have a
    place. So watch, you who pride yourselves in your wealth, lest those in need should
    groan, and their groaning go up to the Lord, and you be shut out together with
    your useless goods[4] outside the door of the tower.


    Now I say to you who lead the church and to the first‑seaters:[5] do not become
    like poisoners.[6] Poisoners carry their drugs in boxes; but you carry your drug
    and your poison in the heart. You are hardened[7] and do not wish to cleanse your
    hearts and to bring your understanding together into the same, in a pure heart,[8]
    so that you may receive mercy from the great King. Watch then, children, lest
    these dissensions of yours deprive you of your life. How can you wish to train
    the Lord’s chosen ones when you yourselves do not have training? Train one another
    and be at peace among yourselves, so that I also, standing with joy before the
    Father, may give an account on behalf of you all to your Lord.


    X. When she had ceased speaking with me, the six young men who were building came
    and carried her to the tower, and four others lifted the cushioned seat[9] and
    carried it also to the tower. I did not see their faces, because they were turned
    away.


    And as she was going, I asked her to reveal to me about the three forms in which
    she had appeared to me. She answered me and said, “About these, you must ask another,
    so that it may be revealed to you.”


    She appeared to me, brothers, in the first vision—the one last year—very aged
    and sitting on a chair. And in the second vision her face was younger, but the
    flesh and the hair were older, and as she stood she spoke to me; and she was more
    cheerful than before. And in the third vision she was wholly younger and outstanding
    in beauty, only the hair was older; she was cheerful to the end and was seated
    on a cushioned seat.


    About these things I was very much distressed, to know this revelation. And I
    see the aged woman in a vision of the night, saying to me: “Every asking has need
    of humility; therefore fast, and you will receive what you ask from the Lord.”
    So I fasted one day, and on that very night a young man appeared to me and said
    to me: “Since you are asking for revelations at hand in petition,[10] watch lest
    by asking for many things you harm your flesh. These revelations are sufficient
    for you. Are you able to see revelations more powerful than those you have seen?”


    And answering him I said, “Lord,[11] this only I ask—that concerning the three
    forms of the aged woman the revelation may become complete.” He answered me and
    said: “How long are you senseless? Rather, your double‑mindednesses[12] make you
    senseless, and the fact that your heart is not set toward the Lord.”


    Answering him again, I said, “But from you, Lord, we shall learn these things
    more precisely.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: 'Greek ἐκ καταχύματος: literally ‘out of a pouring/overflow.’ Here of consuming
      God’s created things in a glut or deluge—i.e., overabundance.'
    reason: lexical_alternative
  - marker: '2'
    text: 'Greek ἀσυνκρασία: literally ‘lack of proper mixture/temperament.’ Rendered
      ‘imbalance’ to capture both physical and social disorder.'
    reason: lexical_alternative
  - marker: '3'
    text: 'Greek ὑπερέχοντες: could mean ‘those in authority’ or ‘those with advantage.’
      Context (wealth/food) favors ‘well‑off.’'
    reason: lexical_alternative
  - marker: '4'
    text: 'The word ἀσχέτων (‘useless’/‘out of place’) is bracketed in some witnesses;
      sense: their goods will be of no use to them when shut out.'
    reason: textual_variant
  - marker: '5'
    text: '‘First‑seaters’ (πρωτοκαθεδρίται): those occupying or seeking the best
      seats, an honorific practice in assemblies.'
    reason: cultural_note
  - marker: '6'
    text: φαρμακοί could be ‘sorcerers’ in some contexts; here the imagery of carrying
      φάρμακα (drugs/poisons) and ἰός (poison) favors ‘poisoners.’
    reason: lexical_alternative
  - marker: '7'
    text: The reading ἐνεσκιρωμένοι is uncertain; many take the sense as ‘hardened’
      (cf. ἐνεσκληρωμένοι). Alternatives include ‘encrusted’ or ‘sullen.’
    reason: textual_variant
  - marker: '8'
    text: ‘Bring your understanding together into the same’ translates συνκεράσαι
      … τὴν φρόνησιν ἐπὶ τὸ αὐτό—an image of mixing/blending judgment to unity.
    reason: lexical_alternative
  - marker: '9'
    text: συμψέλιον is rare; context suggests a portable seat/cushioned bench on which
      she sat and which could be carried.
    reason: lexical_alternative
  - marker: '10'
    text: 'Greek ὑπὸ χεῖρα: idiom for ‘at hand, readily available.’ The sense is asking
      for revelations ‘on demand’; the warning cautions against excess.'
    reason: lexical_alternative
  - marker: '11'
    text: Greek κύριε can mean ‘Lord’ or polite ‘Sir.’ Project default keeps ‘Lord’;
      here it is respectful address to the visionary young man.
    reason: lexical_alternative
  - marker: '12'
    text: 'Greek διψυχίαι: literally ‘double‑mindednesses’—Hermas’s term for a divided,
      wavering heart.'
    reason: cross_reference
lexical_decisions:
- source_word: ἁγιασθῆτε
  chosen: Be made holy
  alternatives:
  - Be sanctified
  - Become holy
  lexicon: BDAG
  rationale: Passive voice conveys being set apart/consecrated; 'made holy' is clear
    and preserves formality.
- source_word: σκολιότης / σκολιότης (σκολιότητα)
  chosen: crookedness
  alternatives:
  - perversity
  - deviousness
  lexicon: LSJ
  rationale: Literally 'crookedness'; keeps moral-metaphorical texture consistent
    with Hebrew/Greek idiom.
- source_word: μεταλαμβάνετε
  chosen: partake
  alternatives:
  - share in
  - consume
  lexicon: BDAG
  rationale: '''Partake'' is a standard rendering for participation in food/benefits;
    keeps formal nuance.'
- source_word: κτίσματα
  chosen: creatures
  alternatives:
  - created things
  - creation’s produce
  lexicon: BDAG
  rationale: Concrete plural of things created by God, especially foods; 'creatures'
    retains early Christian diction.
- source_word: ἐκ καταχύματος
  chosen: in a flood of abundance
  alternatives:
  - in a deluge
  - in excess
  - lavishly
  lexicon: LSJ
  rationale: κατάχυμα denotes pouring/overflow; idiom here conveys overabundance/glut.
    Chosen phrase keeps imagery of overflow.
- source_word: μεταδίδοτε
  chosen: share
  alternatives:
  - give a share
  - distribute
  lexicon: BDAG
  rationale: Common verb for sharing with those in need; dynamic but accurate.
- source_word: ἐδεσμάτων
  chosen: dishes
  alternatives:
  - foods
  - delicacies
  lexicon: LSJ
  rationale: Plural of prepared foods; 'dishes' pictures variety/gluttony.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - body
  - physical nature
  lexicon: BDAG
  rationale: Here literal bodily flesh (gluttony/privation). Retain 'flesh' per project
    default when literal.
- source_word: λυμαίνονται
  chosen: ruin
  alternatives:
  - ravage
  - maltreat
  lexicon: LSJ
  rationale: Verb of causing damage/laying waste; 'ruin' reads well and fits both
    clauses.
- source_word: ἀσυνκρασία
  chosen: imbalance
  alternatives:
  - lack of moderation
  - bad mixture
  - intemperance
  lexicon: LSJ
  rationale: Literally lack of proper mixture/temperament; 'imbalance' captures the
    dyscrasia image and applies to social inequity.
- source_word: ὑπερέχοντες
  chosen: you who are well‑off
  alternatives:
  - those in authority
  - those who have the advantage
  - those who are superior
  lexicon: BDAG
  rationale: Context is wealth/means, not office; 'well‑off' fits admonition to share
    with hungry.
- source_word: τελεσθῆναι / ἐτελέσθη
  chosen: be finished/has been finished
  alternatives:
  - be completed/has been completed
  lexicon: BDAG
  rationale: Standard rendering; no theological load.
- source_word: πρωτοκαθεδρίται
  chosen: first‑seaters
  alternatives:
  - those in the chief seats
  - lovers of the best seats
  lexicon: LSJ
  rationale: Literal and culture‑marked; footnoted for clarity; preserves second‑century
    ecclesial texture.
- source_word: φαρμακοί
  chosen: poisoners
  alternatives:
  - sorcerers
  - drug‑dealers
  lexicon: LSJ
  rationale: Immediate metaphor contrasts carrying drugs/poison in boxes vs in hearts;
    'poisoners' fits the concrete image better than 'sorcerers' here.
- source_word: φάρμακα / ἰός
  chosen: drugs / poison
  alternatives:
  - potions / venom
  lexicon: LSJ
  rationale: φάρμακον can be drug/poison; ἰός is poison/venom. Parallelism favors
    concrete 'poison' imagery.
- source_word: ἐνεσκιρωμένοι (var.)
  chosen: hardened
  alternatives:
  - encrusted
  - sullen
  lexicon: LSJ
  rationale: The likely sense is moral hardening; reading may reflect ἐνεσκληρωμένοι.
    'Hardened' communicates the ethical state; variant noted in footnote.
- source_word: συνκεράσαι ... τὴν φρόνησιν ἐπὶ τὸ αὐτό
  chosen: bring your understanding together into the same
  alternatives:
  - blend your judgment into unity
  - harmonize your prudence to one thing
  lexicon: LSJ
  rationale: Idiomatic call for united thinking; preserve metaphor of 'mixing' and
    the phrase 'into the same' (unity).
- source_word: διχοστασίαι
  chosen: dissensions
  alternatives:
  - divisions
  - factions
  lexicon: BDAG
  rationale: '''Dissensions'' matches moral vice-list usage and fits context of leaders’
    strife.'
- source_word: παιδεία / παιδεύειν
  chosen: training / train
  alternatives:
  - discipline / discipline
  - instruction / instruct
  lexicon: BDAG
  rationale: παιδεία carries both instruction and discipline; 'training' balances
    the senses in church‑order context.
- source_word: ἱλαρά
  chosen: with joy
  alternatives:
  - cheerfully
  - gladly
  lexicon: LSJ
  rationale: Consistent rendering of the repeated descriptor; 'with joy' reads smoothly
    with 'standing'.
- source_word: λόγον ἀποδῶ
  chosen: give an account
  alternatives:
  - render a report
  - give a word
  lexicon: BDAG
  rationale: Idiomatic phrase of accountability; fits intercessory scene.
- source_word: συμψέλιον
  chosen: cushioned seat
  alternatives:
  - bench
  - sofa
  - couch
  lexicon: LSJ
  rationale: Rare term; context is something on which she sits and which can be carried;
    'cushioned seat' is cautious and concrete; footnoted as uncertain.
- source_word: ἀποκαλύψεις
  chosen: revelations
  alternatives:
  - unveilings
  - disclosures
  lexicon: BDAG
  rationale: Standard rendering in apocalyptic context; preserves genre cue.
- source_word: ὑπὸ χεῖρα
  chosen: at hand
  alternatives:
  - on demand
  - underhand (privately)
  - readily at hand
  lexicon: LSJ
  rationale: Idiomatic; likely means 'ready‑to‑hand/at one's disposal.' Footnote explains
    nuance and cautions against over‑precision.
- source_word: ἰσχυροτέρας
  chosen: more powerful
  alternatives:
  - stronger
  - greater
  lexicon: BDAG
  rationale: Captures the comparative of strength applied to visionary intensity.
- source_word: διψυχίαι
  chosen: double‑mindednesses
  alternatives:
  - wavering minds
  - vacillations
  lexicon: BDAG
  rationale: Hermas’s signature ethical term; keep literal 'double‑mindedness' to
    preserve texture.
- source_word: ἀσύνετος
  chosen: senseless
  alternatives:
  - without understanding
  - foolish
  lexicon: BDAG
  rationale: Conveys lack of understanding, matching the rhetorical rebuke.
