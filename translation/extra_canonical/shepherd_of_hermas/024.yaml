theological_decisions:
- issue: Rendering of αἰών in eschatological context
  chosen_reading: Translate αἰών as 'age' in 'the age that is coming'.
  alternative_readings:
  - Translate as 'world' ("the world to come")
  rationale: Hermas uses apocalyptic two-age framework; 'age' preserves that, whereas
    'world' risks conflating with κόσμος already used for the present order.
- issue: Interpretation of 'ἐὰν δὲ ὑμεῖς θελήσητε, οὐδὲν ἔσται'
  chosen_reading: Render 'if you are willing, it will be nothing' (i.e., the coming
    tribulation will be as nothing for you).
  alternative_readings:
  - '''If you are willing, nothing will happen'' (the event is averted)'
  - '''If you are willing, there will be nothing'' (elliptical)'
  rationale: Immediate context urges admonition and remembrance, implying preparation
    and endurance. The sense that the trial’s impact is nullified for the willing
    fits Hermas’ paraenetic pattern better than cancellation of the event.
- issue: Translation of ἅγιοι
  chosen_reading: Render as 'holy ones' rather than 'saints'.
  alternative_readings:
  - '''saints'''
  rationale: '''Holy ones'' is a transparent gloss preserving early-Christian diction
    and avoids later ecclesiastical coloration.'
- issue: Translation of θλῖψις
  chosen_reading: Render as 'tribulation'.
  alternative_readings:
  - '''distress'''
  - '''affliction'''
  rationale: '''Tribulation'' maintains apocalyptic register consistent with the visionary
    genre and the intensifier ''great''.'
- issue: Handling of ἐκλεκτοί vs. ἐκλελεγμένοι
  chosen_reading: Use 'elect' for ἐκλεκτοί and 'those chosen' for ἐκλελεγμένοι.
  alternative_readings:
  - Use 'chosen' for both
  rationale: Maintains root consistency while reflecting grammatical differences (adjective
    vs participle), and keeps the sentence readable.
