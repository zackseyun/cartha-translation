translation:
  text: 'I asked her about the four colors which the beast[a] had upon its head. She
    answered me and said, "Again you are being curious about such matters." "Yes,
    my Lady,[b]" I said; "make known to me what these things are."


    She says, "Listen: the black is this world in which you dwell. And the fiery and
    blood‑red[c]—that is because this world must be destroyed through blood and fire.
    But the golden portion—this is you who have escaped this world. For just as gold
    is tested by fire and becomes useful, so also you are being tested among them[e].
    Those of you who remain and are fired by it[f] will be purified. As gold casts
    off its dross, so you too will throw off every grief and distress, and you will
    be purified and be useful for the building of the tower[h].


    "But the white portion is the age that is coming[i], in which the elect of God
    will dwell; because those chosen by God for eternal life will be spotless and
    pure.


    "Therefore you—do not cease speaking into the ears of the holy ones[j]. You also
    have the pattern[k] of the great tribulation that is coming[l]; but if you are
    willing, it will be nothing[m]. Remember the things written beforehand[n]."


    Having said these things, she went away, and I did not see to what place she went;
    for a noise occurred[o]. And I turned around in fear, thinking that the beast
    was coming.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek θηρίον. Alternative: ''wild beast''.'
    reason: lexical_alternative
  - marker: b
    text: Greek κυρία. 'Lady' keeps respectful address without connotations of ownership
      that 'Mistress' may carry.
    reason: lexical_alternative
  - marker: c
    text: 'Greek πυροειδὲς καὶ αἱματῶδες: ''fiery and blood‑red.'' Alternatives: ''fiery
      and blood‑stained'' or ''blood‑colored.'''
    reason: lexical_alternative
  - marker: e
    text: The phrase reads 'so also you are being tested in/among them (ἐν αὐτοῖς)'.
      Some witnesses include 'those who dwell' ([οἱ κατοικοῦντες]), yielding 'you
      who dwell among them.' The referent of 'them' may be the elements/events just
      mentioned (blood, fire) or the conditions of this world.
    reason: textual_variant
  - marker: f
    text: '''Fired by it'' follows the metallurgical metaphor; ''it'' most naturally
      refers to the fire/testing process.'
    reason: cultural_note
  - marker: h
    text: 'Cross‑reference: the tower vision throughout Visions 3–4, where stones
      are prepared for building.'
    reason: cross_reference
  - marker: i
    text: 'Greek αἰὼν ὁ ἐπερχόμενος: ''the age that is coming.'' Alternative: ''the
      world to come.'''
    reason: lexical_alternative
  - marker: j
    text: 'Greek ἅγιοι: rendered ''holy ones'' rather than ''saints'' to preserve
      early-Christian diction.'
    reason: lexical_alternative
  - marker: k
    text: 'Greek τύπος: ''pattern'' here. Alternatives: ''type,'' ''token,'' ''sign.'''
    reason: lexical_alternative
  - marker: l
    text: 'Greek θλῖψις μεγάλη ἐρχομένη: ''the great tribulation that is coming.''
      Alternative: ''the coming great distress/affliction.'''
    reason: lexical_alternative
  - marker: m
    text: '''If you are willing, it will be nothing'' may mean the trial’s impact
      will be as nothing for those prepared; alternative understanding: ''if you are
      willing, nothing will happen'' (the event is averted).'
    reason: alternative_reading
  - marker: n
    text: '''The things written beforehand'' (τὰ προγεγραμμένα) likely refers to earlier
      written admonitions or previously revealed parts of the vision.'
    reason: cross_reference
  - marker: o
    text: 'Greek ψόφος: ''noise'' or ''sound'', an unspecified disturbance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θηρίον
  chosen: beast
  alternatives:
  - wild beast
  lexicon: BDAG
  rationale: Common apocalyptic term; "beast" preserves symbolic weight without adding
    'wild' unless needed.
- source_word: χρώματα
  chosen: colors
  lexicon: LSJ
  rationale: Plain sense of visible hues on the beast’s head.
- source_word: εἰς τὴν κεφαλήν
  chosen: upon its head
  alternatives:
  - on its head
  lexicon: BDAG
  rationale: Spatial prepositional sense; "upon" keeps the visionary concreteness.
- source_word: περίεργος
  chosen: curious
  alternatives:
  - overcurious
  - meddlesome
  lexicon: LSJ
  rationale: Reproach for inquisitiveness fits context; 'curious' is idiomatic yet
    close to sense.
- source_word: κυρία
  chosen: Lady
  alternatives:
  - Mistress
  lexicon: LSJ
  rationale: Hermas consistently addresses the visionary woman as 'Lady'; 'Mistress'
    can imply ownership and is less fitting in English.
- source_word: κόσμος
  chosen: world
  alternatives:
  - order
  - universe
  lexicon: BDAG
  rationale: Here denotes the present human world-order in which they dwell; 'world'
    captures this.
- source_word: πυροειδές
  chosen: fiery
  alternatives:
  - fire-colored
  lexicon: LSJ
  rationale: Adjectival form meaning 'of fire-like appearance'.
- source_word: αἱματῶδες
  chosen: blood‑red
  alternatives:
  - blood-stained
  - blood-colored
  lexicon: LSJ
  rationale: Color nuance fits the symbolic palette; 'blood‑red' is succinct.
- source_word: ἀπόλλυσθαι
  chosen: be destroyed
  alternatives:
  - perish
  - be undone
  lexicon: BDAG
  rationale: Passive infinitive of ruin fits prophetic-apocalyptic diction.
- source_word: χρυσοῦν (μέρος) / χρυσίον
  chosen: golden / gold
  lexicon: LSJ
  rationale: '''Golden portion'' keeps the metaphor; ''gold'' for the refining comparison.'
- source_word: ἐκφυγόντες
  chosen: escaped
  alternatives:
  - fled out from
  lexicon: BDAG
  rationale: Compound emphasizes deliverance from; 'escaped' is natural English.
- source_word: δοκιμάζεται
  chosen: is tested
  alternatives:
  - is proved
  - is tried
  lexicon: BDAG
  rationale: Metallurgical testing; 'tested' communicates the process.
- source_word: εὔχρηστον
  chosen: useful
  alternatives:
  - serviceable
  lexicon: LSJ
  rationale: Outcome of testing is suitability for use; 'useful' is clear and concise.
- source_word: ἐν αὐτοῖς
  chosen: among them
  alternatives:
  - in them
  lexicon: BDAG
  rationale: Keeps the ambiguity of the Greek referent (the conditions or elements
    mentioned).
- source_word: πυρωθέντες
  chosen: fired
  alternatives:
  - heated
  - refined
  lexicon: LSJ
  rationale: Metallurgical 'to fire' matches the gold-smelting imagery.
- source_word: σκωρία
  chosen: dross
  alternatives:
  - slag
  - scoria
  lexicon: LSJ
  rationale: Standard term for impurities removed in refining.
- source_word: λύπη
  chosen: grief
  alternatives:
  - sorrow
  lexicon: BDAG
  rationale: Emotional burden to be cast off; 'grief' pairs well with 'distress'.
- source_word: στενοχωρία
  chosen: distress
  alternatives:
  - anguish
  - hardship
  lexicon: BDAG
  rationale: Captures constriction/pressure metaphor in accessible English.
- source_word: χρήσιμοι
  chosen: useful
  alternatives:
  - serviceable
  lexicon: LSJ
  rationale: Echoes earlier εὔχρηστον to keep the utility motif consistent.
- source_word: οἰκοδομή
  chosen: building
  alternatives:
  - construction
  lexicon: BDAG
  rationale: Literal building of the symbolic tower, not abstract 'edification' here.
- source_word: λευκόν
  chosen: white
  lexicon: LSJ
  rationale: Color in the symbolic sequence; plain rendering.
- source_word: αἰὼν ὁ ἐπερχόμενος
  chosen: the age that is coming
  alternatives:
  - the coming age
  - the world to come
  lexicon: BDAG
  rationale: '''Age'' reflects two-age eschatology; ''coming'' keeps the temporal
    movement.'
- source_word: ἐκλεκτοί / ἐκλελεγμένοι
  chosen: elect / those chosen
  alternatives:
  - chosen / chosen ones
  lexicon: BDAG
  rationale: Adjectival form as 'elect'; participle as 'those chosen' to reflect aspect
    while keeping root consistency.
- source_word: ἄσπιλοι καὶ καθαροί
  chosen: spotless and pure
  alternatives:
  - without stain and clean
  lexicon: BDAG
  rationale: Idiomatic pair in moral purity language.
- source_word: ἅγιοι
  chosen: holy ones
  alternatives:
  - saints
  lexicon: BDAG
  rationale: '''Holy ones'' preserves early-Christian texture and literal sense.'
- source_word: τύπος
  chosen: pattern
  alternatives:
  - type
  - token
  - sign
  lexicon: BDAG
  rationale: '''Pattern'' conveys an exemplar/foreshadow without technical theological
    ''type'' jargon.'
- source_word: θλῖψις μεγάλη ἐρχομένη
  chosen: the great tribulation that is coming
  alternatives:
  - the great distress that is coming
  - the coming great affliction
  lexicon: BDAG
  rationale: '''Tribulation'' preserves apocalyptic register while remaining intelligible.'
- source_word: μνημονεύετε τὰ προγεγραμμένα
  chosen: remember the things written beforehand
  alternatives:
  - remember what was previously written
  lexicon: BDAG
  rationale: Plain imperative; keeps pro- prefix nuance of prior recording.
- source_word: ψόφος
  chosen: noise
  alternatives:
  - sound
  - rumbling
  lexicon: LSJ
  rationale: Neutral auditory disturbance fits the scene.
- source_word: ἐπεστράφην εἰς τὰ ὀπίσω
  chosen: I turned around
  alternatives:
  - I turned back
  lexicon: BDAG
  rationale: Natural English for physical movement to the rear.
- source_word: δοκῶν ὅτι
  chosen: thinking that
  alternatives:
  - supposing that
  lexicon: BDAG
  rationale: Cognitive aspect of the narrator’s fear.
