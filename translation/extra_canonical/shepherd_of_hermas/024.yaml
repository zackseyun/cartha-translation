book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ἠρώτησα αὐτὴν περὶ τῶν τεσσάρων χρωμάτων ὧν εἶχεν τὸ θηρίον εἰς τὴν κεφαλήν.
    ἡ δὲ ἀποκριθεῖσά μοι λέγει· Πάλιν περίεργος εἶ περὶ τοιούτων πραγμάτων. Ναί, φημί,
    κυρία· γνώρισόν μοι τί ἐστιν ταῦτα. 2. Ἄκουε, φησίν· τὸ μὲν μέλαν οὗτος ὁ κόσμος
    ἐστίν, ἐν ᾧ κατοικεῖτε. 3. τὸ δὲ πυροειδὲς καὶ αἱματῶδες, ὅτι δεῖ τὸν κόσμον τοῦτον
    δι' αἵματος καὶ πυρὸς ἀπόλλυσθαι· 4. τὸ δὲ χρυσοῦν μέρος ὑμεῖς ἐστὲ οἱ ἐκφυγόντες
    τὸν κόσμον τοῦτον. ὥσπερ γὰρ τὸ χρυσίον δοκιμάζεται διὰ τοῦ πυρὸς καὶ εὔχρηστον
    γίνεται, οὕτως καὶ ὑμεῖς δοκιμάζεσθε [οἱ κατοικοῦντες] ἐν αὐτοῖς. οἱ οὖν μείναντες
    καὶ πυρωθέντες ὑπ' αὐτοῦ καθαρισθήσεσθε. ὥσπερ τὸ χρυσίον ἀποβάλλει τὴν σκωρίαν
    αὐτοῦ, οὕτω καὶ ὑμεῖς ἀποβαλεῖτε πᾶσαν λύπην καὶ στενοχωρίαν, καὶ καθαρισθήσεσθε
    καὶ χρήσιμοι ἔσεσθε εἰς τὴν οἰκοδομὴν τοῦ πύργου. 5. τὸ δὲ λευκὸν μέρος ὁ αἰὼν
    ὁ ἐπερχόμενός ἐστιν, ἐν ᾧ κατοικήσουσιν οἱ ἐκλεκτοὶ τοῦ θεοῦ· ὅτι ἄσπιλοι καὶ
    καθαροὶ ἔσονται οἱ ἐκλελεγμένοι ὑπὸ τοῦ Θεοῦ εἰς ζωὴν αἰώνιον. 6. σὺ οὖν μὴ διαλίπῃς
    λαλῶν εἰς τὰ ὦτα τῶν ἁγίων. ἔχετε καὶ τὸν τύπον τῆς θλίψεως τῆς ἐρχομένης μεγάλης.
    ἐὰν δὲ ὑμεῖς θελήσητε, οὐδὲν ἔσται. μνημονεύετε τὰ προγεγραμμένα. 7. ταῦτα εἴπασα
    ἀπῆλθεν, καὶ οὐκ εἶδον ποίῳ τόπῳ ἀπῆλθεν· ψόφος γὰρ ἐγένετο· κἀγὼ ἐπεστράφην εἰς
    τὰ ὀπίσω φοβηθείς, δοκῶν ὅτι τὸ θηρίον ἔρχεται.
