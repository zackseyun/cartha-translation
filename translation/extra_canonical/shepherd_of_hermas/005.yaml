translation:
  text: 'As I was going to Cumae[a] at the same season as the year before, while walking
    I recalled last year’s vision, and again a spirit[b] lifts me up and carries me
    off to the same place as the year before.


    So, having come to the place, I knelt[c] and began to pray to the Lord and to
    glorify his name, because he had deemed me worthy and had made known to me my
    former sins.


    And after I rose from the prayer, I see before me the old woman whom I had also
    seen last year, walking along and reading a little book[d]. She says to me, “Are
    you able to announce these things to the elect[f] of God?” I say to her, “Lady,
    I am not able to remember so many things; but give me the little book, so that
    I may copy it down.” “Take it,” she says, “and you will give it back to me.”


    So I took it, and withdrawing to a certain spot in the field, I copied it all
    letter for letter, for I could not make out the syllables[e]. And when I had finished
    the letters of the book, suddenly the little book was snatched from my hand; but
    by whom I did not see.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cumae was an ancient Greek-founded city in Campania, famous for the Sibyl.
      Hermas situates the vision during a journey there.
    reason: cultural_note
  - marker: b
    text: Or “the Spirit,” i.e., the Holy Spirit; the Greek has no article, and the
      agent is left unspecified.
    reason: alternative_reading
  - marker: c
    text: Literally, “I set the knees,” a Greek idiom for kneeling.
    reason: cultural_note
  - marker: d
    text: The Greek βιβλαρίδιον is a diminutive; possible renderings include “booklet”
      or “small scroll.”
    reason: lexical_alternative
  - marker: e
    text: Ancient manuscripts were often written without spaces (scriptio continua),
      hence “I could not find the syllables,” and he copies letter by letter.
    reason: cultural_note
  - marker: f
    text: “Elect” can also be rendered “chosen ones.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Κούμας
  chosen: Cumae
  alternatives:
  - Cuma
  - Cumas
  lexicon: LSJ
  rationale: Standard Anglicized form for the ancient city; retains proper-name specificity
    without paraphrase.
- source_word: πνεῦμα
  chosen: a spirit
  alternatives:
  - the Spirit
  - the spirit
  lexicon: BDAG
  rationale: Anarthrous in Greek and context does not force identification as the
    Holy Spirit; rendering preserves ambiguity.
- source_word: τιθῶ τὰ γόνατα
  chosen: I knelt
  alternatives:
  - I set my knees
  - I kneeled down
  lexicon: LSJ
  rationale: Idiomatic Greek expression for kneeling; English "knelt" conveys the
    act clearly while the footnote preserves the idiom.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Consistent with project policy for κύριος in Christian prayer contexts;
    capitalization reflects reverence.
- source_word: δοξάζειν
  chosen: glorify
  alternatives:
  - praise
  - honor
  lexicon: BDAG
  rationale: Maintains theological weight of giving glory to God's name.
- source_word: ἡγήσατο ἄξιον
  chosen: deemed me worthy
  alternatives:
  - counted me worthy
  - considered me worthy
  lexicon: BDAG
  rationale: Captures evaluative sense without importing Pauline idiom unnecessarily;
    keeps gratitude tone.
- source_word: ἐγνώρισεν
  chosen: made known
  alternatives:
  - revealed
  - disclosed
  lexicon: BDAG
  rationale: Common rendering that keeps God as the subject who grants knowledge.
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - faults
  - transgressions
  lexicon: BDAG
  rationale: Standard moral-theological term; avoids softening to "faults."
- source_word: πρεσβυτέραν
  chosen: the old woman
  alternatives:
  - the elder woman
  - the aged lady
  lexicon: LSJ
  rationale: Describes age without importing ecclesiastical office; preserves visionary
    imagery later explained in Hermas.
- source_word: βιβλαρίδιον
  chosen: little book
  alternatives:
  - booklet
  - small scroll
  lexicon: LSJ
  rationale: Diminutive of βιβλίον; "little book" conveys size and concreteness without
    anachronism.
- source_word: ἀναγγεῖλαι
  chosen: announce
  alternatives:
  - proclaim
  - report
  lexicon: BDAG
  rationale: Neutral verb of making known to others; avoids over-preaching connotation
    while keeping publicness.
- source_word: ἐκλεκτοῖς
  chosen: elect
  alternatives:
  - chosen ones
  - chosen
  lexicon: BDAG
  rationale: Retains traditional theological register and second-century ecclesial
    texture; footnote offers alternative.
- source_word: Κυρία
  chosen: Lady
  alternatives:
  - Madam
  - Mistress
  lexicon: LSJ
  rationale: Respectful address to a woman of status; "Lady" preserves dignity and
    matches Hermas’s usage without connoting servitude.
- source_word: μεταγράψωμαι/μετεγραψάμην
  chosen: copy down / copied
  alternatives:
  - transcribe
  - rewrite
  lexicon: LSJ
  rationale: Reflects the act of making a written copy for oneself (middle voice nuance).
- source_word: πρὸς γράμμα
  chosen: letter for letter
  alternatives:
  - character by character
  - letter by letter
  lexicon: LSJ
  rationale: Idiomatic phrase indicating exact, sequential copying at the level of
    letters.
- source_word: συλλαβάς
  chosen: syllables
  alternatives:
  - word divisions
  - syllabic units
  lexicon: LSJ
  rationale: Literal meaning retained; explanatory footnote clarifies ancient practice
    of scriptio continua.
- source_word: ἡρπάγη
  chosen: was snatched
  alternatives:
  - was seized
  - was taken away suddenly
  lexicon: BDAG
  rationale: Conveys suddenness and force inherent in the verb ἁρπάζω.
