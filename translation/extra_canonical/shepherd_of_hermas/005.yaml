id: HERM.V.2.i
reference: Shepherd of Hermas — Vision 2, section i
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Πορευομένου μου εἰς Κούμας κατὰ τὸν καιρὸν ὃν καὶ πέρυσι, περιπατῶν ἀνεμνήσθην
    τῆς περυσινῆς ὁράσεως, καὶ πάλιν με αἴρει πνεῦμα καὶ ἀποφέρει εἰς τὸν αὐτὸν τόπον
    ὅπου καὶ πέρυσι. 2. ἐλθὼν οὖν εἰς τὸν τόπον τιθῶ τὰ γόνατα καὶ ἠρξάμην προσεύχεσθαι
    τῷ Κυρίῳ καὶ δοξάζειν αὐτοῦ τὸ ὄνομα, ὅτι με ἄξιον ἡγήσατο καὶ ἐγνώρισέν μοι τὰς
    ἁμαρτίας μου τὰς πρότερον. 3. μετὰ δὲ τὸ ἐγερθῆναί με ἀπὸ τῆς προσευχῆς βλέπω
    ἀπέναντί μου τὴν πρεσβυτέραν ἣν καὶ πέρυσιν ἑώρακειν, περιπατοῦσαν καὶ ἀναγινώσκουσαν
    βιβλαρίδιον. καὶ λέγει μοι· Δύνῃ ταῦτα τοῖς ἐκλεκτοῖς τοῦ Θεοῦ ἀναγγεῖλαι; λέγω
    αὐτῇ· Κυρία, τοσαῦτα μνημονεῦσαι οὐ δύναμαι· δὸς δέ μοι τὸ βιβλίδιον ἵνα μεταγράψωμαι
    αὐτό. Λάβε, φησίν, καὶ ἀποδώσεις μοι. 4. ἔλαβον ἐγώ, καὶ εἰς τινα τόπον τοῦ ἀγροῦ
    ἀναχωρήσας μετεγραψάμην πάντα πρὸς γράμμα· οὐχ ηὕρισκον γὰρ τὰς συλλαβάς. τελέσαντος
    οὖν μου τὰ γράμματα τοῦ βιβλίου ἐξαίφνης ἡρπάγη μου ἐκ τῆς χειρὸς τὸ βιβλίδιον·
    ὑπὸ τίνος δὲ οὐκ εἶδον.
