theological_decisions:
- issue: Identification of πνεῦμα (a spirit vs. the Holy Spirit)
  chosen_reading: Render as “a spirit,” leaving the agent unspecified.
  alternative_readings:
  - the Spirit (i.e., the Holy Spirit)
  rationale: The Greek lacks the article and Hermas often narrates visionary transport
    by an unnamed spirit; leaving it indefinite preserves the text’s ambiguity and
    avoids over-interpretation.
- issue: Translation of ἐκλεκτοῖς (ecclesial identity)
  chosen_reading: Render as “the elect,” not “the chosen ones.”
  alternative_readings:
  - the chosen ones
  rationale: “Elect” preserves the second-century ecclesial register and theological
    weight; “chosen ones” is acceptable but less concise and traditional.
- issue: Addressing the figure as Κυρία
  chosen_reading: Translate Κυρία as “Lady.”
  alternative_readings:
  - Madam
  - Mistress
  rationale: “Lady” conveys respect without servile connotations and aligns with Hermas’s
    symbolic portrayal of a dignified elder woman associated later with the Church.
- issue: Rendering ἡγήσατο ἄξιον
  chosen_reading: Translate as “had deemed me worthy.”
  alternative_readings:
  - had counted me worthy
  - had considered me worthy
  rationale: Maintains the evaluative nuance while avoiding a formula that might suggest
    a Pauline doctrinal echo; keeps focus on God’s gracious action in making known
    past sins.
