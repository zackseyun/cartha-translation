translation:
  text: 'But it is not for this that God is angry with you, but so that you may turn
    back your household[a], which has sinned against the Lord and against us, their
    parents. Yet, being fond of your children, you did not admonish your household,
    but you let it be grievously ruined; for this the Lord is angry with you. But
    he will heal all the past evils in your household; for because of their sins and
    lawless deeds you yourself were ruined by worldly affairs.


    But the Lord’s abundant compassion has had mercy on you and your household, and
    he will strengthen you and establish you in his glory. Only do not be slothful,
    but take heart and strengthen your household. For, as the blacksmith hammering
    his work masters the thing he intends, so also the righteous word spoken daily[e]
    prevails over every wickedness. Do not, therefore, cease admonishing your children;
    for I know that if they repent[f] with their whole heart, they will be written
    in the books of life[b] with the holy ones[g].


    After she had stopped these words, she says to me, “Do you wish to hear me reading?”
    And I say, “I do, Lady.” She says to me, “Become a hearer, and hear the glories
    of God.” I heard great and wondrous things which I was not able to remember; for
    all the words were terrifying—things a human being is not able to bear. So I remembered
    the last words, for they were beneficial and gentle for us:


    “Behold, the God of hosts[c], who by his invisible and mighty power and by his
    great understanding created the world, and by his glorious counsel adorned his
    creation with beauty, and by his mighty word fixed the heaven and founded the
    earth upon the waters[d], and by his own wisdom and providence created his holy
    church, which also he blessed—behold, he is moving the heavens and the mountains
    and the hills and the seas, and all things become level for his elect, in order
    that he may give to them the promise which he promised with much glory and joy,
    if they keep the statutes of God which they received with great faith.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: h
    text: The Greek text reads ἡμᾶς (us), a common itacism for ὑμᾶς (you). The context
      clearly refers to Hermas and his wife.
    reason: textual_variant
  - marker: a
    text: Or 'After she had finished these words,'.
    reason: previous_rendering
lexical_decisions:
- source_word: οἶκος
  chosen: household
  alternatives:
  - house
  - family
  lexicon: BDAG; LSJ
  rationale: In Hermas, oikos frequently denotes the family unit under a head. “Household”
    makes the social scope explicit while preserving the metaphorical range.
- source_word: ἐπιστρέψῃς
  chosen: turn back
  alternatives:
  - bring back
  - restore
  - convert
  lexicon: BDAG
  rationale: ἐπιστρέφω commonly means to turn/return; here moral restoration of the
    household is in view without importing later technical sense of “convert.”
- source_word: φιλότεκνος
  chosen: fond of your children
  alternatives:
  - indulgent toward your children
  - loving one’s children
  lexicon: LSJ
  rationale: Literal sense is “loving children.” Given the context of failure to admonish,
    “fond” carries the nuance without over-reading as “indulgent.”
- source_word: νουθετέω
  chosen: admonish
  alternatives:
  - warn
  - instruct
  lexicon: BDAG
  rationale: Early Christian paraenetic term; “admonish” preserves moral exhortation
    rather than neutral “instruct.”
- source_word: καταφθαρῆναι (καταφθείρω)
  chosen: be grievously ruined
  alternatives:
  - be corrupted
  - be destroyed
  - be badly spoiled
  lexicon: LSJ
  rationale: The verb denotes ruin/corruption. “Grievously” renders δεινῶς and maintains
    the severity of the charge.
- source_word: βιωτικῶν πράξεων
  chosen: worldly affairs
  alternatives:
  - secular business
  - livelihood dealings
  - everyday affairs
  lexicon: BDAG; LSJ
  rationale: βιωτικός concerns livelihood; πράξεις are dealings/activities. “Worldly
    affairs” succinctly conveys the sphere affected.
- source_word: ἡ πολυσπλαγχνία
  chosen: abundant compassion
  alternatives:
  - great mercy
  - tender mercy
  lexicon: BDAG
  rationale: Compound intensifies compassion; “abundant” captures the poly- prefix
    while “compassion” fits splanchnic idiom.
- source_word: ἰσχυροποιήσει / ἰσχυροποίει
  chosen: strengthen
  alternatives:
  - make strong
  - fortify
  lexicon: LSJ
  rationale: Idiomatic English for causative of strength; repeated as both promise
    and imperative.
- source_word: θεμελιώσει
  chosen: set you on a foundation
  alternatives:
  - establish
  - found
  lexicon: BDAG; LSJ
  rationale: The verb evokes foundational stability; “set you on a foundation” preserves
    the image.
- source_word: ῥαθυμήσῃς
  chosen: be slothful
  alternatives:
  - grow slack
  - be negligent
  - be idle
  lexicon: LSJ
  rationale: Moral exhortation against laxity; “slothful” carries traditional paraenetic
    tone.
- source_word: εὐψύχει
  chosen: take heart
  alternatives:
  - be of good courage
  - be brave
  lexicon: LSJ
  rationale: Imperative urging courage; “take heart” is concise and natural in English.
- source_word: χαλκεύς
  chosen: blacksmith
  alternatives:
  - coppersmith
  - metalworker
  lexicon: LSJ
  rationale: Generic artisan working metal; “blacksmith” communicates the hammering/forging
    image.
- source_word: σφυροκοπῶν
  chosen: hammering
  alternatives:
  - forging
  - beating with a hammer
  lexicon: LSJ
  rationale: Maintains concrete imagery of repetitive blows shaping metal.
- source_word: περιγίνεται
  chosen: prevails over
  alternatives:
  - gets the better of
  - overcomes
  - masters
  lexicon: BDAG; LSJ
  rationale: Context of victory over wickedness; “prevails over” fits well with moral
    struggle.
- source_word: ὁ λόγος ὁ καθημερινὸς ὁ δίκαιος
  chosen: the righteous word day by day
  alternatives:
  - the daily righteous word
  - the just word spoken daily
  - constant righteous speech
  lexicon: BDAG
  rationale: Keeps logos as “word/speech” and preserves the temporal force of καθημερινός
    without over-interpretation.
- source_word: μετανοήσωσιν
  chosen: repent
  alternatives:
  - change their mind
  - turn back
  lexicon: BDAG
  rationale: Specific sins are in view; per project policy, we use “repent” in specific-sin
    contexts.
- source_word: ἐγγραφήσονται εἰς τὰς βίβλους τῆς ζωῆς
  chosen: will be written in the books of life
  alternatives:
  - will be enrolled in the book of life
  lexicon: BDAG
  rationale: Retains the plural “books,” resisting harmonization to later singular
    phrasing.
- source_word: ἅγιοι
  chosen: holy ones
  alternatives:
  - saints
  lexicon: BDAG
  rationale: Literal, avoids ecclesiastical register while keeping the sanctity concept.
- source_word: κυρία
  chosen: Lady
  alternatives:
  - Mistress
  - Madam
  lexicon: LSJ
  rationale: Conventional English title for the allegorical female figure; preserves
    the narrative’s register.
- source_word: δόξας (τοῦ Θεοῦ)
  chosen: glories (of God)
  alternatives:
  - splendors
  - majestic deeds
  lexicon: BDAG; LSJ
  rationale: Plural of δόξα; “glories” maintains theological resonance.
- source_word: ἔκφρικτα
  chosen: terrifying
  alternatives:
  - dreadful
  - awe-inspiring
  lexicon: LSJ
  rationale: Term denotes causing shuddering; “terrifying” conveys intensity without
    implying moral evil.
- source_word: σύμφορα
  chosen: beneficial
  alternatives:
  - profitable
  - advantageous
  - fitting
  lexicon: LSJ
  rationale: Here of words that help; “beneficial” reads clearly.
- source_word: ἥμερα
  chosen: gentle
  alternatives:
  - mild
  - tame
  lexicon: LSJ
  rationale: Contrasts with terrifying; “gentle” fits register for words.
- source_word: Θεὸς τῶν δυνάμεων
  chosen: God of the hosts
  alternatives:
  - God of the powers
  - God of armies
  lexicon: BDAG; LSJ
  rationale: LXX-style epithet; “hosts” reflects the heavenly armies nuance of δυνάμεις
    without importing the tetragrammaton title.
- source_word: ἀοράτῳ ... δυνάμει καὶ κραταιᾷ
  chosen: by his invisible and mighty power
  alternatives:
  - by invisible might and strength
  lexicon: BDAG; LSJ
  rationale: Datives of means; phrased to read smoothly while preserving both elements.
- source_word: σύνεσις
  chosen: understanding
  alternatives:
  - intelligence
  - insight
  lexicon: BDAG
  rationale: Common rendering maintaining cognitive nuance.
- source_word: βουλή (ἐνδόξῳ)
  chosen: glorious counsel
  alternatives:
  - glorious purpose
  - glorious plan
  lexicon: BDAG; LSJ
  rationale: βουλή is deliberative counsel; “counsel” maintains volitional nuance
    with “glorious.”
- source_word: περιθεὶς τὴν εὐπρέπεια
  chosen: adorned with beauty
  alternatives:
  - arrayed with comeliness
  - clothed with comeliness
  lexicon: LSJ
  rationale: περιτίθημι with εὐπρέπεια carries adornment imagery; “adorned with beauty”
    is natural English.
- source_word: ῥῆμα (ἰσχυρῷ)
  chosen: mighty word
  alternatives:
  - powerful utterance
  lexicon: BDAG
  rationale: ῥῆμα as spoken word; “mighty word” keeps the formal parallelism.
- source_word: πήξας
  chosen: fixed
  alternatives:
  - made fast
  - set firm
  lexicon: LSJ
  rationale: Standard rendering of πήγνυμι in cosmological contexts.
- source_word: θεμελιώσας ... ἐπ’ ὑδάτων
  chosen: founded ... upon the waters
  alternatives:
  - set the earth on its foundation upon the waters
  lexicon: BDAG; LSJ
  rationale: Echoes LXX cosmology; “founded upon the waters” preserves the imagery.
- source_word: πρόνοια
  chosen: providence
  alternatives:
  - forethought
  - care
  lexicon: LSJ
  rationale: “Providence” is established theological term for divine forethought and
    care.
- source_word: ἁγία ἐκκλησία
  chosen: holy church
  alternatives:
  - holy assembly
  lexicon: BDAG
  rationale: Second-century ecclesial sense is clear; “church” is appropriate.
- source_word: μεθίστησιν
  chosen: is moving
  alternatives:
  - shifts
  - removes
  - transposes
  lexicon: LSJ
  rationale: Present tense with vivid force; “is moving” captures dynamic action.
- source_word: ὁμαλά γίνεται
  chosen: become level
  alternatives:
  - become smooth
  - become plain
  lexicon: LSJ
  rationale: ὁμαλός denotes smooth/level; in context of terrain metaphor, “level”
    is apt.
- source_word: ἐκλεκτοί
  chosen: elect
  alternatives:
  - chosen ones
  lexicon: BDAG
  rationale: Standard theological term; keeps biblical resonance.
- source_word: ἐπαγγελία / ἐπηγγείλατο
  chosen: promise / promised
  alternatives:
  - pledge / pledged
  lexicon: BDAG
  rationale: Conventional rendering; maintains promissory theme.
- source_word: νόμιμα
  chosen: statutes
  alternatives:
  - ordinances
  - decrees
  lexicon: LSJ
  rationale: LXX legal term; “statutes” preserves juridical flavor.
- source_word: παρέλαβον
  chosen: received
  alternatives:
  - accepted
  lexicon: BDAG
  rationale: Conveys reception of transmitted norms in faith.
- source_word: πίστις (μεγάλῃ)
  chosen: faith (great)
  alternatives:
  - trust
  - belief
  lexicon: BDAG
  rationale: Project default is “faith”; “great” renders the adjective explicitly.
