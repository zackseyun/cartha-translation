id: HERM.V.1.iii
reference: Shepherd of Hermas — Vision 1, section iii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ἀλλʼ οὐχ ἕνεκα τούτου ὀργίζεται σοι ὁ Θεός, ἀλλʼ ἵνα τὸν οἶκόν σου τὸν ἁμαρτήσαντα
    εἰς τὸν Κύριον καὶ εἰς ἡμᾶς τοὺς γονεῖς αὐτῶν ἐπιστρέψῃς. ἀλλὰ φιλότεκνος ὢν οὐκ
    ἐνουθέτεις σου τὸν οἶκον, ἀλλὰ ἀφῆκας αὐτὸν καταφθαρῆναι δεινῶς· διὰ τοῦτό σοι
    ὀργίζεται ὁ Κύριος· ἀλλὰ ἰάσεταί σου πάντα τὰ προγεγονότα πονηρὰ ἐν τῷ οἴκῳ σου·
    διὰ γὰρ τὰς ἐκείνων ἁμαρτίας καὶ ἀνομήματα σὺ κατεφθάρης ἀπὸ τῶν βιωτικῶν πράξεων.
    2. ἀλλʼ ἡ πολυσπλαγχνία τοῦ Κυρίου ἠλέησέν σε καὶ τὸν οἶκόν σου καὶ ἰσχυροποιήσει
    σε καὶ θεμελιώσει σε ἐν τῇ δόξῃ αὐτοῦ. σὺ μόνον μὴ ῥαθυμήσῃς, ἀλλὰ εὐψύχει καὶ
    ἰσχυροποίει σου τὸν οἶκον. ὡς γὰρ ὁ χαλκεὺς σφυροκοπῶν τὸ ἔργον αὐτοῦ περιγίνεται
    τοῦ πράγματος οὗ θέλει, οὕτω καὶ ὁ λόγος ὁ καθημερινὸς ὁ δίκαιος περιγίνεται πάσης
    πονηρίας. μὴ διαλίπῃς οὖν νουθετῶν σου τὰ τέκνα· οἶδα γὰρ ὅτι ἐὰν μετανοήσωσιν
    ἐξ ὅλης καρδίας αὐτῶν, ἐγγραφήσονται εἰς τὰς βίβλους τῆς ζωῆς μετὰ τῶν ἁγίων.
    3. μετὰ τὸ παῦσαι αὐτῆς τὰ ῥήματα ταῦτα λέγει μοι· Θέλεις ἀκοῦσαί μου ἀναγινωσκούσης;
    λέγω κἀγώ· Θέλω, κυρία. λέγει μοι· Γενοῦ ἀκροατὴς καὶ ἄκουε τὰς δόξας τοῦ Θεοῦ.
    ἤκουσα μεγάλως καὶ θαυμαστῶς ἃ οὐκ ἴσχυσα μνημονεῦσαι· πάντα γὰρ τὰ ῥήματα ἔκφρικτα,
    ἃ οὐ δύναται ἄνθρωπος βαστάσαι. τὰ οὖν ἔσχατα ῥήματα ἐμνημόνευσα· ἦν γὰρ ἡμῖν
    σύμφορα καὶ ἥμερα· 4. Ἰδοὺ ὁ Θεὸς τῶν δυνάμεων, ὁ ἀοράτῳ δυνάμει καὶ κραταιᾷ καὶ
    τῇ μεγάλῃ συνέσει αὐτοῦ κτίσας τὸν κόσμον καὶ τῇ ἐνδόξῳ βουλῇ περιθεὶς τὴν εὐπρέπειαν
    τῇ κτίσει αὐτοῦ, καὶ τῷ ἰσχυρῷ ῥήματι πήξας τὸν οὐρανὸν καὶ θεμελιώσας τὴν γῆν
    ἐπʼ ὑδάτων, καὶ τῇ ἰδίᾳ σοφίᾳ καὶ προνοίᾳ κτίσας τὴν ἁγίαν ἐκκλησίαν αὐτοῦ, ἣν
    καὶ ηὐλόγησεν, ἰδοὺ μεθίστησιν τοὺς οὐρανοὺς καὶ τὰ ὄρη καὶ τοὺς βουνοὺς καὶ τὰς
    θαλάσσας, καὶ πάντα ὁμαλὰ γίνεται τοῖς ἐκλεκτοῖς αὐτοῦ, ἵνα ἀποδῷ αὐτοῖς τὴν ἐπαγγελίαν
    ἣν ἐπηγγείλατο μετὰ πολλῆς δόξης καὶ χαρᾶς, ἐὰν τηρήσωσιν τὰ νόμιμα τοῦ Θεοῦ ἃ
    παρέλαβον ἐν μεγάλῃ πίστει.
