theological_decisions:
- issue: Rendering of μετανοέω in moral context
  chosen_reading: repent
  alternative_readings:
  - change their mind
  - turn back
  rationale: The subject is specific sins and lawless deeds of the household; per
    project policy, repentance in concrete sin-contexts is translated as “repent.”
  doctrine_reference: 'DOCTRINE.md: Contested terms — μετανοέω'
- issue: Epithet Θεὸς τῶν δυνάμεων
  chosen_reading: God of the hosts
  alternative_readings:
  - God of the powers
  - God of armies
  rationale: δυνάμεις in LXX idiom denotes heavenly armies/hosts. “Hosts” captures
    the traditional biblical sense without imposing the Tetragrammaton title.
- issue: Translation of ἐκκλησία
  chosen_reading: church
  alternative_readings:
  - assembly
  rationale: Second-century context clearly intends the Christian community; “church”
    preserves ecclesial identity and continuity.
- issue: Plural “books of life”
  chosen_reading: 'retain plural: “books of life”'
  alternative_readings:
  - harmonize to singular “book of life”
  rationale: The Greek text reads the plural βίβλους; we preserve it rather than conform
    to later or familiar singular phrasing.
  doctrine_reference: Transparency policy — preserve source even against tradition
- issue: Rendering of νόμιμα
  chosen_reading: statutes
  alternative_readings:
  - commandments
  - ordinances
  - decrees
  rationale: Legal connotation is foregrounded; “statutes” aligns with LXX usage and
    maintains the juridical tone.
- issue: Translation of ἅγιοι
  chosen_reading: holy ones
  alternative_readings:
  - saints
  rationale: “Holy ones” is more literal and avoids ecclesiastical jargon while preserving
    the sanctity concept.
  doctrine_reference: 'DOCTRINE.md: Readable modern English without unnecessary ecclesiastical
    jargon'
