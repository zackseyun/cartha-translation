translation:
  text: 'And he says to me, “Do you see this shepherd?” “I do,” I say, “sir.”


    “Those sheep you saw not skipping but grazing in one place—these are the ones
    who have handed themselves over to luxuries and deceptions, yet they have not
    blasphemed the Lord at all. These, then, have been corrupted from the truth; in
    them there is hope of repentance, by which they can live. Corruption, then, has
    hope of a certain renewal, but death has eternal destruction.”


    5. Again we went on a little, and he shows me a great shepherd, savage in appearance,
    wearing a white goatskin, and he had a bag on his shoulders, and a very hard staff
    with knots, and a great whip. He had a very harsh look, so that I was afraid of
    him—such was his look.


    6. This shepherd, then, took over the sheep from the shepherd who was a young
    man—those that were living wastefully and self-indulgently, but not skipping—and
    he cast them into a certain steep, thorny place full of thistles, so that, because
    of the thorns and thistles, the sheep were unable to disentangle themselves, but
    [were entangled in the thorns and thistles; these, then,] being entangled, grazed
    among the thorns and thistles. They suffered greatly, being torn by him; he drove
    them here and there and gave them no rest, and those sheep were not at all steady.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rendered “sir” to reflect respectful address to the visionary guide, not
      the divine title “Lord.”
    reason: cultural_note
  - marker: b
    text: “Luxuries and deceptions” renders τρυφαί καὶ ἀπάται; τρυφή denotes self-indulgent
      luxury.
    reason: lexical_alternative
  - marker: c
    text: “They have not blasphemed the Lord” (εἰς τὸν Κύριον οὐδὲν ἐβλασφήμησαν)
      underscores that, despite indulgence, they have not spoken against the Lord.
    reason: cultural_note
  - marker: d
    text: “Repentance” translates μετάνοια; literally “change of mind,” with moral-turn
      implications in early Christian usage.
    reason: lexical_alternative
  - marker: e
    text: “Renewal” (ἀνανεώσις) with “some” reflects the indefinite nuance of τινος
      (“of a certain [kind]”).
    reason: lexical_alternative
  - marker: f
    text: “Eternal destruction” (ἀπώλειαν αἰώνιον) could be rendered “everlasting
      ruin.”
    reason: lexical_alternative
  - marker: g
    text: A white goatskin (δέρμα αἴγειον λευκόν) marks the shepherd’s rough, ascetic
      attire.
    reason: cultural_note
  - marker: h
    text: “Bag” translates πήρα, a simple shoulder-pouch often used by shepherds.
    reason: cultural_note
  - marker: i
    text: The staff is described as “very hard and with knots” (ῥάβδον σκληρὰν λίαν
      καὶ ὄζους ἔχουσαν), indicating severity.
    reason: cultural_note
  - marker: j
    text: Μάστιξ can mean “whip” or “scourge.” “Whip” fits the shepherding imagery.
    reason: lexical_alternative
  - marker: k
    text: Περίπικρον (“very bitter”) conveys a grim, harsh expression; “grim gaze”
      is an alternative.
    reason: lexical_alternative
  - marker: l
    text: 'σπαταλῶντα καὶ τρυφῶντα: the pair echoes the language of profligate, self-indulgent
      living (cf. Jas 5:5).'
    reason: cross_reference
  - marker: m
    text: Τρίβολοι are thorny plants (thistles/briers); in some contexts “caltrops.”
      Here “thistles” reads naturally.
    reason: lexical_alternative
  - marker: o
    text: 'Textual note: Some witnesses include an explicit clause, “but to be entangled
      in the thorns and thistles; and so these, entangled, fed among the thorns and
      thistles.”'
    reason: textual_variant
  - marker: p
    text: δαιρόμενα (from δέρω) indicates being beaten/whipped.
    reason: lexical_alternative
  - marker: q
    text: “Did not thrive” renders οὐκ εὐσταθοῦσαν, i.e., they were not in sound condition
      at all.
    reason: lexical_alternative
  - marker: n
    text: Or 'would take over the sheep from the shepherd who was a young man—those
      that were living profligately and living in self-indulgence, and not skipping—and
      he would cast them'.
    reason: previous_rendering
lexical_decisions:
- source_word: κύριε
  chosen: sir
  alternatives:
  - Lord
  - master
  lexicon: LSJ; BDAG
  rationale: In Hermas this polite address is used for the visionary guide; rendering
    as “sir” avoids conflation with the divine title “Lord.”
- source_word: σκιρτάω
  chosen: skip
  alternatives:
  - frisk
  - leap
  lexicon: LSJ
  rationale: Depicts lively movement of sheep; earlier context contrasts skipping
    with staying put. “Skip” keeps pastoral imagery clear.
- source_word: βόσκομαι
  chosen: graze
  alternatives:
  - feed
  - pasture
  lexicon: LSJ
  rationale: Standard term for animals feeding; “graze” is natural English for sheep.
- source_word: παραδίδωμι (middle/reflexive)
  chosen: have handed themselves over
  alternatives:
  - have delivered themselves over
  - give themselves up
  lexicon: LSJ; BDAG
  rationale: Captures self-initiated surrender to a power (pleasures, deceptions).
- source_word: τρυφή / τρυφάω
  chosen: luxury / living in self-indulgence
  alternatives:
  - pleasure / luxuriating
  - wantonness / living in luxury
  lexicon: LSJ; BDAG
  rationale: Semantic range includes luxurious self-indulgence; pairing noun and verb
    to keep consistency while reading naturally in English.
- source_word: ἀπάτη
  chosen: deceptions
  alternatives:
  - delusions
  - seductions
  lexicon: LSJ; BDAG
  rationale: “Deceptions” fits the moral-paraenetic context without sexual connotation
    implied by “seductions.”
- source_word: βλασφημέω
  chosen: blaspheme
  alternatives:
  - slander
  - revile
  lexicon: LSJ; BDAG
  rationale: Religious speech against the Lord is in view; “blaspheme” is transparent
    and traditional.
- source_word: καταφθείρω / καταφθορά
  chosen: have been corrupted / corruption
  alternatives:
  - have been ruined / ruin
  - have been spoiled / decay
  lexicon: LSJ
  rationale: Maintains the conceptual contrast with “death” in the next clause; “corruption”
    allows the subsequent ‘renewal’ nuance.
- source_word: ἀλήθεια
  chosen: truth
  alternatives:
  - reality
  lexicon: LSJ; BDAG
  rationale: Common moral-theological sense in early Christian texts; “truth” is standard.
- source_word: ἐλπίς
  chosen: hope
  alternatives:
  - expectation
  lexicon: LSJ; BDAG
  rationale: Standard rendering; no need to soften or expand.
- source_word: μετάνοια
  chosen: repentance
  alternatives:
  - change of mind
  lexicon: BDAG; LSJ
  rationale: Here the moral turn from self-indulgence is in view; “repentance” fits
    the paraenetic setting while a footnote can acknowledge ‘change of mind’ nuance
    if needed.
- source_word: ἀνανεώσις
  chosen: renewal
  alternatives:
  - renewing
  - making new again
  lexicon: LSJ
  rationale: Lexical sense of restoration; “some renewal” preserves the force of τις
    (τινος).
- source_word: θάνατος
  chosen: death
  lexicon: LSJ; BDAG
  rationale: Plain, contrasts with “corruption.”
- source_word: ἀπώλεια αἰώνιος
  chosen: eternal destruction
  alternatives:
  - everlasting ruin
  - eternal loss
  lexicon: LSJ; BDAG
  rationale: Idiomatic pairing; preserves severity without importing later doctrinal
    phrasing.
- source_word: προβαίνω
  chosen: go on / proceed
  alternatives:
  - advance
  lexicon: LSJ
  rationale: Narrative movement marker; “we went on a little” is idiomatic.
- source_word: ἰδέα
  chosen: appearance
  alternatives:
  - look
  - aspect
  lexicon: LSJ
  rationale: External look; paired with “savage in appearance.”
- source_word: δέρμα αἴγειον λευκόν
  chosen: white goatskin
  alternatives:
  - white goat’s hide
  lexicon: LSJ
  rationale: Concrete pastoral attire; “goatskin” is natural English.
- source_word: πήρα
  chosen: bag
  alternatives:
  - pouch
  - knapsack
  lexicon: LSJ
  rationale: Common term for a simple shoulder-bag; footnote clarifies “shepherd’s
    bag.”
- source_word: ῥάβδος (σκληρά, ὄζους ἔχουσα)
  chosen: staff … very hard and with knots
  alternatives:
  - rod … very hard and knotted
  - club … hard and knobby
  lexicon: LSJ
  rationale: Shepherd’s implement; “staff” preserves pastoral frame, with descriptive
    hardness and knots.
- source_word: μάστιξ
  chosen: whip
  alternatives:
  - scourge
  - lash
  lexicon: LSJ; BDAG
  rationale: Plain rendering; “scourge” could suggest penal context, while “whip”
    fits shepherd imagery.
- source_word: βλέμμα περίπικρον
  chosen: very bitter look
  alternatives:
  - grim gaze
  - severe look
  lexicon: LSJ
  rationale: Peripikros indicates an intensely harsh/acerbic expression; “very bitter
    look” keeps vivid strangeness; alternatives noted.
- source_word: νεανίσκος
  chosen: young man
  alternatives:
  - youth
  lexicon: LSJ; BDAG
  rationale: Straightforward age term for the earlier shepherd.
- source_word: σπαταλάω
  chosen: squandering themselves
  alternatives:
  - living in profligacy
  - living in wanton luxury
  lexicon: LSJ; BDAG
  rationale: Captures dissipating, wasteful self-indulgence; reflexive adds vividness
    though not required in English.
- source_word: κρημνώδης
  chosen: steep / precipitous
  alternatives:
  - craggy
  lexicon: LSJ
  rationale: Describes the dangerous terrain into which the sheep are driven.
- source_word: ἀκανθώδης
  chosen: thorny
  alternatives:
  - full of thorns
  lexicon: LSJ
  rationale: Natural English for terrain covered with thorns.
- source_word: τριβολώδης / τρίβολοι
  chosen: full of thistles
  alternatives:
  - full of briers
  - caltrops
  lexicon: LSJ
  rationale: Tríbolos can denote thistles/briers; “thistles” reads smoothly; footnote
    notes briers/caltrops nuance.
- source_word: ἐκπλέκω / ἐμπλέκω
  chosen: disentangle / be entangled
  alternatives:
  - untangle / be ensnared
  lexicon: LSJ; BDAG
  rationale: Maintains the wordplay and contrasts of entanglement imagery.
- source_word: ἐβόσκοντο
  chosen: grazed
  alternatives:
  - fed
  lexicon: LSJ
  rationale: Same pastoral term as earlier; consistency kept.
- source_word: ταλαιπωρέω (λίαν)
  chosen: suffered greatly
  alternatives:
  - were in great misery
  - were greatly distressed
  lexicon: LSJ
  rationale: Conveys intensive hardship.
- source_word: δέρω (part. δαιρόμενα)
  chosen: being scourged/whipped
  alternatives:
  - being beaten
  - being flayed
  lexicon: LSJ; BDAG
  rationale: In context of a whip; “whipped” is the clearest English.
- source_word: περιηλαύνω
  chosen: drove … here and there
  alternatives:
  - drove around
  - drove to and fro
  lexicon: LSJ
  rationale: Verb of driving animals about; “here and there” captures the distributive
    sense.
- source_word: ἀνάπαυσις
  chosen: rest
  alternatives:
  - relief
  lexicon: LSJ; BDAG
  rationale: Common term for rest from labor; fits shepherding scene.
- source_word: εὐσταθέω
  chosen: did not thrive
  alternatives:
  - were not in good condition
  - did not fare well
  lexicon: LSJ
  rationale: Idiomatic English conveying lack of sound condition or stability for
    the sheep.
