id: HERM.S.6.ii
reference: Shepherd of Hermas — Similitude 6, section ii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Καὶ λέγει μοι· Βλέπεις τὸν ποιμένα τοῦτον; Βλέπω, φημί, κύριε. Ο εἶδες πρόβατα
    μὴ σκιρτῶντα, ἀλλ' ἐν ἑνὶ τόπῳ βοσκόμενα, οὗτοί εἰσιν οἱ παραδεδωκότες μὲν ἑαυτοὺς
    ταῖς τρυφαῖς καὶ ἀπάταις, εἰς δὲ τὸν Κύριον οὐδὲν ἐβλασφήμησαν. οὗτοι οὖν κατεφθαρμένοι
    εἰσὶν ἀπὸ τῆς ἀληθείας· ἐν τούτοις ἐλπίς ἐστι μετανοίας, ἐν ᾗ δύνανται ζῆσαι.
    ἡ καταφθορὰ οὖν ἐλπίδα ἔχει ἀνανεώσεώς τινος, ὁ δὲ θάνατος ἀπώλειαν ἔχει αἰώνιον.
    5. πάλιν προέβημεν μικρόν, καὶ δεικνύει μοι ποιμένα μέγαν ὡσεὶ ἄγριον τῇ ἰδέᾳ,
    περικείμενον δέρμα αἴγειον λευκόν, καὶ πήραν τινὰ εἶχεν ἐπὶ τῶν ὤμων, καὶ ῥάβδον
    σκληρὰν λίαν καὶ ὄζους ἔχουσαν, καὶ μάστιγα μεγάλην· καὶ τὸ βλέμμα εἶχε περίπικρον,
    ὥστε φοβηθῆναί με αὐτόν· τοιοῦτον εἶχε τὸ βλέμμα. 6. οὗτος οὖν ὁ ποιμὴν παρελάμβανε
    τὰ πρόβατα ἀπὸ τοῦ ποιμένος τοῦ νεανίσκου, ἐκεῖνα τὰ σπαταλῶντα καὶ τρυφῶντα,
    μὴ σκιρτῶντα δέ, καὶ ἔβαλλεν αὐτὰ εἴς τινα τόπον κρημνώδη καὶ ἀκανθώδη καὶ τριβολώδη,
    ὥστε ἀπὸ τῶν ἀκανθῶν καὶ τριβόλων μὴ δύνασθαι ἐκπλέξαι τὰ πρόβατα, ἀλλ' [ἐμπλέκεσθαι
    ταῖς ἀκάνθαις καὶ τριβόλοις· ταῦτα οὖν] ἐμπεπλεγμένα ἐβόσκοντο ἐν ταῖς ἀκάνθαις
    καὶ τριβόλοις, καὶ λίαν ἐταλαιπώρουν δαιρόμενα ὑπ' αὐτοῦ· καὶ ὧδε κἀκεῖ περιήλαυνεν
    αὐτά, καὶ ἀνάπαυσιν αὐτοῖς οὐκ ἐδίδου, καὶ ὅλως οὐκ εὐσταθοῦσαν τὰ πρόβατα ἐκεῖνα.
  language: Greek
