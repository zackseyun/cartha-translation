theological_decisions:
- issue: Rendering of κύριος in address (“κύριε”)
  chosen_reading: sir (polite address)
  alternative_readings:
  - Lord
  rationale: In Hermas the visionary interpreter is addressed with courtesy; using
    “Lord” could imply a divine title. To avoid doctrinal confusion, “sir” is chosen
    while retaining “the Lord” when the divine is explicitly referenced.
- issue: μετάνοια translation
  chosen_reading: repentance
  alternative_readings:
  - change of mind
  rationale: The context involves moral turning from self-indulgence; “repentance”
    communicates the ethical-religious dimension clearly to modern readers while preserving
    the traditional term. The cognitive nuance ‘change of mind’ is compatible and
    may be footnoted elsewhere.
  doctrine_reference: 'DOCTRINE.md — contested terms: metanoeō → change of mind /
    repent'
- issue: Corruption vs. death contrast (“ἡ καταφθορὰ … ὁ δὲ θάνατος …”)
  chosen_reading: 'Maintain distinction: corruption has hope of some renewal; death
    has eternal destruction'
  alternative_readings:
  - Paraphrase both as varying degrees of sin/death
  rationale: 'Hermas draws a soteriological distinction: those corrupted by pleasures
    yet not blaspheming retain hope via repentance, whereas ‘death’ denotes a final
    state linked to eternal destruction. Preserving the contrast respects the allegory’s
    moral taxonomy without harmonizing to later doctrinal systems.'
- issue: Ἀπώλεια αἰώνιος rendering
  chosen_reading: eternal destruction
  alternative_readings:
  - everlasting ruin
  - eternal loss
  rationale: Avoids importing later terminology (e.g., ‘damnation’) while keeping
    the severity and duration Hermas articulates.
