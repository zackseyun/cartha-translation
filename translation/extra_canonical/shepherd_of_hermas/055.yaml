    phrase as an active clause (''as he scourged them''). ''being beaten by him''
    preserves the passive force and explicit agent.'
  - 'Lexical choice for ''εὐσταθοῦσαν'': The draft translates this as ''did not thrive''.
    ''εὐσταθέω'' means to be tranquil, stable, or at ease, which better fits the immediate
