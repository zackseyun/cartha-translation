theological_decisions:
- issue: Meaning of σφραγῖς (seal) in this context
  chosen_reading: Render literally as “seals,” leaving the symbolic referent (e.g.,
    baptismal sealing, divine ownership, eschatological protection) implicit.
  alternative_readings:
  - Explicitly gloss as baptism
  - Translate as “marks” to de-theologize
  rationale: Hermas often uses “seal” imagery in baptismal contexts, but here the
    narrative distributes seals alongside clothing and crowns. Retaining “seals” preserves
    the polyvalence and allows readers to trace the symbolism across the work.
- issue: Address Κύριε to the shepherd
  chosen_reading: Translate as “Sir,” not “Lord.”
  alternative_readings:
  - Translate as “Lord” uniformly for κύριος
  rationale: In vocative polite address to a non-divine interlocutor, “Sir” matches
    idiomatic Greek usage and avoids conferring divine title on the shepherd-angel.
  doctrine_reference: 'Translation philosophy: contested terms—κύριος default is “Lord,”
    with context-driven variance documented.'
- issue: “The one who created this tree desires all … to live” (v. 9)
  chosen_reading: Translate straightforwardly, preserving the universal desire without
    importing systematic conclusions.
  alternative_readings:
  - Qualify as “desires that as many as possible … live”
  - Paraphrase as “wills to give life to all who took branches”
  rationale: The line expresses the benevolent will of the creator within the allegory
    (the willow and its branches/rods). Preserving the breadth keeps Hermas’s exhortational
    tone toward repentance and life without resolving broader soteriological debates.
  doctrine_reference: 'Doctrine philosophy: preserve theological tension rather than
    resolve it.'
- issue: “Test upon the altar” (ἐπὶ τὸ θυσιαστήριον)
  chosen_reading: Keep “altar,” maintaining cultic-testing imagery.
  alternative_readings:
  - Generalize to “test thoroughly”
  - Interpret as metaphor for judgment
  rationale: The altar is part of Hermas’s symbolic temple/church imagery. Retaining
    it keeps the cultic register and gravity of examination.
- issue: “Angel of the Lord” capitalization and identification
  chosen_reading: Lowercase “angel of the Lord” as an angelic envoy, not a theophany;
    retain genitive construction.
  alternative_readings:
  - Capitalize as a title (“Angel of the Lord”)
  - Render “angel from the Lord” to avoid genitive-of-possessor nuance
  rationale: Hermas regularly features designated angels (e.g., the shepherd) as emissaries.
    Lowercase keeps narrative role clear without theological overstatement.
