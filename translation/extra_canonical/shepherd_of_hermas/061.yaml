source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ἐκέλευσε δὲ ὁ ἄγγελος κυρίου στεφάνους ἐνεχθῆναι. καὶ ἐνέχθησαν στέφανοι ὡσεὶ
    ἐκ φοινίκων γεγονότες, καὶ ἐστεφάνωσε τοὺς ἄνδρας τοὺς ἐπιδεδωκότας τὰς ῥάβδους
    τὰς ἐχούσας τὰς παραφυάδας καὶ καρπόν τινα καὶ ἀπέλυσεν αὐτοὺς εἰς τὸν πύργον.
    2. καὶ τοὺς ἄλλους δὲ ἀπέστειλεν εἰς τὸν πύργον, τοὺς τὰς ῥάβδους τὰς χλωρὰς ἐπιδεδωκότας
    καὶ παραφυάδας ἐχούσας, καρπὸν δὲ μὴ ἐχούσας τὰς παραφυάδας, δοὺς αὐτοῖς σφραγῖδας.
    3. ἱματισμὸν δὲ τὸν αὐτὸν πάντες εἶχον λευκὸν ὡσεὶ χιόνα, οἱ πορευόμενοι εἰς τὸν
    πύργον. 4. καὶ τοὺς τὰς ῥάβδους ἐπιδεδωκότας χλωρὰς ὡς ἔλαβον ἀπέλυσε, δοὺς αὐτοῖς
    ἱματισμὸν καὶ σφραγῖδας. 5. μετὰ τὸ ταῦτα τελέσαι τὸν ἄγγελον λέγει τῷ ποιμένι·
    Ἐγὼ ὑπάγω· σὺ δὲ τούτους ἀπολύσεις εἰς τὰ τείχη, καθὼς ἄξιός ἐστί τις κατοικεῖν.
    κατανόησον δὲ τὰς ῥάβδους αὐτῶν ἐπιμελῶς καὶ οὕτως ἀπόλυσον· ἐπιμελῶς δὲ κατανόησον.
    βλέπε, μή τίς σε παρέλθῃ, φησίν, ἐὰν δὲ τίς σε παρέλθῃ, ἐγὼ αὐτοὺς ἐπὶ τὸ θυσιαστήριον
    δοκιμάσω. ταῦτα εἰπὼν τῷ ποιμένι ἀπῆλθε. ἄγγελον λέγει μοι ὁ ποιμήν· Λάβωμεν πάντων
    τὰς ῥάβδους καὶ φυτεύσωμεν αὐτάς, εἴ τινες ἐξ αὐτῶν δυνήσονται ζῆσαι. λέγω αὐτῷ·
    Κύριε, τὰ ξηρὰ ταῦτα πῶς δύνανται ζῆσαι; 7. ἀποκριθείς μοι λέγει· Τὸ δένδρον τοῦτο
    ἰτέα ἐστὶ καὶ φιλόζωον τὸ γένος· ἐὰν οὖν φυτευθῶσι καὶ μικρὰν ἰκμάδα λαμβάνωσιν
    αἱ ῥάβδοι, ζήσονται πολλαὶ ἐξ αὐτῶν· εἶτα δὲ πειράσωμεν καὶ ὕδωρ αὐταῖς παραχέειν.
    ἐάν τις αὐτῶν δυνηθῇ ζῆσαι, συγχαρήσομαι αὐτῇ· ἐὰν δὲ μὴ ζήσῃ, οὐχ εὑρεθήσομαι
    ἐγὼ ἀμελής. 8. ἐκέλευσε δέ μοι ὁ ποιμὴν καλέσαι καθὼς τις αὐτῶν ἐστάθη. ἦλθον
    τάγματα τάγματα, καὶ ἐπεδίδουν τὰς ῥάβδους τῷ ποιμένι. ἐλάμβανε δὲ ὁ ποιμὴν τὰς
    ῥάβδους, καὶ κατὰ τάγματα ἐφύτευσεν αὐτάς, καὶ μετὰ τὸ φυτεῦσαι ὕδωρ αὐταῖς πολὺ
    παρέχεεν, ὥστε ἀπὸ τοῦ ὕδατος μὴ φαίνεσθαι τὰς ῥάβδους. 9. καὶ μετὰ τὸ ποτίσαι
    αὐτὸν τὰς ῥάβδους λέγει μοι· Ἄγωμεν, καὶ μετ' ὀλίγας ἡμέρας ἐπανέλθωμεν καὶ ἐπισκεψώμεθα
    τὰς ῥάβδους πάσας· ὁ γὰρ κτίσας τὸ δένδρον τοῦτο θέλει πάντας ζῆν τοὺς λαβόντας
    ἐκ τοῦ δένδρου τούτου κλάδους. ἐλπίζω δὲ κἀγὼ ὅτι λαβόντα τὰ ῥαβδία ταῦτα ἰκμάδα
    καὶ ποτισθέντα ὕδατι ζήσονται τὸ πλεῖστον μέρος αὐτῶν.
