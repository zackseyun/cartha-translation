translation:
  text: 'Then the angel of the Lord commanded that crowns be brought. And crowns were
    brought, as if made from palms, and he crowned the men who had handed in the rods
    that had shoots and some fruit, and he sent them into the tower. 2. And the others
    also he sent into the tower—those who had handed in the rods green and having
    shoots, but whose shoots did not have fruit—giving them seals. 3. And all who
    were going into the tower had the same clothing, white as snow. 4. And those who
    had handed in the rods green as they had received them, he dismissed, giving them
    clothing and seals. 5. After the angel had finished these things, he says to the
    shepherd: “I am going; but you are to dismiss these to the walls, as each one
    is worthy to dwell. Pay close attention to their rods carefully, and so dismiss
    them—pay careful attention. See that no one slips past you,” he says; “but if
    anyone does slip past you, I will test them upon the altar.” Having said these
    things to the shepherd, he went away. 6. The shepherd says to me, “Let us take
    the rods of all and plant them, whether any of them will be able to live.” I say
    to him, “Sir, how can these dry things live?” 7. Answering me he says, “This tree
    is a willow, and its kind loves to live. If, then, the rods are planted and receive
    a little moisture, many of them will live; then let us also try to pour out water
    for them. If any of them is able to live, I will rejoice with it; but if it does
    not live, I shall not be found negligent.” 8. Then the shepherd commanded me to
    call them up as each of them had been stationed. Rank by rank they came and were
    handing their rods to the shepherd. The shepherd took the rods and planted them
    according to the ranks; and after planting he furnished much water for them, so
    that because of the water the rods could not be seen. 9. And after he had watered
    the rods, he says to me, “Let us go, and after a few days let us return and inspect
    all the rods; for the one who created this tree desires all who have taken branches
    from this tree to live. And I too hope that, these rods having received moisture
    and having been watered with water, the greater part of them will live.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Crowns “as if made from palms” echoes Greco-Roman victory/festival wreaths;
      palm branches commonly signified triumph.
    reason: cultural_note
  - marker: b
    text: “Seals” in Hermas often resonate with baptismal sealing and divine ownership;
      the translation keeps the literal term to preserve the symbolism.
    reason: cultural_note
  - marker: c
    text: “To the walls … to dwell” situates people within the tower’s structure in
      the allegory; elsewhere in Hermas the tower represents the community being built.
    reason: cross_reference
  - marker: d
    text: The willow (ἰτέα) readily takes root from cuttings when given moisture,
      reinforcing the image of life restored by watering.
    reason: cultural_note
  - marker: e
    text: “Rank by rank” renders τάγματα τάγματα, a phrase of orderly, almost military
      grouping.
    reason: cultural_note
  - marker: f
    text: “Test upon the altar” retains the cultic image of evaluation in a sacred
      setting rather than a generic examination.
    reason: cultural_note
lexical_decisions:
- source_word: ὁ ἄγγελος κυρίου
  chosen: the angel of the Lord
  alternatives:
  - the Lord’s angel
  - an angel of the Lord
  lexicon: BDAG
  rationale: Formulaic genitive construction in early Christian Greek; retains idiom
    without over-interpreting as a theophany.
- source_word: στεφάνους / στέφανοι
  chosen: crowns
  alternatives:
  - wreaths
  - garlands
  lexicon: BDAG
  rationale: Stephanos denotes a victor’s wreath/crown; “crowns” is familiar while
    preserving reward/victory connotation.
- source_word: ἐκ φοινίκων
  chosen: from palms
  alternatives:
  - of palm branches
  - of date-palm
  lexicon: LSJ
  rationale: Foînix commonly denotes the date-palm; “from palms” is concise and keeps
    the material image.
- source_word: ῥάβδους / ῥαβδία
  chosen: rods
  alternatives:
  - sticks
  - staves
  - switches
  lexicon: LSJ
  rationale: Consistent term throughout Similitude 8 for the distributed pieces from
    the willow; “rod” fits size and symbolism.
- source_word: παραφυάδας
  chosen: shoots
  alternatives:
  - sprouts
  - offshoots
  lexicon: LSJ
  rationale: Agricultural term for new growth; “shoots” is clear, concrete, and standard
    botanical English.
- source_word: καρπός
  chosen: fruit
  alternatives:
  - produce
  - yield
  lexicon: BDAG
  rationale: Retains evaluative metaphor of moral productivity recurring in Hermas.
- source_word: ἀπέλυσεν
  chosen: dismissed
  alternatives:
  - sent away
  - released
  lexicon: BDAG
  rationale: ἀπολύω in narrative scenes often means dismiss; here it signals being
    sent on to the tower/walls.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  - sent off
  lexicon: BDAG
  rationale: Common mission/transfer verb; “sent” is plain and accurate.
- source_word: σφραγῖδας
  chosen: seals
  alternatives:
  - signets
  - marks
  lexicon: BDAG
  rationale: Standard rendering; preserves potential baptismal/ownership imagery without
    over-interpretation.
- source_word: ἱματισμός
  chosen: clothing
  alternatives:
  - garment
  - attire
  lexicon: BDAG
  rationale: Collective sense of attire is in view; “clothing” communicates uniform
    appearance.
- source_word: λευκὸν ὡσεὶ χιόνα
  chosen: white as snow
  alternatives:
  - snow-white
  - white like snow
  lexicon: BDAG
  rationale: Idiomatic comparison; retains vividness and intertextual resonance without
    forcing NT phrasing.
- source_word: τείχη
  chosen: walls
  alternatives:
  - ramparts
  - fortifications
  lexicon: LSJ
  rationale: Refers to the structural walls associated with the tower allegory; “walls”
    is straightforward.
- source_word: κατοικεῖν
  chosen: to dwell
  alternatives:
  - to reside
  - to live
  lexicon: BDAG
  rationale: Dwell carries ecclesial/eschatological nuance fitting placement within
    the tower.
- source_word: κατανόησον … ἐπιμελῶς
  chosen: pay close attention
  alternatives:
  - consider carefully
  - observe diligently
  lexicon: BDAG
  rationale: Reproduces the doubled emphasis on careful scrutiny without redundancy
    overload.
- source_word: παρέλθῃ (μή τίς σε παρέλθῃ)
  chosen: slip past you
  alternatives:
  - pass by you
  - get past you
  lexicon: BDAG
  rationale: Conveys the idea of evading scrutiny; idiomatic in English.
- source_word: δοκιμάσω
  chosen: test
  alternatives:
  - prove
  - examine
  lexicon: BDAG
  rationale: Maintains evaluative/judicial nuance, especially in cultic context with
    altar.
- source_word: θυσιαστήριον
  chosen: altar
  alternatives:
  - sacrificial altar
  lexicon: BDAG
  rationale: Cultic term; “altar” is sufficient and traditional without expansion.
- source_word: Κύριε (address to the shepherd)
  chosen: Sir
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Here a polite form of address to the shepherd-angel, not a divine title;
    “Sir” prevents theological confusion.
- source_word: ἰτέα
  chosen: willow
  alternatives:
  - osier
  lexicon: LSJ
  rationale: Botanical identification; “willow” is standard and connects to the rooting
    imagery.
- source_word: φιλόζωον τὸ γένος
  chosen: its kind loves to live
  alternatives:
  - of a life-loving nature
  - life-cherishing by nature
  lexicon: LSJ
  rationale: Idiomatic rendering that preserves the personified characterization of
    the species.
- source_word: ἰκμάς
  chosen: moisture
  alternatives:
  - sap
  - dampness
  lexicon: LSJ
  rationale: Refers to life-giving wetness; “moisture” keeps the horticultural sense.
- source_word: παραχέειν
  chosen: pour out water for them
  alternatives:
  - pour water on them
  - pour alongside
  lexicon: LSJ
  rationale: Captures the act of supplying water without over-technical spatial nuance.
- source_word: τάγματα
  chosen: ranks
  alternatives:
  - companies
  - divisions
  lexicon: LSJ
  rationale: Military/orderly grouping metaphor; “rank by rank” conveys repeated τάγματα
    τάγματα.
- source_word: φυτεύω
  chosen: plant
  alternatives:
  - set in the ground
  - transplant
  lexicon: BDAG
  rationale: Plain agricultural verb; “plant” is natural English.
- source_word: παρέχεεν
  chosen: furnished (much water)
  alternatives:
  - supplied
  - provided
  - poured out
  lexicon: BDAG
  rationale: Highlights generous provision of water rather than the act of pouring
    alone.
- source_word: φαίνεσθαι
  chosen: be seen
  alternatives:
  - be visible
  - appear
  lexicon: BDAG
  rationale: Objective visibility is in view; “be seen” is simple and accurate.
- source_word: ἐπισκέπτομαι
  chosen: inspect
  alternatives:
  - examine
  - visit
  lexicon: BDAG
  rationale: Active scrutiny of the rods is intended; “inspect” conveys that.
- source_word: κτίσας
  chosen: the one who created
  alternatives:
  - the creator of
  lexicon: BDAG
  rationale: Agent-defining participle; indefinite expression preserves focus on the
    act, not the title.
- source_word: κλάδους
  chosen: branches
  alternatives:
  - boughs
  - sprigs
  lexicon: BDAG
  rationale: Standard arboreal term; “branches” contrasts with the cut “rods.”
