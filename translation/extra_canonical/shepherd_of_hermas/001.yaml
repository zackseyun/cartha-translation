id: HERM.V.1.i
reference: Shepherd of Hermas — Vision 1, section i
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: ἐλάλησα; οὐ πάντοτέ σε ὡς θεὰν ἡγησάμην; οὐ πάντοτέ σε ἐνετράπην ὡς ἀδελφήν;
    τί μου καταψεύδῃ, ὦ γύναι, τὰ πονηρὰ ταῦτα καὶ ἀκάθαρτα; 8. γελάσασά μοι λέγει·
    Ἐπὶ τὴν καρδίαν σου ἀνέβη ἡ ἐπιθυμία τῆς πονηρίας. ἢ οὐ δοκεῖ σοι ἀνδρὶ δικαίῳ
    πονηρὸν πρᾶγμα εἶναι ἐὰν ἀναβῇ αὐτοῦ ἐπὶ τὴν καρδίαν ἡ πονηρὰ ἐπιθυμία; ἁμαρτία
    γέ ἐστιν, καὶ μεγάλη, φησίν. ὁ γὰρ δίκαιος ἀνὴρ δίκαια βουλεύεται. ἐν τῷ οὖν δίκαια
    βουλεύεσθαι αὐτὸν κατορθοῦται ἡ δόξα αὐτοῦ ἐν τοῖς οὐρανοῖς καὶ εὐκατάλλακτον
    ἔχει τὸν Κύριον ἐν παντὶ πράγματι αὐτοῦ· οἱ δὲ πονηρὰ βουλευόμενοι ἐν ταῖς καρδίαις
    αὐτῶν θάνατον καὶ αἰχμαλωσίαν ἑαυτοῖς ἐπισπῶνται, μάλιστα οἱ τὸν αἰῶνα τοῦτον
    περιποιούμενοι καὶ γαυριῶντες ἐν τῷ πλούτῳ αὐτῶν καὶ μὴ ἀντεχόμενοι τῶν ἀγαθῶν
    τῶν μελλόντων. 9. μετανοήσουσιν αἱ ψυχαὶ αὐτῶν, οἵτινες οὐκ ἔχουσιν ἐλπίδα, ἀλλὰ
    ἑαυτοὺς ἀπηγνώκασι καὶ τὴν ζωὴν αὐτῶν. ἀλλὰ σὺ προσεύχου πρὸς τὸν Θεόν, καὶ ἰάσεται
    τὰ ἁμαρτήματά σου καὶ ὅλου τοῦ οἴκου σου καὶ πάντων τῶν ἁγίων.
  language: Greek
