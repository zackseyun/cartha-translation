theological_decisions:
- issue: Rendering δόξα for a human subject
  chosen_reading: Translate as 'honor' rather than 'glory'
  alternative_readings:
  - glory
  - reputation
  rationale: The context concerns the righteous person's standing before heaven, not
    divine radiance; 'honor' fits the social-ethical frame and avoids importing doxological
    overtones.
  doctrine_reference: 'Translation philosophy #1, #5'
- issue: 'Depicting God''s disposition: εὐκατάλλακτος'
  chosen_reading: Render as 'the Lord is readily reconciled to him'
  alternative_readings:
  - easily appeased
  - easily placated
  rationale: Maintains relational reconciliation without suggesting pagan appeasement;
    underscores that God is favorably disposed toward the upright in all matters.
  doctrine_reference: 'Translation philosophy #5'
- issue: Two-age eschatology in 'this present age' vs 'good things that are coming'
  chosen_reading: Explicitly mark 'this present age' and 'the good things that are
    coming'
  alternative_readings:
  - this age / future goods
  rationale: Hermas shares early Christian two-age outlook; making it explicit helps
    readers track the ethical contrast without NT-harmonizing language.
  doctrine_reference: 'What matters most #5; Translation philosophy #5'
- issue: μετανοέω rendering
  chosen_reading: '''Repent'' in moral-turning context'
  alternative_readings:
  - '''change their mind'' (cognitive)'
  rationale: The verse frames 'evil desire' as sin and ends with prayer for healing
    of sins; the future turning envisioned is moral repentance, not mere reconsideration.
  doctrine_reference: 'Contested terms: μετανοέω policy'
- issue: Forgiveness as healing (ἰάσεται τὰ ἁμαρτήματα)
  chosen_reading: Preserve 'heal' rather than flatten to 'forgive'
  alternative_readings:
  - forgive
  rationale: Hermas often uses moral-therapeutic imagery; keeping 'heal' shows the
    conceptual metaphor of sins as wounds that God remedies.
  doctrine_reference: 'Translation philosophy #5'
- issue: '''ἅγιοι'' as community designation'
  chosen_reading: Translate as 'holy ones'
  alternative_readings:
  - saints
  rationale: '''Holy ones'' preserves the lexical content and early-church texture
    without later ecclesiastical specialization.'
  doctrine_reference: 'Translation philosophy #1, #5'
