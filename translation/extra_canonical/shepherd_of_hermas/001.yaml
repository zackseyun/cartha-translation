translation:
  text: 'I said to her, "Did I not always regard you as a goddess [1]? Did I not always
    respect you as a sister? Why are you falsely accusing me, woman, of such wicked
    and unclean things?"


    She laughed at me and said, "Evil desire has risen up into your heart [2]. Or
    does it not seem to you a wicked thing for a righteous man if evil desire rises
    into his heart? It is sin—and a great one, she says. For a righteous man plans
    what is righteous. And in planning what is righteous, his honor is established
    in the heavens [3], and the Lord is readily reconciled to him [4] in every affair
    of his. But those who plan evil in their hearts bring upon themselves death and
    captivity—especially those who secure this present age for themselves [5], who
    exult in their wealth, and who do not hold fast to the good things that are coming.


    "Their souls will repent [6]—those who have no hope, but have despaired of themselves
    and of their life. But you—pray to God, and your sins will be healed [7], and
    [so will those] of your whole household, and of all the holy ones [8]."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: The Greek explicitly says 'goddess' (θεὰν), reflecting the speaker’s former
      reverence; in Roman culture divine honors to persons were conceivable.
    reason: cultural_note
  - marker: '[2]'
    text: 'Literal idiom: ''the desire of evil went up upon your heart.'''
    reason: lexical_alternative
  - marker: '[3]'
    text: Or, 'his glory is established in the heavens.' The Greek word (δόξα) can
      mean 'glory' or 'honor.'
    reason: lexical_alternative
  - marker: '[4]'
    text: Greek εὐκατάλλακτος suggests 'easy to reconcile' or 'easily placated.' 'Readily
      reconciled' avoids pagan-rite connotations while keeping the relational sense.
    reason: lexical_alternative
  - marker: '[5]'
    text: '''This present age'' reflects early Christian two-age language (present
      vs. the coming).'
    reason: cultural_note
  - marker: '[6]'
    text: Or, 'their souls will change their mind.' The verb (μετανοέω) can emphasize
      inner rethinking or moral repentance; here moral turning is intended.
    reason: lexical_alternative
  - marker: '[7]'
    text: The phrase literally reads 'your sins will be healed,' a common biblical
      image for forgiveness (cf. Ps 41:4; Mark 2:5–12).
    reason: cross_reference
  - marker: '[8]'
    text: '''Holy ones'' can also be translated ''saints.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: θεὰν
  chosen: goddess
  alternatives:
  - divinity
  - deity
  lexicon: LSJ
  rationale: Explicit feminine term for a deity; preserves Roman cultural nuance that
    he had regarded her with divine honor.
- source_word: ἐνετράπην ὡς ἀδελφήν
  chosen: respect you as a sister
  alternatives:
  - revered you as a sister
  - felt shame before you as a sister
  lexicon: LSJ
  rationale: ἐντρέπομαι often means to feel reverence/respect in honor–shame contexts;
    here positive respect is intended, not embarrassment.
- source_word: καταψεύδῃ
  chosen: falsely accusing
  alternatives:
  - lie against
  - slander
  lexicon: LSJ
  rationale: Compound verb conveys lying against someone, hence a false accusation;
    'falsely accuse' captures object-directed deceit.
- source_word: γύναι
  chosen: woman
  alternatives:
  - lady
  lexicon: LSJ
  rationale: Vocative address; 'woman' keeps the directness and tone of the Greek.
- source_word: ἡ ἐπιθυμία τῆς πονηρίας
  chosen: evil desire
  alternatives:
  - desire of wickedness
  - desire for evil
  lexicon: BDAG
  rationale: Natural English collocation that conveys the genitive relation; concise
    and faithful.
- source_word: ἀνέβη ἐπὶ τὴν καρδίαν
  chosen: has risen up into your heart
  alternatives:
  - has gone up upon your heart (lit.)
  - has entered your heart
  lexicon: LSJ
  rationale: Keeps the metaphor of upward motion while reading smoothly; footnote
    provides literal idiom.
- source_word: ἀνδρὶ δικαίῳ / δίκαιος
  chosen: a righteous man / righteous
  alternatives:
  - a just man / just
  lexicon: BDAG
  rationale: Default project rendering for δικ- terms outside Pauline discourse; moral
    character is in view.
- source_word: βουλεύεται
  chosen: plans
  alternatives:
  - deliberates
  - purposes
  lexicon: LSJ
  rationale: Conveys thoughtful intention, not merely abstract thought; fits the ethical
    contrast with evil plotting.
- source_word: κατορθοῦται
  chosen: is established
  alternatives:
  - is brought to success
  - is set right / accomplished
  lexicon: LSJ
  rationale: In context with δόξα, sense is that his standing is made firm; 'established'
    pairs well with 'in the heavens'.
- source_word: δόξα
  chosen: honor
  alternatives:
  - glory
  - reputation
  lexicon: BDAG
  rationale: Here the subject is the righteous man's standing, not divine radiance;
    'honor' reflects social/heavenly esteem. Footnote notes 'glory' as an alternative.
- source_word: οὐρανοί
  chosen: the heavens
  alternatives:
  - heaven
  lexicon: BDAG
  rationale: Plural form retained to reflect idiom and the celestial sphere of divine
    recognition.
- source_word: εὐκατάλλακτον ἔχει τὸν Κύριον
  chosen: the Lord is readily reconciled to him
  alternatives:
  - has the Lord easily appeased
  - the Lord is easily placated toward him
  lexicon: LSJ
  rationale: Captures God's favorable disposition toward the righteous without pagan
    connotations of appeasement; maintains relational reconciliation.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Project default for κύριος when referring to God.
- source_word: ἐπισπῶνται
  chosen: bring upon themselves
  alternatives:
  - drag upon themselves
  - draw down upon themselves
  lexicon: LSJ
  rationale: Idiomatic English that preserves the reflexive consequence of their own
    plotting.
- source_word: αἰχμαλωσία
  chosen: captivity
  alternatives:
  - enslavement
  - bondage
  lexicon: BDAG
  rationale: Standard rendering; evokes the consequence of being taken captive as
    judgment imagery.
- source_word: τὸν αἰῶνα τοῦτον
  chosen: this present age
  alternatives:
  - this age
  lexicon: BDAG
  rationale: Eschatological two-age framework is implied; 'present age' makes that
    explicit.
- source_word: περιποιούμενοι
  chosen: secure for themselves
  alternatives:
  - acquire for themselves
  - gain for themselves
  lexicon: LSJ
  rationale: Middle voice with reflexive benefit; 'secure' conveys the sense of preserving/gaining
    for oneself.
- source_word: γαυριῶντες
  chosen: exulting
  alternatives:
  - boasting
  - glorying
  lexicon: LSJ
  rationale: Expresses proud rejoicing; avoids confusing overlap with 'glory' for
    δόξα in the same context.
- source_word: ἀντέχομαι
  chosen: hold fast to
  alternatives:
  - cling to
  - be devoted to
  lexicon: BDAG
  rationale: Common biblical idiom for steadfast attachment; suits the ethical exhortation
    about future goods.
- source_word: τὰ ἀγαθὰ τὰ μέλλοντα
  chosen: the good things that are coming
  alternatives:
  - the coming good things
  - the future goods
  lexicon: BDAG
  rationale: Natural English while keeping the eschatological horizon.
- source_word: μετανοήσουσιν
  chosen: will repent
  alternatives:
  - will change their mind
  lexicon: BDAG
  rationale: Moral turning from sin is in view; per project policy, 'repent' is preferred
    in sin/ethics contexts. Alternative noted.
- source_word: ψυχαί
  chosen: souls
  alternatives:
  - lives
  - persons
  lexicon: BDAG
  rationale: Maintains Hermas's anthropological language; signals inner life rather
    than merely 'people'.
- source_word: ἀπηγνώκασι
  chosen: have despaired of
  alternatives:
  - have renounced
  - have abandoned hope for
  lexicon: LSJ
  rationale: The verb commonly means to despair of; matches the parallel with 'have
    no hope'.
- source_word: ἰάσεται
  chosen: will be healed
  alternatives:
  - will be forgiven
  - will be cured
  lexicon: BDAG
  rationale: Preserves healing-forgiveness metaphor; avoids flattening to legal language.
    Alternative 'forgiven' footnoted.
- source_word: ἁμαρτήματα
  chosen: sins
  alternatives:
  - offenses
  - transgressions
  lexicon: BDAG
  rationale: Standard rendering for moral failures in early Christian texts.
- source_word: οἶκος
  chosen: household
  alternatives:
  - house
  - family
  lexicon: BDAG
  rationale: In moral-exhortation contexts, 'household' captures the extended domestic
    unit.
- source_word: ἅγιοι
  chosen: holy ones
  alternatives:
  - saints
  lexicon: BDAG
  rationale: Literal rendering avoids later technical sense of 'saints' while keeping
    early Christian self-designation.
