  label: Vision 4, section ii
  sequence: 23
translation:
  text: 'After the beast had passed by me and I had gone forward about thirty feet,
    look—a virgin meets me, adorned as if coming out of a bridal chamber, all in white
    and with white sandals, veiled up to her forehead; her covering was bound with
    a headband, and her hair was white.


    I knew that I would escape it—if your heart becomes pure and without blemish,
    and if for the remaining days of your life you serve the Lord blamelessly. Throw
    your cares upon the Lord, and he himself will set them right.


    Put your trust in the Lord, you double‑minded, for he is able to do all things:
    he turns his anger away from you, and he sends scourges upon you, you double‑minded.
    Woe to those who hear these words and refuse to heed; it would have been preferable
    for them not to have been born.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “About thirty feet” renders πόδας τριάκοντα; some take the measure idiomatically
      as “about thirty paces.”
    reason: lexical_alternative
  - marker: b
    text: “Her covering was bound with a headband”—Greek μίτρα can denote a headband,
      fillet, or turban; “headband” is chosen for clarity.
    reason: cultural_note
  - marker: c
    text: “I knew that I would escape it”—the Greek has a feminine pronoun (“her”);
      context suggests the beast is meant, not the virgin.
    reason: lexical_alternative
  - marker: d
    text: “Throw your cares upon the Lord” echoes the same idiom found in 1 Peter
      5:7, though Hermas’s expression stands on its own.
    reason: cross_reference
  - marker: e
    text: “Scourges” translates μάστιγες, literally whip‑lashes; some render “plagues”
      by extension.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρθένος
  chosen: virgin
  alternatives:
  - maiden
  - young woman
  lexicon: BDAG
  rationale: Hermas’s figure is symbolic and morally charged; “virgin” preserves the
    traditional sacred connotation and the paradox with her white hair.
- source_word: κεκοσμημένη (from κοσμέω)
  chosen: adorned
  alternatives:
  - arrayed
  - dressed up
  lexicon: BDAG
  rationale: “Adorned” conveys deliberate, ceremonious preparation without archaic
    tone.
- source_word: νυμφών
  chosen: bridal chamber
  alternatives:
  - marriage chamber
  - wedding suite
  lexicon: BDAG
  rationale: Formal cultic-marital term is important for the imagery; “bridal chamber”
    keeps the ancient register.
- source_word: λευκός
  chosen: white
  alternatives:
  - bright
  - gleaming
  lexicon: BDAG
  rationale: Plain descriptive color fits Hermas’s symbolic purity motif.
- source_word: ὑποδήματα
  chosen: sandals
  alternatives:
  - shoes
  - footwear
  lexicon: BDAG
  rationale: “Sandals” is the specific ancient footwear and matches the cultural setting.
- source_word: κατακεκαλυμμένη ἕως τοῦ μετώπου
  chosen: veiled up to her forehead
  alternatives:
  - covered up to her forehead
  - veiled to the brow
  lexicon: BDAG
  rationale: “Veiled” retains the technical sense of a covering; specifying “forehead”
    renders the explicit detail.
- source_word: μίτρα
  chosen: headband
  alternatives:
  - mitre
  - turban
  lexicon: LSJ
  rationale: In Greco-Roman usage μίτρα denotes a headband/fillet worn by women; “headband”
    communicates clearly while a footnote preserves alternatives.
- source_word: εἶχεν τὰς τρίχας αὐτῆς λευκάς
  chosen: her hair was white
  alternatives:
  - she had white hair
  lexicon: BDAG
  rationale: Straightforward rendering keeps the striking paradox with her being a
    “virgin.”
- source_word: ἔγνων … ἐκφυγεῖν αὐτήν
  chosen: I knew that I would escape it
  alternatives:
  - I realized how to escape it
  - I knew I had escaped her
  lexicon: BDAG
  rationale: Infinitive with ἔγνων expresses realization; context points back to the
    beast as the referent, despite the feminine pronoun in the text. We render “it”
    and annotate the feminine form.
- source_word: καρδία
  chosen: heart
  alternatives:
  - inner self
  - mind
  lexicon: BDAG
  rationale: Hermas’s moral vocabulary contrasts inner purity with duplicity; “heart”
    preserves that idiom.
- source_word: καθαρὰ καὶ ἄμωμος
  chosen: pure and without blemish
  alternatives:
  - pure and blameless
  - clean and unblemished
  lexicon: BDAG
  rationale: “Without blemish” preserves sacrificial-purity resonance; paired with
    “pure” to match the doublet.
- source_word: τὰς λοιπὰς τῆς ζωῆς ἡμέρας
  chosen: the remaining days of your life
  alternatives:
  - the rest of the days of your life
  lexicon: BDAG
  rationale: Natural English that keeps the explicit temporal scope.
- source_word: δουλεύσητε τῷ Κυρίῳ ἀμέμπτως
  chosen: serve the Lord blamelessly
  alternatives:
  - be slaves to the Lord without blame
  - serve the Master faultlessly
  lexicon: BDAG
  rationale: “Serve” fits pious devotion here; “Lord” for κύριος per project convention;
    “blamelessly” preserves ἀμέμπτως.
- source_word: ἐπιρίψατε τὰς μερίμνας ὑμῶν
  chosen: Throw your cares
  alternatives:
  - Cast your anxieties
  - Hurl your worries
  lexicon: BDAG
  rationale: “Throw your cares” is vivid, faithful to the physical metaphor of ἐπιρίπτω
    and avoids mimicking familiar NT wording exactly.
- source_word: κατορθώσει
  chosen: will set them right
  alternatives:
  - will bring them to a good end
  - will accomplish them
  lexicon: LSJ
  rationale: κατορθόω denotes making straight/right or bringing to success; “set them
    right” is idiomatic and keeps the straightening nuance.
- source_word: πιστεύσατε τῷ Κυρίῳ
  chosen: Put your trust in the Lord
  alternatives:
  - Believe the Lord
  - Trust the Lord
  lexicon: BDAG
  rationale: Here the call is to loyal reliance by the double‑minded; “put your trust
    in” makes that relational dimension clear.
- source_word: δίψυχοι
  chosen: double‑minded
  alternatives:
  - two‑souled
  - wavering
  lexicon: BDAG
  rationale: Hermas repeatedly contrasts simplicity with double‑mindedness; the standard
    rendering preserves this ethical term.
- source_word: ἀποστρέφει τὴν ὀργὴν
  chosen: turns his anger away
  alternatives:
  - averts his wrath
  - turns aside his anger
  lexicon: BDAG
  rationale: “Anger” is accessible and faithful; we avoid over‑theological “wrath”
    here to keep Hermas’s moral tone.
- source_word: ἐξαποστέλλει μάστιγας
  chosen: sends scourges
  alternatives:
  - dispatches lashes
  - sends plagues
  lexicon: BDAG
  rationale: μάστιγες evokes whip‑strokes; “scourges” retains the concrete disciplinary
    image.
- source_word: οὐαί
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Prophetic denunciation formula; “woe” preserves that tone.
- source_word: παρακούσασιν
  chosen: refuse to heed
  alternatives:
  - disregard
  - pay no attention
  lexicon: BDAG
  rationale: Captures culpable inattention/disobedience to a spoken word.
- source_word: αἱρετώτερον
  chosen: preferable
  alternatives:
  - better
  lexicon: BDAG
  rationale: Comparative of choice; “preferable” is precise in English.
