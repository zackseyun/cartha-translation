theological_decisions:
- issue: Referent of the pronoun in “I knew … to escape her/it” (ἔγνων … ἐκφυγεῖν
    αὐτήν)
  chosen_reading: Render the pronoun implicitly as “it,” referring back to the beast
  alternative_readings:
  - Translate literally “her,” which would ambiguously point to the virgin
  - 'Paraphrase away the pronoun entirely: “I recognized the way of escape”'
  rationale: Contextually, Hermas has just passed the beast; the virgin’s appearance
    introduces exhortation, not a threat to escape. A literal “her” would mislead
    in English. We preserve the intended referent while annotating the Greek form.
- issue: Divine mercy and discipline in one line (“turns his anger away … and sends
    scourges”)
  chosen_reading: Keep both clauses as stated, preserving the tension
  alternative_readings:
  - Soften the second clause to “may send discipline”
  - 'Negate: “and does not send scourges”'
  rationale: Hermas regularly holds together God’s capacity both to relent and to
    chastise the double‑minded. We do not resolve the tension but render both actions
    plainly.
- issue: κύριος (Kyrios) title
  chosen_reading: Translate as “Lord”
  alternative_readings:
  - Master
  rationale: Per project convention, κύριος as a divine title is rendered “Lord.”
  doctrine_reference: Cartha Translation Philosophy §Contested terms
- issue: δίψυχος ethical term
  chosen_reading: Render as “double‑minded” consistently
  alternative_readings:
  - Wavering
  - Two‑souled
  rationale: Hermas opposes simplicity to double‑mindedness throughout; the established
    term keeps the moral register concrete.
