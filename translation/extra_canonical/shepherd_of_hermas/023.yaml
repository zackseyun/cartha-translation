id: HERM.V.4.ii
reference: Shepherd of Hermas — Vision 4, section ii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Μετὰ δὲ τὸ παρελθεῖν με τὸ θηρίον καὶ προελθεῖν ὡσεὶ πόδας τριάκοντα, ἰδοὺ
    ὑπαντᾷ μοι παρθένος κεκοσμημένη ὡς ἐκ νυμφῶνος ἐκπορευομένη, ὅλη ἐν λευκοῖς καὶ
    ὑποδήμασιν λευκοῖς, κατακεκαλυμμένη ἕως τοῦ μετώπου, ἐν μίτρᾳ δὲ ἦν ἡ κατακάλυψις
    αὐτῆς· εἶχεν δὲ τὰς τρίχας αὐτῆς λευκάς. 2. ἔγνων ἐγὼ ἐκφυγεῖν αὐτήν, ἐὰν ἡ καρδία
    ὑμῶν γένηται καθαρὰ καὶ ἄμωμος, καὶ τὰς λοιπὰς τῆς ζωῆς ἡμέρας ὑμῶν δουλεύσητε
    τῷ Κυρίῳ ἀμέμπτως. ἐπιρίψατε τὰς μερίμνας ὑμῶν ἐπὶ τὸν Κύριον, καὶ αὐτὸς κατορθώσει
    αὐτάς. 6. πιστεύσατε τῷ Κυρίῳ, οἱ δίψυχοι, ὅτι πάντα δύναται καὶ ἀποστρέφει τὴν
    ὀργὴν αὐτοῦ ἀφ' ὑμῶν καὶ ἐξαποστέλλει μάστιγας ὑμῖν τοῖς διψύχοις. οὐαὶ τοῖς ἀκούσασιν
    τὰ ῥήματα ταῦτα καὶ παρακούσασιν· αἱρετώτερον ἦν αὐτοῖς τὸ μὴ γεννηθῆναι.
  language: Greek
