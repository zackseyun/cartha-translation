book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Πρῶτον πάντων πίστευσον ὅτι εἷς ἐστὶν ὁ Θεός, ὁ τὰ πάντα κτίσας καὶ καταρτίσας,
    καὶ ποιήσας ἐκ τοῦ μὴ ὄντος εἰς τὸ εἶναι τὰ πάντα, καὶ πάντα χωρῶν, μόνος δὲ ἀχώρητος
    ὤν. 2. πίστευσον οὖν αὐτῷ καὶ φοβήθητι αὐτόν, φοβηθεὶς δὲ ἐγκράτευσαι. ταῦτα φύλασσε
    καὶ ἀποβαλεῖς πᾶσαν πονηρίαν ἀπὸ σεαυτοῦ καὶ ἐνδύσῃ πᾶσαν ἀρετὴν δικαιοσύνης καὶ
    ζήσῃ τῷ θεῷ, ἐὰν φυλάξῃς τὴν ἐντολὴν ταύτην.
  language: Greek
  pages:
  - 334
  unit_id: M.1
  label: Mandate 1
  sequence: 26
translation:
  text: First of all, believe that God is one—the one who created and ordered all
    things, and made all things out of nonexistence into being, and who contains all
    things, while he alone is uncontainable. Therefore believe him and fear him; and
    having feared, exercise self-control. Keep these things, and you will cast off
    all wickedness from yourself and put on every virtue of righteousness, and you
    will live to God, if you keep this command.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: Lit. "from the not-being into being"; also rendered "from non-being into
      being" or paraphrased "out of nothing."
    reason: lexical_alternative
  - marker: '[2]'
    text: 'Or: "contains all things, being himself uncontained."'
    reason: lexical_alternative
  - marker: '[3]'
    text: 'Or: "be self-controlled"; older English: "be continent."'
    reason: lexical_alternative
  - marker: '[4]'
    text: 'Or: "clothe yourself with every virtue of righteousness."'
    reason: lexical_alternative
  - marker: '[5]'
    text: 'Or: "you will live to God."'
    reason: lexical_alternative
  - marker: a
    text: Or 'and you will live for God'.
    reason: previous_rendering
lexical_decisions:
- source_word: Πρῶτον πάντων
  chosen: First of all
  alternatives:
  - Before all things
  - First among all
  lexicon: LSJ
  rationale: Idiomatic adverbial phrase introducing the primary command; "First of
    all" preserves priority without sounding archaic.
- source_word: πίστευσον ὅτι
  chosen: believe that
  alternatives:
  - have faith that
  - trust that
  lexicon: BDAG
  rationale: With a content clause (ὅτι), pisteuō naturally means to accept a proposition
    as true.
- source_word: εἷς ἐστὶν ὁ Θεός
  chosen: God is one
  alternatives:
  - there is one God
  lexicon: BDAG
  rationale: Both are possible; "God is one" keeps the creedal ring and mirrors the
    Greek structure closely.
- source_word: κτίσας
  chosen: created
  alternatives:
  - made
  - brought into being
  lexicon: BDAG
  rationale: κτίζω commonly denotes divine creation; "created" is the standard, weighty
    term.
- source_word: καταρτίσας
  chosen: set in order
  alternatives:
  - established
  - arranged
  - fashioned
  - completed/perfected
  lexicon: BDAG
  rationale: καταρτίζω here complements κτίζω; "set in order" conveys arranging/ordering
    the created world without importing later technical nuances.
- source_word: ποιήσας ἐκ τοῦ μὴ ὄντος εἰς τὸ εἶναι τὰ πάντα
  chosen: brought all things into being from what was not
  alternatives:
  - made all things from non-being into being
  - made all things out of nothing
  lexicon: LSJ
  rationale: The expression literally reads "from the not-being into being"; "brought
    ... into being from what was not" keeps the Greek structure and avoids overinterpretive
    phrasing while preserving the ex nihilo sense.
- source_word: πάντα χωρῶν
  chosen: encompasses all things
  alternatives:
  - contains all things
  - comprehends all things
  lexicon: LSJ
  rationale: χωρέω can mean "to have room for, contain"; "encompasses" captures the
    metaphysical scope without suggesting mere physical containment or the English
    sense of "comprehend=understand."
- source_word: ἀχώρητος
  chosen: uncontainable
  alternatives:
  - uncontained
  - incomprehensible
  lexicon: LSJ
  rationale: From χωρέω with alpha-privative; "uncontainable" maintains the lexical
    parallel. "Incomprehensible" is a later theological sense that could mislead in
    English.
- source_word: πίστευσον οὖν αὐτῷ
  chosen: put your trust in him
  alternatives:
  - believe him
  lexicon: BDAG
  rationale: With the dative (αὐτῷ), pisteuō often has the nuance of relational trust;
    the shift from "believe that" to "trust him" reflects the change in construction
    and sense.
- source_word: φοβήθητι αὐτόν
  chosen: fear him
  alternatives:
  - revere him
  - stand in awe of him
  - be afraid of him
  lexicon: BDAG
  rationale: Preserves the strong biblical/early Christian idiom of the fear of God
    without euphemizing.
- source_word: ἐγκράτευσαι
  chosen: practice self-control
  alternatives:
  - be self-controlled
  - be continent
  lexicon: BDAG
  rationale: Aorist middle imperative of ἐγκρατεύομαι; "practice self-control" communicates
    the active moral discipline called for.
- source_word: φύλασσε
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: BDAG
  rationale: '"Keep" is the standard rendering of φυλάσσω in moral exhortation contexts;
    it keeps the imperative''s force crisp.'
- source_word: ἀποβαλεῖς
  chosen: you will throw off
  alternatives:
  - you will cast off
  - you will put away
  lexicon: LSJ
  rationale: ἀποβάλλω means to throw away/off; "throw off" is vivid and retains the
    metaphorical texture.
- source_word: πονηρίαν
  chosen: wickedness
  alternatives:
  - evil
  - malice
  lexicon: BDAG
  rationale: In general moral contexts, "wickedness" captures the broad scope of moral
    evil inherent in πονηρία.
- source_word: ἐνδύσῃ
  chosen: you will put on
  alternatives:
  - you will clothe yourself with
  lexicon: BDAG
  rationale: ἐνδύω in the middle voice frequently uses the clothing metaphor; "put
    on" is concise and transparent.
- source_word: ἀρετὴν
  chosen: virtue
  alternatives:
  - moral excellence
  lexicon: BDAG
  rationale: '"Virtue" is the most direct English equivalent and matches early Christian
    moral vocabulary.'
- source_word: δικαιοσύνης
  chosen: of righteousness
  alternatives:
  - of justice
  lexicon: BDAG
  rationale: Default project rendering; in this moral context "righteousness" is the
    better fit for personal ethical quality.
- source_word: ζήσῃ τῷ θεῷ
  chosen: you will live for God
  alternatives:
  - you will live to God
  - you will live with God
  lexicon: BDAG
  rationale: Dative of reference/advantage; "for God" communicates orientation and
    purpose without the stiffness of "to God."
- source_word: ἐντολὴν
  chosen: command
  alternatives:
  - mandate
  - commandment
  lexicon: BDAG
  rationale: '"Command" is plain and matches the internal diction; "mandate" is the
    section title but would be confusing in-line.'
