theological_decisions:
- issue: Creation ex nihilo implied by ἐκ τοῦ μὴ ὄντος εἰς τὸ εἶναι
  chosen_reading: Rendered as "brought all things into being from what was not"
  alternative_readings:
  - '"made all things out of nothing" (more interpretive)'
  - '"made all things from what did not yet exist" (softened)'
  rationale: The Greek idiom literally states "from the not-being into being." The
    chosen rendering preserves the structure and allows the ex nihilo implication
    without importing later philosophical phrasing.
  doctrine_reference: Creation; second-century Christian monotheism
- issue: Divine transcendence in πάντα χωρῶν, μόνος δὲ ἀχώρητος
  chosen_reading: '"encompasses all things, while he alone is uncontainable"'
  alternative_readings:
  - '"contains all things, being himself uncontained"'
  - '"comprehends all things, being himself incomprehensible"'
  rationale: Maintains the lexical parallel with χωρέω/ἀχώρητος while avoiding English
    "comprehend" (understand) ambiguity; emphasizes God's transcendence over creation
    rather than cognitive unknowability.
  doctrine_reference: Divine transcendence and immensity
- issue: Fear of God versus reverence
  chosen_reading: '"fear him"'
  alternative_readings:
  - '"revere him"'
  rationale: Hermas’s paraenetic tone favors the stronger traditional idiom of fearing
    God as a moral restraint leading to self-control.
  doctrine_reference: Fear of God in early Christian ethics
- issue: Faith as trust (πίστευσον αὐτῷ)
  chosen_reading: '"put your trust in him"'
  alternative_readings:
  - '"believe him"'
  rationale: The dative construction invites a relational nuance beyond mere assent;
    distinguishing the two imperatives (believe that / trust him) preserves Hermas’s
    movement from creed to reliance and obedience.
  doctrine_reference: Nature of faith (assent and trust)
- issue: '"Live for God" (ζήσῃ τῷ θεῷ)'
  chosen_reading: '"you will live for God"'
  alternative_readings:
  - '"you will live to God"'
  rationale: '"For God" communicates orientation and purpose in contemporary English
    without losing the dative’s force; it avoids unintended Pauline echo while remaining
    faithful.'
  doctrine_reference: Life oriented toward God
