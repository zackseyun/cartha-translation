translation:
  text: '“Be long-suffering[1],” he says, “and sensible, and you will gain mastery over all wicked deeds and do every work of righteousness. For if you are long-suffering, the holy spirit[2] that dwells in you will be pure, not being clouded by another evil spirit; rather, dwelling in a wide space[3] it will exult and rejoice with the vessel in which it dwells, and it will minister[4] to God with much cheerfulness, having vitality[5] within itself.


    But if a quick temper[6] comes on, at once the holy spirit—being tender—is cramped, not having a clean place, and it seeks to withdraw from that place; for it is choked by the evil spirit, not having room to minister to the Lord as it desires, being defiled by the quick temper. For in long-suffering the Lord dwells, but in quick temper, the devil. Therefore when both spirits dwell together in one, it is unprofitable and harmful to that person in whom they dwell.


    For if, after taking a little wormwood[7], you pour it into a jar of honey, does not all the honey perish? So much honey is ruined by the smallest amount of wormwood: it destroys the sweetness of the honey, and it no longer has the same favor with its master[8], because it has been embittered and has lost its use. But if the wormwood is not cast into the honey, the honey is found sweet and becomes serviceable to its master.


    You see, then, that long-suffering is sweeter than honey and is serviceable to the Lord, and he dwells in it; but quick temper is bitter and useless. If, therefore, quick temper is mixed with long-suffering, long-suffering is defiled and is no longer useful to God. Long-suffering at all times has nothing bitter within itself, remaining always gentle and quiet. This long-suffering, then, dwells with those who have the faith complete[10].


    Quick temper, for its part, is first foolish—flighty and senseless. Then from senselessness comes bitterness; from bitterness, anger; from anger, wrath; and from wrath, rage. Then rage—composed of so many evils—becomes a great and incurable sin.


    For when all these spirits dwell in one vessel, the very vessel in which the holy spirit also dwells, that vessel cannot contain them; it overflows. The tender spirit, having no habit of dwelling with an evil spirit or with hardness, withdraws from such a person and seeks to dwell with gentleness and quiet. Then, when it has departed from that person in whom it dwells, that person becomes empty of the righteous spirit[11]; and thereafter, being filled with evil spirits, he is unstable in all his deeds, dragged here and there by the evil spirits, and is altogether blinded as to his good understanding. Thus it happens to all who are quick-tempered.


    Therefore keep away from quick temper—that most wicked spirit—but clothe yourself with long-suffering, and stand against quick temper and bitterness, and you will be found with the dignity[9] that is beloved by the Lord. See to it, then, that you never forget[12] this command; for if you gain mastery of this command, you will also be able to keep the other commands that I am about to give you. Be strong in them and be empowered, and let all be empowered who wish to walk in them.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: 'Greek μακροθυμία: ‘long-suffering’—also ‘patience’ or ‘forbearance’. Kept here for its vivid contrast with a ‘quick temper’.'
    reason: lexical_alternative
  - marker: '[2]'
    text: ‘the holy spirit’ could be capitalized ‘the Holy Spirit’. Hermas’s moral-exhortation context favors a descriptive rendering.
    reason: lexical_alternative
  - marker: '[3]'
    text: ‘in a wide space’ echoes the image of roomy freedom for the indwelling spirit, contrasting with being ‘cramped’.
    reason: cultural_note
  - marker: '[4]'
    text: 'Greek λειτουργεῖν: ‘to minister (in sacred service)’. Alternative: ‘serve’.'
    reason: lexical_alternative
  - marker: '[5]'
    text: 'Greek εὐθηνία: ‘vitality, well-being, flourishing’. ‘Vitality’ chosen to avoid connotations of material prosperity.'
    reason: lexical_alternative
  - marker: '[6]'
    text: 'Greek ὀξυχολία: ‘quick temper, irascibility’. Emphasizes a ‘short fuse’.'
    reason: lexical_alternative
  - marker: '[7]'
    text: Wormwood (ἀψίνθιον) is a very bitter herb; a small amount ruins sweetness—here, a metaphor for quick temper corrupting long-suffering.
    reason: cultural_note
  - marker: '[8]'
    text: 'δεσπότης: ‘master/owner’, distinct from ‘Lord’ (κύριος).'
    reason: cultural_note
  - marker: '[9]'
    text: 'σεμνότης: ‘dignity, gravity, reverence’. ‘Dignity’ chosen for accessible yet elevated tone.'
    reason: lexical_alternative
  - marker: '[10]'
    text: ‘complete (faith)’ could be rendered ‘whole faith’.
    reason: lexical_alternative
  - marker: '[11]'
    text: ‘righteous spirit’ could be ‘right spirit’ or ‘spirit of righteousness’. The phrase contrasts with ‘evil spirits’.
    reason: lexical_alternative
  - marker: '[12]'
    text: 'παρενθυμηθῇς: literally ‘let slip from mind’. Rendered ‘forget’.'
    reason: lexical_alternative
  - marker: —
    text: The printed Greek in one line reads τῷ Θε rather than τῷ Θεῷ (‘to God’); context clearly supports Θεῷ.
    reason: textual_variant
  - marker: a
    text: Or 'Long-suffering must at all times have nothing bitter within it; it must remain always gentle and quiet.'.
    reason: previous_rendering
lexical_decisions:
- source_word: μακρόθυμος / μακροθυμία
  chosen: long-suffering
  alternatives:
  - patience
  - forbearance
  lexicon: BDAG; LSJ
  rationale: Maintains concrete contrast with ‘quick temper’; preserves the image of a ‘long temper’ rather than generic patience.
- source_word: συνετός
  chosen: sensible
  alternatives:
  - prudent
  - discerning
  lexicon: BDAG; LSJ
  rationale: Emphasizes sound practical judgment fitting the paraenetic context.
- source_word: κατακυριεύσεις
  chosen: gain mastery over
  alternatives:
  - exercise dominion over
  - have power over
  lexicon: BDAG
  rationale: Captures intensive sense of overcoming/control in ethical struggle.
- source_word: ἐργάσῃ πᾶσαν δικαιοσύνην
  chosen: do every work of righteousness
  alternatives:
  - perform all righteousness
  - practice all righteousness
  lexicon: BDAG
  rationale: Keeps concrete ‘do/work’ with ‘righteousness’ as a set of deeds.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the holy spirit
  alternatives:
  - the Holy Spirit
  lexicon: BDAG; Lampe
  rationale: Second-century usage often descriptive; lowercasing keeps focus on the indwelling holy spirit without importing later capitalization conventions.
- source_word: ἐπισκοτούμενον
  chosen: clouded
  alternatives:
  - darkened
  - overshadowed
  lexicon: LSJ
  rationale: Metaphor of obscuring/overcasting fits the contrast with purity and spaciousness.
- source_word: ἐν εὐρυχώρῳ
  chosen: in a wide space
  alternatives:
  - in a spacious place
  - with ample room
  lexicon: LSJ
  rationale: Preserves spatial metaphor of freedom/room for the indwelling spirit.
- source_word: σκεῦος
  chosen: vessel
  alternatives:
  - container
  - body
  lexicon: BDAG; LSJ
  rationale: Maintains the common anthropological metaphor for the person without flattening to ‘body’.
- source_word: λειτουργήσει
  chosen: minister (to God)
  alternatives:
  - serve
  - perform priestly service
  lexicon: BDAG; LSJ
  rationale: The verb carries cultic/ministerial nuance; ‘minister’ preserves that sacred-service sense.
- source_word: ἱλαρότητι πολλῇ
  chosen: much cheerfulness
  alternatives:
  - great gladness
  - great joy
  lexicon: BDAG; LSJ
  rationale: ‘Cheerfulness’ matches the semantic field of willing, joyful service.
- source_word: εὐθηνία
  chosen: vitality
  alternatives:
  - well-being
  - flourishing
  - prosperity
  lexicon: LSJ; Lampe
  rationale: Chooses a moral-spiritual ‘aliveness’ nuance rather than material prosperity.
- source_word: ὀξυχολία
  chosen: quick temper
  alternatives:
  - irascibility
  - quickness of anger
  lexicon: Lampe; LSJ
  rationale: Captures the idea of a ‘short fuse’ and fits the extended anger-chain.
- source_word: τρυφερὸν
  chosen: tender
  alternatives:
  - delicate
  - gentle
  lexicon: LSJ
  rationale: Highlights the holy spirit’s sensitivity to defilement and harshness.
- source_word: στενοχωρεῖται
  chosen: is cramped
  alternatives:
  - is distressed
  - is hemmed in
  lexicon: BDAG
  rationale: Pairs with the spaciousness earlier; communicates lack of room.
- source_word: ἀποστῆναι
  chosen: withdraw
  alternatives:
  - depart
  - stand away
  lexicon: BDAG
  rationale: Conveys deliberate separation from a defiled place.
- source_word: πνίγεται
  chosen: is choked
  alternatives:
  - is stifled
  - is strangled
  lexicon: BDAG; LSJ
  rationale: Strong image of being smothered by the evil spirit.
- source_word: μιαινόμενον
  chosen: being defiled
  alternatives:
  - being stained
  - being polluted
  lexicon: BDAG
  rationale: Ceremonial/moral pollution imagery is central to the argument.
- source_word: ἀσύμφορον
  chosen: unprofitable
  alternatives:
  - inexpedient
  - harmful
  lexicon: BDAG; LSJ
  rationale: Ethical-lament register; paired with ‘harmful’ in the clause.
- source_word: ἀψίνθιον
  chosen: wormwood
  alternatives:
  - bitterness-herb
  lexicon: LSJ
  rationale: Standard plant name; preserves bitter connotation known in biblical literature.
- source_word: κεράμιον (μέλιτος)
  chosen: jar (of honey)
  alternatives:
  - earthenware jar
  - pot
  lexicon: LSJ
  rationale: ‘Jar’ is idiomatic and keeps the domestic image clear.
- source_word: δεσπότης
  chosen: master
  alternatives:
  - owner
  - lord
  lexicon: BDAG; LSJ
  rationale: Avoids confusion with ‘Lord’ (κύριος) and preserves authority nuance.
- source_word: εὔχρηστος / εὔχρηστον
  chosen: serviceable
  alternatives:
  - useful
  - fit for use
  lexicon: BDAG; LSJ
  rationale: Slightly elevated diction matching the moral instruction register.
- source_word: γλυκυτάτη
  chosen: sweeter
  alternatives:
  - very sweet
  - sweetest
  lexicon: LSJ
  rationale: Comparative-to-superlative sense in context over against honey.
- source_word: πικρὰ καὶ ἄχρηστος
  chosen: bitter and useless
  alternatives:
  - bitter and of no use
  lexicon: BDAG
  rationale: Plain moral evaluation; matches the honey analogy.
- source_word: πραεῖα καὶ ἡσύχιος
  chosen: gentle and quiet
  alternatives:
  - meek and tranquil
  lexicon: BDAG; LSJ
  rationale: Keeps common moral pair without archaic ‘meek’.
- source_word: ὁλόκληρον (τὴν πίστιν)
  chosen: complete (faith)
  alternatives:
  - whole (faith)
  - entire
  lexicon: BDAG
  rationale: ‘Complete’ is natural English while preserving the idea of wholeness.
- source_word: θυμός / ὀργή / μῆνις
  chosen: anger / wrath / rage
  alternatives:
  - passion / anger / fury
  lexicon: BDAG; LSJ
  rationale: Retains a climactic escalation in English parallel to Greek sequence.
- source_word: ἀγγεῖον
  chosen: vessel
  alternatives:
  - container
  lexicon: LSJ
  rationale: Consistent with earlier ‘vessel’ as the person.
- source_word: ὑπερπλεονάζει
  chosen: overflows
  alternatives:
  - runs over
  - exceeds
  lexicon: LSJ
  rationale: Concrete image of exceeding capacity.
- source_word: σκληρότης
  chosen: hardness
  alternatives:
  - harshness
  lexicon: BDAG; LSJ
  rationale: Pairs well with ‘tender’ spirit; moral roughness.
- source_word: πνεῦμα δικαῖον
  chosen: righteous spirit
  alternatives:
  - right spirit
  - spirit of righteousness
  lexicon: BDAG; Lampe
  rationale: Keeps adjectival force and echoes moral quality without forcing a technical title.
- source_word: ἀκαταστατεῖ
  chosen: is unstable
  alternatives:
  - is in confusion
  - is disorderly
  lexicon: BDAG
  rationale: Describes a life thrown into disorder by evil spirits.
- source_word: περισπώμενος
  chosen: dragged
  alternatives:
  - pulled about
  - tugged
  lexicon: BDAG; LSJ
  rationale: Vividly depicts being yanked here and there by competing impulses.
- source_word: ἀποτυφλοῦται
  chosen: is blinded
  alternatives:
  - is made utterly blind
  lexicon: BDAG
  rationale: Moral/spiritual blindness; ‘altogether’ expressed in the clause.
- source_word: ἀπέχου
  chosen: keep away from
  alternatives:
  - abstain from
  lexicon: BDAG
  rationale: Direct imperative with moral distance.
- source_word: ἔνδυσαι
  chosen: clothe yourself (with)
  alternatives:
  - put on
  lexicon: BDAG
  rationale: Common moral metaphor of virtue as clothing.
- source_word: ἀντίστα
  chosen: stand against
  alternatives:
  - resist
  lexicon: BDAG
  rationale: Keeps the confrontational nuance without importing NT phraseology.
- source_word: σεμνότης
  chosen: dignity
  alternatives:
  - gravity
  - reverence
  - holy seriousness
  lexicon: BDAG; LSJ
  rationale: Conveys noble seriousness beloved by the Lord; ‘gravity’ feels archaic.
- source_word: παρενθυμηθῇς
  chosen: forget (let slip from mind)
  alternatives:
  - disregard
  - lose sight of
  lexicon: LSJ
  rationale: Captures the warning against letting the command pass out of mind.
- source_word: κυριεύσῃς (τῆς ἐντολῆς)
  chosen: gain mastery (of the command)
  alternatives:
  - take command of
  - prevail in
  lexicon: BDAG
  rationale: Carries the idea of exercising control over one’s adherence to the command.
