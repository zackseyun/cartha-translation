theological_decisions:
- issue: Rendering and capitalization of τὸ πνεῦμα τὸ ἅγιον
  chosen_reading: the holy spirit (lowercase)
  alternative_readings:
  - the Holy Spirit
  rationale: Hermas speaks of the indwelling holy spirit in moral terms and with sensitivity imagery. Using lowercase ‘holy spirit’ reflects descriptive force without denying later doctrinal development. Capitalized alternative noted for readers.
- issue: λειτουργεῖν ‘to God’
  chosen_reading: minister to God
  alternative_readings:
  - serve God
  rationale: The cultic/ministerial nuance of λειτουργεῖν is significant for Hermas’s temple/church imagery; ‘minister’ preserves sacred-service resonance rather than generic service.
- issue: θεός vs κύριος vs δεσπότης
  chosen_reading: ‘Lord’ for κύριος, ‘God’ for θεός, ‘master’ for δεσπότης
  rationale: Maintains distinctions in titles to avoid conflating ‘Lord’ with ‘master’ within the metaphor (honey/master) and to keep covenantal resonance of ‘Lord’.
  doctrine_reference: 'DOCTRINE.md: Contested terms—κύριος → Lord'
- issue: ἁμαρτία μεγάλη καὶ ἀνίατος
  chosen_reading: a great and incurable sin
  alternative_readings:
  - a great and unhealable sin
  - a grievous and irremediable sin
  rationale: Retains the sobering moral diagnosis without softening; preserves Hermas’s strong warning about the end of the anger-chain.
- issue: ὁλόκληρος (τὴν πίστιν)
  chosen_reading: complete faith
  alternative_readings:
  - whole faith
  rationale: ‘Complete’ is clearer English while preserving wholeness; footnote records alternative.
