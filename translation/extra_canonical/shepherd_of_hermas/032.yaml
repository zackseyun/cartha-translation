id: HERM.M.5.i
reference: Shepherd of Hermas — Mandate 5, section i
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: 1. Μακρόθυμος, φησί, γίνου καὶ συνετός, καὶ πάντων τῶν πονηρῶν ἔργων κατακυριεύσεις καὶ ἐργάσῃ πᾶσαν δικαιοσύνην. 2. ἐὰν γὰρ μακρόθυμος ἔσῃ, τὸ πνεῦμα τὸ ἅγιον τὸ κατοικοῦν ἐν σοὶ καθαρὸν ἔσται, μὴ ἐπισκοτούμενον ὑπὸ ἑτέρου πονηροῦ πνεύματος, ἀλλ' ἐν εὐρυχώρῳ κατοικοῦν ἀγαλλιάσεται καὶ εὐφρανθήσεται μετὰ τοῦ σκεύους ἐν ᾧ κατοικεῖ, καὶ λειτουργήσει τῷ Θεῷ ἐν ἱλαρότητι πολλῇ, ἔχον τὴν εὐθηνίαν ἐν ἑαυτῷ. 3. ἐὰν δὲ ὀξυχολία τις ἐπέλθῃ, εὐθὺς τὸ πνεῦμα τὸ ἅγιον, τρυφερὸν ὄν, στενοχωρεῖται, μὴ ἔχον [τὸν] τόπον καθαρόν, καὶ ζητεῖ ἀποστῆναι ἐκ τοῦ τόπου· πνίγεται γὰρ ὑπὸ τοῦ πονηροῦ πνεύματος, μὴ ἔχον τόπον λειτουργῆσαι τῷ Κυρίῳ καθὼς βούλεται, μιαινόμενον ὑπὸ τῆς ὀξυχολίας. ἐν γὰρ τῇ μακροθυμίᾳ ὁ Κύριος κατοικεῖ, ἐν δὲ τῇ ὀξυχολίᾳ ὁ διάβολος. 4. ἀμφότερα οὖν τὰ πνεύματα ἐπὶ τὸ αὐτὸ κατοικοῦντα, ἀσύμφορόν ἐστιν καὶ πονηρὸν τῷ ἀνθρώπῳ ἐκείνῳ ἐν ᾧ κατοικοῦσιν. 5. ἐὰν γὰρ λαβὼν ἀψίνθιον μικρὸν εἰς κεράμιον μέλιτος ἐπιχέῃς, οὐχὶ ὅλον τὸ μέλι ἀφανίζεται, καὶ τοσοῦτον μέλι ὑπὸ τοῦ ἐλαχίστου ἀψινθίου
    ἀπόλλυται καὶ ἀπόλλυσι τὴν γλυκύτητα τοῦ μέλιτος, καὶ οὐκέτι τὴν αὐτὴν χάριν ἔχει παρὰ τῷ δεσπότῃ, ὅτι ἐπικράνθη καὶ τὴν χρῆσιν αὐτοῦ ἀπώλεσεν; ἐὰν δὲ εἰς τὸ μέλι μὴ βληθῇ τὸ ἀψίνθιον, γλυκὺ εὑρίσκεται τὸ μέλι καὶ εὔχρηστον γίνεται τῷ δεσπότῃ αὐτοῦ. 6. βλέπεις [οὖν] ὅτι ἡ μακροθυμία γλυκυτάτη ἐστὶν ὑπὲρ τὸ μέλι καὶ εὔχρηστός ἐστι τῷ Κυρίῳ, καὶ ἐν αὐτῇ κατοικεῖ. ἡ δὲ ὀξυχολία πικρὰ καὶ ἄχρηστός ἐστιν. ἐὰν οὖν μιγῇ ἡ ὀξυχολία τῇ μακροθυμίᾳ, μιαίνεται ἡ μακροθυμία, καὶ οὐκ εὔχρηστός ἐστι τῷ Θε ἐν παντὶ καιρῷ, μηδὲν ἐν ἑαυτῇ ἔχουσα πικρόν, παραμένουσα διὰ παντὸς πραεῖα καὶ ἡσύχιος. αὕτη οὖν ἡ μακροθυμία κατοικεῖ μετὰ τῶν τὴν πίστιν ἐχόντων ὁλόκληρον. 4. ἡ δὲ ὀξυχολία πρῶτον μὲν μωρά ἐστιν, ἐλαφρά τε καὶ ἄφρων. εἶτα ἐκ τῆς ἀφροσύνης γίνεται πικρία, ἐκ δὲ τῆς πικρίας θυμός, ἐκ δὲ τοῦ θυμοῦ ὀργή, ἐκ δὲ τῆς ὀργῆς μῆνις· εἶτα ἡ μῆνις ἐκ τοσούτων κακῶν συνισταμένη γίνεται ἁμαρτία μεγάλη καὶ ἀνίατος. 5. ὅταν γὰρ ταῦτα τὰ πνεύματα πάντα ἐν ἑνὶ ἀγγείῳ κατοικῇ, οὗ καὶ τὸ πνεῦμα τὸ ἅγιον κατοικεῖ,
    οὐ χωρεῖ τὸ ἄγγος ἐκεῖνο, ἀλλ' ὑπερπλεονάζει. 6. τὸ τρυφερὸν οὖν πνεῦμα, μὴ ἔχον συνήθειαν μετὰ πονηροῦ πνεύματος κατοικεῖν μηδὲ μετὰ σκληρότητος, ἀποχωρεῖ ἀπὸ τοῦ ἀνθρώπου τοῦ τοιούτου καὶ ζητεῖ κατοικεῖν μετὰ πραότητος καὶ ἡσυχίας. 7. εἶτα ὅταν ἀποστῇ ἀπὸ τοῦ ἀνθρώπου ἐκείνου οὗ κατοικεῖ, γίνεται ὁ ἄνθρωπος ἐκεῖνος κενὸς ἀπὸ τοῦ πνεύματος τοῦ δικαίου, καὶ τὸ λοιπὸν πεπληρωμένος τοῖς πνεύμασι τοῖς πονηροῖς ἀκαταστατεῖ ἐν πάσῃ πράξει αὐτοῦ, περισπώμενος ὧδε κἀκεῖ ἀπὸ τῶν πνευμάτων τῶν πονηρῶν, καὶ ὅλως ἀποτυφλοῦται ἀπὸ τῆς διανοίας τῆς ἀγαθῆς. οὕτως οὖν συμβαίνει πᾶσι τοῖς ὀξυχόλοις. 8. ἀπέχου οὖν ἀπὸ τῆς ὀξυχολίας, τοῦ πονηροτάτου πνεύματος· ἔνδυσαι δὲ τὴν μακροθυμίαν καὶ ἀντίστα τῇ ὀξυχολίᾳ καὶ τῇ πικρίᾳ, καὶ ἔσῃ εὑρισκόμενος μετὰ τῆς σεμνότητος τῆς ἠγαπημένης ὑπὸ τοῦ Κυρίου. βλέπε οὖν μήποτε παρενθυμηθῇς τὴν ἐντολὴν ταύτην· ἐὰν γὰρ ταύτης τῆς ἐντολῆς κυριεύσῃς, καὶ τὰς λοιπὰς ἐντολὰς δυνήσῃ φυλάξαι, ἅς σοι μέλλω ἐντέλλεσθαι. ἰσχυροῦ ἐν αὐταῖς καὶ ἐνδυναμοῦ, καὶ πάντες ἐνδυναμούσθωσαν
    ὅσοι ἐὰν θέλωσιν ἐν αὐταῖς πορεύεσθαι.
