theological_decisions:
- issue: Paradox of sorrow both wearing down the Spirit and saving
  chosen_reading: 'Retain the paradox: sorrow born of double‑minded failure grieves
    and wears down the Spirit, while sorrow after anger leading to repentance "seems
    to have salvation in it."'
  alternative_readings:
  - Smooth to one kind of sorrow good, one bad
  rationale: The Greek explicitly juxtaposes ἐκτρίβει and σώζει; preserving tension
    fits Hermas’s moral pedagogy and avoids flattening.
- issue: Rendering λυπεῖ τὸ πνεῦμα τὸ ἅγιον
  chosen_reading: '"Grieves the Holy Spirit" retained as a literal rendering of the
    Greek construction.'
  alternative_readings:
  - '"Saddens the holy spirit"'
  - '"Causes sorrow to the holy spirit"'
  rationale: Despite echoing NT phrasing, the Greek wording itself warrants the rendering;
    project policy prioritizes source over translation tradition.
- issue: 'Pneumatology: the Spirit dwelling, pleading, and departing'
  chosen_reading: 'Translate the anthropomorphic depiction straightforwardly: the
    indwelling Holy Spirit may plead with God and depart if continually afflicted.'
  alternative_readings:
  - Mitigate to metaphor (e.g., "its influence wanes")
  rationale: Hermas often speaks concretely about spiritual realities. Preserving
    the warning’s force and imagery reflects 2nd‑century texture.
- issue: μετανοεῖ translation choice
  chosen_reading: '"Repents" in this specific-sin context.'
  alternative_readings:
  - '"Changes his mind"'
  rationale: Per project policy, specific wrongdoing contexts take "repent" to preserve
    moral/penitential force.
  doctrine_reference: 'DOCTRINE.md: Contested terms – μετανοέω'
- issue: σάρξ rendered as "flesh"
  chosen_reading: Keep "flesh" rather than "body."
  alternative_readings:
  - '"Body"'
  rationale: Literal embodiment is in view; maintaining "flesh" preserves early-Christian
    idiom and links to broader anthropological vocabulary.
  doctrine_reference: 'DOCTRINE.md: Contested terms – σάρξ'
