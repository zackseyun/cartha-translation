translation:
  text: 'So listen, then, he says, you foolish one, how sorrow wears down the Holy
    Spirit and yet again saves. Whenever the double‑minded person sets himself to
    some deed and fails in it because of his double‑mindedness, this sorrow enters
    into the person and grieves the Holy Spirit and wears it down. Then again, when
    quick temper clings to a person about some matter and he becomes exceedingly embittered,
    once more sorrow enters into the heart of the one who gave way to quick temper,
    and he is pained over the deed he did and repents, because he worked evil. This
    sorrow, then, seems to have salvation in it, because having done the evil he repented.
    Therefore both actions grieve the Spirit: double‑mindedness, because it did not
    succeed in what it undertook; and quick temper grieves the Spirit, because it
    did the evil. Both, then, are grievous to the Holy Spirit—double‑mindedness and
    quick temper. Remove, therefore, sorrow from yourself, and do not afflict the
    Holy Spirit that dwells in you, lest it should plead with God and depart from
    you. For the Spirit of God that has been given into this flesh does not endure
    sorrow or anguish.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek verb for "wear down" (ektribō) can also mean "wear away" or "rub
      out," picturing attrition.
    reason: lexical_alternative
  - marker: b
    text: '"Double‑minded" (dipsychos) is a stock early‑Christian term for a divided
      or wavering inner life; see Hermas, Mandate 9.'
    reason: cross_reference
  - marker: c
    text: The rare noun oxucholia is rendered here "quick temper"; alternatives include
      "irascibility" or "sudden anger."
    reason: lexical_alternative
  - marker: d
    text: '"Plead with God" renders a verb for petition/intercession (entygchanō);
      "intercede with God" is another option.'
    reason: lexical_alternative
  - marker: e
    text: The term rendered "anguish" (stenochōria) can also be translated "distress"
      or "constraint," evoking a sense of inner constriction.
    reason: lexical_alternative
  - marker: f
    text: Hermas distinguishes harmful sorrow (born of double‑minded failure) from
      beneficial sorrow (born of remorse leading to repentance), even while warning
      that both sorts in different ways "grieve" the Spirit.
    reason: cultural_note
lexical_decisions:
- source_word: ἀνόητε
  chosen: foolish one
  alternatives:
  - senseless one
  - fool
  lexicon: LSJ
  rationale: Vocative of rebuke; "foolish one" preserves the direct address without
    importing later theological freight of "you fool" while retaining the severity.
- source_word: λύπη / λυπέω / λυπηρά
  chosen: sorrow / grieve / grievous
  alternatives:
  - grief / sadden / distressing
  - sorrow / make sorrowful / painful
  lexicon: BDAG
  rationale: Consistency across noun, verb, and adjective communicates the semantic
    field of emotional pain affecting the Spirit and the person; "grieve the Holy
    Spirit" is a straightforward rendering of λυπεῖ τὸ πνεῦμα τὸ ἅγιον.
- source_word: ἐκτρίβειν
  chosen: wear down
  alternatives:
  - wear away
  - rub out
  - destroy
  lexicon: LSJ
  rationale: Metaphor of abrasion/attrition fits the image of sorrow eroding the Holy
    Spirit’s active presence; "wear down" is vivid yet idiomatic.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the holy spirit
  - the sacred spirit
  lexicon: BDAG
  rationale: Standard English theological term; capitalization reflects established
    usage while translating the phrase literally.
- source_word: δίψυχος / διψυχία
  chosen: double‑minded / double‑mindedness
  alternatives:
  - wavering / wavering spirit
  - of two minds / divided mind
  lexicon: BDAG
  rationale: Key Hermas term carried over from early Christian moral vocabulary; "double‑mindedness"
    preserves the concrete image and established lexical link.
- source_word: ἐπιβάληται (πρᾶξιν)
  chosen: sets himself to (a deed)
  alternatives:
  - undertakes
  - lays his hand to
  - attempts
  lexicon: LSJ
  rationale: Middle/reflexive sense of ἐπιβάλλω with object of action; "sets himself
    to" keeps the purposeful undertone.
- source_word: πρᾶξις
  chosen: deed
  alternatives:
  - act
  - action
  - doing
  lexicon: BDAG
  rationale: Context emphasizes specific undertaken acts; "deed" fits Hermas’s moral
    cataloguing.
- source_word: ἀποτύχῃ
  chosen: fails (in it)
  alternatives:
  - misses (it)
  - fails to obtain
  lexicon: LSJ
  rationale: Common sense of fail to attain the intended outcome; "fails in it" mirrors
    the Greek construction.
- source_word: ὀξυχολία
  chosen: quick temper
  alternatives:
  - irascibility
  - sudden anger
  - hot temper
  lexicon: LSJ
  rationale: Rare noun denoting a sharp, sudden anger; "quick temper" is accessible
    and captures the swiftness and sharpness implied.
- source_word: κολληθῇ
  chosen: clings to
  alternatives:
  - sticks to
  - attaches to
  lexicon: BDAG
  rationale: Metaphor of adhesion conveys the way anger seizes and adheres to a person.
- source_word: λίαν πικρανθῇ
  chosen: becomes exceedingly embittered
  alternatives:
  - becomes very bitter
  - is greatly provoked
  lexicon: BDAG
  rationale: Passivized verb of bitterness with intensifier λίαν; "exceedingly embittered"
    keeps intensity and moral flavor.
- source_word: λυπεῖται ἐπὶ τῇ πράξει
  chosen: is pained over the deed
  alternatives:
  - grieves over the act
  - feels sorrow about what he did
  lexicon: BDAG
  rationale: Reflexive/emotional effect of sorrow directed toward the specific deed;
    "is pained" keeps the physical metaphor of grief.
- source_word: μετανοεῖ
  chosen: repents
  alternatives:
  - changes his mind
  lexicon: BDAG
  rationale: Specific-sin context; per project policy, "repents" is used where the
    action concerns wrongdoing and moral turning.
- source_word: δοκεῖ σωτηρίαν ἔχειν
  chosen: seems to have salvation (in it)
  alternatives:
  - appears to be saving
  - seems to lead to salvation
  lexicon: BDAG
  rationale: Preserves the evaluative nuance of δοκεῖ along with the concrete noun
    σωτηρία; "in it" clarifies English idiom.
- source_word: θλῖβε
  chosen: afflict
  alternatives:
  - distress
  - oppress
  - press hard
  lexicon: BDAG
  rationale: Imperative warning not to cause oppressive pressure to the Spirit; "afflict"
    matches the θλῖψις semantic field without over-modernizing.
- source_word: ἐντεύξηται τῷ θεῷ
  chosen: plead with God
  alternatives:
  - intercede with God
  - make petition to God
  lexicon: BDAG
  rationale: Maintains the forensic/petitionary nuance of ἐντυγχάνω; "plead" is vivid
    and fits the warning tone.
- source_word: ἀποστῇ
  chosen: depart
  alternatives:
  - withdraw
  - stand away
  lexicon: BDAG
  rationale: Common idiom for separation; direct and solemn.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - body
  lexicon: BDAG
  rationale: Literal physiological sense of human embodiment; per project policy,
    render σάρξ as "flesh" in literal contexts.
- source_word: ὑποφέρει
  chosen: endure
  alternatives:
  - bear
  - tolerate
  lexicon: BDAG
  rationale: Captures patience/forbearance nuance; "does not endure" fits negative
    warning.
- source_word: στενοχωρία
  chosen: anguish
  alternatives:
  - distress
  - constraint
  - narrowness
  lexicon: BDAG
  rationale: Semantic field of constriction and distress; "anguish" communicates internal
    constriction without duplicating "distress" already used for θλῖβω.
