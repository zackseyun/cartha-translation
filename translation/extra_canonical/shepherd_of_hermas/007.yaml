theological_decisions:
- issue: 'Salvation phrasing: “These have saved you, if you continue”'
  chosen_reading: Retain perfect + conditional (“These have saved you, if you continue
    in them”) to preserve Hermas’ synergy of present deliverance and the necessity
    of perseverance.
  alternative_readings:
  - Smooth to future (‘These will save you if you continue’)
  rationale: Hermas’ moral exhortation holds present rescue contingent on ongoing
    virtue; smoothing to future obscures this tension.
  doctrine_reference: Shepherd of Hermas’ paraenetic soteriology emphasizes perseverance
    and virtue as conditions for remaining in life.
- issue: Render ἐπιστρέφω as “return” rather than “repent”
  chosen_reading: Translate ἐπιστρεφομένοις as “those who return.”
  alternative_readings:
  - Render as “those who repent.”
  rationale: Hermas uses a cluster of terms for moral turning. Using “return” avoids
    conflating with μετανοέω and keeps the concrete image of turning back to the Lord.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension and lexical distinctives;
    avoid importing traditional wording when a distinct lemma is used.'
- issue: Reference to Eldad and Modat
  chosen_reading: 'Translate the citation formula literally: “as it is written in
    Eldad and Modat,” acknowledging a now-lost writing associated with Eldad and Medad.'
  alternative_readings:
  - Harmonize to ‘Eldad and Medad’ and reference Numbers 11 directly.
  rationale: Hermas cites a written source with this title. Preserving it respects
    the author’s horizon and signals an early-Christian reading milieu.
- issue: μνησικακία and moral causality
  chosen_reading: Render μνησικακία θάνατον κατεργάζεται as ‘Resentment produces death.’
  alternative_readings:
  - ‘Bearing grudges brings death,’ ‘Remembering wrongs works out death.’
  rationale: Keeps the stark moral causality without importing Pauline formulations,
    maintaining Hermas’ own ascetic-moral register.
