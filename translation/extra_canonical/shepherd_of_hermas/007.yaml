translation:
  text: 'But you, Hermas, no longer bear a grudge against your children, nor give
    up on your sister, so that they may be cleansed from their former sins. For they
    will be disciplined with righteous discipline, if you do not nurse resentment
    against them. Resentment produces death. And you, Hermas, have had great private
    tribulations because of the transgressions of your household, because you did
    not take concern for them, but became preoccupied and were entangled with your
    business dealings—the wicked ones.


    But what is saving you is that you did not depart from the living God, and your
    simplicity and great self‑control. These have saved you, if you continue in them;
    and they save all who do such things and who walk in guilelessness and simplicity.
    Such people prevail over every kind of wickedness and remain for eternal life.


    Blessed are all who practice righteousness; they will never be destroyed.


    And you shall say to Maximus: Look—tribulation is coming, if it seems good to
    you to deny again. The Lord is near to those who return, as it is written in Eldad
    and Modat, who prophesied to the people in the wilderness.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '“Nor give up on your sister”: ἐάω can mean leave/let go/allow. Here the
      sense is not permitting or abandoning her, but not forsaking her so that they
      may be cleansed.'
    reason: lexical_alternative
  - marker: b
    text: '“Disciplined with righteous discipline”: παιδεία includes both instruction
      and corrective training; hence ‘discipline.’'
    reason: lexical_alternative
  - marker: c
    text: '“The Lord is near to those who return, as it is written in Eldad and Modat”:
      Hermas appears to cite a writing known as Eldad and Modat. Eldad and Medad are
      named in Numbers 11:26–29 as prophesying among the people; some early Christians
      knew a (now lost) work under this title.'
    reason: cross_reference
  - marker: d
    text: '“If it seems good to you to deny again”: likely an admonition about denial
      of the faith under pressure; the object is implied in the Greek and left unstated.'
    reason: cultural_note
  - marker: e
    text: '“Those who return”: ἐπιστρέφω can also be rendered ‘turn back’ or, contextually,
      ‘repent’; we keep ‘return’ to preserve the distinct lexical choice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μνησικακήσῃς / μνησικακία
  chosen: bear a grudge / resentment
  alternatives:
  - remember wrongs
  - harbor resentment
  - spite
  lexicon: LSJ; Lampe (Patristic Greek Lexicon)
  rationale: μνησικακέω/μνησικακία denote the remembrance of wrongs and vindictive
    spirit. “Bear a grudge” and “resentment” convey concrete, relational spite more
    than abstract “malice.”
- source_word: ἐάσῃς (τὴν ἀδελφήν σου)
  chosen: give up on
  alternatives:
  - leave
  - allow
  - permit
  - neglect
  lexicon: LSJ
  rationale: ἐάω can mean leave/let go/allow. In context of pastoral care for kin,
    the sense is not mere permission but abandonment; “give up on” reflects not forsaking
    her so that they may be cleansed.
- source_word: καθαρισθῶσιν
  chosen: be cleansed
  alternatives:
  - be purified
  - be made clean
  lexicon: BDAG; LSJ
  rationale: Passive of καθαρίζω; ritual/moral cleansing is a common early Christian
    motif. “Be cleansed” maintains that texture.
- source_word: παιδευθήσονται… παιδείᾳ
  chosen: be disciplined… with righteous discipline
  alternatives:
  - be trained… with righteous instruction
  - be corrected… with just correction
  lexicon: BDAG; LSJ
  rationale: παιδεία is formative discipline (both instruction and correction). Retaining
    “discipline” preserves moral‑ascetic nuance in Hermas.
- source_word: θάνατον κατεργάζεται
  chosen: produces death
  alternatives:
  - brings about death
  - works out death
  lexicon: BDAG
  rationale: κατεργάζομαι = bring about, effect. “Produces” is clear and weighty without
    importing other Pauline phrasing.
- source_word: θλίψεις (ἰδιωτικὰς)
  chosen: tribulations (private)
  alternatives:
  - distresses
  - afflictions (personal)
  lexicon: BDAG; LSJ
  rationale: θλίψις in early Christian idiom is well rendered “tribulation.” ἰδιωτικός
    adds ‘private/personal’; kept explicitly to mirror the contrast with public trials.
- source_word: παραβάσεις
  chosen: transgressions
  alternatives:
  - offenses
  - violations
  lexicon: BDAG
  rationale: παράβασις conveys breach of a standard. “Transgressions” carries the
    moral-legal force.
- source_word: τοῦ οἴκου σου
  chosen: your household
  alternatives:
  - your house
  - your family
  lexicon: BDAG; LSJ
  rationale: Here οἶκος denotes the family unit. “Household” is precise and idiomatic.
- source_word: οὐκ ἐμέλησέ σοι περὶ αὐτῶν
  chosen: you did not take concern for them
  alternatives:
  - you did not care about them
  - you were not concerned for them
  lexicon: BDAG (μέλει)
  rationale: μέλει + dat. expresses active concern. “Take concern” fits the pastoral
    exhortation.
- source_word: παρενεθυμήθης
  chosen: became preoccupied
  alternatives:
  - were careless
  - forgot them
  - turned your thoughts aside
  lexicon: LSJ; Lampe
  rationale: Rare verb likely indicates turning one’s attention aside. “Became preoccupied”
    fits the contrast with neglecting the household.
- source_word: ταῖς πραγματείαις σου… ταῖς πονηραῖς
  chosen: your business dealings—the wicked ones
  alternatives:
  - your (wicked) business affairs
  - your evil occupations
  lexicon: LSJ
  rationale: πραγματεία = business/occupation; πονηραῖς modifies it. Rendering keeps
    both the economic and moral coloring.
- source_word: συνανεφύρης
  chosen: were entangled with
  alternatives:
  - mixed yourself up with
  - became involved in
  lexicon: LSJ (συμφύρω, ἐμφύρω – to mix, entangle)
  rationale: Form is difficult; sense is mingling oneself with. “Entangled” conveys
    moral involvement without over‑specifying the exact compound.
- source_word: μὴ ἀποστήναι… ἀπὸ Θεοῦ ζῶντος
  chosen: did not depart from the living God
  alternatives:
  - did not fall away from the living God
  - did not withdraw from the living God
  lexicon: BDAG (ἀφίστημι)
  rationale: Aorist infinitive of ἀφίστημι in a causal construction. Retain “living
    God” as a fixed biblical title.
- source_word: ἁπλότης
  chosen: simplicity
  alternatives:
  - singleness (of heart)
  - sincerity
  lexicon: BDAG; LSJ
  rationale: In Hermas, ἁπλότης connotes unmixed, straightforward character. “Simplicity”
    preserves that ascetic ideal.
- source_word: ἐγκράτεια
  chosen: self-control
  alternatives:
  - temperance
  - self-discipline
  lexicon: BDAG
  rationale: Standard rendering that carries moral asceticism without archaism.
- source_word: ἐμμένῃς
  chosen: continue (in them)
  alternatives:
  - abide
  - persist
  lexicon: BDAG
  rationale: Idiomatic for persevering in virtues. The parenthetical clarifies the
    implicit object.
- source_word: πορευομένους ἐν ἀκακίᾳ καὶ ἁπλότητι
  chosen: walk… in guilelessness and simplicity
  alternatives:
  - conduct themselves… in innocence and simplicity
  - live… in harmlessness and simplicity
  lexicon: BDAG; LSJ
  rationale: πορεύομαι for conduct; ἀκακία emphasizes lack of guile. “Walk” preserves
    biblical cadence.
- source_word: κατισχύουσιν
  chosen: prevail over
  alternatives:
  - overcome
  - are strong against
  lexicon: BDAG; LSJ
  rationale: κατισχύω = to be strong against, to prevail. “Prevail over” keeps the
    active victory nuance.
- source_word: παραμένουσιν εἰς ζωὴν αἰώνιον
  chosen: remain for eternal life
  alternatives:
  - continue into eternal life
  - abide unto eternal life
  lexicon: BDAG
  rationale: παραμένω + εἰς conveys ongoing continuance toward the goal. Retain the
    prepositional force rather than paraphrasing.
- source_word: μακάριοι
  chosen: Blessed
  alternatives:
  - Happy
  lexicon: BDAG; LSJ
  rationale: Beatitude formula; “Blessed” preserves traditional solemnity.
- source_word: ἐργαζόμενοι τὴν δικαιοσύνην
  chosen: practice righteousness
  alternatives:
  - do righteousness
  - work righteousness
  lexicon: BDAG
  rationale: Ἐργάζομαι + abstract noun suggests ongoing practice; “practice righteousness”
    is idiomatic and concrete.
- source_word: οὐ διαφθαρήσονται
  chosen: they will never be destroyed
  alternatives:
  - they will not be corrupted
  - they will not perish
  lexicon: BDAG; LSJ
  rationale: διαφθείρω can mean corrupt/destroy. “Destroyed” fits the antithesis to
    prevailing over wickedness; “never” renders ἕως αἰῶνος idiomatically.
- source_word: ἐρεῖς
  chosen: you shall say / you will say
  alternatives:
  - say (future)
  lexicon: BDAG
  rationale: Future indicative as directive; English future with modal tone fits.
- source_word: θλίψις (2nd occurrence)
  chosen: tribulation
  alternatives:
  - distress
  - affliction
  lexicon: BDAG; LSJ
  rationale: Maintain consistency with earlier use; here it anticipates persecution/trial.
- source_word: ἐάν σοι δοκῇ
  chosen: if it seems good to you
  alternatives:
  - if you think it proper
  - if it seems right to you
  lexicon: BDAG; LSJ (δοκέω)
  rationale: Captures the ironic conditional challenge in the admonition.
- source_word: ἀρνεῖσθαι
  chosen: to deny
  alternatives:
  - to renounce
  - to disown
  lexicon: BDAG
  rationale: Common ethical-religious term for denial of the Lord/faith; object is
    implied by context, so not supplied.
- source_word: Ἐγγὺς Κύριος
  chosen: The Lord is near
  alternatives:
  - Near is the Lord
  lexicon: BDAG; LSJ
  rationale: Keep title “Lord” per project standards; fronting preserved in English
    by standard word order.
- source_word: τοῖς ἐπιστρεφομένοις
  chosen: to those who return
  alternatives:
  - to those who turn back
  - to those who repent
  lexicon: BDAG
  rationale: ἐπιστρέφω emphasizes turning/returning. “Repent” would import the μετανοέω
    lexeme; we preserve distinct nuance.
- source_word: ὡς γέγραπται
  chosen: as it is written
  alternatives:
  - as it stands written
  lexicon: BDAG
  rationale: Citation formula introducing a known written source.
- source_word: ἐν τῷ Ἐλδὰδ καὶ Μωδὰτ
  chosen: in Eldad and Modat
  alternatives:
  - in Eldad and Medad
  lexicon: —
  rationale: Reflects the Greek form of the title of the cited work as in our source
    text; we retain it rather than harmonizing to Numbers’ spelling.
- source_word: τοῖς προφητεύσασιν ἐν τῇ ἐρήμῳ τῷ λαῷ
  chosen: who prophesied to the people in the wilderness
  alternatives:
  - who prophesied in the wilderness to the people
  lexicon: BDAG
  rationale: Keeps both the dative of advantage and the wilderness setting, echoing
    the tradition of Eldad and Modat.
