id: HERM.V.2.iii
reference: Shepherd of Hermas — Vision 2, section iii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Σὺ δέ, Ἑρμᾶ, μηκέτι μνησικακήσῃς τοῖς τέκνοις σου, μηδὲ τὴν ἀδελφήν σου ἐάσῃς,
    ἵνα καθαρισθῶσιν ἀπὸ τῶν προτέρων ἁμαρτιῶν αὐτῶν. παιδευθήσονται γὰρ παιδείᾳ δικαίᾳ,
    ἐὰν σὺ μὴ μνησικακήσῃς αὐτοῖς. μνησικακία θάνατον κατεργάζεται. σὺ δέ, Ἑρμᾶ, μεγάλας
    θλίψεις ἔσχες ἰδιωτικὰς διὰ τὰς παραβάσεις τοῦ οἴκου σου, ὅτι οὐκ ἐμέλησέ σοι
    περὶ αὐτῶν, ἀλλὰ παρενεθυμήθης καὶ ταῖς πραγματείαις σου συνανεφύρης ταῖς πονηραῖς.
    2. ἀλλὰ σῴζει σε τὸ μὴ ἀποστήναι σε ἀπὸ Θεοῦ ζῶντος, καὶ ἡ ἁπλότης σου καὶ ἡ πολλὴ
    ἐγκράτεια· ταῦτα σέσωκέν σε, ἐὰν ἐμμένῃς, καὶ πάντας σῴζει τοὺς τὰ τοιαῦτα ἐργαζομένους
    καὶ πορευομένους ἐν ἀκακίᾳ καὶ ἁπλότητι. οὗτοι κατισχύουσιν πάσης πονηρίας καὶ
    παραμένουσιν εἰς ζωὴν αἰώνιον. 3. μακάριοι πάντες οἱ ἐργαζόμενοι τὴν δικαιοσύνην·
    οὐ διαφθαρήσονται ἕως αἰῶνος. 4. ἐρεῖς δὲ Μαξίμῳ· Ἰδοὺ θλίψις ἔρχεται, ἐάν σοι
    δοκῇ πάλιν ἀρνεῖσθαι. Ἐγγὺς Κύριος τοῖς ἐπιστρεφομένοις, ὡς γέγραπται ἐν τῷ Ἐλδὰδ
    καὶ Μωδὰτ, τοῖς προφητεύσασιν ἐν τῇ ἐρήμῳ τῷ λαῷ.
  language: Greek
