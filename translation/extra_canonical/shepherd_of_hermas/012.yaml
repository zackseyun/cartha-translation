theological_decisions:
- issue: Status of the six builders as 'the first-created' angels (οἱ πρῶτοι κτισθέντες)
  chosen_reading: Render literally as 'the first-created', indicating primacy in creation
    among the angels.
  alternative_readings:
  - '''first in rank'' (qualitative)'
  - '''first appointed'' (functional)'
  rationale: The participle κτισθέντες most naturally denotes having been created;
    Hermas elsewhere ranks angelic beings. The literal reading preserves his angelology
    without importing later systematic constraints.
- issue: Scope of angelic stewardship over creation (πᾶσαν τὴν κτίσιν… δεσπόζειν τῆς
    κτίσεως πάσης)
  chosen_reading: 'Cosmic scope: the angels are entrusted with all creation to foster
    growth, build, and rule it.'
  alternative_readings:
  - Restrict to ecclesial sphere ('creation' = church)
  rationale: The repetition of κτίσις with πᾶσα ('all') and the triad of infinitives
    suggests a broad stewardship, not merely ecclesial administration.
- issue: Rendering of κύριος
  chosen_reading: '''Lord'''
  alternative_readings:
  - '''Master'''
  rationale: Per project policy, κύριος as a divine title is rendered 'Lord'; 'Master'
    could confuse with δεσπόζειν and modern connotations.
  doctrine_reference: COB Translation Philosophy §Contested terms
- issue: Translation of διψύχους
  chosen_reading: '''double-minded'''
  alternative_readings:
  - '''wavering'', ''of two minds'''
  rationale: '''Double-minded'' is a recognized early Christian moral term capturing
    inner division; it also resonates with Hermas'' paraenetic emphasis without importing
    NT phrasing wholesale.'
- issue: '''Nothing is outside the truth'' (οὐθὲν ἔξωθέν ἐστιν τῆς ἀληθείας)'
  chosen_reading: Maintain the absolute-sounding claim as stated.
  alternative_readings:
  - '''Nothing deviates from the truth'''
  rationale: Hermas asserts the reliability of the visions against doubters. The spatial
    metaphor 'outside' intensifies the claim and fits his imagery-laden style.
