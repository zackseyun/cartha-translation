id: HERM.V.3.iv
reference: Shepherd of Hermas — Vision 3, section iv
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ἀποκριθεὶς λέγω αὐτῇ· Κυρία, μεγάλως καὶ θαυμαστῶς ἔχει τὸ πρᾶγμα τοῦτο. οἱ
    δὲ νεανίσκοι οἱ ἓξ οἱ οἰκοδομοῦντες τίνες εἰσίν, κυρία; Οὗτοί εἰσιν οἱ ἅγιοι ἄγγελοι
    τοῦ Θεοῦ οἱ πρῶτοι κτισθέντες, οἷς παρέδωκεν ὁ Κύριος πᾶσαν τὴν κτίσιν αὐτοῦ,
    αὔξειν καὶ οἰκοδομεῖν καὶ δεσπόζειν τῆς κτίσεως πάσης. διὰ τούτων οὖν τελεσθήσεται
    ἡ οἰκοδομὴ τοῦ πύργου. 2. Οἱ δὲ ἕτεροι οἱ παραφέροντες τοὺς λίθους τίνες εἰσίν;
    Καὶ αὐτοὶ ἅγιοι ἄγγελοι τοῦ Θεοῦ· οὗτοι δὲ οἱ ἓξ ὑπερέχοντες αὐτούς εἰσιν. συντελεσθήσεται
    οὖν ἡ οἰκοδομὴ τοῦ πύργου, καὶ πάντες ὁμοῦ εὐφρανθήσονται κύκλῳ τοῦ πύργου καὶ
    δοξάσουσιν τὸν Θεόν, ὅτι ἐτελέσθη ἡ οἰκοδομὴ τοῦ πύργου. 3. ἐπηρώτησα αὐτὴν λέγων·
    Κυρία, ἤθελον γνῶναι τῶν λίθων τὴν ἔξοδον καὶ τὴν δύναμιν αὐτῶν, ποταπή ἐστιν.
    ἀποκριθεῖσά μοι λέγει· Οὐχ ὅτι σὺ ἐκ πάντων ἀξιώτερος εἶ ἵνα σοι ἀποκαλυφθῇ· ἄλλοι
    γάρ σου πρότεροι εἰσιν καὶ βελτίονές σου, οἷς ἔδει ἀποκαλυφθῆναι τὰ ὁράματα ταῦτα·
    ἀλλ’ ἵνα δοξασθῇ τὸ ὄνομα τοῦ Θεοῦ, σοὶ ἀπεκαλύφθη καὶ ἀποκαλυφθήσεται διὰ τοὺς
    διψύχους, τοὺς διαλογιζομένους ἐν ταῖς καρδίαις αὐτῶν εἰ ἄρα ἔστιν ταῦτα ἢ οὐκ
    ἔστιν. λέγε αὐτοῖς ὅτι ταῦτα πάντα ἐστὶν ἀληθῆ, καὶ οὐθὲν ἔξωθέν ἐστιν τῆς ἀληθείας,
    ἀλλὰ πάντα ἰσχυρὰ καὶ βέβαια καὶ τεθεμελιωμένα ἐστίν.
