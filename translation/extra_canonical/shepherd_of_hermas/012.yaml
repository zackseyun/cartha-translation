translation:
  text: 'I answered and said to her, "Lady, this matter is great and marvelous. And
    the six young men who are building—who are they, Lady?"


    She said, "These are the holy angels of God, the first-created,[1] to whom the
    Lord entrusted all his creation—to make it grow and to build it up and to rule
    over all creation. By these, therefore, the building of the tower[5] will be brought
    to completion.[4]"


    2. "And the others who are carrying the stones—who are they?"


    "They too are holy angels of God; but these six are superior to them. The building
    of the tower, then, will be brought to completion, and all together will rejoice
    around the tower and glorify God, because the building of the tower has been completed."


    3. I asked her, saying, "Lady, I wished to know the origin[2] of the stones and
    their power—what sort they are."


    She answered me and said, "It is not because you are more worthy than all that
    it is revealed to you; for there are others before you and better than you, to
    whom it was fitting that these visions should be revealed. But in order that the
    name of God might be glorified, it has been revealed to you and will be revealed,
    for the sake of the double-minded[3]—those who reason within their hearts whether
    these things are, or are not. Tell them that all these things are true, and nothing
    is outside the truth; rather, all are strong and sure and well-founded."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: '''First-created'' translates οἱ πρῶτοι κτισθέντες. Alternatives include
      ''first in rank'' or ''first appointed'', but the Greek participle naturally
      means ''created''.'
    reason: lexical_alternative
  - marker: '[2]'
    text: The word rendered 'origin' is ἔξοδος, which can mean 'coming forth' or 'issue';
      in context it refers to the stones' emergence and provenance.
    reason: lexical_alternative
  - marker: '[3]'
    text: '''Double-minded'' (διψύχος) appears in early Christian moral vocabulary;
      compare James 1:8; 4:8 for similar usage.'
    reason: cross_reference
  - marker: '[4]'
    text: Two related verbs are used for 'be brought to completion' in this section
      (τελεσθήσεται and συντελεσθήσεται), both conveying consummation of the work.
    reason: lexical_alternative
  - marker: '[5]'
    text: Within Hermas, the tower is the central symbol for the people of God being
      built; see Vision 3 overall for the imagery's development.
    reason: cross_reference
lexical_decisions:
- source_word: Κυρία
  chosen: Lady
  alternatives:
  - Madam
  - Mistress
  lexicon: BDAG; LSJ
  rationale: Respectful form of address to the female figure; "Lady" preserves dignity
    without implying ownership.
- source_word: νεανίσκοι
  chosen: young men
  alternatives:
  - youths
  - young fellows
  lexicon: BDAG
  rationale: Common Koine sense for male youths; avoids archaic tone while keeping
    age nuance.
- source_word: οἱ οἰκοδομοῦντες
  chosen: who are building
  alternatives:
  - who are constructing
  lexicon: BDAG
  rationale: Plain participial rendering keeps the building metaphor active.
- source_word: ἅγιοι ἄγγελοι
  chosen: holy angels
  alternatives:
  - holy messengers
  lexicon: BDAG
  rationale: Standard early Christian sense of ἄγγελος; "holy" kept as an attributive
    adjective.
- source_word: οἱ πρῶτοι κτισθέντες
  chosen: the first-created
  alternatives:
  - first in rank
  - first appointed
  lexicon: BDAG; LSJ
  rationale: Participial phrase naturally denotes sequence in creation; retained literally
    to reflect Hermas' angelology.
- source_word: παρέδωκεν
  chosen: entrusted
  alternatives:
  - handed over
  - delivered
  lexicon: BDAG
  rationale: In stewardship contexts παραδίδωμι conveys "entrust" (assign responsibility),
    fitting the angelic charge over creation.
- source_word: κτίσις
  chosen: creation
  alternatives:
  - created order
  - creaturely order
  lexicon: BDAG
  rationale: Default rendering for κτίσις; broad cosmic scope is explicit in "all
    creation".
- source_word: αὔξειν
  chosen: to make it grow
  alternatives:
  - to increase
  lexicon: BDAG
  rationale: Dynamic infinitive paraphrase keeps transitivity clear; the object is
    creation's growth.
- source_word: οἰκοδομεῖν
  chosen: to build it up
  alternatives:
  - to build
  lexicon: BDAG
  rationale: '"Build up" maintains the constructive nuance and ties to the tower imagery.'
- source_word: δεσπόζειν
  chosen: to rule over
  alternatives:
  - to be master of
  - to have dominion over
  lexicon: LSJ
  rationale: Idiomatic English for exercising lordship; avoids the slavery connotations
    of "master" in modern English.
- source_word: τελεσθήσεται
  chosen: will be brought to completion
  alternatives:
  - will be finished
  - will be completed
  lexicon: BDAG
  rationale: Passive form foregrounds the work's completion by agency (the angels)
    without overstating their independence.
- source_word: συντελεσθήσεται
  chosen: will be brought to completion
  alternatives:
  - will be completed
  - will be accomplished
  lexicon: BDAG
  rationale: Syn-prefixed cognate emphasizes culmination; same English rendering preserves
    sense, with note provided.
- source_word: οἱ παραφέροντες (τοὺς λίθους)
  chosen: who are carrying (the stones)
  alternatives:
  - who are bringing along
  - who are bearing
  lexicon: LSJ
  rationale: Parapherō here denotes transport; "carrying" is natural English.
- source_word: ὑπερέχοντες
  chosen: are superior (to them)
  alternatives:
  - are over them
  - excel them
  lexicon: BDAG
  rationale: Conveys comparative rank/status in clear English.
- source_word: εὐφρανθήσονται
  chosen: will rejoice
  alternatives:
  - will be gladdened
  - will be made joyful
  lexicon: BDAG
  rationale: Standard rendering for the deponent future passive of εὐφραίνω in Koine
    contexts.
- source_word: κύκλῳ
  chosen: around
  alternatives:
  - all around
  - in a circle around
  lexicon: LSJ
  rationale: Concise spatial preposition; context already implies circular gathering.
- source_word: ἐτελέσθη
  chosen: has been completed
  alternatives:
  - is finished
  - was completed
  lexicon: BDAG
  rationale: Aorist indicative with resultant sense in visionary report; perfect-like
    translation fits English idiom.
- source_word: ἔξοδος (τῶν λίθων)
  chosen: origin (of the stones)
  alternatives:
  - coming forth
  - issue
  lexicon: LSJ; Lampe
  rationale: Within Hermas' context of stones "coming out" for the tower, ἔξοδος denotes
    their emergence/origin; "origin" is concise.
- source_word: δύναμις
  chosen: power
  alternatives:
  - strength
  - capability
  lexicon: BDAG
  rationale: Default rendering; keeps the abstract noun's force.
- source_word: ἀξιώτερος
  chosen: more worthy
  alternatives:
  - more deserving
  - more qualified
  lexicon: BDAG
  rationale: Comparative of ἄξιος; "worthy" fits Hermas' moral register.
- source_word: πρότεροι
  chosen: before you
  alternatives:
  - earlier than you
  - prior to you
  lexicon: BDAG
  rationale: Temporal priority is emphasized; not necessarily rank.
- source_word: βελτίονες
  chosen: better
  alternatives:
  - more excellent
  - superior
  lexicon: LSJ
  rationale: Plain comparative of ἀγαθός via βελτίων; "better" suits tone.
- source_word: ἔδει
  chosen: it was fitting
  alternatives:
  - it was necessary
  - it was right
  lexicon: BDAG
  rationale: Hermas often uses ἔδει with the sense of propriety/fitness; "fitting"
    is slightly softer than "necessary."
- source_word: ὁράματα
  chosen: visions
  alternatives:
  - revelations
  lexicon: BDAG
  rationale: Maintains the visual aspect of the experiences described.
- source_word: δοξασθῇ
  chosen: be glorified
  alternatives:
  - be honored
  - be praised
  lexicon: BDAG
  rationale: Standard theologically-loaded rendering of δοξάζω.
- source_word: διψύχους
  chosen: double-minded
  alternatives:
  - of two minds
  - wavering
  lexicon: BDAG
  rationale: Conventional early Christian term; preserves moral diagnosis of inner
    division.
- source_word: διαλογιζομένους
  chosen: who reason
  alternatives:
  - who debate
  - who question
  lexicon: BDAG
  rationale: Keeps the sense of inward deliberation without importing adversarial
    tone.
- source_word: καρδία
  chosen: heart
  alternatives:
  - inner self
  - mind
  lexicon: BDAG
  rationale: Biblical/early Christian anthropological term; standard rendering.
- source_word: ἀληθῆ
  chosen: 'true'
  alternatives:
  - truthful
  - real
  lexicon: BDAG
  rationale: Plain adjective; no need for variation.
- source_word: ἔξωθεν
  chosen: outside
  alternatives:
  - apart from
  - external to
  lexicon: BDAG
  rationale: Metaphorical spatial preposition; "outside the truth" preserves Hermas'
    absolute claim.
- source_word: ἀλήθεια
  chosen: truth
  alternatives:
  - reality
  lexicon: BDAG
  rationale: Default theological term.
- source_word: ἰσχυρά
  chosen: strong
  alternatives:
  - powerful
  lexicon: BDAG
  rationale: Pairs well with βέβαια in English rhythm while retaining meaning.
- source_word: βέβαια
  chosen: sure
  alternatives:
  - firm
  - secure
  lexicon: BDAG
  rationale: Conveys stability/reliability alongside ἰσχυρά.
- source_word: τεθεμελιωμένα
  chosen: well-founded
  alternatives:
  - established
  - founded
  lexicon: BDAG
  rationale: Echoes building imagery; idiomatic English for a secure foundation.
