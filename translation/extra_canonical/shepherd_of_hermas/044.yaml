translation:
  text: 'But I do not know whether these commandments can be kept by a human being, for they are very hard.


    In reply he says to me: “If you set it before yourself that they can be kept, you will keep them easily, and they will not be hard. But if it has already risen up in your heart that they cannot be kept by a human being, you will not keep them.


    Now I say to you: if you do not keep these, but only remember them in passing, you will walk in the commandments of the devil—difficult and bitter and savage and licentious. And do not be afraid of the devil, for he has no power against you; for I will be with you—I, the angel of repentance—who has mastery over him. The devil has only fear, and his fear has no strength. Do not therefore be afraid of him, and he will flee from you.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek here reads awkwardly: οὐχ οἱ ταῖς ἐντολαῖς πορευόμενοι τοῦ διαβόλου (‘not those who walk in the commandments of the devil’). Many editors construe or emend to yield ‘you will walk in the commandments of the devil’; this draft adopts that sense to fit the warning.'
    reason: textual_variant
  - marker: b
    text: ‘Remember them in passing’ renders παρενθυμηθῇς, which can mean to recall incidentally or fail to keep in mind; the contrast is between keeping and mere occasional recollection.
    reason: lexical_alternative
  - marker: c
    text: 'τόνος literally ‘tension, tone’; in moral context conveys ‘strength/force’: hence ‘his fear has no strength.’'
    reason: lexical_alternative
  - marker: d
    text: ‘Has mastery over’ renders κατακυριεύων; alternatives include ‘overpowers’ or ‘rules over.’
    reason: lexical_alternative
  - marker: e
    text: Or 'He answered and said to me:'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐντολαί
  chosen: commandments
  alternatives:
  - commands
  - instructions
  lexicon: BDAG
  rationale: Hermas consistently frames moral directives as ἐντολαί; “commandments” preserves weight and continuity with his paraenetic register.
- source_word: τηρῆσαι / φυλαχθῆναι / φυλάξεις
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: BDAG
  rationale: For moral precepts, “keep” is idiomatic English and captures both guarding and observing. Retained consistently across cognates in the unit.
- source_word: σκληραί
  chosen: hard
  alternatives:
  - harsh
  - severe
  - difficult
  lexicon: BDAG
  rationale: In context the issue is difficulty in keeping; “hard” communicates practical difficulty without over-toning harshness.
- source_word: προθῇς (προτίθημι)
  chosen: set it before yourself
  alternatives:
  - resolve
  - purpose in yourself
  - decide
  lexicon: BDAG
  rationale: “Set before yourself” preserves the internal, volitional imagery of placing a resolve in one’s own mind.
- source_word: ἐπὶ τὴν καρδίαν … ἀναβῇ
  chosen: has … risen up in your heart
  alternatives:
  - has entered your heart
  - has come up in your heart
  lexicon: BDAG
  rationale: Keeps the metaphorical upward movement into the heart; preserves Hermas’s concrete phrasing.
- source_word: παρενθυμηθῇς
  chosen: remember … in passing
  alternatives:
  - forget (neglect)
  - only think of them occasionally
  lexicon: LSJ
  rationale: The verb can mean to ‘remember incidentally’ or ‘forget/lose from mind’ depending on context; here contrasts keeping vs mere occasional recollection.
- source_word: πορευόμενοι
  chosen: walk
  alternatives:
  - go on
  - conduct themselves
  lexicon: BDAG
  rationale: Moral conduct is often framed as a “walk”; preserves paraenetic imagery rather than smoothing to abstract conduct.
- source_word: τοῦ διαβόλου (διάβολος)
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: Here functions as a proper designation for the personal evil opponent; “devil” is standard and clear.
- source_word: δυσκόλοις
  chosen: difficult
  alternatives:
  - hard
  - troublesome
  lexicon: LSJ
  rationale: Keeps parallel with prior ‘hard’ while allowing a list of qualities of the devil’s commandments.
- source_word: πικραῖς
  chosen: bitter
  alternatives:
  - harsh
  - painful
  lexicon: LSJ
  rationale: “Bitter” preserves the metaphorical taste-image common in moral description.
- source_word: ἀγρίαις
  chosen: savage
  alternatives:
  - wild
  - brutal
  lexicon: LSJ
  rationale: “Savage” communicates ferocity and untamed character suited to vices attributed to the devil.
- source_word: ἀσελγέσι
  chosen: licentious
  alternatives:
  - wanton
  - lewd
  lexicon: BDAG
  rationale: “Licentious” captures moral lawlessness with sexual overtones often associated with ἀσελγής.
- source_word: ἄγγελος τῆς μετανοίας
  chosen: angel of repentance
  alternatives:
  - angel of change of mind
  lexicon: BDAG
  rationale: This is a fixed title in Hermas; retaining “repentance” maintains the traditional, concrete moral-religious sense.
- source_word: κατακυριεύων
  chosen: has mastery over
  alternatives:
  - overpowers
  - rules over
  lexicon: BDAG
  rationale: Conveys effective dominion without implying sovereign rule; suits the context of restraining the devil.
- source_word: φόβον … τόνον οὐκ ἔχει
  chosen: fear … has no strength
  alternatives:
  - dread … has no force
  - fear … has no tension
  lexicon: LSJ
  rationale: τόνος in moral/psychological context = ‘force/strength’; “has no strength” communicates ineffectual fear.
- source_word: καθ’ ὑμῶν
  chosen: against you
  alternatives:
  - over you
  - with respect to you
  lexicon: BDAG
  rationale: Preposition κατά with genitive in adversative sense; ‘against you’ is the natural English idiom.
- source_word: φεύξεται ἀφ’ ὑμῶν
  chosen: he will flee from you
  alternatives:
  - he will run away from you
  lexicon: BDAG
  rationale: Conventional rendering of φεύγω with ἀπό; keeps the vividness of retreating enemy imagery.
