theological_decisions:
- issue: Human resolve and moral ability (“If you set it before yourself … you will keep them easily”)
  chosen_reading: 'Render straightforwardly as causal/conditional: one’s deliberate resolve enables ready keeping of the commandments.'
  alternative_readings:
  - Soften to God’s enabling or make implicit divine agency explicit
  rationale: Hermas’s moral psychology emphasizes intentionality without systematic theological caveats; we preserve his exhortatory force and tension.
- issue: Title “angel of repentance”
  chosen_reading: Translate literally as “angel of repentance” and treat as an angelic figure who assists and oversees repentance.
  alternative_readings:
  - Spiritualize as ‘message of repentance’ or identify with the Holy Spirit
  rationale: Hermas consistently personifies virtues/roles as angelic beings. Retaining the title guards the 2nd-century texture.
- issue: Devil’s impotence against the obedient
  chosen_reading: “He has no power against you … I will be with you … who has mastery over him.”
  alternative_readings:
  - Generalize to ‘evil’ or ‘temptation’ rather than the personal devil
  rationale: The text names the devil and asserts lack of authority over the obedient because of angelic aid; we keep the personal, apocalyptic framing.
- issue: Meaning of ‘his fear has no strength’
  chosen_reading: Translate τόνος as ‘strength/force,’ giving the sense that the devil’s fear (threats/terror) lacks effective power.
  alternative_readings:
  - Render ‘tension’ or ‘pitch’ (physical senses)
  rationale: Context is moral exhortation against fearing the devil; ‘strength’ fits idiomatically and theologically.
- issue: Problematic clause about walking in the devil’s commandments
  chosen_reading: Render as “you will walk in the commandments of the devil,” supplying the implied predicate and treating οἱ (who) rather than οὐχ (not) as the underlying sense.
  alternative_readings:
  - Translate strictly with ‘not’ and leave an incomplete prohibition
  rationale: The transmitted phrase likely reflects a scribal/typographical issue; the sense of warning requires positive predication. We adopt the coherent reading while documenting the issue.
- issue: Translation of μετάνοια in a title vs. cognitive nuance
  chosen_reading: Use ‘repentance’ (traditional) because it is a fixed title in Hermas and carries moral-renewal connotations beyond mere cognition.
  alternative_readings:
  - ‘Change of mind’ per cognitive rule
  rationale: The project’s rule allows context-based variance; here a title and Hermas’s usage favor the traditional moral-spiritual term.
  doctrine_reference: 'DOCTRINE.md: μετανοέω policy'
