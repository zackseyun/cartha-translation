book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Εἶπόν σοι, φησί, καὶ ἄρτι, ὅτι πανοῦργος εἶ καὶ αὐθάδης, ἐπερωτῶν τὰς ἐπιλύσεις τῶν παραβολῶν. ἐπειδὴ δὲ οὕτω παράμονος εἶ, ἐπιλύσω σοι τὴν παραβολὴν τοῦ ἀγροῦ καὶ τῶν λοιπῶν τῶν ἀκο αὐτοὺς τοῦ συντηρεῖν αὐτούς· καὶ αὐτὸς τὰς ἁμαρτίας αὐτῶν ἐκαθάρισε πολλὰ κοπιάσας καὶ πολλοὺς κόπους ἠντληκώς· οὐδεὶς γὰρ δύναται σκαφεῦσαι ἄτερ κόπου ἢ μόχθου. 3. αὐτὸς οὖν καθαρίσας τὰς ἁμαρτίας τοῦ λαοῦ ἔδειξεν αὐτοῖς τὰς τρίβους τῆς ζωῆς, δοὺς αὐτοῖς τὸν νόμον ὃν ἔλαβε παρὰ τοῦ πατρὸς αὐτοῦ. 4. βλέπεις, φησίν, ὅτι αὐτὸς κύριός ἐστι τοῦ λαοῦ, ἐξουσίαν πᾶσαν λαβὼν παρὰ τοῦ πατρὸς αὐτοῦ. ὅτι δὲ ὁ κύριος σύμβουλον ἔλαβε τὸν υἱὸν αὐτοῦ καὶ τοὺς ἐνδόξους ἀγγέλους περὶ τῆς κληρονομίας τοῦ δούλου, ἄκουε. 5. τὸ πνεῦμα τὸ ἅγιον τὸ προόν, τὸ κτίσαν πᾶσαν τὴν κτίσιν, κατῴκισεν ὁ Θεὸς εἰς σάρκα ἣν ἠβούλετο. αὕτη οὖν ἡ σάρξ, ἐν ᾗ κατῴκησε τὸ πνεῦμα τὸ ἅγιον, ἐδούλευσε τῷ πνεύματι καλῶς ἐν σεμνότητι καὶ ἁγνείᾳ πορευθεῖσα, μηδὲν ὅλως μιάνασα τὸ πνεῦμα. 6. πολιτευσαμένην οὖν αὐτὴν καλῶς καὶ ἁγνῶς καὶ συγκοπιάσασαν
    τῷ πνεύματι καὶ συνεργήσασαν ἐν παντὶ πράγματι, ἰσχυρῶς καὶ ἀνδρείως ἀναστραφεῖσαν, μετὰ τοῦ πνεύματος τοῦ ἁγίου εἵλατο κοινωνόν· ἤρεσε γὰρ [τῷ Κυρίῳ] ἡ πορεία τῆς σαρκὸς ταύτης, ὅτι οὐκ ἐμιάνθη ἐπὶ τῆς γῆς ἔχουσα τὸ πνεῦμα τὸ ἅγιον. 7. σύμβουλον οὖν ἔλαβε τὸν υἱὸν καὶ τοὺς ἀγγέλους τοὺς ἐνδόξους, ἵνα καὶ ἡ σὰρξ αὕτη, δουλεύσασα τῷ πνεύματι ἀμέμπτως, σχῇ τόπον τινὰ κατασκηνώσεως, καὶ μὴ δόξῃ τὸν μισθὸν τῆς δουλείας αὐτῆς ἀπολωλεκέναι· πᾶσα γὰρ σὰρξ ἀπολήψεται μισθὸν ἡ εὑρεθεῖσα ἀμίαντος καὶ ἄσπιλος, ἐν ᾗ τὸ πνεῦμα τὸ ἅγιον κατῴκησεν. 8. ἔχεις καὶ ταύτης τῆς παραβολῆς τὴν ἐπίλυσιν.
