translation:
  text: 'He says, “I told you just now that you are crafty and headstrong, for you ask for the interpretations of the parables. But since you are so insistent, I will interpret for you the parable of the field and the rest. He entrusted them to the angels to keep them; and he himself cleansed their sins, having labored much and endured many toils—for no one can dig without toil or labor.


    Therefore, having cleansed the sins of the people, he showed them the paths of life, giving them the law which he received from his Father. “You see,” he says, “that he himself is Lord of the people, having received all authority from his Father. And that the Lord took his Son and the glorious angels as counselors concerning the inheritance of the slave—listen.


    The Holy Spirit, which pre‑existed, which created all creation, God made to dwell in flesh that he willed. This flesh, then, in which the Holy Spirit dwelt, served the Spirit well, walking in modesty and purity, in no way at all defiling the Spirit. Therefore, having conducted itself well and purely, and having toiled together with the Spirit and cooperated in every matter, behaving with strength and courage, he chose it as partner with the Holy Spirit—for the course of this flesh pleased [the Lord], because it was not defiled upon the earth while having the Holy Spirit.


    Therefore he took the Son and the glorious angels as counselors, in order that this flesh also, having served the Spirit blamelessly, might have some place of dwelling, and might not seem to have lost the wage of its service. For every flesh that is found undefiled and unstained, in which the Holy Spirit has dwelt, will receive a wage. You have the interpretation of this parable also.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: The Greek at this point in our OCR is damaged. Many editions read that the Lord ‘entrusted them to the angels to keep them.’ We translate accordingly.
    reason: textual_variant
  - marker: '2'
    text: ‘Dig’ renders σκάφεῦσαι, keeping the field/labor metaphor active in the parable.
    reason: cultural_note
  - marker: '3'
    text: ‘The Holy Spirit, which pre‑existed’ translates τὸ πνεῦμα τὸ ἅγιον τὸ προόν. Alternatives include ‘the pre‑existent Holy Spirit’ or ‘the holy pre‑existent Spirit.’
    reason: lexical_alternative
  - marker: '4'
    text: ‘Place of dwelling’ renders τόπον τινὰ κατασκηνώσεως, an image of a settled abode; it anticipates reward imagery (‘wage’) in what follows.
    reason: cultural_note
  - marker: a
    text: Or '‘You see,’ he says, ‘that he himself is Lord of the people, having received all authority from his Father. And that the Lord took his Son and the glorious angels as counselor concerning the inheritance of the slave—listen.'.
    reason: previous_rendering
  - marker: b
    text: Or 'Therefore he took the Son and the glorious angels as counselor,'.
    reason: previous_rendering
lexical_decisions:
- source_word: πανοῦργος
  chosen: crafty
  alternatives:
  - shrewd
  - knavish
  - cunning
  lexicon: LSJ; BDAG
  rationale: Negative moral nuance in Hermas; ‘crafty’ conveys guile rather than prudence.
- source_word: αὐθάδης
  chosen: headstrong
  alternatives:
  - self-willed
  - arrogant
  lexicon: LSJ; BDAG
  rationale: Captures willful stubbornness without overreading as arrogance.
- source_word: ἐπίλυσις
  chosen: interpretation
  alternatives:
  - solution
  - explanation
  lexicon: BDAG
  rationale: Technical term for explaining parables; ‘interpretation’ is standard.
- source_word: παραβολή
  chosen: parable
  alternatives:
  - allegory
  lexicon: BDAG
  rationale: Hermas uses ‘parable’ language; avoid flattening to ‘allegory’.
- source_word: παράμονος
  chosen: insistent
  alternatives:
  - persistent
  - obstinate
  lexicon: LSJ
  rationale: Neutral-to-firm sense fits the shepherd’s tone without pejorative overload.
- source_word: ἀγρός
  chosen: field
  alternatives:
  - farm
  lexicon: BDAG
  rationale: Basic agricultural image; ‘field’ matches the parable setting.
- source_word: συντηρεῖν
  chosen: keep
  alternatives:
  - guard
  - preserve
  - watch over
  lexicon: BDAG
  rationale: Articular infinitive of purpose; ‘keep’ is concise while preserving the sense of safeguarding.
- source_word: σκάφεῦσαι
  chosen: dig
  alternatives:
  - hoe
  - break up the soil
  - trench
  lexicon: LSJ
  rationale: Agrarian metaphor; ‘dig’ is idiomatic and vivid.
- source_word: κόπος / μόχθος
  chosen: toil / labor
  alternatives:
  - hardship
  - wearisome effort
  lexicon: BDAG
  rationale: Pairing preserves the intensifying repetition in Greek.
- source_word: τρίβοι τῆς ζωῆς
  chosen: paths of life
  alternatives:
  - ways of life
  - roads of life
  lexicon: LSJ; BDAG
  rationale: ‘Paths’ retains the concrete metaphor and traditional idiom.
- source_word: νόμος
  chosen: law
  alternatives:
  - rule
  - commandment
  lexicon: BDAG
  rationale: Given ‘received from his Father,’ the giving of a ‘law’ fits Hermas’s moral-torah motif.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Covenantal title in Christian usage; context indicates exalted authority.
- source_word: σύμβουλον ἔλαβε
  chosen: took ... as counselor
  alternatives:
  - took into counsel
  - consulted with
  lexicon: BDAG; LSJ
  rationale: Idiomatic rendering of taking someone as a counselor.
- source_word: κληρονομία
  chosen: inheritance
  alternatives:
  - heritage
  lexicon: BDAG
  rationale: Legal/moral nuance of what is received; consistent with Hermas’s usage.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per project policy, retain the bonded status where salient in the parable.
- source_word: τὸ πνεῦμα τὸ ἅγιον τὸ προόν
  chosen: the Holy Spirit, which pre‑existed
  alternatives:
  - the holy pre‑existent Spirit
  - the pre‑existent Holy Spirit
  lexicon: BDAG; LSJ
  rationale: Relative clause keeps Greek structure and highlights pre-existence.
- source_word: κατῴκισεν ... εἰς σάρκα
  chosen: made to dwell in flesh
  alternatives:
  - caused to dwell in flesh
  - settled in flesh
  lexicon: BDAG
  rationale: Preserves agency of God and the indwelling concept.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - body
  lexicon: BDAG
  rationale: Literal sense maintained; Hermas contrasts ‘flesh’ with ‘Spirit’.
- source_word: σεμνότης
  chosen: modesty
  alternatives:
  - dignity
  - reverent conduct
  lexicon: BDAG; LSJ
  rationale: Early Christian virtue tone; pairs well with ‘purity’.
- source_word: ἁγνεία
  chosen: purity
  alternatives:
  - chastity
  lexicon: BDAG
  rationale: General moral purity suits the broader context beyond sexual chastity.
- source_word: μιάνω
  chosen: defile
  alternatives:
  - stain
  - pollute
  lexicon: BDAG
  rationale: Cultic/moral defilement language preserved.
- source_word: πολιτεύομαι / ἀναστρέφομαι
  chosen: conduct oneself / behave
  alternatives:
  - live
  - carry oneself
  lexicon: BDAG
  rationale: Keeps behavioral connotation without idiomatic smoothing.
- source_word: συγκοπιάω
  chosen: toil together with
  alternatives:
  - labor alongside
  - struggle with
  lexicon: LSJ
  rationale: Preserves the cooperative toil motif with the Spirit.
- source_word: συνεργέω
  chosen: cooperate
  alternatives:
  - work together
  - be a fellow worker
  lexicon: BDAG
  rationale: Straightforward rendering of collaborative action.
- source_word: ἰσχυρῶς καὶ ἀνδρείως
  chosen: with strength and courage
  alternatives:
  - strongly and manfully
  - boldly and stoutly
  lexicon: LSJ
  rationale: ‘Courage’ captures ἀνδρείως without archaic ‘manfully’.
- source_word: κοινωνός
  chosen: partner
  alternatives:
  - fellow‑sharer
  - companion
  lexicon: BDAG
  rationale: Conveys shared participation with the Holy Spirit.
- source_word: ἤρεσε [τῷ Κυρίῳ]
  chosen: it pleased [the Lord]
  alternatives:
  - was pleasing [to the Lord]
  lexicon: BDAG
  rationale: Reflects the editorial note in Greek and clarifies the implied subject.
- source_word: κατασκήνωσις
  chosen: place of dwelling
  alternatives:
  - lodging place
  - encampment
  lexicon: LSJ
  rationale: ‘Dwelling’ fits the eschatological settling motif better than ‘encampment’ in English.
- source_word: μισθός
  chosen: wage
  alternatives:
  - reward
  lexicon: BDAG
  rationale: Labor imagery (‘toil, dig’) is active; ‘wage’ preserves the metaphor.
- source_word: ἀπολήψεται
  chosen: will receive
  alternatives:
  - will obtain
  lexicon: BDAG
  rationale: Standard rendering for receiving a due or reward.
- source_word: ἀμίαντος καὶ ἄσπιλος
  chosen: undefiled and unstained
  alternatives:
  - unpolluted and spotless
  lexicon: BDAG
  rationale: Pairs two purity terms without collapsing nuance.
- source_word: ἐπίλυσις (v.8)
  chosen: interpretation
  alternatives:
  - solution
  - explanation
  lexicon: BDAG
  rationale: Consistency with earlier use.
