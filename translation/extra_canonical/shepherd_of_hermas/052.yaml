theological_decisions:
- issue: 'Christology: ‘the Holy Spirit, which pre‑existed … God made to dwell in flesh’'
  chosen_reading: Render the clauses as written, preserving the distinction between the pre‑existent Holy Spirit and ‘the flesh’ that served it, without harmonizing to later Trinitarian formulae.
  alternative_readings:
  - Interpret ‘Holy Spirit’ here as ‘Son of God’ and paraphrase accordingly
  - Conflate ‘Spirit’ and ‘flesh’ into a single subject to avoid perceived adoptionism
  rationale: Hermas’s idiom identifies the ‘Son of God’ with the Spirit elsewhere and speaks of the Spirit indwelling flesh; the translation keeps this tension rather than smoothing it doctrinally.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
- issue: Reference of ‘Lord’ in v.4 (‘he himself is Lord of the people’)
  chosen_reading: In context, ‘he’ refers to the Son, who ‘received all authority from his Father.’
  alternative_readings:
  - ‘Lord’ refers to God the Father
  rationale: The relative clause ‘having received all authority from his Father’ best fits the Son as subject.
- issue: δοῦλος (slave) vs. ‘servant’
  chosen_reading: Translate δοῦλος as ‘slave.’
  alternative_readings:
  - servant
  - bondservant
  rationale: Per Cartha policy, where bonded status is salient in an inheritance/custody parable, ‘slave’ is the most transparent rendering.
  doctrine_reference: 'DOCTRINE.md: Contested terms — δοῦλος.'
- issue: νόμος (‘law’)
  chosen_reading: Translate as ‘law.’
  alternative_readings:
  - commandment
  - rule
  rationale: The phrase ‘gave them the law which he received from his Father’ evokes a comprehensive moral rule rather than a single command; ‘law’ preserves the weight.
- issue: Subject of ‘he chose it as partner with the Holy Spirit’ (v.6)
  chosen_reading: Subject is God (‘[the Lord]’), object is the flesh; hence, ‘he [the Lord] chose it [the flesh] as partner with the Holy Spirit.’
  alternative_readings:
  - The Spirit chose the flesh as partner
  - The flesh chose the Spirit as partner
  rationale: The immediately following clause ‘for the course of this flesh pleased [the Lord]’ supports God as subject; editorial bracket in Greek also points this way.
