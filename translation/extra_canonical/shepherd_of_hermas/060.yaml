translation:
  text: '…with their whole heart. So then, do you suppose that the sins of those who
    are repenting are immediately forgiven? Not entirely. Rather, the one who repents
    must afflict his own soul and be humble-minded in all his conduct, resolutely,
    and be distressed in all kinds of tribulations; and if he bears the tribulations
    that come upon him, the One who created all things and strengthened them will
    surely be moved with compassion and will grant some healing. And this, when [God]
    sees the heart of the one repenting clean from everything.


    And an angel of the Lord—exceedingly glorious and very tall—was standing beside
    the willow, holding a great sickle, and he was cutting off branches from the willow
    and handing them to the people who were being sheltered by the willow; and he
    kept giving them little rods, about a cubit long.


    After all had received the rods, the angel laid aside the sickle, and that tree
    was sound, just as I had seen it before. I marveled within myself, saying, How
    is the tree sound, with so many branches cut off? The shepherd says to me, Do
    not marvel that the tree remained sound though so many branches were cut off.
    But wait until you see everything, and it will be shown to you what it is.


    The angel who had given the rods to the people again demanded them back from them;
    and as they had received them, so too they were called to him, and each one returned
    the rods. The angel of the Lord took them and examined them.


    From some he received the rods dry and eaten as if by a moth; the angel ordered
    those who had handed in such rods to stand apart. Others handed in dry rods, but
    they had not been eaten by a moth; these too he ordered to stand apart. Others
    handed in rods half-dry; and these stood apart. Others handed in their rods half-dry
    and having splits; and these stood apart. Others handed in their rods green and
    having splits; and these stood apart. Others handed in their rods half dry and
    half green; and these stood apart. Others presented their rods with two parts
    of the rod green and the third part dry; and these stood apart. Others handed
    in two parts dry and the third part green; and these stood apart. Others handed
    in their rods almost entirely green, but a very little of their rods was dry—at
    the very tip; and they had splits in them; and these stood apart.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: The normalized Greek here has ‘when [God] sees the heart of the one repenting
      clean from every …’ with the object incomplete. Many editions read ‘from every
      evil,’ making explicit what the sense implies.
    reason: textual_variant
  - marker: '[2]'
    text: The phrase ‘angel of the Lord’ at the start of the scene is implied by context;
      some lines in the source are damaged. Later in the unit the figure is explicitly
      called ‘the angel of the Lord.’
    reason: textual_variant
  - marker: '[3]'
    text: ‘Chastise’ translates a verb that can also mean ‘torment’ or ‘put to the
      test’ (βασανίζω). The sense here is self‑imposed discipline of the soul in repentance.
    reason: lexical_alternative
  - marker: '[4]'
    text: A ‘cubit’ is an ancient measure roughly the length of a forearm (about 18
      inches / 45 cm).
    reason: cultural_note
  - marker: '[5]'
    text: ‘As though eaten by a worm’ reflects σητός, a worm or wood‑borer that gnaws
      and hollows wood; ‘worm‑eaten’ is a common rendering.
    reason: lexical_alternative
  - marker: a
    text: Or 'clean in every respect'.
    reason: previous_rendering
lexical_decisions:
- source_word: μετανοέω (μετανοοῦντα/μετανοούντων)
  chosen: repent / the one who repents
  alternatives:
  - change one’s mind
  - turn back
  lexicon: BDAG / LSJ
  rationale: Context concerns moral wrongdoing and its forgiveness; Hermas’s paraenetic
    setting favors the traditional moral sense ‘repent’ rather than a purely cognitive
    ‘change of mind.’
- source_word: βασανίζω (βασανίσαι)
  chosen: chastise
  alternatives:
  - torment
  - punish
  - put to the test
  lexicon: BDAG / LSJ
  rationale: The verb can mean ‘torment’ or ‘test.’ In Hermas’s penitential context
    of self‑imposed discipline, ‘chastise his own soul’ communicates severity without
    implying sadistic torture; we note ‘torment’ as an alternative nuance.
- source_word: ταπεινοφρονέω (ταπεινοφρονῆσαι)
  chosen: be humble‑minded
  alternatives:
  - be lowly in mind
  - be humble
  lexicon: BDAG / LSJ
  rationale: Keeps the cognitive/moral posture of humility (‘-minded’) explicit, matching
    the compound’s emphasis on attitude pervading conduct.
- source_word: θλῖψις / θλίβω (θλιβῆναι … θλίψεσι ποικίλαις)
  chosen: be hard‑pressed in all kinds of tribulations
  alternatives:
  - be afflicted in manifold afflictions
  - undergo pressures of many kinds
  lexicon: BDAG
  rationale: Maintains the concrete ‘pressure/tribulation’ image and preserves the
    intensifier ‘of many kinds’ (ποικίλαις).
- source_word: ὑποφέρω (ὑπενέγκῃ)
  chosen: bears up under
  alternatives:
  - endure
  - sustain
  lexicon: BDAG
  rationale: ‘Bear up under’ renders the prefixal nuance of enduring what comes upon
    one; it also fits Hermas’s frequent endurance ethic.
- source_word: σπλαγχνίζομαι (σπλαγχνισθήσεται)
  chosen: will be moved with compassion
  alternatives:
  - will have pity
  - will show mercy
  lexicon: BDAG
  rationale: Preserves the visceral idiom of compassion while reading smoothly in
    contemporary English.
- source_word: κτίζω (ὁ τὰ πάντα κτίσας)
  chosen: the One who created all things
  alternatives:
  - the Creator of all things
  lexicon: BDAG / LSJ
  rationale: Formal yet clear; retains the participial description anchoring God’s
    identity in creation.
- source_word: ἐνδυναμόω (ἐνδυναμώσας)
  chosen: strengthened
  alternatives:
  - empowered
  - gave strength
  lexicon: BDAG
  rationale: Compact participial rendering that fits the asyndetic description of
    God’s actions; ‘strengthened’ preserves active agency.
- source_word: ἴασις (ἴασίν τινα)
  chosen: some healing
  alternatives:
  - a certain healing
  - relief
  lexicon: BDAG / LSJ
  rationale: Keeps the indefinite nuance (τινα) and the concrete word ‘healing’ rather
    than abstract ‘relief.’
- source_word: ἄγγελος Κυρίου
  chosen: angel of the Lord
  alternatives:
  - messenger of the Lord
  lexicon: BDAG
  rationale: Hermas’s visionary register uses angelic intermediaries; ‘angel’ is the
    natural choice here.
- source_word: δρέπανον
  chosen: sickle
  alternatives:
  - pruning‑knife
  - scythe
  lexicon: LSJ
  rationale: A hand‑held harvesting or pruning tool fits the scene; ‘sickle’ is idiomatic
    and concrete.
- source_word: ἰτέα
  chosen: willow
  alternatives:
  - willow‑tree
  lexicon: LSJ
  rationale: The common English tree name suffices; the scene’s shade imagery is preserved.
- source_word: ῥάβδος / ῥαβδίον (ῥαβδία)
  chosen: little rods
  alternatives:
  - small sticks
  - staves
  lexicon: LSJ
  rationale: Diminutive sense (‘little rods’) keeps size contrast with the willow’s
    branches and suits the later inspection.
- source_word: πηχυαῖος (ὡσεὶ πηχυαῖα)
  chosen: about a cubit in length
  alternatives:
  - forearm‑length
  - about a cubit long
  lexicon: LSJ
  rationale: Retains the ancient measure with an ‘about’ hedge; readers can approximate
    ~18 inches/45 cm.
- source_word: σητός (βεβρωμένας ὡς ὑπὸ σητός)
  chosen: as though eaten by a worm
  alternatives:
  - worm‑eaten
  - gnawed by a wood‑worm
  lexicon: LSJ
  rationale: Conveys visible decay; ‘worm‑eaten’ is an acceptable paraphrase, noted
    as an alternative.
- source_word: σχίσμα (σχισμὰς ἐχούσας)
  chosen: having splits
  alternatives:
  - having cracks
  - fissures
  lexicon: LSJ
  rationale: Physical ‘splits’ fits rods of wood; avoids theological overtones of
    ‘schism.’
- source_word: χλωρός
  chosen: green
  alternatives:
  - fresh
  lexicon: LSJ
  rationale: ‘Green’ is the natural opposite of ‘dry’ for wood imagery.
- source_word: ξηρός
  chosen: dry
  alternatives:
  - withered
  lexicon: LSJ
  rationale: ‘Dry’ matches the concrete state of wood; ‘withered’ would be more botanical
    than carpentry‑like.
