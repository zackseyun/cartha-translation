  text: ὅλης καρδίας αὐτῶν· τῶν οὖν μετανοούντων εὐθὺς δοκεῖς τὰς ἁμαρτίας ἀφίεσθαι;
    οὐ παντελῶς· ἀλλὰ δεῖ τὸν μετανοοῦντα βασανίσαι τὴν ἑαυτοῦ ψυχὴν καὶ ταπεινοφρονῆσαι
    ἐν πάσῃ πράξει αὐτοῦ ἰσχυρῶς καὶ θλιβῆναι ἐν πάσαις θλίψεσι ποικίλαις· καὶ ἐὰν
    ὑπενέγκῃ τὰς θλίψεις τὰς ἐπερχομένας αὐτῷ, πάντως σπλαγχνισθήσεται ὁ τὰ πάντα
    κτίσας καὶ ἐνδυναμώσας καὶ ἴασίν τινα δώσει· 5. καὶ τοῦτο ὅταν [ὁ Θεὸς] τοῦ μετανοοῦντος
    καθαρὰν ἴδῃ τὴν καρδίαν ἀπὸ παντὸς Κυρίου ἔνδοξος λίαν ὑψηλὸς παρὰ τὴν ἰτέαν,
    δρέπανον ἔχων μέγα, καὶ ἔκοπτε κλάδους ἀπὸ τῆς ἰτέας, καὶ ἐπεδίδου τῷ λαῷ τῷ σκεπαζομένῳ
    ὑπὸ τῆς ἰτέας· μικρὰ δὲ ῥαβδία ἐπεδίδου αὐτοῖς, ὡσεὶ πηχυαῖα. 3. μετὰ δὲ τὸ πάντας
    λαβεῖν τὰ ῥαβδία ἔθηκε τὸ δρέπανον ὁ ἄγγελος, καὶ τὸ δένδρον ἐκεῖνο ὑγιὲς ἦν οἷον
    καὶ ἑωράκειν αὐτό. 4. ἐθαύμαζον δὲ ἐγὼ ἐν ἐμαυτῷ λέγων· Πῶς τοσούτων κλάδων κεκομμένων
    τὸ δένδρον ὑγιές ἐστι; λέγει μοι ὁ ποιμήν· Μὴ θαύμαζε εἰ τὸ δένδρον ὑγιὲς ἔμεινε
    τοσούτων κλάδων κοπέντων. ἄφες δὲ ἕως πάντα ἴδῃς, καὶ δηλωθήσεταί σοι τὸ τί ἐστιν.
    5. ὁ ἄγγελος ὁ ἐπιδεδωκὼς τῷ λαῷ τὰς ῥάβδους πάλιν ἀπῄτει ἀπ᾽ αὐτῶν· καὶ καθὼς
    ἔλαβον, οὕτω καὶ ἐκαλοῦντο πρὸς αὐτόν, καὶ εἷς ἕκαστος αὐτῶν ἀπεδίδου τὰς ῥάβδους.
    ἐλάμβανε δὲ ὁ ἄγγελος τοῦ Κυρίου καὶ κατενόει αὐτάς. 6. παρά τινων ἐλάμβανε τὰς
    ῥάβδους ξηρὰς καὶ βεβρωμένας ὡς ὑπὸ σητός· ἐκέλευσεν ὁ ἄγγελος τοὺς τὰς τοιαύτας
    ῥάβδους ἐπιδεδωκότας χωρὶς ἵστασθαι. 7. ἕτεροι δὲ ἐπεδίδοσαν ξηράς, ἀλλ᾽ οὐκ ἦσαν
    βεβρωμέναι ὑπὸ σητός· καὶ τούτους ἐκέλευσε χωρὶς ἵστασθαι. 8. ἕτεροι δὲ ἐπεδίδουν
    ἡμιξήρους· καὶ οὗτοι χωρὶς ἵσταντο. 9. ἕτεροι δὲ ἐπεδίδουν τὰς ῥάβδους αὐτῶν ἡμιξήρους
    καὶ σχισμὰς ἐχούσας· καὶ οὗτοι χωρὶς ἵσταντο. 10. ἕτεροι δὲ ἐπεδίδουν τὰς ῥάβδους
    αὐτῶν χλωρὰς καὶ σχισμὰς ἐχούσας· καὶ οὗτοι χωρὶς ἵσταντο. 11. ἕτεροι δὲ ἐπεδίδουν
    τὰς ῥάβδους τὸ ἥμισυ ξηρὸν καὶ τὸ ἥμισυ χλωρόν· καὶ οὗτοι χωρὶς ἵσταντο. 12. ἕτεροι
    δὲ προσέφερον τὰς ῥάβδους αὐτῶν τὰ δύο μέρη τῆς ῥάβδου χλωρά, τὸ δὲ τρίτον ξηρόν·
    καὶ οὗτοι χωρὶς ἵσταντο. 13. ἕτεροι δὲ ἐπεδίδουν τὰ δύο μέρη ξηρά, τὸ δὲ τρίτον
    χλωρόν· καὶ οὗτοι χωρὶς ἵσταντο. 14. ἕτεροι δὲ ἐπεδίδουν τὰς ῥάβδους αὐτῶν παρὰ
    μικρὸν ὅλας χλωράς, ἐλάχιστον δὲ τῶν ῥάβδων αὐτῶν ξηρὸν ἦν, αὐτὸ τὸ ἄκρον· σχισμὰς
    δὲ εἶχον ἐν αὐταῖς· καὶ οὗτοι χωρὶς ἵσταντο.
