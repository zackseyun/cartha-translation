theological_decisions:
- issue: Rendering μετανοέω in Hermas’s penitential teaching
  chosen_reading: Repent (moral/volitional) rather than ‘change one’s mind’ (purely
    cognitive)
  alternative_readings:
  - change one’s mind
  - turn back
  rationale: The passage addresses forgiveness of sins and prescribes self‑humbling
    and endurance; Hermas treats repentance as concrete moral turning with ascetical
    fruit, not mere reconsideration.
  doctrine_reference: 'Cartha Translation Philosophy: contested terms — μετανοέω'
- issue: Temporal nuance of forgiveness (‘immediately forgiven?’)
  chosen_reading: ‘Not entirely,’ preserving the text’s tension that forgiveness is
    not automatic but tied to genuine, endured repentance
  alternative_readings:
  - ‘No,’ simple negation
  - ‘Not at all,’ absolute negation
  rationale: The Greek οὐ παντελῶς (‘not entirely/altogether’) signals qualified denial;
    we preserve Hermas’s penitential-synergy emphasis without importing later doctrinal
    harmonizations.
  doctrine_reference: 'Cartha Translation Philosophy: preserve theological tension'
- issue: ‘Angel of the Lord’ vs. ‘messenger’
  chosen_reading: Angel (supernatural messenger)
  alternative_readings:
  - Messenger (human/neutral)
  rationale: The visionary setting, glory, stature, and the role with a great sickle
    indicate a heavenly being; ‘angel’ fits the apocalyptic register.
