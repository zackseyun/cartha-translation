translation:
  text: 'While I was sitting in my house and glorifying the Lord for all the things
    I had seen, and pondering the commandments—how they are good and powerful and
    gladdening and glorious and able to save a person’s soul—I said within myself:
    “Blessed shall I be if I walk in these commandments, and whoever walks in these
    will be blessed.”


    As I was saying these things within myself, I suddenly see him seated beside me
    and saying this: “Why are you double‑minded about the commandments that I commanded
    you? They are good. Do not at all be double‑minded, but clothe yourself with faith
    in the Lord, and you will walk in them; for I will strengthen you in them.


    “These commandments are beneficial for those who are about to repent; for if they
    do not walk in them, their repentance is in vain.


    “You who are repenting, therefore, throw off the evils of this age that wear you
    down; and having put on every virtue of righteousness, you will be able to keep
    these commandments and no longer add to your sins. If, therefore, you add nothing
    further, you will be separated from your former sins. Walk, therefore, in these
    my commandments, and you will live for God. These things [all] have been spoken
    to you by me.”


    And after he had spoken these things with me, he says to me, “Let us go into a
    field, and I will show you the shepherds of the sheep.” “Let us go, sir,” I say.
    And we came to a certain plain, and he shows me a shepherd, a young man, clothed
    in an ensemble of garments, saffron in color.


    He was pasturing very many sheep, and the sheep were as if living in luxury and
    very self‑indulgent, and they were cheerful, skipping here and there. And the
    shepherd himself was very cheerful over his flock; and the very appearance of
    the shepherd was exceedingly cheerful, and he ran around among the sheep.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'clothe yourself with the Lord’s faith/faithfulness.' The Greek reads
      literally 'the faith of the Lord' (τὴν πίστιν τοῦ Κυρίου).
    reason: alternative_reading
  - marker: b
    text: 'Some witnesses include ''all'' (πάντα): ''These things all have been spoken
      to you by me.'''
    reason: textual_variant
  - marker: c
    text: Literally, 'you will live to God.'
    reason: lexical_alternative
  - marker: d
    text: Saffron‑colored clothing (κροκώδης) evoked costly dye and festivity/luxury
      in Greco‑Roman culture, fitting the scene’s emphasis on indulgence.
    reason: cultural_note
lexical_decisions:
- source_word: ἐντολή (τῶν ἐντολῶν)
  chosen: commandments
  alternatives:
  - commands
  - precepts
  lexicon: BDAG; LSJ
  rationale: Retains weighty moral register common in Hermas; plural preserved for
    the set of directives previously given.
- source_word: διψυχεῖν
  chosen: be double-minded
  alternatives:
  - waver
  - doubt
  lexicon: BDAG; LSJ
  rationale: Hermas uses the technical moral category of double‑mindedness; this preserves
    the concrete ethical idiom.
- source_word: πίστις (τὴν πίστιν τοῦ Κυρίου)
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Base sense rendered as 'faith'; genitive construed in theological decision.
    Kept as something one can 'put on' (clothe oneself with).
- source_word: πορεύομαι ἐν (ἐν αὐταῖς πορεύσῃ)
  chosen: walk in
  alternatives:
  - go in
  - live by
  lexicon: BDAG
  rationale: Ethical 'walk' idiom captures sustained conduct in/according to the commandments.
- source_word: σύμφοροι
  chosen: beneficial
  alternatives:
  - useful
  - advantageous
  - expedient
  lexicon: LSJ
  rationale: Conveys practical help/toward good; reads smoothly without losing sense
    of suitability.
- source_word: μετανοεῖν
  chosen: repent
  alternatives:
  - change one’s mind
  - turn back
  lexicon: BDAG
  rationale: Here the context is moral turning with soteriological stakes, not merely
    cognitive reconsideration; 'repent' preserves early‑Christian register.
- source_word: πονηρίαι τοῦ αἰῶνος τούτου
  chosen: evils of this age
  alternatives:
  - wickednesses of this age
  - vices of this age
  lexicon: BDAG
  rationale: Plural 'evils' keeps concrete multiplicity; 'this age' preserves apocalyptic
    two‑age contrast.
- source_word: ἐκτριβούσας
  chosen: wearing you down
  alternatives:
  - grinding you away
  - ruining
  - exhausting
  lexicon: LSJ
  rationale: Image of being abraded/worn away fits Hermas’s concrete exhortational
    style.
- source_word: ἀρετὴ δικαιοσύνης
  chosen: virtue of righteousness
  alternatives:
  - excellence of righteousness
  - righteous virtue
  lexicon: LSJ
  rationale: Maintains moral/ethical texture; 'virtue' is intelligible and faithful
    to ἀρετή.
- source_word: προστιθέναι ταῖς ἁμαρτίαις
  chosen: add to your sins
  alternatives:
  - heap up sins
  - increase your sins
  lexicon: BDAG; LSJ
  rationale: Literal phrasing preserves the cumulative image of further sinning.
- source_word: ἀποστήσεσθε ἀπό
  chosen: be separated from
  alternatives:
  - depart from
  - stand apart from
  lexicon: BDAG; LSJ
  rationale: Future middle here indicates resulting separation; 'be separated from'
    is clear and faithful.
- source_word: ζήσεσθε τῷ Θεῷ
  chosen: live for God
  alternatives:
  - live to God
  lexicon: BDAG
  rationale: Dative expresses orientation; 'for God' is idiomatic in English; alternative
    noted in footnote.
- source_word: ἀγρός / πεδίον
  chosen: field / plain
  alternatives:
  - countryside / open country
  lexicon: LSJ
  rationale: 'Keeps distinct terms: cultivated ''field'' versus open ''plain''.'
- source_word: σύνθεσιν ἱματίων
  chosen: ensemble of garments
  alternatives:
  - combination of garments
  - patchwork of clothes
  lexicon: LSJ
  rationale: σύνθεσις indicates a combination/arrangement; 'ensemble' conveys this
    without over‑specifying construction.
- source_word: κροκώδης
  chosen: saffron‑colored
  alternatives:
  - crocus‑colored
  - yellowish
  lexicon: LSJ
  rationale: κρόκος refers to saffron/crocus; 'saffron‑colored' is precise and culturally
    resonant.
- source_word: τρυφῶντα / σπαταλῶντα
  chosen: living in luxury / self‑indulgent
  alternatives:
  - living delicately / reveling
  - luxuriating / dissipated
  lexicon: LSJ
  rationale: Pair captures moral nuance of indulgence/extravagance in behavior.
- source_word: ἱλαρός (ἱλαραὶ; ἱλαρὸς)
  chosen: gladdening (of commandments) / cheerful (of persons/appearance)
  alternatives:
  - joy‑giving / joyful
  - pleasant / bright
  lexicon: LSJ
  rationale: Semantic range includes 'glad/cheerful'; differentiated by context to
    keep natural English while noting same lemma.
- source_word: σκιρτῶντα
  chosen: skipping
  alternatives:
  - frolicking
  - leaping
  lexicon: LSJ
  rationale: Concrete motion verb suits the lively scene.
- source_word: ἰδέα
  chosen: appearance
  alternatives:
  - aspect
  - look
  lexicon: LSJ
  rationale: Common Greek for outward look or form; 'appearance' is straightforward.
- source_word: κύριε (voc.)
  chosen: sir
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Polite address to the angelic figure; avoids confusion with the divine
    title 'the Lord' in proximate contexts.
