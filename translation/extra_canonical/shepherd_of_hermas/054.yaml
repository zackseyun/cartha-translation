theological_decisions:
- issue: Genitive in τὴν πίστιν τοῦ Κυρίου
  chosen_reading: 'Objective genitive: ''faith in the Lord'' (clothe yourself with
    faith directed toward the Lord)'
  alternative_readings:
  - 'Subjective genitive: ''the Lord’s faith/faithfulness'''
  rationale: The exhortation addresses Hermas’s wavering; urging him to adopt faith
    directed to the Lord best fits the immediate pastoral aim and the ensuing assurance,
    'you will walk in them.' The 'put on' metaphor can accommodate either reading;
    ambiguity noted in footnote.
  doctrine_reference: 'Contested terms: πίστις (Cartha policy on preserving ambiguity
    where relevant) '
- issue: Vocative κύριε addressed to the shepherd
  chosen_reading: Rendered 'sir'
  alternative_readings:
  - Rendered 'Lord'
  rationale: Maintains distinction between divine title 'the Lord' (v.1) and polite
    address to the angelic shepherd; reflects second‑century usage where κύριος can
    mean 'sir' depending on context.
- issue: ψυχή in 'able to save a person’s soul'
  chosen_reading: Render ψυχή as 'soul'
  alternative_readings:
  - life
  - self
  rationale: Hermas’s soteriological framework is explicit; retaining 'soul' preserves
    theological weight and early‑Christian moral tone, as opposed to flattening to
    'life.'
- issue: Syntactic address in οἱ οὖν μετανοοῦντες ἀποβάλλετε
  chosen_reading: 'Treats as direct address: ''You who are repenting, throw off…'''
  alternative_readings:
  - 'General third‑person: ''Those who repent must throw off…'''
  rationale: The nominative plural with 2nd‑person imperative functions vocatively;
    preserving direct address keeps Hermas’s hortatory force.
- issue: ζήσεσθε τῷ Θεῷ dative nuance
  chosen_reading: '''Live for God'''
  alternative_readings:
  - '''Live to God'''
  rationale: Dative can express orientation/advantage; 'for God' reads naturally in
    English without obscuring sense; alternative retained in footnote.
