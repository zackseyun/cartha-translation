translation:
  text: 'I say, "Sir[a], I do not understand these parables, nor am I able to grasp
    them unless you explain them[b] to me."


    He says, "I will explain everything to you, and whatever I speak with you I will
    show you. The one who has received the instructions of your prudence[c] will fill
    his own soul and will pray on your behalf to the Lord.


    "If, then, you complete the fast in this way as I commanded you, your sacrifice[h]
    will be acceptable with God, and this fast will be recorded[d]; and the service[e]
    performed in this way is good and cheerful[f] and welcome to the Lord.


    "You shall keep these things thus—you, with your children and your whole household;
    and having kept them you will be blessed; and as many as, on hearing them, keep
    them will be blessed—for from the Lord they will receive understanding[g], and
    it is from him that one receives it."


    I say to him, "Sir[a], since I have you with me, I must ask you and question you;
    for you show me everything and speak with me. But if apart from you I were seeing
    or hearing them, I would have asked the Lord to make them clear to me."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek κύριε here is a respectful form of address to the messenger; in this
      unit we render it "Sir" to distinguish it from references to God as "the Lord."
    reason: lexical_alternative
  - marker: b
    text: The verb ἐπιλύω means to explain or interpret symbolic sayings. "Explain"
      is chosen; "interpret" is an alternative.
    reason: lexical_alternative
  - marker: c
    text: The phrase translated "the instructions of your prudence" is textually uncertain
      in the OCR source; many editions of Hermas read a sense like "the one who has
      received from your fast will fill his soul and pray for you," tying the point
      explicitly to almsgiving from what one would have eaten.
    reason: textual_variant
  - marker: d
    text: '"Recorded" (ἔγγραφος) evokes the motif of deeds being written in a heavenly
      book or register.'
    reason: cultural_note
  - marker: e
    text: λειτουργία can be glossed "service," "ministry," or "liturgy." Here "service"
      is chosen to avoid suggesting only formal rites.
    reason: lexical_alternative
  - marker: f
    text: ἱλαρά can be rendered "cheerful," "glad," or "joyful." The emphasis is on
      the willing, pleasant disposition in doing works of mercy.
    reason: lexical_alternative
  - marker: g
    text: The Greek clause at this point ("from the Lord understanding ... and you
      receive from him") is irregular in the OCR and likely corrupt in punctuation
      or person; the sense taken is that those who keep the instruction receive understanding
      from the Lord.
    reason: textual_variant
  - marker: h
    text: θυσία is translated "sacrifice" to preserve the sacrificial imagery of fasting
      joined to almsgiving.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραβολὰς
  chosen: parables
  alternatives:
  - similitudes
  - allegories
  lexicon: LSJ; BDAG
  rationale: The immediate Greek term is "parables"; although this section of Hermas
    is traditionally called "Similitudes," rendering the word directly preserves the
    narrator's wording without importing later headings.
- source_word: ἐπιλύω / ἐπιλύσῃς
  chosen: explain
  alternatives:
  - interpret
  - resolve
  lexicon: BDAG
  rationale: In didactic/apocalyptic contexts, ἐπιλύω commonly means to explain or
    give the interpretation of a symbolic saying (cf. Danielic usage in the LXX).
    "Explain" communicates this clearly in English.
- source_word: νοεῖν
  chosen: grasp
  alternatives:
  - understand
  - perceive
  lexicon: BDAG; LSJ
  rationale: Chosen for idiomatic English that conveys cognitive apprehension; "understand"
    is also possible and is used elsewhere in the unit.
- source_word: κύριε (address to the messenger)
  chosen: Sir
  alternatives:
  - Lord
  lexicon: BDAG; LSJ
  rationale: Here the narrator addresses the angelic shepherd respectfully. In such
    interpersonal address, κύριε can mean "sir." We reserve "the Lord" for references
    to God in this unit to avoid theological confusion and to reflect usage nuance.
- source_word: Κύριον (object of prayer)
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: In the phrase "pray on your behalf to the Lord" the referent is God;
    the conventional English "the Lord" suits second-century Christian register.
- source_word: ἐντολάς
  chosen: instructions
  alternatives:
  - commandments
  - mandates
  lexicon: BDAG
  rationale: Semantically denotes commands; in this context, "instructions" reads
    more naturally with "prudence" and avoids confusion with the titled section "Mandates"
    elsewhere in Hermas.
- source_word: φροσύνη
  chosen: prudence
  alternatives:
  - good sense
  - wisdom
  lexicon: LSJ
  rationale: While the exact phrase is textually uncertain here, φροσύνη denotes practical
    wisdom or prudence; "prudence" preserves the ethical tone without importing later
    philosophical precision.
- source_word: ἐμπλήσῃ τὴν ἑαυτοῦ ψυχὴν
  chosen: fill his own soul
  alternatives:
  - be satisfied himself
  - fill himself
  lexicon: BDAG; LSJ
  rationale: Literal rendering keeps Hermas's concrete idiom and links to the motif
    of material provision satisfying the needy, with the spiritual benefit of intercession.
- source_word: εὔχομαι
  chosen: pray
  alternatives:
  - make a petition
  - pray earnestly
  lexicon: BDAG
  rationale: In Christian discourse, εὔχομαι regularly means to pray. "Pray" is concise
    and clear.
- source_word: νηστεία
  chosen: fast
  alternatives:
  - fasting
  lexicon: BDAG
  rationale: Context speaks of a specific act; "fast" functions well as a count noun
    here ("complete the fast").
- source_word: θυσία
  chosen: sacrifice
  alternatives:
  - offering
  lexicon: BDAG
  rationale: Hermas frames the rightly practiced fast as sacrificial worship. "Sacrifice"
    preserves the cultic register.
- source_word: δεκτός (παρὰ τῷ Θεῷ)
  chosen: acceptable
  alternatives:
  - well-pleasing
  lexicon: BDAG
  rationale: Standard rendering for offerings acceptable to God; maintains sacrificial
    idiom.
- source_word: ἔγγραφος
  chosen: recorded
  alternatives:
  - entered in the record
  - enrolled
  lexicon: LSJ
  rationale: Conveys the idea of inscription/registration, echoing the motif of heavenly
    records without over-explicating.
- source_word: λειτουργία
  chosen: service
  alternatives:
  - ministry
  - liturgy
  lexicon: BDAG; LSJ
  rationale: While "liturgy" is etymologically apt, in English it suggests formal
    worship rites. Here the term covers the act of mercy bound to fasting; "service"
    communicates this while keeping cultic overtones.
- source_word: ἱλαρά
  chosen: cheerful
  alternatives:
  - glad
  - joyful
  lexicon: BDAG; LSJ
  rationale: In line with the moral tone of cheerful mercy; "cheerful" ties to the
    disposition in doing the service.
- source_word: εὐπρόσδεκτος
  chosen: welcome
  alternatives:
  - acceptable
  - well-pleasing
  lexicon: BDAG
  rationale: To avoid repetition of "acceptable" in the same sentence, "welcome" conveys
    the sense of being favorably received by the Lord.
- source_word: τηρέω
  chosen: keep
  alternatives:
  - observe
  lexicon: BDAG
  rationale: Hermas repeatedly urges keeping commandments; "keep" preserves that habitual
    moral register.
- source_word: μακάριος
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: Traditional beatitude language fits Hermas's paraenetic style; "blessed"
    carries spiritual weight.
- source_word: σύνεσις
  chosen: understanding
  alternatives:
  - insight
  - prudence
  lexicon: BDAG; LSJ
  rationale: Common rendering; context emphasizes divine gift of understanding to
    those who keep the instructions.
- source_word: ἀνάγκην ἔχω
  chosen: I must
  alternatives:
  - I am obliged
  - it is necessary for me
  lexicon: BDAG; LSJ
  rationale: Idiomatic English equivalent of expressing necessity.
- source_word: αἰτεῖσθαι / ἐπερωτᾶν
  chosen: ask ... question
  alternatives:
  - request ... inquire
  lexicon: BDAG
  rationale: Pairs two near-synonymous verbs to reflect Hermas's emphatic style while
    keeping natural English.
- source_word: ἄτερ
  chosen: apart from
  alternatives:
  - without
  lexicon: LSJ
  rationale: '"Apart from" keeps the prepositional nuance and reads smoothly.'
- source_word: δηλοῦν
  chosen: make clear
  alternatives:
  - disclose
  - show
  lexicon: BDAG; LSJ
  rationale: Captures the sense of revealing meaning or clarification needed for the
    parables.
