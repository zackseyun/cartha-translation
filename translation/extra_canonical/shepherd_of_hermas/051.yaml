theological_decisions:
- issue: How to render κύριε when addressed to the messenger
  chosen_reading: Render as "Sir" when Hermas addresses the angelic shepherd; reserve
    "the Lord" for God.
  alternative_readings:
  - Render "Lord" uniformly for κύριε/Κύριος
  rationale: Prevents conflating the messenger with God and reflects second-century
    polite address; aligns with Hermas's two levels of address in context (to the
    messenger vs. to God).
- issue: Framing of fasting as sacrificial worship
  chosen_reading: Translate θυσία as "sacrifice" and λειτουργία as "service" to preserve
    cultic register.
  alternative_readings:
  - Render θυσία as "offering" and λειτουργία as "ministry" or "liturgy"
  rationale: Hermas explicitly treats rightly practiced fasting (with almsgiving)
    as worship acceptable to God. The chosen renderings convey that theological weight
    without importing later ecclesiastical formalism.
- issue: Heavenly record motif
  chosen_reading: Render ἔγγραφος as "recorded".
  alternative_readings:
  - '"Entered in the register"'
  - '"enrolled"'
  rationale: Maintains the apocalyptic motif of deeds being written, a common Second
    Temple and early Christian theme, without over-explaining in the main text.
- issue: Parables vs. Similitudes
  chosen_reading: Render παραβολὰς as "parables" in-line.
  alternative_readings:
  - '"similitudes"'
  rationale: Follows the Greek lexeme in context, while the section title "Similitudes"
    remains a later organizational label. Avoids back-influencing the translation
    by tradition.
- issue: Divine gift of understanding
  chosen_reading: Render σύνεσις as "understanding" and maintain it as a gift from
    the Lord to those who keep the instruction.
  alternative_readings:
  - '"prudence"'
  - '"insight"'
  rationale: Preserves Hermas's moral theology in which obedience and understanding
    are intertwined gifts from God, without collapsing into purely cognitive or ethical
    terms.
