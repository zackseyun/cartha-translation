theological_decisions:
- issue: “For the Name” referent
  chosen_reading: Render as “the Name” without expansion
  alternative_readings:
  - the name of the Lord
  - the name of Jesus
  rationale: Hermas uses early Christian idiom where ‘the Name’ signifies allegiance
    to Jesus. Leaving it unexpanded preserves the idiom and its reverential tone while
    not foreclosing whether ‘Lord’ or ‘Jesus’ is in view.
- issue: Right‑ and left‑hand sides in the sanctuary
  chosen_reading: Equal gifts and promises; right‑hand seating conveys honor for suffering
  alternative_readings:
  - Right side implies higher salvation status
  - Left side implies lesser salvation
  rationale: The text explicitly states the gifts and promises are the same for both
    sides; only a ‘some glory’ distinction is noted for those who suffered for the
    Name.
- issue: Cleansing “up to this day” and non‑double‑mindedness
  chosen_reading: Temporal extent refers to the present day of the vision and the
    possibility of cleansing for those not double‑minded
  alternative_readings:
  - A special eschatological ‘day’ of repentance only
  - ‘On this day’ as a liturgical fast day
  rationale: The phrase εἰς ταύτην τὴν ἡμέραν most naturally reads as a terminus ad
    quem (‘up to this day’) in narrative time; Hermas elsewhere links cleansing with
    single‑hearted repentance.
- issue: Translation of σταυρούς
  chosen_reading: “Crucifixions”
  alternative_readings:
  - “crosses” as metonymy
  rationale: Given the martyr list (scourges, prisons, beasts), the punishment itself
    is meant; ‘crucifixions’ foregrounds the suffering endured.
- issue: Rendering ἁγίασμα
  chosen_reading: “Sanctuary”
  alternative_readings:
  - “holy place”
  rationale: Maintains sacred‑space imagery without prescribing Temple architecture;
    fits Hermas’ visionary cultic symbolism.
- issue: Rendering δίψυχος
  chosen_reading: “double‑minded” as a moral vice
  alternative_readings:
  - “doubting”
  - “two‑souled”
  rationale: Hermas develops ‘double‑mindedness’ as a stock vice beyond mere doubt;
    keeping the term preserves continuity with his paraenesis.
- issue: Tower upon the waters
  chosen_reading: Literal rendering without interpretive expansion (e.g., baptism)
  alternative_readings:
  - Explicitly reading waters as baptism
  rationale: The vision will itself interpret symbols later; translation should not
    pre‑empt Hermas’ own exegesis.
