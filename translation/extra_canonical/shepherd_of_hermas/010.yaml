translation:
  text: '1. “What,” I said, “did they endure?” She says, “Listen: scourges, prisons,
    great afflictions, crucifixions, wild beasts—because of the Name. For this reason
    the right-hand side of the sanctuary belongs to them, and to whoever suffers because
    of the Name; but the left-hand side belongs to the rest. Yet for both, those sitting
    on the right and those on the left, the gifts are the same and the promises the
    same—only those on the right sit there and have some glory.”


    2. “But you are very eager to sit on the right with them; yet your shortcomings
    are many. Still, you will be cleansed from your shortcomings—and all who are not
    double‑minded will be cleansed from all their sins up to this day.”


    3. After she had said these things she wanted to depart; but I fell at her feet
    and begged her by the Lord to show me the vision she had promised me.


    4. And again she took hold of my hand, raised me up, and seated me on the plaited
    bench on the left; and she herself sat on the right. And, lifting up a certain
    bright rod, she says to me, “Do you see a great thing?” I say to her, “Lady, I
    see nothing.” She says to me, “[You,] look—do you not see opposite you a great
    tower being built upon the waters with square‑cut, shining stones?”


    5. The tower was being built foursquare by the six young men who had come with
    her; and myriads of other men were carrying stones, some from the deep and others
    from the land, and they would hand them to the six young men. They would take
    them and build.


    6. The stones hauled up from the deep they set, every one, into the building just
    as they were; for they were fitted and matched the jointing with the other stones,
    and so were cemented to one another so that their joint was not visible. The construction
    of the tower appeared as if it had been built from a single stone.


    7. But of the other stones being brought from the dry land, some they kept rejecting,
    and some they put into the building; others they were cutting and throwing far
    from the tower.


    8. Many other stones lay around the tower, and they were not using them for the
    building—for some of them were scabby, others had cracks, others had been truncated,
    others were white and round, not fitting for the building.


    9. And I saw other stones being hurled far from the tower and coming into the
    road, and not remaining in the road but rolling into the trackless places; others
    falling onto a fire and being burned; others falling near waters and not able
    to roll into the water, though they wanted to roll and come into the water.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: “Crucifixions” translates σταυρούς; some prefer “crosses” as metonymy for
      the punishment.
    reason: lexical_alternative
  - marker: '2'
    text: “Because of the Name” is early Christian idiom for suffering on account
      of Jesus’ name; the Greek leaves the referent implicit.
    reason: cultural_note
  - marker: '3'
    text: “Sanctuary” renders ἁγίασμα; alternatives include “holy place” or “sacred
      precinct.”
    reason: lexical_alternative
  - marker: '4'
    text: “Not double‑minded” translates μὴ διψυχοῦντες; alternatives include “not
      wavering.” The term is a stock vice in Hermas.
    reason: lexical_alternative
  - marker: '5'
    text: “Up to this day” (εἰς ταύτην τὴν ἡμέραν) can also be read “as of this day.”
    reason: lexical_alternative
  - marker: '6'
    text: “Plaited bench” (συμπλέσιον) refers to seating made of interlaced material
      (e.g., twigs or rushes).
    reason: cultural_note
  - marker: '7'
    text: 'Some witnesses include an emphatic “You,” here: “[You,] look …”.'
    reason: textual_variant
  - marker: '8'
    text: “Foursquare” renders ἐν τετραγώνῳ; it may also be translated “in a square.”
    reason: lexical_alternative
  - marker: '9'
    text: “Myriads” (μυριάδες) literally means tens of thousands; here it conveys
      an immense number.
    reason: cultural_note
  - marker: '10'
    text: “Scabby” renders ἐψωριακότες (from ψώρα, scab/mange).
    reason: cultural_note
  - marker: '11'
    text: '“Truncated” renders κεκολοβωμένοι; alternatives: “maimed,” “cut short.”'
    reason: lexical_alternative
  - marker: '12'
    text: '“Trackless places” translates ἀνοδία (lit. ‘no‑road’); also possible: “pathless
      places.”'
    reason: lexical_alternative
  - marker: '13'
    text: Wild beasts (θηρία) evokes execution by animals in Roman arenas.
    reason: cultural_note
lexical_decisions:
- source_word: μάστιγες
  chosen: scourges
  alternatives:
  - whippings
  - floggings
  lexicon: LSJ; BDAG
  rationale: Retains concrete punitive sense in martyr contexts; more physical than
    generic “beatings.”
- source_word: φυλακάς
  chosen: prisons
  alternatives:
  - imprisonments
  - custody
  lexicon: LSJ; BDAG
  rationale: Plural captures multiple episodes or institutions of confinement.
- source_word: θλίψεις μεγάλας
  chosen: great afflictions
  alternatives:
  - great tribulations
  - severe pressures
  lexicon: BDAG; LSJ
  rationale: “Afflictions” keeps broad suffering domain without importing apocalyptic
    ‘tribulation’ jargon.
- source_word: σταυρούς
  chosen: crucifixions
  alternatives:
  - crosses
  lexicon: LSJ; BDAG
  rationale: In martyr lists, the referent is the act/punishment; “crucifixions” makes
    the ordeal explicit while preserving the concrete plural.
- source_word: θηρία
  chosen: wild beasts
  alternatives:
  - beasts
  - animals
  lexicon: LSJ; BDAG
  rationale: Alludes to arena execution by beasts; “wild beasts” is the idiomatic
    phrase.
- source_word: τοῦ ὀνόματος
  chosen: the Name
  alternatives:
  - the name of the Lord
  - Jesus’ name
  lexicon: BDAG
  rationale: Early Christian idiom for allegiance to Jesus; capitalizing preserves
    the reverential idiom without forcing a specific expansion.
- source_word: τὰ δεξιὰ/τὰ ἀριστερὰ μέρη
  chosen: the right-hand/left-hand side
  alternatives:
  - the right/left parts
  - right/left places
  lexicon: LSJ
  rationale: “Side” fits spatial imagery of a sanctuary with seating; keeps symmetry
    with right/left motif.
- source_word: τοῦ ἁγιάσματος
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the sacred precinct
  lexicon: LSJ; BDAG
  rationale: “Sanctuary” renders the sacred-space nuance and maintains temple imagery
    without over‑specifying.
- source_word: δῶρα
  chosen: gifts
  alternatives:
  - rewards
  - offerings
  lexicon: LSJ; BDAG
  rationale: Here contrasts status with equal divine bestowals; “gifts” better than
    “rewards,” which could skew to merit.
- source_word: ἐπαγγελίαι
  chosen: promises
  alternatives:
  - pledges
  lexicon: BDAG; LSJ
  rationale: Standard rendering; communicates divine assurances without legalistic
    overtones.
- source_word: δόξαν τινά
  chosen: some glory
  alternatives:
  - a certain glory
  - some honor
  lexicon: BDAG; LSJ
  rationale: Keeps doxa as ‘glory’ while acknowledging an undefined measure with ‘some’.
- source_word: κατεπίθυμος
  chosen: very eager
  alternatives:
  - intensely desirous
  - eagerly desirous
  lexicon: LSJ
  rationale: Conveys strong desire in accessible English.
- source_word: ὑστερήματα
  chosen: shortcomings
  alternatives:
  - deficiencies
  - lacks
  lexicon: BDAG; LSJ
  rationale: Moral‑spiritual lacks; “shortcomings” is idiomatic and non‑technical.
- source_word: καθαρισθήσῃ / καθαρισθήσονται
  chosen: be cleansed
  alternatives:
  - be purified
  - be made clean
  lexicon: BDAG; LSJ
  rationale: Cleansing imagery is consistent with Hermas’ penitential theology; passive
    voice retained.
- source_word: μὴ διψυχοῦντες
  chosen: not double‑minded
  alternatives:
  - not wavering
  - not two‑souled
  lexicon: BDAG
  rationale: Hermas regularly attacks ‘double‑mindedness’; this preserves that stock
    vice term (cf. Jas 1:8).
- source_word: ἁμαρτήματα
  chosen: sins
  alternatives:
  - wrongdoings
  - transgressions
  lexicon: BDAG; LSJ
  rationale: Baseline moral category; avoids euphemism.
- source_word: συμπλέσιον
  chosen: plaited bench
  alternatives:
  - woven seat
  - plaited couch
  lexicon: LSJ
  rationale: Retains material image of interlaced seating; ‘bench’ fits the seating
    scene.
- source_word: ῥάβδος λαμπρά
  chosen: bright rod
  alternatives:
  - shining staff
  - gleaming rod
  lexicon: LSJ
  rationale: “Rod” matches common prophetic/visionary implements; ‘bright’ renders
    λαμπρά.
- source_word: πύργος
  chosen: tower
  lexicon: LSJ
  rationale: Core symbol in Hermas; literal rendering preserved.
- source_word: οἰκοδομούμενον ἐπὶ ὑδάτων
  chosen: being built upon the waters
  alternatives:
  - being constructed on the waters
  lexicon: LSJ
  rationale: Preposition ἐπί with genitive conveys location ‘upon’; literal phrasing
    retains symbolic force.
- source_word: τετραγώνοις (λίθοις) / ἐν τετραγώνῳ
  chosen: square‑cut / foursquare
  alternatives:
  - four‑cornered / in a square
  lexicon: LSJ
  rationale: “Square‑cut” fits stones; “foursquare” preserves traditional architectural
    idiom for the tower.
- source_word: νεανίσκοι
  chosen: young men
  alternatives:
  - youths
  lexicon: LSJ
  rationale: Neutral, natural English; avoids modern connotations of ‘youths’.
- source_word: μυριάδες
  chosen: myriads
  alternatives:
  - tens of thousands
  - countless multitudes
  lexicon: LSJ
  rationale: Literal and evocative; preserves numerical hyperbole of the scene.
- source_word: βυθός
  chosen: the deep
  alternatives:
  - the depths
  - the sea‑bed
  lexicon: LSJ
  rationale: Aquatic depth without over‑specifying a sea‑bed.
- source_word: γῆ
  chosen: land
  alternatives:
  - ground
  - earth
  lexicon: LSJ
  rationale: Contrasts with ‘the deep’; ‘land’ fits the parallelism.
- source_word: ἡρμοσμένοι / ἁρμογῇ
  chosen: fitted / the jointing
  alternatives:
  - matched / the joint
  - in harmony / the fitting
  lexicon: LSJ
  rationale: Maintains building‑trade vocabulary; ‘jointing’ expresses the join as
    a system.
- source_word: ἐκολλῶντο
  chosen: were cemented
  alternatives:
  - were joined fast
  - were glued
  lexicon: BDAG; LSJ
  rationale: Concrete image of bonding masonry; ‘cemented’ fits stonework better than
    ‘glued’.
- source_word: ξηρά
  chosen: dry land
  alternatives:
  - dry ground
  lexicon: LSJ
  rationale: Standard collocation; balances with ‘deep’.
- source_word: ἀπέβαλλον
  chosen: were rejecting
  alternatives:
  - were throwing away
  - were discarding
  lexicon: LSJ
  rationale: Captures evaluative and physical action implied by context.
- source_word: κατέκοπτον
  chosen: were cutting
  alternatives:
  - were hewing
  - were chopping
  lexicon: LSJ
  rationale: Stone‑shaping action; kept general to avoid over‑specifying technique.
- source_word: ἐψωριακότες
  chosen: scabby
  alternatives:
  - mangy
  - scurfy
  lexicon: LSJ
  rationale: Psōra denotes scab/mange; ‘scabby’ conveys defilement imagery.
- source_word: σχισμὰς ἔχοντες
  chosen: having cracks
  alternatives:
  - fissured
  - split
  lexicon: LSJ
  rationale: Plain description of flawed stones.
- source_word: κεκολοβωμένοι
  chosen: truncated
  alternatives:
  - maimed
  - cut short
  lexicon: LSJ
  rationale: Stone metaphor favors ‘truncated/cut short’ over bodily ‘maimed’.
- source_word: λευκοὶ καὶ στρογγύλοι
  chosen: white and round
  alternatives:
  - white and rounded
  lexicon: LSJ
  rationale: Literal; suggests aesthetic yet unsuitable stones.
- source_word: μὴ ἁρμόζοντες
  chosen: not fitting
  alternatives:
  - not suitable
  - not matching
  lexicon: LSJ
  rationale: Continues the building‑fit motif.
- source_word: ῥιπτομένους
  chosen: being hurled
  alternatives:
  - being thrown
  lexicon: LSJ
  rationale: More vivid for violent casting away.
- source_word: ὁδός
  chosen: road
  alternatives:
  - way
  - path
  lexicon: LSJ
  rationale: Contrasts with ‘trackless’ (no‑road); ‘road’ best preserves play on ὁδός/ἀνοδία.
- source_word: ἀνοδία
  chosen: trackless places
  alternatives:
  - pathless places
  - roadless ground
  lexicon: LSJ
  rationale: Alpha‑privative formation (‘no road’) preserved in English idiom.
- source_word: ἐπὶ πῦρ ἐμπίπτοντας
  chosen: falling onto a fire
  alternatives:
  - falling into fire
  lexicon: LSJ
  rationale: Prepositional nuance (ἐπί) retained; both convey peril.
