book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Τί, φημί, ὑπήνεγκαν; Ἄκουε, φησίν· μάστιγας, φυλακάς, θλίψεις μεγάλας, σταυρούς,
    θηρία εἵνεκεν τοῦ ὀνόματος· διὰ τοῦτο ἐκείνων ἐστὶν τὰ δεξιὰ μέρη τοῦ ἁγιάσματος,
    καὶ ὃς ἐὰν πάθῃ διὰ τὸ ὄνομα· τῶν δὲ λοιπῶν τὰ ἀριστερὰ μέρη ἐστίν. ἀλλὰ ἀμφοτέρων,
    καὶ τῶν ἐκ δεξιῶν καὶ τῶν ἐξ ἀριστερῶν καθημένων, τὰ αὐτὰ δῶρα καὶ αἱ αὐταὶ ἐπαγγελίαι·
    μόνον ἐκεῖνοι ἐκ δεξιῶν κάθηνται καὶ ἔχουσιν δόξαν τινά. 2. σὺ δὲ κατεπίθυμος
    εἰ καθίσαι ἐκ δεξιῶν μετ’ αὐτῶν, ἀλλὰ τὰ ὑστερήματά σου πολλὰ· καθαρισθήσῃ δὲ
    ἀπὸ τῶν ὑστερημάτων σου καὶ πάντες δὲ οἱ μὴ διψυχοῦντες καθαρισθήσονται ἀπὸ πάντων
    τῶν ἁμαρτημάτων εἰς ταύτην τὴν ἡμέραν. 3. ταῦτα εἴπασα ἤθελεν ἀπελθεῖν· πεσὼν
    δὲ αὐτῆς πρὸς τοὺς πόδας ἠρώτησα αὐτὴν κατὰ τοῦ Κυρίου ἵνα μοι ἐπιδείξῃ ὃ ἐπηγγείλατο
    ὅραμα. 4. ἡ δὲ πάλιν ἐπελάβετό μου τῆς χειρὸς καὶ ἐγείρει με καὶ καθίζει ἐπὶ τὸ
    συμπλέσιον ἐξ εὐωνύμων· ἐκαθέζετο δὲ καὶ αὐτὴ ἐκ δεξιῶν. καὶ ἐπάρασα ῥάβδον τινα
    λαμπρὰν λέγει μοι· Βλέπεις μέγα πρᾶγμα; λέγω αὐτῇ· Κυρία, οὐδὲν βλέπω. λέγει μοι·
    [Σὺ,] ἰδοὺ οὐχ ὁρᾷς κατέναντί σου πύργον μέγαν οἰκοδομούμενον ἐπὶ ὑδάτων λίθοις
    τετραγώνοις λαμπροῖς; 5. ἐν τετραγώνῳ δὲ ᾠκοδομεῖτο ὁ πύργος ὑπὸ τῶν ἓξ νεανίσκων
    τῶν ἐληλυθότων μετ’ αὐτῆς· ἄλλαι δὲ μυριάδες ἀνδρῶν παρεφέρον λίθους, οἱ μὲν ἐκ
    τοῦ βυθοῦ, οἱ δὲ ἐκ τῆς γῆς, καὶ ἐπεδίδουν τοῖς ἓξ νεανίσκοις. ἐκεῖνοι δὲ ἐλάμβανον
    καὶ ᾠκοδόμουν· 6. τοὺς μὲν ἐκ τοῦ βυθοῦ λίθους ἑλκομένους πάντας οὕτως ἐτίθεσαν
    εἰς τὴν οἰκοδομήν· ἡρμοσμένοι γὰρ ἦσαν καὶ συνεφώνουν τῇ ἁρμογῇ μετὰ τῶν ἑτέρων
    λίθων· καὶ οὕτως ἐκολλῶντο ἀλλήλοις, ὥστε τὴν ἁρμογὴν αὐτῶν μὴ φαίνεσθαι. ἐφαίνετο
    δὲ ἡ οἰκοδομὴ τοῦ πύργου ὡς ἐξ ἑνὸς λίθου ᾠκοδομημένη. 7. τοὺς δὲ ἑτέρους λίθους
    τοὺς φερομένους ἀπὸ τῆς ξηρᾶς τοὺς μὲν ἀπέβαλλον, τοὺς δὲ ἐτίθουν εἰς τὴν οἰκοδομήν·
    ἄλλους δὲ κατέκοπτον καὶ ἔρριπτον μακρὰν ἀπὸ τοῦ πύργου. 8. ἄλλοι δὲ λίθοι πολλοὶ
    κύκλῳ τοῦ πύργου ἔκειντο, καὶ οὐκ ἐχρῶντο αὐτοῖς εἰς τὴν οἰκοδομήν· ἦσαν γάρ τινες
    ἐξ αὐτῶν ἐψωριακότες, ἕτεροι δὲ σχισμὰς ἔχοντες, ἄλλοι δὲ κεκολοβωμένοι, ἄλλοι
    δὲ λευκοὶ καὶ στρογγύλοι, μὴ ἁρμόζοντες εἰς τὴν οἰκοδομήν. 9. ἔβλεπον δὲ ἑτέρους
    λίθους ῥιπτομένους μακρὰν ἀπὸ τοῦ πύργου καὶ ἐρχομένους εἰς τὴν ὁδὸν καὶ μὴ μένοντας
    ἐν τῇ ὁδῷ, ἀλλὰ κυλιομένους εἰς τὴν ἀνοδίαν· ἑτέρους δὲ ἐπὶ πῦρ ἐμπίπτοντας καὶ
    καιομένους· ἑτέρους δὲ πίπτοντας ἐγγὺς ὑδάτων καὶ μὴ δυναμένους κυλισθῆναι εἰς
    τὸ ὕδωρ, καίπερ θελόντων κυλισθῆναι καὶ ἐλθεῖν εἰς τὸ ὕδωρ.
