translation:
  text: '“Listen now about the stones that go into the building. The stones that are
    square and white and that match their joints [a]—these are the apostles and bishops
    [b] and teachers and deacons [c], who went in the reverent dignity of God [d]
    and who oversaw and taught and served with purity and reverence for God’s elect
    [e]—some have fallen asleep [f], and some are still alive. They were always in
    agreement with one another, had peace among themselves, and listened to each other;
    for this reason their joints fit in the building of the tower.


    “And the ones drawn up from the deep [g] and set into the building and fitting
    together at their joints with the other stones already built—who are they?” “These
    are the ones who suffered on account of the name of the Lord [h].”


    “I want to know who the other stones are that are being carried from the dry land
    [i], lady.” She said, “Those that go into the building without being hewn [j]—the
    Lord approved these, because they walked in the uprightness of the Lord [k] and
    accomplished his commandments [l].”


    “And the ones being brought and set into the building—who are they?” “They are
    new in the faith and faithful [m]. They are being admonished [n] by the angels
    to do good, because evil was found in them.”


    “And those whom they were casting away and throwing aside [o]—who are they?” “These
    are people who have sinned and want to repent [p]. For this reason they were not
    flung far away outside the tower, because they will be useful for the building
    [q], if they repent. Therefore those who are going to repent—if they repent—will
    be strong in the faith, if they repent now, while the tower is being built. But
    if the building is completed, they no longer have a place, but will be cast out
    [r]. Only this remains for them: to lie beside the tower [s].”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek ἁρμογαί: the joinings where stones meet; alternatives include “joinings”
      or “fittings.”'
    reason: lexical_alternative
  - marker: b
    text: ἐπίσκοποι can be rendered “overseers,” but here “bishops” preserves the
      second‑century office title.
    reason: lexical_alternative
  - marker: c
    text: διάκονοι may be translated “ministers”; we retain “deacons” as an office
      term.
    reason: lexical_alternative
  - marker: d
    text: 'σεμνότης: “reverent dignity,” also “gravity” or “solemnity.” The phrase
      points to God as the standard of conduct.'
    reason: lexical_alternative
  - marker: e
    text: 'τοῖς ἐκλεκτοῖς: “the elect,” i.e., God’s chosen people.'
    reason: lexical_alternative
  - marker: f
    text: “Have fallen asleep” is a customary early-Christian euphemism for death.
    reason: cultural_note
  - marker: g
    text: “The deep” (βυθός) evokes being drawn up from the depth (likely of the sea)
      in the tower‑building vision.
    reason: cultural_note
  - marker: h
    text: “Suffered on account of the name of the Lord” alludes to persecution for
      fidelity to the Lord; compare early martyr traditions.
    reason: cross_reference
  - marker: i
    text: “Dry land” (ξηρά) contrasts with the sea imagery; stones from land represent
      another class within the allegory.
    reason: cultural_note
  - marker: j
    text: 'μὴ λατομουμένους: “without being hewn,” i.e., not needing to be cut or
      dressed to fit.'
    reason: lexical_alternative
  - marker: k
    text: 'εὐθύτης: “uprightness” (moral straightness).'
    reason: lexical_alternative
  - marker: l
    text: 'κατωρθόω: “accomplish,” also “set right” or “carry out.”'
    reason: lexical_alternative
  - marker: m
    text: πιστοί can mean “faithful” or “believers.” We choose “faithful” to keep
      the moral nuance.
    reason: lexical_alternative
  - marker: n
    text: 'νουθετέω: “admonish,” with the sense of corrective instruction.'
    reason: lexical_alternative
  - marker: o
    text: Text reads ἔριττον; many witnesses reflect ἔρριπτον (“they were throwing”).
      The sense is removal/discarding.
    reason: textual_variant
  - marker: p
    text: 'μετανοεῖν: in specific-sin contexts we render “repent.” Some contexts permit
      “change one’s mind.”'
    reason: lexical_alternative
  - marker: q
    text: 'εὔχρηστοι: “useful,” also “serviceable, fit for use.”'
    reason: lexical_alternative
  - marker: r
    text: 'ἔκβολοι: “cast out,” also “expelled” or “thrown out.”'
    reason: lexical_alternative
  - marker: s
    text: “To lie beside the tower” signals a liminal, excluded status in the allegory—near
      yet not incorporated.
    reason: cultural_note
lexical_decisions:
- source_word: οἰκοδομή
  chosen: building
  alternatives:
  - construction
  - structure
  lexicon: LSJ
  rationale: Concrete image of a work under construction fits the tower allegory;
    “building” is the natural English counterpart.
- source_word: ἁρμογαί
  chosen: joints
  alternatives:
  - joinings
  - fittings
  lexicon: LSJ
  rationale: Refers to the points where stones meet; “joints” conveys structural interlocking
    without over-technicality.
- source_word: τετράγωνοι
  chosen: square
  alternatives:
  - four-sided
  - quadrangular
  lexicon: LSJ
  rationale: Common English for stones dressed with square faces; keeps imagery clear.
- source_word: λευκοί
  chosen: white
  lexicon: LSJ
  rationale: Plain descriptive color term; no need to embellish.
- source_word: ἀπόστολοι
  chosen: apostles
  lexicon: BDAG
  rationale: Established title for commissioned envoys in early Christianity; retains
    ecclesial resonance.
- source_word: ἐπίσκοποι
  chosen: bishops
  alternatives:
  - overseers
  lexicon: BDAG
  rationale: Second-century office title; preserves church-order texture rather than
    generic functional gloss.
- source_word: διδάσκαλοι
  chosen: teachers
  alternatives:
  - instructors
  lexicon: BDAG
  rationale: Straightforward rendering of didactic role in the community.
- source_word: διάκονοι
  chosen: deacons
  alternatives:
  - ministers
  - servants
  lexicon: BDAG
  rationale: Technical office in early churches; preserves ecclesial nuance.
- source_word: σεμνότης (κατὰ τὴν σεμνότητα τοῦ Θεοῦ)
  chosen: reverent dignity
  alternatives:
  - gravity
  - solemnity
  lexicon: LSJ
  rationale: Conveys both seriousness and reverence; genitive points to God as the
    standard/source.
- source_word: ἁγνῶς
  chosen: with purity
  alternatives:
  - purely
  - chastely
  lexicon: LSJ
  rationale: Moral purity in ministerial conduct; “with purity” fits adverbial force.
- source_word: τοῖς ἐκλεκτοῖς
  chosen: God’s elect
  alternatives:
  - God’s chosen ones
  lexicon: BDAG
  rationale: “Elect” preserves theological weight and established usage.
- source_word: κοιμάομαι (κεκοιμημένοι)
  chosen: have fallen asleep
  alternatives:
  - have died
  lexicon: BDAG
  rationale: Conventional Christian euphemism for death; matches tone without importing
    later doctrinal connotations.
- source_word: βυθός
  chosen: the deep
  alternatives:
  - the depth
  - the abyss
  - the sea-bed
  lexicon: LSJ
  rationale: Retains the imagistic quality of being drawn up from a profound depth,
    consistent with the vision’s maritime setting.
- source_word: πάσχω (παθόντες)
  chosen: suffered
  alternatives:
  - endured
  - underwent affliction
  lexicon: LSJ
  rationale: Neutral, broad verb for experiencing hardship; context supplies cause
    (the Lord’s name).
- source_word: λατομέω (μὴ λατομουμένους)
  chosen: being hewn
  alternatives:
  - being quarried
  - being cut
  lexicon: LSJ
  rationale: Stone-working term; “hewn” is idiomatic in English for dressed stone.
- source_word: εὐθύτης
  chosen: uprightness
  alternatives:
  - straightness
  - integrity
  lexicon: LSJ
  rationale: Moral rectitude metaphorically expressed as straightness; “uprightness”
    is standard.
- source_word: κατωρθόω
  chosen: accomplished
  alternatives:
  - set right
  - carried out
  lexicon: LSJ
  rationale: Here means successfully carrying out commandments; “accomplished” fits
    causative sense.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Default Cartha rendering; no genitive ambiguity here.
- source_word: πιστοί
  chosen: faithful
  alternatives:
  - believers
  lexicon: BDAG
  rationale: Carries both believing and loyal connotations; suits paraenetic context.
- source_word: νουθετέω
  chosen: admonished
  alternatives:
  - instructed
  - warned
  lexicon: BDAG
  rationale: Moral corrective sense is primary here; “admonish” preserves that edge.
- source_word: ἀγαθοποιεῖν
  chosen: to do good
  alternatives:
  - to practice good
  - to do what is good
  lexicon: BDAG
  rationale: Common ethical expression; idiomatic in English.
- source_word: πονηρία
  chosen: evil
  alternatives:
  - wickedness
  lexicon: BDAG
  rationale: General moral badness; “evil” is concise.
- source_word: ἀποβάλλω
  chosen: casting away
  alternatives:
  - rejecting
  - discarding
  lexicon: LSJ
  rationale: Describes removal of stones not yet usable; physical image retained.
- source_word: ῥίπτω (ἔριττον/ἔρριπτον)
  chosen: throwing aside
  alternatives:
  - flinging away
  lexicon: LSJ
  rationale: Balances physicality with readability; notes variant form in footnote.
- source_word: ἁμαρτάνω (ἡμαρτηκότες)
  chosen: have sinned
  lexicon: BDAG
  rationale: Basic moral term; perfect participle denotes resultant state.
- source_word: μετανοέω
  chosen: repent
  alternatives:
  - change their mind
  lexicon: BDAG
  rationale: Specific-sin context; per Cartha policy, render as “repent.”
- source_word: εὔχρηστος
  chosen: useful
  alternatives:
  - serviceable
  - fit for use
  lexicon: LSJ
  rationale: Describes suitability for building; “useful” is natural English.
- source_word: ἰσχυρός
  chosen: strong
  alternatives:
  - stalwart
  - firm
  lexicon: BDAG
  rationale: Common term for strength; collocates well with “in the faith.”
- source_word: τελεσθῇ
  chosen: is completed
  alternatives:
  - is finished
  - is brought to completion
  lexicon: LSJ
  rationale: Completion of the building project; eschatological nuance preserved in
    theological note.
- source_word: ἔκβολοι
  chosen: cast out
  alternatives:
  - expelled
  - thrown out
  lexicon: LSJ
  rationale: Violent removal; “cast out” keeps the concreteness and solemn tone.
- source_word: παρὰ τῷ πύργῳ κεῖσθαι
  chosen: to lie beside the tower
  alternatives:
  - to be laid by the tower
  lexicon: LSJ
  rationale: Literal phrasing preserves the bleak, marginal status of such stones.
