theological_decisions:
- issue: Ecclesial office terms (ἐπίσκοποι, διάκονοι)
  chosen_reading: Translate as bishops and deacons (technical offices)
  alternative_readings:
  - overseers and ministers (functional glosses)
  rationale: Hermas reflects a 2nd‑century Roman church order; retaining office titles
    preserves historical texture and ecclesial weight.
  doctrine_reference: Translation philosophy — Preserve second-century church texture;
    Translate titles; Consistency of key terms.
- issue: τοῖς ἐκλεκτοῖς (the elect)
  chosen_reading: Render as God’s elect
  alternative_readings:
  - God’s chosen ones
  rationale: “Elect” keeps theological density and early-Christian diction; aligns
    with Cartha default for contested terms.
  doctrine_reference: DOCTRINE.md — Contested terms table (elect).
- issue: μετανοέω in a sin context
  chosen_reading: repent
  alternative_readings:
  - change one’s mind
  rationale: Here repentance follows explicit sin (“have sinned and want to repent”);
    Cartha policy prefers “repent” in specific-sin contexts.
  doctrine_reference: 'DOCTRINE.md — Contested terms: μετανοέω policy.'
- issue: Angels admonishing new believers
  chosen_reading: Treat as literal angelic activity within the vision
  alternative_readings:
  - Metaphor for human leaders’ exhortations
  rationale: The visionary genre presents active angelic agents; flattening to metaphor
    would undercut the apocalyptic frame.
  doctrine_reference: What matters most — Keep the allegories legible; Preserve visionary
    imagery.
- issue: Those drawn from the deep as martyrs
  chosen_reading: Render descriptively as those who suffered on account of the Lord’s
    name
  alternative_readings:
  - Translate with technical term “martyrs”
  rationale: The text describes suffering; avoiding anachronistic technical labeling
    keeps close to the Greek while the implication is clear.
  doctrine_reference: Original-language primacy over translation tradition.
- issue: Eschatological cutoff (completion of the building)
  chosen_reading: Completion of the tower marks the close of the repentance window;
    after that, no place remains and they are cast out
  alternative_readings:
  - Merely a temporary, intra-vision pause with no eschatological force
  rationale: Hermas repeatedly frames repentance as time-limited; the building’s completion
    coheres with final exclusion imagery.
  doctrine_reference: Preserve theological tension and early-Christian paraenesis.
- issue: σεμνότης τοῦ Θεοῦ
  chosen_reading: ‘Reverent dignity of God’ reflects God’s own solemn standard shaping
    their conduct
  alternative_readings:
  - ‘Solemnity for God’ (subjective genitive)
  rationale: The prepositional phrase κατὰ τὴν σεμνότητα τοῦ Θεοῦ most naturally takes
    God as the norm of their behavior, not merely its object.
