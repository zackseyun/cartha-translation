translation:
  text: "He says to me, \"Have you come?\" I said, \"Because, sir, I am keeping a\
    \ station[a].\" \n\n\"What,\" he says, \"is a station?\" I say, \"I am fasting,\
    \ sir.\" He says, \"And what is this fasting that you are fasting?\" I say, \"\
    As I have been accustomed, sir, so I fast.\"\n\nHe says, \"You do not know how\
    \ to fast to the Lord, and this fasting of yours is not fasting to him—it is useless.\"\
    \n\nI say, \"Why, sir, do you say this?\"\n\nHe says to me, \"I tell you, this\
    \ is not fasting, the kind you suppose you are fasting to the Lord. Listen to\
    \ a parable. A vineyard, not having weeds, will give more fruit, not being choked\
    \ by the weeds. So the slave took up [his tool], dug the vineyard, and pulled\
    \ up all the weeds that were in the vineyard. And that vineyard became very comely\
    \ and thriving, having no weeds to choke it.\n\n\"After a time the master of the\
    \ slave [and of the field][b] came and went into the vineyard. And seeing the\
    \ vineyard well fenced, and even dug, and [all] the weeds pulled out[c], he rejoiced\
    \ greatly over his slave on account of his deed. Summoning again his friends and\
    \ his son, the master announced to them the deed he had done with the portions[d]\
    \ he had received; and they approved all the more that the slave should become\
    \ co-heir with his son.\""
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Station (Latin statio): an appointed fast or vigil day in early Christian
      practice.'
    reason: cultural_note
  - marker: b
    text: The bracketed phrase "[and of the field]" indicates textual uncertainty
      in the source.
    reason: textual_variant
  - marker: c
    text: The source shows bracketed or truncated words here; the sense is that all
      the weeds had been pulled up.
    reason: textual_variant
  - marker: d
    text: 'Greek ἐπὶ τοῖς ἐδέσμασιν αὐτοῦ οἷς ἔλαβεν: literally, "upon/with the portions
      he had received"; i.e., in regard to or using the food portions allotted to
      him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στατίων
  chosen: station (fast day)
  alternatives:
  - vigil
  - fast
  lexicon: Lampe, Patristic Greek Lexicon
  rationale: Latin loanword statio used in early Christian usage for appointed fast/vigil
    days. Retaining "station" with a gloss preserves the historical term while making
    sense in context.
- source_word: νηστεία / νηστεύω
  chosen: fasting / to fast
  alternatives:
  - fast (noun)
  - abstaining
  lexicon: LSJ
  entry: νηστεία, νηστεύω
  rationale: Standard rendering; keeps concrete ethical practice without paraphrase.
- source_word: κύριε (vocative)
  chosen: sir
  alternatives:
  - lord
  - master
  lexicon: BDAG
  entry: κύριος
  rationale: Here used as polite address to the angelic shepherd, not to God; "sir"
    avoids confusion with the divine title while reflecting respect.
- source_word: τῷ Κυρίῳ (dative)
  chosen: to the Lord
  alternatives:
  - for the Lord
  - before the Lord
  lexicon: BDAG
  entry: κύριος
  rationale: Context refers to God; retaining "the Lord" with dative "to" reflects
    idiom and theological orientation of fasting directed Godward.
- source_word: ἀνωφελής
  chosen: useless
  alternatives:
  - unprofitable
  - of no benefit
  lexicon: LSJ
  entry: ἀνωφελής
  rationale: Carries the force of "of no advantage"; "useless" is concise and forceful,
    matching the admonitory tone.
- source_word: παραβολή (implied)
  chosen: parable
  alternatives:
  - illustration
  - comparison
  lexicon: BDAG
  entry: παραβολή
  rationale: Hermas often signals with a parable; although the lemma isn't explicit
    in the extant line, the discourse introduces a comparison; "parable" preserves
    genre.
- source_word: ἀμπελών
  chosen: vineyard
  lexicon: LSJ
  entry: ἀμπελών
  rationale: Standard term; vineyard imagery is central and should not be modernized.
- source_word: βοτάνη (pl. βοτάναι)
  chosen: weeds
  alternatives:
  - herbs
  - plants
  lexicon: LSJ
  entry: βοτάνη
  rationale: In context of a vineyard being choked, the sense is unwanted growth;
    "weeds" fits the agrarian metaphor better than "herbs."
- source_word: πνίγομαι
  chosen: to be choked
  alternatives:
  - to be strangled
  - to be stifled
  lexicon: LSJ
  entry: πνίγω
  rationale: Agrarian image of choking by weeds; echoes but does not import NT parable
    language.
- source_word: ἔσκαψεν
  chosen: dug
  alternatives:
  - hoed
  - spaded
  lexicon: LSJ
  entry: σκάπτω
  rationale: Literal agricultural labor; "dug" is clear and idiomatic.
- source_word: ἐξέτιλλε
  chosen: pulled up
  alternatives:
  - uprooted
  - tore out
  lexicon: LSJ
  entry: ἐκτιλλω/ἐκτίλλω
  rationale: Describes removing weeds by hand; "pulled up" preserves concreteness.
- source_word: κεχαρακωμένον
  chosen: well fenced
  alternatives:
  - palisaded
  - stockaded
  lexicon: LSJ
  entry: χάραξ
  rationale: Perfect passive of χαράσσω; "well fenced" conveys the improved, protected
    state of the vineyard in accessible English.
- source_word: εὐπρεπῶς
  chosen: well
  alternatives:
  - handsomely
  - properly
  lexicon: LSJ
  entry: εὐπρεπής
  rationale: Adverb modifying the fencing; "well" keeps it idiomatic alongside "well
    fenced"; the sense of comeliness is then carried by "very comely" later.
- source_word: εὐπρεπέστατος
  chosen: very comely
  alternatives:
  - most handsome
  - very well-ordered
  lexicon: LSJ
  entry: εὐπρεπής
  rationale: Superlative heightens the description; "very comely" keeps the evaluative
    tone without modern flourish.
- source_word: εὐθαλής
  chosen: thriving
  alternatives:
  - flourishing
  - vigorous
  lexicon: LSJ
  entry: εὐθαλής
  rationale: Describes healthy growth; "thriving" reads smoothly in modern English.
- source_word: δεσπότης
  chosen: master
  alternatives:
  - lord
  lexicon: BDAG
  entry: δεσπότης
  rationale: Owner/employer over a δοῦλος; "master" pairs with "slave" and fits the
    household metaphor.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  entry: δοῦλος
  rationale: Bonded status is salient to the parable’s reward logic; per project policy,
    "slave" is preferred when ownership/service is active.
- source_word: πρᾶξις
  chosen: deed
  alternatives:
  - action
  - act
  lexicon: LSJ
  entry: πρᾶξις
  rationale: Moral/ethical action; "deed" preserves evaluative nuance.
- source_word: ἐδέσματα
  chosen: portions
  alternatives:
  - dishes
  - rations
  lexicon: LSJ
  entry: ἐδέσμα
  rationale: Refers to items of food received; "portions" conveys the concrete allotments
    without implying modern military "rations."
- source_word: συνευδοκέω
  chosen: approved
  alternatives:
  - were well pleased
  - consented
  lexicon: BDAG
  entry: συνευδοκέω
  rationale: Collective approval is in view; "approved" is concise and clear.
- source_word: συγκληρονόμος
  chosen: co-heir
  alternatives:
  - joint heir
  lexicon: BDAG
  entry: συγκληρονόμος
  rationale: Maintains the inheritance metaphor; "co-heir" is idiomatic and theologically
    transparent.
