theological_decisions:
- issue: Rendering of κύριος in address vs. reference to God
  chosen_reading: Render vocative κύριε as "sir" when addressed to the shepherd; render
    τῷ Κυρίῳ as "to the Lord" when referring to God.
  alternative_readings:
  - Render both as "Lord" uniformly
  - Render vocative as "master"
  rationale: Hermas uses κύριε as respectful address to an angelic figure; retaining
    "sir" avoids conflating the messenger with God, while keeping "the Lord" in the
    theological claim about fasting indicates the divine referent.
- issue: δοῦλος as "slave" rather than "servant"
  chosen_reading: Translate δοῦλος as "slave" in this parable.
  alternative_readings:
  - servant
  - bondservant
  rationale: The parable turns on ownership and inheritance; the shock of a slave
    becoming co-heir heightens the moral. Project policy favors "slave" where bonded
    status is salient.
  doctrine_reference: Translation philosophy §Contested terms
- issue: Dative construction in νηστεύειν τῷ Κυρίῳ
  chosen_reading: Translate as "fast to the Lord"
  alternative_readings:
  - fast for the Lord
  - fast before the Lord
  rationale: The Greek dative marks directionality/beneficiary; "to the Lord" is a
    literal rendering that emphasizes directed devotion without inserting additional
    ritual connotations.
- issue: Inheritance metaphor in συγκληρονόμον τῷ υἱῷ
  chosen_reading: Render as "co-heir with his son"
  alternative_readings:
  - joint heir with his son
  rationale: '"Co-heir" preserves the metaphor and allows later readers to hear echoes
    of early Christian inheritance language without forcing NT phrasing.'
