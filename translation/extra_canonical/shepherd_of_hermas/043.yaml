  text: Ἤθελον, φημί, κύριε, γνῶναι ποίοις τρόποις με δεῖ δουλεῦσαι τῇ ἐπιθυμίᾳ τ
  language: Greek
  pages:
  - 354
  unit_id: M.12.iii
  label: Mandate 12, section iii
  sequence: 43
translation:
  text: “I wished,” I say, “sir, to know in what ways I must serve the desire.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek address κύριε here denotes respectful address to the shepherd
      (an angelic guide), not a divine title; hence “sir.”
    reason: cultural_note
  - marker: b
    text: Our normalized Greek source truncates after “the desire …”; other witnesses
      indicate the continuation identifies the ‘good’ desire in contrast to the evil
      desire treated in this Mandate.
    reason: textual_variant
lexical_decisions:
- source_word: ἤθελον
  chosen: I wished
  alternatives:
  - I wanted
  lexicon: LSJ
  rationale: Captures a respectful, deliberate intention; slightly elevated register
    suits Hermas’s narrated dialogue.
- source_word: φημί
  chosen: I say
  alternatives:
  - I said
  - I declare
  lexicon: LSJ
  rationale: Hermas often uses φημί parenthetically in lively dialogue; preserving
    present “I say” keeps the vivid narrative tone.
- source_word: κύριε
  chosen: sir
  alternatives:
  - lord
  - master
  lexicon: BDAG
  rationale: Here the address is to the shepherd/angelic guide, not a divine title;
    “sir” reflects respectful address without theological overtones.
- source_word: γνῶναι
  chosen: to know
  alternatives:
  - to understand
  - to learn
  lexicon: BDAG
  rationale: Plain cognitive sense fits the request for instruction.
- source_word: ποίοις τρόποις
  chosen: in what ways
  alternatives:
  - by what manner
  - how
  lexicon: LSJ
  rationale: Plural τρόποι (“ways, modes, manners”) is retained with “ways” to reflect
    the structure rather than collapsing to a simple “how.”
- source_word: με δεῖ
  chosen: I must
  alternatives:
  - it is necessary for me
  - I ought
  lexicon: BDAG
  rationale: Idiomatic English for the impersonal necessity construction, preserving
    urgency/obligation.
- source_word: δουλεῦσαι
  chosen: to serve
  alternatives:
  - to be enslaved to
  - to be in bondage to
  lexicon: BDAG
  rationale: δουλεύω can denote service under obligation. “Serve” preserves allegiance
    without importing the heavier connotations of chattel enslavement in English,
    especially since the context likely concerns ‘good’ desire.
- source_word: ἐπιθυμίᾳ
  chosen: desire
  alternatives:
  - longing
  - lust
  lexicon: BDAG
  rationale: Neutral rendering fits Hermas’s contrast elsewhere between good and evil
    desire; “lust” would prejudge the moral value.
