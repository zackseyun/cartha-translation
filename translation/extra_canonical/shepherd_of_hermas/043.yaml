theological_decisions:
- issue: Addressing the shepherd with κύριε
  chosen_reading: Render as “sir,” not “Lord.”
  alternative_readings:
  - Lord
  - Master
  rationale: In Hermas, κύριε frequently functions as polite address to a human/angelic
    interlocutor. Rendering it “Lord” could mislead readers into hearing a divine
    title.
- issue: δουλεύειν to desire—nuance of allegiance vs. bondage
  chosen_reading: Render as “serve” rather than “be enslaved to.”
  alternative_readings:
  - be enslaved to
  - be in bondage to
  rationale: Hermas immediately contrasts good and evil desire in Mandate 12. Using
    “serve” allows the construction to apply naturally to either without implying
    vice when the reference is to good desire.
- issue: Moral valence of ἐπιθυμία
  chosen_reading: Translate as neutral “desire.”
  alternative_readings:
  - lust
  - longing
  rationale: Hermas distinguishes a good desire and an evil desire. “Desire” leaves
    the moral evaluation to the context rather than front-loading a negative or overly
    romantic sense.
