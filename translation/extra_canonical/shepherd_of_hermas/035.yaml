  text: 1 Εἶπόν σοι, φησίν, ὅτι τὰ κτίσματα τοῦ θεοῦ διπλᾶ ἐστι· καὶ γὰρ ἡ ἐγκράτεια
    διπλῆ ἐστιν. ἐπί τινων γὰρ δεῖ ἐγκρατεύεσθαι, ἐπί τινων δὲ οὐ δεῖ· 2 γνώρισόν
    μοι, φημί, κύριε, ἐπὶ τίνων δεῖ ἐγκρατεύεσθαι, ἐπὶ τίνων δὲ οὐ δεῖ. Ἄκουε, φησί,
    τὸ πονηρὸν ἐγκρατεύου καὶ μὴ ποίει αὐτό· τὸ δὲ ἀγαθὸν μὴ ἐγκρατεύου, ἀλλὰ ποίει
    αὐτό. ἐὰν γὰρ ἐγκρατεύσῃ τὸ ἀγαθὸν μὴ ποιεῖν, ἁμαρτίαν μεγάλην ἐργάζῃ· ἐὰν δὲ
    ἐγκρατεύσῃ τὸ πονηρὸν μὴ ποιεῖν, δικαιοσύνην μεγάλην ἐργάζῃ. ἐγκράτευσαι οὖν ἀπὸ
    πονηρίας πάσης ἐργαζόμενος τὸ ἀγαθόν. 3 Ποταπαί, φημί, κύριε, εἰσὶν αἱ πονηρίαι,
    ἀφ᾿ ὧν ἡμᾶς δεῖ ἐγκρατεύεσθαι; Ἄκουε, φησίν· ἀπὸ μοιχείας καὶ πορνείας, ἀπὸ μεθύσματος
    ἀνομίας, ἀπὸ τρυφῆς πονηρᾶς, ἀπό ἐδεσμάτων πολλῶν καὶ πολυτελείας πλούτου καὶ
    καυχήσεως καὶ ὑψηλοφροσύνης καὶ ὑπερηφανίας καὶ ἀπὸ ψεύσματος καὶ καταλαλιᾶς καὶ
    ὑποκρίσεως, μνησικακίας καὶ πάσης βλασφημίας. 4 ταῦτα τὰ ἔργα πάντων πονηρότατά
    εἰσιν ἐν τῇ ζωῇ τῶν ἀνθρώπων. ἀπὸ τούτων οὖν τῶν ἔργων δεῖ ἐγκρατεύεσθαι τὸν δοῦλον
    τοῦ θεοῦ· ὁ γὰρ μὴ ἐγκρατευόμενος ἀπὸ τούτων οὐ δύναται ζῆσαι τῷ θεῷ. ἄκουε οὖν
    καὶ τὰ ἀκόλουθα τούτων, 5. Ἔτι γάρ, φημί, κύριε, πονηρὰ ἔργα ἐστί; καί γε πολλά,
    φησίν, ἔστιν, ἀφ᾿ ὧν δεῖ τὸν δοῦλον τοῦ θεοῦ ἐγκρατεύεσθαι· κλέμμα, ψεῦδος, ἀποστέρησις,
    ψευδομαρτυρία, πλεονεξία, ἐπιθυμία πονηρά, ἀπάτη, κενοδοξία, ἀλαζονεία καὶ ὅσα
    τούτοις ὅμοιά εἰσιν. 6 οὐ δοκεῖ σοί ταῦτα πονηρὰ εἶναι; καὶ λίαν πονηρά, φημί,
    τοῖς δούλοις τοῦ θεοῦ. τούτων πάντων δεῖ ἐγκρατεύεσθαι τὸν δουλεύοντα τῷ θεῷ.
    ἐγκράτευσαι οὖν ἀπὸ πάντων τούτων, ἵνα ζήσῃ τῷ θεῷ καὶ ἐγγραφήσῃ μετὰ τῶν ἐγκρατευομένων
    αὐτά. ὧν μὲν οὖν δεῖ σὲ ἐγκρατεύεσθαι, ταῦτά ἐστιν. 7 ἃ δὲ δεῖ σὲ μὴ ἐγκρατεύεσθαι,
    φησίν, ἀλλὰ ποιεῖν, ἄκουε. τὸ ἀγαθὸν μὴ ἐγκρατεύου, ἀλλὰ ποίει αὐτό. 8 Καὶ τῶν
    ἀγαθῶν μοι, φημί, κύριε, δήλωσον τὴν δύναμιν, ἵνα πορευθῶ ἐν αὐτοῖς καὶ δουλεύσω
    αὐτοῖς, ἵνα ἐργασάμενος αὐτὰ δυνηθῶ σωθῆναι. Ἄκουε, φησί, καὶ τῶν ἀγαθῶν τὰ ἔργα,
    ἅ σὲ δεῖ ἐργάζεσθαι καὶ μὴ ἐγκρατεύεσθαι. 9 πρῶτον πάντων πίστις, φόβος κυρίου,
    ἀγάπη, ὁμόνοια, ῥήματα δικαιοσύνης, ἀλήθεια, ὑπομονή· τούτων ἀγαθώτερον οὐδέν
    ἐστιν ἐν τῇ ζωῇ τῶν ἀνθρώπων. ταῦτα ἐὰν τις φυλάσσῃ καὶ μὴ ἐγκρατεύηται ἀπ᾿ αὐτῶν,
    μακάριος γίνεται ἐν τῇ ζωῇ αὐτοῦ. 10 εἶτα τούτων τὰ ἀκόλουθα ἄκουσον· χήραις ὑπηρετεῖν,
    ὀρφανοὺς καὶ ὑστερουμένους ἐπισκέπτεσθαι, ἐξ ἀναγκῶν λυτροῦσθαι τοὺς δούλους τοῦ
    θεοῦ, φιλόξενον εἶναι (ἐν γὰρ τῇ φιλοξενίᾳ εὑρίσκεται ἀγαθοποίησίς ποτε), μηδενὶ
    ἀντιτάσσεσθαι, ἡσύχιον εἶναι, ἐνδεέστερον γίνεσθαι πάντων ἀνθρώπων, πρεσβύτας
    σέβεσθαι, δικαιοσύνην ἀσκεῖν, ἀδελφότητα συντηρεῖν, ὕβριν ὑποφέρειν, μακρόθυμον
    εἶναι, μνησικακίαν μὴ ἔχειν, κάμνοντας τῇ ψυχῇ παρακαλεῖν, ἐσκανδαλισμένους ἀπὸ
    τῆς πίστεως μὴ ἀποβάλλεσθαι, ἀλλ᾿ ἐπιστρέφειν καὶ εὐθύμους ποιεῖν, ἁμαρτάνοντας
    νουθετεῖν, χρεώστας μὴ θλίβειν καὶ ἐνδεεῖς, καὶ εἴ τινα τούτοις ὅμοιά ἐστι. 11
    δοκεῖ σοι, φησί, ταῦτα ἀγαθὰ εἶναι; Τί γάρ, φημί, κύριε, τούτων ἀγαθώτερον; Πορεύου
    οὖν, φησίν, ἐν αὐτοῖς καὶ μὴ ἐγκρατεύου ἀπ᾿ αὐτῶν, καὶ ζήσῃ τῷ θεῷ· 12 φύλασσε
    οὖν τὴν ἐντολὴν ταύτην· ἐὰν τὸ ἀγαθὸν ποιῇς καὶ μὴ ἐγκρατεύσῃ ἀπ᾿ αὐτοῦ, ζήσῃ
    τῷ θεῷ, καὶ πάντες ζήσονται τῷ θεῷ οἱ οὕτω ποιοῦντες. καὶ πάλιν ἐὰν τὸ πονηρὸν
    μὴ ποιῇς καὶ ἐγκρατεύσῃ ἀπ᾿ αὐτοῦ, ζήσῃ τῷ θεῷ, καὶ πάντες ζήσονται τῷ θεῷ, ὅσοι
    ἐὰν ταύτας τὰς ἐντολὰς φυλάξωσι καὶ πορευθῶσιν ἐν αὐταῖς.
