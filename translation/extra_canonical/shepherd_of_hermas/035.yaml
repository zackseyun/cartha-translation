translation:
  text: '“I said to you,” he says, “that the things created by God are twofold; for
    self‑control is twofold as well. For with regard to some things one must hold
    back, and with regard to others one must not.


    “Make it known to me, Lord,” I say, “with respect to what things one must hold
    back, and with respect to what things one must not.” “Listen,” he says: “Hold
    back from what is evil and do not do it; but do not hold back from what is good—rather,
    do it. For if you hold back from doing the good, you work a great sin; but if
    you hold back from doing what is evil, you work great righteousness. Therefore
    restrain yourself from every wickedness, doing the good.”


    “What kinds, Lord,” I say, “are the wickednesses from which we must restrain ourselves?”
    “Listen,” he says: “From adultery and fornication, from lawless drunkenness,[2]
    from wicked luxury, from many foods[3] and the extravagance of wealth and boasting
    and haughtiness and arrogance, and from lying and slander and hypocrisy, resentment,
    and every blasphemy.


    “These deeds are the worst of all in the life of human beings. From these works,
    then, the slave of God must restrain himself; for the one who does not restrain
    himself from these is not able to live to God.[4] Listen, then, also to the things
    that follow these.”


    “Are there still,” I say, “Lord, evil works?” “And indeed there are many,” he
    says, “from which the slave of God must restrain himself: theft, falsehood, defrauding,
    false testimony, greed, evil desire, deceit, vainglory, boastful pretension, and
    whatever things are like these.”


    “Do these not seem to you to be evil?” “And very evil,” I say, “for the slaves
    of God.” “From all these the one who serves God must restrain himself. Restrain
    yourself, then, from all these, that you may live to God and be enrolled[5] with
    those who restrain themselves from them. These, then, are the things from which
    you must restrain yourself.


    “But the things from which you must not restrain yourself,” he says, “but rather
    do them—listen: Do not hold back from the good, but do it.”


    “And of the good things, Lord,” I say, “declare to me their power, so that I may
    walk in them and serve them, that by practicing them I may be able to be saved.”
    “Listen,” he says, “also to the works of the good, which you must do and not hold
    back from.


    “First of all: faith, fear of the Lord, love, concord, words of righteousness,[6]
    truth, endurance—there is nothing better than these in the life of human beings.
    If someone keeps these and does not hold back from them, he becomes blessed in
    his life.


    “Next, hear what follows these: to serve widows; to visit orphans and those in
    want; to redeem the slaves of God from distresses;[7] to be hospitable (for in
    hospitality one sometimes finds an opportunity for doing good[12]); to oppose
    no one; to be quiet;[8] to make yourself one who has less than all people;[9]
    to honor the elderly; to practice righteousness; to preserve the brotherhood;
    to endure insult; to be long‑suffering; to have no resentment; to encourage those
    who are weary in soul; not to cast off those who have been scandalized away from
    the faith,[10] but to turn them back and make them cheerful; to admonish those
    who sin; not to press debtors and the needy;[11] and if there is anything that
    is like these.”


    “Do these seem to you to be good?” “What, Lord, is better than these?” I say.
    “Go, then,” he says, “walk in them and do not hold back from them, and you will
    live to God.


    “Therefore guard this commandment. If you do the good and do not hold back from
    it, you will live to God—and all who do these things likewise will live to God.
    And again, if you do not do the evil and restrain yourself from it, you will live
    to God; and all will live to God—whoever keeps these commandments and walks in
    them.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: “Twofold” signals Hermas’s recurring motif of paired ways (evil/good; restrain/do).
      The phrase “things created by God are twofold” introduces the moral polarity
      that follows.
    reason: cultural_note
  - marker: '[2]'
    text: 'μεθύσμα ἀνομίας: a binge or bout of drinking characterized by lawless excess;
      hence “lawless drunkenness.”'
    reason: lexical_alternative
  - marker: '[3]'
    text: 'ἐδέσματα πολλὰ: literally “many foods/dishes,” pointing to excess in eating
      (delicacies).'
    reason: lexical_alternative
  - marker: '[4]'
    text: “Live to God” is Hermas’s preferred idiom for a life oriented toward God.
      It echoes early Christian diction and is kept intentionally.
    reason: cross_reference
  - marker: '[5]'
    text: “Be enrolled” evokes civic registers or a record; Hermas does not specify
      which book, but the image is of being listed among the self‑restrained.
    reason: cultural_note
  - marker: '[6]'
    text: ῥήματα δικαιοσύνης could be rendered “righteous speech” or “just words.”
      The literal “words of righteousness” is retained.
    reason: lexical_alternative
  - marker: '[7]'
    text: 'ἐξ ἀναγκῶν λυτροῦσθαι: literally “to ransom from necessities/constraints,”
      i.e., to rescue fellow believers from pressing hardships, debts, or bondage.'
    reason: lexical_alternative
  - marker: '[8]'
    text: 'ἡσύχιος: quiet, peaceable, non‑contentious.'
    reason: lexical_alternative
  - marker: '[9]'
    text: 'ἐνδεέστερον γίνεσθαι πάντων ἀνθρώπων: literally “to become more in want
      than all people,” i.e., willingly accept lack so as to prefer others.'
    reason: cultural_note
  - marker: '[10]'
    text: “Scandalized away from the faith” reflects the verb σκανδαλίζω; alternatives
      include “stumbled” or “led astray.”
    reason: lexical_alternative
  - marker: '[11]'
    text: “Not to press debtors” (χρεώστας μὴ θλίβειν) has the sense of not dunning
      or harassing those who owe, especially the needy.
    reason: lexical_alternative
  - marker: '[12]'
    text: “Doing good” renders ἀγαθοποίησις—beneficence; hospitality often provides
      concrete opportunities for such good works.
    reason: cultural_note
lexical_decisions:
- source_word: τὰ κτίσματα τοῦ θεοῦ
  chosen: the things created by God
  alternatives:
  - the creatures of God
  - the creations of God
  lexicon: LSJ; Lampe
  rationale: κτίσμα denotes what is created; “things created” avoids limiting the
    sense to living creatures and suits Hermas’s generic moral framing.
- source_word: ἐγκράτεια / ἐγκρατεύεσθαι
  chosen: self-control / hold back (restrain oneself)
  alternatives:
  - self-control / exercise self-control
  - self-control / abstain
  lexicon: BDAG; Lampe
  rationale: As a noun, ἐγκράτεια is best as “self-control.” The verb emphasizes active
    restraint; “hold back” keeps the rhetorical contrast with doing the good.
- source_word: τὸ πονηρόν / πονηρία
  chosen: what is evil / wickedness
  alternatives:
  - the evil / evil deed
  - bad / badness
  lexicon: BDAG
  rationale: In this moral catalog context, “evil” and “wickedness” preserve the ethical
    weight without colloquial weakening.
- source_word: τὸ ἀγαθόν
  chosen: the good
  alternatives:
  - what is good
  - good deeds
  lexicon: BDAG
  rationale: Hermas contrasts “the evil” and “the good.” The definite form keeps the
    symmetry and weight.
- source_word: ζῆσαι τῷ θεῷ
  chosen: live to God
  alternatives:
  - live for God
  - live with God
  lexicon: BDAG; Lampe
  rationale: The dative with ζάω here matches idiomatic early-Christian phrasing.
    Retaining “to God” preserves Hermas’s distinctive diction and teleology.
- source_word: δοῦλος (τοῦ θεοῦ)
  chosen: slave (of God)
  alternatives:
  - servant (of God)
  - bondservant
  lexicon: BDAG
  rationale: Project doctrine favors “slave” where the bonded relationship is salient.
    Hermas stresses belonging to God and obedience, so “slave” carries the intended
    force.
- source_word: μεθύσμα ἀνομίας
  chosen: lawless drunkenness
  alternatives:
  - debauched drunkenness
  - drunken orgy
  lexicon: LSJ; Lampe
  rationale: μεθύσμα is a bout of drinking; with ἀνομίας it connotes unrestrained,
    unlawful excess. “Lawless drunkenness” is concise and faithful.
- source_word: τρυφὴ πονηρά
  chosen: wicked luxury
  alternatives:
  - evil self-indulgence
  - depraved indulgence
  lexicon: LSJ
  rationale: τρυφή is luxury/soft living; modifying with πονηρά marks morally corrupt
    indulgence.
- source_word: ἐδέσματα πολλὰ
  chosen: many foods
  alternatives:
  - many dishes
  - delicacies in excess
  lexicon: LSJ
  rationale: Literal “many foods” preserves the concrete image of excess at table;
    a footnote clarifies the nuance of abundance/delicacies.
- source_word: πολυτέλεια πλούτου
  chosen: the extravagance of wealth
  alternatives:
  - luxury of wealth
  - opulence
  lexicon: LSJ
  rationale: πολυτέλεια is costly display; “extravagance” captures conspicuous expense
    tied to wealth.
- source_word: καταλαλιὰ
  chosen: slander
  alternatives:
  - backbiting
  - evil speaking
  lexicon: BDAG
  rationale: Standard moral-catalog gloss retaining forensic and social harm nuances.
- source_word: μνησικακία
  chosen: resentment
  alternatives:
  - bearing a grudge
  - remembering wrongs
  lexicon: BDAG; Lampe
  rationale: Captures the sense of harboring ill will and not letting go of past wrongs.
- source_word: κλέμμα
  chosen: theft
  alternatives:
  - stealing
  lexicon: LSJ
  rationale: Concrete legal/moral term; “theft” is the standard noun form.
- source_word: ἀποστέρησις
  chosen: defrauding
  alternatives:
  - robbery by deprivation
  - depriving
  lexicon: BDAG
  rationale: Refers to wrongful deprivation of what is owed; “defrauding” fits well
    in vice lists.
- source_word: κενοδοξία
  chosen: vainglory
  alternatives:
  - empty pride
  - conceit
  lexicon: BDAG; LSJ
  rationale: Traditional rendering that preserves the nuance of glorying in emptiness;
    fits Hermas’s moral tone.
- source_word: ἀλαζονεία
  chosen: boastful pretension
  alternatives:
  - braggadocio
  - arrogant boasting
  lexicon: BDAG
  rationale: Conveys boastful swagger and false claims; paired with vainglory to avoid
    redundancy with “pride.”
- source_word: ὁμόνοια
  chosen: concord
  alternatives:
  - unity of mind
  - harmony
  lexicon: LSJ
  rationale: “Concord” is concise and preserves the sense of shared mind/peace among
    believers.
- source_word: ῥήματα δικαιοσύνης
  chosen: words of righteousness
  alternatives:
  - righteous speech
  - just words
  lexicon: LSJ; Lampe
  rationale: Literal rendering retains the concrete focus on speech that accords with
    righteousness; footnote supplies an idiomatic alternative.
- source_word: ὑπομονή
  chosen: endurance
  alternatives:
  - patience
  - steadfastness
  lexicon: BDAG
  rationale: “Endurance” emphasizes active steadfast perseverance, fitting Hermas’s
    exhortational context.
- source_word: χήραις ὑπηρετεῖν
  chosen: to serve widows
  alternatives:
  - to assist widows
  - to minister to widows
  lexicon: BDAG
  rationale: Ὑπηρετεῖν implies practical service; “serve” is clear and concrete.
- source_word: ὀρφανοὺς… ἐπισκέπτεσθαι
  chosen: to visit orphans (and those in want)
  alternatives:
  - to look after orphans
  - to care for orphans
  lexicon: BDAG
  rationale: ἐπισκέπτομαι is to visit with care; “visit” preserves the idiom while
    implying concern.
- source_word: ἐξ ἀναγκῶν λυτροῦσθαι
  chosen: to redeem … from distresses
  alternatives:
  - to ransom from necessities
  - to deliver from hardships
  lexicon: LSJ; Lampe
  rationale: λυτρόω has the sense of ransoming; ἀνάγκαι are compulsions/distresses.
    The chosen rendering keeps the economic-rescue imagery.
- source_word: φιλόξενος / φιλοξενία
  chosen: hospitable / hospitality
  alternatives:
  - lover of strangers / hospitality
  lexicon: BDAG
  rationale: Standard Christian virtue term; retains early-church texture without
    paraphrase.
- source_word: ἀγαθοποίησις
  chosen: doing good
  alternatives:
  - benefaction
  - good deed
  lexicon: BDAG; Lampe
  rationale: The abstract noun denotes the practice of beneficence; “doing good” is
    idiomatic and clear.
- source_word: ἡσύχιος
  chosen: quiet
  alternatives:
  - peaceable
  - tranquil
  lexicon: BDAG; LSJ
  rationale: “Quiet” matches the moral tone and classical usage of ἡσύχιος as calm,
    not contentious.
- source_word: ἐνδεέστερον γίνεσθαι πάντων ἀνθρώπων
  chosen: to make yourself one who has less than all people
  alternatives:
  - to become poorer than everyone
  - to accept being in want more than others
  lexicon: LSJ; Lampe
  rationale: ἐνδεής means lacking/in need; Hermas exhorts voluntary lowliness and
    self‑limitation for others’ sake. The chosen rendering keeps the literal nuance
    with a voluntary-reflexive flavor.
- source_word: πρεσβύτας σέβεσθαι
  chosen: to honor the elderly
  alternatives:
  - to revere elders
  - to respect old men
  lexicon: LSJ; Lampe
  rationale: πρεσβύτης here denotes age, not office. “Honor the elderly” captures
    deference to the aged.
- source_word: ἀδελφότητα συντηρεῖν
  chosen: to preserve the brotherhood
  alternatives:
  - to maintain the community
  - to keep the fellowship
  lexicon: Lampe
  rationale: “Brotherhood” reflects early Christian familial identity; “preserve”
    underscores active maintenance.
- source_word: ὕβρις
  chosen: insult
  alternatives:
  - outrage
  - abuse
  lexicon: LSJ
  rationale: Here as something to endure; “insult” captures affronts without importing
    legal nuance.
- source_word: μακρόθυμος
  chosen: long‑suffering
  alternatives:
  - patient
  - forbearing
  lexicon: BDAG
  rationale: Traditional rendering that keeps the rich, active sense of enduring provocation.
- source_word: κάμνοντας τῇ ψυχῇ
  chosen: weary in soul
  alternatives:
  - fainthearted
  - discouraged
  lexicon: BDAG; Lampe
  rationale: Literal yet intelligible phrasing that preserves Hermas’s pastoral tone.
- source_word: σκανδαλίζω (pass.) ἀπὸ τῆς πίστεως
  chosen: scandalized away from the faith
  alternatives:
  - caused to stumble from the faith
  - led astray from the faith
  lexicon: BDAG
  rationale: Keeps the distinctive “scandal” idiom and the prepositional nuance of
    moving away from faith.
- source_word: εὐθύμους ποιεῖν
  chosen: make them cheerful
  alternatives:
  - make them of good courage
  - encourage them
  lexicon: BDAG
  rationale: εὔθυμος is cheerful/confident; “cheerful” pairs with the preceding pastoral
    actions.
- source_word: νουθετεῖν
  chosen: to admonish
  alternatives:
  - to warn
  - to counsel
  lexicon: BDAG
  rationale: Technical term for moral admonition, fitting paraenetic register.
- source_word: χρεώστας μὴ θλίβειν
  chosen: not to press debtors
  alternatives:
  - not to harass debtors
  - not to exact from debtors
  lexicon: BDAG; LSJ
  rationale: θλίβω can mean to press/afflict; in economic context, “press” (i.e.,
    dun) captures the sense.
- source_word: ἐγγράφω
  chosen: be enrolled
  alternatives:
  - be registered
  - be inscribed
  lexicon: LSJ; Lampe
  rationale: Civic/record-keeping metaphor; “enrolled” retains the formal image without
    specifying the book.
- source_word: ἐντολή
  chosen: commandment
  alternatives:
  - command
  - instruction
  lexicon: BDAG
  rationale: Hermas uses ἐντολή as moral mandate; “commandment” preserves weight and
    traditional moral tone.
