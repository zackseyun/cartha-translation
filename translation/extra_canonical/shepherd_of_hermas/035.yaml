- issue: Rendering δοῦλος τοῦ θεοῦ
  chosen_reading: “slave of God” rather than “servant of God”
  alternative_readings:
  - servant of God
  - bondservant of God
  rationale: Project policy uses “slave” where belonging/ownership and obedience are
    foregrounded. Hermas emphasizes the believer’s bound duty to restrain from evil
    and do good.
  doctrine_reference: 'DOCTRINE.md → Contested terms: δοῦλος'
- issue: Phrase ζῆσαι τῷ θεῷ
  chosen_reading: “live to God”
  alternative_readings:
  - live for God
  - live with God
  rationale: Maintains Hermas’s distinctive idiom and goal-oriented dative. Avoids
    smoothing to contemporary phrasing and preserves early-Christian texture.
  doctrine_reference: 'Translation philosophy: preserve theological tension and original
    diction'
- issue: Fear of the Lord (φόβος κυρίου)
  chosen_reading: “fear of the Lord”
  alternative_readings:
  - reverence for the Lord
  rationale: Retains the traditional moral-theological category recognized in early
    Christian catechesis without dilution.
- issue: Brotherhood (ἀδελφότητα) vs. community
  chosen_reading: “brotherhood”
  alternative_readings:
  - community
  - fellowship
  rationale: Preserves the familial, covenantal texture of early Christian self-understanding.
  doctrine_reference: 'What matters most: preserve second-century church texture'
- issue: ἐνδεέστερον γίνεσθαι πάντων ἀνθρώπων
  chosen_reading: Voluntary acceptance of want (make yourself one who has less than
    all people)
  alternative_readings:
  - become poorer than everyone
  - make yourself last of all
  rationale: Hermas advocates self-limitation for others’ good; the rendering preserves
    the literal semantics of ἐνδεής (lacking) while signaling voluntary posture.
- issue: ἐξ ἀναγκῶν λυτροῦσθαι τοὺς δούλους τοῦ θεοῦ
  chosen_reading: 'Economic/social rescue: redeem from distresses'
  alternative_readings:
  - deliver from necessities
  - ransom from bondage
  rationale: Keeps the redemption/rescue metaphor (λυτρόω) and acknowledges ἀνάγκαι
    as pressing hardships; fits early Christian practice of ransoming and relief.
- issue: σκανδαλισμένους ἀπὸ τῆς πίστεως
  chosen_reading: “scandalized away from the faith” to retain the scandal/stumble
    idiom
  alternative_readings:
  - stumbled from the faith
  - led astray from the faith
  rationale: Preserves the vivid early Christian metaphor and the prepositional sense
    of moving away from faith, while pastoral actions aim at restoration.
  doctrine_reference: 'What matters most: do not flatten early Christian categories'
