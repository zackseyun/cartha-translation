translation:
  text: 'I say to him, “Sir, make known to me what this tree is; for I am perplexed
    about it, because, though so many branches have been cut off, the tree is sound,
    and nothing appears to have been cut away from it. About this, therefore, I am
    at a loss.”


    “Listen,” he says. “This great tree that covers plains and mountains and the whole
    earth is the law of God given to the whole world. And this law is the Son of God,
    proclaimed to the ends of the earth; and the peoples under the shade are those
    who heard the proclamation and believed in him.[a]


    “And the great and glorious angel is Michael, who has authority over this people
    and governs them. For he is the one who gives the law to them, into the hearts
    of those who believe; therefore he himself visits those to whom he gave it, to
    see whether they have kept it.


    “You see the rods of each person; for the rods are the law. You see, then, many
    rods made worthless; and you will recognize all those who have not kept the law,
    and you will see the dwelling of each one.”[b][c]


    I say to him, “Sir, why did he send some away into the tower, but leave others
    to you?”


    “All who transgressed the law which they received from him,” he says, “he left
    under my authority for repentance; but those who have already been pleasing to
    the law and have kept it, he has under his own authority.”[d][e]


    “Who then, Sir,” I say, “are the ones who are crowned and go into the tower?”


    “[Those who grappled with the devil and overcame him,” he says, “are crowned.][f][g]
    These are the ones who suffered for the law.[h]


    “But the others, who themselves also handed in their rods green and having side-shoots,
    yet without fruit—these are those who were hard-pressed for the law, but did not
    suffer, nor did they deny their law.


    “And those who handed in green rods just as they received them are dignified and
    righteous and have walked with a very pure heart, and have guarded the commandments
    of the Lord. The rest you will learn when I examine these rods that have been
    planted and watered.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: 'a'
    text: Hermas here identifies the “law of God” with the Son of God and his proclamation.
      The term “law” in this Similitude functions as God’s binding instruction embodied
      and announced by the Son, not as a narrow reference to the Mosaic code.
    reason: cultural_note
  - marker: 'b'
    text: '“The rods are the law”: see the willow-rod allegory introduced earlier
      in Similitude 8 for how individual rods symbolize people’s relation to the divine
      law.'
    reason: cross_reference
  - marker: 'c'
    text: '“Made worthless” translates a verb meaning “rendered useless” or “spoiled.”
      Alternatives: “ruined,” “rendered useless.”'
    reason: lexical_alternative
  - marker: 'd'
    text: “Repentance” renders the noun metanoia. While it can denote a change of
      mind, Hermas’s penitential context supports the established church sense of
      turning back through confession and amendment.
    reason: cultural_note
  - marker: 'e'
    text: 'Literal: “have been well-pleasing with respect to the law.” Some English
      versions supply an implicit object (“to God”), but the Greek does not state
      one.'
    reason: alternative_reading
  - marker: 'f'
    text: “Crowned” evokes the athletic victor’s wreath and, in Christian usage, the
      honor of those who overcome in trial.
    reason: cultural_note
  - marker: 'g'
    text: 'Textual variant: The sentence “Those who grappled with the devil and overcame
      him are crowned” is bracketed in some editions and absent in some witnesses.'
    reason: textual_variant
  - marker: 'h'
    text: 'The contrast suggests two groups: some suffered (likely to the point of
      death), others were pressed by trials but neither underwent that ultimate suffering
      nor denied the law.'
    reason: cultural_note
  - marker: a
    text: Or 'and you will see the dwelling of each one.[b][c]'.
    reason: previous_rendering
  - marker: b
    text: Or '“[Those who grappled with the devil and overcame him are crowned.][f][g]'.
    reason: previous_rendering
lexical_decisions:
- source_word: κύριε
  chosen: Sir
  alternatives:
  - Lord
  - master
  lexicon: BDAG
  rationale: Here Hermas addresses an angelic guide, not God; rendering as “Sir” avoids
    conflation with the divine title “Lord.”
- source_word: νόμος
  chosen: law
  alternatives:
  - instruction
  - teaching
  lexicon: BDAG / LSJ
  rationale: The passage repeatedly calls the symbol “the law” and even equates it
    with the Son of God; preserving “law” retains the weighty, covenantal register
    and Hermas’s own diction.
- source_word: σκεπάζον
  chosen: covers
  alternatives:
  - overshadows
  - shades
  lexicon: BDAG / LSJ
  rationale: The participle describes the tree’s protective spread; “covers” is clear
    and preserves the imagery of shade without over-interpretation.
- source_word: κηρυχθείς
  chosen: proclaimed
  alternatives:
  - heralded
  - preached
  lexicon: BDAG
  rationale: Standard rendering for the passive of kērussō; “proclaimed” keeps the
    heraldic sense without importing ecclesiastical jargon.
- source_word: λαοί
  chosen: peoples
  alternatives:
  - nations
  - crowds
  lexicon: BDAG / LSJ
  rationale: “Peoples” captures plural groups under the tree’s shade and fits Hermas’s
    broad scope.
- source_word: ἄγγελος … Μιχαήλ
  chosen: angel … Michael
  lexicon: BDAG
  rationale: Proper name and common noun rendered by standard English equivalents.
- source_word: ἐξουσία
  chosen: authority
  alternatives:
  - power
  - control
  lexicon: BDAG
  rationale: “Authority” matches the governance context and Hermas’s administrative
    imagery.
- source_word: διακυβερνῶν
  chosen: governs
  alternatives:
  - steers
  - directs
  lexicon: LSJ
  rationale: Nautical metaphor of steering extended to governance; “governs” fits
    the context and English idiom.
- source_word: διδοὺς … εἰς τὰς καρδίας
  chosen: gives … into the hearts
  alternatives:
  - puts … into the hearts
  - writes … on the hearts
  lexicon: BDAG
  rationale: Retains the prepositional imagery without importing Jeremiah 31 “write
    on hearts” language.
- source_word: ἐπισκέπτεται
  chosen: visits
  alternatives:
  - inspects
  - looks into
  lexicon: BDAG
  rationale: The term can mean to visit with oversight; “visits … to see whether”
    captures the pastoral inspection.
- source_word: ῥάβδοι
  chosen: rods
  alternatives:
  - sticks
  - staffs
  lexicon: BDAG / LSJ
  rationale: Consistent with the willow-rod imagery developed in Similitude 8; “rods”
    keeps the concrete symbol.
- source_word: ἠχρειωμένας
  chosen: made worthless
  alternatives:
  - spoiled
  - rendered useless
  - ruined
  lexicon: BDAG
  rationale: Cognate with achreioō (“make useless,” cf. Rom 3:12 LXX/NT); “made worthless”
    is literal and weighty.
- source_word: κατοικία
  chosen: dwelling
  alternatives:
  - abode
  - place of residence
  - home
  lexicon: BDAG / LSJ
  rationale: Literal rendering that preserves the sense of where each belongs/abides
    within the allegory.
- source_word: ἀπέλυσεν
  chosen: send away
  alternatives:
  - dismiss
  - release
  lexicon: BDAG
  rationale: Describes transfer to the tower; “send away” reads smoothly with movement
    imagery.
- source_word: κατέλειψεν
  chosen: left
  alternatives:
  - left behind
  - left over
  lexicon: BDAG
  rationale: Plain narrative verb for leaving some to the angel’s oversight.
- source_word: παρέβησαν
  chosen: transgressed
  alternatives:
  - broke
  - violated
  lexicon: BDAG
  rationale: Legal imagery is active in the passage; “transgressed” retains juridical
    tone.
- source_word: μετάνοια
  chosen: repentance
  alternatives:
  - change of mind
  lexicon: BDAG
  rationale: Given Hermas’s penitential framework and the noun form, “repentance”
    is the clearest established term; cognitive nuance noted in project philosophy.
- source_word: εὐηρέστησαν τῷ νόμῳ
  chosen: were well-pleasing with respect to the law
  alternatives:
  - were well-pleasing to [him]/to God
  - pleased the law
  lexicon: BDAG
  rationale: Literal prepositional construction avoids supplying an implicit object;
    preserves Hermas’s wording for later exegesis.
- source_word: ἐστεφανωμένοι
  chosen: crowned
  alternatives:
  - given a victor’s wreath
  lexicon: BDAG / LSJ
  rationale: The term evokes athletic/martyrial wreaths; “crowned” is concise, with
    the wreath nuance noted in footnotes.
- source_word: συμπαλαίσαντες
  chosen: grappled
  alternatives:
  - wrestled
  lexicon: BDAG / LSJ
  rationale: The compound intensifies struggle; “grappled” conveys close, strenuous
    combat.
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the accuser
  lexicon: BDAG
  rationale: Conventional rendering; keeps personal opponent imagery.
- source_word: παθόντες
  chosen: suffered
  alternatives:
  - underwent suffering
  - suffered (unto death)
  lexicon: BDAG
  rationale: Plain rendering allows readers to see a contrast with “were hard-pressed”;
    martyrdom nuance noted in footnotes.
- source_word: θλιβέντες
  chosen: were hard-pressed
  alternatives:
  - were afflicted
  - were persecuted
  lexicon: BDAG
  rationale: Thlibō evokes pressure/distress; “hard-pressed” keeps the metaphor and
    distinguishes from general suffering (paschō).
- source_word: παραφυάδες
  chosen: side-shoots
  alternatives:
  - offshoots
  - sprouts
  lexicon: LSJ
  rationale: Botanical term for secondary growth; “side-shoots” is precise and keeps
    the horticultural image.
- source_word: χλωράς
  chosen: green
  alternatives:
  - fresh
  - verdant
  lexicon: BDAG / LSJ
  rationale: Describes living, fresh rods; “green” is straightforward and consistent
    with earlier context.
- source_word: πορευθέντες
  chosen: have walked
  alternatives:
  - have lived
  - have conducted themselves
  lexicon: BDAG
  rationale: Biblical idiom for conduct; “walked” keeps the moral-pathway metaphor.
- source_word: λίαν
  chosen: great
  alternatives:
  - exceeding
  - very
  lexicon: BDAG
  rationale: 'Rendered adverbially by intensifying the prepositional phrase: “in great
    purity of heart.”'
- source_word: ἐντολάς
  chosen: commandments
  alternatives:
  - commands
  lexicon: BDAG
  rationale: Standard rendering; weighty moral content retained.
- source_word: κατανοήσω
  chosen: examine
  alternatives:
  - consider carefully
  - observe closely
  lexicon: BDAG
  rationale: The verb implies careful scrutiny; “examine” fits the inspection of planted
    rods.
- source_word: πεφυτευμένας καὶ πεποτισμένας
  chosen: planted and watered
  alternatives:
  - planted and irrigated
  - set and watered
  lexicon: BDAG / LSJ
  rationale: Agricultural imagery preserved with familiar collocation “planted and
    watered.”
