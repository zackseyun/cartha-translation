theological_decisions:
- issue: Identification of the law with the Son of God
  chosen_reading: 'Render literally: “this law is the Son of God, proclaimed to the
    ends of the earth.”'
  alternative_readings:
  - Paraphrase as “the message about the Son of God”
  - Interpret “law” as Mosaic Torah
  rationale: Hermas explicitly equates the symbolic law with the Son and his universal
    proclamation. Paraphrasing would collapse the allegory and import later systematics.
- issue: Addressing the angelic guide with κύριε
  chosen_reading: Translate as “Sir,” not “Lord.”
  alternative_readings:
  - Lord
  - Master
  rationale: To avoid confusing an angelic interlocutor with the divine title “Lord,”
    while retaining respectful address.
  doctrine_reference: 'Translation philosophy: translate titles; avoid over-harmonizing
    NT formulae.'
- issue: μετάνοια as penitential term
  chosen_reading: Translate as “repentance.”
  alternative_readings:
  - change of mind
  rationale: The context is disciplinary oversight and restoration; the traditional
    penitential sense is foregrounded in Hermas.
  doctrine_reference: 'Contested terms: metanoeō/metanoia policy.'
- issue: εὐηρέστησαν τῷ νόμῳ construction
  chosen_reading: Maintain literal “well-pleasing with respect to the law.”
  alternative_readings:
  - 'Supply an implicit object: “well-pleasing to [God].”'
  rationale: The Greek lacks an explicit object; preserving the prepositional phrase
    keeps interpretive options open and mirrors Hermas’s diction.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Bracketed clause about wrestling with the devil
  chosen_reading: Include the sentence in brackets with a footnote noting textual
    variation.
  alternative_readings:
  - Omit the clause as secondary
  rationale: The normalized source prints it in brackets; including with a note preserves
    transparency for readers and editors.
  doctrine_reference: Transparency policy on textual variants.
- issue: “Suffered for the law” vs harmonizing to NT phraseology
  chosen_reading: Translate literally “suffered for the law.”
  alternative_readings:
  - suffered for the Name
  - suffered for Christ
  rationale: Hermas’s wording differs from familiar NT formulas; retaining his phrase
    avoids undue harmonization and keeps the allegory’s internal consistency with
    “law.”
  doctrine_reference: Do not over-harmonize with the New Testament.
