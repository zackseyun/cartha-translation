id: HERM.S.8.iii
reference: Shepherd of Hermas — Similitude 8, section iii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Λέγω αὐτῷ· Κύριε, τὸ δένδρον τοῦτο γνώρισόν μοι τί ἐστιν· ἀποροῦμαι γὰρ περὶ
    αὐτοῦ, ὅτι τοσούτων κλάδων κοπέντων ὑγιές ἐστι τὸ δένδρον καὶ οὐδὲν φαίνεται κεκομμένον
    ἀπ' αὐτοῦ· ἐν τούτῳ οὖν ἀποροῦμαι. 2. Ἄκουε, φησί· τὸ δένδρον τοῦτο τὸ μέγα τὸ
    σκεπάζον πεδία καὶ ὄρη καὶ πᾶσαν τὴν γῆν, νόμος Θεοῦ ἐστὶν ὁ δοθεὶς εἰς ὅλον τὸν
    κόσμον· ὁ δὲ νόμος οὗτος υἱὸς Θεοῦ ἐστὶ κηρυχθεὶς εἰς τὰ πέρατα τῆς γῆς· οἱ δὲ
    ὑπὸ τὴν σκέπην λαοὶ ὄντες, οἱ ἀκούσαντες τοῦ κηρύγματος καὶ πιστεύσαντες εἰς αὐτόν·
    3. ὁ δὲ ἄγγελος ὁ μέγας καὶ ἔνδοξος, Μιχαὴλ ὁ ἔχων τὴν ἐξουσίαν τούτου τοῦ λαοῦ
    καὶ διακυβερνῶν. οὗτος γάρ ἐστιν ὁ διδοὺς αὐτοῖς τὸν νόμον εἰς τὰς καρδίας τῶν
    πιστευόντων· ἐπισκέπτεται οὖν αὐτὸς οἷς ἔδωκεν, εἰ ἄρα τετηρήκασιν αὐτόν. 4. βλέπεις
    δὲ ἑνὸς ἑκάστου τὰς ῥάβδους· αἱ γὰρ ῥάβδοι ὁ νόμος ἐστί. βλέπεις οὖν πολλὰς ῥύβδους
    ἠχρειωμένας, γνώσῃ δὲ αὐτοὺς πάντας τοὺς μὴ τηρήσαντας τὸν νόμον, καὶ ὄψει ἑνὸς
    ἑκάστου τὴν κατοικίαν. 5. λέγω αὐτῷ· Κύριε, διατί οὓς μὲν ἀπέλυσεν εἰς τὸν πύργον,
    οὓς δὲ σοὶ κατέλειψεν; Ὅσοι, φησί, παρέβησαν τὸν νόμον ὃν ἔλαβον παρ' αὐτοῦ, εἰς
    τὴν ἐμὴν ἐξουσίαν κατέλιπεν αὐτοὺς εἰς μετάνοιαν· ὅσοι δὲ ἤδη εὐηρέστησαν τῷ νόμῳ
    καὶ τετηρήκασιν αὐτόν, ὑπὸ τὴν ἰδίαν ἐξουσίαν ἔχει αὐτούς. 6. Τίνες οὖν, φημί,
    κύριε, εἰσὶν οἱ ἐστεφανωμένοι καὶ εἰς τὸν πύργον ὑπάγοντες; [Ὅσοι, φησί, συμπαλαίσαντες
    τῷ διαβόλῳ ἐνίκησαν αὐτόν, ἐστεφανωμένοι εἰσίν·] οὗτοί εἰσιν οἱ ὑπὲρ τοῦ νόμου
    παθόντες· 7. οἱ δὲ ἕτεροι καὶ αὐτοὶ χλωρὰς τὰς ῥάβδους ἐπιδεδωκότες καὶ παραφυάδας
    ἐχούσας, καρπὸν δὲ μὴ ἐχούσας, οἱ ὑπὲρ τοῦ νόμου θλιβέντες, μὴ παθόντες δὲ μηδὲ
    ἀρνησάμενοι τὸν νόμον αὐτῶν. 8. οἱ δὲ χλωρὰς ἐπιδεδωκότες οἵας ἔλαβον, σεμνοὶ
    καὶ δίκαιοι καὶ λίαν πορευθέντες ἐν καθαρᾷ καρδίᾳ καὶ τὰς ἐντολὰς Κυρίου πεφυλακότες.
    τὰ δὲ λοιπὰ γνώσῃ, ὅταν κατανοήσω τὰς ῥάβδους ταύτας τὰς πεφυτευμένας καὶ πεποτισμένας.
