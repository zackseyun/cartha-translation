translation:
  text: 'Again he says to me: Love truth, and let all truth go forth from your mouth, so that the spirit which God has made to dwell in this flesh may be found true Again he says to me: Love truth, and let all truth go forth from your mouth, so that the spirit which God has made to dwell in this flesh may be found true before all people, and thus the Lord who dwells in you will be glorified—for the Lord is true in every word, and there is no falsehood with him.


    Therefore those who tell lies set aside the Lord and become defrauders of the Lord, not handing back to him the deposit which they received. For they received from him a spirit without falsehood. If they return it false, they have defiled the command of the Lord and have become defrauders.


    So when I heard these things, I wept much. But seeing me weeping, he says, “Why are you weeping?” “Because, sir,” I say, “I do not know whether I can be saved.” “Why?” he says. “For,” I say, “sir, never yet in my life have I spoken a true word, but I have always lived craftily with everyone, and I made my lie appear true before all people; and no one ever contradicted me, but my word was believed. How then, I say, sir, can I live, having done these things?”


    He says, “You are thinking well and truly; for it was necessary for you, as a slave of God, to walk in truth, and for a wicked conscience not to dwell with the spirit of truth, nor to bring grief upon the venerable and true spirit.” “Never,” I say, “sir, have I heard such words precisely.”


    “Now then,” he says, “you are hearing; guard them, so that even the former lies which you spoke in your dealings—when these are found true—those also may become trustworthy; for those too can become trustworthy. If you guard these and from now on speak all truth, you will be able to secure life for yourself. And whoever hears this command and keeps away from the most wicked lie will live to God.”, and thus the Lord who dwells in you will be glorified—for the Lord is true in every word, and there is no falsehood with him.


    Therefore those who tell lies set aside the Lord and become defrauders of the Lord, not handing back to him the deposit which they received. For they received from him a spirit without falsehood. If they return it false, they have defiled the command of the Lord and have become defrauders.


    So when I heard these things, I wept much. But seeing me weeping, he says, “Why are you weeping?” “Because, sir,” I say, “I do not know whether I can be saved.” “Why?” he says. “For,” I say, “sir, never yet in my life have I spoken a true word, but I have always lived craftily with everyone, and I made my lie appear true before all people; and no one ever contradicted me, but my word was believed. How then, I say, sir, can I live, having done these things?”


    He says, “You are thinking well and truly; for it was necessary for you, as a slave of God, to walk in truth, and for a wicked conscience not to dwell with the spirit of truth, nor to bring grief upon the venerable and true spirit.” “Never,” I say, “sir, have I heard such words precisely.”


    “Now then,” he says, “you are hearing; guard them, so that even the former lies which you spoke in your dealings—when these are found true—those also may become trustworthy; for those too can become trustworthy. If you guard these and from now on speak all truth, you will be able to secure life for yourself. And whoever hears this command and keeps away from the most wicked lie will live to God.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Defrauders’ translates ἀποστερηταί, active ‘those who deprive/defraud.’ Some take it as ‘bereft of the Lord,’ but the deposit image favors the active sense.
    reason: lexical_alternative
  - marker: b
    text: ‘Deposit’ (παρακαταθήκη) is a technical term for something entrusted for safekeeping; compare 1 Timothy 6:20; 2 Timothy 1:12, 14.
    reason: cross_reference
  - marker: c
    text: ‘Venerable’ renders σεμνός; alternatives include ‘august’ or ‘noble.’ The word is not the usual term for ‘holy’ (ἅγιος).
    reason: lexical_alternative
  - marker: d
    text: ‘When these are found true’ (τούτων εὑρεθέντων ἀληθινῶν) may refer either to the words now spoken truly (preferred) or to the former utterances themselves.
    reason: alternative_reading
  - marker: e
    text: ‘Sir’ translates κύριε in direct address to the messenger, to distinguish from ‘the Lord’ (Κύριος) used of God/the Lord in the same unit.
    reason: cultural_note
  - marker: f
    text: ‘Will live to God’ renders the Greek dative; ‘will live for God’ is a smoother alternative.
    reason: lexical_alternative
  - marker: g
    text: Or 'by all people'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀγάπα
  chosen: love
  lexicon: BDAG
  rationale: Standard rendering of agapaō in imperative; retains ethical force of affection and commitment.
- source_word: ἀλήθεια / ἀληθής / ἀληθινός
  chosen: truth / true
  alternatives:
  - genuine
  - real
  lexicon: BDAG
  rationale: Consistent rendering keeps Hermas’s repeated emphasis on truthfulness concrete and ethical.
- source_word: ἐκπορευέσθω
  chosen: go forth
  alternatives:
  - proceed
  - come out
  lexicon: BDAG
  rationale: “Go forth” preserves vivid imagery of speech issuing from the mouth without over-smoothing.
- source_word: πνεῦμα
  chosen: spirit
  alternatives:
  - Spirit
  lexicon: BDAG
  rationale: Rendered lower-case to preserve Hermas’s idiom and allow interpretive openness; context suggests a divine gift dwelling in the believer.
- source_word: κατῴκισεν
  chosen: made to dwell
  alternatives:
  - caused to dwell
  - settled
  lexicon: LSJ
  rationale: Causative nuance of katoikizō fits the phrase "which God made to dwell in this flesh."
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Title for God/Christ retained as “the Lord” per project conventions.
- source_word: ψεῦδος / ψεύδομαι / ψεῦσμα
  chosen: falsehood / tell lies / lie
  alternatives:
  - falsehood / lie
  lexicon: BDAG
  rationale: Varies slightly to fit English syntax while keeping the same semantic field; maintains ethical weight of lying.
- source_word: ἀθετοῦσι
  chosen: set aside
  alternatives:
  - reject
  - nullify
  lexicon: BDAG
  rationale: “Set aside” captures the act of disregarding/repudiating the Lord’s claim inherent in the metaphor.
- source_word: ἀποστερηταί
  chosen: defrauders
  alternatives:
  - robbers
  - deprivers
  lexicon: LSJ
  rationale: Active sense suits the deposit metaphor; they wrongfully withhold what is owed to the Lord.
- source_word: παρακαταθήκη
  chosen: deposit
  alternatives:
  - trust
  - pledge
  lexicon: BDAG
  rationale: Technical term for something entrusted for safekeeping; the imagery governs the paragraph.
- source_word: ἄψευστον
  chosen: without falsehood
  alternatives:
  - unlying
  - truthful
  lexicon: LSJ
  rationale: Retains the privative force; “unlying” is vivid but less idiomatic in modern English.
- source_word: ἐμίαναν
  chosen: defiled
  alternatives:
  - stained
  - polluted
  lexicon: BDAG
  rationale: Carries moral/ritual contamination imagery appropriate to Hermas’s exhortational tone.
- source_word: πανοῦργος
  chosen: craftily
  alternatives:
  - with guile
  - cunningly
  lexicon: LSJ
  rationale: Conveys ethically negative shrewdness; adverbial in English fits the confession.
- source_word: ἀντεῖπεν
  chosen: contradicted
  alternatives:
  - gainsaid
  - opposed
  lexicon: BDAG
  rationale: Modern and clear rendering of a direct contradiction in speech.
- source_word: φρονεῖς
  chosen: are thinking
  alternatives:
  - judge
  - are minded
  lexicon: BDAG
  rationale: Hermas’s assessor affirms Hermas’s moral evaluation; “think” is straightforward.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Project default retains the bonded nature where theological identity is in view.
- source_word: πορεύεσθαι
  chosen: walk
  alternatives:
  - conduct oneself
  - live
  lexicon: BDAG
  rationale: Standard metaphor for ethical conduct; preserves biblical-register diction.
- source_word: συνείδησιν
  chosen: conscience
  lexicon: BDAG
  rationale: Established rendering; ethical inner awareness is in view.
- source_word: πνεῦμα τῆς ἀληθείας
  chosen: spirit of truth
  alternatives:
  - Spirit of truth
  lexicon: BDAG
  rationale: Lower-case to avoid importing later Trinitarian capitalization while preserving the phrase.
- source_word: λύπην ἐπάγειν
  chosen: bring grief
  alternatives:
  - cause sorrow
  - afflict with grief
  lexicon: BDAG
  rationale: Direct, maintains affective force toward the spirit.
- source_word: σεμνός
  chosen: venerable
  alternatives:
  - august
  - noble
  lexicon: LSJ
  rationale: Captures reverent/august quality without importing “holy,” which is not the word used.
- source_word: ἀκριβῶς
  chosen: precisely
  alternatives:
  - exactly
  lexicon: BDAG
  rationale: Conveys exactness; Hermas expresses surprise at the clarity/precision.
- source_word: φύλασσε
  chosen: guard
  alternatives:
  - keep
  - observe
  lexicon: BDAG
  rationale: Preserves vigilant sense of keeping a command.
- source_word: πραγματείαις
  chosen: dealings
  alternatives:
  - business affairs
  - transactions
  lexicon: LSJ
  rationale: Secular-commercial sphere of life; “dealings” is concise and natural.
- source_word: πιστά
  chosen: trustworthy
  alternatives:
  - reliable
  - believed
  lexicon: BDAG
  rationale: In context describes words that can be credited as true.
- source_word: λαλήσῃς
  chosen: speak
  alternatives:
  - say
  lexicon: BDAG
  rationale: Neutral verb for utterance; repeated often in this unit.
- source_word: ζωὴν περιποιήσασθαι
  chosen: secure life
  alternatives:
  - gain life
  - obtain life
  lexicon: BDAG
  rationale: Peripoieō has the sense of acquiring/preserving for oneself; “secure” balances nuance and readability.
- source_word: ἀπέχηται
  chosen: keeps away
  alternatives:
  - abstains
  - holds back from
  lexicon: BDAG
  rationale: Concrete ethical abstention; modern idiom.
- source_word: πονηροτάτου
  chosen: most wicked
  alternatives:
  - most evil
  - worst
  lexicon: BDAG
  rationale: Superlative preserved to maintain the intensification.
- source_word: ζήσεται τῷ Θεῷ
  chosen: will live to God
  alternatives:
  - will live for God
  - will live unto God
  lexicon: BDAG
  rationale: Retains the dative’s orientation; “to God” is a transparent rendering of the phrase.
