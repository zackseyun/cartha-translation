  text: Πάλιν μοι λέγει· Ἀλήθειαν ἀγάπα, καὶ πᾶσα ἀλήθεια ἐκ τοῦ στόματός σου ἐκπορευέσθω, ἵνα τὸ πνεῦμα, ὃ ὁ Θεὸς κατῴκισεν ἐν τῇ σαρκὶ ταύτῃ, ἀληθὲς εὑρεθῇ παρὰ πᾶσιν ἀνθρώποις, καὶ οὕτως δοξασθήσεται ὁ Κύριος ὁ ἐν σοὶ κατοικῶν· ὅτι ὁ Κύριος ἀληθινὸς ἐν παντὶ ῥήματι, καὶ οὐδὲν παρ’ αὐτῷ ψεῦδος· 2. οἱ οὖν ψευδόμενοι ἀθετοῦσι τὸν Κύριον καὶ γίνονται ἀποστερηταὶ τοῦ Κυρίου, μὴ παραδιδόντες αὐτῷ τὴν παρακαταθήκην ἣν ἔλαβον. ἔλαβον γὰρ παρ’ αὐτοῦ πνεῦμα ἄψευστον. τοῦτο ἐὰν ψευδὲς ἀποδώσωσιν, ἐμίαναν τὴν ἐντολὴν τοῦ Κυρίου καὶ ἐγένοντο ἀποστερηταί. 3. ταῦτα οὖν ἀκούσας ἐγὼ ἔκλαυσα λίαν. ἰδὼν δέ με κλαίοντα λέγει· Τί κλαίεις; Ὅτι, φημί, κύριε, οὐκ οἶδα εἰ δύναμαι σωθῆναι. Διατί; φησίν. Οὐδέπω γάρ, φημί, κύριε, ἐν τῇ ἐμῇ ζωῇ ἀληθὲς ἐλάλησα ῥῆμα, ἀλλὰ πάντοτε πανοῦργος ἔζησα μετὰ πάντων, καὶ τὸ ψεῦδός μου ἀληθὲς ἐπέδειξα παρὰ πᾶσιν ἀνθρώποις· καὶ οὐδέποτέ μοι οὐδεὶς ἀντεῖπεν, ἀλλ’ ἐπιστεύθη τῷ λόγῳ μου. πῶς οὖν, φημί, κύριε, δύναμαι ζῆσαι ταῦτα πράξας; 4. Σὺ μέν, φησί, καλῶς καὶ ἀληθῶς φρονεῖς·
    ἔδει γάρ σε ὡς Θεοῦ δοῦλον ἐν ἀληθείᾳ πορεύεσθαι καὶ πονηρὰν συνείδησιν μετὰ τοῦ πνεύματος τῆς ἀληθείας μὴ κατοικεῖν, μηδὲ λύπην ἐπάγειν τῷ πνεύματι τῷ σεμνῷ καὶ ἀληθεῖ. Οὐδέποτε, φημί, κύριε, τοιαῦτα ῥήματα ἀκριβῶς ἤκουσα. 5. Νῦν οὖν, φησίν, ἀκούεις· φύλασσε αὐτά, ἵνα καὶ τὰ πρότερον ἃ ἐλάλησας ψεύδη ἐν ταῖς πραγματείαις σου, τούτων εὑρεθέντων ἀληθινῶν, κἀκεῖνα πιστὰ γένηται· δύναται γὰρ κἀκεῖνα πιστὰ γενέσθαι. ἐὰν ταῦτα φυλάξῃς καὶ ἀπὸ τοῦ νῦν πᾶσαν ἀλήθειαν λαλήσῃς, δυνήσῃ σεαυτῷ ζωὴν περιποιήσασθαι. καὶ ὃς ἂν ἀκούσῃ τὴν ἐντολὴν ταύτην καὶ ἀπέχηται τοῦ πονηροτάτου ψεύσματος, ζήσεται τῷ Θεῷ.
