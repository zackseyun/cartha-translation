theological_decisions:
- issue: Identity of the spirit given by God and dwelling “in this flesh” (πνεῦμα … κατῴκισεν ἐν τῇ σαρκὶ ταύτῃ)
  chosen_reading: The spirit is the divine gift from God (often associated with the holy spirit in early Christian idiom), characterized as ‘without falsehood,’ dwelling in the believer.
  alternative_readings:
  - The human spirit/breath created by God.
  rationale: The parallel statements—receiving from God ‘a spirit without falsehood,’ returning it ‘false,’ and glorifying ‘the Lord who dwells in you’—favor a divine indwelling gift rather than merely human psyche or breath.
- issue: Sense of ἀποστερηταί τοῦ Κυρίου
  chosen_reading: 'Active: ‘defrauders of the Lord’—they wrong the Lord by failing to return the entrusted deposit.'
  alternative_readings:
  - 'Passive: ‘bereft of the Lord’ (i.e., deprived of the Lord).'
  rationale: Lexically ἀποστερητής is an active agent (‘defrauder, depriver’). The deposit metaphor (‘not handing back the deposit’) confirms the active sense.
- issue: Referent of ‘these’ in ‘when these are found true’ (τούτων εὑρεθέντων ἀληθινῶν)
  chosen_reading: ‘These’ refers to the words now spoken truly; as these are found true, former words (once lies) may become trusted as your reputation is restored.
  alternative_readings:
  - ‘These’ refers back to the former utterances themselves, paradoxically ‘found true.’
  rationale: 'The logic of restored credibility fits the admonition: present truthfulness rehabilitates one’s word. The alternative creates a paradox less coherent in context.'
- issue: Scope of ‘the most wicked lie’ (τοῦ πονηροτάτου ψεύσματος)
  chosen_reading: General superlative intensifying all lying rather than a technical reference to perjury or denial of the Lord.
  alternative_readings:
  - A specific vice such as perjury; apostasy (denial of the Lord).
  rationale: The immediate context concerns comprehensive truth-telling in speech, not oaths or apostasy. The superlative heightens the moral gravity of lying broadly.
- issue: Rendering δοῦλος as ‘slave’
  chosen_reading: ‘Slave of God’ in this paraenetic context to preserve the bonded identity and obligation.
  alternative_readings:
  - Servant of God
  - Bondservant of God
  rationale: 'Project default: use ‘slave’ where the ownership/obligation dimension is salient to the exhortation.'
  doctrine_reference: 'Translation philosophy: Contested terms / doulos.'
- issue: Rendering ζήσεται τῷ Θεῷ
  chosen_reading: ‘Will live to God’ preserves the dative orientation.
  alternative_readings:
  - ‘Will live for God’ (functional/teleological).
  rationale: Maintains the textual wording and early-Christian idiom; footnote provides the smoother alternative.
