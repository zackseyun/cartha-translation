id: HERM.S.8.iv
reference: Shepherd of Hermas — Similitude 8, section iv
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Καὶ μετὰ ἡμέρας ὀλίγας ἤλθομεν εἰς τὸν τόπον, καὶ ἐκάθισεν ὁ ποιμὴν εἰς τὸν
    τόπον τοῦ ἀγγέλου, κἀγὼ παρεστάθην αὐτῷ. καὶ λέγει μοι· Περίζωσαι ὠμόλινον, καὶ
    διακόνει μοι. καὶ περιεζωσάμην ὠμόλινον ἐκ σάκκου γεγονὸς καθαρόν. 2. ἰδὼν δέ
    με περιεζωσμένον καὶ ἕτοιμον ὄντα τοῦ διακονεῖν αὐτῷ, Κάλει, φησί, τοὺς ἄνδρας
    ὧν εἰσὶν αἱ ῥάβδοι πεφυτευμέναι, κατὰ τὸ τάγμα ὡς ἕκαστος ἔδωκε τὰς ῥάβδους. καὶ
    ἀπῆλθον εἰς τὸ πεδίον, καὶ ἐκάλεσα πάντας· καὶ ἔστησαν πάντες κατὰ τὰ τάγματα.
    3. λέγει αὐτοῖς· Ἕκαστος τὰς ἰδίας ῥάβδους ἐκτιλάτω καὶ φερέτω πρός με. 4. πρῶτοι
    ἐπέδωκαν οἱ τὰς ξηρὰς καὶ κεκομμένας ἐσχηκότες, καὶ ὡσαύτως εὑρέθησαν ξηραὶ καὶ
    κεκομμέναι· ἐκέλευσεν αὐτοὺς χωρὶς σταθῆναι. 5. εἶτα ἐπέδωκαν οἱ τὰς ξηρὰς καὶ
    μὴ κεκομμένας ἔχοντες· τινὲς δὲ ἐξ αὐτῶν ἐπέδωκαν τὰς ῥάβδους χλωράς, τινὲς δὲ
    ξηρὰς καὶ κεκομμένας ὡς ὑπὸ σητός. τοὺς ἐπιδεδωκότας οὖν χλωρὰς ἐκέλευσε χωρὶς
    σταθῆναι, τοὺς δὲ ξηρὰ
  language: Greek
