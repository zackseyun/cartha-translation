  from: made of sackcloth
  to: made from a sack
  rationale: 'The Greek `ἐκ σάκκου γεγονὸς` means ''made from a sack''. Translating
    it as ''made of sackcloth'' creates a contradiction in materials with the preceding
    `ὠμόλινον` (raw linen), as sackcloth was typically woven from goat hair. Rendering
    it ''made from a sack'' resolves this and aligns with the literal use of `ἐκ`.
    | Adjudicator: The reviewer is correct. The Greek word ὠμόλινον specifies the
    material as raw or unbleached linen. Translating ἐκ σάκκου as ''of sackcloth''
    introduces a contradiction, as sackcloth was typically woven'
