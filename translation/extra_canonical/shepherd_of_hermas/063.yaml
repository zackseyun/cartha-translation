translation:
  text: 'And after a few days we came to the place, and the Shepherd sat down in the
    place of the angel, and I stood beside him. And he says to me, “Gird yourself
    with a raw-linen garment, and serve me.” So I girded myself with a clean raw-linen
    garment made from sackcloth.


    2. Seeing me girded and ready to serve him, he says, “Call the men whose rods
    have been planted, by rank, just as each gave the rods.” And I went out to the
    field and called them all; and they all stood in their ranks.


    3. He says to them, “Let each pull up his own rods and bring them to me.”


    4. First those who had the dry and cut [rods] handed them in, and they were found
    likewise to be dry and cut; and he ordered them to stand apart.


    5. Then those who had the dry but not cut [rods] handed them in. And some of them
    handed in their rods green, but others dry and cut, as if worm-eaten. So those
    who had handed in green [rods] he ordered to stand apart, but those with dry—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The word ὠμόλινον denotes raw/coarse linen; the object is implied by the
      verb “gird,” hence “sash.” The mention of sackcloth underscores penitential
      texture.
    reason: cultural_note
  - marker: b
    text: 'Cross-reference: the rods were distributed and planted earlier in Similitude
      8 (sections ii–iii).'
    reason: cross_reference
  - marker: c
    text: Greek σητός can also be rendered “moth-eaten”; “worm-eaten” fits wooden
      rods more naturally.
    reason: lexical_alternative
  - marker: d
    text: The sentence breaks here in this section; the action continues in the following
      section (Similitude 8, v).
    reason: cross_reference
  - marker: e
    text: Or 'made of sackcloth'.
    reason: previous_rendering
lexical_decisions:
- source_word: ποιμήν
  chosen: Shepherd
  alternatives:
  - pastor
  - herdsman
  lexicon: LSJ
  entry: ποιμήν
  rationale: The guiding figure is consistently titled “the Shepherd” in this work;
    retaining “Shepherd” preserves the titular role and imagery rather than modern
    ecclesial connotations of “pastor.”
- source_word: τόπος (εἰς τὸν τόπον τοῦ ἀγγέλου)
  chosen: place
  alternatives:
  - seat
  - station
  lexicon: LSJ
  entry: τόπος
  rationale: “Place” is the default sense and keeps the scene spatially concrete;
    “seat” adds specificity not present in the noun here.
- source_word: ἄγγελος
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  entry: ἄγγελος
  rationale: In Hermas the figure is a heavenly being; “angel” preserves that category
    rather than the broader ‘messenger.’
- source_word: παρεστάθην
  chosen: I stood by him
  alternatives:
  - I took my stand beside him
  - I stood near him
  lexicon: LSJ
  entry: παρίστημι
  rationale: The middle/passive aorist here conveys taking one’s position; “stood
    by him” is idiomatic and faithful.
- source_word: Περίζωσαι
  chosen: Gird yourself
  alternatives:
  - Belt yourself
  - Tie on a sash
  lexicon: LSJ
  entry: περιζώννυμι
  rationale: “Gird yourself” preserves the biblical-ancient action of binding a sash
    for service without unnecessary modernization.
- source_word: ὠμόλινον
  chosen: raw-linen
  alternatives:
  - coarse linen
  - flaxen
  lexicon: LSJ
  entry: ὠμόλινος
  rationale: The term denotes linen in its raw or coarse state; “raw-linen” captures
    material quality, with ‘sash’ supplied by context from the verb ‘gird.’
- source_word: σάκκος
  chosen: sackcloth
  alternatives:
  - sack
  - coarse cloth
  lexicon: LSJ
  entry: σάκκος
  rationale: Standard rendering for penitential coarse fabric; preserves texture of
    the scene.
- source_word: διακονεῖν
  chosen: serve
  alternatives:
  - minister
  lexicon: BDAG
  entry: διακονέω
  rationale: “Serve” is the basic sense and avoids anachronistic clerical nuance implied
    by “minister.”
- source_word: πεφυτευμέναι
  chosen: have been planted
  alternatives:
  - are planted
  - have been set in the ground
  lexicon: LSJ
  entry: φυτεύω
  rationale: Perfect passive indicates completed state; “have been planted” tracks
    aspect.
- source_word: τὰ τάγματα / κατὰ τὸ τάγμα
  chosen: ranks
  alternatives:
  - order
  - arrangement
  lexicon: LSJ
  entry: τάγμα
  rationale: The term often denotes ordered groups; “ranks” conveys organized arrangement
    without over-militarizing.
- source_word: πεδίον
  chosen: plain
  alternatives:
  - field
  - open country
  lexicon: LSJ
  entry: πεδίον
  rationale: “Plain” renders the broad, open area implied and suits the visionary
    setting; “field” would suggest cultivation.
- source_word: ἔστησαν
  chosen: they stood
  alternatives:
  - they took their stand
  lexicon: LSJ
  entry: ἵστημι
  rationale: Simple past English aligns with narrative flow, with the sense of forming
    up preserved by the following “in their ranks.”
- source_word: ἐκτιλάτω (ἐκτίλλω)
  chosen: let him pull up
  alternatives:
  - let him pluck up
  - let him tear up
  lexicon: LSJ
  entry: ἐκτίλλω
  rationale: Given that the rods had been planted, “pull up” best fits the agricultural-physical
    action.
- source_word: ῥάβδοι
  chosen: rods
  alternatives:
  - staves
  - sticks
  lexicon: LSJ
  entry: ῥάβδος
  rationale: “Rods” suits the symbolic items of uniform size earlier in the Similitude
    and avoids personal ‘staff’ connotations.
- source_word: ἐπέδωκαν
  chosen: handed in
  alternatives:
  - delivered
  - gave up
  lexicon: LSJ
  entry: ἐπιδίδωμι
  rationale: “Handed in” reflects a formal submission back to the overseer and matches
    the repeated procedural act.
- source_word: κεκομμένας (from κόπτω)
  chosen: cut
  alternatives:
  - cut off
  - shorn
  lexicon: LSJ
  entry: κόπτω
  rationale: “Cut” is concise and idiomatic; “cut off” adds an object not specified;
    “shorn” suggests hair/wool.
- source_word: χλωράς
  chosen: green
  alternatives:
  - fresh
  - verdant
  lexicon: LSJ
  entry: χλωρός
  rationale: “Green” carries the vivid contrast with “dry” in the rod imagery.
- source_word: σητός
  chosen: worm-eaten
  alternatives:
  - moth-eaten
  - gnawed by worms
  lexicon: LSJ
  entry: σητός
  rationale: For wooden rods, “worm-eaten” suits better than “moth-eaten” (which fits
    textiles); the simile marks decay.
- source_word: χωρὶς σταθῆναι
  chosen: to stand apart
  alternatives:
  - to stand separately
  - to be set apart
  lexicon: LSJ
  entry: χωρίς; ἵστημι
  rationale: Renders both separation and posture, maintaining the visual sorting of
    groups.
