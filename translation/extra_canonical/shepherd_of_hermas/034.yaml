theological_decisions:
- issue: Nature of ‘fear of the Lord’ in Hermas
  chosen_reading: Translate φόβος as ‘fear’ and present it as the decisive moral motive that both restrains evil and empowers good.
  alternative_readings:
  - Render as ‘reverence’ or ‘awe’ to soften the affective sense
  rationale: 'The unit’s argument hinges on fear as an operative moral force: fearing the Lord produces good action and prevents evil. Softening to ‘reverence’ dulls the stated causal link.'
- issue: Do not fear the devil vs. fearing his works
  chosen_reading: Render ‘do not fear the devil’ literally, but ‘fear the works of the devil’ as the proper object of dread for the God-fearer.
  alternative_readings:
  - Assimilate both clauses into a general call to avoid evil without the fear language
  rationale: Hermas contrasts illegitimate fear (of the powerless devil) with legitimate fear (of evil deeds). Preserving the distinction keeps his moral psychology intact.
- issue: Status of the devil’s power
  chosen_reading: ‘There is no power in him’—the devil lacks intrinsic power over those who fear the Lord.
  alternative_readings:
  - ‘He has no power’ without the ‘in him’ nuance
  rationale: The phrasing underscores the ontological lack of power in the devil, cohering with the ensuing maxim about power and fear.
- issue: ‘Two fears’ (δισσοὶ … φόβοι)
  chosen_reading: Maintain the expression ‘two fears,’ understanding them as two functions of fearing the Lord (deterring evil and enabling good).
  alternative_readings:
  - Paraphrase as two effects of one fear, losing the repeated term
  rationale: Hermas’s rhetoric intentionally repeats ‘fear’ to frame both negative and positive moral action; we preserve the repetition and explain in notes if needed.
- issue: Dative with ζάω (‘live for/to God’) and prepositional phrase παρὰ τῷ Θεῷ
  chosen_reading: Use ‘live for him/God’ for ζάω + dative (vv. 4–5) and ‘with God’ for παρὰ τῷ Θεῷ (v. 5), noting alternative nuances.
  alternative_readings:
  - ‘Live to God’ (more literal) or ‘live with God’ for both occurrences
  rationale: ‘For’ reads idiomatically in English, preserving purpose/aim; ‘with’ for παρὰ conveys association/presence. We document alternatives for audit.
- issue: Vocative κύριε addressed to the shepherd/angel
  chosen_reading: Translate as ‘sir’ to distinguish it from the divine title ‘the Lord’ used elsewhere.
  alternative_readings:
  - Translate both as ‘Lord’ and rely on context
  rationale: Prevents theological confusion and reflects conventional usage in early Christian Greek where κύριε can be polite address to a human or angelic figure.
