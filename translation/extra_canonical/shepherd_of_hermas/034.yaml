translation:
  text: '1. “Fear,” he says, “the Lord, and keep his commandments. By keeping the commandments of God you will be powerful in every deed, and your conduct will be beyond compare. For in fearing the Lord you will do everything well. This is the fear that you must have—and you will be saved.


    2. But do not fear the devil; for by fearing the Lord you will gain mastery over the devil, because there is no power in him. In the one who has no power, there is no fear; but in the one who has glorious power, there is also fear. For everyone who has power is feared, but the one who has no power is despised by all.


    3. But fear the works of the devil, for they are evil. So, by fearing the Lord, you will fear the works of the devil, and you will not do them, but will keep away from them.


    4. Therefore there are two fears: if you wish to do what is evil, fear the Lord and you will not do it; and if, on the other hand, you wish to do what is good, fear the Lord and you will do it. Thus the fear of the Lord is strong and great and glorious. So fear the Lord, and you will live for him; and all who fear him among those who keep his commandments will live for God.


    5. “Why,” I said, “sir, did you say about those who keep his commandments, ‘They will live for God’?” “Because,” he said, “all creation fears the Lord, but it does not keep his commandments. Therefore the life of those who fear him and keep his commandments is with God; but for those who do not keep his commandments, there is not even life in them.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '‘Live for him/God’ renders the dative after ζάω. Alternatives: ‘live to him/God’ (more literal) or, in v. 5 with παρὰ τῷ Θεῷ, ‘live with God.’'
    reason: lexical_alternative
  - marker: b
    text: Vocative κύριε addressed to the messenger is rendered ‘sir’ to distinguish from ‘the Lord’ (ὁ Κύριος) referring to God.
    reason: lexical_alternative
  - marker: c
    text: 'Hermas speaks of ‘two fears’: the same fear of the Lord functions both to deter evil and to empower good, not two different deities or objects.'
    reason: cultural_note
  - marker: d
    text: ‘All creation fears the Lord’ reflects a common Jewish-Christian motif of the cosmos acknowledging God (cf. Ps 33:8).
    reason: cross_reference
  - marker: e
    text: Or 'but in the one who has glorious power, there is fear in him as well.'.
    reason: previous_rendering
  - marker: f
    text: Or 'and if you wish again to do what is good'.
    reason: previous_rendering
  - marker: g
    text: Or 'but for those who do not keep his commandments, there is not even life in him.'.
    reason: previous_rendering
lexical_decisions:
- source_word: φοβήθητι / φόβος
  chosen: fear / fear
  alternatives:
  - revere
  - stand in awe / awe
  lexicon: BDAG; LSJ
  rationale: The repeated imperative and theme require the concrete moral category of “fear,” not the softer “revere,” to preserve the paraenetic force and the rhetorical repetition.
- source_word: ὁ Κύριος (with article, referring to God)
  chosen: the Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Standard rendering for God’s covenantal title; maintains continuity with early Christian usage without importing tetragrammaton conventions.
- source_word: ἐντολή
  chosen: commandment
  alternatives:
  - precept
  - instruction
  lexicon: BDAG; LSJ
  rationale: Hermas’s moral instruction echoes the concrete, binding force of divine commands; “commandment” best preserves that weight.
- source_word: φυλάσσω / τηρέω
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: BDAG; LSJ
  rationale: Both verbs occur in this unit; “keep” is the clearest common English gloss for maintaining/observing God’s commandments. “Guard” would over-literalize, and “observe” can sound ceremonial.
- source_word: δυνατός (ἔσῃ δυνατός)
  chosen: be able
  alternatives:
  - be strong
  - be powerful
  lexicon: BDAG; LSJ
  rationale: Context is moral capability in every deed; “able” communicates capacity without implying domineering strength.
- source_word: πρᾶξις
  chosen: conduct
  alternatives:
  - deed
  - practice
  lexicon: BDAG; LSJ
  rationale: Singular “your prâxis” points to overall way of acting; “conduct” captures habitual action better than a single “deed.”
- source_word: ἀσύγκριτος
  chosen: beyond compare
  alternatives:
  - incomparable
  - matchless
  lexicon: LSJ
  rationale: Idiomatically natural and preserves superlative sense without sounding archaic.
- source_word: κατακυριεύω
  chosen: gain mastery over
  alternatives:
  - have dominion over
  - be lord over
  lexicon: BDAG; LSJ
  rationale: Conveys subjugation without implying tyrannical abuse or dominion language that could distract from the moral point.
- source_word: διάβολος
  chosen: devil
  alternatives:
  - slanderer
  - the Accuser
  - Satan
  lexicon: BDAG
  rationale: Personal evil figure in early Christian usage; “devil” is the conventional English equivalent. The etymological “slanderer” is not intended here.
- source_word: δύναμις
  chosen: power
  alternatives:
  - might
  - ability
  lexicon: BDAG; LSJ
  rationale: “Power” matches the contrast between having power and being feared; “ability” would weaken the social-psychological force.
- source_word: ἔνδοξος
  chosen: glorious
  alternatives:
  - renowned
  - distinguished
  lexicon: BDAG; LSJ
  rationale: Carries evaluative weight fitting Hermas’s elevated style; “renowned” would be too secular and sociological.
- source_word: καταφρονέω
  chosen: despise
  alternatives:
  - look down on
  - scorn
  lexicon: BDAG; LSJ
  rationale: “Despised by all” is idiomatic and strong, preserving the antithesis with being feared.
- source_word: ἔργα (τοῦ διαβόλου)
  chosen: works (of the devil)
  alternatives:
  - deeds
  - acts
  lexicon: BDAG; LSJ
  rationale: “Works” is a stock moral term in early Christian discourse and retains a weightier, almost technical ring than “deeds.”
- source_word: ἀπέχω (ἀφέξῃ)
  chosen: keep away from
  alternatives:
  - abstain from
  - hold back from
  lexicon: BDAG; LSJ
  rationale: Plain idiomatic English for moral avoidance; “abstain” is also accurate but slightly more formal.
- source_word: δισσοί (οἱ φόβοι)
  chosen: two (fears)
  alternatives:
  - twofold
  - double
  lexicon: LSJ
  rationale: “Two fears” is the clearest rendering of the count and fits the rhetorical structure.
- source_word: ζάω + dative (ζήσῃ αὐτῷ; ζήσονται τῷ Θεῷ)
  chosen: live for (him/God)
  alternatives:
  - live to (him/God)
  - live with (God)
  lexicon: BDAG; LSJ
  rationale: The dative can denote reference or advantage; “for” is idiomatic modern English preserving purpose/aim. We note alternatives “to” (more literal) and “with” (esp. for παρὰ τῷ Θεῷ in v.5).
- source_word: παρὰ τῷ Θεῷ
  chosen: with God
  alternatives:
  - from God
  - beside God
  lexicon: BDAG; LSJ
  rationale: 'Here denotes location/association: their life is ‘with’ God, not merely a gift ‘from’ God.'
- source_word: σωθήσῃ
  chosen: you will be saved
  alternatives:
  - you will be delivered
  - you will be kept safe
  lexicon: BDAG
  rationale: Soteriological promise in Hermas; “saved” is the established theological term matching the moral summons.
- source_word: κτίσις
  chosen: creation
  alternatives:
  - creaturehood
  - every creature
  lexicon: BDAG; LSJ
  rationale: Cosmic scope (“all creation”) is intended; “every creature” could be heard distributively and weaken the universal sweep.
- source_word: κύριε (vocative, addressed to the angelic figure)
  chosen: sir
  alternatives:
  - lord
  lexicon: BDAG; LSJ
  rationale: Distinguishes respectfully addressing the messenger from “the Lord” (God). Avoids confusion with divine title used elsewhere in the unit.
