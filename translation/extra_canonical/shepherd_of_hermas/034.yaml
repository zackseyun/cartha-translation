  to: but in the one who has glorious power, there is also fear.
  rationale: 'The Greek uses a resumptive pronoun (`ἐν ᾧ ... ἐν αὐτῷ`), which is natural in Greek syntax but creates a redundant and clunky construction in English (''in the one who... there is fear in him''). Removing ''in him'' smooths the English while perfectly preserving the author''s meaning. | Adjudicator: The reviewer correctly identifies the Greek construction `ἐν ᾧ ... ἐν αὐτῷ` as a relative clause with a resumptive pronoun, a common feature of Koine Greek (often influenced by Semitic syntax). In Eng'
