  text: Λέγω αὐτῷ· Κύριε, ἔτι μοι τοῦτο δήλωσον. Τί, φησίν, ἐπιζητεῖς; Εἰ ἄρα, φημί,
    κύριε, τὸν αὐτὸν χρόνον βασανίζονται οἱ τρυφῶντες καὶ ἀπατώμενοι, ὅσον τ ἀπάτης
    ὁ χρόνος ὥρα ἐστὶ μία· τῆς δὲ βασάνου ἡ ὥρα τριάκοντα ἡμερῶν δύναμιν ἔχει. ἐὰν
    οὖν μίαν ἡμέραν τρυφήσῃ τις καὶ ἀπατηθῇ, μίαν δὲ ἡμέραν βασανισθῇ, ὅλον ἐνιαυτὸν
    ἰσχύει ἡ ἡμέρα τῆς βασάνου. ὅσας οὖν ἡμέρας τρυφήσῃ τις, τοσούτους ἐνιαυτοὺς βασανίζεται.
    βλέπεις οὖν, φησίν, ὅτι τῆς τρυφῆς καὶ ἀπάτης ὁ χρόνος ἐλάχιστός ἐστι, τῆς δὲ
    τιμωρίας καὶ βασάνου πολύς.
