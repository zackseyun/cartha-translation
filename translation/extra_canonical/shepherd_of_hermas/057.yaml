translation:
  text: I say to him, "Lord, explain this to me further." He says, "What are you seeking?"
    I say, "If then, my lord, do those who indulge themselves and are deceived suffer
    torments for the same length of time? For the time of the deceit is one hour,
    but the hour of the torment has the force of thirty days. Therefore, if someone
    indulges for one day and is deceived, and is tormented for one day, the day of
    torment is equivalent to a whole year. So then, as many days as a person indulges,
    for that many years he is tormented. You see then," he says, "that the time of
    indulgence and deception is very small, but the time of punishment and torment
    is great."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Lord" here is Hermas’s respectful address to the angelic shepherd who
      instructs him, not a direct address to God.'
    reason: cultural_note
  - marker: b
    text: Ancient daytime was commonly reckoned as twelve "hours"; if one hour of
      torment equates to thirty days, then one day (twelve hours) equates to roughly
      a year (360 days). This underlies the statement that a day of torment is a whole
      year.
    reason: cultural_note
lexical_decisions:
- source_word: κύριε
  chosen: Lord
  alternatives:
  - master
  - sir
  lexicon: BDAG / LSJ
  rationale: Respectful address to the angelic shepherd figure in Hermas; "Lord" preserves
    the elevated register typical of early Christian texts while not implying direct
    address to God in context (see footnote).
- source_word: δήλωσον
  chosen: explain / make clear
  alternatives:
  - show
  - reveal
  lexicon: LSJ
  rationale: δήλοω commonly means to make clear or explain; in this dialogic context
    "explain" conveys the request for clarification.
- source_word: ἐπιζητεῖς
  chosen: are you seeking
  alternatives:
  - are you asking about
  - are you inquiring after
  - are you looking for
  lexicon: BDAG / LSJ
  rationale: Verb means to seek after, inquire; a neutral question fits the Shepherd’s
    response tone.
- source_word: τρυφῶντες / τρυφήσῃ
  chosen: indulge / indulging
  alternatives:
  - live in luxury
  - revel
  - enjoy pleasure
  lexicon: LSJ; Lampe (Patristic Greek)
  rationale: τρυφή can denote luxury/self-indulgence. "Indulge" captures moral self-pleasing
    without restricting to wealth-class connotations; the context contrasts brief
    indulgence with long punishment.
- source_word: ἀπατώμενοι / ἀπατηθῇ
  chosen: are deceived
  alternatives:
  - are led astray
  - are deluded
  lexicon: BDAG / LSJ
  rationale: ἀπατάω means to deceive; the passive/middle here emphasizes being taken
    in by deceit. Kept consistent with ἀπάτης (deceit).
- source_word: βασανίζονται / βασάνου
  chosen: are tormented / torment
  alternatives:
  - are tortured / torture
  - are afflicted / affliction
  - are punished / punishment
  lexicon: BDAG / LSJ
  rationale: βασανίζω/βασανός denotes severe testing/torment. Distinct from τιμωρία
    (punishment), both are retained for rhetorical weight. "Torment" best conveys
    intensity while aligning with the paired noun later.
- source_word: ἀπάτης
  chosen: deceit
  alternatives:
  - deception
  - delusion
  lexicon: BDAG / LSJ
  rationale: Concrete moral term; "deceit" keeps the moral-religious connotation and
    matches the verb ἀπατάω.
- source_word: ὥρα
  chosen: hour
  lexicon: BDAG / LSJ
  rationale: Literal time unit is important for the proportional argument. Footnote
    clarifies ancient reckoning underlying the day-year equivalence.
- source_word: τριάκοντα ἡμερῶν δύναμιν ἔχει
  chosen: has the force of thirty days
  alternatives:
  - is equal to thirty days
  - counts as thirty days
  lexicon: LSJ
  rationale: δύναμις here expresses effective equivalence. "Has the force of" preserves
    the metaphorical sense of potency/effect, matching later ἰσχύει.
- source_word: ἰσχύει
  chosen: is equivalent to / amounts to
  alternatives:
  - has the force of
  - prevails as
  lexicon: BDAG / LSJ
  rationale: In this comparative calculation, ἰσχύω conveys effective equivalence.
    "Is equivalent to" makes the proportional logic explicit in English.
- source_word: ἐνιαυτὸν
  chosen: year
  alternatives:
  - full year
  - entire year
  lexicon: BDAG / LSJ
  rationale: Standard temporal term; in this context the totalizing phrase "whole
    year" renders ὅλον ἐνιαυτόν.
- source_word: τιμωρίας
  chosen: punishment
  alternatives:
  - penalty
  - retribution
  lexicon: BDAG / LSJ
  rationale: τιμωρία distinct from βασανός; "punishment" retains judicial nuance without
    merging with "torment."},{
- source_word: ἐλάχιστός ἐστι ... πολύς
  chosen: is very small ... is great
  alternatives:
  - is minimal ... is much
  - is slight ... is long
  lexicon: BDAG / LSJ
  rationale: Contrasting durations calls for qualitative terms. "Very small" and "great"
    preserve the rhetorical antithesis.
