theological_decisions:
- issue: Address "Lord" (κύριε) in Hermas
  chosen_reading: Render as "Lord" while understanding it as respectful address to
    the angelic shepherd interlocutor, not the Lord God.
  alternative_readings:
  - Lowercase "lord" or translate as "sir" to avoid confusion
  rationale: Hermas regularly uses κύριος in dialogue with angelic/prophetic figures.
    Retaining "Lord" keeps the solemn tone and early Christian flavor; a cultural
    note clarifies referent.
- issue: Nature of the time-proportion (hour/day/year)
  chosen_reading: Take the stated proportions at face value as a moral-exhortative
    calculus within the parable, not a cosmological schema.
  alternative_readings:
  - Read the figures figuratively without concrete ratio
  - Interpolate other apocalyptic time schemes
  rationale: The unit argues for the brevity of indulgence and the length of punishment
    by a simple proportional example; preserving the explicit ratios keeps the exhortation’s
    force without speculative systems.
