theological_decisions:
- issue: Addressing κύριε in Hermas
  chosen_reading: Render as “sir” rather than “Lord.”
  alternative_readings:
  - Render as “Lord.”
  rationale: The speaker addresses an angelic/visionary figure, not God or the Messiah;
    using “Lord” could mislead readers into a christological identification foreign
    to the scene.
- issue: πειρασθῆναι as testing vs tempting
  chosen_reading: Translate πειρασθῆναι as “to be tested.”
  alternative_readings:
  - to be tempted
  - to be tried
  rationale: The surrounding purpose clause and disciplinary context indicate probationary
    testing rather than enticement to sin.
- issue: αἰών as age vs world
  chosen_reading: Render τοῦ αἰῶνος τούτου as “of this age.”
  alternative_readings:
  - of this world
  rationale: Preserves the eschatological time-sense typical of αἰών; Hermas contrasts
    present-age desires with repentance and cleansing.
- issue: Corporate discipline via the household head
  chosen_reading: Maintain the logic that others are afflicted through the affliction
    of the household head.
  rationale: The passage asserts that the household cannot be afflicted unless the
    head is; we preserve this corporate-responsibility theology without softening
    to modern individualism.
- issue: Angel of punishment characterization
  chosen_reading: Translate explicitly as “angel of punishment” and “punisher,” not
    importing other biblical titles.
  alternative_readings:
  - destroyer
  - avenging angel
  rationale: Keeps Hermas’s own diction and avoids conflating with other scriptural
    figures or traditions.
- issue: μετανοέω rendering
  chosen_reading: Use “repent” rather than “change their mind.”
  alternative_readings:
  - change their mind
  rationale: Specific moral wrongdoing is in view; aligns with project’s per-context
    rule for μετανοέω.
  doctrine_reference: 'DOCTRINE.md — Contested terms: μετανοέω'
