lexical_decisions:
- source_word: τί ἐπιζητεῖς
  chosen: what are you seeking
  alternatives:
  - what are you looking for
  - what do you seek
  lexicon: LSJ
  rationale: ἐπιζητέω commonly means to seek after; simple English preserves immediacy
    of the question.
- source_word: κύριε
  chosen: sir
  alternatives:
  - Lord
  - master
  lexicon: BDAG
  rationale: Here it functions as a respectful form of address to an angelic/visionary
    figure, not a divine title; “sir” avoids confusion with the Lord.
- source_word: ποιμήν
  chosen: shepherd
  alternatives:
  - herdsman
  - pastor
  lexicon: BDAG
  rationale: Consistent with Hermas’s recurring shepherd imagery; “shepherd” is the
    plain sense.
- source_word: τιμωρητής
  chosen: punisher
  alternatives:
  - avenger
  - disciplinarian
  lexicon: LSJ
  rationale: τιμωρητής denotes one who inflicts punishment; “punisher” is direct and
    matches the punitive role in context.
- source_word: θλίβειν / θλῖψις
  chosen: afflict / affliction
  alternatives:
  - oppress / oppression
  - trouble / distress
  lexicon: BDAG
  rationale: θλῖψις/θλίβω carry the sense of pressure/affliction in early Christian
    diction; preserves moral-testing nuance.
- source_word: ἔνδοξος ἄγγελος
  chosen: glorious angel
  alternatives:
  - splendid angel
  - honored angel
  lexicon: LSJ
  rationale: ἔνδοξος conveys honor/glory; “glorious” keeps elevated tone without paraphrase.
- source_word: προσέταξεν
  chosen: has commanded
  alternatives:
  - has ordered
  - has directed
  lexicon: BDAG
  rationale: Formal register fits the heavenly authority involved.
- source_word: πειρασθῆναι
  chosen: to be tested
  alternatives:
  - to be tried
  - to be tempted
  lexicon: BDAG
  rationale: In moral/probative contexts πειράζω often means testing; “tempted” could
    mislead; “tested” fits purpose language.
- source_word: παραδοθῆναι
  chosen: be handed over
  alternatives:
  - be delivered up
  - be consigned
  lexicon: BDAG
  rationale: Maintains judicial/disciplinary tone without over-interpretation.
- source_word: ἀνομίαι
  chosen: lawless deeds
  alternatives:
  - iniquities
  - lawlessness
  lexicon: BDAG
  rationale: The verb εἰργάσατο (“has done”) governs it; “deeds” makes explicit the
    active wrongdoing.
- source_word: παρεπικράνθη
  chosen: was provoked
  alternatives:
  - was angered
  - was embittered
  lexicon: LSJ
  rationale: The compound suggests provocation to indignation; “was provoked” captures
    causation by their works.
- source_word: χρόνον τινά
  chosen: for a certain time
  alternatives:
  - for some time
  - for a while
  lexicon: BDAG
  rationale: Preserves indefiniteness with a slightly elevated register.
- source_word: μετανοέω
  chosen: repent
  alternatives:
  - change their mind
  - turn back
  lexicon: BDAG
  rationale: Context is moral wrongdoing; per project policy, use “repent” in specific-sin
    contexts.
- source_word: καθαρίζω
  chosen: cleanse
  alternatives:
  - purify
  - make clean
  lexicon: BDAG
  rationale: Cultic/moral resonance of cleansing fits Hermas’s moral imagery.
- source_word: ἐπιθυμία τοῦ αἰῶνος τούτου
  chosen: desire of this age
  alternatives:
  - desires of this world
  - lust of this age
  lexicon: BDAG
  rationale: αἰών is “age,” not simply κόσμος; singular collective “desire” matches
    the Greek and keeps eschatological nuance.
- source_word: ἀποστήσεται
  chosen: will withdraw
  alternatives:
  - will depart
  - will desist
  lexicon: BDAG
  rationale: Withdraw suits an agent stepping back from punitive activity.
- source_word: κεφαλή τοῦ οἴκου
  chosen: head of the household
  alternatives:
  - head of the house
  - head of the family
  lexicon: BDAG
  rationale: Set phrase conveying household leadership; “household” expresses the
    relational unit implicated.
- source_word: εὐσταθοῦντος
  chosen: being steadfast
  alternatives:
  - standing firm
  - being in good order
  lexicon: LSJ
  rationale: εὐσταθέω denotes stability; moral/leadership steadiness is in view.
- source_word: ἰδού
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: Maintains deictic force in contemporary English without archaism.
- source_word: ἐξ ὅλης καρδίας
  chosen: with all their heart
  alternatives:
  - from their whole heart
  - wholeheartedly
  lexicon: BDAG
  rationale: Idiomatic rendering of a common biblical phrase that remains close to
    the Greek.
- source_word: οἶκος (ἐκ τοῦ οἴκου μου)
  chosen: household
  alternatives:
  - house
  - home
  lexicon: BDAG
  rationale: Given the moral actions of members and the “head of the household” language,
    “household” captures the social unit implicated throughout.
