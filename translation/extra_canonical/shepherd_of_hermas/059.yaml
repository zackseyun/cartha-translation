translation:
  text: 'Similitude 7


    1. After a few days I saw him in the same field where I had also seen the shepherds,
    and he says to me, “What are you seeking?” “I am here, sir,” I say, “that you
    may command the shepherd, the punisher, to go out from my house, because he afflicts
    me greatly.” He says, “It is necessary for you to be afflicted; for thus the glorious
    angel has commanded concerning you, for he wants you to be tested.” “For what,
    sir,” I say, “have I done that was so evil, that I should be handed over to this
    angel?”


    2. He says, “Listen: your sins are many, but not so many that you should be handed
    over to this angel. Rather, your household has committed great lawless deeds and
    sins, and the glorious angel was embittered at their works; and for this reason
    he ordered that you be afflicted for a certain time, so that they too might repent
    and cleanse themselves from every desire of this age. When therefore they repent
    and are cleansed, then the angel of punishment will depart.”


    3. I say to him, “Sir, if they did such things as to embitter the glorious angel,
    what did I do?” “Otherwise,” he says, “they cannot be afflicted unless you, the
    head of the whole household, are afflicted; for when you are afflicted, of necessity
    they also will be afflicted, but if you stand firm, they cannot have any affliction.”


    4. “But look, sir,” I say, “they have repented with all their heart.” He says,
    “I also know that they have repented with—”'
