theological_decisions:
- issue: Identification of the tower
  chosen_reading: The tower represents the Church, personified as the woman speaking.
  rationale: 'The speaker self-identifies: "The tower that you see being built— I am the Church." The allegory is explicit in the text.'
- issue: Rendering of Ἐκκλησία
  chosen_reading: Translate as "Church" (capitalized).
  alternative_readings:
  - assembly
  - congregation
  rationale: Hermas speaks of the Christian community as a single, personified entity; capitalization signals ecclesial, not generic, sense.
- issue: Baptismal allusion in "your life was saved through water"
  chosen_reading: Treat as a baptismal reference/allusion.
  alternative_readings:
  - Generic saving through water as symbolic cleansing
  - Allusion to the Flood without baptismal application
  rationale: Early Christian texts frequently link salvation and water (e.g., 1 Pet 3:20–21; Didache 7). Hermas elsewhere emphasizes repentance and initiation; the collective "your life" fits communal baptismal identity.
- issue: Capitalizing "Name" for ὄνομα
  chosen_reading: Capitalize "Name" as a reverential circumlocution for God.
  alternative_readings:
  - lowercase "name"
  rationale: Jewish and early Christian usage treats "the Name" as a reverent stand-in for the divine; Hermas’s phrase "the Almighty and glorious Name" functions this way.
- issue: Translation of μετανοέω
  chosen_reading: Render as "repent" here.
  alternative_readings:
  - change their mind
  - turn back
  rationale: The context concerns moral response to revelation—Hermas’s paraenetic emphasis aligns with the ethical turning implied by "repent," not merely cognitive change.
  doctrine_reference: See DOCTRINE.md on μετανοέω mapping; Hermas’s moral context favors "repent."
- issue: Scope of "these revelations have an end—they are complete"
  chosen_reading: Refers to a finite set of visions in this cycle, not to the cessation of all revelation.
  alternative_readings:
  - Cessationist claim about prophecy ending
  rationale: Immediate context concerns Hermas’s persistent asking; "these revelations" points to a bounded series that are now complete, even if Hermas keeps asking.
- issue: Rendering of ἅγιοι
  chosen_reading: Render as "holy ones" in main text.
  alternative_readings:
  - saints
  rationale: Maintains literalness while avoiding later ecclesiastical sense; readers can equivalently understand "saints."
- issue: 'Titles for God: κύριος vs δεσπότης'
  chosen_reading: Render κύριος as "Lord" and δεσπότης as "Master" to preserve distinct nuances.
  alternative_readings:
  - Both as "Lord"
  rationale: Differentiation reflects the text’s distinct lexemes and avoids flattening titles.
