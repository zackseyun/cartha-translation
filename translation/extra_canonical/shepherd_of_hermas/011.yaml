id: HERM.V.3.iii
reference: Shepherd of Hermas — Vision 3, section iii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Δείξασά μοι ταῦτα ἤθελεν ἀποτρέχειν. λέγω αὐτῇ· Κυρία, τί μοι ὄφελος ταῦτα ἑωρακότι καὶ μὴ γινώσκοντι τί ἐστιν τὰ πράγματα; ἀποκριθεῖσά μοι λέγει· Πανοῦργος εἶ ἄνθρωπος, θέλων γινώσκειν τὰ περὶ τὸν πύργον. Ναί, φημί, κυρία, ἵνα τοῖς ἀδελφοῖς ἀναγγείλω, καὶ [ἱλαρώτεροι γένωνται, καὶ ταῦτα] ἀκούσαντες γινώσκωσιν τὸν Κύριον ἐν πολλῇ δόξῃ. 2. ἡ δὲ ἔφη· Ἀκούσονται μὲν πολλοί· ἀκούσαντες δέ τινες ἐξ αὐτῶν χαρήσονται, τινὲς δὲ κλαύσονται· ἀλλὰ καὶ οὗτοι, ἐὰν ἀκούσωσιν καὶ μετανοήσωσιν, καὶ αὐτοὶ χαρήσονται. ἄκουε οὖν τὰς παραβολὰς τοῦ πύργου· ἀποκαλύψω γάρ σοι πάντα. καὶ μηκέτι μοι κόπους πάρεχε περὶ ἀποκαλύψεως· αἱ γὰρ ἀποκαλύψεις αὗται τέλος ἔχουσιν· πεπληρωμέναι γάρ εἰσιν. ἀλλ’ οὐ παύσῃ αἰτούμενος ἀποκαλύψεις· ἀναιδὴς γὰρ εἶ. 3. ὁ μὲν πύργος ὃν βλέπεις οἰκοδομούμενον, ἐγώ εἰμι ἡ Ἐκκλησία, ἡ ὀφθεῖσά σοι καὶ νῦν καὶ τὸ πρότερον· ὃ ἂν οὖν AP. FATH. 20 θελήσῃς ἐπερωτᾷν περὶ τοῦ πύργου, καὶ ἀποκαλύψω σοι, ἵνα χαρῇς μετὰ τῶν ἁγίων. 4. λέγω αὐτῇ· Κυρία, ἐπεὶ ἅπαξ ἠξίών με ἠγήσω τοῦ πάντα μοι
    ἀποκαλῦψαι, ἀποκάλυψον. ἡ δὲ λέγει μοι· Ὃ ἐὰν ἐνδέχηταί σοι ἀποκαλυφθῆναι, ἀποκαλυφθήσεται. μόνον ἡ καρδία σου πρὸς τὸν Θεὸν ἤτω καὶ μὴ διψυχήσῃς ὃ ἂν ἴδῃς. 5. ἐπηρώτησα αὐτήν· Διατί ὁ πύργος ἐπὶ ὑδάτων ᾠκοδόμηται, κυρία; Εἶπά σοι, φησίν, καὶ τὸ πρότερον, καὶ ἐκζητεῖς ἐπιμελῶς· ἐκζητῶν οὖν εὑρίσκεις τὴν ἀλήθειαν. διατί οὖν ἐπὶ ὑδάτων ᾠκοδόμηται ὁ πύργος, ἄκουε· ὅτι ἡ ζωὴ ὑμῶν διὰ ὕδατος ἐσώθη καὶ σωθήσεται. τεθεμελίωται δὲ ὁ πύργος τῷ ῥήματι τοῦ παντοκράτορος καὶ ἐνδόξου ὀνόματος, κρατεῖται δὲ ὑπὸ τῆς ἀοράτου δυνάμεως τοῦ δεσπότου.
