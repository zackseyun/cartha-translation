translation:
  text: 'After showing me these things she wanted to run off. I say to her, "Lady, what profit is there for me, having seen these things, if I do not know what these matters are?" Answering me she says, "You are a crafty man, wanting to know the things about the tower." "Yes, lady," I say, "so that I may report them to the brothers, that they may become more cheerful, and, hearing these things, may come to know the Lord in much glory."


    She said, "Many indeed will hear; and, having heard, some of them will rejoice, but some will weep; yet even these, if they hear and repent, they too will rejoice. So then, listen to the parables of the tower; for I will reveal everything to you. And stop causing me trouble about revelation; for these revelations have an end—they are complete. Yet you will not stop asking for revelations; for you are shameless."


    "The tower that you see being built is I, the Church—the one shown to you both now and formerly. Whatever, therefore, you wish to inquire about the tower, I will reveal it to you, so that you may rejoice with the holy ones."


    I say to her, "Lady, since you once counted me worthy to have you reveal everything to me, reveal it." She says to me, "Whatever can be revealed to you will be revealed. Only let your heart be toward God, and do not be double-minded about whatever you see."


    I questioned her: "Why is the tower built upon the waters, lady?" She says, "I told you this before, and you are seeking diligently; seeking, therefore, you find the truth. Why, then, the tower is built upon the waters—listen: because your life was saved through water, and will be saved. And the tower has been founded upon the word of the Almighty and glorious Name, and it is held fast by the unseen power of the Master."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: Some witnesses include the clause "that they may become more cheerful, and"; others omit it.
    reason: textual_variant
  - marker: '2'
    text: '"Parables" here refers to symbolic explanations of the vision’s elements, not necessarily short teaching stories.'
    reason: cultural_note
  - marker: '3'
    text: '"Are complete" could also be rendered "are fulfilled."'
    reason: lexical_alternative
  - marker: '4'
    text: '"Church" translates Ἐκκλησία, which could also mean "assembly" or "congregation"; here it is a personified title.'
    reason: lexical_alternative
  - marker: '5'
    text: '"Holy ones" is the literal sense of ἅγιοι and corresponds to the traditional "saints."'
    reason: lexical_alternative
  - marker: '6'
    text: '"Double-minded" echoes early Christian idiom (cf. James 1:8; 4:8) for inner division or wavering.'
    reason: cross_reference
  - marker: '7'
    text: The saving "through water" strongly evokes baptism (cf. 1 Peter 3:20–21) in early Christian teaching.
    reason: cross_reference
  - marker: '8'
    text: '"Name" is capitalized to reflect the reverential use of "the Name" for God in Jewish-Christian usage.'
    reason: cultural_note
  - marker: '9'
    text: '"Master" translates δεσπότης; some English versions use "Lord" here, but this rendering keeps it distinct from κύριος earlier in the sentence.'
    reason: lexical_alternative
  - marker: a
    text: Or '"As for the tower that you see being built, I am the Church'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀποτρέχειν
  chosen: run off
  alternatives:
  - run away
  - hurry off
  lexicon: LSJ
  rationale: Conveys quick departure with slightly colloquial vividness fitting the scene.
- source_word: Κυρία
  chosen: Lady
  alternatives:
  - Mistress
  - Madam
  lexicon: BDAG
  rationale: Respectful address to a woman; in Hermas it is a personified figure. "Lady" avoids slavery/sexual connotations of "Mistress."
- source_word: ὄφελος
  chosen: profit
  alternatives:
  - benefit
  - advantage
  lexicon: BDAG
  rationale: Rhetorical tone preserved; "profit" keeps the idiom "what profit is there?" without being archaic.
- source_word: πράγματα
  chosen: matters
  alternatives:
  - things
  - affairs
  lexicon: LSJ
  rationale: Slightly formal, fitting Hermas’s register; points to substantive content rather than mere objects.
- source_word: πανοῦργος
  chosen: crafty
  alternatives:
  - cunning
  - shrewd
  lexicon: LSJ
  rationale: Carries a lightly pejorative, teasing edge matching the rebuke; "shrewd" loses the admonitory color.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - fellow believers
  lexicon: BDAG
  rationale: Reflects the early Christian familial term as written; inclusivity can be explained in notes if needed.
- source_word: ἱλαρώτερος
  chosen: more cheerful
  alternatives:
  - encouraged
  - more joyful
  lexicon: LSJ
  rationale: Comparative form kept; "cheerful" preserves affective nuance distinct from deep joy.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Standard covenantal title; reserving "Master" for δεσπότης avoids conflation of titles in this unit.
- source_word: μετανοέω
  chosen: repent
  alternatives:
  - change their mind
  - turn back
  lexicon: BDAG
  rationale: Hermas uses repentance as a moral turning, not merely cognitive; weightier term preferred here.
- source_word: παραβολή
  chosen: parables
  alternatives:
  - allegories
  - figurative sayings
  lexicon: BDAG
  rationale: Hermas labels his symbolic explanations "parables"; retaining the term preserves genre-signaling.
- source_word: ἀποκάλυψις / ἀποκαλύπτω
  chosen: revelation / reveal
  alternatives:
  - unveiling / unveil
  - disclosure / disclose
  lexicon: BDAG
  rationale: Maintains apocalyptic resonance of the term while using idiomatic English.
- source_word: κόπους παρέχειν
  chosen: cause me trouble
  alternatives:
  - give me trouble
  - put me to toil
  lexicon: LSJ
  rationale: Idiomatic English conveying nuisance/effort; keeps mild rebuke tone.
- source_word: τέλος ἔχειν
  chosen: have an end
  alternatives:
  - have a limit
  - come to an end
  lexicon: BDAG
  rationale: Straightforward rendering; supports the next clause about completion.
- source_word: πεπληρωμέναι
  chosen: are complete
  alternatives:
  - are fulfilled
  - are filled up
  lexicon: BDAG
  rationale: In this context the set of revelations is complete; "fulfilled" is also possible but can suggest prophecy fulfillment.
- source_word: ἀναιδής
  chosen: shameless
  alternatives:
  - impudent
  - brazen
  lexicon: LSJ
  rationale: Captures the playful yet pointed rebuke; stronger than "bold."
- source_word: Ἐκκλησία
  chosen: Church
  alternatives:
  - assembly
  - congregation
  lexicon: BDAG
  rationale: Hermas personifies the Christian community; capitalized "Church" reflects ecclesial sense, not generic gathering.
- source_word: ἐπερωτάω
  chosen: inquire
  alternatives:
  - ask
  - question
  lexicon: BDAG
  rationale: Slightly formal verb matches register and the investigative context.
- source_word: ἅγιοι
  chosen: holy ones
  alternatives:
  - saints
  lexicon: BDAG
  rationale: Literal, transparent rendering; avoids later technical connotations of "saints" while retaining traditional sense.
- source_word: διψυχεῖν
  chosen: be double-minded
  alternatives:
  - be of two minds
  - waver
  lexicon: BDAG
  rationale: Echoes early Christian moral vocabulary; preserves idiom used elsewhere (e.g., James).
- source_word: ἐκζητεῖν (ἐπιμελῶς)
  chosen: seek diligently
  alternatives:
  - search earnestly
  - make thorough inquiry
  lexicon: BDAG
  rationale: Brings out the intensive prefix and adverb; matches commendation of persistence.
- source_word: ἡ ζωὴ ὑμῶν ἐσώθη καὶ σωθήσεται
  chosen: your life was saved and will be saved
  alternatives:
  - your lives were saved and will be saved
  - you were saved and will be saved
  lexicon: BDAG
  rationale: Singular "life" with plural possessive preserved; temporal aspect kept with aorist and future.
- source_word: ῥῆμα
  chosen: word
  alternatives:
  - command
  - utterance
  lexicon: BDAG
  rationale: Common biblical sense retained; pairs well with "founded upon."
- source_word: παντοκράτωρ
  chosen: Almighty
  alternatives:
  - All-sovereign
  - Ruler of all
  lexicon: BDAG
  rationale: Established rendering for a divine epithet; concise and reverent.
- source_word: ὄνομα (ἐνδόξον)
  chosen: glorious Name
  alternatives:
  - glorious name
  - the Name
  lexicon: BDAG
  rationale: Capitalizing "Name" signals the Jewish-Christian reverential circumlocution for God.
- source_word: τεθεμελίωται
  chosen: has been founded
  alternatives:
  - has been laid as a foundation
  - has been established
  lexicon: BDAG
  rationale: Architectural metaphor preserved; perfect aspect reflected.
- source_word: κρατεῖται
  chosen: is held fast
  alternatives:
  - is upheld
  - is kept firm
  - is sustained
  lexicon: BDAG
  rationale: Conveys continuing stabilizing action exerted upon the tower.
- source_word: ἀόρατος
  chosen: unseen
  alternatives:
  - invisible
  lexicon: BDAG
  rationale: Natural English while keeping the literal idea; "invisible" is acceptable but more abstract.
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Differentiates from κύριος rendered "Lord" earlier; preserves nuance of sovereign ownership.
