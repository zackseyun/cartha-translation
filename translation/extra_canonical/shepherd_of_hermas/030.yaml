theological_decisions:
- issue: Addressing the heavenly messenger as κύριε
  chosen_reading: Render vocative κύριε as “sir” to mark respectful address to the messenger, distinguishing from ‘the Lord’ (God) in the same passage.
  alternative_readings:
  - Render as “Lord” uniformly
  - Render as “master”
  rationale: Avoids reader confusion between God (‘the Lord’) and the figure speaking. Hermas regularly uses κύριε as honorific address to visionary figures; documenting this variance aligns with our transparency policy.
  doctrine_reference: Translation philosophy §4 (Consistency with documented per-verse variance).
- issue: Office over repentance
  chosen_reading: Translate ἐπὶ τῆς μετανοίας as “over repentance,” indicating supervision/office without adding ‘angel’ here.
  alternative_readings:
  - “I preside over repentance”
  - “I am concerned with repentance”
  - “I am the angel of repentance”
  rationale: The Greek construction signals oversight; we avoid importing ‘angel’ into this sentence while preserving the recognized role within Hermas’ framework.
  doctrine_reference: What matters most §2 (preserve ecclesial texture); Translation philosophy §1 (source primacy).
- issue: Repentance characterized as understanding
  chosen_reading: 'Render σύνεσις as “understanding,” maintaining the rhetorical thread: the speaker ‘gives understanding,’ and ‘to repent is great understanding.’'
  alternative_readings:
  - prudence
  - insight
  - wisdom
  rationale: ‘Understanding’ best reflects σύνεσις’ practical-intellectual sense and preserves the passage’s internal cohesion without shifting to σοφία (wisdom).
- issue: ζήσεται τῷ Θεῷ dative nuance
  chosen_reading: Translate “will live to God,” preserving the dative orientation.
  alternative_readings:
  - will live for God
  - will live with God
  - will live before God
  rationale: The dative without preposition can denote direction or relation; ‘to God’ maintains literalness and allows readers to sense the distinct idiom.
  doctrine_reference: Translation philosophy §3 (preserve theological tension/ambiguity).
- issue: Rendering βασανίζει in penitential context
  chosen_reading: Translate as “chastises (his soul),” emphasizing corrective self-discipline rather than self-torment.
  alternative_readings:
  - torments
  - punishes
  - afflicts
  rationale: Hermas advocates rigorous repentance; ‘chastises’ balances severity with ethical correction.
  doctrine_reference: What matters most §2 (do not flatten repentance language).
