id: HERM.M.4.ii
reference: Shepherd of Hermas — Mandate 4, section ii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ἠρώτησα αὐτὸν πάλιν λέγων· Ἐπεὶ ὁ Κύριος ἄξιόν με ἡγήσατο ἵνα μετ᾽ ἐμοῦ πάντοτε κατοικῇς, ὀλίγα μου ῥήματα ἔτι ἀνασχοῦ, ἐπεὶ οὐ συνίω οὐδέν, καὶ ἡ καρδία μου πεπώρωται ἀπὸ τῶν προτέρων μου πράξεων· συνέτισόν με, ὅτι λίαν ἄφρων εἰμὶ καὶ ὅλως οὐθὲν νοῶ. 2. ἀποκριθείς μοι λέγει· Ἐγώ, φησίν, ἐπὶ τῆς μετανοίας εἰμὶ καὶ πᾶσιν τοῖς μετανοοῦσιν σύνεσιν δίδωμι. ἢ οὐ δοκεῖ σοι, φησίν, αὐτὸ τοῦτο τὸ μετανοῆσαι σύνεσιν εἶναι; τὸ μετανοῆσαι, φησί, σύνεσίς ἐστιν μεγάλη. συνίει γὰρ [ὁ ἀνὴρ] ὁ ἁμαρτήσας ὅτι πεποίηκεν τὸ πονηρὸν ἔμπροσθεν τοῦ Κυρίου, καὶ ἀναβαίνει ἐπὶ τὴν καρδίαν αὐτοῦ ἡ πρᾶξις ἣν ἔπραξεν, καὶ μετανοεῖ καὶ οὐκέτι ἐργάζεται τὸ πονηρόν, ἀλλὰ τὸ ἀγαθὸν πολυτελῶς ἐργάζεται, καὶ ταπεινοῖ τὴν ἑαυτοῦ ψυχὴν καὶ βασανίζει, ὅτι ἥμαρτεν. βλέπεις οὖν ὅτι ἡ μετάνοια σύνεσίς ἐστιν μεγάλη. 3. Διὰ τοῦτο οὖν, φημί, κύριε, ἐξακριβάζομαι παρὰ σοῦ πάντα· πρῶτον μὲν ὅτι ἁμαρτωλός εἰμι, εἶτα ἀγνοῶ ποῖα ἔργα ἐργαζόμενος ζήσομαι, ὅτι πολλαί μου εἰσὶν αἱ ἁμαρτίαι καὶ ποικίλαι. 4. Ζήσῃ, φησίν, ἐὰν τὰς ἐντολάς μου φυλάξῃς καὶ πορευθῇς ἐν αὐταῖς· καὶ ὃς ἂν ἀκούσας τὰς ἐντολὰς ταύτας φυλάξῃ, ζήσεται τῷ Θεῷ.
  language: Greek
  pages:
  - 337
  - 338
  unit_id: M.4.ii
  label: Mandate 4, section ii
  sequence: 30
translation:
  text: 'I asked him again[1], saying, "Since the Lord has counted me worthy that you should dwell with me always, bear with a few more words from me, since I understand nothing, and my heart has been hardened by my former deeds. Give me understanding, for I am very foolish and altogether perceive nothing."


    Answering me, he says, "I," he says, "am appointed over repentance, and I give understanding to all who repent. Or does it not seem to you," he says, "that this very thing—to repent—is understanding? To repent," he says, "is great understanding. For the man who has sinned understands that he has done what is evil before the Lord, and the deed that he did rises up in his heart, and he repents and no longer does evil, but does good abundantly[2], and he humbles his own soul and afflicts it, because he sinned. You see then that repentance is great understanding."


    "For this reason then," I say, "sir, I inquire of you carefully about everything: first, because I am a sinner; then, because I do not know by doing what works I shall live, for my sins are many and manifold."


    "You will live," he says, "if you keep my commandments and walk in them; and whoever, having heard these commandments, keeps them[6][5][4][3], will live to God."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: “I am over repentance” can also be rendered “I preside over repentance.” Elsewhere in Mandate 4 the figure is identified as the angel associated with repentance.
    reason: lexical_alternative
  - marker: '2'
    text: Literally “goes up upon his heart,” an idiom for a deed coming forcibly to mind or weighing on one’s conscience.
    reason: cultural_note
  - marker: '3'
    text: Some witnesses omit “the man.” The sense is “the one who has sinned.”
    reason: textual_variant
  - marker: '4'
    text: “Lavishly” translates πολυτελῶς; alternatives include “abundantly” or “generously.” The term’s core sense is “in costly/splendid fashion.”
    reason: lexical_alternative
  - marker: '5'
    text: Vocative κύριε addressed to the messenger is rendered “sir” here to distinguish from “the Lord” (God) mentioned earlier in the sentence.
    reason: lexical_alternative
  - marker: '6'
    text: “Will live to God” preserves the Greek dative; many would say “live for God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ Κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Here the referent is clearly God; rendering as “the Lord” preserves covenantal resonance and is consistent with our default for κύριος when used of God.
- source_word: ἀνασχοῦ
  chosen: bear (with)
  alternatives:
  - endure
  - put up with
  lexicon: LSJ
  rationale: Aorist imperative of ἀνέχω; ‘bear a few words from me’ retains the polite request nuance and early-Christian register.
- source_word: συνίω / σύνεσις / συνέτισόν
  chosen: understand / understanding / give me understanding
  alternatives:
  - comprehend / insight / make me wise
  lexicon: BDAG
  rationale: Keeping the cognate chain transparent strengthens the rhetorical link in the passage that repentance itself is ‘understanding’.
- source_word: πεπώρωται
  chosen: has been hardened
  alternatives:
  - has grown dull
  - has been calloused
  lexicon: BDAG
  rationale: Carries a moral-spiritual hardening sense; ‘hardened’ preserves biblical-ethical weight without over-interpretation.
- source_word: πράξεις
  chosen: deeds
  alternatives:
  - acts
  - works
  lexicon: BDAG
  rationale: ‘Deeds’ fits the moral context and allows ‘works’ later to render ἐργάζομαι without redundancy.
- source_word: ἐπὶ τῆς μετανοίας
  chosen: over repentance
  alternatives:
  - in charge of repentance
  - concerning repentance
  lexicon: LSJ
  rationale: ἐπί with genitive can denote authority or supervision; the phrasing indicates an office. ‘Over’ preserves the idea of oversight without adding ‘angel’ here.
- source_word: μετανοέω / μετάνοια
  chosen: repent / repentance
  alternatives:
  - change one’s mind / change of mind
  lexicon: BDAG
  rationale: Context is specific sin and moral turning; per project policy we use ‘repent/repentance’ in such contexts.
- source_word: σύνεσίς ἐστιν μεγάλη
  chosen: is great understanding
  alternatives:
  - is a great insight
  - is great prudence
  lexicon: BDAG
  rationale: Maintains lexical consistency with σύνεσις in the passage and emphasizes the evaluative ‘great’ without importing ‘wisdom’ as a different concept.
- source_word: ἀναβαίνει ἐπὶ τὴν καρδίαν
  chosen: comes up upon his heart
  alternatives:
  - comes to mind
  - weighs upon his heart
  lexicon: LSJ
  rationale: Literal rendering preserves Semitic/early-Christian idiom; a footnote explains the sense.
- source_word: ἐργάζεται (τὸ πονηρόν / τὸ ἀγαθόν)
  chosen: works (the evil / the good)
  alternatives:
  - does
  - practices
  lexicon: BDAG
  rationale: ‘Works’ preserves the habitual/active connotation and pairs with ‘deeds’ in the context.
- source_word: πολυτελῶς
  chosen: lavishly
  alternatives:
  - abundantly
  - generously
  - eagerly
  lexicon: LSJ
  rationale: Primary sense is ‘costly, splendidly, lavishly’; here it vividly underscores zeal and generosity in good works.
- source_word: ταπεινοῖ
  chosen: humbles
  alternatives:
  - makes low
  - brings low
  lexicon: BDAG
  rationale: Standard ethical sense of self-humbling fits the penitential context.
- source_word: βασανίζει
  chosen: chastises
  alternatives:
  - torments
  - punishes
  - afflicts
  lexicon: BDAG
  rationale: Conveys rigorous self-discipline without suggesting gratuitous self-harm; matches penitential nuance.
- source_word: ἐξακριβάζομαι
  chosen: seek to learn exactly
  alternatives:
  - ascertain carefully
  - inquire precisely
  lexicon: LSJ
  rationale: Captures the intensive idea of exact inquiry without wooden literalism.
- source_word: κύριε (vocative)
  chosen: sir
  alternatives:
  - lord
  - master
  lexicon: BDAG
  rationale: Here it is a respectful address to the heavenly messenger, not to God; ‘sir’ avoids confusion with ‘the Lord’ in the same context.
- source_word: ἐντολάς
  chosen: commandments
  alternatives:
  - commands
  - precepts
  lexicon: BDAG
  rationale: ‘Commandments’ preserves weight and echoes intra-Hermas moral instruction vocabulary.
- source_word: φυλάξῃς
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: BDAG
  rationale: Standard ethical idiom ‘keep the commandments’ fits the context.
- source_word: πορευθῇς ἐν αὐταῖς
  chosen: walk in them
  alternatives:
  - conduct yourself in them
  - live by them
  lexicon: BDAG
  rationale: Idiomatic biblical-ethical phrasing; keeps the imagery of path/way.
- source_word: ζήσῃ / ζήσεται τῷ Θεῷ
  chosen: you will live / will live to God
  alternatives:
  - will live for God
  - will live with God
  lexicon: BDAG
  rationale: Preserves the dative ‘to God’ (orientation) rather than smoothing to ‘for’; maintains distinctive Hermas phrasing.
- source_word: πολλαί… ποικίλαι
  chosen: many and manifold
  alternatives:
  - many and various
  lexicon: BDAG
  rationale: ‘Manifold’ keeps the elevated tone and pairs well with ‘many’ to express diversity of sins.
