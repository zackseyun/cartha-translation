theological_decisions:
- issue: Identity of the woman in the vision
  chosen_reading: She is the Church (personified), not the Sibyl.
  alternative_readings:
  - A symbolic wise woman (e.g., Wisdom personified)
  - The Sibyl (pagan prophetess)
  rationale: The text explicitly identifies her as ἡ Ἐκκλησία; preserving the identification anchors the ecclesial allegory central to Hermas.
- issue: Reason the Church appears as an old woman
  chosen_reading: She appears old because she was created first of all, and for her sake the world was set in order.
  alternative_readings:
  - Purely metaphorical for the Church’s antiquity/pre-eminence without ontological claim
  - Allusion to Wisdom traditions rather than a doctrinal assertion
  rationale: We render the claim as stated, preserving Hermas’s tension-laden pre-existence imagery without harmonizing or softening it.
- issue: Rendering Ἐκκλησία as “Church”
  chosen_reading: Translate as “the Church,” capitalized in context.
  alternative_readings:
  - Translate as “assembly” or “congregation”
  rationale: Second-century Roman Christian context and personification support the ecclesial sense; capitalization signals the personified figure.
- issue: Public reading practice implied by ἀναγινώσκω
  chosen_reading: Render “you will read it aloud,” reflecting communal liturgical reading.
  alternative_readings:
  - “you will read it” without ‘aloud’
  rationale: Early Christian texts were read publicly; making this explicit preserves the ecclesial setting and practice.
- issue: Translation of ἐκλεκτοί
  chosen_reading: “the elect” to preserve the theological term.
  alternative_readings:
  - “the chosen (ones)”
  rationale: Maintains traditional theological vocabulary without specifying a particular doctrinal system; alternatives are noted in lexical options.
- issue: Church order in “elders who preside over the church”
  chosen_reading: Maintain presiding/leadership language rather than generic ‘leaders.’
  alternative_readings:
  - Simplify to ‘leaders’
  rationale: Hermas reflects emerging church order; “preside” preserves the technical flavor of προΐσταμαι.
