source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ἀπεκαλύφθη δέ μοι, ἀδελφοί, κοιμωμένῳ ὑπὸ νεανίσκου εὐειδεστάτου λέγοντός μοι· Τὴν πρεσβυτέραν, παρ' ἧς ἔλαβες τὸ βιβλίδιον, τίνα δοκεῖς εἶναι; ἐγὼ φημί· Τὴν Σίβυλλαν. Πλανᾶσαι, φησίν, οὐκ ἔστιν. Τίς οὖν ἐστίν; φημί. Ἡ Ἐκκλησία, φησίν. εἶπον αὐτῷ· Διατί οὖν πρεσβυτέρα; Ὅτι, φησίν, πάντων πρώτη ἐκτίσθη· διὰ τοῦτο πρεσβυτέρα, καὶ διὰ ταύτην ὁ κόσμος κατηρτίσθη. 2. μετέπειτα δὲ ὅρασιν εἶδον ἐν τῷ οἴκῳ μου. ἦλθεν ἡ πρεσβυτέρα καὶ ἠρώτησέν με εἰ ἤδη τὸ βιβλίον δέδωκα τοῖς πρεσβυτέροις. ἠρνησάμην δεδωκέναι. Καλῶς, φησίν, πεποίηκας· ἔχω γὰρ ῥήματα προσθεῖναι. ὅταν οὖν ἀποτελέσω τὰ ῥήματα πάντα, διὰ σοῦ γνωρισθήσεται τοῖς ἐκλεκτοῖς πᾶσιν. 3. γράψεις οὖν δύο βιβλαρίδια, καὶ πέμψεις ἓν Κλήμεντι καὶ ἓν Γραπτῇ. πέμψει οὖν Κλήμης εἰς τὰς ἔξω πόλεις, ἐκείνῳ γὰρ ἐπιτέτραπται· Γραπτὴ δὲ νουθετήσει τὰς χήρας καὶ τοὺς ὀρφανούς. σὺ δὲ ἀναγνωσῇ εἰς ταύτην τὴν πόλιν μετὰ τῶν πρεσβυτέρων τῶν προϊσταμένων τῆς ἐκκλησίας.
