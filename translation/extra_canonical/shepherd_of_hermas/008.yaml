translation:
  text: 'And it was revealed to me, brothers[a], while I was asleep, by a very handsome young man who said to me: “The old woman[c], from whom you received the little book—who do you suppose she is?” I said, “The Sibyl[b].” “You are mistaken,” he says; “she is not.” “Then who is she?” I say. “The Church,” he says. I said to him, “Why then an old woman?” “Because,” he says, “she was created first of all; for this reason she is old, and for her sake the world was set in order[d][g].”


    2. Afterward I saw a vision in my house. The old woman came and asked me whether I had already given the book to the elders[j]. I denied having given it. “You have done well,” she says; “for I have words to add. When, therefore, I complete all the words, through you they will be made known to all the elect.


    3. “So you will write two little booklets, and you will send one to Clement[h] and one to Grapte[i]. Then Clement will send it to the cities outside[e], for this has been entrusted to him; but Grapte will admonish the widows and the orphans. But you will read it aloud[f] in this city together with the elders[j] who preside over the church.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Brothers” (ἀδελφοί) is a standard communal address in early Christian texts and is inclusive of the whole assembly, men and women.
    reason: cultural_note
  - marker: b
    text: The Sibyl was a well-known figure of pagan prophetic oracles in the Greco-Roman world; Hermas’s first guess situates his vision in that cultural landscape.
    reason: cultural_note
  - marker: c
    text: Greek πρεσβυτέρα can mean “elder/older woman.” Rendered here as “old woman” to distinguish from the office term πρεσβύτεροι (“elders”) appearing later.
    reason: lexical_alternative
  - marker: d
    text: “Was set in order” translates κατηρτίσθη; alternatives include “was prepared,” “was fashioned,” “was established.”
    reason: lexical_alternative
  - marker: e
    text: “Cities outside” likely means cities outside Rome, suggesting a distribution network beyond the local church.
    reason: cultural_note
  - marker: f
    text: The verb ἀναγινώσκω ordinarily refers to public reading; hence “read it aloud.”
    reason: cultural_note
  - marker: g
    text: Hermas depicts the Church as primordial and creation as ordered for her sake; compare Jewish Wisdom traditions (e.g., Proverbs 8:22–31), while noting Hermas explicitly names the Church.
    reason: cross_reference
  - marker: h
    text: Clement may refer to a leading figure in the Roman church tasked with external correspondence; the text does not specify further identity.
    reason: cultural_note
  - marker: i
    text: Grapte is a woman charged with instructing widows and orphans—an early witness to structured care and teaching for vulnerable members.
    reason: cultural_note
  - marker: j
    text: “Elders” (πρεσβύτεροι) are recognized local leaders; “who preside” (προΐσταμαι) indicates formal oversight of the church.
    reason: cultural_note
  - marker: k
    text: Or 'through you they will be made known to all the elect.”'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀπεκαλύφθη
  chosen: was revealed
  alternatives:
  - was shown
  - was disclosed
  lexicon: BDAG
  rationale: Standard passive of apokalyptō in visionary contexts emphasizes divine revelation rather than mere showing.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - brethren
  lexicon: BDAG
  rationale: Vocative address to the community; retained as “brothers” to preserve second-century idiom, with a note indicating inclusive reference.
- source_word: κοιμωμένῳ
  chosen: while I was asleep
  alternatives:
  - while I was sleeping
  - as I slept
  lexicon: BDAG
  rationale: Temporal participle; “asleep” concise and natural in English narrative.
- source_word: νεανίσκου εὐειδεστάτου
  chosen: a very handsome young man
  alternatives:
  - a most handsome youth
  - a very good-looking youth
  lexicon: LSJ
  rationale: Superlative εὐειδεστάτου rendered as “very handsome” to keep intensity while maintaining idiomatic English.
- source_word: πρεσβυτέρα
  chosen: old woman
  alternatives:
  - elder woman
  - aged woman
  lexicon: BDAG
  rationale: Descriptive of age; “old woman” avoids confusion with the office term πρεσβύτεροι (elders) later in the passage.
- source_word: βιβλίδιον
  chosen: little book
  alternatives:
  - booklet
  - little scroll
  lexicon: BDAG
  rationale: Diminutive; “little book” keeps concreteness without committing to scroll vs. codex form.
- source_word: Σίβυλλα
  chosen: Sibyl
  lexicon: LSJ
  rationale: Proper name for a famed pagan prophetess; transliterated.
- source_word: πλανᾶσαι
  chosen: you are mistaken
  alternatives:
  - you err
  - you are deceived
  lexicon: BDAG
  rationale: Idiomatic rebuke; maintains force without archaism.
- source_word: Ἐκκλησία
  chosen: the Church
  alternatives:
  - the assembly
  - the congregation
  lexicon: BDAG
  rationale: Second-century Christian usage denotes the Church; capitalized due to personification as a woman.
- source_word: ἐκτίσθη
  chosen: was created
  alternatives:
  - was made
  - came into being
  lexicon: BDAG
  rationale: Creation term; preserves theological weight of first-created claim.
- source_word: κατηρτίσθη
  chosen: was set in order
  alternatives:
  - was prepared
  - was fashioned
  - was established
  lexicon: BDAG
  rationale: Captures arranging/ordering nuance rather than mere making; suits the cosmic-order sense.
- source_word: ὅρασιν
  chosen: vision
  alternatives:
  - appearance
  - sight
  lexicon: BDAG
  rationale: Technical term for a visionary experience.
- source_word: πρεσβύτεροι
  chosen: elders
  alternatives:
  - presbyters
  - senior leaders
  lexicon: BDAG
  rationale: Technical term for church office; “elders” is standard and compact.
- source_word: ῥήματα
  chosen: words
  alternatives:
  - sayings
  - message
  lexicon: BDAG
  rationale: Plural rhema; concrete “words” keeps the serial, additive sense.
- source_word: ἀποτελέσω
  chosen: complete
  alternatives:
  - finish
  - bring to completion
  lexicon: BDAG
  rationale: Teleological nuance preserved succinctly with “complete.”
- source_word: γνωρισθήσεται
  chosen: it will be made known
  alternatives:
  - it will be disclosed
  - it will be made clear
  lexicon: BDAG
  rationale: Passive of gnōrizō; distinct from “reveal,” maintaining verbal variety.
- source_word: ἐκλεκτοῖς
  chosen: the elect
  alternatives:
  - the chosen
  - the chosen ones
  lexicon: BDAG
  rationale: Preserves technical theological term; concise and traditional without importing later doctrinal specificity.
- source_word: βιβλαρίδια
  chosen: little booklets
  alternatives:
  - little books
  - small scrolls
  lexicon: BDAG
  rationale: Diminutive plural; “booklets” naturally conveys small size.
- source_word: τὰς ἔξω πόλεις
  chosen: the cities outside
  alternatives:
  - outlying cities
  - cities abroad
  lexicon: BDAG
  rationale: Literal spatial sense relative to the sender’s city; footnote clarifies likely referent (outside Rome).
- source_word: ἐπιτέτραπται
  chosen: has been entrusted
  alternatives:
  - has been assigned
  - has been committed
  lexicon: BDAG
  rationale: Connotes responsibility given to Clement; “entrusted” fits ecclesial delegation.
- source_word: νουθετήσει
  chosen: will admonish
  alternatives:
  - will instruct
  - will warn
  lexicon: BDAG
  rationale: Paraenetic term with moral edge; stronger than mere instruction, fitting Hermas’s tone.
- source_word: ἀναγνωσῇ
  chosen: you will read it aloud
  alternatives:
  - you will read it
  - you shall have it read
  lexicon: BDAG
  rationale: Anaginoskō typically denotes public reading; explicit “aloud” preserves communal practice.
- source_word: προϊσταμένων
  chosen: who preside over
  alternatives:
  - who are set over
  - who lead
  lexicon: BDAG
  rationale: Presiding leadership nuance; maintains early church order language without modernization.
