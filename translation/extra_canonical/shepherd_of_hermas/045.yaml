id: HERM.M.12.v
reference: Shepherd of Hermas — Mandate 12, section v
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Λέγω αὐτῷ· Κύριε, ἄκουσόν μου ὀλίγων ῥημάτων. Λέγε, φησίν, ὃ βούλει. Ὁ μὲν
    ἄνθρωπος, φημί, κύριε, πρόθυμός ἐστι τὰς ἐντολὰς τοῦ Θεοῦ φυλάσσειν, καὶ οὐδείς
    ἐστιν ὁ μὴ αἰτούμενος παρὰ τοῦ Κυρίου, ἵνα ἐνδυναμωθῇ ἐν ταῖς ἐντολαῖς αὐτοῦ καὶ
    ὑποταγῇ αὐταῖς· ἀλλ' ὁ διάβολος σκληρός ἐστι καὶ καταδυναστεύει αὐτῶν. 2. Οὐ δύναται,
    φησί, καταδυναστεύειν τῶν δούλων τοῦ Θεοῦ τῶν ἐξ ὅλης καρδίας ἐλπιζόντων ἐπ' αὐτόν.
    δύναται ὁ διάβολος ἀντιπαλαῖσαι, καταπαλαῖσαι δὲ οὐ δύναται. ἐὰν οὖν ἀντισταθῆτε
    αὐτῷ, νικηθεὶς φεύξεται ἀφ' ὑμῶν κατῃσχυμμένος. ὅσοι δέ, φησίν, ἀπόκενοί εἰσι,
    φοβοῦνται τὸν διάβολον ὡς δύναμιν ἔχοντα. 3. ὅταν ὁ ἄνθρωπος κεράμια ἱκανώτατα
    γεμίσῃ οἴνου καλοῦ, καὶ ἐν τοῖς κεραμίοις ἐκείνοις ὀλίγα ἀπόκενα ᾖ, ἔρχεται ἐπὶ
    τὰ κεράμια καὶ οὐ κατανοεῖ τὰ πλήρη· οἶδε γὰρ ὅτι πλήρη εἰσί· κατανοεῖ δὲ τὰ ἀπόκενα,
    φοβούμενος μήποτε ὤξισαν· ταχὺ γὰρ τὰ ἀπόκενα κεράμια ὀξίζουσι, καὶ ἀπόλλυται
    ἡ ἡδονὴ τοῦ οἴνου. 4. οὕτω καὶ ὁ διάβολος ἔρχεται ἐπὶ πάντας τοὺς δούλους τοῦ
    Θεοῦ ἐκπειράζων αὐτούς. ὅσοι οὖν πλήρεις εἰσὶν ἐν τῇ πίστει, ἀνθεστήκασιν αὐτῷ
    ἰσχυρῶς, κἀκεῖνος ἀποχωρεῖ ἀπ' αὐτῶν μὴ ἔχων τόπον ποῦ εἰσέλθῃ. ἔρχεται οὖν τότε
    πρὸς τοὺς ἀποκένους, καὶ ἔχων τόπον εἰσπορεύεται εἰς αὐτούς, καὶ ὃ δὲ βούλεται
    ἐν αὐτοῖς ἐργάζεται, καὶ γίνονται αὐτῷ ὑπόδουλοι.
