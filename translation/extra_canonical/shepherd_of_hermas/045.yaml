theological_decisions:
- issue: Rendering of δοῦλοι (τοῦ Θεοῦ)
  chosen_reading: '"slaves of God"'
  alternative_readings:
  - servants of God
  - bondservants of God
  rationale: Cartha policy prefers "slave" where bonded allegiance and ownership are
    in view; Hermas emphasizes belonging and subjection.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy; Contested terms: doulos
    → slave'
- issue: Translation of πίστις
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: In this exhortative context, the quality possessed by believers that
    fills them is best rendered "faith," maintaining the contrast with being "empty."
  doctrine_reference: 'DOCTRINE.md §Contested terms: pistis → faith'
- issue: Translation of ἐκπειράζω with the devil as subject
  chosen_reading: '"putting them to the test"'
  alternative_readings:
  - tempting them
  rationale: Both senses are possible; we preserve the testing motif of Hermas while
    acknowledging the devil’s role in enticement in a footnote.
- issue: Address κύριε in dialogue
  chosen_reading: Lord
  alternative_readings:
  - Master
  - Sir
  rationale: Maintains reverential address consistent with early Christian usage without
    conflating the shepherd with God; a respectful title in context.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy: Titles'
- issue: Diabolical agency and human resistance
  chosen_reading: Render ἀντισταθῆτε as "resist" and keep vivid wrestling imagery
    (ἀντιπαλαῖσαι/καταπαλαῖσαι)
  alternative_readings:
  - '"stand against" without wrestling imagery'
  - weakened to generic struggle
  rationale: Hermas’s moral exhortation employs strong combative imagery; preserving
    it keeps the force of the mandate without importing NT phrasing unnecessarily.
  doctrine_reference: 'Project style guidance: Preserve paraenetic force; avoid flattening
    imagery'
