translation:
  text: 'I said to him, "Lord, listen to me for a few words." He says, "Speak what
    you wish."


    "A person, Lord, is eager to keep the commandments of God, and there is no one
    who does not ask from the Lord to be strengthened in his commandments and to be
    made subject to them; but the devil is harsh and tyrannizes them."


    "He is not able," he says, "to tyrannize the slaves of God—those who put their
    hope in him with their whole heart. The devil can grapple [e], but he cannot overthrow.
    If, therefore, you resist him, defeated he will flee from you, disgraced. But
    those who are empty [a] are afraid of the devil as though he had power.


    "When a man fills very many clay jars [b] with good wine, and among those jars
    a few are empty, he comes to the jars and does not examine the full ones—for he
    knows they are full—but he examines the empty ones, fearing lest they have turned
    sour; for empty jars quickly turn sour, and the enjoyment [f] of the wine is lost.


    "So also the devil comes upon all the slaves of God, putting them to the test
    [c]. Therefore, as many as are full in faith have resisted him strongly, and he
    withdraws from them, having no place to enter [d]. He comes then to the empty
    ones; and having a place he goes into them, and he does in them what he wishes,
    and they become enslaved to him."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Empty translates Greek apokenos, "empty, drained, hollow"; here it figuratively
      contrasts with being "full in faith."
    reason: lexical_alternative
  - marker: b
    text: Clay jars renders keramia, common earthenware vessels for wine in antiquity.
      The note about empty jars souring reflects ancient experience with residues
      tainting wine.
    reason: cultural_note
  - marker: c
    text: Putting them to the test translates ekpeirazō; with the devil as subject,
      "tempting them" is also possible.
    reason: lexical_alternative
  - marker: d
    text: Literally, "having no place to enter"; idiomatically, no opening or opportunity.
    reason: lexical_alternative
  - marker: e
    text: 'Grapple/overthrow renders antipalaio/katapalaio, evoking wrestling: he
      can wrestle but cannot throw down or pin.'
    reason: lexical_alternative
  - marker: f
    text: Enjoyment renders hēdonē; "pleasure" is a possible alternative.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  - Sir
  lexicon: BDAG
  rationale: Consistent with covenantal and early Christian address; respectful title
    for the angelic shepherd figure.
- source_word: ἐντολαί
  chosen: commandments
  alternatives:
  - commands
  - precepts
  lexicon: BDAG
  rationale: Standard rendering that preserves moral/paraenetic force in Hermas.
- source_word: φυλάσσειν
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: BDAG
  rationale: '"Keep" is idiomatic in biblical moral contexts and aligns with early
    Christian usage.'
- source_word: ἐνδυναμωθῇ
  chosen: be strengthened
  alternatives:
  - be empowered
  - be made strong
  lexicon: BDAG
  rationale: Captures passive divine enabling without over-interpretation.
- source_word: ὑποταγῇ
  chosen: be made subject
  alternatives:
  - submit
  - be subjected
  lexicon: BDAG
  rationale: Passive voice preserved; highlights submission under God's commandments.
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the accuser
  - the slanderer
  lexicon: BDAG
  rationale: Conventional rendering in early Christian texts; avoids introducing an
    explanatory gloss in the main text.
- source_word: σκληρός
  chosen: harsh
  alternatives:
  - cruel
  - hard
  lexicon: LSJ
  rationale: Conveys severity without importing emotional overtones; fits the contrast
    with God's strengthening.
- source_word: καταδυναστεύειν
  chosen: tyrannize
  alternatives:
  - oppress
  - domineer
  lexicon: LSJ
  rationale: Strong verb of oppressive domination, matching the vivid moral struggle
    in Hermas.
- source_word: δοῦλοι (τοῦ Θεοῦ)
  chosen: slaves (of God)
  alternatives:
  - servants (of God)
  - bondservants (of God)
  lexicon: BDAG
  rationale: Per Cartha policy, render doulos as "slave" where bonded allegiance is
    salient.
- source_word: ἐλπίζοντες ἐπ’ αὐτόν
  chosen: put their hope in him
  alternatives:
  - hope in him
  - trust in him
  lexicon: BDAG
  rationale: Idiomatic English for biblical hope directed toward God; maintains volitional
    nuance.
- source_word: ἀντιπαλαῖσαι
  chosen: grapple
  alternatives:
  - wrestle
  - struggle
  lexicon: LSJ
  rationale: Preserves the wrestling metaphor that is paired with καταπαλαῖσαι.
- source_word: καταπαλαῖσαι
  chosen: overthrow
  alternatives:
  - throw down
  - subdue
  - pin
  lexicon: LSJ
  rationale: 'Completes the wrestling image: the devil can engage but cannot achieve
    the decisive throw.'
- source_word: ἀντισταθῆτε
  chosen: resist
  alternatives:
  - stand against
  - oppose
  lexicon: BDAG
  rationale: Concise and idiomatic for moral resistance; preserves second-person plural
    admonition.
- source_word: κατῃσχυμμένος
  chosen: disgraced
  alternatives:
  - ashamed
  - in shame
  lexicon: BDAG
  rationale: Captures the honor-shame overtones of public defeat.
- source_word: ἀπόκενοι
  chosen: empty
  alternatives:
  - hollow
  - drained
  lexicon: LSJ
  rationale: Literal sense that fits the ensuing jar-and-wine illustration and the
    contrast with being "full in faith."
- source_word: κεράμια
  chosen: clay jars
  alternatives:
  - earthenware jars
  - earthen vessels
  lexicon: LSJ
  rationale: Concrete material term for common ancient containers; "clay" is clear
    to modern readers.
- source_word: κατανοεῖν
  chosen: examine
  alternatives:
  - consider
  - inspect
  lexicon: BDAG
  rationale: Context of checking jars fits "examine/inspect"; we choose "examine"
    for clarity.
- source_word: ὀξίζουσι(ν)
  chosen: turn sour
  alternatives:
  - become sour
  - acidify
  lexicon: LSJ
  rationale: Ordinary idiom for wine going bad; accessible to modern readers.
- source_word: ἡδονή
  chosen: enjoyment
  alternatives:
  - pleasure
  - delight
  lexicon: BDAG
  rationale: Avoids hedonistic overtones in modern English while conveying the pleasantness
    of wine.
- source_word: ἐκπειράζων
  chosen: putting them to the test
  alternatives:
  - tempting them
  - testing them thoroughly
  lexicon: BDAG
  rationale: Ek- intensifies; with the devil as subject, both "test" and "tempt" are
    possible; we prefer "test" with a note.
- source_word: πλήρεις ἐν τῇ πίστει
  chosen: full in faith
  alternatives:
  - filled with faith
  - full of faith
  lexicon: BDAG
  rationale: Keeps the fullness imagery to match the jar metaphor while retaining
    standard rendering of pistis as "faith."
- source_word: ἀνθεστήκασιν
  chosen: have resisted
  alternatives:
  - have stood against
  - have taken their stand
  lexicon: BDAG
  rationale: Perfect tense force conveyed by English present perfect; matches the
    exhortative context.
- source_word: ἀποχωρεῖ
  chosen: withdraws
  alternatives:
  - goes away
  - retreats
  lexicon: BDAG
  rationale: Slightly formal verb matches the elevated tone and moral struggle.
- source_word: μὴ ἔχων τόπον ποῦ εἰσέλθῃ
  chosen: having no place to enter
  alternatives:
  - having no opening to enter
  - having no opportunity to enter
  lexicon: BDAG
  rationale: Literal phrasing preserves the spatial metaphor that is reversed in the
    next clause.
- source_word: εἰσπορεύεται
  chosen: goes into
  alternatives:
  - enters
  - comes into
  lexicon: BDAG
  rationale: Plain verb of entering; "goes into" pairs with "place to enter."
- source_word: ἐργάζεται
  chosen: does
  alternatives:
  - works
  - carries out
  lexicon: BDAG
  rationale: Neutral verb of action; avoids implying creative work.
- source_word: ὑπόδουλοι
  chosen: enslaved
  alternatives:
  - subject to
  - in subjection
  - bonded under
  lexicon: LSJ
  rationale: Strong term of subjection; "enslaved" mirrors earlier "slaves of God"
    to highlight the contrasting allegiances.
