translation:
  text: 'After fifteen days, when I had been fasting and had asked the Lord many things,
    the understanding of the writing was revealed to me.[1] And this was written:


    “Your offspring, Hermas,[2] have rejected God and blasphemed the Lord, and they
    have betrayed their parents in great wickedness, and they were heard as betrayers
    of parents; and though they betrayed them, they gained no advantage, but they
    added still to their sins licentious acts and mixtures of wickedness,[3] and thus
    their lawless deeds were filled up.


    But make these words known to all your children and to your wife, who is to be
    your sister;[4] for she too does not refrain from her tongue, by which she acts
    wickedly. But when she hears these words, she will refrain, and she will obtain
    mercy.


    After you have made known to them these words which the Master commanded me to
    be revealed to you, then all their sins that they formerly committed are forgiven
    them, and also to all the holy ones who have sinned up to this day, if they repent
    with all their heart and remove from their heart their double‑mindedness.[6]


    For the Master swore by his glory concerning his chosen ones: if, after this appointed
    day, sin should still occur, they have no salvation; for repentance has an end
    for the righteous. The days of repentance have been fulfilled for all the holy
    ones, but for the nations there is repentance until the last day.[9]


    Therefore you shall say to those who lead the church[10] that they should set
    their ways straight in righteousness, so that they may receive the promises in
    full, with much glory.


    Persevere, then, you who work righteousness, and do not be double‑minded, so that
    your passing may be with the holy angels.[11] Blessed are you who endure the great
    tribulation that is coming, and who will not deny their life.[12]


    For the Lord swore by his Son[13] that those who denied their Lord are cut off
    from their life—those who are now about to deny him in the coming days; but to
    those who denied before, because of his great compassion, he became merciful.”[14]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: ‘Writing’ renders γραφή here as the particular document revealed to Hermas
      within the vision, not ‘Scripture’ in general.
    reason: cultural_note
  - marker: '[2]'
    text: Greek σπέρμα = ‘seed’/‘offspring,’ a collective term for one’s descendants.
    reason: lexical_alternative
  - marker: '[3]'
    text: The rare term συμφυρμός means ‘mixing/commingling’; here ‘interminglings
      of wickedness’ suggests entanglement or complicity in various evils.
    reason: lexical_alternative
  - marker: '[4]'
    text: ‘Your wife, who will be your sister’ reflects early Christian usage of sibling
      language for fellow believers within the household.
    reason: cultural_note
  - marker: '[6]'
    text: ‘Double‑mindedness’ (διψυχία) is a stock Hermas term for vacillation between
      God and evil; cf. Mandates.
    reason: cross_reference
  - marker: '[9]'
    text: ‘The nations’ (ἔθνη) can also be rendered ‘the Gentiles.’ The contrast is
      between insiders (‘holy ones/righteous’) and outsiders.
    reason: lexical_alternative
  - marker: '[10]'
    text: ‘Those who lead the church’ translates τοῖς προηγουμένοις τῆς ἐκκλησίας,
      literally ‘those who go before’—a standard term for leaders/presiders.
    reason: cultural_note
  - marker: '[11]'
    text: ‘Passage’ (πάροδος) evokes the transit through death or judgment; the imagery
      is intentionally left unflattened.
    reason: cultural_note
  - marker: '[12]'
    text: '‘Will not deny their life’ is ambiguous: it may mean not renouncing true
      life in God, or not denying even at the cost of their earthly lives.'
    reason: cultural_note
  - marker: '[13]'
    text: 'Oath formula: ‘swore by his Son,’ parallel to ‘by his glory’ above, underscores
      the solemnity of the declaration.'
    reason: cross_reference
  - marker: '[14]'
    text: ‘To be rejected from their life’ renders ἀπεγνωσθαι ἀπὸ τῆς ζωῆς, i.e.,
      to be disowned/cast off from life (whether present or eternal).
    reason: lexical_alternative
  - marker: a
    text: Or 'those who have denied their Lord have been rejected from their life—those
      who are now about to deny'.
    reason: previous_rendering
  - marker: b
    text: Or 'remove from their heart the double‑mindedness'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἡ γνῶσις τῆς γραφῆς
  chosen: the understanding of the writing
  alternatives:
  - the understanding of the Scripture
  - knowledge of the writing
  lexicon: BDAG; LSJ
  rationale: γρᾰφή often means Scripture, but within this vision it refers to the
    particular writing shown to Hermas; rendering avoids over‑specifying canonical
    Scripture.
- source_word: σπέρμα
  chosen: offspring
  alternatives:
  - seed
  - descendants
  - children
  lexicon: BDAG; LSJ
  rationale: Concrete familial term; “offspring” preserves collective sense without
    implying only immediate children.
- source_word: ἠθέτησαν
  chosen: have rejected
  alternatives:
  - have broken faith with
  - have set aside
  - have betrayed
  lexicon: BDAG
  rationale: In Koine, ἀθετέω = reject/nullify; “rejected” reads naturally with God
    as object and matches subsequent blasphemy/betrayal.
- source_word: ἐβλασφήμησαν
  chosen: blasphemed
  alternatives:
  - slandered
  - reviled
  lexicon: BDAG
  rationale: Standard theological sense toward the Lord is appropriate.
- source_word: προέδωκαν
  chosen: betrayed
  alternatives:
  - handed over
  - delivered up
  lexicon: BDAG; LSJ
  rationale: With parents as object, “betrayed” best captures moral treachery.
- source_word: προδότας γονέων
  chosen: traitors to parents
  alternatives:
  - betrayers of parents
  - those who betray parents
  lexicon: BDAG; LSJ
  rationale: Idiomatic English for a vice label; keeps starkness.
- source_word: ἀσελγηίαι
  chosen: licentious acts
  alternatives:
  - debaucheries
  - sensualities
  lexicon: BDAG
  rationale: Common moral term; “licentious acts” is concrete and weighty.
- source_word: συμφυρμοὺς πονηρίας
  chosen: interminglings of wickedness
  alternatives:
  - entanglements in wickedness
  - mixtures of wickedness
  - complicity in evil
  lexicon: LSJ; Lampe (Patristic)
  rationale: συμφυρμός = mixing/commingling; here moral mixing/entanglement; chosen
    phrasing preserves metaphor while readable.
- source_word: συμβίος
  chosen: wife
  alternatives:
  - partner in life
  - spouse
  lexicon: LSJ; Lampe (Patristic)
  rationale: In context of household exhortation, the natural sense is spouse/wife.
- source_word: ἡ μελλοῦσά σου ἀδελφή
  chosen: who will be your sister
  alternatives:
  - who is to be your sister
  lexicon: BDAG; Lampe (Patristic)
  rationale: Preserves early Christian idiom of spiritual kinship without collapsing
    it into paraphrase.
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: BDAG
  rationale: Differentiates from κύριος (“Lord”) later in the unit; “Master” reflects
    the nuance of δεσπότης used of God in Hermas.
- source_word: ἀφίενται
  chosen: will be forgiven
  alternatives:
  - are forgiven
  lexicon: BDAG
  rationale: Futuristic present in a consequential clause; “will be forgiven” fits
    the conditional sequence.
- source_word: ἅγιοι
  chosen: holy ones
  alternatives:
  - saints
  lexicon: BDAG
  rationale: “Holy ones” preserves the adjective’s force and keeps consistency with
    “holy angels” in this unit.
- source_word: μετανοήσωσιν / μετάνοια
  chosen: repent / repentance
  alternatives:
  - change their mind / change of mind
  lexicon: BDAG
  rationale: Context addresses concrete sins and pardon; per project policy, use “repent”
    in specific‑sin contexts.
- source_word: διψυχίαι
  chosen: double‑mindedness
  alternatives:
  - doubts
  - vacillation
  lexicon: BDAG; Lampe (Patristic)
  rationale: Hermas uses διψυχία as a technical moral failing; “double‑mindedness”
    is the established, concrete rendering.
- source_word: ὤμοσεν … κατὰ τῆς δόξης αὐτοῦ
  chosen: swore by his glory
  alternatives:
  - swore against his glory
  - swore on his glory
  lexicon: BDAG; LSJ
  rationale: κατά + gen. in oath formula = “by”; the idiom is preserved.
- source_word: ἐκλεκτοί
  chosen: chosen ones
  alternatives:
  - elect
  lexicon: BDAG
  rationale: “Chosen ones” is transparent; “elect” is more technical; both valid.
- source_word: ἡμέραι μετανοίας πεπλήρωνται
  chosen: the days of repentance have been fulfilled
  alternatives:
  - the days of repentance are complete
  lexicon: BDAG; LSJ
  rationale: Idiomatic perfect passive sense captured with “have been fulfilled.”
- source_word: ἔθνεσιν
  chosen: the nations
  alternatives:
  - the Gentiles
  lexicon: BDAG
  rationale: Hermas likely contrasts believers and non‑Jews; “the nations” preserves
    OT/LXX resonance; “Gentiles” noted as alternative.
- source_word: προηγούμενοι τῆς ἐκκλησίας
  chosen: those who lead the church
  alternatives:
  - the leaders of the church
  - those who preside in the church
  lexicon: BDAG; LSJ; Lampe (Patristic)
  rationale: Participle ‘those who go before’ is a standard term for leaders; chosen
    phrasing is clear and preserves church‑order nuance.
- source_word: κατορθώσωνται τὰς ὁδοὺς
  chosen: set their ways straight
  alternatives:
  - straighten their ways
  - make their paths right
  lexicon: LSJ
  rationale: κατορθόω = set right/straight; with ‘ways/paths’ a moral metaphor; chosen
    rendering keeps imagery.
- source_word: ἐμμείνατε
  chosen: Hold fast
  alternatives:
  - Remain
  - Continue steadfast
  lexicon: BDAG
  rationale: Imperative of perseverance; “Hold fast” is vivid and concise.
- source_word: πάροδος
  chosen: passage
  alternatives:
  - passing over
  - transit
  lexicon: LSJ; Lampe (Patristic)
  rationale: Metaphor for the passage through death/judgment; “passage” preserves
    imagery without over‑interpreting.
- source_word: θλῖψις ἡ ἐρχομένη ἡ μεγάλη
  chosen: the great tribulation that is coming
  alternatives:
  - the coming great affliction
  lexicon: BDAG
  rationale: θλῖψις = tribulation/affliction; chosen phrasing echoes eschatological
    tone without importing NT as a title.
- source_word: ὤμοσεν … κατὰ τοῦ υἱοῦ αὐτοῦ
  chosen: swore by his Son
  alternatives:
  - swore on his Son
  lexicon: BDAG; LSJ
  rationale: Parallel oath formula to ‘by his glory’; preserves striking theology
    without smoothing.
- source_word: ἀπεγνωσθαι ἀπὸ τῆς ζωῆς
  chosen: to be rejected from their life
  alternatives:
  - to be disowned from life
  - to be cut off from life
  lexicon: BDAG; LSJ
  rationale: ἀπογιγνώσκω/ἀπεγνωσθαι in passive = be rejected/condemned; “from their
    life” kept literal, noting ambiguity between earthly and eternal life.
