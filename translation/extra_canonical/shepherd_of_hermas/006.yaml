theological_decisions:
- issue: Referent of ‘the writing’ (ἡ γραφή)
  chosen_reading: Render as ‘the writing’ (the specific text shown to Hermas), not
    ‘the Scripture’.
  alternative_readings:
  - Translate generically as ‘Scripture’
  rationale: Narrative context in Visions points to a revealed document within the
    vision, not the canonical Scriptures broadly.
- issue: Address to Hermas’s ‘wife who will be your sister’
  chosen_reading: Maintain literal phrasing to preserve early Christian notion of
    spiritual kinship within the household.
  alternative_readings:
  - Paraphrase as ‘your wife, who will become a fellow believer’
  rationale: Hermas repeatedly uses sibling language for believers; collapsing to
    ‘fellow believer’ loses the texture.
- issue: Repentance window for the righteous vs. the nations
  chosen_reading: 'Translate starkly: a bounded period for the righteous/holy ones;
    ongoing possibility for the nations until the last day.'
  alternative_readings:
  - Soften by generalizing to ‘repentance is urgent’
  - Restrict ‘righteous/holy ones’ to leaders only
  rationale: The Greek asserts a time‑limit for insiders; preserving tension accords
    with project principle of not resolving difficult theology.
  doctrine_reference: Translation Philosophy §Preserve theological tension
- issue: Oath formulas ‘by his glory’ and ‘by his Son’
  chosen_reading: Render literally as oath formulae, preserving the distinction between
    ‘the Master’ and ‘the Lord’ and the striking ‘by his Son’.
  alternative_readings:
  - Paraphrase as ‘solemnly declared’
  - Avoid ‘by his Son’ due to doctrinal concerns
  rationale: The text’s theological boldness is part of its force. Differentiating
    δεσπότης (Master) and κύριος (Lord) follows lexical nuance and project’s title
    policy.
  doctrine_reference: Doctrine.md §Contested terms (Kyrios → Lord)
- issue: ‘Will not deny their life’ (οὐκ ἀρνήσονται τὴν ζωὴν αὐτῶν)
  chosen_reading: Keep literal wording to preserve ambiguity (life as earthly life
    or the true Life in God).
  alternative_readings:
  - Interpret ‘life’ as ‘the Lord’ and translate ‘will not deny the Lord’
  - Interpret as ‘will not renounce their faith’
  rationale: Immediate context shifts to denying the Lord, but the phrase here is
    different; preserving literalness avoids over‑harmonizing.
  doctrine_reference: Translation Philosophy §Preserve theological tension
