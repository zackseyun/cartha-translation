id: HERM.V.2.ii
reference: Shepherd of Hermas — Vision 2, section ii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Μετὰ δὲ δέκα καὶ πέντε ἡμέρας νηστεύσαντός μου καὶ πολλὰ ἐρωτήσαντος τὸν Κύριον
    ἀπεκαλύφθη μοι ἡ γνῶσις τῆς γραφῆς. ἦν δὲ γεγραμμένα ταῦτα· 2. Τὸ σπέρμα σου,
    Ἑρμᾶ, ἠθέτησαν εἰς τὸν Θεὸν καὶ ἐβλασφήμησαν εἰς τὸν Κύριον καὶ προέδωκαν τοὺς
    γονεῖς αὐτῶν ἐν πονηρίᾳ μεγάλῃ, καὶ ἤκουσαν προδότας γονέων, καὶ προδόντες οὐκ
    ὠφελήθησαν, ἀλλὰ ἔτι προσεθήκαν ταῖς ἁμαρτίαις αὐτῶν τὰς ἀσελγηίας καὶ συμφυρμοὺς
    πονηρίας, καὶ οὕτως ἐπλήσθησαν αἱ ἀνομίαι αὐτῶν. 3. ἀλλὰ γνώρισον ταῦτα τὰ ῥήματα
    τοῖς τέκνοις σου πᾶσιν καὶ τῇ συμβίῳ σου τῇ μελλούσῃ σου ἀδελφῇ· καὶ γὰρ αὕτη
    οὐκ ἀπέχεται τῆς γλώσσης, ἐν ᾗ πονηρεύεται· ἀλλὰ ἀκούσασα τὰ ῥήματα ταῦτα ἀφέξεται,
    καὶ ἕξει ἔλεος. 4. μετὰ τὸ γνωρίσαι σε ταῦτα τὰ ῥήματα αὐτοῖς ἃ ἐνετείλατό μοι
    ὁ δεσπότης ἵνα σοι ἀποκαλυφθῇ, τότε ἀφίενται αὐτοῖς αἱ ἁμαρτίαι πᾶσαι ἃς πρότερον
    ἥμαρτον, καὶ πᾶσιν τοῖς ἁγίοις τοῖς ἁμαρτήσασιν μέχρι ταύτης τῆς ἡμέρας, ἐὰν ἐξ
    ὅλης τῆς καρδίας μετανοήσωσιν καὶ ἄρωσιν ἀπὸ τῆς καρδίας αὐτῶν τὰς διψυχίας. 5.
    ὤμοσεν γὰρ ὁ δεσπότης κατὰ τῆς δόξης αὐτοῦ ἐπὶ τοὺς ἐκλεκτοὺς αὐτοῦ· ἐὰν ὡρισμένης
    τῆς ἡμέρας ταύτης ἔτι ἁμάρτησις γένηται, μὴ ἔχειν αὐτοὺς σωτηρίαν· ἡ γὰρ μετάνοια
    τοῖς δικαίοις ἔχει τέλος· πεπλήρωνται αἱ ἡμέραι μετανοίας πᾶσιν τοῖς ἁγίοις· καὶ
    τοῖς δὲ ἔθνεσιν μετάνοιά ἐστιν ἕως ἐσχάτης ἡμέρας. 6. ἐρεῖς οὖν τοῖς προηγουμένοις
    τῆς ἐκκλησίας ἵνα κατορθώσωνται τὰς ὁδοὺς αὐτῶν ἐν δικαιοσύνῃ, ἵνα ἀπολάβωσιν
    ἐκ πλήρους τὰς ἐπαγγελίας μετὰ πολλῆς δόξης. 7. ἐμμείνατε οὖν οἱ ἐργαζόμενοι τὴν
    δικαιοσύνην καὶ μὴ διψυχήσητε, ἵνα γένηται ὑμῶν ἡ πάροδος μετὰ τῶν ἀγγέλων τῶν
    ἁγίων. μακάριοι ὑμεῖς ὅσοι ὑπομένετε τὴν θλῖψιν τὴν ἐρχομένην τὴν μεγάλην, καὶ
    ὅσοι οὐκ ἀρνήσονται τὴν ζωὴν αὐτῶν. 8. ὤμοσεν γὰρ Κύριος κατὰ τοῦ υἱοῦ αὐτοῦ,
    τοὺς ἀρνησαμένους τὸν Κύριον αὐτῶν ἀπεγνωσθαι ἀπὸ τῆς ζωῆς αὐτῶν, τοὺς νῦν μέλλοντας
    ἀρνεῖσθαι ταῖς ἐρχομέναις ἡμέραις· τοῖς δὲ πρότερον ἀρνησαμένοις διὰ τὴν πολυσπλαγχνίαν
    ἵλεως ἐγένετο αὐτοῖς.
