  text: ποιῆσαι αὐτοὺς ἐν τῇ πίστει. 2. πιστεύσατε οὖν τῷ Θεῷ ὑμεῖς οἱ διὰ τὰς ἁμαρτίας ὑμῶν ἀπεγνωκότες τὴν ζωὴν ὑμῶν καὶ προστιθέντες ἁμαρτίαις καὶ καταβαρύνοντες τὴν ζωὴν ὑμῶν, ὅτι ἐὰν ἐπιστραφῆτε πρὸς τὸν Κύριον ἐξ ὅλης τῆς καρδίας ὑμῶν καὶ ἐργάσησθε τὴν δικαιοσύνην τὰς λοιπὰς ἡμέρας τῆς ζωῆς ὑμῶν καὶ δουλεύσητε αὐτῷ ὀρθῶς κατὰ τὸ θέλημα αὐτοῦ, ποιήσει ἴασιν τοῖς προτέροις ὑμῶν ἁμαρτήμασι, καὶ ἕξετε δύναμιν τοῦ κατακυριεῦσαι τῶν ἔργων τοῦ διαβόλου. τὴν δὲ ἀπειλὴν τοῦ διαβόλου ὅλως μὴ φοβήθητε· ἄτονος γάρ ἐστιν ὥσπερ νεκροῦ νεῦρα. 3. ἀκούσατε οὖν μου, καὶ φοβήθητε τὸν πάντα δυνάμενον, ϲῶϲαι καὶ ἀπολέϲαι, καὶ τηρεῖτε τὰς ἐντολὰς ταύτας, καὶ ζήσεσθε τῷ Θεῷ. 4. λέγω αὐτῷ· Κύριε, νῦν ἐνεδυναμώθην ἐν πᾶσι τοῖς δικαιώμασι τοῦ Κυρίου, ὅτι σὺ μετ' ἐμοῦ εἶ· καὶ οἶδα ὅτι συγκόψεις τὴν δύναμιν τοῦ διαβόλου πᾶσαν, καὶ ἡμεῖς αὐτοῦ κατακυριεύσομεν καὶ κατισχύσομεν πάντων τῶν ἔργων αὐτοῦ. καὶ ἐλπίζω, κύριε, δύνασθαί με νῦν τὰς ἐντολὰς ταύτας, ἃς ἐντέταλσαι, τοῦ Κυρίου ἐνδυναμοῦντος φυλάξαι. 5. Φυλάξεις,
    φησίν, ἐὰν ἡ κάμψαι εἰς τὴν ἰδίαν πόλιν. 3. ἄφρον καὶ δίψυχε καὶ ταλαίπωρε ἄνθρωπε, οὐ νοεῖς ὅτι ταῦτα πάντα ἀλλότριά ἐστι, καὶ ὑπ᾽ ἐξουσίαν ἑτέρου εἰσίν; ἐρεῖ γὰρ ὁ κύριος τῆς πόλεως ταύτης· Οὐ θέλω σε κατοικεῖν εἰς τὴν πόλιν μου, ἀλλ᾽ ἔξελθε ἐκ τῆς πόλεως ταύτης, ὅτι τοῖς νόμοις μου οὐ χρᾶσαι. 4. σὺ οὖν ἔχων ἀγροὺς καὶ οἰκήσεις καὶ ἑτέρας ὑπάρξεις πολλάς, ἐκβαλλόμενος ὑπ᾽ αὐτοῦ τί ποιήσεις σου τὸν ἀγρὸν καὶ τὴν οἰκίαν καὶ τὰ λοιπὰ ὅσα ἡτοίμασας σεαυτῷ; λέγει γάρ σοι δικαίως ὁ κύριος τῆς χώρας ταύτης· Ἢ τοῖς νόμοις μου χρῶ, ἢ ἐκχώρει ἐκ τῆς χώρας μου. 5. σὺ οὖν τί μέλλεις ποιεῖν, ἔχων νό
