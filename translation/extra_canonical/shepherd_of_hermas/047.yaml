theological_decisions:
- issue: Repentance and return (ἐπιστρέφω)
  chosen_reading: Render as “turn back to the Lord with your whole heart.”
  alternative_readings:
  - repent to the Lord
  - be converted to the Lord
  rationale: Hermas emphasizes moral reorientation and ongoing obedience, not only cognitive change or a technical conversion term. ‘Turn back’ reflects volition and relational return.
- issue: Healing vs. forgiveness (ἴασις)
  chosen_reading: “He will make healing for your former transgressions.”
  alternative_readings:
  - He will forgive your former sins
  - He will grant remission of your past sins
  rationale: Hermas’s moral-struggle discourse frequently uses therapeutic metaphors for sin; preserving ‘healing’ maintains that texture without denying the judicial aspect implied by ‘transgressions.’
- issue: Devil terminology (διάβολος) and cosmic conflict
  chosen_reading: Translate διάβολος as “devil,” preserve the vivid image of impotence “like the sinews of a dead man.”
  alternative_readings:
  - accuser
  - slanderer
  rationale: In Hermas, διάβολος functions as the personal adversary. The image underscores the contrast between God’s power and the devil’s threats, fitting the paraenetic aim.
- issue: Dative of reference in “you will live to God”
  chosen_reading: Retain the literal idiom “live to God.”
  alternative_readings:
  - live for God
  rationale: Hermas’s register often mirrors early Christian idiom; rendering the dative preserves that feel and leaves interpretive space for readers.
- issue: Identity of “Lord” in dialogue
  chosen_reading: Render both occurrences as “Lord,” leaving the referential tension in place (“Lord” addressed, and “with the Lord strengthening me”).
  alternative_readings:
  - Differentiate as ‘master’ for the speaker and ‘Lord’ for God
  rationale: Hermas’s visions often blur angelic agency and divine commission; preserving the lexical sameness reflects that ancient texture rather than resolving it for modern readers.
- issue: Conditional clause on turning to one’s own city
  chosen_reading: “You will keep them … if the turning is toward your own city.”
  alternative_readings:
  - if you do not turn aside to your own city
  - if you turn aside to your own city
  rationale: 'The transmitted Greek is irregular; the ensuing parable clarifies the sense: one must orient toward one’s true city (God’s realm) rather than invest in the foreign city (this world). The chosen rendering keeps the metaphor’s direction without over-fixing the Greek.'
