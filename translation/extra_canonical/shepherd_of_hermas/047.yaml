translation:
  text: '…to establish them in the faith.


    Therefore, believe God—you who, on account of your sins, have despaired of your life, and are adding sin to sin, and are burdening your life—that if you turn back to the Lord with your whole heart and work righteousness for the remaining days of your life, and serve him rightly according to his will, he will make healing for your former transgressions[b], and you will have power to gain mastery over the works of the devil. And do not at all fear the devil’s threat; for he is strengthless, like the sinews of a dead man[c].


    Listen to me, then, and fear the One who is able to do all things, to save and to destroy[d]; and keep these commandments, and you will live to God.


    I say to him, “Lord, now I have been strengthened in all the righteous requirements of the Lord, because you are with me; and I know that you will cut off all the devil’s power, and we shall gain mastery over him and prevail against all his works. And I hope, Lord, that now I can keep these commandments you have commanded, with the Lord strengthening me.”


    “You will keep them,” he says, “if the turning is toward your own city[a].


    Foolish, double‑minded, and wretched man, do you not understand that all these things are alien, and are under the authority of another? For the lord of this city will say, ‘I do not want you to dwell in my city; rather, go out from this city, because you do not make use of my laws.’ So then, you—having fields and dwellings and many other possessions—when you are cast out by him, what will you do with your field and your house, and the rest of the things you have prepared for yourself? For the lord of this land says to you, rightly, ‘Either make use of my laws, or withdraw from my land.’ So then, what are you about to do, having…[e]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek reads irregularly, “if the turning (ἡ κάμψαι) is to your own city.” Many editors suspect a scribal lapse (e.g., τό for ἡ, or an omitted μή). The parable that follows supports the sense of orienting toward one’s true city.
    reason: textual_variant
  - marker: b
    text: Greek ἴασιν can mean healing or cure. Some translations smooth to “forgiveness/remission,” but Hermas’s moral-therapeutic imagery is likely intentional.
    reason: lexical_alternative
  - marker: c
    text: In antiquity sinews were a metaphor for strength. Saying the devil is like the sinews of a dead man underscores utter powerlessness.
    reason: cultural_note
  - marker: d
    text: This phrasing echoes early Christian speech about God as the one able to save and to destroy (cf. echoes in James 4:12; Matt 10:28), though Hermas is not directly quoting.
    reason: cross_reference
  - marker: e
    text: The Greek text in this source slice breaks off mid-sentence here (“So then, what are you about to do, having…”); the unit continues in the next segment.
    reason: textual_variant
  - marker: f
    text: Or 'believe in God—you who, on account of your sins, have despaired of your life, and are adding sin to sin, and are burdening your life—for if you turn back'.
    reason: previous_rendering
lexical_decisions:
- source_word: πιστεύσατε
  chosen: believe
  alternatives:
  - trust
  lexicon: BDAG
  rationale: Plain imperative sense fits Hermas’s paraenetic tone; kept as core Christian term.
- source_word: ἀπεγνωκότες
  chosen: have despaired
  alternatives:
  - have given up hope
  lexicon: BDAG
  rationale: Captures the strong sense of abandoning hope; keeps the moral urgency.
- source_word: προστιθέντες ἁμαρτίαις
  chosen: adding sin to sin
  alternatives:
  - piling up sins
  - adding to your sins
  lexicon: BDAG
  rationale: Idiomatic Semitic-like expression retained to show cumulative guilt.
- source_word: καταβαρύνοντες
  chosen: burdening
  alternatives:
  - weighing down
  - making heavy
  lexicon: LSJ
  rationale: Metaphor of loading down one’s life with guilt; concise and vivid.
- source_word: ἐπιστραφῆτε
  chosen: turn back
  alternatives:
  - return
  - be converted
  lexicon: BDAG
  rationale: Maintains active, volitional reorientation without importing later technical ‘convert’ language.
- source_word: ἐργάσησθε τὴν δικαιοσύνην
  chosen: work righteousness
  alternatives:
  - practice righteousness
  - do justice
  lexicon: BDAG
  rationale: Hebraic/LXX idiom preserved; keeps moral-activity emphasis.
- source_word: τὰς λοιπὰς ἡμέρας
  chosen: the remaining days
  alternatives:
  - the rest of the days
  lexicon: BDAG
  rationale: Natural English while preserving the temporal limit.
- source_word: δουλεύσητε
  chosen: serve
  alternatives:
  - be slaves to
  - be in bondage to
  lexicon: BDAG
  rationale: Context stresses faithful service to God rather than status; ‘serve’ reads naturally without muting seriousness.
- source_word: ὀρθῶς
  chosen: rightly
  alternatives:
  - uprightly
  - properly
  lexicon: BDAG
  rationale: Short, clear adverb retaining moral straightness connotation.
- source_word: τὸ θέλημα
  chosen: will
  alternatives:
  - desire
  - purpose
  lexicon: BDAG
  rationale: Standard rendering fits divine volition in paraenetic context.
- source_word: ἴασιν
  chosen: healing
  alternatives:
  - remission
  - forgiveness
  lexicon: BDAG
  rationale: Hermas often uses moral-therapeutic imagery; ‘healing’ preserves that rather than collapsing into juridical ‘forgive.’
- source_word: προτέροις ἁμαρτήμασι
  chosen: former transgressions
  alternatives:
  - past sins
  lexicon: BDAG
  rationale: Transgression highlights moral breach; ‘former’ tracks temporal contrast.
- source_word: κατακυριεῦσαι
  chosen: gain mastery over
  alternatives:
  - have dominion over
  - lord it over
  lexicon: BDAG
  rationale: Dynamic but faithful; avoids negative connotations of ‘lord it over’ while keeping dominion nuance.
- source_word: ἀπειλή
  chosen: threat
  alternatives:
  - menace
  lexicon: BDAG
  rationale: Straightforward rendering; suits contrast with God’s true power.
- source_word: ἄτονος
  chosen: strengthless
  alternatives:
  - powerless
  - feeble
  lexicon: LSJ
  rationale: Conveys lack of force; pairs naturally with the sinew image.
- source_word: νεῦρα
  chosen: sinews
  alternatives:
  - tendons
  - nerves
  lexicon: LSJ
  rationale: Ancient physiological imagery; ‘sinews’ conveys strength-cords better than modern ‘nerves.’
- source_word: φοβήθητε
  chosen: fear
  alternatives:
  - be afraid of
  lexicon: BDAG
  rationale: Moral-religious reverence in context; retains imperative weight.
- source_word: τὸν πάντα δυνάμενον … σῶσαι καὶ ἀπολέσαι
  chosen: the One who is able to save and to destroy
  alternatives:
  - the all-powerful One, to save and to destroy
  lexicon: BDAG
  rationale: Captures relative clause force and the twofold capacity without over-interpretation.
- source_word: τηρεῖτε τὰς ἐντολὰς
  chosen: keep these commandments
  alternatives:
  - observe these commands
  lexicon: BDAG
  rationale: Common biblical idiom retained; ‘keep’ fits Hermas’s moral rigor.
- source_word: ζήσεσθε τῷ Θεῷ
  chosen: you will live to God
  alternatives:
  - you will live for God
  lexicon: BDAG
  rationale: ‘To God’ keeps the Pauline-like dative of reference without smoothing.
- source_word: δικαιώματα
  chosen: righteous requirements
  alternatives:
  - statutes
  - ordinances
  lexicon: BDAG
  rationale: Balances LXX legal sense and moral character; avoids overly legal ‘statutes.’
- source_word: συγκόψεις
  chosen: cut off
  alternatives:
  - bring to nothing
  - crush
  lexicon: LSJ
  rationale: Violent image of severing power; compact English.
- source_word: κατισχύσομεν
  chosen: prevail against
  alternatives:
  - overpower
  - be strong over
  lexicon: BDAG
  rationale: Active victory nuance maintained.
- source_word: ἐντέταλσαι
  chosen: have commanded
  alternatives:
  - have ordered
  - have enjoined
  lexicon: BDAG
  rationale: Standard English for divine commands; keeps second-person address.
- source_word: ἐνδυναμοῦντος
  chosen: strengthening
  alternatives:
  - empowering
  lexicon: BDAG
  rationale: Genitive absolute preserved with natural English participle.
- source_word: κάμψαι (ἡ … εἰς τὴν ἰδίαν πόλιν)
  chosen: turning
  alternatives:
  - bending
  - turning back
  lexicon: LSJ
  rationale: Context favors orientation toward one’s true homeland; see footnote on textual uncertainty.
- source_word: ἰδία πόλις
  chosen: your own city
  alternatives:
  - your native city
  - your homeland
  lexicon: BDAG
  rationale: Keeps the city metaphor tight for the ensuing similitude.
- source_word: ἀλλότρια
  chosen: alien
  alternatives:
  - belonging to another
  - foreign
  lexicon: BDAG
  rationale: Highlights non-ownership; sets up contrast with ‘lord of this city.’
- source_word: ὑπ᾽ ἐξουσίαν ἑτέρου
  chosen: under the authority of another
  alternatives:
  - under someone else’s authority
  lexicon: BDAG
  rationale: Formal but clear; preserves juridical nuance.
- source_word: χρᾶσαι (τοῖς νόμοις)
  chosen: make use of
  alternatives:
  - practice
  - follow
  lexicon: BDAG
  rationale: Literal ‘use’ retained to keep the foreign-city legal metaphor concrete.
- source_word: ἐκβαλλόμενος
  chosen: being cast out
  alternatives:
  - being expelled
  lexicon: BDAG
  rationale: Evokes forceful removal by city’s lord.
- source_word: ὑπάρξεις
  chosen: possessions
  alternatives:
  - property
  - assets
  lexicon: BDAG
  rationale: Common term for material holdings; suits the parable’s list.
- source_word: οἰκήσεις
  chosen: dwellings
  alternatives:
  - residences
  - lodgings
  lexicon: LSJ
  rationale: Differentiates from οἰκία (house) later in the sentence; plural sense kept.
- source_word: χώρα / πόλις
  chosen: land / city
  alternatives:
  - country / city-state
  lexicon: BDAG
  rationale: Maintains contrast between broader territory and the city proper in the parable.
