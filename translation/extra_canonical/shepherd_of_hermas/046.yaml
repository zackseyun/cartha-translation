theological_decisions:
- issue: Identity and role of the 'angel of repentance'
  chosen_reading: Render as an angelic title and personified heavenly helper, not
    a generic messenger.
  alternative_readings:
  - Treat as generic 'messenger' without angelological force
  rationale: Within Hermas the figure who instructs Hermas is consistently portrayed
    as a heavenly being entrusted with guiding penitents. Translating as 'angel' aligns
    with the work’s internal angelology and preserves the conceptual world of early
    Roman Christianity.
- issue: Nature of metanoia in Hermas
  chosen_reading: Translate metanoia as 'repentance' rather than 'change of mind'
    in this context.
  alternative_readings:
  - Translate as 'change of mind' to emphasize cognitive aspect
  rationale: In Hermas, repentance is a concrete moral and ecclesial turning marked
    by confession and amendment of life, not merely cognitive reorientation. Retaining
    'repentance' fits the title 'angel of repentance' and the paraenetic thrust.
- issue: Personal evil vs. abstract vice in 'the devil'
  chosen_reading: Render διάβολος as the personal 'devil'.
  alternative_readings:
  - Render as 'accuser/slanderer' to emphasize etymology
  rationale: Hermas speaks of the devil as an opposing power who seeks to instill
    fear; the personal rendering preserves the early Christian demonological framework
    operative here.
