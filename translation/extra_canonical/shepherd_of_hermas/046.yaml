  text: Ἐγὼ δὲ ὑμῖν λέγω, ὁ ἄγγελος τῆς μετανοίας· μὴ φοβήθητε τὸν διάβολον. ἀπεστάλην
    γάρ, φησί, μεθ' ὑμῶν εἶναι τῶν μετανοούντων ἐξ ὅλης καρδίας αὐτῶν καὶ ἰσχυρο-
  language: Greek
