translation:
  text: 'But I, the angel of repentance[a], say to you: do not be afraid of the devil.
    For I was sent," he says, "to be with you—those who are repenting with all their
    heart."[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In Hermas, the 'angel of repentance' is the heavenly guide who instructs
      Hermas and aids those turning back to God. The phrase reflects the work’s angelology
      rather than a purely metaphorical 'spirit of repentance.'
    reason: cultural_note
  - marker: b
    text: The Greek line available to us breaks at ἰσχυρο- and continues in full editions;
      this draft reflects the extant portion supplied here.
    reason: textual_variant
lexical_decisions:
- source_word: ὁ ἄγγελος τῆς μετανοίας
  chosen: the angel of repentance
  alternatives:
  - the messenger of repentance
  lexicon: BDAG
  rationale: In Hermas this is a supernatural figure who instructs and guards penitents,
    not merely a human envoy. "Angel" preserves the celestial character and established
    Hermas usage; "messenger" would downplay the angelological nuance.
- source_word: μετάνοια / μετανοέω (μετανοούντων)
  chosen: repentance / those who are repenting
  alternatives:
  - change of mind / those changing their mind
  - penitence / penitents
  lexicon: BDAG
  rationale: Hermas uses metanoia as a moral-spiritual turn back to God, often personified
    and institutional (there is an angel of repentance). Retaining "repentance" and
    the participial "those who are repenting" keeps the paraenetic weight and continuity
    with the title.
- source_word: μὴ φοβήθητε
  chosen: do not be afraid
  alternatives:
  - do not fear
  - do not be fearful
  lexicon: BDAG
  rationale: Imperative prohibition best rendered with clear, direct English. "Do
    not be afraid" is natural while preserving the exhortational tone. "Do not fear"
    is possible but slightly more archaic in register.
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the accuser
  - the slanderer
  lexicon: BDAG
  rationale: Hermas employs διάβολος as the personal adversary figure. "Devil" communicates
    this conventional referent in early Christian discourse; "accuser/slanderer" would
    over-literalize and potentially obscure the personal entity intended.
- source_word: ἀπεστάλην
  chosen: I was sent
  alternatives:
  - I have been sent
  lexicon: BDAG
  rationale: Aorist passive indicative in narrative speech. Simple past "I was sent"
    fits the context of commission; English present perfect is possible but less direct.
- source_word: μεθ' ὑμῶν εἶναι
  chosen: to be with you
  alternatives:
  - to be among you
  - to be beside you
  lexicon: LSJ
  rationale: Standard idiom with μετά + genitive meaning "with"; "to be with you"
    is the most straightforward rendering.
- source_word: ἐξ ὅλης καρδίας
  chosen: with all [their] heart
  alternatives:
  - from [their] whole heart
  - wholeheartedly
  lexicon: BDAG
  rationale: Hebraic/Septuagintal idiom carried into Christian Greek. "With all [their]
    heart" preserves the biblical register; "wholeheartedly" is acceptable but less
    transparent to the underlying imagery.
- source_word: φησί
  chosen: he says
  alternatives:
  - (omitted)
  - he is saying
  lexicon: LSJ
  rationale: Hermas frequently uses the parenthetic reporting formula φησί in direct
    discourse. Retaining "he says" in dashes signals the stylistic feature without
    interrupting readability.
