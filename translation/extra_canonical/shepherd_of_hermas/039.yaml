  text: 1 Ἔνδυσαι οὖν τὴν ἱλαρότητα, τὴν πάντοτε ἔχουσαν χάριν παρὰ τῷ θεῷ καὶ εὐπρόσδεκτον
    οὖσαν αὐτῷ, καὶ ἐντρύφα ἐν αὐτῇ. πᾶς γὰρ ἱλαρὸς ἀνὴρ ἀγαθὰ ἐργάζεται καὶ ἀγαθὰ
    φρονεῖ καὶ καταφρονεῖ τῆς λύπης. 2 ὁ δὲ λυπηρὸς ἀνὴρ πάντοτε πονηρεύεται· πρῶτον
    μὲν πονηρεύεται, ὅτι λυπεῖ τὸ πνεῦμα τὸ ἅγιον τὸ δοθὲν τῷ ἀνθρώπῳ ἱλαρὸν· δεύτερον
    δὲ λυπῶν τὸ πνεῦμα τὸ ἅγιον ἀνομίαν ἐργάζεται, μὴ ἐντυγχάνων μηδὲ ἐξομολογούμενος
    τῷ κυρίῳ. πάντοτε γὰρ λυπηροῦ ἀνδρὸς ἡ ἔντευξις οὐκ ἔχει δύναμιν τοῦ ἀναβῆναι
    ἐπὶ τὸ θυσιαστήριον τοῦ θεοῦ. 3 Διατί, φημί, οὐκ ἀναβαίνει ἐπὶ τὸ θυσιαστήριον
    ἡ ἔντευξις τοῦ λυπουμένου; Ὅτι, φησίν, ἡ λύπη ἐγκάθηται εἰς τὴν καρδίαν αὐτοῦ.
    μεμιγμένη οὖν ἡ λύπη μετὰ τῆς ἐντεύξεως οὐκ ἀφίησι τὴν ἔντευξιν ἀναβῆναι καθαρὰν
    ἐπὶ τὸ θυσιαστήριον. ὥσπερ γὰρ ὄξος καὶ οἶνος μεμιγμένα ἐπὶ [1] τὸ αὐτὸ τὴν αὐτὴν
    ἡδονὴν οὐκ ἔχουσιν, οὕτω καὶ ἡ λύπη μεμιγμένη μετὰ τοῦ ἁγίου πνεύματος τὴν αὐτὴν
    ἔντευξιν οὐκ ἔχει. 4 καθάρισον οὖν σεαυτὸν ἀπὸ τῆς λύπης τῆς πονηρᾶς ταύτης, καὶ
    ζήσῃ τῷ θεῷ· καὶ πάντες ζήσονται τῷ θεῷ, ὅσοι ἄν ἀποβάλωσιν ἀφ᾿ ἑαυτῶν τὴν λύπην
    καὶ ἐνδύσωνται πᾶσαν ἱλαρότητα.
