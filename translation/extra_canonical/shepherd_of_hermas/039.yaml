translation:
  text: 'Clothe yourself, then, with cheerfulness, which always has favor with God
    and is welcome to him, and delight yourself in it. For every cheerful man does
    good, thinks what is good, and despises sorrow.


    But the sorrowful man always acts wickedly: first, he acts wickedly because he
    grieves the Holy Spirit that was given to the human being—a cheerful Spirit[c];
    second, by grieving the Holy Spirit he works lawlessness, neither praying nor
    confessing to the Lord[b]. For the prayer of a sorrowful man never has power to
    ascend to the altar of God.


    “Why,” I ask, “does the prayer of the one who is sorrowing not ascend to the altar?”
    “Because,” he says, “sorrow has settled into his heart. So, mixed together with
    the prayer, sorrow does not allow the prayer to go up pure to the altar. For just
    as vinegar and wine, mixed together in one—together[a]—do not have the same pleasure,
    so also sorrow, mixed with the Holy Spirit, does not produce the same prayer.”


    Cleanse yourself, then, from this evil sorrow, and you will live to God[d]; and
    all will live to God, as many as throw off sorrow from themselves and clothe themselves
    with all cheerfulness.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek idiom ἐπὶ τὸ αὐτό: “together, in one (place/vessel).” Literally,
      “to the same [place].”'
    reason: lexical_alternative
  - marker: b
    text: The word for “prayer” here is ἔντευξις, a petitionary approach; the verb
      ἐντυγχάνω (“to make petition”) occurs in the same sentence.
    reason: lexical_alternative
  - marker: c
    text: The phrase describes the Holy Spirit as cheerful, in contrast to the sorrow
      that grieves him (cf. the thematic contrast throughout this mandate).
    reason: cultural_note
  - marker: d
    text: “Live to God” renders the dative (τῷ θεῷ) literally; many would say “live
      for God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔνδυσαι
  chosen: clothe yourself
  alternatives:
  - put on
  - wear
  lexicon: BDAG; LSJ
  rationale: Retains the clothing metaphor of the imperative middle voice, echoing
    the original's concrete imagery of adopting a disposition as a garment.
- source_word: ἱλαρότητα / ἱλαρός
  chosen: cheerfulness / cheerful
  alternatives:
  - gladness
  - joyfulness
  - merriness
  lexicon: LSJ; BDAG
  rationale: ἱλαρός/ἱλαρότης denotes a bright, cheerful disposition. "Cheerfulness"
    keeps moral-psychological tone and contrasts naturally with λύπη (sorrow).
- source_word: χάριν
  chosen: favor
  alternatives:
  - grace
  - kindness
  lexicon: BDAG
  rationale: In this context, χάρις is the standing or favor one has with God; "favor"
    is clearer than theological "grace" and fits Hermas's moral register.
- source_word: εὐπρόσδεκτον
  chosen: welcome
  alternatives:
  - acceptable
  - well-pleasing
  lexicon: BDAG
  rationale: Conveys receptivity by God without importing Pauline idiom of "well-pleasing";
    "welcome" is idiomatic and keeps relational nuance.
- source_word: ἐντρύφα
  chosen: delight yourself
  alternatives:
  - revel
  - luxuriate
  - take pleasure
  lexicon: LSJ
  rationale: Middle imperative calls for relishing; "delight yourself" avoids negative
    connotations of "revel" while preserving intensity.
- source_word: ἀγαθὰ ἐργάζεται
  chosen: does good
  alternatives:
  - works good
  - does good deeds
  lexicon: BDAG
  rationale: Simple and idiomatic; keeps verbal aspect of active practice without
    adding "deeds" not in the text.
- source_word: ἀγαθὰ φρονεῖ
  chosen: thinks what is good
  alternatives:
  - sets his mind on good
  - has good thoughts
  lexicon: BDAG
  rationale: φρονείν concerns mindset/consideration; "thinks what is good" keeps the
    ethical-cognitive force.
- source_word: λύπη / λυπηρὸς
  chosen: sorrow / sorrowful
  alternatives:
  - grief / grievous
  - gloom / gloomy
  lexicon: BDAG
  rationale: Maintains moralized sorrow that contrasts with cheerfulness in this mandate;
    "gloom" risks modern moodiness rather than moral weight.
- source_word: πονηρεύεται
  chosen: acts wickedly
  alternatives:
  - does evil
  - behaves badly
  lexicon: BDAG
  rationale: Ponēreuomai denotes practicing evil; "acts wickedly" preserves moral
    gravity.
- source_word: λυπεῖ
  chosen: grieves
  alternatives:
  - distresses
  - makes sorrowful
  lexicon: BDAG
  rationale: Semantically precise for causing grief to the Spirit; also echoes the
    text's play on λύπη without importing foreign idiom.
- source_word: τὸ πνεῦμα τὸ ἅγιον … ἱλαρόν
  chosen: the Holy Spirit … a cheerful [Spirit]
  alternatives:
  - the holy spirit … cheerful (modifying the gift)
  - the holy spirit given to man in cheerfulness
  lexicon: BDAG; LSJ
  rationale: Attributive string most naturally has ἱλαρόν modify πνεῦμα; supplying
    "Spirit" makes English clear that cheerfulness characterizes the Spirit.
- source_word: ἀνομίαν ἐργάζεται
  chosen: works lawlessness
  alternatives:
  - does lawlessness
  - commits wrongdoing
  lexicon: BDAG
  rationale: Keeps the strong biblical-ethical term ἀνομία without dilution, matching
    Hermas's moral diction.
- source_word: μὴ ἐντυγχάνων
  chosen: not praying
  alternatives:
  - not making petition
  - not interceding
  lexicon: BDAG
  rationale: Given the repeated ἔντευξις, using the general term "praying" communicates
    the act succinctly; context is petitionary prayer.
- source_word: ἐξομολογούμενος
  chosen: confessing
  alternatives:
  - acknowledging (sins)
  - giving thanks
  lexicon: BDAG
  rationale: In this moral context with the Lord as object, "confessing" (sins) is
    the natural sense.
- source_word: ἔντευξις
  chosen: prayer
  alternatives:
  - petition
  - supplication
  - intercession
  lexicon: BDAG
  rationale: While technically a petition, in early Christian usage it overlaps with
    prayer; "prayer" is accessible and matches the altar/ascend imagery.
- source_word: ἀναβῆναι ἐπὶ τὸ θυσιαστήριον
  chosen: to ascend to the altar
  alternatives:
  - to go up to the altar
  - to reach the altar
  lexicon: BDAG
  rationale: '"Ascend" preserves cultic register and the vertical imagery of prayers
    rising to God''s altar.'
- source_word: ἐγκάθηται εἰς τὴν καρδίαν
  chosen: has settled into his heart
  alternatives:
  - sits within his heart
  - lurks in his heart
  lexicon: LSJ
  rationale: Conveys the entrenched, seated presence of sorrow within the heart; "settled"
    is idiomatic.
- source_word: μεμιγμένα / μεμιγμένη
  chosen: mixed
  alternatives:
  - mingled
  lexicon: BDAG
  rationale: Neutral, clear rendering of the perfect passive of μίγνυμι.
- source_word: ἡδονή
  chosen: pleasure
  alternatives:
  - pleasantness
  - enjoyment
  lexicon: BDAG; LSJ
  rationale: Refers to gustatory enjoyment in the analogy; "pleasure" is direct.
- source_word: ζήσῃ/ζήσονται τῷ θεῷ
  chosen: live to God
  alternatives:
  - live for God
  - live before God
  lexicon: BDAG
  rationale: Retains the dative construction familiar in early Christian idiom without
    smoothing it; Hermas uses this phrasing elsewhere.
- source_word: ἀποβάλωσιν ἀφ᾿ ἑαυτῶν
  chosen: throw off from themselves
  alternatives:
  - cast off from themselves
  - put away from themselves
  lexicon: BDAG
  rationale: Dynamic but literal; preserves reflexive sense and vigor.
- source_word: ἐνδύσωνται πᾶσαν ἱλαρότητα
  chosen: clothe themselves with all cheerfulness
  alternatives:
  - put on every kind of cheerfulness
  - put on full cheerfulness
  lexicon: BDAG; LSJ
  rationale: Echoes the initial clothing metaphor and keeps the intensifier πᾶσαν
    as "all."
