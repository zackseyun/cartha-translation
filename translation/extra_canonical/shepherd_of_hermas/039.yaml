theological_decisions:
- issue: Attribution of ἱλαρόν to the Holy Spirit
  chosen_reading: 'Render ἱλαρόν as modifying "the Holy Spirit": "the Holy Spirit
    … a cheerful Spirit."'
  alternative_readings:
  - Treat ἱλαρόν as describing the manner of the gift (given cheerfully)
  - Take "spirit" as the human spirit rather than the Holy Spirit
  rationale: The attributive string τὸ πνεῦμα τὸ ἅγιον … ἱλαρόν most naturally makes
    ἱλαρόν an adjective of πνεῦμα. The article-noun-article-adjective pattern supports
    this, and the contrast with λύπη highlights the Spirit’s disposition as cheerful.
- issue: Rendering ἔντευξις and maintaining altar imagery
  chosen_reading: Translate ἔντευξις as "prayer" and retain "ascend to the altar of
    God."
  alternative_readings:
  - Translate ἔντευξις as "petition" or "intercession"
  - Paraphrase the image as "be accepted by God"
  rationale: Hermas uses sacrificial-cultic imagery for prayer. "Prayer" is broad
    enough for readers, and keeping "altar" preserves the envisioned liturgical ascent
    without flattening.
- issue: Moral status of sorrow
  chosen_reading: 'Translate λύπη with the qualifier "evil" as in the text: "this
    evil sorrow."'
  alternative_readings:
  - Render simply "sorrow" without moral qualifier
  - Interpret as natural grief
  rationale: The text explicitly says τῆς λύπης τῆς πονηρᾶς. The mandate contrasts
    virtuous cheerfulness with a culpable sorrow that resists prayer and confession.
- issue: Dative construction in "live to God"
  chosen_reading: Keep "live to God" rather than smoothing to "for God."
  alternative_readings:
  - Live for God
  - Live before God
  - Live with God
  rationale: The dative with ζάω is a recognizable early Christian idiom; preserving
    it maintains Hermas’s voice and allows readers to feel the literal construction.
- issue: Dialogic markers φημί/φησίν
  chosen_reading: Retain “I ask… he says…” to preserve the catechetical-dialogue texture.
  alternative_readings:
  - Omit the markers and narrate in third person prose
  rationale: The Mandates often include brief question-and-answer exchanges; keeping
    them preserves genre and rhetorical rhythm.
- issue: Meaning of "does not have the same prayer"
  chosen_reading: Render dynamically as "does not produce the same prayer" to convey
    that the mixture alters the character/acceptability of the prayer.
  alternative_readings:
  - Translate strictly as "does not have the same prayer"
  - Interpret as "does not have the same acceptance"
  rationale: The literal phrasing can be opaque in English. "Produce" clarifies the
    effect of mixture while staying close to the Greek structure.
