theological_decisions:
- issue: Rendering of κύριος (Kyrios)
  chosen_reading: the Lord
  alternative_readings:
  - Master
  rationale: Maintains early Christian confessional register without over-specifying
    referent (God vs. the Lord Jesus). Hermas often uses 'the Lord' in a general theistic
    sense.
  doctrine_reference: 'Translation philosophy: Titles — Kyrios → Lord'
- issue: δικαιοσύνη semantic range
  chosen_reading: righteousness (main text)
  alternative_readings:
  - justice
  rationale: Hermas emphasizes personal and communal moral rectitude; 'righteousness'
    best captures this. 'Justice' is noted as an alternative in footnotes for readers
    aware of the broader semantic range.
  doctrine_reference: Doctrine.md — Contested terms table
- issue: Capitalization of 'the Name'
  chosen_reading: the Name (capitalized)
  alternative_readings:
  - the name (lowercase)
  rationale: Early Christian usage treats 'the Name' as a reverential shorthand for
    the divine/Jesus’ name; capitalization signals idiomatic status without adding
    words.
- issue: πρεσβυτέρους as 'elders'
  chosen_reading: elders
  alternative_readings:
  - older men
  rationale: Given Hermas’s Roman church context where presbyters existed, 'elders'
    preserves potential ecclesial reference and the honor dynamic implied by seating.
- issue: ἁπλότης as 'simplicity'
  chosen_reading: simplicity
  alternative_readings:
  - sincerity
  - singleness of heart
  rationale: Hermas contrasts simplicity with double-mindedness elsewhere; 'simplicity'
    keeps his ascetical-ethical category intact.
review_passes:
- reviewer_model: gemini-3.1-pro-preview
  timestamp: '2026-04-22T17:18:02Z'
  prompt_sha256: a62f58794dc497fd1cf2b626848cfc88536490780008979891a7808c262d3a40
  agreement_score: 0.88
  verdict: major-issues
  summary: The draft is generally excellent and captures the narrative and moral tone
    well. However, there is a grammatical misstep in verse 6 regarding 'all your sins',
    and a mistranslation in verse 9 where an imperative is rendered as a future indicative
    and a causal conjunction is rendered as a conditional.
  issues_found:
  - In verse 6, 'πάντα' is neuter plural ('all things' or adverbial 'constantly'),
    not feminine plural modifying 'ἁμαρτιῶν'. The draft translates it as if it were
    'πασῶν τῶν ἁμαρτιῶν' ('all your sins'). It should be 'asking all these things
    about your sins' or 'constantly asking about your sins'.
  - In verse 9, 'ὡς ἐμμένεις' uses 'ὡς' with the indicative, meaning 'as' or 'since',
    not 'if'. Furthermore, 'μενὸν' is an OCR error in the source text for the aorist
    imperative 'μεῖνον' ('remain!' or 'continue!'), not a future indicative. The text
    means 'But since you remain in your simplicity, continue in it, and you will sit
    with them'.
