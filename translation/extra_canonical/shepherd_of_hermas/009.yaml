  text: 1. ἣν εἶδον, ἀδελφοί, τοιαύτη. 2. νηστεύσας πολλάκις καὶ δεηθείς τοῦ Κυρίου
    ἵνα μοι φανερώσῃ τὴν ἀποκάλυψιν ἣν μοι ἐπηγγείλατο δεῖξαι διὰ τῆς πρεσβυτέρας
    ἐκείνης, αὐτῇ τῇ νυκτὶ ὤφθη μοι ἡ πρεσβυτέρα καὶ εἶπέν μοι· Ἐπεὶ οὕτως ἐνδεὴς
    εἶ καὶ σπουδαῖος εἰς τὸ γνῶναι πάντα, ἐλθὲ εἰς τὸν ἀγρὸν ὅπου χρονίζεις, καὶ περὶ
    ὥραν πέμπτην ἐμφανισθήσομαί σοι καὶ δείξω σοι ἃ δεῖ σε ἰδεῖν. 3. ἠρώτησα αὐτὴν
    λέγων· Κυρία, εἰς ποῖον τόπον τοῦ ἀγροῦ; Ὅπου, φησίν, θέλεις. ἐξελεξάμην τόπον
    καλὸν ἀνακεχωρηκότα. πρὶν δὲ λαλῆσαι αὐτῇ καὶ εἰπεῖν τὸν τόπον, λέγει μοι· Ἥξω
    ἐκεῖ ὅπου θέλεις. 4. ἐγενόμην οὖν, ἀδελφοί, εἰς τὸν ἀγρόν, καὶ συνεψήφισα τὰς
    ὥρας, καὶ ἦλθον εἰς τὸν τόπον ὅπου διεταξάμην αὐτὴν ἐλθεῖν, καὶ βλέπω συμπέλιον
    κείμενον ἐλεφάντινον, καὶ ἐπὶ τοῦ συμπελίου ἔκειτο κεβριδάριον λινόῦν, καὶ ἐπάνω
    λεντίον ἐξηπλωμένον λινόῦν καρπάσιον. 5. ἰδὼν ταῦτα κείμενα καὶ μηδένα ὄντα ἐν
    τῷ τόπῳ ἔκθαμβος ἐγενόμην, καὶ ὡσεί τρόμος με ἔλαβεν, καὶ αἱ τρίχες μου ὀρθαί·
    καὶ ὡσεί φρίκη μοι προσῆλθεν, μόνου μου ὄντος. ἐν ἐμαυτῷ οὖν γενόμενος καὶ μνησθεὶς
    τῆς δόξης τοῦ Θεοῦ καὶ λαβὼν θάρσος, θεὶς τὰ γόνατα ἐξωμολογούμην τῷ Κυρίῳ πάλιν
    τὰς ἁμαρτίας μου ὡς καὶ πρότερον. 6. ἡ δὲ ἦλθεν μετὰ νεανίσκων ἕξ, οὓς καὶ πρότερον
    ἑωράκειν, καὶ ἐπεστάθη μοι καὶ κατηκροᾶτο προσευχομένου μου καὶ ἐξομολογουμένου
    τῷ Κυρίῳ τὰς ἁμαρτίας μου. καὶ ἁψαμένη μου λέγει· Ἑρμᾶ, παῦσαι περὶ τῶν ἁμαρτιῶν
    σου πάντα ἐρωτῶν· ἐρώτα καὶ περὶ δικαιοσύνης, ἵνα λάβῃς μέρος τι ἐξ αὐτῆς εἰς
    τὸν οἶκόν σου. 7. καὶ ἐξήγειρέ με τῆς χειρὸς καὶ ἄγει με πρὸς τὸ συμπέλιον, καὶ
    λέγει τοῖς νεανίσκοις· Ὑπάγετε καὶ οἰκοδομεῖτε. 8. καὶ μετὰ τὸ ἀναχωρῆσαι τοὺς
    νεανίσκους καὶ μόνων ἡμῶν γενομένων λέγει μοι· Κάθισον ὧδε. λέγω αὐτῇ· Κυρία,
    ἄφες τοὺς πρεσβυτέρους πρῶτον καθίσαι. Ὅ σοι λέγω, φησίν, κάθισον. 9. θέλοντος
    οὖν μου καθίσαι εἰς τὰ δεξιὰ μέρη οὐκ εἴασέν με, ἀλλ’ ἐνένευέ μοι τῇ χειρὶ ἵνα
    εἰς τὰ ἀριστερὰ μέρη καθίσω. διαλογιζομένου μου οὖν καὶ λυπουμένου ὅτι οὐκ εἴασέν
    με εἰς τὰ δεξιὰ μέρη καθίσαι, λέγει μοι· Λυπῇ, Ἑρμᾶ; ὁ εἰς τὰ δεξιὰ μέρη τόπος
    ἄλλων ἐστίν, τῶν ἤδη εὐαρεστηκότων τῷ θεῷ καὶ παθόντων εἵνεκα τοῦ ὀνόματος· σοὶ
    δὲ πολλὰ λείπει ἵνα μετ’ αὐτῶν καθίσῃς· ἀλλ’ ὡς ἐμμένεις τῇ ἁπλότητί σου, μενὸν,
    καὶ καθῇ μετ’ αὐτῶν, καὶ ὅσοι ἐὰν ἐργάσωνται τὰ ἐκείνων ἔργα καὶ ὑπενέγκωσιν ἃ
    καὶ ἐκεῖνοι ὑπήνεγκαν.
