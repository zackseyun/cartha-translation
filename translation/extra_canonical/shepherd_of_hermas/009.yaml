translation:
  text: 'The vision I saw, brothers, was like this.


    After fasting many times and pleading with the Lord to make known to me the revelation
    he had promised to show me through that aged woman, on that very night the aged
    woman appeared to me and said: “Since you are so needy and so eager to know everything,
    come to the field where you stay, and about the fifth hour I will appear to you
    and show you what you must see.”


    I asked her, saying, “Lady, to what place in the field?” “Wherever you wish,”
    she says. I chose a good, secluded spot. But before I spoke to her and named the
    place, she says to me, “I will come there where you wish.”


    So I went, brothers, into the field, and I counted the hours, and I came to the
    place where I had directed her to come; and I see an ivory couch set there, and
    upon the couch there lay a linen pillow, and on top a spread-out towel of fine
    linen.


    Seeing these things set there and no one in the place, I was astonished, and a
    tremor, as it were, seized me, and my hair stood on end; and a shudder, as it
    were, came upon me, since I was alone. Then, coming to myself and remembering
    the glory of God, and taking courage, I knelt and again confessed my sins to the
    Lord, as before.


    And she came with six young men—whom I had seen also before—and she stood by me
    and listened while I was praying and confessing my sins to the Lord. And touching
    me she says, “Hermas, stop asking everything about your sins; ask also about righteousness,
    so that you may receive some share of it for your household.”


    And she raised me by the hand and leads me to the couch, and she says to the young
    men, “Go and build.”


    And after the young men withdrew and we were alone, she says to me, “Sit here.”
    I say to her, “Lady, let the elders sit first.” “What I tell you,” she says, “sit.”


    So when I wanted to sit on the right side, she did not permit me, but motioned
    to me with her hand that I should sit on the left side. So as I reasoned and was
    grieved that she had not allowed me to sit on the right side, she says to me,
    “Are you grieved, Hermas? The place on the right side belongs to others—those
    who have already pleased God and suffered for the sake of the Name; but you lack
    many things to sit with them. But as you remain in your simplicity, remain, and
    you will sit with them, as will all who do their works and endure what they also
    endured.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: The fifth hour of the day is roughly mid-to-late morning (about 11 a.m.)
      in Roman reckoning.
    reason: cultural_note
  - marker: '2'
    text: The Greek address Kyria means “Lady,” a respectful form of address.
    reason: lexical_alternative
  - marker: '3'
    text: The term translated “seat” renders a rare Greek word (sympelion) for a piece
      of furniture; it may be a low bench or couch.
    reason: cultural_note
  - marker: '4'
    text: “Fine linen” translates karpasion (carbasus), a high-quality linen fabric.
    reason: cultural_note
  - marker: '5'
    text: “Righteousness” can also mean “justice,” depending on context.
    reason: lexical_alternative
  - marker: '6'
    text: “Household” translates oikos, which can mean a physical house or an extended
      household.
    reason: lexical_alternative
  - marker: '7'
    text: “Elders” (presbyteroi) may refer either to older men or to those holding
      an office of oversight in the community.
    reason: lexical_alternative
  - marker: '8'
    text: “For the sake of the Name” is an early Christian idiom for suffering on
      account of God’s/Jesus’ name (cf. Acts 5:41).
    reason: cross_reference
  - marker: a
    text: Or '“What I say to you—sit,” she says.'.
    reason: previous_rendering
  - marker: b
    text: Or 'but for you, many things are lacking for you to sit with them.'.
    reason: previous_rendering
  - marker: c
    text: Or 'stop asking all these things about your sins'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἣν εἶδον, ἀδελφοί
  chosen: The vision I saw, brothers
  alternatives:
  - brethren
  - brothers and sisters
  lexicon: BDAG
  rationale: ἣν refers back to ὅρασις (vision) from the heading; ἀδελφοί is the customary
    fraternal address in early Christian literature. We keep 'brothers' for historical
    texture; inclusive sense can be footnoted if needed.
- source_word: ἀποκάλυψιν
  chosen: revelation
  lexicon: BDAG
  rationale: Standard rendering for divine disclosure; preserves apocalyptic nuance
    without paraphrase.
- source_word: πρεσβυτέρας
  chosen: aged woman
  alternatives:
  - old woman
  - elder woman
  lexicon: LSJ
  rationale: πρεσβυτέρα here is the female figure already introduced in Visions 1–2;
    rendering as 'aged woman' preserves literal age connotation and avoids importing
    ecclesial office.
- source_word: Κυρία (vocative)
  chosen: Lady
  alternatives:
  - Madam
  lexicon: BDAG
  rationale: Κυρία as respectful address to a woman; 'Lady' maintains register and
    echoes the narrative's formal tone.
- source_word: χρονίζεις
  chosen: spend your time
  alternatives:
  - linger
  - stay long
  lexicon: LSJ
  rationale: Here denotes where he usually lingers; 'spend your time' is idiomatic
    without losing sense.
- source_word: ὥραν πέμπτην
  chosen: the fifth hour
  alternatives:
  - about eleven o’clock
  - late morning
  lexicon: BDAG
  rationale: We retain the ancient time reference; explanatory footnote gives modern
    equivalent.
- source_word: συνεψήφισα τὰς ὥρας
  chosen: I counted up the hours
  alternatives:
  - I reckoned the time
  - I kept count of the hours
  lexicon: LSJ
  rationale: Preserves concrete action of calculating the hours until the appointment.
- source_word: συμπέλιον
  chosen: seat
  alternatives:
  - bench
  - couch
  lexicon: LSJ
  rationale: Rare term likely indicating a low seat/bench; 'seat' is neutral. Footnote
    notes furniture uncertainty.
- source_word: ἐλεφάντινον
  chosen: ivory
  lexicon: LSJ
  rationale: Material descriptor; straightforward.
- source_word: κεβριδάριον
  chosen: cushion
  alternatives:
  - pillow
  - small cushion
  lexicon: LSJ
  rationale: Diminutive for a small pillow; 'cushion' conveys function without over-specifying
    size.
- source_word: λινόν / λεντίον
  chosen: linen … towel
  alternatives:
  - linen cloth
  - towel
  lexicon: BDAG
  rationale: λεντίον is a towel/cloth (cf. John 13); specifying 'towel' keeps concrete
    domestic sense.
- source_word: καρπάσιον
  chosen: fine linen
  alternatives:
  - carbasus (fine linen)
  lexicon: LSJ
  rationale: Refers to carbasus, fine linen; 'fine linen' communicates quality to
    modern readers.
- source_word: ἔκθαμβος
  chosen: astonished
  alternatives:
  - aghast
  - amazed
  lexicon: BDAG
  rationale: Captures sudden, unsettling amazement; context includes fear markers.
- source_word: θεὶς τὰ γόνατα
  chosen: I knelt
  alternatives:
  - having knelt down
  lexicon: BDAG
  rationale: Idiomatic English for the posture of prayer, preserving literal action.
- source_word: ἐξωμολογούμην
  chosen: confessed
  alternatives:
  - acknowledged
  - made confession
  lexicon: BDAG
  rationale: Cultic/moral term for open confession; 'confessed' keeps the penitential
    register.
- source_word: νεανίσκων
  chosen: young men
  alternatives:
  - youths
  lexicon: BDAG
  rationale: '''Young men'' reads naturally and is semantically precise.'
- source_word: ἐπεστάθη μοι
  chosen: she stood near me
  alternatives:
  - she stood over me
  - she came and stood by me
  lexicon: BDAG
  rationale: Locative nuance; 'near me' avoids a domineering connotation while keeping
    proximity.
- source_word: κατηκροᾶτο
  chosen: listened closely
  alternatives:
  - listened attentively
  - was listening intently
  lexicon: BDAG
  rationale: Compound emphasizes attentive listening; 'closely' captures intensity.
- source_word: παῦσαι … ἐρωτῶν
  chosen: stop asking
  alternatives:
  - cease inquiring
  - do not keep asking
  lexicon: BDAG
  rationale: Imperative with durative nuance; 'stop asking' is concise and clear.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Default Cartha rendering; moral quality in Hermas leans toward 'righteousness'.
    'Justice' noted in footnote for semantic range.
- source_word: μερὸς … εἰς τὸν οἶκόν σου
  chosen: share … for your household
  alternatives:
  - portion … for your house
  lexicon: BDAG
  rationale: οἶκος here likely includes household; 'share' preserves meros as portion.
- source_word: οἰκοδομεῖτε
  chosen: build
  alternatives:
  - set to building
  - start building
  lexicon: BDAG
  rationale: Simple imperative; anticipates the tower imagery without explicating
    it.
- source_word: πρεσβυτέρους
  chosen: elders
  alternatives:
  - older men
  lexicon: BDAG
  rationale: Term can denote age or office; 'elders' preserves possible ecclesial
    nuance in Hermas.
- source_word: δεξιὰ/ἀριστερὰ μέρη
  chosen: right/left side
  lexicon: BDAG
  rationale: Literal spatial terms are theologically charged (honor at right hand);
    keep literal.
- source_word: εὐαρεστηκότων τῷ θεῷ
  chosen: have pleased God
  alternatives:
  - have been pleasing to God
  lexicon: BDAG
  rationale: Perfect participle indicates settled status; 'have pleased God' reads
    smoothly.
- source_word: παθόντων εἵνεκα τοῦ ὀνόματος
  chosen: suffered for the sake of the Name
  alternatives:
  - suffered on account of the Name
  lexicon: BDAG
  rationale: Traditional early Christian idiom; capitalization of 'Name' reflects
    reverential usage.
- source_word: λείπει
  chosen: lack
  alternatives:
  - are lacking
  - fall short
  lexicon: BDAG
  rationale: Direct idiom for deficiency toward a standard.
- source_word: ἐμμένεις
  chosen: remain
  alternatives:
  - continue
  - abide
  lexicon: BDAG
  rationale: Covenantal perseverance nuance; 'remain' is simple and accurate.
- source_word: ἁπλότης
  chosen: simplicity
  alternatives:
  - sincerity
  - singleness (of heart)
  lexicon: BDAG
  rationale: Hermas uses ἁπλότης as a moral quality opposed to double-mindedness;
    'simplicity' preserves his category.
- source_word: ἐργάσωνται τὰ ἐκείνων ἔργα
  chosen: do their deeds
  alternatives:
  - work their works
  lexicon: BDAG
  rationale: Avoids archaic phrasing while keeping the work/works lexical tie.
- source_word: ὑπενέγκωσιν
  chosen: bear
  alternatives:
  - endure
  - bear up under
  lexicon: BDAG
  rationale: Carries the sense of enduring trials; 'bear' is concise and evocative.
