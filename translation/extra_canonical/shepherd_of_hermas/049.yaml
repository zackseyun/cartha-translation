theological_decisions:
- issue: Rendering κύριος (voc.) in dialogue with the angelic shepherd
  chosen_reading: Translate κύριε as 'sir' in this context
  alternative_readings:
  - Render as 'lord' or 'Lord'
  rationale: The addressee is the visionary guide, not God. Using 'sir' prevents confusion
    with the divine title while preserving respectful address.
- issue: Eschatological contrast of αἰών (present vs. coming)
  chosen_reading: Translate αἰών consistently as 'age'
  alternative_readings:
  - Render as 'world' or 'aeon' (transliteration)
  rationale: Hermas contrasts temporal epochs (now vs. coming). 'Age' cleanly conveys
    this without cosmological overtones of 'world' or the opacity of 'aeon.'
- issue: '''Books of the living'' vs. traditional ''book of life'''
  chosen_reading: Retain plural 'books of the living'
  alternative_readings:
  - Singular 'book of life'
  rationale: The Greek is plural and says 'of the living.' Retaining it preserves
    Hermas’s diction and avoids importing later or different phrasing.
- issue: δουλεύοντες τῷ Θεῷ
  chosen_reading: Render as 'those serving God'
  alternative_readings:
  - '''Slaves of God'' to emphasize doulos imagery'
  rationale: Although the root can carry slavery imagery, here the focus is disclosure
    of allegiance ('those serving God'). 'Serving' communicates allegiance without
    over-specifying social metaphor.
- issue: δικαίου (in ἔργον τοῦ δικαίου)
  chosen_reading: Render as 'righteous' rather than 'just'
  alternative_readings:
  - '''Work of justice'''
  rationale: Hermas’s paraenesis leans toward moral righteousness language; 'righteous'
    keeps the moral-ascetical tone and avoids juridical narrowing.
- issue: '''Those who have'' (οἱ ἔχοντες) in 10.1'
  chosen_reading: Take 'have' as material possession and render the clause, 'those
    who have and understand that from the Lord they are made rich'
  alternative_readings:
  - Generalize 'have' to any gift or capacity
  rationale: Context speaks of rich supplying necessities to the poor. Thus 'have'
    naturally refers to those possessing means.
- issue: ἔθνη
  chosen_reading: Translate as 'the nations'
  alternative_readings:
  - '''Gentiles'''
  - '''Pagans'''
  rationale: '''The nations'' is the least anachronistic and widest term; Hermas’s
    contrast is moral (righteous vs. sinners) rather than insider/outsider to Israel.'
