  text: πληροφοροῦσι τὸν πλοῦτον αὐτῶν, καὶ πάλιν οἱ πλούσιοι χορηγοῦντες τοῖς πένησι
    τὰ δέοντα πληροφοροῦσι τὰς ψυχὰς αὐτῶν. 9. γίνονται οὖν ἀμφότεροι κοινωνοὶ τοῦ
    ἔργου τοῦ δικαίου. ταῦτα οὖν ὁ ποιῶν οὐκ ἐγκαταλειφθήσεται ὑπὸ τοῦ Θεοῦ, ἀλλ᾽
    ἔσται ἐπιγεγραμμένος εἰς τὰς βίβλους τῶν ζώντων. 10. μακάριοι οἱ ἔχοντες καὶ συνιέντες
    ὅτι παρὰ τοῦ Κυρίου πλουτίζονται· οἱ γὰρ ταῦτα φρονοῦντες δυνήσονται ἀγαθόν τι
    ἐργάζεσθαι. Ἄλλη παραβολή. 1. Ἔδειξέ μοι δένδρα πολλὰ μὴ ἔχοντα φύλλα, ἀλλ᾽ ὡσεὶ
    ξηρὰ ἐδόκει μοι εἶναι· ὅμοια γὰρ ἦν πάντα. καὶ λέγει μοι· Βλέπεις τὰ δένδρα ταῦτα;
    Βλέπω, φημί, κύριε, ὅμοια ὄντα καὶ ξηρά. ἀποκριθείς μοι λέγει· Ταῦτα τὰ δένδρα,
    ἃ βλέπεις, οἱ κατοικοῦντες εἰσὶν ἐν τῷ αἰῶνι τούτῳ. 2. Διατί οὖν, φημί, κύριε,
    ὡσεὶ ξηρά εἰσι καὶ ὅμοια; Ὅτι, φησίν, οὔτε οἱ δίκαιοι φαίνονται οὔτε οἱ ἁμαρτωλοὶ
    ἐν τῷ αἰῶνι τούτῳ, ἀλλ᾽ ὅμοιοί εἰσιν· ὁ γὰρ αἰὼν οὗτος τοῖς δικαίοις χειμών ἐστι,
    καὶ οὐ φαίνονται μετὰ τῶν ἁμαρτωλῶν κατοικοῦντες. 3. ὥσπερ γὰρ ἐν τῷ χειμῶνι τὰ
    δένδρα ἀποβεβληκότα τὰ φύλλα ὅμοιά εἰσι, καὶ οὐ φαίνονται τὰ ξηρὰ ποῖά εἰσιν ἢ
    τὰ ζῶντα, οὕτως ἐν τῷ αἰῶνι τούτῳ οὐ φαίνονται οὔτε οἱ δίκαιοι οὔτε οἱ ἁμαρτωλοί,
    ἀλλὰ πάντες ὅμοιοί εἰσιν. Ἄλλη παραβολή. 1. Ἔδειξέ μοι πάλιν δένδρα πολλά, ἃ μὲν
    βλαστῶντα, ἃ δὲ ξηρά, καὶ λέγει μοι· Βλέπεις, φησί, τὰ δένδρα ταῦτα; Βλέπω, φημί,
    κύριε, τὰ μὲν βλαστῶντα, τὰ δὲ ξηρά. 2. Ταῦτα, φησί, τὰ δένδρα τὰ βλαστῶντα οἱ
    δίκαιοί εἰσιν οἱ μέλλοντες κατοικεῖν εἰς τὸν αἰῶνα τὸν ἐρχόμενον· ὁ γὰρ αἰὼν ὁ
    ἐρχόμενος θέρος ἐστὶ τοῖς δικαίοις, τοῖς δὲ ἁμαρτωλοῖς χειμών. ὅταν οὖν ἐπιλάμψῃ
    τὸ ἔλεος τοῦ Κυρίου, τότε φανερωθήσονται οἱ δουλεύοντες τῷ Θεῷ, καὶ πάντες φανερωθήσονται·
    3. ὥσπερ γὰρ τῷ θέρει ἑνὸς ἑκάστου δένδρου οἱ καρποὶ φανεροῦνται καὶ ἐπιγινώσκονται
    ποταποί εἰσιν, οὕτω καὶ τῶν δικαίων οἱ καρποὶ φανεροὶ ἔσονται, καὶ γνωσθήσονται
    πάντες [οἱ ἐλάχιστοι ὄντες] εὐθαλεῖς ὄντες ἐν τῷ αἰῶνι ἐκείνῳ. 4. τὰ δὲ ἔθνη καὶ
    οἱ ἁμαρτωλοί, οἷα εἶδες τὰ δένδρα τὰ ξηρά, τοιοῦτοι εὑρεθήσονται ξηροὶ καὶ ἄκαρποι
    ἐν ἐκείνῳ τῷ αἰῶνι, καὶ ὡς ξ
