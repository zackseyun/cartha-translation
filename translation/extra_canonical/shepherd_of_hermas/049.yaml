translation:
  text: '…they bring their wealth to full measure, and in turn the rich, by supplying
    the necessities to the poor, bring their own souls to full measure[a].

    9. Thus both become partners in the work of righteousness. Therefore the one who
    does these things will not be abandoned by God, but will be inscribed in the books
    of the living[b].

    10. Blessed are those who have and understand that it is from the Lord that they
    are made rich; for those who think this way will be able to work some good.


    Another parable.

    1. He showed me many trees that had no leaves, but they seemed to me as if dry;
    for they were all alike. And he says to me, “Do you see these trees?” “I see,”
    I say, “sir[c], that they are alike and dry.” In reply he says to me, “These trees
    that you see are those who dwell in this age[d].”

    2. “Why then, sir, are they as if dry and alike?” I say. “Because,” he says, “neither
    the righteous nor the sinners are seen in this age, but they are alike; for this
    age is winter for the righteous, and they are not seen when dwelling among the
    sinners.”

    3. “For just as in winter the trees that have shed their leaves are alike, and
    it is not apparent which are dry and which are living, so in this age neither
    the righteous nor the sinners are apparent, but all are alike.”


    Another parable.

    1. He showed me again many trees: some sprouting, and others dry. And he says
    to me, “Do you see these trees?” “I see,” I say, “sir, some sprouting and others
    dry.”

    2. “These sprouting trees,” he says, “are the righteous, those who are about to
    dwell in the coming age; for the coming age is summer for the righteous, but winter
    for sinners. When, therefore, the mercy of the Lord shines out, then those serving
    God will be made manifest, and all will be made manifest.”

    3. “For just as in summer the fruits of each tree are made visible and are recognized
    as to what sort they are, so also the fruits of the righteous will be made visible,
    and all will be known to be flourishing in that age[e].”

    4. “But the nations[f] and the sinners—like the dry trees you saw—such will be
    found dry and fruitless in that age, and as …[g]”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb πληροφορέω can mean to bring something to full measure or fulfillment.
      In this context it contrasts material 'wealth' with the 'soul,' each being made
      complete through mutual support.
    reason: lexical_alternative
  - marker: b
    text: On the motif, compare Exod 32:32–33; Ps 69:28; Dan 12:1. Hermas’s wording
      is plural ('books of the living'), not the singular 'book of life.'
    reason: cross_reference
  - marker: c
    text: Greek κύριε here is respectful address to the visionary guide; 'sir' avoids
      confusion with the divine title 'Lord.'
    reason: cultural_note
  - marker: d
    text: Greek αἰών denotes an age or epoch. Hermas contrasts the present age (winter)
      with the coming age (summer).
    reason: cultural_note
  - marker: e
    text: Some witnesses include the words 'οἱ ἐλάχιστοι ὄντες' ('even the least'),
      which would read, 'and all—even the least—will be known as flourishing in that
      age.'
    reason: textual_variant
  - marker: f
    text: ἔθνη is rendered 'the nations' rather than 'Gentiles' to retain a broad,
      non-technical sense.
    reason: lexical_alternative
  - marker: g
    text: The source text in our witness breaks off mid-sentence here; subsequent
      words are not present in the provided Greek layer.
    reason: textual_variant
lexical_decisions:
- source_word: πληροφοροῦσι
  chosen: bring to full measure / make complete
  alternatives:
  - fully assure
  - make secure
  lexicon: BDAG; LSJ
  rationale: 'In Koine this verb can mean to bring something to fulfillment or completion
    (cf. 2 Tim 4:5). Here it fits the reciprocal image: the poor (by implication)
    and the rich each bring something to completion—wealth and soul. ''Make complete''
    is clear and preserves the metaphorical fullness.'
- source_word: χορηγοῦντες
  chosen: supplying / providing
  alternatives:
  - furnishing
  - ministering
  lexicon: BDAG
  rationale: Common sense of providing for needs; 'supplying' keeps the concrete economic
    imagery.
- source_word: τὰ δέοντα
  chosen: the necessities / the things needed
  alternatives:
  - what is fitting
  - what ought to be
  lexicon: BDAG
  rationale: Context is material aid to the poor. 'Necessities' conveys required provisions
    rather than moral propriety.
- source_word: κοινωνοὶ
  chosen: partners / sharers
  alternatives:
  - participants
  - companions
  lexicon: BDAG
  rationale: '''Partners'' communicates mutual participation in a shared work without
    softening the ethical dimension.'
- source_word: τοῦ ἔργου τοῦ δικαίου
  chosen: the work of righteousness
  alternatives:
  - the righteous work
  - the work of justice
  lexicon: BDAG
  rationale: δικαίου here is moral righteousness rather than abstract justice; 'work
    of righteousness' keeps Hermas’s ethical tone.
- source_word: οὐκ ἐγκαταλειφθήσεται
  chosen: will not be abandoned / forsaken
  alternatives:
  - will not be left behind
  - will not be deserted
  lexicon: BDAG
  rationale: Stock biblical idiom; 'abandoned' is clear and weighty.
- source_word: ἐπιγεγραμμένος εἰς τὰς βίβλους τῶν ζώντων
  chosen: inscribed in the books of the living
  alternatives:
  - written in the book of the living
  lexicon: LSJ; BDAG
  rationale: Preserves the plural 'books' and the phrase 'of the living.' Echoes a
    known motif without collapsing to the singular 'book of life.'
- source_word: μακάριοι
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: '''Blessed'' preserves the beatitude register and gravity.'
- source_word: συνιέντες
  chosen: understand / perceive
  alternatives:
  - discern
  - comprehend
  lexicon: BDAG
  rationale: Cognitive grasp of the source of wealth is in view.
- source_word: παρὰ τοῦ Κυρίου πλουτίζονται
  chosen: are made rich from the Lord
  alternatives:
  - are enriched by the Lord
  - become wealthy from the Lord
  lexicon: BDAG
  rationale: Passive divine agency; 'from the Lord' keeps the prepositional nuance
    (παρά).
- source_word: φρονοῦντες
  chosen: think / set their mind
  alternatives:
  - are minded
  - consider
  lexicon: BDAG
  rationale: Ethical mindset language common in early Christian paraenesis.
- source_word: ἀγαθόν τι ἐργάζεσθαι
  chosen: to work some good
  alternatives:
  - to accomplish some good
  - to do something good
  lexicon: BDAG
  rationale: Keeps the concrete imagery of working good rather than abstract 'do good.'
- source_word: κύριε (voc.)
  chosen: sir
  alternatives:
  - lord
  - master
  lexicon: BDAG
  rationale: Address is to the visionary’s guide, not to God. 'Sir' avoids conflation
    with the divine title 'Lord.'
- source_word: αἰών
  chosen: age
  alternatives:
  - world
  lexicon: BDAG
  rationale: Hermas contrasts present and coming 'ages' (temporal horizons), not cosmos
    vs. inhabited world. 'Age' preserves apocalyptic temporal frame.
- source_word: χειμών / θέρος
  chosen: winter / summer
  alternatives:
  - stormy season / harvest-time
  lexicon: LSJ
  rationale: Seasonal metaphor is explicit and vivid; 'winter'/'summer' are natural
    choices.
- source_word: ἐπιλάμψῃ (τὸ ἔλεος)
  chosen: shines out
  alternatives:
  - breaks forth
  - dawns
  lexicon: BDAG
  rationale: Light metaphor attached to mercy; 'shines out' keeps the concrete image.
- source_word: δουλεύοντες τῷ Θεῷ
  chosen: those serving God
  alternatives:
  - those enslaved to God
  - slaves of God
  lexicon: BDAG
  rationale: While the verb connotes slavery, here the focus is on manifest service;
    'serving God' reads smoothly without importing the full 'slave' metaphor.
- source_word: καρποί … ἐπιγινώσκονται ποταποί εἰσιν
  chosen: fruits … are recognized what sort they are
  alternatives:
  - fruits … are found of what kind they are
  - fruits … are known what quality they are
  lexicon: BDAG; LSJ
  rationale: Keeps the evaluative nuance of ποταπός with the recognition verb.
- source_word: εὐθαλεῖς
  chosen: flourishing
  alternatives:
  - vigorous
  - luxuriant
  lexicon: LSJ
  rationale: Common arboreal/vitality metaphor; 'flourishing' fits the tree imagery
    and moral vigor.
- source_word: ἔθνη
  chosen: the nations
  alternatives:
  - Gentiles
  - pagans
  lexicon: BDAG
  rationale: '''The nations'' is the broad, non-technical term; ''Gentiles'' risks
    later Christian ethnoreligious connotations not demanded here.'
- source_word: ἄκαρποι
  chosen: fruitless
  alternatives:
  - unfruitful
  - barren
  lexicon: BDAG
  rationale: '''Fruitless'' aligns with the tree/fruit metaphor already in use.'
