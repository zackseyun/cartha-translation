theological_decisions:
- issue: Genitive titles for angels (τοῦ ἀγγέλου τῆς δικαιοσύνης / τῆς πονηρίας)
  chosen_reading: Render as 'angel of righteousness' / 'angel of wickedness'
  alternative_readings:
  - righteous angel / evil angel
  rationale: The genitive denotes the moral quality these angels represent or administer;
    preserving it keeps Hermas’s moral taxonomy explicit.
- issue: δούλοι τοῦ Θεοῦ
  chosen_reading: Translate as 'slaves of God'
  alternative_readings:
  - servants of God
  - bondservants of God
  rationale: Per project policy, 'slave' highlights belonging and allegiance; here
    contrasted with trusting the wicked angel’s works.
  doctrine_reference: 'Translation philosophy: contested terms — doulos → slave where
    bonded nature salient.'
- issue: ζῆν τῷ Θεῷ
  chosen_reading: Render 'live to God'
  alternative_readings:
  - live for God
  rationale: The dative expresses orientation; 'to God' preserves early Christian
    idiom and rhetorical symmetry within the mandate.
- issue: πιστεύειν + dative in moral exhortation
  chosen_reading: Render 'trust' rather than 'believe' when the object is a person
    or 'works'
  alternative_readings:
  - believe
  - give credence to
  - heed
  rationale: '''Trust'' fits allegiance/credence; ''believe the works'' is awkward
    in English while ''trust'' is idiomatic and maintains the exhortational force.'
- issue: πιστὸς ἀνήρ
  chosen_reading: Render 'faithful person' (inclusive of man or woman by following
    clause)
  alternative_readings:
  - believer
  - trustworthy man
  rationale: Hermas immediately includes 'that man or that woman'; 'faithful person'
    captures moral-religious status without gender restriction.
- issue: Internal moral influence phrased as 'he is in you'
  chosen_reading: Translate literally to preserve Hermas’s moral-psychological imagery
  alternative_readings:
  - he is with you
  - he is at work in you
  rationale: Hermas depicts the presence of either angel in the heart via arising
    thoughts; retaining 'in you' keeps the vivid interior imagery.
