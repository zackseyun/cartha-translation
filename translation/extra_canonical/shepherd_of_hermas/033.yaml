  text: Ἐνετειλάμην σοι, φησίν, ἐν τῇ πρώτῃ ἐντολῇ ἵνα φυλάξῃς τὴν πίστιν καὶ τὸν
    φόβον καὶ τὴν ἐγκράτειαν. Ναί, φημί, κύριε. Ἀλλὰ νῦν θέλω σοι, φησί, δηλῶσαι καὶ
    τὰς δυνάμεις αὐτῶν, ἵνα νοήσῃς τίς αὐτῶν τίνα δύναμιν ἔχει καὶ ἐνέργειαν. διπλαῖ
    γάρ εἰσιν αἱ ἐνέργειαι αὐτῶν· κεῖνται οὖν ἐπὶ δικαίῳ καὶ ἀδίκῳ· 2. σὺ οὖν πίστευε
    τῷ δικαίῳ, τῷ δὲ ἀδίκῳ μὴ πιστεύσῃς· τὸ γὰρ δίκαιον ὀρθὴν ὁδὸν ἔχει, τὸ δὲ ἄδικον
    στρεβλήν. ἀλλὰ σὺ τῇ ὀρθῇ ὁδῷ πορεύου [καὶ ὁμαλῇ], τὴν δὲ στρεβλὴν ἔασον. 3. ἡ
    γὰρ στρεβλὴ ὁδὸς τρίβους οὐκ ἔχει, ἀλλ᾽ ἀνοδίας καὶ προσκόμματα πολλά, καὶ τραχεῖά
    ἐστι καὶ ἀκανθώδης. βλαβερὰ οὖν ἐστὶ τοῖς σοί τις προσπέσῃ ἡ πικρία, γίνωσκε ὅτι
    αὐτός ἐστιν ἐν σοί· εἶτα ἐπιθυμία πράξεων πολλῶν καὶ πολυτέλεια ἐδεσμάτων πολλῶν
    καὶ μεθυσμάτων καὶ κραιπαλῶν πολλῶν καὶ ποικίλων τρυφῶν καὶ οὐ δεόντων, καὶ ἐπιθυμία
    γυναικῶν καὶ πλεονεξία καὶ ὑπερηφανία καὶ ἀλαζονεία, καὶ ὅσα τούτοις παραπλήσιά
    ἐστι καὶ ὅμοια. ταῦτα οὖν ὅταν ἐπὶ τὴν καρδίαν σου ἀναβῇ, γίνωσκε ὅτι ὁ ἄγγελος
    τῆς πονηρίας ἐστὶ μετὰ σοῦ. 6. σὺ οὖν ἐπιγνοὺς τὰ ἔργα αὐτοῦ ἀπόστα ἀπ᾽ αὐτοῦ
    καὶ μηδὲν αὐτῷ πίστευε, ὅτι τὰ ἔργα αὐτοῦ πονηρά εἰσι καὶ ἀσύμφορα τοῖς δούλοις
    τοῦ Θεοῦ. ἔχεις οὖν ἀμφοτέρων τῶν ἀγγέλων τὰς ἐνεργείας· σύνιε αὐτὰς καὶ πίστευε
    τῷ ἀγγέλῳ τῆς δικαιοσύνης· 7. ἀπὸ δὲ τοῦ ἀγγέλου τῆς πονηρίας ἀπόστηθι, ὅτι ἡ
    διδαχὴ αὐτοῦ πονηρά ἐστι παντὶ ἔργῳ· ἐὰν γὰρ ᾖ τις πιστὸς ἀνήρ, καὶ ἡ ἐνθύμησις
    τοῦ ἀγγέλου τούτου ἀναβῇ ἐπὶ τὴν καρδίαν αὐτοῦ, δεῖ τὸν ἄνδρα ἐκεῖνον ἢ τὴν γυναῖκα
    ἐξαμαρτῆσαί τι. 8. ἐὰν δὲ πάλιν πονηρότατός τις ᾖ ἀνὴρ ἢ γυνή, καὶ ἀναβῇ ἐπὶ τὴν
    καρδίαν αὐτοῦ τὰ ἔργα τοῦ ἀγγέλου τῆς δικαιοσύνης, ἐξ ἀνάγκης δεῖ αὐτὸν ἀγαθον
    τι ποιῆσαι. 9. βλέπεις οὖν, φησίν, ὅτι καλόν ἐστι τῷ ἀγγέλῳ τῆς δικαιοσύνης ἀκολουθεῖν,
    τῷ δὲ ἀγγέλῳ τῆς πονηρίας ἀποτάξασθαι. 10. τὰ μὲν περὶ τῆς πίστεως αὕτη ἡ ἐντολὴ
    δηλοῖ, ἵνα τοῖς ἔργοις τοῦ ἀγγέλου τῆς δικαιοσύνης πιστεύσῃς, καὶ ἐργασάμενος
    αὐτὰ ζήσῃ τῷ Θεῷ. πίστευε δὲ ὅτι τὰ ἔργα τοῦ ἀγγέλου τῆς πονηρίας χαλεπά ἐστι·
    μὴ ἐργαζόμενος οὖν αὐτὰ ζήσῃ τῷ Θεῷ.
