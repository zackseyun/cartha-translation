translation:
  text: 'He says, “I commanded you in the first commandment to keep faith and fear
    and self-control.”[2] “Yes, lord,” I say. “But now,” he says, “I want also to
    make known to you their powers, so that you may understand what power and what
    activity each of them has. For their activities are twofold; they lie upon both
    the righteous and the unrighteous. So you—trust the righteous, but do not trust
    the unrighteous; for what is righteous has a straight road, but what is unrighteous
    a crooked one. But you, walk on the straight [and level][1] road, and leave the
    crooked.


    For the crooked road has no tracks, but trackless places and many stumbling blocks;
    and it is rough and thorny. Therefore it is harmful; if bitterness should come
    upon you, know that he is in you. Then come the craving for many undertakings,
    and extravagance in many foods, and intoxicants and many revelries, and pleasures
    of various kinds that are not fitting; and desire for women, and greed, and haughtiness,
    and boastfulness, and whatever things are akin and similar to these. Whenever
    these things rise up upon your heart, know that the angel of wickedness is with
    you.


    So when you recognize his works, withdraw from him and put no trust in him, because
    his works are wicked and unprofitable for God’s slaves. You therefore have the
    activities of both angels; discern them, and trust the angel of righteousness.
    But take your distance from the angel of wickedness, because his teaching is wicked
    in every deed. For if someone is a faithful person, and the thought of this angel
    rises up upon that one’s heart, that man or that woman is bound to commit some
    sin. But if again someone is a very wicked person, man or woman, and the works
    of the angel of righteousness rise up upon that one’s heart, that person of necessity
    must do something good. You see then,” he says, “that it is good to follow the
    angel of righteousness, and to renounce the angel of wickedness. As to faith,
    this commandment makes it clear: that you should trust the works of the angel
    of righteousness, and, having done them, live to God.[3] And be convinced that
    the works of the angel of wickedness are grievous; by not doing them, you will
    live to God.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: Some witnesses include 'and level' (καὶ ὁμαλῇ) after 'straight.'
    reason: textual_variant
  - marker: '[2]'
    text: The 'first commandment' alludes back to the opening mandate where foundational
      virtues are given.
    reason: cross_reference
  - marker: '[3]'
    text: '''Trust the works'' reflects πιστεύειν with a dative; alternatives include
      ''give credence to'' or ''heed.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Default rendering per project policy; here it names a virtue to be guarded
    alongside fear and self-control.
- source_word: φόβος
  chosen: fear
  alternatives:
  - reverence
  - awe
  lexicon: BDAG
  rationale: Moral-exhortation context; concise and weighty. The object is implicitly
    God.
- source_word: ἐγκράτεια
  chosen: self-control
  alternatives:
  - temperance
  - self-restraint
  lexicon: BDAG
  rationale: Standard moral virtue; contemporary and clear without archaic tone.
- source_word: δυνάμεις
  chosen: powers
  alternatives:
  - capabilities
  - strengths
  lexicon: BDAG
  rationale: Refers to the effective capacity of the virtues; preserves concrete sense.
- source_word: ἐνέργειαι
  chosen: activities
  alternatives:
  - operations
  - energies
  lexicon: LSJ
  rationale: Describes what they effect/do; 'activities' is natural English and avoids
    metaphysical overtones of 'energies'.
- source_word: δίκαιος / τὸ δίκαιον
  chosen: righteous / what is righteous
  alternatives:
  - just / what is just
  lexicon: BDAG
  rationale: Moral-spiritual frame throughout the unit; 'righteous' pairs with 'angel
    of righteousness' later.
- source_word: ἄδικος / τὸ ἄδικον
  chosen: unrighteous / what is unrighteous
  alternatives:
  - unjust / what is unjust
  lexicon: BDAG
  rationale: Maintains symmetry with 'righteous' and moral nuance, not merely legal
    injustice.
- source_word: ὁδός ὀρθή / στρεβλή
  chosen: straight road / crooked [road]
  alternatives:
  - straight way / twisted way
  lexicon: LSJ
  rationale: Concrete road imagery; 'crooked' captures στρεβλή's moral-twisted connotation.
- source_word: τρίβοι
  chosen: tracks
  alternatives:
  - paths
  - byways
  lexicon: LSJ
  rationale: Footpath nuance fits the road metaphor; 'tracks' contrasts with 'trackless'
    below.
- source_word: ἀνοδίαι
  chosen: trackless places
  alternatives:
  - roadless stretches
  - pathless places
  lexicon: LSJ
  rationale: Conveys absence of usable roads; keeps the metaphor vivid.
- source_word: προσκόμματα
  chosen: stumbling blocks
  alternatives:
  - obstacles
  - stumbling-stones
  lexicon: BDAG
  rationale: Common moral metaphor; concrete and idiomatic.
- source_word: τραχύς
  chosen: rough
  alternatives:
  - rugged
  lexicon: LSJ
  rationale: Plain English for uneven, harsh terrain.
- source_word: ἀκανθώδης
  chosen: thorny
  alternatives:
  - thistly
  - full of thorns
  lexicon: LSJ
  rationale: Natural, vivid description; keeps the concrete image.
- source_word: πικρία
  chosen: bitterness
  alternatives:
  - acrimony
  - resentment
  lexicon: BDAG
  rationale: Standard ethical term; suits inner sourness linked to wicked influence.
- source_word: ἐπιθυμία
  chosen: craving
  alternatives:
  - desire
  - lust
  lexicon: BDAG
  rationale: Here of appetitive urge; 'craving' fits vices list tone.
- source_word: πράξεις (πολλαί)
  chosen: undertakings
  alternatives:
  - deeds
  - activities
  - projects
  lexicon: LSJ
  rationale: Here the context is restless busyness; 'undertakings' implies many pursuits.
- source_word: πολυτέλεια
  chosen: extravagance
  alternatives:
  - luxury
  lexicon: LSJ
  rationale: Conveys excess rather than mere quality; matches vice catalog.
- source_word: ἐδέσματα
  chosen: foods
  alternatives:
  - dishes
  - viands
  lexicon: LSJ
  rationale: '''Foods'' is clear and broad; ''dishes/viands'' is archaic.'
- source_word: μεθύσματα
  chosen: intoxicants
  alternatives:
  - drinks
  - potations
  lexicon: LSJ
  rationale: Specifies alcoholic drinks with intoxicating effect; succinct and precise.
- source_word: κραιπάλαι
  chosen: revelries
  alternatives:
  - carousings
  - riots
  - debaucheries
  lexicon: LSJ
  rationale: '''Revelries'' captures feasting/riotous excess without archaic or moralistic
    inflation.'
- source_word: τρυφαί / τρυφή (gen. pl. τρυφῶν)
  chosen: luxuries
  alternatives:
  - indulgences
  - sensual pleasures
  - delights
  lexicon: LSJ
  rationale: In a vice list, 'luxuries' concisely names soft-living indulgence.
- source_word: οὐ δεόντων
  chosen: not fitting
  alternatives:
  - improper
  - unbecoming
  lexicon: LSJ
  rationale: Plain English; moral impropriety without formality.
- source_word: πλεονεξία
  chosen: greed
  alternatives:
  - covetousness
  lexicon: BDAG
  rationale: Modern equivalent; 'covetousness' is accurate but archaic in tone.
- source_word: ὑπερηφανία
  chosen: haughtiness
  alternatives:
  - pride
  - arrogance
  lexicon: BDAG
  rationale: Highlights disdainful superiority, distinct from ἀλαζονεία.
- source_word: ἀλαζονεία
  chosen: boastfulness
  alternatives:
  - vainglory
  - bragging
  - arrogance
  lexicon: BDAG
  rationale: Self-exalting display; 'boastfulness' pairs well with 'haughtiness'.
- source_word: ἐνθύμησις
  chosen: thought
  alternatives:
  - inner impulse
  - design
  lexicon: BDAG
  rationale: Inner consideration/impulse arising in the heart; 'thought' keeps idiomatic
    clarity.
- source_word: ἐξαμαρτάνω
  chosen: commit some sin
  alternatives:
  - go wrong in something
  - miss the mark
  lexicon: BDAG
  rationale: Transparently expresses moral failure; indefinite 'some' reflects τι.
- source_word: ἀποτάξασθαι
  chosen: renounce
  alternatives:
  - bid farewell to
  - break with
  lexicon: LSJ
  rationale: Idiomatic for decisive parting; moral break with the wicked angel.
- source_word: διδαχή
  chosen: teaching
  alternatives:
  - instruction
  - doctrine
  lexicon: BDAG
  rationale: Neutral term; context supplies moral evaluation.
- source_word: ἀσύμφορα
  chosen: unprofitable
  alternatives:
  - harmful
  - disadvantageous
  lexicon: BDAG
  rationale: Common early-Christian idiom for spiritually unhelpful; fits contrast
    with 'live to God'.
- source_word: δούλοι (τοῦ Θεοῦ)
  chosen: slaves (of God)
  alternatives:
  - servants (of God)
  - bondservants
  lexicon: BDAG
  rationale: Per project policy, 'slaves' when bonded belonging is salient; here opposed
    to another lord’s works.
- source_word: χαλεπός
  chosen: grievous
  alternatives:
  - harsh
  - ruinous
  - burdensome
  lexicon: BDAG
  rationale: Carries the sense of hard/cruel; 'grievous' suits moral weight.
- source_word: σύνιε
  chosen: discern
  alternatives:
  - understand
  - comprehend
  lexicon: LSJ
  rationale: Moral discernment is in view; 'discern' fits evaluative context.
- source_word: ἀπόστηθι
  chosen: withdraw
  alternatives:
  - take your distance
  - stand away
  lexicon: BDAG
  rationale: Imperative of spatial/moral separation; 'withdraw' is vivid and brief.
- source_word: πιστεύω (with dative)
  chosen: trust
  alternatives:
  - believe
  - give credence to
  - heed
  lexicon: BDAG
  rationale: With personal object and even with 'works', 'trust' best conveys allegiance/credence
    in moral instruction.
- source_word: ἀκολουθεῖν
  chosen: follow
  alternatives:
  - keep to
  - accompany
  lexicon: BDAG
  rationale: Standard moral metaphor of discipleship/path.
- source_word: ζῆν τῷ Θεῷ
  chosen: live to God
  alternatives:
  - live for God
  - live with God
  lexicon: BDAG
  rationale: Preserves dative idiom familiar in early Christian diction; noted in
    theological decisions.
