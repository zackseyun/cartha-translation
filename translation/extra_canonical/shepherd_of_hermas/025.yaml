theological_decisions:
- issue: Rendering ἐντολαί in Hermas as "mandates" rather than "commandments"
  chosen_reading: Translate ἐντολαί as "mandates" within Hermas to reflect the work’s
    internal section title and avoid conflation with Mosaic commandments.
  alternative_readings:
  - Translate ἐντολαί as "commandments" throughout
  - Use "commands" as a neutral rendering
  rationale: Hermas labels a major division "Mandates" (ἐντολαί). Rendering as "mandates"
    makes the structural signal explicit and distinguishes this paraenesis from Decalogue
    connotations.
  doctrine_reference: 'Translation philosophy: consistency of key terms; preserve
    second-century church texture.'
- issue: μετανοέω/μετάνοια rendering in paraenetic context
  chosen_reading: Render μετανοέω/μετάνοια as "repent/repentance" here, since the
    context addresses concrete sins and the alternative (not repenting but adding
    sins).
  alternative_readings:
  - Render as "change your mind" to preserve cognitive nuance
  rationale: Per project policy, use "repent" in specific-sin contexts. The contrast
    with adding sins signals moral repentance.
  doctrine_reference: 'DOCTRINE.md — contested terms: μετανοέω.'
- issue: σεμνοτάτου ἀγγέλου
  chosen_reading: '"most venerable angel"'
  alternative_readings:
  - most holy angel
  - most august angel
  - most noble angel
  rationale: σεμνός emphasizes dignified, august character rather than moral purity
    per se; "venerable" captures reverential dignity.
- issue: ἐκπειράζων με
  chosen_reading: '"testing me" rather than "tempting me"'
  alternative_readings:
  - tempting me
  - trying me
  rationale: To avoid suggesting the figure entices to sin; the context is an evaluative
    test of recognition.
- issue: Capitalizing "Shepherd"
  chosen_reading: Capitalize "Shepherd" when referring to the visionary figure identified
    as ὁ ποιμήν.
  alternative_readings:
  - Keep "shepherd" lowercase as a common noun
  rationale: Within Hermas, "the Shepherd" is a specific, recurring personage. Capitalization
    helps readers track the figure without adding interpretation.
  doctrine_reference: 'Translation philosophy: readability and transparency.'
- issue: Plural second person (ὑμῖν) addressed by the Shepherd
  chosen_reading: Keep English "you" (ambiguous number) but annotate that the Greek
    shifts to plural, indicating community-wide instruction.
  alternative_readings:
  - Paraphrase to "you all" to mark plurality
  - Shift to singular for Hermas alone
  rationale: English lacks a standard plural "you"; footnote marks the communal scope
    without altering the register.
  doctrine_reference: 'Transparency principle: preserve ambiguity and annotate.'
- issue: παραβολαί as "parables" vs. "Similitudes"
  chosen_reading: Translate παραβολαί as "parables" in the verse; footnote that this
    corresponds to the section known as the Similitudes.
  alternative_readings:
  - Render as "similitudes" to match later section title
  rationale: Greek uses παραβολαί; translating as "parables" follows the source while
    still guiding readers to the book’s structure via note.
  doctrine_reference: Original-language primacy over translation tradition.
