translation:
  text: 'After I had prayed in the house and sat down on the bed, a certain man entered—glorious
    in appearance, in a shepherd’s guise, wearing a white skin, with a bag on his
    shoulders and a staff in his hand. And he greeted me, and I returned his greeting.


    2. And straightway he sat down beside me and says to me, I have been sent by the
    most venerable angel, to dwell with you for the remaining days of your life.


    3. I supposed that he was present to test me, and I say to him, Who are you? For
    I, I say, know the one to whom I was handed over. He says to me, Do you not recognize
    me? No, I say. I, he says, am the Shepherd, to whom you were handed over.


    4. While he was still speaking, his appearance was changed, and I recognized him—that
    he was the one to whom I had been handed over; and straightway I was confounded,
    and fear seized me, and I was completely broken down with grief, because I had
    answered him so wickedly and senselessly.


    5. But he answered me and says, Do not be confounded, but be strengthened in my
    mandates, which I am about to command you. For I have been sent, he says, to show
    you again all the things you saw before—the very main points that are beneficial
    for you. First of all, write my mandates and the parables; and the others, as
    I shall show you, in this way you will write. For this reason, he says, I command
    you to write the mandates and the parables first, so that you may have them at
    hand to read and be able to keep them.


    6. So I wrote the mandates and the parables, just as he commanded me.


    7. If then, having heard them, you keep them and walk in them and put them into
    practice with a pure heart, you will receive from the Lord what he has promised
    you; but if, having heard, you do not repent but still add to your sins, you will
    receive from the Lord the opposite. All these things the Shepherd—the angel of
    repentance—commanded me to write in this way.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Shepherd’s attire: white skin, bag, and staff were typical of pastoral
      imagery, signaling the figure’s role and purity in the vision.'
    reason: cultural_note
  - marker: b
    text: The verb ἀσπάζομαι means “to greet”; in early Christian contexts, greetings
      could include a kiss (cf. Rom 16:16), but the text here simply says “greeted.”
    reason: cultural_note
  - marker: c
    text: “Mandates” translates ἐντολαί; many English versions read “commandments,”
      but Hermas uses ἐντολαί as a section title for his paraenetic instructions.
    reason: lexical_alternative
  - marker: d
    text: “Parables” renders παραβολαί and corresponds to the section often called
      the “Similitudes.”
    reason: cross_reference
  - marker: e
    text: “Main points” translates κεφάλαια, which can mean principal matters or summaries;
      it does not here denote book chapters.
    reason: lexical_alternative
  - marker: f
    text: The pronoun “you” in “beneficial for you” is plural (ὑμῖν), indicating that
      the instruction is for the community, not only Hermas.
    reason: cultural_note
  - marker: g
    text: “Testing me” translates ἐκπειράζων με; the nuance is of examination or proving,
      not enticing to sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: σχήματι ποιμενικῷ
  chosen: in a shepherd’s guise
  alternatives:
  - in shepherd’s dress
  - in shepherd’s form
  lexicon: LSJ
  rationale: σχῆμα denotes outward form/appearance; paired with ποιμενικός, it conveys
    attire/appearance of a shepherd. "Guise" keeps visual register.
- source_word: δέρμα λευκόν
  chosen: a white skin
  alternatives:
  - a white hide
  - a white leather cloak
  lexicon: LSJ
  rationale: δέρμα is an animal skin/hide; context suggests garment of skin. Retaining
    "skin" preserves the concrete image.
- source_word: πήραν ἔχων ἐπὶ τῶν ὤμων
  chosen: with a bag on his shoulders
  alternatives:
  - with a wallet on his shoulders
  - with a scrip over his shoulders
  lexicon: LSJ
  rationale: πήρα is a leather pouch/scrip (esp. of travelers/shepherds). "Bag" is
    accessible modern English; 'scrip' is archaic.
- source_word: ῥάβδον εἰς τὴν χεῖρα
  chosen: a staff in his hand
  alternatives:
  - a rod in his hand
  lexicon: BDAG
  rationale: ῥάβδος can be rod/staff. Given shepherd imagery, "staff" fits best.
- source_word: ἠσπάσατό με
  chosen: he greeted me
  alternatives:
  - he saluted me
  - he embraced me
  lexicon: BDAG
  rationale: ἀσπάζομαι commonly means to greet/salute; physical embrace is not explicit
    here.
- source_word: παρεκάθισέν μοι
  chosen: he sat down beside me
  alternatives:
  - he sat down with me
  - he sat by me
  lexicon: LSJ
  rationale: παρα-καθίζω conveys sitting down near/beside someone. "Beside" captures
    proximity.
- source_word: σεμνοτάτου ἀγγέλου
  chosen: the most venerable angel
  alternatives:
  - the most august angel
  - the most noble angel
  - the most holy angel
  lexicon: BDAG
  rationale: σεμνός denotes dignity/augustness. "Venerable" communicates solemn dignity
    without conflating with "holy" (ἅγιος).
- source_word: οἰκήσω μετὰ σοῦ
  chosen: to dwell with you
  alternatives:
  - to live with you
  - to stay with you
  lexicon: BDAG
  rationale: οἰκέω often denotes dwelling/settled presence; "dwell" preserves theological
    resonance of ongoing presence.
- source_word: ἐκπειράζων με
  chosen: testing me
  alternatives:
  - tempting me
  - trying me
  lexicon: BDAG
  rationale: ἐκπειράζω means to test thoroughly; "testing" avoids the moral connotation
    of enticing to sin that "tempting" can carry.
- source_word: ᾧ παρεδόθην
  chosen: to whom I was handed over
  alternatives:
  - to whom I was entrusted
  - to whom I was delivered
  lexicon: BDAG
  rationale: παραδίδωμι here has the sense of being committed/handed over to someone’s
    charge; "handed over" preserves the formal tone and echoes Hermas's own phrasing.
- source_word: ἠλλοιώθη ἡ ἰδέα αὐτοῦ
  chosen: his appearance was changed
  alternatives:
  - his form was altered
  - his look was transformed
  lexicon: LSJ
  rationale: ἰδέα is outward appearance/form. "Appearance was changed" is clear and
    literal.
- source_word: συνεχύθην
  chosen: I was confounded
  alternatives:
  - I was thrown into confusion
  - I was bewildered
  lexicon: LSJ
  rationale: συγχέω in passive indicates confusion/embarrassment. "Confounded" retains
    elevated tone.
- source_word: συνεκόπην ἀπὸ τῆς λύπης
  chosen: I was completely broken down with grief
  alternatives:
  - I was utterly crushed with grief
  - I was cut down by grief
  lexicon: LSJ
  rationale: συνκόπτω metaphorically of being shattered; "broken down" plus "with
    grief" conveys intensity; "completely" renders ὅλος.
- source_word: πονηρῶς καὶ ἀφρόνως
  chosen: wickedly and senselessly
  alternatives:
  - evil and foolishly
  - badly and foolishly
  lexicon: BDAG
  rationale: πονηρός = wicked/evil; ἄφρων = senseless/foolish. Pairing retains moral
    and cognitive nuance.
- source_word: ἰσχυροποιοῦ ἐν ταῖς ἐντολαῖς μου
  chosen: be strengthened in my mandates
  alternatives:
  - be made strong by my commandments
  - become strong in my commands
  lexicon: LSJ
  rationale: ἰσχυροποιέω = make strong; middle imperative urges being strengthened.
    ἐντολή is rendered "mandate" here to reflect Hermas’s internal section title and
    maintain consistency across the work.
- source_word: κεφάλαια
  chosen: main points
  alternatives:
  - headings
  - chief matters
  - chapters
  lexicon: LSJ
  rationale: κεφάλαιον can denote a principal point or summary. "Main points" fits
    the explanatory sense without implying book chapters.
- source_word: σύμφορα
  chosen: beneficial
  alternatives:
  - profitable
  - advantageous
  lexicon: BDAG
  rationale: σύμφορος means beneficial/advantageous. "Beneficial" is clear and idiomatic.
- source_word: ὑπὸ χεῖρα ἀναγινώσκῃς
  chosen: have them at hand to read
  alternatives:
  - read them at hand
  - keep them at the ready to read
  lexicon: LSJ
  rationale: Idiomatic expression for ready availability; "at hand" preserves the
    idiom transparently.
- source_word: φυλάξαι
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: BDAG
  rationale: φυλάσσω in moral instruction often = keep/observe commandments. "Keep"
    is concise and standard.
- source_word: πορευθῆτε ἐν αὐταῖς
  chosen: walk in them
  alternatives:
  - live by them
  - conduct yourselves in them
  lexicon: BDAG
  rationale: πορεύομαι with ἐν conveys conduct of life. "Walk in" retains biblical
    ethical metaphor common in early Christian texts.
- source_word: ἐργάσησθε αὐτὰς
  chosen: put them into practice
  alternatives:
  - do them
  - work them out
  lexicon: BDAG
  rationale: ἐργάζομαι of doing/working deeds; "put into practice" connects hearing
    to doing, matching paraenetic tone.
- source_word: ἀπολήμψεσθε ... τὰ ἐναντία
  chosen: you will receive ... the opposite
  alternatives:
  - you will receive ... what is contrary
  - you will receive ... the contrary things
  lexicon: BDAG
  rationale: ἐναντίος = opposite/contrary. Rendering preserves antithetical structure.
- source_word: ὁ ποιμήν ... ὁ ἄγγελος τῆς μετανοίας
  chosen: the Shepherd—the angel of repentance
  alternatives:
  - the shepherd, the angel of repentance
  lexicon: BDAG
  rationale: ποιμήν is a titular figure in Hermas; capitalizing "Shepherd" signals
    the persona. μετανοίας is classically "repentance"; retaining the title preserves
    Hermas’s distinctive angelology.
