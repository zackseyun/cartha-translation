book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Προσευξαμένου μου ἐν τῷ οἴκῳ καὶ καθίσαντος εἰς τὴν κλίνην εἰσῆλθεν ἀνήρ τις
    ἔνδοξος τῇ ὄψει, σχήματι ποιμενικῷ, περικείμενος δέρμα λευκόν, καὶ πήραν ἔχων
    ἐπὶ τῶν ὤμων καὶ ῥάβδον εἰς τὴν χεῖρα. καὶ ἠσπάσατό με, κἀγὼ ἀντησπασάμην αὐτόν.
    2. καὶ εὐθὺς παρεκάθισέν μοι καὶ λέγει μοι· Ἀπεστάλην ὑπὸ τοῦ σεμνοτάτου ἀγγέλου,
    ἵνα μετὰ σοῦ οἰκήσω τὰς λοιπὰς ἡμέρας τῆς ζωῆς σου. 3. ἔδοξα ἐγὼ ὅτι πάρεστιν
    ἐκπειράζων με, καὶ λέγω αὐτῷ· Σὺ γὰρ τίς εἶ; ἐγὼ γάρ, φημί, γινώσκω ᾧ παρεδόθην.
    λέγει μοι· Οὐκ ἐπιγινώσκεις με; Οὔ, φημί. Ἐγώ, φησίν, εἰμὶ ὁ ποιμὴν ᾧ παρεδόθης.
    4. ἔτι λαλοῦντος αὐτοῦ ἠλλοιώθη ἡ ἰδέα αὐτοῦ, καὶ ἐπέγνων αὐτόν, ὅτι ἐκεῖνος ἦν
    ᾧ παρεδόθην, καὶ εὐθὺς συνεχύθην, καὶ φόβος με ἔλαβεν, καὶ ὅλος συνεκόπην ἀπὸ
    τῆς λύπης, ὅτι οὕτως αὐτῷ ἀπεκρίθην πονηρῶς καὶ ἀφρόνως. 5. ὁ δὲ ἀποκριθείς μοι
    λέγει· Μὴ συγχύννου, ἀλλὰ ἰσχυροποιοῦ ἐν ταῖς ἐντολαῖς μου, αἷς σοι μέλλω ἐντέλλεσθαι.
    ἀπεστάλην γάρ, φησίν, ἵνα ἃ εἶδες πρότερον πάντα σοι πάλιν δείξω, αὐτὰ τὰ κεφάλαια
    τὰ ὄντα ὑμῖν σύμφορα. πρῶτον πάντων τὰς ἐντολάς μου γράψον καὶ τὰς παραβολάς·
    τὰ δὲ ἕτερα, καθώς σοι δείξω, οὕτως γράψεις· διὰ τοῦτο, φησίν, ἐντέλλομαί σοι
    πρῶτον γράψαι τὰς ἐντολὰς καὶ παραβολάς, ἵνα ὑπὸ χεῖρα ἀναγινώσκῃς αὐτὰς καὶ δυνηθῇς
    φυλάξαι αὐτάς. 6. ἔγραψα οὖν τὰς ἐντολὰς καὶ παραβολάς, καθὼς ἐνετείλατό μοι.
    7. ἐὰν οὖν ἀκούσαντες αὐτὰς φυλάξητε καὶ ἐν αὐταῖς πορευθῆτε καὶ ἐργάσησθε αὐτὰς
    ἐν καθαρᾷ καρδίᾳ ἀπολήμψεσθε ἀπὸ τοῦ Κυρίου ὅσα ἐπηγγείλατο ὑμῖν· ἐὰν δὲ ἀκούσαντες
    μὴ μετανοήσητε, ἀλλ᾽ ἔτι προσθῆτε ταῖς ἁμαρτίαις ὑμῶν, ἀπολήμψεσθε παρὰ τοῦ Κυρίου
    τὰ ἐναντία. ταῦτά μοι πάντα οὕτως γράψαι ὁ ποιμὴν ἐνετείλατο, ὁ ἄγγελος τῆς μετανοίας.
