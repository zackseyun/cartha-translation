id: HERM.V.3.ix
reference: Shepherd of Hermas — Vision 3, section ix
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ἀκούσατέ μου, τέκνα. ἐγὼ ὑμᾶς ἐξέθρεψα ἐν πολλῇ ἁπλότητι καὶ ἀκακίᾳ καὶ σεμνότητι
    διὰ τὸ ἔλεος τοῦ Κυρίου τοῦ ἐφ᾽ ὑμᾶς στάξαντος τὴν δικαιοσύνην, ἵνα δικαιωθῆτε
    καὶ
  language: Greek
  pages:
  - 326
  unit_id: V.3.ix
  label: Vision 3, section ix
  sequence: 17
translation:
  text: Listen to me, children. I reared you in much simplicity and guilelessness[a]
    and reverent dignity[b], by the mercy of the Lord who has let righteousness fall
    in drops upon you[c][d], so that you might be made righteous[e] and …
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Guilelessness: ἀκακία also means ''innocence'' or ''harmlessness''.'
    reason: lexical_alternative
  - marker: b
    text: 'Reverent dignity: σεμνότης can be ''dignity'', ''seriousness'', or ''modesty''.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'has let drip' (στάζω). Alternatives include 'has dripped' or
      'has poured down' righteousness.
    reason: lexical_alternative
  - marker: d
    text: 'The image of blessing or speech ''dropping/dripping'' appears in the LXX
      (e.g., Deut 32:2: ''My speech shall drop as the rain'').'
    reason: cross_reference
  - marker: e
    text: Or 'be justified' (δικαιωθῆτε); here rendered 'be made righteous' to reflect
      impartation rather than a strictly forensic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσατέ
  chosen: Listen
  alternatives:
  - Hear
  lexicon: BDAG
  rationale: Imperative of ἀκούω; 'Listen' preserves immediacy and direct address
    without sounding archaic.
- source_word: τέκνα
  chosen: children
  alternatives:
  - little ones
  - sons
  lexicon: BDAG
  rationale: Common affectionate/vocative address; keeps familial imagery consistent
    with the next verb ('reared').
- source_word: ἐξέθρεψα
  chosen: I reared (you)
  alternatives:
  - I brought you up
  - I nurtured you
  lexicon: LSJ
  rationale: ἐκτρέφω means to bring up, rear (children). 'Reared' matches the parental
    metaphor evoked by 'children' and is concise.
- source_word: ἐν πολλῇ ἁπλότητι
  chosen: in much simplicity
  alternatives:
  - in great simplicity
  - in single-mindedness
  lexicon: BDAG
  rationale: ἁπλότης in moral contexts denotes simplicity/sincerity as opposed to
    duplicity. 'Much' renders πολλῇ formally.
- source_word: ἀκακίᾳ
  chosen: guilelessness
  alternatives:
  - innocence
  - harmlessness
  lexicon: LSJ
  rationale: ἀκακία is freedom from κακία (malice), hence innocence or guilelessness.
    'Guilelessness' pairs well with 'simplicity' in Hermas' moral vocabulary.
- source_word: σεμνότητι
  chosen: reverent dignity
  alternatives:
  - dignity
  - seriousness
  - modesty
  lexicon: BDAG
  rationale: σεμνότης conveys dignified seriousness with a reverential tone; 'reverent
    dignity' captures both aspects in English.
- source_word: διὰ τὸ ἔλεος
  chosen: by the mercy
  alternatives:
  - through the mercy
  - because of the mercy
  lexicon: BDAG
  rationale: διά with accusative here is causal/instrumental. 'By the mercy' reads
    naturally and signals divine enablement.
- source_word: τοῦ Κυρίου
  chosen: of the Lord
  alternatives:
  - of the Master
  lexicon: BDAG
  rationale: κῦριος as a divine title is rendered 'Lord' per project conventions.
- source_word: στάξαντος
  chosen: has let … fall in drops
  alternatives:
  - has dripped
  - has poured down
  lexicon: LSJ
  rationale: στάζω means to drip/let fall in drops. Retaining the 'drops' imagery
    preserves the vivid, almost liturgical tone.
- source_word: τὴν δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Default project rendering; in Hermas the moral/transformative sense of
    'righteousness' is prominent.
- source_word: ἵνα δικαιωθῆτε
  chosen: so that you might be made righteous
  alternatives:
  - so that you might be justified
  lexicon: BDAG
  rationale: Passive of δικαιόω can be declarative or transformative. Given the imagery
    of righteousness being bestowed, 'be made righteous' foregrounds impartation.
