theological_decisions:
- issue: δικαιοσύνη vs. justice
  chosen_reading: Render as 'righteousness'
  alternative_readings:
  - justice
  rationale: Hermas emphasizes a moral state/way of life rather than a juridical order;
    the context of 'righteousness' being bestowed aligns with moral formation.
- issue: δικαιωθῆτε (forensic vs. transformative)
  chosen_reading: 'Transformative: ''be made righteous'''
  alternative_readings:
  - 'Forensic: ''be justified'''
  rationale: The image of righteousness 'dripping' on the audience suggests impartation
    rather than declaration. Hermas generally exhorts to lived righteousness through
    mercy and repentance.
- issue: Speaker identity
  chosen_reading: The voice is the Church figure addressing believers as her 'children'.
  alternative_readings:
  - Direct divine address (God speaking)
  rationale: The phrase 'by the mercy of the Lord' distinguishes the speaker from
    'the Lord'; in Vision 3 the Church (as Lady) often addresses Hermas and the faithful
    as children, fitting the parental verb 'reared'.
- issue: κύριος as title
  chosen_reading: Translate as 'Lord'
  alternative_readings:
  - Master
  rationale: Consistent with project policy and early Christian usage for God/the
    risen Jesus; 'Lord' maintains reverential register.
  doctrine_reference: 'DOCTRINE.md — Contested terms: Kyrios → Lord'
