translation:
  text: 'Therefore, seeing them being scourged and afflicted like this, I was grieved
    for them, because they were being tormented in this way and had no respite at
    all. I said to the shepherd who was speaking with me, “Sir, who is this shepherd,
    so pitiless and harsh, showing no compassion at all for these sheep?” He said,
    “This is the angel of punishment; he is one of the righteous angels, appointed
    over punishment. Therefore he takes charge of those who have wandered away from
    God and have gone after the desires and deceits of this age, and he punishes them,
    as they deserve, with dreadful and various punishments.”


    “I wished, Sir,” I said, “to know what these various punishments are.” He said,
    “Listen. The various punishments and torments are torments of this present life:
    for some are punished with losses, some with deprivations, some with various sicknesses,
    some with every kind of disorder; some are insulted by the unworthy, and suffer
    in many other ways. For many, being unsettled in their plans, undertake many things,
    and nothing at all advances for them. They say of themselves that they do not
    prosper in their undertakings, and it does not rise up into their heart that they
    have done evil, but they blame the Lord.


    “When, then, they are afflicted with every affliction, then they are handed over
    to me for good discipline, and they are strengthened in the faith of the Lord;
    and the rest of the days of their life they serve the Lord with a pure heart.
    And if they repent, then the evil works that they did rise up into their heart;
    and then they glorify God, saying that he is a righteous judge and that each one
    suffered justly according to his deeds. Thereafter they serve the Lord with a
    pure heart, and they prosper in every work of theirs, receiving from the Lord
    whatever they ask for; and then they glorify the Lord because they were handed
    over to me, and they no longer suffer any of the evils.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The 'shepherd who was speaking with me' is the angelic guide figure in Hermas,
      often identified with the Shepherd/Angel of repentance.
    reason: cultural_note
  - marker: b
    text: '''Angel of punishment'' could also be rendered ''angel of retribution.''
      The Greek τιμωρία denotes punitive justice.'
    reason: lexical_alternative
  - marker: c
    text: '''Torments of this present life'' clarifies that βιωτικαί refers to temporal,
      not eschatological, afflictions.'
    reason: cultural_note
  - marker: d
    text: '''Take on many projects'' could also be ''impose many burdens on themselves''
      or ''attempt many things.'''
    reason: lexical_alternative
  - marker: e
    text: '''It does not rise upon their heart'' is a Semitic-style idiom for ''it
      does not occur to them'' or ''they do not realize.'''
    reason: lexical_alternative
  - marker: f
    text: '''Strengthened in faith in the Lord'' could also be taken as ''strengthened
      in the Lord’s faithfulness.'' The context favors faith directed toward the Lord.'
    reason: lexical_alternative
  - marker: g
    text: Or 'Seeing them being scourged'.
    reason: previous_rendering
  - marker: h
    text: Or 'He takes over those'.
    reason: previous_rendering
  - marker: i
    text: Or 'and they suffer many other such things'.
    reason: previous_rendering
lexical_decisions:
- source_word: μαστιγούμενα
  chosen: scourged
  alternatives:
  - flogged
  - whipped
  lexicon: LSJ
  rationale: Maintains strong punitive imagery of being beaten with lashes; fits the
    scene of harsh correction.
- source_word: ταλαιπωρούμενα
  chosen: harried
  alternatives:
  - made miserable
  - ill-treated
  - afflicted
  lexicon: LSJ
  rationale: Conveys ongoing wretched hardship; paired with scourged to avoid redundancy.
- source_word: ἐβασανίζοντο / βάσανοι
  chosen: tormented / torments
  alternatives:
  - tortured
  - distresses
  lexicon: LSJ
  rationale: Βάσανος/βασανίζω commonly denote severe testing/torment; 'torment' keeps
    intensity without anachronism.
- source_word: ἀνοχή
  chosen: endurance
  alternatives:
  - patience
  - tolerance
  lexicon: BDAG
  rationale: In this moral context, 'endurance' suits the lack of staying power under
    trial.
- source_word: Κύριε (vocative to the shepherd)
  chosen: Sir
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Here it is respectful address to an angelic guide, not a title for God;
    'Sir' avoids theological confusion.
- source_word: ἄσπλαγχνος
  chosen: pitiless
  alternatives:
  - without compassion
  - heartless
  lexicon: LSJ
  rationale: Idiomatic and strong; captures lack of compassion inherent in the term.
- source_word: πικρός
  chosen: harsh
  alternatives:
  - bitter
  - severe
  lexicon: LSJ
  rationale: In moral description of a person, 'harsh' is natural English and preserves
    severity.
- source_word: ὁ ἄγγελος τῆς τιμωρίας
  chosen: the angel of punishment
  alternatives:
  - angel of retribution
  - avenging angel
  lexicon: LSJ
  rationale: τιμωρία is punitive justice; 'punishment' is the most transparent and
    least interpretive rendering.
- source_word: ἐκ τῶν ἀγγέλων τῶν δικαίων
  chosen: one of the righteous angels
  alternatives:
  - from the just angels
  - one of the just angels
  lexicon: BDAG
  rationale: δίκαιος here denotes moral righteousness; 'righteous angels' is clear
    and idiomatic.
- source_word: κείμενος ἐπὶ τῆς τιμωρίας
  chosen: appointed over punishment
  alternatives:
  - set over punishment
  - assigned to punishment
  lexicon: BDAG
  rationale: κείμαι + ἐπί often means to be appointed/established over something.
- source_word: ἀποπλανηθέντας
  chosen: those who have wandered away
  alternatives:
  - those led astray
  - those who strayed
  lexicon: BDAG
  rationale: Keeps the wandering/straying imagery common to shepherding contexts.
- source_word: ἐπιθυμίαις καὶ ἀπάταις τοῦ αἰῶνος τούτου
  chosen: the desires and deceits of this age
  alternatives:
  - lusts and deceptions of this age
  - desires and illusions of this age
  lexicon: BDAG
  rationale: Balances literalness and readability; 'this age' preserves the temporal
    worldview of Hermas.
- source_word: δειναῖς καὶ ποικίλαις (τιμωρίαις)
  chosen: dreadful and various
  alternatives:
  - grievous and manifold
  - terrible and many
  lexicon: LSJ
  rationale: '''Dreadful'' captures the alarming force of δεινός; ''various'' is standard
    for ποικίλος.'
- source_word: βιωτικαί (βάσανοι)
  chosen: of this present life
  alternatives:
  - worldly
  - temporal
  lexicon: BDAG
  rationale: Clarifies that the torments are not eschatological but belong to life
    here and now.
- source_word: ζημίαις
  chosen: losses
  alternatives:
  - penalties
  - forfeitures
  lexicon: BDAG
  rationale: In context of life-punishments, 'losses' (financial/material) fits well.
- source_word: ὑστερήσεσιν
  chosen: deprivations
  alternatives:
  - lack
  - shortages
  lexicon: BDAG
  rationale: Plural abstract captures various forms of lacking; stronger than simple
    'lack'.
- source_word: ἀσθενείαις
  chosen: sicknesses
  alternatives:
  - illnesses
  - weaknesses
  lexicon: BDAG
  rationale: '''Sicknesses'' fits concrete life-punishments and avoids ambiguity of
    ''weaknesses''.'
- source_word: ἀκαταστασία
  chosen: disorder
  alternatives:
  - turmoil
  - instability
  lexicon: BDAG
  rationale: General term for upheaval/disruption; 'disorder' covers societal and
    personal chaos.
- source_word: ὑβριζόμενοι ὑπὸ ἀναξίων
  chosen: insulted by the unworthy
  alternatives:
  - abused by those unworthy
  - treated with insolence by the unworthy
  lexicon: LSJ
  rationale: ὑβρίζω often implies insolent abuse; 'insulted' is concise and retains
    the social humiliation.
- source_word: ἀκαταστατοῦντες ταῖς βουλαῖς
  chosen: being unsettled in their plans
  alternatives:
  - unstable in their schemes
  - in turmoil with their plans
  lexicon: BDAG
  rationale: Reflects inner disorder that yields poor outcomes; keeps 'plans' for
    βουλαί.
- source_word: ἐπιβάλλονται πολλά
  chosen: take on many projects
  alternatives:
  - impose many burdens on themselves
  - attempt many things
  lexicon: LSJ
  rationale: Idiomatic English capturing self-initiated overextension; 'projects'
    renders implicit objects of action.
- source_word: προχωρεῖ
  chosen: advances
  alternatives:
  - makes progress
  - goes forward
  lexicon: BDAG
  rationale: '''Advance'' succinctly expresses success/progress of endeavors.'
- source_word: εὐοδοῦσθαι
  chosen: prosper
  alternatives:
  - succeed
  - be made to prosper
  lexicon: BDAG
  rationale: Standard rendering for flourishing of undertakings; repeated later for
    consistency.
- source_word: οὐκ ἀναβαίνει ἐπὶ τὴν καρδίαν
  chosen: does not rise upon their heart
  alternatives:
  - does not come into their heart
  - does not occur to them
  lexicon: BDAG
  rationale: Retains Semitic-style idiom while understandable; footnote offers smoother
    alternative.
- source_word: αἰτιῶνται τὸν Κύριον
  chosen: they blame the Lord
  alternatives:
  - they accuse the Lord
  - they fault the Lord
  lexicon: BDAG
  rationale: αἰτιάομαι + acc. = blame; 'blame' is clear and idiomatic.
- source_word: παραδίδονται (ἐμοί)
  chosen: are handed over (to me)
  alternatives:
  - are delivered over
  - are entrusted to me
  lexicon: BDAG
  rationale: Paradosis language of transfer to an authority; 'handed over' fits judicial/disciplinary
    context.
- source_word: ἀγαθὴ παιδεία
  chosen: good discipline
  alternatives:
  - beneficial discipline
  - wholesome training
  lexicon: BDAG
  rationale: παιδεία as corrective training; 'discipline' fits moral instruction and
    chastening.
- source_word: ἰσχυροποιοῦνται
  chosen: are strengthened
  alternatives:
  - are made strong
  - are fortified
  lexicon: BDAG
  rationale: Passive of making strong; 'strengthened' is concise and natural.
- source_word: ἡ πίστις τοῦ Κυρίου
  chosen: faith in the Lord
  alternatives:
  - the Lord’s faithfulness
  - the faith of the Lord
  lexicon: BDAG
  rationale: 'Genitive best taken as objective: their faith directed to the Lord;
    see theological note.'
- source_word: δουλεύουσι τῷ Κυρίῳ
  chosen: serve the Lord
  alternatives:
  - are enslaved to the Lord
  - are in service to the Lord
  lexicon: BDAG
  rationale: In devotional/moral context 'serve' communicates devoted obedience without
    importing chattel slavery nuance.
- source_word: μετανοήσωσι
  chosen: repent
  alternatives:
  - change their mind
  - turn back
  lexicon: BDAG
  rationale: Here the context is moral guilt and recognition of evil deeds; 'repent'
    is apt per project guidelines.
- source_word: ἀναβαίνει ἐπὶ τὴν καρδίαν
  chosen: rise up into their heart
  alternatives:
  - come into their heart
  - occur to them
  lexicon: BDAG
  rationale: Keeps the vivid idiom of internal realization/remembering.
- source_word: δίκαιος κριτής
  chosen: righteous judge
  alternatives:
  - just judge
  lexicon: BDAG
  rationale: Standard moral-theological phrase; 'righteous' retained for consistency
    across the project.
- source_word: δικαίως ἔπαθον
  chosen: suffered justly
  alternatives:
  - received what was just
  - were punished justly
  lexicon: BDAG
  rationale: ἔπαθον is broad ('suffered/experienced'); 'suffered justly' matches context
    without over-specifying punishment.
- source_word: εὐοδοῦνται ἐν πάσῃ πράξει
  chosen: prosper in all their work
  alternatives:
  - succeed in every undertaking
  - are made to prosper in all they do
  lexicon: BDAG
  rationale: '''Work'' renders πράξις concretely; ''prosper'' maintains earlier consistency.'
