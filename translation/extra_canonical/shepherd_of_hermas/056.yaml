theological_decisions:
- issue: Addressing the angelic guide as Κύριε
  chosen_reading: Rendered 'Sir' rather than 'Lord'
  alternative_readings:
  - Render 'Lord' as in many NT contexts
  rationale: Here Hermas addresses the shepherd-guide respectfully, not the divine
    Lord. 'Sir' removes potential confusion with God/Christ while reflecting the polite
    vocative.
- issue: ἡ πίστις τοῦ Κυρίου (genitive construal)
  chosen_reading: 'Objective genitive: ''faith in the Lord'''
  alternative_readings:
  - 'Subjective genitive: ''the Lord’s faith/faithfulness'''
  rationale: Hermas consistently exhorts hearers to personal faith and moral steadfastness;
    immediate context is their strengthening to serve. Thus the genitive most naturally
    indicates the object of their faith.
- issue: μετανοέω translation in moral context
  chosen_reading: '''Repent'''
  alternative_readings:
  - '''Change their mind'''
  rationale: The passage deals with recognition of evil deeds and glorifying God as
    a righteous judge. This is specific-sin repentance rather than merely cognitive
    change, fitting the project’s rule for μετανoέω.
- issue: Nature of the punishments (βιωτικαί βάσανοι)
  chosen_reading: Temporal, this-life disciplines
  alternative_readings:
  - Eschatological torments
  rationale: The text explicitly calls them 'of this present life' and lists losses,
    sicknesses, disorder, etc. They function as corrective discipline leading to repentance
    and service.
- issue: Angel of punishment as 'one of the righteous angels'
  chosen_reading: A righteous divine agent appointed to execute corrective justice
  alternative_readings:
  - An evil/demonic tormentor
  - An abstract personification
  rationale: He is explicitly said to be from the righteous angels and 'appointed
    over punishment.' His work conduces to repentance and faith, aligning with corrective
    (not malicious) divine justice.
- issue: δουλεύειν τῷ Κυρίῳ
  chosen_reading: Render as 'serve the Lord'
  alternative_readings:
  - '''Be enslaved to the Lord'''
  rationale: While the verb can carry slave imagery, here the emphasis is loyal service
    with a pure heart. 'Serve' preserves devotion without foregrounding chattel slavery
    imagery absent in context.
