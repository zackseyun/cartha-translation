  text: Βλέπων οὖν αὐτὰ οὕτω μαστιγούμενα καὶ ταλαιπωρούμενα ἐλυπούμην ἐπ' αὐτοῖς,
    ὅτι οὕτως ἐβασανίζοντο καὶ ἀνοχὴν ὅλως οὐκ εἶχον. 2. λέγω τῷ ποιμένι τῷ μετ' ἐμοῦ
    λαλοῦντι· Κύριε, τίς ἐστιν οὗτος ὁ ποιμὴν ὁ [οὕτως] ἄσπλαγχνος καὶ πικρὸς καὶ
    ὅλως μὴ σπλαγχνιζόμενος ἐπὶ τὰ πρόβατα ταῦτα; Οὗτος, φησίν, ἐστὶν ὁ ἄγγελος τῆς
    τιμωρίας· ἐκ δὲ τῶν ἀγγέλων τῶν δικαίων ἐστί, κείμενος δὲ ἐπὶ τῆς τιμωρίας. 3.
    παραλαμβάνει οὖν τοὺς ἀποπλανηθέντας ἀπὸ τοῦ Θεοῦ καὶ πορευθέντας ταῖς ἐπιθυμίαις
    καὶ ἀπάταις τοῦ αἰῶνος τούτου, καὶ τιμωρεῖ αὐτούς, καθὼς ἄξιοί εἰσι, δειναῖς καὶ
    ποικίλαις τιμωρίαις. 4. Ἤθελον, φημί, κύριε, γνῶναι τὰς ποικίλας ταύτας τιμωρίας,
    ποταπαί εἰσιν. Ἄκουε, φησίν· αἱ ποικίλαι τιμωρίαι καὶ βάσανοι βιωτικαί εἰσι βάσανοι·
    τιμωροῦνται γὰρ οἱ μὲν ζημίαις, οἱ δὲ ὑστερήσεσιν, οἱ δὲ ἀσθενείαις ποικίλαις,
    οἱ δὲ [πάσῃ] ἀκαταστασίᾳ, οἱ δὲ ὑβριζόμενοι ὑπὸ ἀναξίων καὶ ἑτέραις πολλαῖς πράξεσι
    πάσχοντες· 5. πολλοὶ γὰρ ἀκαταστατοῦντες ταῖς βουλαῖς αὐτῶν ἐπιβάλλονται πολλά,
    καὶ οὐδὲν αὐτοῖς ὅλως προχωρεῖ. καὶ λέγουσιν ἑαυτοὺς μὴ εὐοδοῦσθαι ἐν ταῖς πράξεσιν
    αὐτῶν, καὶ οὐκ ἀναβαίνει αὐτῶν ἐπὶ τὴν καρδίαν ὅτι ἔπραξαν πονηρά, ἀλλ᾽ αἰτιῶνται
    τὸν Κύριον. 6. ὅταν οὖν θλιβῶσι πάσῃ θλίψει, τότε ἐμοὶ παραδίδονται εἰς ἀγαθὴν
    παιδείαν καὶ ἰσχυροποιοῦνται ἐν τῇ πίστει τοῦ Κυρίου, καὶ τὰς λοιπὰς ἡμέρας τῆς
    ζωῆς αὐτῶν δουλεύουσι τῷ Κυρίῳ ἐν καθαρᾷ καρδίᾳ· ἐὰν δὲ μετανοήσωσι, τότε ἀναβαίνει
    ἐπὶ τὴν καρδίαν αὐτῶν τὰ ἔργα ἃ ἔπραξαν πονηρά, καὶ τότε δοξάζουσι τὸν Θεόν, λέγοντες
    ὅτι δίκαιος κριτής ἐστι καὶ δικαίως ἔπαθον ἕκαστος κατὰ τὰς πράξεις αὐτοῦ· δουλεύουσι
    δὲ λοιπὸν τῷ Κυρίῳ ἐν καθαρᾷ καρδίᾳ αὐτῶν, καὶ εὐοδοῦνται ἐν πάσῃ πράξει αὐτῶν,
    λαμβάνοντες παρὰ τοῦ Κυρίου πάντα ὅσα ἂν αἰτῶνται· καὶ τότε δοξάζουσι τὸν Κύριον
    ὅτι ἐμοὶ παρεδόθησαν, καὶ οὐκέτι οὐδὲν πάσχουσι τῶν πονηρῶν.
