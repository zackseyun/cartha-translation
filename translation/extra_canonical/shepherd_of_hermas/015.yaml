theological_decisions:
- issue: Rendering of μετανοέω/μετάνοια across contexts
  chosen_reading: Use “change their mind” where a cognitive reconsideration is foregrounded
    (vv. 2–3), but retain “repentance” as a technical noun when asking whether there
    is repentance for the rejected stones (v. 5).
  alternative_readings:
  - Translate all instances as “repent/repentance”
  rationale: The immediate contexts in vv. 2–3 emphasize inner recall/reconsideration
    (idioms “come up into the heart,” “comes to remembrance”), while v. 5 asks about
    the availability of the soteriological category. This follows Cartha’s policy
    to preserve cognitive nuance without erasing repentance theology.
  doctrine_reference: 'DOCTRINE.md: μετανοέω → change of mind / repent per context'
- issue: Meaning of εἰς τέλος ἀποστάντες
  chosen_reading: “Finally turned away” = a completed, definitive apostasy
  alternative_readings:
  - “Turned away to the end (of life)”
  rationale: εἰς τέλος commonly intensifies completeness. The vision contrasts temporary
    straying with a decisive abandonment of the living God.
- issue: Referent of ῥῆμα τοῦ δικαίου
  chosen_reading: 'Adjectival: “the righteous word” (the just/righteous message)'
  alternative_readings:
  - 'Substantival: “the word of the Righteous One” (i.e., God/the Lord)'
  rationale: Hermas frequently speaks of “the word” as the proclaimed message; the
    article with an adjective naturally yields “the righteous word.” We note, but
    do not import, a titular reading absent explicit contextual cues.
- issue: Post‑judgment discipline and transfer
  chosen_reading: Render straightforwardly that some, after torment and completing
    the days due to their sins, will be transferred to a much smaller place because
    they shared in the righteous word; possible relief follows if they recall their
    evil deeds.
  alternative_readings:
  - Soften to purely metaphorical discipline in this life
  - Omit transfer language
  rationale: The unit’s repeated “transfer” and “torments” language is part of Hermas’s
    moral-apocalyptic framework. We preserve the tension without systematizing beyond
    the text.
  doctrine_reference: 'PHILOSOPHY.md: Preserve theological tension rather than resolve
    it'
- issue: Baptismal formula εἰς τὸ ὄνομα
  chosen_reading: “Baptized into the name” retains the early Christian initiation
    sense of entering allegiance and identity
  alternative_readings:
  - “Baptized in the name”
  rationale: εἰς + ὄνομα commonly marks movement into a new sphere/ownership. The
    phrasing fits Hermas’s catechetical milieu.
  doctrine_reference: 'Translation philosophy §2: Translate titles; retain meaningful
    idioms'
