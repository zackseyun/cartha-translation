translation:
  text: 'As for the other stones that you saw thrown far from the tower and falling
    into the road and rolling from the road into the pathless places[h]: these are
    those who have believed, but because of their double‑mindedness they abandon their
    true road. Thinking, then, that they are able to find a better road, they go astray
    and suffer misery as they walk in the pathless places.


    But those that are falling into the fire and being burned—these are the ones who
    have finally turned away from the living God, and it no longer came up into their
    heart to change their mind[a] because of the cravings of their lewdness[b] and
    the evils they have done.


    And those others that fall near the waters yet are not able to roll into the water—do
    you want to know who they are? These are the ones who have heard the word and
    want to be baptized into the name[j] of the Lord; then whenever the purity of
    the truth[c] comes back to their remembrance, they change their mind[d] and go
    back again after their evil desires.


    So she finished the explanation of the tower. But, plucking up my courage again,
    I questioned her further whether all these stones that were cast away and did
    not fit into the building of the tower—whether there is repentance for them and
    whether they have a place in this tower. “They have repentance,” she says, “but
    they cannot fit into this tower.


    Rather, they will fit in another place, much smaller[e]; and this will be when
    they have been tormented and have completed the days of their sins[i]. And for
    this reason they will be transferred, because they have shared in the righteous
    word[f]. And then it will happen for them to be transferred from their torments,
    if the evil deeds they have done come up into their heart[g]. But if it does not
    come up into their heart, they are not saved because of their hardness of heart.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek metanoēsai: here rendered “change their mind” to reflect a cognitive
      reconsideration. Traditional “repent” is also possible.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek aselgeia: “lewdness” here; alternatives include “licentiousness”
      or “sensuality.”'
    reason: lexical_alternative
  - marker: c
    text: 'Greek hagnotēs tēs alētheias: literally “the purity/chastity of the truth,”
      i.e., the moral purity that the truth entails.'
    reason: lexical_alternative
  - marker: d
    text: Greek metanoousin in v. 3 denotes reconsidering their intent to be baptized;
      hence “change their mind,” not “repent.”
    reason: lexical_alternative
  - marker: e
    text: “Much smaller” (polu elattōni) can also mean “much lesser/inferior,” indicating
      a humbler place in relation to the tower.
    reason: lexical_alternative
  - marker: f
    text: “The righteous word” may also be read “the word of the Righteous One,” i.e.,
      of God/the Lord.
    reason: lexical_alternative
  - marker: g
    text: “Come up into their heart” is a Semitic idiom for “occur to them,” “come
      to mind,” implying remembrance and acknowledgment.
    reason: cultural_note
  - marker: h
    text: '“Pathless places” renders anodiai—areas without a road. Alternatives: “trackless
      places,” “roadless wastes.”'
    reason: lexical_alternative
  - marker: i
    text: “Complete the days of their sins” is an idiom for undergoing the set period
      due because of their sins.
    reason: cultural_note
  - marker: j
    text: “Baptized into the name” reflects the early baptismal formula (εἰς τὸ ὄνομα).
      Many English versions read “in the name.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνοδίαι
  chosen: pathless places
  alternatives:
  - trackless places
  - roadless places
  - rough places
  lexicon: LSJ
  rationale: Alpha-privative from ὁδός (“road”); in Hermas denotes places without
    a way—“pathless places” keeps the metaphor of leaving the road.
- source_word: διψυχία
  chosen: double‑mindedness
  alternatives:
  - double‑souled
  - wavering
  lexicon: BDAG
  rationale: Term for divided inner commitment common in early Christian paraenesis
    (cf. Jas 1:8). “Double‑mindedness” is transparent and retains moral texture.
- source_word: ῥίπτω / ῥιπτόμενοι
  chosen: thrown
  alternatives:
  - hurled
  - cast
  lexicon: LSJ
  rationale: “Thrown” is plain and matches the violent removal from the tower imagery.
- source_word: κυλίω / κυλισθῆναι
  chosen: roll / roll into
  alternatives:
  - be rolled
  - tumble
  lexicon: LSJ
  rationale: Physical image of stones rolling off the road toward pathless places;
    keeps the concrete motion.
- source_word: ἀφίημι (ἀφίουσιν)
  chosen: abandon
  alternatives:
  - leave
  - forsake
  lexicon: BDAG
  rationale: In moral contexts ἀφίημι can mean to let go/leave behind; “abandon” conveys
    culpable departure from the true road.
- source_word: πλανάω (πλανῶνται)
  chosen: go astray
  alternatives:
  - are misled
  - wander
  lexicon: BDAG
  rationale: Standard moral/metaphorical sense; “go astray” fits the road metaphor
    and retains responsibility.
- source_word: ταλαιπωρέω (ταλαιπωροῦσιν)
  chosen: suffer misery
  alternatives:
  - are distressed
  - are in misery
  - are wretched
  lexicon: LSJ
  rationale: Conveys hardship/misery experienced as consequence of straying.
- source_word: πῦρ / καίω (καιόμενοι)
  chosen: fire / being burned
  alternatives:
  - flame / being consumed
  lexicon: LSJ
  rationale: Maintains vivid punitive imagery.
- source_word: ἀφίστημι (εἰς τέλος ἀποστάντες)
  chosen: finally turned away
  alternatives:
  - completely fell away
  - have apostatized to the end
  lexicon: BDAG
  rationale: εἰς τέλος intensifies the separation—“finally” captures completion/finality
    of apostasy without specifying time of life.
- source_word: μετανοέω (ἀνέβη … τοῦ μετανοῆσαι)
  chosen: change their mind
  alternatives:
  - repent
  lexicon: BDAG
  rationale: 'Cartha policy: cognitive rendering where metanoeō expresses an inner
    reconsideration (“it did not come up into their heart to…”). Here it marks the
    mental turning that no longer occurs.'
- source_word: ἐπιθυμία
  chosen: cravings
  alternatives:
  - desires
  - lusts
  lexicon: BDAG
  rationale: “Cravings” maintains volitional force; collocates with ἀσέλγεια to underscore
    enslaving pull.
- source_word: ἀσέλγεια
  chosen: lewdness
  alternatives:
  - licentiousness
  - sensuality
  - wantonness
  lexicon: BDAG
  rationale: All options are viable; “lewdness” is concrete and morally charged, fitting
    Hermas’s tone.
- source_word: λόγος (τὸν λόγον ἀκούσαντες)
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: Retains early Christian idiom for the proclaimed message.
- source_word: βαπτίζω εἰς τὸ ὄνομα
  chosen: be baptized into the name
  alternatives:
  - be baptized in the name
  lexicon: BDAG
  rationale: εἰς with “name” marks entry/transfer of allegiance; “into the name” preserves
    early baptismal formula.
- source_word: ἁγνότης (ἡ ἁγνότης τῆς ἀληθείας)
  chosen: purity (of the truth)
  alternatives:
  - chastity (of the truth)
  - moral purity
  lexicon: BDAG
  rationale: Ἁγνότης denotes moral purity/chastity; “purity of the truth” preserves
    literalness while implying the ethical demand of the truth.
- source_word: μετανοέω (μετανοοῦσιν)
  chosen: change their mind
  alternatives:
  - reconsider
  - repent
  lexicon: BDAG
  rationale: Here it clearly denotes reconsideration of proceeding to baptism; cognitive
    sense is primary.
- source_word: ἐπιμνῄσκομαι / μνεία (ἔλθῃ εἰς μνείαν)
  chosen: comes back to their remembrance
  alternatives:
  - comes to mind
  - they recall
  lexicon: LSJ
  rationale: Idiomatic rendering that keeps the mental-aspect sequence in v.3.
- source_word: ἐτέλεσεν
  chosen: she finished
  alternatives:
  - she completed
  - she ended
  lexicon: LSJ
  rationale: Plain past narration; preserves feminine subject from context.
- source_word: ἀναιδεύομαι (ἀναιδευσάμενος)
  chosen: plucking up my courage
  alternatives:
  - boldly (even shamelessly)
  - taking heart again
  lexicon: LSJ
  rationale: Middle voice indicates casting off bashfulness; idiomatic English conveys
    renewed boldness without pejorative “shamelessly.”
- source_word: ἐπερωτάω (ἐπηρώτησα)
  chosen: I questioned
  alternatives:
  - I asked
  - I inquired
  lexicon: BDAG
  rationale: Slightly formal “questioned” matches solemn visionary dialogue.
- source_word: ἁρμόζω (μὴ ἁρμόζοντες / ἁρμόσαι)
  chosen: fit / fit into
  alternatives:
  - be suitable for
  - be joined to
  lexicon: LSJ
  rationale: 'Building imagery: stones either fit or do not fit the structure.'
- source_word: μετάνοια
  chosen: repentance
  alternatives:
  - change of mind
  lexicon: BDAG
  rationale: Here it functions as a technical soteriological category (“Is there repentance
    for them?”), so traditional “repentance” is retained.
- source_word: βασανίζω / βασανισθῶσιν, βασάνων
  chosen: be tormented / torments
  alternatives:
  - be tortured/tested
  - pains
  lexicon: BDAG
  rationale: Hermas uses punitive imagery; “torment” reflects severity and matches
    the verbal noun cognate.
- source_word: ἐκπληρόω (ἐκπληρώσωσιν τὰς ἡμέρας)
  chosen: complete the days
  alternatives:
  - fulfill the days
  - serve out the time
  lexicon: LSJ
  rationale: Idiomatic Semitic/Greek expression for undergoing a set period; “complete
    the days” is literal and transparent.
- source_word: μετατίθημι (μετατεθῆναι/μετατεθήσονται)
  chosen: be transferred
  alternatives:
  - be moved
  - be removed
  - be translated
  lexicon: BDAG
  rationale: Consistent rendering of the verb’s two occurrences retains the judicial-relocation
    imagery.
- source_word: μεταλαμβάνω (μετέλαβον)
  chosen: shared in
  alternatives:
  - partook of
  - received a share in
  lexicon: BDAG
  rationale: Relational participation in the message is in view; “shared in” is natural
    English.
- source_word: ῥῆμα τοῦ δικαίου
  chosen: the righteous word
  alternatives:
  - the word of the Righteous One
  - the just word
  lexicon: BDAG
  rationale: Adjectival genitive best fits the phrase in Hermas’s idiom for the proclaimed
    message; avoids importing a title unless context compels it.
- source_word: ἀναβαίνω ἐπὶ τὴν καρδίαν
  chosen: come up into the heart
  alternatives:
  - occur to the heart
  - come to mind
  lexicon: LSJ
  rationale: Preserves Semitic idiom; footnoted to explain the sense of recollection/consideration.
- source_word: σκληροκαρδία
  chosen: hardness of heart
  alternatives:
  - stubbornness of heart
  - obduracy
  lexicon: BDAG
  rationale: Traditional phrase accurately captures moral obstinacy; consistent with
    early Christian usage.
