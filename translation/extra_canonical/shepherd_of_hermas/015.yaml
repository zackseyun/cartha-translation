id: HERM.V.3.vii
reference: Shepherd of Hermas — Vision 3, section vii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Τοὺς δὲ ἑτέρους λίθους, οὓς εἶδες μακρὰν ἀπὸ τοῦ πύργου ῥιπτομένους καὶ πίπτοντας
    εἰς τὴν ὁδὸν καὶ κυλιομένους ἐκ τῆς ὁδοῦ εἰς τὰς ἀνοδίας· οὗτοί εἰσιν οἱ πεπιστευκότες
    μέν, ἀπὸ δὲ τῆς διψυχίας αὐτῶν ἀφίουσιν τὴν ὁδὸν αὐτῶν τὴν ἀληθινήν· δοκοῦντες
    οὖν βελτίονα ὁδὸν δύνασθαι εὑρεῖν, πλανῶνται καὶ ταλαιπωροῦσιν περιπατοῦντες ἐν
    ταῖς ἀνοδίαις. 2. οἱ δὲ πίπτοντες εἰς τὸ πῦρ καὶ καιόμενοι, οὐτοί εἰσιν οἱ εἰς
    τέλος ἀποστάντες τοῦ Θεοῦ τοῦ ζῶντος, καὶ οὐκέτι αὐτοῖς ἀνέβη ἐπὶ τὴν καρδίαν
    τοῦ μετανοῆσαι διὰ τὰς ἐπιθυμίας τῆς ἀσελγείας αὐτῶν καὶ τῶν πονηριῶν ὧν εἰργάσαντο.
    3. τοὺς δὲ ἑτέρους τοὺς πίπτοντας ἐγγὺς τῶν ὑδάτων καὶ μὴ δυναμένους κυλισθῆναι
    εἰς τὸ ὕδωρ θέλεις γνῶναι τίνες εἰσίν; οὐτοί εἰσιν οἱ τὸν λόγον ἀκούσαντες καὶ
    θέλοντες βαπτισθῆναι εἰς τὸ ὄνομα τοῦ Κυρίου· εἶτα ὅταν αὐτοῖς ἔλθῃ εἰς μνείαν
    ἡ ἁγνότης τῆς ἀληθείας, μετανοοῦσιν, καὶ πορεύονται πάλιν ὀπίσω τῶν ἐπιθυμιῶν
    αὐτῶν τῶν πονηρῶν. 4. ἐτέλεσεν οὖν τὴν ἐξήγησιν τοῦ πύργου. 5. ἀναιδευσάμενος
    ἔτι αὐτὴν ἐπηρώτησα, εἰ ἄρα πάντες οἱ λίθοι οὗτοι οἱ ἀποβεβλημένοι καὶ μὴ ἁρμόζοντες
    εἰς τὴν οἰκοδομὴν τοῦ πύργου, εἰ ἔστιν αὐτοῖς μετάνοια καὶ ἔχουσιν τόπον εἰς τὸν
    πύργον τοῦτον. Ἔχουσιν, φησίν, μετάνοιαν, ἀλλὰ εἰς τοῦτον τὸν πύργον οὐ δύνανται
    ἁρμόσαι. 6. ἑτέρῳ δὲ τόπῳ ἁρμόσουσιν πολὺ ἐλάττονι, καὶ τοῦτο ὅταν βασανισθῶσιν
    καὶ ἐκπληρώσωσιν τὰς ἡμέρας τῶν ἁμαρτιῶν αὐτῶν. καὶ διὰ τοῦτο μετατεθήσονται,
    ὅτι μετέλαβον τοῦ ῥήματος τοῦ δικαίου. καὶ τότε αὐτοῖς συμβήσεται μετατεθῆναι
    ἐκ τῶν βασάνων αὐτῶν, ἐὰν ἀναβῇ ἐπὶ τὴν καρδίαν αὐτῶν τὰ ἔργα ἃ εἰργάσαντο πονηρά.
    ἐὰν δὲ μὴ ἀναβῇ ἐπὶ τὴν καρδίαν αὐτῶν, οὐ σώζονται διὰ τὴν σκληροκαρδίαν αὐτῶν.
