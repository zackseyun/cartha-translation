id: HERM.M.12.i
reference: Shepherd of Hermas — Mandate 12, section i
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Λέγει μοι· Ἆρον ἀπὸ σεαυτοῦ πᾶσαν ἐπιθυμίαν πονηράν, ἔνδυσαι δὲ τὴν ἐπιθυμίαν
    τὴν ἀγαθὴν καὶ σεμνήν· ἐνδεδυμένος γὰρ τὴν ἐπιθυμίαν ταύτην μισήσεις τὴν πονηρὰν
    ἐπιθυμίαν καὶ χαλιναγωγήσεις αὐτὴν καθὼς βούλει. 2. ἀγρία γάρ ἐστιν ἡ ἐπιθυμία
    ἡ πονηρὰ καὶ δυσκόλως ἡμεροῦται· φοβερὰ γάρ ἐστι καὶ λίαν τῇ ἀγριότητι αὐτῆς δαπανᾷ
    τοὺς ἀνθρώπους· μάλιστα δὲ ἐὰν ἐμπέσῃ εἰς αὐτὴν δοῦλος Θεοῦ καὶ μὴ ᾖ συνετός,
    δαπανᾶται ὑπ’ αὐτῆς δεινῶς. δαπανᾷ δὲ τοὺς τοιούτους τοὺς μὴ ἔχοντας ἔνδυμα τῆς
    ἐπιθυμίας τῆς ἀγαθῆς, ἀλλὰ ἐμπεφυρμένους τῷ αἰῶνι τούτῳ. τούτους οὖν παραδίδωσιν
    εἰς θάνατον. 3. Ποῖα, φημί, κύριε, ἔργα ἐστὶ τῆς ἐπιθυμίας τῆς πονηρᾶς τὰ παραδιδόντα
    τοὺς ἀνθρώπους εἰς θάνατον; γνώρισόν μοι, ἵνα ἀφέξομαι ἀπ’ αὐτῶν. Ἄκουσον, [φησίν,]
    ἐν ποίοις ἔργοις θανατοῖ ἡ ἐπιθυμία ἡ πονηρὰ τοὺς δούλους τοῦ Θεοῦ.
  language: Greek
  pages:
