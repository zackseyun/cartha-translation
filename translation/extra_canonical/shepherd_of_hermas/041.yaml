theological_decisions:
- issue: Rendering δοῦλος (slave/servant) in moral exhortation
  chosen_reading: Render as 'slave of God'
  alternative_readings:
  - servant of God
  rationale: Hermas emphasizes belonging and subjection to God; per project policy
    we use 'slave' where bonded nature is salient.
  doctrine_reference: 'DOCTRINE.md — Contested terms: δοῦλος'
- issue: Rendering κύριε in address
  chosen_reading: Render as 'sir'
  alternative_readings:
  - Lord
  - master
  rationale: In Hermas, 'κύριε' functions as respectful address to the shepherd/angel,
    not as the covenantal title for God. 'Sir' maintains respect without theological
    confusion.
- issue: Translation of αἰών
  chosen_reading: Translate as 'age' (not 'world')
  alternative_readings:
  - world
  rationale: Maintains early Christian eschatological contrast of 'this age' versus
    the age to come rather than spatializing it as 'world.'
- issue: Scope of 'death' in παραδίδωσιν εἰς θάνατον
  chosen_reading: Render literally as 'hands over to death' without specifying physical
    or spiritual
  alternative_readings:
  - hands over to destruction
  - hands over to spiritual death
  rationale: Hermas leaves the scope unspecified; we preserve the warning without
    narrowing its implication.
- issue: Maintaining 'desire' for both good and evil ἐπιθυμία
  chosen_reading: Use 'desire' for both; do not paraphrase positive as 'aspiration'
    or negative as 'lust' in main text
  alternative_readings:
  - Render evil ἐπιθυμία as 'lust'
  - Render good ἐπιθυμία as 'aspiration' or 'intent'
  rationale: The passage turns on the same faculty ('desire') being directed rightly
    or wrongly; consistent rendering keeps the rhetorical contrast.
