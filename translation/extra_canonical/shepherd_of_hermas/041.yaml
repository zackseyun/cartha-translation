translation:
  text: 'He says to me: Remove from yourself every evil desire[h], but clothe yourself
    with the desire that is good and dignified[a]; for when you are clothed with this
    desire, you will hate the evil desire and you will bridle[b] it as you wish.


    2. For evil desire is wild and is hard to tame; for it is fearsome, and by its
    savagery it consumes[c] people—especially if a slave of God falls into it and
    is not sensible, he is grievously consumed by it. It consumes such as these: those
    who do not have the garment of good desire, but are mixed up with this age[d].
    These, therefore, it hands over to death.


    3. “What deeds of evil desire,” I say, “hand people over to death, sir[e]? Make
    them known to me, so that I may keep away from them.” “Listen,” [he says][f],
    “by what deeds evil desire puts the slaves of God[g] to death.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or honorable; or reverent. Greek σεμνή emphasizes dignity/respectability.
    reason: lexical_alternative
  - marker: b
    text: Greek χαλιναγωγήσεις, literally ‘you will put a bridle on’; hence, restrain/control.
    reason: lexical_alternative
  - marker: c
    text: Greek δαπανᾷ can also mean ‘devours’ or ‘wastes’; ‘consumes’ preserves the
      destructive sense.
    reason: lexical_alternative
  - marker: d
    text: 'Greek ἐμπεφυρμένους τῷ αἰῶνι τούτῳ: literally ‘mixed/kneaded into this
      age’; hence, entangled with/steeped in this age.'
    reason: lexical_alternative
  - marker: e
    text: κύριε here is a respectful address to the messenger, best rendered ‘sir’
      to avoid confusion with the divine title ‘Lord.’
    reason: cultural_note
  - marker: f
    text: The words ‘he says’ (φησίν) are bracketed in the Greek, indicating a textual
      uncertainty in some witnesses.
    reason: textual_variant
  - marker: g
    text: ‘Slaves of God’ renders δοῦλοι Θεοῦ; see translation philosophy on preserving
      bonded belonging where context is salient.
    reason: cultural_note
  - marker: h
    text: ‘Desire’ translates ἐπιθυμία, which can be good or evil; some English versions
      use ‘lust’ for the negative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἆρον (from αἴρω)
  chosen: Remove
  alternatives:
  - Put away
  - Take away
  lexicon: BDAG
  rationale: Context commands getting rid of something from oneself; 'remove' captures
    separation without physical lifting connotations.
- source_word: ἐπιθυμία
  chosen: desire
  alternatives:
  - lust
  - craving
  lexicon: BDAG
  rationale: Term ranges from neutral/positive to negative depending on context. Here
    both good and evil are contrasted; 'desire' accommodates both.
- source_word: πονηρά
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: BDAG
  rationale: Moral quality is in view; 'evil' is clear and weighty without sounding
    archaic.
- source_word: ἔνδυσαι / ἐνδεδυμένος
  chosen: clothe yourself / clothed
  alternatives:
  - put on / wearing
  lexicon: BDAG
  rationale: Clothing imagery is explicit and is echoed by 'garment' later; 'clothe
    yourself' preserves the metaphor.
- source_word: ἀγαθὴ καὶ σεμνή
  chosen: good and dignified
  alternatives:
  - good and honorable
  - good and reverent
  - good and respectable
  lexicon: BDAG
  rationale: σεμνός conveys dignity/respectability. 'Dignified' fits the moral register
    and pairs naturally with 'good'.
- source_word: μισήσεις
  chosen: you will hate
  alternatives:
  - you will detest
  - you will loathe
  lexicon: BDAG
  rationale: Simple, strong English equivalent for active moral aversion.
- source_word: χαλιναγωγήσεις
  chosen: you will bridle
  alternatives:
  - you will restrain
  - you will control
  lexicon: LSJ
  rationale: The verb literally means to put a bridle on; preserving the equestrian
    metaphor conveys forceful moral mastery.
- source_word: καθὼς βούλει
  chosen: as you wish
  alternatives:
  - as you will
  - as you choose
  lexicon: BDAG
  rationale: Idiomatic and clear, with the nuance of volition intact.
- source_word: ἀγρία
  chosen: wild
  alternatives:
  - savage
  - untamed
  lexicon: BDAG
  rationale: Describes untamed, feral quality; 'wild' pairs well with 'tame' in the
    next clause.
- source_word: ἡμεροῦται
  chosen: is tamed
  alternatives:
  - is domesticated
  - is brought under control
  lexicon: LSJ
  rationale: Antithesis to 'wild'; 'tamed' keeps the animal-training metaphor.
- source_word: φοβερὰ
  chosen: fearsome
  alternatives:
  - terrible
  - dreadful
  lexicon: BDAG
  rationale: Conveys something that inspires fear; 'fearsome' is vivid and not archaic.
- source_word: ἀγριότης
  chosen: savagery
  alternatives:
  - wildness
  - ferocity
  lexicon: LSJ
  rationale: Heightens the wild/animal metaphor; 'savagery' fits the destructive nuance.
- source_word: δαπανᾷ
  chosen: consumes
  alternatives:
  - devours
  - wastes
  - ruins
  lexicon: BDAG
  rationale: Metaphorical usage of 'spend away, waste' → 'consume'; 'consumes' communicates
    gradual or total destruction without narrowing the image.
- source_word: ἐμπέσῃ εἰς αὐτὴν
  chosen: falls into it
  alternatives:
  - falls into its power
  - falls prey to it
  lexicon: BDAG
  rationale: Idiomatic rendering of 'fall into' with an object; keeps the original
    prepositional structure.
- source_word: δοῦλος Θεοῦ
  chosen: slave of God
  alternatives:
  - servant of God
  lexicon: BDAG
  rationale: The bonded belonging implied by δοῦλος is salient; 'slave' preserves
    that theological and ethical force per project guidelines.
- source_word: συνετός
  chosen: sensible
  alternatives:
  - prudent
  - understanding
  lexicon: BDAG
  rationale: In moral exhortation, 'sensible' captures practical discernment without
    sounding archaic.
- source_word: δεινῶς
  chosen: grievously
  alternatives:
  - terribly
  - severely
  lexicon: BDAG
  rationale: Adverb intensifies the harm; 'grievously' carries moral and experiential
    weight.
- source_word: ἔνδυμα
  chosen: garment
  alternatives:
  - clothing
  - dress
  lexicon: BDAG
  rationale: Matches the clothing metaphor introduced earlier with ἔνδυσαι.
- source_word: ἐμπεφυρμένους
  chosen: mixed up with
  alternatives:
  - entangled with
  - steeped in
  - smeared with
  lexicon: Lampe (Patristic Greek Lexicon)
  rationale: Perfect passive of ἐμπιφύρω ('to mix in, to knead into'); 'mixed up with'
    preserves the vivid image of being blended into this age.
- source_word: αἰών
  chosen: age
  alternatives:
  - world
  lexicon: BDAG
  rationale: Hermas shares the early Christian contrast of 'this age' vs. the age
    to come; 'age' keeps the eschatological nuance.
- source_word: παραδίδωσιν εἰς θάνατον
  chosen: hands over to death
  alternatives:
  - delivers to death
  - betrays to death
  lexicon: BDAG
  rationale: '''Hands over'' is the standard rendering of παραδίδωμι with judicial/penal
    overtones; keeps the stark warning.'
- source_word: ἔργα
  chosen: deeds
  alternatives:
  - works
  - acts
  lexicon: BDAG
  rationale: '''Deeds'' fits moral actions in paraenetic discourse and is clear in
    contemporary English.'
- source_word: γνώρισόν μοι
  chosen: Make them known to me
  alternatives:
  - Reveal them to me
  - Show me
  lexicon: BDAG
  rationale: Direct and transparent imperative with a dative of person.
- source_word: ἀφέξομαι ἀπ’ αὐτῶν
  chosen: I may keep away from them
  alternatives:
  - I may abstain from them
  lexicon: BDAG
  rationale: '''Keep away'' is accessible and conveys separation; ''abstain'' is acceptable
    but slightly more formal.'
- source_word: Ἄκουσον
  chosen: Listen
  alternatives:
  - Hear
  lexicon: BDAG
  rationale: Natural English imperative in direct address.
- source_word: θανατοῖ
  chosen: puts to death
  alternatives:
  - kills
  lexicon: BDAG
  rationale: Causative nuance is explicit; 'puts to death' is more formal and solemn
    than 'kills' in this moral context.
- source_word: κύριε
  chosen: sir
  alternatives:
  - lord
  - Lord
  lexicon: BDAG
  rationale: Here a respectful form of address to the angelic shepherd, not the divine
    title; 'sir' avoids confusion while reflecting politeness.
