translation:
  text: '“Since,” I say, “sir,[6] I have not understood at all about the time of deception
    and delight[1] and torment,[2] make it more plain to me.”


    He answered me and says, “Your foolishness is persistent, and you are unwilling
    to cleanse your heart and to serve God. Watch out lest the time be fulfilled,
    and you be found a fool. Listen then,” he says, “as you desire, so that you may
    understand these things.


    “The person who delights and is deceived for a single day and does what he wants
    has clothed himself with much foolishness and does not perceive the deed he is
    doing; for on the next day he forgets what he did the day before. For delight
    and deception have no memory because of the foolishness with which he has been
    clothed. But when punishment and torment cling to a person for one day, he is
    punished and tormented for up to a year; for punishment and torment have great
    memory.


    “So, being tormented and punished the whole year, he at last[5] remembers the
    delight and the deception, and he knows that because of them he suffers the evil
    things. Every person who delights and is deceived is tormented in this way, because,
    though they had life, they have handed themselves over to death.


    “‘What delights, sir,’ I say, ‘are harmful?’ He says, ‘Every deed is a delight
    to a person, whatever he does with pleasure. For even the hot‑tempered man, by
    giving his own passion its fill, takes delight; and the adulterer and the drunkard
    and the slanderer and the liar and the greedy person and the defrauder and the
    one doing things like these, by giving his own disease its fill, are satisfied—he
    therefore delights in his act. All these delights are harmful to the slaves of
    God.[3] Because of these deceptions, those who are punished and tormented suffer.


    “‘But there are also delights that save people; for many, by doing good things,
    take delight, being carried along by their own pleasure. This delight, therefore,
    is beneficial for the slaves of God, and it secures life for such a person;[6]
    but the harmful delights previously mentioned procure torments and punishments
    for them; and if they persist and do not repent,[4] they procure death for themselves.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: The Greek τρυφή can mean self‑indulgence, luxury, or sensuous living; here
      it is rendered “delight” to allow both negative (vv. 3, 6) and positive (v.
      7) uses.
    reason: lexical_alternative
  - marker: '[2]'
    text: βάσανος is translated “torment”; an alternative is “torture,” but the focus
      here is on the suffered state rather than the method.
    reason: lexical_alternative
  - marker: '[3]'
    text: δοῦλοι τοῦ Θεοῦ is rendered “slaves of God,” preserving the ownership nuance;
      many translations read “servants.”
    reason: lexical_alternative
  - marker: '[4]'
    text: μετανοέω is translated “repent.” An alternative is “change their mind,”
      but in specific‑sin contexts this project retains “repent.”
    reason: lexical_alternative
  - marker: '[5]'
    text: The adverb ποτὲ here is rendered “at last/at length,” indicating that under
      prolonged suffering the person finally remembers prior indulgence.
    reason: lexical_alternative
  - marker: '[6]'
    text: κύριε is a respectful address, here rendered “sir” (not the divine title
      “Lord”). “Secures life” translates περιποιεῖται, which can also mean “procures”
      or “obtains.”
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριε (voc.)
  chosen: sir
  alternatives:
  - lord
  - master
  lexicon: BDAG; LSJ
  rationale: In Hermas this is a respectful address to the angelic shepherd, not the
    divine title. Rendering as “sir” avoids confusion with the covenantal title “Lord.”
- source_word: ἀπάτη
  chosen: deception
  alternatives:
  - delusion
  - deceit
  lexicon: BDAG; LSJ
  rationale: The context contrasts deceptive pleasures with punishments; “deception”
    captures the misled state and the active misleading quality.
- source_word: τρυφή / τρυφᾷ / τρυφαί
  chosen: delight
  alternatives:
  - self‑indulgence
  - luxury
  - voluptuous living
  lexicon: BDAG; LSJ
  rationale: The term can be negative (self‑indulgence) or positive (v.7). “Delight”
    flexibly covers both, while footnotes note the more morally loaded alternatives.
- source_word: βάσανος
  chosen: torment
  alternatives:
  - torture
  lexicon: BDAG; LSJ
  rationale: “Torment” suits experiential suffering without implying judicial torture
    methods; pairs well with τιμωρία (punishment).
- source_word: τιμωρία
  chosen: punishment
  alternatives:
  - retribution
  lexicon: BDAG; LSJ
  rationale: Judicial/disciplinary suffering contrasted with deceptive pleasures;
    “punishment” is the natural English equivalent.
- source_word: ἀφροσύνη / ἄφρων
  chosen: foolishness / a fool
  alternatives:
  - senselessness / senseless
  lexicon: BDAG; LSJ
  rationale: Common moral category in wisdom tradition; “foolishness” preserves the
    ethical tone.
- source_word: παράμονος
  chosen: persistent
  alternatives:
  - constant
  - abiding
  lexicon: LSJ
  rationale: 'Describes an enduring state: “Your foolishness is persistent.”'
- source_word: καθαρίσαι τὴν καρδίαν
  chosen: cleanse your heart
  alternatives:
  - purify your heart
  lexicon: BDAG
  rationale: Maintains moral/ritual imagery of inner cleansing without archaic tone.
- source_word: δουλεύειν (τῷ Θεῷ)
  chosen: serve (God)
  alternatives:
  - be enslaved to God
  lexicon: BDAG
  rationale: Idiomatic English for devotion; the servile status is expressed explicitly
    later with δοῦλοι.
- source_word: χρόνος πληρωθῇ
  chosen: the time be fulfilled
  alternatives:
  - the time be completed
  - the time run its course
  lexicon: BDAG
  rationale: Echoes apocalyptic idiom without importing NT phrasing beyond the Greek’s
    sense.
- source_word: ἐνδύω (ἐνδέδυται)
  chosen: has clothed himself (with)
  alternatives:
  - is clothed with
  - has put on
  lexicon: BDAG; LSJ
  rationale: Keeps the vivid metaphor of wearing foolishness.
- source_word: πρᾶξις
  chosen: deed
  alternatives:
  - act
  - practice
  lexicon: BDAG
  rationale: Concrete individual action suits the contrast with forgetfulness.
- source_word: μνήμη/μνήμας ἔχειν
  chosen: have memory
  alternatives:
  - remember/retentive memory
  lexicon: BDAG; LSJ
  rationale: 'Preserves the personification: pleasures lack memory; punishments have
    great memory.'
- source_word: κολλάω (κολληθῇ)
  chosen: cling (to)
  alternatives:
  - stick to
  - attach to
  lexicon: BDAG; LSJ
  rationale: “Cling” is vivid and idiomatic for afflictions adhering to a person.
- source_word: ἐνιαυτός
  chosen: year
  alternatives:
  - full year
  lexicon: BDAG
  rationale: Plain temporal unit; “up to a year” renders μέχρις ἐνιαυτοῦ.
- source_word: πονηρά (τὰ)
  chosen: the evil things
  alternatives:
  - the bad things
  - harmful things
  lexicon: BDAG
  rationale: Moral category is intended; “evil” preserves the ethical weight.
- source_word: παραδίδωμι (ἑαυτοὺς παραδεδώκασι)
  chosen: have handed themselves over
  alternatives:
  - have delivered themselves up
  lexicon: BDAG
  rationale: Active self‑surrender to death is emphasized.
- source_word: ὀξύχολος
  chosen: hot‑tempered (man)
  alternatives:
  - quick‑tempered man
  - irascible person
  lexicon: LSJ
  rationale: Captures impulsive anger implied by the term.
- source_word: κατάλαλος
  chosen: slanderer
  alternatives:
  - backbiter
  lexicon: BDAG; LSJ
  rationale: Common moral term; “slanderer” is clear and direct.
- source_word: πλεονέκτης
  chosen: greedy person
  alternatives:
  - covetous person
  lexicon: BDAG
  rationale: “Greedy” is contemporary and accurate; avoids archaic “covetous.”
- source_word: ἀποστερητής
  chosen: defrauder
  alternatives:
  - robber
  - cheat
  lexicon: BDAG; LSJ
  rationale: Emphasizes deprivation by fraud, not mere theft by force.
- source_word: πάθος
  chosen: passion
  alternatives:
  - impulse
  - desire
  lexicon: BDAG
  rationale: In moral vice lists, πάθος often denotes uncontrolled passion; “passion”
    works with the image of giving it its fill.
- source_word: νόσος (metaphor)
  chosen: disease
  alternatives:
  - sickness
  - malady
  lexicon: BDAG; LSJ
  rationale: Vice as illness is a deliberate metaphor; “disease” preserves the sting.
- source_word: τὸ ἱκανὸν ποιεῖν
  chosen: give its fill
  alternatives:
  - satisfy
  - give it its due/enough
  lexicon: BDAG; LSJ
  rationale: Idiomatic rendering of doing ‘enough’ for a passion/illness—i.e., indulging
    it.
- source_word: ἡδονή
  chosen: pleasure
  alternatives:
  - enjoyment
  lexicon: BDAG
  rationale: Neutral term for what carries them along in either good or bad acts.
- source_word: σύμφορος
  chosen: beneficial
  alternatives:
  - advantageous
  lexicon: BDAG; LSJ
  rationale: Suited to moral instruction about what helps God’s slaves.
- source_word: περιποιεῖται / περιποιοῦνται
  chosen: secures / procure
  alternatives:
  - obtains / bring upon themselves
  lexicon: BDAG; LSJ
  rationale: “Secures life” and “procure torments/death” preserve the causative sense.
- source_word: μετανοέω
  chosen: repent
  alternatives:
  - change their mind
  - change their thinking
  lexicon: BDAG
  rationale: Here the call is to turn from specific sinful practices; per project
    rules, “repent” is used in specific‑sin contexts.
- source_word: δοῦλοι (τοῦ Θεοῦ)
  chosen: slaves (of God)
  alternatives:
  - servants (of God)
  lexicon: BDAG
  rationale: Maintains the strong belonging/ownership nuance of δοῦλος; Hermas’s moral
    vision emphasizes God’s ownership of his people.
