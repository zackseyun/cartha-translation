id: HERM.S.6.v
reference: Shepherd of Hermas — Similitude 6, section v
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ὅτι, φημί, κύριε, οὐ νενόηκα ὅλως περὶ τοῦ χρόνου τῆς ἀπάτης καὶ τρυφῆς καὶ
    βασάνου, τηλαυγέστερόν μοι δήλωσον. 2. ἀποκριθείς μοι λέγει· Ἡ ἀφροσύνη σου παράμονός
    ἐστι, καὶ οὐ θέλεις σου τὴν καρδίαν καθαρίσαι καὶ δουλεύειν τῷ Θεῷ. βλέπε, [φησί,]
    μήποτε ὁ χρόνος πληρωθῇ, καὶ σὺ ἄφρων εὑρεθῇς. ἄκουε οὖν, [φησί,] καθὼς βούλει,
    ἵνα νοήσῃς αὐτά. 3. ὁ τρυφῶν καὶ ἀπατώμενος μίαν ἡμέραν καὶ πράσσων ἃ βούλεται
    πολλὴν ἀφροσύνην ἐνδέδυται καὶ οὐ νοεῖ τὴν πρᾶξιν ἣν ποιεῖ· εἰς τὴν αὔριον ἐπιλανθάνεται
    γὰρ τί πρὸ μιᾶς ἔπραξεν· ἡ γὰρ τρυφὴ καὶ ἀπάτη μνήμας οὐκ ἔχει διὰ τὴν ἀφροσύνην
    ἣν ἐνδέδυται· ἡ δὲ τιμωρία καὶ ἡ βάσανος ὅταν κολληθῇ τῷ ἀνθρώπῳ μίαν ἡμέραν,
    μέχρις ἐνιαυτοῦ τιμωρεῖται καὶ βασανίζεται· μνήμας γὰρ μεγάλας ἔχει ἡ τιμωρία
    καὶ ἡ βάσανος. 4. βασανιζόμενος οὖν καὶ τιμωρούμενος ὅλον τὸν ἐνιαυτὸν μνημονεύει
    ποτὲ τῆς τρυφῆς καὶ ἀπάτης, καὶ γινώσκει ὅτι δι᾽ αὐτὰ πάσχει τὰ πονηρά. πᾶς οὖν
    ἄνθρωπος ὁ τρυφῶν καὶ ἀπατώμενος οὕτω βασανίζεται, ὅτι ἔχοντες ζωὴν εἰς θάνατον
    ἑαυτοὺς παραδεδώκασι. 5. Ποῖαι, φημί, κύριε, τρυφαί εἰσι βλαβεραί; Πᾶσα, φησί,
    πρᾶξις τρυφή ἐστι τῷ ἀνθρώπῳ, ὃ ἐὰν ἡδέως ποιῇ· καὶ γὰρ ὁ ὀξύχολος τῷ ἑαυτοῦ πάθει
    τὸ ἱκανὸν ποιῶν τρυφᾷ· καὶ ὁ μοιχὸς καὶ ὁ μέθυσος καὶ ὁ κατάλαλος καὶ ὁ ψεύστης
    καὶ ὁ πλεονέκτης καὶ ὁ ἀποστερητὴς καὶ ὁ τούτοις τὰ ὅμοια ποιῶν τῇ ἰδίᾳ νόσῳ τὸ
    ἱκανὸν ποιεῖ· τρυφᾷ οὖν ἐπὶ τῇ πράξει αὐτοῦ. 6. αὗται πᾶσαι αἱ τρυφαὶ βλαβεραί
    εἰσι τοῖς δούλοις τοῦ Θεοῦ. διὰ ταύτας οὖν τὰς ἀπάτας πάσχουσιν οἱ τιμωρούμενοι
    καὶ βασανιζόμενοι. 7. εἰσὶν δὲ καὶ τρυφαὶ σώζουσαι τοὺς ἀνθρώπους· πολλοὶ γὰρ
    ἀγαθὰ ἐργαζόμενοι τρυφῶσι τῇ ἑαυτῶν ἡδονῇ φερόμενοι. αὕτη οὖν ἡ τρυφὴ σύμφορός
    ἐστι τοῖς δούλοις τοῦ Θεοῦ καὶ ζωὴν περιποιεῖται τῷ ἀνθρώπῳ τῷ τοιούτῳ· αἱ δὲ
    βλαβεραὶ τρυφαὶ αἱ προειρημέναι βασάνους καὶ τιμωρίας αὐτοῖς περιποιοῦνται· ἐὰν
    δὲ ἐπιμένωσι καὶ μὴ μετανοήσωσι, θάνατον ἑαυτοῖς περιποιοῦνται.
