theological_decisions:
- issue: Form of address for κύριος in Hermas
  chosen_reading: Render vocative κύριε as “sir,” not “Lord.”
  alternative_readings:
  - Translate as “Lord” following NT convention
  - Render as “master”
  rationale: In this context Hermas addresses an angelic shepherd, not God. Using
    “sir” prevents conflation with the divine title while preserving respect.
- issue: δοῦλοι τοῦ Θεοῦ
  chosen_reading: Translate as “slaves of God.”
  alternative_readings:
  - Servants of God
  rationale: The project prefers “slave” where belonging is salient. Hermas’s paraenesis
    hinges on God’s claim over believers; the stronger term is theologically accurate.
  doctrine_reference: 'DOCTRINE.md — Contested terms: δοῦλος'
- issue: μετανοέω rendering
  chosen_reading: Use “repent.”
  alternative_readings:
  - change their mind/thinking
  rationale: The context is concrete sinful practices; per project rule, “repent”
    is retained for specific‑sin contexts.
  doctrine_reference: 'DOCTRINE.md — Contested terms: μετανοέω'
- issue: σώζουσαι τρυφαί and ζωὴν περιποιεῖται
  chosen_reading: Render straightforwardly as “delights that save people” and “secures
    life.”
  alternative_readings:
  - Delights that benefit people (soften ‘save’)
  - Brings well‑being (for ‘life’)
  rationale: Hermas’s moral soteriology links deeds, dispositions, and ‘life.’ We
    preserve the direct salvific language rather than harmonize with later doctrinal
    systems.
