translation:
  text: 'But in the third vision you saw her younger, beautiful, and cheerful, and
    her appearance was lovely.


    For just as when a good message comes to someone who is grieving, at once he forgets
    his former sorrows and accepts nothing else except the message he has heard, and
    from then on he is strengthened for the good, and his spirit is renewed because
    of the joy he has received—so also you have received a renewal of your spirits
    when you saw these good things.


    And because you saw her sitting on a stool, the position is firm: for the stool
    has four legs and stands solidly; for the world too is held together by four elements.


    Those, therefore, who have repented completely will be new and firmly founded—those
    who have repented from their whole heart. You have the revelation in full; ask
    nothing further about revelation. But if anything is needed, it will be revealed
    to you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'good message' translates ἀγγελία ἀγαθή, which can also mean
      'good news' or 'good tidings.'
    reason: lexical_alternative
  - marker: b
    text: '''Stool'' renders συμψέλιον, a small four-legged seat; ''bench'' is another
      possibility.'
    reason: lexical_alternative
  - marker: c
    text: '''Four elements'' reflects ancient cosmology (earth, water, air, fire),
      used here to symbolize firmness and order.'
    reason: cultural_note
  - marker: d
    text: '''Will be new'' translates νέοι ἔσονται; it could also be read ''will be
      young.'' ''New'' aligns with the renewal imagery in this context.'
    reason: lexical_alternative
  - marker: e
    text: '''You have the revelation in full'' reflects the idiomatic sense of ἀπέχεις
      as ''to have in full'' (commercial idiom), not ''to be far from.'''
    reason: cultural_note
lexical_decisions:
- source_word: ὁράσει
  chosen: vision
  alternatives:
  - appearance
  - sight
  lexicon: LSJ
  rationale: Standard term for a seen revelation; preserves apocalyptic register.
- source_word: νεωτέραν
  chosen: younger
  alternatives:
  - newer
  - more youthful
  lexicon: LSJ
  rationale: Comparative of νέος; in context of the woman's changing appearance, age/youth
    is foregrounded.
- source_word: καλήν (x2)
  chosen: beautiful
  alternatives:
  - fair
  - good
  lexicon: LSJ
  rationale: Here describes physical/visible comeliness rather than moral goodness;
    'beautiful' keeps aesthetic sense.
- source_word: ἱλαράν
  chosen: cheerful
  alternatives:
  - gracious
  - bright
  - joyful
  lexicon: LSJ
  rationale: Describes demeanor; 'cheerful' conveys the pleasant, joyful bearing.
- source_word: μορφή
  chosen: appearance
  alternatives:
  - form
  - shape
  lexicon: LSJ
  rationale: Refers to outward look rather than metaphysical 'form'; 'appearance'
    is clear and natural.
- source_word: λυπουμένῳ
  chosen: grieving
  alternatives:
  - sorrowing
  - distressed
  lexicon: BDAG
  rationale: Captures the ongoing experience of sorrow in an English participial form.
- source_word: ἀγγελία ἀγαθή
  chosen: good message
  alternatives:
  - good news
  - good tidings
  lexicon: LSJ
  rationale: Avoids importing later technical sense of 'Gospel' while conveying positive
    report.
- source_word: εὐθύς
  chosen: at once
  alternatives:
  - immediately
  - straightway
  lexicon: BDAG
  rationale: Common adverb of immediacy; idiomatic modern English.
- source_word: ἐπελάθετο
  chosen: he forgot
  alternatives:
  - he ceased to remember
  - he let go of
  lexicon: BDAG
  rationale: Aorist of ἐπιλανθάνομαι; 'forgot' is the straightforward equivalent.
- source_word: προτέρων λυπῶν
  chosen: former sorrows
  alternatives:
  - earlier griefs
  - previous troubles
  lexicon: LSJ
  rationale: Genitive of the earlier afflictions; 'former sorrows' is concise and
    natural.
- source_word: προσδέχεται
  chosen: accepts
  alternatives:
  - awaits
  - welcomes
  - concerns himself with
  lexicon: BDAG
  rationale: In context after hearing the message, the sense is taking in / embracing
    nothing else; 'accepts' captures this succinctly.
- source_word: ἰσχυροποιεῖται
  chosen: is strengthened
  alternatives:
  - is made strong
  - is fortified
  lexicon: LSJ
  rationale: Causative/passive sense of being made strong; preserves the moral strengthening
    idea.
- source_word: εἰς τὸ ἀγαθόν
  chosen: for the good
  alternatives:
  - toward the good
  - for what is good
  lexicon: BDAG
  rationale: Prepositional phrase marking direction/purpose; 'for the good' is concise.
- source_word: ἀνανεοῦται (τὸ πνεῦμα)
  chosen: is renewed
  alternatives:
  - is made new again
  - is refreshed
  lexicon: BDAG
  rationale: Standard rendering of renewal language; keeps the spiritual/moral nuance.
- source_word: ἀνανέωσιν
  chosen: renewal
  alternatives:
  - a making new
  - refreshing
  lexicon: BDAG
  rationale: Abstract noun matching the verb 'renew'; consistent with the previous
    clause.
- source_word: πνευμάτων (ὑμῶν)
  chosen: spirits
  alternatives:
  - spirit (collective)
  - inner selves
  lexicon: BDAG
  rationale: Retains the plural as in Greek, respecting Hermas' idiom for the inner
    life of multiple persons.
- source_word: συμψέλιον
  chosen: stool
  alternatives:
  - bench
  - seat
  lexicon: LSJ
  rationale: Context mentions four legs and standing firm; 'stool' best fits a four-legged
    small seat.
- source_word: ἰσχυρὰ ἡ θέσις
  chosen: the position is firm
  alternatives:
  - the seat is set firmly
  - the place is strong
  lexicon: LSJ
  rationale: Focuses on the firmness of the seating/setting as explanation of the
    symbol.
- source_word: ὁ κόσμος
  chosen: the world
  alternatives:
  - the cosmos
  lexicon: BDAG
  rationale: In a cosmological statement about elements, 'world' is idiomatic while
    retaining scope.
- source_word: κρατεῖται
  chosen: is held together
  alternatives:
  - is sustained
  - is maintained
  lexicon: BDAG
  rationale: Transmits the idea of being kept in its state by something; 'held together'
    suits the four-element motif.
- source_word: στοιχείων
  chosen: elements
  alternatives:
  - elemental principles
  lexicon: BDAG
  rationale: Refers to the classical four elements (earth, water, air, fire) in ancient
    cosmology.
- source_word: μετανοέω
  chosen: repent
  alternatives:
  - change one's mind
  - turn back
  lexicon: BDAG
  rationale: Moral/volitional context; per project guidance, 'repent' is preferred
    in specific-sin/moral exhortation contexts.
- source_word: ὁλοτελῶς
  chosen: completely
  alternatives:
  - entirely
  - fully
  lexicon: LSJ
  rationale: Adverb of totality; 'completely' is clear and forceful.
- source_word: νέοι (ἔσονται)
  chosen: new
  alternatives:
  - young
  lexicon: LSJ
  rationale: Given the renewal theme, 'new' better conveys moral/spiritual newness;
    'young' is a viable alternative but less fitting with 'founded' that follows.
- source_word: τεθεμελιωμένοι
  chosen: firmly founded
  alternatives:
  - established
  - set on a foundation
  lexicon: BDAG
  rationale: Perfect participle of θεμελιόω; building imagery suggests stability;
    'firmly founded' keeps the metaphor.
- source_word: ἐξ ὅλης καρδίας
  chosen: from their whole heart
  alternatives:
  - with all their heart
  - wholeheartedly
  lexicon: BDAG
  rationale: Literal phrasing preserves biblical register and intensity of devotion.
- source_word: ἀπέχεις
  chosen: you have (in full)
  alternatives:
  - you possess fully
  - you are paid in full
  lexicon: BDAG
  rationale: Commercial idiom of having in full; here, 'have the revelation in full'
    captures the sense.
- source_word: ὁλοτελῆ (ἀποκάλυψιν)
  chosen: complete
  alternatives:
  - entire
  - full
  lexicon: LSJ
  rationale: Adjective of wholeness; 'complete' communicates the totality of the revelation
    given.
- source_word: ἀποκάλυψις
  chosen: revelation
  alternatives:
  - disclosure
  - unveiling
  lexicon: BDAG
  rationale: Standard theological term; also matches Hermas' visionary setting.
- source_word: μηκέτι μηδὲν αἰτήσεις
  chosen: ask nothing further
  alternatives:
  - no longer ask anything
  - do not request anything more
  lexicon: BDAG
  rationale: Captures the prohibition of further inquiry; 'further' clarifies 'μηκέτι'
    without over-expansion.
- source_word: δέῃ
  chosen: is needed
  alternatives:
  - is necessary
  - should be required
  lexicon: BDAG
  rationale: Conditional necessity; 'is needed' keeps it succinct.
- source_word: ἀποκαλυφθήσεταί σοι
  chosen: it will be revealed to you
  alternatives:
  - it will be disclosed to you
  - it will be unveiled to you
  lexicon: BDAG
  rationale: Passive future of ἀποκαλύπτω; standard rendering remains clear.
