theological_decisions:
- issue: Rendering of νέοι ἔσονται in relation to repentance
  chosen_reading: Translated as 'will be new' to emphasize moral/spiritual renewal
    accompanying complete repentance.
  alternative_readings:
  - will be young
  rationale: The immediate context speaks of the 'renewal' (ἀνανέωσις) of spirits
    and of being 'firmly founded.' 'New' coheres with renewal imagery, whereas 'young'
    would introduce a biological metaphor that clashes with the building-foundation
    image.
- issue: Plural 'spirits' (πνευμάτων ὑμῶν)
  chosen_reading: 'Retained the plural: ''renewal of your spirits.'''
  alternative_readings:
  - 'rendered as a collective singular: ''renewal of your spirit'''
  rationale: Hermas addresses multiple hearers; the plural fits the addressees and
    preserves the idiom of individual inner life in each person without harmonizing
    to later theological usage.
- issue: '''The world is held together by four elements'''
  chosen_reading: Rendered literally, acknowledging ancient four-element cosmology
    as Hermas' illustrative framework.
  rationale: Maintains the symbolic explanation of the four-legged seat; translation
    should not modernize or correct the ancient cosmology that the text itself uses.
- issue: '"You have the revelation in full; ask nothing further"'
  chosen_reading: Understood as closure of this revelatory sequence for Hermas, not
    as a universal cessation claim.
  rationale: The command governs Hermas' immediate inquiry about this vision; the
    following clause ('if anything is needed, it will be revealed to you') leaves
    room for subsequent necessary disclosures.
- issue: μετανοέω translation choice
  chosen_reading: Rendered as 'repent' rather than 'change one’s mind.'
  alternative_readings:
  - change one’s mind
  - turn back
  rationale: Per project policy, in moral-exhortation contexts the traditional 'repent'
    best reflects the call to whole-hearted turning exemplified here.
  doctrine_reference: DOCTRINE.md — μετανοέω policy
