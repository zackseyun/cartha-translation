book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Τῇ δὲ τρίτῃ ὁράσει εἶδες αὐτὴν νεωτέραν καὶ καλὴν καὶ ἱλαράν, καὶ καλὴν τὴν
    μορφὴν αὐτῆς· 2. ὡς ἐὰν γάρ τινι λυπουμένῳ ἔλθῃ ἀγγελία ἀγαθή τις, εὐθὺς ἐπελάθετο
    τῶν προτέρων λυπῶν καὶ οὐδὲν ἄλλο προσδέχεται εἰ μὴ τὴν ἀγγελίαν ἣν ἤκουσεν, καὶ
    ἰσχυροποιεῖται λοιπὸν εἰς τὸ ἀγαθόν, καὶ ἀνανεοῦται αὐτοῦ τὸ πνεῦμα διὰ τὴν χαρὰν
    ἣν ἔλαβεν· οὕτως καὶ ὑμεῖς ἀνανέωσιν εἰλήφατε τῶν πνευμάτων ὑμῶν ἰδόντες ταῦτα
    τὰ ἀγαθά. 3. καὶ ὅτι ἐπὶ συμψελίου εἶδες καθημένην, ἰσχυρὰ ἡ θέσις· ὅτι τέσσαρας
    πόδας ἔχει τὸ συμψέλιον καὶ ἰσχυρῶς ἕστηκεν· καὶ γὰρ ὁ κόσμος διὰ τεσσάρων στοιχείων
    κρατεῖται. 4. οἱ οὖν μετανοήσαντες ὁλοτελῶς νέοι ἔσονται καὶ τεθεμελιωμένοι, οἱ
    ἐξ ὅλης καρδίας μετανοήσαντες. ἀπέχεις ὁλοτελῆ τὴν ἀποκάλυψιν· μηκέτι μηδὲν αἰτήσεις
    περὶ ἀποκαλύψεως, ἐάν τι δὲ δέῃ, ἀποκαλυφθήσεταί σοι.
