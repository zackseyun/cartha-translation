theological_decisions:
- issue: Reference of “spirit” (τὸ πνεῦμα ὑμῶν)
  chosen_reading: Human inner disposition (“your spirit”), not the Holy Spirit
  alternative_readings:
  - Holy Spirit
  - collective community spirit
  rationale: Context contrasts vigor and withering due to moral failings; this is about the audience’s interior state, not a claim about the Holy Spirit.
- issue: κύριος/Κύριος distinction
  chosen_reading: Translate vocative κύριε to the messenger as “sir,” but ὁ Κύριος as “the Lord” for God
  alternative_readings:
  - Render both as Lord
  - Render both as master/sir
  rationale: The same lemma appears with different referents; maintaining a distinction avoids blurring divine title with polite address.
  doctrine_reference: 'Translation philosophy: Titles translated; names transliterated.'
- issue: κοίμησις as euphemism
  chosen_reading: Render κοίμησις as “sleep,” preserving the euphemism for death
  alternative_readings:
  - Render directly as death
  - Render as rest
  rationale: Early Christian idiom often speaks of death as sleep; preserving it maintains the texture and allows readers to note the metaphor.
  doctrine_reference: Preserve theological tension and imagery; avoid flattening.
- issue: 'πρεσβύτεροι: age vs. office'
  chosen_reading: Render πρεσβύτεροι here as “the aged,” not “elders” (office)
  alternative_readings:
  - elders (church office)
  - old men
  rationale: The comparison is with human aging and loss of vigor; not with church governance.
  doctrine_reference: Preserve ecclesial texture without anachronism.
- issue: ἀκηδία rendering
  chosen_reading: Translate as “negligence,” noting the traditional term “acedia” in a footnote
  alternative_readings:
  - sloth
  - apathy
  - retain ‘acedia’ in text
  rationale: “Negligence” communicates the lack of care/concern in context; footnote preserves historical term.
  doctrine_reference: Readable modern English without flattening theological weight.
