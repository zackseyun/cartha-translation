id: HERM.V.3.xi
reference: Shepherd of Hermas — Vision 3, section xi
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ἄκουε, φησίν, περὶ τῶν τριῶν μορφῶν ὧν ἐπιζητεῖς. 2. τῇ μὲν πρώτῃ ὁράσει διατί πρεσβυτέρα ὤφθη σοι καὶ ἐπὶ καθέδραν καθημένη; ὅτι τὸ πνεῦμα ὑμῶν πρεσβύτερον καὶ ἤδη μεμαρασμένον καὶ μὴ ἔχον δύναμιν ἀπὸ τῶν μαλακιῶν ὑμῶν καὶ διψυχιῶν. 3. ὥσπερ γὰρ οἱ πρεσβύτεροι, μηκέτι ἔχοντες ἐλπίδα τοῦ ἀνανεῶσαι, οὐδὲν ἄλλο προσδοκῶσιν εἰ μὴ τὴν κοίμησιν αὐτῶν, οὕτω καὶ ὑμεῖς μαλακισθέντες ἀπὸ τῶν βιωτικῶν πραγμάτων παρεδώκατε ἑαυτοὺς εἰς τὰς ἀκηδίας, καὶ οὐκ ἐπερίψατε ἑαυτῶν τὰς μερίμνας ἐπὶ τὸν Κύριον· ἀλλὰ ἐθραύσθη ὑμῶν ἡ διάνοια, καὶ ἐπαλαιώθητε ταῖς λύπαις ὑμῶν. 4. Διατί οὖν ἐν καθέδρᾳ ἐκάθητο, ἤθελον γνῶναι, κύριε. Ὅτι πᾶς ἀσθενὴς εἰς καθέδραν καθέζεται διὰ τὴν ἀσθένειαν αὐτοῦ, ἵνα συνκρατηθῇ ἡ ἀσθένεια τοῦ σώματος αὐτοῦ. ἔχεις τὸν τύπον τῆς πρώτης ὁράσεως.
  language: Greek
  pages:
  - 328
  - 329
  unit_id: V.3.xi
  label: Vision 3, section xi
  sequence: 19
translation:
  text: '“Listen,” he says[1], “about the three forms you are inquiring about. In the first vision, why did she appear to you as an old woman and seated on a chair? Because your spirit is old and already withered and has no strength because of your weaknesses and your double‑mindedness. For just as the aged, no longer having hope of being renewed, expect nothing else but their sleep,[1] so also you, having been weakened by the affairs of life, have handed yourselves over to negligence,[2] and you did not cast your anxieties upon the Lord;[4] instead your mind has been shattered, and you have grown old in your sorrows.”


    “Why then was she seated in a chair? I wanted to know, sir.”[3] “Because every weak person sits in a chair because of his weakness, in order that the weakness of his body may be supported[a][5][4][3][2]. You have the pattern of the first vision.”[5]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: “Sleep” is a common early Christian euphemism for death.
    reason: cultural_note
  - marker: '2'
    text: The Greek term is ἀκηδία (“acedia”), meaning neglect, lack of care, or listless indifference.
    reason: lexical_alternative
  - marker: '3'
    text: Vocative κύριε here is a respectful “sir,” addressed to the interpreter; distinct from “the Lord” (God) in the previous clause.
    reason: cultural_note
  - marker: '4'
    text: Compare 1 Peter 5:7, which uses the same verb (“cast”) for placing anxieties upon the Lord.
    reason: cross_reference
  - marker: '5'
    text: “Pattern” translates τύπος, which can also mean “type,” “figure,” or “model”; here it denotes the explanation corresponding to the first vision.
    reason: lexical_alternative
  - marker: a
    text: Or '“Why then was she seated in a chair? I wanted to know, sir.”'.
    reason: previous_rendering
lexical_decisions:
- source_word: μορφῶν
  chosen: forms
  alternatives:
  - figures
  - appearances
  - shapes
  lexicon: LSJ
  rationale: μορφή refers to external form or appearance; “forms” preserves the visionary imagery without over‑interpreting.
- source_word: ἐπιζητεῖς
  chosen: are inquiring about
  alternatives:
  - seek
  - are seeking
  - desire to know about
  lexicon: BDAG
  rationale: Context is interpretive inquiry into symbols, so “are inquiring about” fits better than simple “seek.”
- source_word: ὁράσει
  chosen: vision
  alternatives:
  - appearance
  - sight
  lexicon: BDAG
  rationale: ὅρασις in apocalyptic contexts is best rendered “vision.”
- source_word: πρεσβυτέρα
  chosen: old woman
  alternatives:
  - elderly woman
  - aged woman
  lexicon: BDAG
  rationale: Concrete image of a woman advanced in years; avoids confusion with ecclesial office implied by “elder.”
- source_word: καθέδρα
  chosen: chair
  alternatives:
  - seat
  lexicon: LSJ
  rationale: Concrete furniture term; “chair” aligns with the action of sitting and the weakness image.
- source_word: τὸ πνεῦμα ὑμῶν
  chosen: your spirit
  alternatives:
  - your inner self
  - your heart
  - your mind
  lexicon: BDAG
  rationale: Hermas uses “spirit” for the human inner disposition; context contrasts vigor vs. withering. Not the Holy Spirit.
- source_word: μεμαρασμένον (from μαραίνω)
  chosen: withered
  alternatives:
  - faded
  - shrivelled
  - worn out
  lexicon: LSJ
  rationale: The perfect participle conveys a settled state; “withered” captures the image vividly.
- source_word: δύναμιν
  chosen: strength
  alternatives:
  - power
  - ability
  lexicon: BDAG
  rationale: Physical and moral vigor is in view; “strength” is idiomatic.
- source_word: μαλακίαι
  chosen: softness
  alternatives:
  - moral laxity
  - self‑indulgence
  - weakness
  lexicon: LSJ
  rationale: μαλακία denotes moral softness/laxity; rendered as a mass noun in English to avoid awkward plural.
- source_word: διψυχίαι
  chosen: double‑mindedness
  alternatives:
  - doubtfulness
  - two‑mindedness
  - vacillation
  lexicon: BDAG
  rationale: Established ethical term in early Christian literature; keeps the concrete metaphor of being “two‑souled.”
- source_word: πρεσβύτεροι
  chosen: the aged
  alternatives:
  - elderly people
  - old men
  lexicon: BDAG
  rationale: Here the reference is to age, not to church elders; “the aged” avoids ecclesial confusion.
- source_word: ἀνανεῶσαι
  chosen: be renewed
  alternatives:
  - be rejuvenated
  - make new again
  - be made young again
  lexicon: LSJ
  rationale: General renewal, not a technical theological term; “be renewed” is concise.
- source_word: κοίμησιν
  chosen: sleep
  alternatives:
  - rest
  - death
  lexicon: BDAG
  rationale: Maintains the euphemism common in early Christian diction; clarified by footnote.
- source_word: βιωτικὰ πράγματα
  chosen: the affairs of life
  alternatives:
  - worldly affairs
  - everyday business
  - secular matters
  lexicon: BDAG
  rationale: Neutral phrase that captures mundane, this‑worldly concerns without moralizing the term itself.
- source_word: μαλακισθέντες (from μαλακίζομαι)
  chosen: having been softened
  alternatives:
  - made soft
  - enervated
  - made effeminate
  lexicon: LSJ
  rationale: Carries the causal link to the earlier “softness”; avoids pejorative connotations of “effeminate” in modern English.
- source_word: ἀκηδίας
  chosen: negligence
  alternatives:
  - carelessness
  - apathy
  - acedia
  lexicon: LSJ
  rationale: Mass‑noun rendering fits English idiom; footnote notes the traditional term “acedia.”
- source_word: μερίμνας
  chosen: anxieties
  alternatives:
  - cares
  - worries
  lexicon: BDAG
  rationale: μερίμνα often denotes anxious concern; “anxieties” balances concreteness and readability.
- source_word: ἐπερίψατε (from ἐπιρρίπτω)
  chosen: cast
  alternatives:
  - throw
  - hurl
  lexicon: BDAG
  rationale: Preserves the vivid act of off‑loading cares onto the Lord; echoes but does not import NT diction beyond the Greek itself.
- source_word: Κύριον (with article)
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Reference is to God; default rendering in Cartha is “Lord.”
- source_word: διάνοια
  chosen: mind
  alternatives:
  - understanding
  - intention
  lexicon: BDAG
  rationale: The inner faculty of thought/resolve; “mind” fits the contrast with being shattered.
- source_word: ἐθραύσθη (from θραύω)
  chosen: has been shattered
  alternatives:
  - was broken
  - was crushed
  lexicon: LSJ
  rationale: θραύω is a strong verb for breaking; “shattered” conveys the severity.
- source_word: ἐπαλαιώθητε (from παλαιόω)
  chosen: have grown old
  alternatives:
  - have been aged
  - have become old
  - have been worn down
  lexicon: LSJ
  rationale: Idiomatic English that preserves metaphor of aging through sorrow.
- source_word: λύπαι
  chosen: sorrows
  alternatives:
  - griefs
  - distresses
  lexicon: BDAG
  rationale: Plural concrete burdens; “sorrows” preserves the affective weight.
- source_word: ἀσθενής / ἀσθένεια
  chosen: weak / weakness
  alternatives:
  - sick / sickness
  - feeble / feebleness
  lexicon: BDAG
  rationale: Physical frailty is the image; “weak/weakness” is straightforward.
- source_word: συνκρατηθῇ (sc. συγκρατέω)
  chosen: be steadied
  alternatives:
  - be supported
  - be held together
  - be braced
  lexicon: LSJ
  rationale: The aim is to stabilize bodily weakness; “be steadied” is vivid and idiomatic.
- source_word: τύπος
  chosen: pattern
  alternatives:
  - type
  - figure
  - model
  lexicon: BDAG
  rationale: Here denotes the corresponding explanation/figure to the vision; “pattern” is clear, with footnote noting alternatives.
- source_word: κύριε (voc.)
  chosen: sir
  alternatives:
  - lord
  lexicon: BDAG
  rationale: Polite address to the visionary interpreter, distinguished from “the Lord” (God) in the same unit.
