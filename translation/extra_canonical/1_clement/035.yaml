translation:
  text: 'How blessed and marvelous are the gifts of God, beloved: life in immortality, splendor in righteousness, truth in boldness, faith in confidence, self-control in holiness. And all these things fall within the grasp of our understanding. What then, indeed, are the things prepared for those who patiently endure? The Creator and Father of the ages, the all-holy one himself, knows their measure and their beauty. Therefore let us strive to be found in the number of those who wait for him, so that we may share in the gifts that have been promised. But how will this be, beloved? If our mind has been fixed faithfully on God, if we seek out the things pleasing and acceptable to him, if we accomplish the things that belong to his blameless purpose and follow the way of truth, casting away from ourselves all unrighteousness and wickedness, greed, strife, malicious habits and deceits, whisperings and slanders, hatred of God, pride and arrogance, empty glory and lack of hospitality. For those
    who practice these things are hateful to God; and not only those who practice them, but also those who approve of them. For the Scripture says, “But to the sinner God said, Why do you recount my righteous requirements, and take up my covenant upon your mouth? Yet you hated discipline, and cast my words behind you. If you saw a thief, you ran with him, and you placed your share with an adulterer. Your mouth overflowed with evil, and your tongue kept weaving deceit. Sitting down, you were slandering your brother, and against the son of your mother you were laying a stumbling block. These things you did, and I kept silent; you supposed, lawless one, that I would be like you. I will rebuke you and set you before your face. Understand these things, then, you who forget God, lest he seize like a lion, and there be no one to rescue. A sacrifice of praise will glorify me, and there is the way by which I will show him the salvation of God.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: The closing citation echoes Psalm 50:16–23 LXX (Psalm 50 in Greek numbering; Psalm 51 in some English traditions differs because of numbering conventions). The wording here follows Clement's Greek citation rather than a standardized English Psalter form.
    reason: cross_reference
  - marker: '2'
    text: '''Father of the ages'' renders the plural αἰώνων more literally than ''Father of eternity.'''
    reason: lexical_alternative
  - marker: '3'
    text: The phrase rendered 'patiently endure him' is syntactically compressed in Greek and may also be understood along the lines of 'wait for him' or 'persevere in relation to him.'
    reason: alternative_reading
  - marker: a
    text: Or 'those who patiently endure him'.
    reason: previous_rendering
  - marker: b
    text: Or 'those who patiently endure for him?'.
    reason: previous_rendering
  - marker: c
    text: Or 'What then, therefore,'.
    reason: previous_rendering
  - marker: d
    text: Or 'with adulterers'.
    reason: previous_rendering
lexical_decisions:
- source_word: μακάρια
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: LSJ
  rationale: Retains elevated scriptural cadence and covenantal/religious force better than the flatter 'happy' or merely circumstantial 'fortunate'.
- source_word: θαυμαστά
  chosen: marvelous
  alternatives:
  - wonderful
  - astonishing
  lexicon: LSJ
  rationale: Pairs naturally with 'blessed' while preserving the sense of wonder without sounding colloquial.
- source_word: δῶρα
  chosen: gifts
  alternatives:
  - benefits
  - gracious gifts
  lexicon: LSJ
  rationale: Direct and natural rendering; the context already supplies divine graciousness, so expansion was unnecessary.
- source_word: λαμπρότης
  chosen: splendor
  alternatives:
  - brightness
  - radiance
  lexicon: LSJ
  rationale: Conveys exalted brilliance in a moral-eschatological list; 'splendor' fits the rhetorical register.
- source_word: παρρησία
  chosen: boldness
  alternatives:
  - frankness
  - confidence
  lexicon: BDAG
  rationale: In this virtue list, 'boldness' best captures open, fearless truth-speaking; 'confidence' was reserved for πεποίθησις in the next phrase.
- source_word: πεποίθησις
  chosen: confidence
  alternatives:
  - assurance
  - trust
  lexicon: BDAG
  rationale: Distinguishes it from πίστις ('faith') while preserving the sense of settled assurance produced by faith.
- source_word: ἐγκράτεια
  chosen: self-control
  alternatives:
  - temperance
  lexicon: BDAG
  rationale: Standard modern rendering, accessible and morally precise.
- source_word: ἁγιασμός
  chosen: holiness
  alternatives:
  - sanctification
  - consecration
  lexicon: BDAG
  rationale: '''Holiness'' is clearer in a virtue catalogue; ''sanctification'' can sound more technical than the context requires.'
- source_word: ὑπέπεπτεν...τῇ διανοίᾳ
  chosen: fall within the grasp of our understanding
  alternatives:
  - lie before our mind
  - are subject to our thought
  lexicon: LSJ
  rationale: Attempts to preserve the idiom's sense that these listed gifts are mentally apprehensible, in contrast to the unsearchable greater things prepared by God.
- source_word: ὑπομένουσιν / ὑπομενόντων
  chosen: patiently endure
  alternatives:
  - persevere
  - wait steadfastly
  lexicon: BDAG
  rationale: Keeps the endurance nuance explicit rather than reducing it to generic perseverance.
- source_word: δημιουργός
  chosen: Creator
  alternatives:
  - Maker
  lexicon: LSJ
  rationale: Standard theological English and fitting in apposition with 'Father of the ages.'
- source_word: πατὴρ τῶν αἰώνων
  chosen: Father of the ages
  alternatives:
  - Father of eternity
  - Father of the worlds
  lexicon: LSJ
  rationale: More literal than 'Father of eternity' and preserves the plural αἰώνων with its expansive temporal-cosmic sense.
- source_word: ποσότης
  chosen: measure
  alternatives:
  - greatness
  - abundance
  lexicon: LSJ
  rationale: The phrase 'measure and beauty' preserves the Greek pairing without interpretive expansion.
- source_word: μεταλάβωμεν
  chosen: share in
  alternatives:
  - partake of
  - receive a portion of
  lexicon: BDAG
  rationale: Natural modern English that still preserves participation rather than mere reception.
- source_word: ἐστηργιμένῃ
  chosen: has been fixed
  alternatives:
  - has been firmly set
  - has been established
  lexicon: LSJ
  rationale: Conveys a settled, steadfast orientation of mind toward God.
- source_word: εὐάρεστα καὶ εὐπρόσδεκτα
  chosen: pleasing and acceptable
  alternatives:
  - well-pleasing and welcome
  lexicon: BDAG
  rationale: A close, idiomatic pair that preserves the rhetorical doubling.
- source_word: ἀμώμῳ βουλήσει
  chosen: blameless purpose
  alternatives:
  - spotless counsel
  - faultless will
  lexicon: BDAG
  rationale: '''Purpose'' communicates βουλή naturally here; ''blameless'' preserves the moral purity of ἀμώμῳ.'
- source_word: ἀδικίαν
  chosen: unrighteousness
  alternatives:
  - injustice
  - wrongdoing
  lexicon: BDAG
  rationale: Chosen to preserve moral-theological texture and maintain consistency with δικαιοσύνη rendered 'righteousness' earlier.
- source_word: πλεονεξίαν
  chosen: greed
  alternatives:
  - covetousness
  - grasping
  lexicon: BDAG
  rationale: Clear modern equivalent without losing ethical force.
- source_word: κακοηθείας
  chosen: malicious habits
  alternatives:
  - malice
  - ill-nature
  lexicon: LSJ
  rationale: Plural abstract in a vice list suggests settled bad character or practices; this rendering preserves that nuance.
- source_word: ψιθυρισμούς
  chosen: whisperings
  alternatives:
  - secret gossip
  - murmurings
  lexicon: LSJ
  rationale: Keeps the concrete image and rhetorical sharpness of covert speech.
- source_word: καταλαλιάς
  chosen: slanders
  alternatives:
  - evil speech
  - backbitings
  lexicon: BDAG
  rationale: Directly names defamatory speech in contemporary English.
- source_word: θεοστυγίαν
  chosen: hatred of God
  alternatives:
  - god-hating
  - hostility to God
  lexicon: LSJ
  rationale: Preserves the stark theological force of the rare vice term.
- source_word: κενοδοξίαν
  chosen: empty glory
  alternatives:
  - vain glory
  - conceit
  lexicon: BDAG
  rationale: More transparent to modern readers than the archaic 'vainglory,' while preserving the image of hollow honor-seeking.
- source_word: ἀφιλοξενίαν
  chosen: lack of hospitality
  alternatives:
  - inhospitality
  - unwelcoming spirit
  lexicon: LSJ
  rationale: Makes the vice immediately intelligible while preserving the ecclesial-social importance of hospitality.
- source_word: στυγητοὶ
  chosen: hateful to God
  alternatives:
  - detestable to God
  - abhorred by God
  lexicon: LSJ
  rationale: Strong but straightforward rendering matching the severity of the vice list.
- source_word: συνευδοκοῦντες
  chosen: approve of
  alternatives:
  - consent to
  - take pleasure in
  lexicon: BDAG
  rationale: Clear idiomatic English and echoes familiar biblical moral logic without over-paraphrase.
- source_word: δικαιώματα
  chosen: righteous requirements
  alternatives:
  - ordinances
  - statutes
  lexicon: BDAG
  rationale: In the Psalm citation, this rendering preserves moral force and avoids overly technical legal diction.
- source_word: παιδεία
  chosen: discipline
  alternatives:
  - instruction
  - correction
  lexicon: BDAG
  rationale: Captures both formative instruction and corrective training in a concise term.
- source_word: περιέπλεκεν
  chosen: kept weaving
  alternatives:
  - entangled itself in
  - plaited
  lexicon: LSJ
  rationale: Preserves the vivid metaphor of deceit being intricately worked by the tongue.
- source_word: σκάνδαλον
  chosen: a stumbling block
  alternatives:
  - an offense
  - a snare
  lexicon: BDAG
  rationale: Standard biblical rendering that preserves the metaphor of causing another to fall.
- source_word: ἄνομε
  chosen: lawless one
  alternatives:
  - wicked one
  lexicon: BDAG
  rationale: Retains the direct vocative force and the relation to divine order/law.
- source_word: παραστήσω σε κατὰ πρόσωπόν σου
  chosen: set you before your face
  alternatives:
  - set your sins before you
  - confront you plainly
  lexicon: LSJ
  rationale: A relatively literal rendering preserves the vivid judicial image; the implied object is left unstated as in the Greek citation.
- source_word: ῥυόμενος
  chosen: to rescue
  alternatives:
  - to deliver
  lexicon: BDAG
  rationale: Natural modern English in the warning formula.
- source_word: σωτήριον
  chosen: salvation
  alternatives:
  - saving help
  lexicon: BDAG
  rationale: Standard theological rendering, especially appropriate in a scriptural citation.
theological_decisions:
- issue: Sense of ὑπομένουσιν / ὑπομενόντων αὐτόν
  chosen_reading: rendered as 'those who patiently endure for him' / 'those who patiently endure him' with endurance language preserved
  alternative_readings:
  - those who wait for him
  - those who persevere in him
  - those who endure under him
  rationale: The Greek construction is somewhat compressed. The chapter's paraenetic thrust emphasizes steadfast endurance in relation to God and his promised gifts. The main text preserves the awkwardness enough to remain auditable rather than over-resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Quotation source wording in the Psalm citation
  chosen_reading: translated directly from the Greek form cited in 1 Clement rather than harmonizing to a familiar English Psalm version
  alternative_readings:
  - conforming wording to standard English Psalm 50/51 tradition
  rationale: Original-language primacy requires translating the wording as Clement cites it, even where readers may expect a more familiar biblical phrasing.
  doctrine_reference: Original-language primacy over translation tradition.
