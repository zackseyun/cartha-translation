  from: show kindness to ourselves
  to: be kind to one another
  rationale: In Hellenistic Greek, the plural reflexive pronoun ἑαυτοῖς is frequently used with reciprocal force ('to one another'). In this context of urging community concord against factionalism, the author is exhorting the Corinthians to mutual kindness, not self-kindness. Translating it reflexively as 'to ourselves' introduces a modern concept of self-care that completely misses the author's argument. Furthermore, 'be kind' is a more direct rendering of the verb χρηστεύομαι.
