  rationale: 'The Greek verb (whether reading the OCR''s garbled `πίπτουσιν` or the standard critical text''s `ἐξακοντίζουσιν`) is intransitive here: the men themselves plunge or launch into strife. The draft incorrectly adds ''us'' as the object (''plunging us''), which distorts the syntax. The men plunge into strife, and the result/purpose (`εἰς τὸ ἀπαλλοτριῶσαι ἡμᾶς`) is to estrange us from what is good. Additionally, ''are bent on'' over-translates the simple present indicative.'
