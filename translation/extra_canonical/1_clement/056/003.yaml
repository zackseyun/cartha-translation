  rationale: 'The Greek `παιδεύων ἐπαίδευσέν` is a Septuagintalism reflecting a Hebrew infinitive absolute (quoting Psalm 118:18). In the context of discipline—and contrasting with being handed over to death—the construction intensifies the degree of the action rather than its certainty. ''Disciplined me severely'' captures this intensive force better than ''surely,'' which can be misread as epistemic certainty. | Azure: The proposed change is closer to the Greek. The clause παιδεύων ἐπαίδευσέν με reproduces the LXX of Ps 117[118]:18 and reflects the Hebrew infinitive absolute + finite verb construction, which normall'
