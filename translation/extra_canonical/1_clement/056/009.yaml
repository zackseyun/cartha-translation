  from: from the hand of the sword
  to: from the power of the sword
  rationale: The Greek phrase ἐκ χειρὸς σιδήρου is a Hebraism (quoting Job 5:20). While σίδηρος (iron) is often used by metonymy for 'sword,' and χείρ means 'hand,' the literal English combination 'hand of the sword' creates an awkward mixed metaphor. Translating χείρ as 'power' (a standard sense in such Hebraic idioms) yields 'power of the sword.' Alternatively, preserving the exact Greek lexical choices would yield 'hand of iron.'
