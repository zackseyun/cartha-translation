  from: he struck, and his hands healed.
  to: he struck, and his hands healed him.
  rationale: The Greek verb ἰάομαι (healed) is transitive. In English, the phrase "his hands healed" can easily be misread intransitively (as if the hands themselves recovered from an injury). Supplying the implied object "him" (referring to the disciplined man in v. 6) restores the transitive force of the author's statement. (Alternatively, translating these gnomic aorists as present tense—"he strikes, and his hands heal"—would also resolve the ambiguity and match the present tenses in verse 6).
