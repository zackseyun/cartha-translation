source:
  edition: Funk 1901 (normalized OCR)
  text: Καὶ ἡμεῖς οὖν ἐντύχωμεν περὶ τῶν ἐν τινι παραπτώματι ὑπαρχόντων, ὅπως δοθῇ αὐτοῖς ἐπιείκεια καὶ ταπεινοφροσύνη εἰς τὸ εἶξαι αὐτοὺς μὴ ἡμῖν, ἀλλὰ τῷ θελήματι τοῦ θεοῦ· οὕτως γὰρ ἔσται αὐτοῖς ἔγκαρπος καὶ τελεία ἡ πρὸς τὸν θεὸν καὶ τοὺς ἁγίους μετ’ οἰκτιρμῶν μνεία.
  language: Greek
translation:
  text: Therefore let us also intercede concerning those who are in some transgression, so that gentleness and humility may be given to them, that they may yield not to us, but to the will of God. For in this way their compassionate remembrance before God and the saints will be fruitful and complete.
