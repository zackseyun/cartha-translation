id: 1CLEM.45.7
reference: 1 Clement 45:7
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: ἢ Ἀνανίας καὶ Ἀζαρίας καὶ Μισαὴλ ὑπὸ τῶν θρησκευόντων τὴν μεγαλοπρεπῆ καὶ ἔνδοξον θρησκείαν τοῦ ὑψίστου κατείρχθησαν εἰς κάμινον πυρός, μηδὲ ταῦτα τοῦτο γένοιτο. τίνες οὖν οἱ ταῦτα δράσαντες; οἱ στυγητοὶ καὶ πάσης κακίας πλήρεις εἰς τοσοῦτο ἐξήρισαν θυμοῦ, ὥστε τοὺς ἐν ὁσίᾳ καὶ ἀμώμῳ προθέσει δουλεύοντας τῷ θεῷ εἰς αἰκίαν περιβαλεῖν, μὴ εἰδότες, ὅτι ὁ ὕψιστος ὑπέρμαχος καὶ ὑπερασπιστής ἐστιν τῶν ἐν καθαρᾷ συνειδήσει λατρευόντων τῷ παναρέτῳ ὀνόματι αὐτοῦ· ᾧ ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
  language: Greek
translation:
  text: Or were Hananiah and Azariah and Mishael shut up in a furnace of fire by those who practiced the magnificent and glorious religion of the Most High? May this never be! Who then were the ones who did these things? The hateful, and those full of every evil, were stirred up to such a pitch of wrath that they subjected to abuse those who served God in a holy and blameless purpose, not knowing that the Most High is champion and defender of those who worship his all-virtuous name with a pure conscience—to whom be the glory forever and ever. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brought down into a furnace of fire'.
    reason: previous_rendering
