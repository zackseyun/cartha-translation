id: 1CLEM.11.2
reference: 1 Clement 11:2
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: συνεξελθούσης γὰρ αὐτῷ τῆς γυναικὸς ἑτερογνώμονος ὑπάρχουσης καὶ οὐκ ἐν ὁμονοίᾳ,
    εἰς τοῦτο σημεῖον ἐτέθη, ὥστε γενέσθαι αὐτὴν στήλην ἁλὸς ἕως τῆς ἡμέρας ταύτης,
    εἰς τὸ γνωστὸν εἶναι πᾶσιν, ὅτι οἱ δίψυχοι καὶ οἱ διστάζοντες περὶ τῆς τοῦ θεοῦ
    δυνάμεως εἰς κρίμα καὶ εἰς σημείωσιν πάσαις ταῖς γενεαῖς γίγονται.
  language: Greek
translation:
  text: For when his wife went out with him, being of a different mind and not in
    harmony, she was set forth as a sign, so that she became a pillar of salt to this
    very day, in order that it might be known to all that the double-minded and those
    who doubt the power of God come to judgment and become a warning to all generations.
  philosophy: optimal-equivalence
