lexical_decisions:
- source_word: φιλοξενίαν
  chosen: hospitality
  alternatives:
  - love of strangers
  - hospitality to guests
  lexicon: LSJ
  rationale: The term denotes hospitable reception of others; 'hospitality' is idiomatic
    and preserves the ethical emphasis without over-expansion.
- source_word: εὐσέβειαν
  chosen: godliness
  alternatives:
  - piety
  - reverence
  lexicon: LSJ
  rationale: The word carries religious devotion expressed in conduct. 'Godliness'
    fits the paraenetic tone better than the somewhat formal 'piety,' while retaining
    theological weight.
- source_word: περιχώρου
  chosen: surrounding region
  alternatives:
  - district around it
  - neighboring country
  lexicon: LSJ
  rationale: Refers to the area around Sodom, not merely the city itself. 'Surrounding
    region' is clear modern English and reflects the geographic scope.
- source_word: κριθείσης
  chosen: was judged
  alternatives:
  - was condemned
  - came under judgment
  lexicon: LSJ
  rationale: The participle emphasizes divine judgment rather than only destruction.
    'Was judged' preserves the theological frame that the fiery overthrow is an act
    of judgment.
- source_word: δεσπότης
  chosen: the Master
  alternatives:
  - the Lord
  - the Sovereign
  lexicon: LSJ
  rationale: Δεσπότης is stronger and more specific than κύριος, stressing absolute
    authority. 'The Master' preserves that distinction without becoming overly technical.
- source_word: ἐλπίζοντας ἐπʼ αὐτόν
  chosen: those who hope in him
  alternatives:
  - those who place their hope on him
  - those who trust in him
  lexicon: LSJ
  rationale: The construction centers on hope directed toward God. 'Hope in him' is
    concise and preserves the verbal connection.
- source_word: ἑτεροκλινεῖς
  chosen: those who turn aside
  alternatives:
  - the wayward
  - those who deviate
  lexicon: LSJ
  rationale: The term suggests deviation from the right course. 'Those who turn aside'
    keeps the moral image active and avoids a flattening abstract label.
- source_word: κόλασιν
  chosen: punishment
  alternatives:
  - correction
  - penalty
  lexicon: LSJ
  rationale: In this context of divine judgment on Sodom, the punitive sense is primary;
    'punishment' is the clearest rendering.
- source_word: αἰκισμὸν
  chosen: torment
  alternatives:
  - ill-treatment
  - affliction
  lexicon: LSJ
  rationale: The word intensifies the consequence beyond general punishment. 'Torment'
    best conveys the severity of the warning context.
- source_word: ἑτερογνώμονος
  chosen: of a different mind
  alternatives:
  - thinking differently
  - disloyal in mind
  lexicon: LSJ
  rationale: The term marks inward divergence from Lot and from obedient alignment.
    'Of a different mind' preserves the mental and relational nuance.
- source_word: ὁμονοίᾳ
  chosen: in harmony
  alternatives:
  - in agreement
  - of one mind
  lexicon: LSJ
  rationale: The word denotes shared unity of mind. 'In harmony' reads naturally while
    retaining the communal and moral sense prized in 1 Clement.
- source_word: σημεῖον
  chosen: a sign
  alternatives:
  - an example
  - a token
  lexicon: LSJ
  rationale: The noun points to an outwardly visible marker with didactic force. 'A
    sign' preserves the biblical resonance and leaves the explanatory purpose to the
    following clause.
- source_word: δίψυχοι
  chosen: the double-minded
  alternatives:
  - the divided in soul
  - the wavering
  lexicon: LSJ
  rationale: This term has a strong moral-spiritual sense of inner division. 'Double-minded'
    is established, precise, and preserves the paraenetic sharpness.
- source_word: διστάζοντες
  chosen: those who doubt
  alternatives:
  - those who waver
  - those who hesitate
  lexicon: LSJ
  rationale: The participle denotes wavering uncertainty regarding God's power. 'Those
    who doubt' is direct and fits the warning context.
- source_word: σημείωσιν
  chosen: a warning
  alternatives:
  - a mark
  - an object lesson
  lexicon: LSJ
  rationale: Here the sense is not merely a sign but a memorable caution for others.
    'A warning' captures the paraenetic function for later generations.
theological_decisions:
- issue: Rendering δεσπότης
  chosen_reading: the Master
  alternative_readings:
  - the Lord
  - the Sovereign
  rationale: The chapter uses δεσπότης rather than κύριος. Rendering it 'the Master'
    preserves the lexical distinction and emphasizes God's absolute authority in judgment
    and deliverance.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
- issue: Force of ἑτεροκλινεῖς in divine judgment
  chosen_reading: those who turn aside
  alternative_readings:
  - the apostates
  - the perverse
  - the wayward
  rationale: The term indicates deviation from the right path without requiring a
    fully developed later technical sense such as 'apostates.' The chosen rendering
    preserves the moral warning while staying close to the Greek.
- issue: Paraenetic use of Lot's wife
  chosen_reading: she became a pillar of salt ... that the double-minded and those
    who doubt the power of God come to judgment and become a warning
  alternative_readings:
  - fall under condemnation and serve as an example
  - are judged and become a sign
  rationale: The Greek presents her fate as an enduring public warning. The translation
    keeps both judgment and exemplary function without reducing the statement to mere
    historical narration.
