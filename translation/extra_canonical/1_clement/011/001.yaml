  text: Διὰ φιλοξενίαν καὶ εὐσέβειαν Λὼτ ἐσώθη ἐκ Σοδόμων, τῆς περιχώρου πάσης κριθείσης
    διὰ πυρὸς καὶ θείου, πρόδηλον ποιήσας ὁ δεσπότης, ὅτι τοὺς ἐλπίζοντας ἐπʼ αὐτὸν
