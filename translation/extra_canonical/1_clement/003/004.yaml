id: 1CLEM.3.4
reference: 1 Clement 3:4
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: διὰ τοῦτο πόρρω ἀπέστη ἡ δικαιοσύνη καὶ εἰρήνη, ἐν τῷ ἀπολιπεῖν ἕκαστον τὸν
    φόβον τοῦ θεοῦ καὶ ἐν τῇ πίστει αὐτοῦ ἀμβλυωπῆσαι, μηδὲ ἐν τοῖς νομίμοις τῶν προσταγμάτων
    αὐτοῦ πορεύεσθαι μηδὲ πολιτεύεσθαι κατὰ τὸ καλῆκον τῷ Χριστῷ, ἀλλὰ ἕκαστον βαδίζειν
    κατὰ τὰς ἐπιθυμίας τῆς καρδίας αὐτοῦ τῆς πονηρᾶς, ζῆλον ἄδικον καὶ ἀσεβῆ ἀνειληφότας,
    δι' οὗ καὶ θάνατος εἰσῆλθεν εἰς τὸν κόσμον.
  language: Greek
translation:
  text: Because of this, righteousness and peace have withdrawn far away, since each
    one abandoned the fear of God and became dim-sighted in his faith in him, neither
    walking in the lawful ways of his commandments nor conducting himself in a manner
    fitting for the Messiah, but each going according to the desires of his evil heart,
    having taken up unjust and ungodly jealousy, through which death also entered
    into the world.
  philosophy: optimal-equivalence
