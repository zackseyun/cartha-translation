translation:
  text: Because of this, righteousness and peace have withdrawn far away, since each
    one abandoned the fear of God and became dim-sighted in faith in him, neither
    walking in the ordinances of his commandments nor conducting himself in a manner
    fitting for Christ, but each going according to the desires of his evil heart,
    having taken up unjust and ungodly jealousy, through which death also entered
    into the world.
