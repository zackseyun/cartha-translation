  category: awkward_english
  tier: 1
  from: became broad and fat
  to: grew broad and fat
  rationale: In English, animals or people 'grow' fat rather than 'become' fat; 'grew' better captures the progressive, organic change of state implied by the aorist passives ἐπλατύνθη καὶ ἐπαχύνθη in this agricultural metaphor.
