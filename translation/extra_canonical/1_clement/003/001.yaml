  category: mistranslation
  tier: 2
  from: kicked back
  to: kicked
  rationale: The verb ἀπολακτίζω means to kick out (like an unmanageable, overfed animal) or to rebel, quoting the LXX of Deut 32:15. In modern English, 'kicked back' is a strong idiom for 'relaxed', which completely obscures the author's metaphor of stubborn rebellion.
