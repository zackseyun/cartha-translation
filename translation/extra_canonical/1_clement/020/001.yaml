  text: Οἱ οὐρανοὶ τῇ διοικήσει αὐτοῦ σαλευόμενοι ἐν εἰρήνῃ ὑποτάσσονται αὐτῷ. 2.
    ἡμέρα τε καὶ νὺξ τὸν τεταγμένον ὑπ᾽ αὐτοῦ δρόμον ἀνύουσιν, μηδὲν ἀλλήλαις ἐμποδίζοντα.
    3. ἥλιός τε καὶ σελήνη, ἀστέρων τε χοροὶ κατὰ τὴν διαταγὴν αὐτοῦ ἐν ὁμονοίᾳ δίχα
    πάσης παρεκβάσεως ἐξελίσσουσιν τοὺς ἐπιτεταγμένους αὐτοῖς ὁρισμούς. 4. γῆ κυοφοροῦσα
    κατὰ τὸ θέλημα αὐτοῦ τοῖς ἰδίοις καιροῖς τὴν πανπληθῆ ἀνθρώποις τε καὶ θηρίοις
    καὶ πᾶσι τοῖς οὖσιν ἐπ᾽ αὐτῆς ζῶσιν ἀνατέλλει τροφήν, μήτε διστατάσουσα μηδὲ ἀλλοιοῦσά
    τι τῶν δεδογματισμένων ὑπ᾽ αὐτοῦ. 5. ἀβύσσων τε ἀνεξιχνίαστα καὶ νερτέρων ἀνεκδιήγητα
    κρίματα τὰς αὐτὰς συνέχεται προστάξεσιν. 6. τὸ χύτος τῆς ἀπείρου θαλάσσης κατὰ
    τὴν δημιουργίαν αὐτοῦ συσταθὲν εἰς τὰς συναγωγὰς οὐ παρεκβαίνει τὰ περιτεθειμένα
    αὐτῇ χείλη, ἀλλὰ καθὼς διετάξεν αὐτῇ, οὕτως ποιεῖ. 7. εἶπεν γάρ· Ἕως ὧδε ἥξεις,
    καὶ τὰ κύματά σου ἐν σοὶ συντριβήσεται. 8. ὠκεανὸς ἀπέραντος ἀνθρώποις καὶ οἱ
    μετ᾽ αὐτὸν κόσμοι ταγαῖς τοῦ δεσπότου διευθύνονται. 9. καιροὶ ἐαρινοὶ καὶ θερινοὶ
    καὶ μετοπωρινοὶ καὶ χειμερινοὶ ἐν εἰρήνῃ μεταπαραδιδόασιν ἀλλήλοις. 10. ἀνέμων
    σταθμοὶ κατὰ τὸν ἴδιον καιρὸν τὴν λειτουργίαν αὐτῶν ἀπροσκόπως ἐπιτελοῦσιν· ἀέναοί
    τε πηγαί, πρὸς ἀπόλαυσιν καὶ ὑγείαν δημιουργηθεῖσαι, δίχα ἐλλείψεως παρέχονται
    τοῖς πρὸς ζωὴν ἀνθρώποις μαζούς· τά τε ἐλάχιστα τῶν ζῴων τὰς συνελεύσεις αὐτῶν
    ἐν ὁμονοίᾳ καὶ εἰρήνῃ ποιοῦνται. 11. ταῦτα πάντα ὁ μέγας, διμιουργὸς καὶ δεσπότης
    τῶν ἁπάντων ἐν εἰρήνῃ καὶ ὁμονοίᾳ προσέταξεν εἶναι, εὐεργετῶν τὰ πάντα, ὑπερεκπερισσῶς
    δὲ ἡμᾶς τοὺς προσπεφευγότας τοῖς οἰκτιρμοῖς αὐτοῦ διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ,
    12. ᾧ ἡ δόξα καὶ ἡ μεγαλωσύνη εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
