lexical_decisions:
- source_word: διοίκησις
  chosen: governance
  alternatives:
  - administration
  - ordering
  - providence
  lexicon: LSJ
  rationale: Conveys God's active ordering of the cosmos without importing later technical
    theological language. 'Governance' fits the paraenetic emphasis on ordered rule.
- source_word: σαλευόμενοι
  chosen: shaken
  alternatives:
  - set in motion
  - moved
  lexicon: LSJ
  rationale: The participle literally suggests being shaken or stirred; retained to
    preserve the vivid sense that even the heavens, though in motion, remain submissive
    in peace.
- source_word: τεταγμένον ... δρόμον
  chosen: the course appointed
  alternatives:
  - the ordered course
  - the assigned path
  lexicon: LSJ
  rationale: Combines the imagery of a track/path with divine appointment; natural
    English while preserving the sense of fixed order.
- source_word: διαταγή
  chosen: ordinance
  alternatives:
  - command
  - arrangement
  - order
  lexicon: LSJ
  rationale: Used for divine ordering in the cosmos; 'ordinance' preserves solemnity
    and normativity better than the flatter 'order'.
- source_word: ὁρισμοί
  chosen: bounds
  alternatives:
  - limits
  - fixed courses
  - appointed boundaries
  lexicon: LSJ
  rationale: In context of celestial bodies, the term denotes fixed limits or determinations;
    'bounds' is concise and concrete.
- source_word: κυοφοροῦσα
  chosen: bearing fruit
  alternatives:
  - bringing forth
  - being pregnant with produce
  lexicon: LSJ
  rationale: Literally 'pregnant/bearing,' here used of the earth's fecundity. 'Bearing
    fruit' communicates the metaphor idiomatically without awkwardness.
- source_word: πανπληθῆ
  chosen: abundant
  alternatives:
  - full abundance
  - all-plentiful
  lexicon: LSJ
  rationale: Captures the sense of rich fullness in accessible English.
- source_word: διστατάσουσα
  chosen: wavering
  alternatives:
  - being at variance
  - hesitating
  lexicon: LSJ
  rationale: Preserves the image of not deviating or falling into disorder in carrying
    out God's decree.
- source_word: δεδογματισμένων
  chosen: has been decreed
  alternatives:
  - has been ordained
  - has been determined
  lexicon: LSJ
  rationale: Reflects the force of established divine determinations; 'decreed' matches
    the formal tone.
- source_word: ἀβύσσων
  chosen: abysses
  alternatives:
  - depths
  - deeps
  lexicon: LSJ
  rationale: Retains the plural and the elevated register of the Greek.
- source_word: νερτέρων
  chosen: regions below
  alternatives:
  - the lower places
  - the underworld
  lexicon: LSJ
  rationale: The term points to lower/subterranean realms. 'Regions below' preserves
    ambiguity and avoids over-specifying a developed underworld concept.
- source_word: κρίματα
  chosen: regions
  alternatives:
  - judgments
  - depths
  - ordinances
  lexicon: LSJ
  rationale: Though often 'judgments,' in this difficult phrase the sense is better
    taken as mysterious realities/realms of the lower regions. This avoids a jarring
    abstraction in a list of cosmic domains.
- source_word: συνέχεται
  chosen: are held together
  alternatives:
  - are constrained
  - are contained
  lexicon: LSJ
  rationale: Expresses continued maintenance under divine command, fitting the cosmic-order
    theme.
- source_word: προστάξεις
  chosen: ordinances
  alternatives:
  - commands
  - injunctions
  lexicon: LSJ
  rationale: Keeps consistency with divine ordering language while varying slightly
    from διαταγή only where English style permits.
- source_word: χύτος
  chosen: basin
  alternatives:
  - mass
  - flood
  - expanse
  lexicon: LSJ
  rationale: A difficult noun; 'basin' best fits the image of the sea as a contained
    body within God-set limits.
- source_word: συναγωγαί
  chosen: reservoirs
  alternatives:
  - gatherings
  - storehouses
  - basins
  lexicon: LSJ
  rationale: Conveys places of collection; in context of the sea being gathered together,
    'reservoirs' gives the sense of contained waters.
- source_word: χείλη
  chosen: barriers
  alternatives:
  - banks
  - lips
  - shores
  lexicon: LSJ
  rationale: Literally 'lips,' but idiomatically refers to edges/borders. 'Barriers'
    highlights the restraining function in context.
- source_word: κόσμοι
  chosen: worlds
  alternatives:
  - regions
  - ordered realms
  lexicon: LSJ
  rationale: The plural should be preserved. 'Worlds' keeps the cosmic breadth and
    rhetorical force, even if the exact geography is ancient.
- source_word: ταγαί
  chosen: decrees
  alternatives:
  - arrangements
  - orders
  lexicon: LSJ
  rationale: A governance term parallel to surrounding language of divine appointment;
    'decrees' suits the elevated style.
- source_word: σταθμοί
  chosen: stations
  alternatives:
  - appointed places
  - fixed positions
  lexicon: LSJ
  rationale: Preserves the image of assigned posts or stations for the winds.
- source_word: λειτουργία
  chosen: service
  alternatives:
  - task
  - ministry
  - function
  lexicon: LSJ
  rationale: '''Service'' preserves the dignified sense of an appointed role without
    over-ecclesiastical narrowing.'
- source_word: ἀπροσκόπως
  chosen: without stumbling
  alternatives:
  - without hindrance
  - smoothly
  lexicon: LSJ
  rationale: Keeps the metaphorical force of unobstructed fulfillment.
- source_word: ἀέναοι
  chosen: ever-flowing
  alternatives:
  - perpetual
  - unceasing
  lexicon: LSJ
  rationale: Natural English for springs while preserving the sense of continual supply.
- source_word: μαζούς
  chosen: their breasts
  alternatives:
  - their streams
  - their abundance
  lexicon: LSJ
  rationale: The maternal metaphor is explicit in Greek and should be preserved rather
    than flattened.
- source_word: συνελεύσεις
  chosen: gatherings
  alternatives:
  - assemblies
  - meetings
  lexicon: LSJ
  rationale: Used of animals coming together; 'gatherings' is natural and preserves
    the communal note.
- source_word: δημιουργός
  chosen: Creator
  alternatives:
  - craftsman
  - maker
  lexicon: LSJ
  rationale: In this theological context, 'Creator' best communicates God's role over
    all things.
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: LSJ
  rationale: Rendered 'Master' here to distinguish it from the later κύριος applied
    to Jesus, while preserving the strong authority of the term.
- source_word: ὑπερεκπερισσῶς
  chosen: far beyond measure
  alternatives:
  - superabundantly
  - exceedingly beyond all
  lexicon: LSJ
  rationale: Captures the emphatic piling up of excess language in idiomatic English.
- source_word: προσπεφευγότας
  chosen: have fled for refuge
  alternatives:
  - have taken refuge
  - have resorted
  lexicon: LSJ
  rationale: Preserves the vivid refuge imagery and the completed action with present
    relevance.
- source_word: οἰκτιρμοί
  chosen: mercies
  alternatives:
  - compassions
  - pities
  lexicon: LSJ
  rationale: '''Mercies'' is idiomatic biblical English and suits the plural.'
- source_word: κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  chosen: our Lord Jesus Messiah
  alternatives:
  - our Lord Jesus Christ
  lexicon: LSJ
  rationale: Per project philosophy, Χριστός as title is translated 'Messiah' rather
    than merely transliterated.
- source_word: μεγαλωσύνη
  chosen: majesty
  alternatives:
  - greatness
  - magnificence
  lexicon: LSJ
  rationale: A standard doxological rendering that preserves elevated cadence.
theological_decisions:
- issue: Rendering Χριστοῦ in the closing doxology
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title, not merely a name, and project policy
    prefers translating titles to preserve meaning.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Rendering δεσπότης distinct from κύριος
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: Maintains lexical distinction in a chapter that later names Jesus as
    κύριος; avoids collapsing two Greek authority terms into one English gloss.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception.'
- issue: Interpretation of difficult phrase νερτέρων ἀνεκδιήγητα κρίματα
  chosen_reading: the indescribable regions below
  alternative_readings:
  - the indescribable judgments of the lower regions
  - the ineffable mysteries of the underworld
  rationale: Within a catalog of cosmic domains under divine order, a locative/cosmic
    sense fits better than an abstract judicial sense, while preserving ambiguity
    about the exact referent.
