  text: τὸ χύτος τῆς ἀπείρου θαλάσσης κατὰ τὴν δημιουργίαν αὐτοῦ συσταθὲν εἰς τὰς
    συναγωγὰς οὐ παρεκβαίνει τὰ περιτεθειμένα αὐτῇ χείλη, ἀλλὰ καθὼς διετάξεν αὐτῇ,
    οὕτως ποιεῖ.
  language: Greek
translation:
  text: The mass of the boundless sea, gathered together according to his creation
    into its basins, does not pass beyond the bounds set around it, but as he commanded
