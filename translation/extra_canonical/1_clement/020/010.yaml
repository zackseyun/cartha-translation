  text: ἀνέμων σταθμοὶ κατὰ τὸν ἴδιον καιρὸν τὴν λειτουργίαν αὐτῶν ἀπροσκόπως ἐπιτελοῦσιν· ἀέναοί τε πηγαί, πρὸς ἀπόλαυσιν καὶ ὑγείαν δημιουργηθεῖσαι, δίχα ἐλλείψεως παρέχονται τοῖς πρὸς ζωὴν ἀνθρώποις μαζούς· τά τε ἐλάχιστα τῶν ζῴων τὰς συνελεύσεις αὐτῶν ἐν ὁμονοίᾳ καὶ εἰρήνῃ ποιοῦνται.
  language: Greek
translation:
  text: The stations of the winds, each in its own season, fulfill their service without hindrance; and the ever-flowing springs, created for enjoyment and health, without fail supply their breasts to men for life. And the smallest of living creatures hold their gatherings in harmony and peace.
