  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: 'This is the way, beloved, in which we found our salvation: Jesus the Messiah, the high priest of our offerings, the protector and helper of our weakness.


    Through him we fix our gaze on the heights of the heavens; through him we behold as in a mirror his spotless and most exalted countenance; through him the eyes of our heart were opened; through him our foolish and darkened mind springs up into the light; through him the Master willed that we should taste immortal knowledge—he who, being the radiance of his majesty, is by so much greater than the angels as he has inherited a more excellent name.


    For it is written thus:

    “He makes his angels winds,

    and his ministers a flame of fire.”


    But concerning his Son it says thus:

    “You are my Son;

    today I have begotten you.

    Ask of me, and I will give you the nations as your inheritance,

    and the ends of the earth as your possession.”


    And again he says to him:

    “Sit at my right hand,

    until I make your enemies a footstool for your feet.”


    Who then are the enemies? Those who are vile and set themselves against his will.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spirits' in the citation, since the Greek word can mean either 'winds' or 'spirits.'
    reason: lexical_alternative
  - marker: b
    text: The wording in this section echoes themes and phrases known from Hebrews 1:3–7 and Psalm citations used in early Christian christological argument.
    reason: cross_reference
  - marker: c
    text: Or 'The vile, and those who set themselves against'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὁδός
  chosen: way
  alternatives:
  - path
  lexicon: LSJ
  rationale: Retains biblical and paraenetic resonance; more idiomatic and theologically textured than 'path' here.
- source_word: σωτήριον
  chosen: salvation
  alternatives:
  - saving deliverance
  lexicon: LSJ
  rationale: The phrase 'we found our salvation' is natural in English and preserves the soteriological force of the noun.
- source_word: Ἰησοῦν Χριστόν
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστός functions as a title here, so 'Messiah' follows project policy to translate titles where context supports it.
- source_word: ἀρχιερέα
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: Standard and precise rendering for the cultic title, preserving intertextual resonance with Hebrews.
- source_word: προσφορῶν
  chosen: offerings
  alternatives:
  - oblations
  - sacrifices
  lexicon: BDAG
  rationale: '''Offerings'' is broad enough to preserve the ecclesial-cultic sense without over-specifying sacrificial blood rites.'
- source_word: προστάτην
  chosen: protector
  alternatives:
  - champion
  - guardian
  lexicon: LSJ
  rationale: Conveys active advocacy and defense; 'champion' is possible but slightly more interpretive.
- source_word: βοηθὸν
  chosen: helper
  alternatives:
  - aid
  lexicon: BDAG
  rationale: Simple, direct, and paired well with 'protector' in describing Christ's support for human weakness.
- source_word: ἀσθενείας
  chosen: weakness
  alternatives:
  - frailty
  - infirmity
  lexicon: BDAG
  rationale: '''Weakness'' is accessible and broad, fitting moral and human frailty without narrowing to illness.'
- source_word: ἀτενίζομεν
  chosen: fix our gaze
  alternatives:
  - look intently
  - stare
  lexicon: BDAG
  rationale: Captures sustained, intent looking with elevated cadence.
- source_word: ἐνοπτριζόμεθα
  chosen: behold as in a mirror
  alternatives:
  - reflect
  - see mirrored
  lexicon: BDAG
  rationale: Preserves the mirror imagery rather than flattening to simple 'see'; the middle/passive nuance suggests mediated beholding.
- source_word: ἄμωμον
  chosen: spotless
  alternatives:
  - blameless
  - undefiled
  lexicon: BDAG
  rationale: '''Spotless'' fits visual imagery with ''countenance'' and preserves purity language.'
- source_word: ὑπερτάτην
  chosen: most exalted
  alternatives:
  - supreme
  - highest
  lexicon: LSJ
  rationale: Maintains superlative force and elevated style.
- source_word: ὄψιν
  chosen: countenance
  alternatives:
  - appearance
  - face
  lexicon: BDAG
  rationale: A dignified rendering suited to the elevated rhetoric; 'face' is possible but less formal.
- source_word: οἱ ὀφθαλμοὶ τῆς καρδίας
  chosen: the eyes of our heart
  alternatives:
  - the eyes of our hearts
  lexicon: BDAG
  rationale: Preserves the singular collective idiom familiar from early Christian diction.
- source_word: ἀσύνετος καὶ ἐσκοτωμένη διάνοια
  chosen: our foolish and darkened mind
  alternatives:
  - our senseless and darkened understanding
  lexicon: BDAG
  rationale: Keeps both moral and cognitive dimensions while remaining readable.
- source_word: ἀναθάλλει
  chosen: springs up
  alternatives:
  - blooms again
  - flourishes
  lexicon: LSJ
  rationale: Preserves the vivid image of renewed life emerging into light.
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: BDAG
  rationale: Distinguishes δεσπότης from κύριος and preserves the stronger sense of authority.
- source_word: ἀθανάτου γνώσεως
  chosen: immortal knowledge
  alternatives:
  - deathless knowledge
  lexicon: BDAG
  rationale: A direct and weighty rendering that preserves the unusual phrase.
- source_word: γεύσασθαι
  chosen: taste
  alternatives:
  - partake of
  - experience
  lexicon: BDAG
  rationale: Retains the metaphorical sensory verb rather than abstracting it away.
- source_word: ἀπαύγασμα
  chosen: radiance
  alternatives:
  - effulgence
  - reflection
  lexicon: BDAG
  rationale: '''Radiance'' is clear, elevated, and preserves the likely allusion to Wisdom/Hebrews language.'
- source_word: μεγαλοσύνης
  chosen: majesty
  alternatives:
  - greatness
  lexicon: BDAG
  rationale: '''Majesty'' better fits divine exaltation in context.'
- source_word: λειτουργούς
  chosen: ministers
  alternatives:
  - servants
  lexicon: BDAG
  rationale: Preserves liturgical/service nuance in the citation.
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - Gentiles
  lexicon: BDAG
  rationale: In the Psalm citation the territorial-political sense is primary, so 'nations' is preferable.
- source_word: κατάσχεσίν
  chosen: possession
  alternatives:
  - holding
  - domain
  lexicon: LSJ
  rationale: Natural English in parallel with 'inheritance' while preserving property-language.
- source_word: φαῦλοι
  chosen: the vile
  alternatives:
  - the wicked
  - base people
  lexicon: BDAG
  rationale: Captures moral baseness distinctly from the following participle; 'wicked' is possible but more generic.
- source_word: ἀντιτασσόμενοι
  chosen: those who set themselves against
  alternatives:
  - those who oppose
  - those who resist
  lexicon: BDAG
  rationale: Reflects the reflexive, active stance of opposition and preserves rhetorical force.
- source_word: θέλημα
  chosen: will
  alternatives:
  - purpose
  lexicon: BDAG
  rationale: Standard rendering with strong biblical resonance.
theological_decisions:
- issue: Rendering Χριστός in an early Christian prose context
  chosen_reading: Jesus the Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The term is titular rather than merely name-like in this confessional description. Translating it preserves meaning and aligns with project policy on titles.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Referent of αὐτοῦ in 'his spotless and most exalted countenance'
  chosen_reading: Retained as 'his,' referring most naturally to God as mediated through the Son
  alternative_readings:
  - referring to the Son's countenance
  rationale: The surrounding sequence moves from access through the Son to vision of God, then back to a relative clause describing the Son as radiance of God's majesty. The pronoun is left as translated without over-resolving the theological layering.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Quotation of Psalm 104:4 wording
  chosen_reading: '''He makes his angels winds'''
  alternative_readings:
  - '''He makes his angels spirits'''
  rationale: Given the Greek πνεύματα, both are possible. In this scriptural citation, 'winds' better preserves the Psalm's elemental imagery while a footnote records the alternative.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
