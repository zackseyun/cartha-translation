id: 1CLEM.7.1
reference: 1 Clement 7:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Ταῦτα, ἀγαπητοί, οὐ μόνον ὑμᾶς νουθετοῦντες ἐπεστέλλομεν, ἀλλὰ καὶ ἑαυτοὺς ὑπομιμνήσκοντες· ἐν γὰρ τῷ αὐτῷ ἐσμὲν σκάμματι, καὶ ὁ αὐτὸς ἡμῖν ἀγὼν ἐπίκειται. 2. διὸ ἀπολίπωμεν τὰς κενὰς καὶ ματαίας φροντίδας, καὶ ἔλθωμεν ἐπὶ τὸν εὐκλεῆ καὶ σεμνὸν τῆς παραδόσεως ἡμῶν κανόνα. 3. καὶ ἴδωμεν, τί καλὸν καὶ τί τερπνὸν καὶ τί προσδεκτὸν τῷ ποιήσαντι ἡμᾶς. . ἀτενίσωμεν εἰς τὸ αἷμα τοῦ Χριστοῦ καὶ γνῶμεν, ὡς ἔστιν τίμιον τῷ θεῷ καὶ πατρὶ αὐτοῦ, ὅτι διὰ τὴν ἡμετέραν σωτηρίαν ἐκχυθὲν παντὶ τῷ κόσμῳ μετανοίας χάριν διήνεγκεν. 5. διέλθωμεν εἰς τὰς γενεὰς πάσας καὶ καταμάθωμεν, ὅτι ἐν γενεᾷ καὶ γενεᾷ μετανοίας τόπον ἔδωκεν ὁ δεσπότης τοῖς βουλομένοις ἐπιστρέψαι ἐπ᾽ αὐτόν. 6. Νῶε ἐκήρυξεν μετάνοιαν, καὶ οἱ ὑπακούσαντες ἐσώθησαν. 7. Ἰωνᾶς Νινευίταις καταστροφὴν ἐκήρυξεν· οἱ δὲ μετανοήσαντες ἐπὶ τοῖς ἁμαρτήμασιν αὐτῶν ἐξιλάσαντο τὸν θεὸν ἱκετεύσαντες καὶ ἔλαβον σωτηρίαν, καίπερ ἀλλότριοι τοῦ θεοῦ ὄντες.
  language: Greek
  pages:
  - 271
  note: This chapter comes from the normalized Funk 1901 OCR layer.
  verse: 1
translation:
  text: These things, beloved, we have written not only to admonish you, but also to remind ourselves; for we are in the same arena, and the same struggle lies before us. Therefore let us leave behind empty and futile concerns, and let us come to the glorious and solemn rule of our tradition. And let us see what is good, and what is pleasing, and what is acceptable to the one who made us. Let us fix our gaze on the blood of the Messiah and understand how precious it is to God and his Father, because, having been poured out for our salvation, it brought the grace of repentance to the whole world. Let us pass through all the generations and learn carefully that in generation after generation the Master gave a place for repentance to those willing to turn back to him. Noah proclaimed repentance, and those who obeyed were saved. Jonah proclaimed destruction to the Ninevites; but those who repented of their sins appeased God by supplicating him and received salvation, though they were strangers to God.
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: σκάμματι
  chosen: arena
  alternatives:
  - racecourse
  - pit
  - stadium
  lexicon: LSJ
  rationale: The athletic-contest image is active in the immediate context with ἀγών. 'Arena' preserves the metaphor of a shared place of contest better than the more literal but less natural 'pit' or the narrower 'racecourse'.
- source_word: ἀγών
  chosen: struggle
  alternatives:
  - contest
  - conflict
  - race
  lexicon: BDAG
  rationale: The term denotes a contest or struggle. 'Struggle' communicates the paraenetic force in natural English while retaining the athletic-moral sense; 'contest' is possible but sounds less existential in this context.
- source_word: φροντίδας
  chosen: concerns
  alternatives:
  - cares
  - anxieties
  - preoccupations
  lexicon: LSJ
  rationale: With κενὰς καὶ ματαίας, the sense is not ordinary care but empty preoccupation. 'Concerns' is readable and broad enough, while the adjectives carry the negative force.
- source_word: κανόνα
  chosen: rule
  alternatives:
  - standard
  - measure
  - norm
  lexicon: BDAG
  rationale: κανών here denotes a normative standard. 'Rule' preserves the sense of an authoritative guiding norm in ecclesial paraenesis better than the more abstract 'standard'.
- source_word: παραδόσεως
  chosen: tradition
  alternatives:
  - handing down
  - instruction
  lexicon: BDAG
  rationale: The word refers to what has been handed down. 'Tradition' best captures the ecclesial continuity Clement invokes, without reducing it to mere teaching.
- source_word: σεμνὸν
  chosen: solemn
  alternatives:
  - venerable
  - dignified
  - revered
  lexicon: LSJ
  rationale: The term carries gravity and moral dignity. 'Solemn' fits the elevated paraenetic tone and pairs well with 'glorious'.
- source_word: ἀτενίσωμεν
  chosen: let us fix our gaze on
  alternatives:
  - let us look intently at
  - let us behold
  lexicon: BDAG
  rationale: The verb implies focused, sustained looking. 'Fix our gaze on' preserves the rhetorical intensity more vividly than a simple 'look at'.
- source_word: τοῦ Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Following project policy, Χριστός is translated as 'Messiah' where it functions as a title rather than a name-like form.
- source_word: τίμιον
  chosen: precious
  alternatives:
  - valuable
  - honored
  lexicon: BDAG
  rationale: In context the blood is of great worth before God. 'Precious' is idiomatic and preserves both value and reverent tone.
- source_word: μετανοίας χάριν
  chosen: the grace of repentance
  alternatives:
  - an opportunity for repentance
  - repentance-grace
  lexicon: BDAG
  rationale: χάρις here is best taken as gracious gift or favor rather than mere 'opportunity.' The phrase expresses that Christ's blood mediates repentance as divine grace.
- source_word: διήνεγκεν
  chosen: brought
  alternatives:
  - offered
  - conveyed
  - bestowed
  lexicon: LSJ
  rationale: The verb here conveys bringing or carrying forth to the world. 'Brought' is simple and faithful without overinterpreting the mechanism.
- source_word: μετανοίας τόπον
  chosen: a place for repentance
  alternatives:
  - room for repentance
  - opportunity for repentance
  lexicon: BDAG
  rationale: The idiom literally speaks of a 'place' for repentance. Retaining 'place' preserves the concrete metaphor and echoes early Christian diction, while remaining understandable.
- source_word: ἐπιστρέψαι
  chosen: to turn back
  alternatives:
  - to return
  - to turn
  lexicon: BDAG
  rationale: The verb carries the sense of turning back toward God. 'Turn back' preserves the directional and repentant nuance.
- source_word: ἐξιλάσαντο
  chosen: made atonement before God
  alternatives:
  - appeased God
  - obtained expiation from God
  - propitiated God
  lexicon: LSJ
  rationale: The verb can suggest propitiatory appeasement, but 'made atonement before God' communicates reconciliation in accessible English without importing a cruder emotional picture of divine anger. The accompanying participle 'by their supplication' clarifies the manner.
- source_word: ἱκετεύσαντες
  chosen: by their supplication
  alternatives:
  - by pleading
  - by entreating him
  lexicon: BDAG
  rationale: The participle expresses earnest petition. 'By their supplication' preserves the elevated register and the means by which they sought mercy.
- source_word: ἀλλότριοι τοῦ θεοῦ
  chosen: strangers to God
  alternatives:
  - alien to God
  - foreign to God
  lexicon: BDAG
  rationale: The phrase denotes those outside covenant relation. 'Strangers to God' is natural English and preserves the relational distance without flattening it.
theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: In this chapter Χριστός functions as a title in a theological statement about his blood. Project policy prefers 'Messiah' in such contexts to preserve meaning rather than inherited transliteration.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sense of μετανοίας χάριν διήνεγκεν
  chosen_reading: it brought the grace of repentance to the whole world
  alternative_readings:
  - it offered an opportunity for repentance to the whole world
  - it brought repentance-grace to the whole world
  rationale: The construction most naturally presents Christ's blood as the means by which repentance as divine grace is extended universally. This preserves both theological weight and the syntax of the clause.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Force of ἐξιλάσαντο τὸν θεόν
  chosen_reading: they made atonement before God by their supplication
  alternative_readings:
  - they appeased God by their prayer
  - they propitiated God by entreaty
  rationale: The Greek can be rendered more sharply in propitiatory terms, but for accessible English and in light of the penitential context, 'made atonement before God' best preserves the reconciliation sense while avoiding unnecessary narrowing. The lexical alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Readable modern English, not archaic or academic.'
