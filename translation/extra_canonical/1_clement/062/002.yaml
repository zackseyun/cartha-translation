  from: please the Almighty God in holiness, in righteousness and truth and longsuffering
  to: devoutly please Almighty God in righteousness and truth and longsuffering
  rationale: The Greek uses the adverb ὁσίως ('devoutly' or 'piously') to modify εὐαρεστεῖν ('to please'), distinct from the prepositional phrase 'ἐν δικαιοσύνῃ...'. Translating it as 'in holiness' creates a slightly clunky, repetitive list ('in holiness, in righteousness...'). Rendering it as an adverb smooths the English and better reflects the syntax.
