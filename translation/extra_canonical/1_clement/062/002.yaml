id: 1CLEM.62.2
reference: 1 Clement 62:2
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: περὶ γὰρ πίστεως καὶ μετανοίας καὶ γνησίας ἀγάπης καὶ ἐγκρατείας καὶ σωφροσύνης καὶ ὑπομονῆς πάντα τόπον ἐψηλαφήσαμεν, ὑπομιμνήσκοντες δεῖν ὑμᾶς ἐν δικαιοσύνῃ καὶ ἀληθείᾳ καὶ μακροθυμίᾳ τῷ παντοκράτορι θεῷ ὁσίως εὐαρεστεῖν, ὁμονοοῦντας ἀμνησικάκως ἐν ἀγάπῃ καὶ εἰρήνῃ μετὰ ἐκτενοῦς ἐπιεικείας, καθὼς καὶ οἱ προδεδηλωμένοι πατέρες ἡμῶν εὐηρέστησαν ταπεινοφρονοῦντες τὰ πρὸς τὸν πατέρα καὶ θεὸν καὶ κτίστην καὶ πάντας ἀνθρώπους.
  language: Greek
translation:
  text: For concerning faith and repentance and genuine love and self-control and sound-mindedness and endurance, we have touched on every point, reminding you that you ought to devoutly please Almighty God in righteousness and truth and longsuffering, being of one mind, free from resentment, in love and peace with earnest gentleness, just as also our fathers, who were spoken of before, were well-pleasing to him, humbling themselves in what concerns the Father and God and Creator and all people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'please the Almighty God in holiness, in righteousness and truth and longsuffering'.
    reason: previous_rendering
