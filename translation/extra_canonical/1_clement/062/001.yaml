source:
  edition: Funk 1901 (normalized OCR)
  text: Περὶ μὲν τῶν ἀνηκόντων τῇ θρησκείᾳ ἡμῶν καὶ τῶν ὠφελιμωτάτων εἰς ἐνάρετον
    βίον τοῖς θέλουσιν εὐσεβῶς καὶ δικαίως διευθύνειν, ἱκανῶς ἐπεστείλαμεν ὑμῖν, ἄνδρες
    ἀδελφοί. 2. περὶ γὰρ πίστεως καὶ μετανοίας καὶ γνησίας ἀγάπης καὶ ἐγκρατείας καὶ
    σωφροσύνης καὶ ὑπομονῆς πάντα τόπον ἐψηλαφήσαμεν, ὑπομιμνήσκοντες δεῖν ὑμᾶς ἐν
    δικαιοσύνῃ καὶ ἀληθείᾳ καὶ μακροθυμίᾳ τῷ παντοκράτορι θεῷ ὁσίως εὐαρεστεῖν, ὁμονοοῦντας
    ἀμνησικάκως ἐν ἀγάπῃ καὶ εἰρήνῃ μετὰ ἐκτενοῦς ἐπιεικείας, καθὼς καὶ οἱ προδεδηλωμένοι
    πατέρες ἡμῶν εὐηρέστησαν ταπεινοφρονοῦντες τὰ πρὸς τὸν πατέρα καὶ θεὸν καὶ κτίστην
    καὶ πάντας ἀνθρώπους. . καὶ ταῦτα τοσούτῳ μᾶλλον ὑπενήγκαμεν, ἐπειδὴ σαφῶς ᾔδειμεν
    γράφειν ὑμᾶς ἀνδράσιν πιστοῖς καὶ ἐλλογιμωτάτοις καὶ ἐγκεχυφόσιν εἰς τὰ λόγια
    τῆς παιδείας τοῦ θεοῦ.
