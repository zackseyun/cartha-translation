translation:
  text: Now concerning the matters that pertain to our religion, and that are most
    beneficial for a virtuous life to those who desire to order their way in piety
    and righteousness, we have written to you sufficiently, brothers. For concerning
    faith and repentance and genuine love and self-control and sound-mindedness and
    endurance, we have touched on every point, reminding you that you ought to please
    the Almighty God in holiness, in righteousness and truth and longsuffering, being
    of one mind, free from resentment, in love and peace with earnest gentleness,
    just as also our fathers, who were spoken of before, were well-pleasing to him,
    humbling themselves in their disposition toward the Father and God and Creator
    and all people. And we have urged these things all the more because we clearly
    knew that we were writing to faithful and highly regarded men who have pored over
    the sayings of God's training.
  philosophy: optimal-equivalence
