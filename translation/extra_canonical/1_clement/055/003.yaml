  rationale: 'While ''ἀνδρεῖα'' derives from ''ἀνήρ'' (man) and can carry a rhetorical
    paradox when applied to women, its primary semantic force in this context is ''courageous''
    or ''brave'' (BDAG). In modern English, ''manly deeds'' distracts with connotations
    of stereotypically masculine behavior, whereas the author''s focus (illustrated
    by Judith and Esther in the following verses) is on their heroic courage. | Azure:
    The proposal is closer to the Greek. ἀνδρεῖα, though etymologically tied to ἀνήρ,
    is a standard adjective/substantive meaning ''brave, courageous,'' and in the
    phrase πολλὰ ἀνδρεῖα ἐπετέλεσαν it denotes'
