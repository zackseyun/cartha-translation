  text: Ἵνα δὲ καὶ ὑποδείγματα ἐθνῶν ἐνέγκωμεν· πολλοὶ βασιλεῖς καὶ ἡγούμενοι, λοιμικοῦ
    τινος ἐνστάντος καιροῦ, χρησμοδοτηθέντες παρέδωκαν ἑαυτοὺς εἰς θάνατον, ἵνα ῥύσωνται
    διὰ τοῦ ἑαυτῶν αἵματος τοὺς πολίτας· πολλοὶ ἐξεχώρησαν ἰδίων πόλεων, ἵνα μὴ στασιάζωσιν
    ἐπὶ πλεῖον. 2. ἐπιστάμεθα πολλοὺς ἐν ἡμῖν παραδεδωκότας ἑαυτοὺς εἰς δεσμά, ὅπως
    ἑτέρους λυτρώσωνται· πολλοὶ ἑαυτοὺς παρέδωκαν εἰς δουλείαν, καὶ λαβόντες τὰς τιμὰς
    αὐτῶν ἑτέρους ἐψώμισαν. 3. πολλαὶ γυναῖκες ἐνδυναμωθεῖσαι διὰ τῆς χάριτος τοῦ
    θεοῦ ἐπετέλεσαν πολλὰ ἀνδρεῖα. 4. Ἰουδὶθ ἡ μακαρία, ἐν συγκλεισμῷ οὔσης τῆς πόλεως,
    ᾐτήσατο παρὰ τῶν πρεσβυτέρων ἐαθῆναι αὐτὴν ἐξελθεῖν εἰς τὴν παρεμβολὴν τῶν ἀλλοφύλων.
    5. παραδοῦσα οὖν ἑαυτὴν τῷ κινδύνῳ ἐξῆλθεν δι’ ἀγάπην τῆς πατρίδος καὶ τοῦ λαοῦ
    τοῦ ὄντος ἐν συγκλεισμῷ, καὶ παρέδωκεν κύριος Ὀλοφέρνην ἐν χειρὶ θηλείας. 6. οὐχ
    ἧττον καὶ ἡ τελεία κατὰ πίστιν Ἐσθὴρ κινδύνῳ ἑαυτὴν παρέβαλεν, ἵνα τὸ δωδεκάφυλον
    τοῦ Ἰσραὴλ μέλλον ἀπολέσθαι ῥύσηται· διὰ γὰρ τῆς νηστείας καὶ τῆς ταπεινώσεως
    ἠξίωσεν τὸν παντεπόπτην δεσπότην, θεὸν τῶν αἰώνων· ὃς ἰδὼν τὸ ταπεινὸν τῆς ψυχῆς
    αὐτῆς ἐρύσατο τὸν λαόν, ὧν χάριν ἐκινδύνευσεν.
