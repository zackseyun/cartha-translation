  language: Greek
translation:
  text: And no less also Esther, perfect according to faith, put herself in danger
    so that she might rescue the twelve-tribed people of Israel, who were about to
    perish. For through fasting and humiliation she entreated the all-seeing Master,
    God of the ages; and he, seeing the humility of her soul, rescued the people for
    whose sake she had faced danger.
