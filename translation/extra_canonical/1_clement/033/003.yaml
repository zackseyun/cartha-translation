  text: τῷ γὰρ παμμεγεθεστάτῳ αὐτοῦ κράτει οὐρανοὺς ἐστήριξεν καὶ τῇ ἀκαταλήπτῳ αὐτοῦ συνέσει διεκύβευσεν αὐτούς· τὴν τε γῆν διεχώρισεν ἀπὸ τοῦ περιέχοντος αὐτὴν ὕδατος καὶ ἔδρασεν ἐπὶ τὸν ἀσφαλῆ τοῦ ἰδίου βουλήματος θεμέλιον· τὰ τε ἐν αὐτῇ ζῷα φοιτώντα τῇ ἑαυτοῦ διατάξει ἐκέλευσεν εἶναι· τὴν θάλασσαν καὶ τὰ ἐν αὐτῇ ζῷα προετοιμάσας ἐνέκλεισεν τῇ ἑαυτοῦ δυνάμει.
  language: Greek
translation:
  text: For by his exceedingly great might he established the heavens, and by his incomprehensible understanding he ordered them. He also separated the earth from the water that surrounds it and fixed it upon the secure foundation of his own purpose. And the living creatures that move about on it he commanded to exist by his own ordinance. Having prepared the sea and the living creatures in it, he enclosed the sea by his own power.
  philosophy: optimal-equivalence
