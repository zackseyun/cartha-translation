  from: the most excellent and truly great being in understanding
  to: the most excellent and exceedingly great work of his intelligence
  rationale: 'The draft attributes `κατὰ διάνοιαν` (''in understanding'') to man. However, the context of chapter 33 repeatedly emphasizes God''s attributes in creation (33:3: `συνέσει`, `βουλήματος`, `διατάξει`, `δυνάμει`). Here, `διάνοια` refers to God''s intelligence or purpose. The neuter substantives `τὸ ἐξοχώτατον καὶ παμμέγεθες` refer to man as the greatest ''thing'' or ''work'' produced by God''s intelligence. Additionally, `παμμέγεθες` is better rendered ''exceedingly great'' to capture the `παμ-` prefix and match the parallel in 33:3.'
