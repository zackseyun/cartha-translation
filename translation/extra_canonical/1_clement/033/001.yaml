id: 1CLEM.33.1
reference: 1 Clement 33:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Τί οὖν ποιήσωμεν, ἀδελφοί; ἀργήσωμεν ἀπὸ τῆς ἀγαθοποιΐας καὶ ἐγκαταλίπωμεν τὴν ἀγάπην; μηδαμῶς τοῦτό ἐάσει ὁ δεσπότης ἐφ’ ἡμῖν γε γενηθῆναι, ἀλλὰ σπεύσωμεν μετὰ ἐκτενείας καὶ προθυμίας πᾶν ἔργον ἀγαθὸν ἐπιτελεῖν.
  language: Greek
translation:
  text: What then shall we do, brothers? Shall we cease from doing good and abandon love? May the Master never allow this to happen among us. Rather, let us hasten with earnestness and eagerness to accomplish every good work.
  philosophy: optimal-equivalence
  footnotes:
