id: 1CLEM.33
reference: 1 Clement 33
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Τί οὖν ποιήσωμεν, ἀδελφοί; ἀργήσωμεν ἀπὸ τῆς ἀγαθοποιΐας καὶ ἐγκαταλίπωμεν τὴν ἀγάπην; μηδαμῶς τοῦτό ἐάσει ὁ δεσπότης ἐφ’ ἡμῖν γε γενηθῆναι, ἀλλὰ σπεύσωμεν μετὰ ἐκτενείας καὶ προθυμίας πᾶν ἔργον ἀγαθὸν ἐπιτελεῖν. 2. αὐτὸς γὰρ ὁ δημιουργὸς καὶ δεσπότης τῶν ἁπάντων ἐπὶ τοῖς ἔργοις αὐτοῦ ἀγάλλεται. 3. τῷ γὰρ παμμεγεθεστάτῳ αὐτοῦ κράτει οὐρανοὺς ἐστήριξεν καὶ τῇ ἀκαταλήπτῳ αὐτοῦ συνέσει διεκύβευσεν αὐτούς· τὴν τε γῆν διεχώρισεν ἀπὸ τοῦ περιέχοντος αὐτὴν ὕδατος καὶ ἔδρασεν ἐπὶ τὸν ἀσφαλῆ τοῦ ἰδίου βουλήματος θεμέλιον· τὰ τε ἐν αὐτῇ ζῷα φοιτώντα τῇ ἑαυτοῦ διατάξει ἐκέλευσεν εἶναι· τὴν θάλασσαν καὶ τὰ ἐν αὐτῇ ζῷα προετοιμάσας ἐνέκλεισεν τῇ ἑαυτοῦ δυνάμει. . ἐπὶ πᾶσι τὸ ἐξοχώτατον καὶ παμμέγεθες κατὰ διάνοιαν, ἄνθρωπον, ταῖς ἱεραῖς καὶ ἀμιάντοις χερσὶν ἔπλασεν τῆς ἑαυτοῦ εἰκόνος χαρακτῆρα. 5. οὕτως γὰρ φησὶν ὁ θεός· Ποιήσωμεν ἄνθρωπον κατ’ εἰκόνα καὶ καθ’ ὁμοίωσιν ἡμετέραν· καὶ ἐποίησεν ὁ θεὸς τὸν ἄνθρωπον, ἄρσεν καὶ θῆλυ ἐποίησεν αὐτούς. . ταῦτα οὖν πάντα τελειώσας ἐπῄνεσεν αὐτὰ καὶ ηὐλόγησεν
    καὶ εἶπεν· Αὐξάνεσθε καὶ πληθύνεσθε. 7. ἴδωμεν, ὅτι ἐν ἔργοις ἀγαθοῖς πάντες ἐκοσμήθησαν οἱ δίκαιοι, καὶ αὐτὸς δὲ ὁ κύριος ἔργοις ἀγαθοῖς ἑαυτὸν κοσμήσας ἐχάρη. 8. ἔχοντες οὖν τοῦτον τὸν ὑπογραμμὸν ἀόκνως προσέλθωμεν τῷ θελήματι αὐτοῦ· ἐξ ὅλης τῆς ἰσχύος ἡμῶν ἐργασώμεθα ἔργον δικαιοσύνης.
  language: Greek
  pages:
  - 303
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: What then shall we do, brothers? Shall we grow idle in doing good and abandon love? May the Master never allow this to happen among us. Rather, let us hasten with earnestness and eagerness to accomplish every good work. For the Creator and Master of all himself rejoices in his works. For by his exceedingly great might he established the heavens, and by his incomprehensible understanding he ordered them. He also separated the earth from the water that surrounds it and fixed it upon the secure foundation of his own purpose. And the living creatures that move about on it he commanded to exist by his own ordinance. Having prepared the sea and the living creatures in it, he enclosed it by his own power. Above all, with his holy and undefiled hands he formed man, the most excellent and truly great being in understanding, as the imprint of his own image. For thus God says, “Let us make man according to our image and according to our likeness.” And God made man; male and female he made them.
    So then, when he had finished all these things, he praised them and blessed them and said, “Increase and multiply.” Let us see that all the righteous were adorned with good works, and that the Lord himself, adorning himself with good works, rejoiced. Having, then, this pattern, let us come without hesitation to his will. With all our strength let us work the work of righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with fervor and readiness' for 'with earnestness and eagerness.'
    reason: lexical_alternative
  - marker: b
    text: The wording echoes Gen 1:26–28.
    reason: cross_reference
  - marker: c
    text: '''Man'' here carries a representative sense for humanity in the creation account, as shown by the following phrase ''male and female he made them.'''
    reason: cultural_note
  - marker: d
    text: Or 'example' for 'pattern'; the Greek term can denote a model set before someone for imitation.
    reason: lexical_alternative
  - marker: e
    text: Or 'Let us see, then, that'.
    reason: previous_rendering
  - marker: f
    text: Or 'let us come eagerly'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀργήσωμεν
  chosen: shall we grow idle
  alternatives:
  - shall we be lazy
  - shall we cease
  lexicon: LSJ
  rationale: Captures the hortatory question and the sense of becoming inactive or slack, not merely stopping once.
- source_word: ἀγαθοποιΐας
  chosen: doing good
  alternatives:
  - beneficence
  - good-doing
  lexicon: LSJ
  rationale: Natural English that preserves the active ethical sense of the noun.
- source_word: ἀγάπην
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Follows project default for ἀγάπη and preserves the central Christian virtue without archaic diction.
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: LSJ
  rationale: Distinguished from κύριος later in the chapter; δεσπότης carries the sense of owner/master with strong authority.
- source_word: σπεύσωμεν
  chosen: let us hasten
  alternatives:
  - let us be eager
  - let us hurry
  lexicon: LSJ
  rationale: Preserves both urgency and exhortational force.
- source_word: ἐκτενείας
  chosen: earnestness
  alternatives:
  - fervor
  - intensity
  - constancy
  lexicon: LSJ
  rationale: Conveys stretched-out zeal or sustained seriousness in idiomatic English.
- source_word: προθυμίας
  chosen: eagerness
  alternatives:
  - readiness
  - willingness
  lexicon: BDAG
  rationale: Pairs well with earnestness and reflects willing zeal.
- source_word: ἐπιτελεῖν
  chosen: to accomplish
  alternatives:
  - to complete
  - to perform
  lexicon: BDAG
  rationale: Expresses carrying good work through to realization, not merely beginning it.
- source_word: δημιουργὸς
  chosen: Creator
  alternatives:
  - craftsman
  - maker
  lexicon: LSJ
  rationale: In this cosmological context, 'Creator' best communicates God's role over all things.
- source_word: ἀγάλλεται
  chosen: rejoices
  alternatives:
  - exults
  - takes delight
  lexicon: BDAG
  rationale: Clear modern English preserving joyful delight in his works.
- source_word: παμμεγεθεστάτῳ
  chosen: exceedingly great
  alternatives:
  - all-surpassing great
  - immensely great
  lexicon: LSJ
  rationale: Represents the superlative force without awkward English.
- source_word: κράτει
  chosen: might
  alternatives:
  - power
  - strength
  lexicon: BDAG
  rationale: Suitable for divine creative power in elevated prose.
- source_word: διεκύβευσεν
  chosen: ordered
  alternatives:
  - arranged
  - disposed
  - regulated
  lexicon: LSJ
  rationale: The verb is difficult and likely conveys ordering or setting in arrangement; 'ordered' fits the cosmological context without overclaiming a technical nuance.
- source_word: ἔδρασεν
  chosen: fixed
  alternatives:
  - established
  - set firmly
  lexicon: LSJ
  rationale: Conveys making the earth firm upon a foundation.
- source_word: βουλήματος
  chosen: purpose
  alternatives:
  - counsel
  - will
  lexicon: BDAG
  rationale: Emphasizes God's deliberate design in creation; 'will' is possible but 'purpose' better suits the foundation imagery here.
- source_word: διατάξει
  chosen: ordinance
  alternatives:
  - command
  - arrangement
  - ordering
  lexicon: BDAG
  rationale: Preserves the sense of authoritative ordering in creation.
- source_word: ἐνέκλεισεν
  chosen: enclosed
  alternatives:
  - shut in
  - confined
  lexicon: LSJ
  rationale: Reflects the image of God setting bounds to the sea.
- source_word: τὸ ἐξοχώτατον καὶ παμμέγεθες κατὰ διάνοιαν
  chosen: the most excellent and truly great being in understanding
  alternatives:
  - the highest and greatest in intelligence
  - the noblest and greatest in mind
  lexicon: LSJ
  rationale: Attempts to preserve the elevated anthropological description without flattening it; κατὰ διάνοιαν qualifies humanity with respect to understanding.
- source_word: ἄνθρωπον
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: BDAG
  rationale: Retained in the creation citation and surrounding sentence for gender-accurate linkage to Genesis and the following 'male and female'; representative sense can be footnoted later if needed.
- source_word: ἀμιάντοις
  chosen: undefiled
  alternatives:
  - unstained
  - pure
  lexicon: BDAG
  rationale: Keeps the cultic-moral purity nuance in elevated style.
- source_word: χαρακτῆρα
  chosen: imprint
  alternatives:
  - stamp
  - exact representation
  - mark
  lexicon: BDAG
  rationale: '''Imprint'' preserves the image/stamp metaphor while avoiding later doctrinal overtones of more technical renderings.'
- source_word: ἐκοσμήθησαν
  chosen: were adorned
  alternatives:
  - were beautified
  - were furnished
  lexicon: LSJ
  rationale: Maintains the rhetorical motif of adornment by good works.
- source_word: ὑπογραμμὸν
  chosen: pattern
  alternatives:
  - example
  - model
  - copybook
  lexicon: BDAG
  rationale: Conveys an exemplar to be followed; 'pattern' is concise and natural while preserving the imitative force.
- source_word: ἀόκνως
  chosen: eagerly
  alternatives:
  - without hesitation
  - untiringly
  - without shrinking
  lexicon: LSJ
  rationale: Communicates prompt, unreluctant approach to God's will in context.
- source_word: ἔργον δικαιοσύνης
  chosen: the work of righteousness
  alternatives:
  - the work of justice
  - righteous work
  lexicon: BDAG
  rationale: Preserves the singular expression and aligns with project default rendering of δικαιοσύνη as 'righteousness' outside contexts where 'justice' is clearly preferable.
theological_decisions:
- issue: Rendering of δεσπότης versus κύριος in the same chapter
  chosen_reading: δεσπότης rendered 'Master'; κύριος rendered 'Lord'
  alternative_readings:
  - render both as 'Lord'
  - render δεσπότης as 'Sovereign'
  rationale: The Greek uses two distinct titles. Preserving the distinction improves transparency and avoids flattening the rhetoric of divine address.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
- issue: Anthropological term ἄνθρωπον in creation context
  chosen_reading: Rendered 'man' in the Genesis citation and surrounding allusion
  alternative_readings:
  - humankind
  - humanity
  rationale: The chapter explicitly quotes Genesis and immediately specifies 'male and female,' so 'man' best preserves the textual linkage and representative force while remaining gender-accurate to the source.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral'
- issue: δικαιοσύνη in final exhortation
  chosen_reading: Rendered 'righteousness'
  alternative_readings:
  - justice
  rationale: In this paraenetic context the emphasis is moral uprightness expressed in deeds, not primarily social-judicial justice, though the overlap remains available for footnoting.
  doctrine_reference: 'DOCTRINE.md: contested terms table'
