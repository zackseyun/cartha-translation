id: 1CLEM.60
reference: 1 Clement 60
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Σὺ γὰρ τὴν ἀέναον τοῦ κόσμου σύστασιν διὰ τῶν ἐνεργουμένων ἐφανεροποίησας· σύ, κύριε, τὴν οἰκουμένην ἔκτισας, ὁ πιστὸς ἐν πάσαις ταῖς γενεαῖς, δίκαιος ἐν τοῖς κρίμασιν, θαυμαστὸς ἐν ἰσχύϊ καὶ μεγαλοπρεπείᾳ, ὁ σοφὸς ἐν τῷ κτίζειν καὶ συνετὸς ἐν τῷ τὰ γενόμενα ἑδράσαι, ὁ ἀγαθὸς ἐν τοῖς ὁρωμένοις καὶ πιστὸς ἐν τοῖς πεποιθόσιν ἐπὶ σέ, ἐλεῆμον καὶ οἰκτίρμον, ἄφες ἡμῖν τὰς ἀνομίας ἡμῶν καὶ τὰς ἀδικίας καὶ τὰ παραπτώματα καὶ πλημμελείας. 2. μὴ λογίσῃ πᾶσαν ἁμαρτίαν δούλων σου καὶ παιδισκῶν, ἀλλὰ καθάρισον ἡμᾶς τὸν καθαρισμὸν τῆς σῆς ἀληθείας, καὶ κατεύθυνον τὰ διαβήματα ἡμῶν ἐν ὁσιότητι καρδίας πορεύεσθαι καὶ ποιεῖν τὰ καλὰ καὶ εὐάρεστα ἐνώπιόν σου καὶ ἐνώπιον τῶν ἀρχόντων ἡμῶν. 3. ναί, δέσποτα, ἐπίφανον τὸ πρόσωπών σου ἐφ’ ἡμᾶς εἰς ἀγαθὰ ἐν εἰρήνῃ, εἰς τὸ σκεπασθῆναι ἡμᾶς τῇ χειρί σου τῇ κραταιᾷ καὶ ῥυσθῆναι ἀπὸ πάσης ἁμαρτίας τῷ βραχίονί σου τῷ ὑψηλῷ, καὶ ῥῦσαι ἡμᾶς ἀπὸ τῶν μισούντων ἡμᾶς ἀδίκως. 4. δὸς ὁμόνοιαν καὶ εἰρήνην ἡμῖν τε καὶ πᾶσιν τοῖς κατοικοῦσιν τὴν γῆν, καθὼς ἔδωκας τοῖς
    πατράσιν ἡμῶν, ἐπικαλουμένων σε αὐτῶν ὁσίως ἐν πίστει καὶ ἀληθείᾳ, ὑπηκόους γινομένους τῷ παντοκράτορι καὶ παναρέτῳ ὀνόματί σου, τοῖς τε ἄρχουσιν καὶ ἡγουμένοις ἡμῶν ἐπὶ τῆς γῆς.
  language: Greek
  pages:
  - 337
  - 339
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: For you have made manifest the everlasting order of the world through your workings. You, Lord, created the inhabited earth, faithful throughout all generations, righteous in your judgments, marvelous in might and majesty, wise in creating and understanding in establishing the things that have come to be, good in the things that are seen and faithful toward those who have put their trust in you, merciful and compassionate. Forgive us our lawless deeds and our unrighteous acts and our trespasses and failings. 2 Do not count every sin of your male slaves and female slaves, but cleanse us with the cleansing of your truth, and direct our steps to walk in holiness of heart and to do the things that are good and pleasing before you and before our rulers. 3 Yes, Master, make your face shine upon us for good in peace, so that we may be sheltered by your mighty hand and delivered from every sin by your uplifted arm; and rescue us from those who hate us unjustly. 4 Give harmony and peace to
    us and to all who dwell on the earth, just as you gave them to our fathers when they called upon you in holiness, in faith and truth, becoming obedient to your almighty and all-virtuous name, and to our rulers and leaders upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '2'
    text: The Greek literally says 'your male slaves and female slaves,' a gendered pair for God's dependent people.
    reason: lexical_alternative
  - marker: '3'
    text: '''Make your face shine upon us'' echoes biblical blessing language; compare Num 6:25; Ps 67:1(66:2 LXX).'
    reason: cross_reference
  - marker: '4'
    text: The phrase 'all-virtuous name' renders a rare Greek compound emphasizing the complete excellence of God's name.
    reason: lexical_alternative
  - marker: a
    text: Or 'Do not count every sin of your male slaves and female slaves against them,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀέναον
  chosen: everlasting
  alternatives:
  - eternal
  - unceasing
  lexicon: LSJ
  rationale: Conveys enduring continuity in the world's ordered constitution without importing stronger metaphysical claims than the adjective itself requires.
- source_word: σύστασιν
  chosen: order
  alternatives:
  - constitution
  - structure
  - establishment
  lexicon: LSJ
  rationale: In context of the cosmos, 'order' communicates the arranged and sustained constitution of the world in idiomatic English while preserving the creational sense.
- source_word: ἐνεργουμένων
  chosen: your workings
  alternatives:
  - things being done
  - operations
  - works at work
  lexicon: LSJ
  rationale: The dative with διά points to God's operative acts by which the world's order is made evident; 'your workings' preserves agency and rhetorical cadence.
- source_word: οἰκουμένην
  chosen: the inhabited earth
  alternatives:
  - the world
  - the inhabited world
  lexicon: LSJ
  rationale: Retains the concrete sense of the inhabited world/earth rather than a purely abstract 'world.'
- source_word: κρίμασιν
  chosen: judgments
  alternatives:
  - decisions
  - acts of judgment
  lexicon: LSJ
  rationale: A standard rendering that preserves judicial and moral force in a doxological context.
- source_word: ἑδράσαι
  chosen: establishing
  alternatives:
  - setting firm
  - making stable
  lexicon: LSJ
  rationale: Captures the sense of making created things firm or stable, matching the creational sequence with 'creating.'
- source_word: πεποιθόσιν
  chosen: those who have put their trust in you
  alternatives:
  - those who trust in you
  - those confident in you
  lexicon: LSJ
  rationale: The perfect participle suggests a settled reliance; this rendering preserves that durative confidence.
- source_word: ἐλεῆμον καὶ οἰκτίρμον
  chosen: merciful and compassionate
  alternatives:
  - merciful and pitying
  - full of mercy and compassion
  lexicon: LSJ
  rationale: A natural paired rendering in English that preserves the twofold appeal to divine mercy.
- source_word: ἀνομίας
  chosen: lawless deeds
  alternatives:
  - lawlessnesses
  - iniquities
  lexicon: LSJ
  rationale: Keeps the concrete plural and the sense of violation of God's order without archaic diction.
- source_word: ἀδικίας
  chosen: unrighteous acts
  alternatives:
  - injustices
  - wrongdoings
  lexicon: LSJ
  rationale: Distinguishes this term from ἀνομίας while preserving moral weight.
- source_word: παραπτώματα
  chosen: trespasses
  alternatives:
  - transgressions
  - false steps
  lexicon: LSJ
  rationale: Traditional but still intelligible; fits a penitential prayer register.
- source_word: πλημμελείας
  chosen: failings
  alternatives:
  - offenses
  - errors
  - derelictions
  lexicon: LSJ
  rationale: Captures the nuance of faults or lapses distinct from the preceding sin terms.
- source_word: μὴ λογίσῃ
  chosen: do not count ... against
  alternatives:
  - do not reckon
  - do not impute
  lexicon: LSJ
  rationale: Expresses the accounting metaphor clearly in contemporary English while preserving forensic force.
- source_word: δούλων σου καὶ παιδισκῶν
  chosen: your male slaves and female slaves
  alternatives:
  - your servants and maidservants
  - your slaves and slave-girls
  lexicon: LSJ
  rationale: The paired terms are gender-specific and denote bonded status; this follows the project's gender-accurate and source-forward policy.
- source_word: καθάρισον ἡμᾶς τὸν καθαρισμὸν τῆς σῆς ἀληθείας
  chosen: cleanse us with the cleansing of your truth
  alternatives:
  - purify us by your true purification
  - cleanse us in the purity of your truth
  lexicon: LSJ
  rationale: The Greek is rhetorically emphatic and somewhat pleonastic; this rendering preserves the repetition rather than smoothing it away.
- source_word: κατεύθυνον τὰ διαβήματα ἡμῶν
  chosen: direct our steps
  alternatives:
  - make our footsteps straight
  - guide our course
  lexicon: LSJ
  rationale: An idiomatic English equivalent that preserves the biblical metaphor of ordered walking.
- source_word: ὁσιότητι καρδίας
  chosen: holiness of heart
  alternatives:
  - devoutness of heart
  - purity of heart
  lexicon: LSJ
  rationale: Preserves the cultic-ethical sense of ὁσιότης while keeping the inward focus explicit.
- source_word: δέσποτα
  chosen: Master
  alternatives:
  - Sovereign
  - Lord
  lexicon: LSJ
  rationale: Distinguishes δέσποτα from the earlier κύριε and preserves the prayer's variation in divine address.
- source_word: ἐπίφανον τὸ πρόσωπόν σου
  chosen: make your face shine
  alternatives:
  - let your face appear
  - show forth your face
  lexicon: LSJ
  rationale: Echoes scriptural blessing language and best captures the idiom in natural English.
- source_word: σκεπασθῆναι
  chosen: be sheltered
  alternatives:
  - be covered
  - be protected
  lexicon: LSJ
  rationale: Preserves the protective imagery of being covered by God's hand.
- source_word: ῥυσθῆναι
  chosen: be delivered
  alternatives:
  - be rescued
  - be saved
  lexicon: LSJ
  rationale: Fits the parallelism with divine protection and avoids overloading the phrase with later soteriological associations.
- source_word: ὁμόνοιαν
  chosen: harmony
  alternatives:
  - unity
  - concord
  lexicon: LSJ
  rationale: A key term in 1 Clement's ecclesial paraenesis; 'harmony' preserves communal and relational resonance.
- source_word: ὁσίως
  chosen: in holiness
  alternatives:
  - devoutly
  - piously
  lexicon: LSJ
  rationale: Keeps lexical continuity with ὁσιότητι while sounding natural in prayer language.
- source_word: παναρέτῳ
  chosen: all-virtuous
  alternatives:
  - perfectly virtuous
  - all-excellent
  lexicon: LSJ
  rationale: A rare but transparent compound that preserves the intensifying force of the Greek rather than flattening it to a generic adjective.
- source_word: ἄρχουσιν καὶ ἡγουμένοις
  chosen: rulers and leaders
  alternatives:
  - authorities and governors
  - princes and leaders
  lexicon: LSJ
  rationale: Preserves the paired civic terms without over-specifying constitutional roles.
theological_decisions:
- issue: Divine titles κύριε and δέσποτα in close proximity
  chosen_reading: Render κύριε as 'Lord' and δέσποτα as 'Master'
  alternative_readings:
  - Render both as 'Lord'
  - Render δέσποτα as 'Sovereign'
  rationale: The Greek varies the address, and the English should preserve that rhetorical distinction. 'Master' best reflects δέσποτα's authority nuance while remaining reverent.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve meaning and distinctions where context supports.'
- issue: δουλοι/παιδισκαι language for the praying community
  chosen_reading: Use 'male slaves and female slaves'
  alternative_readings:
  - servants and maidservants
  - servants
  rationale: The source terms denote bonded dependents and are explicitly gendered. The project's policy prefers source-accurate social force and gender accuracy over softened ecclesiastical convention.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; gender-accurate over gender-neutral.'
- issue: Scope of prayer for political authorities
  chosen_reading: Retain explicit prayer for 'our rulers and leaders upon the earth'
  alternative_readings:
  - authorities
  - governors
  rationale: The chapter's ecclesial theology includes obedience and prayer in relation to civil authorities; the translation should preserve this paraenetic and political texture without dilution.
