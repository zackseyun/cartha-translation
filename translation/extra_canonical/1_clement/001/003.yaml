source:
  edition: Funk 1901 (normalized OCR)
  text: ἀπροσωπολήμπτως γὰρ πάντα ἐποιεῖτε καὶ ἐν τοῖς νομίμοις τοῦ θεοῦ ἐπορεύεσθε, ὑποτασσόμενοι τοῖς ἡγουμένοις ὑμῶν καὶ τιμὴν τὴν καϑήκουσαν ἀπονέμοντες τοῖς παρ’ ὑμῖν πρεσβυτέροις· νέοις τε μέτρα καὶ σεμνὰ νοεῖν ἐπετρέπετε· γυναξὶν τε ἐν ἀμώμῳ καὶ σεμνῇ καὶ ἁγνῇ συνειδήσει πάντα ἐπιτελεῖν παρηγγέλλετε, στεργούσας καϑηκόντως τοὺς ἄνδρας ἑαυτῶν· ἐν τε τῷ κανόνι τῆς ὑποταγῆς ὑπάρχουσας τὰ κατὰ τὸν οἶκον σεμνῶς οἰκουρεῖν ἐδιδάσκετε, πάνυ σωφρονούσας.
  language: Greek
translation:
  text: For you did everything without partiality, and you walked in the lawful ordinances of God, submitting yourselves to your leaders and giving the honor that is fitting to the elders among you. You were directing the younger men to think moderate and dignified thoughts. And you were instructing the women to carry out all things with a blameless and dignified and pure conscience, loving their own husbands as is fitting; and you taught them, being within the rule of submission, to manage the affairs of the household with dignity, showing complete self-control.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and, being within the rule of submission, to manage'.
    reason: previous_rendering
  - marker: b
    text: Or 'to think thoughts marked by moderation and dignity'.
    reason: previous_rendering
