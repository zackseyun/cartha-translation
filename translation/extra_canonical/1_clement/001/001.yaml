id: 1CLEM.1.1
reference: 1 Clement 1:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Διὰ τὰς αἰφνιδίους καὶ ἐπαλλήλους γενομένας ἡμῖν συμφορὰς καὶ περιστάσεις, ἀδελφοί, βράδιον νομίζομεν ἐπιστροφὴν πεποιῆσθαι περὶ τῶν ἐπιζητουμένων παρʼ ὑμῖν πραγμάτων, ἀγαπητοί, τῆς τε ἀλλοτρίας καὶ ξένης τοῖς ἐκλεκτοῖς τοῦ θεοῦ, μιαρᾶς καὶ ἀνοσίου στάσεως, ἣν ὀλίγα πρόσωπα προπετῆ καὶ αὐθάδη ὑπέρχοντα εἰς τοσοῦτον ἀπονοίας ἐξέκαυσαν, ὥστε τὸ σεμνὸν καὶ περιβόητον καὶ πᾶσιν ἀνθρώποις ἀξιαγάπητον ὄνομα ὑμῶν μεγάλως βλασφημηθῆναι.
  language: Greek
translation:
  text: Because of the sudden and repeated misfortunes and crises that have happened to us, brothers, we consider that we have been somewhat slow in turning our attention to the matters disputed among you, beloved—namely, the alien and strange uprising, defiled and unholy, foreign to the chosen of God, which a few rash and self-willed persons have kindled to such a pitch of madness that your dignified and widely spoken-of name, worthy of love among all people, has been greatly blasphemed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the matters being sought from us among you'.
    reason: previous_rendering
