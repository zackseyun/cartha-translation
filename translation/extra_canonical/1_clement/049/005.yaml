id: 1CLEM.49.5
reference: 1 Clement 49:5
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: ἀγάπη κολλᾷ ἡμᾶς τῷ θεῷ, ἀγάπη καλύπτει πλῆθος ἁμαρτιῶν, ἀγάπη πάντα ἀνέχεται,
    πάντα μακροθυμεῖ· οὐδὲν βάναυσον ἐν ἀγάπῃ, οὐδὲν ὑπερήφανον· ἀγάπη σχίσμα οὐκ
    ἔχει, ἀγάπη οὐ στασιάζει, ἀγάπη πάντα ποιεῖ ἐν ὁμονοίᾳ· ἐν τῇ ἀγάπῃ ἐτελειώθησαν
    πάντες ἐκλεκτοὶ τοῦ θεοῦ, δίχα ἀγάπης οὐδὲν εὐάρεστόν ἐστιν τῷ θεῷ.
  language: Greek
translation:
  text: Love joins us to God; love covers a multitude of sins; love endures all things,
    is patient in all things. There is nothing coarse in love, nothing arrogant. Love
    has no schism; love does not stir up faction; love does all things in concord.
    In love all the elect of God were made complete; apart from love, nothing is pleasing
    to God.
  philosophy: optimal-equivalence
