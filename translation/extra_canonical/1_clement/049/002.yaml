  rationale: 'While ''explain'' is a valid gloss for ἐξηγέομαι, the context is rhetorical praise, and the author builds a lexical chain of ''telling/describing'' (ἐξηγήσασθαι in v. 2, ἐξειπεῖν in v. 3, ἀνεκδιήγητόν in v. 4). ''Describe'' or ''declare'' better captures this elevated rhetorical register and the thematic connection to the subsequent verses. | Azure: The proposed change is closer to the Greek rhetorical force. ἐξηγήσασθαι can mean not only “explain” but also “set forth, relate, describe,” and here the question τὸν δεσμὸν τῆς ἀγάπης τοῦ θεοῦ τίς δύ'
