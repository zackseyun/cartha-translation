translation:
  text: 'Whoever has love in the Messiah, let him do the Messiah’s commandments. Who
    is able to explain the bond of God’s love? Who is sufficient to tell the greatness
    of its beauty? The height to which love lifts us is beyond telling. Love joins
    us to God; love covers a multitude of sins; love endures all things, is patient
    in all things. There is nothing coarse in love, nothing arrogant. Love has no
    schism; love does not stir up faction; love does all things in concord. In love
    all the elect of God were made complete; apart from love, nothing is pleasing
    to God. In love the Master received us: because of the love that he had toward
    us, Jesus Messiah our Lord gave his blood for us by the will of God, and his flesh
    for our flesh and his life for our lives.'
  philosophy: optimal-equivalence
