lexical_decisions:
- source_word: ἀγάπη
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Default project rendering; the chapter is a sustained encomium and exhortation
    concerning divine and communal love, and 'love' preserves both theological weight
    and readability.
- source_word: ἐν Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Χριστός is treated as a title here rather than a fixed name-like form;
    'Messiah' preserves the meaning of the title in keeping with project policy.
- source_word: παραγγέλματα
  chosen: commandments
  alternatives:
  - commands
  - injunctions
  lexicon: BDAG
  rationale: The noun carries authoritative ethical instruction; 'commandments' best
    preserves the paraenetic and ecclesial force of the exhortation.
- source_word: δεσμός
  chosen: bond
  alternatives:
  - tie
  - chain
  lexicon: BDAG
  rationale: The image is relational and unitive rather than punitive; 'bond' captures
    the metaphor of love as that which binds believers to God and one another.
- source_word: ἐξηγήσασθαι
  chosen: explain
  alternatives:
  - expound
  - set forth
  lexicon: BDAG
  rationale: The verb denotes setting out or explaining fully; 'explain' is idiomatic
    modern English while retaining the sense of articulating what is otherwise hard
    to express.
- source_word: μεγαλεῖον
  chosen: greatness
  alternatives:
  - majesty
  - magnificence
  lexicon: LSJ
  rationale: In the phrase 'the greatness of its beauty,' the term points to grandeur
    or magnitude; 'greatness' keeps the rhetorical parallel with the following 'height'
    image.
- source_word: καλλονή
  chosen: beauty
  alternatives:
  - loveliness
  lexicon: BDAG
  rationale: The text praises the attractiveness and excellence of love; 'beauty'
    is the most direct and elevated rendering.
- source_word: ἀνεκδιήγητον
  chosen: beyond telling
  alternatives:
  - indescribable
  - inexpressible
  lexicon: BDAG
  rationale: A slightly dynamic rendering preserves the rhetorical force in natural
    English while conveying that love's exalted height cannot be fully narrated.
- source_word: κολλᾷ
  chosen: joins
  alternatives:
  - binds
  - clings
  lexicon: BDAG
  rationale: The verb can mean join closely or glue to; 'joins us to God' communicates
    intimate attachment without awkward literalism.
- source_word: καλύπτει πλῆθος ἁμαρτιῶν
  chosen: covers a multitude of sins
  alternatives:
  - covers many sins
  lexicon: BDAG
  rationale: This preserves the recognizable scriptural cadence and the full force
    of πλῆθος as 'multitude.'
- source_word: ἀνέχεται
  chosen: endures all things
  alternatives:
  - bears all things
  - puts up with everything
  lexicon: BDAG
  rationale: The verb denotes bearing with or enduring; 'endures all things' fits
    the solemn cadence and avoids colloquial weakness.
- source_word: μακροθυμεῖ
  chosen: is patient in all things
  alternatives:
  - is long-suffering in all things
  - forbears in all things
  lexicon: BDAG
  rationale: The verb emphasizes patient restraint; this rendering keeps the repeated
    πάντα structure while using accessible English.
- source_word: βάναυσον
  chosen: coarse
  alternatives:
  - vulgar
  - boorish
  - base
  lexicon: LSJ
  rationale: The adjective suggests what is unbecoming, crude, or ignoble; 'coarse'
    is concise and natural in English.
- source_word: ὑπερήφανον
  chosen: arrogant
  alternatives:
  - proud
  - haughty
  lexicon: BDAG
  rationale: The term denotes overbearing pride; 'arrogant' captures the negative
    moral sense more clearly than the broader 'proud.'
- source_word: σχίσμα
  chosen: schism
  alternatives:
  - division
  - split
  lexicon: BDAG
  rationale: Given the ecclesial context of 1 Clement, 'schism' preserves the churchly
    and communal dimension better than a generic 'division.'
- source_word: στασιάζει
  chosen: does not stir up faction
  alternatives:
  - does not revolt
  - does not cause sedition
  - does not make factions
  lexicon: BDAG
  rationale: The verb concerns factional strife; this rendering makes explicit the
    communal disturbance in idiomatic English.
- source_word: ὁμονοία
  chosen: concord
  alternatives:
  - harmony
  - unity
  lexicon: BDAG
  rationale: The term denotes like-minded unity; 'concord' preserves elevated rhetorical
    tone and communal emphasis.
- source_word: ἐτελειώθησαν
  chosen: were made complete
  alternatives:
  - were perfected
  - reached completion
  lexicon: BDAG
  rationale: The passive points to being brought to completion; 'were made complete'
    avoids overreading later perfection-language while retaining theological depth.
- source_word: ἐκλεκτοί
  chosen: the elect
  alternatives:
  - the chosen ones
  lexicon: BDAG
  rationale: This is established theological language and fits the ecclesial register
    of the passage.
- source_word: εὐάρεστον
  chosen: pleasing
  alternatives:
  - acceptable
  - well-pleasing
  lexicon: BDAG
  rationale: '''Pleasing to God'' is natural English and preserves the Godward evaluative
    sense.'
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: BDAG
  rationale: Distinct from κύριος later in the sentence; 'Master' preserves the lexical
    distinction while fitting early Christian devotional language.
- source_word: προσελάβετο
  chosen: received us
  alternatives:
  - took us to himself
  - welcomed us
  lexicon: BDAG
  rationale: The middle voice suggests taking to oneself or receiving; 'received us'
    is concise and leaves the relational nuance intact.
- source_word: ἐν θελήματι θεοῦ
  chosen: by the will of God
  alternatives:
  - in accordance with God's will
  lexicon: BDAG
  rationale: This straightforward rendering preserves the instrumental/accord sense
    and familiar theological cadence.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - body
  lexicon: BDAG
  rationale: The term is literal here in the sacrificial parallelism 'his flesh for
    our flesh'; 'flesh' preserves the embodied concreteness of the Greek.
- source_word: ψυχή
  chosen: life
  alternatives:
  - soul
  lexicon: BDAG
  rationale: In the exchange formula, ψυχή most naturally denotes life rather than
    an abstract immaterial soul; 'life for our lives' communicates sacrificial self-giving
    clearly.
theological_decisions:
- issue: Rendering Χριστός in this chapter
  chosen_reading: Messiah in both occurrences
  alternative_readings:
  - Christ
  rationale: The title remains semantically alive in this paraenetic context, and
    project policy prefers translating titles where context supports it.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Referent of αὐτοῦ in 'τὸ μεγαλεῖον τῆς καλλονῆς αὐτοῦ'
  chosen_reading: its beauty, referring to love
  alternative_readings:
  - his beauty, referring to God
  rationale: The surrounding lines are a sustained meditation on love, and the neuter
    conceptual flow favors taking the pronoun with the immediately discussed reality
    of love rather than shifting to God as antecedent.
- issue: Meaning of ψυχή in the final clause
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The context is Christ's self-offering in parallel with blood and flesh;
    'life' better reflects concrete self-giving and avoids importing later soul/body
    dualism.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
