  text: Ὁ ἔχων ἀγάπην ἐν Χριστῷ ποιησάτω τὰ τοῦ Χριστοῦ παραγγέλματα. 2. τὸν δεσμὸν
    τῆς ἀγάπης τοῦ θεοῦ τίς δύναται ἐξηγήσασθαι; 3. τὸ μεγαλεῖον τῆς καλλονῆς αὐτοῦ
    τίς ἀρκετὸς ἐξειπεῖν; 4. τὸ ὕψος, εἰς ὃ ἀνάγει ἡ ἀγάπη, ἀνεκδιήγητόν ἐστιν. .
    ἀγάπη κολλᾷ ἡμᾶς τῷ θεῷ, ἀγάπη καλύπτει πλῆθος ἁμαρτιῶν, ἀγάπη πάντα ἀνέχεται,
