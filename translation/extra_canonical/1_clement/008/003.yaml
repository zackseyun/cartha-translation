  text: Μετανοήσατε, οἶκος Ἰσραήλ, ἀπὸ τῆς ἀνομίας ὑμῶν· εἶπον τοῖς υἱοῖς τοῦ λαοῦ
    μου· Ἐὰν ὦσιν αἱ ἁμαρτίαι ὑμῶν ἀπὸ τῆς γῆς ἕως τοῦ οὐρανοῦ καὶ ἐὰν ὦσιν πυρρότεραι
    κόκκου καὶ μελανώτεραι σάκκου, καὶ ἐπιστραφῆτε πρὸς με ἐξ ὅλης τῆς καρδίας καὶ
    εἴπητε· Πάτερ, ἐπακούσομαι ὑμῶν ὡς λαοῦ ἁγίου.
  language: Greek
translation:
  text: “Repent, O house of Israel, of your lawlessness. Say to the sons of my people,
    ‘Even if your sins should reach from the earth to heaven, and even if they are
    redder than scarlet and blacker than sackcloth, yet if you turn to me with your
    whole heart and say, “Father,” I will listen to you as to a holy people.’”
  philosophy: optimal-equivalence
