  edition: Funk 1901 (normalized OCR)
  text: καὶ ἐν ἑτέρῳ τόπῳ λέγει οὕτως· Λούσασθε καὶ καθαροὶ γένεσθε, ἀφέλεσθε τὰς
    πονηρίας ἀπὸ τῶν ψυχῶν ὑμῶν ἀπέναντι τῶν ὀφθαλμῶν μου· παύσασθε ἀπὸ τῶν πονηριῶν
    ὑμῶν, μάθετε καλὸν ποιεῖν, ἐκζητήσατε κρίσιν, ῥύσασθε ἀδικούμενον, κρίνατε ὀρφανῷ
    καὶ δικαιώσατε χήραν· καὶ δεῦτε καὶ διελεγχθῶμεν, λέγει κύριος· καὶ ἐὰν ὦσιν αἱ
    ἁμαρτίαι ὑμῶν ὡς φοινικοῦν, ὡς χιόνα λευκανῶ· ἐὰν δὲ ὦσιν ὡς κόκκινον, ὡς ἔριον
    λευκανῶ· καὶ ἐὰν θέλητε καὶ εἰσακούσητέ μου, τὰ ἀγαθὰ τῆς γῆς φάγεσθε· ἐὰν δὲ
    μὴ θέλητε μηδὲ εἰσακούσητέ μου, μάχαιρα ὑμᾶς κατέδεται· τὸ γὰρ στόμα κυρίου ἐλάλησεν
    ταῦτα.
  language: Greek
translation:
  text: 'And in another place he says thus: “Wash and become clean; remove your wicked
    deeds from before my eyes, from your souls; cease from your wickednesses, learn
    to do good, seek justice, rescue the one being wronged, judge for the orphan,
    and give justice to the widow. And come, and let us reason together,” says the
    Lord. “Even if your sins are like crimson, I will whiten them like snow; and if
    they are like scarlet, I will whiten them like wool. But if you are willing and
    listen to me, you shall eat the good things of the land; but if you are not willing
    and do not listen to me, a sword will devour you; for the mouth of the Lord has
    spoken these things.”'
  philosophy: optimal-equivalence
  footnotes:
