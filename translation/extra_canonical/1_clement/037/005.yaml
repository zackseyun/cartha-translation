  text: λάβωμεν τὸ σῶμα ἡμῶν· ἡ κεφαλὴ δίχα τῶν ποδῶν οὐδέν ἐστιν, οὕτως οὐδὲ οἱ πόδες δίχα τῆς κεφαλῆς· τὰ δὲ ἐλάχιστα μέλη τοῦ σώματος ἡμῶν ἀναγκαῖα καὶ εὔχρηστά εἰσιν ὅλῳ τῷ σώματι· ἀλλὰ πάντα συνεπνεῖ καὶ ὑποταγῇ μιᾷ χρῆται εἰς τὸ σώζεσϑαι ὅλον τὸ σῶμα.
  language: Greek
translation:
  text: 'Let us take our body as an example: the head is nothing without the feet; likewise the feet are nothing without the head. Even the smallest members of our body are necessary and useful to the whole body. But all work together in harmony and practice a single submission, so that the whole body may be preserved.'
