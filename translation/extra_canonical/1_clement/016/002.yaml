  category: lexical
  tier: 3
  from: a man being in plague and toil
  to: a man being in suffering and toil
  rationale: 'While πληγή can mean ''plague'' (e.g., in Revelation), in the context
    of the LXX Suffering Servant it refers to a ''blow'', ''wound'', or general ''suffering''
    (translating Hebrew terms for pain and being stricken). ''Plague'' strongly implies
    infectious disease to a modern reader, which distorts the intended meaning. (Note:
    this also applies to the use of ''plague'' in 16:4). | Azure: The proposed change
    is closer to the sense of the Greek in this context. πληγή can denote a blow,
    wound, affliction, or plague, but here Clement is quoting/paraphrasing Isa 53
    in the LXX-like register'
