source:
  edition: Funk 1901 (normalized OCR)
  text: τὸ σκῆπτρον τῆς μεγαλωσύνης τοῦ θεοῦ, ὁ κύριος Ἰησοῦς Χριστός, οὐχ ἦλθεν ἐν
    κόμπῳ ἀλαζονείας οὐδὲ ὑπερηφανίας, καίπερ δυνάμενος, ἀλλὰ ταπεινοφρονῶν, καθὼς
    τὸ πνεῦμα τὸ ἅγιον περὶ αὐτοῦ ἐλάλησεν· φησὶν γάρ· . Κύριε, τίς ἐπίστευσεν τῇ
    ἀκοῇ ἡμῶν; καὶ ὁ βραχίων κυρίου τίνι ἀπεκαλύφθη; ἀνηγγείλαμεν ἐναντίον αὐτοῦ,
    ὡς παιδίον, ὡς ῥίζα ἐν γῇ διψώσῃ· οὐκ ἔστιν εἶδος αὐτῷ οὐδὲ δόξα, καὶ εἴδομεν
    αὐτόν, καὶ οὐκ εἶχεν εἶδος οὐδὲ κάλλος, ἀλλὰ τὸ εἶδος αὐτοῦ ἄτιμον, ἐκλεῖπον παρὰ
    τὸ εἶδος τῶν ἀνθρώπων· ἄνθρωπος ἐν πληγῇ ὢν καὶ πόνῳ καὶ εἰδὼς φέρειν μαλακίαν
    ὅτι ἀπέστραπται τὸ πρόσωπον αὐτοῦ, ἠτιμάσθη καὶ οὐκ ἐλογίσθη.
  language: Greek
translation:
  text: 'The scepter of the majesty of God, the Lord Jesus Messiah, did not come in
    the pomp of arrogance or pride, though he was able to do so, but in humility of
    mind, just as the Holy Spirit spoke concerning him. For it says:


    “Lord, who has believed our report?

    and to whom has the arm of the Lord been revealed?

    We announced him before him,

    like a child,

    like a root in thirsty ground.

    He has no form nor glory,

    and we saw him,

    and he had neither form nor beauty,

    but his appearance was dishonored,

    failing beyond the appearance of men;

    a man being in plague and toil

    and knowing how to bear weakness,

    because his face is turned away;

    he was dishonored and not esteemed.'
  philosophy: optimal-equivalence
