id: 1CLEM.16.7
reference: 1 Clement 16:7
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ κύριος παρέδωκεν αὐτὸν ὑπὲρ τῶν ἁμαρτιῶν ἡμῶν, καὶ αὐτὸς διὰ τὸ κεκακῶσθαι οὐκ ἀνοίγει τὸ στόμα. ὡς πρόβατον ἐπὶ σφαγὴν ἤχθη, καὶ ὡς ἀμνὸς ἐναντίον τοῦ κείραντος ἄφωνος, οὕτως οὐκ ἀνοίγει τὸ στόμα αὐτοῦ. ἐν τῇ ταπεινώσει ἡ κρίσις αὐτοῦ ἤρθη.
  language: Greek
translation:
  text: 'And the Lord gave him over for our sins,

    and he, because of being afflicted,

    does not open his mouth.

    Like a sheep he was led to slaughter,

    and as a lamb before its shearer is voiceless,

    so he does not open his mouth.

    In his humiliation his judgment was taken away.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and like a lamb before the one shearing it is voiceless'.
    reason: previous_rendering
