  from: and like a lamb before the one shearing it is voiceless
  to: and as a lamb before its shearer is voiceless
  rationale: The English construction 'like a [noun] ... is [adjective]' is grammatically awkward; 'as' pairs correctly with the following 'so' (translating the correlative ὡς ... οὕτως). Additionally, 'its shearer' is a more natural and equally accurate rendering of the substantival participle τοῦ κείραντος than 'the one shearing it.'
