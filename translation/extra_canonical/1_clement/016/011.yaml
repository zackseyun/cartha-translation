  rationale: 'The phrase ''περὶ ἁμαρτίας'' is a standard LXX technical idiom for a ''sin offering'' (e.g., Lev 5:11, Rom 8:3, Heb 10:6). Translating it literally as ''give for sin'' in English is awkward and could easily be misread as giving to promote sin; supplying ''an offering'' reflects the clear lexical force of the idiom. | Azure: The proposed change is closer to the idiomatic force of the Greek. In sacrificial contexts, περὶ ἁμαρτίας is a well-established LXX expression meaning a sin offering, not simply "for sin" in a bare, l'
