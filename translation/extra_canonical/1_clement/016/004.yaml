  rationale: In the context of this LXX quotation (Isaiah 53:4), 'πόνος' translates
    Hebrew 'mak'ob' (pain/suffering), not 'toil' (labor). Likewise, 'πληγή' translates
    'nagua'' (stricken/smitten) and refers to a physical 'blow' or 'stroke', not a
    'plague' (which implies an infectious epidemic in modern English). Rendering it
    as 'under a blow' accurately reflects the Greek noun while remaining natural in
    English.
