  rationale: 'The Greek uses two parallel noun phrases (ὄνειδος ἀνθρώπων καὶ ἐξουθένημα λαοῦ). Translating the noun ἐξουθένημα (object of contempt/scorn) as the participle ''despised'' breaks the rhetorical parallelism of the source. ''The scorn of the people'' or ''an object of contempt to the people'' preserves the noun form and the poetic balance. | Azure: The proposed change is closer to the Greek. In Ἐγὼ δὲ εἰμι σκώληξ καὶ οὐκ ἄνθρωπος, ὄνειδος ἀνθρώπων καὶ ἐξουθένημα λαοῦ, both ὄνειδος and ἐξουθένημα are predicate nouns in parallel apposition to ἐγώ/'
