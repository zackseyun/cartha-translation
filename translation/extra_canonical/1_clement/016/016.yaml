    they shook their heads:'
  rationale: The literal rendering of the present participle (οἱ θεωροῦντές) with an aorist main verb (ἐξεμυκτήρισάν) creates an awkward tense clash in English ('see me mocked me'). Aligning them to the past ('saw me mocked me') resolves this. Furthermore, the singular 'head' (κεφαλήν) following a plural subject is a Greek distributive singular; English idiom requires the plural 'heads'.
