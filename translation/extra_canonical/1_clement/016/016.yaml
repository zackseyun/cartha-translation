reference: 1 Clement 16:16
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: πάντες οἱ θεωροῦντές με ἐξεμυκτήρισάν με, ἐλάλησαν ἐν χείλεσιν, ἐκίνησαν κεφαλήν· Ἤλπισεν ἐπὶ κύριον, ῥυσάσθω αὐτόν, σωσάτω αὐτόν, ὅτι θέλει αὐτόν.
  language: Greek
translation:
  text: 'All who saw me mocked me;

    they spoke with their lips,

    they shook their heads:

    ‘He hoped in the Lord; let him rescue him;

    let him save him, because he delights in him.’”'
