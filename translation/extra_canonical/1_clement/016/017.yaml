  rationale: 'In Clement''s rhetorical style, ''Ὁρᾶτε'' functions here as an imperative directing the audience''s attention to the preceding exemplum (similar to his frequent use of ἴδωμεν or κατανοήσωμεν). The indicative ''You see'' weakens this hortatory force. Additionally, ''what is the pattern given to us'' resolves the slightly awkward English syntax of ending the clause with ''is''. | Azure: The proposed change is closer to the Greek. Ὁρᾶτε is a present active imperative plural (''see,'' ''look''), not an indicative ''you see''; in Clement''s exhortatory rhetoric this directly summons the Corint'
