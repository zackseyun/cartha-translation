lexical_decisions:
- source_word: ταπεινοφρονῶν / ταπεινοφρονῶντω
  chosen: humble-minded / in humility of mind
  alternatives:
  - humble
  - lowly
  - meek
  lexicon: LSJ
  rationale: The term emphasizes not merely outward lowliness but an inward posture
    of humility. Rendering with 'humble-minded' or 'in humility of mind' preserves
    the paraenetic force and lexical connection within the chapter.
- source_word: σκῆπτρον τῆς μεγαλωσύνης
  chosen: the scepter of the majesty
  alternatives:
  - the scepter of greatness
  - the royal scepter of majesty
  lexicon: LSJ
  rationale: A regal metaphor is central here. 'Scepter' preserves the royal image,
    while 'majesty' fits μεγαλωσύνη as exalted greatness associated with God.
- source_word: κόμπος
  chosen: pomp
  alternatives:
  - display
  - boastful show
  lexicon: LSJ
  rationale: The word denotes ostentatious display. 'Pomp' captures the rhetorical
    contrast with the Messiah's humility.
- source_word: ἀλαζονεία
  chosen: arrogance
  alternatives:
  - boastfulness
  - pretension
  lexicon: BDAG
  rationale: '''Arrogance'' is clear modern English and pairs naturally with ''pride''
    for the vice list.'
- source_word: Χριστός
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, the title is translated where context supports
    titular force. Here it is clearly christological and not merely name-like.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This matches project defaults and preserves both scriptural cadence and
    high christological force.
- source_word: ἀκοή
  chosen: report
  alternatives:
  - message
  - hearing
  lexicon: LSJ
  rationale: In the Isaiah citation, 'report' best fits the prophetic proclamation
    being received or rejected.
- source_word: μαλακία
  chosen: weakness
  alternatives:
  - sickness
  - frailty
  lexicon: LSJ
  rationale: The term can denote sickness or weakness; 'weakness' better suits the
    broader suffering context without over-specifying bodily illness.
- source_word: παιδεία
  chosen: chastisement
  alternatives:
  - discipline
  - correction
  lexicon: BDAG
  rationale: In the Isaianic context, the term refers to punitive or corrective suffering
    borne for others. 'Chastisement' preserves that gravity.
- source_word: μώλωψ
  chosen: bruise
  alternatives:
  - wound
  - stripe
  lexicon: LSJ
  rationale: '''Bruise'' is a direct and accessible rendering of the injury term,
    while retaining the scriptural resonance of the line.'
- source_word: ἀνομία
  chosen: lawless deed / lawless deeds
  alternatives:
  - iniquity
  - wickedness
  lexicon: BDAG
  rationale: '''Lawlessness'' language preserves the moral-theological force of violation
    against God''s order better than the more traditional but less transparent ''iniquity.'''
- source_word: ὑπογραμμός
  chosen: pattern
  alternatives:
  - example
  - model
  - copy
  lexicon: BDAG
  rationale: The word can denote a writing-copy or model for imitation. 'Pattern'
    preserves the exemplary force without sounding overly technical.
- source_word: ζυγός
  chosen: yoke
  alternatives:
  - bond
  - burden
  lexicon: BDAG
  rationale: The metaphor is traditional and should be preserved. 'Yoke' keeps the
    ecclesial and discipleship imagery intact.
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: '''Grace'' is the established theological rendering and fits the salvific
    context here.'
theological_decisions:
- issue: Christological title Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The chapter presents Jesus in explicitly scriptural and royal categories;
    translating the title preserves its meaning rather than treating it as a bare
    proper name.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Use of Isaiah 53 language for Jesus
  chosen_reading: Retain sacrificial and substitution-shaped wording such as 'bears
    our sins' and 'was wounded because of our sins'
  alternative_readings:
  - Soften to general suffering language
  rationale: The Greek citation explicitly uses sin-bearing and vicarious suffering
    language. The translation preserves the theological tension and force rather than
    reducing it to mere example.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Address ἄνδρες ἀγαπητοί
  chosen_reading: beloved men
  alternative_readings:
  - beloved brothers
  - beloved people
  rationale: The Greek is grammatically masculine and directly addresses the audience
    in male terms. Per project policy, gender-accurate rendering is preferred, even
    where representative force may be present.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
