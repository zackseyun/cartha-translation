id: 1CLEM.32
reference: 1 Clement 32
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Ὁ ἐὰν τις καθ’ ἓν ἕκαστον εἰλικρινῶς κατανοήσῃ, ἐπιγνώσεται μεγαλεῖα τῶν ὑπ’ αὐτοῦ δεδομένων δωρεῶν. 2. ἐξ αὐτοῦ γὰρ ἱερεῖς καὶ λευῖται πάντες οἱ λειτουργοῦντες τῷ θυσιαστηρίῳ τοῦ θεοῦ· ἐξ αὐτοῦ ὁ κύριος Ἰησοῦς τὸ κατὰ σάρκα· ἐξ αὐτοῦ βασιλεῖς καὶ ἄρχοντες καὶ ἡγούμενοι κατὰ τὸν Ἰούδαν· τὰ δὲ λοιπὰ σκῆπτρα αὐτοῦ οὐκ ἐν μικρᾷ δόξῃ ὑπάρχουσιν, ὡς ἐπαγγειλαμένου τοῦ θεοῦ, ὅτι ἔσται τὸ σπέρμα σου ὡς οἱ ἀστέρες τοῦ οὐρανοῦ. 3. πάντες οὖν ἐδοξάσθησαν καὶ ἐμεγαλύνθησαν οὐ δι’ αὑτῶν ἢ τῶν ἔργων αὐτῶν ἢ τῆς δικαιοπραγίας ἧς κατειργάσαντο, ἀλλὰ διὰ τοῦ θελήματος αὐτοῦ. 4. καὶ ἡμεῖς οὖν, διὰ θελήματος αὐτοῦ ἐν Χριστῷ Ἰησοῦ κληθέντες, οὐ δι’ ἑαυτῶν δικαιούμεθα οὐδὲ διὰ τῆς ἡμετέρας σοφίας ἢ συνέσεως ἢ εὐσεβείας ἢ ἔργων ὧν κατειργασάμεθα ἐν ὁσιότητι καρδίας, ἀλλὰ διὰ τῆς πίστεως, δ’ ἧς πάντας τοὺς ἀπ’ αἰῶνος ὁ παντοκράτωρ θεὸς ἐδικαίωσεν· ᾧ ἔστω ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
  language: Greek
  pages:
  - 301
  - 303
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: If anyone sincerely considers this point by point, they will recognize the greatness of the gifts given by him. For from him are priests and Levites, all who minister at the altar of God; from him is the Lord Jesus according to the flesh; from him are kings and rulers and leaders in the line of Judah; and his remaining tribes are not in small glory, just as God promised, saying, “Your seed will be as the stars of heaven.” Therefore all were glorified and made great, not through themselves or through their works or through the righteous deeds that they accomplished, but through his will. And so we also, having been called through his will in Messiah Jesus, are not justified through ourselves, nor through our own wisdom or understanding or godliness or works that we have done in holiness of heart, but through faith, by which the Almighty God justified all who have been from the beginning. To him be the glory forever and ever. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are in no little glory.' The Greek uses a litotes, an understated way of expressing significant honor.
    reason: lexical_alternative
  - marker: b
    text: '''According to the flesh'' likely refers to Jesus'' descent in human lineage from the patriarchal line, especially Judah; compare similar early Christian genealogical language.'
    reason: cross_reference
  - marker: c
    text: Some may prefer 'Christ Jesus' here. We render Χριστῷ as 'Messiah' where the title's meaning remains active.
    reason: lexical_alternative
  - marker: d
    text: Or 'Whoever sincerely considers each thing one by one will recognize'.
    reason: previous_rendering
  - marker: e
    text: Or 'according to Judah'.
    reason: previous_rendering
lexical_decisions:
- source_word: εἰλικρινῶς
  chosen: sincerely
  alternatives:
  - carefully
  - purely
  lexicon: LSJ
  rationale: Conveys moral and intellectual candor in the act of considering, fitting the paraenetic tone without sounding overly technical.
- source_word: κατανοήσῃ
  chosen: considers
  alternatives:
  - perceives
  - examines
  lexicon: BDAG
  rationale: A balanced rendering that preserves deliberate reflection rather than mere sight or abstract comprehension.
- source_word: μεγαλεῖα
  chosen: the greatness
  alternatives:
  - great things
  - mighty acts
  lexicon: LSJ
  rationale: In context the focus is on the magnitude of God's gifts rather than discrete miraculous acts, so an abstract collective rendering fits the sentence flow.
- source_word: δωρεῶν
  chosen: gifts
  alternatives:
  - free gifts
  - gracious gifts
  lexicon: BDAG
  rationale: Plain 'gifts' is natural English and retains the sense of what God has bestowed.
- source_word: λειτουργοῦντες
  chosen: minister
  alternatives:
  - serve
  - perform sacred service
  lexicon: BDAG
  rationale: Preserves cultic and ecclesial texture better than the flatter 'serve,' especially with reference to the altar.
- source_word: θυσιαστηρίῳ
  chosen: altar
  alternatives:
  - sacrificial altar
  lexicon: BDAG
  rationale: Standard and sufficiently clear in this Jewish cultic context.
- source_word: τὸ κατὰ σάρκα
  chosen: according to the flesh
  alternatives:
  - in terms of human descent
  - with respect to the flesh
  lexicon: BDAG
  rationale: Retains the traditional theological phrasing and the source's idiom, important for auditable intertextual resonance with early Christian usage.
- source_word: ἡγούμενοι
  chosen: leaders
  alternatives:
  - governors
  - chief men
  lexicon: BDAG
  rationale: A broad political-social term here; 'leaders' is readable and avoids over-specifying office.
- source_word: σκῆπτρα
  chosen: tribes
  alternatives:
  - scepters
  - ruling lines
  lexicon: LSJ
  rationale: Though literally 'scepters,' in this context it refers to Israel's tribal divisions or lines descending from Jacob. 'Tribes' best fits the contrast with Judah and the allusion to the patriarchal promise.
- source_word: οὐκ ἐν μικρᾷ δόξῃ
  chosen: are not in small glory
  alternatives:
  - are in no little glory
  - have no small honor
  lexicon: BDAG
  rationale: Keeps the litotes of the Greek while remaining intelligible; the slightly marked phrasing preserves rhetorical texture.
- source_word: ἐδοξάσθησαν καὶ ἐμεγαλύνθησαν
  chosen: were glorified and made great
  alternatives:
  - were honored and magnified
  - were glorified and exalted
  lexicon: BDAG
  rationale: Maintains the paired passive verbs and their God-centered force.
- source_word: δικαιοπραγίας
  chosen: righteous deeds
  alternatives:
  - acts of righteousness
  - upright conduct
  lexicon: LSJ
  rationale: Expresses concrete righteous action without sounding wooden.
- source_word: δικαιούμεθα
  chosen: are justified
  alternatives:
  - are declared righteous
  - are made righteous
  lexicon: BDAG
  rationale: This is a theologically weighty term with strong early Christian resonance; 'are justified' preserves that connection and invites later annotation if needed.
- source_word: εὐσεβείας
  chosen: godliness
  alternatives:
  - piety
  - devotion
  lexicon: BDAG
  rationale: '''Godliness'' is accessible modern English and preserves the religious-ethical sense.'
- source_word: ὁσιότητι καρδίας
  chosen: holiness of heart
  alternatives:
  - purity of heart
  - devoutness of heart
  lexicon: BDAG
  rationale: Keeps the inward moral-religious emphasis and echoes biblical idiom.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per project defaults, 'faith' is preferred unless context strongly demands otherwise; here the broader early Christian soteriological claim aligns with that default.
- source_word: ἀπ’ αἰῶνος
  chosen: from the beginning
  alternatives:
  - from of old
  - from eternity
  lexicon: BDAG
  rationale: Natural English that preserves the temporal sweep without forcing a metaphysical reading of eternity.
- source_word: παντοκράτωρ
  chosen: Almighty
  alternatives:
  - All-ruler
  - Omnipotent One
  lexicon: BDAG
  rationale: Established biblical rendering that is both readable and theologically weighty.
- source_word: Χριστῷ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project philosophy, the title is translated where context supports titular force. In 'Messiah Jesus' the messianic sense remains active rather than name-like.
theological_decisions:
- issue: Relation of justification to works in 32.3–4
  chosen_reading: Clement teaches that both the patriarchal people and 'we also' are glorified/justified not by themselves or their works but by God's will and, specifically for believers, through faith.
  alternative_readings:
  - Clement speaks only of humility, not soteriology proper
  - Clement teaches justification by faithfulness rather than faith
  rationale: The repeated contrast between self/works and God's will, climaxing in 'but through faith,' is too explicit to reduce to mere moral exhortation. The noun πίστις is rendered by project default as 'faith,' while the broader paraenetic context still allows later discussion of faith's obedient shape.
  doctrine_reference: 'DOCTRINE.md: contested terms πίστις; preserve theological tension without erasing lexical force.'
- issue: Rendering τὸ κατὰ σάρκα with reference to Jesus
  chosen_reading: Rendered 'according to the flesh' to preserve incarnational and genealogical nuance.
  alternative_readings:
  - in human descent
  - as regards his humanity
  rationale: The phrase likely marks descent from the patriarchal line, especially Judah, yet it also resonates with early Christian flesh-language. A more interpretive paraphrase would narrow the phrase prematurely.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it.'
- issue: Rendering σκῆπτρα in the clause about Judah and the rest
  chosen_reading: Understood contextually as 'tribes' rather than literal 'scepters.'
  alternative_readings:
  - scepters
  - ruling houses
  rationale: 'The argument traces lines descending from Jacob/Israel: priests and Levites, the Lord Jesus from Judah, kings and rulers according to Judah, and then the remaining tribal lines. Literal ''scepters'' is possible but obscures the genealogical logic in English.'
  doctrine_reference: 'PHILOSOPHY.md: readable modern English without flattening source meaning.'
