  text: σηπομένης δὲ τῆς σαρκὸς σκώληξ τις γεννᾶται, ὃς ἐκ τῆς ἰκμάδος τοῦ τετελευτηκότος ζώου ἀνατρεφόμενος πτεροφυεῖ· εἶτα γενναῖος γενόμενος αἴρει τὸν σηκὸν ἐκεῖνον, ὅπου τὰ ὀστᾶ τοῦ προγεγονότος ἐστίν, καὶ ταῦτα βαστάζων διανύει ἀπὸ τῆς Ἀραβικῆς χώρας ἕως τῆς Αἰγύπτου εἰς τὴν λεγομένην Ἡλιούπολιν.
  language: Greek
translation:
  text: But as its flesh decays, a certain worm is produced, which, being nourished from the moisture of the dead creature, grows wings. Then, when it has become strong, it lifts up that nest in which are the bones of the one that came before, and carrying them it travels from the land of Arabia as far as Egypt, to the city called Heliopolis.
