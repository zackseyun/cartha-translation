  language: Greek
translation:
  text: For there is a bird that is called the phoenix. This creature, being the only
    one of its kind, lives for five hundred years; and when it has now come near to
    the end of its life, it makes for itself a nest from frankincense and myrrh and
    the other spices. When the time has been fulfilled, it enters into it and dies.
