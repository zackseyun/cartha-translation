  from: it has not arisen upon the heart of man
  to: it has not entered the heart of man
  rationale: The phrase ἀνέβη ἐπὶ καρδίαν is a Hebraic idiom (reflecting עָלָה עַל־לֵב) meaning 'to come to mind' or 'to enter the heart' (BDAG s.v. ἀναβαίνω 1.b.β). 'Arisen upon the heart' is an overly literal calque that obscures the natural force of the idiom in English.
