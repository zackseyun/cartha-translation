translation:
  text: Take up the letter of the blessed Paul the apostle. What did he first write
    to you at the beginning of the gospel? In truth, he wrote to you in the Spirit
    about himself and Cephas and Apollos, because even then you had formed factions.
    But that factionalism brought less sin upon you; for you were aligning yourselves
    with apostles of approved testimony, and with a man approved by them. But now
    consider who it is that has perverted you and diminished the dignity of your widely
    spoken-of brotherly love. It is shameful, beloved—very shameful, and unworthy
    of conduct in the Messiah—that it should be heard that the very steadfast and
    ancient church of the Corinthians is in revolt against the elders because of one
    or two persons. And this report has reached not only us, but also those who are
    opposed to us, so that blasphemies are brought upon the name of the Lord because
    of your foolishness, while you also create danger for yourselves.
  philosophy: optimal-equivalence
