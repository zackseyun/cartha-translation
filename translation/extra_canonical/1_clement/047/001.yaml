lexical_decisions:
- source_word: Ἀναλάβετε
  chosen: Take up
  alternatives:
  - Take up and read
  - Receive again
  - Pick up
  lexicon: LSJ
  rationale: The imperative calls the Corinthians to take up Paul's letter for reconsideration.
    'Take up' preserves the concrete force without adding words not in the Greek.
- source_word: μακαρίου
  chosen: blessed
  alternatives:
  - fortunate
  - blessed one
  lexicon: BDAG
  rationale: A conventional honorific for a revered departed figure; 'blessed' preserves
    ecclesial tone better than flatter alternatives.
- source_word: ἐν ἀρχῇ τοῦ εὐαγγελίου
  chosen: at the beginning of the gospel
  alternatives:
  - in the beginning of the good news
  - at the outset of your reception of the gospel
  lexicon: BDAG
  rationale: Keeps the phrase close to the Greek while allowing its likely sense of
    the Corinthians' early gospel history to remain implicit.
- source_word: πνευματικῶς
  chosen: in the Spirit
  alternatives:
  - spiritually
  - with spiritual insight
  lexicon: BDAG
  rationale: The adverb likely signals Spirit-shaped writing rather than merely 'figurative'
    or 'edifying' speech. 'In the Spirit' preserves theological force.
- source_word: προσκλίσεις
  chosen: factions
  alternatives:
  - partialities
  - cliques
  - attachments
  lexicon: LSJ
  rationale: The term denotes partisan alignments. 'Factions' best fits the Corinthian
    context alluding to 1 Corinthians.
- source_word: προσεκλίθητε
  chosen: were aligning yourselves
  alternatives:
  - inclined yourselves
  - attached yourselves
  - took sides
  lexicon: LSJ
  rationale: This verbal form corresponds to the noun for factional alignment; the
    rendering keeps the relational and partisan nuance.
- source_word: μεμαρτυρημένοις
  chosen: of approved testimony
  alternatives:
  - well attested
  - bearing witness
  - commended
  lexicon: BDAG
  rationale: The perfect participle suggests persons whose character/ministry had
    been attested. 'Of approved testimony' preserves that ecclesial commendation.
- source_word: δεδοκιμασμένῳ
  chosen: tested
  alternatives:
  - approved
  - proven
  lexicon: BDAG
  rationale: The word carries the sense of having been tried and found genuine. 'Tested'
    is concise and preserves the evaluative nuance.
- source_word: σεμνὸν
  chosen: dignity
  alternatives:
  - nobility
  - gravity
  - honor
  lexicon: BDAG
  rationale: Refers to the honorable character of their brotherly love. 'Dignity'
    fits the moral and communal register.
- source_word: περιβοήτου
  chosen: widely spoken-of
  alternatives:
  - famous
  - renowned
  - much-talked-about
  lexicon: LSJ
  rationale: The adjective indicates something much reported abroad. 'Widely spoken-of'
    preserves the rhetorical flavor without sounding colloquial.
- source_word: φιλαδελφίας
  chosen: brotherly love
  alternatives:
  - love of the brothers
  - familial affection among believers
  lexicon: BDAG
  rationale: This is a key ecclesial virtue. 'Brotherly love' preserves the familial
    metaphor and aligns with the project's gender-accurate policy.
- source_word: ἀγωγῆς
  chosen: conduct
  alternatives:
  - way of life
  - training
  - manner of life
  lexicon: LSJ
  rationale: In context it refers to Christian manner of life. 'Conduct' is natural
    English and retains moral force.
- source_word: στασιάζειν
  chosen: is in revolt
  alternatives:
  - is rebelling
  - is in dissension
  - is stirring sedition
  lexicon: BDAG
  rationale: The verb is stronger than mere disagreement. 'Is in revolt' preserves
    the scandalous severity of the action.
- source_word: πρεσβυτέρους
  chosen: elders
  alternatives:
  - presbyters
  lexicon: BDAG
  rationale: The ecclesial office should be translated, not merely transliterated,
    and 'elders' is the standard rendering.
- source_word: ἑτεροκλινεῖς
  chosen: those who are of a different mind from us
  alternatives:
  - dissenters
  - outsiders
  - the heterodox
  lexicon: LSJ
  rationale: The term likely refers to people not aligned with the Roman Christians,
    perhaps opponents or schismatically disposed observers. This rendering preserves
    the relational contrast without over-specifying.
- source_word: βλασφημίας
  chosen: blasphemies
  alternatives:
  - slanders
  - revilings
  lexicon: BDAG
  rationale: Because the object is 'the name of the Lord,' 'blasphemies' is the most
    fitting and theologically weighty rendering.
- source_word: ἀφροσύνην
  chosen: foolishness
  alternatives:
  - folly
  - senselessness
  lexicon: BDAG
  rationale: A moral-spiritual lack of sense is in view; 'foolishness' is idiomatic
    and sufficiently weighty.
- source_word: κίνδυνον ἐξεργάζεσθαι
  chosen: work danger for yourselves
  alternatives:
  - bring peril upon yourselves
  - produce danger for yourselves
  lexicon: BDAG
  rationale: The idiom expresses actively bringing peril on themselves. 'Work danger
    for yourselves' stays close to the Greek while remaining intelligible.
- source_word: ἐν Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Χριστῷ is titular here, and the project preference is 'Messiah' where
