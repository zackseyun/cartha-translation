  text: Ἀναλάβετε τὴν ἐπιστολὴν τοῦ μακαρίου Παύλου τοῦ ἀποστόλου. 2. τί πρῶτον ὑμῖν
    ἐν ἀρχῇ τοῦ εὐαγγελίου ἔγραψεν; . ἐπ’ ἀληθείας πνευματικῶς ἐπέστειλεν ὑμῖν περὶ
    ἑαυτοῦ τε καὶ Κηφᾶ τε καὶ Ἀπολλώ, διὰ τὸ καὶ τότε προσκλίσεις ὑμᾶς πεποιῆσθαι.
    4. ἀλλ’ ἡ πρόσκλισις ἐκείνη ἧσσον ἁμαρτίαν ὑμῖν προσήνεγκεν· προσεκλίθητε γὰρ
    ἀποστόλοις μεμαρτυρημένοις καὶ ἀνδρὶ δεδοκιμασμένῳ παρ’ αὐτοῖς. 5. νυνὶ δὲ κατανοήσατε,
    τίνες ὑμᾶς διέστρεψαν καὶ τὸ σεμνὸν τῆς περιβοήτου φιλαδελφίας ὑμῶν ἐμείωσαν.
    6. αἰσχρά, ἀγαπητοί, καὶ λίαν αἰσχρὰ καὶ ἀνάξια τῆς ἐν Χριστῷ ἀγωγῆς ἀκούεσθαι,
    τὴν βεβαιοτάτην καὶ ἀρχαίαν Κορνθίων ἐκκλησίαν δι’ ἓν ἢ δύο πρόσωπα στασιάζειν
    πρὸς τοὺς πρεσβυτέρους. 7. καὶ ἡ ἀκοὴ οὐ μόνον εἰς ἡμᾶς ἐχώρησεν, ἀλλὰ καὶ εἰς
    τοὺς ἑτεροκλινεῖς ὑπάρχοντας ἀφ’ ἡμῶν, ὥστε καὶ βλασφημίας ἐπιφέρεσθαι τῷ ὀνόματι
    κυρίου διὰ τὴν ὑμετέραν ἀφροσύνην, ἑαυτοῖς δὲ κίνδυνον ἐξεργάζεσθαι.
