  from: were aligning yourselves with apostles of approved testimony, and with a man tested by them
  to: aligned yourselves with well-attested apostles, and with a man approved by them
  rationale: 'The aorist `προσεκλίθητε` is better rendered as a simple past (''aligned'') rather than the past continuous (''were aligning''). Lexically, `μεμαρτυρημένοις` means ''well-attested'' or ''highly reputed'' (BDAG), making ''of approved testimony'' awkward in English. Finally, `δεδοκιμασμένῳ` here carries the sense of being ''approved'' or ''proven'' (the result of testing), not merely ''tested''. | Azure: The proposed rewrite is closer to the Greek. προσεκλίθητε is aorist passive/deponent and naturally denotes a completed past action here, so "aligned yourselves" is better than the progressive "were al'
