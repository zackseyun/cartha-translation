  category: awkward_english
  tier: 3
  from: widely spoken-of
  to: renowned
  rationale: 'While `περιβοήτου` literally derives from being ''shouted about everywhere,'' in this formal rhetorical context it means ''renowned'' or ''celebrated'' (as the author uses it in 1 Clem 1.1). ''Renowned'' better matches the elevated register of the surrounding vocabulary (`σεμνὸν`, `φιλαδελφίας`). | Azure: The adjective περιβόητος does indeed mean "much talked of," "famous," or "renowned," and in this rhetorical context the current literalizing phrase "widely spoken-of" is awkward English without adding'
