  from: who it is that has perverted you
  to: who perverted you
  rationale: 'The Greek `τίνες` is plural and `διέστρεψαν` is a simple aorist. The draft''s ''who it is that has'' introduces explicitly singular verbs (''is'', ''has'') and unnecessary periphrasis, obscuring the direct plural subject and flattening the aorist. | Azure: The proposed change is clearly closer to the Greek. The interrogative subject is plural: τίνες = “who (plural), which persons,” not a singular “who it is.” Likewise διέστρεψαν is 3rd person plural aor'
- timestamp: '2026-04-22T08:13:58Z'
