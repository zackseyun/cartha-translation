id: 1CLEM.60.1
reference: 1 Clement 60:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Σὺ γὰρ τὴν ἀέναον τοῦ κόσμου σύστασιν διὰ τῶν ἐνεργουμένων ἐφανεροποίησας· σύ, κύριε, τὴν οἰκουμένην ἔκτισας, ὁ πιστὸς ἐν πάσαις ταῖς γενεαῖς, δίκαιος ἐν τοῖς κρίμασιν, θαυμαστὸς ἐν ἰσχύϊ καὶ μεγαλοπρεπείᾳ, ὁ σοφὸς ἐν τῷ κτίζειν καὶ συνετὸς ἐν τῷ τὰ γενόμενα ἑδράσαι, ὁ ἀγαθὸς ἐν τοῖς ὁρωμένοις καὶ πιστὸς ἐν τοῖς πεποιθόσιν ἐπὶ σέ, ἐλεῆμον καὶ οἰκτίρμον, ἄφες ἡμῖν τὰς ἀνομίας ἡμῶν καὶ τὰς ἀδικίας καὶ τὰ παραπτώματα καὶ πλημμελείας.
  language: Greek
translation:
  text: For you have made manifest the everlasting order of the world through your workings. You, Lord, created the inhabited earth, faithful throughout all generations, righteous in your judgments, marvelous in might and majesty, wise in creating and understanding in establishing the things that have come to be, good in the things that are seen and faithful toward those who have put their trust in you. O merciful and compassionate one, forgive us our lawless deeds and our unrighteous acts and our trespasses and failings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trust in you, merciful and compassionate. Forgive us'.
    reason: previous_rendering
