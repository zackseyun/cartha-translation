  rationale: 'The adjectives ''ἐλεῆμον καὶ οἰκτίρμον'' are in the vocative case, directly addressing God and introducing the imperative ''ἄφες'' (forgive). The current punctuation attaches them to the preceding sentence as trailing adjectives, severing them from the petition they belong to. | Azure: The proposal is closer to the Greek syntax. After the string of nominative predicates describing God (ὁ πιστός, δίκαιος, θαυμαστός, ὁ σοφός, συνετός, ὁ ἀγαθός), the text shifts at ἐλεῆμον καὶ οἰκτίρμο'
