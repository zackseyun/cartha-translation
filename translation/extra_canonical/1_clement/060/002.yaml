  from: Do not count every sin of your male slaves and female slaves against them
  to: Do not count any sin of your servants and maidservants
  rationale: In LXX-influenced Greek, the negation `μὴ` paired with `πᾶσαν` is a Semitic
    idiom meaning "not any" or "no" (translating Hebrew לֹא ... כָּל). Rendering it
    as "not every" implies God should count *some* sins, which contradicts the petition.
    Furthermore, `δούλων σου καὶ παιδισκῶν` reflects standard LXX liturgical register
    (e.g., Joel 2:29) where "servants and maidservants" (or "male and female servants")
    is more appropriate than the clunky "male slaves and female slaves against them."
