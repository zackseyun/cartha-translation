  text: ναί, δέσποτα, ἐπίφανον τὸ πρόσωπών σου ἐφ’ ἡμᾶς εἰς ἀγαθὰ ἐν εἰρήνῃ, εἰς τὸ
    σκεπασθῆναι ἡμᾶς τῇ χειρί σου τῇ κραταιᾷ καὶ ῥυσθῆναι ἀπὸ πάσης ἁμαρτίας τῷ βραχίονί
