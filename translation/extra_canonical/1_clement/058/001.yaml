  from: dwell secure, having placed our confidence in
  to: dwell, trusting in
  rationale: 'The draft double-translates the perfect participle `πεποιθότες` as both ''secure'' and ''having placed our confidence''. While `πεποιθὼς` in the LXX sometimes translates the Hebrew idiom for ''securely'' (לָבֶטַח), here it actively governs the prepositional phrase `ἐπὶ τὸ ὀσιώτατον... ὄνομα` (''trusting in the most holy name''). Translating it simply as ''trusting in'' avoids the redundancy and accurately reflects the Greek syntax. | Azure: The proposed change is closer to the Greek. In ἵνα κατασκηνώσωμεν πεποιθότες ἐπὶ τὸ ὀσιώτατον τῆς μεγαλωσύνης αὐτοῦ ὄνομα, the finite verb is κατασκηνώσωμεν (“that we may dwell/settle”) and πεποιθότες'
