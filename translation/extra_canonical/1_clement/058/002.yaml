id: 1CLEM.58.2
reference: 1 Clement 58:2
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: δέξασθε τὴν συμβουλὴν ἡμῶν, καὶ ἔσται ἀμεταμέλητα ὑμῖν. ζῇ γὰρ ὁ θεὸς καὶ
    ζῇ ὁ κύριος Ἰησοῦς Χριστὸς καὶ τὸ πνεῦμα τὸ ἅγιον, ἥ τε πίστις καὶ ἡ ἐλπὶς τῶν
    ἐκλεκτῶν, ὅτι ὁ ποιήσας ἐν ταπεινοφροσύνῃ μετ᾽ ἐκτενοῦς ἐπιεικείας ἀμεταμελήτως
    τὰ ὑπὸ τοῦ θεοῦ δεδομένα δικαιώματα καὶ προστάγματα· οὕτως ἐντεταγμένος καὶ ἐλλόγιμος
    ἔσται εἰς τὸν ἀριθμὸν τῶν σῳζομένων διὰ Ἰησοῦ Χριστοῦ, δι᾽ οὗ ἐστὶν αὐτῷ ἡ δόξα
    εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
  language: Greek
translation:
  text: Accept our counsel, and you will have no cause for regret. For as God lives,
    and the Lord Jesus Messiah lives, and the Holy Spirit, who are the faith and the
    hope of the elect, so surely the one who in humility, with earnest gentleness,
    without regret carries out the righteous requirements and commandments given by
    God, this one will be enrolled and counted among the number of those being saved
    through Jesus Messiah, through whom is the glory to him forever and ever. Amen.
  philosophy: optimal-equivalence
