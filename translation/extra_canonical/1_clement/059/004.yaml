id: 1CLEM.59.4
reference: 1 Clement 59:4
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: ἀξιόμεν σε, δέσποτα, βοηθὸν γενέσθαι καὶ ἀντιλήμπτορα ἡμῶν. τοὺς ἐν θλίψει
    ἡμῶν ῥῦσαι, τοὺς ταπεινοὺς ἐλέησον, τοὺς πεπτωκότας ἔγειρον, τοῖς δεομένοις ἐπιφάνηθι,
    τοὺς ἀσθενεῖς ἴασαι, τοὺς πλανωμένους τοῦ λαοῦ σου ἐπίστρεψον· χόρτασον τοὺς πεινῶντας,
    λύτρωσαι τοὺς δεσμίους ἡμῶν, ἐξανάστησον τοὺς ἀσθενοῦντας, παράκαλεσον τοὺς ὀλιγοψυχούντας·
    γνωτώσαν σε ἅπαντα τὰ ἔθνη, ὅτι σὺ εἶ ὁ θεὸς μόνος καὶ Ἰησοῦς Χριστὸς ὁ παῖς σου
    καὶ ἡμεῖς λαός σου καὶ πρόβατα τῆς νομῆς σου.
  language: Greek
translation:
  text: We ask you, Master, be our helper and defender. Rescue those of us who are
    in affliction, have mercy on the lowly, raise up the fallen, show yourself to
    those in need, heal the weak, turn back the wandering of your people. Feed the
    hungry, ransom our prisoners, raise up the sick, encourage the fainthearted. Let
    all the nations know that you alone are God, and that Jesus the Messiah is your
    child, and that we are your people and the sheep of your pasture.
  philosophy: optimal-equivalence
