  from: your name, the source from which all creation first came
  to: your name, the primal source of all creation
  rationale: 'The adjective ἀρχέγονον (primal, original, first-born) modifies ὄνομα directly. The current rendering expands this into a relative clause (''the source from which all creation first came''), which is slightly wordy and flattens the direct appositional force of ''the primal name of all creation'' or ''your name, the primal source of all creation''. | Azure: The Greek phrase τὸ ἀρχέγονον πάσης κτίσεως ὄνομά σου is indeed appositional and compact: ἀρχέγονον directly qualifies ὄνομα, with πάσης κτίσεως as a dependent genitive. The current English paraphrase'
