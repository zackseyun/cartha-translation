source:
  edition: Funk 1901 (normalized OCR)
  text: ἐλπίζειν ἐπὶ τὸ ἀρχέγονον πάσης κτίσεως ὄνομά σου, ἀνοίξας τοὺς ὀφθαλμοὺς τῆς καρδίας ἡμῶν εἰς τὸ γινώσκειν σε τὸν μόνον ὕψιστον ἐν ὑψίστοις, ἅγιον ἐν ἁγίοις ἀναπαυόμενον· τὸν ταπεινοῦντα ὕβριν ὑπερηφάνων, τὸν διαλύοντα λογισμοὺς ἐθνῶν, τὸν ποιοῦντα ταπεινοὺς εἰς ὕψος καὶ τοὺς ὑψηλοὺς ταπεινοῦντα, τὸν πλουτίζοντα καὶ πτωχίζοντα, τὸν ἀποκτείνοντα καὶ ζῳοποιοῦντα καὶ ζῆν ποιοῦντα, μόνον εὐεργέτην πνευμάτων καὶ θεὸν πάσης σαρκός· τὸν ἐπιβλέποντα ἐν τοῖς ἀβύσσοις, τὸν ἐπόπτην ἀνθρωπίνων ἔργων, τὸν τῶν κινδυνευόντων βοηθόν, τὸν τῶν ἀπηλπισμένων σωτῆρα, τὸν παντὸς πνεύματος κτίστην καὶ ἐπίσκοπον· τὸν πληθύνοντα ἔθνη ἐπὶ γῆς καὶ ἐκ πάντων ἐκλεγόμενον τοὺς ἀγαπῶντάς σε διὰ Ἰησοῦ Χριστοῦ τοῦ ἠγαπημένου παιδός σου, δι’ οὗ ἡμᾶς ἐπαίδευσας, ἥγιασας, ἐτίμησας.
  language: Greek
translation:
  text: to hope in your name, the primal source of all creation, having opened the eyes of our heart so that we might know you, the only Highest among the highest, the holy one resting among the holy ones; the one who humbles the insolence of the proud, who breaks up the designs of the nations, who raises the lowly to high places and humbles the lofty, who makes rich and makes poor, who kills and gives life and causes to live, the only benefactor of spirits and God of all flesh; who looks into the depths, the overseer of human deeds, the helper of those in danger, the savior of those without hope, the creator and overseer of every spirit; who multiplies nations upon the earth and from among them all chooses those who love you through Jesus the Messiah, your beloved child, through whom you trained us, sanctified us, and honored us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your name, the source from which all creation first came'.
    reason: previous_rendering
  - marker: b
    text: Or 'holy, resting among the holy'.
    reason: previous_rendering
