  from: holy, resting among the holy
  to: the holy one resting among the holy ones
  rationale: 'The Greek uses the substantival adjective ἅγιον (accusative masculine singular, matching τὸν μόνον ὕψιστον) and the dative plural ἁγίοις. The English ''holy, resting among the holy'' sounds like a string of adjectives rather than a substantive title (''the holy one'') resting among a plural group (''the holy ones'' or ''the saints''). | Azure: The proposed change is grammatically better grounded in the Greek. In this prayer the accusative articular chain repeatedly identifies God by substantival participles and adjectives governed by εἰς τὸ'
