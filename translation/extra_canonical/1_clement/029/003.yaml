  rationale: 'The Greek ''ἅγια ἁγίων'' is a neuter plural. While it can refer to the inner sanctuary (''the Holy of Holies''), in the context of agricultural offerings (''firstfruits of his threshing floor''), it likely refers to the ''most holy things'' (the holiest portions of the offerings, as in Numbers 18:9). Translating it as ''most holy things'' preserves the plural form and the sacrificial/offering metaphor better than ''the holy of holies'', which modern readers almost exclusively associate with the temple room. | Azure: Apply because the specific Greek form supports the change. ἅγια ἁγίων here is neuter plural, not the singular/local sense that English readers usually hear in “the Holy of Holies” as the inner sanctua'
