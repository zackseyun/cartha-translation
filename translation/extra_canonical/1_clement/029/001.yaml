lexical_decisions:
- source_word: Προσέλθωμεν
  chosen: let us come near
  alternatives:
  - let us approach
  - let us draw near
  lexicon: BDAG
  rationale: Retains the hortatory subjunctive and the cultic/devotional sense of
    approaching God, while remaining natural English.
- source_word: ἐν ὁσιότητι ψυχῆς
  chosen: in holiness of soul
  alternatives:
  - with holiness of soul
  - in piety of soul
  lexicon: BDAG
  rationale: Preserves the moral-religious quality of ὁσιότης and the inward emphasis
    of ψυχή without flattening the phrase into generic sincerity.
- source_word: ἁγνὰς καὶ ἀμιάντους χεῖρας
  chosen: hands that are pure and undefiled
  alternatives:
  - pure and unstained hands
  - clean and unpolluted hands
  lexicon: BDAG
  rationale: Keeps the concrete bodily image of prayerful uplift and the paired purity
    terms; 'undefiled' preserves the stronger cultic/moral nuance of ἀμίαντος.
- source_word: ἀγαπῶντες
  chosen: loving
  alternatives:
  - as we love
  - in love for
  lexicon: BDAG
  rationale: Maintains the participial flow of the Greek and the ethical-theological
    centrality of love.
- source_word: ἐπιεικῆ
  chosen: gentle
  alternatives:
  - kind
  - forbearing
  - gracious
  lexicon: BDAG
  rationale: '''Gentle'' best captures the mild, forbearing character of the Father
    in accessible English without overinterpreting.'
- source_word: εὔσπλαγχνον
  chosen: compassionate
  alternatives:
  - merciful
  - tenderhearted
  lexicon: BDAG
  rationale: Conveys deep pity/compassion in idiomatic modern English; 'tenderhearted'
    is possible but less natural here.
- source_word: ἐκλογῆς μέρος
  chosen: a chosen portion
  alternatives:
  - a portion of election
  - an elect share
  lexicon: BDAG
  rationale: Brings out both the election language and the inheritance/portion imagery;
    smoother than a more wooden rendering while preserving theological weight.
- source_word: ὁ ὕψιστος
  chosen: the Most High
  alternatives:
  - the Highest
  lexicon: BDAG
  rationale: Standard biblical title with clear scriptural cadence.
- source_word: υἱοὺς Ἀδάμ
  chosen: the sons of Adam
  alternatives:
  - the sons of man
  - the children of humankind
  lexicon: BDAG
  rationale: Keeps the explicit Adam-language of the citation rather than generalizing
    it away; this preserves the scriptural register and gender-accurate wording of
    the source.
- source_word: ἔστησεν ὅρια ἐθνῶν
  chosen: he fixed the boundaries of the nations
  alternatives:
  - he set the borders of the nations
  lexicon: BDAG
  rationale: A natural rendering that preserves the territorial-allotment imagery
    of the citation.
- source_word: κατὰ ἀριθμὸν ἀγγέλων θεοῦ
  chosen: according to the number of the angels of God
  alternatives:
  - according to the number of God's angels
  lexicon: BDAG
  rationale: Rendered straightforwardly according to the Greek citation as given in
    Clement; this wording preserves the textual form before interpretive harmonization.
- source_word: μερὶς κυρίου
  chosen: the Lord’s portion
  alternatives:
  - the portion of the Lord
  lexicon: BDAG
  rationale: Preserves covenant-inheritance language with biblical cadence.
- source_word: σχοίνισμα κληρονομίας
  chosen: the measuring-line of his inheritance
  alternatives:
  - the allotment of his inheritance
  - the cord of his inheritance
  lexicon: BDAG
  rationale: σχοίνισμα is literally a measuring line/cord used in allotment; preserving
    the image keeps the land-inheritance metaphor vivid and auditable.
- source_word: ἔθνος ἐκ μέσου ἐθνῶν
  chosen: a nation from the midst of nations
  alternatives:
  - a people from among the nations
  - a nation out of the nations
  lexicon: BDAG
  rationale: Retains the singular 'nation' and the rhetorical force of divine selection
    from among other nations.
- source_word: ἀπαρχὴν
  chosen: the firstfruits
  alternatives:
  - the first portion
  - the first yield
  lexicon: BDAG
  rationale: A standard biblical term with sacrificial/cultic resonance that should
    be preserved.
- source_word: ἅλω
  chosen: threshing floor
  alternatives:
  - harvest floor
  lexicon: BDAG
  rationale: The established agricultural term in biblical English; preserves the
    agrarian image.
- source_word: ἅγια ἁγίων
  chosen: the holy of holies
  alternatives:
  - most holy things
  - a most holy one
  lexicon: BDAG
  rationale: The phrase is formally the superlative sacred expression 'holy of holies';
    preserving it keeps the scriptural and cultic resonance, even though its precise
    referent here may be debated.
