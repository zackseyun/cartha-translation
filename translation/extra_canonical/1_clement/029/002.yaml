  text: οὕτω γὰρ γέγραπται· "Ὅτε διεμέριζεν ὁ ὕψιστος ἔθνη, ὡς διέσπειρεν υἱοὺς Ἀδάμ,
    ἔστησεν ὅρια ἐθνῶν κατὰ ἀριθμὸν ἀγγέλων θεοῦ. ἐγενήθη μερὶς κυρίου λαὸς αὐτοῦ
