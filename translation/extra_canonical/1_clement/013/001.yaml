source:
  edition: Funk 1901 (normalized OCR)
  text: Ταπεινοφρονήσωμεν οὖν, ἀδελφοί, ἀποθέμενοι πᾶσαν ἀλαζονείαν καὶ τύφος καὶ
    ἀφροσύνην καὶ ὀργάς, καὶ ποιήσωμεν τὸ γεγραμμένον (λέγει γὰρ τὸ πνεῦμα τὸ ἅγιον·
    Μὴ καυχάσθω ὁ σοφὸς ἐν τῇ σοφίᾳ αὐτοῦ μηδὲ ὁ ἰσχυρὸς ἐν τῇ ἰσχύϊ αὐτοῦ μηδὲ ὁ
    πλούσιος ἐν τῷ πλούτῳ αὐτοῦ, ἀλλ’ ἢ ὁ καυχώμενος ἐν κυρίῳ καυχάσθω, τοῦ ἐκζητεῖν
    αὐτὸν καὶ ποιεῖν κρίμα καὶ δικαιοσύνην), μάλιστα μεμνημένοι τῶν λόγων τοῦ κυρίου
    Ἰησοῦ, οὓς ἐλάλησεν διδάσκων ἐπιείκειαν καὶ μακροθυμίαν.
  language: Greek
translation:
  text: 'Let us therefore be humble, brothers, laying aside all arrogance and conceit
    and foolishness and fits of anger, and let us do what is written—for the Holy
    Spirit says: “Let not the wise man boast in his wisdom, nor the strong in his
    strength, nor the rich in his riches, but let the one who boasts boast in the
    Lord,” to seek him and to do judgment and righteousness—especially remembering
    the words of the Lord Jesus, which he spoke while teaching gentleness and patience.'
  philosophy: optimal-equivalence
