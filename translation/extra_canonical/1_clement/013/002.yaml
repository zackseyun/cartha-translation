  text: οὕτως γὰρ εἶπεν· Ἐλεεῖτε, ἵνα ἐλεηθῆτε· ἀφίετε, ἵνα ἀφεθῇ ὑμῖν· ὡς ποιεῖτε,
    οὕτω ποιηθήσεται ὑμῖν· ὡς δίδοτε, οὕτως δοθήσεται ὑμῖν· ὡς κρίνετε, οὕτως κριθήσεσθε·
    ὡς χρηστεύεσθε, οὕτως χρηστευθήσεται ὑμῖν· ᾧ μέτρῳ μετρεῖτε, ἐν αὐτῷ μετρηθήσεται
    ὑμῖν.
  language: Greek
translation:
  text: 'For thus he said: “Show mercy, so that you may receive mercy. Forgive, so
    that it may be forgiven you. As you do, so it will be done to you. As you give,
    so it will be given to you. As you judge, so you will be judged. As you show kindness,
    so kindness will be shown to you. With the measure by which you measure, it will
    be measured to you.”'
  philosophy: optimal-equivalence
