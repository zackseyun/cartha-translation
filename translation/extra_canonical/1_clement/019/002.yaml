  text: πολλῶν οὖν καὶ μεγάλων καὶ ἐνδόξων μετασχόντες πράξεων ἐκτελέσωμεν ἐπὶ τὸν ἐξ ἀρχῆς παραδεδομένον ἡμῖν τῆς εἰρήνης σκοπόν, καὶ ἀτενίσωμεν εἰς τὸν πατέρα καὶ κτίστην τοῦ σύμπαντος κόσμου καὶ ταῖς μεγαλοπρεπέσι καὶ ὑπερβαλλούσαις αὐτοῦ δωρεαῖς τῆς εἰρήνης εὐεργεσίαις τε κολληθῶμεν.
  language: Greek
translation:
  text: Since, then, we have become partakers of many great and glorious deeds, let us bring to completion our course toward the goal of peace the goal of peace that has been handed down to us from the beginning, and let us fix our gaze on the Father and Creator of the whole world, and cling to his magnificent and surpassing gifts of peace and acts of kindness.
