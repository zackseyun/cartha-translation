  text: πολλῶν οὖν καὶ μεγάλων καὶ ἐνδόξων μετασχόντες πράξεων ἐκτελέσωμεν ἐπὶ τὸν
    ἐξ ἀρχῆς παραδεδομένον ἡμῖν τῆς εἰρήνης σκοπόν, καὶ ἀτενίσωμεν εἰς τὸν πατέρα
    καὶ κτίστην τοῦ σύμπαντος κόσμου καὶ ταῖς μεγαλοπρεπέσι καὶ ὑπερβαλλούσαις αὐτοῦ
