translation:
  text: Since, then, we have shared in many great and glorious deeds, let us press
    on toward the goal of peace that has been handed down to us from the beginning,
    and let us fix our gaze on the Father and Creator of the whole world, and cling
    to his magnificent and surpassing gifts of peace and acts of kindness.
