  rationale: 'The draft translates `ἀποβάλωμεν` as ''cast out'', but the same verb is translated as ''removed'' in the immediately preceding verse (44:3, `ἀποβάλλεσθαι`). Using ''remove'' here preserves the author''s lexical consistency. Additionally, `τὰ δῶρα` (''the gifts'') is a technical liturgical term in early Christianity for the offerings presented to God. Adding ''its'' (linking the gifts to the office) obscures this absolute usage; ''the gifts'' better reflects both the Greek and the historical context. | Azure: The proposed change is closer to the Greek. The verb ἀποβάλωμεν simply means ''remove/cast out,'' and since the immediately preceding verse uses the same verb (ἀποβάλλεσθαι) in the same ecclesial contex'
