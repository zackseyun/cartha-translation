  from: Therefore, for this reason,
  to: For this reason, then,
  rationale: '"Therefore, for this reason" is tautological in English. The Greek postpositive οὖν simply connects the thought ("then" or "therefore"), while διὰ ταύτην τὴν αἰτίαν provides the reason. "For this reason, then," or "For this reason, therefore," is more natural while preserving the exact rhetorical force of the Greek.'
