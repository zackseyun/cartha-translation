  text: τοὺς οὖν κατασταθέντας ὑπ᾽ ἐκείνων ἢ μεταξὺ ὑφ᾽ ἑτέρων ἐλλογίμων ἀνδρῶν συνευδοκησάσης τῆς ἐκκλησίας πάσης, καὶ λειτουργήσαντας ἀμέμπτως τῷ ποιμνίῳ τοῦ Χριστοῦ μετὰ ταπεινοφροσύνης, ἡσύχως καὶ ἀβαναύσως, μεμαρτυρημένους τε πολλοῖς χρόνοις ὑπὸ πάντων, τούτους οὐ δικαίως νομίζομεν ἀποβάλλεσθαι τῆς λειτουργίας.
  language: Greek
translation:
  text: Therefore, those who were appointed by them, or afterward by other reputable men with the whole church consenting, and who have served the flock of the Messiah blamelessly, with humility, quietly, and without arrogance, and who for a long time have been well attested by all—these men we consider to be unjustly removed from the ministry.
