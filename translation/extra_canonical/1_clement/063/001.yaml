  text: Θεμιτὸν οὖν ἐστὶν τοῖς τοιούτοις καὶ τοσούτοις ὑποδείγμασιν προσεληλυθότας ὑποθεῖναι τὸν τράχηλον καὶ τὸν τῆς ὑπακατὰ τὸν προκείμενον ἡμῖν ἐν ἀληθείᾳ σκοπὸν δίχα παντὸς μώμου καταντήσωμεν.
