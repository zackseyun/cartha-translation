  to: fulfilling the place of obedience, we should be quiet, so that having ceased from the vain sedition, we may reach the goal
  rationale: 'The English draft omits a major clause present in the critical text (Lightfoot 1889): ''ἡσυχάσαι, ὅπως κοπάσαντες τῆς ματαίας στάσεως'' (to be quiet, so that having ceased from the vain sedition). The provided Greek source text contains a severe OCR haplography (''ὑπακατὰ τὸν'' instead of ''ὑπακοῆς τόπον ἀναπληρώσαντας ἡσυχάσαι, ὅπως κοπάσαντες τῆς ματαίας στάσεως ἐπὶ τὸν''), causing the draft to miss the author''s crucial appeal to cease from ''sedition'' (στάσις), which is the central theme of the letter.'
