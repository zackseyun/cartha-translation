  text: ὦ ἀνόητοι, συμβάλετε ἑαυτοὺς ξύλῳ· λάβετε ἄμπελον· πρῶτον μὲν φυλλορροεῖ,
    εἶτα βλαστὸς γίνεται, εἶτα φύλλον, εἶτα ἄνθος, καὶ μετὰ ταῦτα ὄμφαξ, εἶτα σταφυλὴ
    παρίστανται. ὁρᾶτε, ὅτι ἐν καιρῷ ὀλίγῳ εἰς πέπειρον καταντᾷ ὁ καρπὸς τοῦ ξύλου.
  language: Greek
translation:
  text: 'You foolish ones, compare yourselves to a tree: take a vine. First it sheds
    its leaves, then a shoot appears, then a leaf, then a flower, and after these
    comes the unripe grape, then the full cluster appears. You see that in a little
    season the fruit of the tree comes to maturity.'
