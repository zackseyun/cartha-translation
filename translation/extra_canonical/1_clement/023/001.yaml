lexical_decisions:
- source_word: οἰκτίρμων
  chosen: compassionate
  alternatives:
  - merciful
  - pitiful
  lexicon: LSJ
  rationale: '''Compassionate'' best conveys active pity or mercy in idiomatic modern
    English without sounding archaic.'
- source_word: εὐεργετικός
  chosen: beneficent
  alternatives:
  - kind
  - doing good
  - bountiful
  lexicon: LSJ
  rationale: The term denotes one who does good or bestows benefits; 'beneficent'
    preserves the elevated register and active generosity.
- source_word: σπλάγχνα ἔχει
  chosen: has tender affections
  alternatives:
  - has compassion
  - has deep feelings
  - has mercy
  lexicon: LSJ
  rationale: The idiom literally refers to inward affections; 'has tender affections'
    preserves the visceral warmth better than the flatter 'has compassion.'
- source_word: φοβουμένους
  chosen: those who fear
  alternatives:
  - those who revere
  lexicon: BDAG
  rationale: '''Fear'' should be retained for theological continuity and because the
    Greek wording is straightforward; ''revere'' is interpretive softening.'
- source_word: χάριτας
  chosen: gracious gifts
  alternatives:
  - favors
  - graces
  - benefits
  lexicon: LSJ
  rationale: In context the plural refers to bestowed favors or gifts; 'gracious gifts'
    preserves the grace-root while making the sense clear in English.
- source_word: ἁπλῇ διανοίᾳ
  chosen: with a single-minded heart
  alternatives:
  - with sincerity of mind
  - with simplicity of intention
  - with an undivided mind
  lexicon: LSJ
  rationale: The phrase stresses simplicity or singleness in approach to God; 'single-minded
    heart' communicates undivided sincerity in natural English while preserving the
    paraenetic contrast with double-mindedness.
- source_word: διψυχῶμεν
  chosen: let us not be double-minded
  alternatives:
  - let us not be of two minds
  - let us not waver
  lexicon: LSJ
  rationale: This is the key repeated term in the chapter and should remain visible
    as 'double-minded' for consistency with the cited scripture.
- source_word: ἐνδυλλιεσθω
  chosen: let our soul be inwardly divided
  alternatives:
  - let our soul be troubled
  - let our soul hesitate
  - let our soul become soft
  lexicon: LSJ
  rationale: The verb is difficult and rare; in context it parallels double-mindedness
    and inner vacillation before God's promises. 'Inwardly divided' captures the likely
    sense without overclaiming a more specific nuance.
- source_word: ὑπερβαλλούσαις καὶ ἐνδόξοις δωρεαῖς
  chosen: surpassing and glorious gifts
  alternatives:
  - extraordinary and splendid gifts
  - abundant and glorious gifts
  lexicon: LSJ
  rationale: The pair emphasizes both excess/surpassing quality and glory; 'surpassing
    and glorious gifts' preserves both elements with elevated cadence.
- source_word: διατάζοντες τῇ ψυχῇ
  chosen: who waver in their soul
  alternatives:
  - who are at odds in their soul
  - who dispute with themselves
  - who give conflicting orders to their soul
  lexicon: LSJ
  rationale: The phrase is unusual; the broader context is inner instability. 'Waver
    in their soul' communicates the practical sense of divided inwardness.
- source_word: συμβάλετε ἑαυτοὺς ξύλῳ
  chosen: compare yourselves to a tree
  alternatives:
  - consider yourselves by a tree
  - learn by comparison from a tree
  lexicon: LSJ
  rationale: The idiom calls for an illustrative comparison. 'Compare yourselves to
    a tree' is clear and preserves the hortatory force.
- source_word: ξύλῳ
  chosen: tree
  alternatives:
  - wood
  - plant
  lexicon: LSJ
  rationale: In this agricultural illustration, 'tree' is the natural sense in English,
    even though the example immediately narrows to a vine.
- source_word: ὄμφαξ
  chosen: the unripe grape
  alternatives:
  - sour grape
  - green grape
  lexicon: LSJ
  rationale: The term denotes an immature grape; 'unripe grape' is precise and avoids
    importing the connotation of sourness as the main point.
- source_word: πέπειρον
  chosen: comes to maturity
  alternatives:
  - ripens
  - reaches full growth
  lexicon: LSJ
  rationale: The adjective denotes ripeness or maturity; the verbal phrase reads naturally
    in English while preserving the developmental image.
- source_word: τελειωθήσεται
  chosen: shall be accomplished
  alternatives:
  - shall be completed
  - shall be brought to fulfillment
  lexicon: BDAG
  rationale: For God's will, 'accomplished' is idiomatic and weighty, preserving both
    completion and effective realization.
- source_word: συνεπιμαρτυρούσης
  chosen: bears witness
  alternatives:
  - testifies along with this
  - confirms
  lexicon: LSJ
  rationale: The participle indicates supporting testimony from scripture; 'bears
    witness' preserves biblical cadence.
- source_word: ὁ ἅγιος
  chosen: the Holy One
  alternatives:
  - the holy one
  - the saintly one
  lexicon: LSJ
  rationale: Capitalized 'Holy One' reflects titular force in this scriptural citation
    and preserves its theological weight.
- source_word: προσδοκᾶτε
  chosen: you expect
  alternatives:
  - you await
  - you look for
  lexicon: BDAG
  rationale: '''Expect'' is direct and natural, while still conveying eschatological
    anticipation; ''await'' was possible but slightly less immediate in this context.'
theological_decisions:
- issue: Rendering of divine fatherhood language
  chosen_reading: The compassionate and altogether beneficent Father
  alternative_readings:
  - the merciful and kind Father
  - the compassionate Father in every way
  rationale: The Greek explicitly names God as πατήρ. The translation preserves the
    paternal title rather than neutralizing it, in keeping with gender-accurate policy
    and the text's ecclesial rhetoric.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Meaning of the warning against διψυχία
  chosen_reading: double-minded / inwardly divided
  alternative_readings:
  - doubting
  - discouraged
  - wavering
  rationale: The chapter's exhortation is not merely against intellectual doubt but
    against divided inner allegiance and impatience regarding God's promises. Preserving
    'double-minded' keeps the intertextual and paraenetic force visible.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Identity of ὁ ἅγιος in the closing citation
  chosen_reading: the Holy One
  alternative_readings:
  - the holy one
  - the Messiah
  rationale: The Greek citation itself reads 'the Holy One' and does not explicitly
    identify the referent beyond the scriptural wording. The translation preserves
    the title without resolving the intertextual christological question in the main
    text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
