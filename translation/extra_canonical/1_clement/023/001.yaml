  text: Ὁ οἰκτίρμων κατὰ πάντα καὶ εὐεργετικὸς πατὴρ ἔχει σπλάγχνα ἐπὶ τοὺς φοβουμένους
    αὐτόν, ἠπίως τε καὶ προσηνῶς τὰς χάριτας αὐτοῦ ἀποδίδοι τοῖς προσερχομένοις αὐτῷ
    ἁπλῇ διανοίᾳ. 2. διὸ μὴ διψυχῶμεν, μηδὲ ἐνδυλλιεσθω ἡ ψυχὴ ἡμῶν ἐπὶ ταῖς ὑπερβαλλούσαις
    καὶ ἐνδόξοις δωρεαῖς αὐτοῦ. 3. πόρρω γενέσθω ἀφ’ ἡμῶν ἡ γραφὴ αὕτη, ὅπου λέγει·
    Ταλαίπωροί εἰσιν οἱ δίψυχοι, οἱ διατάζοντες τῇ ψυχῇ, οἱ λέγοντες· Ταῦτα ἠκούσαμεν
    καὶ ἐπὶ τῶν πατέρων ἡμῶν, καὶ ἰδοὺ, γηράσκομεν, καὶ οὐδὲν ἡμῖν τούτων συνέβηκεν.
    4. ὦ ἀνόητοι, συμβάλετε ἑαυτοὺς ξύλῳ· λάβετε ἄμπελον· πρῶτον μὲν φυλλορροεῖ, εἶτα
    βλαστὸς γίνεται, εἶτα φύλλον, εἶτα ἄνθος, καὶ μετὰ ταῦτα ὄμφαξ, εἶτα σταφυλὴ παρίστανται.
    ὁρᾶτε, ὅτι ἐν καιρῷ ὀλίγῳ εἰς πέπειρον καταντᾷ ὁ καρπὸς τοῦ ξύλου. 5. ἐπ’ ἀληθείας
    ταχὺ καὶ ἐξαίφνης τελειωθήσεται τὸ θέλημα αὐτοῦ, συνεπιμαρτυρούσης καὶ τῆς γραφῆς,
    ὅτι ταχὺ ἥξει καὶ οὐ χρονιεῖ, καὶ ἐξαίφνης ἥξει ὁ κύριος εἰς τὸν ναὸν αὐτοῦ, καὶ
    ὁ ἅγιος, ὃν ὑμεῖς προσδοκᾶτε.
