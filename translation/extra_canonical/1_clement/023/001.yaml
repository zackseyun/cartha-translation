translation:
  text: 'The compassionate and altogether beneficent Father has tender affections
    for those who fear him, and gently and kindly gives his gracious gifts to those
    who come to him with a single-minded mind.


    Therefore let us not be double-minded, nor let our soul be doubtful concerning
    his surpassing and glorious gifts. Far be from us this scripture, where it says,
    “Wretched are the double-minded, those who waver in their soul, who say, ‘These
    things we heard even in the days of our fathers, and look, we have grown old,
    and none of these things has happened to us.’”


    You foolish ones, compare yourselves to a tree: take a vine. First it sheds its
    leaves, then a shoot appears, then a leaf, then a flower, and after these comes
    the unripe grape, then the full cluster appears. You see that in a little time
    the fruit of the tree comes to maturity.


    Truly, quickly and suddenly his will shall be accomplished, as the scripture also
    bears witness, “Quickly he will come, and he will not delay,” and, “Suddenly the
    Lord will come to his temple, even the Holy One whom you expect.”'
  philosophy: optimal-equivalence
