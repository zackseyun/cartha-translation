  rationale: When taking a personal accusative object (αὐτόν, referring to God), ὑπομένω carries the sense of 'wait for' or 'await' (a common LXX idiom for hoping in the Lord, e.g., Ps 36:9), not 'endure'. Translating it as 'endure him' awkwardly implies God is an affliction to be suffered, which distorts the author's meaning.
