  to: for those who patiently endure?
  rationale: The Greek text reads `τοῖς ὑπομένουσιν` (an absolute participle, 'those who patiently endure' or 'those who wait'). The draft inserts 'for him', which does not exist in the Greek of this verse (though `αὐτόν` does appear in the following verse, 35:4).
