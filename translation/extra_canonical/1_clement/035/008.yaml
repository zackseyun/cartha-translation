source:
  edition: Funk 1901 (normalized OCR)
  text: σὺ δὲ ἐμίσησας παιδείαν καὶ ἐξέβαλες τοὺς λόγους μου εἰς τὰ ὀπίσω. εἰ ἐθεώρεις κλέπτην, συνέτρεχες αὐτῷ, καὶ μετὰ μοιχοῦ τὴν μερίδα σου ἐτίθεις. τὸ στόμα σου ἐπλεόνασεν κακίαν, καὶ ἡ γλῶσσά σου περιέπλεκεν δολιότητα. καθήμενος κατὰ τοῦ ἀδελφοῦ σου κατελάλεις, καὶ κατὰ τοῦ υἱοῦ τῆς μητρός σου ἐτίθεις σκάνδαλον.
  language: Greek
translation:
  text: Yet you hated discipline, and cast my words behind you. If you saw a thief, you ran with him, and you placed your share with an adulterer. Your mouth overflowed with evil, and your tongue was weaving deceit. Seated, you were slandering your brother, and against the son of your mother you were laying a stumbling block.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'adulterers'.
    reason: previous_rendering
  - marker: b
    text: Or 'kept weaving deceit. Sitting down, you were slandering your brother, and against the son of your mother you were laying'.
    reason: previous_rendering
