  text: πῶς δὲ ἔσται τοῦτο, ἀγαπητοί; ἐὰν ἐστηργιμένῃ ἢ ἡ διάνοια ἡμῶν πιστῶς πρὸς
    τὸν θεόν, ἐὰν ἐκζητήσωμεν τὰ εὐάρεστα καὶ εὐπρόσδεκτα αὐτῷ, ἐὰν ἐπιτελέσωμεν τὰ
    ἀνήκοντα τῇ ἀμώμῳ βουλήσει αὐτοῦ καὶ ἀκολουθήσωμεν τῇ ὁδῷ τῆς ἀληθείας, ἀπορρίψαντες
    ἀφ’ ἑαυτῶν πᾶσαν ἀδικίαν καὶ πονηρίαν, πλεονεξίαν, ἔρεις, κακοηθείας τε καὶ δόλους,
    ψιθυρισμούς τε καὶ καταλαλιάς, θεοστυγίαν, ὑπερηφανίαν τε καὶ ἀλαζονείαν, κενοδοξίαν
    τε καὶ ἀφιλοξενίαν.
  language: Greek
translation:
  text: But how will this be, beloved? If our mind is firmly fixed on God in faithfulness,
    if we seek the things pleasing and acceptable to him, if we do the things that
    are fitting for his blameless will and follow the way of truth, having cast away
    from ourselves all unrighteousness and wickedness, greed, strife, malice and deceit,
    whisperings and slanders, hatred of God, pride and arrogance, vainglory and inhospitality.
  philosophy: optimal-equivalence
