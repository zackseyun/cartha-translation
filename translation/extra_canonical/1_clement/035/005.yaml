id: 1CLEM.35.5
reference: 1 Clement 35:5
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: πῶς δὲ ἔσται τοῦτο, ἀγαπητοί; ἐὰν ἐστηργιμένῃ ἢ ἡ διάνοια ἡμῶν πιστῶς πρὸς
    τὸν θεόν, ἐὰν ἐκζητήσωμεν τὰ εὐάρεστα καὶ εὐπρόσδεκτα αὐτῷ, ἐὰν ἐπιτελέσωμεν τὰ
    ἀνήκοντα τῇ ἀμώμῳ βουλήσει αὐτοῦ καὶ ἀκολουθήσωμεν τῇ ὁδῷ τῆς ἀληθείας, ἀπορρίψαντες
    ἀφ’ ἑαυτῶν πᾶσαν ἀδικίαν καὶ πονηρίαν, πλεονεξίαν, ἔρεις, κακοηθείας τε καὶ δόλους,
    ψιθυρισμούς τε καὶ καταλαλιάς, θεοστυγίαν, ὑπερηφανίαν τε καὶ ἀλαζονείαν, κενοδοξίαν
    τε καὶ ἀφιλοξενίαν.
  language: Greek
translation:
  text: But how will this be, beloved? If our mind has been fixed faithfully on God,
    if we seek out the things pleasing and acceptable to him, if we accomplish the
    things that belong to his blameless purpose and follow the way of truth, casting
    away from ourselves all unrighteousness and wickedness, greed, strife, malicious
    habits and deceits, whisperings and slanders, hatred of God, pride and arrogance,
    empty glory and lack of hospitality.
  philosophy: optimal-equivalence
