translation:
  text: 'Therefore, since all things are seen and heard, let us fear him and leave
    behind the foul desires that belong to wicked deeds, so that by his mercy we may
    be sheltered from the judgments that are about to come.


    2 For where can any one of us flee from his mighty hand? And what world will receive
    one of those who desert from him? For the Scripture says somewhere,


    3 “Where shall I arrive, and where shall I hide from your face? If I go up into
    heaven, you are there; if I depart to the farthest parts of the earth, there is
    your right hand; if I make my bed in the depths, there is your Spirit.”


    4 Where, then, can anyone go away, or where can he run off to, from the One who
    encompasses all things?'
  philosophy: optimal-equivalence
