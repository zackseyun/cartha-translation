lexical_decisions:
- source_word: βλεπομένων καὶ ἀκουομένων
  chosen: are seen and heard
  alternatives:
  - are watched and listened to
  - are visible and audible
  lexicon: LSJ
  rationale: A concise passive rendering preserves the sense that all things lie open
    before God without over-interpreting the implied subject.
- source_word: φοβηθῶμεν
  chosen: let us fear
  alternatives:
  - let us be afraid of
  - let us stand in awe of
  lexicon: BDAG
  rationale: The paraenetic force here includes reverent fear before divine judgment;
    'fear' preserves that weight better than the softer 'stand in awe.'
- source_word: ἀπολίπωμεν
  chosen: leave behind
  alternatives:
  - forsake
  - abandon
  lexicon: LSJ
  rationale: '''Leave behind'' is idiomatic modern English while still conveying decisive
    renunciation.'
- source_word: φαύλων ἔργων μιαρὰς ἐπιθυμίας
  chosen: the foul desires that belong to wicked deeds
  alternatives:
  - the defiling desires of evil works
  - the vile lusts of base deeds
  lexicon: LSJ
  rationale: The Greek links 'foul/defiling desires' with 'wicked deeds.' This rendering
    keeps both elements and avoids reducing ἐπιθυμίαι to merely sexual lusts.
- source_word: σκεπασθῶμεν
  chosen: we may be sheltered
  alternatives:
  - we may be covered
  - we may be protected
  lexicon: LSJ
  rationale: The passive evokes being covered over or sheltered by divine mercy; 'sheltered'
    communicates protection while retaining the metaphorical sense.
- source_word: τῶν μελλόντων κριμάτων
  chosen: the judgments that are about to come
  alternatives:
  - the coming judgments
  - the impending judgments
  lexicon: BDAG
  rationale: This preserves the eschatological force of μέλλω without sounding wooden.
- source_word: κραταιᾶς χειρός
  chosen: mighty hand
  alternatives:
  - strong hand
  - powerful hand
  lexicon: LSJ
  rationale: A biblically resonant phrase in English that matches the idiom of divine
    power.
- source_word: κόσμος
  chosen: world
  alternatives:
  - order
  - cosmos
  lexicon: BDAG
  rationale: In context the rhetorical question asks what realm or world could receive
    a deserter from God; 'world' is natural and sufficiently broad.
- source_word: αὐτομολούντων
  chosen: those who desert from him
  alternatives:
  - those who defect from him
  - runaways from him
  lexicon: LSJ
  rationale: The military-political sense of desertion/defection is important and
    should not be flattened into generic departure.
- source_word: τὸ γραφεῖον
  chosen: the Scripture
  alternatives:
  - the writing
  - the written text
  lexicon: LSJ
  rationale: Although literally 'the writing/document,' in this citation formula it
    functions much like 'Scripture says,' which best conveys the ecclesial use.
- source_word: ἀφίξω
  chosen: shall I arrive
  alternatives:
  - shall I go
  - shall I come
  lexicon: LSJ
  rationale: The verb is not the common 'go'; 'arrive' preserves the distinct lexical
    choice, though the line remains idiomatic in English.
- source_word: ἀπὸ τοῦ προσώπου σου
  chosen: from your face
  alternatives:
  - from your presence
  lexicon: BDAG
  rationale: '''Face'' is more literal and preserves biblical anthropomorphic diction;
    the idiomatic sense of presence remains clear.'
- source_word: τὰ ἔσχατα τῆς γῆς
  chosen: the farthest parts of the earth
  alternatives:
  - the ends of the earth
  - earth's remotest bounds
  lexicon: LSJ
  rationale: This keeps the superlative sense explicit while remaining readable.
- source_word: καταστρωθῶ
  chosen: I make my bed
  alternatives:
  - I lie down
  - I spread out my couch
  lexicon: LSJ
  rationale: This is the most natural English equivalent for the bedding/resting idiom
    in the cited scriptural line.
- source_word: ἀβύσσους
  chosen: the depths
  alternatives:
  - the abysses
  - the deep
  lexicon: BDAG
  rationale: Plural 'abysses' is awkward in English here; 'the depths' preserves the
    sense of the deep underworld/abyss.
- source_word: τὸ τὰ πάντα ἐμπεριέχοντος
  chosen: the One who encompasses all things
  alternatives:
  - the One who contains all things
  - the One who surrounds all things
  lexicon: LSJ
  rationale: The participle expresses God's all-encompassing reality; this rendering
    is clear, elevated, and theologically fitting.
theological_decisions:
- issue: Divine omnipresence and judgment emphasis
  chosen_reading: Retain both the warning of coming judgments and the impossibility
    of escape from God's presence without softening either theme.
  alternative_readings:
  - Emphasize only reverent awe and omit fear/judgment sharpness
  - Render the passage primarily as comfort about omnipresence
  rationale: The chapter is paraenetic and admonitory. Clement uses God's universal
    knowledge and presence as grounds for repentance and holy fear, not merely consolation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Gendered indefinite τις / τινα
  chosen_reading: Use 'any one of us' and 'anyone' in general statements, but retain
    singular 'he' in the final rhetorical question for gender-accurate representative
    force.
  alternative_readings:
  - Use fully gender-neutral singular throughout
  - Use 'man' throughout
  rationale: The Greek uses indefinite singular forms with representative force. This
    mixed approach preserves natural English while respecting the project's gender-accurate
    policy.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
