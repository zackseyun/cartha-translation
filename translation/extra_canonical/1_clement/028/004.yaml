  from: go away, or where can he run off to
  to: go, or where can he flee
  rationale: 'The verb ἀποδιδράσκω means ''to run away, flee, escape.'' The phrase ''run off to'' is too colloquial for the formal, rhetorical register of 1 Clement. ''Flee'' or ''escape'' better captures the solemnity of attempting to evade God''s omnipresence. Similarly, ''go'' or ''depart'' is more fitting than ''go away'' for ἀπέλθῃ in this elevated context. | Azure: The Greek supports the proposed tightening. ἀπέλθῃ is simply ''go away/depart/go,'' so ''go'' is fully defensible and no less accurate; ἀποδράσῃ, from ἀποδιδράσκω/ἀποδράσκω, specifically carries the sense'
