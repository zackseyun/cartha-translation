lexical_decisions:
- source_word: ἄφρονες / ἀσύνετοι / μωροὶ / ἀπαίδευτοι
  chosen: foolish and senseless and stupid and untaught
  alternatives:
  - fools and undiscerning and dull and uneducated
  - foolish and ignorant and silly and untrained
  lexicon: LSJ
  rationale: Preserved the piled-up rhetorical denunciation with four distinct English
    terms rather than collapsing them into one generalized insult. 'Untaught' keeps
    the moral-educational force of ἀπαίδευτοι without sounding merely academic.
- source_word: χλευάζουσιν / μυκτηρίζουσιν
  chosen: mock / sneer at
  alternatives:
  - deride / ridicule
  - mock / scorn
  lexicon: LSJ
  rationale: Used two different English verbs to reflect the paired Greek verbs and
    preserve the contemptuous tone.
- source_word: ἐπαίρεσθαι
  chosen: to exalt themselves
  alternatives:
  - to be puffed up
  - to raise themselves up
  lexicon: LSJ
  rationale: Captures self-exalting pride in a way that is natural in English and
    fits the paraenetic context.
- source_word: θνητός
  chosen: mortal
  alternatives:
  - man
  - human being
  lexicon: LSJ
  rationale: Highlights creaturely frailty, which is the point of the rhetorical question.
- source_word: γηγενής
  chosen: one born of earth
  alternatives:
  - earthborn man
  - creature of dust
  lexicon: LSJ
  rationale: Rendered the compound transparently to preserve the earthy, humbling
    imagery.
- source_word: αὔραν
  chosen: a breath
  alternatives:
  - a breeze
  - a wind
  lexicon: LSJ
  rationale: In the cited scriptural wording, 'breath' better suits the elusive, insubstantial
    perception being described.
- source_word: καθαρός
  chosen: clean
  alternatives:
  - pure
  lexicon: LSJ
  rationale: Retains the scriptural cadence of purity language while remaining accessible.
- source_word: ἄμεμπτος
  chosen: blameless
  alternatives:
  - without fault
  - irreproachable
  lexicon: LSJ
  rationale: Standard biblical English equivalent that preserves moral/judicial nuance.
- source_word: παῖδες
  chosen: servants
  alternatives:
  - children
  lexicon: LSJ
  rationale: In this Job citation context, the sense is God's attendants/servants,
    contrasted with angels; 'children' would confuse the parallelism.
- source_word: σκολιόν
  chosen: something crooked
  alternatives:
  - perversity
  - fault
  lexicon: LSJ
  rationale: Keeps the qualitative force of the adjective and echoes biblical moral
    language.
- source_word: οἰκίας πηλίνας
  chosen: houses of clay
  alternatives:
  - clay houses
  - mud houses
  lexicon: LSJ
  rationale: Traditional and vivid rendering that preserves the metaphor for human
    frailty.
- source_word: ἔπαισεν αὐτοὺς σητὸς τρόπον
  chosen: He struck them like a moth
  alternatives:
  - He smote them moth-like
  - He consumed them like a moth
  lexicon: LSJ
  rationale: The Greek is compressed and metaphorical; this rendering preserves the
    simile and divine agency without over-paraphrasing.
- source_word: ἐνεφύσησεν
  chosen: He breathed on them
  alternatives:
  - He blew upon them
  - He breathed into them
  lexicon: LSJ
  rationale: The prepositionless verb here is best taken as breath directed upon them,
    in context of their fragility; 'into' would suggest enlivening rather than the
    negative outcome that follows.
- source_word: ζῆλος
  chosen: jealousy
  alternatives:
  - envy
  - zeal
  lexicon: LSJ
  rationale: In this warning context, the destructive passion is better represented
    by 'jealousy' than the more positive-sounding 'zeal.'
- source_word: ῥίζας βάλλοντας
  chosen: taking root
  alternatives:
  - striking roots
  - becoming established
  lexicon: LSJ
  rationale: Natural English idiom that preserves the image of apparent stability
    before sudden ruin.
- source_word: δίαιτα
  chosen: dwelling
  alternatives:
  - way of life
  - estate
  - habitation
  lexicon: LSJ
  rationale: Given the context of sudden destruction after taking root, a concrete
    sense such as 'dwelling/estate' fits better than 'way of life,' though the term
    can bear broader senses.
- source_word: κολαβρισθείησαν
  chosen: may they be crushed
  alternatives:
  - may they be battered
  - may they be humiliated
  lexicon: LSJ
  rationale: The form is difficult, but the context is imprecatory ruin; 'crushed'
    conveys severe oppression at the city gates/doors.
- source_word: ἐξαιρούμενος / ἐξαίρετοι
  chosen: to rescue / delivered
  alternatives:
  - to snatch away / exempt
  - to save / rescued
  lexicon: LSJ
  rationale: Used context-sensitive English forms from the same Greek root to preserve
    the sense of being removed from danger.
theological_decisions:
- issue: Quotation of Job material in a non-identical form
  chosen_reading: Translate the wording as cited in 1 Clement rather than harmonizing
    to a standard English Job text.
  alternative_readings:
  - Conform the quotation to a familiar Job translation
  - Mark every divergence in the main text
  rationale: The chapter uses scriptural catena material in a form mediated through
    Clement's text tradition. Transparency requires translating the extant Greek as
    given, while noting the scriptural background in footnotes.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
- issue: Reference of παῖδες in the clause about God's trust
  chosen_reading: Render as 'servants' rather than 'children.'
  alternative_readings:
  - children
  rationale: The immediate parallel with 'his angels' points to heavenly attendants
    rather than filial relationship. This avoids importing a theological claim about
    divine distrust of sons/children that the context does not require.
  doctrine_reference: Consistency of key terms, or documented exception.
