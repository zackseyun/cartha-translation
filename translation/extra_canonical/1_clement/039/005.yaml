  text: οὐρανοὺς δὲ οὐχὶ καθαρὴς ἐνώπιον αὐτοῦ· ἐὰ δὲ, οἱ κατοικοῦντες οἰκίας πηλίνας, ἐξ ὧν καὶ αὐτοὶ ἐκ τοῦ αὐτοῦ πηλοῦ ἐσμέν. ἔπαισεν αὐτοὺς σητὸς τρόπον, καὶ ἀπὸ πρωΐθεν ἕως ἑσπέρας οὐκ ἔτι εἰσίν· παρὰ τὸ μὴ δύνασθαι αὐτοὺς ἑαυτοῖς βοηθῆσαι ἀπώλοντο.
  language: Greek
translation:
  text: Even the heavens are not clean before him. How much less those who dwell in houses of clay, of which same clay we ourselves are also made. He struck them like a moth, and from morning until evening they are no more; because they are unable to help themselves, they perished.
  philosophy: optimal-equivalence
