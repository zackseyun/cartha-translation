  from: if he does not trust even his own servants, and has perceived something crooked even in his angels?
  to: if he does not trust his servants, and has perceived something crooked in his angels?
  rationale: The subject of πιστεύει and ἐπενόησεν is the Lord (quoting Job 4:18). By adding 'even his own', the draft strongly implies the subject is the mortal man (ἀνήρ) distrusting his human household servants, which destroys the author's a fortiori argument about God finding fault with heavenly beings. Removing the added words allows 'his angels' to naturally clarify that the subject has shifted back to the Lord.
