id: 1CLEM.14
reference: 1 Clement 14
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Δίκαιον οὖν καὶ ὅσιον, ἄνδρες ἀδελφοί, ὑπηκόους ἡμᾶς μᾶλλον γενέσθαι τῷ θεῷ
    ἢ τοῖς ἐν ἀλαζονείᾳ καὶ ἀκαταστασίᾳ μυσεροῦ ζήλους ἀρχηγοῖς ἐξακολουθεῖν. 2. βλάβην
    γὰρ οὐ τὴν τυχοῦσαν, μᾶλλον δὲ κίνδυνον ὑποίσομεν μέγαν, ἐὰν ῥιψοκινδύνως ἐπιδῶμεν
    ἑαυτοὺς τοῖς θελήμασιν τῶν ἀνθρώπων, οἵτινες ἔχουσιν πίπτουσιν εἰς ἔριν καὶ στάσεις,
    εἰς τὸ ἀπαλλοτριῶσαι ἡμᾶς τοῦ καλοῦ ἔχοντος. 3. χρηστευσώμεθα ἑαυτοῖς κατὰ τὴν
    εὐσπλαγχνίαν καὶ γλυκύτητα τοῦ ποιήσαντος ἡμᾶς. 4. γέγραπται γάρ· Χρηστοὶ ἔσονται
    οἰκήτορες γῆς, ἄκακοι δὲ ὑπολειφθήσονται ἐπ’ αὐτῆς· οἱ δὲ παρανομοῦντες ἐξολεθρευθήσονται
    ἀπ᾽ αὐτῆς. 5. καὶ πάλιν λέγει· Εἶδον ἀσεβῆ ὑπερυψούμενον καὶ ἐπαιρόμενον ὡς τὰς
    κέδρους τοῦ Λιβάνου· καὶ παρῆλθον καὶ ἰδοὺ, οὐκ ἦν, καὶ ἐξεζήτησα τὸν τόπον αὐτοῦ,
    καὶ οὐχ εὗρον. φύλασσε ἀκακίαν καὶ ἴδε εὐθύτητα, ὅτι ἐστὶν ἐγκατάλειμμα ἀνθρώπῳ
    εἰρηνικῷ.
  language: Greek
  pages:
  - 279
  - 281
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: 'It is right, then, and holy, brothers, for us to become obedient to God rather
    than to follow those who, in arrogance and disorder, are leaders in hateful jealousy.
    For we will incur no ordinary harm, but rather great danger, if we recklessly
    hand ourselves over to the purposes of men who are bent on plunging us into strife
    and factions, so as to estrange us from what is good. Let us show kindness to
    ourselves according to the compassion and gentleness of the One who made us. For
    it is written: “The kind will inhabit the land, and the innocent will be left
    upon it; but those who transgress the law will be destroyed from it.” And again
    he says: “I saw the ungodly highly exalted and lifted up like the cedars of Lebanon;
    and I passed by, and behold, he was not there, and I sought his place, and I did
    not find it. Keep innocence and observe uprightness, because there is a remnant
    for a peaceable man.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'brothers' translates a masculine fraternal address (ἄνδρες ἀδελφοί).
    reason: cultural_note
  - marker: b
    text: '''Hateful jealousy'' could also be rendered ''detestable zeal''; here ζῆλος
      is taken negatively from the context of arrogance, disorder, strife, and factions.'
    reason: lexical_alternative
  - marker: c
    text: The citations echo Ps 37:9, 35–37 (LXX numbering differs in some traditions).
    reason: cross_reference
  - marker: d
    text: '''There is a remnant for a peaceable man'' may also be understood as ''there
      is a future/posterity for a peaceable man.'''
    reason: alternative_reading
lexical_decisions:
- source_word: Δίκαιον
  chosen: right
  alternatives:
  - just
  - fitting
  lexicon: LSJ
  rationale: In the paired expression with ὅσιον, 'right' preserves the ethical force
    without sounding overly technical; 'just' was possible, but the context is paraenetic
    rather than juridical.
- source_word: ὅσιον
  chosen: holy
  alternatives:
  - pious
  - godly
  lexicon: LSJ
  rationale: Chosen to preserve the sacred/moral register of the exhortation. 'Pious'
    is possible but less natural in modern English here.
- source_word: ἄνδρες ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - brothers, men
  lexicon: LSJ
  rationale: Retains the masculine-fraternal address of the Greek in keeping with
    gender-accurate policy. The vocative formula is conventional and ecclesial.
- source_word: ὑπηκόους ... γενέσθαι
  chosen: to become obedient
  alternatives:
  - to be submissive
  - to become subject
  lexicon: BDAG
  rationale: '''Obedient'' best captures the moral and volitional sense of ὑπήκοος
    in this exhortational context.'
- source_word: ἀλαζονείᾳ
  chosen: arrogance
  alternatives:
  - boastfulness
  - pretension
  lexicon: LSJ
  rationale: '''Arrogance'' is idiomatic and conveys the proud self-assertion condemned
    here.'
- source_word: ἀκαταστασίᾳ
  chosen: disorder
  alternatives:
  - instability
  - tumult
  lexicon: BDAG
  rationale: The term denotes disruptive unrest; 'disorder' fits the ecclesial context
    of factional disturbance.
- source_word: μυσεροῦ ζήλους
  chosen: hateful jealousy
  alternatives:
  - abominable zeal
  - loathsome jealousy
  lexicon: LSJ
  rationale: ζῆλος here is negative in context, so 'jealousy' is clearer than 'zeal';
    μυσερός adds the sense of something detestable or hateful.
- source_word: ἀρχηγοῖς
  chosen: leaders
  alternatives:
  - chiefs
  - instigators
  - ringleaders
  lexicon: BDAG
  rationale: '''Leaders'' is the most neutral rendering; the negative characterization
    is already supplied by the surrounding words.'
- source_word: βλάβην
  chosen: harm
  alternatives:
  - injury
  - damage
  lexicon: LSJ
  rationale: Simple and natural English that preserves the warning's seriousness.
- source_word: κίνδυνον μέγαν
  chosen: great danger
  alternatives:
  - grave peril
  - great risk
  lexicon: BDAG
  rationale: Maintains the escalated warning from ordinary harm to serious peril.
- source_word: ῥιψοκινδύνως
  chosen: recklessly
  alternatives:
  - rashly
  - hazardously
  lexicon: LSJ
  rationale: Conveys the sense of courting danger by rash action.
- source_word: ἐπιδῶμεν ἑαυτούς
  chosen: hand ourselves over
  alternatives:
  - give ourselves up
  - yield ourselves
  lexicon: LSJ
  rationale: Captures the voluntary surrender implied by the idiom.
- source_word: θελήμασιν
  chosen: purposes
  alternatives:
  - wills
  - desires
  lexicon: BDAG
  rationale: '''Purposes'' fits the hostile intentionality of the men in view better
    than the more abstract ''wills.'''
- source_word: ἔριν καὶ στάσεις
  chosen: strife and factions
  alternatives:
  - quarreling and divisions
  - contention and uprisings
  lexicon: BDAG
  rationale: Preserves both interpersonal conflict (ἔρις) and communal schism (στάσις),
    important in 1 Clement's ecclesial setting.
- source_word: ἀπαλλοτριῶσαι
  chosen: to estrange
  alternatives:
  - to alienate
  - to remove
  lexicon: LSJ
  rationale: Expresses relational and moral separation from 'what is good' without
    flattening the force.
- source_word: τοῦ καλοῦ ἔχοντος
  chosen: what is good
  alternatives:
  - the good state we possess
  - the honorable condition
  lexicon: LSJ
  rationale: The phrase is somewhat compressed; this rendering communicates the moral
    good from which they risk being alienated without over-specifying.
- source_word: χρηστευσώμεθα
  chosen: Let us show kindness
  alternatives:
  - Let us be kind
  - Let us act graciously
  lexicon: BDAG
  rationale: The middle form with ἑαυτοῖς suggests active beneficence toward ourselves;
    'show kindness' preserves the verbal force.
- source_word: εὐσπλαγχνίαν
  chosen: compassion
  alternatives:
  - tender mercy
  - deep pity
  lexicon: BDAG
  rationale: A clear modern rendering for heartfelt mercy.
- source_word: γλυκύτητα
  chosen: gentleness
  alternatives:
  - sweetness
  - kindness
  lexicon: LSJ
  rationale: Literal 'sweetness' is possible, but 'gentleness' better communicates
    the moral quality in idiomatic English.
- source_word: Χρηστοὶ
  chosen: The kind
  alternatives:
  - the good
  - the upright
  lexicon: LSJ
  rationale: Preserves the lexical link with χρηστευσώμεθα in the previous verse,
    reinforcing Clement's paraenetic flow.
- source_word: ἄκακοι
  chosen: the innocent
  alternatives:
  - the blameless
  - the guileless
  lexicon: BDAG
  rationale: '''Innocent'' is concise and fits the Psalmic citation well.'
- source_word: παρανομοῦντες
  chosen: those who transgress the law
  alternatives:
  - the lawless
  - those who act unlawfully
  lexicon: BDAG
  rationale: A fuller rendering makes explicit the verbal sense of violating law rather
    than merely possessing a quality.
- source_word: ἀσεβῆ
  chosen: the ungodly
  alternatives:
  - the wicked
  - the impious
  lexicon: BDAG
  rationale: Retains the religious dimension of impiety in the citation.
- source_word: ὑπερυψούμενον καὶ ἐπαιρόμενον
  chosen: highly exalted and lifted up
  alternatives:
  - towering and raised aloft
  - exalted and proud
  lexicon: LSJ
  rationale: Keeps the elevated imagery and rhetorical fullness of the double expression.
- source_word: ἀκακίαν
  chosen: innocence
  alternatives:
  - blamelessness
  - guilelessness
  lexicon: BDAG
  rationale: Matches the earlier ἄκακοι and preserves lexical coherence.
- source_word: εὐθύτητα
  chosen: uprightness
  alternatives:
  - straightness
  - integrity
  lexicon: LSJ
  rationale: A standard moral rendering in wisdom/Psalmic contexts.
- source_word: ἐγκατάλειμμα
  chosen: a remnant
  alternatives:
  - a future
  - what remains
  - posterity
  lexicon: LSJ
  rationale: The term can denote what is left behind or reserved. 'Remnant' preserves
    the scriptural resonance and avoids over-resolving whether the sense is posterity
    or enduring outcome.
- source_word: εἰρηνικῷ
  chosen: peaceable
  alternatives:
  - peaceful
  - man of peace
  lexicon: BDAG
  rationale: '''Peaceable'' expresses character rather than mere mood and suits the
    paraenetic contrast with strife and factions.'
theological_decisions:
- issue: Gendered ecclesial address in ἄνδρες ἀδελφοί
  chosen_reading: Rendered as 'brothers' in the main text
  alternative_readings:
  - brothers and sisters
  rationale: The Greek uses a masculine fraternal address formula. In line with the
    project's gender-accurate policy, the masculine form is retained rather than expanded
    beyond the wording of the source.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Sense of ἐγκατάλειμμα in the Psalm citation
  chosen_reading: Rendered as 'there is a remnant for a peaceable man'
  alternative_readings:
  - there is a future for a peaceable man
  - there is posterity for a peaceable man
  rationale: The Greek wording naturally suggests what remains or is left. Because
    the term can be interpreted in more than one way in citation context, the more
    literal 'remnant' is kept in the main text and alternatives are noted.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 3
