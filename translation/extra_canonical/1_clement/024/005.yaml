  from: from one he increases many and brings forth fruit
  to: from the one, many grow and bring forth fruit
  rationale: The draft incorrectly supplies 'he' as the subject of `αὔξει` and `ἐκφέρει`. In Greek, a neuter plural subject (`πλείονα`, 'many') regularly takes a singular verb. The subject is the 'many' (seeds/plants) that grow from the one and bear fruit, not the Master or the sower. Additionally, the article in `ἐκ τοῦ ἑνὸς` ('from the one') should be preserved to contrast with the many.
