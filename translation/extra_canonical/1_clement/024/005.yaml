  text: ἐξῆλθεν ὁ σπείρων καὶ ἔβαλεν εἰς τὴν γῆν ἕκαστον τῶν σπερμάτων, ἅτινα πεσόντα εἰς τὴν γῆν ξηρὰ καὶ γυμνὰ διαλύεται· εἶτʼ ἐκ τῆς διαλύσεως ἡ μεγαλειότης τῆς προνοίας τοῦ δεσπότου ἀνίστησιν αὐτά, καὶ ἐκ τοῦ ἑνὸς πλείονα αὔξει καὶ ἐκφέρει καρπόν.
  language: Greek
translation:
  text: The sower went out and cast each of the seeds into the ground, and when they fall into the ground, dry and bare, they decay; then from that decay the greatness of the Master's providence raises them up, and from the one, many grow and bring forth fruit.
