  rationale: 'The Greek `τὴν μέλλουσαν ἀνάστασιν ἔσεσθαι` is a standard construction meaning ''the future resurrection will be/take place.'' The draft''s hyper-literalism creates a redundant and clunky English phrase (''going to happen will indeed be'') that obscures the author''s clear rhetorical prose. | Azure: The proposed rewrite is clearly closer to the Greek idiom. In Κατανοήσωμεν … πῶς ὁ δεσπότης ἐπιδείκνυται … ἡμῖν τὴν μέλλουσαν ἀνάστασιν ἔσεσθαι, the participle μέλλουσαν already marks the resurrection'
