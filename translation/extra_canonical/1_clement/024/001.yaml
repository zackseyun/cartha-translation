lexical_decisions:
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: BDAG
  rationale: Chosen to distinguish δεσπότης from κύριος within the same chapter and
    to preserve the sense of absolute ownership/authority without collapsing both
    titles into one English term.
- source_word: διηνεκῶς
  chosen: continually
  alternatives:
  - constantly
  - unceasingly
  lexicon: LSJ
  rationale: Conveys ongoing, repeated demonstration in readable modern English while
    preserving the durative force.
- source_word: μέλλουσαν ἀνάστασιν ἔσεσθαι
  chosen: the resurrection that is going to happen will indeed be
  alternatives:
  - the coming resurrection
  - the future resurrection
  lexicon: BDAG
  rationale: The Greek is rhetorically emphatic and somewhat pleonastic; this rendering
    preserves the stress on the certainty of the future resurrection rather than smoothing
    it away.
- source_word: ἀπαρχή
  chosen: firstfruits
  alternatives:
  - first portion
  - first offering
  lexicon: BDAG
  rationale: A theologically loaded term with established biblical resonance, especially
    in resurrection contexts; preserves intertextual force.
- source_word: κύριον Ἰησοῦν Χριστόν
  chosen: the Lord Jesus Messiah
  alternatives:
  - the Lord Jesus Christ
  lexicon: BDAG
  rationale: κύριος is translated as 'Lord' per project defaults, and Χριστός is rendered
    'Messiah' as a title rather than left in traditional transliteration.
- source_word: κατὰ καιρόν
  chosen: in its appointed season
  alternatives:
  - at the proper time
  - seasonally
  lexicon: LSJ
  rationale: Preserves the sense of fitting or appointed timing and suits the natural-cycle
    argument of the passage.
- source_word: κοιμᾶται
  chosen: falls asleep
  alternatives:
  - sleeps
  - lies down
  lexicon: BDAG
  rationale: Retains the sleep imagery that naturally supports the resurrection analogy,
    rather than reducing it to a mere transition of time.
- source_word: ἀνίσταται
  chosen: rises
  alternatives:
  - gets up
  - stands up
  lexicon: BDAG
  rationale: Keeps verbal resonance with resurrection language in the chapter.
- source_word: καρποί
  chosen: crops
  alternatives:
  - fruits
  - produce
  lexicon: LSJ
  rationale: In context the author turns to agricultural produce as an example; 'crops'
    makes the referent clear in English while avoiding confusion with the later singular
    'fruit' as result.
- source_word: σπόρος / σπερμάτων
  chosen: seed / seeds
  alternatives:
  - grain
  - kernel
  lexicon: BDAG
  rationale: Standard agricultural term that preserves the singular-to-plural movement
    in the Greek illustration.
- source_word: ξηρὰ καὶ γυμνά
  chosen: dry and bare
  alternatives:
  - dry and naked
  - parched and stripped
  lexicon: LSJ
  rationale: '''Bare'' preserves the image of stripped, uncovered seed in idiomatic
    English without sounding awkwardly literal.'
- source_word: διαλύεται
  chosen: they decay
  alternatives:
  - it dissolves
  - it breaks apart
  - it perishes
  lexicon: BDAG
  rationale: Captures the seed's apparent disintegration in the ground in natural
    English and fits the resurrection analogy.
- source_word: μεγαλειότης
  chosen: the greatness
  alternatives:
  - the majesty
  - the magnificence
  lexicon: LSJ
  rationale: A clear rendering that preserves elevated tone without becoming overly
    ornate.
- source_word: πρόνοια
  chosen: providence
  alternatives:
  - forethought
  - care
  lexicon: BDAG
  rationale: Best reflects divine ordering and sustaining care in this theological
    context.
- source_word: ἀνίστησιν
  chosen: raises them up
  alternatives:
  - brings them up
  - causes them to rise
  lexicon: BDAG
  rationale: Maintains explicit resurrection diction in the agricultural analogy.
- source_word: ἐκφέρει καρπόν
  chosen: brings forth fruit
  alternatives:
  - produces fruit
  - yields produce
  lexicon: LSJ
  rationale: Preserves scriptural cadence and agricultural imagery.
theological_decisions:
- issue: Rendering Χριστός in an early Christian prose text
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project default is to translate the title rather than transliterate
    it when functioning as a title. Here it remains appositional to Jesus and carries
    theological meaning, so 'Messiah' was retained.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: How explicitly to preserve resurrection language in natural analogies
  chosen_reading: Use 'rises' and 'raises them up' in the day/night and seed imagery
  alternative_readings:
  - Use less marked verbs such as 'appears' or 'sprouts'
  rationale: Clement's argument depends on analogical continuity between natural cycles
    and bodily resurrection. Preserving the repeated resurrection diction keeps the
    paraenetic and theological force visible.
