  text: Κατανοήσωμεν, ἀγαπητοί, πῶς ὁ δεσπότης ἐπιδείκνυται διηνεκῶς ἡμῖν τὴν μέλλουσαν
    ἀνάστασιν ἔσεσθαι, ἧς τὴν ἀπαρχὴν ἐποιήσατο τὸν κύριον Ἰησοῦν Χριστὸν ἐκ νεκρῶν
