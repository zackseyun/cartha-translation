  text: Ὁρᾶτε, ἀγαπητοί, μὴ αἱ εὐεργεσίαι αὐτοῦ αἱ πολλαὶ γένωνται εἰς κρίμα πᾶσιν ἡμῖν, ἐὰν μὴ ἀξίως αὐτοῦ πολιτευόμενοι τὰ καλὰ καὶ εὐάρεστα ἐνώπιον αὐτοῦ ποιῶμεν μεθ’ ὁμονοίας.
