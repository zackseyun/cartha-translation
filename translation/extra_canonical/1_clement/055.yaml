translation:
  text: 'And so, to bring forward examples even from the nations: many kings and rulers,
    when some pestilential crisis had arisen, being instructed by oracles, handed
    themselves over to death so that through their own blood they might rescue their
    citizens. Many departed from their own cities so that they might not continue
    in factional strife.


    We know of many among us who have handed themselves over to chains so that they
    might ransom others. Many handed themselves over into slavery, and after receiving
    the price paid for them, they fed others.


    Many women, strengthened through the grace of God, accomplished many courageous
    deeds.


    The blessed Judith, when the city was under siege, asked of the elders that she
    be permitted to go out into the camp of the foreigners. So then, handing herself
    over to danger, she went out because of love for her homeland and for the people
    who were under siege, and the Lord handed Holofernes over into the hand of a woman.


    And no less did Esther also, perfect in faith, put herself in danger so that she
    might rescue the twelve tribes of Israel, which were about to perish. For through
    fasting and humiliation she entreated the all-seeing Master, God of the ages;
    and he, seeing the humility of her soul, rescued the people for whose sake she
    had faced danger.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a plague-stricken time.' The Greek describes a deadly public crisis,
      likely involving pestilence or calamity.
    reason: lexical_alternative
  - marker: b
    text: Literally 'manly deeds.' Clement uses gendered language to commend the courage
      of these women.
    reason: lexical_alternative
  - marker: c
    text: Ioudith refers to Judith of the deuterocanonical book of Judith.
    reason: cross_reference
  - marker: d
    text: Or 'perfect in faith' / 'complete in faith.' The Greek phrase is concise
      and somewhat idiomatic.
    reason: lexical_alternative
  - marker: e
    text: Esther alludes especially to the Greek Esther tradition, with its emphasis
      on fasting and humble petition.
    reason: cross_reference
  - marker: f
    text: Or 'giving herself over to danger, she went out because of love for her
      homeland and for the people who were under siege, and the Lord delivered Holofernes'.
    reason: previous_rendering
  - marker: g
    text: Or 'And no less also Esther, perfect according to faith, put herself in
      danger'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὑποδείγματα
  chosen: examples
  alternatives:
  - patterns
  - illustrations
  lexicon: LSJ
  rationale: Common paraenetic sense here is exemplary cases set forward for imitation
    or reflection; 'examples' is clear and preserves the hortatory force.
- source_word: ἐθνῶν
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: LSJ
  rationale: '''The nations'' preserves the broader ethnic-political sense without
    importing later NT Jew/Gentile technicality too strongly.'
- source_word: λοιμικοῦ τινος ... καιροῦ
  chosen: some pestilential crisis
  alternatives:
  - a plague-stricken time
  - some deadly season
  lexicon: LSJ
  rationale: The phrase denotes a disastrous or plague-like emergency; 'pestilential
    crisis' keeps the elevated register and the indefinite τινος.
- source_word: χρησμοδοτηθέντες
  chosen: being instructed by oracles
  alternatives:
  - having received an oracle
  - being warned by prophecy
  lexicon: LSJ
  rationale: The participle points to guidance received through oracular pronouncement;
    this wording keeps the pagan-religious setting explicit.
- source_word: παρέδωκαν ἑαυτοὺς εἰς θάνατον
  chosen: handed themselves over to death
  alternatives:
  - gave themselves up to death
  - surrendered themselves to death
  lexicon: BDAG
  rationale: '''Handed over'' preserves the verbal link with later παραδίδωμι phrases
    in the chapter and keeps the solemn self-sacrificial nuance.'
- source_word: ῥύσωνται
  chosen: might rescue
  alternatives:
  - might deliver
  - might save
  lexicon: BDAG
  rationale: '''Rescue'' fits concrete deliverance from imminent danger and avoids
    overloading ''save'' with later doctrinal associations in this context.'
- source_word: στασιάζωσιν
  chosen: be torn by faction
  alternatives:
  - be in civil strife
  - be divided by sedition
  lexicon: LSJ
  rationale: The verb concerns factional conflict; this rendering captures both internal
    division and civic unrest in idiomatic English.
- source_word: δεσμά
  chosen: chains
  alternatives:
  - bonds
  - imprisonment
  lexicon: BDAG
  rationale: A concrete rendering preserves the vividness of voluntary captivity;
    broader imprisonment is implied but not flattened.
- source_word: λυτρώσωνται
  chosen: might ransom
  alternatives:
  - might redeem
  - might free
  lexicon: BDAG
  rationale: The term carries release by payment or costly means; 'ransom' best preserves
    that transactional-sacrificial sense.
- source_word: δουλείαν
  chosen: slavery
  alternatives:
  - bondage
  - servitude
  lexicon: BDAG
  rationale: Per project philosophy, bonded status should not be softened where salient;
    'slavery' is the most transparent rendering.
- source_word: τὰς τιμὰς αὐτῶν
  chosen: the price paid for them
  alternatives:
  - their price
  - their sale-price
  lexicon: LSJ
  rationale: In context of self-sale into slavery, τιμή refers to the monetary price;
    this explicit rendering clarifies the sense in natural English.
- source_word: ἐψώμισαν
  chosen: they fed
  alternatives:
  - they provided food for
  - they nourished
  lexicon: LSJ
  rationale: The verb is specifically about supplying food; 'fed' is concise and concrete.
- source_word: ἐνδυναμωθεῖσαι
  chosen: strengthened
  alternatives:
  - empowered
  - made strong
  lexicon: BDAG
  rationale: Passive divine enablement is central; 'strengthened' preserves that without
    sounding overly technical.
- source_word: ἀνδρεῖα
  chosen: manly deeds
  alternatives:
  - brave deeds
  - courageous acts
  lexicon: LSJ
  rationale: The Greek explicitly uses gendered language for valor; per philosophy,
    gender-accurate rendering is preferred, even if the commendation is representative
    rather than exclusionary.
- source_word: ἐν συγκλεισμῷ οὔσης τῆς πόλεως
  chosen: when the city was under siege
  alternatives:
  - while the city was shut in
  - with the city enclosed
  lexicon: LSJ
  rationale: The idiom refers to a city hemmed in by enemies; 'under siege' gives
    the plain historical sense.
- source_word: παρεμβολὴν τῶν ἀλλοφύλων
  chosen: the camp of the foreigners
  alternatives:
  - the camp of the enemy
  - the encampment of the Philistines/aliens
  lexicon: LSJ
  rationale: ἀλλόφυλοι means foreign peoples/enemies; 'foreigners' stays close without
    over-specifying ethnicity.
- source_word: δι’ ἀγάπην
  chosen: because of love for
  alternatives:
  - out of love for
  - for love of
  lexicon: BDAG
  rationale: Retaining 'love' is important for Clement's moral texture and avoids
    reducing motive to mere patriotism.
- source_word: ἐν χειρὶ θηλείας
  chosen: into the hand of a woman
  alternatives:
  - by the hand of a woman
  - into a woman's hand
  lexicon: LXX lexicon
  rationale: This preserves the biblical cadence and the striking reversal emphasized
    by the phrase.
- source_word: τελεία κατὰ πίστιν
  chosen: perfect according to faith
  alternatives:
  - complete in faith
  - perfect in faith
  lexicon: BDAG
  rationale: The phrase is somewhat unusual; 'perfect according to faith' stays close
    to the Greek while preserving the commendatory force. A smoother alternative is
    noted in footnote.
- source_word: τὸ δωδεκάφυλον
  chosen: the twelve-tribed people
  alternatives:
  - the twelve tribes
  - the twelvefold tribe
  lexicon: LSJ
  rationale: The singular collective noun is preserved by 'twelve-tribed people,'
    which reflects the corporate identity of Israel.
- source_word: ταπεινώσεως
  chosen: humiliation
  alternatives:
  - humbling
  - self-abasement
  lexicon: BDAG
  rationale: The noun denotes lowliness/humbling expressed in fasting and prayer;
    'humiliation' keeps the ascetic and penitential edge.
- source_word: παντεπόπτην δεσπότην
  chosen: the all-seeing Master
  alternatives:
  - the all-seeing Sovereign
  - the all-seeing Lord
  lexicon: LSJ
  rationale: δεσπότης is stronger than κύριος in authority nuance; 'Master' preserves
    that distinction, while 'all-seeing' renders the compound vividly.
- source_word: θεὸν τῶν αἰώνων
  chosen: God of the ages
  alternatives:
  - eternal God
  - God forever
  lexicon: BDAG
  rationale: A more literal rendering preserves the elevated liturgical cadence and
    avoids prematurely collapsing the phrase into a simple adjective.
- source_word: τὸ ταπεινὸν τῆς ψυχῆς αὐτῆς
  chosen: the humility of her soul
  alternatives:
  - the lowliness of her soul
  - her humble soul
  lexicon: BDAG
  rationale: The abstract phrase is retained to preserve the rhetorical dignity and
    spiritual emphasis of the Greek.
theological_decisions:
- issue: Rendering of ἀνδρεῖα in praise of women
  chosen_reading: manly deeds
  alternative_readings:
  - brave deeds
  - courageous acts
  rationale: The Greek intentionally uses a gender-marked term to underscore extraordinary
    valor in women. Per project philosophy, gender-accurate rendering is preferred,
    with explanatory note rather than neutralization.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of δουλείαν
  chosen_reading: slavery
  alternative_readings:
  - servitude
  - bondage
  rationale: The context is literal self-sale for the sake of others. Following project
    guidance, the bonded nature should not be softened where salient.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1; Contested terms δοῦλος
- issue: Rendering of δεσπότην distinct from κύριος
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: The chapter uses κύριος earlier and δεσπότης here; preserving distinction
    aids transparency and respects lexical variation in the source.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
