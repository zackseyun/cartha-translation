  from: I will speak openly in him.’”
  to: I will speak boldly for him.’”
  rationale: The phrase `παρρησιάσομαι ἐν αὐτῷ` (quoted from LXX Ps 11:6) is awkwardly
    rendered as 'speak openly in him.' The verb `παρρησιάζομαι` here contrasts with
    the boastful speech of the wicked in the preceding verses, carrying the sense
    of speaking boldly or acting with confidence. The prepositional phrase `ἐν αὐτῷ`
    is best understood as 'in his case' or 'for him' (referring to the poor/needy
    person just mentioned). 'In him' is overly literal and opaque in English.
