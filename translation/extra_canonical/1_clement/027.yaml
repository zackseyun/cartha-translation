id: 1CLEM.27
reference: 1 Clement 27
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Ταύτῃ οὖν τῇ ἐλπίδι προσδεδέσθωσαν αἱ ψυχαὶ ἡμῶν τῷ πιστῷ ἐν ταῖς ἐπαγγελίαις καὶ τῷ δικαίῳ ἐν τοῖς κρίμασιν. . ὁ παραγγείλας μὴ ψεύδεσθαι, πολλῷ μᾶλλον αὐτὸς οὐ ψεύσεται· οὐδὲν γὰρ ἀδύνατον παρὰ τῷ θεῷ, εἰ μὴ τὸ ψεύσασθαι. . ἀναζωπυρησάτω οὖν ἡ πίστις αὐτοῦ ἐν ἡμῖν, καὶ νοήσωμεν, ὅτι πάντα ἐγγὺς αὐτῷ ἐστιν. 4. ἐν λόγῳ τῆς μεγαλωσύνης αὐτοῦ συνεστήσατο τὰ πάντα καὶ ἐν λόγῳ δύναται αὐτὰ καταστρέψαι. . Τίς ἐρεῖ αὐτῷ· Τί ἐποίησας; ἢ τίς ἀντιστήσεται τῷ κράτει τῆς ἰσχύος αὐτοῦ; ὅτε θέλει καὶ ὡς θέλει, ποιήσει πάντα καὶ οὐδὲν μὴ παρελθῇ τῶν δεδογματισμένων ὑπ᾿ αὐτοῦ. 6. πάντα ἐνώπιον αὐτοῦ εἰσίν, καὶ οὐδὲν λέληθεν τὴν βουλὴν αὐτοῦ. 7. εἰ οἱ οὐρανοὶ διηγοῦνται δόξαν θεοῦ, ποίησιν δὲ χειρῶν αὐτοῦ ἀναγγέλλει τὸ στερέωμα· ἡ ἡμέρα τῇ ἡμέρᾳ ἐρεύγεται ῥῆμα, καὶ νὺξ νυκτὶ ἀναγγέλλει γνῶσιν· καὶ οὐκ εἰσὶν λόγοι οὐδὲ λαλιαί, ὧν οὐχὶ ἀκούονται αἱ φωναὶ αὐτῶν.
  language: Greek
  pages:
  - 297
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: So then, let our souls be bound by this hope to the One who is faithful in his promises and righteous in his judgments. He who commanded us not to lie will much more not himself lie; for nothing is impossible with God, except to lie. Therefore let faith in him be rekindled in us, and let us understand that all things are near to him. By a word of his majesty he established all things, and by a word he is able to overturn them. Who will say to him, “What have you done?” Or who will withstand the might of his strength? When he wills, and as he wills, he will do all things, and not one of the things decreed by him shall ever pass away. All things are before him, and nothing has escaped his purpose. The heavens declare the glory of God, and the firmament proclaims the work of his hands, day pours forth speech to day, and night announces knowledge to night, and there are no words or utterances whose voices are not heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final sentence echoes Psalm 19:1–3(4 LXX), cited as scriptural support for God's all-seeing sovereignty and manifest glory in creation.
    reason: cross_reference
  - marker: b
    text: Or 'nothing will pass by from the things decreed by him'—that is, none of God's determinations will fail to stand.
    reason: lexical_alternative
  - marker: c
    text: Or 'let our souls be bound to this hope in the One who is faithful'.
    reason: previous_rendering
  - marker: d
    text: Or 'Since the heavens declare the glory of God,'.
    reason: previous_rendering
lexical_decisions:
- source_word: προσδεδέσθωσαν
  chosen: let ... be bound
  alternatives:
  - let ... cling
  - let ... be fastened
  lexicon: LSJ
  rationale: The perfect imperative/passive sense conveys a settled attachment, stronger than a mere momentary 'hope in.' 'Be bound' preserves the image of firm fastening to hope.
- source_word: πιστῷ
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: In context of divine promises, 'faithful' preserves covenantal and theological resonance better than the flatter 'trustworthy.'
- source_word: δικαίῳ
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: Either is possible, but 'righteous in his judgments' keeps the moral-theological register while still fitting judicial context.
- source_word: κρίμασιν
  chosen: judgments
  alternatives:
  - decisions
  - acts of judgment
  lexicon: BDAG
  rationale: '''Judgments'' best matches biblical diction and the forensic sense without overexpansion.'
- source_word: ἀναζωπυρησάτω
  chosen: let ... be rekindled
  alternatives:
  - let ... blaze up again
  - let ... be stirred up
  lexicon: LSJ
  rationale: The verb evokes fanning a fire back to life. 'Rekindled' preserves the metaphor and paraenetic force in natural English.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Here the phrase most naturally means the community's faith directed toward God, not God's own faithfulness. 'Faith' fits the exhortational context.
- source_word: ἐγγὺς
  chosen: near
  alternatives:
  - at hand
  - close
  lexicon: BDAG
  rationale: '''Near'' preserves the sense that all things lie immediately before God''s power and knowledge.'
- source_word: ἐν λόγῳ
  chosen: by a word
  alternatives:
  - by the word
  - through a word
  lexicon: BDAG
  rationale: The anarthrous phrase stresses divine utterance as effective means. 'By a word' is concise and preserves the allusive cadence of scriptural creation language.
- source_word: συνεστήσατο
  chosen: he established
  alternatives:
  - he constituted
  - he set together
  lexicon: BDAG
  rationale: The verb here refers to bringing the ordered whole into being or coherence. 'Established' is idiomatic and suitably elevated.
- source_word: καταστρέψαι
  chosen: to overturn
  alternatives:
  - to destroy
  - to bring down
  lexicon: BDAG
  rationale: The verb can mean overthrow rather than annihilate simpliciter. 'Overturn' preserves divine sovereignty without importing a stronger notion than necessary.
- source_word: κράτει τῆς ἰσχύος
  chosen: the might of his strength
  alternatives:
  - the power of his might
  - the force of his strength
  lexicon: LSJ
  rationale: The doubled power-language is rhetorically emphatic. 'The might of his strength' keeps the fullness of the Greek rather than collapsing the terms.
- source_word: δεδογματισμένων
  chosen: the things decreed
  alternatives:
  - the things ordained
  - the things determined
  lexicon: LSJ
  rationale: The participle denotes what has been authoritatively determined by God. 'Decreed' best reflects that formal force.
- source_word: παρελθῇ
  chosen: shall ever pass away
  alternatives:
  - shall fail
  - shall pass by
  lexicon: BDAG
  rationale: In this context the sense is that none of God's decrees will lapse or go unfulfilled. 'Pass away' preserves biblical cadence.
- source_word: βουλήν
  chosen: purpose
  alternatives:
  - counsel
  - plan
  lexicon: BDAG
  rationale: '''Purpose'' is clear modern English while retaining the sense of deliberate divine intention. ''Counsel'' is possible but more archaic.'
- source_word: στερέωμα
  chosen: firmament
  alternatives:
  - expanse
  - sky
  lexicon: LSJ
  rationale: Because Clement is quoting scriptural language, 'firmament' preserves the recognizable biblical cadence better than the more modern 'expanse.'
- source_word: ἐρεύγεται
  chosen: pours forth
  alternatives:
  - utters
  - bubbles forth
  lexicon: LSJ
  rationale: The vivid metaphor is of speech gushing out. 'Pours forth' captures the abundance and poetic force.
- source_word: λαλιαί
  chosen: utterances
  alternatives:
  - speeches
  - sounds
  lexicon: LSJ
  rationale: Paired with λόγοι, the term suggests articulated expressions. 'Utterances' preserves the poetic parallelism.
theological_decisions:
- issue: Rendering of divine reliability in relation to promises and lying
  chosen_reading: The text is rendered to stress God's moral impossibility of lying, not a limitation of divine power in general.
  alternative_readings:
  - A looser rendering could imply that lying is simply one impossible act among others without moral emphasis.
  rationale: 'The clause ''nothing is impossible with God, except to lie'' is rhetorical and theological: it affirms God''s absolute power while excluding falsehood as contrary to his nature. The English keeps that tension without philosophical over-explanation.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Quotation of Psalm 19 language
  chosen_reading: The citation is rendered in elevated scriptural cadence rather than flattened into contemporary paraphrase.
  alternative_readings:
  - A more contemporary rendering of the psalmic lines
  rationale: Clement intentionally invokes scriptural diction to support his exhortation. Preserving recognizable cadence maintains intertextual and ecclesial force.
  doctrine_reference: Original-language primacy over translation tradition; preserve rhetorical and ecclesial texture.
