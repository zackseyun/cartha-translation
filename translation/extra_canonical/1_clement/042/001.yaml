id: 1CLEM.42.1
reference: 1 Clement 42:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Οἱ ἀπόστολοι ἡμῖν εὐηγγελίσθησαν ἀπὸ τοῦ κυρίου Ἰησοῦ Χριστοῦ, Ἰησοῦς ὁ Χριστὸς ἀπὸ τοῦ θεοῦ ἐξεπέμφθη. ὁ Χριστὸς οὖν ἀπὸ τοῦ θεοῦ καὶ οἱ ἀπόστολοι ἀπὸ τοῦ Χριστοῦ· ἐγένοντο οὖν ἀμφότερα εὐτάκτως ἐκ θελήματος θεοῦ. παραγγελίας οὖν λαβόντες καὶ πληροφορηθέντες διὰ τῆς ἀναστάσεως τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ καὶ πιστωθέντες ἐν τῷ λόγῳ τοῦ θεοῦ, μετὰ πληροφορίας πνεύματος ἁγίου ἐξῆλθον εὐαγγελιζόμενοι, τὴν βασιλείαν τοῦ θεοῦ μέλλειν ἔρχεσθαι. κατὰ χώρας οὖν καὶ πόλεις κηρύσσοντες καθίστανον τὰς ἀπαρχὰς αὐτῶν, δοκιμάσαντες τῷ πνεύματι, εἰς ἐπισκόπους καὶ διακόνους τῶν μελλόντων πιστεύειν. καὶ τοῦτο οὐ καινῶς· ἐκ γὰρ δὴ πολλῶν χρόνων ἐγέγραπτο περὶ ἐπισκόπων καὶ διακόνων. οὕτως γάρ που λέγει ἡ γραφή· Καταστήσω τοὺς ἐπισκόπους αὐτῶν ἐν δικαιοσύνῃ καὶ τοὺς διακόνους αὐτῶν ἐν πίστει.
  language: Greek
  pages: []
  note: This chapter comes from the normalized Funk 1901 OCR layer.
  verse: 1
translation:
  text: The apostles were given the good news for us from the Lord Jesus Messiah, and Jesus the Messiah was sent out from God. So then the Messiah is from God, and the apostles are from the Messiah; therefore both came about in good order from the will of God. Therefore, after receiving instructions, and having been fully assured through the resurrection of our Lord Jesus Messiah, and having been confirmed in the word of God, they went out with the full assurance of the Holy Spirit, proclaiming the good news that the kingdom of God is about to come. So, preaching through regions and cities, they would appoint their firstfruits, after testing them by the Spirit, to be overseers and deacons for those who were going to believe. And this was not something new, for indeed it had been written about overseers and deacons from very ancient times. For somewhere the Scripture says, “I will appoint their overseers in righteousness, and their deacons in faith.”
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: εὐηγγελίσθησαν
  chosen: were given the good news
  alternatives:
  - were evangelized
  - received the gospel
  - were preached to
  lexicon: BDAG
  rationale: Passive form with ἡμῖν indicates the apostles brought a message for the benefit of 'us'; 'were given the good news for us' preserves the gospel language without awkward literalism.
- source_word: Χριστός
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Rendered as the title 'Messiah' in keeping with project policy to translate christological titles where context supports title force rather than a fixed name.
- source_word: ἐξεπέμφθη
  chosen: was sent out
  alternatives:
  - was sent
  - was commissioned
  lexicon: BDAG
  rationale: Keeps the missional force of the verb and the chain of sending from God to Messiah to apostles.
- source_word: εὐτάκτως
  chosen: in good order
  alternatives:
  - orderly
  - properly
  - in due order
  lexicon: BDAG
  rationale: Preserves Clement's emphasis on ordered divine arrangement, important in the chapter's ecclesial argument.
- source_word: παραγγελίας
  chosen: instructions
  alternatives:
  - commands
  - charges
  lexicon: BDAG
  rationale: Conveys authoritative commissioning without sounding overly military; the context is apostolic mandate.
- source_word: πληροφορηθέντες
  chosen: having been fully assured
  alternatives:
  - having been fully convinced
  - having been brought to full certainty
  lexicon: BDAG
  rationale: The verb denotes full certainty; paired with the resurrection it stresses apostolic assurance.
- source_word: πιστωθέντες
  chosen: having been confirmed
  alternatives:
  - having been entrusted
  - having been made confident
  lexicon: BDAG
  rationale: In context with ἐν τῷ λόγῳ τοῦ θεοῦ, the sense is strengthening/establishing in God's word rather than merely being entrusted with it.
- source_word: πληροφορίας
  chosen: full assurance
  alternatives:
  - full conviction
  - full confidence
  lexicon: BDAG
  rationale: Maintains lexical connection with πληροφορηθέντες and preserves the rhetorical fullness of apostolic certainty.
- source_word: μέλλειν ἔρχεσθαι
  chosen: is about to come
  alternatives:
  - was going to come
  - was soon to come
  lexicon: BDAG
  rationale: The construction expresses imminence. 'Is about to come' preserves the eschatological urgency of the proclamation.
- source_word: κατὰ χώρας καὶ πόλεις
  chosen: through regions and cities
  alternatives:
  - in country districts and cities
  - throughout the countryside and cities
  lexicon: BDAG
  rationale: Represents the distributive sense of the phrase while keeping readable cadence.
- source_word: ἀπαρχὰς
  chosen: their firstfruits
  alternatives:
  - the first converts from them
  - first results
  lexicon: BDAG
  rationale: Retains the sacrificial/cultic metaphor rather than flattening it to 'first converts'; the ecclesial texture matters here.
- source_word: δοκιμάσαντες τῷ πνεύματι
  chosen: after testing them by the Spirit
  alternatives:
  - having approved them in the Spirit
  - having tested them spiritually
  lexicon: BDAG
  rationale: Preserves the participial sequence and the role of the Spirit in discerning suitable ministers.
- source_word: ἐπισκόπους
  chosen: overseers
  alternatives:
  - bishops
  lexicon: BDAG
  rationale: '''Overseers'' translates the Greek office term transparently without importing later ecclesiastical structures implied by ''bishops''.'
- source_word: διακόνους
  chosen: deacons
  alternatives:
  - ministers
  - servants
  lexicon: BDAG
  rationale: The term is already an established ecclesial office here; 'deacons' preserves that technical force.
- source_word: οὐ καινῶς
  chosen: was not something new
  alternatives:
  - not newly
  - not a novelty
  lexicon: BDAG
  rationale: Idiomatic English that preserves Clement's claim of continuity with prior Scripture.
- source_word: ἐγέγραπτο
  chosen: it had been written
  alternatives:
  - it stands written
  - it was written
  lexicon: BDAG
  rationale: Pluperfect nuance fits the appeal to longstanding scriptural precedent.
- source_word: ἐν δικαιοσύνῃ
  chosen: in righteousness
  alternatives:
  - with righteousness
  - in justice
  lexicon: BDAG
  rationale: Follows project default for δικαιοσύνη while preserving the scriptural cadence of the citation.
- source_word: ἐν πίστει
  chosen: in faith
  alternatives:
  - in faithfulness
  lexicon: BDAG
  rationale: Main text follows project default 'faith'; the possible nuance of 'faithfulness' is preserved in a footnote.
theological_decisions:
- issue: Ecclesial office terms ἐπισκόπους and διακόνους
  chosen_reading: Translate as 'overseers and deacons'
  alternative_readings:
  - bishops and deacons
  - leaders and servants
  rationale: This preserves the recognizable ministerial offices in Clement's argument while avoiding anachronistically loading ἐπίσκοπος with later monarchical episcopal assumptions.
  doctrine_reference: DOCTRINE.md consistency of key terms; readable modern English
- issue: Christological title Χριστός
  chosen_reading: Use 'Messiah' throughout the chapter
  alternative_readings:
  - Christ
  rationale: The repeated chain of sending functions titually and the project's stated policy prefers translating titles where context supports it.
  doctrine_reference: DOCTRINE.md translate titles; transliterate names
- issue: Eschatological proclamation τὴν βασιλείαν τοῦ θεοῦ μέλλειν ἔρχεσθαι
  chosen_reading: 'Render with imminence: ''the kingdom of God is about to come'''
  alternative_readings:
  - the kingdom of God was going to come
  - the kingdom of God would come
  rationale: Clement presents the apostolic preaching in terms of urgent expectation; the Greek construction naturally carries imminence and should not be flattened.
