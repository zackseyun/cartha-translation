  rationale: 'In Greek indirect discourse, the infinitive retains the tense of the original direct statement (the present infinitive μέλλειν). However, standard English grammar requires backshifting the tense in indirect discourse when the main verb (ἐξῆλθον, ''went out'') is in the past tense. | Azure: The Greek clause depends on the past main verb ἐξῆλθον εὐαγγελιζόμενοι (''they went out proclaiming good news'') and reports the content of that proclamation as τὴν βασιλείαν τοῦ θεοῦ μέλλειν ἔρχεσθαι. '
