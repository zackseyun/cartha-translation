  from: that he showed him
  to: that he had shown him
  rationale: The sequence of pronouns in English ('he offered him... that he showed him') creates slight ambiguity. Translating the aorist ἔδειξεν in this relative clause as a pluperfect ('had shown') relative to the main verb (προσήνεγκεν) helps clarify the timeline and the actors (God having previously shown the mountain to Abraham) without needing to artificially insert 'God' as the subject.
