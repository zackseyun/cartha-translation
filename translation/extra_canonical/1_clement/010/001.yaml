translation:
  text: Abraham, who was called the friend, was found faithful in that he became obedient
    to the words of God. 2 And in obedience he went out from his land and from his
    kindred and from his father’s house, so that, leaving behind a small land and
    a weak kindred and a little house, he might inherit the promises of God. For he
    says to him, 3 “Go out from your land and from your kindred and from your father’s
    house into the land that I will show you; and I will make you into a great nation,
    and I will bless you and magnify your name, and you will be blessed. And I will
    bless those who bless you, and I will curse those who curse you, and in you all
    the tribes of the earth will be blessed.” 4 And again, when he was separated from
    Lot, God said to him, “Lift up your eyes and see from the place where you now
    are, toward the north and the south and the east and the sea, because all the
    land that you see, I will give to you and to your seed forever. 5 And I will make
    your seed like the sand of the earth; if anyone is able to count the sand of the
    earth, your seed also will be counted.” 6 And again he says, “God brought Abraham
    out and said to him, ‘Look up to heaven and count the stars, if you are able to
    count them; so will your seed be.’” And Abraham believed God, and it was counted
    to him for righteousness. 7 Because of faith and hospitality a son was given to
    him in old age, and through obedience he offered him as a sacrifice to God on
    one of the mountains that he showed him.
  philosophy: optimal-equivalence
