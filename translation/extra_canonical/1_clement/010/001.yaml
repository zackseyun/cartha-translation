lexical_decisions:
- source_word: φίλος
  chosen: the friend
  alternatives:
  - friend
  - beloved one
  lexicon: BDAG
  rationale: With the article and participial framing ('who was called the friend'),
    the phrase functions as a recognized designation of Abraham. 'The friend' preserves
    the honorific force and echoes scriptural language about Abraham as God's friend
    without over-expanding the text.
- source_word: πιστός
  chosen: faithful
  alternatives:
  - believing
  - trustworthy
  lexicon: BDAG
  rationale: In context Abraham's quality is demonstrated by obedient response. 'Faithful'
    preserves the moral-relational sense better than the narrower 'believing,' while
    still resonating with the chapter's later emphasis on faith.
- source_word: ὑπήκοον γενέσθαι
  chosen: he became obedient
  alternatives:
  - to become obedient
  - he proved obedient
  lexicon: BDAG
  rationale: This infinitival construction explains how Abraham was found faithful.
    'Became obedient' keeps the verbal aspect and the stress on enacted obedience
    rather than mere disposition.
- source_word: ῥήμασιν
  chosen: words
  alternatives:
  - sayings
  - commands
  lexicon: BDAG
  rationale: The plural refers broadly to God's spoken directives and promises. 'Words'
    is the most transparent rendering and avoids narrowing the sense to commands alone.
- source_word: ὑπακοῇ
  chosen: in obedience
  alternatives:
  - by obedience
  - through obedience
  lexicon: BDAG
  rationale: The dative expresses manner or means. 'In obedience' reads naturally
    in English while preserving the close tie between Abraham's departure and his
    obedient posture.
- source_word: συγγένεια
  chosen: kindred
  alternatives:
  - relatives
  - clan
  lexicon: BDAG
  rationale: '''Kindred'' preserves the familial-corporate texture better than the
    flatter ''relatives'' and fits the elevated cadence of the passage.'
- source_word: ἀσθενῆ
  chosen: weak
  alternatives:
  - feeble
  - insignificant
  lexicon: BDAG
  rationale: The adjective literally denotes weakness. Here it likely underscores
    the unimpressive human base Abraham left behind. 'Weak' keeps the lexical force
    without interpretive overreach.
- source_word: ἐπαγγελίας
  chosen: promises
  alternatives:
  - pledges
  lexicon: BDAG
  rationale: This is standard covenantal language. 'Promises' is both accurate and
    theologically recognizable.
- source_word: μεγαλυνῶ
  chosen: magnify
  alternatives:
  - make great
  - exalt
  lexicon: BDAG
  rationale: The verb means to make great. 'Magnify your name' preserves biblical
    cadence and reflects the elevated register of the citation.
- source_word: φυλαὶ
  chosen: tribes
  alternatives:
  - families
  - peoples
  lexicon: BDAG
  rationale: Although Genesis often has 'families' in some forms, Clement's Greek
    here reads 'tribes.' The translation follows the cited wording rather than harmonizing
    to a familiar English OT form.
- source_word: σπέρμα
  chosen: seed
  alternatives:
  - offspring
  - descendants
  lexicon: BDAG
  rationale: '''Seed'' preserves the singular collective and scriptural resonance.
    Because the Abrahamic promise carries theological weight, the more literal term
    is preferable, even if ''offspring'' would be smoother.'
- source_word: ἕως αἰῶνος
  chosen: forever
  alternatives:
  - for the age
  - unto eternity
  lexicon: BDAG
  rationale: In this promise context the idiomatic force is durative. 'Forever' is
    natural English and preserves the solemn permanence of the grant.
- source_word: ἐλογίσθη αὐτῷ εἰς δικαιοσύνην
  chosen: it was counted to him for righteousness
  alternatives:
  - it was reckoned to him as righteousness
  - it was credited to him for righteousness
  lexicon: BDAG
  rationale: This preserves the familiar theological formulation while remaining directly
    anchored in the Greek. 'Counted' is accessible and sufficiently formal for this
    intertext.
- source_word: φιλοξενίαν
  chosen: hospitality
  alternatives:
  - love of strangers
  - welcome of guests
  lexicon: BDAG
  rationale: The term denotes hospitable reception of others. 'Hospitality' is the
    standard concise rendering and fits Clement's paraenetic emphasis.
- source_word: ἐν γήρᾳ
  chosen: in old age
  alternatives:
  - in his old age
  - when he was old
  lexicon: BDAG
  rationale: The phrase marks the surprising timing of Isaac's birth. 'In old age'
    is idiomatic and preserves the concise force.
- source_word: προσήνεγκεν
  chosen: he offered
  alternatives:
  - he brought
  - he presented
  lexicon: BDAG
  rationale: In sacrificial context 'offered' is the clearest and most theologically
    precise rendering.
theological_decisions:
- issue: Relation of Abraham's faith, obedience, and hospitality
  chosen_reading: 'The translation preserves Clement''s cumulative presentation: Abraham
    is found faithful in obedience; a son is given because of faith and hospitality;
    Isaac is offered through obedience.'
  alternative_readings:
  - A more interpretive rendering could subordinate hospitality to faith or smooth
    the causal language to avoid theological tension.
  rationale: Clement intentionally layers virtues rather than reducing Abraham to
    a single exemplar. The English keeps these links explicit without resolving possible
    tensions with later doctrinal formulations.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of σπέρμα in Abrahamic promise
  chosen_reading: seed
  alternative_readings:
  - offspring
  - descendants
  rationale: The singular collective form is theologically and intertextually significant
    in biblical usage. Retaining 'seed' preserves that resonance and avoids flattening
    the promise language.
  doctrine_reference: Consistency of key terms, or documented exception.
