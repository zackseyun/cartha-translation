  text: Ἀβραὰμ, ὁ φίλος προσαγορευθείς, πιστὸς εὑρέθη ἐν τῷ αὐτὸν ὑπήκοον γενέσθαι
    τοῖς ῥήμασιν τοῦ θεοῦ. 2. οὗτος δὲ ὑπακοῇ ἐξῆλθεν ἐκ τῆς γῆς αὐτοῦ καὶ ἐκ τῆς
    συγγενείας αὐτοῦ καὶ ἐκ τοῦ οἴκου τοῦ πατρὸς αὐτοῦ, ὅπως γῆν ὀλίγην καὶ συγγένειαν
    ἀσθενῆ καὶ οἶκον μικρὸν καταλιπὼν κληρονομήσῃ τὰς ἐπαγγελίας τοῦ θεοῦ. λέγει γὰρ
    αὐτῷ· 3. Ἄπελθε ἐκ τῆς γῆς σου καὶ ἐκ τῆς συγγενείας σου καὶ ἐκ τοῦ οἴκου τοῦ
    πατρός σου εἰς τὴν γῆν, ἣν ἄν σοι δείξω· καὶ ποιήσω σε εἰς ἔθνος μέγα καὶ εὐλογήσω
    σε καὶ μεγαλυνῶ τὸ ὄνομά σου, καὶ ἔσῃ εὐλογημένος· καὶ εὐλογήσω τοὺς εὐλογοῦντάς
    σε καὶ καταράσομαι τοὺς καταρωμένους σε, καὶ εὐλογηθήσονται ἐν σοὶ πᾶσαι αἱ φυλαὶ
    τῆς γῆς. 4. καὶ πάλιν ἐν τῷ διαχωρισθῆναι αὐτὸν ἀπὸ Λὼτ εἶπεν αὐτῷ ὁ θεός· Ἀναβλέψας
    τοῖς ὀφθαλμοῖς σου ἴδε ἀπὸ τοῦ τόπου, οὗ νῦν σὺ εἶ, πρὸς βορρᾶν καὶ λίβα καὶ ἀνατολὰς
    καὶ θάλασσαν, ὅτι πᾶσαν τὴν γῆν, ἣν σὺ ὁρᾷς, σοὶ δώσω αὐτὴν καὶ τῷ σπέρματί σου
    ἕως αἰῶνος. 5. καὶ ποιήσω τὸ σπέρμα σου ὡς τὴν ἄμμον τῆς γῆς· εἰ δύναταί τις ἐξαριθμῆσαι
    τὴν ἄμμον τῆς γῆς, καὶ τὸ σπέρμα σου ἐξαριθμηθήσεται. 6. καὶ πάλιν λέγει· Ἐξήγαγεν
    ὁ θεὸς τὸν Ἀβραὰμ καὶ εἶπεν αὐτῷ· Ἀνάβλεψον εἰς τὸν οὐρανὸν καὶ ἀρίθμησον τοὺς
    ἀστέρας, εἰ δυνήσῃ ἐξαριθμῆσαι αὐτούς· οὕτως ἔσται τὸ σπέρμα σου. ἐπίστευσεν δὲ
    Ἀβραὰμ τῷ θεῷ, καὶ ἐλογίσθη αὐτῷ εἰς δικαιοσύνην. 7. διὰ πίστιν καὶ φιλοξενίαν
    ἐδόθη αὐτῷ υἱὸς ἐν γήρᾳ, καὶ διʼ ὑπακοῆς προσήνεγκεν αὐτὸν θυσίαν τῷ θεῷ πρὸς
    ἓν τῶν ὀρέων ὧν ἔδειξεν αὐτῷ.
