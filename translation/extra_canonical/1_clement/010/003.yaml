source:
  edition: Funk 1901 (normalized OCR)
  text: Ἄπελθε ἐκ τῆς γῆς σου καὶ ἐκ τῆς συγγενείας σου καὶ ἐκ τοῦ οἴκου τοῦ πατρός
    σου εἰς τὴν γῆν, ἣν ἄν σοι δείξω· καὶ ποιήσω σε εἰς ἔθνος μέγα καὶ εὐλογήσω σε
    καὶ μεγαλυνῶ τὸ ὄνομά σου, καὶ ἔσῃ εὐλογημένος· καὶ εὐλογήσω τοὺς εὐλογοῦντάς
    σε καὶ καταράσομαι τοὺς καταρωμένους σε, καὶ εὐλογηθήσονται ἐν σοὶ πᾶσαι αἱ φυλαὶ
    τῆς γῆς.
  language: Greek
translation:
  text: “Depart from your land and from your kindred and from your father’s house
    to the land that I will show you; and I will make you into a great nation, and
    I will bless you and magnify your name, and you will be blessed. And I will bless
    those who bless you, and I will curse those who curse you, and in you all the
    tribes of the earth will be blessed.”
  philosophy: optimal-equivalence
  footnotes:
