id: 1CLEM.17
reference: 1 Clement 17
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Μιμηταὶ γενώμεθα κἀκείνων, οἵτινες ἐν δέρμασιν αἰγείοις καὶ μηλωταῖς περιεπάτησαν
    κηρύσσοντες τὴν ἔλευσιν τοῦ Χριστοῦ· λέγομεν δὲ Ἠλίαν καὶ Ἐλισαιέ, ἔτι δὲ καὶ
    Ἰεζεκιὴλ, τοὺς προφήτας· πρὸς τούτοις καὶ τοὺς μεμαρτυρημένους. 2. ἐμαρτυρήθη
    μεγάλως Ἀβραὰμ καὶ φίλος προσηγορεύθη τοῦ θεοῦ, καὶ λέγει ἀτενίζων εἰς τὴν δόξαν
    τοῦ θεοῦ ταπεινοφρονῶν· Ἐγὼ δέ εἰμι γῆ καὶ σποδός. 3. ἐπὶ δὲ καὶ περὶ Ἰὼβ οὕτως
    γέγραπται· Ἰὼβ δὲ ἦν δίκαιος καὶ ἄμεμπτος, ἀληθινός, θεοσεβής, ἀπεχόμενος ἀπὸ
    παντὸς κακοῦ. 4. ἀλλ’ αὐτὸς ἑαυτοῦ κατηγορεῖ λέγων· Οὐδεὶς καθαρὸς ἀπὸ ῥύπου,
    οὐδ’ ἂν μιᾶς ἡμέρας ἡ ζωὴ αὐτοῦ. 5. Μωσῆς πιστὸς ἐν ὅλῳ τῷ οἴκῳ αὐτοῦ ἐκλήθη,
    καὶ διὰ τῆς ὑπηρεσίας αὐτοῦ ἐκρίνεν ὁ θεὸς Αἴγυπτον διὰ τῶν μαστίγων καὶ τῶν αἰκισμάτων
    αὐτῶν· ἀλλὰ κἀκεῖνος δοξασθεὶς μεγάλως οὐκ ἐμεγαλοφρόνησεν, ἀλλ’ εἶπεν ἐπὶ τῆς
    βάτου χρηματισμοῦ αὐτῷ δεδομένου· Τίς εἰμι ἐγώ, ὅτι με πέμπεις; Ἐγὼ δέ εἰμι ἰσχνόφωνος
    καὶ βραδύγλωσσος. 6. καὶ πάλιν λέγει· Ἐγὼ δέ εἰμι ἀτμὶς ἀπὸ χύτρας.
  language: Greek
  pages:
