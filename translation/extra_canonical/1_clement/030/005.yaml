  from: “Blessed is one born of woman, short-lived. Do not become excessive in words.”
  to: “Blessed is the short-lived one born of woman. Do not be a person of many words.”
  rationale: The phrase 'one born of woman, short-lived' is awkward in English; 'the
    short-lived one born of woman' better captures the Greek substantive phrase `γεννητὸς
    γυναικὸς ὀλιγόβιος`. Additionally, `μὴ πολὺς ἐν ῥήμασιν γίνου` is an idiom meaning
    'do not be a person of many words' or 'do not be abundant in words,' rather than
    'do not become excessive.' The imperative `γίνου` here functions more like 'be'
    than 'become'.
