  text: Ἅγια οὖν μερὶς ὑπάρχοντες ποιήσωμεν τὰ τοῦ ἁγιασμοῦ πάντα, φεύγοντες καταλαλιάς,
    μιαράς τε καὶ ἀνάγνους συμπλοκὰς, μέθας τε καὶ νεωτεροποιΐας καὶ βδελυκτὰς ἐπιθυμίας,
    μυσερὰν μοιχείαν, βδελυκτὴν ὑπερηφανίαν. 2. θεὸς γάρ, φησίν, ὑπερηφάνοις ἀντιτάσσεται,
    ταπεινοῖς δὲ δίδωσιν χάριν. 3. κολληθῶμεν οὖν ἐκείνοις, οἷς ἡ χάρις ἀπὸ τοῦ θεοῦ
    δεδοται· ἐνδυσώμεθα τὴν ὁμόνοιαν ταπεινοφρονοῦντες, ἐγκρατευόμενοι, ἀπὸ παντὸς
    ψιθυρισμοῦ καὶ καταλαλιᾶς πόρρω ἑαυτοὺς ποιοῦντες, ἔργοις δικαιούμενοι καὶ μὴ
    λόγοις. 4. λέγει γάρ· Ὁ ἰὰ πολλὰ λέγων καὶ ἀντακουσεται· ἢ ὁ εὐλάλος οἴεται εἶναι
    δίκαιος; 5. εὐλογημένος γεννητὸς γυναικὸς ὀλιγόβιος. μὴ πολὺς ἐν ῥήμασιν γίνου.
    6. ὁ ἔπαινος ἡμῶν ἔστω ἐν θεῷ καὶ μὴ ἐξ αὐτῶν· αὐτεπανέτους γὰρ μισεῖ ὁ θεός.
    7. ἡ μαρτυρία τῆς ἀγαθῆς πράξεἡμῶν διδόσθω ὑπ’ ἄλλων, καθὼς ἐδόθη τοῖς πατράσιν
    ἡμῶν τοῖς δικαίοις. 8. θράσος καὶ αὐθάδεια καὶ τόλμα τοῖς κατηραμένοις ὑπὸ τοῦ
    θεοῦ· ἐπιείκεια καὶ ταπεινοφροσύνη καὶ πραΰτης παρὰ τοῖς ηὐλογημένοις ὑπὸ τοῦ
    θεοῦ.
