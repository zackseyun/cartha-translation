translation:
  text: 'Therefore, since we are a portion of the Holy One, let us do all the things
    that belong to sanctification, fleeing slander, foul and unclean entanglements,
    drunkenness, seditions, and detestable desires, loathsome adultery, and hateful
    pride.


    For God, he says, opposes the proud, but gives grace to the humble.


    Let us therefore cling to those to whom grace has been given from God. Let us
    clothe ourselves with concord, being humble-minded and self-controlled, keeping
    ourselves far from every whispering and slander, being justified by works and
    not by words.


    For he says, “He who says many things shall also hear in reply.” Or does the ready
    speaker think himself righteous?


    “Blessed is the short-lived one born of woman. Do not become excessive in words.”


    Let our praise be in God and not from ourselves, for God hates those who praise
    themselves.


    Let the testimony of our good conduct be given by others, just as it was given
    to our righteous fathers.


    Boldness and arrogance and recklessness belong to those cursed by God; but gentleness
    and humility and meekness are found among those blessed by God.'
  philosophy: optimal-equivalence
