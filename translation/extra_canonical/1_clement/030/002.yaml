  from: For God, he says, opposes the proud, but gives grace to the humble.
  to: For it says, "God opposes the proud, but gives grace to the humble."
  rationale: 'The verb φησίν here functions impersonally to introduce a scriptural citation of Proverbs 3:34 (cf. BDAG s.v. φημί 1.b.β, which explicitly cites 1 Clem 30:2 for the impersonal ''it says''). Translating it as ''it says'' and adding quotation marks clarifies the citation and avoids the awkwardness of ''he says'' when God is the subject of the quoted text. | Azure: The proposed change is better grounded in the Greek. In θεὸς γάρ, φησίν, ὑπερηφάνοις ἀντιτάσσεται..., φησίν is the common parenthetical citation formula meaning ''it says''/''he says'' with scripture as t'
