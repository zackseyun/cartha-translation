id: 1CLEM.13
reference: 1 Clement 13
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Ταπεινοφρονήσωμεν οὖν, ἀδελφοί, ἀποθέμενοι πᾶσαν ἀλαζονείαν καὶ τύφος καὶ ἀφροσύνην καὶ ὀργάς, καὶ ποιήσωμεν τὸ γεγραμμένον (λέγει γὰρ τὸ πνεῦμα τὸ ἅγιον· Μὴ καυχάσθω ὁ σοφὸς ἐν τῇ σοφίᾳ αὐτοῦ μηδὲ ὁ ἰσχυρὸς ἐν τῇ ἰσχύϊ αὐτοῦ μηδὲ ὁ πλούσιος ἐν τῷ πλούτῳ αὐτοῦ, ἀλλ’ ἢ ὁ καυχώμενος ἐν κυρίῳ καυχάσθω, τοῦ ἐκζητεῖν αὐτὸν καὶ ποιεῖν κρίμα καὶ δικαιοσύνην), μάλιστα μεμνημένοι τῶν λόγων τοῦ κυρίου Ἰησοῦ, οὓς ἐλάλησεν διδάσκων ἐπιείκειαν καὶ μακροθυμίαν. 2. οὕτως γὰρ εἶπεν· Ἐλεεῖτε, ἵνα ἐλεηθῆτε· ἀφίετε, ἵνα ἀφεθῇ ὑμῖν· ὡς ποιεῖτε, οὕτω ποιηθήσεται ὑμῖν· ὡς δίδοτε, οὕτως δοθήσεται ὑμῖν· ὡς κρίνετε, οὕτως κριθήσεσθε· ὡς χρηστεύεσθε, οὕτως χρηστευθήσεται ὑμῖν· ᾧ μέτρῳ μετρεῖτε, ἐν αὐτῷ μετρηθήσεται ὑμῖν. 3. ταύτῃ τῇ ἐντολῇ καὶ τοῖς παραγγέλμασι τούτοις στηρίξωμεν ἑαυτοὺς εἰς τὸ πορεύεσθαι ὑπηκόους ὄντας τοῖς ἁγιοπρεπέσι λόγοις αὐτοῦ, ταπεινοφρονοῦντες· φησὶν γὰρ ὁ ἅγιος λόγος· . Ἐπὶ τίνα ἐπιβλέψω, ἀλλ’ ἢ ἐπὶ τὸν πρᾶον καὶ ἡσύχιον καὶ τρέμοντά μου τὰ λόγια.
  language: Greek
