  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: 'Let us therefore be humble, brothers, laying aside all arrogance and conceit and foolishness and fits of anger, and let us do what is written—for the Holy Spirit says: “Let not the wise man boast in his wisdom, nor the strong in his strength, nor the rich in his riches, but let the one who boasts boast in the Lord, to seek him and to do judgment and righteousness”—especially remembering the words of the Lord Jesus, which he spoke while teaching gentleness and patience. 2 For thus he said: “Show mercy, so that you may receive mercy. Forgive, so that it may be forgiven you. As you do, so it will be done to you. As you give, so it will be given to you. As you judge, so you will be judged. As you show kindness, so kindness will be shown to you. With the measure by which you measure, it will be measured to you.” 3 By this command and these charges let us strengthen ourselves so as to walk in obedience to his words befitting holiness, being humble-minded. For the holy word says: “Upon
    whom shall I look, except upon the gentle and quiet one, and the one who trembles at my words?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The citation combines wording known from Jeremiah 9:23–24 (LXX numbering differs) with the call to do judgment and righteousness.
    reason: cross_reference
  - marker: b
    text: The sayings in verse 2 echo material known from the Gospel tradition, especially forms similar to Matthew 5:7; 6:14; 7:2 and Luke 6:31, 36–38.
    reason: cross_reference
  - marker: c
    text: '''Holy and fitting words'' renders ἁγιοπρεπέσι λόγοις, literally words befitting holiness or sacred propriety.'
    reason: lexical_alternative
  - marker: d
    text: The final citation echoes Isaiah 66:2, with 'gentle and quiet' reflecting Clement's wording here.
    reason: cross_reference
  - marker: e
    text: Or 'boast in the Lord,” to seek him and to do judgment and righteousness—'.
    reason: previous_rendering
  - marker: f
    text: Or 'holy and fitting words'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ταπεινοφρονήσωμεν
  chosen: Let us therefore be humble
  alternatives:
  - let us be humble-minded
  - let us think humbly
  lexicon: LSJ; BDAG
  rationale: The verb carries the sense of adopting a lowly or humble mindset. 'Be humble' is idiomatic English while preserving the paraenetic force; the related adjective later is rendered 'humble-minded' to retain lexical connection.
- source_word: ἀλαζονείαν
  chosen: arrogance
  alternatives:
  - boastfulness
  - pretension
  lexicon: LSJ; BDAG
  rationale: Conveys self-exalting pride in a moral register suitable to the vice list.
- source_word: τύφος
  chosen: conceit
  alternatives:
  - vanity
  - puffed-up pride
  lexicon: LSJ; BDAG
  rationale: Distinguishes this term from ἀλαζονεία by emphasizing inflated self-importance rather than outward bragging.
- source_word: ἀφροσύνην
  chosen: foolishness
  alternatives:
  - folly
  lexicon: LSJ; BDAG
  rationale: Straightforward rendering that preserves the ethical sense of senseless behavior.
- source_word: ὀργάς
  chosen: fits of anger
  alternatives:
  - wraths
  - outbursts of anger
  - anger
  lexicon: LSJ; BDAG
  rationale: Plural noun suggests repeated or eruptive instances rather than anger in the abstract.
- source_word: τὸ γεγραμμένον
  chosen: what is written
  alternatives:
  - the scripture
  - the written word
  lexicon: LSJ; BDAG
  rationale: Keeps the formula broad and close to the Greek without over-specifying canon terminology.
- source_word: καυχάσθω
  chosen: boast
  alternatives:
  - glory
  lexicon: LSJ; BDAG
  rationale: '''Boast'' is the plain sense and matches the scriptural citation naturally in modern English.'
- source_word: ἐκζητεῖν
  chosen: to seek him
  alternatives:
  - to seek out him
  - to seek after him diligently
  lexicon: LSJ; BDAG
  rationale: The infinitive likely depends on the boast-in-the-Lord citation as in Jeremiah tradition. 'Seek him' is concise; the intensified force of ἐκ- is not pressed into awkward English.
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - justice
  lexicon: LSJ; BDAG
  rationale: Retains the scriptural cadence of the citation. 'Justice' is possible, but paired with δικαιοσύνη 'judgment and righteousness' better reflects the Greek wording and biblical idiom.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ; BDAG
  rationale: Follows project default for δικαιοσύνη and preserves the familiar biblical pairing with κρίμα.
- source_word: ἐπιείκειαν
  chosen: gentleness
  alternatives:
  - forbearance
  - kindness
  lexicon: LSJ; BDAG
  rationale: Captures the mild, yielding quality Jesus is said to teach here.
- source_word: μακροθυμίαν
  chosen: patience
  alternatives:
  - longsuffering
  - forbearance
  lexicon: LSJ; BDAG
  rationale: Readable modern English that preserves the ethical sense of enduring restraint.
- source_word: Ἐλεεῖτε
  chosen: Show mercy
  alternatives:
  - Be merciful
  - Have mercy
  lexicon: LSJ; BDAG
  rationale: Imperatival present is rendered as an exhortation to merciful action; 'show mercy' reads naturally in the reciprocal sayings.
- source_word: ἀφίετε
  chosen: Forgive
  alternatives:
  - Release
  - Pardon
  lexicon: LSJ; BDAG
  rationale: In this ethical context the sense is interpersonal forgiveness, not merely release.
- source_word: χρηστεύεσθε
  chosen: show kindness
  alternatives:
  - act kindly
  - be kind
  lexicon: LSJ; BDAG
  rationale: Verb denotes acting benevolently; 'show kindness' preserves the active reciprocal pattern of the sayings.
- source_word: παραγγέλμασι
  chosen: charges
  alternatives:
  - instructions
  - commands
  lexicon: LSJ; BDAG
  rationale: Distinguishes the plural from the singular ἐντολή just before it while retaining authoritative force.
- source_word: στηρίξωμεν ἑαυτούς
  chosen: let us strengthen ourselves
  alternatives:
  - let us establish ourselves
  - let us fix ourselves firmly
  lexicon: LSJ; BDAG
  rationale: Reflects the exhortation to become firmly grounded by these teachings.
- source_word: ὑπηκόους ὄντας
  chosen: to walk in obedience
  alternatives:
  - being obedient
  - as obedient ones
  lexicon: LSJ; BDAG
  rationale: Reshaped slightly for natural English with the infinitive of purpose πορεύεσθαι, while preserving the call to obedient conduct.
- source_word: ἁγιοπρεπέσι λόγοις
  chosen: holy and fitting words
  alternatives:
  - holy words
  - words worthy of holiness
  - reverent words
  lexicon: LSJ; BDAG
  rationale: ἁγιοπρεπής means befitting holiness or sacred decorum. Rendering both elements avoids flattening the adjective into merely 'holy.'
- source_word: ταπεινοφρονοῦντες
  chosen: being humble-minded
  alternatives:
  - thinking humbly
  - being humble
  lexicon: LSJ; BDAG
  rationale: Keeps explicit connection with the opening exhortation and preserves the inward disposition emphasized by the participle.
- source_word: πρᾶον
  chosen: gentle
  alternatives:
  - meek
  lexicon: LSJ; BDAG
  rationale: Readable modern equivalent that still carries moral softness without archaic overtones.
- source_word: ἡσύχιον
  chosen: quiet
  alternatives:
  - still
  - peaceable
  lexicon: LSJ; BDAG
  rationale: Preserves the calm, non-contentious sense of the adjective in the prophetic citation.
- source_word: τρέμοντά μου τὰ λόγια
  chosen: the one who trembles at my words
  alternatives:
  - the one trembling at my words
  lexicon: LSJ; BDAG
  rationale: Idiomatic English for reverent fear before God's utterance, echoing Isaiah 66:2.
theological_decisions:
- issue: Rendering of κύριος in the scriptural citation and in 'the Lord Jesus'
  chosen_reading: Lord
  alternative_readings:
  - the LORD in the prophetic citation
  rationale: The chapter uses κύριος both in a scriptural citation and for Jesus. 'Lord' preserves lexical consistency and avoids importing small-caps conventions not marked in the Greek source, while still allowing readers to hear the scriptural resonance.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering of δικαιοσύνη in the Jeremiah-like citation
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Project default favors 'righteousness.' Because κρίμα is also present, rendering δικαιοσύνη as 'righteousness' preserves the traditional semantic tension rather than collapsing both terms into justice-language.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness'
- issue: Gendered address ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The Greek is grammatically masculine and reflects an ecclesial address formula. Per project philosophy, the translation remains gender-accurate rather than neutralized; inclusivity can be noted later if needed in annotation.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
