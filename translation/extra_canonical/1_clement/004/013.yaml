  from: incurred envy not only from the foreigners
  to: was envied not only by the foreigners
  rationale: 'The phrase ''φθόνον ἔσχεν ὑπό'' is a standard idiom meaning ''to be envied by'' (BDAG s.v. φθόνος). Translating it as ''was envied by'' is more natural in English and allows for a consistent translation of the preposition ''ὑπό'' as ''by'' in both parallel clauses (''by the foreigners... by Saul''), whereas the draft awkwardly shifts to ''from'' for the first clause. | Azure: The proposed change is closer to the Greek. In διὰ ζῆλος Δαυὶδ φθόνον ἔσχεν … ὑπὸ τῶν ἀλλοφύλων, the idiom φθόνον ἔχειν ὑπό τινος means to be the object of envy from someone, i.e. “to be envied by.” T'
