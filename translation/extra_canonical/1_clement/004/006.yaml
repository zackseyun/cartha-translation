  from: Let us go through into the field.
  to: Let us go out into the field.
  rationale: 'While διέρχομαι often means ''go through'', BDAG explicitly categorizes its use here (and in the LXX of Gen 4:8 which Clement is quoting) under the sense ''to go from one place to another, go over, go out''. Translating it as ''go through'' implies traversing the field to reach another destination, which misrepresents the narrative intent. | Azure: The proposed change is closer to the Greek and to the LXX wording Clement is reproducing from Gen 4:8. Here Διέλθωμεν εἰς τὸ πεδίον is not naturally ''go through into the field,'' since διέρχομαι with ε'
