lexical_decisions:
- source_word: θυσίαν
  chosen: offering
  alternatives:
  - sacrifice
  lexicon: LSJ
  rationale: In the Genesis citation, θυσία can mean sacrifice, but 'offering' better
    fits the broader act of presentation from produce while remaining faithful to
    the cultic sense.
- source_word: πρωτοτόκων
  chosen: firstborn
  alternatives:
  - firstlings
  lexicon: LSJ
  rationale: '''Firstborn'' is clear modern English and preserves the sacrificial
    priority of Abel''s gift.'
- source_word: στεάτων
  chosen: fat portions
  alternatives:
  - fat things
  - fat
  lexicon: LSJ
  rationale: This reflects the sacrificial portions specifically, with natural English
    phrasing.
- source_word: δώροις
  chosen: gifts
  alternatives:
  - offerings
  lexicon: LSJ
  rationale: The text varies terms between Abel's gifts and Cain's sacrifices; preserving
    the distinction maintains the rhetorical texture of the citation.
- source_word: οὐ προσέσχεν
  chosen: did not pay attention
  alternatives:
  - did not regard
  - did not look upon
  lexicon: LSJ
  rationale: The verb means to turn one's attention toward or regard. 'Did not pay
    attention' is idiomatic and preserves the sense of divine non-regard without overinterpreting.
- source_word: ἐλυπήθη ... λίαν
  chosen: was greatly grieved
  alternatives:
  - was very distressed
  - was exceedingly upset
  lexicon: LSJ
  rationale: Keeps the emotional weight of λύπη and the intensifier λίαν in elevated
    but readable English.
- source_word: συνέπεσεν τῷ προσώπῳ
  chosen: his face fell
  alternatives:
  - his countenance fell
  lexicon: LSJ
  rationale: This is the natural English equivalent of the idiom and preserves the
    scriptural cadence.
- source_word: ὀρθῶς προσενέγκῃς
  chosen: offer rightly
  alternatives:
  - bring rightly
  - present rightly
  lexicon: LSJ
  rationale: Retains the moral and cultic force of ὀρθῶς with a concise English rendering.
- source_word: μὴ διέλῃς
  chosen: do not divide rightly
  alternatives:
  - do not apportion rightly
  - do not distinguish rightly
  lexicon: LSJ
  rationale: The clause is difficult and echoes the LXX wording. 'Divide rightly'
    preserves the formal ambiguity rather than resolving it interpretively.
- source_word: ἡσύχασον
  chosen: Be still
  alternatives:
  - Be quiet
  - Be calm
  lexicon: LSJ
  rationale: A brief imperative that preserves the terse force of the Greek.
- source_word: ἀποστροφὴ
  chosen: turning
  alternatives:
  - turning back
  - inclination
  - desire
  lexicon: LSJ
  rationale: The phrase is notoriously difficult; 'turning' is a restrained rendering
    that keeps the relational orientation without importing later interpretive tradition.
- source_word: ἄρξεις
  chosen: you shall rule
  alternatives:
  - you will master
  - you shall govern
  lexicon: LSJ
  rationale: '''Rule'' is the standard and sufficiently broad rendering for the future
    of ἄρχω here.'
- source_word: ζῆλος
  chosen: jealousy
  alternatives:
  - zeal
  - envy
  lexicon: BDAG
  rationale: In this chapter the vice sense is dominant, as shown by the examples
    and by pairing with φθόνος. 'Jealousy' best carries the destructive interpersonal
    force.
- source_word: φθόνος
  chosen: envy
  alternatives:
  - jealousy
  lexicon: BDAG
  rationale: Rendering φθόνος as 'envy' alongside ζῆλος as 'jealousy' preserves the
    rhetorical pairing without collapsing the two terms into one English word.
- source_word: ἀδελφοκτονίαν
  chosen: brother-murder
  alternatives:
  - fratricide
  - the murder of a brother
  lexicon: LSJ
  rationale: '''Brother-murder'' is transparent and forceful, preserving the compound''s
    stark moral weight without resorting to a Latinate term.'
- source_word: ἀπὸ προσώπου
  chosen: from the face of
  alternatives:
  - from before
  - from
  lexicon: LSJ
  rationale: This Hebraic expression is preserved in several places to maintain scriptural
    cadence and intertextual texture.
- source_word: ὁμοφύλου
  chosen: fellow tribesman
  alternatives:
  - kinsman
  - one of his own people
  lexicon: LSJ
  rationale: The word denotes one of the same stock or people. 'Fellow tribesman'
    preserves the ethnic-kinship nuance in a biblical register.
- source_word: ηὐλίσθησαν
  chosen: lodged
  alternatives:
  - encamped
  - dwelt
  lexicon: LSJ
  rationale: The passive here refers to their being made to stay outside the camp;
    'lodged' is concise and natural.
- source_word: ᾅδου
  chosen: Hades
  alternatives:
  - the grave
  - the underworld
  lexicon: BDAG
  rationale: The Greek names the realm of the dead. 'Hades' preserves the term directly
    and avoids flattening it into a less precise equivalent.
- source_word: θεράποντα
  chosen: attendant
  alternatives:
  - servant
  - minister
  lexicon: LSJ
  rationale: θεράπων is more dignified and specific than ordinary servant language;
    'attendant' preserves the honorific nuance in relation to God.
- source_word: ἀλλοφύλων
  chosen: foreigners
  alternatives:
  - Philistines
  - those of another race
  lexicon: LSJ
  rationale: The Greek is broader than a proper ethnic name here; 'foreigners' preserves
    the generic sense of outsiders.
theological_decisions:
- issue: Difficult Genesis 4 citation in v. 4 ('οὐκ ἐὰν ὀρθῶς προσενέγκῃς, ὀρθῶς δὲ
    μὴ διέλῃς, ἥμαρτες;')
  chosen_reading: Rendered formally as 'If you offer rightly, but do not divide rightly,
    have you not sinned?'
  alternative_readings:
  - If you offered correctly but did not distribute correctly, did you not sin?
  - If you brought it rightly but did not distinguish rightly, you sinned.
  rationale: The Greek is textually and interpretively difficult, reflecting the LXX
    form of Genesis 4:7. A more formal rendering preserves the ambiguity for audit
    rather than resolving it into a paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Vice terminology ζῆλος and φθόνος
  chosen_reading: Rendered as 'jealousy and envy'
  alternative_readings:
  - envy and jealousy
  - zeal and envy
  rationale: In context both terms are negative, and the chapter's paraenetic force
    depends on naming destructive rivalry. Distinguishing the two in English preserves
    the rhetorical accumulation.
  doctrine_reference: Consistency of key terms, or documented exception.
- issue: ᾅδης in v. 12
  chosen_reading: Rendered as 'Hades'
  alternative_readings:
  - the grave
  - the underworld
  rationale: The Greek term refers to the realm of the dead, not merely burial. Transliteration
    preserves the conceptual world of the text without overexplaining in the main
    line.
  doctrine_reference: Original-language primacy over translation tradition.
