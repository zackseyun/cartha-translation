lexical_decisions:
- source_word: δημιουργός
  chosen: Maker
  alternatives:
  - Creator
  - craftsman
  lexicon: LSJ
  rationale: '''Maker'' preserves the elevated, doxological tone and the sense of
    one who brings all things into being, while sounding less technical than ''Creator''
    in this rhetorical question.'
- source_word: ἀνάστασιν ποιήσεται
  chosen: will bring about the resurrection
  alternatives:
  - will make a resurrection
  - will accomplish resurrection
  lexicon: LSJ
  rationale: The idiom combines ἀνάστασις with ποιέω; 'bring about the resurrection'
    is natural English while preserving the causative force.
- source_word: ὁσίως
  chosen: in holiness
  alternatives:
  - piously
  - devoutly
  - in a holy manner
  lexicon: LSJ
  rationale: This keeps the cultic-ethical sense of reverent holiness without reducing
    it to mere inward devotion.
- source_word: δουλευσάντων
  chosen: have served
  alternatives:
  - have been slaves to
  - have rendered service to
  lexicon: LSJ
  rationale: Although the verb is related to bonded service, here the emphasis is
    faithful service to God rather than social status; 'served' fits the ecclesial
    paraenetic context.
- source_word: ἐν πεποιθήσει πίστεως ἀγαθῆς
  chosen: in the confidence of good faith
  alternatives:
  - with the assurance of good faith
  - in confident good faith
  lexicon: LSJ
  rationale: Retains both πεποίθησις ('confidence/assurance') and πίστις ('faith'),
    preserving the layered expression rather than collapsing it into a single English
    term.
- source_word: δι᾿ ὀρνέου
  chosen: through a bird
  alternatives:
  - by means of a bird
  - through the bird
  lexicon: LSJ
  rationale: The Greek is indefinite here. 'Through a bird' preserves Clement's allusion
    to the phoenix tradition without over-specifying in the main text.
- source_word: τὸ μεγαλεῖον
  chosen: the greatness
  alternatives:
  - the majesty
  - the magnificence
  lexicon: LSJ
  rationale: '''Greatness'' is straightforward and fits the context of the magnitude
    of God''s promised act.'
- source_word: ἐπαγγελίας
  chosen: promise
  alternatives:
  - pledge
  lexicon: LSJ
  rationale: Standard rendering that preserves covenantal-theological resonance.
- source_word: ἐξομολογήσομαί
  chosen: I will give thanks
  alternatives:
  - I will confess
  - I will praise openly
  lexicon: LSJ
  rationale: In scriptural citation this verb often carries the sense of thankful
    praise to God; 'give thanks' best fits the context.
- source_word: ἐξηγέρθην
  chosen: I awoke
  alternatives:
  - I was raised up
  - I arose
  lexicon: LSJ
  rationale: In the Psalm citation the immediate image is waking from sleep, which
    supports Clement's resurrection analogy.
- source_word: σάρκα
  chosen: flesh
  alternatives:
  - body
  lexicon: LSJ
  rationale: Following project guidance, σάρξ is rendered 'flesh' in literal contexts.
    This preserves the concreteness of bodily resurrection.
- source_word: ἀναντλήσασαν
  chosen: has endured
  alternatives:
  - has borne
  - has drawn up
  - has suffered through
  lexicon: LSJ
  rationale: The rare participle here refers to undergoing or bearing up under afflictions;
    'has endured' gives clear sense in context without overinterpreting.
theological_decisions:
- issue: Resurrection language in relation to divine agency
  chosen_reading: will bring about the resurrection
  alternative_readings:
  - will make a resurrection
  - will raise up
  rationale: This wording preserves both the future certainty and God's active agency
    in resurrection, while remaining idiomatic English.
  doctrine_reference: DOCTRINE.md Translation philosophy 1, 5
- issue: Reference to the phoenix tradition in δι᾿ ὀρνέου
  chosen_reading: through a bird
  alternative_readings:
  - through the phoenix
  - by means of a bird
  rationale: The Greek text itself says only 'through a bird.' Because the referent
    is contextually known from the surrounding discussion but not named here, the
    main text stays with the Greek wording and leaves identification to a note.
  doctrine_reference: DOCTRINE.md Translation philosophy 1, 3
- issue: σάρξ in Job citation
  chosen_reading: flesh
  alternative_readings:
  - body
  rationale: The chapter argues for bodily resurrection. 'Flesh' preserves the material,
    embodied emphasis and aligns with the project's default handling of σάρξ in literal
    contexts.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
