  text: Μέγα καὶ θαυμαστὸν οὖν νομίζομεν εἶναι, εἰ ὁ δημιουργὸς τῶν ἁπάντων ἀνάστασιν
    ποιήσεται τῶν ὁσίως αὐτῷ δουλευσάντων ἐν πεποιθήσει πίστεως ἀγαθῆς, ὅπου καὶ δι᾿
