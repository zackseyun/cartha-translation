  source_review: state/reviews/gemini/phase9_greek/extra_canonical/1_clement/017/001.job-70937.json
  category: lexical
  tier: 3
  from: Messiah
  to: Christ
  rationale: 'While ''Messiah'' fits the Old Testament prophetic context conceptually, the Greek is τοῦ Χριστοῦ. By 96 CE in Rome and Corinth, ''Christ'' functioned as the established title/name, and translating it as ''Messiah'' slightly over-translates the etymology for this Gentile-facing audience. | Azure: The Greek text explicitly reads τὴν ἔλευσιν τοῦ Χριστοῦ, and the most direct formal equivalent is "the coming of Christ," not "the coming of the Messiah." Although Χριστός is etymologically equivalent'
