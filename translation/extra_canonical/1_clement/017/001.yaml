  text: Μιμηταὶ γενώμεθα κἀκείνων, οἵτινες ἐν δέρμασιν αἰγείοις καὶ μηλωταῖς περιεπάτησαν κηρύσσοντες τὴν ἔλευσιν τοῦ Χριστοῦ· λέγομεν δὲ Ἠλίαν καὶ Ἐλισαιέ, ἔτι δὲ καὶ Ἰεζεκιὴλ, τοὺς προφήτας· πρὸς τούτοις καὶ τοὺς μεμαρτυρημένους.
