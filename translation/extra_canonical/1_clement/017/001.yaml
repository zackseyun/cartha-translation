  from: those who have received testimony
  to: those who have been commended
  rationale: 'The passive participle μεμαρτυρημένους (from μαρτυρέω) in this context (echoing Hebrews 11) carries the specific lexical sense of being ''well spoken of,'' ''approved,'' or ''commended'' (BDAG 2.b.α). ''Received testimony'' is a wooden calque that obscures the positive force of this divine approval. (Note: For consistency, 17:2 ''ἐμαρτυρήθη μεγάλως'' should similarly be rendered ''was greatly commended''). | Azure: The proposed change is closer to the Greek. τοὺς μεμαρτυρημένους is the perfect passive participle of μαρτυρέω, and in this context it does not mean merely that testimony was somehow received, but tha'
- timestamp: '2026-04-22T08:22:57Z'
