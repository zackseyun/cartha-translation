source:
  edition: Funk 1901 (normalized OCR)
  text: Μωσῆς πιστὸς ἐν ὅλῳ τῷ οἴκῳ αὐτοῦ ἐκλήθη, καὶ διὰ τῆς ὑπηρεσίας αὐτοῦ ἐκρίνεν
    ὁ θεὸς Αἴγυπτον διὰ τῶν μαστίγων καὶ τῶν αἰκισμάτων αὐτῶν· ἀλλὰ κἀκεῖνος δοξασθεὶς
    μεγάλως οὐκ ἐμεγαλοφρόνησεν, ἀλλ’ εἶπεν ἐπὶ τῆς βάτου χρηματισμοῦ αὐτῷ δεδομένου·
    Τίς εἰμι ἐγώ, ὅτι με πέμπεις; Ἐγὼ δέ εἰμι ἰσχνόφωνος καὶ βραδύγλωσσος.
  language: Greek
translation:
  text: Moses was called faithful in all his house, and through his service God judged
    Egypt through their plagues and torments; yet even he, though greatly glorified,
    did not become arrogant, but said, when a divine message was given to him at the
    bush, “Who am I, that you send me? For I am weak-voiced and slow of tongue.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
