  rationale: 'Azure-modified: The rationale is correct that τάξει is a dative of manner meaning "in order" and not the conjunction "in order that"; the current English wrongly suggests a purpose clause that the Greek does not have. The clause πάντα τάξει ποιεῖν ὀφείλομεν, ὅσα ... ἐκέλευσεν means "we ought to do everything in order, whatever things the Master commanded." However, the proposed rewrite "in order everything" is not idiomatic enough in English and risks sounding malformed. A refined wording that keeps "in order" '
