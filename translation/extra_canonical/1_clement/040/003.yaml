  from: so that, with all things being done in holiness, they might be acceptable with approval to his will.
  to: so that all things, being done in holiness and according to his good pleasure, might be acceptable to his will.
  rationale: The draft treats `πάντα γινόμενα` as an absolute phrase ('with all things being done') and supplies 'they' as the subject of `εἴη`. However, `πάντα` is the nominative subject of the verb `εἴη` (a neuter plural subject taking a singular verb). Additionally, rendering `ἐν εὐδοκήσει` as 'with approval' modifying 'acceptable' creates an awkward redundancy; it is better taken with `γινόμενα` (parallel to `ὁσίως`) to mean 'being done in holiness and according to his good pleasure'.
