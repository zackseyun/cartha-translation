source:
  edition: Funk 1901 (normalized OCR)
  text: ποῦ τε καὶ διὰ τίνων ἐπιτελεῖσθαι θέλει, αὐτὸς ὥρισεν τῇ ὑπερτάτῃ αὐτοῦ βουλήσει, ἵνʼ ὁσίως πάντα γινόμενα ἐν εὐδοκήσει εὐπρόσδεκτα εἴη τῷ θελήματι αὐτοῦ.
  language: Greek
translation:
  text: And where and through whom he wants them to be performed, he himself determined by his supreme will, so that all things, being done in holiness and according to his good pleasure, might be acceptable to his will.
