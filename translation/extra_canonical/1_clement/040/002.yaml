  rationale: 'Azure-modified: The rationale is substantially correct: εἰκῇ does mean ''at random, without plan, haphazardly,'' so ''casually'' weakens the contrast with ὡρισμένοις καιροῖς καὶ ὥραις (''appointed/fixed times and hours''). Also, ἀτάκτως is the adverb from ἄτακτος and in this context means ''without order'' rather than the awkward English ''disorderly'' after ''happen.'' The proposed correction improves fidelity, especially by replacing ''happen'' with ''take place.'' I modify only because ''irregularly'' is somewhat narrower and'
