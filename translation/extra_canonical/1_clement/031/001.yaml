translation:
  text: Let us therefore cling to his blessing, and let us see what the ways of blessing
    are. Let us unfold the things that have happened from the beginning. For what
    reason was our father Abraham blessed? Was it not because he practiced righteousness
    and truth through faith? Isaac, knowing what was to come with confidence, gladly
    allowed himself to be led as a sacrifice. Jacob, with humility, departed from
    his land because of his brother and went to Laban and served, and to him was given
    the twelve-sceptered people of Israel.
  philosophy: optimal-equivalence
