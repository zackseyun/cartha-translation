lexical_decisions:
- source_word: Κολληθῶμεν
  chosen: Let us ... cling
  alternatives:
  - join ourselves to
  - cleave to
  lexicon: BDAG
  rationale: The hortatory subjunctive calls for an exhortational rendering. 'Cling'
    preserves the strong sense of attachment without archaic tone; 'cleave' is possible
    but sounds dated.
- source_word: εὐλογίᾳ
  chosen: blessing
  alternatives:
  - blessedness
  - benediction
  lexicon: BDAG
  rationale: '''Blessing'' best fits both God''s bestowed favor and the ensuing discussion
    of the patriarchs as recipients of divine blessing.'
- source_word: ὁδοὶ τῆς εὐλογίας
  chosen: the ways of blessing
  alternatives:
  - the paths of blessing
  - the ways that lead to blessing
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the rhetorical texture. It can
    denote the manner or course by which blessing is manifested or obtained.
- source_word: ἀνατυλίξωμεν
  chosen: Let us unfold
  alternatives:
  - let us review
  - let us unroll
  lexicon: LSJ
  rationale: Literally evokes unrolling or unfolding, likely of a scroll or narrative.
    'Unfold' preserves the metaphor and literary cadence better than the flatter 'review'.
- source_word: τὰ ἀπ’ ἀρχῆς γενόμενα
  chosen: the things that have happened from the beginning
  alternatives:
  - the events from the beginning
  - what came to pass from the beginning
  lexicon: BDAG
  rationale: This keeps the retrospective, salvation-historical force without becoming
    wooden.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: In this patriarchal commendation, moral uprightness before God is primary.
    'Justice' is possible but narrower here.
- source_word: ἀλήθειαν
  chosen: truth
  alternatives:
  - faithfulness
  - integrity
  lexicon: BDAG
  rationale: The term can shade toward reliability or integrity, but 'truth' preserves
    the lexical form and pairs naturally with 'righteousness' in a traditional ethical
    collocation.
- source_word: διὰ πίστεως
  chosen: through faith
  alternatives:
  - by faith
  - through faithfulness
  lexicon: BDAG
  rationale: Given the project's default and the likely instrumental sense, 'through
    faith' is preferred. 'By faith' is close, but 'through' better mirrors διά.
- source_word: ποιήσας
  chosen: he practiced
  alternatives:
  - having done
  - having worked
  lexicon: BDAG
  rationale: A wooden 'having done righteousness and truth' is awkward in English.
    'Practiced' conveys enacted moral conduct while remaining anchored to the Greek
    participle.
- source_word: μετὰ πεποιθήσεως
  chosen: with confidence
  alternatives:
  - with assurance
  - trustingly
  lexicon: BDAG
  rationale: This phrase expresses settled confidence or assurance. 'With confidence'
    is concise and natural.
- source_word: γινώσκων τὸ μέλλον
  chosen: knowing what was to come
  alternatives:
  - knowing the future
  - foreknowing what was coming
  lexicon: BDAG
  rationale: This preserves the forward-looking sense without overstating technical
    foreknowledge.
- source_word: ἡδέως
  chosen: gladly
  alternatives:
  - willingly
  - with pleasure
  lexicon: BDAG
  rationale: The adverb conveys ready, cheerful willingness. 'Gladly' captures the
    affective tone.
- source_word: προσήγετο θυσία
  chosen: allowed himself to be led as a sacrifice
  alternatives:
  - was being offered as a sacrifice
  - approached the sacrifice
  lexicon: BDAG
  rationale: The middle/passive nuance and the Isaac context suggest not that Isaac
    himself offered, but that he submitted to being brought forward sacrificially.
    This rendering makes the sense explicit in idiomatic English.
- source_word: ταπεινοφροσύνης
  chosen: humility
  alternatives:
  - lowliness
  - humble-mindedness
  lexicon: BDAG
  rationale: '''Humility'' is the clearest modern equivalent and preserves the paraenetic
    virtue term.'
- source_word: ἐξεχώρησεν
  chosen: departed
  alternatives:
  - withdrew
  - went away
  lexicon: LSJ
  rationale: A simple narrative verb is best here; 'departed' retains dignity and
    cadence.
- source_word: δι’ ἀδελφόν
  chosen: because of his brother
  alternatives:
  - on account of his brother
  - for his brother's sake
  lexicon: BDAG
  rationale: The context is Jacob's departure due to conflict involving Esau. 'Because
    of' is the most straightforward causal rendering.
- source_word: ἐδούλευσεν
  chosen: served
  alternatives:
  - was a slave
  - labored as a servant
  lexicon: BDAG
  rationale: Although the verb can denote slavery, here Jacob's service to Laban is
    best rendered 'served' in context; 'was a slave' would over-specify the social
    relation.
- source_word: δωδεκάσκηπτρον
  chosen: the twelve-sceptered people
  alternatives:
  - the twelve tribes
  - the twelve-sceptered Israel
  lexicon: LSJ
  rationale: The compound literally evokes twelve scepters/rulers. Rather than flattening
    to 'twelve tribes,' this rendering preserves the vivid metaphor while making sense
    in English.
theological_decisions:
- issue: Abraham's blessing described as resulting from 'practicing righteousness
    and truth through faith'
  chosen_reading: Render the clause straightforwardly without importing later Pauline
    formulations beyond the Greek wording.
  alternative_readings:
  - Translate more dynamically as 'because he lived righteously and truly by faith'
  - Render πίστις as 'faithfulness'
  rationale: The text commends Abraham in moral and faith terms together. The translation
    preserves that conjunction without forcing a later doctrinal contrast between
    faith and works.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; πίστις default ''faith''
    unless context demands otherwise.'
- issue: Isaac's role in the sacrifice narrative
  chosen_reading: 'Translate to show Isaac''s willing submission: ''gladly allowed
    himself to be led as a sacrifice.'''
  alternative_readings:
  - '''was offered as a sacrifice'''
  - '''gladly went to the sacrifice'''
  rationale: The Greek in context emphasizes Isaac's knowing, confident, willing participation.
    The chosen rendering preserves both the sacrificial frame and Isaac's voluntary
    posture without implying the sacrifice was completed.
- issue: δωδεκάσκηπτρον τοῦ Ἰσραήλ
  chosen_reading: Preserve the metaphor rather than flatten to 'twelve tribes of Israel.'
  alternative_readings:
  - '''the twelve tribes of Israel'''
  - '''the twelve-sceptered Israel'''
  rationale: Clement's diction is rhetorically elevated. Keeping the scepter imagery
    better reflects the ecclesial-literary texture, while 'people' supplies intelligibility
    in English.
