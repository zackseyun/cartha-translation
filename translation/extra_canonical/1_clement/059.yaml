translation:
  text: 'But if some disobey the things spoken by him through us, let them know that
    they will involve themselves in transgression and in no small danger. But we will
    be innocent of this sin, and we will ask, making earnest prayer and supplication,
    that the Creator of all may keep intact throughout the whole world the number
    of his elect that has been counted, through his beloved child Jesus the Messiah,
    through whom he called us from darkness into light, from ignorance into the full
    knowledge of the glory of his name,


    to hope in your name, the origin of all creation, having opened the eyes of our
    heart so that we might know you, the only Highest among the highest, holy, resting
    among the holy; the one who humbles the insolence of the proud, who frustrates
    the plans of the nations, who raises the lowly on high and humbles the lofty,
    who makes rich and makes poor, who kills and gives life, the only benefactor of
    spirits and God of all flesh; who looks into the depths, the overseer of human
    deeds, the helper of those in danger, the savior of those without hope, the creator
    and overseer of every spirit; who multiplies nations upon the earth and from among
    them all chooses those who love you through Jesus the Messiah, your beloved child,
    through whom you trained us, sanctified us, and honored us.


    We ask you, Master, to be our helper and defender. Rescue those of us who are
    in affliction, have mercy on the lowly, raise up the fallen, appear to those in
    need, heal the weak, turn back those of your people who are wandering. Feed the
    hungry, ransom our prisoners, raise up the sick, encourage the fainthearted. Let
    all the nations know that you alone are God, and that Jesus the Messiah is your
    child, and that we are your people and the sheep of your pasture.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will bind themselves' or 'will involve themselves'; the Greek verb suggests
      bringing oneself into a state of liability.
    reason: lexical_alternative
  - marker: b
    text: '''Beloved child'' translates Greek παῖς, which can also mean ''servant''
      or, in some contexts, ''son.'''
    reason: lexical_alternative
  - marker: c
    text: '''Jesus the Messiah'' could also be rendered ''Jesus Christ.'''
    reason: lexical_alternative
  - marker: d
    text: The phrase rendered 'the source from which all creation first came' is difficult
      and may also be understood as 'the origin of all creation.'
    reason: alternative_reading
  - marker: e
    text: Echoes biblical prayer language such as 'the sheep of your pasture' (cf.
      Ps 79:13; 95:7 LXX/MT numbering differs).
    reason: cross_reference
  - marker: f
    text: Or 'We ask you, Master, be our helper and defender.'.
    reason: previous_rendering
  - marker: g
    text: Or 'turn back the wandering of your people.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀπειθήσωσιν
  chosen: disobey
  alternatives:
  - refuse to obey
  - be disobedient
  lexicon: BDAG
  rationale: Carries active refusal of obedience rather than mere unbelief; 'disobey'
    preserves the paraenetic warning.
- source_word: παραπτώσει
  chosen: transgression
  alternatives:
  - offense
  - trespass
  - falling away
  lexicon: BDAG
  rationale: Keeps the moral-religious sense of culpable wrongdoing in this warning
    context.
- source_word: ἐνδήσουσιν
  chosen: will entangle themselves
  alternatives:
  - will bind themselves
  - will involve themselves
  lexicon: LSJ
  rationale: The middle sense suggests bringing themselves into a state of binding
    or implication; 'entangle themselves' reads naturally while preserving self-incurred
    liability.
- source_word: ἀθῷοι
  chosen: innocent
  alternatives:
  - guiltless
  - free from blame
  lexicon: BDAG
  rationale: Straightforward legal-moral term; 'innocent' best fits the contrast with
    others' transgression.
- source_word: ἐκτενῆ
  chosen: earnest
  alternatives:
  - fervent
  - constant
  - intense
  lexicon: BDAG
  rationale: Conveys stretched-out intensity of prayer without sounding archaic.
- source_word: δέησιν καὶ ἱκεσίαν
  chosen: prayer and supplication
  alternatives:
  - petition and entreaty
  lexicon: BDAG
  rationale: Preserves the paired liturgical-rhetorical terms with familiar ecclesial
    English.
- source_word: διαφυλάξῃ ἄθραυστον
  chosen: may keep intact
  alternatives:
  - may preserve unbroken
  - may guard unharmed
  lexicon: LSJ
  rationale: The phrase emphasizes preservation without breach or loss; 'keep intact'
    is idiomatic and faithful.
- source_word: δημιουργὸς
  chosen: Creator
  alternatives:
  - Maker
  - Craftsman
  lexicon: BDAG
  rationale: In Christian theological English, 'Creator of all' is the clearest rendering
    of the title.
- source_word: παιδὸς
  chosen: child
  alternatives:
  - servant
  - son
  lexicon: BDAG
  rationale: παῖς can mean child or servant. Here, because the phrase is relational
    ('his/your beloved') and not explicitly servile, 'child' preserves the ambiguity
    better than 'servant'; 'son' would over-specify.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per project philosophy, Χριστός is translated as title where context
    supports; here it remains clearly titular.
- source_word: ἐπίγνωσιν
  chosen: full knowledge
  alternatives:
  - knowledge
  - recognition
  lexicon: BDAG
  rationale: Preserves the intensified sense of deeper, fuller knowledge.
- source_word: ἀρχέγονον πάσης κτίσεως
  chosen: the source from which all creation first came
  alternatives:
  - the origin of all creation
  - the primal source of every creature
  lexicon: LSJ
  rationale: The phrase is difficult and elevated; this rendering preserves the idea
    of primordial origination while remaining intelligible in prayerful English.
- source_word: ὕψιστον ἐν ὑψίστοις
  chosen: the only Highest among the highest
  alternatives:
  - the only Most High in the highest
  - the only supreme one among the exalted
  lexicon: LSJ
  rationale: Retains the superlative, hymnic force of the Greek rather than flattening
    it.
- source_word: ἀναπαυόμενον
  chosen: resting
  alternatives:
  - dwelling
  - reposing
  lexicon: BDAG
  rationale: A literal participial rendering that preserves the scriptural cadence
    of divine repose among the holy.
- source_word: ὕβριν
  chosen: insolence
  alternatives:
  - arrogance
  - outrage
  - pride
  lexicon: LSJ
  rationale: More pointed than generic 'pride'; captures abusive overbearing arrogance.
- source_word: διαλύοντα λογισμοὺς ἐθνῶν
  chosen: breaks up the designs of the nations
  alternatives:
  - dissolves the plans of the Gentiles
  - frustrates the thoughts of the nations
  lexicon: BDAG
  rationale: '''Designs'' fits λογισμοί as plans/counsels in a scriptural register.'
- source_word: ζῳοποιοῦντα καὶ ζῆν ποιοῦντα
  chosen: gives life and causes to live
  alternatives:
  - makes alive and grants life
  lexicon: BDAG
  rationale: Preserves the rhetorical fullness of the paired expressions rather than
    collapsing them into one.
- source_word: εὐεργέτην
  chosen: benefactor
  alternatives:
  - doer of good
  - bountiful giver
  lexicon: BDAG
  rationale: A dignified term matching the elevated prayer style.
- source_word: ἐπόπτην
  chosen: overseer
  alternatives:
  - watcher
  - guardian
  lexicon: LSJ
  rationale: Maintains the sense of watchful supervision and coheres with ecclesial
    vocabulary without forcing technical office language.
- source_word: ἀπηλπισμένων
  chosen: those without hope
  alternatives:
  - the despairing
  - the hopeless
  lexicon: BDAG
  rationale: Makes explicit the condition denoted by the participle while preserving
    pastoral tone.
- source_word: ἐπαίδευσας
  chosen: trained us
  alternatives:
  - disciplined us
  - instructed us
  - educated us
  lexicon: BDAG
  rationale: παιδεύω includes formative instruction and discipline; 'trained us' captures
    shaping without sounding harsh in this triad.
- source_word: ἀντιλήμπτορα
  chosen: defender
  alternatives:
  - supporter
  - protector
  - one who takes hold to help
  lexicon: BDAG
  rationale: Pairs well with 'helper' and conveys active aid.
- source_word: ἐπιφάνηθι
  chosen: show yourself
  alternatives:
  - appear
  - manifest yourself
  lexicon: BDAG
  rationale: Prayer language asking for divine intervention in a direct but natural
    way.
- source_word: πλανωμένους
  chosen: the wandering
  alternatives:
  - those led astray
  - the erring
  lexicon: BDAG
  rationale: Keeps both the moral and pastoral sense without overdefining agency.
- source_word: λύτρωσαι
  chosen: ransom
  alternatives:
  - redeem
  - set free
  lexicon: BDAG
  rationale: Preserves the redemptive-liberative force of the verb; 'ransom our prisoners'
    is vivid and close to the Greek.
- source_word: ὀλιγοψυχούντας
  chosen: the fainthearted
  alternatives:
  - the discouraged
  - those of little courage
  lexicon: BDAG
  rationale: Traditional but still accessible rendering that matches the pastoral
    register.
- source_word: παῖς σου
  chosen: your child
  alternatives:
  - your servant
  - your son
  lexicon: BDAG
  rationale: As above, preserves the semantic breadth of παῖς in a christological
    prayer context without prematurely narrowing it.
- source_word: νομῆς
  chosen: pasture
  alternatives:
  - grazing place
  - fold
  lexicon: LSJ
  rationale: The established pastoral image is best preserved by 'pasture,' echoing
    scriptural diction.
theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Used as a title rather than a name-like fixed form in this prayer; aligns
    with project policy to translate titles where context supports.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Rendering of παῖς for Jesus
  chosen_reading: child
  alternative_readings:
  - servant
  - son
  rationale: The Greek term is semantically broad. 'Child' preserves filial relation
    and avoids importing either Isaianic servant-language exclusively or later creedal
    son-language more narrowly than the text states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Address to God as δέσποτα
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: δέσποτα is distinct from κύριος and carries stronger authority/ownership
    nuance; 'Master' preserves that distinction in prayer.
- issue: Meaning of ἀρχέγονον πάσης κτίσεως in the prayer
  chosen_reading: your name, the source from which all creation first came
  alternative_readings:
  - your name, origin of all creation
  - your primordial name over all creation
  rationale: The syntax is compressed and elevated. This rendering takes the phrase
    predicatively with 'name' in the prayer context and preserves the sense of primordial
    origin without overcommitting to a later technical metaphysic.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
