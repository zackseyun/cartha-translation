id: 1CLEM.59
reference: 1 Clement 59
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Ἐὰν δέ τινες ἀπειθήσωσιν τοῖς ὑπ᾽ αὐτοῦ δι᾽ ἡμῶν εἰρημένοις, γινωσκέτωσαν,
    ὅτι παραπτώσει καὶ κινδύνῳ οὐ μικρῷ ἑαυτοὺς ἐνδήσουσιν· 2. ἡμεῖς δὲ ἀθῷοι ἐσόμεθα
    ἀπὸ ταύτης τῆς ἁμαρτίας καὶ αἰτησόμεθα ἐκτενῆ τὴν δέησιν καὶ ἱκεσίαν ποιούμενοι,
    ὅπως τὸν ἀριθμὸν τὸν κατηριθμημένον τῶν ἐκλεκτῶν αὐτοῦ ἐν ὅλῳ τῷ κόσμῳ διαφυλάξῃ
    ἄθραυστον ὁ δημιουργὸς τῶν ἁπάντων διὰ τοῦ ἠγαπημένου παιδὸς αὐτοῦ Ἰησοῦ Χριστοῦ,
    δι᾽ οὗ ἐκάλεσεν ἡμᾶς ἀπὸ σκότους εἰς φῶς, ἀπὸ ἀγνωσίας εἰς ἐπίγνωσιν δόξης ὀνόματος
    αὐτοῦ, 3. ἐλπίζειν ἐπὶ τὸ ἀρχέγονον πάσης κτίσεως ὄνομά σου, ἀνοίξας τοὺς ὀφθαλμοὺς
    τῆς καρδίας ἡμῶν εἰς τὸ γινώσκειν σε τὸν μόνον ὕψιστον ἐν ὑψίστοις, ἅγιον ἐν ἁγίοις
    ἀναπαυόμενον· τὸν ταπεινοῦντα ὕβριν ὑπερηφάνων, τὸν διαλύοντα λογισμοὺς ἐθνῶν,
    τὸν ποιοῦντα ταπεινοὺς εἰς ὕψος καὶ τοὺς ὑψηλοὺς ταπεινοῦντα, τὸν πλουτίζοντα
    καὶ πτωχίζοντα, τὸν ἀποκτείνοντα καὶ ζῳοποιοῦντα καὶ ζῆν ποιοῦντα, μόνον εὐεργέτην
    πνευμάτων καὶ θεὸν πάσης σαρκός· τὸν ἐπιβλέποντα ἐν τοῖς ἀβύσσοις, τὸν ἐπόπτην
    ἀνθρωπίνων ἔργων, τὸν τῶν κινδυνευόντων βοηθόν, τὸν τῶν ἀπηλπισμένων σωτῆρα, τὸν
    παντὸς πνεύματος κτίστην καὶ ἐπίσκοπον· τὸν πληθύνοντα ἔθνη ἐπὶ γῆς καὶ ἐκ πάντων
    ἐκλεγόμενον τοὺς ἀγαπῶντάς σε διὰ Ἰησοῦ Χριστοῦ τοῦ ἠγαπημένου παιδός σου, δι’
    οὗ ἡμᾶς ἐπαίδευσας, ἥγιασας, ἐτίμησας. . ἀξιόμεν σε, δέσποτα, βοηθὸν γενέσθαι
    καὶ ἀντιλήμπτορα ἡμῶν. τοὺς ἐν θλίψει ἡμῶν ῥῦσαι, τοὺς ταπεινοὺς ἐλέησον, τοὺς
    πεπτωκότας ἔγειρον, τοῖς δεομένοις ἐπιφάνηθι, τοὺς ἀσθενεῖς ἴασαι, τοὺς πλανωμένους
    τοῦ λαοῦ σου ἐπίστρεψον· χόρτασον τοὺς πεινῶντας, λύτρωσαι τοὺς δεσμίους ἡμῶν,
    ἐξανάστησον τοὺς ἀσθενοῦντας, παράκαλεσον τοὺς ὀλιγοψυχούντας· γνωτώσαν σε ἅπαντα
    τὰ ἔθνη, ὅτι σὺ εἶ ὁ θεὸς μόνος καὶ Ἰησοῦς Χριστὸς ὁ παῖς σου καὶ ἡμεῖς λαός σου
    καὶ πρόβατα τῆς νομῆς σου.
  language: Greek
  pages:
