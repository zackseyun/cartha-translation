  rationale: 'The verb λανθάνω (perfect λέληθεν) means ''to escape notice'' or ''to
    be hidden from''. In English, ''escaped his purpose'' implies thwarting a plan
    or failing to be included in it, rather than being unseen by God''s deliberative
    mind. Translating βουλή as ''counsel'' and λέληθεν as ''is hidden from'' (or ''has
    escaped the notice of'') restores the cognitive and perceptual force of the Greek.
    | Azure: The proposed rewrite is clearly closer to the Greek. λέληθεν is the perfect
    of λανθάνω, whose core sense is ''escape notice'' / ''be hidden from,'' not ''escape''
    in the sense of evading or thwarting a plan'
