  text: Ταύτῃ οὖν τῇ ἐλπίδι προσδεδέσθωσαν αἱ ψυχαὶ ἡμῶν τῷ πιστῷ ἐν ταῖς ἐπαγγελίαις
    καὶ τῷ δικαίῳ ἐν τοῖς κρίμασιν. . ὁ παραγγείλας μὴ ψεύδεσθαι, πολλῷ μᾶλλον αὐτὸς
    οὐ ψεύσεται· οὐδὲν γὰρ ἀδύνατον παρὰ τῷ θεῷ, εἰ μὴ τὸ ψεύσασθαι. . ἀναζωπυρησάτω
    οὖν ἡ πίστις αὐτοῦ ἐν ἡμῖν, καὶ νοήσωμεν, ὅτι πάντα ἐγγὺς αὐτῷ ἐστιν. 4. ἐν λόγῳ
    τῆς μεγαλωσύνης αὐτοῦ συνεστήσατο τὰ πάντα καὶ ἐν λόγῳ δύναται αὐτὰ καταστρέψαι.
    . Τίς ἐρεῖ αὐτῷ· Τί ἐποίησας; ἢ τίς ἀντιστήσεται τῷ κράτει τῆς ἰσχύος αὐτοῦ; ὅτε
