  from: So then, let our souls be bound to this hope in the One who is faithful
  to: In this hope, then, let our souls be bound to the One who is faithful
  rationale: The verb προσδέω ('bind to') takes the dative for the object to which something is bound. Here, that object is `τῷ πιστῷ` ('to the faithful One'). The phrase `Ταύτῃ τῇ ἐλπίδι` is a dative of sphere or means ('In this hope'). The draft incorrectly treats 'this hope' as the object of the binding and translates `τῷ πιστῷ` as 'in the One,' distorting the Greek syntax.
