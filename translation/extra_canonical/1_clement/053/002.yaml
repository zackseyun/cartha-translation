  text: Μωϋσέως γὰρ ἀναβάντος εἰς τὸ ὄρος καὶ ποιήσαντος τεσσαράκοντα ἡμέρας καὶ τεσσαράκοντα νύκτας ἐν νηστείᾳ καὶ ταπεινώσει, εἶπεν πρὸς αὐτὸν ὁ θεός· Μωϋσῆ Μωϋσῆ, κατάβηθι τὸ τάχος ἐντεῦθεν, ὅτι ἠνόμησεν ὁ λαός σου, οὓς ἐξήγαγες ἐκ γῆς Αἰγύπτου· παρεβήσαν ταχὺ ἐκ τῆς ὁδοῦ ἧς ἐνετείλω αὐτοῖς, ἐποίησαν ἑαυτοῖς χωνευτά.
  language: Greek
translation:
  text: For when Moses had gone up onto the mountain and had spent forty days and forty nights in fasting and humiliation, God said to him, “Moses, Moses, come down quickly from here, because your people, whom you brought out of the land of Egypt, have acted lawlessly. They have quickly turned aside from the way that you commanded them; they have made molten images for themselves.”
