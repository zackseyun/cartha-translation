translation:
  text: For when Moses had gone up onto the mountain and had spent forty days and forty nights in fasting and self-abasement, God said to him, “Moses, Moses, come down quickly from here, because your people, whom you brought out of the land of Egypt, have acted lawlessly. They have quickly turned aside from the way that I commanded them; they have made molten images for themselves.”
