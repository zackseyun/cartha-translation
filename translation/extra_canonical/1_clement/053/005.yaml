  rationale: 'The Greek is simply `πρὸς κύριον` (to the Lord). While ''his'' is a natural English expansion, the rhetorical contrast in the Greek is between the status of a ''servant'' (θεράπων) and ''the Lord'' (κύριον). Rendering it as ''the Lord'' preserves this stark, absolute contrast without adding a possessive pronoun. | Azure: The proposal is more faithful to the Greek. The text reads παρρησιάζεται θεράπων πρὸς κύριον, with anarthrous κύριον after πρὸς; there is no possessive pronoun corresponding to “his.” More importantly'
