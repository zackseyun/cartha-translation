  from: bent closely over the sayings
  to: pored over the oracles
  rationale: 'The verb ἐγκύπτω literally means ''to bend over,'' but when used figuratively with texts (τὰ λόγια), it means to study closely or pore over (BDAG). ''Bent closely over the sayings'' awkwardly mixes a physical posture with an abstract noun. Additionally, λόγια in this context carries the authoritative, prophetic weight of the Old Testament scriptures, which is better captured by ''oracles'' than the somewhat lighter ''sayings''. | Azure: The proposed change is more faithful to the Greek. ἐγκεκύφατε (from ἐγκύπτω) does literally mean ''bend over,'' but in established figurative usage with an object of careful attention—especially written'
