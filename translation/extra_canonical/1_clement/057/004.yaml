reference: 1 Clement 57:4
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: ἐπειδὴ ἐκάλουν καὶ οὐχ ὑπηκούσατε, καὶ ἐξέτεινον λόγους καὶ οὐ προσεἴχετε,
    ἀλλὰ ἀκύρους ἐποιεῖτε τὰς ἐμὰς βουλάς, τοῖς δὲ ἐμοῖς ἐλέγχοις ἠπειθήσατε· τοιγαροῦν
    κἀγὼ τῇ ὑμετέρᾳ ἀπωλείᾳ ἐπιγελάσομαι, καταχαροῦμαι δέ, ἥνικα ἂν ἔρχηται ὑμῖν ὄλεθρος
    καὶ ὡς ἂν ἀφίκηται ὑμῖν ἄφνω θόρυβος, ἡ δὲ καταστροφή ὁμοία καταιγὶδι παρῇ, ἢ
    ὅταν ἔρχηται ὑμῖν θλῖψις καὶ πολιορκία.
  language: Greek
translation:
  text: Because I called and you did not listen, and I stretched out words and you
    paid no attention, but made my counsels void, and disobeyed my reproofs, therefore
    I also will laugh at your ruin; I will rejoice when destruction comes upon you,
    and when sudden turmoil reaches you, and your overthrow comes like a storm, or
    when affliction and siege come upon you.
  philosophy: optimal-equivalence
