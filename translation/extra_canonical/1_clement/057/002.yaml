  rationale: 'BDAG places ἐλλόγιμος in 1 Clement 57:2 specifically under the sense ''reckoned in, accounted'' (i.e., accounted as members), rather than its alternative sense ''esteemed, notable.'' The author''s rhetorical contrast is between being insignificant (''small'') but safely inside the flock, versus appearing ''preeminent'' but being cast out. Translating it as ''esteemed'' clashes with ''small'' and misses the membership contrast with being ''cast out.'' | Azure: The proposed change is supported by the lexical evidence and by the verse''s antithesis. In 1 Clem. 57.2, μικροὺς καὶ ἐλλογίμους εὑρεθῆναι is contrasted with δοκοῦντας ἐκβληθῆναι ἐκ τῆς ἐλπίδος αὐτοῦ: '
