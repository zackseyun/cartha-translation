  from: the Messiah
  to: Christ
  rationale: 'By 96 CE, in a letter from the Roman church to the Corinthian church (both heavily Gentile), ''Χριστός'' functioned primarily as a proper name or established title (''Christ''), not as the translated Jewish category ''the Messiah.'' Rendering it ''the Messiah'' retrojects a Palestinian Jewish emphasis that does not fit the sociolinguistic register of this specific author and audience. | Azure: The Greek has the fixed expression τοῦ Χριστοῦ, and in 1 Clement''s late first-century ecclesial Greek this is the standard Christian designation ''Christ,'' functioning as an established title/name rath'
