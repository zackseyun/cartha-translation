  from: bearing witness together with the ordinances laid down by him
  to: bearing witness to the ordinances laid down by him
  rationale: The dative phrase 'τοῖς ὑπ' αὐτοῦ νενομοθετημένοις' is the object of the participle 'συνεπιμαρτυροῦντες' (bearing witness to / attesting to), not a co-witness. The prophets are attesting to the laws Moses enacted, not witnessing alongside them (BDAG συνεπιμαρτυρέω).
