  from: those entrusted in Messiah by God appointed the persons mentioned before to such a work?
  to: those entrusted in Messiah by God with such a work appointed the aforementioned persons?
  rationale: The aorist passive participle πιστευθέντες ('entrusted') takes the accusative ἔργον τοιοῦτο ('such a work') as its direct object (BDAG s.v. πιστεύω 2.a.β). The phrase means 'those who were entrusted with such a work.' The draft incorrectly attaches 'such a work' to the main verb κατέστησαν ('appointed'), adding the preposition 'to' which is absent in the Greek, and thereby shifting the 'work' from the apostles (who were entrusted with it) to the appointed presbyters.
