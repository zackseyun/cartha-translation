source:
  edition: Funk 1901 (normalized OCR)
  text: Καὶ τί θαυμαστόν, εἰ οἱ ἐν Χριστῷ πιστευθέντες παρὰ θεοῦ ἔργον τοιοῦτο κατέστησαν
    τοὺς προειρημένους; ὅπου καὶ ὁ μακάριος πιστὸς θεράπων ἐν ὅλῳ τῷ οἴκῳ Μωϋσῆς τὰ
    διατεταγμένα αὐτῷ πάντα ἐσημειώσατο ἐν ταῖς ἱεραῖς βίβλοις, ᾧ καὶ ἐπηκολούθησαν
    οἱ λοιποὶ προφῆται, συνεπιμαρτυροῦντες τοῖς ὑπ' αὐτοῦ νενομοθετημένοις. ἐκεῖνος
    γάρ, ζήλου ἐμπεσόντος περὶ τῆς ἱερωσύνης καὶ στασιαζουσῶν τῶν φυλῶν, ὁποία αὐτῶν
    εἴη τῷ ἐνδόξῳ ὀνόματι κεκοσμημένη, ἐκέλευσεν τοὺς δώδεκα φυλάρχους προσενεγκεῖν
    αὐτῷ ῥάβδους ἐπιγεγραμμένας ἑκάστης φυλῆς κατ' ὄνομα· καὶ λαβὼν αὐτὰς ἔδησεν καὶ
    ἐσφράγισεν τοῖς δακτυλίοις τῶν φυλάρχων, καὶ ἀπέθετο αὐτὰς εἰς τὴν σκηνὴν τοῦ
    μαρτυρίου ἐπὶ τὴν τράπεζαν τοῦ θεοῦ. καὶ κλείσας τὴν σκηνὴν ἐσφράγισεν τὰς κλεῖδας
    ὡσαύτως καὶ τὰς ῥάβδους, καὶ εἶπεν αὐτοῖς· Ἄνδρες ἀδελφοί, ἧς ἂν φυλῆς ἡ ῥάβδος
    βλαστήσῃ, ταύτην ἐκλέλεκται ὁ θεὸς εἰς τὸ ἱερατεύειν καὶ λειτουργεῖν αὐτῷ. πρωΐας
    δὲ γενομένης συνεκάλεσεν πάντα τὸν Ἰσραήλ, τὰς ἑξακοσίας χιλιάδας τῶν ἀνδρῶν,
    καὶ ἐπεδείξατο τοῖς φυλάρχοις τὰς σφραγῖδας, καὶ ἤνοιξεν τὴν σκηνὴν τοῦ μαρτυρίου
    καὶ προεῖλεν τὰς ῥάβδους· καὶ εὑρέθη ἡ ῥάβδος Ἀαρὼν οὐ μόνον βεβλαστηκυῖα, ἀλλὰ
    καὶ καρπὸν ἔχουσα. τί δοκεῖτε, ἀγαπητοί; οὐ προῄδει Μωϋσῆς τοῦτο μέλλειν ἔσεσθαι;
    μάλιστα ᾔδει· ἀλλ' ἵνα μὴ ἀκαταστασία γένηται ἐν τῷ Ἰσραήλ, οὕτως ἐποίησεν, εἰς
    τὸ δοξασθῆναι τὸ ὄνομα τοῦ ἀληθινοῦ καὶ μόνου θεοῦ· ᾧ ἡ δόξα εἰς τοὺς αἰῶνας τῶν
    αἰώνων. ἀμήν.
