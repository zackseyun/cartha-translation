lexical_decisions:
- source_word: πιστευθέντες
  chosen: entrusted
  alternatives:
  - believed
  - committed
  - trusted
  lexicon: LSJ
  rationale: In the passive with παρὰ θεοῦ, the sense is not primarily 'those who
    believed' but those who were entrusted/commissioned by God. This fits the argument
    about appointment to office.
- source_word: ἔργον
  chosen: work
  alternatives:
  - task
  - office
  - service
  lexicon: LSJ
  rationale: A broad term here referring to the charge or function of appointment;
    'work' preserves the Greek while allowing the ecclesial context to supply specificity.
- source_word: θεράπων
  chosen: attendant
  alternatives:
  - servant
  - minister
  lexicon: LSJ
  rationale: θεράπων is more specific and elevated than a generic servant; 'attendant'
    preserves the dignified service of Moses without importing later technical ecclesial
    language.
- source_word: ἐσημειώσατο
  chosen: recorded
  alternatives:
  - noted down
  - marked out
  lexicon: LSJ
  rationale: In context of the sacred books, the verb points to written recording
    or noting, not merely mental notice.
- source_word: συνεπιμαρτυροῦντες
  chosen: bearing witness together with
  alternatives:
  - jointly testifying to
  - confirming together
  lexicon: LSJ
  rationale: The compound verb stresses concurrent corroboration by the prophets with
    what Moses legislated.
- source_word: νενομοθετημένοις
  chosen: the ordinances laid down by him
  alternatives:
  - the things legislated by him
  - his laws
  lexicon: LSJ
  rationale: The perfect participle points to what had been established by legislation;
    'ordinances laid down' is natural English and preserves juridical force.
- source_word: ζήλου
  chosen: jealousy
  alternatives:
  - zeal
  - envy
  lexicon: LSJ
  rationale: In this conflict context over the priesthood, 'jealousy' best captures
    the divisive sense rather than positive zeal.
- source_word: στασιαζουσῶν
  chosen: were in faction
  alternatives:
  - were rebelling
  - were in revolt
  - were divided in sedition
  lexicon: LSJ
  rationale: The participle denotes factional strife or sedition among the tribes;
    'were in faction' preserves the political-ecclesial sharpness.
- source_word: κεκοσμημένη
  chosen: was adorned
  alternatives:
  - was honored
  - was invested
  lexicon: LSJ
  rationale: The perfect participle literally conveys being adorned or endowed; this
    keeps the rhetorical texture of the Greek.
- source_word: φυλάρχους
  chosen: tribal leaders
  alternatives:
  - chiefs of the tribes
  - tribe-rulers
  lexicon: LSJ
  rationale: A clear modern rendering of the leaders representing each tribe.
- source_word: σκηνὴν τοῦ μαρτυρίου
  chosen: tent of witness
  alternatives:
  - tabernacle of testimony
  - tent of testimony
  lexicon: LSJ
  rationale: This preserves the biblical phrase while using accessible English; 'tent'
    is more transparent than the traditional but less immediately clear 'tabernacle'.
- source_word: λειτουργεῖν
  chosen: to minister
  alternatives:
  - to perform service
  - to serve liturgically
  lexicon: LSJ
  rationale: The verb carries cultic service connotations distinct from ἱερατεύειν;
    'minister' preserves that sacred-service nuance.
- source_word: ἱερατεύειν
  chosen: to serve as priest
  alternatives:
  - to exercise the priesthood
  - to be priest
  lexicon: LSJ
  rationale: This explicitly conveys priestly office, distinguished from the broader
    cultic service of λειτουργεῖν.
- source_word: προεῖλεν
  chosen: brought out
  alternatives:
  - took out
  - produced
  lexicon: LSJ
  rationale: A natural rendering for removing the staffs from the tent in public demonstration.
- source_word: βεβλαστηκυῖα
  chosen: to have sprouted
  alternatives:
  - to have budded
  - to have put forth shoots
  lexicon: LSJ
  rationale: The perfect participle indicates the visible result of budding; 'sprouted'
    is clear modern English.
- source_word: ἀκαταστασία
  chosen: disorder
  alternatives:
  - confusion
  - instability
  - tumult
  lexicon: LSJ
  rationale: A key paraenetic term in 1 Clement for communal unrest; 'disorder' is
    concise and ecclesially apt.
theological_decisions:
- issue: Rendering ἐν Χριστῷ
  chosen_reading: in Messiah
  alternative_readings:
  - in Christ
  rationale: Following project philosophy, Χριστῷ is rendered 'Messiah' where title
    force is still felt. Here the phrase marks relation to the anointed one in an
    ecclesial argument, not merely a name-like usage.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sense of πιστευθέντες παρὰ θεοῦ
  chosen_reading: those entrusted in Messiah by God
  alternative_readings:
  - those who have believed in Messiah through God
  - those trusted by God in Messiah
  rationale: The passive plus παρὰ θεοῦ most naturally points to divine entrusting/commissioning
    rather than the act of believing. This best fits Clement's argument about orderly
    appointment to ministry.
- issue: Ecclesial force of priestly language
  chosen_reading: retain explicit priestly and ministerial terminology
  alternative_readings:
  - generalize to religious service language
  rationale: The chapter argues from Israel's priestly ordering to Christian ecclesial
    order. Flattening ἱερατεύειν/λειτουργεῖν would weaken the analogy and paraenetic
    force.
