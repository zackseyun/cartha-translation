translation:
  text: 'And what is remarkable if those entrusted in Messiah by God appointed the
    persons mentioned before to such a work? For even the blessed and faithful attendant
    Moses, in all his house, recorded in the sacred books all the things commanded
    to him; and the rest of the prophets followed him, bearing witness together to
    the ordinances laid down by him. For when jealousy arose concerning the priesthood
    and the tribes were in faction over which of them was adorned with the glorious
    name, he ordered the twelve tribal leaders to bring him staffs, each inscribed
    according to the name of its tribe. And taking them, he bound them and sealed
    them with the rings of the tribal leaders, and placed them in the tent of witness
    upon the table of God. And after shutting the tent, he sealed the keys just as
    he had the staffs, and said to them, “Men, brothers, the tribe whose staff shall
    sprout—this one God has chosen to serve as priest and to minister to him.”


    Then when morning came, he called together all Israel, the six hundred thousand
    men, and showed the seals to the tribal leaders; and he opened the tent of witness
    and brought out the staffs. And the staff of Aaron was found not only to have
    sprouted, but even to be bearing fruit. What do you think, beloved? Did not Moses
    know beforehand that this was going to happen? Certainly he knew. But so that
    there might not be disorder in Israel, he acted in this way, so that the name
    of the true and only God might be glorified—to whom be the glory forever and ever.
    Amen.'
  philosophy: optimal-equivalence
