  text: ἐκεῖνος γάρ, ζήλου ἐμπεσόντος περὶ τῆς ἱερωσύνης καὶ στασιαζουσῶν τῶν φυλῶν, ὁποία αὐτῶν εἴη τῷ ἐνδόξῳ ὀνόματι κεκοσμημένη, ἐκέλευσεν τοὺς δώδεκα φυλάρχους προσενεγκεῖν αὐτῷ ῥάβδους ἐπιγεγραμμένας ἑκάστης φυλῆς κατ' ὄνομα· καὶ λαβὼν αὐτὰς ἔδησεν καὶ ἐσφράγισεν τοῖς δακτυλίοις τῶν φυλάρχων, καὶ ἀπέθετο αὐτὰς εἰς τὴν σκηνὴν τοῦ μαρτυρίου ἐπὶ τὴν τράπεζαν τοῦ θεοῦ.
  language: Greek
translation:
  text: For when jealousy arose concerning the priesthood and the tribes were engaged in factional strife over which of them was adorned with the glorious name, he ordered the twelve tribal leaders to bring him staffs, each inscribed according to the name of its tribe. And taking them, he bound them and sealed them with the rings of the tribal leaders, and placed them in the tent of witness upon the table of God.
