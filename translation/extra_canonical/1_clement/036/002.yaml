id: 1CLEM.36.2
reference: 1 Clement 36:2
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: διὰ τούτου ἀτενίζομεν εἰς τὰ ὕψη τῶν οὐρανῶν, διὰ τούτου ἐνοπτριζόμεθα τὴν
    ἄμωμον καὶ ὑπερτάτην ὄψιν αὐτοῦ, διὰ τούτου ἠνεῴχθησαν ἡμῶν οἱ ὀφθαλμοὶ τῆς καρδίας,
    διὰ τούτου ἡ ἀσύνετος καὶ ἐσκοτωμένη διάνοια ἡμῶν ἀναθάλλει εἰς τὸ φῶς, διὰ τούτου
    ἠθέλησεν ὁ δεσπότης τῆς ἀϑανάτου γνώσεως ἡμᾶς γεύσασϑαι, ὃς ὢν ἀπαύγασμα τῆς μεγαλοσύνης
    αὐτοῦ, τοσούτῳ μείζων ἐστὶν ἀγγέλων, ὅσῳ διαφορώτερον ὄνομα κεκληρονόμηκεν.
  language: Greek
translation:
  text: Through him we fix our gaze on the heights of the heavens; through him we
    behold as in a mirror his spotless and most exalted countenance; through him the
    eyes of our heart were opened; through him our foolish and darkened mind springs
    up into the light; through him the Master willed that we should taste immortal
    knowledge—he who, being the radiance of his majesty, is by so much greater than
    the angels as he has inherited a more excellent name.
  philosophy: optimal-equivalence
