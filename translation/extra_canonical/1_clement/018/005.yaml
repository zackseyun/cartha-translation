  rationale: The verb κισσάω originally refers to the cravings of a pregnant woman, and by extension in the LXX (which Clement is quoting here from Psalm 50:7) it translates the Hebrew יָחַם ('to conceive'). It means 'to conceive' or 'to be pregnant with', not 'to nurse' (which would be θηλάζω).
