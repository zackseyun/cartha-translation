  rationale: 'By 96 CE in the Roman church, ''Χριστός'' in formal doxological formulas functioned primarily as a proper name or fixed title (''Jesus Christ'') rather than an active translation of ''the Messiah''. Rendering it ''the Messiah'' here over-translates the term and shifts the register away from the formal, liturgical Greek the author is employing. | Azure: The Greek reads Ἰησοῦ Χριστοῦ without the article, embedded in a fixed liturgical-sounding doxological formula: διὰ τοῦ ἀρχιερέως καὶ προστάτου τῶν ψυχῶν ἡμῶν Ἰησοῦ Χριστοῦ. In this late first-century'
