  from: You alone are able to do these things and greater good things for us; to you we give thanks
  to: To you, who alone are able to do these and greater good things for us, we give thanks
  rationale: 'The Greek is a single continuous thought, with the nominative participle phrase (''ὁ μόνος δυνάμενος...'') acting as a vocative or appositive that resolves into the dative pronoun (''σοὶ ἐξομολογούμεθα''). Splitting it into two independent clauses with a semicolon disrupts the soaring liturgical flow of the doxology. | Azure: The proposed rewrite is closer to the Greek syntax. ὁ μόνος δυνάμενος ποιῆσαι ταῦτα καὶ περισσότερα ἀγαθὰ μεθ’ ἡμῶν is not a separate finite clause (''You alone are able...'') but an articular participi'
