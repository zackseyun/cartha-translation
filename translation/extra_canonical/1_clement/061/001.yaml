id: 1CLEM.61.1
reference: 1 Clement 61:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Σύ, δέσποτα, ἔδωκας τὴν ἐξουσίαν τῆς βασιλείας αὐτοῖς διὰ τοῦ μεγαλοπρεποῦς
    καὶ ἀνεκδιηγήτου κράτους σου, εἰς τὸ γινώσκοντας ἡμᾶς τὴν ὑπὸ σοῦ αὐτοῖς δεδομένην
    δόξαν καὶ τιμὴν ὑποτάσσεσθαι αὐτοῖς, μηδὲν ἐναντιουμένους τῷ θελήματί σου· οἷς
    δός, κύριε, ὑγίειαν, εἰρήνην, ὁμόνοιαν, εὐστάθειαν, εἰς τὸ διέπειν αὐτοὺς τὴν
    ὑπὸ σοῦ δεδομένην αὐτοῖς ἡγεμονίαν ἀπροσκόπως.
  language: Greek
translation:
  text: You, Master, gave them the authority of rule through your magnificent and
    indescribable might, so that, knowing the glory and honor given to them by you,
    we might submit ourselves to them, opposing your will in nothing. Grant to them,
    Lord, health, peace, concord, and stability, so that they may administer without
    offense the leadership you have given them.
  philosophy: optimal-equivalence
