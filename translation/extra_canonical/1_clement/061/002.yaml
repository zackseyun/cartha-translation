  text: σὺ γάρ, δέσποτα, ἐπουράνιε βασιλεῦ τῶν αἰώνων, δίδως τοῖς υἱοῖς τῶν ἀνθρώπων δόξαν καὶ τιμὴν καὶ ἐξουσίαν τῶν ἐπὶ τῆς γῆς ὑπαρχόντων· σὺ, κύριε, διεύθυνον τὴν βουλὴν αὐτῶν κατὰ τὸ καλὸν καὶ εὐάρεστον ἐνώπιον σου, ὅπως διέποντες ἐν εἰρήνῃ καὶ πραΰτητι εὐσεβῶς τὴν ὑπὸ σοῦ αὐτοῖς δεδομένην ἐξουσίαν θεοῦ σου τυγχάνωσιν.
  language: Greek
translation:
  text: For you, Master, heavenly King of the ages, give glory and honor and authority over the things on earth to the sons of men. Lord, direct their counsel according to what is good and pleasing before you, so that, administering in peace and gentleness, in a godly way, the authority you have given them, they may obtain your favor.
