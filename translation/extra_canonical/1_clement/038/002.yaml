id: 1CLEM.38.2
reference: 1 Clement 38:2
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: ὁ ἰσχυρὸς ἐπιμελείσϑω τὸν ἀσϑενῆ, ὁ δὲ ἀσϑενὴς ἐντρεπέσϑω τὸν ἰσχυρόν· ὁ πλούσιος ἐπιχορηγείτω τῷ πτωχῷ, ὁ δὲ πτωχὸς εὐχαριστείτω τῷ ϑεῷ, ὅτι ἔδωκεν αὐτῷ, ᾧ οὐ ἀναπληρωθῇ αὐτοῦ τὸ ὑστέρημα· ὁ σοφὸς ἐνδεικνύσθω τὴν σοφίαν αὐτοῦ μὴ ἐν λόγοις, ἀλλʼ ἐν ἔργοις ἀγαθοῖς· ὁ ταπεινοφρονῶν μὴ ἑαυτῷ μαρτυρείτω, ἀλλʼ ἔατω ὑφʼ ἑτέρου ἑαυτὸν μαρτυρεῖσθαι· ὁ ἁγνὸς ἐν τῇ σαρκὶ μὴ ἀλαζονευέσθω, γινώσκων, ὅτι ἕτερός ἐστιν ὁ ἐπιχορηγῶν αὐτῷ τὴν ἐγκράτειαν.
  language: Greek
translation:
  text: Let the strong take care of the weak, and let the weak respect the strong. Let the rich supply the poor, and let the poor give thanks to God, because he gave him one through whom his lack may be filled up. Let the wise show his wisdom not in words, but in good works. Let the humble-minded not bear witness to himself, but let him allow another to bear witness to him. Let the one who is pure in the flesh not boast, knowing that it is another who supplies him with self-control.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but let him allow himself to be borne witness to by another'.
    reason: previous_rendering
  - marker: b
    text: Or 'supplies him self-control'.
    reason: previous_rendering
