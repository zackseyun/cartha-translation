  category: awkward_english
  tier: 1
  from: but let him allow himself to be borne witness to by another
  to: but let him allow another to bear witness to him
  rationale: The literal rendering of the passive infinitive (`ἑαυτὸν μαρτυρεῖσθαι`) results in the clunky English phrase 'allow himself to be borne witness to'. Converting this to an active construction in English preserves the exact meaning and the lexical connection to the preceding 'bear witness to himself' (`ἑαυτῷ μαρτυρείτω`) while reading much more naturally.
- timestamp: '2026-04-22T06:11:56Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/phase9_greek/extra_canonical/1_clement/038/002.job-70782.json
  category: awkward_english
  tier: 1
  from: supplies him self-control
  to: supplies him with self-control
  rationale: In English, the verb 'supply' typically takes the preposition 'with' when the recipient is the object (e.g., 'supplies him with self-control'), or uses 'to' if the item is the object ('supplies self-control to him'). 'Supplies him self-control' feels slightly colloquial.
