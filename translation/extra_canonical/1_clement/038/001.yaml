  from: according as he was appointed in his own gift
  to: just as he was appointed in his gift
  rationale: '''According as'' is archaic and slightly awkward. ''Just as he was appointed in his gift'' reads more naturally while preserving the force of ''καθὼς ἐτέθη''. Furthermore, ''αὐτοῦ'' is simply ''his'', not ''his own'' (which would typically be ἑαυτοῦ or ἰδίῳ).'
