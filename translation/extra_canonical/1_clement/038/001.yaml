lexical_decisions:
- source_word: συνξέσθω
  chosen: be held together
  alternatives:
  - be joined together
  - be knit together
  lexicon: LSJ
  rationale: The paraenetic force is corporate and bodily. 'Be held together' preserves
    the passive/collective sense without sounding overly mechanical, and fits the
    body imagery in context.
- source_word: σῶμα
  chosen: body
  alternatives:
  - community
  - assembly
  lexicon: BDAG
  rationale: The Greek explicitly uses bodily imagery. Rendering it literally preserves
    the ecclesial metaphor rather than flattening it into an abstract collective.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Per project philosophy, Χριστός is translated as 'Messiah' where it functions
    as a title. The phrase retains its ecclesial and theological force.
- source_word: ὑποτασσέσθω
  chosen: be subject to
  alternatives:
  - submit to
  - be subordinate to
  lexicon: BDAG
  rationale: '''Be subject to'' preserves the imperative of ordered mutuality without
    importing a narrower modern register. It also matches the chapter''s concern for
    ecclesial order.'
- source_word: πλησίον
  chosen: neighbor
  alternatives:
  - fellow
  - the one near him
  lexicon: BDAG
  rationale: '''Neighbor'' is the most natural and scripturally resonant rendering,
    preserving ethical and communal overtones.'
- source_word: ἐτέθη
  chosen: was appointed
  alternatives:
  - was placed
  - was set
  lexicon: BDAG
  rationale: In context of gifts and roles within the body, 'was appointed' best conveys
    assigned place/function rather than mere location.
- source_word: χάρισμα
  chosen: gift
  alternatives:
  - gracious gift
  - endowment
  lexicon: BDAG
  rationale: '''Gift'' is clear and sufficiently broad, allowing both divine enablement
    and assigned role to remain in view.'
- source_word: ἐπιμελείσθω
  chosen: take care of
  alternatives:
  - care for
  - look after
  lexicon: BDAG
  rationale: This captures active concern and responsibility in idiomatic English
    while preserving the imperative tone.
- source_word: ἐντρεπέσθω
  chosen: respect
  alternatives:
  - defer to
  - show regard for
  lexicon: BDAG
  rationale: The verb here carries the sense of regard or proper respect rather than
    fear or shame. 'Respect' is concise and contextually apt.
- source_word: ἐπιχορηγείτω
  chosen: supply
  alternatives:
  - provide for
  - support generously
  lexicon: BDAG
  rationale: The verb suggests furnishing what is needed. 'Supply' preserves that
    sense and links well with the later clause about lack being filled up.
- source_word: ἀναπληρωθῇ ... τὸ ὑστέρημα
  chosen: his lack may be filled up
  alternatives:
  - his need may be supplied
  - what he lacks may be made complete
  lexicon: BDAG
  rationale: This keeps the verbal connection to provision and avoids over-paraphrase.
    It also preserves the concrete sense of deficiency being remedied.
- source_word: ἐνδεικνύσθω
  chosen: show
  alternatives:
  - demonstrate
  - display
  lexicon: BDAG
  rationale: '''Show'' is simple and forceful, fitting the contrast between words
    and deeds.'
- source_word: ταπεινοφρονῶν
  chosen: the humble-minded
  alternatives:
  - the humble
  - the lowly-minded
  lexicon: BDAG
  rationale: The compound points to humility of mind/disposition, not merely social
    status. 'Humble-minded' preserves that nuance.
- source_word: μαρτυρείτω
  chosen: bear witness to
  alternatives:
  - testify for
  - commend
  lexicon: BDAG
  rationale: The witness language is important and should be retained rather than
    reduced to generic self-praise.
- source_word: ἁγνὸς ἐν τῇ σαρκί
  chosen: pure in the flesh
  alternatives:
  - chaste in the body
  - sexually pure
  lexicon: BDAG
  rationale: A relatively literal rendering preserves the ascetic and bodily register
    of the Greek. More specific alternatives may over-narrow the phrase.
- source_word: ἀλαζονευέσθω
  chosen: boast
  alternatives:
  - be arrogant
  - vaunt himself
  lexicon: BDAG
  rationale: The warning is against self-exalting display. 'Boast' is direct and idiomatic.
- source_word: ἐγκράτεια
  chosen: self-control
  alternatives:
  - continence
  - temperance
  lexicon: BDAG
  rationale: '''Self-control'' is clear modern English and broad enough to include
    bodily restraint in context.'
- source_word: ἀναλογισώμεθα
  chosen: let us consider
  alternatives:
  - let us reflect
  - let us reckon
  lexicon: BDAG
  rationale: This preserves the exhortational turn to reflective thought without sounding
    overly technical.
- source_word: ἐκ ποίας ὕλης
  chosen: from what material
  alternatives:
  - from what matter
  - from what substance
  lexicon: LSJ
  rationale: The phrase evokes creaturely origin in a concrete way. 'Material' preserves
    that physical-creaturely emphasis.
- source_word: τάφου καὶ σκότους
  chosen: tomb and darkness
  alternatives:
  - grave and darkness
  - sepulcher and gloom
  lexicon: BDAG
  rationale: The imagery is stark and should remain so. 'Tomb and darkness' preserves
    the rhetorical weight and possible allusion to pre-life helplessness.
- source_word: πλάσας ... δημιουργήσας
  chosen: formed ... created
  alternatives:
  - fashioned ... made
  lexicon: BDAG
  rationale: Using two distinct English verbs reflects the paired Greek participles
    and preserves the elevated creation language.
- source_word: εὐεργεσίας
  chosen: good gifts
  alternatives:
  - benefits
  - kind acts
  lexicon: BDAG
  rationale: In context of divine provision prepared beforehand, 'good gifts' reads
    naturally and preserves beneficent divine action.
- source_word: κατὰ πάντα
  chosen: in every way
  alternatives:
  - in all things
  - altogether
  lexicon: BDAG
  rationale: This expresses comprehensive obligation to thanksgiving in idiomatic
    English.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: for the ages of ages
  alternatives:
  - forever and ever
  - unto the ages of ages
  lexicon: BDAG
  rationale: The more literal doxological formula preserves biblical cadence and avoids
    flattening the liturgical texture.
theological_decisions:
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The phrase naturally bears titular force here, and project doctrine prefers
    translating Χριστός as 'Messiah' where context supports title rather than fixed
    name.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sense of ἁγνὸς ἐν τῇ σαρκί
  chosen_reading: the one who is pure in the flesh
  alternative_readings:
  - the chaste person
  - the one sexually pure in body
  rationale: The Greek likely points to bodily purity, possibly especially chastity,
    but the wording is broader than an explicitly sexual term. The translation preserves
    the bodily register without over-specifying.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Referent of ὅτι ἔδωκεν αὐτῷ, ᾧ οὐ ἀναπληρωθῇ αὐτοῦ τὸ ὑστέρημα
  chosen_reading: because he gave him one through whom his lack may be filled up
  alternative_readings:
  - because God gave the poor the rich person by whom his need may be supplied
  - because God gave him the means by which his lack may be filled
  rationale: The syntax is compressed and somewhat awkward. The chosen rendering stays
    close to the Greek while making explicit the likely personal referent implied
    by the context of rich and poor.
