translation:
  text: Therefore let our whole body be held together in Messiah Jesus, and let each
    one be subject to his neighbor, according as he was appointed in his own gift.
    2. Let the strong take care of the weak, and let the weak respect the strong.
    Let the rich supply the poor, and let the poor give thanks to God, because he
    gave him one through whom his lack may be filled up. Let the wise show his wisdom
    not in words, but in good works. Let the humble-minded not bear witness to himself,
    but let him allow himself to be borne witness to by another. Let the one who is
    pure in the flesh not boast, knowing that it is another who supplies him self-control.
    3. Let us therefore consider, brothers, from what material we came to be, what
    and who we were when we entered into the world, from what tomb and darkness the
    one who formed us and created us brought us into his world, having prepared his
    good gifts before we were born. 4. Since, then, we have all these things from
    him, we ought in every way to give thanks to him, to whom be the glory for the
    ages of ages. Amen.
  philosophy: optimal-equivalence
