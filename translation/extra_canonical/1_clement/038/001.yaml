  rationale: The source text contains an OCR error ('Συνξέσϑω' for 'Σωζέσθω' / 'Σῳζέσθω'). The author wrote 'σωζέσθω' (let it be saved/preserved). The draft's 'be held together' attempts to translate the corrupted text or guesses at 'συνεχέσθω', but the manuscript tradition reads 'σωζέσθω'.
