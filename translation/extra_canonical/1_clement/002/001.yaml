lexical_decisions:
- source_word: ἐταπεινοφρονεῖτε
  chosen: were humble-minded
  alternatives:
  - were humble
  - practiced humility
  lexicon: LSJ
  rationale: Keeps the durative, character-forming sense of the verb and preserves
    the moral texture of ταπεινοφροσύνη rather than reducing it to a momentary feeling.
- source_word: ἀλαζονευόμενοι
  chosen: boasting in nothing
  alternatives:
  - being arrogant
  - acting boastfully
  lexicon: LSJ
  rationale: The participle denotes vaunting or swaggering self-display; 'boasting
    in nothing' fits the μηδέν construction and preserves the paraenetic contrast
    with humility.
- source_word: ὑποτασσόμενοι μᾶλλον ἢ ὑποτάσσοντες
  chosen: submitting rather than demanding submission
  alternatives:
  - being subject rather than subjecting
  - submitting rather than ruling over
  lexicon: BDAG
  rationale: The contrast is ethical and relational. 'Demanding submission' makes
    the active force clear in idiomatic English without over-specifying hierarchy.
- source_word: ἧδον διδόντες ἢ λαμβάνοντες
  chosen: taking more pleasure in giving than in receiving
  alternatives:
  - gladly giving rather than receiving
  - more gladly giving than taking
  lexicon: LSJ
  rationale: Captures the comparative adverbial force and echoes early Christian paraenesis
    without borrowing fixed later English phrasing.
- source_word: ἐφοδίοις
  chosen: provisions
  alternatives:
  - supplies
  - resources
  lexicon: LSJ
  rationale: Refers to what supplies one for life's course. 'Provisions' is natural
    English and preserves the sense of sufficiency in ἀρκούμενοι.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Per project policy, Χριστός is translated as 'Messiah' where functioning
    as a title rather than a name-like form.
- source_word: ἐνεστερνισμένοι ... τοῖς σπλάγχνοις
  chosen: had embraced them carefully in your inward parts
  alternatives:
  - had taken them to heart
  - had clasped them to your hearts
  lexicon: LSJ
  rationale: The idiom is vivid and bodily. 'Inward parts' preserves the visceral
    force of σπλάγχνα better than the flatter 'heart,' while remaining intelligible.
- source_word: τὰ παθήματα αὐτοῦ
  chosen: his sufferings
  alternatives:
  - his passions
  - what he suffered
  lexicon: BDAG
  rationale: Plain and accessible rendering of πάθημα in a Christological context,
    preserving the exemplary focus of Clement's exhortation.
- source_word: λιπαρά
  chosen: rich
  alternatives:
  - abundant
  - luxuriant
  lexicon: LSJ
  rationale: Used metaphorically with peace; 'rich' conveys fullness and abundance
    without sounding overly ornate.
- source_word: ἀκόρεστος πόθος εἰς ἀγαθοποιΐαν
  chosen: an insatiable longing for doing good
  alternatives:
  - an unquenchable desire for beneficence
  - a never-satisfied zeal for good works
  lexicon: LSJ
  rationale: Preserves the strong affective force of πόθος and the practical ethical
    orientation of ἀγαθοποιΐα.
- source_word: πλήρης πνεύματος ἁγίου ἐπέχυσις
  chosen: a full outpouring of the Holy Spirit
  alternatives:
  - a complete pouring out of the Holy Spirit
  - a fullness of the Holy Spirit was poured out
  lexicon: BDAG
  rationale: Makes the nominal construction idiomatic in English while retaining the
    imagery of effusion and the explicit reference to the Holy Spirit.
- source_word: ὁσίας βουλῆς
  chosen: holy purpose
  alternatives:
  - holy counsel
  - pious resolve
  lexicon: LSJ
  rationale: βουλή here is inward resolve or intention more than public advice; 'holy
    purpose' fits the moral context.
- source_word: εὐσεβοῦς πεποιθήσεως
  chosen: devout confidence
  alternatives:
  - godly assurance
  - pious trust
  lexicon: BDAG
  rationale: Preserves both the reverent quality of εὐσεβής and the settled assurance
    of πεποίθησις.
- source_word: ἵλεων γενέσθαι
  chosen: to become merciful
  alternatives:
  - to be gracious
  - to be propitious
  lexicon: LSJ
  rationale: Avoids archaic cultic English while preserving the plea for divine favor
    and forgiveness.
- source_word: εἴ τι ἀκόντες ἡμάρτετε
  chosen: if in anything you had sinned unwillingly
  alternatives:
  - if you had sinned unintentionally in any matter
  - if in anything you had erred against your will
  lexicon: BDAG
  rationale: Retains the moral seriousness of ἁμαρτάνω and the nuance of inadvertence
    in ἀκόντες.
- source_word: ἀδελφότητος
  chosen: brotherhood
  alternatives:
  - brothers and sisters
  - community of brothers
  lexicon: BDAG
  rationale: Gender-accurate and ecclesial; the term denotes the fraternity of believers
    as a body. A more inclusive paraphrase would move beyond the lexical form.
- source_word: μετ’ ἐλέους καὶ συνειδήσεως
  chosen: with mercy and a good conscience
  alternatives:
  - in mercy and conscientiousness
  - with compassion and conscience
  lexicon: BDAG
  rationale: The phrase modifies the manner of preserving/saving the elect. 'Good
    conscience' is supplied idiomatically in English because bare 'conscience' can
    sound incomplete, though the Greek has simply συνειδήσεως.
- source_word: εἰλικρινεῖς
  chosen: sincere
  alternatives:
  - pure
  - genuine
  lexicon: BDAG
  rationale: Conveys moral transparency and straightforwardness in a natural modern
    register.
- source_word: ἀκέραιοι
  chosen: guileless
  alternatives:
  - innocent
  - unmixed
  - blameless
  lexicon: BDAG
  rationale: Highlights the sense of being uncorrupted or without duplicity, fitting
    the communal ethic.
- source_word: ἀμνησίκακοι
  chosen: free from resentment
  alternatives:
  - not remembering wrongs
  - without malice
  lexicon: LSJ
  rationale: Expresses the refusal to hold onto injuries; more idiomatic than a wooden
    'not remembering evils.'
- source_word: στάσις
  chosen: sedition
  alternatives:
  - faction
  - strife
  lexicon: BDAG
  rationale: In Clement's ecclesial context the word suggests disruptive factional
    uprising, stronger than generic 'strife.'
- source_word: σχίσμα
  chosen: schism
  alternatives:
  - division
  - split
  lexicon: BDAG
  rationale: An ecclesial term in context; 'schism' preserves churchly texture and
    the seriousness of communal rupture.
- source_word: βδέλυκτον
  chosen: detestable
  alternatives:
  - abominable
  - loathsome
  lexicon: LSJ
  rationale: Strong moral revulsion is intended; 'detestable' is forceful without
    sounding archaic.
- source_word: παραπτώμασιν
  chosen: trespasses
  alternatives:
  - failings
  - offenses
  lexicon: BDAG
  rationale: Keeps the moral-religious weight of the term while remaining familiar
    in Christian English.
- source_word: τὰ ὑστερήματα αὐτῶν ἴδια ἐκρίνετε
  chosen: you judged their shortcomings to be your own
  alternatives:
  - you considered their deficiencies your own
  - you reckoned their lacks as belonging to yourselves
  lexicon: LSJ
  rationale: Preserves the communal solidarity implied by ἴδια and the evaluative
    force of ἐκρίνετε.
- source_word: ἀγαθοποιοί
  chosen: beneficent
  alternatives:
  - doing good
  - kind in action
  lexicon: LSJ
  rationale: A compact adjectival rendering that matches the list-like style of the
    Greek and avoids repetitive use of 'good' immediately before 'good work.'
- source_word: σεβασμίῳ πολιτείᾳ
  chosen: a venerable way of life
  alternatives:
  - reverent conduct
  - worthy commonwealth-life
  lexicon: BDAG
  rationale: πολιτεία here refers to conduct or manner of life; 'venerable way of
    life' preserves dignity and communal ethos.
- source_word: ἐτελελεῖτε
  chosen: you carried everything through
  alternatives:
  - you performed all things
  - you conducted yourselves
  lexicon: LSJ
  rationale: The verb suggests bringing actions to completion. This rendering keeps
    the active, comprehensive force in context.
- source_word: δικαιώματα
  chosen: righteous requirements
  alternatives:
  - ordinances
  - decrees
  - statutes
  lexicon: BDAG
  rationale: Avoids overly technical legal language while preserving the normative
    force of the Lord's prescribed standards.
- source_word: ἐπὶ τὰ πλάτη τῆς καρδίας
  chosen: on the broad places of your hearts
  alternatives:
  - upon the tablets of your hearts
  - across your hearts
  lexicon: LSJ
  rationale: The Greek says 'broad places,' an unusual but vivid expression. Preserving
    it maintains the scriptural cadence and likely allusive texture, while remaining
    understandable.
theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Used as a title in this paraenetic context; project doctrine prefers
    translating titles to preserve meaning.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Rendering ἀδελφότης
  chosen_reading: brotherhood
  alternative_readings:
  - brothers and sisters
  - fellowship
  rationale: Maintains the masculine collective form and ecclesial texture without
    flattening it into a generic social term.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
- issue: Rendering σχίσμα
  chosen_reading: schism
  alternative_readings:
  - division
  - split
  rationale: The context is explicitly ecclesial and anticipates the letter's concern
    with church rupture; the stronger churchly term is warranted.
  doctrine_reference: 'PHILOSOPHY.md: Preserve rhetorical and ecclesial texture.'
