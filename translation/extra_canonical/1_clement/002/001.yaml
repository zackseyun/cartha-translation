translation:
  text: And all of you were humble-minded, boasting in nothing, submitting rather
    than demanding submission, taking more pleasure in giving than in receiving; content
    with the provisions of the Messiah, and paying close attention to his words, you
    had embraced them carefully in your hearts, and his sufferings were before your
    eyes. Thus deep and rich peace was given to all, and an insatiable longing for
    doing good, and a full outpouring of the Holy Spirit came upon all. And being
    full of holy purpose, in good eagerness and with devout confidence you stretched
    out your hands to God the Almighty, begging him to become merciful, if in anything
    you had sinned unwillingly. Day and night your concern was for the whole brotherhood,
    so that the number of his chosen ones might be saved with mercy and conscience.
    You were sincere and guileless and free from resentment toward one another. Every
    sedition and every schism was detestable to you. You mourned over the trespasses
    of your neighbors; you judged their shortcomings to be your own. Doing good, ready
    for every good work, adorned with a venerable way of life, you conducted yourselves
    in everything in his fear; the commandments and the righteous requirements of
    the Lord had been written on the tablets of your hearts.
  philosophy: optimal-equivalence
