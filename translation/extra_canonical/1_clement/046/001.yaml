  verse: 1
translation:
  text: "Therefore, brothers, we too must attach ourselves to such examples. For it is written, “Attach yourselves to the holy ones, because those who attach themselves to them will be made holy.” And again, in another place it says, “With an innocent man you will be innocent, and with the chosen one you will be chosen, and with the crooked you will become twisted.” Let us therefore attach ourselves to the innocent and righteous, and these are God’s chosen ones.\n\nWhy are there quarrels and outbursts of anger and divisions and schisms and even war among you? Or do we not have one God and one Messiah and one Spirit of grace poured out upon us, and one calling in Messiah? Why do we tear apart and split up the members of Messiah, and rise in revolt against our own body, and come to such a pitch of madness that we forget that we are members of one another?\n\nRemember the words of Jesus our Lord. For he said, “Woe to that man: it would have been good for him if he had not been born, rather than that he should cause one of my chosen ones to stumble. It would have been better for him to have a millstone hung around him and to be sunk into the sea, than that he should turn one of my chosen ones aside.” Your schism has turned many aside, cast many into discouragement, many into doubt, and all of us into grief; and your factional strife is persistent."
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: κολληθῆναι / Κολλᾶσθε / κολληθῶμεν
  chosen: attach ourselves / attach yourselves
  alternatives:
  - cling to
  - join yourselves to
  - cleave to
  lexicon: LSJ
  rationale: The verb carries the sense of being joined closely or cleaving to someone. “Attach” preserves the exhortational force and relational closeness without sounding archaic like “cleave.” Repeating the same English root across the chapter preserves the rhetorical cohesion.
- source_word: ὑποδείγμασιν
  chosen: examples
  alternatives:
  - patterns
  - models
  lexicon: LSJ
  rationale: The term denotes exemplars set before readers for imitation. “Examples” is natural English and fits the paraenetic context.
- source_word: ἅγιοις
  chosen: the holy ones
  alternatives:
  - the saints
  - holy people
  lexicon: LSJ
  rationale: The phrase likely refers to holy persons rather than an abstract quality. “Holy ones” preserves the personal reference and scriptural cadence while avoiding later ecclesiastical narrowing that “saints” may suggest.
- source_word: ἁγιασθήσονται
  chosen: will be made holy
  alternatives:
  - will be sanctified
  - will become holy
  lexicon: LSJ
  rationale: The passive indicates being rendered holy. “Will be made holy” is accessible modern English and keeps the theological force of sanctification.
- source_word: ἀθῴου / ἀθῷοις
  chosen: innocent / the innocent
  alternatives:
  - blameless
  - guiltless
  lexicon: LSJ
  rationale: The word emphasizes innocence or freedom from wrongdoing. “Innocent” is straightforward and suits both the citation and the exhortation.
- source_word: ἐκλεκτοῦ / ἐκλεκτοὶ
  chosen: chosen / chosen ones
  alternatives:
  - elect
  lexicon: LSJ
  rationale: “Chosen” is more transparent for modern readers than “elect,” while still preserving the theological category. In direct sayings and exhortation, “chosen ones” retains the communal identity marker.
- source_word: στρεβλοῦ ... διαστρέψεις
  chosen: crooked ... become twisted
  alternatives:
  - perverse ... be perverted
  - warped ... become warped
  lexicon: LSJ
  rationale: The paired terms are rhetorically linked. “Crooked” and “become twisted” preserve the moral deformation imagery without sounding overly technical.
- source_word: ἔρεις
  chosen: quarrels
  alternatives:
  - strifes
  - contentions
  lexicon: LSJ
  rationale: “Quarrels” is idiomatic modern English and fits a list of communal disorders.
- source_word: θυμοί
  chosen: outbursts of anger
  alternatives:
  - wraths
  - fits of rage
  - anger
  lexicon: LSJ
  rationale: The plural suggests repeated eruptions of temper rather than a settled disposition. “Outbursts of anger” captures that nuance.
- source_word: διχοστασίαι
  chosen: divisions
  alternatives:
  - dissensions
  - factions
  lexicon: LSJ
  rationale: The term denotes standing apart in opposed groups. “Divisions” is clear and works well alongside “schisms” without collapsing the distinction entirely.
- source_word: σχίσματα
  chosen: schisms
  alternatives:
  - splits
  - tears
  lexicon: LSJ
  rationale: Given the ecclesial context, “schisms” preserves the churchly and rhetorical force better than a flatter term like “splits.”
- source_word: πόλεμός
  chosen: war
  alternatives:
  - conflict
  - fighting
  lexicon: LSJ
  rationale: The singular climactically intensifies the list. “War” preserves the shocking escalation of the rhetoric.
- source_word: πνεῦμα τῆς χάριτος
  chosen: Spirit of grace
  alternatives:
  - gracious Spirit
  - Spirit characterized by grace
  lexicon: LSJ
  rationale: A relatively literal rendering preserves the scriptural resonance and theological density of the phrase.
- source_word: ἐκχυθὲν ἐφ’ ἡμᾶς
  chosen: poured out upon us
  alternatives:
  - shed upon us
  - poured over us
  lexicon: LSJ
  rationale: This keeps the biblical idiom of divine outpouring, especially for the Spirit.
- source_word: κλῆσις
  chosen: calling
  alternatives:
  - summons
  - vocation
  lexicon: LSJ
  rationale: “Calling” is the standard theological rendering and fits the communal sense of being called in Messiah.
- source_word: διέλκωμεν καὶ διασπῶμεν
  chosen: tear apart and split up
  alternatives:
  - pull apart and divide
  - rend and tear
  lexicon: LSJ
  rationale: The two verbs are near-synonymous but cumulative. The paired English verbs preserve the violent imagery of communal rupture.
- source_word: στασιάζομεν
  chosen: rise in revolt
  alternatives:
  - make sedition
  - be factious
  - rebel
  lexicon: LSJ
  rationale: The verb is stronger than merely “quarrel”; it suggests insurrectionary faction. “Rise in revolt” conveys the severity while remaining idiomatic.
- source_word: σῶμα τὸ ἴδιον
  chosen: our own body
  alternatives:
  - the body that is our own
  - our very body
  lexicon: LSJ
  rationale: The phrase underscores self-destructive division within the community conceived as one body. “Our own body” makes that point clearly.
- source_word: ἀπόνοιαν
  chosen: a pitch of madness
  alternatives:
  - folly
  - senselessness
  - recklessness
  lexicon: LSJ
  rationale: The noun denotes irrationality or derangement. “A pitch of madness” preserves the heightened rhetorical tone.
- source_word: σκανδαλίσαι
  chosen: cause ... to stumble
  alternatives:
  - offend
  - ensnare
  - cause to fall
  lexicon: LSJ
  rationale: This is the standard biblical metaphor and should be preserved rather than paraphrased away.
- source_word: μύλον
  chosen: millstone
  alternatives:
  - a millstone
  lexicon: LSJ
  rationale: The image is familiar from Gospel tradition and should remain explicit.
- source_word: καταποντισθῆναι
  chosen: to be sunk into the sea
  alternatives:
  - to be drowned in the sea
  - to be cast into the depths
  lexicon: LSJ
  rationale: The verb suggests being plunged or sunk. “Sunk into the sea” preserves the concrete image and avoids over-interpretation.
- source_word: διαστρέψαι
  chosen: turn ... aside
  alternatives:
  - corrupt
  - lead astray
  - twist
  lexicon: LSJ
  rationale: In this context the sense is to distort or lead someone off the right path. “Turn aside” is idiomatic and echoes the chapter’s concern with communal deviation.
- source_word: ἀθυμίαν
  chosen: discouragement
  alternatives:
  - despondency
  - faintheartedness
  lexicon: LSJ
  rationale: The term denotes loss of heart or dejection. “Discouragement” is accessible while preserving the emotional force.
- source_word: δισταγμόν
  chosen: doubt
  alternatives:
  - wavering
  - hesitation
  lexicon: LSJ
  rationale: The noun suggests inner wavering or uncertainty. “Doubt” is concise and communicates the destabilizing effect of the schism.
- source_word: στάσις
  chosen: factional strife
  alternatives:
  - sedition
  - rebellion
  - dissension
  lexicon: LSJ
  rationale: The term is stronger than generic disagreement and overlaps with civic-revolt language. “Factional strife” captures both the communal and insurgent nuance.
- source_word: ἐπίμονος
  chosen: still continues
  alternatives:
  - persistent
  - obstinate
  - ongoing
  lexicon: LSJ
  rationale: The adjective marks the stubborn persistence of the conflict. Rendering it verbally in English gives a natural close to the sentence while preserving the sense.
theological_decisions:
- issue: Rendering Χριστός in this chapter
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Per project doctrine, titles are translated where context supports title-force. Here the repeated confessional and ecclesial use (“one Messiah,” “members of the Messiah”) is still meaning-bearing rather than merely name-like.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Rendering ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The Greek is grammatically masculine in direct address. Per project policy, gender-accurate rendering is preferred, with inclusivity concerns handled by annotation if needed rather than flattening the source form.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
- issue: Identity of τοῖς ἁγίοις / ἐκλεκτοί
  chosen_reading: holy ones / chosen ones as members of God’s people
  alternative_readings:
  - saints / elect as technical ecclesial titles
  rationale: The chapter uses scriptural language for the faithful community. The translation preserves the theological category without importing later technical or denominational overtones.
