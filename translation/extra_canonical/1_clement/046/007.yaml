  text: ἱνατί διέλκωμεν καὶ διασπῶμεν τὰ μέλη τοῦ Χριστοῦ καὶ στασιάζομεν πρὸς τὸ σῶμα τὸ ἴδιον, καὶ εἰς τοσαύτην ἀπόνοιαν ἐρχόμεθα, ὥστε ἐπιλαθέσθαι ἡμᾶς, ὅτι μέλη ἐσμὲν ἀλλήλων; μνήσθητε τῶν λόγων Ἰησοῦ τοῦ κυρίου ἡμῶν.
