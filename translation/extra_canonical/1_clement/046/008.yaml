  text: εἶπεν γάρ· Οὐαὶ τῷ ἀνθρώπῳ ἐκείνῳ· καλὸν ἦν αὐτῷ, εἰ οὐκ ἐγεννήθη, ἢ ἕνα τῶν ἐκλεκτῶν μου σκανδαλίσαι· κρεῖττον ἦν αὐτῷ περιτεθῆναι μύλον καὶ καταποντισθῆναι εἰς τὴν θάλασσαν, ἢ ἕνα τῶν ἐκλεκτῶν μου διαστρέψαι.
  language: Greek
translation:
  text: 'For he said, “Woe to that man: it would have been good for him if he had not been born, rather than to cause one of my chosen ones to stumble. It would have been better for him to have a millstone hung around him and to be sunk into the sea, than to turn one of my chosen ones aside.”'
