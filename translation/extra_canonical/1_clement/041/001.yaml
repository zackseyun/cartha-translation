translation:
  text: 'Let each of us, brothers, in his own appointed rank be pleasing to God, being
    in a good conscience, not overstepping the fixed rule of his own ministry, with
    dignity.


    2. For the sacrifices of continual offering, or of vows, or concerning sin and
    transgression, are not offered everywhere, brothers, but only in Jerusalem; and
    even there they are not offered in every place, but before the sanctuary, at the
    altar, after the offering has been Let each of us, brothers, in his own appointed
