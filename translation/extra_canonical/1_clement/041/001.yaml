  from: in his own appointed rank be pleasing to God, being in a good conscience, not overstepping the fixed rule of his own ministry, with dignity.
  to: please God in his own rank, maintaining a good conscience, not overstepping the fixed rule of his ministry, with dignity.
  rationale: The draft over-translates 'ἰδίῳ' as 'appointed' (likely borrowing from 'ὡρισμένον' later in the verse); it simply means 'own'. 'Being in a good conscience' is an overly literal and clunky rendering of 'ἐν ἀγαθῇ συνειδήσει ὑπάρχων'; 'maintaining a good conscience' better captures the durative force of the participle in English. Finally, 'please God' is a more natural rendering of the active imperative 'εὐαρεστείτω' than 'be pleasing to God.'
