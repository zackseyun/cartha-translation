lexical_decisions:
- source_word: τάγματι
  chosen: appointed rank
  alternatives:
  - order
  - station
  lexicon: LSJ
  rationale: τάγμα can denote an ordered place, rank, or appointed station. 'Appointed
    rank' preserves the ecclesial and ordered sense in Clement's paraenesis better
    than the flatter 'place' or the more abstract 'order'.
- source_word: εὐαρεστείτω
  chosen: be pleasing
  alternatives:
  - please
  - be acceptable
  lexicon: BDAG
  rationale: The imperative calls for conduct acceptable to God. 'Be pleasing to God'
    preserves the moral and devotional force without sounding wooden.
- source_word: συνειδήσει
  chosen: conscience
  alternatives:
  - awareness
  lexicon: BDAG
  rationale: In early Christian moral discourse, συνείδησις is well represented by
    'conscience'; this keeps the ethical texture of the sentence.
- source_word: παρεκβαίνων
  chosen: overstepping
  alternatives:
  - transgressing
  - going beyond
  lexicon: LSJ
  rationale: The participle conveys deviating beyond proper bounds. 'Overstepping'
    fits the immediate context of ordered limits and assigned roles.
- source_word: ὡρισμένον
  chosen: fixed
  alternatives:
  - appointed
  - determined
  lexicon: BDAG
  rationale: The term indicates something set or determined. 'Fixed' works naturally
    with 'rule' and emphasizes established boundaries.
- source_word: λειτουργίας
  chosen: ministry
  alternatives:
  - service
  - liturgical service
  lexicon: BDAG
  rationale: λειτουργία can denote public/religious service. 'Ministry' preserves
    ecclesial resonance while remaining readable; the cultic dimension is retained
    by the chapter's sacrificial context.
- source_word: κανόνα
  chosen: rule
  alternatives:
  - standard
  - measure
  - boundary
  lexicon: BDAG
  rationale: κανών here refers to a prescribed norm or limit. 'Rule' best conveys
    a fixed standard governing one's assigned ministry.
- source_word: σεμνότητι
  chosen: with dignity
  alternatives:
  - with gravity
  - with reverence
  lexicon: BDAG
  rationale: The word carries the sense of seriousness and propriety. 'With dignity'
    is idiomatic and preserves the moral tone.
- source_word: ἐνδελεχισμοῦ
  chosen: continual offering
  alternatives:
  - regular offering
  - perpetual sacrifice
  lexicon: LSJ
  rationale: The term refers to regular/continual sacrificial observance. 'Continual
    offering' is clear in English and avoids overtechnical phrasing.
- source_word: πλημμελείας
  chosen: transgression
  alternatives:
  - offense
  - trespass
  lexicon: LSJ
  rationale: In sacrificial context the term denotes a fault or offense. 'Transgression'
    pairs well with 'sin' while preserving moral seriousness.
- source_word: ναοῦ
  chosen: sanctuary
  alternatives:
  - temple
  - shrine
  lexicon: BDAG
  rationale: ναός often denotes the inner sacred precinct rather than the whole temple
    complex. 'Sanctuary' preserves that more specific sense.
- source_word: μυωροσκοπηθέν
  chosen: has been inspected
  alternatives:
  - examined for blemish
  - scrutinized
  lexicon: LSJ
  rationale: The rare verb refers to close inspection, especially of sacrificial suitability.
    'Has been inspected' is readable; the sacrificial nuance is explained in a footnote.
theological_decisions:
- issue: Ecclesial and cultic analogy in Clement's exhortation
  chosen_reading: The chapter is rendered to preserve Clement's appeal to ordered
    ranks and bounded ministries by analogy with Jerusalem's sacrificial regulations,
    without collapsing Christian ministry into Levitical priesthood.
  alternative_readings:
  - Render λειτουργία in a more explicitly liturgical way throughout
  - Generalize the passage into merely moral advice about staying in one's lane
  rationale: The Greek maintains both ecclesial order and cultic analogy. The translation
    keeps this tension by using terms like 'appointed rank' and 'ministry' while preserving
    the sacrificial imagery of v. 2.
