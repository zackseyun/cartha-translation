source:
  edition: Funk 1901 (normalized OCR)
  text: Ἕκαστος ἡμῶν, ἀδελφοί, ἐν τῷ ἰδίῳ τάγματι εὐαρεστείτω τῷ θεῷ ἐν ἀγαθῇ συνειδήσει ὑπάρχων, μὴ παρεκβαίνων τὸν ὡρισμένον τῆς λειτουργίας αὐτοῦ κανόνα, ἐν σεμνότητι.
