  text: οὐ πανταχοῦ, ἀδελφοί, προσφέρονται αἱ θυσίαι ἐνδελεχισμοῦ ἢ εὐχῶν ἢ περὶ ἁμαρτίας καὶ πλημμελείας, ἀλλʼ ἢ ἐν Ἱερουσαλὴμ μόνῃ· κἀκεῖ δὲ οὐκ ἐν παντὶ τόπῳ προσφέρεται, ἀλλʼ ἔμπροσθεν τοῦ ναοῦ πρὸς τὸ θυσιαστήριον, μυωροσκοπηθὲν τὸ προσφερόμενον ὑπὸ
  language: Greek
translation:
  text: Not everywhere, brothers, are the sacrifices of continual offering, or of vows, or for sin and guilt, offered, but only in Jerusalem; and even there they are not offered in every place, but before the sanctuary, at the altar, after the offering has been inspected by the high priest and the ministers already mentioned.
