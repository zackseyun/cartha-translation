translation:
  text: For the sacrifices of continual offering, or of prayers, or concerning sin and transgression, are not offered everywhere, brothers, but only in Jerusalem; and even there they are not offered in every place, but before the sanctuary, at the altar, after the offering has been inspected for blemishes by the high priest and the ministers already mentioned.
