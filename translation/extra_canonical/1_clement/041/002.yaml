  from: For the sacrifices of continual offering, or of prayers, or concerning sin and transgression, are not offered everywhere, brothers,
  to: Not everywhere, brothers, are the sacrifices of continual offering, or of vows, or for sin and guilt, offered,
  rationale: The Greek has no conjunction ('For'). 'οὐ πανταχοῦ' is topicalized for emphasis at the start of the sentence. In this list of Levitical sacrifices, 'εὐχῶν' refers to 'vows' (votive offerings, cf. LXX Lev 7:16), not 'prayers'. 'περὶ ἁμαρτίας καὶ πλημμελείας' refers to the standard 'sin and guilt' (or trespass) offerings, making 'for' more appropriate than 'concerning'.
