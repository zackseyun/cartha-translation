  from: cast out from the overseer’s office those who have offered its gifts
  to: cast out from the overseer’s office those who have offered the gifts
  rationale: 'The Greek contains a single genitive phrase, `τῆς ἐπισκοπῆς`. It can either modify `τὰ δῶρα` ("the gifts of the overseer''s office") or serve as a genitive of separation with `ἀποβάλωμεν` ("cast out from the overseer''s office"). The draft translates it twice by rendering it as "from the overseer''s office" and then adding "its" to "gifts". It should only be translated once. | Adjudicator: The reviewer is correct that the current rendering double-translates the single genitive phrase `τῆς ἐπισκοπῆς` by applying it both to the verb `ἀποβάλωμεν` (''cast out from the overseer''s office'') and'
