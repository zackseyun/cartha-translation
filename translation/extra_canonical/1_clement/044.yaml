translation:
  text: And our apostles knew through our Lord Jesus Messiah that there would be strife over the name of the overseer’s office. Therefore, for this reason, since they had received complete foreknowledge, they appointed the men already mentioned, and afterward they gave a further provision, so that if they should fall asleep, other approved men might succeed to their ministry. Therefore we consider it unjust that those who were appointed by them, or afterward by other reputable men with the whole church consenting, and who have served the flock of the Messiah blamelessly, with humility, quietly, and without arrogance, and who for a long time have been well attested by all—such men should be removed from the ministry. For it will be no small sin for us if we cast out from the overseer’s office those who have offered the gifts blamelessly and devoutly. Blessed are the elders who went on before, who had a timely and complete departure; for they do not fear lest someone remove them from the place
    appointed to them. For we see that you have displaced some who were conducting themselves well from the ministry that had been blamelessly honored by them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over the office of oversight.' The Greek ἐπισκοπή can denote oversight or the office connected with it.
    reason: lexical_alternative
  - marker: b
    text: '''Fall asleep'' is a traditional Christian euphemism for death, retained here to preserve the text’s cadence and theological texture.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'offered its gifts' reflects sacrificial language in the Greek, presenting church office in liturgical-service terms rather than merely administrative ones.
    reason: cultural_note
  - marker: d
    text: '''Elders'' translates πρεσβύτεροι; some readers may prefer the transliteration ''presbyters.'''
    reason: lexical_alternative
  - marker: e
    text: Or 'from the ministry that had been honorably and blamelessly assigned to them.'.
    reason: previous_rendering
  - marker: f
    text: Or 'cast out from the overseer’s office those who have offered its gifts'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔρις
  chosen: strife
  alternatives:
  - quarrel
  - contention
  lexicon: BDAG
  rationale: '''Strife'' preserves the ecclesial and factional sense without sounding trivial; it fits Clement’s concern over conflict in church office.'
- source_word: ἐπισκοπῆς
  chosen: overseer’s office
  alternatives:
  - bishopric
  - oversight
  - office of oversight
  lexicon: BDAG
  rationale: The term denotes an office/function of oversight. 'Overseer’s office' preserves institutional force while avoiding later anachronistic assumptions tied to 'bishopric.'
- source_word: πρόγνωσιν εἰληφότες τελείαν
  chosen: having received complete foreknowledge
  alternatives:
  - having obtained full foreknowledge
  - having perfect foreknowledge
  lexicon: BDAG
  rationale: This keeps the strong claim of advance knowledge while rendering τελείαν as 'complete' rather than the more potentially misleading 'perfect.'
- source_word: κατέστησαν
  chosen: appointed
  alternatives:
  - installed
  - established
  lexicon: BDAG
  rationale: A standard rendering for formal placement into office; clear and ecclesially appropriate.
- source_word: ἐπινομὴν
  chosen: a further provision
  alternatives:
  - a supplementary rule
  - an additional arrangement
  lexicon: LSJ
  rationale: The rare term likely refers to an added directive or arrangement for succession. 'Further provision' is natural English and preserves the sense of deliberate institutional planning.
- source_word: κοιμηθῶσιν
  chosen: fall asleep
  alternatives:
  - die
  - depart
  lexicon: BDAG
  rationale: The euphemism is traditional Christian language for death and should be preserved for texture and theological cadence.
- source_word: διαδέξωνται
  chosen: might succeed to
  alternatives:
  - might take over
  - might succeed
  lexicon: BDAG
  rationale: This conveys orderly succession into office, an important point in Clement’s argument.
- source_word: λειτουργίαν
  chosen: ministry
  alternatives:
  - service
  - office
  lexicon: BDAG
  rationale: In this context it refers to ecclesial service/office. 'Ministry' preserves both sacred and functional dimensions.
- source_word: ἐλλογίμων
  chosen: reputable
  alternatives:
  - distinguished
  - esteemed
  lexicon: LSJ
  rationale: Describes men of recognized standing; 'reputable' is accessible and suitably formal.
- source_word: συνευδοκησάσης τῆς ἐκκλησίας πάσης
  chosen: with the whole church consenting
  alternatives:
  - with the approval of the whole church
  - the whole church having concurred
  lexicon: BDAG
  rationale: This captures the participial construction and the communal assent emphasized by Clement.
- source_word: ποιμνίῳ
  chosen: flock
  alternatives:
  - herd
  lexicon: BDAG
  rationale: '''Flock'' is the established pastoral metaphor in Christian usage and fits the ecclesial register.'
- source_word: ταπεινοφροσύνης
  chosen: humility
  alternatives:
  - lowliness of mind
  lexicon: BDAG
  rationale: Clear modern English that preserves the virtue term.
- source_word: ἡσύχως
  chosen: quietly
  alternatives:
  - peaceably
  - calmly
  lexicon: BDAG
  rationale: Retains the manner of service as uncontentious and restrained.
- source_word: ἀβαναύσως
  chosen: without arrogance
  alternatives:
  - without vulgarity
  - without coarseness
  - without self-assertion
  lexicon: LSJ
  rationale: The term is difficult; in this paraenetic list it likely points to unbecoming, pushy, or base conduct. 'Without arrogance' best fits the moral contrast with humility and quietness.
- source_word: μεμαρτυρημένους
  chosen: well attested
  alternatives:
  - well testified to
  - having a good witness
  lexicon: BDAG
  rationale: Conveys recognized good standing over time.
- source_word: ἀποβάλλεσθαι
  chosen: be removed
  alternatives:
  - be cast out
  - be deposed
  lexicon: BDAG
  rationale: A neutral but serious term for unjust expulsion from office; later in the chapter 'cast out' is retained for rhetorical force.
- source_word: προσενέγκοντας τὰ δῶρα τῆς ἐπισκοπῆς
  chosen: have offered its gifts
  alternatives:
  - have presented the offerings of the office
  - have discharged the offerings belonging to oversight
  lexicon: BDAG
  rationale: The sacrificial/service language should remain visible. 'Offered its gifts' preserves the cultic coloring of ecclesial office without over-paraphrase.
- source_word: ὁσίως
  chosen: devoutly
  alternatives:
  - holily
  - piously
  lexicon: BDAG
  rationale: '''Devoutly'' is readable modern English and preserves the religious-moral force.'
- source_word: πρεσβύτεροι
  chosen: elders
  alternatives:
  - presbyters
  lexicon: BDAG
  rationale: '''Elders'' is the transparent translation of the Greek and avoids importing later technical terminology unnecessarily.'
- source_word: προοδοιπορήσαντες
  chosen: went on before
  alternatives:
  - have gone before
  - departed earlier
  lexicon: LSJ
  rationale: This preserves the metaphor of preceding others, fitting the context of deceased elders.
- source_word: ἀνάλυσιν
  chosen: departure
  alternatives:
  - release
  - death
  lexicon: BDAG
  rationale: '''Departure'' preserves the dignified euphemistic expression for death.'
- source_word: μετηγάγετε
  chosen: have displaced
  alternatives:
  - have removed
  - have transferred away
  lexicon: LSJ
  rationale: The verb suggests moving persons away from their position; 'displaced' captures wrongful removal from office.
- source_word: καλῶς πολιτευομένους
  chosen: conducting themselves well
  alternatives:
  - living honorably
  - behaving nobly
  lexicon: BDAG
  rationale: Keeps the ethical-civic nuance of ordered conduct without sounding wooden.
- source_word: τετιμημένης
  chosen: honorably assigned
  alternatives:
  - honored
  - held in honor
  lexicon: BDAG
  rationale: The perfect participle indicates a ministry invested with honor; 'assigned' clarifies relation to office while preserving esteem.
theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Per project policy, titles are translated where context supports title-force. In 1 Clement the phrase 'our Lord Jesus Messiah' still bears titular meaning rather than functioning merely as a fixed surname.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Ecclesial office language for ἐπισκοπή / λειτουργία / πρεσβύτεροι
  chosen_reading: overseer’s office / ministry / elders
  alternative_readings:
  - bishopric / office / presbyters
  - oversight / service / presbyters
  rationale: This combination preserves the institutional and ecclesial texture of the passage while avoiding later denominationally loaded English where the Greek itself does not require it. Clement’s argument concerns ordered succession and legitimate ministry, which should remain explicit.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception.'
