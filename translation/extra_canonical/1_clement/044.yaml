id: 1CLEM.44
reference: 1 Clement 44
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Καὶ οἱ ἀπόστολοι ἡμῶν ἔγνωσαν διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, ὅτι ἔρις ἔσται ἐπὶ τοῦ ὀνόματος τῆς ἐπισκοπῆς. . διὰ ταύτην οὖν τὴν αἰτίαν πρόγνωσιν εἰληφότες τελείαν κατέστησαν τοὺς προειρημένους καὶ μεταξὺ ἐπινομὴν δεδώκασιν, ὅπως, ἐὰν κοιμηθῶσιν, διαδέξωνται ἕτεροι δεδοκιμασμένοι ἄνδρες τὴν λειτουργίαν αὐτῶν. 3. τοὺς οὖν κατασταθέντας ὑπ᾽ ἐκείνων ἢ μεταξὺ ὑφ᾽ ἑτέρων ἐλλογίμων ἀνδρῶν συνευδοκησάσης τῆς ἐκκλησίας πάσης, καὶ λειτουργήσαντας ἀμέμπτως τῷ ποιμνίῳ τοῦ Χριστοῦ μετὰ ταπεινοφροσύνης, ἡσύχως καὶ ἀβαναύσως, μεμαρτυρημένους τε πολλοῖς χρόνοις ὑπὸ πάντων, τούτους οὐ δικαίως νομίζομεν ἀποβάλλεσθαι τῆς λειτουργίας. 4. ἁμαρτία γὰρ οὐ μικρὰ ἡμῖν ἔσται, ἐὰν τοὺς ἀμέμπτως καὶ ὁσίως προσενέγκοντας τὰ δῶρα τῆς ἐπισκοπῆς ἀποβάλωμεν. 5. μακάριοι οἱ προοδοιπορήσαντες πρεσβύτεροι, οἵτινες ἔγκαιρον καὶ τελείαν ἔχον τὴν ἀνάλυσιν· οὐ γὰρ εὐλαβοῦνται, μή τις αὐτοὺς μεταστήσῃ ἀπὸ τοῦ δεδομένου αὐτοῖς τόπου. 6. ὁρῶμεν γάρ, ὅτι ἐνίους ὑμεῖς μετηγάγετε καλῶς πολιτευομένους ἐκ τῆς ἀμέμπτως αὐτοῖς
    τετιμημένης λειτουργίας.
  language: Greek
