source:
  edition: Funk 1901 (normalized OCR)
  text: οἱ γὰρ μετὰ φόβου καὶ ἀγάπης πολιτευόμενοι ἑαυτοὺς θέλουσιν μᾶλλον αἰκίαις
    περιπίπτειν ἢ τοὺς πλησίον· μᾶλλον δὲ ἑαυτῶν κατάγνωσιν φέρουσιν ἢ τῆς παραδεδομένης
    ἡμῖν καλῶς καὶ δικαίως ὁμοφωνίας.
  language: Greek
translation:
  text: For those who conduct themselves with fear and love desire rather to fall
    into mistreatment themselves than their neighbors; indeed, they bear condemnation
    of themselves rather than of the harmony that has been handed down to us well
    and justly.
