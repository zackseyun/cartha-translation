  category: mistranslation
  tier: 2
  from: desire rather to fall into mistreatment themselves than to bring it upon their
    neighbors
  to: desire that they themselves fall into mistreatment rather than their neighbors
  rationale: The Greek `ἢ τοὺς πλησίον` parallels `ἑαυτοὺς` as the accusative subject
