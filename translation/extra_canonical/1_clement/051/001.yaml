  from: And those who became leaders of revolt and division ought to consider the common good of our hope.
  to: And those, too, who became leaders of revolt and division ought to consider the common hope.
  rationale: 'The Greek `καὶ ἐκεῖνοι δέ` carries an additive force (''and those also'' or ''and those, too'') that connects the leaders of the rebellion to the preceding call for mutual forgiveness; the draft drops this connection. Additionally, `τὸ κοινὸν τῆς ἐλπίδος` is an idiom explicitly cited in BDAG (s.v. κοινός 3) as meaning ''the common hope'' (the substantive `τὸ κοινὸν` with the genitive functioning adjectivally). ''The common good of our hope'' is awkward in English and over-translates the phrase. | Azure: The proposed rewrite is closer to the Greek. First, καὶ ἐκεῖνοι δέ does have an additive/adversative force best represented by "those, too" or "those also," which the current rendering weakens by redu'
