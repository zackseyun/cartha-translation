translation:
  text: 'Therefore, whatever things we have done wrong and committed through some
    scheme of the adversary, let us ask that they be forgiven us. And those who became
    leaders of revolt and division ought to consider the common good of our hope.
    For those who live as citizens with fear and love desire rather to fall into mistreatment
    themselves than to bring it upon their neighbors; indeed, they would rather bear
    condemnation themselves than that of the harmony that has been handed down to
    us well and rightly. For it is good for a man to confess his transgressions rather
    than to harden his heart, just as the heart of those who rebelled against Moses,
    the attendant of God, was hardened—men whose judgment became plain. For they went
    down alive into Hades, and death will shepherd them. Pharaoh and his army and
    all the rulers of Egypt, both their chariots and those who rode in them, were
    sunk into the Red Sea and perished for no other cause than this: their senseless
    hearts were hardened after the signs and wonders had taken place in the land of
    Egypt through Moses, the attendant of God.'
  philosophy: optimal-equivalence
