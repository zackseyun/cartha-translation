lexical_decisions:
- source_word: παρεπέσαμεν
  chosen: have done wrong
  alternatives:
  - have fallen aside
  - have transgressed
  lexicon: LSJ
  rationale: The verb conveys falling into error or wrongdoing. 'Have done wrong'
    is idiomatic in English while preserving moral fault without over-specifying a
    legal category.
- source_word: τῶν τοῦ ἀντικειμένου
  chosen: schemes of the adversary
  alternatives:
  - devices of the opponent
  - things belonging to the adversary
  lexicon: LSJ
  rationale: The phrase is elliptical; διά τινος τῶν τοῦ ἀντικειμένου suggests agency
    through something associated with the opposing one. 'Schemes of the adversary'
    brings out hostile spiritual/moral influence without paraphrasing beyond the likely
    sense.
- source_word: ἀξιώσωμεν ἀφεθῆναι
  chosen: let us ask that they be forgiven us
  alternatives:
  - let us deem worthy to be forgiven
  - let us request release
  lexicon: BDAG
  rationale: In context the idiom means to request or entreat that forgiveness be
    granted. This is clearer than a wooden rendering of ἀξιόω.
- source_word: ἀρχηγοὶ στάσεως καὶ διχοστασίας
  chosen: leaders of revolt and division
  alternatives:
  - ringleaders of sedition and schism
  - originators of faction and dissension
  lexicon: BDAG
  rationale: ἀρχηγοί marks initiators or leaders; στάσις and διχοστασία are strong
    communal-disruption terms. 'Revolt and division' preserves the ecclesial seriousness
    in accessible English.
- source_word: τὸ κοινὸν τῆς ἐλπίδος
  chosen: the common good of our hope
  alternatives:
  - the common interest of hope
  - what is shared in hope
  lexicon: LSJ
  rationale: τὸ κοινόν can denote the common interest or common good. In this paraenetic
    context Clement urges regard for the shared welfare grounded in Christian hope.
- source_word: μετὰ φόβου καὶ ἀγάπης πολιτευόμενοι
  chosen: live as citizens with fear and love
  alternatives:
  - conduct themselves with fear and love
  - order their common life with fear and love
  lexicon: BDAG
  rationale: πολιτεύομαι carries civic-conduct nuance. 'Live as citizens' preserves
    the communal and ethical texture better than a generic 'behave,' while remaining
    understandable.
- source_word: αἰκίαις
  chosen: mistreatment
  alternatives:
  - abuses
  - outrages
  - injuries
  lexicon: LSJ
  rationale: The term denotes ill-treatment or abuse. 'Mistreatment' is broad enough
    for the context and avoids overly modern psychological connotations.
- source_word: κατάγνωσιν
  chosen: condemnation
  alternatives:
  - blame
  - adverse judgment
  lexicon: BDAG
  rationale: The noun indicates censure or judgment against someone. 'Condemnation'
    fits the moral-ecclesial register and balances the following concern for communal
    harmony.
- source_word: ὁμοφωνίας
  chosen: harmony
  alternatives:
  - concord
  - unity
  lexicon: LSJ
  rationale: Literally 'oneness of sound/mind'; 'harmony' preserves the rhetorical
    texture and communal resonance better than the flatter 'unity.'
- source_word: παραδεδομένης ἡμῖν
  chosen: handed down to us
  alternatives:
  - entrusted to us
  - delivered to us
  lexicon: BDAG
  rationale: The participle evokes tradition received. 'Handed down to us' preserves
    the ecclesial sense of inherited concord.
- source_word: ἐξομολογεῖσθαι
  chosen: to confess
  alternatives:
  - to acknowledge openly
  - to make confession
  lexicon: BDAG
  rationale: The verb here is penitential acknowledgment of sins. 'Confess' is concise
    and theologically appropriate.
- source_word: θεράποντα τοῦ θεοῦ
  chosen: the attendant of God
  alternatives:
  - the servant of God
  - the minister of God
  lexicon: LSJ
  rationale: θεράπων is not the common δοῦλος; it can denote an attendant or devoted
    servant with dignity. 'Attendant of God' preserves the distinct lexical choice
    and echoes biblical style.
- source_word: τὸ κρίμα πρόδηλον ἐγενήθη
  chosen: their judgment became plain
  alternatives:
  - their punishment became evident
  - their sentence was manifest
  lexicon: BDAG
  rationale: κρίμα can mean judgment or resulting sentence. 'Judgment became plain'
    keeps the ambiguity between verdict and punishment.
- source_word: ᾅδου
  chosen: Hades
  alternatives:
  - the grave
  - the underworld
  lexicon: BDAG
  rationale: As a proper term in Greek Jewish/Christian usage, 'Hades' is preferable
    to interpretive substitutes that collapse imagery.
- source_word: θάνατος ποιμανεῖ αὐτούς
  chosen: death will shepherd them
  alternatives:
  - death will rule them
  - death will tend them
  lexicon: LSJ
  rationale: The phrase echoes scriptural diction (Ps 49:14 LXX). 'Shepherd' preserves
    the striking metaphor rather than smoothing it away.
- source_word: ἀσυνέτους καρδίας
  chosen: senseless hearts
  alternatives:
  - foolish hearts
  - uncomprehending hearts
  lexicon: BDAG
  rationale: ἀσύνετος denotes lack of understanding. 'Senseless hearts' is vivid and
    idiomatic while retaining biblical cadence.
- source_word: σημεῖα καὶ τὰ τέρατα
  chosen: signs and wonders
  alternatives:
  - miraculous signs and portents
  lexicon: BDAG
  rationale: This is a standard biblical collocation and should be preserved consistently.
theological_decisions:
- issue: Identity and force of ὁ ἀντικείμενος
  chosen_reading: the adversary, with a hostile spiritual/moral sense left somewhat
    open
  alternative_readings:
  - the devil specifically
  - the opposing party in a more general sense
  rationale: The phrase likely points to hostile agency behind sin, but the text does
    not explicitly name Satan. 'Adversary' preserves the allusive force without over-defining
    the referent.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of τὸ κοινὸν τῆς ἐλπίδος
  chosen_reading: the common good of our hope
  alternative_readings:
  - the common interest of the hope
  - our shared hope itself
  rationale: The immediate paraenetic context concerns communal welfare and unity,
    so the phrase is rendered in a way that foregrounds shared ecclesial good while
    retaining the grounding in hope.
  doctrine_reference: Optimal equivalence; preserve ecclesial texture.
- issue: Rendering of θεράπων for Moses
  chosen_reading: attendant of God
  alternative_readings:
  - servant of God
  rationale: Using 'attendant' preserves the distinction from δοῦλος and reflects
    the dignified, scripturally resonant title applied to Moses.
  doctrine_reference: Consistency of key terms, or documented exception.
