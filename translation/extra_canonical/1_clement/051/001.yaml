  text: Ὅσα οὖν παρεπέσαμεν καὶ ἐποιήσαμεν διά τινος τῶν τοῦ ἀντικειμένου, ἀξιώσωμεν
    ἀφεθῆναι ἡμῖν· καὶ ἐκεῖνοι δέ, οἵτινες ἀρχηγοὶ στάσεως καὶ διχοστασίας ἐγενήθησαν,
    ὀφείλουσιν τὸ κοινὸν ₂₀ τῆς ἐλπίδος σκοπεῖν. 2. οἱ γὰρ μετὰ φόβου καὶ ἀγάπης πολιτευόμενοι
    ἑαυτοὺς θέλουσιν μᾶλλον αἰκίαις περιπίπτειν ἢ τοὺς πλησίον· μᾶλλον δὲ ἑαυτῶν κατάγνωσιν
    φέρουσιν ἢ τῆς παραδεδομένης ἡμῖν καλῶς καὶ δικαίως ὁμοφωνίας. 3. καλὸν γὰρ ἀνθρώπῳ
    ἐξομολογεῖσθαι περὶ τῶν παραπτωμάτων ἢ σκληρῦναι τὴν ₂₅ καρδίαν αὐτοῦ, καθὼς ἐσκληρύνθη
    ἡ καρδία τῶν στασιασάντων πρὸς τὸν θεράποντα τοῦ θεοῦ Μωϋσῆν, ὧν τὸ κρίμα πρόδηλον
    ἐγενήθη. 4. κατέβησαν γὰρ εἰς ᾅδου ζῶντες, καὶ θάνατος ποιμανεῖ αὐτούς. 5. Φαραὼ
    καὶ ἡ στρατιὰ αὐτοῦ καὶ πάντες οἱ ἡγούμενοι Αἰγύπτου, τά τε ἅρματα καὶ οἱ ἀναβάται
    αὐτῶν οὐ διʼ ἄλλην τινὰ αἰτίαν ἐβυθίσθησαν εἰς θάλασσαν ἐρυθρὰν καὶ ἀπώλοντο,
    ἀλλὰ διὰ τὸ σκληρυνθῆναι αὐτῶν τὰς ἀσυνέτους καρδίας μετὰ τὸ γενέσθαι τὰ σημεῖα
    καὶ τὰ τέρατα ἐν γῇ Αἰγύπτου διὰ τοῦ θεράποντος τοῦ θεοῦ Μωϋσέως.
