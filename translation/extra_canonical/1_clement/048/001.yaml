lexical_decisions:
- source_word: Ἐξάρωμεν
  chosen: put this away
  alternatives:
  - remove this
  - cast this off
  lexicon: LSJ
  rationale: The verb here is taken idiomatically in context as removing the present
    evil or factional condition just mentioned in the surrounding discourse. 'Put
    this away' is natural English while preserving the urgent hortatory force.
- source_word: δεσπότῃ
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: LSJ
  rationale: δεσπότης is stronger and more absolute than κύριος, stressing lordship
    and authority. 'Master' preserves the distinction from the later quotation's κύριος,
    rendered 'Lord'.
- source_word: ἵλεως γενόμενος
  chosen: having become gracious
  alternatives:
  - having become merciful
  - being propitious
  lexicon: BDAG
  rationale: The phrase asks for favorable divine disposition. 'Gracious' is accessible
    modern English and avoids overly technical sacrificial language, while still conveying
    mercy.
- source_word: ἐπικαταλλαγῇ
  chosen: be reconciled to us
  alternatives:
  - be fully reconciled to us
  - be appeased toward us
  lexicon: LSJ
  rationale: The compound intensifies καταλλάσσω-language of restored favor. 'Be reconciled
    to us' best captures relational restoration without importing later doctrinal
    formulas.
- source_word: σεμνὴν
  chosen: solemn
  alternatives:
  - dignified
  - noble
  - reverent
  lexicon: LSJ
  rationale: σεμνός carries gravity and moral dignity. 'Solemn' preserves the ecclesial
    seriousness of the community's brotherly love.
- source_word: φιλαδελφίας
  chosen: brotherly love
  alternatives:
  - brotherly affection
  - love of the brothers
  lexicon: BDAG
  rationale: This is the standard and transparent rendering of φιλαδελφία, preserving
    the familial ecclesial texture.
- source_word: ἀγωγήν
  chosen: conduct
  alternatives:
  - way of life
  - manner of life
  lexicon: LSJ
  rationale: The term denotes manner of life or behavior. 'Conduct' is concise and
    fits the paraenetic tone.
- source_word: πύλη ... εἰς ζωὴν
  chosen: gate ... into life
  alternatives:
  - gate ... for life
  - portal ... to life
  lexicon: LSJ
  rationale: The imagery is spatial and scriptural. 'Into life' preserves the metaphor
    of entry more vividly than a flatter rendering.
- source_word: ἐξομολογήσομαι
  chosen: I will give thanks
  alternatives:
  - I will confess
  - I will praise
  lexicon: BDAG
  rationale: In this psalmic citation the verb carries the sense of thankful praise
    to God, not confession of sins. 'Give thanks' best fits the context.
- source_word: ἡ ἐν δικαιοσύνῃ ... ἡ ἐν Χριστῷ
  chosen: the gate in righteousness—the one in the Messiah
  alternatives:
  - the righteous gate ... in Christ
  - the gate of righteousness ... in Christ
  lexicon: LSJ
  rationale: The repeated article marks identification and emphasis. Χριστῷ is rendered
    'the Messiah' per project philosophy for titular usage, while preserving the ecclesial-Christological
    force.
- source_word: κατευθύνοντες τὴν πορείαν
  chosen: direct their course
  alternatives:
  - make their path straight
  - guide their way
  lexicon: LSJ
  rationale: The phrase is metaphorical for ordering one's life. 'Direct their course'
    preserves the journey imagery and moral intentionality.
- source_word: ὁσιότητι
  chosen: holiness
  alternatives:
  - piety
  - devoutness
  lexicon: BDAG
  rationale: ὁσιότης denotes devout holiness or piety. 'Holiness' is the clearest
    and weightiest English equivalent here.
- source_word: ἀταράχως
  chosen: without turmoil
  alternatives:
  - peacefully
  - without disturbance
  - without agitation
  lexicon: LSJ
  rationale: Given the chapter's concern with faction and disorder, 'without turmoil'
    preserves both inward and communal tranquility better than the softer 'peacefully'.
- source_word: γνῶσιν ἐξεπεῖν
  chosen: expound knowledge
  alternatives:
  - speak knowledge fully
  - set forth knowledge
  lexicon: LSJ
  rationale: The phrase refers to articulating or explaining knowledge. 'Expound knowledge'
    keeps the elevated rhetorical register.
- source_word: διακρίσει λόγων
  chosen: discerning words
  alternatives:
  - discernment in speech
  - judging sayings
  lexicon: BDAG
  rationale: The phrase concerns wise discrimination in matters of speech or teaching.
    'Discerning words' is concise and preserves the genitival relation.
- source_word: ταπεινοφρονεῖν
  chosen: be humble
  alternatives:
  - think humbly
  - be lowly-minded
  lexicon: BDAG
  rationale: The verb denotes humility of mind and posture. 'Be humble' is idiomatic
    and sufficiently weighty.
- source_word: τὸ κοινωφελές
  chosen: what benefits all
  alternatives:
  - the common good
  - what is useful for the community
  lexicon: LSJ
  rationale: The term means what is advantageous in common. 'What benefits all' is
    clear, communal, and avoids overly abstract phrasing.
theological_decisions:
- issue: Rendering Χριστῷ in an early Christian paraenetic context
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  - the Anointed One
  rationale: Per project philosophy, titles are translated where context supports
    titular force. Here the phrase identifies the righteous gate with the Messiah
    in a theological, not merely name-like, sense.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Force of ἐπικαταλλαγῇ in prayer to God
  chosen_reading: be reconciled to us
  alternative_readings:
  - be appeased toward us
  - be favorably disposed toward us
  rationale: The Greek emphasizes restored relationship and favor. 'Be reconciled
    to us' preserves the relational dimension without overcommitting to a technical
    atonement model.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Generic singular τις / masculine paraenesis
  chosen_reading: Let a man be faithful
  alternative_readings:
  - Let anyone be faithful
  - If someone is faithful
  rationale: The source uses masculine singular paraenetic style. Following gender-accurate
    policy, 'a man' preserves the form and rhetorical cadence, while the context clearly
    has representative force.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
