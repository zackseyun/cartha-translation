  from: Yet by so much the more he ought to be humble, by as much as he seems to be
    greater
  to: For he ought to be all the more humble, the greater he seems to be
  rationale: The Greek conjunction `γὰρ` is explanatory ("For"), not adversative ("Yet").
    The author is arguing that the possession of the spiritual gifts listed in 48:5
    is the very reason one must be humble; translating it as "Yet" obscures this logical
    flow. Additionally, the proportional correlative `τοσούτῳ μᾶλλον... ὅσῳ μᾶλλον`
    is rendered with the clunky and archaic "by so much the more... by as much as."
    Standard English idiom ("all the more... the greater") conveys the author's meaning
    much more naturally without losing any semantic force.
