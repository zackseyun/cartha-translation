  from: this is the gate in righteousness—the one in the Messiah
  to: this gate in righteousness is the one in Christ
  rationale: 'The Greek `ἡ ἐν δικαιοσύνῃ αὕτη ἐστὶν ἡ ἐν Χριστῷ` is more directly ''this [gate] in righteousness is the [gate] in Christ.'' Additionally, translating `Χριστῷ` as ''the Messiah'' in a late 1st-century Roman epistle to Corinth over-translates the etymology, losing the established proper-noun usage of the Pauline phrase ''ἐν Χριστῷ'' (in Christ). | Azure: The proposed rewrite is closer to the Greek syntax and idiom. In πολλῶν οὖν πυλῶν ἀνεῳγυιῶν ἡ ἐν δικαιοσύνῃ αὕτη ἡ ἐστὶν ἡ ἐν Χριστῷ, the repeated feminine article with ellipsis clearly yields ''[gate]'
