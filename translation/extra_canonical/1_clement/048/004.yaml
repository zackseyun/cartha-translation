  from: who entered through it and who direct
  to: who have entered through it and direct
  rationale: 'The Greek pairs an aorist participle (εἰσελθόντες) with a present participle (κατευθύνοντες). ''Have entered'' better captures the antecedent action that leads to the ongoing present action of directing their course, whereas ''entered'' sounds like a disconnected past narrative event. | Azure: The proposed change is better grounded in the Greek syntax. μακάριοι πάντες οἱ εἰσελθόντες καὶ κατευθύνοντες pairs an aorist participle (εἰσελθόντες, prior/ingressive action) with a present participle'
