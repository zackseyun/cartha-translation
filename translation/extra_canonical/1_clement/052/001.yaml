lexical_decisions:
- source_word: Ἀπροσδεής
  chosen: without need
  alternatives:
  - in need of nothing
  - self-sufficient
  lexicon: LSJ
  rationale: The adjective denotes having no need or want. 'Without need' preserves
    the predicative force and rhetorical compactness better than the more interpretive
    'self-sufficient.'
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: LSJ
  rationale: Here the term is not κύριος but δεσπότης, so 'Master' preserves the distinct
    lexical choice and the authority nuance. 'Sovereign' is possible but less direct
    and less personal in this paraenetic context.
- source_word: χρῄζει
  chosen: has need
  alternatives:
  - needs
  - requires
  lexicon: LSJ
  rationale: Using 'has need' mirrors the Greek idiom and keeps the elevated cadence.
    'Requires' would overstate compulsion.
- source_word: ἐξομολογεῖσθαι
  chosen: that confession be made to him
  alternatives:
  - to give thanks to him
  - to praise him openly
  lexicon: LSJ
  rationale: In biblical Greek the verb can mean confess, acknowledge, or give thanks/praise.
    Because Clement immediately cites Psalms where the term carries public acknowledgment
    and praise, 'confession' preserves the lexical link while remaining broad enough
    to include thankful praise.
- source_word: ἐκλεκτὸς
  chosen: chosen
  alternatives:
  - elect
  lexicon: LSJ
  rationale: '''Chosen'' is natural modern English and preserves the theological sense
    without importing later technical overtones that ''elect'' may carry.'
- source_word: ἀρέσει
  chosen: it will please him
  alternatives:
  - it is pleasing to him
  - he will delight in it
  lexicon: LSJ
  rationale: Future sense fits the citation naturally and keeps the sacrificial comparison
    clear.
- source_word: μόσχον νέον
  chosen: a young bull
  alternatives:
  - a young calf
  - a bullock
  lexicon: LSJ
  rationale: The phrase refers to a youthful bovine sacrificial animal; 'young bull'
    is clear, contemporary, and weightier than 'calf.'
- source_word: κέρατα ἐκφέροντα καὶ ὁπλάς
  chosen: bringing forth horns and hoofs
  alternatives:
  - with horns and hoofs
  - bearing horns and hoofs
  lexicon: LSJ
  rationale: The participial phrase is somewhat vivid and concrete; 'bringing forth'
    preserves that imagery more closely than flattening it to a simple adjectival
    phrase.
- source_word: πτωχοὶ
  chosen: the poor
  alternatives:
  - the lowly
  - the afflicted
  lexicon: LSJ
  rationale: The basic sense is 'poor,' and the Psalmic citation should retain that
    concrete social-religious register unless context demands metaphorical expansion.
- source_word: Θῦσον
  chosen: Offer
  alternatives:
  - Sacrifice
  - Present
  lexicon: LSJ
  rationale: As an imperative introducing sacrificial language, 'Offer' is idiomatic
    in English while preserving cultic force.
- source_word: θυσίαν αἰνέσεως
  chosen: a sacrifice of praise
  alternatives:
  - a thank-offering of praise
  - a sacrifice of thanksgiving
  lexicon: LSJ
  rationale: This is a well-established biblical phrase, and 'praise' best matches
    αἴνεσις here while maintaining recognizability and cadence.
- source_word: εὐχάς
  chosen: vows
  alternatives:
  - prayers
  - pledges
  lexicon: LSJ
  rationale: In sacrificial and Psalmic context, εὐχαί commonly refers to vowed offerings
    or vows rather than general prayers. 'Vows' best fits the parallelism.
- source_word: θλίψεώς
  chosen: affliction
  alternatives:
  - trouble
  - distress
  lexicon: LSJ
  rationale: '''Affliction'' preserves the biblical register and gravity of the appeal
    to God.'
- source_word: ἐξελοῦμαί
  chosen: I will deliver you
  alternatives:
  - I will rescue you
  - I will bring you out
  lexicon: LSJ
  rationale: '''Deliver'' is the standard biblical equivalent and suits the Psalm
    citation''s cadence.'
- source_word: πνεῦμα συντετριμμένον
  chosen: a broken spirit
  alternatives:
  - a crushed spirit
  - a contrite spirit
  lexicon: LSJ
  rationale: The phrase echoes familiar Psalmic language. 'Broken spirit' is both
    accurate and rhetorically strong; 'contrite spirit' is interpretive and shifts
    from the concrete participle.
theological_decisions:
- issue: Meaning of ἐξομολογεῖσθαι in v.1
  chosen_reading: confession/acknowledgment made to God, encompassing thankful praise
  alternative_readings:
  - give thanks to him
  - praise him
  rationale: The immediate Psalm citations use the same biblical diction in contexts
    of public praise and acknowledgment before God. Rendering with 'confession' preserves
    the lexical continuity while allowing the broader worshipful sense.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
- issue: Rendering δεσπότης distinctly from κύριος
  chosen_reading: Master of all
  alternative_readings:
  - Lord of all
  - Sovereign of all
  rationale: Clement's wording distinguishes δεσπότης from the quoted κύριος. Preserving
    that distinction aids auditability and respects original-language primacy.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    consistency of key terms, or documented exception.'
