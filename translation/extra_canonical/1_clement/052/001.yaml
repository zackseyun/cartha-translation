  from: he has need of nothing
  to: he needs nothing from anyone
  rationale: 'The Greek `οὐδενὸς οὐδὲν χρῄζει` contains both a genitive (`οὐδενὸς`) and an accusative (`οὐδὲν`). This double-pronoun construction means ''he needs nothing from anyone'' or ''he requires nothing of anyone''. The draft''s ''he has need of nothing'' flattens this and loses the relational emphasis that sets up the exception: the only thing God wants *from people* is their confession. | Azure: The proposed change is closer to the Greek. In `οὐδενὸς οὐδὲν χρῄζει`, `χρῄζειν` regularly takes a genitive of the person or thing needed, and here Clement uses a rhetorically emphatic double negative'
