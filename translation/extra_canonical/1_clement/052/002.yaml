  from: bringing forth horns and hoofs
  to: growing horns and hooves
  rationale: 'The participle ἐκφέροντα applied to horns and hooves means ''growing'' or ''putting forth.'' In modern English, animals do not ''bring forth'' horns (which sounds like giving birth to them); they grow them. Additionally, ''hooves'' is the more standard modern plural. | Azure: The proposed change is closer to the Greek. The phrase μόσχον νέον κέρατα ἐκφέροντα καὶ ὁπλάς echoes LXX Psalm 68(69):32, where ἐκφέροντα with κέρατα and ὁπλάς means an animal ''putting forth'' or ''grow'
