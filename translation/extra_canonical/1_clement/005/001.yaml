  rationale: 'The English idiom ''to stop with X'' typically means ''to conclude a list by mentioning X'', which is the exact opposite of Clement''s intent here (he is transitioning away from the ancients to recent figures). The Greek `παυσώμεθα` with the genitive `τῶν ἀρχαίων ὑποδειγμάτων` means ''to cease from'' or ''leave off'' the ancient examples. | Azure: The proposed change is closer to the Greek. In Ἀλλʼ ἵνα τῶν ἀρχαίων ὑποδειγμάτων παυσώμεθα, the verb παυσώμεθα means "let us stop/cease," and with the genitive τῶν ἀρχαίων ὑποδειγμάτων it naturally me'
