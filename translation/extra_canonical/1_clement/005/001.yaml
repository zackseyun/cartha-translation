lexical_decisions:
- source_word: ἀθλητάς
  chosen: athletes
  alternatives:
  - champions
  - contestants
  lexicon: LSJ
  rationale: Retains the agonistic metaphor that is central to the chapter's paraenetic
    force; 'athletes' is natural English and preserves the image better than a flattened
    'heroes'.
- source_word: ὑποδείγματα
  chosen: examples
  alternatives:
  - patterns
  - models
  lexicon: BDAG
  rationale: Clear modern English that still preserves the exemplary function of the
    term; repeated to maintain rhetorical cohesion.
- source_word: ζῆλον
  chosen: jealousy
  alternatives:
  - zeal
  lexicon: BDAG
  rationale: In this context paired with φθόνος and ἔρις, the negative sense is demanded;
    'zeal' would obscure the vice being condemned.
- source_word: φθόνον
  chosen: envy
  alternatives:
  - jealousy
  lexicon: BDAG
  rationale: Differentiates it from ζῆλος while preserving the vice-pairing in the
    Greek.
- source_word: στῦλοι
  chosen: pillars
  alternatives:
  - supports
  - leaders
  lexicon: LSJ
  rationale: Preserves the metaphorical ecclesial dignity of the term and echoes early
    Christian usage for foundational figures.
- source_word: ἤθλησαν
  chosen: contended
  alternatives:
  - struggled
  - fought as athletes
  lexicon: LSJ
  rationale: Keeps the athletic/contest imagery linked to ἀθλητάς while reading smoothly
    in English.
- source_word: ἀγαθοὺς ἀποστόλους
  chosen: the good apostles
  alternatives:
  - the noble apostles
  - the worthy apostles
  lexicon: BDAG
  rationale: A direct rendering that preserves the commendatory tone without overinterpreting.
- source_word: ἄδικον
  chosen: unrighteous
  alternatives:
  - unjust
  - wrongful
  lexicon: BDAG
  rationale: Maintains moral-religious coloring rather than reducing the term to merely
    legal injustice.
- source_word: πόνους
  chosen: sufferings
  alternatives:
  - toils
  - hardships
  - pains
  lexicon: BDAG
  rationale: Best fits the persecution context and reads naturally in English.
- source_word: μαρτυρήσας
  chosen: having borne witness
  alternatives:
  - having testified
  - having suffered martyrdom
  lexicon: BDAG
  rationale: Keeps the verbal sense of witness while allowing the martyrdom resonance
    to remain implicit rather than forcing a later technical meaning into the main
    text.
- source_word: ὀφειλόμενον τόπον τῆς δόξης
  chosen: the place of glory that was due him
  alternatives:
  - his appointed place of glory
  - the deserved place of glory
  lexicon: LSJ
  rationale: Attempts to preserve ὀφειλόμενον ('owed/due') without sounding crassly
    merit-based; the phrase conveys fitting divine vindication.
- source_word: ἔριν
  chosen: strife
  alternatives:
  - contention
  - rivalry
  lexicon: BDAG
  rationale: A standard rendering that pairs well with 'jealousy' and preserves the
    social-disruptive nuance.
- source_word: ὑπομονῆς βραβεῖον
  chosen: the prize of endurance
  alternatives:
  - the reward of perseverance
  lexicon: BDAG
  rationale: Keeps the contest metaphor alive through βραβεῖον while using accessible
    English.
- source_word: δεσμὰ φορέσας
  chosen: having worn chains
  alternatives:
  - having borne chains
  - having been imprisoned
  lexicon: LSJ
  rationale: The vivid idiom is preserved rather than generalized to imprisonment.
- source_word: φυγαδευθείς
  chosen: having been driven into exile
  alternatives:
  - having been banished
  - having been pursued as a fugitive
  lexicon: LSJ
  rationale: Captures the passive force and displacement implied by the verb.
- source_word: κῆρυξ
  chosen: a herald
  alternatives:
  - a preacher
  - a proclaimer
  lexicon: BDAG
  rationale: Preserves the formal proclamation nuance and avoids narrowing the term
    to later ecclesial office language.
- source_word: κλέος
  chosen: renown
  alternatives:
  - glory
  - fame
  lexicon: LSJ
  rationale: Conveys honorable reputation without confusing it with δόξα earlier in
    the chapter.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  lexicon: BDAG
  rationale: Default project rendering is 'faith'; here it likely includes steadfast
    fidelity, but 'faith' in the main text preserves the broader theological range.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Follows project default and suits the moral-teaching context; 'justice'
    remains a viable alternative but is less likely here.
- source_word: τὸ τέρμα τῆς δύσεως
  chosen: the farthest limit of the west
  alternatives:
  - the end of the west
  - the western extremity
  lexicon: LSJ
  rationale: Preserves the geographic-rhetorical force of the phrase without overcommitting
    to a specific location in the main text.
- source_word: ἐπὶ τῶν ἡγουμένων
  chosen: before the rulers
  alternatives:
  - before the governors
  - before the authorities
  lexicon: BDAG
  rationale: A broad rendering that fits the likely sense of governing officials without
    specifying an office not named in the Greek.
- source_word: ἀπηλλάγη τοῦ κόσμου
  chosen: he was released from the world
  alternatives:
  - he departed from the world
  - he was freed from the world
  lexicon: BDAG
  rationale: Preserves the passive nuance and the sense of departure without euphemistically
    flattening the expression.
- source_word: τὸν ἅγιον τόπον
  chosen: the holy place
  alternatives:
  - the sacred place
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the solemnity and leaves the
    referent appropriately elevated rather than overdefined.
- source_word: ὑπογραμμός
  chosen: pattern
  alternatives:
  - example
  - model
  - copy
  lexicon: BDAG
  rationale: Conveys an exemplary template to be followed; 'pattern' avoids redundancy
    with earlier 'examples' while preserving paraenetic force.
theological_decisions:
- issue: Meaning of μαρτυρήσας for Petros and Paulos
  chosen_reading: Rendered as 'having borne witness' in both cases, allowing martyrdom
    resonance without making the later technical sense explicit in the main text.
  alternative_readings:
  - having testified
  - having suffered martyrdom
  rationale: The verb can carry the sense that later developed into 'martyrdom,' especially
    in these contexts, but the Greek itself still naturally reads as witness-bearing.
    The translation preserves the lexical sense while allowing readers to hear the
    historical implication.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of ὀφειλόμενον in Petros's destination
  chosen_reading: Translated 'the place of glory that was due him.'
  alternative_readings:
  - his appointed place of glory
  - the deserved place of glory
  rationale: The wording suggests a fitting or owed destination after faithful suffering.
    'Due him' preserves the lexical force while avoiding a stronger claim about merit
    than the text requires.
  doctrine_reference: Original-language primacy over translation tradition.
- issue: Reference of τὸ τέρμα τῆς δύσεως
  chosen_reading: Rendered generically as 'the farthest limit of the west' without
    identifying a specific city or region.
  alternative_readings:
  - Spain
  - Rome
  - the western regions
  rationale: The phrase is rhetorically geographic but not explicit enough in the
    chapter itself to justify a specific identification in the main text. A footnote
    can note common proposals.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of δικαιοσύνην in Paul's teaching
  chosen_reading: Rendered 'righteousness.'
  alternative_readings:
  - justice
  rationale: In this Christian paraenetic context, 'righteousness' better preserves
    the moral and theological breadth of the term, while 'justice' remains a plausible
    narrower alternative.
  doctrine_reference: Consistency of key terms, or documented exception.
