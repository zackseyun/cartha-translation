translation:
  text: 'But to stop with the examples of the ancients, let us come to the athletes
    who lived nearest to our own time. Let us take the noble examples from our own
    generation. Because of jealousy and envy, the greatest and most righteous pillars
    were persecuted and contended even to death. Let us set before our eyes the good
    apostles: Petros, who because of unrighteous jealousy endured not one or two but
    many sufferings, and so, having borne witness, went to the place of glory that
    was due him. Because of jealousy and strife, Paulos showed what is the prize of
    endurance: having worn chains seven times, having been driven into exile, having
    been stoned, having become a herald both in the east and in the west, he received
    the noble renown of his faith, having taught righteousness to the whole world
    and having come to the farthest limit of the west; and having borne witness before
    the rulers, so he was released from the world and went to the holy place, having
    become the greatest pattern of endurance.'
  philosophy: optimal-equivalence
