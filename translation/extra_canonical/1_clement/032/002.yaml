id: 1CLEM.32.2
reference: 1 Clement 32:2
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: ἐξ αὐτοῦ γὰρ ἱερεῖς καὶ λευῖται πάντες οἱ λειτουργοῦντες τῷ θυσιαστηρίῳ τοῦ θεοῦ· ἐξ αὐτοῦ ὁ κύριος Ἰησοῦς τὸ κατὰ σάρκα· ἐξ αὐτοῦ βασιλεῖς καὶ ἄρχοντες καὶ ἡγούμενοι κατὰ τὸν Ἰούδαν· τὰ δὲ λοιπὰ σκῆπτρα αὐτοῦ οὐκ ἐν μικρᾷ δόξῃ ὑπάρχουσιν, ὡς ἐπαγγειλαμένου τοῦ θεοῦ, ὅτι ἔσται τὸ σπέρμα σου ὡς οἱ ἀστέρες τοῦ οὐρανοῦ.
  language: Greek
translation:
  text: For from him are priests and Levites, all who minister at the altar of God; from him is the Lord Jesus according to the flesh; from him are kings and rulers and leaders according to Judah; and his remaining tribes are in no small glory, just as God promised, saying, “Your seed will be as the stars of heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are not in small glory'.
    reason: previous_rendering
