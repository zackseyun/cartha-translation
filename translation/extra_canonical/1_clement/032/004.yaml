  text: καὶ ἡμεῖς οὖν, διὰ θελήματος αὐτοῦ ἐν Χριστῷ Ἰησοῦ κληθέντες, οὐ δι’ ἑαυτῶν
    δικαιούμεθα οὐδὲ διὰ τῆς ἡμετέρας σοφίας ἢ συνέσεως ἢ εὐσεβείας ἢ ἔργων ὧν κατειργασάμεθα
    ἐν ὁσιότητι καρδίας, ἀλλὰ διὰ τῆς πίστεως, δ’ ἧς πάντας τοὺς ἀπ’ αἰῶνος ὁ παντοκράτωρ
    θεὸς ἐδικαίωσεν· ᾧ ἔστω ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
  language: Greek
translation:
  text: And so we also, having been called through his will in Messiah Jesus, are
    not justified through ourselves, nor through our own wisdom or understanding or
    godliness or works that we have done in holiness of heart, but through faith,
    by which the Almighty God justified all who have been from the beginning. To him
    be the glory forever and ever. Amen.
