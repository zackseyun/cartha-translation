translation:
  text: And so we also, having been called through his will in Christ Jesus, are not
    justified by ourselves, nor by our own wisdom or understanding or godliness or
    works that we have done in holiness of heart, but through faith, by which the
    Almighty God has justified all who have been from the beginning. To him be the
    glory forever and ever. Amen.
