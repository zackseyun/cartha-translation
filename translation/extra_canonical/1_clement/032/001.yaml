  rationale: 'The Greek is `Ὃ ἐάν τις... κατανοήσῃ` (If anyone considers this...). The draft turns the conditional `ἐάν τις` into ''Whoever'' and misses the relative pronoun `Ὃ` (which/this) acting as the direct object. It also misconstrues the adverbial phrase `καθ’ ἓν ἕκαστον` (point by point / individually) as the direct object (''each thing''). | Azure: The proposed change is better grounded in the Greek syntax. The text reads Ὃ ἐὰν τις … κατανοήσῃ, ἐπιγνώσεται…, where Ὃ is the object (''this/which''), while ἐάν τις introduces the conditional protasis '
