  rationale: 'The Latin `incendebatur` is in the imperfect tense, indicating an ongoing process ("was burning" or "was being burned"). The draft''s "was burned up" implies a completed action, which flattens the ongoing visionary tableau. | Azure: The proposed change is supported by the Latin grammar. In 4 Ezra 12:2, *incendebatur* is imperfect passive (or deponent-like in sense from *incendo*), describing the body of the eagle as in the proces'
