  rationale: The Latin source for verse 7 concludes with 'et ostende seruo tuo mihi' ('and show me, your servant'). The draft omits this clause from verse 7 (shifting it to verse 8). It must be restored to verse 7 to align with the source versification. Additionally, 'dominator domine' (split across v. 6 and 7) reflects the Greek δέσποτα κύριε (Hebrew אדני יהוה); 'O Sovereign Lord' is a more accurate and natural rendering of this apocalyptic title than 'Lord, Master'.
