  from: the great excess of my mind
  to: a deep trance
  rationale: The Latin phrase 'excessus mentis' is a standard idiom (often translating the Greek ἔκστασις) meaning 'trance,' 'ecstasy,' or 'bewilderment/agitation of mind.' Translating it literally as 'excess of my mind' is opaque in English and fails to convey the visionary or psychological state from which Ezra is waking ('uigilaui'). 'A deep trance' or 'great bewilderment of mind' accurately captures the author's intent.
