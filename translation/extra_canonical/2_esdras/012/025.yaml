  rationale: 'The Latin ''recapitulabunt'' (likely reflecting Greek ἀνακεφαλαιώσονται) plays on ''capita'' (''heads'') in the previous verse. In this apocalyptic context, the verb means to bring sins to their full measure or climax. ''Sum up'' sounds like a verbal summary. ''Bring to a head'' perfectly captures both the apocalyptic consummation of evil and the author''s deliberate pun on ''heads''. | Azure: In 4 Ezra 12:25 the Latin verb is explicitly recapitulabunt, whose basic force is not merely ''summarize'' in the modern verbal sense but ''bring together under a head,'' ''sum up,'' and in context can deno'
