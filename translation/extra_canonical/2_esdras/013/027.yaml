  rationale: 'Azure-modified: In 4 Ezra 13:27 the Latin reads plainly: "de ore eius exire ut spiritum et ignem et tempestatem." The reviewer is right that the current English drops the comparative marker ut, which here introduces visionary likeness (''like/as it were''), an important apocalyptic nuance. The reviewer is also right that spiritum in this context is better rendered ''breath'' (or possibly ''wind'') than ''spirit'': what proceeds from the mouth alongside fire and tempest is an emitted destructive force, matching the imag'
