source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned
    Latin
  text: 'dinem earum quae collectae sunt gentes, proteget qui superauerit populum,
    Et tunc ostendet eis multa plurima portenta. Et dixi ego : dominator domine, hoc
    mihi ostende, propter quod uidi uirum ascendentem de corde maris. et dixit mihi
    : Sicut non potest hoc uel scrutinare uel scire quis, quid sit in profundo maris,
    sic non poterit quisquam super terram uidere filium meum uel eos qui cum eo sunt
    nisi in tempore diei. Haec est interpretatio somnii quod uidisti, et propter hoc
    inluminatus es haec solus. Dereliquisti enim tua, et circa mea uacasti, et legem
    meam exquisisti ; Vitam enim tuam disposuisti in sapientiam, et sensum tuum uocasti
    matrem. Et propter hoc ostendi tibi haec, merces enim apud altissimum. erit enim
    post alios tres dies ad te alia loquar, et exponam tibi grauia et mirabilia. Et
    profectus sum et transii in campum, multum glorificans et laudans altissimum de
    mirabilibus quae per tempus faciebat, Et quoniam gubernat tempora et quae sunt
    in temporibus inlata : et sedi ibi tribus diebus.'
  language: Latin
translation:
  text: Then it will be, when he begins to destroy the gathered multitude of the nations,
    that he will protect the people who survive.
  philosophy: optimal-equivalence
