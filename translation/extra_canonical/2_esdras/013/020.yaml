  from: Yet it is easier for one in danger to come into these things than to pass through life like a cloud and not see what has happened in the end.”
  to: 'Yet it is easier for one in danger to come into these things than to pass from the world like a cloud and not see what has happened in the end.” And he answered me and said:'
  rationale: The Latin "pertransire ... a saeculo" means "to pass away from the world" (i.e., to die), using the ablative of separation "a saeculo" (from the age/world). Translating this as "pass through life" distorts the author's contrast between those who are left alive and those who die before the end, making it sound like drifting aimlessly through life rather than departing from it. Additionally, the source text includes the narrative frame "Et respondit ad me et dixit:" at the end, which the draft omits (likely moving it to verse 21 for traditional English versification, but it must be translated here to match the provided source string).
