  from: And behold, a wind arose from the sea, to stir up all its waves.
  to: And behold, a wind arose from the sea, to stir up all its waves. And I looked, and behold, that wind brought up out of the heart of the sea something like the figure of a man.
  rationale: 'The Latin text suffers from a major, universally recognized lacuna here, omitting the introduction of the ''man from the sea.'' This omission makes the Latin of verse 3 (''ipse homo'', ''that man'') nonsensical, as the man has not yet been introduced. Following the project guidelines to triangulate with the daughter versions when the Latin is corrupt, the missing clause must be restored from the Syriac and Ethiopic (e.g., Syriac: ''And I looked, and behold, that wind brought up out of the heart of the sea as it were the likeness of a man''). Without this, the central figure of the entire chapter 13 vision is missing from his own introduction.'
