  text: 'multitudo tempestatis. Et concidit super multitudinis impetum quod paratum
    erat pugnare, et succendit omnes, ut subito nihil uideretur de innumerabili multitudine
    nisi solummodo puluis cineris et fumi odor. et uidi et extiti. Et post haec uidi
    ipsum hominem descendentem de monte et aduocantem ad se multitudinem aliam pacificam.
    Et accedebant ad eum uultus hominum multorum, quorundam gaudentium, quorundam
    tristantium, aliqui uero alligati, aliqui adducentes ex eis qui offerebantur.
    et ego a multitudine pauoris expergefactus sum et deprecatus sum altissimum et
    dixi : Tu ab initio demonstrasti seruo tuo mirabilia haec, et dignum me habuisti
    ut susciperes deprecationem meam; Et nunc demonstra mihi'
  language: Latin
translation:
  text: And all these were mixed together—the wave of fire, the breath of flame, and
    the great storm—and it fell upon the assault of the multitude that had prepared
    to fight, and burned them all up, so that suddenly nothing could be seen of the
    innumerable multitude except only the dust of ashes and the smell of smoke. And
    I saw it and was astonished.
  philosophy: optimal-equivalence
