  rationale: 'Azure-modified: The rationale is substantially correct that Latin *usque in nouissimo tempore* is eschatological in this 4 Ezra context and that current English "until the last time" is misleading, since it readily suggests "the previous occasion" rather than the final age. However, the proposed "the last times" is not the closest rendering of the singular Latin *nouissimo tempore*; *tempore* is singular, "at/in the very last time" or "at the end time." A singular eschatological expression better reflects the s'
