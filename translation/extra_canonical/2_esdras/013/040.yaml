  text: terra sua in diebus Iosiae regis, quem captiuum duxit Salmanassar rex Assyriorum, et transtulit eos trans flumen, et translati sunt in terram aliam. Ipsi autem sibi dederunt
  language: Latin
translation:
  text: these are the ten tribes that were led away captive from their own land in the days of King Hoshea, whom Shalmaneser king of the Assyrians led away captive; and he carried them across the River, and they were taken into another land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '40'
    text: The Latin here reads ‘in the days of King Josiah,’ even though the historical setting is the Assyrian exile of the northern tribes. The translation keeps the Latin name and leaves the apparent historical error visible rather than silently emending it to Hoshea.
    reason: textual_variant
  - marker: a
    text: Or 'these are the ten tribes that were led away captive from their own land in the days of King Josiah'.
    reason: previous_rendering
