  from: these are the ten tribes that were led away captive from their own land in the days of King Josiah
  to: these are the ten tribes that were led away captive from their own land in the days of King Hoshea
  rationale: The author of 4 Ezra, a knowledgeable Jewish writer, originally wrote 'Hoshea' (the king of the northern kingdom during the Assyrian exile), which is preserved in the Syriac, Ethiopic, and Arabic daughter versions. The Latin 'Iosiae' (Josiah) is a well-known scribal corruption in the Latin transmission, not the author's original text. Since the translation's goal is authorial intent, and the instructions specify triangulating with daughter versions where the Latin is corrupt, the main text must reflect the author's intended 'Hoshea'.
