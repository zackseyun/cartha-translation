  rationale: The Latin 'occurrentes' here (likely reflecting a Greek word for 'attain' or 'reach', as supported by the Syriac and Ethiopic versions) means 'attaining' or 'reaching', not 'meeting'. Additionally, 'eis' is plural, referring back to 'quae' (the things stored up), so it should be rendered as 'them' rather than 'it'.
