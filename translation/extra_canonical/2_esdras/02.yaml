source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned
    Latin
  text: '1 Haec dicit dominus : ego eduxi populum istum de seruitute, quibus mandata
    dedi per pueros meos prophetas, quos audire noluerunt, sed irrita fecerunt mea
    consilia.

    2 Mater, quae eos generauit, dicit illis : ite, filii, quia ego uidua sum et derelicta
    :

    3 Educaui uos cum laetitia et amisi uos cum luctu et tristitia,

    4 quoniam peccastis coram domino deo et quod malum est coram me fecistis. Modo
    autem quid faciam uobis? ego enim uidua sum et derelicta: ite, filii, et petite
    a domino

    5 misericordiam. Ego autem te, pater, testem inuoco super matrem filiorum, quia
    noluerunt testamentum meum seruare,

    6 Vt des eis confusionem et matrem eorum in direptionem, ne

    7 generatio eorum fiat. Dispergantur in gentes, nomina eorum deleantur a terra,
    quoniam spreuerunt testamentum meum.

    8 Vae tibi, Assur, qui abscondis iniquos penes te! gens mala,

    9 memorare quid fecerim Sodomae et Gomorrae, Quorum terra iacet in picis glebis
    et aggeribus cinerum: sic dabo eos qui me non audierunt, dicit dominus omnipotens.

    10 Haec dicit dominus ad Ezram: adnuntia populo meo, quoniam dabo eis regnum Hierusalem,
    quod daturus eram Israel.

    11 Et sumam mihi gloriam illorum et dabo eis tabernacula aeterna,

    12 quae praeparaueram illis. Lignum uitae erit illis in odorem unguenti, et non
    laborabunt neque fatigabuntur.

    13 Petite et accipietis, rogate uobis dies paucos ut minorentur; iam paratum est
    uobis regnum: uigilate.

    14 Testare, testare caelum et terram, omisi enim malum et creaui bonum, quia uiuo
    ego, dicit dominus.

    15 Mater, complectere filios tuos, educa illos cum laetitia sicut columba, confirma
    pedes eorum, quoniam te elegi, dicit dominus.

    16 Et resuscitabo mortuos de locis suis et de monumentis educam illos, quoniam
    cognoui nomen meum in illis.

    17 Noli timere, mater filiorum, quoniam te elegi, dicit dominus.

    18 Mittam tibi adiutorium pueros meos Isaiam et Hieremiam, ad quorum consilium
    sanctificaui et paraui tibi arbores xii grauatās uariis

    19 fructibus Et totidem fontes fluentes lac et mel et montes inmensos septem habentes
    rosam et lilium, in quibus gaudio replebo

    20 filios tuos. Viduam iustifica, pupillo iudica, egenti da, orfanum tuere, nudum
    uesti, Confractum et debilem cura, claudum

    21 inridere noli, tutare mancum et caecum ad uisionem claritatis meae admitte,
    Senem et iuuenem intra muros tuos serua,

    22 Mortuos ubi inueneris, signans commenda sepulchro, et dabo

    23 tibi primam sessionem in resurrectione mea. Pausa et quiesce,

    24 populus meus, quia ueniet requies tua. Nutrix bona, nutri

    25 filios tuos, confirma enim pedes eorum. Seruos quos tibi dedi,

    26 nemo ex eis interiet, ego enim eos requiram de numero tuo, Noli satagere, cum
    uenerit enim dies pressurae et angustiae,

    27 alii plorabunt et tristes erunt, tu autem hilaris et copiosa eris. Zelabunt
    gentes et nihil aduersus te poterunt, dicit dominus.

    28 Manus meae tegent te, ne filii tui gehennam uideant. Iocundare,

    29 mater, cum filiis tuis, quia ego te eripiam, dicit dominus.

    30 Filios tuos dormientes memorare, quoniam ego eos educam de

    31 latibulis terrae et misericordiam cum illis faciam, quoniam misericors sum,
    dicit dominus omnipotens. Amplectere natos

    32 tuos usque dum uenio et praedica illis misericordiam, quoniam exuberant fontes
    mei, et gratia mea non deficiet. Ego Ezra accepi praeceptum a domino in monte
    Choreb,

    33 ut irem ad Israel; ad quos cum uenirem, reprobauerunt me et respuerunt mandatum
    domini. Ideoque uobis dico, gentes,

    34 quae auditis et intellegitis: expectate pastorem uestrum, requiem aeternitatis
    dabit uobis, quoniam in proximo est ille, qui in finem saeculi adueniet. Parati
    estote ad praemia regni,

    35 quia lux perpetua lucebit uobis per aeternitatem temporis. Fugite umbram saeculi
    huius, accipite iocunditatem gloriae

    36 uestrae; ego testor palam saluatorem meum. Commendatum

    37 domini accipite et iocundamini gratias agentes ei qui uos ad

    38 caelestia regna uocauit. Surgite et state et uidete numerum

    39 signatorum in conuiuio domini. Qui se de umbra saeculi

    40 transtulerunt, splendidas tunicas a domino acceperunt. Recipe, Sion, numerum
    tuum et conclude candidatos tuos, qui legem

    41 domini compleuerunt. Filiorum tuorum, quos optabas, plenus est numerus, roga
    imperium domini, ut sanctificetur populus tuus, qui uocatus est ab initio.

    42 Ego Ezra uidi in monte Sion turbam magnam, quam numerare non potui, et omnes
    canticis conlaudabant dominum.

    43 Et in medio eorum erat iuuenis statura celsus, eminentior omnibus illis, et
    singulis eorum capitibus inponebat coronas, et magis exaltabatur: ego autem miracul[o]
    tenebar.

    44 Tunc interrogaui angelum et dixi: qui sunt hi, domine?

    45 Qui respondens dixit mihi: hi sunt qui mortalem tunicam deposuerunt et inmortalem
    sumpserunt et confessi sunt nomen dei: modo coronantur et accipiunt palmas.

    46 Et dixi ad angelum: ille iuuenis quis est, qui eis coronas inponit et palmas
    in manus

    47 tradit? Qui respondens dixit mihi: ipse est filius dei, quem in saeculo confessi
    sunt. ego autem magnificare eos coepi, qui

    48 fortiter pro nomine domini steterunt. Tunc dixit mihi angelus: uade, adnuntia
    populo meo, qualia et quanta mirabilia domini dei uidisti.'
  language: Latin
  chapter: 2
  verse_count: 48
  witness_situation: Latin is the only extant witness for this chapter (Christian
    addition, Latin only). No Syriac/Ethiopic/Arabic/Armenian/Georgian apparatus applies.
  note: Verse-numbered cleaned Latin loaded from sources/2esdras/latin/transcribed/.
    Chapter 7 includes 7:36-105 restored from Bensly 1875.
translation:
  text: '1 Thus says the Lord: I brought this people out from slavery, and I gave
    them commandments through my servants the prophets, but they were unwilling to
    listen and made my counsels void.

    2 The mother who bore them says to them, “Go, my children, for I am a widow and
    forsaken.

    3 I raised you with gladness, and I lost you with mourning and sorrow,

    4 because you sinned before the Lord God and did what is evil before me. But now
    what shall I do for you? For I am a widow and forsaken. Go, my children, and ask
    mercy from the Lord.”

    5 But I call upon you, Father, as witness against the mother of these children,
    because they were unwilling to keep my covenant,

    6 that you may give them shame and give their mother over to plundering, so that

    7 their offspring may not come to be. Let them be scattered among the nations;
    let their names be blotted out from the earth, because they despised my covenant.

    8 Woe to you, Assyria, who hide the unrighteous with you, evil nation!

    9 Remember what I did to Sodom and Gomorrah, whose land lies in clods of pitch
    and heaps of ashes. So I will do to those who did not listen to me, says the Lord
    Almighty.

    10 Thus says the Lord to Ezra: Announce to my people that I will give them the
    kingdom of Jerusalem, which I was going to give to Israel.

    11 And I will take to myself their glory, and I will give them the everlasting
    tabernacles that I had prepared for them.

    12 The tree of life shall be for them as the fragrance of ointment, and they shall
    neither labor nor grow weary.

    13 Ask, and you will receive; pray for a few days for yourselves, that they may
    be shortened. The kingdom is already prepared for you; keep watch.

    14 Call heaven and earth to witness, for I have put away evil and created good,
    because I live, says the Lord.

    15 Mother, embrace your children; bring them up with gladness, like a dove; strengthen
    their feet, because I have chosen you, says the Lord.

    16 And I will raise the dead from their places, and I will bring them out from
    the tombs, because I have acknowledged my name in them.

    17 Do not fear, mother of children, because I have chosen you, says the Lord.

    18 I will send you help—my servants Isaiah and Jeremiah. By their counsel I have
    sanctified and prepared for you twelve trees laden with various fruits,

    19 and as many springs flowing with milk and honey, and seven mighty mountains
    having rose and lily, by which I will fill your children with joy.

    20 Vindicate the widow, judge for the orphan, give to the needy, protect the fatherless,
    clothe the naked.

    21 Care for the broken and the weak; do not mock the lame; shelter the maimed,
    and admit the blind to the sight of my glory.

    22 Keep safe within your walls the old and the young. Wherever you find the dead,
    mark them and commit them to the grave,

    23 and I will give you the first place in my resurrection. Pause and rest,

    24 my people, for your rest will come. Good nurse, nourish your children, and
    strengthen their feet.

    25 None of the servants whom I have given you will perish, for I will require
    them from your number.

    26 Do not be anxious, for when the day of distress and anguish comes, others will
    weep and be sorrowful, but you will be cheerful and abundant.

    27 The nations will be jealous, but they will be able to do nothing against you,
    says the Lord.

    28 My hands will cover you, so that your children may not see Gehenna.

    29 Rejoice, mother, with your children, because I will deliver you, says the Lord.

    30 Remember your children who sleep, because I will bring them out from the hidden
    places of the earth,

    31 and I will show mercy to them, because I am merciful, says the Lord Almighty.

    32 Embrace your children until I come, and proclaim mercy to them, because my
    springs overflow and my grace does not fail.

    33 I, Ezra, received a command from the Lord on Mount Horeb, that I should go
    to Israel; but when I came to them, they rejected me and despised the commandment
    of the Lord.

    34 Therefore I say to you, nations that hear and understand: await your shepherd;
    he will give you eternal rest, because he is near—the one who will come at the
    end of the age.

    35 Be ready for the rewards of the kingdom, because everlasting light will shine
    for you through all eternity.

    36 Flee the shadow of this age; receive the gladness of your glory. I bear witness
    openly to my Savior.

    37 Receive what has been entrusted to you by the Lord, and rejoice, giving thanks
    to him who has called you to the heavenly kingdoms.

    38 Rise and stand, and see the number of those who have been sealed at the Lord’s
    banquet,

    39 who have passed over from the shadow of this age and have received splendid
    garments from the Lord.

    40 Receive your number, Zion, and gather in your chosen ones, who have fulfilled
    the law of the Lord.

    41 The number of your children, whom you longed for, is complete. Ask for the
    Lord’s authority, that your people may be sanctified, who were called from the
    beginning.

    42 I, Ezra, saw on Mount Zion a great multitude that I could not number, and they
    all were praising the Lord with songs.

    43 And in the midst of them was a young man of lofty stature, taller than all
    the rest, and he was placing crowns on the head of each one of them, and he was
    more exalted still; and I was held in wonder.

    44 Then I asked the angel and said, “Who are these, my lord?”

    45 He answered and said to me, “These are the ones who have put off the mortal
    garment and put on the immortal, and they have confessed the name of God. Now
    they are being crowned and receiving palms.”

    46 Then I said to the angel, “Who is that young man who places crowns on them
    and puts palms into their hands?”

    47 He answered and said to me, “He is the Son of God, whom they confessed in the
    age.” Then I began to magnify those who had stood bravely for the name of the
    Lord.

    48 Then the angel said to me, “Go, announce to my people what sort of things and
    how great are the wonders of the Lord God that you have seen.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '16'
    text: Latin only witness. The clause 'because I have known my name in them' is
      textually awkward and could be understood more idiomatically as 'because my
      name is known in them' or, by conjecture, 'because they have known my name.'
      The main text preserves the extant Latin's strangeness.
    reason: textual_variant
  - marker: '13'
    text: The line about praying that the days be 'few and shortened' is difficult
      in Latin. It likely refers to the shortening of the present age or present distress
      rather than to a wish for a short lifespan.
    reason: lexical_alternative
  - marker: '23'
    text: '''The first place in my resurrection'' renders a Latin phrase literally
      involving a ''first seat.'' The sense is probably priority or honor in the resurrection,
      not merely sitting down.'
    reason: lexical_alternative
  - marker: '40'
    text: The Latin word behind 'your robed ones' is literally related to white clothing
      and can also mean 'candidates.' Here the clothing image fits the visionary scene
      better than a political sense.
    reason: lexical_alternative
  - marker: '47'
    text: This explicit identification of the crowned figure as 'the Son of God' is
      a hallmark of the chapter's later Christian compositional layer and should not
      be read back uncritically into the Jewish apocalypse of chapters 3–14.
    reason: compositional_layer
lexical_decisions:
- source_word: seruitute
  chosen: slavery
  alternatives:
  - bondage
  - captivity
  lexicon: Lewis & Short
  rationale: The Latin denotes a condition of servitude, not merely exile. 'Slavery'
    preserves the force of divine deliverance language better than the softer 'captivity'.
- source_word: pueros meos prophetas
  chosen: my servants the prophets
  alternatives:
  - my boys, the prophets
  - my children, the prophets
  lexicon: Lewis & Short
  rationale: In biblical Latin, puer can function in a servant sense in relation to
    God. 'My servants the prophets' matches the prophetic idiom and avoids an inappropriately
    juvenile sense.
- source_word: irrita fecerunt mea consilia
  chosen: made my counsels void
  alternatives:
  - frustrated my plans
  - nullified my purposes
  lexicon: Lewis & Short
  rationale: The phrase is rhetorically strong and judicial. 'Made my counsels void'
    keeps the formal cadence and the sense of rejecting divine purpose without over-paraphrasing.
- source_word: uidua et derelicta
  chosen: a widow and forsaken
  alternatives:
  - widowed and abandoned
  - a widow and deserted
  lexicon: Lewis & Short
  rationale: This repeated maternal self-description is stylized lament. 'Forsaken'
    preserves biblical resonance and pathos.
- source_word: testamentum meum
  chosen: my covenant
  alternatives:
  - my testament
  lexicon: Lewis & Short
  rationale: In this scriptural context testamentum refers to the divine covenantal
    bond, not a last will. 'Covenant' is the theologically accurate English.
- source_word: in direptionem
  chosen: to plundering
  alternatives:
  - for spoil
  - to devastation
  lexicon: Lewis & Short
  rationale: The noun suggests exposure to pillage. 'To plundering' keeps the concrete
    judgment image and the terse oracle style.
- source_word: deleantur
  chosen: be blotted out
  alternatives:
  - be erased
  - be wiped away
  lexicon: Lewis & Short
  rationale: '''Blotted out'' preserves biblical covenant-judgment diction associated
    with names removed from remembrance.'
- source_word: Assur
  chosen: Assyria
  alternatives:
  - Assur
  lexicon: Lewis & Short
  rationale: The ethnic-geographical referent is clearer in English as 'Assyria,'
    while still reflecting the Latin form.
- source_word: tabernacula aeterna
  chosen: the everlasting tabernacles
  alternatives:
  - eternal dwellings
  - everlasting tents
  lexicon: Lewis & Short
  rationale: The phrase likely evokes eschatological dwelling places with scriptural
    coloration. 'Tabernacles' preserves that resonance better than a flattened 'homes'.
- source_word: Lignum vitae
  chosen: The tree of life
  alternatives:
  - wood of life
  lexicon: Lewis & Short
  rationale: This is a fixed biblical image and should be rendered transparently in
    its recognized form.
- source_word: in odorem unguenti
  chosen: like the fragrance of ointment
  alternatives:
  - for a sweet smell of ointment
  - as an aroma of perfume
  lexicon: Lewis & Short
  rationale: The Latin is somewhat compressed. This rendering preserves the sensory
    image without forcing an overly literal but awkward construction.
- source_word: rogate uobis dies paucos ut minorentur
  chosen: pray that your days may be few and shortened
  alternatives:
  - ask that a few days be shortened for you
  - pray for the days to be cut short
  lexicon: Lewis & Short
  rationale: The line is difficult, but the sense points to the shortening of the
    present age or present troubles. The rendering stays close to the Latin while
    remaining intelligible.
- source_word: omisi enim malum et creaui bonum
  chosen: I have put away evil and created good
  alternatives:
  - I have cast off evil and made good
  - I have removed evil and created what is good
  lexicon: Lewis & Short
  rationale: The line is programmatic and should remain somewhat stark. 'Put away'
    reflects omisi without implying evil's independent origin.
- source_word: sicut columba
  chosen: like a dove
  alternatives:
  - as a dove
  lexicon: Lewis & Short
  rationale: The maternal image is retained plainly; no expansion is warranted.
- source_word: cognoui nomen meum in illis
  chosen: I have known my name in them
  alternatives:
  - I have acknowledged my name in them
  - my name has been recognized in them
  lexicon: Lewis & Short
  rationale: The Latin is unusual. The chosen rendering stays formally close, allowing
    the theological strangeness to remain visible rather than being over-resolved.
- source_word: arbores xii grauatas uariis fructibus
  chosen: twelve trees laden with various fruits
  alternatives:
  - twelve fruit-laden trees
  - twelve trees burdened with diverse fruits
  lexicon: Lewis & Short
  rationale: '''Laden'' captures grauatās idiomatically while preserving abundance
    imagery.'
- source_word: totidem fontes fluentes lac et mel
  chosen: as many springs flowing with milk and honey
  alternatives:
  - likewise springs flowing milk and honey
  lexicon: Lewis & Short
  rationale: Totidem links the number of springs to the twelve trees. 'As many' preserves
    the correspondence.
- source_word: ad uisionem claritatis meae admitte
  chosen: admit the blind to the sight of my glory
  alternatives:
  - bring the blind to behold my brightness
  - allow the blind to see my splendor
  lexicon: Lewis & Short
  rationale: The phrase combines practical mercy with eschatological promise. 'My
    glory' gives the theological weight of claritas in this context.
- source_word: primam sessionem in resurrectione mea
  chosen: the first place in my resurrection
  alternatives:
  - the chief seat in my resurrection
  - the first sitting in my resurrection
  lexicon: Lewis & Short
  rationale: Sessionem is literally 'seat/sitting,' but the idiom points to rank or
    privilege. 'First place' communicates the sense without wooden obscurity.
- source_word: Nutrix bona
  chosen: Good nurse
  alternatives:
  - good foster-mother
  - good caretaker
  lexicon: Lewis & Short
  rationale: The maternal addressee shifts into nurturing imagery. 'Good nurse' is
    concise and preserves the metaphor.
- source_word: copiosa eris
  chosen: you will be cheerful and abundant
  alternatives:
  - you will be joyful and prosperous
  - you will be glad and full
  lexicon: Lewis & Short
  rationale: Copiosa suggests fullness or abundance, not merely emotion. The paired
    rendering keeps both senses in view.
- source_word: gehennam
  chosen: Gehenna
  alternatives:
  - hell
  lexicon: Lewis & Short
  rationale: Project policy favors preserving the specific term where the source uses
    the Jewish-Christian image rather than flattening it into the later generic 'hell.'
- source_word: latibulis terrae
  chosen: the hidden places of the earth
  alternatives:
  - the secret places of the earth
  - earth's hiding places
  lexicon: Lewis & Short
  rationale: The phrase evokes concealed regions of the dead. 'Hidden places' is natural
    and faithful.
- source_word: expectate pastorem uestrum
  chosen: await your shepherd
  alternatives:
  - wait for your shepherd
  lexicon: Lewis & Short
  rationale: '''Await'' better suits prophetic summons and eschatological expectancy.'
- source_word: in finem saeculi
  chosen: at the end of the age
  alternatives:
  - at the world's end
  - at the end of the world
  lexicon: Lewis & Short
  rationale: Saeculum here is the age-order, not necessarily the material cosmos.
    'End of the age' preserves apocalyptic nuance.
- source_word: umbram saeculi huius
  chosen: the shadow of this age
  alternatives:
  - the shadow of this world
  - this age's shadow
  lexicon: Lewis & Short
  rationale: Saeculum again points to the present age. 'Shadow' is retained as a vivid
    apocalyptic metaphor.
- source_word: saluatorem meum
  chosen: my Savior
  alternatives:
  - my deliverer
  lexicon: Lewis & Short
  rationale: The Christian layer's diction is explicit here; 'Savior' is the natural
    theological rendering.
- source_word: signatorum
  chosen: those who have been sealed
  alternatives:
  - the marked ones
  lexicon: Lewis & Short
  rationale: The participle evokes apocalyptic sealing imagery. 'Sealed' preserves
    intertextual force.
- source_word: in conuiuio domini
  chosen: at the Lord’s banquet
  alternatives:
  - in the Lord's feast
  lexicon: Lewis & Short
  rationale: Convivium is a feast or banquet. 'Banquet' better conveys the celebratory
    eschatological scene.
- source_word: candidatos tuos
  chosen: your robed ones
  alternatives:
  - your white-clad ones
  - your candidates
  lexicon: Lewis & Short
  rationale: Candidatus originally refers to one dressed in shining white. 'Robed
    ones' avoids misleading political overtones of 'candidates' while preserving the
    clothing image.
- source_word: iuuenis
  chosen: young man
  alternatives:
  - youth
  lexicon: Lewis & Short
  rationale: The term denotes a youthful male figure. 'Young man' is clear and dignified
    in context.
- source_word: mortalem tunicam deposuerunt et inmortalem sumpserunt
  chosen: put off the mortal garment and put on the immortal
  alternatives:
  - laid aside the mortal robe and took up the immortal
  lexicon: Lewis & Short
  rationale: The clothing metaphor is central and should remain visible. The balanced
    'put off/put on' preserves the contrast.
- source_word: confessi sunt nomen dei
  chosen: they have confessed the name of God
  alternatives:
  - they acknowledged God's name
  - they made confession of the name of God
  lexicon: Lewis & Short
  rationale: Confiteri has public, steadfast overtones here. 'Confessed' preserves
    witness language important to the chapter's Christian layer.
- source_word: palmas
  chosen: palms
  alternatives:
  - palm branches
  lexicon: Lewis & Short
  rationale: The symbol of victory is clear; the shorter 'palms' keeps the formal
    cadence while allowing readers to infer branches from context.
- source_word: filius dei
  chosen: the Son of God
  alternatives:
  - God's Son
  lexicon: Lewis & Short
  rationale: This is a major christological identification in the chapter. The definite
    form best reflects the force of the Latin in context.
- source_word: in saeculo
  chosen: in the age
  alternatives:
  - in the world
  - during their lifetime
  lexicon: Lewis & Short
  rationale: Saeculum in this chapter repeatedly carries age-language. 'In the age'
    keeps that thematic consistency, even if slightly formal.
theological_decisions:
- issue: Supersessionist transfer language in verses 10-11
  chosen_reading: 'Retained the direct contrast: the kingdom of Jerusalem, once to
    be given to Israel, is now promised to ''my people'' addressed through Ezra.'
  alternative_readings:
  - Soften the transfer by making 'my people' still refer to Israel
  - Generalize the promise without explicit displacement
  rationale: This chapter belongs to the Christian 5 Ezra layer and explicitly recasts
    rejected Israel and a newly addressed people. The translation should not mute
    that compositional voice, even though it differs sharply from 4 Ezra proper.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    blend 5 Ezra and 4 Ezra voices.
- issue: Verse 16 'because I have known my name in them'
  chosen_reading: Kept the unusual first-person formulation rather than smoothing
    it into 'because they have known my name.'
  alternative_readings:
  - because they have known my name
  - because my name is known in them
  rationale: The extant Latin is the only witness and is syntactically awkward. Since
    no daughter-language evidence exists here, the translation preserves the strangeness
    in the main text and documents the issue rather than silently emending it.
  doctrine_reference: Original-language primacy and transparency in ambiguous readings.
- issue: Verse 28 gehennam
  chosen_reading: Rendered as 'Gehenna' rather than 'hell.'
  alternative_readings:
  - hell
  rationale: The chapter's Christian eschatological imagery still uses the specific
    term. Preserving 'Gehenna' avoids importing later generalized English theological
    freight and keeps the text's Jewish-Christian conceptual world visible.
  doctrine_reference: Consistency of key terms, or documented exception.
- issue: Verse 47 filius dei
  chosen_reading: Rendered as 'the Son of God.'
  alternative_readings:
  - God's Son
  rationale: The vision climaxes in explicit christological identification. The definite
    title best reflects the force of the Latin and the chapter's Christian compositional
    layer.
  doctrine_reference: Translate titles to preserve meaning; do not smooth away theological
    claims.
