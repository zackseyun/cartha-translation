  from: the measure of what has passed exceeded
  to: the measure that has passed has been far greater
  rationale: The Latin 'quae transivit mensura' is literally 'the measure that has passed.' Translating 'superabundavit' as the intransitive 'exceeded' is awkward in English without an object, as it typically implies exceeding a limit or quota. In parallel with 'amplius' (greater), the verb indicates that the past time vastly outweighs the time remaining. 'Has been far greater' captures this comparative abundance naturally and preserves the perfect tense.
