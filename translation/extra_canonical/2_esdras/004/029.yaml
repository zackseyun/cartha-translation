  rationale: 'The Latin uses the exact same perfect passive verb (`seminatum est`) three times in this sentence. The draft translates it inconsistently as "has been sown", "was sown", and "is sown". In 4 Ezra''s deterministic eschatology, both the evil of this age and the good of the age to come have already been sown. Translating all three as "has been sown" preserves the author''s perfect aspect and the strict rhetorical parallel between the "place" of evil and the "field" of good. | Azure: In 4 Ezra 4:29 the Latin repeats the identical form three times: seminated est / seminatum est in perfect passive construction (''has been sown''). The current English breaks that tight formal parallel '
