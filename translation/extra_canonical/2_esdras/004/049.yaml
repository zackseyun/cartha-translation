  rationale: 'The Latin explicitly includes ''in ea'' (in it), likely reflecting a Semitic prepositional phrase (בה) from the lost Hebrew Vorlage. Omitting it loses the specific detail that the drops remained in the cloud after the main force of the rain had passed. | Azure: The proposed change is supported directly by the Latin: *superauerunt in ea guttae* means literally that the drops remained/were left over "in it," with *in ea* referring back to the feminine noun *nu'
