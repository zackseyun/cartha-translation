  text: 'transisset flamma et uidi et ecce superauit fumus. Et post hoc transiit coram me nubs plena aquae et inmisit pluuiam impetu multam, et cum transisset impetus pluuiae superauerunt in ea guttae. Et dixit ad me ; cogita tibi ; sicut enim crescit pluuia amplius quam guttae et ignis amplius quam fumus, sic superhabundauit quae transiuit mensura, superauerunt autem guttae et fumus. Et oraui et dixi : putas uiuo usque in diebus illis ? uel quis erit in diebus illis ? Respondit ad me et dixit : de signis de quibus me interrogas, ex parte possum tibi dicere, de uita autem tua non sum missus dicere tibi, sed nescio.'
