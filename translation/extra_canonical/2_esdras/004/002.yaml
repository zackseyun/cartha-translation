  from: Your heart has gone too far
  to: Your heart has utterly failed
  rationale: 'The Latin ''excedens excessit'' is a calque of a Hebrew infinitive absolute construction (via Greek participle + finite verb) expressing intensity. Furthermore, ''cor excedit'' reflects the Semitic idiom for the heart/mind failing or being bewildered (translating Greek ἐξίστημι, cf. Gen 42:28). The angel''s argument is from lesser to greater: Ezra''s mind is completely bewildered by the present age, so he cannot possibly comprehend the Most High. ''Gone too far'' misses both the intensive grammar and the idiom, wrongly implying a rebuke for overstepping rather than a statement about his cognitive limits.'
