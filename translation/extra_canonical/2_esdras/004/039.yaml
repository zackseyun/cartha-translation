  rationale: 'The Latin verb ''prohibeatur'' means ''is kept back'', ''withheld'', or ''prevented'' (likely reflecting Greek κωλύω). While ''delayed'' captures the temporal result, ''kept back'' or ''withheld'' more accurately reflects the author''s lexical choice and preserves the agricultural metaphor of a harvest being restrained. | Azure: In 4 Ezra proper (Latin as primary witness), *prohibeatur* straightforwardly means ''be prevented, hindered, kept back'' rather than specifically ''be delayed.'' The current English narrows the sense to a'
