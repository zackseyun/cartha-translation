  from: those who are above the heavens
  to: he who is above the heavens
  rationale: The Latin relative pronoun 'qui' can be singular or plural. While the first instance is plural ('qui... inhabitant', 'those who dwell'), the second ('qui super caelos') translates a singular in the underlying Greek (reflected as singular in the Syriac and Ethiopic daughter versions). It refers to God (the Most High). Translating it as plural ('those who') obscures the fundamental apocalyptic contrast Uriel is drawing between earthly humanity and the heavenly Creator.
