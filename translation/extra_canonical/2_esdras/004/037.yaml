  from: the said measure
  to: the foretold measure
  rationale: The Latin 'praedicta' means 'foretold', 'predicted', or 'aforementioned'. Translating it as 'the said measure' introduces a legalistic, bureaucratic register ('the said property') that is out of place in an apocalyptic oracle. 'The foretold measure' or 'the appointed measure' better fits the theological context of God's predetermined timeline.
