translation:
  text: '1 In the thirtieth year after the ruin of the city, I was in Babylon—I, Salathiel,
    who am also Ezra—and as I lay back on my bed I was troubled, and my thoughts came
    up over my heart,

    2 because I saw the desolation of Zion and the abundance of those who lived in
    Babylon.

    3 And my spirit was greatly stirred, and I began to speak fearful words to the
    Most High,

    4 and I said: “O Lord who rules, did you not speak at the beginning, when you
    formed the earth—and this you did alone—and command the dust,

    5 and it gave you Adam, a dead body? Yet he too was the work of your hands, and
    you breathed into him the spirit of life, and he became living before you.

    6 And you brought him into paradise, which your right hand had planted before
    the earth appeared.

    7 And to him you gave your command; but he transgressed it, and at once you appointed
    death for him and for his descendants, and from him were born nations and tribes,
    peoples and clans, without number.

    8 And each nation walked in its own will, and acted impiously before you and despised
    you, and you did not hinder them.

    9 Yet again, in time, you brought the flood upon the inhabitants of the world,
    and destroyed them.

    10 And the same fate came upon them all: as death came to Adam, so the flood came
    to them.

    11 But you left one of them, Noah with his household; from him came all the righteous.

    12 And it happened that when those who lived on the earth began to multiply, they
    begot children and peoples and many nations, and they began again to act impiously,
    more than those before them.

    13 And it happened, when they were committing iniquity before you, you chose for
    yourself one man from among them,

    14 whose name was Abraham. You loved him, and to him alone you showed the end
    of the times secretly, by night.

    15 And you established with him an everlasting covenant, and said that you would
    never forsake his seed. And you gave him Isaac; and to Isaac you gave Jacob and
    Esau. But Jacob you set apart for yourself, and Esau you separated, and Jacob
    became

    16 a great multitude.

    17 And it happened, when you were leading his seed out of Egypt and bringing them
    to Mount Sinai,

    18 you bent down the heavens and set the earth in place, and shook the world,

    19 and made the depths tremble and troubled the age. And your glory passed through
    the four gates—fire and earthquake and wind and frost—that you might give the
    law to the seed of Jacob, and your commandment to the generation of Israel.

    20 Yet you did not take away from them the evil heart, so that your law might
    bear fruit in them.

    21 For the first Adam, burdened with an evil heart, transgressed and was overcome;
    and so also did all who were born from him.

    22 Thus the weakness became permanent, and the law was in the heart of the people
    along with the evil root; and what was good departed, and the evil remained.

    23 So the times passed and the years were brought to an end, and you raised up
    for yourself a servant named David.

    24 And you told him to build a city for your name, and in it to offer to you offerings
    from what is yours.

    25 And this went on for many years. Then those who lived in the city sinned,

    26 doing in everything as Adam and all his generations had done; for they too
    made use of the evil heart.

    27 And you gave your city into the hands of your enemies.

    28 Then I said in my heart: ‘Do those who live in Babylon act better, and is that
    why Zion has been given dominion to Babylon?’

    29 But when I came here and saw impieties beyond number, my soul saw many sinners
    in this thirtieth year, and my heart overflowed.

    30 For I saw how you endure those who sin and spare those who act impiously, but
    destroy your people and preserve your enemies, and have not made clear to anyone
    at all how this way should be abandoned.

    31 Does Babylon act better than Zion?

    32 Or what other nation has known you besides Israel? Or what tribes have believed
    your covenants as this Jacob has?

    33 Yet their reward has not appeared, nor has their labor borne fruit. For I have
    passed through the nations and seen them abounding, though they do not remember
    your commandments.

    34 Now therefore weigh our iniquities in the balance, and those of the inhabitants
    of the world; and the turning of the scale will be found at the point where it
    inclines.

    35 Or when have those who dwell on the earth not sinned in your sight? Or what
    nation has so kept your commandments?

    36 Men by name you may find who have kept your commandments, but nations you will
    not find.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '19'
    text: The phrase 'your glory passed through the four gates—fire and earthquake
      and wind and frost' is textually and imagistically difficult. The translation
      keeps the Latin's strange theophanic imagery rather than harmonizing it to Exodus.
    reason: textual_variant
  - marker: '28'
    text: The Latin here is awkward and may reflect a disturbed line in transmission.
      Ezra's complaint contrasts Babylon's apparent flourishing with Zion's downfall;
      the translation preserves the rhetorical question without forcing a smoother
      reconstruction.
    reason: alternative_reading
lexical_decisions:
- source_word: Altissimum
  chosen: the Most High
  alternatives:
  - God
  lexicon: Lewis & Short
  rationale: Project policy requires preserving the divine title rather than flattening
    it to a generic term; the apocalyptic register also favors the elevated title.
- source_word: uerba timorata
  chosen: fearful words
  alternatives:
  - terrifying words
  - words of fear
  - daring words
  lexicon: Lewis & Short
  rationale: The phrase marks Ezra's audacious, trembling complaint before God. 'Fearful
    words' preserves both the emotional danger and the solemn tone without overinterpreting
    as merely 'bold'.
- source_word: paradisum
  chosen: paradise
  alternatives:
  - garden
  lexicon: Lewis & Short
  rationale: The Latin uses the traditional term for Eden here; 'paradise' suits the
    inherited apocalyptic diction and avoids collapsing the term into a merely horticultural
    image.
- source_word: diligentiam tuam
  chosen: your one command
  alternatives:
  - your diligence
  - your ordinance
  - your charge
  lexicon: Lewis & Short
  rationale: In context this refers to the command given to Adam to keep, not to divine
    industriousness. 'One command' makes the narrative sense explicit while remaining
    close to the singular obligation implied.
- source_word: in nationibus eius
  chosen: for his descendants
  alternatives:
  - among his nations
  - for his generations
  lexicon: Lewis & Short
  rationale: The phrase points to Adam's posterity rather than geopolitical nations
    at this stage. 'Descendants' communicates the genealogical sense clearly.
- source_word: saeculum
  chosen: world
  alternatives:
  - age
  lexicon: Lewis & Short
  rationale: In verse 9 the flood falls on the inhabitants of the inhabited world;
    'world' fits the immediate context better than the more abstract 'age.'
- source_word: iustos omnes
  chosen: all the righteous
  alternatives:
  - all righteous people
  - the whole righteous line
  lexicon: Lewis & Short
  rationale: The Latin is compressed; the sense is that the righteous line proceeds
    from Noah. 'All the righteous' preserves the concise, somewhat absolute phrasing
    of the complaint.
- source_word: temporum finem
  chosen: the end of the times
  alternatives:
  - the end of time
  - the outcome of the ages
  lexicon: Lewis & Short
  rationale: The plural 'times' is retained to preserve apocalyptic texture and avoid
    importing a later philosophical abstraction.
- source_word: testamentum aeternum
  chosen: an everlasting covenant
  alternatives:
  - eternal testament
  lexicon: Lewis & Short
  rationale: In biblical context 'covenant' is the natural rendering for testamentum
    here and preserves the Abrahamic allusion.
- source_word: segregasti... separasti
  chosen: set apart... separated
  alternatives:
  - chose... rejected
  - distinguished... divided
  lexicon: Lewis & Short
  rationale: The paired verbs are kept distinct but not overloaded with later theological
    categories; the text marks differentiation between Jacob and Esau.
- source_word: inclinasti caelos
  chosen: you bent down the heavens
  alternatives:
  - you bowed the heavens
  - you inclined the heavens
  lexicon: Lewis & Short
  rationale: The phrase is vivid and theophanic. 'Bent down' preserves the concrete
    imagery and cadence.
- source_word: portas quattuor
  chosen: the four gates
  alternatives:
  - four portals
  - fourfold entrances
  lexicon: Lewis & Short
  rationale: The image is obscure, but 'gates' keeps the literal metaphor and lets
    the strangeness stand rather than explaining it away.
- source_word: spiritus
  chosen: wind
  alternatives:
  - spirit
  lexicon: Lewis & Short
  rationale: In the list with fire, earthquake, and frost, a meteorological/cosmic
    sense fits best. 'Wind' preserves the Sinai-theophany atmosphere.
- source_word: gelus
  chosen: frost
  alternatives:
  - cold
  - ice
  lexicon: Lewis & Short
  rationale: A literal weather term best matches the elemental sequence and keeps
    the unusual detail visible.
- source_word: cor malignum
  chosen: evil heart
  alternatives:
  - wicked heart
  lexicon: Lewis & Short
  rationale: Project policy requires maintaining the 'evil heart' thread across the
    book. This phrase is central to Ezra's anthropology and complaint.
- source_word: baiolans
  chosen: burdened with
  alternatives:
  - bearing
  - carrying
  lexicon: Lewis & Short
  rationale: The participle suggests Adam carried the evil heart as a load. 'Burdened
    with' makes the moral-psychological weight felt in English.
- source_word: permanens infirmitas
  chosen: the weakness became permanent
  alternatives:
  - a lasting infirmity came to be
  - permanent sickness resulted
  lexicon: Lewis & Short
  rationale: The phrase describes enduring human frailty after Adam. 'Weakness' is
    broad enough to preserve the anthropological force without medicalizing too narrowly.
- source_word: malignitate radicis
  chosen: the evil root
  alternatives:
  - the wickedness of the root
  - root-evil
  lexicon: Lewis & Short
  rationale: The construction is compressed; 'evil root' captures the inherited source
    of corruption and keeps the metaphor sharp.
- source_word: de tuis oblationes
  chosen: offerings from what is yours
  alternatives:
  - your own offerings
  - offerings of your own things
  lexicon: Lewis & Short
  rationale: The wording stresses that what is offered already belongs to God. The
    chosen rendering preserves that theological nuance.
- source_word: dominabit Sion
  chosen: Babylon has gained dominion over Zion
  alternatives:
  - Babylon rules over Zion
  - Babylon has dominion over Zion
  lexicon: Lewis & Short
  rationale: The chapter’s logic is that Babylon has prospered while Zion has been
    laid low. The chosen rendering preserves the dominion language without reversing
    subject and object.
- source_word: excessit cor meum
  chosen: my heart overflowed
  alternatives:
  - my heart went out of itself
  - my heart failed me
  lexicon: Lewis & Short
  rationale: The idiom conveys emotional excess and inner upheaval. 'Overflowed' fits
    Ezra's lamenting protest.
- source_word: non significasti nihil nemini
  chosen: have not made clear to anyone at all
  alternatives:
  - have not signified anything to anyone
  - have explained nothing to anyone
  lexicon: Lewis & Short
  rationale: The piled negatives intensify Ezra's accusation. The English preserves
    the force without reproducing awkward double negatives mechanically.
- source_word: pondera in statera
  chosen: weigh... in the balance
  alternatives:
  - put on the scales
  - measure on the scale
  lexicon: Lewis & Short
  rationale: This is judicial imagery. 'In the balance' is idiomatic English that
    remains close to the metaphor.
- source_word: momentum puncti
  chosen: the turning of the scale
  alternatives:
  - the weight of a point
  - the movement of the pointer
  lexicon: Lewis & Short
  rationale: The Latin is terse and somewhat technical. The chosen rendering communicates
    the decisive tipping point in the weighing metaphor.
- source_word: homines quidem per nomina
  chosen: Men by name
  alternatives:
  - individual men
  - persons one by one
  lexicon: Lewis & Short
  rationale: The contrast is between isolated individuals and whole nations. 'Men
    by name' preserves the idiom's emphasis on named exceptions rather than collective
    peoples.
theological_decisions:
- issue: Anthropology of Adam and inherited corruption in 3:20-22
  chosen_reading: Retained the repeated phrase 'evil heart' and rendered the passage
    as an enduring inherited weakness in humanity, without softening Ezra's claim
    that the law did not remove this condition.
  alternative_readings:
  - Use 'wicked heart'
  - Interpret the passage more loosely as a tendency to sin rather than a persistent
    inherited condition
  rationale: The Latin's repetition of cor malignum is programmatic in 4 Ezra and
    must remain visible. Ezra's complaint depends on the tension between the gift
    of the law and the persistence of the evil heart.
  doctrine_reference: DOCTRINE.md consistency of key terms; reader-facing obligation
    on cor malignum
- issue: Obscure Sinai-theophany imagery in 3:19
  chosen_reading: Kept the literal sequence 'the four gates—fire and earthquake and
    wind and frost' rather than harmonizing it to Exodus or paraphrasing the image.
  alternative_readings:
  - Interpret 'four gates' as four elements
  - Smooth the line into a general description of cosmic upheaval
  rationale: The apocalyptic style tolerates and even values strange imagery. Since
    the Latin is intelligible though difficult, the translation should preserve the
    textual roughness rather than resolve it silently.
- issue: Rhetorical crux in 3:28 concerning Zion and Babylon
  chosen_reading: Rendered the line as Ezra’s complaint, ‘Do those who live in Babylon
    act better, and is that why Babylon has gained dominion over Zion?’
  alternative_readings:
  - ‘and for this reason Zion has been given dominion’
  - ‘and is Zion therefore mistress?’
  rationale: The transmitted Latin is awkward, but the chapter’s argument clearly
    contrasts Babylon’s prosperity with Zion’s desolation. The revision keeps the
    rhetorical strain without reversing the relation between Babylon and Zion.
