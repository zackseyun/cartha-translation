  section_header: The original Jewish apocalypse, c. 100 AD, composed in Hebrew or
    Aramaic after the fall of the Second Temple under Rome. The Semitic original is
    lost; the book survives through Latin + Syriac + Ethiopic + Arabic + Armenian
    + Georgian translations of a lost Greek intermediary. Seven visions of the seer
    Ezra answered by the angel Uriel.
