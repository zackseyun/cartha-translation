    Latin
  text: '1 anno tricesimo ruinae civitatis eram in Babylone, ego Salathihel qui et
    Ezras, et conturbatus sum super cubili meo recumbens, et cogitationes meae ascendebant
    super cor meum,

    2 Quoniam uidi desertionem Sion et habundantiam corum qui habitabant in Babilone.

    3 Et uentilatus est spiritus meus ualde, et coepi loqui ad altissimum uerba timorata,

    4 Et dixi : O dominator domine, nonne tu dixisti ab initio, quando plasmasti terram,
    et hoc solus, et imperasti pulu̇eri

    5 Et dedit tibi Adam, corpus mortuum ? sed et ipsum figmentum manuum tuarum erat,
    et insufflasti in eum spiritum uitae, et factus est uiuens coram te.

    6 Et induxisti eum in paradisum, quem plantauit dextera tua antequam terra adueṅtaret.

    7 Et huic mandasti diligentiam tuam ; et praeteriit eam, et statim instituisti
    in eum mortem et in nationibus eius, et natae sunt ex eo gentes et tribus, populi
    et cognationes, quorum non est numerus.

    8 Et ambulauit unaquaeque gens in uoluntate sua, et impie agebant coram te et
    spernebant, et tu non prohibuisti eos.

    9 Iterum autem in tempore induxisti diluuium super habitantes saeculum, et perdidisti
    eos.

    10 Et factum est in uno casus corum, sicut Adac mors, sic et his diluuium.

    11 Dereliquisti autem unum ex his, id Noe cum domo sua, ex eo iustos omnes.

    12 Et factum est cum coepissent multiplicari qui habitabant super terram, et multiplicauerunt
    filios et populos et gentes multas, et coeperunt iterato impietatem facere plus
    quam priores.

    13 impietatem facere plus quam priores. Et factum est cum iniquitatem facerent
    coram te, elegisti tibi ex his unum, cui

    14 nomen erat Abraham; Et dilexisti eum, et demonstrasti ei

    15 temporum finem solo secrete noctu. Et disposuisti ei testamentum aeternum,
    et dixisti ei ut non unquam derelinqueres semen

    16 eius, et dedisti ei Isaac, et Isaac dedisti Iacob et Esau. Et segregasti tibi
    Iacob, Esau autem separasti, et factus est Iacob

    17 in multitudine magna. Et factum est cum educeres semen

    18 eius ex Aegypto, et adduxisti eos super montem Sina. Et inclinasti caelos,
    et statuisti terram, et commouisti orbem, et

    19 tremere fecisti abyssos, et conturbasti saeculum. Et transiit gloria tua portas
    quattuor, ignis et terrae motus et spiritus et gelus; ut dares semini Iacob legem,
    et generationi Israel

    20 diligentiam. Et non abstulisti ab eis cor malignum, ut faceret

    21 lex tua in eis fructum. Cor enim malignum baiolans primus Adam transgressus
    et uictus est, sed et omnes qui ex eo nati

    22 sunt. Et facta est permanens infirmitas, et lex in corde populi cum malignitate
    radicis, et discessit quod bonum est, et mansit

    23 malignum. Et transierunt tempora et finiti sunt anni, et

    24 suscitasti tibi seruum nomine Dauid. Et dixisti ei aedificare ciuitatem nominis
    tui, et offerre tibi in ea de tuis oblationes. Et factum est hoc annis multis,
    et deliquerunt qui habitabant ciuitatem, In omnibus facientes sicut fecit Adam
    et omnes generationes eius, utebantur enim et ipsi cor malignum. Et tradidisti
    ciuitatem tuam in manibus inimicorum tuorum. Et dixi ego tunc in corde meo : numquid
    meliora faciunt qui habitant Babilonem? et propter hoc dominauit Sion? Factum
    est autem cum uenissem huc, et uidi impietates, quorum non est numerus, et delinquentes
    multos uidit anima mea hoc tricesimo anno; et excessit cor meum, Quoniam uidi
    quomodo sustines eos peccantes, et pepercisti impie agentibus, et perdidisti populum
    tuum, et conseruasti inimicos tuos, Et non significasti nihil nemini quomodo debeat
    derelinqui uia haec. numquid meliora facit Babilon quam Sion? Aut alia gens cognouit
    te praeter Israel ? aut quae tribus crediderunt testamentis tuis sicut haec Iacob?
    Quarum merces non comparuit, neque labor fructificauit. pertransiens enim pertransiui
    in gentibus, et uidi habundantes eas, et non memorantes mandatorum tuorum. Nunc
    ergo pondera in statera nostras iniquitates, et eorum qui habitant in saeculo
    ; et inuenietur momentum puncti ubi declinet. Aut quando non peccauerunt in conspectu
    tuo qui habitant terram ? aut quae gens sic obseruauit mandata tua? Homines quidem
    per nomina inuenies seruasse mandata tua, gentes autem non inuenies.

    25 et factum est hoc annis multis. et dereliquerunt qui habitabant civitatem,

    26 in omnibus facientes sicut fecit Adam et omnes generationes eius; utebantur
    enim et ipsi cor malignum.

    27 Et tradidisti civitatem tuam in manus inimicorum tuorum.

    28 Et dixi ego tunc in corde meo: numquid meliora faciunt qui habitant in Babylone,
    et propter hoc dominabit Sion?

    29 Factum est autem cum venissem huc, et vidi impietates quorum non est numerus,
    et delinquentes multos vidit anima mea hoc tricesimo anno. et excessit cor meum,

    30 quoniam vidi quomodo sustines eos peccantes et pepercisti impie agentibus,
    et perdidisti populum tuum et conservasti inimicos tuos, et non significasti

    31 nihil nemini quomodo debeat derelinqui via haec. numquid meliora facit Babylon
    quam Sion,

    32 aut alia gens cognovit te praeter Israhel? aut quae tribus crediderunt testamentis
    sicut haec Iacob.

    33 quarum merces non conparuit neque labor fructificavit? pertransiens enim pertransivi
    in gentibus, et vidi abundantes eas et non memorantes mandatorum tuorum.

    34 nunc ergo pondera in statera nostras iniquitates et eorum qui habitant in saeculo,
    et invenietur momentum puncti ubi declinet.

    35 aut quando non peccaverunt in conspectu tuo qui habitant terram, aut quae gens
    sic observavit mandata tua?

    36 homines quidem per nomina invenies servasse mandata tua, gentes autem non invenies.'
