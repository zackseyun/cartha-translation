  rationale: 'The Latin uses the intensive pronoun ''ipsis'' (''ex ipsis membris''), which carries more weight than a simple demonstrative (''those''). It emphasizes the specific bodily source (''the very members'' or ''the members themselves''). | Azure: In 4 Ezra 8:10 the Latin phrase is specifically ex ipsis membris. The preposition ex already gives the source (''from''), membris is ''members/limbs,'' and ipsis is the intensive form of ipse, adding emph'
