  rationale: In modern English, 'attend to' often carries the meaning of 'deal with'
    or 'take care of' (e.g., 'attend to a problem'). The Latin `adtendas` (from `attendo`)
    here means 'to direct the mind toward,' 'to pay attention to,' or 'to consider,'
    functioning in parallel with `aspicias` ('look upon') in v. 25 and `cogites` ('think
    on') in v. 27. 'Pay attention to' or 'consider' avoids the modern ambiguity.
