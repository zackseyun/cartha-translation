  from: nor upon death, nor judgment, nor destruction
  to: nor upon their death, nor their judgment, nor their destruction
  rationale: The Latin accusatives `mortem`, `iudicium`, and `perditionem` are parallel
    to `plasma` and are implicitly governed by the same genitive `eorum` (of those).
    The author's point is not that God will ignore death or judgment in general—judgment
    is a central theme of 4 Ezra—but that He will not concern Himself with the death,
    judgment, or destruction *of the wicked*. The English draft's omission of 'their'
    creates a sweeping universal statement that distorts the author's theology. Adding
    'their' restores the intended scope.
