  adjudicator_confidence: 0.94
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/phase9_latin_multiwitness/extra_canonical/2_esdras/008/006.job-71488.json
  category: lexical
  tier: 3
  from: every corrupted one
  to: every corruptible one
  rationale: 'The Latin ''corruptus'' here reflects the apocalyptic category of mortality/corruptibility (likely translating Greek φθαρτός), which contrasts with the incorruptible age to come. ''Corrupted'' strongly implies moral depravity in modern English, whereas the author''s focus is on human mortality and frailty needing the life-giving law. | Azure: In 4 Ezra proper (Latin primary, but often reflecting lost Greek/Hebrew apocalyptic idiom), the reviewer’s lexical point is sound: Latin corruptus in this context is best heard in the sphere of perish'
