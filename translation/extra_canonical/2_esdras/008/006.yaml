  from: to pray before you, and give us
  to: that we may pray before you, and that you may give us
  rationale: 'The Latin ''oremus'' is first-person plural (''that we may pray''), marking a deliberate and characteristic shift in 4 Ezra from the singular ''servant'' (servo tuo) to the plural community. Translating it as an infinitive (''to pray'') obscures this shift. Furthermore, ''des'' (give) is present subjunctive, coordinating with ''oremus'' in the ''ut'' clause (''that we may pray... and that you may give''). | Azure: The proposed change is clearly closer to the Latin. In 4 Ezra 8:6, the clause is introduced by "ut" and followed by subjunctives: "oremus" is 1st person plural present subjunctive (''that we may pray'')'
- timestamp: '2026-04-22T08:45:37Z'
