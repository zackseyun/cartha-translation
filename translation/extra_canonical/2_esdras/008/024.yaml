  from: hear, Lord, the prayer of your servant, and receive with your ears the petition
    of your thing formed;
  to: Hear, Lord, the prayer of your servant, and give ear to the petition of your
    creature;
  rationale: First, 'hear' should be capitalized as the start of the sentence. Second,
    'auribus percipe' is a standard liturgical idiom (often translating Greek ἐνωτίζεσθαι
    / Hebrew הַאֲזִינָה) that is better rendered as 'give ear to' rather than the
    overly literal 'receive with your ears.' Finally, Latin 'figmentum' (translating
    Greek πλάσμα) refers to humanity as formed from dust; 'creature' or 'handiwork'
    conveys this theological humility naturally, whereas 'thing formed' is clunky.
