  from: Then let my soul swallow understanding, and let it devour wisdom.
  to: Swallow understanding, then, O soul, and let it devour what is wise.
  rationale: 'The Latin features a direct imperative addressed to the soul (`absorbe... anima`, ''Swallow, O soul''), which the draft flattens into a third-person jussive (''let my soul swallow''). While the Latin awkwardly shifts to a third-person subjunctive for the second verb (`deuoret`), the direct address should be preserved. Additionally, `quod sapit` is a verbal clause (''what is wise'' or ''what it tastes''—playing on the eating metaphors of `absorbe` and `deuoret`), which the draft flattens into the abstrac | Azure: The proposed change is closer to the Latin. In 4 Ezra 8:4, the first verb is an imperative, "absorbe," and "anima" is a direct vocative/addressee, so the current English "let my soul swallow" wrongly '
