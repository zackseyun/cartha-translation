  rationale: 'In Late Latin, ''disponere'' frequently means ''to govern, direct, or guide'' (L&S II.B). Furthermore, ''tuae misericordiae'' functions as an instrumental dative (translating a Greek dative of means), perfectly parallel to ''tuae iustitiae'' (in your righteousness) and ''tuo intellectu'' (with your understanding) in verse 12. ''Commit him to your mercy'' misses both the active governance of ''dispones'' and the instrumental parallel. | Azure: Apply. In 4 Ezra 8:11 the Latin clause is et postea dispones eum tuae misericordiae. The reviewer is right that disponere can mean to order, arrange, direct, or govern, and the immediate context stron'
