  rationale: 'The Latin ''enim'' (reflecting Greek ''gar'' / Hebrew ''ki'') continues Ezra''s chain of logical deduction from verse 32. God''s mercy is shown to those without works, *because* the righteous simply receive a reward for what they have earned. Translating ''enim'' as ''But'' breaks this argumentative chain, which relies on a sequence of ''enim'' clauses across verses 32-36. | Azure: The proposed change is supported by explicit source-language evidence: the Latin begins with "Iusti enim," and "enim" is a causal/explanatory conjunction (''for,'' ''indeed,'' ''because'') rather than an ad'
