  rationale: 'Verse segmentation error. The English draft has merged logical verses 8:60, 8:61, and 8:62 into a single verse, while the provided source text is just a manuscript line fragment (''omnibus demonstraui...''). The translation itself is highly accurate to the Latin, but for standard versification, 8:61 should only be ''Therefore my judgment now draws near'' (Quapropter iudicium meum modo adpropinquat). The preceding text belongs in 8:60, and the following text in 8:62. | Azure: In 4 Ezra/2 Esdras 8, the Latin tradition clearly distributes the material across adjacent verses: the clause about people defiling the maker''s name belongs to the preceding verse, and the fragment ci'
