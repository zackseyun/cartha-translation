  from: 'And now I will speak: concerning every man you know better, but concerning
    your people my pain is greater,'
  to: 'And now I will surely speak: concerning every man you know better, but concerning
    your people, for whom I am pained,'
  rationale: 'The draft breaks a four-fold rhetorical parallel. The author lists four
    titles for Israel, each followed by a relative clause of mourning (v. 15-16: populo...
    quod mihi dolet; hereditate... propter quam lugeo; Israel... propter quem tristis
    sum; semine... propter quod conturbor). Translating `quod mihi dolet` (pulled
    from v. 16 to complete the clause) as "my pain is greater" invents a comparative
    and severs the first item from the litany. Furthermore, `dicens dicam` reflects
    a Hebrew infinitive absolute ("I will surely speak") which the English flattens.'
