  text: 'scribantur, quoniam fideles et ueri sunt. Ne timeas a cogitationibus aduersum
    te, nec turbent te incredulitates, contra dicentium. Quoniam omnis incredulus
    in incredulitate sua morietur. Ecce ego induco, dicit dominus, super orbem terrarum
    mala, gladium et famem et mortem et interitum, Propter quod superposuit iniquitas
    omnem terram, et adimpleta sunt opera nocua illorum. Propterea dicit dominus:
    Iam non silebo in impietatibus eorum quae inreligiose agunt, nec sustinebo in
    his quae inique exercent. ecce sanguis innoxius et iustus clamat ad me, et animae
    iustorum clamant perseueranter. Vindicans uindicabo illos, dicit dominus, et accipiam
    omnem sanguinem innoxium ex illis ad me. Ecce populus meus quasi grex ad occisionem
    ducitur; iam non patiar illum habitare in terra Aegypti, Sed educam eum in manu
    potenti et brachio excelso, et percutiam Aegyptum plaga sicut prius, et corrumpam
    omnem terram eius. Lugeat Aegyptus et fundamenta eius a plaga uerberationis et
    castigationis quam inducit dominus. Lugeant cultores operantes terram, quoniam
    deficient semina eorum, et uastabuntur ligna eorum ab uredine et grandine et a
    sidus terribile. Vae saeculo et qui inhabitant in eum! Quia adpropinquauit gladius
    et contritio eorum, et exsurget gens super gentem ad pugnam, et rumphea in manibus
    eorum. Erit enim inconstabilitio hominibus; alii aliis inualescentes non curabunt
    regem suum et principem megestanorum suorum in potentia sua. Concupiscet enim
    homo in ciuitatem ire et non poterit. Propter superbiam enim eorum ciuitates turbabuntur,
    domus exterentur, homines metuent. Non miserebitur homo proximum suum ad impetum
    faciendum in domos eorum in gladium, ad diripiendas substantias eorum propter
    famem panis et tribulationem multam. Ecce ego conuoco, dicit deus, omnes reges
    terrae ad me uerendum ab oriente et ab austro, ab euro et a libano, ad conuertendos
    se et reddere quae dederunt illis. Sicut faciunt usque hodie electis meis, sic
    faciam et reddam in sinu eorum. haec dicit dominus deus: Non parcet dextera mea
    super peccantes, nec cessabit rumphaea super effundentes sanguinem innocuum super
    terram. Et exiit ignis ab ira eius et deuorauit fundamenta terrae et peccatores
    quasi stramen incensum. Vae eis qui peccant et non obseruant mandata mea, dicit
    dominus; Non parcam illis. discedite filii apostatae, nolite contaminare sanctificationem
    meam. Quoniam nouit dominus omnes qui derelinquunt in illum, propterea tradidit
    eos in mortem et in occisionem. Iam enim uenerunt super orbem terrarum mala, et
    manebitis in illis, non enim liberabit uos deus propter quod peccastis in eum.
    Ecce uisio horribilis, et facies illius ab oriente! Et exient nationes draconum
    Arabum in curris multis, et sibilatus eorum a die itineris fertur super terram,
    ut etiam timeant et trepidentur omnes, qui illos audient. Carmonii insanientes
    in ira exient ut apri de silua et aduenient in uirtute magna et constabunt in
    pugnam cum illis et uastabunt portionem terrae Assyriorum in dentibus suis. Et
    post haec superualescent dracones natiuitatis menores suae, et si conuerterint
    se conspirantes in uirtute magna ad persequendos eos, Et isti turbabuntur et silebunt
    in uirtute illorum et conuertent pedes suos in fugam, Et a territorio Assyriorum
    subsessor obsidebit illos et consumet unum ex illis, et erit timor et tremor in
    exercitum illorum et inconstantia in reges ipsorum. Ecce nubs ab oriente et a
    septentrione usque ad meridianum et facies illorum horrida ualde, plena irae et
    procellae; Et conlident se inuicem et effundent sidus copiosum super terram et
    sidus illorum, et erit sanguis a gladio usque ad uentrem equi Et femur hominis
    et suffraginem cameli, et erit timor et tremor multus super terram, Et horrebunt
    qui uidebunt iram illam, et tremor adprehendit illos. et post haec mouebuntur
    nimbi copiosi A meridiano et septentrione et portio alia ab occidente. Et superinualescent
    uenti ab oriente et recludent eum et nubem quam suscitauit in ira, et sidus ad
    faciendam exteritionem ab orientalem notum et occidentem uiolabitur. Et exaltabuntur
    nubes magnae et ualidae plenae irae et sidus, ut exterant omnem terram et inhabitantes
    eam, et fundent super omnem altum et eminentem sidus terribile, Ignem et grandinem
    et rumph[e]as uolantes et aquas multas, ut etiam impleantur omnes'
  language: Latin
translation:
  text: because they are faithful and true. Do not fear the schemes against you, and
    do not let the unbelief of those who speak against you trouble you.
