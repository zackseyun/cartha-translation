  rationale: 'The Latin ''sinus'' (reflecting the Greek κόλπος) refers to the fold of a garment used as a pouch or pocket. In modern English, ''bosom'' has largely lost this physical sense, obscuring the metaphor of a measured repayment poured out for them to carry; ''lap'' preserves the author''s intended image. Additionally, the draft inserts ''also'', which has no basis in the Latin (''sic faciam et reddam'' simply means ''so I will do and repay''). | Azure: This is 6 Ezra, where the extant text is Latin translating Greek, and the proposed change is more faithful on two specific points. First, Latin "in sinum ipsorum" uses "sinus" in the concrete sense of'
