  rationale: 'Azure-modified: The rationale is substantially correct: in 6 Ezra (a Greek-based Christian apocalypse), Latin inreligiose is not well represented by modern English "irreligiously," which now tends to suggest mere lack of religious observance rather than active impiety or ungodliness. "Impiously" better matches the moral-religious force of inreligiose, and agunt in this context is better rendered "commit" or "do" than the awkward "practice." I modify rather than fully apply because the proposed phrase order "imp'
