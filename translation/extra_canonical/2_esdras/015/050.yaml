  rationale: The relative clause 'that has been sent out against you' is awkwardly separated from its antecedent 'heat'. Additionally, Latin 'super te' is more naturally rendered 'upon you' rather than 'against you' in the context of divine judgment sent from above, allowing for a smoother, more compact English word order.
