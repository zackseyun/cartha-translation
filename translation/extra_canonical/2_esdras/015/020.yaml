  category: mistranslation
  tier: 2
  from: and Lebanon
  to: and the southwest
  rationale: The Latin 'a libano' is a well-known textual corruption of 'a libo',
    which transliterates the Greek λιβός (the southwest wind). The 3rd-century Greek
    author of 6 Ezra is listing the four winds/directions (Boreas, Notos, Euros, Lips)
    to encompass the whole earth. Translating the corrupted Latin literally as 'Lebanon'
    destroys the author's intended geographic idiom.
