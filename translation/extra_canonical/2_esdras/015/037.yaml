  from: And there will be great fear and trembling upon the earth, and those who see that wrath will shudder, and trembling will seize them. After this mighty storm-clouds will be stirred up
  to: And those who see that wrath will shudder, and trembling will seize them. And after this, abundant storm-clouds will be stirred up
  rationale: The phrase 'And there will be great fear and trembling upon the earth' translates 'et erit timor et tremor multus super terram', which belongs to the end of verse 36 in the Latin source and must be removed here. Additionally, 'et post haec' is missing its conjunction ('And after this'), and 'copiosi' (abundant/plentiful) is better rendered as 'abundant' rather than 'mighty' to distinguish it from 'validae' (mighty) in verse 40.
