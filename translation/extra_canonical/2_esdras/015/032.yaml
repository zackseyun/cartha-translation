  from: be silenced by their strength
  to: fall silent at their strength
  rationale: 'The Latin verb `silebunt` is active (''will be silent'' / ''will fall silent''), not passive (''will be silenced''). The English passive shifts the grammatical action. Additionally, with an active intransitive verb, `in virtute illorum` is better rendered as ''at their strength'' or ''because of their strength'' rather than the instrumental ''by''. | Azure: The proposed change corrects a real grammatical error in the current English. In the Latin, `silebunt` is straightforward future active plural of `sileo` (“they will be silent / fall silent”), not a p'
