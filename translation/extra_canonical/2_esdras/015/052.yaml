  from: Would I have been so jealous against you, says the Lord,
  to: Would I be so zealous against you, says the Lord,
  rationale: The Latin 'zelabo' (reflecting Greek ζηλώσω) in this context of divine
    judgment denotes zealous wrath or fierce anger, not 'jealousy' in the modern English
    sense of envy or romantic possessiveness. God is avenging the blood of the martyrs
    (v. 53). 'Jealous against' is both awkward English and theologically misleading
    here. Furthermore, 'zelabo' is future tense, functioning as the apodosis of a
    mixed condition ('Would I be so zealous... if you had not killed...'), making
    'Would I be' a closer reflection of the author's syntax than 'Would I have been'.
