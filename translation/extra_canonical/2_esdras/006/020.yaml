  to: 'when the humiliation of Zion is completed, and when the age that is beginning
    to pass away is sealed, I will perform these signs: the books will be opened before
    the face of the firmament, and all will see together.'
  rationale: The clause 'quando suppleta fuerit humilitas Sion' ("when the humiliation
    of Zion is completed") is present in the Latin source for verse 20 but missing
    from the draft (it was erroneously appended to the end of verse 19). It must be
    restored to its proper verse. Additionally, 'faciam' means "I will do/perform,"
    not "I will show" (which would be 'ostendam'), and adding the definite article
    to "the books" better reflects the apocalyptic idiom (cf. Dan 7:10).
