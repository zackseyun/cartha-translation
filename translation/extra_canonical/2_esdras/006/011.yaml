  to: Then I answered and said, “O Sovereign Lord, if I have found favor before your eyes,
  rationale: 'The Latin ''dominator domine'' (reflecting Greek δέσποτα κύριε and Hebrew אדני יהוה) consists of two nouns in apposition. Translating ''dominator'' as a relative clause (''who rules'') weakens its titular force. ''Sovereign Lord'' better captures the formal, apocalyptic register of Ezra''s address to God. | Azure: The proposed change is closer to the source. In 4 Ezra 6:11 the address is the fixed title Latinized as *dominator domine* (very likely reflecting Greek δέσποτα κύριε), i.e., two vocative substantives'
