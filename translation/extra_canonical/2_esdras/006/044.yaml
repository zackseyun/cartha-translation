  from: desire for tastes of many kinds
  to: manifold delights of taste
  rationale: The Latin 'concupiscentia' (desire) here reflects a literal translation of Greek ἐπιθυμία, which in turn likely translates the Hebrew חֶמְדָּה (delight, pleasantness, cf. Gen 2:9 'pleasant to the sight'). Translating it literally as 'desire' in English awkwardly implies a subjective feeling was created, whereas the author is describing the objective pleasantness or delightfulness of the created vegetation.
