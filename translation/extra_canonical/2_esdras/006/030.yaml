  rationale: 'The Latin ''et venturae nocti'' (or ''et ventura nocte'') is widely
    recognized as a corruption of ''hac ventura nocte'' (this coming night), which
    sets up the direct contrast with ''by day'' in the following verse. Translating
    the corrupt ''et'' literally as ''and'' creates a dangling fragment and obscures
    the temporal contrast. | Azure: In 4 Ezra proper (Latin primary but often corrupt),
    the transmitted Latin here, "et venturae nocti," is indeed best explained as a
    corruption of "hac ventura nocte" or equivalent, a standard emendatio'
