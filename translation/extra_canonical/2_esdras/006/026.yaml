  from: And the men who have been taken up, who have not tasted death from their birth, will be seen
  to: And they will see the men who have been taken up, who have not tasted death from their birth
  rationale: The Latin `uidebunt` is active, third-person plural ('they will see'), with the survivors from the previous verse as the implied subject and `homines qui recepti sunt` as the object. The draft incorrectly renders it as a passive ('will be seen'), shifting the grammatical subject and losing the active experience of the survivors.
