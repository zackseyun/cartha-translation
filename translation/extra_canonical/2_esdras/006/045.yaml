  from: the brightness of the sun to be made, the light of the moon, and the arrangement of the stars
  to: the brightness of the sun, the light of the moon, and the arrangement of the stars to be made
  rationale: In Latin, the infinitive 'fieri' precedes and governs the entire list of accusatives ('solis splendorem, lunae lumen stellarum dispositionem'). In English, placing 'to be made' immediately after the first item leaves the subsequent items dangling syntactically. Moving the infinitive to the end of the list clarifies that all three were commanded to be made.
