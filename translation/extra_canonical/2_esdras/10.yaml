translation:
  text: '1 And it happened that when my son had entered his bridal chamber, he fell
    down and died.

    2 Then we put out all the lamps, and all my fellow citizens rose up to comfort
    me, and I was quiet until the next day, until night.

    3 And it happened, when all had ceased from comforting me so that I might rest,
    that I rose by night and fled and came, as you see, into this field.

    4 And I have come, as you see, into this field. I am thinking now that I will
    not return to the city, but will stay here; and I will neither eat nor drink,
    but without ceasing I will mourn and fast until I die.”

    5 Then I left off the words in which I had still been engaged, and I answered
    her in anger and said,

    6 “Foolish above all women, do you not see our mourning and what has happened
    to us?

    7 For Zion our mother, the mother of us all, grieves in sorrow and has been brought
    very low in humiliation.

    8 Therefore mourn with all your might. And now, since we all mourn and are sorrowful,
    because we are all grieved, why are you grieved over one son?

    9 Ask the earth, and it will tell you that it is she who ought to mourn for so
    many who spring up upon her.

    10 From her all have had their beginnings, and others come; and behold, nearly
    all walk to destruction, and their multitude comes to extermination.

    11 Who then ought to mourn more, if not she who has lost so great a multitude,
    rather than you, who grieve for one?

    12 But if you say to me, ‘My lament is not like the earth’s, because I have lost
    the fruit of my womb,

    13 whom I bore with sorrows and brought forth with pains, while the earth, according
    to the way of the earth, the multitude now present in her goes away just as it
    came’—

    14 then I say to you: just as you gave birth in pain, so also the earth has given
    its fruit, man, from the beginning, to him who made her.

    15 Now then, keep your grief within yourself, and bear bravely the misfortunes
    that have happened to you.

    16 For if you acknowledge the justice of God’s decree, you will receive your son
    in due time and will be praised among women.

    17 Therefore go into the city to your husband.”

    18 But she said to me, “I will not do it, nor will I go into the city, but here
    I will die.”

    19 Then I continued speaking to her and said,

    20 “Do not say this, but consent to be persuaded because of Zion’s calamities,
    and be comforted because of Jerusalem’s sorrow.

    21 For you see that our sanctuary has been laid waste, our altar torn down, and
    our temple destroyed.

    22 Our harp-song has been brought low, our hymn has fallen silent, our rejoicing
    has been dissolved, the light of our lampstand has been extinguished, the ark
    of our covenant has been plundered, our holy things have been defiled, and the
    name that was called over us has been almost profaned. Our children have suffered
    insult, our priests have been burned, our Levites have gone into captivity, our
    virgins have been defiled, our women have suffered violence, our righteous men
    have been carried off, our little ones have been betrayed, our young men have
    been enslaved, and our strong men have been made weak.

    23 And what is greatest of all, the seal of Zion—for now it has been stripped
    of her glory and handed over into the hands of those who hate us.

    24 Therefore shake off your great sadness, and put away from yourself the multitude
    of sorrows, so that the Mighty One may again be gracious to you, and the Most
    High may give you rest, relief from your labors.”

    25 And it happened, while I was speaking to her, that suddenly her face shone
    exceedingly, and her appearance flashed, her countenance becoming radiant,

    26 and suddenly she let out a great cry, full of terror, so that the earth was
    shaken by the sound.

    27 And I looked, and behold, the woman no longer appeared to me, but a city was
    being built, and a place was being revealed from great foundations. Then I was
    afraid and cried out with a loud voice and said,

    28 “Where is Uriel the angel, who came to me at the beginning? For it was he who
    made me come into this abundance of ecstasy of mind, and my end has become corruption,
    and my prayer a reproach.”

    29 And while I was speaking these things, behold, the angel who had come to me
    at the beginning came to me and saw me.

    30 And behold, I was lying there like a dead man, and my understanding had been
    taken away; and he took my right hand and strengthened me and set me on my feet,

    31 and said to me, “What is the matter with you? And why are you troubled? And
    why is your understanding troubled, and the perception of your heart?”

    32 And I said, “Because you have utterly forsaken me. For I did according to your
    words and went out into the field, and behold, I saw and still see what I am not
    able to describe.”

    33 And he said to me, “Stand up like a man, and I will instruct you.”

    34 And I said, “Speak, my lord; only do not forsake me, lest I die for nothing.

    35 For I have seen what I did not know, and I hear what I do not understand.

    36 Or is my mind deceived, and is my soul dreaming?

    37 Now therefore I beg you to show your servant the meaning of this ecstasy.”

    38 And he answered me and said, “Listen to me, and I will teach you, and I will
    tell you about the things you fear, because the Most High has revealed many mysteries
    to you.

    39 For he has seen your upright way, that you were grieving without ceasing for
    your people and mourning greatly for Zion.

    40 This, then, is the meaning of the vision:

    41 the woman who appeared to you a little while ago, whom you saw mourning and
    whom you began to comfort—

    42 now you no longer see the form of a woman, but a city appeared to you being
    built.

    43 And as for her telling you about the misfortune of her son, this is the interpretation:

    44 this woman whom you saw is Zion, whom you now see as a city being built.

    45 And as for her saying to you that she had been barren for thirty years, this
    is because there were three thousand years in the age when no offering had yet
    been offered in her.

    46 And it happened, after three thousand years, Solomon built the city and offered
    offerings; then it was that the barren woman bore a son.

    47 And as for her saying to you, ‘I nourished him with toil,’ this was the dwelling
    of Jerusalem.

    48 And as for her saying to you that my son, when he came into his bridal chamber,
    died and disaster befell him, this was the ruin that came upon Jerusalem.

    49 And behold, you saw her likeness, how she mourns for her son, and you began
    to comfort her concerning what had happened. These things had to be opened to
    you.

    50 And now, since the Most High has seen that you are grieved from your soul and
    that you suffer for her with your whole heart, he has shown you the brightness
    of her glory and the beauty of her splendor.

    51 For this reason I told you to remain in the field where no house had been built.

    52 For I knew that the Most High was beginning to show you these things.

    53 Therefore I told you to come into the countryside, where there is no foundation
    of any building.

    54 For no work of man’s building could endure in the place where the city of the
    Most High was beginning to be shown.

    55 Therefore do not fear, and do not let your heart be terrified, but go in and
    see the splendor and the greatness of the building, as much as your eyes are able
    to see.

    56 And after this you will hear as much as your ears are able to hear.

    57 But you are blessed above many, and you have been called by the Most High,
    as only a few have been.

    58 But on the night that is coming tomorrow you shall remain here,

    59 and the Most High will show you those dream-visions that the Most High will
    do for those who dwell on the earth in the last days.”

    60 And I slept that night and the next, as he had told me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '23'
    text: The phrase 'the seal of Zion' is difficult. It may refer to Zion's distinctive
      glory, authenticated status, or some emblematic mark of honor; the Latin image
      is preserved rather than paraphrased away.
    reason: lexical_alternative
  - marker: '25'
    text: The Latin breaks off at ut etiam (‘so that even’) at the end of this verse.
      The English smooths the break for readability while leaving the sudden, interrupted
      transformation intact.
    reason: textual_variant
  - marker: '28'
    text: Latin 'this abundance of this ecstasy of mind' is awkward but forceful.
      The sense is that Ezra has been driven into an overwhelming visionary state,
      not merely ordinary confusion.
    reason: lexical_alternative
  - marker: '45'
    text: The wording behind 'three thousand years' is compressed and difficult in
      Latin. The interpretation follows the chapter's symbolic chronology, where the
      woman's thirty years correspond to a much larger epoch before offerings were
      made in Zion.
    reason: textual_variant
lexical_decisions:
- source_word: thalamus
  chosen: bridal chamber
  alternatives:
  - chamber
  - wedding chamber
  lexicon: Lewis & Short
  rationale: In this chapter's symbolic lament, the son's entry into the thalamus
    evokes a marriage chamber, not merely a private room. 'Bridal chamber' preserves
    the nuptial setting that later maps onto Jerusalem's catastrophe.
- source_word: stulta super omnes mulieres
  chosen: Foolish above all women
  alternatives:
  - Most foolish of women
  - More foolish than all women
  lexicon: Lewis & Short
  rationale: A sharp, direct rebuke fits Ezra's anger. The comparative-superlative
    force is preserved without softening his emotional register.
- source_word: Sion mater nostra omnium
  chosen: Zion our mother, the mother of us all
  alternatives:
  - Zion our mother of all
  - Zion, mother of us all
  lexicon: Lewis & Short
  rationale: The appositional repetition in Latin is retained to preserve the solemn
    cadence and maternal imagery central to the vision.
- source_word: germinantium
  chosen: who spring up
  alternatives:
  - growing
  - coming forth
  lexicon: Lewis & Short
  rationale: The earth image is organic and generative. 'Spring up' keeps the metaphor
    vivid and close to the Latin.
- source_word: fructum ventris mei
  chosen: the fruit of my womb
  alternatives:
  - my womb's fruit
  - my child
  lexicon: Lewis & Short
  rationale: This is a traditional but still transparent rendering of the idiom, preserving
    bodily and maternal concreteness.
- source_word: iustificaveris terminum Dei
  chosen: acknowledge the justice of God's decree
  alternatives:
  - justify God's sentence
  - accept God's appointed limit
  lexicon: Lewis & Short
  rationale: Terminus here is not merely a boundary but an appointed determination.
    'Acknowledge the justice of God's decree' communicates the sense in readable English
    while preserving the theological force of submitting to divine judgment.
- source_word: sanctificatio nostra
  chosen: our sanctuary
  alternatives:
  - our holy place
  - our consecrated place
  lexicon: Lewis & Short
  rationale: In context with altar and temple, the referent is cultic space. 'Sanctuary'
    is the most natural and precise English equivalent.
- source_word: psalterium nostrum humiliatum est
  chosen: Our harp-song has been brought low
  alternatives:
  - our psaltery has been humbled
  - our music has been cast down
  lexicon: Lewis & Short
  rationale: The Latin names the instrument or its music. 'Harp-song' preserves the
    poetic cultic register without using an opaque instrument term for modern readers.
- source_word: signaculum Sion
  chosen: the seal of Zion
  alternatives:
  - the signet of Zion
  - the mark of Zion
  lexicon: Lewis & Short
  rationale: The phrase is difficult, but 'seal' best preserves the metaphor and leaves
    interpretive space for Zion's distinctive glory or authenticated status.
- source_word: fortis
  chosen: the Mighty One
  alternatives:
  - the Strong One
  - the Mighty
  lexicon: Lewis & Short
  rationale: Used as a divine title here, it should sound titular rather than adjectival.
    'The Mighty One' preserves the reverent force.
- source_word: Altissimus
  chosen: the Most High
  alternatives: []
  lexicon: Lewis & Short
  rationale: Project policy requires this rendering, and it preserves the book's consistent
    divine title.
- source_word: excessus mentis huius
  chosen: this ecstasy of mind
  alternatives:
  - this bewilderment of mind
  - this trance
  lexicon: Lewis & Short
  rationale: Excessus can denote a state of transport or being beside oneself. 'Ecstasy
    of mind' keeps the apocalyptic-vision register and explains Ezra's destabilized
    state without psychologizing it away.
- source_word: intellectus meus alienatus erat
  chosen: my understanding had been taken away
  alternatives:
  - my mind was estranged
  - my understanding was beside itself
  lexicon: Lewis & Short
  rationale: Alienatus suggests dislocation from normal mental function. The chosen
    rendering is idiomatic and preserves the sense of cognitive disorientation.
- source_word: sensus cordis tui
  chosen: the perception of your heart
  alternatives:
  - the sense of your heart
  - your heart's understanding
  lexicon: Lewis & Short
  rationale: The phrase joins cognition and inner disposition. 'Perception of your
    heart' keeps the anthropological texture rather than reducing it to bare intellect.
- source_word: Sta ut vir
  chosen: Stand up like a man
  alternatives:
  - Stand like a man
  - Take your stand as a man
  lexicon: Lewis & Short
  rationale: Gender-accurate rendering matches the masculine singular and the exhortatory
    force. It also fits the book's repeated summons to courage.
- source_word: rectam viam tuam
  chosen: your straight way
  alternatives:
  - your upright way
  - your right course
  lexicon: Lewis & Short
  rationale: The image is of moral directness and fidelity. 'Straight way' preserves
    the metaphor rather than abstracting it.
- source_word: absolutio
  chosen: interpretation
  alternatives:
  - solution
  - explanation
  lexicon: Lewis & Short
  rationale: In visionary context, the term introduces the meaning or resolution of
    the symbol. 'Interpretation' is the clearest English choice.
- source_word: saeculo tres
  chosen: three thousand years
  alternatives:
  - three ages
  lexicon: Lewis & Short
  rationale: The context and standard reckoning in 4 Ezra indicate millennial periods
    rather than three vague eras. The following verse confirms the chronological interpretation.
- source_word: claritatem gloriae eius et pulchritudinem decoris eius
  chosen: the brightness of her glory and the beauty of her splendor
  alternatives:
  - the radiance of her glory and the beauty of her adornment
  lexicon: Lewis & Short
  rationale: A doubled expression of magnificence should remain elevated and somewhat
    redundant in English to preserve apocalyptic style.
- source_word: opus aedificii hominis
  chosen: work of man's building
  alternatives:
  - human construction
  - a building made by man
  lexicon: Lewis & Short
  rationale: The phrase contrasts human construction with the city of the Most High.
    'Man's building' keeps the formal cadence and anthropological contrast.
- source_word: visiones somniorum
  chosen: dream-visions
  alternatives:
  - visions of dreams
  - dreams
  lexicon: Lewis & Short
  rationale: The compound expression marks revelatory dreams, not ordinary sleep imagery.
    'Dream-visions' is concise and apocalyptic in tone.
theological_decisions:
- issue: Rendering of 'Dei' in 10:16 despite nearby divine titles
  chosen_reading: God's decree
  alternative_readings:
  - the decree of the Most High
  rationale: The Latin here reads Dei, not Altissimi. To preserve source-level variation,
    the main text keeps 'God's decree' while elsewhere Altissimus is consistently
    rendered 'the Most High.'
  doctrine_reference: Translate what the source says; preserve theological tension
    and lexical distinctions where possible.
- issue: Interpretation of the chronological phrase in 10:45
  chosen_reading: three thousand years
  alternative_readings:
  - three ages
  - three hundred years
  rationale: The difficult Latin 'anni saeculo tres' is best understood in the book's
