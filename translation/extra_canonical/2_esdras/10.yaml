source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned
    Latin
  text: '1 et factum est cum introisset filius meus in thalamo suo, cecidit et mortuus
    est.

    2 et evertimus omnes lumina, et surrexerunt omnes cives mei ad consolandam me,
    et quievi usque in alium diem usque noctem.

    3 et factum est cum omnes quievissent ut me consolarentur ut quiescerem, et surrexi
    nocte et fugi et veni, sicut vides, in hoc campo.

    4 et ueni, sicut uides, in hoc campo. Et cogito iam non reuerti in ciuitate sed
    hic consistere, et neque manducabo neque bibam, sed sine intermissione lugere
    et ieiunare usque dum moriar.

    5 Et dereliqui sermones in quibus adhuc eram et respondi cum

    6 iracundia ad eam et dixi: Stulta super omnes mulieres, non

    7 uides luctum nostrum et quae nobis contigerunt ? Quoniam Sion mater nostra omnium
    in tristitia contristatur et humilitate

    8 humiliata est, lugete ualidissime. Et nunc quoniam omnes lugemus, et tristes
    estis, quoniam omnes contristati sumus, tu

    9 autem contristaris in uno filio. Interroga enim terram et dicet tibi, quoniam
    haec est quae debeat lugere tantorum super eam

    10 germinantium. Et ex ipsa initia omnes nacti, et alii ueniunt, et ecce pene
    omnes in perditionem ambulant et in exterminium

    11 fit multitudo eorum. Quis ergo debet lugere magis nisi haec quae tam magnam
    multitudinem perdidit, quam tu quae pro

    12 uno doles ? Si autem dices mihi, quoniam non est similis planctus meus terrae,
    quoniam ego fructum uentris mei perdidi,

    13 quem cum meroribus peperi et cum doloribus genui, Terra autem secundum uiam
    terrae, abiit quae in ea multitudo praesens

    14 quomodo et uenit ; et ego tibi dico: Sicut tu cum dolore peperisti, sic et
    terra dedit fructum suum hominem ab initio ei qui fecit eam. Nunc ergo retine
    apud temetipsam dolorem tuum, et fortiter fer qui tibi contigerunt casus. Si enim
    iustificaueris terminum dei, et filium tuum recipies in tempore et in mulieribus
    conlaudaberis. Ingredere ergo in ciuitatem ad uirum tuum. et dixit ad me: Non
    faciam neque ingrediar ciuitatem, sed hic moriar. Et adposui adhuc loqui ad eam
    et dixi: Noli facere sermonem hunc, sed consenti persuaderi propter casus Sion
    et consolare propter dolorem Hierusalem. Vides enim quoniam sanctificatio nostra
    deserta effecta est, et altare nostrum demolitum est, et templum nostrum destructum
    est, Et psalterium nostrum humiliatum est, et hymnus noster conticuit, et exultatio
    nostra dissoluta est, et lumen candelabri nostri extinctum est, et arca testamenti
    nostri direpta est, et sancta nostra contaminata sunt, et nomen quod nominatum
    est super nos profanatum est, et liberi nostri contumeliam passi sunt, et sacerdotes
    nostri succensi sunt, et Leuitae nostri in captiuitate abierunt, et uirgines nostrae
    coinquinatae sunt, et mulieres nostrae uim passae sunt, et iusti nostri rapti
    sunt, et paruuli nostri proditi sunt, et iuuenes nostri seruierunt, et fortes
    nostri invalidi facti sunt. Et quod omnium maius, signaculum Sion, quoniam resignata
    est de gloria sua nunc, et tradita est in manibus eorum qui nos oderunt.

    15 nunc ergo retine apud temet ipsam dolorem tuum et fortiter fer quaetibi contigerunt
    casus.

    16 si enim iustificaveris terminum Dei, et filium tuum recipies in tempore et
    in mulieribus conlaudaberis.

    17 ingredere ergo in civitatem ad virum tuum. Et dixit ad me:

    18 non faciam neque ingrediar civitatem, sed hic moriar.

    19 et adposui adhuc loqui ad eam et dixi:

    20 noli facere sermonem hunc, sed consenti persuaderi – quid enim casus Sion –
    et consolare propter dolorem Hierusalem.

    21 vides enim, quoniam sanctificatio nostra deserta effecta est et altare nostrum
    demolitum est et templum nostrum destructum est,

    22 et psalterium nostrum humiliatum est et hymnus noster conticuit et exultatio
    nostra dissoluta est, et lumen candelabri nostri extinctum est et arca testamenti
    nostri direpta est et sancta nostra contaminata sunt, et nomen quod nominatumest
    super nos paene profanatum est, et liberi nostri contumeliam passi sunt, et sacerdotes
    nostri succensi sunt et Levitae nostri in captivitate abierunt, et virgines nostrae
    coinquinatae sunt et mulieres nostrae vim passae sunt, et iusti nostri rapti sunt
    et parvuli nostri proditisunt, et iuvenes nostri servierunt et fortes nostri invalidi
    facti sunt.

    23 et quod omnium maius, signaculum Sion, quoniam resignata est de gloria sua
    nunc et tradita est in manibus eorum qui nos oderunt.

    24 Tu ergo excute tuam multam tristitiam, et depone abs te multitudinem dolorum,
    ut tibi repropitietur fortis, et requiem faciat tibi altissimus, requietionem
    laborum.

    25 Et factum est cum loquebar ad eam, et ecce facies eius fulgebat ualde subito
    et species coruscus fiebat uultus eius, ut etiam

    26 et ecce subito emisit sonum vocis magnum timore plenum, ut commoveretur terra
    a sono. et vidi,

    27 et ecce amplius mulier non conparebat mihi, sed civitas aedificabatur et locus
    demonstrabatur de fundamentis magnis. et timui et clamavi voce magna et dixi:

    28 Vbi est Vriel angelus, qui a principio uenit ad me ? quoniam ipse me fecit
    uenire in multitudinem excessus mentis huius, et factus est finis meus in corruptione,
    et oratio mea in inproperium. Et cum essem loquens ego haec, et ecce uenit ad
    me

    29 et cum essem loquens ego haec, et ecce venit ad me angelus qui in principio
    venerat ad me et vidit me,

    30 angelus qui in principio uenerat ad me, et uidit me, Et ecce eram positus ut
    mortuus, et intellectus meus alienatus erat, et tenuit dexteram meam et confortauit
    me et statuit me super

    31 pedes meos et dixit mihi: Quid tibi est, et quare conturbaris, et quid conturbatus
    est intellectus tuus et sensus cordis tui ? et

    32 dixi: Quoniam derelinquens dereliquisti me: ego quidem feci secundum sermones
    tuos et exiui in campum et ecce uidi et uideo quod non possum enarrare. et dixit
    ad me: Sta ut uir et

    33 commonebo te; et dixi: Loquere, domine meus, tantum me noli

    34 derelinquere, ut non frustra moriar, Quoniam uidi quae non

    35 sciebam et audio quae non scio; Aut numquid sensus meus

    36 fallitur, et anima mea somniatur? Nunc ergo deprecor te ut

    37 demonstres seruo tuo de excessu hoc. Et respondit ad me et

    38 dixit: audi me, et doceam te et dicam tibi de quibus times, quoniam altissimus
    reuelauit tibi mysteria multa. Vidit enim

    39 rectam uiam tuam, quoniam sine intermissione contristabaris pro populo tuo
    et ualde lugebas propter Sion. Hic ergo intel-

    40 lectus uisionis: mulier quae tibi apparuit ante paululum, Quam

    41 uidisti lugentem et inchoasti consolare eam; Nunc autem iam

    42 non speciem mulieris uides, sed apparuit tibi ciuitas aedificari; Et quoniam
    enarrabat tibi de casu filii sui, haec absolutio est:

    43 Haec mulier quam uidisti haec est Sion, quam nunc conspicis

    44 ut ciuitatem aedificatam. Et quoniam dixit tibi quia sterilis

    45 fuit annis triginta, propter quod erant anni saeculo tres, quando non erat
    in ea adhuc oblatio oblata. Et factum est post annos

    46 tres aedificauit Salomon ciuitatem et obtulit oblationes; tunc fuit quando
    peperit sterilis filium. Et quod tibi dixit quoniam

    47 et quod tibi dixit quoniam nutrivi eum cum labore, haec erat habitatio Hierusalem.

    48 nutriuit eum cum labore, haec erat habitatio Hierusalem : Et quoniam dixit
    tibi quod filius meus ueniens in suo thalamo mortuus esset et contigisset ei casus,
    haec erat quae facta est ruina Hierusalem. Et ecce uidisti similitudinem eius,
    quomodo

    49 filium luget, et tu inchoasti consolare eam de his quae contigerunt †haec erant
    tibi aperienda†. Et nunc uidens altissimus

    50 quoniam ex animo contristatus es, et quoniam ex toto corde pateris pro ea,
    ostendit tibi claritatem gloriae eius et pulchritudinem decoris eius. Propterea
    enim dixi tibi ut maneres in

    51 propterea enim dixi tibi, ut maneres in campo, ubi domus non est aedificata.

    52 campo, ubi domus non est aedificata. Sciebam enim ego quoniam altissimus incipiebat
    tibi ostendere haec. Propterea dixi

    53 propterea dixi tibi, ut venires in agrum, ubi non est fundamentum aedificii.

    54 tibi ut uenires in agrum, ubi non est fundamentum aedificii. Nec enim poterat
    opus aedificii hominis sustinere in loco ubi incipiebat altissimi ciuitas ostendi.
    Tu ergo noli timere, neque expauescat cor tuum, sed ingredere et uide splendorem
    et magnitudinem aedificii, quantum capax est tibi uisus oculorum uidere.

    55 tu ergo noli timere neque expavescat cor tuum, sed ingredere et vide splendorem
    vel magnitudinem aedificii, quantum capax est tibi visu oculorum videre.

    56 Et post haec audies quantum capit auditus aurium tuarum

    57 audire. Tu autem beatus es prae multis, et uocatus es apud

    58 altissimum sicut et pauci. Nocte autem quae in crastinum

    59 futura est manebis hic, Et ostendet tibi altissimus eas uisiones somniorum
    quae faciet altissimus his qui habitant super terram in nouissimis diebus. Et
    dormiui illam noctem et aliam sicut praecepit mihi.

    60 et dormivi illam noctem et aliam sicut dixerat mihi.'
