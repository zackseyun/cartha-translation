  rationale: 'In Latin, ''vel certe'' introduces a lesser alternative or fallback (''or at least''), whereas ''or even'' in English often implies an escalating or more extreme alternative. The context of severe depopulation implies that seeing someone is the primary desire, and merely hearing them is the desperate fallback. | Azure: In 2 Esdras 16:28 (part of 6 Ezra, preserved in Latin translation from Greek), the phrase "vel certe" is adversative/alternative with a corrective-minimizing force: "or at least, or anyway" rather tha'
