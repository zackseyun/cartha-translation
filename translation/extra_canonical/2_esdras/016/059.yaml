  rationale: 'First, note a tooling error: the automated verse-splitting script misaligned
    the Latin source text and the English draft. The English draft correctly translates
    standard verse 59 (''Qui conclusit mare... super aquam uerbo suo''), while the
    YAML source field captured the wrong Latin span. Regarding the translation itself:
    the draft flattens the hymnic relative pronoun ''Qui'' (''He who'' / ''who'')
    into an independent clause (''He shut up''). This breaks the continuous doxological
    syntax of verses 56-62, which are all relative clauses modifying ''the Lord''
    (v. 54). Additionally, ''super aquam'' is singular (''upon the water''), not plural
    (''upon the waters'').'
