  rationale: 'The Latin `ut potaret terra` has `terra` (the earth) as the nominative subject of the active verb `potaret` (might drink). Translating it as ''to water the earth'' changes the subject and loses the poetic image of the earth drinking the rivers. | Azure: In 2 Esdras 16 this is part of 6 Ezra, where the surviving Latin reflects a Greek original, but the Latin syntax here is straightforward: `ut potaret terra` is a purpose clause with `ut` + imperfect s'
