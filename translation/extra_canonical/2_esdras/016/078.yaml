  from: Woe to those who are bound fast by their sins and covered over by their iniquities, as a field is hemmed in by a forest and its seeds covered by thorns, so that no man can pass through; it is shut off and given over to be devoured by fire.
  to: your sins, nor let your iniquities prevail over you. Woe to those who are bound fast by their sins and covered over by their iniquities, as a field is hemmed in by a forest and its seeds covered by thorns, through which no man passes; it is shut off and given over to be devoured by fire.
  rationale: The Latin verse begins with 'peccata uestra, nec supereleuent iniquitates uestrae' (completing the sentence from 16:77). The current English draft omits this entirely from 16:78, likely because the chapter-level draft grouped it with 16:77. To match the Latin verse boundaries in this per-verse YAML, the completion of the sentence must be included here. Additionally, 'per quem non transit homo' is a simple relative clause with an indicative verb ('through which no man passes'), rather than a result clause ('so that no man can pass through').
