  from: and there will be no one to comfort them; for the earth
  to: and they have no one to comfort them, and the earth
  rationale: 'The Latin ''non habent'' is a present active indicative with the dead
    as the subject (''they have no one''), which the draft flattens into a future
    existential (''there will be no one''). Furthermore, the draft translates the
    coordinate conjunction ''et'' as ''for'', imposing a causal relationship not present
    in the source. | Azure: The proposal is closer to the Latin. In 6 Ezra 16:24,
    the text reads "et non habent qui consolentur eos. et derelinquetur deserta terra,"
    where "non habent" is plainly 3rd person plural present active'
