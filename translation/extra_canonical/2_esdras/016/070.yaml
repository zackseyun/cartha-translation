  from: And those who consent to them will be had in derision and reproach and trampled underfoot.
  to: some of you, and they will feed you with things sacrificed to idols. And those who consent to them will be held in derision and reproach, and trampled underfoot.
  rationale: The draft omits the first half of the verse (`quosdam ex uobis et cibabunt idolis occisam`), having incorrectly merged it into the draft for 16:69. Furthermore, `idolis occisam` (reflecting Greek εἰδωλόθυτα, with an implied 'carnem' or as a corruption of neuter plural 'occisa') means "things sacrificed to idols" (idol meat), not "killing you to feed to idols" as the 16:69 draft rendered it. This is a major historical and lexical point in 6 Ezra, referring to the Roman persecution test of eating idol meat. The missing text must be restored to 16:70 and correctly translated.
