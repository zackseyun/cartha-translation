  language: Latin
translation:
  text: As a respectable and very beautiful woman hates a prostitute, so righteousness
    will hate iniquity when she adorns herself, and will accuse her to her face when
    he comes who defends the one who searches out every sin upon the earth.
  philosophy: optimal-equivalence
