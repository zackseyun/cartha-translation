  text: zelatur fornicariam mulierem idonea et bona ualde, Sic zela bitur iusticia
    iniquitatem cum exornat se, et accusat eam in faciem, cum uenerit qui defendat
    exquirentem omnem peccatum super terram. Propterea nolite similari eam nec operibus
