  rationale: 'The Latin continues the elliptical parallel structure from verses 42-44 (`qui [verb], quasi...`), all depending on the imperative `estote` in verse 42. Inserting ''let them be'' and changing the construction to ''as though'' breaks the author''s rhythmic litany. Restoring ''like those who'' maintains the consistency and rhetorical force of the passage. | Azure: The rationale is sound. In 2 Esdras 16:42–45 the Latin is a coordinated series governed by the imperative in v.42, with repeated elliptical clauses of the form qui ... quasi .... Here in v.45, qui nub'
