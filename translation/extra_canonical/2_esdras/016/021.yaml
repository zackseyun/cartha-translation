source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned
    Latin
  text: et angustia missa sunt flagella in emendatione. Et in his omnibus se non conuertent
    ab iniquitatibus suis, neque flagellorum memores erunt semper. Ecce erit annonae
    uilitas super terram sic ut putent sibi esse directam pacem, et tunc germinabunt
    mala super terram, gladius, fames et magna confusio. A fame enim plurimi qui inhabitant
    terram interient, et gladius perdet ceteros qui superauerint a fame; Et mortui
    tanquam stercora proicientur, et non erit qui consoletur eos; derelinquetur enim
    terra deserta, et ciuitates eius deicientur. Non derelinquetur qui colat terram
    et qui seminet eam. Ligna dabunt fructus, et quis uindemiabit illa? Vua matura
    fiet, et quis calcabit illam? erit enim in locis magna desertio; Cupiet enim homo
    hominem uidere uel uocem eius audire; Relinquentur enim de ciuitate decem, et
    duo de agro qui absconderint se in densis nemoribus et fissuris petrarum. Quemadmodum
    relinquentur in oliueto in singulis arboribus tres aut quattuor oliuae, Aut sicut
    in uinea uindemiata racemi relinquentur ab his qui diligenter uineam scrutantur;
    Sic relinquentur in diebus illis tres aut quattuor ab scrutantibus domus eorum
    in rumpheam. Et relinquetur deserta terra, et agri eius in uepres erunt, et uiae
    eius et omnes semitae germinabunt spinas, eo quod non transient oues per eam.
    Lugebunt uirgines non habentes sponsos, lugebunt mulieres non habentes uiros,
    lugebunt filiae
  language: Latin
translation:
  text: Yet in all these things they will not turn from their iniquities, nor will
    they always remember the scourges.
