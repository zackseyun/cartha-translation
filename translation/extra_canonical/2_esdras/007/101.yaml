  from: And he said to me, “They will have freedom for seven days, so that they may see the things of which you have been told, and afterward they will be gathered into their habitations.”
  to: And he said, “They will have freedom for seven days, so that they may see the things that have been foretold, and afterward they will be gathered into their habitations.”
  rationale: 'The Latin reads `Et dixit` (''And he said''), without an explicit ''to me'' (unlike v. 104 `Et respondit ad me`). Furthermore, `qui praedicti sunt sermones` (spanning into v. 102) translates as ''the words/things that have been foretold'' (reflecting an underlying Greek *logoi*). The draft''s ''of which you have been told'' blurs the distinction between Ezra''s direct statement in v. 100 (''what you have told me'' / `de quo mihi dixisti`) and the angel''s broader passive response here. | Azure: The proposed change is closer to the Latin of 4 Ezra 7:101. The source given has simply `Et dixit`, so the current addition of `to me` is not supported here, especially since nearby verses can explici'
