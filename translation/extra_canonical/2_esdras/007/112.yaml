  rationale: 'In this eschatological context, ''frequens'' (modifying ''gloria'') carries the sense of ''constant'' or ''continual'', contrasting the transient present age with the permanent glory of the age to come. ''Often'' implies intermittent occurrences rather than a lack of permanence, which misses the author''s point about the nature of the present age. | Azure: This is in 4 Ezra proper, where the Latin reflects an earlier Vorlage, and the contrast is plainly eschatological: "praesens saeculum non est finis" is followed by "gloria in eo non frequens manet." H'
