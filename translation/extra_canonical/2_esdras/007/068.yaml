  from: For all who have been born are mixed with iniquities, and are full of sins and loaded with transgressions.
  to: What does it profit that we will surely be saved, if we will be severely tormented? For all who have been born are entangled in iniquities, and are full of sins and burdened with transgressions.
  rationale: The draft completely omits the first half of the Latin source text assigned to this verse ('quid prodest...'). Additionally, 'salutati saluabimur' (where 'salutati' is a common scribal variant for 'saluati') and 'tormento tormentabimur' are Latin calques for the Hebrew infinitive absolute, conveying certainty and intensity ('surely be saved', 'severely tormented'). Finally, 'entangled in' and 'burdened with' better capture the moral weight and apocalyptic register of 'conmixti' and 'grauidi' than the awkward 'mixed with' and colloquial 'loaded'.
