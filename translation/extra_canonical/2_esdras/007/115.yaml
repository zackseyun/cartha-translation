  rationale: 'In the context of ''in iudicio'' (in the judgment), the Latin ''vicerit'' (likely reflecting Greek νικᾶν, which is frequently used for winning a legal case) means to prevail or be vindicated. ''Conquered'' carries martial connotations that clash with the forensic setting of the verse. | Azure: In 4 Ezra 7:115 the clause is explicitly forensic: "in iudicio victus fuerit ... eum qui vicerit." The paired verbs victus/vicerit are the regular Latin opposites for losing and winning a case or cont'
