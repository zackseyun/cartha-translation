  category: mistranslation
  tier: 2
  from: not to give the earth to Adam, or else, once it had been given
  to: for the earth not to have produced Adam, or else, when it had already produced
    him
  rationale: The phrase 'non dare terram Adam' is an accusative-and-infinitive construction
    where 'terram' is the subject and 'Adam' is the object. In the idiom of 4 Ezra
    (cf. 3:5, where the dust 'dedit Adam'), 'dare' means 'to produce' or 'yield.'
    The draft mistranslates this as God giving the earth to Adam, which misses the
    author's recurring theological motif of the earth bringing forth humanity and
    distorts the active verb 'dedisset' (when the earth had produced him).
