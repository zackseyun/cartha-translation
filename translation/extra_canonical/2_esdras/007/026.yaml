  rationale: The Latin source is 'apparescens civitas' (the appearing city). The draft translates this as 'the city now hidden will appear', importing the scholarly reconstruction of the lost Greek (ἡ νῦν μὴ φαινομένη) against the explicit Latin text. The Latin translator misread the Greek as ἡ νύμφη φαινομένη (the appearing bride), which is why the Latin has 'sponsa et apparescens civitas'. The translation must reflect the Latin source provided.
