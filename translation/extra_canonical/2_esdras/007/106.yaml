  rationale: 'The Latin `primus` (nominative, agreeing with Abraham) introduces Abraham as the first in a chronological list of intercessors (followed in the next verses by Moses, Joshua, Samuel, etc.). The English phrasing ''prayed first for the people of Sodom'' ambiguously implies he prayed for Sodom before praying for something else. Moving ''first'' clarifies its function as heading the list. | Azure: The Latin reads "rogavit primus Abraham propter Sodomitas," where primus is nominative with Abraham, not an adverb modifying rogavit. In context (7:106ff.), Ezra is listing a sequence of exemplary int'
