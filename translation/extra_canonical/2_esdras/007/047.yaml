  from: And now I see that the joy of the age to come will benefit few, but torments many.
  to: And now I see that the joy of the age to come will belong to few, but torments to many.
  rationale: The English phrasing 'will benefit few, but torments many' inadvertently makes 'torments' read as an active verb with 'joy' as its subject (i.e., the joy torments the many). If read as a noun, the ellipsis forces it to share the verb 'benefit' (i.e., torments will benefit many). The Latin 'multis autem tormenta' contrasts with 'ad paucos pertinebit... iocunditatem'—meaning the joy pertains to the few, but torments to the many. Changing the verb to 'belong to' allows the ellipsis to work correctly in English ('will belong to few, but torments [will belong] to many').
