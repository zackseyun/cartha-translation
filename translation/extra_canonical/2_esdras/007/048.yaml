  from: from these things
  to: from God
  rationale: The Latin 'ab his' ('from these') is a recognized translation error, reflecting a misreading of the lost Greek ἀπ' αὐτοῦ ('from him') as ἀπ' αὐτῶν ('from them'). The Syriac, Ethiopic, Arabic, and Armenian daughter versions all preserve 'from him' (i.e., God). Given the theological weight of the 'evil heart' (cor malum / yetzer hara) in 4 Ezra, the author's intent was that the evil heart alienated humanity from God, not 'from these things'.
