  from: from whom they are to receive their glorious reward.
  to: from whom they, being glorified, are to receive their reward.
  rationale: The Latin adjective 'gloriosi' is nominative plural, modifying the subject
    (the righteous souls), not the accusative singular object 'mercedem' (reward).
    The English draft incorrectly transfers the attribute to the reward. The text
    emphasizes the glorified state of the believers themselves.
