translation:
  text: 'The seventh order, which is greater than all the orders mentioned above:
    they will exult with confidence, and trust without being put to shame, and rejoice
    without fear, for they hasten to see the face of him whom they served while living,
    and from whom they, being glorified, are to receive their reward.'
