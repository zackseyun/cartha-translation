  from: For if you sinned,
  to: For though it was you who sinned,
  rationale: 'The Latin ''si'' (reflecting Greek εἰ) here functions concessively (''though'' or ''even if''), setting up the contrast between Adam''s singular act and the collective consequence. The explicit pronoun ''tu'' (''tu peccasti'') is emphatic. Translating ''si'' as a simple conditional ''if'' in English introduces unintended doubt about whether Adam sinned, which disrupts the author''s argument. ''Though it was you who sinned'' captures both the concessive logic and the emphatic pronoun. | Azure: In 4 Ezra 7:118 the Latin reads, "si enim tu peccasti, non est factum solius tuus casus sed et nostrum..." In this argumentative context Ezra is not expressing doubt that Adam sinned; he is conceding '
