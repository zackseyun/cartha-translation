  rationale: 'The Latin ''ingredientes ingressi fuerint'' (literally ''entering they
    shall have entered'') is a calque of a Greek participle + finite verb, which in
    turn translates a Hebrew infinitive absolute + finite verb. In a conditional clause,
    this construction carries the emphatic force of ''actually'' or ''indeed.'' The
    English should reflect this emphasis. | Azure: In 4 Ezra the Latin often preserves
    Semitic/Greek translationese, and here the doubled form *ingredientes ingressi
    fuerint* is not ordinary redundant Latin but an emphatic construction reflecting
    part'
