  rationale: 'The Latin preposition ''super'' here reflects a translation of a Greek/Semitic comparative idiom (ὑπέρ / מן). The draft correctly recognizes this in the second half of the verse (''blacker than darkness'' for ''super tenebras nigrae'') but translates the first half spatially (''above the stars'' for ''super stellas''). It should be ''brighter than the stars'' to preserve the author''s parallel comparative structure. | Azure: In 4 Ezra the Latin often calques a lost Greek/Hebrew comparative idiom with super + accusative, and this verse is a clear parallel: super stellas fulgebunt ... nostrae vero facies super tenebras nigr'
