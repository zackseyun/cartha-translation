  from: the God of your servant heard me
  to: God heard me, your servant,
  rationale: The Latin 'exaudivit me Deus ancillae tuae' reflects a Greek Vorlage where the verb of hearing took a genitive object (εἰσήκουσέν μου... τῆς δούλης σου). The Latin translator rendered the pronoun in the accusative ('me') but left the appositional phrase in the genitive ('ancillae tuae'). The draft's 'the God of your servant' misconstrues this translationese; the intended meaning is 'God heard me, your servant.'
