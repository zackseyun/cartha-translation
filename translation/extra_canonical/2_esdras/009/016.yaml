  rationale: The draft omits the dialogue tag `et respondit ad me et dixit:` ("And he answered me and said,") which is present at the end of this verse in the Latin source. (It appears the draft may have shifted it to 9:17, but verse boundaries must be respected). Additionally, the verb `multiplicat` is singular, indicating that `fluctus` (4th declension) is singular nominative here; thus, "a wave is greater" is grammatically more accurate than "waves are greater in number".
