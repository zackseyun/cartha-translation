  from: has a beginning through an ending, and the ending is made manifest,
  to: has an evident beginning and a manifest end,
  rationale: The draft translates a corrupted Latin text (`per consummationem`). The
    critical text (Bensly 1895) reads `initium patet et consummatio manifesta` ("the
    beginning is evident and the end is manifest"), which is supported by the Syriac
    and other daughter versions. The current English "a beginning through an ending"
    is nonsensical in this context. The author's point is that both the beginning
    and the end of worldly things are clearly seen, just as the times of the Most
    High will be.
