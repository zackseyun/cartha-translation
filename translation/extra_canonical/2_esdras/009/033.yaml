  rationale: 'The Latin ''Nam qui'' (with ''Nam qui'' visible at the end of the 9:31 context block, though belonging to the start of 9:33) means ''For those who''. It provides the logical explanation for the statement in 9:32: the fruit of the law did not perish, *for* it was the recipients who perished. Translating ''Nam'' as ''But'' obscures this explanatory connection. | Azure: In 4 Ezra 9:33 the Latin tradition reads with an explanatory particle: the reviewer is right that the clause begins with ''Nam qui ... acceperunt perierunt,'' and ''nam'' regularly means ''for'' / ''because,'
