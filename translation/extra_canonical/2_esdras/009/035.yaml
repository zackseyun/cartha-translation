  to: and when what was sown or sent or received is destroyed, these are destroyed, but the things that received them remain. For with us it has not happened so.
  rationale: 'The draft''s ''then, if'' breaks the parallel temporal clauses in the Latin (''cum acceperit... et cum fuerit ut...'' -> ''when [the earth] receives... and when it happens that...''). Additionally, ''apud nos enim'' uses the explanatory conjunction ''enim'' (''for''), which builds a chain of reasoning into the next verse; translating it as the adversative ''Yet'' obscures the author''s logic. | Azure: The proposed change is closer to the Latin syntax and discourse flow. In this context the argument is built with parallel temporal clauses introduced by cum, not a hypothetical condition; so ''when'' is'
