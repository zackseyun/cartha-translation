translation:
  text: |-
    1 And it happened after seven days, that I dreamed a dream in the night.
    2 And behold, a wind arose from the sea, to stir up all its waves.
    3 And I looked, and behold, that man was flying with the clouds of heaven; and wherever he turned his face to look, everything seen beneath him trembled.
    4 And wherever a voice went out from his mouth, all who heard his voice were set ablaze, just as wax melts when it senses the fire.
    5 And after this I looked, and behold, a multitude of men was gathering, without number, from the four winds of heaven, to make war against the man who had come up from the sea.
    6 And I looked, and behold, he carved out for himself a great mountain and flew up upon it.
    7 But I sought to see the region or place from which the mountain had been carved out, and I could not.
    8 And after this I looked, and behold, all those who had gathered against him to attack him were greatly afraid, yet they still dared to fight.
    9 And behold, when he saw the assault of the multitude coming, he did not lift his hand, nor did he hold a spear, nor any weapon of war;
    10 but I only saw how he sent out from his mouth something like a wave of fire, and from his lips a breath of flame, and from his tongue he shot out sparks of storm.
    11 And all these were mixed together—the wave of fire, the breath of flame, and the great storm—and it fell upon the assault of the multitude that had prepared to fight, and burned them all up, so that suddenly nothing could be seen of the innumerable multitude except only the dust of ashes and the smell of smoke. And I saw it and was astonished.
    12 After this I saw that same man coming down from the mountain and calling to himself another multitude, a peaceful one.
    13 And the faces of many men were coming to him: some rejoicing, some grieving; some were bound, and some were bringing those who were being offered. And I awoke from the greatness of my fear, and I made supplication to the Most High and said,
    14 “From the beginning you have shown these wonders to your servant, and you have counted me worthy that you should receive my prayer.
    15 Now also show me the interpretation of this dream.
    16 For as I think in my understanding, woe to those who are left in those days, and much more woe to those who are not left!
    17 For those who are not left will be sorrowful,
    18 understanding what is stored up in the last days and not meeting it;
    19 but even those who are left—woe because of this! For they will see great dangers and many distresses, as these dreams show.
    20 Yet it is easier for one in danger to come into these things than to pass through life like a cloud and not see what has happened in the end.”
    21 And he answered me and said, “I will tell you the interpretation of the vision, and I will also explain to you the matters of which you have spoken.
    22 As for what you said about those who are left, and about those who are not left, this is the interpretation:
    23 he who brings the danger at that time will himself protect those who fall into danger, those who have works and faith toward the Mighty One.
    24 Therefore know that those who are left are more blessed than those who have died.
    25 And this is the interpretation of the vision: as for your seeing a man coming up from the heart of the sea,
    26 this is he whom the Most High has been keeping for many ages, who will by himself deliver his creation; and he himself will direct those who are left.
    27 And as for your seeing spirit and fire and storm coming out from his mouth,
    28 and that he held neither spear nor weapon of war, yet destroyed the assault of the multitude that had come to attack him, this is the interpretation:
    29 behold, days are coming when
    30 the Most High will begin to deliver those who are upon the earth.
    31 And bewilderment of mind will come upon those who inhabit the earth. And they will plan to make war, one against another, city against city, place against place,
    32 people against people, and kingdom against kingdom. And it shall be, when these things happen, and the signs occur that I showed you before, then
    33 my Son will be revealed, whom you saw as a man coming up. And it shall be, when all the nations hear his voice, each man will leave his own land and the war that they have against one another,
    34 and an innumerable multitude will be gathered together, as you saw,
    35 wanting to come and attack him.
    36 But he will stand upon the summit of Mount Zion. And Zion will come and be shown to all, prepared and built, just as you saw the mountain carved out without hands.
    37 But he, my Son, will rebuke the impieties of the nations that have come, these things that have drawn near like a storm; and he will set before them their evil thoughts and the torments
    38 with which they are about to be tormented, which are likened to a flame; and he will destroy them without effort, by the law, which is likened to fire.
    39 And as for your seeing him gathering to himself another peaceful multitude,
    40 these are the ten tribes that were led away captive from their own land in the days of King Josiah, whom Shalmaneser king of the Assyrians led away captive; and he carried them across the River, and they were taken into another land.
    41 But they formed this plan among themselves, that they would leave the multitude of the nations and go on into a more distant region, where no human race had ever lived,
    42 so that there at least they might keep their statutes, which they had not kept in their own land.
    43 And they entered by the narrow passages of the river Euphrates.
    44 For then the Most High performed signs for them, and held back the channels of the river until they had crossed.
    45 For through that region there was a long way to travel, of a year and a half; and that region is called Arzareth.
    46 Then they lived there until the last time; and now they are beginning to come again.
    47 Again the Most High will hold back the channels of the river, so that they may cross. Therefore you saw the multitude gathered in peace.
    48 But even those of your people who are left, who are found within my holy border—
    49 then it shall be, when he begins to destroy the gathered multitude of the nations, he will protect the people who survive.
    50 And then he will show them very many wonders.”
    51 And I said, “Lord, Master, show me this: why did I see the man coming up from the heart of the sea?”
    52 And he said to me, “Just as no one can search out or know what is in the depths of the sea, so no one on earth can see my Son, or those who are with him, except at the time of his day.
    53 This is the interpretation of the dream that you saw, and this is why you alone have been enlightened in these things.
    54 For you have forsaken what belongs to you and have devoted yourself to what belongs to me, and have searched out my law.
    55 For you have ordered your life in wisdom, and have called understanding your mother.
    56 Therefore I have shown you these things; for there is a reward with the Most High. For after three more days I will speak further with you and explain to you weighty and wondrous things.”
    57 Therefore I have shown you these things; for there is a reward with the Most High. For after three more days I will speak further with you and explain to you weighty and wondrous things.”
    58 And I departed and went into the field, greatly glorifying and praising the Most High for the wonders that he did in their times, and because he governs the times and the things brought about in the times. And I sat there for three days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '40'
    text: The Latin here reads ‘in the days of King Josiah,’ even though the historical setting is the Assyrian exile of the northern tribes. The translation keeps the Latin name and leaves the apparent historical error visible rather than silently emending it to Hoshea.
    reason: textual_variant
  - marker: '37'
    text: '''Mount Zion'' and the mountain ''carved out without hands'' are brought together in the interpretation. The imagery intentionally echoes divinely made or revealed holy space rather than an ordinary mountain formed by human labor.'
    reason: cross_reference
  - marker: '46'
    text: Arzareth is a place-name preserved in the Latin tradition; its exact geographical identification is uncertain.
    reason: cultural_note
  - marker: '53'
    text: '''At the time of his day'' is a close rendering of a compressed Latin phrase. The sense is an appointed time of revelation, not ordinary visibility before then.'
    reason: lexical_alternative
lexical_decisions:
- source_word: mare / de corde maris
  chosen: sea / from the heart of the sea
  alternatives:
  - ocean
  - from the midst of the sea
  - from the depths of the sea
  lexicon: Lewis & Short
  rationale: Retains the vivid apocalyptic image and the Latin metaphor cor maris. 'Heart of the sea' is slightly formal but transparent and prepares for v. 52, where the sea's depth is explicitly invoked.
- source_word: ipse homo / virum
  chosen: that man / a man
  alternatives:
  - the man
  - a human figure
  lexicon: Lewis & Short
  rationale: The vision first presents a recognizable human figure, not yet explicitly identified. 'That man' in v. 3 reflects the demonstrative force of ipse; later 'a man' in interpretive restatement keeps the wording natural while preserving the human appearance.
- source_word: convolabat ... cum nubibus caeli
  chosen: was flying with the clouds of heaven
  alternatives:
  - came with the clouds of heaven
  - flew upon the clouds of heaven
  lexicon: Lewis & Short
  rationale: The Latin verb suggests movement through the air rather than merely arrival. 'With the clouds of heaven' preserves the Danielic resonance without importing a fixed traditional phrasing not strictly demanded by the Latin.
- source_word: ardescebant
  chosen: were set ablaze
  alternatives:
  - burned
  - grew hot
  lexicon: Lewis & Short
  rationale: Captures the inceptive force of the verb and the immediate destructive effect of the voice.
- source_word: sculpsit montem magnum
  chosen: carved out for himself a great mountain
  alternatives:
  - cut out
  - hewed out
  lexicon: Lewis & Short
  rationale: The unusual image should remain strange. 'Carved out' reflects sculpsit and supports the later note that Zion is shown 'carved out without hands.'
- source_word: frameam
  chosen: spear
  alternatives:
  - sword
  - lance
  lexicon: Lewis & Short
  rationale: Framea in Latin often denotes a spear or lance. 'Spear' best fits the military list and avoids importing a sword where the term is not the common gladius.
- source_word: vas bellicosum
  chosen: weapon of war
  alternatives:
  - war-gear
  - military implement
  lexicon: Lewis & Short
  rationale: A broad term is needed; 'weapon of war' preserves the formal cadence and the contrast with his non-material mode of victory.
- source_word: spiritum flammae
  chosen: a breath of flame
  alternatives:
  - a spirit of flame
  - fiery breath
  lexicon: Lewis & Short
  rationale: Spiritus here is best rendered concretely in the visionary sequence alongside fire and storm. 'Breath of flame' keeps the mouth imagery coherent.
- source_word: scintillas tempestatis
  chosen: sparks of storm
  alternatives:
  - storm-sparks
  - sparks like a tempest
  lexicon: Lewis & Short
  rationale: The phrase is deliberately odd and should remain so. 'Sparks of storm' preserves the compressed apocalyptic imagery rather than normalizing it.
- source_word: extiti
  chosen: was astonished
  alternatives:
  - stood still
  - was beside myself
  lexicon: Lewis & Short
  rationale: In context Ezra's reaction is stunned amazement. 'Was astonished' communicates the effect clearly in modern English.
- source_word: qui derelicti sunt / qui non sunt derelicti
  chosen: those who are left / those who are not left
  alternatives:
  - those who survive / those who do not survive
  - those preserved / those not preserved
  lexicon: Lewis & Short
  rationale: The Latin repeats derelinquere language. 'Left' preserves the verbal thread and the ambiguity between surviving and remaining for the final events.
- source_word: operas et fidem ad Fortissimum
  chosen: works and faith toward the Mighty One
  alternatives:
  - deeds and faith in the Mighty One
  - works and faithfulness toward the Mighty One
  lexicon: Lewis & Short
  rationale: Keeps both ethical action and trust explicit. 'Toward' reflects ad without over-specifying a later doctrinal formula. 'Fortissimus' is rendered distinctly as 'the Mighty One,' not flattened into 'God.'
- source_word: multis temporibus
  chosen: for many ages
  alternatives:
  - for many times
  - for a long time
  lexicon: Lewis & Short
  rationale: In apocalyptic context tempora/temporibus often carries epochal force. 'Many ages' better suits the long-hidden deliverer motif.
- source_word: filius meus
  chosen: my Son
  alternatives:
  - my son
  lexicon: Lewis & Short
  rationale: Capitalized in English to signal the titular, exalted figure in this vision, while still translating the Latin directly.
- source_word: excessus mentis
  chosen: bewilderment of mind
  alternatives:
  - madness
  - ecstasy
  - derangement
  lexicon: Lewis & Short
  rationale: The phrase denotes a destabilized mental state leading to social chaos. 'Bewilderment of mind' preserves the sense without overstating clinical madness.
- source_word: arguet ... impietates
  chosen: will rebuke the impieties
  alternatives:
  - will convict ... of ungodliness
  - will expose the wickedness
  lexicon: Lewis & Short
  rationale: Arguet includes exposing and reproving. 'Rebuke' fits the prophetic-judicial tone, while 'impieties' preserves the religious dimension of impietates.
- source_word: legem quae igni adsimilata est
  chosen: the law, which is likened to fire
  alternatives:
  - the law that is like fire
  - the decree likened to fire
  lexicon: Lewis & Short
  rationale: Lex should remain 'law' here, preserving the text's striking claim that his judgment operates through a law compared to fire, not through conventional weaponry.
- source_word: legitima sua
  chosen: their statutes
  alternatives:
  - their ordinances
  - their lawful customs
  lexicon: Lewis & Short
  rationale: A covenantal-legal term is needed. 'Statutes' is readable and preserves the sense of binding norms.
- source_word: introitus angustos
  chosen: the narrow passages
  alternatives:
  - narrow entrances
  - straits
  lexicon: Lewis & Short
  rationale: Keeps the concrete travel image and echoes the book's broader narrow-way motif without forcing a direct allusion.
- source_word: venas fluminis
  chosen: the channels of the river
  alternatives:
  - the veins of the river
  - the streams of the river
  lexicon: Lewis & Short
  rationale: The literal metaphor 'veins' is intelligible but awkward in English here. 'Channels' conveys the river's divided courses while remaining close to the image.
- source_word: terminum meum Sanctum
  chosen: my holy border
  alternatives:
  - my holy territory
  - my holy domain
  lexicon: Lewis & Short
  rationale: Terminus is boundary/border. The phrase is unusual and should remain somewhat concrete rather than generalized into 'land'.
- source_word: Dominator Domine
  chosen: Lord, Master
  alternatives:
  - Sovereign Lord
  - Master Lord
  lexicon: Lewis & Short
  rationale: Preserves the doubled address and Ezra's urgency. 'Lord, Master' is forceful without becoming archaic.
- source_word: in tempore diei
  chosen: at the time of his day
  alternatives:
  - in the time of the day
  - when his day comes
  lexicon: Lewis & Short
  rationale: The phrase is somewhat compressed in Latin. This rendering preserves the apocalyptic idiom of an appointed revelatory day while staying close to the wording.
- source_word: sensum tuum vocasti matrem
  chosen: have called understanding your mother
  alternatives:
  - have made understanding your mother
  - have named insight your mother
  lexicon: Lewis & Short
  rationale: Keeps the familial wisdom metaphor intact rather than paraphrasing it away.
- source_word: gubernat tempora
  chosen: governs the times
  alternatives:
  - rules the ages
  - directs the seasons
  lexicon: Lewis & Short
  rationale: Maintains the repeated temporal theme in this chapter and the apocalyptic emphasis on divine control of history.
theological_decisions:
- issue: Identity of the man from the sea and the force of filius meus
  chosen_reading: Render the figure as 'my Son' in the interpretation while preserving the initial visionary description simply as 'that man'/'a man.'
  alternative_readings:
  - Render consistently as 'the Son of God' throughout
  - Render filius meus as merely 'my servant' or a collective symbol
  rationale: The chapter itself moves from enigmatic vision to explicit interpretation. The main text should preserve that narrative unveiling. 'My Son' reflects the Latin directly and allows the messianic figure to emerge from the vision rather than being front-loaded.
  doctrine_reference: Translate titles; preserve theological tension rather than resolve it prematurely.
- issue: Meaning of 'he will destroy them ... by the law, which is likened to fire'
  chosen_reading: Keep 'law' in the main text rather than substituting 'word' or 'command.'
  alternative_readings:
  - '''by his word, which is like fire'''
  - '''by decree like fire'''
  rationale: The Latin reads legem, and the chapter contrasts non-weapon judgment with a fiery, authoritative utterance. Retaining 'law' preserves the Jewish apocalyptic texture of the passage and avoids harmonizing it to more familiar Christian phrasing.
  doctrine_reference: Original-language/source primacy over translation tradition; preserve theological tension.
- issue: Historical identification in v. 40
