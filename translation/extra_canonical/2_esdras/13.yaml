source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: |-
    1 et factum est post dies septem, et somniavi somnium nocte.
    2 et ecce de mari ventus exsurgebat, ut conturbaret omnes fluctus eius.
    3 et vidi, et ecce convolabat ipse homo cum nubibus caeli. et ubi vultum suum convertebat ut consideraret, tremebant omnia quae sub eo videbantur.
    4 et ubicumque exiebat vox de ore eius, ardescebant omnes qui audiebant voces eius. sicut liquescit cera quando senserit ignem.
    5 et vidi post haec, et ecce congregabatur multitudo hominum, quorum non erat numerus, de quattuor ventis caeli, ut debellarent hominem qui ascenderat de mari.
    6 et vidi, et ecce sibimet ipso sculpsit montem magnum et volavit super eum.
    7 ego autem quaesivi videre regionem vel locum, unde sculptus esset mons, et non potui.
    8 et post haec vidi, et ecce omnes, qui congregati sunt ad eum ut expugnarent eum, timebant valde, tamen audebant pugnare.
    9 pugnare. Et ecce ut uidit impetum multitudinis uenientis, non leuauit manum suam, neque frameam tenebat, neque
    10 aliquod uas bellicosum, nisi solummodo uidi Quomodo emittit de ore suo sicut fluctum ignis, et de labiis eius spiritum flammae, et de lingua eius emittebat scintillas tempestatis ; et commixta sunt simul omnia haec, fluctus ignis et spiritus flammae et
    11 multitudo tempestatis. Et concidit super multitudinis impetum quod paratum erat pugnare, et succendit omnes, ut subito nihil uideretur de innumerabili multitudine nisi solummodo puluis cineris et fumi odor. et uidi et extiti. Et post haec uidi ipsum hominem descendentem de monte et aduocantem ad se multitudinem aliam pacificam. Et accedebant ad eum uultus hominum multorum, quorundam gaudentium, quorundam tristantium, aliqui uero alligati, aliqui adducentes ex eis qui offerebantur. et ego a multitudine pauoris expergefactus sum et deprecatus sum altissimum et dixi : Tu ab initio demonstrasti seruo tuo mirabilia haec, et dignum me habuisti ut susciperes deprecationem meam; Et nunc demonstra mihi
    12 et post haec vidi ipsum hominem descendentem de monte et advocantem ad se multitudinem aliam pacificam.
    13 et accedebant ad eum vultus hominum multorum, quorumdam gaudentium, quorumdam tristantium, aliqui vero alligati, aliqui adducentes ex eis qui offerebantur. et egoa multitudine pavoris expergefactus sum et deprecatus sum Altissimum et dixi:
    14 tu ab initio demonstrasti servo tuo mirabilia haec et dignum me habuisti, ut susciperes deprecationem meam.
    15 adhuc et interpretationem somnii huius. Sicut enim existimo
    16 in sensu meo, uae qui derelicti fuerint in diebus illis, et multo plus uuae his qui non sunt derelicti : Qui enim non sunt derelicti, tristos erunt, Intelligentes quae sunt reposita in nouissimis diebus et non occurrentes eis ; sed et qui derelicti sunt Propter hoc uuae ! uidebunt enim pericula magna et necessitates multas, sicut ostendunt somnia haec. Adtamen facilius est periclitantem uenire in haec quam pertransire sicut nubem a saeculo et non uidere quae contingent in nouissimo. Et respondit ad me et dixit : et uisionis interpretationem dicam tibi, sed et de quibus locutus es adaperiam tibi. Quoniam de his dixisti qui derelicti sunt, haec est interpretatio. Qui adferet periculum in illo tempore, ipse custodibit qui in periculo inciderint, qui habent operas et fidem ad fortissimum. Scito ergo quoniam magis beatificati sunt qui derelicti super eos qui mortui sunt. Interpretationes uisionis haec : quia uidisti uirum ascendentem de corde maris, Ipse est quem conseruat altissimus multis temporibus, qui per semetipsum liberabit creaturam suam, et ipse disponet qui derelicti sunt. Et quoniam uidisti de ore eius exire spiritum et ignem et tempestatem, Et quoniam non tenebat frameam neque uas bellicosum, corrumpit enim impetum eius multitudinis quae uenerat ad
    17 qui enim non sunt derelicti, tristes erunt
    18 intellegentes quae sunt reposita in novissimis diebus, et non occurrentes eis. sed et qui derelicti sunt
    19 propter hoc vae, viderunt enim pericula magna et necessitates multas, sicut ostendunt somnia haec.
    20 attamen facilius est periclitantem venire in haec, quam pertransire sicut nubem a saeculo et non videre quae contigerunt in novissimo. Et respondit ad me et dixit:
    21 et visionis interpretationem dicam tibi, sed et de quibus locutus es adaperiam tibi.
    22 quoniam dixisti de his qui derelicti sunt, et de his qui non derelicti sunt haec interpretatio:
    23 qui adferet periculum in illo tempore, ipse custodibit qui in periculo inciderint, qui habent operas et fidem ad Fortissimum.
    24 scito ergo, quoniam magis beatificati sunt qui derelicti super eos qui mortui sunt.
    25 interpretatio enim visionis haec: quia vidisti virum ascendentem de corde maris,
    26 ipse est quem conservat Altissimus multis temporibus, qui per semet ipsum liberabit creaturam suam, et ipse disponet qui derelicti sunt.
    27 et quoniam vidisti de ore eius exire ut spiritum et ignem et tempestatem,
    28 et quoniam non tenebat frameam neque vas bellicosum, corrumpitenim impetum eius multitudinis quae venerat ad expugnare eum, haec interpretatio:
    29 expugnare eum, haec interpretatio: Ecce dies ueniunt, quando
    30 incipiet altissimus liberare eos qui super terram sunt. Et
    31 ueniet excessus mentis super eos qui inhabitant terram. Et in alios alii cogitabunt bellare, ciuitates ciuitatem et locus locum
    32 et gens ad gentem et regnum aduersus regnum. Et erit cum fient haec, et contingent signa quae ante ostendi tibi, et tunc
    33 reuelabitur filius meus quem uidisti uirum ascendentem. Et erit, quando audierint omnes gentes uocem eius, et derelinquet unusquisque regionem suam et bellum quod habent in alterutro,
    34 Et colligetur in unum multitudo innumerabilis sicut uidisti
    35 uolentes uenire et expugnare eum. Ipse autem stabit super
    36 cacumen montis Sion. Sion autem ueniet et ostendetur omnibus parata et aedificata, sicut uidisti montem sculpi sine manibus.
    37 Ipse autem filius meus arguet quae aduenerunt gentes impietates eorum, has quae tempestati adpropiauerunt, et inproperabit coram eis mala cogitamenta eorum et cruciamenta,
    38 quibus incipient cruciari, Quae adsimilatae sunt flammae, et perdet eos sine labore et legem quae igni adsimilata est. Et
    39 quoniam uidisti eum colligentem ad se aliam multitudinem pacificam, Haec sunt decem tribus, quae captiuae factae sunt de
    40 terra sua in diebus Iosiae regis, quem captiuum duxit Salmanassar rex Assyriorum, et transtulit eos trans flumen, et translati sunt in terram aliam. Ipsi autem sibi dederunt
    41 consilium hoc, ut derelinquerent multitudinem gentium, et proficiscerentur in ulteriorem regionem, ubi nunquam inhabitauit genus humanum, Vt uel ibi obseruarent legitima sua,
    42 quae non fuerant seruantes in regione sua. Per introitus autem
    43 angustos fluminis Eufratis introierunt. Fecit enim eis tunc
    44 altissimus signa, et statuit uenas fluminis usquequo transirent. Per eam enim regionem erat uia multa itineris anni unius et
    45 dimidii, nam regio illa uocatur Arzareth. Tunc inhabitauerunt ibi
    46 usque in nouissimo tempore: et nunc iterum coeperunt uenire; Iterum altissimus statuit uenas fluminis, ut possint transire.
    47 propter hoc uidisti multitudinem collectam cum pace, Sed et qui
    48 derelicti sunt de populo tuo, qui inueniuntur intra terminum meum Sanctum. erit ergo, quando incipiet perdere multitu-
    49 dinem earum quae collectae sunt gentes, proteget qui superauerit populum, Et tunc ostendet eis multa plurima portenta. Et dixi ego : dominator domine, hoc mihi ostende, propter quod uidi uirum ascendentem de corde maris. et dixit mihi : Sicut non potest hoc uel scrutinare uel scire quis, quid sit in profundo maris, sic non poterit quisquam super terram uidere filium meum uel eos qui cum eo sunt nisi in tempore diei. Haec est interpretatio somnii quod uidisti, et propter hoc inluminatus es haec solus. Dereliquisti enim tua, et circa mea uacasti, et legem meam exquisisti ; Vitam enim tuam disposuisti in sapientiam, et sensum tuum uocasti matrem. Et propter hoc ostendi tibi haec, merces enim apud altissimum. erit enim post alios tres dies ad te alia loquar, et exponam tibi grauia et mirabilia. Et profectus sum et transii in campum, multum glorificans et laudans altissimum de mirabilibus quae per tempus faciebat, Et quoniam gubernat tempora et quae sunt in temporibus inlata : et sedi ibi tribus diebus.
    50 et tunc ostendet eis multa plurima portenta.
    51 et dixi ego: Dominator Domine, hoc mihi ostende, propter quod vidi virum ascendentem de corde maris. et dixit mihi:
    52 sicut non potest hoc vel scrutinare vel scire quis, quid sit in profundo maris, sic non poterit quisquam super terram videre Filium meum vel eos qui cum eo sunt nisi in tempore diei.
    53 haec est interpretatio somnii quem vidisti, et propter quod inluminatus es haec solus.
    54 dereliquisti enim tua et circa mea vacasti et legem meam exquisisti.
    55 vitam enim tuam disposuisti in sapientiam, et sensum tuum vocasti matrem.
    56 et propter hoc ostendi tibi haec, merces apud Altissimum. erit enim post alios tres dies, ad te alia loquar et exponam tibi gravia et mirabilia.
    57 et profectus sum et transii in campum, multum glorificans et laudans Altissimum de mirabilibus, quae per tempus faciebat,
    58 et quoniam gubernat tempora et quae sunt in temporibus inlata. et sedi ibi tribus diebus.
