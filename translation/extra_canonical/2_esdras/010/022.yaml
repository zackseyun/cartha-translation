translation:
  text: Our harp has been brought low, our hymn has fallen silent, our rejoicing has been dissolved, the light of our lampstand has been extinguished, the ark of our covenant has been plundered, our holy things have been defiled, and the name that was called over us has been almost profaned. Our children have suffered insult, our priests have been burned, our Levites have gone into captivity, our virgins have been defiled, our women have suffered violence, our righteous men have been carried off, our little ones have been handed over, our young men have been enslaved, and our strong men have been made weak.
