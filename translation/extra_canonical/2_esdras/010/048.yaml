  from: that my son, when he came into his bridal chamber, died and disaster befell him,
  to: ', ‘My son, when he entered his bridal chamber, died, and disaster befell him,’'
  rationale: The Latin `quod filius meus` reflects a Greek `hoti` recitativum introducing direct speech (hence the first-person `meus`). The English draft translates `quod` as "that" but keeps "my son," which confusingly makes it sound like the angel's son. It should be punctuated as a direct quotation, matching the treatment of `quoniam nutrivi` in verse 47.
