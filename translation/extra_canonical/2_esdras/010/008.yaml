  from: Therefore mourn with all your might. And now, since we all mourn and you are sorrowful, because we are all grieved, why are you grieved over one son?
  to: She mourns most bitterly. And now, since we all mourn and are sad, since we are all grieved—but you are grieving over one son.
  rationale: 1) The draft translates `lugete` as a plural imperative, which makes no sense addressed to a single woman whom Ezra is rebuking for mourning. It is a recognized corruption of `luget` ("she mourns"), continuing the description of Zion. The draft also adds "Therefore" without basis. 2) `tristes estis` (plural "you") is similarly out of place and represents a corruption of `tristes sumus` ("we are sad"), parallel to the surrounding first-person plural verbs. 3) The draft turns the contrastive statement `tu autem contristaris in uno filio` into a question ("why are you grieved...?"), adding "why" without basis in the Latin.
