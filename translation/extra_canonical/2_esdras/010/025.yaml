  from: that suddenly her face shone exceedingly, and her appearance flashed, her countenance becoming radiant,
  to: that behold, her face suddenly shone exceedingly, and the appearance of her face became flashing, so that even [I was greatly afraid of her].
  rationale: 1) The draft omits 'ecce' ('behold'), a key apocalyptic marker. 2) It double-translates 'species... vultus eius' as two separate subjects ('her appearance... her countenance'). 3) It omits the Latin 'ut etiam' ('so that even') to 'smooth' the text. Per project guidelines, where the Latin is corrupt (breaking off mid-sentence), we must triangulate with the daughter versions. The Syriac and Ethiopic preserve the author's intended clause ('so that I was greatly afraid of her' / 'afraid to approach her'), which must be restored rather than erased for readability.
