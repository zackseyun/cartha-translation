source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned
    Latin
  text: 'quomodo et uenit ; et ego tibi dico: Sicut tu cum dolore peperisti, sic et
    terra dedit fructum suum hominem ab initio ei qui fecit eam. Nunc ergo retine
    apud temetipsam dolorem tuum, et fortiter fer qui tibi contigerunt casus. Si enim
    iustificaueris terminum dei, et filium tuum recipies in tempore et in mulieribus
    conlaudaberis. Ingredere ergo in ciuitatem ad uirum tuum. et dixit ad me: Non
    faciam neque ingrediar ciuitatem, sed hic moriar. Et adposui adhuc loqui ad eam
    et dixi: Noli facere sermonem hunc, sed consenti persuaderi propter casus Sion
    et consolare propter dolorem Hierusalem. Vides enim quoniam sanctificatio nostra
    deserta effecta est, et altare nostrum demolitum est, et templum nostrum destructum
    est, Et psalterium nostrum humiliatum est, et hymnus noster conticuit, et exultatio
    nostra dissoluta est, et lumen candelabri nostri extinctum est, et arca testamenti
    nostri direpta est, et sancta nostra contaminata sunt, et nomen quod nominatum
    est super nos profanatum est, et liberi nostri contumeliam passi sunt, et sacerdotes
    nostri succensi sunt, et Leuitae nostri in captiuitate abierunt, et uirgines nostrae
    coinquinatae sunt, et mulieres nostrae uim passae sunt, et iusti nostri rapti
    sunt, et paruuli nostri proditi sunt, et iuuenes nostri seruierunt, et fortes
    nostri invalidi facti sunt. Et quod omnium maius, signaculum Sion, quoniam resignata
    est de gloria sua nunc, et tradita est in manibus eorum qui nos oderunt.'
  language: Latin
translation:
  text: 'then I say to you: just as you gave birth in pain, so also the earth has
    given its fruit, man, from the beginning, to him who made her.'
  philosophy: optimal-equivalence
