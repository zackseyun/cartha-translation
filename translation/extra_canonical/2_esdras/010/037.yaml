  rationale: 'The Latin ''excessus'' here reflects the underlying Greek ἔκστασις (ekstasis), denoting a visionary trance or state of profound bewilderment. In modern English, ''ecstasy'' carries strong connotations of euphoria, which misrepresents Ezra''s disoriented and fearful state. ''Trance'' accurately captures the intended prophetic experience without the misleading modern baggage. | Azure: This is in 4 Ezra, where the Latin often reflects lost Greek usage, and here excessus is a well-attested Latin equivalent for Greek ἔκστασις in the sense of being carried out of one''s normal state, es'
