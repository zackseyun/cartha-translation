source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Vbi est Vriel angelus, qui a principio uenit ad me ? quoniam ipse me fecit uenire in multitudinem excessus mentis huius, et factus est finis meus in corruptione, et oratio mea in inproperium. Et cum essem loquens ego haec, et ecce uenit ad me
  language: Latin
translation:
  text: “Where is Uriel the angel, who came to me at the beginning? For it was he who brought me into this great bewilderment of mind, and my end has become corruption, and my prayer a reproach.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: '28'
    text: Latin 'this abundance of this ecstasy of mind' is awkward but forceful. The sense is that Ezra has been driven into an overwhelming visionary state, not merely ordinary confusion.
    reason: lexical_alternative
  - marker: a
    text: Or 'made me come into this abundance of this ecstasy of mind'.
    reason: previous_rendering
