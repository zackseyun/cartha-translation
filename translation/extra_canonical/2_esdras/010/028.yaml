  from: made me come into this abundance of this ecstasy of mind
  to: brought me into this great bewilderment of mind
  rationale: Latin 'excessus mentis' (reflecting Greek ἔκστασις) denotes a displacement of the mind, bewilderment, or trance. In modern English, 'ecstasy' strongly implies joy, which contradicts Ezra's terror here. Additionally, 'multitudinem' indicates degree ('greatness'), and 'fecit uenire' is a causative ('brought me'). The current literal rendering is awkward and misleading.
