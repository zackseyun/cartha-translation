  from: And chaos will come
  to: And a chasm will open
  rationale: The Latin 'chaos' here reflects the Greek χάος or χάσμα (a gulf or chasm), which in turn translates a Hebrew word for a physical fissure in the earth. This is a standard apocalyptic physical sign, supported by the Syriac ('peḥtā', chasm). Translating it with the modern English abstract sense of 'chaos' (disorder) obscures the author's intended physical imagery of the earth opening up.
