  to: They will labor, but their ways will not prosper. I have been permitted to tell you these signs; and if you pray again and weep as you do now, and fast for seven days, you will hear again things greater than these.
  rationale: The draft omits the opening clause of the source text, 'laborabunt et non dirigentur uiae eorum' (likely due to a versification boundary error, as it appears in the draft for v. 12). It must be restored here to match the source text. Additionally, the Latin idiom 'dirigentur uiae' reflects a Hebrew idiom for success or prosperity (e.g., Gen 24:40), so 'their ways will not prosper' captures the author's intent better than a literal 'be directed.'
