  from: And she herself will say to you, "Different are those born in the strength of youth,
  to: And she herself will say to you, "Different are those born in the strength of youth, and different are those born toward the time of old age, when the womb is failing."
  rationale: The draft suffers from a severe text-alignment error caused by the mechanical splitting of Bensly's line breaks. The English draft for 5:53 translates the first half of logical verse 53 ('Et dicet tibi et ipsa...'), but completely omits the second half ('et alii qui sub tempus senectutis deficiente matrice'), which the draft erroneously pushed into 5:54. The rewrite restores the complete logical verse 53. Additionally, 'sub tempus' is better rendered 'toward the time' rather than 'at the time', capturing the accusative of approaching time.
