  from: And when you were thirsty, did I not split the rock, and waters flowed in abundance?
  to: When you were thirsty, did I not split the rock, so that waters flowed in abundance?
  rationale: The Latin 'Nonne' introduces a question, but the English draft mixes an interrogative clause ('did I not split') with a declarative one ('and waters flowed') ending in a question mark. Rendering 'et' as 'so that' (or 'and did waters not flow') resolves the grammatical clash and captures the consecutive force of the action. Additionally, there is no conjunction ('And') before 'Nonne' in the Latin source.
