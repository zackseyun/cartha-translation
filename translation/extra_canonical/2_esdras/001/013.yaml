  from: '‘Thus says the Lord: I brought you through the sea, and in the trackless places I made firm roads for you.'
  to: “Surely I brought you through the sea, and in trackless places I made secure roads for you.”
  rationale: 'Azure-modified: This is 5 Ezra, so the Latin is original and must control. The reviewer is right that the current English wrongly carries over “Thus says the Lord” from v.12; v.13 begins with “Nempe ego vos mare traieci…,” and Nempe should be represented (“surely,” “indeed”). The rest of the clause is also directly supported by the Latin of v.13 itself: “plateas vobis in inuia munitas” means something like “roads/streets fortified/made secure for you in trackless places.” The proposal improves the verse by rest'
