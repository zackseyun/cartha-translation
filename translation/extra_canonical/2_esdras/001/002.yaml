  rationale: 'The Latin ''Abissei'' is a variant of ''Abisue'' (Abishua), the high
    priest in Ezra''s lineage (cf. Ezra 7:4, 1 Chron 6:4). Translating it as ''Abishai''
    (David''s nephew) introduces a different, non-priestly biblical figure, whereas
    the author intended the traditional priestly ancestor. | Azure: In 2 Esdras 1–2
    we are in 5 Ezra, originally composed in Latin, so the Latin form itself is decisive.
    Here the genealogy is explicitly Ezra''s priestly line, matching the sequence
    known from Ezra 7:1–5'
