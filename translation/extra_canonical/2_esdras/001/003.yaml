  rationale: 'The Latin uses the noun/adjective ''captiuus'' with the copula ''fuit'' (''was a captive''), denoting a state of captivity rather than the action of being captured (which would typically be expressed with a passive verb like ''captus est''). | Azure: In 5 Ezra 1:3 the Latin is original, so the judgment should rest directly on its grammar. The phrase is "qui fuit captiuus in regione Medorum": *fuit* is the copula and *captiuus* is a predicate noun/'
