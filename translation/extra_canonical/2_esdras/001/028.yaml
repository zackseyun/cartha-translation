  from: Have I not asked you, as a father asks his sons
  to: Have I not pleaded with you, as a father pleads with his sons
  rationale: 'The Latin verb ''rogo'' here carries the sense of earnest entreaty or begging (Lewis & Short II: ''to ask, beg, request, entreat, pray''), not merely asking a question or making a mild request. In the context of 5 Ezra''s highly emotional divine lament, ''asked'' flattens the register and loses the rhetorical force of a parent pleading with their children. | Azure: This is in 5 Ezra, where the Latin is the original text, and the reviewer’s lexical point is sound. The clause uses perfect active indicative of rogo ("rogaui"), which in Latin commonly means not only'
