  rationale: 'The draft omits the adverbial accusative `residuum` (''for the remainder'', ''henceforth''). The author explicitly notes that Ezra will spend the rest of the intervening time with the Messiah, which should be reflected in the English. | Azure: In 4 Ezra 14:9 the Latin phrase is "conuerteris residuum cum filio meo ... usquequo finiantur tempora." Here "residuum" is the accusative of duration/extent meaning "for the remainder, for what remain'
