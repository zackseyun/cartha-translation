  category: mistranslation
  tier: 2
  from: ten parts of it have already passed
  to: nine of its parts have already passed
  rationale: The Latin reading 'X' (ten) is a well-known scribal error for 'IX' (nine). Translating 'ten' creates a logical contradiction ('ten parts... and half of the tenth part') and breaks the math of the author's eschatological timeline, as verse 12 states that two and a half parts remain (12 - 2.5 = 9.5). The Syriac, Ethiopic, Arabic, and Armenian versions all preserve the correct reading 'nine', which should be adopted here to restore the author's intended meaning.
