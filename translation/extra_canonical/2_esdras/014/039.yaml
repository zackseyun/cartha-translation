  from: This was full as with water, but its color was like fire.
  to: It was full of something like water, but its color was like fire.
  rationale: The Latin 'plenum sicut aqua' indicates the cup was filled with a substance
    resembling water. 'Full as with water' is awkward in English; 'full of something
    like water' naturally conveys the comparative force of 'sicut' while maintaining
    the expected English syntax for a vessel being full of a substance.
