  from: the corrupt life
  to: corruptible life
  rationale: 'In modern English, ''corrupt life'' strongly implies moral depravity
    or unethical behavior. However, the immediate context (v. 14: ''mortal thoughts,''
    ''human burdens,'' ''weak nature'') and the broader theology of 4 Ezra indicate
    that ''corruptae uitae'' refers to mortality and perishability (likely translating
    Greek φθορά or φθαρτός). The author is telling Ezra to prepare for his assumption
    by renouncing his mortal, perishable existence, not merely repenting of sin. ''Corruptible
    life'' or ''perishable life'' preserves this crucial eschatological meaning.'
