  rationale: 'Azure-modified: The source text for 11:29 unquestionably contains an omitted clause: "quod erat medium, euigilabat, hoc enim erat duorum capitum maius" = "the one that was in the middle awoke, for it was greater/larger than the two heads." Restoring that material brings the English clearly closer to the Latin and corrects what appears to be a verse-division omission. However, the proposed change to "joined" is not clearly superior. Latin "conplexa est ... secum" from complector can mean "embraced, gathered, dre'
