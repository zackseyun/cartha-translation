  rationale: 'The draft translates ''pennis'' as ''feathers'' and ''pennae'' as ''wings'' in the same clause. However, in verses 5 and 7, the draft correctly translates ''pennis'' as ''wings'' (''flew on its wings'', ''voice to its wings''). The vision describes rival wings (''contrariae pennae'') sprouting directly from the main wings (''de pennis eius''). Translating ''pennis'' as ''wings'' maintains lexical consistency and accurately reflects the author''s visionary anatomy. | Azure: In 4 Ezra 11:3 the Latin reads "de pennis eius ... contrariae pennae"; both occurrences are forms of the same noun, penna, whose primary sense here in the eagle vision is "wing," not a contrast betwee'
