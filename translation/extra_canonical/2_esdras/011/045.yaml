  rationale: 'The Latin ''non apparens non appareas'' (literally ''not appearing, may you not appear'') is a calque of a Greek participle + finite verb, which itself translates a Hebrew infinitive absolute. This Semitic construction denotes emphasis, not a purpose or result clause. It should be rendered with an emphatic adverb like ''utterly'' or ''completely'' rather than ''so that you may not appear again.'' | Azure: This is in 4 Ezra proper, where the Latin often preserves translation-Greek/translation-Hebrew syntax. The phrase "non apparens non appareas" is not naturally a Latin purpose construction; it is a ple'
