  rationale: 'The Latin phrase ''misit uocem'' is a standard idiom (reflecting Greek ἀφιέναι φωνήν and ultimately Hebrew נתן קול) meaning ''to utter a voice'' or ''to cry out.'' ''Sent out a voice'' is a slightly wooden literalism; ''uttered a voice'' or ''sent forth its voice'' is more natural in English while preserving the underlying Semitic idiom. | Azure: In 4 Ezra proper (here preserved in Latin as a translation of lost Greek/Hebrew), Latin misit vocem is indeed a calqued idiom meaning ''gave/uttered a voice'' or ''cried out,'' not a literal act of ''sendi'
