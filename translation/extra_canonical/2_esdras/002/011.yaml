  to: And I will take to myself their glory, and I will give them the everlasting tabernacles.
  rationale: 'The clause "that I had prepared for them" translates "quae praeparaueram illis." However, in the provided source text, this Latin clause is placed at the beginning of verse 12. To match the verse segmentation of the source, this clause should be removed from verse 11 and ensured it is present in verse 12. | Azure: In 5 Ezra 2:11 the Latin given is exactly: "Et sumam mihi gloriam illorum et dabo eis tabernacula aeterna," with no relative clause. The added English phrase "that I had prepared for them" corresponds'
