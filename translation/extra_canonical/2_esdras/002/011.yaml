  from: their glory, and I will give them
  to: the glory of those others, and I will give them
  rationale: 'The Latin uses two different pronouns to distinguish the groups from verse 10: ''illorum'' (a strong demonstrative pointing to the more remote antecedent, Israel) and ''eis'' (the standard anaphoric pronoun referring to the main topic, ''my people''). The English "their... them" conflates the two, making it sound as though God is taking glory from and giving tabernacles to the same group. Rendering ''illorum'' as "of those others" or "of the former" preserves the author''s contrast. | Azure: This is in 5 Ezra, where the Latin is the original text, so the pronoun distinction in the Latin itself is decisive. The clause reads, "Et sumam mihi gloriam illorum et dabo eis tabernacula aeterna": '
