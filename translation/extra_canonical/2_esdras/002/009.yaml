  rationale: 'In Late Latin (the original language of 5 Ezra), ''dare'' frequently
    functions as a synonym for ''facere'' (to make, do, render). The translation ''give
    over'' implies abandonment (which would typically be ''trado''), whereas the context
    of physical destruction (''what I did to Sodom... clods of pitch'') and the accusative
    ''eos'' with ''sic'' points to ''Thus I will make/render them'' or ''Thus I will
    do to them''. Translating it as ''do to'' also properly parallels the preceding
    ''what I did [fecerim] to Sodom''. | Azure: This is 5 Ezra, so the Latin is original
