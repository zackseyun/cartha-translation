  rationale: 'In Late Latin biblical idiom, ''super'' with the accusative in a judicial
    context (''testem invoco'') carries an adversarial sense (''against''), which
    is confirmed by the curse requested in verse 6 (''give... their mother to plundering'').
    ''Over'' obscures this hostile legal force. Additionally, ''filiorum'' is simply
    ''the children''; the demonstrative ''these'' is absent from the Latin and unnecessary.
    | Azure: This is 5 Ezra, so the Latin is original and should be read as Late Latin,
    not as translation-Greek. In the legal/judicial formula testem invoco, the phrase
    super matrem filiorum is naturally adversat'
