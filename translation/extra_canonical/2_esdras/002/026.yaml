  from: Do not be anxious, for when the day of distress and anguish comes, others will weep and be sorrowful, but you will be cheerful and abundant.
  to: Do not be anxious, for when the day of distress and anguish comes, others will weep and be sorrowful, but you will be cheerful and have abundance.
  rationale: The Latin adjective 'copiosa' means 'well-supplied' or 'rich.' Applying 'abundant' directly to a person in English ('you will be... abundant') is awkward and obscures the meaning. Rendering it as 'have abundance' or 'richly supplied' better captures the intended contrast with the distress of others.
