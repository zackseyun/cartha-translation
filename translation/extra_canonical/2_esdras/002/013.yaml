  from: pray that your days may be few and shortened
  to: pray that your few days may be shortened
  rationale: 'The Latin ''rogate uobis dies paucos ut minorentur'' uses prolepsis,
    pulling the subject of the ''ut'' clause (''dies paucos'', ''few days'') forward
    as the object of ''rogate''. It means ''pray that your few days may be shortened'',
    not ''pray that your days may be few and shortened''. The draft''s rendering obscures
    the apocalyptic idiom (cf. Matt 24:22) by treating ''paucos'' as a predicate.
    | Azure: In 5 Ezra the Latin is the original, and the syntax of "rogate uobis
    dies paucos ut minorentur" is best taken as proleptic/anticipatory accusative:
    "pray concerning/for your few days, that they may be'
