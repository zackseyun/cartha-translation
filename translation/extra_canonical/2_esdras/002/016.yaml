  from: because I have known my name in them.
  to: because I recognize my name in them.
  rationale: 'The perfect form ''cognoui'' (from ''cognosco'') frequently carries the present-state meaning ''I know'' or ''I recognize'' (Lewis & Short I.B). In this 2nd/3rd-century Christian Latin context (5 Ezra), God ''recognizing'' his name in his people is a coherent theological concept. Rendering it as ''I recognize'' accurately reflects the Latin without creating the artificial English awkwardness of ''I have known,'' which the footnote unnecessarily assumes is a textual corruption. | Azure: In 2 Esdras 2:16 we are in 5 Ezra, where the Latin is the original composition, so the wording should be judged as Late/Christian Latin rather than as a wooden translation of a lost Vorlage. The claus'
