  from: with you, evil nation!
  to: in your midst! O evil nation,
  rationale: 'The Latin ''penes te'' (in your power / possession / house) is slightly wooden as ''with you'' when referring to a nation hiding the wicked; ''in your midst'' or ''within you'' is more natural. Furthermore, the source punctuation (''penes te! gens mala,'') and syntax indicate that ''gens mala'' is a vocative that likely introduces the imperative in verse 9 (''memorare...''). Rendering it as ''O evil nation,'' captures this vocative force and preserves the bridge to the next verse better than the appositive ''evi | Azure: This is 5 Ezra, so the Latin is the original and should be read on its own terms. The reviewer’s source-based points hold up: *penes te* is not best represented here by the wooden English "with you," '
