  from: I bear witness openly to my Savior.
  to: I openly call my Savior to witness.
  rationale: In Latin, `testor` with a personal accusative (`saluatorem meum`) idiomatically
    means 'to call [someone] to witness' or 'invoke as a witness' (Lewis & Short).
    The draft's 'bear witness to' misconstrues the idiom, turning a solemn prophetic
    invocation of the Savior as a witness to Ezra's charge into a generic statement
    about testifying about the Savior.
