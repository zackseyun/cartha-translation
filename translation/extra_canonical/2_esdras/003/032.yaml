  from: Or what other nation has known you besides Israel? Or what tribes have believed your covenants as this Jacob has?
  to: Or has any other nation known you besides Israel? Or what tribes have believed the covenants like these tribes of Jacob?
  rationale: The draft translates 'alia gens' as 'what other nation', but the Latin lacks an interrogative here (it means 'another nation' or 'any other nation'). Furthermore, 'haec' in 'haec Iacob' is feminine (functioning as the nominative plural for *hae* in Late Latin, or referring back to *tribus*) and cannot modify the masculine *Iacob*. It means 'these [tribes] of Jacob', not 'this Jacob'. Finally, 'testamentis' is simply 'the covenants', without the possessive 'your'.
