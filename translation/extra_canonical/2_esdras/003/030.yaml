  category: grammar
  tier: 2
  from: spare those who act impiously, but destroy your people and preserve your enemies
  to: have spared those who act impiously, but have destroyed your people and preserved your enemies
  rationale: The Latin deliberately shifts from the present tense ('sustines', "you endure") to the perfect tense for the subsequent verbs ('pepercisti', 'perdidisti', 'conservasti'). By flattening these into the present tense, the English loses the historical finality of God's actions. Specifically, the destruction of Jerusalem is a completed historical event ('perdidisti', "you have destroyed") that grounds Ezra's entire apocalyptic complaint, not a general ongoing habit.
