  from: came up over my heart
  to: came up upon my heart
  rationale: The Latin 'super cor meum' is a literal calque of the Hebrew idiom על
    לב (al lev, 'upon the heart' / 'to mind'). In English, thoughts coming 'over'
    the heart sounds as if they are bypassing or covering it. 'Upon my heart' (or
    'into my heart') better preserves the Semitic idiom of thoughts arising within
    the mind/inner self.
