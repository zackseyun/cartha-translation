source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned
    Latin
  text: 'suscitasti tibi seruum nomine Dauid. Et dixisti ei aedificare ciuitatem nominis
    tui, et offerre tibi in ea de tuis oblationes. Et factum est hoc annis multis,
    et deliquerunt qui habitabant ciuitatem, In omnibus facientes sicut fecit Adam
    et omnes generationes eius, utebantur enim et ipsi cor malignum. Et tradidisti
    ciuitatem tuam in manibus inimicorum tuorum. Et dixi ego tunc in corde meo : numquid
    meliora faciunt qui habitant Babilonem? et propter hoc dominauit Sion? Factum
    est autem cum uenissem huc, et uidi impietates, quorum non est numerus, et delinquentes
    multos uidit anima mea hoc tricesimo anno; et excessit cor meum, Quoniam uidi
    quomodo sustines eos peccantes, et pepercisti impie agentibus, et perdidisti populum
    tuum, et conseruasti inimicos tuos, Et non significasti nihil nemini quomodo debeat
    derelinqui uia haec. numquid meliora facit Babilon quam Sion? Aut alia gens cognouit
    te praeter Israel ? aut quae tribus crediderunt testamentis tuis sicut haec Iacob?
    Quarum merces non comparuit, neque labor fructificauit. pertransiens enim pertransiui
    in gentibus, et uidi habundantes eas, et non memorantes mandatorum tuorum. Nunc
    ergo pondera in statera nostras iniquitates, et eorum qui habitant in saeculo
    ; et inuenietur momentum puncti ubi declinet. Aut quando non peccauerunt in conspectu
    tuo qui habitant terram ? aut quae gens sic obseruauit mandata tua? Homines quidem
    per nomina inuenies seruasse mandata tua, gentes autem non inuenies.'
  language: Latin
translation:
  text: And you told him to build a city for your name, and in it to offer to you
    offerings from what is yours.
