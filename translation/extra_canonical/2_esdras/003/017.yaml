  from: And it happened, when you were leading his seed out of Egypt and bringing them to Mount Sinai,
  to: And it happened, when you led his seed out of Egypt, you brought them to Mount Sinai.
  rationale: The Latin 'adduxisti' is a perfect indicative ('you brought'), serving as the main verb of the sentence following the temporal 'cum' clause. The 'et' before it is apodotic, a common Semitism reflecting a Hebrew waw-consecutive (e.g., 'when you led... then you brought'). The draft incorrectly flattens 'adduxisti' into a dependent participle ('and bringing'), which leaves verse 17 as a sentence fragment and forces an unnatural run-on into verse 18.
