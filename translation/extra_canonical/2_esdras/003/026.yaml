  from: made use of the evil heart.
  to: had the evil heart.
  rationale: The Latin verb *utor* (here *utebantur*, taking the accusative *cor malignum* in Late Latin syntax) when used with a quality or condition means 'to possess' or 'to have' (e.g., *bona valetudine uti*, 'to have good health'). Translating it as 'made use of' implies deliberately utilizing a tool, which distorts the author's theological concept of the 'evil heart' (*yetzer hara*) as an inherited, burdensome condition (cf. 3:21). 'Had' accurately reflects the idiom and the author's intent.
