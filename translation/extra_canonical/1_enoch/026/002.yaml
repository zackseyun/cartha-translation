translation:
  text: And there I saw a holy mountain, and beneath the mountain water from the east,
    and its flow went toward the north.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez says literally 'water from the east'; the following clause clarifies
      that this water has a northward flow.
    reason: lexical_alternative
lexical_decisions:
- source_word: ደብረ
  chosen: mountain
  alternatives:
  - hill
  - mount
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez noun commonly denotes a mountain or highland. 'Mountain' best
    fits the visionary topography and preserves the elevated apocalyptic setting.
- source_word: ቅዱሰ
  chosen: holy
  alternatives:
  - sacred
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective marks consecrated or set-apart status. 'Holy' preserves
    the theological force better than the more generic 'sacred'.
- source_word: መትሕተ ደብር
  chosen: beneath the mountain
  alternatives:
  - under the mountain
  - below the mountain
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward spatial expression. 'Beneath' is slightly more elevated
    in register while remaining clear.
- source_word: ማይ
  chosen: water
  alternatives:
  - waters
  - a stream
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The base noun is simply 'water.' Although the context suggests a flowing
    body of water, the following clause about its flow supplies that idea, so the
    main noun is left unexpanded.
- source_word: እመንገለ ጽባሕ
  chosen: from the east
  alternatives:
  - on the east side
  - from the direction of the sunrise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally indicates direction from the east/sunrise. 'From
    the east' is concise and natural while preserving the directional sense.
- source_word: ውሕዘቱ
  chosen: its flow
  alternatives:
  - its stream
  - its course
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This form points to the water's flowing movement or stream-course. 'Its
    flow' keeps the imagery close to the Ge'ez without over-specifying a separate
    river noun.
- source_word: መንገለ ሰሜን
  chosen: toward the north
  alternatives:
  - to the north
  - in the direction of the north
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The directional phrase indicates movement northward. 'Toward the north'
    fits the motion implied by the preceding reference to flow.
