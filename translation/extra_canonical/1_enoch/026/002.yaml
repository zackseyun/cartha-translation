theological_decisions:
- issue: Whether to render ቅዱሰ with explicitly theological language
  chosen_reading: holy mountain
  alternative_readings:
  - sacred mountain
  rationale: In Enochic visionary geography, sanctity is part of the scene's theological
    meaning, not merely cultic atmosphere. 'Holy' preserves that stronger register.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten theological weight.
