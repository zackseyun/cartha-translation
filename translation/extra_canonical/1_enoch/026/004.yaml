lexical_decisions:
- source_word: መንገለ
  chosen: path
  alternatives:
  - way
  - road
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes a way, road, or path. 'Path' preserves the concrete spatial imagery of the visionary landscape without sounding overly prosaic.
- source_word: ዐረቡ
  chosen: the west
  alternatives:
  - westward region
  - the setting place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term refers to the west/western side. In this topographical vision, the cardinal direction should remain explicit.
- source_word: ለዝ
  chosen: for this
  alternatives:
  - to this
  - belonging to this
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The preposition with demonstrative most naturally marks relation or assignment: the western path belongs to or is for ''this'' one/object in the scene.'
- source_word: ካልእ
  chosen: other one
  alternatives:
  - another
  - the other
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective/substantive means 'other' or 'another.' Because the verse is elliptical and likely contrasts one object with another in the vision, 'other one' preserves the substantival force without over-specifying the referent.
