translation:
  text: And from there I went to the middle of the earth, and I saw a blessed place,
    shaded, with branches abiding and sprouting from a tree that had been cut down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic text is difficult in the botanical description. The wording
      likely refers to shaded, living growth associated with a tree or trees; some
      details may also be rendered 'with trees' or 'with boughs/shoots.'
    reason: lexical_alternative
  - marker: b
    text: The final clause probably describes fresh growth coming from a tree that
      had been cut down, though the exact relation of the branches/shoots to the felled
      tree is textually difficult.
    reason: textual_variant
lexical_decisions:
- source_word: ማእከለ ምድር
  chosen: the middle of the earth
  alternatives:
  - the center of the earth
  - the midst of the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formal rendering preserves the cosmic-geographical sense of the visionary
    journey. 'Earth' is preferred over 'land' because the scene is apocalyptic and
    global in scope rather than merely local terrain.
- source_word: መካነ ቡሩከ
  chosen: a blessed place
  alternatives:
  - a place of blessing
  - a blessed region
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes a location marked by blessing. 'Blessed place' is
    concise and preserves the adjectival force without over-interpreting it as liturgical
    or eschatological beyond the verse itself.
- source_word: ጥሉለ
  chosen: shaded
  alternatives:
  - shadowed
  - full of shade
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The bracketed reading likely describes the place as characterized by
    shade. 'Shaded' is natural English and keeps the concrete imagery of a sheltered,
    fertile location.
- source_word: ዕፀወ / አዕፁቀ
  chosen: branches
  alternatives:
  - trees
  - shoots
  - boughs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired arboreal terms are difficult in OCR, but the immediate context
    points to living growth associated with a tree. 'Branches' best fits the following
    participles 'abiding and sprouting' and avoids multiplying separate botanical
    objects unnecessarily.
- source_word: ዘይነብር ወይሠርፅ
  chosen: abiding and sprouting
  alternatives:
  - remaining and growing
  - enduring and shooting forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The first verb suggests continuance or persistence; the second suggests
    budding or shooting forth. The pair conveys ongoing life and regrowth, important
    to the image of vitality after cutting.
- source_word: እምዕፅ ዘተመተረ
  chosen: from a tree that had been cut down
  alternatives:
  - from a felled tree
  - from a tree that was lopped off
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The final clause appears to describe new growth issuing from a tree previously
    cut. 'Had been cut down' makes the sequence clear in English while preserving
    the vivid image of life emerging from what was cut.
