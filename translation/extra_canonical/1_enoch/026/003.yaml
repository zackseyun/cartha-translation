theological_decisions:
- issue: Visionary topography should remain concrete rather than symbolically paraphrased
  chosen_reading: Retain mountain, ravine, and flowing water as literal visionary landscape features
  alternative_readings:
  - Interpret the geography symbolically in the translation itself
  - Generalize to 'a place' or 'a region'
  rationale: The Book of the Watchers regularly presents symbolic meaning through concrete visionary scenery. The translation preserves the imagery and leaves interpretation to readers and notes.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten visionary prose.'
