  from: and I drew near to this mountain on the east.
  to: and I drew near to the east of this mountain.
  rationale: 'The Ge''ez phrase መንገለ ጽባሕ ለደብር ዝንቱ (mangala ṣəbāḥ la-dabr zəntu) uses the preposition ለ (la) as a periphrastic genitive marker, meaning ''the east of this mountain'' (which aligns perfectly with the Greek Panopolitanus reading πρὸς ἀνατολὰς τοῦ ὄρους τούτου). The draft''s ''to this mountain on the east'' misconstrues the syntactic relationship by making the mountain the direct object of approach rather than its eastern side. | Adjudicator: The reviewer correctly identifies that the Ge''ez preposition `la` (ለ) in `la-dabr zəntu` functions as a periphrastic genitive modifying `mangala ṣəbāḥ` (''toward the east''). This yields ''toward the eas'
