theological_decisions:
- issue: Whether to specify a sacred or temple association for the aromatic trees
  chosen_reading: Rendered the trees simply as 'trees of incense' without importing
    explicit cultic symbolism.
  alternative_readings:
  - trees of frankincense
  - sacred incense trees
  rationale: The verse presents visionary flora with aromatic significance, but the
    Ge'ez line itself does not explicitly interpret them theologically. Preserving
    the image without added symbolism follows the project's restraint.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
