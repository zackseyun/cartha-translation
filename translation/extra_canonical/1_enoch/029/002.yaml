- source_word: ወዕፀወሂ
  chosen: trees as well
  alternatives:
  - other trees also
  - and trees too
  lexicon: Dillmann
  rationale: 'Final waw + emphatic/additive particle suggests continuation: additional
    trees are present. Because the object is not further specified in the OCR line,
    the English remains restrained rather than inventing detail.'
