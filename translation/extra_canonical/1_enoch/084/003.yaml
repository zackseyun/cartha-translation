theological_decisions:
- issue: Divine sovereignty and omniscience language
  chosen_reading: Render the verse as a strong affirmation that God made all things, rules over all, and that nothing escapes his knowledge.
  alternative_readings:
  - Soften the claims into general praise language
  - Interpret the difficult middle clause as only about human wisdom or counsel
  rationale: The verse is a prayer of exalted praise in apocalyptic style. The repeated universal terms and the closing 'you see all things' support a maximal reading of divine sovereignty and knowledge rather than a narrowed or softened one.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Meaning of the difficult clause about 'one wisdom' and the throne
  chosen_reading: 'Keep the unusual wording relatively close to the Ge''ez: ''not even a single wisdom passes beyond the throne of your dwelling.'''
  alternative_readings:
  - '''No wise thought escapes your throne'''
  - '''No matter of wisdom is beyond your dwelling-place'''
  rationale: The clause is textually and semantically awkward. A relatively formal rendering keeps the imagery auditable and avoids overinterpreting the referent of 'wisdom.'
  doctrine_reference: When the sense is uncertain, prefer transparent English plus a footnote over false confidence.
