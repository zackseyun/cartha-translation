translation:
  text: For you have made them, and over all things you rule; and no deed is too hard for you, and not even a single wisdom passes beyond the throne of your dwelling, nor turns away from before your face. And you know all things, and see, and hear, and there is nothing hidden from you, for you see all things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'not even a single wisdom passes beyond the throne of your dwelling' is difficult in the Ge'ez. It may refer to no wise plan, thought, or matter being beyond God's royal dwelling-place.
    reason: lexical_alternative
  - marker: b
    text: The final sentence repeats the theme of total divine knowledge; some witnesses appear to preserve an explicit concluding line, 'for you see all things.'
    reason: textual_variant
  - marker: c
    text: Or 'and no deed opposes you'.
    reason: previous_rendering
  - marker: d
    text: Or 'For you have made all things, and over all things you rule'.
    reason: previous_rendering
lexical_decisions:
- source_word: ገበርከ
  chosen: have made
  alternatives:
  - did
  - created
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means 'make/do.' In this prayer context, with 'all things' as object, 'have made' best conveys comprehensive divine making without overcommitting to a technical creation formula absent from the immediate wording.
- source_word: ለኵሉ
  chosen: all things
  alternatives:
  - everything
  - all
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is totalizing. 'All things' preserves the elevated register and matches the repeated universal scope in the verse.
- source_word: ትመልክ
  chosen: you rule
  alternatives:
  - you reign
  - you are king over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes royal rule. 'You rule' is concise and natural English while preserving the sovereignty claim; 'reign' was possible but slightly more idiomatic than necessary here.
- source_word: ኢይጸንዐከ ግብር
  chosen: no deed opposes you
  alternatives:
  - no work withstands you
  - no action is too hard for you
  - no deed prevails against you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction is difficult, but the sense is that no act or work can stand against, resist, or frustrate God. 'Opposes you' preserves that adversative force without paraphrasing into an abstract statement of omnipotence.
- source_word: ወአሐቲ ጥበብ
  chosen: even a single wisdom
  alternatives:
  - one matter of wisdom
  - a single wise thought
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text literally reads 'one wisdom' or 'a single wisdom.' Though unusual in English, retaining 'wisdom' keeps the source texture and avoids prematurely interpreting it as 'thought,' 'plan,' or 'matter.'
- source_word: ኢትሐልፍ
  chosen: passes beyond
  alternatives:
  - passes by
  - goes beyond
  - transgresses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates passing or going beyond. 'Passes beyond' fits the spatial imagery tied to the throne and preserves the apocalyptic-court setting.
- source_word: እምንባራተ ምንባሪከ
  chosen: the throne of your dwelling
  alternatives:
  - the seat of your habitation
  - your dwelling-place throne
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated root suggests seat/throne and dwelling/habitation. 'The throne of your dwelling' preserves the doubled spatial-royal imagery rather than flattening it to simply 'your presence' or 'your abode.'
- source_word: ኢትትመየጥ ኢእምገጽከ
  chosen: nor turns away from before your face
  alternatives:
  - nor departs from your presence
  - nor is changed before you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is spatial and personal. 'From before your face' is a literal biblical idiom that preserves the vividness of divine presence better than the smoother 'from your presence.'
- source_word: ታአምር
  chosen: you know
  alternatives:
  - you understand
  - you perceive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In sequence with 'see' and 'hear,' 'know' best captures the comprehensive cognition attributed to God.
- source_word: ዘይትኀባእ
  chosen: hidden
  alternatives:
  - concealed
  - kept secret
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hidden'' is the most direct and idiomatic rendering, matching the verse''s emphasis on divine omniscience.'
