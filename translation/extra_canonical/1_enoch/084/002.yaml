translation:
  text: Blessed are you, O Lord, great King and mighty in your greatness, Lord of
    all creation of heaven, King of kings and God of all the world. Your majesty and
    your kingdom and your greatness endure forever and ever, and through all generations
    of generations. All the heavens are your throne forever, and the whole earth is
    the footstool of your feet forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The term rendered 'your majesty' is textually difficult in the OCR witness;
      it may also be understood as 'your dominion' or 'your glory.'
    reason: textual_variant
  - marker: b
    text: The phrase 'all creation of heaven' is literal to the Ge'ez sequence and
      may mean 'all heavenly creation.'
    reason: lexical_alternative
  - marker: c
    text: Compare the biblical throne-and-footstool image in Isa 66:1; the Enochic
      verse uses the same kind of cosmic royal imagery without requiring identical
      wording.
    reason: cross_reference
lexical_decisions:
- source_word: ቡሩክ
  chosen: Blessed are you
  alternatives:
  - Blessed be you
  - Praised are you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Predicative blessing formula addressed directly to God. 'Blessed are
    you' preserves the prayer-like doxological force without archaic stiffness.
- source_word: እግዚኦ
  chosen: O Lord
  alternatives:
  - Lord
  - O Master
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Vocative divine address. 'O Lord' preserves elevated prayer register
    and direct invocation.
- source_word: ንጉሥ ዐቢይ ወኃያል
  chosen: great King and mighty
  alternatives:
  - great and mighty King
  - great king, mighty one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sequence can be rendered appositionally; this wording keeps both
    royal title and attribute distinct while remaining natural in English.
- source_word: በዕበየ ዚአከ
  chosen: in your greatness
  alternatives:
  - in your majesty
  - by your greatness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase intensifies the preceding description. 'In your greatness'
    is close to the Ge'ez construction and avoids over-interpretation.
- source_word: ኵሉ ፍጥረት ሰማይ
  chosen: all creation of heaven
  alternatives:
  - all the creation of heaven
  - every heavenly creature
  - all heavenly creation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez literally combines 'all creation' with 'heaven.' 'All creation
    of heaven' stays close to the wording, though somewhat marked; it signals cosmic
    scope rather than merely earthly rule.
- source_word: ንጉሠ ነገሥት
  chosen: King of kings
  alternatives:
  - king over kings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Established royal superlative also natural in English; no need to dilute
    the title.
- source_word: አምላከ ኵሉ ዓለም
  chosen: God of all the world
  alternatives:
  - God of the whole world
  - God of all eternity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here ዓለም most naturally denotes the world/age-order. 'All the world'
    best fits the cosmic kingship context.
- source_word: መላኵትከ
  chosen: your majesty
  alternatives:
  - your sovereignty
  - your dominion
  - your glory
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult in OCR, but in context with 'your kingdom and your
    greatness' it likely denotes royal majesty or dominion. 'Majesty' avoids redundancy
    with the following explicit 'kingdom' while fitting the doxology.
- source_word: መንግሥትከ
  chosen: your kingdom
  alternatives:
  - your reign
  - your kingship
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard royal term. 'Kingdom' preserves the concrete and abstract sense
    of rule.
- source_word: ዕበይከ
  chosen: your greatness
  alternatives:
  - your majesty
  - your grandeur
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the repeated emphasis on divine greatness rather than smoothing
    repetition away.
- source_word: ይነብር
  chosen: endure
  alternatives:
  - abide
  - remain
  - dwell
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of kingdom/majesty/greatness, 'endure' communicates lasting
    continuance more idiomatically than 'dwell'.
- source_word: ለዓለም ወለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for eternity and for the eternity of eternity
  - forever, even to the age of ages
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conventional English equivalent for the emphatic eternal formula, while
    preserving the repeated intensification.
- source_word: ለኵሉ ትውልደ ትውልድ
  chosen: through all generations of generations
  alternatives:
  - to every generation and generation
  - through all generations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the Hebraic-style repetition rather than flattening it to a single
    'all generations.'
- source_word: ስልጣንከ
  chosen: '[implicit in the enduring rule]'
  alternatives:
  - your authority
  - your dominion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR sequence is syntactically compressed. Rather than force a clumsy
    extra clause, the translation lets the enduring kingdom language carry the sense
    of continuing dominion; the term is noted here for auditability.
- source_word: ኵሎሙ ሰማያት መንበርከ
  chosen: All the heavens are your throne
  alternatives:
  - the whole heavens are your throne-seat
  - all heaven is your throne
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the cosmic enthronement image. Plural 'heavens' reflects the
    Ge'ez form.
- source_word: ኵላ ምድር መካይደ እገሪከ
  chosen: the whole earth is the footstool of your feet
  alternatives:
  - all the earth is beneath your feet
  - the whole earth is your footstool
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the vivid anthropomorphic royal image. 'Footstool of your feet'
    is slightly fuller than idiomatic English but reflects the explicit wording.
