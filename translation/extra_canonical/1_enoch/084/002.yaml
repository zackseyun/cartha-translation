theological_decisions:
- issue: Cosmic kingship language and throne/footstool imagery
  chosen_reading: Retained as direct royal-cosmic imagery about God's universal rule
  alternative_readings:
  - Generalized praise language without throne imagery
  - Heaven as temple rather than throne
  rationale: The verse is a doxology in apocalyptic style. The throne and footstool
    imagery should remain concrete and cosmic, not reduced to abstract piety.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic language
    into generic religious prose.
