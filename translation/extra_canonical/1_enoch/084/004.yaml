lexical_decisions:
- source_word: መላእክተ
  chosen: angels
  alternatives:
  - messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the heavenly beings are clearly intended, not human messengers.
- source_word: ሰማያቲከ
  chosen: your heavens
  alternatives:
  - your heaven
  - the heavens that are yours
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural form is best preserved as 'heavens,' and the suffix marks possession addressed to God.
- source_word: ይጼብቡ
  chosen: make petition
  alternatives:
  - pray
  - intercede
  - supplicate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries the sense of earnest entreaty. 'Make petition' preserves the elevated register without over-specifying formal intercession.
- source_word: ዲበ ሥጋ ሰብእ
  chosen: upon the flesh of man
  alternatives:
  - upon human flesh
  - upon mankind in the flesh
  - upon the body of man
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formally close rendering preserves the stark anthropological phrase. 'Flesh of man' keeps the Ge'ez imagery and avoids flattening it to a generic 'humanity,' though the sense is collective.
- source_word: ትከውን መዐትከ
  chosen: let your wrath be
  alternatives:
  - may your wrath come to be
  - let your anger come
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This expresses a jussive wish directed to God. 'Wrath' better fits the judgment setting than the milder 'anger.'
- source_word: እስከ ዕለት ዐባይ
  chosen: until the great day
  alternatives:
  - until the great day arrives
  - as far as the great day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a standard apocalyptic temporal expression and should remain concise and elevated.
- source_word: እንተ ጽጌ
  chosen: that belongs to judgment
  alternatives:
  - of judgment
  - of decision
  - of recompense
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The final phrase is textually difficult in the OCR, but the context strongly points to a judicial/apocalyptic qualifier for 'the great day.' 'That belongs to judgment' preserves the likely genitival force while signaling caution.
