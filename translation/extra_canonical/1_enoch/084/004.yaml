theological_decisions:
- issue: Scope of judgment in 'the flesh of man'
  chosen_reading: Rendered collectively as humanity under judgment while preserving the singular idiom 'man.'
  alternative_readings:
  - an individual human being
  - all mortal flesh in a broader cosmic sense
  rationale: The phrase is singular in form but naturally collective in apocalyptic prayer. Preserving 'man' keeps the source texture while the English still reads as a class reference.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key anthropological terms where possible.
