translation:
  text: And I lifted up my hands in righteousness, and I blessed the Holy and Great
    One; and I spoke with the breath of my mouth and with the tongue of flesh, which
    God has made for the children of the flesh of men, so that they might speak by
    it; and he gave them breath and tongue and mouth, so that they might speak with
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I spoke by the spirit of my mouth.' The Ge'ez term can denote breath,
      spirit, or wind; here 'breath' best fits the list of speech faculties.
    reason: lexical_alternative
  - marker: b
    text: 'The wording is deliberately bodily: literally, ''the children of the flesh
      of men.'' The phrase underscores human creatureliness rather than using a smoother
      generic term.'
    reason: cultural_note
lexical_decisions:
- source_word: አልዐልኩ
  chosen: I lifted up
  alternatives:
  - I raised
  - I exalted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb here is the physical act of raising the hands in prayer, not
    exalting in praise. 'Lifted up' preserves the embodied prayer gesture.
- source_word: እደዋየ
  chosen: my hands
  alternatives:
  - my hand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is plural/dual in sense and fits the conventional prayer posture.
- source_word: በጽድቅ
  chosen: in righteousness
  alternatives:
  - righteously
  - in justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal prepositional phrase best preserves the solemn register and
    the moral quality attached to the prayer act.
- source_word: ባረክዎ ለቅዱስ ወለዓቢይ
  chosen: I blessed the Holy and Great One
  alternatives:
  - I blessed the Holy One and the Great One
  - I blessed the holy and great one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired adjectives function as divine epithets. Capitalization marks
    titular use without importing later doctrinal formulas.
- source_word: ነገርኩ በመንፈስ አፉየ
  chosen: I spoke with the breath of my mouth
  alternatives:
  - I spoke by the spirit of my mouth
  - I uttered with the breath from my mouth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this anthropological context, መንፈስ is better taken as breath rather
    than Spirit. The verse emphasizes human speech organs as created gifts.
- source_word: በልስነ ሥጋ
  chosen: with the tongue of flesh
  alternatives:
  - with a fleshly tongue
  - with the tongue of my body
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formal rendering preserves the concrete, embodied imagery and avoids
    Pauline overtones that 'fleshly' might suggest in English.
- source_word: ውሉደ ሥጋ ሰብእ
  chosen: the children of the flesh of men
  alternatives:
  - the children of human flesh
  - the sons of men in the flesh
  - human beings of flesh
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez is emphatically corporeal and somewhat redundant. The translation
    keeps that density rather than smoothing it into generic 'humanity.'
- source_word: ከመ ይትናገሩ ባቲ
  chosen: so that they might speak by it
  alternatives:
  - that they might speak with it
  - so that they might speak through it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The feminine pronominal reference most naturally points back to 'tongue,'
    singular, hence 'by it.'
- source_word: ወወሀቦሙ መንፈሰ ወልሳነ ወአፈ
  chosen: and he gave them breath and tongue and mouth
  alternatives:
  - and he gave them spirit and tongue and mouth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Again መንፈስ is rendered 'breath' because the line lists the faculties/organs
    of speech. This keeps the internal logic of the verse.
- source_word: ከመ ይትናገሩ ቦቱ
  chosen: so that they might speak with them
  alternatives:
  - so that they might speak by them
  - so that they might speak through them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural sense fits the immediately preceding triad of speech-endowments.
    'With them' is idiomatic while preserving instrumentality.
