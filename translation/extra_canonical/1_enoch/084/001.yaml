theological_decisions:
- issue: Whether መንፈስ should be rendered 'Spirit' or 'breath'
  chosen_reading: breath
  alternative_readings:
  - spirit
  - Spirit
  rationale: The verse reflects on created human capacity for praise through mouth,
    tongue, and related faculties. Rendering መንፈስ as 'breath' preserves the anthropological
    and creational focus and avoids introducing a pneumatological claim not demanded
    by the immediate context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: How explicitly to preserve the verse's embodied anthropology
  chosen_reading: Retain 'tongue of flesh' and 'children of the flesh of men' in the
    main text
  alternative_readings:
  - smooth to 'human tongue' and 'human beings'
  rationale: The Ge'ez stresses corporeality in a prayer setting. Keeping the flesh-language
    preserves the text's own rhetoric and avoids flattening its apocalyptic-prayer
    register.
  doctrine_reference: Original-language primacy over translation tradition; do not
    paraphrase beyond what the witness warrants.
