theological_decisions:
- issue: Stacked divine titles in direct address
  chosen_reading: 'Retain all three titles: ''God and Lord and great King'''
  alternative_readings:
  - Compress to 'O great God, Lord, and King'
  - Reduce to a smoother English invocation
  rationale: The Ge'ez piles up honorifics in solemn prayer. Preserving the sequence
    maintains the apocalyptic-prayer register and avoids flattening the rhetoric.
  doctrine_reference: Preserve apocalyptic imagery and elevated address; do not smooth
    away repeated formulas.
