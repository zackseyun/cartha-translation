lexical_decisions:
- source_word: ወይእዜኒ
  chosen: And now
  alternatives:
  - And at this time
  - And now then
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal-transition formula introducing the prayer's immediate petition;
    'And now' is natural English while preserving the discourse shift.
- source_word: አምላክ
  chosen: God
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the divine title; no need to paraphrase.
- source_word: እግዚእ
  chosen: Lord
  alternatives:
  - Master
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Title of sovereignty; 'Lord' fits project defaults and preserves elevated
    address better than 'Master' here.
- source_word: ንጉሥ ዐቢይ
  chosen: great King
  alternatives:
  - mighty King
  - the great King
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective ዐቢይ intensifies the royal title. 'Great King' preserves
    the stacked honorifics of the prayer.
- source_word: አስተበቍዕ
  chosen: I beseech
  alternatives:
  - I implore
  - I entreat
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A strong petitionary verb suited to solemn prayer. 'I beseech' keeps
    the elevated register without becoming obscure.
- source_word: እስእል
  chosen: ask
  alternatives:
  - request
  - petition
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired with the previous verb, it forms a rhetorical doublet. 'Ask' keeps
    the repetition clear and readable.
- source_word: ከመ ታቅም
  chosen: that you uphold
  alternatives:
  - that you establish
  - that you strengthen
  - that you confirm
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The verb likely carries the sense of making firm, sustaining, or establishing.
    ''Uphold'' fits the prayer context well: Enoch asks God to sustain or validate
    his petition rather than merely hear it.'
- source_word: ሊተ
  chosen: for me
  alternatives:
  - me
  - on my behalf
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The dative/pronominal element is retained explicitly rather than absorbed,
    since it is present in the Ge'ez and slightly personalizes the plea.
- source_word: ስእለተየ
  chosen: my prayer
  alternatives:
  - my petition
  - my request
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A prayerful request in direct address to God. 'My prayer' best matches
    the devotional setting, though 'petition' remains possible.
