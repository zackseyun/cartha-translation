theological_decisions:
- issue: Whether ገጻተ should be rendered concretely as 'faces' or interpretively as
    'persons/beings'
  chosen_reading: faces
  alternative_readings:
  - persons
  - countenances
  rationale: Because the verse is brief and visionary, the concrete image should be
    preserved unless context forces a more abstract sense. Rendering it as 'persons'
    would smooth away the apocalyptic visual detail.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten visionary prose
    into generic modern religious language.
