translation:
  text: And I saw other hidden faces in that place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'countenances'; the Ge'ez word is literally 'faces' and may imply persons
      seen in visionary form.
    reason: lexical_alternative
lexical_decisions:
- source_word: ካልአ
  chosen: other
  alternatives:
  - another
  - different
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective marks additional entities beyond what has just been seen.
    'Other' fits the plural noun that follows better than singular 'another'.
- source_word: ገጻተ
  chosen: faces
  alternatives:
  - countenances
  - appearances
  - persons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic sense is 'faces' or 'countenances.' 'Faces' preserves the vivid
    visionary imagery and avoids over-interpreting the term as 'persons,' though the
    latter may be implied.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward past visionary report. 'I saw' is clear modern English;
    'I beheld' would sound more archaic than the project prefers.
- source_word: በውእቱ መካን
  chosen: in that place
  alternatives:
  - in that region
  - in that location
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points back to the visionary locale already in view. 'Place'
    is the most natural and sufficiently elevated rendering.
- source_word: ኅቡኣተ
  chosen: hidden
  alternatives:
  - concealed
  - secret
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective describes the faces as concealed or not openly visible.
    'Hidden' is concise and preserves the mysterious apocalyptic quality without adding
    interpretive weight.
