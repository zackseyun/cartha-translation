translation:
  text: And I heard the voice of the angel saying, 'These are the angels who came
    down upon the earth and revealed what was hidden to the children of men, and led
    the children of men astray so that they committed sin.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'disclosed the hidden things.' The Ge'ez expression points to the uncovering
      of what had been concealed, without specifying in this verse exactly which secrets
      are meant.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the children of men,' an Enochic expression for humankind.
    reason: cultural_note
lexical_decisions:
- source_word: ሰማዕኩ
  chosen: I heard
  alternatives:
  - I listened
  - I perceived
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward first-person perfect/reportive verb introducing Enoch's
    auditory perception in visionary narrative.
- source_word: ቃሎ ለመልአክ
  chosen: the voice of the angel
  alternatives:
  - the word of the angel
  - the speech of the angel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቃል can mean 'word' or 'speech,' but with the hearing verb and singular
    angelic speaker, 'voice' best fits the immediate auditory scene without flattening
    the angel's utterance.
- source_word: እንዘ ይብል
  chosen: saying
  alternatives:
  - as he said
  - while saying
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common narrative construction introducing direct discourse; concise English
    participial 'saying' preserves the flow.
- source_word: እሉ ውእቶሙ
  chosen: These are
  alternatives:
  - These are they
  - Those are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Demonstrative-identifying formula; 'These are' is natural English while
    retaining the deictic force.
- source_word: መላእክት እለ ወረዱ ዲበ ምድር
  chosen: the angels who came down upon the earth
  alternatives:
  - the angels who descended onto the earth
  - the angels who came down to the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the apocalyptic descent imagery. 'Upon the earth' reflects
    ዲበ more closely than a flatter 'to earth.'
- source_word: ወዘበኅቡእ ከሠቱ
  chosen: and revealed what was hidden
  alternatives:
  - and disclosed the hidden things
  - and made manifest the secret
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase combines a notion of hiddenness with uncovering/disclosure.
    'Revealed what was hidden' is clear and preserves the contrast without over-specifying
    plural 'things' where the English can remain slightly open.
- source_word: ለውሉደ ሰብእ
  chosen: to the children of men
  alternatives:
  - to the sons of men
  - to human beings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Traditional anthropological phrase in Enochic literature. 'Children of
    men' preserves the elevated register and corporate human reference better than
    the more generic 'human beings.'
- source_word: ወአስሐትዎሙ
  chosen: and led ... astray
  alternatives:
  - and deceived them
  - and caused them to err
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes causing error/deception. 'Led astray' captures both
    moral seduction and resultant deviation, fitting the verse's causal sequence.
- source_word: ከመ ይግበሩ ኃጢአተ
  chosen: so that they committed sin
  alternatives:
  - so that they might do sin
  - so that they would practice sin
  - to commit sin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Purpose/result construction. 'Committed sin' is idiomatic English and
    preserves the moral act without importing later doctrinal phrasing.
