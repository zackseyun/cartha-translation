theological_decisions:
- issue: Identity of the offending angels
  chosen_reading: Render simply as 'the angels who came down upon the earth' without
    inserting 'Watchers' into the text.
  alternative_readings:
  - the Watchers who descended upon the earth
  - the fallen angels
  rationale: The Ge'ez here says 'angels' and describes their descent and corrupting
    revelation. Although the broader Enochic tradition links them with the Watchers,
    importing that title here would go beyond the explicit wording of this verse.
  doctrine_reference: Preserve local passage wording; do not harmonize with later
    tradition beyond the source text.
- issue: Nature of the hidden content disclosed
  chosen_reading: Translate generally as 'what was hidden' rather than specifying
    illicit arts or heavenly secrets in the main text.
  alternative_readings:
  - the hidden things
  - secret knowledge
  - mysteries
  rationale: The immediate verse states only that hidden matter was disclosed to humanity.
    Broader context may imply forbidden knowledge, but the verse itself leaves the
    object somewhat open, so the translation preserves that breadth.
  doctrine_reference: Preserve theological tension rather than resolve it.
