translation:
  text: From the days of slaughter and destruction and death, the spirits that have
    gone out from the souls of their flesh shall destroy without judgment; thus they
    shall destroy until the day of the completion of the great judgment, when the
    great age shall be brought to its end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening clause is textually difficult in the OCR witness. The sense
      is that from the time marked by slaughter, destruction, and death, these spirits
      continue their ravaging activity.
    reason: textual_variant
  - marker: b
    text: '''The spirits that have gone out from the souls of their flesh'' is a very
      literal rendering of a difficult phrase. It likely refers to disembodied spirits
      associated with the Watchers'' offspring in the surrounding context.'
    reason: lexical_alternative
  - marker: c
    text: Or 'when the great world-order reaches its completion.' The Ge'ez term can
      carry the sense of 'age' or 'world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እመዋዕለ
  chosen: From the days of
  alternatives:
  - In the days of
  - Since the days of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition with 'days' marks a temporal starting point. 'From the
    days of' preserves the sense of onset better than the flatter 'in the days of.'
- source_word: ቀትል
  chosen: slaughter
  alternatives:
  - killing
  - slaying
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A violent collective sense fits the judgment context and the triad with
    destruction and death.
- source_word: ሙስና
  chosen: destruction
  alternatives:
  - corruption
  - ruin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the term most naturally denotes devastation
    rather than moral corruption.
- source_word: ሞተ
  chosen: death
  alternatives:
  - dying
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun completes the triad of catastrophic consequences.
- source_word: ረዓይትኒ
  chosen: the spirits
  alternatives:
  - I saw the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR string is difficult, but the clause clearly turns to the spirits.
    Because the surviving line appears compressed or corrupt, the main translation
    follows the clause as preserved in context rather than forcing an explicit first-person
    verb into English.
- source_word: ወፅአ መናፍስት እምነፍሳት ሥጋሆሙ
  chosen: the spirits that have gone out from the souls of their flesh
  alternatives:
  - the spirits that have come forth from their bodies
  - the spirits that have gone out from their flesh
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The wording is unusual and likely reflects the disembodied offspring/spirits
    motif in the Watchers narrative. I preserve the concrete imagery of spirits going
    out from embodied life rather than smoothing it into 'departed spirits.'
- source_word: ሲይኩን
  chosen: shall
  alternatives:
  - will be
  - are to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A future or consequential force fits the sequence of judgment effects.
- source_word: ዘያማስን
  chosen: destroy
  alternatives:
  - corrupt
  - oppress
  - do violence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated verb likely denotes harmful ravaging activity by the spirits.
    'Destroy' best matches the immediate context of slaughter, destruction, and death,
    while preserving the severity of the apocalyptic image.
- source_word: ዘእንበለ ኵነኔ
  chosen: without judgment
  alternatives:
  - without sentence
  - without condemnation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates activity continuing apart from final judicial restraint
    until the appointed great judgment.
- source_word: እስከ ዕለተ ተፍጻሜት ኵነኔ ዐቢይ
  chosen: until the day of the completion of the great judgment
  alternatives:
  - until the day when the great judgment is completed
  - until the day of the consummation of the great judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the formal apocalyptic cadence and the noun 'completion/consummation'
    rather than reducing it to a simple time marker.
- source_word: አመ ዓለም ዐቢይ ይትፌጸም
  chosen: when the great age shall be brought to its end
  alternatives:
  - when the great world shall be completed
  - when the great eternity is consummated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዓለም can denote age/world. In this eschatological setting, 'age' better
    conveys a world-order reaching its appointed end without implying annihilation
    of creation itself.
