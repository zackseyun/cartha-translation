theological_decisions:
- issue: Identity and activity of the spirits
  chosen_reading: The verse speaks of the spirits issuing from embodied beings and
    continuing destructive activity until the final judgment.
  alternative_readings:
  - The verse refers more specifically to the spirits of the giants after bodily death
  - The verse describes human souls departing from bodies in general
  rationale: Within the Book of the Watchers, the immediate context concerns the postmortem
    spirits associated with the offspring of the Watchers. The Ge'ez wording is difficult,
    so the main text keeps the language broad enough to reflect the witness while
    still fitting the local narrative context.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of ዓለም in the closing clause
  chosen_reading: age/world-order
  alternative_readings:
  - world
  - eternity
  rationale: Apocalyptic literature often speaks of an age reaching completion. Rendering
    it as 'age' preserves eschatological force without importing later systematic
    categories.
  doctrine_reference: Original-language primacy over translation tradition.
