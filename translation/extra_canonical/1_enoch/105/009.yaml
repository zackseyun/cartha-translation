translation:
  text: Do not be wicked in your hearts, and do not lie, and do not alter the word of uprightness, and do not declare false the word of the Holy Great One, and do not account your idols as anything; for all your falsehood and all your uncleanness lead not to righteousness, but to great sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez expression rendered 'alter the word of uprightness' may also be understood as 'pervert' or 'distort' the word/matter of righteousness.
    reason: lexical_alternative
  - marker: b
    text: The clause about idols is difficult. The verb likely means 'reckon, consider, account,' so the sense may be 'do not esteem your idols' or 'do not regard your idols as anything.'
    reason: lexical_alternative
  - marker: c
    text: '''The great holy word'' could also be rendered ''the holy great word'' or, less likely, ''the great holy matter.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'Do not err'.
    reason: previous_rendering
  - marker: e
    text: Or 'the great holy word'.
    reason: previous_rendering
  - marker: f
    text: Or 'do not speak falsely against'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኢትርሥዑ
  chosen: do not err
  alternatives:
  - do not go astray
  - do not sin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prohibition is inwardly directed by the following 'in your hearts,' so 'do not err' preserves the sense of straying or going wrong without over-specifying moral transgression as 'sin' in the first clause.
- source_word: በልብክሙ
  chosen: in your hearts
  alternatives:
  - in your mind
  - within yourselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal rendering keeps the anthropological language of the text and preserves the moral-intentional focus.
- source_word: ተሐስዉ
  chosen: do not lie
  alternatives:
  - do not speak falsehood
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct and idiomatic English for the verbal prohibition of falsehood.
- source_word: አትሚጥዋ ለነገረ ርትዕ
  chosen: do not alter the word of uprightness
  alternatives:
  - do not pervert the word of righteousness
  - do not distort the matter of truth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to carry the sense of changing, distorting, or perverting. 'Alter' is readable while still leaving the object concrete as 'the word of uprightness.' 'Uprightness' is chosen here rather than 'righteousness' to avoid awkward repetition with the final clause while retaining the ethical sense.
- source_word: ነገረ
  chosen: word
  alternatives:
  - matter
  - speech
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is verbal and polemical, so 'word' best fits the repeated warnings about lying and false speech, though 'matter' remains possible.
- source_word: ርትዕ
  chosen: uprightness
  alternatives:
  - righteousness
  - truth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term can overlap with righteousness/rightness. 'Uprightness' preserves the ethical sense and distinguishes it from the later explicit ጽድቅ, rendered 'righteousness.'
- source_word: ታሐስውዋ ለነገረ ቅዱስ ዐቢይ
  chosen: do not speak falsely against the great holy word
  alternatives:
  - do not lie about the great holy word
  - do not falsify the great holy matter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction likely means treating the holy word falsely or speaking falsehood concerning it. 'Against' brings out the adversative force without over-paraphrasing.
- source_word: ቅዱስ ዐቢይ
  chosen: great holy
  alternatives:
  - holy and great
  - most holy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired adjectives are both retained. 'Great holy' is slightly marked in English but preserves the emphatic stacked description of the word.
- source_word: ትሕስብዋ ለጣዖትክሙ
  chosen: do not account your idols as anything
  alternatives:
  - do not esteem your idols
  - do not put your trust in your idols
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is cognitive/reckoning language. Because the object is idols and the following clause condemns falsehood and uncleanness, the sense is likely not to regard them as having any standing. 'As anything' makes explicit the implied worthlessness.
- source_word: ጣዖትክሙ
  chosen: your idols
  alternatives:
  - your images
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Idols'' is the standard and contextually appropriate rendering for cultic objects treated as false.'
- source_word: አኮነት ኵሉ ሐሰትክሙ ወኵሉ ርኩስነክሙ ለጽድቅ አላ ለኃጢአት ዐቢይ
  chosen: for all your falsehood and all your uncleanness lead not to righteousness, but to great sin
  alternatives:
  - for all your lies and all your impurity are not for righteousness but for great sin
  - for all your falsehood and all your defilement belong not to righteousness but to great sin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause contrasts moral trajectories or outcomes. 'Lead not to righteousness, but to great sin' expresses the ethical contrast clearly in English while preserving the antithesis.
- source_word: ሐሰትክሙ
  chosen: your falsehood
  alternatives:
  - your lies
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular collective works well in English and matches the broader denunciation of deceit.
- source_word: ርኩስነክሙ
  chosen: your uncleanness
  alternatives:
  - your impurity
  - your defilement
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Uncleanness'' preserves the moral-cultic resonance common in Jewish apocalyptic discourse.'
- source_word: ጽድቅ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this ethical contrast, 'righteousness' is the most natural and consistent rendering.
- source_word: ኃጢአት ዐቢይ
  chosen: great sin
  alternatives:
  - grave sin
  - great transgression
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is weighty and direct; 'great sin' preserves the apocalyptic moral gravity without interpretive expansion.
