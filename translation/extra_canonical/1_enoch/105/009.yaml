theological_decisions:
- issue: How explicitly to render the condemnation of idols in the clause with ትሕስብዋ
  chosen_reading: do not account your idols as anything
  alternative_readings:
  - do not trust in your idols
  - do not think on your idols
  - do not esteem your idols
  rationale: The Ge'ez verb points to reckoning or considering. Because the text immediately grounds the warning in the falsity and uncleanness of the audience, the translation emphasizes the idols' lack of real standing rather than importing a fuller theology of trust or worship not explicit in the clause.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Whether to render ነገረ as 'word' or 'matter' in the two central prohibitions
  chosen_reading: word
  alternative_readings:
  - matter
  - speech
  rationale: The surrounding imperatives concern lying and false speech, so 'word' best preserves the verbal and revelatory force of the passage. This also keeps the warning from becoming a generic ethical statement detached from sacred utterance.
  doctrine_reference: Consistency of key terms, or documented exception.
