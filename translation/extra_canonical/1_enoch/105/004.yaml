  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/105/004.job-72957.json
  category: awkward_english
  tier: 1
  from: great joy will be yours, like the angels of heaven
  to: you will have great joy, like the angels of heaven
  rationale: The phrasing 'will be yours, like the angels' creates a dangling modifier, inadvertently suggesting the angels might belong to the reader. Rendering the Ge'ez dative of possession (ይከውን ለክሙ, 'it will be to you'—noting the OCR error ትከዉኑ for the actual text's ይከውን) as 'you will have' resolves the ambiguity and produces more natural English.
