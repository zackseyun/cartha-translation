theological_decisions:
- issue: Force of the angelic comparison
  chosen_reading: The verse promises great joy to the audience in a manner comparable to the angels of heaven, without specifying full angelic transformation.
  alternative_readings:
  - The righteous will rejoice together with the angels of heaven
  - The righteous will become like the angels of heaven
  rationale: The Ge'ez uses a simple comparative construction ('like/as the angels of heaven'). The text does not explicitly state transformation into angels, so the translation preserves comparison rather than resolving it into ontology.
  doctrine_reference: Preserve theological tension rather than resolve it.
