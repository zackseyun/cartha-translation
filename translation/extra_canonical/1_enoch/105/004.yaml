translation:
  text: Hope, and do not abandon your hope, for you will have great joy, like the angels of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as the angels of heaven.' The comparison is explicit, but the precise point of comparison may be their joy, blessed state, or heavenly reward.
    reason: lexical_alternative
  - marker: b
    text: Or 'great joy will be yours, like the angels of heaven'.
    reason: previous_rendering
lexical_decisions:
- source_word: ተስፈዉ
  chosen: Hope
  alternatives:
  - Be hopeful
  - Set your hope
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative from the Ge'ez root for hoping/trusting. 'Hope' preserves the direct exhortation without adding an object not present in the text.
- source_word: ወኢትኅድጉ
  chosen: and do not abandon
  alternatives:
  - and do not forsake
  - and do not give up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative imperative. 'Abandon' keeps the force of leaving behind or forsaking, stronger and more formal than the idiomatic 'give up'.
- source_word: ተስፋክሙ
  chosen: your hope
  alternatives:
  - your expectation
  - your confidence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct object of the prohibition. Repeating 'hope' reflects the source's rhetorical repetition and preserves the apocalyptic exhortation.
- source_word: እስመ
  chosen: for
  alternatives:
  - because
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the ground for the exhortation. 'For' fits elevated but readable English.
- source_word: ትከዉኑ ለክሙ
  chosen: will be yours
  alternatives:
  - will come to you
  - will be for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future verb with dative pronoun. 'Will be yours' is idiomatic English that still reflects possession or allotted benefit.
- source_word: ፍሥሓ ዐቢይ
  chosen: great joy
  alternatives:
  - great gladness
  - abundant rejoicing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of the noun plus adjective. 'Great joy' is natural English and preserves the blessing tone.
- source_word: ከመ መላእክተ ሰማይ
  chosen: like the angels of heaven
  alternatives:
  - as the angels of heaven
  - like heaven's angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison should be preserved explicitly. 'Like the angels of heaven' keeps the apocalyptic imagery without overinterpreting whether the comparison is to their joy, state, or reward.
