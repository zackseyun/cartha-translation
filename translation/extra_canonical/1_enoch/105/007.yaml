translation:
  text: And because you sinners say, ‘We are not sought out, and all our sins are
    not written down’—all your sins are being written down every day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The transmitted wording in the quotation is awkward: the Ethiopic has a
      second-person pronoun near ''sinners,'' but the sense of the speech is most
      naturally the sinners'' own claim, hence ''we sinners.'''
    reason: textual_variant
  - marker: b
    text: The verb rendered 'sought out' can also mean 'investigated' or 'searched
      for,' with a judicial sense in context.
    reason: lexical_alternative
  - marker: c
    text: Or 'And because you say, ‘We sinners are not sought out, and all our sins
      are not written down’'.
    reason: previous_rendering
  - marker: d
    text: Or 'behold, all your sins are being written down'.
    reason: previous_rendering
