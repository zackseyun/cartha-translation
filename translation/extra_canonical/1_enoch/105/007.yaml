  from: And because you say, ‘We sinners are not sought out, and all our sins are
    not written down’
  to: And because you sinners say, ‘You do not search out, and they do not write down
    all our sins’
  rationale: 'The phrase አንትሙ ኃጥኣን (''you sinners'') is the explicit subject in apposition
    to the 2nd person plural verb ትብሉ (''you say''); it is not part of the quoted
    speech. Furthermore, inside the quote, ኢትኅሥሡ is 2nd person plural active (''you
    do not search out''), not 1st person plural passive (''we are not sought out'').
    The sinners are addressing God or the angels, claiming their sins are being ignored.
    | Adjudicator: The reviewer''s grammatical analysis is correct. The Ge''ez text
    explicitly reads አንትሙ ኃጥኣን (ʾantəmu ḫaṭʾan, ''you sinners'') in apposition to
    the 2nd person plural verb ትብሉ (təblu, ''you say''), not as the'
- timestamp: '2026-04-22T22:51:15Z'
  adjudicator: gemini_3_1_pro_tier3_adjudicator
  adjudicator_confidence: 1.0
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/105/007.job-72960.json
  category: lexical
  tier: 3
  from: behold, all your sins are being written down
  to: they are writing down all your sins
  rationale: 'The word ሀለዉ (hallawu) is the 3rd person plural auxiliary verb ''to
    be'', which combines with the imperfect ይጽሐፉ to form the present continuous ''they
    are writing''. It does not mean ''behold'' (which would be ነዋ or ናሁ). The drafter''s
    lexical note hallucinated an emphatic/interjection sense for this standard auxiliary
    verb. | Adjudicator: The reviewer is correct. The Ge''ez phrase ይጽሐፉ፡ ሀለዉ (yəṣḥafu
    hallawu) consists of the 3rd person plural imperfect of ጸሐፈ (to write) and the
    3rd person plural perfect of the auxiliary verb ሀለወ (to be).'
