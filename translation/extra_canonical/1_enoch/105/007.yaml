theological_decisions:
- issue: Nature of the heavenly record of sins
  chosen_reading: The verse speaks of an ongoing written record of the sinners' deeds
    before judgment.
  alternative_readings:
  - A merely metaphorical statement that God knows their sins
  - A human legal record rather than a heavenly one
  rationale: The repeated writing verb and the Epistle's judgment setting favor a
    real apocalyptic record motif, without needing to over-specify the mechanics.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment formulas
    into generic prose.
