translation:
  text: And because you say, ‘We sinners are not sought out, and all our sins are
    not written down’—behold, all your sins are being written down every day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The transmitted wording in the quotation is awkward: the Ethiopic has a
      second-person pronoun near ''sinners,'' but the sense of the speech is most
      naturally the sinners'' own claim, hence ''we sinners.'''
    reason: textual_variant
  - marker: b
    text: The verb rendered 'sought out' can also mean 'investigated' or 'searched
      for,' with a judicial sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  chosen: because
  alternatives:
  - for
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the reason for the following declaration; 'because' fits the
    argumentative flow.
- source_word: ትብሉ
  chosen: you say
  alternatives:
  - you are saying
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple present best reflects the direct address to the sinners.
- source_word: አንትሙ ኃጥኣን
  chosen: we sinners
  alternatives:
  - you sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The quoted speech appears to voice the sinners' own claim, so the sense
    is first person within the quotation despite the transmitted form showing second-person
    pronoun before 'sinners.' This likely reflects either a textual irregularity or
    quoted self-reference preserved awkwardly in the witness.
- source_word: ኢትኅሥሡ
  chosen: are not sought out
  alternatives:
  - are not investigated
  - are not searched for
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the judicial nuance of being searched out or investigated, fitting
    the context of divine record and judgment.
- source_word: ይጽሐፉ
  chosen: are written down
  alternatives:
  - are recorded
  - are inscribed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated verb points to heavenly recording of deeds; 'written down'
    is clear and preserves the bookkeeping/judicial image.
- source_word: ሀለዉ
  chosen: behold
  alternatives:
  - indeed
  - surely
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used as an emphatic marker introducing the corrective declaration; 'behold'
    preserves apocalyptic force better than a flatter adverb.
- source_word: በኵሉ ዕለት
  chosen: every day
  alternatives:
  - on every day
  - day by day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Natural English rendering of the distributive phrase while preserving
    the ongoing, comprehensive record of sin.
