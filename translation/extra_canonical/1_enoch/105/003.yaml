translation:
  text: And cry out on your behalf, and he will make it known to you; for all your
    affliction will be sought out from among the angels and from all those who oppressed
    those who led you astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'he will make it known to you' reflects a difficult stretch of
      the Ge'ez text; 'he will show/reveal it to you' is also possible.
    reason: lexical_alternative
  - marker: b
    text: The final phrase is syntactically uncertain. It may also be understood as
      'from all who oppressed and led you astray' or 'from all those who oppressed
      you and misled you.'
    reason: alternative_reading
lexical_decisions:
- source_word: ወጽራኅ
  chosen: and cry out
  alternatives:
  - and call out
  - and proclaim
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative/jussive force from the root for crying out aloud; preserved
    as vivid apocalyptic speech rather than softened to 'pray' or 'speak'.
- source_word: ዚአክሙ
  chosen: on your behalf
  alternatives:
  - for you
  - concerning you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronominal form points to the addressees; 'on your behalf' best fits
    the intercessory or representative sense in context.
- source_word: ኵነኒ
  chosen: he will make it known
  alternatives:
  - he will show
  - he will reveal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Taken with the following verb of showing/revealing as a disclosure formula.
    Because the OCR is difficult here, the English keeps a general revelatory sense
    without overcommitting to a narrower nuance.
- source_word: ወያስተርኢ
  chosen: and he will make it known
  alternatives:
  - and he will show
  - and he will reveal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Causative of seeing/showing; rendered with disclosure language suitable
    to apocalyptic revelation.
- source_word: እስመ
  chosen: for
  alternatives:
  - because
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the ground or explanation for the preceding assurance.
- source_word: መላእክት
  chosen: angels
  alternatives:
  - messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In 1 Enoch the term normally refers to heavenly beings, and the apocalyptic
    setting favors 'angels' over the more generic 'messengers'.
- source_word: ይትኃሠሥ
  chosen: will be sought out
  alternatives:
  - will be investigated
  - will be inquired into
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/reflexive sense of searching or investigating. 'Sought out' preserves
    the judicial-apocalyptic tone of heavenly inquiry.
- source_word: ኵሉ ምንዳቤክሙ
  chosen: all your affliction
  alternatives:
  - all your trouble
  - all your oppression
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes suffering, hardship, or oppression. 'Affliction' keeps
    the gravity and broad scope without narrowing it to only external persecution.
- source_word: እለ አርደእዎሙ
  chosen: those who oppressed
  alternatives:
  - those who harmed
  - those who afflicted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered as active mistreatment in keeping with the context of the righteous
    suffering under hostile powers.
- source_word: ለእለ የሀይዱክሙ
  chosen: those who led you astray
  alternatives:
  - those who misled you
  - those who caused you to wander
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests causing to go astray or wander. This is retained rather
    than generalized to 'deceived' so the moral-spiritual directionality remains visible.
