theological_decisions:
- issue: Whether መላእክት should be read as heavenly angels or generic messengers
  chosen_reading: heavenly angels
  alternative_readings:
  - messengers
  rationale: Within 1 Enoch, especially in judgment and revelation contexts, the default
    sense is heavenly beings. Using 'angels' preserves the book's cosmological framework
    rather than flattening it into ordinary human communication.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    apocalyptic imagery.
- issue: How to construe the final clause involving oppressors and those who led the
    audience astray
  chosen_reading: 'a difficult but literal sequence: ''from all those who oppressed
    those who led you astray'''
  alternative_readings:
  - '''from all who oppressed and led you astray'''
  - '''from all those who oppressed you and misled you'''
  rationale: The Ge'ez sequence is syntactically difficult. Rather than smoothing
    it into a more familiar persecution formula, the main text preserves the awkward
    relation transparently, with a footnote noting the alternative construals.
  doctrine_reference: Preserve theological tension rather than resolve it; when uncertain,
    prefer transparent English plus a footnote.
