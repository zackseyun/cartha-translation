translation:
  text: And when all my words are written down truthfully in their languages, and
    they neither alter nor omit anything from my words, but write down everything
    truthfully—all that was written before—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in/upon their tongues'; here rendered 'in their languages' because
      the context concerns writing Enoch's words for different linguistic communities.
    reason: lexical_alternative
  - marker: b
    text: The closing phrase is compressed in the Ethiopic and may also be understood
      as 'all the former things' rather than explicitly 'all that was written before.'
    reason: alternative_reading
lexical_decisions:
- source_word: ወሶበሰ፡
  chosen: And when
  alternatives:
  - and then
  - and it shall be when
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a temporal clause. 'And when' preserves the connective and
    the forward-looking sense without over-formal stiffness.
- source_word: ኵሎ፡ ነገራተ፡
  chosen: all my words
  alternatives:
  - all the matters
  - all the things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though ነገር can mean 'matter/thing/word,' the following phrase 'from my
    words' confirms a verbal/written sense in this context. 'Words' best fits the
    literary setting.
- source_word: ይጽሐፉ፡
  chosen: are written down
  alternatives:
  - are written
  - shall be written
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/jussive-like written sense. 'Are written down' sounds natural
    in English while preserving the documentary emphasis.
- source_word: በርትዕ፡
  chosen: truthfully
  alternatives:
  - correctly
  - accurately
  - uprightly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term carries the sense of rectitude/correctness. 'Truthfully' preserves
    both moral and textual fidelity, fitting the concern that the words not be distorted.
- source_word: ዲበ፡ ልሳናቲሆሙ፡
  chosen: in their languages
  alternatives:
  - upon their tongues
  - in their tongues
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'upon/in their tongues,' but in translation context this idiom
    naturally means 'in their languages.' This preserves the multilingual transmission
    idea without awkward literalism.
- source_word: ወኢይዌልጡ፡
  chosen: they neither alter
  alternatives:
  - they do not change
  - they do not pervert
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests changing or distorting. 'Alter' is concise and fits
    the paired prohibition against omission.
- source_word: ወኢየሐጽጹ፡
  chosen: nor omit anything
  alternatives:
  - nor take away
  - nor subtract
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is removal or subtraction from the text. 'Omit anything' communicates
    the practical scribal effect in idiomatic English.
- source_word: እምነገራቲየ፡
  chosen: from my words
  alternatives:
  - from my matters
  - from what I have said
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The first-person suffix is explicit. 'From my words' keeps the repetition
    and the authority of Enoch's speech.
- source_word: አላ፡
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks contrast between corrupt transmission and faithful copying.
- source_word: ኵሎ፡ በርትዕ፡ ይጽሐፉ፡
  chosen: write down everything truthfully
  alternatives:
  - write everything correctly
  - record all things accurately
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repetition should be preserved. The phrase restates the demand for faithful
    transcription.
- source_word: ኵሎ፡ ዘቀዳሚ፡
  chosen: all that was written before
  alternatives:
  - everything former
  - all that came earlier
  - all the earlier things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is somewhat compressed. 'All that was written before' best
    fits the scribal context and the preceding repeated verb 'write,' though the underlying
    expression may also mean 'all the former things.'
