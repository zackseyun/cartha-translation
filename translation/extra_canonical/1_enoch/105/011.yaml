theological_decisions:
- issue: Nature of textual fidelity in Enoch's instruction
  chosen_reading: The verse speaks of faithful transmission of Enoch's words into
    multiple languages without alteration or omission.
  alternative_readings:
  - A more general moral truthfulness rather than textual accuracy
  - A command about oral proclamation 'on their tongues' rather than written translation
  rationale: The repeated writing verbs, the prohibition against altering/omitting,
    and the phrase about 'their languages/tongues' together point to accurate textual
    transmission rather than merely ethical speech.
  doctrine_reference: 'Translation philosophy §§1, 3, 4: original-language primacy,
    preserve ambiguity where real, consistency of key terms.'
