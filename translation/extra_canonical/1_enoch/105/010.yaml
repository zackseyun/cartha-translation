  from: for the word of righteousness will be neglected, and many sinners will turn aside
  to: that many sinners will alter the word of righteousness and turn aside
  rationale: 'The verb ይመይጡ (from መየጠ) is active, not passive, and means ''they will alter'' or ''pervert'' (matching the warning in the previous verse not to ''alter'' the word). The subject is ''many sinners'' (ብዙኃን ኃጥኣን) and the object is ''the word of righteousness'' (ነገረ ርትዕ). The draft incorrectly renders it as a passive (''will be neglected'') and separates it from its subject. Additionally, after ''I know this mystery'', እስመ (esma) functions better as the complementizer ''that'' rather than ''for''. | Adjudicator: The reviewer is entirely correct regarding the Ge''ez syntax. The verb ይመይጡ (from መየጠ) is a third-person plural active imperfect (''they will alter/pervert''), and its direct object is the accusative con'
