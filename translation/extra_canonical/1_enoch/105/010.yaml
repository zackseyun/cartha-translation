theological_decisions:
- issue: Whether the verse predicts suppression of true teaching or merely its decline
  chosen_reading: The line is rendered as the righteous message being neglected rather than destroyed.
  alternative_readings:
  - the word of righteousness will perish
  - the righteous matter will be changed
  rationale: The Ge'ez form is textually difficult, but the broader verse contrasts true revelation with sinful speech and false writings. 'Neglected' preserves the warning without claiming more certainty than the witness allows.
  doctrine_reference: Preserve theological tension rather than resolve it; prefer transparent English where the source is uncertain.
- issue: Whether the final clause condemns book-writing itself
  chosen_reading: The condemnation falls on books written in service of sinners' own false words, not on writing books as such.
  alternative_readings:
  - a blanket denunciation of extra writings
  - a neutral prediction of literary activity
  rationale: The syntax ties the books to prior lying and evil speech. Rendering the reflexive phrase explicitly avoids implying that writing per se is evil.
  doctrine_reference: Original-language primacy over translation tradition; do not flatten local context into later polemics.
