translation:
  text: 'And now I know this mystery: that many sinners will alter the word of righteousness and turn aside and speak evil words and lie, and they will make great fabrications, and they will write books concerning their own words.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb rendered 'will be neglected' is uncertain in the Ethiopic OCR; the sense appears to be that the righteous message loses standing or is set aside.
    reason: textual_variant
  - marker: b
    text: The verb rendered 'will turn aside' may reflect a difficult or corrupt reading; alternatives such as 'go astray' are possible.
    reason: alternative_reading
  - marker: c
    text: Or 'they will devise great inventions/compositions.' The Ethiopic expression can denote things formed or produced; here the context of lying favors 'fabrications.'
    reason: lexical_alternative
  - marker: d
    text: Or 'for the word of righteousness will be neglected, and many sinners will turn aside'.
    reason: previous_rendering
lexical_decisions:
- source_word: አአምር
  chosen: I know
  alternatives:
  - I have come to know
  - I understand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes knowing/understanding. Simple present 'I know' fits the prophetic declaration introduced by 'and now' without overcomplicating aspect.
- source_word: ምሥጢር
  chosen: mystery
  alternatives:
  - secret
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic context, 'mystery' preserves revealed hidden knowledge better than the flatter 'secret'.
- source_word: ነገረ ርትዕ
  chosen: the word of righteousness
  alternatives:
  - the matter of righteousness
  - the true word
  - the righteous word
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነገር can mean word, matter, or message; paired with ርትዕ it likely denotes righteous/truthful teaching. 'Word of righteousness' preserves the compact apocalyptic diction and leaves the genitive relation transparent.
- source_word: ይመይጡ
  chosen: will be neglected
  alternatives:
  - will be diminished
  - will be rejected
  - will fail
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult in OCR, but the sense in context is that righteous speech loses standing or is set aside. 'Will be neglected' captures that without overstating total abolition.
- source_word: የዐልዉ
  chosen: will turn aside
  alternatives:
  - will go astray
  - will deviate
  - will exalt themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The reading is uncertain because of OCR and possible textual variation. In sequence with sinners speaking lies and producing false writings, 'turn aside' best fits moral deviation.
- source_word: ነገራተ እኩያተ
  chosen: evil words
  alternatives:
  - wicked things
  - evil matters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural phrase can denote words or matters; because it is followed by 'lie' and 'write books,' verbal content is foregrounded, so 'evil words' is preferable.
- source_word: ይሐስዉ
  chosen: lie
  alternatives:
  - speak falsely
  - deceive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct rendering keeps the accusation sharp and concise.
- source_word: ይፈጥሩ ፍጥረተ ዐቢየተ
  chosen: they will make great fabrications
  alternatives:
  - they will devise great inventions
  - they will create great things
  - they will produce great compositions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the root can mean create/form, in this polemical context about sinners, lies, and books, the sense is likely contrived productions rather than neutral creation. 'Fabrications' preserves the negative force.
- source_word: መጻሕፍተ ይጽሐፉ ዲበ ነገራቲሆሙ
  chosen: they will write books concerning their own words
  alternatives:
  - they will write books about their matters
  - they will write books on their own teachings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to written works based on or promoting what they themselves say. 'Concerning their own words' keeps the wording close while making the reflexive sense explicit.
