  from: 'I show you: for'
  to: I show you that
  rationale: 'After a verb of showing or declaring (አርእየክሙ), the conjunction እስመ (esma) functions as a complementizer (''that'') introducing the object clause, rather than a causal conjunction (''for''). The colon and ''for'' disrupt the syntactic connection between the verb and what is being shown. | Adjudicator: In Ge''ez, the conjunction እስመ (esma) frequently functions as a declarative complementizer (equivalent to Greek ὅτι, ''that'') when following verbs of perception, cognition, or declaration, such as አርእየክ'
