translation:
  text: And now, I show you that light and darkness, day and night, see all your sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The line portrays light and darkness, day and night, as witnesses that see every sin. It may also imply 'openly and secretly, at all times.'
    reason: cultural_note
  - marker: b
    text: 'Or ''I show you: for''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ወይ እዜኒ
  chosen: And now
  alternatives:
  - And at this time
  - And behold, now
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal/discourse marker introducing the present declaration. 'And now' is natural English while preserving the transition.
- source_word: አነ አርእየክሙ
  chosen: I show you
  alternatives:
  - I make known to you
  - I reveal to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb built on 'see/show' can mean to cause to see or to show. 'I show you' keeps the visual-apocalyptic force better than the more abstract 'make known.'
- source_word: እስመ
  chosen: for
  alternatives:
  - because
  - that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the grounds for the declaration. 'For' preserves the explanatory connection in elevated but readable English.
- source_word: ብርሃን
  chosen: light
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward rendering; paired antithetically with 'darkness' in cosmic-witness imagery.
- source_word: ወጽልመት
  chosen: and darkness
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct counterpart to 'light'; preserves the merism.
- source_word: ዕለት ወሌሊት
  chosen: day and night
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A second merism reinforcing totality and unceasing witness.
- source_word: ይሬእዩ
  chosen: see
  alternatives:
  - look upon
  - observe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Simple present best fits the gnomic force: these cosmic realities continually see or witness.'
- source_word: ኵሎ ኃጢአትክሙ
  chosen: all your sins
  alternatives:
  - your every sin
  - all your wrongdoing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the plural concrete sense of offenses rather than abstract 'sinfulness.' 'All your sins' also matches the totalizing force of ኵሎ.
