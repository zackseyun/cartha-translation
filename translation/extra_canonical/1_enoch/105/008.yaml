theological_decisions:
- issue: Whether cosmic elements are merely temporal markers or active witnesses to human wrongdoing
  chosen_reading: The verse presents light/darkness and day/night as seeing all the hearers' sins.
  alternative_readings:
  - The phrase only means sins committed openly and secretly, by day and by night
  - The speaker is saying he himself has seen their sins in every circumstance
  rationale: The Ge'ez subject of 'see' is most naturally the paired nouns 'light and darkness, day and night.' In apocalyptic rhetoric, creation can function as witness; preserving that imagery is preferable to flattening it into an idiom.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic witness into generic prose.
