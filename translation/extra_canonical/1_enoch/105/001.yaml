theological_decisions:
- issue: Whether the repeated phrase should be rendered as 'glory' or 'praise'
  chosen_reading: glory
  alternative_readings:
  - praise
  - splendor
  rationale: The verse speaks of names being written before this reality, which suggests
    a heavenly presence or majesty rather than an act of praise. 'Glory' best fits
    the apocalyptic setting and avoids flattening the line into liturgical language.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten into generic religious
    prose.
