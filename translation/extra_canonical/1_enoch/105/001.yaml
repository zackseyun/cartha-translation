translation:
  text: His glory is great, and your names shall be written before the glory of the
    Great One.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez repeats 'his glory ... before the glory of the Great One.' The
      repetition is retained because it appears deliberate and heightens the solemnity
      of the promise.
    reason: lexical_alternative
lexical_decisions:
- source_word: ስብሐቲሁ
  chosen: his glory
  alternatives:
  - his praise
  - his splendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes glory, praise, or splendor. In this verse it
    frames the sentence twice and functions as the sphere or presence before which
    the names are written. 'Glory' best preserves the elevated apocalyptic sense without
    reducing it to mere spoken praise.
- source_word: ለዐቢይ
  chosen: of the Great One
  alternatives:
  - of the Great
  - for the Great One
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective/noun means 'great' and here, with the prefixed particle,
    functions substantivally as a divine title. 'The Great One' preserves the reverential
    force better than the bare adjective 'the Great.'
- source_word: ወእስማቲከሙ
  chosen: and your names
  alternatives:
  - and your name
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is plural with second person plural suffix. The plural should
    be retained because the address is to a group.
- source_word: ይጸሐፍ
  chosen: shall be written
  alternatives:
  - is written
  - will be inscribed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means 'to write.' Given the epistolary-promissory context, an
    English future best conveys the assurance. 'Written' is preferred over 'inscribed'
    as the more neutral rendering.
- source_word: በቅድመ
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition denotes being before or in the presence of. 'Before'
    is concise and preserves the solemn register; the fuller idiom can be noted as
    an alternative nuance.
