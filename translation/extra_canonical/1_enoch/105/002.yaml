translation:
  text: Hope, for formerly you were put to shame by evil and by affliction; but now you will shine like the light of heaven, you will shine and be seen, and the portals of heaven will be opened for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by wickedness and by suffering.' The Ge'ez compactly links shame with both evil and distress, without specifying whether evil is personal, social, or circumstantial.
    reason: lexical_alternative
  - marker: b
    text: The image 'the windows of heaven' is a cosmic expression for heaven opened toward the righteous; the text does not specify exactly what comes through that opening.
    reason: cultural_note
  - marker: c
    text: Or 'the windows of heaven'.
    reason: previous_rendering
lexical_decisions:
- source_word: ተስፈዉ
  chosen: Hope
  alternatives:
  - Take hope
  - Be hopeful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative/plural exhortation. 'Hope' keeps the direct, elevated force of the address without adding explanatory wording.
- source_word: ቀዳሚ
  chosen: formerly
  alternatives:
  - before
  - at first
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal adverb contrasting past suffering with future vindication.
- source_word: ኃሠርክሙ
  chosen: you were put to shame
  alternatives:
  - you were shamed
  - you were disgraced
  - you were humiliated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive sense fits the context of the righteous suffering. 'Put to shame' preserves both social disgrace and moral reversal language better than the flatter 'humiliated'.
- source_word: በእኩይ
  chosen: by evil
  alternatives:
  - through evil
  - because of evil
  - by wickedness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition plus noun can indicate agency or circumstance. 'By evil' preserves the compact apocalyptic contrast without over-specifying whether evil means evil people or evil conditions.
- source_word: በምራኅ
  chosen: by affliction
  alternatives:
  - by suffering
  - by oppression
  - by misery
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term appears to denote distress or hardship. 'Affliction' suits the elevated register and pairs well with the previous phrase.
- source_word: ትበርሁ
  chosen: you will shine
  alternatives:
  - you will give light
  - you will be radiant
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repeated verb should remain repeated in English. 'Shine' is vivid, simple, and preserves the apocalyptic imagery.
- source_word: ብርሃነ ሰማይ
  chosen: the light of heaven
  alternatives:
  - heavenly light
  - the brightness of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A genitival expression best rendered straightforwardly. 'The light of heaven' preserves the cosmic imagery more concretely than 'heavenly light'.
- source_word: ትትረአዩ
  chosen: be seen
  alternatives:
  - appear
  - be visible
  - be revealed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Likely passive/reflexive sense. ''Be seen'' fits the sequence: shine, shine, and be seen.'
- source_word: ኆኅተ ሰማይ
  chosen: the windows of heaven
  alternatives:
  - the gates of heaven
  - the openings of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Traditional cosmic idiom known from biblical and apocalyptic usage. 'Windows' is the most natural rendering for this imagery and should not be flattened.
- source_word: ይትረኀዉ ለክሙ
  chosen: will be opened for you
  alternatives:
  - will open for you
  - will be unlocked for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive rendering matches the likely form and keeps the focus on divine/cosmic access granted to the addressees.
