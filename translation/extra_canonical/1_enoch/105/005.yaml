theological_decisions:
- issue: Force of the opening rhetorical question
  chosen_reading: 'A question of remaining recourse: ''What will you have to do?'''
  alternative_readings:
  - '''What are you to do?'''
  - '''What have you to do?'''
  rationale: The Ge'ez existential plus verb of doing is terse. The chosen wording
    preserves the rhetorical threat without over-paraphrasing into an interpretive
    expansion.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English.
- issue: Meaning of 'you will not be found as sinners'
  chosen_reading: Retained as written, despite contextual awkwardness
  alternative_readings:
  - '''you will be found to be sinners'''
  - '''you will not be found other than sinners'''
  rationale: The transmitted Ge'ez is difficult, and the negative before 'be found'
    creates tension with the surrounding judgment threat. Rather than silently emend,
    the main text stays close to the witness and a footnote flags the difficulty.
  doctrine_reference: Original-language primacy; when uncertain, prefer transparent
    English plus footnote over false confidence.
