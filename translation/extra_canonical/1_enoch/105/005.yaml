translation:
  text: What will you have to do? You will not be hidden on the day of the great judgment,
    and you will not be found as sinners; and everlasting judgment will be upon you
    for all the generations of the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'you will not be found as sinners' is textually and syntactically
      difficult in context. Some interpreters understand the sense more adversatively,
      such as 'you will be found to be sinners' or similar, but the Ethiopic witness
      here is rendered conservatively.
    reason: textual_variant
  - marker: b
    text: Literally, the phrase behind 'will be upon you' may be read more woodenly
      as 'will be from you.' In context, the sense appears to be that everlasting
      judgment comes upon or against the addressees.
    reason: lexical_alternative
lexical_decisions:
- source_word: ምንተ
  chosen: What
  alternatives:
  - Why
  - What thing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Interrogative opening; here it introduces a rhetorical question about
    what action or recourse remains.
- source_word: ሀለወክሙ
  chosen: will you have
  alternatives:
  - is there for you
  - belongs to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The existential/copular form with pronominal suffix can mean 'there is
    for you' or 'you have.' In idiomatic English within a rhetorical question, 'will
    you have' best carries the force of available recourse.
- source_word: ትግበሩ
  chosen: to do
  alternatives:
  - do
  - make
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common verb of doing/making. With the preceding interrogative-existential
    construction, English infinitival phrasing is the clearest equivalent.
- source_word: አኮ
  chosen: not
  alternatives:
  - is it not
  - surely not
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative particle introducing the following denial; rendered simply as
    'not' in smooth English.
- source_word: ትትኀብኡ
  chosen: you will be hidden
  alternatives:
  - you will hide yourselves
  - you will be concealed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form naturally allows a passive/reflexive sense. 'Be hidden' preserves
    the judgment setting without overcommitting to reflexive agency.
- source_word: በዕለተ ኵነኔ ዐቢይ
  chosen: on the day of the great judgment
  alternatives:
  - in the day of the great judgment
  - on the day of great judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A fixed apocalyptic time formula. 'The great judgment' preserves the
    solemn, eschatological force.
- source_word: ወኢትትረከቡ
  chosen: and you will not be found
  alternatives:
  - and you will not be discovered
  - and you will not be reckoned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means 'be found' or 'be encountered.' 'Be found' fits
    both literal and judicial nuance.
- source_word: ከመ ኃጥኣን
  chosen: as sinners
  alternatives:
  - like sinners
  - to be sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Comparative particle plus noun. 'As sinners' is the most direct rendering
    in this judicial context.
- source_word: ኵነኔ እንተ ለዓለም
  chosen: everlasting judgment
  alternatives:
  - judgment which is forever
  - eternal condemnation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'judgment which is for eternity/forever.' 'Everlasting judgment'
    preserves the duration without importing later doctrinal terminology like 'condemnation'
    unless required.
- source_word: ትከዉን እምኔክሙ
  chosen: will be upon you
  alternatives:
  - will come from you
  - will be from you
  - will be against you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can be difficult here. In context of punitive judgment,
    'upon you' best conveys adverse application, while a footnote notes the literal
    ambiguity.
- source_word: ለእሉ ትዉልደ ዓለም
  chosen: for all the generations of the world
  alternatives:
  - for the generations of eternity
  - throughout the generations of the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is somewhat idiomatic and may denote enduring duration across
    world-generations. 'For all the generations of the world' keeps the temporal-cosmic
    scope visible.
