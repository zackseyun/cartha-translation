translation:
  text: And now, righteous ones, do not fear when you see sinners growing strong and prospering in their ways. Do not become their companions, but keep far from their violence; for you shall be companions of the good ones of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heavenly host.' The closing phrase may refer to the company of heaven in general, not only to angels as a narrowly defined class.
    reason: lexical_alternative
  - marker: b
    text: Or 'the host of heaven'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኢትፍርሁ
  chosen: do not fear
  alternatives:
  - do not be afraid
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative imperative addressed to the righteous; 'do not fear' preserves the direct admonitory tone.
- source_word: ጻድቃን
  chosen: righteous ones
  alternatives:
  - the righteous
  - just ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A key ethical/apocalyptic group label in Enochic literature. 'Righteous ones' keeps the nominal force and avoids flattening it into a mere adjective.
- source_word: ትሬእይዎሙ
  chosen: you see
  alternatives:
  - you look upon
  - you behold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple visual verb in a conditional-temporal clause; 'see' is clear and natural.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - the sinful
  - wrongdoers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard moral designation opposite the righteous in this context; 'sinners' preserves the established apocalyptic contrast.
- source_word: ይጸንዑ
  chosen: growing strong
  alternatives:
  - becoming firm
  - prevailing
  - being established
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys strength or firmness. In context it describes the apparent success of sinners, so 'growing strong' captures the process without overinterpreting.
- source_word: ይደልዉ
  chosen: prospering
  alternatives:
  - succeeding
  - faring well
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Context suggests favorable progress or success alongside 'growing strong.' 'Prospering' communicates visible success in life-paths.
- source_word: ፍኖቶሙ
  chosen: their ways
  alternatives:
  - their paths
  - their course
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common metaphor for conduct or manner of life. 'Ways' is idiomatic and preserves the moral-path imagery.
- source_word: ሱቱፋነ
  chosen: companions
  alternatives:
  - partners
  - sharers
  - associates
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun appears twice in the verse, first negatively with sinners and then positively with the heavenly host. 'Companions' preserves the relational parallel in both uses.
- source_word: ርሐቁ
  chosen: keep far
  alternatives:
  - be far removed
  - withdraw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative of separation. 'Keep far' is concise and preserves the force of deliberate distance.
- source_word: ግፍዐ
  chosen: violence
  alternatives:
  - oppression
  - wrongdoing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can denote violent injustice or oppression. 'Violence' best fits the stark ethical warning and avoids softening the evil in view.
- source_word: ኄራነ ሰማይ
  chosen: the host of heaven
  alternatives:
  - the army of heaven
  - the heavenly host
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Apocalyptic expression for the heavenly company. 'Host of heaven' preserves the elevated register and cosmic imagery without importing later fixed liturgical phrasing too strongly.
