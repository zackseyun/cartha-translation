theological_decisions:
- issue: Identity of the heavenly group in the closing promise
  chosen_reading: the host of heaven refers broadly to the heavenly company rather than specifying angels alone
  alternative_readings:
  - the angels of heaven
  - the army of heaven
  rationale: The Ge'ez phrase is collective and cosmic. Rendering it broadly preserves the imagery and avoids narrowing the referent beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; keep apocalyptic imagery intact.
