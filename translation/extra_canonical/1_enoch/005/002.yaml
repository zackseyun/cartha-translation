translation:
  text: And his works are before him for every year that shall be, and all his works
    serve him and do not change; but as God has ordained, so everything is done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for each coming year.' The Ge'ez phrase points to the continuing course
      of the years ahead.
    reason: lexical_alternative
  - marker: b
    text: '''Serve him'' may also be understood as ''are ordered for him'' or ''are
      obedient to him,'' emphasizing creation''s conformity to God''s fixed ordinance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ምግባሩ
  chosen: his works
  alternatives:
  - his deeds
  - his doings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes deeds/works/actions. 'Works' preserves the repeated
    term in the verse and fits the cosmic-order context better than the more moralized
    'deeds'.
- source_word: ቅድሜሁ
  chosen: before him
  alternatives:
  - in his presence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward spatial-relational expression. 'Before him' preserves
    the elevated register and the image of all creation set openly in God's sight.
- source_word: ለለ ዓመት ዘይከውን
  chosen: for every year that shall be
  alternatives:
  - for each coming year
  - year by year to come
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the ongoing succession of years into the future.
    'That shall be' keeps the apocalyptic-forward sense without over-paraphrasing.
- source_word: ይትቀነይ ሎቱ
  chosen: serve him
  alternatives:
  - are ordered for him
  - are obedient to him
  - minister to him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb here conveys acting in conformity or service toward God. 'Serve
    him' best captures the personal and ordered relation of creation to God, while
    remaining idiomatic.
- source_word: ኢይትመየጥ
  chosen: do not change
  alternatives:
  - are not altered
  - do not deviate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is stability and non-variation in the created order. 'Do not
    change' is clear modern English and preserves the contrast with divine ordinance.
- source_word: ሠርዐ አምላክ
  chosen: God has ordained
  alternatives:
  - God has appointed
  - God has established
  - God has commanded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests ordering, appointing, or laying down an ordinance.
    'Ordained' fits the context of fixed cosmic order better than the narrower 'commanded'.
- source_word: ይትገበር ኵሉ
  chosen: everything is done
  alternatives:
  - all things are made
  - everything comes to pass
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A broad passive expression summarizing the execution of God's ordering.
    'Everything is done' is faithful and avoids importing stronger providential language
    not explicit in the Ge'ez.
