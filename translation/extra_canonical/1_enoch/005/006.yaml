translation:
  text: In those days your names will be given over to an everlasting curse for all
    the righteous, and by you the sinners will swear curses; and for you there will
    be a joining together with the sinners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The line likely means that their names will become a formula used when pronouncing
      curses—an image of public disgrace and judgment.
    reason: lexical_alternative
  - marker: b
    text: The final clause can also be understood as 'you will be counted with the
      sinners' or 'you will have fellowship with the sinners.'
    reason: alternative_reading
lexical_decisions:
- source_word: በውእቱ መዋዕል
  chosen: In those days
  alternatives:
  - At that time
  - In that age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal apocalyptic formula. 'In those days' preserves the
    elevated prophetic register and the plural sense of መዋዕል.
- source_word: ትሁቡ
  chosen: will be given over
  alternatives:
  - will be given
  - will be handed over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/future sense fits the judgment context. 'Given over' preserves
    the force of being consigned to a fate, stronger than a bare 'given'.
- source_word: ስመ ዚአክሙ
  chosen: your names
  alternatives:
  - the name of you
  - your reputation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural 'your names' is the plain sense and suits the idiom of one's
    name becoming a byword or formula of cursing.
- source_word: በርገመት ዘለዓለም
  chosen: to an everlasting curse
  alternatives:
  - for an eternal curse
  - into everlasting cursing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This expresses the result or destiny attached to the names. 'Everlasting
    curse' is concise and preserves the judicial-apocalyptic weight.
- source_word: ለኵሉ ጻድቃን
  chosen: for all the righteous
  alternatives:
  - among all the righteous
  - to all the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase likely indicates the sphere or beneficiaries of the curse-formula
    usage. 'For all the righteous' keeps the Ge'ez preposition transparent while remaining
    readable.
- source_word: ወኪያክሙ ይረግሙ ኃጥኣን
  chosen: and by you the sinners will swear curses
  alternatives:
  - and because of you sinners will curse
  - and sinners will curse by you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction suggests the wicked become a formula or object invoked
    in cursing. 'Swear curses' brings out the idiomatic force better than a flat 'curse,'
    while retaining the Ge'ez imagery of invoking a name.
- source_word: ተኅቡረ ምስለ ኃጥኣን
  chosen: a joining together with the sinners
  alternatives:
  - association with the sinners
  - companionship with sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun conveys being joined or associated. 'Joining together' preserves
    the concrete sense of being grouped with the wicked in judgment, rather than merely
    social companionship.
