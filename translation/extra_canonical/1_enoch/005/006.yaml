theological_decisions:
- issue: Meaning of the curse formula involving the wicked person's name
  chosen_reading: The verse means the condemned will become a stock example invoked
    in cursing, especially in contrast with the righteous.
  alternative_readings:
  - The righteous themselves pronounce the curse directly on them
  - The sinners curse them in a more general sense without formulaic invocation
  rationale: The wording about 'your names' and the verb of cursing points to names
    functioning as curse-formulas or bywords. This preserves the apocalyptic shame/judgment
    motif without over-paraphrasing.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity rather than flatten it.
- issue: Final clause about relation to sinners
  chosen_reading: The clause announces that the addressed group will be joined with
    the sinners in fate or company.
  alternative_readings:
  - 'A more active sense: you will join yourselves to sinners'
  - 'A legal sense: you will be counted among sinners'
  rationale: The nominal expression with 'with the sinners' most naturally indicates
    association or grouping. In this judgment context, that likely implies shared
    destiny, but the English keeps the wording broad enough to preserve the source
    ambiguity.
  doctrine_reference: Optimal equivalence with transparent ambiguity where the source
    is uncertain.
