translation:
  text: And they shall not again commit sin, and they shall not be condemned all the
    days of their life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will no longer sin.' The Ge'ez wording includes the sense of repetition/continuance
      ('again').
    reason: lexical_alternative
  - marker: b
    text: Or 'all the days of their lives.' The source uses a singular 'life' in an
      idiomatic expression with plural possessors.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኢይደግሙ
  chosen: they shall not again
  alternatives:
  - they will no longer
  - they shall not repeat
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative imperfect/plural with the sense of repetition or continuation.
    'Again' preserves the iterative force more transparently than the smoother 'no
    longer.'
- source_word: አብሶ
  chosen: commit sin
  alternatives:
  - sin
  - do wrong
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is commonly used for sin/offense. 'Commit sin' makes explicit
    the verbal force in idiomatic English without flattening it to generic wrongdoing.
- source_word: ኢይትኴነኑ
  chosen: they shall not be condemned
  alternatives:
  - they shall not be judged guilty
  - they shall not be punished
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/judicial sense fits the context of blessing and judgment in this
    section. 'Condemned' preserves the forensic force better than the broader 'punished.'
- source_word: ኵሎ መዋዕለ ሕይወቶሙ
  chosen: all the days of their life
  alternatives:
  - all the days of their lives
  - throughout their lifetime
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard Semitic-style temporal expression. Singular 'life' after a
    plural possessive is retained as a close rendering of the idiom, though English
    also permits 'lives.'
