theological_decisions:
- issue: Whether the line promises moral transformation or merely cessation of punishment-worthy
    acts
  chosen_reading: The verse is rendered as a promise that they will not again commit
    sin, followed by the judicial result that they will not be condemned.
  alternative_readings:
  - The first clause could be softened to 'they will do wrong no more'
  - The second clause could be taken more consequentially as 'they will not be punished'
  rationale: The paired clauses in Ge'ez distinguish conduct ('commit sin') from verdict
    ('be condemned'). Preserving both keeps the text's ethical and judicial tension
    without collapsing one into the other.
  doctrine_reference: Preserve theological tension rather than resolve it.
