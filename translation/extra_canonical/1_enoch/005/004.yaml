theological_decisions:
- issue: Whether the closing denial of peace should be rendered as inward tranquility or covenantal/judicial well-being
  chosen_reading: you will have no peace
  alternative_readings:
  - you will have no well-being
  - there will be no peace for you
  rationale: In apocalyptic judgment speech, 'peace' carries broader connotations than inner calm, including wholeness and favorable standing. Retaining 'peace' preserves the traditional biblical register and theological breadth without reduction.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
