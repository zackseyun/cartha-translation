translation:
  text: But you have not endured, and you have not done the command of the Lord; rather, you have transgressed and spoken slanderous, proud, and harsh words with your unclean mouths against his greatness. Hard of heart, you will have no peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'his greatness' may also be understood as 'his majesty.' The Ge'ez points to God's exalted status, and the exact nuance is difficult to fix more narrowly here.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is a judgment formula: ''peace'' here likely means more than inner calm, extending to well-being and favorable outcome.'
    reason: cultural_note
  - marker: c
    text: Or 'turned away'.
    reason: previous_rendering
  - marker: d
    text: Or 'spoken proud and harsh words'.
    reason: previous_rendering
lexical_decisions:
- source_word: አተዓገሥክሙ
  chosen: you have not endured
  alternatives:
  - you have not been patient
  - you have not persevered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb built on the Ge'ez root for enduring/bearing conveys steadfast endurance more than mere momentary patience. 'Endured' preserves the moral force of failing to remain steadfast.
- source_word: ትእዛዘ
  chosen: the command
  alternatives:
  - the commandment
  - the आदेश/ordinance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Singular 'command' matches the Ge'ez form and keeps the focus on obedience to the Lord's directive without importing later formulaic 'commandments' language.
- source_word: እግዚእ
  chosen: the Lord
  alternatives:
  - the master
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the divine title in this context; it preserves elevated register and aligns with project practice for covenantal/divine lordship language.
- source_word: ተዓደውክሙ
  chosen: you have turned away
  alternatives:
  - you have departed
  - you have transgressed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is apostasy/deviation rather than simple movement. 'Turned away' captures moral defection while remaining readable.
- source_word: ሐመይክሙ
  chosen: spoken
  alternatives:
  - uttered
  - said
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A general speech verb is sufficient here; the force comes from the objects 'proud and harsh words.'
- source_word: ዓበይተ
  chosen: proud
  alternatives:
  - great
  - arrogant
  - boastful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of hostile speech against God, the adjective carries the sense of haughty or overreaching speech. 'Proud' is concise and idiomatic.
- source_word: ድሩካተ
  chosen: harsh
  alternatives:
  - hard
  - insolent
  - violent
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word qualifies the speech as severe and offensive. 'Harsh' preserves that tone without over-specifying physical violence.
- source_word: ርኵሳት
  chosen: unclean
  alternatives:
  - defiled
  - impure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Unclean'' preserves the moral and cultic resonance of impurity in apocalyptic denunciation.'
- source_word: ዕበዩ ዚአሁ
  chosen: his greatness
  alternatives:
  - his majesty
  - his glory
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to God's exalted greatness. 'Greatness' is the most direct rendering from the Ge'ez and avoids importing more specific theological terms not explicit here.
- source_word: ይቡሳነ ልብ
  chosen: Hard of heart
  alternatives:
  - you who are stubborn of heart
  - with hardened heart
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This idiom denotes obstinacy and moral insensibility. 'Hard of heart' preserves the biblical texture and prophetic rebuke.
- source_word: ኢትከውኑክሙ ሰላም
  chosen: you will have no peace
  alternatives:
  - peace will not be yours
  - there will be no peace for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A judgment formula denying well-being. 'You will have no peace' is clear, forceful, and preserves the prophetic cadence.
