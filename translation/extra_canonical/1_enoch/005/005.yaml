translation:
  text: And because of this, you will curse your days, and you will destroy the years of your life; and the years of your destruction will increase in an eternal curse, and there will not be mercy for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'the years of your destruction will increase' is textually difficult. The underlying noun may also be understood as 'ruin' or 'perishing,' yielding 'the years of your ruin will increase.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and the years of your life will perish'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወበእንተዝ
  chosen: And because of this
  alternatives:
  - And for this reason
  - Therefore
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Causal connective introducing the consequence of the preceding indictment. 'Because of this' preserves the explicit causal force better than a more interpretive 'therefore.'
- source_word: መዋዕሊክሙ
  chosen: your days
  alternatives:
  - the days of you
  - your lifetime
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward plural noun with pronominal suffix. 'Your days' preserves the idiomatic apocalyptic/judgment register without flattening it to 'your lifetime.'
- source_word: ትረግሙ
  chosen: you will curse
  alternatives:
  - you shall curse
  - you will be cursed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Taken as active second person plural future/imperfect: the addressees themselves curse their days in lament under judgment. A passive rendering would require a different sense and weakens the rhetorical parallelism.'
- source_word: ዓመታት ሕይወትክሙ
  chosen: the years of your life
  alternatives:
  - your life-years
  - your years of life
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Genitival construction preserved naturally in English. This keeps the solemn cadence of the line.
- source_word: ትኃጕሉ
  chosen: will perish
  alternatives:
  - will be cut short
  - will vanish
  - will come to an end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys wasting away or coming to ruin. 'Will perish' fits the judgment context and avoids over-specifying whether the emphasis is brevity or destruction.
- source_word: ዓመታት ኀጕልክሙ
  chosen: the years of your destruction
  alternatives:
  - the years of your ruin
  - the years of your perishing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun appears cognate with the preceding verb and likely denotes ruin/destruction. 'Destruction' best preserves the grim judicial sense, though the exact nuance may overlap with 'ruin' or 'perishing.'
- source_word: ይበዝኅ
  chosen: will increase
  alternatives:
  - will be many
  - will multiply
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard verb of becoming many/increasing. 'Will increase' fits the future consequence formula and keeps the paradoxical image of prolonged cursed ruin.
- source_word: በርገመት ዘለዓለም
  chosen: in an eternal curse
  alternatives:
  - under an everlasting curse
  - with an eternal curse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered with 'eternal' to preserve the apocalyptic finality of the phrase. 'In an eternal curse' reflects the preposition while remaining idiomatic.
- source_word: ወኢይከውነክሙ ሣህል
  chosen: and there will not be mercy for you
  alternatives:
  - and mercy will not be yours
  - and no compassion will come to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'An existential negation: mercy will not exist for them. ''There will not be mercy for you'' preserves the stark finality better than a softer paraphrase.'
