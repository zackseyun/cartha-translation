theological_decisions:
- issue: Whether the verse describes self-cursing or being cursed by others
  chosen_reading: self-cursing in lament under judgment
  alternative_readings:
  - being cursed by others
  - a generalized curse falling upon them
  rationale: The Ge'ez verbal form is best read as active second person plural, and the line's rhetoric suits the condemned lamenting their own days as a consequence of divine judgment.
  doctrine_reference: Preserve theological tension rather than resolve it; render the local passage first.
- issue: Force of ዘለዓለም in the curse formula
  chosen_reading: eternal/everlasting curse
  alternative_readings:
  - age-long curse
  - perpetual curse
  rationale: In this apocalyptic judgment context, the phrase signals enduring finality. 'Eternal' is the clearest elevated modern English equivalent without importing later doctrinal formulas.
  doctrine_reference: Readable modern English without flattening theological weight.
