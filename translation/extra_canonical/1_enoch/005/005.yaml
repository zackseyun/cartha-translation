  from: and the years of your life will perish
  to: and you will destroy the years of your life
  rationale: 'The Ge''ez verb ትኃጕሉ (teḥagwelu) is a second-person masculine plural active form (''you will destroy'' or ''you will lose''), not a third-person form agreeing with ''years'' (which would be ይኃጕላ or ይትኃጐላ). The Greek witness (ἀπολεῖτε) confirms the second-person active sense. The draft incorrectly makes ''years'' the subject, losing the active culpability of the sinners. | Adjudicator: The reviewer is correct about the Ge''ez grammar. The verb ትኃጕሉ (teḥagwelu) is a second-person masculine plural active imperfect (''you will destroy'' or ''you will lose''), parallel to the preceding verb '
