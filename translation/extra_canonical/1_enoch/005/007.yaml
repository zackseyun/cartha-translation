translation:
  text: But for the chosen there shall be light and joy and peace, and they shall
    inherit the earth. But for you, the wicked, there shall be a curse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inherit the land.' The Ge'ez word for 'earth' can also mean 'land,'
      but the broader apocalyptic setting favors 'earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ሕሩያን
  chosen: the chosen
  alternatives:
  - the elect
  - the chosen ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural denotes those selected or chosen. 'The chosen' preserves the
    apocalyptic group designation without importing later doctrinal freight more strongly
    than necessary. 'Elect' is possible but sounds more tradition-bound in English.
- source_word: ብርሃን
  chosen: light
  alternatives:
  - brightness
  - radiance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic sense is 'light.' This fits the blessing formula and preserves
    the imagery without overinterpreting it as metaphor only.
- source_word: ፍሥሐ
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering in a blessing sequence. 'Joy' is readable
    and weighty without sounding archaic.
- source_word: ሰላም
  chosen: peace
  alternatives:
  - well-being
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term naturally carries the sense of peace/wholeness. 'Peace' is the
    most transparent default and suits the triad 'light and joy and peace.'
- source_word: ይወርስዋ ለምድር
  chosen: they shall inherit the earth
  alternatives:
  - they shall possess the earth
  - they shall inherit the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is an inheritance/possession term, and ምድር can mean earth or
    land. 'Inherit the earth' best preserves the broad apocalyptic scope of the promise
    in this context.
- source_word: ረሲዓን
  chosen: the wicked
  alternatives:
  - evildoers
  - sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard moral designation for those opposed to the righteous/chosen.
    'The wicked' preserves the judicial and apocalyptic contrast.
- source_word: ርገመት
  chosen: a curse
  alternatives:
  - cursing
  - accursedness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes curse or malediction. 'A curse' is the clearest idiomatic
    English in the judgment formula.
