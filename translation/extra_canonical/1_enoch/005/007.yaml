theological_decisions:
- issue: Scope of ምድር
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: Although ምድር can denote 'land,' the surrounding cosmic and judgment-oriented
    rhetoric in the Book of the Watchers favors the broader sense 'earth.' This also
    preserves the eschatological force without narrowing the promise to a local territory.
  doctrine_reference: Preserve apocalyptic imagery and avoid flattening cosmic scope.
- issue: Rendering of ሕሩያን
  chosen_reading: the chosen
  alternative_readings:
  - the elect
  - the chosen ones
  rationale: The term names a marked group within Enochic theology. 'The chosen' keeps
    the designation transparent and elevated while avoiding unnecessary dependence
    on later theological English conventions.
  doctrine_reference: Keep major terms locally grounded in the passage before harmonizing
    them across the corpus.
