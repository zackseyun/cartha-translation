theological_decisions:
- issue: Rendering of ሕሩያን
  chosen_reading: the chosen
  alternative_readings:
  - the elect
  rationale: The passage uses an apocalyptic group designation, but the verse itself
    does not require later systematic-theological overtones. 'Chosen' keeps the category
    intelligible and locally grounded.
  doctrine_reference: Translation philosophy §Contested terms / preserve local passage
    sense
- issue: Moral transformation after wisdom is given
  chosen_reading: the verse describes a future state in which the chosen no longer
    sin and instead display humility
  alternative_readings:
  - a hyperbolic description of general righteousness
  - a narrower claim that they cease specific sins of impiety and pride
  rationale: The Ge'ez states broadly that they 'will not again sin,' then specifies
    impiety and pride. The translation preserves both the broad statement and the
    named vices without narrowing the claim beyond the text.
