translation:
  text: And then wisdom will be given to the chosen, and all these will live and will
    not again sin, whether through ungodliness or through pride; but those who possess
    wisdom will be humble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the elect.'
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be understood as 'but they will be humble, because
      wisdom is theirs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እሜሃ
  chosen: then
  alternatives:
  - thereupon
  - at that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal adverb marking sequence from the preceding restoration/judgment
    context. 'Then' is concise and natural while preserving apocalyptic progression.
- source_word: ይትወሀቦሙ
  chosen: will be given to them
  alternatives:
  - shall be granted to them
  - will be bestowed on them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/imperfect sense indicates a future gift received, not self-attained
    wisdom. This preserves the divine-gift nuance.
- source_word: ለሕሩያን
  chosen: to the chosen
  alternatives:
  - to the elect
  - to the select ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes those chosen/elected. 'Chosen' is preferred over 'elect'
    for readable modern English while retaining the local apocalyptic category without
    importing later doctrinal freight.
- source_word: ጥበብ
  chosen: wisdom
  alternatives:
  - understanding
  - skill
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this moral-apocalyptic context the word points to divinely granted
    wisdom that leads to right living, not mere technical skill.
- source_word: ኵሎሙ እሉንቱ
  chosen: all these
  alternatives:
  - all of them
  - all these ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A collective reference to the group just mentioned. 'All these' preserves
    the demonstrative force.
- source_word: የሐይዉ
  chosen: will live
  alternatives:
  - shall live
  - will remain alive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward future sense. In context it likely includes both continued
    life and participation in the blessed renewed order, but the text itself simply
    says 'live'.
- source_word: ወኢይደግሙ አብሶ
  chosen: and will not again sin
  alternatives:
  - and will not continue again in sin
  - and will not add sin again
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The negative plus 'again' and the verb of sinning indicate cessation
    of prior sinful conduct. 'Will not again sin' is idiomatic and preserves the finality.
- source_word: እበረሲዕ
  chosen: through ungodliness
  alternatives:
  - in wickedness
  - by impiety
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes impious or wicked conduct. 'Ungodliness' preserves the
    religious-moral dimension better than the broader 'wickedness'.
- source_word: እበኅዕቢት
  chosen: through pride
  alternatives:
  - in arrogance
  - through haughtiness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes proud or arrogant disposition. 'Pride' is concise and
    pairs well with the following contrast of humility.
- source_word: አላ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks a strong contrast between sinful conduct and the disposition of
    the wise.
- source_word: ይገንዩ
  chosen: will be humble
  alternatives:
  - will become lowly
  - will conduct themselves humbly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is humility/lowliness as the opposite of pride. 'Will be humble'
    is the clearest English expression of the moral state.
- source_word: ዘቦሙ ጥበበ
  chosen: those who possess wisdom
  alternatives:
  - those who have wisdom
  - the ones in whom there is wisdom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative construction identifies the wise by possession of wisdom.
    This avoids awkward literalism while preserving the link between wisdom and humility.
