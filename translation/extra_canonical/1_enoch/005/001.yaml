translation:
  text: 'But ask, please, the trees: when they have put forth green leaves, and are
    covered and bear fruit, all of them know concerning themselves that they have
    made all these things for the living forever.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez in the latter half of the verse is difficult. The clause rendered
      'all of them know concerning themselves that they have made all these things'
      may reflect a corrupt or uncertain transmission; the general sense is that the
      trees themselves testify to the ordered pattern of creation.
    reason: textual_variant
  - marker: b
    text: The final phrase could also be understood as referring to 'the Ever-Living
      One' rather than 'the living forever.'
    reason: alternative_reading
lexical_decisions:
- source_word: ጠይቁ
  chosen: ask
  alternatives:
  - inquire of
  - question
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative plural; direct summons to learn from creation. 'Ask' is simple
    and preserves the rhetorical force.
- source_word: እፎ
  chosen: please
  alternatives:
  - now
  - indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Particle of entreaty or emphasis. 'Please' keeps the appeal-like tone
    without overformalizing.
- source_word: ዕፀው
  chosen: the trees
  alternatives:
  - trees
  - wooded plants
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common noun for trees/wood. Definite rendering fits the generic class
    being pointed to as witnesses in nature.
- source_word: በሐመልማለ
  chosen: have put forth green leaves
  alternatives:
  - become green
  - sprout greenery
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form points to greening or leafing. 'Put forth green leaves' preserves
    the vivid seasonal image better than the flatter 'become green.'
- source_word: አቍጽል
  chosen: are covered
  alternatives:
  - are clothed
  - are shaded/leaf-covered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely denotes being clothed or covered over, probably with foliage.
    'Are covered' is cautious and fits the sequence of leafing and fruiting.
- source_word: ይትከደኑ
  chosen: are covered
  alternatives:
  - are clothed
  - are enclosed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reflexive/passive sense of being covered or clothed. Retained in English
    to preserve the image of trees being overlaid with foliage.
- source_word: ወይፈሪዩ
  chosen: bear fruit
  alternatives:
  - produce fruit
  - be fruitful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Agricultural/arboreal verb. 'Bear fruit' is idiomatic and concrete.
- source_word: ወለበዉ በእንተ ኵሉ
  chosen: all of them know concerning themselves
  alternatives:
  - they all understand about them
  - they all know with respect to all this
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is textually difficult. I take it as a statement that the
    trees themselves recognize their own ordered pattern. The English remains somewhat
    literal to avoid false precision.
- source_word: ወአእምሩ በከመ
  chosen: that
  alternatives:
  - how
  - in what manner
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the content of what is known. 'That' reads naturally in English
    while preserving the explanatory clause.
- source_word: ገበርክሙ
  chosen: they have made
  alternatives:
  - you have made
  - it has been done
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The transmitted form is difficult because it can suggest a second-person
    plural ending, but the context strongly favors a generalized statement about what
    has been done in creation. I render by sense while flagging the difficulty in
    a footnote.
- source_word: ለአሉንቱ ኵሎሙ
  chosen: all these things
  alternatives:
  - all of them
  - all these
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Demonstrative plus totalizing expression. 'All these things' captures
    the broad scope of the created order under discussion.
- source_word: ዘሕያው ለዓለም
  chosen: for the living forever
  alternatives:
  - for the one who lives forever
  - for everlasting life
  - for the living age after age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase is ambiguous. It may refer to what is made for living beings
    perpetually, or possibly to the Ever-Living One. I retain a cautious literal rendering
    and note the alternative.
