theological_decisions:
- issue: Whether the final phrase refers to living creatures in perpetuity or to the
    Ever-Living One/God
  chosen_reading: for the living forever
  alternative_readings:
  - for the one who lives forever
  - for the Ever-Living One
  rationale: The immediate context is observational and creational, drawing a lesson
    from trees and seasonal order. A non-titular reading fits the flow better, but
    the ambiguity is significant enough to preserve in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
