theological_decisions:
- issue: Rendering the title for the angelic beings
  chosen_reading: watchers of heaven
  alternative_readings:
  - angels of heaven
  - heavenly watchers
  rationale: The passage belongs to the Watchers narrative, where this title is programmatic
    and should remain visible. Replacing it with 'angels' would flatten an important
    literary-theological category.
  doctrine_reference: Preserve apocalyptic imagery and locally grounded key terms.
- issue: Force of the rebuke concerning intercession
  chosen_reading: you ought to petition on behalf of men, and not men on your behalf
  alternative_readings:
  - you should ask for humans, not have humans ask for you
  - it is proper for you to intercede for men, not men for you
  rationale: The verse establishes an order between heavenly beings and humanity without
    over-systematizing angelology. 'Ought to petition' preserves the moral impropriety
    of the watchers' request while staying close to the Ge'ez wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
