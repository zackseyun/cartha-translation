translation:
  text: 'And go, say to the watchers of heaven who have sent you to petition on their
    behalf: ''You ought to petition on behalf of men, and not men on your behalf.'''
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you should ask for men.' The Ge'ez verb is a general verb of asking/requesting;
      'petition' is chosen here because the context is a formal appeal for mercy.
    reason: lexical_alternative
  - marker: b
    text: '''Men'' here means humankind collectively, not males only.'
    reason: cultural_note
lexical_decisions:
- source_word: ሑር
  chosen: go
  alternatives:
  - depart
  - proceed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative of motion addressed to Enoch; 'go' is the plain and natural
    English equivalent.
- source_word: በሎሙ
  chosen: say to them
  alternatives:
  - tell them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct speech introduction with indirect object plural; 'say to them'
    preserves the formal address.
- source_word: ለትጉሃነ ሰማይ
  chosen: to the watchers of heaven
  alternatives:
  - to the wakeful ones of heaven
  - to the vigilant ones of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Book of the Watchers this is a technical designation for the angelic
    beings; 'watchers' preserves the apocalyptic title rather than reducing it to
    a generic description.
- source_word: እለ ፈነዉከ
  chosen: who have sent you
  alternatives:
  - who sent you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative clause identifying the watchers as those who commissioned Enoch.
    Present perfect English fits the completed action with present relevance.
- source_word: ትስአል በእንቲአሆሙ
  chosen: to petition on their behalf
  alternatives:
  - to ask for them
  - to intercede for them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is one of asking/requesting; in this judicial-heavenly context
    'petition' captures formal supplication without importing later priestly terminology
    too strongly.
- source_word: አንትሙ መፍትው ትስአሉ
  chosen: you ought to petition
  alternatives:
  - you should ask
  - it is fitting that you petition
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The construction conveys propriety or obligation. ''Ought to'' preserves
    the rebuke: the watchers have reversed the proper order.'
- source_word: በእንተ ሰብእ
  chosen: on behalf of men
  alternatives:
  - for humankind
  - for human beings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሰብእ here is collective humanity. 'Men' keeps the concise contrast with
    the repeated term in the next clause; the sense is generic humankind, not males
    only.
- source_word: ወአኮ ሰብእ በእንቲአክሙ
  chosen: and not men on your behalf
  alternatives:
  - and not men for you
  - and not human beings on behalf of you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The line''s force lies in the inversion: heavenly beings should intercede
    for humans, not seek human intercession for themselves. The concise repetition
    is preserved.'
