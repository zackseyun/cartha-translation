theological_decisions:
- issue: Moral status of the Watchers' union with women
  chosen_reading: Render the act as self-defilement rather than merely intermarriage
  alternative_readings:
  - Render more neutrally as 'mingled with women'
  - Emphasize only boundary-crossing without impurity language
  rationale: The Ge'ez explicitly uses a defilement verb, so the translation should
    preserve the text's moral and purity judgment rather than soften it into neutral
    union language.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
