translation:
  text: Why did you abandon the high and holy eternal heaven, and lie with women,
    and defile yourselves with the daughters of men, and take wives for yourselves,
    and act as the children of the earth act, and beget giant sons?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Children of the earth" contrasts the heavenly Watchers with mortal human
      beings; the phrase should not be flattened into merely ''people.'''
    reason: cultural_note
  - marker: b
    text: The final expression denotes the abnormal offspring produced by this union;
      'giant sons' is the main rendering, though 'sons who were giants' is also possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኃደግሙ
  chosen: abandon
  alternatives:
  - leave
  - forsake
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A strong verb of leaving behind; 'abandon' preserves the rebuking force
    better than the milder 'leave'.
- source_word: ሰማየ ልዑለ ወቅዱሰ ዘለዓለም
  chosen: the high and holy eternal heaven
  alternatives:
  - the lofty, holy, eternal heaven
  - heaven, exalted and holy forever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase stacks adjectives for heaven. 'High and holy eternal heaven'
    keeps the elevated apocalyptic register and the order of emphasis without over-smoothing.
- source_word: ሰከብክሙ
  chosen: lie with
  alternatives:
  - sleep with
  - have intercourse with
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct but not crude idiom for sexual union; it preserves the formal
    register of the rebuke.
- source_word: እዋለደ ሰብእ
  chosen: the daughters of men
  alternatives:
  - the daughters of humankind
  - women of mankind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the expression refers to human women in contrast to heavenly
    beings. 'Daughters of men' preserves the traditional anthropological contrast
    without importing later doctrinal language.
- source_word: ረኩስክሙ
  chosen: defile yourselves
  alternatives:
  - become unclean
  - pollute yourselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries impurity/defilement force. 'Defile yourselves' best
    preserves the moral-cultic charge of the accusation.
- source_word: አንስተ
  chosen: wives
  alternatives:
  - women
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Because the phrase includes 'take for yourselves,' 'wives' fits the marital-taking
    idiom better than the generic 'women'.
- source_word: ከመ ውሉደ ምድር ገበርክሙ
  chosen: act as the children of the earth act
  alternatives:
  - do as the sons of earth do
  - behave like earthly children
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison contrasts heavenly beings with earthborn humans. 'Children
    of the earth' preserves the idiom and apocalyptic contrast.
- source_word: ውሉደ ረዓይተ
  chosen: giant sons
  alternatives:
  - sons who are giants
  - violent offspring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase refers to the monstrous offspring of the Watchers and women.
    'Giant sons' is concise and preserves the concrete imagery; 'violent offspring'
    is interpretive and too abstract for the main text.
