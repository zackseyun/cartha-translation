translation:
  text: And because of this I have not appointed wives for you, for the dwelling of
    the spiritual ones of heaven is in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spirits of heaven' / 'the heavenly spiritual beings.' The Ge'ez
      expression can be understood in more than one closely related way.
    reason: lexical_alternative
  - marker: b
    text: 'The repeated heaven-language is deliberate: these beings belong to heaven,
      and their dwelling is in heaven.'
    reason: cultural_note
lexical_decisions:
- source_word: ወበእንተዝ
  chosen: And because of this
  alternatives:
  - And concerning this
  - Therefore
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase introduces the reason for the preceding prohibition/explanation.
    'Because of this' preserves the causal force better than a merely topical 'concerning
    this.'
- source_word: ኢረሰይኩ
  chosen: I have not appointed
  alternatives:
  - I did not make
  - I have not assigned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb here carries the sense of establishing, assigning, or appointing
    rather than simple physical making. In context God is speaking of what was not
    allotted to the watchers.
- source_word: ለክሙ
  chosen: for you
  alternatives:
  - to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Idiomatic English with the verb 'appoint' takes 'for you'; the dative
    sense is preserved.
- source_word: አንስቲያ
  chosen: wives
  alternatives:
  - women
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the issue is marital/sexual pairing assigned to beings;
    'wives' is more specific and fits the contrast with angelic dwelling and order.
    'Women' is possible but less precise.
- source_word: እስመ
  chosen: for
  alternatives:
  - because
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the explanatory ground for the statement. 'For' keeps the
    elevated register and concise causal link.
- source_word: መንፈሳውያነ
  chosen: the spiritual ones
  alternatives:
  - spiritual beings
  - spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective/substantival form points to beings characterized as spiritual.
    'The spiritual ones' preserves the form and avoids over-resolving whether the
    emphasis is on nature ('spirits') or class ('spiritual beings').
- source_word: ሰማይ
  chosen: of heaven
  alternatives:
  - heavenly
  - of the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The genitival relation is best preserved as 'of heaven.' This keeps the
    repeated heaven-language audible in the verse.
- source_word: ውስተ ሰማይ
  chosen: in heaven
  alternatives:
  - within heaven
  - in the heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward locative phrase. 'In heaven' is natural English and
    preserves the repetition with the prior 'of heaven.'
- source_word: መሓድሪሆሙ
  chosen: the dwelling ... is
  alternatives:
  - their dwelling-place is
  - their habitation is
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This noun denotes dwelling or habitation. 'The dwelling ... is in heaven'
    is clear and elevated without becoming archaic.
