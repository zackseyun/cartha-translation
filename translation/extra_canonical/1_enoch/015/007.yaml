theological_decisions:
- issue: Whether to render መንፈሳውያነ ሰማይ as 'spirits of heaven,' 'heavenly spirits,'
    or 'the spiritual ones of heaven'
  chosen_reading: the spiritual ones of heaven
  alternative_readings:
  - the spirits of heaven
  - the heavenly spiritual beings
  rationale: The Ge'ez wording appears adjectival/substantival rather than a simple
    noun 'spirits.' The chosen rendering preserves the category of beings without
    collapsing the phrase into later angelological shorthand. It also keeps the apocalyptic
    contrast between their proper sphere and illicit earthly unions.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Whether አንስቲያ should be generalized as 'women' or specified as 'wives'
  chosen_reading: wives
  alternative_readings:
  - women
  rationale: The verse explains that such beings were not assigned marital partners
    because their proper habitation is heavenly. 'Wives' better reflects the notion
    of allotted spouses rather than merely contact with females in general.
  doctrine_reference: Optimal equivalence with documented exception; preserve local
    passage sense rather than harmonizing broadly.
