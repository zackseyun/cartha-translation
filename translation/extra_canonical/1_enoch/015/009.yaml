translation:
  text: And evil spirits came out from their flesh, because they were created from
    above; and from the holy Watchers was their beginning and first foundation. They
    shall be evil spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went forth from their bodies.' The Ge'ez explicitly says 'from their
      flesh,' which preserves the bodily imagery.
    reason: lexical_alternative
  - marker: b
    text: '''Holy Watchers'' renders a phrase that may be read more literally as ''holy
      ones, watchers.'' In context it refers to the angelic Watchers.'
    reason: lexical_alternative
  - marker: c
    text: 'The final designation may be understood as a naming formula: after leaving
      the flesh, these beings are called ''evil spirits.'''
    reason: alternative_reading
  - marker: d
    text: Or 'And the souls of the wicked'.
    reason: previous_rendering
lexical_decisions:
- source_word: ነፍሳት
  chosen: souls
  alternatives:
  - spirits
  - lives
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the term refers to the disembodied life-principle of
    the offspring after leaving the body. 'Souls' best preserves the anthropological
    distinction in the verse, while the final clause separately names them 'evil spirits.'
- source_word: እኩያን
  chosen: the wicked
  alternatives:
  - evil ones
  - impious ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used substantivally with ነፍሳት, it describes the morally corrupt beings
    under discussion. 'The wicked' is idiomatic and preserves the ethical force.
- source_word: ወጽኡ እምሥጋሆሙ
  chosen: came out from their flesh
  alternatives:
  - went forth from their bodies
  - departed from their flesh
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A fairly direct rendering that preserves the concrete bodily imagery.
    'Flesh' is retained rather than generalized to 'body' because the Ge'ez explicitly
    uses flesh-language.
- source_word: እስመ
  chosen: because
  alternatives:
  - for
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the explanatory ground for why these souls have the status
    described.
- source_word: እመልዕልት
  chosen: from above
  alternatives:
  - from on high
  - from the upper realm
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to heavenly or supernal origin. 'From above' is concise
    and preserves the vertical cosmological imagery without over-specifying.
- source_word: ተፈጥሩ
  chosen: they were created
  alternatives:
  - they were made
  - they were formed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the passive sense and the creaturely status of these beings. 'Created'
    better matches the theological weight of origin language here.
- source_word: እምቅዱሳን ትጉሃን
  chosen: from the holy Watchers
  alternatives:
  - from the holy ones, the watchers
  - from the vigilant holy ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The collocation likely identifies the angelic Watchers, not merely generic
    holy ones. Rendering the phrase as 'holy Watchers' preserves the technical Enochic
    designation and the immediate narrative context.
- source_word: ቀዳሚቶሙ
  chosen: their beginning
  alternatives:
  - their first origin
  - their fore-part
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys source or initial origin. 'Beginning' is natural English and
    pairs well with the following foundation language.
- source_word: ወቀዳሚ መሰረት
  chosen: and first foundation
  alternatives:
  - and primal foundation
  - and original basis
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repetition intensifies the statement of origin. 'First foundation'
    preserves the somewhat weighty, apocalyptic diction rather than smoothing it away.
- source_word: መንፈሰ እኩየ
  chosen: evil spirits
  alternatives:
  - wicked spirits
  - spirits of evil
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the climactic designation of the giants' postmortem state. Plural
    English is required by the subject, though the Ge'ez form as transmitted may appear
    singular or collective in OCR.
