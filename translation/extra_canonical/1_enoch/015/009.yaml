theological_decisions:
- issue: Identity of the beings described after death
  chosen_reading: The verse speaks of the disembodied offspring of the Watchers and
    women, whose souls become 'evil spirits.'
  alternative_readings:
  - The verse refers more generally to wicked human souls
  - The final phrase is only descriptive, not a naming formula
  rationale: Within the immediate context of 1 Enoch 15, God explains the origin and
    fate of the giants born from the union of Watchers and women. The language of
    heavenly origin and derivation from the holy Watchers fits that specific group,
    not ordinary humanity.
  doctrine_reference: Preserve local passage meaning and do not harmonize away apocalyptic
    categories.
- issue: Force of 'from above'
  chosen_reading: It indicates a supernal/heavenly component in their origin, not
    moral approval.
  alternative_readings:
  - It means simply 'formerly' or 'at first'
  - It implies full angelic status
  rationale: 'The context distinguishes their mixed origin: bodily from earthly mothers,
    but with derivation from heavenly Watchers. The phrase should preserve cosmological
    origin without collapsing the beings into proper angels.'
  doctrine_reference: Preserve theological tension rather than resolve it.
