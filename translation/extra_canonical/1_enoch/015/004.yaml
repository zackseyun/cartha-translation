theological_decisions:
- issue: How explicitly to mark the contrast between angelic and human modes of existence
  chosen_reading: The verse is rendered to stress that the Watchers were originally holy, spiritual, and eternal, but crossed into mortal, blood-bound generation and desire.
  alternative_readings:
  - A more idiomatic rendering could smooth the contrast into 'immortal' versus 'mortal' language.
  - A more formal rendering could leave 'blood of flesh' and 'blood of men' more woodenly literal.
  rationale: The passage's theology depends on the transgression of created boundaries. The chosen wording keeps the blood/flesh imagery visible while remaining readable English.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence.
