translation:
  text: But you were holy, spiritual beings, living the life of eternity. Yet you defiled yourselves with the blood of women, and by the blood of flesh you fathered children, and you lusted after the blood of men, and you produced flesh and blood as they do—those who die and perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez repeatedly emphasizes blood and flesh, underscoring the Watchers' unlawful move from spiritual existence into mortal, bodily generation and desire.
    reason: cultural_note
  - marker: b
    text: The final clause may also be rendered 'those who die and are destroyed'; the exact nuance of the last verb is difficult, but it clearly marks human mortality and ruin.
    reason: lexical_alternative
  - marker: c
    text: Or 'Yet you defiled yourselves with women, and by the blood of flesh you fathered children, and you desired blood and flesh as humans do, and you acted as they act'.
    reason: previous_rendering
lexical_decisions:
- source_word: ቅዱሳን
  chosen: holy
  alternatives:
  - holy ones
  - sacred
  lexicon: Dillmann
  rationale: Adjectival predicate describing the Watchers' original state. 'Holy' is the most direct and preserves the contrast with their later defilement.
- source_word: መንፈሳውያን
  chosen: spiritual beings
  alternatives:
  - spirits
  - spiritual ones
  lexicon: Dillmann
  rationale: The term marks their non-fleshly nature. 'Spiritual beings' makes explicit in English that persons are in view, without flattening to an abstract adjective.
- source_word: ሕያዋነ ሕይወት ዘለዓለም
  chosen: living the life of eternity
  alternatives:
  - alive with eternal life
  - living an everlasting life
  lexicon: Dillmann
  rationale: The doubled life/living expression is rhetorically weighty. This rendering preserves the idiomatic force and the contrast with mortal humanity later in the verse.
- source_word: በደቡ አንስት ረኩስክሙ
  chosen: you defiled yourselves with women
  alternatives:
  - you became unclean with women
  - you polluted yourselves by women
  lexicon: Dillmann
  rationale: The clause expresses ritual/moral defilement through relations with women. 'Defiled yourselves' best preserves the impurity language without over-specifying the mechanism.
- source_word: በደመ ሥጋ አውለድክሙ
  chosen: by the blood of flesh you fathered children
  alternatives:
  - you begot by fleshly blood
  - you generated offspring through flesh and blood
  lexicon: Dillmann
  rationale: The Ge'ez emphasizes embodied, blood-bound generation in contrast to the angels' proper mode of existence. 'Fathered children' supplies the implied object naturally in English while keeping the blood/flesh imagery.
- source_word: በደመ ሰብእ ፈተውክሙ
  chosen: you desired blood
  alternatives:
  - you lusted after human blood
  - you longed for the blood of men
  lexicon: Dillmann
  rationale: The verb conveys desire/craving. Because the next clause already mentions humans acting in flesh and blood, the shorter 'desired blood' keeps the stark apocalyptic accusation and avoids over-interpretation.
- source_word: ወገበርክሙ ከመ እሙንቱ ይገብሩ
  chosen: you acted as they act
  alternatives:
  - you did as they do
  - you behaved like them
  lexicon: Dillmann
  rationale: 'This preserves the repeated verbal idea and the force of imitation: the heavenly beings have taken on the pattern of mortal humans.'
- source_word: ሥጋ ወደመ
  chosen: blood and flesh
  alternatives:
  - flesh and blood
  lexicon: Dillmann
  rationale: Although English idiom prefers 'flesh and blood,' the Ge'ez order foregrounds blood. Retaining 'blood and flesh' in the preceding clause helps preserve the verse's emphasis on mortality and corporeality.
- source_word: እለ እሙንቱ ይመውቱ ወይትሐጐሉ
  chosen: those who die and perish
  alternatives:
  - those who die and are destroyed
  - those who die and pass away
  lexicon: Dillmann
  rationale: The final description defines humans by mortality. 'Perish' preserves the solemn judgment-laden tone better than the softer 'pass away.'
