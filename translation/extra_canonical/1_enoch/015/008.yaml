theological_decisions:
- issue: Identity of the beings described as becoming spirits
  chosen_reading: The verse speaks of the giants, the mixed offspring of the Watchers
    and women, who after their bodily origin are designated 'evil spirits' on earth.
  alternative_readings:
  - The verse could be read more generically as referring to offspring rather than
    specifically 'giants' if the opening noun is taken less technically.
  rationale: The immediate literary context in 15:8-12 explains the origin and postmortem
    activity of the giants' spirits. Rendering the opening term as 'giants' makes
    the referent explicit without importing later demonology beyond the verse's own
    logic.
  doctrine_reference: Preserve theological tension rather than resolve it; keep the
    local passage primary.
