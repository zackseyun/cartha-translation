translation:
  text: And now, the giants who were born from spirits and flesh will be called evil
    spirits upon the earth, and on the earth will be their dwelling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening noun is contextually understood as the giant offspring of the
      Watchers and human women; a more generic rendering such as 'offspring' is possible
      at the lexical level.
    reason: lexical_alternative
  - marker: b
    text: The repeated 'earth' is retained to reflect the Ge'ez wording and the verse's
      emphasis that these spirits belong to the earthly realm rather than the heavenly
      one.
    reason: cultural_note
lexical_decisions:
- source_word: ረዓይት
  chosen: the giants
  alternatives:
  - the offspring
  - the mighty ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the term refers to the hybrid progeny of the Watchers
    and women described earlier in the chapter; 'giants' is the established contextual
    sense and preserves the monstrous/apocalyptic force better than the more generic
    'offspring'.
- source_word: ተወልዱ
  chosen: were born
  alternatives:
  - were begotten
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward passive birth/begetting expression; 'were born' is
    natural English while remaining faithful.
- source_word: እመናፍስት ወሥጋ
  chosen: from spirits and flesh
  alternatives:
  - from spirits and from flesh
  - from spiritual beings and flesh
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez explicitly juxtaposes spirit and flesh to mark the mixed origin
    of the giants. 'From spirits and flesh' preserves that stark dual source without
    interpretive expansion.
- source_word: መንፈሳት እኩያን
  chosen: evil spirits
  alternatives:
  - wicked spirits
  - unclean spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective means evil/wicked. 'Evil spirits' is the most direct rendering
    and should not be shifted to 'unclean spirits,' which would import later terminology
    not demanded by the verse.
- source_word: ይሰመዩ
  chosen: will be called
  alternatives:
  - will be named
  - shall be known as
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive naming formula is important in apocalyptic classification
    language; 'will be called' preserves that formal force.
- source_word: በዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - over the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase indicates sphere/location. 'Upon the earth'
    keeps the elevated register and distinguishes it slightly from the following repeated
    phrase.
- source_word: ወውስተ ምድር ይከውን መሓድሪሆሙ
  chosen: and on the earth will be their dwelling
  alternatives:
  - and their dwelling will be upon the earth
  - and within the earth will be their habitation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause states the locale of these spirits after death. Because the
    text repeats 'earth,' the translation preserves the repetition rather than smoothing
    it away. 'Dwelling' is clearer than the more formal 'habitation'.
