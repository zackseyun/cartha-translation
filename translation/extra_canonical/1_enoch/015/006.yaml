translation:
  text: But you, formerly, were spiritual beings, living an eternal life that does not die throughout all the generations of the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spirits.' The Ge'ez term can be rendered more tersely, but the fuller wording in English helps preserve the predicative force of the line.
    reason: lexical_alternative
  - marker: b
    text: '''World'' may also be understood as ''age'' here, yielding the sense ''throughout all generations forever.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'living with eternal life'.
    reason: previous_rendering
lexical_decisions:
- source_word: ቀዳሚ
  chosen: formerly
  alternatives:
  - at first
  - in the beginning
  - beforehand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context God is contrasting the Watchers' prior created state with their present corruption. 'Formerly' preserves the temporal contrast without over-specifying cosmological sequence.
- source_word: ኮንክሙ
  chosen: were
  alternatives:
  - became
  - came to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The copular sense fits the predicative description of the Watchers' original condition.
- source_word: መንፈሳውያነ
  chosen: spiritual beings
  alternatives:
  - spirits
  - spiritual ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective/noun refers to beings characterized by spirit. 'Spiritual beings' is clearer in English than the bare 'spiritual ones' and avoids collapsing the phrase too quickly into a technical term when the next words further define their state.
- source_word: ሕያዋነ
  chosen: living
  alternatives:
  - alive
  - living ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used predicatively with the following life-language; 'living' keeps the cadence of the description.
- source_word: ሕይወት ዘለዓለም
  chosen: with eternal life
  alternatives:
  - for eternal life
  - an eternal life
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase describes the quality of existence granted to these beings. 'With eternal life' reads naturally while preserving the explicit noun 'life' rather than reducing it to merely 'immortal'.
- source_word: ዘኢይመውት
  chosen: that does not die
  alternatives:
  - which does not perish
  - that is not subject to death
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause intensifies the previous phrase. Retaining 'die' preserves the starkness of the source rather than smoothing it into abstraction.
- source_word: ለኵሉ ትውልደ ዓለም
  chosen: throughout all the generations of the world
  alternatives:
  - for all the generations of eternity
  - for every generation forever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks enduring duration across the world's generations. 'Of the world' is kept because ዓለም can denote world/age; here it likely means the whole span of worldly generations.
