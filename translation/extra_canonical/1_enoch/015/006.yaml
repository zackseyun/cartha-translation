theological_decisions:
- issue: Whether to render the Watchers' original state as 'spirits' or as a broader description
  chosen_reading: spiritual beings
  alternative_readings:
  - spirits
  - spiritual ones
  rationale: The verse emphasizes what they were before taking wives and begetting offspring. 'Spiritual beings' preserves that ontological contrast without importing later doctrinal precision beyond the Ge'ez wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
