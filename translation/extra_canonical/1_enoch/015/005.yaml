translation:
  text: Therefore I gave them women, so that they might sow seed into them and children
    might be born by them, so that thus no deed on the earth might be lacking to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'sow seed upon them.' The Ge'ez preserves a procreative metaphor
      drawn from sowing.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult. The sense appears to be that earthly life
      and activity would continue in the appointed way through procreation.
    reason: textual_variant
lexical_decisions:
- source_word: በእንተዝ
  chosen: therefore
  alternatives:
  - for this reason
  - because of this
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the explanation of the divine arrangement in response to the
    preceding contrast between spirits and earthly beings.
- source_word: ወሀብክዎሙ
  chosen: I gave them
  alternatives:
  - and I gave to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward first-person divine speech with indirect object suffix;
    concise English preserves the force.
- source_word: አንስቲያ
  chosen: women
  alternatives:
  - wives
  - females
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes women generally. 'Wives' would over-specify a marital
    status not explicit in this word, though the broader context concerns pairing
    for procreation.
- source_word: ከመ ይዝርኡ
  chosen: so that they might sow seed
  alternatives:
  - that they might beget
  - that they might impregnate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The agricultural/procreative metaphor 'sow' should be preserved because
    the Ge'ez keeps the imagery rather than using a flatter reproductive verb.
- source_word: ላዕሌሆን
  chosen: into them
  alternatives:
  - upon them
  - in them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'upon them/over them,' but in this reproductive context English
    idiom requires 'into them' to convey the sense without obscuring the metaphor.
- source_word: ወይትወለዱ ውሉደ በላዕሌሆን
  chosen: and children might be born by them
  alternatives:
  - and offspring might be born from them
  - and sons might be born to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ውሉደ can mean children/offspring. 'Children' is broad and natural; 'by
    them' preserves the maternal/proximate relation without overcommitting to a narrower
    idiom.
- source_word: ከመ ከማሁ
  chosen: so that thus
  alternatives:
  - so that in this way
  - that thereby
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The doubled purposive/comparative expression marks result or manner emphatically;
    'so that thus' keeps the rhetorical weight.
- source_word: ኢይትኀጐ ግብር
  chosen: no deed ... might be lacking
  alternatives:
  - no work ... might fail
  - nothing ... might be missing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ግብር commonly means deed/work/matter. 'Deed' preserves the broad sense
    while fitting the context of earthly human activity and continuation of life.
- source_word: በዲበ ምድር
  chosen: on the earth
  alternatives:
  - upon the earth
  - in the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard cosmological phrase in Enochic discourse; 'on the earth' is
    clear and idiomatic.
