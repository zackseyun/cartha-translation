theological_decisions:
- issue: Purpose of giving women to earthly beings
  chosen_reading: The line presents procreation as part of the divinely ordered pattern
    for earthly creatures, in contrast to the Watchers' improper crossing of boundaries.
  alternative_readings:
  - A narrower statement about marriage only
  - A purely punitive concession after the fall of the Watchers
  rationale: 'The verse explains why women were given: for seed and birth on earth.
    In context this underlines creaturely order rather than endorsing the Watchers''
    unions.'
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    from local passage first.
