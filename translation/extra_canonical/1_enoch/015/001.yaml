theological_decisions:
- issue: Rendering Enoch's title as a moral and literary designation
  chosen_reading: righteous man and scribe of righteousness
  alternative_readings:
  - just man and writer of justice
  - righteous one and scribe of justice
  rationale: The verse presents Enoch both as morally qualified and as a recorder/mediator
    of revealed truth. Preserving both titles avoids reducing him either to generic
    piety or merely literary function.
  doctrine_reference: Translation philosophy §Consistency of key terms; contested
    term δικαιοσύνη default 'righteousness'
