translation:
  text: 'And he answered me and said to me, and I heard his voice: “Do not fear, Enoch,
    righteous man and scribe of righteousness. Come near here and hear my word.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic text appears to repeat the verb 'hear' ('and I heard, I heard').
      The English compresses the repetition for readability while preserving the sense
      of auditory reception before the direct speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: አውሥአኒ
  chosen: he answered me
  alternatives:
  - he responded to me
  - he spoke to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb naturally carries the sense of answering/responding. 'Answered
    me' preserves the dialogic setting and the formal tone of angelic speech.
- source_word: ወይቤለኒ
  chosen: and said to me
  alternatives:
  - and spoke to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common speech formula. Retaining both 'answered' and 'said' reflects
    the repetitive narrative style rather than smoothing it away.
- source_word: ወሰምኩ፡ ሰማዕኩ
  chosen: and I heard his voice
  alternatives:
  - and I heard
  - and I listened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text appears to repeat the hearing verb for emphasis. English normally
    compresses the duplication; 'his voice' is supplied for intelligibility in context,
    since what follows is direct speech.
- source_word: አትፍራህ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct prohibition in elevated but readable English. 'Do not fear'
    preserves the solemn register of revelatory reassurance.
- source_word: ብእሲ ጻድቅ
  chosen: righteous man
  alternatives:
  - just man
  - upright man
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Righteous'' is the project''s default for justice/righteousness terminology
    and fits the moral characterization of Enoch in this context.'
- source_word: ጻሓፊ ጽድቅ
  chosen: scribe of righteousness
  alternatives:
  - writer of righteousness
  - scribe of justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጻሓፊ denotes a writer or scribe; 'scribe' better preserves the formal,
    revelatory-literary role assigned to Enoch. 'Of righteousness' keeps the genitival
    force and echoes the preceding descriptor without flattening it.
- source_word: ቅረብ ዝየ
  chosen: Come near here
  alternatives:
  - Come here
  - Draw near here
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The imperative plus deictic adverb invites Enoch into closer proximity.
    'Come near here' preserves both movement and location.
- source_word: ወስማዕ ቃልየ
  chosen: and hear my word
  alternatives:
  - and listen to my word
  - and hear my words
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Singular 'word' is retained as the more literal reading and suits prophetic-revelatory
    diction.
