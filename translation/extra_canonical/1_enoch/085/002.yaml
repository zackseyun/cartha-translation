theological_decisions:
- issue: Rendering the visionary phrase ርእየ ሕልመ
  chosen_reading: dream-vision
  alternative_readings:
  - dream
  - vision of a dream
  rationale: Because this section is explicitly visionary and apocalyptic, the translation
    should preserve both the dream setting and the revelatory/visual character of
    the experience. 'Dream-vision' avoids flattening the phrase into an ordinary dream
    report.
