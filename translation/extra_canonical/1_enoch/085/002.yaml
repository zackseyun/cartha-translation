translation:
  text: 'And Enoch lifted up his voice and said to his son Methuselah, “To you I speak,
    my son: hear my words, and incline your ear to the dream-vision of your father.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the vision of a dream.” The Ge'ez phrase combines seeing/vision language
      with dream language.
    reason: lexical_alternative
lexical_decisions:
- source_word: አንሥአ
  chosen: lifted up his voice
  alternatives:
  - began
  - raised
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally means 'lifted/raised.' In narrative introduction with
    speech, English idiom 'lifted up his voice' preserves the elevated register and
    solemnity better than the flatter 'began to speak.' 'Voice' is implied by the
    speech formula and makes the English natural without over-paraphrasing.
- source_word: ወይቤ
  chosen: said
  alternatives:
  - spoke
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard narrative speech verb. 'Said' is the most transparent and idiomatic
    rendering in this formulaic context.
- source_word: ለወልዱ
  chosen: to his son
  alternatives:
  - unto his son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct object with preposition marking the addressee. 'To his son' is
    clear modern English while preserving the filial relationship.
- source_word: ማቱሳላ
  chosen: Methuselah
  alternatives: []
  lexicon: —
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: ለከ እብለከ
  chosen: To you I speak
  alternatives:
  - I speak to you
  - to you I say
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The doubled pronominal emphasis is retained by fronting 'To you.' 'Speak'
    fits the direct address and avoids sounding overly colloquial.
- source_word: ወልድየ
  chosen: my son
  alternatives:
  - O my son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Vocative of affection and authority. 'My son' preserves the familial
    and instructional tone without adding archaic 'O'.
- source_word: ስማዕ
  chosen: hear
  alternatives:
  - listen to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative of hearing. 'Hear' keeps the elevated register and echoes
    wisdom/apocalyptic exhortation.
- source_word: ነገርየ
  chosen: my words
  alternatives:
  - my speech
  - what I say
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural-like sense in context is natural in English and suits an address
    introducing revelation. 'My words' is both formal enough and readable.
- source_word: አጽንን እዝነከ
  chosen: incline your ear
  alternatives:
  - give attention
  - set your ear firmly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom calls for attentive listening. 'Incline your ear' preserves
    the concrete bodily imagery and elevated style better than a flattened dynamic
    equivalent.
- source_word: ለርእየ ሕልመ
  chosen: to the dream-vision
  alternatives:
  - to the vision of a dream
  - to the dream
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase combines seeing/vision language with dream language. 'Dream-vision'
    preserves both elements and fits apocalyptic diction better than simply 'dream,'
    which would under-translate the visionary force.
- source_word: አቡከ
  chosen: of your father
  alternatives:
  - your father's
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Genitival relation identifying Enoch as the father whose dream-vision
    is being recounted. 'Of your father' keeps the formal cadence of the line.
