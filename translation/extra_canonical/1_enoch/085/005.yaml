theological_decisions:
- issue: Symbolic animal imagery in the Animal Apocalypse
  chosen_reading: Retain the concrete animal image 'black wild boar' rather than interpret
    it as a people-group or historical figure in the translation line.
  alternative_readings:
  - Translate interpretively as a hostile nation or ruler
