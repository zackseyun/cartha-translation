  rationale: The passage belongs to a symbolic dream vision whose imagery should remain
    visible in translation. Historical identification belongs in commentary, not in
    the main text.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    flatten symbolic language into generic prose.'
