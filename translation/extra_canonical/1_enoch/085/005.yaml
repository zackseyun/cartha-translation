  from: And I saw that black wild boar, and it came.
  to: And that black calf grew up, and she came
  rationale: 'The draft contains multiple severe lexical hallucinations. `ወዝኩ` (wa-zəku)
    means "And that", not "And I saw". `ጣዕዋ` (ṭaʿwa) means "calf" or "young bull",
    not "wild boar". `ላህቀ` (lahqa) is a verb meaning "to grow up" or "become large",
    not a demonstrative pronoun. `ወመጽአት` (wa-maṣʾat) is a 3rd person feminine singular
    verb ("and she came"). | Adjudicator: The reviewer is entirely correct. The Ge''ez
    text reads `ወዝኩ` (and that) `ጸሊም` (black) `ጣዕዋ` (calf) `ላህቀ` (grew up) `ወመጽአት`
    (and she came). The current translation hallucinates ''I saw'' and ''wild boar'' '
