  rationale: Taken as a demonstrative/determining element pointing to a specific animal
    in the vision. 'That' preserves the deictic force better than a simple article.
- source_word: ወመጽአት
  chosen: and it came
  alternatives:
  - and it arrived
  - and it approached
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
