translation:
  text: And that black calf struck the red calf and pursued it onto the earth, and
    after that I could no longer see that red calf.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording suggests violent contact followed by pursuit. 'Struck'
      could also be rendered 'gored' in light of the bovine imagery.
    reason: lexical_alternative
  - marker: b
