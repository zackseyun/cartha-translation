      and after that I could no longer see that red heifer.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ጐድአ
  chosen: struck
  alternatives:
  - gored
  - smote
  - attacked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes striking or wounding. 'Struck' preserves the violent
    action without over-specifying the exact manner. 'Gored' is possible in the animal
    context but is more interpretive than the Ge'ez itself requires.
- source_word: ጸሊም
  chosen: black
  alternatives:
  - dark
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic color term; 'black' is the natural rendering in this animal-vision
    context.
- source_word: ጣዕዋ
  chosen: heifer
  alternatives:
  - cow
  - female calf
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse the symbolic figures are regularly differentiated
    by sex and species. 'Heifer' preserves the feminine bovine sense better than the
    more generic 'cow'.
- source_word: ለቀይሕ
  chosen: the red one
  alternatives:
  - the red heifer
  - the red cow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The object is identified by color; in English the noun can be supplied
    from context. In the final rendering, 'red one' is then clarified by repeating
    'heifer' later for readability.
- source_word: ተለዎ
  chosen: pursued
  alternatives:
  - followed
  - chased
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is hostile action after the blow, so 'pursued' better conveys
    aggressive following than the neutral 'followed'.
- source_word: ውስተ ምድር
  chosen: onto the earth
  alternatives:
  - into the earth
  - to the ground
  - upon the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally involves movement with 'earth/ground.' 'Onto the
    earth' preserves the spatial imagery and avoids prematurely deciding for disappearance
    underground.
- source_word: አክሀልኩ እምሶቤሃ ርእዮቶ
  chosen: I could no longer see
  alternatives:
  - I ceased from then on to see
  - after that I did not see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause marks the end of the visionary sight of the red animal. 'I
    could no longer see' expresses the loss of sight naturally in English while preserving
    the temporal sense supplied by 'after that'.
