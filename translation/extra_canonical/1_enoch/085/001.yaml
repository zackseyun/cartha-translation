translation:
  text: And after this I saw another dream, and I will show you the whole dream, my son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole dream.' The Ge'ez expression may refer either to the entirety of the dream account or to each dream in the sequence.
    reason: lexical_alternative
  - marker: b
    text: Or 'every dream'.
    reason: previous_rendering
lexical_decisions:
- source_word: እምድኅረዝ
  chosen: after this
  alternatives:
  - after these things
  - afterward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal transition formula introducing the next visionary scene. 'After this' preserves the apocalyptic narrative cadence without sounding overly wooden.
- source_word: ካልአ
  chosen: another
  alternatives:
  - a second
  - other
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks a further dream distinct from the previous one. 'Another' is the most natural English equivalent here.
- source_word: ሕለመ
  chosen: dream
  alternatives:
  - vision in sleep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary term for a dream; retaining 'dream' preserves the text's own framing before the symbolic animal vision unfolds.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary report. 'I saw' is clear modern English and keeps the directness of the Ge'ez.
- source_word: ኵሎ ሕልመ
  chosen: every dream
  alternatives:
  - the whole dream
  - all the dream
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Taken distributively as ''every dream,'' matching the plural-like force of the expression in context: Enoch is about to recount the full sequence of dream revelations to his son.'
- source_word: አርእየከ
  chosen: I will show you
  alternatives:
  - I will make you see
  - I will recount to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future/causative sense from the verb 'to show, make see.' 'I will show you' preserves the vividness of mediated revelation better than the flatter 'tell' or 'recount.'
- source_word: ወልድየ
  chosen: my son
  alternatives:
  - O my son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct filial address. 'My son' preserves the intimate instructional frame of Enoch speaking to his son.
