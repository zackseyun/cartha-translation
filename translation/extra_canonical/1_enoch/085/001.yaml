theological_decisions:
- issue: Scope of ኵሎ ሕልመ
  chosen_reading: every dream
  alternative_readings:
  - the whole dream
  - all the dream
  rationale: The Ge'ez can be heard either as a collective singular ('the whole dream') or as a distributive expression ('every dream'). Because the verse introduces a sequence of dream material and promises disclosure to the son, 'every dream' best captures the forward-looking scope while remaining faithful to the wording.
  doctrine_reference: Preserve theological tension rather than resolve it; document ambiguity rather than smoothing it away.
