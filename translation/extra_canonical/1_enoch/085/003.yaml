translation:
  text: Before I took your mother Edna, I saw in a vision on my bed, and behold, a bull came up from the earth; and that bull was white. And after it there came out a heifer, and with her came out two bulls, and one of them was black and one red., and behold, a bull came up from the earth; and that bull was white. And after it there came out a heifer, and with her came out two bulls, and one of them was black and one red.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'I saw in the vision of my sleep.'
    reason: lexical_alternative
  - marker: b
    text: The animal imagery is symbolic within the Dream Visions; the translation preserves the vision's own terms rather than supplying identifications in the main text.
    reason: cultural_note
  - marker: c
    text: Or 'And again I saw with my eyes as I slept'.
    reason: previous_rendering
lexical_decisions:
- source_word: ርኢኩ፡ በራእየ፡ ምስካብየ
  chosen: I saw with my eyes as I slept
  alternatives:
  - I saw in the vision of my sleep
  - I saw in my sleep-vision
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase explicitly combines seeing with the setting of sleep. A slightly expanded rendering preserves both the visionary and dream context without becoming wooden. 'As I slept' is readable English while still reflecting the sleep-vision formula.
- source_word: ላህም
  chosen: bull
  alternatives:
  - ox
  - cow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse this term denotes a male bovine figure in symbolic narrative. 'Bull' best preserves the sexed imagery and matches the contrast with the female animal later in the verse.
- source_word: ወፅአ፡ እምድር
  chosen: came up from the earth
  alternatives:
  - came out of the earth
  - emerged from the ground
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The motion is outward/upward from the earth. 'Came up from the earth' preserves the vivid visionary emergence.
- source_word: ጸዓዳ
  chosen: white
  alternatives:
  - bright white
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The color term is straightforward and symbolically important in this apocalypse; it should remain simple and direct.
- source_word: ጣዕዋ፡ እንስቲያት፡ አሐቲ
  chosen: a heifer
  alternatives:
  - one female calf
  - a female bovine
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks a single female bovine. 'Heifer' is concise, natural English and preserves the animal imagery better than a generic paraphrase.
- source_word: ወምስሌሃ፡ ወፅኡ፡ ክልኤቱ፡ ጣዕዋ
  chosen: with her came out two bulls
  alternatives:
  - and along with her two bulls came out
  - and with her there emerged two male calves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The syntax links the two male animals to the female animal's appearance. 'With her came out two bulls' is clear and preserves the sequence.
- source_word: ጸሊመ
  chosen: black
  alternatives:
  - dark
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The color contrast is central to the symbolic narrative; 'black' is the plain and exact rendering.
- source_word: ቀይሐ
  chosen: red
  alternatives:
  - ruddy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes redness as a color marker. 'Red' is the most transparent rendering and keeps the symbolic contrast sharp.
