    a memorial before the divine glory, the English reflects that fuller sense while
    noting uncertainty in footnotes.
- source_word: ይዜከሩ፡
  chosen: is written down
  alternatives:
  - is remembered
  - is recorded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The root concerns remembrance or memorialization. In apocalyptic judicial
    context, 'written down' makes explicit the forensic nuance of heavenly record
    while preserving the memorial idea.
- source_word: መላእክት፡
  chosen: your memorial
  alternatives:
  - the angels
  - messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR is unstable here. Although the visible form resembles 'angels,'
    the broader verse context in the Epistle of Enoch concerns the righteous being
    remembered before God. Because the surviving line is incomplete, the translation
    adopts the memorial motif that coheres with the judicial-heavenly setting and
    flags the uncertainty below.
- source_word: በእንቲአክሙ፡ ለሠናይ፡
  chosen: your complaint is not heard
  alternatives:
