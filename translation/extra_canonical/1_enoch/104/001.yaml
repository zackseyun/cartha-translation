theological_decisions:
- issue: Heavenly remembrance as judicial record
  chosen_reading: The verse speaks of the righteous being remembered/recorded before
    God in the heavenly court.
  alternative_readings:
  - A simpler statement that angels remember the righteous in heaven
  - A statement about prayer being heard without explicit record-book imagery
  rationale: In 1 Enoch's epistolary judgment context, heavenly remembrance often
    carries forensic force rather than mere mental recollection. The translation preserves
    that apocalyptic courtroom atmosphere.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment formulas
    into generic prose.
