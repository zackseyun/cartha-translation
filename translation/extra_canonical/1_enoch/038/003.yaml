theological_decisions:
- issue: Meaning of the righteous persons' concealed reality
  chosen_reading: the hidden things of the righteous
  alternative_readings:
  - the secrets of the righteous
  - the hidden ones among the righteous
  rationale: The Ge'ez plural adjective/noun for 'hidden' does not require a narrower sense like private secrets, nor does the verse clearly identify hidden persons. The broader 'hidden things' best preserves ambiguity about whether deeds, vindication, or true status are being unveiled.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the final exclusion formula
  chosen_reading: driven away from the face of the righteous and the chosen
  alternative_readings:
  - removed from before the righteous and elect
  - put to shame before the righteous and chosen
  rationale: The text emphasizes expulsion from the presence of the vindicated community, not merely emotional shame. This preserves apocalyptic judgment imagery without softening it.
  doctrine_reference: Original-language primacy over translation tradition.
