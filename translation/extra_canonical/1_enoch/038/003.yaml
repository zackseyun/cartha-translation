translation:
  text: When the hidden things of the righteous are revealed, sinners will be judged, and the wicked will be driven away from the face of the righteous and the chosen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their secrets.' The Ge'ez can denote what has been concealed, but the verse does not specify whether these are deeds, identities, or grounds of vindication.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the face of the righteous and the chosen,' an exclusion-from-presence formula common in judgment scenes.
    reason: cultural_note
  - marker: c
    text: Or 'Then the hidden things of the righteous will be revealed, and sinners will be judged'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይትከሠት
  chosen: will be revealed
  alternatives:
  - will be uncovered
  - will be disclosed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive sense fits the verbal form and the apocalyptic context of hidden realities being made manifest at judgment.
- source_word: ኅቡኣቲሆሙ
  chosen: the hidden things of them
  alternatives:
  - their hidden ones
  - their secrets
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the root for 'hidden/concealed.' In idiomatic English, 'the hidden things of the righteous' preserves the plural and avoids over-specifying as merely 'secrets.'
- source_word: ለጻድቃን
  chosen: of the righteous
  alternatives:
  - for the righteous
  - belonging to the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction most naturally links the hidden things with the righteous as possessive/genitival rather than indicating advantage.
- source_word: ይትኴነኑ
  chosen: will be judged
  alternatives:
  - will be condemned
  - will be brought to judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A judicial passive is clear here. 'Will be judged' preserves the formal judgment scene without importing the stronger result term 'condemned' into the main text.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - the sinful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard moral category in Enochic judgment language; 'sinners' is the most direct and consistent rendering.
- source_word: ይትሀወዙ
  chosen: will be driven away
  alternatives:
  - will be removed
  - will be scattered
  - will be put to flight
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys forcible removal rather than mere departure. 'Driven away' preserves the judgment force and spatial imagery.
- source_word: ረስዓን
  chosen: the wicked
  alternatives:
  - evildoers
  - the lawless
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard paired term with 'righteous' in apocalyptic contrast; 'the wicked' is concise and preserves the moral polarity.
- source_word: እምገጸ
  chosen: from the face of
  alternatives:
  - from before
  - from the presence of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'from the face/presence of.' Retaining 'from the face of' keeps the elevated register and spatial-judicial imagery of exclusion from before the righteous.
- source_word: ወኅሩያን
  chosen: and the chosen
  alternatives:
  - and the elect
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes those chosen/elected by God. 'Chosen' is preferred for accessible modern English while preserving the theological category.
