translation:
  text: And from now on the mighty and the exalted, who possess the earth, shall be
    no more; nor shall they be able to look upon the face of the holy ones, because
    the Lord of Spirits has caused his light to appear on the face of the holy, the
    righteous, and the chosen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who hold the earth.' The Ge'ez verb can denote grasping or holding;
      'possess' here conveys entrenched control.
    reason: lexical_alternative
  - marker: b
    text: '''Look upon the face of'' is an idiom of direct encounter or access, preserved
      here rather than simplified to ''be in the presence of.'''
    reason: cultural_note
  - marker: c
    text: The final clause may imply that the Lord's light shines upon the countenance
      of the holy, righteous, and chosen, signaling their vindication.
    reason: alternative_reading
lexical_decisions:
- source_word: ዐዚዛነ
  chosen: the mighty
  alternatives:
  - the strong
  - the powerful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes those marked by strength or power. 'The mighty' fits
    the apocalyptic denunciation of earthly rulers without over-specifying military
    force.
- source_word: እልዑላነ
  chosen: the exalted
  alternatives:
  - the lofty
  - the high ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This word points to elevated status or height. 'The exalted' preserves
    both social elevation and the ironic reversal common in judgment scenes.
- source_word: ይእኅዝዋ ለምድር
  chosen: who possess the earth
  alternatives:
  - who hold the earth
  - who seize the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys grasping/holding. In context it describes those who
    have dominion or control over the earth. 'Possess' communicates durable control
    better than the more physical 'hold,' while avoiding the stronger and less certain
    'seize.'
- source_word: ገጸ ቅዱሳን
  chosen: the face of the holy ones
  alternatives:
  - the faces of the holy ones
  - the presence of the holy ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular 'face' with a plural referent is a common Semitic-style
    expression. 'Look upon the face of' preserves the idiom and its solemnity better
    than reducing it to 'presence.'
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed Enochic divine title. 'Lord of Spirits' preserves the
    established title-form and avoids unnecessary expansion.
- source_word: አርአየ ብርሃኖ
  chosen: has caused his light to appear
  alternatives:
  - has revealed his light
  - has shown his light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is causative/showing language. 'Has caused his light to appear'
    preserves the manifestation imagery and avoids flattening it into a merely cognitive
    'revealed.'
- source_word: በገጸ ቅዱሳን ጻድቃን ወኅሩያን
  chosen: on the face of the holy, the righteous, and the chosen
  alternatives:
  - upon the faces of the holy, righteous, and chosen ones
  - before the holy, righteous, and chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase likely describes divine light shining upon or being manifest
    on the countenance of God's people. 'On the face of' keeps the concrete imagery.
    The three descriptors are retained distinctly rather than collapsed, since these
    are key Enochic identity terms.
