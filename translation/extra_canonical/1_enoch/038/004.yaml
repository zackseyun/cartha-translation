theological_decisions:
- issue: Identity and force of the judged group
  chosen_reading: The verse refers to earthly elites or rulers now dispossessed from
    access to the vindicated holy ones.
  alternative_readings:
  - A more general reference to all arrogant sinners
  - A specifically political reference to kings and landholders
  rationale: The paired terms 'mighty' and 'exalted' plus 'who possess the earth'
    point most naturally to dominant earthly powers. The translation keeps this broad
    enough to include rulers and oppressive elites without narrowing beyond the Ge'ez.
  doctrine_reference: Preserve local apocalyptic rhetoric without over-harmonizing.
- issue: Meaning of the light appearing on the face of the holy/righteous/chosen
  chosen_reading: The Lord's light is manifested upon the vindicated community, marking
    their honor and reversal before judgment.
  alternative_readings:
  - The light appears before them
  - The light is reflected from their faces
  rationale: The Ge'ez wording most directly supports visible manifestation on their
    face(s). This preserves the apocalyptic imagery of vindication rather than reducing
    it to abstract favor.
  doctrine_reference: Preserve theological tension and imagery rather than resolving
    it into paraphrase.
