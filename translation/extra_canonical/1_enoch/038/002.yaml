theological_decisions:
- issue: Meaning of the difficult phrase about the deeds of the righteous/chosen
  chosen_reading: Rendered as 'whose deeds hang upon the Lord of Spirits'
  alternative_readings:
  - whose deeds depend on the Lord of Spirits
  - whose deeds are upheld before the Lord of Spirits
  rationale: The Ge'ez wording is unusual and the Parables lack external textual control here. The main text preserves the concrete metaphor rather than resolving it into a smoother doctrinal statement. A footnote records the more interpretive alternative.
  doctrine_reference: Preserve theological tension rather than resolve it; Parables require extra restraint due to Ge'ez-only status.
- issue: Reference of 'dry ground'
  chosen_reading: Kept literally as 'dry ground'
  alternative_readings:
  - earth
  - land
  rationale: Although the phrase likely refers to the inhabited world, the literal wording preserves the cosmological texture of the vision and avoids flattening the image into generic 'earth.'
  doctrine_reference: Do not flatten apocalyptic imagery; optimal equivalence with documented exception.
