  from: and he will show light
  to: and light will appear
  rationale: 'Adjudicator-modified: The reviewer is correct that `ብርሃን` (bərhān) is in the nominative/absolutive case, not the accusative (`ብርሃነ`, bərhāna), making it the subject of the verb rather than the direct object. Furthermore, the verb `አስተርአየ` (ʾastaraʾaya, imperfect `ያስተርኢ`) is an ast-stem typically meaning ''to appear'' or ''to be seen,'' not the causative ''to show'' (which would be `አርአየ`, ʾarʾaya). Therefore, ''light'' is the subject. I have modified the proposed rewrite to ''and light will appear'' to maintain tense consisten'
