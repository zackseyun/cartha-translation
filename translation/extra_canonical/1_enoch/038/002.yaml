translation:
  text: And when righteousness appears on the faces of the righteous, the chosen ones, whose deeds hang upon the Lord of Spirits; and light will appear to the righteous and to the chosen, who dwell on the dry ground. Where then is the dwelling of sinners, and where the resting-place of those who denied the Lord of Spirits? It would have been better for them had they not been born.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'whose deeds hang upon the Lord of Spirits' is difficult. It may mean that their deeds depend on him or are upheld before him.
    reason: lexical_alternative
  - marker: b
    text: '''Dry ground'' is a literal rendering; it likely refers to the inhabited land in contrast to the cosmic waters.'
    reason: cultural_note
  - marker: c
    text: Or 'And righteousness will appear'.
    reason: previous_rendering
  - marker: d
    text: Or 'and he will show light'.
    reason: previous_rendering
lexical_decisions:
- source_word: ያስተርኢ
  chosen: will appear / will show
  alternatives:
  - will be revealed
  - will make visible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb occurs twice with slightly different objects. With 'righteousness' and 'on the faces' it is best rendered intransitively in English as 'will appear'; with 'light' and indirect objects it naturally takes the causative sense 'will show.' This preserves the repeated Ge'ez verb while keeping idiomatic English.
- source_word: ጽድቅ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the term marks the manifested vindication and moral rightness of God's people, not primarily social justice. 'Righteousness' also preserves a key Enochic term consistently.
- source_word: በገጾሙ
  chosen: on the faces of them
  alternatives:
  - in their presence
  - upon their countenances
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The imagery is concrete and visionary. 'On the faces of' keeps the visible, embodied manifestation rather than abstracting it.
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for consistency with Enochic usage and the project's handling of righteousness language.
- source_word: ኅሩያን
  chosen: the chosen ones
  alternatives:
  - the elect
  - the chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Chosen ones'' is transparent modern English and avoids importing later tradition-laden ''elect'' language while preserving the apocalyptic group designation.'
- source_word: ተግባሮሙ ስቁል በእግዚአ መናፍስት
  chosen: whose deeds hang upon the Lord of Spirits
  alternatives:
  - whose works depend on the Lord of Spirits
  - whose deeds are weighed by the Lord of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult. The adjective/participle from the root behind 'hang' or 'be suspended' is rendered concretely as 'hang upon,' preserving the unusual image rather than normalizing it to a generic theological abstraction. 'Depend on' is possible but less vivid; 'weighed by' is too interpretive.
- source_word: ብርሃን
  chosen: light
  alternatives:
  - brightness
  - radiance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Light'' is the basic and theologically resonant term; no need to heighten it unless context demands.'
- source_word: የኃድሩ ዲበ የብስ
  chosen: who dwell on the dry ground
  alternatives:
  - who live upon the earth
  - who inhabit the dry land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez points specifically to dry land/ground rather than the more general 'earth.' Retaining 'dry ground' preserves the concrete cosmological imagery, though it likely functions as a way of speaking of the inhabited world.
- source_word: መኃደሪ
  chosen: dwelling
  alternatives:
  - habitation
  - abode
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering that preserves the judgment question about where sinners belong.
- source_word: ምዕራፎሙ
  chosen: resting-place
  alternatives:
  - refuge
  - repose
  - rest
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun suggests a place of rest or repose. 'Resting-place' keeps the locative force parallel to 'dwelling.'
- source_word: ክሕድዎ
  chosen: denied
  alternatives:
  - rejected
  - disowned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Denied'' best matches the direct object construction with ''the Lord of Spirits'' and preserves the judicial-religious force.'
- source_word: እምኃየሶሙ ሶበ ኢተወልዱ
  chosen: It would have been better for them had they not been born
  alternatives:
  - better for them if they had not come to life
  - better for them had they never been begotten
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This idiom expresses a severe judgment formula. The chosen rendering is clear, idiomatic, and faithful without importing later canonical phrasing beyond what the Ge'ez itself warrants.
