translation:
  text: 'The first parable: when the assembly of the righteous is revealed, and the
    sinners are judged for their sins, and are driven away from the face of the dry
    ground.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from the face of the dry ground.' The phrase may idiomatically
      mean 'from the face of the earth' or 'from the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ምሳሌ
  chosen: parable
  alternatives:
  - similitude
  - figure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Parables section this term functions as the heading/designation
    for a visionary discourse. 'Parable' is the most transparent English equivalent,
    while 'similitude' is traditional but less natural in modern English.
- source_word: ቀዳማ፲
  chosen: the first
  alternatives:
  - first
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal marking introducing the first discourse in the section; English
    article added for natural syntax.
- source_word: ሶበ
  chosen: when
  alternatives:
  - at the time when
  - whenever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal conjunction introducing the scene of judgment; 'when' preserves
    the straightforward temporal force.
- source_word: ያስተርኢ
  chosen: is revealed
  alternatives:
  - appears
  - is shown
  - is made manifest
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Passive sense fits the context: the righteous assembly comes into open
    manifestation. ''Is revealed'' preserves apocalyptic disclosure language without
    over-paraphrase.'
- source_word: ማኅበረ ጻድቃን
  chosen: the assembly of the righteous
  alternatives:
  - the congregation of the righteous
  - the company of the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A collective gathering is in view. 'Assembly' is elevated but readable
    and preserves the communal sense better than a looser 'company'.
- source_word: ወይትኴነኑ
  chosen: and ... are judged
  alternatives:
  - and ... are condemned
  - and ... are brought to judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes judicial action. 'Are judged' keeps the formal judgment
    scene primary; 'condemned' would resolve the outcome too explicitly in the main
    text.
- source_word: ኃጥኣን
  chosen: the sinners
  alternatives:
  - the sinful
  - sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Substantival plural referring to the wicked as a class. 'The sinners'
    preserves the marked category language of apocalyptic judgment.
- source_word: በኃጢአቶሙ
  chosen: for their sins
  alternatives:
  - because of their sins
  - in their sins
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition here most naturally marks the ground or basis of judgment.
    'For their sins' is concise and judicial in tone.
- source_word: ወእምገጸ የብስ
  chosen: from the face of the dry ground
  alternatives:
  - from the face of the earth
  - from the surface of the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez wording is more literally 'from the face of the dry ground/land.'
    I preserved the concrete imagery rather than smoothing it to simply 'earth,' while
    noting the more idiomatic alternative in a footnote.
- source_word: ይትሀወዙ
  chosen: are driven away
  alternatives:
  - are removed
  - are banished
  - depart
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is punitive expulsion from the inhabited world. 'Are driven
    away' preserves the passive force and judgment imagery better than the weaker
    'depart'.
