theological_decisions:
- issue: Whether the judgment verb should be rendered as neutral 'judged' or outcome-specific
    'condemned'
  chosen_reading: judged
  alternative_readings:
  - condemned
  - brought to judgment
  rationale: The verse presents a judicial scene and expulsion, but the verb itself
    need not be made more explicit than the Ge'ez requires. The punitive result is
    already conveyed by the following clause.
  doctrine_reference: Preserve theological tension rather than resolve it.
