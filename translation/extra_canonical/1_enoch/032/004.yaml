- timestamp: '2026-04-22T18:57:06Z'
  adjudicator: auto_apply_tier2_source_grounded
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/032/004.job-72327.json
  category: mistranslation
  tier: 2
  from: tamarind
  to: the carob tree
  rationale: The Ge'ez ሐመረ ጽራእ is a known rendering of the Greek κερατία (carob tree), which is explicitly attested in the surviving Greek fragment for this verse. Dillmann's Lexicon (col. 80) identifies it as Ceratonia siliqua (carob). 'Tamarind' is a mistranslation. Footnote 'a' should also be removed or corrected, as the botanical identification is secure.
- timestamp: '2026-04-22T18:57:06Z'
  adjudicator: auto_apply_tier2_source_grounded
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/032/004.job-72327.json
  category: mistranslation
  tier: 2
  from: like clusters of good grapes
  to: like clusters of grapes, very beautiful
  rationale: The Ge'ez ጥቀ (ṭeqqa) is an adverb meaning 'very' or 'exceedingly,' modifying ሠናይ ('good' or 'beautiful'). The draft omits 'very' entirely. The Greek fragment confirms this with καλοὶ λίαν ('very beautiful').
