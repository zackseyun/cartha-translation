translation:
  text: And it looked like the carob tree, and its fruit was like clusters of grapes, very beautiful; and the fragrance of that tree spread far away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The tree name rendered 'tamarind' reflects a traditional identification of the Ge'ez expression, but the exact botanical species is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Literally, the fruit is compared with vine-fruit; 'clusters of good grapes' expresses the likely sense in idiomatic English.
    reason: lexical_alternative
  - marker: c
    text: Or 'tamarind'.
    reason: previous_rendering
  - marker: d
    text: Or 'like clusters of good grapes'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይመስል
  chosen: it looked like
  alternatives:
  - it resembled
  - it appeared as
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb marks visual resemblance in Enoch's travel description; 'looked like' is natural English while preserving the comparative force.
- source_word: ሐመረ ጽራእ
  chosen: tamarind
  alternatives:
  - a tamarind tree
  - a named aromatic tree of uncertain identification
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired expression is commonly taken as the name of a tree. Because the verse compares appearance and then separately mentions fruit and fragrance, rendering it as a specific tree name best fits the syntax, though the exact botanical identification may be uncertain.
- source_word: ፍሬሁ
  chosen: its fruit
  alternatives:
  - its produce
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the fruit of a tree; concrete and contextually straightforward.
- source_word: ከመ እስካለ ወይን
  chosen: like clusters of ... grapes
  alternatives:
  - like the fruit of a vine
  - like bunches of grapes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison is to vine-fruit; 'clusters of grapes' makes the image idiomatic in English while preserving the agricultural comparison.
- source_word: ሠናይ
  chosen: good
  alternatives:
  - fine
  - pleasant
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A simple positive qualifier; 'good' preserves the broad evaluative sense without overinterpreting as taste alone.
- source_word: ጥቀ
  chosen: fragrance
  alternatives:
  - scent
  - odor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of a remarkable tree in a paradisal landscape, 'fragrance' better conveys a pleasing aromatic quality than the more neutral 'odor'.
- source_word: ወጼናሁ
  chosen: spread
  alternatives:
  - went forth
  - issued out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb describes the emanation of the tree's scent; 'spread' is readable and preserves the outward movement.
- source_word: ለውእቱ ዕፅ
  chosen: of that tree
  alternatives:
  - from that tree
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase identifies the source of the fragrance. 'Of that tree' reads smoothly in English while keeping the demonstrative force.
- source_word: የሐውር ነዋኃ
  chosen: far away
  alternatives:
  - to a great distance
  - afar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates extension over distance. 'Far away' is clear modern English and preserves the wonder of the scene.
