translation:
  text: And I came into the garden of righteousness, and I saw beyond those trees
    many large trees growing there, with good fragrance, great and very beautiful
    and glorious; and the tree of wisdom, from which those who eat know great wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The spatial phrase rendered 'beyond those trees' is difficult in the Ethiopic
      witness and could also be understood more generally as 'among' or 'beside' those
      trees.
    reason: textual_variant
  - marker: b
    text: The final clause states that eating from this tree results in knowing 'great
      wisdom'; the wording intentionally echoes sacred-garden imagery without repeating
      the exact Genesis expression.
    reason: cross_reference
  - marker: c
    text: Or 'great and very beautiful'.
    reason: previous_rendering
lexical_decisions:
- source_word: ገነት ጽድቅ
  chosen: the garden of righteousness
  alternatives:
  - the paradise of righteousness
  - the garden of justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ገነት commonly denotes a garden or paradise; 'garden' is preferred for
    accessible English while preserving Edenic imagery. ጽድቅ is rendered 'righteousness'
    rather than 'justice' because the phrase describes the moral quality of the place
    in this visionary setting.
- source_word: ከሐክቲሆሙ ለእልክቱ ዕፀው
  chosen: beyond those trees
  alternatives:
  - among those trees
  - beside those trees
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional expression is somewhat difficult in the OCR witness.
    'Beyond those trees' best fits the sense of Enoch seeing further into the garden
    after entering it, while preserving the spatial progression of the vision.
- source_word: ዕፀወ ብዙኃነ ወዐቢይነ ይበቍሉ
  chosen: many large trees growing
  alternatives:
  - many great trees sprouting
  - numerous tall trees were growing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዕፀወ refers to trees/wooded growth; ብዙኃነ and ዐቢይነ together emphasize both
    number and size. ይበቍሉ is a growth verb, so 'growing' keeps the vividness without
    over-translating.
- source_word: ጼናሆሙ ሠናይ
  chosen: with good fragrance
  alternatives:
  - their scent was pleasant
  - their aroma was good
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun refers to smell/fragrance. 'With good fragrance' stays close
    to the Ge'ez structure and preserves the sensory richness of the garden.
- source_word: ዐቢያን ወሥናሙ ብዙኅ ወስቡሓን
  chosen: great and very beautiful
  alternatives:
  - lofty and exceedingly lovely
  - large and glorious
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This cluster piles up terms of magnitude and splendor. 'Great and very
    beautiful' preserves both size and beauty in natural English; 'glorious' was considered
    but could over-spiritualize what is still concrete visionary description.
- source_word: ዕፀ ጥበብ
  chosen: the tree of wisdom
  alternatives:
  - the wisdom-tree
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward construct phrase. 'Tree of wisdom' preserves the allusive
    force to primordial sacred-tree imagery without importing later doctrinal language.
- source_word: ዘእምኔሁ በሊዖሙ ይአምርዋ ለጥበብ ዐቢይ
  chosen: from which, if they eat, they know great wisdom
  alternatives:
  - from which, when they eat, they come to know great wisdom
  - from which, by eating, they learn great wisdom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses the result of eating from the tree. 'If they eat,
    they know' keeps the conditional/result nuance and the terse apocalyptic style.
    'Know great wisdom' is preferred over 'become wise' because the object ጥበብ remains
    explicit in the Ge'ez.
