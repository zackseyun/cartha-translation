theological_decisions:
- issue: Relation of the wisdom tree to Edenic imagery
  chosen_reading: Render the phrase plainly as 'the tree of wisdom' without importing
    Genesis-specific wording such as 'tree of the knowledge of good and evil.'
  alternative_readings:
  - the tree of knowledge
  - the tree that gives wisdom
  rationale: The verse clearly evokes primordial garden imagery, but the Ge'ez names
    the tree by wisdom terminology, not by the fuller Genesis formula. Preserving
    the local wording respects the text's own theological presentation and avoids
    harmonization.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
