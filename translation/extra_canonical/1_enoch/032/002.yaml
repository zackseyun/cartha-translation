translation:
  text: And from there I went above the summits of those mountains, far to the east,
    and I crossed over the Erythraean Sea; and I went far from it, and passed above
    the angel Zutel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Red Sea.' The ancient name 'Erythraean Sea' may refer more broadly
      than the modern Red Sea.
    reason: lexical_alternative
  - marker: b
    text: The angel's name may be vocalized differently in other editions or translations,
      such as 'Zutael.'
    reason: textual_variant
  - marker: c
    text: The clause rendered 'I went far from it' is difficult in the Ethiopic witness;
      the sense is continued travel away from the sea.
    reason: textual_variant
lexical_decisions:
- source_word: መልዕልተ
  chosen: above
  alternatives:
  - over
  - up above
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional sense is spatial and repeated twice in the verse. 'Above'
    preserves the elevated visionary movement without over-interpreting whether Enoch
    travels directly over or merely beyond the objects named.
- source_word: ርእሶሙ
  chosen: their summits
  alternatives:
  - their heads
  - their tops
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'their heads,' but in reference to mountains this idiom naturally
    means 'summits' or 'tops.' 'Summits' is idiomatic English while preserving the
    concrete mountain imagery.
- source_word: ለእልኩ አድባር
  chosen: of those mountains
  alternatives:
  - of those hills
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: አድባር denotes mountains/hills; in this visionary travel context 'mountains'
    better matches the grandeur of the scene. The demonstrative force of እልኩ is retained
    with 'those.'
- source_word: እንዘ ርሑቅ ውእቱ ለጽባሕ
  chosen: far to the east
  alternatives:
  - while it was far eastward
  - which was far toward the sunrise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጽባሕ here refers to the east/sunrise region rather than morning time.
    The clause marks direction and distance, so 'far to the east' gives clear English
    without losing the cosmological orientation.
- source_word: ባሕረ ኤርትራ
  chosen: the Erythraean Sea
  alternatives:
  - the Red Sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez preserves the traditional ancient geographical name. 'Erythraean
    Sea' is more formally accurate and avoids prematurely narrowing the reference
    to the modern Red Sea alone.
- source_word: ተከንኩ
  chosen: I went far
  alternatives:
  - I journeyed away
  - I withdrew
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is somewhat uncertain in OCR and context, but the following
    phrase ወእምኔሁ ርሑቀ suggests movement to a distant point from the sea. 'I went far'
    is transparent and restrained.
- source_word: መልአክ ዙጥኤል
  chosen: the angel Zutel
  alternatives:
  - the angel Zutael
  - the angel Zutiel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal names are transliterated rather than translated. Given the Ethiopic
    spelling, 'Zutel' is a conservative transliteration, while variant vocalizations
    are noted in a footnote.
