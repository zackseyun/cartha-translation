theological_decisions:
- issue: Elliptical direct speech in a fragmentary-looking verse
  chosen_reading: 'Supply an English copula and implicit subject: ''It is beautiful.'''
  alternative_readings:
  - '''Good!'''
  - '''Beautiful!'''
  - '''It is good.'''
  rationale: The Ge'ez witness gives only a brief evaluative utterance after 'I said.'
    English normally requires either an exclamation or a clause. 'It is beautiful'
    preserves the likely sense without overexpanding the line. 'Good' is possible,
    but 'beautiful' better suits visionary description and avoids sounding morally
    evaluative where aesthetic admiration may be intended.
