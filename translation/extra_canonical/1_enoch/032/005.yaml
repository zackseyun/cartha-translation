lexical_decisions:
- source_word: ወእቤ
  chosen: And I said
  alternatives:
  - and I spoke
  - then I said
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The conjunction ወ commonly carries simple narrative continuation, and
    እቤ is the first-person singular preterite of 'to say/speak.' In this brief visionary
    exchange, 'And I said' preserves the narrative sequence and directness.
- source_word: ሠናይዝ
  chosen: It is beautiful
  alternatives:
  - good
  - pleasant
  - fine
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears to derive from ሠናይ, 'good, beautiful, pleasant.' Because
    the verse as transmitted is extremely short and likely elliptical in direct speech,
    an English predicate is required for intelligibility. 'Beautiful' best fits the
    immediate visionary/travel context, where Enoch is reacting to what he sees, while
    still preserving the evaluative force of the Ge'ez.
