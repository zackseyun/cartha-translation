translation:
  text: And I said, “It is beautiful.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Ge''ez text is very brief: literally, ''and I said: good/beautiful.''
      English supplies ''it is'' for clarity. ''Good'' is also possible.'
    reason: lexical_alternative
  - marker: b
    text: Or 'And I said, “It is beautiful.”'.
