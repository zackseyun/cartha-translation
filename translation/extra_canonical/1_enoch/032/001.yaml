translation:
  text: And after these spices, toward the north, as I looked over the mountains, I saw seven mountains full of choice nard and fragrant trees, and cinnamon and pepper.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The expression rendered 'choice nard' is uncertain; it likely refers to a costly aromatic plant or spice. A broader rendering such as 'choice spices' is possible.
    reason: lexical_alternative
  - marker: b
    text: The Ge'ez lists luxury aromatics in sequence, underscoring the abundance and exotic character of the visionary landscape rather than giving a modern botanical inventory.
    reason: cultural_note
  - marker: c
    text: Or 'And after these, toward the south, as I looked, I saw seven mountains'.
    reason: previous_rendering
lexical_decisions:
- source_word: እምድኅረ እሉ
  chosen: after these
  alternatives:
  - after this
  - after those things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal transition formula. The plural demonstrative naturally points back to the preceding visionary scenes, so 'after these' preserves the sequence without over-expanding.
- source_word: አፈው ለመስዕ
  chosen: toward the south
  alternatives:
  - to the south
  - southward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Directional phrase introducing the next region of the vision. 'Toward the south' is idiomatic and keeps the spatial movement of the apocalyptic tour.
- source_word: እንዘ እኔጽር
  chosen: as I looked
  alternatives:
  - while I was looking
  - as I gazed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A participial construction marking ongoing visual attention in a vision report. 'As I looked' is concise and preserves the immediacy of the seer's observation.
- source_word: መልዕልተ አድባር
  chosen: mountains
  alternatives:
  - high mountains
  - heights of mountains
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase includes an idea of elevation, but since mountains are inherently elevated and the verse already stresses number and abundance, the simpler 'mountains' avoids clumsy redundancy in English.
- source_word: ፯አድባረ
  chosen: seven mountains
  alternatives:
  - seven hills
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral is explicit and should be preserved. 'Mountains' better fits the grand visionary geography than 'hills.'
- source_word: ምሉኣነ
  chosen: full of
  alternatives:
  - filled with
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This adjective governs the list of aromatic growth. 'Full of' is natural English and preserves the sense of abundance.
- source_word: ሰንብላተ ቅድዋተ
  chosen: choice nard
  alternatives:
  - sweet spice
  - precious spikenard
  - aromatic plants
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to denote a prized aromatic plant or spice. Because the verse lists luxury aromatics alongside cinnamon and pepper, 'nard' best preserves the concrete botanical sense; 'choice' reflects the qualifying adjective without over-specifying.
- source_word: ዕፀ መዓዛ
  chosen: fragrant trees
  alternatives:
  - trees of fragrance
  - aromatic wood
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'trees/wood of fragrance.' 'Fragrant trees' is clear, concrete, and keeps the imagery of a luxuriant scented landscape.
- source_word: ቀናንሞን
  chosen: cinnamon
  alternatives:
  - cinnamom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A loanword for the spice cinnamon. The standard English form is transparent and appropriate.
- source_word: ፐፐሬ
  chosen: pepper
  alternatives:
  - piper
  - peppercorn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Another spice loanword. 'Pepper' is the straightforward English equivalent and fits the sequence of exotic aromatics.
