  category: mistranslation
  tier: 2
  from: And after these, toward the south, as I looked, I saw seven mountains
  to: And after these spices, toward the north, as I looked over the mountains, I saw seven mountains
  rationale: 'Three major errors occur in this clause: 1) አፈው (ʾafaw) means ''spices'' or ''aromatics'' and is completely omitted; 2) ለመስዕ (la-masʿ) means ''to the north'', not ''toward the south'' (which would be አዜብ); 3) መልዕልተ አድባር (malʿəlta ʾadbar, ''over/above the mountains'') is omitted after ''as I looked''. The author explicitly describes looking over one set of mountains to see the next seven mountains; omitting this flattens the visionary geography.'
