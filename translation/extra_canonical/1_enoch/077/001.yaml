translation:
  text: And they call the first wind the eastern one, because it is the first; and they call the second the south, because the Most High descends there, and there especially the Blessed One descends forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The wording of the second half is difficult. The Ge'ez appears to say that the south is so called because 'the Most High descends there,' with an added intensifying phrase before the closing doxology.
    reason: textual_variant
  - marker: b
    text: '''The eastern one'' is literally a term related to dawn or morning, used here for the eastern direction.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he descends, blessed forever'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይጼውዕዎ
  chosen: they call
  alternatives:
  - they name
  - it is called
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes naming/calling. Active 'they call' preserves the impersonal descriptive style of the astronomical exposition better than an English passive.
- source_word: ለነፋስ
  chosen: the wind
  alternatives:
  - the quarter-wind
  - the region of wind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic sense is 'wind.' In this chapter the winds function as directional cosmic regions, but 'wind' should be retained in the main text to preserve the imagery.
- source_word: ቀዳማዊ
  chosen: the first
  alternatives:
  - first
  - foremost
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straight ordinal sense; repeated in the explanatory clause, so the English keeps the repetition.
- source_word: ለጽባሓዊ
  chosen: the eastern one
  alternatives:
  - the east
  - the one of the sunrise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Derived from morning/dawn imagery and used directionally. 'Eastern one' keeps the adjectival force and the cosmological flavor better than the flatter 'east'.
- source_word: እስመ
  chosen: because
  alternatives:
  - for
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Causal conjunction introducing the explanation for the name.
- source_word: ውእቱ
  chosen: it is
  alternatives:
  - it is he/that
  - this is
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Copular pronoun; here it supports the explanatory statement 'it is the first.'
- source_word: ለካልእ
  chosen: the second
  alternatives:
  - the other
  - the next
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this enumerative context the sense is ordinal, 'the second,' not merely 'another.'
- source_word: አዜብ
  chosen: the south
  alternatives:
  - the south wind
  - the southern quarter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Directional term for the south/southern region. 'South' is the clearest English equivalent, while the surrounding mention of wind preserves the broader cosmological frame.
- source_word: ልዑል
  chosen: the Most High
  alternatives:
  - the Exalted One
  - the Highest
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A divine title. 'The Most High' is the most natural and recognizable English rendering and preserves the elevated register without importing specifically later Christian phrasing.
- source_word: ህየ
  chosen: there
  alternatives:
  - in it
  - therein
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Locative adverb referring to the southern region. Repeated twice in the verse, so the English reflects that repetition.
- source_word: ይወርድ
  chosen: descends
  alternatives:
  - comes down
  - goes down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally means 'descends/comes down.' 'Descends' preserves the vertical, theophanic imagery appropriate to apocalyptic cosmology.
- source_word: ወፈድፋደ
  chosen: and there especially
  alternatives:
  - and more abundantly
  - and in addition
  - and more than that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult, but it appears to intensify or add emphasis to the repeated statement. 'There especially' captures the adverbial intensification without overcommitting to a more specific nuance not secure from the witness alone.
- source_word: ቡሩክ
  chosen: blessed
  alternatives:
  - blessing
  - blessed be he
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely a doxological adjective/predicate attached to the divine reference. Rendering it as 'blessed' preserves the compact liturgical flavor.
- source_word: ለዓለም
  chosen: forever
  alternatives:
  - for eternity
  - for the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard idiom for enduring duration. 'Forever' is idiomatic and suitably elevated.
