- source_word: ነፋስ
  chosen: wind
  alternatives:
  - spirit
  - breath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term refers to cosmic winds/directions
    rather than spirit or breath; 'wind' preserves the cosmological imagery.
- source_word: ዘስሙ መስዕ
  chosen: whose name is Mesʿ
  alternatives:
  - called Mesʿ
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase explicitly gives the wind's name. The proper name is transliterated
    rather than translated, following project policy for names.
- source_word: ይትከፈል ሠለስተ ክፍለ
  chosen: is divided into three parts
  alternatives:
  - is apportioned in three divisions
  - is split into three sections
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive verbal form plus 'three parts/divisions' describes a tripartite
    distribution of this wind's domain.
- source_word: አሐዱ እምኔሆሙ
  chosen: one part
  alternatives:
  - one of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though literally 'one from among them,' in context it introduces the
    first of the three divisions, so 'one part' is the clearest English.
- source_word: ማኅደር ለሰብእ
  chosen: for a dwelling for humankind
  alternatives:
  - for the habitation of men
  - as a dwelling for people
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ማኅደር denotes dwelling-place or habitation. 'Humankind' avoids unnecessarily
    male-specific language while preserving the collective human reference.
- source_word: አብሕርት ማይ
  chosen: the seas of water
  alternatives:
  - the water-seas
  - the seas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is somewhat pleonastic in English, but 'seas of water' preserves
    the emphatic Ge'ez construction better than reducing it simply to 'seas'.
- source_word: ቀላያት
  chosen: the valleys
  alternatives:
  - ravines
  - wadis
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely refers to low-lying hollows or valleys. 'Valleys' is the most
    natural elevated English without over-specifying terrain.
- source_word: ፆም
  chosen: the wilderness
  alternatives:
  - the desert
  - the dry land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes desolate or desert region. 'Wilderness' fits the elevated
    register and broad geographic sense.
- source_word: አፍላግ
  chosen: the rivers
  alternatives:
  - streams
  - watercourses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard term for rivers or flowing channels; 'rivers' is the clearest
    default.
- source_word: ጽልመት
  chosen: darkness
  alternatives:
  - gloom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retained literally to preserve the cosmic scope of the wind's domain,
    extending beyond ordinary geography.
- source_word: ጊሜ
  chosen: mist
  alternatives:
  - cloud
  - fog
  - haze
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact nuance is somewhat uncertain, but it appears to denote a vaporous
    atmospheric phenomenon. 'Mist' best fits the sequence with darkness and natural
    regions.
- source_word: ሠልስ ክፍል
  chosen: the third part
  alternatives:
  - the third division
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the final of the three divisions in parallel with the first.
- source_word: ገነት ጽድቅ
  chosen: the garden of righteousness
  alternatives:
  - the paradise of righteousness
  - the righteous garden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered literally. 'Garden' preserves the Edenic/apocalyptic image,
    while 'of righteousness' keeps the genitival quality without interpretive expansion.
