translation:
  text: 'And the fourth wind, whose name is Mesʿ, is divided into three parts: one
    part for a dwelling for humankind, and another over the seas of water, and over
    the valleys, and over the wilderness, and over the rivers, and over darkness,
    and over mist; and the third part is in the garden of righteousness.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The name 'Mesʿ' is transliterated from the Ge'ez; its meaning is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'seas of water' is literal and may simply mean 'the seas,' but
      the fuller wording has been retained to reflect the Ge'ez.
    reason: lexical_alternative
  - marker: c
    text: The term rendered 'mist' is uncertain and could also be understood as 'fog,'
      'cloud,' or a similar atmospheric vapor.
    reason: lexical_alternative
  - marker: d
    text: '''Garden of righteousness'' may evoke Eden or Paradise, but the translation
      keeps the Ge''ez expression without specifying the identification.'
    reason: cross_reference
lexical_decisions:
- source_word: ራብዕ
  chosen: the fourth
  alternatives:
