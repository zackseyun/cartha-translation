translation:
  text: And the two of them come from the west as far as the sea, and they pour out
    their waters into the Erythraean Sea in the east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally 'from noon'; in geographical description this likely means 'from
      the south.'
    reason: lexical_alternative
  - marker: b
    text: The Ge'ez reads 'the sea of Erythra/Red Sea, east.' This may refer to the
      Red Sea or a broader 'Erythraean Sea' conception in ancient geography.
    reason: cultural_note
  - marker: c
    text: Or 'from noon'.
    reason: previous_rendering
  - marker: d
    text: Or 'into the eastern sea'.
    reason: previous_rendering
lexical_decisions:
- source_word: ክልኤቱ፡ ክልኤ፡
  chosen: the two of them
  alternatives:
  - the two
  - both of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The doubled form emphasizes a pair. English 'the two of them' preserves
    the explicit dual sense without overloading the line.
- source_word: ይመጽኡ፡
  chosen: come
  alternatives:
  - arrive
  - go forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward motion verb is most natural here. 'Come' fits the narrative
    description of the rivers' course.
- source_word: እመስዕ፡
  chosen: from noon
  alternatives:
  - from the south
  - from midday
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez term can denote midday/noon and by extension the south. In
    cosmographic description, cardinal direction is likely intended, but 'noon' reflects
    the literal sense and preserves the traditional directional idiom.
- source_word: እስከ፡ ባሕር፡
  chosen: as far as the sea
  alternatives:
  - to the sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks extent or destination. 'As far as the sea' keeps
    the sense of reaching the sea.
- source_word: ወይከዕዉ፡ ማዮሙ፡
  chosen: they pour out their waters
  alternatives:
  - they empty their waters
  - their waters flow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests casting or pouring out. 'Pour out' preserves the vivid
    hydrological imagery better than the flatter 'flow.'
- source_word: በባሕረ፡ ኤርትራ፡ እምሥራቅ።
  chosen: into the eastern sea
  alternatives:
  - into the Red Sea in the east
  - into the Erythraean Sea, eastward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally names the Erythraean/Red Sea with an eastern qualifier.
    Because the cosmographic reference may not map neatly onto modern geography, 'the
    eastern sea' gives a clear main text rendering while preserving the directional
    force; the more specific identification is noted in a footnote.
