lexical_decisions:
- source_word: አፍላገ
  chosen: rivers
  alternatives:
  - streams
  - watercourses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural noun denotes rivers/streams. 'Rivers' best fits the cosmic-geographical description and the comparison with 'all the rivers.'
- source_word: ዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - over the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward locative phrase. 'Upon the earth' preserves the elevated register of the visionary report without obscuring meaning.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary verb. 'I saw' is clear modern English and preserves the report format.
- source_word: ዓበይተ እምኵሎሙ አፍላገ
  chosen: greater than all the rivers
  alternatives:
  - larger than all the rivers
  - mightier than all the rivers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparative construction indicates surpassing the others in size or magnitude. 'Greater' keeps the broad sense without over-specifying volume or force.
- source_word: አሐዱ እምኔሆሙ
  chosen: one of them
  alternatives:
  - one among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A simple partitive expression introducing a particular river from the larger set.
- source_word: ይመጽእ እምዓረብ
  chosen: comes from the west
  alternatives:
  - proceeds from the west
  - comes out of the west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb plus source preposition marks origin. 'Comes from the west' is natural English and preserves directional geography.
- source_word: ውስተ ባሕር ዐቢይ
  chosen: into the Great Sea
  alternatives:
  - into the great sea
  - to the Great Sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase likely refers to the Mediterranean as a known geographical body. Capitalizing 'Great Sea' treats it as a geographic designation rather than a generic description.
- source_word: ይከዑ ማዮ
  chosen: pours its waters
  alternatives:
  - empties its waters
  - casts its waters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb describes the river's waters going into the sea. 'Pours its waters' is idiomatic English that preserves the concrete hydrological image.
