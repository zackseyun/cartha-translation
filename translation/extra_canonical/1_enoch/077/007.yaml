translation:
  text: And the four remaining ones go out by the north side to their own sea—two
    of them to the Eritrean Sea, and two to the Great Sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as far as their sea.' The Ge'ez preposition can mark extent as well
      as destination.
    reason: lexical_alternative
  - marker: b
    text: '''Eritrean Sea'' reflects the ancient geographical name in the Ethiopic
      witness; it may overlap with what some readers would call the Erythraean or
      Red Sea region.'
    reason: cultural_note
  - marker: c
    text: '''The Great Sea'' is a traditional ancient designation, commonly referring
      to the Mediterranean.'
    reason: cultural_note
  - marker: d
    text: The parenthetical repetition in the source witness around 'two ... and two'
      suggests either scribal disturbance or an emphatic division; the translation
      renders the apparent sense.
    reason: textual_variant
lexical_decisions:
- source_word: እለ ተርፉ
  chosen: the remaining ones
  alternatives:
  - those that were left
  - the rest
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks the residual group after a prior numerical division
    in the surrounding context. 'Remaining ones' preserves the counted, schematic
    sense better than the looser 'the rest.'
- source_word: አርባዕቱ
  chosen: four
  alternatives:
  - the four
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral is explicit and should remain explicit in English because
    the astronomical schema depends on counted groups.
- source_word: ይወፅኡ
  chosen: go out
  alternatives:
  - come forth
  - issue forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward motion verb fits the luminary-gate context. 'Go out'
    is clear modern English while preserving the directional imagery.
- source_word: በገቦ መስዕ
  chosen: by the north side
  alternatives:
  - at the northern quarter
  - through the north side
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the northern region/side. 'By the north side' keeps
    the spatial orientation without over-specifying a technical astronomical term
    not certain from this witness alone.
- source_word: እስከ ባሕረ ዚአሆሙ
  chosen: to their own sea
  alternatives:
  - as far as their sea
  - unto their sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: እስከ here is best taken as directional extent, and ዚአሆሙ indicates possession
    or association. 'To their own sea' preserves the odd, schematic wording rather
    than smoothing it away.
- source_word: ባሕረ ኤርትራ
  chosen: the Eritrean Sea
  alternatives:
  - the Red Sea
  - the Erythraean Sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez form is a transliterated geographical name cognate with Erythraean/Eritrean.
    'Eritrean Sea' stays close to the witness and avoids prematurely collapsing the
    ancient term into the narrower modern 'Red Sea.'
- source_word: ባሕር ዓቢይ
  chosen: the Great Sea
  alternatives:
  - the great sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A conventional ancient geographical designation, likely the Mediterranean,
    but the translation should preserve the source expression rather than substitute
    the modern name in the main text.
