theological_decisions:
- issue: Cosmological function of the mountains in relation to time
  chosen_reading: The verse links the seven lofty mountains with the emergence of frost and with the passing of calendrical time, without explaining a mechanistic cosmology.
  alternative_readings:
  - The mountains are literal earthly mountains only
  - The mountains symbolize heavenly regions that govern time
  rationale: The Ge'ez presents visionary geography and meteorological/time language side by side. The translation preserves that tension rather than resolving it into either pure symbolism or plain geography.
  doctrine_reference: Preserve theological tension rather than resolve it.
