translation:
  text: I saw seven high mountains, which are higher than all the mountains that are on the earth; and from them frost comes forth, and days and seasons and years And I saw seven high mountains, which are higher than all the mountains that are on the earth; and from them frost comes forth, and days and seasons and years pass..
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'days and times and years.' The Ge'ez term rendered 'seasons' can be understood more broadly as appointed times or periods.
    reason: lexical_alternative
  - marker: b
    text: The final clause uses ordinary language for time passing; here it refers to the elapsing of calendrical cycles, not to destruction.
    reason: cultural_note
  - marker: c
    text: Or 'And I saw'.
    reason: previous_rendering
  - marker: d
    text: Or 'pass away'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሰብዓተ
  chosen: seven
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward numeral; retained formally because the visionary count is part of the imagery.
- source_word: አድባረ
  chosen: mountains
  alternatives:
  - hills
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The common Ge'ez term for mountains/heights; 'mountains' best fits the cosmic topography of the Astronomical Book.
- source_word: ነዋኃነ
  chosen: high
  alternatives:
  - long
  - great
  - lofty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From a root of height/length; in context of mountains compared with all others on earth, 'high' or 'lofty' is the natural sense. 'High' is clearer modern English.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary report; 'I saw' preserves the repeated apocalyptic observation formula without archaism.
- source_word: እለ ይነውሑ እምኵሉ አድባር
  chosen: which are higher than all the mountains
  alternatives:
  - which are loftier than every mountain
  - which surpass all the mountains in height
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Comparative clause built from the same height-related root; rendered explicitly as a comparison of elevation.
- source_word: ውስተ ምድር
  chosen: on the earth
  alternatives:
  - in the earth
  - upon the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this cosmological context, 'on the earth' is idiomatic English and preserves the global scope of the comparison.
- source_word: ወእምኔሆሙ ይወፅእ
  chosen: and from them ... comes forth
  alternatives:
  - and out of them ... goes out
  - and from among them ... issues
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes emergence or issuing forth; 'comes forth' preserves the elevated register and physical imagery.
- source_word: አሰሐትያ
  chosen: frost
  alternatives:
  - hoarfrost
  - ice-cold mist
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best taken as frost/icy exhalation in this meteorological context. 'Frost' is the most natural English equivalent while preserving the luminaries-book weather imagery.
- source_word: ወየኀልፍ
  chosen: and ... pass away
  alternatives:
  - and ... pass by
  - and ... proceed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means to pass or go by. With temporal nouns following, 'pass away' or 'pass by' are possible; 'pass away' here means elapse, not perish.
- source_word: መዋዕለ ወዘመን ወዓመት
  chosen: days and seasons and years
  alternatives:
  - days and times and years
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A temporal triad. 'Seasons' is preferable to the broader 'times' because the Astronomical Book is concerned with calendrical divisions and cosmic cycles.
