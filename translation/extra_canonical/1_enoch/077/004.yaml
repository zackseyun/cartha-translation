  from: pass away
  to: And I saw seven high mountains, which are higher than all the mountains that are on the earth; and from them frost comes forth, and days and seasons and years pass.
  rationale: 'Adjudicator-modified: The Ge''ez verb ኀለፈ (ḫalafa) in the context of time simply means ''to elapse'' or ''to pass.'' While ''pass away'' was historically used for the passage of time, in modern English it strongly connotes death or permanent cessation. Changing this to ''pass'' accurately reflects the continuous calendrical cycle described in the Astronomical Book without introducing misleading connotations. ''Pass'' is slightly more natural than the reviewer''s ''pass by'' for the elapsing of seasons and years.'
