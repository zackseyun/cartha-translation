translation:
  text: And the wind from the west is named Hegulā, because there all the lights of heaven wane and go down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the luminaries of heaven are extinguished and descend.' The verb may denote being effaced or obscured, and 'go down' likely refers to their setting in the west.
    reason: lexical_alternative
  - marker: b
    text: Or 'are blotted out'.
    reason: previous_rendering
lexical_decisions:
- source_word: ነፋስ
  chosen: wind
  alternatives:
  - spirit
  - blast
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term refers to directional winds, not spirit; 'wind' preserves the cosmological setting.
- source_word: እምዕራብ
  chosen: from the west
  alternatives:
  - westward
  - of the west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition እም marks source/origin, so 'from the west' is the most direct rendering.
- source_word: ስሙ
  chosen: is named
  alternatives:
  - its name is
  - is called
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This idiom introduces the proper name of the wind. 'Is named' is concise and natural while preserving the naming formula.
- source_word: ኀጕላ
  chosen: Hegulā
  alternatives:
  - Ḥegulā
  - Hagula
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a proper name for the west wind and should be transliterated rather than translated, per project philosophy.
- source_word: በህየ
  chosen: there
  alternatives:
  - in that place
  - therein
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adverb points to the western region just mentioned; 'there' is the clearest English equivalent.
- source_word: የሐፅፁ፡
  chosen: are blotted out
  alternatives:
  - are extinguished
  - are wiped away
  - are hidden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to denote effacement or obscuring. In this astronomical context, 'are blotted out' preserves vivid imagery without over-interpreting as literal extinction.
- source_word: ኵሉ ብርሃናት ሰማይ
  chosen: all the lights of heaven
  alternatives:
  - all the luminaries of heaven
  - all the heavenly lights
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase refers to the heavenly lights in the Astronomical Book. 'Lights of heaven' is transparent and elevated; 'luminaries' is possible but slightly less natural for modern readers.
- source_word: ወይወርዱ
  chosen: and go down
  alternatives:
  - and descend
  - and set
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic sense is descent. 'Go down' preserves the concrete motion and avoids prematurely narrowing the image to the technical astronomical term 'set,' though that is likely implied.
