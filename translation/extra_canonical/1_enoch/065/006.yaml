translation:
  text: And a command went out from before the Lord against those who dwell on the
    dry land, that their end should come; for they knew all the hidden things of the
    angels, and all the violence of the satans, and all their secret power, and all
    the powers of those who practice sorcery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the presence of the Lord.' The Ge'ez expression is a reverential
      formula for something issuing from before God.
    reason: lexical_alternative
  - marker: b
    text: '''The satans'' renders a plural form, not the later singular proper name
      ''Satan.'''
    reason: lexical_alternative
  - marker: c
    text: The final words are difficult in this Ethiopic witness. The sense may be
      'all their hidden powers' or may refer to practitioners of hidden arts/sorcery.
    reason: textual_variant
lexical_decisions:
- source_word: ትእዛዝ
  chosen: command
  alternatives:
  - decree
  - order
  lexicon: Dillmann Lexicon
  rationale: The noun denotes an authoritative directive. 'Command' preserves the
    force of a pronouncement issuing from the divine presence without over-formalizing
    it as a legal 'decree'.
- source_word: ወጽአ እምቅድመ ገጸ እግዚአ
  chosen: went out from before the Lord
  alternatives:
  - came forth from before the Lord
  - went out from the presence of the Lord
  lexicon: Dillmann Lexicon
  rationale: This is a standard Semitic-style expression for an order proceeding from
    the divine presence. 'From before the Lord' keeps the apocalyptic register and
    the imagery of issuance from God's presence.
- source_word: ዲበ እለ የሐድሩ የብስ
  chosen: against those who dwell on the dry land
  alternatives:
  - upon those who inhabit the earth
  - against those who live on the land
  lexicon: Dillmann Lexicon
  rationale: የብስ literally refers to dry ground/land. In this flood-judgment context,
    'dry land' preserves the contrastive imagery better than the broader 'earth,'
    while 'against' fits the hostile force of the command.
- source_word: ከመ ውእቱ ይኩን ሕልቀትሙ
  chosen: that their end should come
  alternatives:
  - that their destruction should be
  - that their annihilation should occur
  lexicon: Dillmann Lexicon
  rationale: ሕልቀት can denote end, destruction, or perishing. 'Their end should come'
    preserves both the finality and the slightly elevated tone without overstating
    the exact mode of judgment.
- source_word: አእመሩ
  chosen: they knew
  alternatives:
  - they came to know
  - they learned
  lexicon: Dillmann Lexicon
  rationale: 'A straightforward past sense fits the causal clause: judgment comes
    because illicit knowledge has been acquired.'
- source_word: ኵሎ ኅቡኣተ መላእክት
  chosen: all the hidden things of the angels
  alternatives:
  - all the secrets of the angels
  - all the angelic mysteries
  lexicon: Dillmann Lexicon
  rationale: ኅቡኣት are hidden or secret things. 'Hidden things of the angels' stays
    close to the Ge'ez and avoids importing later technical language like 'mysteries'
    unless required.
- source_word: ግፍዐ ሰይጣናት
  chosen: the violence of the satans
  alternatives:
  - the oppression of the satans
  - the wrongdoing of the satans
  - the violence of the adversaries
  lexicon: Dillmann Lexicon
  rationale: ግፍዐ carries the sense of violence, oppression, or wrongdoing. The plural
    ሰይጣናት is best represented transparently as 'satans' rather than harmonized into
    a singular proper name, since the text speaks in the plural.
- source_word: ኃይሎሙ ኅቡአ
  chosen: their secret power
  alternatives:
  - their hidden power
  - their concealed might
  lexicon: Dillmann Lexicon
  rationale: The phrase joins power/might with hiddenness. 'Secret power' is concise
    and preserves the occult/apocalyptic nuance.
- source_word: ኅቡኣት
  chosen: those who practice sorcery
  alternatives:
  - the sorcerers
  - those of hidden arts
  lexicon: Dillmann Lexicon
  rationale: The final doubled form in Charles's OCR is textually difficult, but in
    context after hidden powers it likely points to practitioners of concealed arts.
    This rendering makes the probable sense explicit while acknowledging uncertainty
    in a footnote.
