theological_decisions:
- issue: Rendering ሰይጣናት in the plural
  chosen_reading: satans
  alternative_readings:
  - Satan
  - adversaries
  - demons
  rationale: The Ge'ez form is plural. To preserve the text's own demonological texture
    and avoid later Christian singularization, the main text keeps the plural as a
    common noun.
  doctrine_reference: Preserve local passage meaning rather than harmonizing with
    later doctrinal expectations.
- issue: Scope of judgment on 'those who dwell on the dry land'
  chosen_reading: a terrestrial humanity under flood judgment
  alternative_readings:
  - all earth-dwellers generally
  - a specific class of sinners
  rationale: Within the Noahic judgment setting of this chapter, 'dry land' likely
    evokes humanity exposed to the coming deluge. The translation preserves the literal
    image rather than interpreting it away as a generic moral category.
  doctrine_reference: Preserve apocalyptic imagery and avoid flattening cosmic judgment
    language.
