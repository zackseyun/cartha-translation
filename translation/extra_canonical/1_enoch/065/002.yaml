theological_decisions:
- issue: Apparent identification of Enoch as Noah's son in the Ethiopic wording
  chosen_reading: Retain the Ge'ez surface reading 'his son Enoch' in the main text, with a footnote noting the contextual difficulty.
  alternative_readings:
  - Emend implicitly to 'my grandfather Enoch' or similar genealogically harmonized wording
  - Treat the phrase as corrupt and omit filial language
  rationale: The project philosophy prioritizes the source witness over harmonization. Since the Parables are effectively Ge'ez-only here, restraint is especially important. The genealogical tension should be exposed, not silently resolved.
  doctrine_reference: Translation philosophy §1 original-language primacy; §3 preserve theological tension rather than resolve it.
- issue: Speaker identification around 'and said, Noah'
  chosen_reading: Render the speech introduction transparently but preserve the awkward appositional wording by keeping 'Noah' inside the quotation sequence rather than smoothing the whole clause into a fully harmonized narrative.
  alternative_readings:
  - Translate as 'and said, "Noah, with a bitter voice..."'
  - Emend to 'and said, "O Noah..."'
  - Recast as 'and Noah said with a bitter voice'
  rationale: The Ethiopic line is syntactically difficult. Rather than overconfidently reconstructing the clause, the translation keeps the awkwardness visible and explains it in a footnote.
