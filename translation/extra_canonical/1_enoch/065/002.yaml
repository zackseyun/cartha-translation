translation:
  text: 'And he lifted up his feet from there and went as far as the ends of the earth, and he cried out And he lifted up his feet from there and went as far as the ends of the earth, and he cried out to his grandfather Enoch, and Noah said with a bitter voice: “Hear me, hear me, hear me,” three times. and Noah said with a bitter voice, “ Hear me, hear me, hear me three times.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic text appears to say 'to his son Enoch,' which is difficult in context since Noah is normally presented as Enoch's descendant, not his father. The translation preserves the surviving wording rather than silently harmonizing it.
    reason: textual_variant
  - marker: b
    text: The clause around 'and said, Noah' is syntactically awkward in this witness. It may reflect a disturbed text or compressed speech introduction. A smoother rendering is possible, but the main text stays close to the Ethiopic wording.
    reason: alternative_reading
  - marker: c
    text: Or 'to his son Enoch'.
    reason: previous_rendering
  - marker: d
    text: Or 'and said, “Noah, with a bitter voice:'.
    reason: previous_rendering
lexical_decisions:
- source_word: አንሥአ
  chosen: lifted up
  alternatives:
  - raised
  - took up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward verbal sense of raising or lifting. 'Lifted up' preserves the concrete motion in the visionary narrative.
- source_word: እገሪሁ
  chosen: his feet
  alternatives:
  - his foot
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is best taken as plural 'his feet.' Retaining the bodily image avoids smoothing the movement into a generic 'departed.'
- source_word: እምህየ
  chosen: from there
  alternatives:
  - from here
  - thence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The deictic points to departure from the present location in the vision. 'From there' is idiomatic and preserves the narrative transition.
- source_word: ሖረ
  chosen: went
  alternatives:
  - journeyed
  - departed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common motion verb. 'Went' is simple and fits the sequence of actions without overinterpreting the manner of travel.
- source_word: አጽናፈ ምድር
  chosen: the ends of the earth
  alternatives:
  - the extremities of the earth
  - the borders of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard apocalyptic-cosmic expression. 'Ends of the earth' preserves the elevated idiom and geographic vastness.
- source_word: ጸርኀ፡ ለአምኄው፡ ሄኖክ
  chosen: cried out to his son Enoch
  alternatives:
  - called out to his child Enoch
  - cried aloud to Enoch his son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys loud calling. The object phrase appears to identify Enoch as 'his son' in the Ethiopic witness, even though this is genealogically difficult in context; the translation preserves the witness and notes the difficulty.
- source_word: በቃል መሪር
  chosen: with a bitter voice
  alternatives:
  - in a bitter voice
  - with a grievous voice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes the quality of the cry. 'Bitter voice' preserves the emotional sharpness without diluting it into generic sorrow.
- source_word: ስምዐኒ
  chosen: Hear me
  alternatives:
  - listen to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An imperative with first-person object suffix. 'Hear me' keeps the urgency and repetition of the appeal.
- source_word: ሥልሰ
  chosen: three times
  alternatives:
  - thrice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adverb marks the triple repetition explicitly. 'Three times' is clearer for modern readers than 'thrice' while preserving the formula.
