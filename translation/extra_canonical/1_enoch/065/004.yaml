theological_decisions:
- issue: Nature of the disturbance described by ሀውክ
  chosen_reading: cosmic/apocalyptic upheaval rather than a narrowly psychological
    or merely political turmoil
  alternative_readings:
  - great confusion
  - great tumult
  rationale: In the Parables, earthly events are often framed as manifestations of
    heavenly judgment. 'Upheaval' preserves that broader apocalyptic register without
    forcing a specific phenomenon such as an earthquake.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic disturbance
    into generic prose.
