translation:
  text: And after that time there came a great upheaval upon the earth, and a voice
    was heard from heaven, and I fell on my face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The final clause is textually difficult in the OCR: the verb form appears
      plural (''and they fell''), but the attached suffix in ''my face'' points toward
      the sense ''and I fell on my face.'' The translation follows the reading that
      best fits the immediate first-person narrative context.'
    reason: textual_variant
  - marker: b
