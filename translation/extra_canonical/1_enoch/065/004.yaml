lexical_decisions:
- source_word: በድኅሬ ውእቱ ጊዜ
  chosen: after that time
  alternatives:
  - after this time
  - after that moment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal sequence marker; 'that time' preserves the demonstrative force
    of ውእቱ without sounding overly stiff.
- source_word: ሀውክ ዐቢይ
  chosen: a great upheaval
  alternatives:
  - a great turmoil
  - a great shaking
  - a great confusion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes disturbance, tumult, or disorder. 'Upheaval' preserves
    apocalyptic force and can include both social and cosmic disturbance without over-specifying
    an earthquake.
- source_word: ዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - over the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard spatial phrase. 'Earth' fits the cosmic-apocalyptic setting
    better than the more localized 'land'.
- source_word: ተሰምዐ ቃል እምሰማይ
  chosen: a voice was heard from heaven
  alternatives:
  - a sound was heard from heaven
  - a word was heard from heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቃል can mean word, voice, or sound. In this revelatory context, 'voice'
    best conveys heavenly speech without importing later formulaic wording.
- source_word: ወወደቁ በገጽየ
  chosen: and I fell on my face
  alternatives:
  - and I fell upon my face
  - and they fell before me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The form is difficult because the verb appears plural in the OCR, but
    the attached first-person singular suffix in ''my face'' strongly supports a first-person
    sense in context: Enoch falls prostrate in response to the heavenly voice. The
    English reflects the most coherent reading while noting the textual difficulty.'
