translation:
  text: In those days Noah saw that the earth had sunk down, and that its destruction
    was near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'had sunk down' is lexically difficult in the Ethiopic
      witness and may also suggest that the earth had subsided, collapsed, or been
      violently shaken.
    reason: lexical_alternative
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  chosen: In those days
  alternatives:
  - At that time
  - In those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal apocalyptic formula. 'In those days' preserves the
    elevated repetitive register common in visionary narrative better than the more
    generic 'at that time.'
- source_word: ርእየ
  chosen: saw
  alternatives:
  - looked upon
  - beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic verb of seeing/reporting a vision. 'Saw' is clear modern English;
    'beheld' would sound archaic, while 'looked upon' is too expansive.
- source_word: ምድረ
  chosen: the earth
  alternatives:
  - the land
  - the ground
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the scope is cosmic rather than merely local
    terrain, so 'the earth' best fits the judgment setting.
- source_word: ከመ አጽነነት
  chosen: had sunk down
  alternatives:
  - had subsided
  - had collapsed
  - had been shaken down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult in this Ge'ez-only context, but it appears to describe
    the earth as destabilized or giving way. 'Had sunk down' preserves vivid physical
    imagery without over-specifying a mechanism.
- source_word: ወከመ ቅሩብ ሐጕላ
  chosen: and that its destruction was near
  alternatives:
  - and that ruin was near
  - and that its end was near
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቅሩብ clearly conveys nearness. ሐጕላ is taken in a ruin/destruction sense
    suited to the flood context. 'Its destruction' ties the impending catastrophe
    to the earth just mentioned and keeps the apocalyptic force.
