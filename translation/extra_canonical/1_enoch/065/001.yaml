theological_decisions:
- issue: Whether to render the earth's condition as moral corruption or physical destabilization
  chosen_reading: 'physical destabilization: ''the earth had sunk down'''
  alternative_readings:
  - the earth was corrupt
  - the earth was shaken
  rationale: The immediate Ge'ez wording points to a visible condition Noah 'saw,'
    and the verse's imagery fits impending cataclysm rather than an abstract moral
    summary. This preserves apocalyptic imagery instead of flattening it into generalized
    wickedness.
  doctrine_reference: Preserve theological tension rather than resolve it; preserve
    apocalyptic imagery
