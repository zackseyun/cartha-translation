lexical_decisions:
- source_word: መጽአ
  chosen: came
  alternatives:
  - arrived
  - approached
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic motion verb; 'came' is the most direct and natural rendering in narrative sequence.
- source_word: እምሐው*የ
  chosen: from my dwelling-place
  alternatives:
  - from my habitation
  - from my house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR form is uncertain, but the phrase with እም- clearly indicates origin 'from,' and the underlying noun appears to denote a place of dwelling or abode. 'Dwelling-place' preserves the locative sense without overcommitting to a more domestic 'house' where the reading is not fully secure.
- source_word: ቆመ ኀቤየ
  chosen: stood beside me
  alternatives:
  - stood by me
  - stood near me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom combines 'stood' with a preposition meaning proximity. 'Beside me' is idiomatic English and preserves the physical immediacy of the encounter.
- source_word: በምንት
  chosen: why
  alternatives:
  - for what reason
  - because of what
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Interrogative asking reason or cause; 'why' is the clearest natural equivalent.
- source_word: ጸራሕከ
  chosen: have you cried out
  alternatives:
  - did you cry out
  - have you called out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes a loud cry or outcry, stronger than a simple 'say' or 'call.' Present perfect English fits the immediate-result question in dialogue.
- source_word: ጽራኀ መሪረ
  chosen: with a bitter cry
  alternatives:
  - a bitter outcry
  - a grievous cry
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun and adjective form an emphatic expression of anguished lament. 'Bitter cry' preserves both emotional intensity and compactness.
- source_word: ብካየ
  chosen: weeping
  alternatives:
  - lamentation
  - crying
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to weeping or lamenting. 'Weeping' pairs well with 'bitter cry' and preserves the verse's doubled expression of distress.
