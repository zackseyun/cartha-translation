lexical_decisions:
- source_word: ንግረኒ
  chosen: Tell me
  alternatives:
  - Declare to me
  - Explain to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative plus first-person object suffix; 'Tell me' is natural English while preserving the direct request addressed to the angelic interlocutor.
- source_word: ምንት ውእቱ ዘይትገበር
  chosen: what is this that is being done
  alternatives:
  - what is this that has happened
  - what is this deed that is done
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative verbal form points to an ongoing or present event rather than a completed past event. 'This' preserves the deictic force of ውእቱ in context.
- source_word: ዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - over the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard locative phrase. 'Upon the earth' keeps the elevated register suitable to apocalyptic discourse.
- source_word: እስመ ከመዝ ሰርሐት ምድር
  chosen: For the earth has labored like this
  alternatives:
  - For the earth has acted thus
  - For the earth has been worked thus
  - For the earth has travailed thus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is difficult, but in this context of cosmic upheaval and paired with shaking, a sense of the earth undergoing distress or travail best fits the imagery. 'Labored' preserves the vividness without overcommitting to obstetric imagery in the main text.
- source_word: ወአንቀልቅለት
  chosen: and has been shaken
  alternatives:
  - and has quaked
  - and has been convulsed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form conveys violent movement or agitation. 'Has been shaken' is clear and broad enough to cover seismic and cosmic disturbance.
- source_word: ዮጊ አነ እትኃጐል ምስሌሃ
  chosen: lest I perish with it
  alternatives:
  - and I fear that I may perish with it
  - so that I not be destroyed with it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses apprehension about sharing the earth's fate. 'Lest I perish with it' is concise, elevated, and fits the apocalyptic tone; the feminine suffix refers back to 'earth'.
