  from: For the earth has labored like this and has been shaken, lest I perish with it.
  to: For the earth has labored like this and has been shaken; perhaps I will perish with it.
  rationale: 'The Ge''ez particle ዮጊ (yogi) can mean ''lest'' or ''perhaps'' (Dillmann: ''forsitan'', ''ne forte''). In English, placing ''lest'' immediately after the declarative clause ''the earth has labored... and has been shaken'' creates an awkward purposive implication, as if the earth shook in order to prevent him from perishing. Rendering ዮጊ as ''perhaps'' resolves the English syntax while accurately reflecting the speaker''s apprehension. | Adjudicator: The Ge''ez particle ዮጊ (yogi) can mean ''perhaps'' or ''lest'' (Leslau, p. 626; Dillmann, col. 1079). The current rendering ''lest'' syntactically attaches to the preceding clause, inadvertently implying the'
