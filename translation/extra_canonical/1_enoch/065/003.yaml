translation:
  text: And I said to him, “Tell me, what is this that is being done upon the earth? For the earth has labored like this and has been shaken; perhaps I will perish with it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has travailed thus.' The Ge'ez verb is difficult here; the main text chooses a broader term for the earth's distress while preserving the image of violent upheaval.
