theological_decisions:
- issue: Nature of the earth's distress
  chosen_reading: The verse depicts cosmic upheaval affecting the earth itself, not merely human activity on earth.
  alternative_readings:
  - The earth is morally 'corrupted' by what is being done
  - The line refers only to an earthquake without broader apocalyptic force
  rationale: The paired expressions about the earth laboring and being shaken suggest personified cosmic distress, which suits the judgment setting of the Parables. The translation preserves that tension without reducing it either to moral corruption alone or to a merely natural event.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic imagery into generic prose.
