  from: I was snatched up by a whirlwind of wind, and it carried me westward.
  to: for I had been snatched up by a whirlwind of wind, and it had carried me westward—
  rationale: 'The draft completely omits the causal conjunction እስመ (esma, ''for'' or ''because''). By omitting it, the draft turns a subordinate explanatory clause (which explains how Enoch arrived at the place) into the main narrative action of the verse. The verse is actually a scene-setting fragment that flows directly into the main action in verse 2 (''There my eyes saw...''). Restoring ''for'' and using em-dashes preserves the author''s syntax. | Adjudicator: The reviewer is entirely correct. The Ge''ez text explicitly includes the causal conjunction እስመ (esma, ''for'' or ''because''), which the current draft omits. This omission fundamentally alters the syntax'
