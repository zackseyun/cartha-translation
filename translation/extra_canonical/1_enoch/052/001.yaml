theological_decisions:
- issue: Nature of the visionary transport
  chosen_reading: I was snatched up by a whirlwind of wind
  alternative_readings:
  - I was taken by the spirit of the wind
  - I was seized by a storm-wind
  rationale: The Ge'ez wording foregrounds a forceful wind-borne transport in apocalyptic vision. The translation preserves the imagery as visionary ascent/relocation without resolving whether the experience is bodily or purely ecstatic.
  doctrine_reference: Preserve theological tension rather than resolve it.
