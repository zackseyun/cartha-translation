translation:
  text: And after those days, in that place where I had seen all the visions of what is hidden, for I had been snatched up by a whirlwind of wind, and it had carried me westward—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the hidden visions.' The Ge'ez can be read either as 'visions of what is hidden' or as 'hidden visions.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'by a whirlwind of wind,' an emphatic expression for violent wind-borne transport.
    reason: cultural_note
  - marker: c
    text: Or 'I was snatched up by a whirlwind of wind, and it carried me westward.'.
    reason: previous_rendering
lexical_decisions:
- source_word: እምድኅረ እማንቱ መዋዕል
  chosen: after those days
  alternatives:
  - after these days
  - following those days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal sequence formula. 'Those days' preserves the deictic distance of እማንቱ better than smoothing to a generic 'later'.
- source_word: በውእቱ መካን
  chosen: in that place
  alternatives:
  - at that place
  - in that region
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መካን commonly denotes place/location. 'In that place' fits the visionary setting and keeps the spatial reference concrete.
- source_word: ርኢኩ ኵሎ ራእያተ ዘበኅቡእ
  chosen: I had seen all the visions of what is hidden
  alternatives:
  - I saw all the hidden visions
  - I had seen all the visions that were in secret
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative phrase ዘበኅቡእ modifies the visions. 'Of what is hidden' preserves the apocalyptic sense of concealed heavenly realities without over-paraphrasing.
- source_word: ተመሠጥኩ
  chosen: I was snatched up
  alternatives:
  - I was taken up
  - I was seized
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests forceful removal or rapture-like seizure. 'Snatched up' preserves the sudden, overpowering motion better than the milder 'taken up.'
- source_word: በአውሎጋኒ ነፋስ
  chosen: by a whirlwind of wind
  alternatives:
  - by a storm-wind
  - by a whirlwind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is intensive and vividly meteorological. 'Whirlwind of wind' keeps the doubled imagery, though slightly idiomatic English would allow simply 'whirlwind.'
- source_word: ወወሰደኒ ዓረበ
  chosen: and it carried me westward
  alternatives:
  - and it took me to the west
  - and it bore me west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዓረበ here is best taken directionally, 'west/westward.' 'Carried me westward' preserves the motion of the wind and reads naturally in English.
