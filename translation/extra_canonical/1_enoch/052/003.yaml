translation:
  text: And I asked the angel who went with me, saying, “What are these things that
    I have seen in secret?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in a hidden place” / “secretly.” The Ge'ez expression points to hiddenness,
      but whether it describes the place, the manner of seeing, or the concealed nature
      of the things seen is not fully certain.
    reason: lexical_alternative
lexical_decisions:
- source_word: ተስእልክዎ
  chosen: I asked him
  alternatives:
  - I questioned him
  - I inquired of him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes asking or inquiring. English 'asked' is the most natural
    elevated rendering; the object is then specified by ለመልአክ, 'the angel.'
- source_word: መልአክ
  chosen: angel
  alternatives:
  - messenger
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the heavenly being sense is primary, so 'angel'
    is preferable to the more generic 'messenger.'
- source_word: ዘምስሌየ የሐውር
  chosen: who went with me
  alternatives:
  - who was going with me
  - who walked with me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause identifies the interpreting angel accompanying the
    seer. 'Went with me' is idiomatic and preserves the narrative movement without
    over-literal awkwardness.
- source_word: እንዘ እብል
  chosen: saying
  alternatives:
  - as I said
  - while saying
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a standard speech introducer. 'Saying' keeps the formal narrative
    style.
- source_word: ምንት ውእቱ
  chosen: What are these things
  alternatives:
  - What is this
  - What are these
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although literally singular-looking in part, the following demonstrative/plural
    sense points to multiple objects previously seen. 'These things' makes the referent
    explicit in English.
- source_word: እሙንቱ እሉ እለ
  chosen: these things
  alternatives:
  - these
  - those things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clustered demonstrative/relative forms intensify identification of
    the visible objects. English compresses this naturally to 'these things.'
- source_word: በኅቡእ
  chosen: in secret
  alternatives:
  - secretly
  - in a hidden place
  - hidden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun/adverbial expression carries the sense of hiddenness or secrecy.
    'In secret' preserves the apocalyptic motif of concealed realities being disclosed.
- source_word: ርኢኩ
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Either simple past or present-perfect sense is possible in English. 'I
    have seen' slightly better conveys the immediate relevance of the visionary sight
    to the question now being asked.
