theological_decisions:
- issue: Force of በኅቡእ in an apocalyptic vision
  chosen_reading: in secret
  alternative_readings:
  - secretly
  - in a hidden place
  rationale: The phrase likely marks the hidden or concealed character of the visionary
    realities rather than merely the manner of seeing. 'In secret' preserves the revelatory
    tension without over-interpreting the location.
  doctrine_reference: Preserve theological tension rather than resolve it; Parables
    are Ge'ez-only in practice, so uncertainty should remain visible.
