theological_decisions:
- issue: Scope of the negation in a terse Ge'ez clause
  chosen_reading: The line means that iron will no longer serve a war-making function,
    not that iron ceases to exist altogether.
  alternative_readings:
  - There will be no iron
  - Iron will not come into being
  rationale: 'Because the noun is followed by ለ plus a warfare term, the most natural
    sense is functional: iron is not for war. This fits the surrounding vision of
    the collapse of instruments of violence.'
  doctrine_reference: Translation philosophy §Preserve theological tension rather
