translation:
  text: And iron shall not be for war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Ge''ez is very brief: literally, ''and iron shall not be for war.''
      The sense is likely that iron will no longer be used for warfare.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወኢይከውን
  chosen: and ... shall not be
  alternatives:
  - and it will not be
  - nor shall there be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The conjunction ወ with negated imperfect ኢይከውን yields a future-like negated
    copular/existential sense. 'And ... shall not be' preserves the terse prophetic/apocalyptic
    cadence.
- source_word: ኃጺን
  chosen: iron
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun straightforwardly denotes iron/metal iron. No broader metaphor
    is required by the immediate wording.
- source_word: ለፀብእ
  chosen: for war
  alternatives:
  - for battle
  - for fighting
  - for conflict
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The preposition ለ marks purpose or use: iron will not be for warfare.
    ''War'' best fits the apocalyptic judgment context and keeps the line concise.'
