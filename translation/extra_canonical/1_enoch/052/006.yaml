translation:
  text: And those mountains that your eyes saw—the mountain of iron, and the mountain
    of copper, and the mountain of silver, and the mountain of gold, and the mountain
    of soft metal, and the mountain of lead—all these will be before the Chosen One
    like wax before the fire, and like water that runs down from above upon those
    mountains; and they will become weak before his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The exact identification of the fifth metal (rendered 'soft metal') is uncertain
      in this Ethiopic line; possibilities proposed in scholarship include tin or
      another softer metal.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Elect One.' The title is a major designation in the Parables and
      is left locally grounded here rather than harmonized with later usage.
    reason: lexical_alternative
lexical_decisions:
- source_word: አድባር
  chosen: mountains
  alternatives:
  - hills
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural clearly denotes large mountainous masses in the visionary
    scene; 'mountains' preserves the apocalyptic scale better than 'hills'.
- source_word: ኃጺን
  chosen: iron
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward material term; retained literally as part of the sequence
    of metal mountains.
- source_word: ጸሪቅ
  chosen: copper
  alternatives:
  - bronze
  - brass
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ethiopic term can be rendered by a copper-alloy term, but 'copper'
    is the broadest and least interpretively loaded choice in a list already moving
    from harder to softer metals.
- source_word: ብሩር
  chosen: silver
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the precious metal.
- source_word: ወርቅ
  chosen: gold
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the precious metal.
- source_word: ነጠብጣብ
  chosen: soft metal
  alternatives:
  - tin
  - electrum
  - molten metal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact metal identification is uncertain in this Ge'ez-only context.
    A transparent generic rendering preserves the contrast with the surrounding named
    metals without overstating certainty.
- source_word: ዐረር
  chosen: lead
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best-supported identification in the metal list, and it fits the descending
    sequence toward heavier/softer metals.
- source_word: ለኅሩይ
  chosen: the Chosen One
  alternatives:
  - the Elect One
  - the chosen one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Parables this is a weighty title. Capitalization marks titular
    usage without importing later christological wording foreign to the verse.
- source_word: መዓረ፡ ግራ፡
  chosen: wax
  alternatives:
  - beeswax
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The simile is of something that yields and melts before fire; 'wax' is
    idiomatic and preserves the image.
- source_word: ዘይወርድ፡ እምላዕሉ
  chosen: that runs down from above
  alternatives:
  - that descends from above
  - poured down from above
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the vivid downward motion of the water image while remaining
    readable English.
- source_word: ድኩማነ
  chosen: weak
  alternatives:
  - feeble
  - powerless
  - crumbled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term points to loss of strength or resistance. 'Weak' preserves the
    image of total inability to stand before the Chosen One, without forcing a more
    physical collapse than the wording requires.
