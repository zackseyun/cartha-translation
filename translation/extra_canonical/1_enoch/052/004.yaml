translation:
  text: And he said to me, “All these that you have seen will belong to the authority
    of the Messiah, so that he may command and be mighty upon the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be for the dominion of the Messiah.' The Ge'ez expression links
      the things seen in the vision to the Messiah's ruling authority.
    reason: lexical_alternative
  - marker: b
    text: '''Be mighty'' may also be understood as ''prevail'' or ''exercise power.''
      The line emphasizes effective rule on the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይቤለኒ
  chosen: And he said to me
  alternatives:
  - And he told me
  - Then he said to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard narrative introduction in Ge'ez; 'said to me' preserves the
    direct revelatory speech formula without unnecessary expansion.
- source_word: እሉ ኵሎሙ
  chosen: All these
  alternatives:
  - These all
  - All of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative plus totalizing term points to the previously seen
    objects in the vision; 'All these' is natural English while preserving the deictic
    force.
- source_word: ዘርኢከ
  chosen: that you have seen
  alternatives:
  - which you saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative form with second-person suffix refers back to what Enoch
    has seen in the vision. Perfect-like English fits the immediate visionary context.
- source_word: ለስልጣነ
  chosen: to the authority of
  alternatives:
  - for the dominion of
  - under the power of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes authority, rule, or dominion. 'Authority' keeps the
    abstract sense and avoids over-specifying territorial kingship, while still fitting
    apocalyptic enthronement language.
- source_word: መሲሑ
  chosen: the Messiah
  alternatives:
  - his Messiah
  - the Anointed One
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Following project policy, titles are translated rather than transliterated
    into traditional Christianized forms. The Ge'ez term clearly reflects 'Messiah/Anointed
    One'; 'the Messiah' is the most direct and contextually weighty rendering.
- source_word: እሙንቱ ይከውኑ
  chosen: will belong
  alternatives:
  - will be
  - will become
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction indicates that the previously mentioned things come
    to be under or for the Messiah's authority. 'Will belong' makes explicit the relation
    implied by the prepositional phrase without excessive paraphrase.
- source_word: ከመ ይእዝዝ
  chosen: so that he may command
  alternatives:
  - that he may give orders
  - so that he may rule
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries the sense of ordering or commanding. 'Command' preserves
    the force of sovereign speech and avoids flattening it into the broader but less
    vivid 'rule.'
- source_word: ወይትኃየል
  chosen: and be mighty
  alternatives:
  - and prevail
  - and show strength
  - and exercise power
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is related to strength/power. 'Be mighty' preserves the stative-apocalyptic
    quality and echoes royal/judicial potency without overinterpreting the exact mode
    of action.
- source_word: ዲበ ምድር
  chosen: upon the earth
  alternatives:
  - over the earth
  - on the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can be rendered several ways; 'upon the earth' keeps
    the elevated register and spatial force suitable to visionary proclamation.
