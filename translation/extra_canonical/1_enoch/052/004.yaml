theological_decisions:
- issue: Rendering of መሲሑ in a Ge'ez-only Parables context
  chosen_reading: the Messiah
  alternative_readings:
  - the Anointed One
  - his Messiah
  rationale: The title should be translated, not left in inherited ecclesiastical
    form. 'The Messiah' preserves the Jewish-apocalyptic title and avoids importing
    later NT name-like usage. Because the Parables are effectively Ge'ez-only here,
    the rendering remains transparent and minimally interpretive.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
- issue: Nature of the Messiah's relation to 'all these'
  chosen_reading: will belong to the authority of the Messiah
  alternative_readings:
  - will be for the dominion of the Messiah
  - will come under the Messiah's power
  rationale: The Ge'ez syntax suggests subjection or assignment to the Messiah's rule.
    This wording preserves the political-apocalyptic sense of delegated cosmic authority
    without overstating ownership in a material sense.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
