theological_decisions:
- issue: Nature of the failed deliverance
  chosen_reading: The verse speaks of self-deliverance from judgment by means of wealth,
    not spiritual salvation in a later doctrinal sense.
  alternative_readings:
  - They will not be saved by gold and silver
  - They will not ransom themselves with gold and silver
  rationale: In the immediate apocalyptic context, precious metals fail as protection
    when judgment arrives. 'Save themselves' preserves the local sense without importing
    later soteriological language.
  doctrine_reference: Preserve local passage meaning; do not over-harmonize with later
    Christian usage.
