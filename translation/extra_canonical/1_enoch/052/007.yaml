translation:
  text: And in those days they will not be saved by gold or by silver, nor will they
    be able to flee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will not be delivered by gold or silver.' The Ge'ez verb can be
      rendered either actively ('save themselves') or more passively ('be saved /
      be delivered').
    reason: lexical_alternative
  - marker: b
    text: Or 'they will not save themselves'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይከውን
  chosen: And ... will be
  alternatives:
  - and it shall be
  - and it will happen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common narrative/apocalyptic introductory formula. In English, the clause
    is best absorbed into the temporal construction 'And in those days' rather than
    rendered woodenly as a separate 'and it shall be.'
- source_word: በእማንቱ መዋዕል
  chosen: in those days
  alternatives:
  - in those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard apocalyptic temporal phrase. 'Those days' preserves the elevated
    prophetic register and recurring judgment formula.
- source_word: ኢይድኅኑ
  chosen: they will not save themselves
  alternatives:
  - they will not be saved
  - they will not deliver themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The verb of saving/delivering here, with the following instrumental
    phrases, naturally yields a reflexive sense: they cannot secure their own deliverance
    by means of wealth. ''Save themselves'' keeps the active force clearer than the
    passive ''be saved.'''
- source_word: እበወርቅ
  chosen: by gold
  alternatives:
  - with gold
  - through gold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks means or instrument. 'By gold' is concise and idiomatic
    in a judgment context about failed wealth.
- source_word: ወእበብሩር
  chosen: or by silver
  alternatives:
  - and by silver
  - with silver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the conjunction is formally 'and,' English idiom after a negated
    pair of means is smoother as 'by gold or by silver' without changing the sense.
- source_word: ወኢይክሉ
  chosen: nor will they be able
  alternatives:
  - and they will not be able
  - nor can they
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative ability formula. 'Nor will they be able' preserves the parallelism
    and future judgment tone.
- source_word: ጐይየ
  chosen: to flee
  alternatives:
  - to escape
  - to run away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes flight or running away. 'Flee' best preserves the vivid
    apocalyptic image; 'escape' is possible but less concrete.
