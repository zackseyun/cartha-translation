translation:
  text: 'There my eyes saw all the hidden things of heaven that are to come: a mountain
    of iron, and a mountain of copper, and a mountain of silver, and a mountain of
    gold, and a mountain of soft metal, and a mountain of lead.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'that are to come' is difficult. It may also be understood
      more statically as 'that were there' or 'that exist in heaven.'
    reason: alternative_reading
  - marker: b
    text: The fifth metal term is uncertain. It may refer to a soft or mixed metal;
      some interpreters identify it more specifically as tin or electrum.
    reason: lexical_alternative
lexical_decisions:
- source_word: በህየ
  chosen: There
  alternatives:
  - In that place
  - Then there
  lexicon: Dillmann
  rationale: Locative adverb introducing the visionary scene; 'There' is concise and
    natural while preserving the spatial force.
- source_word: ርእዩ አዕይንትየ
  chosen: my eyes saw
  alternatives:
  - I saw
  - my eyes beheld
  lexicon: Dillmann
  rationale: The Ge'ez explicitly mentions 'my eyes'; retaining it preserves the vivid
    visionary register rather than reducing it to a simple 'I saw'.
- source_word: ኵሎ ኅቡኣተ ሰማይ
  chosen: all the hidden things of heaven
  alternatives:
  - all the secrets of heaven
  - all the hidden things in heaven
  lexicon: Dillmann
  rationale: ኅቡኣተ denotes hidden or concealed things. 'Hidden things' is transparent
    and avoids overloading the phrase with later technical connotations of 'mysteries'
    or 'secrets' unless required by context.
- source_word: ዘይኩን ሀሎ
  chosen: that are to come
  alternatives:
  - which will be
  - that were there
  - that exist
  lexicon: Dillmann
  rationale: In this apocalyptic context the phrase most naturally points forward
    to what is destined to occur or appear. 'Are to come' preserves the prophetic
    force without over-paraphrase. Because the wording is somewhat difficult in the
    Ge'ez-only Parables, the alternative is noted in a footnote.
- source_word: ደብረ
  chosen: a mountain of
  alternatives:
  - mountain of
  - hill of
  lexicon: Dillmann
  rationale: Repeated before each material; rendered repetitively in English to preserve
    the solemn catalog style of the vision.
- source_word: ኃጺን
  chosen: iron
  alternatives: []
  lexicon: Dillmann
  rationale: Standard rendering for the metal iron.
- source_word: ጸሪቅ
  chosen: copper
  alternatives:
  - bronze
  - brass
  lexicon: Dillmann
  rationale: The term can denote copper or a copper-alloy metal. 'Copper' is chosen
    as the more basic material term, with alloy renderings noted as alternatives.
- source_word: ብሩር
  chosen: silver
  alternatives: []
  lexicon: Dillmann
  rationale: Standard rendering for silver.
- source_word: ወርቅ
  chosen: gold
  alternatives: []
  lexicon: Dillmann
  rationale: Standard rendering for gold.
- source_word: ነጠብጣብ
  chosen: soft metal
  alternatives:
  - electrum
  - mixed metal
  - tin
  lexicon: Dillmann
  rationale: The exact identification is uncertain. A non-specific rendering best
    reflects the uncertainty of the Ge'ez term here while still conveying that another
    metallic substance is meant. A footnote preserves more specific alternatives.
- source_word: ዐረር
  chosen: lead
  alternatives: []
  lexicon: Dillmann
  rationale: Standard rendering for lead, fitting the sequence of metals in the vision.
