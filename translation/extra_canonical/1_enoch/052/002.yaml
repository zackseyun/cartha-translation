theological_decisions:
- issue: Whether the phrase about the heavenly hidden things refers to present heavenly
    secrets or future realities
  chosen_reading: 'future-oriented: ''the hidden things of heaven that are to come'''
  alternative_readings:
  - '''all the hidden things of heaven that were there'''
  - '''all the hidden things in heaven'''
  rationale: The immediate context moves into visionary disclosure of symbolic mountains
    and later judgment imagery. A future-oriented reading best fits apocalyptic revelation,
    but because the Parables are effectively Ge'ez-only here, the ambiguity should
    remain visible in documentation.
  doctrine_reference: Preserve theological tension rather than resolve it; when uncertain,
    prefer transparent English plus footnote.
