translation:
  text: And that angel of peace answered, saying to me, 'Wait a little, and every hidden thing that the Lord of Spirits has enclosed will be revealed to you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The command may also be rendered 'be patient a little' or 'remain a little while'; the Ge'ez imperative can carry the sense of waiting or staying.
    reason: lexical_alternative
  - marker: b
    text: The verb behind 'has enclosed' may also suggest 'has shut up' or 'has kept hidden,' emphasizing that these mysteries remain under the Lord of Spirits' control until their disclosure.
    reason: lexical_alternative
  - marker: c
    text: Or 'And as he spoke to me, that angel of peace answered,'.
    reason: previous_rendering
lexical_decisions:
- source_word: አውሥአ
  chosen: answered
  alternatives:
  - responded
  - spoke
  lexicon: Dillmann Lexicon
  rationale: Common Ge'ez narrative verb for answering/responding. 'Answered' preserves the dialogic setting more clearly than the generic 'spoke'.
- source_word: እንዘ ይብለኒ
  chosen: as he spoke to me
  alternatives:
  - while he was saying to me
  - saying to me
  lexicon: Dillmann Lexicon
  rationale: The construction marks contemporaneous speech. 'As he spoke to me' is readable English that still reflects the ongoing verbal action.
- source_word: መልአከ ሰላም
  chosen: angel of peace
  alternatives:
  - peaceful angel
  - angel of well-being
  lexicon: Dillmann Lexicon
  rationale: A recognizable Enochic designation. The genitival sense should be preserved rather than paraphrased.
- source_word: ጽናሕ
  chosen: wait a little
  alternatives:
  - be patient
  - remain
  - wait
  lexicon: Dillmann Lexicon
  rationale: Imperative of remaining/waiting. In context the angel is telling the seer to pause until disclosure comes; 'wait a little' captures the force without becoming stiff.
- source_word: ንስቲተ
  chosen: a little
  alternatives:
  - briefly
  - for a little while
  lexicon: Dillmann Lexicon
  rationale: Taken adverbially with the imperative, softening the command temporally.
- source_word: ይትከሠት
  chosen: will be revealed
  alternatives:
  - will be shown
  - will be disclosed
  - will be uncovered
  lexicon: Dillmann Lexicon
  rationale: Apocalyptic disclosure language is central here; 'revealed' best preserves that register.
- source_word: ኵሉ ዘኅቡእ
  chosen: every hidden thing
  alternatives:
  - all that is hidden
  - everything concealed
  lexicon: Dillmann Lexicon
  rationale: The phrase is comprehensive and indefinite. 'Every hidden thing' keeps the singular distributive feel while remaining natural English.
- source_word: ዘከለለ
  chosen: has enclosed
  alternatives:
  - has shut up
  - has sealed off
  - has reserved
  lexicon: Dillmann Lexicon
  rationale: The verb suggests enclosing or shutting in. 'Has enclosed' preserves the image of hidden realities kept within divine control without overinterpreting as 'reserved'.
- source_word: እግዚአ መናፈስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann Lexicon
  rationale: This is a major Enochic divine title. 'Lord of Spirits' is the established literal rendering and should be kept consistently.
