  from: And as he spoke to me, that angel of peace answered,
  to: And that angel of peace answered, saying to me,
  rationale: 'The Ge''ez phrase `ወአውሥአ፡ እንዘ፡ ይብለኒ` (wa-ʾawśəʾa ʾənza yəblanni) is the standard Semitic idiom "he answered, saying to me" (equivalent to Hebrew ''wayya''an lemor'' or Greek ''apekrithē legōn''). Rendering `እንዘ ይብለኒ` as "as he spoke to me" and placing it before the main verb reverses the logical flow of the idiom and creates awkward English. | Adjudicator: The reviewer is entirely correct. The Ge''ez construction `ወአውሥአ፡ እንዘ፡ ይብለኒ` (wa-ʾawśəʾa ʾənza yəblanni) literally translates to ''and he answered while saying to me,'' which is the standard Ge''ez idiom '
