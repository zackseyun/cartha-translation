theological_decisions:
- issue: Identity and force of the detained group
  chosen_reading: Render እሱራነ as 'the prisoners' without specifying whether they are
    stars, shepherds, or angelic offenders in the main text.
  alternative_readings:
  - the bound ones
  - the captives
  rationale: The immediate Ge'ez wording identifies them by their detained condition,
    while the broader allegorical identification comes from context. The main text
    should preserve the verse's direct image and let context supply the referent.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
