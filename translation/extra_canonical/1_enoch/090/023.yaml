translation:
  text: And behold, I saw all the prisoners, and they all stood before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bound ones' or 'the captives.' The Ge'ez term emphasizes those held
      under restraint.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወናሁ
  chosen: And behold
  alternatives:
  - And see
  - Look
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the visionary deictic formula and apocalyptic register rather
    than reducing it to a simple narrative connective.
- source_word: ኵሎሙ
  chosen: all
  alternatives:
  - every one of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the totalizing emphasis; repeated in the verse and reflected
    in English both before 'the prisoners' and before 'stood'.
- source_word: እሱራነ
  chosen: the prisoners
  alternatives:
  - the bound ones
  - the captives
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes those who are bound or imprisoned. 'Prisoners' is the
    clearest natural English rendering here, while 'bound ones' is more literal but
    less idiomatic. Because the scene is judicial and apocalyptic, 'prisoners' best
    conveys their detained status without over-paraphrase.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I looked at
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary report; simple past fits the sequence
    of the vision.
- source_word: ወቆሙ
  chosen: and they stood
  alternatives:
  - and they arose
  - and they were standing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means 'stand' or 'arise.' In this judgment setting,
    'stood' naturally conveys appearance before a superior figure.
- source_word: ቅድሜሁ
  chosen: before him
  alternatives:
  - in his presence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct and formal rendering that preserves the courtroom-like posture
    of standing before the unnamed figure already established in context.
