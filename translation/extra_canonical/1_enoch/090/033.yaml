theological_decisions:
- issue: Referent of 'the Lord of the sheep'
  chosen_reading: A divine title within the Animal Apocalypse, rendered as 'the Lord of the sheep' rather than generalized 'their lord.'
  alternative_readings:
  - their lord of the sheep
  - the master of the sheep
  rationale: The phrase functions as a recurring symbolic designation for God in this vision. Retaining the imagery is preferable to flattening it into generic prose.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten symbolic titles.
- issue: Sense of moral restoration in ኄራነ
  chosen_reading: Rendered 'good' rather than 'righteous.'
  alternative_readings:
  - righteous
  - upright
  rationale: The immediate image is transformed animals entering the house; 'good' preserves the broad restorative sense without importing a more technical theological category than the wording itself demands.
  doctrine_reference: Preserve theological tension rather than resolve it; keep terms locally grounded in the passage.
