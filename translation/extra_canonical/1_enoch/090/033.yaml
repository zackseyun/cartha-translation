translation:
  text: And all those that had been destroyed and dispersed, and all the beasts of the field and all the birds of heaven, were gathered into that house; and the Lord of the sheep rejoiced with great joy, because they had all become good and had entered into his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The paired verbs 'scattered and dispersed' likely intensify the same idea; the translation keeps both to preserve the verse's emphatic restoration imagery.
    reason: lexical_alternative
  - marker: b
    text: '''That house'' and later ''his house'' refer to the restored dwelling/temple imagery within the vision, not merely an ordinary building.'
    reason: cultural_note
  - marker: c
    text: Or 'had been scattered and dispersed'.
    reason: previous_rendering
lexical_decisions:
- source_word: ተሐጕሉ
  chosen: had been scattered
  alternatives:
  - had been driven away
  - had been cast abroad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with the following verb of dispersal, this verb denotes the sheep's prior condition of being scattered abroad. 'Had been scattered' is idiomatic and preserves the passive/resultative sense.
- source_word: ተዘርዘሩ
  chosen: dispersed
  alternatives:
  - scattered abroad
  - separated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used alongside ተሐጕሉ, it intensifies the picture of fragmentation. Rendering the pair as 'scattered and dispersed' preserves the repetition rather than collapsing it into one English term.
- source_word: አራዊተ ገዳም
  chosen: beasts of the field
  alternatives:
  - wild beasts
  - beasts of the wilderness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although ገዳም can suggest desert or wilderness, 'beasts of the field' is a natural biblical-English equivalent for wild land animals and fits the Animal Apocalypse imagery without over-specifying terrain.
- source_word: አዕዋፈ ሰማይ
  chosen: birds of heaven
  alternatives:
  - birds of the sky
  - fowls of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A close rendering of the apocalyptic formula; 'birds of heaven' preserves the elevated register better than the more colloquial 'birds of the sky.'
- source_word: ተጋብኡ
  chosen: were gathered
  alternatives:
  - assembled
  - were brought together
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive 'were gathered' fits the visionary report and leaves agency implicit, as in the Ge'ez.
- source_word: በውእቱ ቤት
  chosen: into that house
  alternatives:
  - in that house
  - to that house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the motion verb 'were gathered' and the later explicit 'entered into his house,' the phrase is best taken directionally rather than merely locative.
- source_word: እግዚኦሙ ለአባግዕ
  chosen: the Lord of the sheep
  alternatives:
  - their lord, the lord of the sheep
  - the master of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This title is a key repeated designation in the Animal Apocalypse for God in relation to the sheep. 'Lord' preserves the elevated theological register better than 'master.'
- source_word: ተፈሥሐ ዐቢየ ፍሥሐ
  chosen: rejoiced with great joy
  alternatives:
  - was exceedingly glad
  - rejoiced greatly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The cognate construction intensifies the emotion. 'Rejoiced with great joy' preserves the repetition and solemn style better than a flattened adverb.
- source_word: ኄራነ
  chosen: good
  alternatives:
  - upright
  - kind
  - beautiful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this restoration scene the term marks moral transformation or right condition. 'Good' is broad enough to preserve the imagery without importing later technical terms like 'righteous' where the Ge'ez here does not require it.
- source_word: ገብኡ ውስተ ቤቱ
  chosen: had entered into his house
  alternatives:
  - had come into his house
  - had gone into his house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The verb denotes entry, and the perfective sense explains the Lord''s joy: they had in fact come into the house. ''His house'' naturally refers back to the Lord of the sheep.'
