lexical_decisions:
- source_word: ተወልደ
  chosen: was born
  alternatives:
  - came forth
  - was begotten
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive birth language is the plain sense and preserves the visionary report without interpretive expansion.
- source_word: ላህም
  chosen: bull
  alternatives:
  - ox
  - cattle-beast
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, bovine imagery is symbolically important; 'bull' best conveys a male bovine and fits the following reference to large horns.
- source_word: ጻዕዳ
  chosen: white
  alternatives:
  - bright
  - pale
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The color term should remain literal, since color symbolism is significant in this vision sequence.
- source_word: አቅርንቲሁ
  chosen: its horns
  alternatives:
  - his horns
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: English uses 'its' naturally for an animal symbol in apocalyptic narration, while preserving the concrete horn imagery.
- source_word: ዐበይት
  chosen: were great
  alternatives:
  - were large
  - were mighty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Great'' preserves both size and symbolic prominence without over-interpreting the horns as military power in the main text.'
- source_word: አራዊተ ገዳም
  chosen: the beasts of the field
  alternatives:
  - the wild beasts
  - the beasts of the wilderness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase denotes wild animals; 'of the field' is idiomatic biblical English and keeps the animal taxonomy of the vision.
- source_word: አዕዋፈ ሰማይ
  chosen: the birds of heaven
  alternatives:
  - the birds of the sky
  - the fowl of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Birds of heaven'' preserves the elevated register and apocalyptic diction better than a flatter modern phrase.'
- source_word: ይፈርህዎ
  chosen: feared it
  alternatives:
  - were afraid of it
  - stood in fear of it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A simple verbal rendering keeps the force of universal fear directed toward the newly born white bull.
- source_word: ያስተበቍዕዎ
  chosen: sought its favor
  alternatives:
  - petitioned it
  - made supplication to it
  - beseeched it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests entreaty or supplication. 'Sought its favor' communicates ongoing deferential appeal in natural English without reducing the force to mere observation.
- source_word: በኵሉ ጊዜ
  chosen: at all times
  alternatives:
  - continually
  - always
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the repetitive, comprehensive force of the phrase in elevated but readable English.
