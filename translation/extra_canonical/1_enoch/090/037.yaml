- issue: Whether to make the white bull's identity explicit in the translation
  chosen_reading: Retain the animal symbol without identifying the figure in the main text.
  alternative_readings:
  - Translate interpretively as a human ruler or messianic figure
  - Add an identifying apposition in the main text
  rationale: The Animal Apocalypse communicates through symbolic animal imagery. The translation should preserve the vision's own presentation rather than resolve the symbol into an interpretation within the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
