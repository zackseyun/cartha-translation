theological_decisions:
- issue: Whether to smooth the tension between 'the sheep remained silent' and the following verbs of crying out
  chosen_reading: Preserved the tension in the main text with 'but the sheep remained silent, though they cried out and lamented.'
  alternative_readings:
  - Resolve it as 'the sheep were helpless and cried out'
  - Treat one clause as secondary or corrupt and omit the silence
  rationale: The apocalyptic rhetoric often stacks vivid actions without modern logical smoothing. The Ge'ez as given contains both silence and crying; preserving the tension is more transparent than harmonizing it away.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it
