translation:
  text: And with that, all those eagles and vultures and ravens and kites kept snatching away the sheep even until now, and swooping down upon them and devouring them; but the sheep remained silent, and the rams lamented and cried out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The bird names are rendered as distinct kinds of predatory/scavenging birds to preserve the vision's concrete animal imagery; some individual identifications remain uncertain.
    reason: lexical_alternative
  - marker: b
    text: 'The wording presents a tension: the sheep are said to be silent, yet also to cry out and lament. The translation preserves both elements rather than smoothing the line.'
    reason: textual_variant
  - marker: c
    text: Or 'kites and ravens'.
    reason: previous_rendering
  - marker: d
    text: Or 'trampling on them'.
    reason: previous_rendering
  - marker: e
    text: Or 'though they cried out and lamented'.
    reason: previous_rendering
lexical_decisions:
- source_word: አንስርት
  chosen: eagles
  alternatives:
  - birds of prey
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse these bird terms are usually kept concrete rather than generalized. The term is commonly used for eagles/vultures in context; here a distinct vulture term follows, so 'eagles' best preserves the list's differentiation.
- source_word: አውስት
  chosen: vultures
  alternatives:
  - eagles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered as a carrion bird distinct from አንስርት. Keeping separate species imagery preserves the apocalyptic catalog of hostile birds.
- source_word: ቋዓት
  chosen: kites
  alternatives:
  - hawks
  - falcons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A smaller predatory bird is likely intended. 'Kites' fits the sequence of rapacious birds without over-specifying beyond the Ge'ez.
- source_word: ሆባይ
  chosen: ravens
  alternatives:
  - crows
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes a dark scavenging bird; 'ravens' is the more elevated and conventional rendering in biblical-style English, while preserving concrete imagery.
- source_word: ይመስጥዎሙ
  chosen: kept snatching away
  alternatives:
  - seized them
  - plundered them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys violent taking or carrying off. The imperfective sense in context supports an ongoing action, hence 'kept snatching away.'
- source_word: ይሰርሩ ዲቤሆሙ
  chosen: trampling on them
  alternatives:
  - doing violence to them
  - crushing them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase describes hostile action against the sheep beyond mere capture. 'Trampling on them' fits the animal-vision imagery and the sequence of abuse.
- source_word: ይበልዕዎሙ
  chosen: devouring them
  alternatives:
  - eating them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A vivid predatory verb; 'devouring' better preserves the violence of the vision than the flatter 'eating.'
- source_word: ያረምሙ
  chosen: remained silent
  alternatives:
  - were mute
  - kept quiet
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests silence or muteness. 'Remained silent' captures the state in idiomatic English while preserving the tension with the following cries.
- source_word: ይቤላት የአወይዉ ወይጸርኁ
  chosen: though they cried out and lamented
  alternatives:
  - and they wailed and cried out
  - yet they bleated and cried
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The cluster likely represents vocal distress. Because the preceding clause says the sheep were silent, this is best taken concessively or as an apparent tension in the witness: outwardly helpless/silent, yet crying in anguish. ''Lamented'' preserves the grief element without forcing a specifically animal sound into English.'
