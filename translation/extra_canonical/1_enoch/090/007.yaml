theological_decisions:
- issue: Whether the verse describes simple sensory inability or culpable spiritual insensibility
  chosen_reading: The main text preserves sensory language ('did not listen,' 'were deaf,' 'their eyes were blinded') without explicitly interpreting it as metaphor only.
  alternative_readings:
  - They did not obey me, for they were spiritually hardened
  - They could not hear, and their eyes grew dim
  rationale: Animal Apocalypse imagery regularly uses bodily perception to depict moral and spiritual condition. The translation keeps the concrete visionary imagery and lets readers infer the theological force rather than resolving it into paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
