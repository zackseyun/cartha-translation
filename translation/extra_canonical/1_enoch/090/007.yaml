  to: And they cried out to them, but they did not listen to their words
  rationale: 'The draft mistranslates the 3rd person plural verbs and suffixes as 1st person singular. In the context of the preceding verse (v. 6), the newly born lambs are crying out to the sheep. The verb ወአስርኅዎሙ (wa-ʾasrəḥəwwomu) has a 3rd person plural subject with a 3rd person plural object suffix (''and they cried out to them''), not 1st person (''I cried out''). Likewise, ነገሮሙ (nagaromu) means ''their words/speech'', not ''my words'' (which would be ነገርየ). The visionary is observing the scene, not speaking he | Adjudicator: The reviewer is grammatically correct. The Ge''ez verb ወአስርኅዎሙ (wa-ʾasrəḥəwwomu) is a third-person plural perfect with a third-person plural object suffix (''and they cried out to them''), not a first-pe'
