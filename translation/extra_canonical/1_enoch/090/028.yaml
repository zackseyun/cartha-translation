translation:
  text: And I stood watching until that old house was folded up; and they carried out all the pillars, and all the plants and beams of that house were folded up with it, and they carried it out and set it down in one place on the south of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'at the right hand of the land.' In biblical-style directional language this commonly means 'to the south.'
    reason: lexical_alternative
  - marker: b
    text: The repeated verb rendered 'was folded up' may also suggest 'was wrapped up' or 'taken down'; the image is of the old structure being gathered away, not merely ruined.
    reason: lexical_alternative
  - marker: c
    text: Or 'and they carried out all its pillars and all its plants and the beams of that house were folded up with it'.
    reason: previous_rendering
lexical_decisions:
- source_word: ቆምኩ
  chosen: I stood
  alternatives:
  - I remained standing
  - I stopped
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic narrative verb of standing; paired with አርእይ it yields the visionary formula 'I stood watching' rather than a mere physical stop.
- source_word: አርእይ
  chosen: watching
  alternatives:
  - looking
  - seeing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'In context of a dream-vision report, an ongoing sense fits best: Enoch continues to observe what happens.'
- source_word: ተጠወም
  chosen: was folded up
  alternatives:
  - was wrapped up
  - was taken down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated verb suggests the house and even its structural elements are gathered up or rolled/folded together, preserving the vivid apocalyptic image better than the flatter 'destroyed' or 'demolished'.
- source_word: ቤት ብሉይ
  chosen: old house
  alternatives:
  - former house
  - ancient house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ብሉይ naturally means old/former. 'Old house' is direct and preserves the contrast with the new house/temple imagery in the surrounding vision.
- source_word: አውፅእዎሙ
  chosen: they carried out
  alternatives:
  - they brought out
  - they removed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is causative 'bring out/remove.' 'Carried out' fits the physical handling of pillars, plants, and the house itself.
- source_word: አዕማድ
  chosen: pillars
  alternatives:
  - columns
  - supports
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Architectural term; 'pillars' is clear and concrete.
- source_word: አትክልት
  chosen: plants
  alternatives:
  - vegetation
  - plantings
  - ornaments
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary sense is vegetation/planting. In this temple-vision context it may refer to planted features around the house; 'plants' keeps the imagery literal without over-interpreting.
- source_word: ሤስ
  chosen: beams
  alternatives:
  - timbers
  - woodwork
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely structural wooden members of the house. 'Beams' is a natural architectural rendering and fits the sequence with pillars.
- source_word: ምስሌሁ
  chosen: with it
  alternatives:
  - together with it
  - along with it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks that the beams were folded up together with the house itself.
- source_word: ወወደይዎ
  chosen: set it down
  alternatives:
  - laid it down
  - placed it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: After carrying it out, the object is deposited somewhere. 'Set it down' preserves the physical action.
- source_word: በ፪መካን
  chosen: in one place
  alternatives:
  - to a single place
  - into one place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral plus 'place' indicates a specific single location.
- source_word: በየማነ ምድር
  chosen: on the south of the land
  alternatives:
  - at the right hand of the land
  - to the south of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ge'ez 'right hand' often functions directionally as south when orientation is eastward. In this visionary-geographical setting, 'south of the land' is the clearest idiomatic rendering, while the more literal option is preserved in a footnote.
