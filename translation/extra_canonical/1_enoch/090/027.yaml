translation:
  text: And I saw those sheep while they were burning, and their bones were burning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic repeats 'burning' for both the sheep and their bones, heightening
      the vision's severity; the repetition is preserved in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ርኢክዎሙ
  chosen: I saw them
  alternatives:
  - I looked at them
  - I beheld them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Vision-report verb in first person with object suffix; 'I saw them' preserves
    the straightforward apocalyptic narration without archaizing.
- source_word: እልኩ አባግዕ
  chosen: those sheep
  alternatives:
  - those flock-animals
  - those sheep there
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, sheep are the controlling symbolic image for
    the people in view. 'Those sheep' keeps the demonstrative force and the established
    animal imagery.
- source_word: እንዘ ይውዕዩ
  chosen: while they were burning
  alternatives:
  - as they burned
  - while they were being consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction marks contemporaneous action observed in the vision.
    'While they were burning' is vivid and preserves the ongoing aspect without over-interpreting
    whether the fire is active or passive.
- source_word: አዕፅምቲሆሙ
  chosen: their bones
  alternatives:
  - their skeletons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Concrete anatomical term. 'Bones' is the natural English equivalent and
    preserves the grim judgment imagery.
- source_word: ይውዕዩ
  chosen: were burning
  alternatives:
  - burned
  - were being burned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repeated verb should be repeated in English as well, since the verse
    intensifies the image by restating the burning with reference to the bones.
