theological_decisions:
- issue: Whether to soften the judgment image into destruction language
  chosen_reading: Retain explicit burning imagery
  alternative_readings:
  - were destroyed
  - were consumed
  rationale: The verse's force lies in the visionary repetition of burning, even extending
    to the bones. Smoothing this into generic destruction would flatten the apocalyptic
    judgment scene.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    flatten judgment formulas into generic prose.'
