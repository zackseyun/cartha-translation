translation:
  text: And I saw until the Lord of the sheep came to them, and he took in his hand the staff of wrath and struck the earth; and the earth split open, and all the beasts and all the birds of heaven fell away from among those sheep and sank into the earth, and it covered over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earth was cleft open.' The Ge'ez clause is difficult, but the following lines imply that the ground opens so that the beasts and birds descend into it.
    reason: lexical_alternative
  - marker: b
    text: The 'beasts' and 'birds of heaven' continue the symbolic cast of the Animal Apocalypse, representing hostile powers rather than ordinary animals alone.
    reason: cultural_note
  - marker: c
    text: Or 'the staff of his wrath'.
    reason: previous_rendering
lexical_decisions:
- source_word: እግዚአ አባግዕ
  chosen: the Lord of the sheep
  alternatives:
  - the master of the sheep
  - the owner of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: እግዚአ commonly denotes lord/master. In this allegorical vision, 'Lord of the sheep' preserves the animal-apocalypse imagery and the governing relationship without flattening it into a generic divine title.
- source_word: በትር መዓተ
  chosen: the staff of his wrath
  alternatives:
  - the rod of his wrath
  - the staff of anger
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: በትር is a rod/staff; መዓት denotes wrath/anger. 'Staff' fits the shepherding imagery of the context, while 'wrath' preserves the judicial force better than the milder 'anger'.
- source_word: ዘበጣ ለምድር
  chosen: struck the earth
  alternatives:
  - smote the earth
  - beat the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys striking/blows. 'Struck' is clear modern English and retains the force of a decisive judgment act without archaic diction.
- source_word: ተሰጠተ ምድር
  chosen: the earth split open
  alternatives:
  - the earth was rent
  - the earth was cleft
  - the earth was shaken
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The immediate sequel is that the beasts and birds sink into the earth and it covers them, so an opening/splitting sense best fits the narrative movement. This is preferable to a vaguer 'was shaken'.
- source_word: ወድቁ እምዝኩ አባግዕ
  chosen: fell away from among those sheep
  alternatives:
  - fell from those sheep
  - fell down before those sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks separation from the sheep rather than merely downward motion. 'From among those sheep' preserves the relational sense in the allegory.
- source_word: ተሰጥሙ በምድር
  chosen: sank into the earth
  alternatives:
  - were swallowed by the earth
  - were cast into the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the following clause that the earth covered them, 'sank into' captures the sequence naturally while leaving open whether the action is passive engulfment or collapse into an opening.
- source_word: ከደነት ዲቤሆሙ
  chosen: it covered over them
  alternatives:
  - it covered them
  - it closed over them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The feminine singular verb naturally refers back to the earth. 'Covered over' preserves the vivid burial/engulfment imagery of judgment.
