theological_decisions:
- issue: Divine title within the animal allegory
  chosen_reading: the Lord of the sheep
  alternative_readings:
  - the master of the sheep
  rationale: The verse depicts God entering the vision as the sovereign over the flock. Retaining 'Lord' preserves both the theological weight and the allegorical register without importing later christological language.
  doctrine_reference: 'Translation philosophy: translate from the local passage first; preserve apocalyptic imagery.'
- issue: Instrument of judgment
  chosen_reading: staff of his wrath
  alternative_readings:
  - rod of wrath
  - staff of anger
  rationale: The shepherd's implement becomes a judgment instrument. 'Staff' keeps the sheep imagery active, while 'wrath' signals divine judicial action rather than mere emotion.
  doctrine_reference: Preserve theological tension and apocalyptic judgment formulas rather than smoothing them.
