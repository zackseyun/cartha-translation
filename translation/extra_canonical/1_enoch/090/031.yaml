- issue: Identity of the three white-clothed figures
  chosen_reading: Render generically as 'three' who are clothed in white, without
    identifying them as angels in the main text.
  alternative_readings:
  - three angels
  - three men
  rationale: The verse itself emphasizes their white clothing and guiding role but
    does not explicitly name their class in the surviving Ge'ez line provided. To
    preserve theological restraint, the translation leaves the identification implicit.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Temporal force of the final clause
  chosen_reading: Translate as 'before the judgment took place.'
  alternative_readings:
  - until judgment came
  - before judgment
  rationale: The scene is part of the Animal Apocalypse's judgment sequence. The wording
    should preserve the narrative anticipation of judgment without importing later
    doctrinal formulas.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    apocalyptic judgment formulas.
