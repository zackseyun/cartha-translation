translation:
  text: And the eyes of them all were opened, and they saw what was good, and there
    was not one among them that did not see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'what was good' may also be understood more concretely as 'good
      things.' The Ge'ez does not specify the object in detail.
    reason: lexical_alternative
lexical_decisions:
- source_word: አዕይን
  chosen: eyes
  alternatives:
  - sight
  - vision
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Concrete bodily imagery fits the Animal Apocalypse's visionary symbolism
    better than an abstract term like 'sight.'
- source_word: ተከሥታ
  chosen: were opened
  alternatives:
  - were uncovered
  - were revealed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive opening of the eyes is the most natural rendering and preserves
    the apocalyptic motif of restored perception.
- source_word: ሠናየ
  chosen: what was good
  alternatives:
  - good things
  - the good
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form can be understood substantivally; 'what was good' preserves
    the broad moral/beneficial sense without over-specifying the object seen.
- source_word: ዘኢይሬኢ አልቦ
  chosen: there was not one ... that did not see
  alternatives:
  - none among them failed to see
  - there was no one among them blind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This reproduces the emphatic negative construction closely while keeping
    readable English. 'Blind' would over-interpret the idiom.
- source_word: በማእከሎሙ
  chosen: among them
  alternatives:
  - in their midst
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Among them'' is idiomatic English for the distributive sense here;
    ''in their midst'' is possible but less natural in this clause.'
