theological_decisions:
- issue: Nature of the restored seeing in the vision
  chosen_reading: Render as literal-visionary restoration of perception without explicitly
    allegorizing it as spiritual enlightenment.
  alternative_readings:
  - spiritual understanding was granted to all
  - their blindness was removed in a metaphorical sense
  rationale: In the Dream Visions, opened eyes function within the symbolic narrative
    world. The translation preserves the image and lets readers infer its theological
    force rather than resolving the symbol in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
