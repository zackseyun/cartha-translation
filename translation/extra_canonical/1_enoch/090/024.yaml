translation:
  text: And judgment took place first upon the stars, and they were judged and were found to be sinners, and they went to the place of judgment; and they cast them into an abyss, full of fire and flaming, and full of pillars of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'before the stars' may also be understood as 'in the presence of the stars.' In this vision the stars are personified heavenly beings, so the wording likely carries both spatial and judicial force.
    reason: lexical_alternative
  - marker: b
    text: The repeated judgment language is kept in English ('judgment,' 'were judged,' 'place of judgment') to reflect the Ge'ez repetition rather than smoothing it away.
    reason: cultural_note
  - marker: c
    text: Or 'And judgment took place before the stars, and they were judged and were found to be sinners, and they went to the place of judgment; and they cast them into an abyss, full of fire and flaming, and full of pillars of fire.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - condemnation
  - sentence
  - justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun frames a formal judicial scene in apocalyptic vision. 'Judgment' preserves the legal and eschatological force without over-specifying the outcome as condemnation, though the context is punitive.
- source_word: ቅድመ እምከዋክብት
  chosen: before the stars
  alternatives:
  - in the presence of the stars
  - before those stars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase most naturally means 'before the stars' or 'in front of the stars.' Since the stars are personified actors in the Animal Apocalypse, the straightforward spatial/judicial wording is retained.
- source_word: ተኰነኑ
  chosen: were judged
  alternatives:
  - were condemned
  - were brought to judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive judicial language matches the repeated noun ኵነኔ. 'Were judged' keeps the formal process visible; the following clause supplies the guilty verdict.
- source_word: ኃጥኣነ
  chosen: sinners
  alternatives:
  - guilty
  - sinful ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes those marked by sin. 'Sinners' is direct and preserves the moral-religious charge better than the more merely forensic 'guilty.'
- source_word: ሖሩ መካነ ኵነኔ
  chosen: went to the place of judgment
  alternatives:
  - went to the place of condemnation
  - came to the place of judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The wording is concrete and spatial, fitting visionary narrative. 'Place of judgment' preserves the repeated legal terminology and the movement into the punitive locale.
- source_word: ወደይዎሙ
  chosen: they cast them
  alternatives:
  - they threw them
  - they hurled them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates forceful consigning into punishment. 'Cast' is elevated but readable and suits apocalyptic judgment imagery.
- source_word: ውስተ ዕሙቅ
  chosen: into an abyss
  alternatives:
  - into the deep
  - into a depth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this judgment context, 'abyss' better conveys a deep punitive chasm than the flatter 'deep.' It preserves apocalyptic resonance without importing later technical terminology beyond the immediate image.
- source_word: ምሉእ እሳት ወይላህብ
  chosen: full of fire and flaming
  alternatives:
  - full of fire and blaze
  - full of fire and burning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text piles up fiery imagery. 'Fire and flaming' keeps the parallel intensity and avoids reducing the second term to a mere adjective.
- source_word: አዕማደ እሳት
  chosen: pillars of fire
  alternatives:
  - columns of fire
  - fire-pillars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural noun denotes upright columns or pillars. 'Pillars of fire' is vivid, natural English and preserves the visionary architecture of the punishment scene.
