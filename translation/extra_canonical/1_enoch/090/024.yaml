theological_decisions:
- issue: Whether to render the judicial language as process ('judged') or outcome ('condemned')
  chosen_reading: 'Retain process language in the main text: ''judgment took place,'' ''were judged,'' then ''were found to be sinners.'''
  alternative_readings:
  - Use 'condemnation' and 'were condemned' throughout
  rationale: The Ge'ez repeats the judgment root and then separately states their sinful status. Preserving the sequence keeps the legal drama intact rather than collapsing hearing and verdict into one term.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: How to render the final punitive locale
  chosen_reading: '''into an abyss, full of fire and flaming, and full of pillars of fire'''
  alternative_readings:
  - '''into a deep pit full of fire'''
  - '''into hellfire'''
  rationale: The source presents concrete apocalyptic imagery, not a later doctrinal label. The translation therefore preserves abyss/fire/pillars imagery and avoids importing later theological terminology.
  doctrine_reference: 'Book context: do not flatten apocalyptic imagery or over-harmonize with later Christian usage'
