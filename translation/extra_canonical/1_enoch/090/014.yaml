theological_decisions:
- issue: Identity and status of 'that man'
  chosen_reading: Rendered simply as 'that man' without specifying angel, archangel,
    or heavenly being in the main text.
  alternative_readings:
  - that angel
  - that scribe-angelic figure
  rationale: The Ge'ez says 'man,' though the wider vision strongly suggests a heavenly
    agent. Following the project's philosophy, the translation preserves the local
    wording and leaves fuller identification to interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Divine title እግዚአ አባግዕ
  chosen_reading: '''the Lord of the sheep'''
  alternative_readings:
  - the master of the sheep
  rationale: This recurring title functions as a divine designation within the allegory.
    'Lord' best preserves both the elevated register and the theological weight of
    God's rule over his flock.
  doctrine_reference: Consistency of key terms, or documented exception.
