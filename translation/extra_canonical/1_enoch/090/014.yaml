translation:
  text: And I saw until that man came—the one who had written down the names of the
    shepherds—and he brought them up before the Lord of the sheep; and he helped that
    sheep and rescued it, and he showed it everything, that its helper had come down
    for this purpose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is difficult in the Ethiopic as transmitted here. It may
      mean that the sheep was shown everything concerning the descent or intervention
      of its helper.
    reason: textual_variant
  - marker: b
    text: The 'man who had written down the names of the shepherds' is the heavenly
      recorder figure already active in this vision's judgment scene.
    reason: cross_reference
lexical_decisions:
- source_word: ብእሲ
  chosen: man
  alternatives:
  - person
  - figure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term ordinarily denotes a male human or man. In this vision context
    it refers to the previously introduced heavenly scribe-like figure, but 'man'
    preserves the concrete imagery without over-interpreting him as merely a symbolic
    'figure'.
- source_word: ዘጸሐፈ አስማቲሆሙ
  chosen: who had written down their names
  alternatives:
  - who wrote their names
  - who recorded their names
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause identifies the man by his prior action of recording
    names. 'Written down' keeps the documentary/judicial nuance appropriate to the
    Animal Apocalypse.
- source_word: ለኖሎት
  chosen: of the shepherds
  alternatives:
  - for the shepherds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context the names belong to the shepherds whose conduct is under review.
    Rendering as possession fits the judicial scene better than a dative sense.
- source_word: ያዐርግ ቅድሜሁ
  chosen: brought them up before him
  alternatives:
  - caused them to ascend before him
  - presented them before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally involves ascent, but in context it describes presentation
    before the divine judge. 'Brought them up before' preserves both movement and
    courtroom presentation.
- source_word: ለእግዚአ አባግዕ
  chosen: before the Lord of the sheep
  alternatives:
  - before the master of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key recurring title in the Animal Apocalypse for God. 'Lord'
    preserves the elevated register and the theological force of divine sovereignty.
- source_word: ረዳኦ ወአድኃኖ
  chosen: helped ... and rescued
  alternatives:
  - assisted ... and delivered
  - came to the aid of ... and saved
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs are distinct and should remain distinct in English.
    'Helped' and 'rescued' preserve the sequence of aid and deliverance without importing
    later salvation terminology.
- source_word: አርአዮ ኵሎ መራደ
  chosen: showed it everything
  alternatives:
  - made it see everything
  - showed it the whole descent
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is textually difficult. The safest rendering keeps the broad
    sense of disclosure or revelation. A more specific reading involving 'descent'
    is possible but uncertain and better noted in a footnote.
- source_word: ለረዳኢቱ ለዝኩ ይቤላ
  chosen: that its helper had come down for this purpose
  alternatives:
  - that this helper had descended for it
  - concerning this helper who came down to it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The closing words are compressed and somewhat uncertain in the OCR. The
    translation aims to preserve the sense that the sheep is shown the significance
    of the helper's intervention, while acknowledging uncertainty in a footnote.
