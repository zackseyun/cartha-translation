theological_decisions:
- issue: Whether to render ቤት as 'house' or interpretively as 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  - sanctuary
  rationale: The Animal Apocalypse consistently uses symbolic imagery. Although the
    referent is likely the eschatological temple or restored sanctuary, the vision
    itself says 'house.' Retaining 'house' preserves the symbolic texture and avoids
    collapsing image into interpretation.
  doctrine_reference: Translation philosophy §Original-language primacy over translation
    tradition; preserve apocalyptic imagery
- issue: How explicitly to state the fate of the first house in እንተ ትጠብለለት
  chosen_reading: which had been folded up
  alternative_readings:
  - which had been rolled up
  - which had been removed/demolished
  rationale: The Ge'ez image is more concrete and less interpretive than 'destroyed.'
    Preserving the unusual image maintains textual transparency and theological restraint
    in an eschatological vision scene.
  doctrine_reference: Translation philosophy §Preserve theological tension rather
    than resolve it
