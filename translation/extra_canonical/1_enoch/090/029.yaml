translation:
  text: And I saw until the Lord of the sheep brought a new house, greater and loftier
    than that first one, and set it up in the place of the first, which had been folded
    up; and all its pillars were new, and its ornaments were new and greater than
    those of the first old one which he had taken away, and all the sheep were within
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rolled up' or 'wrapped up'; the Ge'ez verb is difficult and may describe
      the former house as being folded together before replacement.
    reason: lexical_alternative
  - marker: b
    text: The 'house' likely symbolizes the restored or eschatological sanctuary,
      but the vision's own imagery is retained in the translation.
    reason: cultural_note
lexical_decisions:
- source_word: እግዚአ አባግዕ
  chosen: the Lord of the sheep
  alternatives:
  - the master of the sheep
  - the owner of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: እግዚአ commonly denotes lord/master. 'Lord' preserves the elevated apocalyptic
    register and the recurring Animal Apocalypse imagery of God as ruler of the flock.
- source_word: ቤት ኀዲስ
  chosen: a new house
  alternatives:
  - a new temple
  - a new dwelling
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The base noun is 'house.' In context the image likely evokes the restored
    temple, but the vision speaks in animal-symbolic imagery, so 'house' is retained
    in the main text rather than interpreting it directly as 'temple'.
- source_word: ዓቢይ ... ልዑል
  chosen: greater and loftier
  alternatives:
  - great and high
  - larger and higher
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pair intensifies size and elevation. 'Greater and loftier' preserves
    both magnitude and exalted height in a suitably elevated register.
- source_word: እምነ ዝኩ ቀዳማዊ
  chosen: than that first one
  alternatives:
  - than the former one
  - than that earlier one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparative phrase contrasts the new house with the original structure
    seen earlier in the vision. 'First one' keeps the explicit sequence.
- source_word: አቀሞ ውስተ መካነ ቀዳማዊት
  chosen: set it up in the place of the first
  alternatives:
  - established it in the former place
  - placed it where the first had been
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means to set/place/establish, and the phrase indicates replacement
    in the same location.
- source_word: እንተ ትጠብለለት
  chosen: which had been folded up
  alternatives:
  - which had been rolled up
  - which had been wrapped up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form suggests being folded, rolled, or wrapped together. Rather than
    over-interpret as 'demolished,' the translation preserves the concrete image,
    with a footnote noting the lexical uncertainty.
- source_word: አዕማዲ
  chosen: pillars
  alternatives:
  - columns
  - supports
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard architectural term; 'pillars' fits the temple-house imagery.
- source_word: ስና
  chosen: ornaments
  alternatives:
  - decorations
  - adornments
  - furnishings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact nuance is somewhat uncertain, but it refers to notable features
    of the house besides its pillars. 'Ornaments' preserves architectural adornment
    without narrowing too far.
- source_word: ብሊት
  chosen: old one
  alternatives:
  - worn-out one
  - former old house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective contrasts the replaced structure with the new one. 'Old
    one' is simple and clear.
- source_word: አውፅአ
  chosen: had taken away
  alternatives:
  - had brought out
  - had removed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of replacing the first house, 'taken away' best expresses
    removal of the former structure.
- source_word: ማእከላ
  chosen: within it
  alternatives:
  - in its midst
  - inside it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase places all the sheep inside the new house. 'Within it' is
    natural English while preserving the enclosure imagery.
