theological_decisions:
- issue: Whether to render the cervine animal with zoological precision ('antlers'/'stags') or preserve the symbolic horn imagery used throughout the vision
  chosen_reading: Use 'deer' with 'horns'
  alternative_readings:
  - stags ... antlers
  - harts ... horns
  rationale: The passage is a symbolic animal vision, not natural-history description. Preserving 'horns' maintains the recurring apocalyptic symbol of power and leadership across the chapter.
  doctrine_reference: Translation philosophy § optimal equivalence; preserve apocalyptic imagery
- issue: Referent of the newly arisen great horn
  chosen_reading: Translate descriptively without identifying the figure in the main text
  alternative_readings:
  - Interpret explicitly as Judas Maccabeus or another leader
  rationale: The verse presents the image, not its interpretation. The translation should preserve the vision's symbolic form and leave historical identification to notes or commentary, not the main text.
  doctrine_reference: Preserve theological tension rather than resolve it
