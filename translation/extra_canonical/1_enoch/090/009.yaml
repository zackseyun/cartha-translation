translation:
  text: And I saw until horns came out for those lambs, and the ravens cast down their horns. And I saw until one great horn sprouted on one of those sheep, and their eyes were opened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic reads literally 'horns' even for the deer-like animals. This likely reflects the vision's symbolic use of horns as signs of strength or rule rather than zoological precision.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause may imply restored perception or awareness within the vision: literally, ''their eyes were opened.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'those deer'.
    reason: previous_rendering
lexical_decisions:
- source_word: አቅርንት
  chosen: horns
  alternatives:
  - antlers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez term denotes horns. Although deer naturally have antlers, the Animal Apocalypse regularly uses horn imagery symbolically across species, so 'horns' preserves the apocalyptic symbol and intertextual consistency better than zoologically precise 'antlers'.
- source_word: መኃስእ
  chosen: deer
  alternatives:
  - harts
  - stags
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The animal in view is cervine. 'Deer' is the clearest modern English generic term; 'harts' or 'stags' are either archaic or too specific.
- source_word: ቋንት
  chosen: ravens
  alternatives:
  - crows
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The bird term can overlap with corvids broadly, but 'ravens' is the more established apocalyptic image and fits the hostile scavenger-bird symbolism in this vision.
- source_word: ያወድቅዎሙ
  chosen: cast down
  alternatives:
  - caused to fall
  - struck down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The verb is causative/factitive in sense: they made them fall. ''Cast down'' preserves the vivid visionary force without over-specifying the mechanism.'
- source_word: በቈለ
  chosen: sprouted
  alternatives:
  - grew
  - came up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests budding or springing forth. 'Sprouted' keeps the organic emergence imagery of the horn.
- source_word: ፩ቀርን ዓቢይ
  chosen: one great horn
  alternatives:
  - a large horn
  - one mighty horn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral plus noun is explicit, and 'great' preserves the elevated register and symbolic weight better than the flatter 'large'.
- source_word: አባግዕ
  chosen: sheep
  alternatives:
  - flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Animal Apocalypse distinguishes animal kinds carefully. 'Sheep' is the direct lexical equivalent and preserves the individual-animal imagery.
- source_word: ተከሥተ አዕይንቲሆሙ
  chosen: their eyes were opened
  alternatives:
  - their eyes were uncovered
  - they gained sight
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive expression is best preserved directly. 'Were opened' keeps the revelatory/apocalyptic nuance without importing later theological phrasing beyond the text.
