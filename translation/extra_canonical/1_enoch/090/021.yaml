theological_decisions:
- issue: Whether to interpret 'stars' directly as angels in the main text
  chosen_reading: Retain 'stars' in the main text
  alternative_readings:
  - Render 'stars' as 'angels'
  - Render 'stars' as 'angelic stars'
  rationale: The Animal Apocalypse communicates through symbolic imagery. Preserving
    'stars' respects the vision's form while allowing readers to infer the angelic
    referent from context.
  doctrine_reference: Preserve apocalyptic imagery rather than flattening it into
    generic prose.
- issue: How explicitly to render the sexualized description
  chosen_reading: Use 'private parts were like those of horses'
  alternative_readings:
  - Use a more euphemistic phrase that obscures the anatomy
  - Use a more clinical phrase such as 'genitals'
  rationale: The source text intentionally evokes shameful, beast-like sexual corruption.
    The chosen wording preserves the force of the image while remaining readable modern
    English.
  doctrine_reference: Readable modern English without flattening theological or imagistic
    weight.
