translation:
  text: And the Lord of the sheep called those seven first white ones and commanded
    that they bring before him, beginning with the first star that went before those
    stars whose private parts were like those of horses, that first one which went
    out before them; and they brought them before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause about 'the first one that went out before' is textually difficult
      in this Ethiopic witness and may restate the identity of the leading star rather
      than introduce a separate figure.
    reason: textual_variant
  - marker: b
    text: In this vision, 'stars' function symbolically for heavenly beings; the translation
      keeps the image rather than replacing it with its interpretation.
    reason: cross_reference
  - marker: c
    text: The comparison to horses is an intentionally shameful sexual image, likely
      recalling the transgression of the rebellious heavenly beings.
    reason: cultural_note
  - marker: d
    text: Or 'those seven first white ones'.
    reason: previous_rendering
  - marker: e
    text: Or 'from the first star that went before those stars whose private parts
      were like those of horses, even that first one'.
    reason: previous_rendering
lexical_decisions:
- source_word: እግዚአ ሰብኡ
  chosen: the Lord of the sheep
  alternatives:
  - the master of the sheep
  - the owner of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, this title refers to God in the vision's animal
    symbolism. 'Lord' preserves elevated register and authority better than 'master'
    or 'owner.'
- source_word: ሰብአ ፯ጸዓድወ ቀዳማዊያን
  chosen: those seven first white ones
  alternatives:
  - those seven first white men
  - those seven first bright ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez points to seven beings marked by whiteness and priority. 'White
    ones' preserves the visionary symbolism without over-specifying 'men,' which is
    not explicit in the immediate wording here.
- source_word: ያምጽኡ ቅድሜሁ
  chosen: bring before him
  alternatives:
  - lead before him
  - present before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard judicial/presentational formula in apocalyptic scenes. 'Bring
    before him' is natural English and preserves the courtroom-like force.
- source_word: እምክቡበ ቀዳማዊ ዘይቀድም እምነ ዝኩ ከዋክብት
  chosen: from the first star that went before those stars
  alternatives:
  - beginning with the first star that preceded those stars
  - the first among the stars that went ahead of those stars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase identifies a leading or first star among the condemned stars.
    'Went before' preserves the sequential and leadership nuance of the Ge'ez.
- source_word: ከዋክብት
  chosen: stars
  alternatives:
  - heavenly beings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text says 'stars,' and the Animal Apocalypse regularly uses stars
    symbolically for angelic beings. The imagery should be preserved in the main text
    rather than interpreted away.
- source_word: ኃፍረቶሙ ከመ ኃፍረተ አፍራስ
  chosen: whose private parts were like those of horses
  alternatives:
  - whose genitals were like horses' genitals
  - whose sexual organs were like those of stallions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez is explicit and alludes to grotesque sexual transgression imagery.
    'Private parts' keeps the meaning clear without becoming clinically jarring, while
    preserving the scandalous force of the image.
- source_word: ዘወፅአ ቅድመ
  chosen: that first one that went out before them
  alternatives:
  - that first one that came forth ahead of them
  - the first one that went before
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The bracketed clause appears to restate and specify the leading offender.
    'Went out before them' preserves both movement and precedence.
- source_word: ወአምጽእዎሙ ለእሎሙ ቅድሜሁ
  chosen: and they brought them before him
  alternatives:
  - and they presented them before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural object likely refers to the stars/beings just identified.
    The repetition is retained because apocalyptic judgment scenes often repeat procedural
    actions for emphasis.
