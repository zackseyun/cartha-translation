translation:
  text: And behold, lambs were born from those white sheep, and they began to open their eyes and to see, and to cry out to the sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from these white sheep,' if the demonstrative is taken as proximal rather than distal.
    reason: lexical_alternative
  - marker: b
    text: Or 'and they cried out'.
    reason: previous_rendering
lexical_decisions:
- source_word: ነዋ
  chosen: And behold
  alternatives:
  - behold
  - look
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard deictic/interjective particle in visionary narrative; 'And behold' preserves the apocalyptic report style better than a flatter 'look'.
- source_word: መንስኣት
  chosen: lambs
  alternatives:
  - young ones
  - offspring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse the sheep imagery is sustained and should not be flattened into generic offspring language. 'Lambs' keeps the animal symbolism explicit.
- source_word: ተወልዱ
  chosen: were born
  alternatives:
  - came to birth
  - were begotten
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive birth language is the plain sense and fits the narrative sequence.
- source_word: እምዝኩ አባግዕት ጻዓዳ
  chosen: from those white sheep
  alternatives:
  - from these white sheep
  - out of those white sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative plus noun phrase points back to the previously seen group. 'Those white sheep' preserves the referential force and the color term, which is symbolically important in this vision.
- source_word: አኃዙ
  chosen: they began
  alternatives:
  - they started
  - they took to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With following infinitive-like verbal sequence, this verb marks inception. 'They began' is idiomatic English and reflects the progressive awakening in the vision.
- source_word: አዕይንቲሆሙ ይከሠቱ
  chosen: to open their eyes
  alternatives:
  - their eyes were opened
  - to have their eyes opened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez expresses the opening of their eyes. Rendering it actively after 'they began' gives natural English while preserving the image of gaining perception.
- source_word: ወይርእዩ
  chosen: and to see
  alternatives:
  - and they saw
  - and to perceive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'This follows the inceptive construction and is best carried as a coordinated infinitival sense in English: the lambs begin to open their eyes and to see.'
- source_word: ወይጸርኁ
  chosen: and they cried out
  alternatives:
  - and they called
  - and they bleated out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes vocal outcry. 'Cried out' preserves urgency without over-specifying the sound.
- source_word: ኀበ አባግዕ
  chosen: to the sheep
  alternatives:
  - toward the sheep
  - against the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition most naturally indicates direction here. 'To the sheep' fits the scene of the newly sighted lambs calling out to the flock.
