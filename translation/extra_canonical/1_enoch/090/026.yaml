theological_decisions:
- issue: Whether the sheep are rendered as merely physically impaired or as judicially/morally
    marked within the allegory
  chosen_reading: those blinded sheep
  alternative_readings:
  - those blind sheep
  rationale: The participial nuance may imply a condition imposed earlier in the vision,
    fitting the Animal Apocalypse's moral-symbolic imagery. 'Blinded' preserves that
    possible narrative linkage without overexplaining it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the judicial sequence 'were judged and became sinners'
  chosen_reading: retained both clauses in sequence
  alternative_readings:
  - collapsed into 'were condemned as sinners'
  rationale: The source presents judgment followed by designation/status. Keeping
    both clauses preserves the text's rhetoric and avoids smoothing a potentially
    significant apocalyptic formula.
  doctrine_reference: Consistency of key terms, or documented exception.
