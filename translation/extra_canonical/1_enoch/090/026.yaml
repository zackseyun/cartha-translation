translation:
  text: And I saw at that time that a similar deep abyss was opened in the middle
    of the earth, full of fire; and they brought those blinded sheep, and all of them
    were judged and were found to be sinners, and they were cast into that deep abyss
    of fire, and they burned. And this abyss came to be at the right side of that
    house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a deep pit.' The Ge'ez term denotes a great depth; 'abyss' is chosen
      to preserve the apocalyptic setting.
    reason: lexical_alternative
  - marker: b
    text: '''Those blinded sheep'' continues the Animal Apocalypse''s symbolic imagery;
      the sheep represent people within the vision rather than literal animals.'
    reason: cultural_note
  - marker: c
    text: The clause 'were judged and became sinners' is rendered closely. It may
      mean that judgment exposed them as guilty, rather than that they then began
      to sin.
    reason: alternative_reading
  - marker: d
    text: Or 'a deep abyss was opened'.
    reason: previous_rendering
  - marker: e
    text: Or 'became sinners'.
    reason: previous_rendering
  - marker: f
    text: Or 'And that abyss'.
    reason: previous_rendering
lexical_decisions:
- source_word: ተርኅወ፡
  chosen: was opened
  alternatives:
  - was uncovered
  - was split open
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive opening language suits the visionary scene and preserves the
    sudden apocalyptic disclosure without over-interpreting the mechanism.
- source_word: ማዕምቅ
  chosen: deep abyss
  alternatives:
  - depth
  - pit
  - abyss
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes a profound depth; 'abyss' best preserves apocalyptic
    force, while 'deep' reflects the adjective-like intensification present in the
    verse.
- source_word: ምሉዕ እሳተ
  chosen: full of fire
  alternatives:
  - filled with fire
  - full of flames
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct rendering keeps the concrete imagery. 'Fire' is preferable to
    'flames' because the Ge'ez noun is singular/collective.
- source_word: አምጽእዎሙ
  chosen: they brought
  alternatives:
  - they led
  - they brought in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates causing them to come; 'brought' is straightforward
    and leaves the agents implicit as in the source.
- source_word: እልኩ አባግዕ ጽዑላነ
  chosen: those blinded sheep
  alternatives:
  - those blind sheep
  - those sheep that were blinded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase refers back to the sheep in the Animal Apocalypse imagery.
    'Blinded' may better reflect a resultant condition produced earlier in the vision,
    though 'blind sheep' remains possible.
- source_word: ተኰነኑ
  chosen: were judged
  alternatives:
  - were condemned
  - were sentenced
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is judicial. 'Were judged' preserves the formal courtroom sense
    without prematurely specifying the verdict, which the following clauses then make
    explicit.
- source_word: ኃጥኣነ
  chosen: sinners
  alternatives:
  - guilty ones
  - sinful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The nominal form is best represented directly. It marks their status
    after judgment in morally charged terms.
- source_word: ተወድዩ
  chosen: were cast
  alternatives:
  - were thrown
  - were hurled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Were cast'' preserves the passive and the solemn judicial tone better
    than the more colloquial ''thrown.'''
- source_word: ውዕዩ
  chosen: they burned
  alternatives:
  - they were burned
  - they were consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The active-style English 'they burned' mirrors the terse force of the
    Ge'ez and keeps the image vivid.
- source_word: በየማኑ ለዝኩ ቤት
  chosen: at the right side of that house
  alternatives:
  - on the right of that house
  - to the right hand of that house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This locative phrase is spatial and should remain concrete. 'That house'
    likely points back to the house seen in the vision rather than being generalized.
