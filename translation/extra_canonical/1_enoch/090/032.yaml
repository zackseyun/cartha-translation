translation:
  text: And those sheep all became white, and their wool became great and pure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Because the subjects are sheep, 'hair' could be understood as 'wool' or
      'fleece'; the Ge'ez wording itself is more literally 'hair.'
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'became great' may also be understood more idiomatically
      as 'grew long' if the reference is to the sheep's hair.
    reason: lexical_alternative
  - marker: c
    text: Or 'the hair of each of them became great'.
    reason: previous_rendering
lexical_decisions:
- source_word: እልኩ
  chosen: those
  alternatives:
  - these
  - those ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Demonstrative pointing back to the sheep already in view in the vision;
    'those' preserves the anaphoric force better than a more immediate 'these'.
- source_word: አባግዕ
  chosen: sheep
  alternatives:
  - flock
  - lambs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse the animal imagery is significant and should
    be preserved concretely. 'Sheep' fits the collective sense without flattening
    it into 'flock.'
- source_word: ኮኑ
  chosen: became
  alternatives:
  - were
  - came to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb marks transformation within the vision, not merely a static
    description. 'Became' preserves the change-of-state sense.
- source_word: ኵሎሙ
  chosen: all
  alternatives:
  - every one of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward totalizing term; 'all' is concise and natural while preserving
    the universal scope.
- source_word: ጻዕዳ
  chosen: white
  alternatives:
  - bright
  - fair
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The color term is central to the symbolic imagery. 'White' is the plain
    and transparent rendering.
- source_word: ጸጕረ
  chosen: hair
  alternatives:
  - wool
  - fleece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez term ordinarily denotes hair. Because the subjects are sheep,
    'wool' is tempting, but that would interpret the image beyond the lexical base.
    'Hair' keeps the wording auditable and slightly strange, as apocalyptic imagery
    often is.
- source_word: ዚአሆሙ
  chosen: of each of them
  alternatives:
  - their
  - of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronominal form individualizes the description. 'Of each of them'
    brings out that distributive nuance more clearly than a simple plural possessive.
- source_word: ዐቢየ
  chosen: great
  alternatives:
  - large
  - long
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective literally suggests greatness or largeness. 'Long' may be
    an interpretive refinement in context of hair, but 'great' stays closer to the
    source while remaining intelligible.
- source_word: ንጹሐ
  chosen: pure
  alternatives:
  - clean
  - spotless
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term carries a purity/cleanness sense. 'Pure' preserves the symbolic
    and possibly cultic resonance better than the more ordinary 'clean'.
