    reason: previous_rendering
lexical_decisions:
- source_word: እልኩ
  chosen: those ravens
  alternatives:
  - those crows
  - those birds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, bird species function symbolically and should
    be preserved concretely. The term here is commonly understood as ravens/corvids
    rather than generic birds; 'ravens' keeps the apocalyptic imagery vivid.
- source_word: ቋዓት
  chosen: fought
  alternatives:
  - made war
  - attacked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This verb conveys active conflict. 'Fought' is concise and natural, while
    retaining the martial sense.
- source_word: ይትጋደሉ
  chosen: battled
  alternatives:
  - contended
  - strove
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired with the previous conflict verb, this preserves the repetitive
    intensification typical of apocalyptic narration rather than collapsing both into
    one English term.
- source_word: ይትባአሱ ምስሌሁ
  chosen: with him
  alternatives:
  - against him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition literally indicates association 'with,' but in a combat
    context English can imply hostile engagement. The main text keeps 'with him' close
    to the Ge'ez sequence while the surrounding verbs make the hostility clear.
- source_word: ፈቀዱ
  chosen: they wanted
  alternatives:
  - they desired
  - they intended
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This expresses volition or intent. 'Wanted' is readable modern English
    and does not overstate certainty beyond the Ge'ez.
- source_word: ያእትቱ
  chosen: to lay low
  alternatives:
  - to cast down
  - to strike down
  - to bring down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is to bring down or overthrow. 'Lay low' fits the violent animal-vision
    imagery without becoming colloquial in context.
- source_word: ቀርኖ
  chosen: his horn
  alternatives:
  - his power
  - his horn of strength
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Horn imagery is symbolically important in apocalyptic literature and
    should be preserved literally rather than interpreted away as abstract power.
- source_word: አእህሉዎ
  chosen: they did not prevail against him
  alternatives:
  - they could not do so
  - they did not overcome him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The closing verb indicates failure to accomplish their aim. 'They did
    not prevail against him' makes explicit the unsuccessful attack while remaining
    faithful to the narrative sense.
