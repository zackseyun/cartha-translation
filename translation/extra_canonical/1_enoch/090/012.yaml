theological_decisions:
- issue: Whether to interpret 'horn' symbolically in the main text
  chosen_reading: Retain literal 'horn'
  alternative_readings:
  - his strength
  - his rule
  - his power
  rationale: The Animal Apocalypse communicates through sustained symbolic imagery.
    Interpreting the symbol in the translation would flatten the vision and exceed
    the wording of the Ge'ez witness.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    paraphrase beyond the witness.'
