translation:
  text: And those ravens fought and battled with him, and they wanted to remove his
    horn, but they did not prevail against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against him' for 'with him'; the Ge'ez preposition is literally 'with,'
      but the context is hostile conflict.
    reason: lexical_alternative
  - marker: b
    text: '''Horn'' is kept literally as part of the vision''s symbolic imagery, rather
      than rendered interpretively as ''power'' or ''strength.'''
    reason: cultural_note
  - marker: c
