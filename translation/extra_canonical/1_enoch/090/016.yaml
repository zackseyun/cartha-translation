translation:
  text: And all the eagles and the vultures and the ravens and the kites gathered
    together and came with them, with all the wild sheep; and they all came together
    and helped one another so as to shatter the horn of that ram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sheep of the wilderness.' The Ge'ez phrase likely distinguishes these
      from the main flock by their wilderness setting or untamed character.
    reason: lexical_alternative
  - marker: b
    text: The final animal term is rendered 'boar' to preserve the image of a wild
      hostile beast; 'swine' is a possible broader alternative.
    reason: lexical_alternative
  - marker: c
    text: Or 'that boar’s horn'.
    reason: previous_rendering
  - marker: d
    text: Or 'the kites and the ravens'.
    reason: previous_rendering
lexical_decisions:
- source_word: አንስርት
  chosen: eagles
  alternatives:
  - vultures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse bird imagery is species-specific and should
    be preserved. This term commonly denotes eagles; although some overlap with large
    birds of prey is possible, 'eagles' best fits the usual zoological sense and keeps
    the sequence of predatory birds distinct.
- source_word: ዓውስት
  chosen: vultures
  alternatives:
  - buzzards
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered as 'vultures' to preserve a carrion-bird image distinct from
    the eagle term before it. 'Buzzards' is possible in some English traditions but
    is less clear for modern readers.
- source_word: ቋዓት
  chosen: kites
  alternatives:
  - hawks
  - falcons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A smaller raptorial bird is likely intended. 'Kites' preserves the differentiated
    list of hostile birds without collapsing all into generic 'hawks.'
- source_word: ሀባይ
  chosen: ravens
  alternatives:
  - crows
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Chosen for the darker scavenger/predator imagery common in apocalyptic
    animal symbolism. 'Crows' is a possible broader alternative, but 'ravens' better
    matches the elevated register and likely force.
- source_word: ተጋብኡ
  chosen: gathered together
  alternatives:
  - assembled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb marks coordinated hostile action. 'Gathered together' preserves
    the collective movement and the repetitive apocalyptic style.
- source_word: አባግዕ ገዳም
  chosen: wild sheep
  alternatives:
  - sheep of the wilderness
  - desert sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase distinguishes these sheep from the domesticated flock imagery
    elsewhere. 'Wild sheep' is concise and natural while preserving the wilderness
    sense of ገዳም.
- source_word: ኅቡረ
  chosen: together
  alternatives:
  - in one company
  - as one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This adverbial idea reinforces the united assault. A simple rendering
    keeps the repeated collective emphasis audible in English.
- source_word: ትራድኡ
  chosen: helped one another
  alternatives:
  - supported one another
  - joined forces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is mutual assistance in the attack. 'Helped one another' is
    transparent and avoids over-interpreting the military nuance.
- source_word: ይቀትቅጥዎ
  chosen: break
  alternatives:
  - shatter
  - smash
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys violent destruction. 'Break' is the broadest faithful
    choice; 'shatter' is possible but slightly more interpretive.
- source_word: ቀርነ
  chosen: horn
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The horn is a key symbolic element in the Animal Apocalypse and should
    be retained literally, not paraphrased as power or ruler.
- source_word: ይቤላ
  chosen: boar
  alternatives:
  - swine
  - pig
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The animal appears as a hostile symbolic figure. 'Boar' preserves the
    wild, aggressive force better than the more domestic 'pig' or generic 'swine'.
