theological_decisions:
- issue: How to handle the difficult repeated ነገር in a visionary transformation scene
  chosen_reading: Retain the literal rendering 'word' in the main text
  alternative_readings:
  - thing
  - matter
  - speech
  rationale: The line is obscure, and resolving it into a smoother interpretive paraphrase
    would hide the textual difficulty. Preserving 'word' keeps the verse auditable
    and avoids importing a later theological concept not demanded by the Ge'ez.
