  - their species
  - their families
  - their forms
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Within the animal-symbolic vision, the term refers to the classes or kinds to which the creatures belonged. 'Kinds' is natural English and preserves the zoological-symbolic force.
- source_word: አልህምተ ጻዕዳ
  chosen: white cattle
  alternatives:
  - white oxen
  - white bovines
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Animal Apocalypse regularly uses bovine imagery. 'Cattle' is broad enough to preserve the collective image without over-specifying sex or age.
- source_word: ቀዳማዊ
  chosen: the first
  alternatives:
  - the former one
  - the foremost
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term marks primacy or firstness within the group. 'The first' is the most direct rendering.
- source_word: ማእከሎሙ
  chosen: among them
  alternatives:
  - in their midst
  - in the middle of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase locates the figure within the group. 'Among them' is idiomatic while preserving the spatial sense.
- source_word: ነገር
  chosen: a word
  alternatives:
  - a thing
  - a matter
  - speech
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR reading gives ነገር twice. In Ge'ez this can mean 'word,' 'matter,' or 'thing.' Because the line is textually difficult and the repetition appears deliberate, the main text keeps the more literal 'word' and leaves the difficulty visible rather than smoothing it away.
- source_word: አርዌ ዐቢየ
  chosen: a great beast
  alternatives:
  - a great animal
  - a huge wild beast
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes an animal/beast, often with a wild or powerful sense. 'Great beast' fits the elevated apocalyptic register.
- source_word: ቦ
  chosen: it had…
  alternatives:
  - and there was in it…
  - and it possessed…
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verse as transmitted in the OCR appears to break off or continue into the next clause. 'It had…' reflects the surviving wording while signaling incompleteness.
