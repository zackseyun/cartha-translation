  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of visionary metamorphosis in the Animal Apocalypse, the verb most naturally denotes a change of form/state rather than literal birth. 'Were transformed' preserves the apocalyptic imagery.
- source_word: አዝማዲሆሙ
