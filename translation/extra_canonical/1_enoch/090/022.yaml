translation:
  text: 'And he said to that man who was writing before him—being one of those seven white ones—and he said to him: “Take those seventy shepherds to whom I delivered the sheep; and they, taking them, killed many more than I commanded them.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I entrusted the sheep to them.' The verb can emphasize handing over into another's charge.
    reason: lexical_alternative
  - marker: b
    text: The wording implies that the shepherds went beyond the limit of what had been commanded to them.
    reason: alternative_reading
  - marker: c
    text: Or 'And he said to that man who was writing before him—one of those seven white ones—“Take'.
    reason: previous_rendering
lexical_decisions:
- source_word: ብእሲ
  chosen: man
  alternatives:
  - person
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term ordinarily denotes a male human figure. In this vision context it refers to the heavenly scribe previously present in the scene, so 'man' preserves the anthropomorphic visionary imagery.
- source_word: ዘይጽሕፍ
  chosen: who was writing
  alternatives:
  - who writes
  - who was recording
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A relative verbal form from 'to write.' The imperfective sense in narrative can be rendered as ongoing past action; 'was writing' fits the scene of a heavenly recorder at work.
- source_word: በቅድሜሁ
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally spatially 'before him/in front of him.' 'Before him' is concise and preserves the courtlike setting.
- source_word: ፯እምነ ዝኩ ፯ጻዕዳው
  chosen: one of those seven white ones
  alternatives:
  - one of those seven white men
  - one from among those seven white ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase identifies the scribe as belonging to the seven radiant heavenly beings. 'White ones' preserves the color symbolism without over-specifying 'men' where the Ge'ez already supplied 'man' earlier.
- source_word: ንሥኦሙ
  chosen: Take
  alternatives:
  - seize
  - bring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative of taking/carrying off. In a judgment scene, 'take' is broad and natural, leaving the exact mode of custody implicit.
- source_word: ፸ኖሎት
  chosen: seventy shepherds
  alternatives:
  - seventy pastors
  - seventy keepers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established animal-apocalypse image for the angelic or ruling overseers entrusted with the sheep. 'Shepherds' preserves the metaphor central to the vision.
- source_word: መጠውክዎሙ
  chosen: I delivered
  alternatives:
  - I entrusted
  - I handed over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys handing over into another's charge. 'Delivered' keeps the judicial tone while allowing the following object 'the sheep' to remain explicit.
- source_word: አባግዐተ
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural noun for sheep. 'The sheep' preserves the recurring symbolic identity of the people in the Animal Apocalypse better than the more collective 'flock.'
- source_word: ነሢኦሙ ቀተሉ
  chosen: taking them, killed
  alternatives:
  - seized them and killed
  - having taken them, they killed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sequence is participle plus finite verb. Rendering it as 'taking them, killed' preserves the action chain without excessive smoothing.
- source_word: ብዙኃነ እምዘ አዘዝክዎሙ
  chosen: many more than I commanded them
  alternatives:
  - more than I ordered them
  - far more than I had commanded them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks excess beyond a set commission. 'Many more than I commanded them' captures both quantity and culpable overreach in judgment.
