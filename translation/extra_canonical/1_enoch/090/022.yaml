theological_decisions:
- issue: Identity of the 'seventy shepherds'
  chosen_reading: Retain the symbolic title 'seventy shepherds' without interpretive expansion in the main text.
  alternative_readings:
  - seventy angels
  - seventy rulers
  rationale: The Animal Apocalypse deliberately uses animal and pastoral symbolism. Expanding the image in the main text would over-interpret the vision and flatten its apocalyptic rhetoric.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten symbolic language into generic prose.
- issue: Force of divine commission in the shepherds' violence
  chosen_reading: Render the line so that the shepherds exceeded a real command rather than acted without any authorization.
  alternative_readings:
  - they killed although I had not commanded them
  - they killed more than was decreed for them
  rationale: The Ge'ez wording most naturally indicates excess beyond what was commanded, not absolute absence of commission. This preserves the theological tension of delegated judgment abused by the agents.
  doctrine_reference: Preserve theological tension rather than resolve it.
