  chosen_reading: Render the final count literally as 'fifty-eight times' rather than
    interpretively as years, periods, or shepherding terms in the main text.
  alternative_readings:
  - fifty-eight periods
  - fifty-eight seasons
  - fifty-eight shepherding terms
