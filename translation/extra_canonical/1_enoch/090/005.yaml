translation:
  text: And I saw until the time when twenty-three had looked, and they completed,
    in their respective times, fifty-eight times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic wording is difficult here. The clause rendered 'when twenty-three
      had looked' may refer to a counted sequence reaching twenty-three, but the exact
      verb sense is uncertain in this witness.
    reason: textual_variant
  - marker: b
    text: Literally 'fifty-eight times'; the word may denote counted periods or appointed
      spans rather than repeated actions.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢኩ
  chosen: And I saw
  alternatives:
  - And I looked
  - And I kept seeing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard narrative visionary formula in 1 Enoch; 'I saw' preserves the
    apocalyptic report style without over-expanding aspect.
- source_word: እስከ ዘመን
  chosen: until the time
  alternatives:
  - up to the time
  - until a time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks the temporal limit of the vision sequence. 'Until the
    time' is idiomatic and preserves the repeated temporal framing.
- source_word: ይሬዐዩ
  chosen: had looked
  alternatives:
  - had appeared
  - had been seen
  - had shepherded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR form is difficult, but in context the clause appears to describe
    a counted sequence reaching twenty-three. A visual verb is the most conservative
    rendering from the Ethiopic form as transmitted here, though the exact sense is
    uncertain.
- source_word: ፳ወ፫
  chosen: twenty-three
  alternatives: []
  lexicon: Ge'ez numeral system
  rationale: Direct rendering of the numeral.
- source_word: ወፈጸሙ
  chosen: and they completed
  alternatives:
  - and they finished
  - and they fulfilled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly carries the sense of bringing something to completion.
    'Completed' fits the counted periods in this verse.
- source_word: በበጊዜሆሙ
  chosen: in their respective times
  alternatives:
  - each in its time
  - in their times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The distributive repetition suggests succession or allotment. 'In their
    respective times' preserves that distributive force.
- source_word: ፶ወ፰ጊዜያተ
  chosen: fifty-eight times
  alternatives:
  - fifty-eight periods
  - fifty-eight seasons
  lexicon: Ge'ez numeral system
  rationale: Literally 'fifty-eight times/periods.' Because the verse is counting
    visionary units, 'times' keeps the wording transparent while allowing a footnote
    to note the possible sense of periods.
