lexical_decisions:
- source_word: ወርእየ
  chosen: And I saw
  alternatives:
  - And I looked
  - Then I saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary narrative formula in Enoch; 'And I saw' preserves the repeated apocalyptic reporting style.
- source_word: ቦሙ
  chosen: among them
  alternatives:
  - in them
  - there among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Best taken locatively in context: the seer observes something appearing within the group of animals.'
- source_word: ወተፈትሐ አዕይንቲሆሙ
  chosen: '[their eyes were opened]'
  alternatives:
  - their eyes were opened
  - the eyes of them were opened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is bracketed in the supplied witness, signaling textual uncertainty. It is retained in translation but marked with brackets rather than omitted, since it gives coherent sense in the Animal Apocalypse's recurring motif of opened eyes signifying perception or awakening.
- source_word: ወጸርኀ
  chosen: it cried out
  alternatives:
  - it shouted
  - it called out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A strong vocal verb fits the urgent visionary scene better than a softer 'said' alone. The singular subject is left as 'it' because the antecedent in the immediate Ge'ez line is not explicitly restated.
- source_word: ሎሙ ለአባግዕ
  chosen: to the sheep
  alternatives:
  - to those sheep
  - to the flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The dative plus noun directly indicates address to the sheep; 'the flock' would smooth the animal imagery too much.
- source_word: ወይቤላት ርእይዎ
  chosen: and said to them, 'Look!'
  alternatives:
  - and said to them, 'See!'
  - and told them, 'Look at it!'
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative force is clear. 'Look!' is idiomatic modern English while preserving the abrupt summons to perception.
- source_word: ወሮጹ ኵሎሙ ኀቤሁ
  chosen: And all of them ran to it
  alternatives:
  - and they all ran to him
  - and all of them hurried toward it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes running. The final pronoun may be rendered 'it' because the antecedent is an animal figure in the vision; 'him' is possible if the figure is personalized, but 'it' better matches the immediate animal-symbolic register.
