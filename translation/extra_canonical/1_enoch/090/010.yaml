translation:
  text: And it looked at them, [and their eyes were opened,] and it cried out to the sheep, and the rams saw it, and they all ran to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'their eyes were opened' is bracketed because the supplied Ethiopic witness marks it as uncertain or textually unstable, though it fits a recurring motif in this vision cycle.
    reason: textual_variant
