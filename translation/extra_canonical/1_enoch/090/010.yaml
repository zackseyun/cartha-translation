theological_decisions:
- issue: Whether to personalize the singular figure addressed by the sheep imagery
  chosen_reading: Use the pronoun 'it' rather than 'him' in the main text
  alternative_readings:
  - him
  rationale: In the Animal Apocalypse, figures are presented under animal symbolism. Using 'it' preserves the vision's symbolic surface and avoids prematurely resolving the figure into a human referent, while a footnote can preserve the alternative.
  doctrine_reference: Preserve theological tension rather than resolve it; keep imagery locally grounded in the passage.
