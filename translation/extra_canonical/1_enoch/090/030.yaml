translation:
  text: And I saw all the sheep that were left; and every beast that was upon the earth and all the birds of heaven were falling down and bowing to those sheep, and making petition to them, and obeying them in every word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb translated 'obeying' is literally 'hearing.' In this context of prostration and petition, it likely carries the sense of heeding or obeying.
    reason: lexical_alternative
  - marker: b
    text: Or 'And I saw all the sheep that were left, and every beast that was upon the earth, and all the birds of heaven, falling down and bowing'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢክዎሙ
  chosen: And I saw
  alternatives:
  - And I looked at them
  - And I beheld them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb introduces Enoch’s visionary report. 'And I saw' is the most natural elevated English and preserves the first-person apocalyptic narration without unnecessary archaism.
- source_word: ኵሎሙ አባግዕ እለ ተርፉ
  chosen: all the sheep that were left
  alternatives:
  - all the surviving sheep
  - all the sheep that remained
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks the remnant after judgment within the Animal Apocalypse. 'Were left' keeps the passive/remnant sense and avoids over-interpreting whether survival is military, judicial, or eschatological.
- source_word: ኵሉ እንስሳ ዘዲበ ምድር
  chosen: every beast that was upon the earth
  alternatives:
  - every animal on the earth
  - every wild beast upon the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Beast'' better fits the symbolic animal register of the vision than the flatter ''animal.'' ''Upon the earth'' preserves the elevated spatial phrasing of the Ge''ez.'
- source_word: ኵሉ አዕዋፈ ሰማይ
  chosen: all the birds of heaven
  alternatives:
  - all the birds of the sky
  - all the birds of heaven's expanse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Birds of heaven'' preserves biblical-apocalyptic diction and matches the visionary style better than the more ordinary ''birds of the sky.'''
- source_word: ይወድቁ ወይሰግዱ
  chosen: falling down and bowing
  alternatives:
  - would fall and prostrate themselves
  - fell down and worshiped
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs depict bodily submission. 'Falling down and bowing' preserves the imagery without importing the stronger religious term 'worshiped,' which could overstate the scene.
- source_word: ለእልኩ አባግዕ
  chosen: to those sheep
  alternatives:
  - before those sheep
  - to that flock of sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative points back to the surviving sheep just mentioned. 'Those sheep' is direct and preserves the referential force.
- source_word: ያስተበቍዕዎሙ
  chosen: making petition to them
  alternatives:
  - entreating them
  - seeking favor from them
  - supplicating them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys supplication or earnest request. 'Making petition to them' keeps the formal tone and the posture of submission in the scene.
- source_word: ይሰምዕዎሙ በኵሉ ቃል
  chosen: obeying them in every word
  alternatives:
  - listening to them in every matter
  - heeding them in everything they said
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the verb is literally 'hear,' in context of submission it carries the sense of heed/obey. 'In every word' preserves the concrete wording of the Ge'ez while communicating comprehensive obedience.
