theological_decisions:
- issue: Whether the submission of beasts and birds to the sheep should be rendered as worship
  chosen_reading: 'Rendered as political/eschatological submission: ''falling down and bowing ... making petition ... obeying'''
  alternative_readings:
  - Rendered as explicit worship
  - Rendered as mere respect or homage
  rationale: The sequence of falling, bowing, petitioning, and hearing suggests comprehensive submission to the exalted sheep, but the object is not God directly. Avoiding 'worship' preserves the imagery without forcing a later theological category onto the animal symbolism.
  doctrine_reference: Preserve theological tension rather than resolve it; do not over-harmonize with later Christian usage.
