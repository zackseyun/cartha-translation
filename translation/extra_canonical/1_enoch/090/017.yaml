theological_decisions:
- issue: Identity of the 'man' writing the book
  chosen_reading: Render simply as 'that man' without identifying him more specifically
    in the main text.
  alternative_readings:
  - that angel
  - that scribe-angel
  - that figure
  rationale: The Ge'ez says 'man,' and the vision often depicts heavenly beings in
    human form. Retaining 'man' preserves the imagery and avoids interpretive overreach.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of the shepherds' excess
  chosen_reading: Translate the final clause as an accusation that the twelve shepherds
    destroyed more than the limit set before them.
  alternative_readings:
  - they destroyed more than those before them
  - they exceeded what was appointed to them
  rationale: Within the Animal Apocalypse, the shepherds are allotted a measured commission
    and then exceed it. This reading best fits the judgment scene and the difficult
    Ge'ez phrase.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    ambiguity with documentation.
