translation:
  text: And I saw until that man, who was writing a book by the word of the Lord,
    opened that book of destruction which those twelve shepherds had wrought, and
    he showed before the Lord of the sheep that they had destroyed much more than
    those before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is difficult in the Ethiopic. The sense appears to be that
      the twelve shepherds destroyed beyond the limit or charge assigned to them.
    reason: textual_variant
  - marker: b
    text: '''Lord of the sheep'' is the vision''s own title within the animal imagery
      and is kept rather than replaced with a generic divine title.'
    reason: cultural_note
  - marker: c
    text: Or 'opened that book of destruction which those twelve shepherds had destroyed'.
    reason: previous_rendering
  - marker: d
    text: Or 'much more than what was commanded before them'.
    reason: previous_rendering
  - marker: e
    text: Or 'And I saw till'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢክዎ
  chosen: And I saw
  alternatives:
  - And I looked
  - And I kept seeing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard visionary narrative formula; simple past works in English while
    preserving the report style.
- source_word: ብእሲ
  chosen: man
  alternatives:
  - person
  - figure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term ordinarily means 'man' or 'human being.' In this context it
    refers to the previously seen heavenly scribe, but 'man' preserves the vision's
    wording without over-interpreting.
- source_word: ዘይጽሕፍ መጽሐፈ
  chosen: who was writing a book
  alternatives:
  - who wrote a book
  - who was recording in a book
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative verb plus object naturally yields an ongoing or characteristic
    action. 'Writing a book' keeps the concrete image of heavenly record-keeping.
- source_word: በቃለ እግዚአ
  chosen: by the word of the Lord
  alternatives:
  - at the word of the Lord
  - according to the word of the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates authorization or commission. 'By the word of the
    Lord' preserves the formal, revelatory tone.
- source_word: ፈትሖ ለውእቱ መጽሐፈ
  chosen: opened that book
  alternatives:
  - unsealed that book
  - laid open that book
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb most straightforwardly means 'opened.' 'Unsealed' would add
    imagery not explicit in the Ge'ez.
- source_word: መጽሐፈ ሐጕል
  chosen: book of destruction
  alternatives:
  - book of ruin
  - book of perdition
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun conveys destruction/ruin. 'Book of destruction' fits the judgment
    context and avoids importing later technical theological language.
- source_word: ዘአሕጐሉ እልኩ ፲ወ፪የአቱ ይኃርያን
  chosen: which those twelve shepherds had destroyed
  alternatives:
  - which those twelve shepherds had ruined
  - concerning what those twelve shepherds had destroyed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause links the book with the destructive acts of the twelve
    shepherds in the Animal Apocalypse. Rendering it directly keeps the indictment
    clear.
- source_word: አርአዩ
  chosen: he showed
  alternatives:
  - he made known
  - he displayed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular rendering fits the preceding subject, the man writing the
    book. 'Showed' preserves the courtroom-like demonstrative force.
- source_word: ፈድፋደ እምቅድሜሆሙ
  chosen: much more than what was commanded before them
  alternatives:
  - more than the measure set before them
  - in excess of what was before them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult, but the sense in context is excess beyond an
    allotted limit. 'What was commanded before them' makes explicit the judicial commission
    implied in the shepherds' mandate.
- source_word: ቅድመ እግዚአ አባግዕ
  chosen: before the Lord of the sheep
  alternatives:
  - in the presence of the Lord of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key Animal Apocalypse title for God. It should be preserved
    literally rather than generalized to 'God' in order to retain the passage's symbolic
    world.
