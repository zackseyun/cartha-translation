theological_decisions:
- issue: Identity of 'the Lord of the sheep'
  chosen_reading: A divine title within the Animal Apocalypse referring to God as sovereign judge over the flock.
  alternative_readings:
  - A more generic 'master of the sheep' within the allegory
  rationale: The wider allegorical framework consistently uses this title for the transcendent ruler who intervenes in judgment. Rendering it as 'Lord' preserves the theological weight without importing later christological language.
  doctrine_reference: 'Translation philosophy: translate titles for meaning; preserve local passage context rather than later doctrinal harmonization.'
