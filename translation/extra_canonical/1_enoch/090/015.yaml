  from: before his face
  to: from before his face
  rationale: 'The Ge''ez preposition እም (from) carries an ablative force here (እምቅድመ ገጹ, ''from before his face''), indicating movement away from the Lord''s presence in terror. The draft drops the ablative, but the context (cf. v. 19 ''fled from before their face'') shows this is a consistent idiom of flight and retreat that should be preserved. | Adjudicator: The Ge''ez preposition እም (ʾəm) explicitly means ''from,'' and when combined with ቅድመ (qədmä, ''before''), it forms the compound preposition እምቅድመ (''from before''). The current rendering drops the ablative '
