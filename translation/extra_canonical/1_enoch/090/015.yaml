translation:
  text: And I watched until the Lord of the sheep came to them in wrath, and all who saw him fled, and they all fell into the shadow from before his face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from before his face'; the Ge'ez idiom can denote the overwhelming effect of his presence.
    reason: lexical_alternative
  - marker: b
    text: '''Into the shadow'' is a literal rendering of the Ge''ez; the image may suggest a dark place of downfall, but the wording is left transparent rather than interpreted more narrowly.'
    reason: lexical_alternative
  - marker: c
    text: Or 'before his face'.
    reason: previous_rendering
lexical_decisions:
- source_word: ርኢኩ
  chosen: I watched
  alternatives:
  - I saw
  - I looked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In visionary narrative this verb often introduces continued observation, not merely a punctiliar sight. 'I watched' preserves the apocalyptic report style.
- source_word: እስከ መጽአ
  chosen: until ... came
  alternatives:
  - until ... arrived
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This standard sequence marks the continuation of the vision up to a decisive arrival.
- source_word: እግዚአ አባግዕ
  chosen: the Lord of the sheep
  alternatives:
  - the master of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is a key title in the Animal Apocalypse for God as sovereign over his flock. 'Lord' best preserves both authority and the established imagery.
- source_word: በመዓት
  chosen: in wrath
  alternatives:
  - with wrath
  - in anger
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase expresses the manner of his coming. 'In wrath' keeps the elevated judgment register and avoids flattening the judicial force.
- source_word: እለ ርእይዎ ኵሎሙ
  chosen: all who saw him
  alternatives:
  - everyone who saw him
  - all of them who saw him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative construction naturally yields a collective expression. 'All who saw him' is concise and faithful.
- source_word: ነፍጹ
  chosen: fled
  alternatives:
  - were scattered
  - ran off
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys sudden flight in fear before divine appearance. 'Fled' preserves the urgency without colloquial tone.
- source_word: ወወድቁ ኵሎሙ
  chosen: and they all fell
  alternatives:
  - and all of them fell down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated 'all' is retained to preserve the totalizing judgment scene.
- source_word: ውስተ ጽላሎት
  chosen: into the shadow
  alternatives:
  - into the darkness
  - into the shade
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez points literally to 'shadow/shade.' In this apocalyptic context it likely carries ominous force, but the more literal 'shadow' preserves the image without over-interpreting it as 'darkness' or 'Sheol'.
- source_word: እምቅድመ ገጹ
  chosen: before his face
  alternatives:
  - from before his face
  - before him
  - from his presence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'from before his face/presence.' 'Before his face' keeps the vivid anthropomorphic idiom of divine presence; the preceding motion 'fell into the shadow' already carries the sense of being overwhelmed in his presence.
