theological_decisions:
- issue: Identity of the enthroned figure and the one before whom the books are opened
  chosen_reading: 'Retain the Ge''ez wording as-is: the Lord of the sheep sits on
    the throne, and the books are opened before the Lord of the sheep.'
  alternative_readings:
  - Emend one occurrence so that another heavenly figure sits or the books are opened
    before a different agent
  rationale: The verse as transmitted has a potentially awkward repetition, but the
    base witness is coherent enough to translate without silently harmonizing or emending.
    The apocalyptic scene may intentionally emphasize the Lord of the sheep as both
    enthroned judge and recipient of the records.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
