translation:
  text: And I saw until a throne was set up in the pleasant land, and the Lord of
    the sheep sat upon it; and he took all the sealed books and opened those books
    before the Lord of the sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic word rendered 'pleasant land' is uncertain in this witness;
      it may denote a specially favored land rather than the earth in general.
    reason: lexical_alternative
  - marker: b
    text: The verse repeats 'the Lord of the sheep' both as the one seated on the
      throne and as the one before whom the books are opened. The translation keeps
      this repetition rather than smoothing it away.
    reason: textual_variant
lexical_decisions:
- source_word: መንበር
  chosen: throne
  alternatives:
  - seat
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic judgment scene, the term denotes a royal/judicial
    seat, so 'throne' preserves the imagery better than the flatter 'seat'.
- source_word: ተሐንጸ፡
  chosen: was set up
  alternatives:
  - was built
  - was established
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive form indicates the throne being prepared or erected. 'Was
    set up' fits the visionary scene naturally without over-specifying construction.
- source_word: ሐዋዝ
  chosen: the pleasant land
  alternatives:
  - the land
  - the inhabited land
  - the middle of the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ethiopic here is difficult, but in context of the Animal Apocalypse's
    land imagery it likely refers to the choice or beautiful land rather than merely
    generic 'earth.' 'Pleasant land' preserves the concrete territorial sense and
    the elevated register.
- source_word: እግዚአ፡ አባግዕ፡
  chosen: the Lord of the sheep
  alternatives:
  - the master of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This repeated title in the Animal Apocalypse should be rendered consistently.
    'Lord' preserves both authority and the elevated apocalyptic tone.
- source_word: መጻሕፍተ፡ ኅትማተ፡
  chosen: the sealed books
  alternatives:
  - the books of seals
  - the sealed scrolls
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase refers to books marked by sealing, likely heavenly records.
    'Sealed books' is the most direct English rendering from the Ge'ez wording.
- source_word: ፈትሖን
  chosen: opened
  alternatives:
  - unsealed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the books are sealed, the verb itself is the ordinary 'opened.'
    'Opened' keeps close to the source while allowing the sealing imagery to remain
    implicit from the prior phrase.
