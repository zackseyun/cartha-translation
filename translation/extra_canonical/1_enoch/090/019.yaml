translation:
  text: And I saw until a great sword was given to the sheep, and the sheep went out
    against all the beasts of the field to kill them; and all the beasts and the birds
    of heaven fled from before their face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'from before their face' reflects a Semitic-style idiom for fleeing
      in someone's presence; English readers may understand simply 'fled before them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I looked
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary report; 'I saw' is clear modern English
    and preserves the apocalyptic narrative formula.
- source_word: እስከ ተውህበ
  chosen: until ... was given
  alternatives:
  - until ... had been given
  - until there was given
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the temporal progression of the vision rather than smoothing
    to a simple past; this formula marks what Enoch continues seeing up to a decisive
    event.
- source_word: ለአባግዕ
  chosen: to the sheep
  alternatives:
  - for the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The dative sense is best represented by 'to the sheep'; in the Animal
    Apocalypse the sheep are the covenant people under zoomorphic imagery, which should
    be preserved rather than interpreted in the main text.
- source_word: ሰይፍ ዐቢይ
  chosen: a great sword
  alternatives:
  - a large sword
  - a mighty sword
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Great sword'' preserves the elevated, symbolic force of the image
    and avoids over-interpreting whether the emphasis is size or power.'
- source_word: ወወፅኡ አባግዕ
  chosen: and the sheep went out
  alternatives:
  - and the sheep came forth
  - and the sheep went forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of movement into action; 'went out' is readable
    while still preserving the narrative's martial advance.
- source_word: ዲበ ኵሉ አራዊተ ገዳም
  chosen: against all the beasts of the field
  alternatives:
  - upon all the wild beasts
  - against all the beasts of the wilderness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes the hostile animal powers opposed to the sheep. 'Beasts
    of the field' is a natural biblical-English equivalent and preserves the animal-apocalypse
    imagery without flattening it to 'enemies.'
- source_word: ከመ ይቅትልዎሙ
  chosen: to kill them
  alternatives:
  - that they might kill them
  - in order to slay them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresses purpose/result plainly. 'Kill' is preferred over the more archaic
    'slay' for readability, while retaining the violence of the judgment scene.
- source_word: ነፍጹ እምቅድመ ገጾሙ
  chosen: fled from before their face
  alternatives:
  - fled before them
  - were terrified before them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez idiom is more vivid than a flattened 'fled before them.' 'From
    before their face' preserves the concrete apocalyptic style, though slightly idiomatic
    in English.
- source_word: አዕዋፈ ሰማይ
  chosen: the birds of heaven
  alternatives:
  - the birds of the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the elevated register and matches the visionary diction of the
    passage.
