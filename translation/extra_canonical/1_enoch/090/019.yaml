theological_decisions:
- issue: Whether to decode the animal symbolism in the main text
  chosen_reading: Retain 'sheep,' 'beasts,' and 'birds' literally as visionary symbols
  alternative_readings:
  - Translate interpretively as Israel, hostile nations, and allied powers
  rationale: The Animal Apocalypse communicates through sustained symbolic imagery.
    The translation should preserve the vision's own terms rather than collapsing
    them into an explanatory paraphrase.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    apocalyptic imagery rather than smoothing it into generic prose.'
