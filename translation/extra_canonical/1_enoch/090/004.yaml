translation:
  text: And I saw until those sheep were devoured by the dogs and by the eagles and
    by the kites, and they left them neither full flesh nor skin nor sinew, until
    only their bones stood there; and their bones too fell upon the earth, and the
    sheep became few.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The bird term rendered 'kites' may also be understood more broadly as a
      kind of hawk or other bird of prey.
    reason: lexical_alternative
  - marker: b
    text: 'The phrase ''full flesh'' reflects an expression of completeness: no flesh
      remained intact on them.'
    reason: lexical_alternative
  - marker: c
    text: '''Only their bones stood there'' keeps the stark visual wording of the
      Ethiopic; the sense is that nothing remained but exposed bones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ተበልዑ
  chosen: were devoured
  alternatives:
  - were eaten
  - were consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive form with violent predatory force in the vision context; 'devoured'
    preserves the apocalyptic brutality better than the flatter 'eaten'.
- source_word: አክልብት
  chosen: dogs
  alternatives:
  - hounds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary animal term is best kept simple and literal within the Animal
    Apocalypse symbolism.
- source_word: አንስርት
  chosen: eagles
  alternatives:
  - vultures
  - great birds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The standard rendering is 'eagles'; although birds of prey can overlap
    in ancient usage, there is not enough warrant here to shift to another species
    in the main text.
- source_word: ሆባይ
  chosen: kites
  alternatives:
  - hawks
  - falcons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A bird of prey distinct from the previous term; 'kites' preserves the
    likely differentiation without overclaiming precision.
- source_word: ኢኃደጉ ሎሙ
  chosen: they left them neither
  alternatives:
  - they did not leave for them
  - they spared them neither
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom introduces the totality of what remained after the attack;
    'left them neither' is idiomatic English and keeps the negated completeness.
- source_word: ሥጋ ግሙራ
  chosen: full flesh
  alternatives:
  - whole flesh
  - any flesh intact
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ግሙራ carries the sense of completeness/entirety. 'Full flesh' is slightly
    unusual in English but preserves the emphasis that no flesh remained intact.
- source_word: ማእሰ፡
  chosen: skin
  alternatives:
  - hide
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In a sheep-slaughter image, 'skin' is the most natural English equivalent;
    'hide' is possible but less immediate.
- source_word: ሥርወ
  chosen: sinew
  alternatives:
  - tendon
  - ligament
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sequence flesh/skin/sinew intensifies the total stripping of the
    carcass. 'Sinew' fits elevated biblical English while remaining understandable.
- source_word: ቆሙ ባሕቲቶ አዕፅምቲሆሙ
  chosen: only their bones stood there
  alternatives:
  - their bones alone remained
  - nothing stood but their bones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The wording is vivid and somewhat physical; 'stood there' preserves the
    image of bones left upright/exposed rather than smoothing it to a generic 'remained'.
- source_word: ወአዕፅምቲሆሙሰ ወደቁ ዲበ ምድር
  chosen: and their bones too fell upon the earth
  alternatives:
  - and even their bones fell to the ground
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The enclitic emphasis on the bones is preserved by 'too'; 'upon the earth'
    keeps the elevated register of the vision.
- source_word: ወንእሱ አባግዕ
  chosen: and the sheep became few
  alternatives:
  - and the sheep were diminished
  - and the sheep dwindled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates reduction in number. 'Became few' is close to the
    source and preserves the stark summary of the devastation.
