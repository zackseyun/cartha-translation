  from: and it was full of abundance.
  to: and exceedingly full.
  rationale: 'The Ge''ez ''ፈድፋደ'' (fadfada) functions here as an adverb (''exceedingly'', ''very much'') modifying the adjective ''ምሉአ'' (full). It is not a noun meaning ''abundance''. Furthermore, ''ምሉአ'' is the third accusative predicate adjective governed by ''ኮነ'' (became), alongside ''great'' and ''broad''. The draft breaks the syntax and changes the meaning from a house that is ''exceedingly full'' (of the sheep mentioned in v. 34) to a house filled with an abstract substance called ''abundance''. | Adjudicator: The reviewer correctly identifies the syntax and lexicon. The Ge''ez `ፈድፋደ` (fadfāda) is an adverb meaning ''exceedingly'' or ''very much,'' modifying the accusative predicate adjective `ምሉአ` (məlu''a, ''ful'
