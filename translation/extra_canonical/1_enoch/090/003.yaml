theological_decisions:
- issue: Whether to interpret the animal imagery as its historical referent in the
    main text
  chosen_reading: Retain the literal visionary imagery of sheep, birds, and shepherd.
  alternative_readings:
  - Render the symbols directly as people, enemies, and rulers
  rationale: The translation philosophy for Enoch requires preserving apocalyptic
    imagery rather than collapsing it into interpretation. The historical referents
    belong in commentary, not in the verse text.
  doctrine_reference: 'Book context: visionary and apocalyptic prose/poetry must not
    be flattened.'
