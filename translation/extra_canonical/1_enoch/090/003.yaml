translation:
  text: And the sheep cried out because their flesh was being devoured by the birds,
    and I looked and lamented in my sleep over that shepherd who was pasturing the
    sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I watched and wailed in my sleep.' The seer's response verb can be rendered
      with varying degrees of audible grief.
    reason: lexical_alternative
  - marker: b
    text: The text says 'birds,' without specifying 'birds of prey,' though the predatory
      sense is implied by the devouring imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: አባግዕ
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural noun for sheep; in the Animal Apocalypse the animal imagery is
    to be preserved explicitly rather than generalized to 'people' or 'flock'.
- source_word: ጸርኁ
  chosen: cried out
  alternatives:
  - wailed
  - cried
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Carries the force of an audible cry or lament. 'Cried out' preserves
    the distress without over-specifying ritual lament.
- source_word: ይትበልዑ
  chosen: was being devoured
  alternatives:
  - was being eaten
  - were being consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/imperfect sense in context; English shifts to singular with 'their
    flesh' as the grammatical subject. 'Devoured' better conveys violent predation
    in the vision.
- source_word: ሥጋሆሙ
  chosen: their flesh
  alternatives:
  - their bodies
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literal 'flesh' should be retained because the verse depicts bodily tearing
    by predatory birds; 'bodies' would soften the visceral imagery.
- source_word: እምነ አዕዋፍ
  chosen: by the birds
  alternatives:
  - from the birds
  - by birds of prey
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks agency/source in the passive construction. 'By
    the birds' is the most direct rendering from the Ge'ez witness; 'birds of prey'
    may be interpretively true in context but is more specific than the wording given.
- source_word: ነጸርኩ
  chosen: I looked
  alternatives:
  - I watched
  - I observed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard visionary observation verb. 'Looked' keeps the sequence simple
    and vivid.
- source_word: አውየውኩ
  chosen: lamented
  alternatives:
  - cried out
  - wailed
  - grieved
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresses the seer's emotional response. 'Lamented' fits the solemn apocalyptic
    register and avoids confusion with the sheep's earlier cry.
- source_word: በንዋምየ
  chosen: in my sleep
  alternatives:
  - in my dream
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally refers to sleep. Since this section is a dream vision, 'in
    my sleep' preserves the concrete wording while still fitting the context.
- source_word: ኖላዊ
  chosen: shepherd
  alternatives:
  - pastor
  - herdsman
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Animal Apocalypse repeatedly uses shepherd imagery; 'shepherd' preserves
    the symbolic register and inter-verse consistency.
- source_word: ዘይርዕዮሙ
  chosen: who was pasturing
  alternatives:
  - who was shepherding
  - who was tending
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative verbal form describes the shepherd's active oversight. 'Pasturing'
    keeps the livestock imagery concrete, though 'shepherding' is possible.
