translation:
  text: And I saw in the vision that ravens flew down upon those lambs, and they seized
    one of those lambs and dashed the sheep to pieces and devoured them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic distinguishes the attacked flock members with terms that may
      overlap between 'lambs' and 'sheep'; the English keeps 'lambs' for the first
      group and 'sheep' later to reflect the shift in wording.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'flew down upon' could also be understood more generally
      as 'rushed upon' or 'came upon,' but the bird imagery favors an explicitly avian
      movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢኩ
  chosen: And I saw
  alternatives:
  - And I looked
  - And I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary report; 'saw' is clear modern English
    and preserves the apocalyptic narrative formula.
- source_word: በራእይ
  chosen: in the vision
  alternatives:
  - in a vision
  - in the vision-report
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks the visionary setting. The article-like force is naturally
    rendered in English as 'the vision' in this ongoing dream sequence.
- source_word: ቋዓተ
  chosen: ravens
  alternatives:
  - crows
  - black birds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, bird species carry symbolic force. 'Ravens'
    preserves the specific predatory image better than the broader 'crows'.
- source_word: ከመ፡ ሰረሩ፡ ዲበ
  chosen: flew down upon
  alternatives:
  - rushed upon
  - swooped down on
  - came upon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal sequence suggests hostile movement from above onto the flock.
    'Flew down upon' keeps the avian imagery explicit without over-paraphrase.
- source_word: እልክቱ፡ መዓስእ
  chosen: those lambs
  alternatives:
  - those sheep
  - those young sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun here refers to the smaller/younger members of the flock in context.
    'Lambs' preserves the distinction from the later plural 'sheep' in the same verse.
- source_word: ወአኀዝዎ፡ ለአሐዱ፡ እምዝኩ፡ መዓስእ
  chosen: and they seized one of those lambs
  alternatives:
  - and they took one from among those lambs
  - and they grabbed one of those sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction clearly singles out one individual from among the lambs.
    'Seized' fits the violent predatory action.
- source_word: ወቀጥቀጥዎሙ፡ ለአባግዕ
  chosen: and dashed the sheep to pieces
  alternatives:
  - and tore the sheep apart
  - and crushed the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The reduplicated verb is forceful and violent. 'Dashed ... to pieces'
    preserves the intensity without flattening it to a generic 'hurt' or 'killed.'
- source_word: ወበልዕዎሙ
  chosen: and devoured them
  alternatives:
  - and ate them
  - and consumed them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Apocalyptic predation imagery should remain vivid. 'Devoured' is elevated
    but readable and matches the violent scene.
