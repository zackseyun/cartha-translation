translation:
  text: And after that I saw in my vision all the birds of heaven coming—eagles, vultures,
    kites, ravens, and eagles—and they led all the birds. And they began to devour
    those sheep, and to peck out their eyes and devour their flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The bird list contains some lexical uncertainty in English taxonomy; the
      Ge'ez names denote predatory birds and corvids, and some could be rendered differently
      (for example, 'hawks' instead of 'kites,' or 'crows' instead of 'ravens').
    reason: lexical_alternative
  - marker: b
    text: The opening of the attack may also be understood as 'they seized them and
      devoured them,' depending on how the verbal sequence is construed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ርኢኩ በራእየየ
  chosen: I saw in my vision
  alternatives:
  - I looked in my vision
  - I saw in the vision
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the first-person visionary report and the explicit apocalyptic
    framing. 'In my vision' is natural English while preserving the possessive sense
    of the Ge'ez.
- source_word: ኵሉ አዕዋፈ ሰማይ
  chosen: all the birds of heaven
  alternatives:
  - all the birds of the sky
  - every bird of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Birds of heaven'' preserves the elevated apocalyptic register better
    than the flatter ''birds of the sky,'' while remaining intelligible.'
- source_word: አንስርት
  chosen: eagles
  alternatives:
  - vultures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term commonly denotes eagles in Ethiopic biblical usage. Because
    the verse lists multiple predatory birds, 'eagles' is retained in the main text,
    though the semantic range may overlap with large raptors more broadly.
- source_word: አውስት
  chosen: vultures
  alternatives:
  - buzzards
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this predatory-bird catalogue, 'vultures' best fits the carrion-eating
    and violent imagery of the allegory.
- source_word: ሆባይ
  chosen: kites
  alternatives:
  - hawks
  - falcons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A smaller bird of prey is likely intended. 'Kites' is a cautious rendering
    that preserves the avian taxonomy without over-specifying.
- source_word: ቋዓት
  chosen: ravens
  alternatives:
  - crows
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Ravens'' is the more elevated and traditional rendering for this corvid
    term and suits the ominous tone of the vision.'
- source_word: ይመረሕዎሙ ለኵሎሙ አዕዋፍ
  chosen: they led all the birds
  alternatives:
  - they guided all the birds
  - they marshaled all the birds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys leading or guiding. 'Led' is concise and preserves the
    sense that these raptors head or direct the larger avian host.
- source_word: አኃዙ ይብልዕዎሙ
  chosen: they began to devour
  alternatives:
  - they seized and devoured
  - they took to eating
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction likely marks the onset of violent action. 'Began to
    devour' captures both the inceptive force and the brutality of the attack.
- source_word: ዝኩ አባግዕ
  chosen: those sheep
  alternatives:
  - these sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative points to the sheep already present in the vision sequence.
    'Those sheep' reads naturally in English narrative while preserving the referential
    force.
- source_word: ይክረዩ አዕይንቲሆሙ
  chosen: to peck out their eyes
  alternatives:
  - to gouge out their eyes
  - to pluck out their eyes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Because the attackers are birds, 'peck out' preserves the concrete avian
    imagery better than the more generic 'gouge out.'
- source_word: ይበልዕዎሙ ለሥጋሆሙ
  chosen: devour their flesh
  alternatives:
  - eat their flesh
  - consume their bodies
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Devour their flesh'' keeps the repeated devouring motif and the visceral
    violence of the allegory.'
