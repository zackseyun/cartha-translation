theological_decisions:
- issue: Animal Apocalypse symbolism
  chosen_reading: Retain the animal imagery literally in translation ('birds,' 'sheep')
    rather than interpretively identifying historical groups in the main text.
  alternative_readings:
  - Translate with embedded interpretation referring to nations or rulers
  rationale: The passage is an allegorical vision, but the translation should preserve
    the imagery itself and not collapse it into historical explanation. Interpretation
    belongs in commentary, not in the verse text.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten apocalyptic imagery.
