theological_decisions:
- issue: Identity of the attacking figures in the Animal Apocalypse
  chosen_reading: Retain the literal animal imagery ('shepherds,' 'eagles,' 'kites,' 'ravens,' 'buck') without interpretive expansion.
  alternative_readings:
  - Translate with historical identifications embedded in the text
  - Generalize to human enemies or rulers
  rationale: The vision communicates through symbolic animals and appointed shepherds. Per project philosophy, the translation should preserve the apocalyptic imagery rather than resolve it into one historical reconstruction in the main text.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; preserve apocalyptic imagery.'
