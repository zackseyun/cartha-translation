translation:
  text: And I saw until the shepherds and the eagles and those vultures and kites came, and they cried out to the ravens that they should break the horn of that ram; and they fought and battled with him, and he fought with them, and cried out that his help might come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that he-goat.' The Ge'ez term denotes a horned male goat.
    reason: lexical_alternative
  - marker: b
    text: Or 'that his helper might come.' The noun can be understood as 'help' or 'helper.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the eagles and the kites and the ravens came, and they cried out to the ravens that they should break the horn of that buck'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኖላዊያን
  chosen: the shepherds
  alternatives:
  - the herdsmen
  - the keepers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The standard sense is 'shepherds' or 'pastors.' In the Animal Apocalypse this is a technical image for the appointed overseers, so 'shepherds' preserves the established apocalyptic metaphor rather than generalizing it.
- source_word: አንስርት
  chosen: the eagles
  alternatives:
  - vultures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The bird term is commonly rendered 'eagles' in this context. Because the sequence lists predatory birds distinctly, 'eagles' best preserves the animal imagery without collapsing categories.
- source_word: ዝኩ
  chosen: the kites
  alternatives:
  - hawks
  - falcons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact bird species is difficult, but 'kite' is a common scholarly identification for a smaller bird of prey in such lists. It keeps the avian imagery specific while acknowledging some uncertainty.
- source_word: አውስት
  chosen: the ravens
  alternatives:
  - crows
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes a corvid; 'ravens' fits the darker, predatory-apocalyptic register better and is a common rendering in Enochic animal imagery.
- source_word: ቋዓት
  chosen: that buck
  alternatives:
  - that he-goat
  - that male goat
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The animal is a horned male goat. 'Buck' is concise and natural English, but the horned-goat imagery remains explicit through the following noun 'horn.' A footnote preserves the more formal alternative 'he-goat.'
- source_word: ይቀትቅጥዎ
  chosen: should break
  alternatives:
  - should smash
  - should shatter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys violent breaking or crushing. 'Break' is the clearest main-text choice; stronger alternatives are possible, but 'break' avoids overstating the exact force while preserving the attack on the horn.
- source_word: ቀርኖ
  chosen: the horn
  alternatives:
  - his horn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is singular 'horn.' Because the Ge'ez construction can be read with the following animal phrase, 'the horn of that buck' is the most transparent rendering.
- source_word: ረዳኢቱ
  chosen: his help
  alternatives:
  - his helper
  - help for him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun derives from the root 'to help/aid.' The form may point either to abstract help or a helper. 'His help' best matches the immediate cry for aid while leaving open whether the aid is personal or impersonal; the alternative is noted in a footnote.
