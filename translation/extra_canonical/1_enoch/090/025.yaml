lexical_decisions:
- source_word: ወዝኩ
  chosen: and I saw
  alternatives:
  - and I looked
  - then I saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The narrative formula introduces a visionary observation. 'And I saw' preserves the apocalyptic report style without unnecessary expansion.
- source_word: ሮ*ኖላዊያን
  chosen: those elephants
  alternatives:
  - the elephants
  - the elephant-like ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, symbolic animal identities should be preserved as animals rather than interpreted in the translation. The OCR form is corrupt, but the contextual referent in this scene is the elephants; 'those elephants' reflects the likely demonstrative force while keeping the imagery intact.
- source_word: ተኰነኑ
  chosen: were judged
  alternatives:
  - were condemned
  - were sentenced
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A judicial passive fits the judgment scene. 'Were judged' preserves the formal apocalyptic courtroom sense and leaves open whether the emphasis is verdict or sentencing.
- source_word: ወኮኑ ኃጥኣነ
  chosen: became sinners
  alternatives:
  - were found guilty
  - became guilty ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez wording is more literally 'became sinners/sinful ones.' Although in context this may function like a declaration of guilt, the more literal rendering better preserves the text's stark moral-judicial language.
- source_word: ወተወድዩ
  chosen: were cast
  alternatives:
  - were thrown
  - were hurled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive of forcible expulsion suits the judgment imagery. 'Were cast' is vivid but not overly interpretive.
- source_word: እሙንቱ
  chosen: they
  alternatives:
  - those ones
  - them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronoun resumes the judged group. English idiom prefers 'they' in the clause.
- source_word: ውስተ'ዛ ማዕምቀ እሳት
  chosen: into that deep abyss of fire
  alternatives:
  - into that depth of fire
  - into that fiery abyss
  - into that deep place of fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase combines depth/abyss imagery with fire. 'Deep abyss of fire' preserves both the vertical, chthonic image and the punitive fire without flattening it to merely 'hell' or 'pit.'
