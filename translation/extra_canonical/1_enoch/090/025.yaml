theological_decisions:
- issue: Whether to interpret the animal symbol in historical terms in the main text
  chosen_reading: Retain the symbolic animal reference as 'those elephants'
  alternative_readings:
  - Translate the historical referent instead of the animal image
  - Use a generic term like 'those beasts' if the OCR is uncertain
  rationale: The Animal Apocalypse communicates through sustained symbolic zoological imagery. The translation philosophy forbids flattening apocalyptic imagery into generic prose or silently replacing symbols with interpretations. Even with OCR uncertainty, the contextual animal symbol should remain in the text.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; original-language primacy over translation tradition.'
- issue: Whether ኃጥኣነ should be rendered morally ('sinners') or juridically ('guilty')
  chosen_reading: Render as 'sinners' in the main text
  alternative_readings:
  - guilty ones
  - were found guilty
  rationale: The lexical sense is moral-religious, though in context it overlaps with judicial condemnation. Preserving 'sinners' keeps the theological force of the text's judgment language, while the footnote can note the juridical nuance.
  doctrine_reference: Preserve theological tension rather than resolve it.
