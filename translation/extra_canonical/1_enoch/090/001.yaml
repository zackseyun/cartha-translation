theological_decisions:
- issue: Nature of the 'shepherds'
  chosen_reading: Render as 'shepherds' without interpretive expansion
  alternative_readings:
  - angels
  - rulers
  - overseers
  rationale: In the Animal Apocalypse the shepherds are symbolic agents of oversight/judgment,
    but the verse itself presents them through the allegorical image. The translation
    preserves the image rather than resolving the symbolism in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
