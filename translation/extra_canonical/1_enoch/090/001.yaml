translation:
  text: And I saw until that time that thirty-seven shepherds were pasturing, and
    they all completed their periods, each in its time, like the former ones; and
    others received them into their hands, to pasture them in their times—each shepherd
    in his own time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez text is somewhat compressed in the handover clause; the sense
      is that one set of shepherds finishes its allotted period and another set receives
      charge in succession.
    reason: textual_variant
  - marker: b
    text: The repeated language of 'time' underscores fixed, allotted periods of oversight
      rather than indefinite activity.
    reason: cultural_note
lexical_decisions:
- source_word: ወርኢኩ
  chosen: And I saw
  alternatives:
  - And I looked
  - And I observed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard visionary narrative verb; 'I saw' preserves the apocalyptic
    report formula without unnecessary expansion.
- source_word: እስከ ዘመን ዘከመዝ
  chosen: until that time
  alternatives:
  - up to that time
  - until then
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the temporal progression of the vision in elevated but readable
    English.
- source_word: ይርዕዩ
  chosen: were pasturing
  alternatives:
  - were shepherding
  - were feeding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is tied to the shepherd imagery of the Animal Apocalypse. 'Pasturing'
    preserves the concrete flock-setting better than the more abstract 'shepherding,'
    while still functioning verbally in English.
- source_word: ፴ወ፯ ኖላዊያን
  chosen: thirty-seven shepherds
  alternatives:
  - 37 shepherds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral is rendered in words in the main text for literary readability;
    'shepherds' is the natural gloss for the apocalyptic overseers represented by
    the animal metaphor.
- source_word: ፈጸሙ ኵሎሙ በበጊዜሆሙ
  chosen: they all completed their periods, each in its time
  alternatives:
  - they all finished in their times
  - they all fulfilled their appointed times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase concerns the completion of allotted spans of oversight. 'Completed
    their periods' makes the implied object explicit in idiomatic English while preserving
    the temporal/judicial structure.
- source_word: ከመ ቀዳማዊያን
  chosen: like the former ones
  alternatives:
  - as the first ones
  - as the earlier ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers back to the previously mentioned shepherds; 'former ones' is natural
    and sufficiently formal.
- source_word: በዐዳን ተመጠውዎሙ ውስተ እደዊሆሙ
  chosen: others received them into their hands
  alternatives:
  - others were entrusted with them
  - they were delivered into the hands of others
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom 'into their hands' is significant and should be preserved rather
    than flattened. The subject/object relation is somewhat compressed in the Ge'ez;
    this rendering keeps the handover imagery visible.
- source_word: ከመ ይርዐይዎሙ በበጊዜሆሙ
  chosen: to pasture them in their times
  alternatives:
  - that they might shepherd them in their times
  - to tend them at their appointed times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Purpose clause following the transfer. 'Pasture them' maintains the animal
    allegory and avoids over-abstracting the action.
- source_word: ኵሉ ኖላዊ በጊዜሁ
  chosen: each shepherd in his own time
  alternatives:
  - every shepherd at his time
  - each shepherd in its appointed time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Summative distributive phrase emphasizing sequential appointment. 'His
    own time' is idiomatic and preserves the individualized allotment.
