translation:
  text: And I saw until they laid aside that sword which had been given to the sheep, and they brought it back into the house and sealed it up before the face of the Lord; and all the sheep were summoned into that house, and it did not contain them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Before the face of the Lord'' is a literal idiom meaning ''in the Lord''s presence.'''
    reason: lexical_alternative
  - marker: b
    text: The final clause likely means that the house could not contain all the sheep.
    reason: lexical_alternative
  - marker: c
    text: In the vision's symbolism, 'the house' may evoke the temple or the eschatological dwelling of God's people, but the text itself says only 'house.'
    reason: cultural_note
  - marker: d
    text: Or 'they brought it'.
    reason: previous_rendering
  - marker: e
    text: Or 'it was not enough to hold them'.
    reason: previous_rendering
lexical_decisions:
- source_word: አሰከብዎ
  chosen: they laid aside
  alternatives:
  - they put down
  - they caused to lie down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally suggests causing something to lie down or be set down. In context with the sword, 'laid aside' gives the sense of relinquishing or depositing the weapon without over-paraphrasing.
- source_word: ሰይፍ
  chosen: sword
  alternatives:
  - blade
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the weapon; important to preserve the concrete apocalyptic image rather than generalize it.
- source_word: ተውህበ
  chosen: had been given
  alternatives:
  - was given
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive perfect sense fits the prior narrative in which the sheep receive the sword. English pluperfect reads naturally in this retrospective visionary sequence.
- source_word: አባግዕ
  chosen: sheep
  alternatives:
  - flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Animal Apocalypse consistently uses animal imagery for human groups; 'sheep' preserves the vision's symbolism and lexical continuity.
- source_word: አግብእዎ ውስተ ቤት
  chosen: they brought it into the house
  alternatives:
  - they led it into the house
  - they carried it into the house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The object is the sword, so 'brought it into the house' is the most straightforward rendering.
- source_word: ኀተማ እምቅድመ ገጹ ለእግዚእ
  chosen: sealed it up before the face of the Lord
  alternatives:
  - sealed it before the Lord
  - sealed it in the Lord's presence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom 'before the face of' is preserved because it is a common Semitic-style expression of presence and solemnity; 'sealed it up' conveys closure or secure deposit.
- source_word: ተጸውዑ
  chosen: were summoned
  alternatives:
  - were called
  - were gathered by summons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive 'were summoned' fits a formal gathering into the house and preserves the judicial/ceremonial tone better than the more generic 'were called'.
- source_word: ወኢያገምሮሙ
  chosen: it was not enough to hold them
  alternatives:
  - it did not contain them
  - it was not sufficient for them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The negative verb indicates insufficiency or inability to contain. Because the nearest antecedent is 'that house,' the sense is that the house could not accommodate all the sheep.
