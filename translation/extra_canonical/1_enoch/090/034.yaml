theological_decisions:
- issue: Rendering of ለእግዚእ in an Enochic visionary setting
  chosen_reading: the Lord
  alternative_readings:
  - the Master
  rationale: Following project philosophy, titles are translated rather than transliterated. 'The Lord' best fits the solemn heavenly courtroom setting without importing later christological specificity.
  doctrine_reference: 'Translation philosophy: translate titles; transliterate names.'
- issue: Whether to interpret the house symbolically in the main text
  chosen_reading: the house
  alternative_readings:
  - the temple
  - the new house
  rationale: The Ge'ez simply says 'house.' Although the Animal Apocalypse often uses 'house' symbolically for the temple or eschatological dwelling, the main text should preserve the image and leave fuller interpretation to context or footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
