theological_decisions:
- issue: Whether the final clause means the addressees are forbidden to recite Enoch's written intercession, or simply unable to obtain any spoken help from it
  chosen_reading: 'The clause is rendered as inability/denial: they will not speak a single word from Enoch''s written book.'
  alternative_readings:
  - they will not be allowed to speak a single word from the book
  - they will receive no answer by means of the book
  rationale: The Ge'ez wording most directly negates their speaking, not God's hearing. The translation preserves that surface sense while leaving the precise implication—prohibition, futility, or exclusion—unstated.
  doctrine_reference: Preserve theological tension rather than resolve it.
