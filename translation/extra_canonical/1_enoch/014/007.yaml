translation:
  text: And your petition on their behalf will not be granted; nor on your own behalf; and you yourselves, while you weep and make supplication, will not speak a single word from the book that I wrote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your prayer ... will not come to pass.' The Ge'ez says literally 'will not be,' but in context of a petition this likely means it will not be granted.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult. It may imply that the Watchers cannot present, repeat, or make use of Enoch's written plea before God.
    reason: alternative_reading
  - marker: c
    text: Or 'and on your own behalf—you yourselves will weep and make supplication, but you will not speak'.
    reason: previous_rendering
lexical_decisions:
- source_word: ስእለትክሙ
  chosen: your petition
  alternatives:
  - your request
  - your prayer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes a request or entreaty. 'Petition' preserves the formal, judicial-prayer setting of Enoch interceding for the Watchers better than the broader 'prayer.'
- source_word: በእንቲአሆሙ
  chosen: on their behalf
  alternatives:
  - for them
  - concerning them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This prepositional phrase marks representation or intercession. 'On their behalf' best captures the mediating sense in context.
- source_word: ኢይከውን
  chosen: will not be granted
  alternatives:
  - will not be
  - will not come to pass
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'will not be,' but in context of a petition the idiomatic force is that the request will not be effected or granted. This is a modest contextual expansion, not a paraphrase.
- source_word: በእንቲአክሙ
  chosen: on your own behalf
  alternatives:
  - for yourselves
  - concerning yourselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Parallel to the previous phrase, now shifting from the Watchers to Enoch's addressees themselves. 'On your own behalf' keeps the intercessory/legal tone.
- source_word: አንትሙሂ
  chosen: you yourselves
  alternatives:
  - you also
  - you indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The enclitic adds emphasis. ''You yourselves'' brings out the emphatic contrast: they must plead for themselves, not through Enoch.'
- source_word: እንዘ ትበክዩ
  chosen: will weep
  alternatives:
  - while weeping
  - shall cry
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction can carry attendant circumstance. In English, future 'will weep' fits the sequence of predicted actions.
- source_word: ታስተበቍዑ
  chosen: make supplication
  alternatives:
  - implore
  - beseech
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A strong verb of entreaty. 'Make supplication' preserves elevated register and echoes the formal plea motif already present in the verse.
- source_word: ኢትተናገሩ
  chosen: you will not speak
  alternatives:
  - you will not say
  - you will not utter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward negated speech verb. 'Speak' is broad enough to cover the following object phrase.
- source_word: ኢምንተ ቃለ
  chosen: a single word
  alternatives:
  - anything
  - any word
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase intensifies the negation. 'A single word' gives the emphatic force naturally in English.
- source_word: እምውስተ መጽሐፍ ዘጻሐፍኩ
  chosen: from the book that I wrote
  alternatives:
  - out of the book I wrote
  - from the writing that I have written
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the written document Enoch has composed. 'Book' is the natural rendering of መጽሐፍ here, and the relative clause is kept explicit.
