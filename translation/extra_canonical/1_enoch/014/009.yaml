theological_decisions:
- issue: Preservation of visionary architectural imagery
  chosen_reading: a structure built of stones of hail ... tongues of fire surrounded
    it
  alternative_readings:
  - a house built of hailstones ... flames surrounded it
  rationale: The verse depicts an otherworldly approach to a constructed heavenly
    reality. The translation preserves the odd material imagery rather than normalizing
    it into ordinary architecture or generic fire imagery.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    flatten cosmic description.'
