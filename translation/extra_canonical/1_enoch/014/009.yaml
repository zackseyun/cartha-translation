translation:
  text: And I went in until I drew near to a structure built of stones of hail, and
    a tongue of fire surrounded it, and its foundation made me afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a building' or 'a house'; the Ge'ez term denotes a constructed object,
      but the exact architectural nuance is not certain from this witness alone.
    reason: lexical_alternative
  - marker: b
    text: Literally 'stones of hail.' This may mean hailstones, but the more literal
      wording preserves the verse's strange visionary texture.
    reason: lexical_alternative
  - marker: c
    text: The final clause is textually difficult in this OCR witness; the sense is
      that the sight of it began to frighten Enoch.
    reason: textual_variant
  - marker: d
    text: Or 'a structure'.
    reason: previous_rendering
  - marker: e
    text: Or 'tongues of fire surrounded it'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወቦእኩ
  chosen: And I went in
  alternatives:
  - And I entered
  - And I came in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes entering/going in. 'Went in' preserves the visionary
    movement in simple, readable English.
- source_word: እስከ እቀርብ
  chosen: until I drew near
  alternatives:
  - until I approached
  - as far as I came near
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This sequence marks continued movement up to proximity. 'Drew near' keeps
    the elevated register without sounding archaic.
- source_word: ጥቅም
  chosen: a structure
  alternatives:
  - a building
  - an edifice
  - a house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun here points to a constructed thing or built mass. 'Structure'
    is cautious and fits the immediate modifier 'built of...' without over-specifying
    the kind of building.
- source_word: ዘሕንጽት
  chosen: built of
  alternatives:
  - constructed of
  - which was built of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative verbal form qualifies the structure as something constructed.
    'Built of' is concise and natural in English.
- source_word: በእእባነ በረድ
  chosen: of stones of hail
  alternatives:
  - of hailstones
  - of stones of ice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally the phrase is 'stones of hail.' Retaining the stone imagery
    preserves the strange apocalyptic materiality better than smoothing it to simply
    'hailstones,' though that remains a viable alternative.
- source_word: ልሳነ እሳት
  chosen: tongues of fire
  alternatives:
  - flames of fire
  - fiery tongues
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'tongues of fire.' This vivid image should be preserved rather
    than generalized to 'flames,' since the apocalyptic description is concrete and
    unusual.
- source_word: የዓውዳ
  chosen: surrounded it
  alternatives:
  - encircled it
  - were round about it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys surrounding or encircling. 'Surrounded it' is clear
    modern English and preserves the spatial imagery.
- source_word: ወጠነ
  chosen: it began
  alternatives:
  - it started
  - it set itself
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR form is somewhat uncertain, but in context it appears to introduce
    the effect that followed. 'It began' is a cautious rendering that matches the
    sequence before 'to make me afraid.'
- source_word: ያፍርሀኒ
  chosen: to make me afraid
  alternatives:
  - to frighten me
  - to terrify me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes causing fear. 'Make me afraid' stays close to the causative
    sense and avoids overstating the intensity as 'terrify' unless the text clearly
    demands it.
