translation:
  text: and a fire was burning all around it, and beneath it there was a blaze of
    fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The referent of 'it' is the heavenly structure described in the preceding
      vision context; the Ge'ez wording here does not require a more specific architectural
      label in this verse alone.
    reason: cultural_note
  - marker: b
    text: The clause rendered 'there was a blaze of fire' is textually difficult;
      the sense is that fire was active or blazing beneath the structure.
    reason: textual_variant
lexical_decisions:
- source_word: እሳት
  chosen: fire
  alternatives:
  - flame
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic noun for fire; repeated in the verse and retained both times to
    preserve the vivid apocalyptic imagery.
- source_word: ዘይነድድ
  chosen: was burning
  alternatives:
  - burned
  - was aflame
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative verbal form describing the state/action of the fire; 'was burning'
    gives a natural English progressive sense in visionary description.
- source_word: በአውደ
  chosen: all around
  alternatives:
  - around
  - round about
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys surrounding spatial extent; 'all around' preserves the encircling
    force without archaic diction.
- source_word: አረፍት
  chosen: it
  alternatives:
  - the structure
  - the resting-place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is difficult in isolation here, but in context it points back
    to the visionary architectural object previously described. English pronoun avoids
    overclaiming a more specific sense than the immediate witness securely supports.
- source_word: ጥሕቱ
  chosen: beneath it
  alternatives:
  - under it
  - below it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward spatial term; 'beneath it' fits the elevated register
    of the vision.
- source_word: ይውዒ
  chosen: there was a blaze
  alternatives:
  - it blazed
  - there was burning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears to denote blazing/burning. 'There was a blaze' yields
    idiomatic English while preserving the concrete fiery image.
