theological_decisions:
- issue: Whether to specify the object encircled by fire more concretely than the
    Ge'ez witness alone warrants
  chosen_reading: Use the pronoun 'it' rather than supplying 'house,' 'wall,' or 'throne-room'
    in the main text
  alternative_readings:
  - all around the house
  - all around its walls
  - all around that structure
  rationale: The immediate verse is elliptical and depends on prior context. To preserve
    transparency and avoid importing a more interpretive architectural label from
    translation tradition, the main text keeps the referent implicit.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
