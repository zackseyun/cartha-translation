translation:
  text: And behold, another house, greater than that one, and all its doors were open
    before me; and it was built with tongues of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all its doors were open before me.' The Ge'ez phrase can be rendered
      either distributively ('every doorway') or collectively ('all its doors').
    reason: lexical_alternative
  - marker: b
    text: '''Tongues of fire'' preserves the concrete image of flame-like tongues
      or fiery projections in the structure; some translators smooth this to ''flames
      of fire.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'greater than this one'.
    reason: previous_rendering
lexical_decisions:
- source_word: ናሁ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the visionary deictic force typical of apocalyptic narration
    rather than reducing it to a plain narrative transition.
- source_word: ካልእ ቤት
  chosen: another house
  alternatives:
  - a second house
  - another building
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literal and contextually appropriate within the temple/palace vision
    sequence; 'house' preserves the architectural and possibly cultic resonance.
- source_word: ዘየዓቢ እምዝክቱ
  chosen: greater than this one
  alternatives:
  - larger than this
  - more عظیم than this one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Comparative sense is straightforward; 'greater' preserves both size and
    majesty better than merely 'larger'.
- source_word: ኵሉ ኆኅተ
  chosen: every doorway
  alternatives:
  - all its doors
  - every entrance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun refers to openings/doors. 'Every doorway' keeps the distributive
    force of ኵሉ while fitting the singular collective sense in English.
- source_word: ርኁት
  chosen: stood open
  alternatives:
  - were open
  - opened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresses the stative condition of the doors in idiomatic English while
    preserving the vivid scene before the seer.
- source_word: በቅድሜየ
  chosen: before me
  alternatives:
  - in front of me
  - before my face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard spatial rendering that preserves the first-person visionary
    perspective.
- source_word: ሕኑጽ
  chosen: built
  alternatives:
  - constructed
  - fashioned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple architectural verb fits the house imagery and avoids over-interpretation.
- source_word: በልሳናተ እሳት
  chosen: with tongues of fire
  alternatives:
  - with flames of fire
  - with fiery tongues
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formally close rendering that preserves the striking apocalyptic image.
    'Tongues of fire' is natural English and reflects the plural construct imagery
    without flattening it into generic 'flames'.
