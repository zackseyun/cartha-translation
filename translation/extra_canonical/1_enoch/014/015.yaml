theological_decisions:
- issue: Nature of the visionary architecture
  chosen_reading: house
  alternative_readings:
  - palace
  - temple
  rationale: The Ge'ez plainly says 'house.' Although the broader context may suggest
    a heavenly temple or palace, the translation leaves that theological identification
    implicit rather than importing it into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
