translation:
  text: This is the book of the words of righteousness and of the reproof of the vigilant ones who are from eternity, just as the Holy and Great One commanded in that vision.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Watchers'; the Ge'ez term literally denotes those who are wakeful or watchful.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'from eternity' may also mean 'from of old,' emphasizing ancient origin rather than absolute eternality.
    reason: lexical_alternative
  - marker: c
    text: Or 'according as'.
    reason: previous_rendering
lexical_decisions:
- source_word: መጽሐፈ
  chosen: book
  alternatives:
  - writing
  - scroll
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun straightforwardly denotes a written book/document. 'Book' is the natural elevated English equivalent and fits the heading-like function of the verse.
- source_word: ቃለ
  chosen: words
  alternatives:
  - speech
  - matter
  - account
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although singular in form can function collectively, the phrase introduces the contents of the book; 'words' best preserves that collective sense in idiomatic English.
- source_word: ጽድቅ
  chosen: righteousness
  alternatives:
  - justice
  - uprightness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the project's default handling of cognate righteousness language and the moral-apocalyptic context, 'righteousness' preserves the ethical and theological weight better than 'justice' here.
- source_word: ዘለፋ
  chosen: reproof
  alternatives:
  - rebuke
  - censure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes denunciation or rebuke. 'Reproof' keeps the formal, admonitory tone of an apocalyptic superscription without sounding overly modern.
- source_word: ትጉሃን
  chosen: the vigilant ones
  alternatives:
  - the wakeful ones
  - the watchers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez adjective/noun means those who are awake or watchful. 'The vigilant ones' is a transparent rendering from the Ethiopic form itself; 'watchers' is possible and traditional, but here the immediate Ge'ez wording is better represented by 'vigilant ones,' with the traditional equivalent noted in a footnote.
- source_word: እለ እምዓለም
  chosen: who are from eternity
  alternatives:
  - who are from of old
  - who are eternal
  - who are from the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally points to origin 'from eternity/from the age.' In this superscription it most naturally qualifies the heavenly beings as primordial or ancient. 'From eternity' preserves the elevated register while leaving some ambiguity about whether the sense is absolute eternity or remote antiquity.
- source_word: አዘዘ
  chosen: commanded
  alternatives:
  - ordered
  - decreed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct verb of command fits the syntax and preserves the authority of the divine speaker behind the vision.
- source_word: ቅዱስ ወዓቢይ
  chosen: the Holy and Great One
  alternatives:
  - the Holy and Mighty One
  - the Holy One and the Great One
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired divine epithets function together as a title. 'Great' is the most direct rendering of ዓቢይ, and 'One' is supplied in English to make the title idiomatic.
- source_word: በይእቲ ራእይ
  chosen: in that vision
  alternatives:
  - through that vision
  - by means of that vision
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can be instrumental or locative. 'In that vision' is the least interpretive and suits the narrative frame introducing the revelation.
