theological_decisions:
- issue: Identity of ትጉሃን
  chosen_reading: Rendered as 'the vigilant ones,' referring to the heavenly Watchers rather than generic diligent people.
  alternative_readings:
  - the watchers
  - the wakeful ones
  - the diligent ones
  rationale: Within the Book of the Watchers, the context strongly favors the class of angelic beings later central to the narrative. The chosen rendering stays close to the Ge'ez lexical sense while avoiding flattening the technical force of the term.
  doctrine_reference: Preserve apocalyptic imagery and locally grounded key terms; do not flatten cosmic beings into generic prose.
- issue: Force of እለ እምዓለም
  chosen_reading: 'Taken as a descriptor of primordial heavenly beings: ''who are from eternity.'''
  alternative_readings:
  - who are from of old
  - who belong to the world
  - who are eternal
  rationale: The phrase is somewhat ambiguous, but in this context it most plausibly marks the ancient/primordial status of the beings addressed. The translation preserves the ambiguity of duration without overdefining ontology.
  doctrine_reference: Preserve theological tension rather than resolve it where the source is genuinely ambiguous.
