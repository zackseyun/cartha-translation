translation:
  text: And I went into that house, and it was hot like fire and cold like ice, and
    there was no delight of life within it; fear covered me, and trembling seized
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez phrase rendered 'no delight of life' is difficult. It may mean
      that no life-giving pleasantness was inside the house, or more broadly that
      nothing of living comfort was there.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወቦእኩ
  chosen: And I went into
  alternatives:
  - And I entered
  - And I came into
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward first-person singular verb of entering. 'Went into'
    is natural English and preserves the visionary movement without over-formal stiffness.
- source_word: ውእቱ ቤት
  chosen: that house
  alternatives:
  - that building
  - the house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative plus noun points back to the previously described visionary
    structure. 'That house' preserves the deictic force better than simply 'the house.'
- source_word: ምውቅ
  chosen: hot
  alternatives:
  - warm
  - burning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison 'like fire' already intensifies the image, so 'hot' is
    sufficient and avoids redundancy that 'burning like fire' would create.
- source_word: ቈሪር
  chosen: cold
  alternatives:
  - chilly
  - frozen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective denotes coldness; paired with 'like ice' it creates the
    paradoxical apocalyptic image. 'Cold' is the clearest base rendering.
- source_word: በረድ
  chosen: ice
  alternatives:
  - hail
  - frost
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this simile the sense is best taken as 'ice,' matching the heat/cold
    polarity of the verse. 'Hail' is possible lexically but less fitting in context.
- source_word: ወኢምንተ ፍግዐ ሕይወት አልቦቱ ውስቴቱ
  chosen: and there was no delight of life within it
  alternatives:
  - and there was no pleasure of life inside it
  - and nothing living and pleasant was within it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult, but the Ge'ez most naturally negates some life-giving
    pleasantness or vitality within the house. 'Delight of life' keeps the strangeness
    and avoids over-interpreting it as simply 'no life.'
- source_word: ፍርሃት ከደነኒ
  chosen: fear covered me
  alternatives:
  - fear overwhelmed me
  - fear enveloped me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally suggests covering or enveloping. 'Covered me' preserves
    the vivid physicality of the visionary reaction.
- source_word: ወረዓድ አኃዘኒ
  chosen: and trembling seized me
  alternatives:
  - and shaking took hold of me
  - and terror seized me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes trembling or quaking, and the verb means to seize or
    grasp. This keeps the bodily force of the experience.
