theological_decisions:
- issue: How to render the difficult phrase about what was absent within the house
  chosen_reading: there was no delight of life within it
  alternative_readings:
  - there was no pleasure of life within it
  - there was nothing living within it
  rationale: The phrase appears to deny life-giving pleasantness rather than merely
    biological life. Because the house is part of a throne-room vision marked by paradox
    and dread, preserving the unusual wording is preferable to flattening it into
    a simple statement that the place was lifeless.
  doctrine_reference: Translation philosophy §Preserve theological tension rather
    than resolve it
