translation:
  text: And as I trembled and shook, I fell on my face and saw in the vision.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while I was disturbed and quaking.' The first two verbs are closely
      related and together express intense fear or agitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: እንዘ
  chosen: as
  alternatives:
  - while
  - when
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a contemporaneous circumstance; 'as' preserves the ongoing
    sense linking the trembling with the falling and seeing.
- source_word: እትሀወክ
  chosen: I trembled
  alternatives:
  - I was disturbed
  - I was agitated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this visionary context the verb conveys inner agitation or disorientation
    before the heavenly scene. 'I trembled' keeps the bodily-emotional force without
    over-paraphrasing.
- source_word: እርዕድ
  chosen: shook
  alternatives:
  - quaked
  - was afraid
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired with the previous verb, this likely intensifies the physical reaction.
    'Shook' preserves concrete bodily imagery and avoids collapsing both verbs into
    a single generic fear term.
- source_word: ወድቁ
  chosen: I fell
  alternatives:
  - I collapsed
  - I prostrated myself
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic motion verb is best kept simple. The following phrase 'on my
    face' already conveys the prostrate posture, so 'fell' is sufficient and more
    transparent.
- source_word: በገጽየ
  chosen: on my face
  alternatives:
  - upon my face
  - face-down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard idiom for prostration in revelatory settings. 'On my face'
    is clear, literal, and preserves the apocalyptic posture.
- source_word: እሬኢ
  chosen: I saw
  alternatives:
  - I looked
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The common visionary verb should remain straightforward. 'Beheld' would
    sound more archaic than the project's style prefers.
- source_word: በራእይ
  chosen: in the vision
  alternatives:
  - in a vision
  - by a vision
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The definite rendering fits the immediate visionary sequence and reads
    naturally in English while preserving the technical apocalyptic setting.
