theological_decisions:
- issue: Whether to render the paired fear verbs as generic inward fear or as embodied
    reaction
  chosen_reading: 'embodied reaction: ''I trembled and shook'''
  alternative_readings:
  - '''I was troubled and afraid'''
  - '''I quaked and trembled'''
  rationale: The verse emphasizes Enoch's bodily response before revelation. Preserving
    two physical verbs maintains the intensity and apocalyptic immediacy rather than
    reducing them to abstract emotion.
  doctrine_reference: Translation philosophy §§1, 5; preserve imagery and avoid flattening
    apocalyptic prose.
