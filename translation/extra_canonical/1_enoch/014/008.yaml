translation:
  text: 'And a vision showed me thus: behold, in the vision the clouds were calling
    me, and the mist was calling me; and the course of the stars and the lightnings
    were driving me and urging me on, and in the vision the winds were making me fly,
    and carrying me off, and lifting me up into heaven.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rushing of the stars' or 'the paths of the stars'; the Ge'ez expression
      evokes the stars in motion rather than merely stars as static objects.
    reason: lexical_alternative
  - marker: b
    text: '''Winds'' could also be rendered ''spirits,'' but the immediate context
      favors atmospheric forces participating in Enoch''s ascent.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And this is how the vision showed me:'.
    reason: previous_rendering
lexical_decisions:
- source_word: ራእይ
  chosen: vision
  alternatives:
  - appearance
  - revelation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering in apocalyptic context; repeated in the verse, so
    kept consistently to preserve visionary framing.
- source_word: አስተአርአየኒ
  chosen: showed me
  alternatives:
  - caused me to see
  - revealed to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Causative form from 'see/show'; 'showed me' is natural English while
    preserving the visual, revelatory force.
- source_word: ደመናት
  chosen: clouds
  alternatives:
  - storm-clouds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic sense is 'clouds'; no need to intensify beyond the witness, though
    the apocalyptic setting already gives them force.
- source_word: ይጼውዑኒ / ይጼውዐኒ
  chosen: were calling me
  alternatives:
  - summoned me
  - cried out to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated verb suggests an active summons. 'Calling me' preserves
    the repeated sound pattern without over-interpreting as a formal command.
- source_word: ጊሜ
  chosen: mists
  alternatives:
  - fog
  - thick cloud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely denotes mist or vaporous cloud. 'Mists' fits the parallel with
    clouds and preserves the atmospheric imagery.
- source_word: ሩጸተ ከዋክብት
  chosen: the course of the stars
  alternatives:
  - the rushing of the stars
  - the paths of the stars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun suggests running or motion. 'Course' captures celestial movement
    in idiomatic English without losing the dynamic image.
- source_word: መበርቅት
  chosen: the lightnings
  alternatives:
  - lightning flashes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural atmospheric phenomenon; 'lightnings' preserves the elevated register
    and parallelism with stars.
- source_word: ይንጐዑኒ
  chosen: were driving me
  alternatives:
  - impelled me
  - set me in motion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys forceful propulsion. 'Driving me' keeps the energetic, almost
    overwhelming motion of the vision.
- source_word: ወተያድህቁኒ
  chosen: urging me on
  alternatives:
  - pressing me onward
  - hastening me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired with 'driving me,' this likely intensifies the propulsion. 'Urging
    me on' preserves the sequence without redundancy.
- source_word: ነፋሳት
  chosen: winds
  alternatives:
  - spirits
  - wind-forces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this immediate context of clouds, mists, stars, and lightning, 'winds'
    is the most grounded reading, while still allowing cosmic agency.
- source_word: ያበርሩኒ
  chosen: were making me fly
  alternatives:
  - causing me to soar
  - bearing me aloft
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is explicitly flight-related; this should not be flattened into
    generic transport.
- source_word: ያንጉጹኒ
  chosen: carrying me off
  alternatives:
  - sweeping me away
  - snatching me up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Suggests forceful conveyance. 'Carrying me off' is vivid but not overly
    interpretive.
- source_word: አነሥኡኒ
  chosen: lifting me upward
  alternatives:
  - raising me
  - taking me up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The upward motion is explicit and climactic, leading into heaven.
- source_word: ላዕለ ውስተ ሰማይ
  chosen: upward into heaven
  alternatives:
  - above into heaven
  - into the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the apocalyptic ascent context, 'heaven' is preferable to 'sky';
    'upward into heaven' reflects both directional elements.
