  category: awkward_english
  tier: 1
  from: 'And this is how the vision showed me:'
  to: 'And a vision showed me thus:'
  rationale: The Ge'ez ከመዝ (kämäz) means 'thus' or 'like this.' The phrasing 'this
    is how the vision showed me' awkwardly implies the manner of the showing rather
    than introducing the content of what was shown. 'And a vision showed me thus'
    or 'And the vision showed me this' is more natural and accurate to the source.
