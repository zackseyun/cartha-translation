translation:
  text: And I looked and saw within it a lofty throne; and its appearance was like
    crystal, and its circumference like the shining sun, and the voice of the cherubim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The word rendered 'crystal' may also suggest ice, frost, or a bright crystalline
      substance; the image is one of dazzling transparency and brilliance.
    reason: lexical_alternative
  - marker: b
    text: Or 'its circuit' or 'what surrounded it,' if the focus is on the encircling
      radiance rather than geometric shape.
    reason: lexical_alternative
  - marker: c
    text: 'The final phrase is terse in Ge''ez: literally ''and the voice of the cherubim,''
      likely adding an auditory feature to the throne vision rather than forming a
      complete clause.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ነጸርኩ / ርኢኩ
  chosen: I looked and saw
  alternatives:
  - I gazed and saw
  - I looked and beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired vision verbs are retained as a doublet to preserve the heightened
    apocalyptic reporting style rather than collapsing them into a single English
    verb.
- source_word: ውስቴቱ
  chosen: within it
  alternatives:
  - inside it
  - in its midst
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward spatial rendering fits the visionary description of
    what is seen inside the house/structure from the prior context.
- source_word: መንበረ ልዑለ
  chosen: a lofty throne
  alternatives:
  - an exalted throne
  - a high throne
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መንበር is 'throne/seat'; ልዑል conveys height or exaltation. 'Lofty throne'
    preserves both the visual elevation and regal grandeur without importing later
    doctrinal phrasing.
- source_word: ራእዩ
  chosen: its appearance
  alternatives:
  - its aspect
  - its sight
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This naturally refers to the visible appearance of the throne or the
    scene immediately associated with it.
- source_word: አስሐትያ
  chosen: crystal
  alternatives:
  - frost
  - ice
  - crystalline stone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term in this context likely denotes a bright, transparent, crystalline
    appearance. 'Crystal' best preserves the luminous visionary image while acknowledging
    some lexical uncertainty.
- source_word: ክበቡ
  chosen: its circumference
  alternatives:
  - its circuit
  - its surrounding radiance
  - its encircling form
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun suggests what surrounds or encircles it. 'Circumference' is
    slightly formal but keeps the concrete image of an encircling feature rather than
    paraphrasing it as generic glory.
- source_word: ፀሐይ ዘያበርህ
  chosen: the shining sun
  alternatives:
  - the sun that gives light
  - the radiant sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause explicitly marks the sun as shining/giving light;
    'the shining sun' is concise and preserves the vivid comparison.
- source_word: ቃለ ኪሩቤን
  chosen: the voice of the cherubim
  alternatives:
  - the sound of the cherubim
  - the voice of cherubs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቃል can denote voice or sound; 'voice' better matches the solemn auditory
    element of the vision. 'Cherubim' is retained as the conventional English plural
    form for the angelic beings behind the Ge'ez borrowing.
