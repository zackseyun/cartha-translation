- issue: Rendering of the throne's descriptor
  chosen_reading: a lofty throne
  alternative_readings:
  - an exalted throne
  - a high throne
  rationale: The phrase primarily describes what Enoch sees in visionary space. 'Lofty'
    preserves both elevation and majesty without over-specifying a theological title.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    from local passage first.
