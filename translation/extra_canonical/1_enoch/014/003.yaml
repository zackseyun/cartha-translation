translation:
  text: As he created and gave to humankind to understand the word of knowledge, so also he created me and gave to me that I might reprove them—the Watchers, the sons of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Watchers, the sons of heaven.' The Ge'ez term here is related to wakefulness or vigilance and likely refers to the angelic beings central to the Book of the Watchers.
    reason: lexical_alternative
  - marker: b
    text: The clause 'to these he created and gave reproach' is textually difficult in the Ethiopic witness; the sense may be that, unlike humankind, the heavenly beings received a negative portion or condition.
    reason: textual_variant
  - marker: c
    text: Or 'For he created and gave to humankind the word of understanding, but to these he created and gave reproach—to the vigilant sons of heaven.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ቃለ አእምሮ
  chosen: the word of understanding
  alternatives:
  - speech of understanding
  - understanding
  - the capacity for understanding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቃል commonly means 'word, speech, matter,' and አእምሮ denotes understanding/intelligence. Retaining 'word' preserves the concrete phrasing of the Ge'ez rather than reducing it to an abstract faculty alone.
- source_word: ሰብእ
  chosen: humankind
  alternatives:
  - man
  - human beings
  - people
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is collective here. 'Humankind' preserves the generic human reference without sounding male-exclusive in modern English.
- source_word: እዝልፎሙ
  chosen: reproach
  alternatives:
  - shame
  - disgrace
  - contempt
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears to convey a negative allotment or condition given to the heavenly beings in contrast with the gift given to humans. 'Reproach' best preserves the judicial-moral tone without over-specifying emotional shame.
- source_word: ትጉሃን
  chosen: the vigilant
  alternatives:
  - the wakeful ones
  - the watchers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective literally suggests wakefulness/vigilance. 'The vigilant' keeps the lexical sense visible, while a footnote preserves 'the Watchers' as the traditional technical rendering in this book.
- source_word: ውሉደ ሰማይ
  chosen: sons of heaven
  alternatives:
  - children of heaven
  - heavenly sons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formal rendering preserves the familial and heavenly imagery central to the passage's angelic setting.
