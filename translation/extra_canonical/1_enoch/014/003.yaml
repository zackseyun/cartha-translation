theological_decisions:
- issue: Identification of the heavenly beings addressed by ትጉሃን ውሉደ ሰማይ
  chosen_reading: They are rendered descriptively as 'the vigilant sons of heaven,' referring to the angelic Watchers.
  alternative_readings:
  - the Watchers, the sons of heaven
  - the wakeful heavenly ones
  rationale: The verse contrasts humanity with a class of heavenly beings in the Watchers narrative. A descriptive main-text rendering avoids importing a technical title too quickly while still preserving the likely referent.
  doctrine_reference: Preserve local passage meaning and avoid over-harmonization; translate titles/terms by sense where possible.
