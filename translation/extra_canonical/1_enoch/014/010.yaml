theological_decisions:
- issue: Whether to normalize the visionary architecture into familiar temple language
  chosen_reading: Retain 'great house' and the strange hailstone imagery without harmonizing
    to temple terminology.
  alternative_readings:
  - Render as 'temple' or 'palace' based on broader context
  rationale: The verse itself describes what Enoch sees in visionary terms and does
    not require a more interpretive label here. Preserving the image respects the
    text's apocalyptic tension and avoids importing later theological associations.
  doctrine_reference: Translation philosophy §§1, 3, 5
