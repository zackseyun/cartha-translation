translation:
  text: And I went into the tongue of fire, and I drew near to a great house built
    of hailstones; and the wall of that house was like a mosaic floor of hailstones,
    and its floor was hail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez architectural term rendered 'wall' is textually difficult in this
      OCR witness; it may refer more generally to a structural surface of the house.
    reason: textual_variant
  - marker: b
    text: The comparison rendered 'mosaic floor' refers to patterned stonework or
      tessellated paving, not necessarily a modern glass mosaic.
    reason: cultural_note
lexical_decisions:
- source_word: ልሳነ እሳት
  chosen: the tongue of fire
  alternatives:
  - the flame of fire
  - the fiery tongue
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ልሳን literally means 'tongue'; in visionary description this concrete
    image should be preserved rather than generalized to 'flame,' though 'tongue of
    fire' naturally conveys a flame-like form in English.
- source_word: ቤት ዓቢይ
  chosen: a great house
  alternatives:
  - a large house
  - a great hall
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቤት is broadly 'house'; 'great house' preserves the elevated, visionary
    register without over-specifying the structure as a hall or palace.
- source_word: ዘኅኑጽ
  chosen: built
  alternatives:
  - constructed
  - fashioned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The participial sense indicates the house was constructed from the following
    material. 'Built' is simple and natural.
- source_word: በእእባነ በረድ
  chosen: of hailstones
  alternatives:
  - with stones of hail
  - from stones of ice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is literally 'with stones of hail.' 'Of hailstones' is idiomatic
    English and preserves the startling material imagery.
- source_word: አረፍተ ውእቱ ቤት
  chosen: the wall of that house
  alternatives:
  - the interior of that house
  - the ceiling of that house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR form is difficult, but in context with the comparison to decorative
    stonework and then the mention of the floor, the sense is best taken as a structural
    feature of the house, likely its wall or surface. 'Wall' fits the sequence better
    than 'ceiling' and avoids overconfidence about a more technical architectural
    term.
- source_word: ከመ ጸፍጸፈ ሳሌዳት
  chosen: was like a mosaic floor
  alternatives:
  - was like a tessellated pavement
  - was like an inlaid pavement
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to patterned stonework or paving. 'Mosaic floor' communicates
    the image in readable modern English while retaining the architectural vividness.
- source_word: በእእባን ዘእምበረድ
  chosen: of hailstones
  alternatives:
  - of stones from hail
  - of icy stones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This repeats the hailstone imagery and should remain explicit rather
    than reduced to 'icy' or 'crystal'.
- source_word: ምድረ በረድ
  chosen: its floor was hail
  alternatives:
  - its ground was hail
  - its pavement was hailstones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ምድር can mean ground/floor/earth depending on context. Within a house,
    'floor' is the most natural contextual rendering. The predicate 'was hail' preserves
    the stark visionary materiality.
