translation:
  text: And from now on you shall not ascend into heaven for all eternity, and on
    the earth it has been declared that you shall be bound for all the days of eternity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Ethiopic uses two overlapping duration formulas in this verse: one
      after the ban from heaven and another after the sentence of binding. The translation
      preserves both rather than merging them into a single ''forever.'''
    reason: lexical_alternative
  - marker: b
    text: The passive phrase 'it has been declared' leaves the speaker or authority
      implicit; the context suggests a heavenly judicial decree.
    reason: cultural_note
lexical_decisions:
- source_word: እምይእዜ
  chosen: from now on
  alternatives:
  - henceforth
  - from this time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal marker introducing the sentence's new judicial state; 'from
    now on' is clear modern English without losing the formal force.
- source_word: ኢትዓርጉ
  chosen: you shall not ascend
  alternatives:
  - you will not go up
  - do not ascend
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative imperfect/jussive-like form in a judgment pronouncement. 'Shall
    not ascend' preserves the solemn declarative force better than a simple imperative.
- source_word: ውስተ ሰማይ
  chosen: into heaven
  alternatives:
  - to heaven
  - into the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the contrast is cosmic, heaven versus earth,
    not merely atmospheric 'sky.' 'Into heaven' preserves the vertical imagery.
- source_word: እስከ ኵሉ ዓለም
  chosen: for all eternity
  alternatives:
  - forever
  - unto all the age
  - for the whole age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase intensifies duration beyond a limited period. 'For all eternity'
    captures the judgment formula's absolute scope in idiomatic English.
- source_word: ወውስተ ምድር ተነግረ
  chosen: and on the earth it has been declared
  alternatives:
  - and on earth it was proclaimed
  - and in the earth it has been announced
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/report formula. 'It has been declared' preserves the formal judicial
    tone while leaving the implied divine authority unstated, as in the source.
- source_word: ይእስርክሙ
  chosen: you shall be bound
  alternatives:
  - you shall be imprisoned
  - they shall bind you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The core image is binding, a key Watchers judgment motif. 'Be bound'
    keeps the apocalyptic imagery more precisely than the interpretive 'imprisoned.'
- source_word: በኵሉ መዋዕለ ዓለም
  chosen: for all the days of eternity
  alternatives:
  - forever and ever
  - for all eternal days
  - for all the days of the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This repeated duration formula is rendered more literally here to preserve
    the text's rhythmic, judicial repetition rather than collapsing both duration
    phrases into the same English wording.
