theological_decisions:
- issue: Whether to render the punishment in generalized terms or preserve the concrete
    apocalyptic image
  chosen_reading: you shall be bound
  alternative_readings:
  - you shall be imprisoned
  - you shall be confined
  rationale: The Book of the Watchers repeatedly uses concrete punitive imagery for
    rebellious heavenly beings. Preserving 'bound' maintains the text's own judgment
    symbolism rather than abstracting it.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment formulas
    into generic prose.
