translation:
  text: And in every respect it excelled in splendor and glory and greatness, so that
    I am unable to tell you about its splendor and about its greatness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was surging/abounding with splendor and glory and greatness.' The Ge'ez
      verb suggests abundant effusion rather than mere existence.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'its' likely refers to the heavenly structure in view, though
      the vision may intentionally blur the splendor of the place with the splendor
      of the divine presence.
    reason: alternative_reading
  - marker: c
    text: Or 'so that your eyes were not able to look because of its splendor and
