  category: mistranslation
  tier: 3
  from: so that your eyes were not able to look because of its splendor and because
    of its greatness.
  to: so that I am unable to describe to you its splendor and its greatness.
  rationale: 'The draft completely hallucinates "your eyes were not able to look."
    The Ge''ez ዜንዎተክሙ is the infinitive of ዜነወ (to tell, announce, describe) with
    a 2nd person plural object suffix ("to tell you"). The phrase እስከ ኢይክል ዜንዎተክሙ
    means "so that it is not possible to tell you" or "so that I am unable to describe
    to you." Furthermore, following a verb of speaking, the preposition በእንተ means
    "concerning" or "about," not "because of." | Adjudicator: The reviewer is entirely
    correct. The current draft hallucinates ''your eyes were not able to look'' (likely
    confusing this with the throne-room description in 14:21). The Ge''ez text clearly
    reads ዜንዎተክ'
