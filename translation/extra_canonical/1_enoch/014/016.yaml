theological_decisions:
- issue: Referent of the repeated third-person suffix ('its splendor ... its greatness')
  chosen_reading: The suffix refers to the visionary structure immediately in view
    rather than directly naming God.
  alternative_readings:
  - the splendor and greatness of the divine presence
  - an intentionally blended reference to both the house and the enthroned Glory
  rationale: The Ge'ez uses a third-person suffix without explicitly restating the
    referent. In context Enoch is describing what he sees around the house/throne
    area, so the main text keeps the pronoun unspecific rather than resolving it into
    a more doctrinally loaded explicit subject.
  doctrine_reference: Preserve theological tension rather than resolve it.
