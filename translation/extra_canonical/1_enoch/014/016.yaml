lexical_decisions:
- source_word: ይፈደፍድ
  chosen: was overflowing
  alternatives:
  - was surging
  - was abounding
  - was full
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The reduplicated verbal form conveys abundance or effusive fullness rather
    than a static state. 'Was overflowing' preserves the vivid visionary excess better
    than the flatter 'was full.'
- source_word: በስብሐት
  chosen: with splendor
  alternatives:
  - with praise
  - with glory
  - with radiance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this throne-vision context the noun refers to manifested magnificence
    or radiance, not verbal praise. 'Splendor' distinguishes it from the following
    ክብር while keeping elevated diction.
- source_word: በክብር
  chosen: and glory
  alternatives:
  - and honor
  - and majesty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard rendering for visible or royal weightiness. Here it pairs
    naturally with 'splendor' without collapsing the two terms into one English word.
- source_word: በዕበይ
  chosen: and greatness
  alternatives:
  - and majesty
  - and grandeur
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes magnitude or exalted greatness. 'Greatness' preserves
    the semantic core and allows the repeated causal phrase at the end to echo the
    source.
- source_word: እስከ ኢይክል
  chosen: so that ... were not able
  alternatives:
  - until ... could not
  - to the point that ... could not
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This construction marks result or degree. 'So that' gives natural English
    while preserving the causal force of the vision's overwhelming intensity.
- source_word: ዜንዎተክሙ
  chosen: your eyes
  alternatives:
  - your sight
  - your gaze
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form points to the faculty or organs of seeing in the plural. 'Your
    eyes' is concrete and fits the direct address embedded in the vision report.
- source_word: በእንተ ስብሐቲሁ
  chosen: because of its splendor
  alternatives:
  - on account of its glory
  - because of its radiance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase gives the reason the sight fails. Rendering
    the suffix as 'its' follows the immediate referent in the vision, likely the house/throne
    structure being described.
