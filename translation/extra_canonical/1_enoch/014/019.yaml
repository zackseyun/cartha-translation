theological_decisions:
- issue: Referent of the pronoun in 'his throne'
  chosen_reading: Retain the masculine singular pronoun without explicating the referent
    in the verse itself.
  alternative_readings:
  - Interpret explicitly as 'the Great Glory's throne'
  - Interpret explicitly as God's throne
  rationale: The immediate Ge'ez text only gives the suffixed pronoun. Since the wider
    context identifies the enthroned heavenly figure, but this verse itself does not
    restate the name/title, the translation preserves the local wording and avoids
    importing an explanatory gloss into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
