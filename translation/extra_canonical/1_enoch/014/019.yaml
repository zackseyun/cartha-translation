translation:
  text: And from beneath the throne came forth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verse is a short clause in Ge'ez and leaves unstated what came forth;
      the next line in context supplies the imagery. English retains the open-ended
      emergence rather than filling in an object.
    reason: lexical_alternative
  - marker: b
    text: Or 'And from beneath his throne there came forth.'.
    reason: previous_rendering
lexical_decisions:
- source_word: እምታሕተ
  chosen: from beneath
  alternatives:
  - from under
  - below
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional form combines the ablative sense ('from') with ታሕተ
    ('beneath/under'). 'From beneath' preserves the spatial imagery more vividly than
    the flatter 'below.'
- source_word: መንበሩ
  chosen: his throne
  alternatives:
  - the throne
  - his seat
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መንበር commonly denotes a throne or seat. In this heavenly-vision context,
    'throne' is the theologically and imagistically appropriate rendering. The suffixed
    pronoun requires 'his.'
- source_word: ይወፅእ
  chosen: there came forth
  alternatives:
  - came out
  - went out
  - issued forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means to go out or come forth. Because the clause describes
    visionary emergence from beneath the throne, 'came forth' preserves elevated apocalyptic
    register without over-paraphrasing. The English existential 'there' is supplied
    for natural style in a verbless-objectless clause.
