    reason: previous_rendering
lexical_decisions:
- source_word: ጠፈሩ
  chosen: its ceiling
  alternatives:
  - its roof
  - its firmament
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun refers to the upper covering of the house/structure seen in the vision. 'Ceiling' fits the immediate architectural context better than the more cosmic 'firmament,' while preserving elevated imagery.
- source_word: ሩጸተ
  chosen: path
  alternatives:
  - course
  - running
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is connected with movement or course. In context with stars, 'path' communicates their visible track without over-literalizing the verbal idea of running.
- source_word: ከዋክብት
  chosen: stars
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering of the celestial bodies; no contextual reason to vary.
- source_word: መበርቅት
  chosen: flashes of lightning
  alternatives:
  - lightnings
  - lightning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural-like force suits the visionary description of repeated luminous phenomena. 'Flashes of lightning' is vivid and natural English.
- source_word: ማእከሎሙ
  chosen: among them
  alternatives:
  - in their midst
  - between them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase locates the cherubim within the celestial-light imagery. 'Among them' is clear modern English while retaining the spatial relation.
- source_word: ኪሩቤን
  chosen: cherubim
  alternatives:
  - kerubim
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the recognizable angelic being. 'Cherubim' preserves the traditional transliterated form and the apocalyptic register.
- source_word: ዘእሳት
  chosen: fiery
  alternatives:
  - of fire
  - made of fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The genitival construction describes the cherubim by fire. 'Fiery' is concise and idiomatic without weakening the image.
- source_word: ሰማዮሙ
  chosen: their heaven
  alternatives:
  - their sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The possessive is retained because the Ge'ez appears to specify a heaven/sky associated with the cherubim or the phenomena just described. 'Heaven' better matches the visionary-cosmic setting than 'sky.'
- source_word: ማይ
  chosen: water
  alternatives:
  - waters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular mass noun is natural in English. The image likely evokes the heavenly waters above, but the base rendering should remain simple and direct.
