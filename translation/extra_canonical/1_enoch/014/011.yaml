theological_decisions:
- issue: Whether to render ሰማዮሙ literally as 'their heaven' despite the strangeness of the image
  chosen_reading: their heaven was water
  alternative_readings:
  - the heaven above them was water
  - their sky was like water
  rationale: The Ge'ez witness as given includes a possessive form that should be preserved rather than normalized away. The resulting image is apocalyptic and unusual, and the translation should let that strangeness stand.
  doctrine_reference: Preserve theological tension rather than resolve it; when wording is uncertain or strange, prefer transparent English over smoothing.
