translation:
  text: Its ceiling was like the course of the stars and the lightnings, and among them were fiery cherubim, and their heaven was water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'path of the stars' could also be understood as 'course of the stars' or more literally 'running of the stars.'
    reason: lexical_alternative
