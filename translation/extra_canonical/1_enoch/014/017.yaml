translation:
  text: And its floor was of fire, and above it were lightnings and the path of the
    stars, and its ceiling was blazing fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'the path of the stars' may also be understood as 'the
      course of the stars,' referring to their ordered movement across the heavens.
    reason: lexical_alternative
  - marker: b
    text: The word rendered 'ceiling' could also be translated 'roof' or, less likely,
      'vault/firmament,' depending on how strongly the line is read as architectural
      versus cosmic imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: ምድሩሰ
  chosen: its floor
  alternatives:
  - its ground
  - its pavement
  - its foundation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From ምድር, literally 'earth/ground.' In the architectural vision context
    of the heavenly house/throne room, 'floor' best conveys the interior surface without
    over-specifying a worked pavement.
- source_word: ዘእሳት
  chosen: of fire
  alternatives:
  - fiery
  - made of fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The genitival construction is preserved straightforwardly as 'of fire,'
    maintaining the stark apocalyptic imagery.
- source_word: መልዕልቴሁ
  chosen: above it
  alternatives:
  - its upper part
  - over it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Derived from the idea of what is above or upper. 'Above it' is idiomatic
    and fits the sequence of spatial description.
- source_word: መበርቅት
  chosen: lightnings
  alternatives:
  - lightning flashes
  - flashes of lightning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural form suits the visionary multiplicity. 'Lightnings' preserves
    the elevated register and compactness of the image.
- source_word: ምርዋፀ
  chosen: the path
  alternatives:
  - the course
  - the track
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term appears to denote a course or track. 'Path' is vivid and readable,
    while still allowing the cosmic image of stellar movement.
- source_word: ከዋክብት
  chosen: of the stars
  alternatives:
  - of stars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering of the plural noun 'stars.' The definite form in English
    helps the phrase read naturally in context.
- source_word: ጠፈሩኒ
  chosen: its ceiling
  alternatives:
  - its roof
  - its upper vault
  - its firmament
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely from a term for roof/upper covering. 'Ceiling' fits the interior
    architectural description better than 'firmament,' which would over-cosmicize
    the image, while 'roof' is possible but less clearly interior.
- source_word: እሳት ዘይነድድ
  chosen: blazing fire
  alternatives:
  - burning fire
  - fire that burns
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative construction literally means 'fire that burns.' 'Blazing
    fire' is concise, natural English that preserves the intensity without paraphrasing
    away the repetition.
