theological_decisions:
- issue: Architectural versus cosmic imagery in the heavenly structure
  chosen_reading: Translate the terms as features of an interior heavenly building
    ('floor,' 'above it,' 'ceiling') while preserving cosmic elements ('lightnings,'
    'path of the stars').
  alternative_readings:
  - Render more cosmically with 'firmament' or 'vault'
  - Render more concretely with 'roof' and omit the cosmic nuance
  rationale: The verse blends temple/throne-room architecture with cosmic phenomena.
    Preserving both tensions matches the apocalyptic style and avoids flattening the
    vision into either a merely physical building or a purely abstract heaven scene.
  doctrine_reference: Preserve theological tension rather than resolve it; preserve
    apocalyptic imagery.
