theological_decisions:
- issue: Referent of 'your beloved sons'
  chosen_reading: The line addresses the Watchers concerning the giant offspring born
    from their unions, whose violent end they will witness.
  alternative_readings:
  - The line addresses human fathers generally
  - '''sons'' is a broader term for descendants or children without specific reference
    to the giants'
  rationale: Within the immediate context of 1 Enoch 14 and the surrounding judgment
    oracles against the Watchers, the most coherent referent is the offspring produced
    by the illicit unions. This preserves the local narrative logic without importing
    later doctrinal categories.
  doctrine_reference: Preserve local passage meaning before harmonizing across the
    corpus.
