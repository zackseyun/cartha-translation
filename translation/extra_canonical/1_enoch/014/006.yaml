translation:
  text: And before this, you will have seen the destruction of your beloved sons;
    and you will not have their treasures, but they will fall before you by the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The word rendered 'treasures' is textually difficult in the OCR Ge'ez and
      may also mean 'wealth' or 'possessions.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you shall see the destruction of your beloved sons,' if the verbal form
      is taken more simply as future rather than future perfect.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምቅድመ ዝንቱ
  chosen: before this
  alternatives:
  - before these things
  - prior to this
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal phrase marking what precedes the event just mentioned; 'before
    this' is concise and preserves the prophetic sequence.
- source_word: ርኢክሙ
  chosen: you will have seen
  alternatives:
  - you saw
  - you shall see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The form is naturally read as a second person plural perfect/predictive
    in context. English future perfect fits the warning: they will live to witness
    the event before the next judgment development.'
- source_word: ሐጕለ
  chosen: destruction
  alternatives:
  - ruin
  - slaughter
  - loss
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A calamity term suited to violent downfall. 'Destruction' preserves the
    severity without over-specifying beyond the Ge'ez.
- source_word: ውሉድክሙ ፍቁራን
  chosen: your beloved sons
  alternatives:
  - your beloved children
  - your dear sons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ውሉድ can denote children/offspring, but 'sons' is retained because the
    immediate context concerns the offspring of the Watchers and women, and the masculine
    plural adjective supports a male reference.
- source_word: አልብክሙ
  chosen: you will not have
  alternatives:
  - you shall not possess
  - there will not be for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward possession/existence expression. 'You will not have'
    is idiomatic and keeps the force of deprivation.
- source_word: ጥራያኒሆሙ
  chosen: their treasures
  alternatives:
  - their wealth
  - their possessions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR form is difficult, but the sense in context points to goods or
    wealth associated with the sons. 'Treasures' preserves the concrete sense while
    allowing some breadth.
- source_word: ይወድቁ ቅድሜክሙ በሰይፍ
  chosen: they will fall before you by the sword
  alternatives:
  - they will be struck down before you with the sword
  - they will fall in your presence by the sword
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard judgment formula in apocalyptic diction. 'Fall before you
    by the sword' preserves the vividness and the violent instrumentality without
    flattening the imagery.
