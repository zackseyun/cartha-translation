translation:
  text: 'I wrote down your petition, and in my vision it was shown thus: your petition
    will not be granted to you for all the days of eternity; and the sentence against
    you has been fully decreed, and it will not be granted to you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez phrase rendered 'for all the days of eternity' is literally 'for
      all the days of the age/eternity,' an emphatic formula of unending duration.
    reason: lexical_alternative
  - marker: b
    text: The word rendered 'sentence' may also be understood as 'decree' or 'final
      decision'; the sense is that a definitive judgment has already been fixed against
      the Watchers.
    reason: lexical_alternative
lexical_decisions:
- source_word: ስእለትክሙ
  chosen: your petition
  alternatives:
  - your prayer
  - your request
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes an entreaty or request made to a superior. 'Petition'
    preserves the formal, judicial tone of the Watchers' appeal better than the more
    general 'prayer' or 'request'.
- source_word: ጻሐፍኩ
  chosen: I wrote down
  alternatives:
  - I wrote
  - I recorded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb straightforwardly means 'I wrote.' 'Wrote down' makes explicit
    the act of recording the Watchers' plea without adding content beyond the context.
- source_word: በራእየየ
  chosen: in my vision
  alternatives:
  - in my seeing
  - in the vision I saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is built on 'vision/seeing' and refers to revelatory sight.
    'In my vision' is idiomatic English and preserves the apocalyptic mode.
- source_word: ያስተርኢ
  chosen: it was shown
  alternatives:
  - he showed
  - it was revealed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive-like English rendering fits the impersonal revelatory formula
    here. 'It was shown' preserves the visionary disclosure without forcing an explicit
    subject.
- source_word: ኢትከውነክሙ
  chosen: will not be granted to you
  alternatives:
  - will not happen for you
  - will not be done for you
  - will not come to pass for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally the phrase is closer to 'will not be for you,' but in context
    the referent is the Watchers' petition. 'Will not be granted to you' expresses
    the judicial denial implied by the context.
- source_word: መዋዕለ ዓለም
  chosen: for all the days of eternity
  alternatives:
  - forever
  - for eternal ages
  - for all eternity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is an emphatic duration formula, literally 'days of eternity/age.'
    'For all the days of eternity' keeps the solemn apocalyptic cadence better than
    the flatter 'forever'.
- source_word: ፍጽምት
  chosen: the sentence
  alternatives:
  - the decree
  - the final decision
  - the consummation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can carry the sense of completion or a fixed determination.
    In this judgment context, 'sentence' best captures a finalized adverse ruling
    against the Watchers.
- source_word: ላዕሌክሙ
  chosen: against you
  alternatives:
  - upon you
  - over you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition literally means 'upon/over,' but in legal-judgment context
    English 'against you' conveys the hostile force of the decree.
- source_word: ወኢይከውነ ክሙ
  chosen: and it will not be granted to you
  alternatives:
  - and it will not be for you
  - and it will not happen for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated denial echoes the earlier clause. Rendering it again as
    'will not be granted to you' preserves the repetition of refusal in natural English.
