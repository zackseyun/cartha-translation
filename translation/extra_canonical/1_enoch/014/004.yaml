theological_decisions:
- issue: How to render the denial of the Watchers' appeal
  chosen_reading: 'A judicial refusal: ''your petition will not be granted to you'''
  alternative_readings:
  - A more literal but less clear 'your petition will not be for you'
  - A more devotional 'your prayer will not be heard'
  rationale: The immediate context is Enoch's mediation attempt for the fallen Watchers
    and the divine response of irreversible judgment. 'Granted' preserves the legal-apocalyptic
    force without importing later canonical idiom such as 'heard.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Meaning of ፍጽምት in this clause
  chosen_reading: A fixed judicial sentence/decree against the Watchers
  alternative_readings:
  - A more abstract 'completion'
  - An eschatological 'end'
  rationale: In context the term refers not to cosmic consummation in general but
    to a finalized determination concerning the Watchers' fate. 'Sentence' makes the
    judgment setting explicit while remaining faithful to the semantic field of completion/finality.
  doctrine_reference: Optimal equivalence; preserve apocalyptic judgment formulas
    rather than flattening them.
