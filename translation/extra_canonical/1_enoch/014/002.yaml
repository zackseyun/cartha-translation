translation:
  text: I saw in my sleep what I now speak with a tongue of flesh and with my breath, which the Great One has given as a mouth to men so that they might speak with it and understand in the heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with my spirit.' The Ge'ez term can denote breath or spirit; the immediate context of tongue and speaking favors 'breath.'
    reason: lexical_alternative
  - marker: b
    text: '''Heart'' here refers to inward understanding, not merely emotion.'
    reason: cultural_note
  - marker: c
