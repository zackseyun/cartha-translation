theological_decisions:
- issue: Meaning of መንፈስ in this anthropological statement
  chosen_reading: breath
  alternative_readings:
  - spirit
  rationale: The verse stresses human faculties granted by the Great One for speech and inward comprehension. In parallel with 'tongue of flesh,' 'breath' best fits the embodied means of speaking, while a footnote preserves 'spirit' as possible.
  doctrine_reference: Preserve theological tension rather than resolve it; document ambiguity in footnote.
- issue: Rendering of ዓቢይ
  chosen_reading: the Great One
  alternative_readings:
  - the Great
  - God
  rationale: The epithet is part of Enochic divine diction. Translating it as 'the Great One' preserves the elevated apocalyptic register without importing a flatter generic term.
  doctrine_reference: Original-language primacy over translation tradition; preserve local passage rhetoric.
