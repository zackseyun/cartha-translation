lexical_decisions:
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann
  rationale: Simple past of seeing; 'I saw' is clear modern English while preserving visionary report style.
- source_word: በንዋምየ
  chosen: in my sleep
  alternatives:
  - in my dream
  - while sleeping
  lexicon: Dillmann
  rationale: The noun points to sleep/dream-state. 'In my sleep' preserves the visionary setting without over-specifying whether the emphasis is on dream content or the state of sleep.
- source_word: ይእዜ እነግር
  chosen: I now speak
  alternatives:
  - I now declare
  - I now recount
  lexicon: Dillmann
  rationale: Present reporting formula linking vision to present narration. 'Speak' fits the immediate contrast with tongue and breath.
- source_word: በልሳን ዘሥጋ
  chosen: with a tongue of flesh
  alternatives:
  - with a fleshly tongue
  - with the tongue of flesh
  lexicon: Dillmann
  rationale: A vivid anthropological phrase contrasting human bodily speech with spiritual revelation. Retained literally to preserve apocalyptic texture.
- source_word: ወበመንፈስየ
  chosen: and with my breath
  alternatives:
  - and with my spirit
  - and with my wind
  lexicon: Dillmann
  rationale: Although Ge'ez can mean spirit/breath, here the parallel with 'tongue of flesh' and the following clause about human speech favors 'breath' as the animating means of utterance, while still leaving anthropological depth.
- source_word: ዘወሀበ ዓቢይ አፈ ለሰብእ
  chosen: which the Great One has given to men
  alternatives:
  - which the Great One gave to humanity
  - which the Great One bestowed on people
  lexicon: Dillmann
  rationale: Takes the relative clause with the preceding means of speech. 'The Great One' preserves the divine epithet without flattening it to a generic 'God.' 'Men' here means humankind.
- source_word: ይትናገሩ ቦቱ
  chosen: so that they might speak with it
  alternatives:
  - that they may speak by it
  - to speak through it
  lexicon: Dillmann
  rationale: Purpose/result clause. Singular pronoun likely refers collectively to the faculty just mentioned; English idiom prefers 'with it.'
- source_word: ወይለብዉ በልብ
  chosen: and understand in the heart
  alternatives:
  - and think in the heart
  - and consider in their heart
  lexicon: Dillmann
  rationale: The verb likely carries the sense of perceiving/understanding inwardly. 'In the heart' preserves ancient anthropology rather than reducing it to mere cognition.
