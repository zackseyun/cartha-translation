theological_decisions:
- issue: Identity of the first-person speaker
  chosen_reading: The first person is God (the Most High) speaking.
  alternative_readings:
  - An angelic speaker
  - Enoch as narrator
  rationale: Chs. 10–11 move from judgment decrees to promised restoration; the first-person vows to open heavenly storehouses best fit divine speech. We do not add a divine name to avoid over-supplying what the text does not say.
- issue: Idiomatic phrase “children of men”
  chosen_reading: Retain “children of men” in the main text.
  alternative_readings:
  - humankind
  - people
  rationale: The phrase is formulaic in Enoch and related literature. Preserving it maintains genre flavor; an inclusive alternative is noted in a footnote.
- issue: Number of “blessing” (singular vs. plural)
  chosen_reading: Render the singular በረከት as mass-noun “blessing.”
  alternative_readings:
  - blessings
  rationale: The singular abstract can function collectively; keeping singular mirrors the Geʿez form while conveying abundance by context.
