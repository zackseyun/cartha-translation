  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: Fits the collocation with “open” and the following construct plural መዛግብተ; thus, “doors of the storehouses.” Concrete and physical, consistent with Enoch’s cosmic imagery.
- source_word: እፈትሕ
