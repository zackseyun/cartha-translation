- source_word: መዛግብተ
  chosen: storehouses
  alternatives:
  - treasuries
  - storerooms
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: From the root meaning to store; “storehouses” preserves the concrete cosmic motif common in Enoch (e.g., storehouses of winds).
- source_word: በረከት
  chosen: blessing
  alternatives:
  - blessings
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: Singular abstract functioning as a collective; English mass-noun rendering keeps the tight link with the singular form in Geʿez.
- source_word: እለ
  chosen: that
  alternatives:
  - which
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative pronoun introducing a subordinate clause; “that” is concise and idiomatic.
- source_word: በሰማይ
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: Geʿez uses the singular here; “in heaven” reads naturally while keeping the number.
- source_word: ከመ
  chosen: so that
  alternatives:
  - in order that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Purpose conjunction; preserves the purposive nuance leading into the causative verb.
- source_word: አውርዶሙ
  chosen: bring them down
  alternatives:
  - cause them to descend
  - send them down
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: Causative stem of “descend” with 3pl object suffix (-omu); “bring them down” is idiomatic and concrete.
- source_word: ዲበ
  chosen: upon
  alternatives:
  - 'on'
  - over
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: Preposition marking the target surface; “upon” retains the elevated register and spatial sense.
- source_word: ምድር
  chosen: the earth
  alternatives:
  - the land
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: Cosmic context favors “earth” rather than a localized “land.”
- source_word: ግብሮሙ
  chosen: their work
  alternatives:
  - their deeds
  - their labor
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: From gǝbr ‘work/deed’ with 3pl suffix; “work” functions as a collective for human activity.
- source_word: ፃማሆሙ
  chosen: their offspring
  alternatives:
  - their seed
  - their progeny
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: Literal ‘seed’ used idiomatically for descendants; “offspring” gives clear, contemporary sense while preserving the metaphor in footnote.
- source_word: ለ
  chosen: for
  alternatives:
  - to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dative preposition marking the ultimate beneficiaries of the action.
- source_word: ውሉደ ሰብእ
  chosen: children of men
  alternatives:
  - children of humankind
  - sons of men
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: Conventional apocalyptic idiom; retaining it preserves Enoch’s style and intertextual resonance.
