translation:
  text: And peace and truth shall become partners throughout all the And peace and truth shall be multiplied throughout all the days of the world and throughout all the generations of the world. of the world and throughout all the generations of the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ge'ez mäwa'ələ can mean 'courses' (as of heavenly bodies) or 'ages/periods.' With 'of the world' the temporal sense is most likely here; 'courses' is retained in technical contexts (e.g., chs. 72–82).
    reason: lexical_alternative
  - marker: b
    text: The phrase sutūfānä + 'they shall be' idiomatically means 'shall be multiplied/abundant.' 'Shall abound' is a close English alternative.
    reason: lexical_alternative
  - marker: c
    text: Or 'shall be multiplied'.
    reason: previous_rendering
  - marker: d
    text: Or 'ages'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሰላም
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  - prosperity
  lexicon: Leslau Ge'ez
  rationale: Common Ge'ez term for peace; paired with 'truth' here to denote a state of flourishing and right order.
- source_word: ወ (conjunction)
  chosen: and
  alternatives:
  - —
  lexicon: Leslau Ge'ez
  rationale: Simple connective; retained to reflect the coordinate structure of the clause.
- source_word: ርትዕ
  chosen: truth
  alternatives:
  - rightness
  - stability
  lexicon: Leslau Ge'ez
  rationale: Ge'ez noun for 'truth'; the collocation 'peace and truth' is idiomatic and semantically balanced.
- source_word: ሱቱፋነ
  chosen: be multiplied
  alternatives:
  - abound
  - be in abundance
  - be plentiful
  lexicon: Leslau Ge'ez
  rationale: From the root meaning multiplicity/abundance; with the following finite verb the idiomatic sense is that peace and truth will increase/multiply.
- source_word: ይከውኑ
  chosen: shall be (become)
  alternatives:
  - shall become
  - shall exist
  lexicon: Leslau Ge'ez
  rationale: Finite verb of existence/being; combined with the preceding noun of abundance to yield 'shall be multiplied' rather than a bare copula.
- source_word: በኵሉ
  chosen: throughout all
  alternatives:
  - in all
  - in every
  lexicon: Leslau Ge'ez
  rationale: Preposition + universal quantifier; chosen to convey comprehensive temporal distribution.
- source_word: መዋዕለ ዓለም
  chosen: ages of the world
  alternatives:
  - courses of the world
  - periods of the world
  - times of the world
  lexicon: Leslau Ge'ez
  rationale: Mäwa'ələ can denote 'courses/periods'; with genitive 'of the world' the temporal sense 'ages/periods' fits best. 'Ages' balances clarity and the likely idiom.
- source_word: ትውልደ ዓለም
  chosen: generations of the world
  alternatives:
  - generations of the age
  - generations of humankind
  lexicon: Leslau Ge'ez
  rationale: Standard Ge'ez expression for successive human generations; retained literally to preserve the scope and cadence.
- source_word: ዓለም
  chosen: world
  alternatives:
  - age
  - cosmos
  lexicon: Leslau Ge'ez
  rationale: In this genitive construction, 'world' preserves the concrete scope; 'age' is already expressed by mäwa'ələ.
