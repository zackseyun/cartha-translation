theological_decisions:
- issue: Scope of blessing ('ages of the world' and 'generations of the world')
  chosen_reading: Universal and ongoing scope is retained ('throughout all the ages... and ... generations of the world').
  alternative_readings:
  - Restrict to a single eschatological age
  rationale: The double phrase with comprehensive quantifier suggests an emphatic totality across time, not a single epoch. Rendering keeps the literal breadth without specifying an eschatological timetable.
