theological_decisions:
- issue: Meaning of 'the number of the righteous has drawn near'
  chosen_reading: An appointed total or full count of the righteous is nearing completion.
  alternative_readings:
  - The time belonging to the righteous has drawn near
  - The judgment/reckoning of the righteous has drawn near
  rationale: The Ge'ez noun most naturally denotes number or count. In apocalyptic context this can imply the completion of an appointed number, which explains the joy of the holy ones without paraphrasing beyond the wording.
  doctrine_reference: Preserve theological tension rather than resolve it; document ambiguity rather than smoothing it away.
- issue: Force of 'the blood of the righteous ... has been accepted before the Lord of Spirits'
  chosen_reading: The shed blood of the righteous has come before God with acknowledged validity, implying divine regard and impending response.
  alternative_readings:
  - The blood of the righteous has been avenged before the Lord of Spirits
  - The blood of the righteous has been remembered before the Lord of Spirits
  rationale: The Ge'ez verb itself more directly suggests acceptance/favor than explicit vengeance. The broader Enochic context of vindication remains present, but the translation should not overstate the verb's force in the main text.
  doctrine_reference: Original-language primacy over translation tradition; do not import a stronger theological conclusion than the source warrants.
